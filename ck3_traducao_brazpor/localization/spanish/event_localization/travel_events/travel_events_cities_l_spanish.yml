 travel_city_new_dessert: "O [ROOT.Char.Custom('FavoriteTreat')] de [city_province.GetNameNoTooltip] me impressionou"
 travel_city_new_techniques: "Eu vou trazer para casa novas técnicas e moda de [city_province.GetNameNoTooltip]"
 travel_city_well_rested: "Tive uma estadia tranquila em [city_province.GetNameNoTooltip]"
 travel_city_resupplied: "Consegui ganhar dinheiro e me reabastecer em [city_province.GetNameNoTooltip]"
 travel_city_option_opt_out: "Não vou perder tempo neste lugar."
 travel_city_major_windfall: "Ganhei pouco, mas aprendi muito no bairro do Agiota em [city_province.GetNameNoTooltip]"
 travel_city_gained_money: "Encontrei financiadores no bairro do Agiota de Constantinopla"
 travel_city_option_opt_out_tooltip: "Gaste apenas o tempo necessário em [city_province.GetNameNoTooltip] para preparar a jornada contínua"
 souvenir_bought_companion: "[sightseeing_companion.GetName] me ajudou a adquirir [souvenir.GetName]"
