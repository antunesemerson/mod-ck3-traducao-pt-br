 book_artifact_loc: "[souvenir.GetDesc]\n\nEn la última página, alguien garabateó una nota sobre haberlo comprado en el mercado de libros de [city_province.GetName]."
 regalia_artifact_loc: "[souvenir.GetDesc]\n\nLas vestiduras están envueltas en un trozo de tela donde alguien ha garabateado una nota sobre haberlas comprado a un artesano de [city_province.GetName]."
 crown_artifact_loc: "[souvenir.GetDesc]\n\nNa parte interna da coroa há um pequeno carimbo da oficina em [city_province.GetName] que a produziu."
 souvenir_companion_tooltip: "As chances de encontrar um artefato melhor são aumentadas pelo meu companheiro de viagem [sightseeing_companion.GetName]"
 souvenir_tooltip: "Um artefato será adquirido nos mercados de [city_province.GetNameNoTooltip]"
 souvenir_bought: "[souvenir.GetName] foi comprado em [city_province.GetNameNoTooltip]"
 #Baghdad - Specific:
 travel_city_baghdad_intro: "Passando pelas portas de [city_province.GetNameNoTooltip], é difícil não refletir sobre ter chegado ao centro tradicional do mundo árabe e islâmico.\n\n"
 travel_city_baghdad_suq_al_warraqin_title: "[city_province.GetNameNoTooltip]: Suq al-Warraqin"
 travel_city_baghdad_royal_enclosure_title: "[city_province.GetNameNoTooltip]: o Bairro Real"
 travel_city_baghdad_cemeteries_title: "[city_province.GetNameNoTooltip] dos Tempos Passados"
 travel_city_baghdad_suq_al_warraqin: "À medida que me aproximo da cidade interna, o ar se enche de discurso literário intelectual. Toda esta rua, incluindo suas pontes, é dominada por centenas de livrarias movimentadas e salões literários."
 travel_city_baghdad_royal_enclosure: "Nos arredores da cidade interna, me vejo cercado por palácios menores, cozinhas e padarias. Se erguendo sobre nós o tempo todo está a cúpula verde do Palácio da Porta Dourada."
 travel_city_baghdad_cemeteries: "Navegando pela cidade, noto muitas ruínas e monumentos antigos. Eventualmente, me encontro nos cemitérios, entre os túmulos de califas e estudiosos legais de tempos já passados."
 travel_city_baghdad_companion_reflection: "\n\nM [ROOT.Char.Custom2('RelationToMe', sightseeing_companion)] [sightseeing_companion.GetName] observa que estes são homens que conheceram um Bagdá diferente, quase irreconhecível nos dias de hoje."
 #Rome - Specific
 travel_city_rome_intro: "À distância, a cidade de [city_province.GetNameNoTooltip] é uma floresta de torres e um labirinto de edifícios de pedra. Conforme nos aproximamos, a paisagem muda: ruínas de monumentos, muralhas e igrejas antigas coexistem com fazendas e animais pastando.\n\n"
 travel_city_rome_fortified_monuments_title: "[city_province.GetNameNoTooltip]: Monumentos Fortificados"
 travel_city_rome_fortified_monuments: "Ao atravessar a cidade, percebo como as ruínas foram cuidadosamente fortificadas por casas em conflito. Nesse estilo, o Mausoléu de Adriano e até mesmo o Coliseu agora são fortalezas."
 travel_city_rome_caesars_needle_title: "[city_province.GetNameNoTooltip]: Agulha de César"
 travel_city_rome_caesars_needle: "Enquanto paramos diante de um grande obelisco, um local conta que no topo repousam as cinzas de Júlio César em uma pequena caixa redonda.\n\n#EMP \"Na morte, assim como na vida, César está acima de todos os romanos.\"#!"
 travel_city_rome_companion_reflection: "\nM [ROOT.Char.Custom2('RelationToMe', sightseeing_companion)] [sightseeing_companion.GetName] sugere que devemos aproveitar esta oportunidade para aprender sobre a cidade."
 travel_city_rome_alone_reflection: "\nNão consigo deixar de refletir sobre a imensa idade desta cidade."
 travel_city_rome_pilgrims_and_shrines_title: "[city_province.GetNameNoTooltip]: Santuários e Peregrinos"
 travel_city_rome_pilgrims_and_shrines: "Parece que os peregrinos estão por toda parte. Negociando, conversando e formando filas para os santuários e túmulos dos santos da cidade. Mansões de aristocratas esquecidos agora servem como albergues para os fiéis."
 #Constantinople - Specific
 travel_city_constantinople_augustaion_title: "[city_province.GetBaronyNameExplicitlyNoTooltip]: Centro do Mundo"
 travel_city_constantinople_aqueducts_title: "[city_province.GetBaronyNameExplicitlyNoTooltip]: Aquedutos e Cisternas"
 travel_city_constantinople_goldsmiths_moneychangers_title: "[city_province.GetBaronyNameExplicitlyNoTooltip]: Ourives e Cambistas"
 PROSPHORION_GLOSS: "O porto comercial do norte de [GetTitleByKey('b_constantinople').GetNameNoTier], a cidade também possuía vários outros portos militares, comerciais e imperiais."
 travel_city_constantinople_intro: "Era impossível não notar [city_province.GetBaronyNameExplicitlyNoTooltip] no horizonte, com seus enormes muros que se erguem sobre a paisagem e as massas de pessoas que percorrem a [Glossary( 'Mese', 'MESE_GLOSS' )] as quais oferecem uma lição de humildade.\n\n"
 travel_city_constantinople_intro_chalcedon: "Acostumados aos visitantes exóticos, os constantinopolitanos praticamente não nos notam no porto de [Glossary( 'Prosforio', 'PROSPHORION_GLOSS')]. As muralhas marítimas de [city_province.GetBaronyNameExplicitlyNoTooltip] #EMP nos#! nos parecem impressionantes até mesmo do cais de [last_visited_location.GetBaronyNameExplicitlyNoTooltip]. \n\n"
 travel_city_constantinople_intro_sea: "Quando aportamos no porto de [Glossary( 'Prosforio', 'PROSPHORION_GLOSS')] nos deixa maravilhados com o tamanho de [city_province.GetBaronyNameExplicitlyNoTooltip], ao termos avistado torres, cúpulas e muralhas marítimas de longe.\n\n"
 travel_city_constantinople_augustaion: "Ao meio-dia descansamos do calor em um curioso edifício na impressionante praça do [Glossary( 'Augustaion', 'AUGUSTAION_GLOSS')]. A estrutura abriga um marco dourado que os locais insistem em dizer que marca o centro do mundo."
 travel_city_center_of_the_world_reflection: "\n\nCercado por edifícios monumentais, não é difícil acreditar nas alegações deles. Minha própria existência de repente parece menos significativa."
 travel_city_companion_center_of_the_world_reflection: "\n\n“[ROOT.Char.Custom2('RelationToMeAddress', sightseeing_companion)|U], este é um lugar como nenhum outro que você já esteve. Estamos diante de mais de milênios de história.”"
 AUGUSTAION_GLOSS: "O Augustaion é a praça logo além do portão de Chalke da área palaciana imperial de Constantinopla. Na extremidade oposta da praça fica o [Glossary( 'Milion', 'MILION_GLOSS' )], em frente ao Hipódromo e, nas laterais, ficam os banhos monumentais de Zeuxipo e a Catedral de Santa Sofia."
 travel_city_constantinople_aqueduct_valens: "Impulsionados pela curiosidade, seguimos um [Glossary( 'acueducto enorme', 'AQUEDUCT_OF_VALENS_GLOSS' )] até a entrada de uma cisterna subterrânea. Um guarda nos conta que ela tem fornecido água à cidade por gerações e se oferece para nos mostrar o enorme interior por uma pequena soma.\n"
 travel_city_option_study_aqueducts: "Devemos mapear e documentar essas profundezas."
 travel_city_constantinople_goldsmiths_moneychangers: "Por fim, paramos no bairro dos ourives. Este é o coração financeiro da cidade, onde o dinheiro é trocado, emprestado e depositado. [ROOT.Char.GetCurrentLocation.Custom('GetByzantineCoinWithGloss')|U]s de ouro, com imperadores há muito esquecidos, passam de mão em mão, junto com moedas de cobre e eletro."
 BYZANTINE_COINAGE_GLOSS: "As moedas de cobre e ouro eram a principal moeda do Império Bizantino. O Solidus de Ouro e, mais tarde, o Hyperpyron, foram as moedas mais valiosas e também muito procuradas no ocidente, onde eram conhecidas como #EMP Bezantes#!."
 AQUEDUCT_OF_VALENS_GLOSS: "O #EMP Aqueduto de Valente#! foi construído no século IV e continuou a fornecer água fresca para a cidade de Constantinopla por mais de mil anos. Uma combinação de cisternas a céu aberto e enormes subterrâneas permite que a cidade armazene mais de um milhão de metros cúbicos de água."
 SOLIDUS: "[Glossary( 'Sólido', 'BYZANTINE_COINAGE_GLOSS')]"
 HYPERPYRON: "[Glossary( 'Hiperpirón', 'BYZANTINE_COINAGE_GLOSS')]"
 FALLBACK_COIN: "moeda"
 travel_city_well_supplied: "Bem Suprido"
 travel_city_well_supplied_desc: "Este personagem recentemente se abasteceu de todos os itens essenciais necessários para a viagem."
