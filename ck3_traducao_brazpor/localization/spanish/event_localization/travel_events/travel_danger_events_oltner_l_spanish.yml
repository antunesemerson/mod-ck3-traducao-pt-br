l_spanish:
 travel_danger_events.9000.t: "$travel_danger_prefix$ Um Flagelo Zumbindo"
 travel_danger_events.9000.desc: "Os [location.Custom('GetTerrainTypePlural')] de [location.GetName] estão #EMP infestados#! de minúsculos insetos escuros e sugadores de sangue. Não importa o que façamos, ou para onde vamos, eles estão lá — sugando nosso sangue como uma nuvem torturante enviada pelo próprio [ROOT.Char.GetFaith.DevilName]!\n\nNão apenas os cavalos estão ficando agitados e temperamentais, mas meu séquito também... especialmente meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('mosquito_victim'))] [mosquito_victim.GetFirstName], que agita furiosamente seus braços cobertos de sangue."
 travel_danger_events.9000.deviant: "#EMP Delicioso!#! Todos, se desvistam!"
 travel_danger_events.9000.herbalist: "Acho que essa erva pode nos ajudar..."
 travel_danger_events.9000.a: "Continuemos, são apenas #EMP insetos!#!"
 travel_danger_events.9000.b: "[mosquito_victim.GetFirstNameNoTooltip]! Despindo-se, você irá à frente."
 drained_by_mosquitoes_modifier: "Esgotado por Mosquitos"
 drained_by_mosquitoes_modifier_desc: "Este personagem foi atacado por um enxame de insetos sugadores de sangue, esgotando uma quantidade significativa de sua essência sanguínea."
 travel_danger_events.9010.t: "$travel_danger_prefix$ Pausa nas Rodas"
 travel_danger_events.9010.desc: "\"[location.Custom('GetRandomRegionalDanger')|U]!\", ouço [irritated_character.GetFirstName] gritar, presa do pânico. Logo escuto um forte estalo, como o da madeira ao partir ou da minha paciência por fim se romper.\n\nSaio ao/à [location.Custom('GetProvinceGroundDesc')] para ver os restos partidos de uma roda de carroça... #EMP minha#! roda de carroça!\n\n\"Sinto muito, meu[GetPlayer.Custom('ES_OA')] [irritated_character.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))]. Era minha vez de vigiar, mas adormeci nas rédeas...\""
 travel_danger_events.9010.strong: "#EMP *Suspiro alto enquanto ergo a carroça do chão*#!"
 travel_danger_events.9010.a: "[root_scope.Custom('CulturalCurse')|U]... vamos atrasar."
 travel_danger_events.9010.b: "Redistribua os suprimentos, eu vou guiar com força daqui para frente..."
 travel_danger_events.9020.t: "$travel_danger_prefix$ Emaciação Emergente"
 travel_danger_events.9020.desc.first: "\"Nós... nós estamos #EMP completamente#! sem [ROOT.Char.Custom('GetExpensiveDessert')]!\" M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('emaciated_character'))] [emaciated_character.GetFirstName] gagueja nervosamente. \"E [ROOT.Char.Custom('GetExpensiveMeal')], e [ROOT.Char.Custom('GetExpensiveMealAlt')], e [ROOT.Char.Custom('GetLocalStreetFoodPlural')], e até mesmo #EMP [ROOT.Char.Custom('get_region_root_vegetable_plural')]!#!\"\n\n"
 travel_danger_events.9020.desc.war: "\"Aqueles soldados saqueadores levaram, durante a noite, tudo o que tínhamos! Não deixaram nem uma #EMP migaja!#!\", grita. \"Vamos morrer de fome!\"."
 travel_danger_events.9020.desc.other: "\"Deveríamos ter levado mais comida, não sobrou nem uma #EMP miga#! e não há nada para comer até onde a vista alcança!\", grita. \"Vamos morrer de fome!\""
 travel_danger_events.9020.desc.last: "\n\nTalvez eu não devesse ter comido três porções de [ROOT.Char.Custom('GetExpensiveMeal')] com molho [ROOT.Char.Custom('GetFoodDetail')] ontem?"
 travel_danger_events.9020.desc.last.alt: "\n\nMas... eu estive comendo como um ratinho, como isso é justo?"
 travel_danger_events.9020.a: "Gostaria que pudéssemos comer essas palavras..."
 travel_danger_events.9020.b: "O pouco que temos vai para #EMP mim!#!"
 travel_danger_events.9020.hunter: "Deve haver presas em algum lugar!"
 travel_danger_events.9020.cannibal: "Oh [emaciated_character.GetFirstNameNoTooltip], você daria sua vida por [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip|l]?"
 emaciated_modifier: "Emaciação"
 emaciated_modifier_desc: "Este personagem viajou por uma longa distância sem nenhuma comida."
 cannibalicus_maximus: "Você e todos os membros do séquito receberão o [secret|lE] Canibal, se ainda não forem Canibais"
 travel_danger_events.9030.t: "$travel_danger_prefix$ presos na lama"
 travel_danger_events.9030.desc: "Hoje não chove com força, mas de forma persistente; a estrada à nossa frente está se transformando em lama espessa. As carroças afundam, e a neblina dificulta a visão.\n\nNão vamos sair daqui por um tempo."
 travel_danger_events.9030.caravan_master: "Meu [GetCourtPositionType('travel_leader_court_position').GetNameNoTooltip()|l] aguenta um pouco de lama."
 travel_danger_events.9030.a: "Maldito seja este tempo."
 EVENT_WINDOW_OPTION_AVAILABLE_CARAVAN_MASTER: "Esta opção está disponível por causa do seu [GetCourtPositionType('travel_leader_court_position').GetName()|l]"
 travel_danger_events.9040.t: "$travel_danger_prefix$ tempestade"
 travel_danger_events.9040.desc: "Não consigo ver nada, a chuva está forte demais. Estamos encharcados até os ossos, e cada trovão apavora os cavalos.\n\nEntão, percebo algo horrível…\n\nOnde está meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))][victim.GetFirstName]?"
 travel_danger_events.9040.caravan_master: "[travel_leader.GetFirstNameNoTooltip][victim.GetHerHim]"
 travel_danger_events.9040.a: "Que [ROOT.Char.GetFaith.HighGodName] tenha misericórdia de [victim.GetFirstNameNoTooltip]."
 low_aptitude_caravan_master_reason_tooltip: "A [aptitude|El] de [travel_leader.GetFirstName|U] como [GetCourtPositionType('travel_leader_court_position').GetName()|l] é apenas [travel_leader.GetCourtPositionAptitude( GetCourtPositionType( 'travel_leader_court_position' ) )|l]"
 travel_danger_events.9050.t: "$travel_danger_prefix$ mente que divaga"
 travel_danger_events.9050.desc: "Viajar com meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))] , [victim.GetFirstName] está sendo um desafio; sua [GetTrait('withering_mind').GetName( GetNullCharacter )|l] vai enfraquecendo a cada dia.\n\nNão paro de ter que lembrá-lo: #EMP «¡Nos dirigimos a [ROOT.Char.GetTravelPlan.GetData.GetFinalDestination.GetProvince.GetName]! Para tal [ROOT.Char.GetTravelPlan.GetData.GetActivity.GetShortName|l], ¿os acordáis?».#! Mas ele nunca se lembra.\n\nE agora [victim.Custom('ES_ElLa')] velh[victim.Custom('ES_OA')] idiota foi se afastando e não há como encontrar [victim.GetSheHe]…"
 travel_danger_events.9050.caravan_master: "Meu mestre[travel_leader.Custom('ES_EA')] da caravana, [travel_leader.GetFirstNameNoTooltip], [victim.GetHerHim] encontrará."
 travel_danger_events.9050.a: "[victim.GetFirstNameNoTooltip] se perdeu, devemos ir."
 travel_danger_events.9050.b: "Pare! Precisamos procurar por [victim.GetFirstNameNoTooltip]!"
 death_lost: "se perdeu e nunca mais foi visto"
 9050_lost: "[victim.GetFirstName] se perdeu para sempre"
 9050_found: "Encontrou-se [victim.GetFirstName], abalad[victim.Custom('ES_OA')], mas viv[victim.Custom('ES_OA')]"
 travel_danger_events.9060.t: "$travel_danger_prefix$ passageiro frágil"
 travel_danger_events.9060.desc: "\"Ai, ai! Parem a carruagem — eu imploro!\", grita meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))] [victim.GetFirstName] ao cocheiro. \"Meu [elder_trait.GetName(GetNullCharacter)|l] não aguenta mais tantos solavancos, pedras e sacudidas!\".\n\nAs estradas esburacadas de [location.GetName] desgastam seu corpo frágil.\n\nTalvez devêssemos reduzir o ritmo, só um pouco."
 travel_danger_events.9060.sadistic: "#EMP … Tenemos que ir más deprisa.#!"
 travel_danger_events.9060.a: "Não vamos parar."
 travel_danger_events.9060.b: "Devemos levar em conta o conforto de [victim.GetFirstNameNoTooltip]"
 traveling_slowly_modifier: "Viagem dolorosamente lenta"
 traveling_slowly_modifier_desc: "Este séquito viaja muito lentamente, tornando-o um alvo fácil para salteadores."
 9060_wounded: "[victim.GetFirstName] está ferid[victim.Custom('ES_OA')]"
