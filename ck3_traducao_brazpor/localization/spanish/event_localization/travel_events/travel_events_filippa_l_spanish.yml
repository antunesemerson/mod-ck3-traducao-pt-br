l_spanish:
 #Travel Flavor Events
 #Good omen? - Encounter a duck
 travel_events.2000.t: "O que é um Pato?"
 travel_events.2000.desc: "O dia na estrada tem sido bastante tranquilo e sem acontecimentos até agora. Estamos em algum lugar nos arredores de [ROOT.Char.GetCurrentLocation.GetName] e fecho os olhos enquanto minha montaria me leva adiante, um passo firme de cada vez.\n\nQuando o vento interpreta uma melodia magnífica através das copas das árvores, a brisa traz outro som, e ele não vem de nossa comitiva. Seriam... grasnidos?\n\n"
 travel_events.2000.desc_meh_memory: "Eu observo meus arredores em busca do pássaro. Da última vez que segui um pato na natureza, as coisas ficaram... constrangedoras."
 travel_events.2000.desc_delicious_memory: "A última vez que segui um pato pela natureza, tive uma refeição #EMP deliciosa#!. Será que hoje é meu dia de sorte?"
 travel_events.2000.desc_good_memory: "Recordo com carinho a última vez que encontrei um pato na natureza. Ele me levou a um ninho de #EMP tantos#! patinhos fofos."
 travel_events.2000.desc_bad_memory: "Eu hesito por um momento, lembrando da última vez que segui um pato na natureza. Não terminou bem."
 travel_events.2000.desc_default: "Eu isolo o som vindo de um arbusto ao meu lado direito."
 travel_events.2000.a: "Isso é um bom presságio."
 travel_events.2000.a_sadist: "Isso é bobagem."
 travel_events.2000.b: "Siga aquele pato!"
 travel_events.2000.b_sadist: "Acho que eu poderia segui-lo..."
 travel_events.2000.b.tt: "Você segue o pato por um tempo"
 travel_events.2000.c: "Ick, ave irritante! Fora!"
 travel_events.2000.c.tt: "Você joga uma pedra no som do grasnado."
 #Duck follow-up
 travel_events.2001.t_positive: "Isso É..."
 travel_events.2001.t_negative: "Isso Não É um Pato!"
 travel_events.2001.t: "Quack!"
 travel_events.2001.intro: "Eu desmonto e localizo o pato na vegetação próxima. Ele começa a se afastar pela natureza, e eu o sigo a pé."
 travel_events.2001.desc_positive: "\n\nConforme continuo avançando, o suave grasnado é lentamente acompanhado por um coro — a princípio fraco, mas cada vez mais forte — de pequenos piados. Quando viro a próxima moita, vejo não apenas um pato, mas uma #EMP infinidade#! de patos e ninhos de patinhos!"
 travel_events.2001.desc_positive_sadist: "\n\nSinto meu estômago roncar ao observar os patos tenros e os patinhos."
 travel_events.2001.desc_positive_default: "\n\nSinto meus joelhos enfraquecerem ao contemplar toda aquela fofura."
 travel_events.2001.desc_negative: "\n\nÀ medida que me afasto cada vez mais da minha comitiva, um arrepio percorre minha espinha. Será que algo está me observando?\n\nDe repente, um exemplar de [ROOT.Char.Custom('RegionalFerociousAnimal')] aparece à beira do sub-bosque! Ele bufa e me encara com olhos furiosos."
 travel_events.2001.desc: "\n\nDe repente, o pato para e inclina a cabeça na minha direção, claramente confuso sobre por que conseguiu um seguidor humano.\n\nSorrio para o pato, tentando aliviar a tensão, mas ele de repente se contorce, bate as asas e sai voando."
 travel_events.2001.a: "Isso é... #EMP demais!#!"
 travel_events.2001.a_tt: "#EMP Delicioso#!"
 travel_events.2001.a_tt_death: "A fofura é demais para o seu pobre coração"
 travel_events.2001.b: "Estes dariam um assado perfeito..."
 travel_events.2001.b_success.tt: "Uma Boa Refeição"
 travel_events.2001.b_failure.tt: "Engasgado"
 travel_events.2001.c: "Isso é #EMP ruim!#!"
 travel_events.2001.c_success.tt: "Sucesso"
 travel_events.2001.c_ran: "Você consegue escapar com sucesso"
 travel_events.2001.c_failure.tt: "Ferido"
 travel_events.2001.c_hit_and_ran: "Você é atingido, mas consegue escapar"
 travel_events.2001.c_critical_failure: "A fera te machuca gravemente"
 travel_events.2001.d: "En garde!"
 travel_events.2001.d_scare_beast: "Você assusta a fera e ela foge"
 travel_events.2001.d_beast_hit: "A fera revida mas foge"
 travel_events.2001.e: "Que perseguição selvagem de um... #EMP pato#!?"
 #Crossing an ant path - Ignore or don't ignore your guide
 travel_events.2002.t: "O Caminho Pisoteado"
 travel_events.2002.desc: "A procissão parou a uma pedrada de [ROOT.Char.GetCurrentLocation.GetName]. Olho para ver meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guide_leader'))] [guide_leader.GetFirstName], desmontad[guide_leader.Custom('ES_OA')] e olhando atentamente para algo no chão. Os outros membros da comitiva se reuniram em torno de [guide_leader.GetSheHe].\n\n[guide_leader.GetFirstNameNoTooltip] levanta o olhar quando me aproximo. «[ROOT.Char.Custom('FormOfAddressForLiege')|U], temos uma trilha de formigas. Talvez eu seja um tanto supersticioso[guide_leader.Custom('ES_OA')] , mas nunca se deve atravessar uma trilha de formigas».\n\nFaz uma pausa. «Meu bisavô[great_grand_parent.Custom('ES_OA')] o fez e nunca voltou para casa»."
 travel_events.2002.a: "#EMP Claro#!. Encontraremos outro caminho."
 travel_events.2002.b: "Isso é bobagem. Vou assumir como guia!"
 travel_events.2002.c: "Eu tenho a cura perfeita para sua superstição."
 travel_competent_guide_tt: "Você é um[ROOT.Char.Custom('ES_XA')] guia competente"
 travel.competent_guide: "$travel_competent_guide_tt$"
 travel_get_lost_tt: "Você se perde"
 #Visit the local military place (barrack/military camp/regiment grounds) - Try to improve your martial
 travel_events.2003.t: "Um Estudo em Marcial"
 travel_events.2003.intro: "[local_captain.GetFirstName], [Select_CString( local_captain.IsFemale, 'a capitã', 'o capitão' )] local e um grupo de seus oficiais me cumprimentam quando meu séquito entra nos acampamentos militares de [ROOT.Char.GetCurrentLocation.GetName]."
 travel_events.2003.desc_barracks: "Eu rapidamente desmonto, ansioso para inspecionar o quartel local, repleto de atividade."
 travel_events.2003.desc_regiment: "Observo brevemente os terrenos do regimento e depois desmonto, enquanto grupos de soldados estão envolvidos em planos de batalha."
 travel_events.2003.desc_camp: "Quando [local_captain.GetFirstNameNoTooltip] se vai, desmonto rapidamente e [local_captain.GetHerHim] sigo entre o mais recente equipamento de cerco."
 travel_events.2003.outro: "\n\nAssinto, apreciando o caos organizado que observo.\n"E então, o que deseja [ROOT.Char.Custom('FormOfAddressForLiege')] que façamos agora?". [local_captain.GetFirstNameNoTooltip] me olha com expectativa."
 travel_events.2003.a: "Não me importaria de um treinamento!"
 travel_events.2003.a_sparring_tt: "Você treina com sucesso com as tropas"
 travel_events.2003.a_wounded_tt: "Você se machuca acidentalmente"
 travel_events.2003.b: "O que é essa engenhoca?"
 travel_events.2003.b_success_tt: "Aprendizado Marcial"
 travel_events.2003.b_learn_tt: "Você aprende algo ao estudar o equipamento"
 travel_events.2003.b_failure_tt: "Descoberto"
 travel_events.2003.b_spy_tt: "[county_liege.GetShortUIName] acha que você pode estar espionando"
 travel_events.2003.b_cut_tt: "Você se corta acidentalmente no equipamento"
 travel_events.2003.c: "Você deveria se juntar a mim."
 travel_events.2003.c_success_tt: "Recrutamento Secreto"
 travel_events.2003.c_secret_tt: "[county_liege.GetShortUIName] não descobre sobre sua prática de recrutamento"
 travel_events.2003.c_found_out_tt: "[county_liege.GetShortUIName] descobre sobre sua prática de recrutamento"
 travel_events.2003.d: "Na verdade, tenho algum lugar para ir..."
 #Visit (your own) crappy pasture - Try to address or ignore the issues
 travel_events.2004.t: "Retrato do Pasto"
 travel_events.2004.desc: "O cheiro de podridão atinge minhas narinas como um golpe acre. O gado não parece bem quando dou uma olhada nas pastagens próximas a [ROOT.Char.GetCurrentLocation.GetName].\n\nOs camponeses que trabalham aqui arrastam os pés e vagam sem rumo, tentando parecer ocupados. Ao que parece, sua evidente falta de motivação e moral está contagiando toda a população, já que o desenvolvimento da região claramente chegou a um impasse.\n\nEstremeço incrédulo quando se aproxima de mim [local_farmer.Custom('ES_ElLa')] líder local, [local_farmer.GetFirstName]. Que espelunca mal administrada!"
 travel_events.2004.a: "Até um porco cego poderia administrar este lugar melhor, [local_farmer.GetFirstNameNoTooltip]."
 travel_events.2004.a_success_tt: "Crítica Aceita"
 travel_events.2004.a_critique_success_tt: "[local_farmer.GetShortUIName] aceita sua crítica"
 travel_events.2004.a_failure_tt: "Crítica Rejeitada"
 travel_events.2004.a_critique_reject_tt: "[local_farmer.GetShortUIName] rejeita sua crítica"
 travel_events.2004.b: "Preciso de seus cavalos. Agora."
 travel_events.2004.c: "Tenho coisas melhores para fazer."
 #Visit another ruler's pasture - Give advice or sabotage the pasture
 travel_events.2005.t: "Pastos Alheios"
 travel_events.2005.desc: "Num dia bonito como este, o tempo está agradável, as pastagens de [ROOT.Char.GetCurrentLocation.GetName] estão com uma aparência ótima e o gado local está praticamente saltando e comemorando à sua maneira gutural. Os bezerros caminham ao lado de suas mães, com a pelagem brilhante e limpa.\n\nNo geral, o lugar é muito bem administrado, embora eu perceba algumas peculiaridades que eu lidaria de forma um pouco diferente.\n\n[local_farmer.Custom('ES_ElLa')|U] [local_farmer.Custom('MatriarchPatriarch')] se aproxima de mim. “Uma boa manhã para você, [ROOT.Char.Custom('FormOfAddressForLiege')]! Não são essas belezas um espetáculo para os olhos?”"
 travel_events.2005.a: "Eu poderia aplicar algumas dessas ideias em casa!"
 travel_events.2005.a_success_tt: "Conselho Bem-Sucedido"
 travel_events.2005.a_implemented_tt: "Seu conselho é implementado com sucesso"
 travel_events.2005.a_failure_tt: "Conselho Mal-Interpretado"
 travel_events.2005.a_misinterpreted_tt: "Seu conselho é completamente mal-interpretado"
 travel_events.2005.b: "Vamos ver se não podemos melhorar as coisas por aqui."
 #travel_events.2005.b_success_tt: "Sabotage Successful"
 #travel_events.2005.b_sabotage_tt: "Your sabotage is successful and secretive"
 #travel_events.2005.b_failure_tt: "Sabotage Averted"
 #travel_events.2005.b_averted_tt: "Your #EMP sabotage#! actually fixes some local problems"
 travel_events.2005.c: "Tenho certeza de que [county_liege.Custom('ES_ElLa')] [county_liege.GetTitledFirstNameNoTooltip|l] pode cuidar de seus próprios pastos."
 #Visit a camel farm - Get defiled by a camel
 travel_events.2006.t: "Camelos de Novo?"
 travel_events.2006.desc: "O sol está alto sobre a fazenda de camelos de [ROOT.Char.GetCurrentLocation.GetName] e procuro sombra sob as coberturas protetoras estendidas sobre certas áreas da fazenda. Um resmungo repentino me assusta, e eu me viro.\n\nAo meu lado, uma das magníficas feras teve a mesma ideia e se aconchega na sombra. Inclino-me para afagar sua longa cabeça quando o animal #EMP com um único movimento me acerta na testa e cospe na minha bochecha#!.\n\nQuando recobro os sentidos, vejo seu dono parado a apenas uns vinte passos, mortificado."
 travel_events.2006.a: "Você e sua besta precisam aprender boas maneiras!"
 travel_events.2006.a_tt: "Você chicoteia a besta e seu dono."
 travel_events.2006.b: "A cabeça desta besta será um aviso #EMP adequado#!."
 travel_events.2006.b_tt: "Você decapita o camelo"
 travel_events.2006_camel_head: "Cabeça de Camelo"
 travel_events.2006_camel_head_desc: "A cabeça de um camelo desobediente."
 travel_events.2006.c: "Uma besta é apenas uma criatura sem mente."
 #Visit an elephant pen - Train with the elephants
 travel_events.2007.t: "Elefantástico"
 travel_events.2007.desc_memory: "Olho desconfiado para as enormes bestas nos currais de elefantes de [ROOT.Char.GetCurrentLocation.GetName], ainda traumatizado desde quando meu"
 travel_events.2007.desc_memory_rival: "rival"
 travel_events.2007.desc_memory_nemesis: "nêmesis"
 travel_events.2007.desc_memory_segway: "[crushing_person.GetTitledFirstName] quase fez com que um sentasse em mim"
 travel_events.2007.desc_memory_here: "neste exato local."
 travel_events.2007.desc_memory_not_here: "na [elephant_memory.Var('elephant_location').GetProvince.GetName] [elephant_memory.Var('elephant_location').GetTerrain.GetName]"
 travel_events.2007.desc_default: "As majestosas criaturas nos currais de elefantes em [ROOT.Char.GetCurrentLocation.GetName] são verdadeiramente impressionantes. Eu as observo carregando troncos e participando de todo tipo de exercício físico."
 travel_events.2007.desc_outro: "\n\nEnquanto observo os elefantes desempenhando suas tarefas, ouço dois mahouts discutindo as diferentes maneiras como treinam com as criaturas.\n\nParece um treino e, admito, desperta meu interesse."
 travel_events.2007.a: "Não é páreo para #EMP [ROOT.Char.Custom('ES_ElLa')]#! [ROOT.Char.GetTitleAsNameNoTooltip|U]."
 travel_events.2007.a_success_tt: "Treinamento Eficiente"
 travel_events.2007.a_efficient_training_tt: "O treinamento ocorre esplendidamente"
 travel_events.2007.a_soft_success_tt: "Treinamento Aceitável"
 travel_events.2007.a_alright_training_tt: "O treinamento está bom"
 travel_events.2007.a_failure_tt: "Treinamento Terrível"
 travel_events.2007.a_failed_training_tt: "Você tropeça em seus próprios pés"
 travel_events.2007.b: "Não vou perder meu tempo."
 #Visit an elephant pen, your rival is on site - Attempt to crush your rival?
 travel_events.2008.t: "Dê um Assento"
 travel_events.2008.desc: "Gotas de suor continuam escorrendo pelo meu rosto à medida que o calor da selva me alcança. Ao parar para enxugar a testa, vejo meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elephant_rival'))] [elephant_rival.Custom2('InsultNoun', ROOT.Char)], [elephant_rival.Custom('ES_ElLa')] [elephant_rival.GetTitledFirstName|l], perto dos currais de elefantes de [ROOT.Char.GetCurrentLocation.GetName].\n\nFaz um gesto grosseiro na minha direção e solta uma risada escandalosa, sem dúvida zombando de mim. Cerro a mandíbula.\n\nEntão percebo que [elephant_rival.Custom('ES_ElLa')] [elephant_rival.GetTitledFirstNameNoTooltip|l] está #EMP justo detrás del elefante#! e a fera está em movimento. Consigo chamar a atenção do mahout."
 travel_events.2008.a: "[ROOT.Char.Custom('RandomElephantName')], #EMP sente-se.#!"
 travel_events.2008.a_success_tt: "Esmagamento do Elefante"
 travel_events.2008.a_crushed_tt: "[elephant_rival.GetShortUIName] é esmagado pelo elefante"
 travel_events.2008.a_soft_success_tt: "Semi-Esmagado"
 travel_events.2008.a_wounded_tt: "[elephant_rival.GetShortUIName] sofre ferimentos"
 travel_events.2008.a_failure_tt: "[elephant_rival.GetTitledFirstNameNoTooltip|l] Escapou"
 travel_events.2008.a_scotfree_tt: "[elephant_rival.GetShortUIName] escapa do elefante"
 travel_events.2008.b: "[elephant_rival.GetTitledFirstNameNoTooltip|l], cuidado!"
 #Visit an orchard - Kid falls out of tree
 travel_events.2010.t: "Um Galho Partido"
 travel_events.2010.temperate_summer: "A brisa quente acaricia meu pescoço enquanto percorro os pomares de [ROOT.Char.GetCurrentLocation.GetName]. As árvores se estendem suavemente em direção ao céu, coloridas por uma mistura de novos brotos e frutos em formação."
 travel_events.2010.temperate_winter: "Há um frio no ar, e minha respiração se transforma em pequenas baforadas enquanto percorro os pomares de [ROOT.Char.GetCurrentLocation.GetName]. As árvores parecem estar um pouco encolhidas pelo frio, ansiando por dias mais quentes."
 travel_events.2010.tropical_summer: "O calor é avassalador enquanto passo pelos pomares de [ROOT.Char.GetCurrentLocation.GetName]. Ao meu redor, as árvores estão em plena floração, celebrando a estação."
 travel_events.2010.tropical_winter: "Finalmente é uma época amena para percorrer os pomares de [ROOT.Char.GetCurrentLocation.GetName], e aproveito a oportunidade para fazê-lo. Adormecidas, mas ainda verdes, as árvores aguardam as estações mais quentes."
 travel_events.2010.fallback: "As árvores se estendem até o céu enquanto percorro as fileiras de troncos cuidadosamente posicionados no pomar local em [ROOT.Char.GetCurrentLocation.GetName]. É um bom dia para um passeio."
 travel_events.2010.desc: "De repente, um grito agudo corta o ar. Acelero o passo apenas para encontrar"
 travel_events.2010.entourage: "meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fallen_child'))] [fallen_child.GetFirstName]"
 travel_events.2010.peasant: "[Select_CString( fallen_child.IsFemale, 'uma menina camponesa', 'um menino camponês' )]"
 travel_events.2010.outro: "sob uma árvore, destroçad[fallen_child.Custom('ES_OA')] e soluçando com força.\n\nParece que tentou escalar a árvore, antes de escorregar e cair no chão. Um dos ossos longos está projetando-se em um ângulo estranho."
 travel_events.2010.a: "Essas árvores são um perigo para a saúde!"
 travel_events.2010.a_flavor: "Queime este lugar até o chão!"
 travel_events.2010.a_tt: "Os ferimentos de [fallen_child.GetShortUIName] podem piorar"
 travel_events.2010.a_tt_2: "![ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitledFirstName|l] incendiou seus pomares em [location_county.GetNameNoTier]!"
 travel_events.2010.b: "O que você estava pensando, [fallen_child.GetFirstNameNoTooltip]!"
 travel_events.2010.b_tt: "Traço Adquirido"
 travel_events.2010.c: "Calma, calma."
 travel_events.2010.c_physician: "Vamos dar uma olhada em você, [fallen_child.Custom('GirlBoy')]."
 travel_events.2010.c_physician_tt: "[court_physician.GetShortUIName] trata de [fallen_child.GetShortUIName]"
 travel_events.2010.d: "[fallen_child.GetHerHim|U]s [fallen_child.Custom('GirlBoyPlural')] e seus pertences."
 #Orchard hidden follow-up event
 travel_events.2011.tt_healed: "Feridas Curadas"
 travel_events.2011.tt_healed_desc: "As feridas de [fallen_child.GetShortUIName] sararam"
 travel_events.2011.tt_worsened: "Feridas Pioradas"
 travel_events.2011.tt_worsened_desc: "As feridas de [fallen_child.GetShortUIName] pioraram"
 #Visit a plantation - Fire!
 travel_events.2012.t: "Fogo!"
 travel_events.2012.desc: "Cruzamos terras repletas de agricultura. Nossa próxima parada é a plantação local de [ROOT.Char.GetCurrentLocation.GetName] mas, ao avistar os portões a cerca de cem passos, algo não bate…\n\nInalo o cheiro acre de… fumaça? Fumaça? Fogo! De repente, noto a coluna de fumaça tomando forma sobre a plantação.\n\nA coluna é densa e pesada — grande demais para ser resultado da queima de detritos perdidos por um dos trabalhadores."
 travel_events.2012.a: "[guard_type_character.GetFirstNameNoTooltip], rápido! Pegue aqueles baldes!"
 travel_events.2012.a_unscathed: "Chamas Abafadas"
 travel_events.2012.a_unscathed_desc: "[guard_type_character.GetShortUIName] abafa o fogo"
 travel_events.2012.a_scarred: "Abafado, Mas Marcado"
 travel_events.2012.a_scarred_desc: "[guard_type_character.GetShortUIName] abafa o fogo, mas fica marcado"
 travel_events.2012.a_death: "Abafado, Mas Morto"
 travel_events.2012.a_death_desc: "[guard_type_character.GetShortUIName] abafa o fogo, mas morre no processo"
 travel_events.2012.b: "Vamos evacuar as pessoas das casas de trabalho!"
 travel_events.2012.b_unscathed: "Ilesas"
 travel_events.2012.b_unscathed_desc: "Você resgata os trabalhadores ilesos"
 travel_events.2012.b_scarred: "Marcados"
 travel_events.2012.b_scarred_desc: "Você resgata os trabalhadores, mas fica marcado"
 travel_events.2012.b_tt: "A opinião de sua comitiva sobre você aumenta significativamente"
 travel_events.2012.c: "#EMP Bem#!, então, não é uma oportunidade..."
 travel_events.2012.c_secret: "Pilhagem Secreta"
 travel_events.2012.c_secret_desc: "Sua pilhagem permaneceu em segredo"
 travel_events.2012.c_revealed: "Pilhagem Descoberta"
 travel_events.2012.c_revealed_desc: "Sua pilhagem foi descoberta por [county_liege.GetShortUIName]"
 travel_events.2012.c_tt: "Os membros de sua comitiva perdem muito da opinião sobre você"
 travel_events.2012.d: "Nunca estivemos aqui."
 travel_events.2012.d_flavor: "A comitiva se afasta silenciosamente."
 travel_events.2012.d_tt: "Os membros de sua comitiva perdem opinião sobre você"
 #Visit a hillfort - Train to gain military skillz
 travel_events.2013.t: "Conhecimento Fortificado"
 travel_events.2013.intro: "A alta altitude e o ar fresco de [ROOT.Char.GetCurrentLocation.GetName] têm uma qualidade muito revigorante enquanto percorremos o forte local."
 travel_events.2013.martial: "\n\nObservo os soldados treinando abaixo com um olhar atento. Suas táticas não são completamente estranhas para mim, já que sou treinado nas artes marciais."
 travel_events.2013.default: "\n\nOs soldados no vale abaixo parecem estar praticando algum tipo raro de técnica de treinamento que eu nunca vi antes. Me aproximo, incapaz de conter minha curiosidade."
 travel_events.2013.outro: "\n\nAo fazer isso, sou abordado pelo capitão local, [Select_CString( local_captain.IsFemale, 'la capitana', 'el capitán')]: \"Gostaria de participar, [ROOT.Char.Custom('FormOfAddressForLiege')]?\"."
 travel_events.2013.rough_terrain: "torna-se [Select_CString( ROOT.Char.IsFemale, 'uma especialista', 'um especialista')] em terreno acidentado"
 travel_events.2013.reckless: "torna-se imprudente[ROOT.Char.Custom('ES_OA')]"
 travel_events.2013.a: "Estou sempre pronto para um desafio![ROOT.Char.Custom('ES_OA')] para um desafio!"
 travel_events.2013.a_success.tt: "Traço Adquirido"
 travel_events.2013.a_failure.tt: "Treinamento Fracassado"
 travel_events.2013.a_rough_terrain: "Você se torna [Select_CString( ROOT.Char.IsFemale, 'uma especialista', 'um especialista')] no terreno acidentado"
 travel_events.2013.a_reckless: "Você se torna imprudente[ROOT.Char.Custom('ES_OA')]"
 travel_events.2013.a_failed: "O treinamento falha"
 travel_events.2013.b: "[entourage_heir.GetFirstNameNoTooltip], junte-se a est[local_captain.Custom('ES_EA')] [local_captain.GetWomanMan]."
 travel_events.2013.b_rough_terrain: "[entourage_heir.GetShortUIName] $travel_events.2013.rough_terrain$"
 travel_events.2013.b_reckless: "[entourage_heir.GetShortUIName] $travel_events.2013.reckless$"
 travel_events.2013.c: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('guard_type_character'))] certamente se beneficiaria desse regime de treinamento."
 travel_events.2013.c_rough_terrain: "[guard_type_character.GetShortUIName] $travel_events.2013.rough_terrain$"
 travel_events.2013.c_reckless: "[guard_type_character.GetShortUIName] $travel_events.2013.reckless$"
 travel_events.2013.d: "Na verdade, ficarei para apreciar a vista."
 travel_events.2013.e: "Infelizmente, estamos com pressa."
 #Visit a logging camp - Burn off some stress chopping wood
 travel_events.2014.t: "Taque, Taque"
 travel_events.2014.desc: "O enorme bloco de corte no meio do acampamento madeireiro de [ROOT.Char.GetCurrentLocation.GetName] tem sido muito usado. Parece que sempre esteve ali, antes mesmo de o homem caminhar sobre esta terra.\n\nAo meu redor, os trabalhadores labutam, resplandecentes de suor e, embora de origem humilde, parecem livres do peso do mundo.\n\nFixo os olhos no machado fincado no enorme toco. Meus ombros tensos, sobrecarregados de estresse, imploram por uma oportunidade de alívio."
 travel_events.2014.a: "#EMP Urra!#!"
 travel_events.2014.a_flavor: "Tome #EMP essa#!, estresse!"
 travel_events.2014.a_stress_tt: "Estresse Diminuído"
 travel_events.2014.a_great_stress_desc: "Você reduz significativamente seu estresse"
 travel_events.2014.a_stress_desc: "Você reduz seu estresse"
 travel_events.2014.a_injured_tt: "Lesão Sofrida"
 travel_events.2014.a_injured_desc: "Você se machuca acidentalmente"
 travel_events.2014.b: "… Não, trabalho manual é indigno de mim."
 travel_events.2014.b_flavor: "Você abaixa seu machado."
 #Visit a peat quarry - Try not to fall asleep
 travel_events.2015.t: "Turfa, Conte-me Mais..."
 travel_events.2015.desc: "[quarry_guide.Custom('ES_ElLa')|U] [quarry_guide.GetTitledFirstName|U] está agitad[quarry_guide.Custom('ES_OA')] com alegria infantil enquanto me guia na visita à pedreira de turfa de [ROOT.Char.GetCurrentLocation.GetName].\n\nOlho o campo devastado, todo marrom e verde acinzentado.\nMinhas pálpebras pesam. Ultimamente, o sono tem me evitado. Lentamente elas se fecham…\n\nDe repente, acordo sobressaltad[ROOT.Char.Custom('ES_OA')], com a mão de [quarry_guide.GetFirstNameNoTooltip] na minha manga.\n... estaba eu #EMP entediando#! você?"
 travel_events.2015.a: "Eu estava apenas absorvendo tudo!"
 travel_events.2015.a_convinced_tt: "Convencido"
 travel_events.2015.a_convinced_desc: "Você consegue convencer [quarry_guide.GetShortUIName]"
 travel_events.2015.a_insulted_tt: "Insultado"
 travel_events.2015.a_insulted_desc: "[quarry_guide.GetShortUIName] está insultad[quarry_guide.Custom('ES_OA')]"
 travel_events.2015.b: "Olhe para esta bolsa de moedas..."
 travel_events.2015.b_flavor: "Você suborna [quarry_guide.GetShortUIName]"
 #Visit a hill farm - Bull rush!
 travel_events.2016.t: "Valentão, Para Você?"
 travel_events.2016.desc: "Os suaves mugidos e o cheiro de esterco não são tudo o que as pastagens das encostas de [ROOT.Char.GetCurrentLocation.GetName] oferecem ao viajante. Também há camponeses gritando, bramidos estrondosos e um touro fugido bem na estrada à nossa frente.\n\nO colosso se lança de um lado para o outro em grande aflição, até fixar seus olhos em uma vítima: [entourage_member.GetFirstName], montado em seu corcel em pânico.\n\nHá um portão aberto para manter a fera do outro lado; só falta alguém ter coragem suficiente para atraí-la!"
 travel_events.2016.a: "Ei, aqui, touro [bull_loc.Custom2('InsultAdjective', ROOT.Char)]!"
 travel_events.2016.a_captured.tt: "Capturado"
 travel_events.2016.a_captured.desc: "Você captura o touro com sucesso"
 travel_events.2016.a_wounded.tt: "$travel_events.2001.c_failure.tt$"
 travel_events.2016.a_wounded.desc: "O touro é capturado, mas você fica ferido"
 travel_events.2016.b: "[guard_type_character.GetFirstNameNoTooltip], #EMP faça algo!#!"
 travel_events.2016.b_putdown.tt: "Abatido"
 travel_events.2016.b_putdown.desc: "[guard_type_character.GetShortUIName] abate o touro"
 travel_events.2016.b_wounded.desc: "[guard_type_character.GetShortUIName] é atingido"
 travel_events.2016.c: "É melhor não arriscar."
 travel_events.2016.c_escaped.tt: "Escapou"
 travel_events.2016.c_escaped.desc: "[entourage_member.GetShortUIName] escapa por pouco do ataque do touro"
 travel_events.2016.c_wounded.desc: "[entourage_member.GetShortUIName] fica ferid[entourage_member.Custom('ES_OA')]"
 #Visit a 'haunted' mansion (farm estate) - Enter at your own peril
 travel_events.haunted_manor.t: "Mansão 'Assombrada'"
 travel_events.2017.t: "$travel_events.haunted_manor.t$"
 travel_events.2017.desc: "Enquanto caminhamos pelos corredores da mansão em [ROOT.Char.GetCurrentLocation.GetName], [estate_character.Custom('ES_ElLa')] proprietári[estate_character.Custom('ES_OA')], [estate_character.Custom('ES_ElLa')] [estate_character.GetTitledFirstName|l], ele(a) se vira para mim. \"Dizem que esta parte da propriedade é assombrada, [ROOT.Char.Custom('FormOfAddressForLiege')]\".\n\nOlho ao redor, hesitante. O corredor está um pouco mais escuro do que eu esperava, e as velas tremulam em seus suportes.\n\nQuando paramos no antigo salão de jantar, [estate_character.GetFirstNameNoTooltip] se vira novamente para mim, desta vez com um sorriso. \"Gostaria de fazer um tour pela mansão #EMP encantada#!?\"."
 travel_events.2017.a: "Ah, #EMP intrigante!#!"
 travel_events.2017.a_tt: "Você entra na mansão"
 travel_events.2017.b: "Isso não está acontecendo."
 travel_events.2017.b_tt: "Você sai da mansão"
 #Go with the pack or explore on your own?
 travel_events.2018.t: "$travel_events.haunted_manor.t$: um Caminho a Seguir"
 travel_events.2018.desc: "Caminamos por um corredor escuro e deserto. Os poucos móveis com que nos deparamos estão cobertos por lençóis, o que aumenta a atmosfera fantasmagórica.\n\nFoi aquilo… um… rato? Apresso-me para alcançar meu séquito.\n\n[estate_character.Custom('ES_ElLa')|U] [estate_character.GetTitledFirstName|l] se vira para nós, apertando os olhos enquanto murmura as palavras: "… e por aqui, meus senhores e damas"."
 travel_events.2018.a: "É melhor seguir a rota."
 travel_events.2018.a_tt: "Você fica com seu séquito"
 travel_events.2018.b: "Agora, o que é esse recanto aqui..."
 travel_events.2018.b_tt: "Você pode encontrar algo interessante"
 travel_events.2018.c: "Estou fora daqui!"
 #Oh look, someone is trying to murder you
 travel_events.2019.t: "$travel_events.haunted_manor.t$: Traição na Mansão"
 travel_events.2019.desc: "Eu sigo pelo caminho da esquerda, entrando por um arco baixo. À minha frente há uma portinhola, ligeiramente entreaberta.\n\nA escuridão compacta é quebrada pelas luzes tremeluzentes que vêm de baixo. Desço cuidadosamente a escada só para encontrar... #EMP um indivíduo encapuzado com uma adaga?!#!\n\nExamino desesperadamente o que me cerca enquanto o assassino se aproxima rapidamente de mim."
 travel_events.2019.a: "Olhe! Atrás de você!"
 travel_events.2019.a_tt: "Tente empurrar o armário sobre o assassino"
 travel_events.2019.a_retaliate.tt: "Retaliação"
 travel_events.2019.a_retaliate.desc: "O armário esmaga o crânio do assassino"
 travel_events.2019.a_retaliate.effect_tt: "O assassino morre"
 travel_events.2019.a_death.desc: "Você morre"
 travel_events.2019.b: "Eu posso encher seus bolsos com moedas!"
 travel_events.2019.b_tt: "Tente subornar o assassino"
 travel_events.2019.b_paid_off.tt: "Subornado"
 travel_events.2019.b_paid_off.desc: "O assassino é subornado e escapa"
 travel_events.2019.a_paid_off.effect_tt: "O assassino escapa"
 travel_events.2019.c: "En garde, canalha!"
 travel_events.2019.c_tt: "Enfrente o assassino"
 travel_events.2019.c_retaliate.desc: "Você mata o assassino"
 travel_events.2019.expose_effect_tt: "Agente Exposto"
 #You found a very weird mendicant character
 travel_events.2020.t: "$travel_events.haunted_manor.t$: Qual Bruxa?"
 travel_events.2020.desc_witch: "De repente, sinto vontade de explorar o estreito corredor à minha direita. Enquanto caminho pelo corredor, o brilho quente de uma porta aberta me recebe.\n\nO quarto está repleto de todo tipo de utensílios. Reconheço certas ervas, alambiques, cadinhos, frascos, panelas, chaleiras... É uma gloriosa representação da alquimia.\n\nUm[mendicant_character.Custom('ES_XA')] [mendicant_character.GetWomanMan] sorridente me recebe: "Olá, [ROOT.Char.Custom('SisterBrother')]. Meu nome é [mendicant_character.GetFirstNameNoTooltip] e faz muito tempo que alguém não aparece à minha porta. Gostaria de uma bebida?". Ele gesticula para a chaleira da qual está cuidando no momento."
 travel_events.2020.desc: "Afasto-me do grupo e atravesso um corredor ainda mais escuro até topar com uma porta. Vejo luz brilhando pelas frestas.\n\nEmpurro suavemente a porta para abri-la e sou recebido por um leve sibilar. No meio da sala abarrotada, cheia de livros, garrafas e todo tipo de utensílios de química, encontra-se um[mendicant_character.Custom('ES_XA')] [mendicant_character.GetWomanMan].\n\nUm cheiro nauseabundo sai do caldeirão de que ela cuida. Sem virar a cabeça, diz: "Querem um pouco? Geralmente faz maravilhas.""
 travel_events.2020.a: "Eu não me importaria com um pouco desse chá."
 travel_events.2020.b: "Você poderia ser útil na minha corte, sabe."
 travel_events.2020.c: "Um gostinho de você agora; chá depois."
 travel_events.2020.d: "Um... por onde é o passeio?"
 #You found a shiny bauble
 travel_events.2021.t: "$travel_events.haunted_manor.t$: Algo Emprestado"
 travel_events.2021.desc_intro: "Entro por uma porta estreita e sou recebido por uma forma de luminosidade obscura vinda das janelas cobertas. A sala parece ter sido um antigo escritório."
 travel_events.2021.desc_illustrious: "\n\nDe imediato, minha atenção se volta para um/a [new_trinket.GetName] imaculado/a, cuidadosamente colocado/a sobre um pedestal no meio da sala. Aproximo-me com cautela.\n\nÉ de fato uma obra de arte, cada detalhe é mais espetacular que o anterior. Admiro sua beleza por um momento."
 travel_events.2021.desc_famed: "\n\nDou uma olhada pela sala e não consigo evitar notar um(a) [new_trinket.GetName] de artesanato magistral. Ele está sobre o que parece ser um pedestal, chamando minha atenção.\n\nEste objeto realmente não deveria estar exposto assim, um alvo perfeito para saqueadores e ladrões. Aproximo-me com cuidado."
 travel_events.2021.desc_masterwork: "\n\nBem no centro da sala, sobre um pedestal, está o/a [new_trinket.GetName]. Aproximo-me com cautela.\n\nQuem poderia ter sido o dono disto? Está em um estado notavelmente bom, considerando o local onde foi guardado."
 travel_events.2021.desc_common: "\n\nQuando meus olhos se acostumam ao novo ambiente, noto um item interessante deitado sobre uma mesa ao lado da janela.\n\n[new_trinket.GetName] pode não parecer grande coisa neste mundo, mas reconheço o trabalho artesanal que foi empregado nele. É uma peça sólida."
 travel_events.2021.desc_bad: "\n\nExamino cuidadosamente o quarto, agradecido pela luz adicional que a janela fornece. Quando estou prestes a ir embora, percebo algo em um monte de entulho no canto.\n\n É isso… #EMP uma coisa?#! Qual é o propósito disso? Hesito por um momento."
 travel_events.2021.a: "Isso é uma excelente adição à minha coleção."
 travel_events.2021.a_bad: "Tenho que fazer isso…?"
 travel_events.2021.b: "É melhor eu não."
 travel_events.2021.b_tt: "Você ignora o [new_trinket.GetName]"
 #Resolution: You were joshed / You found a bauble / You survived the murder attempt / You came back from the mendicant
 travel_events.2022.t: "$travel_events.haunted_manor.t$: Sã e Salva"
 travel_events.2022.desc_pack: "Enquanto passamos por um arco para a próxima sala, uma grande figura se lança de repente sobre nós. Todo o grupo salta e grita.\n\nQuando olho para cima, a figura escura parece ser um esqueleto, envolto em um lençol escuro. Frunzo a testa enquanto [estate_character.GetTitledFirstName|l] ri.\n\n\"Vocês deviam ter visto a cara que fizeram, meus senhores e minhas damas!\". Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('entourage_member_one'))], [entourage_member_one.Custom('ES_ElLa')] [entourage_member_one.GetTitledFirstName|l], está visivelmente agitado[entourage_member.Custom('ES_OA')] e se aproxima [estate_character.Custom('ES_AlAla')] [estate_character.GetTitledFirstNameNoTooltip|l] com a mão erguida."
 travel_events.2022.desc_murder: "Atordoado por ter escapado de um assassino, ergo-me com espanto. #EMP O que acabou de acontecer?#!\n\nTremendo, torno a subir pela escada e volto pelo corredor em direção à sala de jantar. Logo o estresse dá lugar à ira. #EMP [estate_character.Custom('ES_ElLa')] [estate_character.GetTitledFirstName|l] sabia de tudo isso?#!\n\nQuando finalmente chego ao grupo reunido, mal noto o esqueleto envolto em mortalha pendurado no arco.\n\nCom os olhos cheios de fúria fervente, encaro [estate_character.GetFirstNameNoTooltip], que me olha com confusão."
 travel_events.2022.desc_mendicant: "Depois de deixar os aposentos [mendicant_character.Custom('ES_DelDela')] do mendicante, sigo facilmente o barulho de volta à sala principal.\n\nO grupo parece agitado, mas aliviado, e vejo uma sombra escura pendurada no arco acima deles. [estate_character.Custom('ES_ElLa')|U] [estate_character.GetTitledFirstName|l] se vira rapidamente e se assusta um pouco ao me ver.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Vocês tinham saído sozinhos? Isso não é seguro, sabe?", diz estreitando os olhos."
 travel_events.2022.desc_mendicant_recruit: "Meu nov[mendicant_character.Custom('ES_OA')] companheiro(a), [mendicant_character.GetTitledFirstName|l], e eu saímos de seus aposentos e voltamos com o grupo para a sala principal.\n\n[mendicant_character.GetFirstNameNoTooltip] bufa ao notar uma figura escura pendurada no arco pelo qual o grupo deve ter passado, fazendo com que noss[estate_character.Custom('ES_OA')] guia, [estate_character.Custom('ES_ElLa')] [estate_character.GetTitledFirstName|l], se vire.\n\nSeus olhos se arregalam quando ele(a) nota [mendicant_character.GetFirstNameNoTooltip]. Quem é #EMP est[mendicant_character.Custom('ES_EA')]?!#! Meu [ROOT.Char.GetLadyLord], não podeis sair correndo assim! Não é seguro!"
 travel_events.2022.desc_bauble: "Com minha nova posse no bolso, caminho pelas salas escuras e estreitas. Eventualmente, encontro o resto do grupo na sala de jantar no fim da mansão.\n\nUma grande figura escura está pendurada em um dos arcos da sala, e não consigo deixar de me perguntar que propósito isso serviria. Além disso, os outros parecem um pouco agitados...?\n\n[estate_character.Custom('ES_ElLa')|U] [estate_character.GetTitledFirstName|l] se assusta[estate_character.Custom('ES_OA')] e se vira na minha direção. "[ROOT.Char.Custom('FormOfAddressForLiege')|U]! O que vocês andaram fazendo? Esses corredores escuros não são seguros para se estar sozinho!"."
 travel_events.2022.desc_joshed: "Tateio na escuridão, fazendo o possível para ignorar o leve pânico que as trevas despertam em mim. Apressome a passar pela próxima porta, tentando encontrar o grupo…\n\ne #EMP de repente#! uma grande forma escura desce zunindo por cima de mim. Solto um grito de susto.\n\nQuando recobro os sentidos, encontro o grupo parado na sala em que acabei de entrar. [estate_character.Custom('ES_AlAla')|U] [estate_character.GetTitledFirstName|l] mal consegue respirar de tanto rir e aponta para mim. "M… minha [ROOT.Char.GetLadyLord], #EMP *resoplido*#! vocês… se… vocês se divertiram?"."
 travel_events.2022.a: "Acabei de sobreviver a uma tentativa de assassinato, orquestrada por #EMP você!#!"
 travel_events.2022.a_slain.tt: "Culpado Morto"
 travel_events.2022.a_slain.desc: "Você mata [estate_character.GetShortUIName]"
 travel_events.2022.a_escape.tt: "Culpado Escapou"
 travel_events.2022.a_escape.desc: "[estate_character.GetShortUIName] te machuca e escapa"
 travel_events.2022.b: "Guarda! Essa pessoa está envolvida em um plano para me matar!"
 travel_events.2022.b_slain.desc: "[estate_character.GetShortUIName] é morto por [travel_leader.GetShortUIName]"
 travel_events.2022.b_escape.desc: "[estate_character.GetShortUIName] fere [travel_leader.GetShortUIName] e escapa"
 travel_events.2022.c: "Você pode querer procurar por bruxas na casa."
 travel_events.2022.d: "Na verdade, encontrei [Select_CString( mendicant_character.IsFemale, 'esta bruxa', 'este bruxo' )], [mendicant_character.GetFirstNameNoTooltip]."
 travel_events.2022.e: "Parece uma casa perfeitamente comum para mim."
 travel_events.2022.f_pack: "Não devo interferir."
 travel_events.2022.f: "Cavalheiro trapaceiro!"
 travel_events.2022.g_pack: "[entourage_member_one.GetFirstNameNoTooltip], não faça isso."
 travel_events.2022.g: "Oh. Haha, sim, com certeza!"
 #You ratted out the witch; have a curse(?) dream
 travel_events.2024.t: "$travel_events.haunted_manor.t$: Uma Praga sobre Você"
 travel_events.2024.desc: "[mendicant_character.GetFirstName] me encara fixamente. Continuo sendo encarado. Tento escapar correndo pelos corredores — mas [mendicant_character.GetSheHe] me segue. Os olhos dele estão por toda parte.\n\n“Eu... sei...”, sussurra. Quando me viro para correr, tropeço e caio em um poço tão escuro que nem mil velas poderiam iluminá-lo. Continuo caindo, caindo...\n\nDe repente, acordo sobressaltad[ROOT.Char.Custom('ES_OA')], encharcad[ROOT.Char.Custom('ES_OA')] de suor."
 travel_events.2024.a: "Foi tudo... um pesadelo?"
 #Visit your own farm estate - Tax or don't tax your hospitable subject
 travel_events.2025.t: "O Anfitrião Gracioso"
 travel_events.2025.desc: "Chegamos um pouco antes do anoitecer às propriedades rurais de [ROOT.Char.GetCurrentLocation.GetName], [estate_owner.GetFirstName] faz o papel de gentil [Select_CString( estate_owner.IsFemale, 'anfitriã', 'anfitrião' )] atendendo a todas as nossas necessidades.\n\nMais tarde naquela noite, é realizado um banquete em minha homenagem e seu [ROOT.Char.Custom('RegionalDrink')] continua fluindo, metaforicamente, até começarmos a ver sinais da alvorada no céu.\n\nNa manhã seguinte, sou abordado por [estate_owner.GetFirstNameNoTooltip]: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], gostamos muito de recebê-lo, e esta celebração nos aquecerá por muitas noites adiante», [estate_owner.GetSheHe] sorri e acena com a cabeça."
 travel_events.2025.a: ""… seu estoque de [ROOT.Char.Custom('RegionalDrink')] corresponde à sua taxa de imposto?""
 travel_events.2025.b: ""Você tem sido [Select_CString( estate_owner.IsFemale, 'uma anfitriã', 'um anfitrião' )] muito gentil, [estate_owner.GetFirstNameNoTooltip].""
 travel_events.2025.c: "Em troca, deixe-me compartilhar algumas ideias de melhorias."
 #Visit someone else's farm estate - Pay or don't pay for the hospitality
 travel_events.2026.t: "Dar Gorjeta ao Anfitrião"
 travel_events.2026.desc_intro: "A tarde avança rapidamente para o anoitecer à medida que nos adentramos nas propriedades agrícolas locais de [ROOT.Char.GetCurrentLocation.GetName]. [estate_owner.Custom('ES_ElLa')|U] proprietári[estate_owner.Custom('ES_OA')] da propriedade, [estate_owner.GetFirstName], nos saúda cordialmente e promete nos oferecer um suntuoso banquete.\n\nAssim que o banquete começa, jantamos"
 travel_events.2026.desc_carnivore: "uma verdadeira miscelânea de animais assados, ensopados, sopas, pães e coisas do tipo."
 travel_events.2026.desc_vegetarians: "uma maravilhosa variedade de pratos à base de vegetais, alguns dos quais nunca ouvi falar antes."
 travel_events.2026.desc_outro: "\n\nPela manhã, [estate_owner.GetFirstNameNoTooltip] se aproxima de mim enquanto desfruto do café da manhã. [ROOT.Char.Custom('FormOfAddressForLiege')|U], fazer uma festa extravagante como a de ontem pode ser #EMP caro…#!."
 travel_events.2026.a: "#EMP Você#! deveria me #EMP pagar#! pelo prestígio que trouxe à sua #EMP fazenda#!."
 travel_events.2026.b: "Deixe-me compensá-lo."
 travel_events.2026.c: "Talvez [county_liege.Custom('ES_ElLa')] [county_liege.GetTitledFirstNameNoTooltip|l] e eu possamos chegar a um acordo."
 travel_events.2026.d: "Como você #EMP ousa#!!"
 #Visit your own quarry - Encounter hungry workers
 travel_events.2027.t: "Desavença na Pedreira"
 travel_events.2027.desc: "Ao entrar na pedreira local de [ROOT.Char.GetCurrentLocation.GetName], vejo várias crianças magrelas e sujas ajudando seus pais famintos com o trabalho pesado. A comida parece escassa nesta região.\n\nUm pouco mais adiante, na área de carregamento, [foreman_character.Custom('ES_ElLa')] capataz da pedreira, [foreman_character.GetFirstName], está discutindo com [peasant_leader.GetFirstName], que parece falar pelos trabalhadores. "Isto é #EMP inaceptable#!!", grita [peasant_leader.GetFirstNameNoTooltip].\n\n"Não podemos comprar comida suficiente e temos ido para a cama com fome há meses. Nossos filhos estão morrendo de fome e nossas forças estão se esvaindo ao fazer um trabalho tão pesado. Tudo de que precisaríamos era um aumento de #EMP mínimo#!...". Ele se cala ao notar minha presença."
 travel_events.2027.a: "Trabalhadores seguros e bem alimentados são mais eficazes."
 travel_events.2027.b: "A fome mantém a motivação em alta."
 travel_events.2027.c: "Pegue a fila, #EMP camponês.#!"
 travel_events.2027.d: "Por que não janta com o capataz?"
 #Visit someone else's quarry - Encounter an architect
 travel_events.2028.t: "Digestão do Arquiteto"
 travel_events.2028.desc: "[budding_architect.GetFirstName] está absorto[budding_architect.Custom('ES_OA')] em seus pensamentos quando nosso séquito entra nas pedreiras de [ROOT.Char.GetCurrentLocation.GetName]. [budding_architect.GetSheHe] está inclinado[budding_architect.Custom('ES_OA')] sobre uma grande mesa de madeira toscamente entalhada, concentrado[budding_architect.Custom('ES_OA')] em desenhar algo em um pergaminho.\n\nMe inclino mais sobre seu ombro, chamando sua atenção. [ROOT.Char.Custom('FormOfAddressForLiege')|U]! Não tinha percebido que estava aí, minhas mais sinceras desculpas!\n\nPergunto o que ele está fazendo e [budding_architect.GetFirstNameNoTooltip] responde:\nOh, estou esboçando minhas ideias sobre construção e fundação. Sou [Select_CString( budding_architect.IsFemale, 'toda uma arquiteta', 'todo um arquiteto' )], vejam só, ele sorri timidamente."
 travel_events.2028.a_architect: "Isso está bem legal. Vou pegar um!"
 travel_events.2028.a: "Arquiteto, você diz? Vou pegar um dos desenhos!"
 holding_blueprint: "Desenho do Arquiteto"
 holding_blueprint_desc: "Um pergaminho contendo um desenho com conhecimento sobre como construir eficientemente certos edifícios."
 travel_events.2028.b: "Suas habilidades seriam úteis na minha corte."
 travel_events.2028.b.tt: "[budding_architect.GetShortUIName] trabalhará por um salário menor por 20 anos"
 trainee_salary_mod: "Salário para Inexperientes"
 travel_events.2028.c: "Isso é... legal... Continue com o bom trabalho."
 #Visit a cereal field - Encounter a heathen
 travel_events.2029.t: "Despertar"
 travel_events.2029.desc: "Anoitece e um[crop_circler.Custom('ES_XA')] [crop_circler.GetWomanMan] está trabalhando arduamente quando chegamos aos campos de cereais ao sul de [ROOT.Char.GetCurrentLocation.GetName]. [crop_circler.GetSheHe|U] parece estar achatando as plantações a um ritmo acelerado, usando um grande pedaço plano de madeira e pedras pesadas.\n\nFranzo a testa ao ver [crop_circler.GetHerHim] desempenhando seu trabalho e lhe pergunto o que exatamente está fazendo.\n\n[crop_circler.GetSheHe|U] se contorce, então começa uma longa diatribe sobre como todos nós precisamos despertar e encontrar nossos verdadeiros mestres, em vez de nos escondermos atrás dos falsos ensinamentos da fé [crop_circler.GetFaith.GetReligion.GetAdjectiveNoTooltip]. Dou alguns passos para trás, surpreso."
 travel_events.2029.a: "Pare com isso, herege!"
 travel_events.2029.b: "Como ousa profanar a [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip|l]!"
 travel_events.2029.c: "Me conte mais sobre esses #EMP verdadeiros mestres#!."
 travel_events.2029.d: "Umm... tudo bem."
 #Cereal field potential follow-up
 travel_events.2030.t: "Confissões de um Não Crente"
 travel_events.2030.desc: "De manhã, [entourage_chaplain.Custom('ES_ElLa')] [entourage_chaplain.GetTitledFirstName|l] aproxima-se de mim, retorcendo as mãos. [ROOT.Char.Custom('FormOfAddressForLiege')|U] e [entourage_chaplain.Custom2('RelationToMe', ROOT.Char)], tenho de fazer-vos a confissão mais horrível.\n\nSuspira fundo. Embora eu não abrace... nenhum ensinamento... decididamente louco como o daquele [crop_circler.Custom('GetLassLad')] da noite passada, tive as minhas... #EMP dúvidas#!. [entourage_chaplain.GetFirstNameNoTooltip] olha para mim atentamente, buscando simpatia para o seu apuro.\n\nA verdade é que não tenho certeza[entourage_chaplain.Custom('ES_OA')] de que [entourage_chaplain.GetFaith.HighGodName] exista de fato e zele por nós. Termina com uma pausa dramática."
 travel_events.2030.a: "Está tudo bem."
 travel_events.2030.b: "Isso é #EMP inaceitável#!!"
 #Visit another cereal field - Encounter a gardener
 travel_events.2031.t: "O Ventre da Terra"
 travel_events.2031.desc: "Os campos de [ROOT.Char.GetCurrentLocation.GetName] são um espetáculo para ser admirado. Todas as plantações em flor; todas as folhas verdes; todos os caules viçosos.\n\nRapidamente localizo a fonte da verdura e vejo [Select_CString( gardener_character.IsFemale, 'uma mulher', 'um homem' )] de pé em um campo, aparentemente fazendo uma palestra para um grupo de ouvintes. "Meu nome é [gardener_character.Custom('MistressMaster')|l] [gardener_character.GetFirstName]."\n\nEle me nota ao longe e se volta na minha direção. "Meu conhecimento de jardinagem é vasto, sim, incomparavelmente vasto — então fiquem um pouco e escutem.""
 travel_events.2031.a: ""Considere-me intrigado[ROOT.Char.Custom('ES_OA')]"."
 travel_events.2031.a_down_to_earth.t: "Pés na Terra"
 travel_events.2031.b: ""[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitleAsNameNoTooltip|l]? Fazendo #EMP jardinería#!?"."
 #Visit a ramparts/forest fort - Encounter a herbalist/physician
 travel_events.2032.t: "Uma Erva Para Você..."
 travel_events.2032.desc: "A impressionante estrutura defensiva no topo de [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l] de [ROOT.Char.GetCurrentLocation.GetName] é algo de se ver. Enquanto caminho pelo perímetro externo, avisto ao longe uma pessoa peculiar.\n\nParece que murmura consigo mesma, enquanto para para se agachar e recolher o que parecem ser ervas de vários tipos. É quase como se estivesse falando com... as #EMP ervas#!?\n\nAproximo-me com cuidado e [herbalist_character.GetSheHe] levanta o olhar com várias ervas na palma da mão. Percebo uma faísca de curiosidade em seus olhos, sugerindo uma pergunta não dita."
 travel_events.2032.a: "Então, o que essa erva faz?"
 travel_events.2032.a_poisonous.tt: "Você adquire algumas ervas venenosas que pode aplicar em seu próximo [scheme|lE] de [GetScheme('murder').GetTypeName|l]"
 travel_events.2032.a_poisonous.t: "Ervas Adquiridas"
 travel_events.2032.a_poisonous.desc: "Você encontrou algumas ervas venenosas"
 travel_events.2032.a_learning.tt: "Habilidade Melhorada"
 travel_events.2032.b: ""Gostaria de se tornar meu médic[herbalist_character.Custom('ES_OA')] particular?"."
 travel_events.2032.c: "Isso é um desperdício do meu tempo."
 #Visit some hunting grounds - If you have a prisoner with you; manhunt!
 travel_events.2033.t: "Prisioneiro Escapou!"
 travel_events.2033.desc_intro: "Mal acabamos de entrar nos terrenos de caça de [ROOT.Char.GetCurrentLocation.GetName], meus guardas chegam correndo até mim, ofegantes e levemente apavorados. "[ROOT.Char.Custom('FormOfAddressForLiege')|U]! [prisoner.Custom('ES_ElLa')|U] [prisoner.GetTitledFirstName|l], esse ser [prisoner.Custom2('InsultAdjective', ROOT.Char)], se soltou de nossas algemas!".\n\nDirijo o olhar imediatamente à orla da floresta em busca de sinais de movimento, mas não encontro nenhum."
 travel_events.2033.desc_manhunt: "Isso só pode significar uma coisa. #EMP Caça ao Homem!#!\n\n"
 travel_events.2033.desc_manhunt_previous: "Essa faísca de alegria ao recordar minha última caçada humana me deixa nervoso[ROOT.Char.Custom('ES_OA')]. A emoção. O perigo. Estou ansioso."
 travel_events.2033.desc_manhunt_first: "Há muito tempo quero experimentar minha mão na presa mais elusiva e perigosa da natureza. Um sorriso brinca no canto da minha boca."
 travel_events.2033.desc: "Ligeiramente atordoado[ROOT.Char.Custom('ES_OA')] com a fuga, reflito cuidadosamente sobre a situação.\n\nNão deveríamos levar um prisioneiro fugitivo à justiça?"
 travel_events.2033.a_manhunt: "#EMP Empolgante!#!"
 travel_events.2033.a_cannibal: "Ah sim, prisioneiros; a outra carne branca."
 travel_events.2033.a_manhunt_tt: "Um alvo que escapa de uma caçada ao homem pode voltar para se vingar"
 travel_events.2033.a_manhunt.tt: "Caçada ao Homem Cumprida"
 travel_events.2033.a_manhunt.desc: "[prisoner.GetShortUIName] é caçado e morto"
 travel_events.2033.a_caught_trophy.desc: "[prisoner.GetShortUIName] é caçado e transformado em um troféu"
 travel_events.2033.a_caught_eaten.tt: "Prisioneiro Comido"
 travel_events.2033.a_caught_eaten.desc: "[prisoner.GetShortUIName] é capturado e comido"
 travel_events.2033.a_escaped.tt: "Prisioneiro Escapou"
 travel_events.2033.a_escaped.desc: "[prisoner.GetShortUIName] escapa do seu alcance"
 travel_events.2033.a_killed.desc: "[prisoner.GetShortUIName] te mata e escapa"
 travel_events.2033.a_accident.desc: "Você tropeça e quebra o seu pescoço"
 manhunt_skull_cup: "Taça de Caveira de Caçada ao Homem"
 manhunt_skull_cup_desc: "Este cálice de crânio é um troféu da bem-sucedida caçada a [new_skull_cup.MakeScope.Var('skull_origin').Char.GetUIName] em [ROOT.Char.GetCurrentLocation.GetName] [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l]."
 manhunt_skull_cup_desc_fallback: "Esta taça de caveira é um troféu da bem-sucedida caçada ao homem de uma presa humana."
 travel_events.2033.b: "Acho que teremos que capturar[prisoner.GetHerHim]?"
 travel_events.2033.b_caught.tt: "Prisioneiro Capturado"
 travel_events.2033.b_caught.desc: "[prisoner.GetShortUIName] é capturado"
 travel_events.2033.b_caught.effect: "[prisoner.GetShortUIName] continua sendo seu prisioneiro[prisoner.Custom('ES_OA')]"
 travel_events.2033.c: "Deixe [prisoner.GetFirstNameNoTooltip] fugir. A natureza vai levar [prisoner.GetSheHe] de qualquer maneira."
 #Your escaped manhunted prisoner seeks revenge
 travel_events.2034.t: "O que Vai, Volta..."
 travel_events.2034.desc_intro: "A manhã começa a raiar em nosso acampamento no/a [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l] de [ROOT.Char.GetCurrentLocation.GetName]. Bocejo e me espreguiço suavemente, rolando para o lado.\n\nSonolent[ROOT.Char.Custom('ES_OA')], me levanto e me aproximo da abertura da tenda para sentir o ar fresco da manhã. De repente, os pelos da minha nuca se arrepiam,"
 travel_events.2034.desc: "e de relance, vejo [vengeful_prisoner.Custom('ES_AlAla')] [vengeful_prisoner.GetTitledFirstName|l], com a faca em punho.\n\n[vengeful_prisoner.GetSheHe|U] sorri com ironia. "[ROOT.Char.GetTitledFirstNameNoTooltip|l], que bom ver-vos novamente. Desta vez #EMP eu#! caçarei um homem". Pisquei, atônit[ROOT.Char.Custom('ES_OA')] por um instante."
 travel_events.2034.desc_long_time: "e, pelo canto do olho, avisto um[vengeful_prisoner.Custom('ES_XA')] [vengeful_prisoner.GetWomanMan], faca em punho.\n\n[vengeful_prisoner.GetSheHe|U] sorri com ironia. "Vocês não se lembram de mim, não é? Pois eu me lembro de #EMP vocês#!, [ROOT.Char.GetTitledFirstNameNoTooltip|l], e de sua #EMP sádica#! caça humana." Uma vaga lembrança retorna a mim. É [Select_CString( vengeful_prisoner.IsFemale, 'a prisioneira fugitiva', 'o prisioneiro fugitivo' )] #EMP [vengeful_prisoner.GetTitledFirstName|l]#!…?"
 travel_events.2034.a: "Você não precisa fazer isso!"
 travel_events.2034.a_overpowered_desc: "Você domina [vengeful_prisoner.GetShortUIName]"
 travel_events.2034.a_overpowered_effect: "Você decide o destino de [vengeful_prisoner.GetShortUIName]"
 travel_events.2034.a_death_desc: "$travel_events.2019.a_death.desc$"
 travel_events.2034.b: "#EMP [bodyguard.GetFirstNameNoTooltip]!!#!"
 travel_events.2034.b_overpowered_desc: "[bodyguard.GetShortUIName] domina [vengeful_prisoner.GetShortUIName]"
 travel_events.2034.b_death_tt: "Prisioneiro Escapado Morto"
 travel_events.2034.b_death_desc: "[bodyguard.GetShortUIName] mata [vengeful_prisoner.GetShortUIName]"
 #Decide their fate
 travel_events.2035.t: "… acabam voltando"
 travel_events.2035.desc: "[vengeful_prisoner.Custom('ES_ElLa')|U] [vengeful_prisoner.GetTitledFirstName|l] se ajoelha diante de mim, pres[vengeful_prisoner.Custom('ES_OA')] e incapaz de se mover. Depois do choque inicial, agora meus guardas lotam a tenda.\n\n[vengeful_prisoner.GetSheHe|U] teima em olhar para o chão, recusando-se a encontrar meu olhar. O que devo fazer com esse [vengeful_prisoner.Custom2('InsultNoun', ROOT.Char)]?"
 travel_events.2035.a: "A morte é o que você merece."
 travel_events.2035.b: "Você deve voltar para a prisão."
 travel_events.2035.c: "Eu vou virar a outra face."
 #Your escaped/reformed prisoner is... pretty peaceful actually
 travel_events.2036.t: "Um Fim?"
 travel_events.2036.desc_intro: "Atravessamos os portões de uma aldeia em [ROOT.Char.GetCurrentLocation.GetName]. Aqui, as pessoas parecem estar em paz, cuidando de suas vidas cotidianas e ajudando umas às outras.\n\nAo observar casualmente os aldeões, uma súbita onda de reconhecimento me percorre."
 travel_events.2036.desc_reformed: "No santuário local, reconheço imediatamente meu prisioneir[peaceful_prisoner.Custom('ES_OA')] fugid[peaceful_prisoner.Custom('ES_OA')], [peaceful_prisoner.Custom('ES_ElLa')] [peaceful_prisoner.GetTitledFirstName|l], em amena conversa com o líder espiritual.\n\nQue coincidência irônica! [peaceful_prisoner.GetHerHim|U] o vejo enquanto ajuda o clero com tarefas menores, aparentemente em paz."
 travel_events.2036.desc: "Reconheço imediatamente meu prisioneiro[peaceful_prisoner.Custom('ES_OA')] fugid[peaceful_prisoner.Custom('ES_OA')]; [peaceful_prisoner.Custom('ES_ElLa')] [peaceful_prisoner.GetTitledFirstName|l], rindo e ajudando um dos habitantes mais idosos da aldeia rural.\n\nParece satisfeit[peaceful_prisoner.Custom('ES_OA')] com sua situação."
 travel_events.2036.a: "Viva e deixe viver."
 travel_events.2036.a_criminal: "Acho que até criminosos podem se reformar."
 travel_events.2036.a_reformed: "Contanto que [peaceful_prisoner.GetSheHe] não faça outra tentativa contra a minha vida."
 travel_events.2036.b: "[peaceful_prisoner.GetTitledFirstNameNoTooltip|U] vem #EMP comigo#!."
 travel_events.2036.b_criminal: "Criminoso uma vez, criminoso sempre."
 travel_events.2036.b_reformed: "#EMP No#!, não me sinto segur[ROOT.Char.Custom('ES_OA')] sabendo que [peaceful_prisoner.GetSheHe] está aqui."
 #Visit some hunting grounds - Sadistic county holder is manhunting
 travel_events.2037.t: "O Caçador de Homens"
 travel_events.2037.desc: "Nos deparamos com [2037_county_liege.Custom('ES_ElLa')] [2037_county_liege.GetTitledFirstName|l], governante de [ROOT.Char.GetCurrentLocation.GetName], e seu séquito nos terrenos de caça locais.\n\nApós uma troca de saudações educadas, ele me olha com um sorriso malicioso: "Gostariam de se juntar a mim no mais nobre dos esportes,"
 travel_events.2037.desc_child: "pequenin[ROOT.Char.Custom('ES_OA')]?""
 travel_events.2037.desc_adult: "[2037_county_liege.Custom2('RelationToMeShort', ROOT.Char)] me[ROOT.Char.Custom('ES_OA')]?"."
 travel_events.2037.desc_segway: "Faz um aceno com a cabeça para [2037_manhunt_prisoner.Custom('ES_AlAla')] prisioneir[2037_manhunt_prisoner.Custom('ES_OA')] acorrentad[2037_manhunt_prisoner.Custom('ES_OA')] na orla da floresta."
 travel_events.2037.desc_outro_segway_adult: "\n\nMuito rapidamente entendo a que #EMP deporte#! se refere."
 travel_events.2037.desc_outro_child: "\n\nMinha curiosidade está realmente aguçada. Que jogo poderia ser esse...? Pega-pega?\n\nEnquanto reflito sobre a proposta, percebo que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('entourage_character'))], [entourage_character.Custom('ES_ElLa')] [entourage_character.GetTitledFirstName|l], busca minha atenção e balança a cabeça cuidadosamente."
 travel_events.2037.desc_outro_manhunter: "Como caçador experiente[ROOT.Char.Custom('ES_OA')] essa sugestão me desperta o interesse."
 travel_events.2037.desc_outro: "#EMP Caça ao homem.#! Eu estou verdadeiramente enojado... ou estou intrigado?"
 travel_events.2037.a: "Soa interessante o suficiente..."
 travel_events.2037.a_child: "Eu vou jogar!"
 travel_events.2037.a_manhunted: "Vamos começar."
 travel_events.2037.a_your_kill.desc: "Você caça e mata [2037_manhunt_prisoner.GetShortUIName]"
 travel_events.2037.a_their_kill.tt: "[2037_county_liege.GetShortUINameNoTooltip] Faz a Morte"
 travel_events.2037.a_their_kill.desc: "[2037_manhunt_prisoner.GetShortUIName] é caçado[2037_manhunt_prisoner.Custom('ES_OA')] e assassinado[2037_manhunt_prisoner.Custom('ES_OA')] por [2037_county_liege.GetShortUIName]"
 travel_events.2037.b: "Tal prisioneiro[2037_manhunt_prisoner.Custom('ES_OA')] me seria útil, se não se importam."
 travel_events.2037.b_child: "Eu prefiro que [2037_manhunt_prisoner.GetFirstNameNoTooltip] venha comigo."
 travel_events.2037.c: "Você está louco?"
 travel_events.2037.c_child: "Não. Isso parece ser um jogo maligno."
 #Visit some hunting grounds - Friendly competition with an entourage member
 travel_events.2038.t: "Mira Verdadeira"
 travel_events.2038.desc: "Ao ver que o local transborda de vida selvagem, [entourage_character.Custom('ES_ElLa')] [entourage_character.GetTitledFirstName|l] e eu concordamos que [ROOT.Char.GetCurrentLocation.GetName] seria um lugar esplêndido para uma caçada.\n\nEmbora não tenhamos tempo para ficar e fazer uma excursão apropriada, enquanto atravessamos a área, avisto um coelho selvagem imaculado à beira da floresta. Ele tem marcas peculiares na pelagem, e faço um gesto para [entourage_character.GetFirstNameNoTooltip] para que examine o animal.\n\nAo ver o coelho, ele sorri. \"Que tal uma aposta amigável, [entourage_character.Custom2('RelationToMeShort', ROOT.Char)]? Quem acertar aquele belo exemplar com uma flecha vence\"."
 travel_events.2038.a: "Me parece um acordo!"
 travel_events.2038.a_your_kill.tt: "Você Mata"
 travel_events.2038.a_your_kill.desc: "Sua flecha perfura perfeitamente o coração do coelho"
 travel_events.2038.a_their_kill.tt: "[entourage_character.GetShortUINameNoTooltip] Mata"
 travel_events.2038.a_their_kill.desc: "O coelho é morto por [entourage_character.GetShortUIName]"
 lucky_rabbits_paw: "Pata de Coelho Sortudo"
 lucky_rabbits_paw_desc: "Uma pata de um coelho imaculado único, abatido em uma caçada amigável com [entourage_character.GetTitledFirstName|l] nos terrenos de caça de [ROOT.Char.GetCurrentLocation.GetName]."
 travel_events.2038.b: "#EMP Ah não#!, o sol está no meu olho!"
 travel_events.2038.c: "...puff, não tenho tempo para isso."
 #Follow-up hunt outcome
 travel_events.2039.t: "Mira Mais Verdadeira"
 travel_events.2039.desc_child_won: "[entourage_character.Custom('ES_ElLa')|U] [entourage_character.GetTitledFirstName|l] se lança atrás do coelho, com o arco pronto, alheio[entourage_character.Custom('ES_OA')] à minha fraca encenação de flechas mal disparadas.\n\nApós algum esforço entre a vegetação, [entourage_character.Custom('ES_ElLa')] [entourage_character.GetTitledFirstNameNoTooltip|l] chilreia triunfante e salta para a frente, carregando o corpo do animal imaculado com uma flecha firmemente cravada em seu pequeno torso. Aplaudo quando ele me sorri."
 travel_events.2039.desc_won: "Coelho à vista, nos aproximamos lenta mas decididamente do animal, apontando para seu corpinho enquanto ele mastiga um pedaço de palha. Puxo a corda — e solto — para que a flecha se crave #EMP direto no corpo do animal#!.\n\nO impacto repentino o lança alguns passos adiante e então o corpinho desaba no chão, imóvel. Rugido de triunfo, e [entourage_character.Custom('ES_ElLa')] [entourage_character.GetTitledFirstName|l] se junta a mim em meu brado de vitória. “Bom tiro”, grita enquanto me lanço para pegar o troféu."
 travel_events.2039.desc_lost: "[entourage_character.Custom('ES_ElLa')|U] [entourage_character.GetTitledFirstName|l] está alguns passos à minha frente enquanto tentamos nos aproximar do coelho para atirar. Esforço-me para acompanhar seu passo enquanto [entourage_character.GetSheHe] aponta uma flecha para o animal e, com um movimento rápido, a dispara diretamente contra o corpinho da criatura.\n\n[entourage_character.GetFirstNameNoTooltip] faz um gesto de vitória e grita enquanto o coelho cai inerte no chão, após o que se apressa para recolher a carcaça. Aplaudo em reconhecimento."
 travel_events.2039.a: "Bom tiro!"
 travel_events.2039.a_trinket.t: "Ganho de Bugiganga"
 travel_events.2039.a_win: "Isso foi divertido!"
 travel_events.2039.a_cynical: "Já vi pior."
 #The rescued manhunt prisoner from travel_events.2037 turns out to be a psycho
 travel_events.2040.t: "Aproveitando a Oportunidade"
 travel_events.2040.intro: "Numa noite, enquanto estamos sentados junto à fogueira, ergo os olhos e percebo que estou a sós com [2037_manhunt_prisoner.Custom('ES_ElLa')] [2037_manhunt_prisoner.GetTitledFirstName|l]. Seus olhos refletem a chama tremeluzente enquanto [2037_manhunt_prisoner.GetSheHe] fixa sua atenção em mim.\n\n"
 travel_events.2040.desc_child: ""Por que o[2037_county_liege.Custom('ES_EA')] senhor[2037_county_liege.Custom('ES_XA')] mau[2037_county_liege.Custom('ES_OA')] queria te matar?", eu solto. [2037_manhunt_prisoner.Custom('ES_ElLa')|U] [2037_manhunt_prisoner.GetTitledFirstName|l] hesita por um momento, então desvia o olhar e responde:"
 travel_events.2040.desc: "Percebo que nunca perguntei por que estava encarcerad[2037_manhunt_prisoner.Custom('ES_OA')]. Então, como se lesse minha mente, [2037_manhunt_prisoner.Custom('ES_ElLa')] [2037_manhunt_prisoner.GetTitledFirstName|l] murmura:"
 travel_events.2040.outro: "\n\n"Sabe? Era como se a carne dele clamasse por libertação", e uma sombria nostalgia se insinua em sua voz."
 travel_events.2040.a: "… Isso é muito filosófico."
 travel_events.2040.a_child: "Eu também fiz coisas ruins."
 travel_events.2040.a.flavor: "Quem é mais perigoso do que uma pessoa lunática?"
 travel_events.2040.a.flavor_child: "Tenho certeza de que [2037_manhunt_prisoner.GetSheHe] não machucaria #EMP a mim#!, certo?"
 travel_events.2040.a.tt: "[2037_manhunt_prisoner.GetShortUIName] trabalhará de graça como seu [GetCourtPositionType('bodyguard_court_position').GetName()|l]"
 insane_bodyguard_salary_mod: "Guarda-Costas Insano"
 travel_events.2040.b: "Assassinos pertencem atrás das grades."
 travel_events.2040.b_child: "Ferir pessoas não está certo."
 travel_events.2040.b.flavor: "Então é por isso que estava preso[2037_manhunt_prisoner.Custom('ES_OA')]…"
 travel_events.2040.b.flavor_child: "[2037_manhunt_prisoner.Custom('ES_ElLa')] [2037_manhunt_prisoner.GetTitledFirstNameNoTooltip|l] me assusta…"
 travel_events.2040.c: "#EMP Não posso permitir que [Select_CString( 2037_manhunt_prisoner.IsFemale, 'uma assassina', 'um assassino' )] continue viv[2037_manhunt_prisoner.Custom('ES_OA')]!#!"
 travel_events.2040.c.flavor: "Olho por olho."
 travel_events.2040.c_slay.t: "Assassino Morto"
 travel_events.2040.c_slay.desc: "Você mata [2037_manhunt_prisoner.GetShortUIName]"
 travel_events.2040.c_wounded.t: "$travel_events.2001.c_failure.tt$"
 travel_events.2040.c_wounded.desc: "Você mata [2037_manhunt_prisoner.GetShortUIName], mas fica ferido"
 travel_events.2040.c_incapable.t: "Gravemente Ferido"
 travel_events.2040.c_incapable.desc: "Você fica gravemente ferido na luta, e [2037_manhunt_prisoner.GetShortUIName] escapa"
 travel_events.2040.c_death.desc: "Você morre"
 #Ruler Events#
 #Visiting Ruler: Someone is trying to assassinate the Target Ruler!
 travel_events_life_or_death.t: "Vida ou Morte"
 travel_events.2100.t: "$travel_events_life_or_death.t$"
 travel_events.2100.desc_intro: "Estamos avançando bem em nossa jornada para chegar a [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] e"
 travel_events.2100.desc_intro_trees: "a densa floresta de [ROOT.Char.GetCurrentLocation.GetName] não é páreo para a sagacidade do nosso guia local.\n\nQuando as árvores se abrem, avisto um segundo grupo de viajantes, seguindo adiante."
 travel_events.2100.desc_intro_hills: "o vento está a nosso favor enquanto percorremos as encostas de [ROOT.Char.GetCurrentLocation.GetName] [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l].\n\nBem à nossa frente, outro séquito também está avançando pela encosta da colina."
 travel_events.2100.desc_intro_flats: "as planícies de [ROOT.Char.GetCurrentLocation.GetName] nos permitem baixar a guarda por alguns momentos.\n\nQuando chegamos ao topo do vale e olhamos para baixo, noto outro séquito avançando diligentemente."
 travel_events.2100.desc_relation_in: "Ao estreitar os olhos, percebo que o governante desse séquito em particular é"
 travel_events.2100.desc_negative_segway: "o[murder_target.Custom('ES_EA')] [murder_target.Custom('InsultAdjectiveGeneric')|l]"
 travel_events.2100.desc_positive_segway: "m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('murder_target'))]"
 travel_events.2100.desc_relation_out: "[murder_target.GetTitledFirstName]."
 travel_events.2100.desc_no_relation_traveller: "Eles parecem estar apreciando a paisagem, praticamente saltitando e fazendo turismo na área local."
 travel_events.2100.desc_no_relation_liege: "Eles parecem estar observando a área, tirando notas e discutindo a paisagem."
 travel_events.2100.desc_trees: "Mas algo não está certo. Vasculhando a linha das árvores, também percebo um grupo de figuras suspeitas e encapuzadas, aparentemente esperando que o grupo de viajantes se aproxime."
 travel_events.2100.desc_hills: "Mas quem são esses cavaleiros mascarados, com as armas desembainhadas, que se aproximam do oeste…?"
 travel_events.2100.desc_flats: "Ainda observando o grupo, parece que cavaleiros mascarados com armas erguidas estão se aproximando rapidamente do leste!"
 travel_events.2100.desc_outro: "\n\nIsso parece uma emboscada e"
 travel_events.2100.desc_outro_negative: "hesito. Devo intervir no que parece ser uma morte certa para [murder_target.GetTitledFirstNameNoTooltip]?"
 travel_events.2100.desc_outro_positive: "não há dúvida em minha mente. Devo salvar [murder_target.GetTitledFirstNameNoTooltip|l]!"
 travel_events.2100.desc_outro_default: "hesito. Será realmente minha responsabilidade proteger outros viajantes?"
 travel_events.2100.a: "Por que devo #EMP eu#! me envolver?"
 travel_events.2100.a_rival: "Melhor assim."
 travel_events.2100.a_nemesis: "#EMP Finalmente!#!"
 travel_events.2100.a_stealthy_entourage.tt: "Séquito Oculto"
 travel_events.2100.a_stealthy_entourage.desc: "Você e seu séquito permanecem ocultos"
 travel_events.2100.a_stealthy_outcome.tt: "Se [murder_target.GetShortUIName] sobreviver, nunca saberá que você esteve aqui"
 travel_events.2100.a_nonstealthy_entourage.tt: "Séquito Exposto"
 travel_events.2100.a_nonstealthy_entourage.desc: "Sua presença é notada por [murder_target.GetShortUIName]"
 travel_events.2100.a_nonstealthy_outcome.tt: "Se [murder_target.GetShortUIName] sobreviver, [murder_target.GetSheHe] lembrará disso"
 travel_events.2100.b: "Devo agir!"
 travel_events.2100.b.tt: "Você intervém na tentativa de assassinato de [murder_target.GetShortUIName]"
 travel_events.2100.b_outcome_tt: "[murder_target.GetShortUIName] lembrará disso"
 #Target Ruler: You are being assassinated
 travel_events.2101.t: "$travel_danger_prefix$ $travel_events_life_or_death.t$, Assassinos!"
 travel_events.2101.desc: "Enquanto observo as terras de [ROOT.Char.GetCurrentLocation.GetName], o sol está alto e há uma brisa leve. Olho ao redor e reflito sobre o fato de que a área é bastante desolada, exceto por algumas aves migratórias lá no alto do céu.\n\nEnquanto me inclino para ajustar minha bota, sou repentinamente erguido quando ouvimos cavaleiros se aproximando. As figuras encapuzadas parecem estar vindo de todas as direções e, antes que eu perceba, um dos vilões está bem na minha frente, com a lâmina desembainhada e avançando em minha garganta!"
 travel_events.2101.a: "Como ousa!"
 travel_events.2101.a_guards: "[bodyguard.GetNameNoTooltip]!!"
 travel_events.2101.a_assassin_death.tt: "Assassino Morto"
 travel_events.2101.a_bodyguard_kill.desc: "O assassino é morto por [bodyguard.GetShortUIName]"
 travel_events.2101.a_bodyguard_wounded.tt: "Guarda Ferido"
 travel_events.2101.a_bodyguard_wounded.desc: "[bodyguard.GetShortUIName] mata o assassino, mas fica ferido"
 travel_events.2101.a_assassin_death.desc: "Você mata o assassino"
 travel_events.2101.a_death.desc: "Você morre"
 travel_events.2101.a_ruler_assassinated.tt: "[murder_target.GetShortUIName] Morreu"
 travel_events.2101.a_ruler_assassinated.desc: "[murder_target.GetShortUIName] foi assassinado[murder_target.Custom('ES_OA')] quando visitava [visiting_ruler.MakeScope.Var('assassination_location').GetProvince.GetName]"
 travel_events.2101.a_ruler_survived.tt: "[murder_target.GetShortUIName] Sobreviveu"
 travel_events.2101.a_ruler_survived.desc: "[murder_target.GetShortUIName] sobreviveu à tentativa de assassinato em [visiting_ruler.MakeScope.Var('assassination_location').GetProvince.GetName]"
 #Target Ruler: Wait a minute, didn't I see Visiting Ruler??
 travel_events.2102.t: "$travel_danger_prefix$ $travel_events_life_or_death.t$, Traído"
 travel_events.2102.desc: "A luta continua por horas, mas na realidade dura apenas alguns minutos. Os assassinos são repelidos e sobrevivemos ilesos.\n\nVou procurando no campo de batalha e encontro evidências do plano de assassinato que foi tramado contra mim em um dos corpos. Em meu estado aumentado de alerta, também percebo uma bandeira desaparecendo logo fora da vista. [visiting_ruler.GetTitledFirstName]?"
 travel_events.2102.desc_negative: "\n\nClaro. Seria insensato da minha parte esperar apoio de alguém como [visiting_ruler.GetFirstNameNoTooltip] e sua laia. Uma maldição sobre sua sepultura."
 travel_events.2102.desc_positive: "\n\nComo pôde? Eu… esperava mais de [visiting_ruler.GetSheHe]. Meus olhos estão meio fechados enquanto a dor desta traição me fere mais do que qualquer lâmina poderia."
 travel_events.2102.desc_default: "\n\n[visiting_ruler.GetSheHe|U] viu os eventos se desenrolando sem me ajudar quando eu precisava? Essa postura agressivamente desinteressada realmente prova em quem você pode ou não confiar."
 travel_events.2102.a: "Isto diz muito sobre a personalidade de tipo [visiting_ruler.Custom('InsultAdjectiveGeneric')] [visiting_ruler.Custom('ES_DelDela')] [visiting_ruler.GetTitledFirstNameNoTooltip|l]."
 #Visiting Ruler: Letter event - Target Ruler knows you what you did (or rather, didn't do)
 travel_events.2103.t: "[murder_target.Custom2('AppropriateGreetingNegative', ROOT.Char )]"
 travel_events.2103.desc_intro: "[murder_target.Custom2('NegativeSupplimentaryGreeting', ROOT.Char )]"
 travel_events.2103.desc_negative: "\n\nNão esperava menos de você do que o desejo de me ver exalar meu último suspiro na selvageria de [ROOT.Var('assassination_location').GetProvince.GetTerrain.GetNameNoTooltip|l] de [ROOT.Var('assassination_location').GetProvince.GetName].\n\nNa verdade, saberei saborear o dia em que a centelha da vida finalmente deixe esses pântanos que vocês chamam de olhos, [visiting_ruler.Custom('InsultAdjectiveGeneric')] [murder_target.Custom2('RelationToMe', SCOPE.sC( 'visiting_ruler' ))] de mim[murder_target.Custom('ES_OA')]."
 travel_events.2103.desc_positive: "\n\nComo você pôde, [murder_target.Custom2('RelationToMe', SCOPE.sC( 'visiting_ruler' ))] meu[murder_target.Custom('ES_OA')]? Como você pôde me abandonar à própria sorte no meio de [ROOT.Var('assassination_location').GetProvince.GetTerrain.GetNameNoTooltip|l] de [ROOT.Var('assassination_location').GetProvince.GetName]? Vou me lembrar disso, você pode ter certeza[murder_target.Custom('ES_OA')] disso."
 travel_events.2103.desc_default: "\n\n[ROOT.Char.GetTitledFirstName], eu esperava decência humana normal e respeito pela minha vida como qualquer pessoa boa e fiel. Me abandonar à própria sorte no meio de [ROOT.Var('assassination_location').GetProvince.GetTerrain.GetNameNoTooltip|l] de [ROOT.Var('assassination_location').GetProvince.GetName] diz, infelizmente, que sua personalidade não é a de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] temeros[ROOT.Char.Custom('ES_OA')] de Deus. Vou me lembrar disso."
 travel_events.2103.a: "Bem, #EMP sobrevivió#! depois de tudo."
 #Visiting Ruler: You heroically thwart the assassination of Target Ruler
 travel_events.2104.t: "$travel_danger_prefix$ $travel_events_life_or_death.t$, Como Salvar uma Vida"
 travel_events.2104.desc: "Eu e meu séquito investimos de frente contra os supostos assassinos, pegando-os completamente de surpresa. Quão incompetente você precisa ser para não manter uma visão clara da própria retaguarda?\n\nDespedaçamos facilmente os poucos que resistem, e o resto foge para a natureza selvagem. Ergo os olhos e vejo [murder_target.GetTitledFirstName|l] me encarando, de olhos arregalados e com a boca ligeiramente entreaberta[murder_target.Custom('ES_OA')].\n\nQuando [murder_target.Custom('ES_OA')] desperta disso, seus traços faciais se ajustam, mas ainda parece surpreso e agradecido pela minha intervenção. [murder_target.Custom('ES_OA')] me chama para me aproximar."
 travel_events.2104.a: "Esse é meu bom ato do dia."
 travel_events.2104.a_shy: "Era a coisa certa a fazer."
 #Target Ruler: Visiting Ruler thwarted your assassination
 travel_events.2105.t: "$travel_events.2104.t$"
 travel_events.2105.desc_intro: "Quando exploramos as terras de [ROOT.Char.GetCurrentLocation.GetName], somos repentinamente cercados por assassinos. E, aparentemente do nada, [visiting_ruler.Custom('ES_ElLa')] [visiting_ruler.GetTitledFirstName|l] e seu séquito chegam cavalgando, de cabeça e com as armas em riste, direto contra a multidão de assassinos!\n\n"
 travel_events.2105.desc_negative: "Observo com espanto enquanto meu [ROOT.Char.Custom2('GetRivalNemesis', SCOPE.sC('visiting_ruler'))] corta os assassinos à direita e à esquerda, o restante deles foge em pânico. [visiting_ruler.GetFirstNameNoTooltip] dá meia-volta e para bem na minha frente: "Parece que você precisava de ajuda", rosna.\n\nHesito. Embora #EMP sí#! que tenha acabado de me salvar a vida, como posso confiar em [visiting_ruler.GetSheHe]…? Aceno relutantemente."
 travel_events.2105.desc_positive: "Meus olhos se enchem de alegria ao ver meu salvador[visiting_ruler.Custom('ES_XA')] e [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('visiting_ruler'))] [visiting_ruler.GetFirstNameNoTooltip] afugentar os assassinos, dar uma grande volta e retornar ao meu séquito: "[visiting_ruler.Custom2('RelationToMe', ROOT.Char)] meu[ROOT.Char.Custom('ES_OA')]! Como vão as coisas?", ele me sorri."
 travel_events.2105.desc_default: "O ato de ajudar quem é, para todos os efeitos, [Select_CString( ROOT.Char.IsFemale, 'uma desconhecida', 'um desconhecido' )] em apuros demonstra que existe um plano divino. Isso deve ser um sinal de [ROOT.Char.GetFaith.HighGodName] de que nossa viagem está abençoada.\n\nMeu salvador[visiting_ruler.Custom('ES_XA')] se vira para mim e acena com a cabeça educadamente. Sorrio em resposta e digo: "Que [ROOT.Char.GetFaith.HighGodName] vos abençoe, minha [visiting_ruler.GetLadyLord]!""
 travel_events.2105.a: "Você é um verdadeiro espírito nobre!"
 travel_events.2105.a_cynical: "Aprecio o gesto."
 travel_events.2105.a.tt: "[visiting_ruler.GetShortUIName] veio em seu auxílio!"
 #County Liege: You notice a Travelling Ruler coming under attack
 travel_events.2107.t: "$travel_danger_prefix$ $travel_events_life_or_death.t$, Refúgio Seguro"
 travel_events.2107.desc_intro_plains: "Quando o sol começa a se pôr, contemplo a [holding_location.GetTerrain.GetNameNoTooltip|l] do meu alojamento em [holding_location.GetName]. Ao longe, um grupo de viajantes atravessa o terreno coberto de grama que se estende diante deles."
 travel_events.2107.desc_intro_desert: "Nos arredores de [holding_location.GetName], sopra uma brisa fraca que ergue pequenas nuvens de poeira em todas as direções. Enquanto observo o sol errante do lado de fora da fortaleza, noto um grupo de viajantes avançando com diligência pela areia."
 travel_events.2107.desc_intro_wetlands: "À medida que o sol se põe, o/a [holding_location.GetTerrain.GetNameNoTooltip|l] nos arredores de [holding_location.GetName] adquire um tom distinto nesta noite. Da segurança do meu torreão, observo as cores em mudança e a escuridão que se aproxima e, ao fazê-lo, noto um grupo de viajantes longe da posse, atravessando as estradas lamacentas."
 travel_events.2107.desc_intro_forest: "À medida que o sol se põe, a floresta que cerca [holding_location.GetName] vai ficando mais escura. Da segurança de minha torre, observo a luz do entardecer e, ao fazê-lo, noto um grupo de viajantes atravessando a borda da floresta."
 travel_events.2107.desc_intro_mountains: "O ar está fresco quando ponho a cabeça para fora, olhando para o vale abaixo de [holding_location.GetName]. Aprecio a diferença de temperatura enquanto observo a vida selvagem e noto um grupo de viajantes que avança diligentemente pelo vale."
 travel_events.2107.desc_intro_hills: "A suave inclinação das colinas ao redor de [holding_location.GetName] é agradável aos olhos enquanto olho para fora e, lá embaixo, vejo o pequeno lago abaixo. Um grupo de viajantes parece contornar o lago, seguindo a passos largos em direção ao seu destino."
 travel_events.2107.desc_intro_jungle: "A selva é quente e úmida, como de costume, e da segurança inviolável do meu refúgio, olho para as árvores de [holding_location.GetName] para vislumbrar os pássaros coloridos que nidificam lá no alto. Pelo canto do olho, noto um grupo de viajantes atravessando a vegetação rasteira ao norte."
 travel_events.2107.desc_intro: "O céu está praticamente sem nuvens enquanto passo a tarde nos arredores de [holding_location.GetName]. No caminho de volta à posse, noto um grupo de viajantes que mal acabaram de sair dos limites da cidade."
 travel_events.2107.desc_segway: "\n\nAo olhar mais de perto, percebo que o líder do grupo não é outro senão [travelling_ruler.Custom('ES_ElLa')] [travelling_ruler.GetTitledFirstName|l] e sua comitiva. Ao observar casualmente seu movimento, olho instintivamente para cima quando uma multidão de cavaleiros se aproxima rapidamente do grupo pacífico.\n\nÀ medida que os cavaleiros se aproximam, começam a erguer suas armas."
 travel_events.2107.desc_outro_negative: "Isso deve ser interessante."
 travel_events.2107.desc_outro_positive: "Eu devo fazer algo!"
 travel_events.2107.desc_outro_family: "O sangue é mais espesso que a água, como dizem?"
 travel_events.2107.desc_outro: "Os viajantes estão claramente prestes a serem atacados, em #EMP minha#! terra."
 travel_events.2107.a: "É nosso dever intervir."
 travel_events.2107.a_christian: "É o que qualquer bom [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] faria."
 travel_events.2107.a_outcome_tt: "[travelling_ruler.GetShortUIName] vai se lembrar disso"
 travel_events.2107.b: "Isso é muito perigoso."
 travel_events.2107.b_negative: "Boa viagem."
 travel_events.2107.b_outcome_tt: "Se [travelling_ruler.GetShortUIName] sobreviver, lembrará disso"
 #Travelling Ruler: You are saved by County Liege
 travel_events.2108.t: "$travel_danger_prefix$ $travel_events_life_or_death.t$, Salvo"
 travel_events.2108.desc_intro: "Enquanto atravessamos a [holding_location.GetTerrain.GetNameNoTooltip|l] nos arredores de [holding_location.GetName] somos repentinamente atacados por um grupo de cavaleiros bandidos, sedentos de sangue. Outro grupo de cavaleiros se aproxima rapidamente da posse próxima, liderados por [province_liege.Custom('ES_ElLa')] [province_liege.GetTitledFirstName|l]!"
 travel_events.2108.desc_negative: "\n\nPor enquanto, contenho minha surpresa, pois ser salvo por ninguém menos que m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('province_liege'))] certamente não era algo que eu esperava!"
 travel_events.2108.desc_positive: "\n\nMeu coração se aquece ao ver m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('province_liege'))] [province_liege.GetFirstNameNoTooltip] liderar a carga de frente contra a retaguarda desprotegida do bando de canalhas."
 travel_events.2108.desc: "\n\nFiquei muito agradavelmente surpreso com o comportamento altruísta [province_liege.Custom('ES_DelDela')] [province_liege.GetTitleAsNameNoTooltip] local, e louvo a [ROOT.Char.GetFaith.HighGodName] por terem chegado bem a tempo."
 travel_events.2108.desc_segway: "\n\n[province_liege.GetFirstNameNoTooltip] dá a volta com um sorriso vitorioso no rosto:"
 travel_events.2108.desc_outro_negative: ""Não poderia deixar que mais ninguém tivesse o prazer de acabar com meu [province_liege.Custom2('RelationToMe', ROOT.Char)], não é mesmo?". Hesito por um momento e então retruco."
 travel_events.2108.desc_outro_positive: "\"Você está machucado? Por favor, venha se juntar a nós para um pouco de hospitalidade em [holding_location.GetNameNoTooltip], assim que essa bagunça for resolvida.\""
 travel_events.2108.desc_outro: "\"Você deveria se juntar a nós para um pouco da hospitalidade [province_liege.GetCulture.GetNameNoTooltip] em [holding_location.GetNameNoTooltip]!\""
 travel_events.2108.a: "Seria uma honra!"
 travel_events.2108.a_negative: "É bom estar vivo, suponho."
 travel_events.2108.a.tt: "[province_liege.GetShortUIName] veio em seu auxílio!"
 #County Liege: You save Travelling Ruler
 travel_events.2109.t: "$travel_events.2108.t$"
 travel_events.2109.desc_intro: "Os bandidos não sabem o que os atingiu. Lidero nossos melhores guerreiros para a batalha fora de [holding_location.GetName] e cortamos o grupo como manteiga num dia quente de verão."
 travel_events.2109.desc_negative: "\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('travelling_ruler'))], [travelling_ruler.Custom('ES_ElLa')] [travelling_ruler.GetTitledFirstName|l], fica de boca aberta[travelling_ruler.Custom('ES_OA')] como se tivesse sido fulminad[travelling_ruler.Custom('ES_OA')] por um raio, ao contemplar nossa investida e a defesa bem-sucedida de seu grupo de viagem."
 travel_events.2109.desc_positive: "\n\n[travelling_ruler.Custom('ES_ElLa')|U] [travelling_ruler.GetTitledFirstName|l] e seu séquito nos animam enquanto executamos o contra-ataque final contra esses canalhas."
 travel_events.2109.desc: "\n\n[travelling_ruler.Custom('ES_ElLa')|U] [travelling_ruler.GetTitledFirstName|l] nos observa atentamente enquanto eliminamos os canalhas, depois se acalma um pouco ao ver que somos amigáveis."
 travel_events.2109.desc_segway: "\n\nQuando finalmente os agressores são postos em fuga, volto para junto de [travelling_ruler.GetFirstNameNoTooltip] ,"
 travel_events.2109.desc_outro_negative: "que agora parece ter recuperado o equilíbrio. Acena amigavelmente na minha direção. "Nada que não pudéssemos lidar, mas é bom não termos tido que nos esforçar demais", admite."
 travel_events.2109.desc_outro_positive: "que se aproxima rapidamente a mim. "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('province_liege'))]! Quem dera tivéssemos nos reencontrado em circunstâncias menos sombrias", exclama."
 travel_events.2109.desc_outro: "que agora parece mais à vontade com nossa presença. "Amig[ROOT.Char.Custom('ES_OA')] querid[ROOT.Char.Custom('ES_OA')], obrigado por nos ajudar em nosso momento de necessidade", diz, sorrindo para mim."
 travel_events.2109.a: "A terra está segura mais uma vez."
 travel_events.2109.a_negative: "Eu só queria evitar ter que limpar uma bagunça maior."
 travel_events.2109.a_positive: "Feliz em poder ajudar, [province_liege.Custom2('RelationToMe', SCOPE.sC('travelling_ruler'))]!"
 travel_events.2109.a_hurt.tt: "[ROOT.Char.Custom('KnightCultureNoTooltip')] Ferido"
 travel_events.2109.a_first_hurt.desc: "[first_potential_hurt_knight.GetShortUIName] foi ferido na batalha"
 travel_events.2109.a_second_hurt.desc: "[second_potential_hurt_knight.GetShortUIName] foi ferido na batalha"
 travel_events.2109.a_third_hurt.desc: "[third_potential_hurt_knight.GetShortUIName] foi ferido na batalha"
 travel_events.2109.a_none_hurt.tt: "Intactos"
 travel_events.2109.a_none_hurt.desc: "Nenhum dos seus [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] foi ferido na batalha"
 #Travelling Ruler: You get ruthlessly attacked
 travel_events.2110.t: "$travel_danger_prefix$ $travel_events_life_or_death.t$, Abandonado"
 travel_events.2110.desc: "Ao atravessarmos a [holding_location.GetTerrain.GetNameNoTooltip|l] nos arredores de [holding_location.GetName], somos atacados de repente por uma horda de cavaleiros bandidos, sedentos de sangue. Estamos tão perto da fortaleza, certamente [province_liege.Custom('ES_ElLa')] [province_liege.GetTitledFirstName|l] enviará ajuda, não é?\n\nÀ medida que o tempo passa e somos perseguidos por esses canalhas, evitando a batalha o máximo possível, fica dolorosamente claro que nenhum socorro virá."
 travel_events.2110.desc_negative: "Não sei o que eu esperava de um[province_liege.Custom('ES_XA')] [province_liege.Custom2('InsultNoun', ROOT.Char)] como [province_liege.GetFirstNameNoTooltip], mas isso é indigno até para [province_liege.GetSheHe]."
 travel_events.2110.desc_positive: "Sinto uma dor aguda no peito ao perceber a traição que acabou de ser realizada por [province_liege.Custom('ES_ElLa')] [province_liege.GetTitledFirstNameNoTooltip|l]."
 travel_events.2110.desc_neutral: "Como pode um governante permitir que cavaleiros malignos como estes habitem as fronteiras?"
 travel_events.2110.desc_outro: "\n\nMeu [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] [knight_to_sacrifice.GetTitledFirstName|l] se aproxima de mim, um olhar solene em seus olhos. Ambos sabemos a tática que praticamos no passado."
 travel_events.2110.a: "Nós permanecemos como um."
 travel_events.2110.a_unscathed.tt: "Intacto"
 travel_events.2110.a_unscathed.desc: "Você sobrevive à batalha ileso"
 travel_events.2110.a_injured.tt: "Machucado"
 travel_events.2110.a_injured.desc: "Você sobrevive à batalha, mas fica ferido"
 travel_events.2110.a_severely_injured.tt: "Gravemente Ferido"
 travel_events.2110.a_severely_injured.desc: "Você fica gravemente ferido na batalha"
 travel_events.2110.a_death: "Você é morto em batalha"
 travel_events.2110.b: "[knight_to_sacrifice.GetFirstNameNoTooltip], você sabe o que fazer."
 travel_events.2110.b_tt: "[knight_to_sacrifice.GetShortUIName] fica para trás para distrair os atacantes"
 #County Liege: You observe the attack on Travelling Ruler
 travel_events.2111.t: "$travel_danger_prefix$ $travel_events.2110.t$"
 travel_events.2111.desc_sacrifice: "O sol se põe sobre a [holding_location.GetTerrain.GetNameNoTooltip|l] enquanto observo a cena à minha frente. Se eu esperava uma batalha em grande escala, estava enganado.\n\nParece que [travelling_ruler.Custom('ES_ElLa')] [travelling_ruler.GetTitledFirstName|l] tenha ordenado um disfarce e uma retirada, o que significa que um[knight_to_sacrifice.Custom('ES_OA')] dos seus [travelling_ruler.Custom('KnightCulturePluralNoTooltipLowercase')] fica para trás para salvar a retaguarda do grupo. Enquanto isso, o grupo de viajantes se reorganizou e está avançando em direção à extremidade mais distante dos limites da cidade.\n\nParece que está funcionando, já que os cavaleiros ignoram o grupo em fuga e, em vez disso, se concentram em [Select_CString( knight_to_sacrifice.IsFemale, 'la guerrera solitaria', 'el guerrero solitario' )], engolindo[knight_to_sacrifice.GetHerHim] completamente, da minha perspectiva. Espero que o fim tenha sido rápido."
 travel_events.2111.desc_unscathed: "Assim como o sol tinge o céu de vermelho quando se põe atrás do horizonte, a batalha à minha frente tinge o chão de vermelho. No entanto, parece que esse vermelho é apenas o sangue dos bandidos.\n\nO grupo viajante está demonstrando uma habilidade surpreendente diante de um ataque repentino, e luta com unhas e dentes — acabando por fazer aqueles canalhas fugirem. Eles simplesmente largam as armas e recuam rapidamente pelo caminho de onde vieram.\n\n[travelling_ruler.GetTitledFirstName|l] faz um gesto desafiador na direção do meu domínio, e ergo as sobrancelhas em surpresa silenciosa. Isso foi #EMP no#! me lo esperaba."
 travel_events.2111.desc_survived: "Quando o sol se põe sobre o/a [holding_location.GetTerrain.GetNameNoTooltip|l], os dois grupos se convergem em uma massa de armas e dor. Observo como o choque inicial do grupo de viajantes se dissipa e eles se recuperam diligentemente, fazendo os cavaleiros armados recuarem.\n\n[travelling_ruler.Custom('ES_ElLa')|U] [travelling_ruler.GetTitledFirstName|l] se coloca à frente e o contra-ataque se abate, rápido e mortal, sobre os bandidos imundos. No entanto, um desses canalhas parece conseguir desferir um golpe bastante grave em [travelling_ruler.GetFirstNameNoTooltip], mas logo é retaliado por um dos seus [travelling_ruler.Custom('KnightCulturePluralNoTooltipLowercase')].\n\nOs cavaleiros que ainda respiram e conseguem partir deixam a cena tão rápida e subitamente quanto apareceram. Em seu rastro, corpos e animais mortos; mas também um grupo de viajantes surpreendentemente saudável."
 travel_events.2111.desc_died: "Assim como o sol tinge o céu de vermelho quando se põe atrás do horizonte, a batalha à minha frente tinge o chão de vermelho. Observo ansiosamente, tentando descobrir qual lado leva vantagem.\n\nO dilema logo se esclarece quando um cavaleiro especialmente grande e corpulento ruge vitorioso e ergue os braços para o céu. Em uma mão ele segura uma lâmina, na outra… a cabeça [travelling_ruler.Custom('ES_DelDela')] [travelling_ruler.GetTitledFirstName|l]."
 travel_events.2111.desc_negative_outro: "\n\nSinto um suspiro de alívio. Por fim, semelhante [travelling_ruler.Custom2('InsultNoun', ROOT.Char)] deixa de ser uma dor de cabeça."
 travel_events.2111.desc_positive_outro: "\n\nPisco algumas vezes, sem compreender totalmente o que acabou de acontecer. Sim, suponho que este seja o fim para [travelling_ruler.GetSheHe]..."
 travel_events.2111.desc_outro: "\n\nEstou me sentindo surpreendentemente vazio[GetPlayer.Custom('ES_OA')] por ter presenciado o assassinato [travelling_ruler.Custom('ES_DelDela')] [travelling_ruler.GetTitledFirstName|l]. Vou ter de fazer alguma coisa com esses cavaleiros."
 travel_events.2111.a: "Táticas interessantes."
 travel_events.2111.a_compassionate: "O que eu fiz..."
 travel_events.2111.a_sadist: "Divertido!"
 travel_events.2111.a_dead: "Isso era inevitável, afinal."
