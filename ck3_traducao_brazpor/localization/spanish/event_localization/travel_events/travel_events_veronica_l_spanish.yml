l_spanish:
 #Grotesque Events
 travel_events.3000.t: "Criaturas Grotescas"
 travel_events.3000.desc: "Raramente vi [traveller_monk.Custom2('MyCharacterIntroduction', ROOT.Char)] tão empolgad[traveller_monk.Custom('ES_OA')]. Seus olhos parecem devorar um livro ricamente adornado; às vezes consigo dar uma espiada nos mapas em seu interior.\n\nCerta manhã, enfim ele se aproxima de mim com suas descobertas:\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], correm rumores de que a terra de [ROOT.Char.GetCurrentLocation.GetName] é o lar de pessoas extraordinárias! Diz-se que os [ROOT.Char.Custom('GetGrotesquePlural')] perambulam por essas cidades"."
 travel_events.3000.a: "Eu devo ver essas criaturas. #EMP Agora!#!"
 travel_events.3000.a.tt: "Você continuará procurando por essas criaturas"
 travel_events.3000.b: "Por favor, [traveller_monk.GetFirstNameNoTooltip], me conte mais sobre elas."
 travel_events.3000.c: "E quanto a elas? Já temos bastantes bizarrices em casa."
 travel_events.3000.d: "Eu devo vê-las e reportar minhas descobertas."
 travel_events.3000_interest_modifier: "Interesse nas Grotescas"
 grotesque_rush_modifier: "Impulso Grotesco"
 grotesque_scholar_modifier: "Impulso de Pesquisa Grotesca"
 satiated_curiosity: "Curiosidade Satisfeita"
 get_grotesque_cynocephalus: "cinocefalia, um homem com cabeça de cachorro,"
 get_grotesque_blemee: "blemee, uma pessoa sem cabeça com o rosto no peito,"
 get_grotesque_sciapod: "sciapod, uma criatura anã com um único pé grande,"
 get_grotesque_cynocephaly: "cinocefalia, pessoas com cabeça de cachorro,"
 get_grotesque_blemmyae: "blemmya, pessoas sem cabeça com o rosto no peito,"
 get_grotesque_sciapodes: "sciapodes, criaturas anãs com um único pé grande,"
 travel_events.3001.t: "Uma Decepção Grotesca"
 travel_events.3001.desc_intro: "Cada vez que chegamos a um novo assentamento, tiro um momento para olhar ao redor, tentando encontrar as criaturas grotescas que vi nos mapas de [traveller_monk.GetTitledFirstNameNoTooltip|l]."
 travel_events.3001.desc_cynical: "Uma chance de provar que [traveller_monk.GetSheHe] está errado."
 travel_events.3001.desc.fallback: "A curiosidade é simplesmente muito grande."
 travel_events.3001.desc.outro: "\n\nQuando chegamos a [grotesque_place.GetNameNoTooltip], [traveller_monk.GetSheHe] se aproxima de mim, segurando firmemente seu livro.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]…, seguimos todas as indicações, mas não encontramos essas criaturas em lugar nenhum. Ocorreu-me que talvez elas não sejam mais do que uma invenção"."
 travel_events.3001.a: "Oh... tudo bem..."
 travel_events.3001.b: "Você me #EMP prometeu#! que haveria monstros."
 travel_events.3001.b_sadistic: "Vou lhe ensinar a não mentir para seu[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLadyLord]."
 travel_events.3001.c: "Hah! Eu sabia!"
 travel_events.3001.d: "Elas #EMP devem#! estar em algum lugar."
 travel_events.3001.e: "Como as pessoas em casa vão saber que elas #EMP não estavam#! aqui?"
 cryptid_obssessed: "Obcecado por Grotescas"
 travel_events.3001.e.success: "Você convence as pessoas sobre o que viu"
 travel_events.3001.e.failure: "Ninguém acredita em suas aventuras grotescas"
 cryptid_obssessed_rush: "Pressa Obsessiva por Grotescas"
 #Pet Travel Events
 travel_events.3010.t: "Rumo à Terra Natal"
 travel_events.3010.intro: "Após um longo dia de viagem, o horizonte começa a tingir-se com cores quentes. Eu tiro um momento para pausar, fechar os olhos, respirar.\n\n"
 travel_events.3010.desc: "\"Cuidado!\" grita [pet_rescuer.Custom2('MyCharacterIntroduction', ROOT.Char)], apontando para o [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l] além do caminho que seguimos.\n\nO que parece ser um pequeno roedor está correndo em direção à mata,"
 travel_events.3010.alone: "Espere! Onde está [ROOT.Char.Custom( 'DogStoryName' )]? Não o vejo há… Suspiro, quando percebo movimento em uma área de [ROOT.Char.Custom( 'DogStoryHerHim' )] além do caminho![ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l]O que parece ser um pequeno roedor corre para a natureza selvagem\n\n"
 travel_events.3010.exotic: "e algo #EMP perigosamente familiar#! segue logo atrás."
 travel_events.3010.cat: "e, após ele, uma figura [ROOT.Char.Custom('CatFurColor')] que reconheço facilmente."
 travel_events.3010.dog: "e, após ele, uma figura [ROOT.Char.Custom('DogFurColor')] que reconheço facilmente."
 travel_events.3010.a_dog: "Não! [ROOT.Char.Custom( 'DogStoryName' )]! [pet_rescuer.GetTitledFirstNameNoTooltip|l][ROOT.Char.Custom('DogStoryHerHim')]!"
 travel_events.3010.a_cat: "Não! [ROOT.Char.Custom( 'CatStoryName' )]! [pet_rescuer.GetTitledFirstNameNoTooltip|l]! Segua[ROOT.Char.Custom('CatStoryHerHim')]!"
 travel_events.3010.a_exotic: "[pet_rescuer.GetTitledFirstNameNoTooltip|l], pegue meu animal de estimação antes que alguém acabe machucado!"
 travel_events.3010.a.success: "[pet_rescuer.GetTitledFirstNameNoTooltip|l] encontra seu animal de estimação"
 travel_events.3010.a.failure: "[pet_rescuer.GetTitledFirstNameNoTooltip|l] se perde ao tentar encontrar seu animal de estimação"
 travel_events.3010.a.failure_toast: "[pet_rescuer.GetTitledFirstNameNoTooltip|l] se perdeu tentando encontrar seu animal de estimação"
 travel_events.3010.b.tt1: "Seu animal de estimação nunca mais será visto"
 travel_events.3010.b.tt2: "Seu animal de estimação encontrará o caminho de volta"
 travel_events.3010.b.tt3: "Você encontra seu animal de estimação e algo mais"
 travel_events.3010.b_dog: "[ROOT.Char.Custom( 'DogStoryName' )] é mais esperto do que todos nós, 'vai encontrar o caminho de volta."
 travel_events.3010.b_cat: "[ROOT.Char.Custom( 'CatStoryName' )] é mais esperto do que todos nós, 'vai encontrar o caminho de volta."
 travel_events.3010.b_exotic: "#EMP Pft!#! Se algo, são as pessoas dessas terras que deveriam se preocupar."
 ill_find_you: "Eu vou te encontrar pessoalmente, meu querido"
 travel_events.3010.c_dog: "$ill_find_you$ [ROOT.Char.Custom( 'DogStoryName' )]!"
 travel_events.3010.c_cat: "$ill_find_you$ [ROOT.Char.Custom( 'CatStoryName' )]!"
 travel_events.3010.c_exotic: "Embora perigoso, ele ainda é o meu menino perdido! Eu vou te encontrar!"
 travel_events.3010.c.success: "Você encontra seu animal de estimação"
 travel_events.3010.c.failure: "Você se perde ao tentar encontrar seu animal de estimação"
 travel_events.3010.c.failure_toast: "Você se perdeu tentando encontrar seu animal de estimação"
 after_him: "Rápido! #EMP Todos#! atrás de"
 travel_events.3010.e_dog: "$after_him$ [ROOT.Char.Custom('DogStorySheHe')]!"
 travel_events.3010.e_cat: "$after_him$ [ROOT.Char.Custom('CatStorySheHe')]!"
 travel_events.3010.e_exotic: "$after_him$ dele!"
 travel_events.3010.d: "Algumas almas nunca foram destinadas a ser mantidas em cativeiro. Vá, meu amigo."
 pet_rescue_modifier: "Atraso na Busca por Animais de Estimação"
 travel_events.3010.b.tt: "Pode voltar por conta própria..."
 travel_events.3011.t: "Aqui Você Está!"
 travel_events.3011.intro: "Não é preciso muito para rastrear os rosnados e os galhos quebrados até sua origem."
 travel_events.3011.exotic: "Meu querido caçador está sentado sobre uma folhagem, lambendo as patas ensanguentadas de sua vítima.\n\nO esquilo está quase irreconhecível, bem ao lado dele."
 travel_events.3011.dog: "[ROOT.Char.Custom( 'DogStoryName' )] se senta sobre a serrapilheira, lambendo do sangue da vítima as patas de cor [ROOT.Char.Custom( 'DogFurColor' )].\n\nO esquilo está quase irreconhecível, bem ao lado dela."
 travel_events.3011.cat: "[ROOT.Char.Custom( 'CatStoryName' )] fica sobre a serapilheira, lambendo as patas de cor [ROOT.Char.Custom( 'CatFurColor' )].\n\nO esquilo está quase irreconhecível, bem ao lado dele."
 travel_events.3011.a: "Hah! Eu sabia que você teria sucesso! Bem feito!"
 travel_events.3011.b: "Nunca vou tirar os olhos de você novamente."
 adventurous_pet_modifier: "Animal de Estimação Aventureiro"
 travel_events.3012.t: "Rumo à Terra Natal: Aqui Você Está...?"
 travel_events.3012.exotic: "\n\nEle levanta os olhos para mim. Exceto que parece não ser capaz de me reconhecer."
 travel_events.3012.dog: "\n\n[ROOT.Char.Custom('DogStorySheHe')|U] ergue o olhar para mim. Só que parece ser incapaz de me reconhecer."
 travel_events.3012.cat: "\n\n[ROOT.Char.Custom('CatStorySheHe')|U] levanta o olhar para mim. Só que parece incapaz de me reconhecer."
 travel_events.3012.a: "Vejo que você encontrou um lar melhor para você. Você está livre para ir."
 travel_events.3012.c: "Eu não esperava menos de você, meu amigo."
 feral_pet_modifier: "Animal de Estimação Selvagem"
 feral_pet_love_modifier: "Adorável Animal de Estimação Selvagem"
 #Encounters in Distant Court Events
 travel_events.3020.t: "Um Caloroso Bem-Vindo"
 travel_events.3020.desc: "Música toca para nós quando chegamos e bobos fazem malabarismos perigosamente perto de uma fogueira. As crianças ficam em silêncio no momento em que nos veem e nos apontam timidamente por trás dos pais. [foreign_ruler.Custom('ES_ElLa')] [foreign_ruler.GetTitledFirstName|l] sorri para mim do estrado.\n\n"Meu [Select_CString( ROOT.Char.IsFemale, 'admirada amiga', 'admirado amigo' )]!", ele se aproxima de mim, com os braços abertos em um gesto de convite. "Temos esperado por vocês desde o momento em que soubemos da sua chegada. Por favor, eu imploro, fiquem conosco pelo tempo que desejarem e digam uma palavra se precisarem de algo"."
 travel_events.3020.a: "Poderíamos usar ajuda em nossa jornada para [next_province.GetNameNoTooltip]."
 travel_events.3020.a_home: "Poderíamos usar ajuda em nossa jornada de volta para casa."
 travel_events.3020.b: "Estamos um pouco carentes de suprimentos, agora que você mencionou..."
 travel_events.3020.b.success: "Você convence [foreign_ruler.Custom('ES_AlAla')] [foreign_ruler.GetTitledFirstNameNoTooltip|l] a lhe emprestar alguns suprimentos extras"
 travel_events.3020.b.failure: "As suas exigências são insultantes para [foreign_ruler.Custom('ES_ElLa')] [foreign_ruler.GetTitledFirstNameNoTooltip|l]"
 travel_events.3020.c: "Alguns guardas a mais são sempre uma boa ideia."
 travel_events.3020.c.success: "Voc? persuade [foreign_ruler.Custom('ES_AlAla')] [foreign_ruler.GetTitledFirstNameNoTooltip|l] a lhe emprestar alguns guardas extras"
 travel_events.3020.d: "Eu adoraria aproveitar sua companhia por um pouco mais de tempo."
 travel_events.3020.d.tt: "Você aproveitará a hospitalidade [foreign_ruler.Custom('ES_DelDela')] [foreign_ruler.GetTitledFirstNameNoTooltip|l] por mais duas semanas"
 travel_events.3020.e: "Poderíamos discutir esses assuntos melhor... em seus aposentos."
 travel_events.3020.e.success: "[foreign_ruler.GetFirstNameNoTooltip] aceita seus avanços"
 travel_events.3020.e.failure: "[foreign_ruler.GetFirstNameNoTooltip] rejeita seus avanços"
 travel_events.3020.f: "Você não vai me enganar com sua falsa hospitalidade! Estou fora!"
 more_supplies_modifier: "Auxílio de Suprimentos"
 more_men_modifier: "Auxílio Militar"
 travel_events.3021.t: "Sobre Assuntos Religiosos"
 travel_events.3021.intro: "\"Ah, aqui está você!\", [foreign_ruler.GetTitledFirstName|l] faz um gesto para que eu me aproxime de [foreign_ruler.GetSheHe] quando entro no salão do trono.\n\n\"Estávamos esperando por você! [foreign_theologian.GetTitledFirstName|l] é meu cortesã[foreign_theologian.Custom('ES_OA')] de maior virtude e eu realmente apreciaria ouvir vocês dois discutindo assuntos elevados."
 travel_events.3021.different_faiths: "Diga-me, por que alguém deveria considerar [ROOT.Char.GetFaith.GetName|l] mais verdadeira do que [foreign_theologian.GetFaith.GetName|l]?"
 travel_events.3021.same_faith: "Vamos falar sobre a natureza do [ROOT.Char.GetFaith.HighGodName]."
 travel_events.3021.a: "Eu aceito prontamente este desafio."
 travel_events.3021.a.success: "Você convence[foreign_theologian.Custom('ES_AlAla')] [foreign_theologian.GetTitledFirstNameNoTooltip|l] em um duelo dialético"
 travel_events.3021.a.failure: "[foreign_ruler.Custom('ES_ElLa')|U] [foreign_theologian.GetTitledFirstNameNoTooltip|l] apresenta um argumento muito mais forte"
 travel_events.3021.b: "Deixarei que [your_theologian.Custom('ES_ElLa')] hábil [your_theologian.GetTitledFirstNameNoTooltip|l] assuma este desafio."
 travel_events.3021.b.success: "[your_theologian.Custom('ES_ElLa')|U] [your_theologian.GetTitledFirstNameNoTooltip|l] convence [foreign_theologian.Custom('ES_AlAla')] [foreign_theologian.GetTitledFirstNameNoTooltip|l] em um duelo dialético"
 travel_events.3021.c: "Eu não tenho tempo para essa absurda discussão."
 travel_events.3021.d: "Ouro sempre vence qualquer discussão..."
 travel_events.3021.d.tt: "Você suborna [foreign_theologian.Custom('ES_AlAla')] [foreign_theologian.GetTitledFirstNameNoTooltip|l] para que te deixe ganhar."
 nick_the_discussant: "o/a Debatedor[CHARACTER.Custom('ES_XA')]"
 dismissed_religious_debate: "Saiu do Tribunal Antes"
 travel_events.3022.t: "Uma Celebração"
 travel_events.3022.desc: "Guirlandas exuberantes de flores enfeitam a sala do trono; à luz aveludada das velas, os convidados cantam em voz alta.\n\n"Ah, aí estáis!", aplaude [foreign_ruler.Custom('ES_ElLa')] [foreign_ruler.GetTitledFirstName|l], fazendo com que cantores e instrumentistas se calem.\n\n"Estávamos prestes a começar uma dança em sua homenagem, [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Deem-se todos as mãos! Formem um círculo!"."
 travel_events.3022.a: "Com prazer, vou me juntar a vocês!"
 travel_events.3022.b: "#EMP Aha!#! Eu estava esperando por um momento assim!"
 travel_events.3022.b.success: "Você impressiona a corte [foreign_ruler.Custom('ES_DelDela')] [foreign_ruler.GetTitledFirstNameNoTooltip|l] com seus movimentos de dança"
 travel_events.3022.b.failure: "Você faz papel de bobo diante da corte de [foreign_ruler.Custom('ES_DelDela')] [foreign_ruler.GetTitledFirstNameNoTooltip|l]"
 travel_events.3022.c: "Prefiro apenas ouvir algumas conversas..."
 non_dancer_secret.desc: "Você descobre um [secret|lE]"
 travel_events.3022.d: "Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] não dança: observa."
 vigorous_dancer_modifier: "Dançarino Vigoroso"
 vigorous_dancer_modifier.desc: "O domínio deslumbrante deste personagem sobre as danças mais animadas os inspira a praticar frequentemente e a impressionar sempre que possível."
 #Infatuated Knight event
 travel_events.3030.t: "Um Agrado Estrangeiro"
 travel_events.3030.desc: "Não é a primeira vez que vejo a [fleeing_knight.Custom2('MyCharacterIntroduction', ROOT.Char)] brincando com algumas flores que ele/ela vem colhendo pelo caminho. Eu juraria que às vezes até [fleeing_knight.GetHerHim] ouvi suspirar ao contemplar a posse de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip].\n\n"Meu [ROOT.Char.Custom('GetCourtOwner')]", diz. "Não é segredo que meu coração encontrou um novo lar longe de casa. Ah, minha alma suspira por [foreign_lady_scope.Custom('ES_ElLa')] [foreign_lady_scope.GetTitledFirstName|l], meus desejos não têm fim, seus olhos, seus cabelos… Só anseio por uma saudação, morreria por uma palavra. Por favor, eu imploro, deixai-me ficar com [foreign_lady_scope.GetSheHe]"."
 travel_events.3030.a: "Quem sou eu para interferir em assuntos superiores?"
 travel_events.3030.b: "Você está vindo para casa #EMP comigo#!."
 travel_events.3030.c: "Não temos tempo para essas infatuações juvenis."
 travel_events.3030.c.success: "[fleeing_knight.GetHerHim|U] você convence para que fique"
 travel_events.3030.c.failure: "Suas palavras o abandonam."
 travel_events.3030.d: "Temos espaço de sobra em nossa [ROOT.Char.Custom('GetCourt')] para [Select_CString(And(fleeing_knight.IsFemale, foreign_lady_scope.IsFemale),'las','los')] dos."
 travel_events.3030.e: "Seus olhos são certamente belos, e seu cabelo parece tão macio…"
 travel_events.3030.f: "Eu #EMP odeio#! amor. Cortem-lhes as cabeças."
 #Curious Bishop event
 travel_events.3040.t: "Interesses Perigosos"
 travel_events.3040.desc: "Todas as manhãs desde que chegamos a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], [bishop.Custom2('MyCharacterIntroduction', ROOT.Char)] deixa sua liteira e se afasta silenciosamente do meu olhar. Desta vez decido seguir[bishop.GetHerHim] e o [bishop.GetHerHim] encontro em uma animada conversa com [foreign_bishop.Custom('ES_ElLa')] [foreign_bishop.Custom('GetActualBishopTitle')] local, [foreign_bishop.GetFirstName].\n\nA cerimônia começa e a luz das velas ilumina [foreign_bishop.GetFirstNameNoTooltip] enquanto as sombras brincam nas paredes como folhas de outono. «[bishop.GetFirstNameNoTooltip]», [bishop.GetHerHim] chamo após o serviço. «O que estás fazendo?».\n\n«[ROOT.Char.Custom('FormOfAddressForLiege')|U], me ocorreu que pode haver mais de uma verdade»."
 travel_events.3040.a: "A cerimônia foi certamente impressionante..."
 travel_events.3040.b: "Isso é um #EMP absurdo!#!"
 travel_events.3040.c: "Há espaço para um debate tranquilo aqui."
 travel_events.3040.c.success: "Você convence [bishop.GetFirstNameNoTooltip] de que só há uma verdade."
 travel_events.3040.c.failure: "[bishop.GetFirstNameNoTooltip] está irritado com a sua mente estreita."
 travel_events.3040.d: "Não há espaço para tranquilidade aqui! Desembainhe sua espada!"
 travel_events.3040.d.success: "Seus braços fortes convencem [bishop.GetShortUIName]."
 travel_events.3040.d.failure: "[bishop.GetShortUIName] está irritado com a sua violência."
 broadened_horizons_modifier: "Horizontes Ampliados"
 firm_convictions_modifier: "Convicções Firmes"
 #The Hermit events
 travel_events.3060.t: "O Eremita"
 travel_events.3060.desc.intro: "Uma gruta emerge da vegetação como um arco de pedra em uma catedral. Na entrada, há uma pequena mesa de madeira e uma barraca; alguém deixou uma lanterna acesa sobre ela."
 travel_events.3060.desc.travel_leader: "\n\nCuidado, [ROOT.Char.Custom('FormOfAddressForLiege')], [travel_leader.Custom('ES_ElLa')] [travel_leader.GetTitledFirstName|l] ergue o braço à altura do meu peito. Há bandidos nestas terras.\n\nQuanta pressa para acusar os outros, uma figura mal iluminada aparece na entrada da caverna. Não sou mais do que [Select_CString( hermit_scope.IsFemale, 'uma eremita', 'um eremita' )] e vós… deveis ser um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 travel_events.3060.desc.on_your_own: "O esconderijo de um excluído, talvez, ou a toca de um bandido?\n\n"Não tema, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]", uma figura fracamente iluminada está na entrada da caverna. "Sou apenas [Select_CString( hermit_scope.IsFemale, 'uma eremita', 'um eremita' )] que busca sabedoria nestes velhos bosques.""
 travel_events.3060.a: "Um eremita seria uma ótima adição ao meu séquito."
 travel_events.3060.b: "Que sorte! Por favor, me fale sobre o meu futuro."
 travel_events.3060.c: "Vamos... vamos embora."
 impending_doom_modifier: "Doom Iminente"
 impending_doom_modifier_desc: "Este personagem sente um senso de doom iminente após ignorar um eremita."
 ignored_hermit: "Eremita Ignorado"
 hermit_tells_your_future_tt: "Você receberá uma profecia..."
 travel_events.3061.t: "[Select_CString( hermit_scope.IsFemale, 'La ermitaña', 'El ermitaño' )]: uma profecia"
 travel_events.3061.intro: "[Select_CString( hermit_scope.IsFemale, 'La ermitaña', 'El ermitaño' )] demora um segundo antes de responder. Levanta-se e espera até que eu o acompanhe. Há algumas ervas espalhadas ao redor do que parece ser um leito rudimentar. [hermit_scope.GetSheHe|U] vira-se para mim quando estamos longe do meu séquito e, com uma voz estranhamente mais grave, responde:\n\n"
 travel_events.3061.desc_good: "\"Você encontrará aquele que procura.\""
 travel_events.3061.desc_normal: "\"O fogo falará e prata fluirá do casco do gado mugindo.\""
 travel_events.3061.desc_bad: "\"A água passará, mas você não passará.\""
 travel_events.3061.a: "Que perspicaz."
 travel_events.3061.a.tt: "Você se lembrará disso"
 travel_events.3062.t: "Onde Está Meu Eremita?"
 travel_events.3062.desc: "[hermit_owner.GetTitledFirstName] nos recebe calorosamente quando vamos à sua torre. No entanto, seus guardas parecem rir e murmurar ao nos ver, apontando para nossa comitiva.\n\n«Meu querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip] [ROOT.Char.GetFirstNameNoTooltip]! É uma grande honra recebê-lo em meu…», [hermit_owner.GetFirstNameNoTooltip] para no meio da frase, seu rosto lívido. «O que estão fazendo com #EMP mi#! ermitã[hermit_scope.Custom('ES_OA')]?»."
 travel_events.3062.a: "Não tive a intenção de roubar vosso[hermit_scope.Custom('ES_OA')] cortesão[hermit_scope.Custom('ES_OA')] ."
 travel_events.3062.b: "Ora, agora é #EMP mi#! $cave_hermit_court_position$!"
 travel_events.3062.b.tt: "[hermit_scope.GetShortUIName] será mais barato para contratar como $cave_hermit_court_position$ pelos próximos #bold 5 anos#!"
 travel_events.3062.c: "Por que não deixamos [hermit_scope.GetSheHe] decidir a quem servir?"
 travel_events.3062.c.success: "Você convence [hermit_scope.GetShortUINameNoTooltip] a ficar com você"
 travel_events.3062.c.failure: "[hermit_scope.GetShortUINameNoTooltip] permanecerá na corte de [hermit_owner.GetShortUINameNoTooltip]"
 found_hermit_mod: "Salário do Eremita Encontrado"
 #Bandit event
 travel_events.3070.t: "$travel_danger_prefix$ Bandidos na Ponte"
 travel_events.3070.desc: "O suave murmúrio do rio que temos seguido há algum tempo agora fica mais forte. Alguns membros da comitiva falam em fazer uma breve parada, conseguir água fresca e descansar os pés.\n\nHá uma ponte de pedra numa curva do caminho. Um par de homens descansa com as costas apoiadas no parapeito; um acerta o outro de lado e aponta para o nosso grupo. Um[bandit_scope.Custom('ES_XA')] terceiro[bandit_scope.Custom('ES_XA')] [bandit_scope.GetWomanMan] sobe da margem, outro nos olha depois de cuspir no rio.\n\n\"Sabe,\" diz, \"na verdade esta é uma ponte de pedágio\"."
 travel_events.3070.a: "Eu entendo."
 travel_events.3070.b: "Corajoso da sua parte até mesmo sugerir isso. [knight_scope.GetTitledFirstNameNoTooltip|l], dê uma lição a ele."
 travel_events.3070.b.success: "[knight_scope.GetShortUINameNoTooltip] derrota os bandidos"
 travel_events.3070.b.failure: "Os bandidos atacam [knight_scope.GetShortUINameNoTooltip]"
 travel_events.3070.c: "Com quem você pensa que está falando? Eu sou #EMP [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip]#!!"
 travel_events.3070.c.success: "Você intimida os bandidos"
 travel_events.3070.c.failure: "Os bandidos não acreditam em você"
 #Knight Errant events
 travel_events.3080.t: "Um [knight_errant.Custom('KnightCultureNoTooltip')]-Errante"
 travel_events.3080.desc_intro: "É bem sabido que o povo de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] parece sentir uma devoção especial pelos [knight_errant.Custom('KnightCulturePluralNoTooltipLowercase')] e suas lendas.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", diz o [knight_errant.Custom('KnightCultureNoTooltipLowercase')], inclinando a cabeça. "É uma fortuna que vós e eu tenhamos nos encontrado nesta encruzilhada, pois estou em busca de uma fonte maravilhosa cujas águas dizem curar todas as doenças. Se me ajudardes em minha missão, eu vos prestarei homenagem"."
 travel_events.3080.desc_anagnorisis: "\n\n[same_culture_companion.Custom('ES_ElLa')|U] [same_culture_companion.GetTitledFirstName|l] se apressa em interromper: "Espere, [ROOT.Char.Custom('FormOfAddressForLiege')]! Conheço este [knight_errant.Custom('KnightCultureNoTooltipLowercase')]; é [knight_errant.GetFirstName]!"."
 travel_events.3080.a: "Eu nunca deixaria um [knight_errant.Custom('KnightCultureNoTooltipLowercase')] desamparado. Liderarei o caminho!"
 travel_events.3080.a.tt: "Você segue o [knight_errant.Custom('KnightCultureNoTooltipLowercase')]"
 travel_events.3080.b: "Una-se a mim e esqueça toda essa tolice."
 travel_events.3080.b.success: "Você convence o [knight_errant.Custom('KnightCultureNoTooltipLowercase')]"
 travel_events.3080.b.failure: "O [knight_errant.Custom('KnightCultureNoTooltipLowercase')] parte, sem convencer"
 travel_events.3080.c: "\"Uma armadura realmente bonita que você tem aí... que tal compartilhar uma moeda?\""
 travel_events.3080.d: ""[same_culture_companion.GetFirstNameNoTooltip], faça com que [knight_errant.GetFirstNameNoTooltip] entre em razão e se junte à nossa corte"."
 travel_events.3081.t: "Um [knight_errant.Custom('KnightCultureNoTooltip')]-Errante: A Busca"
 travel_events.3081.desc: "O [knight_errant.Custom('KnightCultureNoTooltipLowercase')] nos conduz até uma pequena clareira onde uma fonte natural brilha. A luz reflete na sua superfície com um brilho agradável e faz com que a água pareça tão brilhante que dá a sensação de ser um segundo sol.\n\n\"Cuidado, uma besta! Um guardião!\" o [knight_errant.Custom('KnightCultureNoTooltipLowercase')] aponta para um [ROOT.Char.Custom('GetAnimalType')], que está entre nós e a fonte."
 travel_events.3081.a: "\"Não tenha medo! Eu vou lutar contra ela\""
 travel_events.3081.a.success: "Você mata a besta"
 travel_events.3081.a.failure: "A besta te fere"
 travel_events.3081.b: "\"Eu vou distraí-la, pegue a água!\""
 travel_events.3081.b.success: "Sua distração funciona"
 travel_events.3081.c: "\"Agora, #EMP você#! será uma ótima distração.\""
 travel_events.3081.d: "Que aventura! Tão inspirador!"
 knight_errant_training_modifier: "Treinamento de Cavaleiro Errante"
 knight_errant_faith_modifier: "Lenda da Água Curativa"
 sacred_water_modifier: "Água Curativa"
 sacred_water_modifier_desc: "Dizem que esta água milagrosa cura todas as doenças."
 #Church Visiting Event
 travel_events.3090.t: "Portas Fechadas"
 travel_events.3090.desc_intro: "Ah, como me lembro das histórias do [church_visit_location.GetNameNoTooltip]'s [church_visit_holder.Custom('GetFaithTemple')], o quão alto ele se ergueria, uma fortaleza imponente de [ROOT.Char.GetFaith.HighGodName]. Pedras que poderiam construir um paraíso inteiro. Silêncio — e oração.\n\nUma paisagem desolada em tons de marrom da aldeia está diante de nós; ruas enlameadas, pavimento desgastado. Mas o [church_visit_holder.Custom('GetFaithTemple')] está lá. Como prometido."
 travel_events.3090.desc_zealous: "\n\nSuas cores beligerantes me fazem esquecer todos os sépias e a melancolia. Um desejo iminente de visitá-lo toma conta de mim."
 travel_events.3090.desc_cynical: "\n\nPelo menos é bonito de uma perspectiva estética."
 travel_events.3090.desc_outro: "\n\n"Er..., [ROOT.Char.Custom('FormOfAddressForLiege')]", um padre deixa um feixe de madeira perto de uma das paredes. "Minhas desculpas, mas o/a [church_visit_holder.Custom('GetFaithTemple')|l] está fechado(a) para a preparação de um(a) [activity.GetNameNoTooltip|l]"."
 travel_events.3090.a: "Eu vim até aqui para vê-lo #EMP e vou#!."
 travel_events.3090.a.success: "Você convence o padre local a abrir o [church_visit_holder.Custom('GetFaithTemple')]"
 travel_events.3090.a.failure: "Você falha em suas tentativas de persuasão"
 travel_events.3090.b: "Podemos simplesmente esperar até não haver ninguém por perto..."
 travel_events.3090.b.success: "Você entra com sucesso no [church_visit_holder.Custom('GetFaithTemple')]"
 travel_events.3090.b.success_desc: "Você descobre alguns documentos que não deveria ter visto..."
 travel_events.3090.b.failure: "Você é pego tentando entrar sorrateiramente no [church_visit_holder.Custom('GetFaithTemple')]"
 travel_events.3090.c: "Homens, arrombem a porta se for necessário."
 travel_events.3090.d: "Bem, isso é infeliz. Vamos continuar nossa viagem."
 ignored_church: "Templo Ignorado"
 building_temple_church: "igreja"
 building_temple_mosque: "mesquita"
 building_temple_temple: "templo"
 building_temple_monastery: "monastério"
 #Weak Steppe Horses Events
 travel_events.3100.t: "$travel_danger_prefix$ Montarias Frágeis"
 travel_events.3100.desc_intro: "Sabíamos que viajar pelas estepes de [horses_steppe_location.GetName] não seria fácil. Marchamos até a noite sem parar, chegando ao nosso próximo destino tão tarde que nem jantamos. Nossos cavalos relincham, recusando-se a sair da água sempre que encontramos um riacho."
 travel_events.3100.desc_steppe: "Embora estejam acostumados com a estepe em casa, eles ainda são animais e precisam de descanso."
 travel_events.3100.desc_outro: "\n\nUm comerciante local logo se aproxima ao ouvir nossas queixas e aponta para um celeiro de madeira atrás de [local_merchant.GetSheHe], cheio de cavalos locais.\n\n\"Tenho as melhores montarias que vocês jamais encontrarão! São robustas e resistentes\"."
 travel_events.3100.a: "Que sorte! Me dê seus melhores garanhões!"
 travel_events.3100.b: "Eles terão que aguentar. Sem mais despesas."
 travel_events.3100.b.success: "Seus cavalos sobrevivem à viagem"
 travel_events.3100.b.failure: "Seus cavalos precisam parar constantemente"
 travel_events.3100.c: "Talvez possamos pegá-los de #EMP graça#!..."
 travel_events.3100.c.success: "Você consegue roubar os cavalos"
 travel_events.3100.c.failure: "O mercador obriga você a pagar pelo roubo"
 travel_events.3100.d: "Hah! #EMP Esses#! cavalos já viram coisas piores!"
 bought_horses_modifier: "Cavalos Melhores"
 pushed_horses_good_modifier: "Cavalos Empurrados com Sucesso"
 pushed_horses_bad_modifier: "Cavalos Empurrados"
 tour_travel.3110.t: "Uma Parada no Caminho"
 tour_travel.3110.desc: "Ao caminhar pelas ruas lamacentas de [ghino_di_tacco_location.GetName] as pessoas são raras. Casas vazias, em ruínas. Uma criança brinca em silêncio com um cachorro e se esconde quando vê nossa comitiva. Um sacerdote local aponta para a casa de seu [ghino_di_tacco_scope.GetLadyLord] e nós o seguimos.\n\nMeu admirad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]! [ghino_di_tacco_scope.Custom('ES_ElLa')] [ghino_di_tacco_scope.GetTitledFirstName|l] nos recebe em um corredor empoeirado.\n\nÉ uma grande honra recebê-los em nosso humilde domínio. Se quiserem, por favor, fiquem para passar a noite e juntem-se a nós para o jantar!"
 tour_travel.3110.a: "\"Aceitarei com prazer seu convite.\""
 tour_travel.3110.a.tt: "Você aceita o convite para o banquete"
 tour_travel.3110.b: "\"Isso... não está de acordo com os meus padrões. Precisamos continuar nossa jornada.\""
 tour_travel.3110.c: "\"Nada me faria mais feliz! Eu até trouxe meu próprio $court_jester_court_position$."
 tour_travel.3111.t: "Uma Parada no Caminho: O Banquete"
 tour_travel.3111.desc_intro: "As lâmpadas de óleo lançam uma luz tão fraca que é quase imperceptível. Um criado idoso nos serve a comida: peixe sem tempero.\n\n[ghino_di_tacco_scope.Custom('ES_ElLa')|U] [ghino_di_tacco_scope.GetTitledFirstNameNoTooltip|l] parece nervoso demais[ghino_di_tacco_scope.Custom('ES_OA')], falando das dificuldades de governar uma região tão pobre, com uma tributação impossível. \"O último sacerdote que tivemos foi embora depois de apenas alguns meses\", murmura, afastando o vinho aguado.\n\n"
 tour_travel.3111.desc_breaking_down: "Imediatamente depois, [ghino_di_tacco_scope.GetSheHe] desaba em l?grimas e enterra o rosto nas m?os. "Devo... ser sincer[ghino_di_tacco_scope.Custom('ES_OA')] convosco. Minha inten??o ao convidar-vos aqui era roubar-vos, meu/minha [ROOT.Char.GetLadyLord]. Espero que possais me perdoar.""
 tour_travel.3111.desc_committed: "[ghino_di_tacco_scope.GetSheHe|U] se desculpa rapidamente por precisar ir à latrina, esbarrando acidentalmente em mim no caminho."
 tour_travel.3111.a: "\"Aqui, pegue isso e nunca mais roube.\""
 tour_travel.3111.b: "\"Vamos todos esquecer que isso aconteceu.\""
 tour_travel.3111.c: "\"Agora #EMP você#! vai pagar por isso.\""
 tour_travel.3111.d: "\"Meus guardas vão conversar com você.\""
 tour_travel.3111.e: "\"Espere... o que você está fazendo?\""
 tour_travel.3111.e.success: "Você percebe que [ghino_di_tacco_scope.GetFirstNameNoTooltip] está tentando roubar seus bolsos"
 tour_travel.3111.e.failure: "Você não percebe que [ghino_di_tacco_scope.GetFirstNameNoTooltip] te roubou"
 generous_donations_modifier: "Doações Generosas"
 #Forest Fire Events
 travel_events.3120.t: "$travel_danger_prefix$ Incêndio na [wooded_location.GetTerrain.GetNameNoTooltip]"
 travel_events.3120.desc: "Um agradável passeio por [wooded_location.GetTerrain.GetNameNoTooltip|l] de [wooded_location.GetNameNoTooltip] me faz apreciar de verdade a paisagem ao nosso redor: um verde luminoso, tão saturado quanto o vestido de uma dama feito da mais fina seda, os raios de sol, filtrados através da copa como ícor líquido.\n\nUm cheiro intenso. Talvez uma fogueira. Viro-me para meu séquito e observo o rosto lívido [Select_CString( travel_leader.IsFemale, 'da chefe', 'do chefe' )] da caravana de [travel_leader.GetFirstNameNoTooltip]. "#EMP FOGO!#!", grita, apontando para as chamas não tão distantes onde [endangered_character.GetNameNoTooltip] ficou preso[endangered_character.Custom('ES_OA')]."
 travel_events.3120.a: ""[travel_leader.GetFirstNameNoTooltip], salve[endangered_character.GetHerHim]!"."
 travel_events.3120.a.big_success: "[endangered_character.GetFirstNameNoTooltip] é resgatad"
 travel_events.3120.a.success: "[endangered_character.GetFirstNameNoTooltip] é resgatad com grande dificuldade"
 travel_events.3120.a.failure: "[endangered_character.GetFirstNameNoTooltip] não é resgatad"
 travel_events.3120.b: "Não há nada que possamos fazer..."
 travel_events.3120.c: "Eu vou salvar [endangered_character.GetFirstNameNoTooltip] eu mesmo!"
 travel_events.3120.d: "\"[prowess_entourage_member.GetFirstNameNoTooltip], vá você!\""
 travel_events.3120.d.big_success: "[prowess_entourage_member.GetFirstNameNoTooltip] resgata [endangered_character.GetFirstNameNoTooltip] ileso"
 travel_events.3120.d.success: "[prowess_entourage_member.GetFirstNameNoTooltip] consegue resgatar [endangered_character.GetFirstNameNoTooltip] com grande dificuldade"
 travel_events.3120.d.failure: "[prowess_entourage_member.GetFirstNameNoTooltip] não consegue resgatar [endangered_character.GetFirstNameNoTooltip]"
 #Rival Assassin Events
 travel_events.3130.t: "$travel_danger_prefix$ Encanto Assassino"
 travel_events.3130.desc: "Viajar pelas terras do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('rival_scope'))], [rival_scope.Custom('ES_ElLa')] [rival_scope.GetTitledFirstName|l], deixa meu séquito preocupado, até em pânico. Ao menor ruído desconhecido, pegamos em armas e, vejam só — há uma silhueta misteriosa entre nossas carroças!\n\n«Boa noite!», diz o intruso com um sorriso tímido [Select_CString( sexy_assassin.IsFemale, 'la desconocida', 'el desconocido' )], brincando com uma lâmina. «#EMP Ojalá#! nos tivéssemos conhecido em circunstâncias mais agradáveis…», acrescenta com um biquinho[sexy_assassin.Custom('ES_OA')]. «Ainda assim, [rival_scope.Custom('ES_ElLa')] [rival_scope.GetTitledFirstNameNoTooltip|l] deseja que eu lhe dê #EMP la bienvenida#!»."
 travel_events.3130.a: "\"Tolo! Farei você pagar por isso!\""
 travel_events.3130.a.success: "Seus guardas executam [Select_CString( sexy_assassin.IsFemale, 'a la asesina', 'al asesino' )]"
 travel_events.3130.a.failure: "O assassino te fere e escapa"
 travel_events.3130.b: ""Guardas! Peguem[sexy_assassin.GetHerHim]!""
 travel_events.3130.b.success: "Você vence o assassino e o envia de volta com uma carta"
 travel_events.3130.c: "\"Ou você poderia se juntar #EMP aos meus#! agentes...\""
 travel_events.3130.d: "\"Circunstâncias agradáveis, você diz...?\""
 travel_events.3130.e: "\"Vá. Eu não quero te ver novamente.\""
 executed_assassin_modifier: "Assassinato Evitado"
 sent_assassin_back_modifier: "Agentes Descobertos"
 #Army Tries to Capture Entourage Member Events
 travel_events.3140.t: "$travel_danger_prefix$ Uma Travessia Ruim"
 travel_events.3140.desc: "Cultivos queimados, campos estéreis. Os despojos da guerra. Nosso passo se acelera depois de vermos os primeiros cadáveres.\n\nO único caminho possível passa por um acampamento militar. Olho para trás: não há outro jeito. Faço um aceno com a cabeça para meus guardas, e eles retribuem o aceno, apertando com mais força as espadas.\n\nHá um comandante militar na entrada do acampamento: "Aliados do inimigo, hein?", pergunta, coçando o nariz, "poderiam nos dar um prisioneiro?", apontando claramente [entourage_member.Custom('ES_AlAla')] [entourage_member.GetTitledFirstName|l]."
 travel_events.3140.a: "Olhe para nossas bandeiras, nós não somos o inimigo."
 travel_events.3140.a.success: "Você convence o comandante"
 travel_events.3140.a.failure: "O comandante se recusa a ouvir"
 travel_events.3140.b: "Se quiserem [entourage_member.GetHerHim] terão que me encarar!"
 travel_events.3140.b.success: "Você vence a luta"
 travel_events.3140.b.failure: "O comandante vence a luta"
 travel_events.3140.c: "Talvez possamos chegar a um entendimento?"
 #Rival/Nemesis in Entourage Events
 travel_events.3150.t: "Sussurros Estranhos"
 travel_events.3150.desc: "Notei que [rival_scope.Custom('ES_ElLa')] [rival_scope.GetTitledFirstName|l] me evita mais do que o normal. Ele sempre se senta na extremidade oposta da mesa quando somos convidados para um banquete e recusa completamente minha companhia quando acampamos.\n\nTalvez não tenhamos a melhor das relações, mas essa atitude está começando a me cansar, especialmente quando [rival_scope.GetHerHim] o ouço me difamando: [ROOT.Char.GetFirstNameNoTooltip] é um [ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('rival_scope'))] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('rival_scope'))], eu seria muito melhor [ROOT.Char.GetTitleAsNameNoTooltip] do que [ROOT.Char.GetSheHe]."
 travel_events.3150.a: "Você quer saber como é? Eu vou te mostrar!"
 travel_events.3150.a.success: "Você vence contra [rival_scope.GetFirstNameNoTooltip] e o obriga a ir embora"
 travel_events.3150.a.failure: "[rival_scope.GetFirstNameNoTooltip] vence a luta e vai embora"
 travel_events.3150.b: "Chefe[travel_leader.Custom('ES_EA')] da caravana [travel_leader.GetFirstNameNoTooltip], cuide disso."
 travel_events.3150.b.success: "[travel_leader.GetFirstName] vence a luta e faz com que [rival_scope.GetFirstNameNoTooltip] vá embora"
 travel_events.3150.b.tt: "[travel_leader.GetFirstName] adverte [rival_scope.GetFirstName]"
 travel_events.3150.c: "Você vai terminar seus dias em uma masmorra."
 travel_events.3150.d: "Saia da minha vista. #EMP Agora.#!"
 travel_events.3150.e: "É o vento que eu estou ouvindo?"
 travel_humiliation_modifier: "Humilhação de Insurreição"
 #Crows Events
 travel_events.3160.t: "$travel_danger_prefix$ Um Grupo de Corvos"
 travel_events.3160.desc_battle: "A terra está encharcada de sangue. Nossos passos se tornam mais lentos, como se estivéssemos atravessando um pântano. Cadáveres ainda estão espalhados, esperando para serem recolhidos. A maioria deles certamente perdeu suas posses mais importantes agora, mas alguns dos homens insistem em revistá-los.\n\nConforme nos aproximamos dos corpos, vemos que não somos os únicos tentando fazê-lo, e um grupo de corvos grasnam ruidosamente para nós, mergulhando então no ar para me atacar."
 travel_events.3160.desc_fallback: "A floresta segue, o caminho também. E eu também. Ultrapassamos as primeiras árvores e é como entrar em um domínio diferente; as criaturas, a noite. Abrimos caminho pela vegetação e conversamos animadamente sobre nossas viagens, vemos pássaros e frutos.\n\nO vento agita as folhas, e seguimos adiante. Agora há mais ninhos nestes galhos.\n\nUm bando de corvos grasna ruidosamente e então mergulha no ar em direção a #EMP mí#!."
 travel_events.3160.desc_outro: "Cubro meu rosto com os braços e grito quando sinto seus bicos tentando entrar na minha pele."
 travel_events.3160.a: "[travel_leader.GetFirstNameNoTooltip]! Socorro!"
 travel_events.3160.b: "Pegue esse pão! Me deixe em paz!"
 travel_events.3160.c: "Eu vou mostrar para você!"
 travel_events.3160.c.success: "Você espanta os corvos"
 travel_events.3160.c.failure: "Os corvos conseguem te ferir"
