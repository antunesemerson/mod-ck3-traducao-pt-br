l_spanish:
 tribal.1001.t: "Um Desafiante"
 tribal.1001.desc_old: "\"Você envelheceu e ficou frac, [ROOT.Char.GetTitledFirstNameNoTooltip|l];"
 tribal.1001.desc_weak: "\"Você é #EMP frac#!, [ROOT.Char.GetTitledFirstNameNoTooltip|l];"
 tribal.1001.desc_meak: "\"Você é covarde como uma enguia, [ROOT.Char.GetTitledFirstNameNoTooltip|l];"
 tribal.1001.desc_fallback: "\"Você é indign de governar, [ROOT.Char.GetTitledFirstNameNoTooltip|l];"
 tribal.1001.desc: "É hora de que abdique!"\n\n[challenger.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima a mim diante de toda a tribo, proclamando seu desafio para que todos o ouçam.\n\n"A partir de agora, serei eu quem governará [ROOT.Char.GetPrimaryTitle.GetName]"."
 tribal.1001.a_child: "Coloque um pouco de coragem em suas palavras, [challenger.Custom('GirlBoy')]!"
 tribal.1001.a: "Coloque um pouco de coragem em suas palavras!"
 tribal.1001.a_champion: "[liege_champion.GetTitledFirstName] lutará por mim\n"
 tribal.1001.a_success: "Eu venço a luta"
 tribal.1001.a_failure: "Eu perco a luta"
 tribal.1001.a_champion_success: "[liege_champion.GetFirstNameNoTooltip] vence a luta"
 tribal.1001.a_champion_failure: "[liege_champion.GetFirstNameNoTooltip] perde a luta"
 tribal.1001.b: "Somente se você me vencer em um duelo de palavras!"
 tribal.1001.b_success: "Eu tenho os melhores insultos"
 tribal.1001.b_failure: "Me supera"
 tribal.1001.c: "Eu não lutarei contra você por isso..."
 tribal.1002.desc: "Temia que esse dia chegasse. Não posso lutar contra você, [liege_to_challenge.Custom2('RelationToMeShort', SCOPE.sC('challenger'))]."\n\n[liege_to_challenge.GetFirstName] me cede o governo sem oferecer resistência e, após um breve momento de confusão, a tribo celebra minha vitória."
 tribal.1002.a: "Eu... Eh... Obrigado(a)."
 tribal.1003.desc_opening: "\"Então você desafia meu direito de governar?!"
 tribal.1003.desc_old: "É melhor você ser capaz de sustentar suas palavras com coragem, [challenger.Custom('GirlBoy')]!\""
 tribal.1003.desc_young: "É melhor você ser capaz de sustentar suas palavras com coragem!\""
 tribal.1003.desc: "\n\n[liege_to_challenge.Custom2('MyCharacterIntroduction', ROOT.Char)|U] [liege_to_challenge.Custom('SignatureWeaponActionThirdPerson')] sua [liege_to_challenge.Custom('signature_weapon')] e dá um passo em minha direção. A tribo inteira se reúne ao redor de nós, tomada por emoção e medo em igual medida. Eu me posiciono e…"
 tribal.1003.desc_liege_champion: "\n\n[liege_champion.GetTitledFirstName], paladino de [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('liege_to_challenge'))] [liege_to_challenge.GetTitledFirstName|l], [liege_champion.Custom('SignatureWeaponActionThirdPerson')] sua [liege_champion.Custom('signature_weapon')] e dá um passo em minha direção. Toda a tribo se reúne ao nosso redor, o ar carregado de excitação e medo, enquanto amplio minha postura e…"
 tribal.1003.a: "… elevo minha [ROOT.Char.Custom('signature_weapon')]."
 tribal.1003.b: "… ergo as mãos e rio de forma constrangedora."
 tribal.1004.desc_opening: "M [liege_to_challenge.Custom2('RelationToMeShort', SCOPE.sC('challenger'))] [challenger.GetFirstName] [challenger.Custom('SignatureWeaponActionThirdPerson')] seu(a) [challenger.Custom('signature_weapon')] e dá um passo em minha direção. Toda a tribo está reunida ao nosso redor, com empolgação e medo no ar.\n\n"
 tribal.1004.desc: "Levanto minha [ROOT.Char.Custom('signature_weapon')] e ataco. #EMP Desvio, avanço, finta... Ugh!#! Com [challenger.Custom('SignatureWeaponActionReaction')] [challenger.GetFirstNameNoTooltip] [challenger.Custom('SignatureWeaponCriticalPresent')] minha perna, e ao tropeçar percebo que acabou. A tribo não está mais torcendo por mim."
 tribal.1004.a: "Maldito seja você!"
 tribal.1005.desc: "Levanto mi [ROOT.Char.Custom('signature_weapon')] y ataco.\n\n#EMP Esquivar, presionar, fintar…#! Con [ROOT.Char.Custom('SignatureWeaponActionReaction')], logro [ROOT.Char.Custom('SignatureWeaponCritical')] su pierna y, al ver que cae, sé que ha terminado."
 tribal.1005.a: "Espero que você tenha aprendido a lição!"
 tribal.1014.desc_opening: "Meu [liege_to_challenge.Custom2('RelationToMeShort', SCOPE.sC('challenger'))] [challenger.GetFirstName] [challenger.Custom('SignatureWeaponActionThirdPerson')] seu [challenger.Custom('signature_weapon')] e dá um passo em direção a [liege_champion.GetTitledFirstName|l]. A tribo inteira nos cerca, o ar se enche de empolgação e medo.\n\n"
 tribal.1014.desc: "[liege_champion.GetTitledFirstName] ergue sua [liege_champion.Custom('signature_weapon')] e ataca. #EMP Esquivar, presionar, fintar… Ay!#! Com [challenger.Custom('SignatureWeaponActionReaction')] [challenger.GetFirstNameNoTooltip] [challenger.Custom('SignatureWeaponCriticalPresent')] a perna de [liege_champion.GetFirstName] e, ao tropeçar e cair, sei que acabou. A tribo já não vibra por mim."
 tribal.1014.a: "Maldito seja você!"
 tribal.1015.desc: "[liege_champion.GetTitledFirstName] ergue sua [liege_champion.Custom('signature_weapon')] e ataca.\n\n #EMP Esquivar, presionar, fintar…#! Com [liege_champion.Custom('SignatureWeaponActionReaction')] [liege_champion.GetSheHe] [liege_champion.Custom('SignatureWeaponCriticalPresent')] a perna [challenger.Custom('ES_DelDela')] [challenger.GetTitledFirstName|l] e, ao ver que cai, sei que acabou."
 tribal.1015.a: "Espero que você tenha aprendido a lição!"
 tribal.1006.desc_old: "É melhor você conseguir reivindicar sua posição com habilidade, [challenger.Custom('GirlBoy')]!"
 tribal.1006.desc_young: "É melhor você conseguir reivindicar sua posição com habilidade!"
 tribal.1006.desc: "Assim que [liege_to_challenge.Custom2('MyCharacterIntroduction', ROOT.Char)|U] proclama o flyting, toda a tribo se aproxima para assistir à competição de insultos.\n\nQuando [liege_to_challenge.GetFirstNameNoTooltip] dá um passo à frente e limpa a garganta, o silêncio toma conta.\n"
 tribal.1006.a: "Isso é o que você chama de insulto? Vou te mostrar!"
 tribal.1006.a_success: "Você vence o flyting"
 tribal.1006.a_failure: "Você perde o flyting"
 tribal.1006.b: "Isso... Isso foi um erro."
 tribal.1007.desc_ending: "\n\nA confusão que se segue é ensurdecedora, e eu sei que perdi."
 tribal.1007.a: "Maldito seja você!"
 tribal.1008.desc: "A tribo se reúne para testemunhar o flyting entre meu [liege_to_challenge.Custom2('RelationToMeShort', SCOPE.sC('challenger'))] [challenger.GetFirstName] e eu. Murmúrios de empolgação podem ser ouvidos quando [challenger.GetFirstNameNoTooltip] dá um passo à frente e limpa a garganta.\n"
 tribal.1008.desc_ending: "\n\nSegue-se um silêncio chocado e constrangedor."
 tribal.1008.a: "Isso é o que você chama de insulto? Saia daqui."
 tribal.1010.desc: "La tribu se reúne para ver el flyting entre mi [liege_to_challenge.Custom2('RelationToMeShort', SCOPE.sC('challenger'))] [challenger.GetFirstName] y yo, pero, en cuanto aparece [challenger.GetSheHe], empieza a poner excusas.\n\n«Era… ha sido un malentendido, claro que no te desafiaría jamás. Perdóname»."
 tribal.1010.a: "Covarde."
 tribal.1022.trigger_failure.challenger: "Meu [single_combat_duel|lE] contra [liege_to_challenge.GetFirstNameNoTooltip] foi invalidado"
 tribal.1022.trigger_failure.liege_to_challenge: "Meu [single_combat_duel|lE] contra [challenger.GetFirstNameNoTooltip] foi invalidado"
 tribal.1101.t: "Holmgang"
 tribal.1101.desc: "Meu rival, [rival.GetTitledFirstName|l], levanta a cabeça quando entro no corredor. [victim.GetTitledFirstName|l], meu #EMP [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('victim'))]#! jaz em uma poça de sangue aos seus pés.\n\n"Ah, [ROOT.Char.GetFirstNameNoTooltip]. Acabei de deixar uma mensagem para você!"\n\n[victim.GetFirstNameNoTooltip] ainda está vivo, pelo que indicam seus gemidos de dor, mas até onde teria ido [rival.GetFirstNameNoTooltip] se eu não o tivesse interrompido?"
 tribal.1101.a: "[rival.Custom2('InsultNoun', ROOT.Char)|U] miserável! Eu o desafio para um holmgang!"
 tribal.1101.a_success: "Você vence"
 tribal.1101.a_failure: "[rival.GetSheHe] vence"
 tribal.1101.b: "Você enfrentará [friend.GetFirstNameNoTooltip] em um holmgang!"
 tribal.1101.b_success: "[friend.GetFirstNameNoTooltip] vence"
 tribal.1101.b_failure: "[rival.GetFirstNameNoTooltip] vence"
 tribal.1101.c: "Vamos apenas... Deixar as coisas para trás, certo?"
 tribal.1102.desc_opening: "Uma multidão se reúne para ver o holmgang entre [rival.GetTitledFirstName|l] e eu. Eles nos envolvem em uma imensa massa de vozes e punhos erguidos.\n\nEmpunho minha [ROOT.Char.Custom('signature_weapon')] e avanço — logo estamos envolvidos em uma enxurrada de aço e sangue.\n\n"
 tribal.1102.desc: "Ali! Uma abertura na defesa de [rival.GetTitledFirstNameNoTooltip|l]. Empunho [ROOT.Char.Custom('SignatureWeaponAction')] minha [ROOT.Char.Custom('signature_weapon')], aperto os dentes e com um [ROOT.Char.Custom('SignatureWeaponActionReaction')], [ROOT.Char.Custom('SignatureWeaponCritical')] o peito dele. [rival.GetSheHe|U] morre antes de tocar o chão."
 tribal.1102.a: "Isso é o que espera por quem me desafia!"
 tribal.1103.desc_opening: "Uma multidão se reúne para testemunhar o holmgang entre [rival.GetTitledFirstName|l] e [friend.GetTitledFirstName|l]. Em meio à massa de vozes e punhos erguidos, sou eu quem grita mais alto de todos.\n\n[friend.GetTitledFirstNameNoTooltip|l] empunha sua [friend.Custom('signature_weapon')] e investe — logo, eles se veem envolvidos em uma turbilhão de aço e sangue.\n\n"
 tribal.1103.desc: "De repente, [friend.GetFirstNameNoTooltip] [friend.Custom('SignatureWeaponActionThirdPerson')] seu [friend.Custom('signature_weapon')] e, com [friend.Custom('SignatureWeaponActionReaction')], [friend.Custom('SignatureWeaponCriticalPresent')] a caixa torácica de [rival.GetTitledFirstNamePossessiveNoTooltip]. Está morto antes mesmo de tocar o chão."
 tribal.1104.desc: "De repente, [rival.GetTitledFirstNameNoTooltip|l] [rival.Custom('SignatureWeaponActionThirdPerson')] sua [rival.Custom('signature_weapon')] e, antes que eu possa bloquear, me [rival.Custom('SignatureWeaponCriticalPresent')] no ombro. Que dor… Devo ter perdido a consciência, pois de repente está em cima de mim.\n\n"Renda-se"."
 tribal.1104.a: "Eu... Eu me rendo."
 tribal.1105.desc: "De repente, [rival.GetTitledFirstNameNoTooltip|l] [rival.Custom('SignatureWeaponActionThirdPerson')] sua [rival.Custom('signature_weapon')] e, antes que [friend.GetFirstNameNoTooltip] o bloqueie, ele [rival.Custom('SignatureWeaponCriticalPresent')] [friend.GetFirstNamePossessiveNoTooltip] no ombro. Meu amigo cai no chão, gritando de dor, enquanto [rival.GetFirstNameNoTooltip] me olha diretamente nos olhos.\n\n"Rendam-se"."
 tribal.1105.a: "Nós... Nós nos rendemos."
 tribal.1201.t: "A Corrida"
 tribal.1201.desc_opening: "Os preparativos para uma grande corrida estão em andamento há semanas, e finalmente chegou a hora de competir!\n\n"
 tribal.1201.desc_warhorse: "Eu chego em minha confiável [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')],"
 tribal.1201.desc: "Eu chego em um dos meus cavalos mais rápidos,"
 tribal.1201.desc_ending: "e descubro que tanto [racer.Custom2('MyCharacterIntroduction', ROOT.Char)] quanto [villain_racer.Custom2('MyCharacterIntroduction', ROOT.Char)] vão participar da corrida."
 tribal.1201.a: "Claro que eu vou participar também!"
 tribal.1201.a.tt: "Uma corrida traz prestígio, mas também riscos!"
 tribal.1201.b: "Apenas vou aproveitar o espetáculo."
 tribal.1202.desc: "Danças, cantos, aplausos... A multidão está extasiada antes mesmo de a corrida começar!\n\nEu me movo pela multidão, faltando apenas minutos para os cavaleiros montarem, quando vejo m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('villain_racer'))] [villain_racer.GetTitledFirstName|l] perto dos cavalos com algo afiado em sua mão..."
 tribal.1202.a: "\"Ei! O que você está fazendo?!\""
 tribal.1202.b: "Não é da minha conta."
 tribal.1202.b.tt: "Venha o que vier..."
 tribal.1202.c: "Então o cavalo de [villain_racer.GetFirstNameNoTooltip] está sem vigilância…"
 tribal.1202.c.success: "Eu deixo a rédea de seu cavalo quase se rompendo"
 tribal.1202.c.tt: "Seria uma pena se algo #EMP arrebentasse#! durante a corrida..."
 tribal.1202.c.failure: "Nota que alguém adulterou sua brida."
 tribal.1203.desc_opening: "Eu galopo pela estepe, acompanhando o ritmo das nuvens acima e dos cavaleiros ao meu lado.\n\n"
 tribal.1203.desc_sabotaged_you: "#EMP *Estalo!*#!\n\nDe repente, tudo vira de cabeça para baixo; o chão acima e os céus abaixo. Luto para me manter na sela ao perceber que ela balançou sob o cavalo! Mas minhas pernas perdem a aderência... Eu caio no chão com força – nem consigo encontrar fôlego para gritar."
 tribal.1203.desc_sabotaged_racer: "Según me acerco a [villain_racer.GetTitledFirstName|l], de repente gira hacia mí y en el mismo momento oigo a mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('racer'))] [racer.GetTitledFirstName|l] gritar de dolor. Me giro en la silla y veo que está en el suelo sangrando mientras su caballo se debate contra una silla que ya no está sobre su lomo, sino colgando de su panza."
 tribal.1203.desc_sabotaged_villain: "De repente, ouço meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('villain_racer'))] [villain_racer.GetTitledFirstName|l] gritar de dor. Me viro na sela e vejo que está no chão, sangrando, com os restos de sua rédea na mão."
 tribal.1203.desc: "Não há nada igual a isso! O vento no meu rosto, o som dos cascos… Quando me aproximo de [villain_racer.GetTitledFirstName|l], ele se vira bruscamente na minha direção e quase derruba meu cavalo!"
 tribal.1203.a: "Preciso voltar e ajudar!"
 tribal.1203.b_nothing_sabotaged: "Apenas distrações."
 tribal.1203.b: "Ótimo! Menos competição."
 tribal.1203.b.tt: "Você se concentra na corrida."
 tribal.1203.c: "Pelo menos o cavalo não caiu em cima de mim..."
 tribal.1203.d: "Agora é pra valer, [villain_racer.GetFirstNameNoTooltip]!"
 tribal.1203.d.success: "De forma #EMP accidental#!\", colidi com força demais no cavalo de ."
 tribal.1203.d.failure: "Estou temporariamente mais lento"
 tribal.1203.d.failure.tt: "Eu posso ter um desempenho pior na corrida"
 tribal.1203.e: "Eu devo estar perto o suficiente para fazer o salto..."
 tribal.1203.success: "Consigo derrubar[villain_racer.Custom('ES_LoLa')] do cavalo."
 tribal.1203.failure: "Sou eu quem é arremessado"
 tribal.1204.desc_slow: "Leva muitos minutos longos, mas finalmente eu cruzo a linha de chegada.\n\n"
 tribal.1204.desc_fast: "Sou recebido pelo rugido da multidão ao cruzar a linha de chegada.\n\n"
 tribal.1204.desc_racer: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('racer'))], [racer.GetTitledFirstName|l] já está celebrando sua vitória, cercado de pessoas e coberto de presentes, e acena alegremente para mim."
 tribal.1204.desc_villain: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('villain_racer'))], [villain_racer.GetTitledFirstName|l], já está celebrando sua vitória, cercado de pessoas e coberto de presentes, e sorri com ar de deboche e acena assim que me vê."
 tribal.1204.desc_you: "A multidão me cerca rapidamente, formada por pessoas que querem me parabenizar, tocar meu cavalo, dançar… Quase ninguém vê [racer.GetTitledFirstName|l] e [villain_racer.GetTitledFirstName|l] cruzando a linha de chegada; todos estão ocupados demais comemorando minha vitória!"
 tribal.1204.desc_you_jumped_horses: "Pessoas se aproximam para me felicitar, mas surge certa confusão quando veem que estou montado no cavalo de [villain_racer.GetTitledFirstName|l] e conduzindo o meu. Ainda assim, há dança e celebração, e quase ninguém percebe a chegada de [racer.GetTitledFirstName|l] e [villain_racer.GetTitledFirstNameNoTooltip|l] à linha de chegada, este último a pé."
 tribal.1204.a: "Sim, sou muito rápido, obrigado!"
 tribal.1204.b: "Vou vencer da próxima vez!"
 tribal.1301.t: "Encontro Mortal"
 tribal.1301.desc: "Estou visitando um dos rios perto de [capital.GetName]. Quando estou prestes a saciar minha sede, [Select_CString(peasant.IsFemale, 'uma mulher', 'um homem' )] do vilarejo se interpõe entre mim e o rio — que ousadia!\n\nJusto quando estou prestes a ordenar que removam esse obstáculo, ele fala comigo. \"Há um crocodilo na água, [ROOT.Char.Custom('FormOfAddressForLiege')]\".\n\nEle... ele estava me #EMP protegiendo#!?"
 tribal.1301.a: "Obrigado! Aqui, para a sua aldeia."
 tribal.1301.b: "Me faria bem a ajuda de alguém como você."
 tribal.1301.c: "Um crocodilo? Pft! Não vi nenhum crocodilo."
 tribal.1301.d: "Bem... Obrigado. Agora vá embora."
 tribal.1301.d.tt: "Levo em consideração o seu aviso"
 tribal.1302.desc: "Aproximo-me da água, ignorando as advertências, e me abaixo para recolher água fresca com as mãos. Não há sinais de nenhuma criatura viva além dos insetos!\n\nMe abaixo para dar um segundo gole quando algo perturba a superfície da água e… #EMP Dolor#!. Muita dor. Olho para baixo e vejo uma imensa boca fechada em torno da minha perna, de onde o sangue escorre entre dentes irregulares."
 tribal.1302.a: "AAAAH!! Tirem isso de cima de mim!"
 tribal.1303.t: "O Oásis"
 tribal.1303.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]", [councillor.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproxima a mim. "Foi descoberto um oásis nas imediações de [capital.GetName]. O que desejais que eu faça?".\n\nUm oásis! Uma fonte de água e de vida… ou de dinheiro."
 tribal.1303.a: "Isso trará prosperidade – irrigação!"
 tribal.1303.b: "Use-o para irrigação, mas não de graça."
 tribal.1303.c: "Deixe os camponeses usarem da melhor maneira possível."
