 clan.1001.t: "Filho Prometido"
 clan.1001.desc: "[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e seu [vassal_child.Custom('GetDaughterSon')], [vassal_child.Custom('ES_ElLa')] [vassal_child.GetTitledFirstName|l], vêm até mim.

"Isso não vai acontecer."
 clan.1001.a: ""[ROOT.Char.GetTitledFirstNameNoTooltip|l], o que significa tudo isso?!"

[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra na sala com seu [vassal_child.Custom('GetDaughterSon')] [vassal_child.GetTitledFirstName|l] atrás.

"Por que você rompeu o noivado entre seu [child.Custom('GetDaughterSon')] e [vassal_child.GetTitledFirstNameNoTooltip]?""
 clan.1001.b: "Foi um erro, eu prometo!"
 clan.1002.desc: "Não é da sua conta."

