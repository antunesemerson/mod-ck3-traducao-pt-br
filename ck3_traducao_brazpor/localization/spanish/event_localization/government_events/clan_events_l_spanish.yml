 clan.1011.t: "ouro.""
 clan.1011.desc_opening: "Meu [councillor.GetCouncilTitle] [councillor.GetFirstNameNoTooltip] irá treiná-lo.".

[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] vem ter comigo para resolver o que percebe como uma ofensa: o fato de eu não ter aliança com [vassal.GetHerHim].

"Então vamos lutar, e eu vou te ensinar."
 clan.1011.desc_army: "Pegue isso e me deixe em paz."
 clan.1011.desc_prestige: "Você não terá nada disso."
 clan.1011.desc_diplomacy: "Equilíbrio de Poder"
 clan.1011.desc_prowess: "[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] veio até mim com uma reclamação. "Seus membros da família têm poder demais no [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]. Não importa o quanto vassalos como eu trabalhem duro, nunca chegaremos nem perto deles!

Eu imploro que você corrija essa injustiça. Afinal, até mesmo a aparência de nepotismo pode gerar ressentimento entre seus vassalos...""
 clan.1011.desc_fallback: "Ouço suas preocupações e as levarei em consideração."
 clan.1011.army: "Você se esquiva de tomar qualquer ação significativa, ao mesmo tempo em que tranquiliza [vassal.GetFirstNameNoTooltip]"
 clan.1011.tt: "Você está certo. Tomarei medidas para corrigir isso imediatamente!"
 clan.1011.prestige: "Cada membro [vassal|lE] da [dynasty|lE]"
 clan.1011.diplomacy: "Ganha uma [revoke_title_reason|lE]"
 clan.1011.prowess: "Ah, eu lhe darei algo para gerar ressentimento..."
 clan.1011.fallback: "Não é culpa minha que você não nasceu na minha família!"
