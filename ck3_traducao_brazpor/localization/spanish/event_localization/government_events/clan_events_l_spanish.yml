l_spanish:
 clan.1001.t: "Filho Prometido"
 clan.1001.desc: "[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e seu [vassal_child.Custom('GetDaughterSon')], [vassal_child.Custom('ES_ElLa')] [vassal_child.GetTitledFirstName|l], vêm até mim.\n\n\"É uma vergonha não haver uma aliança entre nós, [ROOT.Char.Custom('FormOfAddressForLiege')]. Façamos com que [child.Custom('ES_ElLa')] [child.GetTitledFirstName|l] se case com meu [vassal_child.Custom('GetDaughterSon')] para corrigir as coisas!\""
 clan.1001.a: "Você está certo - eles vão se casar!"
 clan.1001.b: "Isso não vai acontecer."
 clan.1002.desc: "\"[ROOT.Char.GetTitledFirstNameNoTooltip|l], o que significa tudo isso?!\"\n\n[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra na sala com seu [vassal_child.Custom('GetDaughterSon')] [vassal_child.GetTitledFirstName|l] atrás.\n\n\"Por que você rompeu o noivado entre seu [child.Custom('GetDaughterSon')] e [vassal_child.GetTitledFirstNameNoTooltip]?\""
 clan.1002.a: "Foi um erro, eu prometo!"
 clan.1002.b: "Não é da sua conta."
 clan.1011.t: "Sem uma Aliança"
 clan.1011.desc_opening: "\"Não consigo deixar de notar o nepotismo com que tratais [allied_vassal.Custom2('YourCharacterIntroduction', ROOT.Char)], meu [ROOT.Char.GetLadyLord]\".\n\n[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] vem ter comigo para resolver o que percebe como uma ofensa: o fato de eu não ter aliança com [vassal.GetHerHim].\n\n\"Se fizésseis uma concessão em meu favor, bastaria para acalmar os ânimos. Digamos..."
 clan.1011.desc_army: "os serviços de seu[councillor.Custom('ES_OA')] [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l], por alguns anos!\""
 clan.1011.desc_prestige: "algumas palavras boas nos ouvidos certos.\""
 clan.1011.desc_diplomacy: "lições na arte da diplomacia.\""
 clan.1011.desc_prowess: "instruções em combate!\""
 clan.1011.desc_fallback: "ouro.\""
 clan.1011.army: "Meu [councillor.GetCouncilTitle] [councillor.GetFirstNameNoTooltip] irá treiná-lo."
 clan.1011.tt: "#F Aceite ou deixe pra lá#!"
 clan.1011.prestige: "Falarei bem de você."
 clan.1011.diplomacy: "É melhor afiar sua língua de prata!"
 clan.1011.prowess: "Então vamos lutar, e eu vou te ensinar."
 clan.1011.fallback: "Pegue isso e me deixe em paz."
 clan.1011.b: "Você não terá nada disso."
 clan.1101.t: "Equilíbrio de Poder"
 clan.1101.desc: "[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] veio até mim com uma reclamação. \"Seus membros da família têm poder demais no [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]. Não importa o quanto vassalos como eu trabalhem duro, nunca chegaremos nem perto deles!\n\nEu imploro que você corrija essa injustiça. Afinal, até mesmo a aparência de nepotismo pode gerar ressentimento entre seus vassalos...\""
 clan.1101.a: "Ouço suas preocupações e as levarei em consideração."
 clan.1101.a.flavor: "Você se esquiva de tomar qualquer ação significativa, ao mesmo tempo em que tranquiliza [vassal.GetFirstNameNoTooltip]"
 clan.1101.b: "Você está certo. Tomarei medidas para corrigir isso imediatamente!"
 clan.1101.b.custom: "Cada membro [vassal|lE] da [dynasty|lE]"
 clan.1101.b.tt: "Ganha uma [revoke_title_reason|lE]"
 clan.1101.c: "Ah, eu lhe darei algo para gerar ressentimento..."
 clan.1101.d: "Não é culpa minha que você não nasceu na minha família!"
 clan.1101.d.custom: "Cada [vassal|lE] que não é membro da [dynasty|lE]"
 clan.1201.t: "Sem Representação"
 clan.1201.desc: "Um[petitioner.Custom('ES_XA')] [petitioner.GetWomanMan] [culture.GetNameNoTooltip] de [target_title.GetNameNoTier] vem pedir maior representação em meu governo.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], somos vossos súditos leais, mas não temos voz no governo de nossas comunidades. Seria demais pedir que um dos nossos tenha um lugar em vossa administração?\""
 clan.1201.a: "Muito bem. A partir de agora, você governará [target_title.GetNameNoTierNoTooltip]!"
 clan.1201.b: "Eu poderia afrouxar as rédeas, em troca de seu serviço..."
 clan.1201.c: "Não vai acontecer."
