l_spanish:
 #Host Main Event
 feast_main_befriend.1001.t: "A Mesa Real se Rompe"
 feast_main_befriend.1001.opening: "A grande mesa onde os nobres de maior posição se sentam no palanque deu um alto estalo e, um momento depois, cedeu sob o peso da comida e das decorações douradas!\n\n"
 feast_main_befriend.1001.getting_close: "Meus convidados mais ilustres e eu tivemos que nos acomodar entre a nobreza inferior, e assim acabei perto de minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('potential_friend'))] [potential_friend.GetTitledFirstName|l]."
 feast_main_befriend.1001.arrogant_guest: "[arrogant_guest.GetTitledFirstName|l] não reagiu bem e disse a todos que era uma grande injustiça ser sentado com senhores e damas pouco melhores do que plebeus."
 feast_main_befriend.1001.arrogant_kind_link: "Agindo de forma totalmente oposta,"
 feast_main_befriend.1001.kind_to_lower_nobility: "[kind_to_lower_nobility.GetTitledFirstName] mostrou graça e humildade entre os inferiores."
 feast_main_befriend.1001.really_hungry: "[kind_to_lower_nobility.GetSheHe|U] continuou dizendo aos convidados mais famintos que eles deveriam visitar a sua casa o mais rápido possível."
 feast_main_befriend.1001.no_kind_target: "Enquanto os nobres se misturavam com os menos privilegiados, palavras de amizade e inimizade foram trocadas entre pessoas que raramente se associam."
 feast_main_befriend.1001.friendship: "\n\n[potential_friend.GetFirstName] e eu acabamos conversando a noite toda, e concordamos que não deveria ser a última vez que festejássemos e ríssemos na companhia um do outro!"
 feast_main_befriend.1001.a: "Que noite maravilhosa!"
 #Potential Friend Main Event
 feast_main_befriend.2001.t: "A Mesa Real se Rompe"
 feast_main_befriend.2001.opening: "$feast_main_befriend.1001.opening$"
 feast_main_befriend.2001.getting_close: "O que poderia ter sido um desastre acabou sendo uma bênção disfarçada, pois acabei perto de nuestr[activity.GetOwner.Custom('ES_OA')] anfitri[activity.GetOwner.Custom('ES_OnOna')], [activity.GetOwner.GetTitledFirstName|l]!"
 feast_main_befriend.2001.arrogant_guest: "[arrogant_guest.GetTitledFirstName], no entanto, não reagiu bem à nova posição e disse a todos como era uma grande injustiça ser sentado entre pessoas pouco melhores do que plebeus."
 feast_main_befriend.2001.arrogant_kind_link: "Agindo de forma totalmente oposta,"
 feast_main_befriend.2001.kind_to_lower_nobility: "[kind_to_lower_nobility.GetTitledFirstName] mostrou graça e humildade entre os inferiores."
 feast_main_befriend.2001.really_hungry: "[kind_to_lower_nobility.GetFirstName] continuava dizendo aos convidados que [kind_to_lower_nobility.GetSheHe] sempre tenta ser gentil com pessoas que estão quase tão famintas quanto [kind_to_lower_nobility.GetSheHe] está."
 feast_main_befriend.2001.no_kind_target: "\n\nEnquanto os nobres de alta posição se misturavam com os de posição inferior, palavras de amizade e inimizade eram trocadas entre pessoas que raramente se associam muito."
 feast_main_befriend.2001.friendship: "\n\nDo meu assento nas mesas baixas, o banquete foi um sucesso, não apenas porque [activity.GetOwner.GetFirstName] estivesse de acordo que essa não poderia ser a última vez que nos sentássemos juntos para festejar, conversar e rir."
 feast_main_befriend.2001.a: "Que ótima noite!"
 #Arrogant Guest Main Event
 feast_main_befriend.2002.t: "A Mesa Real se Rompe"
 feast_main_befriend.2002.arrogant_guest: "No podía creer que toda la alta nobleza fuese reubicada del estrado hasta el suelo, entre barones y $knight_culture_player_plural_no_tooltip_lowercase$. Por quién me habéis tomado [activity.GetOwner.GetTitledFirstName|l], ¿por un[ROOT.Char.Custom('ES_XA')] plebey[ROOT.Char.Custom('ES_OA')]? Le conté a todos los que pude cómo me sentía, ¡sobre todo a los nobles de pega a mi alrededor!"
 feast_main_befriend.2002.disgusted_by_kindness: "\n\nPara piorar a ferida, elogiaram [kind_to_lower_nobility.GetTitledFirstName|l] a noite toda por sua \"bondade\" e \"humildade\" entre esse povo. Será que não tem amor-próprio?"
 feast_main_befriend.2002.a: "Podem me comparar a um camponês."
 feast_main_befriend.2002.because_of_hospitality_tenet: "Porque a sua [faith|lE] supostamente honra os convidados:"
 #Kind to Nobility Main Event
 feast_main_befriend.2003.t: "A Mesa Real se Rompe"
 feast_main_befriend.2003.opening: "A grande mesa onde os nobres de alta posição se sentam no palanque deu um alto estalo e, um momento depois, cedeu sob o peso da comida e das decorações douradas! Todos nós tivemos que ser movidos para junto da nobreza inferior no chão do Grande Salão."
 feast_main_befriend.2003.arrogant_guest: "\n\n[arrogant_guest.GetTitledFirstName] não aceitou bem seu novo lugar, e contou a todos como era uma grande injustiça sentar-se com lordes e damas pouco melhores que plebeus."
 feast_main_befriend.2003.kind_to_glutton: "\n\nEu, por outro lado, prestei atenção em particular a [glutton_target.GetTitledFirstName|l] e seu apetite voraz. [glutton_target.GetSheHe|U] partia os pedaços de carne avidamente, com os sucos correndo por sua bochecha enquanto a fome insaciável, que conheço bem demais, começava a roncar no meu estômago, enquanto eu continuava passando comida para [glutton_target.GetTitledFirstName|l]."
 feast_main_befriend.2003.cannibal_kindness: "\n\nDo meu novo lugar, observei os barões e os $knight_culture_player_plural_no_tooltip_lowercase$ se enchendo cada vez mais com suas bocas escancaradas, e à medida que a fome aumentava dentro de mim, ofereci-me para limpar a gordura do queixo de alguém, apenas para poder tocar aquele pescoço macio e rechonchudo..."
 feast_main_befriend.2003.kind_to_lower_nobility: "\n\nOlhei para os senhores, damas e $knight_culture_player_plural_no_tooltip_lowercase$ sem desprezo. Conversando com eles, descobri que compartilham muitas das mesmas preocupações, problemas e alegrias que eu tenho em minha posição elevada. Conforme a noite avançava, compartilhei do meu prato e ofereci histórias minhas em reciprocidade."
 feast_main_befriend.2003.ending: "\n\nMais tarde, [activity.GetOwner.GetTitledFirstName|l] me disse que todos os convidados haviam notado a humildade e a gentileza que demonstrei entre meus inferiores."
 feast_main_befriend.2003.a: "Estou feliz por ter conhecido essas pessoas."
 #Glutton Target Main Event
 feast_main_befriend.2004.t: "A Mesa Real se Rompe"
 feast_main_befriend.2004.arrogant_guest: "\n\n[arrogant_guest.GetTitledFirstName] não aceitou bem seu novo lugar, contando a todo mundo a grande injustiça que era ser sentado entre lordes e damas pouco melhores que plebeus."
 feast_main_befriend.2004.kindness_from_other: "\n\nMas tive a sorte de me sentar ao lado de [kind_to_lower_nobility.GetTitledFirstName|l]; conversamos durante horas sobre comida e o prazer de comer. Desde que eu não estivesse enfiando carne goela abaixo, é claro! Dava para ver que a [kind_to_lower_nobility.GetFirstName] ficou com fome só de me ver!"
 feast_main_befriend.2004.a: "Tudo acabou sendo para o melhor."
 #General Guest Main Event
 feast_main_befriend.3001.t: "A Mesa Real se Rompe"
 feast_main_befriend.3001.arrogant_guest: "\n\n[arrogant_guest.GetTitledFirstName] não recebeu bem seu novo lugar, contando a todo mundo como era uma grave injustiça sentar-se com lordes e damas pouco melhores do que plebeus."
 feast_main_befriend.3001.kind_to_lower_nobility: "\n\n[kind_to_lower_nobility.GetTitledFirstName] mostrou graça e humildade entre seus inferiores. Sua conduta foi algo a que todos nós podemos aspirar."
 feast_main_befriend.3001.really_hungry: "[kind_to_lower_nobility.GetTitledFirstName] também ofereceria sua comida aos outros, desejando-lhes uma constituição robusta e saudável."
 feast_main_befriend.3001.ending: "\n\nEnquanto os nobres de alta posição social se misturavam com os menos privilegiados, palavras de amizade e inimizade foram trocadas entre pessoas que raramente se associam."
 feast_main_befriend.3001.a: "Sinto que aprendi algo."
 #Host End Event
 feast_main_befriend.5002.t: "Uma Amizade"
 feast_main_befriend.5002.desc: "Quando meus convidados vão embora, parecem partir de bom humor. Também me alivia ver que [potential_friend.GetTitledFirstName|l] não vai embora sem se despedir.\n\nAmbos sabemos que nos veremos novamente em breve."
 feast_main_befriend.5002.a: "Que [potential_friend.GetWomanMan]."
 #Potential Friend End Event
 feast_main_befriend.5003.t: "Uma Amizade"
 feast_main_befriend.5003.desc: "Antes de irme del festín, tuve que decirle a [host_saying_goodbye.GetTitledFirstName|l] lo bien que me lo pasé. [host_saying_goodbye.GetSheHe|U] me dijo que me levantase y me puso una mano en el hombro en señal de confianza.\n\nNo creo que pase mucho hasta que nos volvamos a ver."
 feast_main_befriend.5003.a: "Isso foi algo especial."
 #General Guest End Event
 feast_main_befriend.5004.t: "Um Acidente Memorável"
 feast_main_befriend.5004.desc: "Enquanto me preparo para partir com os outros convidados, não consigo deixar de olhar para os últimos dias com um sorriso.\n\nO banquete foi esplêndido e meu contato com convidados de diferentes posições sociais me proporcionou novas perspectivas."
 feast_main_befriend.5004.a: "Até a próxima, [ROOT.Char.Custom2('RelationToMe', activity.GetOwner)]!"
