l_spanish:
 tour_travel.3000.t: "Sem [ROOT.Char.GetFaith.HouseOfWorshipPlural]?"
 tour_travel.3000.desc: "Eu visito uma vila enquanto viajo por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] e passo algum tempo discutindo assuntos de adoração local com um camponês particularmente piedoso chamado [pious_peasant.GetName].\n\n\"Aqui não temos nem mesmo um [ROOT.Char.GetFaith.HouseOfWorship]. Se quisermos pisar em uma casa de [ROOT.Char.GetFaith.HighGodName|U], precisamos viajar por dias.\""
 tour_travel.3000.a: "Nós poderíamos ajudar a construir um simples [ROOT.Char.GetFaith.HouseOfWorship]."
 tour_travel.3000.b: "Eu construirei um grandioso [ROOT.Char.GetFaith.HouseOfWorship] aqui."
 tour_travel.3000.c: "\"Então você deve andar.\""
 tour_travel.3001.t: "Cerimônia Improvisada"
 tour_travel.3001.desc: "Paramos em uma pequena aldeia de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. Consigo passar por quase todo o banquete antes de perceber que há algo errado.\n\nPercebo que [marriage_mother.GetName], que não para de falar sobre sua [marriage_candidate.Custom('GetDaughterSon')] [marriage_candidate.GetName], não estava apenas se gabando, estava #EMP vendiendo#! o seu rebento.\n\n\"Quando vocês dois se casarem, tudo ficará simplesmente perfeito!\", diz [marriage_mother.GetNameNoTooltip] com os olhos brilhando de orgulho."
 tour_travel.3001.desc.drunkard: "Acordo atordoado[ROOT.Char.Custom('ES_OA')], a cabeça lateja, os ouvidos zumbem e a luz atravessa minha mente como punhais. Minha boca está seca como um deserto, e antes que eu possa rosnar pedindo água, vejo uma camponesa estranha de pé ao lado da minha cama com uma jarra de água.\n\n\"Aqui está, [ROOT.Char.Custom('FormOfAddressForLiege')], você vai precisar depois da noite que teve!\"\n\nMe viro na cama e vejo um[marriage_candidate.Custom('ES_XA')] estranh[marriage_candidate.Custom('ES_OA')] descansando ao meu lado em sono profundo.\n\n\"Afinal, não é todo dia que minha [marriage_candidate.Custom('DaughterSon')] se casa com o [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!\""
 tour_travel.3001.a: "Que ideia maravilhosa."
 tour_travel.3001.a.drunkard: "#EMP O que eu fiz?#!"
 tour_travel.3001.b: "N?o, eu n?o me caso com campones[marriage_candidate.Custom('ES_OA')]s suj[marriage_candidate.Custom('ES_OA')]s e repugnantes."
 tour_travel.3002.t: "O Preço da Conquista"
 tour_travel.3002.desc: "\"Meu [widow_peasant.Custom2( 'RelationToMeShort', widow_father )]“, meu [widow_peasant.Custom2( 'RelationToMeShort', widow_husband )]“, meu [widow_peasant.Custom2( 'RelationToMeShort', widow_son )]“, todos morreram na sua #EMPyour guerra#!\". Uma camponesa grita comigo do outro lado da praça da vila.\n\n\"Quando [battle_memory.GetSecondPerspectiveDescription], foi uma vitória para você, mas para mim foi o dia em que três gerações da minha família morreram\".\n\nSua ira havia se transformado em lágrimas, e as palavras que pronunciou em seguida mal chegaram aos meus ouvidos.\n\n\"Você não é meu [ROOT.Char.GetTitleAsNameNoTooltip|l]!\"."
 tour_travel.3002.a: "\"Eu não posso trazê-los de volta, mas talvez algum ouro ajude.\""
 tour_travel.3002.b: "Foi um sacrifício que eu estava dispost[ROOT.Char.Custom('ES_OA')] a fazer."
 tour_travel.3003.t: "Criaturas Repugnantes"
 tour_travel.3003.desc: "Em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] paramos para falar com o centésimo camponês do dia e meu estômago embrulha só de olhar para essas criaturas miseráveis.\n\nDentes amarelados e quebrados, olhos baços e vazios que escondem um cérebro apodrecido e analfabeto. Cada um deles carrega doenças sem nome que maculam seus rostos com inúmeros furúnculos e manchas.\n\nSimplesmente, não me importo nem um pouco com o que dizem."
 tour_travel.3003.a: "Fingir me importar com eles é meu dever."
 tour_travel.3003.b: "Direi a eles o que penso deles."
 tour_travel.3004.t: "A Estátua Feia"
 tour_travel.3004.desc: "Fui avisado com antecedência de que os aldeões de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] se haviam reunido e erguido uma estátua da minha pessoa.\n\nNo entanto, quando chego e a vejo, não consigo processar o que estou vendo. Não só a estátua é a coisa mais feia que já vi na vida, como também não se parece em nada comigo!\n\nNo entanto, ao olhar ao redor, só vejo rostos orgulhosos e sorridentes; será que mais ninguém percebe o quão horrível isso é?"
 tour_travel.3004.a: "Isso é... tão ótimo"
 tour_travel.3004.b: "Isso é uma #EMP piada#!? Derrubem-na!"
 tour_travel.3004.c: "Na verdade, é bastante preciso."
 tour_travel.3005.t: "Crime Familiar"
 tour_travel.3005.desc: "Ao passar por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], encontro [Select_CString( criminal_peasant.IsFemale, 'una patética prisionera', 'un patético prisionero' )] acorrentad[criminal_peasant.Custom('ES_OA')] a um poste como um cachorro. Ele/ela me chama, suplicando clemência.\n\n\"Qual é o seu crime?\", exijo com a autoridade adequada a um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l].\n\n\"Sou acusado de [criminal_secret.GetNameNoTooltip]: uma acusação que, infelizmente, não posso refutar.\"\n\nAlgumas pequenas gotas de suor surgem na minha testa. Afinal, #EMP yo#! eu também sou [criminal_secret.GetNameNoTooltip]."
 tour_travel.3005.a: "Soltem[criminal_peasant.GetHerHim]!"
 tour_travel.3005.b: "Que crime terrível e horrível..."
 tour_travel.3006.t: "Vida de um Governante"
 tour_travel.3006.desc: "Vários camponeses se reúnem ao meu redor pedindo histórias da minha vida. Penso em algo que possa contar a eles e duas histórias me vêm à mente. Uma, quando [positive_memory.GetDescription] é uma lembrança adorável.\n\nPor outro lado, quando [war_memory.GetDescription] é uma história mais impressionante, provavelmente capaz de inspirar lealdade e fervor."
 tour_travel.3006.a: "Contarei a primeira história."
 tour_travel.3006.b: "Todo mundo adora uma história de guerra."
 tour_travel.3007.t: "Casa de Prazer"
 tour_travel.3007.desc: "Quando paramos para descansar esta noite, um morador local se ofereceu para nos mostrar a cidade.\n\nSó entendo o que ele realmente quis dizer quando me encontro nas profundezas de um antro de prazeres.\n\nÀ minha esquerda, as pessoas estão se emparelhando como se fosse o fim do mundo. À minha direita, um artista tenta o que parece #EMP [ROOT.Char.Custom('GetDescriptorManeuver')|l] [ROOT.Char.Custom('GetManeuver')|l] [random_event_culture.GetNameNoTooltip].#!"
 tour_travel.3007.a: "Preciso sair daqui agora mesmo."
 tour_travel.3007.b: "Pode ser que eu também participe."
 tour_travel.3010.t: "Herói Local"
 tour_travel.3010.desc: "Enquanto atravessamos os/as [shrine_province.Custom('GetTerrainTypePlural')], caminhando pelo/a [shrine_province.Custom('GetProvinceGroundDesc')], encontramos um modesto santuário. Esculpido de forma ingênua, exibe um/a [shrine_province.GetCounty.GetFaith.ReligiousSymbol] na cabeceira, e abaixo, as palavras desgastadas:\n\n#EMP «Aquí yace sant[saint_name.Custom('ES_OA')] [saint_name.GetFirstNameNoTooltip] de [shrine_province.GetCounty.GetTitle.GetDeJureLiege.GetNameNoTierNoTooltip], [saint_name.Custom('GetDaughterSon')] bendit[saint_name.Custom('ES_OA')] de [shrine_province.GetNameNoTooltip]».#!\n\nSanto[saint_name.Custom('ES_OA')] [saint_name.GetFirstNameNoTooltip]? De [shrine_province.GetCounty.GetTitle.GetDeJureLiege.GetNameNoTierNoTooltip]? Parece uma figura espiritual local destas bandas; uma não sancionada pelos [ROOT.Char.GetFaith.AltPriestTermPlural] [ROOT.Char.GetFaith.GetAdherentName]…"
 tour_travel.3010.a: "Derrubem essa heterodoxia!"
 tour_travel.3010.b: "\"São[saint_name.Custom('ES_OA')] [saint_name.GetFirstNameNoTooltip]\"… Fica com um som agradável."
 tour_travel.3010.c: "É melhor irmos embora."
 cultural_acceptance_local_saint: "Santo local"
 tour_travel.3020.t: "Sozinho no Escuro"
 tour_travel.3020.desc: "Nos abrigamos de uma noite [ROOT.Char.GetCurrentLocation.Custom('GetBadWeatherDesc')] em uma pousada confortável, embora apertada, e bebemos enquanto o vento uiva lá fora. Um a um, o grupo se retira para seus aposentos.\n\nEstou imers[ROOT.Char.Custom('ES_OA')] em meus pensamentos quando percebo que a vela quase se consumiu e estou sozinh[ROOT.Char.Custom('ES_OA')] com meu [ROOT.Char.Custom2('RelationToMeShort', love_professor)], [love_professor.GetFirstName]. Há um olhar estranho em seus olhos.\n\nPassa um momento entre nós antes de [love_professor.GetSheHe] franzir o cenho, escolhendo cuidadosamente as suas palavras. Sabe, eu te admiro #EMP muito#!, [ROOT.Char.GetFirstNameNoTooltip], quero dizer, [ROOT.Char.GetTitleAsNameNoTooltip]... Um sorriso dança em seus lábios."
 tour_travel.3020.a: "Venha, os outros já estão todos dormindo."
 tour_travel.3020.c: "Ha! Quem você pensa que é?!"
 tour_travel.3020.d: "Devo descansar um pouco..."
 tour_travel.3030.t: "A Verdade"
 tour_travel.3030.desc: "Aproximamo-nos a uma aldeia onde um[wrongfully_accused.Custom('ES_XA')] [wrongfully_accused.GetWomanMan] desamparad[wrongfully_accused.Custom('ES_OA')] permanece acorrentad[wrongfully_accused.Custom('ES_OA')] a uma forca, com uma multidão reunida aos seus pés.\n\n\"[ROOT.Char.GetTitleAsNameNoTooltip|l]! É [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!\". Um[accused_partner.Custom('ES_XA')] camponês[accused_partner.Custom('ES_OA')] abre caminho aos tropeços pela multidão, chorando: \"Por favor! Meu [wrongfully_accused.Custom('WifeHusband')] é inocente!\"."
 tour_travel.3030.framed: "[wrongfully_accused.GetSheHe|U] não foi culpado, [ROOT.Char.Custom('FormOfAddressForLiege')]! Eu sei que não!\""
 tour_travel.3030.pinned: "Esses malfeitores colocam seus pecados aos pés dos outros!"
 tour_travel.3030.wrongful: "É uma mentira! Ninguém sequer viu isso!"
 tour_travel.3030.outro: "Eles [accused_partner.GetHerHim] se afastam, gemendo: \"Não! #EMP [wrongfully_accused.GetFirstName]…!#!\", enquanto [accused_partner.GetHerHim] é arrastado pela rua.\n\nO oficial se curva timidamente: \"Desculpe, meu [ROOT.Char.GetLadyLord]! Não lhe deem atenção, o[wrongfully_accused.Custom('ES_EA')] [wrongfully_accused.GetWomanMan] #EMP é#! culpado — não se preocupem com isso…\"."
 tour_travel.3030.a: "Gostaria de ouvir as acusações..."
 tour_travel.3030.b.sadistic: "Ah, adoro uma boa execução!"
 tour_travel.3030.b: "Continuem."
 tour_travel.3030.c: "Você tem sorte, temos aqui o melhor executor de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]!"
 tour_travel.3030.d: "Estou... aqui para perdoar[wrongfully_accused.GetHerHim]! E a [accused_partner.GetSheHe]!"
 tour_travel.3040.t: "Uma Vila Desafortunada"
 tour_travel.3040.desc: "Enquanto trotamos pelos arredores de um pequeno povoado de encruzilhada, aproxima-se [Select_CString( bandit_mayor.IsFemale, 'una temerosa plebeya', 'un temeroso plebeyo' )]com os olhos arregalados de alívio.\n\n\"Graças a Deus! Vós deveis nos ajudar, bom [ROOT.Char.GetLadyLord]\". Meu grupo e eu trocamos olhares desconfiados. \"Bandoleiros desertores vêm saqueando nossa aldeia há dias; levaram quase tudo!\".\n\n"
 tour_travel.3040.own: "É um lugar pequeno, mas a falta de lei em minhas terras não é boa."
 tour_travel.3040.liege: "Então, [ROOT.Char.GetTopLiege.GetTitledFirstName] não mantém a paz em..."
 tour_travel.3040.realm: "Parece que as terras [ROOT.Char.GetLiege.Custom('ES_DelDela')] [ROOT.Char.GetLiege.GetTitledFirstName] quase carecem de lei…"
 tour_travel.3040.foreign: "Parece que a ordem do(a) [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetHolder.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip] é negligente em comparação com a do(a) [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip]..."
 tour_travel.3040.a.martial: "Comigo, guardas! Vamos surpreender esses vilões!"
 tour_travel.3040.a: "Venham, guardas, vamos surpreender aqueles vilões!"
 tour_travel.3040.b: "#EMP Quase#! tudo?"
 tour_travel.3040.c: "Temo que tenho coisas melhores para fazer, campones[bandit_mayor.Custom('ES_OA')]."
 tour_travel.3040.c.foreign: "Este é um assunto para seu[ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetHolder.Custom('ES_OA')] [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetHolder.GetTitleAsNameNoTooltip|l], camponês[bandit_mayor.Custom('ES_OA')]."
