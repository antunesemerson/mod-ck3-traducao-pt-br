l_spanish:
 feast_default_laurence.100.t: "Uma causa comum"
 feast_default_laurence.100.desc: "Ao voltar de me aliviar, sou abordado por [conspiratorial_fellow.GetName] com um olhar de aço. Ele me enche de relatos da [war_memory.MakeScope.Var('war_cb').GetFlagName] que travou contra [intent_target.GetName]. Entre os dentes cerrados, lamenta ter perdido a chance de estraçalhar [intent_target.GetHerHim]. Aproximando-se ainda mais, fixa o olhar no meu.\n\n«Que esse exemplar de [ROOT.Char.Custom('RegionalEdibleAnimal')] que tão bem os seus cozinheiros prepararam não seja a única fera espetada neste banquete! Basta dizer aos seus guardas para fazerem vista grossa e taparem os ouvidos. Eu cuidarei do resto»."
 feast_default_laurence.100.a: "Que sua lâmina beba fundo!"
 feast_default_laurence.100.a.tt.success: "[intent_target.Custom('ES_ElLa')|U] [intent_target.GetTitledFirstName|l] sangrou como um sacrifício"
 feast_default_laurence.100.a.tt.failure: "[intent_target.Custom('ES_ElLa')|U] [intent_target.GetTitledFirstName|l] foi astuto demais[intent_target.Custom('ES_OA')]"
 feast_default_laurence.100.b: "A ideia da sua morte desperta algo em mim, mas vamos observar e esperar."
 feast_default_laurence.100.c: "Esqueçam essas palavras tolas, mas lembrem-se, eu me lembrarei."
 feast_default_laurence.101.desc: "Meu anfitrião fez o possível para preparar um banquete digno. Embora modesto em comparação com as suntuosas delícias de [intent_target.GetCapitalLocation.GetName], agradeço a dedicação de meu vassalo à hospitalidade.\n\nDe repente, percebo que há menos pessoas no salão. Sim, os guardas parecem ter se retirado.\n\nUma fisgada no meu lado! Seria uma pulga? Algo quente alivia a coceira. Olho para baixo; o punho de uma lâmina brotou entre minhas costelas. O que está fazendo aí...?"
 feast_default_laurence.101.a: "A morte me encontrou."
 feast_default_laurence.102.desc: "Eu queria presentear [intent_target.GetName] com uma prova da minha lealdade. Uma prova tão grande que exigia que todos os meus guardas a carregassem. Mas, ai, quando saíram da sala para buscá-la, parece que meu convidad[intent_target.Custom('ES_OA')] recebeu uma lâmina entre as costelas.\n\n[conspiratorial_fellow.GetName] sorri para mim; seus olhos brilham por terem capturado a luz de uma vida extinta."
 feast_default_laurence.102.a: "Que esta colaboração seja o começo de uma grande amizade."
 feast_default_laurence.102.b: "Você traiu minha hospitalidade com esse derramamento de sangue!"
 feast_default_laurence.102.b.flavor: "Você tenta prender [conspiratorial_fellow.GetHerHim]."
 feast_default_laurence.102.b.tt.success: "Seus guardas imobilizam [Select_CString( conspiratorial_fellow.IsFemale, 'a traidora', 'o traidor' )]."
 feast_default_laurence.102.b.tt.fail: "Seus guardas não conseguem capturar [conspiratorial_fellow.GetName]."
