l_spanish:
 hold_court.5010.t: "[county.GetNameNoTierNoTooltip|U] Fora de Controle"
 hold_court.5010.desc_marshal: "[marshal.Custom('ES_ElLa')|U] [marshal.GetCouncilTitle] [marshal.GetTitledFirstName|l] se aproxima do trono.

"
 hold_court.5010.desc: "Um[peasant.Custom('ES_XA')] [peasant.GetWomanMan] se aproxima timidamente do trono, agarrando o chapéu.

"
 hold_court.5010.desc.outro: "Linguagem Escrita"
 hold_court.5010.a: "[courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me mostra uma página cheia de símbolos estranhos, insistindo em sua legibilidade.

"Desenvolvi uma linguagem escrita especificamente para [courtier.Custom('ES_LoLa')]s [courtier.GetWomenMen] da corte, já que escrever costuma ser ensinado apenas a [courtier.Custom('WomenMenOpp')]. Se me permitirdes, começarei a ensinar [Select_CString( courtier.IsFemale, 'as damas', 'os lordes' )] de imediato!"

É impossível não imaginar a liberdade que uma linguagem assim poderia conceder!"
 hold_court.5010.b: "Que ótima ideia!"
 hold_court.5010.c: "Tod[courtier.Custom('ES_OA')]s [courtier.Custom('ES_LoLa')]s cortesã[courtier.Custom('ES_OA')]s"
 hold_court.5030.t: "[court_tutor.GetFirstNameNoTooltip], tutor[court_tutor.Custom('ES_XA')] da corte, vai ajudar você a ensiná-lo."
 hold_court.5030.desc: "[courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me mostra uma página cheia de símbolos estranhos, insistindo em sua legibilidade.

