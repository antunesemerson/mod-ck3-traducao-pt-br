l_spanish:
 hold_court.5010.t: "[county.GetNameNoTierNoTooltip|U] Fora de Controle"
 hold_court.5010.desc_marshal: "[marshal.Custom('ES_ElLa')|U] [marshal.GetCouncilTitle] [marshal.GetTitledFirstName|l] se aproxima do trono.\n\n"
 hold_court.5010.desc: "Um[peasant.Custom('ES_XA')] [peasant.GetWomanMan] se aproxima timidamente do trono, agarrando o chapéu.\n\n"
 hold_court.5010.desc.outro: "\"A desordem e o banditismo correm soltos em [county.GetName], [ROOT.Char.Custom('FormOfAddressForLiege')]. Separe apenas algumas moedas para a região, e o controle talvez seja restaurado.\""
 hold_court.5010.a: "Ideia curiosa, vamos tentar."
 hold_court.5010.b: "Você está cert[ROOT.Char.Custom('ES_OA')], o que precisamos é de #EMP derramamento de sangue excessivo#!"
 hold_court.5010.c: "Não tenho tempo para isso."
 hold_court.5030.t: "Linguagem Escrita"
 hold_court.5030.desc: "[courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me mostra uma página cheia de símbolos estranhos, insistindo em sua legibilidade.\n\n\"Desenvolvi uma linguagem escrita especificamente para [courtier.Custom('ES_LoLa')]s [courtier.GetWomenMen] da corte, já que escrever costuma ser ensinado apenas a [courtier.Custom('WomenMenOpp')]. Se me permitirdes, começarei a ensinar [Select_CString( courtier.IsFemale, 'as damas', 'os lordes' )] de imediato!\"\n\nÉ impossível não imaginar a liberdade que uma linguagem assim poderia conceder!"
 hold_court.5030.a: "Que ótima ideia!"
 hold_court.5030.courtiers: "Tod[courtier.Custom('ES_OA')]s [courtier.Custom('ES_LoLa')]s cortesã[courtier.Custom('ES_OA')]s"
 hold_court.5030.b: "[court_tutor.GetFirstNameNoTooltip], tutor[court_tutor.Custom('ES_XA')] da corte, vai ajudar você a ensiná-lo."
 hold_court.5030.c: "Podemos fazer melhor uso de seus talentos!"
