l_spanish:
 feast_events_tova.0001.t: "Uma Maravilha para as Eras"
 feast_events_tova.0001.desc: "Meus convidados se movem como se estivessem em um devaneio, encantados pela cúpula ensolarada do meu palácio e pela fonte espetacular. O rico incenso do jardim impregna o ar e produz um efeito muito agradável nos corações e almas daqueles que ele alcança. 

"Deixe-me lhe mostrar tudo, [honorary_guest.GetTitledFirstNameNoTooltip|l].", proclama [honorary_guest.Custom('ES_ElLa')] [honorary_guest.GetTitledFirstName|l], e um murmúrio de aprovação percorre a multidão ao seu redor. 

Todos os convidados presentes se voltam para mim e me olham com expectativa, como se esperassem que eu dissesse algumas palavras sobre o palácio."
 feast_events_tova.0001.a: "De fato, isto é uma grande prova do meu governo."
 feast_events_tova.0001.b: "Deixe-me lhe mostrar tudo, [honorary_guest.GetTitledFirstNameNoTooltip|l]."
 feast_events_tova.0001.b.success: "Sua demonstração de opulência impressiona enormemente [honorary_guest.Custom('ES_AlAla')] [honorary_guest.GetTitledFirstNameNoTooltip|l]"
 feast_events_tova.0001.b.failure: "Seu palácio impressiona [honorary_guest.Custom('ES_AlAla')] [honorary_guest.GetTitledFirstNameNoTooltip|l], mas sua ostentação cai em ouvidos surdos"
 feast_events_tova.0001.c: "De fato, isto é uma grande prova do meu governo."
