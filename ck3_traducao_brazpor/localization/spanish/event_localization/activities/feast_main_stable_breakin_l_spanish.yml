l_spanish:
 feast_main_stable_breakin.0002.t: "Domando Cavalos"
 feast_main_stable_breakin.0002.breakin_with_helper: "A comida já ia bem adiantada, e a bebida também um pouco demais quando [breakin_stager.GetTitledFirstName|l] decidiu que era hora de montar a cavalo. Os estábulos estavam trancados a sete chaves, mas, com a ajuda de [breakin_helper.GetTitledFirstName|l], [breakin_stager.GetFirstName] logo conduziu para dentro um grupo de cavaleiros ansiosos.\n\nSem nenhum controle sobre os animais, houve xingamentos, risos e ossos quebrados enquanto homens e mulheres caíam dos cavalos que perambulavam pelo salão!"
 feast_main_stable_breakin.0002.breakin_with_deviant: "A refeição já ia bem, e a bebida um pouco demais quando [breakin_stager.GetTitledFirstName|l] decidiu que era hora de andar a cavalo. Os estábulos estavam trancados a sete chaves, mas, com a orientação de [breakin_deviant.GetTitledFirstName|l], [breakin_stager.GetFirstName] logo levou para dentro um grupo de cavaleiros ansiosos.\n\nSem absolutamente nenhum controle sobre os animais, houve xingamentos, risadas e ossos quebrados enquanto homens e mulheres caíam dos cavalos que vagueavam pelo salão!"
 feast_main_stable_breakin.0002.breakin_with_noone: "La comida estaba bien encaminada, y la bebida algo en exceso cuando [breakin_stager.GetTitledFirstName|l] decidió que era hora de montar a caballo. Los establos estaban cerrados a cal y canto pero, no se sabe cómo, [breakin_stager.GetFirstName] logró meter un grupo de jinetes ansiosos.\n\n¡Sin ningún tipo de control sobre los animales que allí estaban, hubo insultos, risas y huesos rotos mientras la gente se caía de los caballos que paseaban por el salón!"
 feast_main_stable_breakin.0002.bystander_riding: "\n\nAs outras criaturas dos estábulos não tiveram vida mais fácil, e uma cabra quase desabou sob o peso de [breakin_bystander.GetTitledFirstName|l]."
 feast_main_stable_breakin.0002.deviant_discovered: "\n\nMas a noite tomou outro rumo quando se descobriu [breakin_deviant.GetTitledFirstName|l] atrás dos estábulos cometendo atos indescritíveis com um boi! A mancha da vergonha jamais deixará sua alma."
 feast_main_stable_breakin.0002.what_a_silly_bunch: "\n\nNo final, os tratadores dos estábulos conseguiram controlar os animais assustados, e pelo menos os mais sensatos de nós tiveram um grande espetáculo!"
 feast_main_stable_breakin.0002.a: "Que grupo de tolos divertidos."
 feast_main_stable_breakin.0002.b: "Oh não, pobre animal!"
 feast_main_stable_breakin.0002.secret_of_my_own: "Que coisa terrível... terrível de se fazer..."
 feast_main_stable_breakin.0003.t: "$feast_main_stable_breakin.0002.t$"
 feast_main_stable_breakin.0003.breakin_with_helper: "Todos já estavam há um bom tempo comendo e bebendo um pouco demais quando [breakin_stager.GetTitledFirstName|l] decidiu que era hora de montar a cavalo. Meus estábulos estavam trancados a sete chaves, mas, com a ajuda de [breakin_helper.GetTitledFirstName|l], [breakin_stager.GetFirstName] logo conseguiu entrar com um grupo de cavaleiros ansiosos.\n\nSem nenhum controle sobre meus animais, houve palavrões, risadas e ossos quebrados enquanto homens e mulheres caíam dos cavalos que passeavam pelo salão!"
 feast_main_stable_breakin.0003.breakin_with_deviant: "Todos já estavam há um bom tempo comendo e bebendo um pouco demais quando [breakin_stager.GetTitledFirstName|l] decidiu que era hora de andar a cavalo. Meus estábulos estavam fechados a sete chaves, mas, com a orientação de [breakin_deviant.GetTitledFirstName|l] [breakin_stager.GetFirstName] logo conseguiu entrar com um grupo de cavaleiros ansiosos.\n\nSem absolutamente nenhum controle sobre meus animais, houve palavrões, risadas e ossos quebrados enquanto homens e mulheres caíam dos cavalos que vagavam pelo salão!"
 feast_main_stable_breakin.0003.breakin_with_noone: "Já faziam um bom tempo que todos comiam e bebiam em excesso quando [breakin_stager.GetTitledFirstName|l] decidiu que era hora de cavalgar. Meus estábulos estavam trancados a sete chaves, mas, ninguém sabe como, [breakin_stager.GetFirstName] conseguiu entrar com um grupo de cavaleiros ansiosos.\n\nCom absolutamente nenhum controle sobre meus animais, houve palavrões, risadas e ossos quebrados enquanto homens e mulheres caíam dos cavalos que passeavam pelo salão!"
 feast_main_stable_breakin.0003.bystander_riding: "\n\nOutras criaturas nos estábulos não tiveram vida mais fácil, e uma cabra quase desabou sob o peso de [breakin_bystander.GetTitledFirstName|l]."
 feast_main_stable_breakin.0003.deviant_discovered: "\nMas a noite tomou outro rumo quando se descobriu que [SCOPE.sCharacter('breakin_deviant').GetTitledFirstName|l] atrás dos estábulos, em atos indizíveis com um dos meus bois!\nA mancha da vergonha nunca deixará sua alma."
 feast_main_stable_breakin.0003.what_a_silly_bunch: "\n\nNo final, os tratadores dos estábulos conseguiram controlar os animais assustados, e pelo menos os mais sensatos de nós tiveram um grande espetáculo!"
 feast_main_stable_breakin.0003.a: "Tratadores, salvem essas pessoas delas mesmas!"
 feast_main_stable_breakin.0003.b: "Você está corrompendo moralmente meus animais!"
 feast_main_stable_breakin.0003.secret_of_my_own: "Meu querido Samson! Com [breakin_deviant.GetFirstName]?!"
 feast_main_stable_breakin.0004.t: "$feast_main_stable_breakin.0002.t$"
 feast_main_stable_breakin.0004.breakin_with_helper: "Comer e beber está ótimo, mas eu queria diversão!\nA [breakin_helper.GetTitledFirstName|l] teve um plano brilhante sobre os estábulos, e logo conduzi um grupo de cavaleiros ansiosos para além dos lamentáveis portões e trancas.\nHouve gritos e risadas quando levamos os cavalos para o salão, onde ofereci aos outros convidados uma exibição impressionante de equitação!"
 feast_main_stable_breakin.0004.breakin_with_deviant: "Comer e beber é ótimo, mas eu queria um pouco de diversão!\nA [breakin_deviant.GetTitledFirstName|l] teve uma ideia brilhante sobre os estábulos, e logo conduzi um grupo de cavaleiros ansiosos pelos lamentáveis portões e fechaduras.\nHouve gritos e risadas quando levamos os cavalos para o salão, onde proporcionou aos outros convidados uma impressionante demonstração de equitação!"
 feast_main_stable_breakin.0004.breakin_with_noone: "Comer e beber é bom, mas eu queria era diversão!\n\nAssumi a liderança de um grupo de cavaleiros ansiosos para passar pelas lamentáveis portas e fechaduras que guardavam os estábulos.\n\nLogo vieram gritos e risadas, enquanto os convidados nos viam cavalgar pelos animais pelo salão!"
 feast_main_stable_breakin.0004.bystander_riding: "\nTambém havia mais animais que cavalos presos nos estábulos, e [breakin_bystander.GetTitledFirstName|l] veio montando em uma cabra! Foi muito engraçado até que ela caiu sob [breakin_bystander.Custom('ES_ElElla')]. E foi muito divertido depois."
 feast_main_stable_breakin.0004.deviant_discovered: "\nMas a risada e a alegria cessaram quando descobriram [breakin_deviant.GetTitledFirstName|l]! Que canalha!"
 feast_main_stable_breakin.0004.signoff: "\n\nFoi uma noite maravilhosa, mesmo que os detalhes da minha memória estejam um pouco confusos."
 feast_main_stable_breakin.0004.a: "Mal posso esperar para fazer isso novamente."
 feast_main_stable_breakin.0005.t: "$feast_main_stable_breakin.0002.t$"
 feast_main_stable_breakin.0005.breakin: "Estando nós dois muito bêbados, [breakin_stager.GetTitledFirstName|l] queria se divertir, e eu lhe sugeri a ideia de que talvez isso devesse envolver os animais de noss[activity.GetOwner.Custom('ES_OA')] anfitri[activity.GetOwner.Custom('ES_OnOna')]…\n\nLogo me vi seguindo[breakin_stager.Custom('ES_LoLa')] até os estábulos, onde outros convidados bêbados começaram a levar os cavalos para o salão!"
 feast_main_stable_breakin.0005.bystander_riding: "\n\nTambém havia mais animais que cavalos nos estábulos, e [breakin_bystander.GetTitledFirstName|l] veio cavalgando numa cabra! Foi muito engraçado até ela desabar sob o peso."
 feast_main_stable_breakin.0005.deviant_discovered: "\n\nSabía que estaba muy mal, pero con tantas distracciones, no pude separarme del buey detrás de los establos.\n\nCuando oí gritar mi nombre en conmoción, supe que mi reputación estaba arruinada, pero en ese preciso momento estaba dispuest[ROOT.Char.Custom('ES_OA')] a soportar cualquier vergüenza. "
 feast_main_stable_breakin.0005.got_away_with_it: "\n\nA distração foi exatamente o que eu precisava, e já não consegui me afastar do boi atrás dos estábulos. \nO que fiz foi muito errado, mas o risco de ser descoberto tornou tudo ainda mais emocionante!"
 feast_main_stable_breakin.0005.a: "Não consigo parar de pensar naquela noite."
 feast_main_stable_breakin.0006.t: "$feast_main_stable_breakin.0002.t$"
 feast_main_stable_breakin.0006.breakin_with_helper: "Estando ambos muito bêbados, [breakin_stager.GetTitledFirstName|l] queria se divertir, e tive a ideia de que isso deveria envolver os animais de noss[activity.GetOwner.Custom('ES_OA')] anfitri[activity.GetOwner.Custom('ES_OnOna')]… \n\nLogo me vi ajudando-o a invadir os estábulos, onde, junto com outros convidados bêbados, começamos a levar os cavalos para o salão!"
 feast_main_stable_breakin.0006.bystander_riding: "\n\nTambém havia mais animais do que cavalos nos estábulos, e [breakin_bystander.GetTitledFirstName|l] veio cavalgando em uma cabra! Foi muito engraçado até que ela cedeu sob o peso de"
 feast_main_stable_breakin.0006.deviant_discovered: "\n\nMas não houve risos nem alegria quando se descobriu [breakin_deviant.GetTitledFirstName|l] atrás dos estábulos, cometendo pecados indizíveis com um boi!"
 feast_main_stable_breakin.0006.all_in_good_fun: "\n\nAo que parece, foi tudo por um bom espetáculo, então [activity.GetOwner.GetTitledFirstName|l] deixou claro que não seremos punidos por nossas ações."
 feast_main_stable_breakin.0006.a: "Qualquer coisa por um bom banquete!"
 feast_main_stable_breakin.0007.t: "$feast_main_stable_breakin.0002.t$"
 feast_main_stable_breakin.0007.breakin: "Estando nós dois muito bêbados, [breakin_stager.GetTitledFirstName|l] queria se divertir, e me veio a ideia de que isso deveria envolver os animais do noss[activity.GetOwner.Custom('ES_OA')] anfitri[activity.GetOwner.Custom('ES_OnOna')]... \n\nLogo me vi ajudando-o a invadir os estábulos, onde nós e outros convidados bêbados começamos a levar os cavalos para o salão!"
 feast_main_stable_breakin.0007.bystander_riding: "\n\nMontei qualquer animal que encontrei, mais tarde me disseram que era na verdade uma cabra, e seu colapso sob meu peso explica algumas das minhas contusões."
 feast_main_stable_breakin.0007.deviant_discovered: "\n\nAinda assim, tudo terminou abruptamente quando pegaram [breakin_deviant.GetTitledFirstName|l] atrás dos estábulos, envolvid[breakin_deviant.Custom('ES_OA')] em uma classe de diversão bem diferente com um boi! Eu teria ficado chocada e horrorizada se ainda estivesse consciente."
 feast_main_stable_breakin.0007.what_a_silly_bunch: "\n\nDemos mesmo um verdadeiro espetáculo, ao que parece. Felizmente, foi divertido o bastante para os outros convidados, de modo que noss[activity.GetOwner.Custom('ES_OA')] anfitri[activity.GetOwner.Custom('ES_OnOna')] não parece querer nos punir por nossas transgressões."
 feast_main_stable_breakin.0007.a: "Vou apenas fingir que me lembro de tudo isso."
 feast_main_stable_breakin.9001.t: "Menos Brincadeiras de Cavalos"
 feast_main_stable_breakin.9001.deviant_caught: "O banquete [host_saying_goodbye.Custom('ES_DelDela')] [host_saying_goodbye.GetTitledFirstName|l] logo estará chegando ao fim. É triste pensar que teremos de nos despedir, embora não seja tão ruim não ter mais de estar na companhia de [breakin_deviant.Custom('ES_DelDela')] [breakin_deviant.GetTitledFirstName|l] e desse boi…"
 feast_main_stable_breakin.9001.in_good_fun: "O festim [host_saying_goodbye.Custom('ES_DelDela')] [host_saying_goodbye.GetTitledFirstName|l] logo chegará ao fim.\n\nÉ triste pensar que teremos de nos despedir, mas ao menos poderemos recordar e rir por anos das peripécias de [breakin_stager.GetFirstName] e sua turma de foliões bêbados."
 feast_main_stable_breakin.9001.a: "Que momento maravilhoso estamos tendo!"
 feast_main_stable_breakin.9002.deviant_caught: "¡Qué triste es pensar que pronto tendré que despedirme de todos mis invitados! \n\nSerá una pena verlos marchar, a excepción [breakin_deviant.Custom('ES_DelDela')] [breakin_deviant.GetTitledFirstName|l].\nAunque me acordaré de su persona cada vez que mire a mi apreciado buey."
 feast_main_stable_breakin.9002.in_good_fun_or_what: "¡Mis invitados están todos de tan buen humor!\n\nEste festín nos ha acercado y podremos recordar y reírnos durante años de las correrías de [breakin_stager.GetFirstName] y su banda de juerguistas borrachos.\n\n¡Hasta [breakin_deviant.Custom('ES_ElLa')] [breakin_deviant.GetTitledFirstName|l] me alabó en broma por el saludable estado de mis animales!"
 feast_main_stable_breakin.9002.in_good_fun: "Meus convidados estão todos de bom humor!\n\nEsta festa nos aproximou, e poderemos olhar para trás e rir das peripécias  [breakin_stager.GetFirstName] e sua turma embriagada de foliões por muitos anos."
 feast_main_stable_breakin.9002.a: "Mantenham-me em seus corações, vassalos!"
 feast_main_stable_breakin.9003.deviant_caught: "El festín [host_saying_goodbye.Custom('ES_DelDela')] [host_saying_goodbye.GetTitledFirstName|l] está llegando a su fin.\n\nMe cuesta mirar [breakin_deviant.Custom('ES_AlAla')] [breakin_deviant.GetTitledFirstName|l] del mismo modo, pero casi debo darle las gracias por haber desviado la atención de los que lo empezamos todo colándonos en los establos."
 feast_main_stable_breakin.9003.in_good_fun: "Que diversão estamos tendo! \n\n[host_saying_goodbye.Custom('ES_ElLa')|U] [host_saying_goodbye.GetTitledFirstName|l] parece ter perdoado nossa pequena invasão, ao ver como os outros convidados se divertiram nos observando cavalgar."
 feast_main_stable_breakin.9003.a: "O que fizemos não foi tão ruim, afinal."
 feast_main_stable_breakin.9004.deviant_caught: "Sei que ningu?m do senhorio vai me olhar da mesma forma outra vez. [host_saying_goodbye.Custom('ES_ElLa')|U] [host_saying_goodbye.GetTitledFirstName|l] condenou meu nome, e [breakin_stager.GetFirstName], com quem eu ria e bebia n?o faz muito tempo, j? n?o consegue sequer me olhar nos olhos."
 feast_main_stable_breakin.9004.in_good_fun: "Não acredito que escapei impune do que fiz!\nQuando levaram os animais, eu elogiei [host_saying_goodbye.Custom('ES_AlAla')] [host_saying_goodbye.GetTitledFirstName|l] pelo estado saudável de suas bestas.\n\nSe [host_saying_goodbye.Custom('ES_ElElla')] soubesse!"
 feast_main_stable_breakin.9004.a: "Vou me conter no futuro! Espero."
 feast_stable_breakin_log_title: "Invasão aos Estábulos"
 feast_stable_breakin_log: "[TARGET_CHARACTER.Custom('ES_ElLa')|U] [TARGET_CHARACTER.GetTitledFirstName|l] invadiu os estábulos e soltou os animais no salão do banquete."
