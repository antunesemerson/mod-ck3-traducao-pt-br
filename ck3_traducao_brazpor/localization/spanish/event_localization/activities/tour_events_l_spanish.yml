l_spanish:
 #Tour Travel Events
 tour_travel.1001.title: "[Select_CString( angry_peasant.IsFemale, 'uma serva', 'um servo' )|U] e seu [ROOT.Char.GetTitleAsNameNoTooltip]"
 tour_travel.1001.desc.intro: "Entro em uma taverna local em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], cansad[ROOT.Char.Custom('ES_OA')] da viagem e com sede de [ROOT.Char.Custom('RegionalDrink')] e com vontade de descansar.\n\nMinha contemplação silenciosa é interrompida pelo som de um punho se chocando contra a madeira estilhaçada, seguido de um cuspe desdenhoso. "Maldit[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('angry_peasant'))] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('angry_peasant'))]!"
 tour_travel.1001.desc.mid.wrong_language: "Nem sequer fala [angry_peasant.GetCulture.GetLanguage.GetName|l], e ainda assim ousa se proclamar [Select_CString( ROOT.Char.IsFemale, 'nuestra legítima', 'nuestro legítimo')] [ROOT.Char.GetLadyLord]!"."
 tour_travel.1001.desc.mid.wrong_culture: "[ROOT.Char.GetSheHe|U] é [Select_CString( ROOT.Char.IsFemale, 'uma completa estrangeira', 'um completo estrangeiro' )]! Como podemos ser governados por alguém que nem sequer é [angry_peasant.GetCulture.GetName]?"
 tour_travel.1001.desc.mid.wrong_faith: "É um[ROOT.Char.Custom('ES_XA')] infiel [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('angry_peasant'))]! Cada segundo que permanece no trono é uma ofensa à vontade de [angry_peasant.GetFaith.HighGodNamePossessive]"."
 tour_travel.1001.desc.mid.pretender: "A Casa de [ROOT.Char.GetHouse.GetName], eu cuspo em todos eles! Todos sabem que os verdadeiros governantes do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] são da casa [claimant_character_scope.GetHouse.GetName]."
 tour_travel.1001.desc.mid.powerful_diarch: "Noss[ROOT.Char.Custom('ES_OA')] supost[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip] é frac[ROOT.Char.Custom('ES_OA')]! O verdadeiro governante de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] é aquel[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetDiarch.Custom2('InsultNoun', SCOPE.sC('angry_peasant'))] [ROOT.Char.GetDiarch.Custom2('InsultAdjective', SCOPE.sC('angry_peasant'))], [ROOT.Char.GetDiarch.GetFirstName]!"
 tour_travel.1001.desc.mid.just_plain_dislike_em: "Nem deveríamos chamar esse [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('angry_peasant'))] de [ROOT.Char.GetTitleAsNameNoTooltip]; deveríamos chamá-[ROOT.Char.Custom('ES_LoLa')] de idiota [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('angry_peasant'))]!"
 tour_travel.1001.desc.outro.nudist: "\n\nTento não chamar atenção, mas parece que meu comportamento tão de [ROOT.Char.GetTitleAsNameNoTooltip|l] e a perfeição inconfundível do corpo bem cuidado de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetHouse.GetName] me denunciou. Preciso pensar em algo antes que a situação piore."
 tour_travel.1001.desc.outro: "\n\nTento manter um perfil discreto, mas parece que minha maneira [ROOT.Char.GetTitleAsNameNoTooltip|l] e as insígnias da Casa [ROOT.Char.GetHouse.GetName] em minhas vestes me denunciaram. Preciso pensar em algo antes que a situação se agrave."
 tour_travel.1001.a: "Diga isso na minha cara, seu [angry_peasant.Custom2('InsultNoun', ROOT.Char)]!"
 tour_travel.1001.b: "Talvez uma redução de impostos mude sua opinião."
 tour_travel.1001.c: "Oh, eu simplesmente pareço com [ROOT.Char.GetNameNoTooltip]!"
 tour_travel.1002.title: "A [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type')|U] Entre as Ervas Daninhas"
 tour_travel.1002.desc: "À medida que atravessamos [pretty_peasant_county_scope.GetName], fico encantad[ROOT.Char.Custom('ES_OA')] com a paisagem. De fato, o(a) [pretty_peasant_county_scope.GetProvince.Custom('TerrainTypeProvince')] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] deve ser o lugar mais belo de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], e ainda mais bel[pretty_peasant.Custom('ES_OA')]s sóo os(as) [pretty_peasant.GetWomenMen] que o chamam de lar.

Enquanto minha comitiva me escolta por mais uma aldeia humilde, encontro um[pretty_peasant.Custom('ES_XA')] jovem especialmente bonit[pretty_peasant.Custom('ES_OA')] cuidando de suas tarefas simples e sinto meu coração acelerar. Ver esse [pretty_peasant.Custom('LoverPetName')] em sua vida comum é como contemplar poesia encarnada e, antes que eu consiga pensar, meu coração jÉ me ordenou que mandasse a comitiva parar."
 tour_travel.1002.a: "Dirigir-se a um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 tour_travel.1002.b: "Enquanto minha viagem continua pela [angry_county_scope.GetName], sou informado de que combinei um encontro com um representante do campesinato descontente.\n\nUma criatura lamentável se arrasta diante de mim, discutindo sobre a suposta dignidade do populacho [angry_county_scope.GetAdjective]. No entanto, logo percebo que tal [rude_peasant.Custom2('InsultNoun', ROOT.Char)] [rude_peasant.Custom2('InsultAdjective', ROOT.Char)] jamais me dirigiu a palavra como "[ROOT.Char.Custom('FormOfAddressForLiege')|U]", uma ofensa que posso punir da forma que eu achar mais adequada."
 tour_travel.1003.title: "Façam essa criatura ser chicoteada por cinco milhas."
 tour_travel.1003.desc: "As entranhas dele/a vão adornar o/a [angry_county_scope.GetProvince.Custom('TerrainTypeProvince')]."
 tour_travel.1003.a: "Perdoo a ignorância."
 tour_travel.1003.b: "$altruism_intent_header$ Um Toque Curador"
 tour_travel.1003.c: "Entro em [diseased_county_scope.GetName] com a disposição de conceder meu toque real aos camponeses locais. Deparo-me imediatamente com a criatura mais miserável que já vi em toda a minha vida. Com a mínima provocação, ele expõe seus pés calejados a poucos centímetros de minhas mãos imaculadas.\n\n"
 tour_travel.1004.title: "Assim como Jesus lavou os pés de seus discípulos, [ROOT.Char.GetFaith.HighGodName] também me implora que eu lave os pés de meus súditos leais."
 tour_travel.1004.desc.intro: "Por mais que me repugne até mesmo estar na presença de [Select_CString( diseased_peasant.IsFemale, 'esta mendiga enferma', 'este mendigo enfermo' )] de odor penetrante, diz-se que meu toque pode curar até mesmo as doenças mais indecorosas."
 tour_travel.1004.desc.outro.christian: "Odeio admitir, mas isso é um pouco erótico."
 tour_travel.1004.desc.outro: "Uma bênção para você, uma memória ruim para mim."
 tour_travel.1004.a.tarantino: "Oh, eu poderia massagear esses pés corposcópicos para sempre."
 tour_travel.1004.a: "Talvez um toque suave na testa resolva."
 tour_travel.1004.b: "Afaste essas salsichas sujas de mim!"
 tour_travel.1004.c: "Afaste esses [ROOT.Char.Custom('get_region_root_vegetable_plural')] sujos de mim!"
 tour_travel.1004.d.meat: "$altruism_intent_header$ O Toque Real"
 tour_travel.1004.d.two_veg: "A notícia de minha chegada parece ter se espalhado para [county_to_bless_scope.GetName], pois nosso séquito logo é cercado por inúmeros camponeses pedindo para serem abençoados com o toque real.\n\nEu poderia simplesmente borrifar um pouco de água abençoada por mim sobre eles, e certamente ficariam satisfeitos, mas conceder-lhes moedas abençoadas para aliviar suas áreas infectadas os deixaria felizes e abençoados por muito mais tempo."
 tour_travel.1005.title: "Distribuirei moedas abençoadas."
 tour_travel.1005.desc: "Uma borrifada de água deve satisfazê-los."
 tour_travel.1005.a: "Eles não receberão nada!"
 tour_travel.1005.b: "$altruism_intent_header$ Esmolas para os Pobres"
 tour_travel.1005.c: "Enquanto cavalgamos perto da grande [county_holder_to_bless_scope.GetFaith.HouseOfWorship] de [church_barony_scope.GetNameNoTooltip], ordeno que meu séquito pare para admirar este lugar sagrado que atende às necessidades espirituais de tantos aqui em [county_to_bless_scope.GetNameNoTooltip].\n\nO terreno de sua [county_holder_to_bless_scope.GetFaith.HouseOfWorship] está cheio de indigentes que vêm rezar para que suas circunstâncias melhorem. Talvez esta seja uma oportunidade de mostrar ao povo de [county_to_bless_scope.GetNameNoTooltip] quão magnânim[GetPlayer.Custom('ES_OA')] e bondoso posso ser."
 tour_travel.1006.title: "Esmolas para os pobres!"
 tour_travel.1006.desc: "Se eles quisessem dinheiro, não deveriam ter nascido pobres."
 tour_travel.1006.a: "Removam essas pragas dos degraus!"
 tour_travel.1006.b: "[Select_CString( wise_woman_scope.IsFemale, 'La sabia', 'El sabio' )] de [wise_woman_barony_scope.GetNameNoTierNoTooltip]"
 tour_travel.1006.c: "Enquanto meu cortejo prossegue viagem por todo o meu domínio, acabamos atravessando a região remota e desavisada de [wise_woman_barony_scope.GetNameNoTier]. Eu não teria dado importância a isso, mas [superstituous_courtier_scope.GetName] me puxa para o lado para exaltar com entusiasmo a virtude d[wise_woman_scope.Custom('ES_EA')] chamad[wise_woman_scope.Custom('ES_OA')] "Sábi[wise_woman_scope.Custom('ES_OA')] [wise_woman_scope.GetWomanMan|U] de [wise_woman_barony_scope.GetNameNoTierNoTooltip]".

"
 tour_travel.1007.title: ""Perdoai-me, meu [ROOT.Char.GetLadyLord], mas vejo que sofreis tremendamente de males e aflições. [Select_CString( wise_woman_scope.IsFemale, 'A sábia', 'O sábio' )] de [wise_woman_barony_scope.GetNameNoTierNoTooltip] estÉ a apenas um pequeno desvio, e sei que [wise_woman_scope.GetSheHe] tem exatamente o que precisais para voltar a ter saúde!""
 tour_travel.1007.desc.intro: ""Meu [ROOT.Char.GetTitleAsNameNoTooltip], vejo que estais extremamente radiante e resplandecente como sempre, como convém estar quando se está grávida. No entanto, posso dizer que o árduo trabalho de carregar um bebê está causando grande desconforto a vós e [wise_woman_scope.Custom('ES_ElLa')] sabi[wise_woman_scope.Custom('ES_OA')] que está perto terá justamente o remédio necessário para aliviar o que vos aflige".".

"
 tour_travel.1007.desc.mid.ill: ""Se me permitis, [ROOT.Char.Custom('FormOfAddressForLiege')], alguns outros membros do vosso cortejo têm feito comentários sobre vossa... aparência. Mas não temais! Há [Select_CString( wise_woman_scope.IsFemale, 'uma sábia', 'um sábio' )] por perto que pode curar qualquer aflição, ao que dizem.""
 tour_travel.1007.desc.mid.pregnant: "\n\nTenho minhas dúvidas, mas [superstituous_courtier_scope.GetNameNoTooltip] parece estar tão convencid[superstituous_courtier_scope.Custom('ES_OA')] das virtudes de tal [Select_CString( wise_woman_scope.IsFemale, 'curandera mística', 'curandero místico' )] que sinto vontade de fazer uma visita."
 tour_travel.1007.desc.mid.psychological: "Um pequeno desvio não deve ser problema."
 tour_travel.1007.desc.mid.weakened: "Absurdo!"
 tour_travel.1007.desc.mid.ugly: "Você vai ver [Select_CString( wise_woman_scope.IsFemale, 'a la sabia', 'al sabio' )]. Isso pode ter resultados positivos ou negativos."
 tour_travel.1007.desc.outro: "$tour_travel.1007.title$"
 tour_travel.1007.a: "Ao cair da noite, entro no casebre mal iluminado [Select_CString( wise_woman_scope.IsFemale, 'da sábia', 'do sábio' )], enquanto minha comitiva permanece do lado de fora. Não tenho dúvidas de que [Select_CString( wise_woman_scope.IsFemale, 'a mulher excêntrica', 'o homem excêntrico' )] que manca lá dentro é quem procuro.

"Ah, eu jà esperava por vós. Entrai! Compartilhai meu fogo, meu [ROOT.Char.GetTitleAsNameNoTooltip|U]." Antes que eu consiga dizer uma palavra, suas mãos geladas envolvem as minhas."
 tour_travel.1007.b: "Passo a noite sorvendo líquidos negros de gosto ruim e sentindo o aroma de incensos embriagantes e, quando saio no dia seguinte, me sinto como um[ROOT.Char.Custom('ES_XA')] nov[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetWomanMan]."
 go_see_wise_woman_tt: "Passo a noite comendo todo tipo de comidas estranhas: globos oculares, ervas e frutas que jamais tinha visto, enquanto todas as minhas necessidades são atendidas por tão [Select_CString( wise_woman_scope.IsFemale, 'extraña mujer', 'extraño hombre' )]. Ao sair na manhã seguinte, sinto-me revitalizad[ROOT.Char.Custom('ES_OA')]!"
 tour_travel.1008.title: "Suas mãos se movem para agarrar meu crânio como uma grande fera segurando sua presa. Passamos a noite entoando palavras que não compreendo, e quando saio pela manhã, sinto que minha cabeça está mais leve."
 tour_travel.1008.desc.intro: "Ao cair da noite, entro no casebre mal iluminado [Select_CString( wise_woman_scope.IsFemale, 'da sábia', 'do sábio' )], enquanto minha comitiva permanece do lado de fora. Não tenho dúvidas de que [Select_CString( wise_woman_scope.IsFemale, 'a mulher excêntrica', 'o homem excêntrico' )] que manca lá dentro é quem procuro.

"\n\nTodas as minhas dúvidas são dissipadas e meus males estão curados."
 tour_travel.1008.desc.mid.ill: "Como mágica!"
 tour_travel.1008.desc.mid.pregnant: "[wise_woman_scope.GetSheHe|U] deve ser meu médico!"
 tour_travel.1008.desc.mid.psychological: "[Select_CString( wise_woman_scope.IsFemale, 'La charlatana', 'El charlatán' )] de [wise_woman_barony_scope.GetNameNoTierNoTooltip]"
 tour_travel.1008.desc.mid.weakened: "$tour_travel.1008.desc.intro$"
 tour_travel.1008.desc.mid.ugly: "Passo a noite inteira cheirando odores absolutamente intoleráveis, bebendo fluidos viscosos repugnantes e tendo meu corpo coberto por ervas ardentes! Toda a experiência adiciona ainda mais náusea e dor à minha aflição existente, e termino a noite me sentindo pior do que quando comecei."
 tour_travel.1008.desc.outro: "Passa a noite inteira esfregando pastas e cremes coloridos no meu rosto, cobrindo minhas muitas manchas e imperfeições. Pela manhã, contemplo meu reflexo e uivo de medo ao ver o monstro em que [wise_woman_scope.GetSheHe] me transformou!"
 tour_travel.1008.a: "Faço tudo o que [wise_woman_scope.GetSheHe] me pede: bebo chás de ervas, massageio minhas extremidades, caminho sobre brasas e ingiro ervas suficientes para derrubar um homem. No entanto, tudo isso parece ter tido pouco efeito sobre mim e não me sinto melhor do que quando cheguei."
 tour_travel.1008.b: "

Não sei o que [superstituous_courtier_scope.GetNameNoTooltip] ouviu sobre ess[wise_woman_scope.Custom('ES_EA')] [Select_CString( wise_woman_scope.IsFemale, 'sábia', 'sábio' )], mas ficou claro que [wise_woman_scope.GetSheHe] não passa de [Select_CString( wise_woman_scope.IsFemale, 'uma charlaté', 'um charlatéo' )] vulgar de beira de estrada."
 tour_travel.1009.title: "Que perda de tempo."
 tour_travel.1009.desc.intro: "Enganar [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip] é um crime punível com a morte."
 tour_travel.1009.desc.mid.ill: "Cuidado com os Bandidos!"
 tour_travel.1009.desc.mid.ugly: "Minha comitiva continua por nossa rota planejada até [next_destination.GetName] quando, de repente, somos detidos abruptamente por ordem de [travel_leader.GetName]!\n\n"Parem, seus tolos! Diz-se que esta estrada está infestada de bandidos e canalhas de baixo caráter, precisamos desviar!".\n\nA rota que propõe é mais longa, mas me assegura que é mais segura."
 tour_travel.1009.desc.mid.nothing: "Vamos seguir a rota segura."
 tour_travel.1009.desc.outro: "

Não sei o que [superstituous_courtier_scope.GetNameNoTooltip] ouviu sobre ess[wise_woman_scope.Custom('ES_EA')] [Select_CString( wise_woman_scope.IsFemale, 'sábia', 'sábio' )], mas ficou claro que [wise_woman_scope.GetSheHe] não passa de [Select_CString( wise_woman_scope.IsFemale, 'uma charlaté', 'um charlatéo' )] vulgar de beira de estrada."
 tour_travel.1009.a: "Justiça Local"
 tour_travel.1009.b: "Chegamos a uma pequena aldeia em [ROOT.Char.GetCurrentLocation.GetName] para ver uma grande agitação na praça da cidade. Uma pobre criatura está cercada por aldeões furiosos; o olhar sombrio e desesperançado em seus olhos se apaga e se ilumina quando [accused_character.GetSheHe] percebe que minha comitiva se aproxima.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U] , eu imploro! Não os escute, é tudo mentira! Sou inocente! Não me concederia a justiça [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]?".\n\n"
 tour_travel.9010.t: "É certo que as provas parecem circunstanciais, mas um[accused_character.Custom('ES_XA')] camponês vulgar[accused_character.Custom('ES_OA')] não deve falar com seu [ROOT.Char.GetTitleAsNameNoTooltip] sem ser instruído."
 tour_travel.9010.desc: "As evidências parecem bastante incriminadoras, e [accused_character.GetSheHe] falou fora de hora além disso."
 tour_travel.9010.a: "A execução é justa."
 tour_travel.9010.b: "As provas são frívolas, deixai[accused_character.GetHerHim] partir."
 tour_travel.9010.success: "Servir-me será o castigo."
 tour_travel.9010.failure: "O Covil do Pecado"
 tour_travel.9020.t: "Quando sou despertado do meu sono da meia-noite, ouço os gritos de folia e alegria se aproximando lentamente por trás de mim. Aparece [drunky_entourage.GetName|U] com"
 tour_travel.9020.desc.intro: "olhos vermelhos de haxixe."
 tour_travel.9020.desc.outro.guilty: "hálito com o cheiro de [ROOT.Char.Custom('RegionalAlcoholicDrink')]."
 tour_travel.9020.desc.outro: "\n\n"Pelo [drunky_entourage.GetFaith.HighGodName]! Há um maravilhoso antro de pecado a poucos minutos daqui, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Devemos ficar aqui por um tempo e nos tornar idiotas de júbilo"."
 tour_travel.9020.a: "Alegria e diversão, aqui vou eu!"
 tour_travel.9020.b: "Não devemos nos distrair."
 tour_travel.9020.c: "[Select_CString( ROOT.Char.IsFemale, 'Heroína', 'Héroe' )] sem igual"
 tour_travel.9030.t: "Meu grupo para para descansar por um momento, e entro em um estabelecimento humilde para conhecer melhor os moradores locais. Mantendo-me incógnit[ROOT.Char.Custom('ES_OA')], escuto as conversas animadas da classe mais baixa.

Um[peasant.Custom('ES_XA')] [peasant.GetWomanMan] está festejando com seus compatriotas, trocando histórias sobre seus heróis lendários favoritos. "...e quanto a ess[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetPromotedLegend.GetProtagonist.GetName]? Nem sei se [ROOT.Char.GetPromotedLegend.GetProtagonist.GetSheHe] algum dia existiu, quanto mais todo esse papo de '[ROOT.Char.GetPromotedLegend.GetName]'!"."
 tour_travel.9030.desc.intro: "Eu devo defender minha lenda!"
 tour_travel.9030.desc.mid.hashish: "Os camponeses cantam louvores à sua história"
 tour_travel.9030.desc.mid: "Você é zombado"
 tour_travel.9030.desc.outro: "Está claro que ele não entendeu a história."
 tour_travel.9030.a: "Alegria e diversão, aqui vou eu!"
 tour_travel.9030.b: "Não devemos nos distrair."
 tour_travel.9040.t: "Chega [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstNameNoTooltip|l]!"
 tour_travel.9040.desc: "Meu grupo para para descansar por um momento, e entro em um estabelecimento humilde para conhecer melhor os moradores locais. Mantendo-me incógnit[ROOT.Char.Custom('ES_OA')], escuto as conversas animadas da classe mais baixa.

Um[peasant.Custom('ES_XA')] [peasant.GetWomanMan] está festejando com seus compatriotas, trocando histórias sobre seus heróis lendários favoritos. "As fileiras de guardas sérios e disciplinados deixam claro que o medo é a ordem do dia.\n\n"
 tour_travel.9040.a: "O carro do tesouro e a litania de cobradores de impostos sugerem que ficarei mais pobre com esta visita.\n\n"
 tour_travel.9040.a.success: "Já era hora de que es[visiting_liege.Custom('ES_EA')] [visiting_liege.Custom2('InsultNoun', ROOT.Char)] [visiting_liege.Custom2('InsultAdjective', ROOT.Char)|l] saísse de seus salões lúgubres e visse um pouco do verdadeiro interior do país."
 tour_travel.9040.a.failure: "Já faz muito tempo desde que senti seu abraço… talvez haja tempo para colocarmos a conversa em dia…"
 tour_travel.9040.b: "Embora tenhamos de lidar com o peso das formalidades, a visita de um tão bom[visiting_liege.Custom('ES_XA')] amig[visiting_liege.Custom('ES_OA')] é muito bem-vinda."
 #Tour Arriving at a Stop
 #Vassal: Liege arrival event
 tour_general.0001.title: "Como um[ROOT.Char.Custom('ES_XA')] d[ROOT.Char.Custom('ES_AsOs')] vassal[ROOT.Char.Custom('ES_OA')]s mais poderos[ROOT.Char.Custom('ES_OA')]s do reino, não é de se estranhar que [visiting_liege.GetSheHe] tenha vindo bater à minha porta."
 tour_general.0001.desc.intro: "Receber [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetLadyLord] do domínio em meus próprios salões seria uma grande honra."
 tour_general.0001.desc.type.majesty: "\n\nDarei [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitleAsNameNoTooltip] um passeio por minha [ROOT.Char.Custom('FortifiedBuilding')] e as terras [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]."
 tour_general.0001.desc.type.intimidation: "\n\nSediarei um jantar luxuoso digno de um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip] —uma oportunidade de mostrar a hospitalidade do país [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]—"
 tour_general.0001.desc.type.taxation: "\n\nMostrarei [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitleAsNameNoTooltip] um festival que apresente o melhor que temos em [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] em entretenimento e apresentações,"
 tour_general.0001.desc.mid.hates_liege: "e proverei sua comitiva com camas e entretenimento.\n\nA única pergunta é: abro os portões e [visiting_liege.GetHerHim] o deixo entrar?"
 tour_general.0001.desc.mid.lover: "Bem-vind[visiting_liege.Custom('ES_OA')] [visiting_liege.GetTitleAsNameNoTooltip|l] meu[visiting_liege.Custom('ES_OA')]! Bem-vind[visiting_liege.Custom('ES_OA')]!"
 tour_general.0001.desc.mid.friend: "Vamos fingir que não tem ninguém em casa..."
 tour_general.0001.desc.mid.close_family: "Uma oportunidade rara, mas bem-vinda de ver a minha [ROOT.Char.Custom2('RelationToMeShort', visiting_liege)]. Foi gentil dele vir."
 tour_general.0001.desc.mid.house: "Não Há Ninguém em Casa"
 tour_general.0001.desc.mid.powerful_vassal: "Chegou até mim a informação de que meus planos foram interrompidos e não é mais possível realizar uma visita real a [tour_location.GetName].\n\n"
 tour_general.0001.desc.mid.default: "Tornei-me [ROOT.Char.Custom('ES_ElLa')] nov[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLadyLord] de [tour_location.GetName], sem deixar ninguém além de mim mesmo para me receber."
 tour_general.0001.desc.phase.tour_grounds: "Já havia visitado a [stop_host_scope.GetName] antes em minha Grande Turnê, e não posso demonstrar um tratamento preferencial a [stop_host_scope.GetSheHe]. Receberá apenas uma visita, nada mais."
 tour_general.0001.desc.phase.dinner: "[stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitleAsNameNoTooltip|l] de [tour_location.GetNameNoTooltip] já não responde diretamente a mim."
 tour_general.0001.desc.phase.cultural_festival: "[tour_location.GetNameNoTooltip|U] está a serviço de um[stop_host_scope.Custom('ES_XA')|U] humilde [stop_host_scope.GetTitleAsNameNoTooltip], e não é digno de mim visitar um[stop_host_scope.Custom('ES_XA')|U] [stop_host_scope.GetWomenMen] de tão baixo status."
 tour_general.0001.desc.outro: "[stop_host_scope.GetName|U] está em campo de batalha e não pode mais me receber."
 tour_general.0001.a: "[stop_host_scope.GetName|U] abandonou sua casa e partiu para terras desconhecidas."
 tour_general.0001.b: "[stop_host_scope.GetName|U] foi pres[stop_host_scope.Custom('ES_OA')] e agora apodrece em minhas masmorras."
 #Liege: Phase invalidation
 tour_general.0500.title: "[stop_host_scope.GetName|U] contraiu uma doença mortal, e não posso me arriscar a fazer uma visita e respirar seu miasma tóxico."
 tour_general.0500.desc.intro: "[stop_host_scope.GetName|U] já não está mais no controle de todas as suas faculdades e seria um[stop_host_scope.Custom('ES_XA')] mau[stop_host_scope.Custom('ES_XA')] anfitri[stop_host_scope.Custom('ES_OnOna')]."
 tour_general.0500.desc.self: "[stop_host_scope.GetName|U] partiu em alguma aventura para terras às quais não me animo a ir."
 tour_general.0500.desc.already_visited: "A sombra da guerra paira sobre [tour_location.GetNameNoTooltip] e [stop_host_scope.GetName] me avisou para não me aventurar lá."
 tour_general.0500.desc.no_longer_liege: "\n\nEmbora isso não signifique o fim da minha turnê, é uma grande decepção."
 tour_general.0500.desc.lowly_baron: "A próxima fase foi pulada."
 tour_general.0500.desc.leading_army: "Eu estava tão ansioso por isso…"
 tour_general.0500.desc.gone_travelling: "[stop_host_scope.GetName|U] abandonou sua casa e partiu para terras desconhecidas."
 tour_general.0500.desc.imprisoned_by_me: "Recusado"
 tour_general.0500.desc.imprisoned: "Quando meu séquito chega às portas de [stop_host_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTier], chama-se [stop_host_scope.GetName] para me receber, mas, depois de um tempo mais do que generoso, nem mesmo o mais humilde dos servos aparece para me saudar. O chamado é feito muitas outras vezes, mas não recebemos resposta além dos gorjeios dos pássaros selvagens e do assobio dos ventos suaves.\n\nFica claro que fui barrado às portas. E, ao agir assim, [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.Custom2('InsultAdjective', ROOT.Char)] [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitleAsNameNoTooltip] insultou a coroa!"
 tour_general.0500.desc.deadly_illness: "Vamos apenas seguir em frente."
 tour_general.0500.desc.incapable: "Esse insulto não será esquecido tão cedo."
 tour_general.0500.desc.gone_adventuring: "Arrombe os portões malditos!"
 tour_general.0500.desc.at_war: "[visiting_liege.GetFirstName] te perdoou"
 tour_general.0500.desc.outro: "[visiting_liege.GetFirstName] está insultad[visiting_liege.Custom('ES_OA')]"
 current_phase_skipped_tt: "[visiting_liege.GetFirstName] saqueou sua propriedade"
 tour_general.0500.a: "Eu estava tão ansioso por isso…"
 #Liege: Rejected at the gates
 tour_general.0501.title: "$activity_tour$: Um Pedido Cortês"
 tour_general.0501.desc: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Uma Reivindicação Cortês"
 tour_general.0501.a: "Fiquei sabendo que [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l] está de olho em [tour_general_3001_target_courtier.Custom('ES_ElLa')] [tour_general_3001_target_courtier.GetTitledFirstName|l], conhecid[tour_general_3001_target_courtier.Custom('ES_OA')] em nossas terras por sua [tour_general_3001_target_courtier.Custom('GetCourtierTrait')|l]."
 tour_general.0501.b: "\n\nResumindo, [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l] deseja realocar[tour_general_3001_target_courtier.GetHerHim] na corte [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitleAsNameNoTooltip]."
 tour_general.0501.c: "\n\nSem levar em conta o que eu pense, parece que além disso [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitleAsNameNoTooltip] tentou transferir à força [tour_general_3001_target_courtier.Custom('ES_AlAla')] [tour_general_3001_target_courtier.GetTitledFirstName|l] para a corte [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitleAsNameNoTooltip] durante a noite."
 tour_general.0501.liege_merciful: "\n\nEsta é certamente uma oportunidade de mostrar-lhe minha benevolência!"
 tour_general.0501.liege_angry: "\n\nEmbora eu não entenda muito bem o raciocínio do meu [ROOT.Char.Custom2('RelationToMePossessive', visiting_liege )], não estou muito preocupado com a ideia de perder[tour_general_3001_target_courtier.GetHerHim]."
 tour_general.0501.raid: "\n\nSe me ocorre #EMP un par de motivos#! pelos quais eu gostaria de manter por aqui [tour_general_3001_target_courtier.Custom('ES_AlAla')] [tour_general_3001_target_courtier.GetTitledFirstNameNoTooltip|l]. No entanto…"
 #Tour Remaining at a Stop
 #Vassal Events
 tour_general.1001.title: "Espero que [tour_general_3001_target_courtier.GetFirstNameNoTooltip] lhe sirva bem."
 tour_general.1001.title_theft: "[tour_general_3001_target_courtier.GetFirstNameNoTooltip] nunca foi de grande utilidade para mim mesmo."
 tour_general.1001.intro: "Quid pro quo, [visiting_liege.GetTitledFirstNameNoTooltip|l]."
 tour_general.1001.desc: "Você pede um favor em troca de [tour_general_3001_target_courtier.GetFirstName] se juntar à corte de [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitledFirstName|l]"
 tour_general.1001.desc_theft_liege: "Tenho certeza de que [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitleAsNameNoTooltip] pode fazer com que valha a pena para mim…"
 tour_general.1001.outro: "Você pede um pouco de ouro em troca de [tour_general_3001_target_courtier.GetFirstName] se junte à corte [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitledFirstName|l]"
 tour_general.1001.outro_unusual_courtier: "Só pode haver #EMP um#! motivo pelo qual queira a [tour_general_3001_target_courtier.GetFirstNameNoTooltip]…"
 tour_general.1001.outro_unusual_host_unusual_courtier: "Vamos nos permitir."
 tour_general.1001.outro_theft_liege: "Você sugere compartilhar uma refeição #EMP exótica#! com [visiting_liege.GetShortUIName]."
 tour_general.1001.outro_theft_liege_unusual_courtier: "[visiting_liege.GetShortUIName] aceitará o convite ou condenará seu canibalismo."
 tour_general.1001.a: "#EMP Você vai morrer agora!#!"
 tour_general.1001.a_theft_liege: "Pelo [ROOT.Char.GetFaith.DevilName]!"
 tour_general.1001.b: "Você se lança sobre [visiting_liege.GetShortUIName]."
 tour_general.1001.b.tt: "Seu ataque é bem-sucedido."
 tour_general.1001.c: "Você sobreviveu."
 tour_general.1001.c.tt: "Você sobreviveu à luta."
 tour_general.1001.d: "Seu guarda-costas interveio para salvá-lo."
 tour_general.1001.d.flavor: "Você foi morto."
 tour_general.1001.d.tt: "Você perdeu a luta."
 tour_general.1001.d.tt_extra: "Seu ataque falha."
 tour_general.1001.e: "[tour_general_1001_bodyguard.GetTitledFirstNameNoTooltip|l] intervém."
 tour_general.1001.e.flavor: "Isso parece uma má ideia."
 tour_general.1001.e.tt: "#EMP Difícilmente#! puedo aceptar esta solicitud ahora."
 tour_general.1001.e.success: "VocÉ não deseja entregar seu cortesão"
 tour_general.1001.e.success.tt: "Você sobreviveu."
 tour_general.1001.e.success.desc: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Uma Refeição Terrivelmente Gloriosa"
 tour_general.1001.e.bodyguard.desc: "$activity_tour$: Uma Refeição Terrivelmente Gloriosa"
 tour_general.1001.e.slain.tt: "Contemplo mais uma vez a disposição dos pratos sobre a mesa. Meu cozinheiro tem trabalhado arduamente para preparar cada porção de [tour_general_3001_target_courtier.GetFirstNameNoTooltip] para o nosso prazer. A decoração é magnífica. \n\nMe viro quando [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l] entra na câmara, sol[visiting_liege.Custom('ES_OA')], como havíamos combinado. [visiting_liege.GetHerHim|U] observo enquanto absorve tudo, e um sorriso cintilante desponta no canto de sua boca. Avança e toma assento à mesa. Eu me junto a [visiting_liege.GetSheHe]."
 tour_general.1001.e.slain.desc: "Ao entrar na câmara, não tenho dúvidas de que [tour_general_3001_target_courtier.GetFirstName] é a estrela do espetáculo.\n\n[stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitledFirstName|l] não poupou gastos, e a mesa transborda de pratos deliciosos, todos seguindo a filosofia de \"reutilizar, não desperdiçar\" e aproveitando qualquer iguaria culinária que [tour_general_3001_target_courtier.GetFirstNameNoTooltip] conseguiu trazer. \n\nAté a cabeça de [tour_general_3001_target_courtier.GetFirstNameNoTooltip], já esvaziada e seca, foi cuidadosamente colocada no fim da mesa e decorada com vegetação local. Pauso por um momento para assimilar tudo."
 tour_general.1001.e.failure: "Isso é #EMP divino#!"
 tour_general.1001.e.bodyguard: "… talvez seja apenas a menor das mordidas."
 tour_general.1001.f: "Ao nosso benfeitor[tour_general_3001_target_courtier.Custom('ES_XA')] [tour_general_3001_target_courtier.GetFirstNameNoTooltip]!"
 tour_general.1001.f_theft_liege: "Você se delicia."
 tour_general.1001.f.tt: "VocÉ não deseja entregar seu cortesão"
 #Vassal/Liege Event
 tour_general.1002.title: "Como fornecedor[GetPlayer.Custom('ES_XA')] de #EMP buenas carnes#!, [tour_general_3001_target_courtier.GetFirstName] se destaca verdadeiramente entre a multidão. Sua impressionante massa corporal faz minhas pernas bambearem. Minhas mãos tremem ao vê[tour_general_3001_target_courtier.GetHerHim] devorar a comida, com pérolas de gordura brilhando em suas bochechas rechonchudas. \n\n#EMP tão regordetas#!. Cerro a mandíbula. Foi para isso que veio."
 tour_general.1002.title_vassal: "[tour_general_3001_target_courtier.GetFirstName] realmente parece um[tour_general_3001_target_courtier.Custom('ES_XA')] [tour_general_3001_target_courtier.GetWomanMan] que sabe o que é bom na vida. Sinto uma leve inveja no peito ao ver sua robustez e o puro prazer que parece encontrar na comida.

[stop_host_scope.GetTitledFirstName] [stop_host_scope.GetHerselfHimself] não parou de falar da qualidade da comida de [tour_general_3001_target_courtier.GetFirstName]."
 tour_general.1002.desc_host: "Há algo intrigante em [tour_general_3001_target_courtier.GetFirstName]. Não consigo identificar o quê. Mas tem um ar de mistério e franqueza que raramente se vê hoje em dia. \n\nÉ como se [tour_general_3001_target_courtier.GetSheHe] contemplasse o lugar onde minha alma estaria, se [ROOT.Char.GetFaith.DevilName] não tivesse chegado antes. \n\n[tour_general_3001_target_courtier.GetSheHe|U] sabe do que se trata."
 tour_general.1002.desc_liege: "Assim que ponho os olhos em [tour_general_3001_target_courtier.GetFirstName] prendo a respiração. É como se [ROOT.Char.GetFaith.HighGodName] em pessoa tivesse abençoado [tour_general_3001_target_courtier.GetFirstNameNoTooltip] com a beleza de mil [ROOT.Char.Custom('get_region_flower_type_plural')] e o próprio tempo parasse enquanto admiro suas feições delicadas. \n\nTal beleza é desperdiçada nessa ralé camponesa."
 tour_general.1002.a: "[tour_general_3001_target_courtier.GetFirstName] tem me impressionado constantemente com seu intelecto. Um[tour_general_3001_target_courtier.Custom('ES_XA')] verdadeiro[tour_general_3001_target_courtier.Custom('ES_OA')] pensador[tour_general_3001_target_courtier.Custom('ES_XA')] de nossos dias, suas habilidades e traços têm muito potencial. Sem dúvida, eu poderia fazer bom uso de ambos, em vez de vê-los murchar aqui, como uma planta privada de sol."
 tour_general.1002.b: "Enquanto [tour_general_3001_target_courtier.GetFirstName] se inclina para pegar o objeto no chão do corredor, eu também me inclino para observar os músculos definidos que se movem sob a pele. Essa forma física não pode ser comprada. Mas talvez se eu me cercar de mais indivíduos em forma...\n\n"
 tour_general.1002.c: "A destreza marcial de [tour_general_3001_target_courtier.GetFirstName] é bem conhecida na corte [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l]. Se quiser discutir planos de ataque, a melhor abordagem para afiar nossas armas e astúcia, deve-se ir até [tour_general_3001_target_courtier.GetSheHe]. É uma habilidade muito cobiçada e algo que me intriga.\n\n"
 tour_general.1002.a.flavor: "As habilidades diplomáticas de [tour_general_3001_target_courtier.GetFirstName] não deixam de me surpreender. Poderia informar ao [ROOT.Char.GetFaith.ReligiousHeadName] de que as roupas de baixo dele estão aparecendo, enquanto ainda receberia algumas peças de ouro, um sorriso e um 'obrigado'."
 #Liege Events
 tour_general.3001.title: "Mal havia reparado em [tour_general_3001_target_courtier.GetFirstName] até que esteve bem em cima de mim, prestando o devido respeito ao seu [tour_general_3001_target_courtier.Custom2('RelationToMePossessive', stop_host_scope )] [stop_host_scope.Char.Custom2('RelationToMeShort', visiting_liege )]. Agora que o vejo, [tour_general_3001_target_courtier.GetHerHim] observo enquanto se move sem esforço entre grupos de pessoas da corte. Seus olhos estão constantemente despertos, olhando em todas as direções e em nenhuma. \n\nIsso me intriga."
 tour_general.3001.desc_gluttonous_cannibal: "[tour_general_3001_target_courtier.GetWomanMan|U] cult[tour_general_3001_target_courtier.Custom('ES_OA')], os olhos brilhantes de [tour_general_3001_target_courtier.GetFirstName] vasculham a sala em busca de alguém que desafie a afirmação científica que acabou de expor. Mas ninguém aceita o desafio, para sua decepção. 

Não é de se admirar, considerando o nível de intelecto que a discussão teria exigido. Estou impressionad[GetPlayer.Custom('ES_OA')]. 

Esse tipo de perspicácia é difícil de encontrar."
 tour_general.3001.desc_gluttonous: "[tour_general_3001_target_courtier.GetFirstName] realmente parece um[tour_general_3001_target_courtier.Custom('ES_XA')] [tour_general_3001_target_courtier.GetWomanMan] que sabe o que é bom na vida. Sinto uma leve inveja no peito ao ver sua robustez e o puro prazer que parece encontrar na comida.

[stop_host_scope.GetTitledFirstName] [stop_host_scope.GetHerselfHimself] não parou de falar da qualidade da comida de [tour_general_3001_target_courtier.GetFirstName]."
 tour_general.3001.desc_insanity_courtier: "Uma vez aceito, duas vezes meu."
 tour_general.3001.desc_beauty: "Cortesão realocado"
 tour_general.3001.desc_intellect: "Uma adição tão deliciosa!"
 tour_general.3001.desc_physique: "Vou garantir que esteja bem alimentad[tour_general_3001_target_courtier.Custom('ES_OA')]…"
 tour_general.3001.desc_martial: "Isso é o que precisa ser feito."
 tour_general.3001.desc_diplomacy: "[tour_general_3001_target_courtier.GetSheHe|U] #EMP sabe!#!"
 tour_general.3001.desc_stewardship: "Tenho certeza de que [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] não se importará."
 tour_general.3001.desc_intrigue: "[stop_host_scope.GetShortUIName] decide o que acontece em seguida"
 tour_general.3001.desc_learning: "[tour_general_3001_target_courtier.GetWomanMan|U] cult[tour_general_3001_target_courtier.Custom('ES_OA')], os olhos brilhantes de [tour_general_3001_target_courtier.GetFirstName] vasculham a sala em busca de alguém que desafie a afirmação científica que acabou de expor. Mas ninguém aceita o desafio, para sua decepção. 

Não é de se admirar, considerando o nível de intelecto que a discussão teria exigido. Estou impressionad[GetPlayer.Custom('ES_OA')]. 

Esse tipo de perspicácia é difícil de encontrar."
 tour_general.3001.desc_prowess: "Seu fracasso não passou despercebido."
 tour_general.3001.desc_outro: "[tour_general_3001_target_courtier.GetFirstNameNoTooltip] junta-se à minha corte sem que ninguém perceba"
 tour_general.3001.a: "[stop_host_scope.GetTitledFirstNameNoTooltip|l] descobre isso"
 tour_general.3001.a.flavor: "Isso é bobagem."
 tour_general.3001.a.tt: "Não. Eu preciso começar uma dieta."
 tour_general.3001.a_cannibal: "Tch!"
 tour_general.3001.a_cannibal.flavor: "Não. Preciso enfrentar [ROOT.Char.GetFaith.random_EvilGodNames] sozinh[ROOT.Char.Custom('ES_OA')]."
 tour_general.3001.a_insanity: "Depende de mim agora!"
 tour_general.3001.a_insanity.flavor: "[visiting_liege.GetShortUIName] Aceitou Sua Proposta"
 tour_general.3001.b: "[visiting_liege.GetShortUIName] Recusou Sua Proposta"
 tour_general.3001.b_host_decides.tt: "[visiting_liege.GetShortUIName] perdeu o interesse no seu cortesão."
 tour_general.3001.b.harmful_sideeffects.tt: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Pedido Concedido"
 tour_general.3001.b_liege_decides.tt: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Pedido Negado"
 tour_general.3001.c: "[stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitledFirstName|l] dirige-se a mim diretamente.\n\n"Meu [stop_host_scope.Custom2('RelationToMeShort', ROOT.Char )], tenho estado considerando o assunto e cheguei à conclusão de que"
 tour_general.3001.c.tt_success: "[tour_general_3001_target_courtier.GetFirstName] ficará feliz em se juntar à sua corte mais graciosa.'"
 tour_general.3001.c.tt_failure: "um favor aqui poderia ser retribuído com um favor no futuro…?."
 tour_general.3001.c.tt_failure.desc: "um pouco de ouro poderia ajudar a suavizar o golpe de perder noss[tour_general_3001_target_courtier.Custom('ES_OA')] querid[tour_general_3001_target_courtier.Custom('ES_OA')] [tour_general_3001_target_courtier.GetFirstName]."
 tour_general_3001_stolen_courtier: "Tenho uma ideia ainda melhor. Se vocês gostam de [tour_general_3001_target_courtier.GetFirstName] isto, #EMP encantará#!. É de [ROOT.Char.Custom('FormOfAddressForLiege')] para morrer".#EMP morirse#! \n\n[stop_host_scope.GetSheHe|U] olha na direção de [tour_general_3001_target_courtier.GetFirstName] e depois diretamente para mim, como se quisesse sinalizar algo."
 tour_general_3001_failed_steal: "Não posso concordar com esse pedido. [tour_general_3001_target_courtier.GetFirstName] é muito valioso para mim e para a minha corte.'\n\nSeu olhar começa a vagar pelo salão de forma constrangedora."
 tour_general.3001.d: "Muito obrigado!"
 tour_general.3001.d_cannibal: "Por que trocar por algo que eu posso #EMP tomar#!?"
 tour_general.3001.d_cannibal.flavor: "[tour_general_3001_target_courtier.GetFirstNameNoTooltip] é #EMP mí[tour_general_3001_target_courtier.Custom('ES_OA')]#!."
 tour_general.3001.d_insanity: "Um favor? Parece justo."
 tour_general.3001.d_insanity.flavor: "Algumas moedas de ouro? Troca justa."
 tour_general.3001.tt_positive: "Pensando melhor..."
 tour_general.3001.tt_negative: "#EMP Oh meu Deus...#!"
 tour_general.3001.desc_negative: "Esse comportamento vil deve acabar!"
 tour_general.3002.title: "Isso é lamentável."
 tour_general.3002.title_denied: "[visiting_liege.GetShortUIName] está descontente[visiting_liege.Custom('ES_OA')]"
 tour_general.3002.intro: "[visiting_liege.GetShortUIName] não está satisfeito com a sua decisão."
 tour_general.3002.desc_free: "Uma Exigência de Despedida"
 tour_general.3002.desc_hook: "Concluí minha visita a [ROOT.Char.GetCurrentLocation.GetName] e minha comitiva se prepara para partir.\n\n[stop_host_scope.GetName] e sua corte se alinhou cuidadosamente para se despedir de mim. Agora que todos estão presentes, é hora de recolher o tributo por honrar[stop_host_scope.GetHerHim] com minha presença."
 tour_general.3002.desc_gold: "É hora do tributo."
 tour_general.3002.desc_cannibal: "Não faço exigências."
 tour_general.3002.desc_declined: "Um Presente de Despedida"
 tour_general.3002.a: "É hora de [visiting_liege.GetName] partir, e devo dizer que sinto ter sido [Select_CString( ROOT.Char.IsFemale, 'uma anfitriã magnânima', 'um anfitrião magnânimo' )].

No entanto, parece que [visiting_liege.GetName] não achou minha hospitalidade suficiente e me fez uma exigência.

"
 tour_general.3002.b: "Exige que eu me ajoelhe diante de meu [visiting_liege.GetTitleAsNameNoTooltip] diante de toda a minha corte, demonstrando minha submissão à coroa."
 tour_general.3002.b_declined: "Me apresentou uma fatura por todas as despesas pagas durante a viagem. Embora muitas das cobranças pareçam falsas, vejo-me na obrigação de pagar."
 tour_general.3002.c: "Me estende a mão e exige que eu prometa lealdade a [visiting_liege.GetSheHe] e a [visiting_liege.GetPrimaryTitle.GetName], jurando nunca me opor à vontade real."
 tour_general.3002.d: "Eu me submeto."
 tour_general.3002.e: "[stop_host_scope.GetName] cedeu"
 tour_general.3002.f: "Eu não farei nada disso!"
 tour_general.3002.g: "Uma Despedida Cordial"
 tour_general.3002.h: "Está na hora de [visiting_liege.GetName] partir, e devo dizer que sinto ter sido [Select_CString( ROOT.Char.IsFemale, 'uma anfitriã magnânima', 'um anfitrião magnânimo' )].

[visiting_liege.GetSheHe|U] parece totalmente satisfeit[visiting_liege.Custom('ES_OA')] com minha atuação como anfitri[ROOT.Char.Custom('ES_OnOna')] e não me exigiu nada além da promessa de que voltaremos a nos ver."
 tour_general.3002.h.tt: "Excelente."
 tour_general.3002.h.tt.desc: "Exigência Recusada"
 tour_general.0510.title: "[stop_host_scope.GetName] recusou-se desafiadoramente a ceder às minhas exigências. Agora mesmo não posso fazer muito, mas um insulto como este constitui um crime não apenas contra mim, mas contra o próprio reino!"
 tour_general.0510.desc: "Isso não será esquecido em breve."
 tour_general.0510.a: "É hora do tributo."
 tour_general.0510.b: "Não faço exigências."
 tour_general.0511.title: "Habilidade de Caça"
 tour_general.0511.desc: "É hora de [visiting_liege.GetName] partir, e devo dizer que sinto ter sido [Select_CString( ROOT.Char.IsFemale, 'uma anfitriã magnânima', 'um anfitrião magnânimo' )].

No entanto, parece que [visiting_liege.GetName] não achou minha hospitalidade suficiente e me fez uma exigência.

"
 tour_general.0511.desc.kneel: "Uma Trama"
 tour_general.0511.desc.money: "Ao ver meu [visiting_liege.GetTitleAsNameNoTooltip|U] vagar pelos terrenos de [touring_grounds_scope.GetNameNoTooltip], uma ideia para uma brincadeira ardilosa me vem à cabeça. Como se possuíd[ROOT.Char.Custom('ES_OA')] pelo espírito de [ROOT.Char.GetFaith.TricksterGodName] [ROOT.Char.GetFaith.TricksterGodHerHim]self, imagino uma tentativa de assassinato encenada para entreter meus convidados!

[visiting_liege.GetNameNoTooltip] será [Select_CString( visiting_liege.IsFemale, 'a heroína', 'o herói' )] da história, frustrando a tentativa contra o grupo e pondo o "assassino" em fuga! Uma ótima paródia dos inimigos de [visiting_liege.GetPrimaryTitle.GetNameNoTooltip], e [visiting_liege.GetNameNoTooltip] certamente ficarÉ lisonjead[visiting_liege.Custom('ES_OA')] e entretid[visiting_liege.Custom('ES_OA')] com isso!"
 tour_general.0511.desc.factions: "Faça os preparativos!"
 tour_general.0511.a: "Vamos deixar pra lá."
 tour_general.0511.gave_demand: "$murder_outcome.5001.t$"
 tour_general.0511.b: "Enquanto continuo minha visita pelos terrenos de [touring_grounds_scope.GetNameNoTooltip], ouço vozes desconhecidas ao nosso redor. De repente, encontro todo o meu grupo cercado por [fake_assassin_scope.GetWomenMen] encapuzados apontando facas e arcos diretamente para mim!

Uma das pessoas assassinas avança em minha direção e pressiona sua faca firmemente contra o meu lado. "Boa caçada, [ROOT.Char.Custom('FormOfAddressForLiege')]? Viemos caçar [ROOT.Char.GetTitleAsNameNoTooltip]s!"."
 tour_general.0512.title: "

Sinto meu coração disparar e um suor frio percorrer todo o meu corpo enquanto permaneço paralisad[ROOT.Char.Custom('ES_OA')]. [Select_CString( fake_assassin_scope.IsFemale, 'A assassina', 'O assassino' )] me lança uma espécie de piscadela cúmplice e aponta para sua arma, vangloriando-se da vitória. Minha própria vida depende do meu próximo movimento; o que faço?"
 tour_general.0512.desc: "Está na hora de [visiting_liege.GetName] partir, e devo dizer que sinto ter sido [Select_CString( ROOT.Char.IsFemale, 'uma anfitriã magnânima', 'um anfitrião magnânimo' )].

[visiting_liege.GetSheHe|U] parece totalmente satisfeit[visiting_liege.Custom('ES_OA')] com minha atuação como anfitri[ROOT.Char.Custom('ES_OnOna')] e não me exigiu nada além da promessa de que voltaremos a nos ver."
 tour_general.0512.a: "O Assassinato Foi Falso"
 tour_general.0513.title: "[visiting_liege.GetName] Acreditou que o Assassinato Foi Real"
 tour_general.0513.desc: "[visiting_liege.GetName] Ficou Muito Divertido"
 tour_general.0513.a: "Se [visiting_liege.GetName] gosta disso"
 #Tour Mini-Activity Events
 #Vassal Events
 tour_grounds_events.1001.title: "Eu não sou um trovador! Saiam de cima de mim!"
 tour_grounds_events.1001.desc.intro: "[visiting_liege.GetName] Não Ficou Divertido"
 tour_grounds_events.1001.desc.mid: "Eles não vão me levar sem luta!"
 tour_grounds_events.1001.desc.outro: "Um Momento nas Selvas"
 tour_grounds_events.1001.a: "Por um momento, me encontro sozinho nos terrenos de caça selvagem de [touring_grounds_scope.GetNameNoTooltip] com [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)]. Um momento tão raro me permitiria seguir minha paixão por [visiting_liege.GetSheHe]."
 tour_grounds_events.1001.b: "\n\nEmbora nossos corações e desejos já pertençam um ao outro, ser governantes nos dá muito pouco tempo para perseguir nossa paixão, mas agora temos uma oportunidade de ser como feras na selva."
 tour_grounds_events.1002.title: "\n\nTalvez esta seja finalmente minha oportunidade de expressar meus sentimentos, e se [visiting_liege.GetSheHe] sentir o mesmo, poderíamos finalmente ser mais do que apenas '[visiting_liege.GetTitleAsNameNoTooltip]' e '[ROOT.Char.GetTitleAsNameNoTooltip]', mas amantes nos momentos de paixão."
 tour_grounds_events.1002.desc: "Ao ver meu [visiting_liege.GetTitleAsNameNoTooltip|U] vagar pelos terrenos de [touring_grounds_scope.GetNameNoTooltip], uma ideia para uma brincadeira ardilosa me vem à cabeça. Como se possuíd[ROOT.Char.Custom('ES_OA')] pelo espírito de [ROOT.Char.GetFaith.TricksterGodName] [ROOT.Char.GetFaith.TricksterGodHerHim]self, imagino uma tentativa de assassinato encenada para entreter meus convidados!

[visiting_liege.GetNameNoTooltip] será [Select_CString( visiting_liege.IsFemale, 'a heroína', 'o herói' )] da história, frustrando a tentativa contra o grupo e pondo o "Deixe isso pra lá."
 tour_grounds_events.1002.a: "$tour_grounds_events.1004.title$"
 tour_grounds_events.1002.b: "Me encontro sozinho nos terrenos de caça de [touring_grounds_scope.GetNameNoTooltip] com [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)], desfrutando do silêncio relativo interrompido apenas pelo chamado ocasional de uma fera próxima."
 tour_grounds_events.1003.title: "De repente, vejo [stop_host_scope.GetNameNoTooltip] se lançar contra mim como um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.Custom('GetAnimalType')] selvagem, prendendo-me contra uma pedra, com fogo nos olhos.

"É tão raro conseguir ver você a sós, meu [ROOT.Char.Custom('LoverPetName')], e aqui estamos sozinhos, tendo apenas péssaros e feras como testemunhas. Vamos enfim nos entregar à nossa paixão!""
 tour_grounds_events.1003.desc.intro: "Enquanto continuo minha visita pelos terrenos de [touring_grounds_scope.GetNameNoTooltip], ouço vozes desconhecidas ao nosso redor. De repente, encontro todo o meu grupo cercado por [fake_assassin_scope.GetWomenMen] encapuzados apontando facas e arcos diretamente para mim!

Uma das pessoas assassinas avança em minha direção e pressiona sua faca firmemente contra o meu lado. "Me possua!"
 tour_grounds_events.1003.desc.paranoid: "

Sinto meu coração disparar e um suor frio percorrer todo o meu corpo enquanto permaneço paralisad[ROOT.Char.Custom('ES_OA')]. [Select_CString( fake_assassin_scope.IsFemale, 'A assassina', 'O assassino' )] me lança uma espécie de piscadela cúmplice e aponta para sua arma, vangloriando-se da vitória. Minha própria vida depende do meu próximo movimento; o que faço?"
 tour_grounds_events.1003.desc.not_paranoid: "Fora de Ordem"
 tour_grounds_events.1003.a.paranoid: "Durante a visita de [touring_grounds_scope.GetNameNoTooltip], fico envolvid[GetPlayer.Custom('ES_OA')] em uma conversa com [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre"
 tour_grounds_events.1003.a: "a glória da guerra e do conflito,"
 tour_grounds_1002.assassination_was_fake: "o plano divino [ROOT.Char.GetFaith.HighGodNamePossessive] para a humanidade,"
 tour_grounds_1002.liege_believed_it_was_real: "as complexidades do governo e contabilidade do estado,"
 tour_grounds_1002.liege_played_along: "a arte sutil da diplomacia e apaziguamento,"
 tour_grounds_1002_likes_tt: "a importância da informação e da decepção,"
 tour_grounds_1002_dislikes_tt: "quando sou interrompid[ROOT.Char.Custom('ES_OA')] por [landless_courtier_scope.Custom2('MyCharacterIntroduction', ROOT.Char)], que parece acreditar saber mais sobre o assunto do que eu.

Ainda assim, é bastante inadequado que um[landless_courtier_scope.Custom('ES_XA')] mero[landless_courtier_scope.Custom('ES_OA')] cortesão[landless_courtier_scope.Custom('ES_OA')] interrompa uma conversa entre [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitleAsNameNoTooltip] de [visiting_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] e seu [ROOT.Char.GetTitleAsNameNoTooltip]."
 tour_grounds_1002_murder_tt: "Silêncio, seu [stop_host_scope.Custom2('InsultNoun', ROOT.Char)] [stop_host_scope.Custom2('InsultAdjective', ROOT.Char)]."
 tour_grounds_events.1003.b: "Ignore e siga em frente."
 tour_grounds_1002.liege_begrudgingly_played_along: "Durante a visita a [touring_grounds_scope.GetNameNoTooltip], fico envolvid[GetPlayer.Custom('ES_OA')] em uma conversa com [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre"
 tour_grounds_events.1003.c: "quando é interrompid[stop_host_scope.Custom('ES_OA')] por um[landless_courtier_scope.Custom('ES_OA')] de seus cortesãos.\n\nNão lhe é permitido falar por muito tempo antes que seu [stop_host_scope.GetLadyLord] [landless_courtier_scope.GetHerHim] o faça calar, mas a sabedoria que [landless_courtier_scope.GetSheHe] foi capaz de oferecer demonstra de imediato que sabe muito mais sobre o assunto do que [stop_host_scope.GetNameNoTooltip] jamais poderia sonhar em saber.\n\nSe [stop_host_scope.GetTitledFirstNameNoTooltip|l] não estiver dispost[stop_host_scope.Custom('ES_OA')] a ouvir seu conhecimento, talvez [landless_courtier_scope.GetSheHe] prefira juntar-se à minha corte."
 tour_grounds_events.1004.title: "Junte-se à minha corte!"
 tour_grounds_events.1004.desc.intro: "Nunca se deve falar fora de hora."
 tour_grounds_events.1004.desc.already_shagging: "Isso é um crime inequívoco!"
 tour_grounds_events.1004.desc.trying_to_shag: "Seduziu [landless_courtier_scope.GetName] a deixar o cargo"
 tour_grounds_events.1004.desc.outro: "quando é interrompid[stop_host_scope.GetHerHim] por um[landless_courtier_scope.Custom('ES_OA')] de seus cortesãos.\n\nEmbora est[landless_courtier_scope.Custom('ES_EA')] humilde cortesã[landless_courtier_scope.Custom('ES_OA')] falou totalmente fora de lugar; por estranho que pareça, [stop_host_scope.GetTitledFirstNameNoTooltip|l] não [landless_courtier_scope.GetHerHim] repreendeu e permitiu que falasse diretamente comigo.\n\nEmbora o que teve a dizer seja bastante interessante, essa infração da etiqueta social me deixou bastante desconcertad[ROOT.Char.Custom('ES_OA')]."
 tour_grounds_events.1004.a: "Eu irei ouvir."
 tour_grounds_events.1004.b: "Histórias de Fantasmas"
 tour_grounds_events.1005.title: "Enquanto descansamos de nossa viagem, meu jovem [visiting_liege.GetLadyLord] permanece chei[visiting_liege.Custom('ES_OA')] de energia e exige ser entretid[visiting_liege.Custom('ES_OA')] enquanto o resto da comitiva recupera as energias.

Felizmente, [storyteller_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] assume a tarefa com entusiasmo e começa a contar lendas locais. "Oh, hÉ mais nest[visiting_liege.Custom('ES_EA')] [touring_grounds_scope.Custom('TerrainTypeProvince')] do que os olhos podem ver, [visiting_liege.Custom('GetLassLad')]."
 tour_grounds_events.1005.desc.intro: "Uma terrível banshee uiva nas terras selvagens de [touring_grounds_scope.GetNameNoTooltip], e cuidado: se você ouvir seu chamado, alguém próximo a você está destinado(a) a encontrar seu fim."
 tour_grounds_events.1005.desc.already_shagging: "De repente, vejo [stop_host_scope.GetNameNoTooltip] se lançar contra mim como um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.Custom('GetAnimalType')] selvagem, prendendo-me contra uma pedra, com fogo nos olhos.

"O temido Sasabonsam vive por estas partes, provavelmente nos observando agora enquanto falamos, à espreita. Descuide-se e ele descerá dos céus e drenará seu sangue com seus terríveis dentes de ferro até que você fique tão rosado(a) e ensanguentado(a) quanto ele!"
 tour_grounds_events.1005.desc.trying_to_shag: "O próprio Ankou perambula por estas partes em sua carruagem dos mortos, coletando almas perdidas e levando-as para onde somente [ROOT.Char.GetFaith.HighGodName] sabe. Esteja atento(a), [visiting_liege.Custom('GetLassLad')], ou ele também te levará."
 tour_grounds_events.1005.desc.outro: "

Fico estupefat[ROOT.Char.Custom('ES_OA')], olhando fixamente para os olhos sedentos do meu [stop_host_scope.GetTitleAsNameNoTooltip]. Seria realmente apropriado a um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] em viagem ter um momento de paixão em um lugar como este?"
 tour_grounds_events.1005.a: "\n\nOs contos de gosto duvidoso de [storyteller_scope.GetFirstNameNoTooltip] estão tendo um impacto visível em [visiting_liege.Custom('ES_ElLa')] pequen[visiting_liege.Custom('ES_OA')] [visiting_liege.GetFirstNameNoTooltip] , talvez eu devesse intervir."
 tour_grounds.moment_in_the_woods: "E então, o que acontece?"
 tour_grounds_events.1005.b: "Silêncio, [storyteller_scope.GetFirstNameNoTooltip]!"
 tour_grounds.rebuffed_in_the_woods: "$tour_grounds_events.1008.title$"
 tour_grounds_events.1006.title: "Os membros mais velhos da nossa comitiva param para descansar da viagem, mas eu continuo che[ROOT.Char.Custom('ES_OA')] de vigor e estou ficando impaciente com esses velhotes apáticos.\n\nFelizmente, [storyteller_scope.GetName] parece estar ansioso para me entreter com histórias assustadoras deste lugar. "Ah, há mais neste/a [touring_grounds_scope.Custom('TerrainTypeProvince')] do que aparenta, [visiting_liege.Custom('GetLassLad')]."
 tour_grounds_events.1006.desc.intro: "\n\n[stop_host_scope.GetName] logo se junta à contação de histórias, e fico absorto nos dois em relatos que me deixam mais do que um pouco amedrontad[ROOT.Char.Custom('ES_OA')]."
 tour_grounds_events.1006.desc.mid.martial: "\n\nJusto quando a história estava ficando interessante, [stop_host_scope.GetName] interrompe a história e insiste que [storyteller_scope.GetNameNoTooltip] não pode ir adiante e me assegura que toda a história não passa de bobagem."
 tour_grounds_events.1006.desc.mid.learning: "Que ótima história!"
 tour_grounds_events.1006.desc.mid.stewardship: "Isso foi horrível."
 tour_grounds_events.1006.desc.mid.diplomacy: "Você parou na melhor parte!"
 tour_grounds_events.1006.desc.mid.intrigue: "Graças a Deus que você parou."
 tour_grounds_events.1006.desc.outro: "quando sou interrompid[ROOT.Char.Custom('ES_OA')] por [landless_courtier_scope.Custom2('MyCharacterIntroduction', ROOT.Char)], que parece acreditar saber mais sobre o assunto do que eu.

Ainda assim, é bastante inadequado que um[landless_courtier_scope.Custom('ES_XA')] mero[landless_courtier_scope.Custom('ES_OA')] cortesão[landless_courtier_scope.Custom('ES_OA')] interrompa uma conversa entre [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitleAsNameNoTooltip] de [visiting_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] e seu [ROOT.Char.GetTitleAsNameNoTooltip]."
 tour_grounds_events.1006.a: "Os riscos são muito grandes."
 tour_grounds_events.1006.b: "$tour_grounds_events.1010.title$"
 tour_grounds_events.1007.desc.intro: "Ao cavalgar pelos terrenos de [touring_grounds_scope.GetNameNoTooltip], sou subitamente detid[ROOT.Char.Custom('ES_OA')] no meio da estrada por meu anfitri[stop_host_scope.Custom('ES_OnOna')], [stop_host_scope.GetName].

Parece que [stop_host_scope.GetSheHe] conseguiu capturar [rival_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] e deixou [rival_courtier.GetHerHim] selad[rival_courtier.Custom('ES_OA')] como um cavalo, pront[rival_courtier.Custom('ES_OA')] para que eu monte e cavalgue pelo campo!

Embora seja uma excelente oportunidade para demonstrar minha superioridade inerente, será que realmente vou me rebaixar tanto?"
 tour_grounds_events.1007.desc.outro: "Claro que sim!"
 tour_grounds_events.1007.a: "Até [rival_courtier.GetFirstNameNoTooltip] não merece essa humilhação."
 tour_grounds_events.1007.b: "Um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip] com cara de [stop_host_scope.Custom('get_region_root_vegetable')]"
 tour_grounds_events.1007.c: "Nosso humilde lar carece das comodidades e da grandiosidade às quais [visiting_liege.GetName] sem dúvida está acostumad[visiting_liege.Custom('ES_OA')], mas o que nos falta em extravagância compensamos com folga em hospitalidade e generosidade.

Eu temia ter de mostrar minhas terras ao meu [visiting_liege.GetTitleAsNameNoTooltip] sem nenhum presente, mas de repente avisto um belo exemplar de [ROOT.Char.Custom('get_region_root_vegetable')] que milagrosamente se parece exatamente com [visiting_liege.GetNameNoTooltip]! Sem dúvida [visiting_liege.GetSheHe] se lembraria para sempre de sua visita a [touring_grounds_scope.GetNameNoTooltip] se partisse com seu sósia em forma de [ROOT.Char.Custom('get_region_root_vegetable')]! Embora também possa se ofender por eu comparar [visiting_liege.GetHerHim] a um [ROOT.Char.Custom('get_region_root_vegetable')]."
 tour_grounds.recruited_my_courtier: "E eu pensei que o presente perfeito não existisse."
 tour_grounds_events.1017.desc.outro: "Descarte silenciosamente o [ROOT.Char.Custom('get_region_root_vegetable')]."
 tour_grounds_events.1017.a: "Isso deve valer uma fortuna!"
 tour_grounds_events.1008.title: "Guarde para uso pessoal."
 tour_grounds_events.1008.desc.intro: "Enquanto descansamos de nossa viagem, meu jovem [visiting_liege.GetLadyLord] permanece chei[visiting_liege.Custom('ES_OA')] de energia e exige ser entretid[visiting_liege.Custom('ES_OA')] enquanto o resto da comitiva recupera as energias.

Felizmente, [storyteller_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] assume a tarefa com entusiasmo e começa a contar lendas locais. "$tour_grounds_events.1012.title$"
 tour_grounds_events.1008.desc.mid.banshee: "[touring_grounds_scope.GetNameNoTooltip] é um lugar muito diferente do que eu consideraria uma região civilizada. Quase ninguém chama este lugar de lar e as comodidades deixam muito a desejar.\n\nHoje, [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitleAsNameNoTooltip] pensou que me impressionaria me apresentando um simples exemplar de [stop_host_scope.Custom('get_region_root_vegetable')] que ele jura que se parece comigo.\n\nReviro os olhos, mas não demora muito para eu notar a semelhança…"
 tour_grounds_events.1008.desc.mid.ghul: "Que objeto maravilhoso!"
 tour_grounds_events.1008.desc.mid.azdaha: "[visiting_liege.GetName] ficou impressionad[visiting_liege.Custom('ES_OA')]"
 tour_grounds_events.1008.desc.mid.sasabonsam: "Nojento. Livre-se disso."
 tour_grounds_events.1008.desc.mid.ankou: "[visiting_liege.GetName] foi insultad[visiting_liege.Custom('ES_OA')]"
 tour_grounds_events.1008.desc.mid.witt_wieven: "[visiting_liege.GetNameNoTooltip]: O Pequeno Caçador [Select_CString( visiting_liege.IsFemale, 'la pequeña cazadora', 'el pequeño cazador' )]"
 tour_grounds_events.1008.desc.mid.baba_yaga: "[visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] parece ansios[visiting_liege.Custom('ES_OA')] por fazer uma caçada em [touring_grounds_scope.GetNameNoTooltip], buscando caça e glória como um adulto.

No entanto, não posso, em só consciência, permitir que um[visiting_liege.Custom('ES_XA')] [visiting_liege.Custom('GirlBoy')] tão jovem corra por um lugar onde possa ser dilacerad[visiting_liege.Custom('ES_OA')] viv[visiting_liege.Custom('ES_OA')] por um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GetAnimalType')].

Ainda assim, eu poderia agradar o pequeno [visiting_liege.GetLadyLord] preparando uma caçada de mentira, sem o perigo de animais reais."
 tour_grounds_events.1008.desc.mid: "Tenho certeza de que[ROOT.Char.Custom('ES_OA')] vai adorar!"
 tour_grounds_events.1008.desc.outro: "Que desperdício de tempo."
 tour_grounds_events.1008.a: "Uma Caçada Falsa"
 tour_grounds_events.1008.b: "Estou ansios[ROOT.Char.Custom('ES_OA')] para vagar ao ar livre e caçar uma presa, como se espera de qualquer [ROOT.Char.GetTitleAsNameNoTooltip|l], e até agora meus anciãos e tutores me negaram essa oportunidade.

No entanto, hoje [stop_host_scope.GetName] me procurou e ofereceu a chance de testar as terras de [touring_grounds_scope.GetNameNoTooltip] como [Select_CString( visiting_liege.IsFemale, 'uma verdadeira caçadora', 'um verdadeiro caçador' )]!

Quando chego aos terrenos de caça, porém, não sou recebido por um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.Custom('GetAnimalType')] feroz, mas por um pedaço de madeira pintado para se parecer com um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.Custom('GetAnimalType')]."
 tour_grounds_events.1009.title: "Vou abater a fera!"
 tour_grounds_events.1009.desc.intro: "Isso é algum tipo de piada?"
 tour_grounds_events.1009.desc.mid.finished: "Exija [stop_host_scope.Custom('GetAnimalType')] verdadeiro para abater."
 tour_grounds_events.1009.desc.outro.interrupted: "A Verdadeira Caçada"
 tour_grounds_events.1009.a: "Minhas exigências são atendidas e logo sou recebido(a) por uma verdadeira fera para abater. Sob o meu comando, a fera é solta de suas amarras e eu fico sozinho(a) para enfrentar o monstro com meu arco.\n\nRespiro fundo e disparo, rezando para que minha flecha acerte o alvo."
 tour_grounds_events.1009.b: "Minha mira é certeira!"
 tour_grounds_events.1009.c: "Eu Abato o Animal"
 tour_grounds_events.1009.d: "Eu Errei"
 tour_grounds_events.1010.title: "[rival_courtier.GetFirstNameNoTooltip]: O Corcel Leal"
 tour_grounds_events.1010.desc: "Ao cavalgar o dia inteiro pelas terras em nossas respectivas montarias, de repente me ocorre uma ideia inspirada!

Todo mundo conhece a rivalidade entre [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] e [rival_courtier.GetName], e certamente eu cairia nas graças de meu [visiting_liege.GetTitleAsNameNoTooltip] se capturasse seu rival, selasse [rival_courtier.GetHerHim] e o fizesse cavalgar como um cavalo!

O único desafio, é claro, seria trazer [rival_courtier.GetHerHim] atÉ aqui, mas eu tenho meus meios..."
 tour_grounds_events.1010.a: "Compartilhar as acomodações de tal [visiting_liege.Custom2('InsultNoun', ROOT.Char)] [stop_host_scope.Custom2('InsultAdjective', ROOT.Char)] é uma necessidade desagradável; tomara que acabe logo."
 tour_grounds_events.1010.b: "Dói-me ter que lidar com formalidades públicas com a minha amada — se ao menos houvesse tempo para nos encontrarmos a sós..."
 tour_grounds_events.1011.title: "Embora tenhamos de lidar com o peso das formalidades, visitar um bom[stop_host_scope.Custom('ES_XA')] amig[stop_host_scope.Custom('ES_OA')] é sempre um alívio bem-vindo."
 tour_grounds_events.1011.desc: "Ao cavalgar pelos terrenos de [touring_grounds_scope.GetNameNoTooltip], sou subitamente detid[ROOT.Char.Custom('ES_OA')] no meio da estrada por meu anfitri[stop_host_scope.Custom('ES_OnOna')], [stop_host_scope.GetName].

Parece que [stop_host_scope.GetSheHe] conseguiu capturar [rival_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] e deixou [rival_courtier.GetHerHim] selad[rival_courtier.Custom('ES_OA')] como um cavalo, pront[rival_courtier.Custom('ES_OA')] para que eu monte e cavalgue pelo campo!

Embora seja uma excelente oportunidade para demonstrar minha superioridade inerente, será que realmente vou me rebaixar tanto?"
 tour_grounds_events.1011.a: "\n\nSó o tempo dirá."
 tour_grounds_events.1011.b: "Vamos começar!"
 tour_grounds_events.1012.title: "Habilidade de Caça"
 tour_grounds_events.1012.desc: "Nosso humilde lar carece das comodidades e da grandiosidade às quais [visiting_liege.GetName] sem dúvida está acostumad[visiting_liege.Custom('ES_OA')], mas o que nos falta em extravagância compensamos com folga em hospitalidade e generosidade.

Eu temia ter de mostrar minhas terras ao meu [visiting_liege.GetTitleAsNameNoTooltip] sem nenhum presente, mas de repente avisto um belo exemplar de [ROOT.Char.Custom('get_region_root_vegetable')] que milagrosamente se parece exatamente com [visiting_liege.GetNameNoTooltip]! Sem dúvida [visiting_liege.GetSheHe] se lembraria para sempre de sua visita a [touring_grounds_scope.GetNameNoTooltip] se partisse com seu sósia em forma de [ROOT.Char.Custom('get_region_root_vegetable')]! Embora também possa se ofender por eu comparar [visiting_liege.GetHerHim] a um [ROOT.Char.Custom('get_region_root_vegetable')]."
 tour_grounds_events.1012.a: "[stop_host_scope.GetNameNoTooltip] nem sequer arranha o alvo, para diversão de minha comitiva.\n\nEnquanto todos riem, eu vejo"
 tour_grounds_events.1012.b: "uma oportunidade de superar minha [Select_CString( stop_host_scope.IsFemale, 'anfitriona', 'anfitrión' )] e mostrar a todos como um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]!"
 tour_grounds_events.1012.c: "sou [GetPlayer.Custom('ES_ElLa')] melhor caçador[GetPlayer.Custom('ES_XA')]."
 tour_grounds_events.1012.d: "Parabéns, [stop_host_scope.GetNameNoTooltip]."
 turnip_that_looks_like_liege: "Presas Precárias"
 turnip_that_looks_like_liege_description: "Com meu arco de caça ao lado, um membro do meu grupo me alerta sobre a presença de um/a [stop_host_scope.Custom('GetAnimalType')] logo abaixo de um barranco próximo à nossa localização. Se eu me posicionar bem à beira do penhasco, deverei ser capaz de atravessar seu coração.\n\n"
 tour_grounds_events.1013.title: "Para [Select_CString( ROOT.Char.IsFemale, 'uma caçadora diestra', 'um caçador diestro' )] como eu, deveria ser fácil, mas não sem risco."
 tour_grounds_events.1013.desc: "Parece ser um tiro difícil, mas se eu acertar, sem dúvida impressionarei toda a minha comitiva."
 tour_grounds_events.1013.a: "O solo parece um pouco instável, mas com cuidado ao pisar, devo ser capaz de abater a fera sem problemas."
 tour_grounds.liege_impressed: "Isso deve ser fácil."
 tour_grounds_events.1013.b: "Vamos deixar outra pessoa fazer o tiro."
 tour_grounds.liege_insulted: "Meu [visiting_liege.GetTitleAsNameNoTooltip|U] , [Select_CString( visiting_liege.IsFemale, 'la Cazadora', 'el Cazador' )]"
 tour_grounds_events.1014.title: "Enquanto percorria as terras, [visiting_liege.GetName] arriscou um tiro arriscado do topo de um penhasco em direção a um exemplar de [stop_host_scope.Custom('GetAnimalType')] logo abaixo."
 tour_grounds_events.1014.desc: "[visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] parece ansios[visiting_liege.Custom('ES_OA')] por fazer uma caçada em [touring_grounds_scope.GetNameNoTooltip], buscando caça e glória como um adulto.

No entanto, não posso, em só consciência, permitir que um[visiting_liege.Custom('ES_XA')] [visiting_liege.Custom('GirlBoy')] tão jovem corra por um lugar onde possa ser dilacerad[visiting_liege.Custom('ES_OA')] viv[visiting_liege.Custom('ES_OA')] por um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GetAnimalType')].

Ainda assim, eu poderia agradar o pequeno [visiting_liege.GetLadyLord] preparando uma caçada de mentira, sem o perigo de animais reais."
 tour_grounds_events.1014.a: "Meu [Select_CString( stop_host_scope.IsFemale, 'anfitriona', 'anfitrión' )], [stop_host_scope.GetName] vem me felicitar pessoalmente pela minha presa. Com esse assunto resolvido, junto minha presa ao resto e continuo meu passeio pelas terras."
 tour_grounds_events.1014.b: "No entanto, a minha [Select_CString( stop_host_scope.IsFemale, 'anfitriona', 'anfitrión' )][stop_host_scope.GetName] ,"
 tour_grounds_events.1015.title: "Excelente."
 tour_grounds_events.1015.desc: "Estou ansios[ROOT.Char.Custom('ES_OA')] para vagar ao ar livre e caçar uma presa, como se espera de qualquer [ROOT.Char.GetTitleAsNameNoTooltip|l], e até agora meus anciãos e tutores me negaram essa oportunidade.

No entanto, hoje [stop_host_scope.GetName] me procurou e ofereceu a chance de testar as terras de [touring_grounds_scope.GetNameNoTooltip] como [Select_CString( visiting_liege.IsFemale, 'uma verdadeira caçadora', 'um verdadeiro caçador' )]!

Quando chego aos terrenos de caça, porém, não sou recebido por um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.Custom('GetAnimalType')] feroz, mas por um pedaço de madeira pintado para se parecer com um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.Custom('GetAnimalType')]."
 tour_grounds_events.1015.a: "[visiting_liege.GetHerHim] afasto para fazer o tiro eu mesmo!"
 tour_grounds_events.1015.b: "$tour_grounds_events.3006.title$"
 tour_grounds_events.1015.c: "Infelizmente, meu equilíbrio não parece firme o bastante e sinto meu corpo deixar a terra, à mercê da criação [ROOT.Char.GetFaith.CreatorNamePossessive].\n\n"
 tour_grounds_events.1016.title: "No entanto, [stop_host_scope.GetName] me agarra rapidamente e me coloca de volta de pé, enquanto meu salvador[stop_host_scope.Custom('ES_XA')] cai de rosto em seu valente esforço."
 tour_grounds_events.1016.desc: "Me viro no ar, em plena queda, para ver [stop_host_scope.GetName] contemplar tão tranquil[stop_host_scope.Custom('ES_OA')] como seu [ROOT.Char.GetTitleAsNameNoTooltip] cai. Quando meu corpo se reúne com o chão, sinto minha pele se rasgar e meu sangue divino se derramar pelo chão."
 tour_grounds_events.1016.a: "Giro em pleno voo e vejo [stop_host_scope.GetName] tomando meu lugar; não apenas sem fazer nada para me salvar, mas assumindo o disparo por conta própria! Quando meu corpo cai no chão com um estalo, ouço aplausos. Claramente, [stop_host_scope.GetNameNoTooltip] teve sucesso onde eu falhei, e sou deixad[ROOT.Char.Custom('ES_OA')] a me contorcer de dor e vergonha."
 tour_grounds.killed_boar: "Acho que já fiz o suficiente por hoje."
 tour_grounds.mauled_by_boar: "Um Incidente a Cavalo"
 #Liege Events
 tour_grounds_events.3001.title: "Tente evitá-los."
 tour_grounds_events.3001.desc.intro: "Nada pode ficar no caminho do meu passeio."
 tour_grounds_events.3001.desc.type.majesty: "Um Atropelamento Real"
 tour_grounds_events.3001.desc.type.taxation: "É mais um dia da visita de [visiting_liege.GetName], e, embora as coisas tenham começado bem, um[trampled_child_scope.Custom('ES_XA')] [trampled_child_scope.GetName] sem supervisão correu na frente do cavalo de [visiting_liege.GetNameNoTooltip] e foi imediatamente pisotead[trampled_child_scope.Custom('ES_OA')].\n\nO mais chocante é que [visiting_liege.GetNameNoTooltip] não fez nenhuma tentativa visível de impedir que isso acontecesse."
 tour_grounds_events.3001.desc.type.intimidation: "Sou obrigad[GetPlayer.Custom('ES_OA')] a ver meu próprio sangue sendo pisoteado sob os cascos de uma besta monstruosa."
 tour_grounds_events.3001.desc.mid.hates_vassal: "Não consigo desviar o olhar a tempo antes que [trampled_child_scope.Custom('ES_ElLa')] pobre criança seja atropelad[trampled_child_scope.Custom('ES_OA')] sob os cascos de um monstro."
 tour_grounds_events.3001.desc.mid.lover: "Quando a terrível provação chega ao fim, vejo o corpo sem vida de meu [ROOT.Char.Custom2('RelationToMeShort',trampled_child_scope)] reduzido a pouco mais que uma polpa ensanguentada no chão."
 tour_grounds_events.3001.desc.mid.friend: "Quando a terrível provação chega ao fim, [trampled_child_scope.Custom('ES_ElLa')] pobre crianç[trampled_child_scope.Custom('ES_OA')] parece imóvel, em uma poça de seu próprio sangue."
 tour_grounds_events.3001.desc.mid.close_family: "Por sorte, [trampled_child_scope.GetNameNoTooltip] sai dessa provação ainda viv[trampled_child_scope.Custom('ES_OA')], mas não sem ferimentos."
 tour_grounds_events.3001.desc.mid.house: "Nada a ver comigo."
 tour_grounds_events.3001.desc.mid.powerful_vassal: "Que vil!"
 tour_grounds_events.3001.desc.mid.default: "[visiting_liege.GetNameNoTooltip] é um monstro."
 tour_grounds_events.3001.desc.mid: "[stop_host_scope.GetNameNoTooltip] Jurou Vingança"
 tour_grounds_events.3001.desc.outro: "Um Corcel Inconfiável"
 tour_grounds_events.3001.a: "Meu passeio pelos terrenos de [touring_grounds_scope.GetNameNoTooltip] é interrompido bruscamente quando sinto meu valioso cavalo tropeçar em uma pedra. Embora ele se recupere rapidamente, e eu apenas perca momentaneamente o equilíbrio, posso ouvir membros da minha comitiva rindo atrás de mim.\n\n"
 tour_grounds_events.3002.title: "Sinto-me traicionad[ROOT.Char.Custom('ES_OA')] pelo meu suposto corcel tão valioso, e sinto uma mistura de humilhação e raiva borbulhar em minhas entranhas."
 tour_grounds_events.3002.desc.intro: "Sinto-me um pouco envergonhad[ROOT.Char.Custom('ES_OA')] mas sei que, na verdade, não é culpa do animal."
 tour_grounds_events.3002.desc.mid.crit: "Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] deve projetar uma aura de realeza intocável e impor respeito a todos os seus súditos, e este incidente arruinou minha imagem de perfeição."
 tour_grounds_events.3002.desc.mid.succ: "Mande matar a besta e me traga outra!"
 tour_grounds_events.3002.desc.mid.fail: "Todos cometem erros."
 tour_grounds_events.3002.desc.outro: "$tour_grounds_events.3010.title$"
 tour_grounds_events.3002.a: "Enquanto cavalgava pelos terrenos com [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)], seu corcel tropeçou em uma pedra, o que o desequilibrou momentaneamente. Quando alguns membros da comitiva começavam a rir, [visiting_liege.GetNameNoTooltip] desmontou"
 tour_grounds_events.3002.b: "em um acesso de raiva e corta brutalmente a garganta do pobre animal, observando enquanto a vida escorre de seu corpo."
 tour_grounds_events.3003.title: "e cuidadosamente dispara uma flecha entre os olhos da pobre besta."
 tour_grounds_events.3003.desc.intro: "\n\n\"Não tenho uso para bestas ou súditos que me falham. Eu sempre posso conseguir outro.\""
 tour_grounds_events.3003.desc.mid.high_skill: "Posso conseguir outro para vós, meu [visiting_liege.GetLadyLord]!"
 tour_grounds_events.3003.desc.mid.low_skill: "[stop_host_scope.GetNameNoTooltip] Ofereceu-se para Comprar um Novo Cavalo"
 tour_grounds_events.3003.desc.outro: "Entendido."
 tour_grounds_events.3003.a: "Comprei um Novo Cavalo"
 tour_grounds_events.3003.b: "Caçadores ilegais!"
 tour_grounds_events.3004.title: "Enquanto eu e minha comitiva cavalgamos, ouço murmúrios ecoando pelos terrenos. Ordeno a um menino que vá adiante e, quando ele retorna, ele me informa que há uma gangue de caçadores ilegais logo à nossa frente.\n\n"
 tour_grounds_events.3004.desc.intro: "Isso apresenta uma oportunidade ideal para infligir dor justificada a algumas almas desprevenidas e ao mesmo tempo agradar [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 tour_grounds_events.3004.desc: "Embora isso não seja da minha preocupação, certamente me agradaria agradar [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] se eu eliminasse essa atividade ilegal dos terrenos."
 tour_grounds_events.3004.a: "\n\nEu poderia reunir esses vagabundos e apresentar suas cabeças e mãos a [stop_host_scope.GetNameNoTooltip] sem muita dificuldade."
 tour_grounds_events.3004.b: "Hora de uma caçada."
 tour_grounds_events.3005.title: "Deixe-os ir, mediante uma taxa."
 tour_grounds_events.3005.desc.intro: "Evite-os."
 tour_grounds_events.3005.desc.mid.congrats: "Um Saco de Membros"
 tour_grounds_events.3005.desc.mid.insult: "Estive separad[ROOT.Char.Custom('ES_OA')] de [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] por algum tempo e, quando nos reunimos, vejo [visiting_liege.GetHerHim] cavalgando com vários sacos vermelhos pingando ao seu lado.

[visiting_liege.GetSheHe|U] esvazia os sacos aos meus pés, e observo horrorizad[ROOT.Char.Custom('ES_OA')] mãos e cabeças decepadas de algumas almas infelizes rolarem para fora, seus rostos presos para sempre em uma expressão de terror.

"Tomei a liberdade de limpar suas terras de caçadores furtivos e ladrões. Não precisa agradecer, amig[ROOT.Char.Custom('ES_OA')]."."
 tour_grounds_events.3005.a: "Obrigado, meu [visiting_liege.GetLadyLord]."
 tour_grounds_events.3005.a.bad: "[stop_host_scope.GetFirstNameNoTooltip] está impressionad[stop_host_scope.Custom('ES_OA')]."
 tour_grounds_events.3006.title: "Que horror!"
 tour_grounds_events.3006.desc: "[stop_host_scope.GetFirstNameNoTooltip] fica horrorizad[stop_host_scope.Custom('ES_OA')]."
 tour_grounds_events.3006.a: "Extravagância Tributável"
 tour_grounds_events.3006.b: "Ao ser levado para ver as atrações de [touring_grounds_scope.GetNameNoTooltip], começo a notar a opulência absoluta de tudo isso.\n\nEmbora seja apenas um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.GetTitleAsNameNoTooltip], [stop_host_scope.GetFirstNameNoTooltip] vive em luxo relativo e claramente tem dinheiro mais do que suficiente para dar e vender.\n\nAo ver a quantidade absurda de janelas de sua morada, eu poderia instituir um imposto sobre janelas e sangrar [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitleAsNameNoTooltip|U] de seu excesso."
 tour_grounds_events.3006.c: "Imposto sobre janelas, então."
 tour_grounds_events.3007.title: "Vou perdoá-lo por enquanto."
 tour_grounds_events.3007.desc.intro: "O Imposto sobre Janelas"
 tour_grounds_events.3007.desc.mid.protected: "Tenho sido meticulos[ROOT.Char.Custom('ES_OA')] ao mostrar a [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] todas as magníficas vistas de [touring_grounds_scope.GetNameNoTooltip], acreditando ser um[ROOT.Char.Custom('ES_XA')] grande anfitri[ROOT.Char.Custom('ES_OnOna')].

No entanto, percebo que [visiting_liege.GetSheHe] volta sua atenção para meus aposentos e aponta para eles enquanto murmura algo para si. Questiono [visiting_liege.GetHerHim], e [visiting_liege.GetSheHe] sorri.

"Ah, eu estava apenas contando as janelas. Você conhece o imposto obrigatério sobre janelas, não conheceÉ Ele remonta é própria fundação de [visiting_liege.GetPrimaryTitle.GetNameNoTooltip], e eu não poderia deixar passar um número tão irracional de janelas sem a devida tributação.""
 tour_grounds_events.3007.desc.mid.fell: "Tudo bem, pagarei seu imposto sobre janelas."
 tour_grounds_events.3007.desc.mid.took_the_shot: "[stop_host_scope.GetName] Pagou o Imposto"
 tour_grounds_events.3007.a: "Um imposto sobre janelas, o quê?"
 tour_grounds_events.3008.title: "[stop_host_scope.GetName] Recusou o Imposto"
 tour_grounds_events.3008.desc: "[stop_host_scope.GetName] Evitou o Imposto"
 tour_grounds_events.3008.a: "Um Lembrança"
 tour_grounds_events.3008.b: "Finalmente consigo ficar a sós nas terras selvagens de [touring_grounds_scope.GetNameNoTooltip] e minha mente divaga em pensamentos sobre [liege_lover_scope.Custom2('MyCharacterIntroduction', ROOT.Char)].

Não posso negar que [touring_grounds_scope.GetNameNoTooltip] é um lugar de verdadeira beleza, quase belo o bastante para igualar meu amor, [liege_lover_scope.GetNameNoTooltip]. Sinto-me obrigad[ROOT.Char.Custom('ES_OA')] a deixar aqui uma marca para que todos os que passem por [touring_grounds_scope.GetNameNoTooltip] saibam do amor que sinto por [liege_lover_scope.GetHerHim]. Talvez entalhar o nome de [liege_lover_scope.GetHerHis] em um[ROOT.Char.Custom('ES_XA')] [touring_grounds_scope.Custom('get_carvable_surface')]!"
 tour_grounds_events.3009.title: "Assim será feito."
 tour_grounds_events.3009.desc.intro: "Não, este lugar é perfeito como está."
 tour_grounds_events.3009.desc.mid.my_kid: "Profanado"
 tour_grounds_events.3009.desc.mid.not_my_kid: "Por fim, alcanço meu [visiting_liege.GetTitleAsNameNoTooltip] e, para meu horror, vejo [visiting_liege.GetHerHim] gravando o nome de [touring_grounds_scope.Custom('get_carvable_surface')].\n\nSem dúvida, não fazia ideia de que este/a [touring_grounds_scope.Custom('get_carvable_surface')] em particular tem grande significado espiritual para os moradores locais, e se descobrirem que seu/sua [visiting_liege.GetTitleAsNameNoTooltip] vandalizou um lugar tão sagrado, amaldiçoarão o nome de [visiting_liege.GetName] por gerações!"
 tour_grounds_events.3009.desc.outro.my_kid_dead: "Uma pena."
 tour_grounds_events.3009.desc.outro.not_my_kid_dead: "Eu assumirei a culpa!"
 tour_grounds_events.3009.desc.outro.alive: "$tour_grounds_events.3017.title$"
 tour_grounds_events.3009.a.callous: "Estou esculpindo alegremente na [touring_grounds_scope.GetProvince.Custom('get_carvable_surface')] quando ouço um suspiro repentino vindo de meu lado.\n\n[stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] parece absolutamente horrorizad[stop_host_scope.Custom('ES_OA')] ao contemplar minha obra, e logo se aproxima para me explicar.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], não tenho dúvidas de que ignorais que este/a [touring_grounds_scope.GetProvince.Custom('get_carvable_surface')] é considerado um objeto sagrado para os habitantes de [touring_grounds_scope.GetNameNoTooltip]!"
 tour_grounds_events.3009.a: "Não tema, assumirei a culpa por este. Apenas não mencione isso novamente."
 tour_grounds_events.3009.b: "Os camponeses e o clero de [touring_grounds_scope.GetNameNoTooltip] amaldiçoarão seu nome pela eternidade por sua profanação!"
 tour_grounds.trampled_child_nemesis: "Obrigado."
 tour_grounds_events.3010.title: "Por que um [touring_grounds_scope.GetProvince.Custom('get_carvable_surface')] nunca é apenas um [touring_grounds_scope.GetProvince.Custom('get_carvable_surface')]?"
 tour_grounds_events.3010.desc.intro: "Extras Tributáveis"
 tour_grounds_events.3010.desc.mid.irritable: "[touring_grounds_scope.GetNameNoTooltip] parece um lugar verdadeiramente opulento e exagerado, com um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.GetTitleAsNameNoTooltip] desmesurad[stop_host_scope.Custom('ES_OA')] como governante.\n\nPor onde quer que eu olhe, vejo sinais que apontam para uma coisa: comodidades tributáveis não declaradas. A contagem de cabeças de gado parece muito maior do que a reportada, a residência [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitleAsNameNoTooltip] é quase luxuosa o bastante para um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]!\n\n[greedy_entourage_member.GetName] me sugere que eu deveria taxar esse excesso, pois é evidente que [stop_host_scope.GetName] não tem pago o que lhe cabe."
 tour_grounds_events.3010.desc.mid.calm: "Tributem [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitleAsNameNoTooltip]!"
 tour_grounds_events.3010.desc.outro: "Vou relevá-los por enquanto."
 tour_grounds_events.3010.a: "$tour_grounds_events.3019.title$"
 tour_grounds_events.3010.b: "[visiting_liege.GetName] tem parecido um pouco distante e distraíd[visiting_liege.Custom('ES_OA')] ultimamente, às vezes murmurando para si e sussurrando com [greedy_entourage_member.GetName]. Por fim, [visiting_liege.GetSheHe] se aproxima diretamente de mim e diz sem rodeios o que está em sua mente.

"Como [stop_host_scope.GetTitleAsNameNoTooltip], deveis estar ciente de vossas obrigações financeiras para comigo como vosso suserano. Quando olho ao redor para toda a grandeza de vossa casa, não consigo deixar de sentir que sonegastes um pouco de impostos. Talvez seja melhor corrigirmos isso."."
 tour_grounds_events.3011.title: "Eu paguei o que devo!"
 tour_grounds_events.3011.desc.intro: "Muito bem."
 tour_grounds_events.3011.desc.mid.irritable: "Súditos Desleais"
 tour_grounds_events.3011.desc.mid.calm: "Tenho curiosidade de ver como a ralé de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], então visito um estabelecimento onde os locais parecem estar ficando bem alvoroçados. Um homem em pé sobre uma mesa chama a atenção de todos que o ouvem.\n\n"E para que precisamos de um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.GetTitleAsNameNoTooltip|l]? E aí,[stop_host_scope.GetFirstName]"
 tour_grounds_events.3011.desc.outro: "nem falam nossa língua,"
 tour_grounds_events.3011.a: "é [Select_CString( stop_host_scope.IsFemale, 'uma maldita estrangeira', 'um maldito estrangeiro' )],"
 tour_grounds_3011.vassal_paid_for_new_horse: "é um [stop_host_scope.GetFaith.GetAdherentName] maldito destinado ao [angry_peasant.GetFaith.NegativeAfterLife],"
 tour_grounds_events.3011.b: "nos alimenta com essa porcaria de [angry_peasant.Custom('RegionalAlcoholicDrink')],"
 tour_grounds_3011.vassal_did_not_pay: "nos enche com haxixe barato e espera que fiquemos quietos,"
 tour_grounds_events.3012.title: "nos faz lutar as suas batalhas enquanto [stop_host_scope.GetSheHe] descansa sobre seus louros,"
 tour_grounds_events.3012.desc.intro: "nos suga até a última gota com esses malditos impostos,"
 tour_grounds_events.3012.desc.mid.sadistic: "é o ápice de [stop_host_scope.Custom2('InsultNoun', ROOT.Char)] [stop_host_scope.Custom2('InsultAdjective', ROOT.Char)] que já vi,"
 tour_grounds_events.3012.desc.mid: "e, no entanto, [stop_host_scope.GetSheHe] espera nossa lealdade eterna!".\n\nTodo o prédio explode em aplausos. Está claro que meu [stop_host_scope.GetTitleAsNameNoTooltip|l] não é popular em sua própria casa."
 tour_grounds_events.3012.desc.outro: "Prendam esses traidores!"
 tour_grounds_events.3012.a: "Não fale mal [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitleAsNameNoTooltip|l]! Em guarda!"
 tour_grounds_events.3012.b: "Esses camponeses têm a ideia certa."
 tour_grounds_events.3012.c: "Uma Lição Dura"
 tour_grounds_events.3013.title: ""Me dê meu maldito dinheiro!".\n\nO som de sangue respingando e de ossos estalando chama minha atenção para uma vala humilde, onde vejo um[beaten_peasant.Custom('ES_XA')] pobre sendo segurado pela gola por algum malandro local.\n\nNormalmente, esse tipo de coisa estaria abaixo da minha atenção, mas será que eu realmente posso permitir que crimes tão flagrantes aconteçam bem diante dos meus olhos?"
 tour_grounds_events.3013.desc: "Estive separad[ROOT.Char.Custom('ES_OA')] de [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] por algum tempo e, quando nos reunimos, vejo [visiting_liege.GetHerHim] cavalgando com vários sacos vermelhos pingando ao seu lado.

[visiting_liege.GetSheHe|U] esvazia os sacos aos meus pés, e observo horrorizad[ROOT.Char.Custom('ES_OA')] mãos e cabeças decepadas de algumas almas infelizes rolarem para fora, seus rostos presos para sempre em uma expressão de terror.

""Ei, deixa eu dar uma surra nele(a) também por um pouco!""
 tour_grounds_events.3013.a: "Os Melhores de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]"
 tour_grounds.vassal_impressed: "[stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] decidiu me mostrar hoje seus quartéis.\n\n"
 tour_grounds_events.3013.b: "Fileira após fileira de infantaria leve permanece atenta em suas armaduras, prontas para minha inspeção."
 tour_grounds.vassal_horrified: "Fileira após fileira de arqueiros estão prontos, arcos em mãos."
 tour_grounds_events.3014.title: "Um mar de armaduras brilhantes está diante de mim, cada soldado parecendo indiferente ao peso sobre seus corpos."
 tour_grounds_events.3014.desc: "Os cavalos resmungam e resfolegam, ansiosos para que seus cavaleiros os levem para a carga."
 tour_grounds_events.3014.a: "Os camelos gemem e chutam, como se estivessem loucos para aterrorizar a cavalaria inimiga."
 tour_grounds_events.3014.b: "Eu fico maravilhado com o tamanho imponente da infantaria de elefantes e tenho receio de imaginar os momentos finais daqueles que são pisoteados sob seus pés."
 tour_grounds_events.3015.title: "Esses são excelentes soldados, mas parece um desperdício deixá-los ociosos o dia todo."
 tour_grounds_events.3015.desc: "Tenho sido meticulos[ROOT.Char.Custom('ES_OA')] ao mostrar a [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] todas as magníficas vistas de [touring_grounds_scope.GetNameNoTooltip], acreditando ser um[ROOT.Char.Custom('ES_XA')] grande anfitri[ROOT.Char.Custom('ES_OnOna')].

No entanto, percebo que [visiting_liege.GetSheHe] volta sua atenção para meus aposentos e aponta para eles enquanto murmura algo para si. Questiono [visiting_liege.GetHerHim], e [visiting_liege.GetSheHe] sorri.

"[visiting_liege.GetFirstName] interfere no seu exército"
 tour_grounds_events.3015.a: "Eu poderia usar soldados como esses."
 tour_grounds.vassal_paid_tax: "Talvez eu possa aprender algo aqui."
 tour_grounds_events.3015.b: "Um Momento de Silêncio"
 tour_grounds.vassal_refused_to_pay_tax: "Encontro-me passeando com meu séquito pelos maravilhosos cenários fora de [ROOT.Char.GetCurrentLocation.GetName] propriamente dito e"
 tour_grounds.vassal_won_tax_duel: "ao redor do magnífico jardim real de [stop_host_scope.GetName].\n\nDentro das paredes do jardim, só há eu, alguns nobres menores e um jardim preciso e intrincadamente arranjado. Parar por um momento aqui me enche de uma tranquilidade que raramente tenho a chance de experimentar."
 tour_grounds_events.3016.title: "pelo encantador bosque real de [stop_host_scope.GetName].\n\nEste bosque está completamente vazio de camponeses ou da pequena nobreza; apenas eu, meus confidentes mais próximos e a criação [ROOT.Char.GetFaith.CreatorNamePossessive]. Sinto-me transportad[ROOT.Char.Custom('ES_OA')] a um reino de pura calma, um tempo anterior a que os corações calamitosos dos homens manchassem a terra com vício e fraqueza."
 tour_grounds_events.3016.desc: "Finalmente consigo ficar a sós nas terras selvagens de [touring_grounds_scope.GetNameNoTooltip] e minha mente divaga em pensamentos sobre [liege_lover_scope.Custom2('MyCharacterIntroduction', ROOT.Char)].

Não posso negar que [touring_grounds_scope.GetNameNoTooltip] é um lugar de verdadeira beleza, quase belo o bastante para igualar meu amor, [liege_lover_scope.GetNameNoTooltip]. Sinto-me obrigad[ROOT.Char.Custom('ES_OA')] a deixar aqui uma marca para que todos os que passem por [touring_grounds_scope.GetNameNoTooltip] saibam do amor que sinto por [liege_lover_scope.GetHerHim]. Talvez entalhar o nome de [liege_lover_scope.GetHerHis] em um[ROOT.Char.Custom('ES_XA')] [touring_grounds_scope.Custom('get_carvable_surface')]!"
 tour_grounds_events.3016.a: "Um passeio tranquilo é um presente."
 tour_grounds_events.3016.b: "Estacionem as tropas, esta paz deve ser protegida!"
 tour_grounds_events.3017.title: "As Forças Militares Locais"
 tour_grounds_events.3017.desc: "Encontro-me vagando pelos cenários mais militaristas de [ROOT.Char.GetCurrentLocation.GetName], e acabo chegando a [stop_host_scope.GetName]"
 tour_grounds_events.3017.a: "academia militar.\n\nPor toda a academia, vejo $knight_culture_player_plural_no_tooltip_lowercase$ de nobre porte praticando e aprimorando suas habilidades, sabendo muito bem que a guerra está sempre no horizonte."
 tour_grounds_events.3017.b: "Marchas.\n\nEm toda a fronteira, eles se preparam para qualquer invasor ou infrator que venha para a sua vista, com eficiência especializada."
 tour_grounds_events.3018.title: "Oficinas de Cerco.\n\nAs máquinas recebem cuidados e manutenção constantes, algumas sendo reparadas e outras sendo montadas pela primeira vez. Eu temo pelo próximo vilão cujas muralhas enfrentarão essas máquinas."
 tour_grounds_events.3018.desc: "Arsenais Reais.\n\nO brilho polido das armaduras alinhadas nos Arsenais Reais quase dá à sala um brilho sobrenatural quando eu entro. Fileiras e mais fileiras de elmos e malhas pendem de todas as superfícies, o leve aroma de óleo pairando sobre eles."
 tour_grounds_events.3018.desc.outro.took_the_blame: "Listas de Justas.\n\nOs relinchos e grunhidos dos cavalos são interrompidos pelo repentino som de choque e estilhaços de lanças. Cascos retumbantes batem um ritmo staccato à medida que me aproximo, com gritos de encorajamento ecoando ao meu redor."
 tour_grounds_events.3018.desc.outro.blamed_liege: "Campos de Tiro com Arco.\n\nO constante som de #EMP tac-tac-tac#! das flechas atingindo os alvos é acompanhado pelo estalar das cordas dos arcos. Uma brisa leve sopra, causando todo tipo de travessura entre os arqueiros em treinamento quando sopra com mais força."
 tour_grounds_events.3018.a.took_blame: "\n\n[ROOT.Char.GetCurrentLocation.GetName] é um excelente centro militar, e está claro que tenho muito a aprender com suas práticas."
 tour_grounds_events.3018.a.was_blamed: "E aprender eu irei."
 tour_grounds_events.3019.title: "Esses homens ociosos deveriam caçar criminosos!"
 tour_grounds_events.3019.desc: "Talvez eu deva ter uma lição."
 tour_grounds_events.3019.a: "O Orgulho de um Agricultor"
 tour_grounds_events.3019.b: "Caminhando pelo campo de [ROOT.Char.GetCurrentLocation.GetName], me deparo com o que parece ser uma reunião de camponeses em um pequeno povoado.\n\nAcompanhados por seus orgulhosos proprietários,"
 tour_grounds_events.3020.title: "[farmer.Custom('RegionalRootVegetablePlural')] de tamanho imenso enchem carrinhos e barracas de mercado."
 tour_grounds_events.3020.desc: "[visiting_liege.GetName] tem parecido um pouco distante e distraíd[visiting_liege.Custom('ES_OA')] ultimamente, às vezes murmurando para si e sussurrando com [greedy_entourage_member.GetName]. Por fim, [visiting_liege.GetSheHe] se aproxima diretamente de mim e diz sem rodeios o que está em sua mente.

"Devemos fazer um levantamento dessas terras."
 tour_grounds_events.3020.a: "\"Isso é perda de tempo! Voltem para seus campos!\""
 tour_grounds_events.3020.b: "Que maravilha, vou julgar o concurso."
 tour_grounds_events.3040.title: "Um Dia Tranquilo"
 tour_grounds_events.3040.desc.intro: "Em minha visita a [ROOT.Char.GetCurrentLocation.GetName], encontro um raro momento em que não estou sendo conduzido por meu anfitrião nem esperado para aparecer em algum lugar.\n\nVejo os lugares de culto se enchendo para o dia,"
 tour_grounds_events.3040.desc.mid.wrong_language: "tavernas começando a receber seus primeiros bebedores,"
 tour_grounds_events.3040.desc.mid.wrong_culture: "figuras suspeitas seguindo em direção a jardins secretos de haxixe,"
 tour_grounds_events.3040.desc.mid.wrong_faith: "e mendigos deitados nas ruas, implorando por apenas um pedaço de comida."
 tour_grounds_events.3040.desc.mid.shit_beer: "É preciso realizar um censo deste assentamento."
 tour_grounds_events.3040.desc.mid.shit_weed: "Deveria passar o dia na presença [ROOT.Char.GetFaith.HighGodNamePossessive]."
 tour_grounds_events.3040.desc.mid.conscription: "Devo ver como os [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetAdherentNamePlural] adoram."
 tour_grounds_events.3040.desc.mid.high_taxes: "Uma excelente oportunidade para a caridade."
 tour_grounds_events.3040.desc.mid.just_plain_dislike_em: "Eu só quero relaxar."
 tour_grounds_events.3040.desc.outro: "[CHARACTER.GetShortUIName|U] deu a [TARGET_CHARACTER.GetShortUIName] uma ajuda muito necessária"
 tour_grounds_events.3040.a: "[TARGET_CHARACTER.GetShortUIName|U] deu a [CHARACTER.GetShortUIName] uma ajuda muito necessária"
 tour_grounds_events.3040.b: "[TARGET_CHARACTER.GetShortUIName|U] cansou-se da incompetência de [CHARACTER.GetShortUIName]"
 tour_grounds_events.3040.c: "[CHARACTER.GetShortUIName|U] cansou-se da incompetência de [TARGET_CHARACTER.GetShortUIName]"
 tour_grounds_events.3050.title: "[CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'insultaste', 'insultó' )] a [TARGET_CHARACTER.GetShortUIName]."
 tour_grounds_events.3050.desc: "[TARGET_CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'insultaste', 'insultó' )] insultou [CHARACTER.GetShortUIName]."
 tour_grounds_events.3050.a: "Guardas! Prendam esse idiota!"
 tour_grounds_events.3050.b: "Um Jantar Seco"
 tour_grounds_events.3050.b.success: "Tenho me divertido com [visiting_liege.GetName]; até agora, nossa noite tem sido cheia de prazeres e brincadeiras ébrias. Embora talvez pareça que fui generoso demais com minhas reservas de álcool, pois um servo me informa discretamente que até a última gota de [ROOT.Char.Custom('RegionalAlcoholicDrink')] foi consumida!

Meu [visiting_liege.GetLadyLord] está sentad[visiting_liege.Custom('ES_OA')] impaciente do outro lado da mesa, vermelh[visiting_liege.Custom('ES_OA')] como um recém-nascido, batendo o cálice na mesa.

"Vamos! A noite é jovem! Onde está a bebida?""
 tour_grounds_events.3050.b.failure: "\"Reabasteçam as reservas!\""
 tour_grounds_events.3050.c: "[stop_host_scope.GetName] reabasteceu as reservas de álcool"
 tour_grounds_events.3060.title: "Você já bebeu o suficiente!"
 tour_grounds_events.3060.desc.intro: "[stop_host_scope.GetName] repreendeu sua bebida"
 tour_grounds_events.3060.desc.light_infantry: "Talvez seja hora de mudar de local."
 tour_grounds_events.3060.desc.archers: "Eu as reabastecerei... em troca de um favor."
 tour_grounds_events.3060.desc.heavy_infantry: "Uma ou Duas Canecas"
 tour_grounds_events.3060.desc.cavalry: "Meu [Select_CString( stop_host_scope.IsFemale, 'anfitriã', 'anfitrião' )], [stop_host_scope.GetName], me tirou de sua casa para me levar a uma taverna local. Por toda parte vejo os miseráveis e fracos entregues à bebida e à devassidão, mas [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] me assegura que a [ROOT.Char.Custom('RegionalAlcoholicDrink')] servida neste estabelecimento é de morrer.

Quando a primeira rodada passa pelos meus lábios, sinto-me viv[ROOT.Char.Custom('ES_OA')]. A bebida me atinge como uma tonelada de tijolos, e sinto que esta será uma noite de folia sem fim."
 tour_grounds_events.3060.desc.camel_cavalry: "Você realmente se superou, [stop_host_scope.GetFirstNameNoTooltip]!"
 tour_grounds_events.3060.desc.elephant_cavalry: "Vamos mostrar um pouco de moderação."
 tour_grounds_events.3060.desc.outro: "Vou beber até morrer."
 tour_grounds_events.3060.a: "Você bebeu até cair de bêbado"
 tour_grounds_events.3060.b: "Um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip] adormecido"
 tour_grounds_events.3060.b.success: "[visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] apareceu finalmente para passar a noite e está dormindo pacificamente em seus aposentos; sem dúvida sonhando em esvaziar ainda mais minha despensa de toda a comida e bebida que me restam.\n\nTalvez esta seja uma boa oportunidade para surpreender meu [visiting_liege.GetLadyLord]. Talvez algum entretenimento noturno, ou algo agradável para [visiting_liege.GetHerHim]…"
 tour_grounds_events.3060.b.failure: "Vamos encenar uma assombração!"
 tour_grounds_events.3060.b.vassal: "[ROOT.Char.Custom('RegionalAlcoholicDrink')] sempre é um ótimo presente!"
 tour_grounds_events.3060.c: "Bolos de haxixe irão agradar [visiting_liege.GetSheHe]."
 tour_grounds_events.3060.d: "O toque de uma concubina é uma ótima maneira de acordar."
 tour_grounds_events.3070.title: "Minha companhia certamente agradará [visiting_liege.GetSheHe]."
 tour_grounds_events.3070.desc.intro: "Um Despertar Assustador"
 tour_grounds_events.3070.desc.royal_garden: "Eu jazgo em paz na melhor alcova de [stop_host_scope.GetTitledFirstName|l] sem uma dúvida nem preocupação na mente. No entanto, uma risada alta e ameaçadora vinda do fim do corredor me arranca do meu sono sem sonhos.\n\nSaio a contragosto, com a mão trêmula sacudindo a vela na penumbra e fico olhando para o corredor."
 tour_grounds_events.3070.desc.royal_forest: "Juro que vejo, de pé no final do longo corredor escuro, algum tipo de espírito maligno. Ele sussurra para mim, chamando meu nome, talvez desejando me arrastar para [ROOT.Char.GetFaith.NegativeAfterLife]! Seja o que for que ele queira, devo agir para me salvar!"
 tour_grounds_events.3070.desc.leisure_palace: "Meu medo imediatamente se dissipa quando vejo que não passa de um servo com um lençol fino sobre ele. Ele faz barulhos e chama meu nome, mas até mesmo uma criança poderia dizer que isso não é um espírito.\n\nEssa é a tentativa de humor de [stop_host_scope.GetName], sem dúvida."
 tour_grounds_events.3070.desc.outro: "Gritar por ajuda!"
 tour_grounds_events.3070.a: "Barricar a porta!"
 tour_grounds_events.3070.b: "Que divertido!"
 tour_grounds_events.3070.c: "[visiting_liege.GetName] gostou da brincadeira"
 tour_grounds_events.3080.title: "[stop_host_scope.GetFirstNameNoTooltip] perturbou meu sono por isso?"
 tour_grounds_events.3080.desc.intro: "O Fantasma de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]"
 tour_grounds_events.3080.desc.military_academy: "Parece que minha brincadeira funcionou até bem demais, pois ouço [visiting_liege.GetName] gritando como [Select_CString( visiting_liege.IsFemale, 'uma menina pequena', 'um menino pequeno' )] e pedindo que eu vá ajudar[visiting_liege.GetHerHim].\n\nCom diligência, corro até seus aposentos, onde [visiting_liege.GetHerHim] encontro pálid[visiting_liege.Custom('ES_OA')] como um lençol, apontando para o fantasma no fim do corredor.\n\nGraças ao céu que você veio! Há um espírito maligno tentando me levar para o/a [visiting_liege.GetFaith.NegativeAfterLife]!."
 tour_grounds_events.3080.desc.march: "Que tolo!"
 tour_grounds_events.3080.desc.siege_works: "Estou sendo ridicularizado"
 tour_grounds_events.3080.desc.royal_armories: "Posso banir esse espírito, em troca de um favor."
 tour_grounds_events.3080.desc.jousting_lists: "[stop_host_scope.GetName] baniu o espírito."
 tour_grounds_events.3080.desc.archery_ranges: "Desapareça, espírito!"
 tour_grounds_events.3080.desc.outro: "Chamada de Despertar Inesperada"
 tour_grounds_events.3080.a: "Saio do meu sono após outra noite tranquila na residência de [stop_host_scope.GetName]. À medida que recupero a consciência, sinto algo pesado ao meu lado que não estava ali antes.\n\n"
 tour_grounds_events.3080.b: "Um barril inteiro de [stop_host_scope.Custom('RegionalAlcoholicDrink')] repousa ao meu lado como um amante, oscilando e rangendo com cada leve movimento que faço."
 tour_grounds_events.3080.c: "Ao meu lado, há bolos de haxixe suficientes para eu comer meu próprio peso se assim desejar!"
 tour_grounds_events.3090.title: "Sinto o toque familiar de um[concubine_scope.Custom('ES_XA')] [concubine_scope.GetWomanMan] que desliza o dedo pelo meu peito com curiosidade."
 tour_grounds_events.3090.desc.intro: "Viro-me e vejo [stop_host_scope.GetFirstNameNoTooltip] sentad[stop_host_scope.Custom('ES_OA')] aos pés da minha cama, completamente vestid[stop_host_scope.Custom('ES_OA')].\n\n“Bom dia, meu [ROOT.Char.GetTitleAsNameNoTooltip]. Julguei apropriado dar-vos um presente e, que presente melhor do que o presente da minha conversa?”."
 tour_grounds_events.3090.desc.vegetables: "\n\nEste presente certamente é inesperado, mas será mesmo tão agradável acordar com ele?"
 tour_grounds_events.3090.desc.livestock: "Que forma maravilhosa de acordar."
 tour_grounds_events.3090.desc.outro: "[visiting_liege.GetTitledFirstName] gostou do presente."
 tour_grounds_events.3090.a: "Suma da minha vista!"
 tour_grounds_events.3090.b: "[visiting_liege.GetTitledFirstName] foi insultad[visiting_liege.Custom('ES_OA')]."
 tour_grounds_events.3090.c: "Uma proposta interessante"
 tour_grounds_events.3100.title: "Estou desfrutando do meu jantar tranquilo com [stop_host_scope.GetName] e sua [stop_host_scope.Custom2('RelationToMeShort', lusty_spouse_scope)] [lusty_spouse_scope.GetName].\n\nPoucos momentos depois de [stop_host_scope.GetNameNoTooltip] se desculpar [stop_host_scope.GetHerselfHimself], [lusty_spouse_scope.GetNameNoTooltip] investe contra mim como um cão raivoso!"
 tour_grounds_events.3100.desc.intro: "Tento afastar tal degenerad[lusty_spouse_scope.Custom('ES_OA')] [lusty_spouse_scope.Custom2('InsultAdjective', ROOT.Char)], mas ela/ele é bastante insistente em perverter minha mente com pensamentos impuros."
 tour_grounds_events.3100.desc.booze: "Fico surpreso(a) com suas investidas, mas não consigo evitar deixar minhas mãos percorrerem seu corpo."
 tour_grounds_events.3100.desc.hash: "Fico paralisad[ROOT.Char.Custom('ES_OA')] de surpresa, alarmad[ROOT.Char.Custom('ES_OA')] de que baste apenas que [stop_host_scope.GetFirstNameNoTooltip] saia da sala para que [lusty_spouse_scope.GetFirstNameNoTooltip] considere o adultério com a pessoa mais próxima."
 tour_grounds_events.3100.desc.outro: "\n\nPor favor, livrai-me deste tédio! [stop_host_scope.GetFirstNameNoTooltip] não é amante meu. É tão afetuoso quanto um pedaço de madeira. Tomai-me e amai-me como [stop_host_scope.GetSheHe] nunca o fez!"
 tour_grounds_events.3100.a: "Com prazer!"
 tour_grounds_events.3100.b: "Preciso contar a [stop_host_scope.GetTitledFirstNameNoTooltip|l] imediatamente!"
 tour_grounds_events.3100.c: "Não vou contar, mas você me deve uma."
 tour_grounds_events.3100.d: "Sai de cima de mim, busc[lusty_spouse_scope.Custom('ES_OnOna')] sem-vergonha!"
 tour_grounds_events.3100.e: "[lusty_spouse_scope.GetFirstNameNoTooltip]: [lusty_spouse_scope.Custom('ES_ElLa')] Adúlter[lusty_spouse_scope.Custom('ES_OA')]"
 friend_helped_me: "Retorno ao jantar após uma breve trégua e encontro [lusty_spouse_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] sentad[lusty_spouse_scope.Custom('ES_OA')] desconfortavelmente com [visiting_liege.GetName].\n\n"[ROOT.Char.GetTitledFirstNameNoTooltip|l], temo que tenho notícias terríveis. Enquanto vos estaveis ausente, [Select_CString( lusty_spouse_scope.IsFemale, 'esta libertina', 'este libertino' )] tentou envolver-se comigo em relações adúlteras!"."
 friend_helped_me_corresponding: "Isso é motivo para divórcio."
 rival_incompetence: "Vamos manter isso entre nós."
 rival_incompetence_corresponding: "Vou fingir que não ouvi isso."
 rival_insulted_me: "Jamais [lusty_spouse_scope.GetHerHim] perdoarei."
 rival_insulted_me_corresponding: "Uma apresentação memorável"
 #Host Dinner
 host_dinner_events.1001.title: "Uma peça sobre guerra, é claro!"
 host_dinner_events.1001.desc: "Tenho me divertido com [visiting_liege.GetName]; até agora, nossa noite tem sido cheia de prazeres e brincadeiras ébrias. Embora talvez pareça que fui generoso demais com minhas reservas de álcool, pois um servo me informa discretamente que até a última gota de [ROOT.Char.Custom('RegionalAlcoholicDrink')] foi consumida!

Meu [visiting_liege.GetLadyLord] está sentad[visiting_liege.Custom('ES_OA')] impaciente do outro lado da mesa, vermelh[visiting_liege.Custom('ES_OA')] como um recém-nascido, batendo o cálice na mesa.

"$host_dinner_events.1007.title$"
 host_dinner_events.1001.a: "Parece que [stop_host_scope.GetName] decidiu fazer uma apresentação para me divertir esta noite. Sento-me à mesa do banquete, esperando ansiosamente pelo meu entretenimento, quando"
 host_dinner_events.1001.replenished_stores: "[stop_host_scope.GetNameNoTooltip] surge diante de mim com uma armadura.\n\n"Eis-me aqui! Sou [loser.Custom('ES_ElLa')] poderos[loser.Custom('ES_OA')] [loser.GetName], e eu pessoalmente entregarei [visiting_liege.Custom('ES_AlAla')] vil [visiting_liege.GetNameNoTooltip] ao seu criador!".\n\nAntes que eu possa responder, colocam uma espada de madeira em minha mão. Sem dúvida, isto é uma encenação de quando [memory_performance_scope.GetDescription]."
 host_dinner_events.1001.b: "[stop_host_scope.GetNameNoTooltip] aparece com uma maquiagem pouco favorecedora e um vestido de má qualidade.\n\n"Ai de mim! Não consigo mais me agarrar à minha vida mortal. Maldição, nunca mais humilharei a [visiting_liege.GetNameNoTooltip]!".\n\nA encenação inclui muitos sons de flatulência e gemidos de deboche, uma recriação de quando [memory_performance_scope.GetDescription]."
 host_dinner_events.1001.didnt_replenish_stores: "[stop_host_scope.GetNameNoTooltip] aparece vestid[stop_host_scope.Custom('ES_OA')] como meu amad[dead_relation.Custom('ES_OA')] [dead_relation.GetName].\n\n\"Ai de mim, parto para meu [dead_positive_relation_memory_scope.dead_relation.GetFaith.PositiveAfterLife|U]. Só consigo pensar em [visiting_liege.GetNameNoTooltip] e nos momentos maravilhosos que passamos juntos\".\n\nUma representação sentida e trágica que recria quando [memory_performance_scope.GetDescription]."
 host_dinner_events.1001.c: "[stop_host_scope.GetNameNoTooltip] aparece vestid[stop_host_scope.Custom('ES_OA')] quase exatamente como [spouse.GetName] no dia do nosso casamento.

"Em verdade, este é o melhor dia da minha vida! Vou me casar com [Select_CString( visiting_liege.IsFemale, 'a maravilhosa', 'o maravilhoso' )] [visiting_liege.GetNameNoTooltip]!"

Sou convidad[ROOT.Char.Custom('ES_OA')] ao palco para dar minha mão a [stop_host_scope.GetName], mas"
 host_dinner_events.1001.d: "Eu me pergunto, devo me render a isso?"
 host_dinner_events.1002.title: "Que maravilhoso!"
 host_dinner_events.1002.desc: "Meu [Select_CString( stop_host_scope.IsFemale, 'anfitriã', 'anfitrião' )], [stop_host_scope.GetName], me tirou de sua casa para me levar a uma taverna local. Por toda parte vejo os miseráveis e fracos entregues à bebida e à devassidão, mas [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] me assegura que a [ROOT.Char.Custom('RegionalAlcoholicDrink')] servida neste estabelecimento é de morrer.

Quando a primeira rodada passa pelos meus lábios, sinto-me viv[ROOT.Char.Custom('ES_OA')]. A bebida me atinge como uma tonelada de tijolos, e sinto que esta será uma noite de folia sem fim."
 host_dinner_events.1002.a: "Pra dentro!"
 host_dinner_events.1002.b: "A comida estava nojenta"
 host_dinner_events.1002.c: "A iguaria estava incrível"
 drank_too_much_toast: "Não deixarei essa sujeira tocar minha língua."
 host_dinner_events.1003.title: "Talvez eu possa dar isso sorrateiramente para meu cachorro..."
 host_dinner_events.1003.desc: "Talvez eu possa dar isso sorrateiramente para o cachorro de [stop_host_scope.GetFirstNameNoTooltip]..."
 host_dinner_events.1003.a: "[stop_host_scope.GetNameNoTooltip] não percebeu"
 host_dinner_events.1003.b: "[stop_host_scope.GetFirstNameNoTooltip] se deu conta"
 host_dinner_events.1003.c: "Uma Promessa Antecipada"
 host_dinner_events.1003.d: "Hoje chego cedo ao jantar e me encontro a sós com [stop_host_heir.GetName] de herdeir[stop_host_heir.Custom('ES_OA')] de [stop_host_scope.GetName]."
 host_dinner_events.1003.e: "[stop_host_heir.GetSheHe|U] ainda é jovem e estÉ visivelmente intimidad[stop_host_heir.Custom('ES_OA')] por compartilhar a sala com seu [ROOT.Char.GetTitleAsNameNoTooltip]."
 host_dinner_events.1004.title: "Sua natureza confiante é infame. Como uma criança, sua cabeça é vazia e maleável, e é fácil demais alinhar sua cabecinha com minha visão."
 host_dinner_events.1004.desc.intro: "\n\nSeria fácil demais manipular [stop_host_heir.Custom('ES_AlAla')] pobre coitado para que me faça jurar lealdade legal antecipadamente, mas isso certamente desagradaria a [stop_host_scope.GetNameNoTooltip]."
 host_dinner_events.1004.desc.ghost: "Vamos fazer isso!"
 host_dinner_events.1004.desc.cynic: "Sua tentativa de injustiça é notada"
 host_dinner_events.1004.a: "As palavras foram ditas e não podem ser desditas"
 host_dinner_events.1004.b: "Vou apenas conversar."
 host_dinner_events.1004.c: "Você teve uma conversa amigável"
 host_dinner_events.1004.enjoyed_spooky_ghost: "A conversa foi constrangedora"
 host_dinner_events.1004.d: "$host_dinner_events.3004.title$"
 host_dinner_events.1005.title: "Entro no salão de jantar e encontro [visiting_liege.GetName] conversando com [stop_host_heir.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre assuntos de Estado e obrigações.

Parece que [visiting_liege.GetName] está manipulando [stop_host_heir.GetHerHim] para que faça um juramento de lealdade à coroa em minha ausência! Tal juramento assombraria [stop_host_heir.GetHerHim] pelo resto de seus dias e selaria nosso futuro como subordinados de [visiting_liege.GetName]!"
 host_dinner_events.1005.desc: "Permitirei isso, em troca de um favor próprio."
 host_dinner_events.1005.a: "[stop_host_scope.GetName] exige uma compensação"
 host_dinner_events.1004.mocked_me: "\"Parem com essa loucura imediatamente!\""
 host_dinner_events.1005.b: "Você foi pego"
 host_dinner_events.1004.hooked_me: "Sonhos de uma vida melhor"
 host_dinner_events.1005.c: "Nesta noite, está sentado ao meu lado [runaway_courtier.Custom2('NamePossessiveCharacterIntroduction', stop_host_scope)] e [runaway_courtier.GetHerHim] vejo suspirar sobre o prato com saudade.\n\n"
 host_dinner_events.1006.title: ""Ah, peço desculpas por minha melancolia, meu [ROOT.Char.GetTitleAsNameNoTooltip|U]. [stop_host_scope.GetNameNoTooltip] provavelmente me sentou ao vosso lado para agradar-vos. [stop_host_scope.GetSheHe|U] é assim, sÉ me vÉ como um objeto a ser admirado e usado. Para dizer a verdade, tenho sonhado em voltar convosco para [ROOT.Char.GetCapitalLocation.GetName].""
 host_dinner_events.1006.desc.intro: "\"Verdadeiramente, estou cansado(a) da vida aqui em [stop_host_scope.GetCapitalLocation.GetName] e desejo elevar minha posição na vida. Meus talentos são desperdiçados aqui e, ultimamente, tenho pensado em fugir com você de volta para [ROOT.Char.GetCapitalLocation.GetName], onde posso realmente mostrar o meu valor!\""
 host_dinner_events.1006.desc.alcohol: "\n\nSuas lamentações parecem genuínas, mas será que realmente posso roubar[runaway_courtier.GetHerHim] da corte de [stop_host_scope.GetNameNoTooltip]?"
 host_dinner_events.1006.desc.weed: "Claro, venha comigo!"
 host_dinner_events.1006.desc.hedonist: "\"Eu apreciarei mais do que apenas a sua beleza.\""
 host_dinner_events.1006.desc.vanity: "Ao menos posso ser um ombro para chorar."
 host_dinner_events.1006.desc.outro: ""Saiba qual é o seu lugar, seu [runaway_courtier.Custom2('InsultNoun', ROOT.Char)]!"."
 host_dinner_events.1006.a: "O(a) Cortesã(o) Roubado(a)"
 host_dinner_events.1006.liked_gift: "Decidi que era uma boa ideia sentar [visiting_liege.GetName] ao lado de [runaway_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)], e parece ter sido bem recebido. Um pouco bom demais."
 host_dinner_events.1006.b: "\n\n[runaway_courtier.GetNameNoTooltip] se encolhe ao me ver e desvia o olhar."
 host_dinner_events.1006.refused_gift: "\n\n[runaway_courtier.GetNameNoTooltip] revira os olhos ao me ver, antes de desviar o olhar rapidamente."
 host_dinner_events.3001.title: "[runaway_courtier.GetSheHe|U] parece determinado(a) a deixar minha corte e ir para [visiting_liege.GetName]! Posso impedir isso, mas certamente isso estragaria o clima do jantar."
 host_dinner_events.3001.desc.intro: "Eu proíbo isso!"
 host_dinner_events.3001.desc.not_into_it: "[stop_host_scope.GetName] se recusou a deixar[runaway_courtier.GetHerHim] ir."
 host_dinner_events.3001.desc.into_it: "Deixe[runaway_courtier.GetHerHim] partir."
 host_dinner_events.3001.desc.mid: "Um pouco de bisbilhotice"
 host_dinner_events.3001.desc.outro: "É de manhã, e saio relutantemente para o mundo desperto quando o sol matinal de repente atravessa minha visão. Vejo [Select_CString( nervous_servant.IsFemale, 'uma criada', 'um criado' )] arrastar os pés desajeitadamente pelo meu quarto, vacilante enquanto põe meu café da manhã ao meu lado. Pergunto o que aflige [nervous_servant.GetHerHim], e, com tão pouca provocação, [nervous_servant.GetSheHe] começa a vomitar palavras.

"Oh, meu sábio[ROOT.Char.Custom('ES_OA')] e bondoso[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], estas paredes falam. Oh, que coisas terríveis elas dizem. Sei tanto, acho que em alguns dias sei até demais. [stop_host_scope.GetName] nunca me perdoaria se eu contasse, mas simplesmente não consigo guardar mais esses segredos na cabeça!""
 host_dinner_events.3001.a: "\"Você deve me contar imediatamente!\""
 host_dinner_events.3001.b: "[nervous_servant.GetSheHe|U] revelou um segredo"
 host_dinner_events.3001.c: "\"Será que algumas moedas soltariam esses lábios?\""
 host_dinner_events.3001.d: "[stop_host_scope.GetName] está desconfiado(a) de você"
 host_dinner_events.3002.title: "\"Você deveria manter a boca fechada.\""
 host_dinner_events.3002.desc: "Sua Alteza"
 host_dinner_events.3002.a: "Quando terminamos os pratos principais, olho com expectativa para [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] à espera de elogios e aprovação, apenas para encontrar um olhar expectante em seu rosto. Está claro que o que providenciei não é suficiente para minha [Select_CString( visiting_liege.IsFemale, 'invitada estimada', 'convidado estimado' )], mas os cozinheiros já fizeram tudo o que lhes pedi e não posso ter certeza de que tenhamos mais algo para servir.\n\nEntão me ocorre que ainda tenho uma enorme reserva de bolos de haxixe em minha despensa, prontos para serem devorados! A única questão é: estou disposto a compartilhar essa delícia com meu [visiting_liege.GetTitleAsNameNoTooltip]?"
 host_dinner_events.3002.b: "Traga os bolos!"
 host_dinner_events.3002.c: "Tenho certeza de que [ROOT.Char.Custom('GetExpensiveDessert')] estará bem."
 host_dinner_events.3002.d: "Minha Alteza"
 host_dinner_events.1007.title: "Quando termino minha última refeição, não consigo evitar sentir que há um vazio no meu estômago onde deveria haver uma sobremesa. Ao que parece, [stop_host_scope.GetName] consegue ler meus pensamentos, pois, antes mesmo de eu ter a oportunidade de reclamar, chama um servo para trazer seus \"bolos especiais\".\n\n\"Só os melhores bolos de haxixe para meu [visiting_liege.GetTitleAsNameNoTooltip]!\", diz ele enquanto despejam uma verdadeira montanha daquilo no meu prato."
 host_dinner_events.1007.desc: "Ultimamente, [visiting_liege.GetName] tem se mostrado cada vez mais apátic[visiting_liege.Custom('ES_OA')] e entediad[visiting_liege.Custom('ES_OA')] em minha presença, muitas vezes parecendo estar à beira do mundo dos sonhos.

Um pensamento me ocorre enquanto observo [visiting_liege.GetHerHim] empurrando a comida de forma displicente. [visiting_liege.GetSheHe|U] viveu uma vida plena; talvez [visiting_liege.GetSheHe] se sentisse lisonjead[visiting_liege.Custom('ES_OA')] se recriássemos uma de suas famosas façanhas na forma de uma peça teatral!

A única pergunta é: que tipo de peça [visiting_liege.GetNameNoTooltip] acharia mais divertida?"
 host_dinner_events.1007.a: "Comemos carne com abundância, mas em [visiting_liege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] tal coisa é totalmente proibida. Até agora, [visiting_liege.GetName] parece estar comendo o que lhe é servido, mas deixando de lado qualquer carne, dando ao meu [visiting_liege.GetTitleAsNameNoTooltip|U] uma refeição incompleta! Posso realmente permitir que isso continue? Talvez todos devêssemos fazer uma dieta sem carne enquanto [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitleAsNameNoTooltip] estiver por aqui."
 host_dinner_events.1007.b: "Isso me colocaria nas boas graças de [visiting_liege.GetSheHe]."
 host_dinner_events.1007.c: "Tenho certeza de que [visiting_liege.GetSheHe] não esqueceria desse favor tão cedo..."
 host_dinner_events.1007.d: "Enquanto estiver aqui, vai comer à nossa maneira!"
 host_dinner_events.1007.e: "Um Bolo para Lembrar"
 host_dinner_events.1008.title: "Outra noite, outra sobremesa, e posso ver que [visiting_liege.GetName] já está se cansando de nossas bandejas de [ROOT.Char.Custom('GetExpensiveDessert')]. Talvez esta noite seja a noite de fazer algo um pouco diferente.\n\nTalvez a solução para esse dilema seja pedir aos meus cozinheiros e confeiteiros que preparem uma sobremesa em forma de algo que signifique muito para meu caro apreciad[visiting_liege.Custom('ES_OA')] [visiting_liege.GetLadyLord]. Talvez uma fortaleza para simbolizar sua destreza, ou algo que jamais esperaria..."
 host_dinner_events.1008.desc.intro: "Uma fortaleza, claro!"
 host_dinner_events.1008.desc.mid.war_memory: "O [visiting_liege.GetFaith.ReligiousSymbol] ficaria excelente!"
 host_dinner_events.1008.desc.mid.dead_rival_memory: "Talvez uma certa parte da anatomia humana…"
 host_dinner_events.1008.desc.mid.dead_positive_relation_memory: "É uma ideia terrível."
 host_dinner_events.1008.desc.mid.marriage_memory: "[stop_host_scope.GetNameNoTooltip] aparece vestid[stop_host_scope.Custom('ES_OA')] quase exatamente como [spouse.GetName] no dia do nosso casamento.

"Um delicioso bolo em forma de forte [ROOT.Char.GetCulture.GetName] é colocado na minha frente. A coisa é tão autêntica que consigo imaginar pequenos invasores melados tentando invadir as paredes da minha sobremesa."

Sou convidad[ROOT.Char.Custom('ES_OA')] ao palco para dar minha mão a [stop_host_scope.GetName], mas"
 host_dinner_events.1008.desc.outro: "Não consigo mais me segurar e começo a rir incontrolavelmente quando essas duas esferas tremulantes de sobremesa são colocadas à minha frente, com duas 'mamilos' frutados no topo. Há todo tipo de detalhes obscenos nessa confeição que tenho certeza que até mesmo [ROOT.Char.GetFaith.DevilName] coraria!"
 host_dinner_events.1008.a: "\n\nPor supuesto, me encanta. A única questão é: como posso demonstrar melhor meu apreço?"
 host_dinner_events.1008.b: "Vou me lembrar disso!"
 host_dinner_events.3003.title: ""Fico te devendo uma!""
 host_dinner_events.3003.desc: "O jantar desta noite é um pouco diferente do que estou acostumad[ROOT.Char.Custom('ES_OA')]. O cozinheiro larga displicentemente a tigela à minha frente, e de imediato sou confrontad[ROOT.Char.Custom('ES_OA')] com o aroma mais sobrenatural que já senti na vida.

Este prato das profundezas de [ROOT.Char.GetFaith.NegativeAfterLife] ofende todos os sentidos. Uma substância cinzenta e viscosa repousa em seu caldo pálido e espumoso como um penico abandonado, com uma única haste de erva por cima em uma tentativa inútil de tornar a coisa apetitosa.

Todos os meus instintos me obrigam a jogar a coisa pela janela mais próxima, mas [stop_host_scope.GetNameNoTooltip] me assegura que é uma iguaria local digna de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 host_dinner_events.3003.a: "

Só posso me sentir insultad[ROOT.Char.Custom('ES_OA')] ao contemplar isto, mas, pelos olhos de cachorrinho de [stop_host_scope.GetFirstNameNoTooltip], vejo que se tratou de uma tentativa sincera de bajulação."
 host_dinner_events.3003.disgusting: "Ah, eu adoro isso!"
 host_dinner_events.3003.delicious: "[visiting_liege.GetFirstName] adora isso"
 host_dinner_events.3003.b: ""Como ousa!""
 host_dinner_events.3003.c.my_dog: "[visiting_liege.GetFirstName] odeia o bolo"
 host_dinner_events.3003.c.lieges_dog: "Um Convidado Indesejado"
 host_dinner_events.3003.unnoticed: "Outro jantar foi preparado para meu [visiting_liege.GetLadyLord] durante sua estadia, e parece ter sido um verdadeiro acerto! [visiting_liege.GetName] parece salivar só de olhar, e, bem quando [visiting_liege.GetSheHe] está prestes a dar a primeira mordida, [rival_scope.Custom2('NamePossessiveCharacterIntroduction', visiting_liege)] irrompe no salão de jantar e se pavoneia até o prato de seu inimigo.

"Que banquete temos aqui! Que pena que será desperdiçado na língua pútrida de um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip] tão vil[visiting_liege.Custom('ES_OA')]!"

O humor de [visiting_liege.GetNameNoTooltip] azeda imediatamente e, se eu não fizer nada, meu jantar logo pode virar uma briga de socos."
 host_dinner_events.3003.host_noticed: ""Guardas! Tirem este idiota daqui imediatamente!"."
 host_dinner_events.3004.title: "Talvez eu possa eliminá-los para ganhar alguma vantagem."
 host_dinner_events.3004.desc.intro: "[rival_scope.GetFirstNameNoTooltip] é hilário! Precisamos conversar!"
 host_dinner_events.3004.desc.mid.child: "$host_dinner_events.1030.title$"
 host_dinner_events.3004.desc.mid.adult: "Foi preparada outra refeição para mim durante a minha estadia, e parece ser um verdadeiro sucesso! Só de olhar para este prato suculento e fumegante, já fico salivando, e justo quando estou prestes a dar a primeira mordida, uma voz irritantemente familiar perfura meus tímpanos.\n\n[rival_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] chegou para estragar meu apetite, e sua mera presença está fazendo meu sangue ferver."
 host_dinner_events.3004.desc.outro: "\n\n[stop_host_scope.GetName] se ofereceu para se livrar desse irritante [rival_scope.Custom2('InsultNoun', ROOT.Char)] , mas suspeito que tenha alguma segunda intenção."
 host_dinner_events.3004.a: "Sim, sim, qualquer coisa!"
 host_dinner_events.3004.a.caught: "Eu já suportei coisas piores."
 host_dinner_events.3004.a.not_caught: "[visiting_liege.GetFirstName] recusa o anzol"
 host_dinner_events.3004.b: "$host_dinner_events.1030.title$"
 host_dinner_events.3004.friendly_convo: "\n\nO que piora tudo é que [stop_host_scope.GetName] aparece exultante com a minha miséria, e até começou a rir e brincar com um inimigo jurado da coroa!"
 host_dinner_events.3004.awkward_convo: "[stop_host_scope.GetFirstNameNoTooltip] está jogando um jogo perigoso."
 host_dinner_events.3005.title: "Devo virar a outra face."
 host_dinner_events.3005.desc: "Entro no salão de jantar e encontro [visiting_liege.GetName] conversando com [stop_host_heir.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre assuntos de Estado e obrigações.

Parece que [visiting_liege.GetName] está manipulando [stop_host_heir.GetHerHim] para que faça um juramento de lealdade à coroa em minha ausência! Tal juramento assombraria [stop_host_heir.GetHerHim] pelo resto de seus dias e selaria nosso futuro como subordinados de [visiting_liege.GetName]!"
 host_dinner_events.3005.a: "Tenho certeza de que a comida local está boa."
 host_dinner_events.3005.hook_for_hook: "$host_dinner_events.3010.title$"
 host_dinner_events.3005.b: "Eu realmente me superei com esta refeição! Meus cozinheiros produziram uma variedade deslumbrante de pratos de dar água na boca, e, no entanto, [visiting_liege.GetName] parece detestar até mesmo tocar em qualquer um deles.\n\n“Esta comida não é do meu gosto. Poderíeis me trazer [ROOT.Char.Custom('GetExpensiveDessert')]? Ah, como sinto falta do seu doce beijo na minha língua.”\n\nIsso é um pouco insultante, mas um gesto assim não será esquecido tão cedo…"
 host_dinner_events.3005.disallowed_hook: "Claro!"
 host_dinner_events.3006.title: "[stop_host_scope.GetName] concordou"
 host_dinner_events.3006.desc.intro: "Isso é um insulto!"
 host_dinner_events.3006.desc.mid.concubine: "[stop_host_scope.GetName] ficou insultado"
 host_dinner_events.3006.desc.mid.neutral: "O Concurso"
 host_dinner_events.3006.desc.outro: "Foi uma longa e maravilhosa noite de festa e alegria, e muitas taças de [stop_host_scope.Custom('RegionalAlcoholicDrink')] foram compartilhadas entre mim e meu [Select_CString( stop_host_scope.IsFemale, 'buena anfitriona', 'buen anfitrión' )] [stop_host_scope.GetName].\n\nNo entanto, parece que [stop_host_scope.GetTitledFirstNameNoTooltip|l] tem tentado beber mais do que eu, sempre enchendo sua taça um pouco mais que a minha. Seria algum tipo de desafio implícito? Talvez eu devesse aumentar as apostas."
 host_dinner_events.3006.a: "Você subestima a minha habilidade!"
 host_dinner_events.3006.b: "Não tente isso."
 host_dinner_events.3006.c: "$host_dinner_events.3020.title$"
 host_dinner_events.3006.d: "Foi uma noite longa e maravilhosa de festa e alegria, e mais de uma taça de [stop_host_scope.Custom('RegionalAlcoholicDrink')] foi compartilhada entre minha [Select_CString( stop_host_scope.IsFemale, 'buena anfitriona', 'buen anfitrión' )] [stop_host_scope.GetName], e eu.\n\nNo entanto, parece que eu tenho bebido um pouco demais, o que [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstNameNoTooltip|l] parece ter interpretado como um desafio!\n\n“Então, vocês acham que conseguem beber mais que um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip|U]? Por que não testamos isso e bebem comigo? Quem vencer... bem, depois pensamos em uma recompensa adequada, hein?”"
 host_dinner_events.3007.title: "Vamos fazer isso!"
 host_dinner_events.3007.desc.intro: "Eu deveria parar, de verdade."
 host_dinner_events.3007.desc.mid.concubine: "[stop_host_scope.GetName] rejeitou o desafio"
 host_dinner_events.3007.desc.mid.neutral: "Um protegido"
 host_dinner_events.3007.desc.outro: "Esta noite, sentei-me ao lado de [promising_child.Custom2('NamePossessiveCharacterIntroduction', stop_host_scope)], e [Select_CString( promising_child.IsFemale, 'a menina', 'o menino' )] foi um verdadeiro encanto. Quanto mais falo com [promising_child.GetHerHim], mais vejo o potencial de moldar [promising_child.GetHerHim] à minha imagem.

Sinto o impulso de levar [promising_child.GetHerHim] para casa como meu pupilo[promising_child.Custom('ES_OA')], mas não poderia fazer algo assim sem o consentimento de seu [stop_host_scope.GetMotherFather], e [stop_host_scope.GetSheHe] poderia me pedir algo em troca."
 host_dinner_events.3007.a: "Preciso perguntar."
 host_dinner_events.3007.refused_to_let_them_go: "Não tenho tempo."
 host_dinner_events.3007.b: "[promising_child.GetFirstNameNoTooltip]: [Select_CString( promising_child.IsFemale, 'la pupila', 'el pupilo' )] [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitleAsNameNoTooltip]"
 host_dinner_events.3008.title: "Parece que [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] tomou gosto por [promising_child.Custom2('MyCharacterIntroduction', ROOT.Char)]. Passaram a noite inteira conversando com naturalidade, como se fossem [visiting_liege.GetMotherFather] e [promising_child.Custom('GetDaughterSon')]!\n\n[visiting_liege.GetNameNoTooltip] se aproxima de mim com um grande sorriso no rosto. \"Esse[promising_child.Custom('ES_EA')] [promising_child.Custom('GirlBoy')] é uma verdadeira delícia! Nada me agradaria mais do que levá-[promising_child.GetHerHim] para casa e criá-[promising_child.GetHerHim] na capital. Um[promising_child.Custom('ES_XA')] jovem tão promissor[promising_child.Custom('ES_XA')] não deveria passar a vida inteira em [ROOT.Char.GetCurrentLocation.GetName], não é mesmo?\"."
 host_dinner_events.3008.desc: "É de manhã, e saio relutantemente para o mundo desperto quando o sol matinal de repente atravessa minha visão. Vejo [Select_CString( nervous_servant.IsFemale, 'uma criada', 'um criado' )] arrastar os pés desajeitadamente pelo meu quarto, vacilante enquanto põe meu café da manhã ao meu lado. Pergunto o que aflige [nervous_servant.GetHerHim], e, com tão pouca provocação, [nervous_servant.GetSheHe] começa a vomitar palavras.

"[stop_host_scope.GetFirstName] proíbe [promising_child.GetFirstName] de partir"
 host_dinner_events.3008.a: "Quem Comeu Todos os Doces?"
 host_dinner_events.3008.secret_discovered: "Nesta noite, a comida foi empilhada mais uma vez, como já passei a esperar. No entanto, os pequenos pastéis dos quais eu havia me afeiçoado parecem estar ausentes. Viro-me para [stop_host_scope.GetNameNoTooltip] com expressão de perplexidade.\n\n\"Sei que esperava mais pastéis, meu [visiting_liege.GetTitleAsNameNoTooltip|l], mas o cozinheiro me assegura que o último deles desapareceu justamente antes de ser servido. Tentamos capturar o ladrão, mas o vilão glutão é indescobrível demais.\""
 host_dinner_events.3008.b: "Não é astuto demais para mim!"
 host_dinner_events.3008.acting_sussy: "Você não conseguiu encontrá-lo"
 host_dinner_events.3008.c: "Triste."
 host_dinner_events.1009.title: "Não estou zangad[GetPlayer.Custom('ES_OA')] , só decepcionad[GetPlayer.Custom('ES_OA')]"
 host_dinner_events.1009.desc: "Torta [pie_eater_scope.GetCulture.GetNameNoTooltip]"
 host_dinner_events.1009.a: "[pie_eater_scope.GetFirstNameNoTooltip] Comeu Todos os Pastéis!"
 host_dinner_events.1009.b: "Sigo o rastro de migalhas e manchas de gordura e molho até o fim do corredor, onde finalmente encontro [pie_eater_scope.Custom('ES_AlAla')] culpado, mas acho que nada poderia ter me preparado para o que eu estava prestes a ver.

Encontro [pie_eater_scope.GetName] completamente nu[pie_eater_scope.Custom('ES_OA')] de costas para mim e, quando entro, [pie_eater_scope.GetSheHe] se vira para me ver, revelando a bandeja inteira de tortas empilhada à altura da cintura, com uma única torta ainda cobrindo sua modéstia.

"Oh! Eu, hum... nem tudo é o que parece, meu [visiting_liege.GetTitleAsNameNoTooltip|U]! Por favor, não conteis isso a ninguém!"."
 host_dinner_events.1010.title: "Sigo o rastro de migalhas e respingos de molho e gordura até o fim do corredor, até que enfim encontro [pie_eater_scope.Custom('ES_AlAla')] culpado!

Entro em um quarto e encontro [pie_eater_scope.GetName] sentad[pie_eater_scope.Custom('ES_OA')] sozinha com uma pilha inteira de pastéis ao seu lado.

"Oh! Meu [visiting_liege.GetTitleAsNameNoTooltip|U], eu ia levar os pastéis até vós, é claro, mas... eles sempre acabam antes de chegar minha vez de comer, então pensei em pegar um ou dois escondido primeiro. Por favor, não conteis isso a ninguém!"."
 host_dinner_events.1010.desc: "Eu vou deixá-lo sair em troca de um favor."
 host_dinner_events.1010.a: "Um segredo entre você e eu."
 host_dinner_events.1010.b: "Não contarei a ninguém."
 host_dinner_events.1011.title: "Haha! Vocês foram desmascarados, seu [pie_eater_scope.Custom2('InsultNoun', ROOT.Char)] [pie_eater_scope.Custom2('InsultAdjective', ROOT.Char)]."
 host_dinner_events.1011.desc.intro: "Posso experimentar?"
 host_dinner_events.1011.desc.vegetarian: "Vamos compartilhar!"
 host_dinner_events.1011.desc: "Sem apetite"
 host_dinner_events.1011.a: "A refeição desta noite estava de dar água na boca, mas, enquanto os cozinheiros continuam empilhando comida, notei que [non_eater_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] mal tocou no pouco que pôs no prato.\n\nEmbora a falta de apetite não fosse problema em qualquer outra ocasião, [stop_host_scope.GetName] parece estar se ofendendo com o fato de um[non_eater_scope.Custom('ES_XA')] membro da minha comitiva estar mexendo e beliscando o prato dela."
 host_dinner_events.1011.b: ""Coma alguma coisa, pelo amor de [ROOT.Char.GetFaith.HighGodNamePossessive]!""
 host_dinner_events.1011.c: "[non_eater_scope.GetHerHim|U] convenceu a comer"
 host_dinner_events.1020.title: "[non_eater_scope.GetHerHim|U] irritaste"
 host_dinner_events.1020.desc: "Vou arranjar desculpas para [non_eater_scope.GetSheHe]."
 host_dinner_events.1020.a: "Uma Delícia Saborosa"
 host_dinner_events.1020.b: "A refeição desta noite foi, de fato, uma delícia. Fartei-me de todo tipo de comida salgada e doce, mas nada conquistou tanto meu apetite quanto estes excelentes [stop_host_scope.Custom('GetExpensiveDessert')]!

Não importa quantos eu coma, nem o quanto saboreie seu gosto, simplesmente não basta para tirá-los da minha mente. Perco-me neles a cada mordida, o sabor explodindo em minha boca e me levando um passo mais perto de experimentar [ROOT.Char.GetFaith.PositiveAfterLife].

Embora meu estômago esteja apertado e minhas roupas estejam repuxando, sinto-me obrigad[ROOT.Char.Custom('ES_OA')] a pegar mais."
 host_dinner_events.1020.c: "Elas são boas demais para resistir!"
 host_dinner_events.1020.d: "Você está satisfeito"
 host_dinner_events.1021.title: "Você comeu demais"
 host_dinner_events.1021.desc.intro: "Não, preciso parar."
 host_dinner_events.1021.desc.mid.castle: "O Coração Traidor"
 host_dinner_events.1021.desc.mid.religious: "Termino a última parte do meu jantar e, de fato, comi até me fartar. Deito-me satisfeit[ROOT.Char.Custom('ES_OA')], embora um pouco desconfortável.

Enquanto estou ali deitad[ROOT.Char.Custom('ES_OA')], porém, sinto a doçura chegar ao meu coração e #EMP tum!#! bater um pouco mais forte. A intensidade aumenta a cada batida, mais forte e mais rápida. Sinto que meu coração está prestes a explodir no peito. Um suor frio percorre todo o meu corpo, e minha garganta fica seca enquanto minha respiração se torna curta e rápida como a de um [ROOT.Char.Custom('GetAnimalType')] encurralado!

Então, tão subitamente quanto começou, tudo para."
 host_dinner_events.1021.desc.mid.lewd: "Deve ter sido veneno!"
 host_dinner_events.1021.desc.mid.lewd_woman: "História para [potential_friend_scope.GetFirstNameNoTooltip]"
 host_dinner_events.1021.desc.outro: "Outra noite de alegria chega ao fim, e me vi pres[ROOT.Char.Custom('ES_OA')] em uma conversa justamente com [potential_friend_scope.GetName].

Quando percebo, a sala ficou em silêncio, exceto pela nossa conversa, e todos estáo à espera da minha próxima palavra. Embora eu me sinta um pouco constrangid[ROOT.Char.Custom('ES_OA')], tenho certeza de que posso contar uma história que agrade a todos aqui!"
 host_dinner_events.1021.a: "Algo trágico."
 host_dinner_events.1021.b: "Sua história foi entediante"
 host_dinner_events.1022.title: "Algo leve!"
 host_dinner_events.1022.desc.intro: "Todos os personagens no jantar"
 host_dinner_events.1022.desc.mid.castle: "Sua história foi impressionante"
 host_dinner_events.1022.desc.mid.religious: "Um Engasgo!"
 host_dinner_events.1022.desc.mid.lewd: "Todos estão se divertindo no jantar, e conto mais uma das minhas piadas lendárias para grande riso e aplausos... e tosse.\n\nOlho ao redor e vejo a [choking_character_scope.GetName] agarrando a garganta, tossindo com força e ficando com o rosto cada vez mais vermelho. Parece que minha piada pode ter sido boa demais para [choking_character_scope.GetSheHe]!\n\nEu poderia pular para o resgate, claro, mas isso é mesmo problema meu?"
 host_dinner_events.1022.desc.outro: "

Só posso me sentir insultad[ROOT.Char.Custom('ES_OA')] ao contemplar isto, mas, pelos olhos de cachorrinho de [stop_host_scope.GetFirstNameNoTooltip], vejo que se tratou de uma tentativa sincera de bajulação."
 host_dinner_events.1022.a: "Uma Vida Salva"
 host_dinner_events.1020.likes_it: "Levanto-me e dou fortes pancadas nas costas de [choking_character_scope.GetName] repetidamente, e quando o rosto dele começa a ficar azul, um grotesco bolo do que um dia foi comida gourmet aterrissa com um respingo em um molho de ervas caro.\n\n“Ah, obrigado! Hoje você salvou uma vida, meu [visiting_liege.GetTitleAsNameNoTooltip|U]! Estarei para sempre em dívida com você.”"
 host_dinner_events.1022.b: "\"Você não me deve nada além de sua companhia.\""
 host_dinner_events.1020.hates_it: ""Sim, me deveis a vida"."
 host_dinner_events.1030.title: "Jogos Entediantes"
 host_dinner_events.1030.desc: "Outro jantar foi preparado para meu [visiting_liege.GetLadyLord] durante sua estadia, e parece ter sido um verdadeiro acerto! [visiting_liege.GetName] parece salivar só de olhar, e, bem quando [visiting_liege.GetSheHe] está prestes a dar a primeira mordida, [rival_scope.Custom2('NamePossessiveCharacterIntroduction', visiting_liege)] irrompe no salão de jantar e se pavoneia até o prato de seu inimigo.

"Melhor não."

O humor de [visiting_liege.GetNameNoTooltip] azeda imediatamente e, se eu não fizer nada, meu jantar logo pode virar uma briga de socos."
 host_dinner_events.1030.a: "É a minha jogada, [stop_host_scope.GetFirstNameNoTooltip]."
 host_dinner_events.1030.b: "Não vou estragar minha noite com isso."
 host_dinner_events.1030.c: "O Favor"
 host_dinner_events.1031.title: "Quando o rei cai, proclama-se o vencedor.\n\nConquistei o favor de [bg_loser.GetName] e meu prêmio indeterminado já está pronto para ser escolhido a qualquer momento."
 host_dinner_events.1031.desc.intro: "Quando o rei cai, o vencedor é proclamado.

Fui completamente derrotad[ROOT.Char.Custom('ES_OA')] por [bg_victor.GetName], e o prêmio indefinido de [bg_victor.GetSheHe] já está pronto para ser escolhido a qualquer momento."
 host_dinner_events.1031.desc: "Excelente."
 host_dinner_events.1031.a: "Droga!"
 host_dinner_events.1031.b: "Suprimentos Vazios"
 host_dinner_events.1030.liege_refuses: "Meus cozinheiros me informaram que os mantimentos parecem estar bastante baixos e que muitos dos ingredientes mais caros e exóticos já se esgotaram há muito tempo.\n\nSeria preciso uma pequena fortuna para reabastecer os mantimentos, e meu coração se agita nervosamente só de pensar em comprar apenas pão e manteiga. Talvez [visiting_liege.GetName] se sinta decepcionad[visiting_liege.Custom('ES_OA')] com nossa exibição tão modesta nesta noite, mas posso mesmo me permitir fazer outra coisa?"
 host_dinner_events.1032.title: "Pão e água serão suficientes."
 host_dinner_events.1032.desc: "Podemos comprar algo melhor."
 host_dinner_events.1032.a: "Tenho contatos que posso usar!"
 host_dinner_events.1032.b: "O Crânio"
 host_dinner_events.3010.title: "Eu me diverti aqui, mas não posso permitir que isso me distraia da minha missão de me tornar um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|U] temid[ROOT.Char.Custom('ES_OA')] e respeitad[ROOT.Char.Custom('ES_OA')]!

As masmorras de [stop_host_scope.GetNamePossessive] estão repletas de vilões e traidores, que apenas sugam o tesouro da coroa com sua necessidade incessante de comida e água. Talvez eu pudesse fazer um favor ao meu gracioso anfitri[stop_host_scope.Custom('ES_OnOna')] e, ao mesmo tempo, infundir medo em seu coração executando um prisioneiro e bebendo [stop_host_scope.Custom('RegionalAlcoholicDrink')] de seu crânio esvaziado."
 host_dinner_events.3010.desc: "Uma excelente ideia."
 host_dinner_events.3010.a: "[visiting_liege.GetName] esvaziou o crânio de [skoblet_target.GetFirstName] em uma taça"
 host_dinner_events.3010.b: "Isso é grotesco."
 host_dinner_events.3011.title: "Extravagância Suspeita"
 host_dinner_events.3011.desc: "Tenho desfrutado da minha estadia aqui, mas não consigo deixar de notar que tenho me fartado de banquetes extravagantes todos os dias que estive neste lugar. Talvez [stop_host_scope.GetName] seja significativamente mais ric[stop_host_scope.Custom('ES_OA')] do que eu havia imaginado inicialmente.\n\nSe minhas reflexões estiverem certas, isso significa que [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitleAsNameNoTooltip] me deve muito mais ouro do que tem me pago até agora, e eu poderia exigir uma cobrança."
 host_dinner_events.3011.a: "Pagamentos atrasados devem ser feitos."
 host_dinner_events.3011.gave_local_food: "[stop_host_scope.GetSheHe|U] deve pagar mais no futuro."
 host_dinner_events.3011.b: "Vou deixar passar."
 host_dinner_events.3011.refused_local_food: "Extravagância Tributável"
 host_dinner_events.3020.title: "Tenho sido [Select_CString( ROOT.Char.IsFemale, 'uma anfitriã', 'um anfitrião' )] excelente para meu [visiting_liege.GetLadyLord], dando-lhe tudo o que podia desejar e servindo apenas a melhor comida de minhas despensas.

No entanto, parece que isso foi um erro, pois agora [visiting_liege.GetSheHe] acredita que minha excelência como [Select_CString( ROOT.Char.IsFemale, 'anfitriã', 'anfitrião' )] se deve à evasão fiscal!"
 host_dinner_events.3020.desc: "$host_dinner_events.3101.desc.intro$\n\n[visiting_liege.GetSheHe|U] exige que eu pague de uma vez a quantia de "o que devo"."
 host_dinner_events.3020.a: "Está bem."
 host_dinner_events.3020.b: "Isso é um absurdo!"
 host_dinner_events.3021.title: "$host_dinner_events.3101.title$"
 host_dinner_events.3021.desc: "$host_dinner_events.3101.desc.intro$\n\nAgora [visiting_liege.GetName] me exige que eu aumente meus impostos a partir de agora!"
 host_dinner_events.3021.a: "Eu aceitarei."
 host_dinner_events.3021.b: "Vá para [ROOT.Char.GetFaith.NegativeAfterLife]!"
 host_dinner_events.3020.refused_to_drink: "Um Viajante Talentoso"
 host_dinner_events.3030.title: "Parece que não sou [Select_CString( GetPlayer.IsFemale, 'a única convidada', 'o único convidado' )] de honra na corte de [stop_host_scope.GetName]! Nesta noite, me sentei ao lado de [talented_pool_character.Custom('ES_AlAla')] fascinante [talented_pool_character.GetName] e nossa conversa me deixou em um estado de euforia.\n\n"
 host_dinner_events.3030.desc: "Esta noite, sentei-me ao lado de [promising_child.Custom2('NamePossessiveCharacterIntroduction', stop_host_scope)], e [Select_CString( promising_child.IsFemale, 'a menina', 'o menino' )] foi um verdadeiro encanto. Quanto mais falo com [promising_child.GetHerHim], mais vejo o potencial de moldar [promising_child.GetHerHim] à minha imagem.

Sinto o impulso de levar [promising_child.GetHerHim] para casa como meu pupilo[promising_child.Custom('ES_OA')], mas não poderia fazer algo assim sem o consentimento de seu [stop_host_scope.GetMotherFather], e [stop_host_scope.GetSheHe] poderia me pedir algo em troca."
 host_dinner_events.3030.a: ""Entendo bem a arte de governar, mas minhas habilidades estão sendo desperdiçadas enquanto vagueio de um lugar para outro. Se me aceitardes em vossa corte, seria uma honra chamar-vos de meu [visiting_liege.GetTitleAsNameNoTooltip|U].""
 host_dinner_events.3030.b: "\n\nNão é comum encontrar uma pessoa tão fascinante sem um lar próprio, mas há lugar em minha corte para [talented_pool_character.GetSheHe]?"
 host_dinner_events.3031.title: "Claro que há!"
 host_dinner_events.3031.desc: "Vá embora."
 host_dinner_events.3031.a: "Se seu vassalo aceitar"
 host_dinner_events.3031.b: "Se seu vassalo não aceitar"
 host_dinner_events.3030.refused_to_allow_ward: "[stop_host_scope.GetFirstName] aceita"
 host_dinner_events.3040.title: "[stop_host_scope.GetFirstName] recusa"
 host_dinner_events.3040.desc: "[visiting_liege.GetName] apreciou o haxixe"
 host_dinner_events.3040.a: "[visiting_liege.GetFirstName] não gostou do haxixe"
 host_dinner_events.3040.didnt_solve_mystery: "Você venceu a disputa de bebida"
 host_dinner_events.3040.b: "Você perdeu o duelo de bebidas"
 host_dinner_events.3040.disappointed_in_vassal: "[visiting_liege.GetFirstName] apreciou a apresentação"
 host_dinner_events.3041.title.deviant: "[visiting_liege.GetFirstName] não gostou da apresentação"
 host_dinner_events.3041.title: "Bom Apetite"
 host_dinner_events.3041.desc.deviant: "Sigo o rastro de migalhas e manchas de gordura e molho até o fim do corredor, onde finalmente encontro [pie_eater_scope.Custom('ES_AlAla')] culpado, mas acho que nada poderia ter me preparado para o que eu estava prestes a ver.

Encontro [pie_eater_scope.GetName] completamente nu[pie_eater_scope.Custom('ES_OA')] de costas para mim e, quando entro, [pie_eater_scope.GetSheHe] se vira para me ver, revelando a bandeja inteira de tortas empilhada à altura da cintura, com uma única torta ainda cobrindo sua modéstia.

"Um coração digno de um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip]!"
 host_dinner_events.3041.desc: "Sigo o rastro de migalhas e respingos de molho e gordura até o fim do corredor, até que enfim encontro [pie_eater_scope.Custom('ES_AlAla')] culpado!

Entro em um quarto e encontro [pie_eater_scope.GetName] sentad[pie_eater_scope.Custom('ES_OA')] sozinha com uma pilha inteira de pastéis ao seu lado.

"Parece absolutamente requintado, cozido à perfeição e tão macio que nem preciso pegar minha faca."
 host_dinner_events.3041.a: "Não tenho escolha senão fingir choque e desconforto diante daquilo. Será que [stop_host_scope.GetName] de alguma forma sabe do meu segredo?"
 host_dinner_events.3041.b: "Quase vomito ao ver essa coisa! [stop_host_scope.GetName] certamente não quis insinuar que isto é #EMP carne humana#!!"
 host_dinner_events.3041.c: "Meu anfitri[stop_host_scope.Custom('ES_OnOna')] me olha com expectativa e empurra suavemente o prato para mais perto de mim."
 host_dinner_events.3041.d: "Delicioso!"
 host_dinner_events.3041.e: "Não, tudo bem."
 host_dinner_events.3041.f: "[visiting_liege.GetFirstName] comeu o coração"
 host_dinner_events.3050.title: "[visiting_liege.GetName] se recusou"
 host_dinner_events.3050.desc: "Potencial desperdiçado"
 host_dinner_events.3050.a: "Não pensei muito nisso quando providenciei para que [runaway_courtier.GetName] estivesse ao meu lado nesta noite, mas à medida que os pratos vão e vêm, encontro-me cada vez mais intrigad[GetPlayer.Custom('ES_OA')] por [Select_CString( runaway_courtier.IsFemale, 'esta hermosa', 'este hermoso')] [runaway_courtier.GetWomanMan].\n\n“Ah, se ao menos a vida fosse tão interessante na capital. Na maioria dos dias, fico deitado no palácio, ficando cada vez mais cansad[runaway_courtier.Custom('ES_OA')] e perezos[runaway_courtier.Custom('ES_OA')]. Aqui, não me faltam boas conversas. Você me aceitaria como cortesã[runaway_courtier.Custom('ES_OA')]?”."
 host_dinner_events.3050.convinced_to_eat: ""É claro, juntem-se a mim!""
 host_dinner_events.3050.annoyed_courtier: "\"Não.\""
 host_dinner_events.3050.b: "Troca Cortesã"
 host_dinner_events.3060.title: "[runaway_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproximou de mim dizendo que recebeu permissão de [stop_host_scope.GetName] para se juntar à corte de [stop_host_scope.GetHerHis] em vez da minha.

Permitir isso certamente melhoraria minha posição com [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitleAsNameNoTooltip|U], mas roubar membros da minha corte é uma afronta que eu realmente posso ignorar?"
 host_dinner_events.3060.desc: "A refeição desta noite foi, de fato, uma delícia. Fartei-me de todo tipo de comida salgada e doce, mas nada conquistou tanto meu apetite quanto estes excelentes [stop_host_scope.Custom('GetExpensiveDessert')]!

Não importa quantos eu coma, nem o quanto saboreie seu gosto, simplesmente não basta para tirá-los da minha mente. Perco-me neles a cada mordida, o sabor explodindo em minha boca e me levando um passo mais perto de experimentar [ROOT.Char.GetFaith.PositiveAfterLife].

Embora meu estômago esteja apertado e minhas roupas estejam repuxando, sinto-me obrigad[ROOT.Char.Custom('ES_OA')] a pegar mais."
 host_dinner_events.3060.a: "Não merece menos."
 host_dinner_events.3060.satisfying_dessert: "Estou acima disso."
 host_dinner_events.3060.too_much_dessert: "[ROOT.Char.GetFirstNameNoTooltip]: [Select_CString( ROOT.Char.IsFemale, 'la villana', 'el villano')] de [stop_host_scope.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 host_dinner_events.3060.b: "Como de costume, minha refeição vem acompanhada de entretenimento. Os atores realizam grandes feitos de acrobacia e habilidade, mas então começo a notar algo. Durante toda a apresentação, houve um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] vestid[ROOT.Char.Custom('ES_OA')] exatamente como eu, com o rosto besuntado do que parece ser excremento, cantando canções sobre minha suposta maldade!

Volto-me em choque para [stop_host_scope.GetName], apenas para ver que [stop_host_scope.GetSheHe] está gargalhando diante dessa exibição de vulgaridade! Sou incapaz de tocar na comida, observando e ouvindo enquanto toda a corte ri dessa zombaria retorcida do meu caráter."
 host_dinner_events.3061.title: "Eu terei minha vingança."
 host_dinner_events.3061.desc: "Termino a última parte do meu jantar e, de fato, comi até me fartar. Deito-me satisfeit[ROOT.Char.Custom('ES_OA')], embora um pouco desconfortável.

Enquanto estou ali deitad[ROOT.Char.Custom('ES_OA')], porém, sinto a doçura chegar ao meu coração e #EMP tum!#! bater um pouco mais forte. A intensidade aumenta a cada batida, mais forte e mais rápida. Sinto que meu coração está prestes a explodir no peito. Um suor frio percorre todo o meu corpo, e minha garganta fica seca enquanto minha respiração se torna curta e rápida como a de um [ROOT.Char.Custom('GetAnimalType')] encurralado!

Então, tão subitamente quanto começou, tudo para."
 host_dinner_events.3061.a: "Meu [artifact_gift.GetNameNoTooltip] poderia ser para [stop_host_scope.GetSheHe]."
 host_dinner_events.3070.title: "Ouro é sempre um ótimo presente."
 host_dinner_events.3070.desc: "Outra noite de alegria chega ao fim, e me vi pres[ROOT.Char.Custom('ES_OA')] em uma conversa justamente com [potential_friend_scope.GetName].

Quando percebo, a sala ficou em silêncio, exceto pela nossa conversa, e todos estáo à espera da minha próxima palavra. Embora eu me sinta um pouco constrangid[ROOT.Char.Custom('ES_OA')], tenho certeza de que posso contar uma história que agrade a todos aqui!"
 host_dinner_events.3070.a: "Entro no salão de jantar e encontro [visiting_liege.GetName] sentad[visiting_liege.Custom('ES_OA')] à cabeceira da mesa, com os pés erguidos de maneira altiva ao lado de sua refeição.\n\n"Meu bom vassal[ROOT.Char.Custom('ES_OA')]!"
 host_dinner_events.3070.boring_story: "Prometo-lhes que [courtier_gift.GetName] é [Select_CString( courtier_gift.IsFemale, 'uma cortesã boa', 'um cortesão bom' )] e leal que servirá bem a vocês no futuro."
 host_dinner_events.3070.b: "Meu tesouro está cheio de relíquias e artefatos valiosos. Talvez você queira levar meu [artifact_gift.GetName]."
 everyone_at_the_dinner: "Estou sobrecarregado com minha vasta fortuna e gostaria de compartilhar um pouco dessa riqueza com meus súditos mais leais."
 host_dinner_events.3070.story_was_impressive: "Somos amigos há algum tempo e talvez seja hora de levar isso para o próximo nível. Você gostaria de fazer um juramento de #EMP verdadeira#! amizade comigo?"
 host_dinner_events.3080.title: "Este é o meu presente para você, sem necessidade de reciprocidade"."
 host_dinner_events.3080.desc: ""Obrigado!""
 host_dinner_events.3080.a: "[stop_host_scope.GetFirstName] pegou o presente"
 host_dinner_events.3080.failed_to_save_them: "[stop_host_scope.GetFirstName] recusa o presente"
 host_dinner_events.3080.b: "Somos amigos, eternamente."
 host_dinner_events.3081.title: "Eu não vou aceitar."
 host_dinner_events.3081.desc: "Não é o que [stop_host_scope.GetSheHe|U] parece"
 host_dinner_events.3081.a: "Acordo com uma fome agonizante, incapaz de voltar ao meu descanso.

Vago na escuridão até a cozinha e descubro que o cômodo está levemente iluminado por algo além da minha lâmpada. As prateleiras da despensa brilham com um fulgor dourado, sobrenatural e convidativo.

A curiosidade me domina; incapaz de encontrar a fonte do brilho. Com a chama da minha luz apagada, começo a examinar os cantos da despensa."
 host_dinner_events.3081.b: "Eu #EMP preciso#! chegar ao fundo disso!"
 host_dinner_events.1040.title: "Não posso ficar bisbilhotando por aí."
 host_dinner_events.1040.desc: "O Cômodo Atrás da Despensa"
 host_dinner_events.1040.a: "Com um pouco de esforço, encontro arranhões no chão onde fica o armário e algumas seções da prateleira muito menos empoeiradas que o resto. Ao tocá-las, as prateleiras se revelam como interruptores mecânicos e, com um pouco de esforço, consigo afastar a despensa da parede para revelar uma sala secreta!

Em meio à pedra úmida há uma robusta porta de madeira com um cadeado minuciosamente decorado na maçaneta. Ao inspecioná-lo, os dígitos da fechadura não são números nem letras, mas diagramas de toda sorte de bestas e grotescos."
 host_dinner_events.1040.b: "Um quebra-cabeça, isso deveria ser trivial."
 host_dinner_events.1041.title: "Você não consegue abrir a porta"
 host_dinner_events.1041.desc: "Ao terminar minha refeição, outro tabuleiro é colocado diante de mim, mas desta vez, em vez de comida, há pequenas peças de jogo sobre ele.

"A Biblioteca Oculta"

[stop_host_scope.GetName] sorri para mim, brincando distraidamente com uma peça entre os dedos, ansios[stop_host_scope.Custom('ES_OA')] por uma partida."
 host_dinner_events.1041.a: "Mais uma peça do mistério."
 host_dinner_events.1041.b: "Um par de diários, um trancado com um quebra-cabeça ininteligível, e o outro preenchido com o código para uma espécie de linguagem codificada. Os dois parecem pertencer um ao outro."
 host_dinner_events.1042.title: "Um estranho diário encadernado em couro, trancado com um quebra-cabeça ininteligível. Junto com ele há outro diário com a chave para decifrar o quebra-cabeça."
 host_dinner_events.1042.desc: "Por fim, eu os tenho todos."
 host_dinner_events.1042.desc.loser: "Quando o rei cai, o vencedor é proclamado.

Fui completamente derrotad[ROOT.Char.Custom('ES_OA')] por [bg_victor.GetName], e o prêmio indefinido de [bg_victor.GetSheHe] já está pronto para ser escolhido a qualquer momento."
 host_dinner_events.1042.a: "A porta cede e me revela... algo que eu gostaria de não ter visto.\n\nCada parede está adornada com objetos estranhos: chicotes, pelourinhos, falos de madeira, para citar alguns. O chão está úmido com o que #EMP espero#! espero# que seja apenas água, mas, dada a parafernália nesta sala, temo pensar que mistura de fluidos corporais possa ser."
 host_dinner_events.1042.a.bad: "Agora eu sei das coisas."
 host_dinner_events.1050.title: "A Açougue Oculto"
 host_dinner_events.1050.desc: "Quando a porta se abre um pouco, sou derrubad[ROOT.Char.Custom('ES_OA')] por um fétido cheiro acre, com meu traseiro encharcado em uma poça de sangue fresco.

A sala está cheia de cadáveres humanos meio retalhados e pendurados em ganchos de açougue. Pele humana jaz sobre uma mesa de corte ao lado do corpo ao qual um dia pertenceu, com um cutelo sujo ao lado. As expressões contorcidas de horror nos rostos das vítimas são uma presença permanente na sala."
 host_dinner_events.1050.a: "Nunca poderei apagar da minha memória o que vi."
 host_dinner_events.1050.b: "O Túnel de Fuga"
 host_dinner_events.1050.c: "A porta se abre para revelar um túnel escuro e viscoso, recoberto de líquenes e fungos. Dou meu jeito de avançar e sigo essa caverna até o fim, emergindo do lado de fora em uma estrada rural de aparência inocente.\n\nEstá claro que é o túnel de fuga de [stop_host_scope.GetName] em caso de emergência."
 host_dinner_events.3090.title: "Que descoberta!"
 host_dinner_events.3090.desc: "Eu me diverti aqui, mas não posso permitir que isso me distraia da minha missão de me tornar um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|U] temid[ROOT.Char.Custom('ES_OA')] e respeitad[ROOT.Char.Custom('ES_OA')]!

As masmorras de [stop_host_scope.GetNamePossessive] estão repletas de vilões e traidores, que apenas sugam o tesouro da coroa com sua necessidade incessante de comida e água. Talvez eu pudesse fazer um favor ao meu gracioso anfitri[stop_host_scope.Custom('ES_OnOna')] e, ao mesmo tempo, infundir medo em seu coração executando um prisioneiro e bebendo [stop_host_scope.Custom('RegionalAlcoholicDrink')] de seu crânio esvaziado."
 host_dinner_events.3090.a: "Ninguém jamais saberá."
 host_dinner_events.3090.skobletted_my_prisoner: "Uma Combinação Saborosa"
 host_dinner_events.3090.b: "A vida como [ROOT.Char.GetTitleAsNameNoTooltip] traz à minha mesa toda sorte de comidas magníficas e refinadas, mas, de um tempo para cá, cansei desses mesmos sabores e texturas. Desejo algo verdadeiramente escandaloso, verdadeiramente exótico!\n\nDe um lado, vejo um prato de [stop_host_scope.Custom('GetExpensiveDessert')], e do outro, legumes cozidos. E se eu pegasse esses dois sabores distintos e os provasse ao mesmo tempo?"
 host_dinner_events.3100.title: "Uma experiência que vale a pena."
 host_dinner_events.3100.desc: "O sabor foi magnífico."
 host_dinner_events.3100.a: "A experiência foi um fracasso."
 host_dinner_events.3100.b: "Eu não poderia ser tão audacioso."
 host_dinner_events.3100.c: "Veneno"
 host_dinner_events.3101.title: "Parece que uma oportunidade de ouro caiu em minhas mãos com a visita de [visiting_liege.GetName] aos meus salões.\n\n[visiting_liege.GetSheHe|U] espera uma refeição inesquecível e, com um pouco de beladona moída, vou garantir que [visiting_liege.GetNameNoTooltip] jamais volte a experimentar um jantar como este!\n\nA hora de atacar se aproxima, será que realmente posso correr esse risco?"
 host_dinner_events.3101.desc.intro: "Tenho sido [Select_CString( ROOT.Char.IsFemale, 'uma anfitriã', 'um anfitrião' )] excelente para meu [visiting_liege.GetLadyLord], dando-lhe tudo o que podia desejar e servindo apenas a melhor comida de minhas despensas.

No entanto, parece que isso foi um erro, pois agora [visiting_liege.GetSheHe] acredita que minha excelência como [Select_CString( ROOT.Char.IsFemale, 'anfitriã', 'anfitrião' )] se deve à evasão fiscal!"
 host_dinner_events.3101.desc: "Se você falhar"
 host_dinner_events.3101.a: "Veneno!"
 host_dinner_events.3101.b: "Como meu [stop_host_scope.Custom('GetExpensiveDessert')] sem nenhuma preocupação, satisfeit[ROOT.Char.Custom('ES_OA')] com mais uma refeição maravilhosa no estômago.

Quando subo para dormir, porém, começo a me sentir frac[ROOT.Char.Custom('ES_OA')], como se o sangue em meu corpo estivesse engrossando, quase coagulando nas veias. Antes mesmo de chegar ao topo da escada, desabo, arquejando por ar."
 host_dinner_events.3102.title: "Você envenenou seu [visiting_liege.GetTitleAsNameNoTooltip]"
 host_dinner_events.3102.desc: "Como... você pôde..."
 host_dinner_events.3102.a: "Tentativa de Assassinato"
 host_dinner_events.3102.b: "Viro-me para o meu [stop_host_scope.Custom('GetExpensiveDessert')] e começo a comer, mas uma sensação incômoda toma conta de mim e faz minhas mãos gananciosas pararem.\n\nVasculho a sobremesa e a cheiro com atenção, e não há dúvida em minha mente de que colocaram veneno na minha comida! Não há outra explicação, [stop_host_scope.GetName] está tentando me matar."
 host_dinner_events.3110.title: "O vilão!"
 host_dinner_events.3110.desc.intro: "Seu assassinato falhou"
 host_dinner_events.3110.desc.mid.claim: "$host_dinner_events.1092.title$"
 host_dinner_events.3110.desc.mid.martial: "Meu leal provador de comida[food_taster_scope.Custom('ES_XA')], [food_taster_scope.GetName], cumpre seu dever. Termina sua inspeção com uma degustação da minha [stop_host_scope.Custom('GetExpensiveDessert')] e me dá um pequeno aceno de aprovação.\n\nMas, em pouco tempo, [food_taster_scope.Custom('ES_ElLa')] pobre [food_taster_scope.GetWomanMan] começa a engasgar e tossir, lutando para respirar e batendo com o punho na mesa. Em segundos, seus lábios azuis exalam o último suspiro, e eu fico sozinho com o sorriso desconfortável de [stop_host_scope.GetName]."
 host_dinner_events.3110.desc.mid.learning: ""Assassino[stop_host_scope.Custom('ES_OA')]!""
 host_dinner_events.3110.desc.mid.statecraft: "Uma Questão de Honra"
 host_dinner_events.3110.desc.outro: "Passei a noite sentad[ROOT.Char.Custom('ES_OA')] ao lado d[Select_CString( joker_knight.IsFemale, 'a leal cavaleira', 'o leal cavaleiro' )] de [stop_host_scope.GetName], [joker_knight.GetName], e até agora [joker_knight.GetSheHe] tem sido puro deleite, sempre com uma piada para contar.

"Eu vos digo, de todos os [ROOT.Char.Custom2('InsultNoun', ROOT.Char)] que encontrei, [ROOT.Char.GetName] é [ROOT.Char.Custom('ES_ElLa')] mais [ROOT.Char.Custom2('InsultAdjective', ROOT.Char)]! Ha!"

"O que ousastes dizer sobre meu [ROOT.Char.GetLadyLord]?" [humorless_knight.GetName] se levanta de seu assento. "Eu vos desafio, pessoa vil!""
 host_dinner_events.3110.a: "Que divertido!"
 host_dinner_events.3110.b: "[humorless_knight.GetName] é vitorioso!"
 host_dinner_if_vassal_accepts_tt: "[humorless_knight.GetName] perde"
 tour_grounds_if_vassal_rejects_tt: "Recue, tolo."
 host_dinner_events.3100.vassal_accepts: "Preparando-se para o Jantar"
 host_dinner_events.3100.vassal_refuses: "Recebo uma recepção digna de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] às portas da [stop_host_scope.Custom('FortifiedBuilding')] [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l] em [ROOT.Char.GetCurrentLocation.GetName],"
 host_dinner_events.1009.enjoyed_weed: "e não há dúvida de que o esplendor de minha comitiva causou uma grande impressão.\n\n"
 host_dinner_events.1009.didnt_enjoy_weed: "meu carro de cofres e os cobradores de impostos deixam claro o objetivo da minha visita.\n\n"
 host_dinner_events.3020.won_drinking_duel: "e minha fria aceitação, ladead[ROOT.Char.Custom('ES_OA')] por guardas fortemente armados, define o tom desejado.\n\n"
 host_dinner_events.3020.lost_drinking_duel: "Aceitar a hospitalidade de semelhante [visiting_liege.Custom2('InsultNoun', ROOT.Char)] [stop_host_scope.Custom2('InsultAdjective', ROOT.Char)] é suficiente para me tirar o apetite; é bom que haja [ROOT.Char.Custom('FavoriteTreat')]…"
 host_dinner_events.1007.enjoyed_performance: "Que destino cruel, ter que manter tais formalidades com meu querid[stop_host_scope.Custom('ES_OA')] [stop_host_scope.Custom('RomanticComplimentNoun')]… Talvez [stop_host_scope.GetHerHim] o/a visite depois da janta…"
 host_dinner_events.1007.disliked_performance: "Fazia tempo demais que eu não me sentava para jantar com [Select_CString( stop_host_scope.IsFemale, 'uma boa amiga', 'um bom amigo' )]! é raro demais esquecermos os fardos do reino em um espírito como este!"
 host_dinner_events.1060.title: "É bom ver meu [ROOT.Char.Custom2('RelationToMeShort', stop_host_scope)]! Nos abraçamos formalmente, marcando publicamente os laços de família."
 host_dinner_events.1060.desc.intro: "Esta é uma oportunidade rara de me divertir na boa companhia de um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.Custom('GetDaughterSon')] da Casa [ROOT.Char.GetHouse.GetBaseName]."
 host_dinner_events.1060.desc.cannibal_legal: "É claro, também devo reconhecer sua preeminência entre os vassalos de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], pelo menos publicamente…"
 host_dinner_events.1060.desc.secret_cannibal: "Meu vassal[stop_host_scope.Custom('ES_OA')] me recebe diligentemente com toda a deferência necessária."
 host_dinner_events.1060.desc.outro: "\n\n[stop_host_scope.GetFirstNameNoTooltip] explica o banquete noturno planejado, prometendo que os entretenimentos e as provisões oferecidos estarão próximos aos padrões dos jantares da minha própria corte."
 host_dinner_events.1060.a: "Um coração digno de um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip]!"
 host_dinner_events.1060.b: "Eu mesmo comerei o coração."
 you_ate_a_human_heart: "\n\n[stop_host_scope.GetName] me assegura que esta não é senão a melhor comida que me pode oferecer."
 host_dinner_events.1061.title: "Vamos começar!"
 host_dinner_events.1061.desc.intro: "[host.Custom2('AppropriateGreeting', ROOT.Char)]"
 host_dinner_events.1061.desc.cannibal_legal: "Minha corte está em turnê e logo estarei visitando [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]"
 host_dinner_events.1061.desc.secret_cannibal: "para inspecionar sua [ROOT.Char.Custom('FortifiedBuilding')] e terras."
 host_dinner_events.1061.desc.mid: "para receber um banquete refinado em sua [ROOT.Char.Custom('FortifiedBuilding')]."
 host_dinner_events.1061.desc.outro: "para desfrutar de um festival local da cultura [ROOT.Char.GetCulture.GetNameNoTooltip]."
 host_dinner_events.1061.a: "para ver suas propriedades e ouvir notícias de suas ações."
 host_dinner_events.1061.b: "\n\nJá está na hora de que [host.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] contemple a pompa e a graça de seu [host.GetLadyLord] legítim[host.Custom('ES_OA')]."
 host_dinner_events.1061.liege_ate_heart: "\n\nÉ hora de lembrar [host.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] a quem eles servem e as penalidades por traição."
 host_dinner_events.1061.liege_refused_heart: "\n\nOs senhores e senhoras de [host.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] pagarão os dízimos devidos a mim."
 host_dinner_events.1070.title: "\n\nEspero uma recepção digna de um[stop_host_scope.Custom('ES_XA')] [host.GetTitleAsNameNoTooltip]."
 host_dinner_events.1070.desc: "Devo cuidar dos preparativos!"
 host_dinner_events.1070.a: "[steward.Custom2('AppropriateGreeting', ROOT.Char)]"
 host_dinner_events.1070.b: "[host.GetName] não virá mais visitar você em sua turnê real."
 host_dinner_events.1071.title: "Que pena."
 host_dinner_events.1071.desc: "[runaway_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproximou de mim dizendo que recebeu permissão de [stop_host_scope.GetName] para se juntar à corte de [stop_host_scope.GetHerHis] em vez da minha.

Permitir isso certamente melhoraria minha posição com [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitleAsNameNoTooltip|U], mas roubar membros da minha corte é uma afronta que eu realmente posso ignorar?"
 host_dinner_events.1071.a: "Você leva seu suserano a um bar local"
 host_dinner_events.1071.refused_to_let_them_go: "Você pode ganhar um favor"
 host_dinner_events.1071.b: "Um segredo pode ser descoberto sobre você"
 host_dinner_events.1080.title: "Seu anfitrião será informado"
 host_dinner_events.1080.desc: "Você avança em direção a um [hook|lE]"
 host_dinner_events.1080.a: "[subject.GetFirstName] avança em direção a um [hook|lE] com você"
 host_dinner_events.1080.b: "Seu vassalo ficará profundamente ofendido..."
 host_dinner_events.1081.title: "#EMP Seu anfitrião pode se sentir ofendido e tomar medidas#!"
 host_dinner_events.1081.desc: "Como de costume, minha refeição vem acompanhada de entretenimento. Os atores realizam grandes feitos de acrobacia e habilidade, mas então começo a notar algo. Durante toda a apresentação, houve um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] vestid[ROOT.Char.Custom('ES_OA')] exatamente como eu, com o rosto besuntado do que parece ser excremento, cantando canções sobre minha suposta maldade!

Volto-me em choque para [stop_host_scope.GetName], apenas para ver que [stop_host_scope.GetSheHe] está gargalhando diante dessa exibição de vulgaridade! Sou incapaz de tocar na comida, observando e ouvindo enquanto toda a corte ri dessa zombaria retorcida do meu caráter."
 host_dinner_events.1081.a: "Seu suserano pode ficar profundamente ofendido"
 host_dinner_events.1081.b: "Você falhou em conseguir um segredo"
 host_dinner_events.1081.liked_performance: "Você descobre quem comeu as tortas"
 host_dinner_events.3120.title: "Você salva a vida dela"
 host_dinner_events.3120.desc: "Seu suserano pode se sentir ofendido"
 host_dinner_events.3120.a: "Se você vencer"
 host_dinner_events.3120.b: "Se você perder"
 host_dinner_events.3120.c: "Sua Grande Turnê se torna #P mais majestosa#!"
 host_dinner_events.3120.d: "Sua Grande Turnê se torna #P mais avarenta#!"
 host_dinner_events.3120.e: "Sua Grande Turnê se torna #P mais intimidadora#!"
 host_dinner_events.3121.title: "Sua Grande Turnê se torna #N menos majestosa#!"
 host_dinner_events.3121.desc.intro: "Sua Grande Turnê se torna #N menos avarenta#!"
 host_dinner_events.3121.desc.courtier: "Sua Grande Turnê se torna #N menos intimidadora#!"
 host_dinner_events.3121.desc.artifact: "Você recebe um desconto de #P 50%#! para se converter à fé [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetName|l]"
 host_dinner_events.3121.desc.gold_gift: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'ajustaste', 'ajustó' )] a refeição de [TARGET_CHARACTER.GetShortUIName] para a dieta de"
 host_dinner_events.3121.desc.best_friend: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'ajustaste', 'ajustó' )] refeição de [CHARACTER.GetShortUIName] para a dieta de"
 host_dinner_events.3121.desc.outro: "[CHARACTER.GetShortUIName|U] teve tolerância com as manias de [TARGET_CHARACTER.LocalPlayerString( 'sua pessoa', TARGET_CHARACTER.GetShortUIName )]"
 host_dinner_events.3121.a: "[TARGET_CHARACTER.GetShortUIName|U] teve tolerância com as suscetibilidades de [CHARACTER.LocalPlayerString( 'você', CHARACTER.GetShortUIName )]"
 host_dinner_3120_gift_taken: "[CHARACTER.GetShortUIName|U] retirou o rival de [TARGET_CHARACTER.GetShortUIName] de um jantar"
 host_dinner_3120_gift_refused: "[TARGET_CHARACTER.GetShortUIName|U] retirou o rival de [CHARACTER.GetShortUIName] de um jantar"
 host_dinner_events.3121.b: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'preparaste', 'preparó' )] um bolo maravilhoso para [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'ti', TARGET_CHARACTER.GetShortUIName )]."
 host_dinner_events.3121.c: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'preparaste', 'preparó' )] um bolo maravilhoso para [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'ti', TARGET_CHARACTER.GetShortUIName )]."
 host_dinner_events.3130.title: "Os cortesãos de [CHARACTER.GetShortUIName] demonstraram bons modos em uma visita é corte de [TARGET_CHARACTER.GetShortUIName]"
 host_dinner_events.3130.desc: "Acordo com uma fome agonizante, incapaz de voltar ao meu descanso.

Vago na escuridão até a cozinha e descubro que o cômodo está levemente iluminado por algo além da minha lâmpada. As prateleiras da despensa brilham com um fulgor dourado, sobrenatural e convidativo.

A curiosidade me domina; incapaz de encontrar a fonte do brilho. Com a chama da minha luz apagada, começo a examinar os cantos da despensa."
 host_dinner_events.3130.a: "[CHARACTER.GetShortUIName|U] atentou contra a temperança de [TARGET_CHARACTER.GetShortUIName]"
 host_dinner_events.3130.b: "[TARGET_CHARACTER.GetShortUIName|U] atentou contra a temperança de [CHARACTER.GetShortUIName]"
 host_dinner_events.3131.title: "[CHARACTER.GetShortUIName|U] festejou com o rival de [TARGET_CHARACTER.GetShortUIName]"
 host_dinner_events.3131.desc: "Com um pouco de esforço, encontro arranhões no chão onde fica o armário e algumas seções da prateleira muito menos empoeiradas que o resto. Ao tocá-las, as prateleiras se revelam como interruptores mecânicos e, com um pouco de esforço, consigo afastar a despensa da parede para revelar uma sala secreta!

Em meio à pedra úmida há uma robusta porta de madeira com um cadeado minuciosamente decorado na maçaneta. Ao inspecioná-lo, os dígitos da fechadura não são números nem letras, mas diagramas de toda sorte de bestas e grotescos."
 host_dinner_events.3131.a: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te negaste', 'se negó' )] recusou-se a permitir que [TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'tomases', 'tomase' )] levasse seu filho como pupilo"
 host_dinner_events.3131.fail_to_get_it_open: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'te negaste', 'se negó' )] recusou-se a permitir que [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'tomases', 'tomase' )] levasse seu filho como pupilo"
 host_dinner_events.3131.b: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'salvaste', 'salvó' )] a vida de [TARGET_CHARACTER.GetShortUIName]"
 host_dinner_events.3131.c: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'salvaste', 'salvó' )] a vida de [TARGET_CHARACTER.GetShortUIName]"
 host_dinner_events.3132.title: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'irritasteis', 'irritaron' )] irritaram juntos um rival"
 host_dinner_events.3132.desc: "No vazio onde antes havia a porta, vejo um gabinete elaborado com toda sorte de substâncias desconhecidas borbulhando em fervuras suaves e pequenos animais presos em gaiolas. No centro da sala há um único livro elevado sobre um pedestal, cuja capa reluz com desenhos de bestas e grotescos idênticos aos da fechadura de quebra-cabeça da sala.

Tomo o livro em minhas mãos e sinto a curiosidade me dominar enquanto passo o dedo por sua superfície coriácea. Então vejo, escondido entre os símbolos profanos de sua capa, um único caractere inteligível: o número um. Tento abrir o livro, mas descubro que ele está firmemente trancado com um pequeno quebra-cabeça triangular."
