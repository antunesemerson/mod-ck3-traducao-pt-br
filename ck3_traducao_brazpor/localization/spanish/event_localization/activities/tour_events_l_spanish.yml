 gave_away_artifact_log: "Este diário criptografado está repleto de informações sobre o estudo dos grotescos e onde eles podem ser encontrados."
 arrested_performers_log_title: "Diário de Teologia Avançada"
 arrested_performers_log: "Este diário criptografado contém revelações inovadoras sobre a teologia [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]."
 arrested_faction_leader_log_title: "A História Secreta do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 arrested_faction_leader_log: "Este diário criptografado contém informações detalhadas sobre a história do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] e seus governantes."
 adopted_a_puppy_log_title: "Diário das Artes Marciais"
 adopted_a_puppy_log: "Este diário criptografado oferece instruções sobre todos os tipos de artes marciais; desde lâmina até combate corpo a corpo e montado."
 enjoyed_good_play_log_title: "Excessivamente Entusiasmado"
 enjoyed_good_play_log: "Hoje tenho aproveitado as festividades em [ROOT.Char.GetCurrentLocation.GetName] mas não tanto quanto [weeb_child.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n[weeb_child.GetSheHe|U] tem dançado e girado com os locais com uma alegria e um vigor que nunca tinha visto em [weeb_child.GetSheHe]. Totalmente imers[weeb_child.Custom('ES_OA')] nas estranhas tradições da cultura de [festival_culture_scope.GetName], [weeb_child.GetFirstNameNoTooltip] parece estar completamente em casa, e os locais também parecem adorar[weeb_child.GetHerHim]!"
 wine_fountain_log_title: "Que bonito."
 wine_fountain_log: ""Fique com eles, [weeb_child.GetFirstNameNoTooltip]!"."
 juice_fountain_log_title: "O Grande Clímax"
 juice_fountain_log: "O sol se põe em mais um dia em [ROOT.Char.GetCurrentLocation.GetName] e os moradores locais parecem estar preparando uma apresentação final. Um grande poste de madeira foi erguido, e mal posso esperar para ver o que acontece a seguir!\n\nMas então, arrastam um[human_sacrifice.Custom('ES_XA')] [human_sacrifice.GetWomanMan] frágil que esperneia e grita, e o amarram ao poste. Uma faca é levada à barriga, e fecha os olhos e se prepara para encarar o esquecimento."
 vassal_homage_log_title: ""Pare com esta loucura em nome de voss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]!"."
 vassal_homage_log: "Tradições de [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip]"
 got_sword_in_stone_log_title: "[visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)|U] parece completamente encantad[visiting_liege.Custom('ES_OA')] com as festividades de hoje. Dançarinos, artistas e comediantes buscam agradar ao meu senhor[visiting_liege.Custom('ES_XA')], e parece estar funcionando perfeitamente.

Com tão bom humor e cercad[visiting_liege.Custom('ES_OA')] por nossas tradições, talvez [visiting_liege.GetFirstName] comece a se interessar em mantê-las vivas. As tradições [ROOT.Char.GetFaith.GetAdherentName|U] certamente desaparecerão sem as devidas proteções legais contra a conversão."
 got_sword_in_stone_log: "\"Seria uma pena que essas tradições morressem, não é?\""
