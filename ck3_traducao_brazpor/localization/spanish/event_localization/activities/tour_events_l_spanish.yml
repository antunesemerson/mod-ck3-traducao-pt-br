 liege_impressed_by_hunting_tt: "$cultural_festival.9003.b$"
 liege_not_very_impressed_by_hunting_tt: "Colar Ornamentado"
 ep2_liege_relocated_my_courtier_opinion: "Dentro do baú há um colar ricamente decorado. Longe do trabalho grosseiro da fechadura, o colar tem tantos detalhes que, quanto mais se olha para ele, mais complexidades se revelam.\n\nUm objeto verdadeiramente magnífico."
 ep2_disliked_liege_relocated_my_courtier_opinion: "Colar Estranho"
 ep2_humored_liege_opinion: "Um colar ricamente decorado. Na extremidade de sua corrente está a figura de um grotesco segurando uma joia entre seus apêndices estranhos."
 ep2_declined_exotic_dinner_inviation_opinion: "$cultural_festival.9003.a$"
 favor_opinion: "$cultural_festival.9003.b$"
 hook_progress_opinion: "Um Item Vergonhoso"
 no_booze_opinion: "Abro o baú e coro ao ver o que há em seu interior.\n\nFeito de madeira nobre, este objeto fálico não se parece com nenhum outro que eu tenha visto. Nem sequer parece um #EMP instrumento#! humano, mas sim algo que imagino que possa pertencer a uma criatura mítica.\n\nUm objeto verdadeiramente perverso."
 suspicious_opinion: "Falo de Madeira Grotesco"
 tax_avoidance_opinion: "Um objeto elaboradamente esculpido que se assemelha ao falo de uma criatura mística desconhecida."
 refused_gift_opinion: "Que coisa curiosa!"
 dread_tour_opinion: "Queime-o."
 taxation_tour_opinion: "Decifrar o Diário"
 refused_tour_demand_opinion: "Finalmente, juntei todas as peças do quebra-cabeça e chegou a hora de descobrir o que está escrito nessas páginas!"
 good_majesty_tour_opinion: "Você vai tentar decifrar os diários"
 turned_away_tour_opinion: "Vamos lá."
 merciful_opinion: "Entendendo o Diário:"
 #GetCourtierTrait
 courtier_trait_gluttonous: "Junto os diários, leio minuciosamente o livro de quebra-cabeças e aplico-os na fechadura com movimentos tão precisos quanto meus pensamentos.\n\nFinalmente, acho que consegui e #EMP clank!#! O diário permanece trancado e teimoso como sempre."
 courtier_trait_insanity: "Droga!"
 courtier_trait_beauty: "Vou tentar de novo!"
 courtier_trait_intellect: "$journal_events_prefix$ Outra Falha"
 courtier_trait_physique: "Realmente sinto que acertei desta vez. Tudo parece fazer sentido, não há como eu estar errado.\n\nGiro para a esquerda e... #EMP clank!#! O diário permanece trancado e teimoso como sempre."
 courtier_trait_martial: "Maldição!"
 courtier_trait_diplomacy: "Vou arrombar essa maldita fechadura!"
 courtier_trait_stewardship: "Você quebra mais do que apenas a fechadura"
 courtier_trait_intrigue: "Você não consegue abrir o diário"
 courtier_trait_prowess: "Você descobre o conteúdo do diário"
 every_title_held_by_vassal: "$journal_events_prefix$ Decifrando"
 every_title_held_by_vassal_and_vassals: "Finalmente, as páginas do diário se revelaram para mim, e posso começar a decifrar! A cifra de abertura diz 'Wherever I go, the truth remains two steps behind', e com isso posso decifrar o primeiro quebra-cabeça.\n\n"
