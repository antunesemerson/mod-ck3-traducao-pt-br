 haunted_by_ghosts_log: "\"Hcnnudavjgktqypjcpfu.\""
 enjoyed_weed_together_log_title: "\n\nIsso não faz nenhum sentidoo, mas deve ter um significado real."
 enjoyed_weed_together_log: "Coisas estranhas podem existir."
 enjoyed_a_good_cake_log_title: "Os espíritos nos observam."
 enjoyed_a_good_cake_log: "Nossa história é apenas uma mentira."
 had_a_bad_cake_log_title: "Caem por suas próprias mãos."
 had_a_bad_cake_log: "$journal_events_prefix$ Grotescos"
 rival_turned_up_at_dinner_log_title: "Isso mesmo! Seguindo a cifra, consigo entender todo o livro, e ele parece ser um relato estranho que descreve a natureza de todo tipo de grotescos, como os [ROOT.Char.Custom('GetGrotesquePlural')].

Em termos concretos, descreve sua natureza e onde encontrá-los, sem dúvida um artefato importante caso eu algum dia viaje para lugares distantes."
 rival_turned_up_at_dinner_log: "Que grotesco!"
 i_ate_a_heart_log_title: "$journal_events_prefix$ Teologia Avançada"
 i_ate_a_heart_log: "Isso mesmo! Seguindo a cifra, consigo entender todo o livro, e é um livro complexo sobre teologia! Ele descreve [ROOT.Char.GetFaith.PantheonTerm] e apresenta ideias fascinantes sobre a relação entre [ROOT.Char.GetFaith.PositiveAfterLife] e [ROOT.Char.GetFaith.NegativeAfterLife].\n\nEste pode ser o texto teológico mais avançado do mundo [ROOT.Char.GetFaith.GetAdjectiveNoTooltip], e é meu!"
 my_courtier_was_taken_log_title: "Fascinante!"
 my_courtier_was_taken_log: "$journal_events_prefix$ a História Secreta"
 i_was_murdered_log_title: "Isso mesmo! Seguindo a cifra, consigo entender todo o livro, e ele descreve a história do [ROOT.Char.GetPrimaryTitle.GetName] de uma maneira que nunca ouvi antes!\n\nSe for verdadeiro, este diário ameaça minar nossa compreensão da história e as muitas figuras que ajudaram a construir esse grande [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] como conhecemos!"
 i_was_murdered_log: "Incrível!"
 vassal_attempted_to_kill_me_log_title: "$journal_events_prefix$ Combate"
 vassal_attempted_to_kill_me_log: "É isso! Seguindo a cifra, consigo entender todo o livro, que contêm informações sobre técnicas secretas em todo tipo de cenário de combate. Seja com lâmina, corpo a corpo ou até a cavalo, este diário descreve exatamente como neutralizar qualquer movimento que um oponente possa fazer.

Se eu estudar adequadamente este diário e praticar suas instruções, posso me tornar [ROOT.Char.Custom('ES_ElLa')] melhor duelista da história de [ROOT.Char.GetPrimaryTitle.GetName]!"
 hooked_vassal_heir_log_title: "Incrível!"
 hooked_vassal_heir_log: "O Mapa Misterioso"
 stole_courtier_log_title: "Hoje passei a maior parte do tempo explorando o centro de [touring_grounds_scope.GetNameNoTooltip], divertindo-me enquanto era servido pela população local.

Logo além do meu alcance, vejo uma figura encapuzada serpenteando pela multidão, em uma tentativa inútil de se misturar. Uma folha de papel cai de seu bolso e voa melancolicamente ao sabor do vento em minha direção, como se fosse guiada até mim.

Parece ser algum tipo de mapa, um mapa dos arredores de [touring_grounds_scope.GetNameNoTooltip]!"
 stole_courtier_log: "Vamos ver para onde ele leva."
 became_guardian_log_title: "Você se perdeu"
 became_guardian_log: "Ah, que perda de tempo."
 discovered_pie_eater_log_title: "Tesouro Enterrado"
 discovered_pie_eater_log: "Seguindo o mapa até o final, encontro apenas uma clareira no [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip] sem nenhuma significância em particular.\n\nOlhando ao redor, encontro uma série de montículos no chão, como se algo estivesse enterrado ali. Os montículos parecem estar razoavelmente espaçados, talvez indicando que há alguma lógica por trás de sua colocação..."
 i_overate_log_title: "Posso descobrir qual é qual."
 i_overate_log: "Você não consegue encontrar o local certo"
 saved_someone_choking_log_title: "Vou cavar toda a clareira!"
 saved_someone_choking_log: "Já segui esse rastro o suficiente."
 won_drinking_contest_log_title: "O Livro Enterrado"
 won_drinking_contest_log: "Por fim, acho que encontrei o monte certo, e ao desenterrá-lo surge... um livro estranho.

A capa está danificada e praticamente se desfaz, e em seu interior há apenas símbolos e enigmas estranhos, aludindo a alguma verdade obscura.

Depois de algum tempo, percebo que se trata de um livro de cifras, mas não está claro o que ele existe para decifrar."
 lost_drinking_contest_log_title: "Um livro estranho de enigmas e cifras."
 lost_drinking_contest_log: "Vou pegá-lo!"
