 festival_of_fools_bad_log: "Uma Moeda por uma Fortuna"
 turned_away_at_gates_log_title: "Em um canto afastado do festival, encontro uma tenda com ornamentos muito elaborados. Os materiais e os padrões me parecem estranhos, muito diferentes do que vi em casa. Seu dono é ainda mais estranho, e sorri para mim com cumplicidade por cima de suas mãos entrelaçadas.\n\n"Ah, um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]! Vejo que vosso futuro reserva muito para vós. Dai-me uma moeda e eu vos contarei tudo"."
 turned_away_at_gates_log: "\"Uma moeda você terá.\""
 tourgy_log_title: "Sua leitura é positiva"
 tourgy_log: "Sua leitura pressagia o destino"
 trampled_child_log_title: "\"Não tenho interesse em charlatões comuns.\""
 trampled_child_log: "\"Ensine-me seus caminhos, sábio(a)!\""
 eliminated_poachers_log_title: "Dança Erótica"
 eliminated_poachers_log: "Estou sentad[ROOT.Char.Custom('ES_OA')] para mais um espetáculo encantador. A percussão pulsa no silêncio expectante, os tambores martelando como batidas de um coração.

De trás das cortinas, surge um[sexy_dancer.Custom('ES_XA')] [sexy_dancer.GetWomanMan] atraente, movendo o corpo de uma forma ao mesmo tempo obscena e excitante. [sexy_dancer.GetSheHe|U] roça o corpo escandalosamente perto do meu e então me deixa apenas com uma piscadela, retornando ao seu público adorador."
 window_tax_log_title: "![sexy_dancer.GetSheHe|U] deve ser meu!"
 window_tax_log: "Que graça!"
 taxable_extras_log_title: "Uma Performance Legendária"
 taxable_extras_log: "Em minha alegria, eu percorro o festival e eventualmente encontro um grupo de artistas. Eles parecem estar ensaiando algo e posso dizer apenas pela forma como se comportam que estou prestes a ter um maravilhoso entretenimento.\n\nA ideia me ocorre de que o grupo pode se beneficiar de algum material novo. De fato, [ROOT.Char.GetPromotedLegend.GetName|U] seria um material ideal para um grupo tão talentoso de atores."
 maa_managed_log_title: "Eles deveriam realizar minha lenda!"
 maa_managed_log: "A performance alcança [stop_host_scope.GetFirstName]"
 maa_mismanaged_log_title: "A performance vai muito bem"
 maa_mismanaged_log: "Devo apenas apreciar o que eles têm a oferecer."
