l_spanish:
 #Tour Travel Events
 tour_travel.1001.title: "[Select_CString( angry_peasant.IsFemale, 'uma serva', 'um servo' )|U] e seu [ROOT.Char.GetTitleAsNameNoTooltip]"
 tour_travel.1001.desc.intro: "Entro em uma taverna local em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], cansad[ROOT.Char.Custom('ES_OA')] da viagem e com sede de [ROOT.Char.Custom('RegionalDrink')] e com vontade de descansar.\n\nMinha contemplação silenciosa é interrompida pelo som de um punho se chocando contra a madeira estilhaçada, seguido de um cuspe desdenhoso. "Maldit[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('angry_peasant'))] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('angry_peasant'))]!"
 tour_travel.1001.desc.mid.wrong_language: "Nem sequer fala [angry_peasant.GetCulture.GetLanguage.GetName|l], e ainda assim ousa se proclamar [Select_CString( ROOT.Char.IsFemale, 'nuestra legítima', 'nuestro legítimo')] [ROOT.Char.GetLadyLord]!"."
 tour_travel.1001.desc.mid.wrong_culture: "É [Select_CString( ROOT.Char.IsFemale, 'una absoluta extranjera', 'un absoluto extranjero')]! Como pode nos governar alguém que nem sequer é de estirpe [angry_peasant.GetCulture.GetName]?»."
 tour_travel.1001.desc.mid.wrong_faith: "É um[ROOT.Char.Custom('ES_XA')] infiel [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('angry_peasant'))]! Cada segundo que permanece no trono é uma ofensa à vontade de [angry_peasant.GetFaith.HighGodNamePossessive]"."
 tour_travel.1001.desc.mid.pretender: "A Casa de [ROOT.Char.GetHouse.GetName], eu cuspo em todos eles! Todos sabem que os verdadeiros governantes do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] são da casa [claimant_character_scope.GetHouse.GetName]."
 tour_travel.1001.desc.mid.powerful_diarch: "Nosso[ROOT.Char.Custom('ES_OA')] supost[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip] é fraco! O verdadeiro governante de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] é e[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetDiarch.Custom2('InsultNoun', SCOPE.sC('angry_peasant'))] [ROOT.Char.GetDiarch.Custom2('InsultAdjective', SCOPE.sC('angry_peasant'))] de [ROOT.Char.GetDiarch.GetFirstName]!"
 tour_travel.1001.desc.mid.just_plain_dislike_em: "Nem deveríamos nem chamar \"[ROOT.Char.GetTitleAsNameNoTooltip]\" a esse [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('angry_peasant'))]; deveríamos chamá-lo de idiota [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('angry_peasant'))]!»."
 tour_travel.1001.desc.outro.nudist: "\n\nTento não chamar atenção, mas parece que meu comportamento tão de [ROOT.Char.GetTitleAsNameNoTooltip|l] e a perfeição inconfundível do corpo bem cuidado de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetHouse.GetName] me denunciou. Preciso pensar em algo antes que a situação piore."
 tour_travel.1001.desc.outro: "\n\nTento manter um perfil discreto, mas parece que minha maneira [ROOT.Char.GetTitleAsNameNoTooltip|l] e as insígnias da Casa [ROOT.Char.GetHouse.GetName] em minhas vestes me denunciaram. Preciso pensar em algo antes que a situação se agrave."
 tour_travel.1001.a: "Diga isso na minha cara, seu [angry_peasant.Custom2('InsultNoun', ROOT.Char)]!"
 tour_travel.1001.b: "Talvez uma redução de impostos mude sua opinião."
 tour_travel.1001.c: "Oh, eu simplesmente pareço com [ROOT.Char.GetNameNoTooltip]!"
 tour_travel.1002.title: "A [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type')|U] Entre as Ervas Daninhas"
 tour_travel.1002.desc: "À medida que atravessamos [pretty_peasant_county_scope.GetName], fico enfeitiçado pela paisagem. De fato, o(a) [pretty_peasant_county_scope.GetProvince.Custom('TerrainTypeProvince')] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] deve ser o lugar mais belo de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], e ainda mais belos são os(as) [pretty_peasant.GetWomenMen].\n\nEnquanto minha comitiva me escolta por mais uma aldeia humilde, encontro um[pretty_peasant.Custom('ES_XA')] jovem especialmente bonit[pretty_peasant.Custom('ES_OA')] que segue com suas humildes tarefas e sinto meu coração acelerar. Contemplar esse [pretty_peasant.Custom('LoverPetName')] em sua banalidade é como ver poesia encarnada e, antes que eu possa sequer pensar, meu coração já me ordenou que chamasse minha comitiva para parar."
 tour_travel.1002.a: "Devo expressar meus sentimentos."
 tour_travel.1002.b: "Oh, acho que vi algo... continuem."
 tour_travel.1003.title: "Dirigir-se a um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 tour_travel.1003.desc: "Enquanto minha viagem continua pela [angry_county_scope.GetName], sou informado de que combinei um encontro com um representante do campesinato descontente.\n\nUma criatura lamentável se arrasta diante de mim, discutindo sobre a suposta dignidade do populacho [angry_county_scope.GetAdjective]. No entanto, logo percebo que tal [rude_peasant.Custom2('InsultNoun', ROOT.Char)] [rude_peasant.Custom2('InsultAdjective', ROOT.Char)] jamais me dirigiu a palavra como "[ROOT.Char.Custom('FormOfAddressForLiege')|U]", uma ofensa que posso punir da forma que eu achar mais adequada."
 tour_travel.1003.a: "Façam essa criatura ser chicoteada por cinco milhas."
 tour_travel.1003.b: "As entranhas dele/a vão adornar o/a [angry_county_scope.GetProvince.Custom('TerrainTypeProvince')]."
 tour_travel.1003.c: "Perdoo a ignorância."
 tour_travel.1004.title: "$altruism_intent_header$ Um Toque Curador"
 tour_travel.1004.desc.intro: "Entro em [diseased_county_scope.GetName] com a disposição de conceder meu toque real aos camponeses locais. Deparo-me imediatamente com a criatura mais miserável que já vi em toda a minha vida. Com a mínima provocação, ele expõe seus pés calejados a poucos centímetros de minhas mãos imaculadas.\n\n"
 tour_travel.1004.desc.outro.christian: "Assim como Jesus lavou os pés de seus discípulos, [ROOT.Char.GetFaith.HighGodName] também me implora que eu lave os pés de meus súditos leais."
 tour_travel.1004.desc.outro: "Por mais que me repugne até mesmo estar na presença de [Select_CString( diseased_peasant.IsFemale, 'esta mendiga enferma', 'este mendigo enfermo' )] de odor penetrante, diz-se que meu toque pode curar até mesmo as doenças mais indecorosas."
 tour_travel.1004.a.tarantino: "Odeio admitir, mas isso é um pouco erótico."
 tour_travel.1004.a: "Uma bênção para você, uma memória ruim para mim."
 tour_travel.1004.b: "Oh, eu poderia massagear esses pés corposcópicos para sempre."
 tour_travel.1004.c: "Talvez um toque suave na testa resolva."
 tour_travel.1004.d.meat: "Afaste essas salsichas sujas de mim!"
 tour_travel.1004.d.two_veg: "Afaste esses [ROOT.Char.Custom('get_region_root_vegetable_plural')] sujos de mim!"
 tour_travel.1005.title: "$altruism_intent_header$ O Toque Real"
 tour_travel.1005.desc: "A notícia de minha chegada parece ter se espalhado para [county_to_bless_scope.GetName], pois nosso séquito logo é cercado por inúmeros camponeses pedindo para serem abençoados com o toque real.\n\nEu poderia simplesmente borrifar um pouco de água abençoada por mim sobre eles, e certamente ficariam satisfeitos, mas conceder-lhes moedas abençoadas para aliviar suas áreas infectadas os deixaria felizes e abençoados por muito mais tempo."
 tour_travel.1005.a: "Distribuirei moedas abençoadas."
 tour_travel.1005.b: "Uma borrifada de água deve satisfazê-los."
 tour_travel.1005.c: "Eles não receberão nada!"
 tour_travel.1006.title: "$altruism_intent_header$ Esmolas para os Pobres"
 tour_travel.1006.desc: "Enquanto cavalgamos perto da grande [county_holder_to_bless_scope.GetFaith.HouseOfWorship] de [church_barony_scope.GetNameNoTooltip], ordeno que meu séquito pare para admirar este lugar sagrado que atende às necessidades espirituais de tantos aqui em [county_to_bless_scope.GetNameNoTooltip].\n\nO terreno de sua [county_holder_to_bless_scope.GetFaith.HouseOfWorship] está cheio de indigentes que vêm rezar para que suas circunstâncias melhorem. Talvez esta seja uma oportunidade de mostrar ao povo de [county_to_bless_scope.GetNameNoTooltip] quão magnânim[GetPlayer.Custom('ES_OA')] e bondoso posso ser."
 tour_travel.1006.a: "Esmolas para os pobres!"
 tour_travel.1006.b: "Se eles quisessem dinheiro, não deveriam ter nascido pobres."
 tour_travel.1006.c: "Removam essas pragas dos degraus!"
 tour_travel.1007.title: "[Select_CString( wise_woman_scope.IsFemale, 'La sabia', 'El sabio' )] de [wise_woman_barony_scope.GetNameNoTierNoTooltip]"
 tour_travel.1007.desc.intro: "Enquanto meu cortejo prossegue viagem por todo o meu domínio, acabamos atravessando a região remota e desavisada de [wise_woman_barony_scope.GetNameNoTier]. Não teria pensado nada a respeito, mas [superstituous_courtier_scope.GetName] me puxa para o lado para exaltar com entusiasmo a virtude da chamada sábia[wise_woman_scope.Custom('ES_OA')] de [wise_woman_barony_scope.GetNameNoTierNoTooltip].\n\n"
 tour_travel.1007.desc.mid.ill: "«Perdoe-me, meu [ROOT.Char.GetLadyLord], mas vejo que você sofre tremendamente de males e aflições. [Select_CString( wise_woman_scope.IsFemale, 'La sabia', 'El sabio' )] de [wise_woman_barony_scope.GetNameNoTierNoTooltip] está a apenas um pequeno desvio, e sei que tem exatamente o que você precisa para voltar a estar saudável!»."
 tour_travel.1007.desc.mid.pregnant: ""Meu [ROOT.Char.GetTitleAsNameNoTooltip], vejo que estais extremamente radiante e resplandecente como sempre, como convém estar quando se está grávida. No entanto, posso dizer que o árduo trabalho de carregar um bebê está causando grande desconforto a vós e [wise_woman_scope.Custom('ES_ElLa')] sabi[wise_woman_scope.Custom('ES_OA')] que está perto terá justamente o remédio necessário para aliviar o que vos aflige"."
 tour_travel.1007.desc.mid.psychological: ""Eu sei que tendes uma mente atormentada, [ROOT.Char.Custom('FormOfAddressForLiege')], e isso vos causa grande angústia. Por mais forte que seja vosso espírito, talvez o que aflige vossa mente possa ser remediado com algum incenso ou remédio [wise_woman_scope.Custom('ES_DelDela')] [Select_CString( wise_woman_scope.IsFemale, 'famosa sabia', 'famoso sabio' )] de [wise_woman_barony_scope.GetNameNoTierNoTooltip]!"."
 tour_travel.1007.desc.mid.weakened: "Com seus ferimentos, [ROOT.Char.Custom('FormOfAddressForLiege')], temo por sua segurança e saúde nesta viagem. No entanto, conheço [Select_CString( wise_woman_scope.IsFemale, 'uma médica', 'um médico' )] por perto que talvez possa curar seus ferimentos. [Select_CString( wise_woman_scope.IsFemale, 'A sábia', 'O sábio' )] de [wise_woman_barony_scope.GetNameNoTierNoTooltip] cura tudo!"
 tour_travel.1007.desc.mid.ugly: ""Se me permitis, [ROOT.Char.Custom('FormOfAddressForLiege')], alguns outros membros do vosso cortejo têm feito comentários sobre vossa... aparência. Mas não temais! Há [Select_CString( wise_woman_scope.IsFemale, 'uma sábia', 'um sábio' )] por perto que pode curar qualquer aflição, ao que dizem.""
 tour_travel.1007.desc.outro: "\n\nTenho minhas dúvidas, mas [superstituous_courtier_scope.GetNameNoTooltip] parece estar tão convencid[superstituous_courtier_scope.Custom('ES_OA')] das virtudes de tal [Select_CString( wise_woman_scope.IsFemale, 'curandera mística', 'curandero místico' )] que sinto vontade de fazer uma visita."
 tour_travel.1007.a: "Um pequeno desvio não deve ser problema."
 tour_travel.1007.b: "Absurdo!"
 go_see_wise_woman_tt: "Você vai ver [Select_CString( wise_woman_scope.IsFemale, 'a la sabia', 'al sabio' )]. Isso pode ter resultados positivos ou negativos."
 tour_travel.1008.title: "$tour_travel.1007.title$"
 tour_travel.1008.desc.intro: "Ao cair da noite, entro no casebre mal iluminado [Select_CString( wise_woman_scope.IsFemale, 'de la sabia', 'del sabio' )]. Minha comitiva permanece do lado de fora. Não tenho dúvidas de que [Select_CString( wise_woman_scope.IsFemale, 'la excéntrica mujer', 'el excéntrico hombre' )] que manca lá dentro é quem procuro.\n\n\"Ah, eu já esperava por vocês. Entrem! Compartilhem minha fogueira, meu [ROOT.Char.GetTitleAsNameNoTooltip]\". Antes que eu possa sequer dizer uma palavra, as mãos geladas dela envolvem as minhas."
 tour_travel.1008.desc.mid.ill: "Passo a noite sorvendo líquidos negros de gosto ruim e sentindo o aroma de incensos embriagantes e, quando saio no dia seguinte, me sinto como um novo[ROOT.Char.Custom('ES_OA')]."
 tour_travel.1008.desc.mid.pregnant: "Passo a noite comendo todo tipo de comidas estranhas: globos oculares, ervas e frutas que jamais tinha visto, enquanto todas as minhas necessidades são atendidas por tão [Select_CString( wise_woman_scope.IsFemale, 'extraña mujer', 'extraño hombre' )]. Ao sair na manhã seguinte, sinto-me revitalizad[ROOT.Char.Custom('ES_OA')]!"
 tour_travel.1008.desc.mid.psychological: "Suas mãos se movem para agarrar meu crânio como uma grande fera segurando sua presa. Passamos a noite entoando palavras que não compreendo, e quando saio pela manhã, sinto que minha cabeça está mais leve."
 tour_travel.1008.desc.mid.weakened: "Cobre minha ferida com todo tipo de fluidos viscosos e ervas urticantes, e embora o processo seja doloroso, sinto que minha ferida está mais fechada no dia seguinte."
 tour_travel.1008.desc.mid.ugly: "Passa a noite inteira esfregando meu rosto com pastas e cremes coloridos, cobrindo minhas muitas manchas e imperfeições. Pela manhã, contemplo meu reflexo e vejo um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] que faria até os castos enrubescerem de desejo."
 tour_travel.1008.desc.outro: "\n\nTodas as minhas dúvidas são dissipadas e meus males estão curados."
 tour_travel.1008.a: "Como mágica!"
 tour_travel.1008.b: "[wise_woman_scope.GetSheHe|U] deve ser meu médico[wise_woman_scope.Custom('ES_OA')]!"
 tour_travel.1009.title: "[Select_CString( wise_woman_scope.IsFemale, 'La charlatana', 'El charlatán' )] de [wise_woman_barony_scope.GetNameNoTierNoTooltip]"
 tour_travel.1009.desc.intro: "$tour_travel.1008.desc.intro$"
 tour_travel.1009.desc.mid.ill: "Passo a noite inteira cheirando odores absolutamente intoleráveis, bebendo fluidos viscosos repugnantes e tendo meu corpo coberto por ervas ardentes! Toda a experiência adiciona ainda mais náusea e dor à minha aflição existente, e termino a noite me sentindo pior do que quando comecei."
 tour_travel.1009.desc.mid.ugly: "Passa a noite inteira esfregando pastas e cremes coloridos no meu rosto, cobrindo minhas muitas manchas e imperfeições. Pela manhã, contemplo meu reflexo e uivo de medo ao ver o monstro em que [wise_woman_scope.GetSheHe] me transformou!"
 tour_travel.1009.desc.mid.nothing: "Faço tudo o que [wise_woman_scope.GetSheHe] me pede: bebo chás de ervas, massageio minhas extremidades, caminho sobre brasas e ingiro ervas suficientes para derrubar um homem. No entanto, tudo isso parece ter tido pouco efeito sobre mim e não me sinto melhor do que quando cheguei."
 tour_travel.1009.desc.outro: "\n\nNão sei o que terá ouvido [superstituous_courtier_scope.GetNameNoTooltip] sobre essa [Select_CString( wise_woman_scope.IsFemale, 'sabia', 'sabio' )], mas ficou claro que não passa de [Select_CString( wise_woman_scope.IsFemale, 'una charlatana', 'un charlatán' )] vulgar de beira de estrada."
 tour_travel.1009.a: "Que perda de tempo."
 tour_travel.1009.b: "Enganar [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip] é um crime punível com a morte."
 tour_travel.9010.t: "Cuidado com os Bandidos!"
 tour_travel.9010.desc: "Minha comitiva continua por nossa rota planejada até [next_destination.GetName] quando, de repente, somos detidos abruptamente por ordem de [travel_leader.GetName]!\n\n"Parem, seus tolos! Diz-se que esta estrada está infestada de bandidos e canalhas de baixo caráter, precisamos desviar!".\n\nA rota que propõe é mais longa, mas me assegura que é mais segura."
 tour_travel.9010.a: "Vamos seguir a rota segura."
 tour_travel.9010.b: "Devemos fazer justiça a esses malfeitores!"
 tour_travel.9010.success: "Os bandidos são derrotados."
 tour_travel.9010.failure: "Os bandidos te derrotaram."
 tour_travel.9020.t: "Justiça Local"
 tour_travel.9020.desc.intro: "Chegamos a uma pequena aldeia em [ROOT.Char.GetCurrentLocation.GetName] para ver uma grande agitação na praça da cidade. Uma pobre criatura está cercada por aldeões furiosos; o olhar sombrio e desesperançado em seus olhos se apaga e se ilumina quando [accused_character.GetSheHe] percebe que minha comitiva se aproxima.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U] , eu imploro! Não os escute, é tudo mentira! Sou inocente! Não me concederia a justiça [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]?".\n\n"
 tour_travel.9020.desc.outro.guilty: "É certo que as provas parecem circunstanciais, mas um[accused_character.Custom('ES_XA')] camponês vulgar[accused_character.Custom('ES_OA')] não deve falar com seu [ROOT.Char.GetTitleAsNameNoTooltip] sem ser instruído."
 tour_travel.9020.desc.outro: "As evidências parecem bastante incriminadoras, e [accused_character.GetSheHe] falou fora de hora além disso."
 tour_travel.9020.a: "A execução é justa."
 tour_travel.9020.b: "As provas são frívolas, deixai[accused_character.GetHerHim] partir."
 tour_travel.9020.c: "Servir-me será o castigo."
 tour_travel.9030.t: "O Covil do Pecado"
 tour_travel.9030.desc.intro: "Quando sou despertado do meu sono da meia-noite, ouço os gritos de folia e alegria se aproximando lentamente por trás de mim. Aparece [drunky_entourage.GetName|U] com"
 tour_travel.9030.desc.mid.hashish: "olhos vermelhos de haxixe."
 tour_travel.9030.desc.mid: "hálito com o cheiro de [ROOT.Char.Custom('RegionalAlcoholicDrink')]."
 tour_travel.9030.desc.outro: "\n\n"Pelo [drunky_entourage.GetFaith.HighGodName]! Há um maravilhoso antro de pecado a poucos minutos daqui, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Devemos ficar aqui por um tempo e nos tornar idiotas de júbilo"."
 tour_travel.9030.a: "Alegria e diversão, aqui vou eu!"
 tour_travel.9030.b: "Não devemos nos distrair."
 tour_travel.9040.t: "[Select_CString( ROOT.Char.IsFemale, 'Heroína', 'Héroe' )] sem igual"
 tour_travel.9040.desc: "Meu grupo para para descansar um momento, e eu entro em um estabelecimento simples para me inteirar adequadamente com os locais. Mantendo-me incógnito[ROOT.Char.Custom('ES_OA')]; escuto as conversas barulhentas da classe mais baixa.\n\nUm[peasant.Custom('ES_XA')] [peasant.GetWomanMan] está festejando com seus compadres, trocando histórias sobre seus heróis lendários favoritos. «... e o que dizer de [ROOT.Char.GetPromotedLegend.GetProtagonist.GetName]? Não sei se sequer existiu algum dia, quanto mais o resto dessa palhaçada de \"[ROOT.Char.GetPromotedLegend.GetName]\"!»."
 tour_travel.9040.a: "Eu devo defender minha lenda!"
 tour_travel.9040.a.success: "Os camponeses cantam louvores à sua história"
 tour_travel.9040.a.failure: "Você é zombado"
 tour_travel.9040.b: "Está claro que ele não entendeu a história."
 #Tour Arriving at a Stop
 #Vassal: Liege arrival event
 tour_general.0001.title: "Chega [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstNameNoTooltip|l]!"
 tour_general.0001.desc.intro: "Por fim chega aos meus portões o séquito [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitledFirstName|l], visitando [ROOT.Char.GetCapitalLocation.GetName] em sua turnê por [visiting_liege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]."
 tour_general.0001.desc.type.majesty: "As roupas esplêndidas e a apresentação nobre do grupo mostram uma ambição de me impressionar.\n\n"
 tour_general.0001.desc.type.intimidation: "As fileiras de guardas sérios e disciplinados deixam claro que o medo é a ordem do dia.\n\n"
 tour_general.0001.desc.type.taxation: "O carro do tesouro e a litania de cobradores de impostos sugerem que ficarei mais pobre com esta visita.\n\n"
 tour_general.0001.desc.mid.hates_liege: "Já era hora de que es[visiting_liege.Custom('ES_EA')] [visiting_liege.Custom2('InsultNoun', ROOT.Char)] [visiting_liege.Custom2('InsultAdjective', ROOT.Char)|l] saísse de seus salões lúgubres e visse um pouco do verdadeiro interior do país."
 tour_general.0001.desc.mid.lover: "Já faz muito tempo desde que senti seu abraço… talvez haja tempo para colocarmos a conversa em dia…"
 tour_general.0001.desc.mid.friend: "Embora tenhamos de lidar com o peso das formalidades, a visita de um tão bom[visiting_liege.Custom('ES_XA')] amig[visiting_liege.Custom('ES_OA')] é muito bem-vinda."
 tour_general.0001.desc.mid.close_family: "Uma oportunidade rara, mas bem-vinda de ver a minha [ROOT.Char.Custom2('RelationToMeShort', visiting_liege)]. Foi gentil dele vir."
 tour_general.0001.desc.mid.house: "Meu [ROOT.Char.Custom2('RelationToMeShort', visiting_liege)] veio para cimentar tanto os laços de vassalagem quanto os da Casa [ROOT.Char.GetHouse.GetBaseName]."
 tour_general.0001.desc.mid.powerful_vassal: "Como um[ROOT.Char.Custom('ES_OA')] de [ROOT.Char.Custom('ES_LoLa')]s vassal[ROOT.Char.Custom('ES_OA')]s mais poderos[ROOT.Char.Custom('ES_OA')]s do reino, não é de se estranhar que [visiting_liege.GetSheHe] tenha vindo bater à minha porta."
 tour_general.0001.desc.mid.default: "Receber [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetLadyLord] do domínio em meus próprios salões seria uma grande honra."
 tour_general.0001.desc.phase.tour_grounds: "\n\nDarei [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitleAsNameNoTooltip] um passeio por minha [ROOT.Char.Custom('FortifiedBuilding')] e as terras [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]."
 tour_general.0001.desc.phase.dinner: "\n\nSediarei um jantar luxuoso digno de um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip] —uma oportunidade de mostrar a hospitalidade do país [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]—"
 tour_general.0001.desc.phase.cultural_festival: "\n\nMostrarei [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitleAsNameNoTooltip] um festival que apresente o melhor que temos em [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] em entretenimento e apresentações,"
 tour_general.0001.desc.outro: "e proverei sua comitiva com camas e entretenimento.\n\nA única pergunta é: abro os portões e [visiting_liege.GetHerHim] o deixo entrar?"
 tour_general.0001.a: "Bem-vind[visiting_liege.Custom('ES_OA')] [visiting_liege.GetTitleAsNameNoTooltip|l] meu[visiting_liege.Custom('ES_OA')]! Bem-vind[visiting_liege.Custom('ES_OA')]!"
 tour_general.0001.b: "Vamos fingir que não tem ninguém em casa..."
 #Liege: Phase invalidation
 tour_general.0500.title: "Não Há Ninguém em Casa"
 tour_general.0500.desc.intro: "Chegou até mim a informação de que meus planos foram interrompidos e não é mais possível realizar uma visita real a [tour_location.GetName].\n\n"
 tour_general.0500.desc.self: "Tornei-me [ROOT.Char.Custom('ES_ElLa')] nov[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLadyLord] de [tour_location.GetName], sem deixar ninguém além de mim mesmo para me receber."
 tour_general.0500.desc.already_visited: "Já havia visitado a [stop_host_scope.GetName] antes em minha Grande Turnê, e não posso demonstrar um tratamento preferencial a [stop_host_scope.GetSheHe]. Receberá apenas uma visita, nada mais."
 tour_general.0500.desc.no_longer_liege: "[stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitleAsNameNoTooltip|l] de [tour_location.GetNameNoTooltip] já não responde diretamente a mim."
 tour_general.0500.desc.lowly_baron: "[tour_location.GetNameNoTooltip|U] está a serviço de um[stop_host_scope.Custom('ES_XA')|U] humilde [stop_host_scope.GetTitleAsNameNoTooltip], e não é digno de mim visitar um[stop_host_scope.Custom('ES_XA')|U] [stop_host_scope.GetWomenMen] de tão baixo status."
 tour_general.0500.desc.leading_army: "[stop_host_scope.GetName|U] está em campo de batalha e não pode mais me receber."
 tour_general.0500.desc.gone_travelling: "[stop_host_scope.GetName|U] abandonou sua casa e partiu para terras desconhecidas."
 tour_general.0500.desc.imprisoned_by_me: "[stop_host_scope.GetName|U] foi pres[stop_host_scope.Custom('ES_OA')] e agora apodrece em minhas masmorras."
 tour_general.0500.desc.imprisoned: "[stop_host_scope.GetName|U] não é mais um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.GetWomanMan] livre, pois apodrece em alguma masmorra estrangeira."
 tour_general.0500.desc.deadly_illness: "[stop_host_scope.GetName|U] contraiu uma doença mortal, e não posso me arriscar a fazer uma visita e respirar seu miasma tóxico."
 tour_general.0500.desc.incapable: "[stop_host_scope.GetName|U] já não está mais no controle de todas as suas faculdades e seria um[stop_host_scope.Custom('ES_XA')] mau[stop_host_scope.Custom('ES_XA')] anfitri[stop_host_scope.Custom('ES_OnOna')]."
 tour_general.0500.desc.gone_adventuring: "[stop_host_scope.GetName|U] partiu em alguma aventura para terras às quais não me animo a ir."
 tour_general.0500.desc.at_war: "A sombra da guerra paira sobre [tour_location.GetNameNoTooltip] e [stop_host_scope.GetName] me avisou para não me aventurar lá."
 tour_general.0500.desc.outro: "\n\nEmbora isso não signifique o fim da minha turnê, é uma grande decepção."
 current_phase_skipped_tt: "A próxima fase foi pulada."
 tour_general.0500.a: "Eu estava tão ansioso por isso…"
 #Liege: Rejected at the gates
 tour_general.0501.title: "Recusado"
 tour_general.0501.desc: "Quando meu séquito chega às portas de [stop_host_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTier], chama-se [stop_host_scope.GetName] para me receber, mas, depois de um tempo mais do que generoso, nem mesmo o mais humilde dos servos aparece para me saudar. O chamado é feito muitas outras vezes, mas não recebemos resposta além dos gorjeios dos pássaros selvagens e do assobio dos ventos suaves.\n\nFica claro que fui barrado às portas. E, ao agir assim, [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.Custom2('InsultAdjective', ROOT.Char)] [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitleAsNameNoTooltip] insultou a coroa!"
 tour_general.0501.a: "Vamos apenas seguir em frente."
 tour_general.0501.b: "Esse insulto não será esquecido tão cedo."
 tour_general.0501.c: "Arrombe os portões malditos!"
 tour_general.0501.liege_merciful: "[visiting_liege.GetFirstName] te perdoou"
 tour_general.0501.liege_angry: "[visiting_liege.GetFirstName] está insultad[visiting_liege.Custom('ES_OA')]"
 tour_general.0501.raid: "[visiting_liege.GetFirstName] saqueou sua propriedade"
 #Tour Remaining at a Stop
 #Vassal Events
 tour_general.1001.title: "$activity_tour$: Um Pedido Cortês"
 tour_general.1001.title_theft: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Uma Reivindicação Cortês"
 tour_general.1001.intro: "Fiquei sabendo que [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l] está de olho em [tour_general_3001_target_courtier.Custom('ES_ElLa')] [tour_general_3001_target_courtier.GetTitledFirstName|l], conhecid[tour_general_3001_target_courtier.Custom('ES_OA')] em nossas terras por sua [tour_general_3001_target_courtier.Custom('GetCourtierTrait')|l]."
 tour_general.1001.desc: "\n\nResumindo, [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l] deseja realocar[tour_general_3001_target_courtier.GetHerHim] na corte [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitleAsNameNoTooltip]."
 tour_general.1001.desc_theft_liege: "\n\nSem levar em conta o que eu pense, parece que além disso [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitleAsNameNoTooltip] tentou transferir à força [tour_general_3001_target_courtier.Custom('ES_AlAla')] [tour_general_3001_target_courtier.GetTitledFirstName|l] para a corte [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitleAsNameNoTooltip] durante a noite."
 tour_general.1001.outro: "\n\nEsta é certamente uma oportunidade de mostrar-lhe minha benevolência!"
 tour_general.1001.outro_unusual_courtier: "\n\nEmbora eu não entenda muito bem o raciocínio do meu [ROOT.Char.Custom2('RelationToMePossessive', visiting_liege )], não estou muito preocupado com a ideia de perder[tour_general_3001_target_courtier.GetHerHim]."
 tour_general.1001.outro_unusual_host_unusual_courtier: "\n\nSe me ocorre #EMP un par de motivos#! pelos quais eu gostaria de manter por aqui [tour_general_3001_target_courtier.Custom('ES_AlAla')] [tour_general_3001_target_courtier.GetTitledFirstNameNoTooltip|l]. No entanto…"
 tour_general.1001.outro_theft_liege: "\n\nNão preciso dizer que isso me irrita de várias maneiras."
 tour_general.1001.outro_theft_liege_unusual_courtier: "\n\nAdmito não ver a razão pela qual [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l] pode querer [tour_general_3001_target_courtier.Custom('ES_AlAla')] [tour_general_3001_target_courtier.GetTitledFirstNameNoTooltip|l], mas é #EMP mi#! [ROOT.Char.Custom2('RelationToMeShort', tour_general_3001_target_courtier )], droga."
 tour_general.1001.a: "Espero que [tour_general_3001_target_courtier.GetFirstNameNoTooltip] lhe sirva bem."
 tour_general.1001.a_theft_liege: "[tour_general_3001_target_courtier.GetFirstNameNoTooltip] nunca foi de grande utilidade para mim mesmo."
 tour_general.1001.b: "Quid pro quo, [visiting_liege.GetTitledFirstNameNoTooltip|l]."
 tour_general.1001.b.tt: "Você pede um favor em troca de [tour_general_3001_target_courtier.GetFirstName] se juntar à corte de [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitledFirstName|l]"
 tour_general.1001.c: "Tenho certeza de que [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitleAsNameNoTooltip] pode fazer com que valha a pena para mim…"
 tour_general.1001.c.tt: "Você pede um pouco de ouro em troca de [tour_general_3001_target_courtier.GetFirstName] se junte à corte [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitledFirstName|l]"
 tour_general.1001.d: "Só pode haver #EMP um#! motivo pelo qual queira a [tour_general_3001_target_courtier.GetFirstNameNoTooltip]…"
 tour_general.1001.d.flavor: "Vamos nos permitir."
 tour_general.1001.d.tt: "Você sugere compartilhar uma refeição #EMP exótica#! com [visiting_liege.GetShortUIName]."
 tour_general.1001.d.tt_extra: "[visiting_liege.GetShortUIName] aceitará o convite ou condenará seu canibalismo."
 tour_general.1001.e: "#EMP Você vai morrer agora!#!"
 tour_general.1001.e.flavor: "Pelo [ROOT.Char.GetFaith.DevilName]!"
 tour_general.1001.e.tt: "Você se lança sobre [visiting_liege.GetShortUIName]."
 tour_general.1001.e.success: "Seu ataque é bem-sucedido."
 tour_general.1001.e.success.tt: "Você sobreviveu."
 tour_general.1001.e.success.desc: "Você sobreviveu à luta."
 tour_general.1001.e.bodyguard.desc: "Seu guarda-costas interveio para salvá-lo."
 tour_general.1001.e.slain.tt: "Você foi morto."
 tour_general.1001.e.slain.desc: "Você perdeu a luta."
 tour_general.1001.e.failure: "Seu ataque falha."
 tour_general.1001.e.bodyguard: "[tour_general_1001_bodyguard.GetTitledFirstNameNoTooltip|l] intervém."
 tour_general.1001.f: "Isso parece uma má ideia."
 tour_general.1001.f_theft_liege: "#EMP Difícilmente#! puedo aceptar esta solicitud ahora."
 tour_general.1001.f.tt: "Você não deseja entregar o seu cortesão[tour_general_3001_target_courtier.Custom('ES_OA')]"
 #Vassal/Liege Event
 tour_general.1002.title: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Uma Refeição Terrivelmente Gloriosa"
 tour_general.1002.title_vassal: "$activity_tour$: Uma Refeição Terrivelmente Gloriosa"
 tour_general.1002.desc_host: "Contemplo mais uma vez a disposição dos pratos sobre a mesa. Meu cozinheiro tem trabalhado arduamente para preparar cada porção de [tour_general_3001_target_courtier.GetFirstNameNoTooltip] para o nosso prazer. A decoração é magnífica. \n\nMe viro quando [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l] entra na câmara, sol[visiting_liege.Custom('ES_OA')], como havíamos combinado. [visiting_liege.GetHerHim|U] observo enquanto absorve tudo, e um sorriso cintilante desponta no canto de sua boca. Avança e toma assento à mesa. Eu me junto a [visiting_liege.GetSheHe]."
 tour_general.1002.desc_liege: "Ao entrar na câmara, não tenho dúvidas de que [tour_general_3001_target_courtier.GetFirstName] é a estrela do espetáculo.\n\n[stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitledFirstName|l] não poupou gastos, e a mesa transborda de pratos deliciosos, todos seguindo a filosofia de \"reutilizar, não desperdiçar\" e aproveitando qualquer iguaria culinária que [tour_general_3001_target_courtier.GetFirstNameNoTooltip] conseguiu trazer. \n\nAté a cabeça de [tour_general_3001_target_courtier.GetFirstNameNoTooltip], já esvaziada e seca, foi cuidadosamente colocada no fim da mesa e decorada com vegetação local. Pauso por um momento para assimilar tudo."
 tour_general.1002.a: "Isso é #EMP divino#!"
 tour_general.1002.b: "… talvez seja apenas a menor das mordidas."
 tour_general.1002.c: "Ao nosso benfeitor[tour_general_3001_target_courtier.Custom('ES_XA')] [tour_general_3001_target_courtier.GetFirstNameNoTooltip]!"
 tour_general.1002.a.flavor: "Você se delicia."
 #Liege Events
 tour_general.3001.title: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Aos Olhos do Observador"
 tour_general.3001.desc_gluttonous_cannibal: "Como fornecedor[GetPlayer.Custom('ES_XA')] de #EMP buenas carnes#!, [tour_general_3001_target_courtier.GetFirstName] se destaca verdadeiramente entre a multidão. Sua impressionante massa corporal faz minhas pernas bambearem. Minhas mãos tremem ao vê[tour_general_3001_target_courtier.GetHerHim] devorar a comida, com pérolas de gordura brilhando em suas bochechas rechonchudas. \n\n#EMP tão regordetas#!. Cerro a mandíbula. Foi para isso que veio."
 tour_general.3001.desc_gluttonous: "[tour_general_3001_target_courtier.GetFirstName] realmente parece um[tour_general_3001_target_courtier.Custom('ES_XA')] [tour_general_3001_target_courtier.GetWomanMan] que sabe o que é bom na vida. Sinto uma leve inveja no meu peito ao ver sua robustez e o puro prazer que parece encontrar na comida.\n\n[stop_host_scope.Custom('ES_ElLa')|U] mesmo[stop_host_scope.Custom('ES_OA')] [stop_host_scope.GetTitledFirstName|l] não parou de falar da qualidade da cozinha de [tour_general_3001_target_courtier.GetFirstName]."
 tour_general.3001.desc_insanity_courtier: "Há algo intrigante em [tour_general_3001_target_courtier.GetFirstName]. Não consigo identificar o quê. Mas tem um ar de mistério e franqueza que raramente se vê hoje em dia. \n\nÉ como se [tour_general_3001_target_courtier.GetSheHe] contemplasse o lugar onde minha alma estaria, se [ROOT.Char.GetFaith.DevilName] não tivesse chegado antes. \n\n[tour_general_3001_target_courtier.GetSheHe|U] sabe do que se trata."
 tour_general.3001.desc_beauty: "Assim que ponho os olhos em [tour_general_3001_target_courtier.GetFirstName] prendo a respiração. É como se [ROOT.Char.GetFaith.HighGodName] em pessoa tivesse abençoado [tour_general_3001_target_courtier.GetFirstNameNoTooltip] com a beleza de mil [ROOT.Char.Custom('get_region_flower_type_plural')] e o próprio tempo parasse enquanto admiro suas feições delicadas. \n\nTal beleza é desperdiçada nessa ralé camponesa."
 tour_general.3001.desc_intellect: "[tour_general_3001_target_courtier.GetFirstName] tem me impressionado constantemente com seu intelecto. Um[tour_general_3001_target_courtier.Custom('ES_XA')] verdadeiro[tour_general_3001_target_courtier.Custom('ES_OA')] pensador[tour_general_3001_target_courtier.Custom('ES_XA')] de nossos dias, suas habilidades e traços têm muito potencial. Sem dúvida, eu poderia fazer bom uso de ambos, em vez de vê-los murchar aqui, como uma planta privada de sol."
 tour_general.3001.desc_physique: "Enquanto [tour_general_3001_target_courtier.GetFirstName] se inclina para pegar o objeto no chão do corredor, eu também me inclino para observar os músculos definidos que se movem sob a pele. Essa forma física não pode ser comprada. Mas talvez se eu me cercar de mais indivíduos em forma...\n\n"
 tour_general.3001.desc_martial: "A destreza marcial de [tour_general_3001_target_courtier.GetFirstName] é bem conhecida na corte [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l]. Se quiser discutir planos de ataque, a melhor abordagem para afiar nossas armas e astúcia, deve-se ir até [tour_general_3001_target_courtier.GetSheHe]. É uma habilidade muito cobiçada e algo que me intriga.\n\n"
 tour_general.3001.desc_diplomacy: "As habilidades diplomáticas de [tour_general_3001_target_courtier.GetFirstName] não deixam de me surpreender. Poderia informar ao [ROOT.Char.GetFaith.ReligiousHeadName] de que as roupas de baixo dele estão aparecendo, enquanto ainda receberia algumas peças de ouro, um sorriso e um 'obrigado'."
 tour_general.3001.desc_stewardship: "[tour_general_3001_target_courtier.GetFirstName] é uma fonte rica e inesgotável de conhecimento sobre, bem... riqueza. Tem ideias sobre Tesouraria que lamenta não ser possível implementar na corte [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l]. \n\nSeria uma pena ver tanto talento ser desperdiçado."
 tour_general.3001.desc_intrigue: "Mal havia reparado em [tour_general_3001_target_courtier.GetFirstName] até que esteve bem em cima de mim, prestando o devido respeito ao seu [tour_general_3001_target_courtier.Custom2('RelationToMePossessive', stop_host_scope )] [stop_host_scope.Char.Custom2('RelationToMeShort', visiting_liege )]. Agora que o vejo, [tour_general_3001_target_courtier.GetHerHim] observo enquanto se move sem esforço entre grupos de pessoas da corte. Seus olhos estão constantemente despertos, olhando em todas as direções e em nenhuma. \n\nIsso me intriga."
 tour_general.3001.desc_learning: "[tour_general_3001_target_courtier.GetWomanMan|U] culto[tour_general_3001_target_courtier.Custom('ES_OA')], os olhos brilhantes de [tour_general_3001_target_courtier.GetFirstName] vasculham a sala em busca de alguém que desafie a afirmação científica que acabou de expor. Mas ninguém aceita o desafio, para sua decepção. \n\nNão é de se admirar, considerando o nível de intelecto que a discussão teria exigido. Estou impressionad[GetPlayer.Custom('ES_OA')]. \n\nEsse tipo de perspicácia é difícil de encontrar."
 tour_general.3001.desc_prowess: "Com movimentos ágeis pela sala que lembram um exemplar de [ROOT.Char.Custom('GetAnimalType')] durante uma caçada, [tour_general_3001_target_courtier.GetFirstName] não deixa de impressionar. Acompanho seus movimentos, uma sinfonia para os olhos, enquanto desaparece pelo corredor. \n\nQuanta destreza!"
 tour_general.3001.desc_outro: "#EMP Debo#! ter[tour_general_3001_target_courtier.GetHerHim] em minha corte."
 tour_general.3001.a: "Agora você faz parte da minha corte. Alegre-se."
 tour_general.3001.a.flavor: "Uma vez aceito, duas vezes meu."
 tour_general.3001.a.tt: "Cortesão realocado"
 tour_general.3001.a_cannibal: "Uma adição tão deliciosa!"
 tour_general.3001.a_cannibal.flavor: "Vou garantir que esteja bem alimentad[tour_general_3001_target_courtier.Custom('ES_OA')]…"
 tour_general.3001.a_insanity: "Isso é o que precisa ser feito."
 tour_general.3001.a_insanity.flavor: "[tour_general_3001_target_courtier.GetSheHe|U] #EMP sabe!#!"
 tour_general.3001.b: "Tenho certeza de que [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] não se importará."
 tour_general.3001.b_host_decides.tt: "[stop_host_scope.GetShortUIName] decide o que acontece em seguida"
 tour_general.3001.b.harmful_sideeffects.tt: "Devido à personalidade de [stop_host_scope.GetShortUIName], isso pode ter consequências fatais"
 tour_general.3001.b_liege_decides.tt: "[visiting_liege.GetShortUIName] decide o que acontece em seguida"
 tour_general.3001.c: "[tour_general_3001_target_courtier.GetSheHe|U] #EMP poderia#! simplesmente desaparecer na noite..."
 tour_general.3001.c.tt_success: "Levado Embora"
 tour_general.3001.c.tt_failure: "Tentativa Fracassada"
 tour_general.3001.c.tt_failure.desc: "Seu fracasso não passou despercebido."
 tour_general_3001_stolen_courtier: "[tour_general_3001_target_courtier.GetFirstNameNoTooltip] junta-se à minha corte sem que ninguém perceba"
 tour_general_3001_failed_steal: "[stop_host_scope.GetTitledFirstNameNoTooltip|l] descobre isso"
 tour_general.3001.d: "Isso é bobagem."
 tour_general.3001.d_cannibal: "Não. Eu preciso começar uma dieta."
 tour_general.3001.d_cannibal.flavor: "Tch!"
 tour_general.3001.d_insanity: "Não. Preciso enfrentar [ROOT.Char.GetFaith.random_EvilGodNames] sozinh[ROOT.Char.Custom('ES_OA')]."
 tour_general.3001.d_insanity.flavor: "Depende de mim agora!"
 tour_general.3001.tt_positive: "[visiting_liege.GetShortUIName] Aceitou Sua Proposta"
 tour_general.3001.tt_negative: "[visiting_liege.GetShortUIName] Recusou Sua Proposta"
 tour_general.3001.desc_negative: "[visiting_liege.GetShortUIName] perdeu o interesse no seu cortesão."
 tour_general.3002.title: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Pedido Concedido"
 tour_general.3002.title_denied: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Pedido Negado"
 tour_general.3002.intro: "[stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitledFirstName|l] dirige-se a mim diretamente.\n\n"Meu [stop_host_scope.Custom2('RelationToMeShort', ROOT.Char )], tenho estado considerando o assunto e cheguei à conclusão de que"
 tour_general.3002.desc_free: "[tour_general_3001_target_courtier.GetFirstName] ficará feliz em se juntar à sua corte mais graciosa.'"
 tour_general.3002.desc_hook: "um favor aqui poderia ser retribuído com um favor no futuro…?."
 tour_general.3002.desc_gold: "um pouco de ouro poderia ajudar a suavizar o golpe de perder noss[tour_general_3001_target_courtier.Custom('ES_OA')] querid[tour_general_3001_target_courtier.Custom('ES_OA')] [tour_general_3001_target_courtier.GetFirstName]."
 tour_general.3002.desc_cannibal: "Tenho uma ideia ainda melhor. Se vocês gostam de [tour_general_3001_target_courtier.GetFirstName] isto, #EMP encantará#!. É de [ROOT.Char.Custom('FormOfAddressForLiege')] para morrer".#EMP morirse#! \n\n[stop_host_scope.GetSheHe|U] olha na direção de [tour_general_3001_target_courtier.GetFirstName] e depois diretamente para mim, como se quisesse sinalizar algo."
 tour_general.3002.desc_declined: "Não posso concordar com esse pedido. [tour_general_3001_target_courtier.GetFirstName] é muito valioso para mim e para a minha corte.'\n\nSeu olhar começa a vagar pelo salão de forma constrangedora."
 tour_general.3002.a: "Muito obrigado!"
 tour_general.3002.b: "Por que trocar por algo que eu posso #EMP tomar#!?"
 tour_general.3002.b_declined: "[tour_general_3001_target_courtier.GetFirstNameNoTooltip] é #EMP mí[tour_general_3001_target_courtier.Custom('ES_OA')]#!."
 tour_general.3002.c: "Um favor? Parece justo."
 tour_general.3002.d: "Algumas moedas de ouro? Troca justa."
 tour_general.3002.e: "Pensando melhor..."
 tour_general.3002.f: "#EMP Oh meu Deus...#!"
 tour_general.3002.g: "Esse comportamento vil deve acabar!"
 tour_general.3002.h: "Isso é lamentável."
 tour_general.3002.h.tt: "[visiting_liege.GetShortUIName] está descontente[visiting_liege.Custom('ES_OA')]"
 tour_general.3002.h.tt.desc: "[visiting_liege.GetShortUIName] não está satisfeito com a sua decisão."
 tour_general.0510.title: "Uma Exigência de Despedida"
 tour_general.0510.desc: "Concluí minha visita a [ROOT.Char.GetCurrentLocation.GetName] e minha comitiva se prepara para partir.\n\n[stop_host_scope.GetName] e sua corte se alinhou cuidadosamente para se despedir de mim. Agora que todos estão presentes, é hora de recolher o tributo por honrar[stop_host_scope.GetHerHim] com minha presença."
 tour_general.0510.a: "É hora do tributo."
 tour_general.0510.b: "Não faço exigências."
 tour_general.0511.title: "Um Presente de Despedida"
 tour_general.0511.desc: "É hora de que [visiting_liege.GetName]parta, e devo dizer que creio ter sido [Select_CString( ROOT.Char.IsFemale, 'una anfitriona magnánima', 'un anfitrión magnánimo' )].\n\nNo entanto, parece que [visiting_liege.GetName] não acreditou que minha hospitalidade fosse suficiente e me fez uma exigência.\n\n"
 tour_general.0511.desc.kneel: "Exige que eu me ajoelhe diante de meu [visiting_liege.GetTitleAsNameNoTooltip] diante de toda a minha corte, demonstrando minha submissão à coroa."
 tour_general.0511.desc.money: "Me apresentou uma fatura por todas as despesas pagas durante a viagem. Embora muitas das cobranças pareçam falsas, vejo-me na obrigação de pagar."
 tour_general.0511.desc.factions: "Me estende a mão e exige que eu prometa lealdade a [visiting_liege.GetSheHe] e a [visiting_liege.GetPrimaryTitle.GetName], jurando nunca me opor à vontade real."
 tour_general.0511.a: "Eu me submeto."
 tour_general.0511.gave_demand: "[stop_host_scope.GetName] cedeu"
 tour_general.0511.b: "Eu não farei nada disso!"
 tour_general.0512.title: "Uma Despedida Cordial"
 tour_general.0512.desc: "Está na hora de [visiting_liege.GetName] partir, e devo dizer que sinto que fui [Select_CString( ROOT.Char.IsFemale, 'una anfitriona magnánima', 'un anfitrión magnánimo' )].\n\n[visiting_liege.GetName] parece totalmente satisfeit[visiting_liege.Custom('ES_XA')] com minha atuação como anfitri[ROOT.Char.Custom('ES_OnOna')] e não me exigiu nada além da promessa de que voltaremos a nos ver."
 tour_general.0512.a: "Excelente."
 tour_general.0513.title: "Exigência Recusada"
 tour_general.0513.desc: "[stop_host_scope.GetName] recusou-se desafiadoramente a ceder às minhas exigências. Agora mesmo não posso fazer muito, mas um insulto como este constitui um crime não apenas contra mim, mas contra o próprio reino!"
 tour_general.0513.a: "Isso não será esquecido em breve."
 #Tour Mini-Activity Events
 #Vassal Events
 tour_grounds_events.1001.title: "Habilidade de Caça"
 tour_grounds_events.1001.desc.intro: "Com [visiting_liege.GetName] ainda percorrendo os terrenos da minha casa, tenho muitas oportunidades à minha frente para impressionar."
 tour_grounds_events.1001.desc.mid: "\n\nUma dessas oportunidades seria exibir os terrenos de caça de [touring_grounds_scope.GetNameNoTooltip] e talvez impressionar meu [visiting_liege.GetLadyLord] com minhas habilidades de caça!"
 tour_grounds_events.1001.desc.outro: "Um triunfo no campo da caça certamente consolidaria meu status como dign[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip] do reino, mas, pelo mesmo motivo, um fracasso seria uma profunda vergonha."
 tour_grounds_events.1001.a: "Eu nunca erro!"
 tour_grounds_events.1001.b: "Talvez outra coisa [visiting_liege.GetHerHim] impressionaria…"
 tour_grounds_events.1002.title: "Uma Trama"
 tour_grounds_events.1002.desc: "Ao ver meu [visiting_liege.GetTitleAsNameNoTooltip] vagar pelos terrenos de [touring_grounds_scope.GetNameNoTooltip], uma ideia para uma brincadeira ardilosa me vem à cabeça. Como se possuído[ROOT.Char.Custom('ES_OA')] pelo espírito de [ROOT.Char.GetFaith.TricksterGodName], imagino uma tentativa de assassinato encenada para entreter meus convidados!\n\n[visiting_liege.GetNameNoTooltip] se tornará [Select_CString( visiting_liege.IsFemale, 'la heroína', 'el héroe' )] da história, frustrando a tentativa contra o grupo e pondo o \"assassino\" em fuga! Uma ótima paródia dos inimigos de [visiting_liege.GetPrimaryTitle.GetNameNoTooltip], com certeza [visiting_liege.GetNameNoTooltip] ficará lisonjeado e divertido com isso!"
 tour_grounds_events.1002.a: "Faça os preparativos!"
 tour_grounds_events.1002.b: "Vamos deixar pra lá."
 tour_grounds_events.1003.title: "$murder_outcome.5001.t$"
 tour_grounds_events.1003.desc.intro: "Ao continuar meu giro pelos domínios de [touring_grounds_scope.GetNameNoTooltip], ouço vozes desconhecidas ao nosso redor. De repente, encontro todo o meu grupo cercado por [Select_CString( fake_assassin_scope.IsFemale, 'encapuchadas', 'encapuchados' )] que apontam arcos e punhais diretamente para mim!\n\nUm[fake_assassin_scope.Custom('ES_OA')] de [fake_assassin_scope.GetHerHim]s assassinat[fake_assassin_scope.Custom('ES_OA')]s avança em minha direção e pressiona sua faca firmemente contra meu lado. \"Feliz caça, [ROOT.Char.Custom('FormOfAddressForLiege')]? Viemos caçar [ROOT.Char.GetTitleAsNameNoTooltip]s!\"."
 tour_grounds_events.1003.desc.paranoid: "\n\nSinto meu coração disparar e um suor frio me percorre todo o corpo enquanto permaneço paralisad[ROOT.Char.Custom('ES_OA')]. [Select_CString( fake_assassin_scope.IsFemale, 'La asesina', 'El asesino' )] me lança uma espécie de piscadela cúmplice e aponta para sua arma, vangloriando-se da vitória. Minha própria vida depende do meu próximo movimento; o que eu faço?"
 tour_grounds_events.1003.desc.not_paranoid: "\n\nEmbora inicialmente assustado, rapidamente fica claro que tudo isso é apenas uma encenação. O \"assassino\" pisca para mim e observo que sua arma é feita inteiramente de madeira e sem fio em todos os lados. Eles esperam que eu participe da brincadeira e frustre a tentativa contra minha vida."
 tour_grounds_events.1003.a.paranoid: "$murder_outcome.5001.not_my_time$"
 tour_grounds_events.1003.a: "Morra, [fake_assassin_scope.Custom2('InsultNoun', ROOT.Char)]!"
 tour_grounds_1002.assassination_was_fake: "O Assassinato Foi Falso"
 tour_grounds_1002.liege_believed_it_was_real: "[visiting_liege.GetName] Acreditou que o Assassinato Foi Real"
 tour_grounds_1002.liege_played_along: "[visiting_liege.GetName] Ficou Muito Divertido"
 tour_grounds_1002_likes_tt: "Se [visiting_liege.GetName] gosta disso"
 tour_grounds_1002_dislikes_tt: "Se [visiting_liege.GetName] não gosta disso"
 tour_grounds_1002_murder_tt: "Se [visiting_liege.GetName] acredita que é real"
 tour_grounds_events.1003.b: "Eu não sou um trovador! Saiam de cima de mim!"
 tour_grounds_1002.liege_begrudgingly_played_along: "[visiting_liege.GetName] Não Ficou Divertido"
 tour_grounds_events.1003.c: "Eles não vão me levar sem luta!"
 tour_grounds_events.1004.title: "Um Momento nas Selvas"
 tour_grounds_events.1004.desc.intro: "Por um momento, me encontro sozinho nos terrenos de caça selvagem de [touring_grounds_scope.GetNameNoTooltip] com [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)]. Um momento tão raro me permitiria seguir minha paixão por [visiting_liege.GetSheHe]."
 tour_grounds_events.1004.desc.already_shagging: "\n\nEmbora nossos corações e desejos já pertençam um ao outro, ser governantes nos dá muito pouco tempo para perseguir nossa paixão, mas agora temos uma oportunidade de ser como feras na selva."
 tour_grounds_events.1004.desc.trying_to_shag: "\n\nTalvez esta seja finalmente minha oportunidade de expressar meus sentimentos, e se [visiting_liege.GetSheHe] sentir o mesmo, poderíamos finalmente ser mais do que apenas '[visiting_liege.GetTitleAsNameNoTooltip]' e '[ROOT.Char.GetTitleAsNameNoTooltip]', mas amantes nos momentos de paixão."
 tour_grounds_events.1004.desc.outro: "\n\nA vida é feita de momentos, e de vez em quando temos raridades como essas. Posso agir sobre esses sentimentos?"
 tour_grounds_events.1004.a: "Me possua agora!"
 tour_grounds_events.1004.b: "Deixe isso pra lá."
 tour_grounds_events.1005.title: "$tour_grounds_events.1004.title$"
 tour_grounds_events.1005.desc.intro: "Me encontro sozinho nos terrenos de caça de [touring_grounds_scope.GetNameNoTooltip] com [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)], desfrutando do silêncio relativo interrompido apenas pelo chamado ocasional de uma fera próxima."
 tour_grounds_events.1005.desc.already_shagging: "De repente, vejo que [stop_host_scope.GetNameNoTooltip] se lança contra mim como uma [stop_host_scope.Custom('GetAnimalType')] selvagem, me prendendo contra uma pedra, com fogo nos olhos.\n\n“É tão raro conseguir te ver a sós, minha [ROOT.Char.Custom('LoverPetName')], e aqui estamos a sós, com apenas pássaros e feras como testemunhas. Vamos enfim abraçar nossa paixão um pelo outro!”."
 tour_grounds_events.1005.desc.trying_to_shag: "Vejo [stop_host_scope.GetNameNoTooltip] me olhando como se fosse uma [stop_host_scope.Custom('GetAnimalType')] prestes a se lançar sobre sua próxima refeição.\n\n“Meu [ROOT.Char.GetTitleAsNameNoTooltip], devo dizer que tendes um aspecto mais divino que qualquer criatura que eu tenha avistado em semelhante [touring_grounds_scope.Custom('TerrainTypeProvince')]”.\n[stop_host_scope.GetNameNoTooltip] se aproxima de mim com aquele olhar predatório nos olhos e sinto minha abstinência se dissolver."
 tour_grounds_events.1005.desc.outro: "\n\nEstou estupefato[ROOT.Char.Custom('ES_OA')], olhando fixamente para os olhos sedentos do meu [stop_host_scope.GetTitleAsNameNoTooltip]. Seria realmente apropriado a um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]que está em viagem ter um momento de paixão em um lugar como este?"
 tour_grounds_events.1005.a: "Me possua!"
 tour_grounds.moment_in_the_woods: "Você Deu a [visiting_liege.GetName] um Momento para Lembrar"
 tour_grounds_events.1005.b: "Afaste-se de mim, [stop_host_scope.Custom2('InsultNoun', ROOT.Char)] lasciv[stop_host_scope.Custom('ES_OA')]!"
 tour_grounds.rebuffed_in_the_woods: "[visiting_liege.GetName] Rejeitou Suas Investidas"
 tour_grounds_events.1006.title: "Fora de Ordem"
 tour_grounds_events.1006.desc.intro: "Durante a visita de [touring_grounds_scope.GetNameNoTooltip], fico envolvid[GetPlayer.Custom('ES_OA')] em uma conversa com [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre"
 tour_grounds_events.1006.desc.mid.martial: "a glória da guerra e do conflito,"
 tour_grounds_events.1006.desc.mid.learning: "o plano divino [ROOT.Char.GetFaith.HighGodNamePossessive] para a humanidade,"
 tour_grounds_events.1006.desc.mid.stewardship: "as complexidades do governo e contabilidade do estado,"
 tour_grounds_events.1006.desc.mid.diplomacy: "a arte sutil da diplomacia e apaziguamento,"
 tour_grounds_events.1006.desc.mid.intrigue: "a importância da informação e da decepção,"
 tour_grounds_events.1006.desc.outro: "quando sou interrompido por [landless_courtier_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] que parece acreditar saber mais sobre o assunto do que eu.\n\nAinda assim, é bastante inadequado que um mero cortesão[landless_courtier_scope.Custom('ES_OA')] interrompa uma conversa entre [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitleAsNameNoTooltip] de [visiting_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] e seu [ROOT.Char.GetTitleAsNameNoTooltip]."
 tour_grounds_events.1006.a: "Silêncio, seu [stop_host_scope.Custom2('InsultNoun', ROOT.Char)] [stop_host_scope.Custom2('InsultAdjective', ROOT.Char)]."
 tour_grounds_events.1006.b: "Ignore e siga em frente."
 tour_grounds_events.1007.desc.intro: "Durante a visita a [touring_grounds_scope.GetNameNoTooltip], fico envolvid[GetPlayer.Custom('ES_OA')] em uma conversa com [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre"
 tour_grounds_events.1007.desc.outro: "quando é interrompid[stop_host_scope.Custom('ES_OA')] por um[landless_courtier_scope.Custom('ES_OA')] de seus cortesãos.\n\nNão lhe é permitido falar por muito tempo antes que seu [stop_host_scope.GetLadyLord] [landless_courtier_scope.GetHerHim] o faça calar, mas a sabedoria que [landless_courtier_scope.GetSheHe] foi capaz de oferecer demonstra de imediato que sabe muito mais sobre o assunto do que [stop_host_scope.GetNameNoTooltip] jamais poderia sonhar em saber.\n\nSe [stop_host_scope.GetTitledFirstNameNoTooltip|l] não estiver dispost[stop_host_scope.Custom('ES_OA')] a ouvir seu conhecimento, talvez [landless_courtier_scope.GetSheHe] prefira juntar-se à minha corte."
 tour_grounds_events.1007.a: "Junte-se à minha corte!"
 tour_grounds_events.1007.b: "Nunca se deve falar fora de hora."
 tour_grounds_events.1007.c: "Isso é um crime inequívoco!"
 tour_grounds.recruited_my_courtier: "Seduziu [landless_courtier_scope.GetName] a deixar o cargo"
 tour_grounds_events.1017.desc.outro: "quando é interrompid[stop_host_scope.GetHerHim] por um[landless_courtier_scope.Custom('ES_OA')] de seus cortesãos.\n\nEmbora est[landless_courtier_scope.Custom('ES_EA')] humilde cortesã[landless_courtier_scope.Custom('ES_OA')] falou totalmente fora de lugar; por estranho que pareça, [stop_host_scope.GetTitledFirstNameNoTooltip|l] não [landless_courtier_scope.GetHerHim] repreendeu e permitiu que falasse diretamente comigo.\n\nEmbora o que teve a dizer seja bastante interessante, essa infração da etiqueta social me deixou bastante desconcertad[ROOT.Char.Custom('ES_OA')]."
 tour_grounds_events.1017.a: "Eu irei ouvir."
 tour_grounds_events.1008.title: "Histórias de Fantasmas"
 tour_grounds_events.1008.desc.intro: "Enquanto descansamos de nossa viagem, meu jovem [visiting_liege.GetLadyLord] permanece cheio[visiting_liege.Custom('ES_OA')] de energia e exige ser entretido enquanto o resto da comitiva recupera as energias.\n\nFelizmente, [storyteller_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] assume a tarefa com entusiasmo e começa a contar lendas locais. «Oh, há mais neste/a [touring_grounds_scope.Custom('TerrainTypeProvince')] do que os olhos podem ver, [visiting_liege.Custom('GetLassLad')]."
 tour_grounds_events.1008.desc.mid.banshee: "Uma terrível banshee uiva nas terras selvagens de [touring_grounds_scope.GetNameNoTooltip], e cuidado: se você ouvir seu chamado, alguém próximo a você está destinado(a) a encontrar seu fim."
 tour_grounds_events.1008.desc.mid.ghul: "Um monstro ghoul perambula pelos locais de sepultamento de [touring_grounds_scope.GetNameNoTooltip], devorando carne humana, e se ele avistar você, pode decidir que [visiting_liege.GetTitleAsNameNoTooltip] está no cardápio!"
 tour_grounds_events.1008.desc.mid.azdaha: "Um grande e aterrorizante Azhdaha escava logo abaixo de nossos pés, à espera. Quando enxergar sua oportunidade, irromperÉ do cháo com seus enormes dentes horríveis e engolirÉ vocÉ por inteiro!"
 tour_grounds_events.1008.desc.mid.sasabonsam: "O temido Sasabonsam vive por estas partes, provavelmente nos observando agora enquanto falamos, à espreita. Descuide-se e ele descerá dos céus e drenará seu sangue com seus terríveis dentes de ferro até que você fique tão rosado(a) e ensanguentado(a) quanto ele!"
 tour_grounds_events.1008.desc.mid.ankou: "O próprio Ankou perambula por estas partes em sua carruagem dos mortos, coletando almas perdidas e levando-as para onde somente [ROOT.Char.GetFaith.HighGodName] sabe. Esteja atento(a), [visiting_liege.Custom('GetLassLad')], ou ele também te levará."
 tour_grounds_events.1008.desc.mid.witt_wieven: "As mulheres brancas vivem entre nós aqui, procurando pequen[visiting_liege.Custom('ES_OA')]s [visiting_liege.GetLadyLord]s como você para desviá-lo do caminho. Fantasmas de bruxas mortas há muito tempo, elas levarão você embora e farão a obra [ROOT.Char.GetFaith.DevilNamePossessive] em você."
 tour_grounds_events.1008.desc.mid.baba_yaga: "A horripilante bruxa, Baba Yaga, faz sua magia por estas partes. Esteja atento(a) a cabanas que não parecem pertencer aqui, para que ela não devore sua carne e decore com seus ossos."
 tour_grounds_events.1008.desc.mid: "Há muitas coisas terríveis vagando por estas paragens, coisas que não são naturais. Monstros maiores do que qualquer mera fera que não gostariam de nada mais do que acrescentar um[visiting_liege.Custom('ES_XA')] pequen[visiting_liege.Custom('ES_OA')] [visiting_liege.GetTitleAsNameNoTooltip] à sua dieta."
 tour_grounds_events.1008.desc.outro: "\n\nOs contos de gosto duvidoso de [storyteller_scope.GetFirstNameNoTooltip] estão tendo um impacto visível em [visiting_liege.Custom('ES_ElLa')] pequen[visiting_liege.Custom('ES_OA')] [visiting_liege.GetFirstNameNoTooltip] , talvez eu devesse intervir."
 tour_grounds_events.1008.a: "E então, o que acontece?"
 tour_grounds_events.1008.b: "Silêncio, [storyteller_scope.GetFirstNameNoTooltip]!"
 tour_grounds_events.1009.title: "$tour_grounds_events.1008.title$"
 tour_grounds_events.1009.desc.intro: "Os membros mais velhos da nossa comitiva param para descansar da viagem, mas eu continuo che[ROOT.Char.Custom('ES_OA')] de vigor e estou ficando impaciente com esses velhotes apáticos.\n\nFelizmente, [storyteller_scope.GetName] parece estar ansioso para me entreter com histórias assustadoras deste lugar. "Ah, há mais neste/a [touring_grounds_scope.Custom('TerrainTypeProvince')] do que aparenta, [visiting_liege.Custom('GetLassLad')]."
 tour_grounds_events.1009.desc.mid.finished: "\n\n[stop_host_scope.GetName] logo se junta à contação de histórias, e fico absorto nos dois em relatos que me deixam mais do que um pouco amedrontad[ROOT.Char.Custom('ES_OA')]."
 tour_grounds_events.1009.desc.outro.interrupted: "\n\nJusto quando a história estava ficando interessante, [stop_host_scope.GetName] interrompe a história e insiste que [storyteller_scope.GetNameNoTooltip] não pode ir adiante e me assegura que toda a história não passa de bobagem."
 tour_grounds_events.1009.a: "Que ótima história!"
 tour_grounds_events.1009.b: "Isso foi horrível."
 tour_grounds_events.1009.c: "Você parou na melhor parte!"
 tour_grounds_events.1009.d: "Graças a Deus que você parou."
 tour_grounds_events.1010.title: "[rival_courtier.GetFirstNameNoTooltip]: O Corcel Leal"
 tour_grounds_events.1010.desc: "Ao cavalgar o dia inteiro pelas terras em nossas respectivas montarias, de repente me ocorre uma ideia inspirada!\n\nTodo mundo conhece a rivalidade entre [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] e [rival_courtier.GetName], com certeza capturar seu rival e fazer[rival_courtier.GetHerHim] selá-lo e fazê-lo cavalgar como se fosse um cavalo me faria cair nas graças de minha [visiting_liege.GetTitleAsNameNoTooltip]!\n\nO único desafio, é claro, seria trazer[rival_courtier.GetHerHim] até aqui, mas eu tenho meus meios…"
 tour_grounds_events.1010.a: "Vamos fazer isso!"
 tour_grounds_events.1010.b: "Os riscos são muito grandes."
 tour_grounds_events.1011.title: "$tour_grounds_events.1010.title$"
 tour_grounds_events.1011.desc: "Ao cavalgar pelas terras de [touring_grounds_scope.GetNameNoTooltip], sou subitamente barrad[ROOT.Char.Custom('ES_OA')] de repente no meio da estrada pelo meu anfitri[stop_host_scope.Custom('ES_OnOna')] , [stop_host_scope.GetName].\n\nParece que conseguiu capturar [rival_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] e [rival_courtier.GetHerHim] o(a) deixou selad[rival_courtier.Custom('ES_OA')] como se fosse um cavalo, pront[rival_courtier.Custom('ES_OA')] para que eu o(a) monte e cavalgue pelo campo!\n\nEmbora seja uma excelente oportunidade para mostrar minha superioridade inata, será que eu realmente vou me rebaixar tanto?"
 tour_grounds_events.1011.a: "Claro que sim!"
 tour_grounds_events.1011.b: "Até [rival_courtier.GetFirstNameNoTooltip] não merece essa humilhação."
 tour_grounds_events.1012.title: "Um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip] com cara de [stop_host_scope.Custom('get_region_root_vegetable')]"
 tour_grounds_events.1012.desc: "Nosso humilde lar carece das comodidades e da grandiosidade às quais sem dúvida está acostumad[visiting_liege.Custom('ES_OA')] [visiting_liege.GetName], mas o que nos falta em extravagância compensamos com folga em hospedagem e generosidade.\n\nEu temia ter de mostrar minhas terras ao meu [visiting_liege.GetTitleAsNameNoTooltip] sem nenhum presente, mas de repente avisto um próspero exemplar de [ROOT.Char.Custom('get_region_root_vegetable')] que milagrosamente se parece exatamente com [visiting_liege.GetNameNoTooltip]! Sem dúvida [visiting_liege.GetSheHe] se lembrará para sempre de sua visita a [touring_grounds_scope.GetNameNoTooltip] se partir com seu sósia em forma de [ROOT.Char.Custom('get_region_root_vegetable')]! Embora possa facilmente se ofender por eu [visiting_liege.GetHerHim] compará-lo a um [ROOT.Char.Custom('get_region_root_vegetable')]."
 tour_grounds_events.1012.a: "E eu pensei que o presente perfeito não existisse."
 tour_grounds_events.1012.b: "Descarte silenciosamente o [ROOT.Char.Custom('get_region_root_vegetable')]."
 tour_grounds_events.1012.c: "Isso deve valer uma fortuna!"
 tour_grounds_events.1012.d: "Guarde para uso pessoal."
 turnip_that_looks_like_liege: "[visiting_liege.Custom('ES_ElLa')|U] [ROOT.Char.Custom('get_region_root_vegetable')] [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitleAsNameNoTooltip]"
 turnip_that_looks_like_liege_description: "Uma simples [ROOT.Char.Custom('get_region_root_vegetable')] que se assemelha de forma impressionante a [visiting_liege.GetName]."
 tour_grounds_events.1013.title: "$tour_grounds_events.1012.title$"
 tour_grounds_events.1013.desc: "[touring_grounds_scope.GetNameNoTooltip] é um lugar muito diferente do que eu consideraria uma região civilizada. Quase ninguém chama este lugar de lar e as comodidades deixam muito a desejar.\n\nHoje, [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitleAsNameNoTooltip] pensou que me impressionaria me apresentando um simples exemplar de [stop_host_scope.Custom('get_region_root_vegetable')] que ele jura que se parece comigo.\n\nReviro os olhos, mas não demora muito para eu notar a semelhança…"
 tour_grounds_events.1013.a: "Que objeto maravilhoso!"
 tour_grounds.liege_impressed: "[visiting_liege.GetName] ficou impressionad[visiting_liege.Custom('ES_OA')]"
 tour_grounds_events.1013.b: "Nojento. Livre-se disso."
 tour_grounds.liege_insulted: "[visiting_liege.GetName] foi insultad[visiting_liege.Custom('ES_OA')]"
 tour_grounds_events.1014.title: "[visiting_liege.GetNameNoTooltip]: O Pequeno Caçador [Select_CString( visiting_liege.IsFemale, 'la pequeña cazadora', 'el pequeño cazador' )]"
 tour_grounds_events.1014.desc: "[visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] parece estar com vontade de fazer uma caçada por [touring_grounds_scope.GetNameNoTooltip] em busca de caça e glória como [Select_CString( visiting_liege.IsFemale, 'una adulta', 'un adulto' )].\n\nNo entanto, não posso, em sã consciência, permitir que um[visiting_liege.Custom('ES_XA')] [visiting_liege.Custom('GirlBoy')] tão jovem corra por um lugar onde um/a [ROOT.Char.Custom('GetAnimalType')] possa ser dilacerado(a) vivo(a) por um(a) [visiting_liege.GetHerHim].\n\nAinda assim, eu poderia agradar o(a) [visiting_liege.Custom('ES_AlAla')] jovem [visiting_liege.GetLadyLord] preparando uma caça de mentira, sem o perigo de animais de verdade."
 tour_grounds_events.1014.a: "Tenho certeza de que[ROOT.Char.Custom('ES_OA')] vai adorar!"
 tour_grounds_events.1014.b: "Que desperdício de tempo."
 tour_grounds_events.1015.title: "Uma Caçada Falsa"
 tour_grounds_events.1015.desc: "Estou ansioso para vagar ao ar livre e caçar uma presa, como se espera de qualquer [ROOT.Char.GetTitleAsNameNoTooltip|l], e até agora meus anciãos e tutores me negaram essa oportunidade.\n\nNo entanto, hoje [stop_host_scope.GetName] entrou em contato comigo e me ofereceu testar as terras de [touring_grounds_scope.GetNameNoTooltip] como [Select_CString( visiting_liege.IsFemale, 'toda una cazadora', 'todo un cazador' )]!\n\nQuando chego aos terrenos de caça, não sou recebido por um/a [stop_host_scope.Custom('GetAnimalType')] feroz, mas por um pedaço de madeira pintado para se parecer com um/a [stop_host_scope.Custom('GetAnimalType')]."
 tour_grounds_events.1015.a: "Vou abater a fera!"
 tour_grounds_events.1015.b: "Isso é algum tipo de piada?"
 tour_grounds_events.1015.c: "Exija [stop_host_scope.Custom('GetAnimalType')] verdadeiro para abater."
 tour_grounds_events.1016.title: "A Verdadeira Caçada"
 tour_grounds_events.1016.desc: "Minhas exigências são atendidas e logo sou recebido(a) por uma verdadeira fera para abater. Sob o meu comando, a fera é solta de suas amarras e eu fico sozinho(a) para enfrentar o monstro com meu arco.\n\nRespiro fundo e disparo, rezando para que minha flecha acerte o alvo."
 tour_grounds_events.1016.a: "Minha mira é certeira!"
 tour_grounds.killed_boar: "Eu Abato o Animal"
 tour_grounds.mauled_by_boar: "Eu Errei"
 #Liege Events
 tour_grounds_events.3001.title: "Visitando os terrenos [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]"
 tour_grounds_events.3001.desc.intro: "Minha chegada à [stop_host_scope.Custom('FortifiedBuilding')] [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l] em [touring_grounds_scope.GetProvince.GetName] é marcada por uma fanfarra digna de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip] do reino,"
 tour_grounds_events.3001.desc.type.majesty: "e os habitantes claramente se impressionam com a grandiosidade e pompa do meu séquito.\n\n"
 tour_grounds_events.3001.desc.type.taxation: "e a presença da minha carroça de tesouro e dos coletores de impostos rapidamente é notada.\n\n"
 tour_grounds_events.3001.desc.type.intimidation: "enquanto a disciplina rigorosa dos meus muitos guardas causa alguma hesitação nos meus súditos.\n\n"
 tour_grounds_events.3001.desc.mid.hates_vassal: "Compartilhar as acomodações de tal [visiting_liege.Custom2('InsultNoun', ROOT.Char)] [stop_host_scope.Custom2('InsultAdjective', ROOT.Char)] é uma necessidade desagradável; tomara que acabe logo."
 tour_grounds_events.3001.desc.mid.lover: "Dói-me ter que lidar com formalidades públicas com a minha amada — se ao menos houvesse tempo para nos encontrarmos a sós..."
 tour_grounds_events.3001.desc.mid.friend: "Embora tenhamos de lidar com o peso das formalidades, visitar um bom[stop_host_scope.Custom('ES_XA')] amig[stop_host_scope.Custom('ES_OA')] é sempre um alívio bem-vindo."
 tour_grounds_events.3001.desc.mid.close_family: "Meu [ROOT.Char.Custom2('RelationToMeShort', stop_host_scope)] e eu nos abraçamos, tomando o cuidado de manter devidamente a formalidade da ocasião."
 tour_grounds_events.3001.desc.mid.house: "Uma oportunidade de ver meu [ROOT.Char.Custom2('RelationToMeShort', stop_host_scope)], e verificar se sua situação está à altura da nobreza da casa [ROOT.Char.GetHouse.GetBaseName]."
 tour_grounds_events.3001.desc.mid.powerful_vassal: "Dou o devido reconhecimento de sua importância entre os vassalos do senhorio [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip], até certo ponto…"
 tour_grounds_events.3001.desc.mid.default: "Meu vassal[stop_host_scope.Custom('ES_OA')] me recebe diligentemente com toda a deferência necessária."
 tour_grounds_events.3001.desc.mid: "\n\n[stop_host_scope.GetFirstNameNoTooltip] descreve o percurso planejado e me assegura que [stop_host_scope.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] é uma terra tão bela e formosa que a mera contemplação de suas cidades e campos será entretenimento suficiente."
 tour_grounds_events.3001.desc.outro: "\n\nSó o tempo dirá."
 tour_grounds_events.3001.a: "Vamos começar!"
 tour_grounds_events.3002.title: "Habilidade de Caça"
 tour_grounds_events.3002.desc.intro: "Quando continuo meu tour pelas terras de [touring_grounds_scope.GetNameNoTooltip] meu [Select_CString( stop_host_scope.IsFemale, 'anfitriona', 'anfitrión' )] decide assumir pessoalmente a tarefa de exibir sua destreza na caça. Com a atenção de todos voltada para [stop_host_scope.GetSheHe],"
 tour_grounds_events.3002.desc.mid.crit: "[stop_host_scope.GetNameNoTooltip] atravessa um espécime distante de [stop_host_scope.Custom('GetAnimalType')] pelo crânio com um único tiro.\n\nEnquanto todos parecem impressionados, isso pode ser"
 tour_grounds_events.3002.desc.mid.succ: "[stop_host_scope.GetNameNoTooltip] mata [stop_host_scope.Custom('GetAnimalType')] próximo(a) com o que parece ser pouco esforço.\n\nEmbora todos pareçam impressionados, isso pode ser"
 tour_grounds_events.3002.desc.mid.fail: "[stop_host_scope.GetNameNoTooltip] nem sequer arranha o alvo, para diversão de minha comitiva.\n\nEnquanto todos riem, eu vejo"
 tour_grounds_events.3002.desc.outro: "uma oportunidade de superar minha [Select_CString( stop_host_scope.IsFemale, 'anfitriona', 'anfitrión' )] e mostrar a todos como um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]!"
 tour_grounds_events.3002.a: "sou [GetPlayer.Custom('ES_ElLa')] melhor caçador[GetPlayer.Custom('ES_XA')]."
 tour_grounds_events.3002.b: "Parabéns, [stop_host_scope.GetNameNoTooltip]."
 tour_grounds_events.3003.title: "Presas Precárias"
 tour_grounds_events.3003.desc.intro: "Com meu arco de caça ao lado, um membro do meu grupo me alerta sobre a presença de um/a [stop_host_scope.Custom('GetAnimalType')] logo abaixo de um barranco próximo à nossa localização. Se eu me posicionar bem à beira do penhasco, deverei ser capaz de atravessar seu coração.\n\n"
 tour_grounds_events.3003.desc.mid.high_skill: "Para [Select_CString( ROOT.Char.IsFemale, 'uma caçadora diestra', 'um caçador diestro' )] como eu, deveria ser fácil, mas não sem risco."
 tour_grounds_events.3003.desc.mid.low_skill: "Parece ser um tiro difícil, mas se eu acertar, sem dúvida impressionarei toda a minha comitiva."
 tour_grounds_events.3003.desc.outro: "O solo parece um pouco instável, mas com cuidado ao pisar, devo ser capaz de abater a fera sem problemas."
 tour_grounds_events.3003.a: "Isso deve ser fácil."
 tour_grounds_events.3003.b: "Vamos deixar outra pessoa fazer o tiro."
 tour_grounds_events.3004.title: "Meu [visiting_liege.GetTitleAsNameNoTooltip|U] , [Select_CString( visiting_liege.IsFemale, 'la Cazadora', 'el Cazador' )]"
 tour_grounds_events.3004.desc.intro: "Enquanto percorria as terras, [visiting_liege.GetName] arriscou um tiro arriscado do topo de um penhasco em direção a um exemplar de [stop_host_scope.Custom('GetAnimalType')] logo abaixo."
 tour_grounds_events.3004.desc: "Embora por um momento tenha parecido que cairia, rapidamente recuperou o equilíbrio e disparou contra a besta, abatendo-a imediatamente.\n\nTodos no grupo parecem encantados e impressionados pela destreza de caça de seu [visiting_liege.GetTitleAsNameNoTooltip]. [visiting_liege.GetSheHe|U] se aproxima de mim, com sangue pingando da caça recém-abatida, esperando algum tipo de congratulação."
 tour_grounds_events.3004.a: "Uma bela tacada, meu [visiting_liege.GetTitleAsNameNoTooltip]."
 tour_grounds_events.3004.b: "Eu deveria estar impressionado(a)?"
 tour_grounds_events.3005.title: "Um Risco Recompensado"
 tour_grounds_events.3005.desc.intro: "Meu equilíbrio se mantém e minha mira ainda mais certeira, quando abato a fera com uma única flecha sem nem mesmo tropeçar no precipício perigoso. A equipe de caça parece impressionada, os terrenos cheios de aplausos dos meus companheiros.\n\n"
 tour_grounds_events.3005.desc.mid.congrats: "Meu [Select_CString( stop_host_scope.IsFemale, 'anfitriona', 'anfitrión' )], [stop_host_scope.GetName] vem me felicitar pessoalmente pela minha presa. Com esse assunto resolvido, junto minha presa ao resto e continuo meu passeio pelas terras."
 tour_grounds_events.3005.desc.mid.insult: "No entanto, a minha [Select_CString( stop_host_scope.IsFemale, 'anfitriona', 'anfitrión' )][stop_host_scope.GetName] ,"
 tour_grounds_events.3005.a: "Excelente."
 tour_grounds_events.3005.a.bad: "Mas que [stop_host_scope.Custom2('InsultNoun', ROOT.Char)] tão petulante."
 tour_grounds_events.3006.title: "Um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip] cambaleante"
 tour_grounds_events.3006.desc: "Por um momento, deu a impressão de que [visiting_liege.GetSheHe] atingiria seu objetivo, mas, quando começa a perder o equilíbrio, fica claro que ferimento e vergonha logo se seguirão.\n\nClaro, eu poderia me jogar para salvar meu [visiting_liege.GetLadyLord], mas isso me colocaria em risco de me ferir."
 tour_grounds_events.3006.a: "Devo proteger meu [visiting_liege.GetTitleAsNameNoTooltip]!"
 tour_grounds_events.3006.b: "Que caia."
 tour_grounds_events.3006.c: "[visiting_liege.GetHerHim] afasto para fazer o tiro eu mesmo!"
 tour_grounds_events.3007.title: "$tour_grounds_events.3006.title$"
 tour_grounds_events.3007.desc.intro: "Infelizmente, meu equilíbrio não parece firme o bastante e sinto meu corpo deixar a terra, à mercê da criação [ROOT.Char.GetFaith.CreatorNamePossessive].\n\n"
 tour_grounds_events.3007.desc.mid.protected: "No entanto, [stop_host_scope.GetName] me agarra rapidamente e me coloca de volta de pé, enquanto meu salvador[stop_host_scope.Custom('ES_XA')] cai de rosto em seu valente esforço."
 tour_grounds_events.3007.desc.mid.fell: "Me viro no ar, em plena queda, para ver [stop_host_scope.GetName] contemplar tão tranquil[stop_host_scope.Custom('ES_OA')] como seu [ROOT.Char.GetTitleAsNameNoTooltip] cai. Quando meu corpo se reúne com o chão, sinto minha pele se rasgar e meu sangue divino se derramar pelo chão."
 tour_grounds_events.3007.desc.mid.took_the_shot: "Giro no meio do voo para ver como [stop_host_scope.GetName] ocupa meu lugar. Não apenas não faz nada para me salvar, como também assume o tiro por si mesmo! Quando meu corpo aterrissa com um estrondo no chão, ouço aplausos. Está claro que [stop_host_scope.GetNameNoTooltip] teve sucesso onde eu falhei e tenho de me contorcer de dor e vergonha."
 tour_grounds_events.3007.a: "Acho que já fiz o suficiente por hoje."
 tour_grounds_events.3008.title: "Um Incidente a Cavalo"
 tour_grounds_events.3008.desc: "Cavalo pelos terrenos de [touring_grounds_scope.GetNameNoTooltip], mal tendo um pensamento em minha mente satisfeita.\n\nDe repente, sou trazido(a) de volta à realidade quando uma criança corre à frente de meu corcel, com os braços agitados em reverência ao ver seu [ROOT.Char.GetTitleAsNameNoTooltip]. Sua aparição é tão repentina que mal tenho tempo para reagir ou mesmo processar se é uma criança que conheço. Com as mãos suadas nas rédeas, devo reagir!"
 tour_grounds_events.3008.a: "Tente evitá-los."
 tour_grounds_events.3008.b: "Nada pode ficar no caminho do meu passeio."
 tour_grounds_events.3009.title: "Um Atropelamento Real"
 tour_grounds_events.3009.desc.intro: "É mais um dia da visita de [visiting_liege.GetName], e, embora as coisas tenham começado bem, um[trampled_child_scope.Custom('ES_XA')] [trampled_child_scope.GetName] sem supervisão correu na frente do cavalo de [visiting_liege.GetNameNoTooltip] e foi imediatamente pisotead[trampled_child_scope.Custom('ES_OA')].\n\nO mais chocante é que [visiting_liege.GetNameNoTooltip] não fez nenhuma tentativa visível de impedir que isso acontecesse."
 tour_grounds_events.3009.desc.mid.my_kid: "Sou obrigad[GetPlayer.Custom('ES_OA')] a ver meu próprio sangue sendo pisoteado sob os cascos de uma besta monstruosa."
 tour_grounds_events.3009.desc.mid.not_my_kid: "Não consigo desviar o olhar a tempo antes que [trampled_child_scope.Custom('ES_ElLa')] pobre criança[trampled_child_scope.Custom('ES_OA')] seja atropelad[trampled_child_scope.Custom('ES_OA')] sob os cascos de um monstro."
 tour_grounds_events.3009.desc.outro.my_kid_dead: "Quando a terrível provação chega ao fim, vejo o corpo sem vida de meu [ROOT.Char.Custom2('RelationToMeShort',trampled_child_scope)] reduzido a pouco mais que uma polpa ensanguentada no chão."
 tour_grounds_events.3009.desc.outro.not_my_kid_dead: "Quando a terrível provação chega ao fim, [trampled_child_scope.Custom('ES_ElLa')] pobre crianç[trampled_child_scope.Custom('ES_OA')] parece imóvel, em uma poça de seu próprio sangue."
 tour_grounds_events.3009.desc.outro.alive: "Por sorte, [trampled_child_scope.GetNameNoTooltip] sai dessa provação ainda viv[trampled_child_scope.Custom('ES_OA')], mas não sem ferimentos."
 tour_grounds_events.3009.a.callous: "Nada a ver comigo."
 tour_grounds_events.3009.a: "Que vil!"
 tour_grounds_events.3009.b: "[visiting_liege.GetNameNoTooltip] é um monstro."
 tour_grounds.trampled_child_nemesis: "[stop_host_scope.GetNameNoTooltip] Jurou Vingança"
 tour_grounds_events.3010.title: "Um Corcel Inconfiável"
 tour_grounds_events.3010.desc.intro: "Meu passeio pelos terrenos de [touring_grounds_scope.GetNameNoTooltip] é interrompido bruscamente quando sinto meu valioso cavalo tropeçar em uma pedra. Embora ele se recupere rapidamente, e eu apenas perca momentaneamente o equilíbrio, posso ouvir membros da minha comitiva rindo atrás de mim.\n\n"
 tour_grounds_events.3010.desc.mid.irritable: "Sinto-me traicionad[ROOT.Char.Custom('ES_OA')] pelo meu suposto corcel tão valioso, e sinto uma mistura de humilhação e raiva borbulhar em minhas entranhas."
 tour_grounds_events.3010.desc.mid.calm: "Sinto-me um pouco envergonhad[ROOT.Char.Custom('ES_OA')] mas sei que, na verdade, não é culpa do animal."
 tour_grounds_events.3010.desc.outro: "Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] deve projetar uma aura de realeza intocável e impor respeito a todos os seus súditos, e este incidente arruinou minha imagem de perfeição."
 tour_grounds_events.3010.a: "Mande matar a besta e me traga outra!"
 tour_grounds_events.3010.b: "Todos cometem erros."
 tour_grounds_events.3011.title: "$tour_grounds_events.3010.title$"
 tour_grounds_events.3011.desc.intro: "Enquanto cavalgava pelos terrenos com [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)], seu corcel tropeçou em uma pedra, o que o desequilibrou momentaneamente. Quando alguns membros da comitiva começavam a rir, [visiting_liege.GetNameNoTooltip] desmontou"
 tour_grounds_events.3011.desc.mid.irritable: "em um acesso de raiva e corta brutalmente a garganta do pobre animal, observando enquanto a vida escorre de seu corpo."
 tour_grounds_events.3011.desc.mid.calm: "e cuidadosamente dispara uma flecha entre os olhos da pobre besta."
 tour_grounds_events.3011.desc.outro: "\n\n\"Não tenho uso para bestas ou súditos que me falham. Eu sempre posso conseguir outro.\""
 tour_grounds_events.3011.a: "Posso conseguir outro para vós, meu [visiting_liege.GetLadyLord]!"
 tour_grounds_3011.vassal_paid_for_new_horse: "[stop_host_scope.GetNameNoTooltip] Ofereceu-se para Comprar um Novo Cavalo"
 tour_grounds_events.3011.b: "Entendido."
 tour_grounds_3011.vassal_did_not_pay: "Comprei um Novo Cavalo"
 tour_grounds_events.3012.title: "Caçadores ilegais!"
 tour_grounds_events.3012.desc.intro: "Enquanto eu e minha comitiva cavalgamos, ouço murmúrios ecoando pelos terrenos. Ordeno a um menino que vá adiante e, quando ele retorna, ele me informa que há uma gangue de caçadores ilegais logo à nossa frente.\n\n"
 tour_grounds_events.3012.desc.mid.sadistic: "Isso apresenta uma oportunidade ideal para infligir dor justificada a algumas almas desprevenidas e ao mesmo tempo agradar [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 tour_grounds_events.3012.desc.mid: "Embora isso não seja da minha preocupação, certamente me agradaria agradar [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] se eu eliminasse essa atividade ilegal dos terrenos."
 tour_grounds_events.3012.desc.outro: "\n\nEu poderia reunir esses vagabundos e apresentar suas cabeças e mãos a [stop_host_scope.GetNameNoTooltip] sem muita dificuldade."
 tour_grounds_events.3012.a: "Hora de uma caçada."
 tour_grounds_events.3012.b: "Deixe-os ir, mediante uma taxa."
 tour_grounds_events.3012.c: "Evite-os."
 tour_grounds_events.3013.title: "Um Saco de Membros"
 tour_grounds_events.3013.desc: "Estou separado de[ROOT.Char.Custom('ES_OA')] de [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] e, quando nos reunimos, [visiting_liege.GetHerHim] o vejo cavalgando com vários sacos que gotejam algo vermelho.\n\nEle esvazia os sacos aos meus pés e observo horrorizado[ROOT.Char.Custom('ES_OA')] saírem as mãos e cabeças decepadas de alguns infelizes, seus rostos congelados para sempre em uma expressão de terror.\n\nꡟ«Tomei a liberdade de livrar suas terras de caçadores furtivos e ladrões. Não precisa agradecer, amig[ROOT.Char.Custom('ES_OA')]»."
 tour_grounds_events.3013.a: "Obrigado, meu [visiting_liege.GetLadyLord]."
 tour_grounds.vassal_impressed: "[stop_host_scope.GetFirstNameNoTooltip] está impressionad[stop_host_scope.Custom('ES_OA')]."
 tour_grounds_events.3013.b: "Que horror!"
 tour_grounds.vassal_horrified: "[stop_host_scope.GetFirstNameNoTooltip] fica horrorizad[stop_host_scope.Custom('ES_OA')]."
 tour_grounds_events.3014.title: "Extravagância Tributável"
 tour_grounds_events.3014.desc: "Ao ser levado para ver as atrações de [touring_grounds_scope.GetNameNoTooltip], começo a notar a opulência absoluta de tudo isso.\n\nEmbora seja apenas um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.GetTitleAsNameNoTooltip], [stop_host_scope.GetFirstNameNoTooltip] vive em luxo relativo e claramente tem dinheiro mais do que suficiente para dar e vender.\n\nAo ver a quantidade absurda de janelas de sua morada, eu poderia instituir um imposto sobre janelas e sangrar [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitleAsNameNoTooltip|U] de seu excesso."
 tour_grounds_events.3014.a: "Imposto sobre janelas, então."
 tour_grounds_events.3014.b: "Vou perdoá-lo por enquanto."
 tour_grounds_events.3015.title: "O Imposto sobre Janelas"
 tour_grounds_events.3015.desc: "Tenho sido meticuloso[ROOT.Char.Custom('ES_OA')] ao mostrar a [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] todas as magníficas vistas a contemplar em [touring_grounds_scope.GetNameNoTooltip], acreditando-me um grande anfitrião[ROOT.Char.Custom('ES_OnOna')].\n\nNo entanto, percebo que dirige sua atenção aos meus aposentos e os aponta com um gesto enquanto murmura algo para si. [visiting_liege.GetHerHim|U] interrogo-o e ele sorri.\n\n“Ah, eu estava apenas contando as janelas. Você conhece o imposto obrigatório sobre janelas, não conhece? Ele remonta à própria fundação de [visiting_liege.GetPrimaryTitle.GetNameNoTooltip], e eu não poderia deixar passar um número tão irracional de janelas sem a devida tributação.”"
 tour_grounds_events.3015.a: "Tudo bem, pagarei seu imposto sobre janelas."
 tour_grounds.vassal_paid_tax: "[stop_host_scope.GetName] Pagou o Imposto"
 tour_grounds_events.3015.b: "Um imposto sobre janelas, o quê?"
 tour_grounds.vassal_refused_to_pay_tax: "[stop_host_scope.GetName] Recusou o Imposto"
 tour_grounds.vassal_won_tax_duel: "[stop_host_scope.GetName] Evitou o Imposto"
 tour_grounds_events.3016.title: "Um Lembrança"
 tour_grounds_events.3016.desc: "Finalmente consigo ficar a sós nas terras selvagens de [touring_grounds_scope.GetNameNoTooltip] e minha mente divaga em pensamentos sobre [liege_lover_scope.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\nNão posso negar que [touring_grounds_scope.GetNameNoTooltip] é um lugar de verdadeira beleza, quase tão belo quanto meu amado [liege_lover_scope.GetNameNoTooltip]. Sinto-me obrigad[ROOT.Char.Custom('ES_OA')] a deixar aqui uma marca para que todos os que passem por [touring_grounds_scope.GetNameNoTooltip] saibam do amor que sinto por [liege_lover_scope.GetSheHe]. Talvez entalhando o nome dele/dela em um/a [touring_grounds_scope.Custom('get_carvable_surface')]!"
 tour_grounds_events.3016.a: "Assim será feito."
 tour_grounds_events.3016.b: "Não, este lugar é perfeito como está."
 tour_grounds_events.3017.title: "Profanado"
 tour_grounds_events.3017.desc: "Por fim, alcanço meu [visiting_liege.GetTitleAsNameNoTooltip] e, para meu horror, vejo [visiting_liege.GetHerHim] gravando o nome de [touring_grounds_scope.Custom('get_carvable_surface')].\n\nSem dúvida, não fazia ideia de que este/a [touring_grounds_scope.Custom('get_carvable_surface')] em particular tem grande significado espiritual para os moradores locais, e se descobrirem que seu/sua [visiting_liege.GetTitleAsNameNoTooltip] vandalizou um lugar tão sagrado, amaldiçoarão o nome de [visiting_liege.GetName] por gerações!"
 tour_grounds_events.3017.a: "Uma pena."
 tour_grounds_events.3017.b: "Eu assumirei a culpa!"
 tour_grounds_events.3018.title: "$tour_grounds_events.3017.title$"
 tour_grounds_events.3018.desc: "Estou esculpindo alegremente na [touring_grounds_scope.GetProvince.Custom('get_carvable_surface')] quando ouço um suspiro repentino vindo de meu lado.\n\n[stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] parece absolutamente horrorizad[stop_host_scope.Custom('ES_OA')] ao contemplar minha obra, e logo se aproxima para me explicar.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], não tenho dúvidas de que ignorais que este/a [touring_grounds_scope.GetProvince.Custom('get_carvable_surface')] é considerado um objeto sagrado para os habitantes de [touring_grounds_scope.GetNameNoTooltip]!"
 tour_grounds_events.3018.desc.outro.took_the_blame: "Não tema, assumirei a culpa por este. Apenas não mencione isso novamente."
 tour_grounds_events.3018.desc.outro.blamed_liege: "Os camponeses e o clero de [touring_grounds_scope.GetNameNoTooltip] amaldiçoarão seu nome pela eternidade por sua profanação!"
 tour_grounds_events.3018.a.took_blame: "Obrigado."
 tour_grounds_events.3018.a.was_blamed: "Por que um [touring_grounds_scope.GetProvince.Custom('get_carvable_surface')] nunca é apenas um [touring_grounds_scope.GetProvince.Custom('get_carvable_surface')]?"
 tour_grounds_events.3019.title: "Extras Tributáveis"
 tour_grounds_events.3019.desc: "[touring_grounds_scope.GetNameNoTooltip] parece um lugar verdadeiramente opulento e exagerado, com um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.GetTitleAsNameNoTooltip] desmesurad[stop_host_scope.Custom('ES_OA')] como governante.\n\nPor onde quer que eu olhe, vejo sinais que apontam para uma coisa: comodidades tributáveis não declaradas. A contagem de cabeças de gado parece muito maior do que a reportada, a residência [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitleAsNameNoTooltip] é quase luxuosa o bastante para um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]!\n\n[greedy_entourage_member.GetName] me sugere que eu deveria taxar esse excesso, pois é evidente que [stop_host_scope.GetName] não tem pago o que lhe cabe."
 tour_grounds_events.3019.a: "Tributem [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitleAsNameNoTooltip]!"
 tour_grounds_events.3019.b: "Vou relevá-los por enquanto."
 tour_grounds_events.3020.title: "$tour_grounds_events.3019.title$"
 tour_grounds_events.3020.desc: "[visiting_liege.GetName] havia estado um pouco distante e distraíd[visiting_liege.Custom('ES_OA')] ultimamente, murmurando para si em algumas ocasiões e sussurrando para [greedy_entourage_member.GetName]. Por fim, aproxima-se diretamente de mim e me diz sem rodeios o que estava pensando.\n\n«Como [stop_host_scope.GetTitleAsNameNoTooltip], deveis estar ciente de vossas obrigações financeiras para comigo, vostr[visiting_liege.Custom('ES_OA')] [visiting_liege.GetLadyLord]. Ao contemplar a grandeza de sua casa, não posso deixar de pensar que vocês sonegaram um pouco nos impostos. Talvez seja hora de corrigir isso»."
 tour_grounds_events.3020.a: "Eu paguei o que devo!"
 tour_grounds_events.3020.b: "Muito bem."
 tour_grounds_events.3040.title: "Súditos Desleais"
 tour_grounds_events.3040.desc.intro: "Tenho curiosidade de ver como a ralé de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], então visito um estabelecimento onde os locais parecem estar ficando bem alvoroçados. Um homem em pé sobre uma mesa chama a atenção de todos que o ouvem.\n\n"E para que precisamos de um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.GetTitleAsNameNoTooltip|l]? E aí,[stop_host_scope.GetFirstName]"
 tour_grounds_events.3040.desc.mid.wrong_language: "nem falam nossa língua,"
 tour_grounds_events.3040.desc.mid.wrong_culture: "é [Select_CString( stop_host_scope.IsFemale, 'uma maldita estrangeira', 'um maldito estrangeiro' )],"
 tour_grounds_events.3040.desc.mid.wrong_faith: "é um [stop_host_scope.GetFaith.GetAdherentName] maldito destinado ao [angry_peasant.GetFaith.NegativeAfterLife],"
 tour_grounds_events.3040.desc.mid.shit_beer: "nos alimenta com essa porcaria de [angry_peasant.Custom('RegionalAlcoholicDrink')],"
 tour_grounds_events.3040.desc.mid.shit_weed: "nos enche com haxixe barato e espera que fiquemos quietos,"
 tour_grounds_events.3040.desc.mid.conscription: "nos faz lutar as suas batalhas enquanto [stop_host_scope.GetSheHe] descansa sobre seus louros,"
 tour_grounds_events.3040.desc.mid.high_taxes: "nos suga até a última gota com esses malditos impostos,"
 tour_grounds_events.3040.desc.mid.just_plain_dislike_em: "é o ápice de [stop_host_scope.Custom2('InsultNoun', ROOT.Char)] [stop_host_scope.Custom2('InsultAdjective', ROOT.Char)] que já vi,"
 tour_grounds_events.3040.desc.outro: "e, no entanto, [stop_host_scope.GetSheHe] espera nossa lealdade eterna!".\n\nTodo o prédio explode em aplausos. Está claro que meu [stop_host_scope.GetTitleAsNameNoTooltip|l] não é popular em sua própria casa."
 tour_grounds_events.3040.a: "Prendam esses traidores!"
 tour_grounds_events.3040.b: "Não fale mal [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitleAsNameNoTooltip|l]! Em guarda!"
 tour_grounds_events.3040.c: "Esses camponeses têm a ideia certa."
 tour_grounds_events.3050.title: "Uma Lição Dura"
 tour_grounds_events.3050.desc: ""Me dê meu maldito dinheiro!".\n\nO som de sangue respingando e de ossos estalando chama minha atenção para uma vala humilde, onde vejo um[beaten_peasant.Custom('ES_XA')] pobre sendo segurado pela gola por algum malandro local.\n\nNormalmente, esse tipo de coisa estaria abaixo da minha atenção, mas será que eu realmente posso permitir que crimes tão flagrantes aconteçam bem diante dos meus olhos?"
 tour_grounds_events.3050.a: "Guardas! Prendam esse idiota!"
 tour_grounds_events.3050.b: "Um[ROOT.Char.Custom('ES_XA')] bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] defende seus súditos!"
 tour_grounds_events.3050.b.success: "Você vence a luta"
 tour_grounds_events.3050.b.failure: "Você perde a luta"
 tour_grounds_events.3050.c: ""Ei, deixa eu dar uma surra nele(a) também por um pouco!""
 tour_grounds_events.3060.title: "Os Melhores de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]"
 tour_grounds_events.3060.desc.intro: "[stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] decidiu me mostrar hoje seus quartéis.\n\n"
 tour_grounds_events.3060.desc.light_infantry: "Fileira após fileira de infantaria leve permanece atenta em suas armaduras, prontas para minha inspeção."
 tour_grounds_events.3060.desc.archers: "Fileira após fileira de arqueiros estão prontos, arcos em mãos."
 tour_grounds_events.3060.desc.heavy_infantry: "Um mar de armaduras brilhantes está diante de mim, cada soldado parecendo indiferente ao peso sobre seus corpos."
 tour_grounds_events.3060.desc.cavalry: "Os cavalos resmungam e resfolegam, ansiosos para que seus cavaleiros os levem para a carga."
 tour_grounds_events.3060.desc.camel_cavalry: "Os camelos gemem e chutam, como se estivessem loucos para aterrorizar a cavalaria inimiga."
 tour_grounds_events.3060.desc.elephant_cavalry: "Eu fico maravilhado com o tamanho imponente da infantaria de elefantes e tenho receio de imaginar os momentos finais daqueles que são pisoteados sob seus pés."
 tour_grounds_events.3060.desc.outro: "Esses são excelentes soldados, mas parece um desperdício deixá-los ociosos o dia todo."
 tour_grounds_events.3060.a: "Eles poderiam combater o crime!"
 tour_grounds_events.3060.b: "Talvez eles possam ser gerenciados de forma mais eficiente."
 tour_grounds_events.3060.b.success: "Os quartéis foram melhorados"
 tour_grounds_events.3060.b.failure: "Seu conselho não funcionou"
 tour_grounds_events.3060.b.vassal: "[visiting_liege.GetFirstName] interfere no seu exército"
 tour_grounds_events.3060.c: "Eu poderia usar soldados como esses."
 tour_grounds_events.3060.d: "Talvez eu possa aprender algo aqui."
 tour_grounds_events.3070.title: "Um Momento de Silêncio"
 tour_grounds_events.3070.desc.intro: "Encontro-me passeando com meu séquito pelos maravilhosos cenários fora de [ROOT.Char.GetCurrentLocation.GetName] propriamente dito e"
 tour_grounds_events.3070.desc.royal_garden: "ao redor do magnífico jardim real de [stop_host_scope.GetName].\n\nDentro das paredes do jardim, só há eu, alguns nobres menores e um jardim preciso e intrincadamente arranjado. Parar por um momento aqui me enche de uma tranquilidade que raramente tenho a chance de experimentar."
 tour_grounds_events.3070.desc.royal_forest: "pelo encantador bosque real de [stop_host_scope.GetName].\n\nEste bosque está completamente vazio de camponeses ou da pequena nobreza; apenas eu, meus confidentes mais próximos e a criação [ROOT.Char.GetFaith.CreatorNamePossessive]. Sinto-me transportad[ROOT.Char.Custom('ES_OA')] a um reino de pura calma, um tempo anterior a que os corações calamitosos dos homens manchassem a terra com vício e fraqueza."
 tour_grounds_events.3070.desc.leisure_palace: "ao redor do palácio de verão magnífico de [stop_host_scope.GetName].\n\nA fachada do palácio é decorada com esculturas deslumbrantes e flora local arranjada com detalhes meticulosos, e o interior é tão grandioso e extravagante. Tudo sobre as vistas e sensações de estar neste palácio existe para acalmar uma alma sobrecarregada."
 tour_grounds_events.3070.desc.outro: "\n\nEu poderia ficar aqui para sempre."
 tour_grounds_events.3070.a: "Eu poderia aprender tanto deste lugar."
 tour_grounds_events.3070.b: "Um passeio tranquilo é um presente."
 tour_grounds_events.3070.c: "Estacionem as tropas, esta paz deve ser protegida!"
 tour_grounds_events.3080.title: "As Forças Militares Locais"
 tour_grounds_events.3080.desc.intro: "Encontro-me vagando pelos cenários mais militaristas de [ROOT.Char.GetCurrentLocation.GetName], e acabo chegando a [stop_host_scope.GetName]"
 tour_grounds_events.3080.desc.military_academy: "academia militar.\n\nPor toda a academia, vejo $knight_culture_player_plural_no_tooltip_lowercase$ de nobre porte praticando e aprimorando suas habilidades, sabendo muito bem que a guerra está sempre no horizonte."
 tour_grounds_events.3080.desc.march: "Marchas.\n\nEm toda a fronteira, eles se preparam para qualquer invasor ou infrator que venha para a sua vista, com eficiência especializada."
 tour_grounds_events.3080.desc.siege_works: "Oficinas de Cerco.\n\nAs máquinas recebem cuidados e manutenção constantes, algumas sendo reparadas e outras sendo montadas pela primeira vez. Eu temo pelo próximo vilão cujas muralhas enfrentarão essas máquinas."
 tour_grounds_events.3080.desc.royal_armories: "Arsenais Reais.\n\nO brilho polido das armaduras alinhadas nos Arsenais Reais quase dá à sala um brilho sobrenatural quando eu entro. Fileiras e mais fileiras de elmos e malhas pendem de todas as superfícies, o leve aroma de óleo pairando sobre eles."
 tour_grounds_events.3080.desc.jousting_lists: "Listas de Justas.\n\nOs relinchos e grunhidos dos cavalos são interrompidos pelo repentino som de choque e estilhaços de lanças. Cascos retumbantes batem um ritmo staccato à medida que me aproximo, com gritos de encorajamento ecoando ao meu redor."
 tour_grounds_events.3080.desc.archery_ranges: "Campos de Tiro com Arco.\n\nO constante som de #EMP tac-tac-tac#! das flechas atingindo os alvos é acompanhado pelo estalar das cordas dos arcos. Uma brisa leve sopra, causando todo tipo de travessura entre os arqueiros em treinamento quando sopra com mais força."
 tour_grounds_events.3080.desc.outro: "\n\n[ROOT.Char.GetCurrentLocation.GetName] é um excelente centro militar, e está claro que tenho muito a aprender com suas práticas."
 tour_grounds_events.3080.a: "E aprender eu irei."
 tour_grounds_events.3080.b: "Esses homens ociosos deveriam caçar criminosos!"
 tour_grounds_events.3080.c: "Talvez eu deva ter uma lição."
 tour_grounds_events.3090.title: "O Orgulho de um Agricultor"
 tour_grounds_events.3090.desc.intro: "Caminhando pelo campo de [ROOT.Char.GetCurrentLocation.GetName], me deparo com o que parece ser uma reunião de camponeses em um pequeno povoado.\n\nAcompanhados por seus orgulhosos proprietários,"
 tour_grounds_events.3090.desc.vegetables: "[farmer.Custom('RegionalRootVegetablePlural')] de tamanho imenso enchem carrinhos e barracas de mercado."
 tour_grounds_events.3090.desc.livestock: "gado gordo e saudável pasta, parecendo tão delicioso que dá vontade de dar uma mordida!"
 tour_grounds_events.3090.desc.outro: "Os camponeses ocasionalmente trazem suas mercadorias para serem avaliadas, analisando seu tamanho e saúde. Parece que estão realizando algum tipo de festival, e assim que percebem a minha presença, estão ansiosos para me mostrar os frutos do seu trabalho."
 tour_grounds_events.3090.a: "Devemos fazer um levantamento dessas terras."
 tour_grounds_events.3090.b: "\"Isso é perda de tempo! Voltem para seus campos!\""
 tour_grounds_events.3090.c: "Que maravilha, vou julgar o concurso."
 tour_grounds_events.3100.title: "Um Dia Tranquilo"
 tour_grounds_events.3100.desc.intro: "Em minha visita a [ROOT.Char.GetCurrentLocation.GetName], encontro um raro momento em que não estou sendo conduzido por meu anfitrião nem esperado para aparecer em algum lugar.\n\nVejo os lugares de culto se enchendo para o dia,"
 tour_grounds_events.3100.desc.booze: "tavernas começando a receber seus primeiros bebedores,"
 tour_grounds_events.3100.desc.hash: "figuras suspeitas seguindo em direção a jardins secretos de haxixe,"
 tour_grounds_events.3100.desc.outro: "e mendigos deitados nas ruas, implorando por apenas um pedaço de comida."
 tour_grounds_events.3100.a: "É preciso realizar um censo deste assentamento."
 tour_grounds_events.3100.b: "Deveria passar o dia na presença [ROOT.Char.GetFaith.HighGodNamePossessive]."
 tour_grounds_events.3100.c: "Devo ver como os [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetAdherentNamePlural] adoram."
 tour_grounds_events.3100.d: "Uma excelente oportunidade para a caridade."
 tour_grounds_events.3100.e: "Eu só quero relaxar."
 friend_helped_me: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'proporcionaste', 'proporcionó' )] deu [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'tu persona', TARGET_CHARACTER.GetShortUIName )] uma ajuda muito necessária"
 friend_helped_me_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'proporcionaste', 'proporcionó' )] deu a [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUIName )]uma ajuda muito necessária"
