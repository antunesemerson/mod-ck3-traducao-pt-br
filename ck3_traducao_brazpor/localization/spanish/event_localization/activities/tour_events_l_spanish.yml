 cultural_festival.9000.title: "Passe de Bastidores"
 cultural_festival.9000.desc: "Todas as maravilhas e as alegrias habituais do festival cultural acontecem ao meu redor; é como se eu tivesse sido transportado para outro mundo.\n\nNo entanto, a visão de alguns indivíduos nefastos se movendo à margem da multidão, esgueirando-se para trás de um rangente palco de madeira, me traz de volta ao mundo terreno.\n\nSou tomado pela curiosidade, incapaz de ver exatamente o que esses cretinos estão tramando. Então, vejo a [stop_host_scope.GetFirstName] sair dos bastidores com uma comitiva de tipos sórdidos."
 cultural_festival.9000.a: "Devo investigar."
 cultural_festival.9000.host_noticed: "[stop_host_scope.GetFirstName] te pegou bisbilhotando"
 cultural_festival.9000.b: "Não, eu realmente não devo."
 cultural_festival.9001.title: "A caixa sob o palco"
 cultural_festival.9001.desc: "Atrás do palco, não encontro nada além de um pequeno baú. O material de que é feito parece resistente, mas sua confecção é estranhamente modesta e tosca, não a peça de destaque que se esperaria de um festival desta magnitude.\n\nEle está preso por aquilo que parece ser uma fechadura de quebra-cabeça, coberta por entalhes grosseiros de criaturas grotescas e bestas de todo tipo.\n\nMinha mente está tomada de curiosidade, eu simplesmente preciso saber o que há dentro!"
 cultural_festival.9001.a: "Posso abrir a fechadura, é fácil!"
 cultural_festival.9001.fail_to_get_it_open: "Você não consegue abrir o baú"
 cultural_festival.9001.b: "Posso simplesmente quebrá-lo!"
 cultural_festival.9001.destroyed_what_was_inside: "Você destruiu o que havia dentro"
 cultural_festival.9001.c: "Isso dá trabalho demais."
 cultural_festival.9002.title: "O Diário Secreto"
 cultural_festival.9002.desc: "Oculto atrás da caixa de madeira dura há apenas um diário velho e empoeirado, com papel demais enfiado de qualquer jeito entre suas páginas.\n\nEu o abro e não vejo nada além de bobagens sem sentido, símbolos alienígenas e equações matemáticas que parecem não se relacionar com mais nada contido no livro.\n\nDeve ser a chave para resolver algum tipo de enigma, mas qual exatamente?"
 artifact_secret_puzzle_description: "Um livro contendo a chave para resolver um quebra-cabeça desconhecido."
 cultural_festival.9002.a: "Ficarei com isso."
 cultural_festival.9002.b: "$host_dinner_events.3132.b$"
 artifact_secret_puzzle_with_cipher_description: "Dois diários, um parece conter um código e o outro a chave para resolver um quebra-cabeça. Mesmo juntos, esses dois livros não revelam nenhum mistério, mas deve haver um terceiro que revele tudo."
 cultural_festival.9002.c: "$host_dinner_events.3132.c$"
 cultural_festival.9002.d: "Não, devo deixar isso."
 cultural_festival.9003.title: "Uma Lâmina"
 cultural_festival.9003.desc: "Dentro do baú há uma adaga elaboradamente decorada. Longe do acabamento rude da fechadura, a adaga é tão ricamente detalhada que, a cada momento em que você a observa, mais e mais intricacias se revelam para você.\n\nUm objeto verdadeiramente magnífico."
 artifact_ornate_dagger_name: "Adaga Ornamentada"
 artifact_ornate_dagger_desc: "Uma adaga ricamente decorada, coberta de grotescos e animais de todas as espécies."
 cultural_festival.9003.a: "E agora ela é minha!"
 cultural_festival.9003.b: "Não posso simplesmente roubá-la!"
 cultural_festival.9004.title: "Um Dízimo"
 cultural_festival.9004.desc: "A caixa está cheia até a borda de ouro! Um tesouro secreto que [stop_host_scope.GetFirstName] tem me escondido, sem dúvida."
 cultural_festival.9004.a: "$cultural_festival.9003.a$"
 cultural_festival.9004.b: "$cultural_festival.9003.b$"
 cultural_festival.9005.title: "Colar Ornamentado"
 cultural_festival.9005.desc: "Dentro do baú há um colar ricamente decorado. Longe do trabalho grosseiro da fechadura, o colar tem tantos detalhes que, quanto mais se olha para ele, mais complexidades se revelam.\n\nUm objeto verdadeiramente magnífico."
 artifact_strange_necklace_name: "Colar Estranho"
 artifact_strange_necklace_desc: "Um colar ricamente decorado. Na extremidade de sua corrente está a figura de um grotesco segurando uma joia entre seus apêndices estranhos."
 cultural_festival.9005.a: "$cultural_festival.9003.a$"
 cultural_festival.9005.b: "$cultural_festival.9003.b$"
 cultural_festival.9006.title: "Um Item Vergonhoso"
 cultural_festival.9006.desc: "Abro o baú e coro ao ver o que há em seu interior.\n\nFeito de madeira nobre, este objeto fálico não se parece com nenhum outro que eu tenha visto. Nem sequer parece um #EMP instrumento#! humano, mas sim algo que imagino que possa pertencer a uma criatura mítica.\n\nUm objeto verdadeiramente perverso."
 grotesque_wooden_phallus: "Falo de Madeira Grotesco"
 grotesque_wooden_phallus.desc: "Um objeto elaboradamente esculpido que se assemelha ao falo de uma criatura mística desconhecida."
 cultural_festival.9006.a: "Que coisa curiosa!"
 cultural_festival.9006.b: "Queime-o."
 decision_solve_the_journals: "Decifrar o Diário"
 decision_solve_the_journals_desc: "Finalmente, juntei todas as peças do quebra-cabeça e chegou a hora de descobrir o que está escrito nessas páginas!"
 decision_solve_the_journals_tooltip: "Você vai tentar decifrar os diários"
 decision_solve_the_journals_confirm: "Vamos lá."
 journal_events_prefix: "Entendendo o Diário:"
 tour_general.5000.title: "$journal_events_prefix$ Falha"
 tour_general.5000.desc: "Junto os diários, leio minuciosamente o livro de quebra-cabeças e aplico-os na fechadura com movimentos tão precisos quanto meus pensamentos.\n\nFinalmente, acho que consegui e #EMP clank!#! O diário permanece trancado e teimoso como sempre."
 tour_general.5000.a: "Droga!"
 tour_general.5000.b: "Vou tentar de novo!"
 tour_general.5001.title: "$journal_events_prefix$ Outra Falha"
 tour_general.5001.desc: "Realmente sinto que acertei desta vez. Tudo parece fazer sentido, não há como eu estar errado.\n\nGiro para a esquerda e... #EMP clank!#! O diário permanece trancado e teimoso como sempre."
 tour_general.5001.a: "Maldição!"
 tour_general.5001.b: "Vou arrombar essa maldita fechadura!"
 the_journal_is_destroyed_tt: "Você quebra mais do que apenas a fechadura"
 fail_to_open_journal_tt: "Você não consegue abrir o diário"
 more_mysteries_inside_tt: "Você descobre o conteúdo do diário"
 tour_general.5010.title: "$journal_events_prefix$ Decifrando"
 tour_general.5010.desc.intro: "Finalmente, as páginas do diário se revelaram para mim, e posso começar a decifrar! A cifra de abertura diz 'Wherever I go, the truth remains two steps behind', e com isso posso decifrar o primeiro quebra-cabeça.\n\n"
 tour_general.5010.desc.puzzle.a: "\"Uvtcpigvjkpiueqwnfdg.\""
 tour_general.5010.desc.puzzle.b: "\"Vjgurktkvuycvejwucnn.\""
 tour_general.5010.desc.puzzle.c: "\"Qwtjkuvqtakuqpnacnkg.\""
 tour_general.5010.desc.puzzle.d: "\"Hcnnudavjgktqypjcpfu.\""
 tour_general.5010.desc.outro: "\n\nIsso não faz nenhum sentidoo, mas deve ter um significado real."
 tour_general.5010.a: "Coisas estranhas podem existir."
 tour_general.5010.b: "Os espíritos nos observam."
 tour_general.5010.c: "Nossa história é apenas uma mentira."
 tour_general.5010.d: "Caem por suas próprias mãos."
 tour_general.5011.title: "$journal_events_prefix$ Grotescos"
 tour_general.5011.desc: "Isso mesmo! Seguindo a cifra, consigo entender todo o livro, e parece ser um relato estranho descrevendo a natureza de todos os tipos de grotescos, como os [ROOT.Char.Custom('GetGrotesquePlural')].\n\nConcretamente, descreve sua natureza e onde encontrá-los, sem dúvida um artefato importante se eu algum dia viajar para lugares distantes."
 tour_general.5011.a: "Que grotesco!"
 tour_general.5012.title: "$journal_events_prefix$ Teologia Avançada"
 tour_general.5012.desc: "Isso mesmo! Seguindo a cifra, consigo entender todo o livro, e é um livro complexo sobre teologia! Ele descreve [ROOT.Char.GetFaith.PantheonTerm] e apresenta ideias fascinantes sobre a relação entre [ROOT.Char.GetFaith.PositiveAfterLife] e [ROOT.Char.GetFaith.NegativeAfterLife].\n\nEste pode ser o texto teológico mais avançado do mundo [ROOT.Char.GetFaith.GetAdjectiveNoTooltip], e é meu!"
 tour_general.5012.a: "Fascinante!"
 tour_general.5013.title: "$journal_events_prefix$ a História Secreta"
 tour_general.5013.desc: "Isso mesmo! Seguindo a cifra, consigo entender todo o livro, e ele descreve a história do [ROOT.Char.GetPrimaryTitle.GetName] de uma maneira que nunca ouvi antes!\n\nSe for verdadeiro, este diário ameaça minar nossa compreensão da história e as muitas figuras que ajudaram a construir esse grande [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] como conhecemos!"
 tour_general.5013.a: "Incrível!"
 tour_general.5014.title: "$journal_events_prefix$ Combate"
 tour_general.5014.desc: "É isso! Depois de seguir o cifrado, sou capaz de entender a totalidade do livro, que contém informações sobre técnicas secretas em todo tipo de cenário de combate. Seja com espada, corpo a corpo ou até mesmo a cavalo, este diário descreve exatamente como neutralizar qualquer movimento que um oponente possa fazer.\n\nSe eu estudar adequadamente este diário e praticar suas instruções, me tornarei em [ROOT.Char.Custom('ES_ElLa')] melhor duelista da história de [ROOT.Char.GetPrimaryTitle.GetName]!"
 tour_general.5014.a: "Incrível!"
 tour_grounds_events.3030.title: "O Mapa Misterioso"
 tour_grounds_events.3030.desc: "Hoje passei a maior parte do tempo explorando o centro de [touring_grounds_scope.GetNameNoTooltip], e me diverti sendo servido pela população local.\n\nLogo além do meu alcance, vejo uma figura encapuzada serpenteando pela multidão, em uma vã tentativa de se misturar. Uma folha de papel cai de seu bolso e voa melancolicamente ao sabor do vento em minha direção, como se fosse guiada até mim.\n\nParece ser um mapa de algum tipo, um mapa dos arredores de [touring_grounds_scope.GetNameNoTooltip]!"
 tour_grounds_events.3030.a: "Vamos ver para onde ele leva."
 tour_grounds_events.3030.got_lost: "Você se perdeu"
 tour_grounds_events.3030.b: "Ah, que perda de tempo."
 tour_grounds_events.3031.title: "Tesouro Enterrado"
 tour_grounds_events.3031.desc: "Seguindo o mapa até o final, encontro apenas uma clareira no [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip] sem nenhuma significância em particular.\n\nOlhando ao redor, encontro uma série de montículos no chão, como se algo estivesse enterrado ali. Os montículos parecem estar razoavelmente espaçados, talvez indicando que há alguma lógica por trás de sua colocação..."
 tour_grounds_events.3031.a: "Posso descobrir qual é qual."
 tour_grounds_events.3031.fail_to_get_it_open: "Você não consegue encontrar o local certo"
 tour_grounds_events.3031.b: "Vou cavar toda a clareira!"
 tour_grounds_events.3031.c: "Já segui esse rastro o suficiente."
 tour_grounds_events.3032.title: "O Livro Enterrado"
 tour_grounds_events.3032.desc: "Por fim, acho que encontrei o monte certo, e ao desenterrá-lo surge... um livro estranho.\n\nA capa está danificada e praticamente se desfaz em pedaços, e em seu interior há apenas símbolos e enigmas estranhos, que aludem a alguma verdade obscurecida.\n\nDepois de algum tempo, percebo que se trata de um livro de cifras, mas não está claro o que ele existe para decifrar."
 artifact_secret_cipher_description: "Um livro estranho de enigmas e cifras."
 tour_grounds_events.3032.a: "Vou pegá-lo!"
 tour_grounds_events.3032.b: "$host_dinner_events.3132.b$"
 tour_grounds_events.3032.c: "$host_dinner_events.3132.c$"
 tour_grounds_events.3032.d: "Devo deixá-lo onde o encontrei."
 open_the_journal_tt: "Você abre o diário"
 attempt_to_solve_the_cipher_tt: "Você tenta decifrar a cifra"
 you_have_journal_1_tt: "Você possui o Diário Secreto"
 you_have_journal_2_tt: "Você possui a Chave do Quebra-Cabeça"
 you_have_journal_3_tt: "Você possui a Cifra"
 artifact_journal_of_grotesques: "Diário dos Grotescos"
 artifact_journal_of_grotesques_desc: "Este diário criptografado está repleto de informações sobre o estudo dos grotescos e onde eles podem ser encontrados."
 artifact_journal_of_theology: "Diário de Teologia Avançada"
 artifact_journal_of_theology_desc: "Este diário criptografado contém revelações inovadoras sobre a teologia [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]."
 artifact_journal_secret_history: "A História Secreta do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 artifact_journal_secret_history_desc: "Este diário criptografado contém informações detalhadas sobre a história do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] e seus governantes."
 artifact_journal_of_martial_arts: "Diário das Artes Marciais"
 artifact_journal_of_martial_arts_desc: "Este diário criptografado oferece instruções sobre todos os tipos de artes marciais; desde lâmina até combate corpo a corpo e montado."
 cultural_festival.9010.title: "Excessivamente Entusiasmado"
 cultural_festival.9010.desc: "Hoje tenho aproveitado as festividades em [ROOT.Char.GetCurrentLocation.GetName] mas não tanto quanto [weeb_child.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n[weeb_child.GetSheHe|U] tem dançado e girado com os locais com uma alegria e um vigor que nunca tinha visto em [weeb_child.GetSheHe]. Totalmente imers[weeb_child.Custom('ES_OA')] nas estranhas tradições da cultura de [festival_culture_scope.GetName], [weeb_child.GetFirstNameNoTooltip] parece estar completamente em casa, e os locais também parecem adorar[weeb_child.GetHerHim]!"
 cultural_festival.9010.a: "Que bonito."
 cultural_festival.9010.b: ""Fique com eles, [weeb_child.GetFirstNameNoTooltip]!"."
 cultural_festival.9020.title: "O Grande Clímax"
 cultural_festival.9020.desc: "O sol se põe em mais um dia em [ROOT.Char.GetCurrentLocation.GetName] e os moradores locais parecem estar preparando uma apresentação final. Um grande poste de madeira foi erguido, e mal posso esperar para ver o que acontece a seguir!\n\nMas então, arrastam um[human_sacrifice.Custom('ES_XA')] [human_sacrifice.GetWomanMan] frágil que esperneia e grita, e o amarram ao poste. Uma faca é levada à barriga, e fecha os olhos e se prepara para encarar o esquecimento."
 cultural_festival.9020.b: ""Pare com esta loucura em nome de voss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]!"."
 cultural_festival.9030.title: "Tradições de [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip]"
 cultural_festival.9030.desc: "[visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)|U] parece totalmente encantado[visiting_liege.Custom('ES_OA')] pelas festividades de hoje. Dançarinos, artistas e comediantes buscam agradar ao meu senhor[visiting_liege.Custom('ES_XA')] e parece que está funcionando perfeitamente.\n\nCom tão bom humor e cercado[visiting_liege.Custom('ES_OA')] por nossas tradições, talvez [visiting_liege.GetFirstName] comece a se interessar em mantê-las vivas. As tradições dos [ROOT.Char.GetFaith.GetAdherentNamePlural] certamente desaparecerão sem a devida proteção legal contra a conversão."
 cultural_festival.9030.a: "\"Seria uma pena que essas tradições morressem, não é?\""
 cultural_festival.9030.success: "Você convenceu [visiting_liege.GetFirstName]"
 cultural_festival.9030.failure: "Não conseguiu convencer [visiting_liege.GetFirstName]"
 cultural_festival.9030.b: "Devo apenas ficar calado(a)."
 cultural_festival.9040.t: "Uma Moeda por uma Fortuna"
 cultural_festival.9040.desc: "Em um canto afastado do festival, encontro uma tenda com ornamentos muito elaborados. Os materiais e os padrões me parecem estranhos, muito diferentes do que vi em casa. Seu dono é ainda mais estranho, e sorri para mim com cumplicidade por cima de suas mãos entrelaçadas.\n\n"Ah, um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]! Vejo que vosso futuro reserva muito para vós. Dai-me uma moeda e eu vos contarei tudo"."
 cultural_festival.9040.a: "\"Uma moeda você terá.\""
 cultural_festival.9040.good_reading: "Sua leitura é positiva"
 cultural_festival.9040.bad_reading: "Sua leitura pressagia o destino"
 cultural_festival.9040.b: "\"Não tenho interesse em charlatões comuns.\""
 cultural_festival.9040.c: "\"Ensine-me seus caminhos, sábio(a)!\""
 cultural_festival.9050.t: "Dança Erótica"
 cultural_festival.9050.desc: "Estou sentado[ROOT.Char.Custom('ES_OA')] para mais um encantador espetáculo. A percussão pulsa no silêncio expectante, os tambores martelam como batidas de um coração.\n\nDe trás das cortinas, surge um[sexy_dancer.Custom('ES_XA')] [sexy_dancer.GetWomanMan] atraente[sexy_dancer.Custom('ES_OA')], movendo o corpo de uma forma ao mesmo tempo obscena e excitante. Ele/ela se estende de maneira escandalosamente próxima à minha, e então me deixa com nada além de uma piscadela, voltando para seu público adorador."
 cultural_festival.9050.a: "![sexy_dancer.GetSheHe|U] deve ser meu!"
 cultural_festival.9050.b: "Que graça!"
 cultural_festival.9060.t: "Uma Performance Legendária"
 cultural_festival.9060.desc: "Em minha alegria, eu percorro o festival e eventualmente encontro um grupo de artistas. Eles parecem estar ensaiando algo e posso dizer apenas pela forma como se comportam que estou prestes a ter um maravilhoso entretenimento.\n\nA ideia me ocorre de que o grupo pode se beneficiar de algum material novo. De fato, [ROOT.Char.GetPromotedLegend.GetName|U] seria um material ideal para um grupo tão talentoso de atores."
 cultural_festival.9060.a: "Eles deveriam realizar minha lenda!"
 cultural_festival.9060.a.success: "A performance alcança [stop_host_scope.GetFirstName]"
 cultural_festival.9060.a.failure: "A performance vai muito bem"
 cultural_festival.9060.b: "Devo apenas apreciar o que eles têm a oferecer."
