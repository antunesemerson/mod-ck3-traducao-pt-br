 tour_grounds_if_vassal_is_not_generous_tt: "Passe de Bastidores"
 tour_grounds_if_vassal_is_impressed_tt: "Todas as maravilhas e alegrias habituais do festival cultural acontecem ao meu redor; é como se eu tivesse sido transportado para outro mundo.

No entanto, a visão de alguns indivíduos nefastos se movendo à margem da multidão, esgueirando-se para trás de um rangente palco de madeira, me traz de volta ao mundo terreno.

Sou tomado pela curiosidade, incapaz de ver exatamente o que esses cretinos estão tramando. Então vejo [stop_host_scope.GetFirstName] sair dos bastidores com uma comitiva de tipos sórdidos."
 tour_grounds_if_vassal_is_scared_tt: "Devo investigar."
 tour_grounds_if_vassal_accepts_tt: "[stop_host_scope.GetFirstName] te pegou bisbilhotando"
 tour_grounds_if_vassal_refuses_tt: "Não, eu realmente não devo."
 3007_avoid_hitting_child_tt: "A caixa sob o palco"
 3007_fall_off_horse_tt: "Atrás do palco, não encontro nada além de um pequeno baú. O material parece resistente, mas sua confecção é estranhamente humilde e tosca, não a peça de destaque que se esperaria de um festival desta magnitude.

Ele está preso por aquilo que parece ser uma fechadura de quebra-cabeça coberta por entalhes grosseiros de grotescos e bestas de todo tipo.

Minha mente está tomada de curiosidade; eu simplesmente preciso saber o que há dentro!"
 kill_warhorse_tt: "Posso abrir a fechadura, é fácil!"
 kill_horse_tt: "Você não consegue abrir o baú"
 host_dinner_if_liege_eat_tt: "Posso simplesmente quebrá-lo!"
 host_dinner_if_liege_refuse_tt: "Você destruiu o que havia dentro"
 final_reward_tt: "Isso dá trabalho demais."
 level_5_reward_tt: "O Diário Secreto"
 level_4_reward_tt: "Oculto atrás da caixa de madeira dura há apenas um diário velho e empoeirado, com papel demais enfiado de qualquer jeito entre suas páginas.\n\nEu o abro e não vejo nada além de bobagens sem sentido, símbolos alienígenas e equações matemáticas que parecem não se relacionar com mais nada contido no livro.\n\nDeve ser a chave para resolver algum tipo de enigma, mas qual exatamente?"
 level_3_reward_tt: "Um livro contendo a chave para resolver um quebra-cabeça desconhecido."
 level_2_reward_tt: "Ficarei com isso."
 level_1_reward_tt: "$host_dinner_events.3132.b$"
 failed_to_get_reward_tt: "Dois diários, um parece conter um código e o outro a chave para resolver um quebra-cabeça. Mesmo juntos, esses dois livros não revelam nenhum mistério, mas deve haver um terceiro que revele tudo."
 if_vassal_accepts_tt: "$host_dinner_events.3132.c$"
 if_vassal_rejects_tt: "Não, devo deixar isso."
 activity_tour_special_type_bar_segment_tt_0: "Uma Lâmina"
 activity_tour_special_type_bar_segment_tt_1: "Dentro do baú há uma adaga elaboradamente decorada. Longe do acabamento rude da fechadura, a adaga é tão ricamente detalhada que, a cada momento em que você a observa, mais e mais intricacias se revelam para você.\n\nUm objeto verdadeiramente magnífico."
 activity_tour_special_type_bar_segment_tt_2: "Adaga Ornamentada"
 activity_tour_special_type_bar_segment_tt_3: "Uma adaga ricamente decorada, coberta de grotescos e animais de todas as espécies."
 activity_tour_special_type_bar_segment_tt_4: "E agora ela é minha!"
 very_impressed_by_hunting_tt: "Não posso simplesmente roubá-la!"
 impressed_by_hunting_tt: "Um Dízimo"
 not_very_impressed_by_hunting_tt: "A caixa está cheia até a borda de ouro! Um tesouro secreto que [stop_host_scope.GetFirstName] tem me escondido, sem dúvida."
