 rival_incompetence_corresponding: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te hartaste', 'se hartó' )] da incompetência de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'tu persona', TARGET_CHARACTER.GetShortUIName )]"
 rival_insulted_me: "[CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'insultaste', 'insultó' )] a [TARGET_CHARACTER.GetShortUIName]."
 rival_insulted_me_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'insultaste', 'insultó' )] insultou [CHARACTER.GetShortUIName]."
 #Host Dinner
 host_dinner_events.1001.title: "Um Jantar Seco"
 host_dinner_events.1001.desc: "Tenho estado me divertindo com [visiting_liege.GetName] e, até agora, nossa noite tem estado cheia de prazeres e brincadeiras ébrias. Embora talvez pareça que eu tenha sido generoso demais com minhas reservas de álcool, pois um servo me informa discretamente que até a última gota de [ROOT.Char.Custom('RegionalAlcoholicDrink')]!\n\nMeu [visiting_liege.GetLadyLord] está sentado impacientemente do outro lado da mesa, vermelho como um recém-nascido, batendo o cálice na mesa.\n\n\"Vamos! A noite é jovem! Onde está a bebida?\"."
 host_dinner_events.1001.a: "\"Reabasteçam as reservas!\""
 host_dinner_events.1001.replenished_stores: "[stop_host_scope.GetName] reabasteceu as reservas de álcool"
 host_dinner_events.1001.b: "Você já bebeu o suficiente!"
 host_dinner_events.1001.didnt_replenish_stores: "[stop_host_scope.GetName] repreendeu sua bebida"
 host_dinner_events.1001.c: "Talvez seja hora de mudar de local."
 host_dinner_events.1001.d: "Eu as reabastecerei... em troca de um favor."
 host_dinner_events.1002.title: "Uma ou Duas Canecas"
 host_dinner_events.1002.desc: "Meu [Select_CString( stop_host_scope.IsFemale, 'anfitriona', 'anfitrión' )], [stop_host_scope.GetName] me tirou de sua casa para me levar a uma taverna local. Por toda parte vejo os desgraçados e fracos entregues à bebida e à devassidão, mas [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] me assegura que a [ROOT.Char.Custom('RegionalAlcoholicDrink')] servida neste estabelecimento é de morrer.\n\nQuando a primeira rodada passa pelos meus lábios, sinto-me viv[ROOT.Char.Custom('ES_OA')]A bebida me atinge como uma tonelada de tijolos, e tenho a impressão de que esta será uma noite de folia sem fim."
 host_dinner_events.1002.a: "Você realmente se superou, [stop_host_scope.GetFirstNameNoTooltip]!"
 host_dinner_events.1002.b: "Vamos mostrar um pouco de moderação."
 host_dinner_events.1002.c: "Vou beber até morrer."
 drank_too_much_toast: "Você bebeu até cair de bêbado"
 host_dinner_events.1003.title: "Um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip] adormecido"
 host_dinner_events.1003.desc: "[visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] apareceu finalmente para passar a noite e está dormindo pacificamente em seus aposentos; sem dúvida sonhando em esvaziar ainda mais minha despensa de toda a comida e bebida que me restam.\n\nTalvez esta seja uma boa oportunidade para surpreender meu [visiting_liege.GetLadyLord]. Talvez algum entretenimento noturno, ou algo agradável para [visiting_liege.GetHerHim]…"
 host_dinner_events.1003.a: "Vamos encenar uma assombração!"
 host_dinner_events.1003.b: "[ROOT.Char.Custom('RegionalAlcoholicDrink')] sempre é um ótimo presente!"
 host_dinner_events.1003.c: "Bolos de haxixe irão agradar [visiting_liege.GetSheHe]."
 host_dinner_events.1003.d: "O toque de uma concubina é uma ótima maneira de acordar."
 host_dinner_events.1003.e: "Minha companhia certamente agradará [visiting_liege.GetSheHe]."
 host_dinner_events.1004.title: "Um Despertar Assustador"
 host_dinner_events.1004.desc.intro: "Eu jazgo em paz na melhor alcova de [stop_host_scope.GetTitledFirstName|l] sem uma dúvida nem preocupação na mente. No entanto, uma risada alta e ameaçadora vinda do fim do corredor me arranca do meu sono sem sonhos.\n\nSaio a contragosto, com a mão trêmula sacudindo a vela na penumbra e fico olhando para o corredor."
 host_dinner_events.1004.desc.ghost: "Juro que vejo, de pé no final do longo corredor escuro, algum tipo de espírito maligno. Ele sussurra para mim, chamando meu nome, talvez desejando me arrastar para [ROOT.Char.GetFaith.NegativeAfterLife]! Seja o que for que ele queira, devo agir para me salvar!"
 host_dinner_events.1004.desc.cynic: "Meu medo imediatamente se dissipa quando vejo que não passa de um servo com um lençol fino sobre ele. Ele faz barulhos e chama meu nome, mas até mesmo uma criança poderia dizer que isso não é um espírito.\n\nEssa é a tentativa de humor de [stop_host_scope.GetName], sem dúvida."
 host_dinner_events.1004.a: "Gritar por ajuda!"
 host_dinner_events.1004.b: "Barricar a porta!"
 host_dinner_events.1004.c: "Que divertido!"
 host_dinner_events.1004.enjoyed_spooky_ghost: "[visiting_liege.GetName] gostou da brincadeira"
 host_dinner_events.1004.d: "[stop_host_scope.GetFirstNameNoTooltip] perturbou meu sono por isso?"
 host_dinner_events.1005.title: "O Fantasma de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]"
 host_dinner_events.1005.desc: "Parece que minha brincadeira funcionou até bem demais, pois ouço [visiting_liege.GetName] gritando como [Select_CString( visiting_liege.IsFemale, 'uma menina pequena', 'um menino pequeno' )] e pedindo que eu vá ajudar[visiting_liege.GetHerHim].\n\nCom diligência, corro até seus aposentos, onde [visiting_liege.GetHerHim] encontro pálid[visiting_liege.Custom('ES_OA')] como um lençol, apontando para o fantasma no fim do corredor.\n\nGraças ao céu que você veio! Há um espírito maligno tentando me levar para o/a [visiting_liege.GetFaith.NegativeAfterLife]!."
 host_dinner_events.1005.a: "Que tolo!"
 host_dinner_events.1004.mocked_me: "Estou sendo ridicularizado"
 host_dinner_events.1005.b: "Posso banir esse espírito, em troca de um favor."
 host_dinner_events.1004.hooked_me: "[stop_host_scope.GetName] baniu o espírito."
 host_dinner_events.1005.c: "Desapareça, espírito!"
 host_dinner_events.1006.title: "Chamada de Despertar Inesperada"
 host_dinner_events.1006.desc.intro: "Saio do meu sono após outra noite tranquila na residência de [stop_host_scope.GetName]. À medida que recupero a consciência, sinto algo pesado ao meu lado que não estava ali antes.\n\n"
 host_dinner_events.1006.desc.alcohol: "Um barril inteiro de [stop_host_scope.Custom('RegionalAlcoholicDrink')] repousa ao meu lado como um amante, oscilando e rangendo com cada leve movimento que faço."
 host_dinner_events.1006.desc.weed: "Ao meu lado, há bolos de haxixe suficientes para eu comer meu próprio peso se assim desejar!"
 host_dinner_events.1006.desc.hedonist: "Sinto o toque familiar de um[concubine_scope.Custom('ES_XA')] [concubine_scope.GetWomanMan] que desliza o dedo pelo meu peito com curiosidade."
 host_dinner_events.1006.desc.vanity: "Viro-me e vejo [stop_host_scope.GetFirstNameNoTooltip] sentad[stop_host_scope.Custom('ES_OA')] aos pés da minha cama, completamente vestid[stop_host_scope.Custom('ES_OA')].\n\n“Bom dia, meu [ROOT.Char.GetTitleAsNameNoTooltip]. Julguei apropriado dar-vos um presente e, que presente melhor do que o presente da minha conversa?”."
 host_dinner_events.1006.desc.outro: "\n\nEste presente certamente é inesperado, mas será mesmo tão agradável acordar com ele?"
 host_dinner_events.1006.a: "Que forma maravilhosa de acordar."
 host_dinner_events.1006.liked_gift: "[visiting_liege.GetTitledFirstName] gostou do presente."
 host_dinner_events.1006.b: "Suma da minha vista!"
 host_dinner_events.1006.refused_gift: "[visiting_liege.GetTitledFirstName] foi insultad[visiting_liege.Custom('ES_OA')]."
 host_dinner_events.3001.title: "Uma proposta interessante"
 host_dinner_events.3001.desc.intro: "Estou desfrutando do meu jantar tranquilo com [stop_host_scope.GetName] e sua [stop_host_scope.Custom2('RelationToMeShort', lusty_spouse_scope)] [lusty_spouse_scope.GetName].\n\nPoucos momentos depois de [stop_host_scope.GetNameNoTooltip] se desculpar [stop_host_scope.GetHerselfHimself], [lusty_spouse_scope.GetNameNoTooltip] investe contra mim como um cão raivoso!"
 host_dinner_events.3001.desc.not_into_it: "Tento afastar tal degenerad[lusty_spouse_scope.Custom('ES_OA')] [lusty_spouse_scope.Custom2('InsultAdjective', ROOT.Char)], mas ela/ele é bastante insistente em perverter minha mente com pensamentos impuros."
 host_dinner_events.3001.desc.into_it: "Fico surpreso(a) com suas investidas, mas não consigo evitar deixar minhas mãos percorrerem seu corpo."
 host_dinner_events.3001.desc.mid: "Fico paralisad[ROOT.Char.Custom('ES_OA')] de surpresa, alarmad[ROOT.Char.Custom('ES_OA')] de que baste apenas que [stop_host_scope.GetFirstNameNoTooltip] saia da sala para que [lusty_spouse_scope.GetFirstNameNoTooltip] considere o adultério com a pessoa mais próxima."
 host_dinner_events.3001.desc.outro: "\n\nPor favor, livrai-me deste tédio! [stop_host_scope.GetFirstNameNoTooltip] não é amante meu. É tão afetuoso quanto um pedaço de madeira. Tomai-me e amai-me como [stop_host_scope.GetSheHe] nunca o fez!"
 host_dinner_events.3001.a: "Com prazer!"
 host_dinner_events.3001.b: "Preciso contar a [stop_host_scope.GetTitledFirstNameNoTooltip|l] imediatamente!"
 host_dinner_events.3001.c: "Não vou contar, mas você me deve uma."
 host_dinner_events.3001.d: "Sai de cima de mim, busc[lusty_spouse_scope.Custom('ES_OnOna')] sem-vergonha!"
 host_dinner_events.3002.title: "[lusty_spouse_scope.GetFirstNameNoTooltip]: [lusty_spouse_scope.Custom('ES_ElLa')] Adúlter[lusty_spouse_scope.Custom('ES_OA')]"
 host_dinner_events.3002.desc: "Retorno ao jantar após uma breve trégua e encontro [lusty_spouse_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] sentad[lusty_spouse_scope.Custom('ES_OA')] desconfortavelmente com [visiting_liege.GetName].\n\n"[ROOT.Char.GetTitledFirstNameNoTooltip|l], temo que tenho notícias terríveis. Enquanto vos estaveis ausente, [Select_CString( lusty_spouse_scope.IsFemale, 'esta libertina', 'este libertino' )] tentou envolver-se comigo em relações adúlteras!"."
 host_dinner_events.3002.a: "Isso é motivo para divórcio."
 host_dinner_events.3002.b: "Vamos manter isso entre nós."
 host_dinner_events.3002.c: "Vou fingir que não ouvi isso."
 host_dinner_events.3002.d: "Jamais [lusty_spouse_scope.GetHerHim] perdoarei."
 host_dinner_events.1007.title: "Uma apresentação memorável"
 host_dinner_events.1007.desc: "Ultimamente, [visiting_liege.GetName] se mostra cada vez mais apátic[visiting_liege.Custom('ES_OA')] e aburrid[visiting_liege.Custom('ES_OA')] em minha presença, e muitas vezes parece estar à beira do mundo desperto.\n\nUm pensamento me vem à mente enquanto o observo empurrando a comida de forma displicente. Ele viveu uma vida plena, talvez se sentisse lisonjead[visiting_liege.Custom('ES_OA')] se recriássemos uma de suas famosas façanhas na forma de uma peça teatral!\n\nA única pergunta é: que tipo de peça pareceria mais divertido a [visiting_liege.GetNameNoTooltip]?"
 host_dinner_events.1007.a: "Uma peça sobre guerra, é claro!"
 host_dinner_events.1007.b: "Uma comédia sobre a morte de seu inimigo odiado!"
 host_dinner_events.1007.c: "Ela será tocada por uma tragédia."
 host_dinner_events.1007.d: "Algo sobre as alegrias do casamento!"
 host_dinner_events.1007.e: "Isso é uma ideia terrível."
 host_dinner_events.1008.title: "$host_dinner_events.1007.title$"
 host_dinner_events.1008.desc.intro: "Parece que [stop_host_scope.GetName] decidiu fazer uma apresentação para me divertir esta noite. Sento-me à mesa do banquete, esperando ansiosamente pelo meu entretenimento, quando"
 host_dinner_events.1008.desc.mid.war_memory: "[stop_host_scope.GetNameNoTooltip] surge diante de mim com uma armadura.\n\n"Eis-me aqui! Sou [loser.Custom('ES_ElLa')] poderos[loser.Custom('ES_OA')] [loser.GetName], e eu pessoalmente entregarei [visiting_liege.Custom('ES_AlAla')] vil [visiting_liege.GetNameNoTooltip] ao seu criador!".\n\nAntes que eu possa responder, colocam uma espada de madeira em minha mão. Sem dúvida, isto é uma encenação de quando [memory_performance_scope.GetDescription]."
 host_dinner_events.1008.desc.mid.dead_rival_memory: "[stop_host_scope.GetNameNoTooltip] aparece com uma maquiagem pouco favorecedora e um vestido de má qualidade.\n\n"Ai de mim! Não consigo mais me agarrar à minha vida mortal. Maldição, nunca mais humilharei a [visiting_liege.GetNameNoTooltip]!".\n\nA encenação inclui muitos sons de flatulência e gemidos de deboche, uma recriação de quando [memory_performance_scope.GetDescription]."
 host_dinner_events.1008.desc.mid.dead_positive_relation_memory: "[stop_host_scope.GetNameNoTooltip] aparece vestid[stop_host_scope.Custom('ES_OA')] como meu amad[dead_relation.Custom('ES_OA')] [dead_relation.GetName].\n\n\"Ai de mim, parto para meu [dead_positive_relation_memory_scope.dead_relation.GetFaith.PositiveAfterLife|U]. Só consigo pensar em [visiting_liege.GetNameNoTooltip] e nos momentos maravilhosos que passamos juntos\".\n\nUma representação sentida e trágica que recria quando [memory_performance_scope.GetDescription]."
 host_dinner_events.1008.desc.mid.marriage_memory: "[stop_host_scope.GetNameNoTooltip] aparece vestido[stop_host_scope.Custom('ES_OA')] quase exatamente igual a [spouse.GetName] no dia do nosso casamento.\n\n“Em verdade, este é o melhor dia da minha vida! Vou me casar com [Select_CString( visiting_liege.IsFemale, 'la maravillosa', 'el maravilloso' )] [visiting_liege.GetNameNoTooltip]!”.\n\nSou convidado ao palco para dar minha mão a [stop_host_scope.GetName], mas"
 host_dinner_events.1008.desc.outro: "Eu me pergunto, devo me render a isso?"
 host_dinner_events.1008.a: "Que maravilhoso!"
 host_dinner_events.1008.b: "Isso é um insulto!"
 host_dinner_events.3003.title: "Uma iguaria local"
 host_dinner_events.3003.desc: "O jantar desta noite é um pouco diferente do que estou acostumado. O cozinheiro larga displicentemente a tigela à minha frente, e de imediato sou confrontado com o aroma mais inusitado que já senti na vida.\n\nEste prato das profundezas de [ROOT.Char.GetFaith.NegativeAfterLife] é ofensivo para todos os sentidos. Uma substância cinzenta e viscosa repousa em seu caldo pálido e espumoso como um penico sem ser esvaziado, com uma única haste de erva colocada por cima em uma vã tentativa de tornar a coisa apetitosa.\n\nTodos os meus instintos me obrigam a jogar a coisa pela janela mais próxima, mas [stop_host_scope.GetNameNoTooltip] me assegura que é uma iguaria local digna de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 host_dinner_events.3003.a: "Pra dentro!"
 host_dinner_events.3003.disgusting: "A comida estava nojenta"
 host_dinner_events.3003.delicious: "A iguaria estava incrível"
 host_dinner_events.3003.b: "Não deixarei essa sujeira tocar minha língua."
 host_dinner_events.3003.c.my_dog: "Talvez eu possa dar isso sorrateiramente para meu cachorro..."
 host_dinner_events.3003.c.lieges_dog: "Talvez eu possa dar isso sorrateiramente para o cachorro de [stop_host_scope.GetFirstNameNoTooltip]..."
 host_dinner_events.3003.unnoticed: "[stop_host_scope.GetNameNoTooltip] não percebeu"
 host_dinner_events.3003.host_noticed: "[stop_host_scope.GetFirstNameNoTooltip] se deu conta"
 host_dinner_events.3004.title: "Uma Promessa Antecipada"
 host_dinner_events.3004.desc.intro: "Hoje chego cedo ao jantar e me encontro a sós com [stop_host_heir.GetName] de herdeir[stop_host_heir.Custom('ES_OA')] de [stop_host_scope.GetName]."
 host_dinner_events.3004.desc.mid.child: "[stop_host_heir.GetSheHe|U] ainda é jovem e estÉ visivelmente intimidad[stop_host_heir.Custom('ES_OA')] por compartilhar a sala com seu [ROOT.Char.GetTitleAsNameNoTooltip]."
 host_dinner_events.3004.desc.mid.adult: "Sua natureza confiante é infame. Como uma criança, sua cabeça é vazia e maleável, e é fácil demais alinhar sua cabecinha com minha visão."
 host_dinner_events.3004.desc.outro: "\n\nSeria fácil demais manipular [stop_host_heir.Custom('ES_AlAla')] pobre coitado para que me faça jurar lealdade legal antecipadamente, mas isso certamente desagradaria a [stop_host_scope.GetNameNoTooltip]."
 host_dinner_events.3004.a: "Vamos fazer isso!"
 host_dinner_events.3004.a.caught: "Sua tentativa de injustiça é notada"
 host_dinner_events.3004.a.not_caught: "As palavras foram ditas e não podem ser desditas"
 host_dinner_events.3004.b: "Vou apenas conversar."
 host_dinner_events.3004.friendly_convo: "Você teve uma conversa amigável"
 host_dinner_events.3004.awkward_convo: "A conversa foi constrangedora"
 host_dinner_events.3005.title: "$host_dinner_events.3004.title$"
 host_dinner_events.3005.desc: "Entro no salão de jantar para encontrar a [visiting_liege.GetName] falando com [stop_host_heir.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre assuntos de Estado e deveres.\n\nParece que [visiting_liege.GetName] [stop_host_heir.GetHerHim] está tentando manipulá-lo para fazer um juramento de lealdade à coroa em minha ausência! Tal juramento [stop_host_heir.GetHerHim] o assombraria pelo resto de seus dias e selaria nosso futuro como subordinados de [visiting_liege.GetName]!"
 host_dinner_events.3005.a: "Permitirei isso, em troca de um favor próprio."
 host_dinner_events.3005.hook_for_hook: "[stop_host_scope.GetName] exige uma compensação"
 host_dinner_events.3005.b: "\"Parem com essa loucura imediatamente!\""
 host_dinner_events.3005.disallowed_hook: "Você foi pego"
 host_dinner_events.3006.title: "Sonhos de uma vida melhor"
 host_dinner_events.3006.desc.intro: "Nesta noite, está sentado ao meu lado [runaway_courtier.Custom2('NamePossessiveCharacterIntroduction', stop_host_scope)] e [runaway_courtier.GetHerHim] vejo suspirar sobre o prato com saudade.\n\n"
 host_dinner_events.3006.desc.mid.concubine: "«Ah, peço desculpas pela minha melancolia, meu [ROOT.Char.GetTitleAsNameNoTooltip]. [stop_host_scope.GetNameNoTooltip] provavelmente me colocou ao seu lado para agradá-lo. [stop_host_scope.GetSheHe|U] é assim, só me vê como um objeto para ser admirado e com o qual brincar. Para dizer a verdade, tenho sonhado em voltar com você para [ROOT.Char.GetCapitalLocation.GetName]»."
 host_dinner_events.3006.desc.mid.neutral: "\"Verdadeiramente, estou cansado(a) da vida aqui em [stop_host_scope.GetCapitalLocation.GetName] e desejo elevar minha posição na vida. Meus talentos são desperdiçados aqui e, ultimamente, tenho pensado em fugir com você de volta para [ROOT.Char.GetCapitalLocation.GetName], onde posso realmente mostrar o meu valor!\""
 host_dinner_events.3006.desc.outro: "\n\nSuas lamentações parecem genuínas, mas será que realmente posso roubar[runaway_courtier.GetHerHim] da corte de [stop_host_scope.GetNameNoTooltip]?"
 host_dinner_events.3006.a: "Claro, venha comigo!"
 host_dinner_events.3006.b: "\"Eu apreciarei mais do que apenas a sua beleza.\""
 host_dinner_events.3006.c: "Ao menos posso ser um ombro para chorar."
 host_dinner_events.3006.d: ""Saiba qual é o seu lugar, seu [runaway_courtier.Custom2('InsultNoun', ROOT.Char)]!"."
 host_dinner_events.3007.title: "O(a) Cortesã(o) Roubado(a)"
 host_dinner_events.3007.desc.intro: "Decidi que era uma boa ideia sentar [visiting_liege.GetName] ao lado de [runaway_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)], e parece ter sido bem recebido. Um pouco bom demais."
 host_dinner_events.3007.desc.mid.concubine: "\n\n[runaway_courtier.GetNameNoTooltip] se encolhe ao me ver e desvia o olhar."
 host_dinner_events.3007.desc.mid.neutral: "\n\n[runaway_courtier.GetNameNoTooltip] revira os olhos ao me ver, antes de desviar o olhar rapidamente."
 host_dinner_events.3007.desc.outro: "[runaway_courtier.GetSheHe|U] parece determinado(a) a deixar minha corte e ir para [visiting_liege.GetName]! Posso impedir isso, mas certamente isso estragaria o clima do jantar."
 host_dinner_events.3007.a: "Eu proíbo isso!"
 host_dinner_events.3007.refused_to_let_them_go: "[stop_host_scope.GetName] se recusou a deixar[runaway_courtier.GetHerHim] ir."
 host_dinner_events.3007.b: "Deixe[runaway_courtier.GetHerHim] partir."
 host_dinner_events.3008.title: "Um pouco de bisbilhotice"
 host_dinner_events.3008.desc: "É de manhã, e eu saio relutante para o mundo desperto quando o sol da manhã de repente atravessa minha visão. Vejo [Select_CString( nervous_servant.IsFemale, 'uma criada', 'um criado' )] arrastar os pés desajeitadamente pelo meu quarto, vacilante enquanto põe meu café da manhã ao meu lado. Pergunto o que o aflige, e, com uma provocação tão pequena, começa a vomitar palavras.\n\n"Oh, meu sabi[ROOT.Char.Custom('ES_OA')] e bondoso [ROOT.Char.GetTitleAsNameNoTooltip], estas paredes falam. Oh, que coisas terríveis elas dizem. Sei tanto, às vezes acho que sei demais. [stop_host_scope.GetName] nunca me perdoaria se eu lhe contasse, mas simplesmente já não consigo guardar mais esses segredos na cabeça!""
 host_dinner_events.3008.a: "\"Você deve me contar imediatamente!\""
 host_dinner_events.3008.secret_discovered: "[nervous_servant.GetSheHe|U] revelou um segredo"
 host_dinner_events.3008.b: "\"Será que algumas moedas soltariam esses lábios?\""
 host_dinner_events.3008.acting_sussy: "[stop_host_scope.GetName] está desconfiado(a) de você"
 host_dinner_events.3008.c: "\"Você deveria manter a boca fechada.\""
 host_dinner_events.1009.title: "Sua Alteza"
 host_dinner_events.1009.desc: "Quando terminamos os pratos principais, olho com expectativa para [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] à espera de elogios e aprovação, apenas para encontrar um olhar expectante em seu rosto. Está claro que o que providenciei não é suficiente para minha [Select_CString( visiting_liege.IsFemale, 'invitada estimada', 'convidado estimado' )], mas os cozinheiros já fizeram tudo o que lhes pedi e não posso ter certeza de que tenhamos mais algo para servir.\n\nEntão me ocorre que ainda tenho uma enorme reserva de bolos de haxixe em minha despensa, prontos para serem devorados! A única questão é: estou disposto a compartilhar essa delícia com meu [visiting_liege.GetTitleAsNameNoTooltip]?"
 host_dinner_events.1009.a: "Traga os bolos!"
 host_dinner_events.1009.b: "Tenho certeza de que [ROOT.Char.Custom('GetExpensiveDessert')] estará bem."
 host_dinner_events.1010.title: "Minha Alteza"
 host_dinner_events.1010.desc: "Quando termino minha última refeição, não consigo evitar sentir que há um vazio no meu estômago onde deveria haver uma sobremesa. Ao que parece, [stop_host_scope.GetName] consegue ler meus pensamentos, pois, antes mesmo de eu ter a oportunidade de reclamar, chama um servo para trazer seus \"bolos especiais\".\n\n\"Só os melhores bolos de haxixe para meu [visiting_liege.GetTitleAsNameNoTooltip]!\", diz ele enquanto despejam uma verdadeira montanha daquilo no meu prato."
 host_dinner_events.1010.a: "Vou devorá-los todos!"
 host_dinner_events.1010.b: "Jamais faria isso!"
 host_dinner_events.1011.title: "Diferenças Alimentares"
 host_dinner_events.1011.desc.intro: "Enquanto [visiting_liege.GetName] toma assento para mais uma noite de maravilhosa culinária de [ROOT.Char.GetPrimaryTitle.GetName], não posso deixar de perceber que deve estar se cansando de nossa comida.\n\n"
 host_dinner_events.1011.desc.vegetarian: "Servimos apenas a vegetação que [ROOT.Char.GetFaith.CreatorName] nos é concedida, nunca a carne de aves ou de bestas, mas em [visiting_liege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] as coisas são um pouco diferentes. Devo transigir em minhas crenças para ser um anfitri[ROOT.Char.Custom('ES_OnOna')] mais acolhedor[ROOT.Char.Custom('ES_OA')]? Devo acrescentar carne ao cardápio?"
 host_dinner_events.1011.desc: "Comemos carne com abundância, mas em [visiting_liege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] tal coisa é totalmente proibida. Até agora, [visiting_liege.GetName] parece estar comendo o que lhe é servido, mas deixando de lado qualquer carne, dando ao meu [visiting_liege.GetTitleAsNameNoTooltip|U] uma refeição incompleta! Posso realmente permitir que isso continue? Talvez todos devêssemos fazer uma dieta sem carne enquanto [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitleAsNameNoTooltip] estiver por aqui."
 host_dinner_events.1011.a: "Isso me colocaria nas boas graças de [visiting_liege.GetSheHe]."
 host_dinner_events.1011.b: "Tenho certeza de que [visiting_liege.GetSheHe] não esqueceria desse favor tão cedo..."
 host_dinner_events.1011.c: "Enquanto estiver aqui, vai comer à nossa maneira!"
 host_dinner_events.1020.title: "Um Bolo para Lembrar"
 host_dinner_events.1020.desc: "Outra noite, outra sobremesa, e posso ver que [visiting_liege.GetName] já está se cansando de nossas bandejas de [ROOT.Char.Custom('GetExpensiveDessert')]. Talvez esta noite seja a noite de fazer algo um pouco diferente.\n\nTalvez a solução para esse dilema seja pedir aos meus cozinheiros e confeiteiros que preparem uma sobremesa em forma de algo que signifique muito para meu caro apreciad[visiting_liege.Custom('ES_OA')] [visiting_liege.GetLadyLord]. Talvez uma fortaleza para simbolizar sua destreza, ou algo que jamais esperaria..."
 host_dinner_events.1020.a: "Uma fortaleza, claro!"
 host_dinner_events.1020.b: "O [visiting_liege.GetFaith.ReligiousSymbol] ficaria excelente!"
 host_dinner_events.1020.c: "Talvez uma certa parte da anatomia humana…"
 host_dinner_events.1020.d: "É uma ideia terrível."
 host_dinner_events.1021.title: "$host_dinner_events.1020.title$"
 host_dinner_events.1021.desc.intro: "Sento-me à mesa esperando a sobremesa e, quando ela finalmente chega, mal consigo conter minha alegria!\n\n"
 host_dinner_events.1021.desc.mid.castle: "Um delicioso bolo em forma de forte [ROOT.Char.GetCulture.GetName] é colocado na minha frente. A coisa é tão autêntica que consigo imaginar pequenos invasores melados tentando invadir as paredes da minha sobremesa."
 host_dinner_events.1021.desc.mid.religious: "Uma confeição devota em forma de meu [ROOT.Char.GetFaith.ReligiousSymbol] é deslizada até mim em um prato ornamentado. A peça está tão intrincadamente decorada que é como se [ROOT.Char.GetFaith.CreatorName] o tivesse feito pessoalmente só para mim."
 host_dinner_events.1021.desc.mid.lewd: "Não consigo mais me segurar e começo a rir incontrolavelmente quando o pilar de bolo na cor da pele é colocado à minha frente. Há todo tipo de detalhes obscenos nessa monstruosidade que tenho certeza que até mesmo [ROOT.Char.GetFaith.DevilName] coraria!"
 host_dinner_events.1021.desc.mid.lewd_woman: "Não consigo mais me segurar e começo a rir incontrolavelmente quando essas duas esferas tremulantes de sobremesa são colocadas à minha frente, com duas 'mamilos' frutados no topo. Há todo tipo de detalhes obscenos nessa confeição que tenho certeza que até mesmo [ROOT.Char.GetFaith.DevilName] coraria!"
 host_dinner_events.1021.desc.outro: "\n\nPor supuesto, me encanta. A única questão é: como posso demonstrar melhor meu apreço?"
 host_dinner_events.1021.a: "Vou me lembrar disso!"
 host_dinner_events.1021.b: ""Fico te devendo uma!""
 host_dinner_events.1022.title: "$host_dinner_events.1020.title$"
 host_dinner_events.1022.desc.intro: "Sento-me à mesa do jantar à espera da sobremesa e, quando ela finalmente chega, mal consigo conter minha ira!\n\n"
 host_dinner_events.1022.desc.mid.castle: "Estou chocado ao ver o que supostamente é um bolo em forma de forte [ROOT.Char.GetCulture.GetName] caído miseravelmente sob o seu próprio peso no meu prato. Isso é algum tipo de insulto à minha habilidade?"
 host_dinner_events.1022.desc.mid.religious: "Fico pasmad[ROOT.Char.Custom('ES_OA')] ao ver o que parece ser um bolo em forma de [ROOT.Char.GetFaith.ReligiousSymbol]! Esta exibição culinária blasfema me embrulha o estômago de tal maneira que mal consigo tocá-lo."
 host_dinner_events.1022.desc.mid.lewd: "O que vejo é um vil monte cor de carne repousando em um prato, claramente moldado na forma de alguma parte lasciva do corpo. Será que [stop_host_scope.GetName] espera que eu me sinta tentado por essa vulgaridade?"
 host_dinner_events.1022.desc.outro: "\n\nSó posso me sentir insultado[ROOT.Char.Custom('ES_OA')] ao contemplar isto, mas, pelos olhos de cachorrinho de [stop_host_scope.GetFirstNameNoTooltip], vejo que se tratou de uma tentativa sincera de bajulação."
 host_dinner_events.1022.a: "Ah, eu adoro isso!"
 host_dinner_events.1020.likes_it: "[visiting_liege.GetFirstName] adora isso"
 host_dinner_events.1022.b: ""Como ousa!""
 host_dinner_events.1020.hates_it: "[visiting_liege.GetFirstName] odeia o bolo"
 host_dinner_events.1030.title: "Um Convidado Indesejado"
 host_dinner_events.1030.desc: "Foi preparado outro jantar em honra do meu [visiting_liege.GetLadyLord] durante sua estadia, e, pelo visto, acertamos em cheio! [visiting_liege.GetName] parece estar salivando ao vê-lo, e justamente quando está prestes a dar a primeira mordida, [rival_scope.Custom2('NamePossessiveCharacterIntroduction', visiting_liege)] irrompe no salão de jantar e se pavoneia diante do prato de seu inimigo.\n\n«Que banquete temos aqui! Que pena que ele seja desperdiçado na língua pútrida de um[ROOT.Char.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip] tão vil[ROOT.Char.Custom('ES_OA')]!».\n\nO humor de [visiting_liege.GetNameNoTooltip] azeda imediatamente e, se eu não fizer nada, meu jantar logo pode acabar se transformando em uma briga de socos."
 host_dinner_events.1030.a: ""Guardas! Tirem este idiota daqui imediatamente!"."
 host_dinner_events.1030.b: "Talvez eu possa eliminá-los para ganhar alguma vantagem."
 host_dinner_events.1030.c: "[rival_scope.GetFirstNameNoTooltip] é hilário! Precisamos conversar!"
 host_dinner_events.1031.title: "$host_dinner_events.1030.title$"
 host_dinner_events.1031.desc.intro: "Foi preparada outra refeição para mim durante a minha estadia, e parece ser um verdadeiro sucesso! Só de olhar para este prato suculento e fumegante, já fico salivando, e justo quando estou prestes a dar a primeira mordida, uma voz irritantemente familiar perfura meus tímpanos.\n\n[rival_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] chegou para estragar meu apetite, e sua mera presença está fazendo meu sangue ferver."
 host_dinner_events.1031.desc: "\n\n[stop_host_scope.GetName] se ofereceu para se livrar desse irritante [rival_scope.Custom2('InsultNoun', ROOT.Char)] , mas suspeito que tenha alguma segunda intenção."
 host_dinner_events.1031.a: "Sim, sim, qualquer coisa!"
 host_dinner_events.1031.b: "Eu já suportei coisas piores."
 host_dinner_events.1030.liege_refuses: "[visiting_liege.GetFirstName] recusa o anzol"
 host_dinner_events.1032.title: "$host_dinner_events.1030.title$"
 host_dinner_events.1032.desc: "\n\nO que piora tudo é que [stop_host_scope.GetName] aparece exultante com a minha miséria, e até começou a rir e brincar com um inimigo jurado da coroa!"
 host_dinner_events.1032.a: "[stop_host_scope.GetFirstNameNoTooltip] está jogando um jogo perigoso."
 host_dinner_events.1032.b: "Devo virar a outra face."
 host_dinner_events.3010.title: "Um Sabor Desconhecido"
 host_dinner_events.3010.desc: "É mais uma noite da minha estadia na casa de [stop_host_scope.GetName] e mais uma vez colocam à minha frente uma refeição estrangeira. Cutuco-a um pouco com a faca, observando enquanto o molho escuro e desconhecido desliza ao redor como lama em cascata.\n\nAh, o que eu não daria por comida da capital; bastaria uma porção de [ROOT.Char.Custom('GetExpensiveDessert')]. Claro, eu poderia pedir [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] algo de casa, mas temo ofender[stop_host_scope.GetHerHim]."
 host_dinner_events.3010.a: "Vou apenas pedir."
 host_dinner_events.3010.b: "Tenho certeza de que a comida local está boa."
 host_dinner_events.3011.title: "$host_dinner_events.3010.title$"
 host_dinner_events.3011.desc: "Eu realmente me superei com esta refeição! Meus cozinheiros produziram uma variedade deslumbrante de pratos de dar água na boca, e, no entanto, [visiting_liege.GetName] parece detestar até mesmo tocar em qualquer um deles.\n\n“Esta comida não é do meu gosto. Poderíeis me trazer [ROOT.Char.Custom('GetExpensiveDessert')]? Ah, como sinto falta do seu doce beijo na minha língua.”\n\nIsso é um pouco insultante, mas um gesto assim não será esquecido tão cedo…"
 host_dinner_events.3011.a: "Claro!"
 host_dinner_events.3011.gave_local_food: "[stop_host_scope.GetName] concordou"
 host_dinner_events.3011.b: "Isso é um insulto!"
 host_dinner_events.3011.refused_local_food: "[stop_host_scope.GetName] ficou insultado"
 host_dinner_events.3020.title: "O Concurso"
 host_dinner_events.3020.desc: "Foi uma longa e maravilhosa noite de festa e alegria, e muitas taças de [stop_host_scope.Custom('RegionalAlcoholicDrink')] foram compartilhadas entre mim e meu [Select_CString( stop_host_scope.IsFemale, 'buena anfitriona', 'buen anfitrión' )] [stop_host_scope.GetName].\n\nNo entanto, parece que [stop_host_scope.GetTitledFirstNameNoTooltip|l] tem tentado beber mais do que eu, sempre enchendo sua taça um pouco mais que a minha. Seria algum tipo de desafio implícito? Talvez eu devesse aumentar as apostas."
 host_dinner_events.3020.a: "Você subestima a minha habilidade!"
 host_dinner_events.3020.b: "Não tente isso."
 host_dinner_events.3021.title: "$host_dinner_events.3020.title$"
 host_dinner_events.3021.desc: "Foi uma noite longa e maravilhosa de festa e alegria, e mais de uma taça de [stop_host_scope.Custom('RegionalAlcoholicDrink')] foi compartilhada entre minha [Select_CString( stop_host_scope.IsFemale, 'buena anfitriona', 'buen anfitrión' )] [stop_host_scope.GetName], e eu.\n\nNo entanto, parece que eu tenho bebido um pouco demais, o que [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstNameNoTooltip|l] parece ter interpretado como um desafio!\n\n“Então, vocês acham que conseguem beber mais que um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip|U]? Por que não testamos isso e bebem comigo? Quem vencer... bem, depois pensamos em uma recompensa adequada, hein?”"
 host_dinner_events.3021.a: "Vamos fazer isso!"
 host_dinner_events.3021.b: "Eu deveria parar, de verdade."
 host_dinner_events.3020.refused_to_drink: "[stop_host_scope.GetName] rejeitou o desafio"
 host_dinner_events.3030.title: "Um protegido"
 host_dinner_events.3030.desc: "Esta noite, sentei-me ao lado de [promising_child.Custom2('NamePossessiveCharacterIntroduction', stop_host_scope)] e [Select_CString( promising_child.IsFemale, 'la niña', 'el niño' )] tem sido uma verdadeira alegria. Quanto mais falo com [promising_child.GetSheHe] mais vejo o potencial de moldar[promising_child.GetHerHim] à minha imagem.\n\nSinto o impulso de levá-[promising_child.GetHerHim] para casa como pupilo[promising_child.Custom('ES_OA')] , mas não posso fazer algo assim sem o consentimento de seu [stop_host_scope.GetMotherFather] e es[stop_host_scope.Custom('ES_EA')] poderia me pedir algo em troca."
 host_dinner_events.3030.a: "Preciso perguntar."
 host_dinner_events.3030.b: "Não tenho tempo."
 host_dinner_events.3031.title: "[promising_child.GetFirstNameNoTooltip]: [Select_CString( promising_child.IsFemale, 'la pupila', 'el pupilo' )] [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitleAsNameNoTooltip]"
 host_dinner_events.3031.desc: "Parece que [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] tomou gosto por [promising_child.Custom2('MyCharacterIntroduction', ROOT.Char)]. Passaram a noite inteira conversando com naturalidade, como se fossem [visiting_liege.GetMotherFather] e [promising_child.Custom('GetDaughterSon')]!\n\n[visiting_liege.GetNameNoTooltip] se aproxima de mim com um grande sorriso no rosto. \"Esse[promising_child.Custom('ES_EA')] [promising_child.Custom('GirlBoy')] é uma verdadeira delícia! Nada me agradaria mais do que levá-[promising_child.GetHerHim] para casa e criá-[promising_child.GetHerHim] na capital. Um[promising_child.Custom('ES_XA')] jovem tão promissor[promising_child.Custom('ES_XA')] não deveria passar a vida inteira em [ROOT.Char.GetCurrentLocation.GetName], não é mesmo?\"."
 host_dinner_events.3031.a: "Você está certo."
 host_dinner_events.3031.b: "Errado!"
 host_dinner_events.3030.refused_to_allow_ward: "[stop_host_scope.GetFirstName] proíbe [promising_child.GetFirstName] de partir"
 host_dinner_events.3040.title: "Quem Comeu Todos os Doces?"
 host_dinner_events.3040.desc: "Nesta noite, a comida foi empilhada mais uma vez, como já passei a esperar. No entanto, os pequenos pastéis dos quais eu havia me afeiçoado parecem estar ausentes. Viro-me para [stop_host_scope.GetNameNoTooltip] com expressão de perplexidade.\n\n\"Sei que esperava mais pastéis, meu [visiting_liege.GetTitleAsNameNoTooltip|l], mas o cozinheiro me assegura que o último deles desapareceu justamente antes de ser servido. Tentamos capturar o ladrão, mas o vilão glutão é indescobrível demais.\""
 host_dinner_events.3040.a: "Não é astuto demais para mim!"
 host_dinner_events.3040.didnt_solve_mystery: "Você não conseguiu encontrá-lo"
 host_dinner_events.3040.b: "Triste."
 host_dinner_events.3040.disappointed_in_vassal: "Não estou zangad[GetPlayer.Custom('ES_OA')] , só decepcionad[GetPlayer.Custom('ES_OA')]"
 host_dinner_events.3041.title.deviant: "Torta [pie_eater_scope.GetCulture.GetNameNoTooltip]"
 host_dinner_events.3041.title: "[pie_eater_scope.GetFirstNameNoTooltip] Comeu Todos os Pastéis!"
 host_dinner_events.3041.desc.deviant: "Sigo o rastro de migalhas e manchas de gordura e molho até o fim do corredor, onde por fim localizo [pie_eater_scope.Custom('ES_AlAla')] culpado, mas acho que nada poderia ter me preparado para o que eu estava prestes a ver.\n\nEncontro [pie_eater_scope.GetName] completamente nu[pie_eater_scope.Custom('ES_OA')] de costas para mim. Quando entro, ele se vira para me ver, revelando a bandeja inteira de tortas empilhadas até a altura dos quadris, com uma única torta ainda cobrindo sua modéstia.\n\n“Oh! Eu, erm... nem tudo é o que parece, meu [visiting_liege.GetTitleAsNameNoTooltip]! Por favor, não conte isso a uma alma!”."
 host_dinner_events.3041.desc: "Sigo o rastro de migalhas e respingos de molho e gordura até o fim do corredor, até que enfim encontro o [pie_eater_scope.Custom('ES_AlAla')] culpado!\n\nEntro em um quarto e encontro [pie_eater_scope.GetName] sentad[pie_eater_scope.Custom('ES_OA')] sozinha com uma pilha inteira de pastéis ao seu lado.\n\n\"Oh! Meu [visiting_liege.GetTitleAsNameNoTooltip], eu ia levar os pastéis para você, é claro, mas veja... eles sempre somem quando é minha vez de comer, então pensei que poderia pegar um ou dois às escondidas. Por favor, não conte isso a ninguém!\"."
 host_dinner_events.3041.a: "Eu vou deixá-lo sair em troca de um favor."
 host_dinner_events.3041.b: "Um segredo entre você e eu."
 host_dinner_events.3041.c: "Não contarei a ninguém."
 host_dinner_events.3041.d: "Haha! Vocês foram desmascarados, seu [pie_eater_scope.Custom2('InsultNoun', ROOT.Char)] [pie_eater_scope.Custom2('InsultAdjective', ROOT.Char)]."
 host_dinner_events.3041.e: "Posso experimentar?"
 host_dinner_events.3041.f: "Vamos compartilhar!"
 host_dinner_events.3050.title: "Sem apetite"
 host_dinner_events.3050.desc: "A refeição desta noite estava de dar água na boca, mas, enquanto os cozinheiros continuam empilhando comida, notei que [non_eater_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] mal tocou no pouco que pôs no prato.\n\nEmbora a falta de apetite não fosse problema em qualquer outra ocasião, [stop_host_scope.GetName] parece estar se ofendendo com o fato de um[non_eater_scope.Custom('ES_XA')] membro da minha comitiva estar mexendo e beliscando o prato dela."
 host_dinner_events.3050.a: ""Coma alguma coisa, pelo amor de [ROOT.Char.GetFaith.HighGodNamePossessive]!""
 host_dinner_events.3050.convinced_to_eat: "[non_eater_scope.GetHerHim|U] convenceu a comer"
 host_dinner_events.3050.annoyed_courtier: "[non_eater_scope.GetHerHim|U] irritaste"
 host_dinner_events.3050.b: "Vou arranjar desculpas para [non_eater_scope.GetSheHe]."
 host_dinner_events.3060.title: "Uma Delícia Saborosa"
 host_dinner_events.3060.desc: "Certamente, a refeição desta noite foi uma delícia. Tenho me regalado com toda sorte de alimentos, salgados e doces, mas nada abriu tanto meu apetite quanto estas excelentes [stop_host_scope.Custom('GetExpensiveDessert')]!\n\nNão importa quantos eu coma, nem o quanto saboreie seu gosto, simplesmente não é o bastante para tirá-los da minha mente. Perco-me neles a cada mordida, o sabor explodindo em minha boca, me trazendo um passo mais perto de experimentar [ROOT.Char.GetFaith.PositiveAfterLife].\n\nEmbora meu estômago esteja apertado e minhas roupas estejam esticadas, sinto-me obrigad[ROOT.Char.Custom('ES_OA')] a buscar mais."
 host_dinner_events.3060.a: "Elas são boas demais para resistir!"
 host_dinner_events.3060.satisfying_dessert: "Você está satisfeito"
 host_dinner_events.3060.too_much_dessert: "Você comeu demais"
 host_dinner_events.3060.b: "Não, preciso parar."
 host_dinner_events.3061.title: "O Coração Traidor"
 host_dinner_events.3061.desc: "Termino a última parte do meu jantar e definitivamente já comi até me fartar. Deito-me na cama, satisfeit[ROOT.Char.Custom('ES_OA')] , embora um pouco desconfortáv[ROOT.Char.Custom('ES_OA')].\n\nNo entanto, enquanto estou ali deitad[ROOT.Char.Custom('ES_OA')] , sinto que a doçura chega ao meu coração e #EMP late#! um pouco mais forte. A intensidade aumenta a cada batida, cada vez mais forte e mais rápido. Sinto que meu coração está prestes a explodir do peito. Um suor frio me percorre o corpo, a garganta seca e respiro ofegante como um exemplar de [ROOT.Char.Custom('GetAnimalType')] acuado!\n\nEntão, de repente, tudo para."
 host_dinner_events.3061.a: "Deve ter sido veneno!"
 host_dinner_events.3070.title: "História para [potential_friend_scope.GetFirstNameNoTooltip]"
 host_dinner_events.3070.desc: "Outra noite de alegria chega ao fim, e me vi preso[ROOT.Char.Custom('ES_OA')] em uma conversa justamente com [potential_friend_scope.GetName].\n\nQuando percebo, a sala ficou em silêncio, exceto pela nossa conversa, e todos estão à espera da minha próxima palavra. Embora eu me sinta um pouco constrangido, tenho certeza de que posso contar uma história que agrade a todos aqui![ROOT.Char.Custom('ES_OA')] de que posso contar uma história que encante todos os presentes!"
 host_dinner_events.3070.a: "Algo trágico."
 host_dinner_events.3070.boring_story: "Sua história foi entediante"
 host_dinner_events.3070.b: "Algo leve!"
 everyone_at_the_dinner: "Todos os personagens no jantar"
 host_dinner_events.3070.story_was_impressive: "Sua história foi impressionante"
 host_dinner_events.3080.title: "Um Engasgo!"
 host_dinner_events.3080.desc: "Todos estão se divertindo no jantar, e conto mais uma das minhas piadas lendárias para grande riso e aplausos... e tosse.\n\nOlho ao redor e vejo a [choking_character_scope.GetName] agarrando a garganta, tossindo com força e ficando com o rosto cada vez mais vermelho. Parece que minha piada pode ter sido boa demais para [choking_character_scope.GetSheHe]!\n\nEu poderia pular para o resgate, claro, mas isso é mesmo problema meu?"
 host_dinner_events.3080.a: "Posso salvar[choking_character_scope.GetHerHim]!"
 host_dinner_events.3080.failed_to_save_them: "Você falhou em salvar [choking_character_scope.GetFirstName]"
 host_dinner_events.3080.b: "Na verdade, este não é problema meu."
 host_dinner_events.3081.title: "Uma Vida Salva"
 host_dinner_events.3081.desc: "Levanto-me e dou fortes pancadas nas costas de [choking_character_scope.GetName] repetidamente, e quando o rosto dele começa a ficar azul, um grotesco bolo do que um dia foi comida gourmet aterrissa com um respingo em um molho de ervas caro.\n\n“Ah, obrigado! Hoje você salvou uma vida, meu [visiting_liege.GetTitleAsNameNoTooltip|U]! Estarei para sempre em dívida com você.”"
 host_dinner_events.3081.a: "\"Você não me deve nada além de sua companhia.\""
 host_dinner_events.3081.b: ""Sim, me deveis a vida"."
 host_dinner_events.1040.title: "Jogos Entediantes"
 host_dinner_events.1040.desc: "Os banquetes têm acontecido noite após noite desde a chegada de [visiting_liege.GetName], e todas as noites, depois de comer até se fartar, desaparece para seus aposentos pelo resto da noite, deixando-me a sós com meus pensamentos.\n\nContudo, tenho sentido a compulsão de tirar o velho tabuleiro de xadrez e apostar com meu [visiting_liege.GetTitleAsNameNoTooltip]. Ainda não decidi qual será o prêmio, mas tenho certeza de que conseguiremos pensar em algo."
 host_dinner_events.1040.a: "Vamos jogar!"
 host_dinner_events.1040.b: "Melhor não."
 host_dinner_events.1041.title: "O Desafio"
 host_dinner_events.1041.desc: "Quando termino a refeição, outra mesa é colocada à minha frente, mas desta vez, em vez de comida, há pequenas peças de jogo sobre ela.\n\nMeu [ROOT.Char.GetLadyLord], com certeza vós sabeis que tenho fama de ser um[stop_host_scope.Custom('ES_OA')] dos [stop_host_scope.GetHerHim]melhores jogador[stop_host_scope.Custom('ES_EA')]es de xadrez de [stop_host_scope.GetPrimaryTitle.GetNameNoTierNoTooltip]! Mas não quero jogar apenas por diversão; talvez possamos tornar as coisas interessantes com uma aposta...\n\n[stop_host_scope.GetName] me sorri, brincando distraidamente com uma peça entre seus dedos, ansios[stop_host_scope.Custom('ES_OA')] por uma partida."
 host_dinner_events.1041.a: "É a minha jogada, [stop_host_scope.GetFirstNameNoTooltip]."
 host_dinner_events.1041.b: "Não vou estragar minha noite com isso."
 host_dinner_events.1042.title: "O Favor"
 host_dinner_events.1042.desc: "Quando o rei cai, proclama-se o vencedor.\n\nConquistei o favor de [bg_loser.GetName] e meu prêmio indeterminado já está pronto para ser escolhido a qualquer momento."
 host_dinner_events.1042.desc.loser: "Quando o rei cai, o vencedor é proclamado.\n\nFui completamente derrotado[ROOT.Char.Custom('ES_OA')] por [bg_victor.GetName] e o prêmio indefinido para [bg_victor.GetSheHe] já está pronto para ser escolhido a qualquer momento."
 host_dinner_events.1042.a: "Excelente."
 host_dinner_events.1042.a.bad: "Droga!"
 host_dinner_events.1050.title: "Suprimentos Vazios"
 host_dinner_events.1050.desc: "Meus cozinheiros me informaram que os mantimentos parecem estar bastante baixos e que muitos dos ingredientes mais caros e exóticos já se esgotaram há muito tempo.\n\nSeria preciso uma pequena fortuna para reabastecer os mantimentos, e meu coração se agita nervosamente só de pensar em comprar apenas pão e manteiga. Talvez [visiting_liege.GetName] se sinta decepcionad[visiting_liege.Custom('ES_OA')] com nossa exibição tão modesta nesta noite, mas posso mesmo me permitir fazer outra coisa?"
 host_dinner_events.1050.a: "Pão e água serão suficientes."
 host_dinner_events.1050.b: "Podemos comprar algo melhor."
 host_dinner_events.1050.c: "Tenho contatos que posso usar!"
 host_dinner_events.3090.title: "O Crânio"
 host_dinner_events.3090.desc: "Me diverti aqui, mas não posso me permitir ser distraído da missão de me tornar um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]temido[ROOT.Char.Custom('ES_OA')] e respeitado[ROOT.Char.Custom('ES_OA')]!\n\nAs masmorras de [stop_host_scope.GetName] estão repletas de vilões e traidores, que só ficam mamando do tesouro da coroa com sua incessante necessidade de comida e água. Talvez eu possa fazer um favor ao meu gracioso anfitri[stop_host_scope.Custom('ES_OnOna')] e infundir medo em seu coração ao mesmo tempo, executando um prisioneiro e bebendo [stop_host_scope.Custom('RegionalAlcoholicDrink')] de seu crânio esvaziado."
 host_dinner_events.3090.a: "Uma excelente ideia."
 host_dinner_events.3090.skobletted_my_prisoner: "[visiting_liege.GetName] esvaziou o crânio de [skoblet_target.GetFirstName] em uma taça"
 host_dinner_events.3090.b: "Isso é grotesco."
 host_dinner_events.3100.title: "Extravagância Suspeita"
 host_dinner_events.3100.desc: "Tenho desfrutado da minha estadia aqui, mas não consigo deixar de notar que tenho me fartado de banquetes extravagantes todos os dias que estive neste lugar. Talvez [stop_host_scope.GetName] seja significativamente mais ric[stop_host_scope.Custom('ES_OA')] do que eu havia imaginado inicialmente.\n\nSe minhas reflexões estiverem certas, isso significa que [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitleAsNameNoTooltip] me deve muito mais ouro do que tem me pago até agora, e eu poderia exigir uma cobrança."
 host_dinner_events.3100.a: "Pagamentos atrasados devem ser feitos."
 host_dinner_events.3100.b: "[stop_host_scope.GetSheHe|U] deve pagar mais no futuro."
 host_dinner_events.3100.c: "Vou deixar passar."
 host_dinner_events.3101.title: "Extravagância Tributável"
 host_dinner_events.3101.desc.intro: "Tenho sido [Select_CString( ROOT.Char.IsFemale, 'una anfitriona', 'un anfitrión' )]excelente para meu [visiting_liege.GetLadyLord], dando-lhe tudo o que podia desejar e servindo apenas a melhor comida de minhas despensas.\n\nNo entanto, parece que isso foi um erro, pois agora acredita que minha excelência como [Select_CString( ROOT.Char.IsFemale, 'anfitriona', 'anfitrión' )] se deve à evasão fiscal!"
 host_dinner_events.3101.desc: "$host_dinner_events.3101.desc.intro$\n\n[visiting_liege.GetSheHe|U] exige que eu pague de uma vez a quantia de "o que devo"."
 host_dinner_events.3101.a: "Está bem."
 host_dinner_events.3101.b: "Isso é um absurdo!"
 host_dinner_events.3102.title: "$host_dinner_events.3101.title$"
 host_dinner_events.3102.desc: "$host_dinner_events.3101.desc.intro$\n\nAgora [visiting_liege.GetName] me exige que eu aumente meus impostos a partir de agora!"
 host_dinner_events.3102.a: "Eu aceitarei."
 host_dinner_events.3102.b: "Vá para [ROOT.Char.GetFaith.NegativeAfterLife]!"
 host_dinner_events.3110.title: "Um Viajante Talentoso"
 host_dinner_events.3110.desc.intro: "Parece que não sou [Select_CString( GetPlayer.IsFemale, 'a única convidada', 'o único convidado' )] de honra na corte de [stop_host_scope.GetName]! Nesta noite, me sentei ao lado de [talented_pool_character.Custom('ES_AlAla')] fascinante [talented_pool_character.GetName] e nossa conversa me deixou em um estado de euforia.\n\n"
 host_dinner_events.3110.desc.mid.claim: "«Ah, eu também deveria pertencer à classe dos proprietários de terras,[visiting_liege.Custom('ES_OA')] [visiting_liege.GetTitleAsNameNoTooltip]. Se o mundo fosse um lugar justo, minha reivindicação legítima seria reconhecida e eu também teria um grande salão de jantar para servi-los»."
 host_dinner_events.3110.desc.mid.martial: "\"Minhas habilidades em assuntos de guerra são lendárias, [visiting_liege.GetTitleAsNameNoTooltip]. Se me permitir, ficarei feliz em emprestar essas habilidades a você!\""
 host_dinner_events.3110.desc.mid.learning: ""Ninguém entende o mundo e [talented_pool_character.GetFaith.ReligiousText] como eu, magnânim[visiting_liege.Custom('ES_OA')] [visiting_liege.GetTitleAsNameNoTooltip]. Se me aceitasse, seria uma honra colocar minhas habilidades a serviço de sua corte"."
 host_dinner_events.3110.desc.mid.statecraft: "«Entendo bem a arte de governar, mas minhas habilidades estão sendo desperdiçadas enquanto vagueio de um lugar para outro. Se me aceitarem em sua corte, seria uma honra chamá-lo de meu [visiting_liege.GetTitleAsNameNoTooltip]»."
 host_dinner_events.3110.desc.outro: "\n\nNão é comum encontrar uma pessoa tão fascinante sem um lar próprio, mas há lugar em minha corte para [talented_pool_character.GetSheHe]?"
 host_dinner_events.3110.a: "Claro que há!"
 host_dinner_events.3110.b: "Vá embora."
 host_dinner_if_vassal_accepts_tt: "Se seu vassalo aceitar"
 tour_grounds_if_vassal_rejects_tt: "Se seu vassalo não aceitar"
 host_dinner_events.3100.vassal_accepts: "[stop_host_scope.GetFirstName] aceita"
 host_dinner_events.3100.vassal_refuses: "[stop_host_scope.GetFirstName] recusa"
 host_dinner_events.1009.enjoyed_weed: "[visiting_liege.GetName] apreciou o haxixe"
 host_dinner_events.1009.didnt_enjoy_weed: "[visiting_liege.GetFirstName] não gostou do haxixe"
 host_dinner_events.3020.won_drinking_duel: "Você venceu a disputa de bebida"
 host_dinner_events.3020.lost_drinking_duel: "Você perdeu o duelo de bebidas"
 host_dinner_events.1007.enjoyed_performance: "[visiting_liege.GetFirstName] apreciou a apresentação"
 host_dinner_events.1007.disliked_performance: "[visiting_liege.GetFirstName] não gostou da apresentação"
 host_dinner_events.1060.title: "Bom Apetite"
 host_dinner_events.1060.desc.intro: "Foi-me informado que recentemente faleceu um[dead_soldier.Custom('ES_OA')] de meus melhores soldados do meu séquito, mas seu corpo permaneceu impecável, sem mácula de ferimento ou doença.\n\n"
 host_dinner_events.1060.desc.cannibal_legal: "É claro, como seu [ROOT.Char.GetTitleAsNameNoTooltip], [dead_soldier.GetSheHe] lutou e morreu por mim, então tenho o direito de consumir seu coração e obter o espírito guerreiro,"
 host_dinner_events.1060.desc.secret_cannibal: "Embora o resto do mundo continue sem saber das minhas tendências canibais, alguns dos meus servos de confiança já extraíram o coração dela para o meu consumo,"
 host_dinner_events.1060.desc.outro: "mas como meu [visiting_liege.GetTitleAsNameNoTooltip|U] está de visita, talvez eu devesse lhe conceder a honra de consumir o coração de um dos melhores guerreiros de [ROOT.Char.GetPrimaryTitle.GetName]!"
 host_dinner_events.1060.a: "Um coração digno de um[visiting_liege.Custom('ES_XA')] [visiting_liege.GetTitleAsNameNoTooltip]!"
 host_dinner_events.1060.b: "Eu mesmo comerei o coração."
 you_ate_a_human_heart: "Você comeu um coração humano"
 host_dinner_events.1061.title: "$host_dinner_events.1060.title$"
 host_dinner_events.1061.desc.intro: "Minha próxima refeição me é revelada. Sobre um prato fino há um coração assado lentamente em uma poça de molho de sangue.\n\n"O coração de um poderoso guerreiro, meu [visiting_liege.GetTitleAsNameNoTooltip]! Comei-o e vós também possuireis a coragem e o espírito que teve [dead_soldier.GetSheHe] em vida".\n\n"
 host_dinner_events.1061.desc.cannibal_legal: "Parece absolutamente requintado, cozido à perfeição e tão macio que nem preciso pegar minha faca."
 host_dinner_events.1061.desc.secret_cannibal: "Não tenho escolha senão fingir choque e desconforto diante daquilo. Será que [stop_host_scope.GetName] de alguma forma sabe do meu segredo?"
 host_dinner_events.1061.desc.mid: "Quase vomito ao ver essa coisa! [stop_host_scope.GetName] certamente não quis insinuar que isto é #EMP carne humana#!!"
 host_dinner_events.1061.desc.outro: "Meu anfitri[stop_host_scope.Custom('ES_OnOna')] me olha com expectativa e empurra suavemente o prato para mais perto de mim."
 host_dinner_events.1061.a: "Delicioso!"
 host_dinner_events.1061.b: "Não, tudo bem."
 host_dinner_events.1061.liege_ate_heart: "[visiting_liege.GetFirstName] comeu o coração"
 host_dinner_events.1061.liege_refused_heart: "[visiting_liege.GetName] se recusou"
 host_dinner_events.1070.title: "Potencial desperdiçado"
 host_dinner_events.1070.desc: "Não pensei muito nisso quando providenciei para que [runaway_courtier.GetName] estivesse ao meu lado nesta noite, mas à medida que os pratos vão e vêm, encontro-me cada vez mais intrigad[GetPlayer.Custom('ES_OA')] por [Select_CString( runaway_courtier.IsFemale, 'esta hermosa', 'este hermoso')] [runaway_courtier.GetWomanMan].\n\n“Ah, se ao menos a vida fosse tão interessante na capital. Na maioria dos dias, fico deitado no palácio, ficando cada vez mais cansad[runaway_courtier.Custom('ES_OA')] e perezos[runaway_courtier.Custom('ES_OA')]. Aqui, não me faltam boas conversas. Você me aceitaria como cortesã[runaway_courtier.Custom('ES_OA')]?”."
 host_dinner_events.1070.a: ""É claro, juntem-se a mim!""
 host_dinner_events.1070.b: "\"Não.\""
 host_dinner_events.1071.title: "Troca Cortesã"
 host_dinner_events.1071.desc: "[runaway_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproximou a mim dizendo que recebeu permissão de [stop_host_scope.GetName] para se juntar à sua corte em vez da minha.\n\nPermití-lo certamente melhoraria minha posição com [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitleAsNameNoTooltip], mas o roubo de membros da minha corte é algo que eu realmente possa ignorar?"
 host_dinner_events.1071.a: ""[runaway_courtier.GetNameNoTooltip] é meu[runaway_courtier.Custom('ES_OA')]!"."
 host_dinner_events.1071.refused_to_let_them_go: "[visiting_liege.GetName] se recusou a deixar [runaway_courtier.GetName]"
 host_dinner_events.1071.b: ""Vá aonde seu coração mandar"."
 host_dinner_events.1080.title: "Uma atuação vilanesca"
 host_dinner_events.1080.desc: "Não é segredo que considero [visiting_liege.GetName] [visiting_liege.Custom2('InsultNoun', ROOT.Char)] e [visiting_liege.Custom2('InsultAdjective', ROOT.Char)]. E, ainda assim, [ROOT.Char.Custom('ES_ElLa')] muito imbecil veio profanar meus salões mesmo assim. Detesto ficar em sua companhia enquanto enfia minha comida na goela, mas então me ocorre uma ideia.\n\nPosso fazer com que sua visita seja inesquecível se eu fizer um espetáculo de sua vilania!"
 host_dinner_events.1080.a: "Não merece menos."
 host_dinner_events.1080.b: "Estou acima disso."
 host_dinner_events.1081.title: "[ROOT.Char.GetFirstNameNoTooltip]: [Select_CString( ROOT.Char.IsFemale, 'la villana', 'el villano')] de [stop_host_scope.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 host_dinner_events.1081.desc: "Como de costume, minha refeição vem acompanhada de entretenimento. Os atores realizam grandes feitos de acrobacia e habilidade, mas então começo a notar algo. Durante toda a apresentação, houve um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] vestid[ROOT.Char.Custom('ES_OA')] igual a mim, com o rosto besuntado do que parece ser excremento, cantando músicas sobre minha suposta maldade!\n\nVolto-me surpreendid[ROOT.Char.Custom('ES_OA')] para [stop_host_scope.GetName] e vejo que ele/ela está gargalhando diante dessa exibição de vulgaridade! Sou incapaz de tocar na comida, observando e ouvindo enquanto toda a corte ri dessa zombaria retorcida do meu caráter."
 host_dinner_events.1081.a: "Eu terei minha vingança."
 host_dinner_events.1081.b: "É bem engraçado..."
 host_dinner_events.1081.liked_performance: "A [visiting_liege.GetName] gostou da apresentação"
 host_dinner_events.3120.title: "Um presente digno de um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.GetTitleAsNameNoTooltip]"
 host_dinner_events.3120.desc: "Durante o jantar, encontro uma oportunidade de demonstrar minha majestade. Minha comitiva está repleta de objetos de valor e pessoas talentosas, e talvez eu possa me aproximar de [stop_host_scope.GetName] se deixar um pequeno pedaço de mim aqui.\n\nExistem muitas coisas que posso oferecer por minha benevolência, talvez..."
 host_dinner_events.3120.a: "[courtier_gift.GetNameNoTooltip] poderia ficar aqui."
 host_dinner_events.3120.b: "Meu [artifact_gift.GetNameNoTooltip] poderia ser para [stop_host_scope.GetSheHe]."
 host_dinner_events.3120.c: "Ouro é sempre um ótimo presente."
 host_dinner_events.3120.d: "O presente de uma verdadeira amizade!"
 host_dinner_events.3120.e: "Não devo nenhum presente."
 host_dinner_events.3121.title: "$host_dinner_events.3120.title$"
 host_dinner_events.3121.desc.intro: "Entro no salão de jantar e encontro [visiting_liege.GetName] sentad[visiting_liege.Custom('ES_OA')] à cabeceira da mesa, com os pés erguidos de maneira altiva ao lado de sua refeição.\n\n"Meu bom vassal[ROOT.Char.Custom('ES_OA')]!"
 host_dinner_events.3121.desc.courtier: "Prometo-lhes que [courtier_gift.GetName] é [Select_CString( courtier_gift.IsFemale, 'uma cortesã boa', 'um cortesão bom' )] e leal que servirá bem a vocês no futuro."
 host_dinner_events.3121.desc.artifact: "Meu tesouro está cheio de relíquias e artefatos valiosos. Talvez você queira levar meu [artifact_gift.GetName]."
 host_dinner_events.3121.desc.gold_gift: "Estou sobrecarregado com minha vasta fortuna e gostaria de compartilhar um pouco dessa riqueza com meus súditos mais leais."
 host_dinner_events.3121.desc.best_friend: "Somos amigos há algum tempo e talvez seja hora de levar isso para o próximo nível. Você gostaria de fazer um juramento de #EMP verdadeira#! amizade comigo?"
 host_dinner_events.3121.desc.outro: "Este é o meu presente para você, sem necessidade de reciprocidade"."
 host_dinner_events.3121.a: ""Obrigado!""
 host_dinner_3120_gift_taken: "[stop_host_scope.GetFirstName] pegou o presente"
 host_dinner_3120_gift_refused: "[stop_host_scope.GetFirstName] recusa o presente"
 host_dinner_events.3121.b: "Somos amigos, eternamente."
 host_dinner_events.3121.c: "Eu não vou aceitar."
 host_dinner_events.3130.title: "Não é o que [stop_host_scope.GetSheHe|U] parece"
 host_dinner_events.3130.desc: "Acordo[GetPlayer.Custom('ES_OA')] com uma fome agonizante, incapaz de retomar meu descanso.\n\nVago na escuridão até a cozinha e descubro que o cômodo está levemente iluminado por algo além da minha lâmpada. As prateleiras da despensa brilham com um fulgor dourado, sobrenatural e convidativo.\n\nA curiosidade me domina, incapaz de encontrar a fonte do brilho. Com a chama da minha luz apagada, começo a examinar os cantos da despensa."
 host_dinner_events.3130.a: "Eu #EMP preciso#! chegar ao fundo disso!"
 host_dinner_events.3130.b: "Não posso ficar bisbilhotando por aí."
 host_dinner_events.3131.title: "O Cômodo Atrás da Despensa"
 host_dinner_events.3131.desc: "Com um pouco de esforço, consigo encontrar arranhões no chão onde fica o armário e algumas seções da prateleira muito menos empoeiradas que o resto. Ao tocá-las, as prateleiras se revelam como interruptores mecânicos e, com um pouco de esforço, consigo afastar a despensa da parede para revelar uma sala secreta!\n\nEm meio à pedra úmida há uma robusta porta de madeira com um cadeado minuciosamente decorado em sua maçaneta. Ao inspecioná-lo, os dígitos da fechadura não são números nem letras, mas diagramas de toda sorte de bestas e criaturas grotescas."
 host_dinner_events.3131.a: "Um quebra-cabeça, isso deveria ser trivial."
 host_dinner_events.3131.fail_to_get_it_open: "Você não consegue abrir a porta"
 host_dinner_events.3131.b: "Um bom chute na porta deve resolver!"
 host_dinner_events.3131.c: "Isso dá muito trabalho."
 host_dinner_events.3132.title: "A Biblioteca Oculta"
 host_dinner_events.3132.desc: "No vazio onde antes havia a porta, vejo um gabinete adornado com toda sorte de substâncias desconhecidas borbulhando em fervuras suaves e pequenos animais presos em pequenas gaiolas. No centro da sala há um único livro elevado sobre um pedestal, cuja capa reluz com desenhos de bestas e seres grotescos idênticos aos da fechadura de quebra-cabeça da sala.\n\nTomo o livro em minhas mãos e sinto a curiosidade tomar conta de mim enquanto passo o dedo por sua superfície coriácea. Então vejo, escondido entre os símbolos profanos de sua capa, um único caractere inteligível: o número um. Tento abrir o livro, mas descubro que ele está firmemente trancado com um pequeno quebra-cabeça triangular."
 host_dinner_events.3132.a: "O que isso poderia significar?"
 host_dinner_events.3132.b: "Mais uma peça do mistério."
 artifact_secret_journal_with_cipher_description: "Um par de diários, um trancado com um quebra-cabeça ininteligível, e o outro preenchido com o código para uma espécie de linguagem codificada. Os dois parecem pertencer um ao outro."
 artifact_secret_journal_with_puzzle_description: "Um estranho diário encadernado em couro, trancado com um quebra-cabeça ininteligível. Junto com ele há outro diário com a chave para decifrar o quebra-cabeça."
 host_dinner_events.3132.c: "Por fim, eu os tenho todos."
 artifact_secret_journal_unsolved_description: "Três diários, cada um com peças diferentes para desvendar os mistérios dos outros, embora o mistério ainda não tenha sido solucionado."
 host_dinner_events.3132.d: "Devo deixar isso aqui."
 host_dinner_events.3133.title: "O Calabouço Oculto"
 host_dinner_events.3133.desc: "A porta cede e me revela... algo que eu gostaria de não ter visto.\n\nCada parede está adornada com objetos estranhos: chicotes, pelourinhos, falos de madeira, para citar alguns. O chão está úmido com o que #EMP espero#! espero# que seja apenas água, mas, dada a parafernália nesta sala, temo pensar que mistura de fluidos corporais possa ser."
 host_dinner_events.3133.a: "Agora eu sei das coisas."
 host_dinner_events.3134.title: "A Açougue Oculto"
 host_dinner_events.3134.desc: "Quando a porta se abre um pouco, sou derrubado por um fétido cheiro acre, com meu traseiro encharcado em uma poça de sangue fresco.\n\nA sala está cheia de cadáveres humanos, meio retalhados e pendurados em ganchos de açougue. Uma pele humana jaz sobre uma mesa de açougue ao lado do corpo ao qual um dia esteve agarrada, com uma faca de açougueiro suja ao lado. As expressões contorcidas de horror nos rostos das vítimas são uma presença permanente na sala."
 host_dinner_events.3134.a: "Nunca poderei apagar da minha memória o que vi."
 host_dinner_events.3135.title: "O Túnel de Fuga"
 host_dinner_events.3135.desc: "A porta se abre para revelar um túnel escuro e viscoso, recoberto de líquenes e fungos. Dou meu jeito de avançar e sigo essa caverna até o fim, emergindo do lado de fora em uma estrada rural de aparência inocente.\n\nEstá claro que é o túnel de fuga de [stop_host_scope.GetName] em caso de emergência."
 host_dinner_events.3135.a: "Que descoberta!"
 host_dinner_events.3136.title: "O Quarto Secreto"
 host_dinner_events.3136.desc: "A porta se abre com um gemido aterrorizante. Na entrada há um[quasimodo_child.Custom('ES_XA')] [quasimodo_child.Custom('GirlBoy')]deformado que me olha horrorizado[quasimodo_child.Custom('ES_OA')]. \"Não olhe para mim!\" grita, cobrindo o rosto com as mãos. \"Oh, que horrores te aguardam se [stop_host_scope.GetMotherFather]descobre que você me viu!\" É então que percebo a semelhança, isto é claramente o[Select_CString( quasimodo_child.IsFemale, 'una hija ilegítima', 'un hijo ilegitimo')]de[stop_host_scope.GetNameNoTooltip]!"
 host_dinner_events.3136.a: "Todos saberão."
 host_dinner_events.3136.b: "Ninguém jamais saberá."
 host_dinner_events.3140.title: "Uma Combinação Saborosa"
 host_dinner_events.3140.desc: "A vida como [ROOT.Char.GetTitleAsNameNoTooltip] traz à minha mesa toda sorte de comidas magníficas e refinadas, mas, de um tempo para cá, cansei desses mesmos sabores e texturas. Desejo algo verdadeiramente escandaloso, verdadeiramente exótico!\n\nDe um lado, vejo um prato de [stop_host_scope.Custom('GetExpensiveDessert')], e do outro, legumes cozidos. E se eu pegasse esses dois sabores distintos e os provasse ao mesmo tempo?"
 host_dinner_events.3140.a: "Uma experiência que vale a pena."
 host_dinner_events.3140.satisfying_taste: "O sabor foi magnífico."
 host_dinner_events.3140.it_did_not_work: "A experiência foi um fracasso."
 host_dinner_events.3140.b: "Eu não poderia ser tão audacioso."
 host_dinner_events.1090.title: "Veneno"
 host_dinner_events.1090.desc: "Parece que uma oportunidade de ouro caiu em minhas mãos com a visita de [visiting_liege.GetName] aos meus salões.\n\n[visiting_liege.GetSheHe|U] espera uma refeição inesquecível e, com um pouco de beladona moída, vou garantir que [visiting_liege.GetNameNoTooltip] jamais volte a experimentar um jantar como este!\n\nA hora de atacar se aproxima, será que realmente posso correr esse risco?"
 host_dinner_events.1090.a: "Claro que posso!"
 host_dinner_events.1090.b: "A hora não é adequada."
 host_dinner_if_you_succeed_tt: "Se você tiver sucesso"
 host_dinner_if_you_fail_tt: "Se você falhar"
 host_dinner_events.1091.title: "Veneno!"
 host_dinner_events.1091.desc: "Como meu [stop_host_scope.Custom('GetExpensiveDessert')] com quase nenhuma preocupação no mundo, satisfeit[GetPlayer.Custom('ES_OA')] com mais uma refeição deliciosa no estômago.\n\nNo entanto, enquanto subo as escadas em direção à cama, começo a me sentir fraco, como se o sangue em meu corpo estivesse engrossando, quase coagulado em minhas veias. Antes mesmo de chegar ao topo da escada, desabo, ofegando por ar. À medida que o mundo ao meu redor se torna negro, a última coisa que vejo é [stop_host_scope.GetName] me olhando com um sorriso cúmplice."
 host_dinner_1091_murder_succesful: "Você envenenou seu [visiting_liege.GetTitleAsNameNoTooltip]"
 host_dinner_events.1091.a: "Como... você pôde..."
 host_dinner_events.1092.title: "Tentativa de Assassinato"
 host_dinner_events.1092.desc: "Viro-me para o meu [stop_host_scope.Custom('GetExpensiveDessert')] e começo a comer, mas uma sensação incômoda toma conta de mim e faz minhas mãos gananciosas pararem.\n\nVasculho a sobremesa e a cheiro com atenção, e não há dúvida em minha mente de que colocaram veneno na minha comida! Não há outra explicação, [stop_host_scope.GetName] está tentando me matar."
 host_dinner_events.1092.a: "O vilão!"
 host_dinner_1091_murder_failed: "Seu assassinato falhou"
 host_dinner_events.1093.title: "$host_dinner_events.1092.title$"
 host_dinner_events.1093.desc: "Meu leal provador de comida[food_taster_scope.Custom('ES_XA')], [food_taster_scope.GetName], cumpre seu dever. Termina sua inspeção com uma degustação da minha [stop_host_scope.Custom('GetExpensiveDessert')] e me dá um pequeno aceno de aprovação.\n\nMas, em pouco tempo, [food_taster_scope.Custom('ES_ElLa')] pobre [food_taster_scope.GetWomanMan] começa a engasgar e tossir, lutando para respirar e batendo com o punho na mesa. Em segundos, seus lábios azuis exalam o último suspiro, e eu fico sozinho com o sorriso desconfortável de [stop_host_scope.GetName]."
 host_dinner_events.1093.a: ""Assassino[stop_host_scope.Custom('ES_OA')]!""
 host_dinner_events.3150.title: "Uma Questão de Honra"
 host_dinner_events.3150.desc: "Estive sentado[ROOT.Char.Custom('ES_OA')] ao lado [Select_CString( joker_knight.IsFemale, 'da leal cavaleira', 'do leal cavaleiro' )] de [stop_host_scope.GetName], [joker_knight.GetName], e até agora tem sido um prazer. Est[joker_knight.Custom('ES_EA')] [joker_knight.GetWomanMan] não se detém ao contar uma piada.\n\n"Eu vos digo, de todas as criaturas [ROOT.Char.Custom2('InsultNoun', ROOT.Char)] que encontrei, [ROOT.Char.GetName] é [ROOT.Char.Custom('ES_ElLa')] mais [ROOT.Char.Custom2('InsultAdjective', ROOT.Char)]! Ha!"\n\n"O que ousastes dizer sobre meu [ROOT.Char.GetLadyLord]?", levanta-se [humorless_knight.GetName] de seu assento. "Eu vos desafio, vilã[joker_knight.Custom('ES_OA')]!""
 host_dinner_events.3150.a: "Que divertido!"
 host_dinner_events.3150.your_knight_wins: "[humorless_knight.GetName] é vitorioso!"
 host_dinner_events.3150.your_knight_loses: "[humorless_knight.GetName] perde"
 host_dinner_events.3150.b: "Recue, tolo."
 host_dinner_events.3000.title: "Preparando-se para o Jantar"
 host_dinner_events.3000.desc.intro: "Recebo uma recepção digna de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] às portas da [stop_host_scope.Custom('FortifiedBuilding')] [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l] em [ROOT.Char.GetCurrentLocation.GetName],"
 host_dinner_events.3000.desc.type.majesty: "e não há dúvida de que o esplendor de minha comitiva causou uma grande impressão.\n\n"
 host_dinner_events.3000.desc.type.taxation: "meu carro de cofres e os cobradores de impostos deixam claro o objetivo da minha visita.\n\n"
 host_dinner_events.3000.desc.type.intimidation: "e minha fria aceitação, ladead[ROOT.Char.Custom('ES_OA')] por guardas fortemente armados, define o tom desejado.\n\n"
 host_dinner_events.3000.desc.mid.hates_vassal: "Aceitar a hospitalidade de semelhante [visiting_liege.Custom2('InsultNoun', ROOT.Char)] [stop_host_scope.Custom2('InsultAdjective', ROOT.Char)] é suficiente para me tirar o apetite; é bom que haja [ROOT.Char.Custom('FavoriteTreat')]…"
 host_dinner_events.3000.desc.mid.lover: "Que destino cruel, ter que manter tais formalidades com meu querid[stop_host_scope.Custom('ES_OA')] [stop_host_scope.Custom('RomanticComplimentNoun')]… Talvez [stop_host_scope.GetHerHim] o/a visite depois da janta…"
 host_dinner_events.3000.desc.mid.friend: "Fazia tempo demais que eu não me sentava para jantar com [Select_CString( stop_host_scope.IsFemale, 'uma boa amiga', 'um bom amigo' )]! é raro demais esquecermos os fardos do reino em um espírito como este!"
 host_dinner_events.3000.desc.mid.close_family: "É bom ver meu [ROOT.Char.Custom2('RelationToMeShort', stop_host_scope)]! Nos abraçamos formalmente, marcando publicamente os laços de família."
 host_dinner_events.3000.desc.mid.house: "Esta é uma oportunidade rara de me divertir na boa companhia de um[stop_host_scope.Custom('ES_XA')] [stop_host_scope.Custom('GetDaughterSon')] da Casa [ROOT.Char.GetHouse.GetBaseName]."
 host_dinner_events.3000.desc.mid.powerful_vassal: "É claro, também devo reconhecer sua preeminência entre os vassalos de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], pelo menos publicamente…"
 host_dinner_events.3000.desc.mid.default: "Meu vassal[stop_host_scope.Custom('ES_OA')] me recebe diligentemente com toda a deferência necessária."
 host_dinner_events.3000.desc.mid: "\n\n[stop_host_scope.GetFirstNameNoTooltip] explica o banquete noturno planejado, prometendo que os entretenimentos e as provisões oferecidos estarão próximos aos padrões dos jantares da minha própria corte."
