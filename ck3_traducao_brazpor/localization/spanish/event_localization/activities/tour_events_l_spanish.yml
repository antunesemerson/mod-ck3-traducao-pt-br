 host_dinner_events.3134.desc: "Quando a porta se abre um pouco, sou derrubad[ROOT.Char.Custom('ES_OA')] por um fétido cheiro acre, com meu traseiro encharcado em uma poça de sangue fresco.

A sala está cheia de cadáveres humanos meio retalhados e pendurados em ganchos de açougue. Pele humana jaz sobre uma mesa de corte ao lado do corpo ao qual um dia pertenceu, com um cutelo sujo ao lado. As expressões contorcidas de horror nos rostos das vítimas são uma presença permanente na sala."
