 festival.101.t: "Mangas perfumadas"
 festival.101.desc: "Antes de ver [target_character.Custom('ES_AlAla')] [target_character.GetTitledFirstName|l], já é possível #EMP sentir seu cheiro#!. Embora #EMP seja#! costume encharcar a túnica com incenso aromático, raramente se pretende que o efeito seja percebido a cem passos de distância de quem a veste.\n\nTalvez seja necessário enviar uma nota discreta, embora um sussurro em outro ouvido possa garantir que essa excentricidade perdure muito depois de o aroma ter desaparecido."
 festival.101.a: "Envie alguém com tato... e um péssimo olfato."
 festival.101.b: "Todos #EMP deben#! saber disso."
