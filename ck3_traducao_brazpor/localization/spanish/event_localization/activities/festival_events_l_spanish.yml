 festival.1000.t: "Companhia estimada"
 festival.1000.desc: "Desfrutando tranquilamente do andamento lânguido das festividades, [bloc_member_head_1.Custom('ES_ElLa')] [bloc_member_head_1.GetTitledFirstName|l] de [bloc_member_head_1.GetHouse.GetBaseName]. [bloc_member_head_2.Custom('ES_ElLa')] [bloc_member_head_2.GetTitledFirstName|l] de [bloc_member_head_2.GetHouse.GetBaseName] e eu nos vemos trocando gentilezas e doces à sombra."
 festival.1000.outro: "\n\nPodemos nos contar entre os nobres mais importantes do reino, e oportunidades como esta para conviver de forma tão natural são raras."
 festival.1000.a: ""Considero uma sorte para minha família contar com a companhia de tamanha qualidade"."
 festival.1000.b: ""Conto os [bloc_member_head_1.GetHouse.GetBaseNameNoTooltip] entre meus amigos mais honrados"."
 festival.1000.c: "[bloc_member_head_1.GetFirstNameNoTooltip], você gosta de se ajoelhar diante dos [bloc_member_head_1.GetHouse.GetConfederation.GetLeadingHouse.GetBaseNameNoTooltip]?"
 festival.1000.e: ""A mansão [bloc_member_head_1.GetHouse.GetBaseNameNoTooltip] é digna de ser contemplada"."
 festival.1000.f: ""Uma grande exibição dos [bloc_member_head_2.GetHouse.GetBaseNameNoTooltip] este ano"."
 festival.1000.g: "Tais momentos devem ser simplesmente apreciados."
 festival.2000.t: "Os caminhos se separam"
 festival.2000.intro_desc: "À medida que as festividades da noite diminuem e dão lugar aos primeiros raios dourados da aurora, os presentes aproveitam esses momentos finais antes de retornar à monotonia da responsabilidade diária.\n\n"
 festival.2000.intro_part_two: "Meu [ROOT.Char.Custom2( 'RelationToMeShort', friendly_attendee )], [friendly_attendee.Custom('ES_ElLa')] [friendly_attendee.GetTitledFirstName|l], aproxima-se de mim. "Sua companhia foi muito bem-vinda nestes últimos dias", e pausa para sorrir calorosamente.\n\n"
 festival.2000.bloc_invitation: ""Tanto que meus compatriotas e eu gostaríamos de fazer um convite a você: que passe a fazer parte dos nossos e, em troca, nós sempre estaremos às suas costas"."
 festival.2000.befriending: ""Seria uma honra imensa se no futuro me contásseis entre os vossos confidentes"."
 festival.2000.nobody_likes_you: "O fluxo constante dos sonolentos e saciados dos alojamentos para a estrada mingua até desaparecer, e logo meu séquito e eu somos tudo o que resta."
 festival.2000.a_accept: "Pode contar com meu apoio, assim como eu contarei com o seu."
 festival.2000.a_decline: "Agradeço, mas estou satisfeito[ROOT.Char.Custom('ES_OA')] com como estou."
 festival.2000.b_accept: "Vínculos assim são raros e devem ser apreciados."
 festival.2000.b_decline: "Aprezo sua consideração, mas devo recusar."
 festival.2000.c: "Levaremos esses prazeres fugazes em nossas memórias."
 friend_festival_bonding: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'congeniasteis', 'congeniaron')] pelo tempo que [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'pasasteis', 'pasaron')] em companhia durante um festival."
