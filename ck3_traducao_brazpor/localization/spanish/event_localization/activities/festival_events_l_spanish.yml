 festival.114.t: "Abandonado na praia"
 festival.114.desc: "Ao respirarmos o ar da noite, meus acompanhantes e eu nos deparamos com [target_character.Custom('ES_ElLa')] [target_character.GetTitledFirstName|l] que olha a água com anseio.\n\nA princípio, suponho que ele esteja encantado com a beleza do reflexo da lua, mas o barulho de um grupo de festeiros chama minha atenção. Parece que eles embarcaram num barco e deixaram para trás [target_character.Custom('ES_AlAla')] pobre [target_character.GetTitledFirstName|l]!"
 festival.114.a: ""Esqueça-os e junte-se a nós!""
 festival.114.b: ""Que triste! Como é ser deixado de lado como um brinquedo quebrado?""
 festival.114.c: "#EMP Nosotros#! jamais abandonaríamos um[target_character.Custom('ES_OA')] dos nossos."
