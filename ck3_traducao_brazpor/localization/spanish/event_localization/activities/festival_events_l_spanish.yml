l_spanish:
 festival.001.t: "Perdido na multidão"
 festival.001.desc: "Ao observar a multidão que se reuniu para celebrar, alegra-me vê-la cheia de risadas de crianças e sorrisos satisfeitos de seus pais. No entanto, um movimento repentino e irregular chama minha atenção; pequeno demais para ser uma criança e demais… #EMP peludo#!?\n\nParece ser um filhote que manca entre as pisadas de gigantes, perdido e sozinho."
 festival.001.a.tt: "#weak Busquemos un nuevo hogar para este cachorrillo #!"
 festival.001.a: "Venha aqui, pequenino, e você será bem cuidado."
 festival.001.b: "Seu destino não é problema meu."
 festival.001.b.tt: "Certamente o filhote pode encontrar um novo lar...?…"
 festival.001.b.custom.tooltip: "Você deixa o cachorrinho à própria sorte"
 festival.002.t: "Uma mente curiosa"
 festival.002.desc: "Um leve puxão na manga desvia minha atenção das vistas do festival; ao olhar para baixo, meu olhar encontra os olhos de [Select_CString( curious_child.IsFemale, 'uma menina pequena', 'um menino pequeno' )], arregalados de admiração.\n\n"Por que há tanta gente?", pergunta com simples curiosidade ingênua. "O que está acontecendo?""
 festival.002.a: "Veja bem, vou lhe contar uma história…"
 festival.002.a.inspired_child: "[Select_CString( curious_child.IsFemale, 'A menina', 'O menino' )] parece ansios[curious_child.Custom('ES_OA')] por ouvir"
 festival.002.a.bored_child: "[Select_CString( curious_child.IsFemale, 'À menina', 'Ao menino' )] não gosta de ouvir histórias"
 festival.002.b: "Seus pais não lhe ensinaram que não se fala com estranhos?"
 festival.002.b.flavor: "#weak Est[curious_child.Custom('ES_EA')] mocos[curious_child.Custom('ES_OA')] insolente merece uma recompensa por sua impertinência.#!"
 festival.002.c: "Que alguém leve [curious_child.GetHerHim] de volta aos pais. #EMP Y deprisa#!."
 child_is_excited: "Suas histórias alegram [Select_CString( curious_child.IsFemale, 'à menina', 'ao menino' )]"
 child_is_bored: "[Select_CString( curious_child.IsFemale, 'A menina', 'O menino' )] boceja e vai embora enquanto você fala"
 child_is_kicked: "Um tapinha rápido na orelha e [Select_CString( curious_child.IsFemale, 'la niña', 'el niño' )] foge de volta para a multidão"
 festival.003.t: "Delícias deliciosas"
 festival.003.desc: "O cheiro de [ROOT.Char.Custom('GetLocalStreetFoodPlural')] que vem das barracas dos vendedores sussurra promessas doces e saborosas para meu estômago roncando.\n\nUma longa fila serve como testemunho visível da demanda por essas delícias, mas certamente [Select_CString( ROOT.Char.IsFemale, 'a anfitriã', 'o anfitrião' )] do dia pode ter #EMP alguns#! privilégios, não pode?!"
 festival.003.a: "Abram passagem [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!"
 festival.003.b: "Que o povo desfrute de seus pequenos prazeres."
 festival.004.t: "Desejos sussurrados"
 festival.004.desc: "Os convidados se reúnem ao redor do bambu; seus galhos carregam tiras de papel que trazem os desejos de seus donos.\n\nSob o suave brilho das estrelas, meu povo confia seus sonhos aos amantes acima, e me ocorre que eu também poderia fazer um pedido."
 festival.004.a: "Que os deuses concedam riqueza e abundância a todos."
 festival.004.b: "Desejo um amor tão eterno quanto as próprias estrelas."
 festival.004.c: "Concedei-me a força para concretizar minhas ambições."
 festival.004.d: "Desejo encontrar o amor em breve."
 prosperity_festival_in_province_modifier: "Um desejo de prosperidade"
 prosperity_festival_in_province_modifier_desc: "As estrelas parecem favorecer este condado, e o governante desejou prosperidade para todos"
 prosperity_festival_find_love_modifier: "Um desejo de amor"
 prosperity_festival_find_love_modifier_desc: "Este personagem desejou encontrar amor"
 prosperity_festival_health_modifier: "Um desejo de saúde"
 prosperity_festival_health_modifier_desc: "Este personagem desejou ter saúde"
 festival.005.t: "Um público cativo"
 festival.005.desc: "Quando o festival se aproxima do auge, meu [target.chaplain.Custom('MyPriestTitle')|l] sobe ao palco, sua voz ecoa acima da multidão e começa a exaltar a reforma moral e a disciplina espiritual, tentando desviar a alegre energia do meu festival para um sermão. Alguns consideram suas palavras inspiradoras, enquanto outros resmungam que um festival não é lugar para tamanha solenidade."
 festival.005.a: "[target_chaplain.GetSheHe|U] fala pelo divino."
 festival.005.b: "Eu mesmo vou tentar fazê-lo ver o bom senso."
 festival.005.c: "Cansei dessa diatribe, baixem[target_chaplain.GetHerHim] de lá!"
 festival.005.b.success: "Você consegue fazer[target_chaplain.GetHerHim] se retirar do palco"
 festival.005.b.tt.success: "[target_chaplain.GetHerHim|U] convenceu"
 festival.005.b.failure: "Não há quem extinga seu fervor impulsionado pela divindade"
 festival.005.b.tt.failure: "Você não consegue convencer[target_chaplain.GetHerHim]"
 festival.006.t: "Rito de purificação"
 festival.006.desc: "Com suas preces solenes concluídas, os [ROOT.Char.GetFaith.PriestNeuterPlural] iniciam o rito de purificação, que lavará quaisquer impurezas espirituais e garantirá um ano harmonioso pela frente. Como parte da cerimônia, será minha sagrada responsabilidade tirar água pura do poço sagrado."
 festival.006.a: "Hoje, a humildade serve melhor do que o orgulho."
 festival.006.b: "Uma exibição suntuosa agora poderia elevar meu prestígio."
 festival.006.c: "Que uma figura menor cuide disso; isso convém à minha posição."
 festival.007.t: "Competição à luz da lua"
 festival.007.desc: "A altura da lua marca a chegada da meia-noite e, com ela, o início de uma disputa de força sempre popular entre o povo. O [ROOT.Char.GetFaith.PriestMale] lançará bastões no meio da multidão, e a tradição diz que aqueles que saírem da briga com um em mãos receberão grande fortuna no ano seguinte."
 festival.007.a: "Esta fortuna será minha!"
 festival.007.b: "Deixarei que os outros se cansem primeiro, e então reivindicarei a vitória em silêncio."
 festival.007.c: "Algumas competições são melhores apreciadas pela plateia[ROOT.Char.Custom('ES_XA')]."
 festival.007.a.success: "Você domina seus oponentes"
 festival.007.a.failure: "Seus oponentes te superam"
 festival.007.b.success: "Você engana seus oponentes"
 festival.007.b.failure: "Você não engana seus oponentes"
 festival.007.a.tt.success: "Você venceu"
 festival.007.a.tt.failure: "Você perdeu"
 festival.008.t: "Dança da abundância"
 festival.008.desc: "O próprio ar vibra com o assobio das flautas e o ribombar dos tambores, enquanto que [dancer.GetHerHim] jovens dançam com graciosidade em seus trajes esvoaçantes e vibrantes.\n\nÉ sua apresentação elegante, que agrada tanto aos mortais quanto aos divinos, que abençoará a terra sob nossos pés com uma colheita farta."
 festival.008.a: "Que dança mais linda."
 festival.008.b: "Ao vê-las, sinto a verdadeira paz."
 respected_tradition_modifier: "Tradição respeitada"
 festival.009.t: "Um desejo numa árvore"
 festival.009.desc: "Em [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetBaronyNameExplicitlyNoTooltip], existe uma tradição local em que as pessoas confiam seus desejos mais sinceros a pedaços de papel e os penduram em uma árvore.\n\nAo inspecioná-los mais de perto, vejo que a maioria dos desejos é o que se esperaria — riqueza, amor, prosperidade —, mas, entre eles, há alguns inscritos com desejos mais sombrios."
 festival.009.a: "Conhecer os pensamentos mais íntimos de outra pessoa não é uma pequena vantagem."
 festival.009.b: "A malícia não tem lugar entre estes galhos."
 festival.010.t: "Bênçãos de papel"
 festival.010.desc: "A rua é uma explosão de vibração e cor, incontáveis enfeites tremulam brilhantemente na brisa. Aplausos e risadas enchem o ar enquanto o povo admira as mercadorias dos artesãos. Talvez eu devesse adquirir um destes objetos para mim?"
 festival.010.a: "Um conjunto de guindastes de papel coloridos, um lembrete da importância da família."
 festival.010.b: "Um quimono de papel exquisitamente dobrado, um símbolo de saúde."
 festival.010.c: "Deixem que os outros se adornem assim; a simplicidade me cai melhor."
 good_health_modifier: "Vida saudável"
 good_health_modifier_desc: "Este personagem comprou uma decoração de quimono de papel."
 strong_family_modifier: "Os laços da família"
 strong_family_modifier_desc: "Este personagem comprou um enfeite de origami de guindaste."
 festival.012.t: "Celebração estridente"
 festival.012.desc: "As lanternas iluminam a festa da noite enquanto o ar pulsa com música e explosões de riso. Não consigo evitar me sentir comovid[ROOT.Char.Custom('ES_OA')] com o espetáculo diante de mim."
 festival.012.a: "Sua alegria simples tranquiliza suavemente a alma."
 festival.012.b: "Esta vivacidade é verdadeiramente revigorante."
 festival.012.c: "O barulho é avassalador; anseio por quietude."
 festival_spirit_modifier: "Espírito do festival"
 festival_spirit_modifier_desc: "O espírito deste personagem foi revigorado pelo clima do festival."
 festival.014.t: "Dias de mangas bailarinas"
 festival.014.desc: "Hoje é uma ocasião para celebrar, mas também para assegurar as bênçãos dos deuses. Olhos mortais e divinos examinarão nossa conduta e oferendas, portanto devemos ter o cuidado de garantir que tudo esteja em ordem."
 festival.014.a: "Que os deuses olhem por nós com bons olhos."
 festival.016.t: "Honra manchada"
 festival.016.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('clumsy_oaf'))] [clumsy_oaf.GetFirstName] encara com horror abjeto enquanto observamos o saquê pingar de minhas vestes, a luxuosa roupa já escurecendo com a mancha que se espalha.\n\nOs que nos cercam estão paralisados pela curiosidade, escondendo suas reações atrás de leques pintados, à espera — não, antecipando — uma explosão iminente."
 festival.016.a: "Seu idiota descuidado[clumsy_oaf.Custom('ES_OA')]! Vai pagar caro por isso!"
 festival.016.b: "As vestes podem ser substituídas."
 festival.017.t: "Marionetes amotinadas"
 festival.017.desc: "Um marionetista errante decidiu fazer do festival o seu palco, cercado por dezenas de espectadores risonhos.\n\nEnquanto observo os bonecos dançando, a apresentação começa a assumir um aspecto incômodo; a figura do governante exigente me parece familiar demais para o meu gosto, e a multidão se diverte demais com a sua trapalhada."
 festival.017.a: "Vou rir mais alto do que qualquer um!"
 festival.017.b: "Queimem esses bonecos insolentes."
 festival.017.c: "Meus agentes devem observar as reações da audiência."
 festival.018.t: "Transe e tributo"
 festival.018.desc: "A sacerdotisa do santuário estremece violentamente, como se estivesse possuída, sua voz sobrenatural entoa comandos divinos.\n\nParece que esta divindade em particular tem afinidade por sake, e em quantidades substanciais. Recusar seria ofender uma entidade poderosa, mas não consigo deixar de me perguntar se isto talvez não seja mais uma encenação ímpia do que uma invocação."
 festival.018.a: "Vão buscar o saquê, e vamos beber juntos!"
 festival.018.b: "E uma xícara modesta e um convite…?"
 festival.018.c: "Este espetáculo acabou."
 friend_invited_priestess: "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'convidou', 'convidou')] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )] a juntar-se à [Select_CString(CHARACTER.IsLocalPlayer, 'sua', 'sua')] corte após ver [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'sua', 'sua')] atuação impressionante em um festival."
 friend_invited_priestess_corresponding: "[CHARACTER.GetShortUINameU] [Select_CString(CHARACTER.IsLocalPlayer, 'foi', 'foi')] convidad[CHARACTER.Custom('ES_OA')] à corte de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )] após ver [Select_CString(CHARACTER.IsLocalPlayer, 'sua', 'sua')] apresentação impressionante em um festival."
 festival.019.t: "Drama por decreto"
 festival.019.desc: "Meu administrador[play_planner.Custom('ES_XA')], [play_planner.FirstName] se curva respeitosamente diante de mim. "Deve haver uma peça teatral, [ROOT.Char.Custom('FormOfAddressForLiege')]," diz ele. "Mas a escolha da história é vosso privilégio." Será algo para entreter o povo ou para lembrá-lo do seu lugar?"
 festival.019.a: "Que seja uma saga sobre a glória da minha família."
 festival.019.b: "Uma peça moralizante ensinará a virtude da obediência."
 festival.019.c: "Consagremo-la aos deuses e assim conquistaremos suas bênçãos."
 festival.020.t: "Glória ao galope"
 festival.020.desc: "O rio cintila sob o sol do meio-dia enquanto os arqueiros montam seus cavalos, enquanto do outro lado do riacho os assistentes erguem seu alvo: um leque de papel.\n\nEm algum lugar, um tambor ecoa, abafando por um instante o burburinho das apostas sobre qual arqueiro sairá vitorioso."
 festival.020.a: "Prepare meu corcel — o prêmio será meu!"
 festival.020.b: "Eu mesmo farei uma aposta!"
 festival.020.c: "Que atirem, mas tragam-me um fragmento do leque para dar sorte."
 festival.021.t: "Parafernália infernal"
 festival.021.desc: "O ritmo previsível dos festejos é subitamente quebrado com a chegada de "ogros" mascarados brandindo tochas em chamas, chovendo faíscas sobre a multidão em fuga. Perto dali, os sacerdotes preparam seu contra-ataque, a inevitável vitória ritual sobre os espíritos malignos."
 festival.021.a: "Eu liderarei pessoalmente este "contra-ataque"!"
 festival.021.b: "Certifique-se de que cada lar tenha um balde de água pronto."
 festival.021.c: "Tradição ou não, o risco de incêndio é grande demais."
 festival.022.t: "Bronca no festival"
 festival.022.desc: "Dois [rumbler_one.GetWomenMen] de vilas vizinhas convergiram nos terrenos do festival para resolver suas diferenças como dita a tradição: erguendo seus palanquins ao alto e chocando-os um contra o outro na tentativa de derrubar o palanquim do oponente ao chão.\n\nLascas voam a cada impacto! Os brados turbulentos da multidão levam os combatentes a colisões cada vez mais explosivas."
 festival.022.a: "Não vou permitir violência, não importa a tradição!"
 festival.022.b: "Os vencedores serão bem recompensados!"
 festival.022.c: "Se a multidão quiser um espetáculo, pode pagar para vê-lo."
 festival.023.t: "Procissão em perigo"
 festival.023.desc: "Tambores de couro de cervo retumbam para anunciar o início da procissão cerimonial. Os portadores de estandartes lideram orgulhosamente a marcha, resplandecentes em seus trajes festivos, seguidos pelo majestoso palanquim, erguido sobre os ombros dos servos.\n\n"Cuidado!", a pitoresca procissão se desfaz quando um portador do palanquim grita ao perder o controle, fazendo com que o palanquim se incline perigosamente."
 festival.023.a: "Aguentem firme, já vou!"
 festival.023.b: "Faça com que o bobo seja açoitado, e que sua aldeia pague uma penalidade."
 festival.024.t: "Dança de guerra de madeira"
 festival.024.desc: "#EMP CRAC!#! #EMP CRAC!#! Estes sons altos devem pôr todos os espíritos malignos em fuga! Os jovens da aldeia à minha frente continuam batendo os pés e quebrando suas varas de madeira com o ímpeto de guerreiros ferozes.\n\nEsta tradição estimulante poderia ser vantajosa em outras frentes, se suas varas fossem trocadas por lanças."
 festival.024.a: "Marquem os mais fortes; poderíamos usar homens assim."
 festival.024.b: "A precisão deles é admirável!"
 festival.024.c: "Que demonstração de força."
