 festival.105.t: "Uma prova de astúcia"
 festival.105.desc: "Uma nota, escrita por uma mão elegante, pende delicadamente de um ramo. "[target_character.Custom('ES_ElLa')|U] [target_character.GetTitledFirstName|l] nos pregou um enigma!", exclama [target_character2.Custom('ES_ElLa')] [target_character2.GetTitledFirstName|l].\n\n"Um desafio", corrige [target_character3.Custom('ES_ElLa')] [target_character3.GetTitledFirstName|l]. "Acredita-se que [target_character.Custom('ES_ElLa')] seja o mais inteligente entre nós. Se ofereceu para dar o que for ao primeiro que o resolver; #EMP claramente#! não espera que nenhum de nós tenha sucesso.""
 festival.105.a: "Desvendarei este enigma e, com isso, acabarei com a arrogância [target_character.Custom('ES_DelDela')] [target_character.GetTitledFirstNameNoTooltip|l]!"
 festival.105.b: "Que construção tão desconcertante! Sua esperteza é verdadeiramente incomparável."
 festival.105.c: "O início de uma competição de raciocínio!"
 festival.105.a.success: "Você resolve o enigma com uma facilidade impressionante"
 festival.105.a.success.toast: "Você desvenda o enigma com facilidade"
 festival.105.a.failure: "O enigma te deixa sem saber o que fazer"
 festival.105.a.failure.toast: "Você não consegue resolver o enigma"
 festival.105.c.success: "Você resolve os enigmas e confunde seus colegas enigmistas na mesma medida"
 festival.105.c.success.toast: "A festa de enigmas foi um sucesso retumbante"
