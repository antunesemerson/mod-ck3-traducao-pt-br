 festival.104.b.success: "Você põe em dúvida a integridade deles"
 festival.104.b.success.toast: "Uns rumores duvidosos circulam ao redor deles"
 festival.104.b.failure: "Sua campanha sussurrante é totalmente ignorada"
 festival.104.b.failure.toast: "Sua tentativa de miná-los falha completamente"
