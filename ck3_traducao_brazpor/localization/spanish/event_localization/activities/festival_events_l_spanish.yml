 festival_odious_odor: "Odor repelente"
 festival.102.t: "Copas erguidas"
 festival.102.desc: "Após um dia de festividades, a noite cai sobre nós e a #EMP verdadeira#! celebração finalmente começa, com o vinho de nosso anfitrião fluindo como um rio incessante.\n\nCada bebida convida a outra, e depois outra. [target_character2.Custom('ES_ElLa')|U] [target_character2.GetTitledFirstName|l] faz uma piada que mal consigo entender, mas [target_character.Custom('ES_AlAla')] [target_character.GetTitledFirstName|l] parece achar extremamente engraçado. Talvez um pouco mais de bebida me ajude a achar graça nisso..."
 festival.102.a: "O vinho desperta algo em meu interior; sinto uma ode vindo aí!"
 festival.102.b: "Ergo minha taça a [target_character.Custom('ES_ElLa')] nobre [target_character.GetTitledFirstName|l]!"
 festival.102.c: "Acho que já bebi o suficiente nesta noite."
