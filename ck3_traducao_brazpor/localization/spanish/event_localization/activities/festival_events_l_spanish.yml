 festival.107.t: "Aventuras amorosas"
 festival.107.desc: ""[ROOT.Char.GetTitledFirstNameNoTooltip]!", me saúda [target_character2.Custom('ES_ElLa')] [target_character2.GetTitledFirstName|l] ao passar por ele(a), convidando-me a me aproximar do seu grupo.\n\n"Vocês souberam do que aconteceu entre [target_character.Custom('ES_ElLa')] [target_character.GetTitledFirstName|l] e [character_of_rumor.Custom('ES_ElLa')] [courtier_host.Custom2('RelationToMeShort', SCOPE.sC('character_of_rumor'))] [courtier_host.Custom('ES_DelDela')] [courtier_host.GetTitledFirstName|l], [character_of_rumor.GetTitledFirstName|l]?", sussurra. "Tenho motivos para acreditar que foi tão longe a ponto de se esgueirar até seus aposentos, mas o criado que subornei não soube me dizer mais nada".\n\nOs criados são, é claro, uma fonte #EMP notoriamente#! confiável de fofocas, mas, independentemente da veracidade dessas alegações, esta é uma excelente oportunidade para influenciar a reputação [target_character.Custom('ES_DelDela')] [target_character.GetTitledFirstNameNoTooltip|l]."
 festival.107.a: "Bem, #EMP yo#! ouvi dizer que não [target_character.GetHerHim] deixou entrar a noite toda!"
 festival.107.b: "Não viram muita coisa, mas certamente #EMP ouviram#! bastante!"
 festival.107.c: "Se vocês admiram feitos amorosos, meus companheiros têm muito mais a oferecer."
 festival_embarrassed_me: "Me envergonhou"
 festival_reinforced_group_cohesion: "Vínculos reforçados"
 festival_enhanced_amorous_reputation: "Reputação amorosa melhorada"
 festival.108.t: "Lendo entre as dobras"
 festival.108.desc: "Vejo que [target_character2.Custom('ES_ElLa')] [target_character2.GetTitledFirstName|l] se aproxima com os olhos brilhando de travessura. "Encontrei isto entre as sombras do pavilhão", começa. "Recordo nitidamente que estava nas mãos [target_character.Custom('ES_DelDela')] [target_character.GetTitledFirstName|l] há apenas algumas horas, e há uma mensagem das mais… #EMP sugestiva#! escrita nele."\n\n"#EMP Poderíamos#! devolvê-lo… #EMP ou#! talvez eu pudesse \"fazê-lo chegar\" à vista de todos para outra pessoa em seu nome. Por exemplo, [target_character4.Custom('ES_ElLa')] [target_character4.GetTitledFirstName|l], [target_character3.Custom2('RelationToMeShort', SCOPE.sC('target_character4'))] de sua [target_character3.Custom('MistressMaster')|l], [target_character3.Custom('ES_ElLa')] [target_character3.GetTitledFirstName|l].""
 festival.108.a: "Uma proposta excelente! Assim seja."
 festival.108.b: "Deixe-o aqui, e eu o devolverei #EMP personalmente#!."
 festival.108.c: "Que isso fique entre nós por enquanto."
 festival.109.t: "Poesia sob pressão"
 festival.109.desc: "Um murmúrio de júbilo me atrai até uma pequena multidão, que se reuniu ao redor de dois de [Select_CString(And(target_character2.IsFemale, target_character.IsFemale),'nossas companheiras','nossos companheiros')]. "Recitem-nos um poema, [target_character2.GetTitledFirstName|l]!", pede [target_character.Custom('ES_ElLa')] [target_character.GetTitledFirstName|l], com uma voz que mal disfarça seu tom de deboche. "Ao menos #EMP um#! poderiam nos dedicar, não é?".\n\n[target_character2.GetFirstNameNoTooltip], de quem se sabe possuir a sensibilidade poética de uma pedra, me olha com os olhos suplicantes de um animal encurralado."
 festival.109.a: "Vamos trocar versos; eu começo e #EMP vos#! segue, [target_character.GetFirstNameNoTooltip]."
 festival.109.b: "Deslumbre-nos com seu intelecto, [target_character2.GetFirstNameNoTooltip]."
 festival.109.c: "Se você busca verdadeira arte, encontre-a entre nós. #EMP nosotros#! nós lhe daremos."
