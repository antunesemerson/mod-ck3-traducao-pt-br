 festival.106.t: "Um casamento de raposas"
 festival.106.desc: "Tive a sorte de aproveitar a sombra do pavilhão quando um aguaceiro desabou em um céu ensolarado; uma chuva de verão, como dizem.\n\nMas, ai, [target_character.Custom('ES_ElLa')] pobre [target_character.GetTitledFirstName|l] sofreu toda a fúria e teve de ir se arrastando até o abrigo com a elegância de um gato encharcado.\n\n“Eu lhe peço, uma troca de roupas!”, suplica. “[target_character.Custom('ES_ElLa')|U] [target_character2.GetTitledFirstName|l] vem para cá, e seria minha ruína ser visto em tamanho desleixo[target_character.Custom('ES_OA')].”"
 festival.106.a: "Meus assistentes trarão algo para você."
 festival.106.b: "[target_character2.GetHerHim|U] distrairei, fuja agora!"
 festival.106.c: "[target_character2.Custom('ES_AlAla')|U] [target_character2.GetTitledFirstNameNoTooltip|l] achará #EMP muy#! engraçado."
 festival.106.b.success: "Você consegue distrair [target_character2.Custom('ES_AlAla')] [target_character2.GetTitledFirstName|l]"
 festival.106.b.success.toast: "Você desfruta de uma conversa agradável com [target_character2.Custom('ES_ElLa')] [target_character2.GetTitledFirstName|l]"
 festival.106.b.failure: "[target_character2.Custom('ES_ElLa')|U] [target_character2.GetTitledFirstName|l] percebe que há algo estranho"
