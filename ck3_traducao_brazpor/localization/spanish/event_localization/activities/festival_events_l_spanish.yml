 festival.104.t: "À deriva na multidão"
 festival.104.desc: "Toda reunião tem seus altos e baixos; é preciso tomar cuidado com suas correntes, para não acabar encalhado.\n\nQuando [target_character3.Custom('ES_ElLa')] [target_character3.GetTitledFirstName|l] me deixa para ir saudar [target_character4.Custom('ES_AlAla')][target_character4.GetTitledFirstName|l], de repente me vejo à deriva na multidão, sem companhia para conversar.\n\nA certa distância, vejo [target_character.Custom('ES_AlAla')] [target_character.GetTitledFirstName|l] e [target_character2.Custom('ES_AlAla')] [target_character2.GetTitledFirstName|l] olhando em minha direção e trocando palavras atrás de seus leques."
 festival.104.a: "Eu me juntarei a eles com ousadia."
 festival.104.b: "Uns poucos sussurros meus plantarão algumas ideias #EMP intrigantes#!."
 festival.104.c: "Vou me retirar junto de meus acompanhantes."
 festival.104.a.success: "Você os impressiona com sua abordagem ousada"
