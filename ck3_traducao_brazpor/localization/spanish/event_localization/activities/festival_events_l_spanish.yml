 festival.103.t: "Lábia e fanfarronice"
 festival.103.desc: "Enquanto meus acompanhantes e eu vagamos sem rumo pela multidão, ouço uma voz alta.\n\n"Vocês precisam saber que meu $language_chinese_name$ é #EMP requintado#!! De fato, há quinze dias, [target_character2.Custom('ES_ElLa')] [target_character2.GetTitledFirstName|l] pôs à prova minha habilidade poética, e foi humilhad[target_character2.Custom('ES_OA')] pela minha arte!", gaba-se [target_character.Custom('ES_ElLa')] [target_character.GetTitledFirstName|l].\n\nNão me lembro de ter ouvido nenhum boato de que possua habilidade com poesia; mas reforçar sua afirmação me colocaria em boa posição. Ainda assim, é difícil resistir à tentação de colocar no lugar um[target_character.Custom('ES_XA')] petulante."
 festival.103.a: "[target_character.GetSheHe|U] diz a verdade."
 festival.103.b: ""[target_character.GetTitledFirstNameNoTooltip], tenha a bondade de compartilhar seus talentos"."
 festival.103.c: "Os talentos de #EMP mis#! amigos são muito maiores."
