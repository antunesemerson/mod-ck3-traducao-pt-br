 festival.100.t: "Em uma noite de luar"
 festival.100.desc: "O mensageiro que me convidava para a festa de observar a lua [target_character.Custom('ES_DelDela')] [target_character.GetTitledFirstName|l] mal termina quando chega outro, com uma carta me convidando a me juntar [target_character2.Custom('ES_AlAla')] [target_character2.GetTitledFirstName|l]!\n\nQue tenham combinado de me convidar #EMP assim#! não pode ser coincidência. Cada um claramente quer testar meu valor, e aceitar um dos convites será entendido como sinal da minha simpatia por quem o escreveu, e também como meu desprezo pelo rival."
 festival.100.a: "Honrarei [target_character.Custom('ES_AlAla')] [target_character.GetTitledFirstNameNoTooltip|l] com minha presença."
 festival.100.b: "Prefiro a companhia [target_character2.Custom('ES_DelDela')] [target_character2.GetTitledFirstNameNoTooltip|l]."
 festival.100.c: "Enviem minhas desculpas por não poder comparecer a ambos os convites, e lembrem-lhes o quanto os estimo."
 festival.100.d: "Vamos realizar uma celebração própria e superá-los a ambos!"
