l_spanish:
 feast_events_klank.1001.t: "Modos de tortura"
 feast_events_klank.1001.desc: ""Por onde é melhor começar a cortar?", pergunta meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('fellow_torturer'))] [fellow_torturer.GetName], com uma adaga na mão e um tom cheio de admiração. Sem dúvida, é alguém que compartilha dos meus gostos. Um banquete pode ser um encontro de mentes afins, uma oportunidade de aperfeiçoar uma arte, não apenas uma ocasião entediante para a glutonaria. 

"Pela minha experiência, eles gritam mais alto se você começar pela [ROOT.Char.Custom('GetRandomBodyPart')]. Estou convencido disso... este é o jeito mais delicioso de começar."

[terrified_onlooker.GetName] observa em silêncio, em um canto.", pergunta meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('fellow_torturer'))] [fellow_torturer.GetName], com uma adaga na mão e um tom cheio de admiração. Sem dúvida, é alguém que compartilha dos meus gostos. Um banquete pode ser um encontro de mentes afins, uma oportunidade de aperfeiçoar uma arte, não apenas uma ocasião entediante para a glutonaria. 

"Você está completamente certo!"

[terrified_onlooker.GetName] observa em silêncio, em um canto."
 feast_events_klank.1001.a: "Primeiro, agite [ROOT.Char.Custom('DeviantObjectArticle')] diante do nariz deles."
 feast_events_klank.1001.b: "Você está completamente certo!"
 feast_events_klank.1001.c: "Um livro como #EMP [SCOPE.Custom('RandomEntertainmentTextName')]#! inspira."
