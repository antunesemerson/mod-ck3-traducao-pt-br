 murder_feast_entourage_murder_log_title: "Massacre"
 murder_feast_entourage_murder_log: "[CHARACTER.GetShortUIName|U] e seu séquito morreram misteriosamente"
 murder_feast_solo_murder_log: "[Select_CString( CHARACTER.IsLocalPlayer, 'Seu personagem', CHARACTER.GetShortUIName )] morreu de forma misteriosa"
 murder_feast_solo_murder_log_title: "Um Incidente Desafortunado"
 feast_default.8002.t: "Uma Faca no Escuro"
 feast_default.8002.t.poison: "Outra Bebida"
 feast_default.8002.desc.random_2: "Por fim. É só [honorary_guest.Custom('ES_ElLa')] [honorary_guest.GetTitledFirstName|l] e eu. A sós. \"Algumas palavras, [Select_CString( honorary_guest.IsFemale, 'minha amiga', 'meu amigo' )].\" Todos os outros convidados começaram a dançar e a música nos chega, abafada, através dos muros de pedra. Um eco. Talvez o eco dele também seja ouvido.\n\n[honorary_guest.GetFirstNameNoTooltip] ergue uma sobrancelha, um dos meus $knight_culture_player_plural_no_tooltip_lowercase$ lhe serve mais bebida. \"Há algum assunto importante?\", pergunta [honorary_guest.GetSheHe]. A taça quase toca seus lábios. Quase. Um som abafado através das paredes de pedra e sua garganta foi cortada de lado a lado. Um eco."
 feast_default.8002.desc.sadistic: "\"Venha por aqui, [honorary_guest.GetFirstName], vou lhe mostrar o novo broche que encomendei para você. Um belo presente para [honorary_guest.Custom('ES_ElLa')] mais magnífic[honorary_guest.Custom('ES_OA')] de [honorary_guest.Custom('ES_LoLa')]s convidad[honorary_guest.Custom('ES_OA')]s.\"\n\nEu sigo à frente, e [honorary_guest.GetSheHe] me segue, enquanto [ROOT.GetCharacter.Custom('GetIncidentalDetailPresent')]. \"Aqui está\", anuncio, abrindo a porta de uma pequena sala mal iluminada. Posso ver a confusão em seus olhos... só por um instante. [honorary_guest.GetSheHe|U] percebe rapidamente. \"Não... não pode.\"\n\n\"Oh, eu lhe asseguro que posso.\""
 feast_default.8002.desc.just: "Chegou o momento. Fixo o olhar em [honorary_guest.Custom('ES_ElLa')] [honorary_guest.GetTitledFirstName|l] enquanto [honorary_guest.GetSheHe] [honorary_guest.Custom('quirk_pos_present')]. Uma pena, mas precisa ser feito. \"Posso pedir que me acompanhe para um passeio?\", minha pergunta é recebida com entusiasmo e um sorriso curioso. \"Que assuntos de governo preocupam noss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]?\".\n\nMuitos. E em breve, um a menos.\n\nEu o conduzo até um dos menores aposentos. A porta se fecha atrás de nós. O fogo começa. Um movimento limpo."
 feast_default.8002.a: "Está feito."
 feast_default.8003.t: "Um Acidente Desafortunado"
 feast_default.8003.desc.poison: "Todos os convidados parecem concentrados nas canções e na dança. Poucos permanecem sentados. Por sorte, minha conversa com [honorary_guest.Custom('ES_ElLa')] [honorary_guest.GetTitledFirstName|l] parece bastar para manter [honorary_guest.GetHerHim] por perto. \"Um banquete excelente\", diz, deixando sua taça de lado para dar outra mordida.\n\n\"Ah, como me comoveis\", respondo enquanto faço um sinal ao meu copeiro. Este será seu último banquete. Meus olhos se cruzam com os de [honorary_guest.GetFirstNameNoTooltip]. Um momento de dúvida."
 feast_default.8003.desc.compassionate: "Apresso-me para limpar as gotas de suor que escorrem pela minha testa, apertando o lenço com mais força do que o necessário. [honorary_guest.Custom('ES_ElLa')|U] [honorary_guest.GetTitledFirstName|l] fala sobre [honorary_guest.Custom('subject_of_interest')], e não consigo manter o olhar fixo. \"Um momento...\", desculpo-me ao ver que leva a taça aos lábios.\n\nSei o que ela contém."
 feast_default.8003.desc.sadistic: "\"Por favor, [Select_CString( honorary_guest.IsFemale, 'minha amiga', 'meu amigo' )], deixai-me encher sua taça, pois sois meu/minha convidad[honorary_guest.Custom('ES_OA')] mais apreciad[honorary_guest.Custom('ES_OA')]\", ofereço com o sorriso mais caloroso. [honorary_guest.Custom('ES_ElLa')|U] [honorary_guest.GetTitledFirstName|l] acena, oferecendo-me sua taça. Os convidados começaram sua [ROOT.Char.Custom('GetMedievalDance')], e a algazarra já é distração suficiente.\n\nDespejo o veneno do meu anel com todo cuidado. \"Espero que tenhais sede.\""
 feast_default.8003.a: "#EMP Um brinde.#!"
 feast_default.8003.a.success: "[honorary_guest.GetShortUIName] bebe do cálice"
 feast_default.8003.a.failure: "[honorary_guest.GetShortUIName] não bebe"
 feast_default.8004.t: "Mantenha seus Olhos Abertos"
 feast_default.8004.desc.intro: "Dou um gole na minha [host.Custom('RegionalDrink')] conforme a noite se aproxima do fim. Meus olhos estão cansados, mas"
 feast_default.8004.desc.goh_intro: "[host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] insiste em que eu fique para discutir os assuntos do reino. \"Como eu estava dizendo,\" continua, alheio aos meus bocejos disfarçados.\n\n"
 feast_default.8004.desc.goh_solo: "$feast_default.8004.desc.goh_intro$Mas quando abro os olhos novamente, vejo um brilho prateado. \"O banquete termina aqui.\""
 feast_default.8004.desc.goh_group: "$feast_default.8004.desc.goh_intro$ \"Socorro!\" Um grito interrompe a conversa. \"#EMP Socorro!#!\" Outro. Quando olho ao redor, vejo o brilho prateado das espadas. E uma delas aponta diretamente para mim.\n\n\"Acabou, [murder_victim.GetTitleAsNameNoTooltip|l].\""
 feast_default.8004.desc.fallback: "[host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] insistiu que [honorary_guest.Custom('ES_ElLa')] [honorary_guest.GetTitledFirstName|l] fique para uma conversa muito, muito importante. E, é claro, sua comitiva deve acompanhá-l[honorary_guest.Custom('ES_OA')]."
 feast_default.8004.a: "Espere... o que está acontecendo?"
 feast_default.8004.a.tt.success: "Você morre"
 feast_default.8004.a.tt.success.host: "[murder_victim.GetShortUIName] morre"
 feast_default.8004.a.tt.failure: "Você sobrevive"
 feast_default.8004.a.tt.failure.host: "[murder_victim.GetShortUIName] sobrevive"
 feast_default.8004.a.goh_murder.tt: "[honorary_guest.GetShortUIName] morre"
 every_attending_travel_companion_goh: "Cada membro do séquito"
 feast_default.8052.t: "Um Fim Abrupto"
 feast_default.8052.desc: "Fogo!\n\nEnquanto o pânico se espalha entre os convidados, procuro [host.Custom2('MyCharacterIntroduction', ROOT.Char)], mas encontro sua cadeira vazia.\n\nO fogo se alastra rapidamente — os panos manchados de [ROOT.Char.Custom('RegionalDrink')] e as roupas profusas dos convidados ardem com rapidez. Minha pele se enche de bolhas, se me #EMP pela#!, e grito; mas logo até isso é impossível, já que a fumaça copiosa sufoca meus gritos."
 feast_default.8052.a: "Sempre quis sair em glória ardente..."
 feast_default.8061.t.fire: "Fogo! Fogo...?"
 feast_default.8061.t: "$feast.7151.t$"
 feast_default.8061.desc.fire: "[host.Custom2('MyCharacterIntroduction', ROOT.Char)|U] nos conduz a mim e a um punhado de pessoas para fora do salão de banquete antes de tentar fechar a porta.\n\nNo entanto, antes que consiga fazê-lo, surgem gritos de dentro e todos os presentes saem para a noite enquanto as chamas começam a subir do salão."
 feast_default.8061.desc.fail: "$feast.7151.desc$"
 feast_default.8061.desc.fail_me: "Ainda tremem minhas mãos após o incidente de ontem à noite, e os mercenários que supostamente viriam tirar minha vida foram aprisionados por [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l].\n\nNo entanto, esse sentimento de inquietação não desaparece facilmente."
 feast_default.8061.desc.death_alone: "O clima é mais sombrio do que eu teria esperado quando nos preparamos para sair da festa [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l]. O cadáver da minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('murder_guest'))], [murder_guest.Custom('ES_ElLa')] [murder_guest.GetTitledFirstName|l], ainda quente no chão.\n\nA morte rondou estas paredes e a bebida azedou em nossos lábios."
 feast_default.8061.a: "Acho que o banquete acabou agora."
 feast_default.8061.a.good: "[murder_guest.GetFirstNameNoTooltip]... foi embora assim."
 feast_default.9001.t: "Conforme Meus Convidados Partem"
 feast_default.9001.desc_exotic: "Com todos indo para casa com barrigas cheias de iguarias exóticas, estou orgulhoso em dizer que o banquete foi um sucesso!"
 feast_default.9001.desc_lavish: "Com todos os meus convidados deixando meu castelo com o conteúdo inteiro da minha vasta despensa em suas barrigas, estou orgulhoso em dizer que o banquete foi um sucesso!"
 feast_default.9001.desc_meager: "Com todos os meus convidados lutando pela última migalha de minha modesta mesa, sinto um grande alívio ao vê-los finalmente partirem com roupas largas e barrigas roncando."
 feast_default.9001.desc: "Com todos indo para suas respectivas casas, estou orgulhoso em dizer que o banquete foi um sucesso!"
 feast_default.9001.spouse: "\n\nTenho que agradecer ao meu[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetFirstName] grande parte do seu sucesso, e sinto nada além de gratidão enquanto[spouse.GetSheHe] despede os últimos convidados."
 feast_default.9001.no_spouse: "No entanto, ainda estou grato por essa empreitada ter chegado ao fim, pelo menos por enquanto."
 feast_default.9001.a: "Até a próxima!"
 feast_default.9002.desc_roughed_up: "\n\nQue banquete! Tenho as bolsas cheias de talheres roubados e [host.Custom('GetExpensiveMeal')]; que espécie de [host.Custom2('InsultNoun', ROOT.Char)] , [host.GetFirstNameNoTooltip] , nunca deveria ter me insultado!"
 feast_default.9002.desc_exotic: "Que banquete! Antes de vir, nunca imaginei as iguarias exóticas que provaria durante minha estadia nos salões de [host.GetTitledFirstName|l]. Foi um banquete que jamais esquecerei!"
 feast_default.9002.desc_lavish: "Que festim! Antes de chegar, minhas roupas ficavam folgadas e largas demais, e agora saio dos salões de [host.GetTitledFirstName|l] tonto, o dobro de[ROOT.Char.Custom('ES_OA')] comida e alegria do que quando cheguei. Foi um festim que me custará esquecer!"
 feast_default.9002.desc_meager: "Que… um banquete? Embora normalmente eu esperasse muito mais comida de um banquete, deixo os salões de [host.GetTitledFirstName|l] com fome, mas pelo menos a companhia foi boa. Foi um banquete que eu gostaria de esquecer."
 feast_default.9002.desc: "Que banquete! Vou lembrar por muito tempo dos dias passados nos salões de [host.GetTitledFirstName|l]."
 feast_default.9002.desc_ending: "\n\nAgora é hora de lavar os vestígios da bebida e da festa, e mais uma vez retomar meus deveres."
 feast_default.9002.a: "Adeus, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))]!"
 feast_default.5010.t: "Um Silêncio Lendário"
 feast_default.5010.desc: "Em meio à celebração e à euforia, há uma pausa na conversa entre todos os presentes. Apenas [rando_guest.GetName|U] e eu ainda trocamos palavras, mas me sinto obrigad[ROOT.Char.Custom('ES_OA')] a ficar em silêncio quando os olhares começam a se voltar para mim.\n\nTalvez este momento de silêncio seja a oportunidade para falar sobre [ROOT.Char.GetPromotedLegend.GetName]."
 feast_default.5010.a: "[rando_guest.GetFirstName|U], deixe-me contar uma história."
 feast_default.5010.a.success: "[rando_guest.GetFirstName|U] fica impressionad[rando_guest.Custom('ES_OA')]."
 feast_default.5010.a.failure: "[rando_guest.GetFirstName|U] está entediado"
 feast_default.5010.b: "Todos devem ouvir a lenda."
 feast_default.5010.c: "Finalmente, um momento de silêncio."
 feast_default.5020.t: "Silêncio"
 feast_default.5020.desc: "Canecas batem, conversas ecoam, mãos batem na mesa, tudo em uma cacofonia caótica de barulho sem sentido. Sinto o som pulsar pelo meu corpo, então de repente tudo ao meu redor começa a desacelerar, pouco mais do que algumas palavras e risos ocasionais.\n\nNeste silêncio, sinto meu coração começar a acelerar e em minha mente um discurso vem a mim completamente escrito, crescendo de um sussurro a um grito, desesperado para ser compartilhado! Um discurso sobre minha legitimidade como [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 feast_default.5020.a: "Eu tenho a astúcia de [ROOT.Char.GetFaith.TricksterGodName]!"
 feast_default.5020.a.success: "Seu discurso anima os convidados"
 feast_default.5020.a.failure: "Seu discurso faz pouco para inspirar"
 feast_default.5020.b: "[ROOT.Char.GetFaith.KnowledgeGodName|U] age através de mim!"
 feast_default.5020.c: "Eu tenho o coração e a coragem de [ROOT.Char.GetFaith.WarGodName]!"
 feast_default.5020.d: "Por que sujar um silêncio tão bom?"
 #Knock off an equal's Eboshi hat
 feast_default.3008.t: "Quanto mais alto o chapéu…"
 feast_default.3008.desc: "Durante uma trégua nas festividades, meu olhar é atraído por um lampejo de luz dançando sobre a laca negra do [Glossary('eboshi', 'EBOSHI_GLOSS')] de [hat_man.GetFirstName]. Não é assim que as coisas devem ser? A luz deveria encontrar[hat_man.GetHerHim] e iluminar[hat_man.GetHerHim] acima do resto de nós?\n\nO que as pessoas pensariam se [hat_man.GetSheHe] perdesse seu eboshi? Como brilharia então?! Seria desfech[hat_man.Custom('ES_OA')]! Uma criança. Menos que um ser humano até mesmo."
 feast_default.3008.a: "O chapéu deve desaparecer!"
 feast_default.3008.b: "Não é apropriado alimentar tal ciúme."
 feast_default.3008.c: "Que a luz [hat_man.GetHerHim] cegue perante minhas artimanhas."
 feast_default.3008.c.tt: "Seu [scheme|lE] ganha [GetModifier('didnt_knock_hat_off_modifier').GetNameWithTooltip]"
 feast_default.3008.c.flavor: "O nome dele deve ser manchado na lama!"
 EBOSHI_GLOSS: "Um chapéu alto, laqueado, feito de papel rígido. Eram concedidos aos nobres quando atingiam a maioridade e eram um símbolo de seu status, masculinidade e condição de pessoa. Serviam para proteger o \"motodori\" ou coque superior e mantê-lo limpo (e, assim, puro)."
 feast_default.3009.t: "…Quanto mais longe cai."
 feast_default.3009.desc: "Ataco como uma víbora enroscada! O eboshi de [hat_man.GetFirstName] desliza pelo chão. [hat_man.GetSheHe|U] tenta ocultar seu vexame, mas todos podem ver seu [Glossary('motodori', 'MOTODORI_GLOSS')] desarrumado; sua negligência espiritual fica exposta. Agora que seus delírios de grandeza foram encerrados, será que outro poderá sair à luz?"
 feast_default.3009.a: "Que comece meu momento ao sol!"
 MOTODORI_GLOSS: "O estilo de coque usado no período Heian. Ao contrário de estilos posteriores, como o \"chonmage\", não havia o costume de raspar o topo da cabeça."
 feast_default.3010.t: "Meu chapéu!"
 feast_default.3010.desc: "Há uma trégua nas festividades. Por um momento, como se o tempo tivesse desacelerado, as preocupações do mundo e a pressão do presente se dissipam.\n\nEntão, como uma víbora das sombras, vem a mão de [hat_knocker.GetName] que golpeia minha [Glossary('eboshi', 'EBOSHI_GLOSS')]. Observo incrédulo enquanto ela desliza pelo chão. Tento esconder minha vergonha, mas meu [Glossary('motodori', 'MOTODORI_GLOSS')] desarrumado está à vista de todos; minha negligência espiritual, exposta."
 feast_default.3010.a: "[hat_knocker.GetFirstNameNoTooltip] lamentará o dia em que isso aconteceu!"
 feast_default.3010.a.flavor: "Vou lhe mostrar o que significa ser uma víbora!"
 feast_default.3010.a.tt: "Seu [scheme|lE] recebe [GetModifier('scheme_apa_positive_2101_modifier').GetNameWithTooltip]"
 feast_default.3010.b: "Talvez você tenha bebido demais, [hat_knocker.GetFirstNameNoTooltip]."
 feast_default.3010.b.flavor: "Minha serenidade permanecerá inabalada."
