l_spanish:
 feast_header: "Celebração:"
 feast_default.1001.t: "Maravilhado"
 feast_default.1001.very_high_learning: "Após uma longa conversa sobre nossos pratos requintados, [impressed_guest.GetTitledFirstName|l] diz achar-me sáb[ROOT.Char.Custom('ES_OA')] e instruíd[ROOT.Char.Custom('ES_OA')] e que minhas falas são sempre de valor inestimável para aqueles menos letrados."
 feast_default.1001.high_learning: "Após uma longa conversa durante a nossa refeição, [impressed_guest.GetTitledFirstName|l] diz admirar como sou capaz de discorrer longamente sobre qualquer assunto."
 feast_default.1001.average_learning: "Depois de ter falado durante o jantar por um tempo, [impressed_guest.GetTitledFirstName|l] inclina-se para me dizer que acha impressionante o quão bem informado eu sou sobre tantas assuntos diferentes."
 feast_default.1001.low_learning: "Enquanto eu conversava com as pessoas durante o jantar, [impressed_guest.GetTitledFirstName|l] se inclina para mim. \"Eu queria saber soar tão inteligente[ROOT.Char.Custom('ES_OA')] quanto você, [ROOT.Char.GetTitledFirstName|l]!\"\n\nLimpo a sopa do meu queixo e sorrio um sorriso inteligente."
 feast_default.1001.a: "Vejo que se sabe reconhecer o verdadeiro intelecto."
 feast_default.1002.t: "A Agoniante Espera"
 feast_default.1002.desc: "Eu não posso acreditar quanto tempo estamos esperando pela comida! Estamos aqui para comer ou para admirar o grão da mesa de madeira? O que você está olhando, [other_guest.GetTitledFirstName|l], só estou com muita fome!"
 feast_default.1002.a: "Eu posso sentir o cheiro da cozinha, também!"
 feast_default.1002.gluttons_and_impatients: "Todos os Convidados Impacientes e Gulosos"
 feast_default.1003.t: "Maravilhado"
 feast_default.1003.desc: "Depois de comer juntos por um tempo, devo ter dito algo particularmente inteligente porque [other_guest.GetTitledFirstName|l] me elogiou por minha perspicácia!\n\nEm resposta, sorrio de forma inteligente para meu colega erudito antes de me ocupar da gordura que escorre pelo meu queixo."
 feast_default.1003.a: "Eu digo algumas coisas inteligentes às vezes."
 feast_default.1003.b: "Não tinha percebido que [other_guest.Custom('ES_ElElla')] pensasse assim!"
 feast_default.1004.t: "Delícias Celestiais"
 feast_default.1004.desc_exotic: "Ah, que comida é essa, tão deliciosa? Eu nunca tinha visto ou comido isso, uma delícia exótica incrível! Ah, e esses doces luxuosos maravilhosamente estranhos!\n\nEste banquete tem alguns pratos incríveis que eu nunca vi antes e duvido que o veja novamente! Devo pedir a receita!"
 feast_default.1004.desc_lavish: "Que variedade imensa e interminável de alimentos e sobremesas! Será que são esse tipo de refeições que me esperam se eu acabar em [ROOT.Char.GetFaith.PositiveAfterLife]? Ah, e que seleção vasta de doces!\n\nDeve ser a maior quantidade de comida que já vi em um só lugar!"
 feast_default.1004.desc_meager: "O que é isto? Tem carne neste osso? As pessoas costumam comer legumes tão pequenos assim? Essa é a comida que me espera se eu acabar em [ROOT.Char.GetFaith.NegativeAfterLife]? Ah, e onde estão os doces?\n\nÉ assim que os camponeses devem comer!"
 feast_default.1004.desc: "Ah, que carne é essa, tão rica em sabor? O que são esses vegetais, quase doces? Ah, e essas pequenas sobremesas maravilhosas!\n\nEsta festa tem algumas das melhores comidas que já provei!"
 feast_default.1004.a: "Delicioso!"
 feast_default.1004.a_meager: "Lamentável!"
 feast_default.1004.b: "Isso é incrível! Passe-me outra porção!"
 feast_default.1004.b_meager: "Isso é tudo? Haverá repetições?"
 feast_default.1005.t: "Isolamento"
 feast_default.1005.desc: "É muito. A tagarelice incessante das pessoas ao meu redor, a multidão de rostos olhando para mim para conversar... #EMP Pessoal#!...\n\nEu sabia que este banquete seria uma tarefa árdua, mas nunca imaginei a escala disso."
 feast_default.1005.desc_friendly_guest: "\n\nTenho sorte que [friendly_guest.Custom2('MyCharacterIntroduction', ROOT.Char )] está aqui, pelo menos."
 feast_default.1005.a: "Deve haver algum lugar onde eu possa ficar sozinh."
 feast_default.1005.b: "[friendly_guest.GetTitledFirstNameNoTooltip|l], não me deixe sozinho com estas feras!"
 feast_default.1005.c: "\"Uh, eu... eu... Estamos tendo um clima assustador, não é?\""
 feast_default.1006.table_companions: "Todos sentados perto de mim"
 feast_default.1006.t: "Em Casa"
 feast_default.1006.desc: "Ah, não há nada como um banquete! Isso nos lembra do que há de bom na vida, e a companhia também não é nada mal! Pelo menos as pessoas sentadas perto de mim parecem pensar o mesmo.\n\n\"Você é algo especial, [ROOT.Char.GetFirstNameNoTooltip]\", me diz [guest_1.GetTitledFirstName|l]. [guest_2.GetTitledFirstName|l] e [guest_3.GetTitledFirstName|l] acenam com a cabeça em sinal de concordância."
 feast_default.1006.a: "Eu só faço o que parece certo!"
 feast_default.1006.b: "Mais uma rodada, pessoal!"
 feast_default.1006.c: "Não há outra maneira de viver verdadeiramente, meus amigos!"
 feast_default.1007.t: "Voraz"
 feast_default.1007.desc: "Com o serviço incessante de pratos deliciosos, a maioria dos convidados já desistiu de continuar comendo pelo resto da noite, limitando-se a apreciar o entretenimento. Fico feliz em ver que [other_glutton.GetTitledFirstName|l] é mais inteligente!\n\n[other_glutton.GetSheHe|U] e eu estamos ansiosos para provar a comida, desde que haja!"
 feast_default.1007.a: "Juntos poderíamos comer um cavalo inteiro!"
 feast_default.1007.b: "Tenho certeza que posso comer mais do que [other_glutton.GetSheHe]."
 feast_default.1008.t: "Julgamento Manchado"
 feast_default.1008.desc: "Sólo quando vejo os olhos arregalados [secret_recipient.Custom('ES_DelDela')] [secret_recipient.GetTitledFirstName|l] percebo o que eu acabara de admitir. Luto para afastar minha bebida.\n\n\"Já bebi demais.\" Tento me levantar, cambaleando um pouco. \"Não confiem em uma palavra do que eu digo!\""
 feast_default.1008.a: "O que foi que eu fiz..."
 feast_default.1008.a.flavor: "#F [secret_recipient.GetSheHe|U] não acredita em minhas desculpas...#!"
 feast_default.1009.t: "Julgamento Manchado"
 feast_default.1009.desc: "Só quando vejo os olhos arregalados de [secret_recipient.Custom('ES_DelDela')] [secret_recipient.GetTitledFirstName|l] percebo o que acabei de revelar sobre [secret_owner.Custom('ES_ElLa')] [secret_owner.GetTitledFirstName|l]. Luto para afastar minha bebida.\n\n\"Bebi demais\", tento disfarçar nervosamente. \"Não acreditem em nada do que digo\"."
 feast_default.1009.a: "O que foi que eu fiz..."
 feast_default.1010.t: "Um Juramento Surpreendente"
 feast_default.1010.desc: "O que eu prometi ontem à noite? Não consigo lembrar o que levou a isso, mas me lembro de ter dado um tapa nas costas de [favor_recipient.Custom2('MyCharacterIntroduction', ROOT.Char )], e prometido que faria qualquer coisa que me pedisse.\n\nAgora há rumores por toda parte sobre o meu \"juramento\"!"
 feast_default.1010.a: "Uma promessa é uma promessa, não importa o quê."
 feast_default.1010.b: "Foram apenas divagações bêbadas!"
 feast_default.1010.every_participant_with_high_opinion: "Todo outro participante que respeite a [favor_recipient.GetFirstNameNoTooltip]"
 feast_default.1011.t: "No Caminho da Guerra"
 feast_default.1011.desc: "É inebriante; há bebida no meu sangue, e raiva nas minhas veias.\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest_to_murder'))], [guest_to_murder.Custom('ES_ElLa')] [guest_to_murder.GetTitledFirstName|l], esbarra em mim do lado de fora do salão e [guest_to_murder.GetHerHim] confundo com tal [disliked_guest.Custom2('InsultAdjective', ROOT.Char)] [disliked_guest.Custom('ES_DelDela')] [disliked_guest.GetTitledFirstName|l]. Em um instante, seu sangue escorre pela minha lâmina. Quando seu corpo tomba ao chão, de repente fico totalmente sóbrio."
 feast_default.1011.a: "[guest_to_murder.GetSheHe] se jogou sobre minha faca! Eu juro!"
 feast_default.1011.a.success: "As pessoas acreditam que foi um acidente"
 feast_default.1011.a.failure: "As pessoas não acreditam em minha mentira"
 feast_default.1011.b: "Eu..euu preciso limpar a lâmina...!"
 feast_default.1011.b.success: "O assassinato permanece um mistério"
 feast_default.1011.b.failure: "Estou exposto como o assassino"
 feast_default.1011.c: "[disliked_guest.GetTitledFirstNameNoTooltip|l], como você pode?!"
 feast_default.1012.t: "Líquidos Letais"
 feast_default.1012.desc_opening: "A alegre aceitação por parte de meu [guest_to_murder.GetTitledFirstName|l] [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('guest_to_murder'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest_to_murder'))] de mais um gole abafa o som da minha própria bebida ao derramá-la no chão.\n\nQuando lhe custa respirar e a cor abandona seu rosto, sinto o sorriso se espalhando pelo meu. Uma pequena risada me escapa quando seu corpo bate na mesa."
 feast_default.1012.a: "Um brinde a [guest_to_murder.GetTitleTierName|U], e sua sede de vida!"
 feast_default.1013.t: "Protetor"
 feast_default.1013.desc: "Quando meu [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('guest_to_kill'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest_to_kill'))] [guest_to_kill.GetTitledFirstName|l] caminha em direção ao meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest_to_save'))] [SCOPE.sC('guest_to_save').GetTitledFirstName|l] com a ira borbulhando em seu olhar e uma faca na mão, não paro nem para pensar.\n\nPego o que estiver mais perto que possa ser usado como arma e avanço."
 feast_default.1013.a: "Quem diria que talheres poderiam ser tão afiados?"
 feast_default.1013.a_1: "Espero que [ROOT.Char.GetFaith.NegativeAfterLife] receba calorosamente es[guest_to_kill.Custom('ES_EA')] [guest_to_kill.Custom2('InsultNoun', ROOT.Char)] [guest_to_kill.Custom2('InsultAdjective', ROOT.Char)] uma calorosa recepção."
 feast_default.1013.b: "Vou desviar a faca!"
 feast_default.1013.b.success: "Ninguém se feriu"
 feast_default.1013.b.failure: "Eu #EMP quase#! consigo"
 feast_default.1013.b.big_failure: "Eu falhei"
 feast_default.1013.c: "Você está bem, [SCOPE.sC('guest_to_save').GetFirstNameNoTooltip]?… e avanço direto para a cobertura"
 feast_default.1013.d: "\"Eu agi em defesa d [guest_to_save.GetFirstNameNoTooltip], todos vocês viram.\""
 feast_default.1014.t: "[ROOT.Char.Custom('ES_ElLa')] testemunh[ROOT.Char.Custom('ES_OA')]"
 feast_default.1014.desc: "Meu [guest_to_murder.Custom2('InsultAdjective', ROOT.Char)] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest_to_murder'))], [guest_to_murder.Custom('ES_ElLa')] [guest_to_murder.GetTitledFirstName|l], zomba quando saio para me aliviar. A ira que ferve em minhas veias ganha força devastadora quando [guest_to_murder.GetSheHe] caminha na minha direção. \"Olhem só quem está aqui! Aquele [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('guest_to_murder'))] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('guest_to_murder'))] de [ROOT.Char.GetFirstNameNoTooltip]! Aposto que...\"\n\nAssim que enterro minha lâmina no rosto irritante de [guest_to_murder.GetFirstName], ouço um suspiro contido atrás de mim."
 feast_default.1014.a: "Por favor, [witness.GetTitledFirstNameNoTooltip|l], não conte para ninguém!"
 feast_default.1014.a_2: "Você não vai contar a ninguém o que viu."
 feast_default.1014.b: "Fale sobre estar no lugar errado na hora errada!"
 #Shiny Trinkets
 feast_default.1016.t: "Bugigangas Brilhantes"
 feast_default.1016.desc_intro: "Olho ao redor da sala. As fogueiras estão rugindo, bebidas sendo derramadas. Deliciosas guloseimas estão sendo transformadas em madeira e o clima está animado.\n\nEm um canto escuro, captando o lampejo das luzes, brilha o [trinket_to_steal.GetName]. Parece abandonado em uma das mesas laterais e está claramente chamando meu nome."
 feast_default.1016.desc_greedy: "\n\nSeria um crime para mim #EMP não#! aliviá-lo de sua solidão! Dou uma rápida olhada ao redor da sala para ter certeza de que não estou sendo observado."
 feast_default.1016.desc_hesitant: "\n\nEu cerro meu punho com firmeza em uma tentativa de superar meu desejo, esperando que ninguém perceba."
 feast_default.1016.desc_default: "\n\n[activity.GetOwner.GetTitledFirstName] parece bastante ric[activity.GetOwner.Custom('ES_OA')], com certeza não sentirá falta desta pequena bugiganga…"
 feast_default.1016.a_greedy: "Talvez não se importe se eu fizer isso!"
 feast_default.1016.a_hesitant: "Eu simplesmente não consigo me controlar..."
 feast_default.1016.a: "Isso certamente #EMP é#! uma bela bugiganga."
 feast_default.1016.b: "Não. Isso não está certo."
 feast_default_1016_stealth.desc: "Seu roubo passou despercebido"
 feast_default_1016_observed.desc: "Você teve uma testemunha"
 feast_default.1016.tt: "Bugiganga Roubada"
 #Shiny Trinkets continued - Thievery resolution
 feast_default.1017.t: "O Que Se Esconde na Sombra"
 feast_default.1017.desc_intro: "Eu me aproximo da mesa lateral, mantendo as conversas com os convidados pelos quais passo pelo caminho.\nComo estou perto de [new_trinket.GetName], em um único movimento eu rapidamente, mas gentilmente empurro o item para a borda da mesa e para dentro do meu guardanapo. Sucesso!"
 feast_default.1017.desc_discovered: "\n\nA adrenalina sobe em disparada, mas… tenho a sensação incômoda de que não fui o único a testemunhar meu roubo.\n\nO tempo dirá…"
 feast_default.1017.desc_stealth: "\n\nA descarga de adrenalina, o som do meu coração ecoando no peito e o doce sabor da vitória após uma aquisição bem-sucedida.\n\nNeste momento, realmente nada mais importa."
 feast_default.1017.a: "Isto não é bom."
 feast_default.1017.b: "Isto é excelente!"
 feast_default.1017.b_honest: "Espero que ninguém descubra..."
 #Shiny Trinkets continued - The witness confronts you via proxy
 feast_default.1018.t: "Surgirá…"
 feast_default.1018.desc_intro: "De repente, [Select_CString( witness_proxy.IsFemale, 'uma emissária', 'um emissário' )] [witness.Custom('ES_DelDela')] [witness.GetTitledFirstName|l], chamado[witness_proxy.Custom('ES_XA')] [witness_proxy.GetTitledFirstName|l], aparece à minha porta. \"Saudações, [ROOT.Char.Custom('FormOfAddressForLiege')]! Trago notícias [witness.Custom('ES_DelDela')] [witness.GetTitledFirstNameNoTooltip|l].\"\n\n[Select_CString( witness_proxy.IsFemale, 'A emissária', 'O emissário' )] parece ligeiramente desconfortável: \"[witness.Custom('ES_ElLa')|U] [witness.GetTitledFirstNameNoTooltip|l] dá a conhecer que [feast_host.Custom('ES_ElLa')] [feast_host.GetTitledFirstName|l] andou procurando por seu [trinket_to_steal.GetName|l] e...\", faz uma breve pausa, \"parece que meu [witness.Custom('MistressMaster')] pensa que... talvez vós tenhais visto esse objeto durante o banquete?\" [witness_proxy.Custom('ES_ElLa')|U] [witness_proxy.GetTitledFirstNameNoTooltip|l] me olha de cima a baixo."
 feast_default.1018.desc_greedy: "\n\nComo se atreve [witness.Custom('ES_ElLa')] [witness.GetTitledFirstNameNoTooltip|l]! Com as unhas cravadas nas palmas das minhas mãos, esforço-me para manter a calma e a sensatez diante dessas acusações."
 feast_default.1018.desc_default: "\n\nMeu coração bate forte nos meus ouvidos enquanto sinto um filete de suor escorrendo pelas minhas costas. Este é o risco que eu corro em troca daquele doce e único momento de aquisição."
 feast_default.1018.a: "Eu tenho uma bolsa de moedas aqui que posso te dar."
 feast_default.1018.a_contempt: "Pegue esta bolsa de moedas e vá embora!"
 feast_default.1018.a_tt: "Melhor que [witness.Custom('ES_ElLa')] [witness.GetTitledFirstNameNoTooltip|l] guarde isso para [witness.GetSheHe]!"
 feast_default.1018.b: "Essa coisa velha? Nunca vi."
 feast_default.1018.b_contempt: "Essa coisa velha? Nunca. Vi. Isso."
 feast_default_1018_success.desc: "[witness.GetTitledFirstNameNoTooltip|l] está convencid"
 feast_default_1018_failure.desc: "[witness.GetTitledFirstNameNoTooltip|l] não está convencid[witness.Custom('ES_OA')]"
 feast_default_1018_success.t: "Persuasão bem-sucedida"
 feast_default_1018_failure.t: "Persuasão Fracassada"
 feast_default.1018.c: "Olhos... #EMP e mãos#! nele!"
 #OPRHANED - Shiny Trinkets continued - You return the piece to the feast_host
 feast_default.1019.t: "O Pedido de Desculpas"
 feast_default.1019_start: "Quando entro nos aposentos de [feast_host.GetTitledFirstNameNoTooltip|l], minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('feast_host'))] me observa com uma"
 feast_default.1019.desc_intro_redeemed: "$feast_default.1019_start$ olhar decepcionado.\n\n“Isso eu não vi chegando, admito. Imaginar que minha [feast_host.Custom2('RelationToMe', ROOT.Char)] cairia vítima de um comportamento tão vergonhoso… isso realmente deve pesar sobre você. Aplaudo sua confissão, é o primeiro passo para a melhoria”."
 feast_default.1019.desc_intro_condemned: "$feast_default.1019_start$ olhar de desaprovação.\n\n\"Você e eu nunca estivemos de acordo. Que minha [feast_host.Custom2('RelationToMe', ROOT.Char)] sucumba a um furto mesquinho… Que #EMP penoso#!, é lamentável. Vocês precisam melhorar seu comportamento\"."
 feast_default.1019.desc_redemption_greedy: "\n\nEu jogo junto neste ato teatral, enquanto eu sei que outra alternativa seria muito pior. Pelo menos estou fora de problemas... desta vez."
 feast_default.1019.desc_condemnation_greedy: "\n\nLutando para me conter, olho para o chão na frente de [feast_host.GetSheHe] e ofereço um aceno de cabeça. Sim. #EMP vou fazer melhor da próxima vez.#!"
 feast_default.1019.desc_redemption: "\n\nMortificado[ROOT.Char.Custom('ES_OA')] por meu próprio comportamento, sinto-me verdadeiramente grato[ROOT.Char.Custom('ES_OA')] pela resposta benevolente a meu apelo. De fato, tiraram um enorme peso dos meus ombros."
 feast_default.1019.desc_condemnation: "\n\nCom as bochechas coradas de vergonha, estou enojado com meu próprio comportamento. Independentemente do que aconteceu comigo, agora estou sofrendo as consequências."
 feast_default.1019.a: "E se eu ficar com o item como um símbolo das minhas falhas?"
 feast_default.1019.a_tt: "Tentar manter [trinket_to_steal.GetName]"
 feast_default.1019.b: "Eu não busco nada além do seu perdão, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('feast_host'))]."
 feast_default_1019_success.desc: "[feast_host.GetTitledFirstNameNoTooltip|l] está convencid"
 feast_default_1019_failure.desc: "[feast_host.GetTitledFirstNameNoTooltip|l] não fica convencid[feast_host.Custom('ES_OA')]"
 feast_default_1019_redeemed.t: "Redimido"
 feast_default_1019_condemned.t: "Condenado"
 #Dislike the host, deface a displayed Court Artifact
 feast_default.1020.t: "O Acidente"
 feast_default.1020.desc: "Enquanto percorro os corredores do meu desprezível [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('feast_host'))] , [feast_host.GetTitledFirstNameNoTooltip|l] , examino sua coleção de artefatos em exibição. Que cafonice — talvez precisasse ser colocado no seu devido lugar...\n\nMeu olhar se detém em seu [feast_target_artifact.GetName]."
 feast_default.1020.a_knock_over: "Talvez eu vá #EMP acidentalmente#! derrubar..."
 feast_default.1020.a_scratch: "Vou arranhar bem isso…"
 feast_default.1020.a_drunkard: "Eu poderia derramar m [ROOT.Char.Custom('RegionalDrink')] sobre ele..."
 feast_default.1020.a_lustful: "Eu #EMP fortemente#! desejo quebra-lo totalmente..."
 feast_default.1020.a.tt_success: "Você desfigura o artefato sem ser detectado"
 feast_default.1020.a.tt_fined: "[feast_host.Custom('ES_ElLa')|U] [feast_host.GetTitledFirstNameNoTooltip|l] o multa por sua ação"
 feast_default.1020.a.tt_imprisoned: "[feast_host.Custom('ES_ElLa')|U] [feast_host.GetTitledFirstNameNoTooltip|l] se vinga"
 feast_default.1020.b: "Não, é melhor eu não arriscar."
 feast_default.1020.tt: "Artefato Desfigurado"
 GUESTS_LIKED_DEFACING: "#z [CHARACTER.MakeScope.Var('num_unhappy_guests').GetValue|0]#! convidados apreciam esta ação:"
 feast_default.1020.tt_guests: "#z [THIS.Var('num_unhappy_guests').GetValue|0]#! hóspedes apreciam esta ação e ganham opinião sobre você"
 feast_default.1030.t: "Heróis do Nosso Tempo"
 feast_default.1030.desc: "Um floreio encerra a primeira recitação apaixonada d [minstrel.GetFirstName]. Olhos são enxugados, mesas batidas.\n\n\"Outro conto!\" oferece [minstrel.GetSheHe]. \"Devo cantar sobre como o grande $knight_culture_player_no_tooltip_lowercase$ [knight_1.GetFirstName]"
 feast_default.1030.ethical: "nobremente defendeu os fracos?"
 feast_default.1030.amoral: "destruiu inimigos de todas as descrições?"
 feast_default.1030.leader: "liderou companheiros através de grandes perigos?"
 feast_default.1030.morally_neutral: "demonstrou pela primeira vez sua virtude?"
 feast_default.1030.aggressive: "De [knight_2.GetFirstName] avançando impiedosamente?"
 feast_default.1030.defensive: "De [knight_2.GetFirstName] permanecendo firme como uma montanha?"
 feast_default.1030.champion: "De [knight_2.GetFirstName] conquistando a vitória, sozinho?"
 feast_default.1030.stance_neutral: "De [knight_2.GetFirstName] restaurando o seu nome manchado?"
 feast_default.1030.subtle: "[knight_3.Custom('ES_ElLa')|U] o mais esperto dos [knight_3.GetCulture.GetCollectiveNounNoTooltip], [knight_3.GetFirstName]?"
 feast_default.1030.forceful: "[knight_3.Custom('ES_ElLa')|U] mais forte dos [knight_3.GetCulture.GetCollectiveNounNoTooltip], [knight_3.GetFirstName]?"
 feast_default.1030.equestrian: "[knight_3.Custom('ES_ElLa')|U] cavaleir[knight_3.Custom('ES_OA')] entre os [knight_3.GetCulture.GetCollectiveNounNoTooltip], [knight_3.GetFirstName]?"
 feast_default.1030.intensity_neutral: "O [knight_3.Custom('ES_ElLa')|U] melhor dos [knight_3.GetCulture.GetCollectiveNounNoTooltip], [knight_3.GetFirstName]?"
 feast_default.1030.courtly: "[knight_4.GetFirstName] e suas verdadeiras amizades?"
 feast_default.1030.militant: "[knight_4.GetFirstName] e suas batalhas vencidas?"
 feast_default.1030.fighty_neutral: "[knight_4.GetFirstName] e seus juramentos honrados?"
 feast_default.1030.wrap_up: "Esses guerreiros rivais aos dos tempos antigos!\"\n\nSem dúvida, enquanto os artistas deste banquete seguem para outros lugares, meu conto favorito será contado muitas vezes."
 feast_default.1030.a: "[knight_1.GetFirstNameNoTooltip], [accolade_1.GetNameNoTooltip]!"
 feast_default.1030.a.tt: "Que as retomadas inspirem a todos, desde os mais humildes ajudantes de cozinha até os maiores $knight_culture_player_plural_no_tooltip_lowercase$."
 feast_default.1030.b: "[knight_2.GetFirstNameNoTooltip], [accolade_2.GetNameNoTooltip]!"
 feast_default.1030.b.tt: "Dirão que [knight_2.GetSheHe] não pode ser derrotado!"
 feast_default.1030.c: "[knight_3.GetFirstNameNoTooltip], [accolade_3.GetNameNoTooltip]!"
 feast_default.1030.c.tt: "Todos conhecerão [knight_3.GetHerHim] como o igual de qualquer herói do passado."
 feast_default.1030.d: "[knight_4.GetFirstNameNoTooltip], [accolade_4.GetNameNoTooltip]!"
 feast_default.1030.d.tt: "Um executor de missões e feitos cada vez mais popular... reais e fictícios."
 knightly_tales_modifier: "Cavaleiros da Canção"
 knightly_tales_modifier_desc: "Os cavaleiros deste personagem inspiram histórias populares que elevam o status da nobreza guerreira."
 riders_of_song_modifier: "Cavaleiros da Canção"
 riders_of_song_modifier_desc: "Pajes jovens e cavaleiros experientes anseiam por lutar ao lado dos cavaleiros deste personagem."
 tales_of_knightly_valor_modifier: "Contos de Valor Cavaleiresco"
 tales_of_knightly_valor_modifier_desc: "Aspirantes corajosos, alguns não melhores que vagabundos, imploram para servir ao lado dos cavaleiros deste personagem."
 tales_of_knightly_leadership_modifier: "Contos de Liderança Cavaleiresca"
 tales_of_knightly_leadership_modifier_desc: "É considerada uma honra responder à sábia autoridade dos cavaleiros deste personagem."
 #feared by all enemies
 feast_default.2001.t: "Impaciência Embaraçosa"
 feast_default.2001.desc: "[host.GetTitledFirstName] anuncia um pequeno atraso no serviço da comida e [glutton.GetTitledFirstName|l] parece prestes a explodir de frustração!\n\nEntre os resmungos de seu estômago, só escuto resmungos de desagrado."
 feast_default.2001.a: "Está se fazendo de[glutton.Custom('ES_XA')] idiota."
 feast_default.2001.b: "[glutton.GetFirstNameNoTooltip] como assim? Onde está nossa comida?!"
 feast_default.2002.t: "Um Admirador"
 feast_default.2002.desc: "Alguém desconhecido me passou um bilhete durante o banquete:\n\n\"[letterAuthor.Custom2('love_letter', SCOPE.sC('letterRecipient'))]\"\n\nDe quem pode ser esta carta tão terna? Havia algo no jeito como [crush_1.GetTitledFirstName|l] me olhou com timidez. Ou em como [crush_2.GetTitledFirstName|l] me sorriu quando nos vimos. E, por outro lado, [crush_3.GetTitledFirstName|l] parecia ter muito interesse em sentar-se ao meu lado…"
 feast_default.2002.a: "Deve ter sido [crush_1.GetFirstNameNoTooltip]!"
 feast_default.2002.b: "Pode ter sido [crush_2.GetFirstNameNoTooltip]?"
 feast_default.2002.c: "Isso tem [crush_3.GetFirstNameNoTooltip] escrito em tudo."
 feast_default.2002.potential_lover_tt: "Se você estiver correto, será muito mais fácil torná-lo seu [lover|lE]"
 feast_default.2003.t: "Espíritos Afins"
 feast_default.2003.desc: "O que começou como um banquete comum se tornou algo excepcional graças à presença de [other_guest.GetTitledFirstName|l].\n\nConversamos a noite toda sobre todos os tipos de assuntos e, ao que parece, temos muita coisa em comum! Passei muito bem com [other_guest.Custom('ES_ElElla')]."
 feast_default.2003.a: "Que otima tarde!"
 feast_default.2005.t: "Por cima de minhas novas roupas"
 feast_default.2005.desc: "Todos nós sabíamos que [drunk.GetTitledFirstName|l] havia bebido demais, embora insistisse em nos mostrar o quão sóbr[drunk.Custom('ES_OA')] io estava.\n\nNo entanto, levantar-se de seu assento mostrou ser movimento demais para [drunk.GetSheHe] e agora estou cobert[ROOT.Char.Custom('ES_OA')] de vômito nauseabundo!"
 feast_default.2005.a: "\"Você deveria ter vergonha de si mesm, [drunk.GetFirstNameNoTooltip]!\""
 feast_default.2005.b: "Ha! [drunk.GetFirstNameNoTooltip] sabe como fazer um espetáculo!"
 feast_default.2006.t: "O/A [befriending_guest.GetTitleTierName|l] impaciente"
 feast_default.2006.desc: "Quando [befriending_guest.Custom2('MyCharacterIntroduction', ROOT.Char )] voltou a interromper uma conversa com uma gargalhada, não pude mais negar que estava agindo de forma estranha.\n\n[befriending_guest.GetSheHe|U] nunca se afasta de mim, entra em todas as minhas conversas, demonstra mais apreço do que o normal…"
 feast_default.2006.a: "É uma maneira estranha de ganhar meu favor, mas devo dizer que está funcionando."
 feast_default.2006.b: "Eu poderia me acostumar com isso!"
 feast_default.2006.c: "Não suporto ter alguém me seguindo assim!"
 feast_default.2006.d: "Por favor, me deixe só!"
 feast_default.2007.t: "Relacionamento Exposto!"
 feast_default.2007.desc: "Um estrondo alto ressoa pelo salão quando uma das portas dos aposentos dos servos se quebra.\n\nEm um abraço mal coberto, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover_guest_1') )], [lover_guest_1.Custom('ES_ElLa')] [lover_guest_1.GetTitledFirstName|l], e meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover_guest_2') )], [lover_guest_2.Custom('ES_ElLa')] [lover_guest_2.GetTitledFirstName|l], caem no chão diante de todos."
 feast_default.2007.a_chaste: "Não suporto olhar!"
 feast_default.2007.a_lustful: "Apenas #EMP imagine#! o que eles poderiam estar fazendo...!"
 feast_default.2007.a_sadistic: "Ah! Isso é maravilhoso!"
 feast_default.2007.a_compassionate: "Ninguém merece esse tipo de vergonha..."
 feast_default.2007.b: "Imaginar que #EMP eles#! tinha tal segredo!"
 feast_default.2008.t: "Atrás de uma Porta Trancada"
 feast_default.2008.desc: "Enquanto [homosexual_character.Custom2('MyCharacterIntroduction', ROOT.Char )] se esgueirava do banquete, tive a impressão de ver sua mão deslizando para a mão de um[romance_target.Custom('ES_XA')] serviç[romance_target.Custom('ES_EA')]!\n\nMinhas suspeitas se confirmaram quando os peguei em um quarto isolado, meio despidos!"
 feast_default.2008.a: "Com outr[homosexual_character.Custom('ES_OA')] [homosexual_character.GetWomanMan]?! O reino precisa saber!"
 feast_default.2008.b: "Seu segredo está seguro comigo, [homosexual_character.GetFirstNameNoTooltip]. Por enquanto."
 feast_default.2008.c: "Corrompendo #EMP meus#! servos sem minha aprovação?!"
 feast_default.2008.d: "Oh [homosexual_character.GetFirstNameNoTooltip], se eu soubesse."
 feast_default.2008.d.unlock_text: "Esta opção está disponível devido à sua [sexuality|lE]"
 feast_default.2009.t: "Por Favor, Continue"
 feast_default.2009.desc: "Escuto atentamente [secret_holder.Custom('ES_AlAla')] [secret_holder.GetTitledFirstName|l] revelar com total descuido toda classe de coisas enquanto tenta esvaziar a última gota de sua taça. Seus olhos se arregalam quando percebe que estou prestando atenção demais.\n\n\"Não sei o que estava dizendo\", balbucia enquanto se levanta. \"De todo modo, nada disso é verdade!\"."
 feast_default.2009.a: "Oh, eles simplesmente são rumores #EMP muito#! interessantes."
 feast_default.2011.t: "Uma Promessa é uma Promessa"
 feast_default.2011.desc: "Ignorando toda etiqueta, [favor_character.Custom2('MyCharacterIntroduction', ROOT.Char )] me golpeia nas costas. \"Falo sério\", exclama. \"Façam qualquer coisa que me pedirem. Qualquer coisa! Peçam-me, e estará feito!\"\n\nSinto o cheiro de cerveja no hálito de [favor_character.GetFirstName], mas a promessa foi notada por todos os convidados presentes."
 feast_default.2011.a: "Você é [favor_character.GetWomanMan] de palavra, não é?"
 feast_default.2011.b: "\"Ha, [favor_character.GetTitledFirstNameNoTooltip|l] está bêbad[favor_character.Custom('ES_OA')] demais para saber o que está dizendo!\""
 feast_default.2012.t: "[ROOT.Char.Custom('ES_ElLa')] testemunh[ROOT.Char.Custom('ES_OA')]"
 feast_default.2012.desc: "Enquanto saio para aliviar-me, ouço gritos na esquina. Ao virar, vejo meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('murderer'))], [murderer.Custom('ES_ElLa')] [murderer.GetTitledFirstName|l], zombando enquanto enfia sua lâmina no rosto de [murdered_guest.Custom('ES_DelDela')] encolhid[murdered_guest.Custom('ES_OA')] [murdered_guest.GetTitledFirstName|l].\n\nNão sei que barulho fiz, mas foi suficiente para que [murderer.GetFirstName] se virasse para mim com expressão de surpresa."
 feast_default.2012.a: "O que você #EMP fez#!?!"
 feast_default.2012.b: "Todos saberão do seu crime!"
 feast_default.2012.c: "Meu silêncio tem um preço."
 feast_default.2013.t: "O Puxa-Saco"
 feast_default.2013.desc: "Os rumores que circulam sobre [bootlicker.GetTitledFirstName|l] querer cair nas graças de [shared_liege.GetTitledFirstName|l] se confirmam quando entrega um presente.\n\n\"Meu/minha muito adorad[shared_liege.Custom('ES_OA')] [bootlicker.Custom2('RelationToMeShort', SCOPE.sC('shared_liege'))], é um prazer vê-lo! Sabendo que nos encontraríamos aqui, trouxe-lhe esta maravilhosa pele, como um gesto de minha gratidão.\"\n\n[shared_liege.GetTitledFirstName|l] sorri ao examinar a pele do animal. Ao ver o quão content[shared_liege.Custom('ES_OA')] está por receber um presente, percebo que corro o risco de perder esta oportunidade de também melhorar minha posição com [shared_liege.GetSheHe]!"
 feast_default.2013.a: "\" [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('shared_liege'))]! Também tenho um presente para você!\""
 feast_default.2013.a.success: "A [shared_liege.GetFirstNameNoTooltip] se impressiona com seu presente espontâneo"
 feast_default.2013.a.failure: "A [shared_liege.GetFirstNameNoTooltip] não se impressiona com seu presente espontâneo"
 feast_default.2013.b: "\"#EMP Ejem!#! Tostemos à saúde de [shared_liege.Custom('ES_DelDela')] [shared_liege.GetTitledFirstNameNoTooltip|l]!\""
 feast_default.2013.b.success: "A [shared_liege.GetFirstNameNoTooltip] se impressiona com seu brinde espontâneo"
 feast_default.2013.b.failure: "A [shared_liege.GetFirstNameNoTooltip] não se impressiona com seu brinde espontâneo"
 feast_default.2013.c: "Derrame sua bebida na pele e afirme que foi um acidente."
 feast_default.2013.c.success: "Todo mundo acredita que o derramamento foi um acidente"
 feast_default.2013.c.failure: "Ninguém acredita que o derramamento foi um acidente"
 feast_default.2013.d: "Sem pressa. Vou pensar em algo outra hora."
 feast_default.3001.t: "Um Banquete com um Amigo"
 feast_default.3001.desc: "É uma alegria tão grande ver [friend.Custom2('MyCharacterIntroductionNoComma', ROOT.Char )]! Mais uma vez, comemos, bebemos e cantamos juntos como se não tivesse passado um tempo desde a última vez que nos encontramos.\n\nPoderíamos estar jantando em um celeiro, e essa ainda assim teria sido uma das maiores festas em que ja estive."
 feast_default.3001.a: "Ah, o que seria da vida sem [friend.GetFirstNameNoTooltip]?"
 feast_default.3002.t: "Beijos Roubados"
 feast_default.3002.desc: "[lover.GetTitledFirstName], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover') )]. Sorrimos e nos cumprimentamos como se já não nos conhecêssemos intimamente, como se nunca tivéssemos nos abraçado no auge da paixão, como se não desejássemos nos abraçar.\n\nQuando mais tarde nos encontramos em um corredor por outro lado abandonado, você aponta uma porta sem luz..."
 feast_default.3002.a: "Venha! Não temos um momento a perder!"
 feast_default.3002.discovery_tt: "#F Os criados veem muito, e podem falar...#!"
 feast_default.3002.b: "Não, poderíamos ser descobertos."
 feast_default.3003.t: "Companhia Desagradável"
 feast_default.3003.desc: "Estávamos desfrutando de um agradável banquete quando apareceu #EMP [rival.Custom('ES_ElElla')]#!. Não posso ter uma única noite sem sofrer com o fedor invasivo de [rival.GetTitledFirstNameNoTooltip]?\n\nO pior de tudo é ter que suportar o arranhar nasal de sua voz ao meu lado. \"Por que essa cara feia, [ROOT.Char.GetFirstNameNoTooltip]?\"."
 feast_default.3003.a: "Faz-me querer socá-lo no rosto!"
 feast_default.3004.t: "Altercações Insultuosas"
 feast_default.3004.desc: "Depois de consumir grandes quantidades de comida e bebida, encontro meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('rival_guest'))] [rival_guest.GetTitledFirstName|l] em meio a uma conversa barulhenta. Ele se vira para mim assim que percebe minha presença.\n\n\"E #EMP vos#!… sua mera presença macula esta noite!\""
 feast_default.3004.a: "Acho que você já teve o suficiente por hoje."
 feast_default.3004.b: "Vocês não passam de um[rival_guest.Custom('ES_XA')] [rival_guest.Custom2('InsultNoun', ROOT.Char)] [rival_guest.Custom2('InsultAdjective', ROOT.Char)]!"
 feast_default.3004.b.success: "Você vence a luta"
 feast_default.3004.b.failure: "[rival_guest.GetFirstNameNoTooltip] vence a luta"
 feast_default.3004.c: "Alguns trazem alegria onde quer que vão; outros, sempre que o fazem."
 feast_default.3004.c.tt: "#F Es hora de que [rival_guest.GetFirstNameNoTooltip] reparta felicidad#!"
 feast_default.3004.d: "Um soco na cara é uma resposta tão boa quanto qualquer outra!"
 feast_default.3005.t: "Um Desafio"
 feast_default.3005.desc: "O salão ecoa com as gargalhadas da minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('rival_to_duel'))], [rival_to_duel.Custom('ES_ElLa')] [rival_to_duel.GetTitledFirstName|l], com suas provocações e insultos. Quando me chama [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('rival_to_duel'))] [ROOT.Char.Custom2('InsultAdjectiveArticle', SCOPE.sC('rival_to_duel'))], desembainho minha lâmina."
 feast_default.3005.desc_won: "\n\nEu volto aos meus sentidos enquanto derrubo [rival_to_duel.GetSheHe], coloco minha bota em seu peito, e o vejo respirando com dificuldade."
 feast_default.3005.desc_lost: "\n\nRecupero a razão quando [rival_to_duel.GetSheHe] se inclina sobre mim, com sua bota sobre meu peito. Me sussurra ao ouvido: \"Quero ouvir você implorar por piedade\"."
 feast_default.3005.a: "\"Você vai pagar por tudo que fez.\""
 feast_default.3005.b: "Nunca cederei a alguém como #EMP você#!!"
 feast_default.3005.c: "\"Por favor, não me machuque!\""
 feast_default.3005.d: "\"Eu quero ouvir você implorar por misericórdia.\""
 feast_default.3005.e: "Eu alcanço minha faca e corto seu tendão de Aquiles em um movimento suave."
 feast_default.3096.t: "Uma Nova Possibilidade"
 feast_default.3096.desc: "À medida que os festejos avançam, não consigo evitar trocar olhares com [partner.GetName].\n\nSou um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] honrado, mas poucas vezes me senti tão tentad[ROOT.Char.Custom('ES_OA')] explorar uma nova relação…"
 feast_default.3096.a: "Vamos ver aonde a noite nos leva"
 fest_default.3906.a.tt: "Você se deita com [partner.GetName]"
 feast_default.3096.b: "Eu sou melhor que isso."
 feast_default.3006.t: "Uma Única Noite"
 feast_default.3006.opening_1: "Dominados pela embriaguez e pela luxúria, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('partner'))] [partner.GetTitledFirstName|l] e eu nos encontramos a sós. Seus braços em volta de mim, seus lábios contra meu pescoço, apagamos o fogo que arde em nossos peitos e entranhas."
 feast_default.3006.opening_2: "Acordo em uma cama estranha, com um companheiro de cama inesperado. As lembranças da noite anterior lentamente tomam forma através da névoa dolorida em minha cabeça. [partner.Custom2('MyCharacterIntroduction', ROOT.Char )] e a mim."
 feast_default.3006.opening_3: "Eu havia insistido tanto que isso era exatamente o que eu não faria. Mas, depois de algumas bebidas, caí facilmente nos braços de [partner.Custom2('MyCharacterIntroduction', ROOT.Char )] tr[ROOT.Char.Custom('ES_OA')] em sua teia sedutora. Logo me vi na cama de"
 feast_default.3006.both_married_love: "\n\nNão suporto a ideia de ir sem [partner.GetSheHe], mas sua [partner.Custom2('RelationToMe', SCOPE.sC('partner'))] não pode saber, e nem minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('partner'))]!"
 feast_default.3006.married_love: "\n\nNão suporto a ideia de ficar sem [partner.GetSheHe], mas meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('partner'))] não pode saber o que aconteceu aqui."
 feast_default.3006.partner_married_love: "\n\nNão suporto a ideia de estar sem [partner.GetSheHe], mas considerando a [partner.Custom2('RelationToMe', SCOPE.sC('partner'))], [partner.Custom('ES_ElLa')] [partner.GetTitledFirstName|l]?"
 feast_default.3006.unmarried_love: "\n\nFora dos limites do casamento e da decência, não podemos deixar o mundo saber o que aconteceu aqui. Ainda assim, não suporto a ideia de ficar sem [partner.GetSheHe] nem por um dia."
 feast_default.3006.both_married: "\n\nSu [partner.Custom2('RelationToMe', SCOPE.sC('partner'))] não deve saber, e muito menos minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('partner'))]!"
 feast_default.3006.married: "\n\n [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('partner'))] não deve saber da minha traição."
 feast_default.3006.partner_married: "\n\n [partner.Custom2('RelationToMe', SCOPE.sC('partner'))] não pode saber o que aconteceu aqui."
 feast_default.3006.unmarried: "\n\nFora dos limites do casamento e da decência, não podemos deixar o mundo saber o que aconteceu aqui."
 feast_default.3006.a: "Eu preciso te ver novamente!"
 feast_default.3006.b: "Vamos aproveitar ao máximo este momento..."
 feast_default.3006.b.mistake_tt: "#F [partner.GetFirstNameNoTooltip] no está interesad[partner.Custom('ES_OA')]#!"
 feast_default.3006.c: "Nunca mais falemos sobre isso."
 feast_default.3006.c.tt: "#F Fique longe de [partner.GetFirstNameNoTooltip]#!"
 feast_default.3007.t: "No Ato"
 feast_default.3007.love: "Enquanto os outros convidados estão perdendo a cabeça com as taças, minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover'))] e eu encontramos um aposento para passar a noite juntos. Estava cobrindo de beijos as costas nuas de [lover.GetFirstName] quando uma voz me faz correr para me cobrir."
 feast_default.3007.not_love: "Levei meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover'))] , [lover.GetTitledFirstName|l] a um aposento abandonado para nos afastarmos da multidão. Eu estava no meio de saciar minha fome quando uma voz familiar me fez gelar o sangue."
 feast_default.3007.ambiguous: "Na esperança de passar algum tempo com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover'))], levei [lover.GetTitledFirstName|l] para longe do banquete. Quando eu me preparava para voltar, uma voz familiar me paralisou de choque."
 feast_default.3007.end: "\n\n\"!?[ROOT.Char.GetFirstNameNoTooltip]?!\". Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))], [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l], nos olha horrorizad[spouse.Custom('ES_OA')]. \"Como você pôde se deitar com est[lover.Custom('ES_EA')] [lover.Custom2('InsultNounSexual', SCOPE.sC('spouse'))] [lover.Custom2('InsultAdjective', SCOPE.sC('spouse'))]?\"."
 feast_default.3007.a: "Amor, isso não significa nada!"
 feast_default.3007.b: "Eu [lover.Custom('ES_LoLa')|U] amo!"
 feast_default.3007.c: "Eu faço o que eu quero."
 feast_default.5001.t: "Um Sorriso Torto"
 feast_default.5001.friend_reminder: "Acredito que [friend.GetTitledFirstName|l] só o disse como advertência, mas desde que meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('friend'))] me lembrou da reputação assustadora de [host.GetTitledFirstName|l], não consigo pensar em mais nada."
 feast_default.5001.rival_reminder: "Sei que [rival.GetTitledFirstName|l] só o disse para me preocupar, mas desde que meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('rival'))] me lembrou da reputação assustadora de [host.GetTitledFirstName|l], não consigo pensar em mais nada."
 feast_default.5001.spouse_reminder: "Tocando meu braço para chamar minha atenção, [spouse.GetTitledFirstName|l] falou em voz baixa e preocupada. \"[host.GetTitledFirstName|l] está olhando muito para você esta noite…\"\nTendo em conta a reputação de [spouse.GetTitledFirstName|l], quase desejaria que não tivesse dito nada."
 feast_default.5001.sadist_reminder: "[sadist.GetTitledFirstName] tinha um sorriso perturbador enquanto me contava algumas das histórias mais aterrorizantes sobre os métodos… diplomáticos de [host.GetTitledFirstName|l]. Não deveria deixar que isso me afetasse, mas agora estou com dificuldade de pensar em qualquer outra coisa."
 feast_default.5001.reminder: "Embora um banquete seja uma ocasião de alegria e celebração, é muito difícil não pensar na espantosa reputação de [host.GetTitledFirstName|l]…"
 feast_default.5001.worry: "\n\nAgora todos os sorrisos de nosso anfitrião começam a parecer largos demais, e cada risada repentina me sobressalta, preocupad[ROOT.Char.Custom('ES_OA')] de que alguém tenha provocado sua ira com uma afronta menor. Ou pior, que esse alguém seja eu."
 feast_default.5001.a: "Eu posso superar isso. É apenas um banquete."
 feast_default.5002.t: "Delírios"
 feast_default.5002.desc_chair: "Noss[lunatic_host.Custom('ES_OA')] anfitri[lunatic_host.Custom('ES_OnOna')], meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('lunatic_host'))] [lunatic_host.GetTitledFirstName|l], se inclina para conversar melhor com a cadeira ao seu lado. Diante de tal espetáculo, as demais conversas logo vão se calando.\n\n\"O que disseste, minha grande [ROOT.Char.Custom('RandomLadyLord')]? Claro! É claro que confio em você mais do que qualquer um dos presentes aqui.\""
 feast_default.5002.desc_chicken: "Noss[lunatic_host.Custom('ES_OA')] anfitri[lunatic_host.Custom('ES_OnOna')], meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('lunatic_host'))] [lunatic_host.GetTitledFirstName|l], leva delicadamente ao peito um frango depenado — e cozido —, sussurrando doces palavras para ele. Quando começa a proclamar em voz alta seu afeto pela ave, o clima no grande salão rapidamente toma um rumo preocupante."
 feast_default.5002.desc_drapes: "Tal anfitri[lunatic_host.Custom('ES_OnOna')], meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('lunatic_host'))] [lunatic_host.GetTitledFirstName|l], entra majestosamente na pista de dança, carregando nos braços uma das bandeiras usadas para decorar as paredes.\n\nOs convidados, cativados pelo espetáculo, não podem fazer nada além de olhar fixamente enquanto [lunatic_host.GetSheHe] conduz o pedaço de tecido em uma dança elaborada."
 feast_default.5002.a: "Meu [lunatic_host.GetLadyLord], por que não saímos para tomar um pouco de ar?"
 feast_default.5002.b: "Eu tenho que parar essa loucura!"
 feast_default.5002.c: "[lunatic_host.GetFirstNameNoTooltip]! Deixe-me juntar a vocês dois!"
 feast_default.5003.t: "Entretenimento Doloroso"
 feast_default.5003.desc: "Pedaços de metal afiado em alguns dos pratos, lascas nas cadeiras, pequenos #EMP acidentes#! que prometem hematomas...\n\nSentad[sadistic_host.Custom('ES_OA')] à cabeceira da mesa, meu/minha [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sadistic_host'))] [sadistic_host.GetTitledFirstName|l] não consegue esconder o sorriso frio que se espalha pelo rosto ao ver outro nobre cuspir sangue em seu prato."
 feast_default.5003.a: "\"Isso é inaceitável!\""
 feast_default.5003.b: "E se ele dirigir suas atenções para mim?"
 feast_default.5003.c: "Que banquete glorioso!"
 feast_default.5004.t: "O Fundo do Caneco"
 feast_default.5004.desc: "\"Foi esse o som de uma taça vazia ou vocês acabaram de se sentar à mesa?\" Para ouvir qualquer coisa por cima dessa algazarra, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] deve ter ouvidos encantados. Meu gentil anfitri[host.Custom('ES_OnOna')] faz sinal para um servo. \"Mais vinho aqui! Ninguém vai passar sede!\"."
 feast_default.5004.a: "Obrigado, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))]!"
 feast_default.5004.b: "Acho que já tive o suficiente."
 feast_default.5004.c: "Peço licença e escapo entre a multidão."
 feast_default.5005.t: "Garum!"
 feast_default.5005.desc: "Que sabor divino! Tão saboroso, ligeiramente salgado, me lembra o mar…\n\nTalvez seja o melhor garum que já provei, e o cozinheiro de [host.GetTitledFirstName|l] o usou com perfeição!"
 feast_default.5005.a: "Preciso comer isso regularmente!"
 feast_default.5005.b: "\"Esta é uma refeição incrível, [host.GetFirstNameNoTooltip]!\""
 feast_default.5005.c: "\"Você sabia que o murri foi inspirado pelo garum?\""
 feast_default.5005.c.flavor: "Parece que não muitos outros convidados sabem disso!"
 feast_default.5005.d: "Se eu pudesse, eu #EMP respiraria#! garum!"
 feast_default.6001.t: "A Pessoa Certa para o Trabalho"
 feast_default.6001.dislike_spouse: "Embora discordemos em muitas coisas, devo confessar que [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('spouse'))] fez um ótimo trabalho com meu banquete. [spouse.GetFirstName] tratou de garantir que a comida chegasse a tempo, que os convidados se sentassem nos lugares certos e que todos parecessem satisfeitos.\n\nCom [spouse.GetSheHe] ao meu lado na grande mesa e as comemorações prestes a começar, faço-lhe saber que aprecio muito seu trabalho árduo na preparação deste banquete."
 feast_default.6001.like_spouse: "Meu/minha querid[spouse.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('spouse'))] [spouse.GetFirstName] tem trabalhado duro para garantir que tudo saia perfeitamente no banquete. A comida chega na hora, os convidados estão todos sentados no lugar certo e todos parecem satisfeitos.\n\nCom [spouse.GetFirstName] ao meu lado à grande mesa, tudo está pronto. Aperto sua mão e sorrio para [spouse.GetHerHim] antes de me levantar para anunciar o início das celebrações."
 feast_default.6001.a: "O que eu teria feito sem [spouse.GetSheHe]."
 feast_default.6002.t: "Um Esforço Louvável"
 feast_default.6002.desc: "Enquanto o banquete está em andamento e nossos convidados estão comendo e bebendo alegremente, [guest.GetTitledFirstName|l] se aproxima d [spouse.GetFirstName] e eu na grande mesa.\n\"Este é um banquete maravilhoso! Meus cumprimentos aos anfitriões.\""
 feast_default.6002.a: "\"Sim, fiz um ótimo trabalho, não foi?\""
 feast_default.6002.b: "\"[spouse.GetFirstNameNoTooltip] merece todo o crédito.\""
 feast_default.6003.t: "Na Minha Casa"
 feast_default.6003.opening: "Fiz tudo o que pude para garantir que [fighter_1.Custom('ES_ElLa')] [fighter_1.GetTitledFirstName|l] e [fighter_2.Custom('ES_ElLa')] [fighter_2.GetTitledFirstName|l] estivessem o mais distantes possível. Não foi o suficiente, e agora eles quase chegaram às vias de fato, bem no meio do meu banquete!"
 feast_default.6003.bodyguard: "\n [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('bodyguard'))], [bodyguard.GetTitledFirstName|l], está próximo à briga e espera minha ordem para intervir."
 feast_default.6003.guard: "\nUm dos meus guardas está próximo à briga e espera minha ordem para intervir."
 feast_default.6003.a: "Expulse a [fighter_2.GetFirstNameNoTooltip] para se acalmar."
 feast_default.6003.b: "Conter [fighter_1.GetFirstNameNoTooltip] até que as coisas se acalmem."
 feast_default.6003.c: "\"Parem! Vamos conversar sobre isso mais tarde.\""
 feast_default.6101.t: "[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('troubled_guest'))|U] preocupad[troubled_guest.Custom('ES_OA')]"
 feast_default.6101.desc_opening: "A mirada suplicante que recebo de meu[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('troubled_guest'))] [troubled_guest.GetFirstName] adquire um tom desesperado. Um grupo de convidados se aproxima do canto onde se escondeu durante toda a noite, e as paredes estão impedindo sua fuga.\n\n"
 feast_default.6101.desc_liked: "![troubled_guest.Custom('ES_AlAla')] pobre nunca foi bom com pessoas!"
 feast_default.6101.desc_disliked: "Quem diria que [troubled_guest.GetTitleTierName] agiria dessa forma…"
 feast_default.6101.desc_disliked_unlanded: "Quem diria que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('troubled_guest'))] se comportaria assim…"
 feast_default.6101.a: "Vou distrair os convidados que estão se aproximando."
 feast_default.6101.b: "Ah, isso vai ser divertido!"
 feast_default.6101.c: "[troubled_guest.GetFirstNameNoTooltip]! Preciso falar com você. Em particular."
 feast_default.6101.c.tt: "Nós dois poderíamos usar um descanso..."
 feast_default.6111.t: "O Companheiro de Conversa"
 feast_default.6111.desc: "À medida que um prato de comida é substituído pelo próximo, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest_to_talk_to'))], [guest_to_talk_to.Custom('ES_ElLa')] [guest_to_talk_to.GetTitledFirstName|l], continua falando sobre [guest_to_talk_to.Custom('subject_of_interest')].\n\n\"... e foi assim que nos livramos dessa confusão! Tem certeza de que não estou entediando vocês, [ROOT.Char.Custom('FormOfAddressForLiege')]?\"."
 feast_default.6111.a: "Não, por favor, continue!"
 feast_default.6111.b: "Por que não falamos mais sobre você?"
 feast_default.6111.c: "Você fazendo papel de bobo nunca poderia me entediar!"
 feast_default.6111.d: "Já te contei sobre [ROOT.Char.GetPromotedLegend.GetName]?"
 feast_default.6111.d.success: "Sua lenda é cativante"
 feast_default.6111.d.failure: "Você é entediante"
 feast_default.6111.e: "Fascinante, sim, mas vamos discutir sobre o meu governo, certo?"
 every_evil_guest_scope_tt: "Cada convidado antipático"
 feast_default.6121.t: "Insulto com Bom Gosto"
 feast_default.6121.desc: "À medida que prato após prato é trazido ao salão, um cheiro inconfundível chega até mim e eu sorrio. Que meu [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('hated_guest'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hated_guest'))], [hated_guest.Custom('ES_ElLa')] [hated_guest.GetTitledFirstName|l], seja sensível ao sabor de [ROOT.GetCharacter.Custom('GetFoodDetail')] é algo que eu #EMP infelizmente#! esqueci de avisar ao cozinheiro.\n\nDou as boas-vindas a todos e espero que a comida seja do agrado de vocês."
 feast_default.6121.a: "Sobre todo a vos, [hated_guest.GetFirstNameNoTooltip]. #EMP Disfrutad#!!"
 feast_default.6121.b: "A cara que ele/ela faz quando [hated_guest.Custom('ES_LoLa')] salvo da comida certamente me agrada!"
 feast_default.6231.t: "O Desastre Acontece"
 feast_default.6231.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]. O vinho… Abrimos o próximo barril; mas ele estragou. Estragou #EMP todo#!!\"\n\nO banquete ainda está em pleno auge, mas sem bebida o ânimo certamente vai diminuir a um ritmo cruel."
 feast_default.6231.a: "O comerciante de vinhos ainda deve estar na cidade!"
 every_drunkard_guest_scope_tt: "Cada convidado bêbado presente"
 feast_default.6231.b: "Todos nós temos que colaborar. Vamos lá agora."
 feast_default.6231.c: "Hora de abrir minhas reservas secretas."
 feast_default.6231.d: "Vamos trazer os meus vinhos mais finos."
 feast_default.6251.t: "O Dilema"
 feast_default.6251.desc: "A festa está chegando ao fim e me encontro em uma conversa profunda com  [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('guest'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))] [guest.GetTitledFirstName|l].\n\n pergunta minha opinião sobre [guest.Custom('subject_of_interest')] - um assunto que  está profundamente interessado em ."
 feast_default.6251.a: "É um assunto que também me fascina!"
 feast_default.6251.b: "Eu não poderia me importar menos."
 feast_default.6251.c: "Estou mais interessado em #EMP você#!...!"
 feast_default.6261.t: "Para Servir ao Homem"
 feast_default.6261.desc_lunatic: "\"Eu mesmo dei uma mãozinha na preparação da refeição e espero que o resultado seja delicioso!\""
 feast_default.6261.desc_not_lunatic: "\"O assistente do cozinheiro deu corpo e alma para preparar esta refeição, e espero que o resultado seja delicioso!\""
 feast_default.6261.desc_cannibal_guest: "\n\nQuando nos sentamos para comer, não consigo deixar de notar que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('cannibal_guest'))] [cannibal_guest.GetTitledFirstName|l] especialmente parece apreciar a comida."
 feast_default.6261.desc_concerned_guest: "\n\nNo entanto, quando nos sentamos para comer, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('concerned_guest'))] [concerned_guest.GetTitledFirstName|l] apenas cutuca a comida à sua frente e me olha com desconfiança."
 feast_default.6261.a_exposed: "É como se [concerned_guest.GetSheHe] não confiasse em mim!"
 feast_default.6261.a: "Que suspeite do que quiser."
 feast_default.6261.b: "Traga algo a mais para [concerned_guest.GetTitleTierName] comer."
 feast_default.6261.c: "Acho que temos muitas ideias dietéticas para discutir!"
 feast_default.6301.t: "Responsabilidade Artefatual"
 feast_default.6301.desc: "No meio dos festejos, meu/minha capit[ROOT.Var('captain_gender').GetCharacter.Custom('ES_AnAna')] da guarda corre em minha direção.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], parece que alguém [feast_target_artifact.Custom('DamageArtifactAction')] [feast_target_artifact.GetName]! As provas apontam para meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('feast_artifact_culprit'))], [feast_artifact_culprit.GetTitledFirstNameNoTooltip], que tem agido de forma estranha durante toda a noite.\" [captain_of_the_guard_dummy.GetSheHe|U] olha na direção de [feast_artifact_culprit.GetFirstNameNoTooltip].\n\n\"O que meu [ROOT.Char.GetLadyLord] deseja que eu faça?\""
 feast_default.6301.desc_learning_guard: "\n\n[feast_target_artifact.Custom('DamageArtifactActionFollowup')]"
 feast_default.6301.desc_learning: "\n\n[feast_artifact_culprit.GetTitledFirstNameNoTooltip|l] parece bastante inquiet[feast_artifact_culprit.Custom('ES_OA')], olhando para todos os lados."
 feast_default.6301.a: "Prendam [feast_artifact_culprit.Custom('ES_AlAla')] [feast_artifact_culprit.GetTitledFirstNameNoTooltip|l] imediatamente!"
 feast_default.6301.b: "Tragam-me[feast_artifact_culprit.GetHerHim]."
 feast_default.6301.b.tt: "É melhor que [feast_artifact_culprit.Custom('ES_AlAla')] [feast_artifact_culprit.GetTitledFirstNameNoTooltip|l] pague pelos estragos."
 feast_default.6301.b.tt_innocent: "[feast_artifact_culprit.GetTitledFirstNameNoTooltip|l] é inocente"
 feast_default.6301.b.tt_guilty: "[feast_artifact_culprit.GetTitledFirstNameNoTooltip|l] é culpad"
 feast_default.6301.c_learning: "Eu acredito que você sabe mais do que deixa transparecer, capitão..."
 feast_default.6301.c.tt: "Você se livra do seu capitão traiçoeiro."
 feast_default.6301.d: "Eu nunca gostei dessa peça mesmo."
 #...turns out the suspect was innocent after all
 feast_default.6302.t: "Inocência Fala"
 feast_default.6302.t_lover: "Inocência Repousa Aqui"
 feast_default.6302.desc_intro: "[feast_trusted_friend.GetTitledFirstNameNoTooltip|l] vem me visitar em meu gabinete. \"Apreciad[ROOT.Char.Custom('ES_OA')] [feast_trusted_friend.Custom2('RelationToMe', ROOT.Char)], acabo de saber do encarceramento de [feast_artifact_culprit.GetFirstNameNoTooltip]\"."
 feast_default.6302.desc_secret_lover: "\n\nMe olha nervosamente. \"Pode ter sido um erro. Eu estava… observando… [feast_artifact_culprit.Custom('ES_AlAla')] [feast_artifact_culprit.GetTitledFirstNameNoTooltip|l] no momento do incidente e não pode ter sido [feast_artifact_culprit.GetHerHim]\".\nUm rubor intenso se espalha por suas bochechas."
 feast_default.6302.desc_spirited_debate: "\n\n[feast_trusted_friend.GetSheHe|U] me olha com calma, mas com preocupação. \"Lembro claramente que estava tendo um debate acalorado com [feast_debatee_character.GetTitledFirstNameNoTooltip|l] no momento do incidente, então, infelizmente, é impossível que [feast_artifact_culprit.GetSheHe] tenha sido o culpado\"."
 feast_default.6302.a: "Até mesmo Homero cochila. Mea culpa."
 feast_default.6302.a.tt: "[feast_artifact_culprit.GetTitledFirstNameNoTooltip|l] vai se lembrar disso."
 feast_default.6302.a_lover: "#EMP [feast_trusted_friend.GetTitledFirstNameNoTooltip]!#!"
 feast_default.6302.b: "Vamos manter isso entre nós."
 feast_default.6302.b.tt: "Tenho certeza de que [feast_artifact_culprit.GetTitledFirstNameNoTooltip|l] é culpado de #EMP algo#!."
 feast_default.6302.b.tt_callous: "[feast_artifact_culprit.GetTitledFirstNameNoTooltip|l] será uma ótima adição aos meus prisioneiros."
 feast_default.6351.t: "Dano Colateral"
 feast_default.6351.desc_intro: "Mal me sentei quando ouço um grito vindo de [feast_default_6351_fighter_2.Custom('ES_DelDela')] [feast_default_6351_fighter_2.GetTitledFirstNameNoTooltip|l]. Parece que [feast_default_6351_fighter_1.GetTitledFirstNameNoTooltip|l] e [feast_default_6351_fighter_2.GetSheHe] realmente se exaltaram na discussão, pois [feast_default_6351_fighter_1.GetFirstNameNoTooltip] está dando uma surra de verdade em [feast_default_6351_fighter_2.GetFirstNameNoTooltip]. Tarde demais percebo que a sua briga abriu caminho direto até o meu [feast_target_artifact.GetName]!"
 feast_default.6351.desc_calm: "\n\nFaço um gesto para que meus guardas [feast_default_6351_fighter_2.Custom('ES_LoLa')] s separem, enquanto se bufam."
 feast_default.6351.desc_wrathful: "\n\nGrito para eles do outro lado do salão: \"#EMP O que isso significa?!#!\""
 feast_default.6351.desc_outro: "\n\nA dupla é apresentada diante de mim, enquanto jogam a culpa um no outro por iniciar a briga."
 feast_default.6351.a: "[feast_default_6351_fighter_1.GetTitledFirstNameNoTooltip|l], como você pôde?"
 feast_default.6351.a_wrathful: "[feast_default_6351_fighter_1.GetTitledFirstNameNoTooltip|l], #EMP como você ousa!#!"
 feast_default.6351.a.tt: "Que [feast_default_6351_fighter_1.GetTitledFirstNameNoTooltip|l] pague pelos estragos."
 feast_default.6351.b: "Por que você permitiu que [feast_default_6351_fighter_1.GetSheHe] provocasse você, [feast_default_6351_fighter_2.GetTitledFirstNameNoTooltip]?"
 feast_default.6351.b_wrathful: "Minha paciência está se esgotando, [feast_default_6351_fighter_2.GetTitledFirstNameNoTooltip|l]..."
 feast_default.6351.b.tt: "Faça [feast_default_6351_fighter_2.GetTitledFirstNameNoTooltip|l] pagar pelos danos."
 feast_default.6351.c: "Não importa quem começou. Vocês dois são responsáveis.[feast_default_6351_fighter_2.Custom('ES_OA')] são responsáveis."
 feast_default.6351.c_wrathful: "#EMP Basta!#! Ambos pagarão pelos danos."
 feast_default.6351.c.tt: "Que [feast_default_6351_fighter_2.Custom('ES_LoLa')] os dois paguem pelos danos."
 feast_default.6351.d: "Em nome de [ROOT.Char.GetFaith.HighGodName], eu vou virar a outra face."
 feast_default.6351.d.tt: "Que [ROOT.Char.GetFaith.HighGodName] resolva com el[feast_default_6351_fighter_2.Custom('ES_OA')]s."
 feast_default.6351.e: "Essas coisas acontecem. Não era minha peça favorita."
 feast_default.6351.e_wrathful: "#EMP Felizmente para vocês, idiotas#!, eu nunca gostei dessa peça..."
 feast_default.6351.e.tt: "Deixe-os escaparem impunes."
 feast_default.6501.t: "A Insinuação"
 feast_default.6501.desc.opening: "\"Eu sei o que disse, só não entendo por que você acha tão engraçado\".\n\n[innocent_guest.GetTitledFirstName|l] inclina a cabeça para o lado enquanto contenho meu riso. Não lhe disse que o que disse poderia ser interpretado como algo lascivo.\n\n"
 feast_default.6501.joke_a: "\"Se você apertar a cabeça, uma substância espessa vai jorrar!\""
 feast_default.6501.joke_b: "\"Estou com dificuldade em entender esse dialeto, e ouvi dizer que você é um linguista habilidoso!\""
 feast_default.6501.joke_c: "\"Ela exibia um belo decote no tribunal!\""
 feast_default.6501.desc.ending_solo: "\n\nSou o únic[ROOT.Char.Custom('ES_OA')] a quem isso parece engraçado? Não saberei até eu falar. Vale a pena envergonhar [innocent_guest.GetFirstNameNoTooltip] por uma piada?"
 feast_default.6501.desc.ending_duo: "\n\nPode não ser só eu que ache isso engraçado; [fellow_pervert.GetTitledFirstName|l] cospe parte da própria bebida quando [innocent_guest.GetTitledFirstNameNoTooltip|l] se repetiu. [fellow_pervert.Custom('ES_ElElla')|U] e eu compartilhamos o mesmo tipo de humor grosseiro. Ou talvez isso o ofenda. Não saberei o que pensa nenhum dos dois até que eu me manifeste."
 feast_default.6501.a: "Eu, uh... Deixa pra lá..."
 feast_default.6501.b: "Repita o que você disse, mas devagar. Pense bem sobre isso."
 feast_default.6501.b.tt: "#F Você corre o risco de envergonhar [innocent_guest.GetTitledFirstNameNoTooltip|l] na esperança de que compartilhem o mesmo tipo de humor"
 feast_default.6501.b.success: "[innocent_guest.GetTitledFirstNameNoTooltip|l] acha a insinuação de duplo sentido engraçada"
 feast_default.6501.b.failure: "[innocent_guest.GetTitledFirstNameNoTooltip|l] fica mortificad[innocent_guest.Custom('ES_OA')] com seu humor pervertido."
 feast_default.6510.t: "Debaixo da mesa"
 feast_default.6510.desc.intro: "O próximo prato já está chegando à mesa e tudo o que vejo é uma gosma duvidosa servida num prato, se contorcendo como se estivesse viva. Meu estômago borbulha em alerta, e eu pularia de bom grado este próximo prato... meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('primary_spouse'))] [ROOT.Char.GetPrimarySpouse.GetFirstName] nota meu desgosto e se inclina para a frente, me encarando severamente, balançando lentamente a cabeça de um lado para o outro em desaprovação.\n\nComo se fosse me salvar desse destino macabro, [ROOT.Char.GetFaith.PositiveAfterLife] intervém — e eu acabo vendo"
 feast_default.6510.desc.cat: "meu gato [ROOT.Char.Custom('CatStoryName')]"
 feast_default.6510.desc.dog: "meu cachorro [ROOT.Char.Custom('DogStoryName')]"
 feast_default.6510.desc_cat_and_dog: "meus bichinhos, [ROOT.Char.Custom('CatStoryName')] e [ROOT.Char.Custom('DogStoryName')]"
 feast_default.6510.desc.outro: "buscando migalhas no chão. Esta é minha chance de evitar o prato intragável!"
 feast_default.6510.a: "\"#EMP Aqui, aqui…\""
 feast_default.6510.a.tt.success: "Ninguém parece notar"
 feast_default.6510.a.tt.failure: "Todos parecem notar isso"
 feast_default.6510.b: "Melhor se preparar…"
 feast_default.6510.b.tt.success: "Sinto-me melhor do que o esperado"
 feast_default.6510.b.tt.failure: "Não estou me sentindo muito bem"
 feast_default.6510.c: "Eu escolho o que eu como!"
 feast_default.8001.t.fire: "Das Cinzas às Chamas"
 feast_default.8001.t.knights: "Melhor Servido Frio"
 feast_default.8001.desc.sadistic: "As chamas lambem o telhado, e os gritos ecoam pela noite. Encosto minhas costas na porta fechada, ignorando os rostos horrorizados de minhas vítimas, e sorrio. Permitir que o ressentimento ardente se transforme em chamas é realmente a melhor maneira de lidar com a dissidência!\n\nÀ medida que os batimentos do outro lado vão ficando mais fracos e mais fracos, finalmente me permito rir."
 feast_default.8001.desc.compassionate: "Não consigo tirar os olhos do meu prato. A porção de [ROOT.Char.Custom('RegionalEdibleMeat')] está quase intocada. Minha [ROOT.Char.Custom('GetExpensiveDrink_Singular')] intacta. Evito [honorary_guest.Custom('ES_AlAla')] [honorary_guest.GetTitledFirstName|l] quando fala sobre [honorary_guest.Custom('herhis_subject_of_interest')]. Que vergonha.\n\n\"Com licença, amig[honorary_guest.Custom('ES_OA')] mí[honorary_guest.Custom('ES_OA')]\", me desculpo, saindo apressadamente da sala. Respiro com dificuldade. É o que #EMP deve#! ser feito. Faço um sinal a um dos servos e fecho os olhos.\n\nChamas, depois gritos."
 feast_default.8001.desc.just: "Todos os demais já foram embora. Todos, menos meu convidad[honorary_guest.Custom('ES_OA')] de honra e seu esplêndido séquito. Dou um gole na taça enquanto [ROOT.GetCharacter.Custom('GetIncidentalDetailPresent')]. Não devem suspeitar. \"Com licença\", cruzo olhares com [honorary_guest.Custom('ES_ElLa')] [honorary_guest.GetTitledFirstName|l] antes de partir. Ninguém deve saber. Ninguém saberá.\n\nQuando dou a ordem de fechar as portas, paro um instante para respirar. O que é certo nem sempre é gentil.\n\nLogo, as chamas aparecem, e os gritos se seguem."
 feast_default.8001.desc.random_1: "A conversa com [honorary_guest.Custom('ES_ElLa')] [honorary_guest.GetTitledFirstName|l] não pode ser mais cordial. Meus olhos se desviam para a taça de [host.Custom('GetExpensiveDrink_Singular')] enquanto [honorary_guest.GetSheHe] faz uma longa palestra sobre [honorary_guest.Custom('herhis_subject_of_interest')]. Todos os outros convidados já se foram. É claro que não gostariam de interromper os assuntos importantes que meu convidad[honorary_guest.Custom('ES_OA')] de honra deseja discutir.\n\nO veneno é insípido. E indetectável."
 feast_default.8001.desc.random_2: "A música e a dança chegaram a níveis que tornam quase impossível conversar. O copeiro reabastece o cálice [honorary_guest.Custom('ES_DelDela')] [honorary_guest.GetTitledFirstName|l] e nossos olhares se cruzam por um instante.\n\n\"[ROOT.Char.GetHouse.GetMotto]\", murmuro, enquanto [honorary_guest.GetFirstNameNoTooltip] se engasga com o veneno."
 feast_default.8001.a: "Finalmente... Eles se foram."
