l_spanish:
 feast_lifestyle.1001.t: "Palavras de Guerra"
 feast_lifestyle.1001.desc: "Que direito acha que tem [strategy_opponent.GetTitledFirstName|l] para afirmar que minhas ideias sobre a guerra estão equivocadas?\n\nOra, dizer que minhas ideias desmoronariam no momento do combate… O que [strategy_opponent.GetSheHe] sabe, afinal?"
 feast_lifestyle.1001.a: "Eu adoraria ter a chance de resolver isso no campo de batalha."
 feast_lifestyle.1001.a.tt: "Pelo menos [strategy_opponent.GetFirstName] mostrou que voc? ? capaz de defender sua compreens?o do [martial_lifestyle|lE]."
 feast_lifestyle.1002.t: "Significado Oculto"
 feast_lifestyle.1002.opening: "Os outros convidados estão rindo e conversando na sala barulhenta, tornando difícil se concentrar na gororoba à minha frente. Eu traço linhas e engajamentos no lodo gorduroso enquanto penso em maneiras de contra-atacar vários planos de batalha."
 feast_lifestyle.1002.cavalry: "\n\n #EMP Se a cavalaria avançasse por essa ala...#!"
 feast_lifestyle.1002.heavy_infantry: "\n\n #EMP Com a infantaria pesada se posicionando exatamente aqui...#!"
 feast_lifestyle.1002.archers: "\n\n #EMP Enquanto uma chuva de flechas cai sobre o centro...#!"
 feast_lifestyle.1002.skirmishers: "\n\n #EMP Com meus batedores assediando a ala cenoura...#!"
 feast_lifestyle.1002.pikemen: "\n\n #EMP Claro, meus piqueiros podem resistir nesse lado...#!"
 feast_lifestyle.1002.a: "Isso parece que poderia funcionar em um campo de batalha real!"
 feast_lifestyle.1002.a.tt: "Pensar que uma tigela de gororoba poderia ajudar a expandir sua compreensão do [martial_lifestyle|lE]."
 feast_lifestyle.1003.t: "Em Caso de Perigo"
 feast_lifestyle.1003.desc: "En medio de las celebraciones, me intriga más la posibilidad de defender el salón. Si se lanzara un ataque desde el exterior en este momento, la baja nobleza sería la que correría peligro inmediato. A partir de las grandes mesas se podía hacer un pequeño bastión que ofrecería un mínimo de protección.\n\nAhora, ¿cómo montaríamos un contraataque…?"
 feast_lifestyle.1003.a: "Nunca se pode ser demasiado cauteloso."
 feast_lifestyle.1003.a.tt: "É melhor pensar nessas coisas do que viver na feliz ignorância apenas para morrer quando chegar o dia. Você entende o [martial_lifestyle|lE] melhor que isso."
 feast_lifestyle.1003.b: "E se o ataque viesse de dentro?!"
 feast_lifestyle.1003.b.tt: "Seria tolice pensar que todos os convidados aqui seriam seus camaradas de armas. Você entende o [martial_lifestyle|E] melhor do que isso."
 feast_lifestyle.1004.t: "Conhecimento Compartilhado"
 feast_lifestyle.1004.desc: "Os banquetes oferecem uma ótima oportunidade para conversar com pessoas cuja opinião valorizo. [consultant_3.GetTitledFirstName|l] tinha ideias interessantes sobre manobrabilidade militar, enquanto [consultant_2.GetTitledFirstName|l] teve algumas ideias sobre novas estratégias defensivas.\n\nMas [consultant_1.GetTitledFirstName|l] teve uma verdadeira ideia genial. Depois de algumas bebidas, [consultant_1.GetTitledFirstName|l] me disse em confiança o que considerava o modo ideal de assaltar um castelo!"
 feast_lifestyle.1004.a: "Eu aprendo tanto nessas festas."
 feast_lifestyle.1004.a.tt: "Conversar com comandantes experientes certamente ajuda na compreensão do [martial_lifestyle|lE]."
 feast_lifestyle.2001.t: "Conheça o Seu Lugar"
 feast_lifestyle.2001.mean: "Dando un paso rápido al lado, consigo esquivar por poco el vino que mi [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('guest_victim'))], [guest_victim.Custom('ES_ElLa')] [guest_victim.GetTitledFirstName|l] derrama #EMP sin querer#! al pasar a mi lado.\n\nDejo pasar el último de sus insultos porque en ese momento es[guest_victim.Custom('ES_EA')] [guest_victim.Custom2('InsultNoun', ROOT.Char)] empalidece y se pone rígid[guest_victim.Custom('ES_OA')]."
 feast_lifestyle.2001.loud: "«Bien, sobre los errores garrafales, ¿os he contado cuando [ROOT.Char.GetTitledFirstNameNoTooltip|l]…?»\n\nMi [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('guest_victim'))] [guest_victim.GetTitledFirstName|l] se calla y empalidece."
 feast_lifestyle.2001.quiet: "Os olhares que meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('guest_victim'))], [guest_victim.Custom('ES_ElLa')] [guest_victim.GetTitledFirstName|l], quando sussurra para as pessoas ao seu redor são ardentes.\n\nDe repente, é[guest_victim.Custom('ES_EA')] [guest_victim.Custom2('InsultNoun', ROOT.Char)] fica rígid[guest_victim.Custom('ES_OA')] e empalidece."
 feast_lifestyle.2001.desc_ending: "O andar desajeitado de [guest_victim.GetSheHe] ao sair da sala me faz sorrir enquanto escondo o pequeno frasco de laxante em minha bolsa."
 feast_lifestyle.2001.a: "Isso vai ensinar[guest_victim.Custom('ES_EA')] [guest_victim.Custom2('InsultNoun', ROOT.Char)] [guest_victim.Custom2('InsultAdjective', ROOT.Char)]!"
 feast_lifestyle.2002.t: "Uma Língua Solta"
 feast_lifestyle.2002.desc_lover: "\"E com olhos assim... Quem sou eu para resistir?\""
 feast_lifestyle.2002.desc_cannibal: "\"Você até consegue dizer se eles eram fortes em vida pela textura da carne. Lembro de um soldado que comi uma vez...\""
 feast_lifestyle.2002.desc_homosexual_male: "\"E então eu o vi sorrir! Pensar que eu sou esperado a ficar satisfeito com uma mulher depois disso...\""
 feast_lifestyle.2002.desc_homosexual_female: "\"E então eu a vi sorrir! Pensar que eu sou esperada a ficar satisfeita com um homem depois disso...\""
 feast_lifestyle.2002.desc_ending: "\n\nTras cantidades ingentes de bebida, mi [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('guest_with_secret'))] [guest_with_secret.GetTitledFirstName|l] se inclina sobre nuestra mesa, volcando ante de mí tanto su bebida como su corazón.\n\n«Por traerme tanta bebida y escucharme hablar sin parar… ¡Gracias, [ROOT.Char.GetFirstNameNoTooltip]!»"
 feast_lifestyle.2002.a: "Isso é bom demais para guardar só para mim!"
 feast_lifestyle.2002.b: "N?o, obrigado #EMP a voc?#! por revelar isto!"
 feast_lifestyle.2002.c: "Meu silêncio tem um preço, você sabe."
 feast_lifestyle.2002.d: "Saúde! Por uma noite agradável e novos companheiros de bebida!"
 feast_lifestyle.2003.t: "O Poder de Influenciar"
 feast_lifestyle.2003.desc: "Al pasar con soltura de una conversación a otra, dirijo las discusiones en la dirección que deseo.\n\nUnas pocas palabras cuidadosamente escogidas y tengo una visión más clara de la vida amorosa de mi [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('courtier_to_persuade'))] [courtier_to_persuade.GetTitledFirstName|l] que la que le gustaría hasta a su [courtier_to_persuade.Custom('WifeHusbandOpp')]."
 feast_lifestyle.2003.a: "A festa é meu campo de treinamento..."
 feast_lifestyle.2003.a.tt: "#F ...e as palavras s?o minhas armas!#!"
 feast_lifestyle.2003.b: "Vamos apenas desfrutar da conversa."
 feast_lifestyle.2004.t: "Uma História Detalhada"
 feast_lifestyle.2004.desc1_a: "Ali[ROOT.Char.Custom('ES_EA')] [ROOT.Char.Custom('RandomLadyLord')] ali sorri para uma[ROOT.Char.Custom('ES_XAOpp')] criad[ROOT.Char.Custom('ES_EAOpp')] do outro lado do salão com uma familiaridade quase íntima; um possível caso."
 feast_lifestyle.2004.desc1_b: "Desde que chegou seu cônjuge, é a terceira vez que [ROOT.Char.Custom('ES_EA')] [ROOT.Char.Custom('RandomLadyLord')] enche a taça que, aliás, não larga. Há uma relação prestes a desmoronar."
 feast_lifestyle.2004.desc2_a: "Esse[ROOT.Char.Custom('ES_EA')] [ROOT.Char.Custom('RandomLadyLord')] ao fundo do salão está usando as mesmas botas do ano passado; problemas financeiros."
 feast_lifestyle.2004.desc2_b: "Es[ROOT.Char.Custom('ES_EA')] [ROOT.Char.Custom('RandomLadyLord')] se mantém encostad[ROOT.Char.Custom('ES_OA')] à parede e evita toda conversa, assim como qualquer contato visual. Será que guarda algum segredo?"
 feast_lifestyle.2004.desc_ending: "\n\nTodo mundo está escondendo algo, e com um olhar experiente até os menores detalhes mostrarão a imagem completa."
 feast_lifestyle.2004.a: "Eles estão expondo sua vergonha tão abertamente!"
 feast_lifestyle.2004.b: "Nada pode escapar de mim!"
 feast_lifestyle.3001.t: "O Assento do Poder"
 feast_lifestyle.3001.desc: "¡Qué festín! Una oportunidad excelente para mi [ROOT.Char.Custom2('RelationToMe' , SCOPE.sC('important_guest_1'))] [important_guest_1.GetTitledFirstName|l] y yo de saber más sobre la gente que nos sirve.\n\nNo se han sentado todavía ni mi [ROOT.Char.Custom2('RelationToMe' , SCOPE.sC('important_guest_2'))] [important_guest_2.GetTitledFirstName|l] ni mi [ROOT.Char.Custom2('RelationToMe' , SCOPE.sC('important_guest_3'))] [important_guest_3.GetTitledFirstName|l] y rápidamente llamo a un sirviente para que reorganice los asientos."
 feast_lifestyle.3001.a: "[important_guest_1.GetFirstNameNoTooltip] deve sentar-se ao lado de [important_guest_2.GetTitledFirstNameNoTooltip|l]."
 feast_lifestyle.3001.b: "[important_guest_1.GetFirstNameNoTooltip] certamente apreciaria a companhia de [important_guest_3.GetTitledFirstNameNoTooltip|l]."
 feast_lifestyle.3001.c: "Ambos jantarão comigo."
