l_spanish:
 feast_main_stew_flood.0002.t: "O Mar de Ensopado"
 feast_main_stew_flood.0002.stew_introduction_blamed: "Eu já tinha bebido um pouco demais quando tropecei no enorme caldeirão pendurado sobre a lareira no salão de banquetes. Ele se soltou, e seu caldo saboroso jorrou, cobrindo o chão em um mar de ensopado!"
 feast_main_stew_flood.0002.stew_introduction_blame: "Num tropeço ébrio, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('stew_sea_blamed'))], [stew_sea_blamed.GetTitledFirstName|l], soltou o enorme caldeirão que pendia sobre a lareira no meio do salão de banquetes! Um caldo saboroso jorrou e cobriu o chão em um mar de ensopado!"
 feast_main_stew_flood.0002.stew_introduction: "Na agitação da festa, um dos serviçais de [activity.GetOwner.GetTitledFirstName|l] acidentalmente soltou o enorme caldeirão que pendia sobre a lareira no meio do salão de banquetes! O caldo saboroso jorrou, cobrindo metade do ambiente em um mar de ensopado!"
 feast_main_stew_flood.0002.someone_got_covered: "\n\n[stew_sea_gets_covered.GetTitledFirstName] [stew_sea_gets_covered.Custom('stew_flood_covered_adjective')] foi pego[stew_sea_gets_covered.Custom('ES_OA')] pela onda e praguejou em voz alta contra sua aparência arruinada enquanto a gordura escorria pelo seu rosto."
 feast_main_stew_flood.0002.splash_desc_standard: "\n\nOs convidados correram para o outro lado do salão enquanto a massa espessa espalhava tentáculos gordurosos entre os pés apressados."
 feast_main_stew_flood.0002.every_target: "\nCedendo à sua fome insaciável, [stew_sea_glutton.GetTitledFirstName|l] caiu no chão, engolindo o máximo que podia da bagunça carnuda enquanto [stew_sea_horrified_character.GetTitledFirstName|l] observava em completo horror."
 feast_main_stew_flood.0002.only_glutton: "\n\nCedendo à sua fome insaciável, [stew_sea_glutton.GetTitledFirstName|l] se jogou no chão, engolindo o máximo que podia da bagunça carnuda."
 feast_main_stew_flood.0002.only_horror: "\n\n[stew_sea_horrified_character.GetTitledFirstName] permaneceu catatônic[stew_sea_horrified_character.Custom('ES_OA')] no meio de tudo, impactad[stew_sea_horrified_character.Custom('ES_OA')] e horrorizad[stew_sea_horrified_character.Custom('ES_OA')] com tamanho desperdício."
 feast_main_stew_flood.0002.a: "Nunca vi tanto ensopado na vida."
 feast_main_stew_flood.0003.t: "O Mar de Ensopado"
 feast_main_stew_flood.0003.stew_introduction_blame: "Em um tropeço embriagado, [stew_sea_blamed.GetTitledFirstName|l] soltou um enorme caldeirão pendurado sobre a lareira no meio do salão de banquetes! O caldo saboroso jorrou, cobrindo metade do chão em um mar de ensopado!"
 feast_main_stew_flood.0003.stew_introduction: "Na agitação da festa, um idiota de um servo conseguiu soltar o enorme caldeirão que pendia sobre a lareira no salão de banquetes! O caldo saboroso jorrou, cobrindo metade do chão em um mar de ensopado!"
 feast_main_stew_flood.0003.someone_got_covered: "\n\n[stew_sea_gets_covered.GetTitledFirstName] [stew_sea_gets_covered.Custom('stew_flood_covered_adjective')], sentad[stew_sea_gets_covered.Custom('ES_OA')] junto ao caldeirão, foi pego[stew_sea_gets_covered.Custom('ES_OA')] pela onda que avançava e praguejou em voz alta contra a aparência arruinada enquanto a gordura escorria pelo rosto."
 feast_main_stew_flood.0003.splash_desc_standard: "Os convidados correram para o outro lado do salão enquanto a massa espessa espalhava tentáculos gordurosos entre os pés que saltavam."
 feast_main_stew_flood.0003.every_target: "\n\nRendendo-se à sua fome insaciável, [stew_sea_glutton.GetTitledFirstName|l] se jogou no chão, engolindo o máximo que podia da substanciosa bagunça enquanto [stew_sea_horrified_character.GetTitledFirstName|l] observava em horror absoluto."
 feast_main_stew_flood.0003.only_glutton: "\n\nCedendo à sua fome insaciável, [stew_sea_glutton.GetTitledFirstName|l] se jogou no chão, engolindo o máximo que podia da bagunça carnuda."
 feast_main_stew_flood.0003.only_horror: "\n\n[stew_sea_horrified_character.GetTitledFirstName] permaneceu catatônic[stew_sea_horrified_character.Custom('ES_OA')] no meio de tudo, impactad[stew_sea_horrified_character.Custom('ES_OA')] e horrorizad[stew_sea_horrified_character.Custom('ES_OA')] com tamanho desperdício."
 feast_main_stew_flood.0003.a: "Maldição, que bagunça!"
 feast_main_stew_flood.0004.t: "Mar de Ensopado"
 feast_main_stew_flood.0004.stew_introduction_blame: "Em um tropeço embriagado, [stew_sea_blamed.GetTitledFirstName|l] soltou um enorme caldeirão pendurado sobre a lareira no meio do salão de banquetes! O caldo saboroso jorrou, cobrindo metade do chão em um mar de ensopado!"
 feast_main_stew_flood.0004.stew_introduction: "Na agitação da festa, um dos servos de [activity.GetOwner.GetTitledFirstName|l] acidentalmente soltou o enorme caldeirão que pendia sobre a lareira no meio do salão de banquetes! O caldo saboroso jorrou, cobrindo metade do ambiente em um mar de ensopado!"
 feast_main_stew_flood.0004.getting_covered: "\nEu estava sentado muito perto, e a refeição gordurosa me cobriu como uma onda feita nas profundezas do [ROOT.Char.GetFaith.NegativeAfterLife]. Minhas roupas podem ser limpas, mas a vergonha dolorosa de um salão cheio de risadas nunca sairá."
 feast_main_stew_flood.0004.a: "Por que isso foi acontecer comigo?!"
 feast_main_stew_flood.0005.t: "Mar de Ensopado"
 feast_main_stew_flood.0005.stew_introduction_blame: "Em um tropeço embriagado, [stew_sea_blamed.GetTitledFirstName|l] soltou um enorme caldeirão pendurado sobre a lareira no meio do salão de banquetes! O caldo saboroso jorrou, cobrindo metade do chão em um mar de ensopado!"
 feast_main_stew_flood.0005.stew_introduction: "Na agitação da festa, um dos servos de [activity.GetOwner.GetTitledFirstName|l] soltou acidentalmente o enorme caldeirão que pendia sobre a lareira no meio do salão de banquetes! O caldo saboroso jorrou, cobrindo metade do ambiente em um mar de ensopado!"
 feast_main_stew_flood.0005.cannot_resist: "\nCom toda aquela comida deliciosa derramando por todos os lados, eu simplesmente não pude resistir. Antes que eu percebesse o que estava acontecendo, eu estava de quatro, lambendo o ensopado como um cão comum! Nem sequer estava pensando no que os outros convidados pensariam, muito menos no anfitrião!"
 feast_main_stew_flood.0005.being_watched: "\nEmbora eu estivesse apenas vagamente consciente de que [stew_sea_horrified_character.GetTitledFirstName|l] me observava com o rosto contorcido de desgosto."
 feast_main_stew_flood.0005.a: "Estava simplesmente bom demais!"
 feast_main_stew_flood.0006.t: "Mar de Ensopado"
 feast_main_stew_flood.0006.stew_introduction_blame: "Em um tropeço embriagado, [stew_sea_blamed.GetTitledFirstName|l] soltou um enorme caldeirão pendurado sobre a lareira no meio do salão de banquetes! O caldo saboroso jorrou, cobrindo metade do chão em um mar de ensopado!"
 feast_main_stew_flood.0006.stew_introduction: "Na agitação da festa, um dos servos de [activity.GetOwner.GetTitledFirstName|l] soltou acidentalmente o enorme caldeirão que pendia sobre a lareira no meio do salão de banquetes! O caldo saboroso jorrou, cobrindo metade do ambiente em um mar de ensopado!"
 feast_main_stew_flood.0006.shocking_experience: "Foi demais ver a quantidade imensa de comida que seria servida aos convidados, ainda pior pelo fato de que agora estava sendo desperdiçada."
 feast_main_stew_flood.0006.a: "Preciso desviar o olhar."
 feast_main_stew_flood.0041.t: "Barriga Cheia"
 feast_main_stew_flood.0041.blame_placed: "Todos sorrimos satisfeitos, deixando nosso anfitrião com motivos para se orgulhar. Embora [stew_sea_blamed.Custom('ES_ElLa')] [stew_sea_blamed.GetTitledFirstName|l] possa sentir mais vergonha do que satisfação depois de virar o caldeirão!"
 feast_main_stew_flood.0041.no_blame_placed: "Todos nós sorrimos satisfeitos, deixando nosso anfitrião com motivos para se orgulhar. Exceto pelo servo que derrubou o caldeirão de ensopado. Aquilo foi um momento bastante vergonhoso."
 feast_main_stew_flood.0041.a: "Que boa festa."
 feast_main_stew_flood.0042.t: "Barrigas Cheias"
 feast_main_stew_flood.0042.blame_placed: "Todos sorriem satisfeitos para seus pratos quando os olho, orgulhos[ROOT.Char.Custom('ES_OA')] da minha demonstração de generosidade. Dito isso, talvez [stew_sea_blamed.Custom('ES_ElLa')] [stew_sea_blamed.GetTitledFirstName|l] sinta mais vergonha do que satisfação por virar o caldeirão! Limpar tudo não será barato."
 feast_main_stew_flood.0042.no_blame_placed: "Todos sorriem satisfeitos para seus pratos quando os olho, orgulhos[ROOT.Char.Custom('ES_OA')] de minha demonstração de generosidade. Dito isso, terei de fazer algo com aquele maldito servo que virou o caldeirão de ensopado! Além disso, a limpeza não será barata."
 feast_main_stew_flood.0042.a: "Deveríamos fazer isso com mais frequência!"
 feast_main_stew_flood.0043.blame_placed: "O banquete logo terminará, e poderei ir embora para cuidar da minha vergonha.\nEsse maldito ensopado de carne se meteu em todo lugar, e não sei se algum dia conseguirei tirar seu cheiro do meu cabelo! Vai demorar muito até eu esquecer o que [stew_sea_blamed.Custom('ES_ElLa')] [stew_sea_blamed.GetTitledFirstName|l] fez comigo."
 feast_main_stew_flood.0043.no_blame_placed: "A festa logo terminará, e poderei cuidar da minha vergonha.\nAquele maldito ensopado de carne foi para todos os lugares, e não tenho certeza se conseguirei tirar o cheiro do meu cabelo! Levará muito tempo antes que eu esqueça o que aquele servo fez comigo."
 feast_main_stew_flood.0043.a: "Nunca mais comerei ensopado."
 feast_main_stew_flood.0044.desc: "A festa logo terminará, após ter o cheiro de ensopado pairando sobre ela como um espectro. Não consigo acreditar que eu seria a pessoa tão azarada, e simplesmente... desejo que isso não tivesse acontecido!"
 feast_main_stew_flood.0044.a: "Espero que as pessoas estivessem bêbadas demais para se lembrar."
 stew_flood_covered_adjective_wrathful: "irritado"
 stew_flood_covered_adjective_proud: "orgulhoso"
 stew_flood_covered_adjective_beautiful: "bonito"
 stew_flood_fallback_adjective: "incauto"
 feast_stew_flood_log_title: "Inundação de Ensopado"
 feast_stew_flood_log: "[TARGET_CHARACTER.GetTitledFirstName] ficou cobert[TARGET_CHARACTER.Custom('ES_OA')] de ensopado quente após um enorme incidente de derramamento."
