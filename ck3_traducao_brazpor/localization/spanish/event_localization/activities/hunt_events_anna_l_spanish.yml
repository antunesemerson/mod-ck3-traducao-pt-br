l_spanish:
 hunt_events_anna.0001.t: "Raízes profundas"
 hunt_events_anna.0001.desc: "Um grande carvalho se apresenta com sua majestosa copa, que se estende por toda parte e cobre tudo abaixo em escuridão. Ao erguer o olhar para seus galhos, lembro-me das várias dinastias que vêm e vão. De todos aqueles que vieram antes de mim e daqueles que levarão adiante meu legado quando eu me for.\n\nAo me aproximar, noto várias iniciais entalhadas em sua casca, deixando uma gentil lembrança de que as pessoas vêm e vão ao longo das eras. E [love_interest.GetFirstName], a pessoa com quem eu gostaria de transmitir meu legado é meu tudo para mim."
 hunt_events_anna.0001.a: "Gravar as iniciais de [love_interest.GetFirstNameNoTooltip] na casca."
 hunt_events_anna.0001.b: "Não há tempo para tais tolices!"
 hunt_events_anna.0001.b.t_toast: "Minha prioridade principal é a caçada."
 hunt_events_anna.0005.t: "Sob a minha pele"
 hunt_events_anna.0005.desc: "Meu breve descanso é interrompido por uma risada zombeteira vindo na minha direção. Olho para cima e, para pouca surpresa, sou recebido por um largo sorriso de [mocking_participant.GetFirstName], enquanto segura o que parece ser um exemplar morto de [ROOT.Char.Custom('SmallAnimal')].\n\n"Nunca pensei em você como alguém capaz de sobreviver sozinho na natureza, então imaginei que poderia lhe fazer bem um pouco de prática", diz com tom de desprezo, atirando a carcaça aos meus pés."
 hunt_events_anna.0005.a: "Tentar esfolar o animal."
 hunt_events_anna.0005.a.toast.good: "Consigo esfolar o animal"
 hunt_events_anna.0005.a.toast.nothing: "O que resta é indistinguível"
 hunt_events_anna.0005.b: "Praticar? Por que não…?"
 hunt_events_anna.0005.c: "Não cabe a mim realizar uma tarefa tão menor."
 hunt_events_anna.0010.t: "Presos lá embaixo"
 hunt_events_anna.0010.desc: "Com passos pesados e instáveis, sigo minha presa por [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')], concentrad[ROOT.Char.Custom('ES_OA')] em manter o ritmo. Um estalo repentino ecoa em meus ouvidos. Sinto uma súbita leveza, e um frio intenso se agita no fundo do meu estômago. A queda para, e uma dor lancinante atravessa meu corpo com o impacto.\n\nQuando olho ao meu redor, dolorid[ROOT.Char.Custom('ES_OA')], só vejo quatro paredes me cercando. Caí em uma armadilha, e preciso encontrar um jeito de sair dali."
 hunt_events_anna.0010.a: "Escale até sair do buraco."
 hunt_events_anna.0010.a.desc.good: "Consigo escalar para sair"
 hunt_events_anna.0010.a.toast.good: "Consigo superar a dor e sair"
 hunt_events_anna.0010.a.toast.bad: "Tropeço mais uma vez e me machuco no processo"
 hunt_events_anna.0010.a.desc.bad: "Escorrego e caio de volta no buraco"
 hunt_events_anna.0010.b: ""Tem alguém aí?!""
 hunt_events_anna.0010.b.flavor: "O grupo de caça interrompe a caçada e me ajuda em vez disso."
 hunt_events_anna.0015.t: "Inspirar… Expirar…"
 hunt_events_anna.0015.desc: "Golpes estranhos, murmúrios baixos e um suspiro ocasional ecoam pelo bosque. Uma figura segurando um arco anda de um lado para o outro, aparentemente frustrada com algo.\n\nPara ver melhor, me escondo atrás de uma árvore e dou uma espiada discreta. Vejo meu [child_with_bow.Custom('GetDaughterSon')] [child_with_bow.GetFirstName], cercado(a) por algumas flechas espalhadas no chão, mal alcançando o alvo que [child_with_bow.GetSheHe] estabeleceu. Parece que ele(a) poderia usar um pouco de orientação."
 hunt_events_anna.0015.a: ""Aqui, deixe-me mostrar...""
 hunt_events_anna.0015.a.flavor: "Como sou um[ROOT.Char.Custom('ES_XA')] caçador[ROOT.Char.Custom('ES_XA')] capaz, deveria poder usar minha própria experiência para lhe ensinar uma postura e precisão melhores."
 hunt_events_anna.0015.a.toast.good: "[child_with_bow.GetFirstNameNoTooltip] segue minhas instruções"
 hunt_events_anna.0015.a.toast.bad: "[child_with_bow.GetFirstNameNoTooltip] não entende minhas instruções"
 hunt_events_anna.0015.b: "Decido incentivá-lo(a) com palavras de apoio."
 hunt_events_anna.0015.c: "Deixe [child_with_bow.GetFirstNameNoTooltip] descobrir."
 hunt_events_anna.0015.c.toast: "[child_with_bow.GetFirstNameNoTooltip] encontra uma maneira de manejar o arco"
