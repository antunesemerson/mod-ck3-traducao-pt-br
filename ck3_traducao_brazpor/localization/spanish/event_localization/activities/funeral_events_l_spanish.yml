 body_to_bury_selection_info: "Selecione um recém-falecido para ser entregue ao além"
 activity_funeral_host_desc: "$BULLET_WITH_TAB$[opinion|E] [opinion_i]\n $BULLET_WITH_TAB$[stress_loss|E] [stress_loss_i]\n $BULLET_WITH_TAB$ Ganho de [piety|lE] [piety_i]\n $BULLET_WITH_TAB$ Ganho de [legitimacy|lE] [legitimacy_i]"
 activity_funeral_guest_desc: "$BULLET_WITH_TAB$ Os participantes podem aumentar a [opinion|lE] dos personagens presentes\n$BULLET_WITH_TAB$ Os participantes podem perder [stress_loss_i][stress|lE]"
 activity_funeral_conclusion_desc: "O [GetActivityType( 'activity_funeral' ).GetName|l] foi concluído"
 funeral_phase_wake: "[GetPlayer.Custom('WakeName')]"
 funeral_phase_wake_desc: "[GetPlayer.Custom('WakeDesc')]"
 funeral_phase_ceremony: "[GetPlayer.Custom('CeremonyName')]"
 funeral_phase_ceremony_desc: "[GetPlayer.Custom('CeremonyDesc')]"
 funeral_option_ceremony: "Cerimônia"
 funeral_ceremony_bad: "Cerimônia Humilde"
 funeral_ceremony_bad_desc: "$EFFECT_LIST_BULLET$ Ganho menor de [piety|lE]\n$EFFECT_LIST_BULLET$ Ganho menor de [legitimacy|lE]\n$EFFECT_LIST_BULLET$ Perda menor de [stress|lE]\n\n#weak A morte não é momento de ostentação e pompa, é uma ocasião para nos reunirmos e prestar nossos humildes respeitos.#!"
 funeral_ceremony_normal: "Cerimônias Dignas"
 funeral_ceremony_normal_desc: "$EFFECT_LIST_BULLET$ ganho de [piety|lE]
$EFFECT_LIST_BULLET$ ganho de [legitimacy|lE]
$EFFECT_LIST_BULLET$ perda de [stress|lE]

#weak A morte chegou a estes salões, e agora é hora de realizar uma cerimônia extravagante para a pessoa falecida.#!"
 funeral_ceremony_good: "Oferta de Libações"
 funeral_ceremony_good_desc: "$EFFECT_LIST_BULLET$ Grande ganho de [piety|lE]
$EFFECT_LIST_BULLET$ Grande ganho de [legitimacy|lE]
$EFFECT_LIST_BULLET$ Grande perda de [stress|lE]

#weak A morte chegou a uma grande pessoa do senhorio. Ela não merece tudo que podemos oferecer? Não pouparemos gastos na cerimônia fúnebre, e todos saberão da grande tragédia que atingiu nosso senhorio.#!"
 mourn_intent: "Vigília"
 mourn_intent_desc: "Este é o momento de vigiar o corpo do falecido, proporcionando uma oportunidade final de expressar pensamentos e sentimentos com o morto antes que seu corpo seja entregue ao além."
 wakename_offering_of_libations: "Banho do Corpo"
 wakedesc_offering_of_libations: "Os enlutados se reúnem para banhar o corpo do falecido e envolvê-lo completamente em linhos brancos."
 wakename_sky_burial: "Lamento Público"
 wakedesc_sky_burial: "O lamento público é um momento para liberar emoções; chorar, lamentar, lamentar ao redor do corpo do falecido antes que seja entregue à terra."
 wakename_mummification: "Enterro Celestial"
 wakedesc_mummification: "O corpo será entregue ao além nas barrigas das aves, para que o falecido possa alimentar o mundo como um dia os alimentou."
 wakename_wake: "Sepultamento"
 wakedesc_wake: "O corpo é entregue à terra e orações são compartilhadas entre os enlutados. Embora a alma eterna viva, o corpo é colocado em seu lugar de descanso final."
 wakename_bathing: "Cremação"
 wakedesc_bathing: "O corpo é queimado em uma grande pira funerária."
 ceremonyname_public_bewailment: "Enterramento"
 ceremonydesc_public_bewailment: "O corpo mumificado é colocado em uma tumba onde pode descansar."
 ceremonyname_sky_burial: "Cerimônia"
 ceremonydesc_sky_burial: "O corpo será entregue à vida após a morte em uma cerimônia tradicional e [Concept( 'pious', 'piadosa' )|E]."
 ceremonyname_ground_burial: "O custo de um funeral é afetado pelas [activity_options|lE] que você escolhe e pelas práticas funerárias [doctrine|lE] de sua [faith|lE]."
 ceremonydesc_ground_burial: "Um Grande Templo está presente aqui"
 ceremonyname_cremation: "Mumificação"
 ceremonydesc_cremation: "Cremação"
 ceremonyname_mummification: "Custo Base"
 ceremonydesc_mummification: "$unlocks_building_desc$ Aumenta o ganho de [legitimacy|lE] e [piety|lE] para as atividades de [GetActivityType('activity_funeral').GetName|l] [GetActivityType('activity_funeral').GetTextIcon] realizadas nesta [holding|lE]"
 ceremonyname_ceremony: "$unlocks_building_desc$ Aumenta muito a obtenção de [legitimacy|lE] e [piety|lE] para as atividades de [GetActivityType('activity_funeral').GetName|l] [GetActivityType('activity_funeral').GetTextIcon] realizadas nesta [holding|lE]"
 ceremonydesc_ceremony: "O corpo será entregue à vida após a morte em uma cerimônia tradicional e [Concept( 'pious', 'piadosa' )|E]."
 activity_funeral_predicted_cost: "Morte em um Funeral"
 funeral_cost_increase_great_temple: "Outra razão para estarmos enlutados caiu sobre nós neste dia, pois nosso anfitrião [host.GetName] ascendeu ao [host.GetFaith.PositiveAfterLife].\n\nEmbora isso encurte as cerimônias atuais, também indica que pode haver mais funerais a caminho mais cedo do que o esperado."
 funeral_cost_increase_mummification: "Que infelicidade."
 funeral_cost_discount_cremation: "[host.GetName] faleceu."
 funeral_activity_cost_desc: "Morte em um Funeral"
 building_funeral_effect_desc: "Outro motivo para luto se abateu sobre nós neste dia, já que [host.GetName] ascendeu a [host.GetFaith.PositiveAfterLife]. Como herdeir[ROOT.Char.Custom('ES_OA')] de [host.GetHerHis], as tarefas de anfitri[ROOT.Char.Custom('ES_OnOna')] passaram para mim.

Embora isso não signifique o fim de nossa humilde cerimônia, indica que pode haver outro funeral muito antes do esperado."
 building_funeral_wavel_effect_desc: "Farei o que for necessário."
 #Events
 funeral.0001.t: "Chegada"
 funeral.0001.desc: "[ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetBaronyNameExplicitly] será o local de descanso final de [deceased.GetFirstName], e eu"
 funeral.0001.a: "fico sozinho para reunir meus pensamentos e me preparar para a chegada dos honrados enlutados."
 funeral.0001.a.tt: "me recebe [host.Custom('ES_ElLa')] vil [host.Custom2('InsultNoun', ROOT.Char)|l] [host.Custom2('InsultAdjective', ROOT.Char)] de [host.GetName]. Embora eu deteste estar na companhia dele(a), na verdade vim aqui por [deceased.GetName]. Esta é minha oportunidade para"
 funeral.0002.t: "me recebe [host.Custom('ES_ElLa')] magnânim[host.Custom('ES_OA')] [host.GetName]. Além de poder desfrutar da sua boa companhia, também estou aqui por [deceased.GetName]. Esta será a última oportunidade de"
 funeral.0002.desc: "Outro motivo para luto se abateu sobre nós neste dia, já que [host.GetName] ascendeu a [host.GetFaith.PositiveAfterLife]. Como herdeir[ROOT.Char.Custom('ES_OA')] de [host.GetHerHis], as tarefas de anfitri[ROOT.Char.Custom('ES_OnOna')] passaram para mim.

Embora isso não signifique o fim de nossa humilde cerimônia, indica que pode haver outro funeral muito antes do esperado."
 funeral.0002.a: "\n\nAvisto [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetIntentTarget.GetTitledFirstName|l] entre os enlutados, totalmente alhe[ROOT.Char.GetIntentTarget.Custom('ES_OA')] ao meu plano para tentar [ROOT.Char.GetInvolvedActivityIntent.GetName|l] cujo alvo é [ROOT.Char.GetIntentTarget.GetSheHe]."
 funeral.0002.a.tt: "\n\nAinda não consigo encontrar [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetIntentTarget.GetTitledFirstName|l] em lugar nenhum. Estou ansioso para que ele chegue para que enfim meu plano de tentar [ROOT.Char.GetInvolvedActivityIntent.GetName|l] cujo objetivo é [ROOT.Char.GetIntentTarget.GetSheHe]."
 funeral.0010.t: "Um momento de celebração por minha contagem."
 funeral.0010.desc_intro: "Nunca esquecerei [deceased.GetHerHim]."
 funeral.0010.self: "Pó ao Pó"
 funeral.0010.dislikes_host: "Chegou a hora de realizar os últimos ritos de [deceased.GetName] antes de sua jornada final para o além.\n\n"
 funeral.0010.likes_host: "O corpo amortalhado de [deceased.GetFirstName] é mantido suspenso sobre uma cova aberta, cercado por amigos íntimos e familiares. À cabeceira está [host.LocalPlayerString( 'mi persona', host.GetName)] um lugar privilegiado de luto concedido apenas a um anfitrião magnânimo."
 funeral.0010.neutral: "O corpo de [deceased.GetFirstName] foi levado ao ponto mais alto de [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetBaronyNameExplicitly] em um cortejo de enlutados. Pouco antes do topo, o corpo é deixado exclusivamente para que [host.LocalPlayerString( 'yo', host.GetName)] o leve na etapa final da jornada."
 funeral.0010.disrespect: "O corpo perfeitamente preservado de [deceased.GetFirstName] fica exposto para todos verem. O maravilhoso trabalho dos embalsamadores praticamente faz com que pareça que ele poderia se levantar e andar novamente, e antes que o corpo seja sepultado de uma vez por todas, ele é deixado sozinho por um momento com [host.LocalPlayerString( 'mi persona', host.GetName)]."
 funeral.0010.respect: "[deceased.GetFirstName] jaz envolt[deceased.Custom('ES_OA')] em elegantes tecidos sobre uma imponente pira funerária. O [host.GetFaith.PriestNeuter] ergue-se ao lado de [host.LocalPlayerString( 'mim', host.GetName)] com uma tocha; suas chamas dançam ao vento."
 funeral.0010.intent_arrived: "\n\nFrente a frente com o corpo, vazio de vida, dou uma pequena risada para mim mesmo. Serei eu quem se encarregará de uma vez por todas de seus restos miseráveis."
 funeral.0010.intent: "\n\nMal consigo olhar para[deceased.GetHerHim] e, mesmo agora, ainda me custa acreditar que este seja realmente nosso último momento juntos."
 funeral.0010.a.bad: "

Contemplo [deceased.Custom('WifeHusband')] falecid[deceased.Custom('ES_OA')] pela última vez, e não consigo evitar imaginar todo o tempo que nos foi negado. Todos os netos que nunca criamos, todas as noites de romance que jamais compartilhamos."
 funeral.0010.a.good: "\n\nContemplo o corpo sem vida do meu [deceased.Custom('GetDaughterSon')] e lamento. [Select_CString( ROOT.Char.IsFemale, 'Ninguna', 'Ningún' )] [ROOT.Char.GetMotherFather] deveria viver para ver seus próprios filhos serem cruelmente ceifados."
 funeral.0100.t: "\n\nVer[deceased.GetHerHim] rodead[deceased.Custom('ES_OA')] de tanta gente compungida e recebendo um enterro [ROOT.Char.GetFaith.GetAdherentName] apropriado me dá esperanças de que talvez eu também seja lembrado com tanto carinho quanto [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 funeral.0100.desc.intro: "\n\nQue tragédia que alguém tão jovem tenha sua vida tirada diante dos meus olhos."
 funeral.0100.desc.intro2.burial: "

Só encontro consolo ao ver alguém tão idoso neste estado. Uma vida tão longa e brilhante é a inveja de muitos, e estar cercad[ROOT.Char.Custom('ES_OA')] de tantos rostos contritos é tudo a que qualquer [ROOT.Char.GetWomanMan] pode aspirar."
 funeral.0100.desc.intro2.sky_burial: "\n\nO rito final de seu corpo recai sobre mim, e o peso de tamanha responsabilidade pesa muito em minha mente."
 funeral.0100.desc.intro2.mummification: "Por fim, seu corpo é baixado à terra, e o funeral é oficialmente concluído com uma oração."
 funeral.0100.desc.intro2.cremation: "As incisões cerimoniais são feitas para auxiliar as aves necrófagas a acessarem a carne, e a cerimônia está completa por enquanto. Tudo o que resta é retornar em alguns dias para buscar os ossos."
 funeral.0100.desc.mid.hate: "Os restos mumificados são deixados para mim junto com alguns jarros de órgãos. O túmulo pode ser o lar de qualquer um deles, mas minha corte é tão adequada quanto qualquer outra."
 funeral.0100.desc.mid.love: "Baixo a tocha à lenha e observo enquanto a torre de madeira é acesa. Tudo o que resta agora é esperar que [deceased.GetFirstNameNoTooltip] se torne cinzas."
 funeral.0100.desc.mid.spouse: "

Contemplo [deceased.Custom('WifeHusband')] falecid[deceased.Custom('ES_OA')] pela última vez, e não consigo evitar imaginar todo o tempo que nos foi negado. Todos os netos que nunca criamos, todas as noites de romance que jamais compartilhamos."
 funeral.0100.desc.mid.child: "Tudo isso pertence ao túmulo."
 funeral.0100.desc.mid.predecessor: "$funeral.0100.t$"
 funeral.0100.desc.mid.young: "$funeral.0100.desc.intro$"
 funeral.0100.desc.mid.old: "

Só encontro consolo ao ver alguém tão idoso neste estado. Uma vida tão longa e brilhante é a inveja de muitos, e estar cercad[ROOT.Char.Custom('ES_OA')] de tantos rostos contritos é tudo a que qualquer [ROOT.Char.GetWomanMan] pode aspirar."
 funeral.0100.desc.mid.fallback: "$funeral.0100.desc.intro2.cremation$"
 funeral.0100.desc.outro.burial: "

Recitamos algumas preces tradicionais por [Select_CString( deceased.IsFemale, 'a falecida', 'o falecido' )] e, em seguida, baixam lentamente o corpo para sua sepultura, onde poderá descansar no paraíso por toda a eternidade."
 funeral.0100.desc.outro.sky_burial: "

São feitos os cortes tradicionais ao longo do corpo, e aves famintas já sobrevoam o local, prontas para consumir a carne. Agora só resta deixá-las trabalhar, e os [host.GetFaith.PriestNeuterPlural] voltarão em alguns dias para recolher os ossos."
 funeral.0100.desc.outro.mummification: "\n\nAgora [host.GetName] leva os restos juntamente com os órgãos em jarros para serem preservados pela eternidade."
 funeral.0100.desc.outro.cremation: "A tocha é abaixada até a lenha e observo enquanto a torre de madeira é acesa. Tudo o que resta agora é esperar que [deceased.GetFirstNameNoTooltip] seja transformado em cinzas."
 funeral.0100.a: "$funeral.0100.a$"
 funeral.0100.b: "Eu me lembro de [deceased.GetSheHe]"
 funeral.0100.c: "Em um canto silencioso da minha [host.GetFaith.HouseOfWorship] ouço por acaso [random_attendee.GetName] conversando com um grupo de enlutados. [random_attendee.GetSheHe|U] me faz um gesto sombrio para que eu me aproxime.\n\n\"Todos nós temos boas lembranças de [deceased.GetName], e eu estava falando sobre quando [attendee_memory.GetDescription]. Dizei-me, tendes alguma lembrança para compartilhar?\"."
 funeral.0100.d: "As lembranças são dolorosas demais."
 funeral.0101.t: "Ah, sim, claro, [deceased.GetHerHim] conhecia bem."
 funeral.0101.desc.intro: "Você se safar mentindo"
 funeral.0101.desc.intro2.burial: "Ninguém acredita em você"
 funeral.0101.desc.intro2.sky_burial: "Eu admito, não tenho nada."
 funeral.0101.desc.intro2.mummification: "Como poderia esquecer?"
 funeral.0101.desc.intro2.cremation: "Sua memória traz lágrimas"
 funeral.0101.desc.outro.burial: "

Recitamos algumas preces tradicionais por [Select_CString( deceased.IsFemale, 'a falecida', 'o falecido' )] e, em seguida, baixam lentamente o corpo para sua sepultura, onde poderá descansar no paraíso por toda a eternidade."
 funeral.0101.desc.outro.sky_burial: "

São feitos os cortes tradicionais ao longo do corpo, e aves famintas já sobrevoam o local, prontas para consumir a carne. Agora só resta deixá-las trabalhar, e os [host.GetFaith.PriestNeuterPlural] voltarão em alguns dias para recolher os ossos."
 funeral.0101.desc.outro.mummification: "[famed_grave_good.GetNameNoTooltip] será enterrado."
 funeral.0101.desc.outro.cremation: "Somente [illustrious_grave_good.GetNameNoTooltip] é digno."
 funeral.0101.a: "[ROOT.Char.GetFaith.HighGodName] me livre."
 funeral.1000.t: "[Select_CString( host.IsFemale, 'La falsa', 'El falso' )] [host.GetTitleAsNameNoTooltip|l]"
 funeral.1000.desc: "O cortejo fúnebre cerca [host.GetName], oferecendo seus respeitos e votos de melhoras [host.Custom('ES_AlAla')] supost[host.Custom('ES_OA')] "[host.GetTitleAsNameNoTooltip|l]". Nenhum deles me presta a mesma cortesia, apesar do meu status evidente.

Será que [deceased.GetName] realmente teria desejado que [host.GetFirstNameNoTooltip] fosse seu sucessor[host.Custom('ES_XA')]?"
 funeral.1000.a: "[deceased.GetFirstNameNoTooltip] teria querido que [host.GetHerHim] eu apoiasse."
 funeral.1000.b: "Todos devem conhecer minha verdadeira reivindicação!"
 funeral.1000.b.success: "Agora não é o momento."
 funeral.1000.b.failure: "$funeral.1020.t$"
 funeral.1000.c: "Contemplo [deceased.GetName] em silenciosa reflexão, interrompida apenas pelos ocasionais benfeitores que oferecem suas condolências.

"[ROOT.Char.Custom2('InsultNoun', SCOPE.sC('claimant'))|U]! [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('claimant'))|U]! [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('claimant'))|U]! Você ousa se chamar [ROOT.Char.GetTitleAsNameNoTooltip]?" [claimant.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me interpela, com o dedo enfurecido agitando-se a centímetros do meu rosto. "[deceased.GetNameNoTooltip|U] havia planejado que #EMP eu#! governasse em seu lugar! Vilã[ROOT.Char.Custom('ES_OA')]!""
 funeral.1000.d: "\"Saia daqui!\""
 funeral.1000.d.success: "Você foi removido do funeral"
 funeral.1000.d.failure: ""Não me importa"."
 funeral.1000.e: "Seu acesso de raiva foi ignorado"
 funeral.1010.t: "Se Demorar Uma Eternidade"
 funeral.1010.desc: "Tenho observado muitos visitantes em seu monótono vai e vem, cumprindo sua vazia obrigação. Um visitante, no entanto, jaz igualmente imóvel ao lado [Select_CString( deceased.IsFemale, 'da falecida', 'do falecido' )] [deceased.GetFirstName].

Permanece ali por horas, como se fosse ficar eternamente. É o fiel sabujo de minha [ROOT.Char.Custom2('RelationToMeShort', deceased)], que ganime e choraminga pel[Select_CString( deceased.IsFemale, 'a mulher', 'o homem' )] que [ROOT.Char.GetFaith.HighGodName] havia nomeado seu senhor. Jaz e espera; não faz nada além disso e, sem minha intervenção, pode seguir o corpo para o além."
 funeral.1010.a: "\"Venha então, esteja ao meu lado no luto.\""
 funeral.1010.b: "Você adota o cachorro de [deceased.GetFirstNameNoTooltip]."
 funeral.1010.c: ""Afaste-se de seu mestre imóvel!""
 funeral.1010.d: "Lamente o seu nariz, pois ele encontrará minha bota!"
 funeral.1010.e: "Incorruptível"
 funeral.1020.t: "O corpo do meu falecid[deceased.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', deceased)] está sem vida há dias, mas seus olhos ainda guardam vida, o olhar da divindade. [ROOT.Char.GetFaith.HighGodName] preserva o corpo dos estragos da podridão e da decomposição, como se [deceased.GetHerHim] estivesse em um sonho entre a vida e a morte.

A multidão clamorosa declarou que este corpo é incorruptível, escolhido para ascender a um [GetTrait('saint').GetName( deceased )|l]."
 funeral.1020.desc: "Um milagre diante dos meus olhos.". Nenhum deles me presta a mesma cortesia, apesar do meu status evidente.

Será que [deceased.GetName] realmente teria desejado que [host.GetFirstNameNoTooltip] fosse seu sucessor[host.Custom('ES_XA')]?"
 funeral.1020.c: "Sua defesa é ignorada"
 funeral.1020.a: "O mesmo acontecerá comigo, sem dúvida."
 funeral.1020.b: "Nosso Momento no Tempo"
 funeral.1021.t: "De todas as figuras veneradas e perversas, nenhuma foi mais desejada do que noss[deceased.Custom('ES_OA')] falecid[deceased.Custom('ES_OA')] [deceased.GetName]. Com uma multidão de pranteadores e curiosos buscando outros temas para satisfazer sua fascinação, por fim me resta um momento de alívio entre meu [ROOT.Char.Custom2('RelationToMeShort', deceased)] e eu."
 funeral.1021.desc: "Contemplo [deceased.GetName] em silenciosa reflexão, interrompida apenas pelos ocasionais benfeitores que oferecem suas condolências.

"Permitir-me-ei um momento de luto."
 funeral.1021.a: "Deixar tudo sair."
 funeral.1021.a.toast: "Prometo ser um [ROOT.Char.GetTitleAsNameNoTooltip|l] melhor."
 funeral.1021.b: "Estrela do Luto"
 funeral.1021.b.toast: "Todos os olhares se voltam para [other_mourner.GetName] quando cai ao chão em lamentação, com as mãos cobrindo os olhos avermelhados. Seus suspiros e soluços dolorosos deixaram os demais enlutados sem fôlego, e muitos lhe oferecem conforto e reverência como se fosse [other_mourner.GetSheHe] quem estivesse prestes a ser entregue ao além."
 funeral.1030.t: "Os olhos devem se voltar apenas para mim."
 funeral.1030.desc: "Tenho observado muitos visitantes em seu monótono vai e vem, cumprindo sua vazia obrigação. Um visitante, no entanto, jaz igualmente imóvel ao lado [Select_CString( deceased.IsFemale, 'da falecida', 'do falecido' )] [deceased.GetFirstName].

Permanece ali por horas, como se fosse ficar eternamente. É o fiel sabujo de minha [ROOT.Char.Custom2('RelationToMeShort', deceased)], que ganime e choraminga pel[Select_CString( deceased.IsFemale, 'a mulher', 'o homem' )] que [ROOT.Char.GetFaith.HighGodName] havia nomeado seu senhor. Jaz e espera; não faz nada além disso e, sem minha intervenção, pode seguir o corpo para o além."
 funeral.1030.a: "Ofereço conforto."
 funeral_1030_adopt_tt: "O que é a Morte?"
 funeral.1030.b: "Morte. Ao meu redor, fala-se de morte, [ROOT.Char.GetFaith.PositiveAfterLife] e [ROOT.Char.GetFaith.NegativeAfterLife]. Pensamentos sobre o rosto de [deceased.GetFirstName], sobre nunca mais vê-lo, perturbam minha mente; ainda assim, a morte e seu significado escapam ao meu entendimento como areia entre os dedos.

Este destino, cruel ou gentil, deixa até o mais estoico dos adultos encharcado de lágrimas, seja em silêncio ou em lamentos abertos. O que é, então? Talvez [other_mourner.GetName] me dê respostas simples."
 funeral.1030.c: "Por que todos estão tão tristes?"
 funeral.1040.t: "Devo apenas seguir o que os outros fazem..."
 funeral.1040.desc: "O corpo do meu falecid[deceased.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', deceased)] está sem vida há dias, mas seus olhos ainda guardam vida, o olhar da divindade. [ROOT.Char.GetFaith.HighGodName] preserva o corpo dos estragos da podridão e da decomposição, como se [deceased.GetHerHim] estivesse em um sonho entre a vida e a morte.

A multidão clamorosa declarou que este corpo é incorruptível, escolhido para ascender a um [GetTrait('saint').GetName( deceased )|l]."
 funeral.1040.a: "[other_mourner.GetFirstName] oferece conforto a você."
 funeral.1040.b: ""Agora está em [ROOT.Char.GetFaith.PositiveAfterLife]"."
 funeral.1040.b.success: "\"[deceased.GetSheHe|U] continua em sua jornada de reencarnação.\""
 funeral.1040.b.failure: ""Agora retornou ao universo"."
 funeral.1040.c: "[Select_CString( confused_child.IsFemale, 'A menina', 'O menino' )] se sente reconfortado[confused_child.Custom('ES_OA')]"
 funeral.1050.t: "Você é confortado pelos pensamentos do além"
 funeral.1050.desc: "[Select_CString( confused_child.IsFemale, 'La niña', 'El niño' )] fica traumatizad[confused_child.Custom('ES_OA')]"
 funeral.1050.witch: "Você percebe sua própria mortalidade"
 funeral.1050.a: "O Luto d [other_mourner.Custom2('RelationToMeShort', deceased)]"
 funeral.1050.b: "Curvad[other_mourner.Custom('ES_OA')] ao meu lado, despojad[other_mourner.Custom('ES_OA')] de toda pretensão de decoro, [other_mourner.Custom('ES_ElLa')] inconsolável [other_mourner.GetFirstName] contempla o vazio diante de [other_mourner.GetHerHim]. Nem uma lágrima cai de seus olhos, nem uma palavra sai de sua boca, até que se volta para mim.

"[other_mourner.GetFaith.HighGodName|U] pode ser realmente cruel. Por que o vento ainda sopra? Por que o mar continua a avançar até a praia? Por que meu corpo dói pedindo comida e sente sede de água? [other_mourner.Custom('apocalypse_name')|U] está sobre nós; meu [other_mourner.Custom2('RelationToMeShort',deceased)] está morto.""
 funeral.1050.c: "\"Meus sentimentos exatamente.\""
 funeral.1050.d: ""Vamos, lembrem-se. Não devemos permitir que a tristeza nos domine"."
 funeral.1060.t: ""Enquanto há vida, sempre há esperança"."
 funeral.1060.desc: "[other_mourner.GetSheHe|U] se sente consolad[other_mourner.Custom('ES_OA')]"
 funeral.1060.a: "[other_mourner.GetSheHe|U] está insultad[other_mourner.Custom('ES_OA')]"
 funeral.1060.a.success: "Acene silenciosamente."
 funeral.1060.a.failure: "A última oportunidade"
 funeral.1060.b: "A fila enlutada avança. A fila para ter um último momento com [deceased.GetName]. Um último sussurro, um último e longo adeus, um último nada no último lugar onde ninguém voltará a ver[deceased.GetHerHim]. Na verdade, é um privilégio estar aqui.\n\nA fila me aproxima cada vez mais até que, por fim, a figura à minha frente se afasta e não há nada além de um véu entre [deceased.GetSheHe] e eu."
 funeral.1060.c: "Todos ouvirão meu lamento."
 funeral.1070.t: "Uma reverência silenciosa, e eu me afasto."
 funeral.1070.desc: "Morte. Ao meu redor, fala-se de morte, [ROOT.Char.GetFaith.PositiveAfterLife] e [ROOT.Char.GetFaith.NegativeAfterLife]. Pensamentos sobre o rosto de [deceased.GetFirstName], sobre nunca mais vê-lo, perturbam minha mente; ainda assim, a morte e seu significado escapam ao meu entendimento como areia entre os dedos.

Este destino, cruel ou gentil, deixa até o mais estoico dos adultos encharcado de lágrimas, seja em silêncio ou em lamentos abertos. O que é, então? Talvez [other_mourner.GetName] me dê respostas simples."
 funeral.1070.a: "Você se fez de bobo"
 funeral.1070.b: "Falar de suas virtudes."
 funeral.1071.t: "Um[deceased.Custom('ES_OA')] de [deceased.Custom('ES_LoLa')] s grandes"
 funeral.1071.desc: "Diante de mim, uma mesa de banquete abarrotada de todo tipo de comida e bebida, como se [deceased.GetName] tentasse oferecer um último ato de magnanimidade antes de partir.\n\nNo entanto, até agora [other_mourner.GetName] se recusou a tocar sequer neste banquete, girando sua taça em busca de consolo ocioso. Seu olhar distante e cansado recai sobre mim, e com um aceno silencioso de cabeça, ergue sua bebida bem alto.\n\n\"Ao [deceased.GetNameNoTooltip], realmente um[deceased.Custom('ES_OA')] dos [deceased.Custom('ES_LoLa')] grandes.\""
 funeral.1071.a: ""Foi certamente grandioso, e eu o serei ainda mais.""
 funeral.1071.a.tt: "A multidão é comovida"
 funeral.1071.b: "Seu comentário causa grande ofensa"
 funeral.1071.b.reincarnation: "\"Para [deceased.GetNameNoTooltip]!\""
 funeral.1071.b.taoism: "\"Nos diga o que [deceased.GetSheHe] realmente significava para você.\""
 funeral.1071.a.success: "Faça uma oração silenciosa."
 funeral.1071.a.success.child: "Um momento para o luto."
 funeral.1071.a.failure: "As sombras dos enlutados não pairam mais sobre mim e, finalmente, me é concedido um momento sozinho. Que conforto silencioso eu poderia encontrar em tal momento, sem o tilintar e tagarelice dos outros convidados em meus ouvidos. Apenas eu e meus pensamentos sobre [deceased.GetName]."
 funeral.1071.a.failure.child: "Isso parece... bom."
 funeral.1080.t: "A Oferta de Libações"
 funeral.1080.desc: "Curvad[other_mourner.Custom('ES_OA')] ao meu lado, despojad[other_mourner.Custom('ES_OA')] de toda pretensão de decoro, [other_mourner.Custom('ES_ElLa')] inconsolável [other_mourner.GetFirstName] contempla o vazio diante de [other_mourner.GetHerHim]. Nem uma lágrima cai de seus olhos, nem uma palavra sai de sua boca, até que se volta para mim.

"Junte-se à oferta."
 funeral.1080.a: "Uma rodada de bebidas para todos!"
 funeral.1080.b: "Vou lembrar [deceased.GetHerHim|U] do meu jeito."
 funeral.1080.c: "Um Momento para Lamentar"
 funeral.1080.c.success: "Os enlutados movem-se pelo salão chorando em uma espécie de dança macabra, tudo para [deceased.GetName]."
 funeral.1080.c.failure: "O quarto está denso com os lamentos dos enlutados em uma cacofonia de miséria, e eu me sento no meio de tudo isso, meus ouvidos zunindo e minha alma doendo."
 funeral.1080.d: "O silêncio inquietante de um povo contendo o que desesperadamente desejam fazer. Gritos silenciosos nunca a escapar de seus lábios, batalhas árduas contra lágrimas sendo perdidas, tão envergonhados de seu próprio luto."
 funeral.1090.t: "\n\nEu me levanto e permito-me perder-me na dança com meus colegas enlutados."
 funeral.1090.desc: "Quero que o mundo saiba como é sentir isso."
 funeral.1090.a: "Devo permanecer forte."
 funeral.1090.b: "Juntos ou Não Mais"
 funeral.1090.c: "Faço uma pausa no luto em meio a todas as almas que vêm prestar homenagens a [deceased.GetName]. Além do alvoroço fúnebre, ouço um lamento sobrenatural ecoando no vazio dos corredores.\n\nNa origem dele, encontro [soulmate.GetName] sozinho em uma sala escurecida; seu choro logo se cala enquanto ele me olha com olhos frios. Em sua mão há uma terrível garrafa sem marcas.\n\n\"Não tardará até o dia do nosso casamento.\""
 funeral.1090.d: "\"Isso é realmente o que [deceased.GetSheHe] teria querido?\""
 funeral.1090.d.success: "Salvaste a vida de [soulmate.GetNameNoTooltip]"
 funeral.1090.d.failure: "Você não conseguiu salvar a vida de [soulmate.GetNameNoTooltip]"
 funeral.1090.e: "Quebre a garrafa."
 funeral.1100.t: "Feche silenciosamente a porta."
 funeral.1100.desc: "Cerimônia de Sepultamento"
 funeral.1100.a: "O falecido foi conduzido ao além e o funeral foi concluído."
 funeral.1100.a.success: "[other_mourner.GetName] lhe dará alguns conselhos..."
 funeral.1100.a.failure: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'congeniasteis', 'congeniaron')] pela perda compartilhada de um ente querido"
