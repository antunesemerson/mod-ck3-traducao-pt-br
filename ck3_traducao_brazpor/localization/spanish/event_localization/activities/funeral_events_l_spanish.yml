l_spanish:
 activity_funeral: "Funeral"
 activity_funeral_desc: "Reúna o reino em prantos para um $activity_funeral$, uma chance de prestar uma homenagem adequada a um membro venerado da nobreza."
 activity_funeral_province_desc: "Você realiza um Funeral em [ROOT.Province.GetName]\nProvíncias com uma alta pontuação fornecem [piety_i][piety|lE] aumentado, perda de [stress_loss_i][stress|lE], e ganho de [legitimacy|lE]\n"
 activity_funeral_guest_help_text: "Todo [activity_guest|lE] que tiver recebido um convite terá a oportunidade de aumentar sua [opinion|lE] sobre você.\nOs funerais também são uma oportunidade para se libertar de seus fardos emocionais, perder um pouco de [stress|lE] e ganhar [piety|lE]."
 activity_funeral_selection_tooltip: "Realizar um funeral para sepultar um familiar falecido\n\nRecompensas previstas:\n$BULLET_WITH_TAB$[opinion|E] [opinion_i]\n$BULLET_WITH_TAB$ Ganho de [legitimacy|lE] [legitimacy_i]\n$BULLET_WITH_TAB$[stress_loss|E] [stress_loss_i]\n$BULLET_WITH_TAB$ Ganho de [piety|lE] [piety_i]"
 activity_funeral_destination_selection: "O corpo deve ser enterrado em algum lugar dentro de seu próprio reino. Locais sagrados e edifícios religiosos melhorarão a qualidade do serviço."
 activity_funeral_major_religious_building: "#P +++ Edifício Religioso Principal#!\n"
 activity_funeral_tos: "#P ++ $building_type_tower_of_silence_01$#!\n"
 activity_funeral_wavel: "#P ++ $building_type_wawel_cathedral_01$#!\n"
 activity_funeral_holy_site: "#P ++ Local Sagrado#!\n"
 activity_funeral_mountain: "#P ++ Montanhoso#!\n"
 activity_funeral_temple: "#P ++ Templo#!\n"
 activity_window_character_body: "$body_to_bury_for_host$"
 deceased_selection_widget_header: "Selecione o corpo para enterrar"
 has_someone_to_bury_tt: "Você deve ter tido um luto recente"
 has_someone_selected_to_bury: "Você não selecionou um corpo para enterrar"
 body_to_bury_for_host: "Falecido"
 body_to_bury_desc_for_host: "O corpo que será entregue ao além"
