 funeral.1110.a: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'insultaste', 'insultou' )] violentamente [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] durante um funeral"
 funeral.1120.t: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'insultaste', 'insultou' )] violentamente [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] durante um funeral"
 funeral.1120.desc: "Eu e os outros enlutados fazemos uma pausa em nossa dor para desfrutar de uma grande fartura de comida. [other_mourner.GetName|U], que costuma ser a alma de qualquer banquete, agora se senta diante de mim, com os olhos marejados e uma taça intocada ao lado.

"[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'proclamaste', 'proclamou' )] publicamente uma reivindicação sobre o título de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu título', TARGET_CHARACTER.GetShortUIName )] durante um funeral"

Os convidados parecem concordar; há sabedoria no lamento rude de [other_mourner.GetFirstNameNoTooltip]."
