l_spanish:
 ##################################################
 ##Misc
 feasts_mischievous_t1_modifier: "Sorriso Travesso"
 feasts_mischievous_t1_modifier_desc: "Esse personagem parece estranhamente calmo quando aqueles ao seu redor têm acidentes inesperados e embaraçosos."
 feasts_mischievous_t2_modifier: "Criador de Confusão"
 feasts_mischievous_t2_modifier_desc: "Pequenos acidentes e descobertas embaraçosas ocorrem regularmente perto desse personagem."
 feasts_mischievous_t3_modifier: "Arruaceiro"
 feasts_mischievous_t3_modifier_desc: "Não pode ser comprovado, mas é um segredo aberto que esse personagem está constantemente planejando sua próxima \"brincadeira\"."
 feast_learnt_habits_modifier: "Hábitos Observados"
 feast_learnt_habits_modifier_desc: "Os hábitos pessoais do alvo quando está sozinho são conhecidos pelos conspiradores."
 feast_learnt_habits_modifier.tt: "$feast_learnt_habits_modifier$: $VALUE|+0=-+$"
 didnt_knock_hat_off_modifier: "Cegados pela Luz"
 didnt_knock_hat_off_modifier_desc: "O glamour do alvo será sua ruína!\n[success_chance|E] da [scheme|lE] de [GetScheme('slander').GetTypeName|l] #P +20#!"
 didnt_knock_hat_off_modifier.tt: "$didnt_knock_hat_off_modifier$: $VALUE|+0=-+$"
 ##################################################
 ##Murder
 feast_events_ewan.0001.t: "Limpe Sua Mente"
 feast_events_ewan.0001.desc.intro: "Rara é a pessoa que consegue passar um banquete inteiro sem precisar de ao menos um pouco de tempo lá fora, longe da agitação, ainda que apenas para se aliviar.\n\nPor sorte minha, [intent_target.Custom('ES_ElLa')] [intent_target.GetTitledFirstName|l] não é exceção. De uma alcova próxima, observo como"
 feast_events_ewan.0001.desc.high_place: "olha pela janela desta torre alta e solitária. Claramente admirando uma vista para morrer — um empurrão bom e firme e todos os meus problemas estão resolvidos. Até parecerá um acidente."
 feast_events_ewan.0001.desc.water: "perambula pela margem de [activity.GetHost.Custom('IndefiniteBodyOfWater')] perto dos muros. Com a soqueira na mão, só preciso acertar[intent_target.GetHerHim] com força suficiente para que fique atordoad[intent_target.Custom('ES_OA')]; a água cuidará do resto, e até vai parecer um acidente."
 feast_events_ewan.0001.desc.critter: "perambula pelos caminhos do p?tio. Seguro em minha m?o (espero que bem contido) est? um(a) [SCOPE.Custom('VenomousCreature')] venenoso. Feroz e mortal, s? preciso lan??-lo em um peda?o de pele exposta para que fa?a seu trabalho perverso."
 feast_events_ewan.0001.desc.rock: "passeia pelas decorações do pátio. A pedra em minha mão tem um peso considerável, além de uma ponta afiada e maléfica — um bom e certeiro golpe na cabeça deverá ser suficiente para realizar o ato sombrio."
 feast_events_ewan.0001.desc.outro: "\n\nTenho o elemento surpresa, então se o plano der errado, escapar a tempo não deverá ser um problema. Infelizmente, provavelmente não será preciso muita pergunta para que [intent_target.GetFirstNameNoTooltip] note minha ausência suspeita."
 feast_events_ewan.0001.a: "Certo, um empurrão firme e..."
 feast_events_ewan.0001.a.tt.success: "Lá vai!"
 feast_events_ewan.0001.a.tt.failure: "[intent_target.GetFirstNameNoTooltip] se desvia"
 feast_events_ewan.0001.b: "Um golpe sólido, um empurrão firme, e..."
 feast_events_ewan.0001.b.tt.success: "Atordoado[intent_target.Custom('ES_OA')], [intent_target.GetFirstNameNoTooltip] afunda sob a água"
 feast_events_ewan.0001.b.tt.failure: "[intent_target.GetSheHe|U] tropeça, mas ainda está consciente"
 feast_events_ewan.0001.c: "El lanzamiento debe tener la fuerza #EMP justa#!…"
 feast_events_ewan.0001.c.tt.success: "O(a) [SCOPE.Custom('VenomousCreature')] ataca"
 feast_events_ewan.0001.c.tt.failure: "A criatura rebate e foge"
 feast_events_ewan.0001.d: "Muito bem, preciso acertar[intent_target.GetHerHim] bem no meio da cabeça…"
 feast_events_ewan.0001.d.tt.success: "Você o alcança no templo"
 feast_events_ewan.0001.d.tt.failure: "Você erra"
 feast_events_ewan.0001.e: "Talvez seja melhor observar?"
 feast_events_ewan.0001.e.tt.bonus_to_murder_scheme.overwrite: "Isso vai sobrescrever o seu potencial bônus para [GetScheme('murder').GetTypeName|l] de [ROOT.Char.Var('feast_events_ewan_0001_bonus_value').GetTitledFirstName|l]"
 feast_events_ewan.0001.e.tt.bonus_to_murder_scheme: "Você receberá um #P [EmptyScope.ScriptValue('feast_events_ewan_0001_murder_scheme_bonus_added_base_success_value')|=+0] %#! de chance de sucesso para qualquer [scheme|lE] de [GetScheme('murder').GetTypeName|l] que você iniciar contra [intent_target.Custom('ES_ElLa')] [intent_target.GetTitledFirstName|l] nos próximos [EmptyScope.ScriptValue('feast_events_ewan_0001_murder_scheme_bonus_time_to_use_value')|0] anos"
 feast_events_ewan.0001.f: "Isso foi uma ideia tola."
 ##################################################
 ##Seduce
 feast_events_ewan.0201.t: "Jantar e um Espetáculo"
 feast_events_ewan.0201.desc.intro: "Sentar-me em frente a [intent_target.Custom2('MyCharacterIntroduction', ROOT.Char)] me proporciona um verdadeiro tesouro de maneiras de zombar de [intent_target.GetSheHe] sem quebrar as regras do decoro.\n\n"
 feast_events_ewan.0201.desc.meat.dramatic_snap: "\"... é claro, tudo se resume a ser\", eu quebro habilmente o pequeno osso de [activity.GetHost.Custom('RegionalEdibleAnimal')] que estou segurando em dois pedaços, \"#EMP firmes#!. Concorda?"
 feast_events_ewan.0201.desc.meat.sink_teeth: "Lentamente, de propósito, deixo meus dentes afundarem na carne de um #EMP delicioso#! pedaço de [activity.GetHost.Custom('RegionalEdibleMeat')], arrancando a carne com gentileza, mas firmeza."
 feast_events_ewan.0201.desc.meat.lick: "Com um lampejo vigoroso, porém langoroso, recolho uma generosa porção do molho que cobre minha porção de [activity.GetHost.Custom('RegionalEdibleAnimal')]. Mantemos contato visual durante todo o tempo."
 #Weird phrasing to write around a/an because I'm not making a damned Article_RegionalRootVegetablePlural custom loc.
 feast_events_ewan.0201.desc.veggie.suggestive_gesture: "Lentamente, provocativamente, deslizo meu dedo ao redor da curva de um par de [activity.GetHost.Custom('RegionalRootVegetablePlural')], provocando suavemente os legumes com meu toque macio. Na ponta deles, arrasto a mais leve sugestão de unha pela superfície, deixando um arranhão quase imperceptível."
 feast_events_ewan.0201.desc.veggie.sink_teeth: "Com entusiasmo, mordo com firmeza em um enorme e suculento #EMP firme#! [activity.GetHost.Custom('RegionalRootVegetable')], deixando um pouco de líquido escorrer e pingar em meu queixo. Satisfeito, minha língua sai e lambe meus lábios, os deixando limpos."
 feast_events_ewan.0201.desc.veggie.deep_bite: "Com estilo dramático, minha mão erguida deixa cair um pequeno pedaço de [activity.GetHost.Custom('RegionalRootVegetable')] na minha boca, e eu engulo com #EMP audível#! satisfação. Meus olhos até rolam um pouco para trás, para adicionar um toque picante."
 feast_events_ewan.0201.desc.outro: "\n\nVejo em seu rosto que [intent_target.GetFirstNameNoTooltip] captou a mensagem. O que não consigo distinguir é sua expressão: é interesse lascivo ou o estômago revirado? É preocupantemente difícil dizer."
 feast_events_ewan.0201.a: "Talvez apenas mais uma mordida, para deixar a mensagem clara."
 feast_events_ewan.0201.a.tt.success: "Bem, [ROOT.Char.GetFirstNameNoTooltip]..."
 feast_events_ewan.0201.a.tt.failure: "O que #EMP você está#! fazendo?"
 feast_events_ewan.0201.b: "Isso não está funcionando. Talvez prefira uma conversa honesta?"
 feast_events_ewan.0201.b.tt.success: "Sua conversa se mostra mais interessante"
 feast_events_ewan.0201.b.tt.failure: "Por [intent_target.GetFaith.KnowledgeGodName], você é entediante!"
 feast_events_ewan.0201.c: "Isso está menos... ardente do que eu esperava..."
 ##################################################
 ##Befriend
 feast_events_ewan.0401.t: "Rugido no Estômago"
 feast_events_ewan.0401.desc.intro: "Levou-me grande parte da noite para me aproximar de [intent_target.Custom('ES_AlAla')] [intent_target.GetTitledFirstName|l] sem que parecesse forçado. Afinal, as melhores amizades são naturais, e quero que ele(a) pense que isso é espontâneo.\n\n"
 feast_events_ewan.0401.desc.target_personality.flamboyant: "\"Por [intent_target.GetFaith.WealthGodName]!\", exalta meu possível amig[intent_target.Custom('ES_OA')], disfarçando com dificuldade um arroto, \"isso foi um prato #EMP pesado#!. E tão pouco tempo depois do último igualmente pesado! Simplesmente pesa demais no estômago. Eu simplesmente não consigo acreditar que os servos esperem continuar servindo sua [activity.GetHost.Custom('MistressMaster')] com um trabalho tão ruim\"."
 feast_events_ewan.0401.desc.target_personality.sedate: "[intent_target.Custom('ES_ElLa')|U] [intent_target.GetTitledFirstName|l] picotea la comida, empujando unos pequeños bocados alrededor de un plato de madera grasienta.\n\nTodo es un poco… pesado, ¿verdad? Este plato, el anterior, el que iba antes de #EMP ese#!, y, mira nervios[intent_target.Custom('ES_OA')] a un sirviente que trae la siguiente ronda de platos, el siguiente también. Demasiada comida rica, toda seguida, cuando lo que realmente necesitamos es algún sorbete refrescante e innovador."
 feast_events_ewan.0401.desc.target_personality.fallback: "[intent_target.Custom('ES_ElLa')|U] [intent_target.GetTitledFirstName|l] limpa suavemente os cantos da boca com um canto da toalha de mesa suja, afastando as migalhas do folhado.\n\n\"Só espero que o próximo prato seja um pouco mais leve\", opina, \"o objetivo de um banquete é proporcionar uma experiência culinária rica e variada, e, até agora, isso pareceu mais uma tentativa de nos empanturrar do que de nos empolgar\"."
 feast_events_ewan.0401.a: "Sim, infelizmente foi apenas uma escolha ruim, acho."
 feast_events_ewan.0401.a.tt.success: "[intent_target.GetHerHim|U] encantas completamente"
 feast_events_ewan.0401.a.tt.partial_success: "[intent_target.GetSheHe] gostaria de conversar mais"
 feast_events_ewan.0401.a.tt.failure: "Você é divertid[GetPlayer.Custom('ES_OA')] , mas não tanto"
 feast_events_ewan.0401.b: "\"Você... #EMP percebe#! que este é o meu banquete, certo?\""
 feast_events_ewan.0401.c: "\"Cante em alto e bom som os elogios da refeição.\""
 feast_events_ewan.0401.d: "Mude de assunto para algo menos controverso."
 ##################################################
 ##Mischief
 feast_events_ewan.0601.t: "Uma Brincadeira Inocente"
 feast_events_ewan.0601.desc.intro: "A cozinha é, na minha opinião, sempre o melhor lugar para fazer uma pequena #EMP travesura#!. Pelo menos, desde que a equipe não nos pegue.\n\nTantos alvos potenciais, tão pouco tempo: mexo na bandeja de [activity.GetHost.Custom('GetExpensiveDrink')], no elaborado prato principal central ou na mesinha dos petiscos entre os pratos?\n\nSeja o que for que eu escolher, tenho o item perfeito preparado para estragar a noite de alguém:"
 #This next one's for you, dear James.
 feast_events_ewan.0601.desc.dead_rat: "um rato morto especialmente fedorento, prestes a explodir."
 feast_events_ewan.0601.desc.humongous_beetle: "um besouro gigantesco, atualmente exausto. Deve estar ativo e se contorcendo depois de ter um bom descanso, no entanto."
 feast_events_ewan.0601.desc.raw_eyeball: "um único, enorme, olho cru."
 feast_events_ewan.0601.desc.used_sponge: "uma esponja que foi muito... distintamente #EMP usada#!."
 feast_events_ewan.0601.desc.rotten_vegetable: "um [activity.GetHost.Custom('RegionalRootVegetable')] fedorento, tão mofado que estou francamente chocado por ter conseguido escondê-lo."
 feast_events_ewan.0601.desc.dodgy_mushroom: "um cogumelo de que estou absolutamente certo de que fará qualquer um correr para o toalete.[GetPlayer.Custom('ES_OA')] que fará qualquer um correr para o toalete. Provavelmente pelo resto da noite."
 feast_events_ewan.0601.desc.hank_of_hair: "um pequeno tufo de pelo de um dos animais do pátio. Não é pelo da cabeça."
 feast_events_ewan.0601.a: "Suje as bebidas."
 feast_events_ewan.0601.a.tt.success: "Você entra e sai como um sussurro de demônio"
 feast_events_ewan.0601.a.tt.failure: "Você não tem a habilidade para ser furtivo"
 feast_events_ewan.0601.b: "Estrague o prato sofisticado."
 feast_events_ewan.0601.b.tt.success: "$feast_events_ewan.0601.a.tt.success$"
 feast_events_ewan.0601.b.tt.failure: "$feast_events_ewan.0601.a.tt.failure$"
 feast_events_ewan.0601.c: "Arruine o acompanhamento."
 feast_events_ewan.0601.c.tt.success: "$feast_events_ewan.0601.a.tt.success$"
 feast_events_ewan.0601.c.tt.failure: "$feast_events_ewan.0601.a.tt.failure$"
 feast_events_ewan.0601.d: "Isso está abaixo de mim."
 ##################################################
 ##Relax
 feast_events_ewan.0801.t: "Uma Atmosfera Agradável"
 feast_events_ewan.0801.desc.intro: "Ahhh, há algo mais alegre do que um bom banquete?\n\nOs convidados circulam para lá e para cá, comendo e conversando enquanto a luz tremeluzente das tochas reflete em todas as paredes, a luz ressoando como risadas por todo o salão."
 feast_events_ewan.0801.desc.lustful: "Tantas deliciosas... #EMP iguarias#! para [ROOT.Char.Custom('SenseObserve_EyeTaste')], tantas oportunidades para olhares furtivos, até mesmo um encontro ilícito.\n\nTalvez dois."
 feast_events_ewan.0801.desc.chaste: "É bom ver tanta gente se divertindo sem recorrer aos prazeres da carne."
 feast_events_ewan.0801.desc.gluttonous: "E a comida! Ah, a comida... por [ROOT.Char.GetFaith.HealthGodName], eu #EMP amo#! uma boa refeição farta. Ou cinco."
 feast_events_ewan.0801.desc.temperate: "\n\nÉ claro, não sou muito fã dos pratos elaborados, mas posso aproveitar a boa companhia e o bom humor enquanto belisco meu pedaço de pão."
 feast_events_ewan.0801.desc.greedy: "\n\nNum banquete, todos estão um pouco gananciosos por algo — francamente, é relaxante ver o mundo ser tão #EMP honesto#! por uma mudança."
 feast_events_ewan.0801.desc.generous: "\n\nHá algo tão simplesmente agradável no ato de alimentar os outros, de todos partilharem o pão e as taças na mesma sala."
 feast_events_ewan.0801.desc.lazy: "E eu? Não preciso mexer um músculo. As pessoas, a comida, a bebida, as almofadas, os criados, todos vêm até mim sem que eu precise mover um dedo. #EMP Perfeição#!."
 feast_events_ewan.0801.desc.diligent: "Coordenar tanta gente e criados é uma tarefa subvalorizada, com uma dificuldade sutil, e é prazeroso ver tudo ser feito com competência."
 feast_events_ewan.0801.desc.wrathful: "#EMP Puede#! que às vezes eu possa ser um pouco propenso[ROOT.Char.Custom('ES_OA')] à apoplexia. Mas aqui, agora, estou calmo, talvez até sedado[ROOT.Char.Custom('ES_OA')].\n\nA mudança de ritmo é agradável."
 feast_events_ewan.0801.desc.calm: "\n\nAlgumas pessoas pensam que um banquete é um lugar agitado, mas para mim, eles são um refúgio de calma e acordo social. Todos ficam mais relaxados com o estômago cheio e uma taça cheia, afinal."
 feast_events_ewan.0801.desc.patient: "\n\nAté aprecio as esperas entre os pratos — não são apenas oportunidades para rir e conversar, mas também para refletir sobre o prato que foi comido e o pensamento que foi colocado nele."
 feast_events_ewan.0801.desc.impatient: "\n\nUm banquete sólido é um dos poucos ambientes onde raramente você precisa esperar por algo. Quer comida? Está ali. Precisa de uma bebida? Eles vão servir. Quer bater um papo? Boa companhia está por toda parte. Uma delícia."
 feast_events_ewan.0801.desc.arrogant: "\n\nFaz bem para mim misturar-me com alguns dos meus inferiores assim, meus [ROOT.Char.Custom('FootFeet')] apoiados em um banco, espalhando minha bondade entre as massas de nobres mesquinhos."
 feast_events_ewan.0801.desc.humble: "Tanta gente, vinda de todos os cantos do reino, só para estar aqui. Isso realmente dá uma perspectiva de quão vasto é o mundo."
 feast_events_ewan.0801.desc.deceitful: "\n\nJá iniciei alguns rumores entre a multidão, apenas por diversão. Acho bastante divertido ver como uma mentira pode se espalhar rapidamente, mesmo sem qualquer motivo além de causar um pouco de caos."
 feast_events_ewan.0801.desc.honest: "Há poucas expressões mais verdadeiras da experiência mortal do que esta. Tão desprotegida, tão honesta — apenas pessoas desfrutando da companhia de outras pessoas."
 feast_events_ewan.0801.desc.craven: "Há algo muito reconfortante em estar rodead[GetPlayer.Custom('ES_OA')] de tanta gente, como se nada pudesse dar errado.\n\nProvavelmente."
 feast_events_ewan.0801.desc.brave: "Somos um grupo heterogêneo, é verdade, mas aqui e agora sinto que essa festa poderia enfrentar o mundo e vencer."
 feast_events_ewan.0801.desc.shy: "Estou felizmente acomodado em um assento de canto, conversando com algumas pessoas interessantes.\n\nÉ bom ter, por uma vez, a chance de ser sociável sem me sentir sobrecarregado[GetPlayer.Custom('ES_OA')]."
 feast_events_ewan.0801.desc.gregarious: "\n\nÉ uma pena que não pudéssemos ter mais convidados, mais uma mesa ou algo assim, mas nem todo mundo está no clima da festa. Talvez nem todo mundo, mas #EMP yo#! sim. E eu valho por uma ou duas mesas sozinho[GetPlayer.Custom('ES_OA')]!"
 feast_events_ewan.0801.desc.ambitious: "Tanta oportunidade para conversar, conhecer, discutir, planejar. Cada nova conversa é a semente de uma nova meta, cada prato uma desculpa para adicionar outro contato."
 feast_events_ewan.0801.desc.content: "Não consigo pensar em absolutamente nada que eu mudaria. Está tudo simplesmente... perfeito."
 feast_events_ewan.0801.desc.arbitrary: "\n\nÉ claro, nem tudo está exatamente como eu gostaria, mas essa é a natureza desses encontros. Da próxima vez as coisas serão diferentes, e o tempero da mudança dá algo a esperar."
 feast_events_ewan.0801.desc.just: "\n\nSempre achei a ordem natural de um banquete encantadora de se contemplar. Mesas arrumadas com cuidado, hierarquias sociais silenciosamente impostas, todos felizes e rindo e em seu devido lugar. Exatamente onde deveriam estar."
 feast_events_ewan.0801.desc.cynical: "? claro, a maioria deles est? aqui apenas para comer e beber ? custa de outra pessoa, mas quem sou eu para julgar? Mal posso culp?-los por essa escolha, e a comida ? #EMP deliciosa#!."
 feast_events_ewan.0801.desc.zealous: "\n\nMurmuro rapidamente uma devoção a [ROOT.Char.GetFaith.HealthGodName], agradecendo pelo próximo prato maravilhoso que está a caminho. Verdadeiramente, esta Criação de [ROOT.Char.GetFaith.CreatorName] está cheia de maravilhas, e a boa comida certamente não é o menor milagre oferecido."
 feast_events_ewan.0801.desc.paranoid: "\n\nEstou constantemente alerta para qualquer sinal de perigo, intencional ou acidental, planejado ou improvisado. Há exatamente o suficiente para atender às minhas expectativas — não tanto a ponto de uma conspiração ser óbvia, nem tão pouco a ponto de uma conspiração ser claramente disfarçada. Do jeito que gosto."
 feast_events_ewan.0801.desc.trusting: "\n\nÉ claro, com todos em tão bom humor e tanta comida deliciosa para experimentar, quem poderia trazer más intenções para um evento tão alegre? Não, esta é uma ocasião jubilosa, e estou jubiloso com ela."
 feast_events_ewan.0801.desc.compassionate: "É encantador ver a generosidade humana sendo compartilhada tão livremente."
 feast_events_ewan.0801.desc.callous: "\n\nNão que eu me importasse #EMP excessivamente#! se o resto deles estivesse se divertindo pouco, mas ainda consigo apreciar uma atmosfera agradável. Com moderação."
 feast_events_ewan.0801.desc.sadistic: "Gosto de gritos e soluços tanto quanto qualquer[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] equilibrad[ROOT.Char.Custom('ES_OA')], mas gritos de alegria certamente podem ser uma boa mudança de ritmo."
 feast_events_ewan.0801.desc.stubborn: "Eu até considerei levantar-me para passear como tantos outros, mas isso significaria abrir mão do meu assento, e não me renderei de jeito nenhum."
 feast_events_ewan.0801.desc.fickle: "Acho que minha coisa favorita sobre banquetes #EMP é#! a comida. Não, as pessoas. Na verdade, talvez as bebidas? Ou o entretenimento, ou..."
 feast_events_ewan.0801.desc.vengeful: "\n\nNaturalmente, uma boa parte disso é direcionada ao garçom que acabei de derrubar, agora coberto de aperitivos viscosos. Serve o desgraçado certo por ter esquecido de encher minha bebida na última rodada."
 feast_events_ewan.0801.desc.forgiving: "\n\nEstou um pouco preocupado que a equipe de serviço tenha perdido meu cálice na última passagem deles, mas sempre há o próximo prato. Na verdade, isso é uma das coisas adoráveis sobre um banquete — sempre há #EMP sempre#! um próximo prato."
 feast_events_ewan.0801.desc.outro: "\n\nÀs vezes é bom simplesmente sentar e desfrutar das pequenas coisas da vida."
 feast_events_ewan.0801.a: "É aqui que eu quero estar."
 feast_events_ewan.0801.b: "Boas pessoas para se socializar, aqui."
 feast_events_ewan.0801.c: "Uma chance de ser visto com os grandes e os bons!"
