l_spanish:
 az_tour.0001.t: "A recitação de um erudito"
 az_tour.0001.desc: "[stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] ergue uma mão pedindo silêncio enquanto os servos retiram os últimos pratos. Ao seu lado, [scholar.Custom2('MyCharacterIntroduction', ROOT.Char)] dá um passo à frente e, com voz comedida, começa a recitar uns versos, linhas elegantes sobre a passagem do tempo e o peso da virtude.\n\nQuando os aplausos cessam, [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] se volta para mim com um sorriso: "E que palavras vosso coração pode oferecer, [ROOT.Char.GetTitledFirstNameNoTooltip|l]?"."
 az_tour.0001.a.diplomacy: "Falar sobre como a harmonia sustenta o reino."
 az_tour.0001.a.martial: "Argumente que a virtude deve ser defendida com força."
 az_tour.0001.a.stewardship: "Refletir sobre o fardo do governo virtuoso."
 az_tour.0001.a.intrigue: "Sugerir que [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitleAsName] reconheceu o poder silencioso."
 az_tour.0001.a.learning: "Oferecer uma exegese fundamentada nos clássicos."
 az_tour.0001.a.fallback: "Responder com uma interpretação reflexiva."
 az_tour.0001.b: "Recite alguns versos rápidos sobre o efêmero."
 az_tour.0001.c: "Fazer um discurso sobre a fome de ascender."
 az_tour.0002.t: "O custo do refinamento"
 az_tour.0002.desc: "[stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] avança com um sorriso e apresenta uma caixa laqueada, envolta em uma fita de [stop_host_scope.Custom('RegionalFabric')] de alta qualidade.\n\n"Seria uma desonra para mim deixar que partísseis, [ROOT.Char.Custom('FormOfAddressForLiege')], sem uma prova da minha estima", diz. "Dentro há alguns tesouros modestos: objetos laqueados polidos, uns versos antigos compostos com traços fluidos e incenso que outrora foi o preferido nos salões dos altos cargos".\n\nO gesto é gracioso. Mas o brilho das bandejas de prata, o grão raro dos painéis de [ROOT.Province.Custom('GetRandomRegionalWood')]… falam de recursos além do que este cargo poderia arcar. Volto a olhar para o presente. É… extravagante."
 az_tour.0002.a: ""Um presente muito elegante. É uma honra"."
 az_tour.0002.b: ""Seu gosto é requintado… quase suspeitamente tanto"."
 az_tour.0002.c: ""Não posso, em sã consciência, aceitar isto"."
 az_tour.0003.t: "Um sussurro na taça"
 az_tour.0003.desc: "Mientras vuelan las copas de [stop_host_scope.Custom('RegionalDrink')] y la conversación da vueltas a mi alrededor, [servant.Custom2('MyCharacterIntroduction', ROOT.Char)] da un paso adelante para llenarme la copa. Pero en lugar de verter la bebida sin más, sus dedos deslizan un papel doblado en mi mano y desaparece tan veloz como llegó.\n\nLo abro debajo de la mesa. Un nombre. Un acto. Un escándalo de mi [Select_CString(stop_host_scope.IsFemale, 'anfitriona', 'anfitrión' )]: [stop_host_scope.GetTitledHouseNameOrFirstName]. La nota es breve, pero la implicación es clara.\n\nY en la otra punta de la mesa, [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] sonríe sin tener ni idea."
 az_tour.0003.a: "Vou guardar isto comigo… por enquanto."
 az_tour.0003.b: "Isto não deve ficar sem ser dito."
 az_tour.0003.b.tt: "[stop_host_scope.GetTitledHouseNameOrFirstName] reagirá de acordo com sua personalidade."
 az_tour.0003.c: "Alguns assuntos é melhor não tocar."
 az_tour.0003.d: "Vou levar isso direto ao topo!"
 az_tour.1003.t: "Um sussurro na taça"
 az_tour.1003.desc: "[visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me hace gestos ligeramente para que me una a [visiting_liege.GetSheHe] cerca de la cámara lateral cuando los sirvientes empiezan a cambiar los platos.\n\n«[ROOT.Char.GetFirstName]», comienza con voz de acerco envuelta en seda. «Ha llegado a mis manos una carta, con la tinta aún fresca. Habla de ciertas… indiscreciones. Normalmente desdeñaría tales habladurías, si no las susurrasen más de una voz».\n\nFuera, el repiqueteo de platos y las risas sosegadas continúan, el biombo proyecta sombras en el suelo pulido."
 az_tour.1003.a: ""Mentiras e calúnias. Não quero ouvir mais nenhuma palavra!"."
 az_tour.1003.b: ""Tendes meu silêncio… e o que o acompanha"."
 az_tour.1003.c: "Uma fortuna para silenciar sua língua."
 az_tour.1003.d: ""Renunciarei à minha reivindicação"."
 az_tour.1003.e: ""Eu compro o seu silêncio com o meu"."
 az_tour.0004.t: "Um assunto de governança"
 az_tour.0004.desc.intro: "Entre bocados e goles elegantes de [stop_host_scope.Custom('RegionalDrink')], a conversa à mesa vai ficando mais acalorada. [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] apresenta uma questão urgente de governança; não diretamente a mim, mas claramente ao alcance da audição.\n\n"
 az_tour.0004.desc.stewardship: "\"Não podemos nos dar ao luxo de perder mais uma moeda em tolices\", insiste [stop_host_scope.GetTitledHouseNameOrFirstName]. \"Os fundos de desenvolvimento devem ir para onde rendam o maior retorno.\"\n\n\"E, no entanto, as estradas racham e os canais secam enquanto o tesouro permanece ocioso\", rebate [opposing_counsel.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 az_tour.0004.desc.martial: ""Minha guarnição carece de cavalos, e você fala de armadura de desfile?", diz [opposing_counsel.Custom2('MyCharacterIntroduction', ROOT.Char)] secamente.\n\n"A disciplina começa com o orgulho da posição em que se está", replica [stop_host_scope.GetTitledHouseNameOrFirstName] com as sobrancelhas erguidas."
 az_tour.0004.desc.learning: ""Este novo método de levantamento de terras conta com o respaldo de textos respeitáveis", argumenta [stop_host_scope.GetTitledHouseNameOrFirstName] com tom firme.\n\n"E, no entanto, nenhum erudito aqui atestou sua solidez", replica [opposing_counsel.Custom2('MyCharacterIntroduction', ROOT.Char)] cortante e fri[opposing_counsel.Custom('ES_OA')]."
 az_tour.0004.a: "Devo concordar com a avaliação de [Select_CString(stop_host_scope.IsFemale, 'nuestra anfitriona', 'nuestro anfitrión' )]."
 az_tour.0004.b.stewardship: "Um orçamento equilibrado serve a todos; esta é a conciliação que ofereço."
 az_tour.0004.b.stewardship.tt: "Direcionar uma parte do excedente para reparos urgentes e o restante para investimentos de longo prazo. A frugalidade não precisa significar abandono."
 az_tour.0004.b.martial: "A segurança deve ser prática, não ornamental. Deixem-me ponderar sobre isso."
 az_tour.0004.b.martial.tt: "Equipem a guarnição para servir à função, não para exibição: armadura adequada ao campo e cavalos suficientes para patrulhas. A glória segue a disciplina, não o enfeite."
 az_tour.0004.b.learning: "Que a razão prevaleça. Sugiro uma solução racional."
 az_tour.0004.b.learning.tt: "Teste o novo método em um único condado sob observação cuidadosa. Se ele se mostrar sólido, expanda-o. Caso contrário, descarte-o — como toda boa teoria deve permitir."
 az_tour.0004.c: "Estamos em um jantar, não em uma sala de debates."
 az_tour.0005.t: "Uma nota quebrada"
 az_tour.0005.desc: "El silencio cae sobre la sala cuando un músico tañe una nota demasiado fuerte; un tañido agudo que corta los murmullos como una bofetada. La melodía muere.\n\n[stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se tensa en su sitio.\n\n«Ah, lo lamento», tartamudea [musician.Custom('ES_ElLa')] intérprete, inclinándose con el instrumento que le tiembla en la mano. Unos pocos invitados se paran en pleno trago de sus copas de [stop_host_scope.Custom('RegionalDrink')] y miran con inseguridad.\n\n[stop_host_scope.GetTitledHouseNameOrFirstName] se obliga a sonreír, pero el rubor de sus mejillas no ofrece dudas. «Un contratiempo menor», dice indulgente con la voz controlada. «No agüemos la diversión de la velada por esto»."
 az_tour.0005.a: ""Uma ótima apresentação, apesar do acidente!"."
 az_tour.0005.b: ""Mal começamos; tragam meu [ROOT.Char.Custom('GetMusicalInstrument')]!""
 az_tour.0005.c: ""Eu mal estava prestando atenção para começar.""
 az_tour.1005.t: "Uma melodia mais aguda"
 az_tour.1005.desc: "Un fuerte crujido y luego el silencio. Un/a [ROOT.GetCharacter.Custom('GetMusicalInstrument')] se parte en plena nota y el silencio asombrado que sigue es más sonoro que la misma música. Un segundo intérprete yerra en su entrada. Un tercero tose nervioso. La actuación se viene abajo, una nota errónea cada vez.\n\nAntes de que pueda levantarme o solicitar un reemplazo, [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] da un paso adelante y saca un/a [visiting_liege.Custom('GetMusicalInstrument')] de su estuche. Sin fanfarrias, ni anuncios, solo con la confianza serena de alguien acostumbrado que se le escuche.\n\nLas primeras notas parten como el incienso, lentas e inquisitivas. La conversación se apaga. La copas se bajan. Hasta los sirvientes se detienen. [visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitleAsNameNoTooltip|l], antes mi invitad[visiting_liege.Custom('ES_OA')], ahora dirige el salón como intérprete.\n\nY cuando el último acorde vibra hacia el silencio, lo único que puedo hacer es sentarme con su peso."
 az_tour.1005.a: "Uma apresentação de brilho incomparável — verdadeiramente magnífica!"
 az_tour.1005.b: "Que maestria! Sinto-me movido a me aprimorar.[ROOT.Char.Custom('ES_OA')] a me aprimorar."
 az_tour.1005.c: ""Esta atuação é indigna de sua posição"."
 az_tour.1005.c.toast: "[stop_host_scope.GetTitledHouseNameOrFirstName] critica seu desempenho."
 az_tour.0006.t: "Uma interrupção impertinente"
 az_tour.0006.desc: "Un grito corta la risa y la música del festival. Un[angry_farmer.Custom('ES_XA')] [angry_farmer.GetWomanMan] con ropas raídas y la cara roja de indignación avanza a empujones. Estampa el pie y alza la voz por encima de la multitud.\n\n«Trabajamos duro en el campo, ¡pero todo el dinero se va en banquetes y sedas! Os sentáis bajo farolillos bebiendo [stop_host_scope.Custom('RegionalDrink')], pero ¿quién se preocupa por quienes tienen el cuenco vacío?».\n\nEl festín se detiene. [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me echa una mirada, cauta, pero claramente disgustada."
 az_tour.0006.a: ""Isso será investigado. Você tem a minha palavra"."
 az_tour.0006.b: ""Os festivais não são para reclamar"."
 az_tour.0006.c: ""Tome um pouco de [stop_host_scope.Custom('RegionalDrink')] para aliviar a mente"."
 tgp_heard_complaints_modifier: "Queixas ouvidas"
 tgp_heard_complaints_modifier_desc: "O governante deste condado ouviu as queixas de seus súditos"
 tgp_dismissed_complaints_modifier: "Queixas desdenhadas"
 tgp_dismissed_complaints_modifier_desc: "O governante deste condado desconsiderou as queixas de seus súditos"
 az_tour.1006.t: "Uma interrupção impertinente"
 az_tour.1006.desc.intro: "A pra?a do mercado vibra com m?sica e com a algazarra da celebra??o, mas nem todas as vozes se erguem em alegria. Um[angry_farmer.Custom('ES_XA')] agricultor[angry_farmer.Custom('ES_OA')] local, de rosto vermelho e agitad[angry_farmer.Custom('ES_OA')], abre caminho entre a multid?o, encarando [stop_host_scope.GetTitledHouseNameOrFirstName]."
 az_tour.1006.desc.a: ""Trabalhamos duro nos campos, mas todo o dinheiro vai para sedas e banquetes! Vocês se sentam sob lanternas bebendo [stop_host_scope.Custom('RegionalDrink')], mas quem se preocupa por nós, que temos a tigela vazia?".\n\nO rosto [stop_host_scope.Custom('ES_DelDela')] anfitri[stop_host_scope.Custom('ES_OnOna')] se fecha, mas ele responde com calma, prometendo uma compensação e designando um administrador para cuidar dos danos."
 az_tour.1006.desc.b: ""Trabalhamos duro no campo, mas todo o dinheiro vai para sedas e banquetes! Vocês se sentam sob lanternas bebendo [stop_host_scope.Custom('RegionalDrink')], mas quem está cuidando de nós, que temos tigelas vazias?".\n\n[stop_host_scope.GetSheHe|U] sorri com lentidão e indulgência. "Suas tigelas não me dizem respeito. Guardas, agarrem ess[angry_farmer.Custom('ES_EA')] [angry_farmer.Custom2('InsultNoun', ROOT.Char)]!". Suspiros de espanto se espalham pela multidão quando os guardas de [stop_host_scope.GetFirstName] prendem [angry_farmer.Custom('ES_AlAla')] agricultor[angry_farmer.Custom('ES_OA')] e o l[angry_farmer.Custom('ES_OA')] levam embora; aos poucos, suas pragas desaparecem sob o som da música."
 az_tour.1006.desc.c: "«Trabajamos duro en el campo, ¡pero todo el dinero se va en banquetes y sedas! Os sentáis bajo farolillos bebiendo [stop_host_scope.Custom('RegionalDrink')], pero ¿quién se preocupa por quienes tienen el cuenco vacío?».\n\n[stop_host_scope.GetSheHe|U] levanta ligeramente una mano y habla con voz calmada pero firme. «Estamos aquí reunidos en paz. Dejad que los ánimos se calmen y las copas se llenen. Seguro que podemos escuchar vuestras quejas sin interrupciones». [angry_farmer.Custom('ES_ElLa')|U] granjer[angry_farmer.Custom('ES_OA')] se revuelve incómod[angry_farmer.Custom('ES_OA')], con indignación aún en sus ojos, pero su tono se suaviza con el peso de la formalidad."
 az_tour.1006.a: ""Uma atitude digna [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitleAsNameNoTooltip|l] ainda mais [stop_host_scope.Custom('ComplimentAdjective')]!""
 az_tour.1006.a.toast: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitleAsNameNoTooltip|l] apoiou sua abordagem"
 az_tour.1006.b: ""Eu teria lidado com isso de outra maneira"."
 az_tour.1006.b.toast: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitleAsNameNoTooltip|l] desaprovou a resposta que você deu ao fazendeiro"
 az_tour.1006.c: ""Perdoe-me, fui hipnotizado por esta dança colorida"."
 az_tour.1006.c.toast: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitleAsNameNoTooltip|l] ignorou a confusão e ficou para si"
 az_tour.0007.t: "Adulação florescente"
 az_tour.0007.desc: "Sob as copas floridas das árvores iluminadas por lanternas, um servo anuncia a [elegant_noble.Custom2('MyCharacterIntroduction', ROOT.Char)]. Dá um passo à frente, segurando um pergaminho que exibe delicadas pinceladas. As montanhas pintadas se erguem sobre a seda, coroadas por árvores exuberantes, enquanto palavras ondulantes fluem ao lado delas: a união perfeita entre harmonia e força.\n\n"As colinas podem desmoronar", diz com um sorriso modesto, "mas a primavera sempre retornará, ainda que seja por um breve instante". Continua falando sem desviar o olhar dos meus olhos: "É um reflexo do vosso governo, [ROOT.Char.Custom('FormOfAddressForLiege')]".\n\nA maestria do pergaminho é inegável; o sentimento que transmite é lisonjeiro. [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] inclina a cabeça com tranquilidade em sinal de aprovação, aguardando minha resposta."
 az_tour.0007.a: ""Que equilíbrio! Só pelos traços, merece um cargo"."
 az_tour.0007.b: ""Quando a primavera passar, também acabarão os seus arroubos"."
 az_tour.0007.c: ""A verdadeira arte aqui está na bajulação, não nas flores"."
 tgp_mocked_elites_modifier: "Elites ridicularizadas"
 az_tour.1007.t: "As flores murcham"
 az_tour.1007.desc: "El aire está cargado de perfume y poesía. Cada palabra se ha elegido con precisión y cada gesto se ha estudiado con cuidado. Los cortesanos se inclinan cuando [elegant_noble.Custom2('MyCharacterIntroduction', ROOT.Char)] completa el verso final. Su voz permanece flotando en el aire, dulce como el humo del incienso.\n\n[visiting_liege.Custom2('MyCharacterIntroduction', SCOPE.sCharacter('stop_host_scope'))|U] ofrece una lenta pero deliberada sonrisa. «Qué hermoso», dice con una voz tan suave como el barniz. «La candidez provinciana tiene cierto encanto». Antes de que pueda tomar aliento, un murmullo recorre los bancos y los abanicos se agitan para ocultar las risas. [visiting_liege.Custom2('MyCharacterIntroduction', SCOPE.sCharacter('stop_host_scope'))|U] inclina la cabeza y sonríe lenta y deliberadamente, como si saboreara mi incomodidad."
 az_tour.1007.a: "Que ria se isso é o que ele/ela quer."
 az_tour.1007.b: "Está humilhando meu povo!"
 az_tour.0008.t: "Pinceladas e julgamentos"
 az_tour.0008.desc: "A meu pedido, [revered_scholar.Custom2('MyCharacterIntroduction', ROOT.Char)] toma seu lugar sob o dossel de seda, enquanto um público se reúne para observar. Com o pincel em mãos, inicia uma transcrição deliberada dos clássicos, desenhando cada caractere com paciência até que o pergaminho pareça respirar significado.\n\nSeria muito revelador que [visiting_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] se pronunciasse sobre esta obra. Se emitisse seu veredito diante de todos esses olhares, seu discernimento ficaria em plena evidência."
 az_tour.0008.a: "Convidar [visiting_liege.GetTitledHouseNameOrFirstName] a julgar a demonstração."
 az_tour.0008.a.tt: "Você será recompensado de acordo com a opinião de seu suserano sobre a demonstração"
 az_tour.0008.b: "Que [visiting_liege.GetTitledHouseNameOrFirstName] aproveite isso em paz."
 az_tour.1008.t: "O pincel fala"
 az_tour.1008.desc.intro: "Fui levado até [stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)] sob o dossel de seda, onde a multidão se reúne. "[revered_scholar.GetTitledHouseNameOrFirstName] nos mostrará a beleza dos clássicos". [revered_scholar.GetSheHe|U] se curva solenemente diante de mim e [stop_host_scope.GetTitledHouseNameOrFirstName], toma seu lugar ao centro e desenrola um fino pergaminho. Com ritmo cuidadoso, passa a tinta para o papel; cada traço flui para o seguinte até que as palavras tomem forma graciosa. [stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitleAsNameNoTooltip|l] me encara intensamente. "[ROOT.Char.Custom('FormOfAddressForLiege')|U], vosso julgamento tem grande peso. Honrarias nosso[revered_scholar.('ES_OA')] artista falando seu julgamento diante de todos nós?".\n\n"
 az_tour.1008.desc.praise_subtle: "Noto o equilíbrio delicado e o movimento fluido de cada traço. A escrita parece deliberada, medida — habilidade aliada a uma intenção cuidadosa."
 az_tour.1008.desc.arrogant_judgment: "Meus olhos captam a precisão dos caracteres, mas ainda assim se percebe um excesso de controle, quase artificial demais. Falta-lhe o calor da espontaneidade."
 az_tour.1008.desc.shy_discomfort: "O pergaminho é precioso, mas a tensão é palpável. Dou uma opinião breve e prudente, evitando revelar demais."
 az_tour.1008.desc.generic_comment: "As linhas estão claras e bem espaçadas. Faço um comentário reservado, tomando cuidado para não falar além do meu entendimento."
 az_tour.1008.a: ""É uma exibição magistral: sutil, equilibrada e vibrante"."
 az_tour.1008.a.toast: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitleAsNameNoTooltip|l] elogiou a demonstração"
 az_tour.1008.b: ""Um trabalho primoroso, ainda que um pouco… provinciano"."
 az_tour.1008.b.toast: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitleAsNameNoTooltip|l] zombou da demonstração"
 az_tour.1008.c: ""A forma é admirável, mas também devo considerar o espírito"."
 az_tour.1008.c.toast: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitleAsNameNoTooltip|l] elogiou a demonstração"
 az_tour.1008.d: ""Perdoe-me. Tenho outros assuntos para tratar"."
 az_tour.1008.d.toast: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitleAsNameNoTooltip|l] recusou-se a julgar a demonstração"
 az_tour.0009.t: "Vamos dançar?"
 az_tour.0009.desc: "A estação coincide com uma tradição local: dançarinos mascarados, trajados com tecidos brilhantes e papel, executam uma dança antiga diante de altares ancestrais. É algo rústico — estridente, alegre, caótico —, mas querido.\n\n[chancellor.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima silenciosamente. "[visiting_liege.Custom2('MyCharacterIntroduction', chancellor)|U] chegará em breve. Talvez esta exibição [visiting_liege.GetHerHim] agrade. É humilde, mas sincera — um vislumbre da alma do povo".\n\nÉ um bom argumento, mas nosso tempo é curto e precioso…"
 az_tour.0009.a: "Que preparem a dança."
 az_tour.0009.a.tt: "Você será recompensado de acordo com a opinião do seu suserano sobre a dança"
 az_tour.0009.b: "Nosso tempo é melhor aproveitado discutindo nossos deveres."
 az_tour.1009.t: "A dança do povo"
 az_tour.1009.desc: "Los tambores resuenan como las pezuñas de los animales y las risas se extienden entre la multitud. Bajo los estandartes ondeantes y el aroma del incienso, los aldeanos se visten con seda brillante y se disfrazan de caballos de papel, saltando y girando en una antigua danza folclórica.\n\n[stop_host_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me ha invitado a observar esta colorida celebración de la tradición [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip]. [stop_host_scope.GetSheHe|U] permanece a mi lado, con una sonrisa orgullosa. Cuando un bailarín se inclina ante mí, reconozco el respeto que profesan a mi posición y la confianza que tienen en mi juicio."
 az_tour.1009.a: "Aproximo-me dos dançarinos para honrá-los."
 az_tour.1009.a.toast: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitleAsNameNoTooltip|l] homenageou a dança"
 az_tour.1009.b: "Um pequeno presente, para honrar sua habilidade."
 az_tour.1009.b.toast: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitleAsNameNoTooltip|l] presenteou os dançarinos"
 az_tour.1009.c: "É melhor que eu me concentre em minhas orações."
 az_tour.1009.c.toast: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitleAsNameNoTooltip|l] focado em suas orações"
 tgp_popular_festival_performance_modifier: "Apresentação de festival prestigiosa"
 tgp_popular_festival_performance_modifier_desc: "Este condado recebeu a aprovação de um governante estimado para sua dança cultural durante um festival."
