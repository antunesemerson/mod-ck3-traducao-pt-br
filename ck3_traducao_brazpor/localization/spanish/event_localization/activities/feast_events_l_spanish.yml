l_spanish:
 ### OPTIONS
 feast_option_type: "Motivo para Banquete"
 feast_type_generic: "Banquete"
 feast_type_generic_desc: "$EFFECT_LIST_BULLET$ Eventos levarão a ocasiões para ganhar [opinion|El]\n $EFFECT_LIST_BULLET$ Certas opções permitirão a redução do [stress|El]\n\n #weak Um banquete #EMP precisa#! de um motivo?#!"
 feast_type_murder: "Banquete Assassino"
 feast_type_murder_desc: "$EFFECT_LIST_BULLET$ Você deverá escolher como assassinar seu convidado de honra e sua comitiva\n\n #weak Você não está convidando convidados, está atraindo vítimas.#!\n\n@warning_icon! #X Você não poderá organizar outro [GetActivityType('activity_feast').GetName|l] assassino em 15 anos#!\n@warning_icon!#X Alvejar seu [liege|El] ou [head_of_faith|El] acarretará penalidades maiores#!\n\n@alert_icon! #alert_trial Personagens com os traços de [GetTrait('just').GetName( GetNullCharacter )], [GetTrait('compassionate').GetName( GetNullCharacter )] e [GetTrait('calm').GetName( GetNullCharacter )] ganharão [stress|El]#!"
 feast_option_food: "Complexidade dos Pratos"
 feast_food_bad: "Pratos Simples"
 feast_food_bad_desc: "$EFFECT_LIST_BULLET$ Redução do ganho de [prestige|lE]\n\n #weak Todo nobre certamente aprecia boa comida simples em grandes quantidades em vez de qualquer coisa requintada. Certo?#!"
 feast_food_normal: "Delícias Exóticas"
 feast_food_normal_desc: "$EFFECT_LIST_BULLET$ Ganho moderado de [prestige|lE]\n\n #weak Qualquer banquete de destaque complementa as luxúrias básicas que a nobreza espera com comidas mais estranhas e ricas, afinal de contas.#!"
 feast_food_good: "Obras de Arte Culinárias"
 feast_food_good_desc: "$EFFECT_LIST_BULLET$ Ganho significativo de [prestige|lE]\n\n #weak Enfie #EMP isso#! dentro #EMP daquilo#! e prenda para trás para parecer um falcão voando! Um prato sem uma história é pouco mais do que #EMP porcaria#!.#!"
 feast_option_courses: "Número de Pratos"
 feast_courses_bad: "Satisfatório"
 feast_courses_bad_desc: "$EFFECT_LIST_BULLET$ Pequeno ganho de [opinion|El]\n$EFFECT_LIST_BULLET$ Ganho muito pequeno de [opinion|El] dos [vassals|El] de caráter [GetVassalStance( 'courtly').GetName] [GetVassalStance( 'courtly').GetTextIcon]\n\n#weak Com meia dúzia ou menos de rodadas de pratos, os convidados certamente ficarão satisfeitos. Ainda que não especialmente impressionados.#!"
 feast_courses_normal: "Apropriado"
 feast_courses_normal_desc: "$EFFECT_LIST_BULLET$ Ganho moderado de [opinion|lE]\n$EFFECT_LIST_BULLET$ Ganho moderado de [opinion|lE] com os [vassals|El] [GetVassalStance( 'courtly').GetName] s [GetVassalStance( 'courtly').GetTextIcon]\n\n#weak Um banquete exige certo grau de excesso, e isto corresponde a essa expectativa.#!"
 feast_courses_good: "Exorbitante"
 feast_courses_good_desc: "$EFFECT_LIST_BULLET$ Grande ganho de [opinion|lE]\n $EFFECT_LIST_BULLET$ Maior ganho de [opinion|lE] com os [vassals|El] de caráter [GetVassalStance( 'courtly' ).GetName] [GetVassalStance( 'courtly' ).GetTextIcon]\n\n #weak Mais de duas dúzias de pratos de terras próximas e distantes! Comida tradicional! Comida nova! Sopas! Limpadores do paladar! Sobremesas, pratos principais e mais!#!"
 ### PHASES
 feast_phase_meal: "Banquete"
 feast_phase_toast: "Brinde Final"
 ### INTENTS
 every_guest_scope_tt: "Todo convidado"
 feast.0010.desc: "Não sei por que você aceitou meu convite se no fim compareceu ao banquete de [other_host.GetTitledFirstName|l], mas saiba que me lembrarei disso."
 feast.0010.a: "Infelizmente."
 feast.1501.opening: "[sender.Custom2('AppropriateGreeting', ROOT.Char)]"
 feast.1501.opening_desc: "Convido-vos cordialmente a comparecer ao meu banquete em [barony.GetNameNoTier]!"
 feast.1501.host_likes_me: "Espero que você compareça, pois sua ausência seria muito sentida."
 feast.1501.host_gets_along_with_me: "Como [ROOT.Char.GetTitleTierName] notável, seria uma honra com sua presença."
 feast.1501.host_dislikes_me: "Espero que todos importantes estejam presentes, infelizmente isso inclui você."
 feast.1501.a: "Claro que comparecerei."
 feast.1501.b: "Comparecerei. A contragosto."
 feast.1501.c: "Me entristece dizer que estou ocupad[ROOT.Char.Custom('ES_OA')]."
 feast.1501.d: "Não, recuso!"
 feast.1502.desc: "Eu o convido para um banquete em minha corte em [barony.GetNameNoTier]! Será um evento grandioso, digno de sua honrosa presença."
 feast.1502.a: "Será um prazer."
 feast.1502.b: "Tenho assuntos mais importantes para tratar."
 feast.1503.desc: "Eu o convido para um banquete em minha corte em [barony.GetNameNoTier]! Será um evento grandioso, com comida deliciosa e entretenimento."
 feast.1503.a: "Será um prazer."
 feast.1503.b: "Tenho assuntos mais importantes para resolver."
 feast.2001.t: "Um Encontro Alegre"
 feast.2001.t_murder: "Um Encontro Perverso"
 feast.2001.desc_intro: "Os convidados estão reunidos na grande sala, senhores e damas vindos de todas as partes do reino."
 feast.2001.desc_fallback: "$feast.2001.desc_intro$$feast.2001.desc_outro$"
 feast.2001.desc_gregarious: "$feast.2001.desc_intro$ Tenho estado #EMP desejando#! por uma ocasião como essa.$feast.2001.desc_outro$"
 feast.2001.desc_shy: "$feast.2001.desc_intro$ Ajeito minhas roupas. Isso não é #EMP exatamente#! a minha ideia de uma noite perfeita, mas vai ter que servir.$feast.2001.desc_outro$"
 feast.2001.desc_ambitious: "$feast.2001.desc_intro$ Ah, uma das minhas coisas favoritas é ver as pessoas ficarem intoxicadas... e ouvi-las falarem muito mais do que deveriam.$feast.2001.desc_outro$"
 feast.2001.desc_nerd: "$feast.2001.desc_intro$ Normalmente, prefiro a companhia dos livros às pessoas, mas o dever é o dever.$feast.2001.desc_outro$"
 feast.2001.desc_martial: "$feast.2001.desc_intro$ Devo admitir que não poder trazer armas diminui o apelo de uma celebração.$feast.2001.desc_outro$"
 feast.2001.desc_lustful: "$feast.2001.desc_intro$ Tantas... #EMP guloseimas#! para escolher.$feast.2001.desc_outro$"
 feast.2001.desc_outro: "\n\nO clima é alegre e os ânimos estão altos enquanto o banquete começa!"
 feast.2001.desc_murder_feast: "À medida que os convidados vão enchendo o salão, eu os observo um após o outro. [honorary_guest.Custom('ES_ElLa')|U] [honorary_guest.GetTitledFirstName|l]... como ousa entrar em minha casa? E seu séquito..., todos inimigos meus..., inimigos do senhorio!\n\nQuando os servos acendem a grande lareira, tenho uma epifania súbita; e se o flagelo da sua existência pudesse ser purgado de uma só vez?"
 feast.2001.a: "Sejam bem-vindos, amigos!"
 feast.2001.a.tt: "O Banquete começa"
 feast.2001.b: "[honorary_guest.GetFirstNameNoTooltip] e sua comitiva. Quero todos eles fora daqui."
 feast.2001.c: "Só quero [honorary_guest.GetFirstNameNoTooltip] mort[honorary_guest.Custom('ES_OA')]."
 feast.2001.d: "[honorary_guest.GetFirstNameNoTooltip] precisa morrer, mas #EMP ninguém#! pode suspeitar de mim."
 feast.2001.d.tt: "A tentativa de assassinato pode falhar"
 feast.2001.e: "Todos são convidados em minha casa. Nenhum mal lhes acontecerá."
 feast.2001.c.people_to_spare: "Todos queridos para mim serão avisados"
 feast.2001.e.tt: "O Banquete começa — e ninguém será prejudicado"
 feast.2002.t: "$feast_header$ Deveres Abandonados"
 feast.2002.desc: "Que desastre!\n\nDepois de todos os meus preparativos, meus convidados chegaram a um banquete sem anfitri[ROOT.Char.Custom('ES_OnOna')]! Eles foram para casa levando de mim uma péssima impressão."
 feast.2002.a: "Posso vir a me arrepender disso."
 feast.2003.t: "$feast_header$ Uma Celebração Pobre"
 feast.2003.desc: "Não consigo acreditar. Apesar dos meus convites e preparativos, nem um único convidado apareceu para o meu banquete.\n\nNão importa! Vou aproveitar toda essa comida e vinho sozinh[ROOT.Char.Custom('ES_OA')], o eco dos passos no meu grande salão é toda a companhia de que preciso!"
 feast.2003.a: "Estou realmente tão sozinh[ROOT.Char.Custom('ES_OA')]?"
 feast.2003.b: "Sinto-me um pouco aliviad[ROOT.Char.Custom('ES_OA')]."
 feast.2010.t: "$feast_header$ Uma Sorte Inesperada?"
 feast.2010.desc: "Chegou até mim a notícia de que meu convidad[ROOT.Var('murder_guest_host_var').GetCharacter.Custom('ES_OA')] #EMP ultraespecial#!, [ROOT.Var('murder_guest_host_var').GetCharacter.Custom('ES_ElLa')] [ROOT.Var('murder_guest_host_var').GetCharacter.GetTitledFirstName|l], encontrou seu fim um pouco antes do previsto. Todos lamentaremos sua morte e cancelaremos o banquete para respeitar sua memória.\n\n#EMP Eu só queria que tivesse sido por minha mão.#!"
 feast.2010.a: "Uma verdadeira pena."
 feast.2010.a.tt: "O Banquete Assassino está cancelado"
 feast.2011.t: "$feast_header$ Morte Inesperada"
 feast.2011.desc: "A morte repentina [ROOT.Var('murder_guest_host_var').GetCharacter.Custom('ES_DelDela')] [host.Var('murder_guest_host_var').GetCharacter.GetTitledFirstName|l] foi uma surpresa para todos nós e [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] decidiu cancelar o banquete em respeito à sua memória. Afinal, tudo isso era em sua homenagem."
 feast.2011.a: "$feast.2010.a$"
 feast.2011.a.tt: "O Banquete está cancelado"
 feast.2020.t: "$feast_header$ Convite Recusado"
 feast.2020.desc: "Não consigo acreditar nisso! [ROOT.Var('murder_guest_host_var').GetCharacter.Custom('ES_ElLa')|U] [ROOT.Var('murder_guest_host_var').GetCharacter.GetTitledFirstName|l] recusou meu convite nada suspeito para um banquete! Até mesmo como meu #EMP convidado ultraespecial#!. É totalmente inaceitável!"
 feast.2020.a: "Um dia eu te pego, [ROOT.Var('murder_guest_host_var').GetCharacter.GetFirstNameNoTooltip]..."
 feast.2020.a.tt: "$feast.2010.a.tt$"
 feast.2021.t: "$feast.2020.t$"
 feast.2021.desc: "Que humilhação! [host.Var('murder_guest_host_var').GetCharacter.Custom('ES_ElLa')|U] [host.Var('murder_guest_host_var').GetCharacter.GetTitledFirstName|l] recusou o convite [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] como convidado especial para o banquete! E agora estão mandando todos nós para casa! Sei que eu #EMP jamás#! me recuperaria de algo assim…"
 feast.2021.a: "$feast.2010.a$"
 feast.2021.a.tt: "$feast.2011.a.tt$"
 feast.2501.t: "Uma Receção Calorosa"
 feast.2501.likes_host: "Todos os convidados se reúnem no salão, e noss[host.Custom('ES_OA')] gentil anfitri[host.Custom('ES_OnOna')] , [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l], nos dá as boas-vindas a todos ao banquete!"
 feast.2501.dislikes_host: "Todos os convidados se reúnem no salão, e noss[host.Custom('ES_OA')] anfitri[host.Custom('ES_OnOna')] [host.Custom2('InsultAdjective', ROOT.Char)], [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l], por fim nos dá as boas-vindas ao banquete."
 feast.2501.a.gluttonous: "Consigo sentir o cheiro da cozinha daqui!"
 feast.2501.a.drunkard: "Minha [ROOT.Char.Custom('RegionalAlcoholicDrink')]! Onde está?"
 feast.2501.a.gregarious: "Mal posso esperar para conversar com todos!"
 feast.2501.a.shy: "Tem muita gente aqui..."
 feast.2501.a: "Estou ansioso por isso!"
 feast.2501.b: "Espero que isso valha meu tempo."
 feast.5003.t: "Fim das Festividades"
 feast.3601.desc: "Com o falecimento de [host.Custom2('MyCharacterIntroduction', ROOT.Char)], seu banquete chega ao fim.\n\nÀ medida que os convidados contidos partem, rezo para que [ROOT.Char.GetFaith.HighGodNameAlternate] receba a [host.GetFirstName] em [ROOT.Char.GetFaith.PositiveAfterLife] assim como [host.Custom('ES_ElElla')] nos recebeu em seus salões."
 feast.3601.a: "Foi um banquete tão divertido!"
 feast.3601.a.tt: "#F Bueno… hasta que murió.#!"
 feast.5004.desc: "Agora que estou atrás das grades, meu grande banquete será cancelado. Ah, todas aquelas horas que gastei preparando... Desperdiçadas!"
 feast.5002.a: "Sem anfitrião, sem banquete."
 feast.5005.desc: "[host.Custom2('MyCharacterIntroduction', ROOT.Char)|U] foi aprisionad[host.Custom('ES_OA')] e seu grande banquete chegou ao fim. Que inoportunidade!"
 feast.0050.t: "A Arte da Diversão"
 feast.0050.desc: "Vinho, cerveja e comida refinada! Que melhor alívio para os problemas do mundo do que uma noite de festa?\n\nA cada banquete que termina, me vejo planejando o próximo!"
 feast.0050.a: "Fico curioso para saber quem virá!"
 feast.0050.b: "Mas tenho outros interesses..."
 feast.7002.t: "Fazendo Tempo"
 feast.7002.desc_intro: "Os criados correm pelo salão, trazendo as últimas decorações. Alguns dos convidados ainda não chegaram, e eu me deleito com uma deliciosa bebida junto à lareira."
 feast.7002.dislikes_host: "Estou louco para ver como esse[host.Custom('ES_EA')] [host.Custom2('InsultNoun', ROOT.Char)] se fará de bobo."
 feast.7002.likes_host: "Não há lugar onde eu preferiria estar."
 feast.7002.neutral: "#EMP Ah.#! Parece que já avistei alguns [ROOT.Char.Custom('GetExpensiveMeal')]..."
 feast.7002.intent_arrived: "\n\nAvisto [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetIntentTarget.GetTitledFirstName|l] entre a multidão, totalmente alheio ao meu plano de tentar [ROOT.Char.GetInvolvedActivityIntent.GetName|l] que [ROOT.Char.GetIntentTarget.GetHerHim] é o alvo."
 feast.7002.intent: "\n\nAinda não consigo encontrar [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetIntentTarget.GetTitledFirstName|l] por aí. Mal posso esperar para que ele/ela chegue, para que meu plano de [ROOT.Char.GetInvolvedActivityIntent.GetName|l] que [ROOT.Char.GetIntentTarget.GetHerHim] possa finalmente começar."
 feast.7002.a.good: "Temos um tempo maravilhoso pela frente!"
 feast.7002.a.bad: "Mal posso esperar para ir para casa."
 feast.7101.t: "O Fim de uma Celebração"
 feast.7101.desc: "Poucas velas resistem depois que o último dos convidados sai. Posso ouvir dois criados suspirando aliviados após fechar as portas. A comida ainda está quente nos pratos de cerâmica.\n\nLogo, a notícia chegará a todos os cantos do reino e todo nobre que se preze saberá que minha magnificência é incomparável."
 feast.7101.a: "E com isso, está tudo pronto."
 feast.7110.t: "Um Final Feliz"
 feast.7110.desc.entourage: "A luz das velas faz o sangue parecer uma tapeçaria de veludo, espalhada pelo chão. Volto a respirar quando vejo [Select_CString( dummy_gender.IsFemale, 'a última', 'o último')] da minha hoste de $knight_culture_player_plural_no_tooltip_lowercase$ limpar sua espada e acenar silenciosamente para mim.\n\nFaço um sinal a um[my_knight.Custom('ES_OA')] de meus [my_knight.GetWomenMen] para fechar as portas. Despeço-me dos convidados: "Que verdadeira pena...""
 feast.7110.a: "Um trabalho bem feito."
 feast.7110.a.failure: "Da próxima vez, pegarei [honorary_guest.GetHerHim]..."
 feast.7110.desc.target_intro: "\"Que incidente infeliz!\" lamento audivelmente ao me despedir dos meus convidados. \"Uma verdadeira pena\", concorda outra pessoa ao se despedir. \"Verdadeiramente desafortunado\", ouço dizer, enquanto o cônjuge logo se junta.\n\n"
 feast.7110.desc.target: "$feast.7110.desc.target_intro$ \"Quem poderia ter feito isso? Arruinando um banquete dessa maneira... conspiradores estão por toda parte\", murmura um cortesão, e viro-me rapidamente para meus criados. \"É hora de fechar as portas.\""
 feast.7110.desc.sneaky: "$feast.7110.desc.target_intro$ \"Que forma terrível de partir!\" diz o último, chamando os criados para ajudar, \"Sufocamento!\" \"Não é o primeiro a partir dessa forma — e certamente não será o último\", murmura o criado enquanto os cortesãos se retiram. Portas fechadas atrás deles."
 feast.7110.desc.failed: "\"Obrigado pelo magnífico banquete!\". Alguns convidados me cercaram e desejam deixar claro seu agradecimento antes de partirem. \"Um evento excelente!\". Nem consigo distinguir quem está falando, pois meu coração só presta atenção a um assunto.\n\nEncontro [honorary_guest.Custom('ES_AlAla')] [honorary_guest.GetTitledFirstName|l] junto à saída. Seu sorriso só consegue me enfurecer enquanto [honorary_guest.GetSheHe] se despede com a mão."
 murder_feast_family_opinion: "Família Morta em um Banquete"
 bloody_wedding_family_opinion: "Família Morta em um Casamento Sangrento"
 murder_feast_murderer_modifier: "Anfitrião Traidor"
 murder_feast_great_murderer_modifier: "Um Banquete Macabro"
 murder_feast_murderer_modifier_desc: "Este personagem falhou em proteger $honorary_guest$ em seu banquete."
 murder_feast_great_murderer_modifier_desc: "$murder_feast_murderer_modifier_desc$"
 feast_every_guest: "Todos os convidados"
 feast.7102.opening: "[avenging_family.Custom2('AppropriateGreeting', ROOT.Char)]"
 feast.7102.desc: "Eu sei o que você fez."
 feast.7102.a: "Considere-se sortudo por não estar lá."
 feast.7102.a.tt: "Cada membro próximo da família de [murder_guest.GetShortUIName]"
 feast.7151.t: "Hora de Partir"
 feast.7151.desc: "A luz do dia entra pelas janelas e, em um instante, todo o salão fica iluminado. A maioria dos assentos agora está vazia. Alguns servos me fazem uma reverência alegremente e se despedem.\n\n[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] sorri para mim."
 feast.7151.desc.desc_roughed_up: "A luz do dia entra pelas janelas e, em apenas um instante, todo o salão fica iluminado. A maioria dos assentos agora está vazia. Talvez não seja surpresa, vendo o que eu fiz com o lugar!\n\n"Eu os detesto profundamente, vejam o que vocês fizeram com a minha casa!", rosna [host.Custom('ES_ElLa')][host.GetTitledFirstName|l]."
 feast.7151.a: "Mas agora devo partir."
 feast.7201.t: "Um Brinde a..."
 feast.7201.desc: "O banquete está chegando ao fim e meus visitantes certamente esperam que eu dedique um pouco de atenção [goh.Custom('ES_AlAla')] [goh.GetTitledFirstName|l], [Select_CString( goh.IsFemale, 'nossa convidada estimada', 'nosso convidado estimado' )] de honra.\n\nTradicionalmente, basta um brinde de cortesia e um bom gole de [host.Custom('RegionalDrink')]. Por outro lado, tudo o que [goh.GetFirstNameNoTooltip] fez foi aparecer. Este banquete foi ideia minha, eu paguei tudo e recebi todos. Hum…"
 feast.7201.a: "E agora, um brinde! Ao [goh.Custom('ES_ElLa')] [goh.GetTitledFirstNameNoTooltip|l]!"
 feast.7201.b: "Falemos agora desse #EMP [goh.Custom2('InsultNoun', ROOT.Char)]#! do momento…"
 feast.7201.b.tt: "Você insulta [goh.GetFirstNameNoTooltip] em vez de honrar[goh.GetHerHim]"
 feast.7201.c: "E vocês são #EMP muito#! bem-vindos à minha hospitalidade."
 feast.7201.d: "Um brinde ao meu reinado!"
 feast.7202.t: "$feast.7201.t$"
 feast.7202.desc.intro: "À medida que a festa se aproxima de sua conclusão inevitável, resta um evento que todos estão esperando, o brinde [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] para o convidado de honra:"
 feast.7202.desc.honoured: "eu.\n\nÉ um momento adorável, algo que esperei ansiosamente durante toda a noite, e passa rápido demais."
 feast.7202.desc.slagged_off: "eu.\n\nNo entanto, em vez de me elogiar, como me prometeu no convite, [host.GetFirstNameNoTooltip] começa um discurso vitriólico em que questiona meu caráter, minha inteligência e minha higiene pessoal. Com #EMP lujo de detalles#!."
 feast.7202.desc.bragged: "eu.\n\nInfelizmente, [host.GetFirstNameNoTooltip], com sua habitual arrogância, me ignora por completo e escolhe tecer elogios a #EMP sí mism[host.Custom('ES_OA')]#! por ter organizado o maldito banquete. Eu deveria ter imaginado."
 feast.7202.a: "É bom ser apreciado."
 feast.7202.b: "Como você pôde fazer isso comigo?"
 feast.7202.c: "Vou me lembrar disso."
 feast.7202.adventurer_loot: "Mas o quê...? #EMP Ataque [host.GetHerHim], roube [host.Custom('GetExpensiveMeal')]!#!"
 feast.7202.c.tt: "[goh.GetFirstNameNoTooltip] levou isso para o lado pessoal"
 feast.7203.t: "$feast.7201.t$"
 feast.7203.desc.intro: "$feast.7202.desc.intro$"
 feast.7203.desc.honoured: "[goh.Custom('ES_ElLa')] [goh.GetTitledFirstName|l].\n\nÉ um discurso decente, embora um pouco prolixo, mas normalmente é assim que essas coisas acontecem. Os convidados reunidos aplaudem e vibram educadamente quando ele termina, alguns com mais entusiasmo que outros."
 feast.7203.desc.slagged_off: "[goh.Custom('ES_ElLa')] [goh.GetTitledFirstName|l].\n\nSurpreendentemente, quando [host.GetFirstNameNoTooltip] se volta para seu convidad[goh.Custom('ES_OA')], em vez de elogiar[goh.GetHerHim], dispara imediatamente um discurso vociferante e, sinceramente, bastante inspirado, no qual questiona a inteligência, o caráter moral e o cheiro geral de [goh.GetFirstNameNoTooltip]. Nós, na plateia, ficamos quase sem palavras."
 feast.7203.desc.bragged: "[goh.Custom('ES_ElLa')] [goh.GetTitledFirstName|l].\n\nSurpreendentemente, mas não tanto, [host.GetFirstNameNoTooltip] ignora em grande parte seu convidad[goh.Custom('ES_OA')] e, em vez disso, elogia a si mesm[host.Custom('ES_OA')] pela qualidade do banquete oferecido. Um pouco rude, no melhor dos casos, e a quantidade de aplausos reflete isso."
 feast.7203.a: "Ouçam! Ouçam!"
 feast.7203.b.goh_honoured: "Para ser honesto, eu nunca gostei muito d [goh.GetFirstNameNoTooltip]."
 feast.7203.b.goh_dishonoured: "Isso foi indecente."
 feast.0800.t: "$feast_header$ Um Banquete Interrompido"
 feast.0800.desc: "Meu predecessor[host.Custom('ES_XA')], [host.GetNameRegnal], abandonou sua casca mortal enquanto organizava um banquete. Tragicamente, [host.GetDeathReason].\n\n"
 feast.0800.desc.entourage: "$activity_system.1010.desc.entourage$"
 feast.0800.desc.ruler: "[Select_CString( host.IsFemale, 'la caída', 'el caído' )|U] [host.GetTitleAsName|l] não merecia morrer assim."
 feast.0800.a: "$activity_system.1010.a$"
 feast.0800.tt: "O [GetActivityType('activity_feast').GetName|l] de [host.GetShortUINameNoTooltip] foi cancelado"
 feast_events_flavor.0001.t: "Ouvi falar de você"
 feast_events_flavor.0001.desc.intro: "“[ROOT.Char.GetTitledFirstName]!” Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('guest'))], [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l] me chama pelo meu nome.\n\n"
 feast_events_flavor.0001.desc.good: ""Meu estimad[relation.Custom('ES_OA')] [guest.Custom2('RelationToMeShort', SCOPE.sC('relation_target'))] [relation_target.GetFirstName] fala afetuosamente de você\", diz orgulhosamente, tomando um gole de sua [guest.Custom('RegionalDrink')]. "Eu estava ansioso para festejar com você"."
 feast_events_flavor.0001.desc.bad: ""Meu prezado[relation.Custom('ES_OA')] [guest.Custom2('RelationToMeShort', SCOPE.sC('relation_target'))] [relation_target.GetFirstName] me diz que você é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] de espírito #EMP [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('relation_target'))]#!. Espero sinceramente que os rumores sejam falsos e que tudo não tenha passado de um simples mal-entendido"."
 feast_events_flavor.0001.aa: ""Que as famílias [ROOT.Char.GetDynasty.GetBaseNameNoTooltip] e [guest.GetDynasty.GetBaseNameNoTooltip] unam forças!"."
 feast_alliance_effect_tooltip: "[guest.Custom('ES_ElLa')|U] [guest.GetTitledFirstName|l] e eu firmamos uma [alliance|lE] mútua"
 feast_events_flavor.0001.a: "Vamos brindar por [relation_target.GetFirstNameNoTooltip]! E pelos [guest.GetDynasty.GetBaseNameNoTooltip]!"
 feast_events_flavor.0001.b: ""E eu também só tenho palavras boas para [relation_target.GetSheHe]"."
 feast_events_flavor.0001.c: "Jamais confiarei em um [guest.Custom('ES_XA')] [guest.GetDynasty.GetBaseNameNoTooltip]."
 feast_events_flavor.0001.d: ""Peço desculpas pelos meus erros passados"."
 feast_events_flavor.0001.e: ""Não estou aqui para falar sobre [relation_target.GetSheHe]!"."
 feast_events_flavor.0002.t: "Perdoar é divino"
 feast_events_flavor.0002.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('former_rival'))] e [Concept('rival',Select_CString(former_rival.IsFemale,'antiga rival', 'antigo rival'))|E], [former_rival.Custom('ES_ElLa')] [former_rival.GetTitledFirstName|l], caminha até minha mesa com duas taças na mão, [former_rival.Custom('quirk_pos_pp')] antes de se sentar [former_rival.Custom('quirk_pos_adverb')] em uma cadeira vazia ao meu lado. Logo, estamos ambos imersos em conversa, relembrando antigas rivalidades."
 feast_events_flavor.0002.a: "Não sinto falta alguma das suas cutucadas, querid[former_rival.Custom('ES_OA')] [former_rival.GetTitledFirstName|l]…"
 feast_events_flavor.0002.b: "Que aqueles que antes estiveram [Select_CString(And(ROOT.Char.IsFemale, former_rival.IsFemale), 'enfrentadas', 'enfrentados')] , hoje estejam mais próximos do que nunca!"
 feast_events_flavor.0002.c: "Obrigado por me lembrar; afastem-se, espécie de [former_rival.Custom2('InsultNoun', ROOT.Char)] [former_rival.Custom2('InsultAdjective', ROOT.Char)]!"
 feast_events_flavor.0002.c.vengeful_sinful.tt: "Você perderá [piety|lE] porque sua [faith|lE] [THIS.GetCharacter.GetFaith.GetAdjective|l] considera [virtuous|lE] o [trait|lE] [GetTrait('forgiving').GetName( GetNullCharacter )] ou [sinful|lE] o traço [GetTrait('vengeful').GetName( GetNullCharacter )]"
 feast_events_flavor.0002.c.forgiving_sinful.tt: "Você ganhará [piety|lE] porque sua [faith|lE] [THIS.GetCharacter.GetFaith.GetAdjective|l] considera [virtuous|lE] o [trait|lE] [GetTrait('vengeful').GetName( GetNullCharacter )] ou [sinful|lE] o traço [GetTrait('forgiving').GetName( GetNullCharacter )]"
 feast_events_flavor.0002.d: "Mais [former_rival.Custom('RegionalAlcoholicDrink')] para esta espécie de [former_rival.Custom2('InsultNoun', ROOT.Char)] [former_rival.Custom('ComplimentAdjective')]!"
 feast_events_flavor.0002.d.virtuous: "A atitude mais [ROOT.Char.GetFaith.GetReligion.GetAdjective] é dar a outra face."
 feast_events_flavor.0002.d.virtuous.tt: "Esta opção está disponível porque sua[faith|lE] [THIS.GetCharacter.GetFaith.GetAdjective|l] considera[virtuous|lE] o [trait|lE] [GetTrait('forgiving').GetName( GetNullCharacter )] ou [sinful|lE] o traço [GetTrait('vengeful').GetName( GetNullCharacter )]"
 feast_turning_the_other_cheek_modifier: "Dar a Outra Face"
 feast_turning_the_other_cheek_modifier_desc: "Este personagem é célebre por sua disposição em superar as antigas rixas."
