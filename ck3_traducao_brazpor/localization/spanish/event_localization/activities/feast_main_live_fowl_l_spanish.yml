l_spanish:
 feast_main_live_fowl.0002.t: "Aviário de [fowl_dinner_target.GetFirstName]"
 feast_main_live_fowl.0002.entremets_served: "Os criados carregavam entremeses impressionantemente adornados: muitos [ROOT.GetCharacter.Custom('exotic_fowl_type')]s exóticos, esfolados, cozidos e recheados, depois vestidos novamente com suas magníficas plumagens. Mas, quando [fowl_dinner_target.GetTitledFirstName|l] aproximou o punhal de um deles… o ave soltou um grito agudo! Esta não estava cozida de verdade! Bicou o nariz de [fowl_dinner_target.GetFirstName], antes de sair em disparada entre os convidados que gritavam e riam."
 feast_main_live_fowl.0002.bird_killed: "\n\nA fuga do [ROOT.GetCharacter.Custom('exotic_fowl_type')] terminou logo, quando [fowl_bird_killer.GetTitledFirstName|l] se levantou de seu assento e o agarrou pelo pescoço com fria eficiência. Com uma torção das mãos, um estalo alto fez todo o salão ficar em silêncio. O silêncio só era quebrado pelos gemidos de dor de [fowl_dinner_target.GetFirstName] enquanto segurava o nariz sangrando."
 feast_main_live_fowl.0002.bird_chased_by_character: "\n\nQuando a ave corria descontrolada, [fowl_bird_chaser.GetTitledFirstName|l] aceitou o desafio. Foi muito divertido ver[fowl_bird_chaser.GetHerHim] perseguir desesperadamente a criatura enfurecida entre as mesas. Por fim, conseguiu assustar o [ROOT.GetCharacter.Custom('exotic_fowl_type')] em direção às portas do grande salão, onde escapou para o ar fresco sob as estrelas claras."
 feast_main_live_fowl.0002.bird_chased_away: "\n\nEnquanto o [ROOT.GetCharacter.Custom('exotic_fowl_type')] corria solto, uma multidão de criados tentava impedir que ele derrubasse outros pratos. A melhor diversão veio na forma do cozinheiro correndo atrás dele com sua concha, o que finalmente fez a ave sair pelas grandes portas do salão, onde escapou para a noite."
 feast_main_live_fowl.0002.a: "Que confusão!"
 feast_main_live_fowl.0003.t: "Aviário de [fowl_dinner_target.GetFirstName]"
 feast_main_live_fowl.0003.entremets_served: "Os criados carregavam entremeses impressionantemente ornados: uma série de orgulhosos [ROOT.GetCharacter.Custom('exotic_fowl_type')]s exóticos, esfolados, cozidos e recheados, e depois vestidos novamente com suas magníficas plumagens. Porém, quando [fowl_dinner_target.GetTitledFirstName|l] aproximou a faca de um deles... a ave despertou com um guincho! Não estava cozida de jeito nenhum! Ela bicou o nariz de [fowl_dinner_target.GetFirstName], antes de sair em disparada entre os convidados que gritavam e riam."
 feast_main_live_fowl.0003.bird_killed: "\n\nA fuga do [ROOT.GetCharacter.Custom('exotic_fowl_type')] terminou logo, quando [fowl_bird_killer.GetTitledFirstName|l] se levantou de seu assento e o agarrou pelo pescoço com fria eficiência. Com uma torção das mãos, um forte estalo deixou todo o salão em silêncio.\n\nO silêncio foi rompido pelos gemidos de dor de [fowl_dinner_target.GetFirstName] enquanto segurava o nariz ensanguentado."
 feast_main_live_fowl.0003.bird_chased_by_character: "\n\nQuando a ave corria descontrolada, [fowl_bird_chaser.GetTitledFirstName|l] aceitou o desafio. Foi muito divertido ver[fowl_bird_chaser.GetHerHim] perseguir desesperadamente a criatura enlouquecida por entre as mesas. Por fim conseguiu espantar o [ROOT.GetCharacter.Custom('exotic_fowl_type')] em direção às portas do grande salão, por onde escapou e se embrenhou na noite."
 feast_main_live_fowl.0003.bird_chased_away: "Enquanto a [ROOT.GetCharacter.Custom('exotic_fowl_type')] corria descontrolada, uma multid?o de criados tentava impedi-la de derrubar outros pratos e arruinar a refei??o. O melhor entretenimento veio quando o cozinheiro a perseguiu com sua concha, at? finalmente expulsar a ave pelas portas do grande sal?o, por onde ela escapou para a noite."
 feast_main_live_fowl.0003.a: "Ah, nenhum banquete está completo sem uma brincadeira."
 feast_main_live_fowl.0004.t: "Aviário de [fowl_dinner_target.GetFirstName]"
 feast_main_live_fowl.0004.entremets_served: "Entre as refeições, os criados trazem pratos impressionantemente adornados como sobremesas, exibindo a habilidade dos cozinheiros do anfitrião. Um dos pratos orgulhosos eram várias aves [ROOT.GetCharacter.Custom('exotic_fowl_type')], depenadas, cozidas e recheadas, e depois vestidas novamente com suas plumagens magníficas.\nQuando eu aproximei minha faca, a ave acordou com um grito! Uma das aves [ROOT.GetCharacter.Custom('exotic_fowl_type')] não tinha sido cozida de jeito nenhum! Ela bicou o meu nariz antes de sair correndo entre os convidados gritando e rindo."
 feast_main_live_fowl.0004.bird_killed: "\n\nA fuga do [ROOT.GetCharacter.Custom('exotic_fowl_type')] terminou logo, quando [fowl_bird_killer.GetTitledFirstName|l] se levantou de seu assento e o agarrou pelo pescoço com fria eficiência. Com um giro de mãos, um estalo alto deixou todo o salão em silêncio.\n\nSentei-me gemendo de dor, apertando meu nariz sangrando e amaldiçoando o nome de nosso anfitrião."
 feast_main_live_fowl.0004.bird_chased_by_character: "\n\nEnquanto a ave corria descontrolada, [fowl_bird_chaser.GetTitledFirstName|l] se ergueu para enfrentar o desafio e perseguiu desesperadamente a criatura enlouquecida. Ao final, conseguiu assustar o [ROOT.GetCharacter.Custom('exotic_fowl_type')] em direção às portas do grande salão, por onde escapou.\n\nEu me sentei gemendo de dor, segurando meu nariz ensanguentado e amaldiçoando o nome de nosso anfitrião."
 feast_main_live_fowl.0004.bird_chased_away: "\n\nConforme a [ROOT.GetCharacter.Custom('exotic_fowl_type')] corria solta, uma multidão de criados tentava impedi-la de derrubar outros pratos. O melhor entretenimento veio quando o cozinheiro a perseguia com sua concha, o que finalmente fez a ave sair pelas portas do grande salão, onde ela escapou para a noite.\nEu fiquei sentado gemendo de dor, segurando meu nariz sangrando e amaldiçoando o nome de nosso anfitrião."
 feast_main_live_fowl.0004.a: "As aves são muito mais fortes do que você pensa..."
 feast_main_live_fowl.0005.t: "Aviário de [fowl_dinner_target.GetFirstName]"
 feast_main_live_fowl.0005.entremets_served: "Os servos carregavam entremets impressionantemente adornados: muitos [ROOT.GetCharacter.Custom('exotic_fowl_type')]s exóticos, esfolados, cozidos e recheados, e então revestidos novamente com sua magnífica plumagem. Porém, quando [fowl_dinner_target.GetTitledFirstName|l] aproximou a faca de um deles… a ave despertou com um guincho! Bicou o nariz de [fowl_dinner_target.GetFirstName], antes de sair correndo entre os convidados que gritavam e riam."
 feast_main_live_fowl.0005.bird_killed: "\n\nEu finalmente tive o suficiente, e quando a ave passou por perto, eu a agarrei pelo pescoço. O salão ficou em silêncio enquanto eu torcia seu pescoço até ele quebrar. A bagunça amassada de penas permaneceu no chão até o fim da refeição."
 feast_main_live_fowl.0005.a: "Ah, a sensação de uma vida terminando em suas mãos..."
 feast_main_live_fowl.0006.t: "Aviário de [fowl_dinner_target.GetFirstName]"
 feast_main_live_fowl.0006.entremets_served: "Os servos carregavam entremeses impressionantemente adornados: muitas [ROOT.GetCharacter.Custom('exotic_fowl_type')]s exóticos, esfolados, cozidos e recheados, e depois revestidos novamente com suas magníficas plumagens. Mas, quando [fowl_dinner_target.GetTitledFirstName|l] aproximou a faca de uma delas… o ave despertou com um grito! Ele bicou o nariz de [fowl_dinner_target.GetFirstName], antes de sair correndo entre os convidados que gritavam e riam."
 feast_main_live_fowl.0006.bird_chased_by_character: "\n\nEu aproveitei imediatamente a oportunidade para deixar uma impressão nos outros convidados. Usei meus gestos mais autoritários para comandar a ave em direção à saída. Embora ela tenha escolhido um caminho atravessando várias mesas, e embora eu talvez a tenha perseguido com um pouco de entusiasmo demais, ofereci um espetáculo impressionante. Conforme o pequeno pássaro desaparecia no ar fresco da noite, senti como se tivéssemos feito algum tipo de conexão."
 feast_main_live_fowl.0006.a: "Espera aí, as pessoas estão rindo de mim?"
 feast_main_live_fowl.1001.t: "Festa das Aves: Memórias Dolorosas"
 feast_main_live_fowl.1001.desc: "Maldita ave na festa! Eu pensei que a ferida que ela me deixou iria cicatrizar sem problemas, mas em vez disso deixou uma cicatriz horrível no meu rosto!"
 feast_main_live_fowl.1001.a: "Isso sempre me lembrará do meu verdadeiro inimigo..."
 fowl_dinner_peacock: "pavão"
 fowl_dinner_child: "pássaro colorido"
 feast_main_live_fowl.9001.t: "O Fim de um Pássaro"
 feast_main_live_fowl.9001.bird_killer: "O banquete [host_saying_goodbye.Custom('ES_DelDela')] [host_saying_goodbye.GetTitledFirstName|l] logo chegará ao fim.\n\nA maioria dos convidados parece satisfeita, exceto talvez [fowl_dinner_target.GetFirstName], que continua segurando o nariz onde o [ROOT.GetCharacter.Custom('exotic_fowl_type')] marcou.\n\nTambém parece que ninguém deseja sentar-se perto de [fowl_bird_killer.GetFirstName], após sua brutal eliminação da ave."
 feast_main_live_fowl.9001.no_bird_killer: "O banquete [host_saying_goodbye.Custom('ES_DelDela')] [host_saying_goodbye.GetTitledFirstName|l] está prestes a chegar ao fim.\n\nA maioria dos convidados parece satisfeita, exceto talvez [fowl_dinner_target.GetFirstName], que ainda está segurando o nariz onde foi marcado pelo [ROOT.GetCharacter.Custom('exotic_fowl_type')]."
 feast_main_live_fowl.9001.a: "Deveríamos fazer isso mais vezes, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host_saying_goodbye'))] eu[host_saying_goodbye.Custom('ES_OA')]!"
 feast_main_live_fowl.9002.t: "O Fim de um Pássaro"
 feast_main_live_fowl.9002.bird_killer: "Após dias e noites de alegre companhia, meu banquete está chegando ao fim.\n\nA maioria dos convidados parece contente, exceto talvez [fowl_dinner_target.GetFirstName], que continua segurando o nariz que foi marcado pelo [ROOT.GetCharacter.Custom('exotic_fowl_type')].\n\nMas também parece que ninguém quer se sentar perto de [fowl_bird_killer.GetFirstName], após sua brutal eliminação da ave."
 feast_main_live_fowl.9002.no_bird_killer: "Após dias e noites de companhia alegre, minha festa está chegando ao fim!\n\nA maioria dos convidados parece satisfeita, exceto talvez [fowl_dinner_target.GetFirstName], que ainda segura o nariz onde a [ROOT.GetCharacter.Custom('exotic_fowl_type')] o marcou."
 feast_main_live_fowl.9002.a: "Deveríamos fazer isso com mais frequência!"
 feast_main_live_fowl.9003.bird_killer: "O banquete está prestes a acabar, enfim!\n\nParece que todos os outros parecem ter se divertido, enquanto eu tenho que aturar a dor causada por esse maldito [ROOT.GetCharacter.Custom('exotic_fowl_type')]!\n\nImagino que eu deva agradecer a [fowl_bird_killer.GetFirstName] por ter dado fim de maneira tão eficiente a essa criatura infernal maligna. Só fico um pouco preocupado em me aproximar demais de [fowl_bird_killer.GetSheHe]."
 feast_main_live_fowl.9003.no_bird_killer: "O festim está prestes a acabar, enfim!\n\nParece que todos os outros se divertiram no evento, enquanto eu tenho que aguentar a dor causada por esse maldito [ROOT.GetCharacter.Custom('exotic_fowl_type')]! Eu esperava um tratamento melhor [host_saying_goodbye.Custom('ES_DelDela')] [host_saying_goodbye.GetTitledFirstName|l].\n\nNão importa, eu vou mostrar a todos no próximo festim!"
 feast_main_live_fowl.9003.a: "Sim, sim, em breve tudo acabará."
 feast_main_live_fowl.9004.desc: "O banquete [host_saying_goodbye.Custom('ES_DelDela')] [host_saying_goodbye.GetTitledFirstName|l] logo chegará ao fim. As pessoas riem até me verem e então se calam de repente. Sei que a imagem de me ver quebrar o pescoço daquele pássaro ficou gravada a fogo em suas memórias. Sei também que certamente me lembrarei muito bem da sensação da vida escapando daquele corpo indefeso.\n\nÉ bom saber que todos se preocupam, nem que seja um pouco."
 feast_main_live_fowl.9004.a: "Esta não foi uma festa tão terrível."
 feast_main_live_fowl.9005.desc: "A festa [host_saying_goodbye.Custom('ES_DelDela')] [host_saying_goodbye.GetTitledFirstName|l] logo acabará. Parece que a maioria dos convidados se divertiu até agora, embora eu desejasse que recordassem um pouco menos de eu ter corrido sobre as mesas.\nPelo menos [fowl_dinner_target.GetFirstName] me agradeceu por ter expulsado o pássaro depois que [fowl_dinner_target.Custom('ES_LoLa')] o atacou."
 feast_main_live_fowl.9005.a: "Na próxima festa, estarei um pouco mais calmo."
 feast_live_fowl_log_title: "Ataque de Pássaro"
 feast_live_fowl_log: "[TARGET_CHARACTER.Custom('ES_ElLa')|U] [TARGET_CHARACTER.GetTitledFirstName|l] foi atacad[TARGET_CHARACTER.Custom('ES_OA')] por um pássaro vivo à mesa do jantar."
