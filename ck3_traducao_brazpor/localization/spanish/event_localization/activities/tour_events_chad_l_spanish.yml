l_spanish:
 tour_grounds_events.6000.t: "Um Encontro Inesperado"
 tour_grounds_events.6000.desc: "Ficar com os vassalos e mudar de ares tem sido bom, mas os constantes cambios de disposição se tornam cada vez mais confusos. Quando me deixam por conta própria, raramente sei onde procurar o que preciso… como onde poderia encontrar um lanche da meia-noite.\n\nTateando desajeitadamente pelo/pela [stop_host_scope.Custom('FortifiedBuilding')] de [stop_host_scope.GetTitledFirstName|l], abro uma porta por acaso e me deparo com"
 tour_grounds_events.6000.desc.three_consorts: "[stop_host_scope.GetFirstNameNoTooltip] e suas consorte, [orgy_consort_1.GetFirstNameNoTooltip], [orgy_consort_2.GetFirstNameNoTooltip] e [orgy_consort_3.GetFirstNameNoTooltip], parados perigosamente próximos, aparentemente à beira de algo #EMP íntimo#!\n\n"
 tour_grounds_events.6000.desc.one_consort: "e [stop_host_scope.GetFirstNameNoTooltip] e seu [stop_host_scope.Custom2('RelationToMeShort',orgy_consort_1)], em posição precária e muito próximos, ao que tudo indica à beira de algo #EMP íntimo#!. As velas iluminam suavemente a sala e o doce aroma de lavanda preenche o ar.\n\n"
 tour_grounds_events.6000.desc.outro: "Meu vassal[stop_host_scope.Custom('ES_OA')] esboça um sorriso irônico e me chama para me aproximar."
 tour_grounds_events.6000.a: "A tentação é grande demais..."
 tour_grounds_events.6000.b: "\"Eu pensei que você nunca fosse perguntar!\""
 tour_grounds_events.6000.c: "Não vou me sujar nessa imundície!"
 tour_grounds_events.6100.t: "[tour_grounds_event_location.Custom('GetSpecialBuildingNameFromProvince')]"
 tour_grounds_events.6100.desc.intro: ""E isto, meu [ROOT.Char.GetLadyLord] é [tour_grounds_event_location.Custom('GetSpecialBuildingNameFromProvince')]!", exclama [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l] quando estamos à vista da impressionante [stop_host_scope.Custom('GetFaithGrandTemple')].\n\n"
 tour_grounds_events.6100.desc.cynical: "Tenho temido essa excursão planejada durante toda a minha estadia aqui em [tour_grounds_event_location.GetName]. Não tenho uma relação próxima com [ROOT.Char.GetFaith.HighGodName] e não pretendo cultivar uma agora. No entanto, isso parece #EMP impressionante#!.\n\nTalvez eu possa aprender algo com isso, mas preciso pensar em algo para dizer..."
 tour_grounds_events.6100.desc.zealous: "Admiro-me ante a maravilha das obras [ROOT.Char.faith.HighGodNamePossessive] no mundo. Este edifício é a divindade manifestada."
 tour_grounds_events.6100.desc: "Fico maravilhado com essa construção milagrosa. Os detalhes trabalhados em cada canto são belos e contrastam com a paz sentida no coração. Este é verdadeiramente um lugar especial para adorar [ROOT.Char.GetFaith.HighGodName]."
 tour_grounds_events.6100.a: "Deveria acender uma vela por meu amad[tour_grounds_6100_beloved_char.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', tour_grounds_6100_beloved_char)], [tour_grounds_6100_beloved_char.GetFirstNameNoTooltip]."
 tour_grounds_events.6100.a.tt: "Acende uma vela para honrar piedosamente a memória de seu [ROOT.Char.Custom2('RelationToMe', tour_grounds_6100_beloved_char)]."
 tour_grounds_events.6100.b: "Deveria rezar por meu amad[tour_grounds_6100_beloved_char.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', tour_grounds_6100_beloved_char)], [tour_grounds_6100_beloved_char.GetFirstNameNoTooltip]."
 tour_grounds_events.6100.b.tt: "Honras a memória de seu [ROOT.Char.Custom2('RelationToMe', tour_grounds_6100_beloved_char)] em oração."
 tour_grounds_events.6100.c: "\"Como essa maravilha foi construída?\""
 tour_grounds_events.6100.d: "Devo tentar fingir interesse o máximo possível."
 tour_grounds_events.6100.d.success: "[stop_host_scope.GetFirstNameNoTooltip] não percebe seu cinismo."
 tour_grounds_events.6100.d.failure: "[stop_host_scope.GetFirstNameNoTooltip] desaprova seu cinismo."
 tour_grounds_events.6200.t: "Colheita Abundante"
 tour_grounds_events.6200.desc: "Meu vassalo, [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l] me trouxe para ver o bem cuidado objeto de seus cuidados:"
 tour_grounds_events.6200.desc.pastures: "uns pastos. O gado vagueia livremente por estas terras. \"Essas feras produzem mais do que sabemos o que fazer com isso!"
 tour_grounds_events.6200.desc.orchard: "pomares. \"Nossas árvores dão cestos e mais cestos de frutas suculentas a cada estação."
 tour_grounds_events.6200.desc.cereal_fields: "plantações. \"Nosso povo já não se preocupa mais com a fome ou a escassez."
 tour_grounds_events.6200.desc.hill_farms: "fazendas nas colinas. \"Fizemos o nosso melhor para maximizar o espaço limitado para a agricultura nessas colinas, e com grande sucesso, eu diria."
 tour_grounds_events.6200.desc.plantations: "plantações. \"As tâmaras que produzimos aqui são nosso orgulho e alegria. Elas também são #EMP altamente#! procuradas pelos comerciantes."
 tour_grounds_events.6200.outro: "Somos realmente abençoados aqui em [tour_grounds_event_location.GetName]\", diz [stop_host_scope.GetSheHe] com um sorriso satisfeito.\n\nParece que minha [Select_CString( stop_host_scope.IsFemale, 'querida vassala', 'querido vassalo' )] tem me ocultado os segredos de seu sucesso."
 tour_grounds_events.6200.a: "[stop_host_scope.GetSheHe|U] deveria contribuir mais para o reino!"
 tour_grounds_events.6200.a.tt: "Você tenta aumentar a contribuição [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] ao domínio"
 tour_grounds_events.6200.b: "\"Devo levar esse conhecimento de volta para [root_capital_scope.GetNameNoTooltip].\""
 tour_grounds_events.6200.c: "\"É reconfortante ver meu povo prosperando.\""
 tour_grounds_events.6201.t: "$tour_grounds_events.6200.t$"
 tour_grounds_events.6201.desc: "Ao mostrar [tour_grounds_event_location.GetName] [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitledFirstName|l] e a maravilhosa abundância que aqui nos orgulhamos de produzir, ele começa a agir de forma distante. Após vários minutos de silêncio, ele finalmente fala:\n\nVejo que vocês estão prosperando aqui e cuidando bem de [tour_grounds_event_location.GetNameNoTooltip]. Creio que é hora de revermos nossos acordos. Por sua honra, parte dos lucros de seus empreendimentos pertencem legitimamente à coroa."
 tour_grounds_events.6201.a: "Um aumento de imposto parece razoável o suficiente..."
 tour_grounds_events.6201.a.tt: "O vassalo concorda com o aumento de impostos."
 tour_grounds_events.6201.b: "Uma parcela única do lucro deve ser suficiente."
 tour_grounds_events.6201.b.tt: "O vassalo compartilha os lucros."
 tour_grounds_events.6201.c: "Os lucros do meu trabalho me pertencem sozinho!"
 tour_grounds_events.6201.c.tt: "O vassalo se recusa a compartilhar os lucros."
 tour_grounds_events.6202.t: "Mãos Cobiçosas"
 tour_grounds_events.6202.desc: "[stop_host_scope.GetTitledFirstName] e eu caminhamos tranquilamente pelo porto comercial de [event_location.GetName]. Meu vassal[stop_host_scope.Custom('ES_OA')] aponta os muitos mercadores diferentes que trouxe ao porto e as excelentes mercadorias vendidas aqui. Enquanto mantemos uma conversa proveitosa sobre o comércio marítimo, uma criança esbarra em mim e corre para a multidão de compradores e marinheiros.\n\nA princípio, considero que não passa de uma criança que ainda não aprendeu boas maneiras, mas logo percebo que minha bolsa de ouro… #EMP ¡ha volado!#!"
 tour_grounds_events.6202.a: "\"[stop_host_scope.GetFirstNameNoTooltip]! #EMP Faça algo!#!\""
 tour_grounds_events.6202.a.tt: "Voc? encarrega seu vassal[stop_host_scope.Custom('ES_OA')] de capturar o ladr?o"
 tour_grounds_events.6202.a.success: "[stop_host_scope.GetFirstNameNoTooltip] tem sucesso."
 tour_grounds_events.6202.a.failure: "[stop_host_scope.GetFirstNameNoTooltip] falha."
 tour_grounds_events.6202.b: "Ninguém rouba de mim!"
 tour_grounds_events.6202.b.success: "A criança ladra é capturada."
 tour_grounds_events.6202.b.failure: "A criança ladra se perde na multidão."
 tour_grounds_events.6202.c: "Essa criança deve precisar mais do que eu..."
 tour_grounds_events.6203.t: "$tour_grounds_events.6202.t$"
 tour_grounds_events.6203.desc: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitledFirstName|l] e eu passeamos tranquilamente pelo porto comercial de [event_location.GetName]. Aponto os muitos mercadores diferentes que trouxe ao porto e as excelentes mercadorias vendidas aqui. Enquanto mantemos uma conversa proveitosa sobre o comércio marítimo, uma criança esbarra em meu [visiting_liege.GetLadyLord] e corre para a multidão de compradores e marinheiros.\n\nNo início, [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstNameNoTooltip|l] não liga para isso, mas logo percebe que a criança roubou seu ouro!\n\n"Façam alguma coisa a respeito #EMP de inmediato#! de imediato[ROOT.Char.GetFirstNameNoTooltip]!", grita, fumegando…"
 tour_grounds_events.6203.a: "Substituir o que foi roubado é a maneira mais fácil."
 tour_grounds_events.6203.toast: "[stop_host_scope.GetShortUINameNoTooltip] repõe o ouro roubado."
 tour_grounds_events.6203.b: "\"Depois daquele pequeno ladrão!\""
 tour_grounds_events.6203.c: "Isso não é meu problema."
 tour_grounds_events.6204.t: "$tour_grounds_events.6202.t$: Capturado"
 tour_grounds_events.6204.desc.caught_by_liege: "Rapidamente corro atrás de [Select_CString( tiny_thief.IsFemale, 'la ladronzuela', 'el ladronzuelo' )]o a recuperar o ouro que foi roubado de mim, contra vento e maré.[ROOT.Char.Custom('ES_OA')] a recuperar o ouro que me roubaram, contra vento e maré.\n\nSem perder[tiny_thief.GetHerHim] de vista, me aproximo rapidamente de [tiny_thief.GetSheHe], embora consiga se esquivar rapidamente para baixo das muitas mesas dos mercadores e zigzaguear entre a multidão.\n\nMas logo consigo encurralar[tiny_thief.GetHerHim] contra a beira de um cais. A perseguição acabou."
 tour_grounds_events.6204.desc.caught_by_vassal: "Depois de gritar para [stop_host_scope.GetTitledFirstName|l] que fizesse algo com essa peste que tinha roubado meu ouro, saiu correndo atrás de [tiny_thief.GetSheHe].\n\nVejo [stop_host_scope.GetFirstNameNoTooltip] de volta triunfante com [Select_CString( tiny_thief.IsFemale, 'a ladrazinha', 'o ladrãozinho' )] pendurado(a) em seu forte braço.\n\nPerdoai-me, meu/minha [ROOT.Char.GetLadyLord]. Sinto vergonha de que algo assim tenha acontecido convosco aqui, sob minha proteção. Encontrei [Select_CString( tiny_thief.IsFemale, 'a dita', 'o dito' )] [tiny_thief.Custom('GirlBoy')], assim como vosso ouro. Trouxe ambos até vós para que façais o que quiserdes."
 tour_grounds_events.6204.a: "\"Eu pegarei meu ouro e seguirei meu caminho.\""
 tour_grounds_events.6204.b: "\"Tenho grandes planos para suas habilidades #EMP...#!\""
 tour_grounds_events.6205.t: "$tour_grounds_events.6202.t$: Perdido"
 tour_grounds_events.6205.desc: "Depois de gritar para [stop_host_scope.GetTitledFirstName|l]que fizesse algo com aquele traste que tinha roubado meu ouro, ele saiu correndo atrás de [tiny_thief.GetSheHe].\n\nVejo [stop_host_scope.GetFirstNameNoTooltip] voltando cabisbaixo[stop_host_scope.Custom('ES_OA')]; porém [Select_CString( tiny_thief.IsFemale, 'de la ladronzuela', 'del ladronzuelo' )]não há nem sinal dele. Com medo no olhar e as mãos trêmulas, meu vassal[stop_host_scope.Custom('ES_OA')] balbucia:\n\n\"Lamento profundamente, meu [ROOT.Char.GetLadyLord], mas o menino foi perdido.[Select_CString( tiny_thief.IsFemale, 'a la dichosa', 'al dichoso' )] [tiny_thief.Custom('GirlBoy')]. Nem meus guardas nem eu conseguimos encontrar[tiny_thief.GetHerHim]. Temo que vosso ouro se foi\"."
 tour_grounds_events.6205.a: "Não irei embora sem o meu ouro."
 tour_grounds_events.6205.a.success: "[stop_host_scope.GetShortUINameNoTooltip|U] repõe o ouro roubado"
 tour_grounds_events.6205.a.failure: "Ouro roubado perdido para sempre"
 tour_grounds_events.6205.b: "Um preço deve ser pago..."
 tour_grounds_events.6205.b.flavor: "Você bate em [stop_host_scope.GetFirstNameNoTooltip] por sua insolência."
 tour_grounds_events.6205.c: "Você tem sorte de eu ser do tipo que perdoa."
 tour_grounds_events.6300.t: "Uma Chance de se Apresentar"
 tour_grounds_events.6300.desc: "Enquanto [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l] me mostra [event_location.GetName], chegamos aos campos de treinamento militar. Todos os seus homens de armas se reuniram e o ar vibra de expectativa. [stop_host_scope.GetFirstNameNoTooltip] sorri de orelha a orelha.\n\n«[ROOT.Char.Custom('FormOfAddressForLiege')|U], ouvimos muitas histórias sobre sua grande destreza. Seria uma negligência da minha parte deixar passar a oportunidade de mostrar a estes soldados como é uma #EMP verdadera#! sessão de sparring de verdade! Lutaria com [target_knight.GetFirstName] pelo bem do reino?»."
 tour_grounds_events.6300.a: "Vou mostrar a eles como é feito."
 tour_grounds_events.6300.a.success: "Você vence a luta de treinamento"
 tour_grounds_events.6300.a.failure: "Você perde a luta de treinamento"
 tour_grounds_events.6300.flavor: "Você luta contra [target_knight.GetFirstNameNoTooltip] em combate singular."
 tour_grounds_events.6300.b: "Certamente [tg_6300_stand_in.GetFirstNameNoTooltip] forneceria uma melhor instrução!"
 tour_grounds_events.6300.b.success: "[tg_6300_stand_in.GetShortUINameNoTooltip|U] venceu a luta de treinamento"
 tour_grounds_events.6300.b.failure: "[tg_6300_stand_in.GetShortUINameNoTooltip|U] perdeu a luta de treinamento"
 tour_grounds_events.6300.c: "Devo recusar educadamente."
