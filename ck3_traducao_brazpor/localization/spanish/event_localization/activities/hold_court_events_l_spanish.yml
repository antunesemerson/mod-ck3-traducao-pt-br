l_spanish:
 hold_court_placeholder_gain_cgv: "Você ganha #P 10#! de Grandeza da Corte"
 hold_court_placeholder_lose_cgv: "Você perde #N 10#! de Grandeza da Corte"
 hold_court_start_activity: "Você ouve o primeiro peticionário"
 hold_court_header: "Realizar Audiência:"
 #Activity Start
 hold_court.0001.t: "$hold_court_header$ Início"
 hold_court.0001.desc: "Sentad[ROOT.Char.Custom('ES_OA')] no trono, faço um gesto aos guardas para que abram as portas do salão. Entra uma torrente de pessoas; algumas se alinham diante do trono enquanto outras se afastam para simplesmente observar os procedimentos.

Passados alguns instantes, todo movimento na câmara cessou, e todos os rostos se voltaram para mim, expectantes. À minha frente conto [ROOT.Var('num_petitioners').GetValue|V0] peticionários alinhados em uma fileira ordenada, à espera de que eu os chame."
 hold_court.0001.a: "Sua audiência termina e você manda os peticionários embora"
 hold_court.0001.b: "Pensando bem, está um dia bonito lá fora..."
 hold_court.0001.b.tooltip: "Espionagem Indireta"
 #Guest offers to share rumors from a nearby foreign realm.
 hold_court.1001.t: "Uma quantia considerável, mas não posso me dar ao luxo de permanecer ignorante."
 hold_court.1001.desc: "Meu convidad[rumormonger.Custom('ES_OA')] [rumormonger.GetTitledFirstName|l] se aproxima do trono com um sorriso maroto no rosto e se inclina profundamente.

"[rumormonger.GetTitledFirstName] revela a você todos os [secret|lE] relevantes que conhece"
 hold_court.1001.a: "A informação de [rumormonger.GetTitledFirstName|l] não passa de fofoca vazia"
 hold_court.1001.a.seducer: "Na verdade [rumormonger.GetTitledFirstName|l] não conhece [secrets|lE] relevantes"
 hold_court.1001.a.success: "Ninguém me extorque diante da minha própria corte! Guardas, prendam [rumormonger.GetHerHim]!"
 hold_court.1001.a.success.tt: "Fora, fofoqueir[rumormonger.Custom('ES_OA')]! Em minha corte não há lugar para gente como você!"
 hold_court.1001.a.failure: "A informação de [rumormonger.GetTitledFirstName|l] não passa de fofoca vazia"
 hold_court.1001.a.failure.tt: "Um Direito para a Guerra"
 hold_court.1001.b: ""Oh, generos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Sou [claimant_guest.GetFirstName], e viajei de longe para pedir sua ajuda para reparar uma grande injustiça!"

[claimant_guest.GetWomanMan|U] diante de mim se inclina profundamente antes de continuar com sua súplica bem ensaiada. "[target_character.Custom2('MyCharacterIntroduction', claimant_guest)|U] ocupa agora o trono de [target_title.GetNameNoTier], mas eu sou [claimant_guest.Custom('ES_OA')] legítim[claimant_guest.Custom('ES_OA')] governante dessas terras!"

"Se me ajudar a reivindicar meus direitos, juro fidelidade a você e servirei com lealdade até o fim dos meus dias.""
 hold_court.1001.c: "Reivindicarei seus direitos ainda este ano!"
 #Wandering claimant asks you to press their claim NOW!!
 hold_court.1011.t: "Não posso ajudar você, mas por favor aproveite minha hospitalidade."
 hold_court.1011.desc: ""Oh, generos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Sou [claimant_guest.GetFirstName], e viajei de longe para pedir sua ajuda para reparar uma grande injustiça!"

[claimant_guest.GetWomanMan|U] diante de mim se inclina profundamente antes de continuar com sua súplica bem ensaiada. "Um[peasant.Custom('ES_XA')] camponês[peasant.Custom('ES_OA')] magrel[peasant.Custom('ES_OA')] e esfarrapad[peasant.Custom('ES_OA')] está diante de mim, olhando boquiabert[peasant.Custom('ES_OA')] a opulência do meu salão do trono. Obviamente distraíd[peasant.Custom('ES_OA')], chamo [peasant.Custom('ES_LoLa')] para que preste atenção.

"Ah, desculpe-me, [ROOT.Char.Custom('FormOfAddressForLiege')]. Ah, eh... Este ano, minha aldeia em [county.GetNameNoTier] foi atingida pela praga. Perdemos não só nossa colheita, mas também nossas sementes. Não temos nada, passaremos fome sem ajuda!"

Lançando outro olhar ao meu salão do trono, acrescenta: "Certamente há riqueza de sobra, não?""

"Vamos estabelecer um sistema de compartilhamento de colheitas com as aldeias vizinhas."
 hold_court.1011.a: "Seu serviço pagará sua dívida."
 hold_court.1011.b: "Se os campos estiverem áridos, você empunhará uma espada."
 hold_court.1011.c: "[county.GetName] e cada [county|lE] do [realm|lE] com 15 ou menos [development|lE]"
 #Peasant begs for relief after a drought/early frost/etc.
 hold_court.1021.t: "$hold_court_header$ Conclusão"
 hold_court.1021.desc: "Um[peasant.Custom('ES_XA')] camponês[peasant.Custom('ES_OA')] magrel[peasant.Custom('ES_OA')] e esfarrapad[peasant.Custom('ES_OA')] está diante de mim, olhando boquiabert[peasant.Custom('ES_OA')] a opulência do meu salão do trono. Obviamente distraíd[peasant.Custom('ES_OA')], chamo [peasant.Custom('ES_LoLa')] para que preste atenção.

"É bom deixar meus súditos admirados com minha presença."

Lançando outro olhar ao meu salão do trono, acrescenta: "Esta parece ser uma boa oportunidade para socializar com minha corte."
 hold_court.1021.a: "Todo Convidado e Cortesão:"
 hold_court.1021.a.stewardship: "[rumormonger.GetShortUIName] deixa sua [court|lE]"
 hold_court.1021.b: "Seu serviço pagará sua dívida."
 hold_court.1021.c: "Se os campos estiverem áridos, você empunhará uma espada."
 county_or_15_dev: "[county.GetName] e cada [county|lE] do [realm|lE] com 15 ou menos [development|lE]"
 #Activity End
 hold_court.0021.t: "$hold_court_header$ Conclusão"
 hold_court.0021.desc: "À medida que o último peticionário parte, vários cortesãos o seguem para fora da sala, pois têm assuntos a tratar em outro lugar. Outros permanecem, conversando entre si sobre os procedimentos recentes.

Logo, a formalidade cerimonial dos procedimentos desaparece completamente, dando lugar ao murmúrio e à agitação da vida normal da corte."
 hold_court.0021.a: "Meu trabalho aqui está feito."
 hold_court.0021.arrogant: "É bom deixar meus súditos admirados com minha presença."
 hold_court.0021.shy: "Mal posso esperar para voltar aos meus aposentos..."
 hold_court.0021.gregarious: "Esta parece ser uma boa oportunidade para socializar com minha corte."
 hold_court.0021.every_guest_and_courtier: "Todo Convidado e Cortesão:"
 hold_court_1001_pool_tt: "[rumormonger.GetShortUIName] deixa sua [court|lE]"
