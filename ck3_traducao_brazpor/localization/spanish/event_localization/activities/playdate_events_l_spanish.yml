l_spanish:
 ### PHASES
 playdate_phase: "Encontro"
 ### OPTIONS
 ### INTENTS
 child_return_from_playdate_title: "Retorno da Criança"
 child_return_from_playdate_desc: "[child_scope.GetShortUIName] voltou de se encontrar com outros jovens na corte[host.LocalPlayerString( '', 'Loc_ES_de_GetShortUIName' )]"
 playdate_header: "Encontre os Colegas:"
 playdate.0010.desc: "Por que você aceitou meu convite apenas para ir ao encontro dos colegas com [other_host.GetTitledFirstName|l]?! Vou me lembrar disso."
 playdate.0010.a: "Oops."
 playdate.1001.opening_desc: "Por favor, venha encontrar seus colegas na minha corte em [barony.GetNameNoTier]!"
 playdate.1001.host_likes_me: "Espero que você participe, pois tenho esperado por uma oportunidade de te ver!"
 playdate.1001.host_dislikes_me: "Estou convidando todos que são notáveis, o que inclui você, infelizmente."
 playdate.1001.host_gets_along_with_me: "Espero que você participe, pois sentiria muito a sua falta se você não fosse!"
 playdate.1001.a: "Claro, estarei lá."
 playdate.1001.b: "Não, recuso!"
 playdate.1002.opening_desc: "Eu ficaria encantado se [child_scope.Custom2('YourCharacterIntroduction', ROOT.Char)] pudesse visitar minha corte em [barony.GetNameNoTier] para conhecer seus colegas!"
 playdate.1002.host_likes_child: "Espero que venha, pois estou com vontade de ver[child_scope.GetHerHim]!"
 playdate.1002.host_dislikes_child: "Estou convidando todos os importantes, o que infelizmente inclui [child_scope.GetHerHim] inclui."
 playdate.1002.host_gets_along_with_child: "Espero que venha, senão, [child_scope.GetHerHim] sentiria muita falta!"
 playdate.1002.a: "Claro que irá."
 playdate.1002.b: "Devo declinar."
 playdate.2001.t: "Reunião"
 playdate.2001.desc_opening: "Todos estão aqui!\n\nÀ medida que todos os pequenos senhores e damas são conduzidos para a sala, sinto-me cada vez mais animado."
 playdate.2001.desc_guest_of_interest_1_2_3: "Estou animado que [guest_of_interest_1.Custom2('MyCharacterIntroduction', ROOT.Char)] e [guest_of_interest_2.Custom2('MyCharacterIntroduction', ROOT.Char)] tenham vindo. Sem mencionar [guest_of_interest_3.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!"
 playdate.2001.desc_guest_of_interest_1_and_2: "Estou animado que tanto [guest_of_interest_1.Custom2('MyCharacterIntroduction', ROOT.Char)] quanto [guest_of_interest_2.Custom2('MyCharacterIntroduction', ROOT.Char)] tenham vindo!"
 playdate.2001.desc_guest_of_interest_1: "Estou animado que [guest_of_interest_1.Custom2('MyCharacterIntroduction', ROOT.Char)] tenha vindo!"
 playdate.2001.desc: "Estou animado em passar um tempo com outras crianças!"
 playdate.2001.desc_guest_of_interest_4: "No entanto, não fico tão contente que também tenha aparecido [guest_of_interest_4.Custom2('MyCharacterIntroduction', ROOT.Char)]. Bem, tanto faz."
 playdate.2001.a: "Bem-vindo!"
 playdate.2001.a.tt: "O encontro dos colegas começa"
 playdate.2003.t: "$playdate_header$ Uma Celebração Pobre"
 playdate.2003.desc: "Não acredito nisso! Apesar dos meus convites e preparativos, ninguém apareceu ao meu encontro de pares.\n\nPois bem. Vou aproveitar todos esses doces e brinquedos so[ROOT.Char.Custom('ES_OA')]. E... e... Por que ninguém apareceu?"
 playdate.2003.a: "Por que ninguém apareceu?"
 playdate.2501.t: "Uma Recepção Calorosa"
 playdate.2501.likes_host: "Todos estão reunidos no salão quando [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] nos dá as boas-vindas ao encontro!"
 playdate.2501.dislikes_host: "Todos estão reunidos no salão quando o[host.Custom('ES_EA')] [host.Custom2('InsultAdjective', ROOT.Char)] [host.Custom('ES_DelDela')] [host.GetTitledFirstNameNoTooltip|l] nos dá as boas-vindas ao encontro."
 playdate.2501.a: "Estou ansioso por isso!"
 playdate.2501.a_dislike: "Vamos acabar logo com isso."
 playdate.0020.t: "$playdate_header$ Fim dos Jogos"
 playdate.0020.desc: "Dizem que [host.Custom2('MyCharacterIntroduction', ROOT.Char)] faleceu, mas parece que ninguém consegue me explicar o que isso realmente significa. O que sei é que o encontro de seus pares chegou ao fim."
 playdate.0020.a: "Mas nós nos divertimos tanto!"
 playdate.0020.a.tt: "#F Bueno… hasta que desapareció.#!"
 playdate.0021.desc: "Agora que estou preso atrás das grades, meu encontro de colegas será cancelado. Ah, todas aquelas horas que passei ansioso por isso... Desperdiçadas!"
 playdate.0021.a: "Toda a diversão que poderíamos ter tido..."
 playdate.0022.desc: "[host.Custom2('MyCharacterIntroduction', ROOT.Char)|U] foi aprisionad[host.Custom('ES_OA')] e seu encontro chegou ao fim. Que azar!"
 playdate.3001.t: "Jogando Pesado"
 playdate.3001.desc: "Eu pensava que [guest.Custom2('MyCharacterIntroduction', ROOT.Char)] e [Select_CString( peasant_child.IsFemale, 'esa otra niña', 'ese otro niño' )] só estavam fingindo brigar, mas, de repente, há sangue no chão.\n\n[guest.GetFirstNameNoTooltip] rosna ao cair no chão e o camponês que está sobre [guest.GetSheHe] para atacar de novo."
 playdate.3001.a: "Eu [guest.Custom('ES_LoLa')] salvarei!"
 playdate.3001.a_injured: "Você está ferid[ROOT.Char.Custom('ES_OA')]"
 playdate.3001.b: "\"Alguém, por favor, ajude!\""
 playdate.3001.c: "Isso parece divertido, deixe-me participar!"
 playdate.3002.t: "Segredos"
 playdate.3002.desc: "É óbvio que [secret_holder.Custom2('MyCharacterIntroduction', ROOT.Char)] oculta algo.\n\nMas, justo quando estava prestes a me contar o que era, [close_participant.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproxima de nós e insiste para que eu jogue xadrez com [close_participant.GetSheHe]."
 playdate.3002.a: "Claro. Não me importo com segredos bobos."
 playdate.3002.b: "Shhh, eu quero saber o segredo!"
 playdate.3003.t: "[ROOT.Char.Custom('CatStoryName')]"
 playdate.3003.desc_opening: "Eu trago meu gato [ROOT.Char.Custom('CatStoryName')] comigo para que todos possam ver o quão incrível é o meu gatinho.\n\n"
 playdate.3003.desc_bonding_cat_opening: "\"Que gato fofo você tem! Você quer ver o meu?\""
 playdate.3003.desc_bonding_cat: "[guest.Custom2('MyCharacterIntroduction', ROOT.Char)|U] estende um gato [guest.Custom('CatFurColor')] para mim. \"O nome dele é [guest.Custom('CatStoryName')]!\""
 playdate.3003.desc_bonding_dog_opening: "\"Que gato fofo você tem! Você quer ver o meu cachorro?\""
 playdate.3003.desc_bonding_dog: "[guest.Custom2('MyCharacterIntroduction', ROOT.Char)|U] apresenta um cachorro [guest.Custom('DogFurColor')] para mim. \"O nome dele é [guest.Custom('DogStoryName')]!\""
 playdate.3003.a_cat: "Seu gato é tão fofo!"
 playdate.3003.a_dog: "Seu cachorro é tão fofo!"
 playdate.3003.b: "Oh, obrigado! Venha aqui, [guest.Custom('DogStoryName')]!"
 playdate.3003.c: "Eca, que pulguento. Nada parecido com o meu gato!"
 playdate.3004.t: "[ROOT.Char.Custom('DogStoryName')]"
 playdate.3004.desc_opening: "Eu trago meu cachorro [ROOT.Char.Custom('DogStoryName')] comigo para que todos possam ver o quão incrível é o meu filhote.\n\n"
 playdate.3004.desc_bonding_cat_opening: "\"Que cachorro fofo você tem! Você quer ver o meu gato?\""
 playdate.3004.desc_bonding_dog_opening: "\"Que cachorro fofo você tem! Você quer ver o meu?\""
 playdate.3004.b: "Oh, obrigado! Venha aqui, [guest.Custom('CatStoryName')]!"
 playdate.3004.c: "Eca, que pulguento. Nada parecido com o meu cachorro!"
 playdate.3005.t: "O segredo"
 playdate.3005.desc: "Estava falando com [guest.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre a vida na corte e os rumores recentes.\n\n\"E ouvi dizer que [secret_owner.GetTitledFirstName|l] [secret.Custom('SecretDescriptionThirdPerson')]…\"\n\nPercebo o que disse, mas já é tarde demais; [guest.GetFirstNameNoTooltip] ouviu tudo."
 playdate.3005.a: "Ah... Oops."
 playdate.3005.b: "Por favor, esqueça o que eu disse! Eu faço qualquer coisa!"
 playdate.3005.c: "Eu te pago! Apenas fique quieto!"
 playdate.3005.d: "Se você contar para alguém, eu... eu vou te machucar!"
 playdate.3005.d.success: "[guest.GetFirstNameNoTooltip] promete manter a boca fechada"
 playdate.3005.d.failure: "[guest.GetFirstNameNoTooltip] não está com medo de você"
 promise_to_keep_secret: "[guest.GetFirstNameNoTooltip] promete não revelar o [secret|lE]"
 playdate.3006.t: "Companheiro de Leitura"
 playdate.3006.desc: "Eu trouxe um pequeno livro comigo – como costumo fazer – e [fellow_nerd.Custom2('MyCharacterIntroduction', ROOT.Char)] me encontra quando estou me preparando para ler algumas páginas.\n\n\"Oh, é o #EMP [SCOPE.Custom('RandomInformativeTextName')|U]#!? Eu li recentemente, qual é a sua opinião sobre a prosa?\""
 playdate.3006.a: "Isso será uma boa discussão!"
 playdate.3006.b: "Vá embora, estou lendo."
 playdate.3007.t: "Escalando"
 playdate.3007.desc: "[participant.Custom2('MyCharacterIntroduction', ROOT.Char)|U] escalou o [ROOT.Char.Custom('ObjectToClimb')] mais alto por perto e está gesticulando entusiasmadamente para que eu o siga.\n\nNão seria a primeira vez que eu escalasse algo, mas parece uma subida longa…"
 playdate.3007.a: "Eu não vou recuar!"
 playdate.3007.a.success: "Você consegue escalar"
 playdate.3007.a.failure: "Você sofre uma queda feia"
 playdate.3007.b: "Não, acho que vou ficar aqui embaixo."
 playdate.3008.t: "Indo para um Mergulho"
 playdate.3008.desc: "[participant.Custom2('MyCharacterIntroduction', ROOT.Char)|U] correu direto para [ROOT.Char.Custom('IndefiniteBodyOfWater')] e se lançou sem hesitar.\n\nO que começou como um alegre mergulho logo se torna frenético e, de repente, desaparece sob a superfície. O tempo passa e percebo que não vai emergir, pelo menos não sem ajuda."
 playdate.3008.a: "Aguente firme, estou indo!"
 playdate.3008.a.success: "Você salva [participant.GetFirstNameNoTooltip]"
 playdate.3008.a.failure: "Você não chega a tempo"
 playdate.3008.a.critical_failure: "Você quase se afoga"
 playdate.3008.b: "Por favor, alguém, ajude!"
 playdate.3008.b.success: "Alguém ouve e ajuda"
 playdate.3008.b.failure: "Ninguém vem para o resgate"
 playdate.3008.c: "Deve ter voltado para casa…"
 playdate.3009.t: "Dia de Neve"
 playdate.3009.desc_two: "Me aproximo sorrateiramente por trás de [participant.Custom2('MyCharacterIntroduction', ROOT.Char)] e [to_blame.Custom2('MyCharacterIntroduction', ROOT.Char)] com as mãos cheias de neve, e no momento em que [participant.GetFirstNameNoTooltip] está prestes a se virar, eu ataco!"
 playdate.3009.desc_opening: "Aproximo-me sorrateiramente de [participant.Custom2('MyCharacterIntroduction', ROOT.Char)] por trás com as mãos cheias de neve e, quando está prestes a se virar, ataco!"
 playdate.3009.desc: "\n\n[participant.GetSheHe|U] grita, mas reage rapidamente; logo eu já estou batendo em retirada porque [participant.GetFirstNameNoTooltip] vem em minha direção em disparada com uma enorme bola de neve na mão!"
 playdate.3009.a: "Não vou recuar!"
 playdate.3009.a.success: "Você vence a guerra de neve"
 playdate.3009.a.failure: "Você leva uma bolada de neve congelada na cabeça"
 playdate.3009.b: "Por favor, poupe-me!"
 playdate.3009.c: "Foi [to_blame.GetFirstNameNoTooltip], não fui eu!"
 playdate.3009.c.success: "[participant.GetFirstNameNoTooltip] acredita em você"
 playdate.3009.c.failure: "Você percebe que está mentindo"
 playdate.3010.t: "Dia de Mercado"
 playdate.3010.desc: "[participant.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e eu concordamos que o comércio é uma habilidade importante para um nobre aprender, então decidimos visitar o mercado local em [ROOT.Char.GetCurrentLocation.GetName].\n\nSó temos algumas pedrinhas como moeda, mas elas são #EMP muito#! brilhantes!"
 playdate.3010.a: "Ehum, gostaria de comprar uma mercadoria, por favor."
 playdate.3010.a.success: "Você convence o comerciante a fazer uma troca"
 playdate.3010.a.failure: "O comerciante te expulsa"
 playdate.3010.b: "Você tem que me dar o que eu quero! Eu sou um[ROOT.Char.Custom('ES_XA')] #EMP [ROOT.Char.GetLadyLord]#!!"
 playdate.3010.c: "Vamos montar nossa própria barraca!"
 playdate.3010.c.tt: "Alguns comerciantes brincam e \"compram\" suas pedrinhas com folhas"
 playdate.3011.t: "Brincando de Casinha"
 playdate.3011.desc: "[participant.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim com um monte de tecido nos braços. Quando o despeja no chão à minha frente, percebo que é um monte de roupas… para adultos!\n\n"Vamos brincar de casinha juntos!""
 playdate.3011.a: "Só se nós formos os pais!"
 playdate.3011.b: "Claro. E [disliked_participant.GetFirstNameNoTooltip] é o cachorro!"
 playdate.3011.c: "Não, isso é bobagem. Vamos jogar xadrez."
 playdate.3011.c.tt: "Você aprofunda seus estudos na arte de [THIS.Char.Custom('education_focus_child')]"
 playdate.3012.t: "Bravo $knight_culture_player_plural_no_tooltip$"
 playdate.3012.desc_knight: "[participant.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e eu estamos observando os $knight_culture_player_plural_no_tooltip_lowercase$ treinarem no pátio quando [knight.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproxima de nós com um sorriso."
 playdate.3012.desc_no_knight: "[participant.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e eu estamos observando alguns camponeses treinarem quando um deles se aproxima de nós com um sorriso."
 playdate.3012.desc: "\n\n\"O que você acha, [participant.Custom('GirlsBoysChildren')], acha que consegue lidar com o básico?\""
 playdate.3012.a: "#EMP Sim!#!"
 playdate.3012.a.success: "Você aprende o básico"
 playdate.3012.a.neutral: "Não importa o quanto você tente, você simplesmente não entende"
 playdate.3012.a.failure: "Você leva uma pancada #EMP con fuerza#!"
 playdate.3012.b: "Prefiro assistir você treinar."
 playdate.3013.t: "[witch.GetWomanMan|U] sábi[witch.Custom('ES_OA')]"
 playdate.3013.desc: "Estamos brincando na floresta quando, de repente, percebo que não há mais ninguém comigo. Eu juraria que os outros estavam logo atrás de mim!\n\nQuando estou prestes a começar a gritar — só para que me encontrem, não porque tenha #EMP miedo#!—, dou de cara com [witch.Custom2('MyCharacterIntroduction', ROOT.Char)], vestid[witch.Custom('ES_OA')] com uma capa preta e inclinad[witch.Custom('ES_OA')] sobre o chão. Está olhando para uma planta de aparência estranha, comparando-a com a que aparece em um grande tomo negro aberto no chão, ao lado de \n\n"Olá, meu jovem [ROOT.Char.GetLadyLord]. Será que o chamado do conhecimento trouxe você até aqui, até mim?"."
 playdate.3013.a: "Eu só quero saber sobre aquela planta que você está segurando."
 playdate.3013.a.success: "Você aprende muito sobre ervas e plantas"
 playdate.3013.a.failure: "Você não faz ideia do que está falando."
 playdate.3013.b: "Sim, me ensine tudo o que puder!"
 playdate.3013.c: "Você... Você é uma[witch.Custom('ES_XA')] brux[witch.Custom('ES_OA')]! Você é uma pessoa ruim."
 playdate.3014.t: "O [priest.GetCouncilTitle]"
 playdate.3014.desc_participant: "Enquanto exploramos o(a) [ROOT.Char.GetFaith.HouseOfWorship] local, [participant.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e eu nos deparamos com [priest.Custom2('MyCharacterIntroduction', ROOT.Char)], cercad[priest.Custom('ES_OA')] de pergaminhos.\n\n“São diários de muito tempo atrás, vocês se interessam por essas coisas?”"
 playdate.3014.desc: "Estava explorando o/a [ROOT.Char.GetFaith.HouseOfWorship] local quando me deparo com [priest.Custom2('MyCharacterIntroduction', ROOT.Char)], cercad[priest.Custom('ES_OA')] de pergaminhos.\n\n\"São diários de muito tempo atrás, vocês se interessam por essas coisas?\""
 playdate.3014.a: "Sim! Me ensine sobre eles."
 playdate.3014.a.success: "Você se dedica à arte de escrever diários"
 playdate.3014.a.neutral: "Você aprende algumas coisas"
 playdate.3014.a.tt: "Você aprofunda seus estudos na arte de [ROOT.Char.Custom('education_focus_child')]"
 playdate.3014.a.tt_participant: "Você e [participant.GetFirstNameNoTooltip] aprofundam seus estudos na arte de [ROOT.Char.Custom('education_focus_child')]"
 playdate.3014.a.failure: "Você não aprende nada"
 playdate.3014.b: "Não, tenho interesse em que você nos conte aventuras!"
 #Learning your child drowned - by Isabella Welch
 playdate.4000.t: "Rio de lágrimas"
 playdate.4000.desc: "Chega um mensageiro com notícias funestas e uma pequena caixa preta.\n\nMeu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('drowned_participant'))], [drowned_participant.GetFirstNameNoTooltip], se afogou enquanto brincava com [host.GetTitledFirstName|l].\n\nMal consigo ver a caixa através dos meus olhos marejados, mas um olhar confirma que se trata mesmo do cadáver de meu/minha querid[drowned_participant.Custom('ES_OA')] [drowned_participant.GetFirstNameNoTooltip]."
 playdate.4000.a: "Espero que esteja jogando em [ROOT.Char.GetFaith.PositiveAfterLife]"
 playdate.4000.b: "A inocência é um veneno fatal."
 playdate.4000.c: "Desejo o mesmo destino a [host.GetTitledFirstNameNoTooltip|l]."
 playdate.4001.t: "A Barreira Linguística"
 playdate.4001.desc.rowdy: ""Eu disse #EMP "mão"#!, não #EMP "mamão"#!! Caramba!" [participant.GetTitledFirstName|l] está obviamente agitad[participant.Custom('ES_OA')] pela nossa barreira linguística. O jeito de erguer as mãos no ar dá a impressão de um chilique prestes a começar."
 playdate.4001.desc.pensive: ""Perdão… #EMP Morada#!. Ela retorna à sua humilde morada, não ao seu fardo no exterior". Apesar de seus bons modos, as sobrancelhas [participant.Custom('ES_DelDela')] [participant.GetTitledFirstName|l] se franzem em frustração."
 playdate.4001.desc: "\n\nOs idiomas [ROOT.Char.GetCulture.GetLanguage.GetName] e [participant.GetCulture.GetLanguage.GetName] parecem ter mais diferenças do que semelhanças, por isso temos dificuldade para nos entender.\n\nPosso fazer algo para que possamos brincar juntos sem ficarmos com raiva, ou devo simplesmente esperar que isso se resolva sozinho?"
 playdate.4001.a: "Vou falar devagar e alto! Isso deve ajudar!"
 playdate.4001.b: "Talvez eu possa pedir a [participant.GetFirstNameNoTooltip] que me ensine um pouco de [participant.GetCulture.GetLanguage.GetNameNoTooltip]?"
 playdate.4001.c: "Bleh, por que eu deveria me incomodar? Só quero me divertir!"
 playdate.5001.t: "Vamos Brincar?"
 playdate.5001.desc: "Uma bola quica ao meu lado e volta para os braços de [participant.GetFirstName].\n\n\"Quer jogar? Temos uma bola e poderíamos usar mais jogadores.\"\n\nA pequena multidão de crianças se reúne ao nosso redor, expectante."
 playdate.5001.a: "Vou participar!"
 playdate.5001.a.tt: "O jogo começa!"
 playdate.5001.b: "Não estou com vontade..."
 playdate.5002.t: "Mirada Desastrada"
 playdate.5002.desc: "A bola quica de forma errática ao passar por mim, ricocheteia numa parede... e entra num jardim próximo! Um instante depois, um som de estilhaços e um grito irritado anunciam as consequências que se aproximam.\n\n[neighbour.GetFirstName] sai correndo por uma porta, abraçando seu/sua [broken_artifact.GetName|l] feito em pedaços. Ao vasculhar a multidão, [neighbour.GetSheHe] me identifica como [ROOT.Char.Custom('ES_ElLa')] culpada[ROOT.Char.Custom('ES_OA')].\n\n"O que você tem a dizer em sua defesa, seu/sua fedelh[ROOT.Char.Custom('ES_OA')] ranhos[ROOT.Char.Custom('ES_OA')]?", rosna. Olho ao redor em busca de apoio. Nenhum vem."
 playdate.5002.a: "\" [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('parent'))] pagará pelos reparos!\""
 playdate.5002.a.tt: "Bem, na verdade, acho que #EMP eu#! pagarei, mas não vou ficar no prejuízo por muito tempo..."
 playdate.5002.b: "Eu ordeno que me devolvam a bola, [neighbour.Custom2('InsultNoun', ROOT.Char)]."
 playdate.5002.b.tt: "Será que esqueceu[neighbour.Custom('ES_EA')] que eu sou um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]?"
 playdate.5002.b.success: "[neighbour.GetFirstNameNoTooltip] devolve a bola obedientemente"
 playdate.5002.b.failure: "[neighbour.GetFirstNameNoTooltip] franze a testa ao devolver a bola"
 playdate.5002.c: "\"Peço desculpas. Podemos ter a bola de volta?\""
 playdate.5002.c.success: "[neighbour.GetFirstNameNoTooltip] devolve a bola com um sorriso"
 playdate.5002.c.failure: "[neighbour.GetFirstNameNoTooltip] devolve a bola com um profundo suspiro"
 playdate.5003.t: "Construído Diferente"
 playdate.5003.desc: "É que [other_child.GetFirstName] é rápid[other_child.Custom('ES_OA')] e forte demais! Toda vez que tento acompanhar, simplesmente bato em [other_child.GetSheHe]. Mesmo ao me afastar para ver[other_child.GetHerHim] brincar e chutar a bola para o outro lado do pátio, preciso de um momento para recuperar o fôlego por causa de toda a perseguição.\n\nCom certeza deve haver alguma forma de competir com [other_child.GetSheHe]?"
 playdate.5003.a: "[other_child.GetFirstNameNoTooltip] não está usando proteção para as canelas..."
 playdate.5003.b: "Só preciso me esforçar mais!"
 playdate.5003.b.success: "Você consegue acompanhar"
 playdate.5003.b.failure: "[other_child.GetFirstNameNoTooltip] é simplesmente muito forte"
 playdate.5003.c: "Talvez se eu continuar assistindo, possa aprender algo."
 playdate.5004.t: "Outra Perspectiva"
 playdate.5004.desc: "Enquanto passamos correndo, rindo e tagarelando na perseguição pela bola, uma figura solitária chama minha atenção.\n\n[other_child.GetFirstName] está sentado(a) de lado, observando os acontecimentos com timidez. [other_child.GetSheHe|U] chama minha atenção por um instante antes de desviar o olhar imediatamente, fingindo se interessar por algumas flores.\n\nParece que poderia lhe fazer bem ter companhia."
 playdate.5004.a: "\"Você se importa se eu me juntar a você?\""
 playdate_5004_sports_removal: "Você não estará mais envolvido no jogo em andamento de futebol"
 playdate.5004.b: "\"Vamos lá, participe!\""
 playdate.5004.b.success: "Eles participam hesitantes"
 playdate.5004.b.failure: "Seus esforços [other_child.Custom('ES_LeLa')] os desconcertam"
 playdate.5004.c: "Melhor deixá-los em paz."
 playdate.5005.t: "A Grande Parede"
 playdate.5005.desc: "Lá está a bola! Quando ela passa por mim, eu dou um chute brutal nela. #EMP Demasiado#! brutal.\n\nA bola risca o ar, girando rapidamente. Ela zune sobre a multidão, bem alto no ar, e voa por cima de um muro próximo. O baque de sua aterrissagem é sonoro.\n\nOlho para o muro. Ele é bem alto, mais do que o dobro da minha altura."
 playdate.5005.ending: "Até um pouco alto demais para o meu gosto. Enquanto pondero minhas opções, noto que [bullied_kid.GetFirstName] está parado a certa distância, fazendo o possível para não olhar para o muro."
 playdate.5005.a: "[bullied_kid.GetFirstNameNoTooltip] deveria pegá-la!"
 playdate.5005.b: "Tudo bem, #EMP muro#!, lá vou eu..."
 playdate.5005.b.success: "Você salta o muro com muita graça"
 playdate.5005.b.success.tt: "Todos os participantes ganham #positive_value 15#! de opinião sobre você"
 playdate.5005.b.failure: "Você pula o muro e pega a bola"
 playdate.5005.b.failure.tt: "Todos os participantes perdem #negative_value 5#! de opinião sobre você"
 playdate.5005.b.failure.gameends: "O jogo de futebol termina"
 playdate.5005.b.critfailure: "Você erra o pulo e cai"
 playdate.5005.c: "Vamos encontrar outra coisa para fazer, o que acha?"
 playdate.5005.more_balls: "Vou comprar outra bola!"
 playdate.5006.t: "Estou Indo para Casa!"
 playdate.5006.desc: "O jogo de futebol está ficando um pouco competitivo. Mal essa ideia tinha passado pela minha cabeça quando outro ponto de tensão surgiu: [ball_kid.GetFirstName] leva uma trombada brutal de [bully_kid.GetFirstName], que [ball_kid.GetHerHim] lança para um arbusto próximo. [bully_kid.GetFirstNameNoTooltip], prestativo como sempre, começa a rir.\n\n"I-isso já basta!", gagueja [ball_kid.GetFirstNameNoTooltip] com raiva, saindo do arbusto. [ball_kid.GetSheHe|U] pega a bola ao fazê-lo. "Vou para casa, e vou levar minha bola!"\n\nUm silêncio constrangedor se instala."
 playdate.5006.a: "\"Desculpe, [ball_kid.GetFirstNameNoTooltip].\""
 playdate.5006.a.tt: "Não foi culpa sua, mas está claro que [bully_kid.GetFirstNameNoTooltip] não vai pedir desculpas..."
 playdate.5006.b: "\"Espere, [ball_kid.GetFirstNameNoTooltip]! Por favor, fique.\""
 playdate.5006.b.success: "[ball_kid.GetHerHim|U] convence para ficar"
 playdate.5006.b.failure: "Vai embora mesmo"
 playdate.5006.c: "Melhor eu ficar quieto."
 playdate.5006.d: "\"Você está deixando a bola. Ela é nossa agora.\""
 playdate.5007.t: "Alvo de Bullying"
 playdate.5007.desc: "Risadas estrondosas cortam o ar. Logo do outro lado do pátio, onde estou, [sad_kid.GetFirstName] se encolhe diante de [bully_kid.GetFirstName], que [sad_kid.Custom('ES_LoLa')] aponta em deboche.\n\n“Mal sabe até chutar uma bola! Quem iria querer ser amigo desse est[sad_kid.Custom('ES_EA')] [sad_kid.Custom2('InsultNoun', SCOPE.sC('bully_kid'))]?”.\n\n[sad_kid.GetFirstNameNoTooltip], choramingando, olha ao redor em busca de algum apoio, mas parece haver poucos e espalhados."
 playdate.5007.a: ""Deixe[sad_kid.GetHerHim] em paz!""
 playdate.5007.a.tt: "Você se aproxima para enfrentar [Select_CString( bully_kid.IsFemale, 'a la abusona', 'al abusón' )]…"
 playdate.5007.a.success: "[bully_kid.GetHerHim|U] intimidas para que recuelem"
 playdate.5007.a.failure: "[bully_kid.GetFirstNameNoTooltip] desafia você e vence"
 playdate.5007.b: ""#EMP Yo#! querría"."
 playdate.5007.c: "Melhor eu não me envolver."
 playdate.5008.t: "Momento de Ancião"
 playdate.5008.desc: ""Vocês poderiam parar de fazer #EMP barulho#!, pelo amor de [old_timer.GetFaith.HighGodName]?" [old_timer.GetFirstName] se inclina por uma janela com mainel, furios[old_timer.Custom('ES_OA')], sacudindo o punho. "Malditos moleques, que barulho estão fazendo! Mal consigo ouvir meus #EMP pensamentos!#!"\n\nEu pego a bola quando ela se aproxima de mim, enquanto [Select_CString( old_timer.IsFemale, 'a velha', 'o velho' )] vocifera contra nós. [old_timer.GetSheHe|U] é realmente #EMP anciã[old_timer.Custom('ES_OA')]:#! talvez até tenha trinta ou quarenta anos!\n\nNão é de admirar que esteja com raiva."
 playdate.5008.a: ""Cala a boca, [Select_CString( old_timer.IsFemale, 'vieja loca', 'viejo loco' )]!"."
 playdate.5008.b: "\"Pedimos desculpas. Vamos fazer menos barulho.\""
 playdate.5009.t: "Pés Trovejantes"
 playdate.5009.desc: "Embora sejamos crianças, o futebol pode se transformar em um jogo terrivelmente bruto. O que começou como uma partida brincalhona, de repente se converteu em uma briga generalizada, e levo alguns segundos para me orientar novamente.\n\nQuando consigo, ouço um grito agudo de dor e terror vindo da confusão de crianças brigando. Pres[small_kid.Custom('ES_OA')] no fundo, vejo [small_kid.GetFirstName] sendo pisotead[small_kid.Custom('ES_OA')] por dezenas de pés. [small_kid.GetFirstNameNoTooltip] volta a gritar lastimosamente, mas o barulho é alto demais e os outros estão concentrados demais no jogo."
 playdate.5009.a: "\"[small_kid.GetFirstNameNoTooltip]! Espere, estou indo ajudar!\""
 playdate.5009.a.critical_success: "[small_kid.GetHerHim|U] resgata heroicamente"
 playdate.5009.a.success: "[small_kid.GetHerHim|U] resgatas"
 playdate.5009.a.failure: "Você precisa proteger seu corpo com por sua conta"
 playdate.5009.b.failure: "[small_kid.GetFirstNameNoTooltip] sofre algumas lesões graves"
 playdate.5009.b.critfailure: "As lesões de [small_kid.GetFirstNameNoTooltip] são terríveis"
 playdate_5009_every_child: "Todos os participantes não-Callous ou não-Sadisticos ganham #negative_value estresse#!"
 playdate.5009.b: "Não consigo assistir..."
 playdate.5009.c: "\"Pessoal, #EMP PAREM!#!\""
 playdate.5009.c.success: "Os jogadores revoltosos de futebol ficam em sentido"
 playdate.5009.c.failure: "Suas palavras caem em ouvidos surdos"
 playdate.5010.t: "Muito bem, [embarrassed_child.Custom('GirlBoy')]!"
 playdate.5010.desc: ""Pega ele! Empurre-a contra a parede! Isso mesmo!" A voz de [obnoxious_parent.GetFirstName] ecoa pelo pátio. [obnoxious_parent.GetSheHe|U] se postou em um canto para ver [embarrassed_child.GetFirstName] jogar futebol. Sua parcialidade em relação [embarrassed_child.Custom('ES_AlAla')] [embarrassed_child.Custom('GirlBoy')] é evidente.\n\nBasta dizer que [obnoxious_parent.GetFirstNameNoTooltip] está levando isso #EMP um pouco#! a sério demais.\n\n"Ei! Não empurre [embarrassed_child.GetHerHim], isso é trapaça!" O histrionismo de [obnoxious_parent.GetFirstNameNoTooltip] está começando a irritar."
 playdate.5010.a: "Está gesticulando muito com os braços…"
 playdate.5010.a_flavor: "Vou fingir que [obnoxious_parent.GetFirstNameNoTooltip] me atingiu!"
 playdate.5010.a.tt: "Se eu fingisse que um golpe desajeitado me atingiu... talvez deixaria de me importunar?"
 playdate.5010.a.tt.success: "Sua encenação chama bastante atenção..."
 playdate.5010.a.success: "Todos se aglomeram em choque"
 playdate.5010.a.failure: "Ninguém acredita em você"
 playdate.5010.b: "\"Você poderia apenas calar a boca, por favor?!\""
 playdate.5010.c: "Vou apenas lidar com isso."
 scratched_and_bruised: "Arranhões & Contusões"
 scratched_and_bruised_desc: "Esta criança foi levemente arranhada e contundida, provavelmente após brincar um pouco de forma bruta."
 you_perspective_increase_wounds_children_no_death_effect: "Você ganha [GetModifier('scratched_and_bruised').GetNameWithTooltip|l] ou [GetTrait('wounded_1').GetName( GetNullCharacter )|l]"
 other_perspective_increase_wounds_children_no_death_effect: "[wound_target.GetShortUIName] recebe [GetModifier('scratched_and_bruised').GetNameWithTooltip|l] ou [GetTrait('wounded_1').GetName( GetNullCharacter )|l]"
 playdate.5011.t: "Merecido"
 playdate.5011.desc: "Enquanto atuo o melhor que posso com uma multidão de crianças preocupadas ao meu redor, os olhos de [obnoxious_parent.GetFirstName] quase saltam das órbitas.\n\n"Seu/sua pequen[ROOT.Char.Custom('ES_OA')]... #EMP charlatã[ROOT.Char.Custom('ES_OA')]#!", rosna [obnoxious_parent.GetSheHe], apontando um dedo indignado para mim. "Vou me certificar de que você..."\n\n"[obnoxious_parent.GetFirstNameNoTooltip]!", vem um grito distante e furioso, que se aproxima rapidamente. A cor some do rosto de [obnoxious_parent.GetFirstNameNoTooltip] quando [responsible_adult.GetFirstName] irrompe no pátio. "O que significa isso?"\n\nÉ uma sorte ter uma distração, para que só [obnoxious_parent.GetFirstNameNoTooltip] possa ver meu sorriso petulante e satisfeito."
 playdate.5011.a: "\"Aiii, dói muito! Aiiii!\""
 playdate.5011.b: "Provavelmente eu deveria contar a verdade..."
 playdate.9001.t: "Fim da Diversão"
 playdate.9001.desc: "Foi bom esquecer todas as responsabilidades por um tempo e passar tempo com outras crianças, mas me disseram que agora tenho que voltar às minhas obrigações...\n\nNos divertimos muito! Espero que possamos fazer isso de novo em breve."
 playdate.9001.a: "Até a próxima!"
 playdate.9002.t: "Voltando para Casa"
 playdate.9002.desc: "Que divertido que tivemos! Vou me lembrar por muito tempo dos dias que passei com [host.GetTitledFirstName|l].\n\nAgora me dizem que já é hora de arrumar as coisas e voltar para casa para cuidar das minhas obrigações, mas com sorte poderemos repetir a experiência."
 playdate.9002.a: "Adeus, [host.GetFirstNameNoTooltip]!"
