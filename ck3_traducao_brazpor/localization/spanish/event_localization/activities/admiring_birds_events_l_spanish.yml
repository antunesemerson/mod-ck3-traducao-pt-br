l_spanish:
 admiring_birds.1001.t: "Oh! Um pássaro!"
 admiring_birds.1001.common_raven.desc: "A melodia que chega aos meus ouvidos não pode ser confundida: o canto de um corvo. Empoleirado em um galho, o pássaro parece estar caçando."
 admiring_birds.1001.common_merganser.desc: "Essa crista é bastante reconhecível. Aninhado em uma cavidade de árvore, o pato-mergulhão protege cuidadosamente seus ovos. Seu par não está à vista; talvez esteja pescando."
 admiring_birds.1001.common_loon.desc: "Plumagem preta e branca, dedos conectados por membranas, decolagem desajeitada. Hmm... É bastante difícil de identificar, mas deve ser um mergulhão."
 admiring_birds.1001.golden_eagle.desc: "Que fera majestosa! Tive a sorte de presenciar a manobra de caça dessa águia-dourada. O pobre roedor nem percebeu a morte se aproximando. O marrom escuro dominante da plumagem serve como uma boa camuflagem, suponho."
 admiring_birds.1001.red_crossbill.desc: "Uma melodia tranquila e pacífica chama minha atenção. A princípio, não consegui identificar a fonte, com sons ecoando entre as árvores. De repente, vejo algumas formas alaranjadas empoleiradas no topo de uma árvore. Alguns cruza-bicos estão se alimentando nos pinheiros."
 admiring_birds.1001.northern_harrier.desc: "Embora possa ser confundido com uma coruja, o orgulhoso gavião-asa-de-pedra se distingue caçando em plena luz do dia."
 admiring_birds.1001.great_egret.desc: "A plumagem branca imaculada aparece como uma nuvem sobre o lago. As pernas longas e finas da garça-branca-grande desaparecem na luz, dando a impressão de que a parte superior do corpo flutua."
 admiring_birds.1001.black_tern.desc: "Caminhando à beira de um campo, avisto um grupo de trinta-réis-negros perseguindo-se, subindo rapidamente com batidas exageradas de asas enquanto chamam animadamente. Será a época de reprodução?"
 admiring_birds.1001.osprey.desc: "Ao passar ao lado de um lago, uma ave irrompe da água, um peixe em seu bico negro. O gavião-pescador voa rapidamente para longe."
 admiring_birds.1001.northern_shoveler.desc: "`É uma rocha!... um pico!... uma capa! Uma capa, de fato! É uma península! O pato-colhereiro-do-norte tem um bico bastante singular."
 admiring_birds.1001.atlantic_puffin.desc: "Que visão engraçada! O papagaio-do-mar-do-atlântico é um deleite de observar; de certa forma, me lembra um bobo da corte colorido."
 admiring_birds.1001.mallard.desc: "As penas iridescentes roxo-azuladas do espelho das aves em voo chamam minha atenção enquanto estou vagando. O marreco pousa um pouco mais longe, em um prado próximo."
 admiring_birds.1001.horned_lark.desc: "Um enorme bando de cotovias-dos-prados está vasculhando o solo, procurando minhocas e conversando entre si. Eu paro imediatamente para não assustá-las."
 admiring_birds.1001.barrow_goldeneye.desc: "O olho dourado está me encarando do meio do lago. O pato nada pacificamente, certamente procurando por comida."
 admiring_birds.1001.gold_gain.desc: "Que sorte a minha! Esse encontro é um bom presságio e minha renda deverá se beneficiar com isso."
 admiring_birds.1001.prowess_gain.desc: "Observar como ele persegue a presa é bastante inspirador! Poderei usar isso no campo de batalha."
 admiring_birds.1001.piety_gain.desc: "Sou abençoado! Isso despertou algo profundo dentro de mim."
 admiring_birds.1001.prestige_gain.desc: "Que encontro raro! Todos ficarão com inveja de mim."
 admiring_birds.1001.dynasty_prestige_gain.desc: "Encontrar esse pássaro prova que minha Dinastia está destinada à grandeza!"
 admiring_birds.1001.stress_loss_gain.desc: "Nada poderia ser mais relaxante do que observar esse pássaro voando."
 admiring_birds.1001.a: "Se ao menos eu soubesse mais sobre pássaros..."
 admiring_birds.1001.b: "Que encontro benéfico!"
 admiring_birds.1001.c: "Uma bela adição à minha coleção de troféus"
