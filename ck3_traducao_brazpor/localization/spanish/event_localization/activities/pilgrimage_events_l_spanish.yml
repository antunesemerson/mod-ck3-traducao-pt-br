 #Sarnath
 pilgrimage.5421.t: "De acordo com o Nirvana Kanda, vinte dos vinte e quatro tirthankaras jainistas atingiram o Moksha aqui, na montanha de Shikharji. Essa história tão lendária tornou este lugar o local de peregrinação mais importante na comunidade jainista, e enquanto meu olhar vagueia dos picos mais altos até as áreas mais baixas, encontro-me refletindo sobre minha própria jornada aqui e o que isso significa para minha vida."
 pilgrimage.5421.desc: "Minha jornada finalmente me trouxe a Sarnath, o local onde [ROOT.Char.GetFaith.HighGodName] ensinou pela primeira vez as quatro nobres verdades aos seus seguidores, bem como os ensinamentos associados a elas.\n\nFoi aqui que a primeira escola budista foi fundada, o que ainda hoje atrai peregrinos de todo o mundo."
 ###Dharmic
 #Parikrama
 pilgrimage.5445.t: "Enquanto estou nas encostas do Monte Ushi-darena, a vista das áreas inferiores se desdobra diante de mim. Diante dessa visão impressionante, não posso deixar de pensar em como Zoroastro alcançou a iluminação aqui, recebendo o conhecimento de Ahura Mazda para disseminar ao mundo abaixo. Assim como a maioria dos peregrinos aqui, não sinto a centelha divina da profecia, mas mesmo assim não consigo deixar de maravilhar-me com o que está diante de mim."
 pilgrimage.5445.desc: "Contemplo o/a majestoso/a [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')] de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTier] e passo à próxima fase da minha [Glossary('yatra', 'YATRA_GLOSS')]. Expresso minha homenagem devota a [ROOT.Char.GetFaith.HighGodName] por meio de uma [Glossary('puja', 'PUJA_GLOSS')]. Depois, me junto à multidão no caminho da [Glossary('pradakshina', 'PRADAKSHINA_GLOSS')] circundando o santuário no sentido horário."
 pilgrimage.5445.a: "$pilgrimage.4001.a$"
 pilgrimage.5445.a_dead: "Paderborn!"
 pilgrimage.5445.a_cynical: "No coração das florestas de Paderborn, jazia uma vez Irminsul, a Grande Coluna. Erguido em honra a Odin, o monumento foi destruído por Carlos Magno durante as Guerras Saxônicas, mas nosso povo continua a se dirigir ao local onde ele se erguia em memória de sua grandiosidade. Agora posso dizer que eu também fiz uma peregrinação a esse lugar sagrado."
 PUJA_GLOSS: "Pujas são expressões de honra, veneração e atenção devota expressadas por hindus e budistas"
 PRADAKSHINA_GLOSS: "“À direita” em sânscrito, indica o caminho que se toma ao circunambular um santuário \"na direção do sol\" em práticas hindus e budistas. Isso é feito para garantir um renascimento favorável."
