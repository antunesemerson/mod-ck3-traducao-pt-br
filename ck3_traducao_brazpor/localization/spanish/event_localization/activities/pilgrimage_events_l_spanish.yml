 pilgrimage.6500.c: "[impatient_pilgrim.Custom('ES_ElLa')|U] [impatient_pilgrim.GetTitledFirstName|l] trota por aí com nossa hoste de peregrinos, suspirando ruidosamente e arrastando os pés: "Parece que faz séculos que estamos aqui. Não está na hora de começar a voltar para casa em breve?", murmura impacientemente.\n\nLanço um olhar de soslaio para ele e"
 #Lost in Translation
 pilgrimage.6510.t: "não consigo acreditar na #EMP desvergüenza#!. Aperto os punhos."
 pilgrimage.6510.desc: "Como você #EMP ousa#! ser tão insolente!"
 pilgrimage.6510.a: "Venha, deixe-me mostrar aquela estátua maravilhosa ali."
 pilgrimage.6510.a.flavor: "Entendo o que você quer dizer."
 pilgrimage.6510.b: "O que essa placa diz...?"
 pilgrimage.6510.b_success.t: "Novas Experiências"
 pilgrimage.6510.b_success.desc: "Enquanto passamos pelas barracas do mercado de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], somos abordados por um"
 pilgrimage.6510.b_failure.t: "um[local_guide.Custom('ES_XA')] [local_guide.GetWomanMan] peculiar. Dirige-se descaradamente a nós:\n\n[ROOT.Char.Custom('FormOfAddressForLiege')|U], pareces um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] nobre e refinad[ROOT.Char.Custom('ES_OA')]! Conheço uma experiência simplesmente #EMP divina#! não muito longe de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] que sem dúvida seria de interesse para qualquer peregrino devoto!"
 pilgrimage.6510.b_failure.desc: "uma criança de olhos grandes e brilhantes. Nos observa enquanto exclama:\n\n"Eu conheço um lugar secreto onde vive [ROOT.Char.GetFaith.HighGodName]!". Faz uma expressão decidida enquanto continua: "Posso mostrar a vocês se quiserem!"."
 pilgrimage.6510.c: "\n\n[warning_character.Custom('ES_ElLa')|U] [warning_character.GetTitledFirstName|l], à minha direita, franze a testa e balança sutilmente a cabeça. Um aviso?"
 #Time To Go Home Soon?
 pilgrimage.6520.t: "Considerem-me intrigad[ROOT.Char.Custom('ES_OA')]."
 pilgrimage.6520.desc: "Você segue a criança"
 pilgrimage.6520.desc_forgiving: "[local_guide.GetShortUIName] mostra a você uma experiência verdadeiramente divina"
 pilgrimage.6520.desc_nonforgiving: "Você é enganado para entrar em uma situação perigosa"
 pilgrimage.6520.a: "[ROOT.Char.GetFaith.HighGodName] também sorrirá para [local_guide.Custom('ES_LoLa')]s trapaceir[local_guide.Custom('ES_OA')]s."
 pilgrimage.6520.b: "Mentir não te faz bem, fil[local_guide.Custom('ES_OA')] meu[local_guide.Custom('ES_OA')]."
 pilgrimage.6520.c: "[local_guide.GetShortUIName] se afasta apressadamente."
 #Fishy local guide?
 pilgrimage.6530.t: "Todos nós pagamos pelos nossos pecados."
 pilgrimage.6530.desc_intro: "Est? tentando me enganar, #EMP a mim#!, [local_guide.Custom('ES_OA')]?!"
 pilgrimage.6530.desc_adult: "Vou ensinar-lhe honestidade na pancada!"
 pilgrimage.6530.desc_child: "Vou passar."
 pilgrimage.6530.desc_warning: "\n\n[warning_character.Custom('ES_ElLa')|U] [warning_character.GetTitledFirstName|l], à minha direita, franze a testa e balança sutilmente a cabeça. Um aviso?"
 pilgrimage.6530.desc_learned: "Divindade Oculta"
 pilgrimage.6530.a: "A uma boa distância nos arredores de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], paramos de repente. Noss[local_guide.Custom('ES_OA')] guia, [local_guide.Custom('ES_ElLa')] [local_guide.GetTitledFirstName|l], nos mostra uma passagem oculta e acabamos em uma pequena caverna, iluminada pela luz do dia que entra por um buraco no teto.\n\nPor esse mesmo buraco, jorra serenamente uma fonte verdadeiramente extraordinária. A água corrente brilha com um esplendor divino, e tênues arco-íris enevoados colorem o ar ao seu redor."
 pilgrimage.6530.a_child.tt: "Quando começo a me perguntar se algum dia chegaremos, noss[local_guide.Custom('ES_XA')] guia vira bruscamente à esquerda e, quando percebemos, entramos em uma caverna, escondida no campo.\n\nUm brilho tênue, que vai se intensificando, começa a refletir em nosso equipamento enquanto tropeçamos por uma grande gruta coberta por centenas de cristais. Os cristais captam a luz de uma abertura no teto e o séquito, inclusive eu, fica boquiaberto de espanto diante da visão."
 pilgrimage.6530.divinity.desc: "\n\nNunca senti a presença [ROOT.Char.GetFaith.HighGodNamePossessive] tão forte quanto neste mesmo lugar."
 pilgrimage.6530.dangerous.desc: "\n\nIsso é realmente impressionante, tenho que admitir."
 pilgrimage.6530.b: "Que extraordinário!"
 pilgrimage.6530.b_child: "Mentir não te faz bem, fil[local_guide.Custom('ES_OA')] meu[local_guide.Custom('ES_OA')]."
 pilgrimage.6530.b.flavor: "Presas da Peregrinação!"
 pilgrimage.6530.c: "O assobio despreocupado do guia [local_guide.Custom('ES_DelDela')] [local_guide.GetTitledFirstName|l] é a última coisa que ouvimos antes que uns brutamontes se aproximem de nós, aparentemente do nada, a uma boa distância nos arredores de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]. Foi uma armadilha, e agora estamos isolados, sem esperança de intervenção.\n\nMeu pulso dispara enquanto tento descobrir meu próximo passo. Como se atrevem a se aproveitar dos peregrinos?"
 pilgrimage.6530.c.flavor: "[6532_protector.GetTitledFirstNameNoTooltip]! Lide com eles!"
 pilgrimage.6530.d: "Vilões Assustados"
 pilgrimage.6530.d.flavor: "[6532_protector.GetShortUIName] afugenta com sucesso os vilões"
 pilgrimage.6530.e: "Machucado"
 #Fishy guide not so fishy actually
 pilgrimage.6531.t: "#EMP O poder de [ROOT.Char.GetFaith.HighGodNameAlternate] o compeliu!#!"
 pilgrimage.6531.desc_wellspring: "Este é um lugar sagrado! Vocês não têm temor a Deus?!"
 pilgrimage.6531.desc_crystal_cavern: "Vilões Exorcizados"
 pilgrimage.6531.desc_non_cynical: "Você exorciza com sucesso os vilões"
 pilgrimage.6531.desc_cynical: "Roubado"
 pilgrimage.6531.a: "Você é roubado"
 #Fishy guide _was_ fishy!
 pilgrimage.6532.t: "Tempos Desesperados"
 pilgrimage.6532.desc: "Nas imediações de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] ao dobrarmos outra esquina, nosso guia infantil [local_guide.GetTitledFirstName|l] para subitamente. Seu corpinho começa a tremer e ouço um fungar contido enquanto tenta esconder o fato de que está chorando.\n\n\"Eu... sinto muito, meu [ROOT.Char.GetLadyLord], me obrigaram a fazer isso. Minha irmãzinha está doente e faz dias que não comemos...\", [local_guide.GetSheHe] olha para longe, os grandes olhos brilhantes repentinamente tomados pelo medo. \"Devíamos voltar\", sussurra, cautelosamente."
 pilgrimage.6532.a: "[Select_CString( local_guide.IsFemale, 'Querida niña', 'Querido niño' )], sua sinceridade aquece meu coração."
 pilgrimage.6532.a_success.t: "Vamos ajudar [local_guide.Custom('ES_AlAla')] a pobre crianç[local_guide.Custom('ES_OA')]."
 pilgrimage.6532.a_success.desc: "Ações tão #EMP desprezíveis#!"
 pilgrimage.6532.a_failure.t: "Um criminoso por associação!"
 pilgrimage.6532.a_failure.desc: "[6532_protector.GetShortUIName] se machuca na luta"
 pilgrimage.6532.b: "Posso lhe interessar com..."
 pilgrimage.6532.c: "Enquanto caminho pelas ruas de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTier] as mercadorias de um mercado local chamam minha atenção.\n\nUm mercador sorri para mim e proclama: "Tenho as mercadorias, se meu [ROOT.Char.GetLadyLord] tiver as moedas!"\n\nEsses bens exóticos poderiam render um bom lucro de volta para casa... ou talvez valha a pena guardá-los como presente."
 pilgrimage.6532.c_success.t: "Este lote parece um investimento sábio!"
 pilgrimage.6532.c_success.desc: "Devo conseguir facilmente dobrar isso."
 pilgrimage.6532.c_failure.t: "Você compra as mercadorias exóticas"
 pilgrimage.6532.c_failure.desc: "Estas aqui parecem intrigantes."
 #Fishy child breaks down
 pilgrimage.6533.t: "Posses mundanas? Que banalidade."
 pilgrimage.6533.desc: "Nas imediações de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] ao dobrarmos outra esquina, nosso guia infantil [local_guide.GetTitledFirstName|l] para subitamente. Seu corpinho começa a tremer e ouço um fungar contido enquanto tenta esconder o fato de que está chorando.\n\n\"Eu... sinto muito, meu [ROOT.Char.GetLadyLord], me obrigaram a fazer isso. Minha irmãzinha está doente e faz dias que não comemos...\", [local_guide.GetSheHe] olha para longe, os grandes olhos brilhantes repentinamente tomados pelo medo. \"Devíamos voltar\", sussurra, cautelosamente."
 pilgrimage.6533.a: "Arrependimento em [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]"
 pilgrimage.6533.a.flavor: "Ao entrar na [ROOT.Char.GetFaith.HouseOfWorship], uma culpa formidável me invade. A luz —que ilumina o altar como um dia ensolarado de verão— é tão densa que me parece poder tocá-la.\n\nQue tipo de vida estou vivendo? Que tipo de [ROOT.Char.GetTitleAsNameNoTooltip] eu poderia ser? Ou [ROOT.Char.GetMotherFather]? Ou [ROOT.Char.Custom('GetDaughterSon')]?\n\nSe eu não mudar minha natureza de ser"
 pilgrimage.6533.b: "[repent_trait.GetNameNoTooltip|l]"
 pilgrimage.6533.b.flavor: "[GetTrait('drunkard').GetName( ROOT.Char )|l]"
 #Find some exotic wares
 pilgrimage.6540.t: "[GetTrait('rakish').GetName( ROOT.Char )|l]"
 pilgrimage.6540.desc: "[GetTrait('irritable').GetName( ROOT.Char )|l]"
 pilgrimage.6540.a: "[GetTrait('flagellant').GetName( ROOT.Char )|l]"
 pilgrimage.6540.a.flavor: "[GetTrait('contrite').GetName( ROOT.Char )|l]"
 pilgrimage.6540.a.tt: "[GetTrait('profligate').GetName( ROOT.Char )|l]"
 pilgrimage.6540.b: "[GetTrait('comfort_eater').GetName( ROOT.Char )|l]"
 pilgrimage.6540.b.flavor: "[GetTrait('inappetetic').GetName( ROOT.Char )|l]"
 pilgrimage.6540.c: ", a única luz que verei será a das chamas de [ROOT.Char.GetFaith.NegativeAfterLife]."
 #Repentance
 pilgrimage.6750.t: "\"Bem, então posso aproveitar enquanto posso.\""
 pilgrimage.6750.desc.intro: "Ao entrar na [ROOT.Char.GetFaith.HouseOfWorship], uma culpa formidável me invade. A luz —que ilumina o altar como um dia ensolarado de verão— é tão densa que me parece poder tocá-la.\n\nQue tipo de vida estou vivendo? Que tipo de [ROOT.Char.GetTitleAsNameNoTooltip] eu poderia ser? Ou [ROOT.Char.GetMotherFather]? Ou [ROOT.Char.Custom('GetDaughterSon')]?\n\nSe eu não mudar minha natureza de ser"
 pilgrimage.6750.desc.secret: "A Disputa de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]"
 pilgrimage.6750.desc.drunkard: "Enquanto ouvimos as orações da manhã, [bishop_pilgrim.Custom('ES_ElLa')] [bishop_pilgrim.GetTitledFirstName|l] e eu mantemos uma conversa animada que rapidamente se desvia para questões teológicas.\n\n"
 pilgrimage.6750.desc.hashishiyah: ""Seria insensato dizer que \"se tornou carne\" significa que Cristo, inexplicavelmente e incompreensivelmente, se tornou homem a partir do Verbo, tendo-se unido hipostaticamente".\n\n"Mas, como o próprio Nestório disse", refuta [bishop_pilgrim.Custom('ES_ElLa')] [bishop_pilgrim.GetTitledFirstName|l], "Cristo homem também pôde se tornar divino, Filho por graça e não por natureza"."
 pilgrimage.6750.desc.rakish: "\"Não vou ouvir essa blasfêmia absurda!\""
 pilgrimage.6750.desc.irritable: "\"E você sabe como o Concílio de Éfeso aconteceu para #EMP ele#!.\""
 pilgrimage.6750.desc.flagellant: "[bishop_pilgrim.GetShortUIName] fica convencid[bishop_pilgrim.Custom('ES_OA')]"
 pilgrimage.6750.desc.contrite: "[bishop_pilgrim.GetShortUIName] mantém sua posição"
 pilgrimage.6750.desc.profligate: ""Muito bem dito, amig[bishop_pilgrim.Custom('ES_OA')]. Agora vamos dar uma volta"."
 pilgrimage.6750.desc.comfort_eater: "[GetTrait('comfort_eater').GetName( ROOT.Char )|l]"
 pilgrimage.6750.desc.inappetetic: "Uma Verdadeira Relíquia"
 pilgrimage.6750.desc.outro: "Enquanto perambulo pelas barracas do mercado - evitando o máximo possível os alimentos locais, ondas de pessoas tentando me arrastar para suas casas - percebo uma aglomeração maior ao redor de um comerciante específico.\n\n\"Venham comprar uma verdadeira relíquia por um preço que faria [ROOT.Char.GetFaith.WealthGodName] rir por décadas. A"
 pilgrimage.6750.a: "[SCOPE.Custom('ChristianRelicName')|U]!"
 pilgrimage.6750.b: "[SCOPE.Custom('IslamRelic')|U]!"
 #Theological Debate
 pilgrimage.6760.t: "[SCOPE.Custom('JudaismRelicName')|U]!"
 pilgrimage.6760.desc.intro: "[merchant_relic.GetName|U]!"
 pilgrimage.6760.desc.christian: "Encontrada neste próprio santuário sagrado, há apenas alguns dias!\""
 pilgrimage.6760.a: "Isso #EMP deve#! ser meu."
 pilgrimage.6760.b: ""Tenho certeza[ROOT.Char.Custom('ES_OA')] de que vocês não gostariam de vender uma relíquia por um preço ganancioso…""
 pilgrimage.6760.b.success: "[relic_merchant.GetShortUIName] reduz o preço"
 pilgrimage.6760.b.failure: "[relic_merchant.GetShortUIName] se sente insultado pela sua oferta"
 pilgrimage.6760.c: "\"Tenho coisas melhores para gastar ouro.\""
 #Do you wanna buy a cool relic?
 pilgrimage.6770.t: "Uma Verdadeira Relíquia"
 pilgrimage.6770.desc.intro: "Um Cortesão Habilidoso"
 pilgrimage.6770.desc.christian: "Um [ROOT.Char.GetWomanMan] não pode rezar muito sem buscar outras formas, igualmente importantes, de passar o tempo. E [current_employer.Custom('ES_ElLa')] [current_employer.GetTitledFirstName|l] tem uma residência encantadora que me permite visitar tão gentilmente.\n\nOuço algumas vozes vindas de um dos cômodos, "... e, ao fazer isso, você alcançaria a maior técnica". Espio lá dentro e vejo [stolen_courtier.Custom('ES_AlAla')] [stolen_courtier.GetTitledFirstName|l], explicando sua arte a um grupo de cortesãos interessados, que seguem ansiosamente seus ensinamentos."
 pilgrimage.6770.desc.islam: "Que mestre[stolen_courtier.Custom('ES_OA')] consumad[stolen_courtier.Custom('ES_OA')], talvez eu deva contratar[stolen_courtier.GetHerHim]."
 pilgrimage.6770.desc.buddhist: "\"Um especialista como esse é desperdiçado em uma corte como esta...\""
 pilgrimage.6770.desc.judaism: "Cortesão Recrutado"
 pilgrimage.6770.desc.fallback: "[stolen_courtier.GetShortUIName] se junta à sua corte"
 pilgrimage.6770.desc.outro: "Oferta Recusada"
 pilgrimage.6770.a: "[stolen_courtier.GetShortUIName] recusa sua oferta"
 pilgrimage.6770.b: "Uma pessoa não vale a pena para arriscar a ira [current_employer.Custom('ES_DelDela')] [current_employer.GetTitledFirstNameNoTooltip|l]."
 pilgrimage.6770.b.success: "Obrigações de Salário"
 pilgrimage.6770.b.failure: "Os [hooks|lE] de #EMP obligación#! reduzem os salários dos [Concept('court_position', 'puestos de la corte')|E] em um #P -50 %#! [gold_i]"
 pilgrimage.6770.c: "Redução Contratual"
 pilgrimage.6770.d: "\"Isso não parece muito autêntico...\""
 #Recruit skillful local
 pilgrimage.6780.t: ""[spiritual_mentor.GetSheHe|U] é [spiritual_mentor.Custom('ES_ElLa')] melhor [spiritual_mentor.GetWomanMan] em toda a extensão da terra. Passa todos os dias vigiando o local sagrado; a cada vigília, volta ao seu acampamento, nos arredores da cidade, e reza até o amanhecer e a lua ir embora".\n\nRespiro fundo antes de me aproximar da fogueira onde [spiritual_mentor.GetSheHe], depois de ouvir falar de seus prodígios.\n\n"Tenho esperado por você", diz [spiritual_mentor.GetSheHe], olhando diretamente para mim, "e também [spiritual_mentor.GetFaith.HighGodName]. Está list[ROOT.Char.Custom('ES_OA')] para abandonar seus hábitos [ROOT.Char.Custom('SinfulTrait')|l]?""
 pilgrimage.6780.desc: "\"Estou. Eu #EMP estou#!.\""
 pilgrimage.6780.a: "\"Estou mais interessado em seus ensinamentos.\""
 pilgrimage.6780.b: "\"Eu não preciso mudar #EMP nada#! sobre mim mesmo.\""
 pilgrimage.6780.b.success.t: "Cortesão Recrutado"
 pilgrimage.6780.b.success.desc: "O Chamado"
 pilgrimage.6780.b.failure.t: "Ao entrar nos terrenos sagrados, encontro [called_member.Custom('ES_AlAla')] [called_member.GetTitledFirstName|l] olhando para o altar com expressão ausente.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", diz [called_member.GetSheHe], inabalável, "tenho algo a lhe dizer. [called_member.GetFaith.HighGodName] me falou e Sua voz é clara, severa e precisa".\n\n"Se eu pudesse ficar, gostaria de dedicar a minha vida inteira à [called_member.GetFaith.GetName|l] e me tornar mais um [GetTrait('devoted').GetName( called_member )].""
 pilgrimage.6780.b.failure.desc: "\"Entendo. Você tem que fazer o que tem que fazer.\""
 pilgrimage.6780.c: "\"Não temos [ROOT.Char.GetFaith.HouseOfWorshipPlural] em nossa terra natal?\""
 obligation_hook_salary: "\"Abandone essa bobagem imediatamente.\""
 obligation_hook_tt: "\"Ficar para tramar #EMP contra mim#!? Nem pensar!\""
 generic_cp_discount: "\"Maravilhoso! Também farei uma doação!\""
 #Meet local guru - trait flipping event
 pilgrimage.6790.t: "Um Despertar Espiritual em [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]"
 pilgrimage.6790.desc: "Indulgência"
 pilgrimage.6790.a: ""… podem ir, meu filho", ouço murmurar [bishop_pilgrim.Custom('ES_AlAla')] [bishop_pilgrim.GetTitledFirstName|l] quando entro em sua [ROOT.Char.GetFaith.HouseOfWorship]. O peregrino faz uma reverência antes de partir e posso ver o ouro brilhar na mão [bishop_pilgrim.Custom('ES_DelDela')] sacerdot[bishop_pilgrim.Custom('ES_TeTisa')].\n\n"Ah, apreciad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], vós também desejais absolver vossos pecados? [religious_head_scope.Custom('ES_ElLa')|U] [religious_head_scope.GetTitledFirstName] deu ordem para conceder indulgências a todos os peregrinos que visitarem [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]… por um preço justo, claro"."
 pilgrimage.6790.b: "\"Por favor, interceda junto a [ROOT.Char.GetFaith.HighGodName] por mim.\""
 pilgrimage.6790.c: "Seria útil conseguir uma para [my_heir.GetFirstNameNoTooltip]."
 #Entourage member feels The Calling
 pilgrimage.6800.t: "O Chamado"
 pilgrimage.6800.desc: "O Guia do Peregrino"
 pilgrimage.6800.a: "Os mercados de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] estão agitados com comerciantes gritando em línguas que nunca ouvi, e vendendo especiarias que nunca provei.\n\n\"O guia do peregrino! Conheça as rotas mais seguras, descubra as maravilhas de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]!\" Um deles grita, acenando com um pequeno livro na minha direção."
 pilgrimage.6800.b: "\"Eu vou levar um!\""
 pilgrimage.6800.c: "\"Deixe-me dar uma olhada — ah! E se você virar nesta rua...\""
 pilgrimage.6800.d: "Tenho certeza de que já vi este livro antes..."
 pilgrimage.6800.e: "[ROOT.Char.GetFaith.HighGodName] me guiará."
 pilgrimage.6800.e.tt: "O Guia do Peregrino"
 #Do you wanna buy an indulgence?
 pilgrimage.6810.t: "Indulgência"
 pilgrimage.6810.desc: "Silêncio"
 pilgrimage.6810.a: "O eco dos meus passos é o único som na [ROOT.Char.GetFaith.HouseOfWorship]. Estou sol[ROOT.Char.Custom('ES_OA')]. A última coisa de que me lembro do mundo exterior é o rosto daqueles mendigos perto dos portões, e o céu azul, azul. Tão distante agora.\n\nCaminho em direção ao altar sabendo que sou só eu e, ainda assim, sinto-me sob um escrutínio inflexível: os olhos severos de [ROOT.Char.GetFaith.HighGodName] estão sempre bem abertos."
 pilgrimage.6810.b: "Hora de rezar."
 pilgrimage.6810.c: "Olhe para esses arcos... lindos."
 #Do you wanna buy a pilgrim's guide?
 pilgrimage.6820.t: "Você perderá [votive_artifact.GetName]"
 pilgrimage.6820.desc: "Os mercados de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] estão agitados com comerciantes gritando em línguas que nunca ouvi, e vendendo especiarias que nunca provei.\n\n\"O guia do peregrino! Conheça as rotas mais seguras, descubra as maravilhas de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]!\" Um deles grita, acenando com um pequeno livro na minha direção."
 pilgrimage.6820.a: "Bênçãos Materiais"
 pilgrimage.6820.b: "Um peregrino deposita uma figura votiva diante do altar, inclinando a cabeça. Vejo [blessed_bishop.Custom('ES_AlAla')] [blessed_bishop.GetTitledFirstName|l] abençoando-a e murmurando algo em seu ouvido: "… santo", consigo ouvir.\n\n[blessed_bishop.Custom('ES_ElLa')|U] [blessed_bishop.GetFaith.BishopNeuter] faz um gesto: "Também trazes algo para abençoar, querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]?"."
 pilgrim.6820.b.flavor: "\"Por favor, torne meu [blessed_artifact.GetNameNoTooltip] mais piedoso!\""
 pilgrimage.6820.c: "\"Deixe todos verem a fama do meu [blessed_artifact.GetNameNoTooltip]!\""
 pilgrim_guide_artifact: "Tenho coisas melhores para fazer com meu ouro."
 pilgrim_guide_artifact_desc: "Ganha [piety_i]#positive_value +2%#! [piety|lE] mensal"
 #Admire the holy site in a religious way
 pilgrimage.6830.t: "[blessed_artifact.GetDesc]\n\nEle brilha com uma aura imaculada após ser abençoado no Local Sagrado de [holy_site_scope.GetNameNoTooltip]."
 pilgrimage.6830.desc: "O eco dos meus passos é o único som na [ROOT.Char.GetFaith.HouseOfWorship]. Estou sol[ROOT.Char.Custom('ES_OA')]. A última coisa de que me lembro do mundo exterior é o rosto daqueles mendigos perto dos portões, e o céu azul, azul. Tão distante agora.\n\nCaminho em direção ao altar sabendo que sou só eu e, ainda assim, sinto-me sob um escrutínio inflexível: os olhos severos de [ROOT.Char.GetFaith.HighGodName] estão sempre bem abertos."
 pilgrimage.6830.a: "Hora de rezar."
 pilgrimage.6830.b: "Um ladrão supremo"
 pilgrimage.6830.c: "Desperto de um sono agitado e, diante de mim, na escuridão, ergue-se uma figura. Enquanto reflito sobre minha próxima vida, [wise_priest.GetName] surge das sombras com o rosto iluminado por um sorriso irônico.\n\n"Nobre [ROOT.Char.GetTitleAsNameNoTooltip|l], perdoai nossa intrusão; algumas lições precisam ser vividas para serem compreendidas.\n\nUm ladrão usa sombras, pontos cegos e funcionários corruptos para auxiliar em seu crime. Da mesma forma, um [ROOT.Char.GetFaith.PriestNeuter] pérfido se entrega a comportamentos lascivos nas sombras, prega doutrinas falsas em seus pontos cegos e é elevado a cargos altos por funcionários corruptos"."
 pilgrimage.6830.c.tt: "Vou trazer luz onde há sombras."
 #Ask a local priest to bless your artifact
 pilgrimage.6840.t: "Conheço um funcionário corrupto que é um [ROOT.Char.GetFaith.PriestNeuter] perverso."
 pilgrimage.6840.desc: "Você aprisiona seu [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l]"
 pilgrimage.6840.a: "\"Por favor, torne meu [blessed_artifact.GetNameNoTooltip] mais piedoso!\""
 pilgrimage.6840.b: "\"Deixe todos verem a fama do meu [blessed_artifact.GetNameNoTooltip]!\""
 pilgrimage.6840.c: "Conclusão"
 pilgrimage.6840.a.tt: "$pilgrimage_header$ Tawaf al-Wadaa"
 pilgrimage.6840.b.tt: "[ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]: … e pronto"
 blessed_artifact_desc: "Tendo-nos apressado em nossa visita aqui, minha principal preocupação é voltar para casa para poder continuar com meus assuntos habituais.\n\nEspero que [ROOT.Char.GetFaith.HighGodNameAlternate] compreenda que o tempo me pressiona, mas que ainda assim eu receba Sua satisfação em relação à minha [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetPhase.GetName|l].\n\nEm todo caso, meus [ROOT.Char.GetFaith.AltPriestTermPlural] não deveriam ter do que reclamar."
 #A Master Thief
 #by Laurence Kennedy
 pilgrimage.6850.t: "Estou extasiad[ROOT.Char.Custom('ES_OA')] porque esta peregrinação tem sido uma das mais devotas de todos os tempos, se não #EMP la#! a mais. [ROOT.Char.GetFaith.HighGodNameAlternate] me sorri."
 pilgrimage.6850.desc: "Estou satisfeito sabendo que a maioria, senão todas, das minhas decisões ao longo de nossa jornada de [activity.Custom('PilgrimageLength')] foram tomadas para provar minha devoção a [ROOT.Char.GetFaith.HighGodNameAlternate] e [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip]."
 pilgrimage.6850.a: "Fico aliviado em saber que, embora eu não tenha sido [Select_CString( ROOT.Char.IsFemale, 'a peregrina', 'o peregrino' )] mais devoto[ROOT.Char.Custom('ES_OA')], demonstrei minha devoção a [ROOT.Char.GetFaith.HighGodNameAlternate] de mais de uma forma."
 pilgrimage.6850.b: "Estou um pouco preocupado por não ter tido a chance de provar minha devoção a [ROOT.Char.GetFaith.HighGodName] tanto quanto eu gostaria."
 pilgrimage.6850.c: "Estou extasiad[ROOT.Char.Custom('ES_OA')] por como esta peregrinação saiu: os lugares que vi, as experiências que vivi… foi certamente um sucesso!"
 pilgrimage.6850.c.flavor: "Estou satisfeito em saber que nossa jornada de [activity.Custom('PilgrimageLength')] satisfez o aspecto mundano de [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip|l], e, por extensão, a mim mesmo."
 ###Conclusion events
 #Summarizing our activity
 pilgrimage.7000.t: "\n\nApesar dos acontecimentos infelizes que levaram à morte do meu predecessor[old_pilgrimage_host.Custom('ES_XA')], [old_pilgrimage_host.Custom('ES_ElLa')] [old_pilgrimage_host.GetTitledFirstName|l], e do luto evidente que marcou esta jornada, a própria peregrinação acabou se revelando uma experiência interessante, que guardarei com carinho."
 pilgrimage.7000.t_hajj: "\n\nAgora que fizemos o que é honroso e estamos finalizando a peregrinação [old_pilgrimage_host.Custom('ES_DelDela')] [old_pilgrimage_host.GetTitledFirstName|l] a este lugar, só resta voltar para casa em segurança e dar a [old_pilgrimage_host.GetFirstNameNoTooltip] seu descanso final."
 pilgrimage.7000.t_obligatory: "\n\nSendo esta minha primeira peregrinação, e embora nenhuma peregrinação seja exatamente igual, sinto-me confiante de que estou mais familiarizado com o que esperar desse tipo de jornada espiritual no futuro."
 pilgrimage.7000.desc_obligatory: "\n\nSendo esta minha segunda peregrinação, não posso deixar de compará-la à minha visita anterior a [first_pilgrimage_memory.MakeScope.Var('pilgrimage_destination').GetProvince.GetNameNoTooltip], com toda a sua santidade."
 pilgrimage.7000.intro: "\n\nEsta peregrinação marca minha segunda visita, mas também meu reencontro, ao local sagrado de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. Não tenho arrependimentos de vir aqui novamente e maravilhar-me com sua santidade e esplendor."
 pilgrimage.7000.intro_hajj: "\n\nDe todas as minhas [ROOT.Char.Custom('PilgrimageAmount')] peregrinações, esta tem sido a mais esclarecedora até agora."
 pilgrimage.7000.desc_perfect_pious: "\n\nSendo esta minha primeira Hajj, fico feliz por ter empreendido a jornada para vir até aqui, participando dos ritos e conhecendo espíritos afins. Verdadeiramente, sinto que meu espírito está elevado e mais próximo de [ROOT.Char.GetFaith.HighGodName] do que nunca."
 pilgrimage.7000.desc_high_pious: "\n\nSendo esta minha segunda Hajj, conheci novos amigos e reencontrei rostos familiares desde minha última visita."
 pilgrimage.7000.desc_mid_pious: "\n\nTendo estado aqui muitas vezes antes, é sempre um verdadeiro prazer realizar o haje. Estamos unidos sob nossa fé, e realmente somos o povo [ROOT.Char.GetFaith.HighGodNamePossessive]."
 pilgrimage.7000.desc_low_pious: "\n\nTambém estou empolgado com a ideia de ter visitado um novo local sagrado!"
 pilgrimage.7000.desc_perfect_worldly: "[ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], foi uma honra."
 pilgrimage.7000.desc_high_worldly: "Embora interessante, estou ansioso para dormir na minha própria cama."
 pilgrimage.7000.desc_mid_worldly: "Que eu possa ver suas paredes novamente!"
 pilgrimage.7000.desc_low_worldly: "Aunque mantengo el escepticismo, #EMP fue#! bastante grandioso."
 pilgrimage.7000.outro_buried_predecessor_here: "Hora de iniciar minha jornada de volta para casa"
 pilgrimage.7000.outro_bury_predecessor_home: "Uma peregrinação mundana mudou a aceitação cultural."
 pilgrimage.7000.outro_first: "Eu me arrependo!"
 pilgrimage.7000.outro_second: "\n\nSendo esta minha segunda peregrinação, não posso deixar de compará-la à minha visita anterior a [first_pilgrimage_memory.MakeScope.Var('pilgrimage_destination').GetProvince.GetNameNoTooltip], com toda a sua santidade."
 pilgrimage.7000.outro_second_revisit: "\n\nEsta peregrinação marca minha segunda visita, mas também meu reencontro, ao local sagrado de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. Não tenho arrependimentos de vir aqui novamente e maravilhar-me com sua santidade e esplendor."
 pilgrimage.7000.outro_multi: "$pilgrimage_header$ O Retorno"
 pilgrimage.7000.outro_first_hajj: "Minha jornada foi longa, mas enfim voltei para casa."
 pilgrimage.7000.outro_second_hajj: "\n\nDevido a uma reviravolta infeliz dos acontecimentos, minha peregrinação foi interrompida e, infelizmente, não consegui visitar [missed_holy_site.GetNameNoTooltip]. Isso me incomoda, mas cada dia menos.\n\nSó posso imaginar que tudo isso fazia parte do plano de [ROOT.Char.GetFaith.HighGodNameAlternate]."
 pilgrimage.7000.outro_multi_hajj: "Com a determinação de concluir a peregrinação [old_pilgrimage_host.Custom('ES_DelDela')] [old_pilgrimage_host.GetTitledFirstName|l], agora descanso tranquilo sabendo que [old_pilgrimage_host.GetSheHe] tem seu lugar de descanso final na santidade de [burial_location.GetNameNoTierNoTooltip].\n\nE embora muitas coisas continuem iguais, meus [ROOT.Char.GetFaith.AltPriestTermPlural] insistem que esta jornada sagrada mudou algo em mim, quer eu consiga ver isso ou não."
 pilgrimage.7000.outro_new_holy_site: "Embora muitas coisas continuem iguais, algo mudou na forma como meus [ROOT.Char.GetFaith.PriestNeuterPlural].\n\nFiz a jornada de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] sagrad[ROOT.Char.Custom('ES_OA')] e insistem que algo mudou em mim, eu veja isso ou não."
 pilgrimage.7000.a: "É bom estar em casa."
 pilgrimage.7000.a_cynical: "Que seja como for."
 pilgrimage.7000.a_hajj: "Sua jornada chegou ao fim"
 pilgrimage.7000.a_hajj_cynical: "Aunque mantengo el escepticismo, #EMP fue#! bastante grandioso."
 pilgrimage.7000.a.tt: "$pilgrimage_header$ Regresso ao Lar"
 cultural_acceptance_gain_worldly_pilgrimage: "Chegamos a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] no final da tarde, e os servos, #EMP mis#! servos, começam imediatamente a fazer os preparativos necessários para dar ao meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('old_pilgrimage_host'))] seu descanso final.\n\n"
 pilgrimage.7000.b: "Chegamos a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] no final da tarde, e os servos, #EMP mis#! servos, imediatamente começam a fazer os preparativos necessários para dar ao meu querid[old_pilgrimage_host.Custom('ES_OA')] [old_pilgrimage_host.GetFirstName] seu descanso final.\n\n"
 ###Generic Pilgrimage Return Events
 #Nice spiritual journey
 pilgrimage.9001.t: "Embora eu ainda esteja me acostumando ao meu novo [ROOT.Char.Custom('GetRealmOrDomicile')|l], com [ROOT.Char.Custom('GetCourtierPlural')|l] correndo ao meu lado num esforço para ganhar minha benevolência, trazer de volta o corpo [old_pilgrimage_host.Custom('ES_DelDela')] [old_pilgrimage_host.GetTitledFirstName|l] ajuda a consolidar o fato de que [old_pilgrimage_host.GetSheHe] não voltará e que #EMP yo#! sou [Select_CString( ROOT.Char.IsFemale, 'la nueva', 'el nuevo' )] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 pilgrimage.9001.desc_intro: "Enquanto lamento sua morte, encontro consolo no fato de que cumpri seus desejos e concluí nossa peregrinação a [previous_holy_site.GetNameNoTierNoTooltip].\n\nNa verdade, [old_pilgrimage_host.GetSheHe] deve estar satisfeit[old_pilgrimage_host.Custom('ES_OA')] onde quer que esteja, e isso me arranca um tímido sorriso."
 pilgrimage.9001.desc_invalidated: "Ter viajado até [previous_holy_site.GetNameNoTierNoTooltip] e voltado para cumprir os desejos de [old_pilgrimage_host.Custom('ES_DelDela')] [old_pilgrimage_host.GetTitledFirstName|l] me deu credibilidade perante seus [ROOT.Char.Custom('GetCourtierPlural')|l] , #EMP mis#! [ROOT.Char.Custom('GetCourtierPlural')|l] , e estou começando a me acostumar a ser [Select_CString( ROOT.Char.IsFemale, 'la nueva', 'el nuevo' )] [ROOT.Char.GetTitleAsNameNoTooltip|l] daqui."
 pilgrimage.9001.desc_buried_there: "Lamento sua morte e sinto profundo remorso por não ter podido deixar[old_pilgrimage_host.GetHerHim] descansar em [previous_holy_site.GetNameNoTierNoTooltip]."
 pilgrimage.9001.desc: "Fico um pouco irritado por não ter tido a oportunidade de deixar[old_pilgrimage_host.GetHerHim] descansar em [previous_holy_site.GetNameNoTierNoTooltip], mas, para todos os efeitos, [old_pilgrimage_host.GetSheHe] já descansa."
 pilgrimage.9001.a: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip], um coração, um lar."
 pilgrimage.9001.a_invalidated: "Pelo menos estamos em casa e inteiros."
 pilgrimage.9001.a.tt: "Pelo menos estamos de volta em uma só peça."
 #Bury old host back home
 pilgrimage.9010.t: "$pilgrimage_header$ Regresso ao Lar"
 pilgrimage.9010.desc.relation_family: "$pilgrimage_header$ Mercadorias Exóticas"
 pilgrimage.9010.desc.relation_liked: "Depois de carregar minhas mercadorias exóticas até [ROOT.Var('6540_exotic_wares_location').GetProvince.GetName],"
 pilgrimage.9010.desc.relation_neutral: "Agora preciso decidir o que fazer com eles.\n\nDevo vendê-los para obter lucro ou talvez guardá-los como presente para minha próxima trama pessoal…?"
 pilgrimage.9010.desc.turned_back_liked: "chegou a hora de colher as recompensas e vendê-las com lucro."
 pilgrimage.9010.desc.turned_back_neutral: "O dinheiro fala comigo."
 pilgrimage.9010.desc.there_and_back_liked: "Você vende as mercadorias pelo dobro do valor"
 pilgrimage.9010.desc.there_and_back_neutral: "Você vende as mercadorias pelo triplo do valor"
 pilgrimage.9010.desc.invalidated_pilgrimage_liked: "Não me importo se eu fizer isso!"
 pilgrimage.9010.desc.invalidated_pilgrimage_neutral: "Seria sábio guardar essas mercadorias."
 pilgrimage.9010.a: "Você terá a oportunidade de usar as mercadorias para aumentar o poder e a chance de sucesso do seu próximo [personal_scheme|lE]."
 pilgrimage.9010.a_interrupted: "$pilgrimage_header$ o mergulhador de pérolas"
 pilgrimage.9010.a_adventurer: "Quando nosso [Glossary( 'djong', 'DJONG_GLOSS' )] contornava [background_terrain_scope.GetName], decidimos parar por um tempo no/a [background_terrain_scope.Custom('TerrainTypeProvince')] costeiro/a com seu/sua [background_terrain_scope.Custom('TerrainTypeProvincePrefix')].\n\nUma figura solitária emerge das águas, uma criança.\n\n"O espírito de uma amêijoa gigante me disse para oferecer seu tesouro [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsName|l] que esperava lá em cima." A criança estende a mão, com uma pérola dentro."
 pilgrimage.9010.a.flavor: "Os espíritos estão em comunhão com [Select_CString( pearl_diver_child.IsFemale, 'esta niña', 'este niño' )], devo cuidar de [pearl_diver_child.GetSheHe]."
 #Follow-up to exotic wares event
 pilgrimage.9100.t: "Uma bela alhaja, obrigado, [Select_CString( pearl_diver_child.IsFemale, 'niña', 'niño' )]."
 pilgrimage.9100.desc_intro: "Uma embarcação marítima javanesa da Idade Média, construída em teca e unida sem ferro."
 pilgrimage.9100.desc: "$pilgrimage_header$ espíritos do mangue"
 pilgrimage.9100.desc_has_gift: "Ao contemplar a paisagem de [background_terrain_scope.GetName] com sua [background_terrain_scope.Custom('TerrainTypeProvincePrefix')] a costa é subitamente interrompida por um manguezal.\n\nNosso [Glossary( 'djong', 'DJONG_GLOSS' )] desliza lentamente até um grupo de pequenos barcos, cujos pescadores atiram punhados de arroz na água lamacenta.\n\n\"Uma oferenda aos espíritos, [ROOT.Char.GetTitleAsName]\", diz um[local_character.Custom('ES_XA')] pescador[local_character.Custom('ES_XA')]. \"Isso nos mantém a salvo do mal\"."
 pilgrimage.9100.a: "Peça a [Select_CString( local_character.IsFemale, 'las pescadoras', 'los pescadores' )] que se juntem como guias."
 pilgrimage.9100.a_double.tt: "Jogue um pouco de arroz pela grade."
 pilgrimage.9100.a_triple.tt: "Isso é assustador... vamos nos apressar."
 pilgrimage.9100.a_has_gift: "Pescadores locais"
 pilgrimage.9100.b: "Esta comitiva de viagem é acompanhada por um grupo de pescadores locais."
 pilgrimage.9100.b.tt: "$pilgrimage_header$ uma boa profecia"
 pilgrimage_seasia.100.t: "As ondas de [background_terrain_scope.GetName] quebram suavemente contra o casco da embarcação; um exemplar de [ROOT.Char.Custom('GetRandomRegionalWildDaytimeBird')] faz círculos sobre o mastro, captando um vento que cada vez está mais favorável.\n\nO bom presságio que recebi se confirma. Vamos chegar a [destination.GetName] rapidinho!"
 pilgrimage_seasia.100.desc: "Que estes ventos perdurem!"
 pilgrimage_seasia.100.a: "Boa profecia"
 pilgrimage_seasia.100.b: "A profecia que este personagem recebeu se concretizou, acelerando sua jornada."
 pilgrimage_seasia.100.c: "$pilgrimage_header$ santuário flutuante"
 DJONG_GLOSS: "Quando a costa de [background_terrain_scope.GetName] entra em vista, surge também uma grande embarcação levando um santuário [local_character.GetFaith.GetAdherentName] no convés. Ao nos aproximarmos, somos recebidos pelas figuras a bordo da embarcação: [GetTrait('devoted').GetName( local_character )] cegos, com as mãos fervorosamente unidas em oração.\n\n"Sejam bem-vind[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsName|l]", diz o líder entre eles. "Há algo com que possamos ajudá-lo, marinheiros cansados?"."
 pilgrimage_seasia.200.t: "Diga-me a verdade sobre [local_character.GetFaith.GetNameNoTooltip|l]."
 pilgrimage_seasia.200.desc: "Como será a jornada adiante, sábio?"
 pilgrimage_seasia.200.a: "Abençoe-nos, por favor."
 pilgrimage_seasia.200.b: "Você recebe uma profecia auspiciosa para a jornada à frente… ou talvez sejam apenas palavras vazias?"
 pilgrimage_seasia.200.c: "$pilgrimage_header$ os pescadores de [background_terrain_scope.GetNameNoTooltip]"
 local_fishermen_modifier: "As águas costeiras de [background_terrain_scope.GetName] fervilham de pescadores que lançam [Glossary('jalas', 'JALA_GLOSS')] e recolhem [Glossary('bubus', 'BUBU_GLOSS')]. Então, de repente, o caos explode!!\n\n"É [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip]!", ressoa uma voz de [local_character.GetWomanMan]. "Rápido, todos, precisamos nos deleitar com sua presença divina!". Em instantes, nosso [Glossary( 'djong', 'DJONG_GLOSS' )] fica cercado por barcos de pesca ansiosos."
 local_fishermen_modifier_desc: "Venham todos e contemplem minha benevolência!"
 pilgrimage_seasia.300.t: "Dispersai-vos, meus súditos, e falai-me sobre o [local_character.GetFaith.GetNameNoTooltip]."
 pilgrimage_seasia.300.desc: "Juntem-se a mim, ó meus/minhas mais [local_character.Custom('RandomPositiveShallowAdjective')] súditos!"
 pilgrimage_seasia.300.a: "Vamos sair daqui depressa…"
 good_prophecy_travel_modifier: "Visita costeira do governante"
 good_prophecy_travel_modifier_desc: "O governante deste condado demonstrou benevolência com a população costeira."
 pilgrimage_seasia.400.t: "Redes circulares com pesos de chumbo na borda, lançadas habilmente à mão de barcos ou da costa."
 pilgrimage_seasia.400.desc: "Armadilhas elaboradas de bambu para peixes, frequentemente montadas em estuários e deltas de manguezais."
 pilgrimage_seasia.400.a: "$pilgrimage_header$ uma oferenda de arroz"
 pilgrimage_seasia.400.b: "Contemplo a paisagem de [background_terrain_scope.GetName] enquanto meu [ROOT.Char.Custom2('RelationToMeShort', entourage_character)], [entourage_character.GetFirstNameNicknamed], se inclina ao meu lado e lança um punhado de arroz ao mar.\n\n"Meu [entourage_character.Custom2('RelationToMeShort', root_scope)], o arroz não é para os peixes — mas para lembrar aos espíritos que somos hóspedes aqui." Ele me oferece a bolsa. "Para uma viagem segura"."
 pilgrimage_seasia.400.c: "A cor do céu… um presságio?"
 a_good_prophecy_tt: "Vamos apaziguar os espíritos juntos, amig[entourage_character.Custom('ES_OA')]."
 pilgrimage_seasia.500.t: "Vou comer arroz no jantar, acho."
 pilgrimage_seasia.500.desc: "$pilgrimage_header$ a vítima do nāga"
 pilgrimage_seasia.500.a: "Apesar da chuva que embaça minha visão, vejo um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] que se agarra a umas tábuas. Meus homens [local_character.GetHerHim] o trazem a bordo de imediato.\n\n“Salvador [ROOT.Char.Custom('ComplimentAdjective')], lhe devo a vida!”, ofega. “Meu [Glossary('sampán', 'SAMPAN_GLOSS')] foi arrastado por uma [Glossary('nāga', 'NAGA_GLOSS')] maligna. Eu devia ter sabido que não se deve partir em um dia de azar…”."
 pilgrimage_seasia.500.b: "Sua sorte mudou agora, você está comigo."
 pilgrimage_seasia.500.c: "Estais amaldiçoad[local_character.Custom('ES_OA')] e deveis ir embora logo."
 pilgrimage_seasia.500.d: "Um barco pequeno de fundo chato, comum em rios e águas costeiras do sudeste da Ásia. Normalmente feitos de madeira e impulsionados a remo ou com varas, os sampans são usados para pescar, viajar ou comerciar nos rios."
 coastal_ruler_visit_travel_modifier: "Um espírito serpentino reverenciado no sul e no sudeste da Ásia, frequentemente visto como um guardião da água, da fertilidade e do submundo. Nem totalmente divinas nem mortais, as nāgas são tanto temidas quanto veneradas."
 coastal_ruler_visit_travel_modifier_desc: "$pilgrimage_header$ sombras na água"
 JALA_GLOSS: "As águas cristalinas de [background_terrain_scope.GetNameNoTooltip] se agitam quando uma sombra enorme dispara por baixo. Depois outra, e outra, até que parece que o [Glossary( 'djong', 'DJONG_GLOSS' )] balança com sua passagem.\n\nEu agarro meu arpão quando a tripulação começa a gritar. No tumulto, ouço uma palavra tomada pelo pânico: #EMP "[Glossary('nāgas!', 'NAGA_GLOSS')]"#!"
 BUBU_GLOSS: "Um bom presságio, eles nos guiarão?"
 pilgrimage_seasia.600.t: "Depressa, precisamos fazer oferendas!"
 pilgrimage_seasia.600.desc: "São peixes… Peguem os arpões."
 pilgrimage_seasia.600.a: "Talvez isso seja um bom presságio para o futuro…"
 pilgrimage_seasia.600.b: "$pilgrimage_header$ piratas em sampan"
 pilgrimage_seasia.600.c: "Quando nos aproximamos da costa de manguezais de [background_terrain_scope.GetNameNoTooltip], surgem [Glossary('sampanes', 'SAMPAN_GLOSS')] de seus esconderijos; são piratas que gritam e brandem ganchos de abordagem. Escalam o [Glossary( 'djong', 'DJONG_GLOSS' )] com rapidez e eu me vejo cara a cara com seu líder.\n\n“Entreguem o ouro, cães plebeus, ou eu…” ele congela, deixando cair sua [Glossary('pedang', 'PEDANG_GLOSS')]. “Perdoe-nos, divind[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]! Não queríamos fazer mal!”."
 pilgrimage_seasia.700.t: "Não tema; minha benevolência é grande."
 pilgrimage_seasia.700.desc: "Vocês são soldados habilidosos, juntem-se a mim."
 pilgrimage_seasia.700.a: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitleAsNameNoTooltip|l] exige passagem segura!"
 pilgrimage_seasia.700.b: "Uma espada reta de um único fio usada por guerreiros malaios e javaneses."
 SAMPAN_GLOSS: "$pilgrimage_header$ comerciantes de Tanah Makkah"
 NAGA_GLOSS: "Ao navegarmos por [background_terrain_scope.GetNameNoTooltip], um imponente navio mercante corta o caminho dos [Glossary('sampanes', 'SAMPAN_GLOSS')] e se coloca ao nosso lado. Um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] ricamente vestid[local_character.Custom('ES_OA')], aparentemente de [Glossary('Tanah Makkah', 'TANAH_MAKKAH_GLOSS')], sobe a bordo.\n\n"Saudações, [ROOT.Char.GetTitleAsNameNoTooltip|l], meu nome é [local_character.GetFirstNameNicknamed], vindo de [merchant_home.GetNameNoTier]" e faz uma reverência. "Somos comerciantes [local_character.GetFaith.GetReligion.GetAdherentName] em busca de um porto para construir um/a [local_character.GetFaith.HouseOfWorship]."\n\n"Pagaríamos muito bem, é claro!""
 pilgrimage_seasia.800.t: "Nos aceptaría [local_character.GetFaith.HighGodName]?"
 pilgrimage_seasia.800.desc: "[local_character.GetFaith.HighGodName]? Permitam-me explicar a divindade de [ROOT.Char.GetFaith.HighGodName]."
 pilgrimage_seasia.800.a: "Vocês podem construir um(a) [local_character.GetFaith.HouseOfWorship] em [mosque_location.GetNameNoTooltip]."
 pilgrimage_seasia.800.b: "Feche alguns acordos e siga em frente."
 pilgrimage_seasia.800.c: "No sudeste da Ásia, Meca (Makkah) tornou-se uma abreviação para a Arábia como um todo. \"Tanah Makkah\" é traduzido como \"Terra de Meca\" e aparece nos primeiros manuscritos islâmicos da região."
 a_good_omen_tt: "Você não tem a intenção Fanatismo"
 pilgrimage_seasia.900.t: "$pilgrimage_header$ armadilha de rattan"
 pilgrimage_seasia.900.desc: "Enquanto caminhamos por uma trilha estreita pelo/pela [background_terrain_scope.Custom('TerrainTypeProvince')] com seu/sua [background_terrain_scope.Custom('TerrainTypeProvincePrefix')] de [background_terrain_scope.GetNameNoTooltip], uma voz chama lá de cima. Um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] fica pendurad[local_character.Custom('ES_OA')] de cabeça para baixo, preso em uma armadilha de [Glossary('ratã', 'RATTAN_GLOSS')].\n\n"Socorro! Pisei numa armadilha para porcos e preciso de um salvador [ROOT.Char.Custom('FormalComplimentAdjective')]!", grita [local_character.GetSheHe]. "Juro que sou um[local_character.Custom('ES_XA')] guia excelente — me libertem, e eu me juntarei a vocês!""
 pilgrimage_seasia.900.a: "Podeis juntar-vos a nós."
 pilgrimage_seasia.900.b: "Contai ao vosso povo sobre a minha piedade."
 pilgrimage_seasia.900.c: "Ja. Dejad que cuelgue."
 PEDANG_GLOSS: "Uma palmeira trepadeira, apreciada por sua força e flexibilidade. Com o rattan, tecem-se cestos, amarras e armadilhas; é uma ferramenta comum da vida na selva, usada por caçadores, comerciantes e aldeões por igual."
 pilgrimage_seasia.1000.t: "$pilgrimage_header$ um andarilho de Nalanda"
 pilgrimage_seasia.1000.desc: "Ao descer por uma trilha sinuosa, avistamos um[local_character.Custom('ES_XA')] [GetTrait('devoted').GetName( local_character )] acampad[local_character.Custom('ES_OA')] junto a [background_terrain_scope.Custom('GetRandomRegionalDangerSingular')] na/o [background_terrain_scope.Custom('TerrainTypeProvince')].\n\n"Saudações, peregrinos", diz suavemente. "Sou um[local_character.Custom('ES_XA')] erudit[local_character.Custom('ES_OA')] de fé [local_character.GetFaith.GetAdjective] proveniente de [GetBuilding('nalanda_university').GetName], em busca dos lugares mais tranquilos de [exploration_target.GetBaseNameNoTier] para a meditação. Poderíeis compartilhar vosso conhecimento destas terras?"."
 pilgrimage_seasia.1000.a: "Se me contar sobre a sua fé [local_character.GetFaith.GetAdjectiveNoTooltip] sua!"
 pilgrimage_seasia.1000.b: "Sim, se você abençoar meu [blessed_artifact.GetNameNoTooltip]?"
 pilgrimage_seasia.1000.c: "[other_barony.GetBaseNameNoTierNoTooltip] é o lugar mais sereno para a meditação."
 pilgrimage_seasia.1000.d: "[blessed_artifact.GetName] receberá um modificador aleatório"
 TANAH_MAKKAH_GLOSS: "$pilgrimage_header$ a Lagoa Crocante"
 zealotry_intent_tt: "Depois de nos arrastarmos por tamanha [background_terrain_scope.Custom('GetRandomRegionalDangerSingular')] deparamo-nos com uma visão rara — um lago de água iluminado, perfeitamente redondo. Os sapos se alinham nas margens como pequenos monges, coaxando em ritmo, como se estivessem em louvor.\n\nArroz, flores e [Glossary('hojas de betel', 'BETEL_LEAVES_GLOSS')] flutuam na superfície, sinais de uma oferenda feita."
 pilgrimage_seasia.1100.t: "Vamos ficar e refletir por um momento."
 pilgrimage_seasia.1100.desc: "Sacrifiquemos um pouco de arroz."
 pilgrimage_seasia.1100.a: "Lindo, mas precisamos partir."
 pilgrimage_seasia.1100.b: "Mascar a folha lustrosa da videira de betel com noz de areca e cal é uma prática comum por todo o sul e sudeste da Ásia. É frequentemente usada em rituais ou no comércio."
 pilgrimage_seasia.1100.c: "$pilgrimage_header$ o rosto de um deus"
 RATTAN_GLOSS: "Ao marcharmos pelo/a [background_terrain_scope.Custom('TerrainTypeProvince')] coberto/a de brumas de [background_terrain_scope.GetName], uma enorme figura de pedra surge diante de nós; envolta em trapos de tecido, coberta de trepadeiras. Dei de cara com a cabeça de um deus [character_faith.GetReligion.GetAdherentName] cujo olhar ancestral perscruta minha alma.\n\nQue deus seria… e era meu #EMP destino#! encontrar?"
 pilgrimage_seasia.1200.t: "É [character_faith.CreatorName], o criador."
 pilgrimage_seasia.1200.desc: "É [character_faith.WealthGodName], o avarento."
 pilgrimage_seasia.1200.a: "É [character_faith.WarGodName], o conquistador."
 pilgrimage_seasia.1200.b: "É [character_faith.HighGodName]! Eu sou chamado para [character_faith.GetNameNoTooltip|l]!"
 pilgrimage_seasia.1200.c: "É o deus das viagens, sem dúvida."
 improved_artifact_tt: "$pilgrimage_header$ O Pawang"
 pilgrimage_seasia.1300.t: "Atravessando à força a [background_terrain_scope.Custom('TerrainTypeProvince')] de [background_terrain_scope.GetName], o vento e a chuva açoitam nossos rostos como mil flechas. De repente, a tempestade se dissipa — o vento cessa, a chuva amaina e o sol aparece.\n\n\"Acalmei a tempestade quando vocês se aproximavam\", diz um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] com autoridade calma. \"Sou [local_character.GetFirstNameNicknamed], um[local_character.Custom('ES_XA')] [Glossary('pawang', 'PAWANG_GLOSS')]. Nestes lugares, eles me temem\"."
 pilgrimage_seasia.1300.desc: "Eu gostaria de ter alguém como você."
 pilgrimage_seasia.1300.a: "Você poderia abençoar o tempo?"
 pilgrimage_seasia.1300.b: "Que tolice; o tempo só está sendo caprichoso."
 pilgrimage_seasia.1300.c: "Um ritualista de quem se diz que controla o clima, os animais selvagens e os espíritos. Temeroso e respeitado em igual medida."
 BETEL_LEAVES_GLOSS: "Bom tempo"
 pilgrimage_seasia.1400.t: "O bom tempo abençoa este séquito."
 pilgrimage_seasia.1400.desc: "Ao marcharmos pelo/a [background_terrain_scope.Custom('TerrainTypeProvince')] coberto/a de brumas de [background_terrain_scope.GetName], uma enorme figura de pedra surge diante de nós; envolta em trapos de tecido, coberta de trepadeiras. Dei de cara com a cabeça de um deus [character_faith.GetReligion.GetAdherentName] cujo olhar ancestral perscruta minha alma.\n\nQue deus seria… e era meu #EMP destino#! encontrar?"
 pilgrimage_seasia.1400.a: "É [character_faith.CreatorName], o criador."
 pilgrimage_seasia.1400.b: "É [character_faith.WealthGodName], o avarento."
 pilgrimage_seasia.1400.c: "É [character_faith.WarGodName], o conquistador."
 pilgrimage_seasia.1400.d: "É [character_faith.HighGodName]! Eu sou chamado para [character_faith.GetNameNoTooltip|l]!"
 pilgrimage_seasia.1400.e: "É o deus das viagens, sem dúvida."
 pilgrimage_seasia.1500.t: "$pilgrimage_header$ O Pawang"
 pilgrimage_seasia.1500.desc: "Atravessando à força a [background_terrain_scope.Custom('TerrainTypeProvince')] de [background_terrain_scope.GetName], o vento e a chuva açoitam nossos rostos como mil flechas. De repente, a tempestade se dissipa — o vento cessa, a chuva amaina e o sol aparece.\n\n\"Acalmei a tempestade quando vocês se aproximavam\", diz um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] com autoridade calma. \"Sou [local_character.GetFirstNameNicknamed], um[local_character.Custom('ES_XA')] [Glossary('pawang', 'PAWANG_GLOSS')]. Nestes lugares, eles me temem\"."
 pilgrimage_seasia.1500.a: "Eu gostaria de ter alguém como você."
 pilgrimage_seasia.1500.b: "Você poderia abençoar o tempo?"
 pilgrimage_seasia.1500.c: "Que tolice; o tempo só está sendo caprichoso."
 PAWANG_GLOSS: "Um ritualista de quem se diz que controla o clima, os animais selvagens e os espíritos. Temeroso e respeitado em igual medida."
 good_weather_modifier: "Bom tempo"
 good_weather_modifier_desc: "O bom tempo abençoa este séquito."
