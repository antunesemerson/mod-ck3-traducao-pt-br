 #Haridwar
 pilgrimage.5331.t: "Cheguei ao lugar mais sagrado do mundo para os budistas, Bodh Gaya é o lugar onde [ROOT.Char.GetFaith.HighGodName] em pessoa alcançou a iluminação sob a Árvore Bodhi.\n\nDesde então, o elaborado Templo de Mahabodi foi construído ao redor da árvore sagrada, e peregrinos de todo o mundo acorrem aqui para saber mais sobre a história de [ROOT.Char.GetFaith.HighGodNameAlternatePossessive] e celebrar sua vida."
 pilgrimage.5331.desc: "Por fim, cheguei a Haridwar, a fonte do sagrado rio Ganges.\n\nA cidade foi construída no local onde a própria deusa Ganga desceu quando o senhor Shiva libertou o poderoso rio dos seus cachos de cabelo.\n\nConhecido por poder apagar os pecados, peregrinos de todo o mundo vêm até aqui para se banhar em suas águas. Agora eu serei um[ROOT.Char.Custom('ES_OA')] de eles."
 #Kanchipuram
 pilgrimage.5341.t: "Finalmente cheguei em Kushinagar, onde se diz que [ROOT.Char.GetFaith.HighGodName] abandonou o mundo mortal.\n\nTendo alcançado o Nirvana em vida, sua morte deve ser celebrada, pois [ROOT.Char.GetFaith.HighGodNameSheHe] obteve o Parinirvana após morrer e se libertar das correntes do renascimento. Esse moksha, ou libertação, é o objetivo final de todo budista devoto."
 pilgrimage.5341.desc: "Finalmente cheguei a Kanchipuram, lar do Templo de Kamakshi Amman.\n\nDedicado à deusa-mãe, este templo é conhecido como um lugar de paz e prosperidade, e continua sendo um dos sete locais mais sagrados do hinduísmo."
 #Ujjayini
 pilgrimage.5351.t: "Minha jornada finalmente me trouxe a Sarnath, o local onde [ROOT.Char.GetFaith.HighGodName] ensinou pela primeira vez as quatro nobres verdades aos seus seguidores, bem como os ensinamentos associados a elas.\n\nFoi aqui que a primeira escola budista foi fundada, o que ainda hoje atrai peregrinos de todo o mundo."
 pilgrimage.5351.desc: "Ao chegar à antiga cidade de Ujjain, começo a abrir caminho em direção ao jyotirlinga de Mahakaleshwar.\n\nDedicada ao Senhor Shiva em sua encarnação como Mahakaleshwar, a cidade há muito tempo é tanto um centro administrativo quanto de peregrinação, criando uma grande metrópole agitada que pulsa com a vida dos fiéis.\n\nDepois de chegar ao grande templo, busco a bênção do [ROOT.Char.GetFaith.BishopNeuter] para que limpe minha alma de seus pecados."
 #Dwarka
 pilgrimage.5361.t: "Parikrama"
 pilgrimage.5361.desc: "Contemplo o/a majestoso/a [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')] de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTier] e passo à próxima fase da minha [Glossary('yatra', 'YATRA_GLOSS')]. Expresso minha homenagem devota a [ROOT.Char.GetFaith.HighGodName] por meio de uma [Glossary('puja', 'PUJA_GLOSS')]. Depois, me junto à multidão no caminho da [Glossary('pradakshina', 'PRADAKSHINA_GLOSS')] circundando o santuário no sentido horário."
