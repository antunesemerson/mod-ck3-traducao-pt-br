 ### PARAMETERS
 pilgrimage_base_cost: "Custo Base"
 pilgrimage_cost_triggered_by_ghosts: "Influência Fantasmagórica"
 pilgrimage_cost_triggered_by_dead_hajj_relative: "Hajj Prometido"
 pilgrimage_cost_triggered_by_dead_pilgrimage_relative: "Peregrinação Prometida"
 pilgrimage_cost_pomp_ceremonial: "Custo Cerimonial Pomposo"
 pilgrimage_cost_pomp_throng: "Custo Multidão Pomposa"
 pilgrimage_cost_distance: "Custo de Distância"
 ### PHASES
 pilgrimage_phase_solo: "Peregrinação"
 pilgrimage_phase_solo_desc: "A peregrinação é uma jornada espiritual em suas crenças pessoais. O sucesso de uma peregrinação é determinado pelas escolhas feitas durante a viagem, assim como pelas feitas no destino."
 activity_pilgrimage_guest_desc: "$BULLET_WITH_TAB$ Participantes podem ganhar [piety|lE]\n$BULLET_WITH_TAB$ Participantes podem ganhar [legitimacy|lE] [legitimacy_i]\n$BULLET_WITH_TAB$ Participantes podem perder [stress|lE] [stress_loss_i]\n$BULLET_WITH_TAB$ Participantes podem ganhar o [trait|lE] [GetTrait('pilgrim').GetName( GetNullCharacter )|l]"
 ### OPTIONS
 #Type of Pilgrimage [Special Type] Option
 pilgrimage_type_pious: "Peregrinação Piedosa"
 pilgrimage_type_pious_desc: "$EFFECT_LIST_BULLET$ Algumas opções de evento permitirão ações especialmente piedosas\n$EFFECT_LIST_BULLET$ Realizá-las concede [piety|lE] extra ao completar\n\n#weak O propósito da peregrinação é prestar respeito ao divino, conectar-se de verdade com a própria substância do seu espírito.#!"
 pilgrimage_type_worldly: "Peregrinação Mundana"
 pilgrimage_type_worldly_desc: "$EFFECT_LIST_BULLET$ Algumas opções de evento permitirão ações turísticas\n$EFFECT_LIST_BULLET$ Realizá-las concede um modificador multicultural escalonado ao completar\n\n#weak Sentir o doce estranhamento do ar estrangeiro, decifrar as peculiaridades de línguas distantes... O que poderia ser melhor?#!"
 pilgrimage_type_hajj: "Hajj"
 pilgrimage_type_hajj_desc: "$EFFECT_LIST_BULLET$ Todos os muçulmanos capazes devem realizar o Hajj pelo menos uma vez na vida\n$EFFECT_LIST_BULLET$ Outros tipos ficam disponíveis após adquirir o [trait|lE] [GetTrait('hajjaj').GetName(GetNullCharacter)|l]\n\n#weak Lembre-se: o Hajj não é uma obrigação, mas uma oportunidade. Para submissão, humildade e perdão. Inshallah!#!"
 #Fidelity Option
 pilgrimage_option_fidelity: "Fidelidade"
 pilgrimage_fidelity_obligatory: "Obrigatória"
 pilgrimage_fidelity_obligatory_desc: "$EFFECT_LIST_BULLET$ Velocidade de [travel|lE] aumentada em #positive_value 50%#!\n$EFFECT_LIST_BULLET$ Você ganhará #EMP a menos#! de [piety|lE] na conclusão\n\n#weak Sim, sim, plenitude espiritual, obrigação moral, destino da minha essência imortal, e assim por diante. Podemos nos mover, por favor?#!"
 pilgrimage_fidelity_pilgrim: "Peregrino"
 pilgrimage_fidelity_pilgrim_desc: "$EFFECT_LIST_BULLET$ A velocidade de [travel|lE] não é afetada\n$EFFECT_LIST_BULLET$ As recompensas de [piety|lE] ao completar não são afetadas.\n\n#weak Com o coração contente e boa vontade, partimos para ver os lugares sagrados desta Terra.#!"
 pilgrimage_fidelity_contemplative: "Contemplativo"
 pilgrimage_fidelity_contemplative_desc: "$EFFECT_LIST_BULLET$ A velocidade de [travel|lE] é reduzida em #negative_value 50%#!\n$EFFECT_LIST_BULLET$ Você ganhará mais [piety|lE] ao completar\n\n#weak Se o propósito da peregrinação é a reflexão, que sentido há em se apressar? Afinal, a jornada é metade do propósito.#!"
 #Pomp Option
 pilgrimage_option_pomp: "Pompa"
 pilgrimage_pomp_humble: "Humilde"
 pilgrimage_pomp_humble_desc: "$EFFECT_LIST_BULLET$ N?o leva ningu?m da sua [court|lE], o que torna a [travel|lE] perigosa
$EFFECT_LIST_BULLET$ Voc? se junta a uma prociss?o de [EmptyScope.ScriptValue('pilgrimage_entourage_pomp_humble_max_value')] peregrinos aleat?rios
$EFFECT_LIST_BULLET$ Ganha-se mais [piety|lE] ao complet?-la

#weak A peregrina??o ? um momento para reflex?o tranquila. Uma prociss?o comum de peregrinos desconhecidos ? o melhor lugar para isso.#!"
 pilgrimage_pomp_appropriate: "Multidão"
 pilgrimage_pomp_appropriate_desc: "$EFFECT_LIST_BULLET$ Voc? traz guarda-costas ou bons cavaleiros, e talvez um amigo
$EFFECT_LIST_BULLET$ At? [EmptyScope.ScriptValue('pilgrimage_entourage_pomp_appropriate_max_value')] peregrinos aleat?rios se juntam ? sua prociss?o
$EFFECT_LIST_BULLET$ As recompensas de [piety|lE] ao ser conclu?da n?o s?o afetadas

#weak As estradas s?o perigosas e a viagem ? longa. Uma coisa ? pureza espiritual; outra ? agir com temeridade.#!"
 pilgrimage_pomp_ceremonial: "Zelo:"
 pilgrimage_pomp_ceremonial_desc: "$EFFECT_LIST_BULLET$ #EMP Tamb?m#! traz assistentes e parasitas piedosos
$EFFECT_LIST_BULLET$ At? [EmptyScope.ScriptValue('pilgrimage_entourage_pomp_ceremonial_max_value')] peregrinos aleat?rios se juntam ? sua prociss?o
$EFFECT_LIST_BULLET$ Ganha-se mais [piety|lE] ao complet?-la

#weak A f? exige formalidade, mesmo longe de casa. E como poder?amos ser formais sem seguidores?#!"
 pilgrimage_pomp_throng: "[Select_CString( CHARACTER.IsLocalPlayer, 'Seu personagem', CHARACTER.GetShortUIName )] partiu de [CHARACTER.GetCapitalLocation.GetBaronyNameExplicitly] em peregrinação para [PROVINCE.GetName]"
 pilgrimage_pomp_throng_desc: "$EFFECT_LIST_BULLET$ Todo [character|lE] interessado em sua [court|lE] se junta a você\n$EFFECT_LIST_BULLET$ Até [EmptyScope.ScriptValue('pilgrimage_entourage_pomp_throng_max_value')] peregrinos aleatórios se juntam ao seu cortejo\n$EFFECT_LIST_BULLET$ Se ganha muito mais [piety|lE] ao completá-la\n\n#weak Todos los fieles deben ver nuestros lugares sagrados… y tengo la intención de ayudarles.#!"
