 pilgrimage_translator_log_title: "$pilgrimage_header$ O Fim da Jornada"
 pilgrimage_translator_log: "E assim minha jornada espiritual chegou a um fim abrupto. Assim como a folha que cai no rio turbulento, só nos resta ver para onde as novas circunstâncias nos levam."
 pilgrimage_recruited_courtier_log_title: "Agora que minha capital é, de fato, a deslumbrante localização de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], não há muito sentido em continuar minha [GetActivityType('activity_pilgrimage').GetNameNoTooltip|l].\n\nDevo me concentrar em encerrar minha jornada lá e tentar a sorte em outro local sagrado."
 pilgrimage_recruited_courtier_log: "Sou uma folha no rio."
 pilgrimage_host_death_log_title: "Vamos em frente."
