 pilgrimage_inherited_pilgrimage_log_title: "$pilgrimage.0040.t$?"
 pilgrimage_inherited_pilgrimage_log: "Ai, a carne está me falhando. Mas o espírito é forte. Devo colocar minha vida nas mãos de [ROOT.Char.GetFaith.HealthGodName] e continuar minha jornada em direção a [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip]?"
 pilgrimage_burial_log_title: "Eu #EMP sou#! abençoado por [ROOT.Char.GetFaith.HighGodName]."
 pilgrimage_burial_log: "Sua [THIS.Char.GetInvolvedActivity.GetName|l] continuará"
 ### SYSTEM EVENTS
 #Invalidation Event
 pilgrimage.0040.t: "$pilgrimage_header$ Um Enterro em Casa"
 pilgrimage.0040.desc: "Nossa viagem foi interrompida e começaremos a retornar a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] para dar descanso final a [old_pilgrimage_host.Custom('ES_AlAla')] [old_pilgrimage_host.GetTitledFirstName|l]."
 pilgrimage.0040.desc_moved_capital: "É o que [old_pilgrimage_host.GetSheHe] teria desejado."
 pilgrimage.0040.a: "Sou uma folha no rio."
 pilgrimage.0040.a_moved_capital: "Morte de um Peregrino"
 #Illness Event - used in health.1001
 pilgrimage.0041.t: "Sim, claro."
 pilgrimage.0041.desc: "Se isso fará [pilgrimage_dying_relative.GetSheHe] descansar mais tranquilo."
 pilgrimage.0041.a: "Sua próxima [pilgrimage|lE] será mais barata"
 pilgrimage.0041.a.tt: "Sou uma pessoa ocupada nestes dias, [ROOT.Char.Custom2('RelationToMe' , SCOPE.sC('pilgrimage_dying_relative'))]."
 pilgrimage.0041.b: "Eu realmente preferiria não."
 #Invalidation because you bury old host back home
 pilgrimage.0042.t: "$pilgrimage_header$ Um Enterro em Casa"
 pilgrimage.0042.desc: "$pilgrimage_header$ A Chama da Helene"
 pilgrimage.0042.a: "$pilgrimage_header$ Fogo de Santo Elmo"
 #Promise your religious relative to go on a Pilgrimage
 pilgrimage.0500.t: "$pilgrimage_header$ Chama Divina"
 pilgrimage.0500.desc: "A tempestade no mar nos pega completamente de surpresa, enquanto o céu rasgado por raios começa a nos bombardear com chuva — e com um repentino clarão estrondoso, as pontas dos mastros se incendeiam em chamas azuis, envolvendo o navio em uma luz etérea.\n\n"
 pilgrimage.0500.a: ""Isto é um sinal!", grita meu [ROOT.Char.Custom2('RelationToMeShort', panicked_pilgrim)], [panicked_pilgrim.Custom('ES_ElLa')] [panicked_pilgrim.GetTitledFirstName|l], agarrando-se às cordas para salvar a vida. Sua voz mal se ouve por cima do bater das velas. "#EMP Devemos#! voltar! Antes que seja tarde demais!".\n\n"
 pilgrimage.0500.a.flavor: "A embarcação parece flutuar, intocada, acima das ondas violentas, seguramente guiada por uma força divina através da tempestade."
 pilgrimage.0500.a.tt_pilgrimage: "[ROOT.Char.GetFaith.HighGodNameAlternate|U] nos guia! Seja louvado!"
 pilgrimage.0500.b: "Mantenha o rumo, timoneiro!"
 pilgrimage.0500.b.flavor: "Eu subirei para encontrá-lo, [ROOT.Char.GetFaith.HighGodName]!"
 ###Generic Pilgrimage Journey Events
 #St. Elmo's Fire
 pilgrimage.1100.t.greek: "Deixe-me sentir o abraço de [ROOT.Char.GetFaith.random_DivineRealm]!"
 pilgrimage.1100.t.christian: "[ROOT.Char.GetFaith.WaterGodName] exige um sacrifício!"
 pilgrimage.1100.t.pagan: "Devemos esperar por essa rajada!"
 pilgrimage.1100.t: "Voltem atrás, seus tolos!"
 pilgrimage.1100.desc: "$pilgrimage.1100.c.flavor$"
 pilgrimage.1100.companion: "Cada membro da família"
 pilgrimage.1100.alone: "Você é guiado em segurança"
 pilgrimage.1100.a: "A tempestade te desvia do curso"
 pilgrimage.1100.a.flavor: "Um peregrino aleatório morrerá, afetando qualquer membro da [family|lE]"
 pilgrimage.1100.b: "[victim_pilgrim.GetFirstName] caiu no mar"
 pilgrimage.1100.b.success.t: "Fogo Divino"
 pilgrimage.1100.b.wounded.t: "Ferido"
 pilgrimage.1100.b.flavor: "$pilgrimage_header$ Saqueadores [ROOT.Char.Custom2('GetUnbelieverTerm', heathen_raider)]"
 pilgrimage.1100.c: "Ao cruzar os/as [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] de [heathen_raider_county.GetNameNoTierNoTooltip], avistamos os estandartes de uma pequena hoste, ostentando o/a [heathen_raider.GetFaith.ReligiousSymbol] da fé [heathen_raider.GetFaith.GetAdjective]. São vagabundos esfarrapados que se aproveitam dos peregrinos que seguem para [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetName].\n\nSeu líder bloqueia rapidamente nossa rota, empinando o cavalo e se apresentando como [heathen_raider.GetFirstName]."
 pilgrimage.1100.c.flavor: "\"Pare, [ROOT.Char.Custom2('GetUnbelieverTerm', heathen_raider)]! Pelo [ROOT.Char.GetFaith.HighGodName], os [ROOT.Char.GetFaith.GetAdherentNamePlural] devem pagar a taxa da Kaaba.\""
 pilgrimage.1100.d: ""Um pequeno pagamento para ver a Caaba é tudo o que peço aos seus tesoureiros [ROOT.Char.GetFaith.GetAdherentNamePlural] [heathen_raider.Custom2('GetUnbelieverTermAdjective', ROOT.Char)]"."
 pilgrimage.1100.d.flavor: "\"Não tema, [heathen_raider.Custom2('GetUnbelieverTermPlural', ROOT.Char)], as maravilhas de nossa cidade sagrada aguardam por você, por uma pequena taxa.\""
 every_family_member_tt: "\"Se você realmente deseja ver sua sagrada cidade almejada, minha pequena taxa não será um problema.\""
 pilgrimage.1100.success: ""Vocês não sabem, cachorros [ROOT.Char.GetFaith.GetAdherentNamePlural]? Os [ROOT.Char.Custom2('GetUnbelieverTermPlural', heathen_raider)] devem pagar tributo para ver os/as [heathen_raider.GetFaith.HouseOfWorshipPlural] sagrados/sagradas"."
 pilgrimage.1100.failure: "\"Seus [ROOT.Char.GetFaith.HouseOfWorshipPlural] ainda estarão aqui depois que você pagar nossa modesta taxa.\""
 pilgrimage_random_pilgrim_tt: "\"Nossos [heathen_raider.GetFaith.HouseOfWorshipPlural] são maravilhosos de se ver, como você descobrirá assim que pagar suas dívidas.\""
 pilgrimage_fell_overboard_tt: "\"Pare, [ROOT.Char.Custom2('GetUnbelieverTerm', heathen_raider)]. Eu, que mantenho a paz nessas estradas, exijo que você pague como todos os outros.\""
 #Heathen Raiders
 #pilgrimage_joe_0200_army: "Os bandidos repensam a situação"
 pilgrimage.1110.t: "Você consegue se defender da primeira onda"
 pilgrimage.1110.desc: "Por sua insolência, eles levam tudo"
 pilgrimage.1110.shared_target_heathen_hajj: "Venha [heathen_raider.Custom('SisterBrother')], ambos seguimos [ROOT.Char.GetFaith.HighGodName]."
 pilgrimage.1110.shared_target_controlled_hajj: "Venha, nunca é tarde para o [ROOT.Char.GetFaith.ReligiousText]."
 pilgrimage.1110.shared_target_heathen_jerusalem: "Não há necessidade de violência, vamos conversar."
 pilgrimage.1110.shared_target_controlled_jerusalem: "Você está enganado, ouça as verdades [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]."
 pilgrimage.1110.shared_target_heathen: "Suas palavras soam verdadeiras"
 pilgrimage.1110.shared_target_controlled: "O bandido não está impressionado"
 pilgrimage.1110.shared_heathen_controlled: "Pegue seu ouro, bandido."
 pilgrimage.1110.fallback: "Até dois membros do séquito poderão ficar [GetTrait('wounded_1').GetName( GetNullCharacter )|l]"
 pilgrimage.1110.a: "Um membro do séquito pode ficar [GetTrait('wounded_1').GetName( GetNullCharacter )|l]"
 pilgrimage.1110.a.fled: "Até dois membros do séquito podem morrer"
 pilgrimage.1110.a.skirmish: "Um membro do séquito pode morrer"
 pilgrimage.1110.a.beaten: "Por sua insolência, eles levam tudo"
 pilgrimage.1110.b.religion: "$pilgrimage_header$ Arquitetura [temple_province.GetCounty.GetFaith.GetReligion.GetAdjectiveNoTooltip] do Templo"
 pilgrimage.1110.b.unreformed: "Passando por [temple_province.GetTitle.GetDeJureLiege.GetNameNoTooltip], aproveitamos para visitar o/a [ROOT.Char.GetFaith.HouseOfWorship] de [temple_province.GetName], um centro [temple_liege.GetPrimaryTitle.GetAdjectiveNoTooltip] de culto e autoridade [temple_province.GetCounty.GetFaith.GetAdjective].\n\n[temple_person.GetName], um[temple_person.Custom('ES_XA')] [temple_person.GetFaith.PriestNeuter] local menor, nos dá uma visita pelos terrenos e edifícios. Conta a história e aponta as obras de arte produzidas pelos [temple_province.GetCounty.GetFaith.DevoteeNeuterPlural] locais que estão reunidos em suas orações do meio-dia."
 pilgrimage.1110.b: "Isso me dá uma ideia..."
 pilgrimage.1110.c: "#EMP Isto#! é exatamente o que precisamos em [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]!"
 pilgrimage.1110.c.success: "Que desculpa lamentável para um [ROOT.Char.GetFaith.HouseOfWorship]."
 pilgrimage.1110.c.failure: "Sim, sim, já é o suficiente, obrigado."
 pilgrimage.1110.d: "Vou me juntar em oração a [ROOT.Char.GetFaith.HighGodName]."
 two_entourage_members_wounded_tt: "#EMP Isto#! é exatamente o que precisamos em [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]!"
 one_entourage_members_wounded_tt: "Um membro do séquito pode ficar [GetTrait('wounded_1').GetName( GetNullCharacter )|l]"
 two_entourage_members_die_tt: "$pilgrimage_header$ Capela de beira de estrada"
 one_entourage_members_die_tt: "Em uma bifurcação da estrada nos arredores de [shrine_province.GetName] um santuário desolado [shrine_province.GetCounty.GetFaith.GetAdherentName] marcado com um/a [shrine_province.GetCounty.GetFaith.ReligiousSymbol] ergue-se em meio a [shrine_province.Custom('GetProvinceGroundDesc')].\n\nUma reentrância abriga humildes oferendas deixadas por viajantes e locais, cercadas pelos restos de incontáveis velas, agora apagadas."
 #Tour Church
 pilgrimage.1120.t: "\n\n [ROOT.Char.Custom2('RelationToMeShort', shrine_faithist)], [shrine_faithist.GetName], para para rezar, adicionando seu próprio e pequeno símbolo à coleção."
 pilgrimage.1120.desc: "\n\n [ROOT.Char.Custom2('RelationToMeShort', shrine_mocker)], [shrine_mocker.GetName], zomba da visão disso, resmungando sobre a [shrine_mocker.GetFaith.NegativeAfterLife]."
 pilgrimage.1120.a: "Eu posso oferecer algo."
 pilgrimage.1120.b: "Não vejo problema..."
 pilgrimage.1120.c: "Mais útil para mim, afinal!"
 pilgrimage.1120.d: "Cada membro do séquito [shrine_visitor.GetFaith.GetAdjective]"
 pilgrimage.1120.e: "Cada membro do séquito [shrine_province.GetCounty.GetFaith.GetAdjective]"
 pilgrimage.1120.f: "Cada membro do séquito [GetTrait('zealous').GetName( GetNullCharacter )|l] [shrine_visitor.GetFaith.GetAdjective]"
 #Roadside Shrine
 pilgrimage.1130.t: "Isso vai mostrar para eles!"
 pilgrimage.1130.desc: "[shrine_faithist.GetFaith.HighGodName] não vai conseguir isso, sabe."
 pilgrimage.1130.both: "Já que [shrine_faithist.GetFaith.HighGodName] não existe!"
 pilgrimage.1130.faithist: "Mantenha sua língua quieta, [ROOT.Char.Custom2('GetUnbelieverTerm', shrine_mocker)]."
 pilgrimage.1130.mocker: "Vamos, não vamos perder tempo."
 pilgrimage.1130.a: "[ROOT.Char.GetFaith.HighGodName] não espera por nenhum [shrine_province.GetCounty.GetFaith.GetAdherentNameNoTooltip]."
 pilgrimage.1130.b: "Não vejo problema..."
 pilgrimage.1130.b.flavor: "$pilgrimage_header$ Segurança em Números"
 every_root_faith_entourage_member_tt: "Enquanto abrimos caminho por [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTier] aborda-nos um [group_leader.Custom('ES_XA')] plebeu [group_leader.Custom('ES_OA')] da cultura [group_leader.GetCulture.GetName] que afirma ser o líder de um grupo de peregrinos [ROOT.Char.GetFaith.GetAdherentNamePlural].\n\nBom [ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], levamos semanas na estrada rumo a [destination.GetName], mas as estradas são perigosas demais e agora estamos com poucos mantimentos.\n\nFicaríamos eternamente gratos pelo vosso apoio."
 every_province_faith_entourage_member_tt: "Quanto mais, melhor!"
 every_zealous_root_faith_entourage_member_tt: "[group_leader.GetFirstName] e mais três pessoas se juntarão à sua [ROOT.Char.GetInvolvedActivity.GetName|l]"
 pilgrimage.1130.c: "[group_leader.GetCulture.GetNameNoTooltip]? Fora de cogitação."
 pilgrimage.1130.c.flavor: "Nunca confie em um [group_leader.GetCulture.GetNameNoTooltip]."
 pilgrimage.1130.d: "Tenha algumas moedas, pelos seus problemas."
 pilgrimage.1130.d.flavor: "Nem pensar, camponês[group_leader.Custom('ES_OA')]."
 pilgrimage.1130.e: "Vá embora! Desapareça!"
 pilgrimage.1130.f: "Peregrinos Agradecidos"
 pilgrimage.1130.f.other: "Peregrinos Rejeitados"
 #Strength in Numbers
 pilgrimage.1140.t: "$pilgrimage_header$ Ame o Teu Próximo"
 pilgrimage.1140.desc: "Entre meus companheiros peregrinos há um[heathen_hater.Custom('ES_XA')] [heathen_hater.GetWomanMan] que prega compaixão e fraternidade… até chegarmos ao tema dos [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')].\n\nUma noite, em torno da fogueira, [heathen_hater.GetSheHe] proclama em voz alta que são "monstros abomináveis aos olhos de [ROOT.Char.GetFaith.PantheonTerm]. Todos uns desviantes ou assassinos de crianças!". A maioria das pessoas desvia o olhar quando olha para elas. Hoje eu não fui rápido o suficiente[ROOT.Char.Custom('ES_OA')]. "Não concordais, ó, [ROOT.Char.GetTitleAsNameNoTooltip|l]?"."
 pilgrimage.1140.a: "Eles não são #EMP todos#! tão maus assim."
 pilgrimage.1140.a.tt: "Concordo, e não confiaria em ninguém que viesse em sua defesa!"
 pilgrimage.1140.b: "De fato! Eles cospem no rosto de [ROOT.Char.GetFaith.HighGodName]!"
 pilgrimage.1140.b.flavor: "Nunca confie em um [group_leader.GetCulture.GetNameNoTooltip]."
 pilgrimage.1140.c: "$pilgrimage_header$ Uma Questão de Segurança"
 pilgrimage.1140.d: "Há algum tempo venho sentindo uma sensação incômoda. Minha peregrinação acabou sendo mais perigosa do que eu esperava, ou talvez eu simplesmente não tenha suportado provações suficientes para provar que sou digno[ROOT.Char.Custom('ES_XA')] da proteção [ROOT.Char.GetFaith.HighGodNameAlternatePossessive].\n\nNo entanto, #EMP he#! vi algumas pessoas impressionantes no assentamento local de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] que certamente melhorariam a segurança da peregrinação de uma forma mais prática."
 pilgrimage.1140.d.flavor: "Devo contratar alguns deles para minha peregrinação."
 grateful_pilgrims_title: "[2002_local_warrior.Custom('ES_ElLa')|U] [2002_local_warrior.GetTitledFirstNameNoTooltip|l] parece um[2002_local_warrior.Custom('ES_XA')] excelente exemplar."
 cultural_acceptance_rejected_pilgrims: "Não. Tenho fé no [ROOT.Char.GetFaith.PantheonTerm]."
 #Heathen-hating adherent challenges you
 pilgrimage.2002.t: "$pilgrimage_header$ Um Encontro Inesperado"
 pilgrimage.2002.desc: "À medida que me aproximo a [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip], cada vez encontro mais companheiros peregrinos de todos os tipos de lugares.\n\nUm deles me reconhece de longe: "[ROOT.Char.GetTitledFirstNameNoTooltip]? É você?".\n\nE não é outro senão [potential_friend.Custom2('MyCharacterIntroduction', ROOT.Char)]!"
 pilgrimage.2002.a: "Fomos unidos pela [ROOT.Char.GetFaith.PantheonTerm|U]!"
 pilgrimage.2002.b: "Um encontro auspicioso, mas preciso rezar em solitude."
 pilgrimage.2002.c: "De fato! Eles cospem no rosto de [ROOT.Char.GetFaith.HighGodName]!"
 #Companions are running low
 pilgrimage.2003.t: "Ao passar pelo fogo da fogueira do acampamento, um[rude_pilgrim.Custom('ES_XA')] peregrin[rude_pilgrim.Custom('ES_OA')] de outro séquito está contando uma história que ouviu no passado sobre [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l]"
 pilgrimage.2003.desc: "dessas terras,"
 pilgrimage.2003.a: "de um lugar distante chamado [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip],"
 pilgrimage.2003.b: "às gargalhadas estridentes.\n\nQuando percebe minha hesitação, [rude_pilgrim.Custom('ES_ElLa')] narrador[rude_pilgrim.Custom('ES_XA')] me olha de forma tranquilizadora[rude_pilgrim.Custom('ES_XA')]: "Não se preocupe, [ROOT.Char.Custom('FormOfAddressForLiege')]! Certamente trata-se de #EMP otr[ROOT.Char.Custom('ES_OA')]#! nobre arrogante[ROOT.Char.Custom('ES_OA')]!""
 pilgrimage.2003.c: ""Não, é mesmo? Conte-me mais sobre est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetTitleAsNameNoTooltip]"."
 #Run into a Potential Friend
 pilgrimage.2004.t: "\"Guardas! Tragam meu chicote.\""
 pilgrimage.2004.desc: "Talvez seja hora de encontrar outros para viajar junto."
 pilgrimage.2004.a: "Fomos unidos pela [ROOT.Char.GetFaith.PantheonTerm|U]!"
 pilgrimage.2004.b: "$pilgrimage_header$ O Caminho Pitoresco"
 #A peasant inadvertedly insults you
 pilgrimage.2005.t: "Mantenho os olhos bem abertos, tentando reconhecer o caminho adiante — mas não consigo achar nada — e começo a me preocupar um pouco. #EMP Era#!\n\nera esta direção, não era...? Olho hesitante para um camponês local que está ocupado com suas tarefas um pouco mais à frente."
 pilgrimage.2005.desc: "Meu $travel_leader_court_position$, [caravan_master.GetTitledFirstName|l] olha ao redor, buscando freneticamente o caminho a seguir, e as pessoas começam a perceber.\n\nO rosto [caravan_master.Custom('ES_DelDela')] [caravan_master.GetTitledFirstNameNoTooltip|l] adquire um tom acinzentado ao voltar o olhar para mim, em busca de respostas sobre o que fazer em seguida."
 pilgrimage.2005.desc_close: "Eu conheço o caminho para [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip] como a palma da minha mão!"
 pilgrimage.2005.desc_far: "Deixaremos que [ROOT.Char.GetFaith.HighGodNameAlternate] guie o caminho."
 pilgrimage.2005.outro: "Desfrutemos da criação [ROOT.Char.GetFaith.CreatorNamePossessive] por mais um tempo."
 pilgrimage.2005.a: "Não é o fim do mundo, suponho."
 pilgrimage.2005.a.flavor: "Acho que posso pedir informações aos moradores locais..."
 pilgrimage.2005.b: "Agora #EMP você#! vai ter que pedir informações."
 pilgrimage.2005.c: "Talvez seja hora de encontrar outros para viajar junto."
 #You have gotten lost
 pilgrimage.2006.t: "Parece que não estou me adaptando bem a todas essas viagens. Talvez sejam as terras estranhas cheias de ar desconhecido, ou talvez minhas peles não estejam suficientemente quentes.\n\nDe qualquer forma, minha tosse tem sido persistente há semanas, e esta manhã mal tive forças para sair da cama."
 pilgrimage.2006.intro: "Se for a vontade [ROOT.Char.GetFaith.HighGodNameAlternatePossessive]."
 pilgrimage.2006.desc_alone: "Viajar enquanto [GetTrait('ill').GetName( GetPlayer )] apresenta maiores riscos à saúde"
 pilgrimage.2006.desc_travel_leader: "Ah, essa pequena tosse passará rapidamente."
 pilgrimage.2006.a: "[traveling_court_physician.GetTitledFirstNameNoTooltip|U], prepare algo para mim."
 pilgrimage.2006.a_pious: "Deixaremos que [ROOT.Char.GetFaith.HighGodNameAlternate] guie o caminho."
 pilgrimage.2006.b: "$pilgrimage_header$ Tosse Raspante"
 pilgrimage.2006.b_cynical: "A jornada não está fazendo bem para minha saúde. Minha condição não melhorou durante minha busca pela graça de [ROOT.Char.GetFaith.PantheonTerm]. Piorou muito, muito mesmo. Não me lembro mais como é respirar sem luta."
 pilgrimage.2006.c: "Que [ROOT.Char.GetFaith.HighGodNameAlternate] tenha misericórdia."
 pilgrimage.2006.c_caravan_master: "Viajar enquanto [GetTrait('pneumonic').GetName( GetPlayer )|l] apresenta perigosos riscos à saúde"
 #Fall ill
 pilgrimage.2008.t: "$pilgrimage_header$ O Místico"
 pilgrimage.2008.desc: "[2010_mystic.Custom('ES_AlAla')] [2010_mystic.GetTitledFirstName|l] é uma das pessoas mais estranhas que encontrei nesta jornada. Parece um[2010_mystic.Custom('ES_XA')] fiel crente, mas também discorre sobre a verdadeira natureza de [ROOT.Char.GetFaith.HighGodName] e o que isso significa. À noite, sua tenda se ilumina com as velas lá dentro, e dela emanam cânticos estranhos e um incenso incomum.\n\nSou pego totalmente desprevenido[ROOT.Char.Custom('ES_OA')] quando [2010_mystic.GetFirstNameNoTooltip] me convida a entrar."
 pilgrimage.2008.a: "Estou bastante curioso..."
 pilgrimage.2008.a.tt: "Você entra na tenda"
 pilgrimage.2008.whole_of_body: "Não, obrigado, tudo isso cheira a heresia para mim!"
 pilgrimage.2008.court_physician: "[traveling_court_physician.GetTitledFirstNameNoTooltip|U], prepare algo para mim."
 #Develop pneumonia
 pilgrimage.2009.t: "Sim! Sinto minha conexão com [ROOT.Char.GetFaith.HighGodNameAlternate]!"
 pilgrimage.2009.desc: "Você experimenta o êxtase da divindade"
 pilgrimage.2009.a: "Estou tão confortável que posso até adormecer..."
 pilgrimage.2009.a.tt: "Você tem um agradável cochilo"
 #Meet a mystic
 pilgrimage.2010.t: "Você inicia um debate com esse místic[mystic.Custom('ES_OA')]"
 pilgrimage.2010.desc: "[2010_mystic.Custom('ES_AlAla')] [2010_mystic.GetTitledFirstName|l] é uma das pessoas mais estranhas que encontrei nesta jornada. Parece um[2010_mystic.Custom('ES_XA')] fiel crente, mas também discorre sobre a verdadeira natureza de [ROOT.Char.GetFaith.HighGodName] e o que isso significa. À noite, sua tenda se ilumina com as velas lá dentro, e dela emanam cânticos estranhos e um incenso incomum.\n\nSou pego totalmente desprevenido[ROOT.Char.Custom('ES_OA')] quando [2010_mystic.GetFirstNameNoTooltip] me convida a entrar."
 pilgrimage.2010.a: "Não consigo me lembrar ao certo do que aconteceu depois que entrei na tenda [Select_CString( 2010_mystic.IsFemale, 'da mística', 'do místico')]. Só me lembro de imagens vagas e de uma sensação de tontura.\n\nAgora me pergunto se [2010_mystic.GetSheHe] sequer esteve aqui..."
 pilgrimage.2010.a.tt: "[2010_mystic.GetFirstName] tinha muitas ideias estranhas."
 pilgrimage.2010.b: "Não, obrigado, tudo isso cheira a heresia para mim!"
 #The Mystic has a lot to say about your faith
 pilgrimage.2011.desc: "Eu estava cego[ROOT.Char.Custom('ES_OA')] mas agora vejo."
 pilgrimage.2011.a: "Sim! Sinto minha conexão com [ROOT.Char.GetFaith.HighGodNameAlternate]!"
 pilgrimage.2011.a.tt: "Quando acordo de cochilar em sua tenda, a própria tenda já não está mais lá. Meus servos me despertam da esteira em que adormeci, mas não há nenhum vestígio [Select_CString( 2010_mystic.IsFemale, 'da mística', 'do místico')].\n\nAo menos o sono foi revigorante!"
 pilgrimage.2011.b: "Por que minha bolsa parece estranhamente leve?"
 pilgrimage.2011.b.tt: "Roubado"
 pilgrimage.2011.c: "Alguém mexeu em seus pertences"
 pilgrimage.2011.c.tt: "Bem Descansado"
 #Fallback in case something happened in between events
 pilgrimage.2012.desc: "Foi um bom descanso."
 pilgrimage.2012.a: "[2010_mystic.GetFirstName] tinha muitas ideias estranhas."
 #Outcome of engaging
 pilgrimage.2013.desc: "Como alguém #EMP pode#! se aproximar de [ROOT.Char.GetFaith.PantheonTerm]?"
 pilgrimage.2013.a: "Aumento do Conhecimento"
 #Outcome of sleeping
 pilgrimage.2014.desc: "Aumento da Piedade"
 pilgrimage.2014.a: "Você ganha piedade ao debater suas crenças"
 pilgrimage.2014.pilfered.t: "Roubado"
 pilgrimage.2014.pilfered.desc: "$pilgrimage_header$ Ladrões"
 pilgrimage.2014.restful.t: "Acordo de meu sono quando alguém no acampamento derruba uma panela de ferro. Quando olho ao redor, parece que dois indivíduos vestidos como peregrinos estavam revirando nossos suprimentos em busca de objetos de valor para roubar."
 pilgrimage.2014.restful.desc: "\n\nUm deles me vê se mexendo e fica imóvel, enquanto o outro ladrão se vira e foge."
 pilgrimage.2014.a_restful: "\n\nO menor dos dois, uma criança abatida pelo que parece, me vê se mexendo e fica imóvel, enquanto o outro ladrão se vira e foge."
 #Outcome of debating
 pilgrimage.2015.desc: "Sente-se junto ao fogo, pequen[thief_to_convert.Custom('ES_OA')]."
 pilgrimage.2015.a: "[thief_to_convert.GetSheHe|U] é claramente uma criatura infeliz."
 pilgrimage.2015.learning.t: "Essa não é a vida que [ROOT.Char.GetFaith.HighGodName] deseja para você."
 pilgrimage.2015.learning.desc: "Você convence o [thief_to_convert.Custom('ES_AlAla')] jovem"
 pilgrimage.2015.piety.t: "[thief_to_convert.Custom('ES_ElLa')|U] o jovem precisará de mais orientação posteriormente"
 pilgrimage.2015.piety.desc: "Os Ladrões Fogem"
 #Pilgrimage thieves
 pilgrimage.2020.t: "Todos nós fazemos o que precisamos fazer."
 pilgrimage.2020.desc: "Então #EMP esta#! é a vontade [ROOT.Char.GetFaith.HighGodNamePossessive] , hein?"
 pilgrimage.2020.desc_adult: "Quem sou eu para interferir nos planos de [ROOT.Char.GetFaith.HighGodNamePossessive]?"
 pilgrimage.2020.desc_child: "\n\nO menor dos dois, uma criança abatida pelo que parece, me vê se mexendo e fica imóvel, enquanto o outro ladrão se vira e foge."
 pilgrimage.2020.a: "$pilgrimage_header$ Arrependimento"
 pilgrimage.2020.a_child: "Consegui convencer [thief_to_convert.Custom('ES_AlAla')] [thief_to_convert.GetTitledFirstName|l] a mudar seus modos. Agora está diante de mim, o peso de sua vergonha faz com que seus ombros se abaixem, enquanto evita encontrar meu olhar.\n\n\"Esta vida não foi minha escolha\", diz lentamente [thief_to_convert.GetFirstNameNoTooltip]. \"O que devo fazer para me arrepender dos meus pecados?\"."
 pilgrimage.2020.a.flavor: "Espalhe a palavra de [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip|l]."
 pilgrimage.2020.b: "Castigarme siempre #EMP me#! hace sentir mejor…"
 pilgrimage.2020.b.success.desc: "Trabalho duro resolve tudo."
 pilgrimage.2020.b.success.tt: "[thief_to_convert.GetSheHe|U] trabalhará para se redimir de #EMP seus#! pecados."
 pilgrimage.2020.b.failure.t: "Os Ladrões Fogem"
 pilgrimage.2020.b.failure.desc: "$pilgrimage_header$ Fenômenos Climáticos"
 pilgrimage.2020.c: "Cruzando os mares rumo ao nosso destino em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip], não deixo de me maravilhar com sua imensidão e seus caprichos de espírito [ROOT.Char.Custom('GetWickedDangerous')].\n\nDepois de enfrentarmos uma tempestade na noite anterior, nesta manhã somos recebidos por um magnífico arco-íris que se estende de horizonte a horizonte.\n\nOuço por acaso alguns dos outros contemplando sua grandiosidade, chamando a cena de #EMP divina#! e de #EMP señal de [ROOT.Char.GetFaith.HighGodName]#!."
 pilgrimage.2020.c_cynical: "#EMP Na verdade...#!"
 pilgrimage.2020.c.flavor: "O divino pode ter criado a chuva, mas os arco-íris são, antes de tudo, fenômenos climáticos."
 #Pilgrimage thief wants to repent
 pilgrimage.2021.t: "Certamente algo tão belo #EMP deve#! ser divino!"
 pilgrimage.2021.desc: "Fascinante como a natureza e o divino trabalham juntos."
 pilgrimage.2021.a: "#EMP Es#! bastante impresionante, supongo."
 pilgrimage.2021.b: "Castigarme siempre #EMP me#! hace sentir mejor…"
 pilgrimage.2021.c: "$pilgrimage_header$ Pescaria"
 pilgrimage.2021.c.flavor: "Enquanto passamos dias e noites neste navio, tento preencher meu tempo com conversas interessantes, preces, reflexões sobre a viagem ou simplesmente planejar minha jornada adiante.\n\nNo entanto, recentemente vi alguns dos peregrinos da minha comitiva dedicarem seu tempo a outra tarefa bastante mundana: pescar.\n\nTodos parecem bem despreocupados e a atividade em si tem um aspecto tranquilizante."
 #Sea: Encounter a massive rainbow
 pilgrimage.2030.t: "Ser pescador[ROOT.Char.Custom('ES_XA')] é, afinal, um ofício nobre e rústico."
 pilgrimage.2030.desc: "Peixe Grande"
 pilgrimage.2030.a: "Você pega um peixe grande"
 pilgrimage.2030.a.flavor: "Peixe Pequeno"
 pilgrimage.2030.b: "Você pega um peixe pequeno"
 pilgrimage.2030.b.flavor: "#EMP Filisteus.#! Eu deveria passar meu tempo orando em vez disso."
 pilgrimage.2030.c: "Que tal uma soneca?"
 pilgrimage.2030.d: "Não, vamos fazer algo diferente."
 #Sea: Go fish
 pilgrimage.2040.t: "$pilgrimage_header$ Náufragos"
 pilgrimage.2040.desc: "Pouco antes de anoitecer, ouvimos gritos de socorro e, ao olhar por cima da amurada para a vasta massa de água, avisto um pequeno barco com três formas humanas.\n\nParece que estão à deriva pelo mar, sem rumo, indo para onde as ondas os levam.\n\nTento descobrir quem poderiam ser e, com meus conhecimentos limitados, suponho que sejam náufragos… [first_pilgrim.GetCulture.GetCollectiveNounNoTooltip]? O que estarão fazendo aqui?"
 pilgrimage.2040.a: "Subam a bordo!"
 pilgrimage.2040.a.flavor: "Você deixa os peregrinos na costa mais próxima"
 pilgrimage.2040.a.success.t: "Você já ouviu falar da graça de [ROOT.Char.GetFaith.HighGodName]?"
 pilgrimage.2040.a.success.desc: "Conversão"
 pilgrimage.2040.a.less_success.t: "Você converte os peregrinos para [ROOT.Char.GetFaith.GetNameNoTooltip|l]"
 pilgrimage.2040.a.less_success.desc: "Não Convencidos"
 pilgrimage.2040.b: "Os peregrinos não são convencidos, mas você os ajuda a chegar à costa"
 pilgrimage.2040.c: "Vamos simplesmente... seguir em frente."
 pilgrimage.2040.d: "Não, vamos fazer algo diferente."
 #Sea: Shipwrecked pilgrims
 pilgrimage.2050.t: "Quanto mais, melhor"
 pilgrimage.2050.desc: "Estou seguindo nesta longa procissão rumo a [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip] e pensando nos confortos que deixei em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] quando ouço meu nome ser gritado lá de trás.\n\nMeu amig[friend.Custom('ES_OA')] [friend.GetFirstNameNoTooltip] corre até mim e exclama: "[ROOT.Char.GetTitledFirstNameNoTooltip|U]! Que sorte estarmos viajando para o mesmo lugar sagrado! Gostaríeis de ter companhia neste longo e solitário caminho até [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip]?"."
 pilgrimage.2050.a: "Meus ouvidos estão sempre abertos para um amigo."
 pilgrimage.2050.a.tt: "Acho que prefiro ficar sozinho, obrigado."
 pilgrimage.2050.b: "Vergonha para você. Estamos aqui para nos concentrar em nossa fé!"
 pilgrimage.2050.b.success.t: "Conversão"
 pilgrimage.2050.b.success.desc: "[friend.GetFirstNameNoTooltip] e eu passamos o restante da jornada conversando sobre isto e aquilo, intrigas e piadas, batalhas e amantes, velhos amigos e novos. Estamos no meio de uma conversa fascinante sobre [ROOT.Char.Custom('subject_of_interest')] quando a caravana de pessoas com quem viajamos para de repente. Um grito cansado chega da frente da fila:\n\n"Acampamos aqui!". [friend.GetFirstNameNoTooltip|U] me olha com um sorriso malicioso no rosto e diz: "Finalmente! Mas… que tal fazermos um pequeno desvio antes de montar o acampamento? Um longo dia de viagem deixa qualquer um com sede…"."
 pilgrimage.2050.b.failure.t: "Uma bebida refrescante parece divina!"
 pilgrimage.2050.b.failure.desc: "Visite a taverna local"
 pilgrimage.2050.c: "Continuem sem mim..."
 ###BP1 Events
 #Sneaking off to a tavern with your pal
 pilgrimage.6001.t: "Quanto mais, melhor"
 pilgrimage.6001.desc: "Abrimo-nos caminho pela taberna lotada e, de imediato, [friend.GetFirstNameNoTooltip] pede duas canecas de [ROOT.Char.Custom('RegionalDrink')]. Sentamo-nos e ouvimos a história de um trovador, apreciando nossas bebidas, falando de vez em quando das aflições e triunfos da vida.\n\nPor [ROOT.Char.GetFaith.HighGodName], isso é revigorante depois de um longo dia suando e labutando na estrada. Ergo minha taça e grito: "Um brinde à saúde do meu amig[friend.Custom('ES_OA')] [friend.GetFirstNameNoTooltip] por sugerir um tão bom alívio após a jornada de hoje!".\n\nA taberna ergue suas taças para celebrar meu amig[friend.Custom('ES_OA')] e todos bebem fundo."
 pilgrimage.6001.a: "'A próxima rodada é por minha conta!'"
 pilgrimage.6001.b: "Continue se divertindo com [friend.GetShortUIName]"
 pilgrimage.6001.c: "Devemos voltar ao acampamento, para não sermos notados."
 #Tavern, Suggestion
 pilgrimage.6002.desc: "[friend.GetFirstNameNoTooltip] e eu passamos o restante da jornada conversando sobre isto e aquilo, intrigas e piadas, batalhas e amantes, velhos amigos e novos. Estamos no meio de uma conversa fascinante sobre [ROOT.Char.Custom('subject_of_interest')] quando a caravana de pessoas com quem viajamos para de repente. Um grito cansado chega da frente da fila:\n\n"Acampamos aqui!". [friend.GetFirstNameNoTooltip|U] me olha com um sorriso malicioso no rosto e diz: "Finalmente! Mas… que tal fazermos um pequeno desvio antes de montar o acampamento? Um longo dia de viagem deixa qualquer um com sede…"."
 pilgrimage.6002.a: "Após talvez rondas demais de [ROOT.Char.Custom('RegionalDrink')], [friend.GetFirstNameNoTooltip] e eu inspiramos nossos companheiros de taverna em um coro de canções de bêbados enquanto marcamos o ritmo sobre as mesas.\n\nCom um #EMP estrépito#! e mais farpas do que consigo contar, caímos pelo chão e vamos parar na adega, aventurando-nos bravamente onde poucos já foram antes.\n\nTodos os nossos companheiros de farra nos observam do andar principal com uma mistura de preocupação e schadenfreude. É óbvio que estão à espera de um relatório da adega."
 pilgrimage.6002.a_tt: "'[ROOT.Char.Custom('RegionalDrink')] para todos!'"
 pilgrimage.6002.b: "Você abre os barris recém-descobertos e compartilha o conteúdo com a multidão"
 pilgrimage.6002.b_tt: "\"Acho que já passamos da hora de irmos embora...\""
 pilgrimage.6002.c: "Que tipo de [ROOT.Char.Custom('GetHeathenMiscreant')] iria a uma taverna em peregrinação?"
 #Tavern, beginning
 pilgrimage.6003.desc: "e todos os membros da nossa peregrinação se voltam para nos encarar.\n\nMal conseguimos manter a compostura por causa da grande quantidade de [ROOT.Char.Custom('RegionalDrink')] que carregamos na barriga.\n\nAo relatar as aventuras da nossa noite a quem quiser ouvir, um membro especialmente zeloso do acampamento de peregrinos me lança um olhar severo e insiste que paguemos pelos danos da taverna próxima."
 pilgrimage.6003.a: "mas não há nada se mexendo.\n\nA fogueira parece ter sido alimentada antes de irmos dormir para espantar o frio de nossas camas."
 pilgrimage.6003.a_tt: "Que companheiros de viagem amáveis e atenciosos nós temos!"
 pilgrimage.6003.b: "\"Devemos pagar por nossas desventuras!\""
 pilgrimage.6003.b.tt: "\"É crime se divertir?\""
 #Tavern, crash
 pilgrimage.6004.desc: "[friend.GetFirstName] e eu nos aproximamos do fim da jornada de hoje. Seguimos lentamente em direção ao ponto de parada determinado, quando de repente alguém à frente grita: "Olhem! Que #EMP maravilhoso#! pôr do sol!"\n\nTodos avançam com as últimas forças para conseguir vislumbrar o local majestoso. "Que maravilhas temos o privilégio de ver nesta vida mortal! Este é um momento perfeito para meditar sobre a nossa fé", digo a [friend.GetFirstNameNoTooltip], mas [friend.GetSheHe] parece nem um pouco impressionad[friend.Custom('ES_OA')], deixando escapar um escárnio áspero.\n\n"Não passa de um pôr do sol!", grita [friend.GetSheHe]. "Será que tudo o que fazemos nesta viagem precisa se referir a [ROOT.Char.GetFaith.HighGodName]? Eu só quero viajar e ver o mundo — nem mesmo estou cert[friend.Custom('ES_OA')] de que [ROOT.Char.GetFaith.HighGodName] exista #EMP de forma alguma#!.""
 pilgrimage.6004.a: "\"Seu segredo está seguro comigo, amigo.\""
 pilgrimage.6004.a.tt: "\"Não tolerarei um amigo que não acredita.\""
 pilgrimage.6004.b: "\"Você levanta pontos interessantes...\""
 #Returning to camp
 pilgrimage.6005.desc: "Vivendo de Oração"
 pilgrimage.6005.desc.bad: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend'))] [friend.GetFirstName], afligid[friend.Custom('ES_OA')] pela sua doença, esforça-se para acompanhar nosso ritmo em nossa peregrinação. Então caminho ao seu lado e lhe faço companhia. Um [ROOT.Char.GetFaith.PriestNeuter] errante tem viajado conosco há algum tempo e percebe o sofrimento de [friend.GetFirstNameNoTooltip].\n\n"Pobre alma. Um[friend.Custom('ES_XA')] filho[friend.Custom('ES_OA')] de [ROOT.Char.GetFaith.HighGodName] não deveria sofrer desse modo em seu caminho para [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip]", diz ele. "Talvez [ROOT.Char.GetFaith.HealthGodName] possa conceder-me o poder de curá-lo de sua aflição. Permitir-me-ia tentar?".\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend'))] se vira para mim, buscando meu conselho. "O que você acha, [ROOT.Char.GetFirstName]?"."
 pilgrimage.6005.desc.good: "[ROOT.Char.GetFaith.HighGodName] realmente cuida de nós."
 pilgrimage.6005.a: "[friend.GetFirstNameNoTooltip] foi curado"
 pilgrimage.6005.b: "A condição de [friend.GetFirstNameNoTooltip] piora."
 pilgrimage.6005.c: "Essa [6007_healer.GetWomanMan] não é dign[6007_healer.Custom('ES_OA')] da nossa confiança."
 #You find out your friend is a Non-Believer
 pilgrimage.6006.desc: "[friend.GetFirstName] e eu nos aproximamos do fim da jornada de hoje. Seguimos lentamente em direção ao ponto de parada determinado, quando de repente alguém à frente grita: "Olhem! Que #EMP maravilhoso#! pôr do sol!"\n\nTodos avançam com as últimas forças para conseguir vislumbrar o local majestoso. "Que maravilhas temos o privilégio de ver nesta vida mortal! Este é um momento perfeito para meditar sobre a nossa fé", digo a [friend.GetFirstNameNoTooltip], mas [friend.GetSheHe] parece nem um pouco impressionad[friend.Custom('ES_OA')], deixando escapar um escárnio áspero.\n\n"Não passa de um pôr do sol!", grita [friend.GetSheHe]. "Será que tudo o que fazemos nesta viagem precisa se referir a [ROOT.Char.GetFaith.HighGodName]? Eu só quero viajar e ver o mundo — nem mesmo estou cert[friend.Custom('ES_OA')] de que [ROOT.Char.GetFaith.HighGodName] exista #EMP de forma alguma#!.""
 pilgrimage.6006.a: "$pilgrimage_header$ Um Desejo por Intimidade"
 pilgrimage.6006.b: "Quanto tempo faz desde que senti o calor de outra pessoa contra minha pele? Esta peregrinação me afastou muito de minha casa, assim como de minhas comodidades.\n\nAh, como anseio pelos desejos da carne. Essas fantasias não param de inundar minha mente, e sinto-me tentado a ceder aos meus desejos para poder me concentrar."
 pilgrimage.6006.c: "\n\n[ROOT.Char.GetFaith.HighGodName], sei que esse sentimento é um pecado! Por que me pões à prova com tanta severidade? Minha peregrinação não basta para provar minha devoção?"
 #You and a friend are on a pilgrimage and your friend is healed in a miracle performed by a wandering priest
 pilgrimage.6007.t: "Esse sentimento irritante é um incômodo do qual devo me livrar! Mas é claro, não sem riscos. Essas terras são diferentes de minha casa, e posso ser aproveitado neste momento de fraqueza."
 pilgrimage.6007.desc: "Apenas uma noite de conforto..."
 pilgrimage.6007.a: "Por que me limitar a #EMP um único#! bordel?"
 pilgrimage.6007.a.success: "Devo permanecer forte e focar em minha peregrinação!"
 pilgrimage.6007.a.failure: "A condição de [friend.GetFirstNameNoTooltip] piora."
 pilgrimage.6007.b: "$pilgrimage_header$ Mendigo Miserável"
 ###'Temptation/Virtue' Journey Events
 #Rakish or Lustful character considers making a pit stop, or perhaps, a detour to the local brothels
 pilgrimage.2101.t: "\n\nEmbora eu seja indiferente a suas dificuldades, estar em peregrinação me lembra que se espera que todos os devotos [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] tenham compaixão pelos menos afortunados…"
 pilgrimage.2101.desc: "\n\nPor mais lastimos[beggar.Custom('ES_OA')] que seja est[beggar.Custom('ES_EA')] desafortunad[beggar.Custom('ES_OA')], lembro que [ROOT.Char.GetFaith.PantheonTerm] considera a caridade um grave [ROOT.Char.Custom('GetSinMisdeed')]…"
 pilgrimage.2101.desc.lust_vice: "Em nome de [ROOT.Char.GetFaith.HighGodNamePossessive], acho que você pode ficar com essas moedas…"
 pilgrimage.2101.desc.lust_virtue: "Não consigo dizer não!"
 pilgrimage.2101.desc.lust_neutral: "Bah! Arranje um emprego de verdade, ganhe seu sustento!"
 pilgrimage.2101.a: "Você ousa tocar em minha roupa, camponês?!"
 pilgrimage.2101.b: "Por que me limitar a #EMP um único#! bordel?"
 pilgrimage.2101.c: "$pilgrimage.2501.t$"
 #Persistent Beggar
 pilgrimage.2501.t: ""Não! Não, [ROOT.Char.Custom('LadyLordWomanMan')] meu[ROOT.Char.Custom('ES_OA')] tenha misericórdia!"
 pilgrimage.2501.desc.opening: "Quando meu s?quito passa por uma pequena cidade, sinto um pux?o na barra das minhas roupas. Viro-me para olhar e vejo [Select_CString( beggar.IsFemale, 'uma mulher', 'um homem' )] [Select_CString( beggar.IsFemale, 'magra e esfarrapada', 'magro e esfarrapado' )] me observando.

"Não, não posso! Não é #EMP certo#!!"
 pilgrimage.2501.desc.virtue.generous: "Não, fiz minha parte!"
 pilgrimage.2501.desc.virtue.compassionate: "Eu disse #EMP não#! Agora vá embora!"
 pilgrimage.2501.desc.sin.generous: "\n\nPor mais lastimos[beggar.Custom('ES_OA')] que seja est[beggar.Custom('ES_EA')] desafortunad[beggar.Custom('ES_OA')], lembro que [ROOT.Char.GetFaith.PantheonTerm] considera a caridade um grave [ROOT.Char.Custom('GetSinMisdeed')]…"
 pilgrimage.2501.a.virtue: "$pilgrimage.2501.t$"
 pilgrimage.2501.a.sin: "\"Maravilhoso! Que ela se recupere de sua doença em breve. Mas se eu pudesse pedir apenas mais um favor? Minha irmã tem filhos, e bem, você sabe como as crianças são. Elas comem muito! Se você pudesse fornecer alguma comida para eles também...?\""
 pilgrimage.2501.b: "Está bem. Sim. Nenhuma criança deve passar fome."
 pilgrimage.2501.c.arrogant: "Acho que já dei o suficiente."
 #Beggar wants another favor for their sister
 pilgrimage.2502.t: "$pilgrimage.2501.t$"
 pilgrimage.2502.desc.gave: "Muito, muito obrigado a você, minha [ROOT.Char.Custom('LadyLordWomanMan')]! Estou eternamente agradecid[beggar.Custom('ES_OA')], pois lhe devo algo que jamais poderei retribuir!\n\nA generosidade de [ROOT.Char.GetFaith.HighGodNamePossessive] é de fato imensa, e cantarei Seus louvores até o fim dos meus dias!"
 pilgrimage.2502.desc.refused: "Você se esqueceu, eu também dei isso."
 pilgrimage.2502.desc.end: "Você deixaria o melhor para trás?"
 pilgrimage.2502.a: "Endividado comigo, você diz? Hmm..."
 pilgrimage.2502.b: "De nada. Agora vá com a bênção de [ROOT.Char.GetFaith.HighGodNamePossessive]."
 pilgrimage.2502.c.gave: "Sim, sim, apenas por favor... vá embora."
 pilgrimage.2502.c.refused: "Eu disse #EMP não#! Agora vá embora!"
 #Beggar wants favor for sisters children
 pilgrimage.2503.t: "[ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip] atrae peregrinos de todo el mundo [ROOT.Char.GetFaith.GetAdherentNameNoTooltip], así que no es inconcebible toparme con [lordling.Custom2('MyCharacterIntroduction', ROOT.Char)] en mi viaje.\n\nLo que #EMP sí#! lo es, es el modo insolente en el que me ha tratado, metiéndose en mitad de mi séquito con su caballo y llamándome [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('lordling'))]… #EMP a la cara#!, nada menos!"
 pilgrimage.2503.desc: "\n\nMeu sangue ferve, controlado apenas pelo conhecimento de que os [ROOT.Char.GetFaith.PriestNeuterPlural] nos dizem para exercer a contenção e não deixar nossas emoções tomar controle."
 pilgrimage.2503.a: "\n\nSão momentos como este que me lembram que [ROOT.Char.GetFaith.PantheonTerm] nos ordena perdoar aqueles que nos prejudicaram."
 pilgrimage.2503.b: "\n\nSão momentos como este que me lembram que Jesus nos ordenou virar a outra face..."
 #Happy beggar
 pilgrimage.2504.t: "Inspire... expire..."
 pilgrimage.2504.desc: "Tem #EMP que ter#! uma forma melhor de lidar com essa raiva."
 pilgrimage.2504.a: "Você se esqueceu, eu também dei isso."
 pilgrimage.2504.a.flavor: "Você deixaria o melhor para trás?"
 pilgrimage.2504.b: "$pilgrimage_header$ Lágrimas de [ROOT.Char.GetFaith.WaterGodName]"
 pilgrimage.2504.c.virtue: "Mesmo estando em peregrinação, os padres ainda realizam a missa todos os domingos. Quando não há uma igreja por perto, ela é realizada ao ar livre. No entanto, logo cedo nesta manhã, uma tempestade se aproximou e não cessou.\n\nInabalável, um zeloso [ROOT.Char.Custom('DefaultPriestTitle')] está em pé, sob uma chuva torrencial, pregando sobre a perseverança diante da adversidade. Apesar disso, o número de pessoas que ouvem seu sermão está rapidamente diminuindo, pois os devotos desencorajados procuram abrigo da chuva intensa."
 pilgrimage.2504.c.sin: "O que é um pouco de chuva para um(a) fiel [ROOT.Char.GetFaith.GetAdherentNameNoTooltip]?"
 #Cocky Lordling
 pilgrimage.2511.t: "Esqueça essa loucura, estarei em minha tenda."
 pilgrimage.2511.desc.start: "[ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip] atrae peregrinos de todo el mundo [ROOT.Char.GetFaith.GetAdherentNameNoTooltip], así que no es inconcebible toparme con [lordling.Custom2('MyCharacterIntroduction', ROOT.Char)] en mi viaje.\n\nLo que #EMP sí#! lo es, es el modo insolente en el que me ha tratado, metiéndose en mitad de mi séquito con su caballo y llamándome [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('lordling'))]… #EMP a la cara#!, nada menos!"
 pilgrimage.2511.desc.wrathful: "$pilgrimage_header$ Inocência de Adão"
 pilgrimage.2511.desc.vengeful: "Enquanto meu grupo se prepara para desmontar o acampamento, noto um grande alvoroço nas proximidades... Um[naked_preacher.Custom('ES_XA')] [naked_preacher.GetWomanMan] nu[naked_preacher.Custom('ES_OA')] subiu em uma grande rocha e está pregando para a multidão reunida.\n\n"O pecado original ainda mancha nossas almas, meus amigos, mas isso não precisa ser assim! Se tirarmos nossas vestes, podemos recuperar a inocência perdida de Adão e Eva... então e #EMP somente#! então, o Espírito Santo nos achará dignos de nos tocar e revelar o verdadeiro amor de Deus!""
 pilgrimage.2511.desc.vengeful.christian: "Está com a ideia certa! Nunca me senti tão perto de [ROOT.Char.GetFaith.HighGodName]!"
 pilgrimage.2511.a: "Herege! Tirem[naked_preacher.Custom('ES_LoLa')] de lá!"
 pilgrimage.2511.b: "[naked_preacher.Custom('ES_LoLa')|U] você o desafia para um debate teológico."
 pilgrimage.2511.c: "Convences [naked_preacher.Custom('ES_AlAla')] pregador[naked_preacher.Custom('ES_XA')] da sua loucura"
 ###Christian Pilgrimage Journey Events
 #Zealous priest giving sermon in freezing rains
 pilgrimage.3001.t: "[naked_preacher.Custom('ES_RleRla')] ignoro e continuo minha jornada."
 pilgrimage.3001.desc: "Mesmo estando em peregrinação, os padres ainda realizam a missa todos os domingos. Quando não há uma igreja por perto, ela é realizada ao ar livre. No entanto, logo cedo nesta manhã, uma tempestade se aproximou e não cessou.\n\nInabalável, um zeloso [ROOT.Char.Custom('DefaultPriestTitle')] está em pé, sob uma chuva torrencial, pregando sobre a perseverança diante da adversidade. Apesar disso, o número de pessoas que ouvem seu sermão está rapidamente diminuindo, pois os devotos desencorajados procuram abrigo da chuva intensa."
 pilgrimage.3001.a: "$pilgrimage_header$ Culpa de Adão"
 pilgrimage.3001.a.tt: "Tendo sido derrotad[naked_preacher.Custom('ES_OA')] no debate teológico, desceu da rocha e agora está de pé diante de mim, surpreendid[naked_preacher.Custom('ES_OA')] pela situação.\n\n"… Eu realmente acreditava que a chave estava nas vestes", sussurra [naked_preacher.GetSheHe], sombri[naked_preacher.Custom('ES_OA')]. "Mas a sua perspectiva é realmente esclarecedora".\n\n[naked_preacher.GetSheHe|U] pisca, lembrando-se de repente da multidão e de sua própria nudez, mas mantendo a pose: "No entanto, como devo prosseguir agora…"."
 pilgrimage.3001.b: "Você pode vestir estas roupas e nos acompanhar até [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip]."
 #Naked preacher claiming to have reclaimed the lost innocence of Adam & Eve
 pilgrimage.3002.t: "Vá e espalhe a palavra #EMP correta#!."
 pilgrimage.3002.desc: "Enquanto meu grupo se prepara para desmontar o acampamento, noto um grande alvoroço nas proximidades... Um[naked_preacher.Custom('ES_XA')] [naked_preacher.GetWomanMan] nu[naked_preacher.Custom('ES_OA')] subiu em uma grande rocha e está pregando para a multidão reunida.\n\n"O pecado original ainda mancha nossas almas, meus amigos, mas isso não precisa ser assim! Se tirarmos nossas vestes, podemos recuperar a inocência perdida de Adão e Eva... então e #EMP somente#! então, o Espírito Santo nos achará dignos de nos tocar e revelar o verdadeiro amor de Deus!""
 pilgrimage.3002.a: "$pilgrimage_header$ O Fim Está Próximo"
 pilgrimage.3002.b: "Ao passar com meu grupo por uma pequena cidade, noto uma multidão de pessoas enchendo a praça do mercado. Em seu centro, um[doomsayer.Custom('ES_XA')] [doomsayer.GetWomanMan] se ergue sobre um carrinho de peixe tombado, gritando freneticamente para todos que querem ouvir.\n\n"O Dia do Juízo está próximo! Arrependei-vos! Arrependei-vos, eu digo, ou sereis condenados por toda a eternidade!"\n\nOs moradores da cidade, com aparência preocupada, sussurram nervosamente entre si, temendo as palavras [doomsayer.Custom('ES_DelDela')] agour[doomsayer.Custom('ES_OA')]."
 pilgrimage.3002.c: "\"De die autem illa et hora nemo scit!\""
 pilgrimage.3002.c.success: "A Bíblia é clara; nenhum homem sabe quando será o Dia!"
 pilgrimage.3002.c.success.tt: "Estou feliz por esta peregrinação vir com uma indulgência!"
 pilgrimage.3002.c.failure: "É[doomsayer.Custom('ES_EA')] [doomsayer.GetWomanMan] #EMP no#! é sacerdote! Abaixo[doomsayer.GetHerHim] daí!"
 pilgrimage.3002.d: "[naked_preacher.Custom('ES_RleRla')] ignoro e continuo minha jornada."
 #You convinced the naked preacher
 pilgrimage.3003.t: "$pilgrimage_header$ Ziyarat"
 pilgrimage.3003.desc: "Embora o Hajj seja obrigatório para todos os muçulmanos, peregrinações a outros locais são muito menos comuns. Como essas Ziyarat não são exigidas pela doutrina islâmica, os muçulmanos que optam por realizá-las podem ter uma ampla variedade de motivações para fazê-lo.\n\nEnquanto viajamos pela estrada até [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip], me pego pensando sobre o que me fez querer realizar esta jornada em particular..."
 pilgrimage.3003.a: "Eu quero ver toda a gloriosa criação de Allah."
 pilgrimage.3003.a.flavor: "Meu zelo é tão intenso que desejo fazer mais do que apenas o Hajj."
 pilgrimage.3003.b: "As dúvidas que abrigo me compeliram a buscar respostas em terras distantes."
 #Doomsayer claiming the end is nigh!
 pilgrimage.3004.t: "$pilgrimage_header$ O Fim Está Próximo"
 pilgrimage.3004.desc: "$pilgrimage_header$ Purificação Ritual"
 pilgrimage.3004.a: "A purificação ritual é uma parte crucial da jornada de todo peregrino hindu. Uma forma comum disso é lavar-se nas águas de um rio sagrado.\n\nHá um cruzamento desses rios logo à frente, mas não posso deixar de notar que ele está #EMP cheio#! de pessoas comuns que também vieram em peregrinação..."
 pilgrimage.3004.a.flavor: "Junte-se aos outros fiéis nas águas sagradas."
 pilgrimage.3004.b: "Eu não vou me banhar com #EMP camponeses#!!"
 pilgrimage.3004.c: "É[doomsayer.Custom('ES_EA')] [doomsayer.GetWomanMan] #EMP no#! é sacerdote! Abaixo[doomsayer.GetHerHim] daí!"
 ###Muslim Pilgrimage Journey Events
 #Ziyarat - Why am I taking this pilgrimage?
 pilgrimage.3102.t: "Gautama Buda nos ensinou que toda vida é sagrada. Embora os seres sencientes sejam a forma mais elevada de vida, até a menor lâmina de grama ainda merece respeito."
 pilgrimage.3102.desc: "Ahiṃsā, ou não-violência, é um dos principais preceitos do Jainismo. Mesmo a violência contra as plantas é proibida, excluindo o mínimo necessário para sustentar a vida."
 pilgrimage.3102.a: "A arrogância do homem levou muitos a acreditar que estão acima da natureza, mas estão errados. O mundo natural existe no estado mais verdadeiro e puro de ser."
 pilgrimage.3102.b: "\n\nEnquanto passamos por uma clareira simples na floresta, percebo o quão sereno e silencioso é. Sem lutas, sem conflitos... apenas uma paz simples desfrutada pelas árvores e arbustos."
 pilgrimage.3102.c: "Vamos passar um tempo aqui e contemplar o universo."
 ###Hindu Pilgrimage Journey Events
 #Ritual purification in a river
 pilgrimage.3201.t: "Você chegará ao seu destino #P várias semanas mais cedo#!"
 pilgrimage.3201.desc: "A purificação ritual é uma parte crucial da jornada de todo peregrino hindu. Uma forma comum disso é lavar-se nas águas de um rio sagrado.\n\nHá um cruzamento desses rios logo à frente, mas não posso deixar de notar que ele está #EMP cheio#! de pessoas comuns que também vieram em peregrinação..."
 pilgrimage.3201.a: "Junte-se aos outros fiéis nas águas sagradas."
 pilgrimage.3201.b: "$pilgrimage_header$ Bhikkhu Crítico"
 #Contemplating the universe
 pilgrimage.3202.t: "Posso fazer isso, pelo menos durante esta jornada."
 pilgrimage.3202.desc.hinduism: "Mas minha tenda, minhas cobertas? É demais. Não estou pront[ROOT.Char.Custom('ES_OA')]!"
 pilgrimage.3202.desc.buddhism: "Sim, mas vai contra o Ṛta que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] viaje em austeridade."
 pilgrimage.3202.desc.jainism: "Ahiṃsā, ou não-violência, é um dos principais preceitos do Jainismo. Mesmo a violência contra as plantas é proibida, excluindo o mínimo necessário para sustentar a vida."
 pilgrimage.3202.desc.nature: "$pilgrimage_header$ a sabedoria das cabras"
 pilgrimage.3202.desc.end: "Ao entrar pela primeira vez nas [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] agrestes de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTier], pensei que nossa travessia pelo desfiladeiro seria tranquila. Após horas de subida extenuante, sou lembrado de que devo acolher as provações da minha yatra.\n\nParei para enxugar o suor da testa e fiquei pasmo ao ver cabras selvagens em pé na encosta quase vertical da [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')].\n\nUm[mountain_local.Custom('ES_XA')] [mountain_local.GetWomanMan] local enrugad[mountain_local.Custom('ES_OA')] se vira para mim.\n\n"Essas cabras gananciosas só sobem para lamber o sal.""
 pilgrimage.3202.a: "Eles deveriam abandonar sua busca por gratificação!"
 pilgrimage.3202.a.tt: "Se ao menos eu pudesse ser tão inabalável em meu assentimento…"
 pilgrimage.3202.b: "Essa sal deve ser minha!"
 pilgrimage.3202.b.tt: "Você colhe o sal para comerciar."
 ###Buddhist Pilgrimage Journey Events
 #Critical Wanderer
 pilgrimage.3301.t: "Ao passar por [place_to_teach.GetBaronyNameExplicitlyNoTooltip], alguns habitantes locais, liderados por [wisdom_seeker.GetName] se aproximam, com a confusão estampada em seus rostos.\n\n"Venerável [ROOT.Char.GetTitleAsName|l], há [place_to_teach.GetCounty.GetFaith.PriestNeuterPlural] que visitam [place_to_teach.GetBaronyNameExplicitlyNoTooltip]. Exaltam a virtude de sua doutrina, enquanto, para as crenças dos outros, parecem [ROOT.Char.Custom('RegionalOnlyFerociousAnimalPlural')] e os despedaçam. Em seguida, outros [place_to_teach.GetCounty.GetFaith.PriestNeuterPlural] visitarão e, por sua vez, desprezarão e vilipendiarão a doutrina do grupo anterior.\n\nSomos consumidos pela incerteza, a dúvida visita nossa porta todos os dias. Quais destes reverendos [place_to_teach.GetCounty.GetFaith.PriestNeuterPlural] disseram a verdade e quais mentiram?"."
 pilgrimage.3301.desc: "Não sigais nenhum raciocínio enganoso, mas o caminho de [ROOT.Char.GetFaith.HighGodName]!"
 pilgrimage.3301.a: "Das fontes de que bebeis, qual vos dá força?"
 pilgrimage.3301.b: "[ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitlyNoTooltip] encontrará a maneira certa de pensar no devido tempo."
 pilgrimage.3301.c: "Sim, mas vai contra o Ṛta que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] viaje em austeridade."
 #The Wisdom of Goats
 pilgrimage.3302.t: "$pilgrimage_header$ brahmacharia desafiada"
 pilgrimage.3302.desc: "Nossa yatra nos levou às margens de [body_of_water.GetName]. Suas águas reluzem como fios de folha de ouro ao sol do fim de tarde, convidando-nos a nos banhar.\n\nMeu olhar se desvia para outr[bather.Custom('ES_OA')] de meus companheir[bather.Custom('ES_OA')] s yatri, [bather.GetName], seu corpo nu coberto apenas pelo brilho da água.\n\nEmbora durante a [ROOT.Char.GetInvolvedActivity.GetShortName|l] se suponha que devamos adotar uma [Glossary('brahmacharia', 'BRAHMACHARAYA_GLOSS')] quase monástica, abstendo-nos de pensamentos e impulsos lascivos…"
 pilgrimage.3302.a: "Com o desejo como guia, me banho na beleza de [bather.GetFirstNameNoTooltip]."
 pilgrimage.3302.b: "Entro na água fria, minhas paixões são extinguidas."
 pilgrimage.3302.c: "Um passo mais perto do Nirvana"
 pilgrimage.3302.c.flavor: "Sânscrito para \"praticar a conduta de Brahman\" ou adotar um estilo de vida propício à busca do conhecimento sagrado e da libertação espiritual. Isso é alcançado em parte ao buscar um estado livre de desejo."
 #Kalama Sutta
 pilgrimage.3303.t: "$pilgrimage_header$ sutra de [place_to_teach.GetBaronyNameExplicitlyNoTooltip]"
 pilgrimage.3303.desc: "Ihram"
 pilgrimage.3303.a: "Conforme me aproximo de Meca, agora estou diante do Mīqāt, a fronteira entre os espaços sagrados de Meca e o mundo exterior.\n\nA partir deste ponto, devo entrar no estado de Ihram, passar por uma limpeza ritual e usar apenas as vestes prescritas. Também devo abster-me de atos sexuais, juramentos e pensamentos arrogantes ou rudes."
 pilgrimage.3303.b: "Vou me comprometer com o Ihram com a maior dedicação."
 pilgrimage.3303.b.flavor: "Ah... não é como se alguém fosse saber se eu cometer algum deslize."
 ### Dharmic Pilgrimage Journey Events
 #Brahmacharya Challenged
 pilgrimage.3401.t: "A Chegada"
 pilgrimage.3401.desc: "Finalmente estou aqui, corpo e alma, no grande [ROOT.Char.GetFaith.HouseOfWorship] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip].\n\nEnquanto o [ROOT.Char.GetFaith.BishopNeuter] me oferece bênçãos, reflito sobre tudo o que precisou acontecer para que [ROOT.Char.GetFaith.PantheonTerm] me trouxesse aqui, neste momento no tempo."
 pilgrimage.3401.a: "\n\nMuita caminhada."
 pilgrimage.3401.b: "Eu percorri o caminho sagrado."
 pilgrimage.3401.b.flavor: "Nós percorremos o caminho sagrado."
 BRAHMACHARAYA_GLOSS: "What's important is that I am seen and heard here."
 ###Hajj Arrival Event
 #Entering state of Ihram
 pilgrimage.3101.t: "É verdade, meu/minha amig[mystic.Custom('ES_OA')]!"
 pilgrimage.3101.desc: "É... algo assim, com certeza."
 pilgrimage.3101.a: "Ah, sim, eu gosto do que estou vendo."
 pilgrimage.3101.b: "Ah... não é como se alguém fosse saber se eu cometer algum deslize."
 ###Generic Pilgrimage Destination Events
 #Standard arrival
 pilgrimage.4001.t: "Eu... eu mudei de ideia. Isso não parece certo."
 pilgrimage.4001.desc: "Voltar agora seria sacrilégio!"
 pilgrimage.4001.cynical_end: "Você irá explorar o destino e permanecer em [THIS.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] pelo tempo normal\n$EFFECT_LIST_BULLET$ A conclusão e as recompensas do seu [THIS.Char.GetInvolvedActivity.GetName|l] ainda serão afetadas negativamente"
 pilgrimage.4001.a: "Sim. Vamos partir para [ROOT.Char.GetTravelPlan.GetData.GetFinalDestination.GetProvince.GetNameNoTooltip]."
 pilgrimage.4001.a_dead: "Vamos emboraaa..."
 pilgrimage.4001.a_cynical: "Seu [THIS.Char.GetInvolvedActivity.GetName|l] será concluído e você começará a viagem de volta imediatamente"
 #The Mystic is there!
 pilgrimage.4002.desc: "Memento Mori"
 pilgrimage.4002.a: "Assim que chegamos em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], começo a organizar a cerimônia para"
 pilgrimage.4002.a_cynical: "meu querid[old_pilgrimage_host.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('old_pilgrimage_host'))] falecid[old_pilgrimage_host.Custom('ES_OA')] recentemente.\n\n"
 pilgrimage.4002.b: "meu/minha querid[old_pilgrimage_host.Custom('ES_OA')] [old_pilgrimage_host.GetFirstName].\n\n"
 #Obligatory Pilgrimage Skip Destination Event
 pilgrimage.4010.t: "[old_pilgrimage_host.Custom('ES_ElLa')] [old_pilgrimage_host.GetTitledFirstName|l].\n\n"
 pilgrimage.4010.desc: "Eu luto para manter minha compostura enquanto procuro um dos [ROOT.Char.GetFaith.AltPriestTermPlural], prontos para nos ajudar nessa partida final.\n\nDepois, encontro alguma paz sabendo que chegamos a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] e que [old_pilgrimage_host.GetFirstName] descansará para sempre, mais próximo de [ROOT.Char.GetFaith.HighGodNameAlternate], neste lugar sagrado."
 pilgrimage.4010.a: "A procissão é serena e digna, e os [ROOT.Char.GetFaith.AltPriestTermPlural] locais me asseguram que [old_pilgrimage_host.GetSheHe] está em um lugar melhor agora que repousa aqui em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], mais perto de [ROOT.Char.GetFaith.HighGodName]."
 pilgrimage.4010.a.flavor: "Essa foi a decisão certa."
 pilgrimage.4010.a.tt: "Que descanse em paz."
 pilgrimage.4010.b: "Sim. Vamos partir para [ROOT.Char.GetTravelPlan.GetData.GetFinalDestination.GetProvince.GetNameNoTooltip]."
 pilgrimage.4010.b.flavor: "Vamos emboraaa..."
 pilgrimage.4010.b.tt: "Seu [THIS.Char.GetInvolvedActivity.GetName|l] será concluído e você começará a viagem de volta imediatamente"
 #Bury old host at Destination
 pilgrimage.4020.t: "Peregrinos se dirigem a Roma de todos os cantos do mundo cristão. Alguns seguem a Via Francigena; outros seguem caminhos menos conhecidos. No final, todos convergimos aqui, na Basílica de São Pedro, onde o próprio grande homem foi sepultado.\n\nFicando aqui com os outros peregrinos, sinto uma sensação de solene unidade e comunhão compartilhada entre os presentes, todos tendo superado várias provações e dificuldades ao longo de sua jornada."
 pilgrimage.4020.desc.intro: "Assim que chegamos em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], começo a organizar a cerimônia para"
 pilgrimage.4020.desc.relation_family_liked: "Ó Jerusalém, Jerusalém!"
 pilgrimage.4020.desc.relation_liked: "Nenhuma outra cidade no mundo tem uma história como a de Jerusalém. Além dos muitos outros lugares sagrados que há ali, a cidade contém"
 pilgrimage.4020.desc.relation_family: "a Igreja do Santo Sepulcro, construída nos locais combinados onde Jesus foi crucificado, sepultado e ressuscitado."
 pilgrimage.4020.desc.relation_neutral: "a Haram esh-Sharif, o local onde Maomé ascendeu aos céus após seu tempo na Terra."
 pilgrimage.4020.desc.liked: "o Monte do Templo, o local do Santo dos Santos e o local onde o Terceiro Templo é profetizado para ser reconstruído."
 pilgrimage.4020.desc.neutral: "\n\nFicando do lado de fora do Monte do Templo, com minha mão no Muro das Lamentações, me encontro refletindo sobre tudo o que aconteceu em minha jornada para esta cidade lendária."
 pilgrimage.4020.a: "Essa foi a decisão certa."
 pilgrimage.4020.a.flavor: "A Cidade do Desejo do Mundo!"
 ###Specific Pilgrimage Destination Events
 ###Christian
 #Rome
 pilgrimage.5001.t: "Finalmente cheguei em Alexandria, o lar do monasticismo cristão. Os primeiros monges e eremitas começaram suas jornadas nas cavernas do deserto ao redor da cidade, que ainda estão em uso hoje.\n\nEmbora não seja tão famosa quanto Jerusalém ou Roma, Alexandria tem uma longa história como centro de teologia e aprendizado. Mesmo após séculos de ocupação islâmica, enclaves de cristãos que vivem na cidade ainda mantêm sua fé forte."
 pilgrimage.5001.desc: "Peregrinos se dirigem a Roma de todos os cantos do mundo cristão. Alguns seguem a Via Francigena; outros seguem caminhos menos conhecidos. No final, todos convergimos aqui, na Basílica de São Pedro, onde o próprio grande homem foi sepultado.\n\nFicando aqui com os outros peregrinos, sinto uma sensação de solene unidade e comunhão compartilhada entre os presentes, todos tendo superado várias provações e dificuldades ao longo de sua jornada."
 #Jerusalem
 pilgrimage.5011.t: "Sinai e Horeb"
 pilgrimage.5011.desc.beginning: "[ROOT.Char.GetFaith.HighGodName] falou a Moisés no topo do Monte Sinai na forma de uma sarça ardente. Mais tarde, na mesma montanha, lhe entregou os Dez Mandamentos, que formam os alicerces de toda a doutrina abraâmica.\n\nNão há dúvida de que [ROOT.Char.GetFaith.HighGodName] aprecia este lugar e me pergunto se ele está olhando para mim enquanto estou nestas encostas sagradas…"
 pilgrimage.5011.desc.christian: "a Igreja do Santo Sepulcro, construída nos locais combinados onde Jesus foi crucificado, sepultado e ressuscitado."
 pilgrimage.5011.desc.muslim: "a Haram esh-Sharif, o local onde Maomé ascendeu aos céus após seu tempo na Terra."
 pilgrimage.5011.desc.jewish: "A Hégira"
 pilgrimage.5011.desc.end: "Mahoma nem sempre foi amado, e nos primeiros dias da fé muçulmana muitos o rejeitaram, a ele e a seus ensinamentos.\n\nApós ser avisado de uma conspiração para assassiná-lo, ele deixou Meca para viajar a Yathrib, onde um grupo crescente de muçulmanos o recebeu de braços abertos. Essa jornada ficou conhecida como a Hégira, e em seu novo lar Mahoma foi capaz de reunir as tribos em guerra ao seu redor, em submissão a Alá.\n\nEm homenagem a isso, Yathrib passaria a se chamar Medina, a cidade do Profeta. E aqui estou eu agora, pronto[ROOT.Char.Custom('ES_OA')] para honrar sua jornada pessoalmente."
 #Constantinople
 pilgrimage.5021.t: "A Cidade do Desejo do Mundo!"
 pilgrimage.5021.desc: "Varanasi"
 #Alexandria
 pilgrimage.5031.t: "Alexandria!"
 pilgrimage.5031.desc: "Ayodhya"
 ###Jewish
 #Mount Sinai
 pilgrimage.5101.t: "Mathura"
 pilgrimage.5101.desc: "Finalmente cheguei ao meu destino, Mathura. É aqui que o deus Krishna nasceu, a divindade da compaixão, amor e ternura.\n\nOlhando ao redor, posso ver todos esses aspectos demonstrados pelos peregrinos que vêm aqui para adorar no Complexo do Templo Krishna Janmasthan, uma das mais magníficas e grandiosas construções religiosas já feitas até hoje."
 ###Muslim
 #Medina
 pilgrimage.5201.t: "Por fim, cheguei a Haridwar, a fonte do sagrado rio Ganges.\n\nA cidade foi construída no local onde a própria deusa Ganga desceu quando o senhor Shiva libertou o poderoso rio dos seus cachos de cabelo.\n\nConhecido por poder apagar os pecados, peregrinos de todo o mundo vêm até aqui para se banhar em suas águas. Agora eu serei um[ROOT.Char.Custom('ES_OA')] de eles."
 pilgrimage.5201.desc: "Mahoma nem sempre foi amado, e nos primeiros dias da fé muçulmana muitos o rejeitaram, a ele e a seus ensinamentos.\n\nApós ser avisado de uma conspiração para assassiná-lo, ele deixou Meca para viajar a Yathrib, onde um grupo crescente de muçulmanos o recebeu de braços abertos. Essa jornada ficou conhecida como a Hégira, e em seu novo lar Mahoma foi capaz de reunir as tribos em guerra ao seu redor, em submissão a Alá.\n\nEm homenagem a isso, Yathrib passaria a se chamar Medina, a cidade do Profeta. E aqui estou eu agora, pronto[ROOT.Char.Custom('ES_OA')] para honrar sua jornada pessoalmente."
