l_spanish:
 hunt.8000.t: "Exibicionismo"
 hunt.8000.desc: "[swooning_attendee.GetName] vem admirando meu pássaro desde a primeira vez que saímos para caçar, e não posso culpar[swooning_attendee.GetHerHim] por ser uma besta tão magnífica e bela.\n\nEstamos nos aproximando de um rio pequeno, rico e cheio de peixes de tamanho generoso, acho que esta é a oportunidade perfeita para mostrar do que o meu [activity.Custom('GetRaptorType')]!"
 hunt.8000.a: "Minhas habilidades de falcoaria irão impressionar!"
 hunt.8000.falcon_success: "Sua [activity.Custom('GetRaptorType')] pegou um peixe"
 hunt.8000.falcon_failure: "Sua [activity.Custom('GetRaptorType')] falhou"
 hunt.8000.b: "Eu vou pegar um peixe eu mesmo!"
 hunt.8000.fist_success: "Você pega um peixe com as mãos nuas"
 hunt.8000.fist_failure: "Você fez papel de bobo"
 hunt.8010.t: "A Festa do [activity.Custom('GetRaptorType')]"
 hunt.8010.desc: "Meu [activity.Custom('GetRaptorType')] parece estar ficando bastante agitado em meu punho, batendo e bicando inquietamente em mim. Sem dúvida, a fera está ansiosa para voar novamente e trazer-me uma caça fresca!\n\nSeria bom para a ave esticar suas asas, mas ainda não avistei nenhum sinal de algo que valha a pena caçar, então é provável que meu [activity.Custom('GetRaptorType')] retornasse de mãos vazias."
 hunt.8010.a: "Voe, meu [activity.Custom('GetRaptorType')]"
 hunt.8010.falcon_success: "Seu [activity.Custom('GetRaptorType')] trouxe uma caça de volta"
 hunt.8010.falcon_failure: "$hunt.8000.falcon_failure$"
 hunt.8010.b: "Concentre-se no rastreamento."
 hunt.8020.t: "O Doador de Presentes"
 hunt.8020.desc: "Meu [activity.Custom('GetRaptorType')] pousa e espreita com agudeza a paisagem. Em um instante, o pássaro desce sobre algo e fica frenético assim que alcança sua presa. Bicando e arranhando algo no chão, embora eu não consiga ver o quê.\n\nApresso-me a me aproximar do pássaro agitado que grasna e descubro que o animal não grita sobre uma besta morta, mas sobre uma pequena coleção de moedas e bugigangas! Não parecem ter um valor muito extravagante, e estou segur[ROOT.Char.Custom('ES_OA')] de que não conseguiria encontrar o proprietário original nem se quisesse."
 hunt.8020.a: "\"Uma bela descoberta, meu amigo emplumado!\""
 hunt.8020.b: "\"Essas riquezas pertencem a [ROOT.Char.WealthGodName].\""
 hunt.8030.t: "Rastreando [activity.Custom('GetRaptorType')]"
 hunt.8030.desc: "Minha [activity.Custom('GetRaptorType')] desapareceu completamente da minha vista, e embora eu procure pela paisagem, não vejo nada. Então, ouço a ave gritar e a encontro pousada com sangue pingando de suas garras, embora não haja sinais de nenhuma outra besta por perto.\n\nEstá claro que o animal recentemente entrou em uma briga com algo grande demais para enfrentar sozinho, e deve estar por perto!"
 hunt.8030.a: "Vamos encontrar a fera!"
 hunt.8030.success: "Você faz um progresso significativo"
 hunt.8030.failure: "Você faz um pequeno progresso"
 hunt.8030.b: "\"Siga o rastro, eu alcançarei você depois de um breve descanso.\""
 hunt.8040.t: "A Luva da Sorte"
 hunt.8040.desc: "Até agora, [glove_salesman.GetName] tem sido a estrela da caçada; as garras de seu [activity.Custom('GetRaptorType')] sempre pingam e estão vermelhas de sangue fresco, tanto que sua luva parece estar manchada de um carmim permanente. Não posso deixar de perguntar o que ele fez para treinar uma ave de caça tão obediente e magistral, e [glove_salesman.GetSheHe] se limita a rir.\n\nGostaria de poder dizer que foi meu bom treinamento, mas, para dizer a verdade, minha luva é abençoada por [glove_salesman.GetFaith.FateGodName]. Eu estaria disposto a renunciar a ela por um preço justo."
 lucky_falconry_glove: "Luva de Falcoaria da Sorte"
 lucky_falconry_glove_desc: "Acredita-se que esta luva de falcoaria traz boa sorte ao usuário em caçadas e outras atividades marciais."
 hunt.8040.a: "Eu preciso tê-la!"
 hunt.8040.b: "Eu não preciso de sorte."
 hunt.8040.c: "Posso oferecer ao #EMP o preço justo#!."
 hunt.8050.t: "Rastros Avistados!"
 hunt.8050.desc: "Mais uma vez me encontro na natureza, em busca do esquivo exemplar de [activity.Custom('GetAnimalType')] de pelagem [activity.Custom('GetLegendaryColor')] e ainda não encontrei nem sinal dele. Isso é, até ver um conjunto de pegadas de animal que se afastam do caminho.\n\n[m_hunt.GetName] me agarra o braço com fervor e me puxa para longe. [m_hunt.GetSheHe|U] me assegura que estas não são as pegadas da besta lendária, mas sim as de um comum exemplar de [activity.Custom('GetAnimalType')]."
 hunt.8050.a: "Siga as pegadas mesmo assim."
 legendary_animal_close_tt: "As pegadas o levam mais perto do seu objetivo"
 legendary_animal_no_trace_tt: "As pegadas não levam a lugar nenhum"
 hunt.8050.b: "\"Suponho que você esteja certo.\""
 hunt.8060.t: "Cuidado!"
 hunt.8060.desc: "Estamos avançando no rastreamento do exemplar de [activity.Custom('GetAnimalType')] de cor [activity.Custom('GetLegendaryColor')] quando somos interrompidos por um[eccentric_hunter_scope.Custom('ES_XA')] [eccentric_hunter_scope.GetWomanMan] maltrapilh[eccentric_hunter_scope.Custom('ES_OA')] e insone.\n\n"Cuidado! Cuidado com a besta! Há muitos anos procuro o exemplar de [activity.Custom('GetAnimalType')] de cor [activity.Custom('GetLegendaryColor')], por toda a região de [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l]! É uma criatura malévola e só anseia por carne humana! Vão embora, este é o meu fardo!""
 hunt.8060.a: "\"Me conte tudo o que você sabe.\""
 hunt.8060.success: "[eccentric_hunter_scope.GetSheHe|U] te conta tudo"
 hunt.8060.failure: "[eccentric_hunter_scope.GetSheHe|U] não te conta nada"
 hunt.8060.b: "\"Você conhece o [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l], junte-se a mim!\""
 hunt.8060.c: ""Louco[eccentric_hunter_scope.Custom('ES_OA')]! Afaste-se de mim!""
 hunt.8070.t: "Mire, Aponte..."
 hunt.8070.desc.intro: "Estou há horas tateando pelo [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l]. O exemplar de [activity.Custom('GetAnimalType')] na cor [activity.Custom('GetLegendaryColor')] assombra meus sonhos, sempre fora do meu alcance.\n\nMas então, lá está! No alto de um barranco, prestes a [activity.Custom('GetAnimalSoundParticiple')] e posando ao sol, zombando de mim!"
 hunt.8070.desc.mid.lunatic: "Ouço os sussurros ambientes do meu grupo de caça, eles pensam que não consigo abater a fera!"
 hunt.8070.desc.mid.paranoid: "Não parece real, talvez alguém da minha comitiva tenha feito uma farsa para me enganar!"
 hunt.8070.desc.mid.fallback: "Esse objeto da minha obsessão só me traz raiva a cada momento em que estou acordado."
 hunt.8070.desc.outro: "Não consigo evitar pensar que isto é só mais um sonho, embora eu esteja completamente despert[ROOT.Char.Custom('ES_OA')]."
 hunt.8070.a: "Dê o tiro!"
 hunt.8070.b: "Não, isso não pode ser real."
 hunt.8071.t: "… Vou atirar!"
 hunt.8071.desc.intro: "Disparo minha flecha e observo enquanto ela voa em direção ao barranco. Juro que ouço um grito de dor, mas não posso ter certeza.\n\nCorro em direção à origem do som"
 hunt.8071.desc.outro: "e encontro a fera correndo mais profundamente no [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l]! Em seu rastro, deixa um rastro de sangue, embora o tiro pareça não ter ferido gravemente o maldito."
 hunt.8071.a: "Siga o rastro de sangue!"
 hunt.8072.desc.outro: "e encontro o corpo sem vida de [murder_target.GetName] com uma flecha no crânio. Sinto um calafrio na pele e meus membros fraquejam. Como pude fazer algo assim? [murder_target.GetSheHe|U] não se parece em nada com o exemplar de [activity.Custom('GetAnimalType')] de pelo [activity.Custom('GetLegendaryColor')]!"
 hunt.8072.a: "Estou enlouquecendo."
 hunt.8073.desc.outro: "e tudo o que resta é uma flecha fincada profundamente no chão. Não há pegadas, nem fezes, nem rastro de qualquer tipo de [activity.Custom('GetAnimalType')]. Esteve aqui ou foi tudo imaginação minha? Existe sequer uma [activity.Custom('GetAnimalType')] de cor [activity.Custom('GetLegendaryColor')]?"
 hunt.8073.a: "Eu não sou nenhum lunátic[ROOT.Char.Custom('ES_OA')]!"
 hunt.8074.desc.outro: "e encontro o cadáver de um exemplar comum de [activity.Custom('GetAnimalType')] sem nenhum traço de nada de cor [activity.Custom('GetLegendaryColor')]. Talvez tenha sido apenas um truque da luz, mas pelo menos a morte é limpa."
 hunt.8074.a: "Um abate é um abate."
 hunt.8500.t: "No topo do mundo"
 hunt.8500.desc: "Solto meu [activity.Custom('GetRaptorType')], mas em vez de voar reto e verdadeiro, a tola criatura apenas voa até a árvore mais próxima do [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTree')] e pousa lá.\n\nEla me olha com aqueles olhos vazios e insensíveis, como se não tivesse acabado de me envergonhar na frente de todo o grupo de caça. Chamo para que desça de lá, e recebo apenas o riso abafado dos meus companheiros caçadores."
 hunt.8500.a: "Eu mesmo vou subir lá!"
 hunt.8500.success: "Você recupera seu [activity.Custom('GetRaptorType')]"
 hunt.8500.failure: "Você cai"
 hunt.8500.b: "Eu confio no treinamento do meu [activity.Custom('GetRaptorType')]."
 hunt.8500.falcon_success: "Seu [activity.Custom('GetRaptorType')] retorna para você"
 hunt.8500.falcon_failure: "Seu [activity.Custom('GetRaptorType')] continua lá em cima"
 hunt.8510.t: "Sob Ataque"
 hunt.8510.desc: "Pouco depois de desaparecer na natureza, ouço meu [activity.Custom('GetRaptorType')] piar e gritar de angústia. Corro até a origem dos gritos e descubro que um horrível exemplar de [ROOT.Char.Custom('GetAnimalType')] agarrou uma pata da minha nobre ave de caça!\n\nA luta não está indo bem para meu [activity.Custom('GetRaptorType')] do meu coração, o sangue mancha as fauces do outro animal. Arrisco ser atacado por esse [ROOT.Char.Custom('GetAnimalType')] se eu interferir, mas meu [activity.Custom('GetRaptorType')] é caro de substituir…"
 hunt.8510.a: "Eu mesmo vou lutar contra a fera!"
 hunt.8510.a.success: "Você espanta [ROOT.Char.Custom('GetAnimalType')]"
 hunt.8510.a.failure: "O exemplar de [ROOT.Char.Custom('GetAnimalType')] te avança"
 hunt.8510.b: "É melhor não interferir."
 hunt.8510.b.success: "Seu [activity.Custom('GetRaptorType')] escapa ileso"
 hunt.8510.b.failure: "Você precisa comprar uma substituição"
 hunt.8510.c: "Vou comprar um [activity.Custom('GetRaptorType')] melhor de um dos meus parceiros de caça."
 hunt.8510.d: "Eu sei exatamente como lidar com [ROOT.Char.Custom('GetAnimalPlural')]"
 hunt.8520.t: "Caminhos Separados"
 hunt.8520.desc.intro: "Llevamos um tempo seguindo um conjunto de pegadas de [activity.Custom('GetAnimalType')] por [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l] quando percebo que as pegadas parecem se dividir misteriosamente em duas! Começo a seguir as pegadas da esquerda, mas [m_hunt.GetName] me puxa para a direita.\n\n“Vamos, meu [ROOT.Char.GetTitleAsNameNoTooltip|l], está claro que essas pegadas são antigas. Devemos seguir as mais frescas”.\n\n"
 hunt.8520.desc.outro.obsessed: "Acha que sou um tolo? Está claro que só quer me desviar do caminho."
 hunt.8520.desc.outro.fallback: "Após observação, as pegadas da esquerda parecem um pouco mais desbotadas do que as da direita."
 hunt.8520.a: "Vou virar à esquerda."
 hunt.8520.a.success: "O rastro o leva mais perto"
 hunt.8520.a.failure: "O rastro não leva a lugar algum"
 hunt.8520.b: "Vou seguir para a direita."
 hunt.8520.b.success: "$hunt.8520.a.success$"
 hunt.8520.b.failure: "$hunt.8520.a.failure$"
 hunt.8530.t: "Enredado"
 hunt.8530.desc.intro: "Lá! No horizonte, eu o vejo! O exemplar de [activity.Custom('GetAnimalType')] de cor [activity.Custom('GetLegendaryColor')]! Entro em frenesi, correndo em sua direção antes que ele possa, mais uma vez, virar névoa em minhas mãos!\n\n#EMP CHAS!#!\n\nNem sinto minha perna ficar presa entre as rochas; tudo o que vejo é o mundo afundar à minha frente enquanto caio até a cintura numa armadilha comum de caçadores furtivos! Eu me debato, mas nada do que faço é suficiente para soltar minha perna."
 hunt.8530.desc.outro.obsessed: "Não posso deixar que essa maldita criatura escape de mim novamente! Talvez eu precise tomar medidas extremas..."
 hunt.8530.desc.outro.fallback: "Pode ser que eu não tenha outra chance de capturar a fera, mas não parece haver uma saída."
 hunt.8530.a: "Tenho certeza de que se eu apenas pegar o ângulo certo..."
 hunt.8530.a.success: "Você é libertado"
 hunt.8530.a.failure: "Você piora a situação"
 hunt.8530.b: "\"Socorro! Socorro!\""
 hunt.8530.c: "Eu preciso me livrar dessa maldita perna!"
 hunt.8540.t: "O/A [activity.Custom('GetAnimalType')] de cor [activity.Custom('GetLegendaryColor')]: um presságio"
 hunt.8540.desc.intro: "Volto a sonhar com esse exemplar de cor [activity.Custom('GetLegendaryColor')] de [activity.Custom('GetAnimalType')] e como ele zomba de mim. Ele me encara, e com o estrondo do seu [activity.Custom('GetAnimalSoundParticiple')], desperto gritando no acampamento de caça.\n\n"
 hunt.8540.desc.mid.witch: "[ROOT.Char.GetFaith.WitchGodName|U] deve estar se comunicando comigo através dos meus sonhos, dizendo que a criatura está lá fora, e que é minha para matar. Olho pela janela e vejo todas as espécies de animais lá fora, olhando na mesma direção."
 hunt.8540.desc.mid.orion: "Olhando pela janela, a constelação do caçador brilha mais intensamente do que nunca, como se estivesse me chamando."
 hunt.8540.desc.mid.ursa_major: "Olhando pela minha janela, e a constelação do/a [activity.Custom('GetAnimalType')] brilha reluzente no céu noturno límpido, chamando-me para a natureza."
 hunt.8540.desc.mid.lights: "Olhando pela janela, consigo ver claramente um conjunto de orbes brancos cintilantes, que se estendem até a natureza, talvez me guiando até minha presa."
 hunt.8540.desc.mid.comet: "Olhando pela janela, estou maravilhado com um cometa cruzando o céu, talvez me apontando para um local específico na [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l]."
 hunt.8540.desc.outro: "\n\nNão posso negar que o que estou vendo é real, mas meu corpo está tão cansado."
 hunt.8540.a: "Isso #EMP deve#! ser um sinal para amanhã!"
 hunt.8540.a.success: "Você interpreta corretamente os sinais"
 hunt.8540.a.failure: "Você não é levado a lugar algum"
 hunt.8540.b: "Não consigo dormir agora, preciso começar cedo!"
 hunt.8540.b.success: "Você avança"
 hunt.8540.b.failure: "Você não encontra nenhum vestígio da fera"
 hunt.8540.c: "Um presente de [ROOT.Char.GetFaith.CreatorName|U]."
 hunt.8540.d: "Isto é lindo, preciso mostrar a [intent_target_character.GetFirstNameNoTooltip]!"
 hunt.8550.t: "As Fezes do [activity.Custom('GetLegendaryColor')]"
 hunt.8550.desc: "Estou avançando no rastreamento do lendário exemplar de [activity.Custom('GetAnimalType')|U] de pelagem [activity.Custom('GetLegendaryColor')|U]. Seus rastros me levam para fora do caminho mais trilhado, antes de se desvanecerem na obscuridade completa. Sinto o desespero tomar meu coração, mas de repente avisto algo que me tira o fôlego.\n\nExcrementos da cor [activity.Custom('GetLegendaryColor')] mais pura, como nunca vi antes! Se a própria fera é da cor [activity.Custom('GetLegendaryColor')], então faz sentido que seus excrementos tenham uma tonalidade semelhante."
 hunt.8550.a: "Isso #EMP deve#! ser verdade!"
 hunt.8550.a.success: "As fezes o levam mais perto"
 hunt.8550.a.failure: "Você perde qualquer vestígio da fera"
 hunt.8550.b: "Talvez eu deva tentar identificá-las."
 hunt.8550.b.success: "Você identifica corretamente as fezes"
 hunt.8550.b.failure: "Você não consegue identificar as fezes"
 hunt.8550.c: "Isso é uma distração, devemos encontrar algo mais."
 hunt.8550.d: "Essas são #EMP fezes lendárias#!"
 legendary_fumes: "Fumaça Lendária"
 legendary_fumes_desc: "Esses excrementos supostamente foram excretados por um mítico exemplar de [activity.Custom('GetAnimalType')] de cor [activity.Custom('GetLegendaryColor')]."
 hunt.8560.t: "Gato Grande, Filhote Pequeno"
 hunt.8560.desc: "Enquanto vagamos pela natureza, em busca do mortal exemplar de [activity.Custom('GetAnimalType')], ouço um miado patético e fraco vindo do outro lado do caminho. Sigo sua origem e encontro um filhote minúsculo de [activity.Custom('GetAnimalType')], menor do que um gato vira-lata comum, tremendo e completamente imóvel a céu aberto.\n\n[hunt_participant.GetName|U] corre até seu lado e o leva, ronronando, em seus braços.\n\n\"Os pais do pobrezinho devem ter morrido ou se perdido. É nosso dever proteger as criações vulneráveis de [hunt_participant.GetFaith.CreatorName], não é?\"."
 hunt.8560.a: "Podemos usar seus gritos para atrair um exemplar real de [activity.Custom('GetAnimalType')]!"
 hunt.8560.b: "Eu cuidarei dele."
 hunt.8560.c: "\"Jogue essa coisa de volta onde encontrou!\""
 hunt.8570.t: "Estampida!"
 hunt.8570.desc: "Começou com um estrondo, mas logo o mundo inteiro começou a tremer, como se [ROOT.Char.GetFaith.DevilName] em pessoa estivesse tentando despedaçar a/o [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip]!\n\nPouco depois, um mar de [activity.Custom('GetAnimalPlural')] envolveu toda a clareira, com [stampede_victim.Custom2('MyCharacterIntroduction', ROOT.Char)] preso[stampede_victim.Custom('ES_OA')] no meio deles!\n\nAs feras parecem estar evitando-o por enquanto, mas se eu não agir, certamente morrerá."
 hunt.8570.a: "\"Estou indo!\""
 hunt.8570.a.success: "[stampede_victim.GetHerHim|U] resgatas iles[stampede_victim.Custom('ES_OA')]"
 hunt.8570.a.failure: "[stampede_victim.GetHerHim|U] resgatas com ferimentos"
 hunt.8570.a.failure_2: "Você falhou em resgatar[stampede_victim.GetHerHim]"
 hunt.8570.a.crit_failure: "Você morre em sua tentativa"
 hunt.8570.b: "Talvez eu possa redirecionar a estampida."
 hunt.8570.b.success: "Você redireciona a estampida"
 hunt.8570.b.failure: "Você falha em redirecionar a estampida"
 hunt.8570.c: "Uma boa oportunidade para eliminar alguns rezagados!"
 hunt.8570.c.success: "Você faz alguns bons disparos"
 hunt.8570.c.failure: "Você não consegue matar nem um único exemplar de [activity.Custom('GetAnimalType')]"
 hunt.8570.c.death: "[stampede_victim.GetName] é atropelad[stampede_victim.Custom('ES_OA')]"
 hunt.8570.c.survives: "[stampede_victim.GetName] sobrevive"
 hunt.8570.d: "[stampede_victim.GetSheHe|U] pode ajudar a si mesm[stampede_victim.Custom('ES_OA')]."
 hunt.8580.t: "Encarando"
 hunt.8580.desc: "Estou separado de meu grupo de caça por um instante, mas um instante foi o suficiente para que um exemplar errante de [activity.Custom('GetAnimalType')] aparecesse no topo de uma grande rocha e parasse de repente para me encarar como se eu fosse sua próxima refeição. Sinto minha garganta secar e minha mão se apertar em torno do arco.\n\nMinha experiência na caça me diz que é preciso ficar imóvel perto de um/a [activity.Custom('GetAnimalType')] se se deseja sobreviver, mas, naquele momento, sou apenas [Select_CString( ROOT.Char.IsFemale, 'esclava', 'esclavo')] de meus próprios instintos."
 hunt.8580.a: "Devo tentar ficar imóvel[ROOT.Char.Custom('ES_OA')]."
 hunt.8580.a.success: "[activity.Custom('GetAnimalType')] recua"
 hunt.8580.a.failure: "O animal de [activity.Custom('GetAnimalType')] te dilacera"
 hunt.8580.b: "Posso atirar nele."
 hunt.8580.b.success: "Você acerta [activity.Custom('GetAnimalType')]"
 hunt.8580.b.failure: "$hunt.8580.a.failure$"
 hunt.8580.c: "Corra e peça ajuda!"
 hunt.8580.c.success: "Você escapa"
 hunt.8580.c.failure: "$hunt.8580.a.failure$"
 hunt.8590.t: "A Toca de [activity.Custom('GetAnimalPlural')]"
 hunt.8590.desc: "Ao chegarmos ao topo de uma colina, minha comitiva de caça encontra uma caverna escura que parece praticamente interminável. Ao redor de sua entrada, há sinais inconfundíveis de um exemplar de [activity.Custom('GetAnimalType')]!\n\nSem dúvida, um/a [activity.Custom('GetAnimalType')] ou até mesmo um grupo de [activity.Custom('GetAnimalPlural')] considera este lugar como seu lar! Se esperarmos aqui até cair a noite, quase certamente encontraremos nossa presa."
 hunt.8590.a: "Então, esperaremos!"
 hunt.8590.a.success: "[activity.Custom('GetAnimalType')] retorna para casa"
 hunt.8590.a.failure: "[activity.Custom('GetAnimalType')] não aparece"
 hunt.8590.b: "Podemos rastreá-lo com base nisso."
 hunt.8590.b.success: "Você faz progresso no rastro do/a [activity.Custom('GetAnimalType')]"
 hunt.8590.b.failure: "Você não consegue rastrear [activity.Custom('GetAnimalType')]"
 unforseen_consequences_tt: "Isso terá consequências imprevistas..."
 lover_impressed_hunt: "[CHARACTER.GetShortUIName|U] impressionou [TARGET_CHARACTER.GetShortUIName] em uma caçada"
 lover_impressed_hunt_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] impressionou [CHARACTER.GetShortUIName] em uma caçada"
 lover_written_in_stars: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [CHARACTER.LocalPlayerString( 'compartisteis', 'compartieron' )] um momento romântico sob as estrelas"
 friend_bonded_during_hunt: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'congeniasteis', 'congeniaron')] durante uma caçada"
 friend_compassion_for_animals: "[CHARACTER.GetShortUIName|U] impressionou [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName)] ao demonstrar profunda compaixão pelos animais"
