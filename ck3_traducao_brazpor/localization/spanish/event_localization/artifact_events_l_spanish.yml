 #Event localization
 artifact.0011.t: "[this_artifact.Custom('InventoryCourtArtifact')] Perdido!"
 artifact.0011.tooltip: "Você perdeu o artefato [this_artifact.GetName] para [owner.GetTitledFirstNameNoTooltip|l]"
 artifact.0012.t_1: "Artefato obtido!"
 artifact.0012.t: "Artefatos obtidos!"
 artifact.0012.tooltip: "Você adquiriu o artefato [this_artifact.GetName] de [old_owner.GetTitledFirstNameNoTooltip|l]"
 msg_artifact_gained_acquired_desc_1: "Você adquiriu [PlayerMessageItem.GetRightArtifact.GetName]"
 msg_artifact_gained_acquired_desc_2: "Você adquiriu [PlayerMessageItem.GetRightArtifact.GetName] e [PlayerMessageItem.GetLeftArtifact.GetName]"
 msg_artifact_gained_acquired_desc: "Você adquiriu [PlayerMessageItem.GetRightArtifact.GetName] [PlayerMessageItem.GetLeftArtifact.GetName] e $msg_artifact_gained_desc_others$"
 msg_artifact_gained_desc_others: "#tooltip:message_consolidation_names #L más#!#!"
 artifact.0021.t: "[this_artifact.Custom('InventoryCourtArtifact')] Destruido!"
 artifact.1001.t: "Cinzas ao Cair, Ferrugem ao...?"
 artifact.1001.desc.antiquarian: "Meu antiquário[antiquarian.Custom('ES_OA')] [antiquarian.GetTitledFirstName|l] se aproxima de mim com meu[this_artifact.GetName] nas mãos."
 artifact.1001.desc.servant: "Um dos meus servos se aproxima de mim, segurando meu artefato [this_artifact.GetName] em suas mãos."
 artifact.1001.desc.weapon: "\n\n"Meu [ROOT.Char.Custom('ES_SennorSennora')], enquanto eu limpava o arsenal, percebi que a ferrugem quase fez desaparecer isto... [SCOPE.Custom('ThisArtifactType')]. O que devemos fazer?".\n\nDou uma olhada. Embora nenhuma remanufatura consiga torná-lo adequado para a batalha novamente, seria possível limpá-lo e preservá-lo para exibição a um custo mínimo."
 artifact.1001.desc.other: "\n\n"Minha [ROOT.Char.Custom('ES_SennorSennora')] enquanto eu estava limpando o depósito, notei que seu [SCOPE.Custom('ThisArtifactType')] já é tão antigo que está praticamente se desfazendo! O que devemos fazer com ele?".\n\nDou uma olhada no artefato. Embora nenhuma quantidade de reparos possa torná-lo usável novamente, seria possível limpá-lo e preservá-lo para exibição com um custo mínimo."
 artifact.1001.a: "Um empreendimento que vale a pena."
 artifact.1001.a.tt.free: "#instruction Este [artifact|lE] pode ser convertido gratuitamente!#!"
 artifact.1001.a.tt: "[this_artifact.GetName] é convertido em um [court_artifact|lE] fornecendo apenas [grandeur|lE] e [prestige|lE]"
 artifact.1001.b: "Não, é muito caro."
 manhunter: "#EMP \"Perseguidor de Homens\"#!"
 heartseeker: "#EMP \"Caçador de Corações\"#!"
 artifact.1001.desc.kills_none: "[this_artifact.GetDesc]\n\nNunca tendo sido usado em combate, esta arma serve apenas como um enfeite para pendurar na parede de algum nobre."
 artifact.1001.desc.kills_one: "[this_artifact.GetDesc]\n\nTendo sido usada uma vez para matar um inimigo em batalha, esta arma provou seu valor o suficiente para ser exibida na sala de um governante."
 artifact.1001.desc.kills_some: "[this_artifact.GetDesc]\n\nTendo matado [ROOT.Var('num_kills').GetValue|V0] inimigos em batalha, esta arma conquistou seu lugar no salão de um grande guerreiro ou governante."
 artifact.1001.desc.kills_many: "[this_artifact.GetDesc]\n\nEmbora não seja mais adequada para batalha, as [ROOT.Var('num_kills').GetValue|V0] vidas que esta arma ceifou a tornaram um símbolo de habilidade marcial, digna de ser exibida no salão de um grande guerreiro."
 artifact.1001.desc.kills_tons: "[this_artifact.GetDesc]\n\nEmbora não seja mais adequada para batalha, as [ROOT.Var('num_kills').GetValue|V0] vidas que esta arma ceifou a tornam um símbolo lendário de habilidade marcial, inspirando admiração ou medo em todos que a contemplam."
 #Degraded Artifact Events
 artifact.3000.t: "Artefato Degradado: Reutilização"
 artifact.3000.desc.armorer_intro: "Meu $armorer_camp_officer$, [antiquarian.Custom('ES_ElLa')] [antiquarian.GetTitledFirstName|l], aproxima-se de mim com uma expressão preocupada.\n\n\"Meu [ROOT.GetCharacter.GetLadyLord], estou cada vez mais preocupado com [this_artifact.GetName] e o estado de completo abandono em que ele se encontra. Está se desfazendo!"
 artifact.3000.desc.antiquarian_intro: "Meu $antiquarian_court_position$[antiquarian.Custom('ES_ElLa')] [antiquarian.GetTitledFirstName|l], se aproxima de mim com uma expressão preocupada.\n\nMeu [ROOT.GetCharacter.GetLadyLord], estou cada vez mais preocupado com [this_artifact.GetName] e o estado de completo abandono em que ele se encontra. Está se desfazendo!"
 artifact.3000.desc.antiquarian: "\n\n\"Provavelmente é tarde demais para restaurá-lo agora, mas nem tudo está perdido. Se me permitir, posso desmontá-lo e utilizar as partes úteis em um futuro artefato!\""
 artifact.3000.desc.servant_intro: "Um[dummy_servant_gender.Custom('ES_XA')] servo[dummy_servant_gender.Custom('ES_OA')] se aproxima de mim com uma expressão culpada no rosto, enquanto esconde algo atrás das costas.\n\n“Meu [ROOT.GetCharacter.GetLadyLord], estava limpando sua coleção de artefatos como de costume quando percebi que o estado de completo abandono do seu [this_artifact.GetName] está horrível."
 artifact.3000.desc.servant: "\"Sem um especialista na corte, pode não ser possível restaurá-lo à sua antiga glória, mas podemos pelo menos guardar as peças para serem reutilizadas em um novo artefato...\""
 artifact.3000.a: "Isso me entristece, mas prossiga."
 artifact.3000.b: "Ainda é possível salvá-lo!"
 artifact.3000.c: "Aposto que foi #EMP você#! quem o quebrou!"
 artifact.3001.t: "Inspiração: Reutilização"
 artifact.3001.desc: "Hoje [inspiration_owner.GetFirstName] se aproxima de mim com certo vigor no passo.\n\n"Meu [ROOT.GetCharacter.GetLadyLord]! Estava revirando objetos descartados e tralhas quebradas de vossos depósitos em busca de inspiração quando encontrei um tesouro inesperado. Parece que guardastes para o futuro alguns materiais sobressalentes de um artefato desmontado... Pois o futuro chegou!""
 artifact.3001.a: "Essa é uma ótima notícia!"
 artifact.3010.t: "Artefato Deteriorado: Venda"
 artifact.3010.desc.antiquarian: "\n\n\"Talvez um comerciante de sucatas esteja interessado em comprar as peças por um preço adequado...\""
 artifact.3010.desc.servant: "\n\n\"Ele está completamente inútil e irreconhecível agora! Você poderia vendê-lo para um colecionador de sucatas e ganhar algumas moedas de ouro com isso...\""
 artifact.3010.a: "Está bem, eu não precisava dele mesmo."
 artifact.3010.a.tt: "[this_artifact.GetNameNoTooltip] é vendido ao comerciante e perdido para sempre."
 artifact.3010.b: "Esse artefato é #EMP MEU!#!"
 artifact.3020.t: "Artefato Deteriorado: Adaptar"
 artifact.3020.desc: "\n\n\"Pode ser que nunca recupere sua utilidade original, mas, se me permitir, posso ao menos recuperar uma parte dele como uma lembrança de glórias passadas! Afinal, foi um poderoso símbolo de seu poder por um tempo...\""
 artifact.3020.a: "Pelo menos ainda serve para alguma coisa..."
 artifact.3020.b: "Apenas faça seu trabalho e conserte-o!"
 keepsake_trinket_name: "Relíquia de [this_artifact.GetNameNoTooltip]"
 keepsake_trinket_description: "Um fragmento do/da [this_artifact.GetName] perdido/a, que o $antiquarian_court_position$ resgatou para [owner.GetTitledFirstNameNoTooltip|l] como lembrança."
 artifact.3030.t: "Artefato Deteriorado: Preservar"
 artifact.3030.desc: "\n\n\"Para salvá-lo, tenho uma proposta. Recentemente, ganhei um rolo empoeirado em um jogo de dados com um personagem suspeito em uma feira itinerante - um negócio muito afortunado, já que seu conteúdo se encaixa perfeitamente em meu crescente interesse pela alquimia! O velho rolo descreve uma poção secreta que garante tornar #EMP qualquer artefato#! ainda melhor do que novo. Por favor, deixe-me tentar!\""
 artifact.3030.a: "Claro, não pode ficar pior do que isso..."
 artifact.3030.b: "Você #EMP não#! vai tocá-lo com essa mistura!"
 artifact.3030.a.bigsuccess: "O artefato está mais limpo e mais forte do que nunca"
 artifact.3030.a.bigsuccess.t: "Artefato Restaurado e Melhorado"
 artifact.3030.a.success: "O artefato está reparado"
 artifact.3030.a.success.t: "Artefato Reparado"
 artifact.3030.a.failure: "O tratamento não foi bem-sucedido"
 artifact.3030.a.failure.t: "Tratamento Inútil"
 artifact.3030.a.bigfailure: "O artefato foi destruído"
 artifact.3030.a.bigfailure.t: "Artefato Destruído!"
 artifact.3040.t: "Artefato Deteriorado: Uma Oferta"
 artifact.3040.desc.antiquarian: "Meu $antiquarian_court_position$ [antiquarian.GetTitledFirstName|l] se aproxima de mim acompanhado[antiquarian.Custom('ES_OA')] de [vassal.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n\"Meu [ROOT.GetCharacter.GetLadyLord], foi levado ao meu conhecimento que seu/sua [this_artifact.GetName] está em condições terríveis... Apesar dos meus esforços, não posso fazer mais para preservá-lo(a) sem o financiamento adequado!\n\nNo entanto, encontrei uma possível solução para poupar seus cofres. [vassal.GetTitledFirstNameNoTooltip|U] se ofereceu para arcar com as despesas em troca de uma mera demonstração de sua gratidão.\""
 artifact.3040.desc.no_antiquarian: "[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim com uma expressão tão falsamente contrita que já temo o que ele vai dizer.\n\n"Meu [ROOT.GetCharacter.GetLadyLord], é uma verdadeira #EMP desgracia#! que tesouros tão preciosos como vosso/a [this_artifact.GetName] permaneçam esquecidos e abandonados ao pó! Por favor, permitam-me pagar por sua restauração… em troca de um pequeno favor"."
 artifact.3040.a: "Eu sabia que havia uma pegadinha... Mas tudo bem!"
 artifact.3040.b: "Vamos considerar que estamos quites, então."
 artifact.3040.c: "Eu não preciso da sua ajuda."
 artifact.3050.t: "Artefato Deteriorado!"
 artifact.3050.desc: "Um artefato de alta qualidade em sua posse – [this_artifact.GetName] – está se aproximando à [durability|lE] #N 0#! e pode ser destruído!"
 artifact.4000.t: "Rumores Amaldiçoados"
 artifact.4000.desc.antiquarian_intro: "Meu $antiquarian_court_position$, [antiquarian.Custom('ES_ElLa')] [antiquarian.GetTitledFirstName|l], vem me observando com ar preocupado há alguns dias quando finalmente se aproxima de mim.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], tenho notícias preocupantes sobre uma de vossas posses mais valiosas, vosso/a [this_artifact.GetName]. Pelos salões, correm rumores sobre o objeto e tanto convidados quanto serviçais o observam com temor e desconfiança… Acreditam que seja uma #EMP maldición#!! Como dizem os rumores,"
 artifact.4000.desc.servant_intro: "Nestes últimos dias, não consegui deixar de notar que minha casa anda cada vez mais agitada com rumores do que o habitual, embora todas as vozes se calem quando entro na sala.\n\nQuando finalmente consigo agarrar um criado[dummy_servant_gender.Custom('ES_OA')] para pedir uma explicação, a resposta dele é: "Não sabeis, [ROOT.Char.Custom('FormOfAddressForLiege')]? É o vosso/a [this_artifact.GetName]! Todo mundo sabe que está sob uma #EMP maldición!#! Está claro que..."
 artifact.4000.desc.stolen: "ninguém realmente pode possuí-lo, pois está destinado a ser roubado e causar conflitos perpétuos!"
 artifact.4000.desc.assassinated: "ele traz grande infortúnio e morte violenta para quem o possui!"
 artifact.4000.desc.ghost: "ele é habitado pelo espírito raivoso dos mortos!"
 artifact.4000.desc.fallback: "ele está impregnado com o poder insidioso de [ROOT.Char.GetFaith.DevilName]!"
 artifact.4000.desc.end: "\n\n\" Talvez a intervenção de um homem ou mulher santo possa tranquilizar a todos..."
 artifact.4000.cursed_name: "[this_artifact.GetNameNoTooltip] Amaldiçoado"
 artifact.4000.cursed_desc: "[this_artifact.GetDesc]\n\nNobres e camponeses se calam ou invocam proteção divina na presença deste item, que é famoso por ser amaldiçoado."
 artifact.4000.a: "Chame imediatamente essa pessoa!"
 artifact.4000.b: "Deixe todos tremerem de medo ao vê-lo!"
 artifact.4001.t: "Rumores Amaldiçoados: Intervenção Sagrada"
 artifact.4001.desc.antiquarian_intro: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], me chama meu [ROOT.Char.Custom('GetAntiquarianOrArmorer')], [antiquarian.Custom('ES_ElLa')] [antiquarian.GetTitledFirstName|l],"
 artifact.4001.desc.servant_intro: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]", um servo apressado se aproxima de mim, acompanhado por um personagem de aparência solene,"
 artifact.4001.desc: ""Assim como solicitastes, encontramos um[holy_man.Custom('ES_XA')] [holy_man.GetWomanMan] sant[holy_man.Custom('ES_OA')] para abençoar vosso/a [this_artifact.GetName].\n\n"Permiti que vos [holy_man.Custom('ES_LoLa')] apresente. Tenho certeza de que sua intervenção levantará a maldição e tranquilizará a mente de todos.""
 artifact.4001.a: "Faça o seu melhor, [holy_man.GetFirstNameNoTooltip]..."
 artifact.4001.a.success: "Maldição Removida"
 artifact.4001.a.failure: "A Maldição Permanece"
 artifact.4001.a.success.desc: "A maldição foi removida"
 artifact.4001.a.failure.desc: "A maldição permanece"
 artifact.4002.t: "Rumores Amaldiçoados: Uma Fama Obscura"
 artifact.4002.desc.antiquarian_intro: "Meu [ROOT.Char.Custom('GetAntiquarianOrArmorer')] [antiquarian.GetTitledFirstName|l] se dirige a mim com uma expressão preocupada."
 artifact.4002.desc.servant_intro: "Um grupo de serviçais assustados me aborda enquanto caminho para meus aposentos. Um deles toma a palavra:"
 artifact.4002.desc: "\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], vós deveis saber que, com o passar dos anos, aumentou a crença de que vosso/a [this_artifact.GetName] é um objeto amaldiçoado… Ele aterroriza vossos criados, servos e até mesmo convidados!\n\nAceitaríeis chamar uma pessoa santa para abençoar o objeto e finalmente trazer um pouco de paz aos vossos súditos aterrorizados?"
 artifact.4010.t: "Uma Arma de Fama Assassina"
 artifact.4010.desc.antiquarian_intro: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], vocês ficaram sabendo? Meu [ROOT.Char.Custom('GetAntiquarianOrArmorer')] [antiquarian.Custom('ES_ElLa')] [antiquarian.GetTitledFirstName|l] se aproxima de mim."
 artifact.4010.desc.servant_intro: "Não consigo deixar de ouvir as vozes animadas que vêm de uma pequena multidão de serviçais no salão."
 artifact.4010.desc: "\n\n\"A fama de [this_artifact.GetName] de [ROOT.Char.GetTitledFirstNameNoTooltip|l] chega longe e continua crescendo! Todos falam com admiração dessa arma invencível, [SCOPE.Custom('ThisArtifactType')] que ceifa seus inimigos como se fossem flores do campo e seu glorios[ROOT.Char.Custom('ES_OA')] dono[ROOT.Char.Custom('ES_OA')]!\""
 artifact.4010.a: "Ótima notícia!"
 artifact_killer_1_name: "[this_artifact.GetNameNoTooltip] [this_artifact.Custom('RandomWeaponTitle1')]"
 artifact_killer_2_name: "[this_artifact.Custom('RandomWeaponTitle2')] [this_artifact.GetNameNoTooltip]"
 artifact_killer_3_name: "[this_artifact.GetNameNoTooltip] [this_artifact.Custom('RandomWeaponTitle3')]"
 artifact_killer_4_name: "[this_artifact.Custom('RandomWeaponTitle4')] [this_artifact.GetNameNoTooltip]"
 artifact_killer_1_desc: "[this_artifact.GetDesc]\n\nTendo sido usada em pelo menos 15 vitórias no campo de batalha, esta arma é renomada por mostrar o verdadeiro valor de seus proprietários."
 artifact_killer_2_desc: "[this_artifact.GetDesc]\n\nTendo sido usada em pelo menos 30 vitórias no campo de batalha, esta arma é renomada por trazer dor aos seus inimigos."
 artifact_killer_3_desc: "[this_artifact.GetDesc]\n\nTendo sido usada em pelo menos 50 vitórias no campo de batalha, esta arma é renomada por sempre trazer vitória ao seu dono."
 artifact_killer_4_desc: "[this_artifact.GetDesc]\n\nTendo sido usada em pelo menos 100 vitórias no campo de batalha, esta arma é mencionada em lendas."
 artifact.4020.t: "Uma Armadura Renomada"
 artifact.4020.desc: "\n\n\"Todos reconhecem a armadura [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l], [this_artifact.GetName] que reluz no campo de batalha como nenhuma outra, para que aliados e inimigos saibam por igual que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('ES_HeroeHeroina')] imortal caminha entre eles!\""
 artifact.4020.a: "Ótima notícia!"
 artifact_armor_1_name: "[this_artifact.Custom('RandomArmorTitle1')] [this_artifact.GetNameNoTooltip]"
 artifact_armor_2_name: "[this_artifact.GetNameNoTooltip] [this_artifact.Custom('RandomArmorTitle2')]"
 artifact_armor_3_name: "[this_artifact.Custom('RandomArmorTitle3')] [this_artifact.GetNameNoTooltip]"
 artifact_armor_4_name: "[this_artifact.GetNameNoTooltip] [this_artifact.Custom('RandomArmorTitle4')]"
 artifact_armor_1_desc: "[this_artifact.GetDesc]\n\nTendo mantido seu dono seguro por pelo menos 15 batalhas, esta armadura está começando a ser reconhecida no campo de batalha."
 artifact_armor_2_desc: "[this_artifact.GetDesc]\n\nTendo mantido seu dono seguro por pelo menos 30 batalhas, esta armadura está se destacando no campo de batalha."
 artifact_armor_3_desc: "[this_artifact.GetDesc]\n\nTendo mantido seu dono seguro por pelo menos 50 batalhas, esta armadura é reconhecida e temida tanto por amigos quanto por inimigos."
 artifact_armor_4_desc: "[this_artifact.GetDesc]\n\nTendo mantido seu dono seguro por pelo menos 100 batalhas, esta armadura é considerada um item lendário."
 artifact.4030.t: "A Coroa do Nosso Povo"
 artifact.4030.desc.antiquarian_intro: "Meu [ROOT.Char.Custom('GetAntiquarianOrArmorer')], [antiquarian.Custom('ES_ElLa')] [antiquarian.GetTitledFirstName|l], se aproxima de mim com um grande sorriso no rosto e meu [this_artifact.GetName] nas mãos."
 artifact.4030.desc.servant_intro: "O/A criado(a)[dummy_servant_gender.Custom('ES_EA')] que normalmente é encarregado(a) de limpar meus bens mais preciosos vem até mim com meu [this_artifact.GetName] nas mãos."
 artifact.4030.desc_emperor: "\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], você sabia que, depois de tantas gerações pertencendo a [ROOT.Char.GetTitleTierName], agora esta coroa é conhecida comumente como símbolo do poder imperial?"."
 artifact.4030.desc_kingdom: "\n\n[ROOT.Char.Custom('FormOfAddressForLiege')|U], sabiam que, após tantas gerações pertencendo a [ROOT.Char.GetTitleAsNameNoTooltip], esta coroa agora é considerada parte integrante da identidade de [primary_title_scope.GetBaseNameNoTierNoTooltip]?"
 artifact_emperors_crown_name: "[this_artifact.GetNameNoTooltip] imperial"
 artifact_emperors_crown_desc: "[this_artifact.GetDesc]\n\nPor muitas gerações, esta coroa pertenceu aos Imperadores, ganhando assim autoridade extra."
 artifact_crown_special_name: "[this_artifact.GetNameNoTooltip] do [primary_title_scope.GetNameNoTierNoTooltip]"
 artifact_crown_special_desc: "[this_artifact.GetDesc]\n\nEsta coroa foi transmitida por várias gerações de governantes do mesmo título, tornando-se assim um símbolo de seu poder."
 artifact.4040.t: "O Olho do Especialista"
 artifact.4040.desc: "[helpful.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproxima a mim com um brilho nos olhos.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], não pude deixar de notar o trabalho primoroso do seu [this_artifact.GetName]... Mas somente um[helpful.Custom('ES_XA')] verdadeiro[helpful.Custom('ES_OA')] especialista[helpful.Custom('ES_OA')] do campo de batalha como eu poderia identificar os pequenos ajustes que o tornariam uma ferramenta de guerra ainda mais eficaz!".\n\nDesligo quando ele/ela começa a divagar sobre #EMP simetría#!, #EMP equilibrio#! e #EMP canto#!, mas capto a ideia geral de que [helpful.GetFirstNameNoTooltip] poderia melhorar meu artefato em troca de uma #EMP muestra simbólica de gratitud#!."
 artifact.4040.a: "Ótimo, faça o que precisa ser feito."
 artifact.4040.a.tt: "[this_artifact.GetName|U] é aprimorado!"
 artifact.4040.b: "Não preciso da sua ajuda."
 artifact.4050.t: "Explosão de Raiva"
 artifact.4050.desc: "O estresse tem se acumulado sobre mim há algum tempo, como um monte de tijolos. Sinto que meu gênio tem se elevado até o ponto de ebulição, só procurando uma desculpa para explodir de forma espetacular.\n\nHoje tudo desaba sobre mim quando entro no salão, e os servos fofocam, os criados tagarelam, meus conselheiros disputam minha atenção todos ao mesmo tempo, e é simplesmente demais para eu suportar.\n\n"#EMP BASTA!#!", grito enquanto agarro a primeira coisa em que minha mão toca e a jogo contra a parede mais próxima.\n\nO silêncio toma conta da sala e, quando vejo minha [this_artifact.GetName], sinto toda a minha raiva se evaporar, substituída por uma sensação de terror…"
 artifact.4050.a: "Maldição!"
 artifact.4060.t: "[SCOPE.Custom('ThisArtifactType')] Abençoado do [ROOT.Char.GetFaith.HighGodName]"
 artifact.4060.desc: ""Permiti que vos apresente [holy_man.GetFirstName], um[holy_man.Custom('ES_XA')] [holy_man.GetWomanMan] de grande santidade, famoso em vossas terras.\n\n"Ele foi profundamente tocad[holy_man.Custom('ES_OA')] por vossa fama como governante just[ROOT.Char.Custom('ES_OA')] e piedos[ROOT.Char.Custom('ES_OA')] e gostaria de estender a proteção divina a um de vossos tesouros."\n\n"O permitiríeis?"."
 artifact.4060.a: "Aceito humildemente sua oferta, [holy_man.GetFirstNameNoTooltip]."
 artifact.4060.b: "Isso não será necessário."
 artifact_4060_blessed_artifact_name: "[this_artifact.GetNameNoTooltip] Abençoado"
 artifact_4060_blessed_artifact_desc: "[this_artifact.GetDesc]\n\nDe acordo com a história tradicional, este item foi abençoado por um homem santo, recebendo assim proteção divina. Os sábios não mexem com o sobrenatural, quer acreditem nele ou não."
 artifact.4070.t: "Uma Relíquia Profanada"
 artifact.4070.desc: "Tomar das mãos dos [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')] o controle do nosso precioso artefato, [this_artifact.GetName], certamente deve ter melhorado minha posição aos olhos de [ROOT.Char.GetFaith.HighGodName]. Ainda assim, permanece dentro de mim uma sensação de inquietação, alimentada por várias vozes em minha corte.\n\n#EMP "Os [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')] contaminaram nossa relíquia!" "Colocaram uma maldição nela!" "Quem sabe para que tipo de rituais pervertidos usaram o objeto!"#!\n\nProvavelmente estão exagerando, mas imagino que não faria mal organizar uma elegante procissão religiosa de purificação, não é?"
 artifact.4070.a: "Vamos organizá-la imediatamente!"
 artifact.4070.b: "Não, eles estão apenas sendo supersticiosos."
 artifact.4080.t: "Arma do Duelista Mestre"
 artifact.4080.desc: "\n\n\"Todo mundo está falando de [this_artifact.GetName] de [ROOT.Char.GetTitledFirstNameNoTooltip|l]! Parece que quem empunha esse artefato não perde nenhum duelo! Também ouvi dizer que ele só escolhe os mais dignos para possuí-lo! E falei com um mercador viajante outro dia: a fama dessa arma invencível chegou até sua terra natal!\""
 artifact_duel_weapon_1_name: "[this_artifact.Custom('RandomDuelTitle1')] [this_artifact.GetNameNoTooltip]"
 artifact_duel_weapon_2_name: "[this_artifact.GetNameNoTooltip] [this_artifact.Custom('RandomDuelTitle2')]"
 artifact_duel_weapon_3_name: "[this_artifact.Custom('RandomDuelTitle3')] [this_artifact.GetNameNoTooltip]"
 artifact_duel_weapon_4_name: "[this_artifact.GetNameNoTooltip] [this_artifact.Custom('RandomDuelTitle4')]"
 artifact_duel_weapon_1_desc: "[this_artifact.GetDesc]\n\nAo derrotar pelo menos 5 inimigos em um duelo, esta arma se mostrou confiável e sortuda."
 artifact_duel_weapon_2_desc: "[this_artifact.GetDesc]\n\nAo derrotar pelo menos 10 inimigos em um duelo, esta arma está começando a ganhar fama."
 artifact_duel_weapon_3_desc: "[this_artifact.GetDesc]\n\nAo derrotar pelo menos 20 inimigos em um duelo, esta arma adquiriu uma reputação temível."
 artifact_duel_weapon_4_desc: "[this_artifact.GetDesc]\n\nAo derrotar pelo menos 30 inimigos em um duelo, esta arma deixou um legado lendário."
 artifact.6001.t: "A Bandeira do Inimigo"
 artifact.6001.desc.commander: "Observo o campo de batalha, refletindo sobre como essa batalha será lembrada, e olho para os mortos que permanecem. Percebo um grupo de meus soldados se aproximando e eles se curvam educadamente diante de mim.\n\n"
 artifact.6001.desc: "A batalha de [combat_location.GetName] terminou em uma vitória surpreendente! Ouço ansiosamente o mensageiro enquanto ele lê o relatório do meu comandante, [friendly_commander.GetTitledFirstName|l], e depois me viro para os soldados diante de mim.\n\n"
 artifact.6001.desc.looting: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Encontramos o estandarte inimigo enquanto... 'limpávamos' o campo de batalha! Achamos que seria uma pena deixá-lo para trás; talvez queirais guardá-lo como troféu?"."
 artifact.6001.desc.killed_defender: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Nós encurralamos o restante dos inimigos enquanto eles faziam uma resistência valente. Deram a vida defendendo este estandarte"."
 artifact.6001.a: "Será uma ótima adição à minha coleção!"
 artifact.6001.b: "Coloque-a na pira de celebração. Não precisamos desse símbolo inútil."
 artifact.6001.toast: "Padrão perdido em [combat_location.GetNameNoTooltip]"
 artifact.7000.a.boil_skull: "[skull_boiler.GetFirstName] ferve o crânio de [skull_to_boil.GetFirstName] e o transforma em um [court_artifact|lE]"
 artifact_rival_skull: "O crânio [skull_to_boil.Custom('ES_DelDela')] [skull_to_boil.GetTitledFirstName|l], rival executad[skull_to_boil.Custom('ES_OA')] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstName|l]. Cozido e limpo por [skull_boiler.GetFirstName]. Foram gravadas em sua testa as palavras: "[skull_to_boil.Custom2('InsultNoun', ROOT.Char)|U] [skull_to_boil.Custom2('InsultAdjective', ROOT.Char)]"."
 artifact.7000.t: "Um Rival é para Sempre"
 artifact.7000.desc: "Ah, graças a [ROOT.Char.GetFaith.HighGodName] que [skull_to_boil.GetFirstName] morreu, e por ordem #EMP minha#!, nada menos!\n\nSentirei falta de seus patéticos choramingos em minhas masmorras... Talvez eu devesse guardar uma parte de [skull_to_boil.Custom('ES_ElElla')] para ter algo para insultar enquanto descanso em meu trono?"
 artifact.7000.a: "[skull_boiler.GetFirstNameNoTooltip], cozinhe e limpe o crânio de [skull_to_boil.GetFirstNamePossessiveNoTooltip] para mim. Agora."
 artifact.7000.b: "Não, #EMP estoy deseando#! esquecer completamente a existência de [skull_to_boil.GetFirstNameNoTooltip]!"
 artifact.4090.t: "Uma Relíquia em Mãos..."
 artifact.4090.desc.antiquarian: "Meu antiquari[antiquarian.Custom('ES_OA')] [antiquarian.GetTitledFirstName|l] se aproxima de mim com uma ideia. Se selarmos meu [that_artifact.GetName] no cabo da minha [this_artifact.GetName], sempre estarei mais perto de [ROOT.Char.GetFaith.HighGodName] quando o empunhar.\n\n“Seria como tocar literalmente um pedaço de [ROOT.Char.GetFaith.PositiveAfterLife] cada vez que segurásseis tal [this_artifact.GetName].” diz [antiquarian.GetTitledFirstNameNoTooltip|l] com o êxtase religioso brilhando em seu olhar."
 artifact.4090.desc: "Enquanto observava meu artefato [that_artifact.GetName] um dia, sou tomado pela inspiração. Se eu embutir a relíquia dentro do cabo do meu artefato [this_artifact.GetName], estaria sempre mais próximo de [ROOT.Char.GetFaith.HighGodName] quando a empunhasse."
 artifact.4090.a: "Eu estaria sempre próximo de [ROOT.Char.GetFaith.HighGodName]."
 artifact.4090.b: "Não seria apropriado."
 artifact.4090.a.tt: "Relíquia e Arma Combinadas"
 artifact_weapon_relic_desc: "[this_artifact.GetDesc]\n\n[that_artifact.GetNameNoTooltip|U], uma relíquia [ROOT.Char.GetFaith.GetAdjective], está incorporada no cabo."
 relic_weapon_name: "[this_artifact.GetType|U] de [ROOT.Char.Custom('artifact_relic_desc')]"
 embedded_not_destroyed_tooltip: "[that_artifact.GetName] está incorporado ao meu [this_artifact.GetName]"
 relic_name_afterlife: "[ROOT.Char.GetFaith.PositiveAfterLife|U]"
 relic_name_highgod: "[ROOT.Char.GetFaith.HighGodName]"
 relic_name_highgod_alternate: "[ROOT.Char.GetFaith.HighGodNameAlternate]"
 relic_name_health: "[ROOT.Char.GetFaith.HealthGodName]"
 relic_name_symbol: "the [ROOT.Char.GetFaith.ReligiousSymbol|U]"
 relic_name_text: "the [ROOT.Char.GetFaith.ReligiousText|U]"
