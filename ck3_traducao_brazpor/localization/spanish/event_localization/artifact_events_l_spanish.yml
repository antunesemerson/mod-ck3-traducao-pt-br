 artifact_seized_in_siege: "Apreendi [SAISE_artifact.GetName] após o cerco de [SAISE_location.GetNameNoTooltip]"
 artifact_seized_in_raid: "Apreendi [SAISE_artifact.GetName] no meu saque a [SAISE_location.GetNameNoTooltip]"
