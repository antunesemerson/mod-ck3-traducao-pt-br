 artifact_damaged_in_siege: "Meu [DAIBE_artifact.GetName] sofreu [DAIBE_artifact.MakeScope.Var('DAIBE_damage').GetValue|V0] de dano no cerco de [DAIBE_location.GetNameNoTooltip]"
 artifact_damaged_in_duel: "Meu [DAIBE_artifact.GetName] sofreu [DAIBE_artifact.MakeScope.Var('DAIBE_damage').GetValue|V0] de dano no meu duelo com [DAIBE_opponent.GetShortUINameNoTooltip]"
