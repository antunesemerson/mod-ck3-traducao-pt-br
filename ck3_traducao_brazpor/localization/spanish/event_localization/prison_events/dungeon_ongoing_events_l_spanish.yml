l_spanish:
 dungeon_ongoing.0001.t: "Conversa incessante"
 dungeon_ongoing.0001.desc: "Eu não consigo ver quem é, nem exatamente onde eles estão, mas a única vez em que seus sussurros altos não ecoam pela masmorra úmida é quando eles estão gritando em vez disso."
 dungeon_ongoing.0001.a: "Se você ao menos parasse, até mesmo por um momento!"
 dungeon_ongoing.0001.b: "\"É a mim que você está falando, amigo?\""
 dungeon_ongoing.0002.t: "A espera"
 dungeon_ongoing.0002.desc: "É a passagem do tempo que realmente me afeta. Quem sabe quanto já se passou, ou quanto tempo mais minha estadia continuará? Podem ser horas... ou meses."
 dungeon_ongoing.0002.a: "Eu preciso sair daqui!"
 dungeon_ongoing.0002.b: "Eu posso esperar o tempo que for necessário."
 dungeon_ongoing.0003.t: "\"Silêncio!\""
 dungeon_ongoing.0003.desc: "Tenho importunado os guardas pelas barras, dizendo-lhes que precisam me deixar sair. A única resposta deles é um olhar ameaçador, um punho erguido e um rosnado de 'fique quieto.'"
 dungeon_ongoing.0003.a: "Apelos ao dever claramente não são o caminho para a saída."
 dungeon_ongoing.0003.b: "Você acha que pode me calar com ameaças?!"
 dungeon_ongoing.0004.t: "Infecção"
 dungeon_ongoing.0004.desc: "Eu pensei que o ferimento estava quase cicatrizado, mas agora começou a arder. Não consigo olhá-lo adequadamente na escuridão, mas parece estar inchado ao toque.\n\nNão consigo dizer se a umidade acompanhando a dor intensa é sangue, pus ou condensação do ar úmido."
 dungeon_ongoing.0004.a: "Por favor, eu preciso de ajuda..."
 dungeon_no_response_tooltip: "#F Parece que ninguém ouve seus apelos.#!"
 dungeon_ongoing.0005.t: "O fim do fogo"
 dungeon_ongoing.0005.desc: "A pele ao redor do meu ferimento está dura, como madeira úmida, mas a sensação de queimação passou. Parece que a infecção se foi."
 dungeon_ongoing.0005.a: "Obrigado, [ROOT.Char.GetFaith.HealthGodName]."
 dungeon_ongoing.0006.t: "Destino cruel"
 dungeon_ongoing.0006.desc: "Um frio constante, umidade perpétua e uma fome eterna devido a uma papa muito rala."
 dungeon_ongoing.0006.a: "[ROOT.Char.GetFaith.HighGodName], como eu poderia merecer algo assim?!"
 dungeon_ongoing.0006.b: "Ah, poderia ter sido pior."
 dungeon_ongoing.0007.t: "Anseio por algo mais"
 dungeon_ongoing.0007.desc: "Sigo pres[ROOT.Char.Custom('ES_OA')] aqui embaixo enquanto o mundo lá fora segue em frente. Eu deveria estar lá fora, alçando-me aos céus, não enterrad[ROOT.Char.Custom('ES_OA')] debaixo da terra."
 dungeon_ongoing.0007.a: "Eu sou digno de muito mais do que isso!"
 dungeon_ongoing.0007.b: "Eu tenho que me concentrar na sobrevivência, e apenas na sobrevivência."
 dungeon_ongoing.0008.t: "A Passagem dos Dias"
 dungeon_ongoing.0008.desc: "Eu estive aqui embaixo para sempre. Já se passaram meses? Anos? Décadas? Meu exílio para a escuridão nunca acaba!"
 dungeon_ongoing.0008.a: "Já faz tanto tempo!"
 dungeon_ongoing.0009.t: "O Conforto de um Amigo"
 dungeon_ongoing.0009.desc: "Eu não sei como teria sobrevivido aqui embaixo sem o conforto que meu querido [ROOT.Char.Custom('prison_pet')] me proporciona.\n\nSempre que me sinto triste, ele está lá para me confortar, sempre que sinto vontade de desistir, ele me incentiva a continuar. Nunca conheci outro [ROOT.Char.Custom('prison_pet')] como ele!"
 dungeon_ongoing.0009.a: "Você é um adorável [ROOT.Char.Custom('prison_pet')], não é mesmo?"
 dungeon_ongoing.0010.t: "Minha Tábua de Salvação"
 dungeon_ongoing.0010.desc: "Talvez meu sepultamento não esteja gravado em pedra. Eu poderia escrever para [letter_recipient.Custom2('MyCharacterIntroduction', ROOT.Char)], implorando que me libere do meu destino de rocha talhada. Mas eu poderia entregar uma carta a [letter_recipient.GetCurrentLocation.GetNameNoTooltip] sob tantas miradas indiscretas?"
 dungeon_ongoing.0010.a: "Os próprios guardas irão me ajudar."
 dungeon_ongoing.0010.a.tt: "Devo persuadir os guardas de [imprisoner.GetShortUINameNoTooltip] para que entreguem minha carta."
 dungeon_ongoing.0010.a.success.t: "Minha carta é contrabandeada para fora"
 dungeon_ongoing.0010.a.success.desc: "[letter_recipient.Custom('ES_ElLa')|U] [letter_recipient.GetTitledFirstNameNoTooltip|l] pode negociar para que eu seja libertado da prisão"
 dungeon_ongoing.0010.a.failure.t: "Os guardas não são persuadidos"
 dungeon_ongoing.0010.b: "Uma carta é fácil de ser ignorada..."
 dungeon_ongoing.0010.b.tt: "Preciso fazer minha carta passar despercebida pelos guardas de [imprisoner.GetShortUINameNoTooltip]."
 dungeon_ongoing.0010.b.failure.t: "Os guardas confiscam minha carta"
 dungeon_ongoing.0010.c: "Não, devo permanecer cauteloso."
 dungeon_ongoing.0011.t: "Meu/minha [prisoner.Custom2('RelationToMeShort', ROOT.Char)] sepultad[prisoner.Custom('ES_OA')]"
 dungeon_ongoing.0011.desc: "Recebi uma carta [imprisoner.Custom('ES_DelDela')] mais improvável de [imprisoner.GetHerHim]s remetentes, [prisoner.Custom2('MyCharacterIntroduction', ROOT.Char)]. Ela me conta os detalhes mais horripilantes de seu cativeiro nas mãos de [imprisoner.Custom('ES_DelDela')] [imprisoner.GetTitledFirstName|l] e me implora que [prisoner.GetHerHim] o resgate imediatamente, pois teme morrer ali."
 dungeon_ongoing.0011.a: "Não pode ficar nem mais um momento naquele lugar!"
 dungeon_ongoing.0011.a.tt: "Suplicarei [imprisoner.Custom('ES_AlAla')] [imprisoner.GetTitledFirstNameNoTooltip|l] que liberte [prisoner.Custom('ES_AlAla')] [prisoner.GetTitledFirstNameNoTooltip|l]"
 dungeon_ongoing.0011.a.success.t: "[imprisoner.Custom('ES_ElLa')|U] [imprisoner.GetTitledFirstNameNoTooltip|l] atende ao meu pedido"
 dungeon_ongoing.0011.a.failure.t: "[imprisoner.Custom('ES_ElLa')|U] [imprisoner.GetTitledFirstNameNoTooltip|l] não liberta [prisoner.Custom('ES_AlAla')] [prisoner.GetTitledFirstNameNoTooltip|l]"
 dungeon_ongoing.0011.a_not_ai: "[imprisoner.Custom('ES_ElLa')|U] [imprisoner.GetTitledFirstNameNoTooltip|l] considerará se libertar [prisoner.Custom('ES_AlAla')] [prisoner.GetTitledFirstNameNoTooltip|l]"
 dungeon_ongoing.0011.b: "Bah, [prisoner.GetFirstNameNoTooltip] deve estar exagerando."
 dungeon_ongoing.0012.t: "Cartas Queimadas"
 dungeon_ongoing.0012.desc: "Os dias passam soporíferos diante de mim sem resposta de [letter_recipient.Custom2('MyCharacterIntroduction', ROOT.Char)]. Onde ele foi parar? Por que não respondeu? Quem me dera eu estivesse livre dessa espiral de pedra!"
 dungeon_ongoing.0012.a: "Talvez a carta tenha se perdido?"
 dungeon_ongoing.0012.b: "Sempre soube que [letter_recipient.Custom('ES_ElLa')] [letter_recipient.GetTitledFirstNameNoTooltip|l] era um pedaço de [letter_recipient.Custom2('InsultNoun', ROOT.Char)]."
 dungeon_ongoing.0013.t: "Família Enterrada Viva"
 dungeon_ongoing.0013.desc_intro: "Embora [prisoner.Custom2('MyCharacterIntroduction', ROOT.Char)] seja meu prisioneiro[prisoner.Custom('ES_OA')] legítim[prisoner.Custom('ES_OA')], evidentemente [letter_recipient.Custom('ES_ElLa')] [letter_recipient.GetTitledFirstName|l] não pode aceitar minha visão.\n\n"
 dungeon_ongoing.0013.desc_reasoning_compassionate: "\"Não vos comove ver um membro da casa [ROOT.Char.GetHouse.GetBaseName] estar encerrad[prisoner.Custom('ES_OA')] assim?\" — pergunta [letter_recipient.GetSheHe]. \"Olhem para além de suas transgressões e pensem no bem da casa, eu vos imploro.\""
 dungeon_ongoing.0013.desc_reasoning_other: ""Ficamos mais fracos diante das ameaças externas quando nos trancamos atrás de nossos próprios muros", protesta [letter_recipient.GetSheHe]. "Então, não libertaríeis [prisoner.Custom('ES_AlAla')] [prisoner.GetTitledFirstNameNoTooltip|l] pelo bem de [realm_title.GetNameNoTier]?"."
 dungeon_ongoing.0013.a: "[prisoner.Custom('ES_ElLa')|U] [prisoner.GetTitledFirstNameNoTooltip|l] sairá livre hoje."
 dungeon_ongoing.0013.b: "É meu prisioneir[prisoner.Custom('ES_OA')] legítim[prisoner.Custom('ES_OA')], dane-se a família."
 dungeon_ongoing.0014.t: "Ecos Vazios"
 dungeon_ongoing.0014.desc: "Os sussurros dos guardas chegam até mim. É evidente que [letter_recipient.Custom2('MyCharacterIntroduction', ROOT.Char)] leu minhas cartas e se aproximou da minha carcereir[imprisoner.Custom('ES_OA')], [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l]. Infelizmente, esse tipo de [imprisoner.Custom2('InsultNoun', ROOT.Char)] endureceu seu coração e afastou [letter_recipient.Custom('ES_AlAla')] [letter_recipient.GetTitledFirstName|l]. Não sou mais livre do que antes."
 dungeon_ongoing.0014.a: "Ao menos [letter_recipient.GetTitledFirstNameNoTooltip] ? [Select_CString( letter_recipient.IsFemale, 'uma boa', 'um bom' )] [ROOT.Char.Custom2('RelationToMeShort', letter_recipient)] para mim."
 dungeon_ongoing.0014.b: "Ninguém vai me ajudar?!"
 dungeon_ongoing.9001.t: "Interior"
 dungeon_ongoing.9001.desc: "Não me lembro da última vez que vi o sol, comi comida sólida ou toquei em algo sólido.\n\nÉ como se a umidade do ar tivesse se alojado nos meus pulmões.\n\nSe um dente me dói, só preciso arrancá-lo das minhas gengivas apodrecidas."
 dungeon_ongoing.9001.a: "É tão difícil se mover."
 dungeon_ongoing.9002.t: "Vazio"
 dungeon_ongoing.9002.desc: "A tosse nunca acaba. Já se passaram dias, e não tive uma hora de sono sem acordar com as mãos arrancando minha garganta.\n\nLamber os fios de água da parede não adianta mais."
 dungeon_ongoing.9002.a: "Eu só quero que isso acabe."
 dungeon_ongoing.9003.t: "Recordação"
 dungeon_ongoing.9003.desc: "Será que algum dia me deixarão sair daqui? Fui simplesmente preso, abandonado e esquecido?\n\nAlguém além do carcereiro sabe que estou aqui?\n\nSerá que ainda resta alguém que conheça meu nome?\n\nQue saiba quem eu era?"
 dungeon_ongoing.9003.a: "Mal consigo lembrar dos rostos deles..."
 dungeon_ongoing.9004.t: "Abandono"
 dungeon_ongoing.9004.desc: "Eu vou morrer aqui. Tenho certeza disso. Nunca mais sentirei o sol no meu rosto, ou ouvirei risadas sem um toque de desesperança."
 dungeon_ongoing.9004.a: "Este é todo o meu mundo."
 dungeon_ongoing.9005.t: "Perda Incompreensível"
 dungeon_ongoing.9005.desc: "Meu fiel companheiro, meu amigo mais precioso, minha tábua de salvação neste lugar sombrio...\n\nEnquanto embalo meu [ROOT.Char.Custom('prison_pet')] moribundo em meus braços, sou tomado pela desesperança da minha situação. Se até um ser tão puro quanto [dummy_gender.GetSheHe] deve morrer neste lugar, que chance eu tenho?"
 dungeon_ongoing.9005.a: "Voc? n?o pode me deixar sozinh[ROOT.Char.Custom('ES_OA')] aqui!"
