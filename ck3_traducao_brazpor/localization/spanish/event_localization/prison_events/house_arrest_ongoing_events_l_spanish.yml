l_spanish:
 house_arrest_ongoing.0001.t: "Metas e Sonhos"
 house_arrest_ongoing.0001.desc: "Cada dia que passo prisioneir[ROOT.Char.Custom('ES_OA')] de [prison_holder.GetTitledFirstName|l] é mais um dia em que meus planos cuidadosamente traçados escapam ainda mais do meu alcance.\n\nO verdadeiro castigo não é a reclusão física a que estou submetid[ROOT.Char.Custom('ES_OA')], e sim estar incapacitado[ROOT.Char.Custom('ES_OA')]!"
 house_arrest_ongoing.0001.a: "Fico pensando em que estado estão meus assuntos."
 house_arrest_ongoing.0001.b: "Estarei pront[ROOT.Char.Custom('ES_OA')] quando me libertarem. Preciso planejar!"
 house_arrest_ongoing.0002.t: "Julgamento equivocado"
 house_arrest_ongoing.0002.desc: "Quem [prison_holder.GetTitledFirstName] pensa que [prison_holder.GetSheHe] é?! Mantém-me aqui, pres[ROOT.Char.Custom('ES_OA')] como um animal, e ainda tem a audácia de chamar isso de justiça.\n\nComo se alguém além de [ROOT.Char.GetFaith.HighGodName] tivesse o direito de julgar #EMP mim#!."
 house_arrest_ongoing.0002.a: "Nunca fui tão insultado!"
 house_arrest_ongoing.0002.b: "Devo tentar manter a calma."
 house_arrest_ongoing.0003.t: "Dias solitários"
 house_arrest_ongoing.0003.desc_opening: "Passar meu tempo separado de todos aqueles que amo é uma punição cruel. Procuro qualquer fonte de conforto e companhia que consigo encontrar, mas são poucas."
 house_arrest_ongoing.0003.desc_friendly_prisoner: "\n\nA única coisa que me ajuda a aliviar os longos dias é minha conexão com [friendly_prisoner.GetTitledFirstName|l]."
 house_arrest_ongoing.0003.a: "Será que alguém poderia conversar comigo?!"
 house_arrest_ongoing.0003.b: "Eu ainda encontrarei alguém que esteja disposto a conversar comigo."
 house_arrest_ongoing.0003.c: "[friendly_prisoner.GetSheHe|U] é minha única fonte de amizade."
 house_arrest_ongoing.0003.d: "[friendly_prisoner.GetSheHe|U] é minha única fonte de conforto e amor."
 house_arrest_ongoing.0003.e: "[ROOT.Char.GetFirstNameNoTooltip] é minha única fonte de conforto e amor."
 house_arrest_ongoing.0004.t: "Aliviando meu tormento"
 house_arrest_ongoing.0004.desc1: "\"Eu sei o quanto você sente falta de seus livros e pergaminhos, então trouxe algo para você do mercado!\""
 house_arrest_ongoing.0004.desc2: "\"Eu sei o quanto você gosta de bolo, e o cozinheiro não estava prestando atenção, então...\""
 house_arrest_ongoing.0004.desc3: "\"Vi essa pulseira na cidade hoje e sabia que você iria adorar. Por favor, coloque-a!\""
 house_arrest_ongoing.0004.desc4: "\"Eu só consegui convencer os guardas até certo ponto, mas espero que um passeio pelos jardins eleve seu ânimo!\""
 house_arrest_ongoing.0004.desc: "\n\nMeu querid[friend_at_court.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend_at_court') )], [friend_at_court.GetTitledFirstName|l], está sempre pensando em mim e faz o possível para tornar meu castigo mais confortável."
 house_arrest_ongoing.0004.a: "Não sei o que eu teria feito sem [friend_at_court.Custom('ES_ElElla')]!"
 house_arrest_ongoing.0005.t: "Meu algoz pessoal"
 house_arrest_ongoing.0005.desc: ""Você deveria ter visto os mímicos no festival. Que espetáculo!"\n\nEstar pres[ROOT.Char.Custom('ES_OA')] aqui já é ruim o bastante, mas ter que suportar as zombarias do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('rival_at_court') )] [rival_at_court.GetTitledFirstNamePossessive] é demais. [rival_at_court.GetSheHe|U] faz de tudo para tornar minha vida o mais miserável possível, agora que fui reduzid[ROOT.Char.Custom('ES_OA')] a tão pouco."
 house_arrest_ongoing.0005.a: "Está funcionando, também!"
