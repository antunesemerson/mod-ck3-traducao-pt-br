l_spanish:
 prison.1001.t: "Verdade ou Tormento"
 prison.1001.start.desc: "Meu devaneio termina abruptamente quando a porta da cela é aberta de repente. A silhueta do guarda é familiar, mas [actor.GetWomanMan] atrás dele… Ai. Ai, não.\n\n"
 prison.1001.rack.desc: "[actor.GetTitledFirstName] me prende ao potro com um sorriso satisfeito nos lábios. \"Sei que você ouviu os outros. Os gritos, a quebra de ossos e tendões."
 prison.1001.whip.desc: "[actor.Custom('ES_ElLa')|U] [actor.GetTitledFirstName|l] gira o chicote na mão. \"Ah, o chicote pode parecer bem inocente, mas é capaz de separar a carne dos ossos tão bem quanto qualquer faca."
 prison.1001.rats.desc: "\"Esses ratos podem parecer dóceis,\" [actor.GetTitledFirstName|l] diz, apontando para um balde que emite sons de roedores. \"Mas se eles sentirem cheiro de fogo, vão roer alegremente #emp qualquer coisa#! para escapar."
 prison.1001.poetry.desc: "[actor.GetTitledFirstName] retira um longo, longo, #EMP longo#! pergaminho escondido embaixo do braço.\n\n\"Espero que não se importe se eu recitar alguns volumes dos meus... #EMP melhores#! poemas.\""
 prison.1001.my_secret.desc: "\"Você está escondendo algo, eu consigo perceber,\" diz [actor.GetTitledFirstName|l]. \"Me diga a verdade, ou então...\""
 prison.1001.anothers_secret.desc: "\"Você sabe algo sobre [reveal_secret_owner.Custom2('MyCharacterIntroductionNoComma' SCOPE.sC('actor'))],\" diz [actor.GetTitledFirstName|l]. \"Me conte tudo, ou então...\""
 prison.1001.a: "Eu vou te contar tudo, eu juro!"
 prison.1001.b: "…"
 prison.1002.rack.desc: "Por que complicar as coisas? Não há nada como o velho potro. Quando o carcereiro traz [recipient.Custom('ES_AlAla')] [recipient.GetTitledFirstName|l] para a sala, seus olhos se fixam imediatamente na grande estrutura de madeira."
 prison.1002.whip.desc: "Ah, o doce beijo do chicote! Pode parecer inocente, mas é capaz de separar a carne dos ossos tão bem quanto qualquer faca. A julgar pelo rosto [recipient.Custom('ES_DelDela')] [recipient.GetTitledFirstName|l], parece saber disso muito bem."
 prison.1002.rats.desc: "As ratas do balde podem parecer tímidas no começo, mas são capazes de roer alegremente o peito de um[recipient.Custom('ES_OA')] [recipient.GetWomanMan] quando algum calor é aplicado. Enquanto explico o conceito [exploitable_vassal.Custom('ES_AlAla')] [recipient.GetTitledFirstName|l], sua determinação se desfaz diante dos meus olhos."
 prison.1002.poetry.desc: "Quando alguém pode torcer palavras para prazer assim como eu, torcê-las para causar dano é algo simples.\n\nTirando o longo volume de poesia de debaixo do meu braço, eu o desenrolo, deixando o pergaminho bater no chão e rolar suavemente para trás, para fora da porta."
 prison.1002.anothers_secret.desc: "\n\n\"Não, não, eu… eu tenho informações! [reveal_secret_owner.GetFirstName] [secret_to_reveal.Custom('SecretDescriptionThirdPerson')]! Eu contarei tudo!\"."
 prison.1002.my_secret.desc: "\n\n\"Por favor, não! #EMP Por favor!#! Eu vou te contar qualquer coisa que você queira saber! Eu... Eu [secret_to_reveal.Custom('SecretDescriptionFirstPerson')]!\""
 prison.1002.a: "Interessante. Levem[recipient.Custom('ES_LoLa')] de volta para a cela."
 prison.1002.b: "Eu ainda não terminei com você #emp completamente#!..."
 prison.1003.t: "Tortura"
 prison.1003.rack.desc: "Por que complicar as coisas? Não há nada como o velho potro. O som dos ossos e tendões se rompendo é inesquecível. Mas não tanto quanto a dor que [recipient.GetTitledFirstName|l] está prestes a experimentar…"
 prison.1003.whip.desc: "Ah, o doce beijo do chicote! Pode parecer inocente, mas é capaz de separar a carne dos ossos como uma faca, uma verdade que [recipient.GetTitledFirstName|l] está prestes a experimentar. Dormirá de bruços durante bastante tempo…"
 prison.1003.rats.desc: "Estas ratas parecen retraídas, digo mientras ato el cubo a su pecho expuesto. Pero, cuando empiece a hacer calor aquí, harán lo que sea para escapar. Por suerte para ellas, tienen los dientes #emp muy#! afilados. [recipient.Custom('ES_ElElla')|U] me suplica piedad cuando voy a por los carbones encendidos."
 prison.1003.poetry.desc: "$prison.1002.poetry.desc$\n\nEntão, começo minha leitura."
 prison.1003.a: "Ah... Eu poderia ouvir os seus gritos por horas."
 prison.1003.b: "Era necessário."
 prison.1010.rack.desc: "[actor.GetTitledFirstName] me prende pessoalmente ao potro com um sorriso satisfeito nos lábios. Já ouvi os gritos, o som que ossos e tendões fazem quando se #emp rompen#!… Imploro por misericórdia, mas o sorriso de [actor.GetFirstNameNoTooltip] só aumenta."
 prison.1010.whip.desc: "[actor.GetTitledFirstName] gira o chicote em sua mão. \"Ah, o chicote parece inofensivo, mas pode separar carne de ossos tão bem quanto qualquer faca. Deixe-me demonstrar...\""
 prison.1010.rats.desc: "Esses ratos parecem tímidos, diz [actor.GetTitledFirstName|l] enquanto prende o balde ao meu peito exposto. Mas, quando começar a esquentar aqui, farão qualquer coisa para escapar. Felizmente para elas, os dentes são #emp muito#! afiados."
 prison.1010.poetry.desc: "$prison.1001.poetry.desc$\n\nE começa."
 prison.1010.a: "Por favor, não, eu...! #emp Aaaaaaaah!#!"
 prison.1020.t: "Cegado"
 prison.1020.start.desc: "O carcereiro arrasta meu [ROOT.Char.Custom('GetRoom')] a um[recipient.Custom('ES_XA')] aterrorizad[recipient.Custom('ES_OA')] [recipient.GetTitledFirstName|l]. \"Por favor! Farei qualquer coisa, tudo o que quiser!\". Seus protestos são interrompidos bruscamente quando o carcereiro [recipient.Custom('ES_LoLa')] amordaça e o amarra à mesa.\n\n"
 prison.1020.cruel.desc: "\"Ah, [recipient.GetFirstNameNoTooltip],\" suspiro teatralmente. \"Você e eu nunca concordamos completamente. Mas pelo lado positivo, finalmente decidi como corrigir a situação.\""
 prison.1020.compassionate.desc: "\"Isso pode parecer bárbaro\", digo enquanto o/a médico[physician.Custom('ES_XA')] prepara as ferramentas, \"mas isso é pela estabilidade do reino. Confie em mim — não tenho prazer algum no seu sofrimento\"."
 prison.1020.compassionate.landless.desc: "\"Isto pode parecer desumano\", digo enquanto o/a médic[physician.Custom('ES_OA')] prepara as ferramentas, \"mas é para o melhor. Acredite em mim — não sinto nenhum prazer no seu sofrimento\"."
 prison.1020.child.desc: "\"Isto vai fazer tudo parecer melhor\", diz minha medic[physician.Custom('ES_XA')] enquanto oferece [recipient.Custom('ES_AlAla')] [recipient.GetTitledFirstName|l] o sedativo. Sua mãozinha treme, mas ele bebe mesmo assim.\n\nQuando [recipient.Custom('GirlBoy')] está dormind[recipient.Custom('ES_OA')], minha medic[physician.Custom('ES_XA')] me lança um olhar longo. \"Tem certeza disso, minha [actor.Custom('ES_OA')] de isso, minha [actor.GetLadyLord]?\"."
 prison.1020.a: "Oh, sim, isso #emp vai#! doer."
 prison.1020.b: "Eu tenho meus motivos."
 prison.1021.start.desc: "Estou silenciosamente contemplando meu destino quando o carcereiro de repente arromba a porta e me arrasta para fora da cela. Lá, no corredor sombrio, [actor.GetTitledFirstName|l] espera.\n\n"
 prison.1021.landless_start.desc: "Eu reflito silenciosamente sobre meu destino quando o carcereiro entra de repente e me tira da minha cela. De súbito, fico cara a cara com [actor.Custom('ES_ElLa')] [actor.GetTitledFirstName|l].\n\n"
 prison.1021.cruel.desc: "O olhar satisfeito no seu rosto me arrepia.\n\n\"Não se preocupe. Não vim por sua cabeça — seus olhos servirão perfeitamente.\""
 prison.1021.compassionate.desc: "«[recipient.GetFirstNameNoTooltip], você deve saber que isso não me dá prazer. Sou obrigado a cegá-lo pela estabilidade do reino»."
 prison.1021.child.desc: "\"Isso vai fazer você se sentir melhor\", diz o/a médic[physician.Custom('ES_XA')] enquanto me oferece uma pequena garrafa de vidro. Este é um lugar ruim, com pessoas ruins, mas os olhos [physician.Custom('ES_DelDela')] médic[physician.Custom('ES_XA')] são… agradáveis. Com a mão trêmula, levo a garrafa aos lábios."
 prison.1021.a: "¿Los… los ojos? ¡Soltadme! #EMP ¡Nooo!#!"
 prison.1021.b: "Eu... eu me sinto estranho..."
 prison.1025.t: "Castrado"
 prison.1025.cruel.desc: "\"Ah, [recipient.GetFirstNameNoTooltip],\" suspiro teatralmente. \"Não se preocupe. Não estou aqui para levar sua cabeça — ou qualquer outra coisa de valor. Sua virilidade será perfeita.\""
 prison.1026.cruel.desc: "O olhar satisfeito no seu rosto me arrepia.\n\n\"Não se preocupe. Não vim por sua cabeça — ou qualquer outra coisa de valor. Sua virilidade será perfeita.\""
 prison.1026.compassionate.desc: "\"[recipient.GetFirstNameNoTooltip], quero que você saiba que não sinto prazer com isso. Sou obrigado a castrá-lo. Pela estabilidade do reino.\""
 prison.1026.a: "O quê...? Me deixem ir! #emp Nããão!#!"
 prison.1030.t: "Desfigurado"
 prison.1030.cruel.desc: "\"Bem, [recipient.GetFirstNameNoTooltip],\" suspiro dramaticamente. \"Parece que chegou a hora do exterior da sua morada mortal refletir a feiura interior.\""
 prison.1031.cruel.desc: "Seu olhar satisfeito me dá arrepios.\n\n\"Não tema. Não quero #EMP toda#! sua cabeça; uma pequena parte dela me bastará…\"."
 prison.1031.a: "Meu... meu nariz? Me deixe ir! #EMP Nãooo!#!"
 prison.1041.t: "Mutilado"
 prison.1041.cruel.desc: "\"Algo que sempre admirei em você, [recipient.GetFirstName]\", eu sorrio de canto, \"é a sua capacidade de tirar o máximo de circunstâncias adversas. Você sempre parece fazer mais com menos — até alguns quilos a menos...\""
 prison.1041.compassionate.desc: "«[recipient.GetFirstNameNoTooltip], você deve saber que isso não me dá prazer. Sou obrigado a mutilá-lo pela estabilidade do reino»."
 prison.1042.cruel.desc: "A expressão satisfeita no rosto me provoca arrepio na espinha.\n\n\"Algo que sempre admirei em você, [recipient.GetFirstName]\", ele sorri de lado, \"é a sua capacidade de tirar o máximo proveito das circunstâncias mais adversas. Você sempre parece fazer mais com menos — até alguns quilos a menos…\"."
 prison.1041.a: "Meus... meus membros? Não, você não pode, #EMP você não pode!#!"
 prison.9001.t: "Liberdade!"
 prison.9001.desc_1: "Passei muitos dias planejando minha fuga, pensando na melhor estratégia e rota de escape. Mas tudo isso se torna em nada quando um dia o guarda simplesmente esquece de trancar a cela, cambaleando para longe sem olhar para trás."
 prison.9001.desc_2: "Uma palavra gentil aqui, um elogio sincero ali… Em seguida, o guarda me vê com uma familiaridade calorosa em vez da suspeita inicial que abrigava. Quando peço um pouco de ar fresco, ele nem sequer questiona, e eu o deixo de bruços em uma vala."
 prison.9001.desc_3_opening: "Um momento de distração, foi tudo que precisei para pegar o molho de chaves do cinto do guarda e escondê-lo atrás das minhas costas."
 prison.9001.desc_3_house_arrest: "Quando a escuridão cai, eu abro lentamente minha porta, gemendo com o rangido."
 prison.9001.desc_3: "Quando a escuridão cai, eu me afasto lentamente da minha cela, gemendo com o rangido."
 prison.9001.desc_4: "Examino cada cent?metro da cela. Inspeciono cada dobradi?a, apalpo cada barra e investigo cada corrente. Quando a escurid?o cai novamente, finalmente encontro o que estava procurando: uma pedra solta! Depois disso, ? r?pido alargar o buraco e transform?-lo em um t?nel."
 prison.9001.desc_5: "Eu espreito o lugar, cada porta tão familiar quanto um velho amigo, e espero o meu momento. Sei quem vai aonde e quando. Sei quem chama servos específicos e conheço o caminho mais rápido para sair daqui. Quando a escuridão cai, simplesmente espero o momento perfeito e me deslizo como uma sombra."
 prison.9001.desc_6: "Espero até a escuridão cair e, assim que tenho certeza[ROOT.Char.Custom('ES_OA')] de que não há ninguém por perto, agarro uma barra em cada mão e #EMP me agacho#!. O suor me cai nos olhos e minha respiração ofegante ecoa na escuridão, mas logo tenho um buraco grande o bastante para passar por ele."
 prison.9001.desc_7: "Assim que o guarda sai, me lanço sobre a fechadura. Ela é velha e enferrujada, e tudo que tenho é um pequeno prego que encontrei no canto, mas isso não vai me deter. Um leve giro, um empurrãozinho, e – #EMP pronto!#!"
 prison.9001.desc_8: "Sorrio enquanto o guarda tenta conter um bocejo. Já mantenho a discussão por horas e agora lanço o assunto de [ROOT.Char.Custom('subject_of_interest')] sem ceder. Logo ele está balançando a cabeça na cadeira, e então é fácil pegar as chaves dele."
 prison.9001.desc_9: "Muitos dias de olhares maliciosos, gestos insinuantes e convites finalmente deram frutos. Quando meu guarda se aproxima de mim e desata com uma das mãos sua [dummy_gender.Custom('GetUpperClothingArticle')]. Eu sorrio. Desmaiar no auge do êxtase é indolor, e me certifico de não causar dano excessivo."
 prison.9001.desc_ending_1: "\n\nQuando desapareço no/a [imprisoner.Custom('TerrainType')] que cerca o/a [imprisoner.Custom('ResidenceBuilding')] de [imprisoner.GetTitledFirstName|l] finalmente me atrevo a ter esperança."
 prison.9001.desc_ending_2: "\n\nÀ medida que desapareço na noite, quando estou longe de tudo, inclino a cabeça para trás e dou risada."
 prison.9001.a: "Estou livre!"
 prison.9002.desc_opening: "Tudo o que eu preciso é um momento de atenção enfraquecida"
 prison.9002.desc_rat: "… libero minha rata, que se abre caminho pelo chão até o banquinho onde o guarda está descansando, direto para as chaves"
 prison.9002.desc_stone: "… me esgueiro por trás do guarda e #EMP estampo#! minha pedra na parte de trás do capacete dele. Quando o guarda cai no chão, eu o revisto rapidamente em busca das chaves"
 prison.9002.desc_spoon: "e enfio a colher na fechadura. Depois de muito torcer e retorcer, a fechadura cede com um #EMP chasquido#! audível!"
 prison.9002.desc_cockroach: "… solto minha barata, e ela dispara sob os pés do guarda, que se sobressalta com força suficiente para bater o crânio no chão"
 prison.9002.desc_end: "e meu fiel [ROOT.Char.Custom('prison_pet')] e eu logo desaparecemos no [imprisoner.Custom('TerrainType')] que rodeia o [imprisoner.Custom('ResidenceBuilding')] de [imprisoner.GetTitledFirstName|l]."
 prison.9002.a: "Estamos livres, [ROOT.Char.Custom('prison_pet')]!"
 prison.9003.desc: "Assim que os guardas de [imprisoner.GetTitledFirstName|l] nos dão as costas para minha companheir[prison_friend.Custom('ES_OA')] [prison_friend.GetTitledFirstName|l] e para mim, atacamos.\n\nTantos dias preso me deixaram fraco, porém, quando o guarda me acerta o estômago com o punho revestido de ferro, logo me vejo dominad[ROOT.Char.Custom('ES_OA')] e imobilizad[ROOT.Char.Custom('ES_OA')]. O guarda se prepara para o golpe final, mas vejo [prison_friend.GetTitledFirstNameNoTooltip|l] sobre nós, segurando a própria faca do guarda… e logo voltamos a nos mover.\n\nAo sairmos para a noite, apoiados um no outro, rimos."
 prison.9003.a: "Estamos livres!"
 prison.9499.t: "Escapado!"
 prison.9499.desc_house_arrest: "Meu/Minha prisioneir[escapee.Custom('ES_OA')], [escapee.GetTitledFirstName|l], escapou de sua pris?o!"
 prison.9499.desc_dungeon: "Meu/Minha prisioneir[escapee.Custom('ES_OA')], [escapee.Custom('ES_ElLa')] [escapee.GetTitledFirstName|l], escapou!"
 prison.9499.desc_ending: "\n\nOs guardas não têm nada a dizer em sua defesa, mas o estrago já está feito mesmo assim."
 prison.9499.a: "Maldit[escapee.Custom('ES_OA')] te amaldiçoe, [escapee.GetFirstNameNoTooltip]!"
 prison.9501.t: "Correntes Inquebráveis"
 prison.9501.desc: "Quando o guarda se distrai por um instante, estendo a mão para as chaves que pendem de seu cinto, mas uma mão firme me impede no meio do caminho.\n\n«Ah, não, não. Ninguém escapa daqui, #EMP mi [ROOT.Char.GetTitleAsNameNoTooltip|l]#!». O guarda me lança um olhar de desprezo e ri…\n\n«Você achava que a papa que te dávamos era ruim?».\n\n«Espere só para ver»."
 prison.9501.a: "Eu vou apodrecer aqui..."
 prison.9502.t: "Meu Bravo [ROOT.Char.Custom('prison_pet')|U]"
 prison.9502.desc_opening: "Quando o guarda se vira, agarro meu [ROOT.Char.Custom('prison_pet')] e o arremesso na cabeça.\n\n"
 prison.9502.desc_rat: "Ele se agita, tentando encontrar apoio, mas o guarda rapidamente o pega e o joga no chão.\n\nMeus gritos de protesto quase são abafados pelo grito agonizado enquanto o guarda impiedosamente pisa com o calcanhar [dummy_gender.GetHerHim]."
 prison.9502.desc_stone: "Rebate com força no capacete do guarda, mas ele apenas se vira, com as sobrancelhas erguidas de surpresa.\n\nAo ver a pedra, ele a joga para longe com um sorriso de escárnio."
 prison.9502.desc_spoon: "Ele quica no capacete do guarda, e mal parece notar.\n\nQuando se vira e vê a colher fora de lugar, ele a pega e a enfia no próprio cinto."
 prison.9502.desc_cockroach: "Ele se esforça para encontrar apoio, mas o movimento deve ter alertado o guarda, pois sua mão se ergue e ele esmaga impiedosamente minha amada barata no chão, com um sorriso de nojo."
 prison.9502.a: "Não!! Meu [ROOT.Char.Custom('prison_pet')]!"
 prison.9503.t: "Traição"
 prison.9503.desc: "Meu companheir[prison_friend.Custom('ES_OA')] de prisão, [prison_friend.Custom('ES_ElLa')] [prison_friend.GetTitledFirstName|l], e eu passamos várias noites planejando nossa fuga.\n\nEnquanto eu faço um escarcéu, [prison_friend.GetSheHe] fica perto da porta. O guarda a abre e eu sorrio. [prison_friend.GetFirstNameNoTooltip] ataca por trás e… a porta se fecha atrás do guarda. [prison_friend.Custom('ES_ElLa')|U] [prison_friend.GetTitledFirstNameNoTooltip|l] desaparece na noite, sem ser contestad@, enquanto todos os guardas convergem sobre mim."
 prison.9503.a: "Bem, ao menos [prison_friend.Custom('ES_ElElla')] saiu..."
 prison.9503.b: "[prison_friend.Custom('ES_EA')] [prison_friend.Custom2('InsultNoun', ROOT.Char)] [prison_friend.Custom2('InsultAdjective', ROOT.Char)] me traiçoei!"
 prison.9504.t: "Meu Companheiro de Cela"
 prison.9504.desc: "Passei muitas horas planejando minha fuga. Enquanto me esgueiro em plena noite, não consigo evitar um sorriso. Isso pode dar certo! O guarda está neutralizado, o caminho…\n\n\"[ROOT.Char.GetFirstNameNoTooltip] está escapando! Guardas! #EMP Guardias!#!\". A voz estridente do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('prison_rival'))], [prison_rival.Custom('ES_ElLa')] [prison_rival.GetTitledFirstName|l], rompe o silêncio e logo me vejo cercad[ROOT.Char.Custom('ES_OA')] por guardas armados e enfurecidos."
 prison.9504.a: "Maldit[prison_rival.Custom('ES_OA')] seja, [prison_rival.GetFirstNameNoTooltip]!"
 prison.9505.t: "Empurrando Limites"
 prison.9505.opening: "Fica claro para mim que devo assumir meu destino com minhas próprias mãos… e também que nem todas as partes da [bg_override_char.Custom('GetDungeon')|l] estão igualmente vigiadas."
 prison.9505.tumble: "\n\nDepois de uma queda terrível de uma saliência na parede, eu gostaria que estivesse, no entanto. Levou uma hora até alguém me encontrar e me ajudar até meus aposentos, onde um curandeiro foi chamado."
 prison.9505.tunnels: "\n\nLogo descobri, no entanto, que os túneis sob as paredes são escuros e confusos. Foi só depois de várias batidas e pedras atingindo minha cabeça que consegui encontrar o caminho para fora, de volta ao pátio."
 prison.9505.camp: "\n\nLogo descubro, no entanto, que estou no centro de um labirinto de tendas, repleto de braseiros, soldados entediados e perigos de tropeço. Jogado no chão por uma corda traiçoeira de tenda, aceito que não havia saída, enquanto os guardas me trancam."
 prison.9505.a: "Eu estou... Eu ainda estou vivo...!"
