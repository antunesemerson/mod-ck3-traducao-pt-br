 harm.2021.c: "Eu. Não vou. Terminar."
 harm.2021.c.tt.success: "$harm.0000.tt.death.success$"
 harm.2021.c.tt.failure: "$harm.0000.tt.death.failure$"
 harm.2031.t: "Tão... Quente..."
 harm.2031.desc: "O sol sempre foi tão brilhante? Tão quente? Tão opressivo?\n\nNem sequer sei há quanto tempo estamos nesta terra abandonada por [ROOT.Char.GetFaith.HealthGodName], sem acesso fácil a água boa e obrigados a continuar marchando.\n\nA campanha exige que continuemos, mas cada dia nos rouba um pouco mais de força. Um pouco mais, suado e caído sobre a terra sempre sedenta. Um pouco mais de nós se perde para sempre nesse calor sem sentido.\n\nTodos e cada um dos dias."
 harm.2031.a: "A tirania da luz e da sede nos desfaz..."
 harm.2031.a.tt.success: "$harm.0000.tt.death.success$"
 harm.2031.a.tt.failure: "$harm.0000.tt.death.failure$"
 harm.2031.b: "Eu. Tenho. Um destino. Maior."
 harm.2031.c: "Não sou a marionete [ROOT.Char.GetFaith.DeathDeityNamePossessive]."
 harm.2031.c.tt.success: "$harm.0000.tt.death.success$"
 harm.2031.c.tt.failure: "$harm.0000.tt.death.failure$"
 harm.2041.t: "Pelo Reino"
 harm.2041.desc: "Até eu já perdi a conta de quantos anos estamos em guerra. A campanha é dura para todos nós, tirando um pouco mais de nós a cada dia e oferecendo apenas um breve alívio com cada acampamento noturno.\n\nAo voltar para minha tenda depois de discutir com o intendente, encontro o lugar estranhamente vazio. Nem guardas cansados, nem mercenários amargurados, nem recrutas com saudade de casa. Vazio, isto é, até meia dúzia de soldados armados e de cota de malha saírem das sombras e me cercarem por todos os lados.\n\n"[ROOT.Char.GetTitledFirstNameNoTooltip|l]", cospe o líder rebelde, "vossas guerras imprudentes nos custaram caro demais. Pela primeira vez, #EMP vos#! pagareis o preço"."
 harm.2041.a: "Traidores! TRAIDORES!"
 harm.2041.a.tt.success: "$harm.0000.tt.death.success$"
 harm.2041.a.tt.failure: "$harm.0000.tt.death.failure$"
 harm.2041.b: "Apenas seis? Venham, covardes!"
 harm.2041.c: "#BER EU VOU FAZER VOCÊS SANGRAREM POR ISSO!#!"
 harm.2041.c.tt.success: "$harm.0000.tt.death.success$"
 harm.2041.c.tt.failure: "$harm.0000.tt.death.failure$"
 harm.2051.t: "Fome"
 harm.2051.desc: "Poucas coisas são mais destrutivas para um exército do que a fome — não há escudo que a detenha, nem espada que a afaste, nem cota de malha que atenue suas dores.\n\nSem comida, sem água, sem nada para nos manter em movimento, exceto os animais de carga que impulsionam nosso avanço, minhas tropas vão lentamente parando.\n\nAté... até eu... estou murchando sem sustento..."
 harm.2051.a: "Minha pele... como papel..."
 harm.2051.a.tt.success: "$harm.0000.tt.death.success$"
 harm.2051.a.tt.failure: "$harm.0000.tt.death.failure$"
 harm.2051.b: "A situação ainda é recuperável."
 harm.2051.c: "Temos reservas, nós #EMP precisamos#! ter reservas!"
 harm.2051.c.tt.success: "$harm.0000.tt.death.success$"
 harm.2051.c.tt.failure: "$harm.0000.tt.death.failure$"
 harm.2061.t: "Perseguido a Cada Passo"
 harm.2061.desc: "Com meu exército fugindo do campo em [ROOT.Char.GetCurrentLocation.GetName], grupos de tropas travam escaramuças, correm ou se perseguem por léguas em todas as direções. Minha comitiva está dispersa, meus guardas mortos ou em fuga, e eu me disperso com eles.\n\nSe ao menos pudéssemos nos reagrupar, se ao menos pudéssemos…\n\nContorno uma grande rocha e dou de cara com um bando de soldados usando a libré do inimigo.\n\nRangendo os dentes, investem com um grito."
 harm.2061.a: "Afaste-se de mim, seus bastardos!"
 harm.2061.a.tt.success: "$harm.0000.tt.death.success$"
 harm.2061.a.tt.failure: "$harm.0000.tt.death.failure$"
 harm.2061.b: "FUJA!"
 harm.2061.c: "Tocai a trompa, [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] precisa de ajuda!"
 harm.2061.c.tt.success: "$harm.0000.tt.death.success$"
 harm.2061.c.tt.failure: "$harm.0000.tt.death.failure$"
 harm.2071.t: "Uma Vitória Desastrosa"
 harm.2071.desc: "Meu exército vitorioso varre o campo em [ROOT.Char.GetCurrentLocation.GetName]. Por toda parte, ouvem-se os gritos triunfantes das minhas tropas enquanto derrotamos o inimigo.\n\nAté mesmo meu séquito e eu nos entregamos a tão proveitosa carnificina, exultantes com nossa vitória. Nós nos dispersamos um pouco, sim, mas o inimigo está derrotado e não pode…\n\nOnde estão meus guardas? Os soldados ao meu redor… eles ostentam o estandarte de [actor.GetPrimaryTitle.GetNameNoTier]! Com ódio nos olhos e sangue nos dentes, os inimigos derrotados se lançam contra mim, prontos para dar cabo de mim."
 harm.2071.a: "Você ainda não vai me levar, [ROOT.Char.GetFaith.DeathDeityName]!"
 harm.2071.a.tt.success: "$harm.0000.tt.death.success$"
 harm.2071.a.tt.failure: "$harm.0000.tt.death.failure$"
 harm.2071.b: "FUJA!"
 harm.2071.c: "A mim! Reuni-vos [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!"
 harm.2071.c.tt.success: "$harm.0000.tt.death.success$"
 harm.2071.c.tt.failure: "$harm.0000.tt.death.failure$"
