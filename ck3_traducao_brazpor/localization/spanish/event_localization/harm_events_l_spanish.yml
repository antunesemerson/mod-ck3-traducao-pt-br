 harm.1111.desc: "Ao atravessar meu [ROOT.Char.Custom('GetCourt')|l], sempre me escoltam guardas para minha proteção. E ainda mais guardas vigiam a entrada, sem falar da minha [ROOT.Char.Custom('GetChamber')|l]. Suficientes para deter qualquer intruso, mas aparentemente não o bastante para impedir que um maldito servo esbarre em mim e...

