l_spanish:
 ##################################################
 ##Misc Keys
 aging_gracefully_modifier: "Envelhecendo com Graça"
 aging_gracefully_modifier_desc: "Este personagem está começando a declinar, mas o passar do tempo parece pesar um pouco menos sobre ele do que sobre a maioria."
 thick_skulled_modifier: "Cabeça Dura"
 thick_skulled_modifier_desc: "Aparentemente, a cabeça deste personagem pode resistir a muitos golpes."
 strong_willed_modifier: "Determinação Forte"
 strong_willed_modifier_desc: "Este personagem está acostumado a superar até mesmo a dor mais intensa."
 harm.0000.tt.spared_for_now: "Você foi poupado. Por enquanto."
 harm.0000.tt.no_permanent_damage: "Você não sofre danos permanentes."
 harm.0000.tt.physician: "#EMP [ROOT.Char.Custom('GetRandomCourtMedic')|U]! [medic.GetFirstNameNoTooltip]!#!"
 harm.0000.tt.incapable.success: "Você não fica permanentemente ferido"
 harm.0000.tt.incapable.failure: "A experiência deixa você enfraquecido"
 harm.0000.tt.death.success: "Você sobrevive"
 harm.0000.tt.death.failure: "Você perece"
 ##################################################
 ##Responsive Incapability Events
 harm.0001.t.pre_title: "Enfraquecendo com a Idade"
 harm.0001.t: "$harm.0001.t.pre_title$: Enfraquecido"
 harm.0001.desc: "Acordo tossindo e cuspindo, com a mente enevoada e a cabeça latejando. Quase vomitando, tento me erguer da cama, mas meu apoio na estrutura é fraco, frágil como o de um recém-nascido.

Com um grande esforço, levanto-me e cambaleio até a bacia. Por [ROOT.Char.GetFaith.HealthGodName], de onde vem essa fraqueza? Eu... eu me sinto tão doente.

A água fria mal consegue me refrescar. Com os olhos turvos, encaro fixamente o reflexo sombrio e embaçado no meu espelho de prata polida. [Select_CString( ROOT.Char.IsFemale, 'A mulher', 'O homem' )] que me encara parece muito, muito velh[ROOT.Char.Custom('ES_OA')]."
 harm.0001.a: "Você faz algumas mudanças necessárias"
 harm.0001.a.tt.success: "Nada impede o avanço do tempo"
 harm.0001.a.tt.failure: "Eu irei quando estiver pront[ROOT.Char.Custom('ES_OA')] e pront[ROOT.Char.Custom('ES_OA')][ROOT.Char.GetFaith.DeathDeityName], não antes."
 harm.0001.b: "Já não sou [ROOT.Char.Custom('ES_ElLa')] jovem como antes."
 harm.0001.b.tt.success: "O tempo é gentil com você"
 harm.0001.b.tt.failure: "Seu corpo adoece com a idade"
 harm.0001.c: "$harm.0001.t.pre_title$: Confuso"
 harm.0001.d: "Para onde eu ia? Por que entrei aqui? Eu jurava que..., certo. Estava procurando um... um... um negócio.\n\nEra urgente? Eu tinha que devolver para #EMP alguém#!. Rápido! Na semana que vem? Sim, acho que sim.\n\nAha! Aí está, era isso que eu queria, eu precisava disso para... para..."
 harm.0001.d.tt.success: "No que eu estava pensando mesmo?"
 harm.0001.d.tt.failure: "Sua mente não é tão rápida como antes..."
 harm.0002.t: "$harm.0001.t.pre_title$: Dolorido"
 harm.0002.desc: "Pela vontade de [ROOT.Char.GetFaith.HealthGodName], por que estou tão #EMP dolorido#!? Eu dormi bem, tão bem quanto costumo, mas quando me alongo, consigo sentir meus ossos faiscando enquanto raspam uns nos outros.\n\n"
 harm.0002.a: "Eu encaro minhas [ROOT.Char.Custom('HandHands')], observando atentamente as unhas. Amareladas pela idade, sobre uma pele que está enrugando mais do que eu gostaria."
 harm.0002.a.tt: "Eu passo minhas [ROOT.Char.Custom('HandHands')] sobre minha pele, sentindo a textura papelosa e o que parecem ser rugas excessivamente espessas entupindo minha casca."
 harm.0003.t: "É difícil imaginar que a juventude uma vez percorreu essa carne, quente e vital."
 harm.0003.desc.intro: "Argh, as articulações de todo mundo #EMP rangem#! assim?"
 harm.0003.desc.sighted: "Seu corpo está começando a desacelerar..."
 harm.0003.desc.blind: "Quebrado pela Batalha"
 harm.0003.desc.outro: "Com o conflito em [battle_location.GetName] terminado, os feridos e mutilados se afastam mancando do campo de batalha, enquanto os mortos mais notáveis são levados por amigos e serviçais.

Por minha parte, fui envolvid[ROOT.Char.Custom('ES_OA')] em alguns dos combates mais intensos, com pouca sutileza, apenas golpes, gritos e mortes. Minha cabeça ainda gira com os golpes e a adrenalina, as ondas de medo, raiva, exaltação e...

G-girando. Minha cabeça está girando. Minha visão embaça, depois duplica, e começo a tombar em direção a [ROOT.Char.Custom('GritType')].

"Chamem um [ROOT.Char.Custom('GetRandomBattlefieldMedic')], [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip|l] foi atingid[ROOT.Char.Custom('ES_OA')]!", gritam,"
 harm.0003.a: "e a última coisa que vejo é [medic.Custom('ES_AlAla')] [medic.GetTitledFirstName|l] abrindo caminho entre a multidão."
 harm.0003.a.tt: "mas ninguém responde. Ninguém mesmo."
 harm.0011.t: "Estou bem! E-eu estou bem..."
 harm.0011.desc.default_body: "Com o conflito em [battle_location.GetName] terminado, os feridos e mutilados se afastam mancando do campo de batalha, enquanto os mortos mais notáveis são levados por amigos e serviçais.

Por minha parte, fui envolvid[ROOT.Char.Custom('ES_OA')] em alguns dos combates mais intensos, com pouca sutileza, apenas golpes, gritos e mortes. Minha cabeça ainda gira com os golpes e a adrenalina, as ondas de medo, raiva, exaltação e...

G-girando. Minha cabeça está girando. Minha visão embaça, depois duplica, e começo a tombar em direção a [ROOT.Char.Custom('GritType')].

"Os melhores esforços de [medic.GetFirstName] não foram suficientes"
 harm.0011.desc.medic_present: "e a última coisa que vejo é [medic.Custom('ES_AlAla')] [medic.GetTitledFirstName|l] abrindo caminho entre a multidão."
 harm.0011.desc.no_medic: "mas ninguém responde. Ninguém mesmo."
 harm.0011.a: "Pecados da Família"
 harm.0011.a.tt.success: "$harm.0501.t.prefix$: O Melhor da Raça"
 harm.0011.a.tt.success.bone: "Meu ser inteiro está em chamas, é como se minha alma tivesse se incendiado e estivesse queimando por dentro. Para onde eu ia... por que estou aqui? Por que #EMP dói#! tanto?

Nervo a nervo, a agonia ardente se espalha por toda a minha miserável forma, golpeando aqui e ali em ondas antes de recuar. Estou tão quente e, ao mesmo tempo, tão frio; sou acometido por dores lancinantes e faiscantes.

Em um único e abrasador momento de clareza, a origem da minha aflição se torna evidente. Meu corpo sofre os defeitos da minha linhagem."
 harm.0011.a.tt.success.brain: "Onde... onde estou?"
 harm.0011.a.tt.failure: "$harm.0000.tt.incapable.success$"
 harm.0011.b: "$harm.0000.tt.incapable.failure$"
 harm.0011.b.tt.success: "Eu posso #EMP me controlar#!."
 harm.0011.b.tt.failure: "Minha mente está mais afiada do que isso."
 ##################################################
 ##Random Incapability Events
 harm.0501.t.prefix: "$harm.0501.t.prefix$: Estrelas Cadentes"
 harm.0501.t: "Ao atravessar meu [ROOT.Char.Custom('GetCourtyard')] às pressas para cumprir uma tarefa banal, sinto uma dor súbita e lancinante na perna, depois outra no braço. Minha… minha mão está tremendo? Por que minha cabeça está latejando? Onde…?\n\nPor um breve instante, tropeço, quase caindo no chão. Então me recomponho e sigo em frente.\n\nEu… eu não sei o que foi aquilo."
 harm.0501.desc: "Meu ser inteiro está em chamas, é como se minha alma tivesse se incendiado e estivesse queimando por dentro. Para onde eu ia... por que estou aqui? Por que #EMP dói#! tanto?

Nervo a nervo, a agonia ardente se espalha por toda a minha miserável forma, golpeando aqui e ali em ondas antes de recuar. Estou tão quente e, ao mesmo tempo, tão frio; sou acometido por dores lancinantes e faiscantes.

Em um único e abrasador momento de clareza, a origem da minha aflição se torna evidente. Meu corpo sofre os defeitos da minha linhagem."
 harm.0501.a: "Espera, n-!"
 harm.0501.a.tt.success: "$harm.0000.tt.incapable.success$"
 harm.0501.a.tt.failure: "$harm.0000.tt.incapable.failure$"
 harm.0501.b: "Agache e role."
 harm.0501.c: "Aguente no ombro."
 harm.0501.c.tt.success: "$harm.0000.tt.incapable.success$"
 harm.0501.c.tt.failure: "$harm.0000.tt.incapable.failure$"
 harm.0502.t: "$harm.0511.t.prefix$: Quase"
 harm.0502.desc: "Cavalgar pelas terras selvagens perto de [ROOT.Char.GetCurrentLocation.GetName] é uma parte simples e prazerosa da vida como [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]. Algo para desfrutar, em solidão ou com meu séquito, quando o dia a dia da liderança se torna pesado demais.\n\nAbsorv[ROOT.Char.Custom('ES_OA')] em meus pensamentos, quase não percebo quando minha montaria avista algum pequeno réptil ameaçador e dispara em um salto. Rapidamente, seguro as rédeas com mais firmeza e a acalmo.\n\nA cavalgada continua."
 harm.0502.a: "Heh, não vou deixar #EMP que#! isso aconteça novamente."
 harm.0502.a.tt: "#WEAK Seu cavalo permanece inquieto pelo resto da cavalgada...#!"
 harm.0511.t.prefix: "Onda após Onda"
 harm.0511.t: "$harm.0521.t.prefix$: Gorgolejando e Agarrando"
 harm.0511.desc: "Eu sempre aprecio estar no mar. Mesmo em um dia agitado como hoje, ele tem uma beleza austera, uma sensação de fragilidade, de—"
 harm.0511.a: "O rio perto de [ROOT.Char.GetCurrentLocation.GetName] geralmente não está tão agitado, mas ainda estou aproveitando meu passeio. É reconfortante, ele—"
 harm.0511.a.tt.success: "As costas atormentadas pela tempestade de [ROOT.Char.GetCurrentLocation.GetName] às vezes são perigosas para viajar, mas ainda gosto de navegar por elas. Elas me fazem sentir—"
 harm.0511.a.tt.failure: "\n\nA embarcação dá um solavanco para o lado, e sou lançado à água. O impacto da queda tira o ar dos meus pulmões, e a mudança súbita de temperatura deixa meu corpo em estado de choque.\n\nQuando recobro os sentidos, tossindo e engasgando debaixo d'água, meu corpo e minha mente estão em chamas. Minha consciência já começa a se esvair de novo, meu cérebro sufocando e se apagando a cada segundo que passa."
 harm.0511.b: "Uma corda, uma rede, uma tábua, jogue algo para mim!"
 harm.0511.c: "Suas mãos se seguram em algo"
 harm.0511.c.tt.success: "Você fica debaixo d'água por muito tempo"
 harm.0511.c.tt.failure: "Nade em direção à superfície!"
 harm.0512.t: "Esta opção é desbloqueada pelas [traditions|lE] da sua [culture|lE]"
 harm.0512.desc: "Nade, #EMP nade#!!"
 harm.0512.a: "Você chega à superfície a tempo"
 harm.0512.a.tt: "Leva muito tempo"
 harm.0521.t.prefix: "$harm.0521.t.prefix$: Um Rosto de Calma"
 harm.0521.t: "Existe algo tão revigorante quanto o mar? O cheiro do sal, os chamados às vezes das gaivotas ao passar pela terra, o suave som da água batendo no casco."
 harm.0521.desc.sea: "O rio perto de [ROOT.Char.GetCurrentLocation.GetName] oferece uma maravilhosa fonte de transporte fácil, algo que ocasionalmente tive motivo para usar, como hoje.\n\nÉ revigorante, realmente. Ouvir os grunhidos e chamados dos remadores nos levando com a correnteza, observar a paisagem passar enquanto permaneço completamente imóvel."
 harm.0521.desc.river: "Raro é o ano em que #EMP não#! preciso usar transporte marítimo. Dada sua proximidade de [ROOT.Char.GetCurrentLocation.GetName], seria pura tolice não fazê-lo.

A viagem de hoje foi rápida; minha presença era necessária para resolver uma disputa sem importância, o que me permitiu desfrutar da sensação tranquila de ser levado de volta para casa e contemplar a costa sem nenhuma preocupação."
 harm.0521.desc.coastal: "

De pé no convés do barco, inclinad[ROOT.Char.Custom('ES_OA')] sobre a amurada, sinto-me tão em paz..."
 harm.0521.desc.outro: "A água é quase hipnótica..."
 harm.0521.a: "#WEAK Quase... hipnótica...#!"
 harm.0521.a.tt.success: "Problema Interno"
 harm.0521.a.tt.failure: "$harm.0531.t.prefix$: O Mundo Escorregando"
 harm.0521.b: "Sinto tanta… dormência. O que está… acontecendo…\n\nNão consigo ficar de pé. Não consigo me concentrar. Não consigo sentir. Só uma dor aguda e…\n\nSocorro.\n\nQue algo.\n\nAlguém.\n\nPor favor.\n\n#EMP Por favor#!."
 harm.0521.b.tt.unlocked_by_cultrad: "Minha mente está... em #EMP chamas#!..."
 harm.0521.c: "O vazio se dissipa"
 harm.0521.c.tt.success: "Você sucumbe a um derrame massivo"
 harm.0521.c.tt.failure: "Eu me conheço, e isso vai passar."
 harm.0522.t: "[ROOT.Char.GetFaith.HealthGodName], dê-me forças."
 harm.0522.desc.sea: "$harm.0531.a.tt.success$"
 harm.0522.desc.river: "$harm.0531.a.tt.failure$"
 harm.0522.desc.coastal: "Raro é o ano em que #EMP não#! preciso usar transporte marítimo. Dada sua proximidade de [ROOT.Char.GetCurrentLocation.GetName], seria pura tolice não fazê-lo.

A viagem de hoje foi rápida; minha presença era necessária para resolver uma disputa sem importância, o que me permitiu desfrutar da sensação tranquila de ser levado de volta para casa e contemplar a costa sem nenhuma preocupação."
 harm.0522.desc.outro: "

De pé no convés do barco, inclinad[ROOT.Char.Custom('ES_OA')] sobre a amurada, sinto-me tão em paz..."
 harm.0522.a: "…\n\nEu me pergunto. Eu me pergunto como teria sido a vida.\n\n…"
 harm.0522.a.tt: "Puxo as cobertas com mais força. Encolho ainda mais os membros. Cerco os dentes gelados contra o frio.\n\nEste inverno gélido e miserável parece sugar até a última gota de saúde do meu corpo, deixando-me como um triste pobretão que mal consegue tossir. Não sucumbirei.\n\nNão…"
 harm.0531.t.prefix: "…"
 harm.0531.t: "$harm.0000.tt.incapable.success$"
 harm.0531.desc: "O frio exerce sua maldade"
 harm.0531.a: "Já enfrentei coisas piores que isso."
 harm.0531.a.tt.success: "Não vou ser derrubado pelo #EMP gelo#!!"
 harm.0531.a.tt.failure: "$harm.0000.tt.incapable.success$"
 harm.0531.b: "$harm.0541.a.tt.failure$"
 harm.0531.c: "$harm.0541.t.prefix$: Congelad[ROOT.Char.Custom('ES_OA')] até os ossos"
 harm.0531.c.tt.success: "Meu pequeno mundo é tão estranho. O que é essa sensação? Por que não estou quente?\n\nNão era sempre assim, mas agora é. Eu não entendo. Eu tento gritar, chamar os cuidadores por ajuda, mas meus pulmões não produzem mais do que uma pequena tosse."
 harm.0531.c.tt.failure: "Não importa o quão apertado eu puxe as cobertas da noite ao meu redor, ainda sinto um frio muito, muito intenso. Esse amargo frio do inverno se agarra a mim como carne no osso, me envolvendo em seu abraço mordaz.\n\nAperto os olhos firmemente fechados — logo o amanhecer chegará, trazendo consigo a luz e a vida do sol e da lareira."
 harm.0532.t: "Eu gostaria tanto que estivesse mais quente..."
 harm.0532.desc: "#WEAK Um fogo... você precisa de outro fogo...#!"
 harm.0532.a: "Crescendo em Estatura"
 harm.0532.a.tt: "$harm.0551.t.prefix$: Um Baque e um Estalo"
 harm.0541.t.prefix: "Por [ROOT.Char.GetFaith.FateGodName], eu adoro explorar [ROOT.Char.GetCurrentLocation.GetName]! Se não fosse pelo meu caminho secreto pelas muralhas, eu nunca teria a oportunidade de passar um tempo longe dos meus guardiões implicantes, muito menos brincar sozinho assim.

Como eu teria sequer a chance de encontrar uma árvore tão grande quanto esta, quanto mais de subi-la? Aqueles intrometidos nunca me deixariam... nunca me deixariam...

É uma árvore bem alta, não é?"
 harm.0541.t: "Só... tenho que ter cuidado..."
 harm.0541.desc.baby: "Você consegue descer"
 harm.0541.desc.fallback: "Um Baque e um Estalo"
 harm.0541.a: "Ajuda. Ajuda! AJUDA!"
 harm.0541.a.tt.success: "Não parece #EMP tão#! alto..."
 harm.0541.a.tt.failure: "$harm.0551.a.tt.success$"
 harm.0541.b: "$harm.0551.a.tt.failure$"
 harm.0541.c: "$harm.0551.t.prefix$: O Caminho Secreto"
 harm.0541.c.tt.success: "Como [ROOT.Char.GetTitleAsNameNoTooltip|l], não tenho muito tempo para mim. Há cuidadores e guardas por toda parte, para me manter a salvo tanto de danos quanto de qualquer tipo de diversão.

Mas, enfim, consegui enganá-los! Foi preciso um pouco de audácia, mas eles não conhecem a rota além dos muros que #EMP eu#! conheço.

Não posso usá-la com muita frequência, mas quando o faço, [ROOT.Char.GetCurrentLocation.GetName] se estende diante de mim por inteiro. Liberdade."
 harm.0541.c.tt.failure: "Que divertido!"
 harm.0542.t: "#WEAK Certamente ninguém vai te encontrar assim...#!"
 harm.0542.desc.baby: "Não Mais Tão Jovem"
 harm.0542.desc.fallback: "$harm.0561.t.prefix$: A Descida"
 harm.0542.a: "Mais uma vez, me pego olhando para o lodaçal de lama e cordas de tendas, e me perguntando se preciso de um cuidador.\n\nDeveria ser simples. Sou [Select_CString( ROOT.Char.IsFemale, 'uma adulta', 'um adulto' )] e sei como atravessar um acampamento sem quebrar o pescoço, maldita seja.\n\nDeveria ser muito #EMP muy#! simples.\n\nE ainda assim…"
 harm.0542.a.tt: "Mais uma vez, me pego olhando para as escadas que descem do meu quarto, e me perguntando se preciso de um acompanhante.\n\nDeveria ser simples. Sou [Select_CString( ROOT.Char.IsFemale, 'uma adulta', 'um adulto' )] e sei usar as escadas sem quebrar o pescoço, maldita seja.\n\nTeria de ser muito #EMP muy#! simples.\n\nE ainda assim…"
 harm.0551.t.prefix: "Oh — espera — NÃÃÃO-"
 harm.0551.t: "$harm.0000.tt.incapable.success$"
 harm.0551.desc: "Por [ROOT.Char.GetFaith.FateGodName], eu adoro explorar [ROOT.Char.GetCurrentLocation.GetName]! Se não fosse pelo meu caminho secreto pelas muralhas, eu nunca teria a oportunidade de passar um tempo longe dos meus guardiões implicantes, muito menos brincar sozinho assim.

Como eu teria sequer a chance de encontrar uma árvore tão grande quanto esta, quanto mais de subi-la? Aqueles intrometidos nunca me deixariam... nunca me deixariam...

É uma árvore bem alta, não é?"
 harm.0551.a: "$harm.0000.tt.incapable.failure$"
 harm.0551.a.tt.success: "$harm.0561.t.prefix$: Fragilidade Crescente"
 harm.0551.a.tt.failure: "Ao me levantar da cama e sair para a agitação do acampamento, percebo que estou quase me agarrando ao mastro da tenda.\n\nIsto... deveria ser fácil. No entanto, parece tão complicado, tão ameaçador, a confusão de lama, cordas de tendas e bagagens se estendendo diante de mim como a própria eternidade...\n\nNão, não. Estou sendo dramático demais. Sou #EMP [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l]#! e consigo atravessar meu acampamento sem ajuda."
 harm.0551.b: "Ao descer os degraus da minha câmara, percebo que estou quase me agarrando à parede.\n\nIsto… deveria ser simples. Mas parece tão difícil, tão ameaçador; a estreita escadaria se estende diante de mim como a própria eternidade…\n\nNão, não; estou sendo dramático demais. Sou #EMP [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l]#! e posso sair do meu [ROOT.Char.Custom('GetRoom')|l] sem ajuda."
 harm.0551.c: "Não parece #EMP tão#! alto..."
 harm.0551.c.tt.success: "Preocupante."
 harm.0551.c.tt.failure: "#WEAK Quando isso se tornou um problema tão grande para você?#!"
 harm.0552.t: "Treinamento Necessário"
 harm.0552.desc: "Como [ROOT.Char.GetTitleAsNameNoTooltip|l], não tenho muito tempo para mim. Há cuidadores e guardas por toda parte, para me manter a salvo tanto de danos quanto de qualquer tipo de diversão.

Mas, enfim, consegui enganá-los! Foi preciso um pouco de audácia, mas eles não conhecem a rota além dos muros que #EMP eu#! conheço.

Não posso usá-la com muita frequência, mas quando o faço, [ROOT.Char.GetCurrentLocation.GetName] se estende diante de mim por inteiro. Liberdade."
 harm.0552.a: "Apenas um arranhão."
 harm.0552.a.tt: "Respire — poderia ser pior."
 harm.0561.t.prefix: "$harm.0000.tt.incapable.success$"
 harm.0561.t: "$harm.0000.tt.incapable.failure$"
 harm.0561.desc_adventurer: "$harm.0571.t.prefix$: Apenas um Acidente"
 harm.0561.desc: "Treinando em meu [ROOT.Char.Custom('GetCourtyard')|l], [sparring_partner.Custom('ES_ElLa')] [sparring_partner.GetTitledFirstName|l] e eu entrelaçamos nossas lâminas de treino em uma dança que, no campo de batalha, provavelmente teria resultado em [sparring_partner.GetHerHim] morrendo mil vezes.

[sparring_partner.GetSheHe|U] simplesmente não é [Select_CString( sparring_partner.IsFemale, 'a guerreira', 'o guerreiro' )] que eu sou.

Ainda assim, é um treinamento necessário para alguém que supostamente vai me representar no campo, então eu arrumo um tempo pa...

Pelo [ROOT.Char.GetFaith.WarGodName], esse golpe quase acertou meu crânio!"
 harm.0561.a: "Tenha cuidado, seu imbecil!"
 harm.0561.a.tt.success: "#WEAK Você poderia ter saído muito pior...#!"
 harm.0561.a.tt.failure: "Solidão Rara"
 harm.0561.b: "$harm.0581.t.prefix$: Passo Descuidado"
 harm.0561.c: "Desfrutar de um banho solitário, longe dos servos e dos parasitas, é um prazer para mim. É raro ter tempo só para mim, e eu aproveito cada instante.\n\nMas tudo o que é bom chega ao fim, e começo a me apoiar para sair da banheira.\n\nNo entanto, meu aperto não é tão firme quanto eu pensava, meu pé escorrega e começo a deslizar rápida e inesperadamente."
 harm.0561.c.adventurer: "Espera, [ROOT.Char.GetFaith.TricksterGodName], n—"
 harm.0561.c.tt.success: "$harm.0000.tt.incapable.success$"
 harm.0561.c.tt.failure: "$harm.0000.tt.incapable.failure$"
 harm.0562.t: "Vá devagar, vá com cuidado."
 harm.0562.desc_adventurer: "$harm.0581.t.prefix$: Escorregadio quando Molhado"
 harm.0562.desc: "Banhar-me a sós é um luxo raro para mim. Sendo [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l], é difícil encontrar um momento sem ser importunad[ROOT.Char.Custom('ES_OA')] pelos meus servos ou por um [ROOT.Char.Custom('GetCourtier')|l] que queira conversar em particular, sem interrupções; até algo tão íntimo quanto me limpar está sujeito a isso.

Erguendo com cuidado meu corpo lânguido da banheira, seguro a borda e dou um passo em direção a uma pilha de toalhas dobradas.

Só que... não exatamente.

Meu pé, ainda molhado, escorrega, e só meus reflexos evitam que eu caia no chão."
 harm.0562.rump: "Devo ter mais cuidado, suponho."
 harm.0562.a: "#WEAK Não é como se você tomasse banho sem acompanhantes com frequência...#!"
 harm.0562.a.tt: "Sem Cuidado"
 harm.0571.t.prefix: "$harm.0591.t.prefix$: Morte do Alto"
 harm.0571.t: "Uma pequena tarefa na cidade chamou minha atenção por mais tempo do que eu gostaria, mas, enfim, minha comitiva e eu seguimos para casa.\n\nOs habitantes de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitly] lotam as ruas de sua maior cidade, levando suas vidas humildes com pouca consideração por [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] que cavalga por suas ruas.\n\nUma súbita sensação aguda irrompe em minha consciência: #EMP peligro#!. Há algo diretamente acima de mim, descendo rapidamente."
 harm.0571.desc: "Treinar com [sparring_partner.Custom('ES_ElLa')] [sparring_partner.GetTitledFirstName|l] para ser um[ROOT.Char.Custom('ES_XA')] guerreir[ROOT.Char.Custom('ES_OA')] melhor é uma das minhas tarefas mais pesadas, mas ainda assim é algo que vem com ser [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsName|l].

O combate de hoje foi especialmente frustrante, já que [sparring_partner.GetFirstNameNoTooltip] se mostrou pior do que nunca. Às vezes me pergunto se...

Uma dor desabrocha no meu crânio. Eu... será que me acertou #EMP na têmpora#!? Que tipo de #EMP idiota#!..."
 harm.0571.a: "Já estou me movendo."
 harm.0571.a.tt.success: "$harm.0591.a.tt.success$"
 harm.0571.a.tt.failure: "$harm.0591.a.tt.failure$"
 harm.0571.b: "$harm.0591.t.prefix$: Descarte"
 harm.0571.c: "Ao cavalgar pelas ruas de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitly] após termos resolvido um recado banal na cidade, meu séquito e eu ouvimos um estrondo alto.\n\nUma pequena investigação mostra que foi algum burguês ou outro que atirou um pote de barro pela janela, sem se importar se atingiria alguém lá embaixo.\n\nDesalmado, sim, mas o que se pode esperar?\n\nDe todo modo, mal vale a pena pensar mais nisso."
 harm.0571.c.tt.success: "Esses #EMP plebeus#!."
 harm.0571.c.tt.failure: "#WEAK Isso poderia ter machucado alguém...#!"
 harm.0572.t: "Brincadeira Bruta"
 harm.0572.desc: "Treinando em meu [ROOT.Char.Custom('GetCourtyard')|l], [sparring_partner.Custom('ES_ElLa')] [sparring_partner.GetTitledFirstName|l] e eu entrelaçamos nossas lâminas de treino em uma dança que, no campo de batalha, provavelmente teria resultado em [sparring_partner.GetHerHim] morrendo mil vezes.

[sparring_partner.GetSheHe|U] simplesmente não é [Select_CString( sparring_partner.IsFemale, 'a guerreira', 'o guerreiro' )] que eu sou.

Ainda assim, é um treinamento necessário para alguém que supostamente vai me representar no campo, então eu arrumo um tempo pa...

Pelo [ROOT.Char.GetFaith.WarGodName], esse golpe quase acertou meu crânio!"
 harm.0572.a: "Devemos brincar todos os dias!"
 harm.0572.a.tt: "#WEAK Vocês dois são apenas crianças, afinal de contas...#!"
 harm.0581.t.prefix: "Longe Demais, Rápido Demais"
 harm.0581.t: "$harm.0611.t.prefix$: Alturas Tontas"
 harm.0581.desc: "Após mais uma tarde agitada respondendo correspondências, estou prestes a me levantar. O jantar chama, e eu gostaria de... por [ROOT.Char.GetFaith.HealthGodName], o que é essa #EMP oleada#!? Por que estou tão tont[ROOT.Char.Custom('ES_OA')]?\n\nOnde está...? Onde estou? O que está acontecendo?\n\n"
 harm.0581.a: "É como se eu tivesse subido diretamente às nuvens. Não ouço nada. Não sinto nada. Apenas uma sensação de distância, altura vertiginosa e o pulsar do sangue em minhas veias."
 harm.0581.a.tt.success: "Minha visão começa a se condensar, a visão e o som substituídos por uma escuridão iminente e a perspectiva de um fim rápido."
 harm.0581.a.tt.failure: "Espera... o quê... meu..."
 harm.0581.b: "$harm.0000.tt.incapable.success$"
 harm.0582.t: "$harm.0000.tt.incapable.failure$"
 harm.0582.desc: "Banhar-me a sós é um luxo raro para mim. Sendo [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l], é difícil encontrar um momento sem ser importunad[ROOT.Char.Custom('ES_OA')] pelos meus servos ou por um [ROOT.Char.Custom('GetCourtier')|l] que queira conversar em particular, sem interrupções; até algo tão íntimo quanto me limpar está sujeito a isso.

Erguendo com cuidado meu corpo lânguido da banheira, seguro a borda e dou um passo em direção a uma pilha de toalhas dobradas.

Só que... não exatamente.

Meu pé, ainda molhado, escorrega, e só meus reflexos evitam que eu caia no chão."
 harm.0582.a: "#WEAK Seu corpo está realmente tão fraco?#!"
 harm.0582.a.tt: "Embebedado"
 harm.0591.t.prefix: "$harm.0621.t.prefix$: Uma Boa Diversão"
 harm.0591.t: "Mais uma noite, mais uma caneca, é o que eu sempre digo! E ainda #EMP sempre#! há sempre outra noite!

A pequena taverna de [ROOT.Char.GetCurrentLocation.GetName] gira ao meu redor, uma montagem embaçada de rostos e ações. Outra! Outra... Es... é difícil sair desta mesa. Como é que eu me levanto?

Como eu me... Ops, caí... Argh, por [ROOT.Char.GetFaith.HealthGodName], a cabeça..."
 harm.0591.desc: "*HIC*… *hic*… …"
 harm.0591.a: "$harm.0000.tt.incapable.success$"
 harm.0591.a.tt.success: "$harm.0000.tt.incapable.failure$"
 harm.0591.a.tt.failure: "Hehe, acho que vou sentir isso amanhã de manhã."
 harm.0591.b: "Ooph, minha cabeça. Essa foi feia, né?"
 harm.0591.b.tt: "$harm.0000.tt.incapable.success$"
 harm.0591.c: "$harm.0000.tt.incapable.failure$"
 harm.0591.c.tt.success: "$harm.0621.t.prefix$: Maus Hábitos"
 harm.0591.c.tt.failure: "\"Barman, outra rodada!\" eu grito, em meio a vivas e gritos.\n\nO resto dos frequentadores da taverna-*HIP*-ria me aclama e eu sorrio. Agora, deve haver metade de [ROOT.Char.GetCurrentLocation.GetName] e todos me aclama e me ovaciona.\n\nAfinal, quem consegue mandar embora uma pinta como #EMP eu#!?"
 harm.0592.t: "A vida é boa."
 harm.0592.desc: "#WEAK E melhor com mais bebida!#!"
 harm.0592.a: "Êxtase"
 harm.0592.a.tt: "$harm.0631.t.prefix$: Uma Noite Empolgante"
 harm.0601.t.prefix: "[bonker.GetFirstName] me faz sentir [Select_CString( ROOT.Char.IsFemale, 'la mujer', 'el hombre' )] mais afortunad[ROOT.Char.Custom('ES_OA')] do mundo. Em noites como esta, quando nosso amor pode se expressar fisicamente, seu afeto é inegável.\n\nMeus dedos se curvam, reviro os olhos e me lanço em direção a [bonker.Custom('ES_ElLa')] amante mais entusiasta da minha vida.\n\nO sangue pulsa em mim, mal consigo me concentrar. Sangue. Sangue… pulsando… O que é… isto não é…"
 harm.0601.t: "Espere — eu não posso — meu peito!"
 harm.0601.desc: "Como de costume, [playmate.GetFirstName] e eu estamos brincando em uma parte inutilizada do meu palácio.

Amigos de verdade, #EMP sempre#! encontramos maneiras de nos divertir e, para variar, é bom ter por perto alguém que não seja um guarda ou um responsável.

Hoje estamos lutando de brincadeira, longe dos guardiões sisudos que normalmente se intrometem. Tem sido muito divertido! Só que... só que a última chave de pescoço me deixou um pouco tont[ROOT.Char.Custom('ES_OA')] e... #DIE1 e...#!"
 harm.0601.a: "$harm.0000.tt.incapable.failure$"
 harm.0601.a.tt.success: "$harm.0631.t.prefix$: Doce Música"
 harm.0601.a.tt.failure: "Por todas as estrelas no céu, [bonker.GetFirstName] me faz sentir as chamas mais ardentes do amor. Nenhum é capaz de me proporcionar uma experiência tão intensa, nem uma noite tão prazerosa quanto [bonker.GetSheHe], e agora mesmo, não consigo pensar em\n\n…\n\nem ninguém com quem eu preferisse estar no lugar dele."
 harm.0602.t: "[bonker.GetFirstNameNoTooltip] me faz sentir tão #EMP viv[ROOT.Char.Custom('ES_OA')]#!."
 harm.0602.desc: "#WEAK Tan tan viv[ROOT.Char.Custom('ES_OA')]…#!"
 harm.0602.a: "Ingestão de Líquidos"
 harm.0602.a.tt: "$harm.0641.t.prefix$: Algum Inchaço Leve"
 harm.0611.t.prefix: "Maldita seja mil vezes esta hidropisia infernal, não posso ter nada em paz? Minha carne... #EMP incha#! com esta corrupção; fluido pálido e tecido macilento sobressaem suavemente muito além do devido.

Minha forma inchada e corpulenta está destroçada pela agonia, e eu com ela.

Não consigo pensar direito.

Só sofrer.

Sofrer, sofrer e gemer..."
 harm.0611.t: "O que há de errado comigo..."
 harm.0611.desc.intro: "$harm.0000.tt.incapable.success$"
 harm.0611.desc.blind: "$harm.0000.tt.incapable.failure$"
 harm.0611.desc.fallback: "Isso vai passar."
 harm.0611.a: "Certamente isso deve ser tratável?"
 harm.0611.a.tt.success: "$harm.0000.tt.incapable.success$"
 harm.0611.a.tt.failure: "$harm.0000.tt.incapable.failure$"
 harm.0611.b: "$harm.0641.t.prefix$: Sensibilidade"
 harm.0611.c: "Ultimamente minhas articulações têm doído bastante.\n\nHá uma certa... contusão? Inflamação? No mínimo, um acúmulo de líquidos nas partes móveis dos meus membros que me causa não pouco sofrimento.\n\nSó me resta a esperança de que isso passe, com tempo e descanso."
 harm.0611.c.tt.success: "Aggh, está um pouco sensível."
 harm.0611.c.tt.failure: "#WEAK Certamente vai passar...#!"
 harm.0612.t: "$harm.0611.t.prefix$: Uma Vertigem"
 harm.0612.desc: "Essa é a última. Cento e uma cartas, ou assim me pareceu, dos vários funcionários que mantêm meu [ROOT.Char.Custom('GetRealmOrDomicile')|l] funcionando — sem falar em uma tarde inteira perdida respondendo cada uma delas.

Acho que agora vou comer alguma coisa leve antes de dormir.

Empurro a cadeira para trás, me ponho de pé e... e... estou tão tonto. O sangue pulsando em minhas veias. 

Concentração.

#EMP Concentração#!.

Ai, o que foi #EMP aquilo#!?"
 harm.0612.a: "$harm.1001.t.prefix$: Quase Preso"
 harm.0612.a.tt: "Por reflexo, com tosse e pigarro, desobstruo as vias respiratórias. O jantar está delicioso, mas talvez… #EMP demasiado#! delicioso demais, pois engulo rápido demais.\n\nCalma, digo a mim mesmo.\n\nNão há motivo para pressa."
 harm.0621.t.prefix: "Eu só estou realmente apreciando a comida ultimamente."
 harm.0621.t: "#WEAK É um prazer inofensivo...#!"
 harm.0621.desc: "Mais uma noite, mais uma caneca, é o que eu sempre digo! E ainda #EMP sempre#! há sempre outra noite!

A pequena taverna de [ROOT.Char.GetCurrentLocation.GetName] gira ao meu redor, uma montagem embaçada de rostos e ações. Outra! Outra... Es... é difícil sair desta mesa. Como é que eu me levanto?

Como eu me... Ops, caí... Argh, por [ROOT.Char.GetFaith.HealthGodName], a cabeça..."
 harm.0621.a: "$harm.0000.tt.death.failure$"
 harm.0621.a.tt.success: "Mantenha a cabeça abaixada, segure firme."
 harm.0621.a.tt.failure: "Essa não é a primeira vez que meu corcel se assusta."
 harm.0621.b: "$harm.0000.tt.death.success$"
 harm.0621.c: "$harm.0000.tt.death.failure$"
 harm.0621.c.tt.success: "$harm.1011.t.prefix$: No Retorno"
 harm.0621.c.tt.failure: "De mim, como de todos os que governam, espera-se que eu seja capaz de cavalgar, com frequência e bem. Afinal, mal conseguiria administrar meu [ROOT.Char.Custom('GetRealmOrDomicile')|l] se não pudesse.\n\nA tarefa de hoje é algo trivial numa zona rural de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitly], algo que meu séquito e eu podemos resolver rapidamente e em pers…\n\nSem aviso, minha montaria empina, assustada por algum pequeno animal na trilha. Quase sou derrubado com força, mas retomo o controle no último instante."
 harm.0622.t: "Whoah, calma aí, garota..."
 harm.0622.desc: "#WEAK Isso poderia ter sido perigoso...#!"
 harm.0622.a: "Barriga Cheia"
 harm.0622.a.tt: "$harm.1021.t.prefix$: Demais"
 harm.0631.t.prefix: "O jantar, a melhor refeição do dia, para não dizer a mais farta!

Ah, que momento delicioso para estar viv[ROOT.Char.Custom('ES_OA')]: tantas texturas para apreciar, tantos sabores para absorver, tanto tempero rico para... para...

Tenho um nó nas tripas.

Um tumor florido de dor, sugando meu estômago enquanto traça dedos gelados de agonia sobre o resto dos meus órgãos. Não é um veneno podre, apenas uma horrenda combinação de alimentos ricos despedaçando minhas entranhas.

O que eu comi...? #DIE1 Eu#!... #DIE2 urgh#!..."
 harm.0631.t: "Eu... não estou me sentindo bem..."
 harm.0631.desc: "$harm.0000.tt.death.success$"
 harm.0631.a: "$harm.0000.tt.death.failure$"
 harm.0631.a.tt.success: "Traga-me água fresca - preciso me deitar. Agora."
 harm.0631.a.tt.failure: "Nós devemos ter algum tipo de remédio em estoque para isso!"
 harm.0631.b: "$harm.0000.tt.death.success$"
 harm.0631.c: "$harm.0000.tt.death.failure$"
 harm.0631.c.tt.success: "$harm.1021.t.prefix$: Insuficiente"
 harm.0631.c.tt.failure: "Por [ROOT.Char.GetFaith.HouseholdGodName], me sinto #EMP saciad[ROOT.Char.Custom('ES_OA')]#!. Ao me reclinar na minha cadeira depois do jantar e ouvir meus [ROOT.Char.Custom('GetCourtierPlural')|l] entre si, por uma vez o mundo parece estar em ordem.\n\nUltimamente tenho tido cada vez mais vontade de jantar. As vistas, os sabores, os sons… A simples sensação dos sucos ricos e do molho cremoso escorrendo pelo meu queixo.\n\nPelo menos, até meu estômago roncar com o esforço de toda essa comida rica, e um leve embrulho ameaçar soltar minhas tripas.\n\nAinda assim, isso passa tão rápido quanto vem. Na maioria das noites."
 harm.0632.t: "Fico feliz que tenha passado rapidamente."
 harm.0632.desc: "#WEAK De volta ao jantar...#!"
 harm.0632.a: "Garganta Entupida"
 harm.0632.a.tt: "$harm.1031.t.prefix$: Sufocação"
 harm.0641.t.prefix: "Um fogo em brasa viva nas minhas veias me desperta, o grito ardente da carne pedindo ar, alívio, algo.

Minha boca... minha garganta... obstruída? Não cheia, mas bloqueada por algo nojento que jorra de dentro.

Eu vomito grossos glóbulos amarelos de pus enjoativamente adocicado, com o fedor de morte e carne podre pendendo de cada fio fibroso de catarro, mas eles continuam vindo.

Ajuda. Eu preciso... #EMP ajuda#!."
 harm.0641.t: "Não consigo... respirar..."
 harm.0641.desc: "Maldita seja mil vezes esta hidropisia infernal, não posso ter nada em paz? Minha carne... #EMP incha#! com esta corrupção; fluido pálido e tecido macilento sobressaem suavemente muito além do devido.

Minha forma inchada e corpulenta está destroçada pela agonia, e eu com ela.

Não consigo pensar direito.

Só sofrer.

Sofrer, sofrer e gemer..."
 harm.0641.a: "#WEAK O alívio chegará em breve...#!"
 harm.0641.a.tt.success: "Águas Serenas"
 harm.0641.a.tt.failure: "$harm.1041.t.prefix$: Um Acidente Inevitável"
 harm.0641.b: "Com meus guardas fora de vista, mas ao alcance da audição, desfruto de um pouco de solidão em [ROOT.Char.Custom('IndefiniteBodyOfWater_Static')], por onde já passei antes.\n\nMergulho um pé nas águas frescas e me delicio com a sensação de limpeza que já leva embora a poeira do dia. Este será um banho inesquecível!\n\nSem pensar, meu pé escorrega, tropeço e caio de cara na água. Minha cabeça bate em algo duro, atordoando-me.\n\nIsto… isto é mais fundo do que eu pensava. Estou sendo arrastad[ROOT.Char.Custom('ES_OA')] para baixo, para a escuridão…"
 harm.0641.c: "Preciso... me mover... não consigo... respirar..."
 harm.0641.c.tt.success: "$harm.0000.tt.death.success$"
 harm.0641.c.tt.failure: "$harm.0000.tt.death.failure$"
 harm.0642.t: "#EMP Eu preciso sobreviver!#!"
 harm.0642.desc: "$harm.1041.t.prefix$: Provavelmente Seguro"
 harm.0642.a: "É raro eu ter algum tempo a sós em [ROOT.Char.GetCurrentLocation.GetName] mas acontece. Relativamente a sós, isto é: meus acompanhantes estão ao alcance da voz, mas longe o bastante para me dar um pouco de espaço enquanto cavalgo por minhas terras.\n\nParei por um momento ao lado de [ROOT.Char.Custom('IndefiniteBodyOfWater_Static')]. Um lugar isolado, acho que nunca passei por aqui antes… é tranquilo. As águas claramente são profundas, embora leves redemoinhos e correntes na superfície sugiram que deságuam em algo maior nas proximidades.\n\nTalvez eu volte aqui em breve."
 harm.0642.a.tt: "Um local agradável, este."
 ##################################################
 ##Random Death Events
 harm.1001.t.prefix: "$harm.1051.t.prefix$: O Inferno"
 harm.1001.t: "Sou despertado por um grito: "[ROOT.Char.GetTitledFirstNameNoTooltip|l]!", vindo de fora, o aviso de um criado horrorizado.

Ao recobrar a consciência, arrastando-me, sinto o suor a encharcar meu corpo, seguido de perto pelo calor sufocante e abrasador. Meu [ROOT.Char.Custom('GetRoom')|l] está em chamas, minha pele já está pela metade coberta de bolhas por causa do fogo!

Tenho que *COF* sair daqui, como isso pôde...? #EMP Malditas velas#!!

O fogo bloqueia a entrada e só piora."
 harm.1001.desc: "A única saída é atravessar!"
 harm.1001.a: "$harm.0000.tt.death.success$"
 harm.1001.a.tt.success: "$harm.0000.tt.death.failure$"
 harm.1001.a.tt.failure: "Pela janela, é a rota mais rápida!"
 harm.1001.b: "$harm.1051.t.prefix$: À Luz de Velas"
 harm.1001.c: "Acordo sobressaltado, arrancando a mão da vela acesa sobre a qual ela havia caído. Pelos muitos tormentos de [ROOT.Char.GetFaith.random_EvilGodNames], como isso arde!\n\nMeio sonolent[ROOT.Char.Custom('ES_OA')] examino meu [ROOT.Char.Custom('GetRoom')|l]. Devo ter adormecido sem apagar a vela — que sorte a minha mão ter caído sobre ela.\n\nSe a vela tivesse tombado sobre a cama…"
 harm.1001.c.tt.success: "Preciso ter mais cuidado com essas velas."
 harm.1001.c.tt.failure: "#WEAK Isso poderia ter sido muito pior...#!"
 harm.1002.t: "Que Vista"
 harm.1002.desc: "$harm.1061.t.prefix$: Cair Rolar"
 harm.1002.a: "Como tento fazer na maioria dos dias, começo a manhã contemplando as imagens e os sons do mundo além da janela do meu quarto.\n\nQuão vibrante é tudo lá fora, quão cheio de luz e de vida, quão perfeita parece ser a criação; ah, só mais um pouco dessa visão de pássaro! Só mais um pouco…\n\n #EMP Mierda#!, longe demais, #EMP me resbalo!#!"
 harm.1002.a.tt: "Agarre a moldura da janela."
 harm.1011.t.prefix: "$harm.0000.tt.death.success$"
 harm.1011.t: "$harm.0000.tt.death.failure$"
 harm.1011.desc: "agarre-#EMP agarre#!-AGARRE!"
 harm.1011.a: "Recue bruscamente."
 harm.1011.a.tt.success: "$harm.0000.tt.death.success$"
 harm.1011.a.tt.failure: "$harm.0000.tt.death.failure$"
 harm.1011.b: "$harm.1061.t.prefix$: Admiração Inofensiva"
 harm.1011.c: "Nossa, que dia de tirar o fôlego lá fora!\n\nDe pé junto à janela da minha câmara, fico tão feliz por estar viv[ROOT.Char.Custom('ES_OA')] endo, contemplando as pessoas que se movem lá embaixo e a natureza distante do lado de fora. Refrig[ROOT.Char.Custom('ES_OA')] ado, estou bem pront[ROOT.Char.Custom('ES_OA')] para começar os negócios do dia.\n\nAinda assim... um pouco mais não faria mal. Bebendo tudo com avidez, inclino a cabeça para fora, saboreando o ar fresco que sopra pelo cômodo elevado.\n\nE chega disso."
 harm.1011.c.tt.success: "Deslumbrante!"
 harm.1011.c.tt.failure: "#WEAK Uma maneira adorável e inofensiva de começar a manhã...#!"
 harm.1012.t: "Crimes Passionais"
 harm.1012.desc: "$harm.1071.t.prefix$: Agindo"
 harm.1012.a: "A [ROOT.Char.Custom('GetDoor')|l] está quase despedaçada quando eu passo por ela, [other.Custom('ES_ElLa')] [other.GetTitledFirstName|l] foge o mais rápido que pode, me fazendo cair para trás.

Vejo um lampejo de aço prateado atrás de [other.GetHerHim] e o rosnado de [killer.Custom('ES_DelDela')] [killer.GetTitledFirstName|l] enquanto [killer.GetSheHe] persegue [other.GetHerHim], sua faca já cintila em minha direção. Sua ira vacila quando percebe que #EMP não#! sou a vítima que busca, mas sua investida descontrolada é rápida demais para parar.

A ponta da adaga corre em direção ao meu pescoço."
 harm.1012.a.tt: "Esquive-se da faca."
 harm.1021.t.prefix: "$harm.0000.tt.death.success$"
 harm.1021.t: "$harm.0000.tt.death.failure$"
 harm.1021.desc: "O jantar, a melhor refeição do dia, para não dizer a mais farta!

Ah, que momento delicioso para estar viv[ROOT.Char.Custom('ES_OA')]: tantas texturas para apreciar, tantos sabores para absorver, tanto tempero rico para... para...

Tenho um nó nas tripas.

Um tumor florido de dor, sugando meu estômago enquanto traça dedos gelados de agonia sobre o resto dos meus órgãos. Não é um veneno podre, apenas uma horrenda combinação de alimentos ricos despedaçando minhas entranhas.

O que eu comi...? #DIE1 Eu#!... #DIE2 urgh#!..."
 harm.1021.a: "$harm.1081.t.prefix$: Ira da Tempestade"
 harm.1021.a.tt.success: "Maldito mil vezes seja o espírito caprichoso de [ROOT.Char.GetFaith.WaterGodName], condenou meu séquito e a mim a morrer nesta tempestuosa desgraça!\n\nO que deveria ter sido uma pequena tarefa em uma aldeia local passou de um dia claro e luminoso a uma negra miséria, uma travessia entre vendavais, açoitados por uma chuva dura como pedrinhas e ameaçados por relâmpagos em arco e trovões estrondosos.\n\nSe não encontrarmos abrigo logo, o frio e a umidade tirarão nossas vidas com a mesma certeza de uma lâmina."
 harm.1021.a.tt.failure: "Se cavalgarmos rápido o suficiente, podemos chegar em casa."
 harm.1021.b: "$harm.0000.tt.death.success$"
 harm.1021.c: "$harm.0000.tt.death.failure$"
 harm.1021.c.tt.success: "Aquele abrigo, podemos nos abrigar lá!"
 harm.1021.c.tt.failure: "Eu — Eu acho que posso ter um esconderijo nas proximidades?"
 harm.1022.t: "$harm.0000.tt.death.success$"
 harm.1022.desc: "$harm.0000.tt.death.failure$"
 harm.1022.a: "$harm.1081.t.prefix$: Trovão Distante"
 harm.1022.a.tt: "Observo as tempestades, atipicamente intensas, que ecoam pela paisagem com um trovão distante vindo de uma fileira de nuvens a poucos quilômetros de distância.\n\nUm dilúvio incômodo… Será que estas chuvas indicam algum problema divino que não consegui resolver, ou são simplesmente movimentos aleatórios do vento?\n\nDe qualquer forma, não quero ser pego nelas."
 harm.1031.t.prefix: "Espero que [ROOT.Char.GetFaith.FateGodName] não esteja sinalizando algo."
 harm.1031.t: "#WEAK Não é um bom momento para estar do lado de fora...#!"
 harm.1031.desc: "Um fogo em brasa viva nas minhas veias me desperta, o grito ardente da carne pedindo ar, alívio, algo.

Minha boca... minha garganta... obstruída? Não cheia, mas bloqueada por algo nojento que jorra de dentro.

Eu vomito grossos glóbulos amarelos de pus enjoativamente adocicado, com o fedor de morte e carne podre pendendo de cada fio fibroso de catarro, mas eles continuam vindo.

Ajuda. Eu preciso... #EMP ajuda#!."
 harm.1031.a: "Clareza, clareza, eu preciso de #EMP clareza#!."
 harm.1031.a.tt.success: "$harm.0000.tt.death.success$"
 harm.1031.a.tt.failure: "$harm.0000.tt.death.failure$"
 harm.1031.b: "$harm.1091.t.prefix$: Mente Dolorida"
 harm.1031.c: "Nas últimas duas semanas, tenho sido afligido por enxaquecas tão... #EMP intensas#!.\n\n"
 harm.1031.c.tt.success: "Não consigo pensar, não consigo me concentrar, mal consigo ouvir; os sons parecem desaparecer por completo, a menos que sejam muito agudos ou muito graves.\n\n[ROOT.Char.GetFaith.HealthGodName|U] deve achar que é uma grande e cruel brincadeira me amaldiçoar com dores de cabeça que filtram tudo, exceto os gritos dos bebês e os relinchos dos cavalos."
 harm.1031.c.tt.failure: "Quando me atingem, minha visão parece se reduzir, toda a visão e a luz se contraem até que me reste apenas um pequeno canto do mundo, sempre à beira do foco e marcado por uma fonte de dor.\n\nEstá claro que [ROOT.Char.GetFaith.HealthGodName|U] acha meu sofrimento engraçado, pois os ataques são alarmantemente regulares."
 harm.1032.t: "Ai, minha cabeça..."
 harm.1032.desc: "Por [ROOT.Char.GetFaith.HealthGodName], desta vez são dois #EMP dias#! de dor.

Minha mandíbula dói, minha garganta está seca e irritada, e o interior da minha boca parece... inchado? Dói para comer. Dói para engolir. Dói até para #EMP mastigar#!.

O boticário me assegura que provavelmente não há com o que se preocupar, apenas um desequilíbrio natural que se resolverá com o tempo.

Eu... eu espero que sim."
 harm.1032.a: "Leve seu cavalo ainda mais perto da parede."
 harm.1032.a.tt: "Jogue-se para frente e espere."
 harm.1041.t.prefix: "$harm.0000.tt.death.success$"
 harm.1041.t: "$harm.0000.tt.death.failure$"
 harm.1041.desc: "$harm.1101.t.prefix$: Segurança nas Ruas"
 harm.1041.a: "Montado com minha comitiva pelas ruas de [ROOT.Char.GetCurrentLocation.GetName] mantenho uma postura austera. Às vezes é importante ser visto, mas é igualmente importante continuar sendo uma figura de certa autoridade.\n\nParamos quando uma carroça passa roncando por nós em um cruzamento movimentado, rápido demais para ser seguro.\n\nPor sorte para o condutor, pois não é prudente fechar o caminho a [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip|l], seu cavalo o leva rápido demais para ver qualquer coisa, quanto mais para parar."
 harm.1041.a.tt.success: "Os plebeus precisam ver s [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 harm.1041.a.tt.failure: "#WEAK Mesmo que seja apenas enquanto passa pelas suas moradias...#!"
 harm.1041.b: "Reino do Terror"
 harm.1042.t: "$harm.1111.t.prefix$: Justiça Popular"
 harm.1042.desc: "Ao atravessar meu [ROOT.Char.Custom('GetCourt')|l], sempre me escoltam guardas para minha proteção. E ainda mais guardas vigiam a entrada, sem falar da minha [ROOT.Char.Custom('GetChamber')|l]. Suficientes para deter qualquer intruso, mas aparentemente não o bastante para impedir que um maldito servo esbarre em mim e...

Dor. Uma dor de punhalada, literalmente. O sangue já jorra do meu ventre enquanto cambaleio para trás, com a faca do servo cravada em mim.

Meus guarda-costas avançam sobre [Select_CString( killer.IsFemale, 'a assassina', 'o assassino' )] em segundos, abatendo[killer.GetHerHim] contra o chão. O sorriso de satisfação enquanto [killer.GetSheHe] morre não deixa dúvidas de que se trata de algo totalmente e puramente pessoal.

Todos querem morrer como heróis."
 harm.1042.a: "Argh, estou acabad[ROOT.Char.Custom('ES_OA')]!"
 harm.1042.a.tt: "$harm.0000.tt.death.success$"
 harm.1051.t.prefix: "$harm.0000.tt.death.failure$"
 harm.1051.t: "Hace falta más que eso para #EMP matarme#!."
 harm.1051.desc: "#EMP Outro#! assassino? Patético!", vindo de fora, o aviso de um criado horrorizado.

Ao recobrar a consciência, arrastando-me, sinto o suor a encharcar meu corpo, seguido de perto pelo calor sufocante e abrasador. Meu [ROOT.Char.Custom('GetRoom')|l] está em chamas, minha pele já está pela metade coberta de bolhas por causa do fogo!

Tenho que *COF* sair daqui, como isso pôde...? #EMP Malditas velas#!!

O fogo bloqueia a entrada e só piora."
 harm.1051.a: "#WEAK Você simplesmente não consegue bons ajudantes nos dias de hoje...#!"
 harm.1051.a.tt.success: "$harm.0000.tt.death.success$"
 harm.1051.a.tt.failure: "$harm.0000.tt.death.failure$"
 harm.1051.b: "Febre no Acampamento"
 harm.1052.t: "Maldito seja tudo em [ROOT.Char.GetCurrentLocation.GetName]! Que ironia infernal é que, embora os cercos supostamente desgastem os defensores, os #EMP campamentos#! dos sitiadores sejam pântanos de sujeira e doenças!\n\nAo acordar esta manhã, eu tinha as entranhas reviradas e fogo líquido correndo pelo meu ventre. Não consigo parar de me esvaziar por todos os orifícios, já nem consigo mais ficar de pé.\n\nNunca quis morrer assim."
 harm.1052.desc: "Minhas… minhas tripas… urgh…"
 harm.1052.a: "$harm.0000.tt.death.success$"
 harm.1052.a.tt: "$harm.0000.tt.death.failure$"
 harm.1061.t.prefix: "Não vou terminar aqui."
 harm.1061.t: "Eu sei o que preciso. Traga-me... traga-me..."
 harm.1061.desc: "$harm.0000.tt.death.success$"
 harm.1061.a: "$harm.0000.tt.death.failure$"
 harm.1061.a.tt.success: "Mal-estar em Marcha"
 harm.1061.a.tt.failure: "Estou há quase uma semana sofrendo com suores frios e febre, o estômago embrulhado e as mãos trêmulas. Não sei o que contraí, mas está claro que é alguma enfermidade inesperada provocada pelas condições na marcha e em nossos acampamentos noturnos.\n\nE agora mesmo minha visão começa a se turvar, mas devo seguir em frente.\n\nDevo… continuar. Temos que… continuar…"
 harm.1061.b: "Por que... o que é..."
 harm.1061.c: "$harm.0000.tt.death.success$"
 harm.1061.c.tt.success: "$harm.0000.tt.death.failure$"
 harm.1061.c.tt.failure: "Meus soldados sofrem apenas o que eu posso suportar."
 harm.1062.t: "Eu já suportei coisas piores, com certeza?"
 harm.1062.desc: "$harm.0000.tt.death.success$"
 harm.1062.a: "$harm.0000.tt.death.failure$"
 harm.1062.a.tt: "Tão... Frio..."
 harm.1071.t.prefix: "Não está certo estar em campanha com tanto frio. Não está certo. Todas as noites, no acampamento, cavamos novas covas para as perdas que descobriremos pela manhã, para os que devemos deixar para trás, mas que não deveriam ficar à mercê de bandos de corvos insensíveis.

Quase os invejo. Para eles, a luta acabou. Não precisam enfrentar esta #EMP geada#! sem sentido.

O frio do inverno me atravessa até a medula, interrompendo constantemente meus pensamentos com pontadas entorpecentes de dor, negando-me descanso, negando-me concentração.

Talvez... talvez fosse melhor se..."
 harm.1071.t: "…"
 harm.1071.desc: "A [ROOT.Char.Custom('GetDoor')|l] está quase despedaçada quando eu passo por ela, [other.Custom('ES_ElLa')] [other.GetTitledFirstName|l] foge o mais rápido que pode, me fazendo cair para trás.

Vejo um lampejo de aço prateado atrás de [other.GetHerHim] e o rosnado de [killer.Custom('ES_DelDela')] [killer.GetTitledFirstName|l] enquanto [killer.GetSheHe] persegue [other.GetHerHim], sua faca já cintila em minha direção. Sua ira vacila quando percebe que #EMP não#! sou a vítima que busca, mas sua investida descontrolada é rápida demais para parar.

A ponta da adaga corre em direção ao meu pescoço."
 harm.1071.a: "$harm.0000.tt.death.failure$"
 harm.1071.a.tt.success: "Tão... Quente..."
 harm.1071.a.tt.failure: "O sol sempre foi tão brilhante? Tão quente? Tão opressivo?\n\nNem sequer sei há quanto tempo estamos nesta terra abandonada por [ROOT.Char.GetFaith.HealthGodName], sem acesso fácil a água boa e obrigados a continuar marchando.\n\nA campanha exige que continuemos, mas cada dia nos rouba um pouco mais de força. Um pouco mais, suado e caído sobre a terra sempre sedenta. Um pouco mais de nós se perde para sempre nesse calor sem sentido.\n\nTodos e cada um dos dias."
 harm.1071.b: "A tirania da luz e da sede nos desfaz..."
 harm.1071.c: "$harm.0000.tt.death.success$"
 harm.1071.c.tt.success: "$harm.0000.tt.death.failure$"
 harm.1071.c.tt.failure: "Eu. Tenho. Um destino. Maior."
 harm.1072.t: "Não sou a marionete [ROOT.Char.GetFaith.DeathDeityNamePossessive]."
 harm.1072.desc: "$harm.0000.tt.death.success$", grita [killer.Custom('ES_ElLa')] [killer.GetTitledFirstName|l] ao atacar [other.Custom('ES_AlAla')] [other.GetTitledFirstName|l] no que com certeza deve ser o terceiro duelo de gritos do dia.

Ignoro a discussão deles apesar do volume, e sigo em frente. [Select_CString(And(killer.IsFemale, other.IsFemale), 'As duas', 'Os dois')] brigam constantemente e, embora sejam barulhentos, no fim das contas são inofensivos.

Tenho coisas mais importantes com que me preocupar do que uma pequena briga entre meus [ROOT.Char.Custom('GetCourtierPlural')|l]."
 harm.1072.a: "$harm.0000.tt.death.success$"
 harm.1072.a.tt: "$harm.0000.tt.death.failure$"
 harm.1081.t.prefix: "Apenas seis? Venham, covardes!"
 harm.1081.t: "#BER EU VOU FAZER VOCÊS SANGRAREM POR ISSO!#!"
 harm.1081.desc: "$harm.0000.tt.death.success$"
 harm.1081.a: "$harm.0000.tt.death.failure$"
 harm.1081.a.tt.success: "Fome"
 harm.1081.a.tt.failure: "Poucas coisas são mais destrutivas para um exército do que a fome — não há escudo que a detenha, nem espada que a afaste, nem cota de malha que atenue suas dores.\n\nSem comida, sem água, sem nada para nos manter em movimento, exceto os animais de carga que impulsionam nosso avanço, minhas tropas vão lentamente parando.\n\nAté... até eu... estou murchando sem sustento..."
 harm.1081.b: "Minha pele... como papel..."
 harm.1081.c: "$harm.0000.tt.death.success$"
 harm.1081.c.tt.success: "$harm.0000.tt.death.failure$"
 harm.1081.c.tt.failure: "A situação ainda é recuperável."
 harm.1082.t: "Temos reservas, nós #EMP precisamos#! ter reservas!"
 harm.1082.desc: "$harm.0000.tt.death.success$"
 harm.1082.a: "$harm.0000.tt.death.failure$"
 harm.1082.a.tt: "Perseguido a Cada Passo"
 harm.1091.t.prefix: "Com meu exército fugindo do campo em [ROOT.Char.GetCurrentLocation.GetName], grupos de tropas travam escaramuças, correm ou se perseguem por léguas em todas as direções. Minha comitiva está dispersa, meus guardas mortos ou em fuga, e eu me disperso com eles.\n\nSe ao menos pudéssemos nos reagrupar, se ao menos pudéssemos…\n\nContorno uma grande rocha e dou de cara com um bando de soldados usando a libré do inimigo.\n\nRangendo os dentes, investem com um grito."
 harm.1091.t: "Afaste-se de mim, seus bastardos!"
 harm.1091.desc: "#EMP Doce e misericordios[ROOT.Char.GetFaith.HighGodName], por favor, poupa-me deste sofrimento#!!

O que é esta agonia pulsante que martela meu crânio até transformá-lo em tiras ensanguentadas, este pulsar ardente que ressoa em minhas veias ao ritmo do tambor [ROOT.Char.GetFaith.DevilNamePossessive]...

Eu estava bem, então de repente estava... engasgando para segurar o vômito, sem aviso, então eu estava... #EMP Argggh#!, faz parar, faz parar, #BER FAZ PARAR#!!

P-por favor. #DIE1 Faz isso#! #DIE2 parar#!."
 harm.1091.a: "Meu exército vitorioso varre o campo em [ROOT.Char.GetCurrentLocation.GetName]. Por toda parte, ouvem-se os gritos triunfantes das minhas tropas enquanto derrotamos o inimigo.\n\nAté mesmo meu séquito e eu nos entregamos a tão proveitosa carnificina, exultantes com nossa vitória. Nós nos dispersamos um pouco, sim, mas o inimigo está derrotado e não pode…\n\nOnde estão meus guardas? Os soldados ao meu redor… eles ostentam o estandarte de [actor.GetPrimaryTitle.GetNameNoTier]! Com ódio nos olhos e sangue nos dentes, os inimigos derrotados se lançam contra mim, prontos para dar cabo de mim."
 harm.1091.a.tt.success: "Você ainda não vai me levar, [ROOT.Char.GetFaith.DeathDeityName]!"
 harm.1091.a.tt.failure: "$harm.0000.tt.death.success$"
 harm.1091.b: "$harm.0000.tt.death.failure$"
 harm.1091.c: "FUJA!"
 harm.1091.c.tt.success: "A mim! Reuni-vos [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!"
 harm.1091.c.tt.failure: "$harm.0000.tt.death.success$"
 harm.1092.t: "$harm.0000.tt.death.failure$"
 harm.1092.desc.intro: "Nas últimas duas semanas, tenho sido afligido por enxaquecas tão... #EMP intensas#!.\n\n"
 harm.1092.desc.blind: "Não consigo pensar, não consigo me concentrar, mal consigo ouvir; os sons parecem desaparecer por completo, a menos que sejam muito agudos ou muito graves.\n\n[ROOT.Char.GetFaith.HealthGodName|U] deve achar que é uma grande e cruel brincadeira me amaldiçoar com dores de cabeça que filtram tudo, exceto os gritos dos bebês e os relinchos dos cavalos."
 harm.1092.desc.fallback: "Quando me atingem, minha visão parece se reduzir, toda a visão e a luz se contraem até que me reste apenas um pequeno canto do mundo, sempre à beira do foco e marcado por uma fonte de dor.\n\nEstá claro que [ROOT.Char.GetFaith.HealthGodName|U] acha meu sofrimento engraçado, pois os ataques são alarmantemente regulares."
 harm.1092.a: "Ai, minha cabeça..."
 harm.1092.a.tt: "#WEAK Talvez você devesse descansar um pouco...#!"
 harm.1101.t.prefix: "Um Povoado Movimentado"
 harm.1101.t: "$harm.1101.t.prefix$: Cuidado!"
 harm.1101.desc: "Mais uma vez, eu cavalgo pelas ruas de [ROOT.Char.GetCurrentLocation.GetName], meu séquito orgulhosamente carregando minha bandeira atrás de mim. Uma pequena tarefa na cidade requer minha atenção, então fizemos um dia disso, mas anseio pelas comodidades do lar.\n\nConforme chegamos a uma travessia, sou distraído pelas risadas de um grupo de jovens impressionados e não consigo ouvir o som de uma carroça acelerada e barulhenta se aproximando de mim até que o cocheiro grite alarmado."
 harm.1101.a: "Tente pular para fora do caminho."
 harm.1101.a.tt.success: "Um estrondo poderoso e um relincho angustiante atrás de você."
 harm.1101.a.tt.failure: "O mundo se torna um borrão de madeira estilhaçada e membros quebrados."
 harm.1101.b: "Leve seu cavalo ainda mais perto da parede."
 harm.1101.c: "Jogue-se para frente e espere."
 harm.1101.c.tt.success: "$harm.0000.tt.death.success$"
 harm.1101.c.tt.failure: "$harm.0000.tt.death.failure$"
 harm.1102.t: "$harm.1101.t.prefix$: Segurança nas Ruas"
 harm.1102.desc: "Montado com minha comitiva pelas ruas de [ROOT.Char.GetCurrentLocation.GetName] mantenho uma postura austera. Às vezes é importante ser visto, mas é igualmente importante continuar sendo uma figura de certa autoridade.\n\nParamos quando uma carroça passa roncando por nós em um cruzamento movimentado, rápido demais para ser seguro.\n\nPor sorte para o condutor, pois não é prudente fechar o caminho a [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip|l], seu cavalo o leva rápido demais para ver qualquer coisa, quanto mais para parar."
