 harm.1111.a.tt.failure: "$harm.0000.tt.death.failure$"
 harm.1111.b: "Hace falta más que eso para #EMP matarme#!."
 harm.1111.c: "#EMP Outro#! assassino? Patético!"
 harm.1111.c.tt.dread: "Esta opção é desbloqueada por seu alto [dread|lE]"
 harm.1111.c.tt.success: "$harm.0000.tt.death.success$"
 harm.1111.c.tt.failure: "$harm.0000.tt.death.failure$"
 harm.1112.t: "$harm.1111.t.prefix$: Obediência Assustada"
 harm.1112.desc: "Ao dobrar a esquina, com meus guardas me seguindo fielmente, um servo com uma tigela quase esbarra em mim.\n\nEle se afasta no último momento, evitando por pouco jogar sopa fervendo na minha cara.\n\n"Veja por onde anda!", rosna um dos meus escoltas.\n\nO servo acena repetidamente, com medo demais para falar, antes de sair furtivamente na direção oposta. A atitude correta após um erro tão grave."
 harm.1112.a: "Poderia ter sido pior, suponho."
 harm.1112.a.tt: "#WEAK Você simplesmente não consegue bons ajudantes nos dias de hoje...#!"
