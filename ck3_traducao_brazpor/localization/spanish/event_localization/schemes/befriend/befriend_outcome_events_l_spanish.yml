l_spanish:
 befriend_outcome.1001.t: "Fazer Amizade: Uma Noite Fora"
 befriend_outcome.1001.desc: "Ao saber que [target.GetTitledFirstName|l] se hospedaria em uma mansão na [barony.Custom('BaronyTownType')|l] de [barony.GetNameNoTier], percebi que seria a ocasião perfeita para me encontrar com ele.\n\n"
 befriend_outcome.1002.t: "Fazer Amizade: No Baile"
 befriend_outcome.1002.desc: "Ao saber que [target.GetTitledFirstName|l] estaria no baile na [barony.Custom('BaronyTownType')|l] de [barony.GetNameNoTier], decidi que seria a ocasião perfeita para passar por lá e garantir um tempo a sós com [target.GetSheHe]!\n\n"
 befriend_outcome.1201.t: "Fazer Amizade: Uma Reunião Formal"
 befriend_outcome.1201.desc: "Apesar de nossos desacordos iniciais, os conselheiros [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] sugeriram um encontro como uma oportunidade de esclarecer nossas diferenças e deixar quaisquer espadas de lado.\n\n"
 befriend_outcome.1301.t: "Fazer Amizade: A Propriedade"
 befriend_outcome.1301.desc: "Depois de muito pensar, finalmente decidi convidar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] para visitar uma de minhas propriedades em [barony.GetNameNoTier]."
 befriend_outcome.2001.t: "Fazer Amizade: Uma Noite Agradável"
 befriend_outcome.2001.desc: "A pedido meu, fui colocad ao lado [target.GetHerHim] durante o jantar, e ambos tivemos um ótimo momento! Fiquei surpres com o quanto tínhamos para conversar."
 befriend_outcome.2001.a: "Que [target.GetWomanMan] tão agradável!"
 befriend_outcome.2002.t: "Fazer Amizade: O Baile"
 befriend_outcome.2002.desc: "O baile foi requintado e [target.GetTitledFirstName|l] deu um belo espetáculo! Depois, eu lhe disse que fiquei impressionado e começamos a conversar."
 befriend_outcome.2002.a: "Que dia bom!"
 befriend_outcome.2003.t: "Fazer Amizade: Uma Noite de Companhia"
 befriend_outcome.2003.opening: "Depois de preparativos laboriosos, finalmente consegui passar uma noite a sós com [target.GetTitledFirstName|l], para"
 befriend_outcome.2004.opening: "Depois de preparativos laboriosos, finalmente consegui passar um tempo a sós com [target.GetTitledFirstName|l]."
 befriend_outcome.2003.same_fame: "conversarmos sobre tempos passados, feitos passados e como o mundo é estranho."
 befriend_outcome.2003.same_lifestyle: "falarmos sobre as coisas que tornam a vida digna de ser vivida e compartilharmos algumas boas histórias."
 befriend_outcome.2003.same_education: "discutirmos [ROOT.GetCharacter.Custom('education_conversation_subject')]."
 befriend_outcome.2003.deceitful: "Por fim consegui passar um tempo com [target.GetTitledFirstName|l] e falar sobre [target.Custom('education_conversation_subject')]. Felizmente, [target.Custom('ES_ElElla')] não percebeu que eu entendia muito pouco do que estava falando."
 befriend_outcome.2003.fallback: "compartilharmos algumas histórias e descobrirmos nossos interesses em comum."
 befriend_outcome.2003.great_time: "\n\nQuando me despedia, [target.GetFirstName] me disse que foi bom conversar com alguém que [target.GetHerHim] entendesse de verdade. Concordei plenamente."
 befriend_outcome.2003.a: "Estamos mais próximos do que nunca."
 befriend_outcome.2201.t: "Fazer Amizade: Diplomacia Frutífera"
 befriend_outcome.2201.desc: "Depois de me sentar com [target.GetTitledFirstName|l] como iguais mais do que inimigos, sinto que aprendi muito sobre [target.GetSheHe]. Ele(a) também viu que, com o tempo, podemos chegar a um entendimento."
 befriend_outcome.2201.a: "Até sorriu para mim antes de eu ir embora."
 befriend_outcome.2301.desc: "\n\nA visita acabou sendo uma ideia ainda melhor do que eu esperava. [target.GetFirstName] me fez enxergar os assuntos da propriedade sob uma nova perspectiva, mas também manteve meu bom humor o tempo todo."
 befriend_outcome.2301.increase_opinion: "Sinto que nos conhecemos de uma forma que não conseguíamos antes."
 befriend_outcome.2301.a: "A viagem valeu o esforço."
 befriend_outcome.4001.t: "Fazer Amizade: Uma Refeição Desajeitada"
 befriend_outcome.4001.desc: "Quando chegou o momento, fiquei sentado ao lado de [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] durante todo o jantar, mas fui incapaz de dizer algo interessante."
 befriend_outcome.4001.b: "Argh, desisto!"
 befriend_outcome.4002.t: "Fazer Amizade: O Baile"
 befriend_outcome.4002.desc: "O dia do baile foi prenunciado por céus cinzentos, e, ao contrário da festividade que eu esperava, o clima estava sombrio."
 befriend_outcome.4002.a: "Da próxima vez que eu encontrar [target.GetHerHim] verá!"
 befriend_outcome.4002.b: "Isso é sem esperança..."
 befriend_outcome.4003.t: "Fazer Amizade: Um Erro"
 befriend_outcome.4003.same_fame: "Tendo fama por muitas das mesmas coisas, achei que [target.GetFirstName] e eu teríamos muito em comum. Ainda assim, se havia, eu não consegui descobrir."
 befriend_outcome.4003.same_lifestyle: "Estava tão certo[ROOT.Char.Custom('ES_OA')] de que [target.GetFirstName] e eu vivíamos a vida de maneiras tão parecidas, mas depois de ter falado com [target.GetSheHe] durante horas..."
 befriend_outcome.4003.same_education: "Eu realmente acreditava que [target.GetTitledFirstName|l] e eu víamos o mundo da mesma forma, mas, depois de passar várias horas discutindo sobre [target.Custom('education_conversation_subject')] sem jamais encontrar qualquer ponto em comum, fui forçado a admitir o quão terrivelmente enganad[ROOT.Char.Custom('ES_OA')] estava."
 befriend_outcome.4003.deceitful: "Pensei que poderia fingir que domino qualquer assunto sobre o qual [target.Custom('ES_ElElla')] quisesse falar, mas, à terceira hora de [target.Custom('education_conversation_subject')], meus esforços para socializar se desfizeram por completo."
 befriend_outcome.4003.fallback: "Apesar do que pensei no início, não consegui encontrar nada que [target.GetFirstName] e eu tivéssemos em comum e que nos unisse."
 befriend_outcome.4003.bad_time: "\n\nAbatid[ROOT.Char.Custom('ES_OA')], fui embora, e parece que [target.GetSheHe] se alegrou de me ver partir."
 befriend_outcome.4003.b: "Nossa amizade não estava destinada a ser."
 befriend_outcome.4201.t: "Fazer Amizade: Um Encontro Frio"
 befriend_outcome.4201.desc: "Infelizmente, embora bem intencionado, nosso encontro não fez nada além de me lembrar por que não nos damos bem."
 befriend_outcome.4201.b: "Eu não deveria ter tentado isso."
 befriend_outcome.4301.desc: "\n\nInfelizmente, a viagem acabou sendo uma ideia desastrosa. [target.GetTitledFirstName|l] estava mal preparad[target.Custom('ES_OA')] e, toda vez que tentei animar o ambiente, ele(a) respondia apenas com descontentamento furtivo."
 befriend_outcome.4301.b: "Depois de tudo isso, eu desisto."
 befriend_outcome.6001.begin_friendship: "\n\nQuando parti, parecia que já nos conhecíamos há uma vida inteira."
 befriend_outcome.6301.begin_friendship: "\n\n[target.GetFirstName] não é apenas minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] , mas meu amig[target.Custom('ES_OA')] ."
 befriend_outcome.8001.disastrous_time: "\n\nQuando me fui, juraria que [target.GetFirstName] me lançou um dos olhares mais repugnantes que já vi."
 befriend_outcome.8201.disastrous_time: "\n\nEm um momento, insultei acidentalmente a mãe deles #EMP y#! ao cavalo favorito."
 befriend_outcome.8301.disastrous_time: "\n\nApós o nosso retorno, [target.GetSheHe] mal quer falar comigo!"
 befriend_outcome.9800.t: "Fazer Amizade: A Dor Compartilhada é Meia Dor"
 befriend_outcome.9800.desc: "Quando meus espiões me contaram sobre a visita anual de [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] a"
 befriend_outcome.9800.desc_same_parent.our_parent: "o túmulo de noss[target_dead_parent.Custom('ES_OA')] [target_dead_parent.Custom('MotherFather')],"
 befriend_outcome.9800.desc_strangers.their_parent: "o túmulo de seu [target_dead_parent.Custom('MotherFather')],"
 befriend_outcome.9800.mid.desc: "Percebi imediatamente que era a melhor oportunidade para curar nossas feridas.\n\nQuando o dia chega, encontro [target.GetFirstNameNoTooltip] ajoelhad[target.Custom('ES_OA')] diante da lápide.\n\n\"Perdoe a intromissão\", digo em voz baixa."
 befriend_outcome.9800.desc_same_parent.dialogue: "\"Sei que [target_dead_parent.Custom('ES_ElElla')] significava muito para você. Eu também [target_dead_parent.Custom('ES_LoLa')] sinto falta.\""
 befriend_outcome.9800.desc_strangers.dialogue: "\"Eu quero apresentar minhas condolências. Eu também sei como é perder um pai ou mãe.\""
 befriend_outcome.9800.end: "\n\nAcabamos compartilhando histórias sobre entes queridos perdidos por várias horas. Ao nos despedirmos, sinto como se um peso tivesse sido retirado dos meus ombros."
 befriend_outcome.9800.a: "Nossas tristezas nos unem."
 befriend_outcome.9900.t: "Fazer Amizade: Sentimentos Avassaladores"
 befriend_outcome.9900.end: "Infelizmente, assim que me viu, levantou-se de repente e avançou furios[target.Custom('ES_OA')] contra mim."
 befriend_outcome.9900.b: "Foi uma hora ruim?"
 befriend_outcome.0002.t: "A amizade de [owner.GetFirstNameNoTooltip]"
 befriend_outcome.0002.critsucc.desc: "É óbvio que [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] há algum tempo vem tentando [GetScheme('befriend').GetTypeName|l] comigo.\n\nEm várias ocasiões, [owner.Custom('ES_ElElla')] demonstrou ser um[owner.Custom('ES_XA')] [owner.GetWomanMan] confiáve[owner.Custom('ES_OA')] e que sempre teve em mente o que era melhor para mim."
 befriend_outcome.0002.succ.desc: "Há algum tempo ficou óbvio que [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] vem tentando [GetScheme('befriend').GetTypeName|l] comigo.\n\nComecei a perceber o quanto temos em comum [owner.GetTitledFirstName|l] e eu, e o quanto tem se mostrado dign[owner.Custom('ES_OA')] nas últimas alguns meses."
 befriend_outcome.0002.fail.desc: "Faz algum tempo que é óbvio que [owner.Custom('ES_ElLa')][owner.GetTitledFirstName|l] vem tentando [GetScheme('befriend').GetTypeName|l] comigo.\n\nNão consigo deixar de sentir irritação com esse interesse repentino em mim. E não consigo me livrar da sensação de que as intenções de [owner.Custom('ES_EA')] [owner.GetWomanMan] não são puras..."
 befriend_outcome.0002.critfail.desc: "Há algum tempo já é óbvio que [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] vem tentando buscar [GetScheme('befriend').GetTypeName|l] comigo.\n\nNão posso evitar sentir irritação pelo súbito interesse dela/ dele por mim. Se é que isso é algo, o desejo obsessivo de me impressionar e as exibições desajeitadas de afeto fabricado dela/ dele só fizeram com que eu desgostasse ainda mais dela/ dele."
 befriend_outcome.0002.a: "É tão raro encontrar um verdadeiro amigo."
 befriend_outcome.0002.b.success: "Devemos passar mais tempo juntos!"
 befriend_outcome.0002.b.failure: "Mas ainda tem certo charme…"
 befriend_outcome.0002.c.success: "Ainda não estou convencid[ROOT.Char.Custom('ES_OA')]."
 befriend_outcome.0002.c.failure: "Por que não pode me deixar em paz?"
 befriend_outcome.0002.d: "Nunca quero ver o rosto dele novamente!"
 befriend_outcome.2004.t: "Fazer Amizade: Mentes Afins"
 befriend_outcome.2004.spouse: "\n\nQuando voltamos aos nossos aposentos ao final da noite, me pareceu que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] estava muito mais confortável[target.Custom('ES_OA')] e à vontade comigo."
 befriend_outcome.2004.relative: "\n\nFiquei feliz por ter tido esta oportunidade de fortalecer nossos laços familiares e, a julgar pelo comportamento da minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] ao final da noite, [target.Custom('ES_ElElla')] também estava."
 befriend_outcome.2004.vassal: "\n\nAo final do jantar, [target.GetFirstNameNoTooltip] me disse o quão agradecid[target.Custom('ES_OA')] se sentia por ter um[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('ES_SennorSennora')] tão hospitaleir[ROOT.Char.Custom('ES_OA')] e cordial, e que esperava ter a oportunidade de retribuir minha bondade no futuro."
 befriend_outcome.2004.liege: "\n\nComo demonstração de gratidão, apenas alguns dias depois de nosso encontro privado, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] decidiu elogiar minha hospitalidade diante de toda a corte, afirmando quão afortunad[target.Custom('ES_OA')] que é por ter sob sua proteção um[ROOT.Char.Custom('ES_XA')] vassal[ROOT.Char.Custom('ES_XA')] tão leal e hospitaleir[ROOT.Char.Custom('ES_OA')] como eu."
 befriend_outcome.2004.outsider: "\n\nNo final, a distância não foi um grande obstáculo para eu superar e conquistar a confiança e a amizade de [target.GetFirstNameNoTooltip]. Só posso esperar que o vínculo que forjamos hoje se torne ainda mais forte nos próximos anos."
 befriend_outcome.2004.fallback: "\n\nAprendi muito sobre [target.GetFirstNameNoTooltip] durante nosso encontro e tenho certeza de que [target.GetSheHe] pensa o mesmo de mim. Acho que nossa noite juntos ajudou bastante a desenvolver uma certa confiança entre nós."
 befriend_outcome.6004.spouse: "\n\nQuando voltamos aos nossos aposentos ao final da noite, eu tinha certeza de que poderia confiar plenamente em meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))], e sabia que [target.Custom('ES_ElElla')] pensava o mesmo de mim."
 befriend_outcome.6004.relative: "\n\nFiquei feliz por ter tido esta oportunidade de fortalecer nossos laços familiares. Ao final do jantar, eu tinha certeza absoluta de que minha segur[ROOT.Char.Custom('ES_OA')] de que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] sentia exatamente o mesmo."
 befriend_outcome.6004.vassal: "\n\nAo final do jantar, [target.GetFirstNameNoTooltip] estava convencid[target.Custom('ES_OA')] de que eu tinha em mente os seus melhores interesses para com [target.Custom('ES_ElElla')], assim como [target.Custom('ES_ElElla')] para comigo. Graças aos meus esforços, estabelecemos um vínculo de confiança e lealdade que raramente se consegue entre suserano e vassalo."
 befriend_outcome.6004.liege: "\n\nComo demonstração de gratidão, poucos dias depois do nosso encontro privado, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] decidiu elogiar minha hospitalidade diante de toda a corte, afirmando o quão afortunad[target.Custom('ES_OA')] se sente por ter sob sua proteção um[ROOT.Char.Custom('ES_XA')] vassal[ROOT.Char.Custom('ES_OA')] tão leal e hospitaleir[ROOT.Char.Custom('ES_OA')] quanto eu e que se orgulha de me chamar de seu amig[ROOT.Char.Custom('ES_OA')]."
 befriend_outcome.6004.outsider: "\n\nNo final, a distância não foi um grande obstáculo para eu superar a fim de conquistar a confiança e a amizade de [target.GetFirstNameNoTooltip]. Aprendemos muito durante nosso encontro, tanto que nos despedimos como amigos."
 befriend_outcome.4004.t: "Fazer Amizade: Diferenças Irreconciliáveis"
 befriend_outcome.4004.spouse: "Apesar dos meus esforços para impressionar a [target.GetFirstName], minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] continua me tratando com desconfiança e distanciamento."
 befriend_outcome.4004.relative: "Pensei que fortalecer os laços entre meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] e eu seria uma tarefa fácil... Como eu estava enganad[ROOT.Char.Custom('ES_OA')]! Apesar dos meus melhores esforços, [ROOT.Char.Custom('ES_OA')] parece não ter nenhum interesse em passar tempo comigo ou em saber mais sobre os meus interesses.[target.GetFirstName]"
 befriend_outcome.4004.vassal: "Apesar das minhas inúmeras tentativas de conquistar a confiança [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], [target.Custom('ES_ElElla')] continua mantendo distância quando fala comigo. Nossa diferença de posição parece um obstáculo grande demais para que [target.GetSheHe]."
 befriend_outcome.4004.liege: "[target.GetTitledFirstName] não ficou nada impressionad[target.Custom('ES_OA')] com minhas numerosas tentativas de conquistar sua confiança. Ao ouvir os rumores que circulam em sua corte, percebi que [target.Custom('ES_ElElla')] pensa que sou um[ROOT.Char.Custom('ES_XA')] bajulador[ROOT.Char.Custom('ES_XA')] que busca ganhar seu favor."
 befriend_outcome.4004.outsider: "Infelizmente, parece que as diferenças e a distância entre [target.GetTitledFirstName|l] e eu são simplesmente grandes demais para serem superadas, independentemente da minha determinação. Depois de todo o tempo que passei tentando conquistar sua confiança, [target.GetFirstNameNoTooltip] não mostrou nenhuma mudança em sua atitude em relação a mim."
 befriend_outcome.4004.ending: "\n\nReceio que não há muito mais que eu possa fazer para superar a lacuna entre nós neste ponto."
 befriend_outcome.8005.desc: "Fui tolo ao pensar que poderia mudar a opinião de [target.GetFirstName] sobre mim. \n\nEle só se aproveitou da minha recente abertura e cordialidade com [target.GetSheHe] para zombar abertamente de mim, afirmando que não sou nada além de um[ROOT.Char.Custom('ES_XA')] [owner.GetWomanMan] patétic[ROOT.Char.Custom('ES_OA')] sem amigos, dispost[ROOT.Char.Custom('ES_OA')] a se humilhar por medo da solidão."
 befriend_outcome.8005.a: "Eu deveria ter esperado isso de [target.GetSheHe]."
 befriend_outcome.2005.t: "Fazer Amizade: Pondo Fim ao Conflito"
 befriend_outcome.2005.relative: "No início, não foi fácil convencer meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] da sinceridade das minhas intenções, mas, pouco a pouco, consegui fazer com que entendesse que eu estava pront[ROOT.Char.Custom('ES_OA')] para pôr fim à nossa rivalidade pelo bem de ambos."
 befriend_outcome.2005.vassal: "Nunca é um bom sinal quando um suserano está em desacordo com seus próprios vassalos. Graças aos meus esforços diplomáticos, consegui resolver os desentendimentos que tinha com [target.GetTitledFirstName|l].\n\nCom sorte, seremos capazes de aprender a confiar mais um no outro à medida que avançarmos. Por enquanto, só me alegro de não considerar mais [target.GetSheHe] à medida que avançarmos. Por enquanto, só me alegro de não considerar mais[target.GetHerHim] meu inimig[target.Custom('ES_OA')]."
 befriend_outcome.2005.liege: "A estabilidade de qualquer reino depende do acordo respeitoso entre um suserano e seus vassalos. Estou contente por ter conseguido convencer [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] de que o conflito entre nós só teria trazido sofrimento desnecessário aos nossos súditos.\n\nÉ um grande alívio saber que finalmente resolvemos nossas diferenças."
 befriend_outcome.2005.fallback: "Não foi fácil convencer [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] de que se reunisse comigo para resolver nossas diferenças, mas, quando finalmente consegui sentar-me com [target.GetSheHe] para explicar meus motivos para nossos desentendimentos no passado, [target.GetHerHim] considerei-o muito mais razoável do que eu temia."
 befriend_outcome.2005.a: "Finalmente podemos recomeçar."
 befriend_outcome.8006.t: "Fazer Amizade: Política Irreconciliável"
 befriend_outcome.8006.desc: "Passei a última semana me reunindo com [target.GetTitledFirstName|l] para que entenda que não há motivo para que sejamos inimigos.\n\nInfelizmente, parece que minhas tentativas de apaziguar sua facção só a incentivaram ainda mais."
 befriend_outcome.8006.everyfactionmember.custom: "Todo membro da [faction|lE] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]"
 befriend_outcome.8006.a: "Nunca deveria ter confiado nessa[target.Custom('ES_EA')] [target.GetWomanMan]."
 befriend_outcome.8007.t: "Fazer Amizade: O Preço da Confiança"
 befriend_outcome.8007.desc: "Na noite passada, em uma última tentativa de conquistar o afeto do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))], decidi revelar a ela/ele um dos meus segredos mais vergonhosos. Eu esperava que minha sinceridade ajudasse a diminuir a distância entre nós, mas eu estava muito enganad[ROOT.Char.Custom('ES_OA')].\n\nAgora ela/ele está ameaçando revelar meu segredo a toda a corte, a menos que eu ceda às exigências dela/dele!"
 befriend_outcome.8007.a: "Está bem! Quanto você precisa?"
 befriend_outcome.8007.b: "Como quiser, querid!"
 befriend_outcome.8007.c: "Não serei chantageado por meu própri[target.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))]!"
 befriend_outcome.8008.t: "Fazer Amizade: Desacordos Religiosos"
 befriend_outcome.8008.desc: "Infelizmente, parece que [target.GetTitledFirstName|l] acredita que minha tentativa de conquistar sua confiança não passa de uma artimanha para obter absolvição dos meus pecados aos olhos de [ROOT.Char.GetFaith.HighGodNameAlternate].\n\nPara piorar, se rejeitar minha oferta de amizade não fosse suficiente, agora [target.GetFirstNameNoTooltip] começou a difamar meu nome ao pregar ao povo de [owner.GetPrimaryTitle.GetName]!"
 befriend_outcome.8008.a: "Chega! Eu desisto!"
 befriend_outcome.8009.t: "Fazer Amizade: Rastejamento Inadequado"
 befriend_outcome.8009.desc: "Estava certo[ROOT.Char.Custom('ES_OA')] de que elogiar publicamente as muitas qualidades e a liderança competente [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] me ajudaria a cair nas graças de [target.Custom('ES_ElElla')]. Infelizmente, eu estava muito enganado[ROOT.Char.Custom('ES_OA')].\n\nAssim que terminei meu discurso, [target.GetTitledFirstNameNoTooltip|l] zombou de mim diante de toda a corte, dizendo que não sou nada além de um[ROOT.Char.Custom('ES_XA')] bajulador[ROOT.Char.Custom('ES_XA')] sem coragem que tenta elevar seu status lambendo as botas de seus superiores."
 befriend_outcome.8009.everycourtier.custom: "Todo membro da corte [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]"
 befriend_outcome.8009.a: "Mas eu disse cada palavra com sinceridade!"
 befriend_outcome.2006.t: "Fazer Amizade: Compreensão Mútua"
 befriend_outcome.2006.desc: "Por fim persuadi [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] a abandonar seu apoio equivocado à [targeting_faction.GetName].\n\nE acabou que tínhamos muito mais em comum do que qualquer um de nós pensava no começo."
 befriend_outcome.2006.a: "É sempre bom ver a razão triunfar."
 befriend_outcome.6006.t: "Fazer Amizade: Apaziguamento Político"
 befriend_outcome.6006.desc: "Graças às minhas finas habilidades diplomáticas, consegui convencer [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] não só de que abandonasse a liderança da [scoped_faction.GetName], mas também de que a dissolvesse por completo, evitando assim o risco de uma guerra civil."
 befriend_outcome.6007.desc: "Não consigo entender como, mas [owner.GetTitledFirstName|l] convenceu [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] a dissolver sua facção.\n\nNa noite passada, reuniu todos os membros para anunciar que estava equivocado ao se opor a [owner.GetTitledFirstNameNoTooltip|l] e que [target.Custom('ES_ElElla')] desejava uma solução pacífica para o nosso conflito."
 befriend_outcome.6007.a.a: "[target.GetFirstNameNoTooltip] nos traiu!"
 befriend_outcome.6007.a.b: "Talvez tenha razão…"
 #Travel Befriend Success Outcome
 befriend_outcome.2007.opening_travel: "Para minha grande alegria, os mensageiros [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] me encontraram aqui em [current_location.GetName] enquanto meu séquito e eu seguimos em direção a [next_destination.GetName].\n\n"
 befriend_outcome.2007.opening_no_travel: "Para minha alegria, um dos mensageiros [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] chegou até aqui, à minha [ROOT.Char.Custom('FortifiedBuilding')|l] de [ROOT.Char.GetCurrentLocation.GetName].\n\n"
 befriend_outcome.2007.desc: "Traz boas notícias, pois [target.GetFirstNameNoTooltip] deseja formalizar nossa amizade! Nunca esperava que chegássemos a nos entender tão bem, mas demonstrou ser alguém confiável e sincero, que só pensa no que é melhor para mim."
