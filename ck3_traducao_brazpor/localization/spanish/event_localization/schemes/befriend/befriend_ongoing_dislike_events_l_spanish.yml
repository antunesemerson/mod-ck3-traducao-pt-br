l_spanish:
 befriend_ongoing_dislike.0001.t: "Fazer Amizade: Presente Encantador"
 befriend_ongoing_dislike.0001.desc: "Eu quero que [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] goste mais de mim, e quem não gosta de um presente?"
 befriend_ongoing_dislike.0001.a: "Ficará impressionad[target.Custom('ES_OA')] com isso!"
 befriend_ongoing_dislike.0001.b: "Considerando nosso relacionamento, é prudente mostrar contenção."
 befriend_ongoing_dislike.0001.c: "Um presente não é o caminho certo."
 befriend_ongoing_dislike.0002.t: "Fazer Amizade: Diante da Falta de Simpatia"
 befriend_ongoing_dislike.0002.desc: "[target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] segue evitando meus esforços para fazer amizade com [target.GetSheHe].\n\nEle/ela deixou claro que nunca me terá em alta conta. Ou que acha que sou pouco melhor que uma minhoca."
 befriend_ongoing_dislike.0002.a: "Isso é difícil..."
 befriend_ongoing_dislike.0003.t: "Fazer Amizade: O Valor da Insistência"
 befriend_ongoing_dislike.0003.desc: "Parece que todas as cartas e presentes com os quais eu me preocupava chegaram a [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] porque finalmente respondeu!\n\nEmbora tenha feito isso para dizer que a minha insistência o estava incomodando, no entanto."
 befriend_ongoing_dislike.0003.a: "Pelo menos estou causando uma impressão!"
 befriend_ongoing_dislike.0004.t: "Fazer Amizade: Devolvido ao Remetente"
 befriend_ongoing_dislike.0004.desc: "Parece que algumas das cartas amistosas que enviei para [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] voltaram com meu mensageiro, sem serem abertas.\n\nComo não consegue entender que só estou tentando melhorar as coisas?"
 befriend_ongoing_dislike.0004.a: "Só quero que goste de mim."
 befriend_ongoing_dislike.0004.b: "Vou fazer com que um arauto entregue minhas palavras pessoalmente!"
 befriend_ongoing_dislike.0005.t: "Fazer Amizade: Uma Disposição Suavizada"
 befriend_ongoing_dislike.0005.desc: "Minhas tentativas de melhorar minha posição aos olhos de [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] certamente enfrentaram desafios, mas meus mensageiros relataram que minhas cartas não são mais recebidas com o mesmo desapontamento.\n\nSeu rosto agora exibe ocasionalmente algo que pode ser... interesse."
 befriend_ongoing_dislike.0005.a: "Hah, ainda vou conseguir que [target.GetHerHim] goste de mim!"
 befriend_ongoing_dislike.2001.t: "Fazer Amizade: Não Convidado"
 befriend_ongoing_dislike.2001.desc: "[target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] é bem conhecid[target.Custom('ES_OA')] por ser um[target.Custom('ES_XA')] [target.GetWomanMan] gregári[target.Custom('ES_OA')] e amigável, desejos[target.Custom('ES_OA')] de festejar e celebrar com os demais.\n\nNo entanto, não me convidou para seu último banquete na mansão de um barão, apesar de ficar muito perto das minhas próprias terras! O normal seria que ele me tivesse convidado."
 befriend_ongoing_dislike.2001.a: "Isso é uma grave ofensa!"
 befriend_ongoing_dislike.2001.b: "Uma oportunidade perdida, mas não posso interpretar isso além disso."
 befriend_ongoing_dislike.2002.t: "Fazer Amizade: Aproximando-se"
 befriend_ongoing_dislike.2002.desc: "É bem sabido que [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] é bastante tímid[target.Custom('ES_OA')] e não costuma passar acompanhad[target.Custom('ES_OA')] mais tempo do que o necessário.\n\nAgora que deixou de responder às minhas comunicações, não sei como proceder."
 befriend_ongoing_dislike.2002.a: "Tenho que dar tempo a ele."
 befriend_ongoing_dislike.2002.b: "Vou garantir que saiba de mim. E muito!"
 befriend_ongoing_dislike.5001.t: "Fazer Amizade: Um Cético e um Fanático"
 befriend_ongoing_dislike.5001.desc: "Meus esforços para reduzir a tensão entre [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] e eu são dificultados pela sua absurda obsessão com a minha falta de piedade. \n\nE, claro, apesar de todas as suas reclamações, [target.GetTitledFirstName|l] ainda não conseguiu me explicar por que vale a pena se preocupar mais com [ROOT.GetCharacter.GetFaith.HighGodName] do que já me preocupo."
 befriend_ongoing_dislike.5001.a: "Eu suponho que posso visitar mais frequentemente o [ROOT.Char.GetFaith.HouseOfWorship]."
 befriend_ongoing_dislike.5001.b: "Vamos ter que lidar com isso."
 befriend_ongoing_dislike.5001.c: "Quem se importa com as dúvidas que eu abrigo de qualquer maneira!"
 befriend_ongoing_dislike.5002.t: "Fazer Amizade: Confiança e Desconfiança"
 befriend_ongoing_dislike.5002.desc: "Seria muito mais fácil fazer com que [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] se [target.GetSheHe] acreditasse na sinceridade da minha tentativa! Em vez disso,  zomba de mim e se pergunta o que estou esperando ganhar com minha gentileza."
 befriend_ongoing_dislike.5002.a: "Serei persistente, mas não mentirei sobre quem sou."
 befriend_ongoing_dislike.5002.b: "Um, sim, talvez eu esteja tentando obter algo..."
 befriend_ongoing_dislike.5003.t: "Fazer Amizade: Sentindo-se Abatido"
 befriend_ongoing_dislike.5003.desc: "Tudo o que eu quero é fazer com que [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] entenda a alegria de estar na companhia de outras pessoas! No entanto, parece estar sempre retraíd[target.Custom('ES_OA')] e raramente quer sair de seu quarto, a menos que seja absolutamente necessário."
 befriend_ongoing_dislike.5003.a: "Tem que superar isso de uma vez!"
 befriend_ongoing_dislike.5003.b: "Se [target.GetSheHe] precisa de espaço, eu lhe darei."
 befriend_ongoing_dislike.5004.t: "Fazer Amizade: Presente Maravilhoso Desaponta"
 befriend_ongoing_dislike.5004.desc: "Eu desejava mostrar minhas boas intenções a [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] preparando um banquete grandioso e enviando-o para seu [target.Custom('ResidenceBuilding')], mas acabei de ouvir a notícia de que, supostamente, ele não provou nem a menor porção disso tudo!\n\n Pensei que algo pudesse estar errado, mas aparentemente, é só que nem todo mundo aprecia montanhas de comida tanto quanto eu."
 befriend_ongoing_dislike.5004.a: "Pedirei desculpas por meus excessos."
 befriend_ongoing_dislike.5004.b: "Pois que contemple sua comida apodrecer, então."
 befriend_ongoing_dislike.5005.t: "Fazer Amizade: Chamado à Ação"
 befriend_ongoing_dislike.5005.desc: "Estou tentando fazer com que [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] me entenda melhor, mas o que consegui foi entender[target.Custom('ES_LoLa')] cada vez menos. Onde está o ímpeto dele/dela, a ambição dele/dela? Parece que ele/ela não se importaria se as coisas continuassem exatamente como estão agora."
 befriend_ongoing_dislike.5005.a: "Vou tentar me contentar com isso por enquanto."
 befriend_ongoing_dislike.5005.b: "Uma pessoa assim vale mesmo a pena conhecer?"
 befriend_ongoing_dislike.5005.c: "Que tipo de ambições eles estão cultivando em segredo?!"
