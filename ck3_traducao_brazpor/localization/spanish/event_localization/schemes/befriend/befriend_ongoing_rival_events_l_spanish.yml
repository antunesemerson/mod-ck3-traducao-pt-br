l_spanish:
 befriend_ongoing_rival.3000.t: "Fazer Amizade: Um Equilíbrio Fino"
 befriend_ongoing_rival.0001.t: "Fazer Amizade: Devolver ao Remetente"
 befriend_ongoing_rival.0001.desc: "Pesei cuidadosamente cada palavra enquanto escrevia a carta [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l]. Nem mesmo quando larguei a pena e fui para meus aposentos pude parar de pensar em frases e significados ocultos que pudessem ofender.\n\nEu tinha grandes esperanças de que minha carta se tornasse um ponto de virada em meus esforços, mas estava profundamente enganado. Hoje a mensagem foi devolvida sem ser aberta!"
 befriend_ongoing_rival.0001.a: "Que [target.Custom2('InsultNoun', ROOT.Char)] desagradecido[target.Custom('ES_OA')]!"
 befriend_ongoing_rival.0002.t: "Fazer Amizade: A Marteladas"
 befriend_ongoing_rival.0002.desc: "Passei tempo suficiente na vizinhança de [target.GetTitledFirstName|l] para saber que pode falar sobre [target.Custom('herhis_subject_of_interest')]. Pesquisei e preparei algumas perguntas para o que eu esperava que fosse uma discussão proveitosa.\n\nInfelizmente, eu estava completamente enganado. Em questão de minutos, encontramos algo em que discordamos e acabamos em uma frenética competição de gritos."
 befriend_ongoing_rival_0002.a: "Vou engolir meu orgulho e apoiar o ponto de vista dele."
 befriend_ongoing_rival_0002.b: "Se eu ao menos conseguisse fazê-lo entender…"
 befriend_ongoing_rival_0002.b.tt: "O progresso de meu plano será afetado positiva ou negativamente dependendo do resultado."
 befriend_ongoing_rival_0002.c: "Eu nunca poderia concordar com uma opinião tão absurda!"
 befriend_ongoing_rival.0003.t: "Fazer Amizade: Vendo Olho no Olho"
 befriend_ongoing_rival.0003.desc: "Foram necessárias algumas brigas e discussões, mas no fim parece que [target.GetTitledFirstName|l] e eu encontramos algo em comum nessa questão. \n\nTalvez ainda não tenhamos nos separado como amigos, mas sinto que estamos progredindo."
 befriend_ongoing_rival_0003.a: "Pode haver alguma esperança para nós, afinal."
 befriend_ongoing_rival.0004.t: "Fazer Amizade: Um Erro Tolo"
 befriend_ongoing_rival.0004.desc: "Desesperadamente, tentei explicar minha opinião de um jeito que fizesse sentido do ponto de vista [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], mas só consegui me enredar nos meus próprios argumentos. \n\nIsso deu a [ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('ES_OA')] muita margem para me atacar, e saí da discussão parecendo um idiota."
 befriend_ongoing_rival_0004.a: "Pode ser que [target.GetTitledFirstNameNoTooltip|l] tenha vencido desta vez..."
 befriend_ongoing_rival.0005.t: "Fazer Amizade: Sob uma Má Luz"
 befriend_ongoing_rival.0005.desc: "Quando [spymaster.Custom('ES_ElLa')] [spymaster.GetTitledFirstName|l] me informou do rumor nojento sobre mim que circulava na corte, pude sentir o sangue ferver. Ordenei que investigasse a origem, e, sem muita surpresa, parece que o culpado não era outro senão [target.Custom('ES_ElLa')] culpado não era outr[target.Custom('ES_OA')] que [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l]. \n\n[ROOT.Char.GetFaith.HighGodName]! Por que é[target.Custom('ES_EA')] [target.Custom2('InsultNoun', ROOT.Char)] mentiros[target.Custom('ES_OA')] não para com essa loucura?"
 befriend_ongoing_rival_0005.a: "Preciso me defender contra as mentiras imundas de [target.GetFirstNameNoTooltip]!"
 befriend_ongoing_rival_0005.b: "Neste momento, pode ser melhor deixar seguir seu curso."
 befriend_ongoing_rival.2000.t: "Fazer Amizade: Acariciando o seu Ego"
 befriend_ongoing_rival.2000.desc: "Sempre parece que eu me concentro nos aspectos negativos de [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], o que é bastante improdutivo tendo em vista meu objetivo atual. Certamente, \n\nFazer um elogio discreto, mas atencioso, reconhecendo uma de suas virtudes pode ser uma boa ideia."
 befriend_ongoing_rival_2000.a: "Embora tenhamos tido nossas desavenças, [target.GetFirstNameNoTooltip] é uma pessoa gentil."
 befriend_ongoing_rival_2000.b: "[target.GetSheHe|U] tem uma presença bastante imponente."
 befriend_ongoing_rival_2000.c: "Agora que penso nisso, ele se sai bem com as pessoas."
 befriend_ongoing_rival_2000.d: "[target.GetFirstNameNoTooltip] costuma manter a calma."
 befriend_ongoing_rival_2000.tt: "#F Un halago sincero ayudaría a que mi plan progresara pero, si me equivoco, podría ofenderse.#!"
 befriend_ongoing_rival_2000.a.tt: "Elogie [target.GetFirstName] por ser gentil"
 befriend_ongoing_rival_2000.b.tt: "Elogie [target.GetFirstName] por ser assertivo"
 befriend_ongoing_rival_2000.c.tt: "Elogie [target.GetFirstName] por ser sociável"
 befriend_ongoing_rival_2000.d.tt: "Elogie [target.GetFirstName] por ser equilibrad"
 befriend_ongoing_rival.2001.t: "Fazer Amizade: O Poder do Reconhecimento"
 befriend_ongoing_rival.2001.intro: "Garanti que [target.GetTitledFirstName|l] estivesse ao alcance de ouvido quando mencionei"
 befriend_ongoing_rival.2001.benevolent: "que sua generosidade sempre me pareceu um exemplo valioso para os outros."
 befriend_ongoing_rival.2001.dominant: "sempre sabe como captar a atenção de todos quando entra em uma sala."
 befriend_ongoing_rival.2001.extroverted: "que é um[target.Custom('ES_XA')] convidad[target.Custom('ES_OA')] muito valorizado por ser sempre a alma da festa."
 befriend_ongoing_rival.2001.levelheaded: "que, apesar de nossos muitos desentendimentos, sempre admirei sua habilidade de manter a cabeça fria."
 befriend_ongoing_rival.2001.end: "\n\nDepois, fui informad que [target.GetSheHe] teve dificuldade para esconder um sorriso satisfeito ao ouvir minhas palavras."
 befriend_ongoing_rival_2001.a: "Um elogio sincero pode realmente fazer maravilhas."
 befriend_ongoing_rival.2002.t: "Fazer Amizade: Um Grave Mal-Entendido"
 befriend_ongoing_rival.2002.end: "\n\nQuando [target.GetSheHe] se aproximou de mim mais tarde, pensei que me agradeceria! Pelo menos até ver sua expressão furiosa… No fim das contas, recebeu minha tentativa de elogio como uma zombaria desdenhosa."
 befriend_ongoing_rival_2002.a: "Eu nunca deveria ter aberto a boca..."
 befriend_ongoing_rival.2003.t: "Fazer Amizade: Que Constrangedor"
 befriend_ongoing_rival.2003.end: "\n\nQuando lancei um olhar de soslaio para [target.GetTitledFirstNameNoTooltip|l] esperava ao menos um pequeno sinal de contentamento, mas [target.GetSheHe] na verdade parecia confus[target.Custom('ES_OA')], talvez até um pouco irritad[target.Custom('ES_OA')]."
 befriend_ongoing_rival_2003.a: "Talvez eu devesse ter pensado mais sobre isso..."
