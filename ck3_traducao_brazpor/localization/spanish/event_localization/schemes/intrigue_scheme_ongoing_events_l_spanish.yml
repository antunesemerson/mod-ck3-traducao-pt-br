l_spanish:
 intrigue_scheme_ongoing.1001.t: "Um Suborno Bem Planejado"
 intrigue_scheme_ongoing.1001.desc: "Parece que nem toda a criadagem da corte [scheme.GetTargetCharacter.Custom('ES_DelDela')] [scheme.GetTargetCharacter.GetTitledFirstName|l] é cegamente leal… [agent.GetFirstName] garante que tem um jeito de entrar, e que algumas moedas no bolso certo podem abrir muitas portas."
 intrigue_scheme_ongoing.1001.elope.desc: "Parece que não todos os servos da corte [scheme.GetTargetCharacter.Custom('ES_DelDela')] [scheme.GetTargetCharacter.GetTitledFirstName|l] são cegamente leais… [agent.GetFirstName] assegura que tem um jeito de entrar e que, com algumas moedas no bolso certo, é possível ir muito longe."
 intrigue_scheme_ongoing.1001.a: "O que são algumas moedas de ouro, afinal?"
 intrigue_scheme_ongoing.1001.b: "É muito arriscado!"
 intrigue_scheme_ongoing.1002.t: "Justiça Divina"
 intrigue_scheme_ongoing.1002.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent_in_question'))], [agent_in_question.Custom('ES_ElLa')] [agent_in_question.GetTitledFirstName|l] , condenou [scheme.GetTargetCharacter.Custom('ES_AlAla')] [scheme.GetTargetCharacter.GetTitledFirstName|l] pelas ofensas contra [agent_in_question.GetFaith.HighGodName].\n\nAté invocou [agent_in_question.GetFaith.HighGodNameAlternate] para abater [scheme.GetTargetCharacter.GetFirstName] e insinuou castigos por vir."
 intrigue_scheme_ongoing.1002.a: "Um pouco otimista talvez, mas gosto do espírito!"
 intrigue_scheme_ongoing.1002.a.success: "[agent_in_question.GetSheHe|U] recruta [agent_in_question.GetFaith.GetAdherentNamePlural] dos arredores para a nossa causa"
 intrigue_scheme_ongoing.1002.a.failure: "[agent_in_question.GetFirstNameNoTooltip] se expõe[agent_in_question.Custom('ES_OA')] em seu fervor"
 intrigue_scheme_ongoing.1002.b: "[agent_in_question.GetTitledFirstNameNoTooltip] vai calar a boca, ou juro por [agent_in_question.GetFaith.HighGodName]."
 intrigue_scheme_ongoing.1002.c: "[agent_in_question.GetHerHim|U] ajudarei em sua nobre abordagem!"
 intrigue_scheme_ongoing.1004.t: "Excessivamente Falador"
 intrigue_scheme_ongoing.1004.desc: "Embora a habilidade de fazer amigos de [agent_in_question.GetFirstName] tenha se mostrado inestimável para minha conspiração, não é tão cuidadoso com os outros quanto deveria ser.\n\nGosta demais de deixar escapar dicas vagas e, se alguém começar a fazer perguntas, não há como saber o que ele revelaria!"
 intrigue_scheme_ongoing.1004.a: "O que ela/aprende descobre é valioso demais para calar[agent_in_question.GetHerHim] callar."
 intrigue_scheme_ongoing.1004.a.success: "[agent_in_question.GetFirstNameNoTooltip] permanece não detectad"
 intrigue_scheme_ongoing.1004.a.failure: "[agent_in_question.GetFirstNameNoTooltip] é descobert"
 intrigue_scheme_ongoing.1004.b: "Se não sabe guardar segredos, então terá que ficar em silêncio!"
 intrigue_scheme_ongoing.1004.toast.success: "[agent_in_question.GetFirstNameNoTooltip] continua sem ser descobert[agent_in_question.Custom('ES_OA')]"
 intrigue_scheme_ongoing.1004.toast.failure: "[agent_in_question.GetFirstNameNoTooltip] é descobert[agent_in_question.Custom('ES_OA')]"
 intrigue_scheme_ongoing.1006.t: "Arrumando as Coisas"
 intrigue_scheme_ongoing.1006.desc: "É claro que[agent_in_question.Custom('ES_EA')] [agent_in_question.Custom2('InsultAdjective', ROOT.Char)] [agent_in_question.Custom('ES_DelDela')] [agent_in_question.GetTitledFirstName|l] ia causar problemas!\n\nÉ incapaz de tomar as devidas precauções quando circula pela corte [scheme.GetTargetCharacter.Custom('ES_DelDela')] [scheme.GetTargetCharacter.GetTitledFirstName|l] e [scheme.GetTargetCharacter.Custom('ES_ElLa')] [scheme.GetTargetCharacter.GetTitleAsNameNoTooltip] está começando a perceber. É só uma questão de tempo até que [agent_in_question.GetHerHim] seja descoberto!"
 intrigue_scheme_ongoing.1006.elope.desc: "Claro que esse[agent_in_question.Custom('ES_EA')] [agent_in_question.Custom2('InsultAdjective', ROOT.Char)] [agent_in_question.Custom('ES_DelDela')] [agent_in_question.GetTitledFirstName|l] ia causar problemas!\n\nÉ incapaz de tomar as devidas precauções ao circular pela corte [scheme.GetTargetCharacter.Custom('ES_DelDela')] [scheme.GetTargetCharacter.GetTitledFirstName|l] e [scheme.GetTargetCharacter.GetLiege.Custom2('HerHisCharacterIntroduction', scheme.GetTargetCharacter)] está começando a perceber. Mais cedo ou mais tarde [agent_in_question.GetHerHim] será descoberto!"
 intrigue_scheme_ongoing.1006.a.success: "[agent_in_question.GetFirstNameNoTooltip] continua sem ser descobert[agent_in_question.Custom('ES_OA')]"
 intrigue_scheme_ongoing.1006.a.failure: "[agent_in_question.GetFirstNameNoTooltip] é descobert[agent_in_question.Custom('ES_OA')]"
 intrigue_scheme_ongoing.1006.a: "Vestígios de alguém se esgueirando certamente irão estressar [scheme.GetTargetCharacter.GetFirstNameNoTooltip]!"
 intrigue_scheme_ongoing.1006.b: "[agent_in_question.GetSheHe|U] precisa tirar um tempo para fazer melhor."
 intrigue_scheme_ongoing.1007.t: "Preocupação Expressa"
 intrigue_scheme_ongoing.1007.desc: ""E se [target.GetTitledFirstName|l] os descobrir? Será prudente continuar com este esforço tão demorado?".\n\n[caring_agent.GetTitledFirstName|l] [caring_agent.Custom('QuirkPresentPosOrNeg')]. Tenho a convicção de que me acompanhará neste plano, mas sei que sua preocupação comigo é sincera."
 intrigue_scheme_ongoing.1007.a: "Meus planos continuarão, e espero que você trabalhe duro!"
 intrigue_scheme_ongoing.1007.b: "Você está cert, isso tem tomado muito do meu tempo. Venha, sente-se comigo."
 intrigue_scheme_ongoing.1008.t: "Respirando no Pescoço"
 intrigue_scheme_ongoing.1008.desc: "Parece que [defender.GetTitledFirstName|l] está reforçando a segurança na corte, na esperança de localizar conspiradores traidores. Meu colega de complô, [agent.GetTitledFirstName|l], teme ter atraído alguma suspeita indesejada."
 intrigue_scheme_ongoing.1008.a: "Confio nas habilidades de [agent.GetFirstNameNoTooltip]."
 intrigue_scheme_ongoing.1008.a.success: "[agent.GetFirstNameNoTooltip] continua sem ser detectad[agent.Custom('ES_OA')]"
 intrigue_scheme_ongoing.1008.a.failure: "[agent.GetFirstNameNoTooltip] é descobert[agent.Custom('ES_OA')]"
 intrigue_scheme_ongoing.1008.b: "É preciso cortar o rastro que [agent.Custom('ES_LoLa')] leva até mim. Agora."
 intrigue_scheme_ongoing.1008.c: "Graças a [ROOT.Char.GetFaith.HighGodNameAlternate] que [councillor.Custom('ES_ElLa')] [councillor.GetTitledFirstNameNoTooltip|l] está lá e pode intervir."
 intrigue_scheme_ongoing.1009.t: "Ajuda"
 intrigue_scheme_ongoing.1009.desc: "[potential_agent.GetTitledFirstName] veio até mim, com um olhar determinado.\n\n"Meu [potential_agent.Custom2('RelationToMe', ROOT.Char)] relutante[potential_agent.Custom('ES_OA')] a me juntar aos seus planos contra meu [potential_agent.Custom2('RelationToMe', SCOPE.sC('target'))], [target.GetTitledFirstName|l], mas acho que já é hora de confiar no seu julgamento neste assunto"."
 intrigue_scheme_ongoing.1009.elope.desc: "[potential_agent.GetTitledFirstName] veio até mim, com um olhar decidido.\n\n"Meu [potential_agent.Custom2('RelationToMe', ROOT.Char)], eu tinha relutad[potential_agent.Custom('ES_OA')] em me juntar aos vossos planos de fugirem com [target.GetTitledFirstName|l], mas agora vejo que [target.GetSheHe] vos importa de verdade"."
 intrigue_scheme_ongoing.1009.a: "Por favor, apoie minha causa, [potential_agent.GetFirstNameNoTooltip]."
 intrigue_scheme_ongoing.1009.b: "Eu só te pediria por um pequeno favor..."
 intrigue_scheme_ongoing.2001.t: "Confiança Mal Colocada"
 intrigue_scheme_ongoing.2001.desc: "A natureza confiada de [scheme.GetTargetCharacter.GetFirstName] facilitou mais do que o esperado [agent_in_question.Custom('ES_AlAla')] [agent_in_question.GetTitledFirstName|l] em se aproximar de [scheme.GetTargetCharacter.GetTitleTierName], já que [agent_in_question.GetFirstName] oferece conselhos com frequência e [target.GetFirstNameNoTooltip] escuta com muita frequência."
 intrigue_scheme_ongoing.2001.a: "[agent_in_question.GetSheHe|U] deve continuar oferecendo bons conselhos, até que..."
 intrigue_scheme_ongoing.2001.b: "[agent_in_question.GetFirstName] pode garantir que outros agentes possam ir e vir."
 intrigue_scheme_ongoing.2002.t: "O Alvo Bêbado"
 intrigue_scheme_ongoing.2002.desc: "A [target.GetTitledFirstName|l] gosta demais de bebida, o que faz com que às vezes aja de forma irracional.\n\nSeria muito simples para [agent_in_question.GetTitledFirstName|l] [target.GetHerHim] mimá-lo(a) um pouco e garantir que esses hábitos continuem."
 intrigue_scheme_ongoing.2002.a: "Vou ajudar [agent_in_question.GetFirstNameNoTooltip] a importar a bebida mais potente!"
 intrigue_scheme_ongoing.2002.b: "Farei com que [target.Custom('ES_ElElla')] se sinta à vontade entregando-se aos seus excessos."
 intrigue_scheme_ongoing.2002.c: "Ha! Esse[target.Custom('ES_EA')] idiota não conhece as próprias fraquezas!"
 intrigue_scheme_ongoing.2003.t: "Espionagem Feliz Acaso"
 intrigue_scheme_ongoing.2003.bad_habits: "Não era o que [agent.GetTitledFirstName|l] esperava encontrar ao espionar conversas secretas, mas descobrir a verdade sobre os hábitos incomuns de [other_secret_target.GetTitledFirstName|l] não faz mal..."
 intrigue_scheme_ongoing.2003.secret_relationships: "Não era o que [agent.GetTitledFirstName|l] esperava encontrar ao espionar conversas secretas, mas descobrir os relacionamentos ilícitos de [other_secret_target.GetTitledFirstName|l] não faz mal..."
 intrigue_scheme_ongoing.2003.bastardy: "Não era o que [agent.GetTitledFirstName|l] esperava encontrar ao espionar conversas secretas, mas descobrir a verdade sobre a origem de [secret_target.GetTitledFirstName|l] não faz mal..."
 intrigue_scheme_ongoing.2003.murder: "Não era o que [agent.GetTitledFirstName|l] esperava encontrar ao espionar conversas secretas, mas descobrir os terríveis crimes de [other_secret_target.GetTitledFirstName|l] não faz mal..."
 intrigue_scheme_ongoing.2003.desc: "Não era o que [agent.GetTitledFirstName|l] esperava encontrar ao espionar conversas secretas, mas descobrir a verdade sobre [other_secret_target.GetTitledFirstName|l] não faz mal..."
 intrigue_scheme_ongoing.2003.a: "Talvez isso possa ajudar em meus esforços?"
 intrigue_scheme_ongoing.3001.t: "Justiça e Sigilo"
 intrigue_scheme_ongoing.3001.desc: "A maneira como estou agindo ultimamente... O sigilo e as tramas nas sombras. Isso não pode estar certo. Isso não pode ser justo."
 intrigue_scheme_ongoing.3001.a: "Eu faço o que devo!"
 intrigue_scheme_ongoing.3001.b: "Se precisa ser feito, deve ser feito corretamente."
 intrigue_scheme_ongoing.3002.t: "O Fardo da Mentira"
 intrigue_scheme_ongoing.3002.desc: "Todos esses planos secretos e padrões sombrios... Uma mão gelada agarra meu coração sempre que penso neles. Isso parece tão errado."
 intrigue_scheme_ongoing.3002.a: "Isso é o que precisa ser feito!"
 intrigue_scheme_ongoing.3002.b: "Eu passo tempo demais pensando nisso."
 intrigue_scheme_ongoing.3002.c: "[ROOT.Char.GetFaith.HighGodName], perdoe-me, o que eu tenho feito?"
 intrigue_scheme_ongoing.3002.d: "Devo ser sincer[ROOT.Char.Custom('ES_OA')] com minhas intenções."
 #Map wilderness outside of target location
 intrigue_scheme_ongoing.3003.t: "Em Trânsito"
 intrigue_scheme_ongoing.start.3003.desc: "Quando chegar a hora, meus agentes vão precisar de uma"
 intrigue_scheme_ongoing.escape_route.3003.desc: "uma rota segura para escapar de [defender.Custom('ResidenceBuilding')] de [defender.GetTitledFirstName|l] caso algo dê errado."
 intrigue_scheme_ongoing.leave_with_target.3003.desc: "uma rota segura para retirar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] de [defender.Custom('ResidenceBuilding')] de [defender.GetTitledFirstName|l]."
 intrigue_scheme_ongoing.end.3003.desc: "Um mapa detalhado do [scheme_location.Custom('TerrainTypeProvince')] local, com todos os seus caminhos escondidos e cavernas, seria um recurso inestimável."
 intrigue_scheme_ongoing.3003.a: "Pagar um caçador de [scheme_location.GetNameNoTooltip] para fazer um mapa."
 intrigue_scheme_ongoing.3003.a.success: "O caçador[hunter.Custom('ES_XA')] [hunter.GetShortUIName] é discreto[hunter.Custom('ES_OA')]"
 intrigue_scheme_ongoing.3003.a.failure: "O caçador[hunter.Custom('ES_XA')] [hunter.GetShortUIName] se gaba de sua riqueza recém-adquirida"
 intrigue_scheme_ongoing.3003.d: "Você pergunta ao seu amig[hunter.Custom('ES_OA')] [hunter.GetTitledFirstNameNoTooltip|l]."
 intrigue_scheme_ongoing.3003.b: "Explore o [scheme_location.Custom('TerrainTypeProvince')] você mesmo."
 intrigue_scheme_ongoing.3003.b.success: "Você mapeia a área ao redor de [scheme_location.GetNameNoTooltip]"
 intrigue_scheme_ongoing.3003.b.soft_failure: "Você se perde no [scheme_location.Custom('TerrainTypeProvince')]"
 intrigue_scheme_ongoing.3003.b.hard_failure: "Você passa a noite perdid[ROOT.Char.Custom('ES_OA')] no/a [scheme_location.Custom('TerrainTypeProvince')]"
 intrigue_scheme_ongoing.3003.c: "Abandonar a ideia."
 intrigue_scheme_ongoing.3003.e: "Peça ajuda ao seu $master_of_hunt_court_position$ [hunter.GetTitledFirstNameNoTooltip|l]."
 intrigue_scheme_ongoing.3004.t: "O Mapa"
 intrigue_scheme_ongoing.3004.desc: "Meus espiões me informaram sobre um[hunter.Custom('ES_XA')] caçador[hunter.Custom('ES_XA')] que vem causando um alvoroço na taverna local. Ele gastou grandes quantias de moedas, gabando-se em voz alta sobre o grande negócio que fez com um[owner.Custom('ES_XA')] elegante [owner.GetLadyLord] com pérolas e seda.\n\nAparentemente, ele desenhou um mapa da região local de [defender.Custom('TerrainType')] para um[owner.Custom('ES_XA')] nobre desconhecid[owner.Custom('ES_OA')]. Os espiões acreditam que [owner.Custom('ES_ElLa')] [owner.GetLadyLord] deve estar conspirando contra mim ou contra um de meus súditos."
 intrigue_scheme_ongoing.3004.a: "Obrigad por trazer isso à minha atenção."
 intrigue_scheme_ongoing.3004.b: "Esse[hunter.Custom('ES_EA')] idiota deve acabar na minha masmorra!"
 intrigue_scheme_ongoing.3004.c: "Tragam-me[hunter.Custom('ES_LoLa')]. Acho que posso refrescar a memória dele…"
 intrigue_scheme_ongoing.3004.c.tt: "Um [scheme_hostile|lE] ou outro [scheme|lE] malicioso é exposto"
 intrigue_scheme_ongoing.3004.toast: "Esquema exposto"
 #MESSENGER PIGEON
 intrigue_scheme_ongoing.3005.t: "Mensageiro Alado"
 intrigue_scheme_ongoing.3005.desc: "Conforme meu esquema se aproxima da conclusão, a comunicação rápida é essencial. Eu tenho um pombo especialmente inteligente que [pigeon_recipient.GetTitledFirstName|l] poderia usar para enviar uma mensagem urgente para mim aqui em [root_location.GetNameNoTooltip], se houver necessidade.\n\nMas como eu faria o pássaro chegar na [defender.Custom('ResidenceBuilding')] de [target_location.GetNameNoTooltip]?"
 intrigue_scheme_ongoing.3005.c.f: "Esta opção está disponível porque seu agente [elope_agent.GetShortUIName] mantém uma [Concept( 'friend', 'amistad' )|E], é [close_family_member|lE] ou serv[elope_agent.Custom('ES_EA')] de [pigeon_recipient.GetShortUIName]"
 intrigue_scheme_ongoing.3005.a: "Um treinador de pássaros local poderia entregá-lo como um \"presente\"."
 intrigue_scheme_ongoing.3005.a.success: "O \"presente\" chega a [pigeon_recipient.GetShortUIName]"
 intrigue_scheme_ongoing.3005.a.failure: "[defender.GetShortUIName|U] dispensa o treinador de pássaros"
 intrigue_scheme_ongoing.3005.b: "Se eu mesmo enviar o \"presente\", [defender.GetTitledFirstNameNoTooltip|l] não poderia recusar."
 intrigue_scheme_ongoing.3005.c: "Faça com que [elope_agent.GetTitledFirstNameNoTooltip|l] entregue o pássaro."
 intrigue_scheme_ongoing.3005.d: "É muito arriscado."
 intrigue_scheme_ongoing.4001.t: "Um Adulto Responsável"
 intrigue_scheme_ongoing.4001.desc: "[agent_in_question.Custom('ES_ElLa')|U] [agent_in_question.GetTitledFirstName|l] me disse que pediram que ele cuide de um grupo de crianças que brincam na corte.\nQue sorte a nossa que [scheme.GetTargetCharacter.Custom('ES_ElLa')] [scheme.GetTargetCharacter.GetTitledFirstName|l] esteja entre eles.\n\nÉ uma grande oportunidade para que [agent_in_question.Custom('ES_ElLa')] [agent_in_question.GetTitledFirstName|l] faça a próxima jogada."
 intrigue_scheme_ongoing.4001.a: "Ensine a eles o hábito de brincar longe de olhares atentos."
 intrigue_scheme_ongoing.4001.b: "Tente fazer amizade com [scheme.GetTargetCharacter.Custom('ES_ElLa')] [scheme.GetTargetCharacter.GetTitledFirstNameNoTooltip|l] para que confie em você."
 intrigue_scheme_ongoing.4002.t: "A Ingenuidade das Crianças"
 intrigue_scheme_ongoing.4002.desc: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] não consegue nem entender que alguém pudesse fazer planos desonestos, apesar da corte agitada que [target.GetHerHim] cerca.\n\nPela nossa conversa, parece que ele realmente confia em mim!"
 intrigue_scheme_ongoing.4002.a: "Uma oportunidade de me aproximar de sua [target.Custom2('RelationToMe', SCOPE.sC('parent'))]!"
 intrigue_scheme_ongoing.4002.b: "Um esconderijo secreto? Você poderia me mostrar?"
 intrigue_scheme_ongoing.4003.t: "Segundas Intenções"
 intrigue_scheme_ongoing.4003.desc: "[agent_in_question.Custom('ES_ElLa')|U] [agent_in_question.GetTitledFirstName|l] veio me ver preocupad[agent_in_question.Custom('ES_OA')] pela trama na qual [agent_in_question.GetHerHim] envolvi. É verdade que pedi que se tornasse amig[agent_in_question.Custom('ES_OA')] [scheme.GetTargetCharacter.Custom('ES_DelDela')] [scheme.GetTargetCharacter.GetTitledFirstName|l], mas nunca quis que se envolvesse emocionalmente!\n\nComeço a duvidar de até que ponto posso confiar em [agent_in_question.GetSheHe]…"
 intrigue_scheme_ongoing.4003.a: "\"Não me faça lembrar o motivo pelo qual você está me ajudando em primeiro lugar!\""
 intrigue_scheme_ongoing.4003.b: "Vou reduzir discretamente o envolvimento deles no meu plano."
 intrigue_scheme_ongoing.5001.t: "Uma Distração Necessária"
 intrigue_scheme_ongoing.5001.desc: "Levam-me até quem se encarrega de lavar as roupas dos guardas [target.Custom('ES_DelDela')][target.GetTitledFirstName|l]. Ninguém vai notar se [servant.Custom('ES_ElElla')] mexer nas roupas deles! E se fosse possível colocar algo que distraísse os guardas…\n\n"O que desejais de mim, [ROOT.Char.Custom('FormOfAddressForLiege')]?"."
 intrigue_scheme_ongoing.5001.a: "Quero que você triture bem finamente quadris de rosas..."
 intrigue_scheme_ongoing.5001.b: "Corte buracos em suas roupas. Em áreas impróprias."
 intrigue_scheme_ongoing.5002.t: "Escrito nas Estrelas"
 intrigue_scheme_ongoing.5002.desc: "Um[target.Custom('ES_XA')] [target.GetTitleAsNameNoTooltip|l] para assustar, [local_mystic.GetName], [Select_CString(local_mystic.IsFemale, 'uma mística', 'um místico')] local de moral duvidosa e um presságio inventado... Perfeito.\n\nAntes que [Select_CString(local_mystic.IsFemale, 'a mística', 'o místico')] vá à corte [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], só resta uma pergunta: meu falso presságio será de boa fortuna ou de perdição?"
 intrigue_scheme_ongoing.5002.a: "Um mau presságio para um mau[target.Custom('ES_XA')] [target.GetTitleAsNameNoTooltip], maus presságios!"
 intrigue_scheme_ongoing.5002.a.tt: "Acredito que é mais fácil afetar [target.GetFirstNameNoTooltip] com más notícias"
 intrigue_scheme_ongoing.5002.a.success: "[target.GetSheHe|U] passa muitas noites sem dormir preocupad"
 intrigue_scheme_ongoing.5002.a.failure: "[target.GetSheHe|U] fica apenas mais vigilante"
 intrigue_scheme_ongoing.5002.b: "Um bom presságio para lhe dar uma falsa sensação de segurança."
 intrigue_scheme_ongoing.5002.b.tt: "Acredito que [target.GetFirstNameNoTooltip] é mais propenso a acreditar em boas notícias"
 intrigue_scheme_ongoing.5002.b.success: "[target.GetSheHe|U] baixa a guarda"
 intrigue_scheme_ongoing.5002.b.failure: "[target.GetSheHe|U] fica mais cautelos[target.Custom('ES_OA')]"
 intrigue_scheme_ongoing.5003.t: "O Presságio"
 intrigue_scheme_ongoing.5003.desc_opening: "[Select_CString(local_mystic.IsFemale, 'Uma mística', 'Um místico')] local, [local_mystic.GetName], insistiu em me ver e, ao ser trazid[local_mystic.Custom('ES_OA')] à minha presença, começou a lamentar, e... aquilo é sangue em suas mãos?\n\n"
 intrigue_scheme_ongoing.5003.desc: ""Os sinais! Os sinais não estão a seu favor, meu [target.GetLadyLord|U]! Esquartejei uma galinha e o sangue me mostrou seu futuro. É sombrio e está cheio de morte!""
 intrigue_scheme_ongoing.5003.a: "Bem, isso é sinistro...!"
 intrigue_scheme_ongoing.5004.desc: ""Os sinais! Os sinais estão a seu favor, meu [target.GetLadyLord|U]! Destrinchei uma galinha e seu sangue me mostrou seu futuro. Será glorioso!"."
 intrigue_scheme_ongoing.5004.a: "Bem... obrigad?"
 intrigue_scheme_ongoing.5005.t: "Tudo o que Reluz"
 intrigue_scheme_ongoing.5005.desc: "Meu [spymaster.GetCouncilTitle|l], [spymaster.Custom('ES_ElLa')] [spymaster.GetTitledFirstName|l], aproxima-se de mim com um sorriso torcido.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], esta bolsa contém um pó muito perverso. Se for polvilhado sobre algo… por exemplo, um presente para [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l], não deixará rastro, mas afetará com fraqueza e maus humores qualquer um que o toque"."
 intrigue_scheme_ongoing.5005.a: "Ora, ora, ora… Eu diria que [target.GetFirstName] merece um presente."
 intrigue_scheme_ongoing.5005.b: "[target.GetFirstName] não receberá ouro de mim!"
 intrigue_scheme_ongoing.5006.t: "O Presente"
 intrigue_scheme_ongoing.5006.desc: "[owner.GetTitledFirstName] me enviou um presente, uma caixa ricamente decorada cheia de ouro. Enquanto passo as mãos pelas moedas, sinto como se o ambiente estivesse girando ao meu redor e minha respiração fica ofegante."
 intrigue_scheme_ongoing.5006.a: "Que inesperado! E que efeito curioso."
 intrigue_scheme_ongoing.5007.t: "O Ouro Envenenado"
 intrigue_scheme_ongoing.5007.desc_opening: "M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('poisoned'))], [poisoned.GetTitledFirstName|l], se aproxima de mim com suor escorrendo de sua testa e o rosto pálido.\n\n"
 intrigue_scheme_ongoing.5007.desc: "\"[ROOT.Char.GetMotherFather], algo está errado. Meus humores estão desequilibrados desde que ajudei a preparar aquele presente para [target.GetTitledFirstName|l]...\""
 intrigue_scheme_ongoing.5007.a: "O que poderia ter... O ouro envenenado!"
 intrigue_scheme_ongoing.5007.a.tt: "Que [ROOT.Char.GetFaith.HighGodName] lhe ajude!"
 intrigue_scheme_ongoing.5008.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], meus humores têm estado desequilibrados desde que vos ajudei a embrulhar aquele presente para [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l]… Temo que a mácula do ouro também me tenha afetado"."
 intrigue_scheme_ongoing.5008.a: "Maldição."
 intrigue_scheme_ongoing.5009.t: "O Túnel"
 intrigue_scheme_ongoing.5009.desc: "Recebo relatos de uma grande concentração de ratos ao redor de [target.Custom('ResidenceBuilding')] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] e, como tenho jeito com os animais, saio para investigar.\n\nQuando chego à área, os ratos convergem para mim, me saudando, e me levam a um túnel escuro a alguma distância do [target.Custom('ResidenceBuilding')]."
 intrigue_scheme_ongoing.5009.a: "Mostrem-me o caminho, meus amigos!"
 intrigue_scheme_ongoing.5009.a.tt: "Pergunto onde isso #EMP roedores#!"
 intrigue_scheme_ongoing.5009.b: "Eca. Não vou entrar lá."
 intrigue_scheme_ongoing.5010.desc: "Está escuro e o correteio de patinhas ecoa no ar pesado com o fedor do lixo.\n\nDe repente, uma lufada de ar fresco me alcança, e vejo a luz se filtrando por uma grade adiante. As ratazanas me levaram a um túnel que vai direto para o(a) [target.Custom('ResidenceBuilding')] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]!"
 intrigue_scheme_ongoing.5010.a: "Obrigad, meus amigos!"
 intrigue_scheme_ongoing.5010.b: "*Cof, cof* Obrigad, meus amigos! Mas esse cheiro...!"
 intrigue_scheme_ongoing.5011.t: "O Bichinho"
 intrigue_scheme_ongoing.5011.desc: "Uma grande variedade de criaturas venenosas me saúda em uma barraca de comerciante, e sou tomad pela inspiração. Não seria uma dessas criaturas exóticas o presente perfeito para [target.GetTitledFirstName]?"
 intrigue_scheme_ongoing.5011.a: "Uma das suas criaturas mais veneno– interessantes, por favor."
 intrigue_scheme_ongoing.5011.a.tt: "[target.GetSheHe|U] jamais esperará isso!"
 intrigue_scheme_ongoing.5011.b: "Me dê aquela [SCOPE.Custom('VenomousCreature')] para estudos."
 intrigue_scheme_ongoing.5012.desc: "O comerciante colocou a [SCOPE.Custom('VenomousCreature')] em uma cesta de vime sem fazer perguntas. No caminho para casa, abro a tampa, mas para minha surpresa, ela está vazia..."
 intrigue_scheme_ongoing.5012.a: "Onde ela foi...? Onde– AHH!"
 intrigue_scheme_ongoing.5013.desc: "\n\n\"Olha, mamãe, olha! É[ROOT.Char.Custom('ES_EA')] [ROOT.Char.Custom('ES_SennorSennora')] tem um animal na cabeça!\", exclama uma voz alegre atrás de mim. Ao me virar, vejo que uma multidão se juntou."
 intrigue_scheme_ongoing.5013.a: "Tcharã! Agora, tire isso. Tire isso, eu disse #EMP abajo#!!"
 intrigue_scheme_ongoing.5013.a.tt: "Perdi a criatura, mas ao menos não perdi a vida..."
 intrigue_scheme_ongoing.5014.t: "Tapete Plush e Exótico"
 intrigue_scheme_ongoing.5014.t_persian: "$persian_has_plush_carpet_modifier$"
 intrigue_scheme_ongoing.5014.desc: "Macio, vibrante e suave como a primeira luz da alvorada — um comerciante me apresenta um tapete requintado na esperança de futuras boas relações.\n\nEnquanto admiro a bela trama, tenho uma ideia. Não seria um tapete como esse capaz de abafar o som dos passos? Ou até mesmo ocultar os passos de um agente desajeitado...?"
 intrigue_scheme_ongoing.5014.a: "[target.GetTitledFirstNameNoTooltip|l] ficará honrad com um presente assim."
 intrigue_scheme_ongoing.5014.a.success: "[target.GetSheHe|U] aceita o presente"
 intrigue_scheme_ongoing.5014.a.failure: "[target.GetSheHe|U] suspeita que algo está errado"
 intrigue_scheme_ongoing.5014.b: "Ele ficaria #EMP ótimo#! nos meus aposentos..."
 intrigue_scheme_ongoing.5015.desc: "Recebo de presente um tapete macio, brilhante e suave [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l].\n\nNão sei por que me envia um presente tão requintado, mas o fino tecido do tapete é tão agradável ao toque quanto a pele de um amante."
 intrigue_scheme_ongoing.5015.a: "Esse tapete cobrirá os pisos dos meus aposentos!"
 intrigue_scheme_ongoing.5015.b: "Acho melhor me livrar dele..."
 intrigue_scheme_ongoing.5016.t: "O Poder das Palavras"
 intrigue_scheme_ongoing.5016.desc: "Tenho diante [servant.Custom('ES_AlAla')] [servant.GetTitledFirstName|l], um[servant.Custom('ES_XA')] serviç[servant.Custom('ES_OA')] [target.Custom('ES_DelDela')] [target.Custom2('InsultAdjective', ROOT.Char)] [target.GetTitledFirstName|l].\n\n"Olhem, quero que façam uma coisa para mim… E, claro, vocês serão razoavelmente recompensados.""
 intrigue_scheme_ongoing.5016.a: "Palavras sussurradas podem derrubar [target.Custom('ES_AlAla')] [target.GetTitleAsNameNoTooltip]!"
 intrigue_scheme_ongoing_5016_every_courtier: "Qualquer cortesão e convidado que não seja um agente"
 intrigue_scheme_ongoing.5016.b: "Mantenha as portas da [target.Custom('ResidenceBuilding')] abertas para mim."
 intrigue_scheme_ongoing.5016.c_man: "Deixe pra lá. Volte correndo para o seu mestre."
 intrigue_scheme_ongoing.5016.c_woman: "Deixe pra lá. Volte correndo para a sua mestra."
 intrigue_scheme_ongoing.5017.t: "[target.Custom2('RelationToMe', SCOPE.sC('spouse'))] Crédul"
 intrigue_scheme_ongoing.5017.desc: "Mal consigo conter meu júbilo ao encontrar [spouse.Custom('ES_AlAla')] [spouse.GetTitledFirstName|l], [target.Custom2('RelationToMe', SCOPE.sC('spouse'))] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], esperando-me com um pequeno séquito. Se eu conseguisse que #EMP [spouse.GetSheHe]#! me ajudasse em meu plano…\n\n\"Ouvi dizer que queríeis me ver, [ROOT.Char.Custom('FormOfAddressForLiege')]?\"."
 intrigue_scheme_ongoing.5017.a: "Seu/sua [spouse.Custom2('RelationToMe', SCOPE.sC('target'))] tem chamado você de [spouse.Custom2('InsultAdjectiveArticle', ROOT.Char)] [spouse.Custom2('InsultNoun', ROOT.Char)]."
 intrigue_scheme_ongoing.5017.a.success: "[spouse.GetTitledFirstNameNoTooltip|l] acredita em mim"
 intrigue_scheme_ongoing.5017.a.failure: "[target.GetTitleAsNameNoTooltip] [spouse.GetHerHim] convence de que é mentira"
 intrigue_scheme_ongoing.5017.b: "Por favor, me fale sobre [target.Custom('ResidenceBuilding')]!"
 intrigue_scheme_ongoing.5018.t: "Seguidores do Acampamento"
 intrigue_scheme_ongoing.5018.desc: "[target.Custom('ES_ElLa')|U] [target.Custom2('InsultAdjective', ROOT.Char)] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] está em guerra.\n\nEstá atualmente acampad[target.Custom('ES_OA')] em [location.GetName] e minhas fontes me dizem que em breve receberá mais seguidores de acampamento… É uma oportunidade perfeita para colocar minha gente no acampamento dele!"
 intrigue_scheme_ongoing.5018.a: "Invisíveis na multidão, eles me informarão tudo."
 intrigue_scheme_ongoing.5018.b: "Farinha, trigo, carne... Queime tudo."
 intrigue_scheme_ongoing.5018.msg.t: "Suprimentos queimados em acidente"
 intrigue_scheme_ongoing.5019.t: "Túnel Secreto"
 intrigue_scheme_ongoing.5019.desc: "Meu agente [agent.GetTitledFirstName|l] se aproxima de mim com um punhado de pergaminhos em suas mãos.\n\n“Encontrei antigos croquis arquitetônicos da residência de [target.GetTitleAsName]! Eles podem estar um pouco desatualizados, mas veja aqui…”"
 intrigue_scheme_ongoing.5019.a: "Parece um túnel que podemos usar!"
 intrigue_scheme_ongoing.5019.b: "Se eu tivesse tantos esconderijos assim... Chame meus arquitetos."
 intrigue_scheme_ongoing.5019.b.tt: "Seu[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('architect'))|U] [architect.GetFirstNameNoTooltip] supervisionará as obras de construção."
 intrigue_scheme_ongoing.5021.t: "Preocupações Precárias"
 intrigue_scheme_ongoing.5021.desc: "Vou até os aposentos de minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l], mas em seus [owner.Custom('GetChamber')] não há ninguém.\n\nFolheio sem pressa os papéis dele e me deparo com algo: planos, sem dúvida, contra [target.Custom2('MyCharacterIntroduction', ROOT.Char)]!"
 intrigue_scheme_ongoing.5021.a: "O que significa isso, [owner.GetFirstNameNoTooltip]?!"
 intrigue_scheme_ongoing.5021.a.success: "[owner.GetSheHe|U] está realmente tramando matar"
 intrigue_scheme_ongoing.5021.a.success.tt: "O plano é exposto"
 intrigue_scheme_ongoing.5021.a.failure: "[owner.GetSheHe|U] está ofendid[owner.Custom('ES_OA')]"
 intrigue_scheme_ongoing.5021.b: "Eu não vi #EMP nada#!"
 intrigue_scheme_ongoing.5022.t: "Acusações"
 intrigue_scheme_ongoing.5022.desc: "“Você está planejando matar alguém?”.\n\n[family_member.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] me confronta com uma expressão horrorizada no rosto. Em sua mão, ele(a) segura papéis com anotações sobre meu plano de matar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l]... Eu sabia que havia deixado esses papéis em meu estudo particular."
 intrigue_scheme_ongoing.5022.a: "Eu nunca #EMP faria isso#!"
 intrigue_scheme_ongoing.5022.a.success: "[family_member.GetSheHe|U] acredita em você"
 intrigue_scheme_ongoing.5022.a.failure: "[family_member.GetSheHe|U] não acredita em seus argumentos"
 intrigue_scheme_ongoing.5022.b: "É o melhor a fazer. Me ouça agora..."
 intrigue_scheme_ongoing.5022.b.success: "[family_member.GetSheHe|U] escuta seus argumentos"
 intrigue_scheme_ongoing.5022.b.failure: "Não [family_member.Custom('ES_LoLa')] conquista"
 intrigue_scheme_ongoing.5022.c: "Parece que meus planos acabaram de se complicar."
 intrigue_scheme_ongoing.5023.desc: ""Você não devia ver isso".\n\nA voz [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l] é baixa, mas percebo sua raiva. Ao levar a mão ao cinto, dou um passo para trás, mas antes que eu tenha tempo de fazer qualquer coisa [owner.GetHerHim] está sobre mim, com a faca na mão."
 intrigue_scheme_ongoing.5023.a: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('owner'))|U], por favor– Aaaah!"
 intrigue_scheme_ongoing.5024.t: "Celebração em [province.GetNameNoTooltip|U]"
 intrigue_scheme_ongoing.5024.desc: "[agent.GetTitledFirstName] me diz que uma celebração local em [province.GetName] — a terra natal de [target.GetTitledFirstName|l] — está com dificuldades financeiras.\n\n\"Se ela for realizada, atrairá muitas pessoas, tanto nobres quanto plebeus, para a região; uma oportunidade perfeita para a infiltração!\""
 intrigue_scheme_ongoing.5024.a: "Aqui. Garanta que seja realizada."
 intrigue_scheme_ongoing.5024.b: "Não vou desperdiçar dinheiro com [target.Custom('ES_ElElla')]!"
 intrigue_scheme_ongoing.5026.t: "Uma Mão Amiga"
 intrigue_scheme_ongoing.5026.desc: "Como todos os [target.GetFaith.GetAdherentNamePluralNoTooltip], [target.Custom2('MyCharacterIntroduction', ROOT.Char)] compartilha mais com [target.GetFaith.HighGodName] e, por extensão, com [court_chaplain.GetTitledFirstName|l] do que com a maioria dos mortais.\n\nAh, se ao menos eu conseguisse que [court_chaplain.GetCouncilTitle] me transmitisse alguns dos medos e planos de [target.GetTitledFirstNameNoTooltip|l]...!"
 intrigue_scheme_ongoing.5026.a: "\"É para o bem da fé!\""
 intrigue_scheme_ongoing.5026.a.success: "[court_chaplain.GetSheHe|U] me ajuda"
 intrigue_scheme_ongoing.5026.a.failure: "[court_chaplain.GetSheHe|U] se recusa"
 intrigue_scheme_ongoing.5026.a_gregarious: "\"Vamos dar um passeio.\""
 intrigue_scheme_ongoing.5026.a_gregarious_tt: "Nem vai perceber que me está contando #EMP todo#!"
 intrigue_scheme_ongoing.5026.b_agent: "\"Você já concordou em me ajudar, então...\""
 intrigue_scheme_ongoing.5026.b: "\"Mas de acordo com [target.GetFaith.HighGodName]...\""
 intrigue_scheme_ongoing.5026.b_scholar: "\"Vamos ver o que [target.GetFaith.HighGodName] deseja.\""
 intrigue_scheme_ongoing.5026.b_scholar_tt: "Que coincidência que será o mesmo que eu desejo!"
 intrigue_scheme_ongoing.5026.c: "Isso é entre [target.GetSheHe] e [target.GetFaith.PantheonTerm]."
 intrigue_scheme_ongoing.3010.t: "[scheme.GetNameNoTooltip]: Segredos de [target.GetCulture.GetLanguage.GetNameNoTooltip]"
 intrigue_scheme_ongoing.3010.desc: "Como parte do meu plano em andamento para [scheme.GetNameNoTooltip|l] [target.GetTitledFirstName|l], alguns dos meus asseclas interceptam regularmente suas cartas. Graças à minha compreensão especializada de [target.GetCulture.GetLanguage.GetName], eu poderia lê-las pessoalmente em vez de depender de traduções de segunda mão, embora certamente tomaria tempo de algumas das minhas obrigações.\n\nTalvez eu obtivesse informações valiosas dessa maneira?"
 intrigue_scheme_ongoing.3010.a: "Vou traduzir o [target.GetCulture.GetLanguage.GetNameNoTooltip] eu mesmo."
 intrigue_scheme_ongoing.3010.b: "Parece ser muito trabalho para mim."
 intrigue_scheme_ongoing.3011.t: "[scheme.GetNameNoTooltip]: O código [language_culture.GetLanguage.GetNameNoTooltip]-[language_culture_2.GetLanguage.GetNameNoTooltip]-[multilingual_agent.GetCulture.GetLanguage.GetNameNoTooltip]"
 intrigue_scheme_ongoing.3011.desc: "Em meu complô para [scheme.GetNameNoTooltip|l] [target.GetTitledFirstName|l] contei com a ajuda de [multilingual_agent.GetName], que parece uma espécie de enciclopédia quando se trata de idiomas. Usando seu vasto conhecimento de diversos dialetos, criou um código que afirma ser "indecifrável".\n\n"Não apenas seria necessário um mestre criptógrafo: também teria de entender as sutilezas da gramática de [language_culture_2.GetLanguage.GetNameNoTooltip], os detalhes dos provérbios de [language_culture.GetLanguage.GetNameNoTooltip] enquanto mantém em mente a estrutura das palavras em [multilingual_agent.GetCulture.GetLanguage.GetNameNoTooltip]"."
 intrigue_scheme_ongoing.3011.a: "Excelente iniciativa."
 intrigue_scheme_ongoing.3011.b: "Parece ser uma perda de tempo."
