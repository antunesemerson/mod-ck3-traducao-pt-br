l_spanish:
 fabricate_hook_header: "Fabricar Gancho:"
 fabricate_hook_hook_gained_on_you: "@warning_icon [owner.GetShortUIName] fabricou um [hook|E] sobre você!"
 fabricate_hook_outcome.0001.t: "$fabricate_hook_header$ Um Segredo"
 fabricate_hook_outcome.0001.desc: "Parece que [target.GetTitledFirstName|l] tem algo a esconder. Por sorte para mim, não preciso mais usar tanta criatividade para colocar [target.GetHerHim] sob meu controle."
 fabricate_hook_outcome.0001.a: "Tudo que preciso fazer é contar-lhe o que sei..."
 fabricate_hook_outcome.0001.b: "Guardarei isso em segredo por enquanto."
 fabricate_hook_outcome.0001.c: "Ah, isso é algo que todos deveriam saber!"
 fabricate_hook_outcome.1001.t: "$fabricate_hook_header$ Uma Situação Comprometedora"
 fabricate_hook_outcome.1001.desc: "Todo el mundo se desnuda #EMP alguna vez.#! Lo complicado es conseguir que la troupe de malabaristas entre en los aposentos [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] en el momento adecuado y que haya suficientes criados cerca para especular con el caos resultante.\n\nSospecho que [target.GetFirstNameNoTooltip] hará lo que sea para impedirme que aliente las llamas de los rumores posteriores…"
 fabricate_hook_outcome.1001.a: "Mandem entrar os artistas!"
 fabricate_hook_outcome.1001.a.flavor: "Ah, falar com malabaristas. De novo."
 fabricate_hook_outcome.1001.b: "Devo pensar melhor sobre isso."
 fabricate_hook_outcome.1001.c: "Tudo isso foi um grande erro."
 fabricate_hook_outcome.1002.t: "$fabricate_hook_header$ Uma Mensagem Comprometedora"
 fabricate_hook_outcome.1002.desc: "Al detener a un mensajero de la corte [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], la oportunidad se ha presentado sola.\n\n"
 fabricate_hook_outcome.1002.desc.vassals: "Se eu copiar o selo [target.Custom('ES_DelDela')] [target.GetTitleAsName|l], posso forjar uma carta ameaçando aumentar os impostos e fazê-la circular entre seus vassalos. Ou, pelo menos, ameaçar fazê-lo..."
 fabricate_hook_outcome.1002.desc.no_vassals: "Ao copiar o selo [target.Custom('ES_DelDela')] [target.GetTitleAsName|l], posso forjar uma carta ameaçando aumentar os impostos e circulá-la entre os cortesãos. Ou, pelo menos, ameaçar fazê-lo..."
 fabricate_hook_outcome.1002.a: ""Essa #EMP é#! a sua assinatura, não é?""
 fabricate_hook_outcome.1003.t: "$fabricate_hook_header$ Um Resgate Audacioso"
 fabricate_hook_outcome.1003.desc: "¿No seria maravilloso que [target.GetTitledFirstName|l] estuviera en deuda conmigo, no por miedo, sino por gratitud? ¿Y si, por ejemplo, [target.GetHerHim] salvase de unos feroces bandidos en pleno viaje? ¡Sí! Unos feroces bandidos como los hombres que esperan ahora mismo al otro lado de las puertas del castillo.\n\nYo cargaría con mis guardias en el último momento para hacerlos huir. Así, [target.GetFirstNameNoTooltip] estaría en deuda conmigo."
 fabricate_hook_outcome.1003.a: "Tão simples, mas tão convincente."
 fabricate_hook_outcome.1004.t: "$fabricate_hook_header$ Palavras Difamadoras"
 fabricate_hook_outcome.1004.desc: "He lanzado una serie de rumores malignos contra [target.GetTitledFirstName|l]. Ninguno es cierto y alguien debería denunciarlos como las obvias mentiras que son.\n\n¿Qué mejor idea para que [target.GetFirstNameNoTooltip] esté en deuda con #EMP alguien#!?"
 fabricate_hook_outcome.1004.a: "Devo enfrentar essa injustiça!"
 fabricate_hook_outcome.1004.a.flavor: "Meu [ROOT.Char.GetFaith.PriestNeuter] não vai gostar disso."
 fabricate_hook_outcome.1004.a.flavor_sacred_shadows: "Meu [ROOT.Char.GetFaith.PriestNeuter] vai adorar isso!"
 fabricate_hook_outcome.1005.t: "$fabricate_hook_header$ Bárbaro, mas Eficaz"
 fabricate_hook_outcome.1005.desc: "La mejor solución suele ser la más sencilla. ¿Por qué preocuparme con tanta intriga y manipulación cuando simplemente puedo coaccionar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] para que haga lo que yo diga?\n\nUn par de fortachones y unas cartas amenazantes serán suficiente."
 fabricate_hook_outcome.1005.a: "Escrevente! Temos cartas para redigir!"
 fabricate_hook_outcome.1005.a.flavor: ""Minha querida vítima...""
 fabricate_hook_outcome.2001.t: "$fabricate_hook_header$ Um Estratagema Enganoso"
 fabricate_hook_outcome.2001.desc: "¡Haciendo uso de métodos deshonestos, [owner.GetTitledFirstName|l] ha creado toda una trama para coaccionarme!\n\nHe denunciado todas esas mentiras y engaños, pero no tengo más opción que seguirle el juego."
 fabricate_hook_outcome.2001.a: "Achei que isso estivesse abaixo de você, [owner.GetFirstNameNoTooltip]."
 fabricate_hook_outcome.3001.t: "$fabricate_hook_header$ Perdendo a Vantagem"
 fabricate_hook_outcome.3001.desc: "¡[target.GetTitledFirstName] ha descubierto que intento coaccionar[target.GetHerHim] por medios poco honestos!\n\n¡Debo hacer lo que sea para conservar mi reputación!"
 fabricate_hook_outcome.3001.a: "Isso marca o fim dos meus esforços..."
