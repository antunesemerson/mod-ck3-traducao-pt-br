l_spanish:
 #For scripted loc
 own_court_language_scheme_key: "[ROOT.GetScheme.GetOwner.GetCourtLanguage.GetName]"
 liege_court_language_scheme_key: "[ROOT.GetScheme.GetOwner.GetLiege.GetCourtLanguage.GetName]"
 target_character_language_scheme_key: "[ROOT.GetScheme.GetTargetCharacter.GetCulture.GetLanguage.GetName]"
 own_court_language_scheme_key_no_tt: "[ROOT.GetScheme.GetOwner.GetCourtLanguage.GetNameNoTooltip]"
 liege_court_language_scheme_key_no_tt: "[ROOT.GetScheme.GetOwner.GetLiege.GetCourtLanguage.GetNameNoTooltip]"
 target_character_language_scheme_key_no_tt: "[ROOT.GetScheme.GetTargetCharacter.GetCulture.GetLanguage.GetNameNoTooltip]"
 learn_language_ongoing.1000.t: "$learn_language$: A Facilidade da Juventude"
 learn_language_ongoing.1000.desc: "Meu estudo de [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName] está progredindo fantasticamente. É como se eu tivesse toda a concentração e energia do mundo!\n\n\"Meu... nome... é... [fast_learner.GetFirstNameNoTooltip]!\".\n\n\"Eu... gosto... de... comer... [fast_learner.Custom('FavoriteTreatDemand')]!\".\n\nSe eu pudesse #EMP centrarme más aún#! mais ainda, falaria com fluidez em nada!"
 learn_language_ongoing.1000.a: "Dedicarei #EMP todo#! o meu tempo a isso!"
 learn_language_ongoing.1000.b: "Prefiro gastar meu tempo em outro lugar..."
 learn_language_ongoing.1010.t: "$learn_language$: Um Mal-entendido Amoroso"
 learn_language_ongoing.1010.desc: ""… e assim [ROOT.Char.GetTitleTierName] discutia sobre [ROOT.Char.Custom('education_conversation_subject')] com o conselho enquanto [scheme.GetTargetCharacter.GetCouncillorPosition( 'councillor_steward' ).GetPositionName] prosseguia para…".\n\nLevanto os olhos do livro de [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName] apenas para ver [lover_target.GetFirstName] corad[lover_target.Custom('ES_OA')] inclinad[lover_target.Custom('ES_OA')] sobre mim.\n\n"Ora, você está falando #EMP [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetNameNoTooltip]#!?", diz.\n"Bem…, o [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetNameNoTooltip] é a língua do amor e, se não ouvi errado, você acabou de me chamar de [lover_target.Custom('RomanticComplimentNoun')|l] [lover_target.Custom('RomanticComplimentAdjective')]. Que [ROOT.Char.Custom('RomanticComplimentNoun')|l] você é!"."
 learn_language_ongoing.1010.a: "… Sim, claro que sim! É exatamente o que eu quis dizer!"
 learn_language_ongoing.1010.b: "Não, não! Tudo isso é um mal-entendido!"
 learn_language_ongoing.1010.c: "Sai daqui, [lover_target.Custom2('InsultNounSexual', ROOT.Char)]. Preciso me concentrar!"
 outside_help_modifier: "Ajuda Externa"
 learn_language_ongoing.1020.c.success: "Você convence [language_helper.GetFirstNameNoTooltip] a ajudá-lo"
 learn_language_ongoing.1020.c.failure: "[language_helper.GetFirstNameNoTooltip] vê através de sua manipulação"
 learn_language_ongoing.1020.t_hash_collision: "$learn_language$: Ajuda Externa"
 learn_language_ongoing.1020.desc: "Parece que chegou aos ouvidos [language_helper.Custom('ES_DelDela')] [language_helper.GetTitledFirstName|l] que estou estudando [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName]. É um[language_helper.Custom('ES_XA')] falante nativ[language_helper.Custom('ES_OA')] e se oferece para me ajudar nos estudos.\n\n“Não peço mais do que uma recompensa simbólica pelo meu trabalho, meu [ROOT.Char.GetTitleTierName|l]”, diz [language_helper.Custom('quirk_pos_pp')]."
 learn_language_ongoing.1020.a: "Se você ajudar, este ouro será seu."
 learn_language_ongoing.1020.b: "Uma mão lava a outra?"
 learn_language_ongoing.1020.c: "Oh, você é #EMP tão altruísta#! oferecendo ajuda a mim, de graça!"
 learn_language_ongoing.1020.d: "Obrigado, mas acho que consigo me virar sozinh[ROOT.Char.Custom('ES_OA')]."
 learn_language_ongoing.1020.b.success: "[chosen_peasant.GetFirstName] aceita o acordo"
 learn_language_ongoing.1020.b.failure: "[chosen_peasant.GetFirstName] fica insultado com sua oferta"
 gain_artifact_tt: "Você adquire o [artifact|lE] [newly_created_artifact.GetName]"
 steal_artifact_tt: "Você rouba o [artifact|lE] [newly_created_artifact.GetName]"
 learn_language_ongoing.1030.t: "$learn_language$: Um Manual Desgastado"
 learn_language_ongoing.1030.desc: "[chosen_peasant.Custom('ES_ElLa')|U] [chosen_peasant.GetTitledFirstName|l] se aproxima a mim [chosen_peasant.Custom('quirk_pos_pp')].\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], fiquei sabendo que estais estudando [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName]. “Meu pai era comerciante, e ele aprendia qualquer idioma num instante!”, diz.\n\n“Os segredos dele estão neste manual. Não tenho uso para ele, pois não sei ler. Eu me desfaria dele por uma quantia razoável.”"
 learn_language_ongoing.1030.a: "Interessante. Comprarei com prazer."
 learn_language_ongoing.1030.b: "Talvez o que você está pedindo seja um pouco... alto demais."
 learn_language_ongoing.1030.c: "Um ótimo presente! Guardas, façam com que me o entregue."
 learn_language_ongoing.1030.d: "Bobagem! Sai daqui, charlata[chosen_peasant.Custom('ES_AnAna')]!"
 learn_language_ongoing.1040.t: "$learn_language$: Admiração"
 learn_language_ongoing.1040.desc: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName], a quem procuro emular em minha tentativa de aprender [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName], ultimamente começou a me escrever.\n\nRecebi várias cartas nas quais elogia meus esforços para aprender sua língua, chamando-os de respeitáveis e admiráveis!\n\nÉ bom que meu esforço seja reconhecido!"
 learn_language_ongoing.1040.a: "Escrevas! Envie uma mensagem de agradecimento."
 learn_language_ongoing.1040.b: "A caligrafia de [target.GetFirstNameNoTooltip] é interessante…"
 learn_language_ongoing.1040.c: "Bah! Eu não preciso de validação de ninguém além de #EMP mim mesmo!#!"
 extra_success_chance_modifier: "Chance de Sucesso Aumentada"
 massive_extra_success_chance_modifier: "Aumento Massivo da Chance de Sucesso"
 tutorial_success_chance_modifier: "$extra_success_chance_modifier$"
 learn_language_ongoing.1050.t: "$learn_language$: Pés de Corvo"
 learn_language_ongoing.1050.desc: "Meus preciosos apontamentos de [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName] estão espalhados por todo o meu estúdio, e o corvo encharcado de tinta está #EMP ainda#! batendo as asas por toda parte! Como ele entrou aqui? #EMP Quem o cobriu de tinta!?#!\n\nUma carta para você, meu [ROOT.Char.GetTitleTierName|l]. Me viro e arranco a mensagem da mão do criado.\n\nQue pena o que aconteceu com seus apontamentos. Mas veja pelo lado positivo, sua caligrafia já se assemelhava às marcas de um corvo! Saudações, [sabotage_rival.Custom('ES_ElLa')] [sabotage_rival.GetTitledFirstName|l]."
 learn_language_ongoing.1050.a: "Minhas anotações... não! Tanto trabalho, perdido!"
 learn_language_ongoing.1050.b: "[sabotage_rival.GetTitledFirstNameNoTooltip|l] merece #EMP MORRER!#!"
 learn_language_ongoing.1050.c: "Ha-Hah! Sempre guardo #EMP cópias das minhas anotações!#!"
 learn_language_ongoing.1060.t: "$learn_language$: Perdido na Tradução"
 learn_language_ongoing.1060.desc: ""… o alquimista se esticou para pegar tal [target.Custom('RandomWeirdObject')] enquanto seu [target.Custom('lowly_servant_type')] olhava com medo, e então…". De repente, sou interrompid[ROOT.Char.Custom('ES_OA')] por um[offended_character.Custom('ES_XA')] furibund[offended_character.Custom('ES_OA')] [offended_character.GetTitledFirstName|l].\n\n"Vocês acabaram de chamar \"[offended_character.Custom2('InsultNoun', SCOPE.sC('offended_character'))]\" e \"[offended_character.Custom2('InsultNounSexual', SCOPE.sC('offended_character'))]\" do meu [offended_character.Custom('MotherFather')]?!", grita. "Exijo uma compensação por este insulto gravíssimo!".\n\nTalvez eu precise praticar mais meu [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName]…"
 learn_language_ongoing.1060.a: "Peço mil desculpas! Espero que isso seja suficiente."
 learn_language_ongoing.1060.b: "Não, você entendeu errado! [offended_character.Custom('ES_LeLa')|U] chamei #EMP [offended_character.Custom('ComplimentAdjective')]#! e também #EMP [offended_character.Custom('RomanticComplimentNoun')]!#!"
 learn_language_ongoing.1060.c: "Ha! Sim, eu disse, e também é #EMP [offended_character.Custom2('InsultAdjective', ROOT.Char)]!#!"
 learn_language_ongoing.1060.d: "Eu estou apenas praticando meu [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetNameNoTooltip]! Foi um erro!"
 extra_careful_modifier: "Cautela Extra"
 carefully_chosen_words_modifier: "Palavras Bem Escolhidas"
 learn_language_ongoing.1060.b.success: "[offended_character.GetHerHim|U] enganas para que acredite que #EMP alababas#! à sua [offended_character.Custom('MotherFather')]"
 learn_language_ongoing.1060.b.failure: "[offended_character.GetFirstNameNoTooltip] percebe a sua mentira"
 learn_language_ongoing.1060.d.success: "Você explica com sucesso que foi um mal-entendido"
 learn_language_ongoing.1060.d.failure: "[offended_character.GetFirstNameNoTooltip] não acredita em você"
 learn_language_ongoing.1070.t: "$learn_language$: Literatura Libertina"
 learn_language_ongoing.1070.desc: "Enquanto leio em voz alta o livro de [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName] que [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] me enviou há algum tempo, noto um grupo inteiro de criados rindo de mim…\n\n\"Por favor, não parem de ler!\", os criados riem.\n\"[ROOT.Char.GetSheHe|U] estava prestes a mostrar sua(s) [ROOT.Char.Custom('ObjectifiedFeature')]! Precisamos saber se tal [ROOT.Char.GetTitleTierName] e seu [target.Custom('lowly_servant_type')] acabam juntos, ou se aquele(a) [target.Custom2('InsultNounSexual', ROOT.Char)|l] volta a se intrometer entre os dois!\".\n\nEstou lendo… #EMP algo lascivo?#! [ROOT.Char.Custom('CulturalCurse')|U]."
 learn_language_ongoing.1070.a: "Guardas, livrem-me deste maldito livro!"
 learn_language_ongoing.1070.b: "Você ousa rir de mim?! #EMP Açoitá-los todos.#!"
 learn_language_ongoing.1070.c: "Bem, eu suponho que isso #EMP seja#! educacional, de certa forma..."
 erotic_novel_connoisseur_modifier: "Conhecedor de Novelas Eróticas"
 lauded_loud_reader_modifier: "Leitor Barulhento Louvado"
 lauded_loud_reader_modifier_desc: "Este personagem tem entreteve sua corte com leituras em voz alta 'interessantes'."
 learn_language_ongoing.1080.t: "$learn_language$: Uma Lição Ensinada"
 learn_language_ongoing.1080.desc: "Meu tutor[court_tutor.Custom('ES_XA')] da corte, [court_tutor.GetFirstName], tem me ajudado dia e noite em meus esforços para aprender [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName].\n\nSua dedicação à arte de ensinar é inspiradora — não há um dia em que eu não receba uma carta em [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetNameNoTooltip] para ler, uma pessoa erudita da cultura [scheme.GetTargetCharacter.GetCulture.GetNameNoTooltip] com quem conversar ou uma rima mnemônica extraordinária.\n\nCertamente eu não teria chegado tão longe sem a ajuda de [court_tutor.GetFirstNameNoTooltip]."
 learn_language_ongoing.1080.a: "[court_tutor.GetFirstNameNoTooltip], você merece uma recompensa!"
 learn_language_ongoing.1080.b: "Está desempenhando bem o seu trabalho"
 attended_by_tutor_modifier: "Assistido por Tutor da Corte"
 court_tutor_child_language_rank_1_modifier: "$attended_by_tutor_modifier$"
 court_tutor_child_language_rank_2_modifier: "$attended_by_tutor_modifier$"
 court_tutor_child_language_rank_3_modifier: "$attended_by_tutor_modifier$"
 court_tutor_child_language_rank_4_modifier: "$attended_by_tutor_modifier$"
 court_tutor_child_language_rank_5_modifier: "$attended_by_tutor_modifier$"
 learn_language_ongoing.1090.t: "$learn_language$: Sem Espaço Restante"
 learn_language_ongoing.1090.desc: "Aprender [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName] é difícil. Muito difícil.\n\nSinto como se não houvesse mais espaço em minha mente, está cheia. Assim que uma palavra entra em minha mente, outra cai no abismo do esquecimento. Luto em cada lição, não estou fazendo nenhum progresso."
 learn_language_ongoing.1090.friend.desc: "\n\nPor sorte, [helpful_friend.GetTitledFirstName|l] está sempre lá para me ajudar.\n"Continue, meu amig[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('ComplimentAdjective')], eu acredito em você!" continua dizendo [helpful_friend.GetSheHe]. É realmente uma bênção."
 learn_language_ongoing.1090.no_friend.desc: "\n\nTalvez eu precise de uma pausa?"
 learn_language_ongoing.1090.a: "Sempre posso contar com o apoio de [helpful_friend.GetFirstNameNoTooltip]!"
 learn_language_ongoing.1090.b: "Não importa o quão difícil seja, devo perseverar!"
 learn_language_ongoing.1090.c: "Preciso de uma pausa..."
 encouraged_by_friend_modifier: "Encorajado por um Amigo"
 learn_language_ongoing.1100.t: "$learn_language$: O [ROOT.Char.GetTitleTierName] que se Importa"
 learn_language_ongoing.1100.desc: "Não é segredo que estou me esforçando muito para aprender o idioma [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetBaseNameNoTooltip] e parece que isso já se tornou de conhecimento geral entre os camponeses [target.GetCulture.GetCollectiveNounNoTooltip]\n\nReferem-se a mim como "[ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleTierName|l] que se importa", algo realmente lisonjeiro. Até os nobres menores elogiam meus esforços!\n\nSinto como se meu esforço tivesse aproximado [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] e [target.GetCulture.GetCollectiveNounNoTooltip]."
 learn_language_ongoing.1100.a: "Talvez eu devesse fazer um discurso, em #EMP ambos#!, [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetNameNoTooltip] e [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]?"
 learn_language_ongoing.1100.b: "Faça-os me esquecer, não posso me dar ao luxo de distrações."
 learn_language_ongoing.1100.c: "Isso é muito afortunado!"
 learn_language_ongoing.1100.a.success: "Você faz um discurso fantástico"
 learn_language_ongoing.1100.a.failure: "Você faz papel de bobo"
 learn_language_ongoing.1110.t: "$learn_language$: O Encanto da Poesia"
 learn_language_ongoing.1110.desc: "Ah, "[target.Custom('RegionalDrink')|U] junto ao lago", por [the_poet.GetFirstName] de [poet_location.GetNameNoTierNoTooltip]. Certamente, uma grande coletânea de poesia em [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName]!\n\n#POE [ROOT.Char.Custom('GeneratePoem_Title')]#!\n[ROOT.Char.Custom('GeneratePoem_Intro_Rhyming')]\n[ROOT.Char.Custom('GeneratePoem_Outro_Rhyming')]\n\nTalvez eu devesse tentar a poesia também?"
 learn_language_ongoing.1110.a: "Acho que vou tentar!"
 learn_language_ongoing.1110.b: "Talvez eu devesse recitar um poema #EMP romântico#! para [lover_to_be.GetFirstNameNoTooltip]?"
 learn_language_ongoing.1110.c: "Não, eu estou #EMP estudando#!, não tenho tempo para atividades frívolas!"
 poetry_collector_modifier: "Colecionador de Poesias"
 learn_language_ongoing.1110.a.success: "Você se descobre bastante talentoso"
 learn_language_ongoing.1110.a.failure: "Você não consegue rimar nem para salvar a própria vida"
 learn_language_ongoing.1120.t: "$learn_language$: Fábulas Infantis"
 learn_language_ongoing.1120.desc: ""… O sábio de [ROOT.Char.Custom('GetAnimalType')|l] disse então [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.Custom('GirlBoy')]: \"Cuidado, há um…\"". De repente, sou interrompido.\n\n"Como?! [ROOT.Char.Custom('ES_ElLa')|U] grande [ROOT.Char.GetTitleTierName|l] lendo #EMP fábulas infantiles#!! Não tendes orgulho?", exclama [insensitive_asshole.Custom('ES_ElLa')] [insensitive_asshole.GetTitledFirstName|l].\n"É inaceitável! Se vossos inimigos descobrirem isso, pensarão que sois estúpido".\n\nTalvez minha escolha de literatura [scheme.GetTargetCharacter.GetCulture.GetName] tenha sido um pouco… decepcionante aos olhos da [ROOT.Char.Custom('GetCourt')|l]."
 learn_language_ongoing.1120.a: "Não! Estas são... #EMP clássicos venerados do [target.GetCulture.GetNameNoTooltip]!#! É isso!"
 learn_language_ongoing.1120.b: "Você ousa me insultar!? Eu vou lhe mostrar!"
 learn_language_ongoing.1120.c: "Você está certo. Eles não são adequados para um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName]."
 learn_language_ongoing.1120.d: "Deixe as pessoas pensarem o que quiserem. Essas histórias são educativas!"
 learn_language_ongoing.1120.a.success: "Você engana [insensitive_asshole.GetFirstNameNoTooltip], fazendo-o pensar que as fábulas são obras clássicas"
 learn_language_ongoing.1120.a.failure: "Você perde prestígio à medida que sua leitura de fábulas se torna conhecida"
 easily_read_fables_modifier: "Fábulas Fácil de Ler"
 seemingly_feeble_minded_modifier: "Aparentemente de Mente Frágil"
 seemingly_feeble_minded_modifier_desc: "Este personagem é frequentemente visto lendo fábulas infantis, dando a impressão de que sua mente ainda não amadureceu."
 learn_language_ongoing.1120.b.tt: "#V ¡Te bates con#! [insensitive_asshole.GetFirstName] por sua insolência!\n#weak Este duelo NO es a muerte.#!\nSe vencer, ganhará [prestige|lE] [prestige_i] e um [modifier|lE] para a [scheme|lE]. Se perder, será ridicularizado.\n\nSeu [prowess|lE]: #V [root_for_loc.GetProwess]#![prowess_i]\n[prowess|E] de [insensitive_asshole.GetFirstName]: #V [insensitive_asshole.GetProwess]#![prowess_i]"
 learn_language_ongoing.1121.trigger_failure: "Meu duelo contra [insensitive_asshole.GetFirstNameNoTooltip] foi invalidado"
 learn_language_ongoing.1123.t: "$learn_language_ongoing.1120.t$"
 learn_language_ongoing.1123.desc: ""Eu me rendo! Por favor, me perdoem, vocês não são nada de mente fraca! Só me poupem!", exclama [insensitive_asshole.GetTitledFirstName|l].\n\nIsso lhe ensinará a não #EMP insultarme#!."
 learn_language_ongoing.1123.a: "Como [ROOT.Char.Custom('GetAnimalType')|U] sábio disse uma vez: 'Não insulte seus superiores!'"
 learn_language_ongoing.1123.b: "Você vai apodrecer na masmorra por sua insolência!"
 learn_language_ongoing.1124.t: "$learn_language_ongoing.1120.t$"
 learn_language_ongoing.1124.desc: "[insensitive_asshole.GetTitledFirstName] cospe perto de onde você está caído no chão.\n\n\"Você é uma pessoa fraca e patética, desculpa para um [ROOT.Char.GetTitleTierName]. Agora eu farei um favor a você e livrarei você desses livros insensatos.\" [insensitive_asshole.GetSheHe] diz."
 learn_language_ongoing.1124.a: "Um contratempo em meus estudos..."
 learn_language_ongoing.1130.t: "$learn_language$: Amor Vocabular"
 learn_language_ongoing.1130.desc: "«Ah, querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstNameNoTooltip]! Você está aprendendo meu adorado [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName]? Sinto-me tão apreciad[lover_to_help.Custom('ES_OA')] pelo esforço que você faz para me entender!», diz [lover_to_help.Custom('quirk_pos_pp')] [lover_to_help.Custom('ES_ElLa')] [lover_to_help.GetTitledFirstName|l].\n\n«Posso te ajudar de alguma forma? Te ensino algumas palavras?», ele me pergunta."
 learn_language_ongoing.1130.a: "Aceito qualquer ajuda que eu possa obter!"
 learn_language_ongoing.1130.b: "Como se diz: "Venha para meus aposentos, nu[lover_to_help.Custom('ES_OA')]?""
 learn_language_ongoing.1130.c: "Obrigado, mas estou me saindo muito bem."
 motivated_by_love_modifier: "Motivado pelo Amor"
 learn_language_ongoing.1130.a.success: "[lover_to_help.GetFirstNameNoTooltip] é um[lover_to_help.Custom('ES_XA')] bom[lover_to_help.Custom('ES_XA')] professor[lover_to_help.Custom('ES_XA')], embora goste de flertar"
 learn_language_ongoing.1130.a.failure: "[lover_to_help.GetFirstNameNoTooltip] acha apropriado #EMP começar#! suas lições com palavras como 'terpsichorean', 'transmogrify' e 'lugubrious'"
 learn_language_ongoing.1140.t: "$learn_language$: Uma Mão Amiga"
 learn_language_ongoing.1140.desc: ""Você está aprendendo [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName], vejo. Boa escolha; falar isso certamente fortalecerá sua posição como [ROOT.Char.GetTitleTierName|l]", exclama meu [SCOPE.sC('root_for_loc').Custom2('RelationToMeShort', SCOPE.sC('close_one_to_help'))] [close_one_to_help.GetFirstName], [close_one_to_help.Custom('quirk_pos_pp')].\n\n"Falo [target.GetCulture.GetLanguage.GetNameNoTooltip] como um[close_one_to_help.Custom('ES_XA')] nativ[close_one_to_help.Custom('ES_OA')]. Talvez eu possa ajudar, [SCOPE.sC('close_one_to_help').Custom2('RelationToMeShort', SCOPE.sC('root_for_loc'))]?", diz."
 learn_language_ongoing.1140.a: "Você poderia me ajudar a entender essa frase?"
 learn_language_ongoing.1140.b: "Gostaria de se juntar às minhas aulas, a partir de agora?"
 helpful_assistance_modifier: "Assistência Prestativa"
 learn_language_ongoing.1300.t: "$learn_language$: Conversa Agradável"
 learn_language_ongoing.1300.desc: "Ao passarmos por [ROOT.Char.GetCurrentLocation.GetTitle.GetName][Select_CString( interlocutor.IsFemale, 'una lugareña jubilosa', 'un lugareño jubiloso' )] se aproxima do meu grupo. Seu sorriso vai de orelha a orelha. Percebo que está oferecendo uma recepção calorosa, mas, infelizmente, os detalhes de seu discurso me escapam.\n\nSeja como for, afasto meus atentos companheiros e retribuo seu saudoso cumprimento. Mal consigo imaginar oportunidade melhor para praticar meu [interlocutor.GetCulture.GetLanguage.GetName]!"
 learn_language_ongoing.1300.a: "Vamos simplesmente ter uma conversa agradável."
 learn_language_ongoing.1300.a.flavor: "Você tenta engajar em uma conversa sobre as semelhanças e diferenças entre [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip] e [interlocutor.GetCulture.GetLanguage.GetNameNoTooltip]"
 learn_language_ongoing.1300.b: "Estou me sentindo um tanto #EMP briguento#! hoje..."
 learn_language_ongoing.1300.b.flavor: "Você tenta engajar [interlocutor.GetFirstNameNoTooltip] em um debate amigável"
 learn_language_ongoing.1300.b.success: "Você tem um debate envolvente com [interlocutor.GetFirstNameNoTooltip]"
 learn_language_ongoing.1300.b.failure: "Você não consegue se comunicar com [interlocutor.GetFirstNameNoTooltip]"
 learn_language_ongoing.1300.c: "\"Junte-se a nós em nossa jornada para [next_destination.GetNameNoTooltip]!\""
 learn_lang_cult_acceptance_gain_debate: "Envolvido em um debate amigável durante a viagem"
 interlocutor_entourage_member: "Integrante do Séquito como Interlocutor"
