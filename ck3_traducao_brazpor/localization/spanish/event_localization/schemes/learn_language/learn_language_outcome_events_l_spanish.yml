l_spanish:
 learn_language_outcome.1000.t: "$learn_language$: Sucesso!"
 learn_language_outcome.1000.desc: "¡Después de mucho trabajo, por fin he aprendido [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName]! Horas interminables de prácticas de acentuación, noches en vela imitando la flexión, innumerables lecciones para dominar la entonación… Al final todo ha valido la pena.\n\nIncluso he intentado imitar el acento [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]. ¡Estoy segur[ROOT.Char.Custom('ES_OA')] de que le impresionarán mis resultados!\n\nY, por supuesto, los campesinos [target.GetCulture.GetCollectiveNounNoTooltip] me respetarán mucho más."
 learn_language_outcome.1000.a: "Sinto-me realizad[ROOT.Char.Custom('ES_OA')]!"
 learn_language_outcome.1000.b: "Talvez eu devesse enviar uma carta em [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetNameNoTooltip] para [target.GetFirstNameNoTooltip]?"
 learn_language_outcome.1000.b.success: "Eu impressiono [target.GetFirstNameNoTooltip] com meu conhecimento"
 learn_language_outcome.1000.b.failure: "Minha carta soa como uma zombaria desonesta"
 target_responds: "[target.GetTitledFirstName] responde à sua carta"
 learn_language_outcome.1001.opening: "[owner.Custom2('AppropriateGreetingPositive', target)]"
 learn_language_outcome.1001.desc: "He estudiado [target.GetCulture.GetLanguage.GetName] durante muchas lunas. Os dedico esta misiva, escrita personalmente en el alfabeto [target.GetCulture.GetLanguage.GetNameNoTooltip]. ¡Una carta de amistad de un[owner.Custom('ES_XA')] hablante de [owner.GetCulture.GetLanguage.GetName] a otr[target.Custom('ES_OA')]!\n\n¡Ojalá que nuestros futuros tratos diplomáticos beneficien enormemente a nuestros señoríos!"
 learn_language_outcome.1001.a: "¿Ha aprendido [target.GetCulture.GetLanguage.GetNameNoTooltip]? ¡Impresionante, enviadle saludos!"
 learn_language_outcome.1001.b: "¡Ha! ¡Seu vão intento de conquistar glória é risível!"
 learn_language_outcome.2000.t: "$learn_language$: Fracasso"
 learn_language_outcome.2000.desc: "Después tanto esfuerzo… ¡nada! Es #EMP imposible#! aprender [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetName]. Por mucho que lo intente, hablo como un[ROOT.Char.Custom('ES_XA')] bebé recién destetad[ROOT.Char.Custom('ES_OA')] y escribo como un[ROOT.Char.Custom('ES_XA')] sierv[ROOT.Char.Custom('ES_OA')] cieg[ROOT.Char.Custom('ES_OA')] e iletrad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('ES_AlAla')] que le faltasen casi todos los dedos.\n\n¡Bah! Ha sido una pérdida de tiempo…"
 learn_language_outcome.2000.a: "Eu admito a derrota... [scheme.GetTargetCharacter.GetCulture.GetLanguage.GetNameNoTooltip] está além das minhas capacidades."
 learn_language_outcome.2000.b: "Não! Preciso começar de novo e fazer certo desta vez."
 learn_language_outcome.2000.c: "Bem, pelo menos aprendi algumas cortesias muito eficazes!"
 scheme_loses_half_progress: "O [scheme|lE] perde metade do seu progresso, mas permanece ativo"
 learn_language_outcome.3000.t: "$learn_language$: Retomar os estudos?"
 learn_language_outcome.3000.desc: "Por desgracia, [target.GetTitledFirstName|l] ya no está entre nosotros. Es una pena, me fijaba en [target.GetSheHe] para imitar el acento cuando estudiaba [target.GetCulture.GetLanguage.GetName].\n\nDicho esto, no necesito interrumpir mis estudios… ¡solo debo encontrar a otra persona a quien emular!"
 learn_language_outcome.3000.a: "[potential_continuation_target_1.GetTitledFirstNameNoTooltip] tem um belo sotaque!"
 learn_language_outcome.3000.b: "¿Quizás [potential_continuation_target_2.GetTitledFirstNameNoTooltip]? Su dialecto es interesante."
 learn_language_outcome.3000.c: "Pode ser [potential_continuation_target_3.GetTitledFirstNameNoTooltip]?"
 learn_language_outcome.3000.d: "Ah, eu estava procurando uma razão para parar de estudar! Viva!"
 scheme_retains_progress: "O [scheme|lE] mantém todo o progresso anterior"
 child_learned_language_title: "[owner.Custom('GetDaughterSon')|U] Aprende o Idioma!"
 child_learned_language_desc: "S [owner.Custom('GetDaughterSon')] aprendeu o [language|lE] [target.GetCulture.GetLanguage.GetName]"
 child_learned_language_fail_title: "[owner.Custom('GetDaughterSon')|U] falhou em aprender um idioma"
 child_learned_language_fail_desc: "S [owner.Custom('GetDaughterSon')] não conseguiu aprender o [language|lE] [target.GetCulture.GetLanguage.GetName]"
 child_learned_language_invalidated_title: "O Esquema de Aprender Idioma do Seu Filho foi Invalidado"
 child_learned_language_invalidated_desc: "O [scheme|lE] [GetScheme('learn_language').GetTypeName] de s filh foi invalidado"
