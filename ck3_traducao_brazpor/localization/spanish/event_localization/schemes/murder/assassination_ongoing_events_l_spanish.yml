l_spanish:
 do_not_execute_assassination_tooltip: "Não tente o assassinato"
 assassination_ongoing.0001.t: "Um Simpatizante Secreto"
 assassination_ongoing.0001.desc: "Meu assassino[assassin.Custom('ES_OA')] , [assassin.GetName] descobriu que [secret_sympathizer.GetName] , um[secret_sympathizer.Custom('ES_XA')] membro da corte de [target.GetName] simpatiza de certa forma com a nossa causa, embora não pratique abertamente a fé [ROOT.Char.GetFaith.GetName|l] .\n\n«Está dispost[secret_sympathizer.Custom('ES_OA')] a nos ajudar nesta conspiração», explica [assassin.GetFirstNameNoTooltip]. «Mas, em troca, quer receber suas bênçãos e seu favor como [Select_CString( secret_sympathizer.IsFemale, 'una', 'un' )] grande paladino do credo [ROOT.Char.GetFaith.GetAdherentNameNoTooltip]»."
 assassination_ongoing.0001.a: "Falarei bem de [secret_sympathizer.GetSheHe] diante de [ROOT.Char.GetFaith.HighGodNameAlternate]."
 assassination_ongoing.0001.b: "Não posso abençoar todos os desamparados que você traz até mim."
 fp3_sympathizer_might_betray_you.flavor: "[secret_sympathizer.GetFirstNameNoTooltip] pode nos atrapalhar, em vez de ajudar..."
 assassination_ongoing.0002.t: "Cortejando Fanáticos"
 assassination_ongoing.0002.desc: "A [assassin.GetName] se le ha visto estresad[assassin.Custom('ES_OA')] mientras se prepara para su misión. Por supuesto, sé que la idea de una muerte atroz no es lo que le detiene, así que debe de ser otra cosa. Cuando pregunto, va al grano.\n\nNecesito más associados que me ayuden a llevar a cabo esta misión contra [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l], me cuenta. He encontrado a unos cuantos devotos [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] en los páramos, a donde les exilió un[ROOT.Char.Custom('ES_XA')] [Select_CString(ROOT.Char.IsFemale,'señora','señor')] hostil a nuestra causa. Estarían dispuestos a ayudar si les proporcionamos armas y armaduras."
 assassination_ongoing.0002.a: "Todo homem e mulher entre os fiéis são bem-vindos para nos ajudar!"
 assassination_ongoing.0002.b: "Prefiro não confiar nesses vagabundos..."
 assassination_usury_event_title: "Ouro e [owner.GetFaith.HighGodNameAlternate]"
 assassination_not_usury_event_title: "Um Pequeno Saco de Ouro"
 assassination_ongoing.0003_opening: "[assassin.GetName] parece ter encontrado um ponto fraco em torno de [target.GetName] que podemos aproveitar.\n\n\"De fato\", diz, \"tenho me comunicado em segredo com"
 assassination_usury_event_scullery_maid_desc: "uma humilde, mas vingativa criada de cozinha"
 assassination_usury_event_guard_desc: "um guarda corrupto"
 assassination_usury_event_harem_slave_desc: "um escravo do harém ambicioso"
 assassination_usury_event_gardener_desc: "um jardineiro discreto que costumava ser um dos [owner.GetFaith.GetAdherentNameNoTooltip]"
 assassination_usury_event_minor_servant_desc: "um servo de pouca importância, mas de grande habilidade"
 assassination_ongoing.0003.outro: "… e poderia nos passar informações, embora por um preço. Devemos pagar em ouro… com discrição\".\n\nPor um momento, as dúvidas me assaltam. Serviços podem ser comprados, sim, mas e quanto à lealdade e à confiança?"
 assassination_ongoing.0003.a: "Errar é humano..."
 assassination_ongoing.0003.b: "Não vejo motivo para hesitar!"
 assassination_ongoing.0003.c: "Não, #italic eu vou conquistar#! a lealdade das pessoas, não comprá-la."
 assassination_ongoing.0004.t: "Um Momento de Dúvida"
 assassination_ongoing.0004_opening: "[assassin.GetName] parece inusitadamente apreensiv[assassin.Custom('ES_OA')] talvez até abatid[assassin.Custom('ES_OA')].\n\n“Sim”, confessa ao me aproximar, “minha fé vacila, [ROOT.Char.Custom('FormOfAddressForLiege')]. Tenho dúvidas sobre a promessa de grandes recompensas no Além. Devo dar a minha vida para matar [target.GetFirstName] um ser tão [target.Custom2('InsultAdjective', SCOPE.sC('assassin'))]? E se [assassin.GetFaith.HighGodNameAlternate] não aprovar matar #EMP todos#! os infiéis?”.\n\nEnquanto olho para minha [Select_CString( assassin.IsFemale, 'maestra asesina', 'maestro asesino' )] com seus conflitos internos, percebo que o que ele precisa é"
 assassination_doubt_event_hashish_desc: "para se acalmar com haxixe, para se tornar um recipiente vazio para a vontade de [assassin.GetFaith.HighGodName]."
 assassination_doubt_event_alcohol_desc: "beber tanto que possa vislumbrar o mundo do além."
 assassination_doubt_event_food_desc: "para se deliciar por um momento com os prazeres que apenas boa comida pode trazer."
 assassination_doubt_event_confide_desc: "alguém que [assassin.GetHerHim] escute e lhe dê segurança."
 assassination_doubt_event_orgy_desc: "uma noite revigorante com concubin[assassin.Custom('ES_OAOpp')]s, que posso proporcionar com prazer."
 assassination_doubt_event_meditation_desc: "um momento de consolo e diálogo interno com [assassin.GetFaith.HighGodName]."
 assassin_doubt_event_nothing_else: "para que eu reafirme sua fé em [assassin.GetFaith.PositiveAfterLife3]."
 assassination_console.success: "Você tranquiliza [assassin.GetFirstNameNoTooltip]"
 assassination_console.failure: "Você falha em tranquilizar [assassin.GetFirstNameNoTooltip]"
 assassination_console_toast.success: "[assassin.GetFirstNameNoTooltip] endurece sua resolução"
 assassination_console_toast.failure: "[assassin.GetFirstNameNoTooltip] continua a duvidar"
 assassination_ongoing.0003.c_hashish: "Venha, coma alguns bolos de haxixe comigo."
 assassination_ongoing.0003.c_alcohol: "Venha, beba comigo."
 assassination_ongoing.0003.c_food: "Venha, vamos comer juntos."
 assassination_ongoing.0003.c_confide: "Venha, confie em mim."
 assassination_ongoing.0003.c_orgy: "Venha, eu vou providenciar uma prévia do [assassin.GetFaith.PositiveAfterLife3|U]..."
 assassination_ongoing.0003.c_meditation: "Venha, vamos meditar juntos."
 assassination_ongoing.0004.b: "Você não pode vacilar. Confie na sabedoria de [assassin.GetFaith.HighGodName]."
 assassination_ongoing.0004.c: "Talvez devêssemos reconsiderar este assassinato..."
 high_risk_of_dying.tt: "@warning_icon! #X [assassin.GetNameNoTooltip] pode se tornar mais propenso a morrer durante o assassinato!#!"
 assassination_ongoing.0005.t: "Veneno ou Peste"
 assassination_ongoing.0005.desc: "\"Meu [ROOT.Char.GetTitleTierName|l]\", diz [assassin.GetName], \"precisamos usar todas as vantagens ? nossa disposi??o para acabar com [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l]. Existe um veneno poderoso, consumido em pequenas quantidades pelos m?sticos orientais, que eu poderia usar para revestir minha l?mina. Mas ser? caro obt?-lo...\""
 assassination_ongoing.0005.a_you: "Não há necessidade. Posso criar um veneno para você!"
 assassination_ongoing.0005.a_them: "Você é um[assassin.Custom('ES_XA')] herborista talentoso, crie algo."
 assassination_ongoing.0005.b: "Não há preço que eu não pagaria pela causa!"
 assassination_ongoing.0005.c: "Basta deixar a lâmina de molho em uma latrina durante a noite, isso resolverá."
 assassination_ongoing.0005.d: "Não, isso é uma perda de tempo, e abaixo de nós."
 assassination_ongoing.0006.t: "Assassino Fugitivo"
 assassination_ongoing.0006.desc: "Foi feita uma tentativa contra a vida de [target.GetName]mas, infelizmente, justamente quando meu [Select_CString( assassin.IsFemale, 'maestra asesina', 'maestro asesino' )] [assassin.GetName]viu uma abertura, um[dummy_assassin_gender.Custom('ES_OA')] de seus asso[dummy_assassin_gender.Custom('ES_OA')]ciados foi tomado pelo medo da morte e fugiu.\n\nO plano teve de ser abortado. Felizmente, [target.Custom('ES_ElLa')] [target.GetTitledFirstNameNoTooltip|l]não parece ter percebido nada, e [assassin.GetFirstNameNoTooltip]me assegurou que em breve poderá ser feita uma nova tentativa. No entanto, [Select_CString( dummy_assassin_gender.IsFemale, 'la asesina renegada', 'el asesino renegado' )] ainda pode ser um problema se não o[dummy_assassin_gender.GetHerHim] encontrarmos."
 assassination_ongoing.0006.a: "[dummy_assassin_gender.GetHerHim|U] encontraremos… e o silenciaremos de uma vez por todas."
 assassination_ongoing.0006.b: "Teremos que conviver com esse risco."
 assassination_hunted_down_toast.success: "Silenciaste [Select_CString( dummy_assassin_gender.IsFemale, 'a la renegada', 'al renegado' )]"
 assassination_hunted_down_toast.failure: "Você não conseguiu encontrar o renegado[Select_CString( dummy_assassin_gender.IsFemale, 'a la renegada', 'al renegado' )]"
 assassination_hunted_down.success: "O assassino renegado foi perseguido e morto [Select_CString( dummy_assassin_gender.IsFemale, 'a la asesina renegada', 'al asesino renegado' )]"
 assassination_hunted_down.failure: "Você não consegue caçar[dummy_assassin_gender.GetHerHim]"
 assassination_ongoing.0007.t: "Uma[target.Custom('ES_XA')] [target.GetWomanMan] de virtude?"
 assassination_ongoing.0007.desc: "«Não posso fazer isso», declara de repente meu assassino[assassin.Custom('ES_OA')] [assassin.GetFirstName] com um ar estranhamente preocupado[assassin.Custom('ES_OA')].\n\n«Embora se trate de um[target.Custom('ES_XA')] herege, [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] é, no entanto, um[target.Custom('ES_XA')] [target.GetWomanMan] de grande virtude e fé firme em [assassin.GetFaith.HighGodName]. Sabe-se que não é corrupto[target.Custom('ES_OA')] nem injusto[target.Custom('ES_OA')]. Se [target.GetHerHim] o matar, temo a ira [assassin.GetFaith.HighGodNamePossessive] e um terrível castigo em [ROOT.Char.GetFaith.NegativeAfterLife]»."
 assassination_ongoing.0007.a: "Você é um[assassin.Custom('ES_XA')] #italic asesin[assassin.Custom('ES_OA')]#!! Eu não o contratei para hesitar!"
 assassination_ongoing.0007.b: "Talvez você esteja certo... vamos parar por enquanto."
