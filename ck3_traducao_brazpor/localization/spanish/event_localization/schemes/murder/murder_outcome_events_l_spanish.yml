l_spanish:
 do_not_execute_murder_tooltip: "Não tente o assassinato"
 murder_child_really_tooltip: "Assassinar uma criança. Você tem certeza absoluta sobre isso?[ROOT.Char.Custom('ES_OA')]"
 murder_outcome_murdered_rival_tt: "Você ganhou [prestige_i][EmptyScope.ScriptValue('rival_outlived_prestige_value')|P0] por ter sobrevivido ao seu [rival|lE]"
 murder_unknown_murder_against_you_was_successful: "#X Você foi assassinado por um agressor desconhecido!#!"
 murder_unknown_murder_against_you_was_successful_other: "#X [THIS.Char.GetShortUIName] foi assassinad[THIS.Char.Custom('ES_OA')] por um atacante desconhecido!#!"
 murder_outcome.1001.t: "Assassino!"
 murder_outcome.1001.d: "Chegou a hora. Meus agentes estão posicionados. Um deles pagará ao assassino na mesma noite em que o ato acontecerá. Outro garantirá que o muro esteja sem vigilância. Um terceiro deixará um sutil rastro de velas até a alcova [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l].\n\nTudo está pronto."
 murder_outcome.1001.a: "Faça isso."
 murder_outcome.1001.b: "Espere, não estou pront[ROOT.Char.Custom('ES_OA')]."
 murder_outcome.1002.t: "Abordado"
 murder_outcome.1002.opening: "Meus agentes programaram uma viagem para [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l], que o fará atravessar uma floresta escura. $murder_outcome.1002.d$"
 murder_outcome.1002.opening_travel: "Meus agentes descobriram que [target.GetTitledFirstName] está atualmente em uma jornada para [province.GetName], que o levará por várias áreas selvagens.\n\n$murder_outcome.1002.d$"
 murder_outcome.1002.d: "Solo nos falta una banda de malhechores que [target.GetHerHim] maten desgraciadamente en un intento de robo fallido.\n\nYa me imagino la sangre cubriendo la tierra…"
 murder_outcome.1002.a: "Ah, a natureza pode ser tão perigosa."
 murder_outcome.1002.b: "Aguarde, este não é o momento certo."
 murder_outcome.1003.t: "Uma Refeição Para Morrer"
 murder_outcome.1003.d: "Meus agentes se prepararam durante semanas. O cozinheiro foi subornado para desviar o olhar, o veneno foi adquirido, e o pato foi presenteado exclusivamente para [target.GetTitledFirstName|l]. Ele será temperado com o veneno, e o leito de ervas disfarçará o cheiro ao ser servido. A amargura mortal será a última coisa que meu alvo provará."
 murder_outcome.1003.a: "Bon appétit, [target.GetFirstNameNoTooltip]..."
 murder_outcome.1003.b: "Aguarde, eu preciso de mais tempo para me preparar!"
 murder_outcome.1004.t: "Indesejado"
 murder_outcome.1004.desc: "Um dos meus agentes adquiriu um exemplar de [SCOPE.Custom('VenomousCreature')] e ordenou a um servo que o esconda no leito [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] antes do anoitecer.\n\nSó falta eu dar a ordem e [target.GetFirstName] poderá ser dado por mort[target.Custom('ES_OA')] assim que for atingido pelo exemplar de [SCOPE.Custom('VenomousCreatureType')]."
 murder_outcome.1004.a: "Espero que você não tenha medo desses bichos, [target.GetFirstNameNoTooltip]…"
 murder_outcome.1004.b: "Este não é o caminho certo para fazer isso."
 murder_outcome.1005.t: "$knight_culture_player_plural_no_tooltip$ e Plebeus"
 murder_outcome.1005.desc: "Diante da recente revolta entre os camponeses de [home_province.GetNameNoTier], um dos meus agentes apresentou uma sugestão original para lidar com [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l].\n\nSe dermos algumas moedas às pessoas certas e colocarmos agitadores em cada esquina, poderíamos orquestrar um motim quando [target.GetTitleTierName] estiver passando pelas ruas."
 murder_outcome.1005.a: "Hora de um bom e velho governo das massas."
 murder_outcome.1005.b: "Isso é muito imprevisível!"
 murder_outcome.1006.t: "Um Barril de Vinho"
 murder_outcome.1006.desc: "[target.GetTitledFirstName] comparecerá a uma celebração local em [home_province.GetName] e fiquei sabendo que ele tem certa apreciação por vinho.\n\nEu poderia atrair[target.Custom('ES_LoLa')] para a adega da minha [target.Custom('ResidenceBuilding')] para uma degustação exclusiva e garantir que nunca mais saia de lá!…"
 murder_outcome.1006.a: "Isso será fácil!"
 murder_outcome.1007.t: "Em Águas Turbulentas"
 murder_outcome.1007.travel: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] está a bordo de um navio em algum lugar de [province.GetName]."
 murder_outcome.1007.desc_not_inspection: "[target.GetTitledFirstName|l] visitará um navio ancorado em um dos portos de [province.GetNameNoTier] ainda esta semana."
 murder_outcome.1007.desc: "[target.GetTitledFirstName|l] estará inspecionando um navio ancorado em um dos portos de [province.GetNameNoTier] ainda esta semana."
 murder_outcome.1007.desc_ending: "\n\nSeria fácil fazer com que um dos meus agentes encharcasse em líquido inflamável o bote a remo que deve levá-l[target.Custom('ES_OA')] até que ele estivesse no meio do porto, disparar uma flecha em chamas e então… deixar que as águas o[target.Custom('ES_OA')] reivindiquem."
 murder_outcome.1007.desc_ending_travel: "\n\nSeria uma tragédia se meus agentes encharcassem as tábuas com líquido inflamável, fugissem no único bote a remo e incendiassem o navio enquanto escapam para um lugar seguro... garantindo a morte de [target.GetFirstNameNoTooltip] junto com a sua comitiva."
 murder_outcome.1007.a: "Coloque o plano em ação."
 murder_outcome.1008.t: "Drink Da Vida"
 murder_outcome.1008.desc: "Meus agentes adquiriram um pó discreto que não deixa rastro quando dissolvido na bebida. Os servos encarregados de reabastecer e manusear a taça de [target.GetTitledFirstName|l] foram subornados para fazer vista grossa, e tudo o que resta é minha aprovação para contrabandear o veneno para sua próxima bebida refrescante."
 murder_outcome.1008.a: "Um brinde à saúde de [target.GetShortUINameNoTooltip]!"
 murder_outcome.1201.t: "Um Caminho Pouco Usado"
 murder_outcome.1201.desc: "[assassin.Custom('ES_ElLa')|U] [assassin.GetTitledFirstName|l] prepara uma viagem especial para [target.Custom('ES_ElLa')] jovem [target.GetTitledFirstName|l], que acredita que passará um dia agradável na floresta.\n\nInfelizmente, [target.GetFirstNameNoTooltip] se perderá e não haverá quem o[target.GetHerHim] encontre antes que caia a noite. Ah, era tão jovem…"
 murder_outcome.1201.no_assassin: "Um dos meus agentes está preparando uma viagem especial para [target.Custom('ES_ElLa')] jovem [target.GetTitledFirstName|l], que acredita que vai passar um agradável dia na floresta.\n\nInfelizmente, [target.GetFirstNameNoTooltip] se perderá e não haverá quem [target.GetHerHim] encontre antes que a noite caia. Ah, era tão jovem…"
 murder_outcome.1201.a: "Outra[target.Custom('ES_OA')] criança[target.Custom('ES_OA')] que se perde na floresta! Infelizmente, isso acontece com muita frequência…"
 murder_outcome.1201.b: "Não, preciso repensar isso!"
 murder_outcome.1202.t: "Indefeso"
 murder_outcome.1202.desc: "É hora. Uma das amas de leite de [target.Custom('ES_DelDela')] pequen[target.Custom('ES_OA')] [target.GetTitledFirstName|l] está disposta a fazer o que for necessário em troca de uma compensação justa, claro.\n\nDispenso meu agente antes que ele termine de descrever para que serve a agulha afiada."
 murder_outcome.1202.a: "Faça acontecer, não importa o preço."
 murder_outcome.1202.b: "No que estava pensando?"
 murder_outcome.1203.desc: "É difícil encontrar um homem disposto a levantar a mão contra um bebê, mas deixar um exemplar de [SCOPE.Custom('VenomousCreatureType')] é muito mais fácil.\n\nObservo meu agente enfiar a criatura em uma pequena bolsa e me arrepio — a coisa é quase tão grande quanto sua futura vítima!"
 murder_outcome.1204.t: "Desejo Doce"
 murder_outcome.1204.desc: "Se há algo em especial a que [target.GetTitledFirstName|l] não consegue resistir, é ao seu doce favorito…\n\nSeu próximo petisco será parte [target.Custom('FavoriteTreat')] e parte um veneno potente, que meu agente deixará por descuido diante de [target.Custom('ES_DelDela')] crian[target.Custom('ES_OA')]."
 murder_outcome.1204.a: "Bon appétit!"
 murder_outcome.1205.t: "Alturas Perigosas"
 murder_outcome.1205.desc_opening: "Chegou a hora de [target.GetTitledFirstName|l]. Tudo acaba caindo com o tempo: reinos, [ROOT.Char.Custom('LadiesLords')], #EMP niños empujados desde las alturas#!…\n\n"
 murder_outcome.1205.desc_dog: "Meu agente amarrará uma corda ao redor do cachorrinho de [target.GetTitledFirstNameNoTooltip|l] e o pendurará em um muro alto... Os ganidos e gritos certamente atrairão [target.Custom('ES_AlAla')] crianç[target.Custom('ES_OA')]."
 murder_outcome.1205.desc_cat: "Meu agente amarrará uma corda ao redor do gatinho de [target.GetTitledFirstNameNoTooltip|l] e o pendurará em uma muralha alta… os miados certamente atrairão [target.Custom('ES_AlAla')] crianç[target.Custom('ES_OA')]."
 murder_outcome.1205.desc_toy: "Meu agente amarrará uma corda ao redor do brinquedo favorito de [target.GetTitledFirstNameNoTooltip|l], seu [target.Custom('child_favorite_toy_indefinite')], e o pendurará em uma parede alta… Ele com certeza virá procurá-lo.[target.Custom('ES_OA')] irá buscar o brinquedo."
 murder_outcome.1205.desc: "Meu agente deixará um rastro de doces que levará cada vez mais alto, alto o bastante para provocar um formigamento no estômago [target.Custom('ES_DelDela')] pequen[target.Custom('ES_OA')] [target.GetTitledFirstNameNoTooltip|l]. Uma vez lá no alto, encontrará uma cesta cheia de guloseimas pendurada sobre o muro."
 murder_outcome.1205.desc_ending: "E quando se abaixar para desamarrar a corda, será tão fácil que escorregue…"
 murder_outcome.1205.a: "Uma tragédia, verdadeiramente."
 murder_outcome.1301.t: "Esquecido na Escuridão"
 murder_outcome.1301.desc: "Parece que, por um preço justo, o carcereiro das masmorras [prison_owner.Custom('ES_DelDela')] [prison_owner.GetTitledFirstName|l] pode fazer vista grossa a um grupo de cortesãos que vá fazer [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] a última visita de sua vida…"
 murder_outcome.1301.a: "Quanto tempo vai levar para [prison_owner.GetFirstNameNoTooltip] perceber ao menos que [target.GetFirstNameNoTooltip] está mort[target.Custom('ES_OA')]?"
 murder_outcome.1301.b: "Não, não agora."
 murder_outcome.1302.t: "Um Hóspede Indesejado"
 murder_outcome.1302.desc: "Tem sido difícil acessar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] durante sua prisão domiciliar. No entanto, meus agentes encontraram um antigo servo de…"
 murder_outcome.1302.home_court_exists: "a corte em [target_home.GetNameNoTier],"
 murder_outcome.1302.home_court_does_not_exists: "sua antiga corte,"
 murder_outcome.1302.end: "disposto a se passar por um amigo de [target.GetFirstName] que veio visitar…"
 murder_outcome.1302.a: "Arme o servo e mande-o em seu caminho."
 murder_outcome.1302.b: "Não, não agora."
 murder_outcome.1401.t: "Uma Misericórdia"
 murder_outcome.1401.desc: "Pobre [target.GetTitledFirstName|l], está tão indefens[target.Custom('ES_OA')]! Em que momento deixa de valer a pena viver?\n\nUm dos meus agentes combinou para que um assassino entre nos aposentos onde o incapacitado "descansa" inválid[target.Custom('ES_OA')] [target.GetTitleTierName]."
 murder_outcome.1401.a: "É o melhor para [target.Custom('ES_ElElla')]."
 murder_outcome.1401.b: "Não, isso parece errado."
 murder_outcome.2000.t: "Giro do Destino"
 murder_outcome.2000.desc: "Enquanto eu fazia todos os preparativos para que [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] pudesse deixar este mundo, sou interrompido por um pajem. [target.Custom('ES_ElLa')|U] muito [owner.Custom2('InsultNoun', ROOT.Char)] morreu sem a minha ajuda!"
 murder_outcome.2000.a: "[ROOT.Char.GetFaith.DevilName|U] devia estar ansioso pela companhia!"
 murder_outcome.2000.a.tt: "[target.GetTitledFirstName] [target.GetDeathReason]"
 murder_outcome.2500.desc: "Enquanto sigo com os preparativos para providenciar a reunião entre [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] e [ROOT.Char.GetFaith.DevilName|U], sou interrompido por um pajem. É[owner.Custom('ES_EA')] [owner.Custom2('InsultNoun', ROOT.Char)] partiu em viagem e agora está fora do meu alcance!"
 murder_outcome.2500.a: "Você pode ter escapado de mim, mas não pode escapar da morte!"
 murder_outcome.2001.t: "Assassino!"
 murder_outcome.2001.opening_1: "O plano deu certo, e [target.GetName] finalmente está morto!"
 murder_outcome.2001.opening_2: "Custou a encontrar [target.GetTitledFirstName|l] sozinho, mas, assim que o assassino conseguiu, [target.GetSheHe] se despediu deste mundo."
 murder_outcome.2001.opening_3: "O assassino se saiu espetacularmente, e [target.GetName] finalmente está morto!"
 murder_outcome.2001.heh: "\nHeh."
 murder_outcome.2001.owner_is_known_1: "\n\nInfelizmente, apesar de eu continuar afirmando que as acusações são infundadas, ninguém duvida que fui eu quem fez isso."
 murder_outcome.2001.owner_is_known_2: "\n\nNo entanto, alguém, em algum lugar, vacilou e deixou meu envolvimento no crime ser conhecido! Pelo menos posso me consolar com o fato de que [target.GetTitledFirstName|l] está em situação pior do que eu."
 murder_outcome.2001.no_awareness_1: "\n\nFelizmente, meu envolvimento no crime permanece desconhecido."
 murder_outcome.2001.no_awareness_2: "\n\nEu cobri bem os meus rastros e, se alguém suspeita que estou por trás do ataque, ninguém se atreve a dizer em voz alta."
 murder_outcome.2001.a.discovered: "Meu assassino estava ali apenas para proteger[target.GetHerHim] do #EMP verdadero#! assassino! Palavra!"
 murder_outcome.2001.a: "Eu realmente amo visitas surpresa."
 murder_outcome.2001.memories: "\n\nLembro-me quando [bad_memory.GetDescription], [ROOT.Char.Custom('MurderMemoryEnding')]"
 murder_outcome.2002.t: "Jornadas Perigosas"
 murder_outcome.2002.opening_1: "Graças ao meu brilhante plano e aos meus bandidos contratados, [target.GetTitledFirstName|l] finalmente está morto!"
 murder_outcome.2002.opening_2: "Os bandidos fizeram o trabalho deles, e [target.GetTitledFirstName|l] não existe mais!"
 murder_outcome.2002.opening_3: "[target.GetTitledFirstName] partiu deste mundo, enviado para a morte por uma lâmina de bandido."
 murder_outcome.2002.heh: "\nHeh."
 murder_outcome.2002.no_save: "\n\nEnquanto o grupo de viagem parava para acampar à noite, os bandidos saíram de dentro das árvores, exigindo sangue e ouro! Os soldados revidaram, mas felizmente não foi o suficiente. [target.GetTitledFirstName|l] foi tragicamente morto no tumulto."
 murder_outcome.2002.owner_is_known_1: "\n\nInfelizmente, um dos bandidos foi capturado e revelou que eu lhes havia pago para garantir a morte de [target.GetTitleTierName]!"
 murder_outcome.2002.owner_is_known_2: "\n\nNo entanto, um dos bandidos deve ter sido capturado, pois veio à tona que eu estava por trás do ataque!"
 murder_outcome.2002.no_awareness_1: "\n\nOs bandidos estão agora sendo caçados por todos, e ninguém sequer suspeita do meu envolvimento!"
 murder_outcome.2002.no_awareness_2: "\n\nFelizmente, a maioria dos bandidos foi morta na luta, e os mortos não falam. Ninguém nunca saberá do meu envolvimento!"
 murder_outcome.2002.a.discovered: "Meu único crime foi confiar em bandidos plebeus..."
 murder_outcome.2002.a: "Hah! Talvez os plebeus não sejam tão inúteis afinal?"
 murder_outcome.2002.a.less_arrogant: "Meus dois problemas se resolveram um ao outro!"
 murder_outcome.2003.t: "Comedor Saudável"
 murder_outcome.2003.opening_1: "Graças ao pato e ao frasco de veneno, [target.GetTitledFirstName|l] finalmente morreu!"
 murder_outcome.2003.opening_2: "O veneno fez seu trabalho, e [target.GetTitledFirstName|l] não existe mais!"
 murder_outcome.2003.opening_3: "Aquele pássaro se tornou a última coisa que [target.GetFirstName] comeu na vida!"
 murder_outcome.2003.owner_is_known_1: "\n\nNo entanto, enquanto aparentemente engasgava com um osso, [target.GetTitledFirstName|l] conseguiu murmurar meu nome, me amaldiçoando como o assassino!"
 murder_outcome.2003.owner_is_known_2: "\n\nInfelizmente, o veneno foi descoberto, e o envenenador rapidamente me denunciou como o responsável!"
 murder_outcome.2003.owner_is_known_3: "\n\nA culpa consumiu um dos servos [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] e se apresentou para confessar, nomeando-me como fornecedor[ROOT.Char.Custom('ES_XA')] do veneno."
 murder_outcome.2003.no_awareness_1: "\n\nFoi ainda melhor! Em plena agonia, [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] ficou com um osso preso na garganta! Agora não está claro exatamente o que matou [target.GetHerHim]!"
 murder_outcome.2003.no_awareness_2: "\n\nTambém parece que nenhum dos meus agentes está sob suspeita, o que significa que ninguém pode rastrear o veneno de volta para mim!"
 murder_outcome.2003.a.discovered_1: "Eu estava apenas tentando animar o banquete!"
 murder_outcome.2003.a.discovered_2: "Ah, por favor. [target.GetSheHe|U] estava estragando o clima de qualquer maneira."
 murder_outcome.2003.a: "Deve ter sido algo que comeu."
 murder_outcome.2004.opening_1: "[target.GetTitledFirstName] morreu[target.Custom('ES_OA')] pela [SCOPE.Custom('VenomousCreatureAttack')] mortal de um exemplar de [SCOPE.Custom('VenomousCreature')]! A criatura [target.GetHerHim] atacou pouco depois de que se retirasse aos seus aposentos e, embora tenham chamado os guardas, ninguém pôde fazer nada para salvar[target.GetHerHim]."
 murder_outcome.2004.owner_is_known_1: "\n\nLamentavelmente, morreu amaldiçoando meu nome, e os rumores do meu envolvimento já começaram a se espalhar."
 murder_outcome.2004.no_awareness_1: "\n\nFelizmente, essas criaturas não falam, então o ataque não pode ser rastreado até mim."
 murder_outcome.2004.no_awareness_1_beaked_mammal: "\n\nFelizmente, criaturas assim não falam — será que elas falam mesmo? — então o ataque não pode ser rastreado até mim."
 murder_outcome.2004.a.discovered: "Hora de [SCOPE.Custom('VenomousCreatureMovement')] como uma [SCOPE.Custom('VenomousCreatureType')]!"
 murder_outcome.2004.a: "Meu pequeno amigo fez seu trabalho bem."
 murder_outcome.2005.opening_1: "[target.GetTitledFirstName]foi morto[target.Custom('ES_OA')]a[target.Custom('ES_OA')]a[target.Custom('ES_OA')] e pisoteado por seus próprios súditos!\n\nOs camponeses agitados enlouqueceram ao ver sua [target.Custom('ES_SennorSennora')] montando pelas ruas, a ponto de arrancarem de suas montarias a [target.Custom('ES_ElElla')] e a vários de seus cavaleiros, espancando-os até a morte!"
 murder_outcome.2005.owner_is_known_1: "\n\nMuitos camponeses foram enforcados, mas, tragicamente, antes da execução alguns de meus agitadores me acusaram como o culpado."
 murder_outcome.2005.no_awareness_1: "\n\nMuitos camponeses foram enforcados, incluindo meus agitadores, o que significa que não pode ser rastreado até mim!"
 murder_outcome.2005.a.discovered: "Camponeses simplesmente não podem ser confiáveis para considerar meu bem maior."
 murder_outcome.2005.a.discovered.less_arrogant: "Traído[ROOT.Char.Custom('ES_OA')] até mesmo por meus humildes servos!"
 murder_outcome.2005.a: "Nunca subestime o poder da multidão."
 murder_outcome.2006.desc: "[target.GetTitledFirstName] morreu, emparedad[target.Custom('ES_OA')] e logo esquecido[target.Custom('ES_OA')]!\n\nSeguiu-me voluntariamente até a adega, embriagad[target.Custom('ES_OA')] de festa e vinho. Depois de muitas taças de vinho «fino», caiu no sono rapidamente e nem se mexeu quando peguei uma colher de pedreiro e fechei meticulosamente a saída.[target.Custom('ES_OA')] rapidamente e nem se mexeu quando peguei uma colher de pedreiro e fechei meticulosamente a saída.\n\n"
 murder_outcome.2006.scheme_owner_known: "Desgraçadamente, me viram enquanto [target.Custom('ES_LoLa')] levava ao porão, e, em poucas semanas, a parede recém-erguida foi derrubada, revelando o horror por trás."
 murder_outcome.2006.scheme_unknown: "Felizmente, parece que ninguém percebeu a nova e estranha parede em meu porão..."
 murder_outcome.2006.a.discovered: "Estava embriag[target.Custom('ES_OA')] e precisava de um lugar para passar a noite!"
 murder_outcome.2006.a: "Descanse em paz!"
 murder_outcome.2007.desc: "[target.GetTitledFirstName] foi morto, reivindicad[target.Custom('ES_OA')] pelo frio abraço do mar!\n\nA flecha em chamas disparada pelo meu agente abriu um rastro de fogo pelo porto e, apenas momentos depois, o barco inteiro estava em chamas."
 murder_outcome.2007.desc_lowborn: "Todos os passageiros acabaram na água, e as roupas ficam tão pesadas quando molhadas..."
 murder_outcome.2007.desc_highborn: "Todos os passageiros acabaram na água, e os tecidos finos ficam tão pesados quando molhados..."
 murder_outcome.2007.scheme_owner_known: "\n\nDesastrosamente, o arqueiro foi visto e não hesitou em me entregar!"
 murder_outcome.2007.scheme_unknown: "\n\n#EMP Infelizmente#! o arqueiro não pôde ser encontrado."
 murder_outcome.2007.a.discovered: "Eu... eu pensei que sabia nadar!"
 murder_outcome.2007.a: "Que tragédia!"
 every_entourage_member: "Todo membro do séquito [target.Custom('ES_DelDela')][target.GetTitledFirstNameNoTooltip|l]:"
 murder_outcome.2008.desc_drunkard: "[target.GetTitledFirstName] morreu. [target.Custom('ES_LoLa')] matou o [target.Custom('RegionalAlcoholicDrink')] que tanto amava!"
 murder_outcome.2008.desc_not_drunkard: "[target.GetTitledFirstName] morreu. [target.Custom('ES_LoLa')] matou por um grande gole de [target.Custom('RegionalDrink')]!"
 murder_outcome.2008.desc: "\n\nMeus agentes derramaram o veneno na taça dele(a) e viram-no se dissolver sem deixar vestígio. [target.GetTitledFirstName|l] só percebeu que algo estava errado quando a garganta se inchou e fechou, mas então já era tarde demais.\n\n"
 murder_outcome.2008.scheme_owner_known: "Infelizmente, meus agentes foram vistos e os criados subornados não hesitaram em revelar meu envolvimento!"
 murder_outcome.2008.scheme_unknown: "Felizmente, meus agentes saíram sem serem notados antes que os efeitos do veneno revelassem que algo estava acontecendo!"
 murder_outcome.2008.a.discovered: "… [target.GetTitledFirstName] parecia sedent[target.Custom('ES_OA')]?"
 murder_outcome.2008.a: "Saúde, [target.GetTitledFirstNameNoTooltip|l]!"
 murder_outcome.2201.t: "Um Cadáver Destroçado"
 murder_outcome.2201.opening: "[target.GetTitledFirstName] está morto[target.Custom('ES_OA')]!\n\nA busca se prolongou até bem tarde da noite antes de ser suspensa e retomada ao amanhecer. Só então o corpo foi encontrado, ensanguentado, mutilado e dilacerado por um ataque de alguma fera feroz e faminta. Ao menos, espero que tenha sido obra de uma fera."
 murder_outcome.2201.scheme_owner_known: "\n\nInfelizmente, meu agente confessou assim que a criança foi encontrada [target.Custom('ES_AlAla')] crianç[target.Custom('ES_OA')]. Agora todos sabem que fui eu o responsável por essa tragédia!"
 murder_outcome.2201.scheme_unknown: "\n\nFelizmente, todos concordam que é uma terrível tragédia, e meu envolvimento — e a existência de qualquer plano — permanece desconhecido."
 murder_outcome.2201.a.discovered: "Enfrentar obstáculos imprevistos faz parte da educação de qualquer criança!"
 murder_outcome.2201.a: "E dizem que as crianças são o futuro."
 murder_outcome.2202.desc: "A tarefa está feita. [target.GetTitledFirstName|l] nunca crescerá ou entenderá o mundo ao seu redor. Aparentemente, foi simples, uma agulha de ferro afiada contra a orelha, perfurando facilmente a pele macia e a cartilagem."
 murder_outcome.2202.desc_sadistic: "Eu faço com que o cortesão repita a descrição dos gritos e do sangue jorrando mais algumas vezes antes que minha curiosidade seja saciada."
 murder_outcome.2202.desc_normal: "Dispensei o cortesão antes que mais detalhes fossem fornecidos."
 murder_outcome.2202.scheme_owner_known: "\n\nDesastrosamente, a ama-de-leite foi pega e me denunciou como o responsável pelo hediondo crime."
 murder_outcome.2202.scheme_unknown: "\n\nA ama-de-leite foi pega, mas executada com raiva antes que tivesse a chance de confessar meu envolvimento no crime."
 murder_outcome.2202.a: "Eu tive que fazer isso. Eu tive que fazer isso."
 murder_outcome.2202.a.tt: "#F Eu tive que fazer isso!#!"
 murder_outcome.2202.a.sadistic: "Qual é o próximo da minha lista para hoje?"
 murder_outcome.2203.desc: "A tarefa está feita. [target.GetTitledFirstName|l] nunca terá a chance de crescer, de conhecer as dores e prazeres deste mundo. Aparentemente foi uma morte rápida, o veneno fez seu trabalho antes mesmo que meu agente tivesse saído do quarto.\n\n"
 murder_outcome.2203.scheme_owner_known: "Mas os guardas o alcançaram rapidamente, porém, e aquele covarde sem coragem me denunciou como a força por trás do ato hediondo[ROOT.Char.Custom('ES_XA')] do ato hediondo."
 murder_outcome.2203.scheme_unknown: "Assim como eles foram rápidos, os guardas também foram e logo prenderam meu agente em correntes. Ele foi executado misericordiosamente antes que pudesse me apontar como o responsável[ROOT.Char.Custom('ES_XA')] pelo crime."
 murder_outcome.2204.desc: "[target.GetTitledFirstName] morreu; engoliu a isca inteira, incluindo [target.Custom('FavoriteTreat')]! Num piscar de olhos, estava agarrando a garganta, ofegando por ar, antes de cair desabad[target.Custom('ES_OA')] para nunca mais se levantar."
 murder_outcome.2204.scheme_owner_known: "\n\nDesastrosamente, alguém viu meu agente plantando o petisco e logo fui descoberto como o cérebro por trás de toda a trama!"
 murder_outcome.2204.scheme_unknown: "\n\nTodos os padeiros da região foram interrogados, mas nenhuma evidência de jogo sujo foi encontrada."
 murder_outcome.2205.t: "Queda do Poder"
 murder_outcome.2205.desc_opening: "![target.GetTitledFirstName] está morto! Encontraram o corpo mutilado no chão,"
 murder_outcome.2205.desc_dog: "agarrad[target.Custom('ES_OA')] o corpo do seu vira-lata sarnento."
 murder_outcome.2205.desc_cat: "agarrad[target.Custom('ES_OA')] o corpo do seu gato desgrenhado."
 murder_outcome.2205.desc_cat_alive: "mas não havia sinal do seu gato sarnento."
 murder_outcome.2205.desc_toy: "apertad[target.Custom('ES_OA')] em seu [target.Custom('child_favorite_toy')]."
 murder_outcome.2205.desc_nothing: "com doces espalhados ao redor."
 murder_outcome.2205.desc: "Seu rosto jovem permaneceu permanentemente distorcido em uma expressão de surpresa e terror."
 murder_outcome.2205.scheme_owner_known: "\n\nSinto o sentimento ecoado em meu próprio rosto quando fica claro que meu agente foi pego e não hesitou em me revelar!"
 murder_outcome.2205.scheme_unknown: "\n\nAl menos todos creen que se cayó por accidente."
 murder_outcome.2301.t: "Esquecido na Escuridão"
 murder_outcome.2301.opening_1: "Finalmente, e de uma vez [target.GetTitledFirstName|l] está mort[target.Custom('ES_OA')]! Foi morto pelas mãos de um grupo de homens desconhecidos nas masmorras de [prison_owner.Custom('ES_DelDela')] [prison_owner.GetTitledFirstName|l]. Estava meio mort[target.Custom('ES_OA')] de fome, pouco podia fazer para se defender e [target.GetHerHim] espancaram até a morte."
 murder_outcome.2301.heh: "Heh."
 murder_outcome.2301.owner_is_known_1: "\n\nInfelizmente, assim que começaram a surgir perguntas, um dos autores quebrou o silêncio e me apontou como o[ROOT.Char.Custom('ES_OA')] responsável."
 murder_outcome.2301.no_awareness_1: "\n\nEmbora não haja dúvida de que os assassinos pertencem à corte [prison_owner.Custom('ES_DelDela')] [prison_owner.GetTitledFirstName|l], mantêm a boca fechada e minha implicação em segredo."
 murder_outcome.2301.a.discovered: "Não pense nisso como assassinato, mas como libertação!"
 murder_outcome.2301.a: "Eu te libertei, [target.GetFirstNameNoTooltip]."
 murder_outcome.2302.t: "Um Hóspede Indesejado"
 murder_outcome.2302.opening_1: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] morreu! Como planejado, o servo conseguiu acesso aos seus aposentos, sem dúvida para grande confusão de est[target.Custom('ES_EA')]. Claro, a confusão deve ter passado quando o servo desembainhou a adaga. [target.GetFirstNameNoTooltip] não durou muito."
 murder_outcome.2302.owner_is_known_1: "\n\nInfelizmente, o assassinato foi descoberto antes que o servo pudesse escapar, e revelou meu nome em troca de sua vida."
 murder_outcome.2302.no_awareness_1: "\n\nO servo escapou e já havia desaparecido antes que o corpo fosse descoberto. Ninguém sabe do meu envolvimento."
 murder_outcome.2302.a.discovered: "[target.GetFirstNameNoTooltip] não sairá tão cedo do seu confinamento domiciliar, pelo menos."
 murder_outcome.2302.a: "Tão fácil como uma visita amigável!"
 murder_outcome.2401.opening_1: "[target.GetTitledFirstName] deixou este mundo, embora talvez isso já fosse verdade há algum tempo. Nem sequer lutou quando o assassino pressionou o travesseiro contra seu rosto. Só soltou alguns gemidos baixos através do tecido e, depois, ficou em silêncio."
 murder_outcome.2401.owner_is_known_1: "\n\nInfelizmente, os guardas descobriram o assassino, que logo admitiu meu envolvimento no assassinato!"
 murder_outcome.2401.no_awareness_1: "\n\nO assassino escapou e, sem outras testemunhas, parece impossível que o ato possa ser rastreado até mim."
 murder_outcome.2401.a.discovered: "Não pense nisso como assassinato, mas como libertação!"
 murder_outcome.2401.a: "Descanse em paz, finalmente, [target.GetFirstNameNoTooltip]."
 murder_outcome.4001.t: "Assassino!"
 murder_outcome.4001.failure_declaration_1: "[target.GetTitledFirstName] escapou iles!"
 murder_outcome.4001.failure_declaration_2: "Meu atentado contra a vida [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] foi frustrado!"
 murder_outcome.4001.failure_declaration_3: "Parece que [target.GetTitledFirstName|l] escapou do julgamento de [ROOT.Char.GetFaith.HighGodNamePossessive] mais uma vez."
 murder_outcome.4001.desc: "O assassino conseguiu entrar no(a) [target.Custom('ResidenceBuilding')], mas não chegou aos aposentos de [target.GetFirstNameNoTooltip]."
 murder_outcome.4001.exposed_scheme: "[dummy_assassin_gender.GetSheHe|U] foi capturad[dummy_assassin_gender.Custom('ES_OA')] e, sob ameaça de morte, revelou meu nome!"
 murder_outcome.4001.not_exposed_scheme: "Embora [dummy_assassin_gender.GetSheHe] tenha sido descobert[dummy_assassin_gender.Custom('ES_OA')] e o alarme tenha sido soado, o assassino escapou imediatamente e não se ouviu falar dele desde então.\n\n[target.GetTitledFirstName|l] agora está em guarda."
 murder_outcome.4001.a.discovered: "Na verdade, ela estava lá para assustar o #EMP verdadero#! assassino! E conseguiu!"
 murder_outcome.4001.a: "Você vai pagar um dia, [target.GetFirstNameNoTooltip]!"
 murder_outcome.4001.b: "Se não conseguir na primeira vez..."
 murder_outcome.4002.desc: "\n\nMeus capangas contratados não conseguiram superar o séquito."
 murder_outcome.4002.exposed_scheme: "Pior ainda, alguns deles foram capturados vivos e revelaram que foram pagos pelo ataque! Não demorou muito para rastrear o pagamento até mim."
 murder_outcome.4002.not_exposed_scheme: "Pelo menos eles foram mortos até o último homem. Sem ninguém para falar, eles foram considerados apenas bandidos comuns."
 murder_outcome.4002.a: "Você não pode confiar em plebeus para fazerem qualquer coisa direito..."
 murder_outcome.4002.a.less_arrogant: "Tarefa tão simples, e ainda assim..."
 murder_outcome.4002.a.discovered: "Bandidos típicos. Eles dirão qualquer coisa para escapar impunes."
 murder_outcome.4003.desc: "\n\nO veneno não teve o efeito desejado e apenas deixou a [target.GetTitleTierName] acamad[target.Custom('ES_OA')] por uma semana."
 murder_outcome.4003.exposed_scheme: "Para piorar, o herborista que fornecia o veneno foi rastreado, e [target.GetFirstNameNoTooltip] agora sabe que eu estava por trás do plano!"
 murder_outcome.4003.not_exposed_scheme: "Felizmente, pensam que foi apenas uma doença comum, e [target.GetFirstName] não suspeita de nada."
 murder_outcome.4003.a: "Da próxima vez, vou garantir que engasgue com isso!"
 murder_outcome.4003.a.discovered: "O pássaro não foi exatamente do gosto de [target.GetFirstNameNoTooltip]?"
 murder_outcome.4004.failure_declaration_1: "[target.GetTitledFirstName] sobreviveu a [SCOPE.Custom('VenomousCreatureAttack')] da [SCOPE.Custom('VenomousCreature')]!"
 murder_outcome.4004.failed_attempt_1: "Apesar do ataque do exemplar de [SCOPE.Custom('VenomousCreature')], chamaram um médico imediatamente e ele conseguiu impedir que o veneno se espalhasse."
 murder_outcome.4004.scheme_owner_known: "\n\nInfelizmente, o servo que colocou o exemplar de [SCOPE.Custom('VenomousCreature')] e meu envolvimento foi revelado pouco depois!"
 murder_outcome.4004.scheme_known: "\n\nColocar um exemplar de [SCOPE.Custom('VenomousCreature')] na cama de [target.Custom('ES_DelDela')] [target.GetTitleAsNameNoTooltip] não é algo que passe despercebido, mas ao menos ninguém sabe que fui eu quem fez isso."
 murder_outcome.4004.scheme_unknown: "\n\nPelo menos o [SCOPE.Custom('VenomousCreatureAttack')] foi atribuído às andanças de [SCOPE.Custom('VenomousCreatureType')], e não a mim."
 murder_outcome.4004.a: "Sua sorte vai durar apenas até certo ponto, [target.GetFirstNameNoTooltip]!"
 murder_outcome.4005.failure_declaration_1: "[target.GetTitledFirstName] sobreviveu ao ataque da horda de camponeses!"
 murder_outcome.4005.failed_attempt_1: "\n\nMeus agitadores conseguiram encolerizá-los, mas, quando a turba começou a se revoltar, os soldados de [target.GetFirstName] os exterminaram. Os sobreviventes fugiram aterrorizados enquanto [target.GetTitleTierName] conseguia voltar para sua [target.Custom('ResidenceBuilding')]."
 murder_outcome.4005.scheme_owner_known: "\n\nMuitos camponeses foram enforcados, e meus agitadores confessaram meu envolvimento!"
 murder_outcome.4005.scheme_known: "\n\nMuitos camponeses foram enforcados, e os agitadores confessaram o envolvimento de forças externas. Felizmente, nem eles sabiam que eu estava por trás disso."
 murder_outcome.4005.scheme_unknown: "\n\nMuitos camponeses foram enforcados, mas, felizmente, meus agitadores também foram, o que significa que o motim não pode ser rastreado até mim."
 murder_outcome.4005.a: "É por essa incompetência que governamos e esses camponeses não."
 murder_outcome.4005.a.discovered: "Sempre confie em uma multidão para tomar a decisão errada."
 murder_outcome.4006.desc: "[target.GetTitledFirstName] me seguiu voluntariamente para a adega, embriagad[target.Custom('ES_OA')] de festa e vinho.\n\nDepois de muitas taças de vinho "fino", adormeceu rapid[target.Custom('ES_OA')] rapidamente, mas alguns servos entraram antes que eu pudesse terminar de selar a saída.\n\n"
 murder_outcome.4006.scheme_owner_known: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]! E [target.Custom('ES_ElLa')] [target.GetTitledFirstNameNoTooltip|l]? E uma parede inacabada para prender[target.GetHerHim]…? Ah, não"."
 murder_outcome.4006.scheme_unkown: "«Ah, parece que [target.Custom('ES_ElLa')] [target.GetTitledFirstNameNoTooltip|l] adormeceu[target.Custom('ES_OA')] no meio do vosso projeto. Podemos ajudá-lo a escoltar[target.GetHerHim] até um aposento, [ROOT.Char.Custom('FormOfAddressForLiege')]?»."
 murder_outcome.4006.a.discovered: "Eu... Eu só estou fazendo algumas reformas!"
 murder_outcome.4006.a: "… Sim, obrigado pela ajuda."
 murder_outcome.4007.opening: "A flecha em chamas disparada por meu agente deixou um rastro ardente pelo porto, mas por pouco não atingiu o barco.\n\nEnquanto o fogo se apagava nas frias águas do oceano, os passageiros do barco ficaram olhando para ele sem entender por vários segundos, até que o pandemônio começou.\n\n"
 murder_outcome.4007.scheme_owner_known: "Para piorar, o arqueiro foi capturado e me entregou sem hesitar como o responsável[ROOT.Char.Custom('ES_OA')] pelo plano."
 murder_outcome.4007.scheme_unkown: "Felizmente, o arqueiro escapou e não foram encontrados vestígios do meu envolvimento."
 murder_outcome.4007.a.discovered: "Eu só queria que ele praticasse natação!"
 murder_outcome.4007.a: "Como é difícil acertar um barco?!"
 murder_outcome.4008.desc: "[target.GetTitledFirstName] sobreviveu ao veneno!\n\nInfelizmente, uma de suas copeiras tomou um gole da bebida antes de servi-la ao seu [target.GetLadyLord], e parece que uma serva morta é um bom dissuasor.\n\n"
 murder_outcome.4008.scheme_owner_known: "E se isso não fosse ruim o suficiente, outra criada não hesitou em me apontar como o culpado da tentativa!"
 murder_outcome.4008.scheme_unkown: "Pelo menos nenhuma das criadas confessou meu envolvimento. Pequenos favores."
 murder_outcome.4008.a.discovered: "A audácia das criadas de sua casa!"
 murder_outcome.4008.a: "Da próxima vez, as criadas vão pensar duas vezes antes de se intrometer!"
 murder_outcome.4201.t: "O Caminho para Casa"
 murder_outcome.4201.opening: "\n\n[assassin.Custom('ES_ElLa')|U] [assassin.GetTitledFirstName|l] [target.GetHerHim] abandonou-o à própria sorte, sol[target.Custom('ES_OA')] em meio à natureza.\n\nNo entanto, quando retornou à corte para anunciar a terrível notícia do desaparecimento, [target.GetFirstName] já estava esperando no salão, e perguntou a [assassin.GetFirstName] se podiam continuar brincando!"
 murder_outcome.4201.scheme_owner_known: "![assassin.GetFirstNameNoTooltip] foi interrogad[assassin.Custom('ES_OA')] a fundo e meu plano foi revelado!"
 murder_outcome.4201.scheme_unknown: "Basta dizer que [assassin.GetFirstNameNoTooltip] agora está sob vigilância rigorosa."
 murder_outcome.4201.a.discovered: "Bem... Foi uma tentativa de assassinato ou uma tentativa de #EMP compaixão#!?"
 murder_outcome.4201.a: "Uma facada nas costas teria resolvido."
 murder_outcome.4202.opening: "[target.GetTitledFirstName] ainda está viv! Parece que a ama não conseguiu se obrigar a esfaquear o bebê e deixou a oportunidade passar."
 murder_outcome.4202.scheme_owner_known: "\n\nPara piorar, a consciência dela a dominou, e ela confessou tudo, inclusive o meu envolvimento!"
 murder_outcome.4202.scheme_known: "\n\nPara piorar, a consciência dela a dominou, e ela confessou o plano! Pelo menos o meu envolvimento continua em segredo."
 murder_outcome.4202.scheme_unkown: "\n\nPelo menos ela foi inteligente o suficiente para manter o silêncio sobre o plano. Talvez isso seja o melhor..."
 murder_outcome.4202.a: "Preciso pensar com cuidado."
 murder_outcome.4203.opening: "[target.GetTitledFirstName] ainda está viv! Parece que o veneno [SCOPE.Custom('VenomousCreatureType')] não foi forte o suficiente e causou apenas uma leve erupção na pele do bebê.\n\n"
 murder_outcome.4203.scheme_owner_known: "Como se não bastasse, meu agente covarde foi capturado e confessou. Ele deu o meu nome como o instigador[ROOT.Char.Custom('ES_XA')] do ato!"
 murder_outcome.4203.scheme_unkown: "Uma pequena sorte é que meu agente conseguiu sair da sala sem levantar suspeitas."
 murder_outcome.4204.desc_opening: "[target.GetTitledFirstName] continua vivo! [target.GetSheHe|U] pegou seu [target.Custom('FavoriteTreat')], mas, antes que pudesse dar uma mordida, um cachorro de rua o arrancou de suas mãos e saiu correndo.\n\n"
 murder_outcome.4204.scheme_unkown: "Pelo menos ninguém saberá das minhas verdadeiras intenções..."
 murder_outcome.4204.a: "Será que isso é um sinal, talvez?"
 murder_outcome.4205.desc_opening: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] continua vivo! Embora meu agente [target.GetHerHim] o empurrou para além da borda, suas roupas ficaram presas em uma saliência do muro um pouco mais abaixo. [target.GetHerHim|U] resistiu o suficiente para que chegassem em seu auxílio e [target.GetHerHim] salvassem junto"
 murder_outcome.4205.desc_dog: "o maldito cachorro..."
 murder_outcome.4205.desc_cat: "o maldito gato..."
 murder_outcome.4205.desc_toy: "o maldito [target.Custom('child_favorite_toy')]..."
 murder_outcome.4205.desc_nothing: "o maldito doce..."
 murder_outcome.4205.scheme_unkown: "Pelo menos meu agente escapou sem ser notado e a criança[ROOT.Char.Custom('ES_OA')] estava nervos[ROOT.Char.Custom('ES_OA')] o bastante para se lembrar claramente do que aconteceu."
 murder_outcome.4302.t: "Um Convidado Indesejado"
 murder_outcome.4302.failure_declaration_1: "[target.GetTitledFirstName] ainda está viv!"
 murder_outcome.4302.failed_lack_of_planning: "Talvez eu devesse ter pensado nisso melhor. Assim que o velho amigo entrou em seu quarto, [target.GetSheHe] chamou os guardas. Será que [target.GetHerHim] avisou alguém?"
 murder_outcome.4302.failed_attempt_1: "O disfarce do velho amigo não era tão bom quanto imaginava e, no momento em que desembainhou a adaga escondida, [target.GetFirstName] chamou os guardas."
 murder_outcome.4302.disastrous_attempt_1: "\n\nPor sorte, parece que o servo não teve nenhum receio de revelar meu envolvimento no complô para salvar a própria vida."
 murder_outcome.4302.something_is_known: "\n\nPelo menos meu envolvimento no plano continua desconhecido."
 murder_outcome.4302.unknown_so_far: "\n\nNo entanto, o servo escapou! Como também levou às pressas alguns objetos de valor em sua fuga, as pessoas acreditam que foi um roubo elaborado, e não um assassinato."
 murder_outcome.4302.a: "Sua hora chegará, [target.GetFirstNameNoTooltip]..."
 murder_outcome.4301.t: "Esquecido na Escuridão"
 murder_outcome.4301.failure_declaration_1: "Parece que meu plano para matar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] falhou!"
 murder_outcome.4301.failed_lack_of_planning: "Talvez a tentativa devesse ter sido planejada um pouco melhor, pois minha gangue de supostos assassinos teve que fugir de um guarda muito ansioso e não concluiu o trabalho."
 murder_outcome.4301.failed_attempt_1: "Embora meus aspirantes a assassinos tenham espancado[target.GetHerHim] até quase matá-lo, esse quase foi tudo de que ele precisou para sobreviver."
 murder_outcome.4301.something_is_known: "\n\nEmbora esteja claro para todos que esta foi uma tentativa contra a vida de [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], minha participação ainda é desconhecida."
 murder_outcome.4301.unknown_so_far: "\n\nPelo menos atribuíram o incidente a uma briga entre prisioneiros, então meu envolvimento permanece desconhecido."
 murder_outcome.4301.disastrous_lack_of_planning: "\n\nTalvez eu devesse ter sido um pouco mais paciente, pois não apenas minha gangue de supostos assassinos foi interrompida em seu trabalho por um guarda muito ansioso, mas vários deles me denunciaram como o responsável!"
 murder_outcome.4301.disastrous_attempt_1: "\n\nNão apenas minha gangue de supostos assassinos foi interrompida em seu trabalho por um guarda muito ansioso, mas vários deles me denunciaram como o responsável!"
 murder_outcome.4301.a.discovered: "Será que é realmente melhor deixá-lo apodrecer?"
 murder_outcome.4301.a: "Maldição!"
 murder_outcome.4401.failure_declaration_1: "De alguma forma, #EMP de alguma forma#!, [target.GetTitledFirstName|l] ainda vive!"
 murder_outcome.4401.failed_attempt_1: "O assassino se infiltrou nos aposentos, mas por mais tempo que mantivesse o travesseiro sobre o rosto de [target.GetTitleTierName] , simplesmente não morria."
 murder_outcome.4401.disastrous_attempt_1: "\n\nEm breve, os guardas chegaram, e o assassino confessou não apenas o plano, mas também meu envolvimento nele!"
 murder_outcome.4401.something_is_known: "\n\nEm breve, os guardas chegaram, e o assassino teve que fazer uma fuga rápida. Pelo menos ninguém sabe que eu estava por trás da tentativa."
 murder_outcome.4401.unknown_so_far: "\n\nQuando os guardas apareceram, meu assassino teve que fazer uma fuga rápida, mas pelo menos ele passou despercebido, e ninguém sabe que ele esteve lá."
 murder_outcome.4302.a.discovered: "Ah, será que eu errei a data da execução?"
 murder_outcome.4401.a: "É apenas uma questão de tempo, [target.GetFirstNameNoTooltip]."
 murder_outcome.5001.t: "Despedindo-se Deste Corpo Mortal"
 murder_outcome.5001.poisoned_duck: "Estou aproveitando o pato em meu banquete quando, de repente, sinto minha garganta inchar e meus membros ficarem pesados. Consigo prever o que está por vir, mas não posso fazer nada para impedir.\n\nNão demora muito para que minha visão se obscureça e os sons distantes de risadas se transformem em gritos horrorizados, aos poucos se afastando de mim."
 murder_outcome.5001.gang_of_thugs: "Viajando pela floresta com meu séquito, somos atacados por um bando de ladrões. Logo mostram estar mais interessados em nossas vidas do que em nosso ouro, e, embora meus homens lutem bravamente, os bandidos tinham o elemento surpresa.\n\nCorro o mais rápido que posso, até achar que estou a salvo. Então, sobre o ruído da batalha, ouço o som puro de uma única corda de arco."
 murder_outcome.5001.hired_assassin: "Acordo no meio da noite e vejo uma figura sombria em meus aposentos. Não sei o que aconteceu com meus guardas, mas ao ver o brilho da luz da lua refletida na lâmina, sei que é tarde demais para mim.\n\nUma adaga suficientemente afiada faz pouco som ao perfurar a carne, e em meio à dor agonizante não consigo perceber se meus gritos são audíveis."
 murder_outcome.5001.creepy_crawly_intro: "No momento em que sinto algo roçar contra minha perna, não consigo evitar um arrepio e lanço as cobertas para longe, mas o movimento rápido só agita ainda mais o hóspede indesejado."
 murder_outcome.5001.creepy_crawly_known: "Mesmo sob a tênue luz da lua, consigo reconhecer a forma de um espécime de [ROOT.Char.Custom('VenomousCreatureType')]."
 murder_outcome.5001.creepy_crawly_unknown: "Sentindo-se ameaçado, o [ROOT.Char.Custom('VenomousCreatureType')] move-se rapidamente e ataca."
 murder_outcome.5001.creepy_crawly_end: "O [ROOT.Char.Custom('VenomousCreatureAttack')] mal arde no início, mas logo meu corpo inteiro é consumido por uma dor lancinante. Tento chamar por ajuda, mas minha voz é fraca enquanto meus membros ficam dormentes e minha consciência esmaece."
 murder_outcome.5001.riled_up_mob: "Estou cavalgando pelas ruas de [ROOT.Char.GetCurrentLocation.GetName] quando uma multidão de camponeses, gritando e berrando, ataca minha comitiva. Antes que eu perceba o que está acontecendo, os plebeus me arrancam do cavalo e começam a me espancar. Consigo ouvir meus guardas gritando, mas muito antes de me alcançarem, o mundo começa a desaparecer diante dos meus olhos."
 murder_outcome.5001.bricked: "Ontem passei uma noite encantadora, embriagado de alegria e vinho.\n\nQuando acordo de manhã com uma ressaca terrível e sem lembrança de onde estou ou como cheguei aqui, percebo que estou em algo que parece ser um porão úmido, com uma parede recém-construída cobrindo a única saída! Meus gritos de socorro são abafados pelas grossas paredes, e a esperança de ser encontrado se torna cada vez mais fraca a cada hora incontável. Então, apenas um crescente sentimento de fraqueza... #EMP Talvez eu só tire um cochilo...#!"
 murder_outcome.5001.sunken_boat: "Estou em um barco, desfrutando da brisa da noite, quando de repente uma flecha em chamas atravessa o céu em nossa direção!\n\nEla atinge o barco com um pesado #EMP ruído#!, e leva apenas um momento antes que todo o barco se incendeie e eu me atire na água fria do oceano. Enquanto minhas roupas pesadas me arrastam para baixo, tento nadar, tento alcançar algo para me segurar, tento #EMP respirar#!..."
 murder_outcome.5001.sunken_boat_travel: "Estou a bordo de um navio em mar aberto, quando de repente uma flecha em chamas atravessa o céu em nossa direção!\n\nEla atinge o barco com um pesado #EMP ruído#!, e leva apenas um momento antes que todo o barco se incendie e eu me atire na água fria do oceano. Enquanto minhas roupas pesadas me arrastam para baixo, tento nadar, tento alcançar algo para me segurar, tento #EMP respirar#!..."
 murder_outcome.5001.poisoned_drink_alcohol: "Enquanto desfruto do jantar com um copo cheio de [ROOT.Char.Custom('RegionalAlcoholicDrink')], de repente sinto uma sensação curiosa em minha garganta."
 murder_outcome.5001.poisoned_drink_no_alcohol: "Enquanto desfruto do jantar com um copo cheio de [ROOT.Char.Custom('RegionalDrink')], de repente sinto uma sensação curiosa em minha garganta."
 murder_outcome.5001.poisoned_drink: "Não demora muito para eu estar #EMP lutando#! com minha garganta, tentando respirar, gritar, obter qualquer ar que seja possível passar por minha garganta inchada e sangrando. Conforme minha consciência desaparece, vejo sangue e pele sob minhas unhas; terei que lavar isso, que inapropriado..."
 murder_outcome.5001.assassin: "[assassin.GetFirstName] me levou para a floresta para brincar, e nós nos divertimos tanto hoje! Porém, foi se esconder faz muito tempo, e não o encontro, e está ficando escuro e assustador muito rápido...[assassin.GetHerHim]"
 murder_outcome.5001.courtier: "Alguns cortesãos me trouxeram para a floresta para brincar, e nos divertimos tanto hoje! No entanto, eles foram se esconder há muito tempo, e não consigo encontrá-los, e está escurecendo e ficando assustador tão rápido..."
 murder_outcome.5001.lured_into_forest: "\n\nTento encontrar o caminho de volta para casa, mas todas as árvores parecem iguais para mim, e logo posso ouvir monstros vindo em minha direção. Começo a correr, mas eles são mais rápidos e maiores e mais fortes... Fecho os olhos e choro por minha mãe."
 murder_outcome.5001.stab_infant: "Luzes mudando. Rostos familiares, rostos desconhecidos. Sons que conheço e sons que não conheço. Um som agudo e frio faz meus ouvidos doerem, e começo a chorar.\n\nSinto alguém segurando minha cabeça. Uma dor intensa e brilhante. Depois, nada."
 murder_outcome.5001.infant_creepy_crawly: "Un lecho suave debajo de mí y una cálida manta es lo único que quiero. Estoy a punto de dormirme cuando noto una sensación extraña, como si algo subiera por mi cuerpo. Un dolor repentino estalla en mi brazo y empiezo a llorar.\n\nEl dolor se extiende y crece. #EMP Duele tanto.#! El dolor es todo lo que ocupa mi mundo hasta que no deja nada."
 murder_outcome.5001.poisoned_candy: "Estou brincando lá fora, sentindo um pouco de fome, quando um servo aparece do nada trazendo o maior presente de todos: uma deliciosa [ROOT.Char.Custom('FavoriteTreat')].\n\nApenas alguns momentos se passam antes que o mundo comece a girar, meu estômago começa a gritar, e eu #EMP não consigo respirar#!! Caio no chão enquanto o pedaço da [ROOT.Char.Custom('FavoriteTreat')] mordido escapa das minhas mãos."
 murder_outcome.5001.child_pushed_dog: "Estou fora brincando quando ouço os gritos desesperados do meu cachorrinho, [ROOT.Char.Custom('DogStoryName')]. Olho para cima e vejo que está pendurado por uma corda em um muro alto e corro para o lado dele o mais rápido que posso.\n\nQuando me inclino para tentar salvar [ROOT.Char.Custom('DogStoryName')], o mundo vira de cabeça para baixo e sinto que estou caindo. O chão se aproxima vertiginosamente. Fecho os olhos e…"
 murder_outcome.5001.child_pushed_cat: "Estou lá fora brincando quando ouço os gritos desesperados do meu adorável gatinho, [ROOT.Char.Custom('CatStoryName')]. Olho para cima e vejo que está pendurado por uma corda em um muro alto, e corro até ele o mais depressa que posso.\n\nQuando me abaixo para tentar salvar [ROOT.Char.Custom('CatStoryName')], o mundo vira de cabeça para baixo e sinto que estou caindo; o chão vem subindo para me encontrar e fecho os olhos e…"
 murder_outcome.5001.child_pushed_toy: "Estou brincando lá fora quando vejo: meu amado [target.Custom('child_favorite_toy')] pendurado por uma corda de uma parede alta. Subo as escadas o mais rápido que posso, mas quando estico a mão para salvá-lo, o mundo vira e estou caindo; o chão se aproxima de mim e fecho os olhos e–"
 murder_outcome.5001.child_pushed: "Estou brincando lá fora quando vejo: uma trilha de doces levando para cima de algumas escadas. No topo, encontro uma cesta pendurada na borda, cheia de doces! Mas quando estico a mão para pegá-la, o mundo vira e estou caindo; o chão se aproxima de mim e fecho os olhos e–"
 murder_outcome.5001.beat_to_death_in_dungeon: "Quando a porta da minha cela se abre, ouso ter esperança por um breve momento de que serei libertado. No entanto, um grupo de figuras encapuzadas entra, e eu já sei o que me aguarda.\n\nA surra é feroz e cruel. Meu corpo debilitado não oferece resistência. Enquanto estou deitado no chão e sinto minha vida escapar, observo distraidamente meu sangue se misturando com a água no chão úmido."
 murder_outcome.5001.unwelcome_guest_house_arrest: "Não reconheço a pessoa que espera em meus aposentos, embora tenha convencido meus captores de que é uma velha amiga minha.\n\nSó quando saca uma adaga escondida [dummy_gender.GetHerHim] reconheço: é o/a serviçal velho/a[dummy_gender.Custom('ES_OA')] [dummy_gender.Custom('GenderedLowlyServantType')] de"
 murder_outcome.5001.unwelcome_guest_house_arrest.target_court: "a corte em [target_home.GetNameNoTier]."
 murder_outcome.5001.unwelcome_guest_house_arrest.no_court: "a antiga corte de [target.GetFirstNameNoTooltip]."
 murder_outcome.5001.unwelcome_guest_house_arrest.end: "Seu golpe vem rápido demais para reagir."
 murder_outcome.5001.strangle_incapable: "O mundo ainda está lá fora? Não consigo sentir o tempo passando. Essa dor está no meu... peito? Ou... garganta? Esse é mesmo o meu corpo? É a noite caindo sobre as nuvens cinzentas da minha mente? Está tão difícil me concentrar.\n\nTão... difícil..."
 murder_outcome.5001.schemer_known: "\n\nNão há um momento de dúvida em minha mente sobre quem me trouxe isso. [owner.GetTitledFirstName|l]!"
 murder_outcome.5001.avenge_me: "Meus herdeiros, vinguem minha morte!"
 murder_outcome.5001.not_my_time: "Eu tinha muito mais a viver!"
 murder_outcome.5001.option_incapable: "Finalmente, a morte."
 murder_outcome.5002.t: "Uma Tentativa em Minha Vida!"
 murder_outcome.5002.poisoned_duck: "Quando estou prestes a dar uma mordida no pedaço mais suculento de pato que já vi, um de meus servos desaba, agarrando a própria garganta! Aparentemente, o tolo se serviu de uma prova da minha refeição.\n\nAo menos, ele serviu como um aviso para que eu não toque no pássaro envenenado, enquanto recebia a devida punição por sua indiscrição."
 murder_outcome.5002.gang_of_thugs: "Viajando pela floresta, minha comitiva foi atacada por bandidos! Eles não estavam atrás do meu ouro, mas atacaram diretamente — antes que eu pudesse ordenar aos meus homens que os matassem ali mesmo. A luta foi mais feroz do que o esperado, e pior, os criminosos estavam claramente me visando!\n\nAinda bem que nenhum deles ficou de pé no final, pois o ataque obstinado quase me venceu."
 murder_outcome.5002.hired_assassin: "O barulho de um assassino tropeçando no meu urinol me tirou do meu sono profundo. Ao ver o possível agressor, gritei para chamar meus guardas de maneira composta e própria de um[ROOT.Char.Custom('ES_XA')] [SCOPE.GetRootScope.GetCharacter.Custom('ES_CaballeroDama')]. Quando chegaram, travou-se uma breve luta, que terminou com a morte do intruso."
 murder_outcome.5002.creepy_crawly_end: "O veneno do [SCOPE.Custom('VenomousCreatureType')] se espalhou pelo meu corpo com uma sensação de queimação, mas chamei meu médico imediatamente. Foi uma tarefa dolorosa, mas, ao amanhecer, a dor do veneno finalmente começou a passar."
 murder_outcome.5002.riled_up_mob: "Eu estava cavalgando pelas ruas de [home_province.GetNameNoTier] quando uma multidão de camponeses gritando e berrando desceu sobre minha comitiva. Felizmente, meus guardas não hesitaram em começar a derrubá-los, enquanto eu voltava para o [ROOT.Char.Custom('ResidenceBuilding')]."
 murder_outcome.5002.bricked: "Ontem participei de algumas celebrações locais em [home_province.GetName] e passei uma noite encantadora embriagado de alegria e vinho.\n\nQuando acordo pela manhã com uma ressaca enorme e sem lembrar onde estou nem como cheguei até aqui, me encontro em o que parece ser uma adega úmida, com uma parede recém-construída que #EMP casi#! quase![ROOT.Char.Custom('ES_OA')] cega a única saída. Alguém queria me enterrar aqui!"
 murder_outcome.5002.sunken_boat: "Estou em um barco em um porto em [province.GetNameNoTier] quando de repente uma flecha em chamas cruza o céu em nossa direção!\n\nEla passa raspando pelo barco, e ao me inclinar para vê-la se apagar na água fria do oceano, sinto um cheiro distinto vindo da madeira do barco: fogo grego! Isso foi uma tentativa em minha vida."
 murder_outcome.5002.poisoned_drink: "Mientras cenaba, ¡un sirviente irrumpe en la habitación y me quita la copa de un golpe cuando estaba #EMP a punto#! de tomar un trago!\n\n¡[ROOT.Char.Custom('FormOfAddressForLiege')|U], es veneno! Una de las fregonas… Perdonadla, bebió un sorbito y… se… ¡está muerta!."
 murder_outcome.5002.lured_into_forest: "[assassin.GetFirstName] me atraiu para a floresta para brincar, mas então [assassin.GetSheHe] se escondeu e nunca apareceu!\n\nDepois de chorar, tropeçar em galhos e gritar por ajuda até minha garganta ficar em carne viva, de repente encontro meu caminho para fora da floresta e volto para casa em segurança."
 murder_outcome.5002.stab_infant: "As luzes se movem. Rostos familiares, rostos desconhecidos. Sons que conheço e sons que não conheço. Um som agudo e frio faz meus ouvidos doerem, e começo a chorar.\n\nEntão ouço uma mulher soluçando, grande e adulta. Vozes gritando, em pânico. Depois, fico sozinha[ROOT.Char.Custom('ES_OA')]."
 murder_outcome.5002.infant_creepy_crawly: "Um cobertor macio sob mim, e uma capa quente. Estou quase pegando no sono quando sinto uma sensação curiosa, como se algo estivesse subindo pelo meu corpo. Uma dor repentina floresce no meu braço e eu começo a chorar.\n\nEu consigo ouvir um homem, perto de mim, e de repente consigo ouvir muitas vozes, levantadas em alarme. Conforme as vozes desaparecem, também desaparece a dor no meu braço, e logo adormeço."
 murder_outcome.5002.poisoned_candy: "Estou brincando quando aparece diante de mim: uma deliciosa [ROOT.Char.Custom('FavoriteTreat')]. Não há ninguém por perto, e ninguém notaria se eu desse uma mordida...\n\nNo exato momento em que estou prestes a morder o doce, um cachorro de rua sarnento o arranca das minhas mãos, engole-o inteiro e desaba morto no chão."
 murder_outcome.5002.child_pushed_dog: "Estou lá fora brincando quando ouço os gritos desesperados do meu cachorrinho, [ROOT.Char.Custom('DogStoryName')]. Olho para cima e vejo que ele está pendurado por uma corda em um muro alto e corro até ele o mais rápido que posso.\n\nQuando me inclino para tentar salvar [ROOT.Char.Custom('DogStoryName')], o mundo vira de cabeça para baixo e sinto que estou caindo. O chão vem se aproximando vertiginosamente. Fecho os olhos e… noto que estou pendurado na parede pela parte de trás da minha [ROOT.Char.Custom('GetUpperClothingArticle')]. #EMP Por poco!#!"
 murder_outcome.5002.child_pushed_cat: "Estou fora brincando quando ouço os gritos desesperados do meu adorável gatinho, [ROOT.Char.Custom('CatStoryName')]. Olho para cima e vejo que está pendurado por uma corda em um muro alto e corro para lá o mais rápido que posso.\n\nQuando me inclino para tentar salvar [ROOT.Char.Custom('CatStoryName')], o mundo vira de cabeça para baixo e sinto que estou caindo. O chão se aproxima vertiginosamente. Fecho os olhos e… percebo que estou pendurado na parede pela parte de trás da minha [ROOT.Char.Custom('GetUpperClothingArticle')]. #EMP Por poco!#!"
 murder_outcome.5002.child_pushed_toy: "Estou brincando lá fora quando o vejo: meu amado [target.Custom('child_favorite_toy')] está pendurado por uma corda em um muro alto. Subo as escadas o mais rápido que posso, mas quando me abaixo para salvar meu brinquedo, o mundo vira de cabeça para baixo e sinto que estou caindo; o chão vem ao meu encontro e fecho os olhos e… me vejo pendurado na parede pela parte de trás do meu [ROOT.Char.Custom('GetUpperClothingArticle')]. #EMP Por poco!#!"
 murder_outcome.5002.child_pushed: "Estou brincando lá fora quando vejo uma trilha de doces subindo alguns degraus. No topo, encontro uma cesta pendurada na beirada, cheia de doces! Mas quando estico a mão para pegá-la, o mundo vira e estou caindo; o chão vem ao meu encontro e fecho os olhos e... acabo pendurado na parede pela parte de trás da minha [ROOT.Char.Custom('GetUpperClothingArticle')]. #EMP Ufa!#!"
 murder_outcome.5002.beat_to_death_in_dungeon: "Quando a porta da minha cela se abriu, ousei ter esperança por um momento de que estava sendo libertado. No entanto, as figuras encapuzadas que entraram logo quebraram minha esperança e começaram a me espancar cruelmente.\n\nEmbora seja doloroso dizer isso, foi apenas a chegada acidental — mas oportuna — dos meus guardas que salvou minha vida."
 murder_outcome.5002.unwelcome_guest_house_arrest: "Supostamente, um velho amigo me esperava em meus aposentos, então fico bastante surpreso ao me deparar com uma figura encapuzada — uma figura notavelmente desconhecida e suspeita.\n\nPortanto, assim que surge uma adaga oculta, estou pront[ROOT.Char.Custom('ES_OA')] para correr até a porta e chamar os guardas aos gritos. Eles estão logo do lado de fora do quarto, então suponho que também não confiavam no estrangeiro, o que é minha sorte."
 murder_outcome.5002.strangle_incapable: "O mundo ainda está lá fora? Não consigo sentir o tempo passando. Aquela dor está no meu... peito? Ou... garganta? Isso é meu corpo? Está caindo a noite nas nuvens cinzas da minha mente? Está tão difícil focar.\n\nHá presenças ao meu redor? Não consigo ouvir, mas #EMP sinto#! como se alguém estivesse gritando. Então, mais uma vez, só há silêncio."
 murder_outcome.5002.schemer_known: "\n\nSem dúvida, isso foi obra de[owner.Custom('ES_EA')] [owner.Custom2('InsultAdjective', ROOT.Char)] [owner.Custom2('InsultNoun', ROOT.Char)], [owner_to_reveal.Custom('ES_ElLa')] [owner_to_reveal.GetTitledFirstName|l]!"
 murder_outcome.5002.will_find_out: "Eu vou descobrir quem foi o responsável por isso!"
 murder_outcome.5002.revenge_will_be_had: "Lamentará ter feito isso!"
 murder_outcome.5002.child: "Que adulto seria tão cruel?"
 murder_outcome.5002.infant: "Eu choro mais um pouco."
 murder_outcome.5002.option_incapable: "O que está acontecendo?"
 murder_outcome.5002.memories_death: "\n\nEnquanto desapareço, uma voz diz friamente:\n#EMP \"Contrato cumprido. Vingança pelo que [bad_memory.GetThirdPerspectiveDescription], verificado. Hora de coletar o ouro.\"#!"
 murder_outcome.5002.memories: "\n\nUm bilhete amassado é encontrado perto da cena: #EMP \"Pagamento incluso na íntegra. Contrato emitido para quando [bad_memory.GetThirdPerspectiveDescription].\"#!"
 #Family Feud
 murder_outcome.5002.house_feud: "\n\nCasa [owner_to_reveal.GetHouse.GetBaseName]! Eu deveria ter sabido!"
 murder_outcome.4301.house_feud: "\n\nMalditos esses bastardos da casa [target.GetHouse.GetBaseName]!"
 murder_outcome.2001.house_feud: "\n\nPelo menos os [target.GetHouse.GetBaseName] é uma preocupação a menos agora!"
 murder_outcome.2001.b: "Isso é apenas o começo."
 murder_outcome.2001.c: "A justiça foi feita."
 #################################################
 #MURDER SCHEME REWORK
 #################################################
 #Outcome Declarations
 #Success
 murder_outcome_reworked.0000.success_declaration.generic.1: "![target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] morreu finalmente!"
 murder_outcome_reworked.0000.success_declaration.generic.2: "Meus agentes conseguiram assassinar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l]!"
 murder_outcome_reworked.0000.success_declaration.generic.3: "Foi enviado [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] até o abraço fatídico [ROOT.Char.GetFaith.DeathDeityNamePossessive]!"
 #Failure
 murder_outcome_reworked.0000.failure_declaration.generic.1: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] escapou ileso!\n\n"
 murder_outcome_reworked.0000.failure_declaration.generic.2: "Minha tentativa contra a vida de [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] foi frustrada!\n\n"
 murder_outcome_reworked.0000.failure_declaration.generic.3: "Parece que [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] voltou a escapar do julgamento de [ROOT.Char.GetFaith.HighGodNamePossessive]!\n\n"
 murder_outcome_reworked.0000.failure_declaration.generic.4: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] ainda está vivo!\n\n"
 murder_outcome_reworked.0000.failure_declaration.generic.5: "Parece que meu plano para matar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] falhou!\n\n"
 murder_outcome_reworked.0000.failure_declaration.generic.6: "De algum modo, #EMP no sé cómo#!, [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] ainda está vivo!\n\n"
 #Memories (Scheme Owner)
 murder_outcome_reworked.0000.memories.bad.general: "Sempre lembrarei quando [bad_memory.GetDescription], [ROOT.Char.Custom('MurderMemoryEnding')]\n\n"
 murder_outcome_reworked.0000.memories.bad.house_feud: "Menos[target.Custom('ES_XA')] [target.GetHouse.GetBaseName] uma [target.Custom('ES_DelDela')] com que se preocupar.\n\n"
 murder_outcome_reworked.0000.memories.line_break: "Uma dor no meu lado não mais, graças a [owner.GetFaith.FateGodName].\n\n"
 #Kept Secret (Scheme Owner)
 murder_outcome_reworked.0000.kept_secret.generic.1: "\n\nFelizmente, embora sempre haja sussurros, meu envolvimento no crime permanece desconhecido."
 murder_outcome_reworked.0000.kept_secret.generic.2: "\n\nCobri bem minhas trilhas, e se alguém suspeitar de mim como responsável pelo ataque, não se atreve a dizer em voz alta."
 #Revealed (Scheme Owner)
 murder_outcome_reworked.0000.revealed.generic.1: "\n\nInfelizmente, não importa o quanto eu proteste, acusações infundadas de todos os lados apontam diretamente para #EMP eu#! como a mente por trás do incidente."
 murder_outcome_reworked.0000.revealed.success.1: "\n\nInfelizmente, alguém, em algum lugar, cometeu um erro e minha participação no crime foi revelada; ao menos posso me consolar com o fato de que [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] está em pior situação do que eu."
 murder_outcome_reworked.0000.revealed.failure.1: "\n\nO que é pior, surgiram provas suficientes para demonstrar meu envolvimento no crime, me marcando como fracasso e assassino[ROOT.Char.Custom('ES_OA')]."
 murder_outcome_reworked.0000.addendum.house_feud.1: "Malditos esses [target.GetHouse.GetBaseName] #EMP bastardos#!."
 murder_outcome_reworked.0000.addendum.house_feud.2: "Casa [owner_to_reveal.GetHouse.GetBaseName], malditos todos até [target.GetFaith.random_NegativeAfterLife]!"
 murder_outcome_reworked.0000.addendum.house_feud.2.2: "E \"$murder_outcome_reworked.0000.addendum.house_feud.2$\""
 murder_outcome_reworked.0000.addendum.house_feud.2.servants: "Os servos resmungam: $murder_outcome_reworked.0000.addendum.house_feud.2.2$"
 #Memories (Scheme Target)
 murder_outcome_reworked.0000.memories.target.voice_overheard: "\n\nEnquanto me desvaneço, uma voz sussurra friamente: #EMP "Consideradlo la venganza de cuando [bad_memory.GetSecondPerspectiveDescription], querid[target.Custom('ES_OA')] [target.GetTitleAsNameNoTooltip|l]. Espero que valiese la pena".#!"
 murder_outcome_reworked.0000.memories.target.note_discovered: "\n\nUm bilhete amassado é encontrado perto do local: #EMP \"Pagamento integral incluído. Contrato emitido para quando [bad_memory.GetThirdPerspectiveDescription].\"#!"
 #Revealed (Scheme Target)
 murder_outcome_reworked.0000.revealed.scheme_target.success.1: "\n\nQuando a morte me reclama, não tenho a menor dúvida sobre quem me causou isto: [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l]!"
 murder_outcome_reworked.0000.revealed.scheme_target.success.2: "\n\nEmbora eu perca a consciência, meus últimos pensamentos são de que, sem dúvida, isso foi obra dessa espécie de [owner.Custom2('InsultNoun', ROOT.Char)|l] [owner.Custom2('InsultAdjective', ROOT.Char)], é [owner_to_reveal.Custom('ES_ElLa')|U] [owner_to_reveal.GetTitledFirstName|l]!"
 murder_outcome_reworked.0000.revealed.scheme_target.success.child: "\n\nNão chegarei a ver o dilacerante desespero da minha família, nem a ouvir os sussurros entre os servos: "Foi [owner_to_reveal.Custom('ES_ElLa')] [owner_to_reveal.GetTitledFirstName|l]!"."
 murder_outcome_reworked.0000.revealed.scheme_target.success.baby: "\n\nEu não entenderia o pânico quando os criados me encontrassem, nem seus sussurros: "Foi [owner_to_reveal.Custom('ES_ElLa')] [owner_to_reveal.GetTitledFirstName|l]!"."
 murder_outcome_reworked.0000.revealed.scheme_target.failure.baby: "\n\nNão entendo os murmúrios furiosos dos serviçais quando me encontram, nem seus sussurros: "Deve ter sido [owner_to_reveal.Custom('ES_ElLa')] [owner_to_reveal.GetTitledFirstName|l]!"."
 murder_outcome_reworked.0000.revealed.scheme_target.failure.baby.2: "\n\nNão entendo os murmúrios furiosos dos servos: "Deve ter sido [owner_to_reveal.Custom('ES_ElLa')] [owner_to_reveal.GetTitledFirstName|l]!"."
 murder_outcome_reworked.0000.revealed.scheme_target.success.baby.end: "Eu era apenas um bebê, afinal."
 murder_outcome_reworked.0000.revealed.scheme_target.failure.baby.end: "Eu sou apenas um bebê, afinal."
 murder_outcome_reworked.0000.revealed.scheme_target.success.1.incapable: "\n\nQuando encontrarem meu corpo, muitas palavras serão ditas, cujo significado há muito terá escapado à minha mente fraca: "Foi [owner_to_reveal.Custom('ES_ElLa')] [owner_to_reveal.GetTitledFirstName|l]!"."
 murder_outcome_reworked.0000.revealed.scheme_target.failure.1.incapable: "\n\nSe as palavras ainda significassem algo para mim, eu reconheceria o que todos ao meu redor sussurram e repetem com raiva: "Deve ter sido [owner_to_reveal.Custom('ES_ElLa')] [owner_to_reveal.GetTitledFirstName|l]!"."
 murder_outcome_reworked.0000.revealed.scheme_target.success.no_linebreak.1: "Não há um momento de dúvida em minha mente sobre quem fez isso comigo. [owner_to_reveal.Custom('ES_ElLa')|U] [owner.GetTitledFirstName|l]!"
 murder_outcome_reworked.0000.revealed.scheme_target.success.no_linebreak.2: "Sem dúvida, isso foi obra de[owner.Custom('ES_EA')] [owner.Custom2('InsultAdjective', ROOT.Char)] [owner.Custom2('InsultNoun', ROOT.Char)], [owner_to_reveal.Custom('ES_ElLa')] [owner_to_reveal.GetTitledFirstName|l]!"
 murder_outcome_reworked.0000.revealed.scheme_target.failure.1: "\n\nApesar de suas protestas fervorosas, todas as evidências apontam para o envolvimento direto [owner_to_reveal.Custom('ES_DelDela')] [owner_to_reveal.GetTitledFirstName|l] no incidente."
 murder_outcome_reworked.0000.revealed.scheme_target.failure.2: "\n\nNão só o assassinato fracassou, como também o desajeitado rastro de provas deixado leva diretamente ao seu mentor[owner_to_reveal.Custom('ES_XA')]: [owner_to_reveal.Custom('ES_ElLa')] [owner_to_reveal.GetTitledFirstName|l]!"
 #################################################
 #Outcome Responses
 #Revealed (Scheme Owner)
 murder_outcome_reworked.0000.revealed.owner.response.1: "Que acusações infundadas!"
 #General Successful Responses (Scheme Target)
 murder_outcome_reworked.0000.successful_scheme_target.adult: "Eu ainda tinha tanto a fazer..."
 murder_outcome_reworked.0000.successful_scheme_target.child: "Não é justo!"
 murder_outcome_reworked.0000.successful_scheme_target.incapable: "Então, apenas o nada."
 #################################################
 #Outcomes — Standard
 #Hired an Assassin
 murder_outcome_reworked.0001.desc.assassin_present_at_location.consort: "[assassin.GetFirstName], por ser seu [assassin.Custom2('GetYourConsortType', target)], já estava em posição: só precisava esperar que [target.GetFirstNameNoTooltip] adormecesse, tirar debaixo do travesseiro a faca que lhe foi fornecida e cortar a garganta dessa espécie de [target.Custom2('InsultNoun', ROOT.Char)]. Uma corda lançada da janela, alguns cortes autoinfligidos e sinais de uma briga preparados embaixo fingiram bastante bem a fuga do ꡟ"verdadeiro assassino"."
 murder_outcome_reworked.0001.desc.hired_assassin.assassin_present_at_location: "[assassin.GetFirstName] executou nosso plano perfeitamente. Sob o manto da noite, conseguiu passar por uma brecha entre as patrulhas, entrar nos aposentos de nossa presa com uma chave roubada e pôr fim à miserável existência de [target.GetFirstNameNoTooltip] com um fim úmido e borbulhante."
 murder_outcome_reworked.0001.desc.hired_assassin.assassin_remote_working: "O mercenário de [assassin.GetFirstName] executou nosso plano com perfeição. Na calada da noite, infiltrou-se pelo vão identificado entre as patrulhas, entrou nos aposentos da nossa presa com uma chave roubada e pôs fim à existência miserável de [target.GetFirstNameNoTooltip] com um fim úmido e borbulhante."
 murder_outcome_reworked.0002.desc: "$murder_outcome.5001.hired_assassin$"
 murder_outcome_reworked.0003.desc: "O assassino cometeu um erro crítico no momento mais delicado! [target.GetFirstNameNoTooltip] acordou para ver uma figura ameaçadora encapuzada ao lado de sua cama e imediatamente gritou por ajuda, fazendo nosso agente assustado sair correndo."
 murder_outcome_reworked.0004.desc: "Barulhos de mãos atrapalhadas e maldições sussurradas me acordam do meu sono.\n\nPerto de mim — #EMP perto demais para conforto#! — está uma figura encapuzada, aparentemente tão assustada quanto eu. Meu grito repentino por ajuda a faz fugir, enquanto os guardas correm para dentro."
 #Hired A Gang Of Thugs
 murder_outcome_reworked.0011.desc: "Na verdade, não foi preciso muita coisa — apenas uma gangue de bandoleiros desesperados por prata e uma oportunidade arquitetada para atacarem —, mas os resultados foram #EMP excepcionales#!. A luta corpo a corpo pegou seus defensores completamente desprevenidos, permitindo que um dos malfeitores atravessasse o olho de [Select_CString(target.IsFemale, 'esa malnacida', 'ese malnacido' )]."
 murder_outcome_reworked.0012.desc.alley: "Minha comitiva e eu estamos viajando pelas ruas estreitas de [target.GetCurrentLocation.GetName],"
 murder_outcome_reworked.0012.desc.wilderness: "Minha comitiva e eu estamos viajando pelas selvas de [target.GetCurrentLocation.GetName],"
 murder_outcome_reworked.0012.desc: "quando um grito estridente corta nossas fileiras.\n\nAparentemente do nada, somos atacados por um bando de bandidos! Flechas e espadas voam espessas e rápidas, pura ferocidade e desejo de morte dizimando meus guardas em um piscar de olhos. Não querendo que essa emboscada seja minha tumba, dou fuga, correndo para um lugar mais seguro. Então, sobre o barulho da batalha, ouço o puro som de uma única corda de arco."
 murder_outcome_reworked.0013.desc: "Nosso plano parecia… tão perfeito… uma distração elaborada, um bando de bandidos desesperados e uma emboscada repentina. #EMP Debería#! ter sido a tumba de [target.GetFirstNameNoTooltip], mas os estúpidos guardas dele se intervieram diante de todo golpe, virote ou lâmina, reagruparam-se e contra-atacaram. Nossos mercenários caíram aos montes."
 murder_outcome_reworked.0014.desc: "Quando um grito estridente corta nossas fileiras.\n\nAparentemente do nada, somos atacados por um bando de malfeitores! O ataque deles é feroz, mas nada comparado à fúria dos meus guardas, e nos lançamos para enfrentá-los. Uma luta brutal se segue, com os assassinos #EMP claramente#! me tendo como alvo principal. Só um tolo não reconheceria isso como uma tentativa de assassinato."
 #Poisoning
 murder_outcome_reworked.0021.desc: "Levei semanas para lançar as bases do meu plano: um prato envenenado, digno de um[target.Custom('ES_XA')] [target.GetWomanMan] de sua estatura. Sempre tão tolo, [target.GetFirstNameNoTooltip] foi incapaz de sentir o cheiro do veneno por trás do leito de ervas exóticas do pato envenenado. Claramente não notou o amargor mortal até que já fosse tarde demais, tarde demais."
 murder_outcome_reworked.0022.desc: "Estou saboreando um pato assado particularmente delicioso no meu banquete quando... que amargor estranho é esse no final? Esse maldito cozinheiro deve ter —\n\nMinha garganta incha. Algo espesso e pesado explode em meu pescoço, nublando minha visão com uma dor de cabeça que se abate sobre minha testa como uma tempestade furiosa. Por que... por que minha visão se nublou e escureceu tanto? Em algum lugar, uma risada distante se transforma em um grito horrorizado. Não consigo me concentrar, #DIE1 não consigo pensar#!, #DIE2 não consigo...#!"
 murder_outcome_reworked.0023.desc: "#EMP Idiota!#! Como é possível que sempre haja um deles para arruinar até os planos mais perfeitos?!\n\nO pato estava pronto para ser servido, o cheiro do veneno habilidosamente escondido por uma cama de ervas aromáticas, o silêncio dos cozinheiros generosamente comprado... E ainda assim um tolo de um servo #EMP teve#! que provar o prato, só para cair morto na frente de [target.GetFirstNameNoTooltip]!"
 murder_outcome_reworked.0024.desc: "Quando estou prestes a morder o pedaço mais suculento de pato que já vi, um dos meus servos desaba, caindo de cara na mesa e se agarrando à garganta. Ele tinha se servido de um pedaço do meu prato!\n\nPelo menos ele serviu como um aviso para não tocar no pato, enquanto recebia a punição justa por seu crime."
 #Creepy-Crawly
 murder_outcome_reworked.0031.desc: "O plano funcionou de maravilha: minha preciosidade de [SCOPE.Custom('VenomousCreature')] esperava por [target.GetFirstNameNoTooltip] em sua cama quando se retirou para dormir, em silêncio e pronta para atacar à menor provocação. E então, [target.GetFirstNameNoTooltip] se moveu."
 murder_outcome_reworked.0033.desc: "Supostamente, o plano era à prova de idiotas: um exemplar de [SCOPE.Custom('VenomousCreature')] esperava por [target.GetFirstNameNoTooltip] em sua cama quando se recolheu para dormir; só tinha de se deitar e deixar que a criaturinha fizesse seu trabalho! Em vez disso, essa espécie de [target.Custom2('InsultNoun', ROOT.Char)] notou um movimento suspeito sob os lençóis e matou a minha [SCOPE.Custom('VenomousCreatureType')] antes que pudesse atacar."
 murder_outcome_reworked.0034.desc: "Quando me retiro para a noite, um movimento suspeito entre os cobertores da minha cama chama minha atenção. Eu puxo os cobertores com cuidado para não assustar nenhum visitante indesejado, só para encontrar uma [SCOPE.Custom('VenomousCreatureType')] me esperando!\n\n"
 murder_outcome_reworked.0034.desc_unknown: "Não consigo identificar precisamente a pequena criatura, mas duvido que ela seja amigável."
 murder_outcome_reworked.0034.desc_end: "Sem hesitar, agarro minha adaga e apunhalo a criatura firmemente no lugar."
 #Riled-Up Mob
 murder_outcome_reworked.0041.desc: "Uma turba agitada de camponeses furiosos esperava por [target.GetFirstNameNoTooltip] em seu caminho pela cidade.\n\nSó de ver seu [target.GetLadyLord] cavalgar despreocupadamente foi suficiente para fazê-los explodir em violência assassina. Os poucos guardas que acompanhavam seu [target.GetLadyLord] eram impotentes diante da fúria cega de uma multidão sedenta de sangue; [target.GetFirstNameNoTooltip] foi pisotead[target.Custom('ES_OA')], espancad[target.Custom('ES_OA')] e esfaquead[target.Custom('ES_OA')] até ficar irreconhecível — sem qualquer chance de sobreviver."
 murder_outcome_reworked.0042.desc: "Eu cavalgava pela cidade perdido[ROOT.Char.Custom('ES_OA')] em meus pensamentos, então não prestava atenção nos comentários baixos dos meus guardas nem na multidão cada vez maior que ia nos fechando o caminho. Quando percebo, já é tarde demais.\n\nCamponeses furiosos nos cercam, nos puxam dos cavalos e nos espancam sem piedade. À medida que uma chuva de golpes cai sobre mim, golpes demais para contar, o sangue me turva a visão, e então tudo fica negro."
 murder_outcome_reworked.0043.desc: "Tudo ia tão bem… Meus agitadores haviam conseguido reunir uma turba de camponeses e os enfurecido adequadamente contra [target.GetFirstNameNoTooltip].\n\nNo entanto, quando [target.GetFirstName] apareceu acompanhado por guardas armados, a sede de sangue da multidão evaporou como a neve ao sol! Apenas alguns retardatários atacaram e foram rapidamente derrubados pelos soldados."
 murder_outcome_reworked.0044.desc: "Enquanto cavalo pela cidade com meu séquito, não consigo deixar de notar a multidão crescente nos cercando de todos os lados.\n\nFelizmente, esta manhã decidi partir com um grupo considerável de soldados bem armados, cuja presença está fazendo maravilhas para acalmar o descontentamento da multidão. Quando um pequeno contingente de camponeses com aparência zangada tenta nos atacar, meus guardas os cortam facilmente, dispersando os remanescentes."
 #Bricked Up Alive
 murder_outcome_reworked.0051.desc: "O plano era elegantemente simples: convidei [target.GetFirstNameNoTooltip] para vir beber, sabendo muito bem que seria incapaz de parar até ficar bêbado. Depois, [target.Custom('ES_ElLa')] muito idiota me seguiu sem protestar até o porão, onde caiu no sono. Ele nem se mexeu quando meus servos ergueram uma parede para selar a entrada da sala. #EMP Para siempre.#!"
 murder_outcome_reworked.0053.desc: "Tudo ia conforme o plano: convidei [target.GetFirstNameNoTooltip] para vir beber, sabendo muito bem que seria incapaz de parar até ficar bêbado. Depois, [target.Custom('ES_ElLa')] muito idiota me seguiu sem protestar até o porão, onde apagou. Supostamente meus servos iam erguer uma parede e deixar[target.GetHerHim] enclausurad[target.Custom('ES_OA')] dentro, mas aparentemente eles se #EMP cansaron#! e não terminaram o trabalho, então [target.GetFirstNameNoTooltip] conseguiu escapar!"
 #Sink A Boat They're On
 murder_outcome_reworked.0061.desc: "Os navios afundam o tempo todo. É um fato da vida. Às vezes, eles são #EMP ayuda#! ajudados a afundar por alguma sabotagem, exatamente quando estão um pouco longe demais da costa. O abraço gelado do mar aberto é chocante, me dizem. Eu poderia perguntar a [target.GetFirstNameNoTooltip] , se não tivesse se afogado. Uma verdadeira #EMP tragedia#!."
 murder_outcome_reworked.0062.desc_port: "Estou a bordo de um navio local para uma viagem curta de supervisão. A costa ainda está visível e minha mente está toda absorvida por algum relatório ou outro, então mal ouço o som repentino de um estalo e os gritos dos marinheiros."
 murder_outcome_reworked.0062.desc_travel: "Eu adoro o mar aberto! O sol beijando meu rosto, o vento varrendo minha capa, o cheiro fresco de água salgada preenchendo meu nariz, os estranhos estalos acompanhados pelos gritos frenéticos dos marinheiros— Espera, #EMP O QUÊ#!?"
 murder_outcome_reworked.0062.desc: "\n\nNão tenho tempo de reagir enquanto o mastro quebrado cai sobre mim, tirando todo o ar dos meus pulmões e me jogando para fora do navio. O choque do impacto com a água gelada faz o resto, enquanto minhas roupas pesadas me puxam para baixo... sob as ondas..."
 murder_outcome_reworked.0063.desc: "Os navios afundam o tempo todo. É um fato da vida. Ou, ao menos, #EMP debería#! deveria ser! Quão difícil pode ser sabotar um pedaço de lixo flutuante para que acabe sob as ondas, junto com [target.GetFirstNameNoTooltip]?!\n\nAparentemente foi difícil demais para meus cúmplices, já que o navio de [target.GetFirstNameNoTooltip] voltou em segurança, com apenas um pequeno contratempo no caminho. Um contratempo claramente encenado e potencialmente letal."
 murder_outcome_reworked.0064.desc: "Meu navio navega tranquilamente sob a luz do sol poente quando um estalo e os gritos frenéticos dos marinheiros chamam minha atenção. Em um instante, vejo-me afastad[ROOT.Char.Custom('ES_OA')] por um dos meus guardas quando uma parte do mastro cai e para exatamente à minha frente.\n\nOs danos à embarcação são consideráveis, mas o capitão está confiante de que chegaremos em segurança ao porto mais próximo. E, o mais importante, ninguém ficou ferido."
 #Poisoned Drink
 murder_outcome_reworked.0071.desc: "Meus cúmplices conseguiram acesso nada menos que à taça pessoal de [target.GetFirstNameNoTooltip] em seu último jantar! Sem serem notados, colocaram apenas algumas gotas de um poderoso veneno em sua bebida. O pobre [target.Custom2('InsultNoun', ROOT.Char)] esvaziou a taça inteira de um gole só e já estava morto antes mesmo de perceber o que estava acontecendo!"
 murder_outcome_reworked.0073.desc: "Meus comparsas conseguiram passar um barril envenenado para a cozinha de [target.GetFirstNameNoTooltip] e lhe prepararam e serviram uma taça cheia da bebida adulterada. A ideia do barril foi um erro.\n\nAntes que essa espécie de [target.Custom2('InsultNoun', ROOT.Char)] levasse sequer a taça aos lábios, uns servos invadiram a sala e anunciaram que outra pessoa que havia bebido do mesmo barril tinha morrido imediatamente."
 murder_outcome_reworked.0074.desc: "Desfruto de um jantar numa noite como qualquer outra. Há uma deliciosa taça cheia até a borda diante de mim, tentadora. Quando finalmente estendo a mão para pegá-la, uma horda de servos irrompe no aposento gritando. "[ROOT.Char.Custom('FormOfAddressForLiege')|U], parem! Está envenenado! Um de nós bebeu do mesmo barril e caiu morto imediatamente!". Minha mão fica congelada no ar."
 #################################################
 #Outcomes — Children
 #Left Child In Forest
 murder_outcome_reworked.4001.desc: "[target.GetFirstNameNoTooltip] estava tão empolgad[target.Custom('ES_OA')] com sua excursão à floresta! Infelizmente, todos sabem que as florestas não são lugar para crianças pequenas, tão jovens, tão #EMP ingênuas#!; é tão fácil que se deixem levar pelo entusiasmo e percam a orientação, seus guardiões e o caminho de volta para casa. Nunca retornam. Assim como aconteceu a [Select_CString(target.IsFemale, 'à pequena', 'ao pequeno' )] [target.GetFirstNameNoTooltip]. Que tragédia."
 murder_outcome_reworked.4003.desc: "Ia ser tão fácil! As florestas não são lugar para crianças: escuras, perigosas, cheias de ravinas, plantas venenosas e bestas famintas por carne! O quão difícil é para uma criança simplesmente se perder e morrer?!\n\nAo que parece, era difícil demais para [target.GetFirstNameNoTooltip]; pois [Select_CString(target.IsFemale, 'la desgraciada', 'el desgraciado' )] teve a #EMP osadía#! de encontrar o caminho de volta para casa [Select_CString(target.IsFemale, 'sana y salva', 'sano y salvo' )]."
 #Infant Stabbed To Death
 murder_outcome_reworked.4011.desc: "Crianças são criaturas tão frágeis... Qualquer doença pode tirá-las da família. Ou qualquer acidente! Como aqueles envolvendo cabecinhas delicadas e agulhas afiadas — eu não precisava nem queria ouvir os detalhes, contanto que o trabalho fosse feito. Tão horrível, que #EMP desgraça#!."
 murder_outcome_reworked.4013.desc: "As pessoas têm tantos receios quando se trata de crianças. Meus cúmplices concordaram que [target.GetFirstNameNoTooltip] precisava morrer, foram generosamente pagos para fazer isso, e ainda assim hesitaram diante da simples visão do bebê dormindo pacificamente! Era tão fácil, apenas uma punhalada onde a cabeça é mais macia, e teria acabado... Que oportunidade desperdiçada."
 #Infant Bitten By Creepy Crawly
 murder_outcome_reworked.4021.desc: "As pessoas são estranhas. É difícil encontrar alguém disposto a levantar a mão contra um bebê, mas colocar uma [SCOPE.Custom('VenomousCreature')] no berço é, aparentemente, muito mais aceitável. O [SCOPE.Custom('VenomousCreatureType')], por sua vez, também não tinha qualquert hesitação e atacou com precisão. O veneno fez sua parte rápida e implacavelmente."
 murder_outcome_reworked.4023.desc: "O exemplar de [SCOPE.Custom('VenomousCreature')] foi deixado na cama de [target.GetFirstNameNoTooltip] como planejado, mas, ao que parece, os movimentos [target.Custom('ES_DelDela')] do infante assustaram a criatura, fazendo-a se esconder em vez de atacar. A criatura inútil foi encontrada horas depois por um serviçal, escondida sob um armário. [Select_CString(target.IsFemale, 'La maldita', 'El maldito' )] bebê saiu ileso."
 murder_outcome_reworked.4024.desc: "Uma cama macia abaixo de mim e um cobertor quente cobrindo-me são tudo o que desejo. Estou quase inconsciente quando sinto vagamente uma sensação curiosa, como se algo estivesse subindo pelo meu corpo. Viro bruscamente para o lado e a sensação desaparece. Adormeço.\n\nMais tarde, sou acordado pelos gritos agudos de um servo. Não tenho certeza do que está acontecendo: muitos adultos correm por aí, suas vozes fortes retumbando, e muitos apontam para algo que não consigo ver sob um armário."
 #Poisoned Candy
 murder_outcome_reworked.4031.desc: "Como as crianças são ingênuas! Só precisei disfarçar um dos meus cúmplices de servo, fazer com que ele levasse uma fatia de bolo deliciosamente apetitoso e totalmente envenenado até [target.GetFirstNameNoTooltip] e [Select_CString(target.IsFemale, 'la muy mema', 'el muy memo' )] ele o devorou de uma só mordida, sem fazer perguntas!\n\nTalvez devêssemos começar a ensinar as crianças a não aceitar doces de desconhecidos…"
 murder_outcome_reworked.4033.desc: "Malditas crianças e sua imprevisibilidade! Era para ser tão fácil: colocar na frente de [target.GetFirstNameNoTooltip] e morre. Que tipo de criança responde "Não estou com fome" quando lhe oferecem um #EMP dulce#!?!"
 murder_outcome_reworked.4034.desc: "Eu estou brincando, sentindo um pouco de sede, quando um servo aparece do nada me oferecendo um [ROOT.Char.Custom('FavoriteTreat')]. Mas eu não quero um [ROOT.Char.Custom('FavoriteTreat')], eu quero beber! Servo tolo!\n\nJá esqueci tudo sobre o incidente quando vários servos se aproximam de mim, horas depois, me parabenizando por ser tão inteligente e corajoso por frustrar algum plano maligno ou algo assim. Seja lá. Agora eu quero um [ROOT.Char.Custom('FavoriteTreat')]!"
 #Child Pushed To Death
 murder_outcome_reworked.4041.desc: "Tudo eventualmente cai: reinos, [ROOT.Char.Custom('LadiesLords')], #EMP crianças empurradas de altos lugares#!...\n\nUma tragédia inevitável."
 murder_outcome_reworked.4043.desc: "Embora meu agente [target.GetHerHim]o empurrou para além da borda, suas roupas se enroscaram em uma saliência da parede logo abaixo. [target.GetHerHim|U]o segurou tempo suficiente para que a ajuda chegasse e [target.GetHerHim]salvassem junto"
 #################################################
 #Outcomes — Prison
 #Beaten To Death In Prison
 murder_outcome_reworked.7001.desc: "Uma das certezas da vida é que os carcereiros só se preocupam com quem tem permissão para sair de sua prisão, e pouco com quem entra ou com o que aconteça com eles.\n\nQuando meus comparsas lhes ofereceram um suborno generoso para que nos permitissem visitar sua #EMP [Select_CString(target.IsFemale, 'buena amiga', 'buen amigo' )]#! [target.GetFirstNameNoTooltip], ficaram mais do que felizes em aceitar. Ficar surdos aos gritos e ao estalar dos ossos foi apenas parte do serviço."
 murder_outcome_reworked.7003.desc: "$murder_outcome_reworked.7001.desc$ Então, por que eles tiveram que intervir antes de o trabalho ser concluído?!"
 murder_outcome_reworked.7004.desc: "$murder_outcome.5001.beat_to_death_in_dungeon$ Então, meus carcereiros habituais irrompem, e a surra para."
 #Unwelcome Guest - House Arrest
 murder_outcome_reworked.7011.desc: "Supõe-se que os prisioneiros em prisão domiciliar sejam vigiados de perto; portanto, infiltrar um dos meus agentes na casa de [target.GetFirstNameNoTooltip] sob o pretexto de visitar [Select_CString(target.IsFemale, 'uma velha amiga', 'um velho amigo' )] foi um verdadeiro golpe de gênio, se me permite dizer! Meu cúmplice entrou e saiu antes mesmo de os guardas perceberem que algo estava errado."
 murder_outcome_reworked.7012.desc: "Meus guardas introduziram uma figura encapuzada desconhecida em minha sala como um velho amigo meu. Estou prestes a protestar que deve haver um engano, pois eu claramente não conheço essa pessoa, quando uma faca brilhante aparece de um bolso escondido. #EMP Oh.#! É um dos #EMP daqueles#! velhos amigos.\n\nNão tenho tempo para reagir, pois a faca voa em minha direção mais rápido do que uma flecha, e eu caio no chão sem emitir um som."
 murder_outcome_reworked.7013.desc: "Supõe-se que os prisioneiros em prisão domiciliar sejam vigiados de perto; portanto, infiltrar um dos meus agentes na casa de [target.GetFirstNameNoTooltip] sob o pretexto de visitar [Select_CString(target.IsFemale, 'uma velha amiga', 'um velho amigo' )] deveria ter sido um verdadeiro golpe de gênio! Infelizmente, os guardas não compraram a história do meu cúmplice e ficaram esperando logo do lado de fora do quarto, prontos para intervir em caso de qualquer atividade suspeita. Aparentemente, tentativa de assassinato #EMP conta#! como #EMP atividade suspeita#!."
 #################################################
 #Outcomes — Special/Other
 #Strangling Incapable
 murder_outcome_reworked.8001.desc: "Os dias de glória de [target.GetFirstNameNoTooltip] passaram há muito tempo e, no entanto, tem se agarrado à vida por tanto tempo, tão desesperadamente e #EMP inútilmente#!… Acredito que o que meu agente fez não foi nada além de um ato de misericórdia. [target.GetFirstNameNoTooltip] não era nada além de uma casca vazia. Isso é realmente assassinato?"
 murder_outcome_reworked.8003.desc: "É revoltante como um agente pode ser incrivelmente incompetente. Quão difícil pode ser estrangular uma pessoa frágil cuja mente já não está mais presente e que está mal viva?! E ainda assim, só encontro fracasso."
