l_spanish:
 murder_save_header: "Interceptador de Assassinato:"
 murder_save.failure_known_owner_tt: "[owner.GetTitledFirstNameNoTooltip|l] falhou em me assassinar"
 murder_save.failure_unknown_owner_tt: "Alguém falhou em me assassinar"
 murder_save.used_up_guile_legacy_5_save: "Gastou a proteção de [GetDynastyPerk('guile_legacy_5').GetName]"
 murder_save.dynasty_member_used_guile_legacy_5_save: "Tentativa de Assassinato"
 murder_save.dynasty_member_used_guile_legacy_5_save_desc: "[target.GetTitledFirstName] sobreviveu a uma tentativa em sua vida graças à proteção de [GetDynastyPerk('guile_legacy_5').GetName]!"
 murder_save.0001.t: "$murder_save_header$ Frustrado pelo Amor"
 murder_save.0001.opening: "Meu atentado contra a vida de [target.GetTitledFirstName|l] foi frustrado!\n\nO assassino chegou até os aposentos de [target.GetTitleTierName], mas [target.GetHerHim] encontrou em companhia de…"
 murder_save.0001.rel_to_me: "—m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover'))]—"
 murder_save.0001.end: "[lover.GetTitledFirstName], seu amante!\n\n[lover.GetFirstName] saltou em ajuda de [target.GetFirstName] e, na luta para se defender, tanto [lover.GetSheHe] quanto o assassino caíram mortos no chão."
 murder_save.0001.a: "Agora nunca vou conseguir pegar[target.GetHerHim]."
 murder_save.0001.b: "Preciso de um novo plano..."
 murder_save.1001.desc: "«No [target.GetHerHim] harás daño!», gritó [lover.GetTitledFirstName|l] mientras saltaba contra la figura sombría que había entrado en mis aposentos, daga en mano.\n\nFue una bendición y una maldición que [lover.GetFirstName] estuviera conmigo aquella noche. De no ser por [lover.GetSheHe], yo habría perdido la vida, pero acabó desangrándose en mis brazos, al lado del asesino muerto."
 murder_save.1001.a: "Que degenerado cruel estava por trás disso?\"murder_save.1001.a:0 \"Que degenerado cruel estava por trás disso?"
 murder_save.1001.b: "[owner.GetTitledFirstNameNoTooltip|l] pagará por isto!"
 murder_save.1001.c: "Melhor [lover.GetFirstNameNoTooltip] do que eu!"
 murder_save.0002.t: "$murder_save_header$ Veneno do Amor [SCOPE.Custom('VenomousCreatureAttackPlural')|U]"
 murder_save.0002.opening: "¡[target.GetTitledFirstName] sigue viv[target.Custom('ES_OA')]!\n\nAunque se puso un ejemplar de [SCOPE.Custom('VenomousCreature')] en su lecho, ¡atacó a quien no debía! En su lugar fue…"
 murder_save.0002.rel_to_me: "—m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover'))]—"
 murder_save.0002.end: "[lover.GetTitledFirstName][lover.Custom('ES_OA')]"
 murder_save.1002.desc: ""Volte para a cama, meu [lover.Custom('LoverPetName')]…"\n\nEstou prestes a ceder ao convite do meu amante quando ele começa a gritar. "O que foi?!" Minha pergunta é respondida quando [lover.Custom('ES_ElElla')] se retorce e se debate o bastante para revelar o/a [SCOPE.Custom('VenomousCreatureType')] rastejando entre os lençóis!\n\nQuando um médico chega, [lover.GetFirstName] já está ficando ríg[lover.Custom('ES_OA')] e frio. Eu também fico gelad[ROOT.Char.Custom('ES_OA')]. Aquela criatura era para mim."
 murder_save.0003.t: "$murder_save_header$ Assassino"
 murder_save.0003.desc: "[target.GetTitledFirstName] ainda está vivo!\n\nMeu assassino chegou até os aposentos de [target.GetTitleTierName], mas interveio [broken_person.GetTitledFirstName|l] (precisamente [broken_person.Custom('ES_ElElla')]!). [target.GetFirstName] não fez nada além de atormentar[broken_person.GetHerHim], mas [broken_person.GetSheHe] deu a própria vida para salvar[target.GetHerHim]. Meu assassino está morto e [target.GetFirstName] conseguiu escapar."
 murder_save.0003.a: "Que mundo injusto em que vivemos."
 murder_save.0003.b: "Devo tentar com um novo plano!"
 murder_save.1003.desc: "[broken_person.GetTitledFirstName] tenta manter a compostura enquanto o assassino se aproxima de mim.\n\n"Trazer um assassino para meus aposentos, [broken_person.GetFirstNameNoTooltip], depois de professar-me lealdade aos gritos…". Seus olhos vão do assassino à arma em sua mão e depois para mim. "Que terrível decepção, mas você não quer me decepcionar, quer?".\n\nAlgo muda em seu olhar. Com um grito, [broken_person.GetSheHe] se lança contra o aspirante a assassino. Ao fim da luta, ambos jazem mortos no chão."
 murder_save.1003.a: "Considere isso uma punição adequada, [broken_person.GetFirstNameNoTooltip]."
 murder_save.0004.t: "$murder_save_header$ Emboscado"
 murder_save.0004.desc: "[target.GetTitledFirstName] continua vivo!\n\n[target.GetTitleTierName][target.Custom('ES_OA')]"
 murder_save_failure_warhorse_tt: "O cavalo de guerra de [target.GetFirstNameNoTooltip] morre devido aos seus ferimentos"
 murder_save.1004.opening: "Viajo com meu séquito quando se ouve um grito entre algumas árvores. \"Ataque! Para cima do [ROOT.Char.GetTitleTierName]!\" Uma emboscada!\n\nNão são meros bandidos atrás do meu ouro, mas capangas atrás da minha vida! No entanto, meu fiel [ROOT.Char.Custom('HorseStoryMareStallion')] sabe o que fazer! Ele se ergue e dá coices para me manter longe de suas lâminas enquanto meus guardas se reúnem para lutar contra eles."
 murder_save.1004.warhorse_dies: "\n\nÉ apenas quando a luta acaba que [ROOT.Char.Custom('WarhorseStoryName')] cai sob mim, e eu descubro seus ferimentos profundos. [ROOT.Char.Custom('HorseStorySheHe')|U] verdadeiramente me protegeu até o fim..."
 murder_save.1004.a: "Esses capangas foram contratados por alguém, mas por quem?"
 murder_save.1004.b: "É óbvio quem está por trás disso!"
 murder_save.1004.c: "Eu vou descobrir quem fez isso!"
 murder_save.1004.d: "Você me custou um cavalo malditamente bom, [owner.GetFirstNameNoTooltip]!"
 murder_save_warhorse_dies_to_thugs: "#F [THIS.Char.Custom('WarhorseStoryName')] morre por causa de seus ferimentos#!"
 murder_save.0005.t: "$murder_save_header$ Alarme Disparado"
 murder_save.0005.desc: "El grupo de conspiradores se dirige a la celda [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], pero [target.Custom('ES_ElLa')] prisioner[target.Custom('ES_OA')] empieza a montar un escándalo salvaje. Pagar al carcelero para que desaparezca es una cosa, ¡pero otra muy distinta es fingir que no pasa nada cuando se despierta a todo el castillo!\n\nMis asesinos se retiran apresuradamente y [target.GetFirstName] queda a salvo…"
 murder_save.1005.desc: "No sé quiénes son las figuras embozadas que han aparecido en mi celda de repente, pero sé que están aquí para hacerme daño. Sin embargo, no esperan que me defienda.\n\n«¡A por ellos!», grito, ¡y mi [ROOT.Char.Custom('prison_pet')] salta contra ellos para defender mi vida! Sé que no son rivales para mi mascota y, en cuanto empiezo a animarla, ¡huyen despavoridos!\n\nEl carcelero llega enseguida para hacerme callar con una paliza, pero al menos sigo respirando."
 murder_save.1005.a: "Eu devo minha vida a você, [ROOT.Char.Custom('prison_pet')]."
 murder_save.1005.b: "Seu sacrifício não foi em vão, meu [ROOT.Char.Custom('prison_pet')]!"
 murder_save.0006.t: "$murder_save_header$ Guardiões"
 murder_save.0006.opening: "Meu "ajudante contratado" abordou [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] conforme planejado, mas eu não contava com a guarda pessoal que"
 murder_save.0006.spouse: "[spouse.GetTitledFirstName] havia criado para [target.GetSheHe]."
 murder_save.0006.no_spouse: "seu cônjuge tinha contratado."
 murder_save.0006.end: "\n\nEles lutaram terrivelmente bravos e incrivelmente bem, o suficiente para que [target.GetFirstName] ainda viva para ver outro dia."
 murder_save.1006.opening: "Eu estava viajando quando meu séquito foi abordado por um bando de bandidos! Felizmente, a guarda criada para mim por"
 murder_save.1006.spouse: "[spouse.GetTitledFirstName]"
 murder_save.1006.no_spouse: "meu cônjuge"
 murder_save.1006.end: "lutou valentemente e me protegeu do ataque.\n\nEnquanto eles lutavam até o fim, ficou claro que esses bandidos não estavam atrás de ouro, mas da minha vida! No final, eles foram repelidos, mas minha guarda pessoal foi quase aniquilada."
 murder_save.0007.t: "$murder_save_header$ Guardião Peludo"
 murder_save.0007.desc: "[target.GetTitledFirstName] ainda está vivo!\n\nFoi colocado um exemplar de [SCOPE.Custom('VenomousCreature')] na cama de [target.GetTitleTierName] mas, antes que pudesse atacar, o gato de [target.GetTitleTierName] se alvoroçou e começou a lutar contra a criatura!"
 murder_save_failure_cat_tt: "O gato de [target.GetFirstNameNoTooltip] morre devido aos ferimentos"
 murder_save.1007.opening: "Ao entrar em meus aposentos, vejo que meu querido gato, [THIS.Char.Custom('CatStoryName')], está tenso. Dá voltas diante da minha cama com grande agitação. De repente, como um raio [THIS.Char.Custom('CatFurColor')], se lança sobre meu leito e expõe o que se escondia entre meus lençóis: um exemplar de [SCOPE.Custom('VenomousCreatureType')]!"
 murder_save.1007.cat_dies: "\n\nA criatura horrível não caiu facilmente e, embora meu gato tenha mordido o pescoço dela, [THIS.Char.Custom('CatStoryName')] não pôde ser salvo."
 murder_save.1007.a: "Eu lhe devo minha vida, [THIS.Char.Custom('CatStoryName')]!"
 murder_save.1007.b: "É óbvio quem está por trás disso!"
 murder_save.1007.c: "Eu vou descobrir quem fez isso!"
 murder_save.1007.d: "Você pagará por isso, [owner.GetFirstNameNoTooltip]!"
 murder_save_creepy_crawlies_cat_dies: "[THIS.Char.Custom('CatStoryName')] morre devido aos ferimentos"
 murder_save.0008.t: "$murder_save_header$ Guardião Peludo"
 murder_save.0008.desc: "Minha tentativa contra a vida de [target.GetTitledFirstName|l] foi frustrada!\n\nO assassino chegou aos aposentos de [target.GetTitleTierName], mas, antes de poder atacar, um cachorro começou a latir! O cachorro de que [target.Custom('ES_OA')] tanto se orgulha [target.GetTitleTierName] assustou o assassino."
 murder_save.1008.desc: "Entro em meus aposentos e meu querido [ROOT.Char.Custom('DogStoryName')] começa a latir. De repente, se lança contra uma sombra escura… Uma que tropeça! [ROOT.Char.Custom('DogStoryName')] persegue o suposto assassino até que [ROOT.Char.Custom('DogStoryHerHim')] chamo de volta ao meu lado."
 murder_save.1008.a: "Eu lhe devo minha vida, [ROOT.Char.Custom('DogStoryName')]!"
 murder_save.0009.t: "$murder_save_header$ Conexões Familiares"
 murder_save.0009.desc: "¡En el último instante de mi conjura para asesinar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l], todo se viene abajo!\n\nSe ve que había partidarios de la dinastía de [target.GetDynasty.GetBaseName] infiltrados y, cuando llegó la noche definitiva, los demás fueron detenido antes de poner siquiera en marcha el plan."
 murder_save.0009.a: "Eu devo recuar, antes que busquem vingança!"
 murder_save.0009.b: "O que foi perdido, eu posso reconstruir."
 murder_save.targets_guile_legacy_save_used_up: "[target.GetShortUIName] no podrá ser salvad[target.Custom('ES_OA')] de nuevo por [GetDynastyPerk( 'guile_legacy_5' ).GetName]"
 murder_save.1009.opening: "Uma tentativa de tirar minha vida foi frustrada!"
 murder_save.1009.owner_discovered: "\n\n[owner.GetTitledFirstName] havia preparado cuidadosamente seus planos, mas não suspeitou que havia seguidores da Casa [target.GetHouse.GetNameNoTooltip] infiltrados em sua conspiração!"
 murder_save.1009.owner_not_discovered: "\n\nFelizmente, quem quer que tenha tramado este plano perverso não previu que ele seria infiltrado por agentes virtuosamente leais à Casa [target.GetHouse.GetNameNoTooltip]!"
 murder_save.1009.end: "\n\nO plano desmoronou, mesmo enquanto estava sendo posto em prática, e minha vida ainda está segura."
 murder_save.1009.a: "Meu próprio nome salvou minha vida!"
 #Saved by a Varangian
 murder_save.0010.t: "$murder_save_header$ Varangos"
 murder_save.0010.desc: "Meu intento de acabar com [target.GetTitledFirstName|l] falhou!\n\nUm daqueles malditos varangianos impediu o assassino! Suponho que [target.GetTitleAsNameNoTooltip] tenha guardas por um motivo…"
 murder_save.0010.varangian_dies: "\n\nPelo menos o assassino teve vantagem sobre o guarda. [varangian.GetTitledFirstName|l] não vai mais cruzar meu caminho."
 murder_save.0010.a: "Nunca mais conseguirei [target.GetSheHe]!"
 murder_save.0010.b: "Preciso de um novo plano..."
 murder_save.1010.desc: "Tentaram me assassinar! Ainda bem que [varangian.GetFirstName], membro da minha Guarda Varangiana, estava à porta dos meus aposentos e interveio imediatamente. Ele deu conta do assassino em instantes e evitou que ele me ferisse."
 murder_save.1010.varangian_dies: "Tragicamente, [varangian.GetFirstNameNoTooltip] sofreu ferimentos fatais no processo."
 murder_save.1010.owner_discovered: "\n\nNão há dúvida de que tudo isso foi obra de [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!"
 murder_save.1010.a: "Quem poderia estar por trás dessa tentativa vil?"
 murder_save.1010.b: "[owner.GetSheHe|U] pagará por isso!"
 murder_save.0011.t: "$murder_save_header$ O Gato Faminto"
 murder_save.0011.desc: "¡Mi atentado contra la vida [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] ha quedado frustrado!\n\nEl veneno, el pato, la comida… todo iba según el plan hasta que su gato pilló un trozo del plato antes de que [target.Custom('ES_ElElla')] pudiera probarlo. Ver al gato retorcerse de dolor hasta morir [target.GetHerHim] disuadió de probar bocado."
 murder_save_poison_cat_tt: "O gato de [target.GetFirstNameNoTooltip] morre envenenado"
 murder_save.1011.desc: "Me siento a comer y mi gato, [ROOT.Char.Custom('CatStoryName')], salta sobre mi regazo, juguetea con mi plato y dejo que robe algo antes de bajarlo al suelo.\n\nCuando voy a probar la comida, oigo maullidos quejosos, sonoros y doloridos. [ROOT.Char.Custom('CatStoryName')] se retuerce en el suelo y sus gemidos de dolor se debilitan hasta que termina en silencio. ¡¿Había veneno en la comida?!"
 murder_save_poison_cat_dies: "[THIS.Char.Custom('CatStoryName')] salvou você e morreu envenenado"
 murder_save.0012.t: "$murder_save_header$ O Cão Faminto"
 murder_save.0012.desc: "¡[target.GetTitledFirstName] sigue con vida!\n\nEl veneno, el pato, la comida… todo iba según el plan hasta que su perro le pidió algo de comer antes de que [target.Custom('ES_ElElla')] pudiera probarlo. Ver al perro retorcerse de dolor hasta morir [target.GetHerHim] disuadió de probar bocado."
 murder_save_poison_dog_tt: "O cão de [target.GetFirstNameNoTooltip] morre envenenado"
 murder_save.1012.desc: "Quando me sento para comer, meu cachorro, [ROOT.Char.Custom('DogStoryName')], me olha com olhos pidões, então deixo cair um pouco de comida do meu prato no chão.\n\nQuando estou prestes a dar a primeira mordida, ouço um gemido alto. [ROOT.Char.Custom('DogStoryName')] se contorce no chão e seus lamentos de dor vão enfraquecendo até que ele finalmente se cala. Havia veneno na comida?!"
 murder_save_poison_dog_dies: "[THIS.Char.Custom('DogStoryName')] salvou você e morreu envenenado"
 murder_save.0013.t: "$murder_save_header$ O Nariz Gourmet"
 murder_save.0013.desc: "[target.GetTitledFirstName] ainda está vivo!\n\nO veneno, [target.Custom('GetExpensiveMeal')]… Tudo estava indo conforme o planejado até que notou que algo estava errado. Tentamos envenenar seu prato favorito, mas [target.GetSheHe] percebeu imediatamente que tinha um cheiro diferente e o jogou fora."
 murder_save.1013.desc: "Enquanto saboreio meu jantar favorito, um cheiro curioso chega ao meu nariz. Há um leve toque de acidez sob o aroma usual, e o equilíbrio das especiarias parece errado... Depois de questionar o cozinheiro, que garantiu que tudo foi preparado normalmente, só consigo pensar em uma coisa: alguém tentou me envenenar!"
 murder_save.0014.t: "$murder_save_header$ Compreensão Fatal"
 murder_save.0014.desc: "Minha tentativa contra a vida de [target.GetTitledFirstName|l] foi frustrada!\n\nAcontece que os assassinos idiotas não perceberam que [target.GetSheHe] falava [owner.GetCulture.GetLanguage.GetNameNoTooltip] e ficaram tagarelando sobre o plano bem debaixo do nariz de"
 murder_save.1014.desc: "Una noche, cuando me disponía a acostarme, oigo a dos de mis sirvientes susurrar entre ellos. Me lleva un instante darme cuenta de que hablan en [owner.GetCulture.GetLanguage.GetNameNoTooltip] en vez de [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]. Está claro que no se han dado cuenta de que los entiendo.\n\n«Esperemos a que se quede dormid[ROOT.Char.Custom('ES_OA')]. Entonces tú vigilas y yo le rajo la garganta».\n\nSalgo rápidamente de mis aposentos para informar a los guardias de que hay asesinos en mi alcoba. ¡Gracias a [ROOT.Char.GetFaith.HighGodName] que hablo [owner.GetCulture.GetLanguage.GetNameNoTooltip]!"
 murder_save.1014.a: "Agora, quem enviaria assassinos que falam [owner.GetCulture.GetLanguage.GetNameNoTooltip]?"
 murder_save.0015.t: "$murder_save_header$ O Artefato Providencial"
 murder_save.0015.desc: "[target.GetTitledFirstName] sobreviveu à minha tentativa de assassinato, aparentemente usando seu [this_artifact.GetName] para brutalmente assassinar o assassino que enviamos."
 murder_save.1015.start_desc: "[attempted_assassin.GetFirstName|U] sai das sombras, com uma faca na mão. Eu olho ao redor desesperadamente procurando algo para usar como arma antes que meus olhos se fixem no"
 murder_save.1015.blunt_artifact.desc: "$murder_save.1015.start_desc$ [this_artifact.GetName]. Eu o/a seguro e o/a uso primeiro para bloquear a estocada iminente, antes de golpear com força, repetidas vezes, o crânio de [attempted_assassin.GetFirstNameNoTooltip].\n\nPor fim, caio exausto e deixo cair o [SCOPE.Custom('ThisArtifactType')], que jaz coberto de sangue e vísceras."
 murder_save.1015.sculpture_artifact.desc: "$murder_save.1015.start_desc$ [this_artifact.GetName]. Afastando-me de [attempted_assassin.GetFirstNameNoTooltip], espero o momento perfeito antes de derrubar a [SCOPE.Custom('ThisArtifactType')] sobre [attempted_assassin.GetSheHe].\n\nFaz um estalo repugnante quando [attempted_assassin.GetHerHim] é esmagado(a) por ela."
 murder_save.1015.chest_artifact.desc: "$murder_save.1015.start_desc$ [this_artifact.GetName]. Me alejo lentamente atrayéndo[attempted_assassin.GetHerHim] hacia el/la [SCOPE.Custom('ThisArtifactType')] abierto/a. En el momento perfecto, le agarro la cabeza y la pongo bajo la tapa del cofre, antes de cerrarla contra su frágil cráneo con un crujido escalofriante.\n\nLa bajo tres o cuatro veces más por precaución antes de dar un paso atrás y dejar que el cuerpo se desplome sobre el suelo."
 murder_save.1015.actual_weapon_artifact.desc: "$murder_save.1015.start_desc$ [this_artifact.GetName]. O sangue some do rosto dele/dela ao perceber que estou armado. Não exige muito esforço para eliminar[attempted_assassin.GetHimHer] com o/a [SCOPE.Custom('ThisArtifactType')]."
 murder_save.1015.strangling_artifact.desc: "$murder_save.1015.start_desc$ [SCOPE.Custom('ThisArtifactType')]. Agarro el/la [this_artifact.GetName] y primero esquivo la inminente estocada antes de enrollar la tela en torno a la garganta de quien me ataca.\n\nSolo hay unos breves instantes de forcejeo antes de que el cuerpo [attempted_assassin.Custom('ES_DelDela')] asesin[attempted_assassin.Custom('ES_OA')] quede inerte."
 murder_save.1015.small_artifact.desc: "$murder_save.1015.start_desc$ [this_artifact.GetName]. Agarro la alhaja y salto sobre mi atacante, encajándosela en la garganta.\n\nAsfixiad[attempted_assassin.Custom('ES_OA')], suelta el cuchillo y cae de rodillas mientras se araña la garganta, tratando desesperadamente de respirar. Mientras por fin los guardias se apresuran a socorrerme, tomo nota mentalmente de que más tarde alguien tendrá que arrancar mi [this_artifact.GetName] del cuerpo."
 murder_save.1015.throne_start.desc: "Uma noite, estou andando de um lado para o outro pelo meu salão do trono vazio quando, das sombras, [attempted_assassin.GetFirstName] salta em minha direção com uma faca. Mal conseguindo desviar do meu agressor, consigo agarrar a parte de trás de sua cabeça e esmagar repetidamente seu rosto contra"
 murder_save.1015.throne_artifact.desc: "$murder_save.1015.throne_start.desc$ a dura madeira de [this_artifact.GetFeatureText('generic_material_wood')] do meu [this_artifact.GetName], para salpicar sua [this_artifact.GetFeatureText('generic_material_cloth')], antes em um estado imaculado, de sangue e dentes."
 murder_save.1015.throne_special_artifact.desc: "$murder_save.1015.throne_start.desc$ [this_artifact.GetName] lendário.\n\n À medida que o sangue espirra no trono, espero que os serviçais consigam remover as manchas."
 new_artifact_loc: "[this_artifact.GetDesc]\n\nFoi usado para impedir uma tentativa de assassinato contra [target.GetTitledFirstName|l]."
 new_artifact_loc_banner: "[this_artifact.GetDesc]\n\nHá uma mancha de sangue no canto de quando foi usado para impedir uma tentativa de assassinato contra [target.GetTitledFirstName|l]."
 death_by_artifact: "[CHARACTER.Custom('ES_LoLa')] foi morto com um artefato"
 death_by_artifact_killer: "[TARGET_CHARACTER.GetUIName] [CHARACTER.Custom('ES_LoLa')] [TARGET_CHARACTER.LocalPlayerString( 'mataste', 'mató' )] com um artefato"
