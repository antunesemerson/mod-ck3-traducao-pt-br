l_spanish:
 murder_event_title: "Assassinato:"
 murder_ongoing.3010.t: "$murder_event_title$ Agente Bêbado"
 murder_ongoing.3010.desc_opening: "[agent_in_question.GetTitledFirstName] se embriaga diariamente."
 murder_ongoing.3010.desc_hero: "Embora isso tenha aberto algumas oportunidades para saber mais sobre [scheme.GetTargetCharacter.Custom('ES_ElLa')] [scheme.GetTargetCharacter.GetTitledFirstName|l], [agent_hero_of_the_moment.Custom('ES_ElLa')] [agent_hero_of_the_moment.GetTitledFirstName|l] ([target.Custom2('RelationToMe', SCOPE.sC('agent_hero_of_the_moment'))] [target.Custom('ES_DelDela')] [scheme.GetTargetCharacter.GetTitleAsNameNoTooltip|l] e meu agente) expressou preocupação de que o bêbado esteja colocando em risco sua posição na corte [agent_in_question.Custom('ES_EA')] embriagad[agent_in_question.Custom('ES_OA')] pode colocar em perigo sua posição na corte [scheme.GetTargetCharacter.Custom('ES_DelDela')] [scheme.GetTargetCharacter.GetTitleAsNameNoTooltip|l].\n\n«É apenas uma questão de tempo até que o temperamento de [agent_in_question.GetHerHim] o traia!»."
 murder_ongoing.3010.desc: "Embora tenha aberto alguma oportunidade de aprender mais sobre [scheme.GetTargetCharacter.Custom('ES_ElLa')] [scheme.GetTargetCharacter.GetTitledFirstName|l], [agent_in_question.GetSheHe] não serve para muita coisa além disso…"
 murder_ongoing.3010.a: "Tome mais uma bebida, [agent_in_question.GetFirstNameNoTooltip]!"
 murder_ongoing.3010.a.success: "Suas escapadas bêbadas são úteis"
 murder_ongoing.3010.a.failure: "[agent_in_question.GetSheHe|U] se expõe"
 murder_ongoing.3010.b: "[agent_in_question.GetTitledFirstNameNoTooltip] deve se manter longe de toda bebida."
 murder_ongoing.3010.c: "Vou garantir que a bebida domine [agent_in_question.GetHerHim]! Prepare-se."
 murder_ongoing.3301.t: "$murder_event_title$ Não é dos Mais Espertos"
 murder_ongoing.3301.desc: "Onde está minha faca cerimonial? A que eu planejava cravar no peito [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]! A que venho afiando há dias!\n\nViro meus aposentos de cabeça para baixo procurando por ela, mas não a encontro em lugar nenhum."
 murder_ongoing.3301.a: "Eu poderia jurar que a deixei aqui!"
 #Apply poisonous herbs to the scheme that you found while travelling
 murder_ongoing.3302.t: "$murder_event_title$ Uma Pitada Disso, Um Ramo Daquilo..."
 murder_ongoing.3302.desc: "De repente, lembro das ervas que consegui quando viajávamos por [herb_location.GetTerrain.GetNameNoTooltip|l] de [herb_location.GetNameNoTooltip].\n\nCertamente me ajudarão a #EMP apimentar#! a situação em minha missão de libertar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] de seu invólucro mortal."
 murder_ongoing.3302.a: "Isso me será útil."
