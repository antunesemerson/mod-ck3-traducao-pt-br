l_spanish:
 #Unused texts for secrecy event
 court_outcome.0001.t: "$court_event_title$ Agora ou Nunca"
 court_outcome.0001.desc: "Oh, [target.GetFirstName], meu [target.Custom('LoverPetName')]! Ah, como desejo teu abraço! Acho que morrerei sem o doce néctar dos teus beijos!\n\nEmbora meus sentimentos sejam puros, muitos nos julgariam. Devo ir até [target.GetSheHe] ou manter distância?"
 court_outcome.0001.b: "Não posso arriscar a segurança dela…"
 court_outcome.0001.a: "Nada virá entre nós!"
 #Player target picks outcome
 court_outcome.0003.t: "É Amor?"
 court_outcome.0003.success.desc: "Mal consigo me lembrar de como era minha vida antes de [owner.GetFirstName] me declarar seus sentimentos. Aqueles dias parecem tão sombrios e cinzentos… Mas, com [owner.GetSheHe] ao meu lado, de repente tudo parece possível!\n\nEu gostaria que pudéssemos continuar assim para sempre, mas, no fundo, sei que preciso tomar minha decisão. Será que tenho coragem suficiente para me entregar aos meus sentimentos, ou devo fechar meu coração para [owner.GetFirstNameNoTooltip] para sempre?"
 court_outcome.0003.failure.desc: "Mal consigo me lembrar de como era minha vida antes de [owner.GetFirstName] me declarar seu amor. Sinto-me lisonjead[ROOT.Char.Custom('ES_OA')], mas também sobrecarregad[ROOT.Char.Custom('ES_OA')] por suas atenções. Sinto falta de um pouco de paz e tranquilidade.\n\nNo entanto, não consigo deixar de me preocupar. Será que eu estaria jogando fora minha única chance de encontrar o amor verdadeiro? Isso não pode estar certo! Será que…?"
 court_outcome.0003.a: "Sou teu[ROOT.Char.Custom('ES_OA')]; [owner.GetFirstNameNoTooltip]. E serei para sempre!"
 court_outcome.0003.a.tt: "[owner.GetShortUIName|U] pode se tornar minha Alma Gêmea"
 court_outcome.0003.b.success: "Um beijo de amor verdadeiro é tudo o que posso dar."
 court_outcome.0003.b.failure: "Merece um beijo, ao menos, por sua devoção."
 court_outcome.0003.b.tt: "[owner.GetShortUIName|U] #bold não#! se tornará minha Alma Gêmea"
 court_outcome.0003.c: "Essa paixão termina hoje."
 court_outcome.kiss.tt: "[target.GetShortUIName|U] e eu nos damos um beijo"
 #Generic keys
 court_outcome.0001.a.tt: "Sigo adiante com minha tentativa de cortejar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l]"
 ### WILD HUNT ###
 court_outcome.1000.t: "$court_event_title$ A Caçada Selvagem"
 court_outcome.1000.i_invite.desc: "Quando [target.GetTitledFirstName|l] sugeriu uma caçada, não hesitei em organizá-la. Eu faria qualquer coisa por um mero vislumbre do meu [target.Custom('LoverPetName')]!"
 court_outcome.1000.own_invite.desc: "Quando [target.GetFirstName] me convidou para uma caçada, não hesitei em aceitar. Não conseguia imaginar um espetáculo mais encantador do que ver[target.GetHerHim] sobre o dorso de um garanhão!"
 court_outcome.1000.liege_invite.desc: "Quando [target_host.Custom2('NamePossessiveCharacterIntroduction', target)] me convidou para uma caçada, não hesitei em aceitar. Eu faria qualquer coisa por um mero vislumbre do meu [target.Custom('LoverPetName')]!"
 court_outcome.1000.end.desc: "\n\nEspreito pela vegetação rasteira, com meu pajem ao meu lado e meu cão logo à frente. Parece que ele encontrou um rastro! Então, de repente, minha concentração é interrompida pelo grito de um[target.Custom('ES_XA')] [target.GetWomanMan]."
 court_outcome.1000.a: "\"Estou indo atrás de você, meu amor!\""
 court_outcome.1000.b: "Talvez seja mais sensato enviar o pajem..."
 court_outcome.1000.c: "Provavelmente foi apenas um pássaro."
 court_outcome.1000.b.failure: "é atacado por uma fera selvagem [target.GetFirstNameNoTooltip]"
 court_outcome.1000.b.success: "[target.GetFirstNameNoTooltip] nunca esteve em perigo"
 court_outcome.1001.desc: "Em apenas um minuto, que me parece uma hora, chego a uma clareira. [target.GetFirstName] está no chão, com as roupas desalinhadas e desarmad[target.Custom('ES_OA')]. Em frente a [target.GetSheHe] e prestes a atacar, há um enorme exemplar de [ROOT.Char.Custom('GetAnimalType')]!\n\nMinha flecha acerta o alvo e a fera cai no chão. Por um momento, tudo o que [target.GetFirstNameNoTooltip] pode fazer é olhar, mas então se aproxima cambaleando de mim e se joga em meus braços."
 court_outcome.1001.a: "Preciso de você, meu amor, aqui e agora!"
 court_outcome.1001.b: "Um único beijo doce é a única recompensa que desejo."
 court_outcome.1002.desc: "\"[target.GetFirstName]! Eu estou chegando!\". Arrebento a vegetação e entro na clareira, com o coração disparado e o suor correndo pelo rosto.\n\nMas a cena diante de mim não é o que eu esperava. Há um(a) [ROOT.Char.Custom('GetAnimalType')], sim — mas ele(a) está no chão, com uma flecha cravada entre os olhos. [target.GetFirstNameNoTooltip] abaixa o arco ao se virar para me encarar.\n\n\"O que é isso, [owner.GetTitledFirstNameNoTooltip|l]? Pensou que eu fosse incapaz de me defender?\"."
 court_outcome.1002.a: "Eu... Eu me perdi?"
 court_outcome.1005.desc: "Os gritos se intensificam à medida que me aproximo. Deve ser meu [target.Custom('RomanticComplimentAdjective')] [target.GetFirstName]… Eu reconheceria a voz dele em qualquer lugar!\n\nMas há algo #EMP raro#! em seus gritos. Não parece que [target.GetFirstNameNoTooltip] esteja com medo… Ou sofrendo…\n\nMeu coração afunda quando finalmente [target.Custom('ES_LoLa')] vejo: está desnud[target.Custom('ES_OA')], tal como veio ao mundo, e está se rebolando na grama com [targets_lover.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 court_outcome.1005.a: "Está claro que [target.GetSheHe] não tem lugar em seu coração para mim."
 court_outcome.1005.b: "[targets_lover.GetFirstNameNoTooltip] vai se arrepender do dia em que cruzou o meu caminho!"
 court_outcome.1005.c: "[target.Custom('ES_LoLa')|U] salvarei da besta!"
 court_outcome.1005.c.murder_undiscovered: "Minha flecha acerta [targets_lover.GetFirstNameNoTooltip]"
 court_outcome.1005.c.murder_discovered: "Minha flecha acerta [targets_lover.GetFirstNameNoTooltip], mas sou descobert"
 court_outcome.1005.c.murder_attempt: "Eu erro o tiro e fujo do local"
 court_outcome.1005.d: "Se eu não posso ter [target.Custom('ES_OA')] ninguém pode!"
 court_outcome.1005.d.murder_undiscovered: "Minha flecha acerta [target.GetFirstNameNoTooltip]"
 court_outcome.1005.d.murder_discovered: "Minha flecha acerta [target.GetFirstNameNoTooltip], mas sou descobert"
 court_outcome.1003.t: "A Caçada Selvagem"
 court_outcome.1004.desc: "Estou cavalgando quando meu cavalo de repente sai da trilha. A queda é inevitável e me tira o ar dos pulmões. Quando ergo os olhos, dou de cara com um exemplar feroz de [owner.Custom('GetAnimalType')]!\n\nAntes que eu tenha chance de gritar, a fera desaba, com uma flecha entre os olhos.\n\n?[target.GetFirstNameNoTooltip], [target.Custom('LoverPetName')] meu[target.Custom('ES_OA')]! Pensei que tivesse perdido você!?. Meu [owner.Custom('ES_HeroeHeroina')] não é outr[owner.Custom('ES_OA')] senão [owner.Custom('ES_ElLa')|l] [owner.GetTitledFirstName|l]!"
 court_outcome.1003.b: "Compartilhamos um beijo, doce como mel."
 ### INTRUDER ###
 #OWNER CHOICE
 court_outcome.1100.t: "$court_event_title$ Intruso"
 court_outcome.1100.start.desc: "Toda vez que fecho os olhos, vejo o rosto [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]. Não consigo pegar no sono, não posso esperar mais… Ocult[target.Custom('ES_OA')] nas sombras, dirijo-me"
 court_outcome.1100.targets_residence.desc: "à sua [target.Custom('ResidenceBuilding')]."
 court_outcome.1100.my_residence.desc: "ao jardim externo de seus aposentos."
 court_outcome.1100.targets_host_residence.desc: "a sua [target.Custom('ResidenceBuilding')]."
 court_outcome.1100.end.desc: "\n\nVer a janela da câmara de [target.GetFirstName] faz meu coração disparar. Tão perto, e tão longe!\n\nEspere... Quem está escalando a torre? A figura suspeita para na janela de [target.GetFirstNameNoTooltip] e destranca as venezianas..."
 court_outcome.1100.a: "Meu [target.Custom('LoverPetName')] está em perigo. Preciso salvar[target.Custom('ES_LoLa')]!"
 court_outcome.1100.b: "\"Guardas! #EMP Guardas!#! Há um intruso na torre!"
 court_outcome.1100.b.failure: "O intruso fere [target.GetShortUIName]"
 court_outcome.1100.b.success: "[target.GetShortUIName|U] escapa iles"
 court_outcome.1100.c: "Não vim aqui para lutar com um ladrão."
 #OWNER SUCCESS: You save target from the burglar/comfort target!
 court_outcome.1101.start.desc: "Os ruídos da luta são a maior motivação que eu conheço. Sem me preocupar com a minha pele, me ergo até a janela [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l].\n\n"
 court_outcome.1101.owner_fights.desc: "Sinto como se tivesse caído em um lago congelado. [target.GetFirstNameNoTooltip] está no chão, o intruso [target.Custom('ES_LoLa')] o mantém imobilizado e uma lâmina reluzente os separa. Com um rugido, agarro o vilão pela gola e o arremesso contra a parede. O resto fica embaçado.\n\nQuando o perigo passa, eu me volto para [target.Custom('ES_ElElla')]."
 court_outcome.1101.target_fights.desc: "A cena que encontro não é o que eu esperava: móveis revirados, cortinas rasgadas e [target.GetFirstName] com uma adaga ensanguentada na mão ao lado de um corpo imóvel.\n\n"
 court_outcome.1101.end.desc: "\"Você está bem, [target.GetFirstNameNoTooltip]?\", pergunto com cautela. Como se minhas palavras fossem mágicas, [target.GetSheHe] se descongela e se lança aos meus braços. \"Obrigado(a) a [target.GetFaith.HighGodName] por você estar aqui, [ROOT.Char.GetFirstNameNoTooltip]!\"."
 court_outcome.1101.a: "Nunca mais deixarei você correr perigo!"
 #OWNER FAILURE: Target was fine without your help/is scared
 court_outcome.1102.end.desc: "«¿Qué haces aquí?», pregunta con voz temblorosa. Levanto las manos en señal de paz, pero [target.GetSheHe] desenvaina su daga. «¡No te acerques más! ¡Vete ahora mismo o te #EMP haré#! daño!»."
 court_outcome.1102.a: "Eu só tentei ajudar!"
 #OWNER FAILURE: Target has another lover...
 court_outcome.1103.desc: "Os sons da luta acima são a maior motivação que já conheci. Antes mesmo de ter chance de fazer um plano, chego à janela. Ergo-me — mas a cena diante de mim não é o que eu esperava.\n\n[target.GetTitledFirstName|l] não está exatamente #EMP sufriendo#!. Não, parece estar realmente aproveitando… com [targets_lover.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 #TARGET SUCCES: is informed about outcome
 court_outcome.1105.t: "Intruso"
 court_outcome.1105.start.desc: "#EMP Paf!#! Onde…? Onde estou? O que está acontecendo? Tento enxergar na escuridão enquanto meus olhos se acostumam. #EMP [ROOT.Char.GetFaith.HighGodName]…#! Há alguém na janela do meu quarto.\n\n"
 court_outcome.1105.owner_fights.desc: "Pulo da cama e corro para a porta, mas o invasor é mais rápido. Ele agarra meu braço, puxa, e eu caio. Antes que eu possa gritar, uma mão cobre minha boca.\n\n\"Escute com atenção, [ROOT.Char.GetTitleAsNameNoTooltip]. Se você fizer o que eu disser, ninguém vai—\" As palavras dele se transformam em um gorgolejo quando uma adaga se crava fundo em seu pescoço.\n\n\"[target.GetFirstNameNoTooltip], você está bem?\" Eu reconheceria essa voz em qualquer lugar. Meu salvador[owner.Custom('ES_XA')] não é ou[owner.Custom('ES_OA')] tro que [owner.GetTitledFirstName|l]!"
 court_outcome.1105.target_fights.desc: "Saio da cama às pressas e estico a mão para a adaga na mesinha de cabeceira. O invasor agarra meu braço, puxa, e eu me viro, cravando a lâmina fundo em seu estômago. [owner.GetSheHe|U] me olha por um instante que parece infinito. Seus lábios se movem sem som e ele cai no chão.\n\n“Você está bem, [target.GetFirstNameNoTooltip]“” Junto à janela está ninguém menos que [owner.GetTitledFirstName|l], com a faca na mão, pront[owner.Custom('ES_OA')] a defender-me. Jogo-me em seus braços e [owner.GetSheHe] me abraça com força."
 court_outcome.1105.a: "Ah, meu amor! Nunca me deixe fora do seu campo de visão novamente!"
