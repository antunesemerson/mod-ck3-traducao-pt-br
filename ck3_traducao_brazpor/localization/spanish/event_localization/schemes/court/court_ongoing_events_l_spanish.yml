l_spanish:
 court_event_title: "Romance:"
 #Modifiers
 court_competitor_modifier: "Competidor Romântico"
 #ONGOING MANAGEMENT: Player target opted out
 court_ongoing.0001.t: "$court_event_title$ Rejeição"
 court_ongoing.0001.desc: "[target.Custom2('MyCharacterIntroduction', ROOT.Char)|U] rejeitou meus avanços! Deixou muito claro que não está interessad[target.Custom('ES_OA')] e provavelmente nunca estará."
 court_ongoing.0001.a: "Ai, que desgraça!"
 #START EVENT: Owner picks method
 court_ongoing.0501.t: "$court_event_title$ Declaração de Amor"
 court_ongoing.0501.desc: "Chegou a hora de tornar conhecidos os meus sentimentos por [target.GetTitledFirstName|l]. Quero que se lembre deste dia pelo resto da vida."
 court_ongoing.0501.a: "Cantar uma balada de amor."
 court_ongoing.0501.b: "Vou deixar uma carta em segredo em sua [ROOT.Char.Custom('GetChambersOrTent')]."
 court_ongoing.0501.c: "Escrever um poema de amor."
 court_ongoing.0501.d: "[target.GetHerHim|U] impressioná-lo vencendo uma luta de treinamento."
 court_ongoing.0501.x: "Seguir minha intuição no momento."
 court_ongoing.0501.tt: "Você declara sua devoção eterna a [target.GetShortUIName]"
 #START EVENT: For Target
 court_ongoing.0502.t: "$court_event_title$ Declaração de Amor"
 court_ongoing.court_start_song.start.0502.desc: "Passeio pelos jardins com [ROOT.Char.Custom('LadiesLords')] da corte quando [owner.Custom2('MyCharacterIntroduction', ROOT.Char)]. Abro espaço para deixá[owner.Custom('ES_LoLa')] passar, mas, para minha grande surpresa, ele(a) fica na minha frente e se ajoelha!\n\nNão tenho tempo de processar direito essa reviravolta dos acontecimentos quando [owner.GetTitledFirstNameNoTooltip|l] começa a cantar.\n\n"
 court_ongoing.court_start_song.bad.0502.desc: "Para minha consternação, é incapaz de afinar nem que a vida dele dependesse disso. Demoro alguns instantes para identificar a canção; é uma famosa balada de amor [target.GetCulture.GetNameNoTooltip]. [owner.GetFirstNameNoTooltip] alterou a letra para incluir meu nome e menções à minha aparência física, arruinando ainda mais o ritmo."
 court_ongoing.court_start_song.good.0502.desc: "Reconheço imediatamente a melodia. É uma famosa balada de amor [target.GetCulture.GetNameNoTooltip]. Já a ouvi incontáveis vezes, mas nunca com tanta habilidade e paixão!\n\nAs emoções intensas da canção se refletem nos olhos de [owner.GetFirstNameNoTooltip], que estão fixos em mim. Ele/ela não desvia o olhar nem por um instante."
 court_ongoing.court_start_sneaky_love_letter.start.0502.desc: "Quando afasto os lençóis para me deitar, encontro um pequeno rolo sobre a cabeceira. Alguém entrou na minha [ROOT.Char.Custom('GetChambersOrTent')] sem que ninguém percebesse? Um arrepio percorre minha espinha enquanto eu desenrolo cuidadosamente o grosso pergaminho.\n\n"Meu [ROOT.Char.Custom('RomanticComplimentAdjective')]"
 court_ongoing.court_start_sneaky_love_letter.compliment.0502.desc: "[ROOT.Char.Custom('RomanticComplimentNoun')]"
 court_ongoing.court_start_sneaky_love_letter.relative.0502.desc: "[owner.Custom2('RelationToMeShort', ROOT.Char)]"
 court_ongoing.court_start_sneaky_love_letter.end.0502.desc: "[ROOT.Char.GetLadyLord|U] do meu coração! Não posso mais manter meus sentimentos em segredo. A partir de hoje, farei tudo o que estiver ao meu alcance para provar meu afeto leal".\n\n"Nos veremos em breve. Até lá, sonhe comigo, meu amor. Eternamente seu[owner.Custom('ES_OA')], [owner.GetTitledFirstName|l]"."
 court_ongoing.court_start_poem_love_letter.0502.desc: "[owner.Custom2('love_letter', SCOPE.sC('target'))]\n\n"Estas linhas são apenas um pálido reflexo dos meus sentimentos por você. Farei tudo ao meu alcance para demonstrar meu afeto leal."
 court_ongoing.court_start_sparring.start.0502.desc: "O tinir das armas e os gritos entusiasmados me atraem para o pátio. O que está acontecendo?\n\nEncontro dois guerreiros armadurados em meio a"
 court_ongoing.court_start_sparring.bad.0502.desc: "luta de treino desajeitada. Eu tento não fazer careta enquanto um deles tropeça após um golpe desnecessariamente forte."
 court_ongoing.court_start_sparring.good.0502.desc: "luta de treino vigorosa. Ambos foram sem dúvida testados no campo de batalha."
 court_ongoing.court_start_sparring.great.0502.desc: "um combate de treino impressionante. Nunca antes vi tamanha habilidade com [owner.Custom('signature_weapon')]! Não consigo desviar o olhar!"
 court_ongoing.court_start_sparring.end.0502.desc: "\n\nEm um último ataque temerário, um dos combatentes desarma o outro. Para minha surpresa, ele se ajoelha diante de mim e tira o elmo. É [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!\n\n"Dedico esta vitória a você, [ROOT.Char.GetTitledFirstNameNoTooltip|l]", diz solenemente. "Levar-lhe honra é meu único desejo!"."
 court_ongoing.0502.a: "Que elogio, meu [owner.GetLadyLord]!"
 court_ongoing.0502.b.incest: "O quê? Você é m #EMP [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('owner'))]#!!"
 court_ongoing.0502.b: "Abandone este empreendimento tolo #EMP imediatamente#!."
 court_ongoing.0502.a.tt: "[owner.GetShortUIName] tentará conquistar meu coração"
 #START EVENT: For Owner (target's reaction)
 court_ongoing.court_start_song.intro.0503.desc: "Encontrei uma clássica balada de amor [target.GetCulture.GetNameNoTooltip] que combina perfeitamente com [target.GetFirstName]! Eu a pratico repetidas vezes — tudo precisa estar perfeito!\n\n Encontro meu [target.Custom('LoverPetName')] caminhando pelos jardins de [target_location.GetNameNoTooltip], cercad[target.Custom('ES_OA')] por suas amizades. Com o coração batendo como um martelo, eu me ajoelho diante de [target.Custom('ES_ElElla')] e canto."
 court_ongoing.court_start_song.success.0503.desc: "\n\nAs bochechas de [target.GetFirstNameNoTooltip] ficam de um vermelho romã profundo, mas não me interrompe. Suas companhias parecem contentes ou com ciúmes — certamente é um bom sinal!\n\n“Tens uma voz linda, [ROOT.Char.Custom('FormOfAddressForLiege')]”, diz antes de sair apressado. Suas amizades [target.Custom('ES_LoLa')] o seguem. Eu me levanto com as pernas trêmulas, vendo todos desaparecerem entre as sebes. Meu coração bate mais forte do que nunca."
 court_ongoing.court_start_sneaky_love_letter.intro.0503.desc: "Minha declaração de amor é só para [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l]. Nada mais importa! Eu derramo meu coração em páginas e mais páginas, e meus sentimentos crescem enquanto finalmente os transformo em palavras. A tinta mal secou quando parto para a [ROOT.Char.Custom('GetChambersOrTent')].\n\nColoco suavemente o pergaminho sobre o travesseiro. Ele(a) se deitará aqui esta noite, sonhando comigo?"
 court_ongoing.court_start_sneaky_love_letter.success.0503.desc: "\n\nA espera é insuportável. Pensar em uma possível rejeição me embrulha o estômago! Quando a resposta chega, eu quebro o selo com mãos trêmulas.\n\nEmbora eu não possa encorajá-lo, [owner.Custom2('RelationToMeAddress', ROOT.Char)], agradeço muito por suas palavras gentis. Atenciosamente, [target.GetFirstNameNoTooltip]."
 court_ongoing.court_start_poem_love_letter.intro.0503.desc: "A vela está quase consumida quando termino o poema. Antes de enviá-lo, eu o leio mais uma vez.\n\n"[owner.Custom2('love_letter', SCOPE.sC('target'))]"."
 court_ongoing.court_start_sparring.same_locaton_intro.0503.desc: "Recruto um dos meus soldados mais experientes e treino com [sparring_soldier.GetSheHe] por três dias seguidos. Quando considerar que estou pront[ROOT.Char.Custom('ES_OA')], vamos juntos para o pátio principal.\n\nAssim que começamos a duelar, uma multidão se reúne, e seus vivas logo atraem ninguém menos que [target.Custom('ES_AlAla')] [target.Custom('RomanticComplimentAdjective')] [target.GetTitledFirstName|l].\n\nO soldado luta com bravura, mas desarmo [sparring_soldier.GetHerHim] com uma estocada final impecável. Ajoelho-me diante de [target.GetFirstNameNoTooltip] e declaro minhas nobres intenções. Dedico esta vitória a você, [target.GetTitledFirstNameNoTooltip|l]. Trazer honra a você é meu único desejo!\n\n"
 court_ongoing.court_start_sparring.other_locaton_intro.0503.desc: "Recruto um dos meus soldados mais experientes e partimos rumo a [target_location.GetNameNoTooltip]. Praticamos nossa rotina após a cavalgada de cada dia.\n\nAo chegarmos, começamos a lutar no pátio principal. Reúne-se uma multidão, e seus aplausos logo atraem ninguém menos que a [target.Custom('RomanticComplimentAdjective')] [target.GetTitledFirstName|l].\n\nO soldado luta com bravura, mas consigo desarmá-lo com uma estocada final, impecável. Ajoelho-me diante de [target.GetFirstNameNoTooltip] e declaro minhas nobres intenções. \"Dedico esta vitória a você, [target.Custom2('RelationToMeAddress', ROOT.Char)]. Trazer honra a você é meu único desejo!\".\n\n"
 court_ongoing.court_start_sparring.success.0503.desc: "Meu/minha [ROOT.Char.Custom('LoverPetName')] ficou sem palavras, mas é evidente que se sente lisonjead[target.Custom('ES_OA')]. Por que sorriria, se não?"
 court_ongoing.public_sodomy_rejection.0503.desc: "A reação de [target.GetFirstNameNoTooltip] não é o que eu esperava. "Vocês ficaram loucos, [ROOT.Char.Custom2('RelationToMeAddress', target)]?! O que exatamente estão sugerindo?"."
 court_ongoing.public_incest_rejection.0503.desc: "A reação de [target.GetFirstNameNoTooltip] não é o que eu esperava. “O que você está sugerindo? Sou seu #EMP [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('target'))]#!!”."
 court_ongoing.public_regular_rejection.0503.desc: "A reação de [target.GetFirstNameNoTooltip] não é a que eu esperava. Não se envergonhe ainda mais, [ROOT.Char.Custom2('RelationToMeAddress', target)]. Prefiro comer meu [target.Custom('GetClothingArticle')] antes de passar mais um minuto na sua presença!"
 court_ongoing.written_sodomy_rejection.0503.desc: "\n\nA resposta de [target.GetFirstNameNoTooltip] é rápida e inequívoca. “Você enlouqueceu? Você sabe o quão perigosas suas palavras seriam se caíssem em mãos erradas? Eu lhe imploro — desista imediatamente dessa empreitada tola!”"
 court_ongoing.written_incest_rejection.0503.desc: "\n\nA resposta de [target.GetFirstNameNoTooltip] é rápida e não deixa dúvidas. "Vocês sempre tiveram um quê de estranheza, mas… isto? Uma declaração de paixão para seu[target.Custom('ES_OA')] #EMP [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('target'))]#!? Só de pensar em nós juntos, me dá náusea!"."
 court_ongoing.written_regular_rejection.0503.desc: "\n\nA resposta de [target.GetFirstNameNoTooltip] é rápida e não deixa margem para dúvidas. "Contai com minha mais sincera gratidão pela vossa nota. Como ri com ela! Que ideia mais ridícula, pensar que meu coração bateria por #EMP vos#!"."
 court_ongoing.0503.a: "[target.GetFirstNameNoTooltip] não resistirá aos meus encantos por muito tempo!"
 court_ongoing.0503.a.tt: "Meu Plano para Conquistar [target.GetShortUIName] continua"
 court_ongoing.0503.b: "Pensei que estávamos destinados a ficar juntos..."
 #Someone farted! by Mathilda Bjarnehed
 court_ongoing.1000.t: "$court_event_title$ Um Odor Embaraçoso"
 court_ongoing.1000.desc: "Consegui ser convidado para um banquete em [location.GetNameNoTooltip], e sentar perto de [target.GetFirstName]. Apesar das minhas tentativas decididas, não consigo puxar conversa. Certamente a intensidade dos meus sentimentos [target.Custom('ES_LoLa')] o deixou sem palavras.\n\nDe repente, o peido mais alto que já ouvi explode em nossa mesa. Alguns dos convidados estão olhando para [target.GetFirstNameNoTooltip]. Preciso salvar[target.Custom('ES_LoLa')]!"
 court_ongoing.1000.a: "Fui eu! Eu peidei!"
 court_ongoing.1000.a.success: "[target.GetFirstNameNoTooltip] está aliviad[target.Custom('ES_OA')] e agradecid[target.Custom('ES_OA')]"
 court_ongoing.1000.a.failure: "[target.GetFirstNameNoTooltip] não foi quem peidou"
 court_ongoing.1000.b: "! [scapegoat.GetTitledFirstNameNoTooltip]! Você é um velho fedido [scapegoat.Custom('ES_OA')] e [scapegoat.Custom2('InsultNoun', ROOT.Char)]!"
 court_ongoing.1000.b.rl: "Tento culpar [scapegoat.GetTitledFirstNameNoTooltip|l]"
 court_ongoing.1000.b.failure: "[target.GetFirstNameNoTooltip] sente-se muito mal por [scapegoat.GetTitledFirstNameNoTooltip|l]"
 court_ongoing.1000.b.tt: "O resultado depende de quão empátic [target.GetFirstNameNoTooltip] é"
 court_ongoing.1000.c: "Talvez eu devesse ficar quieto..."
 #Defend their honor through duel or diplomacy, by Mathilda Bjarnehed
 court_ongoing.1010.t: "$court_event_title$ A Honra de uma[target.Custom('ES_XA')] [target.GetLadyLord]"
 court_ongoing.1010.desc: "Por [insulter.GetFaith.HighGodName]! [target.Custom('ES_ElLa'|U)] [target.GetTitledFirstName|l] é um[target.Custom('ES_XA')] [target.Custom2('InsultNoun', SCOPE.sC('insulter'))] insuportável! Já viu como [target.Custom('quirk_neg_present')]? Ridículo!".\n\n[insulter.Custom2('MyCharacterIntroduction', ROOT.Char)|U] ri maliciosamente.\n\n[target.GetFirstNameNoTooltip] continua conversando com os amigos, mas dá para ver que ouviu tudo. Não gosto de vê-lo sofrer."
 court_ongoing.1010.a: "Mentiras vis! Empunhe sua espada, [insulter.Custom2('InsultNoun', ROOT.Char)]!"
 court_ongoing.1010.b: "Desculpe-se com [target.GetLadyLord]."
 court_ongoing.1010.c: "Ah, [target.GetFirstNameNoTooltip]. [insulter.GetFirstNameNoTooltip] não poderia estar mais errado!"
 court_ongoing.1010.a.success: "Você vence [insulter.GetFirstNameNoTooltip] em um duelo"
 court_ongoing.1010.a.failure: "Você é derrotado por [insulter.GetFirstNameNoTooltip]"
 court_ongoing.1010.b.success: "Você convence [insulter.GetFirstNameNoTooltip] a se desculpar"
 court_ongoing.1010.b.failure: "[insulter.GetFirstNameNoTooltip] se recusa a ouvir"
 court_ongoing.1011.desc: "[insulter.GetTitledFirstName] desembainha sua espada com um sorriso presunçoso. Ah, como vou aproveitar para apagar aquela expressão arrogante de seu rosto!\n\nQuando eu terminar com [insulter.GetSheHe], sua humilhação será absoluta. Machucad[insulter.Custom('ES_OA')] e corad[insulter.Custom('ES_OA')], ele solta um pedido de desculpas rouco e vai mancando para lamber as próprias feridas.\n\nPor outro lado, [target.GetTitledFirstName|l] brilha como o sol. \"Vocês são tod[ROOT.Char.Custom('ES_OA')] um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('ES_HeroeHeroina')]! \"! Contem com a minha eterna gratidão!\"."
 court_ongoing.1011.a: "Foi uma honra minha, [target.GetLadyLord] [target.GetFirstNameNoTooltip]."
 #Fetch gift, by Mathilda Bjarnehed
 court_ongoing.1021.t: "Prova de Devoção"
 court_ongoing.1021.desc: ""[target.GetLadyLord|U] [target.GetFirstName]! Meu [target.Custom('RomanticComplimentAdjective')] [target.Custom('RomanticComplimentNoun')]!".\n\n[owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se ajoelha na poeira diante de mim, com a mão direita sobre o coração. \"Meu único desejo é trazer-lhe honra e felicidade. Dizei-me — como posso provar meu amor por vós?\"."
 court_ongoing.1021.a: "Mate um lobo e traga-me sua pele."
 court_ongoing.1021.wolf_pelt.success: "[owner.GetShortUINameNoTooltip] traz a pele de um lobo para você"
 court_ongoing.1021.wolf_pelt.failure: "[owner.GetShortUINameNoTooltip] falha em matar um lobo"
 court_ongoing.1021.b: "Eu quero um companheiro peludo."
 court_ongoing.1021.cat_pet.success: "[owner.GetShortUINameNoTooltip] te dá um gato"
 court_ongoing.1021.dog_pet.success: "[owner.GetShortUINameNoTooltip] te dá um cachorro"
 court_ongoing.1021.eagle_pet.success: "[owner.GetShortUINameNoTooltip] lhe presenteia com um filhote de águia"
 court_ongoing.1021.pet.failure: "[owner.GetShortUINameNoTooltip] não te dá um animal de estimação"
 court_ongoing.1021.c: "O colar [necklace_owner.Custom('ES_DelDela')] [necklace_owner.GetTitledFirstNameNoTooltip|l] está lindo…"
 court_ongoing.1021.necklace.success: "[owner.GetShortUINameNoTooltip] te dá um colar"
 court_ongoing.1021.necklace.failure: "[owner.GetShortUINameNoTooltip] se recusa a te dar um colar"
 court_ongoing.1021.d: "Traga-me algo incomum — uma orquídea exótica, talvez?"
 court_ongoing.1021.orchid.success: "[owner.GetShortUINameNoTooltip] traz uma orquídea rara para você"
 court_ongoing.1021.orchid.failure: "[owner.GetShortUINameNoTooltip] se recusa a te dar uma orquídea"
 court_ongoing.1021.x: "Chega! Esta loucura acaba agora!"
 #GIFT: wolf Pelt, by Mathilda Bjarnehed
 court_ongoing.1022.t: "$court_event_title$ O Cinzento"
 court_ongoing.1022.start.desc: ""Doce [target.GetLadyLord] [target.GetFirstName]!", suspiro enquanto me ponho de joelhos diante de [target.GetSheHe]. "Meu único desejo é trazer-vos honra e felicidade. Dizei-me, como posso provar meu amor por vós?"\n\n"
 court_ongoing.1022.end.desc: "[target.GetTitledFirstNameNoTooltip|l] hesita e fica corado. Por [ROOT.Char.GetFaith.HighGodName]! Espero que esteja satisfeito e não envergonhado!\n\n"Mate um lobo para mim e traga sua pele. Então poderemos continuar esta conversa.""
 court_ongoing.1022.a: "\"Seu desejo é uma ordem!\""
 court_ongoing.1022.a.success: "Você mata um lobo"
 court_ongoing.1022.a.failure: "Você volta de mãos vazias"
 court_ongoing.1022.b: "Eu vi uma fera peluda na baia..."
 court_ongoing.1022.b.success: "[target.GetShortUINameNoTooltip] é convencido pela pele de cachorro"
 court_ongoing.1022.b.failure: "[target.GetShortUINameNoTooltip] vê através de sua astúcia"
 court_ongoing.1022.c: "Eu irei subornar um caçador."
 court_ongoing.1022.c.master_of_hunt: "Meu $master_of_hunt_court_position$ me trará uma pele de lobo!"
 court_ongoing.1022.c.master_of_hunt.success: "[master_of_hunt.GetFirstNameNoTooltip] encontra e derruba um lobo durante uma caçada"
 court_ongoing.1022.c.master_of_hunt.success.tt: "Você adquire uma pele sem custo e sem risco para você."
 court_ongoing.1022.c.master_of_hunt.failure: "[master_of_hunt.GetFirstNameNoTooltip] encontra uma pele de lobo para comprar"
 court_ongoing.1022.d: "\"Sinto muito, mas não posso fazer isso.\""
 court_ongoing.1023.desc: "Um dos meus cães favoritos desapareceu do canil. O responsável pelos cães organizou uma busca na noite passada, mas voltou de mãos vazias. \"Não faço ideia de como ele conseguiu sair\", diz a figura de cabelos grisalhos, suspirando. \"Um cão não deveria ser capaz de abrir o portão...\".\n\n"[ROOT.Char.GetLadyLord] [ROOT.Char.GetFirstNameNoTooltip]!". Quando me viro, sou recebido pelo amplo sorriso de [owner.GetTitledFirstName|l]. Em suas mãos há uma pele reluzente…"
 court_ongoing.1023.a: "Deixe-me sozinho. Preciso de tempo para pensar..."
 court_ongoing.1023.b: "Assassin[ROOT.Char.Custom('ES_OA')]! Nunca mais quero te ver!"
 court_ongoing.1024.desc: "Sob a cobertura da noite, me esgueirei para o canil. Logo encontrei a vítima perfeita. “Vem aqui, bichinho”, sussurrei, balançando uma salsicha grossa diante da criatura desprevenida...\n\nMas meu plano astuto tomou um rumo inesperado quando apresentei a pele [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l]. Assim que a vi, soube que a tinha reconhecido. “Seu... Seu assassino[ROOT.Char.Custom('ES_OA')]! Esse cachorro era como um filho para mim!”."
 court_ongoing.1024.a: "Eu... Eu não faço ideia do que você está falando!"
 #GIFT: PET, by Mathilda Bjarnehed
 court_ongoing.1030.t: "$court_event_title$ companheiros animais"
 court_ongoing.1030.desc: "Lá fora chove a cântaros. Meu [target.Custom('ComplimentAdjective')] [target.GetTitledFirstName|l] suspira ao olhar pela janela embaçada.\n\n"Quão miserável pode ser [location.GetNameNoTooltip]. Queria ter alguém para me fazer companhia durante os dias longos e cinzentos...".\n\nSerá que meu [target.Custom('LoverPetName')] é mais de gatos ou de cães?"
 court_ongoing.1030.desc.eagle: "Ou talvez [target.GetFirstNameNoTooltip] preferiria um companheiro mais tático?"
 court_ongoing.1030.a: "Um gato esperto [target.GetHerHim] deixará feliz."
 court_ongoing.1030.a.success: "[target.GetShortUINameNoTooltip] adora o gato"
 court_ongoing.1030.a.failure: "[target.GetShortUINameNoTooltip] não gosta do gato"
 court_ongoing.1030.b: "Um cão leal seria um excelente companheiro."
 court_ongoing.1030.b.success: "[target.GetShortUINameNoTooltip] adora o cachorro"
 court_ongoing.1030.b.failure: "[target.GetShortUINameNoTooltip] não gosta do cachorro"
 court_ongoing.1030.d: "Uma águia feroz [target.Custom('ES_LeLa')] ajudará."
 court_ongoing.1030.d.success: "[target.GetShortUINameNoTooltip] adora a águia"
 court_ongoing.1030.d.failure: "[target.GetShortUINameNoTooltip] não gosta da águia"
 court_ongoing.1030.c: "\"Não tema, eu estarei sempre ao seu lado!\""
 court_ongoing.1031.start.desc: ""Pensei muito nisso, meu [ROOT.Char.Custom('LoverPetName')]", diz [owner.GetTitledFirstName|l] enquanto coloca uma cesta sobre minha mesa. "Qual seria a companhia perfeita para uma pessoa tão leal, enérgica e sociável como você? E então me ocorreu — nada combinaria melhor com você do que um cachorro!".\n\n[owner.GetFirstNameNoTooltip|U] tira a manta que cobre a cesta, revelando um cachorrinho! Ele salta em minha direção, tropeçando na borda da cesta de pura empolgação."
 court_ongoing.1031.a: "Ah! Vou cuidar muito bem de você!"
 court_ongoing.1031.b: "Isso... não é o que eu esperava."
 court_ongoing.1032.desc: ""Pensei muito nisso, meu [ROOT.Char.Custom('LoverPetName')]", diz [owner.GetTitledFirstName|l] enquanto coloca uma cesta sobre minha mesa. "Qual seria a companhia perfeita para alguém tão inteligente e independente como você? E então me ocorreu — nada combinaria melhor com você do que um gato!".\n\n[owner.GetFirstNameNoTooltip|U] tira a manta que cobre a cesta, revelando um gatinho que me olha com seus grandes olhos da cor [ROOT.Char.Custom('RandomCatEyeColor')] e começa a ronronar."
 court_ongoing.1033.desc: "“Pensei muito e profundamente, [ROOT.Char.Custom('LoverPetName')] meu[ROOT.Char.Custom('ES_OA')]”, diz [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] enquanto me leva para fora. Ele me conduz até um pano que cobre um pequeno volume. “Qual seria o companheiro perfeito para uma criatura tão feroz e estratégica quanto você? E então me ocorreu — nada combinaria mais com você do que uma águia!”.\n\n[owner.GetFirstNameNoTooltip|U] levanta o pano, revelando um jovem filhote de águia sobre um poleiro de madeira. Seus olhos estão cobertos por uma pequena capucha para mantê-lo calmo, mas seus trilos me enchem de empolgação."
 #GIFT: Necklace, by Mathilda Bjarnehed
 court_ongoing.1040.t: "$court_event_title$ Ouro Cintilante"
 court_ongoing.1040.end.desc: "[target.GetFirstNameNoTooltip] me lança um longo olhar. "O colar de [necklace_owner.GetLadyLord|U] de [necklace_owner.GetFirstNameNoTooltip] é lindo", diz [target.GetFirstNameNoTooltip]. E acena com a cabeça na direção de [necklace_owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. "Mas ficaria ainda melhor em volta do meu pescoço"."
 court_ongoing.1040.a: "Encomendar um colar idêntico."
 court_ongoing.1040.b: "Oferecer um favor a [necklace_owner.GetFirstNameNoTooltip] por seu colar."
 court_ongoing.1040.c: "Roube-o."
 court_ongoing.1040.c.success: "Você escapa com o colar"
 court_ongoing.1040.c.failure: "Você é descoberto nos aposentos de [necklace_owner.GetFirstNameNoTooltip]"
 court_ongoing.1040.d: "Elogie o gosto de [target.GetFirstName]."
 #GIFT: Flower, by Mathilda Bjarnehed
 court_ongoing.1050.t: "$court_event_title$ Uma Flor Rara"
 court_ongoing.1050.start.desc: "Passeando com meu [target.Custom('LoverPetName')] pelos jardins de [target_location.GetNameNoTooltip], observo a vegetação que nos cerca. Apesar de toda a sua beleza, nenhuma flor faz sombra à sua, [target.GetLadyLord] meu [target.Custom('ES_OA')].\n\nHá uma que sim, diz [target.GetSheHe] com um sorriso maroto. Uma rara orquídea de [orchid_origin.GetNameNoTierNoTooltip], que é quase impossível de cultivar."
 court_ongoing.1050.monastery.desc: "A ruína do mosteiro em [orchid_location.GetNameNoTooltip] é o único lugar onde ela floresce nesta região.\""
 court_ongoing.1050.temple.desc: "O jardim abandonado do [target_host.GetFaith.HouseOfWorship] em [orchid_location.GetNameNoTooltip] é o único lugar onde ela floresce nesta região.\""
 court_ongoing.1050.a: "Certamente posso encontrar um comerciante disposto a me vender uma."
 court_ongoing.1050.b: "\"Eu enfrentarei as ruínas por você!\""
 court_ongoing.1050.b.success: "Você encontra uma orquídea nas ruínas"
 court_ongoing.1050.b.soft_failure: "Você procura o dia inteiro, mas não encontra nada"
 court_ongoing.1050.b.hard_failure: "Você se machuca ao subir em uma torre"
 court_ongoing.1050.b.friend.success: "[helpful_friend.GetShortUIName] encontra uma orquídea nas ruínas"
 court_ongoing.1050.b.friend.soft_failure: "[helpful_friend.GetShortUIName] não encontra nada"
 court_ongoing.1050.b.friend.hard_failure: "[helpful_friend.GetShortUIName] resulta ferid[helpful_friend.Custom('ES_OA')] nas ruínas"
 court_ongoing.1050.b.friend: "[helpful_friend.GetTitledFirstNameNoTooltip|l] poderia me ajudar com isso."
 court_ongoing.1050.b.friend.f: "Esta opção está disponível graças à grande [prowess|lE] do seu amig[helpful_friend.Custom('ES_OA')] [helpful_friend.GetShortUIName]"
 court_ongoing.1050.c: "Quase impossível? Eu já tenho isso em minha coleção!"
 court_ongoing.1050.c.friend.f: "Esta opção está disponível por causa do traço de herbalista do seu amig[helpful_friend.Custom('ES_OA')] [helpful_friend.GetShortUIName]"
 court_ongoing.1050.d: "\"Ouvi dizer que as ruínas são assombradas...\""
 court_ongoing.1050.e: "\"Certamente elas devem empalidecer em comparação com a sua bela aparência!\""
 court_ongoing.1050.f: "\"Talvez um dia eu possa vê-la.\""
 #COMPLIMENT POEM, by Mathilda Bjarnehed
 court_ongoing.1100.t: "$court_event_title$ Licença Poética"
 court_ongoing.1100.desc: "Não há [target.GetWomanMan] mais adorável do que [target.GetTitledFirstName|l]! Em sua presença, me faltam as palavras e nenhum dos meus elogios faz justiça a ela. Talvez um poema escrito com cuidado captasse melhor suas virtudes?\n\nEscreverei sobre suas…"
 court_ongoing.1100.compliment.tt: "A resposta [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] será baseada em quão bem o poema combina com [target.GetSheHe]."
 court_ongoing.1100.success.tt: "[target.GetFirstNameNoTooltip] responde positivamente"
 court_ongoing.1100.neutral.tt: "[target.GetFirstNameNoTooltip] não responde"
 court_ongoing.1100.failure.tt: "[target.GetFirstNameNoTooltip] responde negativamente"
 court_ongoing.1100.compassionate: "Coração bondoso e sensível."
 court_ongoing.1100.bold: "Feroz destemor."
 court_ongoing.1100.honorable: "Nobre retidão."
 court_ongoing.1100.greed: "Ambição elevada."
 court_ongoing.1100.rational: "Sabedoria infinita."
 court_ongoing.1100.zealous: "Fé ardente."
 court_ongoing.1100.energetic: "Vigor juvenil."
 court_ongoing.1100.forgiving: "Natureza compassiva."
 court_ongoing.1100.beautiful: "Traços requintados."
 court_ongoing.1100.strong: "Força física."
 court_ongoing.1100.extroverted: "Postura encantadora."
 court_ongoing.1100.dominant: "Presença assertiva."
 court_ongoing.1100.fallback: "A poesia não é o meu ponto forte."
 court_ongoing.1101.t: "[target.Custom('ES_AlAla')|U] [target.Custom('RomanticComplimentAdjective')] [target.GetTitledFirstNameNoTooltip|l],"
 court_ongoing.1101.desc: "[owner.Custom2('love_letter_compliment_system', SCOPE.sC('target'))]"
 court_ongoing.1101.a.good: "[owner.GetSheHe|U] capturou a minha essência no pergaminho!"
 court_ongoing.1101.a.bad: "Que estranho! Ainda assim, é... encantador."
 court_ongoing.1101.c.good: "Que pretensioso."
 court_ongoing.1101.c.bad: "Será que está tentando me insultar?!"
 court_ongoing.1102.t: "[owner.Custom('ES_AlAla')|U] [owner.Custom('RomanticComplimentAdjective')] [owner.GetTitledFirstNameNoTooltip|l],"
 court_ongoing.1102.desc: "[target.Custom2('love_letter', SCOPE.sC('owner'))]"
 court_ongoing.1102.a: "Nunca li um poema melhor!"
 court_ongoing.1103.t: "[target.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 court_ongoing.1103.a: "Está… zombando de mim?"
 #Dealing with competition, by Mathilda Bjarnehed
 court_ongoing.1110.t: "$court_event_title$ Competição"
 court_ongoing.1110.desc: "Recentemente, todas as minhas visitas a [target.GetFirstName] foram arruinadas por [competitor.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]! [target.Custom('ES_LoLa')|U] o segue para todos os lados, como um cachorrinho perdido. As tentativas de sedução de [target.Custom('ES_AlAla')] [target.GetLadyLord] são ridículas, mas temo que a persistência dele seja recompensada."
 court_ongoing.1110.a: "Um duelo provará quem é digno!"
 court_ongoing.1110.a.success: "Você vence o duelo"
 court_ongoing.1110.a.failure: "Você perde o duelo"
 court_ongoing_1110.competitor_remains.tt: "[competitor.GetShortUIName] continua cortejando [target.GetShortUIName]"
 court_ongoing.1110.b: "Um \"infeliz\" caso de \"intoxicação alimentar\" resolverá o problema."
 court_ongoing.1110.b.success: "[competitor.GetShortUINameNoTooltip] faz uma cena embaraçosa no jantar"
 court_ongoing.1110.b.failure: "[competitor.GetShortUINameNoTooltip] percebe quando você coloca veneno em seu copo"
 court_ongoing.1110.b.murder: "O veneno é #EMP muito#! eficiente"
 court_ongoing.1110.c: "Seu amor não é verdadeiro; algumas moedas [competitor.Custom('ES_LoLa')] convencerão para que pare."
 court_ongoing.1110.c.success: "[competitor.GetShortUINameNoTooltip] aceita o suborno"
 court_ongoing.1110.c.failure: "[competitor.GetShortUINameNoTooltip] conta a [target.GetShortUINameNoTooltip] sobre sua oferta"
 court_ongoing.1111.t: "Popular"
 court_ongoing.1111.start.desc: "[owner.GetTitledFirstName] não é a única pessoa que quer ganhar minha aprovação. [competitor.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] costuma vir falar comigo e seus elogios passaram de educados a íntimos.\n\n"
 court_ongoing.1111.duel_success.desc: "[owner.GetTitledFirstNameNoTooltip|l] não viu com bons olhos as investidas de [competitor.GetFirstNameNoTooltip]. Então [competitor.Custom('ES_LoLa')] desafiou para um duelo! Quando cheguei lá, tudo já tinha acabado. [owner.GetTitledFirstNameNoTooltip|l] se ergue triunfante sobre seu rival."
 court_ongoing.1111.duel_failure.desc: "[owner.GetTitledFirstNameNoTooltip|l] não aceitou bem as investidas de [competitor.GetFirstNameNoTooltip]. Então [competitor.Custom('ES_LoLa')] o desafiou para um duelo! Quando cheguei lá, já estava tudo acabado. [competitor.GetTitledFirstNameNoTooltip|l] se ergue triunfante sobre seu inimigo derrotado."
 court_ongoing.1111.poison_success.desc: "Mas esta noite, no jantar, [competitor.GetTitledFirstNameNoTooltip|l] bebeu demais e vomitou em meu vestido! Sem perder um segundo, [owner.GetTitledFirstNameNoTooltip|l] entrou em ação para me salvar da bagunça."
 court_ongoing.1111.poison_failure.desc: "Agora [competitor.GetTitledFirstNameNoTooltip|l] me conta que [owner.GetTitledFirstNameNoTooltip|l] enlouqueceu de ciúmes e tentou envenenar[competitor.Custom('ES_LoLa')]!"
 court_ongoing.1111.a.success: "Oh, [owner.GetTitledFirstNameNoTooltip|l]! Quão heroic[owner.Custom('ES_OA')]!"
 court_ongoing.1111.a.duel_failure: "Pobre [owner.GetTitledFirstNameNoTooltip|l]! Deixe-me cuidar dos seus arranhões."
 court_ongoing.1111.a.poison_failure: "![owner.GetTitledFirstNameNoTooltip|l] jamais usaria truques tão desprezíveis!"
 court_ongoing.1111.b.poison_success: "Deixem-me em paz! Eu consigo me virar sozinh[ROOT.Char.Custom('ES_OA')]!"
 court_ongoing.1111.b.poison_failure: "Como você pôde, [owner.GetTitledFirstNameNoTooltip]?!?"
 court_ongoing.1111.b.duel_success: "Brigas infantis #EMP não#! me impressionam."
 court_ongoing.1111.b: "O ciúme não lhe cai bem, [owner.GetTitledFirstNameNoTooltip|l]."
 court_ongoing.1111.c.duel_failure: "Ah, [competitor.GetTitledFirstNameNoTooltip|l]! Como você é corajoso!"
 court_ongoing.1111.c: "Pobre [competitor.GetTitledFirstNameNoTooltip|l]! Meu coração dói por você!"
 court_ongoing.1111.d: "Já estou farto[ROOT.Char.Custom('ES_OA')] de vocês!"
 court_ongoing.1112.desc: "![competitor.GetTitledFirstName] não teve chance contra o meu poder! Seguro que sua derrota foi bastante humilhante, e meu [target.Custom('LoverPetName')] [target.GetFirstName] viu tudo! Desde então, não lhe deu mais atenção."
 court_ongoing.1112.a: "Outro inimigo vencido!"
 court_ongoing.1113.desc: "Parece que subestimei as habilidades [competitor.Custom('ES_DelDela')] [competitor.GetTitledFirstName|l] e minha derrota em suas mãos foi dolorosa e humilhante na mesma medida. Meu único consolo é que [target.GetTitledFirstName|l] não estava lá para ver isso."
 court_ongoing.1113.a: "Vamos esquecer tudo isso..."
 court_ongoing.1113.b: "Eu vou me vingar! Confie em minhas palavras!"
 court_ongoing.1114.desc: "Não há nada comparável à satisfação de um plano perfeitamente executado!\n\nNinguém percebeu quando despejei o veneno na taça de [competitor.GetTitledFirstName|l], e o espetáculo que se seguiu não será esquecido tão cedo! [competitor.GetFirstName] vomitou em cima de [target.GetFirstName], e ficou imensamente agradecid[target.Custom('ES_OA')] quando entrei para salvar[target.Custom('ES_LoLa')] daquele desastre."
 court_ongoing.1114.a: "![target.GetSheHe|U] nunca mais olhará na direção dela!"
 court_ongoing.1115.desc: "Acontece que [competitor.GetTitledFirstName|l] é muito mais perspicaz do que eu tinha imaginado. Ele me pegou com a mão na massa quando tentei envenenar a taça dele e me delatou na hora!"
 court_ongoing.1115.a: "Não é o que parece..."
 court_ongoing.1116.desc: "A primeira parte do meu plano saiu perfeitamente. Ninguém me viu colocar o veneno na taça de [competitor.GetTitledFirstName|l]. No entanto, parece que subestimei sua potência.\n\nPoucos segundos depois de [competitor.GetFirstNameNoTooltip] levar a bebida aos lábios, começou a se engasgar! Antes que alguém pudesse reagir, caiu mort[competitor.Custom('ES_OA')] sobre o ensopado."
 court_ongoing.1116.a: "Pelo menos não estará cortejando mais [target.GetFirstNameNoTooltip]."
 #Boring party guest
 court_ongoing.1120.t: "$court_event_title$ $court_ongoing.1121.t$"
 court_ongoing.1120.desc: "Estou indo a um baile em [target_location.GetNameNoTooltip] para passar um tempo com [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l]. Só de pensar em tocar as mãos de [target.GetHerHim] meu coração dispara! Mas, quando chego, encontro [target.Custom('ES_OA')] preso em uma conversa com [unpleasant_guest.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)].\n\nTal [unpleasant_guest.Custom2('InsultAdjective', ROOT.Char)] [unpleasant_guest.GetWomanMan] tagarela sem parar, totalmente alheio ao desconforto de [target.GetFirstNameNoTooltip]."
 court_ongoing.1120.a: "Uma pequena #EMP \"distração\"#! parece apropriada."
 court_ongoing.1120.a.failure: "A conversa é extremamente entediante"
 court_ongoing.1120.b: "Meu charme melhora qualquer conversa!"
 court_ongoing.1120.c: "Ocuparé su lugar. Melhor que eu sofra do que [target.Custom('ES_ElElla')]."
 court_ongoing.1120.d: ""Basta! Vocês estão entediando [target.Custom('ES_AlAla')] [target.GetLadyLord] até a morte!""
 court_ongoing.1120.e: "Não vou chegar nem perto dessa[unpleasant_guest.Custom('ES_EA')] [unpleasant_guest.GetWomanMan]!"
 court_ongoing.1121.t: "Prazer Desagradável"
 court_ongoing.1121.start.desc: "Quando enviei convites para o baile, eu esperava uma noite de diversão frívola em boa companhia. No entanto, me encontro pres[ROOT.Char.Custom('ES_OA')] em uma conversa horrível com [unpleasant_guest.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]...\n\n"
 court_ongoing.1121.diplomacy.desc: ""Boa noite", saúda uma voz familiar. [owner.GetTitledFirstName|l] se junta à conversa. Sabe ouvir e logo a atenção de [unpleasant_guest.GetFirstNameNoTooltip] está totalmente voltada para [owner.GetSheHe]. Estou livre para escapar."
 court_ongoing.1121.intrigue.desc: ""Minhas mais sinceras desculpas, mas há uma situação urgente que precisa da vossa atenção, [unpleasant_guest.Custom2('RelationToMeAddress', owner)]". É a voz familiar [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l]. Ele pisca para mim enquanto faz um gesto para [unpleasant_guest.GetFirstNameNoTooltip] que [owner.GetHerHim] o siga."
 court_ongoing.1121.insult.desc: ""Acho que meu [ROOT.Char.GetLadyLord] já teve o suficiente", interrompe um[owner.Custom('ES_XA')] [owner.GetWomanMan]. É [owner.GetTitledFirstName|l]! "Vocês não veem que ele(a) está entediado(a), [unpleasant_guest.Custom2('RelationToMeAddress', owner)]?"."
 court_ongoing.1121.a: "Uma lição útil, embora desagradável, em diplomacia!"
 court_ongoing.1121.a.critical_success: "Você aprende um novo truque de diplomacia"
 court_ongoing.1121.a.success: "Seu entendimento em diplomacia aumenta"
 court_ongoing.1121.b: "Uma lição útil, embora desagradável, em subterfúgio!"
 court_ongoing.1121.b.critical_success: "Você aprende um novo truque de intriga"
 court_ongoing.1121.b.success: "Seu entendimento em intriga aumenta"
 court_ongoing.1121.c: "\"De fato, já tive o bastante.\""
 court_ongoing.1121.c.success: "[unpleasant_guest.GetShortUIName] aprecia sua sinceridade"
 court_ongoing.1121.c.failure: "[unpleasant_guest.GetShortUIName] está insultad[unpleasant_guest.Custom('ES_OA')]"
 court_ongoing.1121.d: "Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] tem tempo para todo mundo. [owner.GetFirstNameNoTooltip] deve saber disso."
 court_ongoing.1121.e: "Eu não vou ficar nem mais um momento do que tenho que ficar!"
 #EXTREME REQUEST — CHOOSE, by Linnéa Thimrén
 court_ongoing.1201.t: "O Pedido"
 court_ongoing.1201.desc: ""[target.GetLadyLord|U] [target.GetFirstName], deixe-me provar minha devoção a você de qualquer maneira que você considere adequada!". [owner.GetTitledFirstName|l] me implora que eu ponha à prova sua devoção, com uma prova ao meu gosto. Farei com que se abstenha por vários dias de…"
 court_ongoing.1201.a: "Dormir — proteja-me de pesadelos!"
 court_ongoing.1201.a_success: "Graças à sua vigília, posso descansar em paz"
 court_ongoing.1201.a_failure: "Falhou em seu dever"
 court_ongoing.1201.b: "Comida — seu amor por mim deve ser suficiente como sustento."
 court_ongoing.1201.b_success: "Demonstra sua devoção"
 court_ongoing.1201.c: "Não tenho intenção de colocar[owner.Custom('ES_LoLa')] à prova."
 #EXTREME REQUEST — SLEEP, by Linnéa Thimrén
 court_ongoing.1211.t: "$court_event_title$ O Pedido"
 court_ongoing.1211.desc_opening: ""[target.GetLadyLord|U] [target.GetFirstName], deixai-me provar minha devoção a vós de qualquer maneira que considereis adequada!".\n\n[target.GetFirstNameNoTooltip] pondera a solicitação por um momento antes de seu rosto se iluminar."
 court_ongoing.1211.desc: ""Ultimamente tenho sido atormentado por pesadelos. Se você é realmente devoto a mim, ficará de guarda do lado de fora da minha [ROOT.Char.Custom('GetChambersOrTent')] e garantirá que nenhum mal chegue até mim"."
 court_ongoing.1211.a: "Você dormirá sem ser perturbad!"
 court_ongoing.1211.a.success: "Você consegue ficar acordad"
 court_ongoing.1211.a.failure: "A tentação do sono te vence"
 court_ongoing.1211.b: "Deixe-me dormir sem ser perturbad e eu ficarei de guarda."
 court_ongoing.1211.b.tt: "Uma vassoura com minha capa por cima pode afastar pesadelos tão bem."
 court_ongoing.1211.b.success: "Ninguém descobre a farsa"
 court_ongoing.1211.b.failure: "[target.GetFirstName] percebe o engano"
 court_ongoing.1211.c: "Eu não farei isso."
 court_ongoing.1212.desc: "Quando o sol nasce após mais uma noite de sono tranquilo, só posso agradecer [owner.Custom('ES_AlAla')] [owner.GetTitledFirstName|l] por permanecer de guarda na porta da minha [ROOT.Char.Custom('GetChambersOrTent')] e manter meu descanso calmo e ininterrupto."
 court_ongoing.1212.a: "Meu valente protetor[owner.Custom('ES_XA')]!"
 court_ongoing.1213.desc: "Justo quando eu estava pegando no sono[ROOT.Char.Custom('ES_OA')]na escuridão da noite, de repente ouço um#EMP golpe#!forte! Ao espiar para fora da minha[ROOT.Char.Custom('GetChambersOrTent')], vejo nada menos que [owner.Custom('ES_AlAla')] [owner.GetTitledFirstName|l]profundamente dormid[owner.Custom('ES_OA')]no chão."
 court_ongoing.1213.a: "Meu valente protetor[owner.Custom('ES_XA')]…"
 court_ongoing.1214.desc: "\n\nEspiei para fora da porta algumas vezes e encontrei [owner.Custom('ES_LoLa')] de pé, ereto e rígido, sem balançar nem por um instante."
 court_ongoing.1215.desc: "Bem quando eu estava pegando no sono[ROOT.Char.Custom('ES_OA')] na escuridão da noite, de repente ouço um #EMP golpe#! forte! Ao espiar para fora da minha [ROOT.Char.Custom('GetChambersOrTent')], vejo a capa [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l], um elmo e uma vassoura caídos no chão."
 court_ongoing.1215.a: "Queria me enganar!"
 #EXTREME REQUEST — FOOD, by Linnéa Thimrén
 court_ongoing.1221.desc: "\"Você deveria ser capaz de se sustentar apenas com seu amor por mim por muitos dias.\""
 court_ongoing.1221.a: "Minha devoção me levará adiante!"
 court_ongoing.1221.a.success: "Você consegue evitar a necessidade de alimento"
 court_ongoing.1221.a.failure: "Você cede às necessidades do seu corpo"
 court_ongoing.1221.b: "Nem um pedaço passará por estes lábios!"
 court_ongoing.1221.b.tt: "Mas eu não vou recusar um pedaço, ou um pedacinho..."
 court_ongoing.1222.desc: "[owner.GetTitledFirstName] estava cada dia mais macilento[owner.Custom('ES_OA')] mas, embora seu corpo definhassse, sua vontade e devoção permaneceram fortes.\n\nRecorro a [owner.Custom('ES_ElElla')] para dar o desafio como vencido e a primeira coisa que sai de seus lábios é outra promessa de fidelidade."
 court_ongoing.1222.a: "Meu devot[owner.Custom('ES_OA')] [owner.GetLadyLord]!"
 court_ongoing.1223.desc: "[owner.GetTitledFirstName] estava cada dia mais magr[owner.Custom('ES_OA')]."
 court_ongoing.1223.desc_ending: "Mas quando [owner.Custom('ES_LoLa')] procuro para declarar o desafio vencido, [owner.Custom('ES_LoLa')] encontro na despensa, cobert[owner.Custom('ES_OA')] de migalhas e devorando uma roda inteira de queijo."
 court_ongoing.1223.a: "Vejo que você encontrou outra fonte de sustento..."
 court_ongoing.1225.desc: "[owner.GetTitledFirstName] parece estar lidando bem com o jejum, mas descubro como ele consegue isso quando vou atrás dele para expressar minha surpresa e admiração.\n\nA capa inteira está recheada de comida! Pela expressão envergonhada em seu rosto, fica claro que não era intenção dele que eu visse isso…"
