l_spanish:
 hostile_scheme_discovery.1001.t: "Um Esquema na [ROOT.Char.Custom('GetCourt')|l]"
 hostile_scheme_discovery.1001.close_relation: "Meu [spymaster.GetCouncilTitle] veio até mim com notícias gravíssimas. Está cert[spymaster.Custom('ES_OA')] de que [agent.GetTitledFirstName|l], meu própri[agent.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))], conspira contra mim!"
 hostile_scheme_discovery.1001.close_relation_no_spymaster: "Uma notícia muito grave me chegou. [agent.Custom('ES_ElLa')|U] [agent.GetTitledFirstName|l], meu/minha [agent.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))], conspira contra mim!"
 hostile_scheme_discovery.1001.close_relation_spymaster_other_target: "Meu [spymaster.GetCouncilTitle] veio falar comigo com notícias gravíssimas. Está segur[spymaster.Custom('ES_OA')] de que [agent.GetTitledFirstName|l], meu própri[agent.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))], conspira contra [spymaster.GetSheHe]!"
 hostile_scheme_discovery.1001.close_relation_other_target: "Meu [spymaster.GetCouncilTitle] veio até mim com notícias gravíssimas. Está cert[spymaster.Custom('ES_OA')] de que [agent.GetTitledFirstName|l], meu própri[agent.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))] conspira contra meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('targeted_courtier'))] [targeted_courtier.GetTitledFirstName|l]!"
 hostile_scheme_discovery.1001.close_relation_no_spymaster_other_target: "Uma notícia gravíssima chegou até mim. [agent.Custom('ES_ElLa')|U] [agent.GetTitledFirstName|l], meu própri[agent.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))], está conspirando contra meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('targeted_courtier'))], [targeted_courtier.Custom('ES_ElLa')] [targeted_courtier.GetTitledFirstName|l]!"
 hostile_scheme_discovery.1001.desc: "Meu [spymaster.GetCouncilTitle] veio até mim com uma descoberta. Está cert[spymaster.Custom('ES_OA')] de que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))], [agent.GetTitledFirstName|l], está tramando contra mim!"
 hostile_scheme_discovery.1001.desc_no_spymaster: "Recebi uma notícia gravíssima. Descobriu-se que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))] [agent.Custom('ES_ElLa')] [agent.GetTitledFirstName|l], está conspirando contra mim!"
 hostile_scheme_discovery.1001.desc_other_target_spymaster: "Meu [spymaster.GetCouncilTitle] veio me ver com uma descoberta. Está segur[spymaster.Custom('ES_OA')] de que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))], [agent.GetTitledFirstName|l], conspira contra [spymaster.GetSheHe]!"
 hostile_scheme_discovery.1001.desc_other_target: "Meu [spymaster.GetCouncilTitle] veio me contar uma descoberta. Está cert[spymaster.Custom('ES_OA')] de que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))], [agent.GetTitledFirstName|l] que conspira contra meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('targeted_courtier'))] [targeted_courtier.GetTitledFirstName|l]!"
 hostile_scheme_discovery.1001.desc_no_spymaster_other_target: "Recebi uma notícia muito grave. Descobriram que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))], [agent.Custom('ES_ElLa')] [agent.GetTitledFirstName|l], conspira contra meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('targeted_courtier'))], [targeted_courtier.Custom('ES_ElLa')] [targeted_courtier.GetTitledFirstName|l]!"
 hostile_scheme_discovery.1001.a: "Que todos saibam quem é o traidor[agent.Custom('ES_XA')]."
 hostile_scheme_discovery.1001.b: "Prendam[agent.GetHerHim] o agente na prisão!"
 hostile_scheme_discovery.1001.b.tt_not_your_courtier_or_vassal: "[agent.Custom('ES_ElLa')|U] [agent.GetTitledFirstName|l] não é [Concept('courtier', Select_CString(agent.IsFemale, 'cortesã', 'cortesão' ) )|E] nem [Concept( 'vassal', Select_CString(agent.IsFemale, 'vassala', 'vassalo' ) )|E] seu[agent.Custom('ES_OA')]"
 hostile_scheme_discovery.1001.c: "Seja verdade ou não, eu não acusarei [agent.GetFirstNameNoTooltip]."
 hostile_scheme_discovery.1001.c.tt: "[agent.GetFirstNameNoTooltip] está livre."
 hostile_scheme_discovery.1002.t: "Intriga Descoberta!"
 hostile_scheme_discovery.1002.intro: "Meu [spymaster.GetCouncilTitle] veio me trazer notícias graves: é [owner.Custom2('MyCharacterIntroduction', ROOT.Char)]"
 hostile_scheme_discovery.1002.intro_no_spymaster: "Más notícias chegaram até mim: [owner.Custom2('MyCharacterIntroduction', ROOT.Char)]"
 hostile_scheme_discovery.1002.murder: "que está planejando matar"
 hostile_scheme_discovery.1002.abduction: "que está tramando sequestrar"
 hostile_scheme_discovery.1002.elope: "que está planejando fugir com"
 hostile_scheme_discovery.1002.steal_back_artifact: "que está planejando roubar um artefato de"
 hostile_scheme_discovery.1002.fallback: "que está tramando contra"
 hostile_scheme_discovery.1002.a: "![owner.Custom2('InsultAdjective', ROOT.Char)]!"
 hostile_scheme_discovery.2001.intro: "Meu [spymaster.GetCouncilTitle] veio me trazer notícias graves. Embora ainda não saibamos quem,"
 hostile_scheme_discovery.2001.intro_no_spymaster: "Más notícias chegaram até mim. Embora ainda não se saiba quem,"
 hostile_scheme_discovery.2001.murder: "alguém está planejando matar"
 hostile_scheme_discovery.2001.abduction: "alguém está tramando sequestrar"
 hostile_scheme_discovery.2001.fallback: "alguém está tramando contra"
 hostile_scheme_discovery.2001.elope: "alguém está planejando fugir com"
 hostile_scheme_discovery.2001.steal_back_artifact: "alguém está tentando roubar de"
 hostile_scheme_discovery.2001.depose: "alguém está tramando para depor"
 hostile_scheme_discovery.2001.target_other: "m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))], [target.GetTitledFirstName|l]!"
 hostile_scheme_discovery.2001.target_spymaster: "\n\n"Não sabem com quem estão lidando, [ROOT.Char.Custom('FormOfAddressForLiege')]. Acham que podem #EMP matarme#!? Eu vou lhes mostrar. Ah, sim, eu vou.""
 hostile_scheme_discovery.2001.target_me: "a mim!"
 hostile_scheme_discovery.2001.a: "Precisamos deter o vilão por trás disso!"
 hostile_scheme_discovery.3001.t: "Agente Descoberto!"
 hostile_scheme_discovery.3001.intro: "Descobriram [agent.Custom('ES_AlAla')] [agent.GetTitledFirstName|l], meu agente na [scheme.GetName|l] [court_owner.Custom('ES_DelDela')] [court_owner.GetTitledFirstName|l]!"
 hostile_scheme_discovery.3001.imprisoned: "\n\nAgora o/a [court_owner.GetTitleAsName] [agent.GetHerHim] colocou em uma cela e sob chave."
 hostile_scheme_discovery.3001.accused: "\n\nAgora sabem que [agent.GetSheHe] não é dign[agent.Custom('ES_OA')] de confiança e já não poderá ajudar mais a minha causa."
 hostile_scheme_discovery.3001.a: "Maldito seja [court_owner.GetTitledFirstNameNoTooltip|l], e seu [spymaster.GetCouncilTitle]!"
 hostile_scheme_discovery.3002.t: "Esquema Descoberto"
 hostile_scheme_discovery.3002.desc: "A existência de meu plano para [scheme.GetFullActionName] foi descoberta!\n\nEmbora meu envolvimento ainda não seja conhecido, isso tornará muito mais difícil concretizar meus planos."
 hostile_scheme_discovery.3002.a: "Maldição!"
 hostile_scheme_discovery.3003.t: "Envolvimento Descoberto"
 hostile_scheme_discovery.3003.desc: "[target.Custom2('MyCharacterIntroduction', ROOT.Char)|U] descobriu que sou o mentor por trás do plano"
 hostile_scheme_discovery.3003.murder: "para assassinar[target.GetHerHim]!"
 hostile_scheme_discovery.3003.abduction: "para sequestrar[target.GetHerHim]!"
 hostile_scheme_discovery.3003.elope: "para fugir com [target.Custom('ES_ElElla')]!"
 hostile_scheme_discovery.3003.steal_back_artifact: "para roubar um artefato de [target.GetFirstName]!"
 hostile_scheme_discovery.3003.fallback: "contra ! [target.Custom('ES_ElElla')]"
 hostile_scheme_discovery.3003.a: "Deve ter havido um mal-entendido!"
 hostile_scheme_discovery.4001.t: "Esquema Descoberto!"
 hostile_scheme_discovery.4001.opening: "Meu plano contra m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))], [target.GetTitledFirstName|l], foi descoberto!"
 hostile_scheme_discovery.4001.end: "\n\nAté meus próprios [ROOT.Char.Custom('GetCourtierPlural')|l] sussurram pelas minhas costas, qualquer confiança ou amor que possam ter tido por mim se despedaçando com a revelação."
 hostile_scheme_discovery.4002.opening: "Minha conspiração para ver mort[target.Custom('ES_OA')] a meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] foi descoberta! Agora todos conhecem meu plano para matar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l]."
 hostile_scheme_discovery.4001.a: "Isso é tudo um grande mal-entendido!"
 hostile_scheme_discovery.4001.b: "Oh, eu vou mostrar o quão longe posso ir."
