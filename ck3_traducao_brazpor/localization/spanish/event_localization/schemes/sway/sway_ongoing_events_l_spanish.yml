l_spanish:
 sway_ongoing.1001.t: "Influenciar: Cultura de [target.GetCulture.GetNameNoTooltip]"
 sway_ongoing.1001.desc: "Um plebeu de origem [target.GetCulture.GetNameNoTooltip] foi abordado nas ruas de [capital.GetNameNoTooltip] por causa de uma pequena ofensa.\n\nAo tomar uma posição em sua defesa, posso convencer [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], igualmente [target.GetCulture.GetNameNoTooltip], de minha boa índole, mas também posso correr o risco de alienar meus pares [ROOT.Char.GetCulture.GetNameNoTooltip]..."
 sway_ongoing.1001.a: "O povo [target.GetCulture.GetCollectiveNounNoTooltip] é bom."
 sway_ongoing.1001.b: "Os [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] possuem uma fibra moral superior!"
 sway_ongoing.1002.t: "Influenciar: Elogios"
 sway_ongoing.1002.desc: "Para tornar [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] mais receptiv[target.Custom('ES_OA')] às minhas investidas em direção a [target.GetSheHe], posso incluir um elogio na minha próxima missiva para sua corte.\n\nCertamente mencionarei seu…"
 sway_ongoing.1002.success.tt: "À discrição de [friend.GetTitledFirstNameNoTooltip|l]:"
 sway_ongoing.1002.b: "Vou ser breve e profissional."
 sway_ongoing.1003.opening: "[target.Custom2('AppropriateGreeting', ROOT.Char)]"
 sway_ongoing.1003.desc: "Nossa recente correspondência tem sido uma fonte de alegria para mim. Não posso deixar de pensar que ambos podemos nos beneficiar de uma comunicação mais frequente."
 sway_ongoing.1003.a: "Excelente!"
 sway_ongoing.1004.desc: "Nossa recente correspondência deixou muito a desejar. Por favor, evite comentários pessoais no futuro."
 sway_ongoing.1004.a: "Oh, não..."
 sway_ongoing.1005.t: "Influência: bom[target.Custom('ES_XA')] [target.GetTitleAsNameNoTooltip]"
 sway_ongoing.1005.desc: "Ao receber a visita de damas e cavaleiros de senhorios de todas as partes, surgiram várias oportunidades de colocar em boa luz [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)].\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], dizei-me, quem é a pessoa mais [target.Custom('FormalComplimentAdjective')] que conheceis?\"."
 sway_ongoing.1005.a: "[target.GetTitledFirstNameNoTooltip|l], sem dúvida!"
 sway_ongoing.1005.b: "Bem, eu, é claro!"
 sway_ongoing.1006.t: "Influenciar: Infiltradores"
 sway_ongoing.1006.desc: "Chamou minha atenção que alguns plebeus locais estão se mudando para [capital.GetNameNoTooltip], a capital de [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)].\n\nLocais, recém-chegados ou não, elogiando-me certamente não fará mal à percepção que [target.GetSheHe] tem de mim..."
 sway_ongoing.1006.a: "\"Leve esse ouro e certifique-se de que sua voz seja ouvida.\""
 sway_ongoing.1006.b: "Não vale a pena."
 sway_ongoing.5001.t: "Influenciar: Tornando Pessoal"
 sway_ongoing.5001.desc: "Em nossa comunicação recente, [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] expressou o desejo de se concentrar mais em suas ambições e interesses.\n\n #EMP Podría#! me esforçar para que as próximas cartas abordem um tema que lhe importe…"
 sway_ongoing.5001.diplomacy_lifestyle: "Acredito que gosta de se concentrar em assuntos diplomáticos."
 sway_ongoing.5001.martial_lifestyle: "Ouvi dizer que [target.GetSheHe] aprecia feitos de guerra."
 sway_ongoing.5001.stewardship_lifestyle: "Certamente a governança de um reino interessa a ."
 sway_ongoing.5001.intrigue_lifestyle: "[target.GetSheHe] certamente aprecia subterfúgio e intriga."
 sway_ongoing.5001.learning_lifestyle: "Acredito que nada o atrai tanto quanto um bom livro!"
 sway_ongoing.5001.a.tt: "Incluirei sutilmente esse tópico em cartas futuras"
 sway_ongoing.5001.b: "Não é da minha conta."
 sway_ongoing.5002.t: "Tornando Pessoal"
 sway_ongoing.5002.desc_opening: "Em nossa última correspondência, [owner.Custom2('MyCharacterIntroductionNoComma', target)] mencionou casualmente"
 sway_ongoing.5002.desc_diplomacy: "uma conversa recente que teve"
 sway_ongoing.5002.desc_martial: "o estado de suas tropas"
 sway_ongoing.5002.desc_stewardship: "a administração de seu domínio"
 sway_ongoing.5002.desc_intrigue: "as sutilezas da intriga na corte"
 sway_ongoing.5002.desc_learning: "um livro que leu recentemente"
 sway_ongoing.5002.desc_fallback: "um assunto não relacionado à nossa conversa"
 sway_ongoing.5002.desc_success: "Não sabia que a [owner.Custom('ES_ElElla')] também se interessava por este assunto!"
 sway_ongoing.5002.desc_failure: "– como se o assunto fosse me interessar!"
 sway_ongoing.5002.desc_ending: "\n\nEssas cartas deveriam ser estritamente diplomáticas, mas, é claro, às vezes mergulhamos em tópicos mais pessoais..."
 sway_ongoing.5002.a: "Vamos falar mais sobre isso!"
 sway_ongoing.5002.b: "Oh, #EMP por favor#! me conte mais!"
 sway_ongoing.5002.b.tt: "Acho que vou seguir a corrente…"
 sway_ongoing.5002.c: "Eu agradeceria se mantivéssemos tópicos relevantes."
 sway_ongoing.5003.desc_opening: "Em sua resposta, [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] encorajou minha leve incursão em tópicos mais pessoais!"
 sway_ongoing.5003.desc_nonsense: "\n\nAgora só preciso continuar fingindo que entendo algo sobre [owner.Custom('LifestyleFocusTopic')]..."
 sway_ongoing.5003.desc: "\n\nQue prazer, [target.GetSheHe] também se interessa por [owner.Custom('LifestyleFocusTopic')]."
 sway_ongoing.5003.a: "Vamos falar mais!"
 sway_ongoing.5003.b_diplomacy: "\"Então... sobre vassalos, huh?\""
 sway_ongoing.5003.b_martial: "\"Então... sobre espadas, huh?\""
 sway_ongoing.5003.b_stewardship: "\"Então... sobre ouro, huh?\""
 sway_ongoing.5003.b_intrigue: "\"Então... sobre conspirações, huh?\""
 sway_ongoing.5003.b_learning: "\"Então... sobre cartas, huh?\""
 sway_ongoing.5003.b.tt: "Espero que engula isso!"
 sway_ongoing.5003.c: "Eu não posso fazer isso!"
 sway_ongoing.5004.desc: "Em sua resposta, [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] me pediu que eu cessasse as perguntas pessoais e me ativesse ao assunto em questão.\n\n“Não gosto dessas tentativas de distração”, disse."
 sway_ongoing.5004.desc_nonsense: "\n\nTalvez seja melhor assim... Eu realmente não sei muito sobre [owner.Custom('LifestyleFocusTopic')]."
 sway_ongoing.5004.a: "Valeu a tentativa!"
 sway_ongoing.5005.desc: "Em sua última resposta, [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] confessa que na verdade não sabe nada sobre o tópico de [owner.Custom('LifestyleFocusTopic')] e apenas fingiu por causa da nossa conversa!"
 sway_ongoing.5005.a: "Que mentiroso! Mas não vou contar, não se preocupe."
 sway_ongoing.5006.desc: "Em sua última resposta, [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] confessa que na verdade não sabe nada sobre o tópico de [target.Custom('LifestyleFocusTopic')] e apenas fingiu por causa da nossa conversa!"
 sway_ongoing.5007.desc: "Na última carta de [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] havia um trecho inteiro sobre [owner.Custom('LifestyleFocusTopic')]! Eu não fazia ideia de que ele/ela se interessava por essas coisas…\n\nEmbora tudo tenha começado só para agradar[owner.GetHerHim], acho que já me envolvi demais para voltar atrás agora…"
 sway_ongoing.5007.b.tt: "Espero que ele compre isso!"
 sway_ongoing.5009.desc_success: "Após longas discussões com [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] sobre [owner.Custom('LifestyleFocusTopic')] e a pesquisa que tive que fazer para fingir meu conhecimento, percebo que o assunto já não me é tão alheio quanto antes!"
 sway_ongoing.5009.desc_owner_discovered: "Em correspondência recente, [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] expressou clara desconfiança sobre meu verdadeiro nível de conhecimento em relação a [owner.Custom('LifestyleFocusTopic')].\n\nAo ler a última carta deles, percebo que meu disfarce foi descoberto - [target.GetSheHe|U] critica a \"evidente falta de compreensão\" e \"vergonhosa demonstração de ignorância\"."
 sway_ongoing.5009.desc_target_discovered: "Em nossa recente correspondência, [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] tem demonstrado uma vergonhosa falta de conhecimento sobre [owner.Custom('LifestyleFocusTopic')].\n\nSe até eu percebo que está falando bobagem, #EMP malo será#!!"
 sway_ongoing.5009.a: "Aprendi muito mesmo!"
 sway_ongoing.5009.b: "Ai, isso dói."
 sway_ongoing.5009.c: "Não se preocupe. Não vou contar para ninguém."
 sway_ongoing.5010.desc_success: "Após longas discussões com [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] sobre [owner.Custom('LifestyleFocusTopic')], e a pesquisa que precisei fazer para fingir meu conhecimento, percebo que o assunto não me é mais tão estranho como antes!"
 sway_ongoing.5010.desc_target_discovered: "Em correspondência recente, [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] expressou clara desconfiança sobre meu verdadeiro nível de conhecimento em relação a [owner.Custom('LifestyleFocusTopic')].\n\nAo ler a última carta deles, percebo que meu disfarce foi descoberto - [owner.GetSheHe] critica a \"evidente falta de compreensão\" e \"vergonhosa demonstração de ignorância\"."
 sway_ongoing.5010.desc_owner_discovered: "Em nossa correspondência recente, [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] mostrou uma vergonhosa falta de compreensão sobre [owner.Custom('LifestyleFocusTopic')].\n\nSe até eu percebo que está falando bobagem, #EMP malo será#!!"
 sway_ongoing.5011.t: "Persuadir: A Visita"
 sway_ongoing.5011.desc_opening: "Estou passando por [capital.GetNameNoTooltip], a capital de [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], quando recebo um convite para visitar sua [target.Custom('ResidenceBuilding')].\n\nAo chegar…"
 sway_ongoing.5011.desc_friendly: "[target.GetSheHe] me recebe de braços abertos"
 sway_ongoing.5011.desc_dislike: "[target.GetSheHe] me recebe com o cenho franzido"
 sway_ongoing.5011.desc_normal: "[target.GetSheHe] me recebe com respeito"
 sway_ongoing.5011.desc: "e me oferece um tour. Uma coisa que me chama a atenção é que o local está cheio de projetos inacabados..."
 sway_ongoing.5011.a: "Eu ficarei por um tempo."
 sway_ongoing.5011.a.tt: "Talvez eu possa dar uma mão a ele/ela"
 sway_ongoing.5011.b: "Apenas me mostre meus aposentos."
 sway_ongoing.5011.b.tt: "Partirei logo pela manhã"
 sway_ongoing.5013.desc_opening: "Uma biblioteca com livros empilhados nos cantos, um projeto de construção inacabado por todo lado — especialmente um salão de jantar inteiro! — e um baú de ouro simplesmente parado no meio de um corredor…\n\nA residência [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] está uma bagunça!"
 sway_ongoing.5012.a_trait: "Vou arrumar o salão de jantar rapidinho."
 sway_ongoing.5012.a: "Acho que posso ajudar com o salão de jantar."
 sway_ongoing.5012.a.tt: "[target.GetTitledFirstNameNoTooltip|l] reagirá à ação que você tomar"
 sway_ongoing.5012.a_success: "Tenho sucesso"
 sway_ongoing.5012.a_failure: "Só faço piorar a situação"
 sway_ongoing.5012.b_trait: "Vou organizar esses livros..."
 sway_ongoing.5012.b: "Os livros... Os pobres livros!"
 sway_ongoing.5012.b.tt: "Vou tentar organizar a biblioteca"
 sway_ongoing.5012.b_success: "Tudo está organizado e bem"
 sway_ongoing.5012.b_failure: "Só faço mais bagunça"
 sway_ongoing.5012.c: "Aquele baú de ouro está #EMP muito#! desprotegido."
 sway_ongoing.5012.c.tt: "Devo adverti-lo"
 sway_ongoing.5012.c_success: "[target.GetSheHe|U] leva meu aviso a sério"
 sway_ongoing.5012.c_failure: "[target.GetSheHe|U] acha que estou planejando algo"
 sway_ongoing.5012.d: "Vou me retirar para descansar."
 sway_ongoing.5013.desc_expansion_success: "Só precisava de um pouco de dedicação. O salão de refeições de [target.GetTitledFirstNameNoTooltip|l] está quase concluído."
 sway_ongoing.5013.desc_expansion_failure: "Apesar de todos os meus esforços, o salão de jantar de [target.GetTitledFirstNameNoTooltip|l] parece estar em um estado pior do que quando comecei…"
 sway_ongoing.5013.desc_library_success: "Livros encadernados, documentos soltos, lombadas decoradas… Depois de muita reorganização, finalmente há alguma aparência de ordem no caos que é a biblioteca de [target.GetTitledFirstNameNoTooltip|l]."
 sway_ongoing.5013.desc_library_failure: "Livros encadernados, documentos soltos, lombadas decoradas… Por mais que eu tentasse, não conseguia encontrar sentido na bagunça que é a biblioteca de [target.GetTitledFirstNameNoTooltip|l]."
 sway_ongoing.5013.desc_gold_success: "Quando explico os perigos de manter um baú de ouro à vista, [target.GetTitledFirstNameNoTooltip|l] arregala os olhos em compreensão.\n\n\"Ah, claro que não deveria estar ali! Obrigado, [ROOT.Char.GetTitledFirstNameNoTooltip|l]\"."
 sway_ongoing.5013.desc_gold_failure: "Ao tentar explicar os riscos de manter um baú de ouro exposto, vejo os olhos de [target.GetTitledFirstName|l] se estreitarem.\n\n\"E exatamente #EMP por quê#! você está de olho no meu ouro?\""
 sway_ongoing.5013.desc_steal_success: "«Meu ouro! Onde está meu ouro?!».\n\nEncontro um[target.Custom('ES_XA')] [target.GetTitledFirstName|l] consternado[target.Custom('ES_OA')] de pé em um corredor, diante de um baú vazio. «Ah, [ROOT.Char.GetTitledFirstNameNoTooltip|l], se eu tivesse te ouvido…!»."
 sway_ongoing.5013.desc_end_good: "\n\nFiz tudo o que estava ao meu alcance para ajudar[target.Custom('ES_LoLa')]."
 sway_ongoing.5013.desc_end_bad: "\n\nFoi uma estrada difícil, mas fiz tudo o que pude para ajudar[target.Custom('ES_LoLa')]."
 sway_ongoing.5013.desc_good: "\n\nAs coisas estão indo bem, e há outras áreas em que ainda posso ajudar[target.Custom('ES_LoLa')]."
 sway_ongoing.5013.desc_bad: "\n\nAs coisas podem não estar indo muito bem, mas ainda posso ajudar em outras áreas!"
 sway_ongoing.5013.c: "Sei como fazê-lo(a) me ouvir...!"
 sway_ongoing.5013.c.tt_intrigue: "E se algo acontecesse com o ouro…"
 sway_ongoing.5013.d: "#EMP Agora#! é hora de dormir."
 sway_ongoing.5014.desc_opening: "Vejo [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] na entrada pela manhã, esperando para se despedir de mim. Ao me aproximar, ouço-o murmurar para si mesmo.\n\n"
 sway_ongoing.5014.desc_great: "\"É incrível. Tudo está como novo…\""
 sway_ongoing.5014.desc_good: "\" realmente arrumou o lugar\""
 sway_ongoing.5014.desc_bad: "\" realmente bagunçou o lugar\""
 sway_ongoing.5014.desc_failed_but: "mas"
 sway_ongoing.5014.desc_failed_dot: "–"
 sway_ongoing.5014.desc_failed_three: "Arruinou minha biblioteca, meu salão de jantar, #EMP e#! tentou roubar meu ouro…\""
 sway_ongoing.5014.desc_failed_library_gold: "Arruinou minha biblioteca #EMP e#! tentou roubar meu ouro…"
 sway_ongoing.5014.desc_failed_expansion_library: "Arruinou minha biblioteca e meu salão de jantar..."
 sway_ongoing.5014.desc_failed_expansion_gold: "Arruinou meu salão de jantar #EMP e#! tentou roubar meu ouro…\""
 sway_ongoing.5014.desc_failed_expansion: "Arruinou meu salão de jantar…\""
 sway_ongoing.5014.desc_failed_library: "Arruinou minha biblioteca…\""
 sway_ongoing.5014.desc_failed_gold: "Tentou roubar meu ouro…\""
 sway_ongoing.5014.desc_ending: "\n\n\"#EMP Bem#!.\" Após uma rápida despedida, logo estou na estrada de volta para casa."
 sway_ongoing.5014.a_good: "Fico feliz por ter ajudado!"
 sway_ongoing.5014.a_bad: "Provavelmente é para o melhor."
