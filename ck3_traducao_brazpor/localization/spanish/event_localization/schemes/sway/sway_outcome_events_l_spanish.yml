l_spanish:
 sway_outcome.1001.t: "Influenciar: Uma Oportunidade"
 sway_outcome.1001.desc: "Em minha tentativa de atrair [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] para os meus interesses, encontrei uma oportunidade. Creio que posso argumentar que nossos objetivos, no fundo, são os mesmos. Enquanto dito minha próxima carta..."
 sway_outcome.1001.a: "...eu enfatizo esses interesses compartilhados."
 sway_outcome.1001.a.success: "[target.GetFirstNameNoTooltip] fica convencid[target.Custom('ES_OA')]"
 sway_outcome.1001.a.failure: "[target.GetFirstNameNoTooltip] percebeu minha tentativa"
 sway_outcome.1001.b: "...eu tento manter a sutileza."
 sway_outcome.1002.t: "Influenciar: Convicções Religiosas"
 sway_outcome.1002.same_faith: "Se me ha ocurrido una idea para atraer [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] hacia mis intereses.\n\n¡Con los argumentos correctos, podría convencer[target.Custom('ES_LoLa')] de que no actúo solo por interés propio, sino también por los de [ROOT.Char.GetFaith.HighGodNameAlternate]!"
 sway_outcome.1002.other_faith: "Se me ha ocurrido una idea para atraer [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] hacia mis intereses.\n\n¿Tal vez podría argumentar que su apoyo sería de interés para todos los [target.GetFaith.GetAdherentNamePlural], mejor que cualquier otro gobernante [ROOT.Char.GetFaith.GetAdherentName]?"
 sway_outcome.1002.a: "Acredito que posso fazer um argumento bastante convincente."
 sway_outcome.1002.b: "Talvez eu deva manter as cortesias diplomáticas."
 sway_outcome.1003.t: "Influenciar: Arriscando a Sorte"
 sway_outcome.1003.desc: "Termino de leer la última carta de [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] y sonrío. Parece que por fin le estoy inspirando simpatía.\n\nSi bien esto es un éxito, me tienta aprovechar esta oportunidad para intentar acercarme algo más…"
 sway_outcome.1003.a: "Hora de colocar minhas habilidades diplomáticas à prova!"
 sway_outcome.1003.a.success: "[target.GetSheHe|U] aprecia o esforço"
 sway_outcome.1003.a.failure: "[target.GetSheHe|U] se sente insultad[target.Custom('ES_OA')]"
 sway_outcome.1003.a_friend: "Deixarei que [friend.GetFirstNameNoTooltip] lide com isso."
 sway_outcome.1003.b: "Essa vitória é suficiente."
 sway_outcome.2001.t: "Influenciar: Um Mal-entendido"
 sway_outcome.2001.opening: "Parece que minhas investidas diplomáticas em direção a [target.GetTitledFirstName|l] provocaram um grave mal-entendido! Recebi uma carta que deixa claro que [target.Custom('ES_ElElla')] acredita que eu estava buscando um objetivo completamente diferente…"
 sway_outcome.2001.not_interested_relation: "\n\n«¡Por [target.GetFaith.HighGodName], que soy tu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('target'))]!»."
 sway_outcome.2001.not_interested_romantically: "\n\n«Aunque me halaga, encuentro vuestro interés es inapropiado para un[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] de vuestra posición»."
 sway_outcome.2001.not_interested_horses: "\n\n«¡No venderé a mis purasangres por muchas cartas halagadoras que enviéis!»."
 sway_outcome.2001.not_interested_toll_exemptions: "\n\n«¡No puedo concederos exenciones de peaje, por mucho comercio prometáis!»."
 sway_outcome.2001.not_interested_friend: "\n\n«Parece que necesitáis un amigo y me temo que no seré yo. No obstante, puedo recomendaros que…»."
 sway_outcome.2001.not_interested_relics: "\n\n«¡No os entregaré ninguna de mis reliquias, por mucho que recéis por mí!»."
 sway_outcome.2001.end: "\n\nNão preciso continuar lendo para entender o ponto."
 sway_outcome.2001.a: "Tudo isso foi um grande mal-entendido!"
 sway_outcome.2002.t: "Influenciar: Conspiração Maliciosa"
 sway_outcome.2002.desc: "“[ROOT.Char.Custom('FormOfAddressForLiege')|U]! [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] encerrou toda a conversa com você.”\n\nParece que [target.GetFirstNameNoTooltip] interpretou meu súbito interesse e a quantidade de correspondência como um sinal de planos nefastos, e parece que acredita que estou tramando contra [target.GetSheHe]!"
 sway_outcome.2002.a: "Eu estava apenas tentando causar uma boa impressão..."
