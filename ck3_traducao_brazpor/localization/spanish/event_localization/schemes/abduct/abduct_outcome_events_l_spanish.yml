l_spanish:
 abduct_event_title: "Sequestro:"
 do_not_execute_abduct_tooltip: "Eu não tento o Sequestro"
 abduct_outcome.1001.t: "$abduct_event_title$ Ataque na Estrada"
 abduct_outcome.1001.opening: "Meus agentes me dizem que [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] está viajando"
 abduct_outcome.1001.arrival: "de [departure.GetNameNoTooltip] para [arrival.GetNameNoTooltip]."
 abduct_outcome.1001.no_arrival: "dentro de [departure.GetNameNoTooltip]."
 abduct_outcome.1001.ending: "\n\nArranjei para que alguns salteadores interrompam sua pequena jornada e garantam que [target.GetSheHe] chegue aqui em vez disso."
 abduct_outcome.1001.a: "Em breve, [target.GetSheHe] estará à minha mercê!"
 abduct_outcome.1001.b: "Não, o risco é grande demais."
 abduct_outcome.1002.t: "$abduct_event_title$ Em Andamento"
 abduct_outcome.1002.desc: "A oportunidade perfeita surgiu! [target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] viajará de [departure.GetNameNoTooltip] para [arrival.GetNameNoTooltip] quase sem guardas.\n\n[target.GetSheHe|U] deve acreditar que está a salvo..."
 abduct_outcome.1002.a: "O momento perfeito para atacar!"
 abduct_outcome.1003.t: "$abduct_event_title$ Visitantes Indesejados"
 abduct_outcome.1003.desc: "Com meus agentes entrando e saindo livremente da corte em [court_location.GetNameNoTierNoTooltip], [target.GetTitledFirstName|l] está ao meu alcance!\n\nOs agentes estão posicionados para permitir a entrada de um pequeno grupo de pessoas no meio da noite e cobrir sua saída sem serem detectados. Idealmente, enquanto abafam os gritos de um saco de juta se debatendo."
 abduct_outcome.1003.a: "Gostei desse plano!"
 abduct_outcome.2001.desc: "Sucesso! Os salteadores fizeram o trabalho deles admiravelmente, e [target.GetTitledFirstName|l] está em segurança nas minhas mãos."
 abduct_outcome.2001.a: "Espero que [target.GetSheHe] goste de seus novos aposentos..."
 abduct_outcome.2002.desc: "Antes que [target.GetTitledFirstName|l] sequer percebesse o que estava acontecendo, meus agentes capturaram [target.GetHerHim]! [target.GetSheHe|U] finalmente está nas minhas mãos."
 abduct_outcome.2003.desc: "Não consigo acreditar que funcionou! Foi tão simples quanto deixar alguns dos meus aliados entrarem na [target.Custom('ResidenceBuilding')] no meio da noite. \n\n[target.GetTitledFirstName|l] certamente estará arrancando os cabelos por causa da segurança precária. Felizmente, o lugar onde [target.GetSheHe] está agora é muito mais seguro."
 abduct_outcome.4001.opening: "Maldição! [target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] escapou dos bandidos que contratei e retornou em segurança a [departure.GetBaronyNameExplicitly]."
 abduct_outcome.4001.owner_discovered: "\n\nDesastrosamente, um dos salteadores foi capturado depois e confessou tudo, incluindo meu envolvimento!"
 abduct_outcome.4001.owner_secret: "\n\nPelo menos ninguém jamais saberá que os salteadores estavam trabalhando para mim."
 abduct_outcome.4001.a: "Encontrarei outra forma de lidar com [target.GetHerHim]."
 abduct_outcome.4001.b: "A sorte de [target.GetHerHis] não vai durar. Hora de tentar novamente!"
 abduct_outcome.4002.opening: "Como isso pôde acontecer?! Meus agentes esperaram e esperaram no momento e local corretos, mas [target.GetTitledFirstName|l] nunca apareceu!"
 abduct_outcome.4002.owner_discovered: "\n\nParece que [target.GetTitledFirstName|l] descobriu que eu estava tramando algo!"
 abduct_outcome.4002.owner_secret: "\n\n[target.GetTitledFirstName] deve ter percebido que algo estava acontecendo, mas pelo menos nunca saberá que eu estava envolvid[ROOT.Char.Custom('ES_OA')]."
 abduct_outcome.4003.opening: "Não! Meus aliados foram descobertos enquanto tentavam invadir os aposentos [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]. Eu deveria ter imaginado que não seria tão fácil."
 abduct_outcome.4003.owner_discovered: "\n\nE pior ainda, eles confessaram e revelaram meu envolvimento na trama!"
 abduct_outcome.4003.owner_secret: "\n\nPor algum milagre, meus aliados conseguiram sair, e meu envolvimento permanece desconhecido."
 abduct_outcome.5001.t: "Sequestrado!"
 abduct_outcome.5001.opening: "Fui sequestrad[ROOT.Char.Custom('ES_OA')] por [owner.Custom2('MyCharacterIntroduction', ROOT.Char)]!"
 abduct_outcome.5001.seized_roadside: "\n\nEu viajava com meu séquito quando fomos abordados por salteadores. Não sei o que aconteceu com os outros, pois colocaram um saco na minha cabeça. Quando finalmente o tiraram, eu me encontrei prisioneir[ROOT.Char.Custom('ES_OA')] em [prison_location.GetBaronyNameExplicitly]."
 abduct_outcome.5001.on_the_way: "\n\nEu estava a caminho da cidade com apenas alguns guardas, e [owner.Custom('ES_ElElla')] sabia quando eu estaria mais vulnerável para atacar!"
 abduct_outcome.5001.unwelcome_guests: "\n\nUm grupo de estranhos invadiu meus aposentos no meio da noite. Traidores devem tê-los deixado entrar na [ROOT.Char.Custom('ResidenceBuilding')], e pensei que meu fim tinha chegado. No entanto, colocaram um saco na minha cabeça e me arrastaram para fora. Amarrad[ROOT.Char.Custom('ES_OA')], me trouxeram até aqui, para esta masmorra úmida."
 abduct_outcome.5001.a: "Esperem só até eu sair daqui!"
 abduct_outcome.5002.t: "Tentativa de Sequestro Prevenida!"
 abduct_outcome.5002.seized_roadside: "Eu viajava por [departure.GetBaronyNameExplicitly] quando um grupo de bandidos caiu sobre nós.\n\nConsegui cavalgar até um lugar seguro, pois estava claro que os salteadores não queriam me ferir. Em vez disso, estavam tentando me capturar com vida!"
 abduct_outcome.5002.on_the_way: "Eu estava a caminho da cidade com apenas um punhado de guardas quando eles atacaram.\n\nFelizmente, os que estavam comigo agiram rápida e corajosamente, e, em pouco tempo, eu estava de volta à [target.Custom('ResidenceBuilding')]."
 abduct_outcome.5002.unwelcome_guests: "Uma comoção me despertou no meio da noite. Tinham deixado um grupo de malfeitores entrar na [ROOT.Char.Custom('ResidenceBuilding')], e eles só foram descobertos quando já estavam na porta dos meus aposentos!"
 abduct_outcome.5002.fallback: "Escapei de uma tentativa de sequestro!"
 abduct_outcome.5002.owner_known: "\n\nSem dúvida, isso é obra do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))], [owner.GetTitledFirstName|l]!"
 abduct_outcome.5002.owner_not_known: "\n\nNão sei quem está por trás dessa tentativa de sequestro, mas ainda estão por aí..."
 abduct_outcome.5002.a: "Ah, ele pagará!"
 abduct_outcome.5002.b: "Preciso ficar alerta."
