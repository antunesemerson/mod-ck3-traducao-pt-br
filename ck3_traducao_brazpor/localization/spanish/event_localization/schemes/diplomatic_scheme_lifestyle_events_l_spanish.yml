l_spanish:
 diplomatic_scheme_lifestyle.1001.t: "Interesses Estratégicos"
 diplomatic_scheme_lifestyle.1001.desc: "No início, eu trocava cartas com [target.GetTitledFirstName|l] para conhecê-l[target.Custom('ES_OA')] melhor, mas logo criamos afinidade e agora enviamos páginas inteiras com pensamentos sobre estratégia militar de um lado para o outro!"
 diplomatic_scheme_lifestyle.1001.a: "Mal posso esperar para ler mais pensamentos de [target.GetHerHis]."
 diplomatic_scheme_lifestyle.1001.b: "Tenho uma nova ideia que certamente impressionará [target.GetHerHim]!"
 diplomatic_scheme_lifestyle.3001.t: "Conhecendo melhor"
 diplomatic_scheme_lifestyle.3001.desc: "Sei que muitos torcerão o nariz, mas seguir de perto [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] não pode ser uma coisa ruim. Pelo menos é o que digo a mim mesm[ROOT.Char.Custom('ES_OA')] enquanto instruo meus agentes a registrarem todas as preferências e antipatias de [target.GetHerHis]."
 diplomatic_scheme_lifestyle.3001.a: "Para conquistar sua amizade, primeiro preciso conhecê-l[target.Custom('ES_OA')]!"
 diplomatic_scheme_lifestyle.3001.a.tt: "#F Certamente [target.GetSheHe] vai entender!#!"
 diplomatic_scheme_lifestyle.3001.b: "Talvez eles estejam certos..."
 diplomatic_scheme_lifestyle.3001.b.tt: "#F Preciso repensar minha estratégia.#!"
 diplomatic_scheme_lifestyle.3101.t: "Confronto"
 diplomatic_scheme_lifestyle.3101.desc_opening_good: "\"Embora tudo isso seja bastante lisonjeiro, não tenho certeza de quais são suas intenções.\"\n\n[target.GetTitledFirstName|l] [target.Custom('quirk_pos_present')] antes de continuar: \"E você está sempre por perto... poderia me deixar em paz por um tempo?\""
 diplomatic_scheme_lifestyle.3101.desc_opening_bad: "\"Isso tem que acabar!\"\n\n[target.GetTitledFirstName|l] [target.Custom('quirk_neg_present')] antes de continuar: \"Não sei qual é o seu objetivo, [ROOT.Char.GetFirstNameNoTooltip], mas se era aumentar minha antipatia por você... certamente conseguiu!\""
 diplomatic_scheme_lifestyle.3101.a: "Vou me afastar por um tempo."
 diplomatic_scheme_lifestyle.3101.a.tt: "#F Mas não desisti!#!"
 diplomatic_scheme_lifestyle.3101.b: "Não vou desistir!"
 diplomatic_scheme_lifestyle.3101.b.tt: "#F Certamente [target.GetSheHe] não estava falando sério.#!"
 diplomatic_scheme_lifestyle.3101.c: "Se é assim que se sente, talvez seja melhor encerrar isso."
 diplomatic_scheme_lifestyle.3201.t: "Desprezo"
 diplomatic_scheme_lifestyle.3201.desc: "\"Esse[sacrificial_agent.Custom('ES_EA')] [sacrificial_agent.Custom2('InsultNoun', ROOT.Char)] [sacrificial_agent.Custom2('InsultAdjective', ROOT.Char)] de [sacrificial_agent.GetFirstNameNoTooltip] sempre se esgueira... Não tenho um momento de descanso!\"\n\nEncontrei [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] em meio a um ataque de fúria dirigido contra meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('sacrificial_agent'))], [sacrificial_agent.Custom('ES_ElLa')] [sacrificial_agent.GetTitledFirstName|l]."
 diplomatic_scheme_lifestyle.3201.a: "Sim! Sempre [sacrificial_agent.Custom('quirk_neg_present')]... #EMP Argh#!!"
 diplomatic_scheme_lifestyle.3201.b: "[sacrificial_agent.GetSheHe|U] é um[sacrificial_agent.Custom('ES_XA')] [sacrificial_agent.GetWomanMan] de caráter muito [sacrificial_agent.Custom('quirk_pos_adjective')]!"
