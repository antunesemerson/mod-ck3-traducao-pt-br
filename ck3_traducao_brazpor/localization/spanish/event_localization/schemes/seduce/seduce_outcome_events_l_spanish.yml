l_spanish:
 seduce_outcome.permanent_block: "[owner.GetFirstName] não voltará a tentar me seduzir nunca"
 seduce_outcome.cooldown: "[owner.GetFirstName] não tentará mais me seduzir por algum tempo"
 seduce_outcome.0001.t: "Agora ou nunca"
 seduce_outcome.0001.desc: "As reações de [target.GetFirstName] às minhas investidas me dizem tudo o que preciso saber. Chegou a hora de colocar meu plano em prática.\n\n"
 seduce_outcome.0001.positive.desc: "Acho que minhas chances são boas, mas devo me lembrar que [discoverer.Custom2('NamePossessiveCharacterIntroduction', target)] está sempre observando..."
 seduce_outcome.0001.negative.desc: "No entanto, temo as consequências. [discoverer.Custom2('NamePossessiveCharacterIntroduction', target)|U] e seus agentes podem estar escondidos em qualquer sombra, escutando através de qualquer parede..."
 seduce_outcome.0001.a: "![target.GetFirstNameNoTooltip] será meu[target.Custom('ES_OA')]!"
 seduce_outcome.0001.a.tt: "Vou em frente e tentarei seduzir [target.GetFirstName]"
 seduce_outcome.0001.b: "Não posso arriscar ser descoberto."
 seduce_outcome.0003.t: "Uma Proposta Sensual"
 seduce_outcome.0003.success.desc: "[owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entrou na minha vida com palavras doces e toques ainda mais doces. No silêncio da noite, luto para tirar[owner.GetHerHim] da minha cabeça…\n\nOs sentimentos que ardem entre nós logo vão explodir em chamas ou se apagar."
 seduce_outcome.0003.failure.desc: "Onde quer que eu vá, [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] certamente me segue. Aquele olhar em seus olhos, as palavras em seus lábios... Eu sei exatamente o que ele está buscando."
 seduce_outcome.0003.a.success: "Eu quero viver para sempre nesse fogo!"
 seduce_outcome.0003.a.failure: "[owner.GetHerHim|U] terei por perto. #EMP Muy#! perto."
 seduce_outcome.0003.a.tt: "[owner.GetShortUIName] pode se tornar meu amante"
 seduce_outcome.0003.b.success: "Este é um romance que arderá intensamente, mas será breve."
 seduce_outcome.0003.b.failure: "Uma distração para esta noite, nada mais."
 seduce_outcome.0003.c: "Que doce... mas não."
 seduce_outcome.0003.d: "Nunca! O mundo inteiro conhecerá sua natureza pervertida!"
 seduce_outcome.0003.e: "Já estou cansado desses jogos. Deixem-me em paz, todos vocês!"
 seduce_outcome.0003.e.tt: "Ninguém tentará me seduzir por #V 10#! anos"
 seduce_outcome.0004.t: "Meu [target.Custom('LoverPetName_uppercase')]"
 seduce_outcome.0004.desc: "Ao olhar para meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target') )], [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('target'))] [target.GetTitledFirstName|l], dormindo em meus braços, sorrio de pura satisfação e alegria.\n\n! Pensar que [target.Custom('ES_ElElla')] retribui o afeto e a devoção que sinto!"
 seduce_outcome.0004.a: "Sou a pessoa mais sortuda do mundo!"
 seduce_outcome.0005.t: "Tragicamente Interrompido"
 seduce_outcome.0005.desc: "Após a morte de meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target') )] [target.GetTitledFirstName|l], meus planos para o nosso futuro já não importam.\n\nNão importa o que um dia possa ter sido, [target.GetTitledFirstName|l] morreu."
 seduce_outcome.0005.a: "Se ao menos eu tivesse conquistado seu afeto mais cedo!"
 seduce_outcome.2000.t: "A Bênção Secreta"
 seduce_outcome.2000.desc: "Meus encontros clandestinos com meu sum[target.Custom('ES_OA')] pontífice me deixam extasiado e despertam em mim um desejo mais carnal do que espiritual. Certamente, ninguém antes de mim recebeu a bênção de Sua Santidade desta maneira.

Sua mão se estende, fecho os olhos e me ajoelho…"
 seduce_outcome.2000.a: "In Vino Voluptas"
 seduce_outcome.2000.b: "Chego aos aposentos de [target.GetName] com dois tipos de sede, e levando bastante vinho para saciar a primeira delas. É imediatamente óbvio que [target.Custom('ES_ElElla')] está pensando o mesmo que eu.

O primeiro beijo sela o pacto, e então passamos o dia e a noite seguintes bebendo, amando, bebendo, amando..."
 seduce_outcome.2010.t: "Oh, que isso dure para sempre!"
 seduce_outcome.2010.desc: "Chego aos aposentos de [target.GetName] com dois tipos de sede, e levando bastante vinho para saciar a primeira delas. É imediatamente óbvio que [target.Custom('ES_ElElla')] está pensando o mesmo que eu.

O primeiro beijo sela o pacto, e então passamos o dia e a noite seguintes bebendo, amando, bebendo, amando..."
 seduce_outcome.2010.a: "Devemos fazer isso de novo, mas talvez em outro lugar..."
 seduce_outcome.2010.b: "Vá ao banheiro para alívio, eu sempre digo."
 seduce_outcome.2020.t: "Fome Carnal"
 seduce_outcome.2020.desc: "Comida. Sei o quanto ele gosta disso, e trouxe bastante. Quando ergo a mão, [target.Custom('ES_ElElla')] tira as roupas prontamente e se deita. Eu monto a cena, colocando queijo, frutas e mel. Sobre [target.Custom('ES_ElElla')] e ao lado dele."
 seduce_outcome.2020.a: "Em seguida, uma rica libação de vinho sobre o peito."
 seduce_outcome.2020.b: "\n\nUm beijo, uma carícia… Logo os dois estamos envolvidos em prazer. Quando o sabor e o cheiro do corpo se misturam com o da comida, fecho os olhos e rio. Que vida doce!"
 seduce_outcome.2030.t: "Que tenhamos muitos mais momentos como este!"
 seduce_outcome.2030.a.desc: "Que refeição compartilhada!"
 seduce_outcome.2030.alcohol.desc: "Até a Brecha"
 seduce_outcome.2030.b.desc: "Ao cair da noite, as sombras se alongam. Aproximo-me [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] na escuridão sob as muralhas do [owner.Custom('ResidenceBuilding')] e sussurro: "Você sabe por que vim".\n\n[target.Custom('ES_ElElla')|U] vem em minha direção, primeiro com hesitação, depois com desejo. Ouço sua respiração acelerar quando [target.Custom('ES_LoLa')] a puxo para mim. À sombra da muralha, fazemos amor e os guardas que patrulham permanecem alheios à nossa paixão…"
 seduce_outcome.2030.a: "Mais uma vez!"
 seduce_outcome.2030.b: "Depois de conquistar sua [owner.Custom('ResidenceBuilding')], me retiro."
 seduce_outcome.2040.t: "Votos Secretos"
 seduce_outcome.2040.desc: "Nós nos encontramos à noite, clandestinamente, protegidos dos olhares e ouvidos do mundo lá fora. Faço-lhe um juramento: "Casemo-nos de verdade, mas em segredo. Ninguém saberá, além de nós dois. Um casamento puro, superior àquele que a convenção nos impôs!".

[target.Custom('ES_ElElla')|U] concorda, a emoção [target.Custom('ES_LoLa')] deixa sem fôlego. Então, sob o manto protetor da noite, consumamos nossos votos secretos…"
 seduce_outcome.2040.a: "Um laço para durar para sempre!"
 seduce_outcome.2040.b: "Uma noite de maravilha, mas não podemos nos encontrar assim novamente."
 seduce_outcome.2050.t: "Em seus aposentos"
 seduce_outcome.2050.desc: "Um arrepio de expectativa percorre minha espinha enquanto me dirijo aos aposentos de [target.GetFirstName]. [target.Custom('ES_ElElla')|U] abre a porta [target.Custom('quirk_pos_present')], sorri [target.Custom('quirk_pos_adverb')] e me puxa para dentro, segurando-me pela minha [ROOT.Char.Custom('GetUpperClothingArticle')].

Quando seus braços me envolvem, o fogo em meu peito irrompe em chamas, e o resto da noite se passa em uma névoa quente e ardente.".

[target.Custom('ES_ElElla')|U] concorda, a emoção [target.Custom('ES_LoLa')] deixa sem fôlego. Então, sob o manto protetor da noite, consumamos nossos votos secretos…"
 seduce_outcome.2050.a: "Sem dúvida, [target.Custom('ES_ElElla')] sabia como agradar a um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan]"
 seduce_outcome.2050.b: "Em Qualquer Outra Corte"
 seduce_outcome.2301.t: ""Você veio até aqui por mim, [ROOT.Char.Custom('LoverPetName')] meu[ROOT.Char.Custom('ES_OA')]?"

Depois de vasculhar os corredores do [target.Custom('ResidenceBuilding')] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], vestid[ROOT.Char.Custom('ES_OA')] com roupas de serviçal para que não me descubram, encontro [target.GetHerHim] em um jardim isolado."
 seduce_outcome.2301.desc: "Um arrepio de expectativa percorre minha espinha enquanto me dirijo aos aposentos de [target.GetFirstName]. [target.Custom('ES_ElElla')|U] abre a porta [target.Custom('quirk_pos_present')], sorri [target.Custom('quirk_pos_adverb')] e me puxa para dentro, segurando-me pela minha [ROOT.Char.Custom('GetUpperClothingArticle')].

Quando seus braços me envolvem, o fogo em meu peito irrompe em chamas, e o resto da noite se passa em uma névoa quente e ardente."
 seduce_outcome.2301.a: "Foi tão doce quanto foi fugaz."
 seduce_outcome.2301.a.tt: "Sussurros do Coração"
 seduce_outcome.2301.b: ""[ROOT.Char.Custom2('ComplimentSentence', SCOPE.sC('target'))|U]".\n\n"Nunca me cansarei do toque [owner.Custom('quirk_pos_adjective')] da vossa sorriso", responde [target.GetFirstName] corando. "Nem do vosso abraço".\n\nO murmúrio dos elogios mútuos logo se torna incompreensível, mas o substituímos por uma linguagem ainda mais clara."
 seduce_outcome.2302.t: "Quem sou eu para negar qualquer coisa a um[target.Custom('ES_XA')] [target.GetWomanMan] tão eloquente?"
 seduce_outcome.2302.desc_court_owner: "Certamente gostei do diálogo, mas a conversa acabou."

Depois de vasculhar os corredores do [target.Custom('ResidenceBuilding')] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], vestid[ROOT.Char.Custom('ES_OA')] com roupas de serviçal para que não me descubram, encontro [target.GetHerHim] em um jardim isolado."
 seduce_outcome.2302.desc_not_court_owner: "Para nós estarmos juntos é natural!"

Depois de vasculhar os corredores do [target.Custom('ResidenceBuilding')] de [target.GetFirstName], vestid[ROOT.Char.Custom('ES_OA')] com roupas de serviçal para não ser descobert[ROOT.Char.Custom('ES_OA')], encontro [target.GetFirstName] em um jardim isolado."
 seduce_outcome.2302.desc_end: "\"[letterAuthor.Custom2('love_letter', SCOPE.sC('love_letter_target'))]"
 seduce_outcome.2302.a: ""\n\nAssim que termino de ler a carta enviada por [target.GetFirstName], vou até os aposentos de"
 seduce_outcome.2302.b: "Minhas ações responderão às suas palavras!"
 seduce_outcome.2303.t: "#F Ou melhor, o significado por trás das palavras — esse poema foi terrível!#!"
 seduce_outcome.2303.desc: "#F E compensar pelo que eles estavam faltando!#!"
 seduce_outcome.2303.a: "#F Um[target.Custom('ES_XA')] autor[target.Custom('ES_XA')] tão eloquente merece ser recompensad[target.Custom('ES_OA')]!#!"
 seduce_outcome.2303.b: "#F O fogo que [target.GetSheHe] acendeu com sua prosa só pode ser apaziguado em seu abraço!#!"
 seduce_outcome.2304.t: "Nossa união será tão singular quanto o poema."
 seduce_outcome.2304.desc: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName] e eu nos agachamos lado a lado, mas o exemplar de [ROOT.Char.Custom('GetAnimalType')] [ROOT.Char.Custom('GetAnimalAdjective')] que temos à nossa frente não percebe nossa presença. Minha atenção é inabalável — especialmente quando [target.GetFirstName] roça em mim com seu [target.Custom('GetClothingArticle')]. Quando me estico para abraçar [target.GetHerHim], descubro que [target.GetSheHe] também tinha sua atenção #EMP em outra parte#!.

Enquanto [ROOT.Char.Custom('GetAnimalType')] desaparece no/a [ROOT.Char.Custom('TerrainType')], nossos corpos nus já estão acomodados na terra macia, assim como um ao outro."
 seduce_outcome.2304.a: "Os laços do casamento são suficientes."
 seduce_outcome.2304.b: "Meu amab[target.Custom('ES_OA')] [target.Custom2('InsultAdjective', ROOT.Char)]"
 seduce_outcome.2305.t: "Quando me aproximo de [target.GetFirstName], não sei se arranco as roupas de seu corpo ou apago de um soco esse sorriso [target.Custom('quirk_neg_adjective')] do rosto. [target.Custom('ES_ElElla')|U] me beija em desafio, e eu retribuo à altura, puxando [target.Custom('ES_LoLa')] para perto de mim.

Os sentimentos conflitantes em meu peito ecoam em nossos corpos; passamos a noite trocando insultos e prazer um com o outro."
 seduce_outcome.2305.desc_opening: "Beije-me de novo, meu [target.Custom2('InsultNoun', ROOT.Char)] [target.Custom2('InsultAdjective', ROOT.Char)]!"
 seduce_outcome.2305.desc_ending: "Deixai-me em paz, [target.Custom2('InsultNounSexual', ROOT.Char)]."
 seduce_outcome.2305.a: "Meu amad[target.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('target'))|U]"
 seduce_outcome.2305.a_terrible: "Quando minh[target.Custom('ES_XA')] [target.Custom('ComplimentAdjective')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('target'))] [target.GetFirstName] sorri [target.Custom('quirk_pos_adverb')], me custa lembrar que essa atração é malvista.

E então, quando [target.Custom('ES_ElElla')] puxa minha [ROOT.Char.Custom('GetUpperClothingArticle')] e deixa as mãos vagarem pelo meu corpo, percebo que não me importo."
 seduce_outcome.2305.a_okay: "Quando minha [target.Custom('ComplimentAdjective')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('target'))] [target.GetFirstName] sorri [target.Custom('quirk_pos_adverb')], abandono qualquer fingimento de contenção. Arranco a [ROOT.Char.Custom('GetUpperClothingArticle')] dele, envolvendo minhas mãos em sua cintura, minha boca em seu pescoço, meu desejo ardente contra o dele próprio…\n\n"
 seduce_outcome.2305.a_great: "O amor que um[ROOT.Char.Custom('ES_XA')] [target.Custom2('RelationToMeShort', ROOT.Char)] sente por sua[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('target'))] não pode estar errado!"
 seduce_outcome.2305.a_amazing: "[target.GetSheHe|U] não será nada mais que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('target'))]."
 seduce_outcome.2305.b: "Ânsias da Paixão"
 seduce_outcome.2306.t: "Encontro m [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('target'))] [target.GetTitledFirstName|l] esperando ansiosamente."
 seduce_outcome.2306.desc: "[ROOT.Char.Custom2('sex_scene', SCOPE.sC('target'))]"
 seduce_outcome.2306.a: "Isso foi bom demais para ser apenas uma vez."
 seduce_outcome.2306.b: "A ira de [target_liege.GetTitledFirstNameNoTooltip|l]"
 seduce_outcome.2307.t: "Quando os gritos e os latidos começam, as paredes do [target_liege.Custom('FortifiedBuilding')]"
 seduce_outcome.2307.desc: "Quando me aproximo de [target.GetFirstName], não sei se arranco as roupas de seu corpo ou apago de um soco esse sorriso [target.Custom('quirk_neg_adjective')] do rosto. [target.Custom('ES_ElElla')|U] me beija em desafio, e eu retribuo à altura, puxando [target.Custom('ES_LoLa')] para perto de mim.

Os sentimentos conflitantes em meu peito ecoam em nossos corpos; passamos a noite trocando insultos e prazer um com o outro."
 seduce_outcome.2307.a: "Uma Serpente na Corte"
 seduce_outcome.2307.b: "Reconheço a expressão de preocupação no rosto do meu servo. Ele está aqui para me trazer más notícias.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], vós deveis vir! Rápido! Acabaram de ver [owner.Custom2('YourCharacterIntroduction', ROOT.Char)] saindo dos aposentos de [target.Custom2('YourCharacterIntroductionNoComma', ROOT.Char)]!"."
 seduce_outcome.2308.t: "Isso só pode significar uma coisa!"
 seduce_outcome.2308.desc_illigal: "Quando minh[target.Custom('ES_XA')] [target.Custom('ComplimentAdjective')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('target'))] [target.GetFirstName] sorri [target.Custom('quirk_pos_adverb')], me custa lembrar que essa atração é malvista.

E então, quando [target.Custom('ES_ElElla')] puxa minha [ROOT.Char.Custom('GetUpperClothingArticle')] e deixa as mãos vagarem pelo meu corpo, percebo que não me importo."
 seduce_outcome.2308.desc_not_illigal: "O sanitário é um espaço pequeno e o ar exala cheiro de coisas desagradáveis que foram depositadas recentemente. Mas é privado, ah, tão privado...\n\nOlho com desejo para [owner.GetTitledFirstName|l], removendo minhas roupas. [owner.GetSheHe|U] faz o mesmo, e enquanto nos beijamos, uma onda de luxúria se levanta e nos faz esquecer tanto o desconforto espacial quanto as visões e cheiros desagradáveis ao nosso redor."
 seduce_outcome.2308.a: "[owner.GetTitledFirstName] chega com comida, em grande quantidade! Ele sabe que eu gosto disso. [owner.GetSheHe|U] move a mão e eu tiro rapidamente minhas roupas e me deito. Então ele prepara a cena com queijo, fruta e mel. Sobre meu corpo e ao meu lado."
 seduce_outcome.2308.b: "Em seguida, uma rica libação de vinho sobre meu peito."
 seduce_outcome.2309.t: "\n\nUm beijo, uma carícia… Começamos a desfrutar e logo nos vemos mergulhados no prazer. Quando o sabor e o cheiro do corpo se misturam com os da comida, fecho os olhos e rio — que vida mais doce!"
 seduce_outcome.2309.desc_opening: "Anoitece, as sombras se alongam. [owner.GetFirstName] se aproxima a mim na escuridão sob as muralhas do castelo e, sorrindo para mim [target.Custom('quirk_pos_adverb')], sussurra-me: Você sabe por que vim.\n\nAproximo-me de [owner.GetSheHe], primeiro hesitante, depois com ansiedade. Meu pulso acelera quando ele me puxa para perto. À sombra da muralha, fazemos amor, e os guardas que patrulham lá em cima nada sabem de nossa paixão…"
 seduce_outcome.2309.desc_ending: "Encontramo-nos à noite, clandestinamente, protegidos dos olhares e ouvidos do mundo exterior. [owner.Custom('ES_ElElla')|U] me promete: "Vamos nos casar, de verdade, mas em segredo. Ninguém além de nós dois saberá. Um casamento puro, superior ao que a convenção nos impôs!".

Eu concordo com um aceno, e a emoção me deixa sem fôlego. Então, sob o manto protetor da noite, consumamos nossos votos secretos…"
 seduce_outcome.2309.a: "Em Meus Aposentos"
 seduce_outcome.2900.t: "Um arrepio de expectativa percorre minha espinha quando uma batida ecoa no silêncio dos meus aposentos. Será #EMP [owner.GetSheHe]#!?\n\n[owner.GetFirstName] me saúda sorrindo [owner.Custom('quirk_pos_adverb')]. O desejo está escancarado em seu rosto. Enfim! Quando seus braços me envolvem, o fogo em meu peito explode, e o resto da noite é passado em uma névoa quente e ardente."
 seduce_outcome.2900.start.desc: "Oh [owner.GetFirstNameNoTooltip], meu [owner.Custom('LoverPetName')], vamos nos encontrar novamente!"
 seduce_outcome.2900.capital.desc: "#F E de novo, e de novo, e de novo...!#!"
 seduce_outcome.2900.end.desc: "Esse[owner.Custom('ES_EA')] [owner.GetTitleTierName] sem dúvida sabe como satisfazer uma[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan]."
 seduce_outcome.2900.a: "Caminhando nos jardins, sou surpreendid por uma visão mais doce do que qualquer flor: [owner.GetTitledFirstName|l] vestindo trajes de serviçais e um sorriso [owner.Custom('quirk_pos_adjective')].\n\n"
 seduce_outcome.3901.t: "\"Nada poderia me afastar de você, meu [ROOT.Char.Custom('LoverPetName')] – muito menos a distância!\""
 seduce_outcome.3901.desc: ""Nada pode me afastar de você, meu [ROOT.Char.Custom('LoverPetName')]… nem a distância, nem [court_owner.GetFirstName]!""
 seduce_outcome.3900.a: "\n\nRapidamente, eu tiro essa [ROOT.Char.Custom('GetUpperClothingArticle')] de servo que ele/ela está usando. Afinal, quero agradecer a [owner.GetFirstName] por ter vindo até aqui!"
 seduce_outcome.3000.desc: "Nunca mais ficaremos separados por muito tempo!"
 seduce_outcome.3000.a: "Sussurros do Coração"
 seduce_outcome.3010.desc: ""[ROOT.Char.Custom2('ComplimentSentence', SCOPE.sC('owner'))|U]".\n\n"Nunca me cansarei do toque [target.Custom('quirk_pos_adjective')] de sua sorriso", responde [owner.GetFirstName] corando. "Nem do seu abraço".\n\nO murmúrio dos elogios mútuos logo se torna incompreensível, mas o substituímos por uma linguagem ainda mais clara."
 seduce_outcome.3020.desc: "Vamos ter essa conversa repetidas vezes!"
 seduce_outcome.3030.a.desc: "[owner.Custom('ES_ElLa')|U] [owner.GetTitledFirstName|l] e eu nos agachamos lado a lado, mas o exemplar de [owner.Custom('GetAnimalType')] [owner.Custom('GetAnimalAdjective')] diante de nós não percebe nossa presença. Minha atenção é inabalável, especialmente quando [owner.GetFirstName] roça em mim com sua [owner.Custom('GetClothingArticle')]. Quando me estico para abraçar [owner.GetHerHim], descubro que [owner.GetSheHe] também tinha sua atenção #EMP em outra parte#!.

Enquanto [owner.Custom('GetAnimalType')] desaparece em [ROOT.Char.Custom('TerrainType')], nossos corpos nus já estão acomodados na terra macia, assim como um ao outro."
 seduce_outcome.3030.alcohol.desc: "Estar juntos é apenas natural para nós!"
 seduce_outcome.3030.b.desc: ""[letterAuthor.Custom2('love_letter', SCOPE.sC('love_letter_target'))]".\n\nA gratidão que sinto por [owner.GetFirstName] por ter me escrito este poema empalidece diante da paixão com a qual lhe agradeço."
 seduce_outcome.3040.desc: "Que nossos corpos façam poesia juntos, [owner.Custom('LoverPetName')] meu[owner.Custom('ES_OA')]!"
 seduce_outcome.3050.desc: "Meu amad[owner.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))|U]".

Eu concordo com um aceno, e a emoção me deixa sem fôlego. Então, sob o manto protetor da noite, consumamos nossos votos secretos…"
 seduce_outcome.3301.t: "Meu amad[owner.Custom('ES_OA')] [owner.Custom2('InsultAdjective', ROOT.Char)]"
 seduce_outcome.3301.desc: "Quando [owner.GetFirstName] se aproxima, não sei se arranco as roupas de seu corpo ou apago de um soco esse sorriso [owner.Custom('quirk_neg_adjective')] do rosto. Beijo [owner.GetHerHim] em desafio, e [owner.GetSheHe] me puxa para mais perto em resposta à altura.

Os sentimentos conflitantes em meu peito ecoam em nossos corpos; passamos a noite trocando insultos e prazer um com o outro."
 seduce_outcome.3301.a: "Beije-me de novo, meu [owner.Custom2('InsultNoun', ROOT.Char)] [owner.Custom2('InsultAdjective', ROOT.Char)]!"
 seduce_outcome.3301.a.tt: "Este momento de fraqueza é melhor esquecido."
 seduce_outcome.3301.b: "Meu amad[owner.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('owner'))|U]"
 seduce_outcome.3302.desc_opening: "Quando meu [owner.Custom('ComplimentAdjective')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] [owner.GetFirstName] sorri [owner.Custom('quirk_pos_adverb')], me custa lembrar que a atração que sinto não é vista com bons olhos.

E então, quando [owner.Custom('ES_ElElla')] puxa minha [ROOT.Char.Custom('GetUpperClothingArticle')] e suas mãos passeiam pelo meu corpo, percebo que não me importo."
 seduce_outcome.3302.desc_court_owner: "Quando meu [owner.Custom('ComplimentAdjective')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] [owner.GetFirstName] sorri [owner.Custom('quirk_pos_adverb')] e arranca minha [ROOT.Char.Custom('GetUpperClothingArticle')], me derreto em seus braços. [owner.GetSheHe|U] então lança suas mãos à minha cintura, sua boca ao meu pescoço, seu desejo doloroso contra o meu próprio…\n\n"
 seduce_outcome.3302.desc_not_court_owner: "O amor que compartilhamos não pode estar errado!"
 seduce_outcome.3302.desc_end: "M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] [owner.GetTitledFirstName|l] se aproxima de mim com entusiasmo."
 seduce_outcome.3302.a: "[ROOT.Char.Custom2('sex_scene', SCOPE.sC('owner'))]"
 seduce_outcome.3303.t: "A Dor da Rejeição"
 seduce_outcome.3303.desc: ""Gosto de você, [ROOT.Char.GetFirstNameNoTooltip], de verdade", [target.GetFirstName] sorri [target.Custom('quirk_pos_adverb')] enquanto me rejeita. "Mas você é meu #EMP [target.Custom2('RelationToMe', SCOPE.sC('owner'))]#!, e isso é... Bem, quem sabe o que o futuro pode reservar!"."
 seduce_outcome.3303.a: ""Sois um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] [target.Custom2('ComplimentAdjectiveArticle', ROOT.Char)] [ROOT.Char.GetFirstNameNoTooltip], mas não gosto de vocês desse jeito", diz [target.GetFirstName] e [target.Custom('quirk_neg_present')]. "Só [target.GetFaith.HighGodName] sabe o que o futuro nos reserva"."
 seduce_outcome.3304.desc: "[owner.Custom('ES_ElLa')|U] [owner.GetTitledFirstName|l] e eu nos agachamos lado a lado, mas o exemplar de [owner.Custom('GetAnimalType')] [owner.Custom('GetAnimalAdjective')] diante de nós não percebe nossa presença. Minha atenção é inabalável, especialmente quando [owner.GetFirstName] roça em mim com sua [owner.Custom('GetClothingArticle')]. Quando me estico para abraçar [owner.GetHerHim], descubro que [owner.GetSheHe] também tinha sua atenção #EMP em outra parte#!.

Enquanto [owner.Custom('GetAnimalType')] desaparece em [ROOT.Char.Custom('TerrainType')], nossos corpos nus já estão acomodados na terra macia, assim como um ao outro."
 seduce_outcome.3304.a: "Desmascarad"
 seduce_outcome.3305.desc: "[target.GetFirstName] me recebe com um sorriso malicioso e suas mãos ansiosas rapidamente se lançam aos meus botões e laços. Em um piscar de olhos, me encontro desnud[ROOT.Char.Custom('ES_OA')] e tremendo diante de [target.GetSheHe] mas, quando tento retribuir o favor, [target.GetFirstNameNoTooltip] me empurra e grita!\n\n"Guardas! Há um[ROOT.Char.Custom('ES_XA')] intrus[ROOT.Char.Custom('ES_OA')] em meus aposentos! #EMP Guardias!#!".\n\nNu como um recém-nascido, atravesso seus aposentos como um raio e saio pela janela."
 seduce_outcome.3305.a: "Ao escalar a janela de [target.GetFirstName], seu grito horrorizado não foi a resposta que eu esperava! Antes que eu pudesse deter[target.GetHerHim], [target.GetSheHe] sai correndo até a porta e a escancara.\n\n"Socorro! Guardas! Há um[ROOT.Char.Custom('ES_XA')] intrus[ROOT.Char.Custom('ES_OA')] em meus aposentos!"\n\nAntes que a noite piore, rastejo de volta pelo caminho de onde vim."
 seduce_outcome.3306.t: "É[target.Custom('ES_EA')] [target.Custom2('InsultNoun', ROOT.Char)] [target.Custom2('InsultAdjective', ROOT.Char)] vai pagar!"
 seduce_outcome.3306.desc: "Pode ser que eu tenha julgado mal o entusiasmo dela/dela."
 seduce_outcome.3306.a: "Um Jogo Perigoso"
 seduce_outcome.3307.t: "Meu coração bate como um martelo quando eu bato na porta."
 seduce_outcome.3307.desc: "Quando [owner.GetFirstName] se aproxima, não sei se arranco as roupas de seu corpo ou apago de um soco esse sorriso [owner.Custom('quirk_neg_adjective')] do rosto. Beijo [owner.GetHerHim] em desafio, e [owner.GetSheHe] me puxa para mais perto em resposta à altura.

Os sentimentos conflitantes em meu peito ecoam em nossos corpos; passamos a noite trocando insultos e prazer um com o outro."
 seduce_outcome.3307.a: "Por que nos importaríamos? Por favor, abra a porta!"
 seduce_outcome.3307.b: "A treliça sob a janela de [target.GetFirstName] não parece muito firme, mas nada se interporá entre mim e o desejo da minha carne! Ao final da perigosa escalada, meus dedos se agarram ao parapeito da janela.\n\n"Ah, [target.GetFirstNameNoTooltip]! Abra, minha [target.Custom('LoverPetName')]! Sou eu — [ROOT.Char.GetFirstNameNoTooltip]!". Bato nas persianas, mas ninguém responde.\n\n"O que você acabou de chamar o meu [target_liege.Custom2('RelationToMeShort', SCOPE.sC('target'))], seu [ROOT.Char.Custom2('InsultNounSexual', SCOPE.sC('target_liege'))] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('target_liege'))]?!". Olho para cima. [target_liege.Custom('ES_ElLa')|U] [target_liege.GetTitledFirstName|l] está se debruçando [target_liege.Custom('ES_OA')] na janela logo acima de mim!"
 seduce_outcome.3308.t: "Hora de partir, eu acho!"
 seduce_outcome.3308.desc_illigal: "Quando meu [owner.Custom('ComplimentAdjective')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] [owner.GetFirstName] sorri [owner.Custom('quirk_pos_adverb')], me custa lembrar que a atração que sinto não é vista com bons olhos.

E então, quando [owner.Custom('ES_ElElla')] puxa minha [ROOT.Char.Custom('GetUpperClothingArticle')] e suas mãos passeiam pelo meu corpo, percebo que não me importo."
