 seduce_outcome.3308.a: "Não há mais dúvida alguma. [owner.GetFirstName], meu própri[owner.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner') )] , quer ser mais que família…\n\n"
 seduce_outcome.3309.desc_opening: "Embora eu sinta grande apreço por [owner.Custom('ES_ElElla')], esta descoberta me deixa pasmad[ROOT.Char.Custom('ES_OA')]."
 seduce_outcome.3309.desc: "Embora [owner.GetHerHim] eu tenha em grande estima, a notícia ainda me deixa chocado[ROOT.Char.Custom('ES_OA')]."
