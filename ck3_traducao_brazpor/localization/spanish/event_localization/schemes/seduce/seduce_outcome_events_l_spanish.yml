 seduce_outcome.4001.incest.desc: "Pare com essa loucura! Sou seu #EMP [owner.Custom2('RelationToMe', SCOPE.sC('target') )]! #!"
 seduce_outcome.4001.regular.desc: "O mundo saberá de suas grotescas perversões!"
 seduce_outcome.4001.a: "Bem, o que é a vida sem alguns indulgências?"
 seduce_outcome.4002.desc: "Quando entro nos aposentos de [target.GetFirstName] tarde da noite, não sou recebid[ROOT.Char.Custom('ES_OA')] com um abraço carinhoso, mas com um[target.Custom('ES_XA')] desdenhos[target.Custom('ES_OA')] [target.Custom2('InsultNoun', ROOT.Char)]!

"A Ferida da Rejeição"
 seduce_outcome.4002.a: ""Isso foi longe demais, [target.Custom2('RelationToMe', SCOPE.sC('owner'))]. Sou seu [owner.Custom2('RelationToMe', SCOPE.sC('target') )], pelo amor de [ROOT.Char.GetFaith.HighGodName]!".\n\n[target.GetFirstName] [target.Custom('quirk_neg_present')] ao deixar claro seu desprezo pelas minhas investidas românticas."
 seduce_outcome.4003.t: "Eu estava cert de que tínhamos algo especial!"
 seduce_outcome.4003.plot.desc: "Desprecio y exposición"
 seduce_outcome.4003.regular.desc: ""Você me enoja, [owner.GetFirstNameNoTooltip]. Sou seu [owner.Custom2('RelationToMe', SCOPE.sC('target') )], pelo amor de [ROOT.Char.GetFaith.HighGodName]! Tornarei públicas suas perversões grotescas, pode acreditar!".\n\n[target.GetFirstName] [target.Custom('quirk_neg_present')] ao deixar claro seu desprezo pelas minhas investidas românticas."
 seduce_outcome.4003.a.plot: "Você fará isso com seu própri[target.Custom('ES_OA')] [target.Custom2('RelationToMe', SCOPE.sC('owner'))]?"
 seduce_outcome.4003.a.regular: "Enquanto passeio, vejo [target.GetFirstName] acenando para mim ao longe. [target.Custom('ES_LoLa')|U] sigo e, depois de alcançá-l[target.Custom('ES_OA')], nos escondemos. Exploramos ansiosamente os corpos um do outro, e me deixo levar por uma tempestade de beijos ardentes e suspiros ofegantes. De repente, [target.GetFirstNameNoTooltip] interrompe nosso beijo ao pôr um dedo sobre meus lábios.

"Tem sido divertido", diz com uma voz animada enquanto se afasta, "mas já me cansei desse jogo, é hora de que"
