l_spanish:
 seduce_ongoing.success.rejection: "Foi bom, mas chega por hoje."
 seduce_ongoing.failure.rejection: "Não, não e nunca, [owner.GetFirstNameNoTooltip]."
 seduce_ongoing_decline_event.tt: "Abandono esta oportunidade de impressionar [target.GetFirstName]"
 seduce_ongoing_possible_outcomes_tooltip_effect.success.desc: "Tudo corre de acordo com o plano"
 seduce_ongoing_possible_outcomes_tooltip_effect.failure.desc: "[target.GetFirstNameNoTooltip] não ficou impressionad"
 seduce_ongoing.1001.t: "A Dança"
 seduce_ongoing.1001.distant_opening: "Cheguei à corte de [court_of_residence.GetNameNoTier] a tempo para o baile que acontece em [court_owner.Custom('ResidenceBuilding')]. Consegui um convite, pois preciso ver [target.GetFirstName]."
 seduce_ongoing.1001.close_opening: "Não vou ao baile apenas porque sou [ROOT.Char.GetLadyLord] do/a [court_owner.Custom('ResidenceBuilding')], mas porque quero ver [target.GetFirstName] lá."
 seduce_ongoing.1001.desc: "\n\n[target.GetSheHe|U] tem uma aparência deslumbrante, e quando finalmente conseguimos ficar a sós, faço minha proposta."
 seduce_ongoing.1001.a: "Venha comigo para a roda da próxima dança, meu [target.GetLadyLord]?"
 seduce_ongoing.1001.a.tt: "#F Apelo ao lado brincalhão de [target.GetFirstNameNoTooltip].#!"
 seduce_ongoing.1001.b: "Um passeio no jardim, longe de tudo isso?"
 seduce_ongoing.1001.b.tt: "#F Apelo ao lado pensativo de [target.GetFirstNameNoTooltip].#!"
 seduce_ongoing.1001.c: "Posso lhe oferecer mais comida?"
 seduce_ongoing.1001.c.tt: "#F Apelo ao lado ganancioso de [target.GetFirstNameNoTooltip].#!"
 seduce_ongoing.1001.d: "Você viu como essas pessoas \"dançam\"?"
 seduce_ongoing.1001.d.tt: "#F Apelo ao lado malicioso de [target.GetFirstNameNoTooltip].#!"
 seduce_ongoing.1003.opening: "Durante o baile do/a [court_owner.Custom('ResidenceBuilding')], [owner.GetFirstName] se aproximou de mim para oferecer sua companhia."
 seduce_ongoing.1003.dance: "\n\nAlgumas cabeças certamente se viraram para nos ver dançando, e eu ria como um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GirlBoy')]!"
 seduce_ongoing.1003.walk: "\n\nCaminhamos pelos jardins, conversando sobre diversos assuntos até percebermos que ambos perdemos a noção do tempo!"
 seduce_ongoing.1003.food: "\n\n[owner.GetSheHe|U] pediu a alguns servos que trouxessem mais pratos, e passamos a maior parte da noite comendo juntos. Estava delicioso!"
 seduce_ongoing.1003.mockery: "\n\nSentamo-nos a zombar dos outros convidados, compartilhando piadas e risadas. Fiquei profundamente impressionad[ROOT.Char.Custom('ES_OA')] com o engenho mordaz de [owner.GetFirstNameNoTooltip]!"
 seduce_ongoing.1003.fallback: "\n\nAcabamos nos divertindo tanto que dançamos quase durante toda a celebração!"
 seduce_ongoing.1003.a: "Tive uma noite tão agradável!"
 seduce_ongoing.1004.dance: "[owner.GetSheHe|U] não entendeu minhas indiretas de que eu não estava interessado em dançar e, depois de dar algumas voltas a contragosto, tive que pedir que me deixasse ir."
 seduce_ongoing.1004.walk: "Embora o passeio pelo jardim tenha sido revigorante, a conversa de [owner.GetFirstName] me entediou imensamente.\n\nLogo inventei uma desculpa e voltei à dança."
 seduce_ongoing.1004.food: "Embora não me opusesse à presença, [owner.GetSheHe] passou a noite inteira pedindo mais e mais pratos de comida aos criados. Fiquei satisfeito rapidamente e inventei uma desculpa para ir dançar em vez disso."
 seduce_ongoing.1004.mockery: "[target.GetSheHe|U] sentou ao meu lado, fazendo comentários sobre os outros convidados.\n\nNão apenas foi cruel sem necessidade, mas também grosseiro e completamente sem arte."
 seduce_ongoing.1004.fallback: "Não parava de sugerir maneiras de passar o tempo nas celebrações, mas não há muito que se possa fazer com uma companhia tão terrível como a sua."
 seduce_ongoing.1004.a: "Isso não correu bem."
 seduce_ongoing.1005.dance: "Algumas cabeças se viraram ao nos ver [target.GetFirstName] e a mim na pista enquanto [target.Custom('ES_ElElla')] ria de todo coração!"
 seduce_ongoing.1005.walk: "[target.GetFirstName] e eu passeamos pelos jardins e conversamos sobre todo tipo de assuntos. No final, percebemos que havíamos perdido a noção do tempo e, quando voltamos, a dança já havia começado a se encaminhar para o fim."
 seduce_ongoing.1005.food: "Pedi aos servos que trouxessem mais comida para [target.GetFirstName] e para mim, e passamos a noite apreciando cada prato delicioso que os cozinheiros de [court_of_residence.GetNameNoTier]. Est[target.Custom('ES_EA')] [target.GetWomanMan] sem dúvida aprecia as coisas boas da vida."
 seduce_ongoing.1005.mockery: "Sentamos-nos juntos, fazendo uma piada atrás da outra sobre os outros convidados. Não imaginava que [target.GetFirstName] tivesse tanto talento na arte da zombaria!"
 seduce_ongoing.1005.fallback: "![target.GetFirstName] e eu acabamos nos divertindo tanto que dançamos quase durante toda a celebração!"
 seduce_ongoing.1005.a: "Que noite maravilhosa tivemos!"
 seduce_ongoing.1006.dance: "Achei que já estava tudo certo quando [target.GetFirstName] aceitou dançar e, embora eu ache que me saí bem, logo arrumou uma desculpa e me deixou plantado[ROOT.Char.Custom('ES_OA')] com os outros dançarinos."
 seduce_ongoing.1006.walk: "Achei que fosse um passeio agradável, mas talvez estivesse frio demais, ou talvez eu tenha falado demais, porque [target.GetSheHe] inventou uma desculpa e voltou à dança sem nem esperar para ver se eu também ia.\n\nQuando voltei, [target.GetSheHe] estava ocupad[target.Custom('ES_OA')] se divertindo com os outros dançarinos."
 seduce_ongoing.1006.food: "Será que havia algo de errado com a comida que mandei trazer para [target.GetFirstName]? Mesmo depois de [target.GetSheHe] inventar suas desculpas, a comida continuou saindo da cozinha, acumulando-se enquanto eu ficava sentad[ROOT.Char.Custom('ES_OA')] ali, beliscando-a sozinh[ROOT.Char.Custom('ES_OA')]."
 seduce_ongoing.1006.mockery: "Por mais que eu tentasse, [target.GetFirstName] não riu das minhas piadas. No fim, [target.GetSheHe] me acusou de ser cruel sem necessidade e me deixou sozinh[ROOT.Char.Custom('ES_OA')]."
 seduce_ongoing.1006.fallback: "Continuo sugerindo maneiras de passarmos o tempo nas celebrações, mas nada parece interessar a [target.GetFirstName]. Será que fiz algo de errado?"
 seduce_ongoing.1006.a: "Isso não correu bem."
 seduce_ongoing.successful.target: "\n\nEmbora o presente tenha sido anônimo, [owner.GetFirstName] fez grandes esforços para garantir que eu descobrisse que [owner.GetSheHe] estava por trás de tudo."
 seduce_ongoing.unsuccessful.target: "\n\nEmbora o presente tenha sido enviado anonimamente, não é difícil perceber que [owner.GetFirstName] estava por trás…"
 seduce_ongoing.target_successful.option: "merece meu agradecimento sem reservas!"
 seduce_ongoing.target_unsuccessful.option: "Talvez haja #EMP alguém#! que irá gostar disso..."
 seduce_ongoing.target.opening: "[target.Custom2('AppropriateGreeting', ROOT.Char)]"
 seduce_ongoing.successful.owner: "Muito obrigado pelo [SCOPE.Custom('SeductionGiftType')] que você me deu. Mal me lembro da última vez que recebi um presente tão maravilhoso!"
 seduce_ongoing.unsuccessful.owner: "Recebi o [SCOPE.Custom('SeductionGiftType')] que você enviou. Estou... incert quanto ao motivo de você ter me enviado um presente assim, mas tomei nota disso."
 seduce_ongoing.owner_successful.option: "Faria qualquer coisa por você, [target.GetFirstNameNoTooltip]."
 seduce_ongoing.owner_unsuccessful.option: "O que eu fiz de errado?"
 seduce_ongoing.1101.t: "Algo Caro"
 seduce_ongoing.1101.desc: "Sem dúvida, um presente chamará a atenção [target.Custom('ES_DelDela')] [target.GetFirstName]. Qualquer um apreciaria algo refinado e claramente caro."
 seduce_ongoing.gift_selection.tapestry: "Uma tapeçaria que mostre a sua dinastia."
 seduce_ongoing.gift_selection.tapestry_tt: "Acredito que [target.GetFirstName] é um[target.Custom('ES_XA')] [target.GetWomanMan] leal à sua família e dinastia"
 seduce_ongoing.gift_selection.horse: "Um cavalo de raça pura deve ser apreciado."
 seduce_ongoing.gift_selection.horse_tt: "Acho que [target.GetFirstName] é alguém que aprecia atividade e o céu aberto"
 seduce_ongoing.gift_selection.tailor: "Um alfaiate para vestir [target.Custom('ES_LoLa')] à perfeição!"
 seduce_ongoing.gift_selection.tailor_tt: "Acho que [target.GetFirstName] aprecia estilo e causar impressão"
 seduce_ongoing.gift_selection.decline: "Talvez não."
 seduce_ongoing.1102.t: "Um Presente de Trabalho"
 seduce_ongoing.1102.desc: "Todo mundo aprecia um presente, mas talvez eu possa pensar em algo verdadeiramente único que cause uma boa impressão em [target.GetFirstName]."
 seduce_ongoing.gift_selection.embroidery: "Um bordado com o emblema da casa."
 seduce_ongoing.gift_selection.embroidery_tt: "Acho que [target.GetFirstName] se importa com o prestígio da família dele"
 seduce_ongoing.gift_selection.poem: "Encomendarei um poema sobre as alegrias da vida, dedicado a [target.Custom('ES_ElElla')]."
 seduce_ongoing.gift_selection.poem_tt: "Penso que [target.GetFirstName] aprecia os prazeres físicos da vida, ou ao menos a poesia"
 seduce_ongoing.gift_selection.woodcarving: "Uma escultura em madeira de um castelo!"
 seduce_ongoing.gift_selection.woodcarving_tt: "Acho que [target.GetFirstName] aprecia a arquitetura"
 seduce_ongoing.1103.t: "Pequeno, mas Significativo"
 seduce_ongoing.1103.desc: "Nem todos os presentes precisam ser uma grande demonstração de riqueza. Coisas menores podem causar uma impressão muito maior, desde que sejam bem escolhidas. Pergunto-me o que agradaria [target.GetFirstName]."
 seduce_ongoing.gift_selection.jewelry: "Um relicário de prata, sempre perto do coração."
 seduce_ongoing.gift_selection.jewelry_tt: "Acho que [target.GetFirstName] gosta de chamar a atenção das pessoas… ou pelo menos das coisas que brilham"
 seduce_ongoing.gift_selection.stuffed_animal: "Um animal de pelúcia em formato de raposa certamente seria incomum..."
 seduce_ongoing.gift_selection.stuffed_animal_tt: "Acho que [target.GetFirstName] aprecia os símbolos de autoridade acima da própria vida"
 seduce_ongoing.gift_selection.flower_display: "Um arranjo de flores para o jardim em [court_location.GetNameNoTierNoTooltip]."
 seduce_ongoing.gift_selection.flower_display_tt: "Acho que [target.GetFirstName] gosta de cuidar das coisas, ou pelo menos aprecia a beleza"
 seduce_ongoing.1104.t: "Algo Incomum"
 seduce_ongoing.1104.desc: "Qualquer um pode comprar um gesto de carinho, grande ou pequeno. Se quero impressionar a [target.GetFirstName]. preciso enviar algo verdadeiramente especial"
 seduce_ongoing.gift_selection.rare_book: "Devo adquirir um livro especialmente raro para [target.Custom('ES_ElElla')]."
 seduce_ongoing.gift_selection.rare_book_tt: "Acho que [target.GetFirstName] gosta de conhecimento, ou pelo menos, dos objetos que o contêm"
 seduce_ongoing.gift_selection.handkerchief: "Um lenço com o meu brasão."
 seduce_ongoing.gift_selection.handkerchief_tt: "Acho que [target.GetFirstName] faria bom uso de um símbolo de alguém da minha estatura"
 seduce_ongoing.gift_selection.object: "[SCOPE.Custom('SeductionObjectIndefinite')|U], uma lembrança de nosso primeiro encontro"
 seduce_ongoing.gift_selection.object_tt: "Acho que [target.GetFirstName] já se importa comigo, de certa forma"
 seduce_ongoing.1201.t: "Um Presente Bem Escolhido"
 seduce_ongoing.1201.desc: "Recebi um presente, uma bela tapeçaria com cenas da história de minha dinastia, emoldurada por brasões habilmente tecidos!"
 seduce_ongoing.1201.a: "!Se merece meu agradecimento sem reservas!"
 seduce_ongoing.1301.t: "Um Presente Estranho"
 seduce_ongoing.1301.desc: "Recebi uma tapeçaria, com cenas da história de minha dinastia, mas as figuras parecem estranhas, e ninguém consegue interpretar exatamente o que está acontecendo em nenhuma cena."
 seduce_ongoing.1301.a: "Venda isso. Pode ser usado como uma manta, se nada mais servir."
 seduce_ongoing.1202.opening: "Recebi um cavalo, bem criado e alimentado! A magnífica criatura parece perfeita para cavalgar, e"
 seduce_ongoing.1202.courtier: "já vi que [courtier.GetFirstName] o olha com inveja."
 seduce_ongoing.1202.no_courtier: "ele já tem vários admiradores na corte."
 seduce_ongoing.1302.desc: "Recebi um cavalo, o que me faz pensar no que os outros pensam de mim. Será que eles esperam que eu vá cavalgar nesse velho magrelo?"
 seduce_ongoing.1302.a: "O que eu vou fazer com esse jumento? Venda-o."
 seduce_ongoing.1203.desc: "Um alfaiate chegou à corte, especialmente para me fornecer qualquer roupa nova que eu possa desejar. Agora que seu trabalho está feito, devo dizer que ele também é muito habilidoso!"
 seduce_ongoing.1203.a: "Me sinto esplêndid!"
 seduce_ongoing.1303.desc: "Um alfaiate chegou para me fornecer qualquer roupa nova que eu pudesse desejar. Logo ficou aterrorizado com a ofensa causada quando eu perguntei exatamente o que havia de errado com minhas roupas antigas."
 seduce_ongoing.1303.a: "Pelo menos posso vender estes trapos feios com os quais tentou me vestir."
 seduce_ongoing.1204.desc: "Mal posso acreditar quando abro o pacote de couro. O tomo dentro dele deve ter um século ou mais, cuidadosamente escrito, decorado e dourado por mãos antigas."
 seduce_ongoing.1204.a: "Que maravilhas esse livro contém?"
 seduce_ongoing.1304.desc: "Estou um pouco confus ao abrir o pacote de couro e encontrar um tomo empoeirado e antigo. Folheando suas páginas, encontro algumas ilustrações bonitas, mas não consigo ler o texto."
 seduce_ongoing.1304.a: "Que utilidade terei com esse livro? Venda-o."
 seduce_ongoing.1205.desc: "Recebi um lindo bordado grande, replicando o brasão de minha casa com cores vibrantes! Ele será perfeito na lareira de meus aposentos."
 seduce_ongoing.1205.a: "Sua habilidade artesanal certamente impressionará."
 seduce_ongoing.1305.desc: "Recebi um bordado grande, supostamente reproduzindo o brasão de minha casa. No entanto, não tenho certeza do que o artista usou como referência, pois certamente não reconheço o brasão. Talvez outra pessoa goste mais dele..."
 seduce_ongoing.1305.a: "Seria bom se fosse o brasão certo..."
 seduce_ongoing.1206.desc: "Um poeta se apresentou diante de mim para recitar uma composição sobre os prazeres da vida, dedicada \"[ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitledFirstName|l]!\"."
 seduce_ongoing.1206.a: "Um sopro poético de ar fresco!"
 seduce_ongoing.1306.desc: "Um poeta veio até mim para recitar uma longa composição sobre os prazeres da vida, dedicada a \"[ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitledFirstName|l]\". Entre esses prazeres, este poema não está incluído."
 seduce_ongoing.1207.desc: "Recebi uma escultura em madeira de um castelo em miniatura! Todos os convidados que passam admiram os detalhes e a habilidade expostos."
 seduce_ongoing.1207.a: "Que coisa incomum!"
 seduce_ongoing.1307.desc: "Recebi uma escultura em madeira de... algum tipo de construção? Ah, é para ser um castelo! Supostamente."
 seduce_ongoing.1307.a: "Quanto tempo ela aguentará o fogo?"
 seduce_ongoing.1208.desc: "[owner.GetFirstName] me enviou um/uma [SCOPE.Custom('SeductionObjectIndefinite')] como lembrança do nosso primeiro encontro."
 seduce_ongoing.1208.a: "Será que acha que eu poderia jamais esquecer?"
 seduce_ongoing.1308.desc: "[owner.GetFirstName] me enviou um/uma [SCOPE.Custom('SeductionObjectIndefinite')] como lembrança do nosso primeiro encontro. Deve ser que [owner.GetSheHe] o recorda com muito mais carinho do que eu."
 seduce_ongoing.1209.desc: "Recebi um pequeno medalhão, uma bela peça de prataria. Embora eu me pergunte o que há dentro, é mais importante que os outros fofocarão sobre o que ele pode conter."
 seduce_ongoing.1209.a: "Talvez alguém possa me ajudar a abri-lo um dia?"
 seduce_ongoing.1309.desc: "Recebi um pequeno medalhão e, a princípio, não percebi que o pequeno pedaço não polido era realmente prata. Ele também não abre, então vejo pouca utilidade nele."
 seduce_ongoing.1309.a: "Por que alguém acharia que eu gostaria disso?"
 seduce_ongoing.1210.desc: "É incomum, isso é verdade, mas há algo atraente no animal de pelúcia de raposa que foi colocado diante de mim. Talvez seja o rosnado congelado e feroz em seus lábios?"
 seduce_ongoing.1210.a: "Inconvencional, mas não desagradável."
 seduce_ongoing.1310.desc: "\"Tire essa coisa de perto de mim!\" A raposa de pelúcia tem um rosnado repugnante nos lábios, mostrando dentes ferozes para mim."
 seduce_ongoing.1310.a: "Quem gostaria de um presente desse tipo?!"
 seduce_ongoing.1211.desc: "O arranjo de flores é deslumbrante, e desde que os camponeses terminaram de plantá-lo no jardim, os passeios ali se tornaram muito mais populares."
 seduce_ongoing.1211.a: "Eu não sabia que esse tipo de beleza me tocaria tanto."
 seduce_ongoing.1311.desc: "\"Então, não quer que a plantemos, [ROOT.Char.Custom('FormOfAddressForLiege')]?\" Os camponeses estão diante de mim, com terra caindo de suas cangas. A composição floral que eles carregam parece gasta e arruinada."
 seduce_ongoing.1311.a: "Eu não quero essas coisas em lugar algum próximo dos jardins."
 seduce_ongoing.1212.desc: "[owner.GetFirstName] me enviou um presente: um lenço com o brasão dos [owner.GetDynasty.GetBaseName].\n\nVai ser certamente interessante ver qual será a reação dos outros quando eu exibir o emblema de [owner.GetFirstName] de maneira tão flagrante."
 seduce_ongoing.1212.a: "Com certeza, causará algum tipo de impressão."
 seduce_ongoing.1312.desc: "[owner.GetFirstName] me enviou um presente: um lenço com o brasão dos [owner.GetDynasty.GetBaseName].\n\nSe pensa que vou exibir o emblema dele em público, está muito enganado!"
 seduce_ongoing.1801.t: "[ROOT.Char.Custom('MistressMaster')|U] das Palavras"
 seduce_ongoing.1801.start.desc: "Como estudios[ROOT.Char.Custom('ES_OA')] das artes diplomáticas, estou bem ciente do poder de um elogio eloquente. Demonstrar admiração pela melhor qualidade de um[target.Custom('ES_XA')] [target.GetWomanMan] é um caminho certo para chegar ao coração de [target.GetHerHis].\n\n"
 seduce_ongoing.1801.close.desc: "Da próxima vez que eu ver [target.GetFirstName], elogiarei seu…"
 seduce_ongoing.1801.distant.desc: "Escreverei uma carta para [target.GetFirstName], elogiando..."
 seduce_ongoing.1801.compassionate: "o seu Coração caloroso e gentil."
 seduce_ongoing.1801.bold: "o seu Espírito corajoso e destemido."
 seduce_ongoing.1801.honorable: "a sua Natureza nobre e leal."
 seduce_ongoing.1801.greed: "a sua Ambição e desejo de viver intensamente."
 seduce_ongoing.1801.rational: "a sua Mente racional e brilhante."
 seduce_ongoing.1801.zealous: "o seu Piedade e fé inabalável."
 seduce_ongoing.1801.energetic: "a sua Espontaneidade e vigor."
 seduce_ongoing.1801.forgiving: "a sua Natureza magnânima."
 seduce_ongoing.1801.beautiful_male: "a sua Aparência notavelmente bonita."
 seduce_ongoing.1801.beautiful_female: "a sua Beleza incomparável e deslumbrante."
 seduce_ongoing.1801.strong: "a sua Forma física impressionante."
 seduce_ongoing.1801.extroverted: "o seu Carisma irresistível."
 seduce_ongoing.1801.dominant: "a sua Presença assertiva e poderosa."
 seduce_ongoing.1801.compliment.tt: "#F Lo bien que [target.GetFirstName] reciba el cumplido dependerá de lo acertado que sea para [target.Custom('ES_ElElla')]#!"
 seduce_ongoing.1802.t: "Palavras Encantadoras"
 seduce_ongoing.1802.close.desc: "Enquanto passeio pelos jardins em silenciosa contemplação, com a mente distante em outro lugar, quase tropeço em [owner.GetFirstName]. Mal consigo me recompor e [owner.GetSheHe] já me pede desculpas, dizendo que nunca quis incomodar uma[ROOT.Char.Custom('ES_XA')] [SCOPE.sC('target').Custom('LadyLordWomanMan')] com tamanha…"
 seduce_ongoing.1802.distant.desc: "Recebi uma carta intrigante de [owner.GetFirstName]. Entre as perguntas e anedotas esperadas, há, intercalados, elogios sutis, mas inconfundíveis, ao meu…"
 seduce_ongoing.1802.compassionate.desc: "\"gentil compaixão.\""
 seduce_ongoing.1802.bold.desc: "\"coragem vigorosa.\""
 seduce_ongoing.1802.honorable.desc: "\"moral nobre.\""
 seduce_ongoing.1802.greed.desc: "\"aspirações grandiosas.\""
 seduce_ongoing.1802.rational.desc: "\"clareza singular de pensamento.\""
 seduce_ongoing.1802.zealous.desc: "\"fé admirável.\""
 seduce_ongoing.1802.energetic.desc: "\"energia vital.\""
 seduce_ongoing.1802.forgiving.desc: "\"misericórdia magnânima.\""
 seduce_ongoing.1802.beautiful_male.desc: "\"aparência marcante.\""
 seduce_ongoing.1802.beautiful_female.desc: "\"beleza inspiradora.\""
 seduce_ongoing.1802.strong.desc: "\"força física impressionante.\""
 seduce_ongoing.1802.extroverted.desc: "\"encantos irresistíveis.\""
 seduce_ongoing.1802.dominant.desc: "\"energia assertiva.\""
 seduce_ongoing.1802.good.desc: "\n\nAs palavras mostram um nível de atenção carinhosa que me pega de surpresa."
 seduce_ongoing.1802.neutral.desc: "\n\nAs palavras não fazem muito sentido, mas o gesto é de bondade, suponho."
 seduce_ongoing.1802.bad.desc: "\n\nSuspeito que tenha boas intenções e, ainda assim, continua soando para mim com certo sarcasmo velado."
 seduce_ongoing.1802.a.good: "[owner.GetTitledFirstNameNoTooltip|l]... Você me lisonjeia!"
 seduce_ongoing.1802.a.bad: "Um pouco ignorante, mas principalmente doce."
 seduce_ongoing.1802.b.good: "Você deveria se esforçar mais na próxima vez."
 seduce_ongoing.1802.b.bad: "Que constrangedor..."
 seduce_ongoing.1802.c: "Não tenho interesse nessas atenções!"
 seduce_ongoing.1601.t: "Uma Leitura em [location.GetNameNoTooltip]"
 seduce_ongoing.1601.t_no_location: "Uma Leitura"
 seduce_ongoing.1601.desc: "Os festejos chegam ao fim e a diversão parece estar acabando, mas [target.GetFirstName] sugere uma leitura.\n\nLogo chega um escriba, perguntando aos convidados o que gostaríamos de ouvir, e vejo a chance de impressionar [target.GetFirstName]."
 seduce_ongoing.1601.a: "Algo piedoso, como [SCOPE.Custom('RandomReligiousTextName')]."
 seduce_ongoing.1601.a.tt: "Acho que [target.GetSheHe] quer ouvir sobre religião."
 seduce_ongoing.1601.b: "Vamos nos entreter. [SCOPE.Custom('RandomEntertainmentTextName')|U]!"
 seduce_ongoing.1601.b.tt: "Acho que [target.GetSheHe] quer ouvir algo divertido."
 seduce_ongoing.1601.c: "[SCOPE.Custom('RandomInformativeTextName')] nos daria a chance de aprender algo."
 seduce_ongoing.1601.c.tt: "Acho que [target.GetSheHe] quer ouvir algo informativo."
 seduce_ongoing.1603.desc: "A noite parecia que ia ficar entediante quando a diversão do banquete acabasse, mas [owner.GetFirstName] salvou o dia ao sugerir a leitura de [SCOPE.Custom('BookInQuestion')]!"
 seduce_ongoing.1603.a: "Eu também adoro esse!"
 seduce_ongoing.1604.desc: "O escrivão lê para nós e [target.GetFirstName] parece completamente absorvid[target.Custom('ES_OA')].\n\nMais tarde, [target.GetSheHe] se aproxima de mim. \"Boa escolha, [ROOT.Char.GetFirstName]\", diz [target.Custom('quirk_pos_present')]."
 seduce_ongoing.1604.a: "Foi ótimo, não foi?"
 seduce_ongoing.1605.desc_1: "Um banquete tedioso ficou ainda pior quando [owner.GetFirstName] sugeriu uma leitura de [SCOPE.Custom('BookInQuestion')]."
 seduce_ongoing.1605.desc_2: "Por sorte, [other_guest.GetFirstName] sugeriu logo que lêssemos [SCOPE.Custom('GoodBookSuggestion')]!"
 seduce_ongoing.1605.desc_no_other_guest: "Felizmente, um atendente sugeriu rapidamente ler [SCOPE.Custom('GoodBookSuggestion')] em seu lugar!"
 seduce_ongoing.1605.a: "Uma escolha muito melhor!"
 seduce_ongoing.1606.desc_1: "O escrivão se alonga e vejo que [target.GetFirstName] vai perdendo a atenção."
 seduce_ongoing.1606.desc_2: "\n\nEnquanto penso em como salvar a situação, [other_guest.Custom2('MyCharacterIntroduction', ROOT.Char)] intervém de repente. \"Posso sugerir humildemente que leiamos [SCOPE.Custom('GoodBookSuggestion')]?\""
 seduce_ongoing.1606.desc_3: "[target.GetFirstName] imediatamente se anima com um interesse renovado."
 seduce_ongoing.1606.desc_no_other_guest: "Um atendente interrompe de repente. \"Posso humildemente sugerir que leiamos [SCOPE.Custom('GoodBookSuggestion')] em vez disso?\""
 seduce_ongoing.1606.a: "Por que eu não pensei nisso?"
 seduce_ongoing.1701.t: "O Encontro"
 seduce_ongoing.1701.desc: "Passo por [court_of_residence.GetNameNoTier] justamente no dia em que acontece uma justa. Os oficiais de [target.GetFirstName] andam por ali instruindo [target.Custom('MountedWarriorTermPlural')] jovens, e vejo que [target.GetFirstName] está entre eles.\n\nIndependentemente das minhas intenções, fica claro que está concentrad[target.Custom('ES_OA')] em seus deveres como [target.GetLadyLord] destes soldados."
 seduce_ongoing.1701.a: "Que tal mostrarmos a esses novatos uma justa simulada?"
 seduce_ongoing.1701.a.tt: "#F Apelo ao lado ativo ou brincalhão de [target.GetFirstNameNoTooltip].#!"
 seduce_ongoing.1701.b: "Vamos dar uma volta nas ameias para discutir estratégias."
 seduce_ongoing.1701.b.tt: "#F Apelo ao lado pensativo de [target.GetFirstNameNoTooltip].#!"
 seduce_ongoing.1701.c: "Quero ouvir tudo sobre seus planos para a temporada de impostos."
 seduce_ongoing.1701.c.tt: "#F Apelo ao lado econômico de [target.GetFirstNameNoTooltip].#!"
 seduce_ongoing.1701.d: "Um desses '[target.Custom('MountedWarriorTermPlural')]' poderia ser feito de bobo..."
 seduce_ongoing.1701.d.tt: "#F Apelo ao lado malicioso de [target.GetFirstNameNoTooltip].#!"
 seduce_ongoing.1703.opening: "Para minha surpresa, [owner.GetFirstName] compareceu ao torneio de justa para jovens [target.Custom('MountedWarriorTermPlural')] em [court_of_residence.GetNameNoTier]."
 seduce_ongoing.1703.duel: "\n\n[owner.GetSheHe|U] me desafiou para uma justa de brincadeira, e nós fizemos um verdadeiro espetáculo para os guerreiros novatos. A justa rapidamente se tornou uma disputa intensa, mas, no fim do dia, compartilhamos um abraço e nos sentimos melhores pelo esforço que fizemos."
 seduce_ongoing.1703.strategy: "\n\nCaminhamos pelas ameias discutindo extensamente sobre estratégia enquanto observávamos os guerreiros novatos que estavam abaixo no pátio. [owner.GetFirstName] tinha algumas ideias muito perspicazes e agradeci que me fizesse reconsiderar algumas suposições sobre meus novos soldados. As demais digressões da conversa também foram muito interessantes…"
 seduce_ongoing.1703.tax_season: "\n\nEmbora o encontro fosse necessário, eu me diverti muito mais sentado[ROOT.Char.Custom('ES_OA')] dentro discutindo meus planos para a próxima temporada de impostos com [owner.GetFirstName]. Como [owner.GetSheHe] me apontou, de que serve um exército afinal, sem os meios para alimentá-lo?"
 seduce_ongoing.1703.trap: "\n\nObservar os jovens guerreiros era necessário, mas desinteressante, então fiquei grato quando [owner.GetFirstName] sugeriu uma pequena distração divertida. Um pajem derramou sangue de porco no chão atrás da bacia de água, e o cheiro assustou alguns dos cavalos menos treinados. Vários jovens caíram, enquanto os demais mal conseguiam se segurar!"
 seduce_ongoing.1703.fallback: "\n\nEmbora observar os jovens guerreiros seja normalmente tedioso, [owner.GetFirstName] fez todo o dia passar em um instante."
 seduce_ongoing.1703.a: "Devo agradecer a [owner.GetFirstNameNoTooltip] pela visita."
 seduce_ongoing.1704.duel: "\n\n[owner.GetSheHe|U] insistiu em fazer uma simulação de justa diante dos guerreiros novatos, mas eu não estava dispost[ROOT.Char.Custom('ES_OA')] a me passar por ridículo. Por mais decepcionad[owner.Custom('ES_OA')] que ficasse [owner.GetFirstName], eu tinha coisas melhores para fazer do que perder tempo consolando[owner.GetHerHim]."
 seduce_ongoing.1704.strategy: "\n\n[owner.GetSheHe|U] me convidou para um passeio pelas ameias para discutir ideias de estratégias, mas tive que refutar sugestão ruim após sugestão ruim. Talvez [owner.GetFirstName] devesse se ater aos assuntos que realmente conhece…"
 seduce_ongoing.1704.tax_season: "\n\nApesar de que eu obviamente estava ocupad[ROOT.Char.Custom('ES_OA')] com meus guerreiros novatos, [owner.GetFirstName] insistiu em que falássemos dos meus planos para a próxima temporada fiscal. No fim tive que deixar[owner.Custom('ES_LoLa')] sol[owner.Custom('ES_OA')] para cuidar dos assuntos realmente importantes."
 seduce_ongoing.1704.trap: "\n\nPara meu espanto, [owner.GetSheHe] sugeriu pôr em marcha um elaborado plano para semear o caos entre os [target.Custom('MountedWarriorTermPlural')] novatos. Não percebe que isso é a última coisa que eu gostaria de fazer?"
 seduce_ongoing.1704.fallback: "\n\n[owner.GetFirstName] queria passar sua visita conversando. Como se não tivesse percebido o dia tão corrido que eu tinha!"
 seduce_ongoing.1704.a: "O que aconteceu com [owner.GetTitledFirstNameNoTooltip]?"
 seduce_ongoing.1705.duel: "O simulacro de justa foi um grande sucesso com os [target.Custom('MountedWarriorTermPlural')] novatos!\n\n[target.GetFirstName] também pareceu se divertir e, após nossa intensa \"batalha\", compartilhamos um abraço de apoio e nos sentimos bem melhor pelo esforço realizado."
 seduce_ongoing.1705.strategy: "Passeando pelas muralhas ameadas, [target.GetFirstName] e eu compartilhamos ideias para aproveitar ao máximo os guerreiros novatos, como os que estavam abaixo, no pátio.\n\nAo final do dia, me pareceu que estava tão encantad[target.Custom('ES_OA')] quanto eu com a conversa, apesar das digressões… ou graças a elas."
 seduce_ongoing.1705.tax_season: "[target.GetFirstName] e eu passamos a maior parte do dia discutindo nossos planos para a próxima temporada de impostos. Afinal, de que adianta ter um exército se você não pode alimentá-lo? [target.GetSheHe|U] riu muito disso.\n\nHouve ainda mais risos, já que ambos nos envolvemos em nossas diversas discussões."
 seduce_ongoing.1705.trap: "Depois de um tempinho, sugeri uma distraçãozinha divertida para observar os guerreiros novatos. Um pajem derramou um pouco de sangue nos bebedouros, e o cheiro fez alguns dos cavalos menos treinados entrarem em grande pânico. Muitos [target.Custom('MountedWarriorTermPlural')] foram derrubados, e outros mal conseguiam se manter montados.\n\n[target.GetFirstName] riu às gargalhadas com a cena que eu havia armando."
 seduce_ongoing.1705.fallback: "Ao final da minha visita, [target.GetFirstName] parecia encantad[target.Custom('ES_OA')]. \"Observar os noviços costuma ser tedioso, mas hoje passou num instante!\""
 seduce_ongoing.1705.a: "[target.GetSheHe] certamente lembrará deste dia."
 seduce_ongoing.1706.duel: "[target.GetFirstName] se riu da minha sugestão de uma justa simulada. \"Não há necessidade de ninguém se envergonhar desse jeito na frente desses jovens [target.Custom('MountedWarriorTermPlural')]!\"\n\nPassei o resto do dia tentando descobrir se ele quis dizer [target.Custom('ES_ElElla')] ou a mim."
 seduce_ongoing.1706.strategy: "[target.GetFirstName] e eu passeamos pelas ameias, enquanto eu tentava oferecer conselhos estratégicos. [target.GetSheHe|U] não parecia estar com vontade de ouvir. Segundo [target.GetSheHe], tudo o que eu sugeri estava cheio de falhas. Era evidente que sua atenção estava mais voltada para o pátio abaixo do que para mim."
 seduce_ongoing.1706.tax_season: "Tentei falar sobre a próxima temporada de impostos e sobre como [target.GetFirstName] podia garantir os meios suficientes para alimentar seu exército. Por sorte, [target.GetSheHe] estava com a cabeça em outro lugar e logo me deixou para se concentrar nos guerreiros novatos."
 seduce_ongoing.1706.trap: "Quando sugeri pregar uma peça nos [target.Custom('MountedWarriorTermPlural')] que treinavam, [target.GetFirstName] me olhou atônito.\n\n“Sangue de porco e cavalos descontrolados? Vocês ficaram #EMP loc[ROOT.Char.Custom('ES_OA')]#! de verdade, [ROOT.Char.GetWomanMan]?”."
 seduce_ongoing.1706.fallback: "Tentei falar com [target.GetFirstName] o dia todo, mas sempre havia algo que exigia sua atenção. No fim, não consegui chamar sua atenção por mais do que um instante de cada vez, e me senti mais um estorvo do que qualquer outra coisa."
 seduce_ongoing.1706.a: "Espero que [target.GetFirstNameNoTooltip] esqueça rapidamente deste dia."
 seduce_ongoing.2001.t: "A Poção do Amor"
 seduce_ongoing.2001.desc: "Um dos meus servos comprou uma poção do amor a um[dummy_gender.Custom('ES_XA')] anciã[dummy_gender.Custom('ES_OA')] na feira, mas afirmou que ela não lhe trouxe sorte.\n\nQuando tive a pequena garrafa em minhas mãos, não pude evitar pensar em [target.GetFirstName] e me perguntar se talvez minha sorte fosse diferente."
 seduce_ongoing.2001.a: "[target.GetSheHe] certamente achará divertido!"
 seduce_ongoing.2001.b: "[target.GetFirstNameNoTooltip] adoraria zombar de superstições como esta."
 seduce_ongoing.2001.c: "Não tenho tempo para poções do amor sem sentido."
 seduce_ongoing.2001.c.tt: "#F Preciso de uma oportunidade melhor para mostrar meu afeto do que isso!#!"
 seduce_ongoing.2002.desc: "[owner.GetFirstName] me entregou uma \"poção do amor\" que conseguiu em uma feira. Colocamos um pouco no nosso vinho e passamos uma noite divertida fingindo que estava nos afetando, e no fim a linha entre o que fingíamos e o que era real começou a ficar um pouco embaçada."
 seduce_ongoing.2002.a: "Que divertimento!"
 seduce_ongoing.2003.desc: "[target.GetFirstName] e eu tomamos a \"poção do amor\" com um pouco de vinho e passamos a noite fingindo que ela estava nos afetando.\n\nFoi tudo um inocente divertimento, mas a ponta de afeto era clara no sorriso ao se despedir de mim."
 seduce_ongoing.2003.a: "Tempo bem aproveitado juntos."
 seduce_ongoing.2004.desc: "Para nos divertirmos um pouco, [owner.GetFirstName] me desafiou a beber uma poção do amor que conseguiu em uma feira. Quando recusei beber algo de cujo conteúdo eu não sabia, [owner.GetSheHe] ficou um pouco chatead[owner.Custom('ES_OA')]! Logo pedi que me dispensasse para poder me recolher mais cedo."
 seduce_ongoing.2004.a: "O que deu errado?"
 seduce_ongoing.2005.desc: "[target.GetFirstName] recusou a \"poção do amor\" e então perguntou exatamente o que eu estava tentando fazer. Eu me empolguei um pouco, tentando explicar que era tudo por diversão, e então [target.GetSheHe] me pediu que eu me retirasse.[target.Custom('ES_LoLa')] fosse embora."
 seduce_ongoing.2005.a: "Isso foi lamentável."
 seduce_ongoing.2006.t: "A \"Poção do Amor\""
 seduce_ongoing.2006.desc: "[owner.GetFirstName] me trouxe uma poção do amor que comprou em uma feira. Achei que seria divertido e aceitei sua insistência em provarmos um pouco.\n\nMas então ele se recusou a tomar um gole quando eu fiquei gravemente doente!"
 seduce_ongoing.2006.a: "Não estou me sentindo muito bem..."
 seduce_ongoing.2006.a.tt: "#F Maldita seja sua estupidez #EMP *bluuurgh#! [owner.GetFirstNameNoTooltip]!#!"
 seduce_ongoing.2007.desc: "Ah, não! [target.GetFirstName] aceitou experimentar a poção do amor, mas o que era para ser apenas uma pequena diversão acabou causando vômitos e deixando-o de cama."
 seduce_ongoing.2007.a: "Onde está o servo que me deu isso?"
 seduce_ongoing.2008.desc: "[owner.GetFirstName] veio me ver com uma \"poção do amor\" adquirida por um de seus servos em uma feira. Não bebemos o líquido desconhecido, mas passamos uma noite encantadora compartilhando um vinho e zombando dessas superstições simplórias.\n\nSe não se pode dizer a que humor ela afeta, não se pode afirmar que funcione! Ah, os plebeus acreditam em qualquer coisa…"
 seduce_ongoing.2008.a: "Me diverti tanto com [owner.GetFirstNameNoTooltip]!"
 seduce_ongoing.2009.desc: "Levei a \"poção do amor\" até [target.GetFirstName] e [target.GetSheHe] ficou tão pasmad[target.Custom('ES_OA')] com a credulidade dos meus servos quanto eu!\n\nPassamos a noite discutindo superstições e crenças ridículas. Os plebeus acreditam em qualquer coisa!"
 seduce_ongoing.2009.a: "Foi uma noite muito agradável."
 seduce_ongoing.2010.desc: "[owner.GetFirstName] veio me ver com uma \"poção do amor\" adquirida por um de seus servos. Não achei interessante, mas [owner.GetFirstName] não parava de falar sobre isso e sobre como os plebeus são supersticiosos e ingênuos."
 seduce_ongoing.2010.a: "Se você não acredita, não me aborreça com isso!"
 seduce_ongoing.2011.desc: "A [target.GetFirstName] não ficou muito impressionado com a \"poção do amor\", e não tive mais sorte ao tentar falar das ridículas superstições camponesas. Na verdade, pareceu irritad[target.Custom('ES_OA')] com todo esse papo!"
 seduce_ongoing.2011.a: "Hoje deve estar incomumente fleumático[target.Custom('ES_OA')]."
 seduce_ongoing.3001.t: "Corações e Mentes"
 seduce_ongoing.3001.desc: "Foi-me dito que [target.GetFirstName] está muito próxim[target.Custom('ES_OA')] de seu/sua [target.Custom2('RelationToMe', SCOPE.sC('close_character'))], [close_character.GetTitledFirstName|l]. Se eu conquistar seu favor, talvez consiga chamar a atenção de [target.GetFirstName]."
 seduce_ongoing.3001.a: "Vou conseguir para [close_character.GetFirstNameNoTooltip] o que pedir."
 seduce_ongoing.3001.b: "Uma demonstração de boa vontade deve resolver."
 seduce_ongoing.3001.c: "Posso ajudar a pagar os empréstimos."
 seduce_ongoing.3001.d: "Certamente qualquer um se sentiria abençoado com um presente de ouro."
 seduce_ongoing.3001.e: "Isso não parece certo."
 seduce_ongoing.3001.e.tt: "#F Encontraré otros modos de ganarme el afecto de [target.GetFirstNameNoTooltip].#!"
 seduce_ongoing.3002.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('close_character'))] [close_character.GetTitledFirstName|l] tem me contado ultimamente o quanto ficou impressionado com a generosidade de [owner.GetTitledFirstName|l].\n\nAo que parece, [owner.Custom('ES_ElElla')] veio em seu auxílio quando mais precisava."
 seduce_ongoing.3002.a: "Talvez eu tenha subestimado [owner.GetHerHim]?"
 seduce_ongoing.3002.b: "[owner.GetFirstNameNoTooltip] ajudando a [close_character.GetFirstNameNoTooltip]? Impressionante, de certa forma."
 seduce_ongoing.3003.desc: "Na próxima vez que nos vemos, [target.GetFirstName] me recebe com um sorriso mais amplo do que o habitual.\n\n\"Meu [target.Custom2('RelationToMe', SCOPE.sC('close_character'))] [close_character.GetFirstName] me contou que [close_character.GetHerHim] ajudaste e queria agradecer-lhe.\""
 seduce_ongoing.3003.a: "Qualquer coisa por um[close_character.Custom('ES_XA')] [target.Custom2('RelationToMe', SCOPE.sC('close_character'))] de [target.GetFirstNameNoTooltip]."
 seduce_ongoing.3004.desc: "Parece que [target.GetFirstName] não percebeu minha generosidade para com seu [target.Custom2('RelationToMe', SCOPE.sC('close_character'))]. Ao menos [close_character.GetFirstName] é agradecid[close_character.Custom('ES_OA')].!"
 seduce_ongoing.3004.a: "O que será preciso?"
 seduce_ongoing.4001.t: "Dedicação de [target.Custom('MusicalPerformer')]"
 seduce_ongoing.4001.desc: "Um [target.Custom('MusicalPerformer')] se apresentará em breve para a corte em [court_location.GetNameNoTier]. Seria um pedido simples fazer com que mudasse a apresentação para que fosse uma dedicatória a [target.GetFirstName], o alvo do meu afeto."
 seduce_ongoing.4001.desc.court_musician: "Um[dummy_musician_gender.Custom('ES_XA')] [target.Custom('MusicalPerformer')] se apresentará em breve para a corte de [court_location.GetNameNoTier]. Eu poderia simplesmente pedir que ele mudasse sua apresentação para dedicá-la a [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l], o alvo do meu afeto.\n\nPor outro lado, se eu pedir ao meu [GetCourtPositionType('court_physician_court_position').GetName()|l] [court_musician.GetName] que se junte a mim, poderia fazê-lo tocar peças que me deixem em boa posição diante do público de lá."
 seduce_ongoing.4001.a: "Será uma declaração ousada para [target.GetLadyLord]!"
 seduce_ongoing.4001.b: "Prefiro alusões veladas ao meu desejo por [target.Custom('ES_ElElla')]."
 seduce_ongoing.4001.b.failure: "A dedicação passou despercebida"
 seduce_ongoing.4001.c: "As pessoas em [court_location.GetNameNoTierNoTooltip] se regozijarão em minha glória!"
 seduce_ongoing.4001.d: "Eu não deveria me envolver em coisas assim."
 seduce_ongoing.4002.desc.opening: "Há sempre artistas se apresentando na corte, mas desta vez nos prometeram algo especial, e certamente tivemos."
 seduce_ongoing.4002.desc: "\n\nQuando o [ROOT.Char.Custom('MusicalPerformer')] começa mais uma estrofe, tento disfarçar o quão lisonjead[ROOT.Char.Custom('ES_OA')] que me sinto com esta dedicatória diante de toda a corte."
 seduce_ongoing.4002.desc.court_musician: "\n\nQuando [dummy_musician_gender.Custom('ES_ElLa')] [ROOT.Char.Custom('MusicalPerformer')] e [court_musician.GetName], [GetCourtPositionType('court_physician_court_position').GetName()|l] [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l], começam mais uma estrofe, tento não demonstrar admiração demais ao ouvir as proezas de [owner.GetFirstNameNoTooltip]."
 seduce_ongoing.4002.a: "[owner.GetTitledFirstNameNoTooltip|l] sem dúvida superou a si mesm[owner.Custom('ES_OA')]."
 seduce_ongoing.4003.desc: "\n\nQuando o [ROOT.Char.Custom('MusicalPerformer')] começa mais uma estrofe, saio do salão envergonhad[ROOT.Char.Custom('ES_OA')]! [owner.GetFirstName] me dedicou todas e cada uma das canções!"
 seduce_ongoing.4003.desc.court_musician: "\n\nQuando [dummy_musician_gender.Custom('ES_ElLa')] [ROOT.Char.Custom('MusicalPerformer')] e [court_musician.GetName], [GetCourtPositionType('court_physician_court_position').GetName()|l] [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l], começam mais uma estrofe, eu saio do salão envergonhad[ROOT.Char.Custom('ES_OA')]. Será que [owner.GetFirstNameNoTooltip] mandou seu próprio [GetCourtPositionType('court_physician_court_position').GetName()|l] só para ficar se gabando de si mesm[owner.Custom('ES_OA')]?!"
 seduce_ongoing.4003.a: "Que audácia!"
 seduce_ongoing.4004.desc: "Obrigado pelo vosso presente musical. A apresentação de um [target.Custom('MusicalPerformer')] foi muito apreciada! Sempre soube que você era uma [ROOT.Char.GetWomanMan] de gosto impecável."
 seduce_ongoing.4004.a: "Perfeito!"
 seduce_ongoing.4005.opening: "[target.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 seduce_ongoing.4005.desc.court_musician: "Escrevo para dizer o quanto você fez de tolo de si mesmo forçando a audiência a ouvir suas supostas façanhas. Você realmente acredita que falar de si mesmo é uma boa forma de entreter a corte?"
 seduce_ongoing.4005.desc: "Como ousa me envergonhar em público desse jeito?! Você #EMP queria#! que eu tivesse que explicar o que significavam as palavras d[target.Custom('ES_DelDela')] [target.Custom('MusicalPerformer')] a..."
 seduce_ongoing.4005.spouse: "meu/minha [target.Custom2('RelationToMe', SCOPE.sC('spouse'))]?"
 seduce_ongoing.4005.court: "toda a corte?"
 seduce_ongoing.4005.a: "Isso não era o que eu queria!"
 seduce_ongoing.4006.desc: "O [ROOT.Char.Custom('MusicalPerformer')] continua entoando versos de amor e desejo, e eu tento disfarçar o quanto me sinto lisonjead[ROOT.Char.Custom('ES_OA')].\n\nEmbora se esconda atrás de metáforas e alegorias, sei que é uma dedicatória de [owner.GetFirstName] para mim."
 seduce_ongoing.4006.a: "Você sabe como chamar minha atenção, [owner.GetFirstNameNoTooltip]."
 seduce_ongoing.4007.desc: "Talvez a dedicação para [target.GetLadyLord] [target.GetFirstName] tenha sido sutil demais… pois parece não ter percebido."
 seduce_ongoing.4007.a: "Que desperdício de esforço."
 seduce_ongoing.4011.t: "Um Passeio em [court_location.GetNameNoTierNoTooltip]"
 seduce_ongoing.4011.desc: "Pode parecer arriscado, mas eu estava pensando em convidar [target.GetFirstName] para cavalgar comigo pela [court_location.Custom('BaronyTownType')] de [court_location.GetNameNoTier]."
 seduce_ongoing.4011.a: "Um passeio pela rua do mercado, para que todos vejam!"
 seduce_ongoing.4011.b: "Vamos ficar pelas vielas. Quem precisa da companhia dos outros?"
 seduce_ongoing.4011.b.failure: "Não consigo impressionar [target.GetFirstNameNoTooltip]"
 seduce_ongoing.4011.c: "Talvez não devêssemos fazer isso."
 seduce_ongoing.4011.c.tt: "#F Posso esperar por outras oportunidades!#!"
 seduce_ongoing.4012.opening: "Fiquei um pouco surpreso quando [owner.GetFirstName] me convidou para cavalgar pelo/pela [court_location.Custom('BaronyTownType')] de [court_location.GetNameNoTier]."
 seduce_ongoing.4012.end: "\n\nAcabou sendo um dia agradável, enquanto andávamos pela rua do mercado, conversando sobre diversos assuntos enquanto os comerciantes ofereciam suas mercadorias aos camponeses que olhavam admirados para nosso séquito reluzente de armaduras."
 seduce_ongoing.4012.a: "Certamente causamos uma boa impressão."
 seduce_ongoing.4013.end: "\n\nMinhas dúvidas aumentaram quando [owner.GetSheHe] insistiu em cavalgar pela rua do mercado. Entre nosso séquito pomposo e a falta de conversa, ficou claro que só estava tentando se exibir. Eu teria ido embora se isso não tivesse causado uma cena."
 seduce_ongoing.4013.a: "Vamos evitar fazer isso novamente."
 seduce_ongoing.4014.desc: "Querid[owner.Custom('ES_OA')] [owner.GetFirstName]:\n\nFoi um prazer genuíno desfrutar da sua companhia em [court_location.Custom('BaronyTownType')] de [court_location.GetNameNoTier] e espero voltar a vê-lo em breve."
 seduce_ongoing.4014.a: "O prazer foi todo meu."
 seduce_ongoing.4015.desc: "[target.GetFirstName],\n\nVocê queria me envergonhar em público? Me exibir como algum troféu ridículo... Você sabe o que estão dizendo na corte?"
 seduce_ongoing.4015.a: "Não era isso que eu queria dizer!"
 seduce_ongoing.4016.end: "\n\nPassamos por uma infinidade de vielas, rindo com a surpresa dos camponeses enquanto nosso séquito passava. No final do dia, eu conhecia melhor o [court_location.Custom('BaronyTownType')] do que jamais imaginaria."
 seduce_ongoing.4016.a: "[target.GetFirstNameNoTooltip] me faz enxergar tantas perspectivas novas."
 seduce_ongoing.4017.desc: "Querido[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitledFirstName|l]:\n\nObrigado por me acompanhar em minha visita a [court_location.Custom('BaronyTownType')] de [court_location.GetNameNoTier], embora sua insistência em ficar pelos becos e longe dos olhos tenha me deixado completamente confuso. Talvez você possa me explicar em outra ocasião."
 seduce_ongoing.4017.a: "Ficamos... só nós dois, nós—"
 seduce_ongoing.4018.desc: "Querid[owner.Custom('ES_OA')] [owner.GetFirstName]:\n\nDiverti-me muito com a sua visita a [court_location.GetNameNoTier]. Agora conheço partes do(a) [court_location.Custom('BaronyTownType')] que nunca pensei que veria!"
 seduce_ongoing.4018.a: "O prazer foi todo meu."
 seduce_ongoing.4101.t: "O Balcão de Meu Amado"
 seduce_ongoing.4101.desc_opening: "As janelas de [target.GetFirstName] estão iluminadas por um brilho acolhedor. Mesmo do chão, consigo ver movimento lá dentro.\n\n"
 seduce_ongoing.4101.desc_same_court: "O pulso me retumba forte nos ouvidos. Embora eu esteja em meu próprio/a [ROOT.Char.Custom('ResidenceBuilding')], piso em terreno novo quando busco seu desejo."
 seduce_ongoing.4101.desc_other_court: "Meu pulso ecoa com força nos ouvidos. Buscar a chance de dormir com [target.Custom('ES_ElElla')] e visitar [court_location.GetNameNoTier] me colocou em apuros."
 seduce_ongoing.4101.a: "[target.GetFirstNameNoTooltip]! Olhe lá fora e ilumine minha noite!"
 seduce_ongoing.4101.a.tt: "#F Intento llamar su atención de una manera discreta#!"
 seduce_ongoing.4101.b: "Eu subo."
 seduce_ongoing.4101.b.tt: "#F Com certeza [target.GetSheHe] ficará feliz em me ver!#!"
 seduce_ongoing.4101.c: "Vou deixar [SCOPE.Custom('SeductionObjectIndefinite')] para [target.GetSheHe] encontrar, junto com um bilhete."
 seduce_ongoing.4101.c.tt: "#F Seguro que apreciará el gesto sutil y lo que [target.GetSheHe] significa para mí#!"
 seduce_ongoing.4101.d: "Melhor eu ir embora antes que alguém me veja."
 seduce_ongoing.4101.d.tt: "#F Não me aproximarei de [target.GetHerHim] como um ladrão na noite!#!"
 seduce_ongoing.4102.t: "Abaixo do Meu Balcão"
 seduce_ongoing.4102.desc: "Retirei-me para meus aposentos para passar a noite, mas me surpreende ouvir uma voz abafada que vem de fora. Parece suspeitosamente ser a de [owner.GetFirstName].\n\n\"[ROOT.Char.GetTitledFirstNameNoTooltip|l], imploro-vos, deixai-me ver vosso belo semblante!\"."
 seduce_ongoing.4102.a: "É como algo saído de um conto, que romântico!"
 seduce_ongoing.4102.b: "Para eu ser submetid[ROOT.Char.Custom('ES_OA')] ao horror da sua? Não."
 seduce_ongoing.4103.desc: "Quando a luz da porta aberta de [target.GetFirstName] se derrama pela varanda, ela também se derrama no meu coração.\n\nO manto da escuridão que nos cerca confere à nossa conversa um estranho ar de liberdade e, embora eu tenha permanecido no chão, nunca antes estivemos tão íntimos."
 seduce_ongoing.4103.a: "Oh [target.GetFirstNameNoTooltip], você é o sol em minha noite!"
 seduce_ongoing.4104.desc: "Quando a luz da porta aberta de [target.GetFirstName] se derrama sobre a varanda, também se derrama sobre o meu coração.\n\nMas ela se desvanece quando vejo sua careta [target.Custom('quirk_neg_adjective')] ao falar. \"O que vocês estão fazendo aqui, [ROOT.Char.GetTitledFirstNameNoTooltip]? Por favor, deixem-me em paz\"."
 seduce_ongoing.4104.a: "Mas... Você é o sol em minha noite escura...!"
 seduce_ongoing.4105.desc: "#EMP Cielos!#!\n\nAo me recolher aos meus aposentos para passar a noite, de repente me encontro cara a cara com alguém do lado de fora da minha janela. Um[owner.Custom('ES_XA')] [owner.GetWomanMan] que se parece suspeitosamente [owner.Custom('ES_AlAla')][owner.GetTitledFirstName|l]."
 seduce_ongoing.4105.a: "Ah! Entre, seu tont[owner.Custom('ES_OA')]!"
 seduce_ongoing.4105.b: "Tenho sorte de minhas cortinas serem tão grossas."
 seduce_ongoing.4105.c: "Guardas! Me ajudem, guardas!"
 seduce_ongoing.4106.desc: "Assim que chego ao balcão de [target.GetFirstName], [target.GetSheHe] sai rindo. \"Por que vocês fariam uma façanha dessas, [ROOT.Char.GetFirstNameNoTooltip]? Usem a porta como uma pessoa normal. Vocês agem como se tivessem intenções que querem manter em segredo\".\n\nA alegria brincalhona em seus olhos faz tudo valer a pena."
 seduce_ongoing.4106.a: "Nenhuma barreira pode me impedir de chegar até você!"
 seduce_ongoing.4107.desc_paranoid: "Assim que alcanço a varanda de [target.GetFirstName], começa a gritar para seus guardas. \"Socorro, um intruso!\".\n\nSua voz me persegue enquanto saio correndo e tropeço até o chão no último instante antes de desaparecer na escuridão da noite."
 seduce_ongoing.4107.desc: "Assim que chego à varanda de [target.GetFirstName], [target.GetSheHe] sai com uma expressão [target.Custom('quirk_neg_adjective')] no rosto.\n\n“Que bobagem é essa, [ROOT.Char.GetFirstNameNoTooltip]? Você não pode… Você é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName]! Isto não é apropriado.”"
 seduce_ongoing.4107.a: "Isso poderia ter sido melhor..."
 seduce_ongoing.4107.a.tt: "#F Eu deveria saber que não era boa ideia me aproximar furtivamente de um[target.Custom('ES_XA')] [target.GetWomanMan] tão paranoic[target.Custom('ES_OA')]!#!"
 seduce_ongoing.4108.desc: "Retiro-me aos meus aposentos para passar a noite e sou surpreendido pelo som de um seixo contra a minha janela. Olhando para o escuro jardim, vejo [SCOPE.Custom('SeductionObjectIndefinite')] no chão, envolto em um bilhete. Distingo um[owner.Custom('ES_XA')] [owner.GetWomanMan] que se parece com [owner.GetFirstName] e que desaparece na noite.\n\n#EMP Para [ROOT.Char.Custom2('ComplimentAdjective', ROOT.Char)] [ROOT.Char.GetTitledFirstNameNoTooltip|l], como muestra de mis sentimientos.#!"
 seduce_ongoing.4108.a: "Deixarei [SCOPE.Custom('SeductionObjectIndefinite')] para que [owner.Custom('ES_ElElla')] encontre a surpresa!"
 seduce_ongoing.4108.b: "O que eu devo fazer com isso? Vender talvez!"
 seduce_ongoing.4109.desc: "Dois [SCOPE.Custom('SeductionObjectMultiple')] me esperam em meus aposentos. Não há nenhuma nota ou saudação, mas juraria que ainda consigo sentir no ar o doce aroma [target.Custom('ES_DelDela')] [ROOT.Char.Custom2('ComplimentAdjective', SCOPE.sC('target'))] [target.GetFirstName]!"
 seduce_ongoing.4109.a: "Ah, [target.GetFirstNameNoTooltip]!"
 seduce_ongoing.4110.desc: "Como os dias passam sem resposta de parte de [target.GetFirstName], decido tentar a sorte mais uma vez… e se ele/ela nunca tiver visto o presente em primeiro lugar?\n\nAh, como minha esperança morreu rápido ao encontrar a [SCOPE.Custom('SeductionObject')] debaixo da janela dele/dela, com a marca de um salto ainda visível na lama."
 seduce_ongoing.4110.a: "Meu coração está tão partido quanto o [SCOPE.Custom('SeductionObject')]!"
 seduce_ongoing.5001.t_rival: "M [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('target'))] Rival"
 seduce_ongoing.5001.t: "[target.GetWomanMan] [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('target'))]"
 seduce_ongoing.5001.desc_tier_up: "\"A que devo este prazer, meu #EMP [ROOT.Char.GetTitleTierName]#!?\", pergunta [target.GetFirstName] com um sorriso que nem chega perto de seus olhos."
 seduce_ongoing.5001.desc_tier_down: "\"Será que nunca vai me deixar em paz ess[ROOT.Char.Custom('ES_EA')] [target.Custom2('RelationDescriptor', ROOT.Char)] [ROOT.Char.GetWomanMan]...?\", murmura [target.GetFirstName] entre dentes quando me aproximo. \"O que posso fazer por você, [ROOT.Char.GetTitledFirstNameNoTooltip]?\""
 seduce_ongoing.5001.desc_ending: "\n\nAs hostilidades entre nós continuam como sempre, mas eu tenho um plano de como domar os sentimentos tempestuosos que abrigamos um pelo outro..."
 seduce_ongoing.5001.a: "O que você pensa sobre o assunto de [ROOT.GetCharacter.Custom('education_conversation_subject')]?"
 seduce_ongoing.5001.a.tt: "#F Apelo ao lado intelectual de [target.GetFirstNameNoTooltip]#!"
 seduce_ongoing.5001.b: "Sobre [mocked_courtier.Custom('ES_ElLa')] [mocked_courtier.Custom2('InsultNoun', ROOT.Char)] [mocked_courtier.GetFirstNameNoTooltip]…"
 seduce_ongoing.5001.b.tt: "#F Apelo ao lado malicioso de [target.GetFirstNameNoTooltip], zombando de [mocked_courtier.GetTitledFirstNameNoTooltip|l] junt[target.Custom('ES_OA')]s#!"
 seduce_ongoing.5001.c_tier_down: "A questão é o que posso #EMP yo#! fazer por #EMP vos#!, minha [target.GetLadyLord]."
 seduce_ongoing.5001.c_tier_up: "O prazer é todo meu, meu [target.GetLadyLord]. Deveríamos resolver isso."
 seduce_ongoing.5001.c.tt: "#F Apelo ao lado luxurioso de [target.GetFirstNameNoTooltip]#!"
 seduce_ongoing.5001.d: "Perdoe a intromissão, eu já estava de saída."
 seduce_ongoing.5003.t: "Minha Rival [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('owner'))]"
 seduce_ongoing.5003.opening: "A cada passo que [owner.GetFirstName] dá em minha direção, meu humor piora mais. O que quer ess[owner.Custom('ES_EA')] [owner.Custom2('InsultNoun', ROOT.Char)] agora?\n\n"
 seduce_ongoing.5003.conversation: "Para minha surpresa, [owner.GetSheHe] entabulou comigo uma discussão sobre [ROOT.GetCharacter.Custom('education_conversation_subject')] e, apesar das minhas reservas iniciais sobre sua companhia, foi muito interessante!"
 seduce_ongoing.5003.mockery: "\"[ROOT.Char.GetTitledFirstNameNoTooltip]! Vocês não vão acreditar no que esse [mocked_courtier.Custom2('InsultNoun', SCOPE.sC('owner'))] de [mocked_courtier.GetFirstName] fez hoje!\".\nPara minha surpresa, tivemos uma conversa bastante agradável sobre os muitos defeitos de [mocked_courtier.GetFirstName]."
 seduce_ongoing.5003.bodily: "Nada pôde me preparar para a tentação de sua pele nua quando [owner.GetFirstName] se despiu de sua [owner.Custom('GetUpperClothingArticle')]."
 seduce_ongoing.5003.fallback: "Para minha surpresa, passamos uma noite bastante agradável juntos, rindo de assuntos banais e caminhando pelos jardins."
 seduce_ongoing.5003.a: "Nunca pensei antes que [owner.GetSheHe] fosse tão #EMP agradable#!!"
 seduce_ongoing.5004.opening: "A cada passo que [owner.GetFirstName] vem na minha direção, meu humor piora. O que quer ess[owner.Custom('ES_EA')] [owner.Custom2('InsultNoun', ROOT.Char)] agora?\n\n"
 seduce_ongoing.5004.conversation: "\"Sobre o assunto de [owner.Custom('education_conversation_subject')]...\"\n\nNão sei por que [owner.GetSheHe] imaginou que eu estaria interessado no assunto, mas logo deixei claro, sem sombra de dúvidas, que eu não estava."
 seduce_ongoing.5004.mockery: "\"[ROOT.Char.GetTitledFirstNameNoTooltip]! Você não vai acreditar no que tal [mocked_courtier.Custom2('InsultNoun', SCOPE.sC('owner'))] de [mocked_courtier.GetFirstName] fez hoje!\".\n\nNão consigo imaginar o que [owner.GetHerHim] possuiu para difamar [mocked_courtier.GetFirstName] na minha frente, mas não se calava!"
 seduce_ongoing.5004.bodily: "À medida que [owner.GetSheHe] se aproxima desconfortavelmente de mim e começa a puxar sugestivamente [owner.Custom('GetUpperClothingArticle')], eu rapidamente me afasto."
 seduce_ongoing.5004.fallback: "Ao que parece, a [owner.GetSheHe] teve a ideia de passar o dia comigo, pois se recusou a sair antes que eu deixasse claro o quanto eu detestava a presença dele."
 seduce_ongoing.5004.a: "Tão desagradável quanto sempre!"
 seduce_ongoing.5005.conversation: "O sorriso de [target.GetFirstName] se ilumina ao final de uma longa conversa sobre [target.Custom('herhis_subject_of_interest')]. Quando um silêncio nada incômodo se instala, percebo que estamos muito mais próximos do que antes; minha mão quase toca sua [target.Custom('GetClothingArticle')]."
 seduce_ongoing.5005.mockery: "\"… e a maneira como [mocked_courtier.Custom('quirk_neg_present')]… Nunca vi nada parecido!\".\n\nAs risadas que compartilhamos às custas de [mocked_courtier.GetFirstName] são mais sinceras do que eu esperava. Quando um silêncio nada incômodo se instala, percebo que estamos muito mais perto do que antes e minha mão quase roça sua [target.Custom('GetClothingArticle')]."
 seduce_ongoing.5005.bodily: "Só me é permitido provar um pequeno pouco do que [target.GetFirstName] tem a oferecer, mas isso me deixa com vontade de mais. Um silêncio amigável se instala entre nós quando nos afastamos, e percebo que [target.GetSheHe] está mais relaxad[target.Custom('ES_OA')] do que nunca na minha companhia… apesar do [target.Custom('GetUpperClothingArticle')] que acaba fora do lugar."
 seduce_ongoing.5005.fallback: "Passamos a noite juntos, conversando e rindo. Enquanto um silêncio amigável se instaura entre nós, percebo que estamos ficando muito mais próximos; minha mão quase toca [target.Custom('GetClothingArticle')]."
 seduce_ongoing.5005.ending: "\n\n\"Eu nunca soube que você era uma tão boa companhia, [ROOT.Char.GetFirstNameNoTooltip]!\""
 seduce_ongoing.5005.a: "Vou lhe mostrar o quão boa companhia posso ser!"
 seduce_ongoing.5006.conversation: "Depois de quase uma hora de conversa constrangedora, [target.GetFirstName] parece mais entediad[target.Custom('ES_OA')] do que nunca. Quando mudo o assunto de [target.Custom('herhis_subject_of_interest')] para [ROOT.GetCharacter.Custom('education_conversation_subject')], [target.Custom('ES_ElElla')] [target.Custom('quirk_neg_present')] e se desculpa."
 seduce_ongoing.5006.mockery: "\"[ROOT.Char.GetTitledFirstNameNoTooltip]! Você acredita que essa [mocked_courtier.Custom2('InsultNoun', ROOT.Char)] de [mocked_courtier.GetFirstName] realmente…?\".\n\nEu rapidamente me calo quando o desdém no rosto de [target.GetFirstName] se acentua cada vez mais."
 seduce_ongoing.5006.bodily: "Ao me aproximar de [target.GetFirstName], sorrindo [ROOT.Char.Custom('quirk_pos_adverb')] e levantando sugestivamente minha [ROOT.Char.Custom('GetUpperClothingArticle')], [target.GetSheHe] rapidamente recua com uma expressão de puro desgosto."
 seduce_ongoing.5006.fallback: "Fico sem jeito, tentando encontrar algum ponto em comum com [target.GetFirstName], mas o desdém dela se torna mais pronunciado a cada minuto que passa.\n\nLogo em seguida, ela se desculpa e foge da minha companhia."
 seduce_ongoing.5006.a: "Por que estou tentando me deitar com um(a) tão [target.Custom2('InsultNounSexual', ROOT.Char)]?!"
 seduce_ongoing.5011.t: "Atrações Irritantes"
 seduce_ongoing.5011.desc: "Pouca gente consegue me provocar como [target.GetFirstName]. Assim que estamos a sós, [target.GetSheHe] me lança insultos e mete as mãos em mim. É claro que eu retribuo na mesma moeda.\n\nDevo admitir que a emoção disso (tanto a luta quanto a proximidade de outro corpo suado e arfante) é suficiente para incendiar meu sangue. Em breve, já não consigo dizer se estou de fato tentando vencer[target.Custom('ES_LoLa')] ou apenas prolongando a altercação…"
 seduce_ongoing.5011.a: "Vou garantir que o rosto perca seu sorriso [target.Custom('quirk_neg_adjective')]!"
 seduce_ongoing.5011.b: "Posso ajudar você a se levantar?"
 seduce_ongoing.5011.c: "O próximo golpe vai fazer sangue."
 seduce_ongoing.5011.c.tt: "#F A dor que suporto por amor!#!\nEssa opção está disponível devido ao traço Sadista de [target.GetFirstNameNoTooltip]\n\n"
 seduce_ongoing.5011.d: "Brigar como crianças não pode ser o caminho para o coração!"
 seduce_ongoing.5012.desc: "Poucos podem me provocar como [target.GetFirstName]. Assim que ficamos a sós, logo partimos para os insultos e para as agressões.\n\nDevo admitir que a empolgação disso — tanto a luta quanto a proximidade de outro corpo suado e ofegante — é suficiente para fazer meu sangue ferver, e [owner.GetSheHe] não mostra sinais de ceder."
 seduce_ongoing.5012.a: "É bom que [owner.GetSheHe] não pegue leve[owner.Custom('ES_OA')] comigo!"
 seduce_ongoing.5012.b: "Chega! Deixe-me em paz."
 seduce_ongoing.5013.desc: "[target.GetFirstName] e eu acabamos no chão, brigando como [target.Custom('GirlsBoysChildren')]. Nossos resmungos logo se transformam em sorrisos, nossos punhos em carícias, os juramentos em gemidos…\n\nNão sei se [target.GetSheHe] nota que prolongo o abraço mais do que o necessário, mas não parece se importar."
 seduce_ongoing.5013.a: "É bom extravasar um pouco!"
 seduce_ongoing.5014.desc: "[target.GetFirstName] e eu acabamos no chão, brigando como [target.Custom('GirlsBoysChildren')] e seu cenho franzido logo se transforma em uma careta.\n\n\"Afrouxa, brutamontes!\""
 seduce_ongoing.5014.a: "Isso foi desafortunado."
 seduce_ongoing.5015.desc: "Poucos podem me provocar como [target.GetFirstName]. Assim que ficamos a sós, logo trocamos insultos e mão.\n\nDevo admitir que fiquei surpreso quando [owner.GetSheHe] me estendeu a mão, oferecendo-se para me ajudar a levantar."
 seduce_ongoing.5015.a: "Obrigado, [owner.GetFirstNameNoTooltip]."
 seduce_ongoing.5015.b: "Quem ele/ela pensa que é?!"
 seduce_ongoing.5016.desc: "[target.GetFirstName] e eu acabamos no chão, brigando como pequenas [target.Custom('GirlsBoysChildren')] pequenas, e logo nossas caretas se transformam em sorrisos.\n\nQuando lhe ofereço uma mão para se levantar, [target.GetSheHe] a aceita e acena em agradecimento."
 seduce_ongoing.5017.desc: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] e eu acabamos no chão brigando como [target.Custom('GirlsBoysChildren')] e logo sua cara fechada se transforma em uma careta que se intensifica quando me levanto diante de [target.Custom('ES_ElElla')].\n\n\"Vocês nem me ajudam a levantar... Eu não deveria ter esperado outra coisa de semelhante [owner.Custom2('InsultNoun', ROOT.Char)]!\"."
 seduce_ongoing.5018.desc: "Poucos podem me provocar como [owner.GetFirstName]. Assim que ficamos a sós, logo trocamos insultos e partimos para a agressão.\n\nDepois de uma breve hesitação da parte de [owner.GetHerHis], ganho vantagem na altercação, e não consigo deixar de gostar de ter [owner.GetHerHim] à minha mercê desse jeito, ofegante e submiss[owner.Custom('ES_OA')]."
 seduce_ongoing.5018.a: "Ajoelhar-se diante de mim combina com você!"
 seduce_ongoing.5018.b: "Isso é patético. Deixe-me em paz."
 seduce_ongoing.5019.desc: "[target.GetFirstName] se ergue diante de mim e não consigo impedir que um arrepio de medo percorra minha espinha ao ver o prazer em seus olhos. Ao menos parece que [target.GetSheHe] apreciou o gesto…"
 seduce_ongoing.5019.a: "Esse calafrio foi de antecipação! V-véritable!"
 seduce_ongoing.5020.desc: "[target.GetFirstName] se ergue diante de mim e não consigo impedir que um arrepio de medo percorra minha espinha ao ver o prazer em seus olhos. Quando se afasta com uma careta de nojo, sinto alívio e decepção ao mesmo tempo.\n\n\"Nunca conseguirás me agradar. Deixe-me em paz, [ROOT.Char.GetFirstNameNoTooltip]\"."
 seduce_ongoing.5020.a: "Isso poderia ter sido melhor... Mas também pior!"
 seduce_ongoing.5101.t: "Obrigações e Desejos"
 seduce_ongoing.5101.desc: "[target.GetFirstName] costuma falar comigo de uma forma que deixa claro que a distância entre nós.\n\nPreciso que entenda que [target.Custom('ES_LoLa')] desejo de uma forma que vai além do meu vassalo. Anseio pelo seu calor, pelo seu toque e por esses lábios deliciosos."
 seduce_ongoing.5101.a: "Somos iguais perante [ROOT.Char.GetFaith.HighGodNameAlternate], [target.GetFirstNameNoTooltip]!"
 seduce_ongoing.5101.a.tt: "#F Enfatizo nossas semelhanças#!"
 seduce_ongoing.5101.success_tt: "Se [target.GetFirstNameNoTooltip] responder positivamente:"
 seduce_ongoing.5101.b: "Existem mais maneiras de você me servir, [target.GetFirstNameNoTooltip]..."
 seduce_ongoing.5101.b.tt: "#F Recalco mi poder#!"
 seduce_ongoing.5101.c: "Devo guardar meus sentimentos por enquanto."
 seduce_ongoing.5101.c.tt: "#F Seguramente haya mejores modos de hacérselo saber.#!"
 seduce_ongoing.5102.desc: "\"Embora eu seja teu [owner.GetTitleTierName], sempre nos vi como iguais\". Meu senhor[owner.Custom('ES_XA')], [owner.GetTitleTierName], veio me ver e, embora no início eu não saiba ao certo por quê, logo fica claro. \"Você e eu… isto… não precisamos nos prender aos títulos. Somos mais do que meros nomes. Muito mais\"."
 seduce_ongoing.5102.a: "A atenção do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] é lisonjeira."
 seduce_ongoing.5102.b: "Não quero mais do que já temos."
 seduce_ongoing.5103.desc: "Querid[target.Custom('ES_OA')] [target.Custom2('RelationToMe', ROOT.Char)], [ROOT.Char.GetTitledFirstName|l]:\nFico lisonjead[ROOT.Char.Custom('ES_OA')] ao ouvi-lo nos descrever não apenas como senhor[target.Custom('ES_XA')] e vassal[ROOT.Char.Custom('ES_OA')] mas também como iguais em muitos aspectos. Que possamos compartilhar um futuro igualmente brilhante para ambos."
 seduce_ongoing.5103.a: "[target.GetFirstNameNoTooltip], eu ainda hei de tê-l!"
 seduce_ongoing.5104.desc: "[owner.GetFirstName], m [target.Custom2('RelationToMe', SCOPE.sC('owner'))]!\nO que você insinua, o que você pede, é muito inadequado! Eu tenho minhas obrigações de servidão ao reino, mas não confunda minha lealdade com desejo."
 seduce_ongoing.5104.a: "Ah, mas [target.GetFirstNameNoTooltip]..."
 seduce_ongoing.5105.desc: "Você sempre me serviu tão bem, com tanta lealdade. Meu [owner.Custom('ES_SennorSennora')], [owner.GetFirstName], vem me ver e, embora a princípio eu não esteja segur[ROOT.Char.Custom('ES_OA')] ado do motivo, logo fica claro. Desejo você não apenas como vassal[ROOT.Char.Custom('ES_OA')], mas como [target.GetWomanMan]. Sirva também assim ao seu [owner.GetLadyLord]!"
 seduce_ongoing.5105.a: "Posso cuidar de você de maneiras que ninguém mais pode."
 seduce_ongoing.5105.b: "Você tem minhas obrigações, mas nunca terá mais."
 seduce_ongoing.5106.desc: "Meu querid[target.Custom('ES_OA')] [target.Custom2('RelationToMe', ROOT.Char)], [ROOT.Char.GetTitledFirstName|l]:\nFico lisonjeado por, eu, vosso humilde súdit[ROOT.Char.Custom('ES_OA')] humilde súdit[ROOT.Char.Custom('ES_OA')], possa inspirar-vos desta maneira. Vejamos aonde o tempo nos leva."
 seduce_ongoing.5201.t: "Mais do que Amigos"
 seduce_ongoing.5201.desc: "[target.GetFirstName] e eu percorremos a [court_location.Custom('BaronyTownType')] de [court_location.GetNameNoTier].\n\nAo chegarmos a uma praça com uma bela fonte, paramos para contemplar a agitada movimentação ao nosso redor, e nossa comitiva passa momentaneamente para segundo plano."
 seduce_ongoing.5201.a: "Vamos jogar uma moeda e fazer um desejo de romance!"
 seduce_ongoing.5201.a.tt: "Acho que [target.GetFirstName] já está fantasiando sobre o nosso futuro, ou pelo menos sobre um romance em geral"
 seduce_ongoing.5201.b: "Lembra daquela vez em que..."
 seduce_ongoing.5201.b.tt: "Acho que [target.GetFirstName] valoriza de verdade nossa amizade"
 seduce_ongoing.5201.c: "Não quero arriscar este momento."
 seduce_ongoing.5202.desc: "Enquanto meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] [SCOPE.sC('owner').GetFirstName] e eu passávamos pelo/a [court_location.Custom('BaronyTownType')] de [court_location.GetNameNoTier] nos deparamos com uma praça com uma bela fonte.\n\n\"Vamos jogar uma moeda juntos, [ROOT.Char.Custom('FormOfAddressForLiege')]? Dizem que isso traz romance…\"."
 seduce_ongoing.5202.a: "Vamos jogar três moedas, para dar mais sorte!"
 seduce_ongoing.5202.b: "Parece algo para um casal fazer, não para amigos."
 seduce_ongoing.5203.desc: "[target.GetFirstName] fica encantad[target.Custom('ES_OA')] ao meu lado. Joga uma moeda na água da fonte e me encara com um sorriso.\n\nO restante do passeio é tingido por um tom amigável trazido pelo desejo que compartilhamos."
 seduce_ongoing.5203.a: "[target.GetSheHe|U] é um[target.Custom('ES_XA')][target.GetWomanMan][target.Custom2('ComplimentAdjectiveArticle', ROOT.Char)]!"
 seduce_ongoing.5204.desc: "\"Que bobagem é essa, [ROOT.Char.GetFirstNameNoTooltip]?\".\n\n[target.GetFirstName] rejeita meu pedido de desejar um romance. O resto do passeio transcorre em um silêncio tenso, e logo nos despedimos."
 seduce_ongoing.5204.a: "Meu humor se tornou sombrio como as profundezas da fonte..."
 seduce_ongoing.5205.desc: "Enquanto meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] [owner.GetFirstName] e eu caminhamos pela [court_location.Custom('BaronyTownType')] de [court_location.GetNameNoTier], lembramos de tempos antigos.\n\n\"Lembra daquela vez em que passamos horas juntos até altas horas da noite, fazendo planos para o futuro, imaginando um futuro compartilhado...?\""
 seduce_ongoing.5205.a: "Como poderia esquecer?"
 seduce_ongoing.5205.b: "Por que menciona de novo aquela noite constrangedora?!"
 seduce_ongoing.5206.desc: "[target.GetFirstName] e eu passamos horas relembrando o passado e imaginando futuros hipotéticos juntos.\n\nO restante do passeio é tingido com um tom amigável, e não posso deixar de esperar que algumas de nossas teorias brincalhonas se tornem realidade."
 seduce_ongoing.5207.desc: "\"Você é um[ROOT.Char.Custom('ES_XA')] amig[ROOT.Char.Custom('ES_OA')] tão bom[ROOT.Char.Custom('ES_OA')], [ROOT.Char.GetFirstNameNoTooltip], tomara que isso nunca mude!\"\n\n[target.GetFirstName] deixa claro que não tem interesse em especular sobre o que poderíamos ter sido ou ainda poderíamos ser. Passamos o resto do passeio em um silêncio tenso e logo nos despedimos."
 seduce_ongoing.5207.a: "Bem, isso poderia ter corrido melhor!"
 seduce_ongoing.5301.t: "Um Momento a Sós"
 seduce_ongoing.5301.desc: "Ninguém estranharia eu me sentar com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] ao lado da lareira até altas horas da noite. Ainda assim, há tensão no ar.\n\nSó quero puxar[target.Custom('ES_LoLa')] para perto de mim e arrancar as roupas do corpo, mas se [target.GetSheHe] soubesse disso, ficaria horrorizad[target.Custom('ES_OA')] ou...?"
 seduce_ongoing.5301.a: "Uma mão na dele dirá tudo."
 seduce_ongoing.5301.a.tt: "#F Espero que mis señales sutiles sean bien recibidas#!"
 seduce_ongoing.5301.b: "Estamos sozinhos, e não negarei a mim mesmo seus lábios."
 seduce_ongoing.5301.b.tt: "#F Espero que este interés explícito sea bien recibido#!"
 seduce_ongoing.5301.c: "Seria uma pena terrível estragar uma noite maravilhosa."
 seduce_ongoing.5301.c.tt: "#F Ya habrá otras ocasiones. Mi [THIS.Char.Custom2('RelationToMe', SCOPE.sC('target'))] no se irá ninguna parte.#!"
 seduce_ongoing.5301.success_tt: "Se [target.GetFirstName] corresponder aos meus avanços:"
 seduce_ongoing.5302.desc: "Estou tão à vontade que, no começo, nem reparo, mas, quando nos sentamos em frente à lareira, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] [owner.GetFirstName] me agarra a mão com uma intensidade muito além da confiança de um[owner.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))].\n\nSinto que o desejo acelera o pulso dele."
 seduce_ongoing.5302.a: "Recuso-me a acreditar que o que sinto está errado."
 seduce_ongoing.5302.b: "Fico lisonjead com a atenção, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))], mas não."
 seduce_ongoing.5303.desc: "[target.GetFirstName] não vacila quando minha mão segura a de [target.GetHerHis], embora ambos saibamos o que isso significa. Posso sentir o pulso de [target.GetHerHis] acelerar enquanto nossa conversa continua. Minha palma sua e minha respiração fica curta antes de-\n#EMP O que foi isso?#! Ah, apenas um servo.\n\nMeu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] e eu nos desculpamos antes de partirmos. Separadamente."
 seduce_ongoing.5303.a: "Eu sei que você também sentiu isso, [target.GetFirstNameNoTooltip]."
 seduce_ongoing.5304.desc: "Tento fazer parecer uma brincadeira, mas [target.GetFirstName] interpretou corretamente minhas intenções.\n\n\"Um[target.Custom('ES_XA')] [target.Custom2('RelationToMe', SCOPE.sC('owner'))] não deveria... Isso nunca deveria acontecer!\". [target.GetSheHe|U] se vai, deixando-me sentad[ROOT.Char.Custom('ES_OA')] sozinh[ROOT.Char.Custom('ES_OA')] ao lado do fogo."
 seduce_ongoing.5304.a: "Eu sei, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))], mas mesmo assim..."
 seduce_ongoing.5305.desc: "Acontece tão de repente, e ainda assim não me surpreende. Em um momento estamos sentados junto à lareira, no próximo m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] se aproxima. Então seu lábios estão pressionados contra os meus, mãos acariciando meu pescoço, meus ombros, minhas coxas, minhas partes íntimas-\n\nO barulho de um criado se aproximando faz com que nos afastemos às pressas, e meus pensamentos rapidamente alcançam meu desejo."
 seduce_ongoing.5305.a: "Parece que finalmente as coisas estão certas."
 seduce_ongoing.5306.desc: "[target.GetFirstName] retorna meu beijo, e por alguns momentos palpitantes, tudo está certo no mundo. Claro que não pode durar, pois rapidamente nos afastamos antes que sejamos vistos por um criado que passa.\n\nQuando nos separamos para seguir caminhos diferentes, [target.GetSheHe] me olha. \"Eu não entendi completamente até agora, [target.Custom2('RelationToMe', SCOPE.sC('owner'))].\""
 seduce_ongoing.5306.a: "Você e eu, meu/minha querid[target.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))]."
 seduce_ongoing.5307.desc: "[target.GetFirstName] parece perdid[target.Custom('ES_OA')] no beijo enquanto minhas mãos percorrem seu corpo, buscando ansiosamente. Então, me empurra. \"O que você acha que está fazendo? Você é meu [target.Custom2('RelationToMe', SCOPE.sC('owner'))]!\".\n\nNão tenho nada a dizer nem como me explicar antes que [target.GetSheHe] saia correndo do quarto."
 seduce_ongoing.5307.a: "[target.GetFirstNameNoTooltip], eu realmente pensei que..."
 seduce_ongoing.6001.t: "Apenas Curiosidade"
 seduce_ongoing.6001.desc: "Ao visitar outras cortes, considero benéfico passar tempo com cortesãos para conhecer melhor seu senhor. Se for com [target.GetFirstName], tanto melhor.\n\n[target.GetSheHe|U] responde às minhas perguntas com diligência. Eu poderia passar o dia ouvindo[target.GetHerHim] e [target.GetSheHe] parece contente em conversar."
 seduce_ongoing.6001.a: "Seu[court_owner.Custom('ES_OA')] [target.Custom2('RelationToMe', SCOPE.sC('court_owner'))] é interessante, mas do que #EMP você#! gosta?"
 seduce_ongoing.6001.b: "Com certeza você vai mencionar a mim para [court_owner.GetFirstNameNoTooltip]?"
 seduce_ongoing.6011.t: "Uma Mostra de Força"
 seduce_ongoing.6011.desc: "Observo as tropas no pátio praticarem o exercício que lhes ordenei, repetidas vezes. Presto tanta atenção que não percebo que [target.GetFirstName] está ao meu lado.\n\n\"Eles se movem bem, mas aque[dummy_gender.Custom('ES_LLla')] está sempre meio passo atrás\"."
 seduce_ongoing.6011.a: "Impressionante! Temos mais em comum do que eu pensava."
 seduce_ongoing.6011.b: "Você tem um olhar aguçado!"
 seduce_ongoing.6011.c: "Uma tática diversionária. Vejamos o que acontece agora..."
 seduce_ongoing.6021.t: "Um Encontro de Mentes"
 seduce_ongoing.6021.desc: "Fiquei surpreso que [target.GetFirstName] e eu acabássemos envolvidos em uma conversa sobre assuntos militares, mas parece que [target.GetSheHe] gosta do tema quase tanto quanto eu. E também é incrivelmente bem informad[target.Custom('ES_OA')]!"
 seduce_ongoing.6021.a: "Por que [target.GetFirstNameNoTooltip], em todos os meus anos, nunca ouvi algo parecido!"
 seduce_ongoing.6021.b: "[target.GetFirstNameNoTooltip], eu nunca soube que tínhamos tanto em comum."
 seduce_ongoing.6021.c: "Me conte mais sobre suas ideias em formações de cavalaria..."
 seduce_ongoing.6031.t: "Uma Teia"
 seduce_ongoing.6031.desc: "Assim como eu, [target.GetFirstName] tem sua rede de espiões, alcançando o máximo possível todo tipo de conhecimento oculto. Eu poderia deixar que \"descubram\" minhas intenções em relação a [target.GetFirstName] e fazer com que [target.Custom('ES_ElElla')] ache que tem a vantagem."
 seduce_ongoing.6031.a: "Eu também vou fazer com que eles saibam que eu sei que eles sabem..."
 seduce_ongoing.6031.b: "Vou garantir que os espiões encontrem #EMP algo de interesse.#!"
 seduce_ongoing.6031.c: "Oh, que excelente oportunidade para praticar!"
 seduce_ongoing.6041.t: "Compreensão Amorosa"
 seduce_ongoing.6041.desc: "Para meu objetivo de conquistar [target.GetFirstName], seria muito útil saber exatamente quais são os gostos e preferências dela…"
 seduce_ongoing.6041.a: "#EMP Ah!#!, isso nem é um desafio!"
 seduce_ongoing.6041.b: "Tenho certeza de que poderia convencer[target.Custom('ES_LoLa')] para me contar."
 seduce_ongoing.6041.b.success: "Eu aprendo mais sobre os interesses de [target.GetFirstName]"
 seduce_ongoing.6041.b.failure: "[target.GetFirstName] evita minhas perguntas."
 seduce_ongoing.6041.c: "Meus espiões descobrirão isso rapidamente."
 seduce_ongoing.6041.c.success: "Meus espiões têm sucesso."
 seduce_ongoing.6041.c.failure: "[target.GetFirstName] escapa dos meus espiões."
 seduce_ongoing.6041.d: "Sabe de uma coisa? Vou simplesmente perguntar."
 seduce_ongoing.6042.desc: "Que interessante… [target.GetFirstName] é um[target.Custom('ES_OA')] [target.GetWomanMan] de bom gosto."
 seduce_ongoing.6042.a: "Isso vai me ajudar a conquistar sua afeição."
 seduce_ongoing.6043.desc: "Parece que talvez eu tenha sido um pouco indelicado ao me aproximar de [target.GetFirstName]. Agora se pergunta por que estou tão injustificadamente interessado nos bens de"
 seduce_ongoing.6043.a: "Isso não é um bom presságio para mim."
 seduce_ongoing.6051.t: "O Véu da Cortesia"
 seduce_ongoing.6051.close: "Organizei tudo pensando que seria uma oportunidade para praticar a cortesia diplomática. Tenho certeza de que [target.GetFirstName] percebeu que era uma desculpa, mas aceitou mesmo assim."
 seduce_ongoing.6051.far: "Visitar outra corte é sempre uma desculpa para trocar cortesia diplomática. Felizmente, [target.GetFirstName] estava mais do que dispost[target.Custom('ES_OA')] a me agradar."
 seduce_ongoing.6051.end: "\n\nPara qualquer pessoa de fora, nossas trocas de palavras poderiam parecer meras platitudes exigidas pela tradição. No entanto, para nós, a paixão ardente por baixo da superfície de nossas palavras era fogo."
 seduce_ongoing.6051.a: "Ah, revigorante!"
 seduce_ongoing.6051.b: "Algumas das dicas que você me deu, [target.GetFirstNameNoTooltip]..."
 seduce_ongoing.6051.c: "Preciso de mais prática como essa."
 seduce_ongoing.7001.t: "Atrás dessas camadas"
 seduce_ongoing.7001.desc: "Como devo me aproximar a [target.GetTitledFirstName]? Parece uma pessoa que prefere o silêncio como companhia, ou pelo menos é assim que parece na superfície. Quem sabe como ela é em particular? Será que é dócil e submis[target.Custom('ES_OA')] ou talvez apaixonad[target.Custom('ES_OA')] e ardent[target.Custom('ES_OA')]?\n\nSó vou descobrir depois de transpor sua fachada de pedra. Por enquanto, preciso decidir como fazer para permanecer em seus pensamentos depois de passar algum tempo a sós."
 seduce_ongoing.7001.a: "Seja o mais galante e encantador[ROOT.Char.Custom('ES_XA')] possível."
 seduce_ongoing.7001.a.tt: "#F Você acha que [target.GetFirstNameNoTooltip] tem um lado romântico secreto e prefere amantes ardentes#!"
 seduce_ongoing.7001.b: "Aproxime-se de [target.GetFirstNameNoTooltip] com delicadeza, como um[ROOT.Char.Custom('ES_XA')] amigo[ROOT.Char.Custom('ES_OA')]."
 seduce_ongoing.7001.b.tt: "#F Você acha que [target.GetFirstNameNoTooltip] é o tipo de pessoa que prefere amantes gentis#!"
 seduce_ongoing.7001.c: "Eu só vou esperar a oportunidade certa..."
 seduce_ongoing.7101.desc_opening: "Consigo arranjar um momento a sós com [target.GetTitledFirstName|l]. Espero o momento certo, equilibrando elogios e conversa. Então, quando o clima parece adequado,"
 seduce_ongoing.7101.desc_can_touch_arms: "estendo a mão e seguro a de [target.GetFirstName]."
 seduce_ongoing.7101.desc_cannot_touch_arms: "Vejo-me estendendo a mão para segurar a dela, mas recuo antes que perceba."
 seduce_ongoing.7101.desc_closing: "Exponho abertamente o que sinto por [target.GetFirstNameNoTooltip] e declaro meu amor eterno por [target.GetSheHe]. \n\n\"Nem nos meus sonhos mais selvagens eu teria imaginado que você fosse tão apaixonad[ROOT.Char.Custom('ES_OA')], [owner.GetFirstNameNoTooltip]!\", exclama [target.GetSheHe] enquanto se abana freneticamente.\n\nEmbora não responda da mesma forma à minha declaração, tenho certeza de que o avermelhado de suas orelhas se deve ao fato de estar corando furiosamente com minhas palavras ousadas."
 seduce_ongoing.7101.a: "Certamente não vai demorar até que corresponda aos meus sentimentos."
 seduce_ongoing.7102.desc: "Tento conseguir um momento a sós com [target.GetTitledFirstName|l], mas com [target.GetSheHe] não é fácil criar uma atmosfera romântica. Apesar da minha falta de sucesso e de o ambiente não estar perfeito, decido me arriscar. Me aproximo para sussurrar palavras de amor ao ouvido, mas antes que eu possa dizer qualquer coisa, recua como se tivesse se queimado e vai embora sem dizer palavra.\n\nNão sei se a reação se deve à sua inexperiência, desgosto ou timidez, mas sei que as coisas poderiam ter corrido melhor."
 seduce_ongoing.7102.a: "Devo repensar minha abordagem..."
 seduce_ongoing.7201.desc: "«Gostaria de conhecê-lo melhor».\n[target.GetTitledFirstName|l] parece tenso[target.Custom('ES_OA')] no começo, mas aos poucos vai relaxando, à medida que começa a acreditar que meu pedido não tem segundas intenções.\n\nAntes de nos separarmos, agradeço pelo agradável momento e [target.GetSheHe] responde timidamente ao meu sorriso. Embora o tempo que passamos juntos não seja digno de entrar para os anais, não há como negar que nunca vi [target.GetFirstNameNoTooltip] sorrir tanto em um só dia. Tenho certeza[ROOT.Char.Custom('ES_OA')] de que [target.GetFirstNameNoTooltip] pensará em mim por muito tempo."
 seduce_ongoing.7202.desc: "Conseguir um momento a sós com [target.GetTitledFirstName|l] não foi difícil. No entanto, acontece que a parte difícil é ter uma conversa normal com [target.GetSheHe]. Eu faço uma pergunta e dá a resposta mais curta possível para encerrar a conversa. É como arrancar palavras com um saca-rolhas!"
 seduce_ongoing.7202.desc_animal: "\n\nNão consigo parar de pensar que eu teria mais reação de um [ROOT.Char.Custom('GetAnimalType')] morto do que de [target.GetFirstNameNoTooltip]."
