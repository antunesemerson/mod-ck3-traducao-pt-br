l_spanish:
 ### OUTCOME EVENTS ###
 ##I am a player, do I want to take the risk?
 elope_event_title: "Elopement:"
 elope.0001.t: "$elope_event_title$ Protegido pelas Sombras"
 elope.0001.positive.desc: "Os preparativos finais estão prontos. O caminho da fuga foi traçado, os guardas foram subornados e [target.GetTitledFirstName|l] está pront[target.Custom('ES_OA')]. Hoje, quando a escuridão cair sobre [location.GetNameNoTooltip], libertarei minha [target.Custom('LoverPetName')] e a farei minha espos[target.Custom('ES_OA')]’ ."
 elope.0001.negative.desc: "Reviso mentalmente a lista. O caminho de fuga já foi traçado, os guardas já devem ter recebido seus subornos e, com sorte, a nota que enviei [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] deve ter chegado a tempo. Mas e se não chegou? Talvez ele não a tenha recebido de forma alguma! E há tantas outras coisas que podem ter dado errado…\n\nNão há tempo para dúvidas. Esta é minha única chance. Preciso ir até [target.Custom('ES_ElElla')] e aconteça o que acontecer, ou abandonar o empreendimento."
 elope.0001.a: "Estou indo atrás de você, [target.GetFirstNameNoTooltip]!"
 elope.0001.b: "O que estou fazendo? Isso é loucura!"
 elope.0001.a.tt: "Tento fugir com [target.GetShortUIName]"
 elope.0001.a.success: "Eu tenho #P sucesso#!"
 elope.0001.a.failure_discover: "Eu #N fracasso e sou descoberto#!"
 elope.0001.a.failure_hidden: "Eu #N fracasso#! mas não sou descoberto"
 #Success event owner
 elope.1001.t: "$elope_event_title$ O Amor Permanece"
 elope.1001.start.desc: "Enquanto esperamos, não consigo deixar de imaginar tudo o que pode dar errado. Sinto-me completamente impotente - um sentimento que #EMP não#! desejo conhecer melhor.\n\nAvisto uma tocha à frente, movendo-se em nossa direção, e faço um gesto para meus guardas se esconderem."
 elope.1001.start.desc_brave: "Enquanto esperamos, não consigo deixar de me perguntar onde estará agora [target.GetFirstName]. Será que conseguiu escapar? Será que [target.Custom('ES_LoLa')|U] o perseguirão?\n\nVejo uma tocha adiante, movendo-se em nossa direção, e faço um gesto para que meus guardas se escondam."
 elope.1001.end.desc: "A luz se aproxima mais e conseguimos distinguir duas silhuetas. Uma está carregando uma espada, isso está claro. A outra… deve ser #EMP [target.Custom('ES_ElElla')]#!!\n\nCorro para encontrar meu [target.Custom('LoverPetName')], que se lança em meus braços abertos. O abraço é rápido, mas doce como mel. Ele/ela segura minha mão e começo a correr."
 elope.1001.a: "Rápido, meu amor! O [ROOT.Char.Custom('DefaultPriestTitle')] está esperando!"
 #Success for target liege
 elope.1002.t: "Desaparecido na Noite"
 elope.1002.start.desc: "Sou acordado(a) por fortes batidas na porta. «Minha [ROOT.Char.GetTitleAsNameNoTooltip]! Encontraram um guarda morto e [target.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('target'))] desapareceu!»."
 elope.1002.desc_naked: "Saio da cama, dando ordens antes mesmo de chegar à porta."
 elope.1002.desc_not_naked: "Saio da cama, dando ordens enquanto me visto."
 elope.1002.desc: "\n\nA busca continua por horas. Só ao meio-dia eles encontram uma carta assinada por [target.GetTitledFirstName|l]. A caligrafia é inconfundivelmente dele.\n\n"
 elope.1002.apologetic_relationship.desc: "\"Meu queridíssim[target.Custom('ES_OA')] [target.GetFirstNameNoTooltip], sinto muito profundamente, mas preciso seguir meu coração. Eu fui embora para me casar com o amor da minha vida… [owner.Custom2('YourCharacterIntroductionNoComma', ROOT.Char)]\"."
 elope.1002.unapologetic_relationship.desc: "\"Eu deixei você para me casar com [owner.Custom2('YourCharacterIntroductionNoComma', ROOT.Char)]. Não venha atrás de mim - eu preferiria morrer a ser sua novamente!\""
 elope.1002.apologetic_family.desc: "\"[ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('target'))|U], fui embora para me casar com o amor da minha vida ? [owner.Custom2('YourCharacterIntroductionNoComma', ROOT.Char)]. S? quero ser feliz. Espero que voc? possa me perdoar.\""
 elope.1002.unapologetic_family.desc: "«Se vocês realmente amassem vosso[target.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort' , target)], vocês desejariam minha felicidade. Mas se importam tão pouco comigo que decidi partir e seguir meu coração. Casar-me-ei com [owner.Custom2('YourCharacterIntroduction', ROOT.Char)] e vocês não podem fazer nada para me impedir!»."
 elope.1002.a.fallback: "Como pôde fazer isso?"
 elope.1002.a.vengeful: "É[target.Custom('ES_EA')] traidor[target.Custom('ES_OA')] [target.Custom2('InsultNounSexual', ROOT.Char)] receberá o que merece!"
 elope.1002.a.compassionate: "Espero que seja feliz, aconteça o que acontecer."
 #Success event for relatives of target and owner
 elope.1003.opening: "[target_keeper.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 elope.1003.start.desc: "Escrevo para informar que"
 elope.1003.target_root_family.desc: "seu[target.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('target'))] [target.GetFirstName]"
 elope.1003.target_keeper_relation.desc: "meu [target_keeper.Custom2('RelationToMeShort' , SCOPE.sC('target'))] [target.GetFirstName]"
 elope.1003.target_liege_subject.desc: "meu/minha s?dit[target.Custom('ES_OA')] [target.GetFirstName]"
 elope.1003.middle.desc: "fugiu com"
 elope.1003.owner_root_family.desc: "vos[owner.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('owner'))] [owner.GetFirstName]."
 elope.1003.your_character_introduction.desc: "[owner.Custom2('YourCharacterIntroductionNoComma', ROOT.Char)]!"
 elope.1003.end.desc: "Sejamos francos: isso é uma grande ofensa e uma mancha na honra de sua família. Se o #EMP feliz casal#! procurar refúgio em [capital.GetNameNoTooltip], confio em que você lhes dará uma lição!"
 elope.1003.a: "Que catástrofe!"
 #Failure discovered event owner
 elope.1011.t: "$elope_event_title$ Tochas na Escuridão"
 elope.1011.middle.desc: "Vejo duas silhuetas, três, quatro... [ROOT.Char.GetFaith.HighGodName], isso não pode ser bom!"
 elope.1011.end.desc: "Ao meu comando, recuamos pela vegetação. Nossos perseguidores, por outro lado, não têm nada de sutileza e se aproximam rapidamente.\n\n\"Vocês não poderão se esconder para sempre, [ROOT.Char.GetTitledFirstNameNoTooltip|l]! Capturamos um[dummy_soldier.Custom('ES_OA')] dos vossos homens, e vós sereis o próximo!\"."
 elope.1011.a: "#EMP Corram!#!"
 elope.1012.t: "Uma Fuga Malsucedida"
 elope.1012.desc: "Uma tentativa de fuga com [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]! O capitão da guarda me conta que [owner.Custom2('YourCharacterIntroduction', ROOT.Char)] tramava sequestrar[target.GetHerHim] e se casar com [target.Custom('ES_ElElla')] em segredo.\n\nAlém disso, as cartas encontradas nos aposentos de [target.GetFirstNameNoTooltip] indicam que [target.Custom('ES_ElElla')] sabia de tudo!"
 elope.1012.a: "[owner.Custom('ES_EA')] [owner.Custom2('InsultNounSexual', ROOT.Char)] [owner.Custom2('InsultAdjective', ROOT.Char)] nunca terá meu [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('target'))]!"
 elope.1012.b: "Traidor! Prendam [target.GetFirstNameNoTooltip], #EMP agora!#!"
 elope.1012.c: "Eu os farei sofrer, marquem minhas palavras!"
 elope.1012.d: "Isso está me dando dor de cabeça..."
 #Failure undiscovered for owner
 elope.1021.end.desc: "\n\nPor minha ordem, recuamos pela vegetação. Por pura sorte, conseguimos chegar de volta à carruagem e escapar durante a noite."
 elope.1021.a: "[target.GetFirstNameNoTooltip], meu amor... Rezo para que você esteja bem."
 ### ONGOING EVENTS ###
 #Lover is doubting
 elope.2000.t: "Meu amor,"
 elope.2000.start.desc: "Você me disse para ser corajos, mas não consigo conter meus medos por mais tempo. E se"
 elope.2000.target_relation.desc: "meu [target.Custom2('RelationToMeShort' , SCOPE.sC('discoverer'))] descobre nossos planos? Eu mal consigo dormir e tenho dificuldade para manter a comida no estômago. [discoverer.Custom('ES_ElElla')|U] está começando a se preocupar… talvez até suspeite!"
 elope.2000.titledname.desc: "[discoverer.GetTitledFirstName] descobre nossos planos? Toda vez que aparece, fico paralisado[ROOT.Char.Custom('ES_OA')] e sem palavras[ROOT.Char.Custom('ES_OA')]. Mais cedo ou mais tarde, ele vai perceber!"
 elope.2000.end.desc: "\n\nO tempo está se esgotando. Por favor, meu querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstNameNoTooltip], apresse-se!"
 elope.2000.a: "Vamos acelerar os planos, meu [target.Custom('LoverPetName')]."
 elope.2000.c: "Confie em mim - tudo está sob controle."
 elope.2000.c.success: "[target.GetShortUIName] está convencid"
 elope.2000.c.failure: "[target.GetShortUIName|U] se sente abandonad[target.Custom('ES_OA')]"
 elope.2000.b: "Então você não deveria enviar cartas!"
