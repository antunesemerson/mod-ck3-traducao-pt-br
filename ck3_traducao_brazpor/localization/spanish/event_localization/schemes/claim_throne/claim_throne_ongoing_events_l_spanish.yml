l_spanish:
 #Target is followed by ill omens
 claim_throne_ongoing.1001.t: "Presságios Funestos"
 claim_throne_ongoing.1001.desc: "Está claro que não estou sol[ROOT.Char.Custom('ES_OA')] na ambição de governar [target_title.GetNameNoTooltip]! Corvos têm se reunido nos telhados da [target.Custom('ResidenceBuilding')] de [target.GetTitledFirstName|l] e, há algumas noites, até as estrelas pareciam estar caindo por todo [target_title.GetNameNoTierNoTooltip].

Camponeses e nobres sussurram por igual que é um sinal de que [target.GetFirstNameNoTooltip] perdeu o favor de [ROOT.Char.GetFaith.PantheonTerm]."
 claim_throne_ongoing.1001.a: "É hora de um[ROOT.Char.Custom('ES_XA')] nov[ROOT.Char.Custom('ES_OA')] [target.GetTitleAsNameNoTooltip]!"
 claim_throne_ongoing.1001.b: "Autoridade Conquistada"
 #Gradually take on more responsibility in the realm
 claim_throne_ongoing.1002.t: ""Não se preocupe, meu senhor[target.Custom('ES_XA')], também cuidarei disso...""
 claim_throne_ongoing.1002.desc: "Minha busca por [target_title.GetName] não é movida por um simples desejo de poder, mas porque sou a única pessoa capaz de arcar com essa responsabilidade enorme! Até [target.GetTitledFirstName|l] parece reconhecer isso, já que me confere tarefas cada vez mais importantes a serviço do reino.

Em breve, eu poderia muito bem estar governando o [target_title.GetTierAsNameNoTooltip] em tudo, menos no nome..."
 claim_throne_ongoing.1002.a: "Tenho plena consciência de que, se eu quiser servir como [target.GetTitleAsName] de [target_title.GetNameNoTier], preciso do apoio de meus agora companheiros vassalos mais do que [target.GetTitledFirstName|l] possui atualmente.

Mostrar o quão generos[ROOT.Char.Custom('ES_OA')] eu seria como [target.GetTitleAsName] pode ajudar bastante."
 claim_throne_ongoing.1002.b: "Nada é bom demais para meus futuros servos!"
 #Buying support from vassals
 claim_throne_ongoing.1003.t: "Ganhando Apoio"
 claim_throne_ongoing.1003.desc: "Tenho plena consciência de que, se eu quiser servir como [target.GetTitleAsName] de [target_title.GetNameNoTier], preciso do apoio de meus agora companheiros vassalos mais do que [target.GetTitledFirstName|l] possui atualmente.

Mostrar o quão generos[ROOT.Char.Custom('ES_OA')] eu seria como [target.GetTitleAsName] pode ajudar bastante."
 claim_throne_ongoing.1003.a: "Não, não [ROOT.Char.GetLadyLord] de todos os rabanetes em [target_title.GetNameNoTierNoTooltip]..."
 claim_throne_ongoing.1003.b: "...mas do mundo!"
 #Lunatic declares themselves ruler
 claim_throne_ongoing.1004.t: "Puni vários servos pelo que pensei ser uma zombaria, pois se referiam a mim como "Vossa Rabanetice", mas agora meu Chanceler me mostrou o documento que eu mandei redigir, insistindo nisso.

Parece uma piada cruel que o mundo está fazendo comigo, mas, ao mesmo tempo, há uma vaga memória remexendo nas partes nebulosas da minha mente..."
 claim_throne_ongoing.1004.desc: "Pode parecer que tenho que trabalhar para reivindicar o governo sobre [target_title.GetName], mas já possuo um título com uma autoridade muito maior.

Sou [ROOT.Char.GetLadyLord] de todos os rabanetes de [target_title.GetNameNoTierNoTooltip]!"
 claim_throne_ongoing.1004.a: "Como em tantas outras coisas, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend'))] [friend.GetTitledFirstName|l] concorda comigo que [target.GetTitledFirstName|l] não é adequad[target.Custom('ES_OA')] para governar [target_title.GetNameNoTier].

"Consigo pensar em candidatos muito melhores", [friend.GetSheHe] me diz em confidência. "E você está em primeiro[ROOT.Char.Custom('ES_OA')] entre eles. Dê a ordem, e terá meu apoio.""
 claim_throne_ongoing.1004.b: "A amizade é a forma mais honrada de lealdade."
 claim_throne_ongoing.1004.b_flavor: "Empregue seus esforços para fazer os outros saberem como sou adequad[ROOT.Char.Custom('ES_OA')] que sou."
 claim_throne_ongoing.1005.t: "Lei da Espada"
 claim_throne_ongoing.1005.desc: "Já começaram a se espalhar rumores de que ambiciono tomar o controle de [target_title.GetNameNoTier] entre os [GetPlayer.Custom( 'KnightCulturePluralNoTooltipLowercase' )] do domínio. O descontentamento cresce entre a tropa, e muitos acreditam que é hora de uma mudança.

Com essa tensão fervilhando, sou abordado por ninguém menos que [scheming_knight.GetTitledFirstName|l], um dos [GetPlayer.Custom( 'KnightCulturePluralNoTooltipLowercase' )] de [target.GetTitledFirstName|l]. "Nossos guerreiros merecem coisa melhor. Prometa-lhes tratamento justo, assim como uma generosa bolsa de ouro, e tereis minha espada."", mas agora meu Chanceler me mostrou o documento que eu mandei redigir, insistindo nisso.

Parece uma piada cruel que o mundo está fazendo comigo, mas, ao mesmo tempo, há uma vaga memória remexendo nas partes nebulosas da minha mente..."
 claim_throne_ongoing.1005.a: "Enganar a Todos"
 claim_throne_ongoing.1005.b: "Talvez eu pudesse fortalecer minha reivindicação sobre [target_title.GetName] usando alguns artifícios.

Pelos domínios vizinhos, circula uma carta anunciando que o fim está próximo. Com um pouco de falsificação e paciência, tenho certeza de que poderia forjar uma carta semelhante que afirmasse que devo governar em vez de [target.GetTitledFirstName|l].

Mas como eu deveria usar tal carta?"
 claim_throne_ongoing.1006.t: "Exibi-la publicamente."
 claim_throne_ongoing.1006.desc: "Como em tantas outras coisas, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend'))] [friend.GetTitledFirstName|l] concorda comigo que [target.GetTitledFirstName|l] não é adequad[target.Custom('ES_OA')] para governar [target_title.GetNameNoTier].

"Você usa o tempo de forma mais sábia."
 claim_throne_ongoing.1006.a: "Pego em uma Mentira"
 claim_throne_ongoing.1006.b: "Parece que [fraud_catcher.GetTitledFirstName|l] está tentando ganhar fama ao afirmar que minha carta recente é uma mera falsificação e que nenhuma das alegações nela é verdadeira.

E pior, [target.GetTitledFirstName|l] está acreditando em cada palavra! Será que fui descobert[ROOT.Char.Custom('ES_OA')]?"
 claim_throne_ongoing.1007.t: "Isso foi um teste, e todos vocês falharam."
 claim_throne_ongoing.1007.desc: "Já começaram a se espalhar rumores de que ambiciono tomar o controle de [target_title.GetNameNoTier] entre os [GetPlayer.Custom( 'KnightCulturePluralNoTooltipLowercase' )] do domínio. O descontentamento cresce entre a tropa, e muitos acreditam que é hora de uma mudança.

Com essa tensão fervilhando, sou abordado por ninguém menos que [scheming_knight.GetTitledFirstName|l], um dos [GetPlayer.Custom( 'KnightCulturePluralNoTooltipLowercase' )] de [target.GetTitledFirstName|l]. "Todos eles são enganados"
 claim_throne_ongoing.1007.a: "Ninguém acredita"
 claim_throne_ongoing.1007.b: "Você não impressiona ninguém"
 claim_throne_ongoing.1008.t: "Enganar a Todos"
 claim_throne_ongoing.1008.desc: "Talvez eu pudesse fortalecer minha reivindicação sobre [target_title.GetName] usando alguns artifícios.

Pelos domínios vizinhos, circula uma carta anunciando que o fim está próximo. Com um pouco de falsificação e paciência, tenho certeza de que poderia forjar uma carta semelhante que afirmasse que devo governar em vez de [target.GetTitledFirstName|l].

Mas como eu deveria usar tal carta?"
 claim_throne_ongoing.1008.a: "Exibi-la publicamente."
 claim_throne_ongoing.1008.b: "Compartilhá-la com meus companheiros vassalos."
 claim_throne_ongoing.1008.c: "Não me envolver."
 claim_throne_ongoing.1008.c.tt: "Você usa o tempo de forma mais sábia."
 claim_throne_ongoing.1009.t: "Pego em uma Mentira"
 claim_throne_ongoing.1009.desc: "Parece que [fraud_catcher.GetTitledFirstName|l] está tentando ganhar fama ao afirmar que minha carta recente é uma mera falsificação e que nenhuma das alegações nela é verdadeira.

E pior, [target.GetTitledFirstName|l] está acreditando em cada palavra! Será que fui descobert[ROOT.Char.Custom('ES_OA')]?"
 claim_throne_ongoing.1009.a: "Isso foi um teste, e todos vocês falharam."
 claim_throne_ongoing.1009.b: "Como ousa me acusar de mentir?"
 claim_throne_ongoing.1009.b.duel_success: "Você apresenta argumentos convincentes"
 tooltip.claim_throne_ongoing.1009.b.duel_success: "Todos eles são enganados"
 claim_throne_ongoing.1009.b.duel_failure: "Ninguém acredita"
 tooltip.claim_throne_ongoing.1009.b.duel_failure: "Você não impressiona ninguém"
