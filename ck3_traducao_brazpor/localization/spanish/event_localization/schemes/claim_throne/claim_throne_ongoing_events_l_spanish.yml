l_spanish:
 #Target is followed by ill omens
 claim_throne_ongoing.1001.t: "Presságios Funestos"
 claim_throne_ongoing.1001.desc: "¡Está claro que no estoy sol[ROOT.Char.Custom('ES_OA')] en la ambición de gobernar [target_title.GetNameNoTooltip]! Se han estado reuniendo cuervos en los tejados del/la [target.Custom('ResidenceBuilding')] de [target.GetTitledFirstName|l] y hace unas noches hasta estrellas empezaron a caer por todo [target_title.GetNameNoTierNoTooltip].\n\nCampesinos y nobles por igual murmuran que es una señal de que [target.GetFirstNameNoTooltip] ha perdido el favor de [ROOT.Char.GetFaith.PantheonTerm]."
 claim_throne_ongoing.1001.a: "¡Es hora de un nuev[target.Custom('ES_OA')] [target.GetTitleAsNameNoTooltip]!"
 claim_throne_ongoing.1001.b: "Somente os [ROOT.Char.GetFaith.AltPriestTermPlural] podem interpretar esses sinais."
 #Gradually take on more responsibility in the realm
 claim_throne_ongoing.1002.t: "Autoridade Conquistada"
 claim_throne_ongoing.1002.desc: "Mi búsqueda del [target_title.GetName] no está impulsada por un simple deseo de poder, sino porque solo yo puedo asumir tal responsabilidad. Hasta [target.GetTitledFirstName|l] parece reconocerlo, ya que se me conceden tareas cada vez más importantes al servicio del señorío.\n\nPronto podría estar actuando como [target.GetTitleAsNameNoTooltip] en todo menos en el nombre…"
 claim_throne_ongoing.1002.a: ""Não se preocupe, meu senhor[target.Custom('ES_XA')], também cuidarei disso...""
 claim_throne_ongoing.1002.b: "Isso está se tornando um pouco demais, na verdade."
 #Buying support from vassals
 claim_throne_ongoing.1003.t: "Ganhando Apoio"
 claim_throne_ongoing.1003.desc: "Soy muy consciente de que, si quiero ser [target.GetTitleAsName] de [target_title.GetNameNoTier], necesito más apoyo de mis ahora compañeros de vasallaje del que tiene ahora mismo [target.GetTitledFirstName|l].\n\nSi explico cuán generos[ROOT.Char.Custom('ES_OA')] sería como [target.GetTitleAsName] podría ayudar mucho."
 claim_throne_ongoing.1003.a: "Nada é bom demais para meus futuros servos!"
 claim_throne_ongoing.1003.b: "Vou precisar de todo o meu ouro para a luta iminente."
 #Lunatic declares themselves ruler
 claim_throne_ongoing.1004.t: "Declaração de Soberania"
 claim_throne_ongoing.1004.desc: "Puede parecer que tengo que trabajar para reclamar el gobierno sobre [target_title.GetName], pero ya dispongo de un título con una autoridad mucho mayor.\n\n¡Soy [ROOT.Char.GetLadyLord] de todos los rábanos de [target_title.GetNameNoTierNoTooltip]!"
 claim_throne_ongoing.1004.a: "Castelão, traga-me meu selo de rabanete!"
 claim_throne_ongoing.1004.b: "Não, não [ROOT.Char.GetLadyLord] de todos os rabanetes em [target_title.GetNameNoTierNoTooltip]..."
 claim_throne_ongoing.1004.b_flavor: "...mas do mundo!"
 claim_throne_ongoing.1005.t: "[ROOT.Char.GetLadyLord|U] dos Rabanetes"
 claim_throne_ongoing.1005.desc: "He hecho castigar a varios sirvientes por lo que pensé que era una burla, ya que se referían a mí como «Vuestra Rabanosidad», pero mi canciller me ha mostrado la orden que redacté insistiendo en ello.\n\nParece que el mundo me estuviera gastando una broma cruel, pero al mismo tiempo tengo un vago recuerdo en la mente…"
 claim_throne_ongoing.1005.a: "O que... o que eu tenho feito?"
 claim_throne_ongoing.1005.b: "Eu não cometo erros. Todos vocês seguirão o documento."
 claim_throne_ongoing.1006.t: "Apoio Firme"
 claim_throne_ongoing.1006.desc: "Igual que con otras muchas cosas, mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend'))] [friend.GetTitledFirstName|l] coincide conmigo en que [target.GetTitledFirstName|l] no es dign[target.Custom('ES_OA')] de gobernar [target_title.GetNameNoTier].\n\n«Se me ocurren candidatos mucho mejores», me hace saber en confianza. «Y tú eres primer[ROOT.Char.Custom('ES_OA')] de ellos. Da la orden, y tendrás mi apoyo»."
 claim_throne_ongoing.1006.a: "A amizade é a forma mais honrada de lealdade."
 claim_throne_ongoing.1006.b: "Empregue seus esforços para fazer os outros saberem como sou adequad[ROOT.Char.Custom('ES_OA')] que sou."
 claim_throne_ongoing.1007.t: "Lei da Espada"
 claim_throne_ongoing.1007.desc: "Han comenzado a extenderse historias sobre cómo ambiciono controlar [target_title.GetNameNoTier] entre los [GetPlayer.Custom( 'KnightCulturePluralNoTooltipLowercase' )] del señorío. El descontento se alza entre sus filas y muchos creen que es hora de cambios.\n\nCon las tensiones en ebullición, veo cómo se me acerca ni más ni menos que [scheming_knight.GetTitledFirstName|l], uno de los [GetPlayer.Custom( 'KnightCulturePluralNoTooltipLowercase' )] de [target.GetTitledFirstName|l]. «Nuestros guerreros se merecen algo mejor. Prometed un tratamiento justo para nuestros hombres, así como una bolsa de oro generosa y tendréis mi espada»."
 claim_throne_ongoing.1007.a: "Meus $knight_culture_player_plural_no_tooltip_lowercase$ sempre virão em primeiro lugar! "
 claim_throne_ongoing.1007.b: "Um $knight_culture_player_no_tooltip_lowercase$ que trai seu suserano não é um $knight_culture_player_no_tooltip_lowercase$ de verdade."
 claim_throne_ongoing.1008.t: "Enganar a Todos"
 claim_throne_ongoing.1008.desc: "Tal vez podría reforzar mis derechos sobre [target_title.GetName] usando algunas argucias.\n\nPor los señoríos vecinos circula una carta que anuncia el próximo fin del mundo. Con un poco de manipulación y paciencia, creo que podría confeccionar una carta similar que afirmase que debo gobernar yo en lugar de [target.GetTitledFirstName|l].\n\nPero ¿cómo debería usar tal carta?"
 claim_throne_ongoing.1008.a: "Exibi-la publicamente."
 claim_throne_ongoing.1008.b: "Compartilhá-la com meus companheiros vassalos."
 claim_throne_ongoing.1008.c: "Não me envolver."
 claim_throne_ongoing.1008.c.tt: "Você usa o tempo de forma mais sábia."
 claim_throne_ongoing.1009.t: "Pego em uma Mentira"
 claim_throne_ongoing.1009.desc: "Parece que [fraud_catcher.GetTitledFirstName|l] intenta granjearse buena reputación afirmando que mi carta reciente es un invento y que ninguno de lo que afirmo en ella es cierto.\n\n¡Y lo que es peor, [target.GetTitledFirstName|l] cree que es cierto! ¿Me han descubierto?"
 claim_throne_ongoing.1009.a: "Isso foi um teste, e todos vocês falharam."
 claim_throne_ongoing.1009.b: "Como ousa me acusar de mentir?"
 claim_throne_ongoing.1009.b.duel_success: "Você apresenta argumentos convincentes"
 tooltip.claim_throne_ongoing.1009.b.duel_success: "Todos eles são enganados"
 claim_throne_ongoing.1009.b.duel_failure: "Ninguém acredita"
 tooltip.claim_throne_ongoing.1009.b.duel_failure: "Você não impressiona ninguém"
