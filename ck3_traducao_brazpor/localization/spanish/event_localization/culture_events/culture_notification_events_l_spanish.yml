l_spanish:
 culture_notification.0010.t: "Tradição Abandonada"
 culture_notification.0010.desc: "A [culture|lE] [this_player.GetCulture.GetName] abandonou a tradição [tradition.GetName|l]"
 culture_notification.0011.t: "Tradição Adotada"
 culture_notification.0011.desc: "A [culture|lE] [this_player.GetCulture.GetName] adotou a tradição [tradition.GetName|l]"
 culture_notification.1001.t: "Cultura Híbrida: [new_culture.GetNameNoTooltip|V]"
 culture_notification.1001.desc: "[founder.GetTitledFirstName] formou a [hybrid_culture|lE] [new_culture.GetName|V] a partir das culturas [parent_1.GetNameNoTooltip] e [parent_2.GetNameNoTooltip]"
 culture_notification.1011.t: "A Hibridização da Cultura [new_culture.GetNameNoTooltip]"
 culture_notification.1011.intro: "Impulsionados por relações positivas e aumento do intercâmbio cultural, os povos [parent_1.GetName] e [parent_2.GetName] tornaram-se cada vez mais próximos ao longo dos anos. Agora, indivíduos dessas sociedades começaram a se enxergar não apenas como um ou outro, mas como ambos simultaneamente — uma nova Cultura [new_culture.GetName].\n\n"
 culture_notification.1011.hybrid_primary_1: "Tradições e valores [parent_1.GetNameNoTooltip] formam a base dessa nova Cultura, enquanto vários atributos [parent_2.GetNameNoTooltip] foram adaptados e integrados para atender às necessidades de sua nova sociedade."
 culture_notification.1011.hybrid_primary_2: "Tradições e valores [parent_2.GetNameNoTooltip] formam a base dessa nova Cultura, enquanto vários atributos [parent_1.GetNameNoTooltip] foram adaptados e integrados para atender às necessidades de sua nova sociedade."
 culture_notification.1011.hybrid_no_primary: "O povo [new_culture.GetNameNoTooltip] adotou uma mistura equilibrada de elementos de ambas as Culturas, formando uma verdadeira Cultura híbrida que combina perfeitamente elementos de ambos os mundos."
 culture_notification.1011.outro.other: "$culture_notification.1111.outro.other$"
 culture_notification.1011.outro.founder: "$culture_notification.1111.outro.founder$"
 culture_notification.1011.a.other: "$culture_notification.1111.a.other$"
 culture_notification.1011.a.founder: "$culture_notification.1111.a.founder$"
 culture_notification_hybrid_tooltip: "A [hybrid_culture|lE] [new_culture.GetName] formou-se a partir das [cultures|lE] [parent_1.GetName] e [parent_2.GetName]."
 culture_notification.1101.t: "Cultura Divergente: [new_culture.GetNameNoTooltip|V]"
 culture_notification.1101.desc: "[founder.GetTitledFirstName] criou a cultura [new_culture.GetName|V], uma [Concept( 'divergent_culture', 'cultura divergente' )|E] de [parent_1.GetNameNoTooltip]"
 culture_notification.1111.t: "A Divergência da Cultura [new_culture.GetNameNoTooltip]"
 culture_notification.1111.intro: "Pequenas mudanças no dialeto, costumes ligeiramente diferentes... Foi fácil não perceber no início. Com o tempo, pequenas mudanças levaram a grandes mudanças, no entanto, e agora os [parent_1.GetCollectiveNoun] que vivem no [founder.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] começaram a se identificar como [new_culture.GetName] em vez disso.\n\n"
 culture_notification.1111.ethos.bellicose: "Diante das pressões crescentes tanto da natureza selvagem quanto de seus rivais, os [new_culture.GetCollectiveNounNoTooltip] estão se tornando cada vez mais belicosos enquanto buscam garantir e proteger seu sustento pela força das armas."
 culture_notification.1111.ethos.bureaucratic: "Os [new_culture.GetCollectiveNounNoTooltip] parecem estar desenvolvendo um apetite crescente por leis verbosas, crônicas longas e estatutos labirínticos, encontrando conforto em uma sociedade regida por práticas formais em constante expansão."
 culture_notification.1111.ethos.courtly: "Com uma dedicação crescente às maneiras e etiqueta, os [new_culture.GetCollectiveNounNoTooltip] estão abraçando um estilo de vida estruturado e cortês para trazer uma nova era de estabilidade e prosperidade."
 culture_notification.1111.ethos.communal: "Ao ajudar seus vizinhos em momentos de tragédia e compartilhar seus triunfos, os [new_culture.GetCollectiveNounNoTooltip] estão formando laços estreitos de comunidade que promovem um senso de pertencimento e propósito."
 culture_notification.1111.ethos.stoic: "Diante de um mundo perigoso e imprevisível, os [new_culture.GetCollectiveNounNoTooltip] estão valorizando cada vez mais a coragem e a determinação."
 culture_notification.1111.ethos.spiritual: "Ao buscar respostas tanto dentro de si mesmos quanto no mundo em geral, os [new_culture.GetCollectiveNounNoTooltip] estão se tornando mais espirituais e devotos do que nunca."
 culture_notification.1111.ethos.egalitatian: "Reconhecendo que as circunstâncias do nascimento nem sempre preveem habilidade e competência, os [new_culture.GetCollectiveNounNoTooltip] estão se tornando mais igualitários e abertos como sociedade."
 culture_notification.1111.ethos.unchanged: "Com sua visão de vida fundamentalmente inalterada, as diferenças entre os [new_culture.GetCollectiveNounNoTooltip] e os [parent_1.GetCollectiveNounNoTooltip] parecem mais políticas do que qualquer outra coisa — mas o fato permanece que divisões de tradição, política e fronteiras transformaram um grupo de pessoas em dois."
 culture_notification.1111.outro.other: "\n\nSeja por uma manipulação hábil ou por um verdadeiro desejo de conduzir seu povo a uma nova era, [founder.GetTitledFirstName|l] se posicionou como líder deste despertar cultural."
 culture_notification.1111.outro.founder: "\n\nCom o povo [new_culture.GetNameNoTooltip] agora buscando minha orientação, é hora de preparar o palco para o nosso futuro compartilhado."
 culture_notification.1111.a.other: "Vamos ver como a situação se desenvolve."
 culture_notification.1111.a.founder: "Para uma nova era, um novo povo!"
 culture_notification_tooltip: "A [divergent_culture|E] [new_culture.GetName] se ramificou a partir da [culture|lE] [parent_1.GetName]."
