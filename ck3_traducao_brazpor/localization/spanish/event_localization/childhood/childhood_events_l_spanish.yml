l_spanish:
 childhood.0002.t: "Encontro de Brincadeira"
 childhood.0002.opening: "[crush.GetTitledFirstName|l] é muito divertid de se estar por perto!\n\n"
 childhood.0002.loud: "Costuma exigir muita atenção, mas não me importo. Toda vez que [crush.Custom('ES_LoLa')] vejo, meu dia fica melhor!"
 childhood.0002.quiet: "Costuma ser bastante tímid[crush.Custom('ES_OA')], mas ainda é especial toda vez que [crush.Custom('ES_LoLa')] vejo!"
 childhood.0002.fallback: "Cada vez que [crush.Custom('ES_LoLa')] vejo, meu dia fica melhor, e eu queria que pudéssemos brincar o tempo todo."
 childhood.0002.end: "\n\nSempre que nossos olhares se encontram, meu estômago se enche de borboletas... Oh, eu me pergunto se [crush.GetSheHe] iria gostar desta [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type')] que eu encontrei?"
 childhood.0002.a: "Esta flor é para você, [crush.GetFirstNameNoTooltip]!"
 childhood.0002.b: "Não... devemos apenas ser amigos."
 crush_returned: "[crush.GetFirstNameNoTooltip] também gosta de você!"
 crush_crushed: "[crush.GetFirstNameNoTooltip] só quer ser amigo…"
 childhood.0004.t: "Amizade Florescente"
 childhood.0004.desc1: "Ultimamente, tenho brincado muito com [friend.GetTitledFirstName|l]. Outro dia, até me emprestou seu brinquedo favorito, seu [friend.Custom('child_favorite_toy')]. Nós realmente nos damos muito bem e estamos nos divertindo muito!"
 childhood.0004.desc2: "[friend.GetTitledFirstName] e eu temos passado muito tempo juntos recentemente, conversando e brincando. Nós estamos nos divertindo muito!"
 childhood.0004.desc3: "Tenho passado muito tempo com [friend.GetFirstName] recentemente."
 childhood_0004.desc3_rowdy: "Está sempre aprontando alguma coisa, e o tempo que passamos juntos nunca é entediante!"
 childhood_0004.desc3_curious: "Sempre faz as perguntas certas, chegando à verdade de cada conversa e discussão. Nunca fico entediado quando estou com [friend.Custom('ES_ElElla')]!"
 childhood_0004.desc3_charming: "Ninguém mais me faz rir como [friend.Custom('ES_ElElla')]!"
 childhood_0004.desc3_pensive: "Sempre faz as perguntas certas, chegando à verdade de toda conversa e discussão. Nunca fico entediado quando estou com [friend.Custom('ES_ElElla')]!"
 childhood_0004.desc3_bossy: "Sempre sabe exatamente o que devemos fazer quando nos encontramos, e eu nunca fico entediado(a) quando estou com [friend.Custom('ES_ElElla')]."
 childhood_0004.desc3_fallback: "Sempre nos divertimos juntos, não importa se jogamos um dos nossos jogos favoritos ou apenas conversamos!"
 childhood.0004.a: "É um[friend.Custom('ES_XA')] grande amig[friend.Custom('ES_OA')]!"
 childhood.0004.b: "Adoro brincar com [friend.Custom('ES_ElElla')]!"
 childhood.0004.c: "É difícil encontrar um[friend.Custom('ES_XA')] amig[friend.Custom('ES_OA')] melhor do que [friend.Custom('ES_ElElla')]!"
 childhood.0004.a_alt: "Vamos fazer um juramento - amigos #EMP para sempre!#!"
 childhood.0004.c_alt: "Pois você é #EMP idiota#! por confiar em mim, #EMP [child.Custom2('InsultNoun', ROOT.Char)]!#!"
 childhood.0004.d: "você quer #EMP recuperar#! o [friend.Custom('child_favorite_toy')]? Nem pensar!"
 childhood.0006.t: "Atenção Indesejada"
 childhood.0006.opening: "[bully.GetTitledFirstName] tem me importunado por muito tempo agora.\n\n"
 childhood.0006.mean: "É mal[bully.Custom('ES_OA')] vado, sempre zomba de mim e me empurra."
 childhood.0006.loud: "Muitas das outras crianças a ouvem, e usa sua influência para colocá-las contra mim."
 childhood.0006.quiet: "Normalmente passa despercebid[bully.Custom('ES_OA')] e pega no meu pé quando ninguém está olhando."
 childhood.0006.nice: "Fez todo mundo acreditar que é um santo, mas zomba de mim sem parar por cada pequeno erro que cometo."
 childhood.0006.fallback: "Aproveita qualquer oportunidade para me encarar de forma maliciosa e zombar de mim."
 childhood.0006.toy: "E não só isso…[bully.Custom('ES_EA')] #EMP [bully.Custom2('InsultNoun', ROOT.Char)]#! quebrou meu [ROOT.Char.Custom('child_favorite_toy')] de coração!"
 childhood.0006.end: "Não consigo fazer com que [bully.Custom('ES_ElElla')] pare, não importa o que eu faça!"
 childhood.0006.a: "[bully.Custom('ES_ElElla')|U] é o pior!"
 childhood.0006.b: "Grrr... Vou te bater sem dó!"
 childhood.0006.b.critical_success: "[bully.GetHerHim|U] matou até a morte"
 childhood.0006.b.success: "Você o surrra e ele te deixa em paz"
 childhood.0006.b.failure: "[bully.GetSheHe|U] te bate"
 childhood.0006.b.critical_failure: "[bully.GetSheHe|U] te bate gravemente"
 childhood.0006.b.death: "[bully.GetSheHe|U] te espanca até a morte #EMP#!"
 childhood.0006.c: "Olha, eu vou te pagar cinco ouros para sumir."
 childhood.0006.c_leave: "[bully.GetSheHe|U] #EMP no#! se larga"
 childhood.0008.t: "Controle de Raiva"
 childhood.0008.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('victim'))], [victim.GetTitledFirstName|l], está me deixando nervoso.\n\n"
 childhood.0008.mean: "Aproveita todas as oportunidades para me irritar, aparentemente encontrando prazer na irritação e na dor que me causa."
 childhood.0008.loud: "Sempre está tagarelando, não importa sobre o quê, nem mesmo quando eu digo que não estou interessado. Não acaba nunca!"
 childhood.0008.quiet: "Tenho tentado fazê-lo(a) falar, expressar uma opinião, dizer #EMP algo#!...! Faça o que fizer, ele(a) fica cada vez mais retraíd[victim.Custom('ES_OA')]; o que há de errado com ele(a)?!"
 childhood.0008.nice: "[victim.GetSheHe|U] sempre faz #EMP todo bien#!, pregando sobre uma virtude após a outra. Seus sermões constantes estão tendo o efeito contrário em mim…"
 childhood.0008.fallback: "[victim.Custom('ES_ElElla')|U] sempre está sempre no meu caminho, fala das coisas mais chatas, consegue sempre dizer exatamente a coisa errada em toda conversa…"
 childhood.0008.a: "Isso vai ensiná-[victim.Custom('ES_OA')]!"
 childhood.0008.b: "Da próxima vez que nos encontrarmos, eu #EMP vou tentar#! ser legal..."
 childhood.0008.c: "Ah, como eu [victim.GetHerHim] #EMP odio#!! Seria melhor... morto."
 childhood.0009.t: "Indulgências Inocentes"
 childhood.0009.opening: "Finalmente poder colocar [victim.GetFirstName] em seu lugar está melhorando consideravelmente meu humor.\n\n"
 childhood.0009.desc1: "Um dos meus jogos favoritos é ver quantas vezes consigo empurrá-lo antes que ele tenha o bastante!"
 childhood.0009.desc2: "Decidi seguir [victim.GetFirstName] por toda parte e criticar cada movimento de forma bem alta."
 childhood.0009.desc3: "Peguei emprestado o seu brinquedo favorito, o seu [victim.Custom('child_favorite_toy')] e agora ele tem que fazer o que eu mandar!"
 childhood.0009.fallback: "Encontrei por acidente o seu [victim.Custom('child_favorite_toy')], que é o seu brinquedo favorito; então o escondi e fiquei vendo-o procurá-lo desesperadamente, foi o ponto alto da minha semana!"
 childhood.0009.a: "É tudo diversão!"
 childhood.0012.t: "Atenção Recebida"
 childhood.0012.desc: "Quando brincava outro dia com [crush_holder.GetTitledFirstName|l] comigo, foi estranhamente atencios[crush_holder.Custom('ES_OA')] comigo. Nunca me senti assim em relação a [crush_holder.Custom('ES_ElElla')], mas talvez eu esteja começando a ver[crush_holder.Custom('ES_LoLa')] como mais que um[crush_holder.Custom('ES_XA')] amig[crush_holder.Custom('ES_OA')]."
 childhood.0012.a: "[crush_holder.GetTitledFirstNameNoTooltip], acho que gosto de você!"
 childhood.0012.b: "[crush_holder.Custom('ES_ElLa')|U] [crush_holder.GetTitledFirstNameNoTooltip|l] é apenas um[crush_holder.Custom('ES_XA')] amig[crush_holder.Custom('ES_OA')]."
 childhood.0013.t: "Interações Amigáveis"
 childhood.0013.desc: "Ultimamente, [child.GetTitledFirstName|l] e eu temos passado muito tempo juntos.\n\n"
 childhood.0013.desc1: "Outro dia, eu até deixei meu [child.Custom('child_favorite_toy')], que é meu brinquedo favorito! Nós realmente nos damos muito bem e estamos nos divertindo muito!"
 childhood.0013.desc2: "[child.GetTitledFirstName] e eu temos passado muito tempo juntos ultimamente, conversando e brincando. Estamos nos divertindo muito!"
 childhood.0013.desc3: ""
 childhood.0013.desc3_rowdy: "Sempre aguenta minhas palhaçadas e me segue em todas as minhas aventuras, o tempo que passamos juntos nunca é entediante!"
 childhood.0013.desc3_curious: "É ótimo em ouvir todos os boatos e sussurros que eu escuto na corte, fornecendo comentários perspicazes e uma nova perspectiva."
 childhood.0013.desc3_charming: "Ninguém ri das minhas piadas tanto quanto [child.Custom('ES_ElElla')]!"
 childhood.0013.desc3_pensive: "Sempre aprecia minha companhia, responde a todas as minhas perguntas e me acompanha com longas conversas."
 childhood.0013.desc3_bossy: "Sempre segue meu exemplo e nunca fico entediado quando estou com [child.Custom('ES_ElElla')]!"
 childhood.0013.desc_fallback: "É sempre uma alegria estar perto de [child.Custom('ES_ElElla')], tanto quando brincamos quanto quando temos algo a discutir!"
 childhood.0013.desc_end: "Eu realmente gosto da companhia dele/dela, e acho que nós dois vamos ser muito próximos por muito tempo."
 childhood.0013.a: "Estou tão feliz por nos conhecermos!"
 childhood.0910.t: "Tormento Constante"
 childhood.0910.opening: "O que [bully.GetTitledFirstName|l] me fez passar quando eu era crianç[ROOT.Char.Custom('ES_OA')]."
 childhood.0910.desc1: "Os olhares, as risadas, a dor… Toda vez que [SCOPE.sCharacter('bully').Custom('ES_LoLa')] vejo, fico de mau humor.\n\nPode ser que agora seja adult[bully.Custom('ES_OA')], mas sei que nunca se tornará uma pessoa decente!"
 childhood.0910.desc2: "\n\nÀs vezes, ainda consigo ouvir sua risada zombeteira enquanto pisoteava meu [ROOT.Char.Custom('child_favorite_toy')]."
 childhood.0910.a: "Nunca [bully.Custom('ES_LoLa')] perdoarei!"
 childhood.0911.t: "Indulgências da Infância"
 childhood.0911.desc_rival: "Pode ser que [victim.GetTitledFirstName|l] já tenha crescido, mas isso não significa que tenha me perdoado pelo que fiz passar quando éramos crianças.\n\nIsso é ótimo, porque o ódio que sinto por [victim.Custom('ES_ElElla')] também cresceu!"
 childhood.0911.opening: "Fico pensando se [victim.GetTitledFirstName|l] se lembra das coisas que fiz a ele quando éramos jovens."
 childhood.0911.desc1: "\n\nMas agora que está crescendo, preciso deixar essas chiquilhadas para trás e me concentrar em outras coisas."
 childhood.0911.desc2: "Sempre vou me lembrar do rosto horrorizado quando destruí seu [victim.Custom('child_favorite_toy')], foi hilário!\n\nMas agora que ele está crescendo, preciso deixar para trás essas indulgências infantis e me concentrar em outras coisas."
 childhood.0911.a: "Até mais, [victim.GetTitledFirstNameNoTooltip|l]."
 childhood.0998.t: "Sentimentos Amadurecendo"
 childhood.0998.desc: "Recordo com carinho os bons momentos que passei com [crush.GetTitledFirstName|l] quando era um[ROOT.Char.Custom('ES_XA')] criança[ROOT.Char.Custom('ES_OA')].\n\nSempre significará muito para mim, mesmo que nada aconteça entre nós quando crescermos."
 childhood.0998.a: "Tenho sorte de ter conhecido[crush.Custom('ES_LoLa')] conhecido."
 childhood.0999.t: "Sentimentos Amadurecendo"
 childhood.0999.desc: "Recordo com carinho os bons momentos que passei com [root_crush.GetTitledFirstName|l] quando éramos jovens.\n\nEmbora [root_crush.Custom('ES_ElElla')] tenha entrado agora no mundo dos adultos, sempre será querido para mim!"
 childhood.0999.desc_unrequited: "Embora nunca tenha correspondido aos meus sentimentos…"
 childhood.0999.a: "Fico feliz por ter[root_crush.Custom('ES_LoLa')|l] conhecido."
 childhood.1000.t: "Uma Amizade Profunda"
 childhood.1000.desc: "Que ótim[friend_to_crush.Custom('ES_XA')] amig[friend_to_crush.Custom('ES_OA')] é [friend_to_crush.GetTitledFirstName|l]! \n\nSempre aproveito muito quando passamos tempo juntos; me entende como ninguém. \n\nEmbora sejamos tão bons amigos, às vezes me pergunto se não desejo algo a mais em nosso relacionamento..."
 childhood.1000.a: "Acho que [friend_to_crush.Custom('ES_ElElla')] gosto mais de [friend_to_crush.Custom('ES_OA')]!"
 childhood.1000.c: "![friend_to_crush.GetSheHe|U] é apenas um[friend_to_crush.Custom('ES_XA')] amig[friend_to_crush.Custom('ES_OA')]!"
 childhood.1000.b: "Eu trouxe [friend_to_crush.Custom('FavoriteTreatDemand')]... quer dar as mãos?"
 sweet_opinion: "Muito Doce"
 crush_crushed_hard: "[crush.GetFirstNameNoTooltip] não quer mais ser amigo(a)…"
 risks_childhood.1000: "Não dá para saber como [friend_to_crush.GetFirstNameNoTooltip] vai reagir..."
 childhood.1001.t: "O Último Confronto"
 childhood.1001.opening: "O tormento interminável ao qual [bully.GetTitledFirstName|l] me submete tem que acabar! Não para de me provocar, de me dar ordens e de me humilhar.\n\n"
 childhood.1001.desc: "Isso não pode continuar! É hora de mostrar a ele/ela com quem está se metendo."
 childhood.1001.fallback: "Embora isso esteja me deixando sobrecarregado, não consigo impedir[bully.Custom('ES_LoLa')]!"
 childhood.1001.a: "Sobre a sua falta de educação..."
 childhood.1001.a.success: "Dou uma lição a [bully.GetTitledFirstNameNoTooltip|l]"
 childhood.1001.a.failure: "[bully.GetTitledFirstNameNoTooltip|l] me bateu"
 childhood.1001.b: "Vamos conversar sobre como você tem se comportado..."
 childhood.1001.b.success: "Convenço a [bully.GetTitledFirstNameNoTooltip|l] para que pare de me intimidar"
 childhood.1001.c: "Maldit[bully.Custom('ES_OA')] seja, [bully.GetTitledFirstNameNoTooltip|l]."
 childhood.1001.d: "[adult_friend.GetFirstNameNoTooltip], você é adult[adult_friend.Custom('ES_OA')], por favor, me ajude!"
 childhood.1002.t: "Um[guardian_parent.Custom('ES_XA')][guardian_parent.Custom('MotherFather')] que apoia"
 childhood.1002.desc1: "Ai! Enquanto brincava no jardim com [friend.GetTitledFirstName|l], caí e arranhei o joelho. Minha [guardian_parent.Custom('MotherFather')] estava bem do outro lado do pátio, aproveitando o bom tempo, e [friend.GetTitledFirstName|l] me instou a ir falar com [guardian_parent.Custom('ES_ElElla')]."
 childhood.1002.desc2: "Ai! Enquanto brincava com meu [ROOT.Char.Custom('child_favorite_toy')], caí e ralei o joelho. Assim que me levantava, meu [guardian_parent.Custom('MotherFather')] vindo pelo caminho ao meu lado e me perguntou se eu estava bem."
 childhood.1002.desc2_add: "\n\n"Tenha coragem, [ROOT.Char.Custom('GetDaughterSon')]", diz. "Vai ficar tudo bem, estou aqui para ajudar. É só ouvir o que tenho a dizer e você saberá como evitar que isso aconteça novamente"."
 childhood.1002.desc3: "Ao me aprofundar no livro que eu supostamente deveria estudar, percebi que tinha dificuldade em entender as nuances mais sutis do tema. \n\nEm breve, devo apresentar o conteúdo para meu [guardian_parent.Custom('MotherFather')], mas se eu continuar por conta própria, posso ficar preso(a) a[ROOT.Char.Custom('ES_OA')] com este livro a noite toda."
 childhood.1002.a: "[guardian_parent.Custom('MotherFather')|U], por favor, me ajude!"
 childhood.1002.b: "Posso cuidar disso sozinho.[ROOT.Char.Custom('ES_OA')]"
 childhood.1002.b_1: "Não vai bem"
 childhood.1002.b_2: "Você se sai bem"
 childhood.1003.t: "Dores do Crescimento"
 childhood.1003.desc1: "Eu estava aproveitando o bom tempo, ouvindo o riso da minha [child.Custom('GetDaughterSon')] [child.GetTitledFirstName|l] e seu amig[friend.Custom('ES_OA')] [friend.GetTitledFirstName|l], quando de repente vi [child.GetTitledFirstName|l] cair e machucar o joelho. Ele/ela se aproximou de mim, a pedido de seu amig[friend.Custom('ES_OA')], e me pediu ajuda para cuidar do ferimento."
 childhood.1003.desc2: "Estava passeando pelos jardins, aproveitando o bom tempo, quando vi meu [child.Custom('GetDaughterSon')] [child.GetTitledFirstName|l] cair e arranhar o joelho enquanto brincava com seu [child.Custom('child_favorite_toy')]. Quando me aproximei de [child.Custom('ES_ElElla')] e perguntei se estava tudo bem, pediu que eu cuidasse do ferimento."
 childhood.1003.desc3: "Eu havia dado uma tarefa exigente ao meu [child.Custom('GetDaughterSon')] [child.GetTitledFirstName|l], pedindo para ler um livro complicado em apenas alguns dias. Na tarde anterior à de quando se supunha que ele fosse me apresentar o conteúdo, ele veio até mim e pediu minha ajuda."
 childhood.1003.a: "Fico feliz que possa contar comigo!"
 childhood.1004.t: "Uma Mente Cansada"
 childhood.1004.desc: "“Você está dormindo o suficiente?”\n\nA pergunta preocupada do meu [guardian_parent.Custom('MotherFather')] me lembra que, ultimamente, não tenho dormido bem. A pressão constante para me sair bem em todas as tarefas pesa mais do que minha vontade de dormir.\n\n[guardian_parent.Custom('ES_ElElla')|U] me diz para eu tirar a noite de folga e ir dormir cedo; aceito encantad[ROOT.Char.Custom('ES_OA')] sua oferta."
 childhood.1004.a: "Obrigad, [guardian_parent.Custom('MotherFather')]."
 childhood.1004.b: "Uma oportunidade perfeita para ler na cama!"
 childhood.1004.c: "Vou ficar acordado e fazer um presente para meu [guardian_parent.Custom('MotherFather')]!"
 childhood.1005.t: "Uma Mente Cansada"
 childhood.1005.desc: ""O que você faz com todo o seu tempo?"\n\nA acusação da minha [guardian_parent.Custom('MotherFather')] ressoa na minha mente. Tenho tentado concluir todas as tarefas que me foram dadas, mas [guardian_parent.Custom('ES_ElElla')] nunca parece satisfeit[guardian_parent.Custom('ES_OA')]."
 childhood.1005.a: "Vou tentar fazer melhor!"
 childhood.1005.b: "Já estou me esforçando ao máximo."
 childhood.1005.c: "#EMP Você não pode me dizer o que fazer, [guardian_parent.Custom('MotherFather')]!#!"
 childhood.1006.t: "Quando os Opostos se Chocam"
 childhood.1006.desc: "Meu [guardian_parent.Custom('MotherFather')] nunca mais me deixa sozin[ROOT.Char.Custom('ES_OA')]. Desde que decidiu que eu não era diligente o bastante, assumiu para si a missão de nunca mais me deixar relaxar.\n\nAinda reclama assim que eu tento escapar para tirar uma soneca rapidinha!"
 childhood.1006.a: "[guardian_parent.Custom('MotherFather')|U] nunca está feliz[guardian_parent.Custom('ES_OA')]!"
 childhood.1006.b: "Acho que vou tentar..."
 childhood.1006.c: "ZZZzzz#DIE1 zzz#!#DIE2 zzz...#!"
 childhood.1007.t: "Uma Sombra em Crescimento"
 childhood.1007.opening: "[bully.GetTitledFirstName] é uma verdadeira dor de cabeça!\n\n"
 childhood.1007.young_malicious: "Estava brincando com meu [ROOT.Char.Custom('child_favorite_toy')] quando [bully.Custom('ES_ElElla')] entrou de repente no quarto e arrancou o brinquedo de minhas mãos."
 childhood.1007.young_extroverted: "[bully.Custom('ES_ElElla')|U] sempre conta mentiras sobre mim para as outras crianças, fazendo com que gostem menos de mim."
 childhood.1007.young_dominant: "Eu estava brincando no jardim com outras crianças quando [bully.Custom('ES_ElElla')] veio de repente e ordenou a todos que parassem de brincar comigo."
 childhood.1007.young_emotional: "Estava apenas passando por um corredor ao lado de [bully.Custom('ES_ElElla')] quando de repente começou a chorar alto, dizendo que eu tinha batido em [bully.Custom('ES_RleRla')]."
 childhood.1007.malicious: "Estava passeando pelos jardins quando, de repente, [bully.Custom('ES_ElElla')] saiu da vegetação e me jogou na lama. Ficou até rindo o tempo todo."
 childhood.1007.dominant: "Parece que ordenou às outras crianças que me evitem, e agora todas ficam quietas quando estou por perto. Eu sei que é culpa sua e que as outras crianças não querem dizer nada com isso, mas ainda assim dói."
 childhood.1007.extroverted: "Sempre que tem a chance, faz o possível para convencer as outras crianças de que eu sou uma pessoa horrível. Mente e inventa histórias, e só eu sei que não é verdade."
 childhood.1007.fallback: "Quando eu passava ao lado de [bully.Custom('ES_ElElla')], de repente esticou a perna e me deu uma rasteira!"
 childhood.1007.end: "\n\n não me deixa em paz, não sei o que fazer."
 childhood.1007.a: "[bully.Custom('ES_ElElla')|U] é o pior!"
 childhood.1007.b: "[bully.GetFirstNameNoTooltip|U] #EMP deve#! ser capaz de ver a razão!"
 childhood.1007.b.success: "[bully.GetSheHe|U] eventualmente vê a razão"
 childhood.1007.b.failure: "[bully.GetSheHe|U] continua a praticar bullying"
 childhood.1007.c: "#DIE1 Resmungo#! #DIE2 resmungo#! Vou descontar minha frustração em [victim.GetFirstNameNoTooltip]..."
 childhood.1007.d: "Não. #EMP Sou eu quem pratica bullying.#!"
 childhood.1007.d.success: "Você reverte a situação contra [bully.GetFirstNameNoTooltip]"
 childhood.1007.d.failure: "[bully.GetFirstNameNoTooltip] não cede"
 childhood.1007.c.toast: "[child.GetFirstNameNoTooltip] pratica bullying com você"
 childhood.1008.t: "Lidar de Forma Não Convencional"
 childhood.1008.opening: "Finalmente [victim.GetTitledFirstName|l] serve para alguma coisa!\n\nA vida tem sido bastante estressante ultimamente, mas [victim.Custom('ES_ElElla')] conseguiu me deixar mais relaxado.\n\n"
 childhood.1008.1: "Encontrei-me com [victim.Custom('ES_ElElla')] no corredor, e justamente quando passava por mim, estiquei a perna e derrubei com uma rasteira. A expressão em seu rosto não teve preço!"
 childhood.1008.2: "Sempre que conversamos, faço questão de questionar tudo o que diz e de zombar das conclusões que apresenta."
 childhood.1008.3: "Quando estava prestes a dar uma mordida no pão do café da manhã, dei um tapa nas costas. A bagunça sobre a mesa foi bastante nojenta, mas o som que ele fez foi hilário!"
 childhood.1008.a: "Isso ajuda a aliviar a tensão!"
 childhood.1008.b: "Vamos seguir isso com uma boa surra!"
 childhood.1008.c: "[extra_bully.GetFirstNameNoTooltip]! Me ajuda a implicar com est[victim.Custom('ES_EA')] [victim.Custom2('InsultNoun', ROOT.Char)] [victim.Custom2('InsultAdjective', ROOT.Char)]!"
 childhood.1009.t: "A Preocupação de um Amigo"
 childhood.1009.opening: "[friend.GetTitledFirstName] é um[friend.Custom('ES_XA')] bom[friend.Custom('ES_XA')] amig[friend.Custom('ES_OA')]. Percebeu que algo me afligia e me convenceu a compartilhar meus pensamentos com ela.\n\n"
 childhood.1009.1: ""Para que estamos aqui? Qual é o plano [ROOT.Char.GetFaith.FateGodNamePossessive] para todos nós?""
 childhood.1009.2: "O que estou destinad[ROOT.Char.Custom('ES_OA')] a ser quando crescer?"
 childhood.1009.3: "\"Como você pode saber se o afeto de alguém por você é genuíno?\""
 childhood.1009.end: "\n\nSó de falar com [friend.Custom('ES_ElElla')], já me sinto melhor!"
 childhood.1009.a: "Que sorte a minha ter um[friend.Custom('ES_XA')] amig[friend.Custom('ES_OA')] tão bom!"
 childhood.1009.b: "Você é tão bon[friend.Custom('ES_OA')] que quero que você tenha meu [ROOT.Char.Custom('child_favorite_toy')]!"
 gave_toy_opinion: "Deu Brinquedo"
 childhood.1009.c: "Você é tão list[friend.Custom('ES_OA')]; [friend.GetFirstNameNoTooltip]. Conte-me mais!"
 childhood.1010.t: "Sempre em Meus Pensamentos"
 childhood.1010.opening: "Não consigo parar de pensar em [crush.GetTitledFirstName|l], como sorri e como fala.\n\n"
 childhood.1010.returned: "Apenas saber que meus sentimentos são correspondidos me traz grande alegria e tranquiliza meu coração."
 childhood.1010.not_returned: "Me parte o coração que [crush.Custom('ES_ElElla')] não corresponda aos meus sentimentos."
 childhood.1010.a: "Meu querid[crush.Custom('ES_OA')] [crush.GetTitledFirstNameNoTooltip|l]!"
 childhood.1010.b: "Oh, tristeza!"
 childhood.1010.c: "O amor é uma mentira... #EMP uma mentira!#!"
 childhood.1010.d: "[crush.GetFirstNameNoTooltip], eu trouxe [ROOT.Char.Custom('SeductionGiftTypeIndefiniteSimple')] para você!"
 childhood.1010.d.effect: "Outro presente pode derreter o coração dela... ou partir o seu de novo"
 childhood.1010.e: "Oh, meu coração está cheio de felicidade e alegria ao ver você!"
 hopeless_romantic_modifier: "Romântic Incorrigível"
 hopeless_romantic_modifier_desc: "Este personagem acredita fortemente no romance e no amor cortesão, e é assim desde muito jovem.\n[success_chance|E] de [GetScheme('courting').GetTypeName]: #P +10 %#!"
 childhood.1011.t: "O Caminho do Coração"
 childhood.1011.opening: "Notei que, ultimamente, [crush_returned.GetTitledFirstName|l] me presta mais atenção, apreciando tanto minhas piadas quanto minhas opiniões.\n\n"
 childhood.1011.returned: "É bom se sentir apreciad[ROOT.Char.Custom('ES_OA')] desta maneira e percebi como pode ser agradável [crush_returned.GetFirstNameNoTooltip].\n\nNa verdade, acho que posso estar tão interessad[ROOT.Char.Custom('ES_OA')] em [crush_returned.Custom('ES_ElElla')] quanto [crush_returned.Custom('ES_ElElla')] está em mim!"
 childhood.1011.not_returned: "Embora a consideração seja boa, está chegando ao ponto de me irritar. Por que ele não me deixa em paz[ROOT.Char.Custom('ES_OA')]?"
 childhood.1011.a: "[crush_returned.GetFirstNameNoTooltip], acho que gosto de você."
 childhood.1011.b: "Está me irritando."
 childhood.1011.c: "Não, meu coração pertence a [true_crush.GetFirstNameNoTooltip]!"
 heartbroken_opinion: "De Coração Partido"
 childhood.1012.t: "Punição Severa"
 childhood.1012.desc: "Sei que recentemente tenho tido dificuldades com meus estudos e agora sei que minha [guardian_parent.Custom('MotherFather')] está decepcionad[guardian_parent.Custom('ES_OA')] comigo. O que eu nunca teria imaginado é que chegaria ao ponto de tirar meu brinquedo favorito, meu querido [ROOT.Char.Custom('child_favorite_toy')]!\n\n"
 childhood.1012.desc_2: "\"Lá vai ele para a lareira.\" [guardian_parent.Custom('MotherFather')] diz, lançando-o nas chamas abertas. \"Agora talvez você repense em ser um [ROOT.Char.Custom('GetDaughterSon')] tão sem valor.\"\n\n"
 childhood.1012.desc2: "O pior é que parecia indiferente ao meu sofrimento."
 childhood.1012.desc3: "O pior é que parecia desfrutar do meu sofrimento."
 childhood.1012.a: "Quão cruel pode ser!"
 childhood.1012.b: "Como... como #EMP você pôde!#! Eu te odeio!"
 cruel_upbringing_modifier: "Criação Cruel"
 cruel_upbringing_modifier_desc: "Esse personagem foi criado com desconfiança e crueldade."
 childhood.1013.t: "A Destruição do [victim.Custom('child_favorite_toy')]"
 childhood.1013.desc: "Encontrei minha [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('victim'))] [victim.GetFirstName] brincando com seu [victim.Custom('child_favorite_toy')] no jardim, gritando e rindo.\n\n[victim.Custom('ES_ElElla')|U] não tinha nenhum direito de estar tão feliz, e o que tinha de especial aquele brinquedo bobo de [victim.Custom('child_favorite_toy')]? Quebrou como qualquer coisa velha quando o arranquei de suas mãos e o esmaguei."
 childhood.1013.a: "Você deveria ter visto a cara!"
 childhood.1013.b: "Não posso acreditar no que fiz… Fui um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GirlBoy')] #EMP mal[ROOT.Char.Custom('ES_OA')]!#!"
 childhood.1014.t: "A Destruição do [ROOT.Char.Custom('child_favorite_toy')]"
 childhood.1014.desc: "[bully.GetTitledFirstName][bully.Custom('ES_XA')], meu tormentador constante, destruiu meu [ROOT.Char.Custom('child_favorite_toy')]! Enquanto eu estava brincando, ele se aproximou calmamente de mim e arrancou o brinquedo das minhas mãos, esmagando-o contra o chão.\n\n\"Quem ainda brinca com um [ROOT.Char.Custom('child_favorite_toy')]?\""
 childhood.1014.a: "É uma pessoa horrível!"
 childhood.1015.t: "Soluções Diplomáticas"
 childhood.1015.desc: "Ante a insistência de [educator.GetTitledFirstName|l], meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('study_friend'))] [study_friend.GetFirstName] e eu temos acompanhado as negociações sobre o envolvimento da coroa na administração local de [province.GetName].\n\nDurante as conversas, não pude deixar de notar que [province_holder.GetTitledFirstName|l] não faz ideia de como coordenar tal esforço. Talvez eu deva intervir."
 childhood.1015.a: "\"Se você apenas me ouvisse por um momento...\""
 childhood.1015.b: "Tenho muito a aprender – devo ouvir."
 childhood.1015.b.tt: "Isso beneficiará tanto os estudos de [study_friend.GetFirstNameNoTooltip] quanto os seus estudos de [diplomacy|E]"
 childhood.1015.a.flavor: "Por que eles estão rindo? Minhas ideias são #MP ótimas!#!"
 childhood.1016.t: "Questões Marciais"
 childhood.1016.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('study_friend'))] [study_friend.GetFirstName] e eu estamos observando as tropas realizarem uma batalha simulada nos arredores da cidade como parte dos nossos estudos.\n\n\"Agora, contornem e ataquem o flanco deles!\", grita [commander.GetTitledFirstName|l] e, antes que eu perceba, dou um passo à frente e chamo a atenção de"
 childhood.1016.a: "\"Na verdade, acho que um ataque direto funcionaria melhor.\""
 childhood.1016.b: "Faço um gesto para recusar. — devo apenas observar."
 childhood.1016.b.tt: "Isso ajudará tanto [study_friend.GetFirstNameNoTooltip] quanto os seus estudos em [Concept( 'martial', 'marcialidad' )|E]"
 childhood.1017.t: "Uma Questão de Grãos"
 childhood.1017.desc: "As negociações com [province_holder.GetTitledFirstName|l] de [province.GetName] sobre o manejo do grão na região já duram horas. Minha [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('study_friend'))], [study_friend.GetFirstName], tem me lançado olhares na última meia hora, mostrando que não estou só[ROOT.Char.Custom('ES_OA')] em meu sofrimento.\n\nQuando todos saem da sala para um recesso, vejo um livro-caixa aberto na mesa."
 childhood.1017.a: "Fico curios para saber o que mudar esses números irá causar."
 childhood.1017.a.tt: "Às vezes, aprendemos com os erros – isso beneficiará tanto os estudos de [study_friend.GetFirstNameNoTooltip] quanto os seus estudos de [stewardship|E]"
 childhood.1017.b: "É melhor deixar como está."
 childhood.1018.t: "Incidente Intrigante"
 childhood.1018.desc: "Se há algo que [educator.GetTitledFirstName|l] tem tentado me incutir, é que às vezes uma mentira é necessária.\n\nQuando meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('study_friend'))] [study_friend.GetFirstName] e eu ouvimos [province_holder.Custom('ES_AlAla')] [province_holder.GetTitledFirstName|l] de [province.GetName] falar em manipular os números de seu relatório de impostos para que a região possa prosperar, me pego pensando na lição de [educator.GetFirstName]."
 childhood.1018.a: "Essa informação precisa chegar até [educator.GetFirstNameNoTooltip]!"
 childhood.1018.a.tt: "Isso beneficiará tanto os estudos de [study_friend.GetFirstNameNoTooltip] quanto os seus estudos de [intrigue|E]"
 childhood.1018.b: "Eles realmente poderiam #EMP usar#! esse dinheiro extra."
 childhood.1019.t: "Ler ou Não Ler"
 childhood.1019.desc: "Ao meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('study_friend'))] [study_friend.GetFirstName] e a mim foi confiada a tarefa de entregar um monte de livros aos delegados de [province.GetName]. A tentação de prolongar a tarefa por alguns minutos, ou até alguns dias, para poder estudá-los é quase irresistível.\n\nO fato de que, aparentemente, seja de grande importância entregar os livros rapidamente para não interromper a produtividade da região só aumenta nossa curiosidade."
 childhood.1019.a: "Vamos garantir que os livros sejam estudados #EMP minuciosamente#!."
 childhood.1019.a.tt1: "Isso beneficiará tanto os estudos de [study_friend.GetFirstNameNoTooltip] quanto os seus estudos de [learning|E]"
 childhood.1019.a.tt2: "Isso beneficiará tanto os estudos de [study_friend.GetFirstNameNoTooltip] quanto os seus estudos de [stewardship|E]"
 childhood.1019.b: "Os livros chegarão ao seu destino no prazo!"
 childhood.2001.t: "O Gatinho"
 childhood.2001.desc_educator: "Estou brincando sob a supervisão de [educator.GetTitledFirstName|l]. Quando, de repente, ouço um ruído. É pequeno e fraco, mas está ali!"
 childhood.2001.desc: "Enquanto estou brincando perto de [ROOT.Char.Custom('TerrainType')], de repente ouço um som. É pequeno e fraco, mas está lá!"
 childhood.2001.desc_ending: "\n\nOlho em cada arbusto, sob cada pedra, em todas as direções e... lá! Um gatinho pequenino está sentado debaixo de um arbusto espinhoso, completamente sozinho."
 childhood.2001.a: "Agora ele é meu gatinho!"
 childhood.2001.b: "[educator.GetTitledFirstNameNoTooltip|l] às vezes parece se sentir muito soz[educator.Custom('ES_OA')]…"
 childhood.2001.c: "Fico curios para saber o que ele está escondendo lá dentro...!"
 gift_of_cat_opinion: "Presenteado com um Gato"
 gift_of_dog_opinion: "Presenteado com um Cachorro"
 childhood.2002.desc: "Estou do lado de fora com [ward.GetTitledFirstName|l] quando desaparece de repente. Mas, antes que eu tenha tempo de me preocupar de verdade, volta saltando, segurando um gatinho nas mãos!\n\n"[educator.GetFirstNameNoTooltip], [educator.GetFirstNameNoTooltip]! Olha o que eu encontrei. É um presente para você!"."
 childhood.2002.a: "Obrigad!"
 childhood.2002.b: "Eca, coloque de volta onde encontrou."
 childhood.2002.c: "Ah, você encontrou #EMP meu#! presente para #EMP você#! E como lidamos com dívidas?"
 childhood.2002.d: "Finalmente, algo para torturar!"
 childhood.2003.t: "O Cachorrinho"
 childhood.2003.desc_educator: "Estou passeando com [educator.GetTitledFirstName|l] quando ouço um ruído. É um som pequenino, frágil e assustado."
 childhood.2003.desc_friend: "Estou brincando lá fora com [friend.GetTitledFirstName|l] quando ouço um som. É um som pequeno, frágil e assustado."
 childhood.2003.desc: "Estou brincando quando ouço um som. É um som pequeno, frágil e assustado."
 childhood.2003.desc_ending: "\n\nProcuro por todos os lados — debaixo de cada pedra, ao redor de cada esquina, atrás de cada arbusto — e finalmente encontro! Um cachorrinho pequeno, completamente sozinho, sentado entre duas pedras."
 childhood.2003.a: "Agora ele é meu cachorrinho!"
 childhood.2003.b: "Aqui, [friend.GetFirstNameNoTooltip], fique com ele."
 childhood.2003.c: "[educator.GetTitledFirstNameNoTooltip|l] às vezes parece se sentir muito soz[educator.Custom('ES_OA')]…"
 childhood.2003.d: "Fico curios para saber o que ele está escondendo lá dentro...!"
 childhood.2004.desc: "Estou do lado de fora com [ward.GetTitledFirstName|l] quando desaparece de repente. Mas, antes que eu tenha tempo de me preocupar de verdade, ele volta saltitando, segurando um cachorrinho nas mãos!\n\n"[educator.GetFirstNameNoTooltip], [educator.GetFirstNameNoTooltip]! Olha o que eu encontrei. É um presente para você!"."
 childhood.2005.desc: "Estou brincando com [ward.GetTitledFirstName|l] quando desaparece de repente. Onde foi parar? Giro em círculos, procurando, e, de repente, reaparece se aproximando de mim com um cachorrinho nos braços.\n\n"[friend.GetFirstNameNoTooltip]! É para você!"."
 childhood.2005.a: "Um cachorrinho!!!"
 childhood.2005.b: "Eca, guarda isso."
 childhood.2006.desc: "Estou brincando com [ward.GetTitledFirstName|l] quando desaparece de repente. Onde foi parar? Giro em círculos, procurando, e de repente reaparece, vindo em minha direção com um gatinho nos braços.\n\n\"[friend.GetFirstNameNoTooltip]! É para você!\"."
 childhood.2006.a: "Um gatinho!!!"
 childhood.2006.b: "Eca, guarda isso."
 childhood.2010.t: "Expectativas"
 childhood.2010.desc_opening: "\"Você está sempre lá para mim, e espero que você saiba que sou grat.\"\n\n"
 childhood.2010.desc_shy: "[ward.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim em uma rara demonstração de coragem e abertura."
 childhood.2010.desc_mean: "[ward.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim em um raro momento de honestidade."
 childhood.2010.desc_proud: "[ward.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim em um raro momento de apreciação."
 childhood.2010.desc_fallback: "[ward.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim em um raro momento de contemplação."
 childhood.2010.a: "Quando eu precisar, espero que você esteja lá por mim também."
 childhood.2010.b: "Isso é o que significa ser um guardião."
 childhood.2011.desc: "[guardian.Custom2('MyCharacterIntroduction', ROOT.Char)] ultimamente tem se esforçado muito na minha educação. Sou grato, mas também deixou claro que espera que eu retribua seu esforço mais adiante; é assim que as coisas funcionam. Tenho cert[ROOT.Char.Custom('ES_OA')] de que tem razão."
 childhood.2011.tt: "Isso aprimora um pouco a sua educação"
 childhood.2011.a: "Afinal, meu/minha mentor[guardian.Custom('ES_XA')]."
 childhood.2100.t: "L de Linguagem"
 childhood.2100.desc: "Meu tutor[educator.Custom('ES_XA')], [educator.GetTitledFirstName|l], me ensina bem. Às vezes ouço [educator.Custom('ES_LeLa')] falar em [educator.GetCulture.GetLanguage.GetNameNoTooltip]... Acho que é o que fala em casa.\n\nEmbora comigo fale principalmente em [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip], também está tentando me ensinar um pouco da sua língua materna.\n\nManter dois idiomas na cabeça é difícil... mas talvez valha a pena."
 childhood.2100.a: "Devo ouvir e me concentrar, talvez eu aprenda?"
 childhood.2100.b_hash: "Não, prefiro ir brincar!"
 learn_language_ongoing.2100.a.success: "Você aprende a língua de [educator.GetFirstNameNoTooltip]"
 learn_language_ongoing.2100.a.success_parent: "[ward.Custom('GetDaughterSon')|U] aprende a Língua!"
 learn_language_ongoing.2100.a.success_parent_desc: "[educator.GetFirstNameNoTooltip] ensinou a [ward.GetFirstName] o [language|lE] [educator.GetCulture.GetLanguage.GetName]"
 learn_language_ongoing.2100.a.failure: "Você não consegue aprender a língua de [educator.GetFirstNameNoTooltip]"
 childhood.2200.t: "Você Fala Meu Idioma?"
 childhood.2200.desc: "Enquanto acompanho a [educator.GetNameNoTooltip], percebo que fala no idioma da corte ao meu redor, e, por estranho que pareça, estou começando a entendê-lo. Se eu me esforçar, posso me tornar fluente em nosso idioma da corte!"
 childhood.2200.a: "Posso falar como os adultos!"
 childhood.2200.b: "Isso é um saco, fale em [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]!"
 childhood.2300.t: "Os Idiomas em Minha Árvore Familiar"
 childhood.2300.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('parent'))] costuma inserir uma palavra de [parent.GetCulture.GetLanguage.GetName] aqui e ali, e percebo que vou entendendo melhor a língua. Tenho certeza[ROOT.Char.Custom('ES_OA')] de que, se eu me esforçar, conseguirei dominá-la bem o suficiente para falar com [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('parent'))] de uma forma nova!"
 childhood.2300.a: "Posso falar como [parent.Custom('GetMamaPapa')]!"
 childhood.2300.b: "Isso é chato! Por que aprender [parent.GetCulture.GetLanguage.GetNameNoTooltip] afinal!?"
 childhood.2300.a.success_parent_desc: "[ward.GetFirstName] aprendeu o [language|lE] [parent.GetCulture.GetLanguage.GetName] por observação."
 childhood.2400.t: "Idade da Razão"
 childhood.2400.desc: "Educar [questioning_ward.GetFirstName] é gratificante, mas nem sempre é fácil. Hoje mesmo, [questioning_ward.GetSheHe] queria 'fazer algumas perguntas simples sobre [ROOT.Char.GetFaith.GetName|l]', mas rapidamente seus questionamentos se transformaram em dúvidas ferozes contra nossa fé.\n\nSerá que [questioning_ward.GetFirstNameNoTooltip] está #EMP questionando#! [ROOT.Char.GetFaith.GetNameNoTooltip|l]?"
 childhood.2400.a.neutral: "Deixe-me acalmar suas dúvidas."
 childhood.2400.a.zealous: "Eu vou apagar essas dúvidas de sua mente."
 childhood.2400.a.toast.succ: "[questioning_ward.Custom('ES_AlAla')|U] [questioning_ward.GetTitledFirstName|l] é convencido pela sua fé."
 childhood.2400.a.toast.fail: "[questioning_ward.GetTitledFirstName] ainda abriga suas dúvidas."
 childhood.2400.b: "[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('realm_priest'))|U] [realm_priest.GetFirstNameNoTooltip] pode responder melhor a estas questões."
 childhood.2400.b.toast.succ: "[ROOT.Char.Custom('MyPriestTitle')|U] [realm_priest.GetFirstName] convenceu [questioning_ward.Custom('ES_AlAla')] [questioning_ward.GetTitledFirstName|l]"
 childhood.2400.b.toast.fail: "[ROOT.Char.Custom('MyPriestTitle')|U] [realm_priest.GetFirstName] não conseguiu convencer [questioning_ward.Custom('ES_AlAla')] [questioning_ward.GetTitledFirstName|l]"
 childhood.2400.c: "Você #EMP tem#! um ponto..."
 childhood.2400.d: "Você errou ao me dizer isso, [questioning_ward.GetFirstNameNoTooltip]."
 childhood.2410.desc.intro: "[questioning_ward.GetFirstNameNoTooltip] suspira com alívio, assim como eu. À medida que compartilhamos nossa descrença, a distância entre"
 childhood.2410.desc.parentchild: "[ROOT.Char.Custom('MotherFather')] e [questioning_ward.Custom('GetDaughterSon')]"
 childhood.2410.desc.guardianward: "tutor[ROOT.Char.Custom('ES_XA')] e pupilo[questioning_ward.Custom('ES_OA')]"
 childhood.2410.desc.outro: "se fecha um pouquinho."
 childhood.2410.a: "Isso será nosso segredo."
