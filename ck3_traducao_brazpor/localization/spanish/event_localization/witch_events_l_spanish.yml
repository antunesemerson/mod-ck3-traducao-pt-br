l_spanish:
 witch.1001.message: "Indução da Bruxaria"
 child_witch_conversion_success_effect.desc: "[child.GetFirstNameNoTooltip] está convencid[child.Custom('ES_OA')]"
 child_witch_conversion_failure_effect.desc: "[child.GetFirstNameNoTooltip] está em dúvida"
 child_witch_conversion_critical_failure_effect.desc: "[child.GetFirstNameNoTooltip] revela meu segredo"
 child_witch_conversion_critical_failure_effect.liege.desc: "[child.GetFirstNameNoTooltip] revela que seu tutor[guardian.Custom('ES_XA')] é brux[guardian.Custom('ES_OA')]"
 witch.1002.t: "A Era do Conhecimento"
 witch.1002.desc: "[child.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está no limbo entre a infância e a idade adulta. Eu a ensinei o suficiente para compreender a verdade, e ela ainda é jovem o bastante para ter a mente aberta. Se eu quiser introduzir[child.Custom('ES_LoLa')] ao serviço de [ROOT.Char.GetFaith.WitchGodNamePossessive], é agora ou nunca."
 witch.1002.a: "[child.GetFirstNameNoTooltip] merece conhecer Seu poder."
 witch.1002.b: "[child.GetFirstNameNoTooltip] é um caso perdido."
 witch.1003.t: "Conhecimento Oculto"
 witch.1003.desc: "Há certas coisas que [guardian.Custom2('MyCharacterIntroduction', ROOT.Char)] me contou e sobre as quais ninguém mais fala. Nunca nos aprofundamos nesses assuntos, e sei que o melhor é não fazer perguntas. \n\nNo entanto, nesta noite, algo parece diferente entre nós. Quando nos sentamos para ler, [guardian.GetFirstNameNoTooltip] me pergunta se há algo sobre o qual estou curioso…"
 witch.1003.a: "Sim, conte-me tudo! Por favor!"
 witch.1003.b: "Não, acho que não..."
 witch.1003.c: "Isso é blasfêmia!"
 witch.2001.t: "$convert_to_witch$: A Hora Chegou"
 witch.2001.start.desc: "Eu não posso forçar [target.GetFirstName] a enxergar a verdade, mas fiz tudo o que pude para abrir a sua mente."
 witch.2001.secrecy.desc: "Rezo para [owner.GetFaith.WitchGodName] que [target.GetFirstNameNoTooltip] tenha se conectado a algo em nossas conversas inocentes e nos textos sagrados que deixei nos seus aposentos."
 witch.2001.no_secrecy.desc: "Rezo a [owner.GetFaith.WitchGodName] que [target.GetFirstNameNoTooltip] tenha tirado algo em claro dessas longas discussões e dos textos sagrados que lhe dei."
 witch.2001.end.desc: "\n\nAgora devo ir até [target.Custom('ES_ElElla')] e convidar[target.Custom('ES_LoLa')] para a comunhão de sua fé… ou desistir desta empreitada."
 witch.2001.a: "[target.Custom('ES_ElElla')|U] merece tomar sua própria decisão."
 witch.2001.b1: "Os riscos são muito grandes."
 witch.2001.b2: "Não, [target.GetFirstNameNoTooltip] não está pront[target.Custom('ES_OA')]."
 witch.2001.a.tt: "Você prossegue com seu plano de converter [target.GetShortUIName] para o caminho de [owner.GetFaith.WitchGodNamePossessive]"
 witch.2002.t: "Um[owner.Custom('ES_XA')] servo[owner.Custom('ES_XA')] [owner.GetFaith.WitchGodNamePossessive]"
 witch.2002.start.desc: "Ao abrir meus olhos na escuridão, sou imediatamente tomado por uma sensação sombria. Alguém está me observando?\n\n\"Você está pronto para abraçar a verdade, [ROOT.Char.GetFirstNameNoTooltip]?\""
 witch.2002.discovery.desc: "Eu reconheceria aquela voz em qualquer lugar. Deve ser [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 witch.2002.no_discovery.desc: "Eu me sento, subitamente completamente desperto. Procuro pela fonte da voz desconhecida d [owner.GetWomanMan], mas há apenas sombras."
 witch.2002.end.desc: "\n\n\"[owner.GetFaith.WitchGodName|U] oferece a você sua bênção. Você irá aceitá-la?\""
 witch.2002.a: "De todo o meu coração!"
 witch.2002.b: "Eu não quero ter nada a ver com isso. Desapareça, demônio!"
 witch.2002.c: "O mundo saberá do seu pecado, [owner.GetFirstNameNoTooltip]!"
 witch.2003.t: "$convert_to_witch$: Um novo noviço"
 witch.2003.desc: "Vejo a silhueta adormecida de [target.GetFirstName] enquanto faço uma breve oração a [owner.GetFaith.WitchGodName]. Assim que a última palavra sussurrada sai dos meus lábios, [target.GetFirstName] se remexe, como se sua mente subconsciente estivesse esperando por este momento.\n\nQuando saio das sombras e ofereço a [target.GetFirstNameNoTooltip] sua bênção, não há medo nem hesitação em seus olhos. Não, sua aceitação é plena e ávida."
 witch.2003.a: "Bem-vind[target.Custom('ES_OA')] à nossa comunhão, [target.Custom('SisterBrother')]."
 witch.2003.b: "Agora finalmente posso mostrar meu verdadeiro eu."
 witch.2003.b.tt: "[target.GetShortUIName] precisa conhecer o seu [secret|lE] para ser convidad para um $activity_witch_ritual$"
 witch.2003.c: "[target.Custom('ES_ElElla')|U] terá que encontrar seu próprio caminho."
 witch.2003.message: "A brux[owner.Custom('ES_OA')] se revela diante de mim"
 witch.2004.t: "$convert_to_witch$: Mente Fechada, Coração Frio"
 witch.2004.start.desc: "[target.GetFirstName] se mexe em sonhos enquanto [SelectLocalization( IsLandlessAdventurer(target), 'witch.2004.start_target_laamp', 'witch.2004.start_target_landed')]. \"Quem é aí?\", pergunta com voz trêmula.\n\n\"Meu nome não importa. Estou aqui para servir a [owner.GetFaith.WitchGodName]\".\n\n"
 witch.2004.start_target_landed: "entro pela janela"
 witch.2004.start_target_laamp: "me arrasto para dentro da tenda"
 witch.2004.discovered.desc: "[target.GetFirstNameNoTooltip] franze os olhos. \"[ROOT.Char.GetFirstNameNoTooltip], é você? '[owner.GetFaith.WitchGodName|U]'? O que é essa bobagem?!"
 witch.2004.not_discovered.desc: "[target.GetFirstNameNoTooltip] salta da cama, alcançando algo na mesa de cabeceira. Provavelmente nada bom. \"Eu não quero ter nada a ver com você ou suas mentiras! Desapareça, demônio!\" [target.GetFirstNameNoTooltip] grita, e eu não demoro a obedecer."
 witch.2004.a: "Desculpe, me confundi de [target.Custom('GetChamber')]!"
 witch.2005.toast: "Feitiçaria descoberta"
 witch.2005.end.desc: "[ROOT.Char.GetFirstNameNoTooltip], é você? '[owner.GetFaith.WitchGodName|U]'? [target.GetLiege.Custom2('MyCharacterIntroduction', target)|U] ouvirá falar da sua blasfêmia!\""
 witch.2005.a: "Por favor, não é o que você está pensando!"
 witch.2005.a.tt: "Na verdade, acho que é #EMP exactamente#! o que pensa…"
 witch.2006.t: "$convert_to_witch$: A Revelação"
 witch.2006.desc: "[target.Custom2('MyCharacterIntroduction', ROOT.Char)|U] não está em sua cama quando me esgueiro pela janela durante a missão que me foi confiada por [owner.GetFaith.WitchGodName]. Aonde ia…?\n\n"Quem está aí?!".\n\nViro-me e vejo [target.GetTitledFirstName|l] agachad[target.Custom('ES_OA')] sobre um pentagrama desenhado no chão."
 witch.2006.a: "Ah, você já estava...! Olá, [target.Custom('SisterBrother')|U]!"
 witch.2007.t: "Aliado Oculto"
 witch.2007.desc: "Estou no meio de um ritual noturno em honra de [owner.GetFaith.WitchGodName], quando ouço um barulho atrás de mim. Um ladrão? Um visitante? Um assassino?!\n\nQuando me viro, dou de cara com [owner.Custom2('MyCharacterIntroduction', ROOT.Char)], vestid[owner.Custom('ES_OA')] com uma túnica negra adornada com a inconfundível marca de [owner.GetFaith.WitchGodName]... A vestimenta clássica para as conversões."
 witch.2007.a: "Não há necessidade disso comigo, #EMP [owner.Custom('SisterBrother')]#!!"
 witch.2010.t: "$convert_to_witchcraft_key$: Ouvido"
 witch.talk.2010: "[target.GetFirstName] e eu conversamos sobre [owner.GetFaith.WitchGodName] e a sua vontade por muitas horas. Quando o céu sutilmente muda para azul no horizonte, nos despedimos."
 witch.leave.2010: "Transmito a [target.GetFirstName] o mais essencial."
 witch.end.2010: "\n\nAo abrir a porta do quarto, ouço passos rápidos desaparecendo pelo corredor. Será que alguém estava ouvindo?"
 witch.2010.a: "Que [ROOT.Char.GetFaith.HighGodName] se dane!"
 witch.2010.a.tt: "Alguém conhece o seu [secret|lE]"
 witch.2010.message: "Segredo Descoberto"
 convert_to_witchcraft_key: "Converter para Bruxaria"
 convert_to_witchcraft_interaction: "$convert_to_witchcraft_key$ #weak (Esquema)#!"
 convert_to_witchcraft_interaction_desc: "Guiaré a [recipient.GetShortUINameNoTooltip] pelo caminho de [actor.GetFaith.WitchGodNamePossessive] e lhe mostrarei a verdadeira extensão do Seu poder."
 convert_to_witchcraft: "$convert_to_witchcraft_key$"
 convert_to_witchcraft_desc: "Guiaré a [SCHEME.GetTargetCharacter.GetShortUINameNoTooltip] por el caminho [SCHEME.GetOwner.GetFaith.WitchGodNamePossessive] e lhe mostrarei a verdadeira extensão de Seu poder."
 convert_to_witchcraft_desc_general: "Guiar um alvo pelo verdadeiro caminho e mostrar a ele o alcance desse poder."
 convert_to_witchcraft_action: "Converter"
 convert_to_witchcraft_interaction_notification: "Converter para Bruxaria"
 convert_to_witchcraft_scheme_invalidated_title: "@scheme_icon! Esquema de Conversão para Bruxaria Terminado"
 convert_to_witchcraft_general_desc: "Um esquema para introduzir um alvo na bruxaria na esperança de aumentar o seu covil."
 ### REVEAL AS WITCH INTERACTION ###
 reveal_as_witch_interaction: "Revelar como Bruxa"
 reveal_as_witch_interaction_desc: "Revelar a sua devoção a [actor.GetFaith.WitchGodName] para uma colega [GetTrait('witch').GetName( GetNullCharacter )]"
 witch.2900.t: "[actor.Custom2('AppropriateGreetingPositive', ROOT.Char )]"
 witch.2900.desc: "Você tem sido uma inspiração para mim, e sinto que merece saber o que tenho escondido do mundo.\n\nEu também sigo [actor.GetFaith.WitchGodName] e estudo seus mistérios. Espero que nosso empenho compartilhado nos aproxime mais.\n\nQue [actor.GetFaith.WitchGodMistressMaster] cuide de você com sua habitual astúcia."
 witch.2900.a: "Nosso número está aumentando!"
 witch.2901.t: "[recipient.Custom2('AppropriateGreetingPositive', ROOT.Char )]"
 witch.2901.desc: "É com alegria que tomo conhecimento do seu fiel serviço à nossa astuta [ROOT.Char.GetFaith.WitchGodMistressMaster]! Que cuide de você e o guie pelo caminho da verdade."
 witch.2901.a: "E que [ROOT.Char.GetFaith.WitchGodSheHe|U] cuide de você!"
 ####GRAND RITE####
 #Activity & decision
 host_witch_ritual_decision: "Realizar Grande Ritual"
 host_witch_ritual_decision_desc: "Adoraremos a [ROOT.Char.GetFaith.WitchGodName] e nos aprofundaremos em Seus mistérios! O $activity_witch_ritual$ é uma oportunidade excelente para socializar e trocar conhecimentos com minhas colegas de bruxaria."
 host_witch_ritual_decision_tooltip: "Realizar Rito"
 host_witch_ritual_decision_confirm: "Que o rito comece!"
 activity_witch_ritual: "Grande Rito"
 activity_witch_ritual_name: "[ACTIVITY.GetOwner.LocalPlayerString( 'Seu grande rito', 'O grande rito' )][ACTIVITY.GetOwner.LocalPlayerString( '', 'Loc_ES_de_GetName' )]"
 activity_witch_ritual_owner: "Anfitriã"
 activity_witch_ritual_desc: "Verdadeiros seguidores com o [trait|lE] [GetTrait('witch').GetName( GetNullCharacter )] são convidados a celebrar o poder de [GetPlayer.GetFaith.WitchGodName] e mergulhar nas profundezas dos mistérios."
 activity_witch_ritual_destination_selection: "Você só pode realizar um $activity_witch_ritual$ em sua [capital|lE]."
 activity_witch_ritual_selection_tooltip: "Renda culto a [GetPlayer.GetFaith.WitchGodName] e aceite seu sombrio dom\n\nRecompensas previstas:\n$BULLET_WITH_TAB$[opinion|EU] [opinion_i]\n$BULLET_WITH_TAB$ Perda de [stress|El] [stress_loss_i]"
 activity_witch_ritual_province_capital_desc: "Esta é a sua [capital|lE]"
 activity_witch_ritual_province_domicile_desc: "Este é o seu [domicile|lE]"
 activity_witch_ritual_province_both_desc: "$activity_witch_ritual_province_capital_desc$ e [domicile|lE]"
 activity_witch_ritual_host_desc: "$BULLET_WITH_TAB$ Pode ganhar Experiência de Estilo de Vida\n$BULLET_WITH_TAB$ Participantes podem ganhar [opinion|lE] de personagens presentes\n$BULLET_WITH_TAB$ Participantes podem perder [stress_loss_i][stress|lE]"
 activity_witch_ritual_conclusion_desc: "O [GetActivityType( 'activity_witch_ritual' ).GetName|l] foi concluído"
 activity_witch_ritual_guest_desc: "$BULLET_WITH_TAB$ Participantes podem ganhar [opinion|lE] de personagens presentes\n$BULLET_WITH_TAB$ Participantes podem perder [stress_loss_i][stress|lE]"
 activity_witch_ritual_guest_help_text: "$activity_witch_ritual_desc$"
 witch_ritual_phase_desc: "Dedique-se a [GetPlayer.GetFaith.WitchGodName]"
 host_witch_ritual_title: "Grande Rito"
 host_witch_ritual: "[GetPlayer.GetFaith.WitchGodName] Honrado"
 host_witch_ritual_decision_cooldown: "Não poderei realizar outro Grande Rito por #N 10 anos#!"
 ### PHASES
 witch_ritual_phase: "Ritual Sombrio"
 ### INTENTS
 worship_devil_intent: "Adorar [GetPlayer.GetFaith.WitchGodName]"
 worship_devil_intent_desc: "Dedique-se ao ser oculto. No corpo. Na mente."
 #Invitation
 witch.3001.t: "Querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('SisterBrother')] [ROOT.Char.GetFirstNameNoTooltip],"
 witch.3001.desc: "Chegou a hora do grande ritual do coven de [host.GetHouse.GetNameNoTooltip]. Convido você a adorar [ROOT.Char.GetFaith.WitchGodName] na noite da lua cheia. Juntos cantaremos seu nome e nos aprofundaremos em seus mistérios!"
 witch.3001.a: "Mal posso esperar!"
 witch.3001.b: "Prefiro comer uma tigela de lesmas."
 #Uninvited guest
 witch.3003.t: "Um Convidado Não Convidado"
 witch.3003.desc: "Quando meus colegas bruxos chegam a [capital.GetNameNoTooltip], avisto um rosto desconhecido.\n\nQuando vou cumprimentar [inviter.Custom2('MyCharacterIntroduction', ROOT.Char)], ele me apresenta ao estranh[new_guest.Custom('ES_OA')] como [new_guest.GetFirstName]. Descobre-se que são velhos conhecidos, e pergunta se [new_guest.GetFirstNameNoTooltip] pode participar do nosso rito."
 witch.3003.a: "Quanto mais, melhor!"
 witch.3003.b: "Você será meu convidado de honra, [new_guest.GetFirstNameNoTooltip]."
 witch.3003.c: "O $activity_witch_ritual$ é um evento privado."
 #No one attended
 witch.3002.t: "Falta de Devoção"
 witch.3002.desc: "Nenhuma alma aceitou meu convite. Eles não merecem as bênçãos [ROOT.Char.GetFaith.WitchGodNamePossessive]!"
 witch.3002.a: "Eles conhecerão Sua fúria."
 #Starting event
 every_grand_rite_participant: "Todo convidado ao Grande rito"
 witch.3010.t: "A Lua Cheia se Eleva"
 witch.3010.desc: "Conforme a lua se ergue nos céus, anunciando Sua chegada, posso sentir meu corpo respondendo às estranhas energias no ar. As silhuetas ao redor da fogueira estão silenciosas e imóveis, aguardando o que está por vir.\n\nComo anfitriã desta reunião, cabe a mim iniciar o ritual. Eu…"
 witch.3010.a: "Ler de um antigo grimório."
 witch.3010.a.great: "Minha tradução é impressionante."
 witch.3010.a.poor: "Minha tradução é fraca."
 witch.3010.b: "Fazer truques com sons e sombras."
 witch.3010.b.great: "Meus truques são espetaculares."
 witch.3010.b.poor: "Meus truques são risíveis."
 witch.3010.c: "Contar com meu carisma e improvisar."
 witch.3010.c.great: "Minha improvisação é inspiradora."
 witch.3010.c.poor: "Minha improvisação é incoerente."
 witch.3010.d: "Apresentar uma grande oferenda."
 witch.3010.e: "Recitar as orações tradicionais."
 witch.3010.e.tt: "[activity.GetName] continua normalmente."
 #What to do after the rite
 witch.3014.host.great_translation.desc: "As palavras antigas são estranhas, mas falam comigo em um nível instintivo. Elas tecem um padrão encantador, cheio de beleza e promessa. Meus convidados estão completamente enfeitiçados.\n\nAo fechar o grimório com um gesto dramático, seus aplausos ecoam pela clareira."
 witch.3014.host.poor_translation.desc: "Não importa o quanto eu tente, as palavras antigas não fazem sentido. As expressões dos meus convidados vão de ansiosas a confusas e, por fim, decepcionadas. Antes de fazer ainda mais papel de bobo, improviso um final um pouco menos decepcionante. A multidão se dispersa rapidamente assim que termino."
 witch.3014.host.great_tricks.desc: "As bênçãos [ROOT.Char.GetFaith.WitchGodNamePossessive] são muitas, e entre elas está saber quando aplicar alguns truques. Com a ajuda de espelhos, chifres e alguns assistentes dispostos, faço um espetáculo impressionante. O ar fica carregado com a mistura empolgante de medo e emoção. Não consigo me lembrar da última vez em que me senti tão viv[ROOT.Char.Custom('ES_OA')]!"
 witch.3014.host.poor_tricks.desc: "Enquanto meus truques funcionaram bem quando eu os pratiquei sozinh no meu quarto, parece que meus nervos me traíram esta noite. Ninguém está convencido — até consigo ouvir alguém abafar uma risada lá no fundo da multidão. Antes de me fazer de maior bob, improviso um final rápido para a cerimônia."
 witch.3014.host.great_improvisation.desc: "Enquanto conduzo a multidão durante a cerimônia, estudo cuidadosamente suas reações e ajusto minhas palavras de acordo. Em pouco tempo, estou surfando na onda de sua empolgação, com seus vivas apaixonados me impulsionando enquanto construo um magnífico crescendo. Alcançamo-lo juntos, uivando Seu nome para a lua como um só."
 witch.3014.host.poor_improvisation.desc: "Talvez eu devesse ter me preparado melhor, afinal. Minha improvisação é sem brilho e vagante. Percebo que estou perdendo a multidão, então, no final, recorro a uma oração tradicional. A multidão se dispersa rapidamente assim que termino."
 witch.3014.host.offering.desc: "Todos conhecemos Sua predileção por comida e bebida suntuosas. As mesas estão carregadas de doces, barris de vinho, frutas exóticas e tortas amanteigadas. Juntos, oferecemos o melhor a [ROOT.Char.GetFaith.WitchGodName] antes de nos fartarmos com o restante."
 witch.3014.host.fallback.desc: "Pode ser que as antigas preces não sejam elaboradas, mas também não são simples. Curtas e diretas, elas guardam as verdades mais sagradas e poderosas [ROOT.Char.GetFaith.WitchGodNamePossessive]. Recitá-las novamente é como cair no abraço seguro de uma mãe."
 witch.3014.guest.start.desc: "Na véspera do grande rito, nos reunimos em uma clareira isolada. A grande fogueira aquece nossas costas e o ar está carregado de emoção."
 witch.3014.guest.good.desc: "[host.GetTitledFirstName] nos guia por uma cerimônia espetacular. As antigas orações saem de nossas bocas em um padrão encantador, cheio de beleza e promessas. Começamos a dançar, preparando-nos para um magnífico crescendo. Alcançamo-lo juntos, uivando o nome Dele para a lua como um só."
 witch.3014.guest.bad.desc: "[host.GetTitledFirstName] nos conduz por uma cerimônia constrangedora. Está tentando tornar a noite especial, mas suas tentativas são fracas. Pelo menos a lista de convidados é interessante…"
 witch.3014.guest.fallback.desc: "[host.GetTitledFirstName] nos conduz por uma cerimônia com todas as palavras e gestos corretos. As antigas orações rolam de nossas línguas em um padrão encantador, mas a beleza e o poder que geralmente a acompanham estão diminuídos; [host.GetTitledFirstNameNoTooltip|l] faz o suficiente, mas algo está faltando, no entanto."
 witch.3014.host.end.desc: "\n\nAgora que a cerimônia principal terminou, meus convidados e eu estamos livres para adorar como nos agrada."
 witch.3014.guest.end.desc: "\n\nAgora que a cerimônia principal terminou, estamos livres para adorar como nos agrada."
 witch.3014.a: "Experimentar com ervas junto com [herbalist.GetFirstNameNoTooltip]."
 witch.3014.a.knowledge: "[herbalist.GetFirstNameNoTooltip] me ensina algo novo."
 witch.3014.a.inspiration: "A conversa é inspiradora."
 witch.3014.b.start: "Pedir a [teacher.GetFirstNameNoTooltip] que me instruza na arte de"
 witch.3014.b.diplomacy: "encantar."
 witch.3014.b.martial: "estratégia."
 witch.3014.b.stewardship: "comércio."
 witch.3014.b.intrigue: "intrigas."
 witch.3014.b.learning: "poesia."
 witch.3014.c: "Compartilharei os dons carnais Dele/Deles com alguém."
 witch.3014.c.tt: "Você tenta encontrar alguém com um desejo semelhante."
 witch.3014.d: "Passar tempo com o/a [new_guest.Custom('ComplimentAdjective')] [new_guest.GetFirstNameNoTooltip]."
 witch.3014.e: "Onde está meu [sex_partner.Custom('LoverPetName')]? Eu anseio pelo toque…"
 witch.3014.d.move_in: "Nos damos muito bem."
 witch.3014.d.friend: "Nos damos bem."
 witch.3014.d.enemy: "Nos envolvemos em uma discussão acalorada."
 witch.3014.f: "Rir, beber, dançar — desfrutar das suas bênçãos!"
 #Regular seduction event
 witch.3015.t: "Perto do Lago"
 witch.3015.start.desc: "O poder [ROOT.Char.GetFaith.WitchGodNamePossessive] pulsa em minhas veias enquanto vagueio pela floresta. Um coro de suspiros e gemidos me recebe… não sou o único em busca de companhia esta noite.\n\n"
 witch.3015.new_guest.desc: "Dou de cara com meu nov[sex_partner.Custom('ES_OA')] conhecid[sex_partner.Custom('ES_OA')], [sex_partner.GetFirstName], perto de um lago à luz da lua."
 witch.3015.regular.desc: "Encontro [sex_partner.Custom2('MyCharacterIntroduction', ROOT.Char)] perto de um lago iluminado pela lua."
 witch.3015.end.desc: "Quando olho em seus olhos, tudo se encaixa. Esta é a vontade Dele. [sex_partner.Custom('ES_ElElla')|U] me chama para mais perto…"
 witch.3015.a: "Vamos adorar juntos."
 witch.3015.b: "Eu... estava procurando por outra pessoa."
 witch.3015.b.tt: "Você passa a noite sozinho"
 #Lover/spouse seduction event
 witch.3016.t: "Os Astros se Alinham"
 witch.3016.end.desc: "Uma voz familiar me chama — é [sex_partner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. Quando me viro para olhar[sex_partner.Custom('ES_RleRla')], tudo se encaixa. Nós dois... É a vontade Dele. Fomos feitos para ficar juntos."
 witch.3016.a: "Para sempre."
 witch.3016.b: "Não… não estou pront[ROOT.Char.Custom('ES_OA')] para isso."
 #Soulmate seduction event
 witch.3017.end.desc: "Não vi para onde foi [sex_partner.GetFirstName], mas não preciso saber. Sinto-me atraíd[ROOT.Char.Custom('ES_OA')] por [sex_partner.Custom('ES_ElElla')] como um ímã pelo ferro. Quando [sex_partner.Custom('ES_LoLa')] encontro, não há surpresa em seus belos olhos… apenas amor e desejo."
 witch.3017.a: "Quanto esperei por você."
 witch.3017.b: "Eu... esqueci algo! Desculpe!"
 #End events
 witch.3098.t: "Até a Próxima Vez"
 witch.3098.start.desc: "Eu e meus convidados"
 witch.3098.end.desc: "adoramos [ROOT.Char.GetFaith.WitchGodName], compartilhamos conhecimentos sagrados e estabelecemos laços profundos. Minha mente está fervilhando de novas ideias, mas meu corpo precisa desesperadamente descansar. Uma cama quente nunca pareceu tão tentadora."
 witch.3098.a: "Que [ROOT.Char.GetFaith.WitchGodSheHe|U] nos proteja até o próximo $activity_witch_ritual$."
 witch.3099.start.desc: "Juntos, nós"
 witch.3099.tt: "Você retorna para casa quando o $activity_witch_ritual$ termina"
 ########################
 #ONGOING WITCH EVENTS #
 ########################
 ### Court chaplain / other clergy is an idiot ###
 witch.4001.t: "Julgamento Divino"
 witch.4001.start.desc: "![annoying_clergy.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está realmente me irritando! Não há um momento em que eu não fique falando sem parar sobre [annoying_clergy.GetFaith.HighGodName] e a Sua vontade.\n\nEla especialmente adora contar a todos como [annoying_clergy.GetFaith.HighGodNameAlternate]"
 witch.4001.forgiving.desc: "acha que o perdão é fraqueza."
 witch.4001.deceitful.desc: "punirá os mentirosos."
 witch.4001.gluttonous.desc: "punirá aqueles que se deleitam com comida e bebida."
 witch.4001.wrathful.desc: "punirá aqueles com mau temperamento."
 witch.4001.greedy.desc: "punirá aqueles que cobiçam riquezas."
 witch.4001.arbitrary.desc: "exige que sejamos justos e imparciais."
 witch.4001.sadistic.desc: "punirá aqueles que são cruéis com os outros."
 witch.4001.craven.desc: "punirá aqueles que são tímidos e cuidadosos demais."
 witch.4001.lustful.desc: "punirá prostitutas e fornicadores."
 witch.4001.vengeful.desc: "nos exige a oferecer a outra face."
 witch.4001.arrogant.desc: "acha que se orgulhar das próprias conquistas é pecaminoso."
 witch.4001.fallback.desc: "punirá os pecadores."
 witch.4001.witch.desc: "Por que eu deveria ouvir [annoying_clergy.Custom('ES_LoLa')], quando [ROOT.Char.GetFaith.WitchGodName] nos abraça como somos, com defeitos e tudo? Que vida triste deve ter [annoying_clergy.GetFirstNameNoTooltip]!"
 witch.4001.impious.desc: "[annoying_clergy.GetFaith.HighGodName] é um bastardo julgador!"
 witch.4001.a: "[annoying_clergy.Custom('ES_LoLa')|U] tornarei o objeto de escárnio de [capital.GetNameNoTooltip]!"
 witch.4001.a.tt: "[annoying_clergy.GetFaith.HighGodName] não é o único que pode julgar!"
 witch.4001.a.success: "Você ridiculariza [annoying_clergy.GetShortUINameNoTooltip]"
 witch.4001.a.failure: "[annoying_clergy.GetShortUINameNoTooltip] descobre seu plano"
 witch.4001.c: "Se eu agir como um[ROOT.Char.Custom('ES_XA')] covarde piedos[ROOT.Char.Custom('ES_OA')], ele vai calar a boca."
 witch.4001.b: "Não saberá em que acreditar quando eu terminar com [annoying_clergy.Custom('ES_ElElla')]."
 witch.4001.b.success: "Você abala a fé de [annoying_clergy.GetShortUINameNoTooltip] em [annoying_clergy.GetFaith.HighGodName]"
 witch.4001.b.neutral: "[annoying_clergy.GetShortUINameNoTooltip] está incerto"
 witch.4001.b.neutral.tt: "Você pode escolher desistir ou continuar tentando"
 witch.4001.b.failure: "Você não consegue influenciar [annoying_clergy.GetShortUINameNoTooltip]"
 witch_4001_corruption_success_effect.tt: "Você pode [Concept( 'blackmail', 'chantajear' )|E] a [annoying_clergy.GetShortUIName] com o seu [secret|lE]"
 witch.4002.witch.desc: "[ROOT.Char.GetFaith.WitchGodName|U] deve ter me ajudado, porque meu plano saiu ainda melhor do que o esperado!\n\n"
 witch.4002.impious.desc: "Meu plano estava perfeito!\n\n"
 witch.4002.gluttonous.desc: "[annoying_clergy.GetTitledFirstName] se empanturrou com os bolos misturados com drogas que enviei aos seus aposentos. Depois, saiu vagando pela cidade com a boca besuntada de geleia e farelos, antes de cair adormecid[annoying_clergy.Custom('ES_OA')] na escadaria de sua [annoying_clergy.GetFaith.HouseOfWorship]!"
 witch.4002.lustful.desc: "Escrevi um poema especialmente explícito sobre [lustful_desc.Custom2('MyCharacterIntroduction', ROOT.Char)] e seu "[lustful_desc.Custom('ObjectifiedFeature')]", forjando a assinatura de [annoying_clergy.GetTitledFirstName|l] e o deixei nos aposentos de [lustful_desc.Custom('ES_DelDela')] [lustful_desc.GetLadyLord]. [lustful_desc.GetFirstName] #EMP no#! não gostou da dedicatória e tampouco foi discreto sobre isso."
 witch.4002.craven.desc: "Enquanto [annoying_clergy.GetTitledFirstName|l] dormia, enfiei um rato entre os lençóis dela. Mal tive tempo de me esconder antes que acordasse gritando, saltasse da cama e saísse correndo… tão nu[annoying_clergy.Custom('ES_OA')] como veio ao mundo!"
 witch.4002.vengeful.desc: "Subornei um escrivão para convencer [annoying_clergy.GetTitledFirstName|l] de que [vengeful_desc.Custom2('MyCharacterIntroduction', ROOT.Char)] tinha estado insultando pelas costas. Nos dias seguintes, sempre que tinha oportunidade, [annoying_clergy.GetFirstNameNoTooltip] foi incrivelmente grosseir[annoying_clergy.Custom('ES_OA')] com o/a pobre [vengeful_desc.GetFirstNameNoTooltip]. No fim, [vengeful_desc.GetFirstNameNoTooltip] confrontou [annoying_clergy.GetSheHe] por seu comportamento malicioso. [annoying_clergy.GetFirstNameNoTooltip] não teve nada a dizer em sua defesa."
 witch.4002.wrathful.desc: "Acontece que sei que [annoying_clergy.GetTitledFirstName|l] é um[annoying_clergy.Custom('ES_XA')] alcoólatr[annoying_clergy.Custom('ES_OA')] contumaz[annoying_clergy.Custom('ES_OA')] e que está um pouco apaixonad[annoying_clergy.Custom('ES_OA')] por um[wrathful_desc.Custom('ES_OA')] dos meus servos. Fiz com que [wrathful_desc.GetSheHe] levasse uma garrafa de licor muito caro e ainda mais forte aos aposentos de [annoying_clergy.GetTitledFirstNameNoTooltip|l]. Motivad[annoying_clergy.Custom('ES_OA')] com a promessa de uma promoção, [wrathful_desc.GetSheHe] [annoying_clergy.GetHerHim] embriagou-o bem a tempo para seu [annoying_clergy.Custom('GetReligiousRite')]."
 witch.4002.arrogant.desc: "Embora tente ocultá-lo, sei que a [annoying_clergy.GetTitledFirstName|l] se preocupa muito com sua aparência. Guarda uma pomada em seus aposentos que aplica religiosamente todas as manhãs. Entrei sorrateiramente em seus aposentos e adicionei algumas ervas irritantes a ela. No dia seguinte, seu rosto estava coberto de urticária!"
 witch.4002.end.desc: "\n\nFoi a única coisa de que meus cortesãos falaram a noite toda. [annoying_clergy.GetFirstNameNoTooltip] nunca vai esquecer disso!"
 witch.4002.a: "Bem-feito para el!"
 witch.4003.desc: "Ocult[ROOT.Char.Custom('ES_OA')] no corredor secreto atrás das câmaras [annoying_clergy.Custom('ES_DelDela')] [annoying_clergy.GetTitledFirstName|l], escuto com alegria os gemidos e suspiros desse ser tão [annoying_clergy.Custom2('InsultAdjective', ROOT.Char)]. Leu o tomo que deixei em seu leito — na verdade, foi incapaz de largá-lo.\n\nAs verdades contidas nele parecem ter tido um impacto significativo em sua fé. "Oh, [annoying_clergy.GetFaith.HighGodName]! Preciso de um sinal! Acreditei em ti, executei tua vontade na Terra, mas agora... tudo o que consigo ver são as contradições, as falácias, as... as mentiras!".\n\nA voz [annoying_clergy.Custom('ES_DelDela')] [annoying_clergy.GetTitledFirstNameNoTooltip|l] se desfaz em soluços incoerentes."
 witch.4003.a: "Parto, meu trabalho está concluído."
 witch.4003.b: "[annoying_clergy.GetSheHe|U] está pront[annoying_clergy.Custom('ES_OA')] para as grandes verdades."
 witch.4003.c: "![annoying_clergy.GetSheHe|U] se tornará meu discípul[annoying_clergy.Custom('ES_OA')]!"
 witch.4004.desc: "Sob a aparência inocente de perguntas teológicas, semeei a dúvida no coração de [annoying_clergy.GetTitledFirstName|l]. Vejo que sua fé vacila por suas respostas inseguras e pela sombra de preocupação que cobre seu rosto quando pensa que ninguém está olhando.\n\nAinda não cheguei lá, não completamente, mas um esforço final #EMP deveria#! dobrar[annoying_clergy.Custom('ES_LoLa')]."
 witch.4004.a: "É um esforço valioso!"
 witch.4004.b: "Meu tempo é melhor gasto com outras coisas."
 witch.4005.desc: "Deixei um tomo de verdades incômodas nos aposentos de [annoying_clergy.GetTitledFirstName|l], mas vi como [annoying_clergy.Custom('ES_ElElla')] o jogava no fogo após ler apenas algumas páginas. O desafio deve ter fortalecido sua fé — já não consigo detectar qualquer incerteza em seu coração."
 witch.4005.a: "[annoying_clergy.GetSheHe] não era dign, de qualquer maneira!"
 #PERSONAL WITCH RITUAL
 witch.4010.t: "Seus presentes são abundantes"
 witch.4010.desc: "Entrego minhas oferendas ao solo: ervas, leite e mel. Com os olhos fechados e a fumaça fazendo cócegas nas minhas narinas, ergo os braços para a lua.\n\n«¡[ROOT.Char.GetFaith.WitchGodMistressMaster|U]! Ó tu que sabes todas as verdades, [ROOT.Char.GetFaith.WitchGodMotherFather] que tudo podes! Aceita, por favor, minhas humildes oferendas e concede-me tua orientação em troca!».\n\nPeço a [ROOT.Char.GetFaith.WitchGodName]…"
 witch.4010.a: "Sorte no amor."
 witch.4010.b: "Encanto e tato."
 witch.4010.c: "Mente estrategista."
 witch.4010.d: "Mente para o dinheiro e a ordem."
 witch.4010.e: "A ajuda das sombras."
 witch.4010.f: "Sabedoria e sagacidade."
 witch.4010.g: "Sorte com a lâmina."
 witch.4010.h: "Paz de espírito."
 #Witch friends: prayer, by Mathilda Bjarnehed
 witch.4020.t: "Tomar ou Dar"
 witch.4020.two_witches.desc: "[prayer_witch_1.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e [prayer_witch_2.Custom2('MyCharacterIntroduction', ROOT.Char)] se juntaram a mim para"
 witch.4020.one_witch.desc: "[prayer_witch_1.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se juntou a mim para"
 witch.4020.full_moon.desc: "um ritual de lua cheia"
 witch.4020.new_moon.desc: "um ritual de lua nova"
 witch.4020.equinox.desc: "um ritual de equinócio"
 witch.4020.solstice.desc: "um ritual de solstício"
 witch.4020.end.desc: "em honra de [ROOT.Char.GetFaith.WitchGodName]. Como anfitri[ROOT.Char.Custom('ES_OnOna')], meu dever é conduzir nossa oração."
 witch.4020.a: "[ROOT.Char.GetFaith.WitchGodMistressMaster|U], em tua sabedoria dê paz e clareza a [prayer_witch_1.GetFirstNameNoTooltip]!"
 witch.4020.b: "Conceda suas bênçãos a [prayer_witch_2.GetFirstNameNoTooltip]!"
 witch.4020.c: "[ROOT.Char.GetFaith.WitchGodMotherFather|U] dos segredos, empreste-me seu poder!"
 witch.4030.t: "Segredos Encadernados em Couro"
 witch.4030.no_friend.desc: "Meus contatos me enviaram um livro escrito em algum código estranho, suas capas de couro decoradas com símbolos de minha [ROOT.Char.GetFaith.WitchGodMistressMaster|U].\n\nAté agora, só consegui decifrar as primeiras páginas, mas são profundamente fascinantes."
 witch.4030.friend.desc: "Meu fiel [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('witch_friend'))] [witch_friend.GetTitledFirstName|l] me trouxe um tomo escrito em algum código estranho. Suas capas de couro estão decoradas com os símbolos da minha [ROOT.Char.GetFaith.WitchGodMistressMaster|U].\n\nSó conseguiu decifrar as primeiras páginas até agora, mas elas são profundamente fascinantes."
 witch.4030.friend.a: "Juntos, desvendaremos seus segredos."
 witch.4030.no_friend.a: "Desvendarei seus segredos, não importa quanto tempo leve!"
 witch.4030.b: "Conheço um companheiro crente que pagaria uma boa quantia por isso."
 witch.4030.c: "Até [convince_target_1.GetTitledFirstNameNoTooltip|l] será atraíd[convince_target_1.Custom('ES_OA')] por estes segredos."
 witch.4030.c.success: "[convince_target_1.GetShortUIName] fica encantad[convince_target_1.Custom('ES_OA')] com o tomo"
 witch.4030.c.failure: "[convince_target_1.GetShortUIName] queima o livro"
 witch.4030.d: "[convince_target_2.GetTitledFirstNameNoTooltip|l] encontrará esto #EMP muy#! interesante."
 witch.4030.d.success: "[convince_target_2.GetShortUIName] fica encantad[convince_target_2.Custom('ES_OA')] com o tomo"
 witch.4030.d.failure: "[convince_target_2.GetShortUIName] queima o livro"
 witch.4031.start.desc: "Tenho uma visão desobstruída do tomo que deixei entre as coisas [convince_target.Custom('ES_DelDela')] [convince_target.GetTitledFirstName|l] de um buraquinho na parede que dá para sua [convince_target.Custom('GetChamber')]. Seus olhos se voltam para ele assim que ele cruza o limiar, quase como se o livro possuísse sua própria e estranha magia.\n\n"
 witch.4031.end.desc: "Quando [convince_target.GetFirstNameNoTooltip] termina de ler as páginas traduzidas, volta a andar de um lado para o outro. No fim, a atração do tomo parece impossível de resistir; [convince_target.GetSheHe] se apressa a pegar sua pena."
 witch.4031.a: "Isso mesmo, amig[convince_target.Custom('ES_OA')] meu[convince_target.Custom('ES_OA')]. Aprofunde-se cada vez mais…"
 witch.4032.end.desc: "[convince_target.GetFirstNameNoTooltip] nem mesmo abre o livro. Um suspiro audível escapa de sua boca quando vê os estranhos símbolos, e o arremessa para longe de si."
 witch.4032.a: "#EMP Não!#! [ROOT.Char.GetFaith.HighGodName] amaldiçoe est[convince_target.Custom('ES_EA')] imbecil sem coragem!"
