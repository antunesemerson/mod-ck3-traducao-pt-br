l_spanish:
 combat_event.0003.t: "Invencível"
 combat_event.0003.desc.opening: "Cem batalhas, cem vitórias!"
 combat_event.0003.desc.commander: "Com minha mais recente vitória contra [enemy_commander.GetTitledFirstName|l] e seus soldados,"
 combat_event.0003.desc.no_commander: "Com minha mais recente vitória em batalha"
 combat_event.0003.desc.ending: "Finalmente alcancei essa marca monumental.\n\nNunca tendo perdido uma única batalha, há muito sussurros de que eu era invencível, uma força indomável que jamais poderia ser derrotada. Está começando a parecer que isso pode realmente ser verdade..."
 combat_event.0003.desc.alt_ending: "Finalmente alcancei essa marca monumental.\n\nCom cada batalha que venci, os rumores sobre minha destreza cresceram. Agora que minhas façanhas superaram até mesmo as lendas, posso afirmar verdadeiramente ser invencível, uma força indomável que jamais poderá ser derrotada."
 combat_event.0003.a: "Espalhem a palavra por toda parte sobre minha habilidade!"
 combat_event.0003.b: "Não devo cair em arrogância. Uma flecha perdida é tudo o que é preciso."
 combat_event.0003.b.zealous: "Sou [ROOT.Char.Custom('signature_weapon')] [ROOT.Char.GetFaith.HighGodNamePossessive], apenas cumpro a vontade divina."
 combat_event.0004.t: "Derrubando o Colosso"
 combat_event.0004.desc: "[enemy_commander.Custom2('MyCharacterIntroduction', ROOT.Char)|U] é um[enemy_commander.Custom('ES_XA')] comandante lendári[enemy_commander.Custom('ES_OA')], conhecid[enemy_commander.Custom('ES_OA')] em todo o mundo por ter lutado mais de cem batalhas e não ter perdido uma única.\n\nApesar disso, hoje [enemy_commander.Custom('ES_LoLa')] derrotei no campo de batalha e demonstrei ao mundo que não é infalível!"
 combat_event.0004.a: "Até mesmo as grandes lendas caem diante da minha [ROOT.Char.Custom('signature_weapon')]!"
 combat_event.0004.b: "Se [enemy_commander.Custom('ES_ElElla')] pode ser derrotad[enemy_commander.Custom('ES_OA')], eu também."
 combat_event.0004.b.zealous: "Agradeço a [ROOT.GetCharacter.GetFaith.WarGodName] por humilhar a [enemy_commander.Custom('ES_EA')] [enemy_commander.GetWomanMan]."
 combat_event.0005.t: "Derrubando o Colosso"
 combat_event.0005.desc: "Hoje aconteceu o impensável... Fui derrotado em combate por [friendly_commander.Custom2('MyCharacterIntroduction', ROOT.Char)]! Eu já estava começando a pensar que era verdade que nunca cairia diante de ninguém, mas fui derrubad[ROOT.Char.Custom('ES_OA')] e humilhad[ROOT.Char.Custom('ES_OA')].\n\nMinha reputação ainda está razoavelmente intacta apesar dessa derrota, embora [friendly_commander.GetFirstName] me tenha roubado um pouco da minha glória e fama."
 combat_event.0005.a: "Merece reconhecimento por haver derrotado alguém como eu."
 combat_event.0005.b: "Inaceitável! Ele se arrependerá do dia em que me desafiou!"
 combat_event.0005.message: "Enfurecid[enemy_commander.Custom('ES_OA')] após sua derrota na batalha, [enemy_commander.GetTitledFirstName|l] jurou vingar-se de mim!"
 #Combatants Taken Prisoner
 combat_event.1002.pow_message.t: "Combatentes Inimigos Capturados"
 combat_event.1002.pow_message.desc.single: "Suas forças capturaram [primary_prisoner.Custom2('YourCharacterIntroduction', ROOT.Char)|U]"
 combat_event.1002.pow_message.desc.double: "Suas forças capturaram [primary_prisoner.Custom2('YourCharacterIntroduction', ROOT.Char)|U] e [secondary_prisoner.Custom2('YourCharacterIntroduction', ROOT.Char)]"
 combat_event.1002.pow_message.desc.multiple: "Suas forças capturaram [primary_prisoner.Custom2('YourCharacterIntroduction', ROOT.Char)|U] e mais [ROOT.Var('num_other_relevant_captured_combatants').GetValue|V0] combatentes"
 combat_event.1002.pow_message.desc.end: "após vencerem a Batalha de [combat_location.GetName]!"
 combat_event.1003.pow_message.t: "Combatentes Aliados Capturados"
 combat_event.1003.pow_message.desc.single: "Foi capturado(a) [primary_prisoner.Custom2('YourCharacterIntroduction', ROOT.Char)|U] como [Concept( 'prisoner_of_war', Select_CString(primary_prisoner.IsFemale, 'prisionera de guerra', 'prisionero de guerra'))|E]"
 combat_event.1003.pow_message.desc.double: "[primary_prisoner.Custom2('YourCharacterIntroduction', ROOT.Char)|U] e [secondary_prisoner.Custom2('YourCharacterIntroduction', ROOT.Char)] foram [Select_CString(And(primary_prisoner.IsFemale, secondary_prisoner.IsFemale), 'capturadas', 'capturados')] como [Concept('prisoner_of_war',Select_CString(And(primary_prisoner.IsFemale, secondary_prisoner.IsFemale), 'prisioneras de guerra', 'prisioneros de guerra'))|E]"
 combat_event.1003.pow_message.desc.multiple: "[primary_prisoner.Custom2('YourCharacterIntroduction', ROOT.Char)|U] e [ROOT.Var('num_other_relevant_captured_combatants').GetValue|V0] outros foram capturados como [prisoners_of_war|lE]"
 combat_event.1003.pow_message.desc.end: "por seu inimigo [combat_winner.Custom('ES_ElLa')] [combat_winner.GetTitledFirstName|l] após a [battle|lE] de [combat_location.GetName]!"
 combat_event.1004.pow_message.t: "[ROOT.Char.Custom2('RelationToMeShort', primary_prisoner)|U] capturad[primary_prisoner.Custom('ES_OA')] prisioneir[primary_prisoner.Custom('ES_OA')]"
 combat_event.1004.pow_message.desc.end: "por [combat_winner.Custom2('YourCharacterIntroduction', ROOT.Char)] após vencer a [battle|lE] de [combat_location.GetName]!"
 combat_event.1005.pow_toast.t: "Combatentes inimigos capturados"
 combat_event.1005.pow_toast.desc: "Suas forças [Concept('prisoner_of_war','capturaron')|E] capturaram [valuable_prisoner.Custom2('NamePossessiveCharacterIntroduction', primary_combat_loser)] durante a [battle|lE] de [combat_location.GetName]!"
 combat_event.1005.pow_toast.desc.primary: "Suas forças capturaram seu inimig[valuable_prisoner.Custom('ES_OA')], [valuable_prisoner.Custom('ES_ElLa')] [valuable_prisoner.GetTitledFirstName|l], na qualidade de [Concept( 'prisoner_of_war', Select_CString(valuable_prisoner.IsFemale, 'prisionera de guerra', 'prisionero de guerra'))|E] durante a [battle|lE] de [combat_location.GetName]!"
 combat_event.1006.pow_toast.t: "Herdeiro Feito Prisioneiro"
 combat_event.1006.pow_toast.desc: "[combat_winner.Custom('ES_ElLa')|U] [combat_winner.GetTitledFirstName|l] capturou a [valuable_prisoner.Custom2('YourCharacterIntroduction', ROOT.Char)] na qualidade de [Concept( 'prisoner_of_war', Select_CString(valuable_prisoner.IsFemale, 'prisionera de guerra', 'prisionero de guerra'))|E] após a [battle|lE] de [combat_location.GetName]!"
 combat_event.1007.pow_toast.t: "$combat_event.1005.pow_toast.t$"
 combat_event.1007.pow_toast_primary.t: "Líder de Guerra Inimigo Capturado"
 combat_event.1007.pow_toast.desc: "[combat_winner.Custom('ES_ElLa')|U] [combat_winner.GetTitledFirstName|l] [Concept('prisoner_of_war','capturó')|E] a [valuable_prisoner.Custom2('NamePossessiveCharacterIntroduction', primary_combat_loser)] após a [battle|lE] de [combat_location.GetName]!"
 combat_event.1007.pow_toast.desc.primary: "[combat_winner.Custom('ES_ElLa')|U] [combat_winner.GetTitledFirstName|l] capturou seu inimig[valuable_prisoner.Custom('ES_OA')], [valuable_prisoner.Custom('ES_ElLa')] [valuable_prisoner.GetTitledFirstName|l], na qualidade de [Concept( 'prisoner_of_war', Select_CString(valuable_prisoner.IsFemale, 'prisionera de guerra', 'prisionero de guerra'))|E] após a [battle|lE] de [combat_location.GetName]!"
