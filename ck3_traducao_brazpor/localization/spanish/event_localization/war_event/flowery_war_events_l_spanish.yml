l_spanish:
 designated_sacrifice_died.t: "Sacrifício Marcado Morreu"
 designated_sacrifice_died.desc: "[dead_designated_sacrifice.GetShortUIName] murió antes de que pudiera sacrificar[dead_designated_sacrifice.GetHerHim] en honor a [ROOT.Char.GetFaith.HighGodName]. Los [ROOT.Char.GetFaith.AltPriestTermPlural] y fieles están descontentos por igual."
 designated_sacrifice_release.t: "Sacrifício Marcado Libertado"
 designated_sacrifice_released.desc: "[released_designated_sacrifice.GetShortUIName] ha sido liberad[released_designated_sacrifice.Custom('ES_OA')] en lugar de sacrificad[released_designated_sacrifice.Custom('ES_OA')] en honor a [ROOT.Char.GetFaith.HighGodName]. Mis [ROOT.Char.GetFaith.AltPriestTermPlural] y fieles están descontentos por igual."
 designated_human_sacrifice_modifier: "Sacrifício Humano Designado"
 designated_human_sacrifice_modifier_desc: "Este personagem foi marcado divinamente para o sacrifício humano. Pelo menos, de acordo com seu captor."
 human_sacrifice.0001.t: "Deuses Sedentos"
 human_sacrifice.0001.desc: "Já se passaram vários anos desde que conduzi uma guerra florida em nome de [ROOT.Char.GetFaith.HighGodName], mas ainda não sacrifiquei todos os prisioneiros de alto perfil capturados no fim do conflito. Meus [ROOT.Char.GetFaith.AltPriestTermPlural] estão impacientes, e as pessoas comuns sussurram que [ROOT.Char.GetFaith.WarGodName] desviou seu olhar de mim."
 human_sacrifice.0001.a: "Espere, certamente um sacrifício tardio será suficiente?"
 human_sacrifice.0001.b: "Suporto seu desprezo com estoicismo."
 human_sacrifice.0001.c: "Essa barbaridade não me convém."
 human_sacrifice_coward_modifier: "Deuses Sedentos Ofendidos"
 human_sacrifice_coward_modifier_desc: "Este personagem é conhecido por se curvar e dar desculpas diante do divino."
 flowery_war_cb_ended_invalid.t: "Guerra Invalidada"
 flowery_war_cb_ended_invalid.desc_other_sacrifices_attacker: "A [war.GetName] terminou: adquiri sacrifícios em outro lugar."
 flowery_war_cb_ended_invalid.desc_other_sacrifices_defender: "A [war.GetName] terminou: [attacker.GetShortUIName] adquiriu sacrifícios adequados em outro lugar."
 flowery_war_cb_ended_invalid.desc_no_sacrificers: "A [war.GetName] terminou: nenhum dos principais participantes pratica abertamente o sacrifício humano."
