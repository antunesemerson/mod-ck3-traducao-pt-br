l_spanish:
 mpo_great_war_of_defiance_cb: "Grande Guerra da Desafiante"
 MPO_GREAT_WAR_OF_DEFIANCE_NAME: "$mpo_great_war_of_defiance_cb$ contra [DEFENDER.GetShortUINameNotMe]"
 MPO_GREAT_WAR_OF_DEFIANCE_NAME_MY: "[ConcatIfNeitherEmpty('$ORDER|q$', ' ')]$mpo_great_war_of_defiance_cb$ contra [DEFENDER.GetShortUIName]"
 MPO_GREAT_WAR_OF_DEFIANCE_NAME_BASE: "$mpo_great_war_of_defiance_cb$"
 mpo_war_of_defiance_gok_loses_defender: "Você é aprisionado por [attacker.GetShortUIName], e todos os seus [titles|El], [vassals|El] e [tributaries|El] se tornam independentes. A maior parte do seu [herd|El], [prestige|El], [gold|El], [nomadic_authority|El] e [legitimacy|El] é perdida."
 mpo_war_of_defiance_gok_loses_attacker: "Você aprisionou, humilhou e empobreceu [defender.GetShortUIName], que perde todos os seus [titles|El] [Concept('landed', 'com terras')|E]. Seus [vassals|El], [counties|El] e [tributaries|El] conquistam a independência."
 mpo_war_of_defiance_gok_loses_other: "[attacker.GetShortUIName] prendeu, humilhou e empobreceu [defender.GetShortUIName] a, que perde todos os seus [titles|El] [Concept('landed', 'hacendados')|E]. Seus [vassals|El], [counties|El] e [tributaries|El] conquistam a independência."
 mpo_war_of_defiance_gok_wins_defender: "Os [nomads|El] [Concept('independent', 'independientes')|E] derrotados se tornam seus [Concept('obedient', 'obedientes')|E] [vassals|El]. Todas as demais [truces|El] com você serão removidas. Você se tornará em [GetTrait('greatest_of_khans').GetName( GetNullCharacter )|l] e receberá grandes bônus para a conquista universal."
 mpo_war_of_defiance_gok_wins_other: "Os [nomads|El] [Concept('independent', 'independientes')|E] derrotados se tornam [Concept('obedient', 'obedientes')|E] [vassals|El] de [defender.GetShortUIName]. Todas as demais [truces|El] com [defender.GetShortUIName]. [defender.GetShortUIName] se tornará em [GetTrait('greatest_of_khans').GetName( GetNullCharacter )|l] e receberá grandes bonificações para alcançar uma conquista universal."
 accolade_attackers_all_gain_glory_tt: "#high Atacantes'#! @accolade_icon![accolades|El] ganham grande [glory|El]"
 accolade_defenders_all_gain_glory_tt: "#high Defensores'#! @accolade_icon![accolades|El] ganham grande [glory|El]"
 mpo_war_of_defiance_gold_herd_tt: "Cada #high Atacante#! ganha @herd_icon![herd|El] e @gold_icon![gold|El]"
 custom.every_defender_vassal: "Cada um dos [vassals|El] de [defender.GetShortUIName]"
 custom.every_defender_tributary: "Cada um dos [tributaries|El] de [defender.GetShortUIName]"
 great_war_of_defiance_attackers_gold_tt: "Pago @gold_icon![gold|E] por cada #high Atacante#!"
 gok_delete_all_truces_tt: "Cada [truce|El] mantido é encerrado"
 will_become_greatest_of_khans_tt: "Se torna [GetTrait('greatest_of_khans').GetName( GetNullCharacter )|l]... e a subjugação do mundo começa"
 every_new_vassal_becomes_obedient_tt: "Cada novo [vassal|El] se torna [obedient|El] por pelo menos #high 10 anos#!"
 msg_great_war_of_defiance_war_invalidated_message: "A [war.GetName] não tem propósito: [defender.GetShortUIName] não pode se tornar [GetTrait('greatest_of_khans').GetName( GetNullCharacter )|l]."
 war_declared_opening_mpo_gok: "[ROOT.War.GetActiveCB.GetDefender.GetTitledFirstNameNoTooltip], cão[ROOT.War.GetActiveCB.GetDefender.Custom('ES_OA')] raivoso[ROOT.War.GetActiveCB.GetDefender.Custom('ES_OA')],\n\n"
 war_declared_flavor_mpo_gok: "Toda a carne da terra não é para suas mandíbulas famintas. O mundo nunca será seu.\n\nTodos concordamos em negar-lhe poder, para derrubá-lo! Nunca antes você virou as costas ou mostrou a parte traseira do seu cavalo. E assim teremos guerra."
 mpo_greatest_of_khans.0101.t: "Guerra pela Terra e Céus"
 mpo_greatest_of_khans.0101.desc_intro: "Incontáveis tribos se levantam para me enfrentar, incitadas à guerra por"
 mpo_greatest_of_khans.0101.desc_gok_opponent: "[primary_coalition_defender.GetName]. E os exércitos [gok_opponent.Custom('ES_DelDela')] [gok_opponent.GetPrimaryTitle.GetNameNoTier|l] juntam-se a eles. [gok_opponent.Custom('ES_ElLa')|U] [gok_opponent.GetTitledFirstName|l] anseia ver a Grande Estepe dividida!"
 mpo_greatest_of_khans.0101.desc_primary_attacker: "a voz negra e o pesado saco de [primary_coalition_defender.GetName]."
 mpo_greatest_of_khans.0101.desc_sub: "\n\nOutros, os fracos e temerosos, rastejaram até [ROOT.Char.GetCapitalLocation.GetName] e se uniram a [big_sub.GetName] em me submeter."
 mpo_greatest_of_khans.0101.desc: "\n\n"Que todos os clãs se reúnam ao chamado de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetPrimaryTitle.GetName|l]!", grita meu [ROOT.Char.Custom2('RelationToMeShort', vassal_1)], [vassal_1.Custom('ES_ElLa')] [vassal_1.GetTitledFirstName|l], "Os bravos montam seus cavalos de guerra! Cavalgaremos até onde seus estandartes de cauda de cavalo peguem o vento!"."
 gok_submitters_became_tributaries_tt: "Muitos pequenos [rulers|El] vizinhos se tornaram seus [tributaries|El] [obedient|El]"
 mpo_greatest_of_khans.0101.a: "E #EMP os covardes?#! Eu os farei cavalgar também!"
 mpo_greatest_of_khans.0101.a.flavor: "Mandar minha família para implorar a eles trará alguns para a batalha... à custa de nossa honra."
 mpo_greatest_of_khans.0101.b: "Salvem-se para as guerras que virão."
 mpo_greatest_of_khans.0101.b.flavor: "Eu luto sozinho."
 mpo_greatest_of_khans.0101.c: "Teremos o mundo — ou morreremos!"
 became_your_tributary_tt: "Se tornou seu [tributary|El]"
 gok_fights_alone_reward_on_victory_tt: "Se você se tornar [GetTrait('greatest_of_khans').GetName( GetNullCharacter )|l], ganhará @dynasty_prestige_icon![dynasty_prestige|El] escalado pelo número e [title_tier|El] desses [vassals|El]"
 gok_obedient_vassals_leave_war_tt: "@alert_icon! #alert_trial Todos os [vassals|El] que se juntaram à sua [war|El] ao seu lado são removidos como participantes#!"
 gok_joiners_wars_cancelled_tt: "Esses [vassals|El] serão removidos de outras [wars|El] ou terão suas guerras encerradas em [white_peace|El]"
 mpo_greatest_of_khans.0102.t: "Agarrando o Universo"
 mpo_greatest_of_khans.0102.desc: "Cavaleiros de faces macilentas e povos arruinados emergem das terras brutais [gurkhan_to_gok.Custom('ES_DelDela')] [gurkhan_to_gok.GetPrimaryTitle.GetBaseNameNoTier|l], e todos gritam o mesmo nome: [gurkhan_to_gok.GetName]!\n\n[gurkhan_to_gok.GetSheHe|U], [gurkhan_to_gok.Custom('ES_ElLa')] mais temível dos nômades, agora exige a rendição de todos os clãs. Que todos, unidos sob seu sangrento estandarte, sonhem em conquistar o mundo inteiro!\n\nUma vasta coalizão, reunida por [primary_coalition_defender.GetName], cavalga para conter o orgulho de [gurkhan_to_gok.Custom('ES_DelDela')] [gurkhan_to_gok.GetTitledFirstName|l]… A guerra começou, e o som dos cascos de seus cavalos carrega a morte."
 mpo_greatest_of_khans.0102.a: "#EMP Cã dos Cãs, cavalgo ao seu lado!#!"
 mpo_greatest_of_khans.0102.b: "Devemos derrotar [gurkhan_to_gok.Custom('ES_AlAla')] [gurkhan_to_gok.GetTitledFirstNameNoTooltip|l]!"
 mpo_greatest_of_khans.0102.c: "[gurkhan_to_gok.GetFirstNameNoTooltip] não pode ser parado. Eu devo me submeter."
 mpo_greatest_of_khans.0102.d: "Este[gurkhan_to_gok.Custom('ES_EA')] conquistador[gurkhan_to_gok.Custom('ES_XA')] terá meu juramento."
 mpo_greatest_of_khans.0102.e: "Os céus escurecem com flechas, e o destino escapa da vista..."
 gok_took_become_gok_decision_tt: "Tomou a decisão de [decision|El] #high $mpo_become_greatest_of_khans_decision$#!"
 gok_began_war_of_defiance_tt: "Iniciou um #high $mpo_great_war_of_defiance_cb$#! contra todos os [nomads|El] nas [situation_sub_regions|El] compartilhadas da [the_great_steppe|El]"
 gok_gurkhan_declared_intent_tt: "@warning_icon! #X  Se vencerem em sua #high $mpo_great_war_of_defiance_cb$#! se tornará em [GetTrait('greatest_of_khans').GetName( GetNullCharacter )|l] e começará a conquistar o mundo#!"
 gok_warning_one_off_tt: "@alert_icon! #alert_trial Nenhum outro [ruler|El] jamais poderá se tornar [GetTrait('greatest_of_khans').GetName( GetNullCharacter )|l]#!"
 mpo_greatest_of_khans.0103.t: "O Menor dos Cãs"
 mpo_greatest_of_khans.0103.desc_defender_intro: "Eu, [defender.Custom('ES_ElLa')] o mais poderos[defender.Custom('ES_OA')] de todos os nômades, o grande tigre das neves que ousou subjugar todo lobo e todo gato selvagem, fui derrotad[defender.Custom('ES_OA')] e acorrentad[defender.Custom('ES_OA')]. \n\n[defender.GetFirstName], [defender.GetLadyLord|l] dos [defender.GetDomicile.GetCulture.GetCollectiveNoun], não será [defender.Custom('ES_ElLa')] o maior dos cãs.\n\nA estepe volta a cair na anarquia."
 mpo_greatest_of_khans.0103.desc_intro: "[defender.Custom('ES_ElLa')|U] mais poderoso[defender.Custom('ES_OA')] de todos os nômades, o grande tigre das neves que se atreveu a subjugar todo lobo e todo gato selvagem foi derrotado[defender.Custom('ES_OA')] e acorrentado[defender.Custom('ES_OA')].\n\n[defender.GetFirstName], [defender.GetLadyLord|l] dos [defender.GetDomicile.GetCulture.GetCollectiveNoun], não será [defender.Custom('ES_ElLa')] o maior dos cãs.\n\nA estepe volta a cair na anarquia."
 mpo_greatest_of_khans.0103.desc_defender: "Meus próprios guerreiros desesperados se viraram contra mim, me venderam para [attacker.GetName]. Meus povos desonram minha família, meu sonho, meu nome.\n\nEu não sou um [defender.Custom('GetDaughterSon')] do destino."
 mpo_greatest_of_khans.0103.desc_attacker: "Eu quebrei o controle do meu inimigo sobre os chefes! Agora, os cães vão se ferir por restos."
 mpo_greatest_of_khans.0103.desc_defenders: "Abaixamos nossos rostos queimados pelo vento, envergonhados, guardamos as cordas gastas de nossos arcos e amaldiçoamos os falsos presságios que nos fizeram seguir um[defender.Custom('ES_XA')] [defender.GetWomanMan] indign[defender.Custom('ES_OA')] para a guerra…"
 mpo_greatest_of_khans.0103.desc_attackers: "Nossa orgulhosa vitória despedaçou a vontade dos povos de [defender.GetFirstName] e nós, que lutamos juntos, nos alegramos! [defender.Custom('ES_ElLa')|U] inimig[defender.Custom('ES_OA')] de todos foi arrastad[defender.Custom('ES_OA')] perante [attacker.GetName] para sua vergonha."
 mpo_greatest_of_khans.0103.desc: "Os povos de [defender.GetFirstName] se dispersam, perseguidos de pasto em pasto pelos aliados [attacker.Custom('ES_DelDela')] [attacker.GetTitledFirstName|l]. Onde antes havia uma grande ameaça, agora os carniceiros brigam."
 mpo_greatest_of_khans.0103.a: "Ainda assim, um dia, um verdadeiro mestre para todos os nômades poderá surgir..."
 mpo_greatest_of_khans.0001.t: "Meu Kurultai Fala — Para Todo o Mundo!"
 mpo_greatest_of_khans.0001.desc: "Nos céus há muitas grandes luzes. Nos céus estão o sol, a lua e as estrelas. Mas na terra só pode haver um cã.\n\nEu, [ROOT.Char.GetFirstName], sou es[ROOT.Char.Custom('ES_EA')] cã, [ROOT.Char.Custom('ES_ElLa')] o maior de todos os cãs.\n\nApós minha vitória sobre as serpentes que se enroscavam em torno dos meus pés, ninguém ousou falar contra mim no kurultai de todos os clãs. Ansiosos, seus chefes se rendem e prestam seus juramentos, famintos pela conquista do universo.\n\nOs primeiros raios do sol da manhã rasgam o horizonte. Eu monto meu cavalo, e todos os exércitos [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetPrimaryTitle.GetNameNoTier|l] rugem."
 mpo_greatest_of_khans.0001.a: "Eu terei o mundo."
 mpo_greatest_of_khans.0001.mongol_invasion_cb: "Eu posso usar o [mongol_invasion_casus_belli|lE]"
 mpo_greatest_of_khans.0002.a: "Tudo pertence a [genghis_khan.GetTitledFirstNameNoTooltip]."
 mpo_greatest_of_khans.0002.b: "Somente juntos podemos nós, chefes, resistir a [genghis_khan.GetFirstNameNoTooltip]."
 mpo_greatest_of_khans.0003.t: "Um nome para [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l]"
 mpo_greatest_of_khans.0003.desc: "Os presságios poderosos são muitos.\n\nCéu e Terra, dizem, se estendem para me proteger. Em sonhos, em nuvens de poeira, grandes touros prometem a ruína dos meus inimigos. Belos cavalos castrados e éguas, presentes de tendas palacianas… Os anciãos dos clãs prometem isso, e mais ainda…\n\nPreciso de um título digno deste destino."
 mpo_greatest_of_khans.0003.a: "Eu sou #EMP $nick_genghis_khan$#!."
 mpo_greatest_of_khans.0003.b: "Eu sou #EMP $nick_cengiz_khan$#!."
 mpo_greatest_of_khans.0003.c: "#EMP $nick_yekhe_khagan$#!: [ROOT.Char.Custom('ES_ElLa')] Grande."
 mpo_greatest_of_khans.0003.d: "#EMP $nick_dort_yonlug_khagan$#!: senhor[ROOT.Char.Custom('ES_XA')] das quatro direções."
 mpo_greatest_of_khans.0003.e: "#EMP $nick_tengri_khagan$#!: [ROOT.Char.Custom('ES_ElLa')] nascid[ROOT.Char.Custom('ES_OA')] do céu."
 mpo_greatest_of_khans.0003.f: "#EMP $nick_xormuzta$#!: celestial, antig[ROOT.Char.Custom('ES_OA')] e s?bio[ROOT.Char.Custom('ES_OA')]."
 mpo_greatest_of_khans.0003.g: "#EMP $nick_cihangir$#!: conquistador[ROOT.Char.Custom('ES_XA')] do mundo!"
 mpo_greatest_of_khans.0003.h: "#EMP $nick_mar_sargis$#!: guiado pelo santo mártir![ROOT.Char.Custom('ES_OA')] por o santo mártir!"
 mpo_greatest_of_khans.0003.i: "#EMP $nick_akhshunwar$#!: o [ROOT.Char.Custom('ES_ElLa')] portador[ROOT.Char.Custom('ES_XA')] do poder!"
 mpo_greatest_of_khans.0003.j: "#EMP Khagan [ROOT.Char.GetCulture.GetNameNoTooltip]#!: o verdadeiro [ROOT.Char.GetCulture.GetNameNoTooltip]."
 mpo_greatest_of_khans.0003.k: "Eu terei apenas o meu próprio nome."
 gok_event_troops: "Horda [ROOT.Char.GetCulture.GetNameNoTooltip]"
