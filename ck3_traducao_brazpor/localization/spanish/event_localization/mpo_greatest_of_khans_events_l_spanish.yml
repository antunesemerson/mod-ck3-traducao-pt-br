 gok_time_limit_end_decision_other_players_tt: "Se a [dynasty|lE] da [genghis_khan.GetShortUIName] perder o controle de [gok_title.GetName] ou tiver falhado em tomar a [decision|lE] #high $mpo_gok_world_conquest_decision$#! até o ano de #high [gok_empire_crumble_date|0]#!, perderá seus bônus"
 mpo_greatest_of_khans.0040.t: "Desvanecimento do Grande Sonho"
 mpo_greatest_of_khans.0040.desc_timed_out: "Por décadas, os [ROOT.Char.GetHouse.GetName] governaram nosso império de sangue. As orgulhosas muralhas de nossos inimigos foram destruídas, nossas hordas gordas com o saque. Do topo da montanha mais alta, cantamos as louvações de [ROOT.Char.GetFaith.HighGodName], e ouvimos cem mil vozes clamando nossos nomes em retorno!\n\nMas governamos por tempo demais. Nossas promessas de conquista já não inspiram. Os chefes e senhores brigam como abutres, e vozes surgem para questionar meus mandatos..."
 mpo_greatest_of_khans.0040.desc: "Nosso grande império escapou das mãos da minha família! Já não podemos reivindicar o favor do Grande Céu Azul sem sermos desafiados — já não podemos convocar hordas para a guerra com um simples movimento de chicote.\n\nTalvez, nos anos vindouros, eu recupere meu legítimo trono a duras penas, como algum criminoso envergonhado que se liberta de sua [Glossary( 'canga', 'CANGUE_GLOSS' )]..., mas nossa nobre era de conquistas chegou ao fim."
 mpo_greatest_of_khans.0040.a: "Ainda assim... o mundo treme ao meu nome."
 gok_no_more_special_powers: "Ya no puedes usar #high $mpo_offer_submission_or_ruin$#! ni #high $mpo_gok_onslaught_cb$#!"
 gok_no_more_reform_decision: "Ya no puedes tomar la [decision|lE] #high $mpo_gok_world_conquest_decision$#!"
 gok_guaranteed_disastrous_chaotic_succession_tt: "@warning_icon! #X Sua próxima [succession|lE] #high Caótica#! provavelmente despedaçará [ROOT.Char.GetPrimaryTitle.GetName]#!"
 mpo_greatest_of_khans.0041.t: "Grande, mas menos que um cã"
 mpo_greatest_of_khans.0041.desc: "Entre as elegantes paredes da minha [ROOT.Char.Custom('ResidenceBuilding')], com meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l] de leis, de assentamentos e comércio pacífico… ainda sonho os velhos sonhos?\n\nMeu coração canta sobre o destino do Grande Khan, sobre esmagar o mundo inteiro sob os cascos dos meus cavalos?\n\nEste domínio [ROOT.Char.GetGovernment.GetAdjective] não se reúne como um só sob o estandarte da cauda de cavalo. Nem vem em carroças ao meu chamado. Os [ROOT.Char.Custom('GetFighterTermPlural')] e [ROOT.Char.Custom('GetLocalCommonerTermPlural')] que governo não anseiam conquistar unidos sob o céu azul infinito.\n\nNosso sonho de conquista se enfraqueceu, mas ainda somos fortes e ricos."
 mpo_greatest_of_khans.0041.a: "Não é a comodidade o #EMP de verdade#! sonho dos nômades?"
