 MPO_GOK_ONSLAUGHT_NAME_BASE: "Investida de [ATTACKER.GetPrimaryTitle.GetName|l] contra [DEFENDER.GetPrimaryTitle.GetBaseNameNoTier]"
 gok_subjugated_army_name_subject_troops: "Tropas Sujeitas de [army_origin_realm.GetAdjectiveNoTooltip]"
 mpo_war_nomad_army_name: "Horda [army_culture.GetNameNoTooltip]"
 gok_offer_submission_acceptance_bonus_tt: "Todos os [rulers|El] tornam-se mais propensos a aceitar o #high $mpo_offer_submission_or_ruin$#! [interaction|El]"
 gok_cb_event_troops_tt: "Ganha um exército de [special_troops|lE], com tamanho proporcional ao [realm|El] de [gok_victim.GetShortUIName]"
 refused_the_great_khan_opinion: "Rejeitou a Misericórdia do Maior dos Cãs"
 tried_to_become_gok_opinion: "Tentou se Tornar o Maior dos Cãs"
 gok_sacking_cultural_acceptance: "Retribuição brutal trazida por uma horda invasora"
 gok_slaughter.t: "Massacre em [defender.GetCapitalLocation.GetNameNoTooltip]"
 gok_slaughter.tooltip: "Dizem que, entre as pilhas de cadáveres [defender.Custom('ES_DelDela')] [defender.GetPrimaryTitle.GetName|l], havia #N [gok_slaughter_value]#! almas nobres cujos corpos foram massacrados até ficarem irreconhecíveis.\n\nSeu [defender.GetTitleAsName|l] havia escolhido desafiar [attacker.Custom('ES_AlAla')] grande [attacker.GetTitleAsName|l] de [attacker.GetPrimaryTitle.GetName|l]."
 gok_slaughter_victim.t: "Executado pelos Invasores"
 gok_destruction.t: "[defender.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] Devastado"
 gok_destruction.tooltip: "As hordas [attacker.Custom('ES_DelDela')] [attacker.GetPrimaryTitle.GetName|l] inundam as terras [defender.Custom('ES_DelDela')] [defender.GetTitledFirstName|l]! Em sua fúria selvagem, arrasam #N [destroyed_holdings]#! [holdings|El] até reduzi-las a escombros e massacrando todos os seus habitantes.\n\nTal é a grande ira [attacker.Custom('ES_DelDela')] [attacker.GetTitleAsName|l]."
 gok_slaughter_victim.tooltip: "[victim.GetShortUIName] foi capturado no avanço das hordas de [gok.GetPrimaryTitle.GetName|l] e [victim.GetHerHim] foi morto sem piedade."
 custom.every_taken_county: "Cada novo [county|lE] conquistado"
 mpo_gok_onslaught_victory_attacker_admin: "Você toma todas as terras e títulos de [defender.GetShortUIName]."
 mpo_gok_onslaught_victory_defender_admin: "[attacker.GetShortUIName|U] toma todas as suas terras e títulos!"
 mpo_gok_onslaught_victory_admin: "[attacker.GetShortUIName|U] toma todas as terras e títulos de [defender.GetShortUIName]."
 mpo_gok_onslaught_victory_attacker: "Você toma de [defender.GetShortUIName] todas as terras, assim como os títulos pertencentes a ele ou ela e aos vassalos mais poderosos dele ou dela."
 mpo_gok_onslaught_victory_defender: "[attacker.GetShortUIName|U] toma todos os seus títulos, assim como os de seus vassalos mais fortes!"
 mpo_gok_onslaught_victory: "[attacker.GetShortUIName|U] toma todas as terras de [defender.GetShortUIName] e também os títulos pertencentes a ele e aos seus vassalos mais poderosos."
 mpo_gok_onslaught_white_peace: "[defender.GetShortUIName|U] mantém todos os seus títulos e permanece um governante independente."
 mpo_gok_onslaught_white_peace_defender: "Você mantém todos os seus títulos e permanece um governante independente."
 mpo_gok_onslaught_defeat_attacker: "$mpo_gok_onslaught_white_peace$ Você foi humilhado."
 mpo_gok_onslaught_defeat_defender: "$mpo_gok_onslaught_white_peace_defender$ [attacker.GetShortUIName|U] foi humilhado."
 mpo_gok_onslaught_defeat: "$mpo_gok_onslaught_white_peace$ [attacker.GetShortUIName|U] foi humilhado."
 mpo_greatest_of_khans.0020_title: "[recipient.GetTitledFirstNameNoTooltip] Se Submete"
 goK_war_gain_all_titles: "Ganha #high todos#! os [vassals|lE] e [titles|lE] de [Select_CString( defender.IsLocalPlayer, 'seu personagem', defender.GetShortUIName)] abaixo do [title_tier|lE] de [empire|lE]"
 goK_war_gain_vassal_titles: "Ganhe a maioria de [titles|El] [Concept('landed', 'com terras')|E] dos [duchy|El] de [defender.GetShortUIName] e [vassals|El] não [Concept('administrative', 'administrativos')|E] de [title_tier|El] [kingdom|El]"
 mpo_greatest_of_khans.0021.opening: "Grande [actor.GetTitledFirstNameNoTooltip|l], unificador[actor.Custom('ES_XA')] dos povos dos cavalos,"
 mpo_greatest_of_khans.0021.desc_nomad: "O destino está com você, e assim também estão os [recipient.GetDomicile.GetCulture.GetCollectiveNoun].\n\nEu [recipient.GetFirstName], te prometo toda a minha força. Com meus melhores cavaleiros, serei empunhado em sua mão direita."
 mpo_greatest_of_khans.0021.desc: "Eu me submeto. É justo que eu, e todos os soberanos da terra, tema e honre sua grandeza e poder.\n\nSua sombra temível é projetada nas paredes da minha casa, sobre o trono de [recipient.GetPrimaryTitle.GetNameNoTier]. Nunca lhe faltará minha lealdade e tributo."
 mpo_greatest_of_khans.0021.a: "[recipient.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] é poupado da espada da minha ira."
 mpo_greatest_of_khans.0022.opening: "[actor.GetFirstNameNoTooltip], ó, o maior[actor.Custom('ES_XA')] dos vira-latas,"
 mpo_greatest_of_khans.0022.desc_nomad: "Será que [recipient.GetWomanMan] — com o sopro de vida ainda n — deixará um inimigo tomar sua aljava? Qual é o valor de sua vida então?\n\nSe eu morrer defendendo meu [recipient.GetDomicile.GetCulture.GetCollectiveNoun], enterrarão minha aljava e arco ao lado dos meus ossos. Mas se #EMP você#! morrer aqui... quebraremos seu arco. Sujaremos seu corpo com as fezes dos animais. Alimentaremos sua carne aos cães."
 mpo_greatest_of_khans.0022.desc: "Seus emissários cheiravam a cavalo e não ofereciam nada além de ameaças grosseiras ao nobre reino de [recipient.GetPrimaryTitle.GetNameNoTier]. Eu os mandei matar.\n\nSaia das cabanas de pele de seu lar desolado, se desejar, mas fortes muralhas aguardam você aqui."
 mpo_greatest_of_khans.0022.a: "[recipient.GetPrimaryTitle.GetNameNoTierNoTooltip|U] se afogará em sangue."
 mpo_greatest_of_khans.0022.a_nomadic: "O destino de [recipient.GetPrimaryTitle.GetNameNoTierNoTooltip] está selado."
 mpo_greatest_of_khans.0030.t: "O Eterno [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]"
 mpo_greatest_of_khans.0030.desc: "Em milhares de cidades e aldeias, os guerreiros da hoste [ROOT.Char.GetCulture.GetName] desfilam orgulhosamente. Nos palácios e grandes salões, a palavra dos meus oficiais é lei. Todo nômade e animal da estepe sabe em seu coração que é governado por mim. E os senhores das terras assentadas se encolhem aos meus pés.\n\nCom filósofos e caudilhos militares servindo à minha vontade, agora tudo pode ser remoldado, e meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] recebe sua forma eterna…"
 mpo_greatest_of_khans.0030.a: "#EMP Queime! Mate! Expulse!#! Até que todos vivam a vida nômade!"
 mpo_greatest_of_khans.0030.a.flavor: "A vida estabelecida é inferior. Ela enfraquece os homens. A maioria dos povos do meu império deve escolher: abandonar suas casas e adotar a vida nômade... ou morrer."
 mpo_greatest_of_khans.0030.b: "Um estado administrativo, para ordenar firmemente o [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 mpo_greatest_of_khans.0030.b.flavor: "Os grandes impérios administrativos do mundo duraram muito tempo, e sua extensão foi vasta."
 mpo_greatest_of_khans.0030.c: "Uma hierarquia feudal, para enraizar o governo [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]."
 mpo_greatest_of_khans.0030.c.flavor: "Nós, nômades, não somos estranhos a juramentos, e há algo agradável nas palavras feudais de honra..."
 mpo_greatest_of_khans.0030.d: "Deixe os clãs governarem o que os clãs conquistaram."
 mpo_greatest_of_khans.0030.d.flavor: "A glória do clã [ROOT.Char.GetHouse.GetName] é a maior... se ficarmos juntos, e organizarmos nossos reinos ao longo das linhas de parentesco."
 mpo_greatest_of_khans.0030.e: "Meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] é glorioso como é."
 mpo_greatest_of_khans.0030.e.flavor: "Pela força, meu povo governa. Que nossos súditos estabelecidos se queixem. As patas dos nossos cavalos os silenciarão."
