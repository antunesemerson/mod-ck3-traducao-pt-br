 mpo_greatest_of_khans.0050.opening: "Sua morte é adiada por estas palavras."
 mpo_greatest_of_khans.0050.desc: "[attacker.Custom('ES_ElLa')|U] grande [attacker.GetTitleAsName|l], cujo destino é esmagar todos os reinos sob os cascos de seus cavalos, que queima e saqueia… permitirá que você viva, para que sirva a [attacker.GetPrimaryTitle.GetName].\n\n"
 mpo_greatest_of_khans.0050.desc_end: "Cão de [defender_primary.GetNameNoTier]: você cuidará do vasto rebanho dos povos [attacker.Custom('ES_DelDela')] [attacker.GetTitleAsName|l] e mendigará por migalhas ao seu bel-prazer."
 mpo_greatest_of_khans.0050.desc_reorganized: "[attacker.Custom('ES_AlAla')|U] [attacker.GetTitleAsNameNoTooltip|l] não tem interesse em ouvir sua voz ridícula. Você responderá perante [liege.GetName]."
 mpo_greatest_of_khans.0050.a: "Talvez partam tão rapidamente quanto chegaram…"
 mpo_greatest_of_khans.0051.opening: "A todos os miseráveis do país [defender_primary.GetAdjective],"
 mpo_greatest_of_khans.0051.desc: "[attacker.Custom('ES_ElLa')|U] grande [attacker.GetTitleAsName|l], que tomou tudo de vosso povo, cujos guerreiros inundam vossas terras, declara isto:\n\nLevai vosso rosto em lágrimas ao vento e cavalgai para longe. Dizei a todos que encontrardes que em breve o mundo pertencerá às hordas [attacker.Custom('ES_DelDela')] [attacker.GetTitleAsNameNoTooltip|l]."
 mpo_greatest_of_khans.0051.a: "Meu suserano fracassou... Estou perdid[ROOT.Char.Custom('ES_OA')]."
