l_spanish:
 #Forming the Swiss Confederation, by Flavio Verna
 middle_europe_decisions.0001.t: "A Confederação Suíça"
 middle_europe_decisions.0001.desc: "Durante mucho tiempo, las ciudades en torno a los Alpes centrales se han visto amenazadas por otros actores dentro del Imperio. Unidas bajo una sola bandera, ahora han forjado alianzas mutuamente beneficiosas y recibido el honor de la inmediación imperial. \n\nEn honor a las contribuciones de mi dinastía a las ciudades-estado suizas, me han elegido como principal dirigente de esta unión, representante de todos los cantones de nuestra nueva Confederación Suiza. Ya no seremos amenazados por extraños, sino que nos levantaremos como actor fuerte e independiente dentro del Imperio."
 middle_europe_decisions.0001.a: "Permanecemos juntos!"
 middle_europe_decisions.0002.desc.emperor: "Tras años de luchas y acuerdos diplomáticos incómodos, he debido conceder a los cantones suizos la inmediación imperial.\n\nEsta reunión de ciudades alpinas se ha unido en una gran confederación para protegerse de las depredaciones de los señores borgoñones y alemanes. Debo tener cuidado de mantenerlos bajo control, no sea que su logro siembre disensión entre los burgueses vecinos."
 middle_europe_decisions.0002.desc.vassals: "Una nueva entidad conocida como la Confederación Suiza ha surgido en el Imperio. Son un conglomerado de ciudades con inmediación imperial asentadas alrededor de los Alpes centrales, que se han unido en una alianza defensiva para protegerse de los demás electores que las rodean.\n\nComo fuerza independiente a tener en cuenta, se han liberado de cualquier reivindicación preexistente sobre sus tierras, ya sea de los antiguos burgundios al oeste o de los señores alemanes al norte.\n\nDebo prestar atención a esta nueva amenaza potencial en el Imperio."
 middle_europe_decisions.0002.a: "Que peculiar..."
 #Forming the Archduchy of Austria, by Flavio Verna
 middle_europe_decisions.0003.t: "O Arquiducado da Áustria"
 middle_europe_decisions.0003.desc: "Graças às minhas ilustres conquistas consolidando as terras centrais da Áustria e ao tremendo poder que minha dinastia adquiriu sobre o Sacro Império Romano, [scoped_emperor.GetTitledFirstName|l] finalmente reconheceu a primazia da Áustria sobre os muitos duques insignificantes da Alemanha.\n\nDe agora em diante, todos os meus sucessores carregarão o título distinto de #EMP arquiduque#!, igual a qualquer rei, para se destacarem dos príncipes e princesas menores do Império."
 middle_europe_decisions.0003.a: "Austria erit in orbe ultima!"
 middle_europe_decisions.0004.desc.emperor_archduke: "Aproveitando seu controle sobre o trono imperial, [scoped_ruler.GetTitledFirstName|l] concedeu a si mesm[scoped_ruler.Custom('ES_OA')] o título de Arquiduque da Áustria, tornando o ducado igual a qualquer reino."
 middle_europe_decisions.0004.desc.emperor: "É justo que os governantes do coração da Áustria, lar da minha própria dinastia, se distingam dos demais príncipes do Império. \n\nAssim, cedi ao pedido de meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('scoped_ruler'))] e [scoped_ruler.Custom('ES_LoLa')] e proclamei [scoped_ruler.GetFirstName] [scoped_ruler.GetTitleTierName] da Áustria."
 middle_europe_decisions.0004.desc.emperor_blackmailed: "A ?ustria sempre se considerou um degrau acima do resto do Imp?rio, e hoje [scoped_ruler.GetFirstName] confirmou isso. Usando seus v?nculos comigo, n?o tive escolha a n?o ser reconhecer sua posi??o como arquiduqu[scoped_ruler.Custom('ES_EEsa')], igual a qualquer rei."
 middle_europe_decisions.0004.desc.vassals: "Aproveitando a influência que a dinastia de [scoped_ruler.GetDynastyName] tem sobre o trono imperial, [scoped_ruler.GetFirstName] convenceu [scoped_emperor.GetTitledFirstName|l] a conceder-lhe honras especiais.\n\nA partir de hoje, a Áustria deve ser considerada um arquiducado, a primeira entre as principados do Sacro Império Romano."
 middle_europe_decisions.0004.a: "Foi totalmente merecido."
 middle_europe_decisions.0004.b: "Que conveniente..."
 #Reforming the Carolingian Empire, by Flavio Verna
 middle_europe_decisions.0005.t: "O Sonho de Carlos Magno"
 middle_europe_decisions.0005.desc: "A Europa está unida mais uma vez. Todos os descendentes dos francos foram reunidos sob uma única bandeira e permanecem unidos contra os infiéis a oeste e os pagãos a leste.\n\nPela graça de [scoped_ruler.GetFaith.HighGodName], minha família recebeu o privilégio de portar a coroa deste Império Carolíngio restaurado. E, ao contrário daqueles que vieram antes de nós, não permitiremos que disputas dinásticas desfaçam este grande reino."
 middle_europe_decisions.0005.a: "Louvado seja [scoped_ruler.GetFaith.HighGodName]!"
 middle_europe_decisions.0006.desc: "[scoped_ruler.GetTitledFirstName] e seu exército de francos avançou tanto nas terras do Império que ele/ela passou a afirmar que é o/a autêntic[scoped_ruler.Custom('ES_OA')] herdeir[scoped_ruler.Custom('ES_OA')] de Carlos Magno e que o Sacro Império Romano é apenas uma pálida imitação da glória carolíngia.\n\nCom todas as províncias originais e grande parte da Europa Ocidental sob seu controle, tornou-se difícil para qualquer um negar tal दावा."
 middle_europe_decisions.0006.a: "Como se atreve!"
 middle_europe_decisions.0006.b: "Será que este Império durará mais tempo, eu me pergunto?"
 #Unifying the Burgundies, by Flavio Verna
 middle_europe_decisions.0007.t: "Borgonha Unificada"
 middle_europe_decisions.0007.desc: "Todas las tierras de Borgoña se han unido bajo una misma corona. Ya no están divididas entre pequeños señoríos enfrentados, nuestras antiguas tierras han reclamado la dignidad de reino.\n\nYa ha pasado tiempo desde que la autoridad de [former_liege.GetTitledFirstName|l] sobre mí empezara a debilitarse hasta el punto que ya no siento ninguna lealtad hacia quien considero un[former_liege.Custom('ES_OA')] igual más que un[former_liege.Custom('ES_OA')] señor[former_liege.Custom('ES_OA')]."
 middle_europe_decisions.0007.a: "Não precisamos da proteção de ninguém!"
 middle_europe_decisions.0008.desc.liege: "Llevaba un tiempo preocupad[ROOT.Char.Custom('ES_OA')] por los intentos de [scoped_ruler.GetTitledFirstName|l] de unir las tierras borgoñonas bajo una misma bandera, y mis peores temores se han cumplido.\n\n¡Es[scoped_ruler.Custom('ES_EA')] perr[scoped_ruler.Custom('ES_OA')] ingrat[scoped_ruler.Custom('ES_OA')] se ha proclamado [scoped_ruler.GetTitleTierName] de Borgoña y roto su pacto de vasallaje!"
 middle_europe_decisions.0008.desc.others: "Após passar anos unindo as terras borgonhesas, [scoped_ruler.GetFirstName] decidiu coroar-se [scoped_ruler.GetTitleTierName] de Borgonha e proclamar sua independência de [former_liege.GetTitledFirstName|l].\n\nÉ improvável que esse descarado ato de traição seja esquecido tão cedo…"
 middle_europe_decisions.0008.a: "Ele não passa de um[scoped_ruler.Custom('ES_XA')] traidor[scoped_ruler.Custom('ES_XA')]!"
 middle_europe_decisions.0008.b: "Pelo menos os topógrafos ficarão felizes."
 #Empowering Sicilian Parliament, by Flavio Verna
 middle_europe_decisions.0010.t: "A Assembleia dos Estados"
 middle_europe_decisions.0010.desc: "La infraestructura dejada por los griegos en las provincias de Sicilia y Apulia servirá como base para acelerar la transición de [scoped_ruler.GetPrimaryTitle.GetName] a una forma de gobierno más ilustrada. \n\nAl reunir a los representantes de los tres Estados en un único órgano consultivo, gobernado por nuevas leyes basadas en las antiguas tradiciones romanas, garantizaré la estabilidad y la prosperidad en el Mediterráneo para las generaciones venideras. Ahora solo tengo que decidir dónde debe celebrarse este parlamento."
 middle_europe_decisions.0010.tt_napoli_warning: "@warning_icon! #warning Construir o parlamento em [GetTitleByKey('c_napoli').GetNameNoTier] impedirá você de construir uma universidade!#!"
 middle_europe_decisions.0010.a: "Em Palermo, sua antiga sede!"
 middle_europe_decisions.0010.b: "Será em Nápoles."
 middle_europe_decisions.0010.c: "Devo considerar seriamente essa decisão."
 middle_europe_decisions.0011.desc: "[scoped_ruler.GetTitledFirstName] ha nombrado representantes de la nobleza, el clero y los burgueses para que formen un nuevo parlamento en el reino de Sicilia.\n\nEste cuerpo consultivo ayudará [scoped_ruler.Custom('ES_AlAla')] [scoped_ruler.GetTitleTierName] y a sus sucesores a gobernar sabia e eficientemente, para beneficio de todos sus súbditos."
 middle_europe_decisions.0011.a: "Entendi..."
 #Gothic Innovations, by Flavio Verna
 middle_europe_decisions.0012.t: "Opus Francigenum"
 middle_europe_decisions.0012.desc: "Uma nova era de prosperidade está sobre nós. [scoped_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip] emergiu da Idade das Trevas como um farol brilhante de arte e filosofia.\n\nNossas cidades estão se tornando centros efervescentes de comércio, erguendo novas catedrais maravilhosas para rivalizar com os antigos monumentos do Império Romano, atraindo pintores, bardos e filósofos de todos os tipos. Sob o patrocínio iluminado de minha dinastia, o povo [scoped_ruler.GetCulture.GetName] se tornará a inveja de toda a Europa."
 middle_europe_decisions.0012.a: "Que nosso grande trabalho continue!"
 middle_europe_decisions.0013.t: "O Período Gótico"
 middle_europe_decisions.0013.desc.french: "[scoped_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip] está passando por um período de grande prosperidade e crescimento, para benefício de todo o nosso povo. \n\nNossas cidades estão se transformando em centros comerciais movimentados, erguendo novas e maravilhosas catedrais para rivalizar com os antigos monumentos do Império Romano, atraindo pintores, bardos e filósofos de toda espécie. Sob o patrocínio esclarecido de [scoped_ruler.GetTitledFirstName|l] e da dinastia [scoped_ruler.GetDynasty.GetBaseName], nos tornaremos a inveja de toda a Europa."
 middle_europe_decisions.0013.desc.italian: "Parece que [scoped_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip] está vivendo um período de grande prosperidade e crescimento. \n\nPoetas, filósofos, arquitetos… Muitas pessoas cultas se reúnem na corte de [scoped_ruler.GetTitledFirstName|l], no entanto, tudo o que conseguiram até agora é uma procissão aparentemente interminável de monumentos rudes e bárbaros."
 middle_europe_decisions.0013.desc.fallback: "[scoped_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip] está vivendo um período de grande prosperidade e crescimento, em benefício de todo o povo [ROOT.Char.GetCulture.GetNameNoTooltip]. \n\nNovas cidades estão se tornando centros comerciais movimentados, erguendo novas e maravilhosas catedrais que rivalizam com os antigos monumentos do Império Romano, atraindo pintores, bardos e filósofos de todos os tipos. Sob o patrocínio iluminado de [scoped_ruler.GetTitledFirstName|l] e a dinastia [scoped_ruler.GetDynasty.GetBaseName], esta terra será a inveja de toda a Europa."
 middle_europe_decisions.0013.a: "Que tempos maravilhosos em que vivemos!"
 middle_europe_decisions.0013.b: "Bah! Isso nunca vai durar."
 middle_europe_decisions.0013.c: "Bom para eles, suponho..."
 #Restore Holy Roman Empire, by Ewan Cowhig Croft
 middle_europe_decisions.0015.t: "O Império do Ocidente"
 middle_europe_decisions.0015.desc: "Demasiado tiempo hace que nadie reclama el legado del emperador de Roma. Hoy, eso cambia cuando me veo cara a cara con [founder_hof.GetTitledFirstName|l] en el/la mayor [founder.GetFaith.HouseOfWorship] de todo [ceremony_locale.GetNameNoTooltip], rodead[ROOT.Char.Custom('ES_OA')] por mis vasallos y clero.\n\nIntercambiamos plegarias y favores de manera mecánica, solicitando a [founder.GetFaith.HighGodName] que me bendiga con fuerza y clemencia para gobernar mi imperio según Su voluntad. Con solemnidad, [founder_hof.GetTitledFirstNameNoTooltip|l] me otorga la espada y la corona y me encarga cuidar de toda la Cristiandad.\n\nAl silencio le sigue una oleada de himnos cuyo tono se van elevando, ahogados solo por los furiosos vítores de mis nobles.\n\nPor fin soy empera[ROOT.Char.Custom('ES_DorTriz')] del Sacro Imperio Romano."
 middle_europe_decisions.0015.a: "De Augusto a Carlos Magno, a [founder.GetFirstNameNoTooltip]!"
 middle_europe_decisions.0016.desc: "O Império Romano do Ocidente jaz adormecido há algum tempo, deixando no ar a resposta [founder.GetFaith.GetAdjectiveNoTooltip] à questão da dignidade imperial.\n\nNo ar até agora, é claro, quando [founder.GetTitledFirstName|l], com o consentimento de [founder_hof.GetTitledFirstName|l], restaura o império de Carlos Magno em uma cerimônia esplêndida realizada na maior [founder.GetFaith.HouseOfWorshipPlural] de [ceremony_locale.GetNameNoTooltip].\n\n[founder.GetFaith.PriestNeuterPlural|U] [founder.GetFaith.GetAdherentNamePlural] de todo o mundo se regozijam, convictos de que Roma enfim tem mais uma vez um herdeiro verdadeiro e divino!"
 middle_europe_decisions.0016.a: "Bah, uma pretensiosa concepção de império."
 middle_europe_decisions.0016.b: "B?rbaros germ?nicos, #emphasis EU#! sou o imperador de Roma!"
 middle_europe_decisions.0016.c: "Esperemos que o império prove ser pacífico."
 middle_europe_decisions.0016.d: "Um espetáculo glorioso!"
 #Electorate of Saxony by James Beaumont
 establish_the_electorate_of_saxony_decision: "Estabelecer o Eleitorado da Saxônia"
 establish_the_electorate_of_saxony_decision_desc: "As terras do interior a leste têm permanecido por muito tempo fora do alcance do Império. Devemos consolidar esses títulos em uma nova Saxônia, para assegurar nosso domínio sobre a região."
 establish_the_electorate_of_saxony_decision_tooltip: "$establish_the_electorate_of_saxony_decision_desc$"
 establish_the_electorate_of_saxony_decision_confirm: "Forjar uma nova Saxônia!"
 polabia_must_be_hre_culture_tt: "Pelo menos 12 [counties|lE] em [GetGeographicalRegion('custom_polabia').GetName] são da sua cultura ou da cultura do seu [liege|lE]."
 polabia_held_or_nonexistent.tt: "$k_sorbia$ não existe ou está em seu poder."
 middle_europe_decision.0017.tt: "Como Imperador, a Saxônia será concedida a um [vassal|lE] ou [courtier|lE] ao ser criada."
 middle_europe_decisions.0017.t: "O Eleitorado da Saxônia"
 middle_europe_decisions.0017.desc: "Por muito tempo, a Polábia esteve fora do alcance dos inimigos do [hre_emperor_scope.GetPrimaryTitle.GetTierAsNameNoTooltip] mas agora sua população passou a considerar $e_hre$ como seu verdadeiro lar.\n\nCom o estabelecimento do Eleitorado da Saxônia, a região da Alta Saxônia permanecerá agora e para sempre nas mãos [hre_emperor_scope.Custom('ES_DelDela')] [hre_emperor_scope.GetTitleAsNameNoTooltip] e sob a orientação de [hre_emperor_scope.GetFaith.HighGodName]."
 middle_europe_decisions.0017.a: "Glória à Saxônia!"
 middle_europe_decisions.0017.b: "[heir_scope.Custom2('MyCharacterIntroduction', ROOT.Char)|U] merece esse título."
 middle_europe_decisions.0017.c: "Verdadeiramente, [most_powerful_saxon.GetNameNoTooltip] é digno."
 middle_europe_decisions.0017.d: "Este é o meu presente para a Igreja."
 middle_europe_decisions.0017.e: "Parabéns, [rando_courtier_scope.GetNameNoTooltip]!"
 middle_europe_decisions.0018.desc: "$middle_europe_decisions.0017.desc$\n\n[hre_emperor_scope.GetNameNoTooltip] decidiu conceder este novo título a [new_saxon_king.GetName] em reconhecimento aos seus serviços ao trono."
 middle_europe_decisions.0018.a.new_king: "Glória para mim!"
 middle_europe_decisions.0018.a.slav: "Malditos sejam!"
 middle_europe_decisions.0018.a: "Boa para eles."
