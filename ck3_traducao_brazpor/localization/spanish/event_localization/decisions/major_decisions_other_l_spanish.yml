l_spanish:
 major_decisions.0100.t: "Linhagem Sagrada"
 major_decisions.0100.desc.temporal: "Graças à minha devoção pura e trabalho incansável, eu uni de forma indissolúvel os mais sagrados cargos da fé [scoped_ruler.GetFaith.GetAdjective] à dinastia [scoped_ruler.GetDynasty.GetBaseName].\n\nUm número crescente de pessoas no clero e entre os fiéis passou a considerar minha família como os escolhidos para zelar pelas relíquias sagradas e como os mensageiros da vontade divina."
 major_decisions.0100.desc.spiritual: "Minha devoção inabalável aos representantes [scoped_ruler.GetFaith.HighGodNamePossessive] na Terra não passou despercebida. \n\n[scoped_pope.GetTitledFirstName|l] reconheceu oficialmente as contribuições da minha família e consagrou nosso sobrenome como defensores eternos da fé [scoped_ruler.GetFaith.GetAdjective]."
 major_decisions.0100.a: "Somos mais do que meros mortais."
 major_decisions.0100.b: "Virtude sem falhas!"
 major_decisions.0102.desc.temporal: "Graças à sua conduta impecável e governo esclarecido, [scoped_ruler.GetTitledFirstName|l] será imortalizad[scoped_ruler.Custom('ES_OA')] como o pilar da [scoped_ruler.GetFaith.GetName].\n\n[scoped_ruler.GetSheHe|U] se tornou de longe o/a [scoped_ruler.GetTitleTierName] mais influente e respeitad[scoped_ruler.Custom('ES_OA')] da história recente, e alguns afirmam que talvez haja uma parcela de sangue divino correndo por suas veias."
 major_decisions.0102.desc.spiritual: "Tão grandes são os feitos de [scoped_ruler.GetTitledFirstName|l] que a/o [scoped_pope.GetFaith.ReligiousHeadName] em pessoa reconheceu oficialmente seu papel decisivo na defesa e na propagação das virtudes [scoped_ruler.GetFaith.GetAdjective]s.\n\nA dinastia [scoped_ruler.GetDynasty.GetBaseName] será lembrada por muito tempo por sua piedade e zelo graças à conduta impecável de tão grande [scoped_ruler.GetWomanMan]."
 major_decisions.0102.a: "Vivemos em tempos abençoados."
 major_decisions.0102.b: "Eles são um exemplo para todos nós!"
 major_decisions.0103.desc.temporal: "[scoped_ruler.GetTitledFirstName] dedicou sua vida a revestir o nome de nossa família com o manto da ascendência divina, e os frutos de seu trabalho finalmente começam a aparecer. \n\nUm número cada vez maior de pessoas no clero e entre os fiéis passou a considerar nossa dinastia como a guardiã escolhida das relíquias sagradas e arauto da vontade divina."
 major_decisions.0103.desc.spiritual: "[scoped_ruler.GetTitledFirstName] dedicou sua vida a conquistar o favor do clero [scoped_ruler.GetFaith.GetAdjective] e, finalmente, seu trabalho está dando frutos. \n\n[scoped_pope.GetTitledFirstName|l] reconheceu as contribuições de nossa família e consagrou nosso nome como defensores eternos da fé."
 major_decisions.0103.a: "Devemos agradecer a [scoped_ruler.Custom('ES_ElElla')]."
 major_decisions.0103.b: "Mais blasfêmia d [scoped_ruler.GetFirstNameNoTooltip]..."
 #STRENGTHEN BLOODLINE
 major_decisions.0500.t: "A Força da Dinastia [ROOT.Char.GetDynasty.GetBaseNameNoTooltip]"
 major_decisions.0500.desc: "Por gerações, nossa dinastia é conhecida pela força de seu sangue. Vigor, beleza e intelecto são atributos associados ao nome [ROOT.Char.GetDynasty.GetBaseNameNoTooltip].\n\nMinha própria excelência apenas confirma isso - todas as melhores qualidades de nossa dinastia em um indivíduo perfeito. Meu nome e meus dons viverão através de meus descendentes por séculos."
 major_decisions.0500.a: "Temos um futuro brilhante pela frente!"
 #DYNASTY OF MANY CROWNS
 major_decisions.0501.desc: "Por meio de casamentos cuidadosamente planejados, alianças e conquistas, a dinastia [ROOT.Char.GetDynasty.GetNameNoTooltip] assumiu seu lugar legítimo entre as verdadeiras potências do mundo conhecido.\n\n[realm_1.GetNameNoTierNoTooltip|U], [realm_2.GetNameNoTierNoTooltip|U], [realm_3.GetNameNoTierNoTooltip|U], [realm_4.GetNameNoTierNoTooltip|U]… Nossos domínios se estendem por toda parte. Muitas coroas repousam sobre nossas cabeças, mas, por sangue, estamos unidos como um só."
 major_decisions.0501.a: "Que nosso legado viva eternamente!"
 major_decisions.0001.t: "Uma Nova Era"
 major_decisions.0001.desc: "As antigas tradições nos serviram bem, e sempre as honraremos. No entanto, como [ROOT.Char.GetTitleAsNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], cheguei à conclusão de que devemos adotar o feudalismo se quisermos continuar prosperando. É o próximo passo vital em nosso caminho para a grandeza!"
 major_decisions.0001.a: "Vida longa ao [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]!"
 major_decisions.0002.opening: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 major_decisions.0200.t: "De Volta às Origens"
 major_decisions.0200.desc: "Embora eu esteja acostumad[ROOT.Char.Custom('ES_OA')] um sistema hierárquico rígido e a camponeses que lavram os campos e não fazem perguntas, descubro que governo apenas tribos indisciplinadas. Essas pessoas não me respeitam, só respeitam a força.\n\nMostrarei a eles minha força! Eu me livrarei dos ornamentos de majestade que meus súditos detestam e conquistarei seus corações com a espada erguida!"
 major_decisions.0200.a: "Vou provar meu valor!"
 #Dai Viet
 major_decisions.4000.t: "O reinado do imperador do sul"
 major_decisions.4000.desc: "Das terras natais sagradas dos meus antepassados aos rios sempre caudalosos do delta do Mekong, o eco do meu triunfo é inegável.\n\nNosso povo levou séculos para alcançar seu verdadeiro potencial contra os opressores do norte, e agora estamos unidos para enfrentar perigos ainda maiores.\n\nQue os reinos saibam que eu, [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], e meu sangue abençoado seremos os verdadeiros guardiões destas terras."
 major_decisions.4000.a: "Os céus abençoam meu sangue!"
 major_decisions.4000.b: "Este ? #italic nosso#! estandarte."
 major_decisions.4000.c: "Permaneci de pé diante do sol para fazer sombra ao meu povo."
 major_decisions.4001.t: "A fundação de um império viet"
 major_decisions.4001.desc: "Notícias vindas de longe informam uma declaração imperial: a proclamação de [founder.GetFullNameNoTooltip] como governante. Após um esforço extenuante para preservar sua independência soberana, adquiriram a experiência para estabelecer uma pátria para seu povo.\n\nVeremos por quanto tempo essa estabilidade perdura antes que rivais perigosos ameacem com sua vigilância hostil."
 major_decisions.4001.a: "Bem-vindos à mesa redonda."
 major_decisions.4001.b: "Mais um?"
 #Majapahit
 major_decisions.5000.t: "O ritual da ascensão"
 major_decisions.5000.desc: "Com a formação do meu império, [ritual_guide.Custom('ES_ElLa')] [ritual_guide.GetTitledFirstName|l] me escoltou ao templo ao amanhecer para esboçar nossa jornada vindoura.\n\n\"O cosmos da divindade gira em torno de vós, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Já não sois apenas um[ROOT.Char.Custom('ES_XA')] buscador[ROOT.Char.Custom('ES_XA')], mas um[ROOT.Char.Custom('ES_XA')] criador[ROOT.Char.Custom('ES_XA')]. Conseguireis isso absorvendo as cinzas de Merapi ou purificando vossa alma sob as quedas de Sri?\", concluiu com um tom calmo.\n\nPreciso traçar o caminho para meus súditos e para mim."
 major_decisions.5000.a: "Devo me tornar um[ROOT.Char.Custom('ES_OA')] com o Monte Merapi, lançando fogo e cinzas!"
 major_decisions.5000.b: "Om, Sri Sedana, vincule-nos ao espírito do mundo."
 major_decisions.5001.t: "Nascimento do Majapahit"
 major_decisions.5001.desc: "Meus conselheiros me falaram da fundação do império insular de [founder.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nEmbora afirmem que seu povo considera seu [founder.GetTitleAsNameNoTooltip|l] um[founder.Custom('ES_XA')] salvador[founder.Custom('ES_XA')] de sua fé e cultura, ainda não sabemos quais serão suas intenções daqui em diante.\n\nEsperarei para ver se ele decide agir de forma amistosa com meu domínio ou não."
 major_decisions.5001.a: "Por enquanto, já temos nossos próprios problemas."
 major_decisions.5001.b: "Apenas[founder.Custom('ES_OA')] mais um aspirante ao poder, no fim das contas."
 #Ryukyu (Ruucuu)
 major_decisions.6000.t: "Uma relíquia ryukyuana"
 major_decisions.6000.desc: "\"Todos os ilhéus cantam seus louvores, meu [founder.GetTitleAsNameNoTooltip|l]. Foi anunciada aos líderes de todos os clãs, seus humildes súditos, a criação de nosso novo estandarte. O trono de Ryukyu aguarda impaciente que se sente nele\", exclama [antiquarian.Custom('ES_ElLa')] [antiquarian.GetTitledFirstName|l] após um longo discurso.\n\nÉ bom ser [founder.GetTitleAsNameNoTooltip|l], mas meu tempo neste mundo é limitado, assim como o de meus filhos. Preciso fortalecer e imortalizar nosso governo com uma relíquia que perdure por incontáveis gerações."
 major_decisions.6000.a: "Crie um artefato que inspire meu povo."
 major_decisions.6000.b: "Traga-me uma relíquia que simbolize nossa força imperial."
 ryukyu_artifact_regalia_craft_tt: "Será entregue um [artifact|El] de #italic vestidura#! #bold al cabo de un año#!:\n[GetModifier( 'ryukyu_empire_shaku_modifier' ).GetNameWithTooltip]"
 ryukyu_artifact_crown_craft_tt: "Será entregue um [artifact|lE] de #italic corona#! #bold al cabo de un año#!:\n[GetModifier( 'ryukyu_empire_crown_modifier' ).GetNameWithTooltip]"
 ryukyu_empire_shaku_modifier: "Shaku das Três Montanhas"
 ryukyu_empire_crown_modifier: "Coroa do Dragão"
 major_decisions.6001.t: "Shaku do Imperador"
 major_decisions.6001.desc: "O shaku tão aguardado, digno de um[ROOT.Char.Custom('ES_XA')] verdadeiro[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] foi esculpido de acordo com minhas especificações. Superou todas as previsões e, sem dúvida, ressaltará meu papel como mediador[ROOT.Char.Custom('ES_XA')] entre meus súditos e os espíritos divinos.\n\nMeu povo não experimentará preguiça nem tristeza durante a construção do meu magnífico império. Certamente, trabalhar por uma missão tão divina eliminará todos os obstáculos."
 major_decisions.6001.a: "Como um só, ergueremos as Três Montanhas aos céus!"
 major_decisions.6002.t: "A coroa do dragão"
 major_decisions.6002.desc: "Como foi combinado, [antiquarian.Custom('ES_ElLa')] [antiquarian.GetTitledFirstName|l] apresenta minha nova coroa, simbolizando a disposição do meu império de explorar o desconhecido e se manter firme diante dos perigos da inação.\n\nEm breve, o mundo inteiro reconhecerá e exaltará os ryukyuenses, e meu nome será lembrado com admiração e esplendor. Meus descendentes ostentarão este símbolo de coragem com orgulho e desafiarão seus inimigos."
 major_decisions.6002.a: "Nosso poderio ecoará pela eternidade."
 major_decisions.6003.t: "Despertar dos Ryukyu"
 major_decisions.6003.desc: "Chegou ao meu conhecimento que um imperador surgiu nas ilhas Ryukyu, impondo sua supremacia sobre as exuberantes planícies e as lendárias montanhas, unindo seus clãs sob uma única bandeira.\n\nNão é fácil manter um império unido, especialmente quando os recursos são limitados. Observaremos o que resultará disso."
 major_decisions.6003.a: "Admirável para começos tão humildes."
 major_decisions.6003.b: "Ainda assim, não me impressiona."
 #Siam
 major_decisions.7000.t: "Amanhecer da felicidade"
 major_decisions.7000.desc: "Ao caminhar pelo salão, o aroma de incenso enche o ar, e o som dos gongos de bronze ecoa pelo espaço, anunciando minha chegada. Os membros do meu conselho e os escribas reais me saúdam de seus bancos baixos.\n\nDepois de trocarmos formalidades, vários membros do conselho me oferecem seus conselhos sobre a prioridade do meu reinado: escolher uma área de investimento que definirá o legado tai.\n\nComo não conseguem chegar a uma conclusão, começo a reunir meus pensamentos finais sobre o assunto."
 major_decisions.7000.a: "Devemos apoiar as oficinas de cerâmica sangkhalok de [kingdom_capital.GetNameNoTier]."
 major_decisions.7000.b: "Nossos guerreiros merecem algo melhor se quisermos superar nossos rivais."
 major_decisions.7000.c: "Promover os valores tai deve ser meu esforço constante."
 siam_kingdom_sangkhalok_workshops_county_modifier: "Oficinas Sangkhalok apoiadas"
 siam_kingdom_sangkhalok_workshops_province_modifier: "Comércio sangkhalok próspero"
 siam_kingdom_military_modifier: "Financiamento dos terrenos militares"
 siam_kingdom_culture_modifier: "Radiante cultural"
 major_decisions.7001.t: "Ascensão dos Tai"
 major_decisions.7001.desc: "Nas profundezas das terras selvagens, conhecidas por alguns como a Terra Dourada, [founder.GetNameNoTierNoTooltip] ascendeu ao poder como [founder.Custom('ES_ElLa')] [founder.GetTitleAsNameNoTooltip|l] de [founder.GetPrimaryTitle.GetNameNoTierNoTooltip] e desafiou o destino de seu povo.\n\nO povo tai passou anos em busca de um lar, vagando pela região como nômades orgulhosos e avançando gradualmente para o sul.\n\nSua influência resistirá à passagem do tempo?"
 major_decisions.7001.a: "Mais um lançado ao furacão."
 major_decisions.7001.b: "São uma ameaça para nós? Veremos."
 #Brunei Kingdom
 major_decisions.8000.t: "A morada da paz"
 major_decisions.8000.desc: "[imam.Custom('ES_ElLa')|U] [imam.GetTitledFirstName|l], que dirigirá a próxima oração obrigatória de sexta-feira, me lembra da tradição de preparar um khutbah em nome de seu [founder.GetTitleAsNameNoTooltip|l]. Além das orações e versículos obrigatórios, me pergunta sobre a parte que será lida aos crentes para proclamar minha soberania e tutela sobre eles."
 major_decisions.8000.a: "Que conheçam os feitos de seu [founder.GetTitleAsNameNoTooltip|l]."
 major_decisions.8000.b: "Todo louvor pertence somente a Alá."
 brunei_kingdom_khutbah_prestige_option_modifier: "Protetor da umma"
 brunei_kingdom_khutbah_piety_option_modifier: "Luz da Umma"
 #Brunei Empire
 major_decisions.9000.t: "O presente de ascensão do imperador"
 major_decisions.9000.desc: "Enraizado em nossa tradição islâmica, espera-se de um[founder.Custom('ES_XA')] [founder.GetTitleAsNameNoTooltip|l] que retribua aos meus guerreiros abençoados, viajantes da minha terra e aos necessitados com as moedas recém-cunhadas em meu nome."
 major_decisions.9000.desc_steward: "\n\nMeu [ROOT.Char.GetCouncillorPosition('councillor_steward').GetPositionName|l], [steward.Custom('ES_ElLa')] [steward.GetTitledFirstName|l], solicita o nível de generosidade que estou dispost[ROOT.Char.Custom('ES_OA')] a oferecer aos meus súditos leais como seu protetor[ROOT.Char.Custom('ES_XA')]."
 major_decisions.9000.a: "Que os fiéis conheçam a generosidade de seu [founder.GetTitleAsNameNoTooltip|l]!"
 major_decisions.9000.b: "Que Alá aceite nossa sadaqa."
 brunei_empire_high_sadaqah_modifier: "Sadaqah distribuída generosamente"
 brunei_empire_low_sadaqah_modifier: "Sadaqa distribuída"
