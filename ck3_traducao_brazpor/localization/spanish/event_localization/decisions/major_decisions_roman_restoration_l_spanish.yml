l_spanish:
 #Restoring Roman Empire as Byzantium, by Henrik Thyrwall & Flavio Verna
 roman_restoration.0001.t: "A Aurora de uma Nova Era"
 roman_restoration.0001.desc.intro: "Amigos, romanos, compatriotas, emprestem-me seus ouvidos!\n\nApós a recuperação milagrosa do território perdido séculos atrás, o Império Romano renasceu! A Europa passou por tempos sombrios desde a invasão dos bárbaros às fronteiras imperiais, mas agora uma nova era brilhante despontou para toda a civilização."
 roman_restoration.0001.desc.greeks: "\n\nO Estado Romano não será mais chamado de \"Império dos Gregos\" por pretensiosos invejosos do Ocidente, mas será reconhecido como o verdadeiro herdeiro do legado de Roma."
 roman_restoration.0001.desc.other: "\n\nOnde inúmeros pretendentes gregos falharam, foi necessária apenas uma [scoped_emperor.GetCulture.GetName] para ter sucesso, restaurando o falido \"Império dos Gregos\"."
 roman_restoration.0001.desc.christians: "O Imperium Romanum ergue-se forte mais uma vez, restaurado em sua antiga glória sob o meu governo iluminado, pronto para espalhar civilização, segurança e a sagrada luz de Nosso Senhor a todos os cantos do mundo conhecido. Pelo Senado e pelo Povo de Roma!"
 roman_restoration.0001.desc.hellenics: "O Imperium Romanum se ergue forte mais uma vez, restaurado à sua antiga glória e religião sob meu governo esclarecido. \n\nNovas legiões marcharão sobre as províncias restantes que ainda negam a soberania deste novo Império, e forjarão uma nova Pax Romana a partir destes tempos sombrios. Pelo Senado e pelo povo de Roma!"
 roman_restoration.0001.desc.fallback: "O Imperium Romanum permanece forte mais uma vez, restaurado à sua antiga glória sob o meu governo iluminado, pronto para espalhar a civilização, a segurança e o amor de [ROOT.Char.GetFaith.HighGodName|U] por todos os cantos do mundo conhecido. Pelo Senado e Povo de Roma!"
 roman_restoration.0001.a: "Esto perpetua!"
 roman_restoration.0002.t: "A Segunda Era de Roma"
 roman_restoration.0002.desc: "Os Bizantinos, anteriormente chamados de \"Império dos Gregos\" por muitos no Ocidente, de alguma forma conseguiram recuperar territórios perdidos o suficiente para declarar a restauração do Império Romano!"
 roman_restoration.0002.desc.christians: "\n\nNão se pode mais negar que eles são os verdadeiros sucessores de Roma e de seu glorioso legado. Uma nova era está sobre nós."
 roman_restoration.0002.desc.hellenics: "\n\nAinda mais surpreendente, este novo Império Romano rejeitou o cristianismo em favor dos deuses pagãos antigos! Se não forem detidos em breve, essa nova onda de paganismo poderá ameaçar a própria sobrevivência do cristianismo!"
 roman_restoration.0002.a: "Será verdade?"
 roman_restoration.0002.b: "Mas... e meu Império?"
 roman_restoration.0002.c: "O fim está próximo!"
 roman_restoration.0002.d: "Eu vou detê-los!"
 roman_restoration.0002.e: "Eu vejo..."
 #Restoring Roman Empire as HRE, by Flavio Verna
 roman_restoration.0003.t: "Santo e Romano"
 roman_restoration.0003.desc.greeks: "Que irônico que o Império, outrora difamado como um pretensioso bárbaro pelos bizantinos, seria elevado à glória eterna sob a liderança grega...\n\n"
 roman_restoration.0003.desc.other: ""
 roman_restoration.0003.desc: "Minhas ações valentes realizaram o sonho de Carlos Magno. O Sacro Império Romano alcançou seu lugar legítimo como verdadeiro sucessor de Roma, reivindicando o domínio tanto sobre o leste quanto sobre o oeste. 

Este é o início de uma nova era de paz e prosperidade para os [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] de todo o mundo. As benditas legiões deste Império espalharão a santa mensagem de Nosso Senhor a todos os cantos do mundo até que uma verdadeira Igreja universal tenha sido estabelecida. Por [ROOT.Char.GetFaith.HighGodName|U] e [scoped_emperor.Custom('ES_ElLa')] [scoped_emperor.GetTitleTierName] de Roma!"
 roman_restoration.0003.a: "O impensável aconteceu! Os pretendentes do Ocidente conseguiram abrir um caminho ensanguentado nas províncias orientais e reivindicar o coração de nosso outrora glorioso Império.

Tendo restaurado a maioria das províncias antigas sob seu governo, [scoped_emperor.GetTitledFirstName|l] declarou que o Império Romano foi restaurado sob sua liderança bárbara."
 roman_restoration.0004.t: "Desde que Carlos Magno foi coroado pelo papa Leão III, o Império dos Gregos olhava com desprezo para aquele que chamavam de pretendente no Ocidente. Mas [scoped_emperor.Custom('ES_ElLa')] [scoped_emperor.GetTitledFirstName|l] alcançou o impossível: a restauração das fronteiras orientais e ocidentais dos tempos antigos.

Este novo império, forjado sob a santa luz de [scoped_emperor.GetFaith.HealthGodName], apresenta-se como o único e verdadeiro Imperium Romanum, pronto para trazer ordem a um mundo sombrio."
 roman_restoration.0004.desc.byzantines: "O impensável aconteceu! Os pretendentes do Ocidente conseguiram abrir um caminho ensanguentado nas províncias orientais e reivindicar o coração de nosso outrora glorioso Império.

Tendo restaurado a maioria das províncias antigas sob seu governo, [scoped_emperor.GetTitledFirstName|l] declarou que o Império Romano foi restaurado sob sua liderança bárbara."
 roman_restoration.0004.desc.others: "Desde que Carlos Magno foi coroado pelo papa Leão III, o Império dos Gregos olhava com desprezo para aquele que chamavam de pretendente no Ocidente. Mas [scoped_emperor.Custom('ES_ElLa')] [scoped_emperor.GetTitledFirstName|l] alcançou o impossível: a restauração das fronteiras orientais e ocidentais dos tempos antigos.

Este novo império, forjado sob a santa luz de [scoped_emperor.GetFaith.HealthGodName], apresenta-se como o único e verdadeiro Imperium Romanum, pronto para trazer ordem a um mundo sombrio."
 roman_restoration.0004.a: "Salve César!"
 roman_restoration.0004.b: "Eles ainda são pretendentes!"
 #New Emperor becomes Augustus, by Flavio Verna
 roman_restoration.0005.t: "Com a perda de toda legitimidade, já não posso mais reivindicar o título de Augusto. O Império agora pertence a [new_holder.GetTitledFirstName|l]."
 roman_restoration.0005.desc.regular: "Com a aclamação do Senado e do exército, fui proclamad[ROOT.Char.Custom('ES_OA')] soberan[ROOT.Char.Custom('ES_OA')] do restaurado Império Romano. 

Não pode haver maior honra ou responsabilidade para uma única pessoa. Se desejo permanecer muito tempo no poder, devo me certificar de corresponder às expectativas dos meus súditos."
 roman_restoration.0005.desc.holy: "Toda a antiga província da Síria Palestina finalmente foi libertada das garras vis dos bárbaros e restaurada ao Imperium Romanum. Um grande triunfo será realizado em homenagem aos bravos heróis que realizaram essa façanha. Que seus nomes ecoem na eternidade!"
 roman_restoration.0005.a: "Viva o Império!"
 #Old Emperor loses Augustus, by Flavio Verna
 roman_restoration.0006.t: "Os tempos sombrios acabaram para o povo do Egito, pois o domínio romano foi restaurado à província mais uma vez. A Terra dos Faraós serviu bem como celeiro do antigo império, e novamente se tornará um pilar vital na contínua prosperidade do glorioso Estado Romano."
 roman_restoration.0006.desc: "A Província da Cirenaica"
 roman_restoration.0006.a: "Os cidadãos da Cirenaica podem se alegrar, pois a lei romana mais uma vez é aplicada nesta terra árida. Mais uma antiga província romana retornou ao seio do maior império que o mundo civilizado já viu. Que nunca mais sofra o toque cruel dos bárbaros."
 #Old Roman Provinces are Restored, by Henrik Thyrwall & Flavio Verna
 roman_restoration.0010.t: "As águias douradas de Roma brilham mais uma vez sobre a antiga província romana da África, como fizeram tantos séculos atrás. As tropas imperiais marcham pela cidade de Cartago, a antiga inimiga de Roma, como prova definitiva de que a história realmente se repete."
 roman_restoration.0010.desc: "A Província da Ilíria"
 roman_restoration.0010.a: "A antiga província romana da Ilíria foi mais uma vez restaurada aos seus legítimos donos no ressurgente Imperium Romanum. Com as costas orientais do Adriático seguras, este importante terreno de recrutamento pode se mostrar vital em campanhas futuras para reconquistar as fronteiras adequadas de Roma no oeste."
 roman_restoration.0011.t: "A Província da Itália"
 roman_restoration.0011.desc: "Pela segunda vez desde a queda do Império Ocidental, a Itália foi libertada e restaurada ao adequado domínio romano — esperançosamente, desta vez de forma definitiva. A grandiosa cidade de Roma está agora sob meu controle, e até mesmo soldados endurecidos podem ser vistos chorando enquanto o estandarte imperial tremula na brisa da Coluna de Trajano."
 roman_restoration.0012.t: "A Província da Gália"
 roman_restoration.0012.desc: "A Gália, por muito tempo considerada perdida para o domínio romano, submeteu-se a Roma e foi incorporada novamente ao Império. A província mudou muito desde que César campanhou nesta terra há mais de mil anos, mas não mais sofrerá sob o domínio de reis arrogantes ou falsos imperadores."
 roman_restoration.0013.t: "A Província da Germânia"
 roman_restoration.0013.desc: "O Império Romano agora se expandiu além das fronteiras que reivindicava mesmo sob o grande [GetScriptedCharacterByHistoryID( '145279' ).GetFirstName]. A Germânia, sempre o flagelo dos exércitos romanos, finalmente foi pacificada e incorporada ao Império. Agora, será governada pela verdadeira continuação do Estado Romano — não um falso império que se faz passar por tal."
 roman_restoration.0014.t: "A Província da Britânia"
 roman_restoration.0014.desc: "Cruelmente deixados à própria sorte quando as guarnições romanas abandonaram a província da Britânia no século V, os bretões agora podem se alegrar. Após sofrer séculos de escuridão, o domínio romano finalmente foi restaurado em sua pequena ilha, e eles podem considerar-se novamente súditos imperiais."
 roman_restoration.0015.t: "A Província da Hispânia"
 roman_restoration.0015.desc: "O poder e a influência do Império Romano agora se estendem novamente até a antiga província da Hispânia. Esta terra sofreu muito com as constantes escaramuças de fronteira travadas por seus senhores muçulmanos e católicos briguentos, mas agora finalmente poderá conhecer a paz novamente, à medida que a Pax Romana se estabelece sobre a península."
 roman_restoration.0016.t: "A Província da Mauritânia"
 roman_restoration.0016.desc: "O grande general Belisário reconquistou partes da Mauritânia dos bárbaros vândalos no século VI, mas tudo acabou sendo perdido para os árabes em sua incessante marcha pela África do Norte. Agora que este condado foi completamente restaurado ao controle romano após séculos de má administração, ele poderá florescer novamente."
 roman_restoration.0017.t: "A Província da Mesopotâmia"
 roman_restoration.0017.desc: "O imperador Trajano conquistou a Mesopotâmia do Império Parta e a organizou como uma província romana, mas ela foi abandonada por seu sucessor Adriano poucos anos depois. Agora, os rios Eufrates e Tigre estão mais uma vez sob a proteção romana, e desta vez podem permanecer lá."
 roman_restoration.0018.t: "A Província da Caledônia"
 roman_restoration.0018.desc: "As fronteiras de Roma agora avançaram bem além das antigas ruínas do Muro de Adriano e do Muro de Antonino, para finalmente incluir toda a Caledônia. Esta terra dura e implacável é o lar de uma raça peculiar de pessoas, mas elas serão transformadas em cidadãos romanos produtivos."
 roman_restoration.0019.t: "A Província da Hibernia"
 roman_restoration.0019.desc: "A ilha da Hibernia é a mais recente adição aos domínios em expansão do Império Romano. Esta terra de colinas suavemente ondulantes e campos verdes nunca foi conquistada pelo antigo império, mas deve se tornar um feudo agradável para governar, desde que não se importe com a chuva ou os colonos nórdicos malcheirosos ao longo da costa."
 roman_restoration.0020.t: "Fronteiras Imperiais Restauradas"
 roman_restoration.0020.desc: "A história da gloriosa recuperação do Império Romano será contada ao longo dos séculos. Aqueles que tiveram a infelicidade de viver nos dias negros em que os bárbaros saquearam Roma à vontade ou os invasores árabes avançaram vindos do deserto não ousariam sonhar com este dia. Todas as antigas províncias foram recuperadas, e o Império agora se estende mais longe do que em quase mil anos."
 roman_restoration.0021.t: "\n\nSinos de igreja em toda a Europa estão tocando para celebrar esta ocasião monumental, e homens e mulheres em Roma e Constantinopla estão chorando lágrimas de alegria. Pela humanidade, a nova Pax Romana deve perdurar, para que o mundo não mergulhe em mais uma era sombria de ignorância e barbárie privada da luz orientadora de Roma."
 roman_restoration.0021.desc: "\n\nAo desprezar o peso do deus morto dos galileus e reabraçar os olímpicos, o Império de César e Augusto ressurgiu das cinzas. Pela humanidade, a nova Pax Romana deve perdurar, para que o mundo não mergulhe em mais uma era sombria de ignorância e barbárie privada da luz orientadora de Roma."
 roman_restoration.0022.t: "\n\nInúmeras pessoas de todas as raças e credos por toda a Europa estão celebrando esta ocasião monumental, e homens e mulheres tanto em Roma quanto em Constantinopla estão chorando lágrimas de alegria. Pela humanidade, a nova Pax Romana deve perdurar, para que o mundo não mergulhe em mais uma era sombria de ignorância e barbárie privada da luz orientadora de Roma."
 roman_restoration.0022.desc: "As fronteiras de Roma agora avançaram bem além das antigas ruínas do Muro de Adriano e do Muro de Antonino, para finalmente incluir toda a Caledônia. Esta terra dura e implacável é o lar de uma raça peculiar de pessoas, mas elas serão transformadas em cidadãos romanos produtivos."
 roman_restoration.0023.t: "O Grande Cisma Resolvido"
 roman_restoration.0023.desc: "Finalmente, o Grande Cisma foi resolvido."
 roman_restoration.0024.t: "\n\nOs arrogantes bispos de Roma não mais reivindicarão uma primazia indevida sobre seus pares, ignorando ou desobedecendo abertamente os éditos canônicos. Com a reunificação da Pentarquia sob o governo imperial ortodoxo, a fé católica agora tem pouca influência sobre os povos da Europa. \n\nÉ apenas questão de tempo até que os poucos que ainda se apegam a ritos antiquados e heréticos sejam reconduzidos ao seio da verdadeira Igreja Ecumênica."
 roman_restoration.0024.desc.intro: "

A luta secular do papado para impor sua primazia sobre a Pentarquia finalmente chegou ao fim. Com a reunificação das sedes originais sob o domínio católico, o clero ortodoxo foi forçado a se curvar à autoridade inegável do trono de São Pedro. 

Os poucos entre eles que ainda se apegam a seus ritos ultrapassados e hereges logo serão trazidos para o seio da verdadeira Igreja Ecumênica, de uma forma ou de outra."
 roman_restoration.0024.desc.christian: "\n\nCom a Pentarquia firmemente sob o controle [mending_faith.GetAdjective], em uma reviravolta inesperada, tanto o Papa em Roma quanto o Patriarca de Constantinopla não podem mais negar a primazia de [mending_faith.GetName] sobre todos os outros ramos do cristianismo."
 roman_restoration.0024.desc.hellenic: "A Igreja Universal foi restaurada!"
 roman_restoration.0024.desc.fallback: "O Grande Cisma que afligiu o cristianismo por tanto tempo finalmente chegou ao fim."
 #Schism is mended, by Henrik Thyrwall & Flavio Verna
 roman_restoration.0100.t: "

Após a conquista de todas as sedes ecumênicas da Pentarquia original por parte de [scoped_emperor.GetTitledFirstName|l], a Santa Sé finalmente alcançou sua grande ambição de extirpar a Igreja ortodoxa e se tornar o único ramo legítimo do cristianismo. Com o patriarca forçado ao exílio e muitos teólogos ortodoxos notáveis se submetendo à autoridade do trono de São Pedro, é possível que a ortodoxia seja reduzida à obscuridade."
 roman_restoration.0100.desc.intro: "\n\nApós a conquista de todas as sedes ecumênicas da Pentarquia original por parte de [scoped_emperor.GetTitledFirstName|l] a Igreja [mending_faith.GetAdjective] se impôs como o único ramo legítimo do cristianismo aos olhos de muitos. Com o papado e o patriarcado ecumênico arrancados de suas sedes ancestrais de poder, muitos seguidores ortodoxos e católicos acorrem em massa à nova Igreja universal."
 roman_restoration.0100.desc.orthodox: "Se é assim que o vento está soprando..."
 roman_restoration.0100.desc.catholic: "

A luta secular do papado para impor sua primazia sobre a Pentarquia finalmente chegou ao fim. Com a reunificação das sedes originais sob o domínio católico, o clero ortodoxo foi forçado a se curvar à autoridade inegável do trono de São Pedro. 

Os poucos entre eles que ainda se apegam a seus ritos ultrapassados e hereges logo serão trazidos para o seio da verdadeira Igreja Ecumênica, de uma forma ou de outra."
 roman_restoration.0100.desc.generic: "Louvado seja Deus!"
 roman_restoration.0100.a: "O Patriarcado de Jerusalém"
 roman_restoration.0101.desc.intro: "Com a cidade novamente sob controle romano, o Patriarcado de Jerusalém foi devidamente restaurado como uma das sedes episcopais da Pentarquia na Igreja Ortodoxa Oriental. Foi originalmente fundado por São Tiago, o Justo, que se tornou o líder da Igreja em Jerusalém logo após a morte de Jesus."
 roman_restoration.0101.desc.orthodox: "O Patriarcado de Alexandria"
 roman_restoration.0101.desc.catholic: "

Após a conquista de todas as sedes ecumênicas da Pentarquia original por parte de [scoped_emperor.GetTitledFirstName|l], a Santa Sé finalmente alcançou sua grande ambição de extirpar a Igreja ortodoxa e se tornar o único ramo legítimo do cristianismo. Com o patriarca forçado ao exílio e muitos teólogos ortodoxos notáveis se submetendo à autoridade do trono de São Pedro, é possível que a ortodoxia seja reduzida à obscuridade."
 roman_restoration.0101.desc.generic: "O Patriarcado Iconoclasta"
 roman_restoration.0101.a: "Com a grande cidade de Constantinopla nas mãos dos iconoclastas, um novo patriarca foi colocado à frente da Igreja Oriental. Com a ajuda de [new_pope.GetFaith.HighGodName], [new_pope.GetFirstName] demonstrará ser um[new_pope.Custom('ES_XA')] líder mais virtuos[new_pope.Custom('ES_OA')] e considerad[new_pope.Custom('ES_OA')] que seus predecessores ecumênicos. 

Este novo patriarcado certamente se oporá aos excessos, à corrupção e à idolatria de seu predecessor, e inaugurará uma nova e gloriosa era para todos os fiéis iconoclastas."
 roman_restoration.0101.b: "Hereges! Todos eles!"
 roman_restoration.0102.a: "Fora com esses ídolos blasfemos!"
 #Restored Patriarchate Events, by Henrik Thyrwall & Flavio Verna
 roman_restoration.0104.t: "Com a grande cidade de Constantinopla nas mãos iconoclastas, [reformer.GetTitledFirstName|l] colocou um novo patriarca à frente da Igreja Oriental. Com a ajuda de [new_pope.GetFaith.HighGodName], [new_pope.GetFirstName] demonstrará ser um[new_pope.Custom('ES_XA')] líder mais virtuos[new_pope.Custom('ES_OA')] e atencios[new_pope.Custom('ES_OA')] que seus predecessores ecumênicos. 

Este novo patriarcado certamente se oporá aos excessos, à corrupção e à idolatria de seu predecessor, e inaugurará uma nova e gloriosa era para todos os fiéis iconoclastas."
 roman_restoration.0104.desc: "Com a grande cidade de Constantinopla nas mãos dos iconoclastas, [reformer.GetTitledFirstName|l] colocou um novo patriarca à frente da Igreja Oriental.\n\nE, como a maioria do clero ortodoxo mais antigo foi destituída, presa ou forçada ao exílio, a fé ecumênica foi reduzida ao status de heresia."
 roman_restoration.0104.a: "Bárbaros!"
 roman_restoration.0105.t: "Já era hora!"
 roman_restoration.0105.desc: "Entendi..."
 roman_restoration.0106.t: "O Patriarcado de Alexandria"
 roman_restoration.0106.desc: "O Patriarcado Ecumênico"
 roman_restoration.0107.t: "O infeliz exílio do Patriarcado Ecumênico finalmente chegou ao fim.\n\nA única Igreja verdadeira retornou a Constantinopla, pronta para liderar o mundo cristão com uma mão firme, porém gentil."
 roman_restoration.0107.desc: "Glória!"
 roman_restoration.0120.t: "O infeliz exílio do Patriarcado Ecumênico finalmente chegou ao fim.

Graças à liderança piedosa de [reformer.GetTitledFirstName|l], a única Igreja verdadeira retornou a Constantinopla, pronta para liderar o mundo cristão com mão firme, porém gentil."
 roman_restoration.0120.desc: "Com a grande cidade de Constantinopla nas mãos dos iconoclastas, um novo patriarca foi colocado à frente da Igreja Oriental. Com a ajuda de [new_pope.GetFaith.HighGodName], [new_pope.GetFirstName] demonstrará ser um[new_pope.Custom('ES_XA')] líder mais virtuos[new_pope.Custom('ES_OA')] e considerad[new_pope.Custom('ES_OA')] que seus predecessores ecumênicos. 

Este novo patriarcado certamente se oporá aos excessos, à corrupção e à idolatria de seu predecessor, e inaugurará uma nova e gloriosa era para todos os fiéis iconoclastas."
 #Imposing the Iconoclast Patriarchate, by Flavio Verna
 roman_restoration.0120.a: "Entendi..."
 roman_restoration.0121.desc.orthodox: "Com a queda da grande cidade de Constantinopla nas mãos dos hereges, o/a vil iconoclasta [reformer.GetTitledFirstName|l] nomeou um falso patriarca para a Igreja Ecumênica, destituindo todos os prelados ortodoxos de seus cargos.

Se est[reformer.Custom('ES_EA')] tiran[reformer.Custom('ES_OA')] não for depost[reformer.Custom('ES_OA')] logo e sua blasfêmia não for corrigida, este pode ser o começo do fim para a Igreja Ortodoxa."
 roman_restoration.0121.desc.iconoclast: "Com a grande cidade de Constantinopla nas mãos iconoclastas, [reformer.GetTitledFirstName|l] colocou um novo patriarca à frente da Igreja Oriental. Com a ajuda de [new_pope.GetFaith.HighGodName], [new_pope.GetFirstName] demonstrará ser um[new_pope.Custom('ES_XA')] líder mais virtuos[new_pope.Custom('ES_OA')] e atencios[new_pope.Custom('ES_OA')] que seus predecessores ecumênicos. 

Este novo patriarcado certamente se oporá aos excessos, à corrupção e à idolatria de seu predecessor, e inaugurará uma nova e gloriosa era para todos os fiéis iconoclastas."
 roman_restoration.0121.desc.other: "Nossa Mãe Igreja está novamente inteira!"
 roman_restoration.0121.a: "Interessante..."
 roman_restoration.0121.b: "Já era hora!"
 roman_restoration.0121.c: "A Dissolução do Papado"
 #Restoring the Ecumenical Patriarchate, by Flavio Verna
 roman_restoration.0122.t: "A tirania dos galileus sobre a Europa finalmente chegou ao fim.\n\nDurante séculos, foi dada carta branca a esses cultistas glorificados para difamar e desfigurar os antigos monumentos de nossos protetores divinos, mas isso acabou! Ao restaurar o domínio [scoped_destroyer.GetFaith.GetAdherentNameNoTooltip] sobre Roma e a península italiana, esmagamos o próprio coração da igreja do deus carpinteiro."
 roman_restoration.0122.desc: "Após séculos sendo menosprezados e enganados por seus missionários, os seguidores de [scoped_destroyer.GetFaith.HighGodName] finalmente se vingaram dos seguidores do deus Cristo. 

O coração de sua fé foi conquistado com o favor de nossos deuses, suas igrejas foram saqueadas e seus sacerdotes foram destituídos de todo poder e dignidade. Graças à minha gloriosa invasão, livrei o mundo dessa religião covarde e vinguei a desonra que eles trouxeram às nossas terras e aos nossos antepassados com seu falso deus."
 roman_restoration.0122.a: "\n\nDiante de nossa inegável supremacia religiosa, até mesmo o/a ex-[scoped_pope.Custom('ES_OA')] papa [scoped_pope.GetFullName] renunciou publicamente à fé [catholic.GetAdjectiveNoTooltip] e se converteu ao [scoped_destroyer.GetFaith.GetNameNoTooltip]."
 roman_restoration.0123.desc.orthodox: "O infeliz exílio do Patriarcado Ecumênico finalmente chegou ao fim.

Graças à liderança piedosa de [reformer.GetTitledFirstName|l], a única Igreja verdadeira retornou a Constantinopla, pronta para liderar o mundo cristão com mão firme, porém gentil."
 roman_restoration.0123.desc.iconoclast: "[scoped_destroyer.GetFaith.HighGodName] nos abençoou!"
 roman_restoration.0123.desc.other: "O infeliz exílio do Patriarcado Ecumênico finalmente chegou ao fim.

Graças à liderança piedosa de [reformer.GetTitledFirstName|l], a Igreja Oriental retornou ao seu assento legítimo em Constantinopla."
 roman_restoration.0123.a: "A monstruosa campanha de terror de [scoped_destroyer.GetTitledFirstName|l] trouxe ruína e escuridão ao coração de nossa Santa Mãe Igreja!

Esse ser pagão e vil despojou o papado de todos os seus bens e dignidade, assassinou brutalmente incontáveis teólogos e não vai parar até que tenha colocado toda a cristandade de joelhos. Com o Vaticano destruído e sua hierarquia em frangalhos, a fé católica foi reduzida a um culto desorganizado."
 roman_restoration.0123.b: "A ousada campanha de conquista de [scoped_destroyer.GetTitledFirstName|l] trouxe ruína e trevas ao coração da Igreja Católica!

Ao já ter despojado o papado da maior parte de seus bens e de sua dignidade, parece que não ficará satisfeit[scoped_destroyer.Custom('ES_OA')] até que tenha submetido toda a cristandade. Com o Vaticano destruído e sua hierarquia em frangalhos, a fé católica foi reduzida a um culto desorganizado."
 roman_restoration.0123.c: "Já estava na hora de alguém fazer isso."
 #Restoring the Papacy, by Flavio Verna
 roman_restoration.0124.t: "Entendi..."
 roman_restoration.0124.desc: "A era de turbulência e desespero para o mundo católico chegou ao fim: com um novo Papa restaurado ao histórico assento de Roma, a única Igreja verdadeira finalmente pode se recuperar dos terríveis revezes sofridos recentemente.\n\nCom a ajuda de [new_pope.GetFaith.HighGodName], [new_pope.GetTitledFirstName|l] trará ordem e estabilidade ao clero católico, antes disperso por toda a Europa, e restabelecerá uma hierarquia rígida para a Igreja."
 roman_restoration.0124.a: "O Império Italiano"
 roman_restoration.0125.desc.catholic: "Graças à abençoada intervenção de [reformer.GetTitledFirstName|l], a era de turbulência e desespero para o mundo católico chegou ao fim: com um novo Papa restaurado à sede histórica de Roma, a única Igreja verdadeira finalmente pode se recuperar dos terríveis reveses sofridos recentemente.

Com a ajuda de [new_pope.GetFaith.HighGodName], [new_pope.GetTitledFirstName|l] trará ordem e estabilidade ao clero católico, antes disperso por toda a Europa, e restabelecerá uma hierarquia rígida para a Igreja."
 roman_restoration.0125.desc.other: "Após perder seu assento ancestral e a maioria de seus seguidores, a Igreja Católica foi considerada por muitos à beira do colapso. No entanto, graças à piedosa intervenção de [reformer.GetTitledFirstName|l], um novo Papa reina em Roma mais uma vez.

Com a Santa Sé finalmente restaurada, os católicos podem recuperar seu lugar como uma importante vertente cristã."
 roman_restoration.0125.a: "De Roma a Roma"
 roman_restoration.0125.b: "Agora fica claro que nenhuma tentativa de restaurar o fragmentado império de outrora teria tido sucesso, desde que fosse perseguida por germanos bárbaros ou gregos efeminados.\n\nSomente por meio dos sacrifícios do povo italiano Roma recuperou seu lugar legítimo como rainha das cidades.\n\n"
 #Destroying the Papacy, by Flavio Verna
 roman_restoration.0130.t: "A Segunda Era de Roma"
 roman_restoration.0130.desc.muslim: "O impensável aconteceu! As pequenas cidades-estados da Itália conseguiram se unir sob uma única bandeira e abriram um caminho ensanguentado em nossas Províncias Orientais na tentativa de restaurar o antigo Império.\n\nTendo restaurado a maioria das antigas províncias sob seu domínio, [scoped_emperor.GetTitledFirstName|l] declarou que o Império Romano foi restaurado sob sua liderança bárbara. Com a pouca legitimidade que nos resta, não podemos mais descartar essa reivindicação absurda."
 roman_restoration.0130.desc.hellenic: "O ascendente Império Italiano conseguiu recuperar o suficiente das antigas províncias sob a liderança de [scoped_emperor.GetTitledFirstName|l] para proclamar-se um Império Romano renascido.

Desprezando tanto os pretendentes do Norte quanto do Oriente, esta nova Nação busca restaurar suas antigas fronteiras contra todos os oponentes."
 roman_restoration.0130.desc.fallback: "Após séculos sendo menosprezados e enganados por seus missionários, os seguidores de [scoped_destroyer.GetFaith.HighGodName] finalmente se vingaram dos seguidores do deus Cristo. 

O coração de sua fé foi conquistado com o favor de nossos deuses, suas igrejas foram saqueadas e seus sacerdotes foram destituídos de todo poder e dignidade. Graças à minha gloriosa invasão, livrei o mundo dessa religião covarde e vinguei a desonra que eles trouxeram às nossas terras e aos nossos antepassados com seu falso deus."
 roman_restoration.0130.desc.pope.submission: "Nossas legiões os esmagarão!"
 roman_restoration.0130.desc.pope.crucifixion: "A Acerto de Contas Romano"
 roman_restoration.0130.desc.pope.sacrificed: "[byz_emperor.GetTitledFirstName] me denunciou publicamente como fals[ROOT.Char.Custom('ES_OA')] [hre_emperor.GetTitleTierName] e está preparad[byz_emperor.Custom('ES_OA')] para desencadear o terrível poder de [byz_emperor.GetPrimaryTitle.GetName] contra o meu povo.

Não foi suficiente que os de sua laia nos expulsassem cada vez mais para longe de nossas terras. Roma não ficará satisfeita até ter derrotado todos os pretendentes à sua glória."
 roman_restoration.0130.desc.no_pope: "Ainda há luta em nós!"
 roman_restoration.0130.a.a: "Os Francos além do Reno"
 roman_restoration.0130.a.b: "Acabou. Nossa grande campanha destruiu de forma irreparável o chamado Sacro Império Romano. [hre_emperor.GetTitledFirstName|l] foi humilhad[hre_emperor.Custom('ES_OA')] por completo e despojad[hre_emperor.Custom('ES_OA')] de toda dignidade imperial. Já não tem nem a autoridade nem os recursos para unir as tribos bárbaras da Germânia sob um único estandarte."
 roman_restoration.0130.a.c: "E que assim seja!"
 roman_restoration.0131.desc.faithful: "Acerto de Contas Romano"
 roman_restoration.0131.desc.christians: "A monstruosa campanha de terror de [scoped_destroyer.GetTitledFirstName|l] trouxe ruína e escuridão ao coração de nossa Santa Mãe Igreja!

Esse ser pagão e vil despojou o papado de todos os seus bens e dignidade, assassinou brutalmente incontáveis teólogos e não vai parar até que tenha colocado toda a cristandade de joelhos. Com o Vaticano destruído e sua hierarquia em frangalhos, a fé católica foi reduzida a um culto desorganizado."
 roman_restoration.0131.desc.fallback: "A ousada campanha de conquista de [scoped_destroyer.GetTitledFirstName|l] trouxe ruína e trevas ao coração da Igreja Católica!

Ao já ter despojado o papado da maior parte de seus bens e de sua dignidade, parece que não ficará satisfeit[scoped_destroyer.Custom('ES_OA')] até que tenha submetido toda a cristandade. Com o Vaticano destruído e sua hierarquia em frangalhos, a fé católica foi reduzida a um culto desorganizado."
 roman_restoration.0131.a.a: "O orgulho dos romanos foi sua ruína. Apesar de toda a sua arrogância, as legiões de [byz_emperor.GetTitledFirstName|l] foram incapazes de resistir aos meus leais $knight_culture_player_plural_no_tooltip_lowercase$. Graças à minha defesa inabalável, dei nova dignidade ao meu título."
 roman_restoration.0131.a.b: "E nunca mais volte!"
 roman_restoration.0131.a.c: "O Pretendente"
 #Unifying Italy, by Flavio Verna
 roman_restoration.0140.t: "Nós forneceremos o incentivo necessário."
 roman_restoration.0140.desc: "Desde a queda do Império Ocidental, a península italiana tem sido fragmentada entre cidades-estado rebeldes, bispos gananciosos e conquistadores bárbaros.

No entanto, sob o domínio de minha dinastia, a Itália deixou de lado as brigas mesquinhas e se tornou unificada mais uma vez, ressurgindo como uma potência dominante no Ocidente. Não seremos mais um prêmio a ser disputado entre francos e gregos, nem seremos brutalizados por piratas e pretendentes bárbaros. A partir de hoje, retomamos nosso lugar legítimo entre os grandes poderes do mundo."
 roman_restoration.0140.a: "Bizâncio Desmoronando"
 roman_restoration.0141.desc: "Desde a queda do Império do Ocidente, a península italiana tem estado dividida entre cidades-estado rebeldes, bispos gananciosos e conquistadores bárbaros, sua antiga glória desperdiçada em mesquinhas disputas internas.

Mas sob o reinado de [scoped_ruler.GetTitledFirstName|l], a Itália foi unificada mais uma vez, ressurgindo como uma potência dominante no Ocidente. Outrora disputada entre francos e gregos, agora se tornou um Império por direito próprio, governando o coração das antigas terras romanas."
 roman_restoration.0141.a: "Nosso Império está em ruínas. Após sua campanha agressiva de humilhação e destruição, as hordas bárbaras de [hre_emperor.GetTitledFirstName|l] não deixaram nada além de ruínas e cidades-estado em guerra. O título que um dia detive já não possui mais qualquer dignidade imperial."
 roman_restoration.0141.b: "Vocês monstros!"
 #Restoring Roman Empire as Italy, by Flavio Verna
 roman_restoration.0150.t: "Contra toda expectativa, [byz_emperor.GetTitledFirstName|l] foi capaz de montar uma defesa eficaz contra minhas forças! Com sua vitória, deu nova legitimidade ao seu império cambaleante e desonrado meu nome irremediavelmente."
 roman_restoration.0150.desc: "Como isso pôde acontecer?!"
 roman_restoration.0150.a: "Os Gregos Contra-Atacam"
 roman_restoration.0151.t: "Os estudiosos discutirão que tipo de loucura levou [hre_emperor.Custom('ES_AlAla')] [hre_emperor.GetTitledFirstName|l] a travar guerra contra os verdadeiros herdeiros de Roma. A lamentável tentativa de est[hre_emperor.Custom('ES_EA')] pretendente de me privar do meu direito divino de governar a Europa só resultou em uma derrota previsível e humilhante..."
 roman_restoration.0151.desc.byzantines: "Nunca houve dúvida sobre isso."
 roman_restoration.0151.desc.others: "O ascendente Império Italiano conseguiu recuperar o suficiente das antigas províncias sob a liderança de [scoped_emperor.GetTitledFirstName|l] para proclamar-se um Império Romano renascido.

Desprezando tanto os pretendentes do Norte quanto do Oriente, esta nova Nação busca restaurar suas antigas fronteiras contra todos os oponentes."
 #Roman Empire dismantles pretenders, by Flavio Verna
 roman_restoration.0160.t: "Um fórum, helenizado como #EMP Fóros#!, era o termo romano para uma grande praça cívica, dedicada a reuniões públicas e mercados, e muitas vezes decorada com troféus de guerra e estatuária."
 roman_restoration.0160.desc: "Por tempo demais toleramos os pretendentes bárbaros do Norte se arrogando uma dignidade imperial imerecida. Roma está firmemente sob o controle do verdadeiro Império, e a patética federação de senhores da guerra germânicos que um dia buscou governar o Ocidente foi empurrada para além do Reno, nas florestas selvagens às quais pertence.

É hora de ensinar a esses bárbaros sua lição final e despojá-los de seu falso Império de uma vez por todas."
 roman_restoration.0160.a: "Você pode realizar uma [activity|lE] #V $activity_chariot_race$#! pela metade do custo"
 roman_restoration.0161.t: "Restauração"
 roman_restoration.0161.desc: "[byz_emperor.GetTitledFirstName] me denunciou publicamente como fals[ROOT.Char.Custom('ES_OA')] [hre_emperor.GetTitleTierName] e está preparad[byz_emperor.Custom('ES_OA')] para desencadear o terrível poder de [byz_emperor.GetPrimaryTitle.GetName] contra o meu povo.

Não foi suficiente que os de sua laia nos expulsassem cada vez mais para longe de nossas terras. Roma não ficará satisfeita até ter derrotado todos os pretendentes à sua glória."
 roman_restoration.0161.a: "Eu te tirei da lama, e posso te jogar de volta nela! Você #EMP realmente#! achou que #EMP Constantinopla#!, o último pilar do conhecimento nesta terra desprezível, poderia ser sua? Nem o seu menor dedo é digno de pisar seus ladrilhos reluzentes! Devolva-a, ou o Corno de Ouro será sua cova de afogamento. Eu mesmo te lançarei nele, se for preciso."
 roman_restoration.0162.t: "Eu estava apenas cuidando dela para você!"
 roman_restoration.0162.desc: "Espero que seu traseiro choramingão fique cheio de lascas no Trono."
 roman_restoration.0162.a: "E que assim seja!"
 roman_restoration.0163.t: "Acerto de Contas Romano"
 roman_restoration.0163.desc: "Os romanos ressurgentes deixaram o Império dos germânicos em frangalhos. Após essa derrota devastadora contra suas legiões, minha palavra tem pouco peso sobre meus antigos vassalos. Este é o fim do sonho de Carlos Magno."
 roman_restoration.0163.a: "Como isso pôde acontecer?"
 roman_restoration.0164.t: "Os Francos Contra-Atacam"
 roman_restoration.0164.desc: "Contra toda expectativa, [hre_emperor.GetTitledFirstName|l] foi capaz de montar uma defesa eficaz contra minhas legiões! Com sua vitória, conseguiu dar nova legitimidade ao seu Império cambaleante e desonrou meu nome de forma irremediável."
 roman_restoration.0164.a: "E quanto às minhas Águias?!"
 roman_restoration.0165.t: "Os Francos Contra-Atacam"
 roman_restoration.0165.desc: "O orgulho dos romanos foi sua ruína. Apesar de toda a sua arrogância, as legiões de [byz_emperor.GetTitledFirstName|l] foram incapazes de resistir aos meus leais $knight_culture_player_plural_no_tooltip_lowercase$. Graças à minha defesa inabalável, dei nova dignidade ao meu título."
 roman_restoration.0165.a: "E nunca mais volte!"
 roman_restoration.0170.t: "O Pretendente"
 roman_restoration.0170.desc: "Por tempo demais permitimos que os fracos remanescentes do Império de Justiniano se agarrassem à dignidade de um título que há muito mancharam com um desfile interminável de reis incompetentes, mesquinhos e decadentes.

Tanto a Itália quanto a Grécia já estão sob nosso controle, enquanto eles foram reduzidos a nada mais do que um despotismo oriental em decadência, ganancioso e rancoroso demais para reconhecer que seu tempo já passou há muito."
 roman_restoration.0170.a: "Nós forneceremos o incentivo necessário."
 roman_restoration.0171.t: "Acerto de Contas Romano"
 roman_restoration.0171.desc: "[hre_emperor.GetTitledFirstName] me denunciou publicamente como fals[ROOT.Char.Custom('ES_OA')] [byz_emperor.GetTitleTierName] e está preparad[hre_emperor.Custom('ES_OA')] para desencadear o terrível poder de [hre_emperor.GetPrimaryTitle.GetName] contra meu povo.

Não bastou que os de sua laia nos expulsassem cada vez mais para longe de nossas terras. Roma não ficará satisfeita até ter vencido todos os pretendentes à sua glória."
 roman_restoration.0171.a: "Somos os únicos herdeiros verdadeiros de Roma!"
 roman_restoration.0172.t: "Bizâncio Desmoronando"
 roman_restoration.0172.desc: "Está feito. Os restos corrompidos do Império dos gregos foram varridos das costas da Grécia e da Ásia Menor. Com seus líderes e burocratas despojados de poder e seus exércitos enfraquecidos, [byz_emperor.GetTitledFirstName|l] não pode mais sustentar sua corte decadente de bajuladores e traidores, nem exercer sua autoridade além das muralhas de seu palácio."
 roman_restoration.0172.a: "Já estava na hora."
 roman_restoration.0173.t: "Acerto de Contas Romano"
 roman_restoration.0173.desc: "Nosso Império está em ruínas. Após sua campanha agressiva de humilhação e destruição, as hordas bárbaras de [hre_emperor.GetTitledFirstName|l] não deixaram nada além de ruínas e cidades-estado em guerra. O título que um dia detive já não possui mais qualquer dignidade imperial."
 roman_restoration.0173.a: "Vocês monstros!"
 roman_restoration.0174.t: "Os Gregos Contra-Atacam"
 roman_restoration.0174.desc: "Contra toda expectativa, [byz_emperor.GetTitledFirstName|l] foi capaz de montar uma defesa eficaz contra minhas forças! Com sua vitória, deu nova legitimidade ao seu império cambaleante e desonrado meu nome irremediavelmente."
 roman_restoration.0174.a: "Como isso pôde acontecer?!"
 roman_restoration.0175.t: "Os Gregos Contra-Atacam"
 roman_restoration.0175.desc: "Os estudiosos discutirão que tipo de loucura levou [hre_emperor.Custom('ES_AlAla')] [hre_emperor.GetTitledFirstName|l] a travar guerra contra os verdadeiros herdeiros de Roma. A lamentável tentativa de est[hre_emperor.Custom('ES_EA')] pretendente de me privar do meu direito divino de governar a Europa só resultou em uma derrota previsível e humilhante..."
 roman_restoration.0175.a: "Nunca houve dúvida sobre isso."
 ######## Byz emp reclaims Constantinople
 roman_restoration.1200.t: "Cidade do Desejo do Mundo"
 roman_restoration.1200.desc: "Por fim, a grande cidade de Constantinopla, o farol deslumbrante do Império do Oriente, voltou para nós!

As massas entusiasmadas abarrotam a [Glossary( 'Mese', 'MESE_GLOSS' )] enfeitada com estandartes, desde os portões de Teodósio até o Grande Palácio, e seus gritos, dando as boas-vindas ao retorno de [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip], podem ser ouvidos até mesmo do outro lado do Bósforo.

Nos séculos vindouros, será lembrado que eu, [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetFirstNameRegnal|l], devolvi esta preciosa joia romana ao seio de seu império."
 MESE_GLOSS: "A #EMP Mese#! ou "caminho central" era a principal artéria de Constantinopla e a rota de procissões e triunfos. Seu núcleo colunado, a #EMP Regia#!, ou "caminho imperial", seguia para oeste desde Santa Sofia até cada um dos [Glossary( 'foros', 'FORUM_GLOSS' )] da cidade antes de se desviar para os portões das muralhas teodosianas."
 FORUM_GLOSS: "Um fórum, helenizado como #EMP Fóros#!, era o termo romano para uma grande praça cívica, dedicada a reuniões públicas e mercados, e muitas vezes decorada com troféus de guerra e estatuária."
 roman_restoration.1200.a: "O trono imperial retorna ao seu lugar de direito!"
 roman_restoration.1200.b.rome: "Roma victa!"
 roman_restoration.1200.b: "A cidade de Constantino está segura mais uma vez."
 half_price_chariot_race_tooltip: "Você pode realizar uma [activity|lE] #V $activity_chariot_race$#! pela metade do custo"
 half_price_chariot_race_flag_desc: "Restauração"
