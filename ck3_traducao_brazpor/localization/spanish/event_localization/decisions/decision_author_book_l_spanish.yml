 author_book.1000.t: "[newly_created_artifact.GetNameNoTooltip]"
 author_book.1000.poem_intro.desc: "Cuando recito el poema que acabo de componer a [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('trusted_influencer'))] [trusted_influencer.GetFirstName], no puedo evitar sentir un cierto orgullo por lo que he logrado. El tema, [SCOPE.Custom('GetCiPoemTheme')], es uno que creo que jamás se había captado de esta manera. Con expectación, echo un vistazo a [trusted_influencer.GetFirstNameNoTooltip], a la espera de que valore mi obra.\n\n"
 author_book.1000.poem_weak.desc: ""Tudo tem beleza, mas nem todos a veem", diz com… o que deveria ser apreço?\n\nTalvez esta obra recém-criada não seja tão brilhante quanto eu esperava."
 author_book.1000.poem_mid.desc: "Uma obra comovente, [trusted_influencer.SheHe] me olha com aprovação depois de ter permanecido em silêncio pelo que me pareceu uma eternidade."
 author_book.1000.poem_great.desc: ""Obtenham novos conhecimentos enquanto refletem sobre os antigos, e talvez vocês se tornem um mestre para os outros". [trusted_influencer.GetFirstNameNoTooltip] claramente aprecia minha nova obra."
 author_book.1000.prose_intro.desc: "A escrita argumentativa é algo que deveria ser natural para qualquer erudito. Em meu texto sobre [SCOPE.Custom('GetProseTheme')], consegui praticar minhas habilidades de usar exemplos para sustentar uma afirmação central.\n\n"
 author_book.1000.prose_weak.desc: "“Seu raciocínio é sensato, mas vejo alguns pontos que podem ser melhorados”, é o que me diz meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('trusted_influencer'))] [trusted_influencer.GetFirstName]. Buscando claramente me apoiar, ele então passa a descrever algumas das observações em meu texto que teme que os leitores possam deixar passar."
 author_book.1000.prose_mid.desc: ""É um ótimo texto, vocês captaram bem a essência do problema", é o que diz meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('trusted_influencer'))] [trusted_influencer.GetFirstName], como primeiro[trusted_influencer.Custom('ES_XA')] leitor[trusted_influencer.Custom('ES_XA')] da minha obra."
 author_book.1000.prose_great.desc: ""Vocês conseguiram falar com uma clareza que poucos possuem em nossos tempos!", proclama meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('trusted_influencer'))] [trusted_influencer.GetFirstName].\nEstá claro que consegui despertar uma emoção genuína com minhas palavras."
 author_book.1000.scholarship_intro.desc: "No fue tarea fácil, pero por fin he llegado a su conclusión. Mi nueva monografía sobre [SCOPE.Custom('GetMonographTopic')] está terminada y el tiempo que he pasado enfrascad[ROOT.Char.Custom('ES_OA')] en la bibliografía relacionada ha hecho que esté más versad[ROOT.Char.Custom('ES_OA')] en este tema que antes.\n\n"
 author_book.1000.scholarship_weak.desc: ""Um grande marco na sua carreira!", proclama meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('trusted_influencer'))] [trusted_influencer.GetFirstName] e vejo certo orgulho em seu olhar. Ainda assim, me pergunto se eu poderia ter feito isso melhor se tivesse tido uma segunda chance."
 author_book.1000.scholarship_mid.desc: ""Um livro competente e informativo, que recomendarei a outros!", diz meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('trusted_influencer'))] [trusted_influencer.GetFirstName] quando ele o termina.\nDeveria me sentir content[ROOT.Char.Custom('ES_OA')] com minha obra, mas me custa não sentir que poderia escrever algo ainda melhor no futuro."
 author_book.1000.scholarship_great.desc: ""Uma obra de referência que coloca seu nome entre os maiores autores do nosso tempo!".\nIsso diz meu primeiro[trusted_influencer.Custom('ES_XA')] leitor[trusted_influencer.Custom('ES_XA')], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('trusted_influencer'))] [trusted_influencer.GetFirstName], após terminar a obra. Esta é uma conquista que não esquecerei tão cedo."
 author_book.1000.a: "Aprendi muito com esta experiência."
 author_book.1000.b: "Um trabalho bem feito."
 author_book.1000.c: "Está claro que tenho o que é preciso."
 author_book.1000.d: ""Este será meu presente para você!"."
