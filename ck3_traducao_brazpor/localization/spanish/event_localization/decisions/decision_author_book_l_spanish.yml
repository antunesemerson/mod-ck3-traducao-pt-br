 ci_poem_description_full: "[SCOPE.Custom('GetCiPoemName')] é um [Glossary( 'poema ci', 'CI_GLOSS' )|l], que deve ser recitado ou cantado no ritmo da melodia da qual recebe o nome. Ele se concentra no tema de [SCOPE.Custom('GetCiPoemTheme')].\n[SCOPE.Custom('GetCiPoemQuality')]"
