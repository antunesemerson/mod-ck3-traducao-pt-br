l_spanish:
 pregnancy.1001.t: "Gravidez!"
 pregnancy.1001.d: "Há uma criança crescendo em meu ventre. Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))]. [real_father.Custom('ES_ElLa')] [real_father.GetTitledFirstNameNoTooltip|l], se sentirá orgulhos[real_father.Custom('ES_OA')]!"
 pregnancy.1001.a: "Ótimo!"
 pregnancy.1002.t: "Gravidez!"
 pregnancy.1002.d: "O destino sorri para mim! Minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('mother'))], [SCOPE.sCharacter('mother').Custom('ES_ElLa')] [SCOPE.sCharacter('mother').GetTitledFirstNameNoTooltip|l], está carregando meu filho!"
 pregnancy.1002.a: "Mal posso esperar para segurar o bebê em meus braços!"
 pregnancy.1101.t.dead: "A Vida Segue"
 pregnancy.1101.t.divorced: "Circunstâncias Excepcionais"
 pregnancy.1101.desc.start: "Uma criança está crescendo em meu ventre, e não tenho dúvidas de que é filho do"
 pregnancy.1101.desc.dead: "meu falecido marido [ex_spouse.GetTitledFirstName|l]."
 pregnancy.1101.desc.divorced: "meu ex-marido [ex_spouse.GetTitledFirstName|l]."
 pregnancy.1101.desc.end: "\n\nEmbora as circunstâncias em torno desta gravidez sejam lamentáveis, posso ao menos me alegrar que meu filho não será considerado um bastardo."
 pregnancy.1101.a.dead: "Se apenas [ex_spouse.GetFirstNameNoTooltip] pudesse estar aqui para isso..."
 pregnancy.1101.a.divorced: "Acho que devo informar [ex_spouse.GetFirstNameNoTooltip] imediatamente."
 pregnancy.1102.t: "$pregnancy.1101.t.divorced$"
 pregnancy.1102.desc: "Agora está claro que minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('mother'))] [mother.GetTitledFirstName|l] está grávida, embora, pelas datas, eu não acredite que seja meu filho.\n\nMuito provavelmente, o verdadeiro pai seja o ex-marido dela, [ex_spouse.GetTitledFirstName|l]."
 pregnancy.1102.a: "Ah, que pena."
 pregnancy.1103.opening: "Ao meu ex-marido [mother.Custom2('RelationDescriptor', ROOT.Char)],"
 pregnancy.1103.opening_concubine: "Ao meu ex[ROOT.Char.GetWomanMan] [mother.Custom2('RelationDescriptor', ROOT.Char)],"
 pregnancy.1103.desc: "Estou escrevendo para informar que estou grávida e que certamente o filho é seu.\n\nComo estávamos casados quando essa criança foi concebida, ela não será considerada ilegítima; quando o bebê nascer, será reconhecido como seu legítimo descendente."
 pregnancy.1103.desc_concubine: "Estou escrevendo para informar que estou grávida e que certamente o filho é seu.\n\nComo estávamos juntos quando essa criança foi concebida, não haverá mancha de ilegitimidade; quando o bebê nascer, ele será reconhecido como seu descendente."
 pregnancy.1103.a: "Está bem, então."
 pregnancy_not_first_child_message_title: "[spouse.Custom2('RelationToMe', SCOPE.sC('mother'))|U] Fica Grávida"
 pregnancy_not_first_child_message: "Sua [spouse.Custom2('RelationToMe', SCOPE.sC('mother'))], [mother.GetTitledFirstName|l], está esperando seu filho"
 pregnancy.2001.t: "Fora do Casamento"
 pregnancy.2001.opening: "Refleti muito sobre isso e os sinais são claros. Estou grávida!"
 pregnancy.2001.father_is_married: "\n\nNão resta a menor dúvida de que [real_father.Custom2('MyCharacterIntroduction', ROOT.Char)] é o pai, mas está casad[real_father.Custom('ES_OA')] e certamente jamais reconheceria meu filho como seu!"
 pregnancy.2001.father_is_unmarried: "\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))] [real_father.GetTitledFirstName|l] é, sem dúvida, o pai, mas sem os laços do casamento, o que as pessoas dirão sobre meu filho?"
 pregnancy.2001.a: "Vou contar a todos quem é o pai!"
 pregnancy.2001.b: "[real_father.GetFirstNameNoTooltip] precisa saber, mas mais ninguém!"
 pregnancy.2001.c: "Não posso contar a #EMP ninguém#!..."
 pregnancy.2001.c.tt: "Você espera que ninguém descubra!"
 pregnancy.2001.d: "Preciso que uma mulher sábia prepare uma poção."
 pregnancy.2002.t: "De Outro Homem"
 pregnancy.2002.desc: "Refleti muito sobre isso e os sinais são claros. Estou grávida!\n\nNão é motivo de alegria, pois não tenho dúvidas de que é [real_father.Custom2('MyCharacterIntroduction', ROOT.Char)] o verdadeiro pai, em vez do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))], [spouse.GetFirstName]!"
 pregnancy.2002.desc.polyamorous: "Refleti muito sobre isso e os sinais são claros. Estou grávida!\n\nNão tenho dúvidas de que [real_father.Custom2('MyCharacterIntroduction', ROOT.Char)] é o verdadeiro pai, em vez do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))], [spouse.GetFirstName]."
 pregnancy.2002.a: "Confesso minha infidelidade!"
 pregnancy.2002.b: "[real_father.GetFirstNameNoTooltip] saberá, em confidência."
 pregnancy.2002.c: "Ninguém jamais deve saber."
 pregnancy.2002.c.tt: "#F Você espera que isso permaneça em segredo#!"
 reveal_illegitimate_pregnancy_to_real_father_tt: "O segredo é revelado para [real_father.GetFirstName]"
 pregnancy.2002.d: "Preciso de um chá de uma mulher sábia."
 search_for_real_father_tt: "#F Vou procurá-lo!#!"
 pregnancy_treatment_fails_tt: "O tratamento falha"
 pregnancy.2003.t: "A Espera"
 pregnancy.2003.desc_no_notice: "Por muito tempo, temi que a mistura de [ROOT.Char.Custom('Abortifacient')] funcionasse, mas agora está claro.\n\nJá não estou mais grávida."
 pregnancy.2003.desc_pain: "A mistura de [ROOT.Char.Custom('Abortifacient')] me deu cólicas e me fez vomitar, mas é melhor assim, do que não ter efeito.\n\nJá não estou mais grávida."
 pregnancy.2003.a: "Fiz o que precisava."
 pregnancy.2004.t: "A Doença"
 pregnancy.2004.desc: "A mistura de [ROOT.Char.Custom('Abortifacient')] pôs fim à minha gravidez, mas me deixou vomitando e com febre. A mulher sábia me alertou sobre a febre, mas a dor não termina como ela disse que seria."
 pregnancy.2004.a: "Consigo superar isso."
 pregnancy.2005.t: "A Espera"
 pregnancy.2005.desc: "Eu esperava que a mistura de [ROOT.Char.Custom('Abortifacient')] acabasse com os meus problemas, mas a mulher sábia me alertou que talvez não acontecesse.\n\nTemo que os receios dela tenham fundamento, pois não tenho dúvidas de que a criança ainda está crescendo em meu ventre."
 pregnancy.2005.a: "Não há mais nada a ser feito."
 pregnancy.2007.t: "O Falecimento"
 pregnancy.2007.desc: "Tudo ficou turvo desde que bebi a mistura de [ROOT.Char.Custom('Abortifacient')]. Figuras se movendo com murmúrios silenciosos ao redor da minha cama, embaçadas e cinzentas, se fundindo com as bordas escuras da minha visão. À medida que os sussurros ficam mais intensos, também aumenta a queimação em meu peito."
 pregnancy.2007.a: "Quem me receberá?"
 pregnancy.2050.t: "De Outro"
 pregnancy.2050.desc.polyamorous: "Refleti muito sobre isso e os sinais são claros. Estou grávida!\n\nNão tenho dúvidas de que [real_father.Custom2('MyCharacterIntroduction', ROOT.Char)] é o verdadeiro pai."
 pregnancy.2050.desc: "Refleti muito sobre isso e os sinais são claros. Estou grávida!\n\nNão é motivo de alegria, pois agora todos sabem que fui infiel ao meu [spouse.Custom2('MyCharacterIntroduction', ROOT.Char)]. Não tenho dúvidas de que [real_father.Custom2('MyCharacterIntroduction', ROOT.Char)] é o pai..."
 pregnancy.2101.t: "Prematuramente"
 pregnancy.2101.desc_other_children: "À medida que minha barriga cresce, minha inquietação também aumenta. Esta não é a primeira vez que estou grávida, mas essa sensação sombria é nova; algo está errado.\n\nAs cólicas vêm durante a noite e, ao me levantar pela manhã, encontro lençóis manchados e arruinados."
 pregnancy.2101.desc_pain: "À medida que minha barriga cresce, minha inquietação também aumenta. Esta é a primeira vez que estou grávida, mas essa sensação sombria não pode estar certa; algo está errado.\n\nAs cólicas vêm durante a noite e, ao me levantar pela manhã, encontro lençóis manchados e arruinados."
 pregnancy.2101.desc: "À medida que os dias passam, minha apreensão aumenta em vez da minha barriga. Certamente deveria estar mais visível agora? Certamente a criança teria se manifestado?\n\nAlgo deve ter dado errado, pois não consigo sentir nenhuma faísca de vida dentro de mim."
 pregnancy.2101.a: "Não estou mais grávida."
 pregnancy.2102.desc: "\"Não estava destinado a nascer\".\n\n[mother.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me assegura que a vida é assim, mas sua mão demora sobre sua barriga."
 pregnancy.2102.a: "Não está mais grávida."
 pregnancy.3001.t: "Indiscrições"
 pregnancy.3001.opening: "A barriga [mother.Custom('ES_DelDela')] [mother.GetTitledFirstName|l] cresce e não pode haver dúvidas. Ela está grávida!"
 pregnancy.3001.lovers_love: "[mother.GetSheHe|U] não disse nada, mas isso poderia ser resultado do nosso amor?"
 pregnancy.3001.lovers_not_love: "[mother.GetSheHe|U] não disse nada, mas isso poderia ser resultado de nossas relações carnais?"
 pregnancy.3001.not_lovers: "[mother.GetSheHe|U] não disse nada, mas isso poderia ser resultado de nossa recente aventura?"
 pregnancy.3001.a: "Terei que perguntá-lo(a) eu mesmo(a)."
 pregnancy.3001.a.tt: "Você confronta [mother.GetFirstNameNoTooltip] sobre a criança"
 pregnancy.3001.b: "Talvez nunca saiba, mas sempre vou me perguntar..."
 pregnancy.3001.b.tt: "Você não age baseado em suas suspeitas"
 pregnancy.3002.t: "Indiscrições"
 pregnancy.3002.lovers: "É claro que suspeitei de algo quando minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('mother'))], [mother.GetTitledFirstName|l], começou a mostrar sinais de estar grávida. Agora, ela me fez saber que a criança é minha."
 pregnancy.3002.not_lovers: "[mother.GetTitledFirstName] está grávida e me informou confidencialmente que isso é resultado de nosso caso ilícito."
 pregnancy.3002.spouse_exists: "\n\nFelizmente, sua [mother.Custom2('RelationToMe', SCOPE.sC('spouse'))]. [spouse.GetTitledFirstName|l]. Acredita que é dela!"
 pregnancy.3002.a: "Ah, [mother.GetFirstNameNoTooltip], se fosse apenas nós dois e nosso filho..."
 pregnancy.3002.b.not_again: "Como pude deixar isso acontecer de novo?!"
 pregnancy.3002.b: "Isso deve permanecer em segredo!"
 pregnancy.3002.a.tt: "O filho de [mother.GetShortUINameNoTooltip] nascerá sem que se saiba quem é o pai"
 pregnancy.3002.c: "Vou revelar a verdade!"
 pregnancy.3003.t: "Uma Barriga Inchada"
 pregnancy.3003.desc: "[mother.GetTitledFirstName] veio me procurar, e imediatamente soube por quê. Ela está grávida, e há tão poucas dúvidas em seu coração, assim como no meu, sobre quem é o pai. Uma criança nascida fora dos legítimos vínculos do casamento está destinada a uma vida de bastardia. É esse o destino que quero para meu filho?"
 pregnancy.3003.desc_no_bastards: "[mother.GetTitledFirstName] veio até mim e o motivo era claro. Está grávida, e não há dúvida em seu coração, assim como no meu, sobre quem é o pai. Que tipo de vida espera meu filho, nascido fora dos laços do casamento?"
 pregnancy.3003.a: "Isso deve permanecer em segredo!"
 pregnancy.3003.a.tt: "O segredo permanece oculto, por enquanto"
 pregnancy.3003.b: "Oh, esta é uma notícia alegre!"
 pregnancy.3004.t: "Uma Barriga Inchada"
 pregnancy.3004.desc: "[mother.Custom('ES_ElLa')|U] [mother.GetTitledFirstName|l] veio me procurar e os motivos são claros. Está grávida e não tem dúvida nenhuma de quem é o pai. Nem eu.\n\nNo entanto, meu casamento com [spouse.GetFirstName] me impede de fazer muito mais além de esperar que meu envolvimento continue em segredo."
 pregnancy.3004.a: "Nunca pensei que chegaria a isso."
 pregnancy.5001.t: "\"Eu Preciso Saber!\""
 pregnancy.5001.desc: "[real_father_inquirer.GetTitledFirstName] veio me procurar. Ao pôr uma mão sobre minha barriga, me olha com uma expressão preocupada."
 pregnancy.5001.real_father: "\n\n\"Eu só quero ouvir você dizer, eu já sei que é meu.\""
 pregnancy.5001.not_father: "\n\n\"Quero sinceridade, por favor\".\n\nMeus olhos se fixam no corredor atrás dele. Temo que alguém nos veja juntos."
 pregnancy.5001.a: "A criança é sua, [real_father.GetFirstNameNoTooltip]."
 pregnancy.5001.b: "Você não é o pai do meu filho."
 pregnancy.5002.t: "Nosso Sangue"
 pregnancy.5002.love: "\"Claro que é seu, [ROOT.Char.GetFirstNameNoTooltip]!\"\n\nEu até esqueço de me preocupar se alguém pode nos ouvir. Alegria e confusão me invadem. Como se todas as minhas preces tivessem sido atendidas, nossa união foi abençoada, mesmo que haja... complicações."
 pregnancy.5002.not_love: "\"Claro que é seu, [ROOT.Char.GetFirstNameNoTooltip]!\"\n\nMe preocupa que alguém o tenha ouvido, mas estamos sozinhos e em silêncio. Ainda bem, porque de repente tenho muito no que pensar."
 pregnancy.5002.a: "Nós dois... Uma criança..."
 pregnancy.5002.b: "Esta é uma notícia alegre e deve ser compartilhada!"
 pregnancy.5003.t: "A Ideia Errada"
 pregnancy.5003.desc: "Mesmo que eu continue pressionando o assunto, [mother.GetTitledFirstName|l] continua firme. \"A criança não é sua, [ROOT.Char.GetFirstNameNoTooltip].\"\n\nSerá que eu estava tão errado?"
 pregnancy.5003.a: "Está me dizendo a verdade?"
 pregnancy.5003.a.tt: "\"Só o tempo dirá se estou certo...\""
 pregnancy_announcement_my_child_will_be_a_bastard: "Meu filho nascerá um [bastard|lE] com [real_father.GetTitledFirstNameNoTooltip|l] como pai"
 pregnancy_announcement_the_child_will_be_a_bastard_real_father: "O filho de [mother.GetTitledFirstNameNoTooltip|l] nascerá [bastard|lE] e eu serei o pai conhecido"
 pregnancy_announcement_the_child_will_be_a_bastard: "O filho de [mother.GetTitledFirstNameNoTooltip|l] nascerá como [bastard|lE] e [real_father.GetTitledFirstNameNoTooltip|l] será seu pai"
 pregnancy.6001.t: "Além de Qualquer Dúvida"
 pregnancy.6001.desc: "Pode ser que a criança que carrego seja ilegítima, mas ela não vai crescer acreditando que não tem pai. Não me importa o que diga [real_father.GetTitledFirstName|l]."
 pregnancy.6001.a: "Sempre farei o que for melhor para meu filho."
 pregnancy.6002.t: "Além de Qualquer Dúvida"
 pregnancy.6002.desc: "![mother.GetTitledFirstName] me nomeou publicamente como pai do filho que está esperando!"
 pregnancy.6002.married: "\n\n\"Como você pôde fazer isso?!\" [spouse.GetFirstName] me observa [spouse.Custom('GeneralTemperament')]."
 pregnancy.6002.unmarried_sympathetic: "\n\nNascido fora dos laços do casamento, a criança terá uma vida difícil, mas pelo menos conhecerá a verdade."
 pregnancy.6002.unmarried_unsympathetic: "\n\nNão basta que ela suporte esse fardo? Também precisa me arrastar junto com ela?"
 pregnancy.6002.a: "O que as pessoas vão dizer?"
 pregnancy.6003.t: "Além de Qualquer Dúvida"
 pregnancy.6003.desc: "Minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('mother'))], [mother.GetTitledFirstName|l], confessou não apenas que sua gravidez é resultado de uma união ilícita, mas o verdadeiro pai não é outro senão [real_father.GetTitledFirstName|l]!\n\nQue desonra trouxe para minha casa! Como pôde fazer isso comigo? Conosco?"
 pregnancy.6003.a: "[real_father.GetFirstNameNoTooltip]?!"
 pregnancy.6004.t: "Além de Qualquer Dúvida"
 pregnancy.6004.desc: "Minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('mother'))], [mother.GetTitledFirstName|l], deixou claro que não apenas seu filho não nascido é produto de uma união ilícita, mas o pai é ninguém menos que [real_father.Custom2('MyCharacterIntroduction', ROOT.Char)]!"
 pregnancy.6004.incest: "\n\nO que acontecerá com a criança, criada a partir de uma união tão profana?"
 pregnancy.6004.mother_married: "\n\nO que isso significa para o casamento de [spouse.GetTitledFirstName]?"
 pregnancy.6004.mother_unmarried: "\n\nO que será do filho dela, agora que o mundo inteiro sabe?"
 pregnancy.6004.a: "[mother.GetSheHe|U] lançou esta casa ao caos!"
 pregnancy.6005.t: "Além de Qualquer Dúvida"
 pregnancy.6005.desc: "[mother.GetTitledFirstName] revelou ao mundo o pai da sua gravidez ilícita. Eu queria esperar que não fosse verdade, mas é claro que eu sabia que era. Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))], [real_father.GetTitledFirstName|l], é o verdadeiro pai do filho não nascido!"
 pregnancy.6005.a: "[real_father.GetFirstNameNoTooltip], como você pôde?"
 pregnancy.6006.t: "Além de Qualquer Dúvida"
 pregnancy.6006.desc: "[real_father.Custom2('MyCharacterIntroduction', ROOT.Char)|U] foi nomeado como o verdadeiro pai do filho não nascido de [mother.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!"
 pregnancy.6006.real_father_married: "\n\nNão pensou na importância de seu casamento com [spouse.Custom2('HerHisCharacterIntroduction', SCOPE.sC('real_father'))]?"
 pregnancy.6006.real_father_unmarried: "Será que não pensou na honra de sua família?"
 pregnancy.6006.a: "O que esse filho bastardo significará para nós?"
 #For polyamorous faith reveal
 pregnancy.6999.t: "De Outro Homem"
 pregnancy.6999.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('mother'))]. [mother.GetTitledFirstName|l] me informou que está grávid[mother.Custom('ES_OA')] de [real_father.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\nEmbora a criança não seja minha, ainda sou seu [ROOT.Char.Custom('WifeHusband')], e é meu dever cuidar de [mother.Custom('ES_ElElla')] durante os próximos meses."
 pregnancy.6999.a: "Um dever que cumprirei."
