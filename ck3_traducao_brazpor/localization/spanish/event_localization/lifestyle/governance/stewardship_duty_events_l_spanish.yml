l_spanish:
 #The Diplomatic craft — Mediating between disagreeing subjects, by Mathilda Bjarnehed
 stewardship_duty.0001.t: "Exercício de Mediação"
 stewardship_duty.0001.start.desc: "Quando os gritos irritantes chegam até mim mais uma vez, reprimo meu instinto de virar as costas. As constantes brigas entre"
 stewardship_duty.0001.vassals.desc: "meus vassalos [arguer_1.GetTitledFirstName|l] e [arguer_2.GetTitledFirstName|l]"
 stewardship_duty.0001.vassalandcourtier.desc: "meu vassal[arguer_1.Custom('ES_OA')] [arguer_1.GetTitledFirstName|l] e [arguer_2.Custom2('MyCharacterIntroduction', ROOT.Char)]"
 stewardship_duty.0001.end.desc: "basta para deixar qualquer um louco… algo precisa ser feito!\n\nPoderia tratar a situação como um exercício de mediação ou escutar disfarçadamente e depois me aproximar de um deles com minha solidariedade…"
 stewardship_duty.0001.a: "Tentar fazê-los ver o bom senso."
 stewardship_duty.0001.b: "Ugh, mas que [arguer_2.Custom2('InsultNoun', ROOT.Char)] é [arguer_2.GetFirstNameNoTooltip]!"
 stewardship_duty.0001.c: ""Mas vocês podem acreditar em [arguer_1.GetFirstNameNoTooltip]? Que atrevimento o dela!"."
 stewardship_duty.0001.a.success.tt: "Minha mediação é bem-sucedida"
 stewardship_duty.0001.a.failure.tt: "Pareço um[ROOT.Char.Custom('ES_XA')] intrometido[ROOT.Char.Custom('ES_OA')] insensível"
 stewardship_duty_0001_mediation_success.tt: "[arguer_1.GetShortUIName] e [arguer_2.GetShortUIName] ganham [opinion|lE] um do outro"
 #Conflict at the Council, by Mathilda Bjarnehed
 stewardship_duty.0017.t: "A Voz da Razão"
 stewardship_duty.0017.start.desc: "Outra reunião do conselho, outro conflito. O [councillor_1.GetCouncilTitle] [councillor_1.GetFirstName] e o [councillor_2.GetCouncilTitle] [councillor_2.GetFirstName] estão discutindo violentamente sobre"
 stewardship_duty.0017.war.desc: "a guerra em andamento."
 stewardship_duty.0017.election.desc: "a eleição do meu sucessor."
 stewardship_duty.0017.building_projects.desc: "os próximos projetos de construção."
 stewardship_duty.0017.troop_training.desc: "o regime de treinamento das tropas."
 stewardship_duty.0017.charity_projects.desc: "meu próximo projeto de caridade."
 stewardship_duty.0017.religious_minorities.desc: "a questão das minorias religiosas."
 stewardship_duty.0017.health_issues.desc: "a propagação de uma doença."
 stewardship_duty.0017.end.desc: "\n\nComo [ROOT.GetCharacter.GetTitleAsNameNoTooltip], eu poderia acalmá-los com uma única palavra, mas tenho uma ideia melhor. Minhas atividades diplomáticas me deram percepção sobre como lidar com situações como estas para agradar a todos."
 stewardship_duty.0017.a: "Ficar do lado de [councillor_1.GetFirstNameNoTooltip] sem ofender [councillor_2.GetFirstNameNoTooltip]."
 stewardship_duty.0017.b: "Ficar do lado de [councillor_2.GetFirstNameNoTooltip] sem chatear [councillor_1.GetFirstNameNoTooltip]."
 stewardship_duty.0017.c: "Encontrar um compromisso que deixe todos felizes."
 stewardship_duty.0017.c.criticial_success.tt: "Eu faço um ótimo compromisso"
 stewardship_duty.0017.c.criticial_success.desc: "Consegui um ótimo acordo que agrada a [councillor_1.GetFirstName] e [councillor_2.GetFirstName]."
 stewardship_duty.0017.c.success.tt: "Eu faço um bom compromisso"
 stewardship_duty.0017.c.success.desc: "Consegui um bom acordo que apazigua [councillor_1.GetFirstName] e [councillor_2.GetFirstName]."
 stewardship_duty.0017.c.failure.tt: "Eu falho em encontrar um compromisso"
 stewardship_duty.0017.c.failure.desc: "Fracasso em chegar a um compromisso, para decepção de [councillor_1.GetFirstName] e [councillor_2.GetFirstName]."
 #Unwanted Pregnancy, by Sean Hughes
 stewardship_duty.1055.t: "Uma Gravidez Indesejada"
 stewardship_duty.1055.desc: "Uma cena dramática se desenrola em minha sala de audiência quando [new_mothers_parent.Custom2('MyCharacterIntroduction', ROOT.Char)] acusa [new_father.Custom2('MyCharacterIntroduction', ROOT.Char)] de ter engravidado sua [new_mothers_parent.Custom2('RelationToMeShort', new_mother)] [new_mother.Custom('Governance_1055_OutOfWedlock')].\n\n[new_fathers_parent.GetTitledFirstName|l] afirma com indignação que não há provas da culpa de seu filho. E mesmo que tivesse sido ele, é certamente culpa de [new_mother.GetFirstName], por ser uma mulher leviana!\n\nA discussão está esquentando, e preciso fazer algo antes que as coisas saiam do controle."
 stewardship_duty.1055.a: "Você terá a justiça que deseja, [new_mothers_parent.GetFirstNameNoTooltip]."
 stewardship_duty.1055.b: "[new_father.GetFirstNameNoTooltip] é inocente, ele não deve nada a [new_mothers_parent.GetFirstNameNoTooltip]!"
 stewardship_duty.1055.e: "Por que vocês dois estão me incomodando com essa briga insignificante!?"
 #Wealth Aplenty, by Sean Hughes
 stewardship_duty.1062.t: "Riqueza Abundante"
 stewardship_duty.1062.desc: "Meu tesouro transborda ouro e prata, e todas as despesas estão cobertas. Por ser um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetLadyLord] ric[ROOT.Char.Custom('ES_OA')], [SelectLocalization(IsLandlessAdventurer(ROOT.Char),'eu poderia','eu deveria')] oferecer patrocínio a algum artista ou erudito.\n\nA sorte quis que três candidatos em potencial tenham acabado de chegar a [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]..., mas será que algum deles me impressiona?"
 stewardship_duty.1062.a: "[client_1.GetTitledFirstNameNoTooltip|l] é conhecido por cultivar jardins bonitos."
 stewardship_duty.1062.b: "A poesia religiosa d [client_2.GetTitledFirstNameNoTooltip|l] comove muitas almas."
 stewardship_duty.1062.c: "As descobertas realizadas por [client_3.GetTitledFirstNameNoTooltip|l] prometem."
 stewardship_duty.1062.d: "Não, tenho outros planos para esse dinheiro..."
 stewardship_duty.1062.e: "Expectativas? Bah! Vou me banhar na glória do meu tesouro!"
 stewardship_duty.1063.t: "Renovação do Patrocínio"
 stewardship_duty.1063.desc: "Após 5 anos, os fundos que reservei para o patrocínio da minha [client.Custom('Governance_1062_Client')] [client.GetTitledFirstName|l]. Agora posso escolher se vou renová-lo por mais 5 anos ou deixá-lo ir[client.Custom('ES_LoLa')]."
 stewardship_duty.1063.a: "Estender meu patrocínio por mais um período."
 stewardship_duty.1063.b: "[client.GetSheHe|U] tem feito um bom trabalho, dê-lhe um bônus!"
 stewardship_duty.1063.c: "Seus serviços não são mais necessários."
 stewardship_duty.1064.desc: "Meu [client.Custom('Governance_1062_Client_U')] Deixou Minha Corte"
 stewardship_duty.1065.desc: "Meu [client.Custom('Governance_1062_Client_U')] Faleceu"
 stewardship_duty.1065.guilty.desc: "Eu Matei Meu [client.Custom('Governance_1062_Client_U')]"
 stewardship_duty.1066.desc: "Eu Prendi Meu [client.Custom('Governance_1062_Client_U')]"
 stewardship_duty.1068.desc.a: "Vassalo Impressionado Com Meus Jardins"
 stewardship_duty.1068.desc.b: "[ROOT.Char.GetFaith.AltPriestTermPlural|U] Impressionado Com Meu [client.Custom('Governance_1062_Client_U')]"
 stewardship_duty.1068.desc.c: "[client.Custom('Governance_1062_Client_U')] Fez Uma Nova Descoberta"
 #Serf Refugees, by Sean Hughes
 stewardship_duty.1071.t: "Refugiados de Servos"
 stewardship_duty.1071.desc: "Uma multidão de servos chegou a [target_county.GetName] vindo da vizinha [origin_county.GetName]. Eles afirmam que fogem do governo abusivo de [origin_county_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] e que desejam viver em meu domínio em vez do dele.\n\nLegalmente falando, ainda estão submetidos a [origin_county_owner.GetFirstName], mas se eu os acolher em minhas terras, seria quase impossível que [origin_county_owner.Custom('ES_ElElla')] conseguisse provar que, na verdade, eles são servos dele."
 stewardship_duty.1071.a: "Devolver gentilmente os servos a [origin_county_owner.GetFirstNameNoTooltip]."
 stewardship_duty.1071.b: "Devolver os servos, mas dar uma severa reprimenda a [origin_county_owner.GetFirstNameNoTooltip]."
 stewardship_duty.1071.c: "Mostrar #EMP aos meus#! servos seus novos campos..."
 stewardship_duty.1071.c.compassionate: "Eu darei a eles refúgio d [origin_county_owner.GetFirstNameNoTooltip]..."
 stewardship_duty.1071.c.flavor: "e espero que [origin_county_owner.GetFirstName] não descubra meu envolvimento nisso!"
 stewardship_duty.1072.opening: "[origin_county_owner.Custom2('AppropriateGreeting', ROOT.Char)]"
 stewardship_duty.1072.desc.rival: "Eu sei que você roubou meus servos de mim. Eu posso não ter nenhuma maneira de recuperá-los, mas não pense que vou esquecer essa ofensa. Você conquistou minha inimizade — espero que tenha valido a pena."
 stewardship_duty.1072.desc.relationship: "¿Por qué me robáis los siervos? Me siento conmocionad[ROOT.Char.Custom('ES_OA')] y profundamente herid[ROOT.Char.Custom('ES_OA')] de que me traicionéis así… No sé si podré volver a veros del mismo modo después de esto."
 stewardship_duty.1072.desc.vassal: "Sei que vocês realocaram meus servos em suas terras. Por que fariam isso com seu[ROOT.Char.Custom('ES_OA')] própri[ROOT.Char.Custom('ES_OA')] vassal[ROOT.Char.Custom('ES_OA')]? Não cumpri eu meu dever ao pagar os impostos que me eram devidos?\n\nSem servos para trabalhar em meus campos, não posso cultivar nada. Vocês bem que poderiam ter me roubado a própria terra! Essa é uma ofensa que não esquecerei tão cedo."
 stewardship_duty.1072.desc.subvassal: "Sei que vós reassentastes meus servos em vossas terras. Tal ato subverte a própria estrutura de nossa sociedade!\n\nEmbora eu nada possa fazer a respeito disso agora, podeis ficar certo de que [origin_county_owner_liege.GetTitledFirstName|l] saberá por que este ano tenho menos impostos para [origin_county_owner_liege.Custom('ES_ElElla')]."
 stewardship_duty.1072.a: "Aqueles eram seus servos? Minhas desculpas, vou devolvê-los."
 stewardship_duty.1072.b: "Resmungue o quanto quiser, isso não muda nada."
 stewardship_duty.1072.b.compassionate: "Isso é culpa sua. Você não deveria tê-los maltratado."
 #Vassal Factionalism — Persuade a vassal to leave a faction for 10 years, by Sean Hughes
 stewardship_duty.4010.t: "Faccionalismo Vassalizado"
 stewardship_duty.4010.desc.start: "[faction_member.GetTitledFirstName] tem usado sua influência para promover o avanço de"
 stewardship_duty.4010.desc.independence: "a [targeting_faction.GetName]. Eles estão buscando se libertar do meu domínio, alegando que eu não sou seu verdadeiro suserano."
 stewardship_duty.4010.desc.liberty: "a [targeting_faction.GetName]. Eles buscam anular várias leis no [ROOT.Char.GetPrimaryTitle.GetName] que eles acreditam interferir nos direitos tradicionais dos [faction_member.Custom('StatecraftGetVassalType')]."
 stewardship_duty.4010.desc.claimant: "a [targeting_faction.GetName], acreditando que seu representante seria um governante melhor do que eu."
 stewardship_duty.4010.desc.peasant: "a [targeting_faction.GetName]. Eles estão descontentes por serem súditos de alguém que consideram [ROOT.Char.Custom2('GetUnbelieverAndForeignerTerm', faction_member)] e prefeririam ter um governante como [faction_leader.GetTitledFirstName|l], com quem compartilham cultura e fé."
 stewardship_duty.4010.desc.end: "\n\nEmbora eu não duvide das convicções de [faction_member.GetFirstNameNoTooltip], continua sendo human[faction_member.Custom('ES_OA')]. Se eu conseguisse convencer[faction_member.Custom('ES_LoLa')] a restringir essas atividades, seria mais fácil para mim consolidar o poder que tenho sobre meus vassalos."
 stewardship_duty.4010.bribe: "Uma generosa dádiva mudará a opinião."
 stewardship_duty.4010.bribe.flavor: "[faction_member.GetWomenMen] egoístas terão mais tendência a aceitar um suborno."
 stewardship_duty.4010.favor: "Se me ajudar agora, eu retribuirei o favor."
 stewardship_duty.4010.favor.flavor: "[faction_member.GetWomenMen] egoístas ou compassiv[faction_member.Custom('ES_OA')]s terão mais tendência a aceitar esta oferta."
 stewardship_duty.4010.prestige: "A bajulação tradicional é boa para inspirar lealdade."
 stewardship_duty.4010.prestige.flavor: "É mais fácil conquistar com elogios [faction_member.GetWomenMen] arrogantes ou honrosos."
 stewardship_duty.4010.piety: "Lembrar-lhe que meus interesses são os [faction_member.GetFaith.HighGodNamePossessive]."
 stewardship_duty.4010.piety.flavor: "É mais provável que [faction_member.GetWomenMen] fanátic[faction_member.Custom('ES_OA')]s ajam de acordo com sua fé."
 stewardship_duty.4010.attempt.tt: "A decisão d [faction_member.GetTitledFirstNameNoTooltip|l] será baseada em sua personalidade"
 stewardship_duty.4010.success: "[faction_member.GetTitledFirstNameNoTooltip|l] aceita minha oferta"
 stewardship_duty.4010.failure: "[faction_member.GetTitledFirstNameNoTooltip|l] rejeita minha oferta"
 stewardship_duty.4010.decline: "[faction_member.GetTitledFirstNameNoTooltip|l] está apenas exercendo seus direitos."
 stewardship_duty.4010.decline.tt: "Todo mundo aprecia poder fazer o que quiser."
 stewardship_duty.4011-4.desc.start: "[my_liege.GetTitledFirstName] veio até mim dizendo que minha associação com a [targeting_faction.GetName] tem estado causando-lhe dificuldades excessivas, e que isso precisa parar."
 stewardship_duty.4011-4.b: "Eu não serei desviado de meu caminho!"
 stewardship_duty.4011-4.b.tt: "Permaneço na [targeting_faction.GetName]"
 stewardship_duty.4011.t: "Um Apelo à Ganância"
 stewardship_duty.4011.desc: "\n\nPara esse fim, me ofereceu uma bolsa pesada como incentivo para deixar a facção e concentrar minha atenção em outras áreas."
 stewardship_duty.4011.a: "Uma transação justa."
 stewardship_duty.4012.t: "Um Apelo à Ambição"
 stewardship_duty.4012.desc: "\n\nMe implora que veja as coisas do ponto de vista dele(a) e me oferece um favor em troca de encerrar meu apoio à facção."
 stewardship_duty.4012.a: "Eu retribuirei o favor se você retribuir o meu!"
 stewardship_duty.4013.t: "Um Apelo ao Orgulho"
 stewardship_duty.4013.desc: "\n\nNesse sentido, me ofereceu elogios públicos pelo meu trabalho em outras áreas, o que reforçaria minha reputação em [my_liege.GetPrimaryTitle.GetName]."
 stewardship_duty.4013.a: "Contanto que [my_liege.GetSheHe] exalte minha [faction_member.Custom('quirk_pos_noun')], estou feliz."
 stewardship_duty.4014.t: "Um Apelo à Piedade"
 stewardship_duty.4014.desc: "\n\nEntão me lembra que ele/ela está no trono por vontade [faction_member.GetFaith.HighGodNamePossessive] e que se opor a [my_liege.Custom('ES_ElElla')] é se opor a [faction_member.GetFaith.HighGodName]."
 stewardship_duty.4014.a: "Sirvo a [faction_member.GetFaith.HighGodName] ao servir a [my_liege.GetTitledFirstNameNoTooltip|l]."
 stewardship_duty.4015.t: "Vassalo Abandona a Facção"
 stewardship_duty.4015.desc: "Ao deixar perfeitamente claro o que pode ganhar se me for leal, consegui convencer a [faction_member.GetTitledFirstName|l] para que abandone seu apoio à [targeting_faction.GetName].\n\n! As queixas dele eram simplesmente insignificantes em comparação com o que eu tinha a oferecer!"
 stewardship_duty.4015.a: "Eu sabia que conseguiria fazê-lo ver a razão!"
 stewardship_duty.4019.t: "Vassalo Apega-se à Facção"
 stewardship_duty.4019.desc: "Apesar dos meus melhores esforços para convencer[faction_member.Custom('ES_LoLa')], [faction_member.GetTitledFirstName|l] se recusou a deixar a [targeting_faction.GetName] e [faction_member.GetSheHe] continua a defender os interesses deles acima dos meus."
 stewardship_duty.4019.a: "Por que não vê os benefícios de ficar do meu lado?"
 stewardship_duty.4020.t: "Oferta Invalidada"
 stewardship_duty.4020.desc: "[faction_member.GetTitledFirstName] não faz mais parte de uma facção."
 stewardship_duty.4020.desc.switch: "[faction_member.GetTitledFirstName] mudou de facção."
 #Altering the Deal - Persuade a vassal to accept a contract change, by Sean Hughes
 stewardship_duty.4040.t: "Alterando o Acordo"
 stewardship_duty.4040.desc: "Meu [ROOT.Char.Custom2('RelationToMe', my_vassal)] [my_vassal.GetTitledFirstName|l] tem um pacto comigo bastante indulgente que o isenta das obrigações que esperaria de um dos meus vassalos.\n\nSe eu conseguir que ele aceite aumentar suas obrigações, o senhorio se beneficiaria enormemente a longo prazo…"
 stewardship_duty.4040.a: "Um incentivo suficiente comprará o consentimento."
 stewardship_duty.4040.b: "Aposto que posso convencer[my_vassal.Custom('ES_LoLa')] a aceitar as mudanças."
 stewardship_duty.4040.b.success: "[my_vassal.GetFirstNameNoTooltip] fica convencid[my_vassal.Custom('ES_OA')] a aceitar mudanças no contrato"
 stewardship_duty.4040.b.failure: "[my_vassal.GetFirstNameNoTooltip] continua relutante em aceitar uma alteração no contrato"
 stewardship_duty.4040.c: "Aceitará minhas alterações, ou então!"
 stewardship_duty.4040.c.success: "[my_vassal.GetFirstNameNoTooltip] é coagido[my_vassal.Custom('ES_OA')] a aceitar mudanças no contrato"
 stewardship_duty.4040.c.failure: "[my_vassal.GetFirstNameNoTooltip] se recusa a aceitar uma alteração no contrato"
 stewardship_duty.4040.d: "Lealdade vale mais do que tributos."
 stewardship_duty.4040.d.tt: "#F [my_vassal.GetFirstNameNoTooltip] mantém seu contrato atual com a minha bênção:#!"
 stewardship_duty.4040.contractchange: "Eu posso alterar o contrato d [my_vassal.GetTitledFirstName|l] a meu favor."
 stewardship_duty.4041.desc: "Num esforço para convencer [my_vassal.GetTitledFirstName|l] a aceitar um contrato mais restritivo, sentei-me com [my_vassal.Custom('ES_ElElla')] e expliquei todos os motivos pelos quais precisávamos atualizá-lo. \n\nA princípio, [my_vassal.GetSheHe] estava relutante, mas, após muita discussão, consegui que concordasse que seria razoável fazer uma alteração em seu contrato."
 stewardship_duty.4041.a: "Eu sabia exatamente como convencer[my_vassal.Custom('ES_LoLa')]!"
 stewardship_duty.4042.desc: "Desde o início da nossa conversa, pude ver que seria difícil convencer a [my_vassal.GetTitledFirstName|l] de que abrisse mão dos direitos concedidos em seu contrato.\n\nApesar dos meus melhores esforços e súplicas, [my_vassal.GetSheHe] manteve-se firme e afirmou que, se eu não posso me virar com o que me dá atualmente, a culpa é minha, não sua."
 stewardship_duty.4042.a: "Terei que tentar uma abordagem diferente..."
 stewardship_duty.4043.desc: "Não foi uma negociação, mas uma exigência. Deixei claro a [my_vassal.GetTitledFirstName|l] que ele continua a manter seus títulos apenas porque isso me agrada e que, se quisesse permanecer em meu bom lado, [my_vassal.GetSheHe] precisaria fazer concessões.\n\n[my_vassal.GetSheHe|U] aceitou apressadamente, content[my_vassal.Custom('ES_OA')] de partir sem mais incidentes."
 stewardship_duty.4043.a: "$stewardship_duty.4041.a$"
 stewardship_duty.4044.desc: "[my_vassal.GetTitledFirstName] se opôs à minha exigência de que aceitasse um contrato mais restritivo.\n\nMe disse que, embora eu seja [ROOT.Char.GetTitleAsNameNoTooltip] e governe nesta terra, seu contrato atual lhe dá direito a certos privilégios que eu não posso simplesmente tirar dele — pelo menos não legitimamente."
 stewardship_duty.4044.a: "$stewardship_duty.4042.a$"
 #Faction Organizing — Lower a faction's discontent during wartime, by Sean Hughes
 stewardship_duty.4060.t: "Organização de Facção"
 stewardship_duty.4060.desc.default: "Mesmo no meio da guerra, [faction_leader.GetTitledFirstName|l] e seus apoiadores na [targeting_faction.GetName] estão dispostos a usar qualquer desculpa para avançar com sua agenda!"
 stewardship_duty.4060.desc.self_claim: "Mesmo em meio à guerra, [faction_leader.GetTitledFirstName|l] está disposto[faction_leader.Custom('ES_OA')] a usar qualquer desculpa para reivindicar seu direito sobre [targeting_faction.GetSpecialTitle.GetName]!"
 stewardship_duty.4060.desc.other_claim: "Mesmo em meio à guerra, [faction_leader.GetTitledFirstName|l] está dispost[faction_leader.Custom('ES_OA')] a usar qualquer desculpa para reivindicar os direitos de [targeting_faction.GetSpecialCharacter.GetTitledFirstName|l] sobre [targeting_faction.GetSpecialTitle.GetName]!"
 stewardship_duty.4060.desc.end: "\n\nCom minhas tropas e ouro sendo desperdiçados no campo de batalha, preciso analisar cuidadosamente quais opções tenho disponíveis para mitigar essa ameaça..."
 stewardship_duty.4060.a: "Eu #EMP devo#! convencer o reino a se unir."
 stewardship_duty.4060.a.success: "Eu convenço a facção a mostrar união"
 stewardship_duty.4060.a.success.every_faction_member: "Cada membro da [targeting_faction.GetName|V]"
 stewardship_duty.4060.a.failure: "A facção não é influenciada por minhas palavras"
 stewardship_duty.4060.b: "Uma boa quantia o(a) convencerá a recuar…"
 stewardship_duty.4060.c: "[faction_leader.GetSheHe] não pode ser permitido agir de acordo com seus planos!"
 stewardship_duty.4060.d: "Não posso me preocupar com isso agora."
 stewardship_duty.4060.attempt.tt: "A decisão d [faction_leader.GetTitledFirstNameNoTooltip|l] será baseada em sua personalidade"
 stewardship_duty.4060.decline.tt: "Você ignora a facção por enquanto"
 stewardship_duty.4060.failure.tt: "[targeting_faction.GetName] não perde nenhum descontentamento"
 #A Vassal cheats their contract, by Linnéa Thimrén
 stewardship_duty.5021.t: "Vassalo Desleal"
 stewardship_duty.5021.desc: "Estou examinando os livros contábeis que detalham a renda que recebo de meus vassalos. Esses números não batem… [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('cheater_vassal'))] de [cheater_vassal.GetTitledFirstName|l] me fez de idiota e tem pago muito pouco!"
 stewardship_duty.5021.a: "O/A[cheater_vassal.GetTitleAsNameNoTooltip] deverá pagar o que lhe cabe."
 stewardship_duty.5021.a.message_1: "[cheater_vassal.GetFirstNameNoTooltip] paga o que me deve"
 stewardship_duty.5021.a.message_2: "Suspeito que [cheater_vassal.GetFirstNameNoTooltip] continua escondendo dinheiro"
 stewardship_duty.5021.b: "[cheater_vassal.Custom('ES_LoLa')|U] manterei sob rédea curta[cheater_vassal.Custom('ES_OA')] de agora em diante!"
 stewardship_duty.5021.c: "Quem nunca tentou encher os próprios bolsos?"
 #Resolve a war between two ai vassals, by Linnéa Thimrén
 stewardship_duty.7001.t: "Vassalos em Guerra"
 stewardship_duty.7001.desc: "Meus dois vassalos, [war_vassal.GetTitledFirstName|l] e [war_vassal_2.GetTitledFirstName|l], estão em batalha um contra o outro. Esta "[war_scope.GetName|l]" ameaça desestabilizar meu reino. Se quero intervir, devo agir com rapidez."
 stewardship_duty.7001.a: "Convencê-los a deixar de lado sua disputa."
 stewardship_duty.7001.a.desc_1: "[war_vassal.GetFirstNameNoTooltip] vê a sabedoria na paz"
 stewardship_duty.7001.a.desc_2: "[war_vassal.GetFirstNameNoTooltip] não ouve meus argumentos"
 stewardship_duty.7001.b: "Isso é entre eles — não vou intervir."
 stewardship_duty.7001.c: "\"Você vai parar com essa loucura. #EMP Agora!#!\""
 stewardship_duty.7002.toast.peace: "[war_vassal.GetFirstName] e [war_vassal_2.GetFirstName] aceitaram uma paz branca"
 stewardship_duty.7002.toast.invalid: "A [war_scope.GetName|l] terminou antes que eu pudesse intervir"
 #About that Favor, by Stephen Arthur and Sean Hughes
 stewardship_duty.7023.t: "Sobre Aquela Dívida..."
 stewardship_duty.7023.desc: "O fato de eu dever um grande favor a [hook_holder.GetTitledFirstName|l] pesa muito sobre mim.\n\nSeria um grande alívio se eu pudesse resolver isso agora, nos meus próprios termos. Esperar que [hook_holder.Custom('ES_ElElla')] o cobre mais tarde poderia me colocar em uma situação difícil depois."
 stewardship_duty.7023.success: "Convenço a [hook_holder.GetFirstNameNoTooltip] a abrir mão do favor que devo a"
 stewardship_duty.7023.failure: "[hook_holder.GetFirstNameNoTooltip] insiste para que eu retribua o favor que devo a ele"
 stewardship_duty.7023.a: "Oferecer-lhe uma quantia em moedas para resolver as coisas."
 stewardship_duty.7023.a.success: "[hook_holder.GetTitledFirstNameNoTooltip|l] aceita meu ouro em vez do favor que lhe devo"
 stewardship_duty.7023.b: "Convencer[hook_holder.Custom('ES_LoLa')] de deixar o passado para trás."
 stewardship_duty.7023.c: "[hook_holder.GetSheHe] vai esquecer isso, ou então!"
 stewardship_duty.7023.d: "Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetHouse.GetNameNoTooltip] sempre paga suas dívidas!"
 stewardship_duty.7023.d.tt: "Ainda lhe devo um favor a [hook_holder.GetTitledFirstName|l]."
 stewardship_duty.7023.player: "#weak Outro jogador sempre tem a opção de recusar, embora possa receber [stress|lE] por fazê-lo.#!"
 stewardship_duty.7023.invalidated.hooked_ruler: "Como já não devo mais um favor a [hook_holder.GetTitledFirstName|l], meu pedido para que o renuncie já não é válido."
 stewardship_duty.7023.invalidated.hook_holder: "Como [hooked_ruler.GetTitledFirstName|l] já não me deve um favor, sua petição para que eu renuncie a ele já não procede."
 stewardship_duty.7025.opening: "[hooked_ruler.Custom2('AppropriateGreeting', ROOT.Char)]"
 stewardship_duty.7025.desc.gold: "Você já me prestou um grande serviço, e sou grato. Para retribuir o favor, gostaria de oferecer uma parte dos meus impostos deste ano.\n\nVocê considera tal oferta aceitável?"
 stewardship_duty.7025.desc.diplomacy.success: "Estou escrevendo para discutir sobre aquele favor que eu lhe devia. Pessoas razoáveis concordarão que minhas ações passadas já satisfizeram minha obrigação.\n\nPortanto, sinto que não lhe devo mais um favor."
 stewardship_duty.7025.desc.diplomacy.failure: "Eu lhe devo um favor, mas prefiro não dever a ninguém. Quero dizer, quem quer dever um favor a alguém?\n\nE se você simplesmente... esquecesse o favor? Eu gostaria disso. Seria ótimo."
 statectaft_ongoing.7025.desc.intimidation.success: "Você pode ter-me prestado um serviço uma vez, mas não pense que lhe devo algo em troca. Já basta como pagamento permanecer em meu favor. Acredite, você não quer me transformar em um[ROOT.Char.Custom('ES_XA')] inimig[ROOT.Char.Custom('ES_OA')]…"
 stewardship_duty.7025.desc.intimidation.failure: "Parece que tendes a ilusão de merecer um favor da minha parte. Não devo nada a um[hook_holder.Custom('ES_XA')] [hook_holder.Custom2('InsultNoun', SCOPE.sC('hooked_ruler'))] [hook_holder.Custom2('InsultAdjective', SCOPE.sC('hooked_ruler'))] como vós! Esquecei disso, ou então…"
 stewardship_duty.7025.gold.a: "Eu aceito o ouro."
 stewardship_duty.7025.gold.b: "Favores valem mais do que moedas."
 stewardship_duty.7025.diplomacy.a: "Um argumento convincente."
 stewardship_duty.7025.diplomacy.b: "Está falando sério?! De jeito nenhum!"
 stewardship_duty.7025.intimidation.a: "Não quero deixá-lo zangado…"
 stewardship_duty.7025.intimidation.b: "Ameaças vazias não ajudarão!"
 stewardship_duty.7025.refuse.tt: "[hooked_ruler.GetTitledFirstName] ainda me deve um favor"
 stewardship_duty.7025.stress.tt: "Tendo a dispensar o favor, então recusar[hooked_ruler.Custom('ES_LoLa')] é muito estressante"
 stewardship_duty.7027.opening: "[hook_holder.Custom2('AppropriateGreeting', ROOT.Char)]"
 stewardship_duty.7027.desc.accepted.gold: "Obrigado pelo seu presente. Considere sua dívida paga integralmente."
 stewardship_duty.7027.desc.refused.gold: "Sua obrigação vale mais do que ouro. Você ainda está em dívida comigo."
 stewardship_duty.7027.desc.accepted.diplomacy: "Vejo a sabedoria em suas palavras. Não pense mais naquele favor do passado."
 stewardship_duty.7027.desc.refused.diplomacy: "Suas palavras rebuscadas são vazias assim como suas aparentes promessas. Ainda considero que você está em dívida comigo."
 stewardship_duty.7027.desc.accepted.intimidation: "Claro que vou perdoar sua dívida comigo. Isso nunca esteve em questão! Estou à sua mercê."
 stewardship_duty.7027.desc.refused.intimidation: "Você não me assusta. Você vai cumprir sua obrigação comigo, de um jeito ou de outro."
 stewardship_duty.7027.a: "Finalmente, isso está resolvido."
 stewardship_duty.7027.b: "Isso poderia ter sido melhor."
 ##################
 #Special Events #
 ##################
 #Map Painting Journey, by Petter Vilberg
 stewardship_duty_special.1201.t: "Mapeando Territórios"
 stewardship_duty_special.1201.desc: "Meu administrador[steward.Custom('ES_XA')] propõe uma empreitada que, segundo ele, beneficiaria o [ROOT.Char.Custom('RealmType')].\n\nAcredita que eu deveria viajar com meu séquito para traçar um mapa dos territórios de [painting_land_owner.GetTitledFirstName|l]. Eu conheceria melhor meu domínio e [steward.GetFirstName] acredita que eu compreenderia melhor o meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('painting_land_owner'))]."
 stewardship_duty_special.1201.a: "Uma empreitada valiosa."
 stewardship_duty_special.1201.a.tt: "Você começa os preparativos imediatamente!"
 stewardship_duty_special.1201.b: "Este não é o momento para tal jornada."
 stewardship_duty_special.1201.b.tt: "Você não embarca na jornada"
 stewardship_duty_special.1201.continue_tooltip: "Minha pesquisa continua."
 stewardship_duty_special.1202.desc: "Quando passamos pelas terras de [painting_land_owner.GetTitledFirstName|l], somos recebidos por um [painting_land_owner.Custom('MountedWarriorTerm')] e sua comitiva.\n\n"[painting_land_owner.GetTitledFirstName|l] vos dá as boas-vindas, meu [ROOT.Char.Custom('my_title')]. Sois mais do que bem-vind[ROOT.Char.Custom('ES_OA')] a permanecer nestas terras pelo tempo que precisardes"."
 stewardship_duty_special.1202.a: "Espero aprender muito."
 stewardship_duty_special.1202.a.tt: "Começo a mapear a área."
 stewardship_duty_special.1203.desc: "A estrada parecia tão tranquila, mas é isso que a torna tão boa para uma emboscada, não é mesmo?\n\nOs bandidos saíram correndo de trás de uma colina, flechas e ordens enchendo de repente o ar."
 stewardship_duty_special.1203.a: "Não deixe nenhum criminoso vivo!"
 stewardship_duty_special.1203.b: "Pare! Pagaremos por passagem segura!"
 stewardship_duty_special.1204.desc: "Acampamos uma noite à beira [painting_land_owner.Custom('IndefiniteBodyOfWater')]. Meus súditos acordam renovados ao som dos pássaros e à suave névoa sobre as águas."
 stewardship_duty_special.1204.a: "Este é um bom lugar para acampar por um tempo."
 stewardship_duty_special.1204.a.tt: "Minha jornada está levemente atrasada."
 stewardship_duty_special.1204.b: "Continuamos rapidamente."
 stewardship_duty_special.1205.desc: "Os camponeses que cuidavam do campo à beira da estrada provavelmente nunca tinham visto uma procissão tão régia quanto aquela que eu liderava.\n\n"E est[ROOT.Char.Custom('ES_EA')] quem é?", ouvi um deles perguntar ao outro."
 stewardship_duty_special.1205.a: ""Sou seu[ROOT.Char.Custom('ES_OA')] senhor[ROOT.Char.Custom('ES_XA')] e soberano[ROOT.Char.Custom('ES_OA')], dono[ROOT.Char.Custom('ES_OA')] desta terra!""
 stewardship_duty_special.1205.b: "Deveria aprender sobre a vida como um camponês aqui."
 stewardship_duty_special.1206.desc: "Tenho visto diversas fortificações pela região, em várias posições defensivas entre o terreno mutável. Numa manhã, ao nos aproximarmos de uma delas, vejo [local_baron.Custom('ES_AlAla')] [local_baron.GetTitleAsNameNoTooltip] local que supervisiona o cuidado dos cavalos do lado de fora dos portões."
 stewardship_duty_special.1206.a: "Peça um tour pelo [local_baron.Custom('FortifiedBuilding')]."
 stewardship_duty_special.1206.b: "Convidar [local_baron.Custom('ES_AlAla')] [local_baron.GetTitledFirstNameNoTooltip|l] para jantar comigo esta noite."
 stewardship_duty_special.1207.desc: "Semanas na estrada podem cansar qualquer um. É, portanto, uma bênção quando finalmente encontramos uma pousada que parece poder oferecer luxos como uma cama de verdade. Pode até ter alojamento para animais maiores do que ratos."
 stewardship_duty_special.1207.a: "Insisto em pagar pelo quarto e comida."
 stewardship_duty_special.1207.b: "O estalajadeiro terá a honra de hospedar [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip]!"
 stewardship_duty_special.1208.desc: "Las tierras de [painting_land_owner.GetTitledFirstName|l] están atravesadas por arroyos y ríos. Para cruzar la mayoría, se usan puentes improvisados y vados. ¿No podrían ser más útiles estas tranquilas aguas?"
 stewardship_duty_special.1208.a: "Enviarei mensagens ao meu cartógrafo em pequenas tigelas!"
 stewardship_duty_special.1208.b: "Se esses barrancos de lama fossem nivelados, poderiam se tornar um solo cultivável..."
 stewardship_duty_special.1281.opening: "Colinas e vales, planícies e lagos, estradas e caminhos florestais. Já vi tudo isso no reino d [painting_land_owner.GetTitledFirstName|l], e meus cartógrafos têm anotado e desenhado carvões avidamente cada nova visão."
 stewardship_duty_special.1281.end: "\n\nTambém foi uma pesquisa interessante sobre cidades e vilarejos, bem como as pessoas que percorrem essas partes do [ROOT.Char.Custom('RealmType')]."
 stewardship_duty_special.1281.a: "Essas informações são úteis para guardar só para mim."
 stewardship_duty_special.1281.b: "[painting_land_owner.Custom('ES_ElLa')|U] [painting_land_owner.GetTitledFirstNameNoTooltip|l] tomará conhecimento das minhas descobertas."
 stewardship_duty_special.1282.end: "\n\nTambém fizemos anotações sobre fortes em estado de deterioração e formações naturais excepcionalmente defensáveis."
 stewardship_duty_special.1282.a: "Nunca se sabe quando isso pode ser útil."
 stewardship_duty_special.1282.b: "[painting_land_owner.Custom('ES_ElLa')|U] [painting_land_owner.GetFirstNameNoTooltip|l] deve renovar suas defesas… Assim como eu!"
 stewardship_duty_special.1283.end: "\n\nO nível de detalhe que meus cartógrafos alcançaram com esses mapas é surpreendente. Nenhum caminho parece ter passado despercebido, e eles estão repletos de anotações detalhadas sobre o terreno."
 stewardship_duty_special.1283.a: "Ninguém conhece a geografia dessa terra melhor do que eu, agora."
 stewardship_duty_special.1283.b: "Meus generais encontrarão um bom uso para eles."
 stewardship_duty_special.1284.end: "\n\nTenho ficado particularmente intrigado com o grande número de rios e riachos que correm pelas terras [painting_land_owner.Custom('ES_DelDela')] [painting_land_owner.Custom('my_title')]."
 stewardship_duty_special.1284.a: "Talvez possam ser úteis para mensageiros?"
 stewardship_duty_special.1284.b: "Considerarei as implicações militares disso."
 stewardship_duty_special.1285.end: "\n\nHá tanto para aprender sobre o solo que pisamos. Há muita coisa a ser descoberta."
 stewardship_duty_special.1285.a: "Ainda há muito para aprender sobre a terra que pisamos."
 stewardship_duty_special.1285.b: "Se encorajarmos colonos lá e drenarmos o terreno aqui..."
 stewardship_duty_special.1286.end: "\n\nTenho um novo apreço pelas nuances do meu reino. Quem diria que as coisas seriam tão diferentes de [capital.GetNameNoTier]?"
 stewardship_duty_special.1286.a: "Esse conhecimento será de grande utilidade."
 stewardship_duty_special.1286.b: "Sou tão [ROOT.Char.GetLadyLord] destas terras!"
 #Vassal Mediation, by Petter Vilberg
 statecraft_mediation_unfair: "Isso será visto como injusto"
 statecraft_mediation_fair: "Isso será visto como um pouco justo"
 statecraft_mediation_very_fair: "Isso será visto como muito justo"
 statecraft_mediation_favor_vassal_1: "Isso será visto como favorecendo a [vassal_1.GetTitledFirstName|l]"
 statecraft_mediation_favor_vassal_2: "Isso será visto como favorecendo [vassal_2.GetTitledFirstName|l]"
 story_diplomacy_lifestyle_mediation: "Mediação entre vassalos"
 story_diplomacy_lifestyle_mediation_desc: "Uma parte de construir laços de lealdade envolve resolver as brigas de vassalos briguentos."
 FRACTIOUS_VASSAL: "Vassalo contencioso"
 PERCEIVED_FAIRNESS: "Percepção de justiça"
 FAVOR_VASSAL_1: "Favor com [Story.MakeScope.Var('stewardship_duty_special_vassal_1').Char.GetShortUIName]"
 FAVOR_VASSAL_2: "Favor para [Story.MakeScope.Var('stewardship_duty_special_vassal_2').Char.GetShortUIName]"
 FAIRNESS_MIN_VALUE_LABEL: "Injusto"
 FAIRNESS_MAX_VALUE_LABEL: "Justo"
 stewardship_duty_special.2001.t: "Resolução"
 stewardship_duty_special.2001.desc: "A inimizade entre meus vassalos [vassal_1.GetTitledFirstName|l] e [vassal_2.GetTitledFirstName|l] é lendária, e chegou a um ponto em que os outros nobres do reino solicitaram que eu interviesse.\n\nDisputas de fronteira, direitos tributários, história familiar... Eles têm uma lista interminável de disputas e, até mesmo aqui na minha corte, mal conseguem manter a civilidade."
 stewardship_duty_special.2001.a: "Mediar entre esses dois certamente será um desafio!"
 stewardship_duty_special.2001.b: "Isto é um assunto para meu [ROOT.Char.GetCouncillor('councillor_chancellor').GetCouncilTitle|l]."
 stewardship_duty_special.2001.c: "\"Você se atreve a me incomodar com essas trivialidades?!\""
 stewardship_duty_special.2011.t: "Resolução: Disputa de Terras"
 stewardship_duty_special.2011.desc: "Eu já achava que a discussão era acalorada #EMP antes#! de terem trazido os mapas.\n\nTanto [vassal_1.GetTitledFirstName|l] quanto [vassal_2.GetTitledFirstName|l] têm ilustrações de seus domínios, e em ambas o mesmo vau aparece como pertencente a cada um deles. Ninguém parece disposto a ceder um palmo de terreno.\n\nJamais vi um pergaminho causar tanta ira, e está claro que uma nova fronteira precisa ser definida."
 stewardship_duty_special.2011.a: "Eu mediarei pessoalmente essas discussões."
 stewardship_duty_special.2011.b: "Será compensado(a) [vassal_1.GetFirstNameNoTooltip] por qualquer perda."
 stewardship_duty_special.2011.c: "[vassal_2.GetFirstNameNoTooltip] tem #EMP mucho#! muito interesse em que eu tome a decisão certa e justa…"
 statecraft_mediation_debug_improve_contract: "Melhorar contrato de vassalagem com [vassal_2.GetTitledFirstName|l]"
 stewardship_duty_special.2012.t: "Resolução: Disputa Familiar"
 stewardship_duty_special.2012.desc: "A discussão do dia entre [vassal_1.GetTitledFirstName|l] e [vassal_2.GetTitledFirstName|l] não começou bem.\n\n"Desde que você recebeu o escudo do avô…".\n"De novo essa história do escudo, sério? Aqui, na corte [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitle]?"."
 stewardship_duty_special.2012.a: "A família deve nos unir, não nos separar."
 stewardship_duty_special.2012.a.success: "Palavras Sábias"
 stewardship_duty_special.2012.a.failure: "Platitudes Vazias"
 stewardship_duty_special.2012.b: "Parece que há grandeza em sua família."
 stewardship_duty_special.2012.c: "Eu sei como resolver brigas familiares!"
 statecraft_sc_mediation_debug_add_dynasty_prestige: "#D Adicionar Prestígio de Dinastia#!"
 stewardship_duty_special.2012.c.major_progress: "Eu aproximei os brigões, aumentando significativamente a chance de um resultado positivo"
 stewardship_duty_special.2013.t: "Resolução: Direitos de Impostos"
 stewardship_duty_special.2013.desc: "[vassal_1.GetTitledFirstName] afirma que [vassal_2.GetTitledFirstName|l] nega seu direito de cobrar impostos.\n\n"De forma alguma!", protesta [vassal_1.GetFirstName]. "A família em questão está do meu lado da fronteira há gerações. Um único campo do outro lado não merece um dízimo inteiro!"."
 stewardship_duty_special.2013.a: "Se vocês não puderem decidir, o dízimo reverte para [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip]."
 stewardship_duty_special.2013.b: "A tradição tem precedência aqui."
 stewardship_duty_special.2013.c: "O proprietário da terra fica com o imposto, não importa quem a colonizou."
 stewardship_duty_special.2014.t: "Resolução: Noivado"
 stewardship_duty_special.2014.desc: ""[betrothal_candidate_lord.Custom2('RelationToMe', SCOPE.sC('betrothal_candidate'))] de [betrothal_candidate_lord.GetTitledFirstName|l] foi prometido a meu [vassal_1.Custom2('RelationToMe', SCOPE.sC('vassal_1_betrothal_candidate'))] desde…", começa [vassal_1.GetTitledFirstName|l], antes de ser interrompid[vassal_1.Custom('ES_OA')], como era de se esperar, por [vassal_2.GetTitledFirstName|l].\n\n"[betrothal_candidate.GetTitledFirstName|l] sempre iria se casar com meu [vassal_2.Custom2('RelationToMe', SCOPE.sC('vassal_2_betrothal_candidate'))]!"."
 stewardship_duty_special.2014.a: "[betrothal_candidate.Custom('ES_ElLa')|U] [betrothal_candidate.GetTitledFirstNameNoTooltip|l] se casará com [vassal_1.Custom2('RelationToMe', SCOPE.sC('vassal_1_betrothal_candidate'))] de [vassal_1.GetFirstNameNoTooltip]."
 stewardship_duty_special.2014.b: "Será formalizado um noivado com [vassal_2.Custom2('RelationToMe', SCOPE.sC('vassal_2_betrothal_candidate'))] de [vassal_2.GetFirstNameNoTooltip]."
 stewardship_duty_special.2014.c: "Essa briga fez com que ambos perdessem o direito!"
 stewardship_duty_special.2015.t: "Resolução: Julgamento"
 stewardship_duty_special.2015.desc: ""E foi na vez em que [vassal_2.GetTitledFirstName|l] deu abrigo a um ladrão famoso!", acusa [vassal_1.GetTitledFirstName|l].\n\n"Por [vassal_2.GetFaith.HighGodName]!". É óbvio que [vassal_2.GetFirstName] já ouviu isso antes. "Você não tem direito de julgar meus súditos em meu reino!"\n\n"Só porque ele conseguiu escapar antes de…".\n\nRapidamente se calam quando ergo a mão e lhes lembro da minha presença."
 stewardship_duty_special.2015.a: "Esse ladrão será executado, e a questão será anulada."
 stewardship_duty_special.2015.b: "Se [vassal_2.GetFirstNameNoTooltip] tem direito de julgamento, isso é tudo o que importa."
 stewardship_duty_special.2015.c: "Meu [ROOT.Char.GetCouncillor('councillor_chancellor').GetCouncilTitle|l] julgará este ladrãozinho."
 stewardship_duty_special.2018.t: "Resolução: Cavalos"
 stewardship_duty_special.2018.desc: "[vassal_1.GetTitledFirstName] hoje tem outra reclamação, claro. "Os cavalos criados em [barony_1.GetNameNoTier] são famosos há muito tempo, mas agora os mercadores de [barony_2.GetNameNoTier] os vendem como se tivessem sido criados por eles! Em [barony_2.GetNameNoTier]!".\n\n[vassal_2.GetTitledFirstName|l] tem uma objeção. "É que #EMP sim#! se criam aqui! Quer que os mercadores mintam sobre suas mercadorias?"."
 stewardship_duty_special.2018.a: "As origens devem ser respeitadas, com certeza?"
 stewardship_duty_special.2018.b: "Eles não são de [barony_1.GetNameNoTier] nem de [barony_2.GetNameNoTier], mas de [new_name.GetNameNoTier]!"
 stewardship_duty_special.2018.c: "Parece que talvez precisemos de uma taxa real de inspeção de cavalos."
 stewardship_duty_special.2019.t: "Resolução: A Pedreira"
 stewardship_duty_special.2019.desc: "[vassal_1.GetTitledFirstName] e [vassal_2.GetTitledFirstName|l] passam o que parecem horas enumerando queixas.\n\n"… e temos aquele chefe da pedreira da fronteira que se recusa a pagar impostos por um alvará de isenção que #EMP você#! lhe deu!"\n"O quê?! Mas foi você quem já havia tirado tudo deles quando chegaram meus cobradores—"\n\nPor fim, eles param ao perceber que foram enganados."
 stewardship_duty_special.2019.a: "O imposto em falta será cobrado e dividido igualmente."
 stewardship_duty_special.2019.b: "Vocês dois merecem ser feitos de tolos!"
 stewardship_duty_special.2019.c: "Execute o mestre de pedreira e queime a pedreira."
 stewardship_duty_special.2019.d: "É um crime contra [ROOT.Char.GetTitleAsNameNoTooltip] e [ROOT.Char.GetTitleAsNameNoTooltip] vai cuidar disso!"
 stewardship_duty_special.2021.t: "Resolução: O Banquete"
 stewardship_duty_special.2021.desc: "[vassal_1.GetTitledFirstName] e [vassal_2.GetTitledFirstName|l] têm toda sorte de queixas um contra o outro, grandes e pequenas.\n\n"[uninvited.GetFirstName] proibiu seus arrendatários de comparecer ao meu banquete de outono!", reclama [host.GetFirstName].\n\n"É claro. Não quero que meus vassalos tragam mais pulgas para casa.""
 stewardship_duty_special.2021.a: "São vassalos de [uninvited.GetFirstNameNoTooltip]. Devem fazer o que lhes for ordenado."
 stewardship_duty_special.2021.b: "Ninguém deve ser negado um banquete!"
 stewardship_duty_special.2021.c: "Agora, vocês dois estão #EMP obrigados#! a comparecerem aos banquetes um do outro!"
 stewardship_duty_special.2022.t: "Resolução: O Insulto"
 stewardship_duty_special.2022.desc: ""[insulter.GetTitledFirstName|l] insultou gravemente meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))]!", exclama de repente [insultee.GetTitledFirstName|l]. "Está insinuando que divide a cama com porcos!".\n\n[insulter.GetFirstName] mantém a calma. "Às vezes a verdade não é muito lisonjeira, [insultee.GetFirstName]"."
 stewardship_duty_special.2022.a: "Isso exige um pedido de desculpas público!"
 stewardship_duty_special.2022.b: "Essas brigas mesquinhas estão abaixo de vocês dois."
 stewardship_duty_special.2022.c: "Mas certamente foi realmente um elogio, se você pensar a respeito?"
 stewardship_duty_special.2025.t: "Resolução: Oportunidades"
 stewardship_duty_special.2025.desc: "Dada a influência que tenho sobre [hooked_vassal.GetTitledFirstName|l], posso pedir que, independentemente do resultado da sua disputa com [other_vassal.GetTitledFirstName|l], conte a todo o mundo como foram justas e imparciais as decisões que eu tomei."
 stewardship_duty_special.2025.a: "[hooked_vassal.GetFirstNameNoTooltip], #EMP sí#! hay algo que podéis hacer por mí…"
 stewardship_duty_special.2025.b: "Essa não é a maneira de resolver as questões."
 statecraft_mediation_progress_fairness: "[hooked_vassal.GetFirstNameNoTooltip] enfatiza o quão just eu sou, melhorando significativamente minhas chances de um resultado positivo"
 stewardship_duty_special.2026.t: "Resolução: Um Fim"
 stewardship_duty_special.2026.desc: "Gritos e mãos ensanguentadas me recebem. O copo finalmente transbordou e [killer.GetTitledFirstName|l] está de pé sobre o corpo de [victim.GetTitledFirstName|l], [killer.Custom('signature_weapon')] ainda em mãos.\n\n"Este é o único acordo justo que eu jamais conseguiria.""
 stewardship_duty_special.2026.a: "O que você fez... Isso exige olho por olho."
 stewardship_duty_special.2026.b: "Você se condenou a uma vida nas trevas."
 stewardship_duty_special.2026.c: "Vejo que a disputa está resolvida, então!"
 stewardship_duty_special.2027.t: "Resolução: Família"
 stewardship_duty_special.2027.desc: "A disputa entre [vassal_1.GetTitledFirstName|l] e [vassal_2.GetTitledFirstName|l] não para nunca e, aparentemente, já dura há gerações.\n\nPais, avós, antepassados distantes, todos brigaram por um motivo ou outro. Será que há alguma maneira de quebrar essa cadeia?"
 stewardship_duty_special.2027.a: "Uma dinastia mais prestigiosa é mais importante."
 stewardship_duty_special.2027.b: "Um grande nome não é do que grandes [lower_prestige.Custom('WomenMen')] são feit."
 stewardship_duty_special.2027.c: "Nosso reino é construído a partir de todas as grandes dinastias."
 statecraft_mediation_favor_higher_prestige: "Considera-se que isso favorece [higher_prestige.GetTitledFirstName|l]"
 statecraft_mediation_favor_lower_prestige: "Isso será visto como favorecendo [lower_prestige.GetTitledFirstName|l]"
 stewardship_duty_special.2071.t: "Resolução: Novos Começos"
 stewardship_duty_special.2071.desc: "Tem sido um processo exaustivo, mas [vassal_1.GetTitledFirstName|l] e [vassal_2.GetTitledFirstName|l] já não se matam de tanta raiva.\n\nDe fato, não apenas deixam minha corte com suas queixas resolvidas, como o fazem como novos amigos."
 stewardship_duty_special.2071.a: "Um milagre se já vi um!"
 stewardship_duty_special.2072.desc: "Quando [vassal_1.GetTitledFirstName|l] e [vassal_2.GetTitledFirstName|l] saem da minha corte... ao menos o fazem sem o ódio e o veneno que marcou sua chegada. Veremos se isso dura, mas agora sentem um novo respeito entre si, graças aos meus esforços."
 stewardship_duty_special.2072.a: "Não é pouca coisa, se é que posso dizer!"
 stewardship_duty_special.2073.t: "Resolução: Favoritismo"
 stewardship_duty_special.2073.desc: "«¡Nunca iba a ser una mediación justa, ¿verdad?», [accuser.Custom('ES_ElLa')] [accuser.GetTitledFirstName|l] sale profundamente enojad[accuser.Custom('ES_OA')] de la sala de audiencias. «¡El favoritismo mostrado aquí es repugnante!».\n\n[favorite.Custom('ES_ElLa')|U] [favorite.GetTitledFirstName|l] permanece en calma. «No estoy de acuerdo, [ROOT.Char.Custom('FormOfAddressForLiege')]»."
 stewardship_duty_special.2073.a: "Bem, deixe ir esse[accuser.Custom('ES_EA')] cachorr[accuser.Custom('ES_OA')] ingr[accuser.Custom('ES_OA')]."
 stewardship_duty_special.2074.t: "Resolução: Sempre Inamistoso"
 stewardship_duty_special.2074.desc: "Quando chegaram [vassal_1.GetTitledFirstName|l] e [vassal_2.GetTitledFirstName|l], não pensei que pudessem destilar mais ódio e amargura um contra o outro. Sua partida me provou o quanto eu estava errado."
 stewardship_duty_special.2074.a: "Minha mediação poderia ter sido melhor."
 stewardship_duty_special.2081.t: "Resolução: Um Fim"
 stewardship_duty_special.2081.both_dead: "Com as mortes de [vassal_1.GetTitledFirstName|l] e [vassal_2.GetTitledFirstName|l], suas ridículas brigas ficam distantes, pequenas e absurdas."
 stewardship_duty_special.2081.vassal_1: "Com a morte de [vassal_1.GetTitledFirstName|l], as brigas e disputas que teve com [vassal_2.GetTitledFirstName|l] parecem pequenas, mesquinhas e absurdas."
 stewardship_duty_special.2081.vassal_2: "Com a morte de [vassal_2.GetTitledFirstName|l], as brigas e disputas que teve com [vassal_1.GetTitledFirstName|l] parecem pequenas, mesquinhas e sem sentido."
 stewardship_duty_special.2081.a: "Com o tempo, seguimos em frente."
 stewardship_duty_special.2081.tt: "Meus esforços de mediação chegam ao fim."
 stewardship_duty_special.2082.t: "Resolução: Um Fim"
 stewardship_duty_special.2082.desc: "Com [prisoner.GetTitledFirstName|l] pres[prisoner.Custom('ES_OA')], as disputas entre [prisoner.Custom('ES_ElElla')] e [other.GetTitledFirstName|l] parecem muito menos importantes."
 stewardship_duty_special.2082.a: "Todos encontramos formas de resolver nossos conflitos."
