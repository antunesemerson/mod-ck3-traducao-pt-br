l_spanish:
 #################
 #Normal Events #
 #################
 #Guild Dispute, by Sean Hughes
 stewardship_domain.1041.t: "Disputa entre Guildas"
 stewardship_domain.1041.desc: "Tanto a Guilda dos Ferreiros quanto a Guilda dos Mercadores em [guild_county.GetName] enviaram um representante para se encontrar comigo. As duas guildas entraram em um impasse sobre o comércio de ferro bruto no condado e querem que eu arbitre a disputa.\n\nSecretamente, cada representante me ofereceu um acordo lucrativo com sua guilda na tentativa de me fazer tomar partido."
 stewardship_domain.1041.a: "Ambos poderiam se beneficiar se cooperassem."
 stewardship_domain.1041.a.success: "Eu faço com que as duas guildas trabalhem juntas"
 stewardship_domain.1041.a.success.tt: "As guildas em [guild_county.GetNameNoTier] agora estão cooperando para fortalecer a produção de armas"
 stewardship_domain.1041.a.failure: "Não consigo fazer as guildas chegarem a um acordo"
 stewardship_domain.1041.a.failure.tt: "As guildas em [guild_county.GetNameNoTier] não conseguiram chegar a um consenso sobre como lidar com a produção de ferro"
 stewardship_domain.1041.b: "Apenas os ferreiros podem distinguir um bom ferro de um ruim..."
 stewardship_domain.1041.b.flavor: "e a guilda dos ferreiros fornecerá armas gratuitamente para minhas levas!"
 stewardship_domain.1041.c: "O comércio é claramente o domínio dos mercadores..."
 stewardship_domain.1041.c.flavor: "e a Guilda dos Mercadores me dará uma parte de seus lucros!"
 stewardship_domain.1041.d: "[guild_county.GetNameNoTierNoTooltip] é #EMP minha#!! Somente eu controlo o comércio lá!"
 #Domineering Guild, by Sean Hughes
 stewardship_domain.1042.t: "Guilda Dominante"
 stewardship_domain.1042.desc: "A [guild_county.Custom('Governance_1041_GuildType')] em [guild_county.GetName] desenvolveu um controle absoluto sobre a venda de ferro lá.\n\nAgora, eles estão usando seu poder para cobrar preços exorbitantes por seus produtos, enriquecendo os mestres da guilda, mas afastando o comércio do condado."
 stewardship_domain.1042.a: "Negociar com eles para reduzir seus preços."
 stewardship_domain.1042.a.success: "Eu faço com que a [guild_county.Custom('Governance_1041_GuildType')] reduza seus preços"
 stewardship_domain.1042.a.failure: "A [guild_county.Custom('Governance_1041_GuildType')] se recusa a reduzir seus preços"
 stewardship_domain.1042.b: "Contanto que eles paguem os impostos adequados..."
 stewardship_domain.1042.c: "Se eles não jogarem limpo, não jogarão de jeito nenhum!"
 #Granary Infestation, by Sean Hughes
 stewardship_domain.1052.t: "Infestação nos Celeiros"
 stewardship_domain.1052.desc: "Pragas infestaram vários celeiros em [target_county.GetName], destruindo o grão armazenado neles. Sem nada para plantar para as colheitas do próximo ano, os camponeses livres que vivem lá vieram me pedir ajuda.\n\nDada a situação desesperadora deles, esses agricultores acabarão sendo forçados a aceitar qualquer termo que eu ofereça."
 stewardship_domain.1052.a: "Tenho bastante grão, caso eles se tornem meus servos..."
 stewardship_domain.1052.b: "Tenha compaixão por eles e abra meus armazéns de grãos."
 stewardship_domain.1052.c: "Ordene aos [ROOT.Char.Custom('DefaultPriestTitlePlural')] que lhes deem caridade."
 stewardship_domain.1052.d: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('almoner'))] distribuirá grãos para eles."
 #Corrupt Tax Collector, by Sean Hughes
 stewardship_domain.1053.t: "Cobrador de Impostos Corrupto"
 stewardship_domain.1053.desc: "Notei várias inconsistências e omissões nos registros de impostos de [target_county.GetNameNoTier]. Está claro que esses erros não podem ser simples enganos - alguém tem desviado fundos!\n\nInfelizmente, o rastro desse misterioso culpado é irregular o suficiente para que seja difícil para mim determinar exatamente qual cobrador de impostos é responsável."
 stewardship_domain.1053.a: "Investigar o assunto discretamente..."
 stewardship_domain.1053.a.success: "Descubro o culpado e o levo à justiça"
 stewardship_domain.1053.a.failure: "O culpado continua a me evitar"
 stewardship_domain.1053.c: "Assumir controle direto sobre a cobrança de impostos em [target_county.GetNameNoTierNoTooltip]."
 stewardship_domain.1053.d: "Execute todos eles e traga novos cobradores!"
 #Culture Clash, by Sean Hughes
 stewardship_domain.1073.t: "Choque Cultural"
 stewardship_domain.1073.desc: "A maioria dos camponeses que vivem em [target_county.GetName] tem ascendência [target_ruler.GetCulture.GetName]. Orgulhosos de suas tradições, não lhes agrada ter de servir a alguém de fora como eu quando meu vizinh[target_ruler.Custom('ES_OA')] [target_ruler.GetTitledFirstName|l] compartilha sua cultura e história."
 stewardship_domain.1073.a: "Ensine-lhes a superioridade da cultura [me.GetCulture.GetNameNoTooltip]!"
 stewardship_domain.1073.a.success: "Os camponeses adotam os costumes da cultura [me.GetCulture.GetNameNoTooltip]"
 stewardship_domain.1073.a.failure: "Os camponeses se recusam a ser civilizados"
 stewardship_domain.1073.c: "Não me importo se eles mantêm suas tradições estranhas."
 stewardship_domain.1073.c.warning: "Velocidade de Promoção Cultural: #N -75%#!"
 stewardship_domain.1073.d: "Os sentimentos dos camponeses são irrelevantes - eu sou o governante deles."
 #Reduce revolt risk by being diligent, by Linnéa Thimrén
 stewardship_domain.5031.t: "Um Condado em Necessidade"
 stewardship_domain.5031.desc: "Estes são tempos tumultuados para [county.GetName]. Relatórios atrás de relatórios chegam detalhando o estado precário das coisas na área, e os camponeses começaram a murmurar sobre #EMP soluções alternativas#!..."
 stewardship_domain.5031.a: "Lidar pessoalmente com os problemas."
 stewardship_domain.5031.b: "Aumentar os impostos como punição."
 #Marshland Clearing, by Petter Vilberg
 stewardship_domain.6001.t: "Drenagem"
 stewardship_domain.6001.desc: "Hace algunos meses, [baron.Custom('ES_ElLa')] [baron.GetTitledFirstName|l] comenzó un extenso trabajo para drenar las marismas de [barony.GetNameNoTier] y hacerlas habitables. Arados pesados y nuevas zanjas reafirman el terreno, pero es un trabajo lento.\n\n[baron.GetFirstName] acaba de escribir a mi [steward.GetCouncilTitle|l] para solicitar que se reduzca su obligación de aportar levas. Al contrario, al estar ansios[baron.Custom('ES_OA')] por terminar los trabajos, espera reclutar soldados para la tarea."
 stewardship_domain.6001.a: "Leve quantos camponeses precisar, [baron.GetFirstNameNoTooltip]!"
 stewardship_domain.6001.b: "A totalidade de [county.GetNameNoTierNoTooltip] se daria bem com isso."
 stewardship_domain.6001.c: "Não, os campos de batalha precisarão de muitos corpos este ano!"
 #Forest Clearing, by Petter Vilberg
 stewardship_domain.6002.t: "Desmatamento"
 stewardship_domain.6002.desc: "Hace algunos meses, [baron.GetTitledFirstName|l] empezó a despejar tierras en los bosques de [barony.GetNameNoTier] para hacerlas habitables. Se arrancan árboles de raíz, se despejan caminos y el terreno se llena de surcos.\n\n[baron.GetFirstName] acaba de escribir a mi [steward.GetCouncilTitle] [steward.GetFirstName] para solicitar que se reduzca su obligación de aportar levas. Ansios[baron.Custom('ES_OA')] por terminar los trabajos antes de la siguiente cosecha, espera reclutar soldados para la tarea."
 #Haggle with Masons, by Petter Vilberg
 stewardship_domain.6011.t: "Negociações com Pedreiros"
 stewardship_domain.6011.desc: "Uma guilda de pedreiros estabeleceu-se em [county.GetName]. Ter artesãos dedicados ao meu serviço pessoal pode ajudar a região a prosperar."
 stewardship_domain.6011.a: "Vou fazer um acordo com o mestre pedreiro."
 stewardship_domain_6011_great_deal: "Um Grande Acordo"
 stewardship_domain.6011.offer_tt: "Me oferecem:"
 stewardship_domain_6011_fair_deal: "Um Acordo Justo"
 stewardship_domain_6011_bad_deal: "Um Acordo Desfavorável"
 stewardship_domain.6011.b: "[steward.GetTitledFirstNameNoTooltip], conquiste a lealdade deles para mim!"
 stewardship_domain.6011.c: "Por que eu precisaria da ajuda deles, quando tenho servos?"
 stewardship_domain.6012.desc: "O líder dos pedreiros parecia relutante em fazer qualquer tipo de acordo em nome da guilda, até que eu apontei exatamente o quanto isso nos beneficiaria a ambos."
 stewardship_domain.6012.a: "Eu nem precisei recorrer a ameaças de violência!"
 stewardship_domain.6013.desc: "Depois de uma longa audiência, o mestre pedreiro não cederá mais.\n\n\"Por um preço mais baixo do que este, não é possível fazer.\""
 stewardship_domain.6013.a: "\"Então temos um acordo.\""
 stewardship_domain.6013.b: "Certamente posso encontrar pedreiros mais baratos em outro lugar."
 stewardship_domain.6014.desc: ""Você insulta a mim e a toda a minha profissão, [ROOT.Char.Custom('FormOfAddressForLiege')]!". O chefe de pedreiros não está nada contente com as ofertas que estou disposto a fazer. "Na verdade, os preços estão subindo. Simplesmente o custo da mão de obra, é claro. Tenho certeza de que [ROOT.Char.GetTitleTierName] entende"."
 stewardship_domain.6014.a: "\"Eu entendo perfeitamente.\""
 stewardship_domain.6014.b: "O [county.GetTierAsNameNoTooltip|l] me serve, e as guildas também!"
 stewardship_domain.6015.desc: "O chefe dos pedreiros deve ter apreciado a companhia de meu [steward.GetCouncilTitle] [steward.GetTitledFirstName|l], já que traz uma oferta que supera minhas exigências."
 stewardship_domain.6015.a: "Mal eu poderia ter negociado melhor eu mesmo!"
 stewardship_domain.6016.desc: "[steward.GetTitledFirstName] retornou até mim com uma oferta da guilda de pedreiros.\n\n"Examinei seus registros, meu [ROOT.Char.Custom('ES_SennorSennora')]. Não acredito que se possa conseguir um acordo melhor"."
 stewardship_domain.6016.a: "Isso parece muito bom."
 stewardship_domain.6016.b: "Então eu fui um tolo por te enviar, [steward.GetFirstNameNoTooltip]!"
 stewardship_domain.6017.desc: ""As negociações não foram… exatamente como tínhamos planejado, meu [ROOT.Char.Custom('ES_SennorSennora')]". Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('steward'))] parece se desculpar. "Mas eu tenho uma oferta, mesmo que a guilda dos pedreiros se recuse a falar comigo novamente"."
 stewardship_domain.6017.a: "Eu tenho que me conformar com o que meus servos conseguem realizar."
 stewardship_domain.6017.b: "Então eu falarei com eles! Eu os ordenarei!"
 ##################
 #Special Events #
 ##################
 #Bad harvest, by Linnéa Thimrén and Sean Hughes
 stewardship_domain_special.1001.t: "Colheita em [development_county.GetNameNoTier]"
 stewardship_domain_special.1001.desc: "Estes são tempos difíceis, e as terras de [county_holder.Custom2('MyCharacterIntroduction', ROOT.Char)] em [development_county.GetNameNoTier] sofreram mais do que a maioria.\n\nRelatório após relatório é trazido diante de mim detalhando a má colheita, e começo a me perguntar se receberei minha parte dos impostos deles este ano..."
 stewardship_domain_special.1001.a: "Investigar os problemas do condado."
 stewardship_domain_special.1001.a.tt: "O destino de [development_county.GetNameNoTier] estará em minhas mãos..."
 stewardship_domain_special.1001.b: "Reivindicar meus devidos impostos pela força!"
 stewardship_domain_special.1001.c: "Isso é responsabilidade d [county_holder.GetFirstNameNoTooltip], não minha."
 stewardship_domain_special.1002.desc: "Aparentemente, [development_county.GetName] foi vítima de má gestão. As terras não foram adequadamente limpas, as sementes foram plantadas fora de época e os pastos foram superpastejados."
 stewardship_domain_special.1002.desc.repentant: "\n\nTenho diante de mim um[county_holder.Custom('ES_XA')] arrependid[county_holder.Custom('ES_OA')] [county_holder.GetTitledFirstName|l], que torce as mãos. “Por favor, [ROOT.Char.Custom2('RelationToMeAddress', county_holder)], me deem outra chance! Eu posso consertar isso, eu juro!”."
 stewardship_domain_special.1002.desc.uncaring: "\n\nTenho diante de mim um[county_holder.Custom('ES_XA')] [county_holder.GetTitledFirstName|l] de aparência entediada, aparentemente despreocupad[county_holder.Custom('ES_OA')]. "No fim, os camponeses acabarão resolvendo isso. Sempre resolvem. Esse é o trabalho deles, não é?"."
 stewardship_domain_special.1002.desc.blaming: "\n\nTenho diante de mim um[county_holder.Custom('ES_XA')] frustrad[county_holder.Custom('ES_OA')] [county_holder.GetTitledFirstName|l], claramente estressad[county_holder.Custom('ES_OA')]. "Como puderam estragar isso tão feio os camponeses? Eles são cavadores da terra! É só isso que fazem!"."
 stewardship_domain_special.1002.a: "Responsabilizo você por isso, [county_holder.GetFirstNameNoTooltip]."
 stewardship_domain_special.1002.a.success: "[county_holder.GetTitledFirstName] e eu aprendemos com os erros"
 stewardship_domain_special.1002.a.failure: "[county_holder.GetTitledFirstName] não consegue resolver os problemas em [development_county.GetNameNoTier]"
 stewardship_domain_special.1002.b: "Eu mesmo vou consertar isso, custe o que custar!"
 stewardship_domain_special.1002.b.success: "Conserto com sucesso os problemas em [development_county.GetNameNoTier]"
 stewardship_domain_special.1002.b.failure: "Não consigo resolver os problemas em [development_county.GetNameNoTier]"
 stewardship_domain_special.1002.c: "Você perdeu sua reivindicação sobre [development_county.GetNameNoTierNoTooltip]!"
 stewardship_domain_special.1002.c.tt: "Eu retiro [development_county.GetName] d [county_holder.GetTitledFirstName|l]"
 stewardship_domain_special.1003.desc: "Obrigado por acreditar em mim, [ROOT.Char.Custom2('RelationToMeAddress', county_holder)]!".\n\n[county_holder.Custom2('MyCharacterIntroduction', ROOT.Char)|U] conseguiu resolver a crise em que se encontrou. Às vezes, a melhor atitude é confiar nas habilidades dos outros e aprender com eles!"
 stewardship_domain_special.1003.a: "Conte-me tudo sobre como você fez isso!"
 stewardship_domain_special.1004.desc: "Os relatórios de [development_county.GetName] só se tornam cada vez mais desastrosos e logo fica evidente que [county_holder.GetTitledFirstName|l] só piorou a situação."
 stewardship_domain_special.1004.a: "Que tipo de [county_holder.GetTitleTierName] é?!"
 stewardship_domain_special.1005.desc: "Enquanto observo [development_county.GetName] prosperar sob minha orientação, não consigo deixar de sentir orgulho do que conquistei. Se envolver ocasionalmente em tarefas de menor importância é uma boa maneira de aprender!"
 stewardship_domain_special.1005.a: "Este conhecimento será realmente útil!"
 stewardship_domain_special.1006.desc: "Não importa o que eu tente, [development_county.GetName] não consegue encontrar nenhum alívio. Não está tão mal quanto antes, mas estou perdido em relação a como resolver as tarefas restantes diante de mim."
 stewardship_domain_special.1006.a: "Bem, nem sempre posso ter sucesso..."
 #Charter fair, by Linnéa Thimrén
 stewardship_domain_special.1101.t: "Feira em [county.GetNameNoTierNoTooltip|U]"
 stewardship_domain_special.1101.desc: "Em [county.GetName] há um campo que seria perfeito para uma grande feira anual.\n\nDois nobres locais, [local_baron.GetTitledFirstName|l] e [second_local_baron.GetTitledFirstName|l], me solicitam o privilégio de celebrar tal feira em meu nome."
 stewardship_domain_special.1101.a: "O alvará será concedido ao [second_barony.Custom('BaronyTownType')] em [second_barony.GetNameNoTierNoTooltip]."
 stewardship_domain_special.1101.all_goes_well: "Se tudo correr bem:"
 stewardship_domain_special.1101.b: "O [local_baron.GetFaith.HouseOfWorship] em [barony.GetNameNoTierNoTooltip] receberá o alvará."
 stewardship_domain_special.1101.c: "Use o campo para pastagem em vez disso."
 stewardship_domain_special.1102.desc: "[second_local_baron.Custom('ES_ElLa')|U] [second_local_baron.GetTitledFirstName] me apresenta mercadorias de todo o mundo; tecidos dos confins mais distantes da Rota da Seda, cultivos locais, maravilhas tecnológicas do Oriente…\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], quais mercadorias devemos promover para a nova feira?"."
 stewardship_domain_special.1102.a: "Importaremos o máximo de seda que pudermos!"
 stewardship_domain_special.1102.a.tt: "As pessoas apreciarão mais isso se a região estiver estável e próspera"
 stewardship_domain_special.1102.b: "Vamos focar nas colheitas cultivadas localmente!"
 stewardship_domain_special.1102.b.tt: "As pessoas apreciarão mais isso se a região estiver em turbulência"
 stewardship_domain_special.1102.c: "As maravilhas tecnológicas estarão em destaque!"
 stewardship_domain_special.1102.c.tt: "As pessoas apreciarão mais isso se o nível de desenvolvimento na área for baixo"
 stewardship_domain_special.1103.desc_silk: "Belos tecidos de seda para atrair as pessoas abastadas de [county.GetNameNoTier] para o mercado, com os camponeses não muito atrás — foi uma semana de celebração e comércio!"
 stewardship_domain_special.1103.desc_crops: "Abundância de alimentos para atrair os camponeses para o mercado e mercadorias de primeira classe em todas as barracas os mantiveram voltando — foi uma semana de celebração e comércio!"
 stewardship_domain_special.1103.desc_technology: "Maravilhas tecnológicas que fascinam o povo, e mercadorias de primeira classe em todas as barracas — foi uma semana de celebração e comércio!"
 stewardship_domain_special.1103.a: "Você tem minha permissão para fazer isso anualmente a partir de agora."
 stewardship_domain_special.1104.desc_silk: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], o que devemos fazer com toda esta seda?".\n\nAparentemente, a demanda por seda não era muito alta na região e[second_local_baron.Custom('ES_AlAla')] [second_local_baron.GetTitledFirstName|l] ficou com um monte desse tecido caro sem vender."
 stewardship_domain_special.1104.desc_crops: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], as colheitas estão estragando e criando mofo, o que devemos fazer com tudo isso?".\n\nAo que parece, a demanda por colheitas locais não era tão alta nesta região, e [second_local_baron.Custom('ES_AlAla')] [second_local_baron.GetTitledFirstName|l] ficou com um monte sem vender."
 stewardship_domain_special.1104.desc_technology: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], o que fazemos com esses cacarecos?".\n\nAo que parece, a demanda por uma tecnologia tão maravilhosa não era tão alta nesta região, e [second_local_baron.Custom('ES_AlAla')] [second_local_baron.GetTitledFirstName|l] lhe restou um monte sem vender."
 stewardship_domain_special.1104.a: "Um começo tumultuado, mas tenho certeza de que os locais podem lidar com isso agora!"
 stewardship_domain_special.1105.desc: "[local_baron.Custom('ES_ElLa')|U] [local_baron.GetTitledFirstName|l] me apresenta mercadorias de todo o mundo; objetos religiosos de cidades sagradas, alimentos cultivados por [local_baron.GetFaith.DevoteeMalePlural] e [local_baron.GetFaith.DevoteeFemalePlural] da região, maravilhas de religiões estrangeiras…\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], que mercadorias devemos promover para a nova feira?"."
 stewardship_domain_special.1105.a: "Vamos honrar os santos locais ao focar em objetos religiosos!"
 stewardship_domain_special.1105.a.tt: "As pessoas apreciarão mais isso se o fervor religioso delas for forte"
 stewardship_domain_special.1105.b: "Traga o máximo de alimentos possível!"
 stewardship_domain_special.1105.b.tt: "As pessoas apreciarão mais isso se a região estiver precisando de apoio"
 stewardship_domain_special.1105.c: "Se mostrarmos outras religiões, elas perderão sua novidade!"
 stewardship_domain_special.1105.c.tt: "As pessoas apreciarão mais isso se o fervor religioso delas for fraco"
 stewardship_domain_special.1106.desc_religious_objects: "Objetos religiosos de cidades sagradas para fascinar e cativar as pessoas, e mercadorias de primeira classe em todas as barracas — foi uma semana de celebração piedosa e comércio!"
 stewardship_domain_special.1106.desc_religious_food: "Os alimentos fornecidos pelos devotos do [local_baron.GetFaith.DevoteeMalePlural] e [local_baron.GetFaith.DevoteeFemalePlural] da área venderam quase melhor do que qualquer outra coisa na feira — foi uma semana de celebração piedosa e comércio!"
 stewardship_domain_special.1106.desc_religious_other: "Diante de religiões estrangeiras, as pessoas de [county.GetNameNoTier] rezaram e apreciaram sua comunidade mais do que o habitual — foi uma semana de celebração piedosa e comércio!"
 stewardship_domain_special.1106.a: "Você tem minha permissão para fazer isso anualmente a partir de agora."
 stewardship_domain_special.1107.desc_religious_objects: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], o que devemos fazer com estes bibelôs sagrados?".\n\nAo que parece, os objetos sagrados não atraíram os piedosos na medida em que eu esperava e [local_baron.Custom('ES_AlAla')] [local_baron.GetTitledFirstName|l] sobraram-lhe muitos sem vender."
 stewardship_domain_special.1107.desc_religious_food: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], o que fazemos com toda esta comida?".\n\nAo que parece, a comida preparada por [local_baron.GetFaith.DevoteeMalePlural] e [local_baron.GetFaith.DevoteeFemalePlural] da região teria se beneficiado de uma intervenção divina… quase nada foi vendido."
 stewardship_domain_special.1107.desc_religious_other: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], o que devemos fazer com estes tralhas blasfemos?".\n\nOs objetos estrangeiros apenas repeliram o público… e os desencorajaram a visitar o mercado. Logo é instruído a [local_baron.Custom('ES_AlAla')] [local_baron.GetTitledFirstName|l] que os queime, mas o dano já foi feito."
 stewardship_domain_special.1107.a: "Um começo tumultuado, mas tenho certeza de que os locais podem lidar com isso agora!"
 #Building a Road chain, by Petter Vilberg
 stewardship_domain_special.1301.increase_road_progress_1: "#V O Progresso da Estrada#! aumenta em #P 1#!"
 stewardship_domain_special.1301.increase_road_progress_2: "#V O Progresso da Estrada#! aumenta em #P 2#!"
 stewardship_domain_special.1301.increase_road_quality_1: "#V A Qualidade da Estrada#! aumenta em #P 1#!"
 stewardship_domain_special.1301.increase_road_quality_2: "#V A Qualidade da Estrada#! aumenta em #P 2#!"
 stewardship_domain_special.1301.decrease_road_quality_1: "#V A Qualidade da Estrada#! diminui em #N 1#!"
 stewardship_domain_special.1301.t: "A Estrada"
 stewardship_domain_special.1301.steward_opening: "Meu [ROOT.Char.GetCouncillorPosition( 'councillor_steward' ).GetPositionName|l], [steward.Custom('ES_ElLa')] [steward.GetTitledFirstName|l], me informa de"
 stewardship_domain_special.1301.no_steward_opening: "Meus prefeitos informam-me"
 stewardship_domain_special.1301.desc: "há uma necessidade desesperada de uma nova estrada que atravesse [project_county.GetName]. Muitos dos antigos caminhos estão em ruínas e até são perigosos!\n\nUm[peasant_leader.Custom('ES_XA')] plebeu[peasant_leader.Custom('ES_OA')] de nome [peasant_leader.GetTitledFirstName|l] foi colocado à frente como líder natural do esforço de construção."
 stewardship_domain_special.1301.a: "Faça acontecer."
 stewardship_domain_special.1301.a.peasant_leader_tt: "O projeto começa, supervisionado por [peasant_leader.GetTitledFirstName|l]"
 stewardship_domain_special.1301.b: "Meu administrador[steward.Custom('ES_XA')] cuidará disso."
 stewardship_domain_special.1301.a.steward_tt: "O projeto começa, supervisionado por [steward.GetTitledFirstName|l]"
 stewardship_domain_special.1301.c: "Aquelas estradas eram boas o suficiente para nossos ancestrais!"
 stewardship_domain_special.1301.c.tt: "Elas são boas o suficiente para nós também!"
 stewardship_domain_special.1311.t: "A Estrada: Um Feudo Distante"
 stewardship_domain_special.1311.desc: "O trabalho na estrada em [project_county.GetNameNoTier] está progredindo, mas o trecho de terra atualmente sendo preparado vai além de uma colina, distante das vilas de ambos os lados.\n\nAmbas as vilas estão relutantes em fornecer trabalhadores, e há incerteza sobre quem realmente possui o feudo além da colina!"
 stewardship_domain_special.1311.a: "Então pegamos trabalhadores de ambas as vilas."
 stewardship_domain_special.1311.b: "Pagarei pelo trabalho lá eu mesmo."
 stewardship_domain_special.1311.c: "Se há incerteza, o feudo reverterá para mim!"
 stewardship_domain_special.1312.t: "A Estrada: Uso Regular"
 stewardship_domain_special.1312.desc: "Mesmo antes de ficar pronta, os mercadores já começaram a viajar pela nova estrada em [project_county.GetNameNoTier].\n\n[project_leader.GetTitledFirstName|l] sugere que aqueles que a usarem devem contribuir para sua construção."
 stewardship_domain_special.1312.a: "Ou eles podem contribuir para os meus cofres."
 stewardship_domain_special.1312.b: "Que ideia original... eu gosto disso!"
 stewardship_domain_special.1313.t: "A Estrada: Salteadores"
 stewardship_domain_special.1313.desc: "Mesmo uma estrada inacabada tem salteadores, parece. [project_leader.GetTitledFirstName|l] está com problemas de suprimentos que nunca chegam e trabalhadores que têm medo de deixar suas vilas. Com essa taxa, a estrada em [project_county.GetNameNoTier] nunca será concluída."
 stewardship_domain_special.1313.a: "Poste guardas ao longo da estrada."
 stewardship_domain_special.1313.b: "Não me importo. #EMP Termine. Minha. Estrada.#!"
 stewardship_domain_special.1314.t: "A Estrada: Botas de Marcha"
 stewardship_domain_special.1314.war: "Com a guerra em andamento, as tropas estão usando as partes concluídas da estrada em [project_county.GetNameNoTier] para acelerar sua marcha."
 stewardship_domain_special.1314.end: "\n\nJá desgastada e danificada, [project_leader.GetTitledFirstName|l] afirma que os trabalhadores terão que voltar para reforçá-la antes que esteja concluída."
 stewardship_domain_special.1314.a: "Não vale o esforço."
 stewardship_domain_special.1314.b: "Infelizmente, mas necessário."
 stewardship_domain_special.1315.t: "A Estrada: Botas de Marcha"
 stewardship_domain_special.1315.end: "\n\nFelizmente, o uso intenso é exatamente o que é necessário para firmar o terreno! Com um pouco de sorte, a maioria das tropas pode voltar marchando também."
 stewardship_domain_special.1315.a: "Envie-os para a linha de frente!"
 stewardship_domain_special.1315.b: "Marcharão como lhes ordenar [project_leader.Custom('ES_ElLa')][project_leader.GetTitledFirstNameNoTooltip|l]."
 stewardship_domain_special.1316.t: "A Estrada: Melhoria Encomendada"
 stewardship_domain_special.1316.desc: "Ao encontrar as partes já concluídas da nova estrada imensamente benéficas, a guilda de comerciantes em [project_county.GetNameNoTier] fez uma doação para expandir a estrada ainda mais."
 stewardship_domain_special.1316.a: "Isso ajudará a estrada."
 stewardship_domain_special.1316.b: "Isso ajudará meus bolsos."
 stewardship_domain_special.1317.t: "A Estrada: Uma Taverna"
 stewardship_domain_special.1317.desc: "A construção da estrada em [project_county.GetNameNoTier] sofreu um atraso. [project_leader.GetTitledFirstName|l] relata que os trabalhadores foram convencidos por um aspirante a dono de uma pousada. Para acalmar suas almas e a de outros viajantes, eles estão construindo uma taverna à beira da estrada."
 stewardship_domain_special.1317.a: "De propriedade da coroa, é claro."
 stewardship_domain_special.1317.b: "Faça-os voltar para a estrada!"
 stewardship_domain_special.1318.t: "A Estrada: Progresso"
 stewardship_domain_special.1318.desc: "Segundo [project_leader.Custom('ES_ElLa')] [project_leader.GetTitledFirstName|l], o trabalho na estrada em [project_county.GetNameNoTier] está indo bem.\n\n“O terreno é mais firme e os trechos mais planos do que esperávamos, [ROOT.Char.Custom('FormOfAddressForLiege')]”."
 stewardship_domain_special.1318.a: "Expanda ainda mais a estrada!"
 stewardship_domain_special.1318.b: "As coisas estão indo exatamente como eu quero."
 stewardship_domain_special.1318.c: "Uma oportunidade perfeita para reduzir custos!"
 stewardship_domain_special.1319.t: "A Estrada: Ética de Trabalho"
 stewardship_domain_special.1319.desc: "Meu administrador[steward.Custom('ES_XA')] parece quase chocad[steward.Custom('ES_OA')]. "Tenho estado inspecionando a construção da estrada em [project_county.GetNameNoTier], e os trabalhadores camponeses são muito mais eficientes do que eu esperava… até eu poderia aprender uma coisa ou duas com eles"."
 stewardship_domain_special.1319.a: "Podemos usar esse conhecimento em outro lugar?"
 stewardship_domain_special.1319.b: "Aprender com camponeses? A própria ideia é abominável."
 stewardship_domain_special.1320.t: "A estrada: a experiência de [peasant_leader.GetTitledFirstNameNoTooltip|l]"
 stewardship_domain_special.1320.desc: "Não é frequente que um plebeu se dirija diretamente a mim, mas [peasant_leader.GetTitledFirstName|l] me informa sobre os trabalhos de construção em [project_county.GetNameNoTier].\n\n"O plano para a estrada era passar por este campo, Vossa Senhoria, mas eu conheço o tipo de solo com o qual estamos lidando. Poderia, da minha \"plebeidade\", solicitar que a desviemos para a floresta próxima?"."
 stewardship_domain_special.1320.a: "Confio no seu julgamento."
 stewardship_domain_special.1320.b: "É muito longe e muito caro. Faremos como planejei."
 stewardship_domain_special.1321.t: "A Estrada: Falta de Expertise"
 stewardship_domain_special.1321.desc: "«Sigo diciéndole que vaya directamente a través del campo, ¡pero [peasant_leader.GetTitledFirstName|l] insiste en desviarla por el bosque cercano!» [steward.GetTitledFirstName|l] está visiblemente disgustad[steward.Custom('ES_OA')] con el trabajo de [project_county.GetNameNoTier] en la carretera.\n\nSin embargo, [peasant_leader.GetTitledFirstName|l] insiste en su estrategia. «¡El suelo del campo es desigual y no lo suficientemente denso, mi [ROOT.Char.Custom('ES_SennorSennora')]! El bosque es una ruta mucho mejor»."
 stewardship_domain_special.1321.a: "Ouça seus superiores, campones[peasant_leader.Custom('ES_OA')]!"
 stewardship_domain_special.1321.b: "[peasant_leader.Custom('ES_ElLa')|U] [peasant_leader.GetTitledFirstNameNoTooltip|l] parece que sabe o que faz…"
 stewardship_domain_special.1391.t: "A Estrada: Liderança Ausente"
 stewardship_domain_special.1391.desc: "Com [project_leader.GetTitledFirstName|l] fora, o trabalho na estrada em [project_county.GetNameNoTier] carece de uma direção clara. Se isso for concluído algum dia, alguém mais precisará ser colocado no comando."
 stewardship_domain_special.1391.a: "[peasant_leader.Custom('ES_ElLa')|U] [peasant_leader.GetTitledFirstNameNoTooltip] parece uma substituição competente."
 stewardship_domain_special.1391.b: "É hora de que [steward.Custom('ES_ElLa')] [steward.GetTitledFirstNameNoTooltip|l] assuma o comando."
 stewardship_domain_special.1392.t: "A Estrada: Cortando Perdas"
 stewardship_domain_special.1392.desc: "Com a perda de [project_county.GetName], terminar a estrada lá não seria muito benéfico para mim. Pelo menos os impostos arrecadados para o projeto estão em meu tesouro, em vez de serem desperdiçados na estrada."
 stewardship_domain_special.1392.a: "Nada está completamente perdido."
 stewardship_domain_special.1396.t: "O Fim da Estrada"
 stewardship_domain_special.1396.desc: "A estrada em [project_county.GetNameNoTier] finalmente está completa.\n\n\"É... bastante funcional\", [project_leader.GetTitledFirstName|l] me diz."
 stewardship_domain_special.1396.a: "Uma estrada não precisa ser luxuosa. Ela é boa o suficiente."
 stewardship_domain_special.1397.desc: "A rede de estradas em [project_county.GetNameNoTier] finalmente está completa.\n\n\"Isso levará as pessoas para onde precisam ir por décadas\", [project_leader.GetTitledFirstName|l] me diz."
 stewardship_domain_special.1397.a: "Mal posso esperar para colher os benefícios!"
 stewardship_domain_special.1397.b: "[peasant_leader.GetTitledFirstNameNoTooltip]! Tenho mais trabalho para você!"
 stewardship_domain_special.1398.desc: "A rede de estradas em [project_county.GetNameNoTier] finalmente está completa.\n\n\"Essas estradas serão as veias pulsantes do condado por gerações!\", [project_leader.GetTitledFirstName|l] anuncia com muito orgulho."
 stewardship_domain_special.1398.a: "Mal posso esperar para colher os benefícios!"
 stewardship_domain_special.1398.b: "[peasant_leader.GetTitledFirstNameNoTooltip]! Tenho mais trabalho para você!"
 stewardship_domain_special.1399.desc: "A rede de estradas que atravessa [project_county.GetNameNoTier] finalmente está concluída.\n\n"Talvez sejam as melhores estradas de todo o senhorio, minha [ROOT.Char.Custom('ES_SennorSennora')]!", proclama orgulhosamente [project_leader.GetTitledFirstName|l]."
 stewardship_domain_special.1399.a: "Mal posso esperar para colher os benefícios!"
 stewardship_domain_special.1399.b: "[peasant_leader.GetTitledFirstNameNoTooltip]! Tenho mais trabalho para você!"
 #A Missing Village, by Petter Vilberg
 stewardship_domain_special.1401.t: "Uma Vila Desaparecida"
 stewardship_domain_special.1401.desc: "Apenas com uma vela acesa, meu dedo pausa em uma entrada no livro-razão. Algo não está certo... Logo estou procurando por todos os registros de [county.GetName] que consigo encontrar.\n\nFinalmente, fica claro como o dia. Parece que uma vila inteira desapareceu dos registros de tributação!"
 stewardship_domain_special.1401.a: "O coletor de impostos em [county.GetNameNoTierNoTooltip] deve investigar!"
 stewardship_domain_special.1401.a.tt: "O coletor liderará a investigação"
 stewardship_domain_special.1401.b: "Eu irei pessoalmente à vila."
 stewardship_domain_special.1401.b.tt: "Eu lidero a investigação pessoalmente"
 stewardship_domain_special.1401.c: "Vilas desaparecem o tempo todo, não ligue para isso."
 stewardship_domain_special.1411.desc: "[collector.Custom('ES_ElLa')|U] [collector.GetTitledFirstName|l], coletor de impostos[collector.Custom('ES_XA')] de [county.GetName], fez grandes esforços para me convencer de como era importante que eu viesse ver pessoalmente a aldeia "desaparecida".\n\nApós dias de viagem, finalmente chego à aldeia. Parece apenas mais um pedaço de terra lamacento de um assentamento. No entanto, [collector.Custom('ES_ElLa')] [collector.GetTitledFirstName|l] insiste. "[ROOT.Char.Custom('FormOfAddressForLiege')|U], permiti-me mostrar-lhe este lugar, eu vos imploro. Esta é minha casa"."
 stewardship_domain_special.1411.a: "Muito bem, me mostre ao redor."
 stewardship_domain_special.1411.a.tt: "[collector.GetTitledFirstName] me mostra sua vila"
 stewardship_domain_special.1411.b: "Você já desperdiçou muito do meu tempo!"
 stewardship_domain_special.1411.b.tt: "Por que eu sequer vim aqui!?"
 stewardship_domain_special.1412.desc: "Ahora que los pies de [collector.GetTitledFirstName|l] cuelgan sobre el prado comunal, me dispongo a marcharme con mis guardias. Acabamos de dejar atrás los primeros edificios cuando una chica sale corriendo al lado de mi caballo.\n\n«Oh, queridísim[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLadyLord], ¿qué será de nosotros? Nadie puede pagar la multa que nos habéis impuesto»."
 stewardship_domain_special.1412.a: "O coletor do próximo ano resolverá sua dívida."
 stewardship_domain_special.1412.b: "Estou cobrando sua dívida integralmente. Agora."
 stewardship_domain_special.1412.b.flavor: "Apreenda tudo o que for valioso e queime o restante!"
 stewardship_domain_special.1413.desc: "Quando [collector.GetTitledFirstName|l] me mostra os arredores da aldeia, tudo o que vejo são vacas magras, galinhas ciscando na terra e camponeses voltando dos campos com pouca carga. Quando comento sobre isso, [collector.GetSheHe] apresenta seu argumento.\n\n“Essas pessoas mal conseguem alimentar o gado. Se eu exigir mais deles, eles morrerão de fome.”"
 stewardship_domain_special.1413.a: "Acho que posso conceder uma isenção fiscal..."
 stewardship_domain_special.1413.b: "Mesmo sob as circunstâncias, eles devem pagar."
 stewardship_domain_special.1413.c: "Isso é o que você queria me mostrar? Traição!"
 stewardship_domain_special.1413.c.tt: "Eu decidirei como lidar com a vila"
 stewardship_domain_special.1414.desc: "A vila ainda está fumegando quando eu e meus guardas partimos.\n\nÀs vezes, o antigo deve ser purificado para dar lugar ao novo."
 stewardship_domain_special.1414.a: "Há muitas maneiras de governar."
 stewardship_domain_special.1421.collector_opening: "O coletor de impostos enviado para inspecionar a vila desaparecida nunca retornou. Sob forte guarda, decido investigar por conta própria e finalmente descubro por que isso aconteceu..."
 stewardship_domain_special.1421.self_opening: "Ao chegar à vila acompanhado por meus guardas, descubro finalmente por que os moradores pararam de pagar seus impostos."
 stewardship_domain_special.1421.desc: "\n\nTodas as casas estão abandonadas e em ruínas. Não há vestígio de ninguém, nem mesmo do meu coletor.\n\nUma sensação crescente de pavor se apodera de mim enquanto meus guardas vasculham as casas silenciosas, logo se transformando em pânico quando um deles grita de repente."
 stewardship_domain_special.1421.a: "O que vocês encontraram!?!"
 stewardship_domain_special.1421.a.tt: "Pode haver qualquer coisa aqui"
 stewardship_domain_special.1421.b: "Nós vamos embora. Agora."
 stewardship_domain_special.1422.desc: "O guarda aos gritos sai por uma porta apodrecida com uma criança sob um dos braços. Um/uma [foundling.Custom('GirlBoy')] tentava se esconder no fundo da casa.\n\nEmbora eu exija respostas, a criança não diz nada sobre o que aconteceu com a aldeia… ou, aliás, não diz absolutamente nada."
 stewardship_domain_special.1422.a: "Pobre [foundling.Custom('GirlBoy')] já não tem lar… [foundling.Custom('ES_LoLa')|U] adotarei!"
 stewardship_domain_special.1422.b: "Deixe[foundling.Custom('ES_LoLa')] na aldeia mais próxima."
 stewardship_domain_special.1422.c: "Queime a vila e essa criança amaldiçoada junto."
 stewardship_domain_special.1423.foundling: "[foundling.GetTitledFirstName] já está em segurança na corte, brincando — e até mesmo falando — com as outras crianças.\n\n"
 stewardship_domain_special.1423.no_foundling: "O barulho e a conversa na corte pouco me distraem do que vi."
 stewardship_domain_special.1423.desc: "As lembranças da vila silenciosa ainda me assombram. No final, não encontramos nenhum vestígio de alguém que já tenha vivido lá."
 stewardship_domain_special.1423.a: "Essa terra amaldiçoada nunca deve ser reassentada."
 stewardship_domain_special.1423.b: "O tempo recuperará aquela vila, assim como faz com todas as coisas."
 stewardship_domain_special.1424.desc: "O que me aguarda na casa abandonada é um mau cheiro terrível e uma pilha de corpos. A decomposição torna impossível determinar como eles morreram,"
 stewardship_domain_special.1424.collector_end: "mas até mesmo o cadáver mais recente encostado na parede — meu coletor de impostos — não apresenta marcas evidentes."
 stewardship_domain_special.1424.self_end: "mas até mesmo os corpos menos deteriorados não têm marcas óbvias de homicídio."
 stewardship_domain_special.1424.a: "Queime esse inferno até o chão."
 stewardship_domain_special.1424.b: "Enterre os corpos e ordene o reassentamento."
 stewardship_domain_special.1425.desc: "Os corpos são fáceis de se livrar. Mais desafiador é encontrar famílias dispostas a se estabelecer em uma vila dos mortos. No entanto, nenhum camponês pode resistir ao atrativo de um pedaço de terra fértil por muito tempo. Ou contra a ponta de uma lança, para dizer a verdade.\n\nSupervisionar o início da reconstrução também me ensinou muito!"
 stewardship_domain_special.1425.a: "Agora, se apenas essa tosse amaldiçoada fosse embora!"
 stewardship_domain_special.1426.desc: "É sem cerimônia, mas o fogo faz o que precisa ser feito. Observo as chamas consumirem as casas abandonadas por muito tempo, mas não por muito tempo. Já vi tudo o que precisava ver aqui."
 stewardship_domain_special.1426.a: "É hora de voltar para casa."
 stewardship_domain_special.1431.desc: "Tras días de viaje, llego al pueblo que falta en mis registros. No solo prospera… ¡lo hace a lo grande! Pero sus pobladores insisten en que #EMP sí#! pagan sus impuestos.\n\n[collector.GetTitledFirstName|l], recaudador[collector.Custom('ES_XA')] de la baronía no ha sido totalmente sincer[collector.Custom('ES_OA')]."
 stewardship_domain_special.1431.a: "[collector.GetFirstNameNoTooltip] tem perguntas a responder..."
 stewardship_domain_special.1431.a.tt: "Vou confrontar [collector.GetFirstName]"
 stewardship_domain_special.1431.b: "Reúnam os moradores. Eles pagarão novamente."
 stewardship_domain_special.1432.desc: "\"Esses recursos eram vitais para, ah, a defesa de [county.GetNameNoTier]!\" [collector.GetTitledFirstName|l], coletor[collector.Custom('ES_XA')] de impostos em [barony.GetNameNoTier] está aterrorizad[collector.Custom('ES_OA')] e não apenas pelos soldados imponentes que eu trouxe à sua mansão.\n\n\"Ah, por favor, farei qualquer coisa para merecer seu perdão!\"."
 stewardship_domain_special.1432.a: "Você será esquecido na escuridão."
 stewardship_domain_special.1432.b: "Eu poderia usar alguém que me deve a vida."
 stewardship_domain_special.1432.b.collector_loyal: "Gratidão e Lealdade"
 stewardship_domain_special.1432.b.collector_bad: "Uma Chance de Fuga"
 stewardship_domain_special.1432.b.collector_bad.tt: "[collector.GetFirstNameNoTooltip] escapa!"
 stewardship_domain_special.1432.c: "Qualquer coisa? Que tal contar minhocas?!"
 stewardship_domain_special.1433.desc: "!Lombriz traidora! Eu ofereço o perdão e, no instante seguinte, [collector.GetTitledFirstName|l] avança contra mim com uma lâmina em punho e um olhar maligno no rosto.\n\nLuto para me defender por um momento antes que um guarda caia sobre [collector.Custom('ES_ElElla')]."
 stewardship_domain_special.1433.a: "Estrangule [collector.Custom('ES_LoLa')] agora mesmo."
 stewardship_domain_special.1433.b: "Você nunca verá a luz novamente, [collector.GetFirstNameNoTooltip]!"
 stewardship_domain_special.1441.desc: "Os impostos cobrados dos meus camponeses podem ser difíceis às vezes. No entanto, como os eventos recentes me mostraram, a vida #EMP é#! difícil. Nenhuma bondade que eu possa mostrar mudará isso."
 stewardship_domain_special.1441.a: "Aprendi muito."
 stewardship_domain_special.1442.desc: "Os impostos cobrados dos camponeses do meu dom?nio podem ?s vezes ser t?o severos que at? sufocam a vida. Alivi?-los pode muitas vezes ser o caminho para uma prosperidade ainda maior para um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName] paciente."
 stewardship_domain_special.1443.t: "$stewardship_domain_special.1401.t$: Tributação Aprimorada"
 stewardship_domain_special.1443.opening: "Examinando registros de impostos, sou levado de volta ao caso da vila desaparecida em [barony.GetNameNoTier]."
 stewardship_domain_special.1443.end: "\n\nAs coisas estão muito melhores desde então, e a receita de [barony.GetNameNoTier] está mais alta do que nunca!"
 stewardship_domain_special.1443.a: "Maravilhoso!"
 stewardship_domain_special.1444.t: "$stewardship_domain_special.1401.t$: Evasão Fiscal Extensiva"
 stewardship_domain_special.1444.end: "\n\nAs coisas estão diferentes agora, mas aprendi que a misericórdia e a leniência às vezes só levam a perdas cada vez maiores. Qualquer forma de evitar impostos se espalhará entre os camponeses como pulgas."
 stewardship_domain_special.1444.a: "Que desastre."
 stewardship_domain_special.1445.t: "$stewardship_domain_special.1401.t$: Abandono Contínuo"
 stewardship_domain_special.1445.end: "\n\nAgora mais vilas estão desaparecendo, mas meus coletores sabem de uma explicação óbvia. Impostos altos levaram a muito abandono de terras perfeitamente boas, seja por fome ou fuga para outros condados."
 stewardship_domain_special.1445.a: "Bem, se eles não podem pagar por suas vidas..."
 stewardship_domain_special.1451.t: "$stewardship_domain_special.1401.t$: Gravado na Memória"
 stewardship_domain_special.1451.desc: "Eu acordo no meio da noite, ainda lembrando do olhar acusatório da criança enquanto a vila em [barony.GetNameNoTier] queima até o chão."
 stewardship_domain_special.1451.a: "Por que isso pesa tanto em mim?"
 stewardship_domain_special.1451.b: "Ah, eu quase havia esquecido!"
 #Domesday Book, by Stephen Arthur and Sean Hughes
 stewardship_domain_special.1500.t.a: "O Grande Levantamento"
 stewardship_domain_special.1500.t.b: "O Livro de Domesday"
 stewardship_domain_special.1500.desc: "M [domesday_steward.GetCouncilTitle] [domesday_steward.GetTitledFirstName|l] teve a audaciosa ideia de avaliar todas as propriedades em meu reino em um único levantamento gigante, criando um registro definitivo das minhas posses.\n\nAo compilar esse conhecimento, eu teria uma melhor supervisão dos assuntos administrativos, bem como da cobrança de impostos — embora o investimento inicial não seja barato."
 stewardship_domain_special.1500.a: "Eu conhecerei cada acre, servo e cabeça de gado."
 stewardship_domain_special.1500.a.tt: "#F Uma avaliação minuciosa é cara, mas terá maior qualidade.#!"
 stewardship_domain_special.1500.b: "Um resumo das minhas possessões será suficiente."
 stewardship_domain_special.1500.b.tt: "#F Uma avaliação superficial é mais barata, mas pode não ter tanta qualidade.#!"
 stewardship_domain_special.1500.c: "Por que me preocupar? Meus súditos sabem o que me devem."
 stewardship_domain_special.1500.c.tt: "Todos os meus outros vassalos"
 stewardship_domain_special.1500.quality_increase.tt: "O levantamento terá #P aumento de qualidade#!"
 stewardship_domain_special.1500.quality_decrease.tt: "O levantamento terá #N diminuição de qualidade#!"
 stewardship_domain_special.1500.quality_based_taxes: "Com base na qualidade do levantamento concluído"
 stewardship_domain_special.1500.every_county_control: "[control|lE] aumenta em relação à qualidade do levantamento"
 stewardship_domain_special.1500.every_county_summary: "Gera proporcionalmente mais Impostos sobre [holdings|lE] durante #V 5 años#!"
 stewardship_domain_special.1500.survey_not_completed: "Se o levantamento não for concluído"
 stewardship_domain_special.1501.desc: "M marechal [domesday_marshal.GetTitledFirstName|l] está preocupado que meus avaliadores sejam um alvo principal para bandidos e ladrões. Mesmo um levantamento incompleto poderia fornecer informações valiosas aos criminosos sobre possíveis alvos que eles poderiam atacar!\n\nPara manter meus súditos seguros, [domesday_marshal.GetFirstNameNoTooltip] recomenda enviar uma guarda armada com cada avaliador."
 stewardship_domain_special.1501.a: "Minha lei é proteção suficiente para meus súditos!"
 stewardship_domain_special.1501.a.tt: "Meus avaliadores podem ser atacados em condados com baixo [control|lE]."
 stewardship_domain_special.1501.b: "Organize uma milícia para proteger meus avaliadores."
 stewardship_domain_special.1501.b.success: "Minhas milícias conseguem manter meus avaliadores seguros"
 stewardship_domain_special.1501.b.failure: "Minhas milícias não conseguem proteger meus avaliadores"
 stewardship_domain_special.1501.c: "Envie um [ROOT.Char.Custom('MountedWarriorTerm')] com cada grupo de avaliadores."
 stewardship_domain_special.1501.c.tt: "Meus avaliadores estarão protegidos contra ataques na estrada."
 stewardship_domain_special.1510.opening: "[upset_priest.Custom2('AppropriateGreeting', ROOT.Char)]"
 stewardship_domain_special.1510.desc_opening: "Eu tive uma grande decepção quando as únicas pessoas que compareceram ao meu serviço esta manhã foram seus avaliadores de impostos! Aparentemente, os oficiais de aparência austera esperando do lado de fora da minha porta desencorajaram muitos fiéis [upset_priest.GetFaith.GetAdherentNamePluralNoTooltip] de participar do meu serviço."
 stewardship_domain_special.1510.desc_ending: "\n\nEmbora eu esteja disposto a pagar minhas obrigações, os assuntos da igreja são inerentemente espirituais, não temporais, e seus avaliadores não têm nada a ver aqui, perturbando meus serviços!"
 stewardship_domain_special.1510.desc_ending_not_endorsed: "\n\nOs assuntos da igreja são inerentemente espirituais, não temporais, e seus lacaios não têm nada a ver aqui, perturbando meus serviços!"
 stewardship_domain_special.1510.a: "Os [upset_priest.GetFaith.HouseOfWorshipPlural] serão avaliados, goste [upset_priest.GetSheHe] ou não!"
 stewardship_domain_special.1510.b: "Tem razão, [upset_priest.GetFaith.HouseOfWorshipPlural] e os demais lugares religiosos pertencem a [upset_priest.GetFaith.HighGodName]."
 stewardship_domain_special.1510.b.tt: "Eu excluo as posses d [upset_priest.GetTitledFirstName|l] da avaliação"
 stewardship_domain_special.1510.c: "Vou usar o [upset_priest.GetFaith.ReligiousText] para justificar a avaliação."
 stewardship_domain_special.1510.c.success: "[upset_priest.GetTitledFirstName]"
 stewardship_domain_special.1510.c.success.tt: "Convenço a [upset_priest.GetTitledFirstName|l] de que o estudo está justificado"
 stewardship_domain_special.1510.c.failure: "Não consigo convencer a [upset_priest.GetTitledFirstName|l]"
 stewardship_domain_special.1510.c.failure.tt: "Não consigo convencer [upset_priest.GetTitledFirstName|l] de que o estudo está justificado"
 stewardship_domain_special.1520.opening: "[concerned_noble.Custom2('AppropriateGreeting', ROOT.Char)]"
 stewardship_domain_special.1520.desc: "Tenho pago fielmente minhas obrigações à coroa a cada ano, no entanto, outro dia seus avaliadores de impostos apareceram na minha porta exigindo inspecionar minhas propriedades!\n\nVocê confia tão pouco em mim que precisa enviar homens para invadir minha privacidade?"
 stewardship_domain_special.1520.a: "Claro que confio em você! Meus homens partirão imediatamente."
 stewardship_domain_special.1520.a.tt: "Eu excluo as posses d [concerned_noble.GetTitledFirstName|l] da avaliação"
 stewardship_domain_special.1520.b: "Eu quero saber o que minhas terras contêm. Sem exceções."
 stewardship_domain_special.1520.c: "Está escondendo algo? Substitua meus avaliadores por espiões!"
 stewardship_domain_special.1520.c.tt: "Eu descubro um dos [secrets|lE] d [concerned_noble.GetTitledFirstName|l]"
 stewardship_domain_special.1530.desc: "[city_mayor.GetTitledFirstName] veio até mim dizendo que a Guilda dos Carpinteiros da [guild_town.GetNameNoTierNoTooltip] em [guild_county.GetName] está se recusando a participar da avaliação.\n\nEles alegam que a avaliação viola os privilégios que lhes foram concedidos em relação à administração de seus próprios assuntos e desejam que meus avaliadores sejam retirados do condado para que possam operar livremente."
 stewardship_domain_special.1530.a: "As guildas serão avaliadas, privilégios à parte!"
 stewardship_domain_special.1530.b: "Posso isentá-los em troca de seus serviços..."
 stewardship_domain_special.1530.c: "Eles rejeitam minha autoridade!? Revogue suas cartas!"
 stewardship_domain_special.1540.desc.a: "Enquanto viajava por [domesday_robbed_county.GetName], um grupo de bandidos atacou meus avaliadores. Vários avaliadores foram mortos e os registros que eles carregavam foram perdidos."
 stewardship_domain_special.1540.desc.b: "Enquanto viajava por [domesday_robbed_county.GetName], um grupo de bandidos atacou meus avaliadores. Felizmente, os soldados que eu tinha guardando meus avaliadores foram capazes de eliminar os ladrões."
 stewardship_domain_special.1540.a: "Ignore [domesday_robbed_county.GetNameNoTierNoTooltip]. Não será incluído na avaliação."
 stewardship_domain_special.1540.b: "Aumente as patrulhas nas estradas lá e envie mais avaliadores!"
 stewardship_domain_special.1540.c: "Que isso seja um exemplo para aqueles em [domesday_robbed_county.GetNameNoTierNoTooltip] que se oporiam a mim!"
 stewardship_domain_special.1550.desc: "Ao comparar os impostos pagos por mim no ano passado com as informações da pesquisa em andamento, percebi várias discrepâncias importantes... ou meus súditos têm consistentemente pagado a mais, ou algo está muito errado com esta pesquisa!\n\nInvestigando mais, descubro que m [domesday_steward.GetCouncilTitle] [domesday_steward.GetTitledFirstName|l] tem comprometido a pesquisa ao aceitar subornos de proprietários de terras em troca de deixar suas posses fora da avaliação!"
 stewardship_domain_special.1550.a: "Cancele a investigação e obrigue[domesday_steward.Custom('ES_LoLa')] a me reembolsar pelos custos."
 stewardship_domain_special.1550.b: "Use o dinheiro do suborno para reavaliar adequadamente essas propriedades."
 stewardship_domain_special.1550.c: "Encarcerem [domesday_steward.GetTitledFirstNameNoTooltip|l] seu tempo como [domesday_steward.GetCouncilTitle] chegou ao fim."
 stewardship_domain_special.1560.desc: "[city_mayor.GetTitledFirstName] me diz que os comerciantes ambulantes têm reclamado dos meus avaliadores em [trade_county.GetName].\n\nOs comerciantes ambulantes acham injusto que suas mercadorias sejam avaliadas quando eles não são residentes do [ROOT.Char.GetPrimaryTitle.GetName], e vários estão ameaçando partir e nunca mais voltar."
 stewardship_domain_special.1560.a: "Todos serão avaliados, residentes ou não!"
 stewardship_domain_special.1560.b: "Se eles me pagarem uma taxa, eu os isentarei."
 stewardship_domain_special.1560.c: "Os comerciantes têm um bom argumento."
 stewardship_domain_special.1590.desc.start: "Após muitos meses trabalhosos avaliando minhas terras, está feito."
 stewardship_domain_special.1590.perfect.desc: "Sob minha orientação, meus avaliadores compilaram um registro absolutamente perfeito das minhas posses. Com tudo detalhado até a última galinha, isso garantirá que eu colete todos os impostos devidos a mim a cada ano!"
 stewardship_domain_special.1590.excellent: "Meus avaliadores compilam um registro preciso das minhas posses"
 stewardship_domain_special.1590.excellent.desc: "Meus avaliadores compilaram um registro excepcionalmente preciso das minhas posses. Isso garantirá que eu colete todos os impostos devidos a mim a cada ano!"
 stewardship_domain_special.1590.good: "Meus avaliadores compilam uma estimativa precisa das minhas posses"
 stewardship_domain_special.1590.good.desc: "Meus avaliadores compilaram uma estimativa precisa das minhas posses. Isso garantirá que meus coletores de impostos não deixem passar nada importante ao calcular o que me é devido."
 stewardship_domain_special.1590.mediocre: "Meus avaliadores compilam uma estimativa vaga das minhas posses"
 stewardship_domain_special.1590.mediocre.desc: "Meus avaliadores compilaram apenas uma estimativa vaga das minhas posses. Embora ainda seja útil, meus coletores de impostos certamente deixarão passar coisas ao calcular o que me é devido."
 stewardship_domain_special.1590.poor: "A pesquisa é tão imprecisa que não é utilizável"
 stewardship_domain_special.1590.poor.desc: "Infelizmente, meus avaliadores compilaram uma pesquisa tão imprecisa que é completamente inutilizável! Meus coletores de impostos ficarão por conta própria este ano..."
 stewardship_domain_special.1590.none.desc: "\n\nSurpreendentemente, cada província em meu reino de alguma forma conseguiu uma isenção que a excluía da pesquisa. Como resultado, os registros finais não contêm absolutamente nenhuma informação sobre as posses do meu reino."
 stewardship_domain_special.1590.every_county: "Cada condado no [THIS.Char.GetPrimaryTitle.GetName]"
 stewardship_domain_special.1590.every_nonexcluded_county: "Cada condado não excluído no [THIS.Char.GetPrimaryTitle.GetName]"
 stewardship_domain_special.1590.high_quality.desc: "\n\nHinchad[domesday_final_steward.Custom('ES_OA')] de orgullo, mi [domesday_final_steward.GetCouncilTitle] [domesday_final_steward.GetFirstName] me pregunta dónde debemos guardar los registros ahora que está terminado."
 stewardship_domain_special.1590.low_quality.desc: "\n\nMeu [domesday_final_steward.GetCouncilTitle] [domesday_final_steward.GetFirstName] está consternad[domesday_final_steward.Custom('ES_OA')], diz que este não é o resultado que"
 stewardship_domain_special.1590.no_steward.desc: "\n\nSe eu ainda tivesse um [ROOT.GetCouncillorPosition( 'councillor_steward' ).GetPositionName], esta pesquisa poderia ter sido melhor."
 stewardship_domain_special.1590.high_quality.a: "Restrinja o acesso apenas aos meus coletores de impostos."
 stewardship_domain_special.1590.high_quality.a.tt: "#F Restringir o acesso a esses registros me dará informações exclusivas sobre minhas terras que posso explorar.#!"
 stewardship_domain_special.1590.high_quality.b: "Distribua os registros para o público!"
 stewardship_domain_special.1590.high_quality.b.tt: "#F Tornar os registros de conhecimento público irá impressionar e inspirar o povo, melhorando o desenvolvimento em minhas terras.#!"
 stewardship_domain_special.1590.poor_quality.a: "Que desperdício de tempo e dinheiro..."
 stewardship_domain_special.1590.poor_quality.b: "Demita [domesday_final_steward.GetFirstNameNoTooltip] por sua incompetência!"
 stewardship_domain_special.1590.poor_quality.d.tt: "É demitido do meu [council|lE]"
 stewardship_domain_special.1590.poor_quality.c: "![domesday_final_steward.GetFirstName] pagará por este fracasso com a vida!"
 #Visit displeased county, by Stephen Arthur
 stewardship_domain_special.3010.t: "Insatisfação em [stewardship_domain_special_3010_county.GetNameNoTier]"
 stewardship_domain_special.3010.desc: "As pessoas em [stewardship_domain_special_3010_county.GetNameNoTier] parecem insatisfeitas com o meu governo.\n\nSe eu visitar o condado pessoalmente, posso mostrar a eles a... ahem, #EMP necessidade#! da minha autoridade."
 stewardship_domain_special.3010.a: "Vou mostrar a eles do que sou feit[ROOT.Char.Custom('ES_OA')]!"
 stewardship_domain_special.3010.b: "Meu tempo é muito valioso para desperdiçá-lo com a opinião deles."
 stewardship_domain_special.3012.t: "Visita a [stewardship_domain_special_3010_county.GetNameNoTier]"
 stewardship_domain_special.3012.desc.a: "[stewardship_domain_special_3010_baron.GetTitledFirstName] explica, disculpándose, que la gente de aquí es bastante levantisca, y que hay que hacerles entender que mi poder no debe ser cuestionado. Su aceptación pasiva no es suficiente, necesito lealtad y obediencia.\n\n¿Cómo puedo convencerlos de que obedezcan?"
 stewardship_domain_special.3012.desc.b: "La gente de aquí es muy levantisca. Hay que hacerles entender que mi poder no será cuestionado. Su aceptación pasiva no es suficiente, necesito lealtad y obediencia.\n¿Cómo puedo convencerlos de que obedezcan?"
 stewardship_domain_special.3012.a: "Com ouro, mostrarei minha generosidade."
 stewardship_domain_special.3012.b: "Impressioná-los com um grande discurso sobre meu governo."
 stewardship_domain_special.3012.b.success: "Impressiono as pessoas com meu discurso"
 stewardship_domain_special.3012.b.failure: "Minhas palavras não surtem efeito e as pessoas não se comovem"
 stewardship_domain_special.3012.c: "Os camponeses sofrerão por sua insolência!"
 stewardship_domain_special.3014.t.a: "Ordem restaurada em [stewardship_domain_special_3010_county.GetNameNoTier]"
 stewardship_domain_special.3014.t.b: "Insatisfação em [stewardship_domain_special_3010_county.GetNameNoTier]"
 stewardship_domain_special.3014.spent_gold.desc: "Dinheiro bem gasto. Minha generosidade comprou a conformidade das pessoas ao meu governo."
 stewardship_domain_special.3014.popular_appeal_fail_learn_success.desc: "[stewardship_domain_special_3010_county.GetNameNoTier] está tão rebelde como sempre. No início, meus discursos foram fracos, mas acho que melhorei no final da minha visita."
 stewardship_domain_special.3014.popular_appeal_fail_learn_fail.desc: "Meus discursos caíram em ouvidos moucos. Não sei o que estou fazendo de errado. [stewardship_domain_special_3010_county.GetNameNoTier] está tão rebelde como sempre."
 stewardship_domain_special.3014.popular_appeal_success.desc: "Meus discursos tocaram as pessoas e agora [stewardship_domain_special_3010_county.GetNameNoTier] mostra maior conformidade ao meu governo."
 stewardship_domain_special.3014.intimidate_success.desc: "Impondo minha força em [stewardship_domain_special_3010_county.GetNameNoTier] parece ter funcionado. Eles se curvaram diante do meu poder e serão melhores súditos agora."
 stewardship_domain_special.3014.a: "O ouro sempre encontra mãos vazias."
 stewardship_domain_special.3014.b: "Pelo menos aprendi algo."
 stewardship_domain_special.3014.c: "Minhas palavras movem o reino."
 stewardship_domain_special.3014.e: "Deixem que odeiem, desde que temam."
 stewardship_domain_special.3014.f: "Isso é tão frustrante. Será que algum dia melhorarei minha diplomacia?"
 stewardship_domain_special.3014.f.tt: "Não aprendi nada sobre administração."
 stewardship_domain_special.8031.t: "$stewardship_domain_special.8001.t$: Trazer Vida"
 stewardship_domain_special.8031.aqueduct: "Estou presente para testemunhar as ?ltimas pedras sendo colocadas no meu novo aqueduto em [county.GetName]. Meu intendente segura uma ta?a e a enche com as primeiras gotas de ?gua corrente, antes de me oferec?-la."
 stewardship_domain_special.8031.irrigation: "Estou presente no dia em que os diques serão derrubados para trazer água para a minha nova rede de valas em [county.GetName]. Leva horas para a água começar a se espalhar adequadamente,"
 stewardship_domain_special.8031.interlude: "\n\nO solo ainda está duro e hostil, e muito trabalho resta a fazer,"
 stewardship_domain_special.8031.full_scope: "mas a água é fresca,"
 stewardship_domain_special.8031.scoped_down: "especialmente porque meu projeto não é tão grandioso como eu tinha imaginado. No entanto, a água é fresca,"
 stewardship_domain_special.8031.conclusion: "e com o tempo trará nova vida a esta terra. À medida que os pequenos riachos se tornam um rio, reflito sobre tudo o que meu trabalho me ensinou."
 stewardship_domain_special.8031.a: "Mesmo décadas depois, colheremos as recompensas por isso."
 #The Irrigation Project, by Petter Vilberg
 stewardship_domain_special.8001.progress_is_made: "Progresso Significativo"
 stewardship_domain_special.8001.continued_problems: "Problemas Contínuos"
 stewardship_domain_special.8001.troubled_construction: "Construção Problemática"
 stewardship_domain_special.8001.slow_progress: "Progresso Lento"
 stewardship_domain_special.8001.high_death_count: "Alto Número de Mortes"
 stewardship_domain_special.8001.project_continues: "#V O projeto continua#!"
 stewardship_domain_special.8001.project_completed: "#P O projeto foi concluído#!"
 stewardship_domain_special.8001.t: "Irrigação"
 stewardship_domain_special.8001.desc: "No [county.GetName] há bastante terras desocupadas, problema cuja culpa recai sobre um terreno pouco adequado.\n\n[steward.Custom2('MyCharacterIntroduction', ROOT.Char)|U] sugeriu que um projeto de irrigação poderia torná-las cultiváveis e, assim, valiosas."
 stewardship_domain_special.8001.a: "Vou projetar um aqueduto!"
 stewardship_domain_special.8001.b: "Precisamos de uma rede de valas e solo."
 stewardship_domain_special.8001.c: "Aquelas terras estão não utilizadas por um bom motivo."
 stewardship_domain_special.8001.if_successful: "Se bem-sucedido:"
 stewardship_domain_special.8011.t: "$stewardship_domain_special.8001.t$: Extrapolando o Orçamento"
 stewardship_domain_special.8011.desc: "Meu arquiteto assistente nomeado veio até mim, pedindo que eu gaste ainda mais no meu projeto de aqueduto em [county.GetName].\n\n“Certamente vós mesm[ROOT.Char.Custom('ES_OA')] entendeis que qualquer projeto de construção seria caro em tais circunstâncias, [ROOT.Char.Custom('FormOfAddressForLiege')]”."
 stewardship_domain_special.8011.a: "[steward.GetFirstNameNoTooltip], encontre-me um substituto!"
 stewardship_domain_special.8011.a.tt: "#F Eu tinha tantas esperanças neste...#!"
 stewardship_domain_special.8011.b: "Você está certo. Pegue o que precisa."
 stewardship_domain_special.8012.t: "$stewardship_domain_special.8001.t$: Problemas Contínuos"
 stewardship_domain_special.8012.desc: "¿Es que en mi señorío no hay arquitectos competentes? Mi nuevo arquitecto asistente a cargo de supervisar la construcción del acueducto de [county.GetNameNoTier] ¡también se ha excedido del presupuesto!\n\n¡Estoy cansad[ROOT.Char.Custom('ES_OA')] de excusas sin sentido, como «no se puede hacer, [ROOT.Char.Custom('FormOfAddressForLiege')]!»."
 stewardship_domain_special.8012.a: "Leve o ouro, mas você precisa terminar com isso!"
 stewardship_domain_special.8012.a.tt: "#F Como pode custar tanto para construir um aqueduto simples?#!"
 stewardship_domain_special.8012.b: "Recrute mais camponeses para o trabalho forçado."
 stewardship_domain_special.8013.t: "$stewardship_domain_special.8001.t$: Construção Problemática"
 stewardship_domain_special.8013.desc: "Recursos entregues no lugar errado, estruturas que não correspondem ao que eu tinha em mente... Que parte da ordem \"construa um aqueduto do jeito que eu quero\" é tão difícil de seguir?"
 stewardship_domain_special.8013.a: "Vou gerenciar as obras eu mesmo."
 stewardship_domain_special.8013.b: "Recrute camponeses para compensar o tempo perdido."
 stewardship_domain_special.8021.t: "$stewardship_domain_special.8001.t$: Dificuldades Inesperadas"
 stewardship_domain_special.8021.desc: "Meu projeto de irrigação em [county.GetNameNoTier] está progredindo, mas com mais dificuldades do que o esperado.\n\nDe acordo com [steward.Custom2('MyCharacterIntroduction', ROOT.Char)], o solo é \"duas vezes mais rochoso e duas vezes mais poroso do que imaginávamos\"."
 stewardship_domain_special.8021.a: "Os camponeses terão que trabalhar duas vezes mais duro, então!"
 stewardship_domain_special.8021.b: "Devemos levar o tempo necessário para acertar isso."
 stewardship_domain_special.8021.c: "Sempre há atalhos que podemos tomar para voltar ao caminho certo!"
 stewardship_domain_special.8022.t: "$stewardship_domain_special.8001.t$: Condições Infelizes"
 stewardship_domain_special.8022.desc: "O projeto de irrigação de [county.GetNameNoTier] continua a todo vapor, [ROOT.Char.Custom('FormOfAddressForLiege')]", relata meu administrador[steward.Custom('ES_XA')]. Mas logo meu orgulho se desfaz. "Infelizmente, os camponeses que trabalham nele estão morrendo a um ritmo alarmante"."
 stewardship_domain_special.8022.a: "Talvez eu precise supervisionar as coisas um pouco mais de perto daqui em diante."
 stewardship_domain_special.8022.b: "Eles não vivem para me servir?"
 stewardship_domain_special.8022.c: "Ah... Recrute substitutos conforme necessário."
 stewardship_domain_special.8022.c.tt: "#F Não diga a eles por que são necessários.#!"
 stewardship_domain_special.8023.t: "$stewardship_domain_special.8001.t$: Progresso Estagnado"
 stewardship_domain_special.8023.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], o projeto de irrigação de [county.GetNameNoTier] está atrasado", informa [steward.Custom2('MyCharacterIntroduction', ROOT.Char)]. "Muito atrasado. Depois de inspecionar a obra, preocupo-me se ela será concluída em minha vida".\n\nNão consigo dizer se ele está falando sério ou não."
 stewardship_domain_special.8023.a: "Substitua os encarregados. E dê a eles novos chicotes."
 stewardship_domain_special.8023.b: "Contrate quantos trabalhadores forem necessários!"
 stewardship_domain_special.8023.c: "Talvez seja hora de mirar um pouco mais baixo..."
 stewardship_domain_special.8023.c.tt: "Isso reduzirá o impacto do meu projeto"
 #Localisation for completion of the governance lifestyle.
 stewardship_domain_special.9999.t: "Tudo em Meu Livro-Razão"
 stewardship_domain_special.9999.desc_opening: "Com um dedo em cada torta, um olho em cada assunto e uma opinião sobre cada decisão, tenho me concentrado em assuntos administrativos por um longo tempo agora."
 stewardship_domain_special.9999.desc_education_4: "\n\nAo observar minhas realizações, percebo que não há mais nada a aprender!"
 stewardship_domain_special.9999.desc_not_education: "\n\nAo observar minhas realizações, percebo que me tornei uma força administrativa a ser considerada!"
 stewardship_domain_special.9999.a: "Nada no estudo da governança me escapou!"
 stewardship_domain_special.9999.a.tt: "Sinto como se tivesse atingido o máximo que posso no estudo de [stewardship_lifestyle|lE]."
