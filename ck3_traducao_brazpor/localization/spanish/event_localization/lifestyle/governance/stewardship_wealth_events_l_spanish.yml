l_spanish:
 ###################
 #Standard Events #
 ###################
 #Bankrupt, by Stephen Arthur and Sean Hughes
 stewardship_wealth.1001.t: "Falência!"
 stewardship_wealth.1001.desc: "Meu tesouro está vazio, minha despensa está vazia. Até os ratos foram vendidos para pagar minhas despesas, mas ainda assim não consigo pagar todas as dívidas que devo!\n\nComo posso sair dessa situação?"
 stewardship_wealth.1001.a: "Examine os registros para encontrar algo que possa ajudar!"
 stewardship_wealth.1001.a.success: "Encontro várias dívidas esquecidas que posso cobrar"
 stewardship_wealth.1001.a.failure: "Não encontro nada que seja de ajuda"
 stewardship_wealth.1001.b.havehook: "Vou cobrar o favor que me deve [wealthy_vassal.GetTitledFirstNameNoTooltip|l]."
 stewardship_wealth.1001.b.givehook: "Deverei um favor a [wealthy_vassal.GetTitledFirstNameNoTooltip|l] se me ajudar."
 stewardship_wealth.1001.c: "Vou exigir tributos dos meus vassalos!"
 stewardship_wealth.1001.c.tt: "Cada vassalo:"
 stewardship_wealth.1001.d: "Confisco propriedades religiosas para arrecadar fundos."
 stewardship_wealth.1001.e: "Vou apertar o cinto e economizar o que posso."
 #Minting New Coins, bu Stephen Arthur and Sean Hughes
 stewardship_wealth.1011.t: "Cunhagem de Novas Moedas"
 stewardship_wealth.1011.desc: "É meu direito e responsabilidade determinar qual moeda será usada em todo [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nAs escolhas que eu fizer determinarão como a moeda - e, por extensão, meu reino - será vista pelo mundo."
 stewardship_wealth.1011.a: "Cunhar moedas de prata para facilitar o comércio."
 stewardship_wealth.1011.b: "Cunhar moedas de ouro com minha própria imagem!"
 stewardship_wealth.1011.c: "Desvalorizar a moeda com níquel barato."
 stewardship_wealth.1011.c.success: "Economizo uma fortuna ao cunhar as moedas desvalorizadas"
 stewardship_wealth.1011.c.failure: "Todos descobrem como as novas moedas são baratas"
 stewardship_wealth.1011.custom: "Cada condado no [THIS.Char.GetPrimaryTitle.GetName]"
 #War Taxes, by Sean Hughes
 stewardship_wealth.1021.t: "Pagando pela Guerra"
 stewardship_wealth.1021.desc: "Guerras são caras, e a [current_war.GetName] não é diferente.\n\nCom meu tesouro se esvaziando rapidamente, preciso pensar em como pagarei para manter meus soldados no campo de batalha."
 stewardship_wealth.1021.a: "Aumentar os impostos sobre os camponeses."
 stewardship_wealth.1021.a.custom: "Cada [county|lE] em meu [domain|lE]"
 stewardship_wealth.1021.b: "Reduzir os gastos militares não essenciais."
 stewardship_wealth.1021.b.success: "Melhoro a eficiência do meu orçamento militar"
 stewardship_wealth.1021.b.failure: "Acidentalmente corto despesas militares essenciais"
 stewardship_wealth.1021.c: "As coisas vão se resolver no final. Sempre se resolvem."
 stewardship_wealth.1021.c.tt: "A guerra criará muitas oportunidades..."
 #War Profiteering, by Isabella Welch
 stewardship_wealth.1022.t: "Pilhagem Sagrada"
 stewardship_wealth.1022.desc: "Meu [GetPlayer.Custom( 'KnightCultureNoTooltipLowercase' )], [church_burner.GetName] se aproxima de mim, feliz, para me trazer um relatório de \n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], após vossa sensata decisão de deixar o financiamento da guerra a nosso critério, realizamos o saqueio mais frutífero que jamais se viu em [ROOT.Char.GetLiege.GetPrimaryTitle.GetNameNoTier]! Nós roubamos dezenas de ovelhas, pilhamos centenas de bugigangas e até queimamos uma [ROOT.Char.GetFaith.HouseOfWorship] com mil pessoas vivas lá dentro!\"."
 stewardship_wealth.1022.a: "Nossos cofres realmente precisavam desse ganho... apenas tente não fazer isso novamente."
 stewardship_wealth.1022.b: "Ninguém me considerará um[ROOT.Char.Custom('ES_XA')] açougueir[ROOT.Char.Custom('ES_OA')]! Vamos gastar isso em indenizações."
 stewardship_wealth.1022.c: "Bom trabalho! Continuaremos fazendo o que quisermos."
 #Wealthy free farmer wants to buy land, by Sean Hughes
 stewardship_wealth.1051.t: "Fortuna do Camponês"
 stewardship_wealth.1051.desc: "[freeman.GetFirstName], um[freeman.Custom('ES_XA')] arrendatári[freeman.Custom('ES_OA')] livre que ocupa algumas de minhas terras em [target_county.GetNameNoTier], conseguiu uma colheita excepcional nesta temporada graças ao seu planejamento meticuloso.\n\nAgora deseja usar parte de seus lucros para comprar uma porção de minha propriedade, para que possa aproveitar seu sucesso e produzir mais safras no ano que vem."
 stewardship_wealth.1051.a: "Esqueça a agricultura,[freeman.Custom('ES_XA')] [freeman.GetWomanMan] como [freeman.GetSheHe] deve estar em minha corte!"
 stewardship_wealth.1051.a.arrogant: "Um[freeman.Custom('ES_XA')] camponês[freeman.Custom('ES_OA')] cult[freeman.Custom('ES_OA')]? Que coisa inusitada! #EMP Deveis#! juntar-se à minha corte!"
 stewardship_wealth.1051.b: "Se ele puder me pagar em moeda viva, a terra será dele."
 stewardship_wealth.1051.d: "A terra em [target_county.GetNameNoTierNoTooltip] é minha e somente minha!"
 #Pick a new thing to obtain, by Sean Hughes
 stewardship_wealth.1061.t: "Novas Aquisições"
 stewardship_wealth.1061.desc: "Durante a administração diária do meu [ROOT.Char.Custom('GetRealmOrDomicile')], tomei conhecimento de várias oportunidades que posso perseguir.\n\nCada oportunidade tem grande potencial, mas realisticamente só posso escolher uma delas - devo determinar qual delas me trará o maior valor."
 stewardship_wealth.1061.a: "Ouvi rumores sobre um livro perdido que foi redescoberto."
 stewardship_wealth.1061.a.success: "O livro perdido contém uma grande riqueza de conhecimento"
 stewardship_wealth.1061.a.success.good: "Você recebe um [artifact|lE] de livro muito bom."
 stewardship_wealth.1061.a.failure: "O livro perdido era apenas um velho livro de contabilidade"
 stewardship_wealth.1061.a.success.bad: "Você adquire um [artifact|lE] de livro antigo sem interesse"
 stewardship_wealth.1061.b: "[vassal.GetTitledFirstNameNoTooltip|l] poderia precisar de ajuda para gerenciar suas propriedades."
 stewardship_wealth.1061.c: "Garantir esses acordos comerciais encherá meu tesouro."
 #Buy some cows, by Linnéa Thimrén
 stewardship_wealth.5001.t: "Gado Animado"
 stewardship_wealth.5001.desc: "Como pagamento adicional em um comércio recente, me encontro em posse de um grande rebanho de gado.\n\nMe asseguraram que os animais são de alta qualidade, mas a questão de o que fazer com eles permanece."
 stewardship_wealth.5001.a: "[capital.GetNameNoTierNoTooltip] prosperará com o rebanho."
 stewardship_wealth.5001.b: "É um belo rebanho, mas poderia ser maior..."
 stewardship_wealth.5001.b.message_1: "Meu projeto de criação tem sucesso"
 stewardship_wealth.5001.b.message_2: "Meu projeto de criação falha"
 stewardship_wealth.5001.c: "As peles renderão um bom lucro. Tragam o cutelo!"
 #Investment advice (wealth friend), by Mathilda Bjarnehed
 stewardship_wealth.5002.t: "Uma Palavra de Conselho"
 stewardship_wealth.5002.start.desc: "Passeava entre as barracas do mercado de [capital.GetNameNoTooltip], com uma bolsa pesada pendendo do meu cinto. Como poderia fazer essa moeda trabalhar a meu favor?\n\nEnquanto admiro os produtos de um"
 stewardship_wealth.5002.safe_smithy.desc: "ferreiro - bom aço,"
 stewardship_wealth.5002.safe_mason.desc: "pedreiro - geometria perfeita,"
 stewardship_wealth.5002.safe_religious_sculptor.desc: "escultor - imagens [ROOT.Char.GetFaith.GetAdjectiveNoTooltip],"
 stewardship_wealth.5002.safe_jeweler.desc: "ourives - filigrana requintada,"
 stewardship_wealth.5002.middle.desc: "um bom investimento - [investor.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] aparece de repente ao meu lado.\n\n\"Uma palavra de conselho, [ROOT.Char.Custom2('RelationToMeAddress', investor)]? Dê uma olhada na"
 stewardship_wealth.5002.risky_smithy.desc: "oficina do ferreiro"
 stewardship_wealth.5002.risky_mason.desc: "oficina do pedreiro"
 stewardship_wealth.5002.risky_religious_sculptor.desc: "barraca do escultor"
 stewardship_wealth.5002.risky_jeweler.desc: "barraca do ourives"
 stewardship_wealth.5002.end.desc: "ali. Suas mercadorias podem ser simples, mas seu potencial é grande.\""
 stewardship_wealth.5002.b.success: "[investor.GetFirstNameNoTooltip] e eu nos animamos com um ótimo investimento"
 stewardship_wealth.5002.b.failure: "Meu investimento falha"
 stewardship_wealth.5002.b.failure.tt: "Você perde o dinheiro que investiu"
 stewardship_wealth.5002.a.smithy: "Investir na oficina do ferreiro."
 stewardship_wealth.5002.a.tavern: "Investir em uma taverna."
 stewardship_wealth.5002.a.mason: "Investir na oficina do pedreiro."
 stewardship_wealth.5002.a.religious_sculptor: "Investir na oficina do escultor."
 stewardship_wealth.5002.a.jeweler: "Investir na oficina do ourives."
 stewardship_wealth.5002.c: "Obter um lucro rápido com algumas negociações inteligentes."
 #Roadside Stall selling carvings by Daniel Moore
 stewardship_wealth.6001.t: "Barraca à Beira da Estrada"
 stewardship_wealth.6001.desc: "Ao viajar pela [stall_county.Custom('TerrainTypeCountyScope')] de [stall_county.GetName], encontro uma barraca de aparência improvisada à beira da estrada.\n\nQuando paro para dar uma olhada, um[stall_owner.Custom('ES_XA')] campones[stall_owner.Custom('ES_OA')] chamad[stall_owner.Custom('ES_OA')] [stall_owner.GetFirstName] entra em ação, tentando me convencer a comprar uma das pequenas esculturas de [stall_owner.GetFaith.ReligiousSymbol] que ele tem à venda.\n\n\"Eu as faço à mão, [ROOT.Char.Custom('FormOfAddressForLiege')]; cada uma me leva horas de trabalho.\""
 stewardship_wealth.6001.a: "Vou comprar uma."
 stewardship_wealth.6001.a.tt_high: "Você obtém uma escultura de alta qualidade"
 stewardship_wealth.6001.a.tt_low: "Você obtém uma escultura de baixa qualidade"
 stewardship_wealth.6001.b: "Duvido que essa barraca pague impostos, destruam-na!"
 stewardship_wealth.6001.c: "Vou conversar com [stall_owner.GetSheHe] e ver o que posso aprender sobre vendas."
 small_religious_carving: "Pequena Escultura Religiosa"
 small_religious_carving_desc: "É uma escultura pequena, mas intrincada, de estilo [stall_owner.GetFaith.GetAdherentNameNoTooltip] de um/a [stall_owner.GetFaith.ReligiousSymbol]."
 #Rogue Administration by Jason Cantalini
 stewardship_wealth.7000.t: "Administração Desonesta"
 stewardship_wealth.7000.desc: "Com muita cerimônia autocongratulatória, meu $knight_culture_player_no_tooltip_lowercase$ [enforcer.GetTitledFirstName|l] atira de repente um saco volumoso diante de mim.\n\n\"Olhe\", pede.\n\nEsvazio seu conteúdo: metais preciosos, relíquias, joias.\n\n\"Convenci #EMP convencido#! alguns dos plebeus de [victim.GetTitledFirstName|l]\", sorri [enforcer.GetFirstNameNoTooltip]\", os impostos deles eram destinados a vós, meu [ROOT.Char.GetLadyLord]\".\n\nÉ um belo ganho! E, melhor ainda — já consigo imaginar a expressão de fúria no rosto detestável de [victim.GetTitleAsNameNoTooltip]."
 stewardship_wealth.7000.a: "[victim.GetFirstNameNoTooltip][victim.Custom2('InsultAdjective', ROOT.Char)]"
 stewardship_wealth.7000.b: "Posso justificar essa extorsão."
 stewardship_wealth.7000.b.tt: "Bode expiatório, confundir a verdade, pequenos reembolsos: qualquer coisa para amortecer as acusações de tirania"
 stewardship_wealth.7000.c: "Leve essa riqueza. Traga-me mais."
 stewardship_wealth.7000.c.tt: "Em seu domínio e no dele, você soltará os melhores cobradores que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] possa conseguir!"
 stewardship_wealth.7000.d: "Infelizmente... os bens roubados devem ser devolvidos."
 stewardship_wealth.7000.d.tt: "A vingança está errada e tal..."
 #Beyond Boundaries by Jason Cantalini
 stewardship_wealth.7001.t: "Além das Fronteiras"
 stewardship_wealth.7001.desc: "Maldit[thieving_rival.Custom('ES_OA')] seja [thieving_rival.Custom('ES_ElLa')] [thieving_rival.GetTitledFirstName|l] e seus lacaios ladrões! Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('messenger'))], [messenger.Custom('ES_ElLa')] [messenger.GetTitledFirstName|l], gagueja a mensagem de que, com descaramento, aqueles bandidos coagiram o povo comum de [ROOT.Char.GetCapitalLocation.GetName] a entregar as riquezas que deveriam ir para mim!\n\n[messenger.GetFirstNameNoTooltip] tem os funcionários preparados para cobrar as taxas habituais..., mas já prevejo viúvas lamentando, crianças morrendo de fome e famílias pobres sendo expulsas de suas casas.\n\nMil maldições sobre a alma gananciosa [thieving_rival.Custom('ES_DelDela')] [thieving_rival.GetTitledFirstNameNoTooltip|l]!"
 stewardship_wealth.7001.tt.crime_alert: "[victim.Custom('ES_ElLa')|U] [victim.GetTitledFirstName|l] se lembrará disto"
 stewardship_wealth.7001.justification: "[thieving_rival.GetSheHe|U] espalha mentiras frágeis sobre seus direitos como meu [thieving_rival.GetLadyLord], mas eu sei que ele/ela tomou o que é meu…"
 stewardship_wealth.7001.unleashed_knights: "[thieving_rival.GetSheHe|U] e seus seguidores, os vis ladrões, tornam-se cada vez mais infames a cada dia..."
 stewardship_wealth.7001.a: "Defendo o meu direito de receber pagamento."
 stewardship_wealth.7001.a.tt: "Envie seus executores às aldeias!"
 stewardship_wealth.7001.b: "Minhas rixas pessoais não são do meu povo."
 stewardship_wealth.7001.b.tt: "Isente as vítimas d [thieving_rival.GetFirstNameNoTooltip] do pagamento de impostos"
 stewardship_wealth.2000.t: "Avaliando Oportunidades"
 stewardship_wealth.2000.desc: "Caminho pelas ruas de [loc_capital_county.GetNameNoTier] com meu [ROOT.GetCouncillorPosition( 'councillor_steward' ).GetPositionName|l], procurando oportunidades para melhorar meu tesouro, que está um tanto vazio. Quando chegamos à sala de pesagem do mercado, [loc_steward.GetFirstName] começa a falar em voz baixa:\n\nPoderíamos obter tranquilamente mais receita se fôssemos… #EMP criativos #! com os impostos sobre os bens trazidos para cá. Posso preparar um novo conjunto de pesos com uma pesagem ligeiramente ajustada, mas com o mesmo aspecto. Dessa forma, os comerciantes terão que nos pagar mais pelos mesmos bens! Ninguém desconfiaria!\n\nSe desejardes, podemos trocar os pesos e observar o fluxo de dinheiro para vossas arcas!."
 stewardship_wealth.2000.a: "Vamos trocar as pedras esta noite."
 stewardship_wealth.2000.a.tt.success: "As pedras são trocadas sem que ninguém perceba"
 stewardship_wealth.2000.a.tt.failure: "Seu esquema foi descoberto"
 stewardship_wealth.2000.b: "É preciso um conjunto de pesos realmente melhor."
 stewardship_wealth.2000.b.tt: "Embora seja difícil de alcançar, uma solução que beneficie tanto seus cofres quanto as necessidades dos comerciantes é definitivamente possível."
 stewardship_wealth.2000.b.tt.success: "Você implementa com sucesso o novo sistema de pesagem"
 stewardship_wealth.2000.b.tt.failure: "O novo sistema de pesagem é menos ideal"
 stewardship_wealth.2000.c: "Pego o que é meu de forma tradicional!"
 stewardship_wealth.2000.c.tt: "Você intimida diretamente os comerciantes locais a pagarem mais pelo privilégio de trazerem suas mercadorias através deste condado."
