 commission_epic.0001.t: "Uma Epopeia Familiar"
 commission_epic.0001.desc: "O que eu preciso é de um conto clássico sobre a grandiosidade da minha família. Um [ROOT.Char.Custom('CompositionType')] sobre as origens da Dinastia [ROOT.Char.GetDynasty.GetBaseName] e como estamos destinados à grandeza!\n\nEu só preciso de alguém que saiba contar uma história..."
 commission_epic.0001.a: "[writer.GetTitledFirstNameNoTooltip|l], narrador célebre[writer.Custom('ES_XA')]!"
 writer_writes_epic: "[writer.GetTitledFirstName], narrador[writer.Custom('ES_XA')], compõe a epopeia"
 commission_epic.0001.b: "Vou reunir alguns dos meus melhores [ROOT.Char.Custom('CommissionEpicScribes')]."
 scribes_write_epic: "Meus escribas compõem a epopeia"
 bards_write_epic: "Meus bardos compõem a epopeia"
 commission_epic.0001.c: "Será que não poderia fazê-lo um[servant.Custom('ES_XA')] vulgar [servant.Custom('GenderedLowlyServantType')] qualquer um?"
 servant_writes_epic: "[servant.GetTitledFirstName], servo, compõe a epopeia"
 commission_epic.0001.d: "Pensando melhor..."
 commission_epic.writing_begins: "A composição começa..."
 commission_epic.high_chance: "Alta chance de uma [exceptional_epic|lE]"
 commission_epic.medium_chance: "Chance imprevisível de uma [exceptional_epic|lE]"
 commission_epic.low_chance: "Baixa chance de uma [exceptional_epic|lE]"
 commission_epic.opt_out: "Por enquanto, não vou escrever uma Epopeia Familiar"
 commission_epic.reduced_chance: "Chance reduzida de produzir uma [exceptional_epic|lE]"
 commission_epic.increased_chance: "Chance aumentada de produzir uma [exceptional_epic|lE]"
 commission_epic.0002.t: "Epopeia Familiar: Perspectiva"
 commission_epic.0002.writer: "Minha Epopeia Familiar parece estar progredindo bem, e algumas linhas já soam como se fossem citadas por décadas, mas [writer.GetTitledFirstName|l] tem muitas perguntas sobre o foco da história.\n\nSeria mais fácil responder se primeiro a escrevesse por inteiro. Então eu poderia lhe dizer o que não gosto nela. Mas insiste que precisa de respostas agora."
 commission_epic.0002.servant: "[servant.GetFirstName], o servo a quem ordenei trabalhar na história da minha família parece estar com um pouco de dificuldade, embora o fato de estar fazendo algum progresso já seja bastante impressionante, já que não sabe nem ler nem rimar.\n\nNo entanto, ele trabalha dia e noite e agora veio me procurar com uma pergunta importante. "Sobre o que exatamente deve ser, [ROOT.Char.Custom('FormOfAddressForLiege')]?""
 commission_epic.0002.scribes: "Meus [ROOT.Char.Custom('CommissionEpicScribes')] começaram a trabalhar na minha epopeia familiar, mas já encontraram alguns problemas. Não conseguem chegar a um acordo sobre em que a história deve se concentrar e, coincidentemente, cada [ROOT.Char.Custom('CommissionEpicScribe')] insiste que sua própria área de responsabilidade deve ser a mais enfatizada.\n\n"Não queremos impor, [ROOT.Char.Custom('FormOfAddressForLiege')], mas #EMP tenéis#! têm que resolver isso antes de nos fazermos em pedaços!"."
 commission_epic.0002.iberia_epic.a: "Escreva sobre o direito da minha dinastia de governar a Ibéria!"
 commission_epic.0002.a: "Enfoque nas histórias das reivindicações ancestrais da minha dinastia"
 commission_epic.propaganda: "Ganharei [claims|lE] em títulos vizinhos quando a epopeia estiver pronta"
 commission_epic.0002.b: "Deve se concentrar em mim e no meu destino, é claro!"
 commission_epic.more_prestige: "Ganharei mais [prestige|lE] pessoal quando a epopeia estiver pronta"
 commission_epic.0002.c: "Es una crónica #EMP familiar#!, así que quiero generosidad."
 commission_epic.more_dynasty_prestige: "Ganharei mais [dynasty_prestige|lE] quando a epopeia estiver pronta"
 commission_epic.0002.d: "Conte a história o mais verdadeiramente possível."
 commission_epic.more_piety: "Também ganharei um pouco de [piety|lE] quando a epopeia estiver pronta"
 commission_epic.1001.t: "Epopeia Familiar: Uma Questão de Tempo"
 commission_epic.1001.opening: "Não tenho recebido novos trabalhos para minha epopeia familiar há semanas, e todo o processo está demorando demais ou"
 commission_epic.1001.composer: "[composer.GetFirstName] está fazendo um trabalho de má qualidade! É realmente pedir demais que me entregue excelência, e que o faça agora?"
 commission_epic.1001.scribes: "meus [ROOT.Char.Custom('CommissionEpicScribes')] acabam fazendo um trabalho de baixa qualidade! É pedir demais que eles entreguem excelência e que entreguem rápido?"
 commission_epic.1001.a: "Quero que seja bom e quero isso #EMP agora!#!"
 commission_epic.1001.b: "Vou aguentar [ROOT.Char.Custom2('CommissionEpicComposerThem', composer)] pelo tempo que for necessário."
 commission_epic.1001.b_scribes: "Vou aguentar [ROOT.Char.Custom('CommissionEpicComposerThem')|U] pelo tempo que for necessário."
 commission_epic.1001.c: "Agora, se dividirmos o que já está pronto em Parte 1..."
 commission_epic.1002.t: "Epopeia Familiar: Material Fonte Rico"
 commission_epic.1002.composer: "[composer.GetTitledFirstName] está contando a [powerful_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)] certos detalhes empolgantes que descobriu sobre meus antepassados. "Bem, acredito que a parte com o [ROOT.Char.Custom('CompositionDetail')] pode realmente ser verdade, porque…"\n\nFascinante, sem dúvida, mas não tem uma grande [ROOT.Char.Custom('CompositionType')] para concluir? E quanto a essa anedota em particular…"
 commission_epic.1002.scribes: "Alguns dos meus escribas estão contando a [powerful_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)] certos detalhes empolgantes que descobriram sobre meus antepassados.\n\n\"Bom, acho que o lance do [ROOT.Char.Custom('CompositionDetail')] pode até ser verdade, porque…\"\n\nFascinante, sem dúvida, mas eles não têm uma grande [ROOT.Char.Custom('CompositionType')] para terminar? E quanto a essa anedota em particular…"
 commission_epic.1002.a: "Deveria ser compartilhado com todos os meus vassalos!"
 commission_epic.1002.a.tt: "Ao concluir, você receberá um [artifact|lE] em forma de épico familiar que melhorará a [opinion|lE] de seus [Concept( 'vassal', 'vasallos' )|E]"
 commission_epic.1002.b: "Coloque-o na [ROOT.Char.Custom('CompositionType')] para que seja concluído mais rapidamente!"
 commission_epic.1002.b.tt: "O que também significa que posso reduzir o pagamento do salário!"
 commission_epic.1003.t: "Epopeia Familiar: Retiro do Escritor"
 commission_epic.1003.composer: "Pegaram [composer.GetTitledFirstName|l] tentando escapar de seus deveres! Por sorte, um guarda [composer.Custom('ES_LoLa')] o reconheceu quando passava pelo portão.\n\n“É um trabalho exaustivo”, defende-se. “Dia e noite, minha benevol[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLadyLord]! Estou desesperado por alguns dias de descanso.”"
 commission_epic.1003.scribes: "Alguns dos meus escribas foram pegos tentando fugir de seus deveres com a minha epopeia familiar! Felizmente, um guarda os reconheceu quando passavam pelos portões.\n\n“É um trabalho exaustivo”, explicam. “Dia e noite, [ROOT.Char.Custom('FormOfAddressForLiege')]! Precisamos desesperadamente de alguns dias de descanso”."
 commission_epic.1003.a: "Muito bem, talvez uma pausa seja necessária."
 commission_epic.1003.b: "Acorrente[ROOT.Char.Custom2('CommissionEpicComposerThem', composer)] a [ROOT.Char.Custom2('CommissionEpicComposerTheir', composer)] mesa de trabalho!"
 commission_epic.1003.b_scribes: "Acorrentem[ROOT.Char.Custom('CommissionEpicComposerThem')] à sua mesa de trabalho!"
 commission_epic.1004.t: "Epopeia Familiar: Iluminador Especialista"
 commission_epic.1004.opening: "Chegou até mim a notícia de que um"
 commission_epic.1004.devotee_male: "[ROOT.Char.GetFaith.DevoteeMale]"
 commission_epic.1004.devotee_female: "[ROOT.Char.GetFaith.DevoteeFemale]"
 commission_epic.1004.ending: "renomado por suas ilustrações está hospedado em uma cidade em [barony.GetNameNoTier]. Com minha epopeia familiar progredindo, este pode ser o momento ideal para pensar em como as páginas devem ficar quando tudo estiver concluído."
 commission_epic.1004.a: "Contrate o iluminador, custe o que custar!"
 commission_epic.1004.b: "[composer.GetTitledFirstNameNoTooltip|l] pode fazer isso [writer.Custom('ES_ElElla')][composer.Custom('ES_OA')]."
 commission_epic.1004.b_scribes: "Meus [ROOT.Char.Custom('CommissionEpicScribes')] podem fazer isso eles mesmos."
 commission_epic.1004.success: "Ilustrações excelentes"
 commission_epic.1004.failure: "Ilustrações ruins"
 commission_epic.1004.c: "Sempre me considerei um[ROOT.Char.Custom('ES_OA')] artista…"
 commission_epic.1005.t: "Epopeia Familiar: A Canção do Nosso Povo"
 commission_epic.1005.opening: "Eu reflito sobre as últimas linhas"
 commission_epic.1005.composer: "[composer.GetFirstName] tem"
 commission_epic.1005.scribes: "meus [ROOT.Char.Custom('CommissionEpicScribes')] têm"
 commission_epic.1005.ending: "me proporcionado em minha epopeia familiar, e enquanto começo a cantarolar, percebo que segue o mesmo ritmo de uma das músicas favoritas de meu povo!\n\nSe a história de meus antepassados fosse encaixada nessa melodia memorável, certamente nunca seria esquecida!"
 commission_epic.1005.a: "Deveria ter pedido isso desde o início!"
 commission_epic.1005.b_composer: "Tenho certeza de que [ROOT.Char.Custom2('CommissionEpicComposer', composer)] pode criar algo igualmente bom."
 commission_epic.1005.b: "Tenho certeza de que [ROOT.Char.Custom('CommissionEpicComposer')] pode criar algo igualmente bom."
 commission_epic.1005.classic: "Melodia Clássica Composta"
 commission_epic.1005.enjoyable: "Melodia Agradável Composta"
 commission_epic.1005.terrible: "Melodia Terrível Composta"
 commission_epic.1006.opening: "[vassal.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 commission_epic.1006.desc: "Tenho [ROOT.Char.Custom('CompositionTypeActionPast')] partes de vossa nova epopeia familiar, e a verdadeira lealdade causada pela profunda amizade entre estes heróis lendários me inspira.\n\nSeria uma honra chamá-lo amig[ROOT.Char.Custom('ES_OA')] meu/minha, a quem sirvo lealmente."
 commission_epic.1006.a: "Você sempre foi meu amig[vassal.Custom('ES_OA')], [vassal.GetFirstNameNoTooltip]!"
 commission_epic.1006.b: "Sua lealdade deve ser garantida, não importa o quê."
 commission_epic.1007.opening: "[vassal.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 commission_epic.1007.desc: "Eu [ROOT.Char.Custom('CompositionTypeActionPast')] partes da sua nova epopeia familiar, e estou abalado por como ela ignora as contribuições dos meus próprios antepassados!\n\nEsse desrespeito é a gota d'água. Está claro que você carrega nada além de má vontade para comigo e minha família!"
 commission_epic.1007.a: "Como você se atreve a falar assim com o seu suserano?!"
 commission_epic.1007.b: "Peço desculpas, sua família, é claro, será incluída!"
 commission_epic.2001.t: "Epopeia Familiar: Precedência"
 commission_epic.2001.desc_composer: "[steward.Custom2('MyCharacterIntroduction', ROOT.Char)|U] vem até mim, animad[steward.Custom('ES_OA')] com as notícias. "Tenho estado [ROOT.Char.Custom('CompositionTypeActionPP')] a última parte da vossa epopeia familiar, e [ROOT.Char.Custom2('CommissionEpicComposer', composer)] [ROOT.Char.Custom2('CommissionEpicComposerHasHave', composer )] descobriu algo muito interessante!"."
 commission_epic.2001.desc_scribes: "[steward.Custom2('MyCharacterIntroduction', ROOT.Char)|U] vem até mim, empolgad[steward.Custom('ES_OA')] com as notícias. "Tenho estado [ROOT.Char.Custom('CompositionTypeActionPP')] a última parte da sua epopeia familiar, e [ROOT.Char.Custom('CommissionEpicComposer')] [ROOT.Char.Custom('CommissionEpicComposerHasHave')] descobriu algo muito interessante!""
 commission_epic.2001.desc: "\n\nParece que não estava previsto que o [county.GetName] permanecesse de forma permanente nas mãos da Casa de [vassal.GetHouse.GetName]. Eu poderia fazer uma reivindicação razoável contra [vassal.GetTitledFirstName|l]!"
 commission_epic.2001.a: "Se é legitimamente meu, eu farei com que seja meu."
 commission_epic.2001.b: "[vassal.GetFirstNameNoTooltip] certamente gostaria de formalizar a concessão."
 commission_epic.2001.c: "Podemos deixar isso passar."
 commission_epic.2001.c.flavor: "Mas certifique-se de que o [vassal.GetTitleTierName] saiba."
 commission_epic.2002.t: "Epopeia Familiar: Orgulho da Família"
 commission_epic.2002.desc: "[spymaster.Custom2('MyCharacterIntroduction', ROOT.Char)|U] parece ser a última pessoa a ter [ROOT.Char.Custom('CompositionTypeActionPast')] trechos da minha epopeia familiar.\n\n"Vostr[grandparent.Custom('ES_OA')] tatarav[grandparent.Custom('ES_OA')] era uma figura fascinante e cheia de recursos", ele me diz. "Se soubessem que você é sequer metade tão ardiloso quanto [grandparent.Custom('ES_ElElla')], as pessoas pensariam duas vezes antes de agir contra você"."
 commission_epic.2002.a: "O sangue dessa cobra corre em minhas veias!"
 commission_epic.2002.a.tt: "Ao ser concluída, você receberá um livro da Epopeia Familiar como um [artifact|lE] que melhora a [hostile_scheme_resistance|lE]"
 commission_epic.2002.b: "Ou afirmamos que [grandparent.Custom('ES_ElElla')] foi honrad[grandparent.Custom('ES_OA')] e íntegro[grandparent.Custom('ES_OA')]..."
 commission_epic.2003.t: "Epopeia Familiar: Obrigações Eternas"
 commission_epic.2003.desc: "Parece que [court_chaplain.GetFirstName] esteve [ROOT.Char.Custom('CompositionTypeActionPP')] partes da minha nova epopeia familiar. É claro que descobriu "discrepâncias" entre promessas feitas no passado e a nossa realidade atual.\n\nSei que não vai deixar isso de lado tão cedo. "Certamente você consegue ver como seria sábio e benéfico cumprir a promessa dos seus antepassados, mesmo agora?""
 commission_epic.2003.a_same_dynasty: "Ambos sabemos que nossa dinastia cumpre suas promessas."
 commission_epic.2003.a: "Eu pertenço a uma longa linhagem de cumpridores de promessas."
 commission_epic.2003.b: "Meus ancestrais eram [ROOT.Char.Custom('GetPiousBelievers')], mas não necessariamente sábios."
 commission_epic.2004.t: "Epopeia Familiar: A Inspiração Chega"
 commission_epic.2004.desc_scribes: "[ROOT.Char.Custom('CommissionEpicComposer')|U] [ROOT.Char.Custom('CommissionEpicComposerHasHave')] tomado algumas..."
 commission_epic.2004.desc_composer: "[ROOT.Char.Custom2('CommissionEpicComposer', composer)] [ROOT.Char.Custom2('CommissionEpicComposerHasHave', composer )] tomado algumas..."
 commission_epic.2004.desc: "liberdades em minha epopeia familiar no que diz respeito às guerras e batalhas. As cenas ficam dramáticas, mas me preocupa que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('marshal'))] tenha se sentido ofendid[marshal.Custom('ES_OA')], ao ver como franze a testa diante de uma cena em particular.\n\nQuando enfim compartilha comigo sua opinião, sinto certo alívio. "É tudo bobagem, mas esta parte do [ROOT.Char.Custom('CompositionDetail')] me deu algumas ideias…"
 commission_epic.2004.a: "Onde quer que a inspiração possa ser encontrada, devemos usá-la!"
 commission_epic.2004.a.tt: "Ao ser concluída, você receberá um livro da Epopeia Familiar como um [artifact|lE] que melhora a [advantage|lE] em combate"
 commission_epic.2004.b: "Explique-me detalhadamente..."
 commission_epic.2005.t: "Epopeia Familiar: Honestidade e Percepção"
 commission_epic.2005.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('chancellor'))], [chancellor.GetTitledFirstName|l] está [ROOT.Char.Custom('CompositionTypeActionPP')] minha epopeia familiar enquanto vai tomando forma.\n\n“Muita coisa não é muito plausível, como a parte com o [ROOT.Char.Custom('CompositionDetail')]”, me diz [chancellor.GetFirstName]. “Por outro lado, quem pode dizer como era o passado? Se você já está embelezando, por que não levar isso o mais longe possível?”"
 commission_epic.2005.a: "É importante contarmos uma boa história, afinal..."
 commission_epic.2005.b: "Não, ela deve ser o mais fiel possível à realidade."
 commission_epic.2005.b.tt: "Ao ser concluída, você receberá um livro da Epopeia Familiar como um [artifact|lE] que melhora a [success_chance|lE] em [personal_scheme|lE]"
 commission_epic.2006.t: "Epopeia Familiar: Ligados pela Fé"
 commission_epic.2006.desc: "Não sei se sentir alívio ou desconcerto com o entusiasmo que demonstra meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_chaplain'))], [court_chaplain.Custom('ES_ElLa')] [court_chaplain.GetTitledFirstName|l], depois de ter [ROOT.Char.Custom('CompositionTypeActionPP')] as partes concluídas da minha epopeia familiar.\n\n"É uma narrativa com uma moral maravilhosa!", afirma. "A dinastia [ROOT.Char.GetDynasty.GetBaseName] conhece a grandeza sempre que se deixa aconselhar por [ROOT.Char.GetFaith.AltPriestTermPlural], e tempos sombrios acontecem quando ignora esses conselhos! Espero que seja uma lição que você também saiba escutar.""
 commission_epic.2006.a: "De fato, eu conheço isso muito bem."
 commission_epic.2006.a.tt: "Ao ser concluída, você receberá um livro da Epopeia Familiar como um [artifact|lE] que aumenta [piety|lE] e o mesmo imposto da [faith|lE]"
 commission_epic.2006.b: "Hah! É o contrário disso."
 commission_epic.2006.b.flavor: "Sempre lideramos o caminho para os [ROOT.Char.GetFaith.AltPriestTermPlural]."
 commission_epic.2006.c: "Ambos sabemos que a família vem em primeiro lugar em todas as coisas."
 commission_epic.2006.c.same_dynasty: "Esta opção está disponível porque [court_chaplain.GetFirstNameNoTooltip] é da mesma [dynasty|lE] que eu"
 commission_epic.6001.t: "Algumas Pequenas Exagerações"
 commission_epic.6001.writerservant: "Depois de trabalhar um tempo na minha crônica, [composer.GetName] vem me procurar.\n\n"[Select_CString(ROOT.Char.IsFemale,'Minha senhora','Meu senhor')]", diz, "devo confessar que, embora a vossa dinastia seja de fato grandiosa, os direitos ancestrais que esperáveis encontrar talvez não sejam… tão fáceis de corroborar. Preciso de mais tempo e recursos para vasculhar mais a fundo os textos antigos. Caso contrário, terei de fazer algumas #italic florituras#! nas histórias, e vossos direitos podem acabar parecendo menos convincentes…""
 commission_epic.6001.scribes: "Meus escribas têm trabalhado dia e noite vasculhando manuscritos antigos, buscando encontrar reivindicações territoriais dos meus antepassados para exaltá-las na crônica.\n\n"Ai", dizem, "talvez tenhamos que fazer alguns pequenos enfeites quando se trata da... verdade deste assunto, dos feitos e domínios de vossos antepassados, e assim por diante. Certamente entendeis, [Select_CString(ROOT.Char.IsFemale,'minha senhora','meu senhor')]?""
 commission_epic.6001.a: "Exagere o que quiser, apenas termine isso!"
 commission_epic.6001.b: "Apenas pegue meu ouro e faça mais pesquisas."
 commission_epic.less_credible: "A crônica será menos confiável"
 commission_epic.more_credible: "A crônica pode se tornar mais confiável"
 commission_epic.6003.t: "Reivindicações Geladas"
 commission_epic.6003.writer: "[composer.GetName] tem trabalhado diligentemente em minha crônica, que se torna cada vez mais grandiosa e questionável em igual medida.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", diz, "encontrei um antigo texto em farrapos onde se menciona que [Select_CString(ancestor_1.IsFemale,'uma rainha','um rei')] chamado [ancestor_1.GetFirstNameNoTooltip] reinou outrora em [neighboring_county_1.GetNameNoTier], [neighboring_county_2.GetNameNoTier] e [neighboring_county_3.GetNameNoTier]. Eu poderia me aprofundar nas tábuas genealógicas e fazer algumas #italic adições criativas#!, para estabelecer que era [Select_CString(ancestor_1.IsFemale,'antepassada vossa','antepassado vosso')]. Então, poderia usar sua história para conceder-vos reivindicações mais ou menos críveis sobre algumas dessas terras, ou até mesmo sobre todas elas...""
 commission_epic.6003.servant: "[composer.GetName] tem trabalhado diligentemente na minha crônica, cada vez mais duvidosa.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", diz, "encontrei uma inscrição votiva desgastada de [ancestor_1.GetFirstNameNoTooltip] [Select_CString(ancestor_1.IsFemale,'a Caçadora','o Cotoco')], [Select_CString(ancestor_1.IsFemale,'rainha','rei')] de [neighboring_county_1.GetNameNoTier], [neighboring_county_2.GetNameNoTier] e [neighboring_county_3.GetNameNoTier] em tempos remotos. Eu poderia fazer alguns acréscimos criativos à sua árvore genealógica, para estabelecer que era [Select_CString(ancestor_1.IsFemale,'vossa antepassada','vosso antepassado')]. Depois, na crônica, eu poderia fazer alguns pequenos enfeites e et cetera, para estabelecer firmemente sua reivindicação sobre algumas dessas terras, ou até mesmo sobre todas elas.""
 commission_epic.6003.scribes: "Meus escribas têm trabalhado arduamente nesta minha crônica cada vez mais intrincada.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", dizem, "encontramos uma nota marginal em um manuscrito antigo, referindo-se a um[ancestor_1.Custom('ES_XA')] [ancestor_1.GetWomanMan] de nome [ancestor_1.GetFirstNameNoTooltip] [Select_CString(ancestor_1.IsFemale,'a Generosa','o Caolho')], que tinha certa influência em [neighboring_county_1.GetNameNoTier], [neighboring_county_2.GetNameNoTier] e [neighboring_county_3.GetNameNoTier] em tempos remotos. Poderíamos nos aprofundar nas tabelas genealógicas para #italic afirmar#! criativamente que era [Select_CString(ancestor_1.IsFemale,'vossa antepassada','vosso antepassado')]. Então, na crônica, poderíamos usar isso para corroborar o vosso direito de governar algumas dessas terras, ou até mesmo todas elas...""
 commission_epic.6003.a: "Todas elas!"
 commission_epic.6003.b: "[neighboring_county_1.GetNameNoTierNoTooltip] parece bom nesta época do ano!"
 commission_epic.6003.c: "[neighboring_county_2.GetNameNoTierNoTooltip] é o que eu quero!"
 commission_epic.6003.d: "[neighboring_county_3.GetNameNoTierNoTooltip] deve ser meu."
 commission_epic.paranoid_neighbors: "Seus vizinhos ficarão muito chateados quando souberem dessa crônica"
 commission_epic.6004.t: "Reivindicações Confiáveis"
 commission_epic.6004.writerservant: "[composer.GetName] tem trabalhado diligentemente em minhas crônicas, que a cada dia se tornam maiores em escopo e volume.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", diz, "encontrei um antigo documento sobre tributos e direitos sobre a terra, uma leitura bastante tediosa, mas ele mencionava a [Select_CString(ancestor_1.IsFemale,'uma dama','um senhor')] chamado [ancestor_1.GetFirstNameNoTooltip] [Select_CString(ancestor_1.IsFemale,'a Alta','o Calvo')], que governou [neighboring_county_1.GetNameNoTier] e [neighboring_county_2.GetNameNoTier] nos tempos antigos. Consegui rastrear sua linhagem desde a Antiguidade até vós! Assim, posso conceder-vos reivindicações sobre qualquer uma dessas terras, tão críveis que ninguém pode contestá-las.""
 commission_epic.6004.scribes: "Meus escribas têm trabalhado arduamente em minha crônica, que, com o passar dos dias, se torna mais longa e extensa.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", dizem, "encontramos um foral real de origem muito antiga que concede o governo sobre [neighboring_county_1.GetNameNoTier] e [neighboring_county_2.GetNameNoTier] a [Select_CString(ancestor_1.IsFemale,'uma dama','um senhor')] de nome [ancestor_1.GetFirstNameNoTooltip] [Select_CString(ancestor_1.IsFemale,'a Boa','o Afortunado')]. Graças à orientação de [ROOT.GetCharacter.GetFaith.HighGodName], conseguimos remontar vossa linhagem até [ancestor_1.GetSheHe], e nos certificamos de que assim constasse na crônica. Qualquer uma dessas terras vos pertenceria legitimamente.""
 commission_epic.6004.a: "Por que não as duas?"
 commission_epic.6004.b: "[neighboring_county_1.GetNameNoTierNoTooltip] certamente faz parte da minha herança."
 commission_epic.6004.c: "Sempre senti que [neighboring_county_2.GetNameNoTierNoTooltip] deveria me pertencer!"
 commission_epic.6005.t: "Uma Épica Inacabada"
 commission_epic.6005.writerservant: "Há muito tempo suspeito que algo não vai bem com a minha crônica e, de fato, [composer.GetName] vem me procurar com um semblante preocupado.\n\n“Ai, [ROOT.Char.Custom('FormOfAddressForLiege')]”, diz ele, “por mais que eu tenha tentado, não consegui encontrar nenhuma história de reivindicações boa o bastante para sustentá-las. Não posso continuar este trabalho. Ainda assim, produzi uma crônica que exalta as virtudes da sua dinastia. Por favor, contente-se com isso e não me puna por meu fracasso...”."
 commission_epic.6005.scribes: "Meus escribas parecem ter lutado com minha crônica e, de fato, eles agora me procuram com uma expressão preocupada.\n\n\"Infelizmente\", eles dizem, \"não conseguimos encontrar nenhuma história de reivindicações suficientemente boas para sustentar. Tentamos, mas estava além de nossa capacidade. No entanto, produzimos uma crônica que exalta as virtudes de sua dinastia. Por favor, esteja satisfeito com isso e não nos puna por nosso fracasso...\""
 commission_epic.6005.a: "Para a masmorra com vocês!"
 commission_epic.6005.b: "Seus incompetentes..."
 commission_epic.6005.c: "Será que [ROOT.GetCharacter.GetFaith.HighGodName] está me punindo por minha vaidade?"
 commission_epic.6005.d: "Pelo menos consegui uma crônica..."
 commission_epic.6006.t: "Propaganda Potente"
 commission_epic.6006.writerservant: ""Já está pronta, meu [ROOT.Char.GetLadyLord]", me anuncia [composer.GetName] com certo alívio ao me entregar um grande tomo.\n\n"Esta é a crônica da casa [ROOT.Char.GetDynastyHouseNameNoTooltip], que descreve em grande detalhe a história de seu governo nas várias terras que desejáveis. Certamente, agora ninguém poderá contestar os vossos justos direitos!"."
 commission_epic.6006.scribes: "Por fim, meus escribas terminaram a crônica de propaganda. Eles parecem aliviados ao me entregar um livro tremendamente grande.\n\nEis aqui, [Select_CString(ROOT.Char.IsFemale,'minha senhora','meu senhor')], a grande crônica da casa [ROOT.Char.GetDynastyHouseNameNoTooltip] que detalha todas as suas reivindicações. Que ela lhe traga grande fortuna."
 commission_epic.6006.a: "Perfeito!"
 propaganda_chronicle_name: "Crônica de Propaganda da Casa [ROOT.Char.GetDynastyHouseNameNoTooltip]"
 propaganda_chronicle_desc: "Este volume ponderoso elabora em detalhes dolorosos sobre a glória da Casa [ROOT.Char.GetDynastyHouseNameNoTooltip] e suas várias reivindicações territoriais, mais ou menos bizarras."
 half_baked_propaganda_chronicle_name: "Crônica de Propaganda Inacabada"
 half_baked_propaganda_chronicle_desc: "Este livro poderia ter vivido na infâmia se tivesse sido concluído. Como está, ele não consegue convencer nenhum leitor sobre as reivindicações territoriais que seu patrono buscava, em vez disso, exalta poeticamente as supostas virtudes da dinastia [ROOT.Char.GetDynastyNameNoTooltip]."
 commission_epic.9001.t: "Uma Épica Familiar"
 commission_epic.9001.writer: "A [ROOT.Char.Custom('CompositionType')] épica da minha família está finalmente concluída, e [composer.GetTitledFirstName|l] tem motivos para se orgulhar[composer.Custom('ES_OA')]!"
 commission_epic.9001.servant: "Parece que foi sábio escolher a [composer.GetTitledFirstName|l] para escrever a [ROOT.Char.Custom('CompositionType')] de minha família. Apesar de seus desafios, a obra concluída é bastante impressionante."
 commission_epic.9001.scribes: "A [ROOT.Char.Custom('CompositionType')] épica de minha família está finalmente completa, e meus [ROOT.Char.Custom('CommissionEpicScribes')] têm motivo para se orgulhar!"
 commission_epic.9001.conclusion: "\n\nMeus ancestrais estão no cerne dessa história como um exemplo brilhante do que significa ser um governante em nosso tempo, mesmo que em alguns lugares seja arrastada e a parte com o [ROOT.Char.Custom('CompositionDetail')] seja absolutamente ridícula. Ainda assim, tenho orgulho de guardar isso em minha biblioteca familiar, para que as gerações futuras possam desfrutar e aprender com ela."
 commission_epic.9001.a: "Que história incrível a história pode contar."
 commission_epic.9002.t: "Uma Épica Excelente"
 commission_epic.9002.writer: "[composer.GetTitledFirstName] concluiu minha epopeia familiar, e que [ROOT.Char.Custom('CompositionType')] mais gloriosa compôs!"
 commission_epic.9002.scribes: "Meus [ROOT.Char.Custom('CommissionEpicScribes')] concluíram minha épica familiar, e que gloriosa [ROOT.Char.Custom('CompositionType')] eles compuseram!"
 commission_epic.9002.conclusion: "\n\nTem alto drama, dilemas morais e duelos tensos. Tudo pelo que minha família foi forjada está lá! Mesmo a parte com o [ROOT.Char.Custom('CompositionDetail')], aparentemente tão improvável, tornou-se um momento emocionante que delineia o destino da minha Casa!"
 commission_epic.9002.a: "Esta pode ser a maior [ROOT.Char.Custom('CompositionType')] já escrita!"
 commission_epic.9101.t: "Épica Familiar: Um Trabalho Concluído"
 commission_epic.9101.desc: "Depois de todo o tempo que [composer.GetTitledFirstName|l] passou em minha corte e o quão bem chegou a me conhecer, parece estranho que esteja prestes a partir.\n\n\"Tenho outros lugares para ir, e outras histórias que precisam ser contadas\", tenta explicar."
 commission_epic.9101.a: "Suponho que seja um adeus."
 commission_epic.9101.b: "Ainda há muito aqui para você!"
 commission_epic.9101.c: "Também preciso de você. Aqui."
 commission_epic.9101.d: "Enquanto você continuar escrevendo para mim!"
 commission_epic.9101.d.tt: "[composer.GetTitledFirstName] deixará sua corte"
 commission_epic.9102.t: "Épica Familiar: Servidão"
 commission_epic.9102.desc: "[composer.GetTitledFirstName] demonstrou ser muito mais capaz do que eu esperaria de um[composer.Custom('ES_XA')] simples servo. Se eu não soubesse mais, poderia pensar que vinha de uma linhagem de poetas!\n\nDepois de todo o tempo que passamos juntos, parece estranho que ele tenha de voltar a cavar a terra, ou o que quer que fosse que costumava fazer antes."
 commission_epic.9102.a: "[composer.Custom('ES_ElElla')|U] deve sair pelo mundo."
 commission_epic.9102.a.flavor: "Vamos ver se consegue fazer algo por si mesm[composer.Custom('ES_OA')]"
 commission_epic.9102.b: "Tenho certeza de que posso encontrar alguma utilidade para [composer.Custom('ES_ElElla')]."
 commission_epic.9102.c: "Por mais estranho que pareça, quero manter[composer.Custom('ES_LoLa')] perto."
 commission_epic.9103.desc: "Depois de todo o tempo que [composer.GetTitledFirstName|l] passou em minha corte e o quanto chegou a me conhecer, está claro que ele não vai a lugar nenhum.\n\n[composer.GetFirstNameNoTooltip] concorda. \"Tenho muitas histórias ainda para contar, e parece certo que eu deva continuar contando-as aqui\"."
 commission_epic.9103.a: "Você continuará a me servir com honra."
 commission_epic.9104.desc: "Depois de todo o tempo que [composer.GetTitledFirstName|l] passou em minha corte e o quanto chegou a me conhecer, parece estranho que não esteja aqui para ver a recepção de sua obra.\n\nJá estão o [ROOT.Char.Custom('CompositionTypeActionPP')] eruditos e crianças por igual, e até eu acho que é uma inspiração."
 commission_epic.9104.a: "Pelo menos não foi embora para sempre!"
 commission_epic.9104.b: "Assim é a vida, às vezes."
 commission_epic.9104.b.flavor: "[ROOT.Char.Custom('CompositionTypeActionPP')|U] a história, me pergunto algo. Será que [composer.GetFirstNameNoTooltip] sabia que acabaria assim?"
 commission_epic.9998.t: "Épica Familiar: Um Incômodo"
 commission_epic.9998.imprisoned_by_me: "Com [composer.GetTitledFirstName|l] está em meu calabouço,"
 commission_epic.9998.imprisoned: "Com [composer.GetTitledFirstName|l] aprisionad[composer.Custom('ES_OA')],"
 commission_epic.9998.incapacitated: "Com [composer.GetTitledFirstName|l] em seu estado atual,"
 commission_epic.9998.left_court: "Com [composer.GetTitledFirstName|l] fora já de minha corte,"
 commission_epic.9998.ending: "é difícil que possa continuar seu trabalho na minha epopeia familiar.\n\nFelizmente, meus [ROOT.Char.Custom('CommissionEpicScribes')] estarão prontos para assumir a tarefa."
 commission_epic.9998.a: "Tenho certeza de que eles se sairão bem o suficiente."
 commission_epic.9998.tt: "O trabalho continua"
 commission_epic.9999.t: "Épica Familiar: O Fim"
 commission_epic.9999.murdered_by_me: "Considerando as medidas drásticas que tive de tomar com [composer.GetTitledFirstName|l], parece que, no fim das contas, nunca foi uma boa escolha para compor a epopeia da minha família.\n\nFelizmente, meus [ROOT.Char.Custom('CommissionEpicScribes')] são bastante capazes de terminá-la sozinhos."
 commission_epic.9999.died: "Com a morte d [composer.GetTitledFirstName|l], minha épica familiar permanece incompleta.\n\nSerá uma tarefa difícil, mas meus [ROOT.Char.Custom('CommissionEpicScribes')] terão que continuar os esforços."
 commission_epic.9999.a: "Sua obra será concluída."
