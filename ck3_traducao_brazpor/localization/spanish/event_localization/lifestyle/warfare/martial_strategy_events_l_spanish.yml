l_spanish:
 #Well-known commander, by Sean Hughes
 martial_strategy.1051.t: "Fofocas Gerais"
 martial_strategy.1051.desc: "O tópico de conversa mais popular na [ROOT.Char.Custom('GetCourt')] está sempre mudando, mas uma tendência recente tem sido a discussão da minha habilidade notável como comandante militar — e qual é o segredo do meu sucesso.\n\nPosso usar essa curiosidade natural para fortalecer minha reputação, mas primeiro devo decidir a que atribuir meu sucesso..."
 martial_strategy.1051.a: "Eu tenho um talento natural que me destaca dos demais."
 martial_strategy.1051.a.humble: "Conhecer meus limites significa que posso contorná-los."
 martial_strategy.1051.b.brave: "Minha coragem inspira minhas tropas a lutar."
 martial_strategy.1051.b.stalwart: "Minha determinação é tal que nunca vou fraquejar!"
 martial_strategy.1051.c.wrathful: "Ninguém pode resistir à minha ferocidade avassaladora!"
 martial_strategy.1051.c.feareater: "Minha mera presença causa medo nos meus inimigos!"
 martial_strategy.1051.d.zealous: "Minha devoção a [ROOT.GetCharacter.GetFaith.HighGodName] me garante a vitória."
 martial_strategy.1051.d.sadistic: "Sempre atinjo meus inimigos onde mais dói."
 martial_strategy.1051.d.zealoussadistic: "Não descanso em minha cruzada contra os ímpios!"
 martial_strategy.1051.e.patient: "Estou sempre vigilante, esperando minha chance de atacar."
 martial_strategy.1051.f.ambitious: "¡Haré #EMP lo haga falta#! para conseguir la victoria!"
 #Translate old texts (Learning skill challenge), Mathilda Bjarnehed
 martial_strategy.2000.t: "Lições do Passado"
 martial_strategy.2000.start.desc: "Embora eu vá certamente ver muitos campos de batalha antes de encontrar meu criador, minha biblioteca contém contos de guerra de cem vidas.\n\nRecentemente, adquiri um livro sobre a grande"
 martial_strategy.2000.hastings.desc: "batalha de Hastings,"
 martial_strategy.2000.tours.desc: "batalha de Tours,"
 martial_strategy.2000.palaceofthemartyrs.desc: "batalha do Palácio dos Mártires,"
 martial_strategy.2000.catalaunianplains.desc: "batalha das Planícies Cataláunicas,"
 martial_strategy.2000.constantinople.desc: "cerco de Constantinopla,"
 martial_strategy.2000.vapati.desc: "batalha de Vapati,"
 martial_strategy.2000.end.desc: "bem como um pergaminho antigo escrito em uma língua antiga. Quem sabe quais segredos esquecidos ele guarda..."
 martial_strategy.2000.a: "Leia o livro mais recente."
 martial_strategy.2000.b: "Tente traduzir o pergaminho antigo."
 martial_strategy.2000.b.success: "Descubro um pedaço de conhecimento antigo"
 martial_strategy.2000.b.success.tt: "Você ganha #P 1#! de [Concept( 'martial', 'marcialidad' )|E] e #P 1#! de [learning|lE] e um bônus de [commander|lE] durante #V 20 años#!"
 martial_strategy.2000.b.failure: "Falho em decifrar o pergaminho"
 martial_strategy.2000.b.failure.tt: "Você deve ganhar [stress|lE] ou desistir"
 martial_strategy.2001.start.desc: "Mesmo com a ajuda de um glossário empoeirado, o pergaminho reluta em compartilhar seus segredos, mas eu persisto. Conforme a noite avança, a história mais incrível se desenrola diante de mim...\n\n"
 martial_strategy.2001.gaixia.desc: "#F O pergaminho descreve a batalha de Gaixia. Han Xin, comandante dos Han, quebrou o espírito do inimigo fazendo seus homens cantarem canções do reino nativo do inimigo, Chu. O comandante Xiang Yu de Chu escapou com uma pequena força de homens leais, mas no final eles foram perseguidos e derrotados!#!"
 martial_strategy.2001.red_cliffs.desc: "#F Na batalha dos Penhascos Vermelhos, o senhor da guerra Cao Cao amarrou seus navios de proa a popa para combater o enjoo. Um comandante das for?as opostas de Sun-Liu, Huang Gai, viu sua chance e enviou uma falsa carta de rendi??o. Ent?o, preparou uma esquadra de navios, enchendo-os de gravetos e ?leos, e deixou que o vento os levasse em dire??o a Cao Cao. Conforme os navios sem tripula??o se aproximavam da frota inimiga, eles foram incendiados, resultando nas mortes ardentes de incont?veis homens.#!"
 martial_strategy.2001.thermopylae.desc: "#F Bloqueando o estreito desfiladeiro costeiro de Termópilas, as tropas gregas, em número muito inferior, resistiram ao exército persa por sete dias. No último dia, quando o rei Leônidas foi contornado, ele dispensou a maior parte de seu exército e defendeu sua retirada em uma última posição gloriosa. O heroísmo de suas tropas é um testemunho do poder de um exército patriótico defendendo suas terras nativas!#!"
 martial_strategy.2001.teutoburg_forest.desc: "#F Arminius, filho de um chefe germânico, foi criado em Roma, mas planejou forjar uma aliança de tribos para derrotar os romanos. Arminius tornou-se oficial do general romano Varus e o aconselhou a fazer um desvio através da Floresta de Teutoburgo. Lá, Arminius lançou uma série de emboscadas. Devido à sua educação romana, Arminius sabia exatamente como combater as táticas inimigas e liderou seu povo para uma vitória decisiva!#!"
 martial_strategy.2001.a: "Estudar a batalha."
 martial_strategy.2001.b: "Concentrar-se no processo de tradução."
 martial_strategy.2002.desc: "A noite cai e a única vela que ilumina o roteiro diante de mim fica cada vez mais curta a cada hora. Quando ela tremula pela última vez e me deixa na escuridão, os segredos do pergaminho permanecem desconhecidos."
 martial_strategy.2002.a: "Avançar."
 martial_strategy.2002.b: "Desistir."
 #Developing cunning/manipulative tactics (Intrigue skill challenge), Sean Hughes
 martial_strategy.2020.t: "Tudo é válido?"
 martial_strategy.2020.opening: "Muitos tratados foram escritos sobre a conduta honrosa na guerra, mas a vida desses autores não estava em jogo quando eles pegaram a caneta para escrever.\n\n"
 martial_strategy.2020.desc: "Se eu quiser maximizar minhas chances de vencer na batalha, pode valer a pena considerar a possibilidade de empregar algumas estratégias mais... unorthodoxas."
 martial_strategy.2020.desc.ambitious: "Para garantir a vitória, preciso aproveitar todas as vantagens que puder no campo de batalha, mesmo que isso signifique usar táticas que possam ser consideradas injustas."
 martial_strategy.2020.desc.martial: "Eu sei por experiência que a melhor maneira de derrotar meus inimigos é garantir que só nos engajemos em batalha em meus termos! A questão é: quais termos seriam mais vantajosos?"
 martial_strategy.2020.desc.deceitful: "Já li poesia comparando o campo de batalha a uma pessoa respirando. Isso me faz pensar... posso manipular o campo de batalha da mesma forma que posso manipular as pessoas?"
 martial_strategy.2020.a: "Vou enganar meus inimigos e fazê-los se estender além do necessário!"
 martial_strategy.2020.a.success: "Minha estratégia funciona com sucesso"
 martial_strategy.2020.a.failure: "Minha estratégia falha, me deixando constrangido"
 martial_strategy.2020.b: "Táticas de ataque e fuga vão desgastar meus inimigos!"
 martial_strategy.2020.d: "Eu não vou recorrer a jogar sujo!"
 martial_strategy.2020.d.brave: "Somente os covardes usariam táticas como essas!"
 martial_strategy.2020.d.flavor: "Rejeitar o uso dessas táticas"
 martial_strategy.2021.t: "Decepção Bem-sucedida"
 martial_strategy.2020.desc.opening: "Reuni meu séquito para uns jogos de guerra, ansios[ROOT.Char.Custom('ES_OA')] por tentar minha ideia de fingir uma retirada para atrair meus oponentes a avançarem demais."
 martial_strategy.2021.desc: "\n\nQuando nos dividimos em equipes, mostrei a todos como ceder terreno suficiente para enganar o outro lado a sair de posição, sem ceder tanto a ponto de romper nossa linha. \n\nMinha nova tática funcionou perfeitamente, permitindo-nos cercar a equipe inimiga e forçá-los a se render!"
 martial_strategy.2021.a: "Aguardo o dia em que poderei usar esse truque em uma batalha real!"
 martial_strategy.2022.t: "Sonhos Desfeitos"
 martial_strategy.2022.desc: "\n\nInfelizmente, quando minha equipe tentou testar minha nova tática, não conseguimos manter nossa posição. Sofremos uma derrota rápida e humilhante quando o lado inimigo rompeu rapidamente nossa linha e fez com que nossas fileiras se desorganizassem.\n\nTodos os que participaram dos jogos agora acham que sou um[ROOT.Char.Custom('ES_XA')] tolo[ROOT.Char.Custom('ES_OA')] e não querem mais saber das minhas «ideias»."
 martial_strategy.2022.b: "Talvez eu deva me ater a táticas convencionais..."
 #Logistics and securing provisions (Stewardship skill challenge), Sean Hughes
 martial_strategy.2030.t: "Segurança de Suprimento"
 martial_strategy.2030.desc.fallback: "Parte de comandar um exército significa garantir que meus soldados tenham comida, bebida e equipamento de acampamento em abundância para campanhas longas."
 martial_strategy.2030.desc.diligent: "Orgulho-me de garantir que tudo esteja sempre contabilizado, o que inclui garantir que meus soldados estejam bem supridos."
 martial_strategy.2030.desc.ambitious: "Não importa o quão formidáveis sejam meus soldados, se eles ficarem sem suprimentos durante uma campanha, eles não me servirão melhor do que esquilos treinados."
 martial_strategy.2030.desc.end: "\n\nPara isso, devo elaborar um plano para garantir que meus soldados sempre tenham os suprimentos de que precisam no campo de batalha."
 martial_strategy.2030.a: "Organizar uma rede de comerciantes para me ajudar."
 martial_strategy.2030.a.success.tt: "Você estabelece uma rede confiável de fornecedores."
 martial_strategy.2030.a.failure.tt: "Os comerciantes que você encontra não são confiáveis."
 martial_strategy.2030.b: "Estocar suprimentos em minha fortaleza."
 martial_strategy.2030.c: "Meus soldados podem buscar seus próprios suprimentos."
 martial_strategy.2031.t: "Uma Rede Confiável"
 martial_strategy.2031.desc: "Depois de examinar pilhas de registros financeiros, consegui selecionar um grupo de comerciantes espalhados pelo campo que eu sabia que seriam confiáveis.\n\nFiz uma oferta para mantê-los contratados para fornecer qualquer suprimento que meu exército precise a qualquer momento. Isso garantirá que meus comandantes sempre saibam a quem recorrer quando precisarem de provisões."
 martial_strategy.2031.a: "Isso fornecerá suprimentos confiáveis para meus exércitos no campo."
 martial_strategy.2031.b: "Agora, é hora de ganhar um pouco por fora..."
 martial_strategy.2032.t: "Suprimentos Desaparecidos"
 martial_strategy.2032.desc: "Entrei em contato com muitos comerciantes disponíveis para ver quem poderia fornecer melhor os suprimentos de que meu exército precisa.\n\nUm comerciante tinha preços muito bons, então fiz arranjos para obter a maioria dos suprimentos do meu exército com ele... mas, quando chegou a hora de pegar o carregamento, ele e suas mercadorias não foram encontrados em lugar nenhum!"
 martial_strategy.2032.a: "Quando eu encontrar esse trapaceiro, vou cortar a cabeça dele!"
 martial_strategy.2032.a.forgiving: "Eu deveria ter feito mais pesquisas antes de fazer o pedido."
 #Decide between two vassal's proposed strategies for a war, Sean Hughes
 martial_strategy.3010.t: "Impasse Estratégico"
 martial_strategy.3010.desc.start: "Estou sentad[ROOT.Char.Custom('ES_OA')] diante do mapa com [impatient_commander.GetTitledFirstName|l] e [patient_commander.GetTitledFirstName|l] enquanto discutimos nossa estratégia para a guerra em andamento.\n\n[impatient_commander.GetFirstNameNoTooltip]"
 martial_strategy.3010.desc.middle: "enquanto [patient_commander.GetFirstNameNoTooltip]"
 martial_strategy.3010.desc.end: "\n\nÉ meu direito decidir nosso curso de ação final."
 martial_strategy.3010.desc.wrathful: "golpeia a mesa com o punho e proclama em voz alta que devemos atacar diretamente o inimigo e esmagá-lo com o poderio de nossos exércitos,"
 martial_strategy.3010.desc.greedy: "aponta ansiosamente todos os alvos principais para os quais devemos enviar imediatamente partidas de saque,"
 martial_strategy.3010.desc.patient: "recosta-se e defende pacientemente que devemos garantir locais críticos e esperar que o inimigo venha até nós."
 martial_strategy.3010.desc.craven: "murmura nervosamente sobre como devemos evitar combates desnecessários e travar uma guerra de desgaste."
 martial_strategy.3010.desc.flexible: "explica como precisamos observar o que nossos inimigos fazem e responder de acordo."
 martial_strategy.3010.a: "[impatient_commander.GetTitledFirstNameNoTooltip|l] tem a ideia certa aqui!"
 martial_strategy.3010.b: "Prefiro usar o plano [patient_commander.Custom('ES_DelDela')] [patient_commander.GetTitledFirstNameNoTooltip|l]."
 martial_strategy.3010.c: "Meus comandantes podem agir conforme acharem melhor."
 martial_strategy.3010.o_martial: "Eu sei como podemos usar ambas as estratégias!"
 martial_strategy.3010.desc.response.start: "Estou em uma reunião estratégica com [my_liege.GetTitledFirstName|l] e [other_commander.GetTitledFirstName|l] para discutir os planos para a guerra em curso."
 martial_strategy.3011.t: "Estratégia Abraçada"
 martial_strategy.3011.desc: "\n\n[my_liege.GetTitledFirstName] se mostra receptivo[my_liege.Custom('ES_OA')] às minhas ideias em vez das propostas de [other_commander.GetFirstName]. Agora vamos usá-las para moldar nossa política estratégica para a guerra em curso!"
 martial_strategy.3011.a.disapprove: "Quem diria que [my_liege.GetFirstNameNoTooltip] entraria em razão?"
 martial_strategy.3011.a: "Eu sabia que [my_liege.GetTitledFirstNameNoTooltip|l] gostariam das minhas ideias!"
 martial_strategy.3012.t: "Estratégia Rejeitada"
 martial_strategy.3012.desc: "\n\nInfelizmente, [my_liege.GetTitledFirstName|l] está desconsiderando minhas ideias, em vez disso, favorecendo as propostas d [other_commander.GetFirstName]. Agora vamos seguir em frente e usá-las para moldar nossa política estratégica para a guerra em curso!"
 martial_strategy.3012.a.disapprove: "A tolice d [my_liege.GetFirstNameNoTooltip] não me surpreende."
 martial_strategy.3012.a: "O tempo dirá se a escolha d [my_liege.GetFirstNameNoTooltip] estava correta."
 martial_strategy.3013.t: "Estratégia Permitida"
 martial_strategy.3013.desc: "[my_liege.GetTitledFirstName] decidiu nos dar liberdade para que [other_commander.GetFirstName] e eu possamos agir como acharmos melhor."
 martial_strategy.3013.a: "Estou feliz por ter total liberdade para fazer o que quiser."
 martial_strategy.3014.t: "Estratégia Integrada"
 martial_strategy.3014.desc: "\n\n[my_liege.GetTitledFirstName] combinou minhas ideias com as de [other_commander.GetFirstNamePossessive] e criou uma estratégia coesa que nos dará uma vantagem significativa no campo de batalha."
 martial_strategy.3014.a.disapprove: "Apesar de suas falhas, [my_liege.GetFirstNamePossessiveNoTooltip] é um[my_liege.Custom('ES_XA')] general habilidoso."
 martial_strategy.3014.a: "Estou impressionado com o plano d [my_liege.GetTitledFirstNameNoTooltip|l]."
 #Storm Your Own Castle, by Linnéa Thimrén
 martial_strategy_special.1301.t: "Sob Cerco"
 martial_strategy_special.1301.desc: "\"O verdadeiro inimigo de todo soldado é a complacência\", diz [siege_proposer.Custom2('MyCharacterIntroduction', ROOT.Char)] antes de [siege_proposer.Custom('quirk_pos_pp')]. Estamos lado a lado no topo das muralhas do meu [ROOT.Char.Custom('FortifiedBuilding')], olhando para os soldados realizando treinamentos abaixo.\n\n\"Poderíamos trocar o portão do [ROOT.Char.Custom('FortifiedBuilding')] por tábuas de madeira e enfraquecer as flechas nas aljavas das tropas\", continua [siege_proposer.GetSheHe]. \"Lidere os soldados em um falso ataque contra o [ROOT.Char.Custom('FortifiedBuilding')] e veja como eles se saem na ação!\""
 martial_strategy_special.1301.a: "Nosso tempo é melhor empregado melhorando nossas defesas."
 martial_strategy_special.1301.b: "Boa ideia. Você deveria liderar os defensores!"
 martial_strategy_special.1301.b.tt: "#F Que os jogos comecem!#!"
 martial_strategy_special.1302.t: "$martial_strategy_special.1301.t$: Primeiro Ataque"
 martial_strategy_special.13.a.tt: "#F Uma abordagem mais arriscada que pode render uma recompensa maior.#!"
 martial_strategy_special.13.b.tt: "#F A abordagem mais segura e tática.#!"
 martial_strategy_special.1302.desc: "Um portão bem fechado e muralhas que se erguem alto no céu. Arqueiros podem ser vistos como sombras se movendo atrás das ameias, e uma sensação de excitação genuína permeia o ar.\n\nNa calmaria antes da batalha, eu me viro e me dirijo aos soldados. Minha ordem ecoa alta e clara pelo campo."
 martial_strategy_special.1302.c: "Aproveite os pontos fracos do portão!"
 martial_strategy_special.1302.d: "Vá pelos esgotos!"
 martial_strategy_special.1302.a: "Ataque o portão principal!"
 martial_strategy_special.1302.a.tt1: "Nós entramos praticamente sem oposição"
 martial_strategy_special.1302.a.tt2: "Sofremos 'baixas' pesadas, mas derrubamos o portão"
 martial_strategy_special.1302.b: "Tragam as escadas!"
 martial_strategy_special.1302.b.tt1: "As muralhas são escaladas com pouco esforço"
 martial_strategy_special.1302.b.tt2: "Mal chegamos às ameias, sofrendo 'baixas' pesadas"
 martial_strategy_special.storm_castle.very_well: "O ataque progride #P muito bem#!"
 martial_strategy_special.storm_castle.poorly: "O ataque progride #N mal#!"
 martial_strategy_special.storm_castle.normal: "O ataque progride #Z decentemente#!"
 martial_strategy_special.storm_castle.well: "O ataque progride #P bem#!"
 martial_strategy_special.1303.t: "$martial_strategy_special.1301.t$: A Cada Passo"
 martial_strategy_special.1303.desc: "A escada ecoa quando outra arma enfraquecida bate na coluna central. Pela segunda vez em questão de minutos, eu amaldiçoo a espiral estreita que nos impede de balançar nossas armas contra os defensores.\n\nA respiração ofegante dos soldados ao meu redor é ensurdecedora, e a cada ataque repelido eles ficam mais resignados e frustrados. Eu tenho que assumir o controle da situação!"
 martial_strategy_special.1303.c: "Soldados canhotos à frente!"
 martial_strategy_special.1303.d: "Cuidado! Não se deixem provocar!"
 martial_strategy_special.1303.a: "Não parem, vamos sobrecarregá-los!"
 martial_strategy_special.1303.e: "Atrás de mim! #EMP Avancem#!!"
 martial_strategy_special.1303.a.tt1: "Subimos as escadas com eficiência brutal"
 martial_strategy_special.1303.a.tt2: "As escadas são conquistadas com dificuldade, passos vacilantes e braços cansados"
 martial_strategy_special.1303.b: "Um de cada vez! Fiquem alertas!"
 martial_strategy_special.1303.b.tt1: "Leva tempo, mas eventualmente conquistamos as escadas"
 martial_strategy_special.1303.b.tt2: "Sofremos muitas 'baixas' antes de rompermos"
 martial_strategy_special.1303.f: "Atrás de mim! Eu vou protegê-los!"
 martial_strategy_1303.winning: "Estamos ganhando, mas não há espaço para erros!"
 martial_strategy_1303.losing: "Esta é nossa última chance de virar a batalha!"
 martial_strategy_special.1304.t: "$martial_strategy_special.1301.t$: Bravura nas Ameias"
 martial_strategy_special.1304.desc: "Dou o último passo sobre as muralhas que cercam a [ROOT.Char.Custom('FortifiedBuilding')] e observo a cena.\n\nTalvez tenhamos perdido muitos soldados para os arqueiros nas muralhas, mas não seremos dissuadidos. Um após outro, sobrepujamos os defensores e saímos vitoriosos sobre os caídos.\n\nRespiro fundo. É hora de avançar novamente."
 martial_strategy_special.1304.a: "Todos, comigo!"
 martial_strategy_special.1304.c: "Ataquem com força! Eles não são seus amigos hoje!"
 martial_strategy_special.1304.d: "Escudos erguidos! Protejam a retaguarda!"
 martial_strategy_special.1304.f: "Ataquem com força! Não mostrem misericórdia!"
 martial_strategy_special.1304.a.tt1: "Igualamos rapidamente as forças de [siege_proposer.GetTitledFirstNameNoTooltip|l]"
 martial_strategy_special.1304.a.tt2: "Somos atacados por trás, desprotegidos"
 martial_strategy_special.1304.b: "Arqueiros, assumam suas posições!"
 martial_strategy_special.1304.b.tt1: "Somos imparáveis"
 martial_strategy_special.1304.b.tt2: "Sem os arqueiros, nosso ataque é facilmente repelido"
 martial_strategy_special.1399.t: "$martial_strategy_special.1301.t$: Tomar um [ROOT.Char.Custom('FortifiedBuilding')]"
 martial_strategy_special.1399.desc_win: "O [ROOT.Char.Custom('FortifiedBuilding')] é nosso!"
 martial_strategy_special.1399.desc_loose: "A batalha está perdida, e os defensores venceram o dia."
 martial_strategy_special.1399.desc: "Entre os soldados que o celebram, encontro [siege_proposer.GetTitledFirstName|l] , que me parabeniza por uma carga bem conduzida."
 martial_strategy_special.1399.desc_win2: "\n\n«Olhem para eles, [ROOT.Char.Custom('FormOfAddressForLiege')]. A mudança de ritmo lhes fez bem. Até você parece revigorado[ROOT.Char.Custom('ES_OA')] embora sua/o [ROOT.Char.Custom('FortifiedBuilding')] foi perdida para os atacantes!»."
 martial_strategy_special.1399.desc_loose2: "\n\n\"Embora não tenhais conseguido tomar o bastião que era [ROOT.Char.Custom('FortifiedBuilding')]. [ROOT.Char.Custom('FormOfAddressForLiege')|U]. Tanto as tropas quanto vós pareceis revigorados pela mudança de ritmo!\".\n\nNão posso senão concordar. Além disso, é reconfortante saber que minha [ROOT.Char.Custom('FortifiedBuilding')]!"
 martial_strategy_special.1399.a: "Nossos inimigos nunca terão chance!"
 martial_strategy_special.1399.b: "Como força defensora, somos formidáveis!"
 #March gone awry, by Petter Vilberg
 martial_strategy_special.1401.t: "Em Marcha"
 martial_strategy_special.1401.opening: "No final do exercício de campo, a ideia parecia brilhante…\n\nPara praticar o reagrupamento de um exército desorganizado, dividi minhas tropas e ordenei a todos os oficiais que se dirigissem a [capital.GetNameNoTier] cada um por conta própria.\n\nClaro, no terceiro dia de espera, com apenas metade do meu exército em posição, agora vejo falhas no plano."
 martial_strategy_special.1401.commander: "[commander.GetTitledFirstName]"
 martial_strategy_special.1401.officer_fallback: "Um dos meus oficiais"
 martial_strategy_special.1401.end: "sugere que eu saia com um contingente de $knight_culture_player_plural_no_tooltip_lowercase$ para encontrar as tropas desaparecidas, enquanto o resto do exército retorna para casa."
 martial_strategy_special.1401.a: "Esta será uma busca emocionante!"
 martial_strategy_special.1401.a.tt: "Sua busca pode levar um tempo..."
 martial_strategy_special.1401.b: "Boa ideia. Você está no comando."
 martial_strategy_special.1401.give_up_tt: "#F Os outros soldados podem aprender algo ao fazer o caminho de volta sozinhos.#!"
 martial_strategy.1401.almost_done: "Quase todos os meus soldados já retornaram agora, e saio sabendo que os últimos podem ser difíceis de encontrar.\n\n"
 martial_strategy.1401.close_to_done: "A maioria dos meus soldados já retornou, e saio em busca dos últimos regimentos.\n\n"
 martial_strategy.1401.a_lot_returned: "Muitos dos meus soldados já retornaram, e estou otimista em encontrar os restantes.\n\n"
 martial_strategy.1401.some_returned: "Alguns dos meus soldados já retornaram, enquanto saio em busca dos restantes.\n\n"
 martial_strategy.1401.first_find: "Não demora muito para eu encontrar o primeiro regimento que procuro.\n\n"
 martial_strategy_special.1401.continue_search_tooltip: "Sua busca continua"
 martial_strategy_special.1401.delay_tt: "Sua busca será adiada"
 martial_strategy_special.1401.give_up: "Você desiste da busca e retorna para casa"
 martial_strategy_special.1402.t: "Na Marcha"
 martial_strategy_special.1402.desc: "Posso ouvir uma confusão absurda vindo de uma taverna à beira da estrada. Um dos meus $knight_culture_player_plural_no_tooltip_lowercase$ chuta a porta, revelando uma sala cheia de meus soldados desgarrados.\n\nMinha chegada os silencia e eles encaram seus canecos sem dizer uma palavra. O proprietário estreita os olhos. 'Então #EMP você#! é responsável por essa ralé?'"
 martial_strategy_special.1402.a: "Tenho moedas suficientes para pagar pelos danos."
 martial_strategy_special.1402.a.tt: "#F Lidar com soldados barulhentos é mais fácil do que lidar com um taberneiro barulhento, e você deve continuar sua busca.#!"
 martial_strategy_special.1402.b: "Esses homens têm a ideia certa. Sirva-me uma bebida!"
 martial_strategy_special.1402.b.tt: "#F Beber com o povo comum! Que vida! Pelo menos até você precisar continuar sua busca.#!"
 martial_strategy_special.1402.c: "Estou cansad[ROOT.Char.Custom('ES_OA')] de lidar com soldados indisciplinados."
 martial_strategy_special.1402.d: "Peguem uma bebida para o caminho, homens, e vamos embora!"
 martial_strategy_special.1402.d.tt: "#F Estás segur[ROOT.Char.Custom('ES_OA')] de que puedes convencer a estos soldados para que se unan voluntariamente a la búsqueda.#!"
 martial_strategy_special.1403.t: "Na Marcha"
 martial_strategy_special.1403.desc: "Ao nos aproximarmos de [ROOT.Char.Custom('IndefiniteBodyOfWater')], descubro um acampamento montado em sua costa. Ao entrar, sou recebido pelo sargento no comando.\n\n\"![ROOT.Char.Custom('FormOfAddressForLiege')|U]! Nossas reservas de água vazaram durante a viagem, e nossos animais de carga não conseguem marchar de volta para casa sem mais água do que temos no momento\". O soldado me olha nervosamente. \"Mas se minha [ROOT.Char.GetLadyLord|U] e seus [ROOT.Char.Custom('MountedWarriorTermPlural')] nos ajudassem a carregar odres de água…\"."
 martial_strategy_special.1403.a: "Se essa for a única maneira..."
 martial_strategy_special.1403.a.tt: "#F A vergonha de carregar água para mulas!#!"
 martial_strategy_special.1403.b: "Os homens marcharão, e eles marcharão agora!"
 martial_strategy_special.1403.b.tt: "#F \"Esses plebeus acham que água é mais importante do que minhas ordens?\"#!"
 martial_strategy_special.1403.c: "Apenas leve-os para casa, sargento. Não me importo mais."
 martial_strategy_special.1403.d: "Acho que posso encontrar uma solução para isso."
 martial_strategy_special.1403.d.tt: "#F Agora, se uma mula precisa de oito galões de água por dia...#!"
 martial_strategy_special.1404.t: "Na Marcha"
 martial_strategy_special.1404.desc: "Quando meus batedores trouxeram notícias do pequeno acampamento, não esperava encontrar os soldados ainda praticando suas formações de batalha.\n\nParece que [knight.Custom2('MyCharacterIntroduction', ROOT.Char)] se encarregou de continuar os exercícios de campo enquanto esperava notícias do exército principal. As tropas se alinham ordenadamente quando me aproximo de [knight.Custom('ES_ElElla')]."
 martial_strategy_special.1404.a: "Essas não eram as ordens que eu dei!"
 martial_strategy_special.1404.a.tt: "#EMP Meus#! soldados precisam seguir #EMP minhas#! ordens."
 martial_strategy_special.1404.b: "Que postura desleixada é essa? Essa não é forma correta de segurar uma espada!"
 martial_strategy_special.1404.b.tt: "Não admira que eles se perderam — essas tropas precisam de disciplina!"
 martial_strategy_special.1404.c: "Leve os homens para casa, [knight.GetFirstNameNoTooltip]. Estou cansad[ROOT.Char.Custom('ES_OA')] desta busca."
 martial_strategy_special.1404.d: "[soldier_friend.Custom('ES_ElLa')|U] [soldier_friend.GetTitledFirstName|l] pode assumir o comando dessas tropas."
 martial_strategy_special.1404.d.tt: "[soldier_friend.GetSheHe|U] os levará em segurança para o castelo."
 martial_strategy_special.1405.t: "Na Marcha"
 martial_strategy_special.1405.desc: "Ao passar por uma pequena vila, percebo que, embora vestidos com roupas simples, os guardas da cidade estão todos portando armas com meu emblema!\n\nNa rua enlameada, sou recebido por [zealot.GetTitledFirstName|l], autoproclamad[zealot.Custom('ES_OA')] \"guardi[zealot.Custom('ES_AnAna')] divin[zealot.Custom('ES_OA')]\" da cidade. Meus soldados tiraram suas armaduras para ajudar esse pregador a servir a [zealot.GetFaith.HighGodName]."
 martial_strategy_special.1405.a: "Eu já governo por direito divino!"
 martial_strategy_special.1405.a.tt: "#F \"Esses soldados fariam bem em lembrar que #EMP yo#! fui escolhid[ROOT.Char.Custom('ES_OA')] segundo o plano divino de [zealot.GetFaith.HighGodName]\".#!"
 martial_strategy_special.1405.b: "Você tem um dia para fugir deste lugar, fanátic[zealot.Custom('ES_OA')]."
 martial_strategy_special.1405.b.tt: "#F Pode ser perigoso castigar[zealot.Custom('ES_LoLa')] demais, mas exiliar[zealot.Custom('ES_LoLa')] resolveria meu problema por enquanto.#!"
 martial_strategy_special.1405.c: "Eles logo se cansarão de se fazerem de soldados sagrados."
 martial_strategy_special.1405.d: "Junte-se a mim, pregador[zealot.Custom('ES_XA')] e juntos cumpriremos a vontade de [ROOT.Char.GetFaith.HighGodNamePossessive]!"
 martial_strategy_special.1405.d.tt: "#F \"Afinal, não somos todos servos de [ROOT.Char.GetFaith.HighGodNameAlternate] de uma forma ou de outra?\"#!"
 martial_strategy_special.1498.t: "Na Marcha"
 martial_strategy_special.1498.desc: "Os últimos dos meus soldados chegaram de volta a [capital.GetNameNoTier] e a ordem foi restabelecida.\n\nEmbora isso esteja longe de ser uma demonstração de genialidade militar, ganhei uma nova perspectiva sobre meu exército e os soldados individuais que o compõem."
 martial_strategy_special.1498.a: "Foi um exercício valioso afinal!"
 martial_strategy_special.1499.t: "Na Marcha"
 martial_strategy_special.1499.desc: "Leva um tempo, mas aos poucos os soldados desaparecidos voltam pelas portas de [capital.GetNameNoTier].\n\nEu posso não ter tido muito a ver com isso, mas eles parecem ter aprendido muito com a experiência."
 martial_strategy_special.1499.a: "Esse exercício não saiu como planejado."
 martial_strategy_special.1499.a.tt: "#F É muito mais confortável no seu [ROOT.Char.Custom('FortifiedBuilding')] do que no campo de qualquer maneira.#!"
