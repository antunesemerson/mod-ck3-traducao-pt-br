l_spanish:
 #Mercenaries are being assholes at an inn, by Linnéa Thimrén
 martial_authority.1031.t: "Misericórdia para os Mercenários"
 martial_authority.1031.desc: "El bullicio de una posada, un buen trago de [ROOT.Char.Custom('RegionalAlcoholicDrink')], una tarde tranquila después de un largo día de entrenamiento… Un mercenario tambaleante aturdido me tira la copa al suelo y toda mi esperanza de relajación desaparece igual que mi bebida.\n\n«Por favor, [ROOT.Char.Custom('FormOfAddressForLiege')]», ruega el posadero. «Los matones de [scoped_mercenary.GetFirstName] llevan días bebiendo hasta la saciedad, ¡y sin pagar! ¡Sus peleas asustan al personal y a los clientes!»."
 martial_authority.1031.a: "Eu pagarei suas bebidas se vocês forem embora imediatamente."
 martial_authority.1031.b: "Soldados, joguem-nos para fora!"
 martial_authority.1031.c: "Eles estão bêbados demais para serem uma ameaça real, isso vai acabar rápido."
 #Fight between my soldiers (Diplomacy skill challenge), Sean Hughes
 martial_authority.2040.t: "Disputa no Acampamento"
 martial_authority.2040.desc: "Mi ejército ya ha montado el campamento para pasar la noche. Es entonces cuando oigo un alboroto proveniente de los alojamientos de mis $knight_culture_player_plural_possessive_no_tooltip_lowercase$.\n\nAl investigar el incidente, me encuentro [first.Custom('ES_AlAla')] [first.GetTitledFirstName|l] y [second.Custom('ES_AlAla')] [second.GetTitledFirstName|l] en plena discusión acalorada, con muchos espectadores arengándolos."
 martial_authority.2040.a: "Faça um discurso sobre união para a multidão."
 martial_authority.2040.a.success: "Minhas palavras afastam todos da briga"
 martial_authority.2040.a.failure: "Minhas palavras não têm impacto na discussão"
 martial_authority.2040.a.failure.tt: "A briga se intensifica quando os espectadores se juntam!"
 martial_authority.2040.b: "Mande chicoteá-los por sua delinquência!"
 martial_authority.2040.c: "Dane-se isso, vou para minha tenda e tampar os ouvidos..."
 martial_authority.2040.c.drunkard: "Dane-se isso, vou para minha tenda e beber..."
 martial_authority.2040.c.hashishiyah: "Dane-se isso, vou usar um pouco de haxixe."
 martial_authority.2041.t: "Resolução"
 martial_authority.2041.desc: "Levanto-me e faço um discurso sobre como todos nós lutamos pelo[ROOT.Char.GetPrimaryTitle.GetName] e como devemos permanecer unidos contra nossos inimigos, pois, se não o fizermos, há muitos forasteiros que se aproveitariam de nossas disputas internas para tomar nossas terras e impor seu domínio sobre nós.\n\nEnvergonhados, [first.GetTitledFirstName|l] e [second.GetTitledFirstName|l] pedem desculpas e se preparam para se acomodar para passar a noite."
 martial_authority.2041.a: "Somos mais fortes quando estamos juntos."
 martial_authority.2042.t: "Briga"
 martial_authority.2042.desc: "Meus apelos para que todos deixem de lado suas diferenças caem em ouvidos moucos quando a discussão se transforma em uma briga generalizada.\n\nCopos e comida voam enquanto as pessoas começam a jogar copos e pacotes uns nos outros."
 martial_authority.2042.a: "Bem, já que é assim, vou entrar na briga também!"
 martial_authority.2042.a.success: "Saio como ?nic[ROOT.Char.Custom('ES_OA')] vencedor[ROOT.Char.Custom('ES_XA')] da briga"
 martial_authority.2042.a.failure: "Eu me machuco na briga violenta"
 martial_authority.2042.b: "Que bagunça..."
 martial_authority.2050.t: "Uma Mão Extra"
 martial_authority.2050.desc.opening: "Por mais autoridade que eu supostamente exerça como [ROOT.Char.GetTitleAsNameNoTooltip|l], não posso estar em todos os lugares do meu [ROOT.Char.Custom('GetRealmOrDomicile')] ao mesmo tempo. Sempre haverá aqueles que \"esquecem\" de obedecer às minhas ordens quando minha atenção é voltada para outro lugar.\n\nÉ aí que [right_hand_person.Custom2('MyCharacterIntroduction', ROOT.Char)] pode entrar, que tem cumprido fielmente meus decretos"
 martial_authority.2050.desc.vassal: "em seu próprio domínio."
 martial_authority.2050.desc.knight: "enquanto viaja pelo campo."
 martial_authority.2050.desc.courtier: "na [ROOT.Char.Custom('GetCourt')|l]."
 martial_authority.2050.desc.ending: "Será que [right_hand_person.GetFirstNameNoTooltip] servir como minha mão direita e assumir um papel mais ativo na administração do [ROOT.Char.Custom('GetRealmOrDomicile')|l]?"
 martial_authority.2050.a: "Sim, me servirá bem!"
 martial_authority.2050.a.tt: "Você passará mais tempo com [right_hand_person.GetShortUIName]"
 martial_authority.2050.b: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('marshal'))] [marshal.GetFirstNameNoTooltip] pode lidar com esses problemas."
 martial_authority.2050.c: "Eu consigo lidar com tudo sozinho se trabalhar mais!"
 martial_authority.2050.toast.title: "[right_hand_person.GetShortUIName] agora está servindo como seu [right_hand_person.GetWomanMan] de confiança"
 martial_authority.2051.t: "Uma Mão Extra"
 martial_authority.2051.desc: "Mientras me ayudaba a administrar mi [ROOT.Char.Custom('GetRealmOrDomicile')] como mi mano derecha, ¡[right_hand_person.Custom('ES_ElLa')] [right_hand_person.GetTitledFirstName|l] y yo hemos descubierto que tenemos un montón de cosas en común!\n\nPor ello, hemos creado un vínculo mutuo muy fuerte y me veo preguntándome qué nos deparará el futuro…"
 martial_authority.2051.a: "Vamos nos tornar bons amigos!"
 martial_authority.2051.b: "Será que isso é o início de algo mais?"
 martial_authority.2051.c: "Devemos manter esse relacionamento profissional."
 martial_authority.2052.message: "Eu Prendi Meu Braço Direito"
 martial_authority.2053.toast: "Meu braço direito foi aprisionad[right_hand_person.Custom('ES_OA')] por [imprisoner.Custom2('MyCharacterIntroduction', ROOT.Char)], e não poderá me servir até ser libertado."
 martial_authority.2054.toast: "Mi mano derecha regresa a mi servicio"
 martial_authority.2054.toast.no_return: "Meu braço direito não retorna ao meu serviço"
 martial_authority.2055.message: "Meu Braço Direito Deixou Meu Serviço"
 martial_authority.2055.message.incapable: "Meu Braço Direito Se Tornou Incapaz"
 martial_authority.2056.message: "Meu Braço Direito Morreu"
 martial_authority.2056.message.death: "Eu Matei Meu Braço Direito"
 #Soldier and Officer Fighting, by Mathilda Bjarnehed
 martial_authority_special.1100.t: "Incógnito"
 martial_authority_special.1100.start.desc: "Esta noite, eu me despojei de todos os símbolos que denotam minha patente para caminhar anonimamente entre meus soldados. É uma noite tranquila, então, quando a discussão começa, as palavras chegam até mim altas e claras.\n\n"
 martial_authority_special.1100.heavy_infantry.desc: "Um soldado de infantaria"
 martial_authority_special.1100.cavalry.desc: "Um soldado de cavalaria"
 martial_authority_special.1100.archer.desc: "Um arqueiro"
 martial_authority_special.1100.skirmisher.desc: "Um arqueiro de emboscada"
 martial_authority_special.1100.pikemen.desc: "Um soldado de pique"
 martial_authority_special.1100.end.desc: "tenta convencer seu comandante, [officer.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], das vantagens de uma estratégia alternativa. [officer.GetFirstNameNoTooltip] não quer saber nada disso. Quando me aproximo, [officer.GetSheHe] ergue o punho com raiva…"
 martial_authority_special.1100.a: "Intervir e proteger o soldado."
 martial_authority_special.1100.a.success.tt: "Derrotas [officer.Custom('ES_AlAla')] oficial em combate desarmado"
 martial_authority_special.1100.a.failure.tt: "O oficial te derrota em combate desarmado"
 martial_authority_special.1100.b: "Medie entre [officer.GetFirstNameNoTooltip] e o soldado."
 martial_authority_special.1100.b.success.tt: "Você convence [officer.GetShortUINameNoTooltip]"
 martial_authority_special.1100.b.failure.tt: "[officer.GetShortUINameNoTooltip] te repreende de forma impressionante"
 martial_authority_special.1100.c: "Dar um exemplo com eles."
 martial_authority_special.1100.d: "Sair sorrateiramente e assumir o crédito pela ideia do soldado."
 martial_authority_special.1101.desc: "O treinamento me serviu bem. Poucos momentos depois, tenho agarrad[officer.Custom('ES_OA')] firmemente a [officer.GetTitledFirstName|l] com uma chave de braço. "Que isso lhes sirva de lição", digo em voz alta, para que todos ouçam. "Vostr[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleTierName] não vê com bons olhos os tolos de mente fechada, independentemente de seu posto"."
 martial_authority_special.1101.end.desc: "\n\n[soldier_friend.Custom('ES_ElLa')|U] o soldado irradia gratidão. "Obrigado, [ROOT.Char.Custom('FormOfAddressForLiege')]. Jamais tereis servo[soldier_friend.Custom('ES_XA')] mais fiel do que [soldier_friend.GetFullNameNoTooltip]"."
 martial_authority_special.1101.a: "Adotar a estratégia d [soldier_friend.GetFirstNameNoTooltip]."
 martial_authority_special.1101.b: "Discutir a estratégia para aprender mais sobre guerra."
 martial_authority_special.1102.desc: "Sabendo das consequências de ferir um comandante, o soldado não faz nada para se defender dos golpes que vêm em sua direção. Quando o sangue é derramado, me ponho entre eles.\n\nTalvez eu não devesse ter brigado com um guerreiro experiente. No final, devo revelar minha identidade a [officer.GetTitledFirstName|l] para que me deixe ir e me esgueiro de volta para minha tenda antes que a notícia se espalhe…"
 martial_authority_special.1102.a: "Pelo menos aprendi um truque ou dois."
 martial_authority_special.1103.desc: "El brazo de [officer.GetTitledFirstName|l] se queda quieto a mitad de un golpe cuando levanto la voz. La intensidad emocional de mis palabras parecen dar en la llaga… y su expresión se suaviza al bochorno. [officer.GetSheHe|U] tartamudea una disculpa y se escabulle."
 #Deal with Deserters, by Linnéa Thimrén
 martial_authority_special.1501.t: "O Desertor"
 martial_authority_special.1501.desc: "Patrulho por [ravaged_place.GetName] na tentativa de avaliar os danos recentes que o condado sofreu. [deserting_soldier.Custom('ES_ElLa')|U] [deserting_soldier.GetTitledFirstName|l] para diante de mim antes de dar mais um passo:\n\n\"Me lembro deste lugar exato."
 martial_authority_special.1501.desc_battle: "Foi devastado durante uma de nossas batalhas recentes!"
 martial_authority_special.1501.desc_raid: "Foi saqueado e pilhado!"
 martial_authority_special.1501.desc_outro: "Vi os horrores, os gritos, o sangue... o fogo". Seu rosto empalidece, "N-não posso mais ficar aqui. Não vou ficar!""
 martial_authority_special.1501.a: "\"Eu também, mas precisamos suportar.\""
 martial_authority_special.1501.a_tt: "Você conta a [deserting_soldier.GetFirstNameNoTooltip] sobre suas experiências semelhantes e como elas fazem você se sentir"
 martial_authority_special.1501.a.success: "[deserting_soldier.GetFirstName] se acalma"
 martial_authority_special.1501.a.failure: "A ilusão de [deserting_soldier.GetFirstName] se espalha"
 martial_authority_special.1501.b: "Isso nunca mais acontecerá com você."
 martial_authority_special.1501.c: "\"Recupere-se agora!\""
 martial_authority_special.3000.t: "Uma Demonstração de Liderança"
 martial_authority_special.3000.desc: "[martial_authority_friend.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] lleva un tiempo rondando mis reuniones del consejo. Como conozco su interés en los asuntos de liderazgo, me temo que está esperando que [martial_authority_friend.Custom('ES_LoLa')] impresione.\n\nProbablemente podría entablar una conversación con [martial_authority_friend.GetSheHe]. Por otra parte, sería mejor que simplemente me viera interactuar con mis [ROOT.Char.Custom('WomenMenPeople_GenderPreference')]… Dice mucho eso de conocer la cara de todos los soldados, o #EMP fingirlo#! al menos."
 martial_authority_special.3000.a: "Vamos discutir métodos de comunicação."
 martial_authority_special.3000.b: "Deveríamos cumprimentar alguns recrutas!"
 respected_figurehead: "Líder Respeitado"
