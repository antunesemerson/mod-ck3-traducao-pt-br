l_spanish:
 #You visit some baronies or go partying, by Ewan Cowhig Croft
 martial_authority.5000.t: "Visitando as Regiões Remotas"
 martial_authority.5000.authoritative_religion.desc: "Eu esfrego minhas têmporas latejantes enquanto um funcionário me lê o duodécimo comunicado deste ano de [baron_1_lands.GetNameNoTier]. Meu controle enfraqueceu em vários desses importantes feudos nos últimos meses…\n\nCom uma breve visita a essas terras remotas, como é meu dever, meu domínio se fortaleceria um pouco. Por outro lado, [party_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)] me convidou para um banquete privado…"
 martial_authority.5000.relaxed_religion.desc: "Me froto las sienes palpitantes mientras un funcionario me lee el duodécimo comunicado de este año de [baron_1_lands.GetNameNoTier]. Mi control se ha debilitado en varios de estos importantes feudos durante los últimos meses, pero afianzaría mi dominio si hiciera una breve visita a estas tierras remotas.\n\nPor otra parte, [party_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)] me ha invitado a un banquete privado…"
 martial_authority.5000.a: "Um[ROOT.Char.Custom('ES_XA')] bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] visita seus inferiores de vez em quando."
 martial_authority.5000.b: "Estou #EMP obligad[ROOT.Char.Custom('ES_OA')]#! a ir àquela festa!"
 martial_authority.5000.a.characters_baron_final_list: "[baron_1.GetShortUIName], [baron_2.GetShortUIName], e [baron_3.GetShortUIName]"
 martial_authority.5000.a.land_baron_final_list: "[baron_1_lands.GetNameNoTier], [baron_2_lands.GetNameNoTier], e [baron_3_lands.GetNameNoTier]"
 authority_central_control_modifier: "Supervisão Feudal Abrangente"
 #Your young heir terrorizes your vassals
 martial_authority.8000.t: "Torneio Birrento"
 martial_authority.8000.desc: "Mi [marshal.GetCouncilTitle] celebra lo que parece el centésimo torneo del año y apenas me mantengo despiert[ROOT.Char.Custom('ES_OA')]. Entonces, un meneo en el codo me devuelve a la realidad.\n\nMi [fighting_child.Custom('GetDaughterSon')] pequeñ[fighting_child.Custom('ES_OA')], contra todas las leyes de la naturaleza, va bamboleando con una lanza varias veces más grande que [fighting_child.Custom('ES_ElElla')] y ha encontrado un yelmo mal ajustado que se le cae sobre los ojos.\n\n«[ROOT.Char.GetMotherFather|U], ¿puedo librar una ronda?»"
 martial_authority.8000.a: "Eu permito, mas ordeno que ninguém [fighting_child.GetHerHim] lhe faça mal."
 martial_authority.8000.tt: "[fighting_child.GetName] avança no torneio"
 martial_authority.8000.a.tt: "Pode provar seu valor"
 martial_authority.8000.tt.failure: "[fighting_child.GetName] não consegue se destacar"
 martial_authority.8000.b: ""É claro, pequen[fighting_child.Custom('ES_OA')]! Que nenhum guerreiro resista à sua fúria!""
 martial_authority.8000.c: ""Seja um bom[fighting_child.Custom('ES_OA')] e vá brincar com os cavalos"."
 martial_authority.8000.d: ""Este não é lugar para um[fighting_child.Custom('ES_XA')] [fighting_child.Custom('GirlBoy')] pequeno[fighting_child.Custom('ES_OA')]"."
 martial_authority_child_trait_gain: "[fighting_child.GetName] adquiriu um traço"
 martial_authority_brave: "$trait_brave$"
 martial_authority_arrogant: "$trait_arrogant$"
 martial_authority_wrathful: "$trait_wrathful$"
 martial_authority_one_eyed_child_title: "$trait_one_eyed$!"
 martial_authority_one_eyed_child: "[fighting_child.GetNameNoTooltip] perdeu um olho no torneio."
 martial_authority_disfigured_child_title: "$trait_disfigured$!"
 martial_authority_disfigured_child: "[fighting_child.GetNameNoTooltip] ficou desfigurad[fighting_child.Custom('ES_OA')] no torneio."
 martial_authority_unremarkable_child_title: "Seu filh[fighting_child.Custom('ES_OA')] é medíocre!"
 martial_authority.8000_injury: "[fighting_child.GetName] fica ferid[fighting_child.Custom('ES_OA')]"
 martial_authority_unremarkable_child: "[fighting_child.GetNameNoTooltip] prova ser completamente comum no torneio."
 martial_authority.8100.desc: "Los luchadores en la refriega hacen torpes círculos en torno a [fighting_child.GetName], asustados de hacerle daño. Sin embargo, [fighting_child.GetSheHe] responde con golpes bajos, haciendo caso omiso a todas las reglas del torneo.\n\nObservo mientras atraviesa la nuca de un [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] con el asta de catorce pies. Los guerreros le asestan golpes simbólicos, mientras que [fighting_child.GetSheHe] empala la cabeza de otro combatiente.\n\n«¡Terminad con esto, mi [ROOT.Char.GetLadyLord|U]!», suplica [marshal.GetTitledFirstName|l]"
 martial_authority.8100.a: "Parece que temos um[fighting_child.Custom('ES_XA')] vencedor[fighting_child.Custom('ES_OA')]!"
 martial_authority.8100.c: "Grande [ROOT.GetCharacter.GetFaith.HighGodName], [fighting_child.GetNameNoTooltip]! Peço desculpas por [fighting_child.GetSheHe]."
 #Innovating with weaponry
 martial_authority.4000.t: "Uma Ferramenta Enferrujada"
 martial_authority.4000.desc: "Enquanto examino a escuridão empoeirada da armaria, meu olhar percorre as várias armas de guerra. Um par de canelas de couro desgastadas, uma espada recém-afiada, uma lança com o cabo gasto, uma… #EMP herramienta agrícola oxidada?#!\n\nPego o instrumento agrícola; será que foi misturado inadvertidamente com as armas? Erguo a ferramenta e examino sua lâmina curvada, em forma de foice, enquanto dou um golpe experimental em uma cota de malha próxima.\n\nA lâmina perfura a malha, espalhando alguns anéis de ferro pelo chão.\n\n#EMP Interesante.#!"
 martial_authority.4000.a: "Eu me pergunto se isso pode ser reaproveitado?"
 martial_authority.4000.b: "Isso já basta."
 martial_authority.4000.a.tt: "Você investiga maneiras de transformar essa ferramenta em uma arma."
 martial_authority.4000.b.tt: "Você procura outras maneiras de aprimorar suas habilidades marciais."
 martial_authority.4001.t: "Uma Ferramenta Enferrujada: Escolhas, Escolhas..."
 martial_authority.4001.desc: "Saco la pequeña hoja al sol del mediodía y la inspecciono más a fondo. La hoja se estrecha hasta una punta en un extremo y desaparece en la espiga en el otro, dejando en medio un tramo de hierro ligeramente oxidado -pero aún afilado.\n\nEl pliegue en la cabeza de la hoja le da al instrumento una curva tremenda. Se podría pensar que útil para cortar los arbustos. ¿O tal vez encontrar huecos en las armaduras?\n\nEstá claro que se podría reutilizar como arma de guerra, pero la pregunta sigue siendo qué forma tomaría exactamente dicha arma…"
 martial_authority.4001.a: "Se você endireitasse a lâmina, ela poderia ser uma adaga útil..."
 martial_authority.4001.a.tt: "Você tenta transformar a ferramenta em uma arma de estocada curta."
 martial_authority.4001.b: "Talvez se a fixarmos na ponta de uma lança?"
 martial_authority.4001.b.tt: "Você volta para dentro, procurando por um pedaço de corda..."
 martial_authority.4001.c: "Por que não deixamos como está?"
 martial_authority.4001.c.tt: "Talvez isso possa ser uma arma eficaz sem modificações?"
 martial_authority.4001.b.failure: "Você quebrou a ferramenta!"
 martial_authority_4001.dagger.tt: "Você cria uma adaga rudimentar a partir da ferramenta."
 martial_authority_4001.halberd.tt: "Você cria uma alabarda rudimentar a partir da ferramenta."
 martial_authority_4001.billhook.tt: "Você afia a lâmina."
 martial_authority_4001.fail.tt: "Você não consegue fazer nada útil com a ferramenta."
 martial_authority.4002.t: "Uma Ferramenta Enferrujada: A Lâmina Improvisada"
 martial_authority.4002.desc: "Como [ROOT.Char.GetLadyLord], no estoy muy versad[ROOT.Char.Custom('ES_OA')] en el proceso de modificar armas de guerra. A pesar de mi entusiasmo, pronto quedó claro que necesitaré la orientación de un experto.\n\nLlamo [blacksmith.Custom('ES_AlAla')] herrer[blacksmith.Custom('ES_OA')] [blacksmith.GetFirstName], de aspecto algo abrumado -que murmuró no se qué de gobernantes y sus caprichitos- y después de un día de limar y afilar, mi obra está completa.\n\nLa hoja, antes curvada, se ha enderezado, su hoja acortada lleva a una punta afilada, con una ranura biselada que recorre la parte plana de la hoja. No es un arma bonita, pero un arma es, desde luego."
 martial_authority.4002.a: "Está perfeito!"
 martial_authority.4002.b: "Está até melhor que a minha!"
 martial_authority_4002.make.tt: "Você adquire [improvised_dagger.GetName]"
 martial_authority.4003.t: "Uma Ferramenta Enferrujada: A Alabarda Improvisada"
 martial_authority.4003.desc: "Mientras sujeto la lanza que había visto antes entre mi pierna y una mesa, enrollo con un cordel basto el apero y la punta de la lanza, uniendo ambas. Al principio la cabeza se tambalea de forma alarmante, pero la aplicación al día siguiente de unas tiras de cuero hervido -cortesía [blacksmith.Custom('ES_DelDela')] curtidor[blacksmith.Custom('ES_XA')] de la posesión, [blacksmith.GetFirstName]- termina la modificación.\n\nEl arma que he creado tiene parece estar a la altura, desde luego. El tamaño de la lanza proporciona alcance y empuje, mientras que la hoja ganchuda del instrumento de labranza podría tirar fácilmente a un hombre del caballo o introducirse en las costuras de la armadura.\n\nEs un arma tosca, pero tengo la sensación de que podría ser #EMP bastante#! efectiva…"
 martial_authority.4003.a: "Vamos ver sua armadura sofisticada resistir a isso!"
 martial_authority.4003.b: "Está até melhor que a minha!"
 martial_authority_4003.make.tt: "Você adquire [improvised_halberd.GetName]"
 martial_authority.4004.t: "Uma Ferramenta Enferrujada: Perfeita do Jeito Que Está"
 martial_authority.4004.desc: "El instrumento -que [blacksmith.GetFirstName], el/la herrer[blacksmith.Custom('ES_OA')] de la posesión, me explicó que se conoce como «podadera», mientras yo supervisaba con entusiasmo cómo la afilaba- tiene ciertamente el aspecto de un arma de guerra.\n\nLa hoja emerge de la espiga con un filo feroz, que recorre la pesada cabeza de gancho. La punta recién afilada resplandece al sol del mediodía mientras la introduzco en las costuras de una armadura de cuero hervido ya caduca antes de rasgarla hacia mí y cortar los lazos de sujeción de un solo golpe."
 martial_authority.4004.a: "Quais outros segredos nossos humildes fazendeiros têm?"
 martial_authority.4004.b: "Eu gosto disso; distribua-os pelo reino!"
 martial_authority_4004.make.tt: "Você adquire [improvised_billhook.GetName]"
