l_spanish:
 #Generic Lines
 historical_commander_trait.reject.tt: "#F Você procurará inspiração em outro lugar #!"
 #Hannibal
 historical_commander_trait.0001.t: "\"O Inimigo de Roma\""
 historical_commander_trait.0001.desc: "Enquanto estudava as táticas dos generais antigos, fiquei [ROOT.Char.Custom('surprised_reaction')] ao descobrir as proezas de Aníbal Barca durante a Segunda Guerra Púnica:\n\n#F Conhecido como \"O Inimigo de Roma\", o maior feito de Aníbal foi a Batalha de Canas, onde seu exército de aproximadamente 50.000 homens manobrou e cercou o maior exército romano, com 86.000 soldados. Cercados e incapazes de recuar, apenas 3.000 romanos sobreviveram ao massacre.#!"
 historical_commander_trait.0001.a: "Assim como Aníbal, eu aniquilarei meus inimigos!"
 historical_commander_trait.0001.b: "Aníbal era um verdadeiro mestre das táticas fabianas."
 historical_commander_trait.0001.c: "A versatilidade era a maior força de Aníbal."
 historical_commander_trait.0001.d: "Bah! Ele era um tolo, lutando uma guerra sem esperança."
 historical_commander_trait.0001.d.good: "A brutalidade não é um traço a ser invejado, mesmo na guerra."
 #Caesar
 historical_commander_trait.0002.t: "O Triunfo de César"
 historical_commander_trait.0002.desc: "Enquanto estudava as táticas dos generais antigos, fiquei fascinado ao descobrir as proezas de Júlio César durante sua conquista da Gália.\n\n#F Durante o cerco de Alésia, César determinou que um ataque direto à cidade bem fortificada seria custoso demais. Em vez disso, ordenou que seu exército construísse sua própria fortaleza ao redor de toda a cidade, prendendo a guarnição inimiga para morrer de fome e, ao mesmo tempo, impedindo que reforços socorressem os defensores.#!"
 historical_commander_trait.0002.a: "Um pouco de engenhosidade faz toda a diferença em um cerco."
 historical_commander_trait.0002.b: "Faça o inimigo vir até você! Eu gosto disso!"
 historical_commander_trait.0002.c: "César correu um risco com aquele plano, mas valeu a pena!"
 historical_commander_trait.0002.d: "As guerras não são mais travadas assim hoje em dia..."
 #Alexander
 historical_commander_trait.0003.t: "O Invencível Alexandre"
 historical_commander_trait.0003.desc: "Enquanto estudava as táticas dos generais antigos, fiquei [ROOT.Char.Custom('surprised_reaction')] ao descobrir as proezas de Alexandre, o Grande, durante sua conquista da Mesopotâmia.\n\n#F Durante o Cerco de Tiro, Alexandre atacou uma fortaleza em uma ilha demolindo uma cidade próxima e usando os destroços para construir um caminho elevado que ia do continente até as muralhas da cidade. Isso permitiu que suas máquinas de cerco atacassem diretamente a fortaleza inimiga, embora tenha sido sua marinha que acabou abrindo uma brecha.#!"
 historical_commander_trait.0003.a: "Nenhuma quantidade de água impedirá meus exércitos!"
 historical_commander_trait.0003.b: "Aquele caminho elevado foi um feito de grande engenhosidade."
 historical_commander_trait.0003.c: "Voltar os recursos do meu inimigo contra ele? Brilhante!"
 historical_commander_trait.0003.d: "Por que perder tempo estudando táticas que não funcionaram?"
 #Constantine
 historical_commander_trait.0004.t: "A Visão do Qui-Rho"
 historical_commander_trait.0004.desc: "Enquanto estudava as táticas dos generais antigos, fiquei inspirado ao descobrir a vitória de Constantino na Batalha da Ponte Mílvio.\n\n#F Na noite anterior à batalha, Constantino sonhou que a vitória seria concedida se ele pintasse o Qui-Rho, um símbolo de Cristo, nos escudos de seus soldados. Ele fez exatamente isso, e no dia seguinte derrotou as forças do usurpador Maxêncio, que caiu no Rio Tibre e se afogou.#!"
 historical_commander_trait.0004.a: "Os ímpios não são páreo para os exércitos de Deus!"
 historical_commander_trait.0004.b: "Assim como Constantino, nenhum rio pode atrasar minha vitória!"
 historical_commander_trait.0004.c: "Falando logicamente, táticas flexíveis venceram aquela batalha."
 historical_commander_trait.0004.d: "Truques para fortalecer a moral não são suficientes para vencer guerras!"
 #Khalid ibn al-Walid
 historical_commander_trait.0005.t: "A Espada de Alá"
 historical_commander_trait.0005.desc: "Enquanto estudava as táticas de generais históricos, fiquei contemplativo ao aprender sobre a primeira batalha de Khalid ibn al-Walid após sua conversão ao Islã.\n\n#F Em desvantagem de mais de 3 para 1 contra os bizantinos durante a Batalha de Mu'tah, Khalid reuniu seus soldados vacilantes para manter a linha. Essa postura desafiadora permitiu que ele organizasse uma retirada para Medina, salvando seus homens de uma morte certa. Khalid e seu exército posteriormente conquistaram toda a Arábia em nome de Alá!#!"
 historical_commander_trait.0005.a: "Aqueles que lutam em nome de Alá serão vitoriosos!"
 historical_commander_trait.0005.b: "A devoção nos mantém fortes quando estamos em menor número."
 historical_commander_trait.0005.c: "Saber #EMP quando#! lutar é tão importante quanto saber #EMP como#!."
 historical_commander_trait.0005.d: "Por que comemorar uma derrota humilhante?"
 #Bilge Khagan
 historical_commander_trait.0006.t: "O Rei Sábio"
 historical_commander_trait.0006.desc: "Enquanto estudava as táticas dos antigos generais, fui inspirado ao descobrir as histórias das conquistas de Bilge Khagan, que alcançavam os quatro cantos do mundo.\n\nCom suas incursões por Baximi e Gazhou, humilhou o exército do imperador Xuanzong de Tang, apesar de este contar com centenas de milhares de soldados sob seu comando. Ele realmente percebeu que nosso poder reside em nossa rapidez e mobilidade! \n\nMais tarde, Bilge e seu exército partiram para esmagar os khitanos e Xi em nome de Tengri!"
 historical_commander_trait.0006.a: "Com a bênção do céu, nós perseveramos!"
 historical_commander_trait.0006.b: "$historical_commander_trait.0005.c$"
 historical_commander_trait.0006.c: "Táticas flexíveis são necessárias para um exército móvel!"
 historical_commander_trait.0006.d: "Sabemos fazer muito mais do que empregar simples truques!"
 #Alexander
 historical_commander_trait.0007.t: "Sun Tzu"
 historical_commander_trait.0007.desc: "Ao estudar os sete clássicos militares, fiquei [ROOT.Char.Custom('surprised_reaction')] ao saber da Batalha de Boju, onde Sun Tzu provou o valor de suas teorias sobre a guerra.\n\n#F Afirma-se que, durante o período da Primavera e do Outono, Sun Tzu teria conduzido os exércitos de Wu à vitória, derrotando as forças de Chu, numericamente superiores, ao empregar seus hoje famosos teoremas militares.#!"
 historical_commander_trait.0007.a: "A linha que separa a desordem da ordem é a coordenação"
 historical_commander_trait.0007.b: "Devo tentar submeter o inimigo sem lutar"
 historical_commander_trait.0007.c: "Quando você se mover, caia como um raio!"
 historical_commander_trait.0007.d: "A maior vitória é aquela que não requer batalha"
