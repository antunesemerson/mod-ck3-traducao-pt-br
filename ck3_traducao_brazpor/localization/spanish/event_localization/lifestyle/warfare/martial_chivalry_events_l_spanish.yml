l_spanish:
 #A practice duel gone terribly wrong, Peter Vilberg
 martial_chivalry.0001.t: "Um Desafio Indigno"
 martial_chivalry.0001.opening: "No início, pensei que o simples camponês era um tolo por entrar no campo de treinamento."
 martial_chivalry.0001.hard_fight: "No entanto, a batalha foi mais dura do que eu esperava, e aos poucos ficou claro que seria incapaz de impedir que seus golpes selvagens e violentos me machucassem!"
 martial_chivalry.0001.easy_fight: "\n\nEmbora [duel_opponent.GetTitledFirstName|l] não parecesse uma ameaça no início, logo ficou claro que não seria capaz de impedir que seus golpes selvagens e brutais me machucassem."
 martial_chivalry.0001.conclusion: "Desarmar[duel_opponent.GetHerHim] se tornou de repente uma questão de vida ou morte.\n\nTentei não demonstrar meu alívio quando sua espada finalmente caiu no chão."
 martial_chivalry.0001.a: "Eu poderia ter mais pessoas como você!"
 martial_chivalry.0001.a.tt: "[duel_opponent.GetTitledFirstName|l] esperamos que venha servi-lo bem."
 martial_chivalry.0001.b: "Este camponês - e meus soldados - receberão uma lição sobre honra."
 martial_chivalry.0001.b.tt: "Seus soldados também se beneficiariam de uma explicação sobre os certos e errados do combate pessoal."
 martial_chivalry.0001.c: "Eu o abato exatamente onde ele está."
 martial_chivalry.0001.c.tt: "Decapitar com um único golpe é uma maneira certa de impressionar os camponeses - e os nobres - presentes."
 #Horse Riding Accident, by Petter Vilberg
 martial_chivalry.0002.t: "Um Choque Repentino"
 martial_chivalry.0002.desc: "Eu tinha cavalgado, mirado e acertado tantas vezes que pensei que nada poderia quebrar meu ritmo. Ao disparar mais uma vez pela pista de treinamento, uma comoção que não consegui ver fez meu cavalo empinar.\n\nPor um instante, o impulso me manteve cravad[ROOT.Char.Custom('ES_OA')] na sela enquanto o cavalo se sacudia. Depois, como se o tempo estivesse passando devagar, senti meu corpo se soltar."
 martial_chivalry.0002.a: "Acalme-se, [ROOT.Char.Custom('RandomGirlBoy')]! Acalme-se!"
 martial_chivalry.0002.a_success: "Você consegue se manter em cima"
 martial_chivalry.0002.a_failure: "Você é jogado para fora"
 martial_chivalry.0002.increase_horse_mastery: "Minha maestria na equitação aumenta, assim como minha experiência no [martial_lifestyle|lE]."
 martial_chivalry.0002.b: "Eu mergulho para o chão estável - melhor prevenir do que remediar!"
 martial_chivalry.0003.t: "No Comando"
 martial_chivalry.0003.desc: "Sinto-me sacudid[ROOT.Char.Custom('ES_OA')] de um lado para o outro, mas nenhum movimento me faz afrouxar o aperto nas rédeas e na sela.\n\nMinhas ordens finalmente acalmam o cavalo, e o animal logo volta a pisar vigorosamente o chão batido, tão estável como sempre."
 martial_chivalry.0003.a: "Que fera vigorosa."
 martial_chivalry.0003.b: "Eu mesmo vou cuidar do treinamento desse."
 martial_chivalry.0003.a.tt: "Se nada mais, o incidente ensinou um pouco mais sobre o controle de cavalos."
 martial_chivalry.0004.t: "Exibição Desagradável"
 martial_chivalry.0004.desc: "Me veo arrojad[ROOT.Char.Custom('ES_OA')] al duro suelo y el dolor del impacto me recorre todos los huesos del cuerpo.\n\nEl mozo de establos llega corriendo ligeramente tarde."
 martial_chivalry.0004.a: "Maldito animal!"
 martial_chivalry.0005.t: "Que Dia Ruim para Andar a Cavalo"
 martial_chivalry.0005.desc: "O jovem do estábulo tenta me ajudar a levantar, mas grito para que ele pare.\n\nBater no chão envia ondas de dor por todo o meu corpo, e minha antiga ferida está doendo pior do que quando era recente!"
 martial_chivalry.0005.a: "Não deveria ter saído da cama hoje."
 martial_chivalry.0006.t: "O Que Aconteceu?"
 martial_chivalry.0006.desc: "Não me lembro como acabei no chão, só sei da dor ardente em todo o meu corpo. Rostos indefinidos se reúnem ao meu redor, olhando para baixo para mim.\n\nTudo fica escuro."
 martial_chivalry.0006.a: "Como acabei na cama? Onde está meu cavalo?"
 martial_chivalry.0007.t: "Meu Reino por um Cavalo"
 martial_chivalry.0007.desc: "Pensei que andar a cavalo me faria sentir melhor. Que um pouco de esforço me ajudaria a me curar. Enquanto caio pelo ar, a dor das minhas feridas deixa de me preocupar por um breve momento de leveza. É o melhor que me sinto há semanas.\n\nAo me chocar contra o chão, não preciso mais me preocupar com a dor ou qualquer outra preocupação terrena."
 martial_chivalry.0007.a: "O que espera além?"
 #Train with your signature weapon, by Linnéa Thimrén
 martial_chivalry.0010.t: "O Caminho da [ROOT.Char.Custom('signature_weapon')|U]"
 martial_chivalry.0010.desc: "O choque incessante de metal contra metal, o atrito da armadura, a ardência do suor… É uma dança tão familiar quanto exaustiva. [ROOT.Char.Custom('SignatureWeaponAction')] [ROOT.Char.Custom('signature_weapon')], atacar, esquivar, defender e repetir.\n\nTalvez me fizesse bem praticar minhas habilidades com outra arma."
 martial_chivalry.0010.a: "Eu e minha confiável [ROOT.Char.Custom('signature_weapon')] não nos separaremos."
 martial_chivalry.0010.b: "Vamos acabar com a monotonia, me dê outra arma!"
 martial_chivalry.0010.b.tt1: "Você mostra como é feito"
 martial_chivalry.0010.b.tt2: "Você tropeça e se machuca"
 #Find an old castle, by Linnéa Thimrén
 martial_chivalry.1011.t: "Descanso para os Cansados"
 martial_chivalry.1011.desc: "Suados, cansados e precisando de comida. Um longo dia de treinamento com as tropas chega ao fim.\n\nQuando procuramos um lugar para acampar, avistamos ao longe um castelo velho e abandonado. [ROOT.Char.Custom('quirk_pos_personal_pp')|U], declaro: "É ali que montaremos acampamento esta noite".\n\nO sol está se pondo e, a cada passo em direção às ruínas, tudo parece mais sinistro. Em pouco tempo, os soldados estão sussurrando sobre fantasmas."
 martial_chivalry.1011.a: "Vamos entrar, tenho certeza de que há tesouros a serem encontrados!"
 martial_chivalry.1011.a.tt: "Quem sabe o que você encontrará lá dentro?"
 martial_chivalry.1011.b: "Vamos erguer as tendas do lado de fora, é hora de descansar."
 martial_chivalry.1012.t: "Procurando o Desconhecido"
 martial_chivalry.1012.desc: "Escuridão, umidade e desolação dominam o interior do castelo, e todo vestígio de vida se foi.\n\nOlhando para cima, em direção às escadas em ruínas, avisto o que podem ser os restos de tapeçarias suntuosas e pinturas antigas. Olhando para baixo, em direção às escadas em espiral, vejo apenas escuridão que se estende profundamente no subsolo do castelo."
 martial_chivalry.1012.a: "Vamos procurar nos andares superiores!"
 martial_chivalry.1012.a.success: "Encontramos um grande tesouro"
 martial_chivalry.1012.a.failure: "Encontramos bugigangas e bijuterias"
 martial_chivalry.1012.b: "O que pode estar escondido na escuridão abaixo?"
 martial_chivalry.1012.b.tt1: "#F 'Eu juro que aquela sombra acabou de se mexer! Isso é... sangue? O que foi esse som?!'#!"
 martial_chivalry.1012.b.success: "Você enfrenta seus medos"
 martial_chivalry.1012.b.failure: "Esse lugar te assusta"
 martial_chivalry.1021.t: "O Caos da Batalha"
 martial_chivalry.1021.desc: "Uma espada atinge minha couraça, um cotovelo bate em meu capacete, um soldado facilmente evita minha tentativa desajeitada de contra-atacar... A batalha simulada acontece ao meu redor, mas eu luto para encontrar meu foco.\n\nEstou tentado a baixar minha guarda assim que a luta acalmar, mas sei que o segundo ataque está prestes a começar."
 martial_chivalry.1021.a: "Vou me retirar por um momento."
 martial_chivalry.1021.b: "Encare o ataque de frente!"
 martial_chivalry.1021.b.success: "Meu avanço é impressionante"
 martial_chivalry.1021.b.failure: "Tropeço e me machuco a mim mesm[ROOT.Char.Custom('ES_OA')]"
 #Practice duel (Prowess skill challenge), Petter Vilberg
 martial_chivalry.2010.t: "O Desafio"
 martial_chivalry.2010.start.desc: "Estou treinando com um dos meus soldados, com suor escorrendo pela testa, quando sinto a sensação estranha de estar sendo observado. Olhando por cima do ombro, avisto [challenger.Custom2('MyCharacterIntroduction', ROOT.Char)],"
 martial_chivalry.2010.like.desc: "que me cumprimenta. Aproximo-me para cumprimentar[challenger.GetHerHim] também.\n\nConversamos um pouco sobre nossas práticas com armas, trocando truques e conselhos. Justo quando estou prestes a sair para outra rodada, o rosto [challenger.Custom('ES_DelDela')] [challenger.GetTitledFirstName|l] se ilumina e sugere que pratiquemos juntos."
 martial_chivalry.2010.dislike.desc: "olhando para mim enquanto balança sua [challenger.Custom('signature_weapon')] descuidadamente de um lado para o outro.\n\n\"Meu [ROOT.Char.GetTitleTierName]!\" As palavras d [challenger.GetFirstName] ecoam pelo pátio. \"Você não preferiria testar suas habilidades contra mim?\""
 martial_chivalry.2010.a: "Desafio aceito!"
 martial_chivalry.2010.a.success.tt: "Você vence o duelo de treinamento"
 martial_chivalry.2010.b: "Eu prefiro não..."
 martial_chivalry.2010.a.failure1.tt: "[challenger.GetShortUINameNoTooltip] ganha vantagem no duelo"
 martial_chivalry.2010.a.failure2.tt: "Você perde o duelo de treinamento"
 martial_chivalry.2011.t: "A Vantagem"
 martial_chivalry.2011.start.desc: "O som de [ROOT.Char.Custom('signature_weapon')] colidindo contra [challenger.Custom('signature_weapon')] ecoa entre as paredes do pátio. Todos os olhares estão em nós; todos querem ver seu [ROOT.Char.GetTitleTierName] lutando contra s [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('challenger'))].\n\n"
 martial_chivalry.2011.end.desc: "A multidão aplaude quando lanço um avanço. Sua admiração me dá coragem. Em vez de recuar, tento uma nova técnica que venho praticando. Os movimentos fluem do meu braço para [ROOT.Char.Custom('signature_weapon')] como se fôssemos um só. [challenger.GetTitledFirstName|l] está indefens[challenger.Custom('ES_OA')] diante de mim."
 martial_chivalry.2011.a: "Vamos encerrar isso! Lutamos bem."
 martial_chivalry.2011.b: "Vou mostrar para que não me desafie novamente!"
 martial_chivalry.2012.t: "Com sua arma na minha garganta"
 martial_chivalry.2012.end.desc: "Devo estar cansad[ROOT.Char.Custom('ES_OA')] do meu treino anterior, porque me movimento com lentidão e sou incapaz de acompanhar meu oponente. Quando invisto, [challenger.GetFirstName] já não está mais lá e minhas defesas só acontecem no último instante. Não demora muito para eu me encontrar no chão diante de"
 martial_chivalry.2012.a: "Eu me rendo! Lutamos bem."
 martial_chivalry.2012.b: "Apenas covardes se rendem!"
 martial_chivalry.2012.b.failure.tt: "#F Você perde o duelo de treinamento.#!"
 martial_chivalry.2013.t: "Humilhação Sangrenta"
 martial_chivalry.2013.end.desc: "Por meio de um truque sujo, [challenger.GetFirstName] ganha uma vantagem inicial. Não há tempo para reclamar, nem quero agir como um chorão. Mas não consigo deixar passar, e minha frustração me desequilibra. Faço um ataque mal-advisado e meu oponente me derruba no chão."
 martial_chivalry.2013.a: "É[challenger.Custom('ES_EA')] [challenger.Custom2('InsultNoun', ROOT.Char)] infame!"
 martial_chivalry.2014.t: "Contra Todas as Probabilidades"
 martial_chivalry.2014.desc: "A julgar pelos aplausos da multidão, eles mal conseguem acreditar no que veem enquanto me desvio de [challenger.GetFirstName] e sua [challenger.Custom('signature_weapon')] e [challenger.GetHerHim] o desarmo em um único movimento rápido. Eu sei que foi uma jogada perigosa, mas às vezes é preciso correr grandes riscos para alcançar vitórias gloriosas."
 martial_chivalry.2014.a: "Minha vitória não será esquecida tão cedo!"
 martial_chivalry.2015.t: "Público Ridículo"
 martial_chivalry.2015.desc: "Lanço um último ataque desesperado, mas [challenger.GetFirstName] é veloz. Ele bloqueia instintivamente, mas, como meu ataque foi inesperado, ele não consegue controlar sua arma por completo. Uma dor paralisante queima meu braço."
 martial_chivalry.2015.a: "Por que eu fiz isso?!"
 #Vassal struggling to train new recruits, Sean Hughes
 martial_chivalry.3000.t: "Recrutas Indisciplinados"
 martial_chivalry.3000.desc: "Hoje estava observando [bad_commander.Custom('ES_AlAla')] [bad_commander.GetTitledFirstName|l] enquanto treinava alguns recrutas novos, mas os que estavam sob seu comando pareciam mais uma turba desorganizada do que um exército.\n\nContinuo olhando enquanto [bad_commander.GetSheHe] tenta recuperar o controle da situação, embora esteja claro que ele(a) chegou ao limite."
 martial_chivalry.3000.desc.callous: "Este espetáculo de incompetência é uma vergonha para [ROOT.Char.GetPrimaryTitle.GetName] e não pode ser tolerado!"
 martial_chivalry.3000.desc.compassionate: "Estive nessa situação e sei o quão difícil é trabalhar com soldados inexperientes."
 martial_chivalry.3000.desc.fallback: "Embora nunca seja fácil treinar novos soldados, [bad_commander.GetFirstName] precisa mesmo se esforçar muito mais."
 martial_chivalry.3000.a: "Repreender[bad_commander.GetHerHim] por seu fracasso."
 martial_chivalry.3000.b: "Ensine-o o que sei sobre o comando."
 martial_chivalry.3000.b.attempt: "[bad_commander.GetTitledFirstNameNoTooltip|l] tomará uma decisão com base em sua personalidade"
 martial_chivalry.3000.b.tt.s: "[bad_commander.GetTitledFirstNameNoTooltip|l] aceita seu conselho"
 martial_chivalry.3000.b.tt.f: "[bad_commander.GetTitledFirstNameNoTooltip|l] se recusa a ouvir"
 martial_chivalry.3000.c: "Animar[bad_commander.GetHerHim] quando o treinamento terminar."
 martial_chivalry.3000.response.desc: "[my_liege.GetTitledFirstName] parou para me observar hoje enquanto eu treinava meus novos recrutas.\n\nVergonhosamente, meus soldados indisciplinados se tornaram uma multidão desordenada ao tentar completar seus exercícios!"
 martial_chivalry.3001.t: "Humilhado!"
 martial_chivalry.3001.desc: "Ainda pior, [my_liege.GetFirstName] me culpou pessoalmente por esse fracasso."
 martial_chivalry.3001.a: "Punir esses recrutas por me fazerem passar vergonha!"
 martial_chivalry.3001.b: "Eu preciso me esforçar mais, pelo bem do reino."
 martial_chivalry.3001.c: "Eu falhei com [my_liege.GetTitledFirstNameNoTooltip|l]."
 martial_chivalry.3002.t: "Intervenção"
 martial_chivalry.3002.desc: "Agora [my_liege.GetFirstName] está me dando uma aula magistral sobre como treinar novas tropas!"
 martial_chivalry.3002.a: "Aceitar os conselhos d [my_liege.GetFirstNameNoTooltip] com gratidão."
 martial_chivalry.3002.b: "Amaldiçoar essa multidão por me fazer passar vergonha!"
 martial_chivalry.3003.t: "Conselho Aceito"
 martial_chivalry.3003.desc.1: "Levo [bad_commander.GetTitledFirstName|l] para um lado enquanto seus recrutas continuam seu treinamento. "A chave para formar novos soldados é incutir disciplina!", digo a ele. "Sem isso, você não conseguirá contar com eles para seguir suas ordens…"."
 martial_chivalry.3003.desc.2: "\n\nDepois de terminar, [bad_commander.GetFirstName] me agradece antes de voltar para o campo, onde rapidamente assume o controle da situação."
 martial_chivalry.3003.a: "Isso fará de [bad_commander.GetFirstNameNoTooltip] um[bad_commander.Custom('ES_XA')] comandante melhor."
 martial_chivalry.3004.t: "Conselho Rejeitado!"
 martial_chivalry.3004.desc: "Ao dar um toque no ombro de [bad_commander.GetTitledFirstName|l], se desespera e grita: #EMP No#! é culpa minha, [ROOT.Char.GetFirstNameNoTooltip]! Esses camponeses idiotas não sabem distinguir a direita da esquerda! Como alguém pode esperar que eu transforme essa ralé em um exército?!"
 martial_chivalry.3004.b: "[bad_commander.Custom('ES_ElLa')|U] [bad_commander.GetTitledFirstNameNoTooltip|l] lamentará esta exibição de insolência!"
 martial_chivalry.3004.a: "Fico decepcionado com [bad_commander.GetTitledFirstNameNoTooltip|l]."
 martial_chivalry.3005.t: "Consolo"
 martial_chivalry.3005.desc: "Para meu alívio, [my_liege.GetFirstName] se aproxima de mim depois do exercício para me consolar e encorajar meus esforços."
 martial_chivalry.3005.a: "Tinha motivos para me repreender, mas não o fez."
 martial_chivalry.4000.t: "Uma Corrida à Meia-Noite"
 martial_chivalry.4000.desc: "A voz de um servo me arranca dos sonhos.\n\n"Ladrões! Saqueadores!", ele grita. "Meu [ROOT.Char.GetTitleAsNameNoTooltip], uns jovens guerreiros estão levando seus rebanhos para a escuridão e os conduzindo para as terras de [raiders.GetTitledFirstName|l]!".\n\nDespertos, meus $knight_culture_player_plural_no_tooltip_lowercase$ saem tropeçando de suas camas e correm para suas selas. Aproximo-me do meu cavalo com [ROOT.Char.Custom('signature_weapon')] em mãos.\n\n A hora é tarde e há uma grande distância a percorrer."
 martial_chivalry.4000.sleepy: "\n\nMeus pensamentos voltam para a cama macia e quente..."
 martial_chivalry.4000.angry: "Mas os ladrões devem ser detidos!"
 martial_chivalry.4000.a: "Cercados, os ladrões entrarão em pânico."
 martial_chivalry_special.4000.a.tt: "Você lidera seus cavaleiros em uma perseguição e cerco aos ladrões."
 martial_chivalry_special.4000.a.tt_success: "Seu contra-ataque funciona perfeitamente"
 martial_chivalry_special.4000.a.tt_failure: "Os ladrões resistem a você"
 martial_chivalry_special.4000.a.tt_failure_2: "Você ou um de seus $knight_culture_player_plural_no_tooltip$ fica ferido"
 martial_chivalry.4000.b: "Eu vou golpear seu insolente líder até a morte!"
 martial_chivalry_special.4000.b.tt: "Ninguém cavalga nem luta melhor que [ROOT.Char.GetTitledFirstNameNoTooltip|l]!"
 martial_chivalry_special.4000.b.tt_success: "Você derrama sangue pela sua criação"
 martial_chivalry_special.4000.b.tt_failure: "O garoto ladrão te humilha"
 martial_chivalry_special.4000.b.tt_critical_failure: "Você é derrubado da sela... e pisoteado"
 martial_chivalry_special.4000.b.tt_critical_failure_2: "Voc? fica gravemente mutilad[GetPlayer.Custom('ES_OA')]"
 martial_chivalry.4000.c: "Meu cavalo e eu somos um só pensamento: 'Não hoje à noite'."
 martial_chivalry_special.4000.c.tt: "Você alcançará #EMP alguns#! desses ladrões, com certeza. Depois de uma boa noite de sono."
 #Mounted Warrior Practice, by Petter Vilberg
 martial_chivalry_special.1201.t: "Treino de [ROOT.Char.Custom('MountedWarriorAdjective')]"
 martial_chivalry_special.1201.desc: "O som de metal batendo e espadas se chocando ecoa em meus ouvidos enquanto meus [ROOT.Char.Custom('MountedWarriorTermPlural')] treinam suas armas. Eu os observo atentamente, tentando identificar as forças e fraquezas de cada um.\n\nEles têm pouco descanso, pois assim que o sino toca para sinalizar o fim do combate simulado, as portas do estábulo são abertas. É hora de trazer os montes."
 martial_chivalry_special.1201.a: "Hoje vamos sair para cavalgar no campo!"
 martial_chivalry_special.1201.a.tt: "Praticar formações com seus [ROOT.Char.Custom('MountedWarriorTermPlural')] pode ajudar a melhorar sua expertise no [martial_lifestyle|lE]."
 martial_chivalry_special.1201.b: "Tragam minha armadura. Faz tempo que não monto no quintain!"
 martial_chivalry_special.1201.b.tt: "\nEjercitarse hasta el anochecer no mejorará tu dominio de las tácticas, pero te hará #EMP fuerte#!."
 martial_chivalry_special.1202.t: "Treino de [ROOT.Char.Custom('MountedWarriorAdjective')]: Uma Vista do Morro"
 martial_chivalry_special.1202.desc: "[SCOPE.sC('soldier').GetTitledFirstName] observa os campos lamacentos ao pé de uma colina. "Poderiam servir como o contorno de um exército inimigo", diz.\n\nInformo meus [ROOT.Char.Custom('MountedWarriorTermPlural')] enquanto inspeciono a linha de batalha, preparando-os para a estratégia em questão."
 martial_chivalry_special.1202.a: "Devo cortar diagonalmente e liderar os [ROOT.Char.Custom('MountedWarriorTermPlural')] pelos 'flancos'."
 martial_chivalry_special.1202.b: "#EMP Chaaarge!#!"
 martial_chivalry_special.1202.b_success: "A carga é bem executada"
 martial_chivalry_special.1202.b_failure: "A carga é um desastre"
 martial_chivalry_special.1203.t: "Treino de [ROOT.Char.Custom('MountedWarriorAdjective')]: Golpe Preciso"
 martial_chivalry_special.1203.desc: "El retumbar de cascos a mi alrededor, los gritos de los guerreros a caballo, su impulso incansable… Cabalgando en cabeza, me siento como si estuviera al frente de una fuerza de la naturaleza. Sin embargo, lo que dirijo es un destacamento que responde a cada una de mis órdenes, como si fuera una extensión de mí mism[ROOT.Char.Custom('ES_OA')].\n\nCargando contra los flancos de un ejército imaginario, mis [ROOT.Char.Custom('MountedWarriorTermPlural')] nunca se desvían de mi plan. Sé que esta es la manera en la que logro la total devastación a mi enemigo."
 martial_chivalry_special.1203.a: "Assim é como será a vitória avassaladora."
 martial_chivalry_special.1204.t: "Treino de [ROOT.Char.Custom('MountedWarriorAdjective')]: A Fúria das Feras"
 martial_chivalry_special.1204.desc: "Consigo [ROOT.Char.Custom('SignatureWeaponAction')] [ROOT.Char.Custom('signature_weapon')] y dirijo a los jinetes en una loca carrera colina abajo. Sin embargo, entre el aparente caos de armaduras a la carrera, armas en alto y gritos de guerra, hay un plan. Cuando chocamos con el enemigo imaginario campo abajo, todo soldado encuentra su lugar en nuestra línea y prepara sus golpes, retrocede, retuerce las riendas y salta de nuevo a la pelea.\n\nCaeremos sobre nuestros enemigos como una fuerza de la naturaleza y se romperán como un árbol ante una tempestad."
 martial_chivalry_special.1204.a: "Vamos abater todos os homens que estiverem em nosso caminho!"
 #Train a warhorse, by Linnéa Thimrén
 martial_chivalry_special.1601.t: "Treinando um Cavalo de Guerra"
 martial_chivalry_special.1601.desc: "Ao inspecionar as cavalariças, meu olhar se volta para um exemplar de [dummy_gender.Custom('HorseMareStallion')] que fica afastado de todos os outros. Ele sacode a cabeça e pisa forte com os cascos, exibindo os poderosos quartos traseiros e o pescoço bem arqueado. Esta criatura tem a melhor conformação e o pior dos temperamentos.\n\nNunca antes vi um cavalo de guerra assim, mas o mestre de estábulo insiste que é impossível adestrar[dummy_gender.Custom('ES_LoLa')]."
 martial_chivalry_special.1601.a: "Não sou uma pessoa que recua diante de um desafio!"
 martial_chivalry_special.1601.b: "Um corcel tão nobre renderá um bom preço."
 martial_chivalry_special.1601.c: "Meu mestre de estábulo aprenderá muito ao domar[dummy_gender.GetHerHim]."
 martial_chivalry_special.1601.a.tt: "O cavalo pode se tornar seu próprio corcel"
 martial_chivalry_special.1601.d: "¿No es [m_horse.Custom('ES_ElLa')] [m_horse.GetTitledFirstNameNoTooltip|l] mi expert[m_horse.Custom('ES_OA')] en caballos?"
 martial_chivalry_special.1601.d.tt: "Seu $master_of_horse_court_position$ tentará domar o animal. Se tiverem sucesso, o cavalo se tornará seu próprio corcel."
 martial_chivalry_special.1603.desc: "O cavalo prende as orelhas ao me aproximar, seu desrespeito por mim fica claro. Esse primeiro encontro é importante para conquistar sua confiança e respeito, e preciso decidir como abordar a situação."
 martial_chivalry_special.1603.a: "Será preciso firmeza para domar essa fera!"
 martial_chivalry_special.1603.a.tt: "Provavelmente funcionará bem com uma alta habilidade em [prowess|lE] ou uma personalidade destemida."
 martial_chivalry_special.1603.b: "Se eu for gentil e me mover devagar, [dummy_gender.GetSheHe] confiará em mim."
 martial_chivalry_special.1603.b.tt: "Provavelmente funcionará bem com uma alta habilidade em [diplomacy|lE] ou uma personalidade benevolente."
 martial_chivalry_special.1603.c: "Todo mundo tem seu preço - tragam as maçãs!"
 martial_chivalry_special.1603.c.tt: "Provavelmente funcionará bem com uma alta habilidade em [intrigue|lE] ou uma personalidade generosa."
 martial_chivalry_special.1604.desc_success: "É uma sensação poderosa; o cavalo poderoso segue meu comando. Agora que conquistei sua confiança, ele parece até mesmo gostar de mim."
 martial_chivalry_special.1604.desc_failure: "Não importa o que eu tente, o cavalo se recusa a ouvir. Minhas tentativas deixam tanto [dummy_gender.GetSheHe] quanto eu suados e irritados, e ao sair dos estábulos tarde da noite, sei que não voltarei tão cedo."
 martial_chivalry_special.1604.a: "Eu [dummy_gender.Custom('ES_LoLa')] vou guardar para que seja meu cavalo de guerra pessoal!"
 martial_chivalry_special.1604.a_2: "Isso foi gratificante! Farei isso novamente."
 martial_chivalry_special.1604.b: "Pelo menos aprendi o que #EMP não#! fazer..."
 martial_chivalry_special.1604.c: "Meu suserano ficará feliz."
 martial_chivalry_special.1604.t: "Cavalo Domado"
 martial_chivalry_special.1604.succcess: "Seu $master_of_horse_court_position$ domou seu cavalo temperamental!"
 martial_chivalry_special.1604.t.2: "Cavalo Não Domado"
 martial_chivalry_special.1604.failure: "Seu $master_of_horse_court_position$ falhou em domar o cavalo."
 martial_chivalry.5000.t: "Rumores Infundados"
 martial_chivalry.5000.intro: "Não faz muito que o sol se pôs quando [spymaster.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproxima de mim a caminho de minha câmara de dormir.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], vossa galanteria é bem conhecida e admirada entre vossos vassalos, mas tal postura cortesã tende a atrair reações invejosas. Até agora, sussurram que tendes outras intenções, mais libidinosas"."
 martial_chivalry.5000.desc.lustful: "\n\nEmbora eu nunca admita, a verdade é que eles não estão muito longe de suas suspeitas..."
 martial_chivalry.5000.desc.honest_chaste: "\n\nComo alguém poderia acreditar que eu me envolveria em tal comportamento vergonhoso?"
 martial_chivalry.5000.desc.fallback: "\n\nEu levanto uma sobrancelha - se fosse apenas isso, ele não pareceria tão preocupado."
 martial_chivalry.5000.desc.outro: "\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], correm rumores de que estais… #EMP tratando#! com [spouse.Custom('ES_ElLa')] cônjuge de [my_liege.GetShortUIName]"."
 martial_chivalry.5000.a: "Vou negar imediatamente essas acusações!"
 martial_chivalry.5000.a.success: "Convence [my_liege.GetFirstNameNoTooltip] da honestidade de suas intenções"
 martial_chivalry.5000.a.failure: "[my_liege.GetFirstNameNoTooltip] continua desconfiad de você"
 martial_chivalry.5000.b: "Falar sobre isso só traria mais atenção para o assunto."
 martial_chivalry.5000.c: "Preciso ir falar com [my_liege.Custom('ES_ElLa')] [my_liege.GetTitledFirstNameNoTooltip|l] pessoalmente."
 martial_chivalry.5000.d: "Bem, se eles tivessem visto como [spouse.GetSheHe] me olha..."
 martial_chivalry.5000.d.tt: "A coisa mais galante que se pode fazer é perseguir um amor proibido."
 martial_chivalry.5000.d.tt.warning: "@warning_icon! #X Acaba con cualquier [scheme|lE] personal en curso#!."
 martial_chivalry.6000.t: "Para a [church_province.GetTerrain.GetNameNoTooltip]"
 martial_chivalry.6000.desc: "O bosque sempre foi um valioso campo de treinamento. Todos sabem que todo cavaleiro galante está sempre em busca de novas aventuras: um tirano malévolo, uma prova secreta, inocentes em apuros.\n\nEu não havia explorado esta parte da [church_province.GetTerrain.GetNameNoTooltip|l] antes; talvez seja isso que faça as ruínas repentinas parecerem uma prova de valor.\n\nPelo que parece, a igreja está abandonada há décadas. As teias de aranha substituíram os vidros das janelas. Troncos quebrados agora são os novos bancos. Alguns pássaros voam embora quando me aproximo da porta podre."
 martial_chivalry.6000.a: "Poucas coisas s?o t?o tentadoras quanto [ROOT.Char.GetFaith.HouseOfWorship]s inexploradas!"
 martial_chivalry.6000.a.tt: "Você pode encontrar algo dentro."
 martial_chivalry.6000.b: "[bishop.Custom2('MyCharacterIntroduction', ROOT.Char)] ficará feliz em saber dessa descoberta importante."
 martial_chivalry.6000.c: "Podemos simplesmente usar este lugar como um novo depósito."
 ignored_church_modifier: "Depósito da Igreja Abandonada"
 martial_chivalry.6001.t: "Para a [church_province.GetTerrain.GetNameNoTooltip]: Um Monstro!"
 martial_chivalry.6001.desc: "O altar está quase irreconhecível sob as camadas da natureza. Raízes e musgo se revoltam contra a pedra, implacáveis. O suave sussurro das folhas soa tão relaxante quanto enganoso.\n\nAh! Não era esse o som que eu achava estar ouvindo!\n\nNa verdade, era o rosnado de um exemplar de [ROOT.Char.Custom('GetAnimalType')], com seus olhos famintos fixos em mim."
 martial_chivalry.6001.a: "Assim você termina, monstro!"
 martial_chivalry.6001.a_success: "Você derrota a fera"
 martial_chivalry.6001.a_success_toast: "Uma vitória justa!"
 martial_chivalry.6001.a_failure: "Você se fer[GetPlayer.Custom('ES_OA')]"
 martial_chivalry.6001.a_failure_toast: "A fera contra-ataca!"
 martial_chivalry.6001.b: "Vou apenas tentar sair sorrateiramente..."
 martial_chivalry.6001.b_success: "Você escapa do ataque"
 martial_chivalry.6001.b_success_toast: "Você foge com sucesso"
 martial_chivalry.6001.b_failure: "O animal te atinge"
 martial_chivalry.6001.b_failure_toast: "A fera te nota"
 martial_chivalry.6002.t: "Para a [church_province.GetTerrain.GetNameNoTooltip]: Um Tesouro!"
 martial_chivalry.6002.desc: "Uma árvore cresceu logo atrás do altar. Sua copa substituiu as partes caídas do telhado. Ao lado dela, há um baú de madeira que alguém tem usado recentemente, a julgar pela falta de poeira ou mofo.\n\nDentro, um pequeno tesouro."
 martial_chivalry.6002.a: "Vou valorizar esse presente sagrado."
 church_artifact_book: "O Livro da Admiração Cortês"
 church_artifact_book_desc: "Um tomo ricamente adornado contendo diretrizes para se tornar um cavaleiro cortês. Encontrado no terreno sagrado de [church_county.GetNameNoTooltip]."
 church_artifact_sword: "A Espada da Devoção Sagrada"
 church_artifact_sword_desc: "Uma espada ricamente adornada. Alguém entalhou uma oração ao longo de sua lâmina. Encontrada no terreno sagrado de [church_county.GetNameNoTooltip]."
 church_artifact_dagger: "A Adaga da Poderosa Oração"
 church_artifact_dagger_desc: "Uma adaga ricamente adornada. Alguém amarrou um amuleto no cabo. Encontrada no terreno sagrado de [church_county.GetNameNoTooltip]."
 martial_chivalry.6002.book: "Isso parece a palestra perfeita para um cavaleiro!"
 martial_chivalry.6002.book_tt: "Você estuda o tomo e o coloca de volta em seu lugar sagrado."
 martial_chivalry.6002.b: "[bishop.Custom2('MyCharacterIntroduction', ROOT.Char)|U] apreciará esse presente."
 martial_chivalry.6002.c: "Essa idolatria falsa pertence ao fogo!"
 martial_chivalry.6003.t: "Para a [church_province.GetTerrain.GetNameNoTooltip]: Quem Está Aí...?"
 martial_chivalry.6003.desc_intro: "A silhueta aparece tão abruptamente que é quase suspeita. Seu rosto reflete a luz do pôr do sol e consegue torná-la fria.\n\n"
 martial_chivalry.6003.desc_ugly: "«Oh…, vos… Esperaba a [Select_CString( GetPlayer.IsFemale,'una dama', 'un caballero')] #EMP galante#!…».\n\nSe tapa la nariz con un pañuelo blanco.\n\n«Pero supongo que vos valdréis. ¿Podéis llevarme de vuelta al castillo?»."
 martial_chivalry.6003.desc_pretty: "Ah, valente [Select_CString( GetPlayer.IsFemale,'dama', 'caballero')], vocês finalmente vieram me resgatar? Seriam tão gentis a ponto de me levar de volta ao castelo?".\n\nSua voz é tão tranquilizadora, tão aliviado seu gesto."
 martial_chivalry.6003.a: "Jamais abandonarei um[dummy_attracted_gender.Custom('ES_XA')] inocente em apuros."
 martial_chivalry.6003.a_success: "Você encontra o caminho de volta"
 martial_chivalry.6003.a_failure: "Você se perde na floresta"
 martial_chivalry.6003.b: "O que [dummy_attracted_gender.GetSheHe] est? fazendo aqui sozinh[dummy_attracted_gender.Custom('ES_OA')]? Preciso ir embora antes de cair em uma emboscada!"
 martial_chivalry.6003.c: "Um espírito! Uma aparição! Não fico aqui nem mais um segundo!"
 martial_chivalry.6003.d: "Bem, que apodreça aí dentro."
 martial_chivalry.6003.d_tt: "Isso o(a) ensinará a ser sempre cortês."
