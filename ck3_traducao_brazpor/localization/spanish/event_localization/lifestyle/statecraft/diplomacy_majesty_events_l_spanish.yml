l_spanish:
 ###################
 #Standard Events #
 ###################
 #The Power of Words
 diplomacy_majesty.0004.t: "O Poder das Palavras"
 diplomacy_majesty.0004.desc: "Ambos nós já percebemos isso; sorrisos forçados e conversas vacilantes, seguidos de um silêncio desconfortável. Há algo que não está totalmente certo entre [compliment_receiver.Custom2('MyCharacterIntroduction', ROOT.Char)] e eu. \n\nTalvez um elogio bem formulado tornasse nossas interações mais suaves? Da próxima vez que nos encontrarmos, eu poderia elogiar seu…"
 diplomacy_majesty.0004.compassionate: "Empatia e coração gentil."
 diplomacy_majesty.0004.bold: "Coragem incansável."
 diplomacy_majesty.0004.honorable: "Lealdade e senso de honra."
 diplomacy_majesty.0004.greed: "Ambição grandiosa."
 diplomacy_majesty.0004.rational: "Racionalidade clara."
 diplomacy_majesty.0004.zealous: "Fé inabalável em [compliment_receiver.GetFaith.HighGodName]."
 diplomacy_majesty.0004.energetic: "Vigor juvenil."
 diplomacy_majesty.0004.forgiving: "Natureza perdoadora."
 diplomacy_majesty.0004.beautiful: "Aparência bela."
 diplomacy_majesty.0004.strong: "Força de braço."
 diplomacy_majesty.0004.extroverted: "Habilidades sociais sem igual."
 diplomacy_majesty.0004.dominant: "Presença assertiva."
 diplomacy_majesty.0004.fallback: "… tudo bem. Receio que [compliment_receiver.GetHerHim] acabaria insultando!"
 diplomacy_majesty.0004.compliment.tt: "A reação de [compliment_receiver.GetTitledFirstName|l] dependerá de quão bem isso se encaixa em [compliment_receiver.Custom('ES_ElElla')] :"
 diplomacy_majesty.0004.success.tt: "Seu elogio é bem recebido"
 diplomacy_majesty.0004.neutral.tt: "Seu elogio passa despercebido"
 diplomacy_majesty.0004.failure.tt: "Seu elogio soa como um insulto"
 diplomacy_majesty.0004.neutral_outcome.desc: "O elogio que fiz a [compliment_receiver.GetTitledFirstName|l] foi um fiasco."
 diplomacy_majesty.0005.t: "$diplomacy_majesty.0004.t$: Doce como o Mel"
 diplomacy_majesty.0005.desc: "Meu elogio cuidadosamente preparado foi recompensado com um sorriso agradecido e um leve rubor nas bochechas de [compliment_receiver.GetTitledFirstName|l]. A conversa que se seguiu foi a mais agrad?vel que tivemos em muitas luas."
 diplomacy_majesty.0005.a: "Algumas palavras gentis podem realmente fazer milagres!"
 diplomacy_majesty.0006.t: "$diplomacy_majesty.0004.t$: Amargo como Losna"
 diplomacy_majesty.0006.desc: "Tinha a intenção de que minhas palavras fossem gentis, mas a reação de [compliment_receiver.GetTitledFirstName|l] não deixou dúvidas sobre meu fracasso. A indignação em seu rosto fez meu coração afundar no fundo do estômago."
 diplomacy_majesty.0006.a: "Como pude ser tão imprudente..."
 #Kindred Spirits
 diplomacy_majesty.0016.t: "Espíritos Afins"
 diplomacy_majesty.0016.desc: "Notei que [potential_friend.Custom2('MyCharacterIntroduction', ROOT.Char)] e eu parecemos pensar e agir de maneira bastante semelhante. Talvez nem sempre concordemos plenamente, mas, essencialmente, acredito que somos compatíveis.\n\nIsso poderia ser a base de uma amizade duradoura — ou uma fraqueza a ser explorada..."
 diplomacy_majesty.0016.a: "Seremos os melhores amigos!"
 diplomacy_majesty.0016.a.tt: "O [scheme|lE] terá uma [success_chance|lE] aumentada"
 diplomacy_majesty.0016.b: "[potential_friend.Custom('ES_LoLa')|U] terei na palma da minha mão…"
 diplomacy_majesty.0016.c: "Não preciso de amigos, tenho facas!"
 #Loyal Subjects
 diplomacy_majesty.1020.t: "Lealdade ou Medo"
 diplomacy_majesty.1020.desc: "Como seu [ROOT.Char.GetTitleAsName|l], meus [ROOT.Char.Custom('GetFollowerOrVassalPlural')] me devem fidelidade. Minha palavra é a lei. Mas quanto vale a obediência sem devoção?\n\nEm momentos de crise, uma resposta lenta ou um esforço pela metade pode levar ao desastre. Posso me permitir esse risco?"
 diplomacy_majesty.1020.a: "Conquistarei sua lealdade inabalável."
 diplomacy_majesty.1020.b: "Tenho [important_ruler.GetWomenMen] mais importantes a quem impressionar."
 diplomacy_majesty.1020.c: "O medo é uma ferramenta muito mais eficaz."
 diplomacy_majesty.1020.d: "Por que eu deveria me importar com o que os outros pensam de mim?"
 #A Battle of Ideas
 diplomacy_majesty.4030.t: "Uma Batalha de Ideias"
 diplomacy_majesty.4030.desc: "À medida que passo mais tempo praticando a arte de governar e a diplomacia, me pego pensando nas semelhanças entre a vida na [ROOT.Char.Custom('GetCourt')] e a guerra. Ler nosso oponente… Movimentos e contramovimentos… \n\nSe eu guardar esses pensamentos para mim, poderia ter uma arma secreta para conseguir o que quero. Por outro lado, poderia compartilhar essa ideia com [event_target.Custom('ES_ElLa')] [event_target.GetTitledFirstName|l] para conquistar sua boa vontade…"
 diplomacy_majesty.4030.a: "Preciso expandir essa teoria!"
 diplomacy_majesty.4030.a.success: "Minhas novas táticas funcionam excepcionalmente bem"
 diplomacy_majesty.4030.a.failure: "Falho em desenvolver táticas úteis"
 diplomacy_majesty.4030.b: "Aliados são necessários tanto na guerra quanto na paz."
 diplomacy_majesty.4030.c: "Simplesmente pensar assim será vantajoso."
 diplomacy_majesty.4031.t: "$diplomacy_majesty.4030.t$: Influência"
 diplomacy_majesty.4031.desc: "Depois de muitas noites de reflexão, elaborei uma estratégia sólida para provar meu ponto em um debate.\n\nComeçarei a partir de uma posição forte, adotando uma postura popular sobre um tema irrefutável, e dessa posição atacarei os argumentos do meu oponente e apontarei todas as suas falhas.\n\nCom isso, eliminarei todas as possíveis soluções para um problema… exceto a que eu prefiro, é claro."
 diplomacy_majesty.4031.a: "Essa técnica conquistará as pessoas para o meu lado."
 diplomacy_majesty.4032.t: "$diplomacy_majesty.4030.t$: Engajamentos Imprudentes"
 diplomacy_majesty.4032.desc: "Passei muitas noites elaborando táticas para direcionar as conversas na direção desejada, considerando as possíveis reações das pessoas ao que digo.\n\nApesar disso, toda vez que tento colocar essas estratégias em prática, as coisas nunca acontecem como eu esperava. Acho que nenhum plano sobrevive ao contato com o inimigo."
 diplomacy_majesty.4032.a: "Pelo menos esse fracasso não levou à perda de vidas."
 diplomacy_majesty.4033.t: "Cadeia de Suprimentos de Ideias"
 diplomacy_majesty.4033.desc: "Hoje [thinker.GetTitledFirstName|l] veio a mim com uma ideia interessante. Diz que pode ser útil pensar em um debate na corte como uma batalha campal. Diferentes atores com metas distintas, cada um tentando levar a conversa para seu próprio terreno, mas apenas um vencerá."
 diplomacy_majesty.4033.a: "[thinker.Custom('ES_ElElla')|U] tem ideias fascinantes sobre diplomacia!"
 #Lure of Language
 diplomacy_majesty.4070.t: "O Encanto da Linguagem"
 diplomacy_majesty.4070.desc: "Governar um [ROOT.Char.GetPrimaryTitle.GetName] multicultural traz seus próprios desafios. Os [ROOT.Char.Custom('GetCourtierPlural')|l] estrangeiros costumam se sentir alienados por não poderem falar sua língua nativa na [ROOT.Char.Custom('GetCourt')|l] , o que gera ressentimento.\n\n[my_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me sugere que eu poderia melhorar significativamente as relações com os meus [ROOT.Char.Custom('GetCourtierPlural')|l] de cultura [my_vassal.GetCulture.GetName] se aprendesse a falar a língua deles além da minha."
 diplomacy_majesty.4070.a: "Hora de estudar!"
 diplomacy_majesty.4070.b: "Contratar um tutor para me ensinar."
 diplomacy_majesty.4070.c: "Por que se preocupar? [ROOT.Char.GetCulture.GetNameNoTooltip|l] é claramente superior."
 diplomacy_majesty.4070.d: "Meu Tutor da Corte certamente pode me ajudar!"
 diplomacy_majesty.4070.success: "Aprendo a falar a língua [my_vassal.GetCulture.GetName|l]"
 diplomacy_majesty.4070.failure: "Falho em aprender um novo idioma"
 diplomacy_majesty.4070.failure.tt: "Você pode optar por continuar estudando"
 diplomacy_majesty.4071.t: "$diplomacy_majesty.4070.t$: Idioma Aprendido"
 diplomacy_majesty.4071.desc: "Depois de muitas semanas de estudo, finalmente tenho uma compreensão sólida dos fundamentos do idioma [my_vassal.GetCulture.GetName|l].\n\nCom prática contínua, minha fluência melhorará, mas mesmo esse entendimento básico melhorou minhas relações com meus [ROOT.Char.Custom('GetCourtierPlural')] [my_vassal.GetCulture.GetNameNoTooltip]."
 diplomacy_majesty.4071.a: "Tempo bem gasto."
 diplomacy_majesty.4071.b: "Uma cultura tão fascinante... Quero aprender mais!"
 diplomacy_majesty.4070.b.custom: "Todos os [ROOT.Char.Custom('GetCourtier')] e vassalos diretos que são [close_family|lE]"
 diplomacy_majesty.4072.t: "$diplomacy_majesty.4070.t$: Incompreensível!"
 diplomacy_majesty.4072.desc: "Apesar de muitas semanas de estudo, simplesmente não consigo ter uma compreensão sólida do idioma [my_vassal.GetCulture.GetName|l]. Aprendi algumas palavras, mas a gramática, a construção de frases... continuam me escapando. Não consigo imaginar que isso seja produtivo."
 diplomacy_majesty.4072.a: "Preciso continuar tentando!"
 diplomacy_majesty.4072.b: "Meu tempo é melhor empregado em outros lugares."
 diplomacy_majesty.4072.c: "$diplomacy_majesty.4070.b$"
 diplomacy_majesty.4073.t: "$diplomacy_majesty.4070.t$: Esforços Inúteis"
 diplomacy_majesty.4073.desc: "Por mais relutante que eu seja em admitir, simplesmente não acredito que nunca vou dominar o idioma [my_vassal.GetCulture.GetName|l]. Tentei e tentei, mas falhei em fazer qualquer progresso... Devo aceitar isso."
 diplomacy_majesty.4073.a: "Desisto."
 #Trappings of Majesty
 diplomacy_majesty.4090.t: "Insígnias de Majestade"
 diplomacy_majesty.4090.desc: "Estou acima dos meus súditos como governante soberan[ROOT.Char.Custom('ES_OA')] sem igual no domínio. Vestir a posição com roupas e joias resplandecentes seria um sutil lembrete para todos de que eu estou no comando."
 diplomacy_majesty.4090.a: "Apenas as melhores peles e veludos para mim!"
 diplomacy_majesty.4090.b: "As modas locais têm um significado simbólico."
 diplomacy_majesty.4090.b.desc: "Procuro um alfaiate habilidoso no uso de materiais locais"
 diplomacy_majesty.4090.b.success: "Adquiro uma vestimenta digna de um[me.Custom('ES_XA')] [me.GetTitleAsNameNoTooltip]"
 diplomacy_majesty.4090.b.success.tt: "Seu esplêndido traje novo é realmente digno de um[me.Custom('ES_XA')] [me.GetTitleAsNameNoTooltip]!"
 diplomacy_majesty.4090.b.failure: "Adquiro uma vestimenta monótona e pouco impressionante"
 diplomacy_majesty.4090.b.failure.tt: "Sua nova vestimenta não impressiona ninguém."
 diplomacy_majesty.4090.c: "Eu não preciso de #EMP coisas#! para legitimar meu governo!"
 diplomacy_majesty.4090.c.zealous: "Os servidores [ROOT.Char.GetFaith.HighGodNamePossessive] não precisam de enfeites!"
 diplomacy_majesty.4090.d.lunatic.male: "Calças são apenas prisões para as pernas!"
 diplomacy_majesty.4090.d.lunatic.neutral: "Roupas são apenas uma prisão para o corpo!"
 diplomacy_majesty.4090.d.lunatic.female: "Cintas são apenas amarras opressivas!"
 diplomacy_majesty.4090.d.lunatic_beautiful: "Nenhuma roupa pode igualar minha beleza natural!"
 ##################
 #Special Events #
 ##################
 #A Tedious Disagreement
 diplomacy_majesty_special.1010.t: "Uma Desavença Tediosa"
 diplomacy_majesty_special.1010.start.desc: "[debater.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e eu sempre acabamos debatendo"
 diplomacy_majesty_special.1010.divine_attributes.desc: "a compatibilidade dos atributos divinos."
 diplomacy_majesty_special.1010.free_will.desc: "a compatibilidade do conhecimento divino com o livre arbítrio."
 diplomacy_majesty_special.1010.faith_reason.desc: "a relação entre fé e razão."
 diplomacy_majesty_special.1010.just_war.desc: "a natureza de uma guerra justa."
 diplomacy_majesty_special.1010.chivalry.desc: "o valor da cavalaria."
 diplomacy_majesty_special.1010.seven_virtues.desc: "a virtude mais importante entre as sete."
 diplomacy_majesty_special.1010.duty_women.desc: "os deveres das mulheres."
 diplomacy_majesty_special.1010.mercy.desc: "se a misericórdia é um sinal de fraqueza."
 diplomacy_majesty_special.1010.ambition.desc: "se a ambição é um pecado ou uma força."
 diplomacy_majesty_special.1010.inheritance.desc: "assuntos de direito de herança."
 diplomacy_majesty_special.1010.mapped_territory.desc: "o que está além da fronteira de território mapeado."
 diplomacy_majesty_special.1010.heroism.desc: "se o heroísmo é coragem ou insensatez."
 diplomacy_majesty_special.1010.end.desc: "Nunca chegamos a lugar nenhum, apenas repetimos os mesmos argumentos uma e outra vez...\n\nChega, já é o suficiente. Da próxima vez que o assunto surgir, deve ser a última."
 diplomacy_majesty_special.1010.o.tt: "Você debaterá com [debater.GetFirstNameNoTooltip] em um futuro próximo"
 diplomacy_majesty_special.1010.a: "Estudar extensivamente o assunto para me preparar."
 diplomacy_majesty_special.1010.a.success.desc: "Aumento meu entendimento do assunto"
 diplomacy_majesty_special.1010.a.success.tt: "Você aumenta sua chance de sucesso no debate final em #P 20%#!"
 diplomacy_majesty_special.1010.a.success.message: "Meus estudos foram bem e agora estou mais preparad[ROOT.Char.Custom('ES_OA')] para o debate final."
 diplomacy_majesty_special.1010.a.failure.desc: "Exausto após me esforçar demais"
 diplomacy_majesty_special.1010.a.failure.tt: "Você diminui sua chance de sucesso no debate final em #N 20%#!"
 diplomacy_majesty_special.1010.a.failure.message: "Fiquei exausto estudando e não me lembro de muita coisa."
 diplomacy_majesty_special.1010.b: "Estudar meu oponente pode me dar uma vantagem..."
 diplomacy_majesty_special.1010.b.success.desc: "Aumento meu entendimento d [debater.GetTitledFirstNameNoTooltip|l]"
 diplomacy_majesty_special.1010.b.success.tt: "Você receberá uma dica sobre qual tática escolher no debate final"
 diplomacy_majesty_special.1010.c: "Descansar um pouco me deixará pronto para o conflito."
 diplomacy_majesty_special.1010.d: "Vou mostrar a esse[debater.Custom('ES_EA')] [debater.Custom2('InsultNoun', ROOT.Char)] quem é que manda aqui!"
 diplomacy_majesty_special.1010.e: "Es más fácil dejar que gane [debater.Custom('ES_ElElla')]."
 diplomacy_majesty_special.1011.start.desc: "Aqui estamos novamente, como eu antecipei, discutindo sobre"
 diplomacy_majesty_special.1011.study_subject_success.desc: "Que sorte que minhas preparações correram tão bem - tenho alguns novos argumentos na manga!"
 diplomacy_majesty_special.1011.study_opponent_success.desc: "Que sorte que descobri que posso aproveitar d [debater.Custom('StrongestAIValueNoun')] d [debater.GetFirstName]!"
 diplomacy_majesty_special.1011.failure.desc: "Infelizmente, chega na pior hora. Passei a noite acordad[ROOT.Char.Custom('ES_OA')] até muito tarde na minha tentativa de me preparar."
 diplomacy_majesty_special.1011.end.desc: "\n\nUma a uma, as pessoas nas redondezas param para ouvir nossa discussão — algumas de forma um pouco menos discreta do que outras. Agora é a hora de acabar com isso, de uma vez por todas.\n\nAntes de começar, devo decidir qual resultado mais desejo."
 diplomacy_majesty_special.1011.a: "Quero conquistá-lo(a)[debater.Custom('ES_LoLa')] para o meu lado."
 diplomacy_majesty_special.1011.a.flavor: "Para conseguir isso, terei de apresentar minhas ideias de um jeito que pareça aceitável para [debater.GetFirstNameNoTooltip]…"
 diplomacy_majesty_special.1011.b: "Quero esmagar[debater.Custom('ES_LoLa')] na frente de todo mundo!"
 diplomacy_majesty_special.1011.b.flavor: "Para conseguir isso, precisarei explorar uma das fraquezas do caráter d [debater.GetFirstNameNoTooltip] para impedi-l de pensar racionalmente..."
 diplomacy_majesty_special.1011.a.desc: "Possíveis resultados do debate final"
 diplomacy_majesty_special.1011.a.success.desc: "Se eu ganhar o debate final"
 diplomacy_majesty_special.1011.a.failure.desc: "Se eu perder o debate final"
 diplomacy_majesty_special.1011.b.rival: "Pode se tornar m rival"
 diplomacy_majesty_special.1012.desc: "Levando em conta o que sei sobre o caráter de [debater.GetFirstName], acredito que a melhor maneira de conquistá-lo(a) é…[debater.Custom('ES_LoLa')] é…"
 diplomacy_majesty_special.1012.a: "construir meu argumento com base na lógica."
 diplomacy_majesty_special.1012.a.tt: "Funciona bem contra aqueles que são racionais, egoístas, céticos ou de coração frio."
 diplomacy_majesty_special.1012.b: "manter a calma, aconteça o que acontecer."
 diplomacy_majesty_special.1012.generic.tt: "A eficácia da tática depende de quão bem ela se adequa à personalidade d [debater.GetTitledFirstName|l]."
 diplomacy_majesty_special.1012.b.tt: "Funciona bem contra aqueles que são ousados, enérgicos, vingativos ou desonrados."
 diplomacy_majesty_special.1012.c: "... apelar para valores superiores."
 diplomacy_majesty_special.1012.c.tt: "Funciona bem contra aqueles que são honrados, bondosos, perdoadores, crentes ou falta de ambição."
 diplomacy_majesty_special.1012.d: "ouvir atentamente suas palavras."
 diplomacy_majesty_special.1012.d.tt: "Funciona bem contra aqueles que são cautelosos, apáticos ou ignorantes."
 diplomacy_majesty_special.1013.logic.desc: "Ao ilustrar claramente como uma ideia segue a outra, construí minha argumentação tão sólida quanto as muralhas de [ROOT.GetCharacter.Custom('FortifiedBuilding')]. Quando cheguei ao meu ponto, [debater.GetFirstName] não pôde fazer nada além de concordar."
 diplomacy_majesty_special.1013.calm.desc: "Não importava quanto [debater.GetFirstName] tentasse me provocar, mantive minhas emoções sob controle, respondendo de maneira calma e firme. Isso impressionou os espectadores, e eles começaram a concordar com acenos enquanto eu falava. Então [debater.GetFirstName] começou a ouvir, e logo [debater.Custom('ES_ElElla')] também ficou impressionad[debater.Custom('ES_OA')]."
 diplomacy_majesty_special.1013.higher_values.desc: "Sabendo que [debater.GetFirstName] é uma pessoa preocupada com o bem comum, apelei aos valores mais elevados que tanto valoriza. Com essa perspectiva, [debater.GetFirstName] acabou finalmente vendo os méritos dos meus argumentos."
 diplomacy_majesty_special.1013.listen.desc: "Sabendo que [debater.GetFirstName] carecia da fortaleza para sustentar seus próprios argumentos, fiz o que ninguém havia feito antes — escutar[debater.Custom('ES_LoLa')]. Ficou muito satisfeito que [debater.Custom('ES_LoLa')] o levasse a sério e, uma vez que terminou, ficou encantad[debater.Custom('ES_OA')] de me ouvir em seguida."
 diplomacy_majesty_special.1013.a.cruel: "Como é fácil manipular os fracos."
 diplomacy_majesty_special.1013.a.compassionate: "Fico feliz que possamos deixar isso para trás."
 diplomacy_majesty_special.1014.desc: "Tendo em conta o que sei sobre as fraquezas de [debater.GetFirstName], acho que a maneira mais eficaz de humilhar[debater.Custom('ES_LoLa')] na frente de todos é…"
 diplomacy_majesty_special.1014.a: "agir com implacabilidade e assustar[debater.Custom('ES_LoLa')] ."
 diplomacy_majesty_special.1014.generic.tt: "#F A eficácia da tática depende de quão bem ela explora as fraquezas d [debater.GetTitledFirstName|l].#!"
 diplomacy_majesty_special.1014.a.tt: "#F Funciona bem contra aqueles que são cautelosos, bondosos, perdoadores e apáticos.#!"
 diplomacy_majesty_special.1014.b: "provocar[debater.Custom('ES_LoLa')] para que perca a cabeça."
 diplomacy_majesty_special.1014.b.tt: "#F Funciona bem contra aqueles que são ousados, enérgicos, vingativos e honrados.#!"
 diplomacy_majesty_special.1014.c: "ressaltar seu baixo caráter."
 diplomacy_majesty_special.1014.c.tt: "#F Funciona bem contra aqueles que são desonrados, de coração frio, egoístas ou céticos.#!"
 diplomacy_majesty_special.1014.d: "exagerar sua posição."
 diplomacy_majesty_special.1014.d.tt: "#F Funciona bem contra aqueles que são ignorantes, crentes ou falta de ambição.#!"
 diplomacy_majesty_special.1015.scare.desc: "Eu poderia ter sido um pouco mais sutil, mas minhas ameaças veladas e respostas cruéis com certeza funcionaram. [debater.GetFirstName] mal conseguia articular seus próprios pontos, quanto mais se opor aos meus!"
 diplomacy_majesty_special.1015.provoke.desc: "Quase foi fácil demais provocar [debater.Custom('ES_AlAla')] pobre [debater.GetFirstName] até que surtisse efeito. Quando viu as expressões horrorizadas do público, já era tarde demais. Eu parecia um paradigma de sabedoria em comparação, e mal precisei me esforçar."
 diplomacy_majesty_special.1015.exaggerate.desc: "Em vez de desenvolver meu próprio ponto de vista, concentrei-me em distorcer e exagerar o de [debater.GetFirstName] No início, [debater.Custom('ES_ElElla')] não percebeu e continuou defendendo opiniões cada vez mais escandalosas. Quando finalmente apresentei as minhas, conquistei o público para o meu lado."
 diplomacy_majesty_special.1015.low_character.desc: "Em vez de responder às afirmações de [debater.GetFirstName] com fatos e lógica, tracei paralelos entre suas opiniões e seus defeitos de personalidade. Como é bem conhecido seu modo de agir [debater.Custom2('InsultAdjective', ROOT.Char)], logo eu havia manchado a visão da audiência sobre sua posição, não importando o que [debater.Custom('ES_ElElla')] dissesse."
 diplomacy_majesty_special.1015.a.cruel: "Que olhar no rosto dele! Impagável!"
 diplomacy_majesty_special.1015.a.compassionate: "Talvez eu tenha sido um pouco duro demais[ROOT.Char.Custom('ES_OA')]…"
 diplomacy_majesty_special.1016.start.desc: "Apesar de todos os meus esforços para"
 diplomacy_majesty_special.1016.logic.desc: "usar a lógica para convencer [debater.GetFirstName], [debater.Custom('ES_ElElla')] estava envolvido[debater.Custom('ES_OA')] emocionalmente demais para enxergar com clareza."
 diplomacy_majesty_special.1016.calm.desc: "permanecer calmo, as opiniões escandalosas de [debater.GetFirstName] me fizeram tremer de raiva. Maldit[debater.Custom('ES_OA')] [debater.Custom2('InsultNoun', ROOT.Char)] [debater.Custom2('InsultAdjective', ROOT.Char)]!"
 diplomacy_majesty_special.1016.higher_values.desc: "apelar aos valores superiores de [debater.GetFirstName], virou o jogo e me acusou de tentar mudar de assunto."
 diplomacy_majesty_special.1016.listen.desc: "ouvir atentamente, [debater.GetFirstName] só falava sem sentido, como de costume. Enquanto eu fantasiava sobre coisas que preferiria estar fazendo, [debater.GetFirstName] parecia ter apresentado alguns bons pontos."
 diplomacy_majesty_special.1016.scare.desc: "assustar [debater.GetFirstName], [debater.Custom('ES_ElElla')] só riu e eu fiquei parecendo um[ROOT.Char.Custom('ES_XA')] tolo[ROOT.Char.Custom('ES_OA')] e desprezível."
 diplomacy_majesty_special.1016.provoke.desc: "provocar [debater.GetFirstName], [debater.Custom('ES_ElElla')] manteve a calma. Isso impressionou nosso público, enquanto eu só parecia um[ROOT.Char.Custom('ES_OA')] canalha."
 diplomacy_majesty_special.1016.exaggerate.desc: "distorcer as opiniões de [debater.GetFirstName] contra [debater.Custom('ES_ElElla')], na verdade, caí direitinho na armadilha dele."
 diplomacy_majesty_special.1016.low_character.desc: "desviar a atenção para o baixo caráter de [debater.GetFirstName], revelou-se que ninguém mais pensava assim. Em vez disso, o público começou a defender[debater.Custom('ES_LoLa')]!"
 diplomacy_majesty_special.1016.end.desc: "\n\nNão importava que eu estivesse cert - [debater.GetFirstName] conquistou a plateia e eles aceitaram suas palavras sem questionar."
 diplomacy_majesty_special.1016.a: "Que vergonha..."
 diplomacy_majesty_special.1050.title: "Debate Terminou sem Conclusão"
 diplomacy_majesty_special.1050.message: "Nunca tive a oportunidade de testar meu talento para o debate contra [debater.GetTitledFirstName|l]."
