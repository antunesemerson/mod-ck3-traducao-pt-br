l_spanish:
 ###################
 #Standard Events #
 ###################
 #An Opportune Moment, by Mathilda Bjarnehed
 diplomacy_family.0007.t: "Um Momento Oportuno"
 diplomacy_family.0007.desc: "Minha noite cuidadosamente planejada saiu conforme o esperado e me encontro a sós com [voter.GetTitledFirstName|l]. Entre o vinho e sua guloseima favorita, parece mais feliz do que eu o vi em meses.\n\nEsta é a ocasião perfeita para convencer [voter.GetFirstNameNoTooltip] a votar em meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('candidate'))], [candidate.GetTitledFirstName|l]…"
 diplomacy_family.0007.a: "Apresentar meus argumentos mais convincentes."
 diplomacy_family.0007.a.success.tt: "Você convence a [voter.GetTitledFirstNameNoTooltip|l]"
 diplomacy_family.0007.a.success.desc: "Convenci [voter.GetTitledFirstName|l] a votar em [candidate.GetTitledFirstName|l]."
 diplomacy_family.0007.a.failure.tt: "Você não consegue convencer a [voter.GetTitledFirstNameNoTooltip|l]"
 diplomacy_family.0007.a.failure.desc: "Minha tentativa de convencer a [voter.GetTitledFirstName|l]."
 diplomacy_family.0007.c: "Um favor por um favor parece justo, não é?"
 diplomacy_family.0007.b: "Esta bolsa poderia mudar as intenções..."
 diplomacy_family.0007.placeholder.tt: "[voter.GetShortUIName] votará para eleger [candidate.GetShortUIName] como o próximo governante de [title.GetNameNoTier]"
 #A Flaw of Character, by Mathilda Bjarnehed
 diplomacy_family.0008.t: "Uma Falha de Caráter"
 diplomacy_family.0008.start.desc: "Quando eu tiver deixado este mundo, [disagreeable_heir.Custom2('MyCharacterIntroduction', ROOT.Char)] governará em meu lugar.\n\nInfelizmente, rumores sobre [disagreeable_heir.GetFirstNameNoTooltip] e seu"
 diplomacy_family.0008.lazy.desc: "preguiça embaraçosa"
 diplomacy_family.0008.craven.desc: "covardia completa"
 diplomacy_family.0008.arbitrary.desc: "falta completa de moral"
 diplomacy_family.0008.callous.desc: "coração frio como pedra"
 diplomacy_family.0008.stubborn.desc: "obstinação irritante"
 diplomacy_family.0008.gluttonous.desc: "glutonaria repugnante"
 diplomacy_family.0008.greedy.desc: "avareza insaciável"
 diplomacy_family.0008.arrogant.desc: "hubris impenitente"
 diplomacy_family.0008.deceitful.desc: "mentiras e trapaças"
 diplomacy_family.0008.vengeful.desc: "rancor interminável"
 diplomacy_family.0008.end.desc: "se espalharam por minha corte. Isso me faz pensar se conseguirá manter o apoio dos meus vassalos depois que eu me for..."
 diplomacy_family.0008.end_no_vassals.desc: "se espalharam pela minha [ROOT.Char.Custom('GetCourt')|l]. Isso me faz pensar se [disagreeable_heir.GetSheHe] poderá lidar com as responsabilidades de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] e seu povo quando eu me for…"
 diplomacy_family.0008.a: "Tentar corrigir as falhas d [disagreeable_heir.GetFirstNameNoTooltip]."
 diplomacy_family.0008.a.tt: "[disagreeable_heir.GetShortUIName] pode superar seus defeitos"
 diplomacy_family.0008.b: "Em vez disso, exalte suas boas qualidades."
 diplomacy_family.0008.b.custom: "Cada [ROOT.Char.Custom('GetFollowerOrVassal')|l]"
 diplomacy_family.0008.c: "Focar em mim mesmo e liderar pelo exemplo."
 diplomacy_family.0009.desc: "[disagreeable_heir.GetTitledFirstName] me permite orientar[disagreeable_heir.Custom('ES_LoLa')], embora lhe falte entusiasmo.

Temo que seus vícios estejam profundamente enraizados, mas uma experiência verdadeiramente reveladora poderia fazer [disagreeable_heir.GetHerHim] perceber a tolice de seu comportamento.

O que devemos fazer?"
 diplomacy_family.0009.wronglessonstart.desc: "governar em meu lugar,"
 diplomacy_family.0009.compassion.desc: "mostrar verdadeiro perdão,"
 diplomacy_family.0009.honor.desc: "e pareceu não aprender nada com o exercício.\n\nDarei a [disagreeable_heir.GetFirstNameNoTooltip] outra chance; talvez eu deva mudar meu método.\n\nDesta vez, será questão de…"
 diplomacy_family.0009.greed.desc: "Foi frustrante observar a [disagreeable_heir.GetFirstName] lutando para…"
 diplomacy_family.0009.energy.desc: "Duvido que [disagreeable_heir.GetSheHe] estivesse sequer tentando!

Estou quase convencid[ROOT.Char.Custom('ES_OA')] de que a culpa foi mais da falta de entusiasmo de [disagreeable_heir.GetFirstNameNoTooltip] do que da minha lição. Darei a [disagreeable_heir.GetHerHim] mais uma chance...

A questão é: devemos tentar uma nova tática, ou a persistência vencerá hoje?"
 diplomacy_family.0009.vengefulness.desc: "Aventurar-se pelas ruas e conversar com os pobres."
 diplomacy_family.0009.wronglessonend.desc: "Uma lição adequada para alguém que precisa trabalhar sua compaixão"
 diplomacy_family.0009.rightlessonstart.desc: "Assumir a responsabilidade por uma má ação e corrigi-la."
 diplomacy_family.0009.rightlessonend.desc: "Duvido que [disagreeable_heir.GetSheHe] estivesse sequer tentando!

Estou quase convencid[ROOT.Char.Custom('ES_OA')] de que a culpa foi mais da falta de entusiasmo de [disagreeable_heir.GetFirstNameNoTooltip] do que da minha lição. Darei a [disagreeable_heir.GetHerHim] mais uma chance...

A questão é: devemos tentar uma nova tática, ou a persistência vencerá hoje?"
 diplomacy_family.0009.a: "Perdoar alguém a quem tenha feito mal a [disagreeable_heir.Custom('ES_ElElla')]."
 diplomacy_family.0009.a.tt: "Uma lição adequada para alguém que precisa aprender a deixar as coisas irem"
 diplomacy_family.0009.b: "$diplomacy_family.0008.t$: Novas Compreensões"
 diplomacy_family.0009.b.tt: "Fico encantado em ver as mudanças em [disagreeable_heir.GetTitledFirstName|l]!"
 diplomacy_family.0009.c: "Embora, no começo, [disagreeable_heir.Custom('ES_ElElla')] não demonstrava nenhum interesse, as histórias daquelas pobres criaturas que encontramos parecem ter mexido um pouco com o coração.\n\nNo caminho de casa, [disagreeable_heir.Custom('ES_ElElla')] se sentou em silenciosa contemplação, e não pareceu tão"
 diplomacy_family.0009.c.tt: "Embora, no começo, [disagreeable_heir.Custom('ES_ElElla')] não acreditava estar equivocad[disagreeable_heir.Custom('ES_OA')], a resposta que recebeu ao corrigir a questão lhe tocou fundo.\n\nSuspeito que [disagreeable_heir.GetFirstNameNoTooltip] nunca tenha recebido esse tipo de respeito antes, e não pareceu tão"
 diplomacy_family.0009.d: "Claro, no começo lhe custou se separar de seus pertences, mas experimentar a alegria e a gratidão dos que realmente precisavam foi algo completamente novo para [disagreeable_heir.Custom('ES_ElElla')].\n\nNo caminho de casa, [disagreeable_heir.GetFirstNameNoTooltip] até me confessou que nem sentia falta da maioria dos itens, e não pareceu tão"
 diplomacy_family.0009.d.tt: "No início, eu me preocupava com o resultado de dar tanta responsabilidade a [disagreeable_heir.GetHerHim], mas, como não teve ninguém atrás de quem se esconder nem a quem delegar, [disagreeable_heir.GetSheHe] deu um passo à frente e assumiu a tarefa.

[disagreeable_heir.GetFirstNameNoTooltip] ficou mais surpreendid[disagreeable_heir.Custom('ES_OA')] que eu com seus talentos ocultos, e não pareceu tão"
 diplomacy_family.0009.e: "Pude ver o quanto foi difícil para [disagreeable_heir.GetHerHim] encarar [dummy_gender.Custom('ES_AlAla')] [dummy_gender.GetWomanMan] que lhe havia feito mal, com as palavras engasgadas em sua boca enquanto tentava falar.

Felizmente, [dummy_gender.GetSheHe] respondeu com gentileza e, seguindo seu exemplo, [disagreeable_heir.GetFirstName] perdoou [dummy_gender.GetHerHim] de maneira verdadeiramente sincera. [disagreeable_heir.GetSheHe|U] não pareceu tão"
 diplomacy_family.0009.e.tt: "preg[disagreeable_heir.Custom('ES_OA')]"
 diplomacy_family.0010.t: "insegur[disagreeable_heir.Custom('ES_OA')]"
 diplomacy_family.0010.start.desc: "arbitrári[disagreeable_heir.Custom('ES_OA')]"
 diplomacy_family.0010.compassion.desc: "insensível"
 diplomacy_family.0010.honor.desc: "obstinad[disagreeable_heir.Custom('ES_OA')]"
 diplomacy_family.0010.greed.desc: "glutão[disagreeable_heir.Custom('ES_OnOna')]"
 diplomacy_family.0010.energy.desc: "No início, eu me preocupava com o resultado de dar tanta responsabilidade a [disagreeable_heir.GetHerHim], mas, como não teve ninguém atrás de quem se esconder nem a quem delegar, [disagreeable_heir.GetSheHe] deu um passo à frente e assumiu a tarefa.

[disagreeable_heir.GetFirstNameNoTooltip] ficou mais surpreendid[disagreeable_heir.Custom('ES_OA')] que eu com seus talentos ocultos, e não pareceu tão"
 diplomacy_family.0010.vengefulness.desc: "Pude ver o quanto foi difícil para [disagreeable_heir.GetHerHim] encarar [dummy_gender.Custom('ES_AlAla')] [dummy_gender.GetWomanMan] que lhe havia feito mal, com as palavras engasgadas em sua boca enquanto tentava falar.

Felizmente, [dummy_gender.GetSheHe] respondeu com gentileza e, seguindo seu exemplo, [disagreeable_heir.GetFirstName] perdoou [dummy_gender.GetHerHim] de maneira verdadeiramente sincera. [disagreeable_heir.GetSheHe|U] não pareceu tão"
 diplomacy_family.0010.lazy.desc: "Uma grande conquista, para ambos!"
 diplomacy_family.0010.craven.desc: "Isso foi apenas um exercício educativo, nada mais."
 diplomacy_family.0010.arbitrary.desc: "Isso é apenas o primeiro passo! Devemos trabalhar mais!"
 diplomacy_family.0010.callous.desc: "$diplomacy_family.0008.t$: Apegad aos Próprios Caminhos"
 diplomacy_family.0010.stubborn.desc: "[disagreeable_heir.GetTitledFirstName] e sua"
 diplomacy_family.0010.gluttonous.desc: "estão me deixando louc[ROOT.Char.Custom('ES_OA')]! Apesar dos meus melhores esforços, ele(a) não fez nenhum progresso.\n\nSe o coração dele(a) não estiver decidido a mudar, isso nunca acontecerá."
 diplomacy_family.0010.greedy.desc: "Eu desisto..."
 diplomacy_family.0010.arrogant.desc: "presunços[disagreeable_heir.Custom('ES_OA')]"
 diplomacy_family.0010.deceitful.desc: "A Disputa"
 diplomacy_family.0010.sadistic.desc: "[family_1.Custom2('MyCharacterIntroduction', ROOT.Char)|U] vem brigando há dias com [family_2.Custom2('HerHisCharacterIntroduction', family_1)]. Acabei de ouvi-los discutindo na [ROOT.Char.Custom('GetRoom')] ao lado...

"Inacreditável!", grita [family_1.GetFirstName]. "Como pode uma espécie de [family_2.Custom2('InsultNoun', SCOPE.sC('family_1'))] como você acreditar que é a manifestação ideal das virtudes familiares da família [ROOT.Char.GetDynastyName]? É óbvio que eu mereço #EMP muito#! mais essa distinção do que você!""
 diplomacy_family.0010.vengeful.desc: "Nada de brigas na família!"
 diplomacy_family.0010.end.desc: "Você tenta separar a briga"
 diplomacy_family.0010.a: "Deixe-os resolver suas brigas em paz."
 diplomacy_family.0010.b: "Quando entro na [ROOT.Char.Custom('GetRoom')], [family_1.GetFirstName] se vira para me encarar. "Fico feliz que você esteja aqui, [ROOT.Char.GetFirstNameNoTooltip]. Você não poderia, por favor, fazer com que [family_2.Custom2('YourCharacterIntroduction', ROOT.Char)] volte a ter um pouco de bom senso? Está sendo completamente irracional!"
 diplomacy_family.0010.c: "Sim, vergonha para você [family_2.GetFirstNameNoTooltip]!"
 diplomacy_family.0011.t: "Você está errado aqui, [family_1.GetFirstNameNoTooltip]."
 diplomacy_family.0011.start.desc: "Vocês dois estão agindo como crianças mimadas!"
 diplomacy_family.0011.end.desc: "Eles ouvem a razão"
 diplomacy_family.0011.a: "Eles se recusam a ouvir"
 #Family Quarrel, by Petter Vilberg
 diplomacy_family.2101.t: "Bueno, ciertamente, es un modo de impedir que se sigan peleando #EMP entre ellos#!…"
 diplomacy_family.2101.desc: "[family_1.Custom2('MyCharacterIntroduction', ROOT.Char)|U] vem brigando há dias com [family_2.Custom2('HerHisCharacterIntroduction', family_1)]. Acabei de ouvi-los discutindo na [ROOT.Char.Custom('GetRoom')] ao lado...

"Poucas pessoas têm a sorte de ter tantos amigos quanto eu. Agradeço o apoio deles e lhes concedo minha confiança igualmente, mas sinto que, entre todas as almas valorosas que considero meus leais companheiros de vida, há alguém que me entende melhor do que ninguém."
 diplomacy_family.2101.a: "[friend_1.GetTitledFirstNameNoTooltip|l] é meu melhor amig[friend_1.Custom('ES_OA')]."
 diplomacy_family.2101.a.tt: "[friend_1.GetTitledFirstName] pode se tornar seu melhor amig[friend_1.Custom('ES_OA')]"
 diplomacy_family.2101.b: "Confio em [friend_2.GetFirstNameNoTooltip] mais do que em qualquer outra pessoa."
 diplomacy_family.2102.desc: "[friend_2.GetTitledFirstName] pode se tornar seu melhor amig[friend_2.Custom('ES_OA')]"
 diplomacy_family.2102.a: "Quem senão [friend_3.GetTitledFirstNameNoTooltip]?"
 diplomacy_family.2102.b: "[friend_3.GetTitledFirstName] pode se tornar seu melhor amig[friend_3.Custom('ES_OA')]"
 diplomacy_family.2102.c: "Não devo mostrar favoritismo."
 diplomacy_family.2102.c.success: "Só recentemente percebi o quanto dependo do conselho e apoio de [ruler.GetFirstName]. Passei a ver [ruler.GetHerHim] como meu melhor e mais querid[ruler.Custom('ES_OA')] amig[ruler.Custom('ES_OA')]."
 diplomacy_family.2102.c.failure: "Somos verdadeiras almas gêmeas."
 diplomacy_family.2102.d: "Somos amigos, é verdade, mas é só isso."
 diplomacy_family.2102.d.flavor: "Continuamos apenas como amigos"
 #Choosing Best Friend, by Flavio Verna
 diplomacy_family.2200.t: "O Mais Querido de Todos os Meus Amigos"
 diplomacy_family.2200.desc: "[lover.Custom2('RelationToMeShort', SCOPE.sC('ruler'))] e seus ciúmes"
 diplomacy_family.2200.a: "Não suporto a visão de meu querid[lover.Custom('ES_OA')] [ruler.Custom2('RelationToMeShort', SCOPE.sC('lover'))], [lover.GetFirstName] passando tempo com seu [spouse.GetWifeHusband] [spouse.Custom2('InsultAdjective', ROOT.Char)], [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l]."
 diplomacy_family.2200.a.tt: "\n\nA ideia de mãos impuras manchando o corpo é insuportável. Ambos somos da Casa [ruler.GetHouse.GetName], devemos estar juntos!"
 diplomacy_family.2200.b: "\n\nPor que [ruler.GetFaith.HighGodName] favorece a meu [ruler.Custom2('RelationToMeShort', SCOPE.sC('spouse'))] em vez de mim? Ambos pertencemos à Casa [ruler.GetHouse.GetName], mas [spouse.GetFirstNameNoTooltip] pode viver com [lover.GetSheHe] enquanto eu devo rondar à sua sombra."
 diplomacy_family.2200.b.tt: "\n\nMesmo que nunca possamos nos casar, isso não significa que eu não possa me importar com quem passará o resto da vida!"
 diplomacy_family.2200.c: "Melhor a [spouse.GetFirstNameNoTooltip] manter as mãos quietas!"
 diplomacy_family.2200.c.tt: "Vou tentar dissuadir a [spouse.GetTitledFirstName|l] de se deitar com meu [ruler.Custom2('RelationToMeShort', SCOPE.sC('lover'))]"
 diplomacy_family.2200.d: "Consigo intimidar a [spouse.GetTitledFirstName|l]"
 diplomacy_family.2201.desc: "[spouse.GetTitledFirstName] ignora minhas advertências"
 diplomacy_family.2201.a: "[spouse.GetTitledFirstName] ignorou meus avisos sobre [lover.GetFirstName]"
 diplomacy_family.2201.b: "\"Por que você não morre logo!?!\""
 diplomacy_family.2201.b.tt: "[spouse.GetSheHe] deve ser lidad com."
 diplomacy_family.2201.a.tt: "O [scheme|lE] terá uma [success_chance|lE] aumentada"
 #Jealous relative vs lover's spouse, by Flavio Verna
 diplomacy_family.2250.t: "[lover.GetFirstName] #N não irá#! participar do meu [scheme|lE]"
 diplomacy_family.2250.desc.intro: "[house_head.GetTitledFirstNameNoTooltip|l] deve acabar com esse casamento!"
 diplomacy_family.2250.desc.legal.pure: "Eu devo acabar com esse casamento!"
 diplomacy_family.2250.desc.legal.same: "[house_head|lE] tem o poder de anular o casamento d [lover.GetFirstName]"
 diplomacy_family.2250.desc.illegal: "Eu devo aprender a conviver com minha angústia."
 diplomacy_family.2250.a: "[spouse.GetTitledFirstName] pensará duas vezes antes de tocar novamente na minha [lover.GetFirstName]. Tomei muito cuidado para não revelar meus motivos, mas seria tolice insistir nisso novamente no futuro. 

Mais cedo ou mais tarde, [spouse.GetFirstNameNoTooltip] encontrará coragem para ignorar minhas ameaças, mas, por enquanto, posso descansar tranquil[ROOT.Char.Custom('ES_OA')]."
 diplomacy_family.2250.a.tt: "Espero que m [ruler.Custom2('RelationToMeShort', SCOPE.sC('lover'))] aprecie."
 diplomacy_family.2250.a.success.duel: ""Como você pôde ser tão inconsiderad[ROOT.Char.Custom('ES_OA')]?", sibila para mim [lover.GetFirstName], sem ousar levantar a voz nem mesmo em minhas próprias [ROOT.Char.Custom('GetRoomPlural')].

Parece que [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l] ignorou meus avisos e informou a meu [ruler.Custom2('RelationToMeShort', SCOPE.sC('lover'))] sobre nossa conversa.

"Não posso negligenciar meus deveres matrimoniais por sua causa, [ruler.GetFirstNameNoTooltip]!" Dito isso, [lover.GetSheHe] parte às pressas."
 diplomacy_family.2250.a.failure.duel: "Mas...!"
 diplomacy_family.2250.a.failure.tt: "Meu plano funcionou perfeitamente! [lover.GetFirstName] está livre desse[spouse.Custom('ES_EA')] cafaj[spouse.Custom('ES_OA')] [spouse.Custom2('InsultNoun', ROOT.Char)], [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l], e não poderíamos estar mais felizes.\n\n[lover.GetSheHe|U] correu para minhas [ROOT.Char.Custom('GetRoomPlural')] assim que soube das notícias pela boca de [house_head.Custom('ES_DelDela')] [house_head.GetTitledFirstName|l] para me expressar sua gratidão da maneira mais doce."
 diplomacy_family.2250.b.a: "Meu plano funcionou perfeitamente! [lover.GetFirstName] está livre desse(a) rude [spouse.Custom2('InsultNoun', ROOT.Char)] zafi[spouse.Custom('ES_OA')], [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l], e não poderíamos estar mais felizes.\n\n[lover.GetSheHe|U] correu para meus [ROOT.Char.Custom('GetRoomPlural')] assim que recebeu minha carta para expressar sua gratidão da maneira mais doce."
 diplomacy_family.2250.b.b: "Agora finalmente poderemos ficar juntos para sempre!"
 diplomacy_family.2250.b.tt: "As coisas que faço pela família..."
 diplomacy_family.2250.b.spouse_joining: "Todos devem saber do nosso amor!"
 diplomacy_family.2250.b.spouse_refusing: "Eu esperava que [lover.GetFirstName] me agradecesse por ter pedido a [house_head.GetTitledFirstName|l] que [lover.GetHerHim] permitisse se divorciar de [spouse.GetFirstName], mas isso está muito longe da verdade.\n\n[lover.GetSheHe|U] está completamente furibund[lover.Custom('ES_OA')] por eu ter interferido na sua vida conjugal, e não quer mais ter nada a ver comigo."
 diplomacy_family.2250.c.a: "Eu esperava que [lover.GetFirstName] me agradecesse por ter providenciado um divórcio para [lover.GetSheHe], mas isso está muito longe de ser o caso.\n\n[lover.GetSheHe|U] está completamente furios[lover.Custom('ES_OA')] por eu ter me metido em sua vida conjugal, e não quer mais ter nada a ver comigo."
 diplomacy_family.2250.c.b: "Não é sobre nós, é sobre a família!"
 diplomacy_family.2250.c.flavor: "Não sei o que dizer..."
 diplomacy_family.2250.d: "Eu devo aprender a conviver com minha angústia."
 diplomacy_family.2251.desc: "[spouse.GetTitledFirstName] pensará duas vezes antes de tocar novamente na minha [lover.GetFirstName]. Tomei muito cuidado para não revelar meus motivos, mas seria tolice insistir nisso novamente no futuro. 

Mais cedo ou mais tarde, [spouse.GetFirstNameNoTooltip] encontrará coragem para ignorar minhas ameaças, mas, por enquanto, posso descansar tranquil[ROOT.Char.Custom('ES_OA')]."
 diplomacy_family.2251.a: "\n\nMeu [ruler.Custom2('RelationToMeShort', SCOPE.sC('bad_relative'))] é uma decepção total em tudo o que tenta realizar."
 diplomacy_family.2252.desc: "

Uma aberração deformada, meu/minha [ruler.Custom2('RelationToMeShort', SCOPE.sC('bad_relative'))] diminui a dinastia [bad_relative.GetDynasty.GetName] a cada respiração. Como uma linhagem tão distinta poderia gerar uma criatura como [bad_relative.GetHerHim]?", sibila para mim [lover.GetFirstName], sem ousar levantar a voz nem mesmo em minhas próprias [ROOT.Char.Custom('GetRoomPlural')].

Parece que [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l] ignorou meus avisos e informou a meu [ruler.Custom2('RelationToMeShort', SCOPE.sC('lover'))] sobre nossa conversa.

"Uma das [skills|lE] d [bad_relative.GetFirstName] será aumentada"
 diplomacy_family.2252.a: "[bad_relative.GetFirstName] recusa minha ajuda"
 diplomacy_family.2253.desc.a: "Não consegui ensinar nada de proveito a [bad_relative.GetFirstName]"
 diplomacy_family.2253.desc.b: "Devo renovar meus esforços para me livrar de [bad_relative.GetSheHe]."
 diplomacy_family.2253.a: "Às vezes, é necessário podar a árvore..."
 diplomacy_family.2253.b: "Devo expulsar[bad_relative.GetHerHim]!"
 diplomacy_family.2253.c: "O [dynast|lE] tem o poder de deserdar membros da família"
 diplomacy_family.2254.desc.a: "Todos nós temos nossas limitações."
 diplomacy_family.2254.desc.b: "Custou conseguir enfiar alguma coisa na sua cabeça dura a [bad_relative.GetFirstName], mas, de algum jeito, consegui. Ao menos, agora já não é uma completa decepção…"
 diplomacy_family.2254.a: "Eu fiz o que pude."
 diplomacy_family.2254.b: "Não sei o que dizer..."
 #Dealing with lackluster family member, by Flavio Verna
 diplomacy_family.2300.t: "Podando a Dinastia"
 diplomacy_family.2300.desc.intro: "A própria existência d [bad_relative.GetFirstName] é um insulto ao nome de nossa gloriosa dinastia."
 diplomacy_family.2300.desc.a: "Desavença do Sucessor"
 diplomacy_family.2300.desc.b: "Eu estava relaxando na minha [ROOT.Char.Custom('ResidenceBuilding')] no fim do dia quando [heir.Custom2('MyCharacterIntroduction', ROOT.Char)] entra visivelmente abalad[heir.Custom('ES_OA')].

"[vassal.Custom2('YourCharacterIntroduction', ROOT.Char)|U] é um incômodo!", exclama. "Está sempre falando que sou indign[heir.Custom('ES_OA')] de suceder você. Acha que sou [SCOPE.Custom('PersonalityGetTraitDescriptionFromFlag')] demais para ser o próximo"
 diplomacy_family.2300.desc.c: "

Uma aberração deformada, meu/minha [ruler.Custom2('RelationToMeShort', SCOPE.sC('bad_relative'))] diminui a dinastia [bad_relative.GetDynasty.GetName] a cada respiração. Como uma linhagem tão distinta poderia gerar uma criatura como [bad_relative.GetHerHim]?"
 diplomacy_family.2300.desc.d: "[ROOT.Char.GetTitleAsNameNoTooltip]"
 diplomacy_family.2300.a: "do [ROOT.Char.GetPrimaryTitle.GetNameNoTier]!\""
 diplomacy_family.2300.a.success.tt: "Venha sentar-se comigo, vamos discutir esse assunto."
 diplomacy_family.2300.a.success.effect.tt: "Vou ajudar a [heir.GetFirstNameNoTooltip] a encontrar uma maneira de responder às críticas"
 diplomacy_family.2300.a.failure.tt: "Vou falar com [vassal.GetTitledFirstNameNoTooltip|l] a respeito."
 diplomacy_family.2300.a.failure.toast: "[vassal.GetFirstNameNoTooltip] me explicará por que critica meu herdeir[heir.Custom('ES_OA')]"
 diplomacy_family.2300.b.a: "Por que você está me incomodando com isso?"
 diplomacy_family.2300.b.b: "Levo [heir.GetFirstName] de lado para uma conversa franca. Vejo que a situação com [vassal.GetTitledFirstName|l] deixa [heir.GetHerHim] frustrad[heir.Custom('ES_OA')] e que [heir.GetSheHe] está dispost[heir.Custom('ES_OA')] a ouvir meus conselhos."
 diplomacy_family.2300.c: "Vocês têm mais em comum do que pensam."
 diplomacy_family.2300.c.flavor: "[heir.GetFirstNameNoTooltip] e [vassal.GetFirstNameNoTooltip] resolvem suas diferenças"
 diplomacy_family.2300.d: "[heir.GetFirstNameNoTooltip] não está dispost[heir.Custom('ES_OA')] a se reconciliar com [vassal.GetFirstNameNoTooltip]"
 diplomacy_family.2301.desc: "Eu poderia ajudar você a praticar ser [SCOPE.Custom('PersonalityGetTraitDescriptionFromFlagInverted')]..."
 diplomacy_family.2301.a: "Convenço a [heir.GetFirstNameNoTooltip] para tentar mudar sua personalidade"
 ##################
 #Special Events #
 ##################
 #Successor's Squabble — Resolve a dispute between your heir and a powerful vassal, by Sean Hughes
 diplomacy_family_special.2200.t: "Organizo uma reunião com [vassal.Custom('ES_ElLa')] [vassal.GetTitledFirstName|l] para tratar do problema dele com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('heir'))], [heir.GetTitledFirstName|l].\n\n"É bem simples, meu [ROOT.Char.GetTitledFirstNameNoTooltip|l], não gosto da ideia de ter um senhor [SCOPE.Custom('PersonalityGetTraitDescriptionFromFlag')|l]. Pelo bem do [ROOT.Char.Custom('GetRealmOrDomicile')], estou dispost[vassal.Custom('ES_OA')] a dar a conhecer meu desagrado, embora isso signifique me colocar em risco.""
 diplomacy_family_special.2200.desc: "Eu estava relaxando na minha [ROOT.Char.Custom('ResidenceBuilding')] no fim do dia quando [heir.Custom2('MyCharacterIntroduction', ROOT.Char)] entra visivelmente abalad[heir.Custom('ES_OA')].

"[vassal.GetFirstNameNoTooltip] não está dispost[vassal.Custom('ES_OA')] a se reconciliar com [heir.GetFirstNameNoTooltip]"
 diplomacy_family_special.2200.same_title.desc: "Você está certo, [heir.GetFirstNameNoTooltip] é uma decepção."
 diplomacy_family_special.2200.same_sex_title.desc: "Você não irá criticar m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('heir'))]!"
 diplomacy_family_special.2200.opposite_sex_title.desc: "Após conversar com [vassal.GetTitledFirstName|l], decidiu tentar fazer as pazes com [heir.GetTitledFirstName|l], concentrando-se no que têm em comum, em vez de suas diferenças. Essa mudança de atitude é bastante promissora!"
 diplomacy_family_special.2200.ruler.desc: "Isso é um bom presságio para o futuro!"
 diplomacy_family_special.2200.end.desc: "Apesar dos meus melhores esforços para convencer [vassal.GetTitledFirstName|l] de que ele poderia se dar bem com [heir.GetTitledFirstName|l] se tentasse, es[vassal.Custom('ES_EA')] idiota se recusou a reconhecer qualquer coisa agradável na personalidade de [heir.GetTitledFirstName|l]."
 diplomacy_family_special.2200.a: "[vassal.GetTitledFirstNameNoTooltip|l] é de verdade um[vassal.Custom('ES_XA')] pat[vassal.Custom('ES_AnAna')] ordinári[vassal.Custom('ES_OA')]!"
 diplomacy_family_special.2200.a.tt: "Eu esperava mais d [vassal.GetTitledFirstNameNoTooltip|l]."
 diplomacy_family_special.2200.b: "Após falar com [heir.Custom('ES_ElElla')][heir.GetTitledFirstName|l] disse que tentaria se comportar melhor na presença de [vassal.GetTitledFirstName|l].\n\nAo se concentrarem no que têm em comum, em vez de nas diferenças, é possível que surja uma nova amizade entre os dois."
 diplomacy_family_special.2200.b.tt: "Isso é um bom presságio para o futuro!"
 diplomacy_family_special.2200.c: "Apesar dos meus melhores esforços para convencer a [heir.GetTitledFirstName|l] de que ele poderia se dar bem com [vassal.GetTitledFirstName|l] se tentasse, [heir.GetFirstNameNoTooltip] se recusou a mudar seu comportamento na presença de [vassal.GetTitledFirstNameNoTooltip|l].\n\nParece que a animosidade entre os dois continuará por algum tempo…"
 diplomacy_family_special.2201.desc: "Me decepciona [heir.GetFirstNameNoTooltip]."
 diplomacy_family_special.2201.a: "Sentei-me com [heir.GetFirstName] e expliquei que às vezes o melhor para o [ROOT.Char.Custom('GetRealmOrDomicile')] era ter um comportamento [SCOPE.Custom('PersonalityGetTraitDescriptionFromFlagInverted')|l], mesmo que esse tipo de comportamento não venha naturalmente.\n\n[heir.GetSheHe|U] no começo ficou em dúvida, mas se animou quando eu lhe disse que essas coisas ficam mais fáceis com o tempo e a prática."
 diplomacy_family_special.2201.a.success: "O tempo dirá como isso afetará as coisas."
 diplomacy_family_special.2201.a.failure: "[heir.GetFirstName] tentará ser mais [SCOPE.Custom('PersonalityGetTraitDescriptionFromFlagInvertedTraitLink')]"
 diplomacy_family_special.2201.b: "Tentei convencer [heir.GetFirstName] de por que era do interesse de [heir.GetHerHis] ser menos [SCOPE.Custom('PersonalityGetTraitDescriptionFromFlag')], dando exemplos de como é vantajoso ser um[heir.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] [SCOPE.Custom('PersonalityGetTraitDescriptionFromFlagInverted')].

Apesar disso, [heir.GetSheHe] se recusou a considerar mudar de comportamento. Parece estar decidid[heir.Custom('ES_OA')] a continuar sendo como é, mesmo que isso signifique afastar os outros."
 diplomacy_family_special.2201.b.success: "Por que não consegue enxergar a verdade de minhas palavras?"
 diplomacy_family_special.2201.b.failure: "Pode ser que a relação de [heir.GetTitledFirstName|l] e [vassal.GetTitledFirstName|l] tenha começado com animosidade e rancor, mas sob minha orientação eles aprenderam a se compreender e a demonstrar confiança mútua. O cultivo cuidadoso desses atributos levou à criação de uma forte amizade!"
 diplomacy_family_special.2201.b.success.tt: "Eu sabia que todos nós poderíamos resolver isso!"
 diplomacy_family_special.2201.b.failure.tt: "Tenho incentivado [heir.GetFirstName] a mudar seu comportamento, e parece que meus esforços realmente valeram a pena!\n\nSer [SCOPE.Custom('PersonalityGetTraitDescriptionFromFlagInverted')] parece ter se tornado algo natural para essa pessoa, um hábito tão arraigado que já não precisa fazer nenhum esforço para agir assim."
 diplomacy_family_special.2201.c: "Fico feliz em ver a [heir.GetFirstNameNoTooltip] crescendo como pessoa."
 diplomacy_family_special.2202.desc: "Tutela do herdeiro"
 diplomacy_family_special.2202.a: "$diplomacy_family.2400.story_title$: a oferta"
 diplomacy_family_special.2202.a.success: "Certa manhã cedo, meu [ROOT.Char.Custom2('PartnerOpinionDescription', SCOPE.sC('spouse') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] entra em meu [ROOT.Char.Custom('GetChambersOrTent')].

"Ah, [ROOT.Char.Custom('ComplimentAdjective')|U] [spouse.Custom2('RelationToMe', ROOT.Char)] meu[ROOT.Char.Custom('ES_OA')]! Ultimamente tenho pensado na educação de [heir.GetFirstName]. Creio que meu conhecimento de [spouse.Custom('highest_skill_noun')|l] possa ser útil para [heir.GetHerHim]. Permitir-me-íeis ajudar em seus estudos acadêmicos?""
 diplomacy_family_special.2202.a.failure: "Deveria deixar que tente."
 diplomacy_family_special.2202.b: "[spouse.GetFirstNameNoTooltip] tentará tutorar [heir.GetFirstNameNoTooltip]"
 diplomacy_family_special.2202.c: "#weak Isto #EMP podría#! melhorar a educação de [TARGET_CHARACTER.GetFirstNameNoTooltip]#!"
 diplomacy_family_special.2210.desc: "Minha tutela é suficiente"
 diplomacy_family_special.2210.a: "$diplomacy_family.2400.story_title$: Em um impasse"
 diplomacy_family_special.2211.desc: "Em uma noite agitada, começo a vagar. Ao chegar ao depósito de comida, ouço um barulho estranho. Para minha surpresa, vejo minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetFirstName] enchendo o rosto com [ROOT.Char.Custom('GetExpensiveDessert')]. Olha para mim com vergonha e desespero.\n\n"Estou sem saber o que fazer ao instruir [heir.GetFirstName]! Em vez de me escutar,"
 diplomacy_family_special.2211.a: "está correndo de um lado para o outro aprontando travessuras."
 diplomacy_family_special.2211.a.high_opinion: "está sempre conversando com as outras crianças."
 diplomacy_family_special.2212.desc: "me deixa louc[spouse.Custom('ES_OA')] com perguntas irrelevantes."
 diplomacy_family_special.2212.a: "está sempre com o nariz enfiado em um livro."
 diplomacy_family_special.2213.desc: "faz exatamente o contrário do que eu digo."
 diplomacy_family_special.2213.a: "Não posso continuar assim ou perderei a sanidade"."
 diplomacy_family_special.2220.desc: "Deveria comprar-lhe material de pesquisa."
 diplomacy_family_special.2220.a: "Você ajuda [spouse.GetFirstNameNoTooltip] no ensino de [heir.GetNameNoTooltip]"
 diplomacy_family_special.2220.a.tt: "#weak Devido às suas habilidades combinadas, a educação de [TARGET_CHARACTER.GetFirstNameNoTooltip] pode melhorar #P enormemente#! #!"
 diplomacy_family_special.2221.desc: "Tentei convencer [heir.GetFirstName] de por que era do interesse de [heir.GetHerHis] ser menos [SCOPE.Custom('PersonalityGetTraitDescriptionFromFlag')], dando exemplos de como é vantajoso ser um[heir.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] [SCOPE.Custom('PersonalityGetTraitDescriptionFromFlagInverted')].

Apesar disso, [heir.GetSheHe] se recusou a considerar mudar de comportamento. Parece estar decidid[heir.Custom('ES_OA')] a continuar sendo como é, mesmo que isso signifique afastar os outros."
 diplomacy_family_special.2221.a: "#weak La educación de [TARGET_CHARACTER.GetFirstNameNoTooltip] mejorará #!"
 diplomacy_family_special.2231.desc: "Deixe que eu cuide disso em vez disso."
 diplomacy_family_special.2231.a: "#weak La educación de [TARGET_CHARACTER.GetFirstNameNoTooltip] mejorará #!"
 diplomacy_family_special.2233.desc: "$diplomacy_family.2400.story_title$: um esforço conjunto"
 diplomacy_family_special.2233.a: "Após meses de muito trabalho e dedicação à tutela de [heir.GetFirstName], minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetFirstName] se aproxima de mim em minha [ROOT.Char.Custom('GetChambersOrTent')]. Seu rosto transborda orgulho. 

"Oh, [ROOT.Char.GetFirstNameNoTooltip]! Graças à sua orientação e apoio, noss[heir.Custom('ES_OA')] [heir.Custom('PetName')] [heir.GetNameNoTooltip] se destacou nos estudos. Eu estaria perdid[spouse.Custom('ES_OA')] sem você.""
