l_spanish:
 diplomacy_lifestyle_rank_up_indication: "Eu posso obter um [perk|lE] [diplomacy_lifestyle|lE]"
 ###################
 #Standard Events #
 ###################
 #Social Manipulation (Put a vassal in their place by manipulating them), by Mathilda Bjarnehed
 diplomacy_generic.0012.t: "Manipulação Social"
 diplomacy_generic.0012.start.desc: "Da primeira vez que aconteceu, mal dei importância, mas [disobedient_subject.Custom2('MyCharacterIntroduction', ROOT.Char)] ficou mais ousado. Seus desafios não passam mais despercebidos"
 diplomacy_generic.0012.council.desc: "na mesa do conselho."
 diplomacy_generic.0012.vassal.desc: "entre meus vassalos."
 diplomacy_generic.0012.end.desc: "\n\n[disobedient_subject.Custom('ES_ElElla')|U] está testando meus limites. E os outros [disobedient_subject.Custom('ES_LoLa')] seguirão… a menos que eu lhe dê uma amostra do próprio remédio…"
 diplomacy_generic.0012.a: "[disobedient_subject.Custom('ES_LoLa')|U] ignorarei e roubarei as ideias."
 make_invisible_option.tt: "Você acha que [disobedient_subject.GetFirstName] é tímid[disobedient_subject.Custom('ES_OA')], apátic[disobedient_subject.Custom('ES_OA')] ou pouco ambicios[disobedient_subject.Custom('ES_OA')]"
 diplomacy_generic.0012.b: "Zombar de sua [disobedient_subject.Custom2('PointOfRidicule', ROOT.Char)] vai calar a boca."
 ridicule_option.tt: "Você acha que [disobedient_subject.GetFirstName] tem complexos e se preocupa com o que os outros pensam"
 diplomacy_generic.0012.c: "O "esquecimento" de convidar[disobedient_subject.Custom('ES_LoLa')] deixa de fora [disobedient_subject.GetFirstName]."
 withhold_information_option.tt: "Crees que [disobedient_subject.GetFirstName] es insegur[disobedient_subject.Custom('ES_OA')] o retraíd[disobedient_subject.Custom('ES_OA')]"
 diplomacy_generic.0012.d: "Ele/ela terá tarefas que sejam impossíveis de concluir."
 impossible_task_option.tt: "Você acredita que [disobedient_subject.GetFirstName] faria todo o que estivesse ao seu alcance para concluir a tarefa"
 diplomacy_generic.0012.e: "A culpa de todos os problemas será atribuída a [disobedient_subject.Custom('ES_ElElla')]."
 shame_option.tt: "Crees que [disobedient_subject.GetFirstName] es concienzud[disobedient_subject.Custom('ES_OA')], o al menos quiere que la gente piense bien de [disobedient_subject.Custom('ES_ElElla')]"
 diplomacy_generic.0012.f: "Vou me livrar de [disobedient_subject.Custom('ES_ElElla')] fazendo um comentário sobre seus [disobedient_subject.Custom('ObjectifiedFeature')]."
 objectification_option.tt: "Você acha que [disobedient_subject.GetFirstName] frequentemente foi objetificado por causa da aparência"
 diplomacy_generic.0012.g: "Uma ameaça \"sutil\" de violência vai acabar com isso."
 threat_option.tt: "Você acredita que [disobedient_subject.GetFirstName] é covarde ou quer manter a paz"
 diplomacy_generic.0012.h: "Como ousas desafiar o teu #EMP [ROOT.Char.GetTitleAsNameNoTooltip]#!!?"
 diplomacy_generic.0012.tt: "Não muito diplomático, mas eficaz mesmo assim..."
 diplomacy_generic.0012.good_outcome.desc: "Você manipula [disobedient_subject.GetTitledFirstNameNoTooltip|l]"
 diplomacy_generic.0012.bad_outcome.desc: "[disobedient_subject.GetTitledFirstNameNoTooltip|l] não é enganad"
 diplomacy_generic.0012.terrible_outcome.desc: "[disobedient_subject.GetTitledFirstNameNoTooltip|l] te engana"
 diplomacy_generic.0012.failure.desc: "Você não conseguiu manipular a [disobedient_subject.GetTitledFirstName|l]"
 diplomacy_generic.0013.t: "Marionete"
 diplomacy_generic.0013.make_invisible.desc: "Es como si mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('suppressor'))] [suppressor.GetTitledFirstName|l] hubiera perdido el interés en mi opiniones. Cuando hablo, me interrumpe o desvía su atención a otro asunto. Pero a veces sí que parece escuchar, cuando [suppressor.Custom('ES_ElElla')] se apropia de mis ideas y las repite como suyas…"
 diplomacy_generic.0013.ridicule.desc: "O que devo fazer para que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('suppressor'))] me leve a sério? Sempre que falo, [suppressor.Custom('ES_ElLa')] [suppressor.GetTitledFirstName|l] me interrompe para zombar das minhas ideias ou do meu "[disobedient_subject.Custom2('PointOfRidicule', SCOPE.sC('suppressor'))]"."
 diplomacy_generic.0013.withhold_information.desc: "Ultimamente, parece que todos sabem de tudo, menos eu! Fico parecendo um[ROOT.Char.Custom('ES_XA')] idiota ao ter que pedir esclarecimentos a [suppressor.GetTitledFirstName|l] nas reuni?es ou ao basear minhas sugest?es em informa??o ultrapassada. Temo que meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('suppressor'))] esteja escondendo coisas de mim de prop?sito."
 diplomacy_generic.0013.impossible_task.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('suppressor'))], [suppressor.GetTitledFirstName|l], continua me encarregando de tarefas impossíveis de concluir a tempo! Quando tento realizá-las com cuidado, sou preguiços[ROOT.Char.Custom('ES_OA')], e se eu me apresso, ele me apresenta como um[ROOT.Char.Custom('ES_XA')] descuidad[ROOT.Char.Custom('ES_OA')]."
 diplomacy_generic.0013.shame.desc: "Sempre que há um problema, [suppressor.GetTitledFirstName|l] parece pensar que a culpa é minha. No entanto, quando sou eu quem traz à tona um assunto, ele me acusa de focar nas coisas erradas!"
 diplomacy_generic.0013.objectification.desc: "Quando meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('suppressor'))] organiza uma reunião, sinto um aperto no estômago. Nas últimas semanas, houve mais de um comentário sobre meu "[disobedient_subject.Custom('ObjectifiedFeature')]", e quando falo, [suppressor.Custom('ES_ElElla')] passa mais tempo me devorando com o olhar do que ouvindo. Por que [suppressor.GetTitledFirstName|l] se importa mais com meu corpo físico do que com o que eu faço e digo?"
 diplomacy_generic.0013.threat.desc: "De un tiempo a esta parte, noto miradas extrañas en [suppressor.GetTitledFirstName|l] cada vez que hablo. Una combinación de exasperación e ira. Sin embargo, no estaba segur[ROOT.Char.Custom('ES_OA')] de que algo iba mal hasta hoy. Cuando discrepé con [suppressor.Custom('ES_ElElla')] en una reunión, ¡amenazó con azotarme!"
 diplomacy_generic.0013.a: "Dois podem jogar esse jogo."
 diplomacy_generic.0013.a.success.tt: "Você consegue manipular [suppressor.GetTitledFirstNameNoTooltip|l]"
 diplomacy_generic.0013.a.failure.tt: "[suppressor.GetTitledFirstNameNoTooltip|l] te manipula"
 diplomacy_generic.0013.b: "Talvez eu mereça esse tratamento..."
 diplomacy_generic.0014.t: "$diplomacy_generic.0012.t$: Mestre da Supressão"
 diplomacy_generic.0014.make_invisible.desc: "Cada vez que [disobedient_subject.GetTitledFirstName|l] erguia a voz para falar, eu bocejava, desviava a atenção para outro lugar ou, simplesmente, [disobedient_subject.Custom('ES_LoLa')] interrompia. Quando os outros começaram a seguir meu exemplo, [disobedient_subject.GetTitledFirstNameNoTooltip|l], passou a vacilar cada vez mais."
 diplomacy_generic.0014.ridicule.desc: "Meus comentários maliciosos e constantes sobre [disobedient_subject.Custom2('PointOfRidicule', ROOT.Char)] [disobedient_subject.Custom('ES_DelDela')] [disobedient_subject.GetTitledFirstName|l] parecem ter afetado [disobedient_subject.GetHerHim]. Quando os outros começaram a seguir meu exemplo, [disobedient_subject.Custom('ES_ElLa')] [disobedient_subject.GetTitledFirstNameNoTooltip|l], vacilou cada vez mais."
 diplomacy_generic.0014.withhold_information.desc: "Desde que comencé a ocultar información a [SCOPE.sC('disobedient_subject').GetTitledFirstName|l], ha ido quedando como un[disobedient_subject.Custom('ES_XA')] complet[disobedient_subject.Custom('ES_OA')] idiota en más ocasiones de las que puedo contar. Desestimar sus sugerencias desesperadamente anticuadas ha sido más fácil que engañar a un perro."
 diplomacy_generic.0014.impossible_task.desc: "Cuando [disobedient_subject.GetTitledFirstName|l] intenta cumplir sus labores a conciencia, [disobedient_subject.Custom('ES_LoLa')] regañaba delante de los demás, y cuando se apresura para tenerlas hechas a tiempo, hacía que todo el mundo viera lo chapucero de su trabajo. [disobedient_subject.Custom('ES_ElElla')|U] se está rompiendo la cabeza para agradarme y, sin embargo nunca he reconocido sus esfuerzos."
 diplomacy_generic.0014.shame.desc: "[disobedient_subject.GetTitledFirstName] sacó a la luz un asunto para hacerme quedar mal, pero ahora han cambiado las tornas. Cada vez que [disobedient_subject.Custom('ES_ElElla')] presentaba un motivo de preocupación, yo conseguía hábilmente desviar la culpa de nuevo hacia [disobedient_subject.Custom('ES_ElElla')] o hacia que pareciese ruin por mencionarlo siquiera."
 diplomacy_generic.0014.objectification.desc: "Piadas obscenas, olhares insistentes, interrupções para “elogiar” seu [disobedient_subject.Custom('ObjectifiedFeature')]... Pouco a pouco, consigo quebrar [disobedient_subject.GetTitledFirstName|l], deixando-o[disobedient_subject.Custom('ES_EA')] tenso e constrangid[disobedient_subject.Custom('ES_OA')]."
 diplomacy_generic.0014.threat.desc: "Às vezes, uma simples ameaça de violência resolve tudo."
 diplomacy_generic.0014.end.desc: "Agora se mantém quieta, com os olhos baixos."
 diplomacy_generic.0014.a.cruel: "Agora vai pensar duas vezes antes de voltar a me desafiar!"
 diplomacy_generic.0014.a.compassionate: "Cruel, talvez, mas foi necessário."
 diplomacy_generic.0015.t: "$diplomacy_generic.0012.t$: De Manipulador a Manipulado"
 diplomacy_generic.0015.make_invisible.desc: "Quando [disobedient_subject.GetTitledFirstName|l] alçou a voz para falar, bocejei e voltei minha atenção para meus papéis. Esperava que os outros seguissem meu exemplo, mas, em vez disso, se juntaram à conversa. Quando finalmente engoli meu orgulho para me juntar a eles, [disobedient_subject.GetFirstName] já tinha vantagem e minhas palavras foram logo esquecidas."
 diplomacy_generic.0015.ridicule.desc: "Resultó que el ingenio [disobedient_subject.Custom('ES_DelDela')] [disobedient_subject.GetTitledFirstName|l] era más agudo de lo que había anticipado. Cuando hice un comentario sobre su [disobedient_subject.Custom2('PointOfRidicule', ROOT.Char)], [disobedient_subject.Custom('ES_ElElla')] volvió la situación inmediatamente contra mí y me hizo parecer ruin por responder a un problema real con una observación maliciosa."
 diplomacy_generic.0015.impossible_task.desc: "Para mi gran sorpresa, [disobedient_subject.GetTitledFirstName|l] ha conseguido reclutar a uno de los otros para ayudarle en la tarea que le había asignado. Cuando apenas tuvieron tiempo para terminarla en condiciones, quedó claro que le había exigido demasiado. Ni siquiera pude quejarme por la ejecución de la tarea."
 diplomacy_generic.0015.shame.desc: "Desviar la culpa a [disobedient_subject.GetTitledFirstName|l] resultó ser más difícil de lo que había imaginado. Sí, puedo ser convincente, pero resultó que a [disobedient_subject.Custom('ES_ElElla')] se le daba mejor jugar a ese juego que a mí. Con una sola frase hizo pedazos mi explicación, dejándome como estúpid[ROOT.Char.Custom('ES_OA')] o poco fiable. No sé qué es peor."
 diplomacy_generic.0015.objectification.desc: "Creí que mis comentarios lascivos cerrarían la boca de [disobedient_subject.GetTitledFirstName|l], pero su respuesta fue digna y mordaz a la vez. Ahora los demás creen que [disobedient_subject.Custom('ES_ElElla')] es una especie de sant[disobedient_subject.Custom('ES_OA')], mientras que yo parezco trivial e inmoral comparad[ROOT.Char.Custom('ES_OA')] con [disobedient_subject.Custom('ES_ElElla')]."
 diplomacy_generic.0015.threat.desc: "Eu tinha pensado que minhas ameaças calariam a [disobedient_subject.GetTitledFirstName|l], mas ele simplesmente as ignorou e continuou. Sua total falta de medo fez com que minhas palavras parecessem triviais, em vez de intimidadoras."
 diplomacy_generic.0015.withhold_information.desc: "Embora eu \"esquecesse\" com frequência de informar a [disobedient_subject.GetTitledFirstName|l] ou convidar[disobedient_subject.Custom('ES_LoLa')] para as reuniões, ela sempre fica sabendo de tudo. Agora pareço incompetente comparad[ROOT.Char.Custom('ES_OA')] com [disobedient_subject.Custom('ES_ElElla')]!"
 diplomacy_generic.0015.a: "Dessa vez, você vence, [disobedient_subject.GetFirstNameNoTooltip]."
