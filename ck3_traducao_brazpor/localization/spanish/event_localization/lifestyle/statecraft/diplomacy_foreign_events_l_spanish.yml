l_spanish:
 ###################
 #Standard Events #
 ###################
 #Diplomacy (Majesty) Events:
 #1074		 : Religious Refugees (Oppressed faithful in neighboring county), by Sean Hughes
 #3001 — 3008: Correspondence (Become pen pals with a foreign ruler), by Linnéa Thimrén and Sean Hughes
 #Diplomay (Majesty) Special Events:
 #1010 — 1031: Foreign Relations (Invite a foreign ruler to your court), by Mathilda Bjarnehed
 #1032 — 1051: The Weak Link	(One of your neighbor's vassals is disloyal), by Mathilda Bharnehed
 #Religious Refugees, by Sean Hughes
 diplomacy_foreign.1074.t: "Refugiados Religiosos"
 diplomacy_foreign.1074.desc: "[heretic_ruler.GetTitledFirstName] governa sobre o condado vizinho de [target_county.GetName], que abriga uma grande população de devotos [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip]. [heretic_ruler.GetTitleAsName] [heretic_ruler.GetFaith.GetAdherentName] poderia facilmente perseguir os fiéis [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] que vivem lá, e é minha responsabilidade protegê-los da sua influência [ROOT.GetCharacter.Custom2('ToleranceValue', SCOPE.sC('heretic_ruler'))]."
 diplomacy_foreign.1074.a: "Não podemos permitir que continue oprimindo os fiéis!"
 diplomacy_foreign.1074.b: "Contrabandeie o máximo de [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] que pudermos para a segurança."
 diplomacy_foreign.1074.c: "Mandemos um enviado a [heretic_ruler.GetFirstNameNoTooltip] para discutir o tratamento que recebem."
 diplomacy_foreign.1074.c.success: "[heretic_ruler.GetFirstName] recebe meu enviado de braços abertos"
 diplomacy_foreign.1074.c.failure: "[heretic_ruler.GetFirstName] está desconfiad das intenções do meu enviado"
 #Correspondence, by Linnéa Thimrén and Sean Hughes
 diplomacy_foreign.3001.t: "Correspondência" #<DELETE THIS KEY>
 diplomacy_foreign.3001.opening: "[neighboring_ruler.Custom2('AppropriateGreeting', ROOT.Char)]"
 diplomacy_foreign.3001.desc: "Ouvi boas coisas sobre você, e tenho interesse em iniciar uma conversa por escrito. Espero que esta carta o(a) encontre disposto(a)[neighboring_ruler.Custom('ES_OA')] pois aguardo sua pronta resposta."
 diplomacy_foreign.3001.a: "Começar a trocar cartas com [neighboring_ruler.GetFirstNameNoTooltip]."
 diplomacy_foreign.3001.a.tt: "Você continuará recebendo cartas d [neighboring_ruler.GetFirstName]"
 diplomacy_foreign.3001.b: "Emoldure a carta d [neighboring_ruler.GetTitleAsNameNoTooltip] no meu salão!"
 diplomacy_foreign.3001.c: "Declinar educadamente."
 diplomacy_foreign.3003.desc_dead: "Meu predecessor[dead_ruler_2.Custom('ES_XA')] [SCOPE.sC('dead_ruler').GetTitledFirstName|l] me incentivou a continuar a correspondência com você. Devo admitir que não estou segur[ROOT.Char.Custom('ES_OA')] de quê escrever… imploro-lhe que escolha um assunto!"
 diplomacy_foreign.3003.desc: "Obrigado por sua resposta rápida! Estou ansioso por nossa correspondência. Por favor, eu lhe imploro - escolha o primeiro assunto para discutirmos!"
 diplomacy_foreign.3003.a_lifestyle_diplomat: "Vamos discutir os pontos finos da etiqueta!"
 diplomacy_foreign.3003.a_lifestyle_general: "Tenho algumas ótimas histórias de guerra para compartilhar."
 diplomacy_foreign.3003.a_lifestyle_administrator: "As peculiaridades da administra??o dos senhorios s?o simplesmente #EMP fascinantes!#!"
 diplomacy_foreign.3003.a_lifestyle_schemer: "Ooh, aposto que adoraria saber os últimos boatos…"
 diplomacy_foreign.3003.a_lifestyle_scholar: "Debates filosóficos são sempre interessantes!"
 diplomacy_foreign.3003.a.tt: "Começar com um tema que você domina pode impressionar[neighboring_ruler.Custom('ES_LoLa')]"
 diplomacy_foreign.3003.b: "Por favor, me conte sobre [neighboring_ruler.Custom('subject_of_interest')]."
 diplomacy_foreign.3003.b.tt: "Você ouviu rumores de que este assunto é importante para [neighboring_ruler.Custom('ES_ElElla')]"
 diplomacy_foreign.3003.c: "Vou enviar um presente para mostrar minha gratidão."
 diplomacy_foreign.3003.c.tt: "Você acredita que [neighboring_ruler.GetSheHe] é uma pessoa que valoriza coisas materiais"
 diplomacy_foreign.3007.desc_dead: "Meu predecessor[dead_ruler_2.Custom('ES_XA')] [dead_ruler_2.GetTitledFirstName|l] me incentivou a continuar a correspondência com você. A última carta que você me enviou me deixou uma boa impressão!"
 diplomacy_foreign.3007.desc_lifestyle: "Fiquei feliz em ver o quanto você está envolvido em suas paixões. Sua última carta definitivamente prova sua habilidade nelas!"
 diplomacy_foreign.3007.desc_interest: "Pensar que você perguntaria sobre um assunto tão querido para mim - você realmente me conhece melhor do que a maioria!"
 diplomacy_foreign.3007.desc_gift: "O presente que você me enviou foi muito apreciado!"
 diplomacy_foreign.3007.desc_ending: "Já que você me agradou tanto, eu devo perguntar se há algo que eu possa fazer por você?"
 diplomacy_foreign.3007.a: "Eu só desejo continuar trocando cartas!"
 diplomacy_foreign.3007.a_random_list_good: "Nossa correspondência me ensina muito sobre assuntos estrangeiros"
 diplomacy_foreign.3007.a_random_list_bad: "Não aprendo muito com as cartas d [neighboring_ruler.GetFirstNameNoTooltip]"
 diplomacy_foreign.3007.b: "Talvez possamos organizar um acordo comercial?"
 diplomacy_foreign.3007.c: "Agora que eu atendi ao seu desejo de conversar..."
 diplomacy_foreign.3007.c_tt: "Tento convencer a [neighboring_ruler.GetFirstNameNoTooltip] de que está em dívida comigo!"
 diplomacy_foreign.3007.c_random_list_good: "Consigo convencer a [neighboring_ruler.GetFirstNameNoTooltip]"
 diplomacy_foreign.3007.c_random_list_bad: "Faço papel de[ROOT.Char.Custom('ES_XA')] idiota"
 diplomacy_foreign.3008.opening: "[neighboring_ruler.Custom('ES_AlAla')|U] [neighboring_ruler.Custom2('RelationDescriptor', ROOT.Char)] [ROOT.Char.GetTitledFirstNameNoTooltip|l],"
 diplomacy_foreign.3008.desc.dead: "Meu predecessor[dead_ruler_2.Custom('ES_XA')] [dead_ruler_2.GetTitledFirstName|l] me incentivou a continuar a correspondência com você. No entanto, após a última carta que você enviou, vou encerrar agora este intercâmbio de cartas; parece que [dead_ruler_2.Custom('ES_ElElla')] estava errado sobre o quão envolvente você é!"
 diplomacy_foreign.3008.desc.skilled: "Você está tentando me fazer sentir como um[ROOT.Char.Custom('ES_XA')] idiota? Sua última carta estava tão cheia de obscuridades que não consegui acompanhar uma frase em cada três!"
 diplomacy_foreign.3008.desc.special: "Você me julgou muito mal se pensa que bajulação vai te levar a algum lugar. Agora vejo que suas palavras são vazias como sua cabeça."
 diplomacy_foreign.3008.desc.bribe: "Você me julgou muito mal se pensa que suborno vai te levar a algum lugar. Avareza é uma característica extremamente inadequada."
 diplomacy_foreign.3008.desc.end: "E pensar que eu valorizava sua amizade..."
 diplomacy_foreign.3008.a: "Ops."
 diplomacy_foreign.3008.a.tt: "Pelo menos você aprendeu algo!"
 ##################
 #Special Events #
 ##################
 #Foreign Relations (Invite a foreign ruler to your court), by Mathilda Bjarnehed
 diplomacy_foreign_special.1017.t: "Hospitalidade"
 diplomacy_foreign_special.1017.desc: "Quanto mais estudo a nobre arte de governar, mais percebo o quão benéficas são as boas relações com meus vizinhos.\n\nDeveria fazer com que um deles visitasse minha corte para que eu pudesse mostrar a eles como posso ser um bom amig[ROOT.Char.Custom('ES_OA')] que posso ser, mas a quem devo convidar?"
 diplomacy_foreign_special.1017.a: "[target_list_member_a.GetNameNoTooltip]."
 diplomacy_foreign_special.1017.b: "[target_list_member_b.GetNameNoTooltip]."
 diplomacy_foreign_special.1017.c: "[target_list_member_c.GetNameNoTooltip]."
 diplomacy_foreign_special.1017.d: "Devo me concentrar em apaziguar meus próprios vassalos."
 diplomacy_foreign_special.1017.great: "[THIS.Char.GetFirstName] fica impressionad[THIS.Char.Custom('ES_OA')] com minha hospitalidade"
 diplomacy_foreign_special.1017.good: "[THIS.Char.GetFirstName] desfruta de sua visita"
 diplomacy_foreign_special.1017.bad: "[THIS.Char.GetFirstName] fica decepcionad[THIS.Char.Custom('ES_OA')] e vai embora mais cedo"
 diplomacy_foreign_special.1017.friends_a: "[target_list_member_a.GetShortUIName] e eu podemos nos tornar amigos"
 diplomacy_foreign_special.1017.friends_b: "[target_list_member_b.GetShortUIName] e eu podemos nos tornar amigos"
 diplomacy_foreign_special.1017.friends_c: "[target_list_member_c.GetShortUIName] e eu podemos nos tornar amigos"
 diplomacy_foreign_special.1018.opening: "[foreign_guest.Custom2('AppropriateGreeting', ROOT.Char)]"
 diplomacy_foreign_special.1018.desc: "Agradeço gentilmente o convite para sua corte. Minha comitiva e eu chegaremos em [root_realm.GetNameNoTierNoTooltip] em algumas semanas."
 diplomacy_foreign_special.1017.a.spouse: "[helper_spouse.GetFirstNameNoTooltip], coloque os serviçais para trabalhar!"
 diplomacy_foreign_special.1017.a.no_spouse: "Vou colocar os serviçais para trabalhar imediatamente!"
 diplomacy_foreign_special.1018.a.tt: "[foreign_guest.GetTitledFirstName] chegará em breve"
 diplomacy_foreign_special.1019.t: "$diplomacy_foreign_special.1017.t$: Um Acolhimento Caloroso"
 diplomacy_foreign_special.1019.start.desc: "![foreign_guest.Custom('ComplimentAdjective')] [foreign_guest.GetTitledFirstName|l] já está aqui! Esta noite, celebraremos um banquete de boas-vindas para nossos convidados estrangeiros.\n\n"
 diplomacy_foreign_special.1019.spouse.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('helper_spouse') )] [helper_spouse.GetFirstName] tem trabalhado duro no planejamento e nos preparativos. Ela me perguntou se tenho alguma sugestão para os retoques finais."
 diplomacy_foreign_special.1019.no_spouse.desc: "Eu trabalhei arduamente com todos os planejamentos e preparativos. Tudo está quase pronto e tenho um tempo para adicionar um toque final."
 diplomacy_foreign_special.1019.a: "Eu conheço algumas especialidades de [foreign_guest_realm.GetNameNoTierNoTooltip]."
 diplomacy_foreign_special.1019.a.success.tt: "[foreign_guest.GetTitledFirstNameNoTooltip|l] se sente em casa"
 diplomacy_foreign_special.1019.a.failure.tt: "Você se enganou e [foreign_guest.GetTitledFirstNameNoTooltip|l] se sente ofendid[foreign_guest.Custom('ES_OA')]"
 diplomacy_foreign_special.court_visit.very_well: "A visita à corte está progredindo #P muito bem#!"
 diplomacy_foreign_special.court_visit.poorly: "A visita à corte está progredindo #N muito mal#!"
 diplomacy_foreign_special.1019.b: "Deve ser extravagante! Mais de... tudo!"
 diplomacy_foreign_special.1019.b.rl.desc: "O resultado depende da personalidade d [foreign_guest.GetTitledFirstNameNoTooltip|l]"
 diplomacy_foreign_special.1019.b.success.tt: "[foreign_guest.GetTitledFirstNameNoTooltip|l] aprecia o gesto, assim como a maioria das pessoas"
 diplomacy_foreign_special.1019.b.failure.tt: "[foreign_guest.GetTitledFirstNameNoTooltip|l] teria preferido algo mais simples"
 diplomacy_foreign_special.1019.c: "Não vou arriscar nada com mudanças de última hora."
 diplomacy_foreign_special.court_visit.normal: "A visita ? corte progride #Z normalmente#!"
 diplomacy_foreign_special.court_visit.well: "A visita à corte está progredindo #P bem#!"
 diplomacy_foreign_special.court_visit.disaster: "A visita ? corte termina em #N desastre#!"
 diplomacy_foreign_special.1020.t: "$diplomacy_foreign_special.1017.t$: Exercício ou Relaxamento"
 diplomacy_foreign_special.1020.desc: "Se o céu é confiável, parece que hoje teremos um tempo maravilhoso. Tenho uma excelente oportunidade de mostrar a meu convidad[foreign_guest.Custom('ES_OA')] [foreign_guest.GetTitledFirstName|l] a beleza do campo local. Fico me perguntando se ele gostaria de uma vigorosa caçada ou, quem sabe, de um tranquilo almoço ao sol."
 diplomacy_foreign_special.1020.a: "Uma viagem de caça será perfeita!"
 diplomacy_foreign_special.1020.a.success.tt: "[foreign_guest.GetTitledFirstNameNoTooltip|l] aproveita a caça"
 diplomacy_foreign_special.1020.a.failure.tt: "[foreign_guest.GetTitledFirstNameNoTooltip|l] tem um tempo terrível"
 diplomacy_foreign_special.1020.b: "Acho que [foreign_guest.Custom('ES_ElElla')] teria preferido um almoço."
 diplomacy_foreign_special.1020.b.success.tt: "[foreign_guest.GetTitledFirstNameNoTooltip|l] aproveita o almoço"
 diplomacy_foreign_special.1021.t: "$diplomacy_foreign_special.1017.t$: Diversão ou Reverência"
 diplomacy_foreign_special.1021.desc: "Quero mostrar ao meu convidad[foreign_guest.Custom('ES_OA')], [foreign_guest.GetTitledFirstName|l], os principais destaques culturais de [root_realm.GetNameNoTier]. A questão é: ele/ela preferiria um grande baile com todos os senhores e damas da corte, ou uma visita ao nosso melhor [ROOT.Char.GetFaith.HouseOfWorship]?"
 diplomacy_foreign_special.1021.a: "Tenho certeza de que [foreign_guest.Custom('ES_ElElla')] dança muito bem!"
 diplomacy_foreign_special.1021.b: "Um/uma [ROOT.Char.GetFaith.HouseOfWorship] parece mais adequado aos gostos."
 diplomacy_foreign_special.1021.a.success.tt: "[foreign_guest.GetTitledFirstNameNoTooltip|l] aproveita a dança"
 diplomacy_foreign_special.1021.b.success.tt: "[foreign_guest.GetTitledFirstNameNoTooltip|l] aproveita a visita ao [ROOT.Char.GetFaith.HouseOfWorship]"
 diplomacy_foreign_special.1022.t: "$diplomacy_foreign_special.1017.t$: Um Pedido Estranho"
 diplomacy_foreign_special.1022.desc: "«Vuestr[interesting_relation.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('interesting_relation') )] es un[interesting_relation.Custom('ES_XA')] [interesting_relation.GetWomanMan] bien parecid[interesting_relation.Custom('ES_OA')]», dice [foreign_guest.GetTitledFirstName|l] removiendo lentamente su copa de [foreign_guest.Custom('RegionalDrink')]. Sus ojos están clavados en [interesting_relation.GetFirstName], sentad[interesting_relation.Custom('ES_OA')] al otro lado de la mesa.\n\n«Estimad[ROOT.Char.Custom('ES_OA')] [ROOT.GetCharacter.GetTitledFirstNameNoTooltip|l], ¿tengo vuestro permiso para organizar una audiencia privada con [interesting_relation.GetLadyLord] [interesting_relation.GetFirstNameNoTooltip]? Nada inapropiado, por supuesto. Solo una sencilla cena en mis aposentos»."
 diplomacy_foreign_special.1022.a: "\"Claro! Isso não será um problema.\""
 diplomacy_foreign_special.1022.a.tt: "Você não terá conhecimento do que acontece a portas fechadas"
 diplomacy_foreign_special.1022.b: "Permita, mas ouça secretamente..."
 diplomacy_foreign_special.1022.b.duel.success: "Você descobre o que eles estão fazendo"
 diplomacy_foreign_special.1022.b.duel.failure: "Você é descoberto"
 diplomacy_foreign_special.1022.c: "\"Não acho que seria apropriado.\""
 diplomacy_foreign_special.1023.t: "$diplomacy_foreign_special.1017.t$: Suspeita Infundada"
 diplomacy_foreign_special.1023.desc: "Fiquei no corredor secreto durante todo o encontro privado entre [foreign_guest.GetTitledFirstName|l] e [interesting_relation.GetFirstName]. Minhas preocupações parecem totalmente infundadas. Nada de ofertas, intrigas nem sedução."
 diplomacy_foreign_special.1023.a: "Que alívio!"
 diplomacy_foreign_special.1024.t: "$diplomacy_foreign_special.1017.t$: Um Bom Momento"
 diplomacy_foreign_special.1024.desc: "Lá estou há horas neste esconderijo do corredor, ouvindo a conversa aparentemente interminável de [foreign_guest.GetTitledFirstName|l] e [interesting_relation.GetFirstName]. Não há nada suspeito em suas palavras, a não ser uma afinidade mútua pouco natural por alguém que acabaram de conhecer."
 diplomacy_foreign_special.1024.a: "Não há mal algum nisso."
 diplomacy_foreign_special.1024.b: "Isso acaba agora mesmo!"
 diplomacy_foreign_special.1025.t: "$diplomacy_foreign_special.1017.t$: Uma Serpente em Meu Peito"
 diplomacy_foreign_special.1025.desc: "Do meu esconderijo no corredor secreto, ouço alto e claro as traiçoeiras palavras de [foreign_guest.GetTitledFirstName|l]. Está tentando envenenar a mente de [interesting_relation.GetFirstName] contra mim, e parece estar funcionando."
 diplomacy_foreign_special.1025.a: "Bah! Que ele/ela pense que tem alguma chance, se quiser."
 diplomacy_foreign_special.1025.b: "Traidores! Os dois!"
 diplomacy_foreign_special.1026.t: "$diplomacy_foreign_special.1017.t$: Engano e Desejo"
 diplomacy_foreign_special.1026.desc: "Quando a sugest?o lasciva sai dos l?bios [foreign_guest.Custom('ES_DelDela')] [foreign_guest.GetTitledFirstName|l], n?o sei se me enfurece sua absoluta falta de dec?ncia ou se me impressiona sua aud?cia. Seduzir meu/minha [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('interesting_relation') )] debaixo do meu pr?prio teto! Encosto-me na parede fria da passagem secreta, tentando conter a tempestade de emo??es."
 diplomacy_foreign_special.1026.a.tt: "Você saberá do [secret|lE] deles"
 diplomacy_foreign_special.1026.a: "Deixe-os se divertir, o que me importa."
 diplomacy_foreign_special.1026.b: "Afaste suas mãos imundas de [foreign_guest.Custom2('InsultNoun', ROOT.Char)]!"
 diplomacy_foreign_special.1026.c: "Há espaço para três naquela cama?"
 diplomacy_foreign_special.1026.c.success: "Os três passamos a noite juntos"
 diplomacy_foreign_special.1026.c.failure: "Eles estão absolutamente horrorizados"
 diplomacy_foreign_special.1027.t: "$diplomacy_foreign_special.1017.t$: Uma Rata em Sua Toca"
 diplomacy_foreign_special.1027.desc: "Silenciosamente[ROOT.Char.Custom('ES_OA')] como um sussurro, me arrasto pelos passagens secretas até os aposentos de [foreign_guest.GetTitledFirstName|l]. Uma vez lá, me agacho, preparando-me para uma longa noite.\n\nEntão, de repente, uma mão agarra meu ombro e meu corpo é tomado pelo terror. \"É assim que vocês tratam seus convidados, [ROOT.GetCharacter.GetTitledFirstName]?\""
 diplomacy_foreign_special.1027.a: "E- Eu sinto muito!"
 diplomacy_foreign_special.1028.t: "$diplomacy_foreign_special.1017.t$: Pétalas e Espinhos"
 diplomacy_foreign_special.1028.desc: "Durante nuestro paseo por los jardines, [foreign_guest.GetTitledFirstName|l] y yo nos hemos parado a observar las vistas. «Las proporciones, los colores… no había visto nada tan hermoso como esto, [ROOT.GetCharacter.GetTitledFirstNameNoTooltip|l]», dice [foreign_guest.Custom('ES_ElElla')] y señala la vista que tenemos ante nosotros.\n\nMe siento obligad[ROOT.Char.Custom('ES_OA')] a decir algo amable en respuesta. Puede que algo sobre su…"
 diplomacy_foreign_special.1028.compassionate: "Calor e bondade."
 diplomacy_foreign_special.1028.bold: "Coragem implacável."
 diplomacy_foreign_special.1028.honorable: "Lealdade e senso de honra."
 diplomacy_foreign_special.1028.greed: "Ambição elevada."
 diplomacy_foreign_special.1028.rational: "Racionalidade clara."
 diplomacy_foreign_special.1028.zealous: "Fé inabalável."
 diplomacy_foreign_special.1028.energetic: "Energia e espontaneidade."
 diplomacy_foreign_special.1028.forgiving: "Natureza perdoadora."
 diplomacy_foreign_special.1028.beautiful: "Beleza majestosa."
 diplomacy_foreign_special.1028.strong: "Força de braço."
 diplomacy_foreign_special.1028.extroverted: "Habilidade com pessoas."
 diplomacy_foreign_special.1028.dominant: "Presença assertiva."
 diplomacy_foreign_special.1028.good: "Meu elogio é bem recebido"
 diplomacy_foreign_special.1028.neutral: "Meu elogio não causa impacto"
 diplomacy_foreign_special.1028.bad: "Meu elogio soa como um insulto"
 diplomacy_foreign_special.1028.compliment.tt: "O quão bem o elogio será recebido por [foreign_guest.GetTitledFirstName|l] dependerá principalmente de quão bem ele se ajusta a [foreign_guest.Custom('ES_ElElla')], mas também da opinião dele sobre você e da sua habilidade em [Concept( 'diplomacy', 'diplomática' )|lE]."
 diplomacy_foreign_special.1029.good.message: "[foreign_guest.GetTitledFirstName] ficou lisonjead com meu elogio!"
 diplomacy_foreign_special.1029.neutral.message: "[foreign_guest.GetTitledFirstName] não pareceu notar meu elogio."
 diplomacy_foreign_special.1029.bad.message: "[foreign_guest.GetTitledFirstName] pareceu ofendid[foreign_guest.Custom('ES_OA')] pela minha tentativa de elogio…"
 diplomacy_foreign_special.1030.t: "$diplomacy_foreign_special.1017.t$: Um Vínculo Duradouro"
 diplomacy_foreign_special.1030.desc: "Após o que só pode ser descrito como uma visita perfeitamente agradável, [foreign_guest.GetTitledFirstName|l] e sua comitiva estão prestes a partir para [foreign_guest_realm.GetNameNoTierNoTooltip].\n\nAntes de entrar em sua carruagem, [ROOT.GetCharacter.Custom('GestureOfFriendship')] e expressa sua"
 diplomacy_foreign_special.1030.bad_guest.desc: "Fals[foreign_guest.Custom('ES_OA')] de [foreign_guest.GetTitledFirstName|l] e sua comitiva estão prestes a partir para [foreign_guest_realm.GetNameNoTierNoTooltip].\n\nAntes que [foreign_guest.GetTitleTierName] entre em sua carruagem, [ROOT.GetCharacter.Custom('GestureOfFriendship')] e expressa seu"
 diplomacy_foreign_special.1030.spouse.desc: "gratid?o a mim e ao meu "t?o [helper_spouse.Custom('ComplimentAdjective')]" [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('helper_spouse') )]. Prometo transmitir seus elogios."
 diplomacy_foreign_special.1030.no_spouse.desc: "gratidão. E eu lhe asseguro que será mais que bem-vind[foreign_guest.Custom('ES_OA')] se decidir nos visitar novamente."
 diplomacy_foreign_special.1030.a_bad_guest: "[foreign_guest.Custom('ES_ElElla')|U] acredita que me usou, mas sei o que fez."
 diplomacy_foreign_special.1030.a_extroverted: "Tomara que [foreign_guest.GetFirstName] nos visite novamente em breve!"
 diplomacy_foreign_special.1030.a_introverted: "Finalmente, um pouco de paz e tranquilidade."
 diplomacy_foreign_special.1030.a: "Que sua jornada seja rápida e segura!"
 diplomacy_foreign_special.1031.t: "$diplomacy_foreign_special.1017.t$: Uma Partida Antecipada"
 diplomacy_foreign_special.1031.desc: "O sol mal nasceu quando vejo um dos servos de [foreign_guest.GetTitledFirstName|l] carregando um grande baú. [dummy_servant_gender.Custom('ES_LoLa')|U] sigo até o pátio, onde encontro meu convidad[foreign_guest.Custom('ES_OA')] supervisionando o carregamento de suas carruagens.\n\n[foreign_guest.GetFirstName] se sobressalta quando o cumprimento e então inventa uma desculpa vaga sobre uma carta e alguns assuntos urgentes. Sem jeito, [foreign_guest.GetHerHim] desejo uma boa viagem e corro de volta para meus aposentos privados às pressas."
 diplomacy_foreign_special.1031.a: "Não foi assim que imaginei que as coisas aconteceriam..."
 #Foreign Relations (Rulers arrange meeting between respective heirs), by Flavio Verna
 diplomacy_foreign.0100.opening: "[other_ruler.Custom2('AppropriateGreeting', ROOT.Char)]"
 diplomacy_foreign.0100.desc: "Acredito que o melhor para nossos domínios é organizar um encontro entre nossos jovens herdeiros, [main_heir.GetTitledFirstName|l] e [other_heir.GetTitledFirstName|l]. Garantirmos agora que eles construam uma relação estável e saudável certamente garantirá a futura estabilidade de nossas terras quando nos sucederem."
 diplomacy_foreign.1100.a: "Que ideia encantadora!"
 diplomacy_foreign.1100.b: "Talvez devêssemos nos conhecer melhor."
 diplomacy_foreign.1100.t: "Amizade Florescente"
 diplomacy_foreign.1101.desc: "O encontro organizado entre [other_heir.GetFirstName] e [main_heir.GetFirstName] é a oportunidade perfeita para estabelecer as bases de um relacionamento duradouro entre meu domínio e o de [other_ruler.GetTitledFirstName|l].\n\nDevo ter muito cuidado ao planejar o encontro."
 diplomacy_foreign.1101.a: "[other_heir.GetFirstNameNoTooltip] deve vir a [scoped_capital.GetNameNoTooltip]."
 diplomacy_foreign.1101.court_visit.very_well: "A visita à corte está progredindo #P muito bem#!"
 diplomacy_foreign.1101.court_visit.poorly: "A visita à corte está progredindo #N muito mal#!"
 diplomacy_foreign.1101.court_visit.well: "A visita à corte está progredindo #P bem#!"
 diplomacy_foreign.1101.a.tooltip: "Ser o anfitrião permitirá que você influencie o encontro"
 diplomacy_foreign.1101.b: "[main_heir.GetTitledFirstNameNoTooltip|l] visitará a corte d [other_ruler.GetTitledFirstNameNoTooltip|l]."
 diplomacy_foreign.1101.b.tooltip: "Você #N não#! poderá influenciar o encontro"
 diplomacy_foreign.1102.desc: "[other_heir.GetTitledFirstName] es recibido con toda la pompa y circunstancia apropiada para un[other_heir.Custom('ES_OA')] invitad[other_heir.Custom('ES_OA')] tan distinguid[other_heir.Custom('ES_OA')]. [other_heir.Custom('ES_ElElla')|U] permanecerá en [scoped_capital.GetNameNoTooltip] unas semanas, durante las cuales, [other_heir.Custom('ES_ElElla')] y [main_heir.GetFirstName] se conocerán mejor."
 diplomacy_foreign.1102.a: "Vou me certificar de ajudar meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('main_heir') )]."
 diplomacy_foreign.1102.a.duel_success: "[other_heir.GetTitledFirstNameNoTooltip|l] fica impressionad com minha hospitalidade"
 tooltip.diplomacy_foreign.1102.a.duel_success: "[other_heir.GetTitledFirstNameNoTooltip|l] ficou impressionad com minha hospitalidade"
 diplomacy_foreign.1102.a.duel_failure: "Minha presença atrapalha o encontro entre os jovens herdeiros"
 tooltip.diplomacy_foreign.1102.a.duel_failure: "Minha presença atrapalhou o encontro entre os jovens herdeiros"
 diplomacy_foreign.1102.b: "Vou bajular a [other_heir.GetFirstNameNoTooltip] com presentes luxuosos!"
 diplomacy_foreign.1102.c: "Confio em que [main_heir.GetFirstNameNoTooltip] saberá se virar."
 diplomacy_foreign.1102.c.tooltip.high: "[main_heir.GetTitledFirstName] se sairá #P muito bem#!"
 diplomacy_foreign.1102.c.tooltip.medium: "[main_heir.GetTitledFirstName] se sairá #P adequadamente#!"
 diplomacy_foreign.1102.c.tooltip.low: "[main_heir.GetTitledFirstName] se sairá #N muito mal#!"
 diplomacy_foreign.1103.start.desc: "Chegou finalmente a hora d [other_heir.GetTitledFirstName|l] retornar ao seu lar."
 diplomacy_foreign.1103.culture_conversion.desc: "Parece que, durante sua estadia aqui, esse jovem se afeiçoou à nossa cultura e decidiu adotar vários costumes da minha corte."
 diplomacy_foreign.1103.faith_conversion.desc: "Fiquei feliz em saber que, durante sua estadia aqui, tal jovem decidiu abraçar o [main_heir.GetFaith.GetName] e abandonar sua antiga fé."
 diplomacy_foreign.1103.present.desc: "Antes de partir, decidiu honrar-nos com um presente requintado em nome de sua [other_heir.Custom2('RelationToMe' , SCOPE.sC('other_ruler') )]."
 diplomacy_foreign.1103.prestige.desc: "A [other_heir.Custom('ES_ElElla')|U] ficou impressionado(a) com nossa hospitalidade e prometeu espalhar a fama do prestígio de minha corte por toda parte."
 diplomacy_foreign.1103.empty.desc: ""
 diplomacy_foreign.1103.friendship.desc: "\n\nAs coisas entre [other_heir.Custom('ES_ElElla')] e [main_heir.GetFirstName] foram até melhores do que o esperado: os dois se tornaram inseparáveis."
 diplomacy_foreign.1103.love.desc: "\n\nAs coisas entre [other_heir.Custom('ES_ElElla')] e [main_heir.GetFirstName] foram ainda melhores do que o esperado: está claro que os dois se apaixonaram."
 diplomacy_foreign.1103.rivalry.desc: "\n\nInfelizmente, as coisas não saíram como planejado: [other_heir.GetFirstNameNoTooltip] e [main_heir.GetFirstName] simplesmente não conseguem se suportar."
 diplomacy_foreign.1103.opinion_gain.desc: "\n\nAs coisas entre [other_heir.Custom('ES_LoLa')] e [main_heir.GetFirstName] foram tão bem quanto esperávamos [other_ruler.GetTitledFirstName|l] e eu e, com sorte, os dois jovens herdeiros se tornarão bons amigos com o tempo."
 diplomacy_foreign.1103.opinion_loss.desc: "\n\nInfelizmente, as coisas não saíram como planejado: afinal, [other_heir.GetFirstNameNoTooltip] e [main_heir.GetFirstName] parecem não ter muito em comum…"
 diplomacy_foreign.1103.tainted_exp.desc: "\n\nPelo menos, essa experiência me ajudou a aprofundar minha compreensão da política."
 diplomacy_foreign.1103.good_exp.desc: "\n\nAlém disso, essa visita se mostrou uma excelente oportunidade para aprimorar minhas habilidades diplomáticas."
 diplomacy_foreign.1103.no_exp.desc: "\n\nO que é verdadeiramente irritante em toda essa situação é que eu nem sequer fui capaz de aprender muito com isso."
 tooltip.diplomacy_foreign.1103.a.culture_conversion_success: "Convertendo Cultura"
 tooltip.diplomacy_foreign.1103.a.faith_conversion_success: "Mudando de Fé"
 diplomacy_foreign.1103.a: "Melhor agir enquanto o ferro está quente!"
 diplomacy_foreign.1103.b: "Deveríamos tentar novamente algum dia..."
 diplomacy_foreign.1104.start.desc: "[main_heir.GetFirstName] finalmente retornou após sua visita à corte d [other_ruler.GetTitledFirstName|l]."
 diplomacy_foreign.1104.culture_conversion.desc: "\n\nParece que durante sua curta estadia, se encantou com os costumes de seus anfitriões."
 diplomacy_foreign.1104.faith_conversion.desc: "\n\nParece que, durante sua visita, [main_heir.Custom('ES_ElElla')] encontrou um novo propósito no culto a [other_heir.GetFaith.HighGodName]."
 diplomacy_foreign.1104.present.desc: "\n\nDe acordo com seu ilustre rango, [main_heir.Custom('ES_ElElla')] recebeu luxuosos presentes durante sua estadia."
 diplomacy_foreign.1104.prestige.desc: "\n\nDe acordo com seu ilustre rango, [main_heir.Custom('ES_ElElla')] recebeu um tratamento refinado por parte de seu anfitrião, que elogiou publicamente nossa família em muitas ocasiões durante a estadia de [main_heir.GetFirstNameNoTooltip]."
 diplomacy_foreign.1105.hostdead.desc: "Com o triste falecimento d [other_ruler.GetTitledFirstName|l], nosso plano de fazer com que nossos filhos se conheçam e garantir uma relação amigável entre nossos reinos vai por água abaixo."
 diplomacy_foreign.1105.guestdead.desc: "Infelizmente, meu plano e d [other_ruler.GetTitledFirstName|l] foi interrompido pelo repentino falecimento d [other_heir.GetFirstName]."
 diplomacy_foreign.1105.fallback.desc: "Parece que o destino conspirou para impedir o encontro entre [main_heir.GetFirstName] e [other_heir.GetFirstName]. Talvez uma nova oportunidade se apresente no futuro."
 diplomacy_foreign.1105.a: "Que tragédia..."
 #Foreign Relations (Neighboring rulers tidying up their borders), by Flavio Verna
 diplomacy_foreign.1150.t: "Ajeitando Fronteiras"
 diplomacy_foreign.1150.desc: "Há algum tempo, venho refletindo sobre as discrepâncias entre as fronteiras históricas e as atuais do senhorio de [neighbor.GetTitledFirstName|l] com o meu. \n\n[neighbor.Custom('ES_ElElla')|U] domina o [county.GetName], terra que deveria pertencer legitimamente a [ruler.GetPrimaryTitle.GetNameNoTierNoTooltip], enquanto atualmente controlo o [neighbor_county.GetName], sobre o qual [neighbor.GetTitledFirstNameNoTooltip|l] reivindica domínio."
 diplomacy_foreign.1150.a: "A solução é simples..."
 diplomacy_foreign.1160.a.success: "Convenço a [neighbor.GetTitledFirstName|l]"
 diplomacy_foreign.1160.a.failure: "[neighbor.GetTitledFirstName] recusa minha proposta"
 diplomacy_foreign.1150.b: "Certamente podemos encontrar um acordo?"
 diplomacy_foreign.1150.c: "Espadas, não palavras, resolverão essa disputa."
 diplomacy_foreign.1151.desc: "Graças ao meu aguçado senso diplomático, consegui convencer a [neighbor.GetTitledFirstName|l] a abrir mão de [county.GetNameNoTier] em troca de [neighbor_county.GetNameNoTier]. Esperemos que este ato evite um derramamento de sangue desnecessário entre nossos reinos no futuro."
 diplomacy_foreign.1151.a: "Pode-se esperar."
 diplomacy_foreign.1152.desc: "Infelizmente, não consegui persuadir a [neighbor.GetTitledFirstName|l] a abrir mão de [county.GetNameNoTier] em troca de [neighbor_county.GetNameNoTier]. Só posso esperar que sua teimosia não conduza nossos reinos por um caminho sombrio."
 diplomacy_foreign.1152.a: "O conflito pode ser inevitável."
 diplomacy_foreign.1153.desc: "[ruler.GetTitledFirstName] me apresentou hoje uma proposta peculiar.\n\n[ruler.Custom('ES_ElElla')|U] afirma estar dispost[ruler.Custom('ES_OA')] a renunciar ao controle sobre [neighbor_county.GetNameNoTier], uma província sobre a qual meu reino tem antigas reivindicações, em troca do [county.GetName], que supostamente esteve sob o domínio de seus antepassados."
 diplomacy_foreign.1153.a: "Uma proposta justa."
 diplomacy_foreign.1153.b: "Não vou abrir mão do que é meu!"
 #Foreign Relations (Gaining friend), by Flavio Verna
 diplomacy_foreign.1200.t: "Assuntos Delicados"
 diplomacy_foreign.1200.spouse.desc: "«¿Volviendo a trasnochar, [ROOT.Char.Custom('FormOfAddressForLiege')]?».\n\nMi [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('diplomacy_friend') )] mira por encima de mi hombro los documentos que inundan mi mesa. «Tengo cierta experiencia en estos menesteres», dice vacilante. «Tal vez podría ayudaros»."
 diplomacy_foreign.1200.relative.desc: "«He oído que os empeñáis en mejorar la posición de vuestro señorío respecto a los vecinos, [diplomacy_friend.Custom2('RelationToMe' , ROOT.GetCharacter )]».\n\n[diplomacy_friend.GetFirstName] se me aproxima amistosamente. «Llevo bastante tiempo interesándome en estos asuntos, y estaría encantado de ofreceros mi ayuda. Después de todo, somos familia»."
 diplomacy_foreign.1200.fallback.desc: "[diplomacy_friend.GetTitledFirstName] tem sido de grande ajuda nos últimos dias, me auxiliando em meus esforços para fortalecer os laços do domínio com nossos vizinhos. Ele/ela acabou de se oferecer novamente para me ajudar a conquistar a confiança de [neighbor_ruler.GetTitledFirstName|l]. \n\nEstes dias é tão difícil encontrar alguém em quem se possa realmente confiar…"
 diplomacy_foreign.1200.a.a: "Nada me agradaria mais."
 diplomacy_foreign.1200.a.b: "Você me honra, [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('diplomacy_friend') )]."
 diplomacy_foreign.1200.a.c: "Guardarei sua gentileza em memória."
 diplomacy_foreign.1200.b: "Acredito que posso lidar com [neighbor_ruler.GetTitledFirstNameNoTooltip|l]."
 diplomacy_foreign.1200.b.success: "Meus esforços diplomáticos dão frutos"
 diplomacy_foreign.1200.b.failure: "Não consigo impressionar a [neighbor_ruler.GetTitledFirstName|l]"
 diplomacy_foreign.1200.c: "[neighbor_ruler.GetTitledFirstNameNoTooltip|l] não vale o esforço..."
