l_spanish:
 sell_titles.0001.opening: "[vassal.Custom2('AppropriateGreetingPositive', ROOT.Char )]"
 sell_titles.0001.desc.dislike: "Não estou interessado nas promessas vazias que você está vendendo, mas se você está desesperado por ouro, acredito que podemos chegar a um acordo."
 sell_titles.0001.desc.normal: "Não busco maiores honrarias, meu [vassal.Custom2('RelationToMeShort', ROOT.Char)], mas se precisar de ouro, acredito que podemos chegar a um acordo."
 sell_titles.0001.a: "Preciso do ouro pelo bem do reino, entenda."
 sell_titles.0001.b: "Isso não é uma barganha em um mercado de camponeses!"
 sell_titles.0002.opening: "[friend.Custom2('AppropriateGreetingPositive', ROOT.Char )]"
 sell_titles.0002.desc: "Fui informado de que você está oferecendo títulos em troca de "presentes".

Meu amigo, se você precisava de ouro, deveria ter me avisado!".

Meu amigo, se você precisava de ouro, deveria ter me avisado!"
 sell_titles.0002.a: "Estou honrado pelos títulos que você me ofereceu, e é claro que vou subsidiá-los, como é correto e adequado!\n\nNão tenho palavras para agradecer por essa honra. Farei o máximo por você, seja o que for que você exija."
 sell_titles.0002.b: "Você é um vassalo verdadeiro e leal."
 sell_titles.0003.desc: "Quem dera todos entendessem como estou sendo extremamente generoso."
 sell_titles.0003.a: "[vassal.Custom2('AppropriateGreeting', ROOT.Char )]"
 sell_titles.0003.a.flavor: "Chegou ao meu conhecimento que você está vendendo títulos, mesmo que eu mesmo não tenha sido adequadamente honrado por meu serviço.\n\nDe fato, considerando minhas conquistas em seu nome, alguns novos títulos não seriam de desprezar."
 sell_titles.0004.opening: "Assim será, então."
 sell_titles.0004.desc: "Não se engrandeça!"
 sell_titles.0004.a: "Embora não venham com feudos, as obrigações associadas aos títulos que você está oferecendo são mais generosas do que eu poderia pedir.\n\nÉ claro que honrarei tamanha munificência com um presente adequado!"
 sell_titles.0004.b: "São? Ah."
 sell_titles.0005.desc: "Não é isso que... Maldito seja você!"
 sell_titles.0005.a: "Embora saiba que arrisco sua ira, minha honra exige que eu me manifeste. Sua oferta de dar "títulos" em troca de "presentes" é motivada apenas pela ganância mesquinha, isso é evidente!

Minha honra vem de minha nobreza, não de minha riqueza, mas para você parece ser o contrário!"
 sell_titles.0005.b: "Como você ousa me envergonhar assim?!"
 sell_titles.0006.desc: "Venda de Títulos: Uma Proposta Modesta" é motivada apenas pela ganância mesquinha, isso é evidente!

Minha honra vem de minha nobreza, não de minha riqueza, mas para você parece ser o contrário!"
 sell_titles.0006.a: "Vamos celebrar o retorno d[merchant.Custom('ES_OA')] minha/meu [merchant.Custom('SisterBrother')] perdid[merchant.Custom('ES_OA')]!"
 sell_titles.1002.t: "Meu nome não está à venda, sob nenhuma circunstância!"
 sell_titles.1002.desc: "Um[merchant.Custom('ES_XA')] tal [merchant.GetTitledFirstName|l], um[merchant.Custom('ES_XA')] ric[merchant.Custom('ES_OA')] mercador, soube das minhas tentativas de vender certos títulos supérfluos, mas tem uma sugestão muito mais ousada:

"Talvez realmente seja de sangue nobre, afinal?"

A proposta é completamente absurda, mas [merchant.GetSheHe] possui uma quantidade ridícula de ouro..."
 sell_titles.1002.a.muslim: "Talvez novas perspectivas #EMP possam#! ser boas de vez em quando, não é? [merchant.GetTitledFirstName|l], que já demonstrou talento suficiente para conquistar um lugar em minha Casa, provou ser incrivelmente hábil em navegar pelos perigos da minha corte. Às vezes, até me pergunto se [merchant.GetSheHe] sabe mais sobre o que está acontecendo do que eu!"
 sell_titles.1002.a: "Graças a [ROOT.Char.GetFaith.HighGodName] que está em dívida comigo."
 sell_titles.1002.b: "Venda de Títulos: Ovelha Negra"
 sell_titles.1004.t: "Por algum motivo, não se deve promover plebeus à nobreza por puro capricho. Desde que [merchant.GetTitledFirstName|l] se juntou à minha corte, não tem sido nada além de um embaraço!\n\nEu apoiei a reivindicação de que pertence à minha Casa, então agora não há mais nada a fazer, mas é um erro que não pretendo cometer novamente!"
 sell_titles.1004.desc: "Contra todas as expectativas, [merchant.GetTitledFirstName|l], que acabou sendo parente muito, muito distante, provou ser guerreir[merchant.Custom('ES_OA')] excelente!

Quem diria que uma pessoa plebeia poderia alcançar tais alturas?"
 sell_titles.1004.a: "Talvez realmente seja de sangue nobre, afinal?"
 sell_titles.1005.desc: "No tempo desde que aceitei a [merchant.GetTitledFirstName|l]… quer dizer, desde que [merchant.GetTitledFirstName|l] retornou para a família, provou ser muito popular entre os [ROOT.Char.GetFaith.AltPriestTermPlural]. Ao que parece, é bastante sabi[merchant.Custom('ES_OA')]. Muito mais do que alguém esperaria de um[merchant.Custom('ES_XA')] simples plebeu[merchant.Custom('ES_OA')]."
 sell_titles.1005.a: "Até mesmo ouro é encontrado entre pedras comuns, suponho."
 sell_titles.1006.desc: "Talvez novas perspectivas #EMP possam#! ser boas de vez em quando, não é? [merchant.GetTitledFirstName|l], que já demonstrou talento suficiente para conquistar um lugar em minha Casa, provou ser incrivelmente hábil em navegar pelos perigos da minha corte. Às vezes, até me pergunto se [merchant.GetSheHe] sabe mais sobre o que está acontecendo do que eu!"
 sell_titles.1006.a: "Graças a [ROOT.Char.GetFaith.HighGodName] que está em dívida comigo."
 sell_titles.1007.t: "Venda de Títulos: Ovelha Negra"
 sell_titles.1007.desc: "Por algum motivo, não se deve promover plebeus à nobreza por puro capricho. Desde que [merchant.GetTitledFirstName|l] se juntou à minha corte, não tem sido nada além de um embaraço!\n\nEu apoiei a reivindicação de que pertence à minha Casa, então agora não há mais nada a fazer, mas é um erro que não pretendo cometer novamente!"
 sell_titles.1007.a: "Que pena..."
