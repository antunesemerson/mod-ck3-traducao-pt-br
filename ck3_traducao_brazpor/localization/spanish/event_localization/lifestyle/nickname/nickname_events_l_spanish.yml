l_spanish:
 lifestyle_nicknames.0001.t: "Convenção de Nomenclatura"
 lifestyle_nicknames.0001.desc: "Tras largas horas de consultar registros, sumar números y gestionar la [ROOT.Char.Custom('GetCourt')], mi meticulosidad ha dado sus frutos. ¡Mi [ROOT.Char.Custom('GetRealmOrDomicile')|l] ha alcanzado cotas nunca vistas de prosperidad!\n\nTod[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] dign[ROOT.Char.Custom('ES_OA')], entre quienes yo, [ROOT.Char.GetFullName], naturalmente me incluyo, debe ser conocid[ROOT.Char.Custom('ES_OA')] por sus hazañas.\n\nVeamos, ¿cómo debería hacerme llamar?"
 lifestyle_nicknames.0001.a: "Quero ser conhecid pela minha administração!"
 lifestyle_nicknames.0001.b: "Serei lembrad pela minha imparcialidade!"
 lifestyle_nicknames.0001.c: "As pessoas me conhecerão pelas minhas leis!"
 lifestyle_nicknames.0001.d: "Pensando bem, deixa pra lá."
 lifestyle_nicknames.0001.tt: "Você decide deixar suas ações - ao invés de um [epithet|lE] - falarem por si."
 lifestyle_nicknames.0002.desc: ""Que a tua vontade seja feita, meu [ROOT.Char.Custom('GetCourtOwner')|l]!", exclama meu [SelectLocalization(IsLandlessAdventurer(ROOT.Char),'lifestyle_nicknames_second',SelectLocalization(IsNomad(ROOT.Char),'lifestyle_nicknames_kurultai','lifestyle_nicknames_steward'))|l] enquanto sai de minhas [ROOT.Char.Custom('GetChamberPlural')].\n\nMe levanto da cadeira e saio para o [SelectLocalization(IsLandlessAdventurer(ROOT.Char),'lifestyle_nicknames.0002.laamp',SelectLocalization(IsNomad(ROOT.Char),'lifestyle_nicknames.0002.laamp','lifestyle_nicknames.0002.landed'))|l]. O que eu quero que eles se lembrem de mim?"
 lifestyle_nicknames.0002.landed: "sacada. Abaixo vejo milhares, todos trazidos à prosperidade sob meu governo."
 lifestyle_nicknames.0002.laamp: "centro do acampamento. Ao meu redor vejo centenas, todos trazidos à prosperidade sob meu estandarte."
 lifestyle_nicknames.0002.a: "Gostaria de ser lembrad pela minha generosidade."
 lifestyle_nicknames.0002.b: "Espero que me conheçam pela minha benevolência."
 lifestyle_nicknames.0002.c: "Que um dia eles olhem para a #EMP elegância do meu governo#!."
 lifestyle_nicknames.0002.d: "Pensando bem, deixa pra lá."
 lifestyle_nicknames.0002.tt: "Talvez um reino próspero seja sua própria recompensa, mais do que um [nickname|lE] fantasioso."
 lifestyle_nicknames.0003.t: "Palavras são Prata"
 lifestyle_nicknames.0003.desc: "El tiempo dedicado a los esfuerzos diplomáticos está dando sus frutos. Dicen que el silencio es oro, pero en mi experiencia, poder comunicarme, discutir y convencer vale más que el oro.\n\nTodo gobernante respetable recibe un apodo en honor de sus hazañas. ¿Cómo quiero que me recuerden?"
 lifestyle_nicknames.0003.a: "Eu sei! Que tal \" Magnífic?\""
 lifestyle_nicknames.0003.b: "Por minha magnanimidade!"
 lifestyle_nicknames.0003.c: "Por trazer a paz. Seria bom que isso fosse lembrado sobre mim!"
 lifestyle_nicknames.0003.d: "Pensando bem, deixa pra lá."
 lifestyle_nicknames.0003.tt: "Um [cognomen|lE] deve ser conquistado, não adotado."
 lifestyle_nicknames.0004.desc: "Todo o trabalho árduo dedicado ao aperfeiçoamento da minha arte de governar deixou as relações internas e externas em um excelente estado. Os camponeses acenam alegremente para minha comitiva nas ruas, e eu conheço a maioria dos meus cortesãos pelo nome.\n\nAcho que fiz um nome para mim, mas qual poderia ser?"
 lifestyle_nicknames.0004.a: "Trato todos com justiça, independentemente de sua posição, então..."
 lifestyle_nicknames.0004.b: "Espero ser apreciad pela minha bondade."
 lifestyle_nicknames.0004.c: "Todos me dizem que sou bastante agradável de se conversar."
 lifestyle_nicknames.0004.d: "Pensando bem, deixa pra lá."
 lifestyle_nicknames.0004.tt: "As ações de um governante devem falar mais alto do que seu [epithet|lE]."
 lifestyle_nicknames.0005.t: "Espada da Razão"
 lifestyle_nicknames.0005.desc: "Una tarde tranquila, después de que todos los [ROOT.Char.Custom('GetCourtierPlural')] hayan salido de mi [SelectLocalization(IsLandlessAdventurer(ROOT.Char),'room_command_tent','room_throne_room')], me siento a pensar un rato.\n\n«Todos los grandes gobernantes tienen un apodo igual de grande, ¿acaso voy a ser yo menos? De ahora en adelante y por los siglos, se me recordará como [ROOT.Char.GetTitledFirstName|l]…"
 lifestyle_nicknames.0005.a: "… $nick_the_conqueror$!"
 lifestyle_nicknames.0005.b: "… $nick_haardraade$!"
 lifestyle_nicknames.0005.c: "… $nick_the_noble$!"
 lifestyle_nicknames.0005.d: "…"
 lifestyle_nicknames.0005.tt: "Você se recosta: suas estratégias, sua espada, eventualmente esculpirão um [cognomen|lE] digno."
 lifestyle_nicknames.0006.desc: "Estudio los planes de batalla que tengo delante y cojo uno de los soldados de madera tengo a mano. Hace años, jugaba con estas figuras en mis aposentos y ahora las uso para la guerra.\n\n«¿[ROOT.Char.GetTitledFirstName]?», llama mi [SelectLocalization(IsLandlessAdventurer(ROOT.Char),'lifestyle_nicknames_second',SelectLocalization(IsNomad(ROOT.Char),'lifestyle_nicknames_kurultai','lifestyle_nicknames_marshal'))] al entrar en la tienda. «Los comandantes quieren hablar con vos. ¿Cómo deseáis que os presente?».\n\nLas implicaciones de lo que dice mi [my_marshal.GetCouncilTitle|l] son ciertas, mis [ROOT.Char.Custom('WomenMenPeople_GenderPreference')] deben saber que sirven a las órdenes de alguien importante."
 lifestyle_nicknames_second: "[GetCourtPositionType('second_camp_officer').GetNameNoTooltip]"
 lifestyle_nicknames_marshal: "[GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName]"
 lifestyle_nicknames_steward: "[GetPlayer.GetCouncillorPosition( 'councillor_steward' ).GetPositionName]"
 lifestyle_nicknames_kurultai: "[GetPlayer.GetCouncillorPosition( 'councillor_kurultai_1' ).GetPositionName]"
 lifestyle_nicknames.0006.a: "Gostaria que me conhecessem pela minha mente estratégica."
 lifestyle_nicknames.0006.b: "Eles me conhecerão pela minha determinação."
 lifestyle_nicknames.0006.c: "A coragem e a valentia me trouxeram até aqui..."
 lifestyle_nicknames.0006.d: "Por favor, me chamem de [ROOT.Char.GetFirstNameNoTooltip]."
 lifestyle_nicknames.0006.tt: "Você também é mortal, e, por mais grandioso que seja, nenhum [epithet|lE] pode mudar isso."
 lifestyle_nicknames.0007.t: "Silêncio é Ouro"
 lifestyle_nicknames.0007.desc: "Dicen que la influencia es como la hierba en primavera. Tal vez crezca sola, pero he cultivado la mía pacientemente hasta extenderla por todo mi señorío y allende de sus fronteras. Ese jardín que he cuidado es algo verdaderamente bello.\n\nEl poder está donde yo quiero. El precio de mantener callada a la gente es alto, pero no tengo inconveniente en pagarlo. Soy una fuerza a tener en cuenta, ¡y mi influencia debería ser recordada! Con un nombre imponente, debería pasar a la historia…"
 lifestyle_nicknames.0007.a: "Sou como uma sombra. Sigo todos os movimentos."
 lifestyle_nicknames.0007.b: "Observo de longe e ataco sem hesitação."
 lifestyle_nicknames.0007.c: "Ver meus súditos tremerem é a maior recompensa."
 lifestyle_nicknames.0007.d: "O segredo para o sucesso é o próprio segredo."
 lifestyle_nicknames.0007.tt: "Você decide contra isso. Adotar um [nickname|lE] infame certamente só serviria para frustrar seus esforços no futuro."
 lifestyle_nicknames.0008.desc: "Um [SelectLocalization( IsLandlessAdventurer(ROOT.Char),ROOT.Char.Custom('GetLaampDescribeTypeSelf'),'monarch')] deve intimidar seus seguidores e inspirar seu povo. Um [SelectLocalization( IsLandlessAdventurer(ROOT.Char),ROOT.Char.Custom('GetLaampDescribeTypeSelf'),'ruler')] deve contar com o amor de seus súditos e ter o poder de mudar o destino de seu [ROOT.Char.Custom('GetRealmOrDomicile')]. A terra deve ser um lugar onde os poderosos não preyam sobre os fracos.\n\nEsses são os valores em que acredito! Quero encarnar esse sonho.\n\nA partir de agora, serei conhecido como…"
 lifestyle_nicknames.0008.a: "Minha sagacidade em administrar os assuntos do reino."
 lifestyle_nicknames.0008.b: "Segredos e sussurros que podem derrubar impérios."
 lifestyle_nicknames.0008.c: "Minha rede de influência meticulosamente construída."
 lifestyle_nicknames.0008.d: "Apenas as ações que tomo para ajudar a casa e o reino."
 lifestyle_nicknames.0008.tt: "Você decide não adotar um [epithet|lE] - um reino próspero é sua própria recompensa."
 lifestyle_nicknames.0009.t: "A Caneta é Poderosa"
 lifestyle_nicknames.0009.desc: "A biblioteca do meu palácio é realmente digna de ser contemplada. Milhares de livros-caixa, pergaminhos e livros que contêm um saber desconhecido pela maioria. Este é meu orgulho, uma de minhas maiores realizações.\n\nAs grandes mentes do passado ainda são lembradas, e suas obras são citadas e estudadas. Eu mereço um lugar entre esses gênios, e de agora em diante serei conhecido como [ROOT.Char.GetTitledFirstName|l]…"
 lifestyle_nicknames.0009.a: "… $nick_the_enlightened$!"
 lifestyle_nicknames.0009.b: "… $nick_the_truthseeker$!"
 lifestyle_nicknames.0009.c: "… $nick_the_chronicler$!"
 lifestyle_nicknames.0009.d: "…"
 lifestyle_nicknames.0009.tt: "Você não adota um [cognomen|lE], envergonhad que tal pensamento orgulhoso tenha cruzado sua mente."
 lifestyle_nicknames.0010.desc: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], é hora. [my_chaplain.GetCouncilTitle|U] [my_chaplain.GetFirstName] faz uma profunda reverência à porta dos meus aposentos.\n\nReúno minhas anotações em uma pilha sobre a escrivaninha; devo fazer um discurso sobre os recentes feitos culturais do reino, diante de emissários e embaixadores.\n\nMeu [my_chaplain.GetCouncilTitle|l] me interrompe antes de entrarmos no salão:\nTodos #EMP os#! conhecem, é claro, mas como gostaria que eu o apresentasse?"
 lifestyle_nicknames.0010.a: "Quem sou eu além de \"$nick_the_sage$?\""
 lifestyle_nicknames.0010.b: "Hm. Que tal \"$nick_the_scholar$?\""
 lifestyle_nicknames.0010.c: "Suponho que eu seja algo de um historiador..."
 lifestyle_nicknames.0010.d: "Sou apenas [ROOT.Char.GetTitleAsName]."
 lifestyle_nicknames.0010.tt: "Você entra na sala sem um novo [nickname|lE]."
 lifestyle_nicknames.0011.t: "Reverberação"
 lifestyle_nicknames.0011.desc: "Não importa para onde eu vá, não consigo escapar do olhar desaprovador de nobres e plebeus. Apesar das minhas melhores intenções, parece que o nome que escolhi para mim foi recebido com mais desprezo do que eu esperava.\n\nRetiro-me para meus aposentos e reflito sobre o que devo fazer..."
 lifestyle_nicknames.0011.a: "Eles podem não me respeitar, mas vão me obedecer!"
 lifestyle_nicknames.0011.a.tt: "Você informa a todos que pretende manter seu [cognomen|lE] e não aceitará outra coisa."
 lifestyle_nicknames.0011.b: "Eles estão certos. No que eu estava pensando?"
 lifestyle_nicknames.1000.t: "Apelido: [nickname_getter.GetNicknameNoTooltip]"
 lifestyle_nicknames.1000.desc: ""[informer.Custom2('RelationToMeShort', SCOPE.sC('nickname_getter'))|U] meu[ROOT.Char.Custom('ES_OA')] Já ouviram o que andam chamando vocês?" diz meu [nickname_getter.Custom2('RelationToMeShort', SCOPE.sC('informer'))] [informer.GetFirstName] enquanto [informer.Custom('quirk_pos_pp')].\n\n"
 lifestyle_nicknames.1000.desc_prison: "\"[nickname_getter.GetFirstNameNoTooltip], você ouviu o que te chamam?\" [informer.GetFirstName] resmunga, batendo uma xícara nas grades de ferro.\n\n"
 lifestyle_nicknames.1000.desc_good: "\"Eles te chamam de #EMP '[nickname_getter.GetTitledFirstNameNicknamedNoTooltip|l]'#!, espetacular, não é mesmo? Está na boca do povo, tanto do camponês quanto do nobre.\""
 lifestyle_nicknames.1000.desc_bad: "\"Eles te chamam de #EMP '[nickname_getter.GetTitledFirstNameNicknamedNoTooltip|l]'#!... não é exatamente o que você chamaria de #EMP lisonjeiro#!, talvez você não possa fazer nada para mudar isso.\""
 lifestyle_nicknames.1000.end_bad_bad: "\n\n\"Melhor se acostumar com isso!\" [informer.GetFirstNameNoTooltip] ri enquanto se afasta."
 lifestyle_nicknames.1000.end_good_bad: "\n\n"Não foi o que eu teria escolhido para você…", diz [informer.GetFirstNameNoTooltip], visivelmente frustrad[informer.Custom('ES_OA')]."
 lifestyle_nicknames.1000.end_bad_good: "\n\n\"Pelo que vale, prometo não te chamar por esse nome.\" [informer.GetFirstNameNoTooltip] diz e sorri."
 lifestyle_nicknames.1000.end_good_good: "\n\n\"Motivo de comemoração, eu diria!\" [informer.GetFirstNameNoTooltip] exclama com um tom animado."
 lifestyle_nicknames.1000.a: "Posso me acostumar com esse nome!"
 lifestyle_nicknames.1000.b: "'[nickname_getter.GetNicknameNoTooltip|U]'? #EMP O quê!?#! Absurdo!"
 lifestyle_nicknames.1000.c: "Um pequeno raio de luz na escuridão..."
 lifestyle_nicknames.1000.d: "Ah. Então a vida #emp pode#! piorar."
 lifestyle_nicknames.1000.e: "*Grunhir de aprovação*"
 lifestyle_nicknames.1000.f: "*Grunhir de desaprovação*"
