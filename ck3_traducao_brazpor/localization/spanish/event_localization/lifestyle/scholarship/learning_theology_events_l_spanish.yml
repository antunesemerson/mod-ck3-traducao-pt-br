l_spanish:
 #Your realm priest asks for books, by Linnéa Thimrén
 learning_theology.1301.t: "Literatura Desejada"
 learning_theology.1301.desc_opening: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]!", aproxima-se de mim com urgência [bishop.Custom2('MyCharacterIntroduction', ROOT.Char)|U].\n\n"
 learning_theology.1301.desc_regula_pastoralis: "\"Um mercador local tem uma cópia do influente Regula Pastoralis, mas se recusa a vendê-lo para mim."
 learning_theology.1301.desc: "\"Um mercador local tem uma cópia do livro abrangente sobre cálculos e balanços, mas se recusa a vendê-lo para mim."
 learning_theology.1301.desc_ending: "Se você fizer com que ele veja o erro de seu caminho, ficarei em sua dívida!\""
 learning_theology.1301.a: "Vou garantir que o livro chegue até você."
 learning_theology.1301.b: "Hm, esse livro parece interessante..."
 learning_theology.1301.c: "Isso parece ser um problema #EMP seu#!."
 #Flatter your court chaplain with some bible verses, by Mathilda Bjarnehed
 learning_theology.2020.t: "O Poder do [ROOT.Char.GetFaith.ReligiousText|U]"
 learning_theology.2020.desc: "[court_chaplain.GetCouncilTitle] [court_chaplain.GetFirstName] suele citar a menudo textos del/de la [ROOT.Char.GetFaith.ReligiousText] sobre las virtudes sagradas. Debo demostrar que he prestado atención citando un texto por mí mism[ROOT.Char.Custom('ES_OA')], preferiblemente uno que halague su personalidad.\n\nMe lo aprenderé de memoria y recitaré un párrafo sobre…"
 learning_theology.2020.brave: "a coragem."
 learning_theology.2020.just: "a justiça."
 learning_theology.2020.temperate: "a moderação."
 learning_theology.2020.chaste: "a castidade."
 learning_theology.2020.compassionate: "a compaixão."
 learning_theology.2020.honest: "a honestidade."
 learning_theology.2020.forgiving: "a clemência."
 learning_theology.2020.wrathful: "a ferocidade."
 learning_theology.2020.vengeful: "o rancor."
 learning_theology.2020.content: "a satisfação."
 learning_theology.2020.patient: "a paciência."
 learning_theology.2020.calm: "a serenidade."
 learning_theology.2020.humble: "a humildade."
 learning_theology.2020.diligent: "a diligência."
 learning_theology.2020.generous: "a generosidade."
 learning_theology.2020.greedy: "a riqueza."
 learning_theology.2020.lustful: "o desejo."
 learning_theology.2020.ambitious: "a ambição."
 learning_theology.2020.gluttonous: "um apetite saudável."
 learning_theology.2020.success.desc: "[court_chaplain.GetCouncilTitle|U] [court_chaplain.GetFirstNameNoTooltip] se sente lisonjead[court_chaplain.Custom('ES_OA')]"
 learning_theology.2020.neutral.desc: "[court_chaplain.GetCouncilTitle|U] [court_chaplain.GetFirstNameNoTooltip] est? satisfeit[court_chaplain.Custom('ES_OA')]"
 learning_theology.2020.failure.desc: "[court_chaplain.GetCouncilTitle|U] [court_chaplain.GetFirstNameNoTooltip] acha que estou zombando de [court_chaplain.Custom('ES_ElElla')]"
 learning_theology.2021.desc: "Estoy segur[ROOT.Char.Custom('ES_OA')] de que [court_chaplain.GetCouncilTitle] [court_chaplain.GetFirstName] dijo algo sobre las virtudes de ser [SCOPE.Custom('virtue_choice')]. No recuerdo sus palabras exactamente, así que me permití algo de creatividad.\n\nPor desgracia, [court_chaplain.GetCouncilTitle] es bastante conservador[court_chaplain.Custom('ES_XA')]. «¿Qué estáis diciendo?», dice con sorna. «¡Esas no son las palabras de [ROOT.Char.GetFaith.HighGodName]!»"
 learning_theology.2021.a: "Talvez eu devesse ler o [ROOT.Char.GetFaith.ReligiousText] com mais frequência..."
 learning_theology.3002.t: "A Era do Mundo"
 learning_theology.3002.desc: "Tenho estudado os antigos textos religiosos e os escritos de estudiosos, e todos parecem concordar que [ROOT.Char.Custom('WorldDeadline')]. Pelos meus cálculos, faltam menos de um século.\n\nNo entanto, m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('chaplain'))], [chaplain.GetTitledFirstName|l], insta-me a manter isso em segredo. \"Deixe isso para os [ROOT.Char.GetFaith.AltPriestTermPlural] e evite o pânico. E se seus cálculos estiverem errados?\""
 learning_theology.3002.a: "Todos merecem saber a verdade!"
 learning_theology.3002.b: "Um ponto razoável, [chaplain.GetFirstNameNoTooltip]."
 learning_theology.3002.c: "Devo consultar mais [ROOT.Char.GetFaith.PriestNeuterPlural]."
 learning_theology.3003.t: "Encarando as Estrelas"
 learning_theology.3003.desc: "De tantas noites contemplando as estrelas, vi com meus próprios olhos o que antes só tinha ouvido.\n\nAs estrelas se movem a diferentes velocidades e invertem seu curso em momentos diferentes, mas aparentemente em grandes grupos, dependendo da esfera celeste à qual pertençam. De fato, com os cálculos certos, até mesmo se poderia prever seu movimento.\n\nÉ claro que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('chaplain'))] não aprova. "Deixai os céus em paz. O reino celestial é para os [ROOT.Char.GetFaith.AltPriestTermPlural]"."
 learning_theology.3003.a: "Encontrarei minhas respostas nos céus."
 learning_theology.3003.b: "Você está certo, devo me concentrar em assuntos terrenos."
 #Worship in the same church (theology friend), by Linnéa Thimrén
 learning_theology.3011.t: "Oração Compartilhada"
 learning_theology.3011.desc_friend: "Ao sair da [ROOT.Char.GetFaith.HouseOfWorship] em [temple_county.GetName], eu e m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('believer'))] [believer.GetTitledFirstName|l] acabamos na companhia de alguns comerciantes locais."
 learning_theology.3011.desc: "Ao sair de [ROOT.Char.GetFaith.HouseOfWorship] de [temple_county.GetName] acabo na companhia de alguns mercadores locais, assim como de [believer.GetTitledFirstName|l]."
 learning_theology.3011.ending: "Estão no meio de uma discussão sobre teologia e riqueza mundana.\n\nEu #EMP investiria#! em [ROOT.Char.GetFaith.HouseOfWorship], mas como posso saber se essa é sequer a vontade [ROOT.Char.GetFaith.WealthGodNamePossessive]?"
 learning_theology.3011.a_friend: "Vamos convencê-los de que [ROOT.Char.GetFaith.WealthGodName] deu sinais!"
 learning_theology.3011.a: "Ajude-me a convencê-los, [believer.GetTitledFirstNameNoTooltip|l]!"
 learning_theology.3011.a.success: "Os comerciantes estão convencidos"
 learning_theology.3011.a.failure: "A [ROOT.Char.GetFaith.HouseOfWorship] nunca recebe uma moeda"
 learning_theology.3011.b: "Eu sei de um lugar onde seu ouro seria melhor utilizado...!"
 #Send fan mail to religious head, by Linnéa Thimrén
 learning_theology.3021.t: "Carta Sagrada"
 learning_theology.3021.desc_opening: "Minhas recentes empreitadas no campo da teologia me fizeram apreciar ainda mais os representantes [ROOT.Char.GetFaith.HighGodNamePossessive] na Terra. Escreverei uma carta ao [compliment_receiver.GetTitleAsName] , [compliment_receiver.GetFirstName] tentando expressar estes sentimentos.\n\n"
 learning_theology.3021.desc_friend: "Sento-me com m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('believer'))], [believer.GetTitledFirstName|l],"
 learning_theology.3021.desc: "Sento-me com um escriba,"
 learning_theology.3021.desc_christian: "e juntos redigimos uma carta realmente esplêndida destacando a..."
 learning_theology.3021.desc_other: "e juntos redigimos uma carta realmente esplêndida destacando..."
 learning_theology.3021.success.tt: "A critério d [believer.GetTitledFirstNameNoTooltip|l]:"
 learning_theology.3021.b: "Apenas superior, [ROOT.Char.GetFaith.HighGodName|U]!"
 learning_theology.3022.opening: "[compliment_receiver.Custom2('AppropriateGreeting', ROOT.Char)]"
 learning_theology.3022.desc: "Sua carta é muito apreciada! Sua visão sobre o reino de [ROOT.Char.GetFaith.HighGodName|U] e a natureza humana é impressionante."
 learning_theology.3022.a: "Louvado seja [ROOT.Char.GetFaith.HighGodNameAlternate]!"
 learning_theology.3023.opening: "[compliment_receiver.Custom2('AppropriateGreeting', ROOT.Char)]"
 learning_theology.3023.desc: "Estou impressionado com suas percepções sobre nossa religião, mas menos impressionado com sua percepção sobre seus semelhantes."
 learning_theology.3023.a: "Seja como for."
 learning_theology.3024.opening: "[compliment_receiver.Custom2('AppropriateGreeting', ROOT.Char)]"
 learning_theology.3024.desc: "Sua fanfarronice vazia como um [ROOT.Char.GetWomanMan] de [ROOT.Char.GetFaith.HighGodName] não me engana, e sua visão turva sobre os corações das pessoas o denuncia!"
 learning_theology.3024.a: "Maldição...!"
 #Deal with county of different faith, by Linnéa Thimrén
 learning_theology.3031.t: "Diferenças na Fé"
 learning_theology.3031.desc_opening: "Em [county.GetName] creem no [county.GetProvince.GetCounty.GetFaith.GetNameNoTooltip].\n\n"
 learning_theology.3031.desc_bishop: "[bishop.GetCouncilTitle|U] [bishop.GetFirstName] condena isso como heresia, mas as pessoas pedem compreensão..."
 learning_theology.3031.desc: "Muitos condenam isso como heresia, mas as pessoas pedem compreensão..."
 learning_theology.3031.a: "Como eles adoram não é da minha conta."
 learning_theology.3031.b: "Eles #EMP devem#! rezar para [ROOT.Char.GetFaith.PantheonTerm]!"
 learning_theology.3031.b_confucian: "Eles seguirão o caminho!"
 learning_theology.3031.b_tt: "Progresso aumentado da tarefa de conversão do conselho $task_conversion$"
 learning_theology.3031.b_tt2: "Será mais fácil Converter a Fé em [county.GetNameNoTooltip] por 30 anos"
 #Study Mysticism, by Petter Vilberg
 learning_theology.3041.t: "Conhecimento Místico"
 learning_theology.3041.desc: "Ouvi falar de [ROOT.Char.GetFaith.DevoteeNeuterPlural] que entram em transe e recebem visões de êxtase para comungar com [ROOT.Char.GetFaith.HighGodName].\n\nSerá que eu também poderia alcançar essa espécie de conexão divina?"
 learning_theology.3041.a: "Fico curioso para saber o que aconteceria se eu imitasse suas práticas."
 learning_theology.3041.a.tt: "Você testa as práticas místicas"
 learning_theology.3041.b: "O que outros textos dizem?"
 learning_theology.3041.b.tt: "Você tenta aprender mais sobre a prática por meio de livros"
 learning_theology.3042.desc: "Encerrad[ROOT.Char.Custom('ES_OA')] en una habitación, los extraños polvos en un fuego ardiente proporcionaron un calor, humo y olores abrumadores mientras intentaba sentir las cosas que están más allá del mundo de los sentidos…\n\nNo sé cuánto tiempo pasó antes de que me llegasen visiones extrañas e indescifrables de luz y sonidos pulsantes. ¿Era mi imaginación o una visión fugaz de la divinidad? ¿Hay alguna forma de saberlo?"
 learning_theology.3042.a: "Preciso tentar novamente para ver se algo está diferente!"
 learning_theology.3042.a.tt: "Você continua experimentando"
 learning_theology.3042.b: "Interessante. Vou registrar minhas descobertas para o futuro."
 learning_theology.3043.desc: "Conforme experimento cada vez mais, tenho uma compreensão cada vez mais clara das coisas. É como se agora eu pudesse convocar a presença que sinto quando começo meu pequeno ritual.\n\nIsso oferece estabilidade e conforto à medida que o caos do mundo gira ao meu redor."
 learning_theology.3043.a: "Isso é o que eu tenho procurado!"
 learning_theology.3043.b: "Quase nada divino — mas muito relaxante!"
 learning_theology.3044.desc: "Quanto mais eu me aprofundo nos antigos textos, mais descubro. Será que as práticas misteriosas dos antigos [ROOT.Char.GetFaith.DevoteeNeuterPlural] antecedem até mesmo a própria [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip]?\n\nParece que tropecei em algo notável."
 learning_theology.3044.a: "Isso está me ensinando muito sobre minha fé!"
 learning_theology.3044.b: "Talvez eu deva experimentar um pouco afinal..."
 learning_theology.3045.desc: "Isso é tão frustrante! Não importa o que eu faça, não consigo capturar a sensação que tive em minhas primeiras experiências místicas.\n\nAquela sensação de que #EMP algo#! está lá, apenas fora do alcance, simplesmente desapareceu, não importa o que eu faça!"
 learning_theology.3045.a: "Tenho que recuperar aquela sensação!"
 learning_theology.3045.b: "Uma oração é tudo que preciso para me comunicar com [ROOT.Char.GetFaith.HighGodNameAlternate]."
 learning_theology.3046.desc: "Tenho buscado conhecimento e experiência mística há tanto tempo agora, e ainda assim... nada! A única resposta que me resta é voltar ao começo e recriar perfeitamente as condições do meu experimento.\n\nPreciso me comunicar com o divino. Será que estou sendo intencionalmente ignorado?!"
 learning_theology.3046.a: "Preciso encontrar as respostas!"
 learning_theology.3046.a.success: "Um experimento bem-sucedido"
 learning_theology.3046.a.success.tt: "Você pode obter [GetTrait('lifestyle_mystic').GetName( GetPlayer )|l]"
 learning_theology.3046.a.failure: "Ainda nada!"
 learning_theology.3046.a.failure.tt: "Tu búsqueda te vuelve loc[ROOT.Char.Custom('ES_OA')]"
 learning_theology.3046.b: "O que estou fazendo... É hora de desistir dessa loucura."
 learning_theology.3047.desc: "Eu não preciso de rituais antigos para me comunicar com o divino. O divino fala comigo o tempo todo. Eu o ouço. Não tenho nada com que me preocupar e nada a buscar. Está tudo bem aqui comigo, todas as manhãs, todas as noites, todas as noites.\n\nEle fala comigo, e somente comigo!"
 learning_theology.3047.a: "[ROOT.Char.GetFaith.HighGodName] me escolheu! Sou um[ROOT.Char.Custom('ES_OA')]!"
 #Passion Play fanfiction drama, by James Beaumont
 learning_theology.3051.t: "A Paixão [ROOT.Char.GetFaith.GetReligion.GetAdjectiveNoTooltip] em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]"
 learning_theology.3051.desc.intro: "Foi-me comunicado que [passion_playwright.GetName] um[passion_playwright.Custom('ES_XA')] célebre dramaturg[passion_playwright.Custom('ES_OA')] de fé [ROOT.Char.GetFaith.GetReligion.GetAdjectiveNoTooltip] pretende encenar sua obra:"
 learning_theology.3051.passion: "A Paixão de [ROOT.Char.GetFaith.random_GoodGodNames]"
 learning_theology.3051.arabian_nights: "2000 noites de [SelectLocalization( IsLandlessAdventurer( ROOT.Char ), ROOT.Char.GetCulture.GetCollectiveNounNoTooltip, ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip ) ]"
 learning_theology.3051.inferno: "Inferno de [ROOT.Char.GetFaith.random_EvilGodNames]"
 learning_theology.3051.my_immortal: "Meu [passion_playwright.GetRandomPositiveTrait]"
 learning_theology.3051.desc.passion: "\"$learning_theology.3051.passion$.\""
 learning_theology.3051.desc.arabian_nights: "\"$learning_theology.3051.arabian_nights$.\""
 learning_theology.3051.desc.inferno: "\"$learning_theology.3051.inferno$.\""
 learning_theology.3051.desc.my_immortal: "\"$learning_theology.3051.my_immortal$.\""
 learning_theology.3051.desc.outro: "\n\nO preço da entrada é alto, mas esta é provavelmente uma oportunidade única na vida de testemunhar uma peça de [passion_playwright.GetNameNoTooltip] com meus próprios olhos!"
 learning_theology.3051.a: "Uma noite piedosa no teatro!"
 learning_theology.3051.b: "Não vou menosprezar a criação de [ROOT.Char.GetFaith.CreatorName]."
 learning_theology.3052.desc: "Mientras veo cómo se desarrolla la obra ante mí, rápidamente queda claro por qué [passion_playwright.GetName] es tan reconocid[passion_playwright.Custom('ES_OA')] como geni[passion_playwright.Custom('ES_OA')] literari[passion_playwright.Custom('ES_OA')].\n\nLa prosa, la interpretación, todo ello me hace sentir como si presenciara el desarrollo de los acontecimientos de mi [ROOT.Char.GetFaith.ReligiousText] ante mí, como si hubiera estado allí para contemplar la obra de [ROOT.Char.GetFaith.CreatorName].\n\nUna vez terminada la obra, me encuentro a solas con [passion_playwright.GetNameNoTooltip]."
 learning_theology.3052.a: "Você deve me ensinar a interpretar o [ROOT.Char.GetFaith.ReligiousText] como você faz!"
 learning_theology.3052.b: "Eu poderia escrever algo melhor do que isso!"
 learning_theology.3053.desc: "Veo cómo se desarrolla la obra ante mí y es, sin duda, un auténtico disparate. Lo que he presenciado no es digno de considerarse literatura.\n\nLa historia sigue a [ROOT.Char.GetCapitalLocation.Custom('GetRandomRegionalWood')|U] Fuente[ROOT.Char.Custom('GetRandomRegionalBird')|l], un[passion_playwright.Custom('ES_XA')] joven erudit[passion_playwright.Custom('ES_OA')] que estudia la mística [ROOT.Char.GetFaith.GetReligion.GetAdjectiveNoTooltip] y la brujería, mientras persigue un amor tras otro dentro de su círculo académico.\n\nLa obra no tiene prácticamente nada que ver con mi [ROOT.Char.GetFaith.ReligiousText] y el resto del público empieza a burlarse y a mofarse de la chapucera composición de [passion_playwright.GetName]."
 learning_theology.3053.a: "Vaias!"
 learning_theology.3053.b: "Vou escrever minha própria peça!"
 learning_theology.3053.c: "Esses tolos simplesmente não apreciam o gênio de [passion_playwright.GetFirstNameNoTooltip]!"
 learning_theology.3054.t: "Uma Peça Própria [ROOT.Char.GetFaith.GetReligion.GetAdjectiveNoTooltip]"
 learning_theology.3054.desc.intro: "Já faz bastante tempo desde que originalmente jurei superar o trabalho inferior de [passion_playwright.GetName], e enquanto a tinta dos meus escribas seca, admiro meu próprio trabalho.\n\n"
 learning_theology.3054.desc.outro: "é uma obra que merece ser chamada de "obra-prima", em minha humilde opinião.\n\nA única questão que resta é quem deve interpretar o papel principal."
 learning_theology.3054.a: "Eu disfarçad[ROOT.Char.Custom('ES_OA')] é claro!"
 learning_theology.3054.b: "É a vez d [family_actor.Custom2('RelationToMeShort', ROOT.Char)|U] brilhar!"
 learning_theology.3054.c: "Meu [ROOT.Char.Custom2('RelationToMeShort', random_actor)], [random_actor.Custom('ES_ElLa')] [random_actor.GetTitledFirstNameNoTooltip|l], é um encantador nato."
 learning_theology.3055.t: "Estreia Dramática"
 learning_theology.3055.desc.intro.solo: "Respiro fundo e me preparo para encenar minha peça, certo de que ela será impecável comigo aqui para entregar sua mensagem piedosa."
 learning_theology.3055.desc.intro.hired_actor: "Tomo meu assento entre o público e observo como [lead_actor.GetName] começa a interpretar minha obra-prima."
 learning_theology.3055.desc.victory.solo: "Respiro fundo e recito minhas falas impecavelmente, o público ao meu redor sendo cativado pelas minhas palavras.\n\nEu os ilumino com minha interpretação magistral dos contos do [ROOT.Char.GetFaith.ReligiousText]."
 learning_theology.3055.desc.defeat_writing.solo: "\n\nApesar de recitar minhas falas com perfeição, os rostos expectantes da plateia logo começam a se tornar amargos e confusos."
 learning_theology.3055.desc.defeat_acting.solo: "Tento ler as falas de abertura, mas imediatamente engasgo com as palavras e tropeço rigidamente no roteiro, falhando em lembrar de minhas próprias escritas. Meu público não me perdoa e começa rapidamente a vaiar e assobiar para mim!\n\n"
 learning_theology.3055.desc.victory.hired_actor: "\n\nPara meu deleite, [lead_actor.GetSheHe] faz uma atuação não apenas digna dos meus escritos, mas de [ROOT.Char.GetFaith.GetHighGodName] em pessoa!"
 learning_theology.3055.desc.defeat_writing.hired_actor: "\n\nPara meu horror, embora [lead_actor.GetSheHe] recite minhas falas exatamente como as imaginei, o público rapidamente se volta contra [lead_actor.GetSheHe] , vaiando e zombando de[lead_actor.GetHerHim] enquanto faz uma interpretação excelente!"
 learning_theology.3055.desc.defeat_acting.hired_actor: "\n\nPara mi horror, se le atragantan las líneas y no logra ofrecer ni siquiera una actuación pasable. Me hierve la sangre al ver cómo destroza mi gran obra, impotente en mi asiento para impedir los abucheos del público."
 learning_theology.3055.desc.victory_outro: "\n\nQuando o público irrompe em aplausos, me asseguram que me superei[ROOT.Char.Custom('ES_OA')] e que mostrei a [passion_playwright.GetName] como se escreve uma peça um[ROOT.Char.Custom('ES_XA')] verdadeir[ROOT.Char.Custom('ES_OA')] membro do povo [ROOT.Char.GetFaith.GetAdherentNameNoTooltip]!"
 learning_theology.3055.desc.defeat_outro.solo: "\n\nSigo em frente, na esperança de que, em algum momento, eu possa recuperar o ímpeto e salvar esta apresentação, mas é inútil. Antes mesmo de chegar ao fim, as poltronas do teatro se esvaziam e fico como uma vergonha."
 learning_theology.3055.desc.defeat_outro.hired_actor: "\n\n[lead_actor.Custom('ES_ElLa')|U] [lead_actor.GetTitledFirstNameNoTooltip|l] segue em frente, na esperança de que talvez esta peça ainda possa ser redimida, mas o espetáculo é um fracasso. Antes mesmo de chegarmos ao final, os assentos do teatro se esvaziam e eu fico desonrado."
 learning_theology.3055.a: "Que ótima noite para os [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] em todos os lugares!"
 learning_theology.3055.b: "Talvez atuar não seja para mim..."
 learning_theology.3054.a.tt: "Você tentará superar [passion_playwright.GetName] em um duelo usando sua habilidade de [diplomacy_skill|l]."
 learning_theology.3054.b.tt: "[family_actor.GetName] tentará superar [passion_playwright.GetName] em um duelo usando sua habilidade de [diplomacy_skill|l]."
 learning_theology.3054.c.tt: "[random_actor.GetName] tentará superar [passion_playwright.GetName] em um duelo usando sua habilidade de [diplomacy_skill|l]."
 #Find old text, by Linnéa Thimrén & Flavio Verna
 learning_theology_special.1001.t: "Apócrifo"
 learning_theology_special.1001.desc: "Minha busca insaciável por conhecimento me levou a descobrir um estranho texto antigo.\n\nO volume, atribuído a um antigo teólogo que raramente é mencionado em fontes oficiais, lança luz sobre certos aspectos de [ROOT.Char.GetFaith.GetName] que eu não fazia ideia de que pertenciam ao dogma da fé."
 learning_theology_special.1001.d: "Devemos reviver essas práticas antigas."
 learning_theology_special.1001.d.success: "Eu integro com sucesso minhas descobertas no dogma atual de [THIS.Char.GetFaith.GetAdjective]"
 learning_theology_special.1001.d.failure: "Não consigo convencer o restante do clero"
 learning_theology_special.1001.d.failure.toast: "Minha tentativa de integrar o texto apócrifo falhou"
 learning_theology_special.1001.e: "[vassal_pope.GetTitledFirstNameNoTooltip|l] precisa ser informad disso!"
 learning_theology_special.1001.e.success: "Convenço [vassal_pope.Custom('ES_AlAla')] [vassal_pope.GetTitledFirstName|l] para integrar minhas descobertas no dogma atual da fé [THIS.Char.GetFaith.GetAdjective]"
 learning_theology_special.1001.e.failure: "[vassal_pope.GetTitledFirstNameNoTooltip|l] se recusa a aceitar o texto como genuíno"
 learning_theology_special.1001.e.failure.toast: "[vassal_pope.GetTitledFirstName] descartou o texto como um embuste herético"
 learning_theology_special.1001.a: "[bishop.Custom('ES_ElLa')|U] [bishop.GetTitledFirstNameNoTooltip|l] pode me ajudar a estudar este texto."
 learning_theology_special.1001.a.desc: "Dependendo do fanatismo [bishop.Custom('ES_DelDela')];"
 learning_theology_special.1001.a.success: "[bishop.GetSheHe|U] vai me ajudar a estudar"
 learning_theology_special.1001.a.success.toast: "[bishop.GetTitledFirstName] me parabenizou pela descoberta rara"
 learning_theology_special.1001.a.failure: "[bishop.GetSheHe|U] manda queimar o livro"
 learning_theology_special.1001.a.failure.toast: "[bishop.GetTitledFirstName] me agradeceu por entregar o livro herético à fogueira"
 learning_theology_special.1001.b: "É melhor eu estudar isso em privado..."
 learning_theology_special.1001.c: "Essa porcaria herética deve queimar!"
 learning_theology_special.1002.t: "Novo Dogma"
 learning_theology_special.1002.a.desc: "Ao integrar o conteúdo do antigo texto às práticas modernas do [ROOT.Char.GetFaith.GetAdjective], deixei uma marca histórica em nossa fé, algo que poucos dos meus sucessores esperarão alcançar.\n\nAlguns representantes notáveis do clero ainda zombam dessa mudança incomum em nossas doutrinas, mas, graças à minha eloquência, a maioria dos teocratas influentes foi convencida da legitimidade da minha reforma."
 learning_theology_special.1002.b.desc: "No fue fácil convencer primero [vassal_pope.Custom('ES_AlAla')] [vassal_pope.GetTitledFirstName|l] de la autenticidad del texto y luego a los otros representantes principales de la fe [ROOT.Char.GetFaith.GetAdjective] por debajo de [vassal_pope.Custom('ES_ElElla')], pero me impuse gracias a mi pasión y a conocimiento de temas teológicos.\n\nAlgunos representantes notables de nuestro clero aún se mofan de este cambio insólito en nuestras doctrinas, pero, gracias a mi elocuencia, la mayoría de los teócratas influyentes han quedado convencidos de su legitimidad."
 learning_theology_special.1002.a: "É óbvio que [ROOT.Char.GetFaith.HighGodName] em pessoa me trouxe até este livro!"
 learning_theology_special.1003.a.desc: "Em sua imensa sabedoria, [player_pope.GetTitledFirstName|l] descobriu um antigo texto religioso que altera significativamente o dogma [ROOT.Char.GetFaith.GetAdherentName].\n\nApós discutir suas descobertas com membros notáveis do clero, [player_pope.GetTitleTierName] decidiu integrar o conteúdo do livro à doutrina oficial da fé."
 learning_theology_special.1003.b.desc: "Após uma pesquisa laboriosa e horas intermináveis de estudos teológicos, [pope_liege.GetTitledFirstName|l] descobriu um antigo texto religioso que altera significativamente o dogma [ROOT.Char.GetFaith.GetAdherentName].\n\nApós apresentar suas descobertas a [vassal_pope.GetTitledFirstName|l], [vassal_pope.GetTitleTierName] decidiu integrar o conteúdo do livro na doutrina oficial da fé."
 learning_theology_special.1003.a: "O que isso significa para o resto de nós, exatamente?"
 #Learned scholar come to your court, by Linnéa Thimrén
 learning_theology_special.1101.t: "Comentários"
 learning_theology_special.1101.desc: "«Las bendiciones sean con vos, [ROOT.Char.Custom('FormOfAddressForLiege')]. Me llamo [scholar.GetTitledFirstName|l]». [scholar.Custom('ES_ElLa')|U] rabin[scholar.Custom('ES_OA')] que tengo delante hace una reverencia respetuosa.\n\n«He dedicado mi vida a estudiar y escribir comentarios sobre la Tanaj y el Talmud. Tal vez mis escritos y mi orientación os sean de utilidad en los estudios que hacéis de vuestro/a [ROOT.Char.GetFaith.ReligiousText]»."
 learning_theology_special.1101.desc.fallback: ""Saudações, [ROOT.Char.Custom('FormOfAddressForLiege')]. Meu nome é [scholar.GetTitledFirstName|l]". O/A sacerdo[scholar.Custom('ES_TeTisa')] que está diante de mim faz uma reverência respeitosa.\n\n"Dediquei minha vida a estudar e escrever sobre o/a [ROOT.Char.GetFaith.ReligiousText]. Talvez meus escritos e minha orientação sejam úteis para você em seus próprios estudos"."
 learning_theology_special.1101.a: "Vamos escrever comentários sobre o [ROOT.Char.GetFaith.ReligiousText]!"
 learning_theology_special.1101.b: "Tengo asuntos urgentes sobre el mundo #emp real#!."
 learning_theology_special.1101.c: "Nunca abrigarei [scholar.Custom('ES_XA')] um herege sob o meu teto!"
 learning_theology_special.1102.desc: "Após dias de trabalho árduo, olhamos para as páginas espalhadas diante de nós; os comentários que escrevemos são exaustivos e detalhados. Graças à orientação d [scholar.GetTitledFirstName|l], tenho um novo entendimento do [ROOT.Char.GetFaith.ReligiousText]."
 learning_theology_special.1102.desc_dead: "Depois de dias de trabalho árduo, olho para as páginas espalhadas diante de mim; os comentários escritos são exaustivos e detalhados. Que pena que [scholar.GetTitledFirstName|l] não esteja aqui para vê-lo."
 learning_theology_special.1102.desc_ending: "\n\nAcredito que o clero ficaria interessado no trabalho que fiz!"
 learning_theology_special.1102.a.success: "Convenço a [scholar.GetTitledFirstNameNoTooltip|l] para continuar"
 learning_theology_special.1102.a.failure: "[scholar.GetTitledFirstNameNoTooltip|l] não fica convencid[scholar.Custom('ES_OA')]"
 learning_theology_special.1102.b: "Por que devo compartilhar a glória?"
 learning_theology_special.1102.c: "Tudo isso é graças a [scholar.GetFirstNameNoTooltip]!"
 learning_theology_special.1102.c.rl_desc: "Dependendo de quão honrado seja [scholar.GetTitledFirstNameNoTooltip|l]"
 learning_theology_special.1102.c.success: "vai compartilhar a glória comigo"
 learning_theology_special.1102.c.failure: "vai levar todo o crédito"
 learning_theology_special.1102.c.success.toast: "[scholar.GetTitledFirstName] compartilhou a glória comigo"
 learning_theology_special.1102.c.failure.toast: "[scholar.GetTitledFirstName] levou todo o crédito"
 learning_theology_special.1102.b.success: "Engano [scholar.GetShortUINameNoTooltip]"
 learning_theology_special.1102.b.failure: "[scholar.GetShortUINameNoTooltip] revela minha duplicidade"
 learning_theology_special.1102.d: "Mesmo assim, aprendi muito!"
