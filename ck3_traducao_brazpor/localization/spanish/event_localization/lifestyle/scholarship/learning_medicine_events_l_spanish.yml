l_spanish:
 #Become a herbalist, by Mathilda Bjarnehed
 learning_medicine.2001.t: "Segredos da Natureza"
 learning_medicine.2001.pool.desc: "Recebi uma proposta de [herbalist.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. Se dermos crédito ao que está escrito, trata-se de um[herbalist.Custom('ES_XA')] herbalista experiente[herbalist.Custom('ES_OA')] que deseja compartilhar seu conhecimento em troca de [ROOT.Char.Custom('GetRoom')] e comida."
 learning_medicine.2001.no_pool.desc: "[herbalist.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] é um[herbalist.Custom('ES_XA')] herborista talentoso, que conhece tanto as plantas curativas quanto as nocivas. Em mais de uma ocasião, se ofereceu para compartilhar seus conhecimentos comigo."
 learning_medicine.2001.chaplain_hates_herbs.desc: "\n\nA oferta é intrigante, mas sei que [chaplain_hates_herbs.GetCouncilTitle] [chaplain_hates_herbs.GetFirstName] desconfia de amuletos e poções. Acredita que [ROOT.Char.GetFaith.DevilName] os usa para seus próprios propósitos nefastos…"
 learning_medicine.2001.a: "Estou sempre disposto[ROOT.Char.Custom('ES_OA')] aprender algo novo."
 learning_medicine.2001.b: "Uma flor rara alegraria o dia d [flower_receiver.GetFirstNameNoTooltip]."
 learning_medicine.2001.c: "[herbalist.GetSheHe|U] poderia plantar um jardim de ervas sagradas."
 learning_medicine.2001.d: "Não tenho tempo para lidar com sujeira e plantas."
 learning_medicine.2001.d.chaplain_hates_herbs: "Confio no julgamento de [chaplain_hates_herbs.GetCouncilTitle] sobre este assunto."
 learning_medicine.2002.start.desc: "[herbalist.GetFirstName] e eu estamos passando outra noite classificando plantas e preparando poções. Estou folheando um de seus tomos gastos quando descubro"
 learning_medicine.2002.chaplain_hates_herbs.desc: "um parágrafo que faria [chaplain_hates_herbs.GetCouncilTitle] [chaplain_hates_herbs.GetFirstName] espumar de raiva!"
 learning_medicine.2002.not_witchcraft_accepted.desc: "um parágrafo que faria com que os [ROOT.Char.Custom('DefaultPriestTitlePlural')] espumassem de raiva!"
 learning_medicine.2002.witchcraft_accepted.desc: "uma receita muito intrigante. Eu não sabia que meras ervas possuíam tanto poder..."
 learning_medicine.2002.a: "Preciso aprofundar-me nesse conhecimento oculto!"
 learning_medicine.2002.a.success.t: "[herbalist.GetFirstNameNoTooltip] é um brux"
 learning_medicine.2002.a.failure.t: "[herbalist.GetFirstNameNoTooltip] fica chocad com minhas insinuações"
 learning_medicine.2002.b: "Se [herbalist.GetFirstNameNoTooltip] oculta segredos, descobrirei."
 learning_medicine.2002.b.success.t: "Descubro a verdade sobre [herbalist.GetFirstNameNoTooltip]"
 learning_medicine.2002.b.success.tt: "Se [herbalist.GetShortUIName] tem um Segredo de Bruxa, ele será revelado a mim"
 learning_medicine.2002.b.success.witch.t: "[herbalist.GetFirstNameNoTooltip] é um brux"
 learning_medicine.2002.b.success.no_witch.t: "[herbalist.GetFirstNameNoTooltip] não é um brux"
 learning_medicine.2002.b.success.no_witch.desc: "Estou convict[ROOT.Char.Custom('ES_OA')] da inocência de [herbalist.GetTitledFirstName|l]"
 learning_medicine.2002.b.inconclusive.t: "Minha investigação é inconclusiva"
 learning_medicine.2002.b.inconclusive.desc: "Não encontro provas de bruxaria"
 learning_medicine.2002.b.failure.t: "[herbalist.GetFirstNameNoTooltip] me pega bisbilhotando"
 learning_medicine.2002.c: "Não vou me distrair com mitos e boatos."
 learning_medicine.2003.desc: "\"Isto é o que desejo aprender\", digo, enquanto entrego o tomo a [herbalist.GetFirstName]. \"Você vai me ensinar?\"\n\n[herbalist.GetFirstNameNoTooltip] me encara seriamente por um tempo. \"Você está realmente pront[ROOT.Char.Custom('ES_OA')], [ROOT.Char.GetFirstNameNoTooltip]? Você vai se dedicar a [herbalist.GetFaith.WitchGodName] em troca de Suas bênçãos?\""
 learning_medicine.2003.a: "Não há nada que eu deseje mais."
 #Improve the skills of your court physician, by Mathilda Bjarnehed
 learning_medicine.2010.t: "Uma Tradução Preocupante"
 learning_medicine.2010.start.desc: "Ao cruzar o limiar do consultório da minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('court_physician'))] [court_physician.GetFirstName], encontro [court_physician.GetHerHim] inclinad[court_physician.Custom('ES_OA')] sobre um livro.\n\n\"Esta tradução de"
 learning_medicine.2010.galen.desc: "Galen"
 learning_medicine.2010.hippocrates.desc: "Hippocrates"
 learning_medicine.2010.herophilus.desc: "Herófilo"
 learning_medicine.2010.hildegard.desc: "Hildegard de Bingen"
 learning_medicine.2010.mundinus.desc: "Mundinus"
 learning_medicine.2010.avicenna.desc: "Avicena"
 learning_medicine.2010.trota.desc: "Trota de Salerno"
 learning_medicine.2010.sun_simiao.desc: "Sun Simiao"
 learning_medicine.2010.zhan_zhongjing.desc: "Zhang Zhongjing"
 learning_medicine.2010.hua_tuo.desc: "Hua Tuo"
 learning_medicine.2010.tamba_yasuyori.desc: "Tamba Yasuyori"
 learning_medicine.2010.bianque.desc: "[Glossary( 'Bian Que', 'BIAN_QUE_GLOSS' )]"
 learning_medicine.2010.fallback.desc: "um relatório de autópsia"
 learning_medicine.2010.end.desc: "é terrível\", diz com um suspiro. \"Se eu seguisse estas instruções, teria a mesma probabilidade de curar meu paciente que de matá-lo de vez.\""
 learning_medicine.2010.a: "Deixe-me dar uma olhada..."
 learning_medicine.2010.a.success.desc: "Ajudo a [court_physician.GetFirstNameNoTooltip] a traduzir o texto"
 learning_medicine.2010.a.failure.desc: "Faço papel de bobo[ROOT.Char.Custom('ES_XA')] idiota"
 learning_medicine.2010.b: "Comprarei uma tradução melhor para você."
 learning_medicine.2010.c: "Você deveria buscar orientação no [ROOT.Char.GetFaith.ReligiousText]."
 #Fertility treatment, by Mathilda Bjarnehed
 learning_medicine.2021.t: "[ROOT.Char.Custom('ES_AlAla')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]"
 learning_medicine.2021.desc: "Meu nome é [physician.GetTitledFirstNameNoTooltip|l] e sou um[physician.Custom('ES_XA')] médic[physician.Custom('ES_OA')] qualificad[physician.Custom('ES_OA')] em assuntos de fertilidade.\n\nTalvez meus discretos conselhos possam ser úteis ao meu [ROOT.Char.GetLadyLord]? Seria uma honra servi-lo — por uma taxa nominal."
 learning_medicine.2021.a: "Eu poderia usar sua ajuda..."
 learning_medicine.2021.a.tt: "Aceitas o tratamento de fertilidade"
 learning_medicine.2021.b: "Um[physician.Custom('ES_XA')] médic[physician.Custom('ES_OA')] qualificad[physician.Custom('ES_OA')] é sempre bem-vind[physician.Custom('ES_OA')]."
 learning_medicine.2021.b.tt: "Você recusa o tratamento de fertilidade"
 learning_medicine.2021.c: "Não tenho tais #EMP problemas!#!"
 learning_medicine.2022.t: "Problemas de Fertilidade"
 learning_medicine.2022.old_physician.desc: "Tenho visto [physician.GetTitledFirstName|l] lidar com tudo, de sanguessugas a corpos em decomposição, mas o desconforto em seu rosto é algo totalmente novo.\n\n\"Como seu[physician.Custom('ES_XA')] médic[physician.Custom('ES_OA')], sou guardiã[physician.Custom('ES_OA')] de sua saúde\", diz, olhando para os próprios sapatos. \"Isso também inclui sua saúde… #EMP reprodutiva#!. Posso preparar uma tintura que talvez ajude você e seu[spouse.Custom('ES_XA')] [spouse.Custom('WifeHusband')]. Também li sobre tratamentos experimentais com resultados promissores.\""
 learning_medicine.2022.new_physician.desc: "Eu queria dar ao meu nov[physician.Custom('ES_OA')] médic[physician.Custom('ES_OA')] tempo para se acomodar, mas poucas horas após sua chegada, [physician.GetFirstName] entra no meu escritório arrastando uma grande caixa. [physician.GetSheHe|U] a põe com esforço sobre minha mesa com um inquietante #EMP tilintar#!.\n\n\"Você e seu[spouse.Custom('ES_XA')] [spouse.Custom('WifeHusband')] tendes várias opções, [ROOT.Char.Custom('FormOfAddressForLiege')]. Há tinturas comprovadas… mas também estou desenvolvendo alguns tratamentos experimentais.\""
 learning_medicine.2022.b: "Um simples tônico parece sensato."
 learning_medicine.2022.b.success: "O tratamento é bem-sucedido"
 learning_medicine.2022.b.failure: "O tratamento não tem sucesso"
 learning_medicine.2022.a: "O futuro do reino está em jogo! Vou tentar qualquer coisa!"
 learning_medicine.2022.a.success: "O tratamento é muito bem-sucedido"
 learning_medicine.2022.a.unexpected: "O tratamento tem efeitos colaterais estranhos"
 learning_medicine.2022.a.failure: "O tratamento tem efeitos colaterais ruins"
 learning_medicine.2022.c: "Na verdade, só quero um... conselho."
 learning_medicine.2022.a.unexpected.tt: "Algo inesperado pode acontecer"
 learning_medicine.2023.urine.desc: "\"Seus corpos não estão sincronizados, [ROOT.Char.Custom('FormOfAddressForLiege')], mas tenho um remédio para isso. Vocês devem beber a urina do seu [spouse.Custom('ES_OA')] [spouse.Custom('WifeHusband')], e [spouse.GetSheHe], a sua. Todas as noites, antes de dormir, durante uma semana. Então, suas energias certamente vão se alinhar!\".\n\nFoi uma longa semana."
 learning_medicine.2023.unpleasant_end.desc: "\n\nMesmo que o tratamento em si tenha sido menos agradável,"
 learning_medicine.2023.pig_testicles.desc: "\"Adquiri o porco mais viril de todo [location.GetNameNoTooltip] e sequei e pulverizei seus testículos. Beba isso com vinho durante duas semanas, e sua fertilidade aumentará dez vezes!\""
 learning_medicine.2023.pig_testicles_end.desc: "\n\nMesmo que o pó tenha dado ao vinho um sabor meio mofado, no geral foi uma experiência surpreendentemente agradável."
 learning_medicine.2023.udder.desc: "\"O leite dá vida, e por isso devemos ir à sua fonte. Os cozinheiros farão um ensopado de úbere de vaca para vocês dois. Não comam mais nada durante uma semana, e certamente serão recompensados.\"\n\nFoi uma longa semana."
 learning_medicine.2023.female_orgasm.start.desc: "\"Como você deve saber, o prazer da mulher é tão importante quanto o do homem."
 learning_medicine.2023.female_orgasm.female.desc: "Sua semente deve brotar e se misturar com a de seu[spouse.Custom('ES_OA')] [spouse.Custom('WifeHusband')], que deve ler este volume sobre técnicas de leito e [ROOT.Char.Custom('GetChamber')|l]\".\n\nNão poderia ter esperado um tratamento melhor.\n\n"
 learning_medicine.2023.female_orgasm.male.desc: "Deveis fazer brotar a semente de voss[spouse.Custom('ES_OA')] [spouse.Custom('WifeHusband')] para que se misture com a vossa. Deveis ler este tomo sobre técnicas de leito e [ROOT.Char.Custom('GetChamber')]\".\n\nFoi muito trabalho dominar os métodos pouco familiares, mas creio que os dominei… ao menos se eu me guiar pela reação de [spouse.GetFirstName]!\n\n"
 learning_medicine.2023.milk_bath.desc: "\"Todo leite dá vida, e o leite de cabra é especialmente potente. Cada vez que vos[spouse.Custom('ES_OA')] [spouse.Custom('WifeHusband')] e vos tentardes conceber, primeiro deveis tomar banho em leite de cabra. Podeis até tentar na banheira!\""
 learning_medicine.2023.milk_bath_end.desc: "\n\nEmbora o leite tivesse um #EMP cheiro#! peculiar,"
 learning_medicine.2023.end.desc: "[physician.GetFirstNameNoTooltip] está muito positiv[physician.Custom('ES_OA')] com os resultados e eu me sinto ótimo! [physician.GetFirstNameNoTooltip] me diz para sermos pacientes, mas acho que em breve poderemos esperar um novo membro na família."
 learning_medicine.2023.a: "Vamos nos recolher ao meu [ROOT.Char.Custom('GetChamber')|l], [spouse.GetFirstNameNoTooltip]..."
 learning_medicine.2024.end.desc: "\n\nEmbora eu tenha seguido os conselhos de [physician.GetFirstName] à risca, e [physician.GetFirstNameNoTooltip] me diz para ter paciência, minhas apreensões são fortes. Sinto náuseas e fraqueza, e [spouse.GetFirstName] está acamado há três dias seguidos[spouse.Custom('ES_OA')] ."
 learning_medicine.2024.a: "Eu só quero descansar..."
 learning_medicine.2024.b: "Guardas! Prendam esse charlat[physician.Custom('ES_EA')] charlat[physician.Custom('ES_AnAna')]!"
 learning_medicine.2025.start.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], tenho grandes notícias! Ainda é cedo, mas voss[spouse.Custom('ES_OA')] [spouse.Custom('WifeHusband')] mostra todos os sintomas de estar grávid[spouse.Custom('ES_OA')]!\"\n\nNo início, a felicidade e o alívio me inundam, mas logo a confusão se segue. \"Mas vocês ainda não administraram o vosso tratamento, [physician.GetFirstName]\", digo de forma mordaz.\n\n"
 learning_medicine.2025.fertilitygod.desc: "\"[physician.GetFaith.FertilityGodName]"
 learning_medicine.2025.the_universe.desc: "\"O universo"
 learning_medicine.2025.end.desc: "trabalha de maneiras misteriosas, [ROOT.Char.Custom('FormOfAddressForLiege')]. Às vezes é melhor aceitar nossas bênçãos de braços abertos em vez de tentar explicá-las.\""
 learning_medicine.2025.b: "Sábias palavras!"
 learning_medicine.2025.a: "[spouse.GetFirstNameNoTooltip]. Precisamos conversar. A sós."
 learning_medicine.2025.a.tt: "Eu confronto [spouse.GetShortUIName]"
 #Healthy coping mechanism: becoming a confider
 learning_medicine.2030.t: "Um Fardo Pesado"
 learning_medicine.2030.desc: "Às vezes, minhas responsabilidades como [ROOT.Char.GetTitleAsNameNoTooltip] me sobrecarregam completamente. Como uma só pessoa pode carregar todo [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] sobre os ombros?\n\nTalvez haja alguns fardos com os quais eu não precise lidar so[ROOT.Char.Custom('ES_OA')]... Se eu tivesse alguém em quem pudesse confiar…"
 learning_medicine.2030.a: "Os conselhos de [confider_target.GetFirstNameNoTooltip] sempre me acalmam."
 learning_medicine.2030.a.message: "Desabafar alivia meu estresse"
 learning_medicine.2030.b: "[confider_target_2.GetFirstNameNoTooltip] é um ótim ouvinte."
 learning_medicine.2030.c: "Podemos guardar os segredos mais sombrios um do outro."
 learning_medicine.2030.d: "Depender dos outros só me tornaria frac."
 learning_medicine.2030.c.tt: "Se [confider_target.GetShortUIName] tem um [secret|lE], me revelará"
 learning_medicine.2030.c.message: "[confider_target.GetFirstNameNoTooltip] revela um segredo"
 #Healthy coping mechanism: journaller or athletic, by Mathilda Bjarnehed
 learning_medicine.2040.t: "Mente e Corpo"
 learning_medicine.2040.start.desc: "Quanto mais me aprofundo em meus estudos, mais evidente fica a ligação entre mente e corpo. Preocupar-se demais pode nos deixar doentes, e a mente não é mais forte do que seu recipiente!\n\n"
 learning_medicine.2040.athletic_friend.desc: "Meu sab[friend.Custom('ES_OA')] amig[friend.Custom('ES_OA')] [friend.GetTitledFirstName|l] jura que o movimento vigoroso [friend.GetHerHim] ajuda a manter o estresse sob controle. Também li sobre os benefícios de escrever um diário para acalmar a ansiedade."
 learning_medicine.2040.journaller_friend.desc: "Meu sabi[friend.Custom('ES_OA')] amig[friend.Custom('ES_OA')] [friend.GetTitledFirstName|l] mantém um diário sobre suas preocupações e jura que isso alivia sua mente. Também li sobre os benefícios do movimento vigoroso para acalmar os nervos abalados."
 learning_medicine.2040.no_friend.desc: "Preciso de uma saída saudável para lidar com as pressões de governar. Li sobre os benefícios do movimento vigoroso, assim como do diário para acalmar os nervos."
 learning_medicine.2040.a: "Faço exercícios com [friend.GetFirstNameNoTooltip]."
 learning_medicine.2040.b: "Pedir a [friend.GetFirstNameNoTooltip] conselhos de viagem."
 learning_medicine.2040.c: "Ir correr."
 learning_medicine.2030.c.trait: "O exercício me acalma"
 learning_medicine.2030.c.modifier: "Não me sinto relaxad[ROOT.Char.Custom('ES_OA')], mas fico mais forte"
 learning_medicine.2040.d: "Passar a tarde escrevendo no diário."
 learning_medicine.2030.d.trait: "Escrever no diário me acalma"
 learning_medicine.2030.d.modifier: "Não me sinto relaxad[ROOT.Char.Custom('ES_OA')], mas minha escrita melhorou"
 learning_medicine.2040.e: "Tirar folga o dia todo."
 #Helping healing hand (medicine friend), by Mathilda Bjarnehed
 learning_medicine.2050.t: "Sangrando"
 learning_medicine.2050.start.desc: "Eu estava inspecionando a enfermaria [Select_CString(IsLandlessAdventurer(ROOT.Char),'do acampamento','dos alojamentos')] quando trazem um[soldier.Custom('ES_XA')] soldado gravemente ferido. \"Ele está perdendo sangue demais! Onde está o médico?!\".\n\n"
 learning_medicine.2050.physician.desc: "[physician.GetTitledFirstName|l] não está em lugar algum."
 learning_medicine.2050.no_physician.desc: "O curandeiro não está em lugar algum."
 learning_medicine.2050.end.desc: "Um arrepio percorre minha espinha. Pode ser que #EMP eu#! seja a única esperança de est[soldier.Custom('ES_EA')] [soldier.GetWomanMan].\n\nDe repente, como se tivesse saíd[helper.Custom('ES_OA')] do nada, tenho [helper.Custom2('MyCharacterIntroduction', ROOT.Char)] ao meu lado. [helper.GetSheHe|U] arregaça as mangas e me olha."
 learning_medicine.2050.a: "Me passe o torniquete!"
 learning_medicine.2050.a.success: "[helper.GetFirstNameNoTooltip] e eu salvamos [soldier.Custom('ES_AlAla')] soldado"
 learning_medicine.2050.a.failure: "Apesar de nossos esforços, [soldier.Custom('ES_LoLa')] perdemos"
 learning_medicine.2050.b: "#EMP Dê um passo para trás#! Este é #EMP meu#! paciente!"
 learning_medicine.2050.b.success: "Salvo [soldier.Custom('ES_AlAla')] soldado eu salv[ROOT.Char.Custom('ES_OA')]"
 learning_medicine.2050.b.failure: "Sou incapaz de salvá-l[soldier.Custom('ES_LoLa')]"
 learning_medicine.2050.c: "Deixe sangrar. Não merece nada melhor."
 learning_medicine.2051.start_our.desc: "Noss[soldier.Custom('ES_OA')]"
 learning_medicine.2051.start.desc: "paciente grita e se debate. Embora três [soldier.GetWomenMen] fortes [soldier.Custom('ES_LoLa')] o seguram, cada passo do caminho é uma batalha."
 learning_medicine.2051.middle.desc: "Mas [helper.GetTitledFirstName|l] permanece calmo e, eventualmente, uma quietude tranquila se instala sobre nós.\n\nNão tenho certeza de como conseguimos, mas no final, parece que meu soldado viverá. \"Foi uma façanha impressionante,"
 learning_medicine.2051.my_ladylord.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\","
 learning_medicine.2051.firstname.desc: "[ROOT.Char.GetFirstNameNoTooltip],\""
 learning_medicine.2051.end.desc: "[helper.GetFirstNameNoTooltip] diz com um sorriso cansado. \"Foi uma honra servir ao seu lado.\""
 learning_medicine.2051.a: "Eu não poderia ter feito isso sem você."
 learning_medicine.2052.middle.desc: "\n\nTrabalhamos freneticamente, gritando ordens em meio ao caos, mas não há nada que fazer. Meu soldado só fica mais fraco, seu sangue jorra aos borbotões entre nossos dedos.\n\n\"Fizemos tudo o que podíamos\","
 learning_medicine.2052.end.desc: "[helper.GetFirstNameNoTooltip] suspira profundamente enquanto levam o corpo e diz: \"Já estava perdid[soldier.Custom('ES_OA')] antes de chegarmos a vê-l[soldier.Custom('ES_OA')].\""
 learning_medicine.2052.a: "Você está cert. Obrigado, [helper.GetFirstNameNoTooltip]."
 learning_medicine.2052.b: "Eu não preciso da sua compaixão!"
 learning_medicine.2053.start_my.desc: "Meu"
 learning_medicine.2053.desc: "Mas meus conhecimentos não me falham, e minhas mãos permanecem firmes.\n\nNão sei bem como consegui, mas no fim parece que meu soldado vai viver. Seus camaradas me dão tapinhas nas costas, perdendo o decoro por alívio. \"Obrigado, [ROOT.Char.Custom('FormOfAddressForLiege')]. Teríamos perdido [soldier.GetFirstName] sem você!\"."
 learning_medicine.2053.a: "Eu salvei uma vida hoje!"
 learning_medicine.2054.desc: "\n\nTrabalho freneticamente, gritando ordens em meio ao caos, mas não há nada a fazer. Minha soldada está cada vez mais fraca, seu sangue jorra em borbotões entre meus dedos.\n\nEnquanto levam o corpo, [helper.GetFirstName] me olha com"
 learning_medicine.2054.disgust.desc: "desgosto não disfarçado."
 learning_medicine.2054.pity.desc: "pena."
 learning_medicine.2054.a: "Eu... Se eu tivesse apenas..."
 #A vassal (or your liege) wants to eat some hashish while visiting your capital, by Ewan Cowhig Croft.
 learning_medicine.2110.t: "Conversa sobre Bolos"
 learning_medicine.2110.desc: "Eu e minha comitiva estamos voltando de uma breve incursão em [capital.GetNameNoTooltip], quando nos deparamos inesperadamente com [hashish_vassal_or_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] e sua comitiva, rondando minha capital em negócios não anunciados.\n\n"
 learning_medicine.2110.desc_good_terms: "\"Ah, [ROOT.Char.GetFirstNameNoTooltip]! Eu estava esperando encontrar você. Venha, encontrei uma taverna encantadora bem perto daqui. Gostaria de se juntar a mim para alguns [ROOT.Char.Custom('GetExpensiveDrink')] e bolos de haxixe?\""
 learning_medicine.2110.desc_bad_terms: "A tensão no ar é palpável, nossas respectivas guardas estão prontas para uma briga. \"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", gorjeia nervosamente um jovem soldado atrás de mim, \"talvez possamos todos nos acalmar com alguns bolos de haxixe naquela pequena taberna ali?\"\n\nO silêncio cai sobre nossos dois grupos enquanto [hashish_vassal_or_liege.GetFirstNameNoTooltip] aguarda minha resposta."
 learning_medicine.2110.desc_neutral_terms: "Surpres[hashish_vassal_or_liege.Custom('ES_OA')], passam alguns instantes de silêncio incômodo antes que os olhos de [hashish_vassal_or_liege.GetFirstNameNoTooltip] se fixem em algo atrás de mim.\n\n\"Ah, meu [hashish_vassal_or_liege.Custom2('RelationToMe', ROOT.Char)], talvez vocês queiram juntar-se a mim para esquecer tudo isso com um pouco de [ROOT.Char.Custom('GetExpensiveDrink')] e bolos infusos de haxixe\"."
 learning_medicine.2110.a.good_terms: "Desculpe, mas tenho que seguir meu caminho."
 learning_medicine.2110.a.bad_terms: "Com esse[hashish_vassal_or_liege.Custom('ES_EA')] sacan[hashish_vassal_or_liege.Custom('ES_OA')]? Jamais!"
 learning_medicine.2110.a.neutral_terms: "Receio que tenho lugares para ir."
 learning_medicine.2110.b.good_terms: "Eu posso ser persuadido a me deliciar um pouco..."
 learning_medicine.2110.b.bad_terms: "Está bem. Mas #EMP só um#! bolo."
 learning_medicine.2110.b.neutral_terms: "Talvez possamos pegar um ou dois bolos..."
 learning_medicine.2110.b.flavour: "Um bolo vira dois, depois três, depois cinco..."
 cosmic_insights_modifier: "Percepções Cósmicas"
 cosmic_insights_modifier_desc: "Uma longa noite de consumo de haxixe realmente deu a este personagem uma visão sobre a natureza da realidade."
 learning_medicine.2110.c.good_terms: "Apenas tente acompanhar, amigo!"
 learning_medicine.2110.c.bad_terms: "Minha tolerância é lendária!"
 learning_medicine.2110.c.neutral_terms: "Vamos tornar isso uma noite decadente!"
 learning_medicine.2110.c.tt_success: "O haxixe [hashish_vassal_or_liege.Custom('ES_LoLa')] faz com que fale com excessiva liberdade"
 learning_medicine.2110.c.tt_fail: "O excesso me torna indiscret[ROOT.Char.Custom('ES_OA')]"
 ##########
 #learning_medicine_special
 ###########
 #Study human cadavers, by Linnéa Thimrén and Flavio Verna
 learning_medicine_special.1001.t: "Segredos do Corpo"
 learning_medicine_special.1001.desc: "Me sinto fascinad[ROOT.Char.Custom('ES_OA')] pelo corpo humano e por todos os segredos que ainda nos oculta. Tenho constantemente em mente questões sobre a vida e a morte.\n\nLer textos sobre o tema é muito bom, mas não consigo evitar a sensação de que aprenderia muito mais com pesquisa prática."
 learning_medicine_special.1001.a: "Vou estudar os estragos das doenças em um cadáver."
 learning_medicine_special.1001.b: "Os corpos dos mortos merecem nosso respeito!"
 learning_medicine_special.1002.desc: "Tento prender a respiração enquanto examino o emaranhado de vísceras sujas e inchadas que brotam do ventre do cadáver, mas de nada adianta. O pútrido fedor da decomposição chega aos poucos aos meus pulmões, me causando ânsia de vômito.\n\nEntão, algo se rompe, e um fluxo de icor viscoso e amarelado se derrama por toda a mesa de operações.\n\n \"O que era #EMP isso#!?\""
 learning_medicine_special.1002.a: "Talvez [scoped_physician.GetTitledFirstNameNoTooltip] possa me ajudar?"
 learning_medicine_special.1002.a.good: "[scoped_physician.GetTitledFirstName] me ajuda em minhas pesquisas"
 learning_medicine_special.1002.a.bad: "[scoped_physician.GetTitledFirstName] fica horrorizad[scoped_physician.Custom('ES_OA')] com meus experimentos"
 learning_medicine_special.1002.b: "Só preciso encontrar mais corpos... De alguma forma."
 learning_medicine_special.1002.c: "Chega! Isso é indecente!"
 learning_medicine_special.1003.desc_physician: "[scoped_physician.GetTitledFirstName] ficou extasiad[scoped_physician.Custom('ES_OA')] ao saber do meu novo interesse por anatomia. Com sua ajuda, aprofundei significativamente meu entendimento do corpo humano."
 learning_medicine_special.1003.desc_fallback: "Com a ajuda de algumas moedas bem colocadas e um criado de boca fechada, garanti um suprimento constante de corpos para experimentar. Infelizmente, acabo desmembrando a maioria deles, mas como se aprende sem cometer um erro ou uma dúzia?"
 learning_medicine_special.1003.desc_ending: "\n\nSó gostaria que houvesse alguma maneira de afastar o cheiro... Estou começando a temer que toda essa exposição ao ar ruim possa não ser boa para minha saúde."
 learning_medicine_special.1003.a: "Talvez algumas flores possam ajudar?"
 learning_medicine_special.1003.a.good: "Minhas precauções me protegem de doenças"
 learning_medicine_special.1003.a.bad: "O cheiro dos cadáveres começa a afetar meus humores"
 learning_medicine_special.1003.b: "Acho que já aprendi o suficiente."
 learning_medicine_special.1004.desc: "A [scoped_physician.GetTitledFirstName|l] não ficou nada satisfeito ao saber dos meus experimentos. Recusou-se a me prestar qualquer ajuda e me repreendeu, dizendo que esse tipo de empreendimento não está sob a alçada de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName]."
 learning_medicine_special.1004.unavailable.desc: "Dado que [scoped_physician.GetTitledFirstName|l] já não pode me fornecer ajuda, não pude continuar meus experimentos com a anatomia humana."
 learning_medicine_special.1004.a: "Talvez você esteja certo..."
 learning_medicine_special.1004.unavailable.a: "Infelizmente."
 learning_medicine_special.1004.unavailable.tt: "Você deixa de estudar cadáveres humanos"
 learning_medicine_special.1005.desc: "Felizmente, o uso adequado de canteiros de flores, incenso e aeração parece ter ajudado a diminuir os efeitos que os vapores ruins emanados pelos cadáveres estavam causando em meu corpo.\n\nFinalmente posso me concentrar em meus estudos sem medo de repercussões no equilíbrio dos meus humores."
 learning_medicine_special.1005.a: "Nada atrapalha o conhecimento!"
 learning_medicine_special.1006.desc_opening: "Enquanto observo um dos corpos que tenho há dias em meu estudo, sou repentinamente atingido por vertigem — novamente."
 learning_medicine_special.1006.desc_death: "A tosse vem logo em seguida, e enquanto me curvo devido à dor, consigo sentir sangue escorrendo entre meus lábios.\n\nEu pisco e me vejo no chão. Dou um suspiro trêmulo e percebo que não consigo mais respirar. Fecho meus olhos..."
 learning_medicine_special.1006.desc: "Não consigo mais negar as necessidades do meu próprio corpo, tenho que terminar isso e deitar por um tempo..."
 learning_medicine_special.1006.a: "O cheiro da morte afetou meus humores!"
 #You consume a hallucinogenic fish, by Ewan Cowhig Croft.
 learning_medicine_special.2100.t: "Um Peixe Muito Milagroso"
 learning_medicine_special.2100.desc: "Um[fish_alchemist.Custom('ES_XA')] pescador[fish_alchemist.Custom('ES_XA')] local de [hallucinogenic_fish_county.GetNameNoTierNoTooltip], [fish_alchemist.GetName], apresentou-se diante de mim afirmando ser capaz de preparar um jantar encantado.\n\nAo que parece, [fish_alchemist.GetSheHe] pesca peixes alucinógenos em um lugar secreto e realiza rituais estranhos com eles. Depois, serve suas cabeças, e cada peixe inspira visões extasiadas por dias após o consumo.\n\n[fish_alchemist.Custom('ES_ElLa')|U] pescador[fish_alchemist.Custom('ES_XA')] torce as mãos enquanto me olha, os olhos brilhando de cobiça e medo."
 learning_medicine_special.2100.a: "Prepare-me um dos seus peixes mágicos."
 learning_medicine_special.2100.a.tt_success: "Recebo revelações divinas sobre [ROOT.Char.GetFaith.PositiveAfterLife]"
 hallucinogenic_visions_uplifting_modifier: "Visões Edificantes do Além-Vida"
 hallucinogenic_visions_uplifting_modifier_desc: "Este personagem recebeu revelações que alteram a mente sobre a felicidade que aguarda os escolhidos no além-vida."
 learning_medicine_special.2100.a.tt_failure: "Sou assombrado por pesadelos do [ROOT.Char.GetFaith.NegativeAfterLife]"
 hallucinogenic_visions_terrifying_modifier: "Visões Aterrorizantes do Além-Vida"
 hallucinogenic_visions_terrifying_modifier_desc: "Este personagem é atormentado por visões que marcam a mente dos horrores que aguardam os indignos no além-vida."
 learning_medicine_special.2100.b: "Este ritual, você deve me ensiná-lo..."
 learning_medicine_special.2100.b.tt_success: "O camponês[fish_alchemist.Custom('ES_OA')] revela seus segredos"
 learning_medicine_special.2100.b.tt_success.tt: "[fish_alchemist.GetShortUINameNoTooltip] se junta à minha corte como servo[fish_alchemist.Custom('ES_EA')] leal"
 learning_medicine_special.2100.b.tt_fail: "Entro em uma discussão acalorada com o plebeu[fish_alchemist.Custom('ES_OA')]"
 learning_medicine_special.2100.b.tt_failure.tt: "[fish_alchemist.GetShortUINameNoTooltip] foge da minha corte, furios[fish_alchemist.Custom('ES_OA')]"
 associates_with_strange_peasants_modifier: "Se Associa com Camponeses Estranhos"
 associates_with_strange_peasants_modifier_desc: "Este personagem é conhecid por ter se envolvido em discussões estranhas com aqueles muito abaixo de sua posição."
 learning_medicine_special.2100.c: "Não permitais que a bruxa viva!"
 learning_medicine_special.2100.c.tt: "[fish_alchemist.GetShortUINameNoTooltip] é queimad na fogueira"
 learning_medicine_special.2100.d: "Alguém poderia, por gentileza, se livrar dest[fish_alchemist.Custom('ES_EA')] plebe[fish_alchemist.Custom('ES_OA')]?"
 learning_medicine_special.2100.d.tt: "[fish_alchemist.GetShortUINameNoTooltip] é expuls[fish_alchemist.Custom('ES_OA')] da minha corte e se vai ressentid[fish_alchemist.Custom('ES_OA')]"
 aloof_from_the_commoners_modifier: "Distante dos Camponeses"
 aloof_from_the_commoners_modifier_desc: "Este personagem tem a reputação de afastar camponeses que desperdiçam seu tempo."
