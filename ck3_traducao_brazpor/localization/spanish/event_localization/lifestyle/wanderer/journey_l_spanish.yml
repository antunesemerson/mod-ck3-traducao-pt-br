l_spanish:
 journey_events.10.t: "Um Companheiro para o Ar Livre"
 journey_events.10.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], percebi que precisais urgentemente de um companheiro de viagem\", ouço dizer meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('provider_character'))], [provider_character.GetFirstName], quando entra em meu gabinete. Ele me lança um olhar cúmplice. \"Uma caravana de mercadores passava hoje por [ROOT.Char.GetCapitalLocation.GetName] e vi que tinham uma grande seleção de animais à venda\".\n\nQuando peço mais detalhes, ele menciona os cães, cavalos e falcões de todos os tamanhos que viu. Ao refletir sobre isso, penso comigo mesmo que talvez o que preciso seja companhia para minhas viagens."
 journey_events.10.a: "Um bom cavalo de guerra, isso seria perfeito."
 journey_events.10.b: "Agora, cães, eles são verdadeiros companheiros."
 journey_events.10.c: "Um falcão de caça é exatamente o que preciso."
 journey_events.10.d: "Não tenho interesse em um animal de estimação."
 journey_events.11.t: "Um Companheiro para o Ar Livre: Cavalo"
 journey_events.11.desc: "Após um ou dois dias, finalmente me é apresentado um grande e poderoso cavalo. Assim que ele é entregue a mim, sinto a vontade indomável da criatura me desafiando.\n\nPor um momento, temo ser derrubado, mas no final, consigo segurar, embora por pouco. A criatura então me olha com o que só posso descrever como um lampejo de respeito."
 journey_events.11.a: "Acho que seremos bons amigos, com o tempo."
 journey_events.12.t: "Um Companheiro para o Ar Livre: Cão"
 journey_events.12.desc: "Após um ou dois dias, finalmente me é apresentada uma pequena caixa. Ela se mexe levemente quando me aproximo, e, após alguma hesitação, finalmente a abro para encontrar meu novo pequeno companheiro.\n\nAssim que a tampa é removida, o filhote pula para fora e começa a correr pelo quarto com energia. Depois de um minuto ou mais, ele para, cai de lado e começa a cochilar."
 journey_events.12.a: "É um pouco pequeno, não é?"
 journey_events.20.t: "Nos Céus Acima"
 journey_events.20.desc: "Já está bastante avançado o dia quando meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('informer_character'))] [informer_character.GetFirstName] se aproxima com um brilho no olhar.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], soube de um rumor que pode interessar a vocês\".\n\nEm seguida, compartilha uma história sobre fenômenos astronômicos que, de algum tempo para cá, aparecem regularmente nos céus de [destination_province.GetName]. Embora os detalhes do fenômeno não estejam claros, diz-se que é uma experiência única na vida."
 journey_events.20.a: "Isso é interessante..."
 wayfarer_astronomical_phenomenon: "Fenômeno Astronômico"
 wayfarer_astronomical_phenomenon_desc: "#emp Durante uma [activity|lE] [GetActivityType('activity_roaming').GetName|l] você experimentará um evento único neste [barony|lE]#!\n\nAs histórias afirmam que esta província possui fenômenos astronômicos incríveis regularmente."
 journey_events.30.t: "Uma História ou Duas"
 journey_events.30.desc: "Dou de cara com [character_1.GetFirstName] e [character_2.GetFirstName] falando [Select_CString(And(character.IsFemale, character_2.IsFemale),'juntas, muito animadas','juntos, muito animados')]. \"Sério? Em [traveller_province.GetName], vocês disseram?\" Assim que percebem minha presença, [character_1.GetFirstName] se vira para mim e pergunta: \"Vós estivestes lá em uma de vossas viagens, não estivestes?\"\n\n\"Vejam, [character_2.GetFirstNameNoTooltip] me diz que viu [traveller_province.Custom('journey_events_30_custom_loc')] em [traveller_province.GetNameNoTooltip]. Vistes algo assim?\"."
 journey_events.30.a: "O [traveller_province.Custom('journey_events_30_short_custom_loc')|U] de [traveller_province.GetNameNoTooltip]? Oh, deixe-me contar tudo sobre isso!"
 journey_events.30.a.tt: "Crees que #emp puedes#! haber estado en [traveller_province.Custom('journey_events_30_short_custom_loc')] de [traveller_province.GetNameNoTooltip], pero no sería una buena historia. Igual conviene adornarla un poco…"
 journey_events.30.a.win: "Convenço-os de que sei tudo sobre isso"
 journey_events.30.a.loss: "Eles me pegam 'exagerando'"
 journey_events.30.b: "Acho que talvez tenha ido?"
 journey_events.30.c: "Não, me conte tudo sobre isso, [character_2.GetFirstNameNoTooltip]."
 journey_events_30_custom_loc_fallback: "uma bela arco natural"
 journey_events_30_custom_loc_oasis: "um memorável oásis verdejante"
 journey_events_30_custom_loc_desert: "um antigo e imponente megalito"
 journey_events_30_custom_loc_mountains: "vistas fantásticas da encosta da montanha"
 journey_events_30_custom_loc_forest: "a grande floresta"
 journey_events_30_short_custom_loc_fallback: "arco"
 journey_events_30_short_custom_loc_oasis: "oásis"
 journey_events_30_short_custom_loc_desert: "megalito"
 journey_events_30_short_custom_loc_mountains: "vistas"
 journey_events_30_short_custom_loc_forest: "grande floresta"
 journey_events.40.t: "Um Bardo Local"
 journey_events.40.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", me chama meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('suggester_character'))] [suggester_character.GetFirstName] ao entrar na sala. \"Todos na corte sabem como vos alegra compartilhar vossas histórias de viagens e proezas, para grande prazer de todos, asseguro-vos\".\n\nE continua: \"Ouvi falar de um bardo local que se tornou especialmente popular ultimamente. Uma espécie de menestrel que os camponeses apreciam. Com a motivação certa, talvez ele pudesse começar a espalhar algumas de vossas histórias por todo o reino?\"."
 journey_events.40.a: "Você está certo, todos merecem ouvir minhas histórias..."
 journey_events.40.a.tt: "Alguns [counties|lE] em seu [realm|lE] ganharão [GetModifier( 'journey_local_bard_modifier' ).GetNameWithTooltip|l] por #high 3 anos#!"
 journey_events.40.b: "Consigo pensar em formas melhores de gastar meu dinheiro, [suggester_character.GetFirstNameNoTooltip]."
 journey_local_bard_modifier: "Bardo Local"
 journey_local_bard_modifier_desc: "Um bardo está compartilhando as histórias de viagem do governante, para grande prazer dos locais."
 journey_events.50.t: "Uma Noite em [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]"
 journey_events.50.desc: "Há muito tempo venho pensando em como meus súditos interagem entre si, longe dos olhos de seus superiores. Após estudar isso devidamente, encontrei o momento exato para me esgueirar e uns trapos imundos que posso usar como disfarce.\n\nMas, à medida que o momento se aproxima, começo a repensar. Isso é digno [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]?"
 journey_events.50.a: "Já é tarde demais para voltar atrás."
 journey_events.50.a.win: "Eu me escapo"
 journey_events_50_event_chain_begins_tt: "Viajo para [rootscope.GetCapitalLocation.GetName]"
 journey_events.50.a.loss: "Fui pego usando trapos"
 journey_events.50.b: "Não, eu não posso ser visto com algo assim!"
 journey_events.50.b.tt: "O que houve comigo? Claro que não vou me sentar com camponeses e servos!"
 journey_events.51.desc: "Encontro um prédio de má reputação, mas popular, enquanto percorro as ruas. Assim que entro, me servem álcool, e a multidão me empurra para um assento em um canto. Ninguém mais me lançou um segundo olhar durante todo o processo.\n\nSento-me sozinh[ROOT.Char.Custom('ES_OA')], observando os demais no estabelecimento. Há um grupo barulhento reunido em torno de uma mesa grande, onde vários camponeses parecem estar se divertindo com algum jogo de dados."
 journey_events.51.a: "Bem, lhes mostrarei como um nobre joga[ROOT.Char.Custom('ES_XA')] nobre."
 journey_events.51.a.tt: "Hora de pegar o pouco que eles têm. Quase tão bom quanto taxá-los!"
 journey_events.51.a.big_win: "Eu ganho quase todos os jogos"
 journey_events.51.a.win: "Eu ganho alguns jogos aqui e ali"
 journey_events.51.a.loss: "Perco mais do que ganho"
 journey_events.51.b: "É hora de terminar minha bebida e ir para casa."
 journey_events.51.b.tt: "Já vi camponeses o suficiente para uma vida inteira."
 journey_events.52.desc: "Embora animados e divertidos no começo, todos ao redor da mesa ficam cada vez mais frustrados e furiosos quanto mais bebem e mais tarde fica. Um[local_gambler.Custom('ES_OA')] deles, [local_gambler.GetFirstNameNoTooltip], se levanta e proclama em voz alta: \"Malditos nobres! Eles nem sequer sabem como é para nós, a gente #bold normal#!! Principalmente esse[ROOT.Char.Custom('ES_EA')] fidalgo[ROOT.Char.Custom('ES_EA')] inútil [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstName|l]!\".\n\nSinto-me encolher na cadeira enquanto um coro de concordância se ergue ao redor da mesa. [local_gambler.GetFirstNameNoTooltip] percebe isso ao se virar para mim e perguntar: \"O que você acha?\"."
 journey_events.52.a: "Acho que é hora de mais uma rodada!"
 journey_events.52.a.tt: "Basta manter o álcool fluindo até que parem de reclamar!"
 journey_events.52.b: "Bem, na verdade… eu #bold soy#! [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]."
 journey_events.52.b.tt: "Vou provar como eles estão errados sobre mim!"
 journey_events.52.c: "Supostamente [threat_1.Custom('ES_ElLa')] [threat_1.GetTitledFirstNameNoTooltip|l] está ficando com todos os nossos impostos para [threat_1.GetSheHe]…"
 journey_events.52.c.chancellor: "Ouvi falar bastante sobre [threat_1.Custom('ES_ElLa')] [threat_1.GetCouncilTitle|l] corrupt[threat_1.Custom('ES_OA')], [threat_1.GetFirstNameNoTooltip]..."
 journey_events.52.c.steward: "Ao que parece, [threat_1.Custom('ES_ElLa')] [threat_1.GetCouncilTitle|l] [threat_1.GetFirstNameNoTooltip] está cobrando impostos extras para ficar com eles para [threat_1.GetSheHe]…"
 journey_events.52.c.marshal: "Vi [threat_1.Custom('ES_AlAla')] [threat_1.GetCouncilTitle|l] [threat_1.GetFirstNameNoTooltip] espancar alguém até a morte na rua…"
 journey_events.52.c.spymaster: "Ouvi umas coisas bem sórdidas sobre [threat_1.Custom('ES_ElLa')] [threat_1.GetCouncilTitle|l] [threat_1.GetFirstNameNoTooltip]…"
 journey_events.52.c.chaplain: "Correm rumores sobre os atos pecaminosos [threat_1.Custom('ES_DelDela')] [threat_1.GetCouncilTitle|l] [threat_1.GetFirstNameNoTooltip]…"
 journey_events.52.c.fallback: "Dizem que, na verdade, a culpa é [threat_1.Custom('ES_DelDela')] [threat_1.GetCouncilTitle|l] [threat_1.GetFirstNameNoTooltip]."
 journey_events.52.c.tt: "Esta é uma oportunidade para culpar outra pessoa, como a esse[threat_1.Custom('ES_EA')] imbecil de [threat_1.GetFirstNameNoTooltip]."
 journey_drink_and_circus_modifier: "Bebida e Circo"
 journey_drink_and_circus_modifier_desc: "Este condado viu um aumento na distribuição de álcool para as tabernas locais por seu senhor, alguns dizem até pessoalmente."
 journey_blame_game_modifier: "Nobre Impopular"
 journey_blame_game_modifier_desc: "Este personagem é profundamente impopular entre a população local, e muitos rumores sobre ele estão se espalhando."
 journey_blame_game_province_modifier: "Governante Popular"
 journey_blame_game_province_modifier_desc: "O governante do condado se tornou cada vez mais popular depois que as histórias sobre como lutam pelo povo se espalharam pela cidade."
 journey_pauper_king_modifier: "O Rei Mendigo"
 journey_pauper_king_modifier_desc: "Supostamente particularmente popular entre seus camponeses e servos devido às muitas histórias de suas interações amigáveis e pessoais com aqueles das classes mais baixas."
 journey_events.53.desc: "Peço uma rodada atrás da outra até que todos tenham desmaiado ou ido para casa. No fim, só [local_gambler.GetFirstNameNoTooltip] e eu ainda estamos [Select_CString(And(ROOT.Char.IsFemale, local_gambler.IsFemale),'sentadas','sentados')] à mesa. Est[local_gambler.Custom('ES_EA')] mal consegue se manter erguid[local_gambler.Custom('ES_OA')], mas ainda me lança um olhar vesgo.\n\n\"Sabe, você até que não é tão ruim para um[ROOT.Char.Custom('ES_XA')] nobre\", murmura por fim antes de bater a cabeça na mesa e desmaiar também."
 journey_events.53.a: "Puxa, me pergunto quando ela percebeu."
 journey_events.53.a.tt: "É hora de ir para casa antes que alguém fique muito preocupado comigo desaparecido."
 journey_events.54.desc: "No início, a tensão é grande. Mas, depois de contar histórias das minhas viagens e pedir várias rodadas de bebida, consigo sentir as pessoas relaxando. Depois de algum tempo, a taverna ganha um clima alegre, e as pessoas começam a fazer todo tipo de perguntas.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], se não se importar que eu diga...\", começa [local_gambler.GetFirstNameNoTooltip] com cautela, \"Temos uma milícia local aqui em [ROOT.Char.GetCapitalLocation.GetNameNoTooltip] e ficaríamos felizes em servi-lo de forma mais direta.\"\n\nApesar das minhas tentativas de os repreender, eles insistem em sua oferta. Quando o estalajadeiro finalmente fecha o balcão, todos parecem de ótimo humor, enquanto vão saindo aos poucos pela porta."
 journey_events.54.a: "Que noite produtiva!"
 local_militia_name_default: "Milícia Local"
 journey_events.55.desc: "Tento aliviar a tensão na sala quando, de repente, sinto o primeiro soco... O primeiro de muitos.\n\nDepois de uma chuva de socos e chutes, sou jogado no beco dos fundos. Mal sinto o rosto e não consigo me levantar.\n\nDepois de várias horas agonizantes, alguns guardas passam por ali e um deles, de algum modo, reconhece meu rosto. Eles me ajudam a me levantar e me acompanham de volta para casa."
 journey_events.55.a: "Essa ideia toda foi um erro..."
 journey_events.56.desc: "No começo, eu estava apenas tentando fazer algumas cutucadas leves ao caráter de [threat_1.GetFirstName], mas depois de um tempo comecei a me envolver. Já não é mais uma fachada para desviar a culpa; percebo que detesto [threat_1.GetHerHim].\n\nEnquanto continuo inventando minhas histórias sobre sua depravação, começo a acrescentar como é difícil para mim, como [ROOT.Char.GetTitledFirstName|l], lidar com sua corrupção.\n\nNo final da noite, as pessoas saem com uma opinião bem diferente sobre [threat_1.GetFirstName] e sobre mim."
 journey_events.56.a: "Isso é tudo o que merece."
 journey_events.56.a.tt: "Uma noite produtiva, agora é hora de ir para casa antes que alguém se preocupe demais comigo."
 journey_events.57.desc: "Apesar de todas as minhas tentativas de desviar a culpa para [threat_1.Custom('ES_ElLa')|l] [threat_1.GetCouncilTitle] [threat_1.GetFirstName], sou interrompido por uma pessoa ou outra. Elas continuam insinuando algo sobre meu caráter ou algum boato sobre mim.\n\nQuando percebi, a noite terminou de repente, e todos foram embora com uma opinião ainda pior sobre mim do que quando comecei. Como diabos isso aconteceu?"
 journey_events.57.a: "Quem diria que eu era tão impopular?"
 journey_events.57.a.tt: "Bem... Não tão produtivo quanto eu esperava, mas uma noite memorável, pelo menos..."
 journey_events.60.t: "Iluminação"
 journey_events.60.desc_intro: "Ultimamente tenho sido atormentado por uma inquietação. Os/As [journey_county.Custom('TerrainTypeCountyScopePlural')] [journey_province.Custom('TerrainTypeProvincePrefix')]s de [journey_county.GetNameNoTierNoTooltip] têm sido uma experiência maravilhosa, mas não conseguem preencher minha interminável sensação de vazio.\n\nEnquanto cuidava de meus afazeres habituais,"
 journey_events.60.desc_courtly: "Entro na corte de [journey_county.GetHolder.GetName] e observo-o presidindo-a. As damas e os senhores de [journey_county.GetHolder.GetPrimaryTitle.GetNameNoTierNoTooltip] estão reunidos ao redor de [journey_county.GetHolder.GetSheHe], solenes, enquanto os peticionários começam a chegar. Todos se apresentam com dignidade, ainda que seja para pedir seu ouro ou apoio. Não importa o quão trivial ou banal seja a solicitação, [journey_county.GetHolder.GetFirstNameNoTooltip] ouve atentamente e oferece um julgamento justo."
 journey_events.60.desc_bellicose: "Dou de cara com um acampamento e observo um grupo de cavaleiros em treinamento. Eles duelam entre si, e seus movimentos demonstram brutalidade, mas também graça, movendo-se em quase perfeita sincronia. O comandante os observa com orgulho, e o respeito mútuo entre eles é palpável."
 journey_events.60.desc_stoic: "Vejo crianças brincando nas ruas, com exceção de uma, que parece ser o alvo das brincadeiras. Ele é empurrado, suas roupas estão rasgadas, mas ele permanece calmo e sereno. Simplesmente se levanta, se sacode e continua seu caminho, para o espanto dos outros, que perdem o interesse nele."
 journey_events.60.desc_bureaucratic: "Alunos locais correm pela cidade, carregando pergaminhos e livros. Um deles deixa cair algo, sem perceber. Antes que eu tente devolver, noto um projeto detalhado no [ROOT.Char.Custom('GetWritingMaterial')] que chama minha atenção. Parece ser um plano para um novo edifício em [journey_county.GetNameNoTierNoTooltip], com recursos tão avançados que eu esperaria ver apenas vindos da mente de um mestre arquiteto. Nenhum dos estudantes aparenta ter mais de 18 anos, mas já dominaram um ofício que levaria a maioria uma vida inteira."
 journey_events.60.desc_spiritual: "Encontro um grupo de camponeses e monges reunidos em círculo. Seus hinos suaves preenchem o ar, embora eu não consiga distinguir se estão cantando em louvor a [ROOT.Char.GetFaith.HighGodName] ou a outra divindade. Ao observar mais de perto, percebo que alguns camponeses têm posição social mais elevada, com alguns até vestindo trajes da nobreza. Ainda assim, todos parecem em estado de paz, unidos pela reverência ao divino."
 journey_events.60.desc_egalitarian: "Decido fazer uma rápida parada em uma taverna local, entrando diretamente em uma discussão. Pelos sotaques e vestimentas, os frequentadores têm poucas semelhanças. Ainda assim, a conversa é bastante civilizada e animada, e não há julgamentos, como se todos tivessem vindo do mesmo ventre. As pessoas são tratadas como viajantes em [journey_county.GetNameNoTierNoTooltip], e não como outro [journey_culture.GetNameNoTooltip] ou [ROOT.Char.GetCulture.GetNameNoTooltip]."
 journey_events.60.desc_communal: "um grito assustador é ouvido, e as pessoas correm até a origem. Eu sigo junto e testemunho uma mulher segurando seu bebê em frente a uma casa em chamas. Os outros não perdem tempo e pegam baldes de água, até mesmo nobres sujam as mãos. O fogo é apagado rapidamente, mas o lar da mãe se perde. Os moradores se reúnem em torno dela e da criança, oferecendo o pouco que têm para ajudá-las a recomeçar."
 journey_events.60.opt: "Talvez eu possa aprender algo com esses [journey_culture.GetCollectiveNounNoTooltip]."
 journey_events.60.opt_b: "Vi tantas coisas em minhas viagens."
 journey_bellicose_modifier: "Respeito Marcial"
 journey_bellicose_modifier_desc: "Este personagem testemunhou cavaleiros em ação, e isso o deixou maravilhado."
 journey_stoic_modifier: "Determinação Inabalável"
 journey_stoic_modifier_desc: "Este personagem pratica a arte do estoicismo."
 journey_bureaucratic_modifier: "Arquiteto Aspirante"
 journey_bureaucratic_modifier_desc: "Este personagem viu o planejamento avançado de um projeto de construção local."
 journey_spiritual_modifier: "Reverência Divina"
 journey_spiritual_modifier_desc: "Este personagem aprecia a presença de um poder superior."
 journey_egalitarian_modifier: "Defensor Universal"
 journey_egalitarian_modifier_desc: "Este personagem viu os benefícios de uma sociedade diversa.\nCusto de recrutamento de [Concept('courtier', 'cortesãos')|E]: #P -10 %#!"
 journey_communal_modifier: "Patrono da Comunidade"
 journey_communal_modifier_desc: "Este personagem reúne seu povo nos momentos de necessidade.\nCusto de [activity|lE] [GetActivityType('activity_camp_party').GetName|l]: #P -20%#!\nCusto de [activity|lE] [GetActivityType('activity_feast').GetName|l]: #P -20%#!"
 journey_courtly_modifier: "Conhecedor da Corte"
 journey_courtly_modifier_desc: "Este personagem aprecia uma corte bem administrada."
