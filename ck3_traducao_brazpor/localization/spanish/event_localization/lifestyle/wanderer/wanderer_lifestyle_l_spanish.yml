l_spanish:
 wanderer_lifestyle_events.10.t: "Sonhos de uma Jornada"
 wanderer_lifestyle_events.10.desc: "Este quarto, estas paredes, esta maldita cadeira… Estou #bold tan#! hart[ROOT.Char.Custom('ES_OA')] de tudo isso.\n\n#emp Tengo#! tenho que sair daqui. Preciso ir para algum outro lugar. Para qualquer outro lugar.\n\nA cada dia que continuo pres[ROOT.Char.Custom('ES_OA')] nesta quarto horrível, sinto como se arrancassem outra parte da minha vida."
 wanderer_lifestyle_events.10.a: "Eu preciso de uma pausa de tudo isso..."
 wanderer_lifestyle_events.10.a.tt: "[traveling|E] removerá o [modifier|lE], e proporcionará [stress_loss|lE] e [lifestyle_experience|lE]"
 wanderer_restlessness_modifier: "Inquietação"
 wanderer_restlessness_modifier_desc: "#emp Este [modifier|lE] desaparecerá la próxima vez que [Concept('travel', 'viajes')|lE] a otro lugar#!\nCada dia horrível é passado sonhando em estar em outro lugar."
 wanderer_restlessness_removal_title: "Descanso"
 wanderer_lifestyle_events.20.t: "Meu Tempo em [reminiscing_location.GetNameNoTooltip]"
 wanderer_lifestyle_events.20.desc: "Enquanto mexo nas minhas coisas à procura de outra coisa, encontro uma velha estatueta de [SCOPE.Custom('mythical_map_creatures')] que peguei durante minha visita a [reminiscing_location.GetName], ao olhar para ela, lembro-me de"
 wanderer_lifestyle_events.20.desc.special_building: "[reminiscing_location.GetHolding.GetSpecialBuildingType.GetName], um lugar sobre o qual não pensava há muito tempo."
 wanderer_lifestyle_events.20.desc.coastal: "o grande porto e a bela vista do oceano."
 wanderer_lifestyle_events.20.desc.river: "o rio que passa pela cidade, e as muitas pontes sobre ele."
 wanderer_lifestyle_events.20.desc.castle: "o impressionante castelo que orgulhosamente sobrevoa a cidade."
 wanderer_lifestyle_events.20.desc.city: "a grande cidade majestosa com seus muitos distritos, e todos os pequenos cantos e recantos."
 wanderer_lifestyle_events.20.desc.people: "as pessoas amigáveis que viviam lá."
 wanderer_lifestyle_events.20.desc.outro_child: "\n\nEnquanto eu relembrava, [listening_child.GetFirstName] entra de repente. \"O que é isso?\" pergunta, com um olhar curioso para a pequena figurinha."
 wanderer_lifestyle_events.20.desc.outro: "\n\nEnquanto relembro, sinto uma onda de nostalgia. Talvez... Talvez não fosse tão ruim se eu partisse para visitar [reminiscing_location.GetNameNoTooltip] mais uma vez."
 wanderer_lifestyle_events.20.a: "Deixe-me te contar sobre os [SCOPE.Custom('mythical_map_creatures')] de [reminiscing_location.GetNameNoTooltip]!"
 wanderer_lifestyle_events.20.b: "Um dia, eu verei [reminiscing_location.GetNameNoTooltip] novamente..."
 wanderer_lifestyle_events.20.b.child: "Isso é de [reminiscing_location.GetNameNoTooltip], talvez eu possa te levar lá um dia."
 wanderer_lifestyle_events.20.a.win: "[listening_child.GetFirstNameNoTooltip] est? fascinad[listening_child.Custom('ES_OA')] com a hist?ria"
 wanderer_lifestyle_events.20.a.lose: "[listening_child.GetFirstNameNoTooltip] não acredita muito na história, mas a aprecia mesmo assim"
 wanderer_lifestyle_events.20.b.tt: "Você pode ganhar Experiência de [wanderer_lifestyle|lE] extra ou [stress_loss|lE] se [Concept('travel', 'viajas')|E] por [reminiscing_location.GetName]"
 wanderer_lifestyle_events.25.t: "Outra Visita"
 wanderer_lifestyle_events.25.desc: "Caminho pelas mesmas ruas que percorri da última vez que estive em [province_location.GetName]. Vejo as mesmas barracas, cheiro os mesmos odores, e ouço os mesmos sons.\n\nHá um conforto em saber que algumas coisas não mudaram."
 wanderer_lifestyle_events.25.a: "Isso... é exatamente o que eu esperava."
 wanderer_lifestyle_events.30.t: "Sonhos de Terras Distantes"
 wanderer_lifestyle_events.30.desc: "Ao vasculhar meus livros, encontro um diário de viagem de um mercador que viajou por [ROOT.Char.Custom('DistantLandsRegionLoc')].\n\n#emp «Mientras recorremos [ROOT.Char.Custom('DistantLandsTerrainTypeLoc')], de repente vislumbro [ROOT.Char.Custom('DistantLandsGroupTypeLoc')] [ROOT.Char.Custom('DistantLandsPluralTypeLoc')] [ROOT.Char.Custom('DistantLandsActivityTypeLoc')].#!"
 wanderer_lifestyle_events.30.desc.singular: "#emp Tinha [ROOT.Char.Custom('DistantLandsDescriptionTypeLoc')]. Eu simplesmente observei por um minuto, era algo totalmente diferente de tudo o que já vi antes. Só mais tarde, descobri seu nome.#!"
 wanderer_lifestyle_events.30.desc.plural: "#emp Eles tinham [ROOT.Char.Custom('DistantLandsDescriptionTypeLoc')]. Eu simplesmente observei por um minuto, eram algo totalmente diferente de tudo o que já vi antes. Só mais tarde, descobri seus nomes.#!"
 wanderer_lifestyle_events.30.a.singular: "Um dia, verei com meus próprios olhos."
 wanderer_lifestyle_events.30.a.plural: "Um dia, serei testemunha deles pessoalmente."
 wanderer_lifestyle_events.30.a.europe: "Você pode ganhar experiência de [wanderer_lifestyle|lE] ou [stress_loss|lE] extra se [Concept('travel', 'viajas')|E] por [GetGeographicalRegion('world_europe').GetName]"
 wanderer_lifestyle_events.30.a.africa: "Você pode ganhar experiência de [wanderer_lifestyle|lE] ou [stress_loss|lE] extra se [Concept('travel', 'viajas')|E] por [GetGeographicalRegion('world_africa').GetName]"
 wanderer_lifestyle_events.30.a.asia: "Você pode ganhar experiência de [wanderer_lifestyle|lE] ou [stress_loss|lE] extra se [Concept('travel', 'viajas')|E] por [GetGeographicalRegion('world_middle_east').GetName]"
 wanderer_lifestyle_events.30.a.india: "Você pode ganhar experiência de [wanderer_lifestyle|lE] ou [stress_loss|lE] extra se [Concept('travel', 'viajas')|E] por [GetGeographicalRegion('world_india').GetName]"
 wanderer_lifestyle_events.30.a.tibet: "Você pode ganhar experiência de [wanderer_lifestyle|lE] ou [stress_loss|lE] extra se [Concept('travel', 'viajas')|E] por [GetGeographicalRegion('world_tibet').GetName]"
 wanderer_lifestyle_events.30.a.steppe: "Você pode ganhar experiência de [wanderer_lifestyle|lE] ou [stress_loss|lE] extra se [Concept('travel', 'viajas')|E] por [GetGeographicalRegion('world_steppe').GetName]"
 wanderer_lifestyle_events.35.t: "O Sonho é Real"
 wanderer_lifestyle_events.35.desc.singular: "Enquanto viajamos pelo [province_location.Custom('HoldingNoHoldingTerrainRoaming')], de repente vejo um animal [ROOT.Char.Custom('DistantLandsActivityTypeLoc')]. A princípio, me pergunto que tipo de animal é este, mas então me lembro de uma antiga descrição que li há anos — deve ser o [ROOT.Char.Custom('DistantLandsPluralTypeLoc')]!\n\n[ROOT.Char.Custom('DistantLandsDescriptionTypeLoc')|U], é quase exatamente como o diário de viagem dizia,"
 wanderer_lifestyle_events.35.desc.singular.adorable: "e ainda é muito mais adorável do que eu poderia imaginar. Há algo nele que me atrai."
 wanderer_lifestyle_events.35.desc.singular.neutral: "e ainda é um pouco diferente do que eu esperava. Mas não de uma maneira ruim."
 wanderer_lifestyle_events.35.desc.singular.taken_aback: "e, no entanto, fico um pouco desconcertado com a aparência dele… Ainda assim, estou extasiad[ROOT.Char.Custom('ES_OA')] por finalmente ter localizado este animal!"
 wanderer_lifestyle_events.35.desc.plural: "Enquanto percorremos o/a [province_location.Custom('HoldingNoHoldingTerrainRoaming')], de repente vejo animais [ROOT.Char.Custom('DistantLandsActivityTypeLoc')]. No começo, me pergunto que tipo de feras são essas, mas então me lembro de uma antiga descrição que li há anos — devem ser [ROOT.Char.Custom('DistantLandsPluralTypeLoc')]!\n\n[ROOT.Char.Custom('DistantLandsDescriptionTypeLoc')|U] são quase exatamente como o diário de viagem dizia que seriam,"
 wanderer_lifestyle_events.35.desc.plural.adorable: "e ainda são muito mais adoráveis do que eu poderia imaginar. Há algo neles que me atrai."
 wanderer_lifestyle_events.35.desc.plural.neutral: "$wanderer_lifestyle_events.35.desc.singular.neutral$"
 wanderer_lifestyle_events.35.desc.plural.taken_aback: "e, no entanto, fico um pouco surpreso com a aparência deles… Ainda assim, sinto-me extasiad[ROOT.Char.Custom('ES_OA')] por finalmente ter localizado esses animais!"
 wanderer_lifestyle_events.35.a: "É MEU!"
 wanderer_lifestyle_events.35.a.win: "Consegues capturar um exemplar de [ROOT.Char.Custom('DistantLandsLoc')]"
 wanderer_lifestyle_events.35.a.lose: "Você faz papel de tolo"
 wanderer_lifestyle_events.35.b.singular: "Finalmente ver um é o suficiente para mim."
 wanderer_lifestyle_events.35.b.plural: "Finalmente vê-los é o suficiente para mim."
 wanderer_lifestyle_events.40.t: "Erro no Mercado"
 wanderer_lifestyle_events.40.desc: "Minha jornada por [ROOT.Char.GetLocationDesc|l] tem corrido bem, mas tempos difíceis se aproximam, pois nossos estoques de comida estão quase esgotados! O cheiro de uma refeição recém-preparada de [ROOT.Char.Custom('GetExpensiveMeal')] me atrai, e, seguindo-o, chego a uma barraca peculiar. Há uma variedade de [ROOT.Char.Custom('GetLocalStreetFoodPlural')] e cortes de [ROOT.Char.Custom('GetRegionalFish')] em exposição, com refeições sendo servidas com… doce [ROOT.Char.Custom('FavoriteTreat')]?\n\nAlém disso, o preço é uma pechincha! [provisions_merchant.Custom('ES_ElLa')|U] mercador resmunga algo incompreensível para mim e faz gestos para que eu lhe dê mais dinheiro do que os locais, e embora eu ainda economize algumas moedas, deveria contestar. Mas mal conheço qualquer coisa de [provisions_merchant.GetCulture.GetLanguage.GetNameNoTooltip]…"
 wanderer_lifestyle_events.40.fold: "Já que estamos nisso, melhor dar o que está pedindo, só para acabar logo com isso."
 wanderer_lifestyle_events.40.barter: "Tenho meus próprios planos, mesmo sem entender essa língua esquisita."
 wanderer_lifestyle_events.40.language: "Talvez o idioma [provisions_merchant.GetCulture.GetLanguage.GetNameNoTooltip] não me seja totalmente estranho..."
 wanderer_lifestyle_events.40.meh: "Pensando bem, temos comida em casa."
 wanderer_lifestyle_events.40.language_tt: "Você tenta se comunicar com [provisions_merchant.GetName] em sua língua nativa"
 wanderer_lifestyle_events.40.language_tt.success: "Você realmente consegue se comunicar com [provisions_merchant.GetSheHe], e recebe o preço #EMP local#!"
 wanderer_lifestyle_events.40.language_learned: "Sua curiosidade linguística rende frutos"
 wanderer_lifestyle_events.40.language_nothing: "Você não aprende o idioma, mas ainda assim consegue o preço local"
 wanderer_lifestyle_events.40.language_tt.fail: "A situação fica ainda mais confusa e você acaba pagando um pouco a mais"
 wanderer_lifestyle_events.40.barter_tt: "Você tenta #EMP convencer#! [provisions_merchant.GetName] a te dar o desconto local"
 wanderer_lifestyle_events.40.barter_tt.success: "Seus esforços [provisions_merchant.Custom('ES_LoLa')] impressionam e lhe oferece o preço menor"
 wanderer_exotic_animal_modifier: "Animal Exótico"
 wanderer_exotic_animal_modifier_desc: "Nada impressiona tanto quanto um animal exótico que ninguém jamais viu antes!"
 wanderer_lifestyle_events.40.success_title: "Você barganha com sucesso com [provisions_merchant.GetSheHe]"
 wanderer_lifestyle_events.40.fail_title: "[provisions_merchant.GetFirstNameNoTooltip] não fica impressionad"
