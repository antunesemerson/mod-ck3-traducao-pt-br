l_spanish:
 mapmaking.0001.t: "Itinerários e Mapas"
 mapmaking.0001.desc: "Chegou o momento de documentar o que aprendi durante minhas viagens, para que outros possam aprender com a minha experiência. Um itinerário detalhado apoiado por mapas e gráficos me permitirá espalhar meus conhecimentos arduamente adquiridos.\n\nA primeira decisão que devo tomar é qual jornada quero utilizar neste projeto."
 mapmaking.0001.a: "O domínio do [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]"
 mapmaking.0001.a.tt: "Este projeto será baseado na sua visita [visited_own_county.GetName] e outras possessões em seu domínio\nIsso resultará em um artefato mais forte se você tiver visitado várias de suas possessões [domain|E]"
 mapmaking.0001.b: "As terras de [visited_own_vassal_title.GetNameNoTooltip]"
 mapmaking.0001.b.tt: "Este projeto será baseado na sua visita a [visited_own_vassal.GetName] e às capitais de outros vassalos.\nIsso resultará em um artefato mais poderoso se você tiver visitado várias baronias [Concept('capital', 'capitales')|E] de [powerful_vassals|lE]"
 mapmaking.0001.c: "A Rota para [poi_map_target.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]" #[location.Custom('GetSpecialBuildingPrefix')]
 mapmaking.0001.c.tt: "Este projeto será baseado em sua visita a [poi_map_target.GetName] e seu [point_of_interest|lE].\nIsso resultará em um artefato mais poderoso se você tiver mais experiência da característica [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )|l]"
 mapmaking.0001.d: "Um mapa do [foreign_kingdom_map_target.GetNameNoTooltip]"
 mapmaking.0001.d.tt: "Este projeto se baseará em sua visita a [foreign_capital_map_target.GetName], capital de [foreign_capital_map_target.GetTitle.GetHolder.GetPrimaryTitle.GetName].\nIsso resultará em um artefato mais poderoso se você tiver mais experiência da característica [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )|l]"
 mapmaking.0001.z: "[visited_own_liege.GetNameNoTooltip]"
 mapmaking.0010.t: "Mapeando o Domínio"
 mapmaking.0010.desc: "Todo bom suserano deve conhecer seu domínio. [ROOT.Char.GetFirstNameNoTooltip] saberá a quem perguntar para que as coisas sejam feitas, onde há terra desocupada, o que precisa de manutenção e quais desafios precisam ser superados.\n\nEnquanto me sento para desenhar um mapa que descreva minhas terras, tenho de refletir sobre que informação considero vital para o leitor do mapa que estou traçando. O que aprendi em minhas viagens?"
 mapmaking.0010.a: "O foco deve ser nos recursos não explorados"
 mapmaking.0010.a.tt: "Isso resultará em um itinerário com benefícios relacionados à economia do [domain|lE]\nEsta opção se beneficia de o personagem ter uma [stewardship|lE] alta"
 mapmaking.0010.b: "A defesa do reino é vital"
 mapmaking.0010.b.tt: "Isso resultará em um itinerário com benefícios relacionados à defesa do [domain|lE]\nEsta opção se beneficia de o personagem ter uma [Concept('martial', 'marcialidad')|E] alta"
 mapmaking.0020.t: "Terras de [visited_own_vassal_title.GetNameNoTooltip]"
 mapmaking.0020.desc: "Ao visitar as terras dos meus vassalos, aprendi sobre como eles tratam seus súditos, o que falta e o que possuem em abundância. Talvez até tenha uma boa ideia de onde encontrar seus segredos e riquezas.\n\nTudo isso não pode ser facilmente descrito em um mapa, no entanto, precisarei decidir que tipo de mapa estou criando."
 mapmaking.0020.a: "Eu mostrarei como controlá-los"
 mapmaking.0020.a.tt: "Isso resultará em um itinerário com benefícios relacionados a [dread|lE].\nEsta opção se beneficia de ter um alto nível de experiência experiente no traço [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )|l]"
 mapmaking.0020.b: "Este mapa me permitirá ajudá-los"
 mapmaking.0020.b.tt: "Isto produzirá um itinerário com benefícios relacionados às boas relações com os [vassals|lE] e [courtiers|lE].\nEsta opção se beneficia de o personagem ter uma [diplomacy|lE] alta"
 mapmaking.0020.c: "Meu mapa revelará seus segredos"
 mapmaking.0020.c.tt: "Isso resultará em um itinerário com benefícios relacionados a [schemes|lE].\nEsta opção se beneficia de o personagem ter uma [intrigue|lE] alta"
 mapmaking.0030.t: "Território Desconhecido"
 mapmaking.0030.desc: "[poi_map_target.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] é talvez um dos lugares que mais me impressionaram em minhas viagens. A jornada até [poi_map_target.GetHolding.GetNameNoTooltip] foi quase igualmente memorável, e provavelmente teria sido muito mais rápida se eu tivesse estado melhor preparado.\n\nPosso transmitir apenas tanta informação, no entanto, e enquanto me sento para descrever o que aconteceu, precisarei decidir qual será o meu foco." #[location.Custom('GetSpecialBuildingPrefix')]
 mapmaking.0030.a: "Nada é mais importante do que uma passagem rápida e segura."
 mapmaking.0030.a.tt: "Focar na viagem para [poi_map_target.GetHolding.GetNameNoTooltip] resultará em um itinerário que beneficie a Segurança e Velocidade da [Concept('travel', 'viagem')|E].\nEsta opção se beneficia de ter uma alta Experiência de Veterano no traço [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )|l]"
 mapmaking.0030.b: "Desenharei um gráfico de [poi_map_target.GetHolding.GetNameNoTooltip] em si."
 mapmaking.0030.b.tt: "Focar nesse local, [poi_map_target.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], resultará em um itinerário com benefícios relacionados ao tipo de [point_of_interest|lE].\nEsta opção se beneficia de ter alta Experiência de Viajante no atributo [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )|l]"
 mapmaking.0040.t: "O [foreign_kingdom_map_target.GetNameNoTooltip]"
 mapmaking.0040.desc: "Minha jornada até [foreign_kingdom_map_target.GetNameNoTier] me ensinou muitas coisas, não apenas sobre os súditos de [foreign_kingdom_map_target.GetAdjectiveNoTooltip], mas também sobre como suas terras diferem das nossas. O povo [foreign_kingdom_map_target.GetAdjectiveNoTooltip] tem seus próprios costumes e ganha a vida de formas diferentes das nossas. De muitas maneiras, a terra em si também foi alienígena para mim.\n\nAo começar a descrever o que aprendi, terei que decidir onde deve estar meu foco e o que quero que outros viajantes saibam."
 mapmaking.0040.a: "A corte em [background_terrain_scope.GetTitle.GetNameNoTierNoTooltip] foi realmente inesquecível"
 mapmaking.0040.a.tt: "Focar na corte resultará em um itinerário com benefícios relacionados a [prestige|lE].\nEsta opção se beneficia de ter um alto nível de experiência como Viajante no traço [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )|l]"
 mapmaking.0040.b: "Focarei nas pessoas e seus costumes"
 mapmaking.0040.b.tt: "Focar nas pessoas resultará em um itinerário com benefícios relacionados à [diplomacy|lE].\nEsta opção se beneficia de ter uma Experiência Vezada alta no atributo [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )|l]"
 mapmaking.0040.c: "Todos devem saber sobre os [foreign_kingdom_map_target.GetAdjectiveNoTooltip] [SCOPE.Custom('mythical_map_creatures')]!"
 mapmaking.0040.c.tt: "Focar em criaturas míticas resultará em um itinerário com benefícios relacionados à [dynasty_prestige|lE]."
 mapmaking.0004.t: "O [background_terrain_scope.Custom('GetTerrainLandPlural')] de [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetNameNoTierNoTooltip]"
 mapmaking.0004.heat.t: "O Calor Escaldante de [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetNameNoTierNoTooltip]"
 mapmaking.0004.snow.t: "O/A [background_terrain_scope.Custom('GetBadWeatherDesc')] de [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetNameNoTooltip]"
 mapmaking.0004.fighting.t: "Perigos de [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetNameNoTierNoTooltip]"
 mapmaking.0004.monsoon.t: "As Chuvas de [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetNameNoTierNoTooltip]"
 mapmaking.0004.desc.intro: "Todo itinerário deve alertar o leitor sobre os perigos que o aguardam.\n\n"
 mapmaking.0004.fighting.desc: "Percorrer esta região me ensinou a estar sempre atento a emboscadas e ataques. A lei do mais forte impera em [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetNameNoTierNoTooltip], onde, ao encontrar foras da lei, barões locais ou exércitos estrangeiros, sempre tive que estar pront[ROOT.Char.Custom('ES_OA')] para me defender.\n\n"
 mapmaking.0004.snow.desc: "Nunca esquecerei os invernos de [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetNameNoTierNoTooltip], com nevascas repentinas, quedas de temperatura e um mar branco aparentemente interminável de neve pelo qual tivemos que atravessar.\n\n"
 mapmaking.0004.heat.desc: "Minha memória mais forte de [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetNameNoTierNoTooltip] é a dos raios implacáveis do sol. Enquanto atravessávamos as [background_terrain_scope.Custom('GetTerrainLandPlural')], estávamos constantemente à procura de sombra e água potável.\n\n"
 mapmaking.0004.monsoon.desc: "As fortes chuvas de [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetNameNoTierNoTooltip] sempre serão inesquecíveis para mim. Na estação das monções, até o caminho mais seguro se transformaria em um pântano enlameado.\n\n"
 mapmaking.0004.terrain_steppes.desc: "A própria estepe aberta é, de muitas maneiras, o aspecto mais marcante dessa área. Selvagem, indomada e difícil de cultivar, essa terra oferece pouco em termos de suprimentos ou água potável..."
 mapmaking.0004.terrain_deep_forests.desc: "As florestas profundas moldarão qualquer jornada por essa área. Quais rotas tomar, como procurar e caçar são memórias indispensáveis que tenho de [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetNameNoTierNoTooltip]..."
 mapmaking.0004.terrain_wetlands.desc: "Os pântanos são um aspecto inesquecível dessa área, e como encontrar o melhor caminho através da névoa e do terreno traiçoeiro são coisas que imediatamente vêm à minha mente..."
 mapmaking.0004.terrain_undulating.desc: "Viajar nesta área é estar preparado para uma caminhada árdua, já que a elevação muda a cada curva. Por outro lado, ainda me lembro das vistas grandiosas do topo..."
 mapmaking.0004.terrain_open_farmland.desc: "Estocar suprimentos nunca foi um problema para nós aqui, essa área não é de terreno perigoso. Campos bem trabalhados se estendem em todas as direções de [background_terrain_scope.GetTitle.GetNameNoTierNoTooltip]..."
 mapmaking.0004.terrain_open.desc: "Um vasto campo aberto significa que eu nunca poderia disfarçar nossa chegada nesta área, em vez disso, tivemos que estar prontos para enfrentar qualquer inimigo diretamente..."
 mapmaking.0004.terrain_desert.desc: "O deserto impôs grandes demandas a mim enquanto viajava por essa área — no vasto aberto não há como se esconder do sol ou dos inimigos."
 mapmaking.0004.terrain_jungle.desc: "A selva é lar de muitos animais e plantas, tanto benéficas quanto mortais. Conhecer um do outro e saber como acampar adequadamente são experiências indispensáveis..."
 mapmaking.0004.desc.generic_fallback: "Raramente vi uma terra tão sem graça antes ou depois. A natureza nondescritiva da terra é apenas espelhada por seu povo igualmente sem graça."
 mapmaking.0004.a: "Focar em viajar nas [background_terrain_scope.Custom('GetTerrainLandPlural')]"
 mapmaking.0004.a.tt: "Esta opção resultará em um artefato com benefícios relacionados ao [terrain|lE] [background_terrain_scope.GetTerrain.GetName|l]"
 mapmaking.0004.b: "Descreverei preparações para emboscadas"
 mapmaking.0004.b.tt: "Esta opção resultará em um artefato com benefícios relacionados à segurança em [travel|lE] e à defesa pessoal"
 mapmaking.0004.c: "Focar em como lidar com o frio"
 mapmaking.0004.c.tt: "Esta opção resultará em um artefato com benefícios relacionados ao Inverno"
 mapmaking.0004.d: "Lidar com o calor é vital"
 mapmaking.0004.d.tt: "Esta opção resultará em um artefato com benefícios relacionados à segurança em [travel|lE] em [terrain|lE] quentes"
 mapmaking.0004.e: "A monção é mais importante"
 mapmaking.0004.e.tt: "Esta opção resultará em um artefato com benefícios relacionados à segurança em [travel|lE] em [terrain|lE] úmidos"
 mapmaking.1000.t: "Jornada até o [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetDeJureLiege.GetNameNoTooltip]"
 mapmaking.1000.internal.t: "Viajando pelo [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetDeJureLiege.GetNameNoTooltip]"
 mapmaking.1000.mythical.t: "Jornada até a Terra dos [SCOPE.Custom('mythical_map_creatures')|l]"
 mapmaking.1000.desc: "Ao preencher a última página do meu manuscrito, sinto uma grande sensação de satisfação.\n\nRegistrar por escrito o que aprendi em minhas viagens é, em muitos aspectos, uma experiência nostálgica, que me permitiu reviver alguns momentos muito formativos do meu passado, ao mesmo tempo em que criei algo que pode ajudar futuros viajantes.\n\nEspero que o itinerário resultante e o mapa detalhado que o acompanha de minha rota por [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetDeJureLiege.GetNameNoTooltip] resistam ao teste do tempo."
 mapmaking.1000.a: "Essa jornada chegou ao fim"
 map_artifact_name: "Uma Jornada até [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetDeJureLiege.GetNameNoTooltip]"
 map_artifact_name_domain: "Domínio [author.Custom('ES_DelDela')] [author.GetTitledFirstNameNoTooltip|l]"
 map_artifact_name_vassal_dread: "Sobre a Subjugação dos Vassalos [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetDeJureLiege.GetAdjectiveNoTooltip]"
 map_artifact_name_vassal_opinion: "Viajando pelo Reino [background_terrain_scope.GetTitle.GetHolder.GetLiege.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 map_artifact_name_vassal_intrigue: "Itinerário Secreto do Reino [background_terrain_scope.GetTitle.GetHolder.GetLiege.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 map_artifact_name_poi: "Jornada até [poi_map_target.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]"
 map_artifact_name_mythical: "Terra dos [SCOPE.Custom('mythical_map_creatures_capitalized')|l]"
 map_artifact_beginning_western: "Este pequeno livro encadernado em couro é um itinerário com um mapa dobrado dentro. Juntos, o mapa e o livro ilustram a jornada de [author.GetFullName]"
 map_artifact_beginning_far_eastern: "Este manuscrito de folha de palma é um itinerário de uma jornada realizada por [author.GetFullName]"
 map_artifact_beginning_internal: "[newly_created_artifact.GetDesc] no domínio de [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetDeJureLiege.GetNameNoTier]. Ele é acompanhado por um mapa detalhado, desenhado também por sua própria mão.\nÉ a história de uma jornada por"
 map_artifact_beginning_external: "[newly_created_artifact.GetDesc] às terras de [background_terrain_scope.GetTitle.GetDeJureLiege.GetDeJureLiege.GetDeJureLiege.GetNameNoTier]. É acompanhado por um mapa detalhado também desenhado pela própria mão.\nÉ a história de uma jornada por"
 map_artifact_danger_type_heat: "[newly_created_artifact.GetDesc] calor escaldante, lidando com uma constante falta de água,"
 map_artifact_danger_type_monsoons: "[newly_created_artifact.GetDesc] monções torrenciais,"
 map_artifact_danger_type_snowstorms: "[newly_created_artifact.GetDesc] frio extremo, tempestades de neve,"
 map_artifact_danger_type_fighting: "[newly_created_artifact.GetDesc] terras sem lei, onde o conflito é quase inevitável,"
 map_artifact_danger_type_undulating: "[newly_created_artifact.GetDesc] colinas onduladas, passos montanhosos perigosos,"
 map_artifact_danger_type_wetlands: "[newly_created_artifact.GetDesc] pântanos traiçoeiros, repletos de doenças,"
 map_artifact_danger_type_open: "[newly_created_artifact.GetDesc] extensas planícies abertas, onde não há abrigo,"
 map_artifact_danger_type_desert: "[newly_created_artifact.GetDesc] desertos implacáveis, sem água nem abrigo,"
 map_artifact_danger_type_jungle: "[newly_created_artifact.GetDesc] selvas densas, com animais perigosos em seu interior,"
 map_artifact_danger_type_forests: "[newly_created_artifact.GetDesc] florestas densas, cheias de perigos ocultos,"
 map_artifact_danger_type_steppes: "[newly_created_artifact.GetDesc] as estepes abertas, longe de terras habitadas,"
 map_artifact_danger_type_farmlands: "[newly_created_artifact.GetDesc] terras agrícolas férteis, capazes de sustentar qualquer séquito,"
 map_artifact_danger_type_end: "[newly_created_artifact.GetDesc] e a opinião de [author.GetFirstNameNoTooltip] sobre como lidar com tais assuntos.\n\n"
 map_artifact_domain_purpose_growth: "[newly_created_artifact.GetDesc]A viagem descrita foi realizada para inspecionar o domínio [Select_CString(author.IsFemale, 'da autora', 'do autor' )], e o itinerário detalha o que [author.Custom('ES_ElLa')] [author.GetTitledFirstName|l] aprendeu sobre seu domínio e sobre como extrair melhor recursos e riquezas de suas terras."
 map_artifact_domain_purpose_defensive: "[newly_created_artifact.GetDesc]A viagem descrita foi realizada para inspecionar o domínio [Select_CString(author.IsFemale, 'da autora', 'do autor' )]. O itinerário e o mapa descrevem como [author.Custom('ES_ElLa')] [author.GetTitledFirstName|l] defenderia suas terras contra exércitos hostis. O mapa mostra onde erguer defesas, como apoiar melhor seus homens de armas e o que um atacante poderia fazer."
 map_artifact_vassal_purpose_dread: "[newly_created_artifact.GetDesc]O itinerário descreve uma viagem feita para inspecionar as terras dos vassalos [Select_CString(author.IsFemale, 'da autora', 'do autor' )].\nNo mapa, estão assinalados os que são considerados pontos fortes, junto com instruções sobre a melhor forma de quebrar qualquer resistência. Há notas sobre as personalidades dos próprios vassalos e sobre como intimidá-los da melhor maneira para que se submetam."
 map_artifact_vassal_purpose_opinion: "[newly_created_artifact.GetDesc]O texto descreve uma viagem realizada para inspecionar as terras dos vassalos [Select_CString(author.IsFemale, 'da autora', 'do autor' )], com notas sobre os bens valiosos e a personalidade de cada vassalo. Abrange uma série de sugestões sobre como melhor apoiar e bajular esses proprietários de terras para manter seu apoio."
 map_artifact_vassal_purpose_intrigue: "[newly_created_artifact.GetDesc]O texto descreve uma viagem realizada para inspecionar as terras dos vassalos [Select_CString(author.IsFemale, 'da autora', 'do autor' )], com notas abundantes sobre entradas dos castelos, passagens secretas e onde os diferentes vassalos [author.Custom('ES_DelDela')] [author.GetTitledFirstName|l] guardam suas posses mais valiosas."
 map_artifact_poi_travel: "[newly_created_artifact.GetDesc]O objetivo da jornada parece ter sido uma visita a [poi_map_target.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]. O mapa detalha a rota que foi seguida, bem como a melhor forma de evitar os erros que [author.Custom('ES_ElLa')|l] [author.GetTitledFirstName|l] acreditou ter cometido em seu trajeto."
 map_artifact_poi_purpose: "[newly_created_artifact.GetDesc]O objetivo da viagem parece ter sido uma visita a [poi_map_target.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]. Há um mapa especial que cobre apenas [poi_map_target.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] e seus arredores, e o itinerário descreve o que você pode esperar encontrar lá."
 map_artifact_foreign_purpose_court: "[newly_created_artifact.GetDesc]A viagem descrita culmina com uma visita à corte [foreign_kingdom_map_target.GetAdjectiveNoTooltip] em [background_terrain_scope.GetTitle.GetNameNoTierNoTooltip] e [Select_CString(author.IsFemale, 'a autora', 'o autor' )] dedica um bom tempo a falar sobre a vida da alta sociedade no reino."
 map_artifact_foreign_purpose_people: "[newly_created_artifact.GetDesc]O propósito da viagem descrita foi uma visita à corte do reino [foreign_kingdom_map_target.GetAdjectiveNoTooltip], mas o itinerário mal menciona a capital. Em vez disso, ele entra em grande detalhe sobre o povo daquela terra, seu comportamento e costumes estranhos."
 map_artifact_foreign_purpose_mythical: "[newly_created_artifact.GetDesc]A viagem descrita culmina com uma visita à corte do reino [foreign_kingdom_map_target.GetAdjectiveNoTooltip], mas o foco principal é uma descrição muito vívida de uma terra assolada por [SCOPE.Custom('mythical_map_creatures')|l] e de como o viajante pode melhor se preparar para lidar com eles."
