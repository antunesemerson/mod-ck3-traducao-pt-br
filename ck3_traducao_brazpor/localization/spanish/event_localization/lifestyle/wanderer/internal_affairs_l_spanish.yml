l_spanish:
 internal_affairs.10.t: "Uma Revolta por Vir"
 internal_affairs.10.desc: "\"E esta ? a situa??o atual em [barony_title.GetName], [ROOT.Char.Custom('FormOfAddressForLiege')]\", informa-me [provider_character.GetFirstName]. Parece que houve pequenos motins nas ruas ultimamente, por conta da indigna??o com "
 internal_affairs.10.desc.control: "a banditismo desenfreado colocando os cidadãos em perigo."
 internal_affairs.10.desc.opinion.other: "o ódio que sentem por seu senhor e soberano, [county_holder.Custom('ES_ElLa')] [county_holder.GetTitledFirstName|l]."
 internal_affairs.10.desc.opinion.me: "meu governo na área."
 internal.affairs.10.desc.outro: "\n\n[Select_CString( barony_holder.IsFemale, 'la única', 'el único' )|U] que conseguiu evitar que a situação descambe para a violência foi [Select_CString( barony_holder.IsFemale, 'cierta', 'cierto' )] [barony_holder.GetTitledFirstName|l], que, ao que parece, é bastante popular entre os moradores locais. Além de manter os cidadãos sob controle, fez um pedido para realizar um festival na região e acalmar ainda mais os ânimos."
 internal_affairs.10.a: "Pois deixemos que [barony_holder.Custom('ES_ElLa')] tal [barony_holder.GetTitledFirstNameNoTooltip|l] fique no comando…"
 internal_affairs.10.b: "… E [county_holder.GetFirstNameNoTooltip] até será compensad[county_holder.Custom('ES_OA')] por isso!"
 internal_affairs.10.c: "[barony_holder.GetFirstNameNoTooltip] terá seu festival."
 internal_affairs.10.d: "Não é a função de [county_holder.GetFirstNameNoTooltip] cuidar disto?"
 internal_affairs_local_uprising_appeasement_modifier: "Locais Apaziguados"
 internal_affairs_local_uprising_appeasement_modifier_desc: "Os locais do condado foram apaziguados após uma mudança de governança na área."
 internal_affairs_local_uprising_festival_modifier: "Festival Rural"
 internal_affairs_local_uprising_festival_modifier_desc: "Um pequeno festival rural é realizado anualmente para apaziguar os locais."
 internal_affairs.20.t: "[county_holder.GetLadyLord] indign[county_holder.Custom('ES_OA')]"
 internal_affairs.20.desc: "Pela terceira vez só esta semana, recebo outro mensageiro me contando sobre o estado deplorável de [county_title.GetNameNoTier]."
 internal_affairs.20.desc.both: "Crime desenfreado, cidadãos mortos nas ruas e uma sensação geral de medo e infelicidade."
 internal_affairs.20.desc.control: "Crime desenfreado, estradas inseguras e cidadãos com medo de sair de casa após o anoitecer."
 internal_affairs.20.desc.opinion: "Um descontentamento profundo com a forma como o condado está sendo governado e protestos regulares nas ruas."
 internal_affairs.20.desc.outro: "\n\nJá enviei um mensageiro [county_holder.Custom('ES_AlAla')] [county_holder.GetTitledFirstName|l] e, mesmo assim, parece que os problemas não têm fim. São estas as ações de alguém que mereça ser um[county_holder.Custom('ES_OA')] de #emp mis#!vassal[county_holder.Custom('ES_OA')]s?"
 internal_affairs.20.dread: "Se vão espremer eles, então façam direito. Amador[county_holder.Custom('ES_OA')]."
 internal_affairs.20.a: "Inaceitável."
 internal_affairs.20.a.tt: "Você pode [Concept('revoke', 'revocar')|E] um [title|lE] [title_i] legitimamente [county_holder.Custom('ES_AlAla')] [county_holder.GetTitledFirstName|l]"
 internal_affairs.20.b: "Vou deixar passar, desta vez."
 opinion_unfitting_ruler_opinion: "Governante Inadequado"
 MODIFIER_DEFINITION_UNFITTING_RULER_DESC: "\nEste modificador é aumentado quanto maior for o [dread|lE] do [holder|lE]"
 inspection_unfitting_ruler_modifier: "Condado Extorquido"
 inspection_unfitting_ruler_modifier_desc: "Este condado está sendo espremido, com impostos e pessoas saindo dele diariamente."
 inspection_unfitting_ruler_desc: "\t #weak Aumento para cada #bold Temor#! que o [holder|lE] possui#!"
 internal_affairs.30.t: "Fechando os Olhos"
 internal_affairs.30.desc: "\"Vejais, [ROOT.Char.Custom('FormOfAddressForLiege')], algumas das expectativas locais impostas sobre nós são #emp bastante#! duras para os negócios…\", vi-me abordado por [merchant_character.GetFirstName], representante das [SCOPE.Custom('LocalGuildsLoc')|l] de [guild_province.GetName]. Faz algum tempo que ele fala sobre os problemas que seu grêmio teve de enfrentar.\n\n\"Imaginei que talvez nós dois pudéssemos resolver essas coisas um pouco mais entre nós\". Ele coloca uma pequena bolsa sobre a mesa, à minha frente, e me lança um olhar de entendimento."
 internal_affairs.30.a: "Ah, posso fazer mais do que apenas fechar os olhos..."
 internal_affairs.30.b: "Bem, só desta vez."
 internal_affairs.30.c: "Saia daqui antes que eu mande matá-lo, seu parasita!"
 internal_affairs.40.t: "Fios Soltos"
 internal_affairs.40.follower_intro: "[secret_giver.GetFirstName], que atua como mensageir[secret_giver.Custom('ES_OA')], me traz notícias da região e me mantém informado enquanto cuido de outras coisas. Embora quase tudo o que ele me conta não seja nada de extraordinário, há um tom de preocupação em sua voz sempre que o nome de [secret_haver.GetName].\n\nPor fim,"
 internal_affairs.40.courtier_intro: "Enquanto caminho pelo acampamento, uma voz desconhecida chega aos meus ouvidos, conversando com um dos meus companheiros próximos. Eu paro e escuto. A troca parece monótona a princípio, mas então o nome de [secret_haver.GetName] é de repente mencionado.\n\n"
 internal_affairs.40.desc: "[secret_giver.GetFirstNameNoTooltip] aprofunda-se em temas mais delicados envolvendo [secret_haver.GetFirstNameNoTooltip] e revela assuntos que muito bem poderiam manchar sua reputação…"
 internal_affairs.40.a: "Talvez você possa ser útil para mim, [secret_giver.GetFirstName]."
 internal_affairs.40.blackmail: "Eu definitivamente posso fazer isso trabalhar a meu favor."
 internal_affairs.40.expose: "Todos deveriam saber o que [secret_haver.GetFirstName] está aprontando!"
 internal_affairs.40.move_zealous: "[GetPlayer.GetFaith.HighGodName] me chama para longe daqui..."
 internal_affairs.40.move: "Pode ser hora de eu partir de [GetPlayer.GetDomicile.GetLocation.GetName]..."
 internal_affairs.50.t: "Os [target_faith.GetAdherentNamePluralNoTooltip] protestam"
 internal_affairs.50.desc: "Os camponeses de [tensions_county.GetNameNoTier] não parecem ter depositado sua confiança, nem seu apreço em [tensions_county.GetHolder.GetName]. Não há como conjecturar a causa de tal inquietação, pois os monumentos de [target_faith.GetAdherentNamePluralNoTooltip] estão sendo profanados, e aumentam as brigas envolvendo [target_faith.GetAdherentNamePluralNoTooltip] e [opposing_faith.GetAdherentNamePluralNoTooltip] por igual."
 internal_affairs.50.desc.holder_faith: "Embora [tensions_county.GetHolder.GetNameNoTooltip] possa se alinhar com os [target_faith.GetAdherentNamePluralNoTooltip], sua fé não pode, por si só, eliminar a presença de um/a [target_liege.GetTitleTierName|l] de credo [opposing_faith.GetAdherentNameNoTooltip]."
 internal_affairs.50.desc.root_faith: "\n\nPergunto-me se devo ficar atento à situação dos meus irmãos [GetPlayer.GetFaith.GetAdherentNamePluralNoTooltip]; ao menos para garantir que nossa adoração a [GetPlayer.GetFaith.HighGodName]."
 internal_affairs.50.desc.neutral_faith: "\n\nEmbora eu não pratique o [opposing_faith.GetNameNoTooltip|l] nem o [target_faith.GetNameNoTooltip|l], vale a pena ver o que pode ser feito aqui."
 internal_affairs.50.desc_end: "Na melhor das hipóteses, eu poderia trabalhar para ajudar a resolver essas tensões, antes que elas comecem a colocar minha segurança em risco."
 internal_affairs.50.tolerance: "Deixe os [target_faith.GetAdherentNamePluralNoTooltip] terem suas crenças."
 internal_affairs.50.conversion: "[tensions_county.GetNameNoTierNoTooltip] deveria ser completamente [opposing_faith.GetAdherentNameNoTooltip]!"
 internal_affairs.50.neutral_cynic: "Por que as pessoas deixam a religião ter tanto poder sobre suas vidas?"
 internal_affairs.50.neutral: "Por outro lado, isso não é minha preocupação..."
 internal_affairs.tolerance_desc: "Você tenta ajudar os camponeses a afirmar seu direito de praticar [target_faith.GetNameNoTooltip|l]."
 internal_affairs.conversion_desc: "Você tenta converter os camponeses de [tensions_county.GetNameNoTierNoTooltip] para [opposing_faith.GetNameNoTooltip|l]."
 local_zealots_appeased_tt: "Os [target_faith.GetAdherentNamePluralNoTooltip] locais estão apaziguados"
 religious_tension_continues_tt: "A agitação de [target_faith.GetAdherentNameNoTooltip] continua"
 religious_county_converted_tt: "O [tensions_county.GetNameNoTierNoTooltip] foi convertido para [opposing_faith.GetNameNoTooltip|l]"
 internal_affairs.60.t: "O Tesouro do Bandido"
 internal_affairs.60.desc: "Enquanto percorria os becos de [bandit_location.GetNameNoTier], percebo pelo canto do olho uma figura se esgueirando. Ao virar uma esquina, vejo uma turma de homens de aparência rústica enchendo uma carroça com diversos saques, movendo-se depressa como se [GetPlayer.GetFaith.DevilName] em pessoa estivesse em seus calcanhares.\n\nA maioria dos homens deixa a área para buscar mais saque e [bandit_character.GetFirstName] fica sozinho para vigiar. Percebo que uma sacola na carroça traz o selo de [bandit_holder.GetName], mas eu preciso do conteúdo para mim…"
 internal_affairs.60.force: "O que [bandit_character.GetName] vai fazer?"
 internal_affairs.60.force_tt: "Me deparo com [Select_CString( bandit_character.IsFemale, 'la bandida solitaria', 'el bandido solitario' )] e tento ficar com o prêmio para mim"
 internal_affairs.60.force_tt_succ: "Eu roubo com sucesso o saque dos bandidos."
 internal_affairs.60.force_tt_fail: "[bandit_character.GetNameNoTooltip] me afasta."
 internal_affairs.60.snitch: "[bandit_holder.GetFirstName] vai querer ouvir sobre isso."
 internal_affairs.60.snitch_tt: "Eu informo [bandit_holder.GetNameNoTooltip] sobre as atividades dos bandidos, e [bandit_holder.GetSheHe] me recompensa com uma parte dos bens roubados."
 internal_affairs.60.sus: "Talvez [bandit_character.GetNameNoTooltip] possa me incluir em algum de seus trabalhos…"
 internal_affairs.60.sus_tt: "Cria #V 3#! [criminal_task_contracts|lE] no mapa."
 internal_affairs.60.neutral: "Isso não é problema meu."
 MODIFIER_DEFINITION_LOCAL_CORRUPTION_DESC: "\nEste modificador aumenta quanto menor for o [Concept('county_control', 'control')|E] sobre o [county|lE]"
 internal_affairs_local_corruption_desc: "\t #weak Aumento para cada ponto de #bold Controle do Condado#! abaixo de 100#!"
 internal_affairs_local_corruption_modifier: "Corrupção Santificada"
 internal_affairs_local_corruption_modifier_desc: "Uma guilda de mercadores locais obteve quase poder ilimitado nos negócios locais, corroendo lentamente a burocracia e hierarquia do condado."
 internal_affairs_camp_momentum_modifier: "Impulso de Acampamento"
 internal_affairs_camp_momentum_modifier_desc: "Este aventureiro foi chamado a partir em jornada, e possivelmente estabelecer acampamento em outro lugar."
 internal_affairs_county_religious_tensions_modifier: "Tensões Religiosas Aumentadas"
 internal_affairs_county_religious_tensions_modifier_desc: "Este condado está passando por tensões religiosas que foram exacerbadas pela interferência de uma entidade influente.\nProgresso Mensal de [convert_county|lE]: #N -0.2#!"
 RELIGIOUS_TENSIONS_DESC: "[GetModifier( 'internal_affairs_county_religious_tensions_modifier' ).GetNameWithTooltip]"
 RELIGIOUS_TOLERANCE_DESC: "[GetModifier( 'internal_affairs_county_religious_tolerance_modifier' ).GetNameWithTooltip]"
 internal_affairs_county_religious_tolerance_modifier: "Tolerância Religiosa"
 internal_affairs_county_religious_tolerance_modifier_desc: "As vozes da minoria religiosa neste condado foram ouvidas, e seu direito de praticar suas crenças está sendo respeitado, ao menos por enquanto.\nProgresso Mensal de [convert_county|lE]: #N -0.1#!"
 internal_affairs_character_religious_tolerance_modifier: "$internal_affairs_county_religious_tolerance_modifier$"
 internal_affairs_character_religious_tolerance_modifier_desc: "Este personagem mostrou aos outros o valor de respeitar as crenças alheias — talvez eles também possam fazer o mesmo."
