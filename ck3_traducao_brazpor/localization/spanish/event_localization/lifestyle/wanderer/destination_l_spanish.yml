l_spanish:
 destination_events.10.t: "Viajante Experiente"
 destination_events.10.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]", começa meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('provider_character'))], [provider_character.GetFirstName], ao entrar em meu gabinete. "Recentemente tratei com [Select_CString( travel_leader_character.IsFemale, 'uma chefe', 'um chefe' )] de caravanas que poderia ser interessante para vossas viagens. Viajou por terras e mares distantes e tem a experiência que estávamos buscando."\n\nTínhamos dificuldade em encontrar alguém para ficar à frente de minhas viagens, então talvez esta seja uma boa oportunidade?"
 destination_events.10.a: "Vamos contratar [Select_CString( travel_leader_character.IsFemale, 'esta', 'este' )] andarilho, então."
 destination_events.10.a.tt: "A [aptitude|E] de [travel_leader_character.GetUIName|U] é [travel_leader_character.GetCourtPositionAptitude( GetCourtPositionType( 'travel_leader_court_position' ) )|l]"
 destination_events.10.b: "Não me interessa."
 destination_events.20.t: "Preparando-se para uma Excursão"
 destination_events.20.desc: ""Como? Vocês disseram provisões extras?", respondo quando meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('provider_character'))], [provider_character.GetFirstName], me traz uma descoberta recente em um dos meus depósitos.\n\n"De fato. Não está claro por que elas não apareciam em nossos registros, mas é uma pequena bênção. Vocês têm alguma ideia do que fazer com elas?".\n\nEsses suprimentos extras seriam úteis em minha próxima viagem"
 destination_events.20.a: "Com eles, podemos ter uma jornada lenta e cuidadosa."
 destination_events.20.b: "Vamos ver se conseguimos trocá-los por alguns cavalos."
 destination_events.20.c: "Venda os suprimentos extras."
 destination_excursion_safety_modifier: "Preparado para Excursões: Segurança"
 destination_excursion_safety_modifier_desc: "#emp Desaparecerá após alcançar um [destination|lE]#!\nSuprimentos foram reservados para a próxima jornada, garantindo uma viagem segura."
 destination_excursion_speed_modifier: "Preparado para Excursões: Velocidade"
 destination_excursion_speed_modifier_desc: "#emp Desaparecerá após alcançar um [destination|lE]#!\nCavalos extras foram preparados para a próxima jornada, garantindo uma viagem rápida e eficiente."
 destination_events.30.t: "A Jornada para [journey_province.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]"
 destination_events.30.desc: "Recentemente, me deparei com um pequeno itinerário de viagem que descrevia a jornada de um mercador local até a cidade de [journey_province.GetName]. Narra com grande detalhe como visitou [journey_province.GetHolding.GetSpecialBuildingType.GetName], e fala de todos os locais que se deve conhecer na cidade.\n\nTalvez eu deva ir para lá da próxima vez que estiver de volta na estrada..."
 destination_events.30.a: "Parece um lugar memorável!"
 destination_events.30.a.tt: "Você pode ganhar Experiência extra em [wanderer_lifestyle|E] se visitar [journey_province.GetName] em uma [GetActivityType('activity_journey').GetName|l]"
 destination_events.30.toast.title: "A Jornada para [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip]"
 destination_events.40.t: "O Idioma [poi_province.GetCulture.GetLanguage.GetNameNoTooltip]"
 destination_events.40.desc: "Por algum motivo, tenho me pegado recordando minha viagem a [poi_province.GetName] e, em especial, a língua [poi_province.GetCulture.GetLanguage.GetName] que ouvi tão frequentemente enquanto estive lá. Havia algo #emp [poi_province.Custom('DestinationInspiredLanguageDescriptor')]#! nisso que simplesmente não consigo esquecer.\n\nComo se fosse obra do destino, [Select_CString( teacher_character.IsFemale, 'uma erudita', 'um erudito' )] de cultura [teacher_character.GetCulture.GetName] e chamado [teacher_character.GetFirstName] veio visitar minha corte. Eu poderia pedir seus serviços e talvez ela me ensinasse [poi_province.GetCulture.GetLanguage.GetNameNoTooltip]."
 destination_events.40.a: "Isso tornará a próxima jornada muito mais agradável!"
 destination_events.40.b: "Aprender outro idioma parece muito trabalho..."
 destination_inspired_by_language: "Inspirado pelo Idioma"
 destination_inspired_by_language_desc: "Este personagem foi inspirado a aprender um novo idioma por uma jornada a terras estrangeiras."
