l_spanish:
 mystic_lifestyle_communion_header: "Comunhão mística:"
 mystic_lifestyle.1001.t: "$mystic_lifestyle_communion_header$Desaprovação"
 mystic_lifestyle.1001.desc: "Os preparativos para minha comunhão mística iam bem encaminhados quando [SCOPE.sC('priest').Custom2('MyCharacterIntroduction', ROOT.Char )] se aproxima de mim.

"Claro. No que eu estava pensando?"
 mystic_lifestyle.1001.a: "Dizer a ele/ela o que você estava pensando em [ROOT.Char.GetFaith.HighGodNameAlternate] provavelmente não vai acabar bem"
 mystic_lifestyle.1001.b: "[SCOPE.sC('religious_head').Custom2('AppropriateGreeting', ROOT.Char)]"
 mystic_lifestyle.1001.b.flavor: "Chegou ao meu conhecimento que você se envolve regularmente em algumas formas muito incomuns de oração.\n\nExijo que você ponha fim a essa prática ridícula e faça penitência apropriada por essa interpretação equivocada de nossa fé."
 mystic_lifestyle.1002.opening: "Eu conheço a vontade de [ROOT.Char.GetFaith.HighGodName] melhor do que você!"
 mystic_lifestyle.1002.desc: "Ao meu lamentavelmente equivocad[vassal.Custom('ES_OA')] [SCOPE.sC('vassal').Custom2('RelationToMeShort', ROOT.Char )]"
 mystic_lifestyle.1002.a: "Suas práticas estranhas não são sancionadas pelos [ROOT.Char.GetFaith.PriestNeuterPlural] e alguém deve lhe chamar a atenção por isso. Se eu não o fizer agora, então [ROOT.Char.GetFaith.HighGodName] o fará.\n\nPor favor, veja a razão e afaste-se desse caminho estranho. Quem sabe a que heresia ou adoração de demônios isso pode levar!"
 mystic_lifestyle.1003.opening: "Sua ignorância sobre os segredos de [ROOT.Char.GetFaith.HighGodName] não me deterá!"
 mystic_lifestyle.1003.desc: "$mystic_lifestyle_communion_header$Rumores"
 mystic_lifestyle.1003.a: "Parece que meus hábitos religiosos um tanto incomuns estão chamando a atenção de mais e mais pessoas.

Isso mal é um problema, elas não têm esperança de entender o que estou fazendo, mas os sussurros dizem que estou fazendo coisas #EMP às escondidas#! e que as pessoas deveriam ficar de olho."
 mystic_lifestyle.1004.t: "Não me importo nem um pouco com o que eles sussurram."
 mystic_lifestyle.1004.desc: "Parece que meus hábitos religiosos um tanto incomuns estão chamando a atenção de mais e mais pessoas.

Isso mal é um problema, elas não têm esperança de entender o que estou fazendo, mas os sussurros dizem que estou fazendo coisas #EMP às escondidas#! e que as pessoas deveriam ficar de olho."
 mystic_lifestyle.1004.a: "Fico satisfeito que você reconheça meu esforço."
 mystic_lifestyle.1004.b: "Deixe-me ensinar como se faz!"
 mystic_lifestyle.1005.opening: "$mystic_lifestyle_communion_header$Uma Reputação"
 mystic_lifestyle.1005.desc: "Com minhas práticas místicas, aparentemente desenvolvi uma reputação considerável. As pessoas não sabem exatamente o que faço, mas sabem que não querem me desafiar e descobrir.\n\nÉ ridículo, mas talvez não seja completamente ruim..."
 mystic_lifestyle.1005.a: "Eles podem ter medo conforme suas almas pequenas permitirem."
 mystic_lifestyle.1005.b: "Jurar que não faço mal os deixará mais à vontade."
 mystic_lifestyle.1006.t: "$mystic_lifestyle_communion_header$Algo Errado"
 mystic_lifestyle.1006.desc: "Minhas comunhões com o divino têm sido diferentes ultimamente. Elas já não me trazem êxtase, mas fraqueza.\n\nHoje, nem mesmo consigo reunir forças para levantar da cama."
 mystic_lifestyle.1006.a: "Servos... Socorro..."
 mystic_lifestyle.1006.b: "$mystic_lifestyle_communion_header$Um Milagre"
 mystic_lifestyle.1007.t: "Apesar de minha condição enfraquecida, fiz o que pude para realizar minha comunhão.

Ela foi mais intensa do que nunca e, nesta manhã, vejam só! [ROOT.Char.GetFaith.HighGodName|U] me ofereceu um milagre!"
 mystic_lifestyle.1007.desc: "Estou curado!"
 mystic_lifestyle.1007.a: "Car[mystic.Custom('ES_OA')] [SCOPE.sC('mystic').Custom2('RelationToMeShort', ROOT.Char )]"
 mystic_lifestyle.1008.t: "Devo aplaudir sua exploração mística de nossa fé!\n\nPelos rumores que ouço, parece que tenho algumas coisas a aprender também!"
 mystic_lifestyle.1008.desc: "Apesar de minha condição enfraquecida, fiz o que pude para realizar minha comunhão.

Ela foi mais intensa do que nunca e, nesta manhã, vejam só! [ROOT.Char.GetFaith.HighGodName|U] me ofereceu um milagre!"
 mystic_lifestyle.1008.a: "Estou curado!"
 mystic_lifestyle.1009.opening: "Car[mystic.Custom('ES_OA')] [SCOPE.sC('mystic').Custom2('RelationToMeShort', ROOT.Char )]"
 mystic_lifestyle.1009.desc: "Devo aplaudir sua exploração mística de nossa fé!\n\nPelos rumores que ouço, parece que tenho algumas coisas a aprender também!"
 mystic_lifestyle.1009.a: "Ficarei feliz em compartilhar!"
