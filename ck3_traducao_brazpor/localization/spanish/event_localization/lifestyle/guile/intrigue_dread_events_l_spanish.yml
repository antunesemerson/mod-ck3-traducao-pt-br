l_spanish:
 #Join a touring theater company
 intrigue_dread_special.1101.t: "Representar um Papel"
 intrigue_dread_special.1101.desc: "Primeiro dois cavalos, vestidos com rédeas e penas ornamentadas, e depois uma carroça carregada de cofres e gente.\n\nLogo, meu séquito e eu somos abordados por uma companhia de teatro itinerante, toda colorida e cheia de gente animada.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]!", diz um[ROOT.Char.Custom('ES_XA')] anciã[ROOT.Char.Custom('ES_OA')] desde a carroça que passa, "vejo um anseio em vosso olhar. Por que não se juntam a nós para um espetáculo?"."
 intrigue_dread_special.1101.a.a: "¡Haré de granjer[ROOT.Char.Custom('ES_OA')] codicios[ROOT.Char.Custom('ES_OA')]!"
 intrigue_dread_special.1101.a.b: "Vou fazer o papel de [ROOT.Char.GetWifeHusband] velh[ROOT.Char.Custom('ES_OA')]!"
 intrigue_dread_special.1101.a.c: "¡Haré de sirviente astut[ROOT.Char.Custom('ES_OA')]!"
 intrigue_dread_special.1101.a.d: "Vou interpretar o jovem amante!"
 intrigue_dread_special.1101.a.e: "Farei o papel de idiota melanc?lic[ROOT.Char.Custom('ES_OA')]!"
 intrigue_dread_special.1101.b: "Reserve um assento na primeira fileira para mim."
 intrigue_dread_special.1101.c: "Isso está abaixo de mim."
 intrigue_dread_special.1102.desc: "O primeiro passo para qualquer apresentação, seja ela feita em minha [ROOT.Char.Custom('FortifiedBuilding')] ou em um palco, é a preparação.\n\nEntre a agitação da companhia de teatro e convertid[ROOT.Char.Custom('ES_OA')] em alguém anônimo com minhas roupas emprestadas, tenho algum tempo livre antes do início do espetáculo."
 intrigue_dread_special.1102.a: "Não, mova aquele cenário para lá!"
 intrigue_dread_special.1102.a.duel_success: "Você usa suas habilidades organizacionais com sucesso"
 tooltip.intrigue_dread_special.1102.a.duel_success: "Você monta o cenário maravilhosamente"
 intrigue_dread_special.1102.a.duel_failure: "Suas instruções confundem os atores"
 tooltip.intrigue_dread_special.1102.a.duel_failure: "Os cenários estão em desordem"
 intrigue_dread_special.1102.b: "Vamos repassar juntos!"
 intrigue_dread_special.1102.b.duel_success: "Você se familiariza com os atores"
 tooltip.intrigue_dread_special.1102.b.duel_success: "Os atores apreciaram sua ajuda"
 intrigue_dread_special.1102.b.duel_failure: "Suas instruções confundem os atores"
 tooltip.intrigue_dread_special.1102.b.duel_failure: "Os atores não parecem confiar em você"
 intrigue_dread_special.1102.c: "Vou ler o roteiro mais #EMP uma#! vez."
 intrigue_dread_special.1102.c.flavor: "Uma escolha segura, mas baixo risco resulta em pequenas recompensas."
 intrigue_dread_special.1103.desc: "Al salir al escenario con los otros intérpretes, la atención del público es total.\n\nCuando una escena sigue a otra, puedo sentir el ritmo de la historia que se está narrando; late a través de mí. Cuando llega el momento de decir mi primera línea, es como si todo el público aguantase la respiración."
 intrigue_dread_special.1103.a: "O público deve #EMP sentir#! isso!"
 intrigue_dread_special.1103.a.duel_success: "Interpreto meu personagem perfeitamente"
 tooltip.intrigue_dread_special.1103.a.duel_success: "O público ficou impressionado com minha performance"
 intrigue_dread_special.1103.a.duel_failure: "Não consigo entrar no personagem"
 tooltip.intrigue_dread_special.1103.a.duel_failure: "O público não ficou impressionado"
 intrigue_dread_special.1103.b: "Vou me concentrar em ler cada linha de forma impecável."
 intrigue_dread_special.1103.b.duel_success: "O público fica impressionado com minha dicção"
 intrigue_dread_special.1103.b.duel_failure: "Gaguejo durante minha performance"
 intrigue_dread_special.1103.c: "Vou seguir o roteiro e ficar em segundo plano."
 intrigue_dread_special.1199.desc_win_feeling: "É uma parte curta, mas eu faço valer a pena. A plateia fica pendente de cada palavra minha, envolvida na história que teço para eles."
 intrigue_dread_special.1199.desc_loose_feeling: "É uma parte curta, mas de alguma forma eu consigo errar tudo. Eu sempre fui bom em influenciar as pessoas na corte, mas lidar com tantas pessoas... é uma experiência totalmente nova."
 intrigue_dread_special.1199.desc_win_reading: "Entrego minhas falas impecavelmente, capturando o momento e exigindo a atenção total da plateia."
 intrigue_dread_special.1199.desc_loose_reading: "Enquanto o riso da plateia diminui, tento me recuperar do meu erro. Dizer a coisa certa no momento certo é geralmente algo em que sou bom, mas fazer isso em um palco está se mostrando mais difícil do que eu imaginava."
 intrigue_dread_special.1199.desc_fallback: "Sigo o roteiro, e a cena flui suavemente, mas sem destaque."
 intrigue_dread_special.1199.desc_win: "\n\nSomos seguidos fora do palco por aplausos estrondosos após a última cena. Enganar completamente toda a plateia, manter minha disfarce e engano e ser capaz de enganar tantas pessoas de uma vez... É uma sensação poderosa!"
 intrigue_dread_special.1199.desc_loose: "\n\nAl terminar la última escena, nos turnamos para inclinarnos ante el público, cuando llega mi turno, el silencio habla por sí mismo. A pesar de mis esfuerzos, no logré que el público creyera mi invención, y la decepción es un trago amargo que hay que tragarse."
 intrigue_dread_special.1199.z: "E eu desejo sentir isso novamente! E novamente!"
 intrigue_dread_special.1199.a: "Sair, pela esquerda."
 intrigue_dread_special.1199.b: "Na próxima vez, apenas espere!"
 intrigue_dread_special.1199.c.a: "Vocês #EMP vão#! aplaudir! Guardas!"
 intrigue_dread_special.1199.c.b: "Isso certamente foi uma trama para me humilhar! Guardas!"
 intrigue_dread_special.1197.t: "Uma Performance Horrenda"
 intrigue_dread_special.1197.desc: "Devo admitir que minha primeira apresentação pode ter sido um tanto deficiente... Colocar toda a trupe nos troncos foi recebido com uma reação muito mais favorável por parte dos camponeses. Bem, talvez não exatamente #EMP favorável#!, mas certamente satisfatória."
 intrigue_dread_special.1197.a: "Pelo menos me diverti."
 intrigue_dread_special.1198.desc: "Repetimos a apresentação de novo, e de novo, e de novo, enquanto o público, sob o olhar atento dos meus guardas, continua a aplaudir sem parar.\n\nApós cada nova tentativa, meu número se torna mais refinado, enquanto os outros artistas ficam mais descuidados, arrastados pelo medo e pela frustração, até começarem a cair um a um de exaustão, deixando-me sozinho e triunfante no palco.[ROOT.Char.Custom('ES_OA')] e triunfante no palco."
 intrigue_dread_special.1198.a: "Uma experiência verdadeiramente sublime, não é?"
 #Retinue members are concerned, by Linnéa Thimrén
 intrigue_dread_special.1301.t: "[ROOT.Char.Custom('GetCourtierPlural')|U] Preocupados"
 intrigue_dread_special.1301.desc: ""…e quanto tempo até que esteja conspirando contra #EMP nosotros#!? Essas conspirações estão saindo do controle". [courtier_first.GetTitledFirstName|l] e [courtier_second.GetTitledFirstName|l] falam com as cabeças juntas e se assustam quando viro a esquina.\n\n"Meu [ROOT.Char.GetTitleTierName]! Estávamos apenas falando sobre suas… atividades recreativas. Parece que elas ocupam muito do seu tempo"."
 intrigue_dread_special.1301.a: "Ouvi vocês conspirando contra mim! Guardas!"
 intrigue_dread_special.1301.b: "Nada com que quaisquer #EMP [ROOT.Char.Custom('GetServants')] leias#! devam se preocupar..."
 intrigue_dread_special.1301.c: "Eu garanto a vocês que não há nada com que se preocupar."
 intrigue_dread_special.1301.c.duel_success: "Consegui tranquilizar os [ROOT.Char.Custom('GetCourtierPlural')] com sucesso"
 tooltip.intrigue_dread_special.1301.c.duel_success: "Minhas súplicas foram convincentes"
 intrigue_dread_special.1301.c.duel_failure: "Meus súditos estão inquietos"
 tooltip.intrigue_dread_special.1301.c.duel_failure: "Não fui convincente o suficiente"
 intrigue_dread_special.1301.d: "Cuide dos seus próprios assuntos!"
 #Cannibal cook, by Linnéa Thimrén
 intrigue_dread.1501.t: "A Refeição Noturna"
 intrigue_dread.1501.desc: "«¿Qué os parece el estofado, [ROOT.Char.Custom('FormOfAddressForLiege')]?».\n\nEntre los trozos de verduras hay pedazos de carne grasienta, una textura fibrosa interrumpida con lo que parece ser un pelaje corto y escaso. Cuando se le pregunta sobre los ingredientes, mi cocinero privado, [cannibal_cook.Custom('ES_ElLa')] [cannibal_cook.GetTitledFirstName|l], solo sonríe e intenta apaciguarme.\n\n«Mi único deseo es serviros a #EMP vos#!, [ROOT.Char.Custom('FormOfAddressForLiege')]»."
 intrigue_dread.1501.a: "O conteúdo exato das minhas refeições não importa."
 intrigue_dread.1501.b: "Acha que #EMP me#! pode esconder um segredo?"
 intrigue_dread.1501.b.flavor: "A ignorância pode ser uma bênção, mas eu #EMP preciso#! saber"
 intrigue_dread.1501.b.tt1: "Eu consigo me infiltrar e persuadir meu caminho até a cozinha"
 intrigue_dread.1501.b.tt2: "[cannibal_cook.GetSheHe|U] consegue manter a receita em segredo"
 intrigue_dread.1501.c: "Alecrim com carne humana? Excelente escolha!"
 intrigue_dread.1502.desc: "Al entrar en la cocina, está a oscuras y vacía, el aire cargado de humo. En una esquina encuentro el recetario [cannibal_cook.Custom('ES_DelDela')] [cannibal_cook.GetTitledFirstName|l], cubierto de manchas.\n\n#EMP A la hora de preparar el hígado, se ha observado que un consumo excesivo de [ROOT.Char.Custom('RegionalDrink')] puede disminuir significativamente la calidad del órgano…#!\nUna sensación de frío se me aloja en el pecho mientras paso a otra página.\n#EMP … Sin embargo, si se cocinan niños menores de…#!"
 intrigue_dread.1502.a: "Tragam-me a cabeça dele!"
 intrigue_dread.1502.a.flavor: "Mas não em um prato"
 intrigue_dread.1502.b: "Joguem[cannibal_cook.GetHerHim] na [ROOT.Char.Custom('GetDungeon')]!"
 intrigue_dread.1502.c: "Mas estava tão delicioso..."
 intrigue_dread.1503.desc: "Apesar dos meus melhores esforços, não consegui ter acesso à cozinha de uma forma que não levantaria suspeitas d [cannibal_cook.GetTitledFirstName|l]."
 intrigue_dread.1503.a: "Esse mistério vai me atormentar..."
 #Poison tasting, by Petter Vilberg
 intrigue_dread.1801.t: "Experimentação"
 intrigue_dread.1801.mentor_desc: ""E só um pouco mais disso [test_subject.Custom('ES_LoLa')] derrubará completamente", me diz [intrigue_mentor.GetFirstName]. Noss[test_subject.Custom('ES_OA')] "voluntári[test_subject.Custom('ES_OA')]", [test_subject.GetTitledFirstName|l] está quase completamente desorientad[test_subject.Custom('ES_OA')].\n\n[intrigue_mentor.GetFirstName] começa a guardar as garrafas. "Infelizmente, creio que isso é tudo o que nosso sujeito é capaz de aguentar esta noite"."
 intrigue_dread.1801.desc: "Ofereço a [test_subject.GetTitledFirstName|l] enquanto me encara furiosamente através de uma névoa de alquimia. Não foi fácil encontrar alguém para “se voluntariar” para testar minha coleção de... substâncias. Para [test_subject.Custom('ES_ElElla')] tem sido uma tarde de dor, sensações de ardor e inconsciência ocasional."
 intrigue_dread.1801.a: "Isso foi muito esclarecedor."
 intrigue_dread.1801.b: "Ainda não terminamos."
 intrigue_dread.1801.c: "Nunca mais vamos fazer algo assim."
 #Torturing Courtier
 intrigue_dread.1901.t: "[disliked_courtier.Custom('ES_ElLa')|U] estúpid[disliked_courtier.Custom('ES_OA')] [disliked_courtier.Custom2('InsultAdjective', ROOT.Char)]"
 intrigue_dread.1901.desc: "Dia após dia, tenho de suportar a presença de [disliked_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\nSempre que falo com [disliked_courtier.GetSheHe], [disliked_courtier.Custom('quirk_neg_present')]. Será que ele está #EMP intentando#! a me insultar? Não aceitarei mais nenhuma falta de respeito por parte de semelhante [disliked_courtier.Custom2('InsultNoun', ROOT.Char)], alguém tem de lhe dar uma lição!"
 intrigue_dread.1901.a: "Tenho esse veneno que estou querendo experimentar..."
 intrigue_dread.1901.b: "Seria uma pena se [disliked_courtier.GetSheHe] fizesse papel de [disliked_courtier.Custom('ES_XA')] idiota na corte."
 intrigue_dread.1901.b.tt: "Essa opção está disponível por causa do traço [GetTrait('gregarious').GetName( GetPlayer )] d [disliked_courtier.GetFirstNameNoTooltip]"
 intrigue_dread.1901.c: "Que sua bolsa fique mais leve me anima!"
 intrigue_dread.1901.c.tt: "Essa opção está disponível por causa do traço [GetTrait('greedy').GetName( GetPlayer )] d [disliked_courtier.GetFirstNameNoTooltip]"
 intrigue_dread.1901.d: "\"Você ouviu? [disliked_courtier.GetSheHe] é tão sem graça quanto farinha na cama.\""
 intrigue_dread.1901.d.tt: "Essa opção está disponível por causa do traço [GetTrait('lustful').GetName( GetPlayer )] d [disliked_courtier.GetFirstNameNoTooltip]"
 #Mind Break, by Sean Hughes
 intrigue_dread.4001.t: "Sofrimento Exquisito"
 intrigue_dread.4001.desc.start: "Já não estou satisfeito com as torturas regulares pelas quais me tornei conhecido por infligir a meus prisioneiros. Desejo criar uma obra-prima - uma obra de arte que consagre a angústia e o sofrimento, transcendendo tudo o que já fiz antes!"
 intrigue_dread.4001.desc.single: "\n\nNo entanto, não consigo deixar de me perguntar se [prisoner_1.GetTitledFirstName|l] será uma tela adequada para a minha obra-prima."
 intrigue_dread.4001.desc.multiple: "\n\nA questão é, quem será minha tela?"
 intrigue_dread.4001.a.single: "Sim, [prisoner_1.GetSheHe] servirá perfeitamente..."
 intrigue_dread.4001.a: "[prisoner_1.GetTitledFirstNameNoTooltip] ? perfeit[prisoner_1.Custom('ES_OA')]!"
 intrigue_dread.4001.b: "Talvez [prisoner_2.GetTitledFirstNameNoTooltip]?"
 intrigue_dread.4001.c: "Prefiro usar mais bem a [prisoner_3.GetTitledFirstNameNoTooltip|l]."
 intrigue_dread.4001.a-c.tt: "Utilizarei [THIS.Char.GetTitledFirstName|l] como meu sujeito neste empreendimento."
 intrigue_dread.4001.kinslayer: "Se [THIS.Char.GetTitledFirstName|l] morrer por causa disso, posso passar a ser conhecido como [GetTrait('kinslayer_3').GetName( GetPlayer )]."
 intrigue_dread.4001.d: "Não, agora não é o momento certo."
 intrigue_dread.4001.d.flavor: "Vou revisitar essa ideia em alguns anos, espero com novos prisioneiros"
 intrigue_dread.4002.desc: "Agora que escolhi minha tela, preciso decidir que forma minha obra-prima terá.\n\nPosso pensar em muitos tormentos que adoraria infligir a [victim.GetTitledFirstName|l], mas se eu quiser criar uma verdadeira obra-prima, devo me concentrar em fazer apenas uma coisa com perfeição."
 intrigue_dread.4002.a: "Forjar o corpo esfolado em uma bela escultura."
 intrigue_dread.4002.a.flavor: "![victim.Custom('ES_LoLa')|U] exibirei à vista de todo o meu [ROOT.Char.Custom('GetRealmOrDomicile')]!"
 intrigue_dread.4002.b: "[victim.GetSheHe|U] vai me cantar uma doce canção de angústia..."
 intrigue_dread.4002.b.flavor: "Vou guardar na memória os gritos por anos a fio."
 intrigue_dread.4002.c: "Quebrar sua mente e transformar[victim.Custom('ES_LoLa')] em meu escrav[victim.Custom('ES_OA')]!"
 intrigue_dread.4002.c.flavor: "Darei início ao longo e árduo processo de arrancar a individualidade de [victim.GetTitledFirstNameNoTooltip|l] para transform[victim.Custom('ES_LoLa')] em meu leal servo."
 intrigue_dread.4002.c.compassionate.tt: "@warning_icon! #warning Debido a mi naturaleza compasiva, tomar este camino aumentará considerablemente mi [stress|lE].#!"
 intrigue_dread.4002.c.success.desc: "Eu consigo remodelar a mente d [victim.GetFirstNameNoTooltip] para atender aos meus propósitos"
 intrigue_dread.4002.c.failure.desc: "[victim.GetFirstNameNoTooltip] perece antes de eu poder completar o processo"
 intrigue_dread.4002.d: "Mudei de ideia, [victim.GetSheHe] não é adequad[victim.Custom('ES_OA')] para isto…"
 intrigue_dread.4004.desc: "Para remodelar a mente de [victim.GetTitledFirstName|l] primeiro devo submeter[victim.Custom('ES_LoLa')] a um estresse extremo.\n\nDevo selecionar cuidadosamente um método de tortura ao qual [victim.GetFirstNameNoTooltip] seja particularmente vulnerável… e, ao fazer isso, vou garantir que causarei a maior quantidade possível de trauma."
 intrigue_dread.4004.desc.followup: "[victim.GetTitledFirstName] está ficando insensível ao meu método atual de tortura, e não tem mais o mesmo impacto de antes. Precisarei escolher uma abordagem diferente..."
 intrigue_dread.4004.o.flavor: "A eficácia dessa técnica varia com base nos [traits|lE] de [victim.GetTitledFirstNameNoTooltip|l]."
 intrigue_dread.4004.a: "Tortura física e dor."
 intrigue_dread.4004.b: "Privação de comida e sono."
 intrigue_dread.4004.c: "Humilhação e degradação."
 intrigue_dread.4005.desc: "[victim.GetTitledFirstName] finalmente perdeu a esperança e não luta mais contra mim nas masmorras.\n\nIsso significa que é hora de passar para a segunda etapa, na qual devo criar culpa e confusão suficientes em sua mente para prejudicar seu senso de moralidade, propósito e até mesmo identidade."
 intrigue_dread.4005.desc.followup: "[victim.GetTitledFirstName] ainda está se agarrando aos remanescentes dilacerados de sua identidade, danificada mas ainda não destruída. Devo empregar outra tática para concluir o trabalho..."
 intrigue_dread.4005.a: "Oferecer palavras reconfortantes... enquanto continuo com a tortura!"
 intrigue_dread.4005.b: "Afirmar que tudo isso é um castigo por seus [ROOT.Char.Custom('GetSinMisdeedPlural')]."
 intrigue_dread.4005.c: "Deixar que espere um indulto e destruir suas esperanças."
 intrigue_dread.4006.desc: "Finalmente, eu despojei [victim.GetTitledFirstName|l] dos últimos vestígios de sua identidade. Agora é um cascarão vazio, incapaz de interagir com o mundo ao seu redor."
 intrigue_dread.4006.a: "[victim.Custom('ES_LoLa')|U] moldarei para que se encaixe em meus planos."
 intrigue_dread.4006.a.tt: "Começo a trabalhar para transformar [victim.GetTitledFirstName|l] em um[victim.Custom('ES_XA')] servo[victim.Custom('ES_XA')] obediente"
 intrigue_dread.4006.b: "Me diverte mais mandar[victim.Custom('ES_LoLa')] de volta como uma casca vazia."
 intrigue_dread.4007.desc: "Está feito… [victim.GetTitledFirstName|l] está diante de mim, meu esclav[victim.Custom('ES_OA')] obediente, disposto a fazer qualquer coisa que eu peça."
 intrigue_dread.4007.a: "Ah, as coisas que faremos juntos!"
 intrigue_dread.4008.desc: "Faz vários anos desde que coloquei de volta no mundo [victim.GetTitledFirstName|l] para cumprir minhas ordens."
 intrigue_dread.4008.desc.success: "[victim.GetSheHe] readaptou-se ao seu ambiente e assumiu suas responsabilidades normais - tudo enquanto permanece leal a mim."
 intrigue_dread.4008.desc.lunatic: "\n\nInfelizmente, parece que a disparidade entre meu condicionamento e as realidades da nova vida demonstrou ser demais para [victim.GetSheHe] e acabou surtando."
 intrigue_dread.4008.desc.failure: "\n\nInfelizmente, parece que os amigos e familiares conseguiram desfazer grande parte do meu delicado trabalho com [victim.GetSheHe] e agora não me é mais leal."
 intrigue_dread.4008.a.success: "Excelente..."
 intrigue_dread.4008.a.lunatic: "Tivemos um bom momento, pelo menos."
 intrigue_dread.4008.a.failure: "Malditos por destruírem minha arte!"
 intrigue_dread.4011.desc: "Sin [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l] en mis [ROOT.Char.Custom('GetDungeonPlural')], ya no puedo continuar mi trabajo de transformar[victim.GetHerHim] en mi obra maestra. Esto pospondrá mis planes hasta que consiga otro lienzo igual de inspirador, porque, aunque volviera a hacerme con [victim.GetSheHe], ya no sería lo mismo."
 intrigue_dread.4011.a: "Um contratempo lamentável..."
 intrigue_dread.4013.desc: "Parece que minhas #EMP intervenciones#! foram demais para [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l], que faleceu nas minhas [ROOT.Char.Custom('GetDungeonPlural')].\n\nAgora não poderei concluir minha obra-prima até conseguir outra tela suficientemente inspiradora, e [ROOT.Char.GetFaith.HighGodName] sabe lá quanto tempo isso vai levar…"
 intrigue_dread.4013.a: "Precisarei ter mais cuidado da próxima vez."
 intrigue_dread.4100.t: "Audiências Intermináveis"
 intrigue_dread.4100.desc.intro: "Não passa um dia sem que alguma nova questão sem importância seja levada à minha atenção na corte. Parece que hoje é a vez de [petitioner_1.GetTitledFirstName|l] e [petitioner_2.GetTitledFirstName|l] desperdiçarem meu tempo com uma disputa mesquinha."
 intrigue_dread.4100.desc.lazy: "\n\nMal consigo ouvir suas queixas... Como devo governar quando a maior parte do meu tempo e energia limitados é desperdiçada em assuntos tão insignificantes?"
 intrigue_dread.4100.desc.councillors: "\n\nEles querem me convencer de que isso é um problema que coloca em risco a segurança do reino, mas não consigo deixar de sentir que estão superestimando a gravidade da situação para alimentar seu próprio ego."
 intrigue_dread.4100.desc.fallback: "\n\nQuanto mais ouço suas razões, mais convencido fico de que toda a audiência está abaixo da minha preocupação."
 intrigue_dread.4100.z: "Fico imaginando, como seriam falantes as suas cabeças decepadas?"
 intrigue_dread.4100.a: "Guardas, tirem esses rufiões da minha vista!"
 intrigue_dread.4100.b: "Vou ensiná-los a não desperdiçar o tempo da corte!"
 intrigue_dread.4100.b.duel_success: "Os peticionários se encolhem diante da minha ira"
 intrigue_dread.4100.b.duel_failure: "Os peticionários se sentem insultados por minhas ameaças"
 intrigue_dread.4100.c: "Deixem-me ouvir isso mais uma vez..."
 intrigue_dread.4100.c.tooltip: "Você levará tempo para tomar uma decisão"
 intrigue_dread.4100.c.support.petitioner_1: "Se você apoiar [petitioner_1.GetTitledFirstName|l]"
 intrigue_dread.4100.c.support.petitioner_2: "Se você apoia [petitioner_2.GetTitledFirstName|l]"
 intrigue_dread.4100.d: "[scoped_chancellor.GetTitledFirstNameNoTooltip|l] deveria lidar com esses assuntos."
 intrigue_dread.4102.desc.commanders: "O cerne da questão entre [petitioner_1.GetFirstName] e [petitioner_2.GetFirstName] está relacionado com uma disputa entre os comandantes e alguns veteranos do exército."
 intrigue_dread.4102.desc.guests: "Aparentemente, o problema surgiu de um incidente diplomático..."
 intrigue_dread.4102.desc.fallback: "Esperava que ouvir suas queixas revelasse algum significado mais profundo para todo este assunto, mas a briga entre [petitioner_1.GetFirstName] e [petitioner_2.GetFirstName] soa apenas mais superficial aos meus ouvidos."
 intrigue_dread.4102.desc.antagonizer: "\n\nAo menos posso dizer que [scoped_antagonizer.GetFirstNameNoTooltip] é, sem dúvida, o mais irritante dos dois peticionários."
 intrigue_dread.4102.a: "Exijo que vocês façam as pazes agora. Ou então..."
 intrigue_dread.4102.b: "[petitioner_1.GetFirstNameNoTooltip] está claramente certo."
 intrigue_dread.4102.c: "As palavras d [petitioner_2.GetFirstNameNoTooltip] ecoam verdadeiras aos meus ouvidos."
 intrigue_dread.4200.t: "A Floresta dos Meus Sonhos"
 intrigue_dread.4200.desc.intro: "Por meio de meus esforços para me tornar uma figura verdadeiramente temida e respeitada, um grande número de pessoas culpadas e desleais acabou em meu calabouço."
 intrigue_dread.4200.desc.noble_forest: "Minhas celas estão abarrotadas de rivais, traidores e criminosos comuns. Talvez já seja hora de que conheçam [ROOT.Char.GetFaith.DeathDeityName] em [ROOT.Char.GetFaith.NegativeAfterLife] e, já que estão nisso, sirvam aos interesses de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]!"
 intrigue_dread.4200.desc.commoner_forest: "Muitos assassinos e batedores de carteira humildes do campo e das cidades aguardam seu destino, à margem da sociedade, mas talvez eu tenha uma ideia melhor para eles."
 intrigue_dread.4200.desc.middle: "\n\nEm minhas maquinações macabras, imagino uma floresta de malfeitores e traidores empalados que cerca [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]; um lúgubre lembrete para todos do que acontece quando se trai [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip]."
 intrigue_dread.4200.desc.noble_forest.outro: "Vejo [random_prisoner_scope.GetName] em uma estaca, cercado por plebeus erguidos da mesma maneira. Agora só falta tornar esse sonho realidade!"
 intrigue_dread.4200.desc.commoner_forest.outro: "Vejo fileira após fileira de criminosos comuns se estendendo até o horizonte, a [ROOT.Char.GetCapitalLocation.GetTerrain.GetNameNoTooltip] manchada com seu sangue. Com um pouco de trabalho, podemos reunir o suficiente dessas pragas para tornar meu sonho realidade."
 intrigue_dread.4200.a: "Vamos começar!"
 intrigue_dread.4200.b: "[random_prisoner_scope.GetTitledFirstNameNoTooltip|l] e alguns plebeus devem transmitir uma mensagem."
 intrigue_dread.4200.c: "Uma pequena coleção de corpos deve ser suficiente."
 intrigue_dread.4200.d: "Todos devem temer a mim!"
 intrigue_dread.4200.e: "Pelo [ROOT.Char.GetFaith.HighGodName]! Eu não consigo fazer isso!"
 intrigue_dread.4201.t: "A Floresta de Cadáveres"
 intrigue_dread.4201.desc.intro: "Finalmente, minha visão ganhou vida pelos corpos de incontáveis criminosos. Eu caminho tranquilamente ao som dos pássaros cacarejantes e do gotejar suave do sangue estagnado no chão encharcado."
 intrigue_dread.4201.desc.noble_forest: "\n\nAproximo-me do corpo de [random_prisoner.GetNameNoTooltip], com o rosto congelado em uma expressão retorcida de espanto e terror, como se de algum modo estivesse ciente de seu destino."
 intrigue_dread.4201.desc.commoner_forest: "\n\nPasso por fileiras e fileiras de criminosos sem nome e bandidos, certo de que qualquer ladrão de estrada ou bandido que se aproxime de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] possa ver claramente o que acontece com aqueles que tentam semear crime e desordem no [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]!"
 intrigue_dread.4201.desc.outro: "\n\nAl concluir mi recorrido, aspiro una última bocanada de la miasma mortal antes de regresar a casa, satisfech[ROOT.Char.Custom('ES_OA')] con mi trabajo."
 intrigue_dread.4201.a: "Agora todos temerão o nome \"[ROOT.Char.GetNameNoTooltip]."
