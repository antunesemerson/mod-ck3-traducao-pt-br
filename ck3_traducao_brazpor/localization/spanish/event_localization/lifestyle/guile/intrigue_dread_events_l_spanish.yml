 #Scaring a loved one, by Luke Bean
 intrigue_dread.2001.t: "Até Mesmo [loved_one.GetSheHe] Me Teme"
 intrigue_dread.2001.desc: "A mão de [loved_one.GetTitledFirstName|l] se estremece sob a minha. Quando me estendo para acariciar sua bochecha, ele se afasta com um sobressalto.\n\n[loved_one.GetSheHe|U] me conta as estranhas coisas que as pessoas dizem sobre mim. Coisas apavorantes. Ele se pergunta quais delas são verdadeiras."
 intrigue_dread.2001.a: "Eles não fazem #EMP ideia#! do que eu já fiz."
 intrigue_dread.2001.a.tt: "Venha mais perto. #EMP Mais perto#! Eu vou sussurrar em seu ouvido."
 intrigue_dread.2001.b: "Tudo o que faço é para te proteger!"
 intrigue_dread.2001.c: "Quem, especificamente, diz essas coisas? Eu quero nomes."
 intrigue_dread.2001.d: "Apenas sorria e siga em frente."
 intrigue_dread.2001.b.into_it: "[loved_one.GetFirstName] é tocad pela sua devoção"
 intrigue_dread.2001.b.reassured: "[loved_one.GetFirstName] se sente tranquilizad sabendo que está segur"
 intrigue_dread.2001.b.terrified: "Sua confissão aterroriza a [loved_one.GetFirstName]"
 tooltip.intrigue_dread.2001.c.duel_success: "Seus guardas capturam os fofoqueiros"
 tooltip.intrigue_dread.2001.c.duel_failure: "[loved_one.GetFirstName] desafia abertamente você"
 intrigue_protected_by_loved_one_modifier: "Protegid por um Ente Querido"
 intrigue_protected_by_loved_one_modifier_desc: "Essa pessoa tem um ente querido que faria #EMP qualquer coisa#! para protegê-la."
 intrigue_defied_loved_one_opinion: "Desafiou um ente querido"
 #Rumors about a relative, by Luke Bean
 intrigue_dread.2101.t: "Rumores sobre [family_member.GetFirstNameNoTooltip]"
 intrigue_dread.2101.desc.intro: "«Esos rumores asquerosos sobre vuestr[family_member.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('family_member'))], [family_member.Custom('ES_ElLa')] [family_member.GetTitledFirstName|l]… Los he rastreado hasta su origen». [spymaster.Custom2('MyCharacterIntroduction', ROOT.Char)] palmea un fajo de cartas.\n\nLas misivas demuestran que [hater.GetName] ha estado intentando ensuciar el buen nombre de [family_member.GetFirstName]. "
 intrigue_dread.2101.desc.failed_assassination: "Até acusa [family_member.GetFirstName] de tentar mandar matar[hater.GetHerHim]!"
 intrigue_dread.2101.desc.committed_adultery: "Afirma que [family_member.GetFirstName] foi um[family_member.Custom('ES_XA')] [family_member.GetWifeHusband] infiel, e relata histórias escabrosas sobre [family_member.GetSheHe]!"
 intrigue_dread.2101.desc.bullied_me: "Afirma que [family_member.GetFirstName] carrega a semente do mal em seu interior desde a infância, quando atormentou [hater.GetNameNoTooltip] com crueldade."
 intrigue_dread.2101.desc.bad_friend: "Afirma que [family_member.GetFirstName] fue [Select_CString( family_member.IsFemale, 'una mala amiga', 'un mal amigo' )] y que le dolió mucho que [family_member.GetFirstName] renunciara a su amistad."
 intrigue_dread.2101.desc.sinner: "Zomba do caráter de [family_member.GetFirstName] e [family_member.GetHerHim] o acusa de [ROOT.GetCharacter.Custom('GetSinMisdeedPlural')] chocantes."
 intrigue_dread.2101.desc.outro: "\n\nAs pessoas realmente acham que podem falar assim da minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('family_member'))]?"
 intrigue_dread.2101.a: "Espalhar rumores ainda mais sombrios sobre [family_member.GetFirstNameNoTooltip] para que todos temam a nós."
 intrigue_dread.2101.a.tt.success: "Acredita-se que [family_member.GetFirstName] é capaz de qualquer coisa"
 tooltip.intrigue_dread.2101.a.duel_success: "Elas acreditam e tremem."
 intrigue_dread.2101.a.tt.failure: "Ninguém acredita em suas histórias exageradas."
 tooltip.intrigue_dread.2101.a.duel_failure: "As pessoas zombam de suas histórias exageradas."
 intrigue_dread.2101.b: "Oferecer [hater.Custom('ES_AlAla')] [hater.GetTitledFirstNameNoTooltip|l] algumas moedas para que feche a boca."
 intrigue_dread.2101.b.tt.success: "[hater.Custom('ES_ElLa')|U] [hater.GetTitledFirstName|l] ficará em silêncio"
 tooltip.intrigue_dread.2101.b.duel_success: "[hater.Custom('ES_ElLa')|U] [hater.GetTitledFirstName|l] fica em silêncio, todos ficam felizes"
 intrigue_dread.2101.b.tt.failure: "[hater.Custom('ES_ElLa')|U] [hater.GetTitledFirstNameNoTooltip|l] continuará fofocando"
 tooltip.intrigue_dread.2101.b.duel_failure: "[hater.Custom('ES_ElLa')|U] [hater.GetTitledFirstName|l] pega suas moedas e continua tagarelando"
 intrigue_everyone_is_satisfied_tt: "Esta resolução satisfaz [hater.Custom('ES_AlAla')] [hater.GetTitledFirstName|l] e [family_member.Custom('ES_AlAla')] [family_member.GetFirstName]"
 intrigue_dread.2101.c: "Contrate às escondidas uns rufiões para dar uma surra em [hater.Custom('ES_AlAla')] [hater.GetTitledFirstNameNoTooltip|l]."
 intrigue_dread.2101.c.tt.success: "Ninguém ousará falar mal da sua família."
 tooltip.intrigue_dread.2101.c.duel_success: "[hater.Custom('ES_ElLa')|U] [hater.GetTitledFirstName|l] está se recuperando de um acidente doloroso"
 intrigue_suspect_you_in_attack_success_tt: "Ninguém pode provar seu envolvimento, mas eles suspeitam o suficiente para temê-lo."
 intrigue_dread.2101.c.tt.failure: "Sua associação com criminosos comuns se torna conhecida."
 tooltip.intrigue_dread.2101.c.duel_failure: "[hater.Custom('ES_ElLa')|U] [hater.GetTitledFirstName|l] suspeita que você está por trás do ataque fracassado"
 intrigue_dread.2101.d: "Distancio-me de [family_member.GetFirstNameNoTooltip]."
 intrigue_everyone_heard_rumours_tt: "Todos na sua corte ouviram rumores embaraçosos sobre [family_member.GetNameNoTooltip]."
 intrigue_everyone_heard_horrifying_rumours_tt: "Todos na sua corte ouviram rumores horríveis sobre [family_member.GetNameNoTooltip]."
