 #Councillor is too scared to speak their mind, by Luke Bean
 intrigue_dread.2201.t: "Demasiado asustad[yesman.Custom('ES_OA')] para dar su opinión"
 intrigue_dread.2201.desc: ""Que decisão mais sábia, meu [ROOT.Char.GetLadyLord]!", sorri nervosamente [yesman.Custom2('MyCharacterIntroduction', ROOT.Char)] e inclina a cabeça para mim como um pombo. "De fato, não tenho nada a acrescentar!".\n\n[yesman.GetNameNoTooltip] me teme demais para contradizer minhas decisões. Isso [yesman.GetHerHim] o torna bastante inútil como [yesman.GetCouncilTitle]."
 intrigue_dread.2201.a: "Perfeito. Meu conselho #EMP deve#! ter medo de mim."
 intrigue_dread.2201.b: "Eu mesmo farei o seu trabalho, seu tolo!"
 intrigue_dread.2201.c: "Fale livremente o que pensa. Sua posição está segura."
 intrigue_guaranteed_position_block_firing_councillor_effect_tt: "[yesman.GetShortUIName|U] não pode ser demitid[yesman.Custom('ES_OA')] do [council|lE] durante 5 anos"
 intrigue_dread.2201.c.tt.success: "[yesman.GetFirstNameNoTooltip] confia o suficiente em você para falar livremente."
 tooltip.intrigue_dread.2201.c.duel_success: "$intrigue_dread.2201.c.tt.success$"
 intrigue_dread.2201.c.tt.failure: "[yesman.GetFirstNameNoTooltip] acredita que você está tentando enganá-lo[yesman.GetHerHim]"
 tooltip.intrigue_dread.2201.c.duel_failure: "$intrigue_dread.2201.c.tt.failure$"
