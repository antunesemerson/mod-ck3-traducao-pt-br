 #Your court thinks you're soft, by Luke Bean
 intrigue_dread.2301.t: "Mostre Quem Você É"
 intrigue_dread.2301.desc.a: ""Que sorte a nossa ter um exemplo de [ROOT.Char.Custom('GetCourtOwner')] gentil, um modelo de compaixão e pureza!". O sorrisinho de [smirking_courtier.GetName] paira diante de mim. "É uma bênção viver em uma [ROOT.Char.Custom('GetCourt')] onde podemos estar livres do medo!"."
 intrigue_dread.2301.desc.b: ""Que sorte a nossa de ter um exemplo de [ROOT.Char.Custom('GetCourtOwner')] um modelo de autenticidade e sinceridade, incapaz de enganar!". O sorrisinho de [smirking_courtier.GetName] flutua diante de mim. "Somos abençoados por viver em uma [ROOT.Char.Custom('GetCourt')] onde podemos estar livres do medo!"."
 intrigue_dread.2301.desc.c: ""Que sorte a nossa de ter um exemplo de [ROOT.Char.Custom('GetCourtOwner')], um modelo de simplicidade e humildade, que nada nos exige!". A sorrisinha de [smirking_courtier.GetName] flutua diante de mim. "É uma bênção viver em uma [ROOT.Char.Custom('GetCourt')] onde estamos livres do medo!"."
 intrigue_dread.2301.desc.d: ""Que fortuna a nossa ter um exemplo de [ROOT.Char.Custom('GetCourtOwner')] tão justo, que sente um verdadeiro respeito pela lei!". O sorrisinho de [smirking_courtier.GetName] flutua diante de mim. "É uma bênção viver em uma [ROOT.Char.Custom('GetCourt')] onde podemos estar livres do medo!"."
 intrigue_dread.2301.desc.e: ""Que sorte a nossa ter um exemplo de [ROOT.Char.Custom('GetCourtOwner')] que se importa conosco, que nunca maltrataria seus súditos!". O sorrisinho de [smirking_courtier.GetName] flutua diante de mim. "Somos abençoados por viver em uma [ROOT.Char.Custom('GetCourt')] onde podemos estar livres do medo!"."
 intrigue_dread.2301.desc.outro: "\n\nAtrás d [smirking_courtier.GetFirstNameNoTooltip], minha [ROOT.Char.Custom('GetCourt')] ri e aplaude. Essas pessoas não têm medo de mim. Elas não me respeitam. Elas não me conhecem. Vou mostrar a elas quem eu sou."
 intrigue_dread.2301.a: "Apunhalar [smirking_courtier.GetFirstNameNoTooltip] na garganta."
 intrigue_dread.2301.b: "Levem [smirking_courtier.GetFirstNameNoTooltip] arrastado para a [ROOT.Char.Custom('GetDungeon')]."
 intrigue_dread.2301.c: "Sorria, ria e planeje sua vingança."
 intrigue_dread.2301.d: "[smirking_courtier.GetFirstNameNoTooltip] morrerá esta noite. Que especulem por quê."
 intrigue_show_them_all_modifier: "Planejando Mostrar a Todos"
 #Executions could be better, by Luke Bean
 intrigue_dread.2401.t: "As Execuções Poderiam Ser Melhores"
 intrigue_dread.2401.desc: "O ladrão condenado se contorce ao fim de uma corda e, em seguida, fica imóvel. A multidão de plebeus murmura sua aprovação e começa a dispersar.\n\nMas onde está o aplauso, o lamento, o terror? Eu poderia melhorar as execuções públicas em [execution_county.GetName] com uma simples mudança..."
 intrigue_dread.2401.a: "Mais. Deles."
 intrigue_dread.2401.a.tt.success: "Criminosos são purgados por todo [execution_county.GetNameNoTier]"
 tooltip.intrigue_dread.2401.a.duel_success: "$intrigue_dread.2401.a.tt.success$"
 intrigue_dread.2401.a.tt.failure: "Execuções injustas indignam [execution_county.GetNameNoTier]"
 tooltip.intrigue_dread.2401.a.duel_failure: "$intrigue_dread.2401.a.tt.failure$"
 intrigue_dread.2401.b: "A presença na execução é obrigatória!"
 intrigue_dread.2401.b.tt.success: "As pessoas de [execution_county.GetNameNoTier] tremem diante da justiça"
 tooltip.intrigue_dread.2401.b.duel_success: "$intrigue_dread.2401.b.tt.success$"
 intrigue_dread.2401.b.tt.failure: "As pessoas de [execution_county.GetNameNoTier] desperdiçam tempo contemplando as execuções"
 tooltip.intrigue_dread.2401.b.duel_failure: "$intrigue_dread.2401.b.tt.failure$"
 intrigue_dread.2401.c: "As execuções deveriam ser lentas. E #EMP criativas#!..."
 intrigue_dread.2401.d: "Plebeus não deveriam perder tempo nas execuções."
