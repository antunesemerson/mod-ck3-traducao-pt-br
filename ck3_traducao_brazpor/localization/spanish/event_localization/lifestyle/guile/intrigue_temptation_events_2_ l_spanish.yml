l_spanish:
 #A courtier propositions you via a lewd image, by Ewan Cowhig Croft
 intrigue_temptation.3100.cloth_t: "Que bela... Costura"
 intrigue_temptation.3100.stone_t: "Que bela... Gravação"
 intrigue_temptation.3100.wax_t: "Que bela... Gravação em Cera"
 intrigue_temptation.3100.wood_t: "Que bela... Entalhadura"
 intrigue_temptation.3100.vellum_t: "Que belo... Desenho"
 intrigue_temptation.3100.start_desc: "Um [ROOT.Char.Custom('lowly_servant_type')] discretamente deixa o pacote ao meu lado. Eu bocejo, mal suportando esse triste banquete, e começo a abri-lo.\n\nDentro está"
 intrigue_temptation.3100.end_desc: "a representação de uma figura de [propositioning_courtier.GetWomanMan]vantajosamente bem dotad[propositioning_courtier.Custom('ES_OA')] em uma pose \"sedutora\".\n\nEstupefato[ROOT.Char.Custom('ES_OA')], eu percorro a [ROOT.Char.Custom('GetRoom')] com o olhar e descubro [propositioning_courtier.Custom('ES_AlAla')] [propositioning_courtier.GetTitledFirstNameNoTooltip|l], que me encara de volta. Ele sorri, e suas sobrancelhas começam a se agitar como lagartas frenéticas."
 intrigue_temptation.3100.cloth_desc: "um pano manchado, bordado grosseiramente,"
 intrigue_temptation.3100.stone_desc: "uma placa de pedra fina, gravada grosseiramente,"
 intrigue_temptation.3100.wax_desc: "uma tabuleta de cera fedorenta, gravada preguiçosamente,"
 intrigue_temptation.3100.wood_desc: "um prato de madeira, entalhado de forma desajeitada,"
 intrigue_temptation.3100.vellum_desc: "uma folha de vitela, com um esboço manchado de tinta"
 intrigue_temptation.3100.a: "Que nojo!"
 intrigue_temptation.3100.a.tt: "Personagens castos em sua [ROOT.Char.Custom('GetCourt')] passam a respeitá-lo um pouco mais"
 intrigue_temptation.3100.b: "Outro tolo ansioso, outro segredo."
 intrigue_temptation.3100.b.tt: "Eu tento arrancar um segredo de [propositioning_courtier.GetShortUINameNoTooltip]"
 intrigue_temptation.3100.b.tt.secret_gained: "Na cama, [propositioning_courtier.GetShortUINameNoTooltip] conta histórias interessantes."
 intrigue_temptation.3100.b.tt.xp_gained: "Infelizmente, [propositioning_courtier.GetShortUINameNoTooltip] não sabe de nada."
 intrigue_temptation.3100.cloth_c: "Um[propositioning_courtier.Custom('ES_XA')] [propositioning_courtier.GetWomanMan] de dedos ágeis…"
 intrigue_temptation.3100.stone_c: "Nossa, como #EMP firme#! parece…"
 intrigue_temptation.3100.wax_c: "Nossa, a cera ainda está quente..."
 intrigue_temptation.3100.wood_c: "Ela parece simplesmente deliciosa…"
 intrigue_temptation.3100.vellum_c: "Então, gosta de se sujar…"
 intrigue_temptation.3100.d: "Acho que uma exposição pública é necessária."
 public_shamer_modifier: "Arte Amadora Compartilhada"
 #While drinking with a courtier, you lead them towards deviancy, by Ewan Cowhig Croft
 intrigue_temptation.3110.t: "Um Pouco de Experimentação"
 intrigue_temptation.3110.start_desc: "Uma longa tarde tratando de assuntos de governo com [potential_deviant.Custom('ES_ElLa')] [potential_deviant.GetTitledFirstNameNoTooltip|l] acabou, aos poucos, se degenerando em uma troca embriagada de histórias picantes.\n\nAcabei de terminar de contar uma história…"
 intrigue_temptation.3110.end_desc: "quando vejo um brilho indecoroso nos olhos do meu interlocutor[potential_deviant.Custom('ES_XA')].\n\nPensamentos espontâneos de chantagem me vêm à cabeça. Será que [potential_deviant.Custom('ES_AlAla')] [potential_deviant.GetTitledFirstNameNoTooltip|l] esses assuntos o entusiasmem mais do que ele imagina?"
 intrigue_temptation.3110.0_desc: "sobre o amor proibido entre cabra e texugo,"
 intrigue_temptation.3110.1_desc: "de luxúria melancólica por seu reflexo inatingível,"
 intrigue_temptation.3110.2_desc: "sobre um relacionamento muito improvável envolvendo um cavalo,"
 intrigue_temptation.3110.3_desc: "sobre um lorde que amava sua terra um pouco #EMP demais#!,"
 intrigue_temptation.3110.4_desc: "envolvendo três [ROOT.Char.GetFaith.PriestNeuterPlural|l] libidinosos e um chapéu de feltro extremamente desgastado,"
 intrigue_temptation.3110.5_desc: "sobre as proezas amorosas de meu avô com um peixe astuto,"
 intrigue_temptation.3110.6_desc: "sobre uma confeitaria bastante curvilínea,"
 intrigue_temptation.3110.7_desc: "envolvendo um toco de árvore muito amado por um bandido,"
 intrigue_temptation.3110.8_desc: "sobre os encantos sedutores de alguns monstros marinhos exóticos,"
 intrigue_temptation.3110.9_desc: "relatando as inclinações naturais de certas culturas bárbaras,"
 intrigue_temptation.3110.a: "Eu conheço algumas outras histórias assim..."
 intrigue_temptation.3110.a.tt_success: "[potential_deviant.GetShortUINameNoTooltip] descobre um novo hobby"
 intrigue_temptation.3110.a.tt_fail: "[potential_deviant.GetShortUINameNoTooltip] é repelid por minha indecência"
 intrigue_temptation.3110.b: "Isso é #EMP mais#! do que suficiente por agora, obrigad."
 #You enjoy a dinner with one of your guests, and try to tempt them into staying, by Ewan Cowhig Croft
 intrigue_temptation.3120.t: "Corações Errantes"
 intrigue_temptation.3120.desc: "Esta noite, pela décima segunda vez, me vejo relaxando com [tempted_guest.Custom('ES_ElLa')] [tempted_guest.GetTitledFirstName|l] junto a uma fogueira que vai se apagando. A companhia de [capital.GetNameNoTooltip]. \n\nSe [tempted_guest.GetFirstNameNoTooltip] aceitasse ficar de forma permanente, essas noites longas e tranquilas poderiam durar para sempre. É claro, com o empurrão certo…"
 intrigue_temptation.3120.a: "Deixem-me mostrar #EMP cuán#! acolhedor[ROOT.Char.Custom('ES_OA')] posso ser."
 intrigue_temptation.3120.a.tt_success: "[tempted_guest.GetShortUINameNoTooltip] fica encantad[ROOT.Char.Custom('ES_OA')]"
 intrigue_temptation.3120.a.tt_fail: "[tempted_guest.GetShortUINameNoTooltip] fica asquead[ROOT.Char.Custom('ES_OA')]"
 intrigue_temptation.3120.b: "Basta pedir, e eu trarei a própria lua."
 intrigue_temptation.3120.c: "Um brinde à companhia agradável, mesmo que transitória!"
 #You seduce the spouse of a potential rival to cement the foeship, by Ewan Cowhig Croft
 intrigue_temptation.3130.t: "Com Coração Frio"
 intrigue_temptation.3130.desc: "[rival_main.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me incita a uma fúria tão cegante que, em alguns dias, mal consigo lembrar por que brigamos. Agora isso importa pouco: tenho seu [rival_spouse.GetWifeHusband] , [rival_spouse.GetFirstName] , em meus braços, suas paixões em chamas.\n\nLogo, entre meus sorrisos sarcásticos e alguns fofoqueiros bem pagos, [rival_main.GetFirstNameNoTooltip] ficará sabendo. Vou me #EMP aseguraré#! de que ele saiba.\n\nUm beijo proibido selará essa rivalidade."
 intrigue_temptation.3130.a: "Querid[rival_spouse.Custom('ES_OA')], j? beijou alguma vez um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] #EMP de verdade#!?"
 intrigue_temptation.3130.a.tt_success: "Um beijo, e depois outro..."
 intrigue_temptation.3130.a.tt_fail: "[rival_spouse.GetFirstNameNoTooltip] se afasta"
 intrigue_temptation.3130.b: "Eu não posso fazer isso."
 saucy_reputation_01_modifier: "Cavalheiro Calcinante"
 saucy_reputation_02_modifier: "Cavalheiro Calcinante"
 saucy_reputation_03_modifier: "Cavalheiro Calcinante"
 #Flirt openly with courtiers, pleasing some and irritating others, by Ewan Cowhig Croft
 intrigue_temptation.3140.t: "Exibindo-se"
 intrigue_temptation.3140.desc: "Nesta manhã, tive um encontro encantador com um[ROOT.Char.Custom('ES_XAOpp')] jovem [ROOT.Char.Custom('OppositeGenderedLowlyServantType')]. Brincamos, rimos e nos separamos com o coração alegre, tudo porque me esforcei para ser um pouco mais afável.\n\nTalvez eu pudesse aplicar esse surto de confiança galante a algo mais do que meus assuntos pessoais?"
 intrigue_temptation.3140.a: "Acho que posso fazer um pouco mais de contato visual..."
 intrigue_temptation.3140.b: "Um toque prolongado provoca a alma."
 intrigue_temptation.3140.c: "Meu simples olhar poderia encantar a [ROOT.Char.GetFaith.DevilName] em pessoa!"
 intrigue_temptation.3140.d: "Tudo isso é insignificante para mim."
 licentious_01_modifier: "Coquete Desajeitado"
 licentious_02_modifier: "Coquete Exagerado"
 licentious_03_modifier: "Coquete Tático"
 licentious_04_modifier: "Coquete Experiente"
 licentious_05_modifier: "Coquete Diabólico"
 #Caught chatting up a courtier, you back out, carry on, or double-down, by Ewan Cowhig Croft
 intrigue_temptation.3150.t: "Pego em Flagrante"
 intrigue_temptation.3150.desc: "O salão está mal iluminado, e [primary_seducee.Custom('ES_ElLa')] [primary_seducee.GetTitledFirstName|l] e eu nos aconchegamos, nossos lábios quase se tocam. O ar noturno é fresco, mas [primary_seducee.GetSheHe] já está quase derretid[primary_seducee.Custom('ES_OA')] ao toque, sua respiração vem em arfadas curtas e irregulares.\n\nNo pior momento possível, [secondary_seducee.Custom2('MyCharacterIntroduction', ROOT.Char)] entra a passos largos na [ROOT.Char.Custom('GetRoom')], já em plena agitação.\n\n“Nobre [ROOT.Char.GetTitleAsNameNoTooltip|l], devemos discutir meu acom… ah. Eu não sabia que vocês estavam acompanhados.”"
 intrigue_temptation.3150.a: "Bem, [primary_seducee.GetFirstNameNoTooltip], não vi você aqui!"
 intrigue_temptation.3150.b: "Estávamos apenas de saída. Para algum lugar mais #EMP privado#!."
 intrigue_temptation.3150.b.tt_success: "[primary_seducee.GetFirstNameNoTooltip] sorri e segue você"
 intrigue_temptation.3150.b.tt_failure: "O clima é arruinado"
 intrigue_temptation.3150.c: "… [secondary_seducee.GetFirstNameNoTooltip], vá até a porta."
 intrigue_temptation.3150.c.tt_success: "Você leva os dois para uma aventura"
 intrigue_temptation.3150.c.tt_success.lovers: "Eu me torno amante de ambos."
 intrigue_temptation.3150.c.tt_failure: "Seguem-se recriminações amargas"
 silver_tongued_modifier: "Língua Prateada"
 quick_thinker_modifier: "Pensador Rápido"
 #Sleep with someone who dislikes you for fun or profit, by Ewan Cowhig Croft
 intrigue_temptation.3160.t: "Extremos da Paixão"
 intrigue_temptation.3160.desc: "«¡[ROOT.Char.Custom2('InsultNoun', SCOPE.sC('sometime_rival'))|U] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('sometime_rival'))]!», grita [sometime_rival.Custom('ES_ElLa')] [sometime_rival.GetTitledFirstName|l], cuspindo saliva por esse buraco imundo que tem na boca. A[sometime_rival.Custom('ES_EA')] [sometime_rival.GetWomanMan] parece ter uma vingança particular contra mim, mas a discussão de hoje é especialmente apaixonada. E arremessada.\n\nEnquanto [sometime_rival.Custom('ES_ElLa')] [sometime_rival.GetTitledFirstNameNoTooltip|l] destila ódio, com o rosto avermelhado e respirando fundo, juraria que seus olhos percorrem meu corpo por um instante, antes de voltarem de repente para encontrar meu olhar.\n\nÉ ira o que #EMP de verdad#! se desenha em seus traços?"
 intrigue_temptation.3160.a: "Avanço e [sometime_rival.Custom('ES_LoLa')] beijo."
 intrigue_temptation.3160.a.tt_success: "Surpres[sometime_rival.Custom('ES_OA')], [sometime_rival.GetShortUINameNoTooltip] retribui"
 intrigue_temptation.3160.a.tt_success.tt: "Depois, resolvemos nossos sentimentos."
 intrigue_temptation.3160.a.tt_fail: "Enojad[sometime_rival.Custom('ES_OA')], [sometime_rival.GetShortUINameNoTooltip] se livra de você"
 intrigue_temptation.3160.b: "Você não vale a atenção de um cachorro, quanto mais a minha."
 intrigue_temptation.3161.desc: "Horas depois, nós dois estamos deitados na cama, completamente exaustos, cercados por lençóis rasgados e móveis quebrados. Pela primeira vez em uma semana, [sometime_rival.Custom('ES_ElLa')] [sometime_rival.GetTitledFirstNameNoTooltip|l] e eu finalmente paramos de discutir.\n\nO peito da minha ex-rival sobe e desce em um ritmo lento e profundo; não tenho dúvidas de que a qualquer momento ela acabará adormecend[sometime_rival.Custom('ES_OA')]."
 intrigue_temptation.3161.a: "Talvez nós dois sempre quiséssemos isso?"
 intrigue_temptation.3161.b: "Já tive noites melhores sentado no meu vaso sanitário!"
 intrigue_temptation.3161.b_flavour: "Agarro as roupas e saio correndo da alcova rindo às gargalhadas."
 intrigue_temptation.3161.c: "[sometime_rival.Custom('ES_LoLa')|U] eu a asfixio enquanto dorme."
 malignant_hearsay_modifier: "Boatos Malignos"
 malignant_hearsay_modifier_desc: "Os criados e o povo simples fofocam que essa pessoa está envolvida em uma morte suspeita."
