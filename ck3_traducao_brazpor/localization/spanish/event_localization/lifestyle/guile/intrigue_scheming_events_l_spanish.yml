 intrigue_scheming.1801.a: "Seria tolice não investigar isso."
 intrigue_scheming.1801.b: "Isso não passa de uma extorsão vazia."
 intrigue_scheming.1801_landed: "Meu [spymaster.GetCouncilTitle] [spymaster.GetFirstName] irrompe na sala"
 intrigue_scheming.1801_laamp: "Meu [GetCourtPositionType('second_camp_officer').GetNameNoTooltip|l] [spymaster.GetFirstName] irrompe em minha tenda"
