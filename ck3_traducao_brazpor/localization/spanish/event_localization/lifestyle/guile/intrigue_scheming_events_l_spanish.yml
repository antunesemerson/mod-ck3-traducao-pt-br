l_spanish:
 available_because_of_dread_tt: "Esta opção está disponível por causa do seu [dread|lE]"
 intrigue_lifestyle_perk_indication: "Você pode ganhar um [perk|lE] do [intrigue_lifestyle|lE]"
 intrigue_scheming_focus_point_clear_gain: "Seu entendimento de [intrigue_lifestyle|lE] aumenta"
 #Play Robin Hood, by Linnéa Thimrén
 intrigue_scheming.1001.t: "Lamento de [county.GetNameNoTierNoTooltip]"
 intrigue_scheming.1001.desc: "\"Precisamos desses recursos para as tropas! Se uma pequena aldeia em [county.GetNameNoTier] tiver que passar fome…\".\n\nA discussão acalorada entre meus conselheiros me segue para fora da sala, e [councillor.Custom('ES_ElLa')] [councillor.GetTitledFirstName|l], representante de [county.GetNameNoTierNoTooltip], me saúda com olhos cansados quando me aproximo."
 intrigue_scheming.1001.a: "Aqui. Este decreto os forçará a te deixarem em paz."
 intrigue_scheming.1001.b: "O que é uma vila no grande esquema das coisas?"
 #Invent code for messages, by Linnéa Thimrén
 intrigue_scheming.1011.t: "Necessidade de Sigilo"
 intrigue_scheming.1011.desc: "“[ROOT.Char.Custom('FormOfAddressForLiege')|U]!”\nViro-me e vejo [council_member.Custom('ES_AlAla')] [council_member.GetTitledFirstName|l] correndo em minha direção, sem fôlego. “Mais um mensageiro foi encontrado morto, [ROOT.Char.Custom('FormOfAddressForLiege')]. A bolsa e a carta foram roubadas.”\n\nPela terceira vez neste ano; a irritação está se transformando em preocupação. E se nossos inimigos estiverem lendo a correspondência entre meus agentes e eu?"
 intrigue_scheming.1011.a: "Envie um criptógrafo, o trabalho começa imediatamente!"
 intrigue_scheming.1011.a.flavor: "Vou trabalhar junto com o criptógrafo para desenvolver um código."
 intrigue_scheming.1011.b: "Preciso ser mais vigilante no futuro."
 intrigue_scheming.1012.desc: "Uma noite longa se transforma em uma madrugada antecipada, sem descanso à vista para mim ou o criptógrafo, [cryptographer.GetTitledFirstName|l].\n\n"
 intrigue_scheming.1012.desc_archimedes: "\"Esta fadiga logo acabaria se tivéssemos Archimedes trabalhando em cifras. Página após página sobre código e criptografia...\""
 intrigue_scheming.1012.desc_al_kindi: "\"Esta fadiga logo acabaria se tivéssemos o trabalho de Al-Kindi em criptografia. Página após página sobre código e criptografia...\""
 intrigue_scheming.1012.desc_ending: "\nOs murmúrios d [cryptographer.GetTitledFirstName|l] chegam até mim através de um nevoeiro de sonolência."
 intrigue_scheming.1012.a: "Temos muito para discutir, você e eu..."
 intrigue_scheming.1012.a.duel_success: "[cryptographer.GetTitledFirstNameNoTooltip|l] e eu desenvolvemos com sucesso um novo código"
 intrigue_scheming.1012.a.duel_failure: "[cryptographer.GetTitledFirstNameNoTooltip|l] não consegue me ensinar a sua arte"
 intrigue_scheming.1012.b: "Me acorde se você encontrar algo."
 intrigue_scheming.1013.desc_alive: "Finalmente, temos algo! Após muitas discussões longas e noites ainda mais longas, [cryptographer.GetTitledFirstName|l] e eu finalmente chegamos a uma conclusão.\n\n"
 intrigue_scheming.1013.desc_dead: "Apesar da perda do criptógrafo, finalmente tenho algo!\n\n"
 intrigue_scheming.1013.desc_transposition: "Um sistema bastante básico, que rearranja as letras em uma palavra, nos servirá melhor. É de extrema importância que o destinatário entenda a mensagem sem grandes atrasos."
 intrigue_scheming.1013.desc_substitution: "Um sistema que substitui letras por números servirá melhor ao nosso propósito, nossos inimigos acharão que é bobagem!"
 intrigue_scheming.1013.desc_cipher: "Um cifra, para que o inimigo acredite que cada mensagem interceptada foi escrita em uma língua estrangeira, nos servirá melhor!"
 intrigue_scheming.1013.a: "Ninguém será capaz de decifrar isso!"
 intrigue_scheming.1013.a.tt: "Você ganha #T [THIS.Var('intrigue_exp_gain_value').GetValue]#! pontos de [intrigue_rigueint|lE]"
 intrigue_scheming.1013.b.tt: "Você ganha #T [THIS.Var('intrigue_exp_gain_value').GetValue]#! pontos de [intrigue_9_14_20_18_9_7_21_5|lE]"
 intrigue_scheming.1013.c.tt: "Você ganha #T [THIS.Var('intrigue_exp_gain_value').GetValue]#! pontos [intrigue_rigueint|lE]"
 intrigue_scheming.1014.desc_alive: "Infelizmente, por mais que eu tenha tentado, fui incapaz de compreender a misteriosa arte criptográfica de [cryptographer.GetTitledFirstName|l]. \n\nEle me garantiu que o código que desenvolveu é seguro, sem sombra de dúvida, mas, ainda assim, não consigo me livrar da sensação de que perdi uma oportunidade de aprimorar minhas habilidades."
 intrigue_scheming.1014.desc_dead: "Com a morte de [cryptographer.Custom('ES_DelDela')] [cryptographer.GetTitledFirstName|l], terei de deixar em suspenso meus esforços para criar um código secreto para trocar informações confidenciais de forma segura. \n\nSó posso esperar que outra oportunidade para melhorar as defesas da minha [ROOT.Char.Custom('GetCourt')] contra atos de espionagem chegue em breve."
 intrigue_scheming.1014.a: "Que pena..."
 #Hired spies construct a report of your castle's weaknesses, by Linnéa Thimrén
 intrigue_scheming.1201.t: "Em Todos os Cantos"
 intrigue_scheming.1201.desc: "Uma noite escura pode realmente dar vida às sombras nos corredores do meu [ROOT.Char.Custom('FortifiedBuilding')]. O risco percebido para visitantes não autorizados aumenta a cada canto desprotegido avistado.\n\nSe eu sozinho consigo ver tantas falhas, imagine o que mais pessoas com uma perspectiva semelhante poderiam fazer!"
 intrigue_scheming.1201.a: "Contratarei um grupo de agentes #EMP discretos#!..."
 intrigue_scheming.1201.b: "Minha perspectiva sozinha é suficiente!"
 intrigue_scheming.1202.desc: ""Então é isso que vocês devem fazer…"\n[hired_spy.GetTitledFirstName|l], um[hired_spy.Custom('ES_XA')] #EMP expert[hired_spy.Custom('ES_OA')]#! nas artes discretas, tem percorrido minha [ROOT.Char.Custom('FortifiedBuilding')], assustando tanto servos quanto cortesãos ao surgir dos cantos mais sombrios.\n\nAglomerados em torno de suas anotações, um plano detalhado para reforçar a segurança começa lentamente a tomar forma."
 intrigue_scheming.1202.a: "Já me sinto muito mais segur[ROOT.Char.Custom('ES_OA')]!"
 intrigue_scheming.1202.b: "Posso ter uso para alguém com seus talentos."
 intrigue_scheming.1202.b.tt: "[hired_spy.GetTitledFirstName] permanece em sua corte"
 intrigue_scheming.1202.c: "Essa informação não pode ser amplamente conhecida, é claro."
 #Meet a merchant from a far away land, by Linnéa Thimrén
 intrigue_scheming.1401.t: "Segredos de Terras Distantes"
 intrigue_scheming.1401.desc_opening: "Ao visitar o mercado local, um mercador de terras distantes chama minha atenção.\n\n"Aproximai-vos, [ROOT.Char.Custom('FormOfAddressForLiege')]! Maravilhai-vos com tesouros jamais vistos antes nestas terras!"
 intrigue_scheming.1401.desc1: "Tive que tomar cuidado para tirar essas belezas de lá. Nunca dormindo com os dois olhos fechados."
 intrigue_scheming.1401.desc2: "Passei de fininho pelos guardas responsáveis por estas preciosidades. Um[ROOT.Char.Custom('ES_XA')] verdadeir[ROOT.Char.Custom('ES_OA')] conhecedor[ROOT.Char.Custom('ES_XA')] de pessoas, sou eu.""
 intrigue_scheming.1401.desc3: "Tive que me misturar com a população para tirar essas belezas de lá, realmente uma experiência assustadora."
 intrigue_scheming.1401.desc_ending: "\n\nEste mercador pode ter mais a me oferecer do que maravilhas de terras distantes."
 intrigue_scheming.1401.a: "Deve ser interessante viajar tanto quanto você!"
 intrigue_scheming.1401.a.tt: "#F Você convence o mercador a compartilhar suas percepções com você.#!"
 intrigue_scheming.1401.a.success: "Você convence o mercador"
 intrigue_scheming.1401.a.failure: "Você não consegue convencer o mercador"
 intrigue_scheming.1401.b: "Ora, vai sim #EMP me dirá#! o que sabe!"
 intrigue_scheming.1401.b.penalty: "Os camponeses ficam irritados com seu comportamento"
 intrigue_scheming.1401.c: "Isso deve cobrir tanto o bibelô quanto as informações."
 #Potential to turn a secret into a hook — or other things, by Petter Vilberg
 intrigue_scheming.1601.t: "O Que Sabemos"
 intrigue_scheming.1601.desc: "Mentiria se dissesse que não foi um pouco agradável ver como se contorcia [blackmailed_vassal.GetTitledFirstName|l] quando eu lhe disse o que sabia.\n\nFalando comigo em particular, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('blackmailed_vassal'))] quer saber o que pode fazer a respeito."
 intrigue_scheming.1601.a: "Um pouco de ouro resolve muita coisa."
 intrigue_scheming.1601.b: "Tenho alguém que quero impressionar..."
 intrigue_scheming.1601.c: "Não há nada a ser feito. Eu só quero que você se preocupe."
 #Gain Intrigue Mentor, by Linnéa Thimrén
 intrigue_scheming.2001.t: "O Professor"
 intrigue_scheming.2001.desc: ""Percebi vosso interesse nas artes do… subterfúgio, [ROOT.Char.Custom('FormOfAddressForLiege')]. Eu poderia ajudar-vos a aprender ainda mais".\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('future_mentor') )], [future_mentor.Custom('ES_ElLa')] [future_mentor.GetTitledFirstName|l], sorri [future_mentor.Custom('quirk_pos_adverb')] ao se juntar a mim em [SelectLocalization( IsLandlessAdventurer(ROOT.Char),ROOT.Char.Custom('GetRandomCampBuilding'),'mis jardines')]. É o máximo de renome que alguém pode alcançar com esse conjunto de habilidades e eu #EMP gustaría#! aprofundar meus conhecimentos de intriga."
 intrigue_scheming.2001.a: "\"Siga em frente.\""
 intrigue_scheming.2001.b: "Seria ingênuo confiar em alguém com suas habilidades."
 #Sneaky person seeks you out (might be an agent), by Linnéa Thimrén
 intrigue_scheming.2101.t: "Perspectiva Intrigante"
 intrigue_scheming.2101.desc: ""Fiquei sabendo, [ROOT.Char.Custom('FormOfAddressForLiege')], que talvez precise de alguém com meus… talentos." Meu nov[sneaky_person.Custom('ES_OA')] conhecid[sneaky_person.Custom('ES_OA')] [sneaky_person.GetTitledFirstName] se aproxima de mim, sorrindo.

"Se meus serviços puderem ser úteis, por favor, não hesite em solicitá-los."" Meu nov[sneaky_person.Custom('ES_OA')] conhecid[sneaky_person.Custom('ES_OA')] [sneaky_person.GetTitledFirstName] se aproxima de mim, sorrindo.

"Você não é a pessoa certa para o trabalho."
 intrigue_scheming.2101.a: "Meu leal [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('sneaky_person') )]"
 intrigue_scheming.2101.b: "Estou nas sombras do meu [ROOT.Char.Custom('GetCourtyard')] vendo meu nov[sneaky_person.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('sneaky_person') )], [sneaky_person.GetTitledFirstName|l] desaparecer na noite.\n\nOutra noite, outro encontro misterioso, e minhas suspeitas sobre est[sneaky_person.Custom('ES_EA')] [sneaky_person.GetWomanMan] só aumentam."
 intrigue_scheming.2102.t: "[sneaky_person.GetFirstNameNoTooltip], o que você está aprontando?!"
 intrigue_scheming.2102.desc: "[sneaky_person.GetSheHe|U] não percebe sua investigação"
 intrigue_scheming.2102.a: "[sneaky_person.GetSheHe|U] percebe que [sneaky_person.Custom('ES_LoLa')] você está investigando"
 intrigue_scheming.2102.a.tt: "Provavelmente não é nada."
 intrigue_scheming.2102.b.tt: ""Será que [sneaky_person.GetFirstNameNoTooltip] trabalha para [sneaky_person_scheme_owner.Custom('ES_ElLa')] [sneaky_person_scheme_owner.GetTitledFirstName|l]?"

Nas [ROOT.Char.Custom('GetChamberPlural')] [sneaky_person.Custom('ES_DelDela')] [sneaky_person.GetTitledFirstName|l] encontro uma carta que não deixa margem para mal-entendidos. [sneaky_person.GetSheHe|U] tem conspirado contra mim, fingindo ser um[sneaky_person.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('sneaky_person') )] leal."
 intrigue_scheming.2102.b: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], o que posso fazer por vós?".\n\nApesar do meu melhor esforço, parece não haver nada sinistro em [sneaky_person.Custom('ES_ElLa')] [sneaky_person.GetTitledFirstName|l], exceto por seus estranhos hábitos noturnos."
 intrigue_scheming.2103.desc_not_noticed: "Às masmorras com [sneaky_person.Custom('ES_ElElla')]!"

Nas [ROOT.Char.Custom('GetChamberPlural')] [sneaky_person.Custom('ES_DelDela')] [sneaky_person.GetTitledFirstName|l] encontro uma carta que não deixa margem para mal-entendidos. [sneaky_person.GetSheHe|U] tem conspirado contra mim, fingindo ser um[sneaky_person.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('sneaky_person') )] leal."
 intrigue_scheming.2103.desc_noticed: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], o que posso fazer por vós?".\n\nApesar do meu melhor esforço, parece não haver nada sinistro em [sneaky_person.Custom('ES_ElLa')] [sneaky_person.GetTitledFirstName|l], exceto por seus estranhos hábitos noturnos."
 intrigue_scheming.2103.a: "Criados e Mestres"
 intrigue_scheming.2103.b: "[hooked_courtier.GetTitledFirstName], [new_target.Custom2('RelationToMe', SCOPE.sC('hooked_courtier'))] [new_target.Custom('ES_ElLa')] [new_target.GetTitledFirstName|l], está firmemente em minhas mãos. No entanto, com a estratégia certa, talvez eu possa ampliar ainda mais minha vantagem.\n\nSerá que eu poderia usar [hooked_courtier.GetFirstName] para estender minha influência sobre [new_target.Custom('ES_ElLa')] [new_target.GetTitleTierName|l]?"
 intrigue_scheming.2103.c: "Enviarei a [hooked_courtier.GetFirstNameNoTooltip] como espião pessoal!"
 #Servants and Masters, by Petter Vilberg
 intrigue_scheming.3001.t: "Aqui está como você vai descobrir os segredos d [new_target.GetFirstNameNoTooltip] com certeza..."
 intrigue_scheming.3001.desc: "Se [new_target.GetFirstNameNoTooltip] tem algum segredo:\n   Revela um dos segredos dele para você\nSe não:"
 intrigue_scheming.3001.a: "Segredo fabricado"
 intrigue_scheming.3001.a.tt: "[hooked_courtier.GetFirstNameNoTooltip] \"encontra\" \"provas\" de um dos Segredos d [new_target.GetFirstNameNoTooltip]"
 intrigue_scheming.3001.b: "Calúnia descoberta"
 intrigue_scheming.3001.b.tt: "Você é a chave para uma bela armadilha, [hooked_courtier.GetFirstNameNoTooltip]!"
 intrigue_scheming.3001.b.success: "Assassinato encenado"
 intrigue_scheming.3001.b.success_tt: "Armadilha falhou"
 intrigue_scheming.3001.b.failure: "Armadilha descoberta"
 intrigue_scheming.3001.c: "[new_target.GetFirstNameNoTooltip] descobre seu envolvimento no assassinato"
 intrigue_scheming.3001.c.success: "Deixar claro o quão facilmente posso alcançar [new_target.Custom('ES_ElElla')]."
 intrigue_scheming.3001.c.failure_secret: "Minha Reputação me Precede"
 intrigue_scheming.3001.c.failure: "Ameaças Vazias"
 intrigue_scheming.3001.c.failure.tt: "Espalhem alguns boatos sobre o quão aterrorizante[ROOT.Char.Custom('ES_XA')] que sou."
 intrigue_scheming.3001.d: "[hooked_courtier.GetTitledFirstName] fez seu trabalho bem! Agora sei do segredo d [new_target.GetTitledFirstName|l], e a dívida d [hooked_courtier.GetFirstName] comigo está paga."
 intrigue_scheming.3001.d.success: "Não foi tão ruim quanto você esperava, não é mesmo?"
 intrigue_scheming.3001.d.failure: "E agora, a chantagem..."
 intrigue_scheming.3001.z: "[hooked_courtier.GetTitledFirstName] não conseguiu encontrar nenhuma prova incriminatória sobre [new_target.GetTitledFirstName|l]. Apesar disso, ess[hooked_courtier.Custom('ES_EA')] to[hooked_courtier.Custom('ES_OA')] insiste que, depois de tanto trabalho, a dívida que tem comigo está totalmente quitada!"
 intrigue_scheming.3003.desc: "Será que não sou tão intimidador quanto eu pensava?"
 intrigue_scheming.3003.a: "[hooked_courtier.GetTitledFirstName] não pude encontrar informações incriminadoras sobre [new_target.GetTitledFirstName|l], então ainda bem que eu mesmo havia preparado algumas.\n\nDe repente, [new_target.GetFirstName] parece assediad[hooked_courtier.Custom('ES_OA')] por rumores malévolos, e acontece que eu tenho todas as provas deles."
 intrigue_scheming.3003.b: "[ROOT.Char.GetFaith.TricksterGodName] ajuda aqueles que se ajudam."
 intrigue_scheming.3004.desc: "[hooked_courtier.GetTitledFirstName] não consegui encontrar informações incriminatórias sobre [new_target.Custom('ES_ElLa')] [new_target.GetTitledFirstName|l]. Infelizmente, os rumores que plantei com tanto cuidado parecem ter surtido pouco efeito, e ninguém acreditaria nas acusações que eu estava pronto para fazer contra [new_target.Custom('ES_ElLa')] [new_target.GetTitleTierName|l].\n\nAlém disso, os rumores falsos foram rastreados até mim!"
 intrigue_scheming.3004.a: "O que são algumas mentiras inofensivas entre amigos?"
 intrigue_scheming.3013.desc: "Os gritos podem ser ouvidos por todo o meu [new_target.Custom('ResidenceBuilding')]. Servos apressados deixam [new_target.Custom('ES_AlAla')] atônit[new_target.Custom('ES_OA')] [new_target.GetTitledFirstName|l] olhando o cadáver ensanguentado de [hooked_courtier.GetTitledFirstName|l] estendido em seus [new_target.Custom('GetChamberPlural')], com a faca ao lado.

"Eu estava so[new_target.Custom('ES_OA')] no jardim, vocês devem acreditar em mim!", insiste [new_target.GetSheHe] diante da multidão de cortesãos que se reúne. Quem acreditaria numa desculpa tão fraca?"
 intrigue_scheming.3013.a: "Eu adoro presentear as pessoas!"
 intrigue_scheming.3014.desc: "Meus esforços para incriminar [new_target.Custom('ES_AlAla')] [new_target.GetTitledFirstName|l] terminaram em desastre! [hooked_courtier.GetFirstName] ainda estava respirando quando os servos [hooked_courtier.GetHerHim] o encontraram sangrando nas [new_target.Custom('GetChamberPlural')] [new_target.Custom('ES_DelDela')] [new_target.GetTitleTierName|l].\n\nQuando [new_target.GetFirstName] chegou, [hooked_courtier.GetFirstName] só lhe restava um último fôlego. "[ROOT.Char.GetTitledFirstName]…"."
 intrigue_scheming.3014.a: "É de matar[hooked_courtier.Custom('ES_LoLa')] se eu já não tivesse feito isso!"
 intrigue_scheming.3021.desc: "Os gritos podem ser ouvidos por todo o meu [new_target.Custom('ResidenceBuilding')]. Servos apressados deixam [new_target.Custom('ES_AlAla')] atônit[new_target.Custom('ES_OA')] [new_target.GetTitledFirstName|l] olhando o cadáver ensanguentado de [hooked_courtier.GetTitledFirstName|l] estendido em seus [new_target.Custom('GetChamberPlural')], com a faca ao lado.

"Minha reputação de conseguir o que quero por quaisquer meios me beneficia enormemente. Com tantos de meus vassalos e servos se acovardando diante de mim, não é preciso muito para convencer os outros a fazer o mesmo.\n\n[hooked_courtier.GetTitledFirstName|l] só precisou encontrar sozinho a [new_target.GetTitledFirstName|l] numa tarde e entregar-lhe uma carta com meu selo. [new_target.GetTitleTierName] entende quão facilmente consigo alcançar [new_target.GetSheHe]."
 intrigue_scheming.3021.a: "Quase uma pena. Eu gosto de convencer as pessoas..."
 intrigue_scheming.3022.desc: "[hooked_courtier.GetTitledFirstName] encontrou uma noite a sós [new_target.Custom('ES_AlAla')] [new_target.GetTitledFirstName|l] e entregou uma carta com meu selo, para deixar claro até onde sou capaz de chegar. No entanto, não teve o efeito esperado. Pelo contrário, [new_target.Custom('ES_AlAla')] [new_target.GetTitleTierName] adora contar a todo mundo minhas "ameaças vazias"!"
 intrigue_scheming.3022.a: "Talvez eu mostre a você o quão vazias elas realmente são..."
 intrigue_scheming.3023.desc: "Tinha de ser perfeito, e ainda assim… Tinham de encontrar [hooked_courtier.Custom('ES_AlAla')] [hooked_courtier.GetTitledFirstName|l] nas [new_target.Custom('GetChamberPlural')] [new_target.Custom('ES_DelDela')] [new_target.GetTitleTierName|l], com a garganta cortada pela faca [new_target.Custom('ES_DelDela')] [new_target.GetTitleTierName|l] num momento em que [new_target.Custom('ES_ElLa')] [new_target.GetTitleTierName|l] não tivesse álibi.\n\nNo entanto, meia dúzia de servos puderam confirmar que naquele dia [new_target.Custom('ES_ElLa')] [new_target.GetTitledFirstName|l] saiu para cavalgar, o que torna impossível que seja [new_target.Custom('ES_ElLa')] assassin[new_target.Custom('ES_OA')]."
 intrigue_scheming.3023.a: "O Peso da Influência"
 intrigue_scheming.3031.desc: "Embora eu aprecie o quão prontamente [vassal_target.GetTitledFirstName|l] faz o que lhe peço, seu [liege_target.Custom2('RelationToMe', SCOPE.sC('liege_target'))] [liege_target.GetTitledFirstName|l] continua fora do meu alcance. Porém [vassal_target.GetFirstName] pode me ajudar a mudar isso."
 intrigue_scheming.3031.a: "Um suserano é responsável pelas ações de seus vassalos..."
 intrigue_scheming.3032.desc: "Medo das Consequências"
 intrigue_scheming.3032.a: "Sem Impressionar"
 #The Weight of Influence, by Petter Vilberg
 intrigue_scheming.3041.t: "Pode ser que [vassal_target.GetFirstNameNoTooltip] não saia completamente iles[vassal_target.Custom('ES_OA')] disso"
 intrigue_scheming.3041.desc: "Mão firme sempre funciona!"
 intrigue_scheming.3041.a: "[liege_target.GetFirstNameNoTooltip] não se intimida"
 intrigue_scheming.3041.a.success: "Não preciso de ajuda para alcançar meus objetivos."
 intrigue_scheming.3041.a.failure: "[liege_target.Custom('ES_ElLa')|U] [liege_target.GetTitledFirstName|l] parece horrorizad[liege_target.Custom('ES_OA')], como se a traição [vassal_target.Custom('ES_DelDela')] [vassal_target.GetTitledFirstName|l] fosse uma #EMP absoluta#! surpresa. "Vocês vão apoiar qualquer demanda dest[ROOT.Char.Custom('ES_EA')]… dest[ROOT.Char.Custom('ES_EA')] [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('liege_target'))]?!"

[vassal_target.GetFirstName] segue o jogo, assentindo severamente… como planejado. Sorrio para meu futuro novo peão. "Nem por um momento acreditem que [vassal_target.Custom('ES_ElElla')] está so[vassal_target.Custom('ES_OA')].""
 intrigue_scheming.3041.b: "Agora, o que eu gostaria que você fizesse..."
 intrigue_scheming.3041.b.torture_desc: ""Não creiais que se me coage tão facilmente!", afirma [liege_target.Custom('ES_ElLa')] [liege_target.GetTitledFirstName|l]. [vassal_target.Custom('ES_ElLa')|U] [vassal_target.GetTitledFirstName|l] parece encolher-se diante de [liege_target.GetSheHe], sem a confiança com a que se ofereceu para apoiar minhas exigências.\n\n[liege_target.GetTitleTierName] frustra minhas últimas esperanças. "Meus [liege_target.Custom('GetFollowerOrVassalPlural')] sabem qual é o seu lugar", e [vassal_target.GetFirstName] o confirma com seu silêncio."
 intrigue_scheming.3041.b.success: "Parece que exagerei nas minhas ações..."
 intrigue_scheming.3041.b.failure: "Eu havia atraído [liege_target.GetTitledFirstName|l] para o calabouço de [vassal_target.GetTitledFirstName|l] a convite do(a) seu/sua [vassal_target.GetTitleTierName]. Lá eu estava esperando, pront[ROOT.Char.Custom('ES_OA')] para torturar nosso convidado em uma demonstração do meu poder. [liege_target.GetFirstName] não reagiu como eu esperava.\n\n"Alguém pensaria que você nunca tivesse feito isso antes!"\nObservei, atônit[ROOT.Char.Custom('ES_OA')] como [liege_target.Custom('ES_ElElla')] assumiu o comando e fez com que [vassal_target.GetFirstName] durasse até o amanhecer. Mas não além disso."
 intrigue_scheming.3041.c: "Que demonstração horrível!"
 intrigue_scheming.3042.desc: "Aprendi tanto!"

[vassal_target.GetFirstName] segue o jogo, assentindo severamente… como planejado. Sorrio para meu futuro novo peão. "Mesmo com os gritos d [vassal_target.GetFirstNameNoTooltip], [liege_target.GetFirstNameNoTooltip] entendeu o recado."
 intrigue_scheming.3042.a: "Eu havia atraído [liege_target.GetTitledFirstName|l] às masmorras de [vassal_target.GetTitledFirstName|l], por convite de seu [vassal_target.GetTitleTierName]. Ali esperei para revelar que nosso anfitrião era um prisioneiro em sua própria casa.

[liege_target.GetFirstName] não ficou tão intimidad[liege_target.Custom('ES_OA')] como eu esperava com a exibição de tortura. "Sua condição degradada jamais vai me assustar, [ROOT.Char.GetTitledFirstName|l]!""
 intrigue_scheming.3043.desc: "Mesmo os apelos d [vassal_target.GetFirstNameNoTooltip] por misericórdia não me alegram depois disso."
 intrigue_scheming.3043.a: "Parece que exagerei nas minhas ações..."
 intrigue_scheming.3051.desc: "Herança Confusa"
 intrigue_scheming.3051.a: "Há dias eu vinha me obsessando com a linhagem [target.GetDynasty.GetName] e agora estou cert[ROOT.Char.Custom('ES_OA')]! É impossível que [target.GetTitledFirstName|l] consiga provar de forma conclusiva a paternidade de seu [target.Custom2('RelationToMe', SCOPE.sC('heir'))], [heir.GetTitledFirstName|l]!

E onde faltam provas, elas podem ser plantadas... É hora de escrever uma nova verdade sobre a origem de [heir.GetFirstName]!"
 intrigue_scheming.3051.b: "[new_father.GetTitledFirstNameNoTooltip|l] seria um excelente pai."
 intrigue_scheming.3052.desc: "[mother.Custom('ES_ElLa')|U] [mother.GetTitledFirstNameNoTooltip|l] teve um caso com um serviçal?! Que vergonha!"
 intrigue_scheming.3052.a: "E eu terei o papel principal!"
 intrigue_scheming.3053.desc: "Eu havia atraído [liege_target.GetTitledFirstName|l] às masmorras de [vassal_target.GetTitledFirstName|l], por convite de seu [vassal_target.GetTitleTierName]. Ali esperei para revelar que nosso anfitrião era um prisioneiro em sua própria casa.

[liege_target.GetFirstName] não ficou tão intimidad[liege_target.Custom('ES_OA')] como eu esperava com a exibição de tortura. "Poderei revelar [heir.GetTitledFirstNameNoTooltip|l] como meu bastard[heir.Custom('ES_OA')]"
 intrigue_scheming.3053.a: "Desrespeito às Linhagens"
 #Fabricate Bastardy, by Petter Vilberg
 intrigue_scheming.3061.t: "Serei capaz de revelar [heir.GetTitledFirstNameNoTooltip|l] como bastard[heir.Custom('ES_OA')] de [commoner_target.GetTitledFirstNameNoTooltip|l]"
 intrigue_scheming.3061.desc: "Há dias eu vinha me obsessando com a linhagem [target.GetDynasty.GetName] e agora estou cert[ROOT.Char.Custom('ES_OA')]! É impossível que [target.GetTitledFirstName|l] consiga provar de forma conclusiva a paternidade de seu [target.Custom2('RelationToMe', SCOPE.sC('heir'))], [heir.GetTitledFirstName|l]!

E onde faltam provas, elas podem ser plantadas... É hora de escrever uma nova verdade sobre a origem de [heir.GetFirstName]!"
 intrigue_scheming.3061.a: "O momento ainda não é adequado."
 intrigue_scheming.3061.b: "#F Você vai guardar esse \"segredo\" por enquanto#!"
 intrigue_scheming.3061.c: "“Hah, que rumores absurdos esses! É simplesmente [ROOT.Char.GetTitledFirstName|l] espalhando mentiras sórdidas.”\n\nMeus agentes me informam de que [new_father.GetTitledFirstName|l] negou qualquer acusação de que [heir.GetTitledFirstName|l] pudesse ser seu [heir.Custom('GetDaughterSon')]."
 intrigue_scheming.3061.d: "\n\n[target.GetTitledFirstName] também não parece acreditar que haja alguma verdade em meus rumores, e me denunciou como um[ROOT.Char.Custom('ES_XA')] mentiros[ROOT.Char.Custom('ES_OA')] infame que carece de respeito pela devida ordem das coisas."
 intrigue_scheming.3061.success: "Eu protesto! Não sinto vergonha nenhuma!"
 intrigue_scheming.3061.c.success_tt: "Meus agentes me informam que até mesmo [target.GetTitledFirstName|l] está em dúvida, e vê [mother.GetTitledFirstName|l], [heir.GetTitledFirstName|l] e [commoner_target.GetTitledFirstName|l] com desconfiança."
 intrigue_scheming.3061.failure: ""Como se eu fosse deixar um[commoner_target.Custom('ES_XA')] plebeu[commoner_target.Custom('ES_OA')] como [commoner_target.GetTitledFirstName|l] me tocar."\n\nMeus agentes me informam de que [mother.GetTitledFirstName|l] não tardou nem um segundo em negar os rumores que tentei espalhar sobre [mother.Custom('ES_ElElla')]."
 intrigue_scheming.3061.a.success_tt: "As datas, as viagens, a possibilidade de encontros secretos… Tudo está aí, e com os rumores que eu espalhei, até mesmo [target.GetTitledFirstName|l] está sentindo alguma dúvida sobre a paternidade de [heir.GetTitledFirstName|l].\n\nÉ só uma questão de tempo até que alguém chegue à conclusão de que sou um candidato plausível…"
 intrigue_scheming.3061.b.success_tt: "Venha cá, [heir.GetFirstNameNoTooltip]!"
 intrigue_scheming.3062.opening: "Tudo a seu tempo. Tudo a seu tempo."
 intrigue_scheming.3062.ending: "Com todos os rumores que venho espalhando sobre [mother.Custom('ES_ElElla')], não esperava ver [mother.GetTitledFirstName|l] pessoalmente.\n\n"Como ousam dizer tais atrocidades sobre mim e meu [heir.Custom('GetDaughterSon')]?" As palavras dela não doem nem de perto tanto quanto o tapa inesperado com que me acerta o rosto. "Isso é o mais perto que vocês jamais chegarão de tocar em mim!""
 intrigue_scheming.3062.a: "Parece que subestimei meus oponentes..."
 intrigue_scheming.3062.b: "O momento ainda não é adequado."
 intrigue_scheming.3062.b.tt: "Interrogatório"
 intrigue_scheming.3063.opening: "Com base nas informações que reuni, suspeito fortemente de que [prisoner.GetTitledFirstName|l] conhece um segredo que eu desconheço. O fato de tê-[prisoner.GetHerHim] cativ[prisoner.Custom('ES_OA')] neste momento me dá a oportunidade perfeita de usar quaisquer métodos que eu desejar para descobrir exatamente do que se trata…"
 intrigue_scheming.3063.ending: "Oferecer a liberdade de[prisoner.GetHerHim] em troca de informações."
 intrigue_scheming.3063.a: "[prisoner.GetTitledFirstName] aceita minha oferta"
 intrigue_scheming.3064.ending: "[prisoner.GetTitledFirstName] rejeita minha oferta"
 intrigue_scheming.3065.opening: "Jogos mentais frequentemente revelam muito..."
 intrigue_scheming.3066.desc: "Engano a [prisoner.GetTitledFirstName|l] para que me diga o que sabe"
 intrigue_scheming.3066.a: "[prisoner.GetTitledFirstName] consegue resistir aos meus truques mentais"
 intrigue_scheming.3066.b: "Ameaço torturar [prisoner.GetHerHim] a menos que confesse!"
 intrigue_scheming.3067.opening: "Minhas ameaças assustam a [prisoner.GetTitledFirstName|l] e confessa"
 intrigue_scheming.3067.a: "Minhas ameaças não parecem abalar [prisoner.GetTitledFirstName|l]"
 #Interrogation, by Sean Hughes
 intrigue_scheming.4021.t: "Não descubro nada de importante"
 intrigue_scheming.4021.desc: "Com base nas informações que reuni, suspeito fortemente de que [prisoner.GetTitledFirstName|l] conhece um segredo que eu desconheço. O fato de tê-[prisoner.GetHerHim] cativ[prisoner.Custom('ES_OA')] neste momento me dá a oportunidade perfeita de usar quaisquer métodos que eu desejar para descobrir exatamente do que se trata…"
 intrigue_scheming.4021.a: "Suspeita Passageira"
 intrigue_scheming.4021.a.success: "É um fato bem conhecido que os [ROOT.Char.Custom('GetCourtierPlural')] conspiram e tramam, mas talvez eu possa usar isso a meu favor.\n\nSe eu puder manter meus cortesãos suspeitos uns dos outros e ocupados com conflitos internos, eles não terão tempo nem recursos para conspirar contra mim!"
 intrigue_scheming.4021.a.failure: "Começarei a espalhar rumores imediatamente!"
 intrigue_scheming.4021.b: "Os rumores fazem com que meus [ROOT.Char.Custom('GetCourtierPlural')] desconfiem uns dos outros"
 intrigue_scheming.4021.b.success: "[courtier_1.GetFirstName], [courtier_2.GetFirstName] e [courtier_3.GetFirstName] perdem #N [EmptyScope.ScriptValue('medium_positive_opinion')|N0]#! de [opinion|E] recíproca."
 intrigue_scheming.4021.b.failure: "Os rumores que espalhei em minha [ROOT.Char.Custom('GetCourt')] criaram desconfiança entre vários de meus [ROOT.Char.Custom('GetCourtierPlural')]"
 intrigue_scheming.4021.c: "Os rumores são considerados como bobagens sem sentido"
 intrigue_scheming.4021.c.success: "Os rumores que você espalhou em sua [ROOT.Char.Custom('GetCourt')] foram considerados como bobagens sem sentido"
 intrigue_scheming.4021.c.failure: "Desde que eu coloque alguns espiões entre eles, estarei seguro."
 intrigue_scheming.4021.success: "Meus [ROOT.Char.Custom('GetCourtierPlural')] já sabem que não devem conspirar contra mim!"
 intrigue_scheming.4021.failure: "Essa opção está disponível devido ao seu alto [dread|lE]."
 #Passing Suspicion, by Sean Hughes
 intrigue_scheming.4040.t: "Corretagem de Informações"
 intrigue_scheming.4040.desc: "Espero que [buyer.GetTitledFirstName|l] se interesse vivamente pela informação que obtive, indicando que…"
 intrigue_scheming.4040.a: "sua [buyer.Custom2('RelationToMeShort', SCOPE.sC('owner'))]; [owner.GetTitledFirstName|l]; está dormindo com [target.GetTitledFirstName|l]…"
 intrigue_scheming.4040.a.success: "seu [buyer.Custom2('RelationToMeShort', SCOPE.sC('owner'))]; [owner.GetTitledFirstName|l] e [owner.Custom2('RelationToMeShort', SCOPE.sC('target'))] de [owner.GetFirstNameNoTooltip]; [target.GetTitledFirstName|l] mantêm relações sexuais…"
 intrigue_scheming.4040.a.success.tt: "sua [buyer.Custom2('RelationToMeShort', SCOPE.sC('owner'))], [owner.GetTitledFirstName|l] está grávida de [target.GetTitledFirstName|l]…"
 intrigue_scheming.4040.a.success.desc: "seu [buyer.Custom2('RelationToMeShort', SCOPE.sC('target'))] [target.GetTitledFirstName|l] foi gerad[target.Custom('ES_OA')] na verdade por [target.GetRealFather.GetTitledFirstName|l]…"
 intrigue_scheming.4040.a.failure: "[owner.GetTitledFirstName] estava por trás de uma tentativa frustrada de assassinar [target.GetTitledFirstName|l]…"
 intrigue_scheming.4040.a.failure.tt: "[owner.GetTitledFirstName] esteve por trás de uma conspiração fracassada para assassinar[target.Custom('ES_LoLa')]…"
 intrigue_scheming.4040.b: "[owner.GetTitledFirstName] assassinou seu [buyer.Custom2('RelationToMeShort', SCOPE.sC('target'))] [target.GetTitledFirstName|l]…"
 intrigue_scheming.4040.c.dread: "\n\nTalvez até se interesse o suficiente para me oferecer algo substancial em troca, não?"
 intrigue_scheming.4040.c.dread.tt: "Verei a informação por ouro."
 #Information Brokering, by Sean Hughes
 intrigue_scheming.4050.t: "[buyer.GetTitledFirstName] lhe revelará um segredo que conhece"
 intrigue_scheming.4050.desc.start: "Eu só contarei a [buyer.Custom('ES_ElElla')] em troca de um favor."
 intrigue_scheming.4050.desc.lover: "Que isso sirva como uma oferta de paz entre nós."
 intrigue_scheming.4050.desc.incest: "Sua boa vontade é o único pagamento de que preciso."
 intrigue_scheming.4050.desc.pregnancy: "O conhecimento é poder, e não o darei tão facilmente."
 intrigue_scheming.4050.desc.bastard: "[buyer.GetTitledFirstName] aceita sua oferta"
 intrigue_scheming.4050.desc.murderattempt: "[buyer.GetTitledFirstName] rejeita sua oferta"
 intrigue_scheming.4050.desc.murderattemptself: "[seller.GetTitledFirstName] se aproximou de mim, afirmando que descobriu"
 intrigue_scheming.4050.desc.murder: "que alguém de minha família próxima está tendo um caso extraconjugal."
 intrigue_scheming.4050.desc.end: "que a continuidade da legitimidade de minha linhagem está em risco, a menos que eu tome medidas."
 intrigue_scheming.4050.a: "quem estava por trás de uma trama de assassinato fracassada contra [target.GetTitledFirstName|l]."
 intrigue_scheming.4050.b: "quem estava por trás de uma trama de assassinato fracassada contra mim."
 intrigue_scheming.4050.b.tt: "quem estava por trás do assassinato de meu [buyer.Custom2('RelationToMeShort', SCOPE.sC('target'))] [target.GetTitledFirstName|l]."
 intrigue_scheming.4050.c: "a existência de relações incestuosas dentro da minha própria família!"
 intrigue_scheming.4050.c.rival: "\n\n[seller.Custom('ES_ElElla')|U] se ofereceu para me fornecer tudo o que sabe, inclusive nomes e provas…"
 intrigue_scheming.4050.c.opinion: "em troca de uma quantia em ouro."
 intrigue_scheming.4050.d: "em troca dos detalhes de outro segredo que eu sei."
 intrigue_scheming.4050.success: "em troca de um favor a ser prestado futuramente."
 intrigue_scheming.4050.failure: "como uma oferta de paz entre nós, para que possamos deixar nossa rixa de lado."
 intrigue_scheming.4051.desc.start: "como um gesto de boa vontade."
 intrigue_scheming.4051.desc.lover: "Eu preciso saber a verdade!"
 intrigue_scheming.4051.desc.bastard: "Você descobre os detalhes desse segredo desconhecido"
 intrigue_scheming.4051.desc.murderattempt: "Realmente muito generoso!"
 intrigue_scheming.4051.desc.murderattemptself: "Algumas pedras são melhor deixadas intocadas..."
 intrigue_scheming.4051.desc.murder: "Com o atrativo dos segredos que eu detinha sendo irresistível, [buyer.GetTitledFirstName|l] concordou com minha oferta. Se eu continuar bisbilhotando por aí, posso conseguir mais acordos como este no futuro..."
 intrigue_scheming.4051.desc.incest: "Há muito potencial aqui!"
 intrigue_scheming.4051.desc.middle: "É difícil saber se [buyer.GetTitledFirstName|l] acreditou em mim ou não quando lhe disse que tinha informações sobre sua família. Em qualquer caso, recusou minhas condições e me deixou de mãos vazias."
 intrigue_scheming.4051.desc.gold: "Terei que encontrar outras maneiras de usar essas informações..."
 intrigue_scheming.4051.desc.secret: "Após examinar os documentos que recebi d [seller.GetTitledFirstName|l], fica claro"
 intrigue_scheming.4051.desc.favor: "meu [buyer.Custom2('RelationToMeShort', SCOPE.sC('owner'))]; [owner.GetTitledFirstName|l] está dormindo com [target.GetTitledFirstName|l]!"
 intrigue_scheming.4051.desc.rival: "que m [buyer.Custom2('RelationToMeShort', SCOPE.sC('owner'))], [owner.GetTitledFirstName|l], e m [buyer.Custom2('RelationToMeShort', SCOPE.sC('target'))], [target.GetTitledFirstName|l], têm relações sexuais entre eles!"
 intrigue_scheming.4051.desc.opinion: "que m [buyer.Custom2('RelationToMeShort', SCOPE.sC('owner'))], [owner.GetTitledFirstName|l], está grávida do filho d [target.GetTitledFirstName|l]!"
 intrigue_scheming.4051.a: "meu [buyer.Custom2('RelationToMeShort', SCOPE.sC('target'))] , [target.GetTitledFirstName|l] foi gerad[target.Custom('ES_OA')] na verdade por [target.GetRealFather.GetTitledFirstName|l]!"
 intrigue_scheming.4051.a.tt: "[owner.GetTitledFirstName] estava por trás de uma tentativa de assassinato de [target.GetTitledFirstName|l]!"
 intrigue_scheming.4051.a.opinion: "![owner.GetTitledFirstName] estava por trás de uma tentativa fracassada de me assassinar!"
 intrigue_scheming.4051.b: "[owner.GetTitledFirstName] assassinou meu [buyer.Custom2('RelationToMeShort', SCOPE.sC('target'))][target.GetTitledFirstName|l]!"
 intrigue_scheming.4052.desc: "Pelo menos agora eu sei."
 intrigue_scheming.4052.a: "Inatural! Uma afronta a [ROOT.Char.GetFaith.HighGodName]!"
 intrigue_scheming.4053.desc: "Uau, muito atraente!"
 intrigue_scheming.4053.a: "O que há de errado com isso, exatamente?"
 intrigue_scheming.4054.desc.start: "Que[owner.Custom('ES_EA')] maldit[owner.Custom('ES_OA')] manipulador[owner.Custom('ES_OA')]!"
 intrigue_scheming.4054.desc.lover: "Fui traído!"
 intrigue_scheming.4054.desc.incest: "que m [buyer.Custom2('RelationToMeShort', SCOPE.sC('owner'))], [owner.GetTitledFirstName|l], e m [buyer.Custom2('RelationToMeShort', SCOPE.sC('target'))], [target.GetTitledFirstName|l], têm relações sexuais entre eles!"
 intrigue_scheming.4054.desc.pregnancy: "Representar um Papel"
 intrigue_scheming.4054.desc.bastard: "Um sussurro ouvido por acaso e um olhar severo são as últimas peças que completam o quebra-cabeça. Meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('courtier_spy'))] [courtier_spy.GetTitledFirstName|l] está mais versad[courtier_spy.Custom('ES_OA')] na arte da intriga do que ninguém teria imaginado.\n\nPensar que há uma pessoa assim na corte me deixa bastante nervoso. No entanto, posso aprender muito se conseguir que [courtier_spy.Custom('ES_ElElla')] confie em mim."
 intrigue_scheming.4054.desc.murderattempt: "![courtier_spy.GetHerHim|U] convencerei de que somos da mesma madeira!"
 intrigue_scheming.4054.desc.murderattemptself: "O risco é grande demais, #EMP no#! posso confiar em #EMP [courtier_spy.Custom('ES_ElElla')]#!."
 intrigue_scheming.4054.desc.murder: "![courtier_spy.Custom('ES_ElElla')|U] precisa ir embora!"
 intrigue_scheming.4054.a: "Leva muitos dias, mas por fim eu me deparo por #EMP acaso#! com [courtier_spy.GetTitledFirstName|l] quando está sol[courtier_spy.Custom('ES_OA')]. "[courtier_spy.GetLadyLord|U] [courtier_spy.GetTitledFirstNameNoTooltip|l], eu justamente queria…"
"Se entrásseis em uma sala e voss[ROOT.Char.Custom('ES_OA')] cônjuge estivesse gritando com um pajem por derrubar um prato, o que faríeis?"

Será que está me pondo à prova? Talvez esta seja minha oportunidade de convencer [courtier_spy.GetHerHim] de que temos muito em comum."
 intrigue_scheming.4054.a.incest: "O pajem seria punido, é claro."
 intrigue_scheming.4054.a.incest.deviant: "Todos cometem erros, eu perdoaria o pajem."
 intrigue_scheming.4054.a.incest.accepted: "Ambos teriam que me contar o que aconteceu."
 intrigue_scheming.4054.a.murder: "Tenho certeza de que eles poderiam resolver isso melhor sem mim."
 intrigue_scheming.4054.a.bastard: "Eu incentivaria a conversa, isso resolve a maioria dos problemas."
 #Special Chain — Convince Courtier to Share Spy-Secrets
 intrigue_scheming_special.1001.t: "Eu me juntaria aos gritos!"
 intrigue_scheming_special.1001.desc: "Eu pediria para ambos apresentarem seu lado do conflito."
 intrigue_scheming_special.1001.a: ""Hum". [courtier_spy.Custom('ES_ElElla')|U] pausa, pensativo, antes de continuar.\n\n"
 intrigue_scheming_special.1001.b: ""Hmm". [courtier_spy.Custom('ES_ElElla')|U] pausa, grimace como se estivesse provando algo azedo, antes de continuar.\n\n"
 intrigue_scheming_special.1001.c: "\"No meio de uma marcha para a batalha, assim que você está montando acampamento, um oficial se aproxima de você para perguntar o que deve ser feito com um espião que foi capturado.\""
 intrigue_scheming_special.1002.desc: "Dê um exemplo com o espião!"
"Primeiro, eu me certificaria de que o espião é bem tratado."

Será que está me pondo à prova? Talvez esta seja minha oportunidade de convencer [courtier_spy.GetHerHim] de que temos muito em comum."
 intrigue_scheming_special.1002.a: "Eu falaria com o espião, veria o que ele tem a dizer."
 intrigue_scheming_special.1002.b: "Eu pediria para o oficial cuidar disso e me deixar em paz."
 intrigue_scheming_special.1002.c: "Um espião?! Isso nunca aconteceria!"
 intrigue_scheming_special.1002.d: "Obviamente, o espião tem algumas respostas a dar, a seu devido tempo."
 intrigue_scheming_special.1002.e: "[courtier_spy.Custom('ES_ElElla')|U] acena antes de pintar o próximo cenário.\n\n"
 intrigue_scheming_special.1002.f: "As sobrancelhas se franzem e o olhar se torna frio.\n\n"
 intrigue_scheming_special.1002.g: "\"Você toma uma decisão — digamos, que todos os impostos em um condado serão aumentados — e você toma conhecimento de que um de seus vassalos questiona abertamente essa decisão. Como você reage?\""
 intrigue_scheming_special.1002.h: "A punição é a única opção."
 intrigue_scheming_special.1003.desc_good: "Todos temos nossas diferenças, isso não me incomodaria."
 intrigue_scheming_special.1003.desc_bad: "Ninguém me questiona assim! Eu confrontaria o vassalo."
 intrigue_scheming_special.1003.desc: "Se meu vassalo acha que é uma má decisão, então provavelmente é."
 intrigue_scheming_special.1003.a: "Toda a corte ouviria sobre cada erro do vassalo."
 intrigue_scheming_special.1003.b: "Eu tentaria ignorar a afronta, não há necessidade de fazer um escândalo."
 intrigue_scheming_special.1003.c: "Bem, eu os confrontaria. Em voz alta."
 intrigue_scheming_special.1003.d: "Uma diferença de opinião deve ser resolvida por meio de discussão."
 intrigue_scheming_special.1003.e: "Seu rosto se ilumina com um sorriso surpreendentemente caloroso. "Você parece ser um [ROOT.Char.GetWomanMan] de bom senso".\n\n[courtier_spy.Custom('ES_ElElla')|U] [courtier_spy.Custom('quirk_pos_present')], antes de percorrer o corredor com passos silenciosos. "Por favor, junte-se a mim. Temos muito a conversar"."
 intrigue_scheming_special.1003.f: "[courtier_spy.Custom('ES_ElElla')|U] franze a testa e dá um passo atrás. "Agradeceria que não voltassem a me importunar com isso".\n\nAntes que eu tenha tempo de responder, [courtier_spy.Custom('ES_ElElla')] já começou a percorrer o corredor e cada passo [courtier_spy.GetHerHim] o oculta ainda mais nas sombras."
 intrigue_scheming_special.1003.g: "É melhor eu manter essa farsa, pelo menos por enquanto."
 intrigue_scheming_special.1003.h: "[courtier_spy.Custom('ES_ElElla')|U] é um mistério, sem dúvida."
 intrigue_scheming_special.1004.desc_good: "[courtier_spy.Custom('ES_ElElla')|U] acena antes de pintar o próximo cenário.\n\n"
 intrigue_scheming_special.1004.desc_bad: "Perseguido pelas Sombras"
 intrigue_scheming_special.1004.desc: "Passos ecoando por corredores escuros, papéis fora do lugar em meu estudo, uma sombra vista do canto do olho..."
 intrigue_scheming_special.1004.a: "

"Você acha que alguém está seguindo você?" Minh[mentor_or_other.Custom('ES_XA')] [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('mentor_or_other'))] [mentor_or_other.GetTitledFirstName|l] parece ponderar isso antes de acenar com a cabeça. "Eu também #EMP notei#! recentemente coisas suspeitas no [ROOT.Char.Custom('FortifiedBuilding')].""
 intrigue_scheming_special.1004.b: "Eu preciso chegar ao fundo disso!"
 intrigue_scheming_special.1004.c: "Vou garantir que nunca precise me preocupar com a segurança novamente."
 intrigue_scheming_special.1004.d: "Escondid[ROOT.Char.Custom('ES_OA')] em um dos corredores mais desolados, um que leva aos aposentos mais privados, bem como aos jardins da fortaleza, espero e observo.

#EMP Foi tolice vir aqui? Talvez se eu...#! Passos. Movendo-se em silêncio pelo corredor; uma figura emergindo das sombras.

O que faz [sneaky_courtier.GetTitledFirstName|l] aqui?"
 intrigue_scheming_special.1004.e: "Vou confrontar [sneaky_courtier.Custom('ES_ElElla')] imediatamente!"
 intrigue_scheming_special.1004.f: "Se [sneaky_courtier.GetFirstName] estiver envolvid[sneaky_courtier.Custom('ES_OA')] em uma trama, você a revelará\nSe não, sua tentativa de desmascarar o espião falhará"
 intrigue_scheming_special.1004.g: "Preciso ter certeza. Continuarei seguindo [sneaky_courtier.GetHerHim]."
 intrigue_scheming_special.1004.h: "[sneaky_courtier.GetSheHe|U] não percebe você"
 intrigue_scheming_special.1099.desc_won: "[sneaky_courtier.GetSheHe|U] te ouve quando [sneaky_courtier.Custom('ES_LoLa')] seguias"
 intrigue_scheming_special.1099.desc_lost: "Não me exporei, não pode ser [sneaky_courtier.Custom('ES_ElElla')]."
 intrigue_scheming_special.1099.a: "Você continuará procurando o espião."
 intrigue_scheming_special.1099.b: "Já passou a necessidade de seguir [sneaky_courtier.GetTitledFirstName|l] para descobrir o que [sneaky_courtier.Custom('ES_ElElla')]… já se sabe que é um[sneaky_courtier.Custom('ES_XA')] espião!\n\nCom sorte, conseguirei perceber os sinais ainda mais cedo se isso voltar a acontecer… Foi um conhecimento arduamente conquistado!"
 #Special Chain — Root out secrets at your court, by Linnéa Thimrén
 intrigue_scheming_special.1301.t: "Consigo seguir[sneaky_courtier.GetHerHim] sem fazer barulho e, quando nos aproximamos dos meus aposentos privados, sinto meu pulso acelerar.\n\nLogo o clique da fechadura dos meus aposentos privados ecoa pelo corredor."
 intrigue_scheming_special.1301.desc: "Sigo [sneaky_courtier.GetTitledFirstName|l], sem ser notad[ROOT.Char.Custom('ES_OA')], e, quando nos aproximamos aos meus aposentos privados e aos jardins da fortaleza [ROOT.Char.Custom('FortifiedBuilding')], meu coração acelera. O que [sneaky_courtier.Custom('ES_ElElla')] está fazendo aqui? Distraíd[ROOT.Char.Custom('ES_OA')], derrubo um vaso que enfeita o corredor.

O estrondo que se segue quase encobre os passos apressados de [sneaky_courtier.Custom('ES_ElElla')] sumindo pelo corredor, e [sneaky_courtier.GetSheHe] logo desaparece na noite."
 intrigue_scheming_special.1301.desc_mentor_or_other: "

"Bem, #EMP está#! uma noite adorável hoje."
 intrigue_scheming_special.1301.a: "Você dissipou suas suspeitas, e essa foi uma lição valiosa.\n"
 intrigue_scheming_special.1301.b: "No entanto, eu percebi os sinais cedo!"
 intrigue_scheming_special.1302.desc: "Escondid[ROOT.Char.Custom('ES_OA')] em um dos corredores mais desolados, um que leva aos aposentos mais privados, bem como aos jardins da fortaleza, espero e observo.

#EMP Foi tolice vir aqui? Talvez se eu...#! Passos. Movendo-se em silêncio pelo corredor; uma figura emergindo das sombras.

O que faz [sneaky_courtier.GetTitledFirstName|l] aqui?"
 intrigue_scheming_special.1302.a: "A morte foi uma bênção ou apenas uma coincidência?"
 intrigue_scheming_special.1302.a.tt: ""Por que me acusais de tais coisas?", me pergunta [sneaky_courtier.GetTitledFirstName|l] com uma voz carregada de [sneaky_courtier.Custom('GeneralTemperament')]. "Eu só tinha saído para os jardins para tomar um pouco de ar".\n\nAgora, diante da dor em seus olhos, não sei como pude imaginar que era um[sneaky_courtier.Custom('ES_XA')] espião."
 intrigue_scheming_special.1302.b: "Espero que possa me perdoar."
 intrigue_scheming_special.1302.b.tt1: "Coloco a mão em seu ombro e [sneaky_courtier.GetTitledFirstName|l] se vira como um raio. Apanhad[sneaky_courtier.Custom('ES_OA')] em plena missão, nem sequer tenta se defender.\n\nToda essa experiência me ensinou uma lição valiosa sobre confiança e vigilância, e agora estou mais astut[ROOT.Char.Custom('ES_OA')] do que nunca!"
 intrigue_scheming_special.1302.b.tt2: "[sneaky_courtier.GetSheHe|U] te ouve quando [sneaky_courtier.Custom('ES_LoLa')] seguias"
 intrigue_scheming_special.1302.c: "Duas ou mais das posses do inimigo podem ser sitiadas"
 intrigue_scheming_special.1302.c.tt: "Menos de 2 dos domínios do inimigo podem ser sitiados"
 intrigue_scheming_special.1303.desc_exposed: "Uma Informante Anônima"
 intrigue_scheming_special.1303.desc_sneak_win: "e me entrega uma carta anônima que acabou de receber. Ao que parece, temos uma oportunidade única de obter informações sobre as estratégias defensivas [enemy.Custom('ES_DelDela')] [enemy.GetTitledFirstName|l].\n\nA carta diz:\n\n\"Se desejais informações sobre as defesas de [enemy.GetFirstNameNoTooltip], que seu[spymaster.Custom('ES_OA')] [spymaster.GetCouncilTitle|l] [spymaster.GetFirstNameNoTooltip] se reúna comigo dentro de duas semanas em [meeting_place.GetName]. Tragam bastante ouro\"."
 intrigue_scheming_special.1303.desc_sneak_win_spy: "Seria tolice não investigar isso."
 intrigue_scheming_special.1303.desc_sneak_fail: "Sigo [sneaky_courtier.GetTitledFirstName|l], sem ser notad[ROOT.Char.Custom('ES_OA')], e, quando nos aproximamos aos meus aposentos privados e aos jardins da fortaleza [ROOT.Char.Custom('FortifiedBuilding')], meu coração acelera. O que [sneaky_courtier.Custom('ES_ElElla')] está fazendo aqui? Distraíd[ROOT.Char.Custom('ES_OA')], derrubo um vaso que enfeita o corredor.

O estrondo que se segue quase encobre os passos apressados de [sneaky_courtier.Custom('ES_ElElla')] sumindo pelo corredor, e [sneaky_courtier.GetSheHe] logo desaparece na noite."
 intrigue_scheming_special.1303.a: "[spymaster.GetFirstName] retornou de seu encontro com o informante anônimo. Com uma expressão grave no rosto, [spymaster.GetSheHe] desdobra um feixe de pergaminhos com o que parecem ser as táticas defensivas do meu inimig[enemy.Custom('ES_OA')]."
 intrigue_scheming_special.1303.b: "$intrigue_scheming.1802.intro_desc$\n\nPelo que consigo perceber, esses esquemas dos planos de defesa d [enemy.GetFirstName] parecem tão genuínos quanto poderiam ser."
 intrigue_scheming_special.1303.c: "$intrigue_scheming.1802.intro_desc$\n\nOs esquemas desenhados no pergaminho fazem sentido, mas há algumas discrepâncias que não se encaixam com nosso conhecimento prévio da estratégia típica d [enemy.GetFirstName]."
 intrigue_scheming_special.1303.c.tt: "$intrigue_scheming.1802.intro_desc$\n\nO documento parece genuíno, mas algo parece suspeito... embora eu não consiga identificar exatamente o quê."
 intrigue_scheming_special.1303.d: "$intrigue_scheming.1802.intro_desc$\n\nÉ quase impossível dizer se esses planos são genuínos ou não."
 intrigue_scheming_special.1304.desc_found: "Agir com base nas informações."
 intrigue_scheming_special.1304.desc_not_found: "Ignorar as informações."
 intrigue_scheming_special.1304.a: "$intrigue_scheming.1802.intro_desc$\n\nAo examinar o documento, encontro erros gritantes demais nesses planos para que sejam genuínos. Fui enganado!"
 intrigue_scheming_special.1304.b: "$intrigue_scheming.1802.intro_desc$\n\nAlguns dos detalhes descritos nos planos fazem sentido, mas muitos deles não se encaixam com o que sabemos sobre a estratégia defensiva típica d [enemy.GetFirstName]."
 intrigue_scheming_special.1350.desc: "Agir com base nas informações."
 intrigue_scheming_special.1350.a: "Ignorar as informações."
 intrigue_scheming_special.1398.desc: "Acabam de chegar notícias das forças que sitiavam o [barony.GetName] na guerra contra [enemy.GetTitledFirstName|l]. Eles me contam que as informações que recebemos desse informante anônimo eram verdadeiras!\n\nCom esse conhecimento interno das táticas defensivas de [enemy.GetFirstNameNoTooltip], foram capazes de tomar sua [enemy.Custom('FortifiedBuilding')] em tempo recorde. A vitória parece quase assegurada!"
 intrigue_scheming_special.1398.a: "Acabam de chegar notícias das forças que sitiaram o [barony.GetName] na guerra contra [enemy.GetTitledFirstName|l]. Me dizem que as informações que recebemos desse informante anônimo eram falsas!\n\nNo entanto, foram capazes de tomar sua [enemy.Custom('FortifiedBuilding')], mas o caminho à frente será desafiador."
 intrigue_scheming_special.1399.desc: "Acabam de chegar notícias das forças que sitiavam o [barony.GetName] na guerra contra [enemy.GetTitledFirstName|l]. Contam-me que a informação que recebemos desse informante anônimo era falsa!\n\nGraças a [ROOT.Char.GetFaith.HighGodName] que não decidi agir com base nesses documentos fraudulentos!"
 #An Anonymous Informant by Chad Uhl
 realm_has_more_than_2_siegeable_holdings_trigger_desc: "Devemos perseverar!"
 realm_has_more_than_2_siegeable_holdings_trigger_desc_not: "Tomei a decisão certa."
