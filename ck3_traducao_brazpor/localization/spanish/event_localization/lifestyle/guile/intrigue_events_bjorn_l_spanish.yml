l_spanish:
 #Lessons of the heart
 intrigue_events_bjorn.5100.t: "Lições do coração"
 intrigue_events_bjorn.5100.desc: "Ao olhar para meu querid[the_lover.Custom('ES_OA')] [the_lover.GetFirstName], me ocorre que eu poderia aprender tanto com uma pessoa tão maravilhosa. A mente dele(a) é como um tesouro a ser saqueado; e também tenho uma coisinha ou outra para ensinar a ele(a).\n\nSem mencionar que é um jeito maravilhoso de passar o tempo [Select_CString(And(ROOT.Char.IsFemale, the_lover.IsFemale), 'juntas', 'juntos')]!"
 intrigue_events_bjorn.5100.a: "Meu amor tem tanto a me ensinar."
 intrigue_events_bjorn.5100.b: "Será um[the_lover.Custom('ES_XA')] estudante maravilhos[the_lover.Custom('ES_OA')]."
 intrigue_events_bjorn.5100.c: "Me basta passar o tempo [Select_CString(And(ROOT.Char.IsFemale, the_lover.IsFemale), 'juntas', 'juntos')]."
 #shared interests
 intrigue_events_bjorn.5101.t: "Interesses compartilhados"
 intrigue_events_bjorn.5101.desc: "[the_lover.GetFirstName] me intriga tanto! Quero desfrutar daquilo que lhe traz alegria.\n\nAh, passar dias felizes [Select_CString(And(ROOT.Char.IsFemale, the_lover.IsFemale), 'juntas', 'juntos')]:\n\nAs mãos trabalhando em conjunto, as mentes voltadas para interesses compartilhados.\n\nNossos corações batendo como um só."
 intrigue_events_bjorn.5101.a: "Mostre-me o que inflama suas paixões, meu amor."
 intrigue_events_bjorn.5101.b: "Venha, compartilhe esta alegria comigo."
 intrigue_events_bjorn.5101.c: "Que tal aprendermos algo novo [Select_CString(And(ROOT.Char.IsFemale, the_lover.IsFemale), 'juntas', 'juntos')]?"
 #Dark depths of the soul
 intrigue_events_bjorn.5102.t: "Amar a sombra"
 intrigue_events_bjorn.5102.desc: "À medida que nos aproximamos, agora estamos diante de um limiar. Talvez seja hora de compartilhar tudo entre nós, de verdade, para que possamos saber tudo o que há para saber. Compartilhar coisas que normalmente... não são compartilhadas.\n\nNão há volta depois desse ponto, mas será que [the_lover.GetFirstName] aceitará tudo o que há para saber sobre mim?"
 intrigue_events_bjorn.5102.a: "Tenho tantas coisas para te mostrar."
 intrigue_events_bjorn.5102.b: "Conte-me o que você não compartilhou com mais ninguém."
 intrigue_events_bjorn.5102.c: "Vamos explorar nossas fantasias mais sombrias."
 intrigue_events_bjorn.5102.d: "Não! Algumas coisas jamais devem vir à tona."
