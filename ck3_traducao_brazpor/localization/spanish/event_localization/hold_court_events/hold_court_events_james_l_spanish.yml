l_spanish:
 hold_court.7000.t: "Justa Repartição"
 hold_court.7000.desc: "[local_leader.Custom2('MyCharacterIntroduction', ROOT.Char)|U] perambula pela corte, seus olhos admirando intensamente a riqueza que se pode ostentar na capital.

""Seus súditos já tentaram viver em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip|U]?""
 hold_court.7000.a: ""Isso deveria me interessar? Pois não interessa.""
 hold_court.7000.b: "Duas Fés, Uma Família"
 hold_court.7000.c: "[friendly_neighbour.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra no salão com uma confiança indevida, como se fosse algo além de [Select_CString( friendly_neighbour.IsFemale, 'uma intrusa', 'um intruso' )] em minha benevolente corte [ROOT.Char.GetFaith.GetAdjectiveNoTooltip].

"Bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] [ROOT.Char.GetFirstName], não é segredo que você é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] com muitos inimigos em suas fronteiras, mas gostaria de não estar entre eles, se a sorte me favorecer. Muitos gostariam de ver todos os [ROOT.Char.GetFaith.GetAdherentNamePlural] desaparecerem da região, mas proponho que você e eu tragamos a paz. A questão é bastante simples; você tem um[potential_prince.Custom('ES_XA')] [potential_prince.Custom('GetDaughterSon')], eu tenho um[foreign_princess.Custom('ES_XA')] [foreign_princess.Custom('GetDaughterSon')]. Vamos casar os dois e acabar com as desavenças.""
 hold_court.7010.t: ""Mazel tov!""
 hold_court.7010.desc: "[friendly_neighbour.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra no salão com uma confiança indevida, como se fosse algo além de [Select_CString( friendly_neighbour.IsFemale, 'uma intrusa', 'um intruso' )] em minha benevolente corte [ROOT.Char.GetFaith.GetAdjectiveNoTooltip].

""Tal casamento seria heresia.""
 hold_court.7010.a.jewish: "Cada [county|lE] com pelo menos 10 níveis de [development|lE] abaixo de sua [capital|lE]"
 hold_court.7010.a: "Desenvolvimento Próspero"
 hold_court.7010.b: "Recursos foram recentemente redirecionados para ajudar no crescimento deste condado."
 hold_court.7010.c: "Desenvolvimento Prejudicado"
 every_county_10_dev_below_capital: "Os recursos deste condado estão sendo desviados para partes distantes do reino, prejudicando a qualidade de vida aqui."
 hc_7000_dev_boost: "Preparando-se para Guerra Santa"
 hc_7000_dev_boost_desc: "Este personagem decretou recentemente que todos os descrentes devem ser erradicados de suas terras e arredores."
 hc_7000_dev_reduction: "Casamento Tolerante"
 hc_7000_dev_reduction_desc: "Este personagem recentemente casou um de seus parentes com um membro de uma fé diferente, espalhando sentimentos de tolerância por suas terras."
 hc_7010_holy_war: "O Escudo de [ROOT.Char.GetFaith.GetNameNoTooltip|l]"
 hc_7010_holy_war_desc: "[same_faith_friend.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra hoje em minha corte com uma sombria procissão de [ROOT.Char.GetFaith.PriestNeuterPlural] atrás, entoando preces [ROOT.Char.GetFaith.GetAdjective] tradicionais pelo caminho.

"Bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], você e eu sabemos que os antigos costumes estão ameaçados."
 hc_7010_tolerance: "Incontáveis seguidores de [ROOT.Char.GetFaith.HighGodName|U] foram subjugados sob [threatening_ruler.GetName], e o risco de conversão forçada cresce a cada dia."
 hc_7010_tolerance_desc: "Suas terras foram profanadas por mãos [threatening_ruler.GetPrimaryTitle.GetAdjectiveNoTooltip|U], e os templos de [ROOT.Char.GetFaith.HighGodNamePossessive|U] foram queimados."
 hold_court.7020.t: "Nossas terras sagradas permanecem fora de nosso alcance, e temo que os fiéis talvez nunca possam visitar os lugares escolhidos de [ROOT.Char.GetFaith.HighGodNamePossessive|U] nesta terra."
 hold_court.7020.desc.intro: "[same_faith_friend.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra hoje em minha corte com uma sombria procissão de [ROOT.Char.GetFaith.PriestNeuterPlural] atrás, entoando preces [ROOT.Char.GetFaith.GetAdjective] tradicionais pelo caminho.

""Permaneçam fortes, não devemos sacrificar nossos costumes.""
 hold_court.7020.desc.mid.oppression: ""Juntos podemos preservar os antigos costumes para sempre.""
 hold_court.7020.desc.mid.recent_war: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'rejeitou', 'rejeitou' )] a súplica de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )] por paz religiosa"
 hold_court.7020.desc.mid.holy_site: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'rejeitou', 'rejeitou' )] a súplica de [Select_CString( CHARACTER.IsLocalPlayer, 'seu personagem', CHARACTER.GetShortUIName )] por paz religiosa"
 hold_court.7020.desc.outro: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'deixaram', 'deixaram' )] de lado todas as diferenças religiosas pelo bem da família e da aliança"
 hold_court.7020.a: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'uniram-se', 'uniram-se' )] na fé"
 hold_court.7020.b: "Você pode reformar sua [faith|lE] sem a exigência habitual de possuir [holy_sites|lE]"
 hold_court.7020.c: "[same_faith_friend.GetFirstName|U] se converterá à fé reformada com você."
 rival_planning_holy_war: "Tolerância Religiosa"
 rival_planning_holy_war_corresponding: "Guardião dos Antigos Costumes"
 friend_beyond_faith: "Este personagem se dedicou à proteção e preservação de sua fé."
 friend_united_by_faith: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'uniram-se', 'uniram-se' )] na fé"
 ignore_3_site_rule_tt: "Você pode reformar sua [faith|lE] sem a exigência habitual de possuir [holy_sites|lE]"
 friend_will_convert_tt: "[same_faith_friend.GetFirstName|U] se converterá à fé reformada com você."
 truce_religious_tolerance: "Tolerância Religiosa"
 hc_7020_guardian_of_the_old_ways: "Guardião dos Antigos Costumes"
 hc_7020_guardian_of_the_old_ways_desc: "Este personagem se dedicou à proteção e preservação de sua fé."
