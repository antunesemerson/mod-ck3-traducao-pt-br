 ## The Republic of X
 hold_court.8080.t: "A República de [mayor.GetPrimaryTitle.GetDeJureLiege.GetNameNoTierNoTooltip]"
 hold_court.8080.desc.intro: "[mayor.GetTitledFirstName] avança e prossegue com cautela evidente. \n\nVossa graça, meu [mayor.GetPrimaryTitle.GetTierAsNameNoTooltip] de [mayor.GetPrimaryTitle.GetNameNoTier] enriquece-se com os negócios de nossos burgueses com"
 hold_court.8080.desc.body_sea: "os navios mercantes que singram os portos ao longo da costa de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]\"."
 hold_court.8080.desc.body_fallback: "os comerciantes e viajantes que passam diariamente por [target_county.GetDeJureLiege.GetNameNoTier] e nossos portões."
 hold_court.8080.desc.body: "\n\n\"Nós fizemos a nossa cidade - e você - prósperos, e merecemos maior influência sobre [target_county.GetNameNoTier]."
 hold_court.8080.a: "[target_county.GetNameNoTierNoTooltip] é sua para governar."
 hold_court.8080.b: "Tais privilégios devem ser justificados."
 hold_court.8080.c: "Você está pedindo demais, deve haver algum outro caminho."
 hold_court.8080.c.tt_success: "Você encontra um compromisso"
 hold_court.8080.c.tt_failure: "Você não consegue avançar"
 hold_court.8080.d: "Esteja satisfeito com suas liberdades atuais, [mayor.GetTitleAsNameNoTooltip]."
 hold_court.8080.e: "Parece que os burgueses esqueceram seu lugar."
