l_spanish:
 ## Stifled Commerce
 hold_court.8001.t: "Comércio Abafado"
 hold_court.8001.desc: "Um[merchant.Custom('ES_XA')] mercador provincial dá um passo à frente, claramente fora de seu elemento em meus ricos salões. Faço um gesto: \"Vamos, [merchant.GetWomanMan], não temos o dia todo\". \n\n\"S-sim, meu [ROOT.Char.GetLadyLord]!\", gagueja. \"Eu sou [merchant.GetFirstName], representando os comerciantes e homens livres descontentes de [town.GetNameNoTier], maior [town.GetTierAsNameNoTooltip] de [town.GetDeJureLiege.GetNameNoTier]\". \n\n\"[mayor.GetFirstName] , noss[mayor.Custom('ES_OA')] [mayor.GetTitleTierName|l] [mayor.Custom('get_hold_court_8001_flaw')]; pedimos humildemente que seja substituído por outra pessoa…\"."
 hold_court.8001.a: "A eleição de [town.GetBaseNameNoTierNoTooltip] será antecipada."
 hold_court.8001.b: "De acuerdo, ¡#EMP TÚ#! serás el/la nuev[merchant.Custom('ES_OA')] [mayor.GetTitleTierName]!"
 hold_court.8001.b.tt_success: "[merchant.GetFirstNameNoTooltip] coloca [town.GetBaseNameNoTierNoTooltip] em ordem"
 hold_court.8001.b.tt_failure: "[merchant.GetFirstNameNoTooltip] é ainda pior"
 hold_court.8001.c: "E o que [mayor.GetFirstNameNoTooltip] tem a dizer?"
 hold_court.8001.c.tt_success: "São encontradas provas da incompetência de [mayor.GetFirstNameNoTooltip]"
 hold_court.8001.c.tt_failure: "Os delitos de [mayor.GetFirstNameNoTooltip]"
 hold_court.8001.d: "A coroa compensará os comerciantes da cidade."
 hold_court.8001.e: "Ousais questionar o #EMP [mayor.GetTitleTierName] de [ROOT.Char.GetTitleTierName]?!#!"
 #Custom
 hold_court_8001.desc_lazy: "escapa de todas as responsabilidades e mal cumpre a lei a menos que seja pressionado"
 hold_court_8001.desc_greedy: "cobra tarifas absurdas e multas sufocantes para seu próprio bolso"
 hold_court_8001.desc_arbitrary: "age injustamente, inventando infrações por capricho como se estivesse nos desafiando"
 hold_court_8001.desc_deceitful: "negocia em segredos e mentiras na nossa frente, mesmo em questões simples"
 hold_court_8001.desc_young: "é inexperiente demais[mayor.Custom('ES_OA')] para ter conhecimento suficiente da lei"
 hold_court_8001.desc_incompetent: "não consegue manter nem os registros mais rudimentares"
 hold_court_8001.desc_infirm: "mal consegue sair da cama, muito menos cuidar dos problemas da cidade"
 hold_court_8001.desc_incapable: "não pronuncia uma palavra há semanas, deixando o trabalho se acumular"
 hold_court_8001.desc_old: "já passou por muitos invernos e está perdendo a energia exigida pelo cargo"
 hold_court_8001.desc_fallback: "é um obstáculo para o comércio e os interesses da cidade"
 #Modifiers
 hold_court_8001_deposed_modifier: "Intervenção Cívica"
 hold_court_8001_ignored_modifier: "Comércio Abafado"
 hold_court_8001_compensated_modifier: "Comerciantes Compensados"
 hold_court_8001_merchant_boon_modifier: "Toque do Comerciante"
 hold_court_8001_merchant_bust_modifier: "$hold_court_8001_merchant_boon_modifier$"
 hold_court_8001_imprisoned_modifier: "Representante Preso"
 ## Frontier Lord
 hold_court.8010.t: "A Fronteira do [neighboring_enemy.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 hold_court.8010.desc: "[frontier_lord.Custom('ES_ElLa')|U] [frontier_lord.GetTitledFirstName|l] está diante de você, o rosto carregado de preocupação. \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], não consigo parar de pensar na ameaça de [neighboring_enemy.GetPrimaryTitle.GetNameNoTier]\". \n\n\"[neighboring_enemy.Custom('ES_ElLa')|U] [neighboring_enemy.GetTitledFirstName] espreita do outro lado da fronteira\", ele aponta, \"a apenas poucos dias dos portões de [frontier_barony.GetNameNoTierNoTooltip] e [frontier_lord.Custom('get_hold_court_8010_stake')]\". \n\n\"Deveis ajudar-me a fortificar minhas terras — os soldados e as fortificações de [frontier_lord.GetPrimaryTitle.GetAdjectiveNoTooltip] são tudo o que se interpõe entre [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] e a ruína!\"."
 hold_court.8010.a: "Suas responsabilidades podem justificar privilégios..."
 hold_court.8010.b: "Você fala a verdade, [frontier_lord.GetPrimaryTitle.GetNameNoTierNoTooltip] deve ser fortificada."
 hold_court.8010.c: "#EMP Dias?!#! Devemos fortificar a capital!"
 hold_court.8010.d: "Bobagem, [neighboring_enemy.GetPrimaryTitle.GetNameNoTierNoTooltip] não é uma ameaça."
 hold_court.8010.d.tt_success: "[frontier_lord.GetFirstNameNoTooltip] fica mais tranquil[frontier_lord.Custom('ES_OA')]"
 hold_court.8010.d.tt_failure: "[frontier_lord.GetFirstNameNoTooltip] apresenta um argumento melhor"
 hold_court.8010.e: "Todos nós somos sobrecarregados pelos riscos da guerra."
 #Custom
 hold_court_8010.desc_family: "os lares da Casa [ROOT.Char.GetDynastyHouseNameNoTooltip]"
 hold_court_8010.desc_republic: "os inocentes dentro de seus muros"
 hold_court_8010.desc_theocratic: "os humildes seguidores [ROOT.Char.GetFaith.HighGodNamePossessive]"
 #Modifiers
 hold_court_8010_fortifications_modifier: "Muralhas de Fronteira"
 hold_court_8010_vassal_modifier: "Cargas Compartilhadas"
 ## Sacred Claims
 hold_court.8020.t: "Reivindicações Sagradas"
 hold_court.8020.desc.intro: "[bishop.Custom('ES_ElLa')|U] [bishop.GetCouncilTitle|l] [bishop.GetFirstName] dá um passo à frente solenemente. \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], [ROOT.Char.Custom('get_hold_court_8020_holiness_1')]\"."
 hold_court.8020.desc.body_pope: "\n\n\"Sua santidade [pope.GetTitledFirstNameRegnal] concorda"
 hold_court.8020.desc.body_fallback: "\n\n\"Há acordo"
 hold_court.8020.desc.body_1: "que [ROOT.Char.Custom('get_hold_court_8020_holiness_2')] deve ser inteiramente administrado por [ROOT.Char.GetFaith.AltPriestTermPlural] em vez de leigos.\""
 hold_court.8020.desc.body_personal: "\n\n\"Transfira esta terra para"
 hold_court.8020.desc.body_vassal: "\n\n\"[vassal.GetTitledFirstName|l] deve ceder sua propriedade para"
 hold_court.8020.desc.body_2: "ao cuidado de [ROOT.Char.GetFaith.BishopNeuter] [candidate.GetFirstName], pelo bem da fé e da glória de [ROOT.Char.GetFaith.HighGodName]!\""
 hold_court.8020.a: "[ROOT.Char.Custom('get_hold_court_8020_holiness_3')]"
 hold_court.8020.b: "Os [ROOT.Char.GetFaith.ReligiousText] exigem isso?"
 hold_court.8020.b.tt_success: "Você mostra que não há requisito religioso"
 hold_court.8020.b.tt_failure: "Seus argumentos não são convincentes"
 hold_court.8020.c: "Interessante, e apenas você se beneficiaria disso?"
 hold_court.8020.d: "Não vejo motivo para mudar as coisas."
 hold_court.8020.e: "[pope.GetTitledFirstNameNoTooltip|l] certamente está acima de tais intromissões."
 #Custom
 holiness_cathedral_1: "peregrinos [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] acorrem em massa para o/a [ROOT.Char.Custom('GetFaithGrandTemple')] de [ROOT.Var('holy_site_var').Title.GetNameNoTier] para ficarem mais perto de [ROOT.Char.GetFaith.HighGodNameAlternate]"
 holiness_holy_site_1: "[ROOT.Var('holy_site_var').Title.GetNameNoTierNoTooltip] é um centro vital de peregrinação e adoração [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]."
 holiness_fallback_1: "os fiéis de [ROOT.Var('holy_site_var').Title.GetNameNoTierNoTooltip] clamam por orientação religiosa e salvação de [ROOT.Var('holy_site_var').Title.GetCountyData.GetFaith.DevilName]."
 holiness_cathedral_2: "um [ROOT.Char.GetFaith.HouseOfWorship] tão importante"
 holiness_holy_site_2: "um lugar tão sagrado"
 holiness_fallback_2: "mais de [ROOT.Var('holy_site_var').Title.GetDeFactoTopLiege.GetNameNoTierNoTooltip]"
 holiness_cathedral_3: "O [ROOT.Char.Custom('GetFaithGrandTemple')] pertence a [ROOT.Char.GetFaith.HighGodName]."
 holiness_holy_site_3: "[ROOT.Var('holy_site_var').Title.GetNameNoTierNoTooltip] deve estar nas mãos dos [ROOT.Char.GetFaith.PriestNeuterPlural]."
 holiness_fallback_3: "Eu não vou negar [ROOT.Char.GetFaith.HighGodNameAlternatePossessive] [ROOT.Char.GetFaith.PriestNeuterPlural]."
 hold_court.8031.t: "[sc_victor.GetTitledFirstNameNoTooltip|l] vence o duelo"
 hold_court.8221.imprison_alone: "[assassin.GetTitledFirstName] foi encarcerad[assassin.Custom('ES_OA')]"
 ## Special Treatment
 hold_court.8040.t: "Tratamento Especial"
 hold_court.8040.desc: "Tal infiel impenitente [infidel_vassal.GetTitledFirstName|l] o honra com sua presença. \n\nCom a voz entrecortada, ele começa a falar: «[ROOT.Char.GetTitleTierName|U] meu[ROOT.Char.Custom('ES_OA')], sou um[infidel_vassal.Custom('ES_XA')] súdito[infidel_vassal.Custom('ES_OA')] leal e serviçal, deixai-me praticar minha fé em paz». \n\n"
 hold_court.8040.desc.intro_same_religion: "N?s [infidel_vassal.GetFaith.GetAdherentNamePlural] adoramos [infidel_vassal.GetFaith.CreatorName] assim como os [ROOT.Char.GetFaith.GetAdherentNamePlural]. Deixem que voss[ROOT.Char.Custom('ES_OA')]s [ROOT.Char.Custom('SisterBrother')]s [ROOT.Char.GetFaith.GetAdherentNamePlural] cultuem como quiserem e, em vez disso, unamo-nos contra os perversos [ROOT.Char.Custom('GetUnbelieverNamePlural')] que seguem falsos dem?nios e permitem que [infidel_vassal.GetFaith.DevilName] corrompa seus cora??es."
 hold_court.8040.desc.intro_fallback: "\"Por que [ROOT.Char.GetFaith.GetAdherentNamePlural] e [infidel_vassal.GetFaith.GetAdherentNamePlural] não podem viver em harmonia, separados pelos ensinamentos de [ROOT.Char.GetFaith.HighGodName] e [infidel_vassal.GetFaith.HighGodName], mas unidos na piedade? Sigamos nosso/a [infidel_vassal.GetFaith.ReligiousText] e vocês o/a seu/sua [ROOT.Char.GetFaith.ReligiousText] lado a lado\"."
 hold_court.8040.a: "O julgamento é reservado somente a [ROOT.Char.GetFaith.HighGodName]."
 hold_court.8040.b: "Venha, deixe-me mostrar a palavra de [ROOT.Char.GetFaith.KnowledgeGodName]."
 hold_court.8040.c.religion: "É hora de renunciar a [infidel_vassal.GetFaith.CreatorName] e todas as mentiras [infidel_vassal.GetFaith.GetReligion.GetAdjectiveNoTooltip]!"
 hold_court.8040.c.faith: "Você precisa reler o [ROOT.Char.GetFaith.ReligiousText]!"
 hold_court.8040.c.tt_accept: "[infidel_vassal.GetTitledFirstNameNoTooltip|l] converte a fé"
 hold_court.8040.c.tt_refuse: "[infidel_vassal.GetTitledFirstNameNoTooltip|l] se recusa a converter"
 hold_court.8040.d: "Suas crenças são toleradas, não sancionadas."
 demand_conversion_tt: "[recipient.GetTitledFirstName] e seus familiares próximos irão converter-se à sua religião"
 ## Royal Service
 hold_court.8050.t: "Serviço Real"
 hold_court.8050.desc: "[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima ao trono na companhia de um[knight.Custom('ES_XA')] [knight.GetWomanMan] [knight.Custom('GetYoungMiddleAgedOld')]. \n\n\"Vossa Senhoria!\", diz. \"Meu [ROOT.Char.Custom('FormOfAddressForLiege')|U] busca a honra de servir em vosso séquito de [vassal.Custom2('RelationToMeShort', SCOPE.sC('knight'))] [knight.GetFullName] busca a honra de servir em vosso séquito de [ROOT.Char.Custom('MountedWarriorTermPlural')]. Dai-lhe a oportunidade de provar seu valor!\". \n\n"
 hold_court.8050.desc_talented: "[knight.GetSheHe|U] já é um[knight.Custom('ES_OA')] de [knight.Custom('ES_LoLa')]s duelistas mais renomad[knight.Custom('ES_OA')]s de [vassal.GetTitleAsName] e lhe proporcionará muita glória no campo de batalha! É verdade, já ouvi falar de suas habilidades…"
 hold_court.8050.desc_suitable: "«Est[knight.Custom('ES_EA')] [knight.GetWomanMan] sabe como manejar [knight.Custom('signature_weapon')], e não vai te decepcionar quando importar!»"
 hold_court.8050.desc_passing: "[knight.GetFirstNameNoTooltip] sorri fracamente. \"Embora eu seja apenas um[knight.Custom('ES_XA')] espadach[knight.Custom('ES_InIna')] mediano, espero aprender muito a vosso serviço\"."
 hold_court.8050.desc_unsuitable: "Me puxando de lado, [vassal.GetFirstNameNoTooltip] murmura: \" não é renomad com uma espada, mas seu entusiasmo deve suprir a lacuna...\""
 hold_court.8050.a: "Muito bem, você pode me acompanhar, [knight.GetFirstNameNoTooltip]."
 hold_court.8050.a.tt_knight: "[knight.GetFirstName] se mudará para sua corte e se tornará um [knight|lE]. \nRemover[knight.GetHerHim] pode irritar [vassal.GetTitledFirstName|l]."
 hold_court.8050.a.tt_toast: "[ROOT.Char.Custom('MountedWarriorTerm')|U] [knight.GetNameNoTooltip]"
 hold_court.8050.a.tt_hook: "Porque [vassal.GetTitledFirstName|l] tem um gancho sobre você:"
 hold_court.8050.b: "Para #EMP aceptar[knight.GetHerHim]#! preciso de algo em troca."
 hold_court.8050.c: "[grandmaster.GetTitledFirstNameNoTooltip|l] sempre precisa de [knight.GetWomenMen]!"
 hold_court.8050.d: "Eu encontrei meu Guarda-Costas!"
 hold_court.8050.d.tt_bodyguard: "[knight.GetFirstName] irá para sua corte como seu guarda-costas. \nRemover[knight.GetHerHim] pode desagradar a [vassal.GetTitledFirstName|l]."
 hold_court.8050.e.talented: "Você deveria manter um talento desses por perto, [vassal.GetFirstNameNoTooltip]."
 hold_court.8050.e.suitable: "Hábil, sim. Necessári[knight.Custom('ES_OA')]? Não."
 hold_court.8050.e.passing: "Os cemitérios estão cheios de espadachim[knight.Custom('ES_EA')]s medíocres."
 hold_court.8050.e.unsuitable: "Um jumento de armadura seria mais útil..."
 ## A Knight Spurned
 hold_court.8051.t: "$hold_court.8050.t$: Um[knight.Custom('ES_XA')] [ROOT.Char.Custom('MountedWarriorTerm')] rejeitad[knight.Custom('ES_OA')]"
 hold_court.8051.desc: "Parece que [vassal.GetTitledFirstName|l] descobriu por fim que seu [vassal.Custom2('RelationToMeShort', SCOPE.sC('knight'))] já não desfruta de um lugar entre meus [ROOT.Char.Custom('MountedWarriorTermPlural')]. \n\nContendo sua raiva com cuidado, exige que eu cumpra minha promessa e reintegre [knight.GetFirstName] ao seu posto!"
 hold_court.8051.a: "Acalmai-vos, [vassal.GetFirstNameNoTooltip] , [knight.GetHerHim] reintegrarei!"
 hold_court.8051.a.tt_knight: "[knight.GetFirstName] voltará a se tornar um [knight|lE]"
 hold_court.8051.b: "Não é uma grande perda."
 hold_court.8051.b.tt_return: "[knight.GetFirstNameNoTooltip] retornará à corte de [vassal.GetTitledFirstNameNoTooltip|l]"
 ## The Last Straw
 hold_court.8052.t: "$hold_court.8050.t$: Última Palha"
 hold_court.8052.desc.intro: "[vassal.GetTitledFirstName] não perde tempo ao saber que [knight.GetFirstName] saiu novamente da minha comitiva de [ROOT.Char.Custom('MountedWarriorTermPlural')] e exige uma audiência. \n\n"
 hold_court.8052.desc.wrath: "Em pleno acesso de ira, ele explode: \"Meu [vassal.Custom2('RelationToMeShort', SCOPE.sC('knight'))|l] foi tratado muito mal[knight.Custom('ES_OA')] grosseiramente, e minha confiança em suas promessas foi destruída!\", antes de sair enfurecid[vassal.Custom('ES_OA')] ido."
 hold_court.8052.desc.fallback: "Deixa clara sua decepção, claramente irritad[vassal.Custom('ES_OA')] pela vergonha que minhas ações lhe causaram…"
 hold_court.8052.a: "Ah, que drama!"
 hold_court.8052.b: "Guardas, prendam esse[vassal.Custom('ES_EA')] [vassal.Custom2('InsultNoun', ROOT.Char)]!"
 ## Perils of Glory
 hold_court.8053.t: "$hold_court.8050.t$: Perigos da Prestígio"
 hold_court.8053.desc.intro: "Chegam notícias da [battle_location.Custom('TerrainTypeProvince')] de [battle_location.GetName], onde informam que foi abatido [knight.GetFirstNameNicknamed]"
 hold_court.8053.killer: "por [knight.GetKiller.GetName]"
 hold_court.8053.battle: "no meio do caos do combate"
 hold_court.8053.desc_talented: "em meio a um brilho de glória, rodead[knight.Custom('ES_OA')] pelos corpos de [knight.GetWomenMen] inferiores."
 hold_court.8053.desc_suitable: "apesar de uma luta acirrada, derrubando muitos inimigos e recebendo muitos ferimentos."
 hold_court.8053.desc_passing: "após um duelo persistente, protegendo heroicamente seus companheiros."
 hold_court.8053.desc_unsuitable: "enquanto agitava sua espada como um peixe fora d'água."
 hold_court.8053.desc_coward: "tentando fugir do campo de batalha."
 hold_court.8053.desc.body: "\n\nCertamente isso o libera de suas obrigações para com [vassal.GetTitledFirstName|l]…"
 hold_court.8053.a: "Os riscos do combate..."
 ## A Temple for County
 hold_court.8060.t: "Um [ROOT.Char.GetFaith.HouseOfWorship] de [target_county.GetNameNoTierNoTooltip]"
 hold_court.8060.desc: "Meu [bishop.GetCouncilTitle|l], [bishop.GetFirstName] se curva diante de mim, ansios[bishop.Custom('ES_OA')] para iniciar sua proposta.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U],"
 hold_court.8060.desc.owned: "seu condado [target_county.GetTierAsNameNoTooltip] de [target_county.GetNameNoTier]"
 hold_court.8060.desc.vassal: "o [target_county.GetTierAsNameNoTooltip] de [vassal.GetTitledFirstName|l] de [target_county.GetNameNoTier]"
 hold_court.8060.desc.subvassal: "o [target_county.GetTierAsNameNoTooltip] de [target_county.GetNameNoTier], governado por [subvassal.GetTitledFirstName|l], súdit[subvassal.Custom('ES_OA')] de [vassal.GetTitledFirstName|l],"
 hold_court.8060.desc.existing: "poderia abrigar outro(a) grande [ROOT.Char.GetFaith.HouseOfWorship] como testemunho do poder de [ROOT.Char.GetFaith.HighGodNameAlternatePossessive] e da piedade de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 hold_court.8060.desc.first: "não possui um [ROOT.Char.GetFaith.HouseOfWorship] significativo onde os moradores possam orar e honrar [ROOT.Char.GetFaith.HighGodNameAlternate]."
 hold_court.8060.desc.end: "\n\n\"Você deve ajudar a financiar uma nova casa de culto em [target_province.GetName], em prol da fé [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]!\""
 hold_court.8060.a: "Pela glória de [ROOT.Char.GetFaith.HighGodName]!"
 hold_court.8060.a.tt: "Quando o [temple|lE] estiver concluído:"
 hold_court.8060.b: "[vassal.GetTitledFirstNameNoTooltip|l] pode arcar com a contribuição."
 hold_court.8060.c: "Meus súditos devem contribuir."
 hold_court.8060.d: "Parece um trabalho para [royal_architect.GetTitledFirstNameNoTooltip|l]."
 hold_court.8060.d.tt_success: "[royal_architect.GetTitledFirstName] faz um ótimo trabalho."
 hold_court.8060.d.tt_normal: "[royal_architect.GetTitledFirstName] faz um trabalho adequado."
 hold_court.8060.d.tt_failure: "[royal_architect.GetTitledFirstName] faz um trabalho terrível."
 hold_court.8060.e.own: "Eu tenho outros planos para essa terra."
 hold_court.8060.e.vassal: "Os vassalos devem cuidar de suas próprias terras."
 #Modifiers
 hold_court_8060_built_modifier: "Templo Financiado"
 ## The Consecration of Province
 hold_court.8061.t: "A consagração de [target_province.GetNameNoTooltip]"
 hold_court.8061.desc.bishop: "[bishop.GetCouncilTitleFirstName] entra animadamente[bishop.Custom('ES_OA')] em meus salões: \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], anuncio a conclusão do novo/a [ROOT.Char.GetFaith.HouseOfWorship] de [target_province.GetTitle.GetNameNoTier]!\". \n\n"
 hold_court.8061.desc.fallback: "O [ROOT.Char.GetFaith.HouseOfWorship] que encomendei para o povo de [target_province.GetTitle.GetNameNoTier] está agora completo após muito trabalho.\"\n\n"
 hold_court.8061.desc.owned: "\"Os fiéis de [target_county.GetNameNoTier]"
 hold_court.8061.desc.vassal: "Os súditos de [vassal.GetTitledFirstName|l] em [target_county.GetNameNoTier]"
 hold_court.8061.desc.existing: "se alegram com a piedade de suas obras e a honra concedida a [ROOT.Char.GetFaith.HighGodName]!"
 hold_court.8061.desc.first: "agora podem honrar [ROOT.Char.GetFaith.HighGodName] em um local digno de sua divindade!"
 hold_court.8061.a: "Que [ROOT.Char.GetFaith.HighGodNameAlternate] nos abençoe a todos!"
 ## The Growth of County
 hold_court.8070.t: "O Crescimento de [target_county.GetNameNoTierNoTooltip]"
 hold_court.8070.desc.intro: "[steward.GetCouncilTitleFirstName] está visivelmente motivad[steward.Custom('ES_OA')] por alguma grande proposta.\n\n\"Grande [ROOT.Char.GetTitleAsNameNoTooltip]! Há muito potencial em"
 hold_court.8070.desc.body: "um centro regional para comerciantes e artesãos\". \n\n\"Com fundos para a construção, poderiam ser lançadas as bases para"
 hold_court.8070.desc.existing: "outro"
 hold_court.8070.desc.first: "o primeiro"
 hold_court.8070.desc.end: "uma cidade [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip] poderia ser estabelecida em [target_province.GetName] consolidando vilas."
 hold_court.8070.a: "O comércio deve ser incentivado."
 hold_court.8070.a.tt: "Quando a [city|lE] estiver concluída:"
 hold_court.8070.b: "Só posso ajudar [vassal.GetTitledFirstNameNoTooltip|l]."
 hold_court.8070.c: "Deixe os senhores locais assumirem alguma responsabilidade."
 hold_court.8070.d: "Por fim [royal_architect.GetTitledFirstNameNoTooltip|l] tem algo para fazer."
 hold_court.8070.e: "Há assuntos mais importantes para tratar."
 ## Bustling County
 hold_court.8071.t: "$hold_court.8070.t$: [target_province.GetNameNoTooltip] Movimentada"
 hold_court.8071.desc.steward: "[steward.GetCouncilTitleFirstName] traz orgulhosamente a notícia de que as obras para transformar [target_province.GetName] em um centro de comércio estão, em suas palavras, \"se encaixando!\". \n\n"
 hold_court.8071.desc.fallback: "O desenvolvimento de [target_province.GetName] está dando frutos; em breve a cidade estará de pé. \n\n"
 hold_court.8071.desc.owned: "Os camponeses de [target_county.GetNameNoTier]"
 hold_court.8071.desc.vassal: "Os súditos de [vassal.GetTitledFirstName|l] em [target_county.GetNameNoTier]"
 hold_court.8071.desc.existing: "recebem esses investimentos com satisfação e aguardam a prosperidade que eles trarão para a região."
 hold_court.8071.desc.first: "agora podem exercer suas profissões e realizar comércio mais facilmente neste centro regional."
 hold_court.8071.a: "Um dia, [target_province.GetNameNoTooltip] será uma grande cidade."
