 ## A Place at Court
 hold_court.8090.t: "Um Lugar na Corte"
 hold_court.8090.desc.intro: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('vassal'))] [vassal.GetTitledFirstName|l] me puxa a orelha diante da corte reunida. \n\n\"Glorios[ROOT.Char.Custom('ES_OA')] [vassal.Custom2('RelationToMeShort', ROOT.Char)], concedei-me a honra de [vassal.Custom('GetTargetCourtPositionDesc')]"
 hold_court.8090.desc.intro_advocate: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('vassal_advocate'))] , [vassal_advocate.GetTitledFirstName|l] conduz uma[vassal.Custom('ES_XA')] [vassal.GetWomanMan] [vassal.Custom('GetYoungMiddleAgedOld')] diante da corte reunida. \n\n\"Glorios[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], conceda a meu [vassal_advocate.Custom('ComplimentAdjective')] [vassal_advocate.Custom2('RelationToMeShort', SCOPE.sC('vassal'))], [vassal.GetTitledFirstName|l], a honra de [vassal.Custom('GetTargetCourtPositionDesc')]"
 hold_court.8090.desc.rival: "e livrai-vos de [old_holder.Custom('ES_DelDela')] [old_holder.GetTitledFirstName|l], essa espécie de [old_holder.Custom2('InsultNoun', SCOPE.sC('vassal_advocate'))|l] [old_holder.Custom2('InsultAdjective', SCOPE.sC('vassal_advocate'))]"
 hold_court.8090.desc.arrogant: "— um papel condizente com minha posição"
 hold_court.8090.desc.ambitious: "— uma responsabilidade digna de minhas habilidades"
 hold_court.8090.desc.superior: "um trabalho para o qual [old_holder.GetTitledFirstName|l] não está à altura de[old_holder.Custom('ES_OA')]"
 hold_court.8090.desc.other_advocate: "um cargo que [vassal.GetSheHe] merece muito mais do que [old_holder.GetTitledFirstName|l]"
 hold_court.8090.desc.other: "— uma posição para a qual sou muito mais adequado do que [old_holder.GetTitledFirstName|l]"
 hold_court.8090.desc.empty_advocate: "Não vai vos decepcionar\"."
 hold_court.8090.desc.empty: "— eu não vou te decepcionar."
 hold_court.8090.a.lady_in_waiting_lover: "Ahem, sim, você pode me acompanhar."
 hold_court.8090.a.lady_in_waiting_soulmate: "Que par nós seremos!"
 hold_court.8090.a.bodyguard_lover: "\"Você nunca deve sair do meu lado, [vassal.GetFirstName]."
 hold_court.8090.a.bodyguard_soulmate: "#EMP Ah, meu bravo Patroclo...#!"
 hold_court.8090.a: "Você tem o emprego, [vassal.GetFirstNameNoTooltip]."
 hold_court.8090.b: "[old_holder.GetFirstNameNoTooltip] vai ceder o lugar."
 hold_court.8090.c: "No momento, precisamos de outros talentos."
 move_and_grant_court_position_effect_tooltip: "[candidate.GetFirstNameNoTooltip] ganha um cargo"
 hold_court.8090.d.advocate: "Não, tenho algo #EMP especial#! em mente para [vassal.GetSheHe]…"
 hold_court.8090.d: "Não, eu tenho algo #EMP especial#! em mente para você..."
 hold_court.8090.e.advocate: "[vassal.GetSheHe|U] não é adequad[vassal.Custom('ES_OA')] para o cargo."
 hold_court.8090.e: "Não sois idône[vassal.Custom('ES_OA')] para tal cargo."
 court_position_desc_architect: "gerenciando a manutenção e expansão de suas belas propriedades"
 court_position_desc_seneschal: "cuidando dos arranjos de sua poderosa casa"
 court_position_desc_tutor: "garantindo que seus herdeiros recebam uma educação condizente com sua posição"
 court_position_desc_almoner: "distribuindo suas generosas doações aos necessitados"
 court_position_desc_physician: "encontrando e administrando remédios para a família real"
 court_position_desc_antiquarian: "cuidando dos itens do tesouro real e da armaria"
 court_position_desc_horse: "cuidando da cavalaria real e dos seus cavalos"
 court_position_desc_bodyguard: "protegendo você dos seus inimigos e servindo ao seu lado"
 court_position_desc_champion: "representando sua majestade real em assuntos de honra"
 court_position_desc_hunt: "organizando as caçadas reais e protegendo a caça"
 court_position_desc_poet: "compondo baladas e sonetos dignos de sua majestade"
 court_position_desc_musician: "entretenendo o ouvido real e organizando divertimentos"
 court_position_desc_cupbearer: "servindo suas bebidas e garantindo sua qualidade"
 court_position_desc_lady: "acompanhando pessoalmente como uma fiel companheira"
 court_position_desc_eunuch: "garantindo o bom funcionamento de sua corte"
 court_position_desc_gardener: "cuidando dos jardins e fontes reais"
 court_position_desc_artificer: "criando magníficos artefatos para sua pessoa e corte"
 court_position_desc_emissary: "melhorando as relações com as diferentes culturas do reino"
 court_position_desc_qadi: "garantindo que as leis divinas de Alá sejam seguidas em seu domínio"
 court_position_desc_garuda: "servindo fielmente a você, com a espada em punho, aconteça o que acontecer"
 court_position_desc_keeper_of_swans: "cuidando das aves aquáticas reais, belos símbolos de sua graça"
 court_position_desc_travel_leader: "guiando você em todas as suas viagens"
 court_position_desc_akolouthos: "liderando a guarda imperial, particularmente os imponentes Varangianos."
 court_position_desc_chronicler: "cronificando todos os seus feitos"
 court_position_desc_charioteer: "treinando dia e noite para ser o melhor corredor de todos"
 court_position_desc_bookmaker: "supervisionando a contabilidade de todas as apostas de corridas de bigas"
 court_position_desc_executioner: "distribuindo justiça justa para criminosos e traidores"
 court_position_desc_food_taster: "garantindo que suas refeições sejam deliciosas e livres de adulterações"
 court_position_desc_court_jester: "entretendo a corte com piadas dignas de sua majestade"
 court_position_desc_court_astrologer: "olhando para o céu"
 court_position_desc_wet_nurse: "garantindo o cuidado de seus filhos"
 court_position_desc_cave_hermit: "mantendo sua corte ocupada com histórias e mistérios"
 court_position_desc_master_assassin: "estendendo sua influência entre as sombras"
 court_position_desc_court_scholar: "ampliando o conhecimento do seu reino"
 court_position_desc_boyan: "conduzindo seus exércitos a uma batalha vitoriosa"
 court_position_desc_siege_engineer: "supervisionando a construção de armas de cerco"
 court_position_desc_yurtchi: "preparando seus soldados para a guerra"
 court_position_desc_cherbi: "protegendo-vos com minha vida"
 court_position_desc_yeke_jarquchi: "garantindo que suas leis sejam cumpridas"
 court_position_desc_foreign_emissary: "sendo sua voz em terras estrangeiras"
 court_position_desc_keeper_of_the_horses: "preservando a qualidade de seus corcéis"
 #Interest
 hold_court_8090_interest_architect: "\n\n\"Não tema, a construção de grandes edifícios é uma das minhas paixões\"."
 hold_court_8090_interest_seneschal_administrator: "\n\n\"Pode ficar tranquilo, não há ninguém mais entusiasmado em administrar seus assuntos."
 hold_court_8090_interest_seneschal_eunuch: "\n\n\"Não há nada que me distraia de administrar seus assuntos, eu lhe asseguro."
 hold_court_8090_interest_almoner: "\n\n\"Sólo ao compartilharmos nossos dons terrenos podemos enfrentar o equilíbrio do mal no mundo…\"."
 hold_court_8090_interest_physician_experience: "\n\n\"Pode confiar que tratei muitas enfermidades e feridas: não sou um[vassal.Custom('ES_XA')] charlatão[vassal.Custom('ES_OA')]\"."
 hold_court_8090_interest_physician_mystic: "\n\n\"Manter a saúde requer uma comunhão com poderes além do mundano, deixe-me mostrar a você..."
 hold_court_8090_interest_physician_herbalist: "\n\n\"Meu conhecimento em elixires e bálsamos é bem estabelecido, deixe-me compartilhar meu conhecimento e talento.\""
 hold_court_8090_interest_antiquarian: "\n\n\"Tenho grande interesse pela história e garantirei o legado dos vossos tesouros\"."
 hold_court_8090_interest_horse: "\n\n\"Não temais, nem o menor coxear do vosso corcel favorito escapará à minha atenção!\""
 hold_court_8090_interest_bodyguard_soulmate: "\n\nSeus olhos revelam uma intensidade de emoção que agita meu coração…"
 hold_court_8090_interest_bodyguard_lover: "\n\nÉ difícil não desmaiar sob seu olhar ardente…"
 hold_court_8090_interest_bodyguard_bestie: "\n\nSe há alguém em quem eu possa confiar a tarefa, é [ROOT.Char.GetFirstNameNoTooltip]…"
 hold_court_8090_interest_bodyguard_friend: "\n\nUm aliado tão próximo me servirá bem e fará companhia a mim…"
 hold_court_8090_interest_champion: "\n\n\"Podeis ter certeza de que minha habilidade com a espada é conhecida em todo o [ROOT.Char.GetLiege.GetPrimaryTitle.GetTierAsNameNoTooltip]\"."
 hold_court_8090_interest_hunt: "\n\n“Não há nada de que eu mais goste do que uma boa caçada — isso é bem conhecido por todo o [ROOT.Char.GetLiege.GetPrimaryTitle.GetTierAsNameNoTooltip] conhece”."
 hold_court_8090_interest_poet: "\n\nSou um[vassal.Custom('ES_XA')] trovador[vassal.Custom('ES_XA')] famoso; vossos salões ressoarão com histórias da vossa distinção!\"."
 hold_court_8090_interest_musician_gregarious: "\n\n\"Confie em mim, tornarei seus banquetes ainda mais inesquecíveis!\""
 hold_court_8090_interest_musician_culture: "\n\n\"A cultura [ROOT.Char.GetCulture.GetNameNoTooltip] tem muito a ensinar ao seu povo sobre as artes melódicas\"."
 hold_court_8090_interest_cupbearer: "\n\n\"Não tema, meu suserano. Com meus cuidados, sua taça estará sempre cheia!\""
 hold_court_8090_interest_lady_lover: "\n\nEla pisca para mim com malícia, e mal consigo conter o rubor ao pensar nas oportunidades que isso nos dará…"
 hold_court_8090_interest_lady_soulmate: "\n\nNão há ninguém que eu preferisse ter ao meu lado…"
 hold_court_8090_interest_lady_bestie: "\n\nParece que nunca precisarei me afastar da minha melhor amiga!"
 hold_court_8090_interest_lady_friend: "\n\nUma companhia tão agradável deve ajudar com a monotonia da vida na corte…"
 hold_court_8090_interest_eunuch: "\n\n\"Acredite em mim, não terei distrações do meu trabalho\"."
 hold_court_8090_interest_gardener: "\n\n\"Tenho um grande amor pelas plantas; aprender seus usos e mantê-las felizes!\""
 hold_court_8090_interest_artificer: "\n\n\"Minhas obras estão entre as mais apreciadas do [ROOT.Char.GetLiege.GetPrimaryTitle.GetTierAsNameNoTooltip]\"."
 hold_court_8090_interest_emissary: "\n\n\"Meu histórico em negociações e compromissos é bem estabelecido\"."
 hold_court_8090_interest_qadi: "\n\n\"Não precisa se preocupar, pois sou bem versado em todos os assuntos pertinentes.\""
 hold_court_8090_interest_garuda: "\n\n\"Confio que minha reputação como duelista não tenha passado despercebida por vocês\"."
 hold_court_8090_interest_keeper_of_swans: "\n\n\"Tenho grande experiência com aves de caça, sou a escolha óbvia.\""
 hold_court_8090_interest_friend: "\n\nAh, mas como eu poderia recusar um amig[ROOT.Char.Custom('ES_OA')] como [ROOT.Char.GetFirstNameNoTooltip]?"
 hold_court_8090_interest_bestie: "\n\n[ROOT.Char.GetFirstNameNoTooltip] foi sempre[ROOT.Char.Custom('ES_XA')] amig[ROOT.Char.Custom('ES_OA')] tão bom[ROOT.Char.Custom('ES_OA')] e leal…"
 hold_court_8090_interest_lover: "\n\nÉ difícil resistir à oportunidade de ter [ROOT.Char.GetFirstNameNoTooltip]…"
 hold_court_8090_interest_soulmate: "\n\nÉ difícil negar qualquer coisa a [ROOT.Char.GetFirstNameNoTooltip] , nem mesmo nos melhores momentos…"
 hold_court_8090_interest_other: "\n\nPuede que [vassal.GetSheHe] #EMP encajase#! mejor…"
 hold_court_8090_interest_fallback: "\n\nImagino que #EMP alguém#! terá que fazer esses trabalhos…"
 #Modifiers
 hold_court_8090_favorites_modifier: "Jogando Favoritos"
 ## A Child of the Court
 hold_court.8100.t: "Um Filho da Corte"
 hold_court.8100.desc.intro: "Encontro-me com os olhos tristes de [ward.GetFullNameNicknamed], que se tornam cada vez maiores e mais lastimosos enquanto sua [ward.Custom2('RelationToMeShort', SCOPE.sC('advocate'))], [advocate.Custom('ES_ElLa')] [advocate.GetTitledFirstName|l] [ward.GetHerHim] o conduz gentilmente até meu trono. \n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", lamenta-se, \"est[ward.Custom('ES_EA')] [ward.Custom('GirlBoy')] leva"
 hold_court.8100.desc.vassal: "na corte de [ward.GetLiege.GetFirstName]"
 hold_court.8100.desc.court: "sua"
 hold_court.8100.desc.body: "sem ninguém para cuidar de [ward.GetSheHe] desde [ward.Custom('get_hold_court_8100_situation')] de [ward.Custom('get_hold_court_8100_parent')]. Por favor, cuidem do seu futuro. \n\n"
 hold_court.8100.desc.interest_family: "Depois de tudo, é do meu sangue…"
 hold_court.8100.desc.interest_marriage: "A criança pode ser uma boa combinação para um dos meus..."
 hold_court.8100.desc.interest_alliance: "Talvez venha a ser um[ward.Custom('ES_XA')] aliad[ward.Custom('ES_OA')] útil quando estiver crescido…"
 hold_court.8100.desc.interest_fallback: "O que pode ser feito com est[ward.Custom('ES_EA')] [ward.Custom('GirlBoy')]?"
 hold_court.8100.a: "Sem medo, eu mesmo criarei [ward.Custom('ES_AlAla')] [ward.Custom('GirlBoy')]."
 hold_court.8100.b: "Estou com as mãos ocupadas, mas encontrarei um lar para ela."
 hold_court.8100.c: "[ward.GetFirstNameNoTooltip] será um[ward.Custom('ES_XA')] [ROOT.Char.GetDynastyHouseNameNoTooltip]!"
 hold_court.8100.c.tt_child: "Toda criança"
 hold_court.8100.d: "Criar uma criança não é barato..."
 hold_court.8100.e: "Infelizmente, não é um problema da coroa."
 hold_court.8100.hook.tt: "[ward.GetName] lhe deve um forte [hook|lE] se permanecer seu [ward|lE] até crescer."
 #Modifiers
 hold_court_8100_adopted_modifier: "Plebeu Adotado"
 hold_court_8100_adopted_modifier_desc: "Este personagem foi adotado pela nobreza vindo de origens humildes"
 #Custom
 hold_court_8100_parent_general: "pais"
 hold_court_8100_situation_dead: "morte"
 hold_court_8100_situation_jailed: "prisão"
 hold_court_8100_situation_unknown: "desaparecimento"
 ## Serious Business
 hold_court.8110.t: "Assunto Sério"
 hold_court.8110.desc: "[Select_CString( peasant.IsFemale, 'Uma camponesa', 'Um camponês' )] horripilante se aproxima demais até que um guarda se interpõe entre nós. \"Oooh!\", ele/ela recua com uma piscadela, rindo entre dentes.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], venho de [peasant_holding.GetNameNoTooltip] com um assunto de grande importância!\", diz, movendo as sobrancelhas.\n\n\"Vejam, [ROOT.Char.Custom('FormOfAddressForLiege')],"
 hold_court.8110.desc.affair: "nosso [dummy_male.Custom2('dummy_peasant_profession', ROOT.Char)] tem se envolvido com a prima da irmã da [dummy_female.Custom2('dummy_peasant_profession', ROOT.Char)], e a vila inteira está em alvoroço! E isso faz sete luas! Ou seriam oito...?\" [peasant.GetSheHe|U] acaricia o queixo."
 hold_court.8110.desc.fence: "no tempo do meu avô, o [dummy_male.Custom2('dummy_peasant_profession', ROOT.Char)] cercou o campo do pai da [dummy_female.Custom2('dummy_peasant_profession', ROOT.Char)], mas agora está tudo desabando, e é claro que o neto não quer ter nada a ver com isso!\""
 hold_court.8110.desc.goat: "Tudo começou na última colheita. A cabra de [dummy_male.Custom2('dummy_peasant_profession', ROOT.Char)|U] se meteu na choça da sobrinha da [dummy_female.Custom2('dummy_peasant_profession', ROOT.Char)] e a confusão que se armou foi grande, sem dúvida!\" Ele/ela bate na coxa. \"Ah, você devia ter visto, vossa magnificência!\""
 hold_court.8110.desc.veg: "a porca da [dummy_female.Custom2('dummy_peasant_profession', ROOT.Char)] pulou a cerca uma noite e... foi e entrou na horta de verduras do velho [dummy_male.Custom2('dummy_peasant_profession', ROOT.Char)]! Seu único orgulho e alegria!\" Lágrimas de riso correm pelo rosto convulso de [peasant.Custom('ES_DelDela')] campesin[peasant.Custom('ES_OA')]."
 hold_court.8110.desc.drink: "A irmã da [dummy_female.Custom2('dummy_peasant_profession', ROOT.Char)] jurou que poderia fazer uma [ROOT.Char.Custom('RegionalDrink')] melhor do que a esposa do [dummy_male.Custom2('dummy_peasant_profession', ROOT.Char)], e é claro que eles empataram na competição, e aí os maridos se envolveram!"
 hold_court.8110.a: "Sério? Por favor, continue."
 hold_court.8110.b: "[steward.GetCouncilTitleFirstNameNoTooltip], vá. Resolva isso. Por favor."
 hold_court.8110.c: "Rir de #EMP MIM?#! Para a forca!"
 hold_court.8110.d: "Você é um[peasant.Custom('ES_XA')] idiota. #EMP Mi#! idiota."
 hold_court.8110.e: "O quê? Como esse[peasant.Custom('ES_EA')] campones[peasant.Custom('ES_OA')] entrou aqui? Alguém?"
 #Modifiers
 hold_court_8110_common_modifier: "Próximo ao Povo"
 hold_court_8110_haughty_modifier: "Arrogante"
 hold_court_8110_steward_modifier: "Disputa Resolvida"
 hold_court_8110_execute_modifier: "Pérola Local Executada"
 hold_court_8110_jester_modifier: "Zombaria dos Plebeus"
 ## Evangelical Backlash
 hold_court.8120.t: "Reação Evangelista"
 hold_court.8120.desc: "Dou de cara com um[peasant.Custom('ES_XA')] fiel pobre da fé [peasant.GetFaith.GetAdherentName], em toda humildade e súplica.\n\n\"Glorios[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], venho suplicar que detenhais os sacerdotes que atormentam o povo de [conversion_target.GetNameNoTier] e os pressionam a adotar [ROOT.Char.GetFaith.GetAdherentNamePlural]\".\n\n"
 hold_court.8120.desc.same_religion: "\"Todos seguimos os ensinamentos de [peasant.GetFaith.CreatorName] e em [peasant.GetFaith.CreatorSheHe|U] nos apoiamos para que nos guie e tenha misericórdia. Meu [ROOT.Char.GetLadyLord] , deixai-nos manter nossos ritos locais e viver sem medo da violência ou da censura\"."
 hold_court.8120.desc.same_culture: "Embora possamos ter crenças diferentes, somos todos irmãos e irmãs [peasant.GetCulture.GetName] no final das contas. Se seguimos [peasant.GetFaith.HighGodName] ou [ROOT.Char.GetFaith.HighGodName], não podemos viver juntos em paz?"
 hold_court.8120.desc.other: "\"Somos uma comunidade [peasant.GetCulture.GetName] nossas tradições se diferenciam das da grande nação [ROOT.Char.GetCulture.GetName]. Deixai-nos manter os costumes de nossos antepassados e adorar a [peasant.GetFaith.CreatorName] em paz. Sede clemente, [ROOT.Char.Custom('FormOfAddressForLiege')]\"."
 hold_court.8120.a: "Os sacerdotes [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] deixarão em paz os [peasant.GetFaith.GetAdherentNamePluralNoTooltip]."
 hold_court.8120.a.tt_conversion: "Os condados [peasant.GetFaith.GetAdherentNamePlural] não poderão ser convertidos por 15 anos"
 hold_court_8120_conversion_tt: "Essa fé é tolerada por você"
 hold_court.8120.b: "Temos muito a aprender com os seguidores de [peasant.GetFaith.GetAdherentNamePluralNoTooltip]."
 hold_court.8120.b.tt_eastern: "[THIS.Char.GetFaith.GetName] possui os [core_tenet|lE] $tenet_eastern_syncretism_name$"
 hold_court.8120.b.tt_pagan: "[THIS.Char.GetFaith.GetName] possui os [core_tenet|lE] $tenet_unreformed_syncretism_name$"
 hold_court.8120.b.tt_christianity: "[THIS.Char.GetFaith.GetName] possui os [core_tenet|lE] $tenet_christian_syncretism_name$"
 hold_court.8120.b.tt_islam: "[THIS.Char.GetFaith.GetName] possui os [core_tenet|lE] $tenet_islamic_syncretism_name$"
 hold_court.8120.b.tt_judaism: "[THIS.Char.GetFaith.GetName] possui os [core_tenet|lE] $tenet_jewish_syncretism_name$"
 hold_court.8120.c: "[ROOT.Char.GetFaith.CreatorName] exige pagamento dos não-crentes."
 hold_court.8120.c.tt_tenet: "[THIS.Char.GetFaith.GetName] não possui os [core_tenet|lE] $tenet_tax_nonbelievers_name$"
 hold_court.8120.d: "[ROOT.Char.GetFaith.DevilName] espera por você, [ROOT.Char.Custom2('GetUnbelieverTerm', SCOPE.sC('peasant'))]."
 hold_court.8120.e: "Não."
 #Modifiers
 hold_court_8120_stopped_modifier: "Integração Interrompida"
 hold_court_8120_stopped_modifier_desc: "A pedido do povo, a conversão e a integração foram abandonadas aqui."
 hold_court_8120_tax_modifier: "Taxação Religiosa"
 hold_court_8120_tax_modifier_desc: "Um dízimo especial é cobrado dos infiéis que aqui habitam."
 hold_court_8120_terror_modifier: "Zelo Religioso"
 hold_court_8120_terror_modifier_desc: "A convicção deste personagem deixa pouco espaço para dúvidas."
 hold_court_8120_tolerance_modifier: "Tolerância Religiosa"
 hold_court_8120_tolerance_modifier_desc: "A tolerância deste personagem em relação a outras religiões abre muitas portas."
 hold_court_8120_refused_modifier: "Integração Continua"
 hold_court_8120_refused_modifier_desc: "O povo local ressente a recusa de seu pedido por tolerância."
 ## Cultural Pride
 hold_court.8130.t: "Orgulho Cultural"
 hold_court.8130.desc: "Curvando-se diante de mim está um[peasant.Custom('ES_XA')] camponês[peasant.Custom('ES_OA')] de origem [peasant.GetCulture.GetName]. \n\n\"Majestoso[ROOT.Char.Custom('ES_OA')], em minha bela pátria de [conversion_target.GetNameNoTier] estão nos incentivando a abandonar nossos costumes e adotar os costumes [ROOT.Char.GetCulture.GetName]s\". \n\n"
 hold_court.8130.desc.same_language: "\"Nossos povos já compartilham a bela língua materna [ROOT.Char.GetCulture.GetNameNoTooltip]… Deixemos preservar nossas práticas locais e permanecer fiéis aos nossos antepassados\"."
 hold_court.8130.desc.same_heritage: "\"Nossos povos já compartilham muitas coisas na tradição [ROOT.Char.GetCulture.GetHeritage.GetNameNoTooltip], mas nossas práticas locais são queridas para nós. Por favor, permita-nos permanecer fiéis aos nossos antepassados.\""
 hold_court.8130.desc.same_ethos: "\"Nossos povos já são próximos; também somos um povo [ROOT.Char.GetCulture.GetEthos.GetNameNoTooltip|l]. Vamos manter nossas tradições e viver lado a lado em paz.\""
 hold_court.8130.desc.other: "A tradição [ROOT.Char.GetCulture.GetHeritage.GetNameNoTooltip] nos é estranha e desejamos continuar as tradições de nossos antepassados em paz. Por favor, meu [ROOT.Char.GetLadyLord], deixai-nos em paz."
 hold_court.8130.a: "Esse orgulho é admirável."
 hold_court.8130.a.tt_conversion: "Os condados [peasant.GetCulture.GetName] não podem ser integrados por 15 anos"
 hold_court_8130_conversion_tt: "Essa cultura é tolerada por você"
 hold_court.8130.b: "Nossos povos podem coexistir."
 hold_court.8130.c: "[conversion_target.GetNameNoTierNoTooltip] deve conquistar esse privilégio."
 hold_court.8130.c.tt_service: "Um [knight|lE] [peasant.GetCulture.GetName] junta-se à sua [court|lE]."
 hold_court.8130.c.tt_service_title: "[peasant.Custom('MountedWarriorTerm')|U] [conversion_target.GetAdjectiveNoTooltip]"
 hold_court.8130.d: "Você será um exemplo para todos os povos atrasados."
 hold_court.8130.e: "O povo [peasant.GetCulture.GetNameNoTooltip] irá se adaptar."
 #Modifiers
 hold_court_8130_terror_modifier: "Supremacia Cultural"
 hold_court_8130_tolerance_modifier: "Tolerância Cultural"
 hold_court_8130_service_modifier: "Obrigação Cultural"
 ## Puppy Patronage
 hold_court.8140.t: "Patrocínio de Filhotes"
 hold_court.8140.desc: "Meu mestre[huntmaster.Custom('ES_OA')] caçador[huntmaster.Custom('ES_XA')] [huntmaster.GetTitledFirstName|l] se aproxima com cuidado, segurando um fardo de lã. \n\nCom um sorriso, retira o pano para revelar uns olhinhos semicerrados e uma linguinha pendente… um cachorrinho! [huntmaster.GetFirstName] mal consegue manter a bolinha de pelo inquieta em seus braços. \n\n\"Um presente da melhor ninhada de [ROOT.Char.Custom('get_region_dog_type')]s que já vi há muito tempo!\", diz entre lambidas. \"Você deve aproveitar para ampliar os canis, meu [ROOT.Char.GetLadyLord]!\""
 hold_court.8140.a: "Nossos canis não terão concorrência!"
 hold_court.8140.a.tt: "Todos os membros poderão usar [decision|lE] Adotar um Filhote"
 hold_court.8140.b: "Quem é um bom filhotinho? Você é!"
 hold_court.8140.c: "Gatos são companheiros superiores."
 hold_court.8140.d: "Você está atrasando petições sérias, [huntmaster.GetFirstNameNoTooltip]."
 #Puppy Patronage ping
 hold_court.8141.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort' , SCOPE.sC('pup_house_ruler'))], [pup_house_ruler.Custom('ES_ElLa')] [pup_house_ruler.GetTitledFirstNameRegnal|l], expandiu seus canis sob a direção de seu mestre[huntmaster.Custom('ES_OA')] caçador[huntmaster.Custom('ES_XA')], [huntmaster.Custom('ES_ElLa')] [huntmaster.GetTitledFirstNameRegnal|l]. \n\nConvidou todos os seus parentes a desfrutar dos frutos desse esforço!"
 hold_court.8141.a: "Filhotinhos, hein?"
 #Puppy Patronage decision event
 hold_court.8142.t: "$hold_court.8140.t$: Novo Companheiro"
 hold_court.8142.desc: "Meus servos me trazem um filhote recém-nascido de [ROOT.Char.Custom('get_region_dog_type')], recém-chegado dos célebres canis de [ROOT.Char.GetHouse.GetNameNoTooltip] fundados por meu [ROOT.Char.Custom2('RelationToMeShort' , SCOPE.sC('pup_house_ruler'))] [pup_house_ruler.GetTitledFirstNameRegnal]. \n\nDe entre as mantas, surge um focinhozinho curioso pelos cheiros de seu novo lar!"
 hold_court.8142.desc_alternative: "Meus servos me trazem um filhote de [ROOT.Char.Custom('get_region_dog_type')] recém-nascido, recém-saído de meus canis. \n\n!De entre as cobertas surge um pequeno focinho, curioso com os cheiros de seu novo lar!"
 hold_court.8142.a: "Você me servirá bem, pequenino!"
 hold_court.8142.b: "Mudei de ideia."
 #Modifiers
 hold_court_8140_house_modifier: "Amantes de Cães"
 hold_court_8140_house_modifier_desc: "O afeto desta casa por companheiros caninos é conhecido."
 #Decision
 adopt_puppy_decision_name: "Adotar um Filhote"
 adopt_puppy_decision_desc: "Minha casa é famosa por seu talento e entusiasmo em criar companheiros caninos. Um filhote recém-nascido me espera se eu estiver à altura do desafio!"
 adopt_puppy_decision_already_pet_tt: "Ainda não possui um animal de estimação"
 adopt_puppy_decision_confirm: "Adotar um filhote do canil"
 adopt_puppy_decision_tooltip: "$adopt_puppy_decision_confirm$"
 ## Contractual Compromise
 hold_court.8150.t: "Compromisso Contratual"
 hold_court.8150.desc.intro: "[target_faction.GetLeader.GetTitledFirstName] dá um passo à frente com audácia e, sem fornecer nenhum contexto, continua em voz baixa: \n\n"
 hold_court.8150.desc.alone: "\"Estaria dispost[target_faction.GetLeader.Custom('ES_OA')] a passar por alto minhas queixas se revisardes as obrigações do meu pacto com a coroa…\""
 hold_court.8150.desc.few: "\"Posso persuadir os descontentes a recuarem se você concordar em corrigir os encargos contratuais que temos...\""
 hold_court.8150.desc.group: "Conto com a atenção de meus colegas descontentes e, estou segur[target_faction.GetLeader.Custom('ES_OA')] de que poderia persuadi-los a recuar em troca de algumas alterações contratuais…"
 hold_court.8150.desc.body: "\n\nEmbora haja rumores de que"
 hold_court.8150.desc.independence: "esteja reunindo meus vassalos para se separarem do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip],"
 hold_court.8150.desc.liberty: "seja uma alavanca para os desejos traidores de maior autonomia no [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip],"
 hold_court.8150.desc.claimant_self: "busca apoio para sua falsa reivindicação sobre [target_faction.GetSpecialTitle.GetNameNoTier],"
 hold_court.8150.desc.claimant: "apoie a falsa reivindicação de [target_faction.GetSpecialCharacter.GetTitledFirstName|l] sobre [target_faction.GetSpecialTitle.GetNameNoTier],"
 hold_court.8150.desc.outro: "certamente esta é uma acusação que [target_faction.GetLeader.GetFirstNameNoTooltip] nunca aceitaria publicamente…"
 hold_court.8150.a: "Eu aceito, embora isso me cause dor."
 hold_court.8150.a.tt_shared: "Impostos $hold_court.8150.a.tt_contract_reduction$ e $hold_court.8150.a.tt_faction_cooldown$"
 hold_court.8150.a.tt_single_all: "Os impostos de [target_faction.GetLeader.GetTitledFirstName|l] $hold_court.8150.a.tt_contract_reduction$ e [target_faction.GetLeader.GetSheHe] $hold_court.8150.a.tt_faction_cooldown$"
 hold_court.8150.a.tt_single_cooldown: "Não poderá $hold_court.8150.a.tt_faction_cooldown$"
 hold_court.8150.a.tt_contract_reduction: "ou as obrigações serão reduzidas em um passo"
 hold_court.8150.a.tt_faction_cooldown: "não poderá participar de nenhuma facção por 5 anos"
 hold_court.8150.a.tt_multiple_feudal_intro: "Todos os membros feudais da [target_faction.GetName]"
 hold_court.8150.a.tt_multiple_intro: "Todos os membros da [target_faction.GetName]"
 hold_court.8150.b: "Então você #EMP CONSPIRAS#! contra mim?! Aprisionem[target_faction.GetLeader.GetHerHim]!"
 hold_court.8150.c: "Venha [target_faction.GetLeader.GetFirstNameNoTooltip], esqueça os outros."
 hold_court.8150.c.tt_success: "[target_faction.GetLeader.GetTitledFirstNameNoTooltip|l] aceita o suborno"
 hold_court.8150.c.tt_failure: "[target_faction.GetLeader.GetTitledFirstNameNoTooltip|l] recusa o suborno"
 hold_court.8150.d: "Entenda! Esperteza não lhe trará benefícios."
 hold_court.8150.d.tt_accept: "[target_faction.GetLeader.GetTitledFirstNameNoTooltip|l] est? convencid[target_faction.GetLeader.Custom('ES_OA')]"
 hold_court.8150.d.tt_reject: "[target_faction.GetLeader.GetTitledFirstNameNoTooltip|l] está indignad"
 hold_court.8150.e: "Você está jogando um jogo perigoso, [target_faction.GetLeader.GetTitleAsNameNoTooltip]."
 ## Public Accusation
 hold_court.8160.t: "Acusação Pública"
 hold_court.8160.desc.intro_child: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('concerned'))] [concerned.GetTitledFirstName|l] conduz [victim.Custom('ES_AlAla')] jovem [victim.GetTitledFirstNameRegnal] ao meu lado, claramente atormentad[victim.Custom('ES_OA')] pela ansiedade. \n\n"
 hold_court.8160.desc.intro_spouse: "[concerned.GetTitledFirstNameRegnal] e seu [concerned.Custom2('RelationToMeShort', SCOPE.sC('victim'))] se aproximam com cautela, receosos da corte reunida. \n\n"
 hold_court.8160.desc.intro_alone: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))] [victim.GetTitledFirstNameRegnal] corre até meu lado, com os olhos avermelhados vasculhando a corte reunida. \n\n"
 hold_court.8160.desc.intro_me: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], tenho certeza[concerned.Custom('ES_OA')] de que alguém em [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] está atrás de mim!"
 hold_court.8160.desc.intro_other: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], estou segur[concerned.Custom('ES_OA')] de que alguém em [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] quer fazer mal à minha [concerned.Custom2('RelationToMeShort', SCOPE.sC('victim'))]!"
 hold_court.8160.desc.exposed: "Veja aqui, tenho provas de que se trata de [accused.GetTitledFirstName|l],"
 hold_court.8160.desc.suspicion: "Não tenho evidências, mas suspeito d [accused.GetTitledFirstName|l]"
 hold_court.8160.desc.nemesis: "que é um[accused.Custom('ES_XA')] [accused.Custom2('InsultNoun', SCOPE.sC('victim'))] [accused.Custom2('InsultAdjective', SCOPE.sC('victim'))] e não vai parar diante de nada, nem mesmo do assassinato, para acabar com [victim.LocalPlayerString( 'mi vida', 'la vida' )][victim.LocalPlayerString( '', 'Loc_ES_del_GetTitledFirstName' )]."
 hold_court.8160.desc.rival: "que ? um[accused.Custom('ES_XA')] [accused.Custom2('InsultNoun', SCOPE.sC('victim'))] e deseja p?r fim a uma rivalidade pessoal por meio de [victim.LocalPlayerString( 'meu assassinato', 'o assassinato' )][victim.LocalPlayerString( '', 'Loc_ES_del_GetTitledFirstName' )]!"
 hold_court.8160.desc.my_claimant: "— que busca avançar sua reivindicação ao [relevant_title.GetName] às custas de [victim.LocalPlayerString( 'mi costa', 'costa' )][victim.LocalPlayerString( '', 'Loc_ES_del_GetTitledFirstName' )]!\"."
 hold_court.8160.desc.their_claimant: "pois o incomoda que reivindique direitos sobre o [relevant_title.GetName] e, portanto, reivindica [victim.LocalPlayerString( 'el mío', 'el ' )][victim.LocalPlayerString( '', 'Loc_ES_del_GetTitledFirstName' )]!»."
 hold_court.8160.desc.joint_claimant: "que n?o quer concorr?ncia em sua reivindica??o sobre o [relevant_title.GetName], o que inclui [victim.LocalPlayerString( 'a minha', 'a de ' )][victim.LocalPlayerString( '', 'Loc_ES_del_GetTitledFirstName' )]!"
 hold_court.8160.desc.their_dislike: "que sempre deixou clara sua animosidade contra [victim.LocalPlayerString( 'mí', victim.GetTitledFirstName )]!\"."
 hold_court.8160.desc.my_dislike: "odeia [victim.LocalPlayerString( 'minha aversão', 'a aversão' )][victim.LocalPlayerString( '', 'Loc_ES_del_GetTitledFirstName' )] por [accused.GetSheHe] e quer se vingar!"
 hold_court.8160.desc.intrigue: "? dada sua reputa??o de vilania ? quer [victim.LocalPlayerString( 'minha garganta', 'a garganta de ' )][victim.LocalPlayerString( '', 'Loc_ES_del_GetTitledFirstName' )]!"
 hold_court.8160.desc.fallback: "pois certamente ninguém mais desejaria [Select_CString( victim.IsLocalPlayer, 'perjudicarme', 'perjudicar a ' )][Select_CString( victim.IsLocalPlayer, '', victim.GetShortUIName )]!\"."
 hold_court.8160.desc.outro: "\n\n\"Eu vos imploro! Prendam a [accused.GetFirstNameNoTooltip] e ponham fim a esta loucura!\"."
 hold_court.8160.a: "Por [ROOT.Char.GetFaith.HighGodName]! É preciso deter[accused.GetHerHim]!"
 hold_court.8160.b.torturer: "Voc? n?o pode esconder a verdade de #EMP MIM#!!"
 hold_court.8160.b.executioner: "[executioner.GetFirstNameNoTooltip] descobrirá a verdade."
 hold_court.8160.b.tt_confession: "[accused.GetTitledFirstNameNoTooltip] confessa o complô"
 hold_court.8160.b.tt_silence: "[accused.GetTitledFirstNameNoTooltip] não confessa"
 hold_court.8160.c: "Questionarei [accused.GetTitledFirstNameNoTooltip|l]."
 hold_court.8160.c.tt_success: "[accused.GetTitledFirstNameNoTooltip] é apanhad[accused.Custom('ES_OA')] numa mentira"
 hold_court.8160.c.tt_failure: "[accused.GetTitledFirstNameNoTooltip] nega estar envolvid[accused.Custom('ES_OA')]"
 hold_court.8160.d.involved: "Acalme-se, não há nada com que se preocupar."
 hold_court.8160.d.proof: "Essa \"prova\" parece bastante frágil."
 hold_court.8160.d.fallback: "Malícia não é um crime em si, [victim.GetFirstNameNoTooltip]."
 #Custom loc, root is the character it is used on
 get_victim: "[ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstName|l]"
 ## Personal Matter
 hold_court.8161.t: "Assunto Pessoal"
 hold_court.8161.desc.intro: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))], [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l] dá um passo à frente, escoltad[victim.Custom('ES_OA')] com apreensão por seu [victim.GetPrimarySpouse.GetWifeHusband], [victim.GetPrimarySpouse.GetFirstName], que parece de mau humor. \n\nEntão [victim.GetPrimarySpouse.GetSheHe] dispara: \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], [accused.Custom('ES_ElLa')] [accused.GetTitledFirstName|l] tenta seduzir minha [victim.GetWifeHusband]; é uma afronta a [victim.GetPrimarySpouse.GetFaith.HighGodName]!"
 hold_court.8161.desc.nemesis: "Isso[accused.Custom('ES_EA')] [accused.Custom2('InsultNoun', SCOPE.sC('victim'))] [accused.Custom2('InsultAdjective', SCOPE.sC('victim'))] não vai parar por nada para arruinar minha vida!\"."
 hold_court.8161.desc.rival: "É[accused.Custom('ES_EA')] odi[accused.Custom('ES_OA')] [accused.Custom2('InsultNoun', SCOPE.sC('victim'))] age por rivalidade e deseja me envergonhar!\"."
 hold_court.8161.desc.quarry: "Está claro que deseja minha [victim.GetWifeHusband] e não consegue se conter!\"."
 hold_court.8161.desc.their_dislike: "Nunca gostei dela! Deve ser [accused.GetSheHe]!\""
 hold_court.8161.desc.my_dislike: "Nunca gostei dele, claramente por um bom motivo!\"."
 hold_court.8161.desc.intrigue: "Todo mundo sabe que é um[accused.Custom('ES_XA')] intrigante miserável que tece teias e brinca com vidas!\""
 hold_court.8161.desc.fallback: "Não consigo pensar em mais ninguém que poderia ser!"
 hold_court.8161.desc.body: "\n\n[victim.GetFirstName] está claramente envergonhad[victim.Custom('ES_OA')] por ter tornado isso público e mal consegue me encarar nos olhos."
 hold_court.8161.a.homosexual: "Tais ultrajes não serão tolerados!"
 hold_court.8161.a.adultery: "Não tolerarei adúlteros em minha corte!"
 hold_court.8161.c: "Veremos se há alguma verdade nisso."
 hold_court.8161.d.involved: "Essas suspeitas certamente não têm fundamento."
 hold_court.8161.d.permitted: "E daí, [victim.GetPrimarySpouse.GetFaith.GetAdherentNameNoTooltip]?"
 hold_court.8161.d.fallback: "Não há nenhuma prova?"
 ## Noble Privileges
 hold_court.8180.t: "Privilégios Nobres"
 hold_court.8180.desc.intro: "[contract_lord.GetTitledFirstName], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('contract_lord'))], se aproxima a passos largos, claramente ansios[contract_lord.Custom('ES_OA')] por ouvir minha resposta ao seu pedido. \n\n\"Meu [contract_lord.Custom2('RelationToMeShort', ROOT.Char)],"
 hold_court.8180.desc.religious: "você nunca precisará questionar a lealdade da Casa [contract_lord.GetHouse.GetBaseName], mas nosso relacionamento seria mais forte sem a ameaça de perseguição por nossas crenças.\""
 hold_court.8180.desc.fortification: "se a Casa [contract_lord.GetHouse.GetBaseName] pretende se defender e proteger [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], [contract_lord.GetPrimaryTitle.GetNameNoTier] requer permissão e apoio para fortalecer suas fortificações.\""
 hold_court.8180.desc.coinage: "o comércio [contract_lord.GetPrimaryTitle.GetAdjective] é sufocado pela falta de moeda, permita que a Casa [contract_lord.GetHouse.GetBaseName] estabeleça suas próprias casas da moeda com a aprovação real, para o bem do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip].\""
 hold_court.8180.desc.war_declaration: "a casa [contract_lord.GetHouse.GetBaseName] ? gloriosa e nobre; deixe que [contract_lord.GetPrimaryTitle.GetNameNoTier] defenda [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] e a si mesm[contract_lord.Custom('ES_OA')] em batalha mais uma vez."
 hold_court.8180.desc.council: "a Casa [contract_lord.GetHouse.GetBaseName] está entre as maiores casas do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]; o conselho [contract_lord.GetPrimaryTitle.GetAdjective] sempre deve ser ouvido pel [ROOT.Char.GetTitleAsNameNoTooltip]!\""
 hold_court.8180.desc.title_revocation: "é revoltante para uma grande casa como a [contract_lord.GetHouse.GetBaseName] ter a ameaça de revogação pairando sobre nós como meros barões ou vassalos.\""
 hold_court.8180.desc.scutage: "[contract_lord.GetPrimaryTitle.GetNameNoTier] tem uma falta urgente de soldados. Permita que a casa [contract_lord.GetHouse.GetBaseName] pague [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip] em lugar de homens para [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]\"."
 hold_court.8180.desc.march: "a Casa [contract_lord.GetHouse.GetBaseName] poderia servir melhor o [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] se o [contract_lord.GetPrimaryTitle.GetNameNoTier] recebesse o status e as isenções de uma marcha.\""
 hold_court.8180.desc.palatinate: "A grande Casa [contract_lord.GetHouse.GetBaseName] e seu [contract_lord.GetPrimaryTitle.GetName] são servos leais do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]; merecemos maior reconhecimento de nossa qualidade."
 hold_court.8180.desc.family_entrepeneurship: "[contract_lord.GetPrimaryTitle.GetNameNoTier] poderia enriquecer [ROOT.Char.GetDynasty.GetName] se desenvolvido, só precisamos preservar nossa mão de obra para projetos locais e defesa."
 hold_court.8180.desc.centralized_power: "[contract_lord.GetPrimaryTitle.GetNameNoTier] geme sob as demandas tributárias do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], mas tem muitos homens para poupar; vamos equilibrar essa desigualdade pelo bem de ambas as partes."
 hold_court.8180.desc.religious_heretic: "\n\n\"Cabe somente a [contract_lord.GetFaith.HighGodName] decidir quais de seus seguidores são justos.\""
 hold_court.8180.desc.religious_heathen: "\n\n\"[contract_lord.GetFaith.HighGodName] me protegerá e aos meus, e talvez também vigie sobre você.\""
 hold_court.8180.desc.martial_defensive: "\n\n\"Vamos garantir a defesa do reino em seu nome, e assim ambos colheremos os benefícios da paz.\""
 hold_court.8180.desc.martial_offensive: "\n\n\"\"Somente pela espada nossos privilégios são protegidos – e ela deve ser mantida afiada.\""
 hold_court.8180.desc.stewardship: "\n\n\"Não restrinja a prosperidade potencial de seus súditos e todos poderemos enriquecer juntos!\""
 hold_court.8180.desc.status: "\n\n\"Excluir seus seguidores mais qualificados e proeminentes só serve para semear divisão e desconfiança.\""
 hold_court.8180.desc.family: "\n\n\"Que os nobres mais bem-nascidos do [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] desfrutem dos maiores benefícios."
 hold_court.8180.desc.fallback: "\n\n\"Vamos garantir que a estabilidade do [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] não seja ameaçada por desacordos triviais."
 hold_court.8180.a.religious: "[contract_lord.GetPrimaryTitle.GetNameNoTierNoTooltip] não precisa mais temer meu [ROOT.Char.GetFaith.BishopNeuterPlural]."
 hold_court.8180.a.fortification: "[contract_lord.GetPrimaryTitle.GetNameNoTierNoTooltip] será um bastião do reino."
 hold_court.8180.a.coinage: "[contract_lord.GetPrimaryTitle.GetNameNoTierNoTooltip] poderá cunhar sua própria moeda."
 hold_court.8180.a.war_declaration: "Que os inimigos de [contract_lord.GetPrimaryTitle.GetNameNoTierNoTooltip] tremam mais uma vez!"
 hold_court.8180.a.council: "[contract_lord.GetPrimaryTitle.GetNameNoTierNoTooltip] sempre terá minha atenção."
 hold_court.8180.a.title_revocation: "[contract_lord.GetPrimaryTitle.GetNameNoTierNoTooltip] será inviolável."
 hold_court.8180.a.scutage: "[contract_lord.GetPrimaryTitle.GetNameNoTierNoTooltip] poderá manter seus guerreiros."
 hold_court.8180.a.march: "O reino dependerá do [contract_lord.GetPrimaryTitle.GetNameNoTierNoTooltip] para sua defesa."
 hold_court.8180.a.palatinate: "O status do [contract_lord.GetPrimaryTitle.GetNameNoTierNoTooltip] não será mais questionado."
 hold_court.8180.a.family_entrepeneurship: "[contract_lord.GetPrimaryTitle.GetNameNoTierNoTooltip] crescerá em tamanho."
 hold_court.8180.a.centralized_power: "Os soldados [contract_lord.GetPrimaryTitle.GetAdjectiveNoTooltip] servirão ao reino."
 hold_court.8180.b: "Prove-me que você conhece o #EMP valor#! da liberdade."
 hold_court.8180.b.tt.success: "[contract_lord.GetTitledFirstNameNoTooltip|l] aceita pagar"
 hold_court.8180.b.tt.failure: "[contract_lord.GetTitledFirstNameNoTooltip|l] fica incomodad[contract_lord.Custom('ES_OA')] com a exig?ncia"
 hold_court.8180.c: "Ouvi dizer que você possui uma bela coleção..."
 hold_court.8180.c.tt.success: "[contract_lord.GetTitledFirstNameNoTooltip|l] abre mão de [vassal_artifact.GetName]"
 hold_court.8180.d: "Tais privilégios demandam sacrifícios em troca."
 hold_court.8180.d.tt.success: "[contract_lord.GetTitledFirstNameNoTooltip|l] abre mão de [vassal_title.GetNameNoTierNoTooltip]"
 hold_court.8180.e: "Somente se as fronteiras de [contract_lord.GetPrimaryTitle.GetNameNoTier]"
 hold_court.8180.e.tt.success: "[contract_lord.GetTitledFirstNameNoTooltip|l] aceita a partilha"
 hold_court.8180.f: "Em troca de maiores compromissos, é claro."
 hold_court.8180.g: "Não é suficiente ser um [contract_lord.GetTitleAsNameNoTooltip]?"
 ## The Enemy Within
 hold_court.8190.t: "O Inimigo Interior"
 hold_court.8190.desc.intro: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('aggressor_vassal'))] [aggressor_vassal.GetTitledFirstName|l] mal consegue conter a raiva e explode: \"É preciso fazer algo com esse [other_vassal.Custom('ES_EA')] forasteir[other_vassal.Custom('ES_OA')] de cultura [other_vassal.GetCulture.GetName]!\". \n\n[aggressor_vassal.GetFirstName] gesticula furiosamente, \"Já estou farto de [other_vassal.GetTitledFirstName|l] e de seus costumes ridículos…"
 hold_court.8190.desc.ethos: "[other_vassal.Custom('get_hold_court_8190_ethos')]\""
 hold_court.8190.desc.heritage: "tudo neles é estranho às virtudes [aggressor_vassal.GetCulture.GetHeritage.GetNameNoTooltip]!"
 hold_court.8190.desc.language: "e aquela suposta língua [other_vassal.GetCulture.GetLanguage.GetNameNoTooltip] é apenas um ruído insolente!"
 hold_court.8190.desc.fallback: "Quer dizer, você já viu como esses selvagens #EMP comem?!#!"
 hold_court.8190.desc.body: "\n\n\"É hora de seus súditos estrangeiros adotarem os #EMP costumes#! dos seus superiores!"
 hold_court.8190.a: "Nossa nobreza deve ser [aggressor_vassal.GetCulture.GetNameNoTooltip]!"
 hold_court.8190.a.tt_accept: "[other_vassal.GetTitledFirstName] concorda"
 hold_court.8190.a.tt_refuse: "[other_vassal.GetTitledFirstName] recusa"
 hold_court.8190.a.tt.vassals: "Cada vassalo não-[THIS.Char.GetCulture.GetName]"
 hold_court.8190.a.tt.promote: "Cada condado [other_vassal.GetCulture.GetName] em [THIS.Char.GetPrimaryTitle.GetBaseNameNoTier] ([SCOPE.ScriptValue('court_8190_county_value')|0X]) será mais difícil de integrar"
 hold_court.8190.b: "Há muito que você poderia aprender com outras tradições."
 hold_court.8190.b.tt.vassals: "Cada outro vassalo [other_vassal.GetCulture.GetName]"
 hold_court.8190.b.tt_success: "As tensões culturais são amenizadas"
 hold_court.8190.b.tt_failure: "Suas platitudes são rejeitadas"
 hold_court.8190.c: "Seja sua cultura [aggressor_vassal.GetCulture.GetNameNoTooltip] ou n?o, [other_vassal.GetFirstNameNoTooltip] ? um[other_vassal.Custom('ES_XA')] vassal[other_vassal.Custom('ES_OA')] leal."
 hold_court.8190.d: "[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] é uma terra de muitos povos."
 #Modifiers
 hold_court_8190_vassal_modifier: "Cultura Indesejada"
 #Custom
 hold_court_8190_bellicose: "começando brigas em todas as oportunidades, esses brutos!"
 hold_court_8190_stoic: "aceitando tudo de forma 'nobre'. Ah, #EMP por favor!#!"
 hold_court_8190_bureaucratic: "nenhum respeito pelos métodos comprovados de seus antepassados."
 hold_court_8190_spiritual: "#EMP tão obcecados#! em agradar [ROOT.Char.GetFaith.HighGodName] e seus [ROOT.Char.GetFaith.AltPriestTermPlural]."
 hold_court_8190_courtly: "sempre bajulando seus governantes como gatos!"
 hold_court_8190_egalitarian: "tratando estrangeiros como iguais! Pah!"
 hold_court_8190_communal: "nenhuma iniciativa ou autossuficiência!"
 ## Servant of God
 hold_court.8200.t: "Servo de [ROOT.Char.GetFaith.HighGodName]"
 hold_court.8200.desc.intro: "Parece que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('aggressor_vassal'))], [aggressor_vassal.Custom('ES_ElLa')] [aggressor_vassal.GetTitledFirstName|l] está ficando irritado enquanto aguardava a audiência. \n\n[ROOT.Char.Custom('FormOfAddressForLiege')|U],"
 hold_court.8200.desc.vassal: "N?o suporto sua toler?ncia com os [ROOT.Char.Custom2('GetUnbelieverTerm', SCOPE.sC('infidel_vassal'))]s como [infidel_vassal.GetTitledFirstName|l] no reino, mesmo entre a nobreza!"
 hold_court.8200.desc.pope: "os [ROOT.Char.Custom2('GetUnbelieverTerm', SCOPE.sC('infidel_vassal'))] se reúnem ao redor [infidel_vassal.Custom('ES_AlAla')] fals[infidel_vassal.Custom('ES_OA')] [ROOT.Char.GetFaith.BishopNeuter], e tudo sob sua proteção!"
 hold_court.8200.desc.body: "\n\n\"[ROOT.Char.GetFaith.HighGodName] nos deixou claro o que nos exige: “[ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier] deve ser uma terra de fiéis! Fora com esses cachorros “[infidel_vassal.GetFaith.GetAdherentNamePlural]!”."
 hold_court.8200.a: "Você está certo, [infidel_vassal.GetTitledFirstNameNoTooltip|l] deve se converter!"
 hold_court.8200.a.tt_accept: "[infidel_vassal.GetTitledFirstName] concorda em se converter"
 hold_court.8200.a.tt_refuse: "[infidel_vassal.GetTitledFirstName] se recusa a se converter"
 hold_court.8200.a.tt.vassals: "Todo vassalo não [THIS.Char.GetFaith.GetAdherentName]"
 hold_court.8200.a.tt.convert: "Será mais difícil converter todo condado [infidel_vassal.GetFaith.GetAdherentName] em [THIS.Char.GetPrimaryTitle.GetBaseNameNoTier] ([SCOPE.ScriptValue('court_8200_county_value')|0X])"
 hold_court.8200.c: "Por [infidel_vassal.GetFaith.HighGodName], agora vejo a verdade!"
 hold_court.8200.c.tt.vassals: "Todo vassalo [infidel_vassal.GetFaith.GetAdherentName]"
 hold_court.8200.d: "Julgo as pessoas por sua qualidade, não por suas crenças."
 hold_court.8200.e: "Todas as religiões são bem-vindas em meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 cultural_benevolence_tt: "Benevolência Cultural"
 cultural_intolerance_tt: "Intolerância Cultural"
 #Modifiers
 hold_court_8200_vassal_modifier: "Fé Indesejada"
 ## Rightful Lord
 hold_court.8210.t: "Terras Legítimas"
 hold_court.8210.desc.intro: "Um[aggressor_vassal.Custom('ES_XA')] [aggressor_vassal.GetTitledFirstName|l] notavelmente contrariad[aggressor_vassal.Custom('ES_OA')] se apressa at? o seu trono... \n\n\"[aggressor_vassal.Custom2('RelationToMeShort', ROOT.Char)|U],"
 hold_court.8210.desc.de_jure: "meus direitos legais sobre o [vassal_claim.GetName] são bem documentados; essas terras têm sido consideradas uma parte integral do meu [vassal_claim.GetDeJureLiege.GetName] por muito tempo."
 hold_court.8210.desc.strong: "meu direito legítimo ao [vassal_claim.GetName] está fora de qualquer dúvida; reconhecido tanto pelos seus próprios arautos quanto pelos [ROOT.Char.GetFaith.AltPriestTermPlural] [ROOT.Char.GetFaith.GetAdherentNamePlural]."
 hold_court.8210.desc.weak: "Eu tenho um direito sobre o [vassal_claim.GetName], não importa o que os outros digam!"
 hold_court.8210.desc.other: "\n\n\"Você apoiará minha reivindicação e fará com que seu[defender_vassal.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('defender_vassal'))] [defender_vassal.GetTitledFirstName|l] renuncie ao que não lhe pertence?\"."
 hold_court.8210.desc.self: "\n\n\"Você abdicará do que não lhe pertence, em apoio à minha reivindicação?\""
 hold_court.8210.a: "Essa injustiça termina agora."
 hold_court.8210.b: "Esses assuntos são tradicionalmente resolvidos pela força."
 hold_court.8210.b.tt_aggressor: "[aggressor_vassal.GetTitledFirstNameNoTooltip] vence o duelo"
 hold_court.8210.b.tt_defender: "[defender_vassal.LocalPlayerString( 'eu', 'Loc_ES_solo_GetName' )] [Select_CString( defender_vassal.IsLocalPlayer, 'retengo', 'retiene' )] o título"
 hold_court.8210.c.none: "Você não tem nenhum direito, [aggressor_vassal.Custom2('InsultNoun', ROOT.Char)]."
 hold_court.8210.c.other: "Os direitos de [defender_vassal.GetFirstNameNoTooltip] são os mais legítimos."
 hold_court.8210.c.self: "Minha reivindicação é mais verdadeira."
 hold_court.8210.d: "Eu não me intrometo em tais assuntos."
 hold_court.8210.e: "[defender_vassal.GetTitleAsNameNoTooltip] lhe jurará lealdade."
 hold_court.8210.f.other: "Você decidirá isso com suas armas."
 hold_court.8210.f.self: "Você deve conquistá-lo pela espada."
 hold_court.8210.duel_tt: "[defender_vassal.GetNameOrMeNoTooltip|U] se enfrentará em duelo contra [aggressor_vassal.GetTitledFirstName|l] por [vassal_claim.GetName]"
 ## The King's Peace
 hold_court.8260.t: "A paz de [ROOT.Char.GetTitleAsNameNoTooltip]"
 hold_court.8260.desc.intro: "[vassal_faction_target.GetFullName] se aproxima com semblante amargo, impaciente para apresentar sua apelação. \n\n\"[ROOT.Char.GetTitleAsNameNoTooltip], meu [vassal_faction_target.Custom2('RelationToMeShort', SCOPE.sC('vassal_faction_leader'))]. [vassal_faction_leader.GetTitledFirstName|l], busca desafiar minha posição legítima,"
 hold_court.8220.desc.claimant: "e colocar [vassal_claimant.Custom('ES_AlAla')] usurpador[vassal_claimant.Custom('ES_XA')] do meu [vassal_faction_target.Custom2('RelationToMeShort', SCOPE.sC('vassal_claimant'))], [vassal_claimant.GetTitledFirstName|l], em [vassal_faction.GetSpecialTitle.GetNameNoTier]!"
 hold_court.8220.desc.claimant_self: "e me instalar como [vassal_faction.GetSpecialCharacter.GetLadyLord] de [vassal_faction.GetSpecialTitle.GetNameNoTier]!\""
 hold_court.8220.desc.liberty: "restringindo meu poder e contradizendo minhas decisões legais como s [vassal_faction_target.GetTitleAsNameNoTooltip]!"
 hold_court.8260.desc.body: "\n\n\"Enquanto falamos, ele reúne os descontentes. #EMP Tenéis#! precisam lembrar[vassal_faction.GetLeader.GetHerHim] quem realmente detém o poder neste senhorio!\"."
 hold_court.8260.a.peace: "[vassal_faction.GetLeader.GetTitledFirstNameNoTooltip] porá fim a esses jogos."
 hold_court.8260.a.war: "![vassal_faction.GetLeader.GetTitledFirstNameNoTooltip|l] deve se render imediatamente!"
 hold_court_8260_faction_member_tt: "Todo membro da [vassal_faction.GetName] ([SCOPE.ScriptValue('court_8260_faction_value')|0]) contra [vassal_faction_target.GetTitledFirstName|l]"
 hold_court.8260.b: "Arruaceiros não serão tolerados."
 hold_court.8260.c: "Haverá paz em meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]!"
 hold_court.8260.d: "Eles têm pontos válidos, não têm?"
 hold_court.8260.e: "Oh, eu #EMP devo#!, devo mesmo?"
 ## Oath of Fealty
 hold_court.8270.t: "Juramento de Fidelidade"
 hold_court.8270.desc: "Meus arautos anunciam a chegada de um[neighbor.Custom('ES_XA')] governante vizinh[neighbor.Custom('ES_OA')] menor; [neighbor.GetTitledFirstName|l] de [neighbor.GetPrimaryTitle.GetNameNoTier]. \n\nEntra em seu salão com dignidade e se curva profundamente. \"Vossa Excelência, venho humildemente oferecer meu senhorio... se aceitardes minhas condições\". \n\n\"Servir-vos-ei como fiel senhor[neighbor.Custom('ES_XA')] vassal[neighbor.Custom('ES_OA')] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] em troca de vossa proteção; que nossas duas grandes casas prosperem com o acordo!\"."
 hold_court.8270.a: "Aceito, [neighbor.GetTitledFirstNameNoTooltip|l]."
 hold_court.8270.b: "Acho esses termos um pouco desequilibrados..."
 hold_court.8270.b.accept: "[neighbor.GetTitledFirstNameNoTooltip|l] aceita suas mudanças"
 hold_court.8270.b.refuse: "[neighbor.GetTitledFirstNameNoTooltip|l] se recusa"
 hold_court.8270.d: "Eu acho que não."
 ## Nomadic Neighbors
 hold_court.8280.t: "Vizinhos Nômades"
 hold_court.8280.desc.foreign: "[feudal_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] aguarda audiência, distraíd[feudal_vassal.Custom('ES_OA')] ao que parece, por seus problemas.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", trina [feudal_vassal.GetSheHe]. \"Os nômades [nomad_culture.GetCollectiveNoun] de minhas fronteiras não param e a cada dia são mais os que cruzam de [nomad.GetTopLiege.GetPrimaryTitle.GetNameNoTier] para minha [feudal_county.GetName]\". \n\n\"Temo que, se não forem expulsos, muito em breve terão ocupado todo o [feudal_county.GetTierAsNameNoTooltip]!\"."
 hold_court.8280.desc.local: "[feudal_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] solicitou uma audiência comigo e [nomad.Custom2('MyCharacterIntroduction', ROOT.Char)]; acho que isso vai ser bom…\n\n\"[ROOT.Char.GetTitleAsNameNoTooltip]!\", ruge [feudal_vassal.GetFirstNameNoTooltip], \"Os cavaleiros nômades das terras de [nomad.GetFirstNameNoTooltip] invadem aos montes meu [feudal_county.GetName]: precisam voltar!\" \n\n[nomad.GetFirstNameNoTooltip] dá de ombros: \"Meu povo é errante, só deseja encontrar bons pastos intocados para seus animais…\"."
 hold_court.8280.a.foreign: "Eles devem ser enviados de volta para o [nomad.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 hold_court.8280.a.local: "[nomad.GetTitledFirstNameNoTooltip|l], mantenha seus cavaleiros na linha!"
 hold_court.8280.b: "Eu sempre preciso de cavaleiros habilidosos."
 hold_court.8280.c: "Você está claramente exagerando, [feudal_vassal.GetFirstNameNoTooltip]."
 hold_court.8290.t: "A Carta de [city_province.GetTitle.GetAdjectiveNoTooltip]"
 hold_court.8290.desc: "Diante de mim está um[city_mayor.Custom('ES_XA')] [city_mayor.GetWomanMan] desconhecid[city_mayor.Custom('ES_OA')]: aparentemente é [city_mayor.GetFirstName][city_mayor.Custom('ES_XA')] [city_mayor.GetTitleAsNameNoTooltip|l] do domínio do meu [ROOT.Char.Custom2('RelationToMeShort', city_vassal)], [city_vassal.Custom('ES_ElLa')] [city_vassal.GetTitledFirstName|l].\n\n“Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], venho aqui, sem a permissão do meu [ROOT.Char.GetLadyLord|l], para pedir que conceda à minha cidade, [city_province.GetTitle.GetNameNoTier], as terras ao redor para governar como achar apropriado.”\n\n“Poderíamos cuidar dos nossos próprios assuntos e trazer grande prosperidade a [ROOT.Char.GetPrimaryTitle.Custom('GetTierBase')|l] se estivéssemos livres apenas dos sufocantes impostos e responsabilidades impostos por [city_vassal.Custom('ES_ElLa')] [city_vassal.GetTitleAsNameNoTooltip|l] de [city_vassal.GetPrimaryTitle.GetNameNoTierNoTooltip].”"
 hold_court.8290.a: "Confio que sua cidade se lembrará de minha graça."
 hold_court.8290.b: "Um gosto da futura frutificação poderia me convencer."
 hold_court.8290.c: "O que você pede é inadmissível."
 every_glory_hound_and_owner_actor: "[city_vassal.GetTitledFirstName] e qualquer $glory_hound_vassals$ ([actor.MakeScope.ScriptValue('number_of_glory_hound_vassals')|V0])"
 hold_court_8290_grant_tooltip: "É revogada de [city_county.GetName] do governo [city_vassal.Custom('ES_DelDela')] [city_vassal.GetTitledFirstName|l] e se torna uma [republic|lE] sob [city_mayor.Custom('ES_ElLa')] [city_mayor.GetTitledFirstName|l]"
 hold_court.8300.t: "Renunciando Direitos"
 hold_court.8300.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', city_vassal)], [city_vassal.Custom('ES_ElLa')] [city_vassal.GetTitledFirstName|l], é uma presença bem-vinda em meus salões, embora não pareça muito segur[city_vassal.Custom('ES_OA')] de como abordar seu pedido.\n\nPor fim, encontra as palavras: [ROOT.Char.Custom('FormOfAddressForLiege')|U], sou apenas um[city_vassal.Custom('ES_XA')] humilde [city_vassal.GetTitleAsNameNoTooltip], satisfeit[city_vassal.Custom('ES_OA')] com minhas modestas posses. Penso apenas nos interesses do meu povo em [city_vassal.GetPrimaryTitle.GetNameNoTier]; sobretudo, nos interesses das almas de [city_province.GetTitle.GetNameNoTier], e, claro, nos de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] #EMP como um todo#!.\n\nPeço que me permitam renunciar aos direitos hereditários da minha família sobre minhas terras e que elas passem a ser governadas em comum, como fazem os prefeitos das cidades."
 hold_court.8300.a: "Uma ideia bastante intrigante."
 hold_court.8300.b: "Se #EMP você#! não quer os privilégios, outro os terá."
 hold_court.8300.c: "Seus direitos são invioláveis, [city_vassal.GetFirstNameNoTooltip]!"
 hold_court.8310.t: "Cimentando o Reino"
 hold_court.8310.desc: "Surpreende-me ver meu [ROOT.Char.Custom2('RelationToMeShort', drifting_vassal)], [drifting_vassal.Custom('ES_ElLa')] [drifting_vassal.GetTitledFirstName|l], um[drifting_vassal.Custom('ES_XA')] [drifting_vassal.GetLadyLord] do território [drifting_duchy.GetAdjectiveNoTooltip]"
 hold_court.8310.faith_culture: "dos [drifting_vassal.GetCulture.GetCollectiveNoun] —e sendo [drifting_vassal.GetSheHe] da fé [drifting_vassal.GetFaith.GetAdjective]—"
 hold_court.8310.culture: "[drifting_vassal.GetCulture.GetCollectiveNoun],"
 hold_court.8310.faith: "[drifting_vassal.GetFaith.GetAdherentNamePlural],"
 hold_court.8310.fallback: "territórios,"
 hold_court.8310.body: "ajoelhem[drifting_vassal.Custom('ES_OA')] hoje diante de mim.\n\nComeça: Meu senhor[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], todos sabemos que os tempos mudaram. Devemos varrer as antigas leis e costumes do povo [drifting_duchy.GetDeJureLiege.GetAdjectiveNoTooltip] para que [drifting_duchy.GetNameNoTierNoTooltip] seja reconhecido como um órgão integral de [drifting_kingdom.GetNameNoTierNoTooltip].\n\nNão é tarefa simples erradicar esses vestígios enraizados no povo, mas com a #EMP motivação#! adequada..."
 hold_court.8310.a: "#EMP Motivação#!?! Tal traição deve ser erradicada!"
 hold_court.8310.b: "Seu significado foi bem compreendido, [drifting_vassal.GetFirstNameNoTooltip]."
 hold_court.8310.c: "Oh? Vou analisar os estatutos [drifting_duchy.GetAdjectiveNoTooltip]."
 hold_court.8310.c.success: "Suas mudanças são bem recebidas"
 hold_court.8310.c.failure: "Você torna as coisas mais confusas"
 hold_court.8310.d: "Tais coisas simplesmente levam tempo."
 hold_court.8310.county_tooltip: "Todos os [counties|lE] [drifting_duchy.GetAdjective] [de_jure|lE] em seu [realm|lE]"
 hold_court.8320.t: "Inventário Problemático"
 hold_court.8320.self: "M [ROOT.Char.Custom2('RelationToMeShort', probate_vassal)], [probate_vassal.GetName], apresenta-se diante de mim, junto com"
 hold_court.8320.regent: "[probate_rep.Custom('ES_ElLa')|U] [probate_rep.GetTitledFirstName|l], [probate_vassal.Custom('ES_ElLa')] [probate_vassal.GetTitleAsName|l] de [probate_vassal.Custom2('RelationToMeShort', probate_rep)] de [probate_vassal.GetPrimaryTitle.GetNameNoTier], avança diante de mim, junto com"
 hold_court.8320.monk: "[Select_CString( probate_priest.IsFemale, 'uma monja', 'um monge' )] da fé [probate_priest.GetFaith.GetAdjectiveNoTooltip]."
 hold_court.8320.priest: "um[probate_priest.Custom('ES_XA')] [probate_priest.Custom('PriestTitle')] da fé [probate_priest.GetFaith.GetAdjectiveNoTooltip]."
 hold_court.8320.desc: "Memórias vagas deste caso me vêm à mente… Uma disputa sobre os desejos do [probate_dead.Custom('ES_DelDela')] falecid[probate_dead.Custom('ES_OA')] [probate_dead.GetTitledFirstName|l]…\n\n[probate_vassal.GetFirstNameNoTooltip] irrompe: [ROOT.Char.GetTitleAsNameNoTooltip], asseguro-vos que essas promessas de terras são pura falsidade! Talvez o meu [probate_vassal.Custom2('RelationToMeShort', probate_dead)] tenha dado alguma esmola aqui e ali, mas #EMP o [probate_county.GetName|l] inteiro #!?! Isto é simplesmente absurdo!\n\n"
 hold_court.8320.monk_2: "[Select_CString( probate_priest.IsFemale, 'La monja', 'El monje' )] limpa a garganta:"
 hold_court.8320.priest_2: "[Select_CString( probate_priest.IsFemale, 'La sacerdotisa', 'El sacerdote' )] limpa a garganta:"
 hold_court.8320.body: "Meu nome é [probate_priest.GetFirstName], Vossa Excelência, da [probate_dead.GetFaith.HouseOfWorship] de [probate_province.GetTitle.GetNameNoTier]. Dizemos a verdade! [probate_dead.GetFirstNameNoTooltip] foi um[probate_dead.Custom('ES_XA')] [probate_dead.GetWomanMan] piedos[probate_dead.Custom('ES_OA')]. Passou muito tempo conosco antes de encontrar a paz de [probate_dead.GetFaith.HighGodNameAlternate] em [probate_dead.GetFaith.PositiveAfterLife]…\n\n[probate_vassal.Custom('ES_ElLa')|U] [probate_vassal.GetTitledFirstNameNoTooltip|l] revira os olhos e enrubesce de raiva."
 hold_court.8320.a: "As terras pertencem aos fiéis de [probate_priest.GetFaith.HighGodNamePossessive]."
 hold_court.8320.b: "Mantenha seu título [probate_vassal.GetFirstNameNoTooltip], mas compense os [probate_priest.GetFaith.AltPriestTermPlural]."
 hold_court.8320.c: "Muito complicado, parece que as reivindicações se anulam..."
 hold_court.8320.d: "Nada supera os direitos de herança de um [probate_dead.Custom2('RelationToMePossessive', probate_vassal)]."
 every_close_family_hold_court_8320_tooltip: "Sua [close_family|lE]"
 hold_court_8320_grant_tooltip: "Retira-se [probate_county.GetName] do governo [probate_vassal.Custom('ES_DelDela')] [probate_vassal.GetTitledFirstName|l] e se torna uma [theocracy|lE] sob [probate_priest.Custom('ES_ElLa')] [probate_priest.GetTitledFirstName|l]"
 hold_court.8330.t: "Um Ruptura em [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]"
 hold_court.8330.desc: "Apresentam-se meus vassalos, [vassal_1.Custom('ES_ElLa')] [vassal_1.GetTitledFirstName|l] e [vassal_2.Custom('ES_ElLa')] [vassal_2.GetTitledFirstName|l], vozes influentes e de peso na corte, às vezes febril, de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip|l]. Infelizmente, hoje suas vozes não cantam em harmonia.\n\n[vassal_1.GetFirstNameNoTooltip] dá um passo à frente, \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], venho na presença [ROOT.Char.Custom('ES_DelDela')] maior e melhor[ROOT.Char.Custom('ES_OA')] para pôr [vassal_2.GetFirstNameNoTooltip] em seu lugar\".\n\n"
 hold_court.8330.intro.courtly: "\"As antigas famílias nobres de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l] estendem o alcance de seus privilégios mais e mais a cada ano,"
 hold_court.8330.intro.glory_hound: "\"Belicistas buscam arrastar o [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l] para conflitos por seus próprios fins mesquinhos,"
 hold_court.8330.intro.parochial: "Senhores preguiçosos e sem ambição, buscando uma vida tranquila, minam nossa força enquanto constroem suas fortunas,"
 hold_court.8330.intro.zealot: "\"É claro que os [ROOT.Char.GetFaith.AltPriestTermPlural] ganharam influência demais no [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l],"
 hold_court.8330.intro.minority: "Os [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')] riem da sua generosidade enquanto conspiram com seus inimigos,"
 hold_court.8330.outro.courtly: "eles ameaçam o status das grandes casas do reino: [vassal_1.GetHouse.GetBaseNameNoTooltip], até mesmo #EMP [ROOT.Char.GetHouse.GetBaseNameNoTooltip]!#!"
 hold_court.8330.outro.glory_hound: "enquanto ficamos fracos e maduros para as tramas constantes de nossos inimigos sobre o reino."
 hold_court.8330.outro.parochial: "devemos ser cautelosos se quisermos manter o delicado equilíbrio dos interesses do reino."
 hold_court.8330.outro.zealot: "ignorando os preceitos do [ROOT.Char.GetFaith.ReligiousText] e a vontade de [ROOT.Char.GetFaith.HighGodName]."
 hold_court.8330.outro.minority: "desconsiderando as comunidades de cooperação pacífica que são a chave para nossa força."
 hold_court.8330.end: "Tenho certeza de que concordais comigo, meu senhor[ROOT.Char.Custom('ES_XA')]\".\n\n[vassal_2.GetFirstNameNoTooltip] apenas balança a cabeça, olhando para mim com expectativa, junto com toda a corte…"
 hold_court.8330.a.courtly: "Os antigos direitos dos nobres vêm antes de todos os outros."
 hold_court.8330.a.glory_hound: "Seja o que for que façamos, deve tornar [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] mais forte."
 hold_court.8330.a.parochial: "Estou aqui para fornecer uma liderança forte e estável."
 hold_court.8330.a.zealot: "Todos nós — #EMP até mesmo eu#! — somos apenas instrumentos de [ROOT.Char.GetFaith.HighGodName]."
 hold_court.8330.a.minority: "Há muito a ganhar com a pluralidade."
 hold_court.8330.c: "Vocês são ambos súditos inestimáveis do reino."
 hold_court.8330.c.success: "Você encanta ambos"
 hold_court.8330.c.failure: "Seus apoiadores estão insatisfeitos"
 hold_court.8330.d: "Tal vaidade apenas insulta seus companheiros vassalos."
 every_other_non_minor_vassal_actor: "Todos os outros vassalos não-$barons_and_minor_landholders_vassal$ ([actor.MakeScope.ScriptValue('hold_court_8330_other_vassals_count')|V0])"
 hold_court.8340.t: "Em Busca de Trabalho"
 hold_court.8340.desc: "Uma[candidate.Custom('ES_XA')] [candidate.GetWomanMan] [candidate.Custom('GetYoungMiddleAgedOld')] avança em minha direção com uma dignidade serena, antes de se curvar profundamente: \"Saudações, Vossa Majestade, eu sou [candidate.GetFirstName], voss[candidate.Custom('ES_OA')] servo leal. Venho diante de vós hoje em busca de emprego em vossa corte\".\n\n"
 hold_court.8340.diplomacy: "\"Eu já vi muitas cortes, oferecendo hospitalidade aos lordes locais de [birthplace.GetNameNoTierNoTooltip], minha terra natal, e seus muitos visitantes."
 hold_court.8340.stewardship: "Sou um[candidate.Custom('ES_XA')] gestor[candidate.Custom('ES_XA')] consumad[candidate.Custom('ES_OA')], tendo trabalhado para muitos dos senhores e das cortes de [birthplace.GetNameNoTierNoTooltip], minha terra natal."
 hold_court.8340.intrigue: "\"Eu tenho uma grande quantidade de... #EMP experiência#! variada, adquirida nas cidades de [birthplace.GetNameNoTierNoTooltip], minha terra natal."
 hold_court.8340.learning: "\"Sou um [candidate.GetWomanMan] de letras, tendo sido escriba para os lordes locais e [birthplace.GetCountyData.GetFaith.AltPriestTermPlural] de [birthplace.GetNameNoTierNoTooltip], minha terra natal."
 hold_court.8340.prowess: "Sou [Select_CString( candidate.IsFemale, 'uma guerreira experiente', 'um guerreiro experiente' )] e servi aos senhores locais e nas guarni??es de [birthplace.GetNameNoTierNoTooltip], minha terra natal."
 hold_court.8340.outro: "Será uma honra dedicar meus talentos a uma causa maior, a serviço de meu [ROOT.Char.GetTitleAsNameNoTooltip|l] e de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] em seu conjunto\"."
 hold_court.8340.a: "Eu tenho #EMP exatamente#! o trabalho."
 hold_court.8340.b: "Muito bem, tenho algo para você."
 hold_court.8340.c: "Ah, finalmente alguém útil!"
 hold_court.8340.d: "Não há vagas no momento..."
