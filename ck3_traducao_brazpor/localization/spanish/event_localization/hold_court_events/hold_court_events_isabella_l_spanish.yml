l_spanish:
 #### Your Heir is a Jerk, by Isabella Welch
 hold_court.4001.t: "Flagelo"
 hold_court.4001.desc.intro: "[annoyed_vassal.GetTitledFirstName] invade furiosamente a sala do meu trono. «[ROOT.Char.Custom2('RelationToMeAddress', annoyed_vassal)|U], muitos acreditam que [preferred_heir.GetTitledFirstName|l] deveria ser vosso[preferred_heir.Custom('ES_OA')] herdeir[preferred_heir.Custom('ES_OA')] em vez de [annoying_heir.GetTitledFirstName|l]. É bem sabido em todo [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] que vosso herdeir[annoying_heir.Custom('ES_OA')] [annoying_heir.GetTitledFirstNameNoTooltip|l] ofende tanto que quase faz da ofensa uma habilidade!"
 hold_court.4001.heir_street_fight: "Esse maldit[annoying_heir.Custom('ES_OA')] vilão[annoying_heir.Custom('ES_OA')] ronda pelas tavernas e provoca camponeses bêbados para brigar. Muitos já morreram nessas brigas em que mata por diversão!""
 hold_court.4001.heir_robbery: "A caminho daqui, fui assaltado por um[annoying_heir.Custom('ES_XA')] [annoying_heir.GetWomanMan] cavaleiro vestid[annoying_heir.Custom('ES_OA')] de maneira espalhafatosa. Ele me despiu e me amarrou a uma árvore antes de tirar a máscara e se vangloriar de que na verdade era [annoying_heir.GetTitledFirstNameNoTooltip|l]!"
 hold_court.4001.heir_tavern: "Praticamente vive na taverna, e quando esbanja sua mesada, os outros pagam as bebidas dele em troca de fazer imitações obscenas de você!"."
 hold_court.4001.heir_diplomacy_failure: "Recusa-se a comparecer a uma única reunião e, quando lhe perguntei o motivo, me disse que "são muito monótonas, seria muito mais divertido nos matarmos uns aos outros'"."
 hold_court.4001.heir_hated: "É um[annoying_heir.Custom('ES_XA')] fanfarrão[annoying_heir.Custom('ES_OnOna')] indesejável e se gabou para mim de que não se importa se algum de nós gosta dele.""
 hold_court.4001.protective_parent: "\n\n[protective_parent.GetTitledFirstNameNoTooltip|l] estala a língua, horrorizad[protective_parent.Custom('ES_OA')]: Meu [annoying_heir.Custom('PetName')] jamais faria algo assim!"
 hold_court.4001.accusation_default: "\n\n[annoyed_vassal.GetFirstName] suspira. "Mas tenho certeza[annoyed_vassal.Custom('ES_OA')] de que [annoying_heir.GetSheHe] negará ter feito isso"."
 hold_court.4001.heir_admission: "\n\nUma expressão de lobo se espalha pelo rosto de [annoying_heir.GetTitledFirstNameNoTooltip|l]. \"Ah, com certeza fiz.\""
 hold_court.4001.a: "Que encanto, é igual à sua [ROOT.Char.GetMotherFather]!"
 hold_court.4001.b: "Isso é a gota d'água! Será [preferred_heir.GetTitledFirstNameNoTooltip|l] então."
 hold_court.4001.c: "Pela minha experiência, [preferred_heir.GetTitledFirstNameNoTooltip|l] é igualmente insuportável!"
 hold_court.4001.d: "Ser imperfeit[annoying_heir.Custom('ES_OA')] significa que os soldados [annoying_heir.Custom('ES_LoLa')] veem como um[annoying_heir.Custom('ES_OA')] dos deles!"
 disabled_fallback: "deficiente"
 ## Inspired Poet appears at court and makes demands by Isabella Welch
 hold_court.4500.t: "Poesia Infinita"
 hold_court.4500.desc: "Uma figura deslumbrante, com um brilho de revelação sobre si, se aproxima. "Sou [Select_CString( demanding_poet.IsFemale, 'uma grande poetisa', 'um grande poeta' )] e viajei de muito longe para servi-lo. Compus a mais magnífica balada do cosmos sobre sua glória e a magnificência da corte [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip].""
 hold_court.4500.a: "Não preciso de [Select_CString( demanding_poet.IsFemale, 'uma poetisa', 'um poeta' )]."
 hold_court.4500.b: "Seus versos são encantadores, venha escrever para minha corte."
 ### Peasants are convinced you're a literal monster by Isabella Welch
 hold_court.4600.t: "[ROOT.GetCharacter.GetSheHe|U] Quem Se Transforma em um Monstro..."
 hold_court.4600.desc: "Um punhado de camponeses imundos se apresenta diante do meu trono. Estão armados com o equipamento agrícola em chamas mais feroz que já vi em toda a minha carreira de sufocar rebeliões.\n\n«Este ser que nos governa é um verdadeiro demônio encarnado. Nenhum homem nem mulher de verdade seria capaz de tamanhos extremos e blasfêmias violentas. Exigimos que ponhais fim à sua tirania monstruosa!»."
 hold_court.4600.a: "Não sou demônio algum, sou um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip], o que é muito, #EMP mucho#! pior."
 hold_court.4600.b: "Uma ideia adorável! [chancellor.GetCouncilTitle]! Espalhe a notícia de que sou um demônio."
 hold_court.4600.c: "Será que realmente fui tão abominável?"
 hold_court.4600.c.tt: "Ainda não é tarde para mudar."
 hold_court.4600.d: "Tirem essa gentalha da minha vista."
 ### Vassal invites you to a suspicious dinner by Isabella Welch
 hold_court.4601.t: "Meu delicios[ROOT.GetCharacter.Custom('ES_OA')] [ROOT.GetCharacter.GetLadyLord|U],"
 hold_court.4601.d: "Meu coração mal parou de palpitar desde que comecei a ouvir as pessoas da cidade contar histórias de que você possui a alma de um verdadeiro demônio. Lamento não estar melhor familiarizado(a) com a sua temível pessoa.\n\nVisite meu castelo, e jantaremos das iguarias mais cruas conhecidas pelo [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]!"
 hold_court.4601.a: "Parece requintado!"
 hold_court.4601.b: "Temos banquetes mais refinados em casa..."
 ### Sophisticated Cannibal dinner by Isabella Welch
 hold_court.4602.t: "Minha delicios[ROOT.GetCharacter.Custom('ES_OA')] [ROOT.GetCharacter.GetLadyLord]"
 hold_court.4602.desc: "Apenas algumas velas tremeluzentes iluminam a morada de [cannibal_vassal.GetFirstNameNoTooltip]. Ele me senta diante de uma mesa de banquete que não tem outros pratos além de uma infinidade de cortes de carne malpassada.\n\n[cannibal_vassal.GetFirstNameNoTooltip] ronda atrás da minha cadeira, esperando que eu escolha alguma comida. Depois de um tempo, ele se inclina ao lado da minha cabeça, mostrando os dentes.\n\n“Esta noite há muitos bons [ROOT.GetCharacter.GetWomenMen] cozinhad[ROOT.Char.Custom('ES_OA')]os diante de nós, mas nenhum[ROOT.Char.Custom('ES_OA')] tão delicios[ROOT.Char.Custom('ES_OA')] como você!”"
 hold_court.4602.a: "Quem devo comer como entrada?"
 hold_court.4602.b: "Tudo bem, você pode dar uma única mordida."
 hold_court.4602.c: "Eu vou embora! Isso é de mau gosto!"
 ## Shady genealogist offers to prove you are descended from mythical heroes by Isabella Welch
 hold_court.4900.t: "Nos Tempos Antigos..."
 hold_court.4900.desc: "Una figura anciana se acerca a mi trono, chasqueando y golpeando su bastón a cada paso.\n\n«[ROOT.Char.Custom('FormOfAddressForLiege')|U], soy un[suspicious_genealogist.Custom('ES_XA')] genealogista y sé que conocéis vuestro noble origen. Sin embargo, noble no es lo mismo que divino o mítico. Deseo escribir un manuscrito que remonte vuestro linaje hasta los albores de la historia. Por unas pocas monedas de oro, puedo revelaros la verdad a vos y al mundo: ¡que sois un[ROOT.Char.Custom('ES_XA')] verdader[ROOT.Char.Custom('ES_OA')] descendiente de [ROOT.GetCharacter.Custom('GetMythicalFounder')]!»."
 hold_court.4900.a: "\"Eu não preciso de um pedaço de papel para me dizer isso!\""
 hold_court.4900.b: "\"Excelente! Garanta que a lista seja excessivamente longa!\""
 hold_court.4900.c: "[ROOT.GetCharacter.Custom('GetMythicalFounder')]? Nada comparad[ROOT.GetCharacter.Custom('ES_OA')] comigo!"
 hold_court.4900.d: "\"Minha dinastia pode ser pequena, mas não somos tolos!\""
 hold_court.4900.e: "\"Um argumento perfeito para cimentar meu status lendário!\""
 hold_court.4901.desc.intro: "Depois de alguns dias, retorna [suspicious_genealogist.Custom('ES_ElLa')] [suspicious_genealogist.GetTitledFirstName|l]. Desenrola um pergaminho tão grande que seria capaz de circundar uma de minhas províncias. Meu [chaplain.GetCouncilTitle|l] tropeça levemente quando a ponta desenrolada chega aos pés do meu trono.\n\n\"Aqui está a verdade da vossa origem, [ROOT.Char.Custom('FormOfAddressForLiege')]\", pigarreia e começa a ler, \"hoje desvelamos uma grande história. Diante de nós está [ROOT.Char.Custom('ES_AlAla')] [ROOT.GetCharacter.GetTitledFirstNameNoTooltip|l],"
 hold_court.4901.mothers: "filha de [mother_1.GetFullNameNicknamedNoTooltip], gerada pelo temível [mother_2.GetFullNameNicknamedNoTooltip], fruto das entranhas de [mother_3.GetFullNameNicknamedNoTooltip], emergida do ventre de [mother_4.GetFullNameNicknamedNoTooltip], filha da bela [mother_5.GetFullNameNicknamedNoTooltip]..."
 hold_court.4901.fathers: "filho de [father_1.GetFullNameNicknamedNoTooltip], gerado pelo temível [father_2.GetFullNameNicknamedNoTooltip], fruto das entranhas de [father_3.GetFullNameNicknamedNoTooltip], filho do notável [father_4.GetFullNameNicknamedNoTooltip], filho de [father_5.GetFullNameNicknamedNoTooltip]..."
 hold_court.4901.desc.outro: "\n\nAlguns olhos na corte começam a se fechar."
 hold_court.4901.a: "É hora de uma soneca. Sonharei com minha própria glória."
 hold_court.4901.a.tt: "Você deixa o resto da corte ouvindo atentamente."
 hold_court.4901.b: "Isso emociona mais do que qualquer balada! Estou à beira do meu trono!"
 hold_court.4901.c: "\"Chega! A [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTooltip] lhe deve por seus serviços.\""
