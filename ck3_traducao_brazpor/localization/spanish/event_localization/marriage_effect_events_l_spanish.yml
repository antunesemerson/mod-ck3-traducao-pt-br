l_spanish:
 marriage_effect.0001.t: "Fazendo o Certo"
 marriage_effect.0001.desc.multiple: "Finalmente, as coisas estão como sempre deveriam ter sido. O segredo pairando sobre meus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] não pode mais nos machucar, agora que seu pai, [new_spouse.GetTitledFirstName|l], e eu estamos legalmente casados."
 marriage_effect.0001.desc.child: "Passei muitas noites sem dormir preocupad[ROOT.Char.Custom('ES_OA')] com meu [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] e com o que aconteceria conosco se a verdade sobre sua origem viesse à tona.

Agora que seu pai, [new_spouse.GetTitledFirstName|l], e eu estamos legitimamente casados, meus velhos medos podem enfim descansar."
 marriage_effect.0001.desc.pregnancy: "Finalmente, as coisas estão como sempre deveriam ter sido. O segredo pairando sobre meus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] não pode mais machucá-los nem machucar sua mãe, [real_mother.GetTitledFirstName|l], agora que estamos legalmente casados."
 marriage_effect.0001.a: "Passei muitas noites sem dormir preocupad[ROOT.Char.Custom('ES_OA')] com meu [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] e com o que seria de [illegitimate_child.GetHerHim] se a verdade sobre sua filiação viesse à tona.

Agora que sua mãe, [real_mother.GetTitledFirstName|l], e eu estamos legalmente casados, meus velhos medos podem enfim descansar."
 marriage_effect.0002.desc.multiple: "Desde o dia em que descobri que [real_mother.GetTitledFirstName|l] estava grávida de nosso filho, tenho me preocupado muito com o futuro de nossa criança. Agora que estamos legalmente casados, meus medos finalmente podem ser deixados de lado."
 marriage_effect.0002.desc.child: "Passei muitas noites sem dormir preocupad[ROOT.Char.Custom('ES_OA')] com meu [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] e com o que seria de [illegitimate_child.GetHerHim] se a verdade sobre sua filiação viesse à tona.

Agora que sua mãe, [real_mother.GetTitledFirstName|l], e eu estamos legalmente casados, meus velhos medos podem enfim descansar."
 marriage_effect.0002.desc.pregnancy: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] e seus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] têm me preocupado desde o nascimento, pois são fruto de uma união ilícita com [new_spouse.GetTitledFirstName|l].

Agora que [new_spouse.GetTitledFirstName|l] e [real_mother.GetFirstName] estão legitimamente casados, meus velhos medos finalmente podem descansar."
 marriage_effect.0002.desc.pregnancy_not_knowing: "[real_mother.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim com uma mão na barriga.

"Finalmente, as coisas estão como sempre deveriam ter sido. O segredo pairando sobre meus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] não pode mais nos machucar, agora que seu pai, [new_spouse.GetTitledFirstName|l], e eu estamos legalmente unidos."
 marriage_effect.0001.a_not_knowing: "Passei muitas noites sem dormir preocupad[ROOT.Char.Custom('ES_OA')] com meu [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] e com o que seria de nós se a verdade sobre sua origem viesse à tona.

Agora que seu pai, [new_spouse.GetTitledFirstName|l], e eu estamos legalmente unidos, meus velhos medos podem finalmente descansar."
 marriage_effect.0003.desc.pregnancy: "Desde o dia em que descobri que estava grávida, tenho me preocupado muito com o futuro do meu filho. Finalmente estou livre desses medos, agora que seu pai, [new_spouse.GetTitledFirstName|l], e eu estamos legalmente unidos."
 marriage_effect.0003.desc.multiple: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] e seus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] têm me preocupado desde o nascimento, pois são fruto de uma união ilícita com [new_spouse.GetTitledFirstName|l].

Agora que [new_spouse.GetTitledFirstName|l] e [real_mother.GetFirstName] estão legitimamente casados, meus velhos medos finalmente podem descansar."
 marriage_effect.0003.desc: "Tenho me preocupado[ROOT.Char.Custom('ES_OA')] com minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] e seu [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] desde o nascimento da criança, pois é fruto de uma união ilícita com [new_spouse.GetTitledFirstName|l].

Agora que [new_spouse.GetTitledFirstName|l] e [real_mother.GetFirstName] estão legalmente casados, meus velhos medos podem enfim descansar."
 #For concubines - similar events and text to marriage
 marriage_effect.0011.desc.multiple: "O Amor Prevalece"
 marriage_effect.0011.desc.child: "Passei muitas noites sem dormir preocupad[ROOT.Char.Custom('ES_OA')] com meu [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] e com o que seria de nós se a verdade sobre sua origem viesse à tona.

Agora que seu pai, [new_spouse.GetTitledFirstName|l], e eu estamos legalmente unidos, meus velhos medos podem finalmente descansar."
 marriage_effect.0011.desc.pregnancy: "Venha aqui, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse_2') )] meu[spouse_2.Custom('ES_OA')]!"
 marriage_effect.0012.desc.multiple: "Celebração de Casamento"
 marriage_effect.0012.desc.child: "Passei muitas noites sem dormir preocupad[ROOT.Char.Custom('ES_OA')] com meu [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] e com o que seria de [illegitimate_child.Custom('ES_ElElla')] se a verdade sobre sua filiação viesse à tona.

Agora que sua mãe, [real_mother.GetTitledFirstName|l], e eu estamos legitimamente unidos, meus medos podem enfim descansar."
 marriage_effect.0012.desc.pregnancy: "

Tenho todo o direito de cobrar um tributo real como parte disso, mas alguns podem considerar desagradável impor um imposto extra durante um momento de jubilação..."
 marriage_effect.0012.desc.pregnancy_not_knowing: "[real_mother.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim com uma mão em sua barriga.

"Eu não te contei isso antes, mas... A criança que estou esperando é sua. Agora que estamos legalmente unidos, este segredo não pode mais nos prejudicar.""
 marriage_effect.0013.desc.pregnancy: "Desde o dia em que descobri que minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] estava grávida de [new_spouse.GetTitledFirstName|l], tenho guardado o segredo bem perto do peito. Agora que estão legalmente unidos, posso finalmente relaxar."
 marriage_effect.0013.desc.multiple: "Tenho me preocupado com minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] e seus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] desde que nasceram, sabendo que foram concebidos em uma união ilícita com [new_spouse.GetTitledFirstName|l].

Agora que [new_spouse.GetTitledFirstName|l] e [real_mother.GetFirstName] estão legitimamente unidos, meus medos podem finalmente descansar."
 marriage_effect.0013.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] e seu [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] têm me preocupado desde o nascimento, sabendo que foi concebid[illegitimate_child.Custom('ES_OA')] em uma união ilícita com [new_spouse.GetTitledFirstName|l].

Agora que [new_spouse.GetTitledFirstName|l] e [real_mother.GetFirstName] estão legitimamente unidos, meus medos podem enfim descansar."
 marriage_effect.1001.t: "O Amor Prevalece"
 marriage_effect.1001.desc: "Oh, [spouse.GetTitledFirstName|l], meu [spouse.Custom('LoverPetName')]! Só de pensar que agora posso te abraçar abertamente, com as bênçãos de [ROOT.Char.GetFaith.FertilityGodName] e de quem nos rodeia... Sou [ROOT.Char.GetWomanMan] mais feliz do mundo!"
 marriage_effect.1001.a: "Venha aqui, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse') )] meu[secondary_actor.Custom('ES_OA')]!"
 marriage_effect.1002.desc: "Oh, [spouse_2.GetTitledFirstName|l], meu [spouse_2.Custom('LoverPetName')]! Só de pensar que agora posso abraçar você abertamente, com as bênçãos de [ROOT.Char.GetFaith.FertilityGodName] e de quem nos rodeia... Sou [ROOT.Char.GetWomanMan] mais feliz do mundo!"
 marriage_effect.1002.a: "Venha aqui, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse_2') )] meu[spouse_2.Custom('ES_OA')]!"
 marriage_effect.2001.t: "Celebração de Casamento"
 marriage_effect.2001.desc.start_normal: "Com meu casamento com [new_spouse.Custom('ES_ElLa')] [new_spouse.GetTitledFirstName|l], espera-se que ofereçamos uma celebração de casamento adequadamente extravagante."
 marriage_effect.2001.desc.start_divine_marriage: "Com meu casamento com [new_spouse.Custom2('MyCharacterIntroduction', ROOT.Char)], o reino está ansioso por uma grande recepção para celebrar a reunião de nosso sangue divino."
 marriage_effect.2001.desc.start_prison: "Meu nov[new_spouse.Custom('ES_OA')] cônjuge, [new_spouse.GetTitledFirstName|l], está encarcerad[new_spouse.Custom('ES_OA')]. Ainda assim, nosso casamento continua válido e o reino ainda espera que celebremos uma celebração de casamento extravagante."
 marriage_effect.2001.desc.end: "

Tenho todo o direito de cobrar um tributo real como parte disso, mas alguns podem considerar desagradável impor um imposto extra durante um momento de jubilação..."
 marriage_effect.2001.a: "Claro que vou cobrar! Quem paga pelo próprio casamento?"
 marriage_effect.2001.b: "Vou deixar meus súditos aproveitarem as festividades sem preocupações."
