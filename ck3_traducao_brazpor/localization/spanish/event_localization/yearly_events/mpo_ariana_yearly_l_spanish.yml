l_spanish:
 mpo_events_ariana.0001.t: "Avistamento de Ninho"
 mpo_events_ariana.0001.desc: "No caminho de volta para o acampamento, avisto um pequeno ninho, embora nenhum pássaro esteja à vista. É feito de gravetos e capim, e parece estar em boas condições.\n\nAo inspecionar mais de perto, vejo dois filhotes de águia dentro, grandes o suficiente para sobreviverem sem a mãe por um tempo, mas ainda jovens demais para longas jornadas pelo horizonte. A oportunidade de"
 mpo_events_ariana.0001.desc_had_story: "ter uma águia como companheira mais uma vez é tentadora, mas devo ser cauteloso, pois sei o quão voláteis essas criaturas podem ser."
 mpo_events_ariana.0001.desc_has_eagle: "capturar uma, talvez como presente, se apresenta."
 mpo_events_ariana.0001.desc_ending: "levar uma como companheira é boa demais para ser ignorada."
 mpo_events_ariana.0001.a: "Uma boa águia vale a escalada."
 mpo_events_ariana.0001.a_tt: "Você escala a montanha e tenta capturar os filhotes à força"
 mpo_events_ariana.0001.a_win: "Você consegue capturar um filhote, ou ambos"
 mpo_events_ariana.0001.a_win_desc: "O destino de um filhote, ou ambos, está em suas mãos"
 mpo_events_ariana.0001.a_lose_ok: "Você falha ao capturar os filhotes, mas sai ileso"
 mpo_events_ariana.0001.a_lose_bad: "Você falha ao capturar os filhotes e sofre uma pequena queda na montanha"
 mpo_events_ariana.0001.b: "Se for para ser, eles virão até mim."
 mpo_events_ariana.0001.b_win_desc: "Um filhote, ou ambos, voa até você"
 mpo_events_ariana.0001.c: "Um sinal certeiro."
 mpo_daydreaming_birds_modifier: "Sonhando Acordado com Pássaros"
 mpo_daydreaming_birds_modifier_desc: "Este personagem já está acostumado a ver essas criaturas graciosas e aladas.\n[hunt_success_chance|E] de $hunt_type_falconry$: #P +5 %#!"
 hunt_success_chance.mpo_daydreaming_birds_modifier: "[GetModifier('mpo_daydreaming_birds_modifier').GetNameWithTooltip]"
 mpo_events_ariana.0002.desc_intro: "Os filhotes de águia ficam inquietos. Sua partida do ninho será comigo, ou com outro predador.\n\n"
 mpo_events_ariana.0002.desc_standard: "Seguindo o ninho, minha descida é lenta e cuidadosa. Esses filhotes ainda são jovens demais para voar longe, mas não jovens demais para serem perigosos.\n\n"
 mpo_events_ariana.0002.desc_one_standard: "Meu pé escorrega na grama, mas consigo me segurar. Um dos filhotes nota minha luta e começa a grasnar, se assustando e voando para longe. [ROOT.Char.Custom('CulturalCurse')|U]! Embora eu não tenha conseguido os dois, um é melhor do que voltar de mãos vazias."
 mpo_events_ariana.0002.desc_both_standard: "Roubo ambos filhotes de águia do ninho, amarro-os e jogo um pano sobre suas cabeças. Eles pesam, mas não há [Select_CString( ROOT.Char.IsFemale, 'cazadora legendaria', 'cazador legendario' )] de águias que tenha ficado sem suas cargas."
 mpo_events_ariana.0002.desc_lure: "Segurando um pedaço de carne na mão, chamo os filhotes até mim. Eles grasnam em resposta, e posso vê-los se animando com curiosidade, mesmo à distância.\n\n"
 mpo_events_ariana.0002.desc_one_lure: "Apenas um vem até mim, o outro talvez prefira a segurança do ninho. Pego o filhote nos braços e, com seu apetite voraz, ele começa a devorar minha oferta."
 mpo_events_ariana.0002.desc_both_lure: "Divido a carne em dois e a ofereço a ambos. Eles grasnam em uníssono, e não consigo evitar sorrir diante da cena."
 mpo_events_ariana.0002.a: "É belo, e é meu."
 mpo_events_ariana.0002.b: "[eagle_first_recipient.GetFirstNameNoTooltip] pode gostar de tal criatura."
 mpo_events_ariana.0002.c: "Acho que [eagle_second_recipient.GetFirstNameNoTooltip] preferiria tê-la."
 mpo_events_ariana.0002.b_two: "Vou ficar com um e dar o outro para [eagle_first_recipient.GetFirstNameNoTooltip]."
 mpo_events_ariana.0002.c_two: "Um é meu, e talvez [eagle_second_recipient.GetFirstNameNoTooltip] queira o outro?"
 mpo_events_ariana.0002.d: "[eagle_first_recipient.GetFirstNameNoTooltip] e [eagle_second_recipient.GetFirstNameNoTooltip] merecem ambos um presente assim."
 mpo_events_ariana.0002.e: "Um será meu companheiro, e o outro me trará algumas moedas."
 mpo_events_ariana.0002.e_sell_first: "[eagle_first_recipient.GetFirstNameNoTooltip] vai gostar de um, e meus bolsos do outro."
 mpo_events_ariana.0002.e_sell_second: "Um para o mercado, e um para [eagle_second_recipient.GetFirstNameNoTooltip]."
 mpo_events_ariana.0002.e_tt: "Você troca o outro filhote por algo"
 mpo_events_ariana.0002.f_tt: "Você troca o filhote por algo"
 mpo_events_ariana.0002.f_tt_two: "Você troca os filhotes por algo"
 mpo_events_ariana.0002.f_one: "Vai render um bom preço."
 mpo_events_ariana.0002.f_two: "Eles vão render um bom preço."
 mpo_events_ariana.0010.t: "O Fogo Dentro"
 mpo_events_ariana.0010.desc: ""[converting_heir.Custom2('RelationToMe', ROOT.Char)|U]", sussurra meu [ROOT.Char.Custom2('RelationToMeShort', converting_heir)] [converting_heir.GetName] para que eu me aproxime. "[new_faith.HighGodName|U] me mostrou o caminho", continua. \n\n"E agora sigo o [new_faith.GetName|l]. Faz muito tempo que me sinto assim, e não podia deixar isso apodrecer. Sei que vocês têm suas dúvidas, mas vos exorto a se juntarem a mim e aos outros [new_faith.GetAdherentNamePluralNoTooltip] em [ROOT.Char.GetPrimaryTitle.GetTierAsName]. Eu o ajudarei a aprender como é a vida de um [new_faith.GetAdherentNameNoTooltip] e [Select_CString(And(ROOT.Char.IsFemale, converting_heir.IsFemale),'juntas','juntos')] chegaremos a [new_faith.PositiveAfterLife]".\n\n[converting_heir.GetSheHe|U] me encara com grande fervor nos olhos e segura minha mão, aguardando minha resposta."
 mpo_events_ariana.0010.desc_zealous: "[converting_heir.GetFirstNameNoTooltip] se zomba de mim? Como pode chegar a acreditar que me unirei ao seu credo [new_faith.GetAdherentNameNoTooltip]?!"
 mpo_events_ariana.0010.a: "Voc? n?o estar? sozinh[converting_heir.Custom('ES_OA')], [converting_heir.GetFirstNameNoTooltip]."
 mpo_events_ariana.0010.a_zealous: "Talvez eu esteja sendo severo demais,[ROOT.Char.Custom('ES_OA')] e [converting_heir.GetFirstNameNoTooltip] está certa."
 mpo_events_ariana.0010.b: "Em tudo, exceto no nome, eu sou [old_faith.GetAdherentNameNoTooltip]."
 mpo_events_ariana.0010.b_zealous: "Vou lhe dar atenção dessa vez, [converting_heir.GetFirstNameNoTooltip]."
 mpo_events_ariana.0010.b.tt: "Você se converte a [new_faith.GetName|l], mas secretamente continua a praticar [old_faith.GetName|l]."
 mpo_events_ariana.0010.c: "Desculpe, mas eu não posso fazer isso."
 mpo_events_ariana.0010.c_cynical: "Religião é uma questão pessoal, [converting_heir.GetFirstNameNoTooltip]."
 mpo_events_ariana.0010.c_zealous: "Eu jamais abandonaria [old_faith.GetName|l]!"
 mpo_events_ariana.0010.d: "Nenhum [new_faith.GetAdherentNameNoTooltip|l] verá [old_faith.PositiveAfterLife]."
 mpo_events_ariana.0010.d_tt: "Você tenta convencer [converting_heir.GetNameNoTooltip] a permanecer [old_faith.GetAdjective]."
 mpo_events_ariana.0010.d_success: "[converting_heir.GetFirstNameNoTooltip] reconsidera a conversão"
 mpo_events_ariana.0010.d_failure: "[converting_heir.GetFirstNameNoTooltip] permanece firme em se tornar [new_faith.GetAdjectiveNoTooltip]"
 mpo_events_ariana.0020.t: "Nada Confiável"
 mpo_events_ariana.0020.desc_intro: "[worried_spouse.GetName] irrompe em meu aposento e me diz: "Vocês sabiam que [sus_councillor.GetName] pertence à comunidade [councillor_culture.GetName]?"\n\nAntes que eu possa sequer começar a formular uma resposta, ele me interrompe: "Não consigo imaginar"
 mpo_events_ariana.0020.desc_marshal: "qualquer exército meu sendo liderado por um [councillor_culture.GetNameNoTooltip], pois preferiria muito mais estar no lado oposto do campo de batalha. E ainda assim, [sus_councillor.GetSheHe] circula pelos nossos campos de treino?\""
 mpo_events_ariana.0020.desc_spymaster: "tolerar qualquer conspirador [councillor_culture.GetNameNoTooltip] em meu círculo, muito menos que conheça nossos assuntos de espionagem. Eu antes confiaria em uma serpente do que em [sus_councillor.GetSheHe]."
 mpo_events_ariana.0020.desc_end: "Embora as loucuras de [worried_spouse.GetFirstNameNoTooltip] pareçam bastante exageradas, sabe-se que alguns [councillor_culture.GetCollectiveNounNoTooltip] [sus_councillor.Custom('mpo_yearly_ethos')]\n\n“Por favor…”, lamenta-se. “Imploro-vos, não permitais que continue com seu [sus_councillor.Custom2('InsultBehavior', SCOPE.sC('worried_spouse'))] em nossos salões. Não se sabe o que ele pode fazer.”"
 mpo_yearly_bellicose: "são muito imprudentes, em busca de uma vingança que talvez não exista."
 mpo_yearly_stoic: "não derramariam uma lágrima, nem mesmo pela morte de seus próprios parentes."
 mpo_yearly_bureaucratic: "se importam muito mais com um pergaminho ou livro do que com a vida de seus colegas [sus_councillor.GetCulture.GetCollectiveNounNoTooltip]."
 mpo_yearly_spiritual: "podem agir com total desdém pelos outros, desde que fosse em nome de [sus_councillor.GetFaith.HighGodName]."
 mpo_yearly_courtly: "estão mais propensos a ter a cabeça enfiada no traseiro de alguém do que nos campos e montanhas garantindo a sobrevivência."
 mpo_yearly_egalitarian: "não têm problemas com a aceitação de estrangeiros, e provavelmente teriam sua cultura apagada dentro de milênios."
 mpo_yearly_communal: "operam dentro de uma mentalidade de colmeia, e sua incapacidade de agir individualmente é preocupante."
 mpo_events_ariana.0020.a: "Vocês têm razão, [worried_spouse.GetFirstNameNoTooltip]. Amanhã já terá ido embora!"
 mpo_events_ariana.0020.a_tt: "Todos [vassals|lE] [councillor_culture.GetName]:\n$EFFECT_LIST_BULLET$ Perderão #n 10#! [opinion|lE] de #V você#!"
 mpo_events_ariana.0020.b: "Suponho que eu poderia ser mais cauteloso com esses [councillor_culture.GetCollectiveNounNoTooltip]."
 mpo_events_ariana.0020.c: "Não há nada de errado com [sus_councillor.GetSheHe] ou qualquer [councillor_culture.GetNameNoTooltip]."
 mpo_events_ariana.0020.c_paranoid: "Não serei influenciado pela sua paranoia."
 mpo_events_ariana.0020.c_tt: "Todos [vassals|lE] [councillor_culture.GetName]:\n$EFFECT_LIST_BULLET$ Ganharão #p 10#! [opinion|lE] de #V você#!"
 cultural_suspicion_modifier: "Suspeita Cultural"
 cultural_suspicion_modifier_desc: "Este personagem não é muito fã dos estrangeiros em seu reino."
 mpo_events_ariana.0030.t: "Bebidas Proibidas"
 mpo_events_ariana.0030.desc: ""As tigelas de [Glossary( 'kumis', 'KUMIS_GLOSS')] da nossa reunião estão ficando bem secas, minha [ROOT.Char.GetTitleAsNameNoTooltip|l]…", reclama [spymaster.GetName]. "Mas, pelo menos, sei quem é o responsável por esta seca." e aponta para [bartender.GetName], a quem se vê entregando uma taça de leite fermentado de égua a outro plebeu.\n\n"Imagino que não privareis nossos convidados de sua bebida, não é? Afinal, foi preparada especialmente para os grandes senhores e damas de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]", pergunta com um sorriso astuto no rosto."
 mpo_events_ariana.0030.jail: "Vamos ver quanto es[bartender.Custom('ES_EA')] de uma cela."
 mpo_events_ariana.0030.jail_tt: "Todo [Concept('activity_attending', 'convidado assistente')|E] de uma [Concept('dynasty', 'dinastia nobre')|E]:\n$EFFECT_LIST_BULLET$ Ganhará #p 10#! de [opinion|lE] sobre #V você#!"
 mpo_events_ariana.0030.jail_effect: "Você pune [bartender.GetNameNoTooltip] por sua transgressão."
 mpo_events_ariana.0030.ignore: "Deixe os plebeus beberem!"
 mpo_events_ariana.0030.ignore_tt: "Todo [Concept('activity_attending', 'convidado presente')|E] de uma [Concept('dynasty', 'dinastia nobre')|E]:\n$EFFECT_LIST_BULLET$ Perderá #n 10#! de [opinion|lE] sobre #V você#!"
 mpo_events_ariana.0030.ignore_effect: "Você permite que [bartender.GetNameNoTooltip] continue servindo os plebeus."
 mpo_events_ariana.0030.ignore_tt_lowborn: "Todo [Concept('activity_attending', 'convidado presente')|E] [lowborn|lE]:\n$EFFECT_LIST_BULLET$Ganhará #p 10#! de [opinion|lE] sobre #V ti#!"
 mpo_events_ariana.0030.greedy: "Convidados? Eles podem beber água."
 mpo_events_ariana.0030.greedy_tt: "Você pega uma parte dos lucros de [bartender.GetNameNoTooltip] para si mesmo."
 kumi_tax_modifier: "Imposto sobre Bebidas"
 kumi_tax_modifier_desc: "Este personagem aproveitou uma oportunidade lucrativa de negócios apresentada a eles em um recente banquete."
 buzzed_peasants_county_modifier: "Plebeus Satisfeitos"
 buzzed_peasants_county_modifier_desc: "Os plebeus deste condado estão bastante satisfeitos com as recentes festividades."
 mpo_events_ariana.0040.title_feast: "Um Banquete para Lembrar"
 mpo_events_ariana.0040.title_wedding: "Baile Nupcial"
 mpo_events_ariana.0040.title_camp_party: "Atrás da Tenda"
 mpo_events_ariana.0040.desc_wedding_feast: "O salão está com uma luz tênue, o ar está cheio de risos e do cheiro de [ROOT.Char.Custom('GetExpensiveMeal')]. A próxima parte da celebração exige que convidados e anfitriões ocultem seus rostos em nome do mistério e da emoção. Coloco uma máscara, certificando-me de me disfarçar, e me junto aos outros convidados que dançam e se divertem. À medida que os festejos continuam, vejo-me atraíd[ROOT.Char.Custom('ES_OA')] por uma figura misteriosa à minha frente. Ela usa uma máscara elaborada em forma de [ROOT.Char.Custom('GetRandomRegionalBird')]. Ela me acena para me aproximar, e me vejo incapaz de resistir ao seu chamado.\n\nLogo, nossa conversa se torna mais sensual, e não consigo deixar de sentir uma conexão que vai além da máscara. Ela me puxa para um abraço caloroso e sugere que nos mudemos para uma área mais reservada."
 mpo_events_ariana.0040.desc_camp_party: "O acampamento vibra com o som de música e risadas, e [talker.GetName] sugere brincar de esconde-esconde. Prestes a cair na gargalhada com a ideia, percebo que está falando sério. Em pouco tempo, me vejo escondido atrás de uma tenda. Quando os passos se aproximam, eu saio correndo do meu esconderijo e me embrenho ainda mais na natureza selvagem. Talvez minha embriaguez tenha me vencido, mas me vejo perdido[ROOT.Char.Custom('ES_OA')] na floresta e a noite está escura. Logo, esbarro em outra pessoa e ouço um suspiro de alívio. «Ah, eu achava que era o único perdido», ofega. «Devíamos ficar [Select_CString(And(ROOT.Char.IsFemale, masked_guest.IsFemale), 'juntas', 'juntos')], não acham?».\n\nDepois de um tempo vagando, nos vemos [Select_CString(And(ROOT.Char.IsFemale, masked_guest.IsFemale), 'enfrascadas', 'enfrascados')] em uma conversa que vai além das gentilezas habituais. Algo me atrai para es[masked_guest.Custom('ES_EA')] [masked_guest.Custom('WomanManGirlBoy')], embora a escuridão esconda seu rosto. Ele me puxa para perto e sugere que continuemos nossa aventura quando voltarmos ao acampamento."
 mpo_events_ariana.0040.a: "Estou me sentindo aventureir..."
 mpo_events_ariana.0040.a_tt: "Você aceita o convite"
 mpo_events_ariana.0040.b: "Vou passar dessa vez."
 mpo_events_ariana.0041.title: "Desembainado"
 mpo_events_ariana.0041.desc_wedding_feast: "[masked_guest.Custom('ES_ElLa')|U] [masked_guest.Custom('WomanManGirlBoy')] e eu nos esgueiramos em silêncio da festa e [masked_guest.GetSheHe] joga a máscara no chão. A luz da lua entra pela janela e projeta um brilho suave sobre seu rosto."
 mpo_events_ariana.0041.desc_camp_party: "[masked_guest.Custom('ES_ElLa')|U] [masked_guest.Custom('WomanManGirlBoy')] e eu voltamos ao acampamento e parece que o resto já se retirou para passar a noite. A fogueira foi se extinguindo durante nossa ausência e nos encontramos nas trevas novamente. Pego algumas gravetas e as jogo no fogo; as chamas iluminam seu rosto."
 mpo_events_ariana.0041.desc_middle: "\n\nO que antes era leve e agridoce foi apagado com a tensão, quando percebo que quem está bem diante de mim é"
 mpo_events_ariana.0041.desc_rival: "o flagelo da minha existência, [masked_guest.GetName]!"
 mpo_events_ariana.0041.desc_family: "meu própri[masked_guest.Custom('ES_OA')] parente, [masked_guest.GetName]…"
 mpo_events_ariana.0041.desc_family_spouse: "[masked_guest.Custom('ES_ElLa')] cônjuge do meu parente, [masked_guest.GetName]…"
 mpo_events_ariana.0041.desc_rival_spouse: "[masked_guest.GetName], [masked_guest.Custom('ES_ElLa')] cônjuge de [masked_guest_spouse.GetName], meu rival!"
 mpo_events_ariana.0041.desc_outro: "Embora [masked_guest.GetSheHe] pareça tão surpreso[masked_guest.Custom('ES_OA')] quanto eu, rapidamente recupera a compostura. Ele sorri de canto e sussurra: «Estava esperando por este momento, [ROOT.Char.GetFirstNameNoTooltip]»."
 mpo_events_ariana.0041.desc_family_outro: "Ter que ouvir essas palavras da minha própri[masked_guest.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', masked_guest)]…"
 mpo_events_ariana.0041.a_rival: "Um jogo perigoso, mas eu vou jogar."
 mpo_events_ariana.0041.a_family: "Não há nada de errado em conhecer melhor meu familiar."
 mpo_events_ariana.0041.a_rival_spouse: "Se não for para contrariar [masked_guest_spouse.GetFirstName]..."
 mpo_events_ariana.0041.a: "Aceito sua proposta..."
 mpo_events_ariana.0041.b_rival: "Unidos pelo ódio, agora no coração!"
 mpo_events_ariana.0041.b_family: "O laço entre nós é inquebrável!"
 mpo_events_ariana.0041.b_rival_spouse: "Vou tirar tudo de [masked_guest_spouse.GetFirstName]!"
 mpo_events_ariana.0041.b: "Venha até mim, [masked_guest.GetFirstNameNoTooltip]!"
 mpo_events_ariana.0041.c_rival: "Isso não muda nada entre nós[Select_CString(And(ROOT.Char.IsFemale, masked_guest.IsFemale),'nosotras','nosotros')]!"
 mpo_events_ariana.0041.c_family: "[ROOT.Char.Custom2('RelationToMeShort', masked_guest)|U], esqueça que isso aconteceu!"
 mpo_events_ariana.0041.c_spouse: "O que pensaria meu/minha amad[ROOT.Char.GetPrimarySpouse.Custom('ES_OA')] [ROOT.Char.GetPrimarySpouse.GetFirstName]?"
 mpo_events_ariana.0041.c_family_spouse: "Não posso fazer isso com [masked_guest_spouse.GetFirstName]!"
 mpo_events_ariana.0041.c: "Eu devo recusar..."
 mpo_events_ariana.0041.c_tt: "Você recusa as investidas de [masked_guest.GetFirstNameNoTooltip]"
 mpo_events_ariana.0041.d: "Talvez devêssemos chamar uma trégua..."
 mpo_events_ariana.0041.d_tt: "Você usa essa oportunidade para tentar fazer as pazes com [masked_guest.GetFirstNameNoTooltip]"
 mpo_events_ariana.0041.d_success: "Você e [masked_guest.GetFirstName] concordam em deixar as diferenças de lado"
 mpo_events_ariana.0041.d_failure: "Você e [masked_guest.GetFirstName] permanecem em desacordo"
 lover_masked_activity: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'os hicisteis', 'se hicieron')] amantes por causa de uma reviravolta surpreendente dos acontecimentos durante uma atividade."
 lover_masked_activity_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'os hicisteis', 'se hicieron')] amantes por causa de uma reviravolta surpreendente dos acontecimentos durante uma atividade."
 mpo_events_ariana.0050.t: "Marcado"
 mpo_events_ariana.0050.desc: "Os sussurros e acusações em torno de meu [ROOT.Char.Custom2('RelationToMeShort', criminal_family)] [criminal_family.GetName] têm se tornado cada vez mais preocupantes. Fala-se de seu envolvimento em uma recente onda de furtos, e o povo começa a temer por sua segurança. Seja porque foi pego em flagrante ou porque enfrenta o risco de ostracização devido à sua natureza [criminal_family.Custom('mpo_ariana_0050_description')] , o povo clama por seu castigo.\n\nCaso isso aconteça, [criminal_family.GetFirstNameNoTooltip] será despojado de suas terras, títulos e dignidade, sendo deixado para viver na desonra e lançando uma grande sombra sobre a dinastia [ROOT.Char.GetDynasty.GetName]."
 mpo_ariana_0050_scheming: "maquiavélico"
 mpo_ariana_0050_greedy: "rapaz"
 mpo_events_ariana.0050.a: "Não posso deixar o nome da minha família ser manchado."
 mpo_events_ariana.0050.a_tt: "Você paga para limpar o nome de [criminal_family.GetFirstNameNoTooltip]"
 mpo_events_ariana.0050.b: "[criminal_family.GetFirstNameNoTooltip] receberá seu castigo, pois isso está fora das minhas mãos."
 mpo_events_ariana.0050.b_broke: "Parece que não tenho fundos para limpar o nome."
 mpo_events_ariana.0050.c: "Besteiras, eu mesma posso acabar com esses boatos por mim[ROOT.Char.Custom('ES_OA')] ."
 mpo_events_ariana.0050.c_tt: "Você tenta limpar o nome de [criminal_family.GetFirstNameNoTooltip]"
 mpo_events_ariana_0050_lose_effect_tt: "Perde todos os [titles|lE]"
 mpo_events_ariana.0050.lose: "[criminal_family.GetFirstNameNoTooltip] está desonrado"
 mpo_events_ariana.0050.win: "[criminal_family.GetFirstNameNoTooltip] ? inocentad[criminal_family.Custom('ES_OA')]"
 criminal_family_dynasty_modifier: "Dinastia Desonrada"
 criminal_family_dynasty_modifier_desc: "Essa dinastia foi manchada pelas ações de um de seus membros."
 mpo_events_ariana.0060.t: "Ninho de Tesouros"
 mpo_events_ariana.0060.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', appropriate_child)] [appropriate_child.GetName] corre até mim, empolgado, e antes que eu possa perguntar o que o deixou tão animado, ele coloca um pequeno objeto cintilante em minha mão. "Olhem o que encontrei!" exclama. "Caiu do ninho de uma águia, e acho que é um tesouro!" \n\nExamino o objeto e, de fato, é um pequeno enfeite de ouro. Não vale muito, mas está claro que ele se sente muito orgulhos[appropriate_child.Custom('ES_OA')].\n\n"Quer que eu te leve até o ninho?", pergunta. "Talvez haja mais.""
 mpo_events_ariana.0060.a: "Tenho certeza de que consigo subir lá."
 mpo_events_ariana.0060.a_tt: "Você tenta escalar o ninho para encontrar mais tesouros"
 mpo_events_ariana.0060.success: "Você consegue alcançar o ninho com sucesso"
 mpo_events_ariana.0060.success_tt: "Você encontra um estoque de tesouros dentro"
 mpo_events_ariana.0010.failure: "Você falha em alcançar o ninho"
 mpo_events_ariana.0010.a_failure: "Você cai e falha em alcançar o ninho"
 mpo_events_ariana.0060.b: "Eu vou, mas você deve ficar quiet."
 mpo_events_ariana.0060.b_tt: "Você tenta alcançar o ninho sem perturbar a águia"
 mpo_events_ariana.0010.b_failure: "Você assusta a águia e falha em alcançar o ninho"
 mpo_events_ariana.0060.d: "Isso é legal, [appropriate_child.GetFirstNameNoTooltip]."
 mpo_events_ariana.0070.desc: "Chego ao ninho e encontro um filhote de águia dentro, junto com uma pequena bolsinha. "Ah, é daí que o tesouro deve ter vindo", sussurra [appropriate_child.GetFirstName]. Me olha com os olhos arregalados, e consigo ver sua mente trabalhando.\n\n"Onde está a mãe da águia?", pergunta. "Devemos ir embora antes que ela volte". Concordo com a cabeça, mas antes de partirmos, vou ver o que posso levar comigo."
 mpo_events_ariana.0070.a: "Vou pegar o tesouro que vim buscar."
 mpo_events_ariana.0070.a_tt: "Você abre a bolsa"
 mpo_events_ariana.0070.a_trinket: "Você encontra um enfeite misterioso"
 mpo_events_ariana.0070.a_none: "Você não encontra nada de valor"
 mpo_events_ariana.0070.a_great: "A bolsa está cheia de ouro e joias"
 mpo_events_ariana.0070.a_good: "A bolsa contém algumas moedas e enfeites"
 mpo_events_ariana.0070.b: "Este filhote de águia será o prêmio."
 mpo_events_ariana.0070.b_self: "Você leva o filhote de águia consigo"
 mpo_events_ariana.0070.b_child: "Você dá o filhote de águia para [appropriate_child.GetFirstNameNoTooltip]"
 mpo_events_ariana.0070.c: "Isso é seu também, [appropriate_child.GetFirstNameNoTooltip]."
 mpo_events_ariana.0070.c_tt: "Você abre a bolsa e compartilha o conteúdo com [appropriate_child.GetFirstNameNoTooltip]"
 mpo_events_ariana.0070.c_none_tt: "Devolves a [appropriate_child.GetFirstName] o tesouro original"
 mpo_events_ariana.0070.d: "Devemos respeitar o lar da águia."
 mpo_events_ariana.0070.d_tt: "Você sai de mãos vazias"
 mpo_events_ariana.0080.t: "Uma Árvore Mágica"
 mpo_events_ariana.0080.desc: "«[ROOT.Char.GetTitledFirstName], [tree_lover.Custom2('RelationToMeShort', ROOT.Char)] meu[ROOT.Char.Custom('ES_OA')], vocês têm que ouvir isto!», exclama [tree_lover.GetName] e me chama com gestos.\n\n«Fiquei sabendo que existe uma árvore como nenhuma outra. Dizem que ela tem propriedades especiais e até que [ROOT.Char.GetFaith.HighGodName] a abençoou para conceder desejos. Acho que está na hora de procurá-la e ver se as lendas são verdadeiras. Ela fica em [tree_barony.GetName], se isso despertar seu interesse».\n\n¿[tree_barony.GetNameNoTooltip]? É uma longa viagem, mas, se houver alguma chance de essa árvore ser real, eu preciso saber."
 mpo_events_ariana.0080.a: "Traga essa árvore até mim."
 mpo_events_ariana.0080.a_tt: "Você manda [tree_lover.GetFirstNameNoTooltip] procurar pela árvore mágica e trazê-la até você"
 mpo_events_ariana.0080.b: "Vou ver isso por mim mesmo."
 mpo_events_ariana.0080.b_arrogant: "Eu não preciso de ninguém para encontrar uma simples planta para mim."
 mpo_events_ariana.0080.b_tt: "Você parte para [tree_barony.GetName], para encontrar a árvore mágica por conta própria"
 mpo_events_ariana.0080.c_sus: "[tree_lover.GetFirstNameNoTooltip] está tentando me enganar!"
 mpo_events_ariana.0080.c: "Por que perder tempo com um conto de fadas?"
 mpo_events_ariana.0080.c_flavor: "Você não dá atenção aos delírios de [tree_lover.GetFirstName]"
 mpo_events_ariana.0081.desc_self: "Cheguei a [tree_barony.GetName], o lugar de que [tree_lover.GetFirstName] falou. Encontro-me em um clareira, onde uma árvore emite uma suave luz dourada."
 mpo_events_ariana.0081.desc_guy: "Já faz algum tempo desde a última vez que falei com [tree_lover.GetName] e me pego pensando em [tree_lover.GetSheHe] com frequência; me pergunto se já terá encontrado a árvore de que me falou. E, justamente quando estava prestes a abandonar esse pensamento,"
 mpo_events_ariana.0081.desc: "[tree_lover.GetFirstNameNoTooltip] aparece diante de mim com um grande sorriso no rosto. Leva-me até o pátio, onde se ergue alto e orgulhoso uma árvore recém-plantada.\n\n"
 mpo_events_ariana.0081.desc_dead: "[tree_giver.GetFirstNameNoTooltip] aparece diante de mim com uma expressão severa. Ele me leva até o pátio, onde se ergue forte e orgulhosa uma árvore recém-plantada. «[tree_lover.GetName] tinha razão», diz ele, «mas eu gostaria que ele pudesse lhe presentear com ela [tree_lover.GetSheHe] mesmo[tree_lover.Custom('ES_OA')]».\n\n"
 mpo_events_ariana.0081.desc_outro: "Fico maravilhado com a visão, se não apenas porque a lenda acabou sendo verdadeira. Suas folhas brilham ao sol, caindo graciosamente no chão. A luz que passa pelos galhos pinta minha pele, e no meio da minha admiração, penso novamente em [tree_lover.GetFirstNameNoTooltip], e recordo da suposta habilidade da árvore de conceder desejos. Fecho os olhos e faço um pedido silencioso."
 mpo_events_ariana.0081.a: "Eu desejo que minhas terras e minha linhagem prosperem."
 mpo_events_ariana.0081.b: "Eu desejo a força para superar meus inimigos."
 mpo_events_ariana.0081.c: "Eu desejo sabedoria, e uma mente clara."
 mpo_events_ariana.0081.wish: "Você faz o seu pedido"
 mpo_events_ariana.0081.success: "Seu desejo foi concedido"
 mpo_events_ariana.0081.failure: "Seu desejo não foi atendido"
 mpo_magical_tree_fertility_modifier: "Bênção da Fertilidade"
 mpo_magical_tree_fertility_modifier_desc: "Este personagem foi abençoado por uma árvore mágica, fazendo com que suas terras sejam prósperas, e seus filhos sejam muitos."
 mpo_magical_tree_power_modifier: "Bênção do Poder"
 mpo_magical_tree_power_modifier_desc: "Este personagem foi abençoado por uma árvore mágica, fazendo com que se tornem mais poderosos em batalha."
 mpo_magical_tree_wisdom_modifier: "Bênção da Sabedoria"
 mpo_magical_tree_wisdom_modifier_desc: "Este personagem foi abençoado por uma árvore mágica, fazendo com que se tornem mais sábios além de sua idade."
 mpo_magical_tree_modifier: "Acalmado"
 mpo_magical_tree_modifier_desc: "Este personagem testemunhou uma árvore mágica, e é acalmado pela sua presença."
 mpo_events_ariana.0090.t: "Ambições Lãs"
 mpo_events_ariana.0090.desc: "Depois de passar um tempo nos pastos com os pastores, [child.GetFirstName] retorna para a tenda com um sorriso no rosto.\n\n"
 mpo_events_ariana.0090.desc_younger: ""Quero ser pastor[child.Custom('ES_XA')], [child.Custom2('RelationToMeShort', ROOT.Char)]!", exclama. "Passam o dia todo com as ovelhas, e vejam como são felizes. Ser um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] parece entediante!"\n\n[child.GetFirstNameNoTooltip] me entrega um punhado de lã recém-tosquiada e, embora seja áspera e esteja suja, vejo o orgulho em seu olhar."
 mpo_events_ariana.0090.desc_older: ""Quero ser quem toque o rebanho de ovelhas em vez de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], [child.Custom2('RelationToMeShort', ROOT.Char)]", exclama. "A vida deles parece tão simples, sem as preocupações da batalha e do governo".\n\n[child.GetFirstNameNoTooltip] me entrega um punhado de lã recém-tosquiada e, embora seja áspera e suja, percebo a paixão em suas palavras."
 mpo_events_ariana.0090.a: "É sábio conhecer os caminhos de um pastor."
 mpo_events_ariana.0090.a_flavor: "O sonho de [child.GetFirstNameNoTooltip] é bonito, embora simples."
 mpo_events_ariana.0090.b: "Seu legado deve ser maior do que o de um[child.Custom('ES_XA')] pastoreiro[child.Custom('ES_XA')]!"
 mpo_events_ariana.0090.c: "A vida deles não é tão simples quanto parece, filho."
 mpo_events_ariana.0090.c_duel: "[child.GetFirstNameNoTooltip] é enviado para trabalhar nos pastos"
 mpo_events_ariana.0090.c_1: "[child.GetFirstNameNoTooltip] ganha uma apreciação pelo trabalho árduo"
 mpo_events_ariana.0090.c_2: "[child.GetFirstNameNoTooltip] ganha força durante seu trabalho"
 mpo_child_herder_modifier: "Pastor Destinado"
 mpo_child_herder_modifier_desc: "Este personagem passou um tempo nos pastos, e adquiriu algumas habilidades de um pastor."
 mpo_events_ariana.0100.t: "Força em Lugares Improváveis"
 mpo_events_ariana.0100.desc: "Uma nuvem de poeira gira no ar enquanto dois dos meus [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l] se envolvem em uma luta corpo a corpo. O acampamento ruge de empolgação, enquanto [Select_CString( ROOT.Char.IsFemale, 'la campeona', 'el campeón' )] campeão indiscutível do dia atira seu oponente ao chão.\n\nOlho mais adiante entre a multidão, buscando descobrir a identidade de tão bravo [Select_CString( warrior.IsFemale, 'guerrera', 'guerrero' )]. Para minha surpresa, vejo que se trata do meu [warrior.Custom2('RelationToMeShort', warrior)]. [warrior.GetFirstName]! Jamais esperaria tamanha destreza e coragem de sua parte, e muitos nem sequer olhariam para [Select_CString( warrior.IsFemale, 'una mujer', 'un hombre' )] assim!"
 mpo_events_ariana.0100.a: "[Select_CString( warrior.IsFemale, 'Uma guerreira', 'Um guerreiro' )] assim merece liderar!"
 mpo_events_ariana.0100.b: "[warrior.GetFirstNameNoTooltip] pode se juntar a nós na batalha."
 mpo_events_ariana.0100.c: "Talvez [warrior.GetSheHe] não seja [Select_CString( warrior.IsFemale, 'a única', 'o único' )] [warrior.GetWomanMan] com tal habilidade."
 mpo_events_ariana.0100.d: "Impressionante, mas deve se ater aos seus deveres."
 mpo_diverse_warriors_modifier: "Guerreiros Diversos"
 mpo_diverse_warriors_modifier_desc: "Este personagem mostrou que guerreiros vêm em todas as formas e tamanhos.\nCusto de Reforma de [martial_custom|lE]: #p -50%#!"
 mpo_diverse_warriors_modifier_value_desc: "[GetModifier('mpo_diverse_warriors_modifier').GetNameWithTooltip]"
 mpo_events_ariana.0110.t: "Solo Rebelde"
 mpo_events_ariana.0110.desc: ""[ROOT.Char.GetTitleAsNameNoTooltip], ouvi os sussurros dos espíritos", diz meu astrólog[astrologer.Custom('ES_OA')], [astrologer.GetFirstName]. "[ROOT.Char.GetFaith.HighGodNameSheHe|U] adverte que perigos os aguardam, caso mantenhais sua família em [current_capital.GetNameNoTier]".\n\n"
 mpo_events_ariana.0110.desc_fertility: "\"Como seus rebanhos não podem pastar aqui, seria um infortúnio desfrutar suas refeições neste lugar.\""
 mpo_events_ariana.0110.desc_opinion: "\"O povo daqui não é mais tão favorável a você como antes, sua malícia envenenando a terra.\""
 mpo_events_ariana.0110.desc_ending: "Sugiro mover sua tenda para [new_capital.GetNameNoTier], e você poderá encontrar prosperidade lá."
 mpo_events_ariana.0110.a: "[ROOT.Char.GetFaith.HighGodName] não mente. Devemos nos mudar."
 mpo_events_ariana.0110.b: "Bobagem, [current_capital.GetNameNoTierNoTooltip] é minha casa."
 mpo_events_ariana.0110.c_cynical: "[ROOT.Char.GetFaith.HighGodName] não é [ROOT.Char.GetTitleAsNameNoTooltip|l]. Eu sou!"
 mpo_events_ariana.0110.c: "Já basta, [astrologer.GetFirstNameNoTooltip]."
 mpo_home_sweet_home_modifier: "Yurt Doce Yurt"
 mpo_home_sweet_home_modifier_desc: "Este personagem se apegou bastante à sua tenda e ao seu local."
 mpo_events_ariana.0111.t: "Um Novo Lar"
 mpo_events_ariana.0111.desc: "Já faz algum tempo desde que me mudei de [current_capital.GetNameNoTier] para [new_capital.GetNameNoTier] atendendo a um aviso da minha astrólog[astrologer.Custom('ES_OA')] [astrologer.GetFirstName].\n\nComo uma bênção de [ROOT.Char.GetFaith.FertilityGodName], a terra se tornou mais fértil, e meu povo está satisfeito."
 mpo_events_ariana.0111.a: "Encontramos prosperidade aqui."
 mpo_destined_leader_modifier: "Líder Destinado"
 mpo_destined_leader_modifier_desc: "Superando as normas de gênero de sua cultura, este personagem demonstrou ser um líder capaz."
