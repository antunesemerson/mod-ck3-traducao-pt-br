l_spanish:
 varangian_arrived.title: "Um Novo Varegue"
 varangian_arrived.desc: "[varangian_candidate.GetShortUIName|U] se juntou à Guarda Varegue"
 varangian.0002.t: "A Guarda Varegue"
 varangian.0002.opening: "Quando [varangian_candidate.Custom2('MyCharacterIntroduction', ROOT.Char )] vem até mim com seu plano, parece que já tomou uma decisão.\n\n"Servir com os varangianos de"
 varangian.0002.miklagard: "Miklagard"
 varangian.0002.elsewhere: "a guarda do Imperador"
 varangian.0002.end: "trará riqueza e glória!"\n\nIsso não posso negar, embora eu pudesse negar o pedido. Por outro lado, que direito tenho de impedir alguém em sua busca pela glória?"
 varangian.0002.a: "Vá, com a bênção de [ROOT.Char.GetFaith.WarGodName]!"
 varangian.0002.b: "Não, eu proíbo! Você é necessári[varangian_candidate.Custom('ES_OA')] aqui."
 varangian.1002.t: "Retornando da Guarda Varegue"
 varangian.1002.opening: "Mal reconheço [returning_varangian.Custom2('MyCharacterIntroduction', ROOT.Char )] quando aparece em meu [SelectLocalization( IsLandlessAdventurer( ROOT.Char ), 'acampamento', 'grande salão')]."
 varangian.1002.new_partner: "E certamente não reconheço [Select_CString( partner.IsFemale, 'a mulher', 'o homem' )] ao seu lado!"
 varangian.1002.ending: "\n\n"Voltei, [returning_varangian.Custom2('RelationToMeShort', ROOT.Char )]!", brada [returning_varangian.GetFirstNameNoTooltip]. "Muitas vezes pensei que nunca mais veria alguém como você, mas finalmente voltei."\n\nPor mais estranho que seja ver meu [ROOT.Char.Custom2('RelationToMeShort', returning_varangian )] depois de tantos anos, não posso negar que estou impressionado com sua vestimenta [emperor.GetCulture.GetNameNoTooltip], suas joias estrangeiras e o pesado baú que trouxe consigo."
 varangian.1002.a: "Bem-vindo de volta, [returning_varangian.GetFirstNameNoTooltip]!"
 varangian.3001.t: "Guarda Varegue: Uma Morte Honrosa"
 varangian.3001.desc: "[varangian.Custom2('MyCharacterIntroduction', ROOT.Char)] morreu enquanto servia na Guarda Varangiana!\n\nRecebi uma missiva de [emperor.GetTitledFirstName|l], na qual elogia seu nome e descreve como [varangian.GetSheHe] lutou bravamente para salvar a vida de [emperor.GetTitleAsNameNoTooltip] das garras de assassinos cruéis.\n\nNada jamais trará [varangian.GetFirstNameNoTooltip] de volta, mas a recompensa póstuma em ouro enviada por [emperor.GetTitleAsNameNoTooltip] ajuda a aliviar a tristeza."
 varangian.3001.a: "Corajoso até o fim, [varangian.GetFirstNameNoTooltip]..."
