l_spanish:
 bp1_yearly.9001.t: "Um Amigo de Madeira"
 bp1_yearly.9001.opening: "Os amigos costumam ser tão inconstantes e propensos à traição, mas meu amigo mais querido jamais me traiu. Meu brinquedo favorito é mais do que apenas um brinquedo para mim, ele é meu melhor amig[ROOT.Char.Custom('ES_OA')].\n\n"
 bp1_yearly.9001.desc.bully: "No entanto, [bp1_yearly_9001_toy_hater.Custom2('MyCharacterIntroduction', ROOT.Char)] tem me zombado sem parar na frente das outras crianças, dizendo que sou tão patético que nem consigo fazer amigos de verdade. Eu poderia jogar meu brinquedo favorito de lado e o bullying certamente pararia, mas isso significaria abandonar meu melhor amigo[ROOT.Char.Custom('ES_OA')]!"
 bp1_yearly.9001.desc.mentor: "No entanto, [bp1_yearly_9001_toy_hater.Custom2('MyCharacterIntroduction', ROOT.Char)] tem insistido para que eu deixe de lado meu melhor amig[ROOT.Char.Custom('ES_OA')], passe tempo com crianças "de verdade" e socialize como se deve, mas [bp1_yearly_9001_toy_hater.GetSheHe] não entende o que meu doce brinquedo significa para mim!"
 bp1_yearly.9001.a: "Acho que estou velho demais para [ROOT.Char.GetSheHe] agora."
 bp1_yearly.9001.b: "Nunca abandonarei meu melhor amig[ROOT.Char.Custom('ES_OA')]!"
 bp1_yearly.9002.desc.opening: "Todos os dias vejo [bp1_yearly_9001_shy_kid.Custom2('MyCharacterIntroduction', ROOT.Char)] correndo pela [ROOT.Char.Custom('GetCourt')] com seu brinquedo favorito na mão. Às vezes até [bp1_yearly_9001_shy_kid.GetHerHim] vejo-o em um canto reservado, falando com seu brinquedo como se fosse seu melhor amigo!\n\n"
 bp1_yearly.9002.desc.bully: "É totalmente patético e acho que já está na hora de ele/ela aprender quão frágil pode ser esse tipo de amizade."
 bp1_yearly.9002.desc.mentor: "Parece-me bastante estranho, e me preocupa que, se eu não interferir, [bp1_yearly_9001_shy_kid.GetSheHe] será um[bp1_yearly_9001_shy_kid.Custom('ES_XA')] crianç[bp1_yearly_9001_shy_kid.Custom('ES_OA')] preso em um corpo de [bp1_yearly_9001_shy_kid.GetWomanMan], mas [bp1_yearly_9001_shy_kid.GetSheHe] já rejeitou qualquer pedido razoável para deixar o brinquedo de lado."
 bp1_yearly.9002.a: "Eu vou destruí-lo!"
 bp1_yearly.9002.b: "Talvez eu devesse deixar[bp1_yearly_9001_shy_kid.GetHerHim] em paz."
 bp1_yearly.9002.c: "Eu vou destruí-lo e rezar para que [bp1_yearly_9001_shy_kid.GetSheHe] me perdoe."
 bp1_yearly.9003.desc.child: "Por sorte, [bp1_yearly_9001_toy_hater.GetName] decidiu poupar meu melhor amig[ROOT.Char.Custom('ES_OA')] e me deixou brincar e conversar com [ROOT.Char.GetSheHe] o dia todo!\n\nEm algum momento pareceu que queria assassinar[ROOT.Char.GetHerHim], mas acho que meu amig[ROOT.Char.Custom('ES_OA')] verá outro dia."
 bp1_yearly.9003.desc.mentor: "[bp1_yearly_9001_shy_kid.Custom('ES_ElLa')|U] doce e jovem [bp1_yearly_9001_shy_kid.Custom2('MyCharacterIntroduction', ROOT.Char)] veio me ver hoje com lágrimas de alegria nos olhos para me contar como [bp1_yearly_9001_toy_hater.GetName] quase destruiu seu brinquedo favorito, mas o poupou.\n\nA reação é um pouco exagerada para o que, no fim das contas, é apenas outro garoto não ter quebrado um pedaço de madeira. Ainda assim, é uma oportunidade de aprendizado."
 bp1_yearly.9003.a.child: "Acho que, no fundo, [bp1_yearly_9001_toy_hater.GetSheHe] não é tão ruim[bp1_yearly_9001_toy_hater.Custom('ES_OA')]."
 bp1_yearly.9003.a.mentor: "Veja, até mesmo os valentões podem ter seus momentos."
 bp1_yearly.9003.b.child: "Agora não preciso de mais ninguém!"
 bp1_yearly.9003.b.mentor: "Mas [bp1_yearly_9001_toy_hater.GetSheHe] #EMP poderia ter #! destruído isso!"
 bp1_yearly.9004.t: "Amizade Destroçada"
 bp1_yearly.9004.desc: "Não consigo acreditar. Faz um minuto, meu melhor amig[ROOT.Char.Custom('ES_OA')] estava aconchegad[ROOT.Char.Custom('ES_OA')] em segurança nos meus braços, e no seguinte o arrancaram das brutais garras de [bp1_yearly_9001_toy_hater.GetName]. Como [ROOT.Char.GetFaith.DevilName] em pessoa, riu de forma sarcástica e [ROOT.Char.GetHerHim] o levantou no ar antes de o arremessar[ROOT.Char.GetHerHim] contra o chão, transformando[ROOT.Char.GetHerHim] em pouco mais que uma bagunça estilhaçada no chão. Chorei pelo meu querido brinquedo e tentei recompor[ROOT.Char.GetHerHim] freneticamente, mas não adiantou nada. Acabei de presenciar um assassinato."
 bp1_yearly.9004.a: "Um dia, farei o mesmo com ela!"
 bp1_yearly.9004.b: "É difícil, mas devo perdoar[bp1_yearly_9001_toy_hater.GetHerHim]"
 bp1_yearly.9004.c: "Nunca mais sairei de casa!"
 bp1_yearly.9005.t: "Nunca Perdoar"
 bp1_yearly.9005.desc.imprisoned: "Finalmente tenho a [bp1_yearly_9001_toy_hater.Custom2('MyCharacterIntroduction', ROOT.Char)] em minhas masmorras, onde pertence! Provavelmente se esqueceu de que, há muitos anos, destruiu meu precioso brinquedo, meu querid[ROOT.Char.Custom('ES_OA')] amig[ROOT.Char.Custom('ES_OA')], mas eu não esqueci. Nunca esqueço e mal perdoo.\n\n"
 bp1_yearly.9005.desc.guest: "Bem quando pensei que teria um momento de paz, vejo que [bp1_yearly_9001_toy_hater.Custom2('MyCharacterIntroduction', ROOT.Char)] chegou à minha corte como convidad[bp1_yearly_9001_toy_hater.Custom('ES_OA')]! [bp1_yearly_9001_toy_hater.GetHerHim|U] vejo todos os dias, comendo minha comida e dormindo em minhas camas como se este lugar fosse dele e eu não aguento mais!\n\n"
 bp1_yearly.9005.desc.outro: "A questão que continua a mesma é: agora que está à minha mercê, o que devo fazer com [bp1_yearly_9001_toy_hater.GetSheHe]? Como se faz justiça por um crime tão horrível?"
 bp1_yearly.9005.a: "Hora de vingança!"
 bp1_yearly.9005.b: "Hora de assassinato!"
 bp1_yearly.9005.c: "Hora de perdoar."
 may_lead_to_vengeful: "Pode levar ao [trait|lE] [GetTrait('vengeful').GetName( GetNullCharacter )|LV]"
 may_lead_to_forgiving: "Pode levar ao [trait|lE] [GetTrait('forgiving').GetName( GetNullCharacter )|LV]"
 may_lead_to_shy: "Pode levar ao [trait|lE] [GetTrait('shy').GetName( GetNullCharacter )|LV]"
 bp1_living_as_peasant_modifier: "Vivendo como um Camponês"
 bp1_living_as_peasant_modifier_desc: "Este personagem está passando uma quantidade extensa de tempo vivendo entre a plebe local para escapar das pressões do governo."
 bp1_yearly.9006.t: "Uma Consideração Sinistra"
 bp1_yearly.9006.desc.intro: "Enquanto volto da [ROOT.Char.GetFaith.HouseOfWorship], [bp1_yearly_9006_sinful_courtier.GetNameNoTooltip] se aproxima de mim com um sorriso lascivo.\n\n\"[ROOT.Char.GetFirstNameNoTooltip], eu sei que você e eu ambos"
 bp1_yearly.9006.desc.lustful: "nos entregamos aos prazeres da carne que os [ROOT.Char.GetFaith.PriestNeuterPlural] nos diriam para negar!"
 bp1_yearly.9006.desc.gluttonous: "compartilhamos uma paixão pelos inúmeros sabores e texturas que este mundo tem a nos oferecer na mágica arte que é cozinhar. O mundo foi criado com tanta comida maravilhosa, o verdadeiro pecado seria não provar tudo!"
 bp1_yearly.9006.desc.vengeful: "saboreamos o sofrimento de nossos inimigos encontrando o castigo merecido. Embora os [ROOT.Char.GetFaith.PriestNeuterPlural] chamem de pecado a alegria pelo sofrimento de nossos inimigos, acredito que somos apenas os portadores da justiça divina."
 bp1_yearly.9006.desc.sadistic: "ficamos empolgados com os gritos lamentáveis dos inocentes e condenados! Se eles vão morrer de qualquer maneira, por que não nos divertirmos com eles antes de partirem?"
 bp1_yearly.9006.desc.craven: "cansamos das constantes proclamações de atos de \"bravura\" que esses brutos se gabam. E daí se eles matam [ROOT.Char.Custom('GetAnimalType')]? É apenas risco desnecessário!"
 bp1_yearly.9006.desc.arbitrary: "sabemos que a justiça é apenas uma palavra para validar os caprichos dos outros, e verdadeiramente ninguém sabe o que é justo. O que torna nossa vontade arbitrária, senão a vontade dos [ROOT.Char.GetFaith.PriestNeuterPlural]?"
 bp1_yearly.9006.desc.deceitful: "sabemos que a \"verdade\" pode ser divertidamente maleável, e aqueles tolos o suficiente para cair na decepção merecem o que lhes acontece."
 bp1_yearly.9006.desc.chaste: "estamos cansados dos prazeres da carne que a igreja nos diria para nos entregarmos como animais inferiores. Uma noite de entretenimento tranquilo e introspecção não é mais pacífica do que se juntar a mais um amontoado de corpos suados?"
 bp1_yearly.9006.desc.greedy: "sabemos que devemos segurar o que é nosso e não dar nada aos pobres e \"necessitados\"! Se desejam nossa riqueza, talvez não devessem tê-la desperdiçado."
 bp1_yearly.9006.desc.wrathful: "não escondemos nossas emoções e deixamos o ódio e a raiva fluírem livre e desimpedidos em nossos corpos. Eles nos dizem para não sentir nossos sentimentos e conter o que está dentro e chamam isso de virtude."
 bp1_yearly.9006.desc.cynical: "questionam a autoridade da igreja mundana em questões espirituais. O que um [ROOT.Char.GetFaith.PriestNeuter] realmente sabe sobre [ROOT.Char.GetFaith.DivineRealm] que nós não sabemos?"
 bp1_yearly.9006.desc.ambitious: "anseiam por muito mais do que as migalhas que nos foram dadas por [ROOT.Char.GetFaith.PantheonTerm] no nascimento. Não podemos ficar contentes com o que nos foi dado quando sabemos que estamos destinados a muito mais!"
 bp1_yearly.9006.desc.shy: "acham a companhia dos outros completamente exaustiva. Espera-se que falem com tantas pessoas, mas elas não têm nada interessante a dizer e nós não temos nada interessante a dizer de volta. Por que gastar tempo com eles quando podemos ficar mais felizes sozinhos?"
 bp1_yearly.9006.desc.callous: "não se importam nem um botão com o sofrimento dos outros. Como podemos esperar nos importar com os sentimentos passageiros dos outros quando nossa própria felicidade ininterrupta está em jogo?"
 bp1_yearly.9006.desc.generic: "são verdadeiros consigo mesmos, não importa que absurdo os [ROOT.Char.GetFaith.PriestNeuterPlural] possam pregar."
 bp1_yearly.9006.desc.outro: "Afinal, quem pode nos dizer como [ROOT.Char.GetFaith.HighGodName] gostaria que vivêssemos?\n\n\"Claramente, temos mais em comum do que não, e acho que você e eu deveríamos passar mais tempo juntos, longe dos cérebros podres das pessoas simples. O que você acha?\""
 bp1_yearly.9006.a: "Uma ideia maravilhosa, digo eu!"
 bp1_yearly.9006.b: "Meus pensamentos pecaminosos não são motivo de orgulho!"
 bp1_yearly.9007.t: "Um Espelho na Lama"
 bp1_yearly.9007.desc: "Enquanto percorro as ruas de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], rodead[ROOT.Char.Custom('ES_OA')] por meu habitual séquito de guardas e cortesãos, vejo algo que me faz parar e ficar sem fôlego.\n\nUm[bp1_yearly_9007_doppelganger.Custom('ES_XA')] mendig[bp1_yearly_9007_doppelganger.Custom('ES_OA')] campone[bp1_yearly_9007_doppelganger.Custom('ES_OA')] sem nada que [bp1_yearly_9007_doppelganger.GetHerHim] proteja dos elementos, além de lama e trapos, me encara com olhos desesperados e implorantes. Eu teria seguido em frente, mas havia algo quase familiar nesse est[bp1_yearly_9007_doppelganger.Custom('ES_OA')] plebeu[bp1_yearly_9007_doppelganger.Custom('ES_OA')].\n\nEntão, um membro da minha comitiva aponta que ele é a minha cara. É angustiante ver meu reflexo se revolvendo na sujeira, mas talvez eu possa fazer algo para corrigir essa injustiça cósmica."
 bp1_yearly.9007.a: "[bp1_yearly_9007_doppelganger.GetSheHe|U] se juntará a mim na corte!"
 bp1_yearly.9007.b: "Dê um fim a est[bp1_yearly_9007_doppelganger.Custom('ES_EA')] duplo abominável."
 bp1_yearly.9007.c: "Continuem e esqueçam essa criatura sinistra."
 bp1_yearly.9008.t: "Viver como Meu Outro Eu"
 bp1_yearly.9008.desc: "Já faz algum tempo que trouxe [bp1_yearly_9007_doppelganger.GetName] à corte, e tem sido bastante agradável ver meu duplo participar do estilo de vida da nobreza, em vez de se revolver na sujeira e na pobreza.\n\n[bp1_yearly_9007_doppelganger.GetName] se aproxima de mim com um brilho nos olhos e faz uma proposta intrigante. «Ninguém lá em casa sabe que eu vivo com a nobreza. Andei pensando que deveríamos fazer uma troca, [ROOT.Char.GetLadyLord] meu[ROOT.Char.Custom('ES_OA')]. Eu vou te substituir como [ROOT.Char.GetTitleAsNameNoTooltip|l] e você pode passar o dia como um[ROOT.Char.Custom('ES_OA')] de nós, a gente comum»."
 bp1_yearly.9008.a: "O governante se tornará o governado por um dia!"
 bp1_yearly.9008.b: "Que proposta insultante."
 bp1_yearly.9009.t: "Outro Amante"
 bp1_yearly.9009.desc.intro: "Aproximo-me aos meus aposentos ao alarmante som do que parece uma luta feroz! Golpes intensos, pancadas e… os gritos de [bp1_yearly_9009_lover.Custom2('MyCharacterIntroduction', ROOT.Char)]!\n\nAo invadir o quarto, vejo meu sósia [bp1_yearly_9007_doppelganger.GetNameNoTooltip] completamente nu[bp1_yearly_9007_doppelganger.Custom('ES_OA')] fazendo coisas inimagináveis com [bp1_yearly_9009_lover.GetNameNoTooltip]!"
 bp1_yearly.9009.desc.lustful: "[bp1_yearly_9009_lover.GetSheHe|U] chora. \"Sinto muito, meu amor, é que [bp1_yearly_9007_doppelganger.GetNameNoTooltip] é apenas um pouco mais justo que você! Meu peito lateja por [bp1_yearly_9007_doppelganger.GetSheHe]!\""
 bp1_yearly.9009.desc: "[bp1_yearly_9009_lover.GetSheHe|U] insiste que não tinha ideia de que não era eu, mas não tenho certeza se acredito no que diz."
 bp1_yearly.9009.a: "Fora da minha vista, os dois!"
 bp1_yearly.9009.b: "Façam prender este[GetPlayer.Custom('ES_EA')] bonit[GetPlayer.Custom('ES_OA')] infeliz."
 bp1_yearly.9009.c: "Não posso ficar no caminho do verdadeiro amor."
 bp1_yearly.9009.d: "Percebo agora, me importo com ambos!"
 bp1_yearly.9010.t: "Um [ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] a mais"
 bp1_yearly.9010.desc.intro: "[bp1_yearly_9007_doppelganger.GetName] irrompe na minha sala do trono,"
 bp1_yearly.9010.desc.drunk: "o fedor de [ROOT.Char.Custom('RegionalDrink')] impregnando completamente o corpo dele. Ele cambaleia na minha direção com ira nos olhos.\n\n"Impostor[ROOT.Char.Custom('ES_XA')]! Eu [ROOT.Char.Custom('ES_EA')] *#EMP hip#!*"
 bp1_yearly.9010.desc.stoner: "Fedendo a fumaça de haxixe e suor. Seus olhos errantes e ensanguentados se franzem na direção da área ao redor da minha cabeça enquanto ele se aproxima de mim aos tropeços, rindo feito um[bp1_yearly_9007_doppelganger.Custom('ES_XA')] lou[bp1_yearly_9007_doppelganger.Custom('ES_OA')].\n\n"Impostor[ROOT.Char.Custom('ES_XA')]! É[ROOT.Char.Custom('ES_EA')] *#EMP tos#!*"
 bp1_yearly.9010.desc.outro: "[ROOT.Char.Custom2('InsultNoun', SCOPE.sC('bp1_yearly_9007_doppelganger'))|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('bp1_yearly_9007_doppelganger'))] não é [ROOT.Char.GetNameNoTooltip]! Eu sou [ROOT.Char.Custom('ES_ElLa')] autêntic[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetNameNoTooltip]!\n\nEmbora seja uma mentira evidente, minha corte parece estar convencida de que minha verdadeira identidade está em disputa! Quando [bp1_yearly_9007_doppelganger.GetNameNoTooltip] desembainha a arma, fica claro que a violência é a única resposta."
 bp1_yearly.9010.a: "Deve haver apenas um!"
 bp1_yearly.9010.a_tt: "Inicia um [single_combat_duel|lE] com [bp1_yearly_9007_doppelganger.GetShortUIName]"
 bp1_yearly.9010.b: "Guardas, apanhem este[bp1_yearly_9007_doppelganger.Custom('ES_EA')] impostor[bp1_yearly_9007_doppelganger.Custom('ES_XA')]!"
 bp1_yearly.9012.t: "Problemas em Dobro"
 bp1_yearly.9012.desc: "Vitória! Vejam? Só [ROOT.Char.Custom('ES_ElLa')] verdadeir[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetNameNoTooltip] venceria em justa disputa!\n\nMeu sósia proclama a vitória e, embora muitos não pareçam convencidos, outros parecem ter sido conquistados por esta demonstração de destreza e já me declaram suspeitos[ROOT.Char.Custom('ES_OA')]. É feita uma pequena votação entre a nobreza e ainda sou declarado [ROOT.Char.Custom('ES_ElLa')] verdadeir[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetNameNoTooltip], embora por pequena margem.\n\nEmbora a maioria ainda acredite que eu sou quem digo ser, tanta gente foi convencida de que [bp1_yearly_9007_doppelganger.GetNameNoTooltip] é na verdade [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetNameNoTooltip] que [bp1_yearly_9007_doppelganger.GetSheHe] sai desse encontro com uma reivindicação aos meus títulos e uma multidão de pessoas que acredita que [bp1_yearly_9007_doppelganger.GetSheHe] sou eu!"
 bp1_yearly.9012.a: "Estou enlouquecendo ou todos os outros estão?"
 bp1_yearly.9013.desc: "Quando minha vitória é proclamada sobre [bp1_yearly_9007_doppelganger.Custom('ES_ElLa')] impostor[bp1_yearly_9007_doppelganger.Custom('ES_XA')], parece que todos os que duvidavam da minha verdadeira identidade foram silenciados. Meus guardas tomam posse de [bp1_yearly_9007_doppelganger.GetNameNoTooltip], que ainda sibila e me provoca, gritando sobre o reino que lhe foi negado.\n\nEmbora [bp1_yearly_9007_doppelganger.GetNameNoTooltip] ainda afirme ser [ROOT.Char.Custom('ES_ElLa')] verdadeiro[ROOT.Char.Custom('ES_OA')] eu, poucos [bp1_yearly_9007_doppelganger.GetHerHim] o escutarão do confinamento das minhas masmorras."
 bp1_yearly.9013.a: "Estou feliz que acabou."
 bp1_yearly.9014.t: "Mais do que um Rosto Bonito"
 bp1_yearly.9014.desc.soulmate: "Ao me deitar na cama com meu belo[bp1_yearly_9007_doppelganger.Custom('ES_OA')] amante, [bp1_yearly_9007_doppelganger.GetNameNoTooltip]descubro que temos mais em comum do que apenas nossa aparência. [bp1_yearly_9007_doppelganger.GetSheHe|U] é um[bp1_yearly_9007_doppelganger.Custom('ES_XA')] gênio e erudit[bp1_yearly_9007_doppelganger.Custom('ES_XA')] e frequentemente ecoa sentimentos que eu mesm[ROOT.Char.Custom('ES_OA')] tenho sentido com frequência, mas que não consegui expressar em palavras. É como se nossas mentes fossem uma só e fôssemos capazes de completar os pensamentos [ROOT.Char.Custom('ES_DelDela')] do outro[ROOT.Char.Custom('ES_OA')]. Um relacionamento assim só pode significar uma coisa: amor!\n\nMas será que sou realmente tão obcecad[ROOT.Char.Custom('ES_OA')] comigo mesm[ROOT.Char.Custom('ES_OA')] que chamaria meu próprio duplo de algo mais do que um simples amante, um... alma gêmea?"
 bp1_yearly.9014.desc.lover: "Passo a passar cada vez mais tempo com [bp1_yearly_9007_doppelganger.Custom('ES_ElLa')]terna[bp1_yearly_9007_doppelganger.Custom('ES_OA')] e linda[bp1_yearly_9007_doppelganger.Custom('ES_OA')] [bp1_yearly_9007_doppelganger.GetName]. Embora no passado [bp1_yearly_9007_doppelganger.GetHerHim] eu o via como pouco mais que um sombrio reflexo de mim mesm[ROOT.Char.Custom('ES_OA')], cheguei a achar sua companhia agradável e reconfortante. Enquanto passeamos juntos pela minha corte, ficamos paralisad[ROOT.Char.Custom('ES_OA')]s quando nossas mãos se tocam.\n\nEsse momento fugaz de carne contra carne, por breve que tenha sido, fez brotar rosas ardentes nas minhas faces e, quando volto o olhar ansiosamente para [bp1_yearly_9007_doppelganger.GetNameNoTooltip] , parece que [bp1_yearly_9007_doppelganger.GetSheHe] sente o mesmo.\n\nSou realmente tão narcisista a ponto de sequer considerar chamar minha cópia de… amante?"
 bp1_yearly.9014.a: "Claro que sou!"
 bp1_yearly.9014.a.arrogant: "Eu me amo- quer dizer, você, muito!"
 bp1_yearly.9014.b: "N-não! Não podemos!"
 bp1_yearly.9015.t: "São Dois"
 bp1_yearly.9015.desc: "Desde que comecei a passar tempo com [bp1_yearly_9007_doppelganger.Custom('ES_ElLa')] encantador[bp1_yearly_9007_doppelganger.Custom('ES_XA')] e bel[bp1_yearly_9007_doppelganger.Custom('ES_OA')] [bp1_yearly_9007_doppelganger.GetName], [bp1_yearly_9015_living_parent.Custom2('MyCharacterIntroduction', ROOT.Char)] parece pensativ[bp1_yearly_9015_living_parent.Custom('ES_OA')] e inquiet[bp1_yearly_9015_living_parent.Custom('ES_OA')], será que ele(a) desaprova nosso relacionamento?\n\nCom um pouco de pressão, [bp1_yearly_9015_living_parent.GetNameNoTooltip] desaba em uma confissão chorosa. Vocês são gême[ROOT.Char.Custom('ES_OA')]s, [ROOT.Char.GetFirstNameNoTooltip]! Quando você nasceu, eu não queria que a sua sucessão fosse contestada, então separei vocês dois. Nunca pensei que vocês se encontrariam!\n\nUma confissão chocante, no mínimo, mas o que posso fazer com essa informação?"
 bp1_yearly.9015.a: "Abrace-me, [bp1_yearly_9007_doppelganger.Custom('SisterBrother')]!"
 bp1_yearly.9015.b: "Ninguém pode saber."
 bp1_yearly.9016.t: "[bp1_yearly_9016_uppity_child.Custom('ES_ElLa')|U] [bp1_yearly_9016_uppity_child.GetWomanMan|U] que poderia reinar"
 bp1_yearly.9016.desc.intro: "O que começou como uma reunião familiar nos salões de refeição de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] rapidamente se transformou em uma discussão acalorada entre [bp1_yearly_9016_heir.Custom2('MyCharacterIntroduction', ROOT.Char)] e [bp1_yearly_9016_uppity_child.Custom2('MyCharacterIntroduction', ROOT.Char)]!\n\n[bp1_yearly_9016_uppity_child.GetSheHe|U] afirma que [bp1_yearly_9016_heir.GetNameNoTooltip] não é dign[bp1_yearly_9016_heir.Custom('ES_OA')] de ser minha herdeir[bp1_yearly_9016_heir.Custom('ES_OA')] de forma alguma.\n\n"
 bp1_yearly.9016.desc.not_a_child: ""Nem sequer é seu[bp1_yearly_9016_heir.Custom('ES_OA')] [bp1_yearly_9016_heir.Custom('GetDaughterSon')]! Que direito tem de herdar o trono acima de mim quando vós fordes para [ROOT.Char.GetFaith.PositiveAfterLife]?"
 bp1_yearly.9016.desc.bastard: "«Não é [bp1_yearly_9016_heir.Custom('GetDaughterSon')] legítim[bp1_yearly_9016_heir.Custom('ES_OA')] desta família. Eu, sim, nasci da união dos meus pais; por que ess[bp1_yearly_9016_heir.Custom('ES_EA')] bastardo[bp1_yearly_9016_heir.Custom('ES_OA')] deve herdar o trono?"
 bp1_yearly.9016.desc.child_of_concubine: ""Nasceu de uma concubina insignificante! Eu sou fruto de [bp1_yearly_9016_uppity_child.Custom('GetCulturallyAppropriateMarriageReference')|l] entre vós e [bp1_yearly_9016_uppity_child.GetMother.GetName], e a coroa me pertence por direito de nascimento!"
 bp1_yearly.9016.desc.rival: ""Ela o traiu mil vezes, enquanto eu lhe fui leal! Como podemos esperar que essa besta licenciosa cuide de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] quando você não estiver aqui, se nem sequer se preocupa com você enquanto você ainda está aqui?"
 bp1_yearly.9016.desc.fallback: "É totalmente indign[bp1_yearly_9016_heir.Custom('ES_OA')] da coroa e só merece ser meu bobo[bp1_yearly_9016_heir.Custom('ES_OnOna')] após a sucessão! Est[bp1_yearly_9016_heir.Custom('ES_EA')] e vilã[bp1_yearly_9016_heir.Custom('ES_OA')] ocupou o primeiro lugar para a coroa por tempo demais e merece ser colocada em seu lugar."
 bp1_yearly.9016.desc.outro: "Exijo um duelo com você, [bp1_yearly_9016_heir.GetNameNoTooltip]! Um duelo pelo trono!\""
 bp1_yearly.9016.a: "Ah, isso será bom."
 bp1_yearly.9016.b: "Sente-se, seu tolo!"
 9016_uppity_child_wins: "[bp1_yearly_9016_uppity_child.GetName] vence o duelo"
 9016_heir_wins: "[bp1_yearly_9016_heir.GetName] vence o duelo"
 bp1_yearly.9017.t.culture: "[bp1_yearly_9017_uppity_child.Custom('ES_ElLa')|U] [bp1_yearly_9017_uppity_child.Custom('GetPrincessPrince')] estranheir[bp1_yearly_9017_uppity_child.Custom('ES_OA')]"
 bp1_yearly.9017.t.faith: "[bp1_yearly_9017_uppity_child.Custom('ES_ElLa')|U] [bp1_yearly_9017_uppity_child.Custom('GetPrincessPrince')] pagão[bp1_yearly_9017_uppity_child.Custom('ES_OA')]"
 bp1_yearly.9017.desc.intro: "À noite, junto à fogueira, vejo [bp1_yearly_9017_uppity_child.Custom2('MyCharacterIntroduction', ROOT.Char)] meditativo com a intensidade de [ROOT.Char.GetFaith.KnowledgeGodName]. Pergunto o que o aflige tanto, e ele se volta para mim com fúria e vergonha queimando em seus olhos.\n\n"
 bp1_yearly.9017.desc.culture: ""Sou diferente[bp1_yearly_9017_uppity_child.Custom('ES_OA')] do resto de vocês! Não conheço os costumes e tradições da cultura [ROOT.Char.GetCulture.GetName]. Sinto-me so[bp1_yearly_9017_uppity_child.Custom('ES_OA')], uma alma [bp1_yearly_9017_uppity_child.GetCulture.GetName] que vive entre [ROOT.Char.GetCulture.GetCollectiveNoun] na corte como se tivesse o direito de ser um[bp1_yearly_9017_uppity_child.Custom('ES_OA')] deles."
 bp1_yearly.9017.desc.faith: ""Não sou como vocês! Eu não oro nem venero como os [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip]! Sou um[bp1_yearly_9017_uppity_child.Custom('ES_XA')] do povo [bp1_yearly_9017_uppity_child.GetFaith.GetAdherentNameNoTooltip] que vai herdar um [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|L] de infiéis."
 bp1_yearly.9017.desc.outro: "Sou uma fraude e não posso continuar sendo seu[bp1_yearly_9017_uppity_child.Custom('ES_OA')] herdeir[bp1_yearly_9017_uppity_child.Custom('ES_OA')]!"
 bp1_yearly.9017.a: "Devemos celebrar nossas diferenças, [ROOT.Char.Custom2('RelationToMe', bp1_yearly_9017_uppity_child)] minha[bp1_yearly_9017_uppity_child.Custom('ES_OA')]!"
 bp1_yearly.9017.b.culture: "[bp1_yearly_9017_uppity_child.GetCulture.GetName] ou [ROOT.Char.GetCulture.GetName], você ainda é m [ROOT.Char.Custom2('RelationToMe', bp1_yearly_9017_uppity_child)]."
 bp1_yearly.9017.b.faith: "[bp1_yearly_9017_uppity_child.GetFaith.GetAdherentNameNoTooltip] ou [ROOT.Char.GetFaith.GetAdherentNameNoTooltip], você ainda é m [ROOT.Char.Custom2('RelationToMe', bp1_yearly_9017_uppity_child)]."
 bp1_yearly.9017.c: "Uma ideia excelente, eu o deserdarei[bp1_yearly_9017_uppity_child.Custom('ES_OA')]!"
 cultural_acceptance_embraced_child: "Celebração cultural"
 cultural_acceptance_rejected_child: "Exclusão cultural"
 bp1_yearly.9018.t: "Paixão ou Pureza"
 bp1_yearly.9018.desc.intro: "Em um momento de vulnerabilidade, [bp1_yearly_9018_illegitimate_child.Custom2('MyCharacterIntroduction', ROOT.Char)] corre para mim, envolvendo seus braços em volta das minhas pernas, sujando-me com lágrimas e muco.\n\n"
 bp1_yearly.9018.desc.bastard: "\"[ROOT.Char.GetMotherFather|U]! É tão *#EMP sniff#!* terrível, não consigo mais suportar! [bp1_yearly_9018_bully.GetName|U] tem me provocado incessantemente, dizendo que nasci sem moral e que não sou digno do seu amor. Diga-me que não é verdade!\"\n\n"
 bp1_yearly.9018.desc.child_of_concubine: ""[ROOT.Char.GetMotherFather|U]! [bp1_yearly_9018_bully.GetName|U] diz que os filhos das concubinas são impuros! Ele/ela ficou tampando o nariz e dizendo que eu fedo a sangue de concubina. Diga-me que me ama, [ROOT.Char.GetMotherFather]!"\n\n"
 bp1_yearly.9018.desc.outro.callous: "Deveria dizer a es[bp1_yearly_9018_illegitimate_child.Custom('ES_EA')] mequetrefe que me solte, mas o que eu digo?"
 bp1_yearly.9018.desc.outro: "Este é claramente um momento delicado para [bp1_yearly_9018_illegitimate_child.Custom('ES_ElLa')] [bp1_yearly_9018_illegitimate_child.Custom('GirlBoy')], mas o que dizer?"
 bp1_yearly.9018.a: "Talvez seja hora de nós três conversarmos."
 bp1_yearly.9018.b: "Coisas de [bp1_yearly_9018_bully.Custom('GirlBoyPlural')]!"
 bp1_yearly.9018.c: "Por que você está chorando? Isso claramente pode ser resolvido com violência."
 9018_uppity_child_wins: "[bp1_yearly_9018_illegitimate_child.GetName] vence o duelo"
 9018_bully_child_wins: "[bp1_yearly_9018_bully.GetName] vence o duelo"
 bp1_yearly.9019.t: "Um[bp1_yearly_9019_lover.Custom('ES_XA')] [bp1_yearly_9019_lover.GetWomanMan] em nossa cama"
 bp1_yearly.9019.desc.intro.gay: "O momento que eu temia chegou. Estremeço silenciosamente e entro na ponta dos pés no meu [ROOT.Char.Custom('GetChamber')], sabendo que [bp1_yearly_9019_spouse.Custom2('MyCharacterIntroduction', ROOT.Char)] está esperando lá dentro, aguardando uma noite de fazer amor sem paixão."
 bp1_yearly.9019.desc.intro.bi: "Chegou o momento de novamente entrar no meu [ROOT.Char.Custom('GetChamber')] e tentar ter um filho com [bp1_yearly_9019_spouse.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 bp1_yearly.9019.desc.bridge: "No entanto, para minha surpresa, vejo [bp1_yearly_9019_spouse.GetHerHim] ao lado de uma[bp1_yearly_9019_lover.Custom('ES_XA')] [bp1_yearly_9019_lover.GetWomanMan] totalmente nu[bp1_yearly_9019_lover.Custom('ES_OA')]! Exijo uma explicação, o que faz surgir um sorriso de cumplicidade em seu rosto.\n\n"
 bp1_yearly.9019.desc.bridge.gay: ""Já sei há algum tempo que o que vos falta para inflamar de paixão as vossas entranhas é o toque de um[bp1_yearly_9019_spouse.Custom('ES_XA')] [bp1_yearly_9019_spouse.GetWomanMan]."
 bp1_yearly.9019.desc.bridge.bi: ""Sei há algum tempo que anseiais pelo toque de outr[bp1_yearly_9019_lover.Custom('ES_OA')] [bp1_yearly_9019_lover.GetWomanMan]."
 bp1_yearly.9019.desc.compassionate: "Não guardo ressentimento nem ciúme, só quero que você seja feliz, talvez nosso amor fique mais carinhoso se envolvermos outr[bp1_yearly_9019_lover.Custom('ES_OA')] [bp1_yearly_9019_lover.GetWomanMan]!"."
 bp1_yearly.9019.desc.lustful: "Não faz diferença para mim, eu só quero uma noite de paixão! Talvez fosse mais prazeroso para nós dois se incluíssemos noss[bp1_yearly_9019_lover.Custom('ES_OA')] amig[bp1_yearly_9019_lover.Custom('ES_OA')] quando fizermos amor"."
 bp1_yearly.9019.desc.cynical: "Francamente, não me importo com quem ou o que você deseja copular, só quero um filho legítimo nascido de nossa união."
 bp1_yearly.9019.desc.lover: "\n\nMe pergunto se [bp1_yearly_9019_spouse.GetNameNoTooltip] sabe que [bp1_yearly_9019_lover.GetName] e eu já conhecemos muito bem os corpos um do outro, mas, de qualquer forma, é uma surpresa tão inesperada!"
 bp1_yearly.9019.desc.friend: "\n\nEmbora eu nunca esperasse ver meu querid[bp1_yearly_9019_lover.Custom('ES_OA')] amig[bp1_yearly_9019_lover.Custom('ES_OA')] em uma posição tão comprometedora, não posso dizer que me desagrade o que vejo."
 bp1_yearly.9019.desc.stranger: "\n\nMe pergunto onde terá encontrado este[bp1_yearly_9019_lover.Custom('ES_EA')] pobre [bp1_yearly_9019_lover.GetWomanMan], mas certamente parece estar interessado."
 bp1_yearly.9019.desc.outro: ""
 bp1_yearly.9019.a: "Pelo [ROOT.Char.GetFaith.FertilityGodName], todos os meus desejos se realizaram?"
 bp1_yearly.9019.b: "Silêncio, [bp1_yearly_9019_spouse.Custom2('InsultNoun', ROOT.Char)]! Deitarei apenas com [bp1_yearly_9019_lover.GetSheHe]!"
 bp1_yearly.9019.c: "O quê? Por que, eu não poderia fazer isso!"
 bp1_yearly.9020.t: "Um Pedido Estranho"
 bp1_yearly.9020.desc.intro: "O momento chegou mais uma vez para eu tentar produzir um filho com [bp1_yearly_9020_spouse.Custom2('MyCharacterIntroduction', ROOT.Char)], mas, enquanto me preparo para outra noite de amor sem paixão, [bp1_yearly_9020_spouse.GetSheHe] me encara com um olhar assustador em seus olhos.\n\n\"O ato sexual convencional é tão enfadonho, você não acha? Você já considerou"
 bp1_yearly.9020.desc.goat: "o que se poderia fazer com uma cabra? Aqueles chifres, aquela barba desgrenhada, o jeito como ela não se importa com o que come. Ora, se pudéssemos trazer uma para o [ROOT.Char.Custom('GetChamber')], o aroma pungente dela seria suficiente para inflamar as chamas do meu coração!"
 bp1_yearly.9020.desc.vegetable: "o erotismo natural de vegetais de raiz? Apenas imagine como seria sentir um dos presentes da terra de [ROOT.Char.GetFaith.CreatorNamePossessive] em sua pele nos lugares mais delicados?\""
 bp1_yearly.9020.desc.bondage: "como é ser um[ROOT.Char.Custom('ES_OA')] de nossos prisioneiros? Encadead[ROOT.Char.Custom('ES_OA')], submetid[ROOT.Char.Custom('ES_OA')] aos caprichos de um carcereiro cruel com vontade de fazer você gritar. Pensem como seria fácil conseguir umas correntes e… equipamentos da [ROOT.Char.Custom('GetDungeon')]"."
 bp1_yearly.9020.desc.feet: "como seria ser o chão da nossa [ROOT.Char.Custom('GetChamber')|l]? Uns pés descalços pressionando você, sendo apenas um objeto para ser usado e pisoteado por outros. Só de pensar nisso, minhas entranhas ardem!""
 bp1_yearly.9020.desc.hof: "como seria deitar com o [ROOT.Char.ReligiousHeadTitleName]? Imaginem o que se deve sentir, com todo o tempo que os dedos do [ROOT.Char.ReligiousHeadTitleName] passam folheando os livros sagrados! Sede meu [ROOT.Char.ReligiousHeadTitleName] e fazei de mim vosso/a [ROOT.Char.GetFaith.ReligiousText]!"."
 bp1_yearly.9020.desc.outro: "\n\nFaltam-me palavras para descrever o que acabei de ouvir, mas, como [ROOT.Char.GetTitleAsNameNoTooltip], é meu dever satisfazer m [bp1_yearly_9020_spouse.GetTitleAsNameNoTooltip] e trazer mais filhos legítimos a este mundo, não importa o custo. Quem sabe? Talvez eu goste."
 bp1_yearly.9020.a: "Tudo para te agradar."
 bp1_yearly.9020.b: "Não! Qualquer coisa, menos isso!"
 bp1_yearly.9020.c: "Todos saberão de sua perversão vil."
 bp1_yearly.9021.t: "O [ROOT.Char.GetFaith.DevilName|U] em Minha Cama"
 bp1_yearly.9021.desc: "As palavras mal conseguem começar a descrever o ódio puro que meu coração sente por [bp1_yearly_9021_rival_spouse.Custom2('MyCharacterIntroduction', ROOT.Char)] mas, infelizmente, meus deveres como [ROOT.Char.GetTitleAsNameNoTooltip] exigem que eu ignore meus próprios sentimentos e faça amor com est[bp1_yearly_9021_rival_spouse.Custom('ES_EA')] [bp1_yearly_9021_rival_spouse.Custom2('InsultNoun', ROOT.Char)] [bp1_yearly_9021_rival_spouse.Custom2('InsultAdjective', ROOT.Char)].\n\nEu esperava odiar cada momento disso, mas, quando começamos a praticar um coito flácido, sinto um fogo subir pelo meu corpo que nunca havia sentido antes. Ao olhar para o puro despeito e ódio em seus olhos, sinto meu coração acelerar e meus quadris se inflarem para entrar em ação. Posso perceber que [bp1_yearly_9021_rival_spouse.GetSheHe] sente o mesmo pela forma como me imobiliza e esfrega as mãos por todo o meu corpo com partes iguais de desprezo e paixão. O que é esse sentimento? Amor? Ódio? Uma vil amálgama dos dois?\n\nSeja o que for esse sentimento, provavelmente é pecado, mas pode ser um pecado a cópula apaixonada entre cônjuges unidos perante os olhos de [ROOT.Char.GetFaith.HighGodName]? Mesmo que nos odiemos, isso significa que não podemos desfrutar da nossa cópula obrigatória?"
 bp1_yearly.9021.a: "Eu te odeio, querida! Me abrace mais."
 bp1_yearly.9021.b: "Devo ter imaginado uma lâmina contra esse pescoço delicado."
 bp1_yearly.9022.t: "Uma Intervenção Amigável"
 bp1_yearly.9022.desc.intro: "Volto para minha [ROOT.Char.Custom('GetChamber')] depois de outro dia difícil sendo [ROOT.Char.GetTitleAsNameNoTooltip|l], mas logo percebo que não estou sol[ROOT.Char.Custom('ES_OA')]. Vejo [bp1_yearly_9022_friend.Custom2('MyCharacterIntroduction', ROOT.Char)] em pé, com uma expressão nada satisfeita no rosto.\n\n"[ROOT.Char.GetFirstNameNoTooltip],"
 bp1_yearly.9022.desc.hashishiyah: "todos nós apreciamos um bom bolo de haxixe de vez em quando, mas toda vez que falo com você, é como se eu estivesse falando só com o haxixe. Em você, no seu torpor quase permanente, resta pouco [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetFirstNameNoTooltip] que cheguei a conhecer, e sinto falta de conversas que façam sentido para um homem sóbrio."
 bp1_yearly.9022.desc.drunkard: "cada vez que falamos, só sinto o cheiro de [ROOT.Char.Custom('RegionalDrink')] no teu hálito e ouço as palavras de um[ROOT.Char.Custom('ES_XA')] idiota[ROOT.Char.Custom('ES_OA')] na tua boca. É divertido se permitir uma bebida de vez em quando, mas, para dizer a verdade, mal me lembro da última vez em que te vi sóbrio[ROOT.Char.Custom('ES_OA')]."
 bp1_yearly.9022.desc.rakish: "sua dependência incontrolável de prostitutas e bordéis está trazendo uma grande praga para seu corpo e alma. Você teve tantos amantes desconhecidos que, se fosse gado, eu o mandaria matar como precaução e misericórdia."
 bp1_yearly.9022.desc.comfort_eater: "há algum momento em que você não esteja mastigando algo? A comida é um presente natural dado a nós por [ROOT.Char.GetFaith.CreatorName], mas quando vejo você comer, fica claro que não há alegria nisso. Quanta comida será necessária para preencher o buraco em sua alma?"
 bp1_yearly.9022.desc.inappetetic: "Quando foi a última vez que vocês comeram algo? Vocês estão começando a parecer um cadáver, sua pele é um saco sobre uma torre cambaleante de ossos. Quando eu vejo vocês, meus instintos de criação se ativam e só quero ver vocês fartos[ROOT.Char.Custom('ES_OA')] de algo rico e nutritivo. Quanto tempo vai levar até vocês se desfazerem em pó?"
 bp1_yearly.9022.desc.flagellant: "por que vocês devem se machucar assim? Quando vocês se ferem, é realmente por [ROOT.Char.GetFaith.HighGodName] ou é um apelo desesperado para que alguém perceba a dor que vocês sentem em sua alma? Venha, fale comigo. Não suporto ver aparecer outra cicatriz no corpo de meu amig[ROOT.Char.Custom('ES_OA')] querid[ROOT.Char.Custom('ES_OA')]."
 bp1_yearly.9022.desc.reclusive: "devo persegui-lo para conseguir uma palavra sua? Quando foi a última vez que você viu alguém por qualquer motivo além de seus deveres? Não suporto ficar à margem, implorando por um mínimo de atenção sua."
 bp1_yearly.9022.desc.outro: "Deixe-me ajudá-lo, [ROOT.Char.GetFirstNameNoTooltip]".\n\nFiquei completamente atordoado, mas quem ele pensa que é [bp1_yearly_9022_friend.GetSheHe] para julgar como eu vivo?\n\n"Leve o seu tempo. Não vou a lugar nenhum"."
 bp1_yearly.9022.a: "Você está certo. Eu preciso de ajuda."
 bp1_yearly.9022.b: "Saia! Saia agora mesmo!"
 bp1_yearly.9023.t: "Uma Barreira Linguística"
 bp1_yearly.9023.desc: "Adoro passar tempo com [bp1_yearly_9023_friend.Custom2('MyCharacterIntroduction', ROOT.Char)], embora normalmente seja preciso um intérprete. Normalmente, a barreira do idioma não é um problema, mas parece que hoje eu deixei meu querid[bp1_yearly_9023_friend.Custom('ES_OA')] amig[bp1_yearly_9023_friend.Custom('ES_OA')] com algo que eu disse.\n\n[bp1_yearly_9023_friend.GetSheHe|U] disse algo que soou como uma piada, e eu ri por cortesia, mas então me lançou um olhar que dizia tudo. Ao sentir esse olhar atravessar minha alma, pude ver nossa amizade que transcende o idioma se esvaindo.\n\nO que posso fazer para consertar essa situação e manter essa amizade?"
 bp1_yearly.9023.a: "Murmure algo que pareça [bp1_yearly_9023_friend.GetCulture.GetLanguage.GetNameNoTooltip] e espere pelo melhor."
 bp1_yearly.9023.b: "Talvez eu devesse aprender [bp1_yearly_9023_friend.GetCulture.GetLanguage.GetNameNoTooltip]."
 bp1_yearly.9023.c: "[bp1_yearly_9023_friend.GetNameNoTooltip] deveria aprender [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]!"
 bp1_yearly.9024.t: "Uma Mão Cuidadosa"
 bp1_yearly.9024.desc: "Esta doença está me enfraquecendo e me tirando a vida, mas, felizmente, [bp1_yearly_9024_friend.Custom2('MyCharacterIntroduction', ROOT.Char)] tem cuidado muito bem de mim enquanto me recupero.\n\nA verdade é que isso me faz sentir mimad[ROOT.Char.Custom('ES_OA')] apesar da minha condição; fazendo a comida, lavando minhas roupas, cuidando de mim como se fosse nada além de um[bp1_yearly_9024_friend.Custom('ES_XA')] humilde serviç[bp1_yearly_9024_friend.Custom('ES_EA')]."
 bp1_yearly.9024.a: "É bom ter amigos tão cuidadosos."
 bp1_yearly.9024.b: "Posso cuidar de mim mesmo[ROOT.Char.Custom('ES_OA')]!"
 bp1_sickness_being_doted_on: "Sendo mimado"
 bp1_sickness_being_doted_on_desc: "Este personagem está tendo todas as suas necessidades cuidadas enquanto está doente."
 bp1_yearly.9025.t: "Agora Eu Te Conheço"
 bp1_yearly.9025.desc: "Finalmente, [bp1_yearly_9025_friend.Custom2('MyCharacterIntroduction', ROOT.Char)] e eu já compartilhamos uma língua em comum e temos conversado há algum tempo.\n\nO único problema é que logo percebi que detesto completamente todas as palavras podres que saem da boca desse [bp1_yearly_9025_friend.Custom('ES_EA')] [bp1_yearly_9025_friend.Custom2('InsultNoun', ROOT.Char)] [bp1_yearly_9025_friend.Custom2('InsultAdjective', ROOT.Char)]. A menos que tenha havido algum mal-entendido, começo a me perguntar como alguém poderia, sinceramente, considerar amizade com esse [bp1_yearly_9025_friend.GetWomanMan].\n\nIsso é um desastre, e sinto falta dos dias em que eu podia simplesmente me sentar em paz em sua presença reconfortante, sem conhecer a podridão de seu coração."
 bp1_yearly.9025.a: "Saia da minha vista agora mesmo."
 bp1_yearly.9025.b: "Talvez eu ainda possa fazer isso funcionar."
 bp1_yearly.9026.t: "Um Rosto do Passado"
 bp1_yearly.9026.desc.intro: "Acomodo-me em minha cama, tão confortável quanto um bebê entre os seios de sua mãe, mas, justamente quando meus olhos pesados enfim se fecham para descansar um pouco, pulo da cama ao ver uma figura sentar-se ao meu lado!\n\nPara meu horror, é nada menos que meu falecid[bp1_yearly_9026_dead_friend.Custom('ES_OA')] amig[bp1_yearly_9026_dead_friend.Custom('ES_OA')] [bp1_yearly_9026_dead_friend.GetFullName]! Ele ri de mim com crueldade enquanto eu grito horrorizad[ROOT.Char.Custom('ES_OA')].\n\n"Ora, [ROOT.Char.GetFirstNameNoTooltip], é assim que se recebe um[bp1_yearly_9026_dead_friend.Custom('ES_XA')] velh[bp1_yearly_9026_dead_friend.Custom('ES_OA')] amig[bp1_yearly_9026_dead_friend.Custom('ES_OA')]? Vim até você com um aviso:"
 bp1_yearly.9026.desc.secret_murderer: "sabemos o que você fez com [bp1_yearly_9026_murder_victim.GetName] meu amig[bp1_yearly_9026_murder_victim.Custom('ES_OA')]."
 bp1_yearly.9026.desc.murderer: "você nunca será perdoado pelo assassinato de [bp1_yearly_9026_murder_victim.GetName]."
 bp1_yearly.9026.desc.killer: "você é a razão pela qual [bp1_yearly_9026_murder_victim.GetFullName] agora está no [ROOT.Char.GetFaith.PositiveAfterLife|U]."
 bp1_yearly.9026.desc.greedy: "seus dependentes estão sucumbindo ao peso da sua avareza impenitente e ganância."
 bp1_yearly.9026.desc.wrathful: "não há uma alma que não tema seu temperamento terrível."
 bp1_yearly.9026.desc.torturer: "a dor que você inflige com prazer aos seus colegas é um crime contra a decência humana básica, e cada buraco que você perfura na pele de algum coitado perfura ainda mais fundo o seu coração."
 bp1_yearly.9026.desc.arbitrary: "sua incapacidade de compreender o conceito de justiça e moralidade deixa todos tremendo de medo do seu julgamento errôneo."
 bp1_yearly.9026.desc.callous: "a falta de cuidado e compaixão básica pelo sofrimento dos outros torna seu julgamento vazio, mas seu coração está pesado como um tijolo por cada ato vil que você comete."
 bp1_yearly.9026.desc.sadistic: "cada vez que você inflige dor alegremente a outro, você está apertando a corda em volta do pescoço do seu espírito."
 bp1_yearly.9026.desc.vengeful: "cada vez que exerceis sua vingança sobre aqueles que agiram mal com você, isso o afasta mais um passo de [ROOT.Char.GetFaith.HighGodName]. Vale a pena?"
 bp1_yearly.9026.desc.deceitful: "a trama e a mentira intermináveis nas quais você se envolve para conseguir o que quer serão a sua morte no final. Quando a verdade será suficiente? Você sequer sabe mais o que é real?"
 bp1_yearly.9026.desc.impatient: "sua falta de paciência está transformando você em um monstro, sempre avançando para a próxima coisa e não dando quartel para aqueles que 'perdem seu tempo'."
 bp1_yearly.9026.desc.arrogant: "o amor que você sente por si mesmo o torna insensível ao amor dos seus semelhantes. Para que serve o amor que fica apenas por dentro?"
 bp1_yearly.9026.desc.craven: "sua covardia está deixando uma mancha em sua consciência maior do que o sangue de qualquer batalha poderia dar. Quantos bravos guerreiros morreram em seu lugar?"
 bp1_yearly.9026.desc.ambitious: "sua ambição sem fim o torna insensível ao sofrimento de todos aqueles que se colocam em seu caminho. Quantos títulos você precisa ter? Quantas batalhas precisa vencer antes de ficar satisfeito[ROOT.Char.Custom('ES_OA')]?"
 bp1_yearly.9026.desc.lazy: "sua inação está permitindo que a vontade de [ROOT.Char.GetFaith.DevilName] continue descontrolada. Você acha que está acima de seus deveres como [ROOT.Char.GetTitleAsNameNoTooltip]? E quanto aos seus deveres como um [ROOT.Char.GetWomanMan] para seus semelhantes?"
 bp1_yearly.9026.desc.cynical: "vossa dúvida na vontade de [ROOT.Char.GetFaith.HighGodName|U] vos torna servo de [ROOT.Char.GetFaith.DevilName]."
 bp1_yearly.9026.desc.shy: "sua recusa em interagir com seus companheiros de viagem nesta vida está tornando você cada vez menos humano[ROOT.Char.Custom('ES_OA')] a cada dia que passa. Você acha que está acima deles?"
 bp1_yearly.9026.desc.gluttonous: "sua indulgência excessiva em comida, quando há aqueles que não têm nada, é uma obscenidade. Por que repetir o prato quando há aqueles que não terão nem o primeiro?"
 bp1_yearly.9026.desc.lustful: "seus desejos carnais o distraem do verdadeiro caminho em direção ao [ROOT.Char.GetFaith.PositiveAfterLife|U]. Nenhuma quantidade de cópula jamais se comparará ao amor do divino!"
 bp1_yearly.9026.desc.temperate: "[ROOT.Char.GetFaith.CreatorName|U] criou este mundo e toda a comida nele para você se deleitar, e, no entanto, você recusa os presentes."
 bp1_yearly.9026.desc.chaste: "[ROOT.Char.GetFaith.CreatorName|U] criou a humanidade para você se relacionar, e no entanto você permanece virgem para tantos prazeres e desejos."
 bp1_yearly.9026.desc.honest: "você acredita que a verdade o libertará, no entanto, muitas vezes as mentiras são a única maneira de proteger aqueles que amamos."
 bp1_yearly.9026.desc.fallback: "todo pecado que você cometeu em sua vida foi testemunhado por [ROOT.Char.GetFaith.PantheonTerm], e nada disso é esquecido."
 bp1_yearly.9026.desc.outro: "Vocês devem se arrepender do que fizeram. Aprendi da pior maneira que, a cada pecado que cometemos, contraímos uma dívida com [ROOT.Char.GetFaith.HighGodName|U] amig[ROOT.Char.Custom('ES_OA')] mí[ROOT.Char.Custom('ES_OA')]. E [ROOT.Char.GetFaith.HighGodNameSheHe|U] não perdoa Seus devedores."
 bp1_yearly.9026.a: "Eu me arrependo! Faço qualquer coisa para me redimir!"
 bp1_yearly.9026.b: "Estou claramente alucinando! Desapareça, espírito!"
 bp1_yearly.9027.t: "Pobres Servos Infortunados"
 bp1_yearly.9027.desc.intro: "Faz algum tempo desde que fui visitado pelo fantasma do meu velho[bp1_yearly_9027_dead_friend.Custom('ES_OA')] amig[bp1_yearly_9027_dead_friend.Custom('ES_OA')] [bp1_yearly_9027_dead_friend.GetName], mas agora começa meu caminho rumo à redenção. Como [ROOT.Char.GetTitleAsNameNoTooltip], agora percebo que meu dever é para com meu povo, então caminho entre as pessoas e lhes pergunto o que desejam de mim.\n\nUm[bp1_yearly_9027_peasant_begger.Custom('ES_XA')] pobre [bp1_yearly_9027_peasant_begger.GetWomanMan] em farrapos se aproxima de mim e me implora que ajude os pobres e doentes de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], aqueles que não têm meios de cuidar de si mesmos."
 bp1_yearly.9027.desc.greedy: "O que me pede é uma quantia exorbitante,"
 bp1_yearly.9027.desc.fallback: "Pede-me apenas o suficiente para que seu povo consiga se virar,"
 bp1_yearly.9027.desc.outro: "mas será que realmente há um preço para entrar em [ROOT.Char.GetFaith.PositiveAfterLife] tem preço?"
 bp1_yearly.9027.a: "Você terá tudo o que precisa."
 bp1_yearly.9027.b: "Essas pessoas são tão pobres que aceitariam qualquer acordo que eu oferecesse!"
 bp1_yearly.9027.c: "Você quer quanto?"
 bp1_yearly.9028.t: "O Fantasma das Desavenças Passadas"
 bp1_yearly.9028.desc.intro: "Acordo com aquela sensação familiar de frio percorrendo todo o meu corpo. Olho ao redor como antes e, desta vez, vejo meu finado[bp1_yearly_9028_dead_rival.Custom('ES_OA')] adversário[bp1_yearly_9028_dead_rival.Custom('ES_OA')] [bp1_yearly_9028_dead_rival.GetFullName].\n\n"
 bp1_yearly.9028.desc.murderer: ""Assassin[GetPlayer.Custom('ES_OA')]!""
 bp1_yearly.9028.desc.murderer.fallback: ""[ROOT.Char.Custom2('InsultNoun', SCOPE.sC('bp1_yearly_9028_dead_rival'))]!""
 bp1_yearly.9028.desc.bridge: "Uiva. "[bp1_yearly_9028_dead_rival.GetDeathReason] e agora minha alma vagueia por esta terra à sua procura! O que você fez comigo deixou uma mancha em sua alma, e você deve implorar perdão à minha família falecida!".\n\n"
 bp1_yearly.9028.desc.callous: "A verdade seja dita, não sinto que tenha nada do que me arrepender, é[bp1_yearly_9028_dead_rival.Custom('ES_EA')] [bp1_yearly_9028_dead_rival.Custom2('InsultNoun', ROOT.Char)] o merecia."
 bp1_yearly.9028.desc.fallback: "Sinto que essa mancha está afundando profundamente em minha alma, será que algum arrependimento será suficiente?"
 bp1_yearly.9028.desc.outro: "Recebi minhas instruções do outro lado, como devo proceder?"
 bp1_yearly.9028.a: "Farei qualquer coisa pela redenção!"
 bp1_yearly.9028.b: "Eu nunca vou me humilhar."
 bp1_yearly.9029.t: "[bp1_yearly_9029_dead_parent.Custom2('RelationToMe', ROOT.Char)|U]!"
 bp1_yearly.9029.desc.intro: "Já faz algum tempo desde minha primeira visita fantasmagórica, e estou totalmente preparad[ROOT.Char.Custom('ES_OA')] para mais. O que eu não esperava era ver a expressão de desprezo de [bp1_yearly_9029_dead_parent.Custom2('RelationToMe', ROOT.Char)] a centímetros do meu rosto!\n\n"[ROOT.Char.Custom('GirlBoy')] mal[ROOT.Char.Custom('ES_OA')]!"."
 bp1_yearly.9029.desc.rival_sibling: "Você não vê como essa rixa entre o sangue do meu sangue aproxima toda a família do [bp1_yearly_9029_dead_parent.GetFaith.NegativeAfterLife]?"
 bp1_yearly.9029.desc.rival_sibling_unrelated: "Embora [bp1_yearly_9029_rival.GetName] não seja [bp1_yearly_9029_rival.Custom('GetDaughterSon')] meu[bp1_yearly_9029_rival.Custom('ES_OA')], ainda é seu [bp1_yearly_9029_rival.Custom('SisterBrother')] e a rivalidade de vocês aproxima toda a família de [bp1_yearly_9029_dead_parent.GetFaith.NegativeAfterLife]!"
 bp1_yearly.9029.desc.rival: "O ódio leva direto a [bp1_yearly_9029_dead_parent.GetFaith.NegativeAfterLife] , [ROOT.Char.Custom('GetDaughterSon')] meu[ROOT.Char.Custom('ES_OA')] e você deve acabar com essa inimizade se quiser mudar seu destino."
 bp1_yearly.9029.desc.outro: "Você deve se esforçar para encerrar sua rivalidade com [bp1_yearly_9029_rival.GetName]; humilhe-se e sirva-o se for preciso!""
 bp1_yearly.9029.a: "Então, me humilharei e servirei."
 bp1_yearly.9029.b: "Para o [ROOT.Char.GetFaith.NegativeAfterLife] com [bp1_yearly_9029_rival.GetFirstNameNoTooltip]!"
 bp1_yearly.9030.t: "A segunda visita de [bp1_yearly_9026_dead_friend.GetName]"
 bp1_yearly.9030.desc.intro: "Sinto que a paralisia se espalha pelo meu corpo quando [bp1_yearly_9026_dead_friend.GetFullName] reaparece diante de mim.\n\n\"Diga-me, espírito, o que mais devo fazer para assegurar meu lugar em [ROOT.Char.GetFaith.PositiveAfterLife]?\".\n\n\"Ainda bem que você pergunta, amig[ROOT.Char.Custom('ES_OA')] meu[ROOT.Char.Custom('ES_OA')]."
 bp1_yearly.9030.desc.pilgrimage: "Aventure-se nas terras sagradas, lá você encontrará a redenção que busca. Não hesite, [ROOT.Char.GetFaith.HighGodName] está esperando por você lá."
 bp1_yearly.9030.desc.fallback: "Caridade! Quanto mais devo dizer? Um único ato não é suficiente, você deve criar o hábito de distribuir sua opulência!"
 bp1_yearly.9030.a: "Farei o que for preciso."
 bp1_yearly.9030.a.tt_pilgrimage: "Sua próxima [pilgrimage|lE] será mais barata"
 bp1_yearly.9030.b: "Não posso fazer mais."
 bp1_yearly.9031.t: "Perdoe-me"
 bp1_yearly.9031.desc.intro: "Finalmente consegui encontrar [bp1_yearly_9031_rival_family.Custom2('MyCharacterIntroduction', bp1_yearly_9031_rival)] em um momento livre. Freneticamente, tomado pelo desespero por obter perdão, ajoelho-me e imploro absolvição por tudo o que fiz a [bp1_yearly_9031_rival.GetFirstNameNoTooltip]."
 bp1_yearly.9031.desc.flagellant: "Um sorriso nauseante se forma em seu rosto.\n\n"Todos nós sabemos que vocês buscam o perdão [bp1_yearly_9031_rival_family.GetFaith.HighGodNamePossessive] e a única maneira de alcançá-lo é por meio da autoflagelação. Façam isso com força, e eu os perdoarei; e é melhor esperar que [bp1_yearly_9031_rival_family.GetFaith.HighGodNameSheHe|U] também o faça.""
 bp1_yearly.9031.desc.debate: "[bp1_yearly_9031_rival_family.GetNameNoTooltip] me olha com desprezo.\n\n"É bom que você tenha percebido seus caminhos pecaminosos agora, mas tenho medo de que não posso perdoá-lo por crimes contra [bp1_yearly_9031_rival_family.GetFaith.ReligiousText], a menos que você possa me convencer em um debate.""
 bp1_yearly.9031.desc.cleanup: "Vejo uma ideia se formando nessa cabeça lenta e desleixada de [bp1_yearly_9031_rival_family.GetNameNoTooltip].\n\n\"Ah, desde que [bp1_yearly_9031_rival.GetFirstNameNoTooltip] partiu, tive que reduzir o número de servos de limpeza a nosso serviço. Se alguém pudesse ajudar a limpar minha morada, certamente conquistaria meu perdão.\""
 bp1_yearly.9031.desc.unconditional: "[bp1_yearly_9031_rival_family.GetSheHe|U] sorri e abaixa a cabeça para encontrar a minha.\n\n"Erguei-vos, amig[ROOT.Char.Custom('ES_OA')]. Tudo o que eu precisava ouvir era que vós vos arrependíeis; afinal, somos todos apenas crianças aos olhos de [bp1_yearly_9031_rival_family.GetFaith.HighGodName] , todos cometemos erros"."
 bp1_yearly.9031.desc.fallback: "[bp1_yearly_9031_rival_family.GetSheHe|U] me olha com os olhos marejados.\n\n«Perdoá-lo? Não, #EMP jamás#! jamais perdoarei você. Me dá nojo até ouvir vocês dizerem o nome dele! Que ato eu poderia exigir como penitência pelo que fizeram?»."
 bp1_yearly.9031.a.forgiven: "Estou humilhado."
 bp1_yearly.9031.a: "Farei o que você pedir."
 bp1_yearly.9031.b.forgiven: "Retiro tudo!"
 bp1_yearly.9031.b: "Não serei degradado."
 bp1_yearly.9032.t: "Fazendo as Pazes"
 bp1_yearly.9032.desc: "Tal como me foi dito, procurei por [bp1_yearly_9032_rival.GetName] e imediatamente caí de joelhos, implorando seu perdão.\n\n"Por [bp1_yearly_9032_rival.GetFaith.PantheonTerm|U], isto é bom demais! Você aos meus pés, ha! Como eu sonhava com este dia".\n\nEnquanto minha expressão permanecia tão impassível quanto a pedra, o tom dele começou a mudar.\n\n"Você está falando sério? Bem, suponho que há algumas coisas que você poderia fazer para conquistar meu perdão..."."
 bp1_yearly.9032.a: "Farei qualquer coisa."
 bp1_yearly.9032.b: "Aproveite a situação e faça com que tropece!"
 bp1_yearly.9033.t: "A Última Noite"
 bp1_yearly.9033.desc.intro: "Finalmente, [bp1_yearly_9026_dead_friend.GetFullName] vem até mim mais uma vez, e espero que seja a última. Levanto-me de meu sono e pergunto como tenho me saído em evitar meu destino.\n\n"
 bp1_yearly.9033.desc.did_well: "Oh amig[ROOT.Char.Custom('ES_OA')]o, você fez um trabalho incrível! Embora o seu futuro continue incerto, ele está em um estado muito melhor do que quando o visitei pela primeira vez. O peso da sua alma foi levantado, e posso retornar ao meu castigo eterno, certo de que fiz tudo o que pude para salvá-lo do mesmo destino."
 bp1_yearly.9033.desc.did_bad: ""Quão bem? Quão bem? Condenad[ROOT.Char.Custom('ES_OA')], [ROOT.Char.GetFirstNameNoTooltip]! Estais condenad[ROOT.Char.Custom('ES_OA')] para toda a eternidade! Vosso futuro é uma tapeçaria de horror e tragédia tecida por vossas próprias mãos ensanguentadas! Retorno ao meu descanso, pois fiz tudo o que pude para salvar vossa alma"."
 bp1_yearly.9033.desc.did_okay: ""Bem, o que posso dizer? Vocês tiveram uma chance de redenção e a jogaram fora. Embora tenham dado alguns passos à frente, deram muitos mais para trás. Espero que possam fazer mais para mudar, amig[ROOT.Char.Custom('ES_OA')] meu[ROOT.Char.Custom('ES_OA')]. Por ora, preciso voltar ao meu castigo eterno e espero não ver você lá comigo"."
 bp1_yearly.9033.desc.outro: "\n\n[bp1_yearly_9026_dead_friend.GetFirstNameNoTooltip] desaparece mais uma vez e desta vez duvido que volte a ver[bp1_yearly_9026_dead_friend.GetHerHim] de novo."
 bp1_yearly.9033.a: "Estou salvo!"
 bp1_yearly.9033.b: "Talvez [ROOT.Char.GetFaith.NegativeAfterLife] não seja tão ruim."
 bp1_yearly.9033.c: "Sou um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] novo[ROOT.Char.Custom('ES_OA')]."
 end_marley_ghost_story_tt: "Você não será mais visitado por fantasmas."
 bp1_increase_good_deeds_tt: "#EMP Os espíritos ficarão satisfeitos#!"
 bp1_decrease_good_deeds_tt: "#EMP Os espíritos ficarão muito irritados#!"
 bp1_yearly.9034.t: "Uma Bruxa das Águas"
 bp1_yearly.9034.desc.intro: "Estou me divertindo brincando nos pântanos de [bp1_yearly_9034_swampy_location.GetNameNoTooltip] com [bp1_yearly_9034_friend.GetName]. Estamos tão envolvidos na brincadeira que nem percebemos que nos separamos de [bp1_yearly_9034_guardian.GetName].\n\nDe repente, vemos surgir do lodo e da lama uma[bp1_yearly_9034_witch.Custom('ES_XA')] brux[bp1_yearly_9034_witch.Custom('ES_OA')] da charneca, cobert[bp1_yearly_9034_witch.Custom('ES_OA')] de barro. Ela nos encara fixamente, e antes que eu perceba, [bp1_yearly_9034_friend.GetName] já saiu correndo!"
 bp1_yearly.9034.desc.giant: "Avança pesadamente na minha direção, mas sua figura imponente faz [bp1_yearly_9034_witch.GetHerHim] tropeçar e cair sob o próprio peso!"
 bp1_yearly.9034.desc.hunchbacked: "Avança pesadamente em minha direção, toda sua figura curvada de forma antinatural, como se estivesse toda enroscada."
 bp1_yearly.9034.desc.beauty_bad: "Nunca vi uma criatura tão horrenda, mesmo a essa distância. Antes de eu ter a chance de assimilar a cena, ela começa a correr em minha direção!"
 bp1_yearly.9034.desc.albino: "Entre a lama, consigo ver que sua pele e cabelo são de um branco leitoso, e aqueles olhos vermelhos estão cheios de raiva. Antes de eu conseguir assimilar, começa a correr na minha direção!"
 bp1_yearly.9034.desc.scaly: "Sua pele é como a de um lagarto, cheia de saliências e dobras. Antes que eu tenha chance de assimilar isso, ela começa a correr na minha direção!"
 bp1_yearly.9034.desc.outro: "\n\nCom meu amig[bp1_yearly_9034_friend.Custom('ES_OA')] e meu tutor[bp1_yearly_9034_guardian.Custom('ES_XA')] longe, somos só nós [bp1_yearly_9034_witch.Custom('ES_ElLa')] brux[bp1_yearly_9034_witch.Custom('ES_OA')] e eu, mas o que eu faço?"
 bp1_yearly.9034.a: "Correr!"
 bp1_yearly.9034.b: "Vamos ver o que quer."
 9034_escaped_witch: "Você escapou de [bp1_yearly_9034_witch.Custom('ES_DelDela')] brux[bp1_yearly_9034_witch.Custom('ES_OA')]!"
 9034_failed_to_escape: "Você ficou ferid[GetPlayer.Custom('ES_OA')] durante sua fuga."
 bp1_yearly.9035.t: "A Boa Bruxa do Pântano"
 bp1_yearly.9035.desc: "Quando [bp1_yearly_9034_witch.Custom('ES_ElLa')] brux[bp1_yearly_9034_witch.Custom('ES_OA')] termina de se aproximar, ela dá um tapa em um inseto que eu tinha no rosto e o limpa na túnica dela.\n\n"Cuidado por essas bandas, jovenzin[ROOT.Char.Custom('ES_OA')]. Até as criaturinhas podem te pegar se você não tomar cuidado. E eu bem sei, já tratei de muitas bochechas inchadas de viajantes perdidos".\n\nSem dúvida, não é o monstro que eu pensava no início. Ela se apresenta como uma[bp1_yearly_9034_witch.Custom('ES_XA')] curandeir[bp1_yearly_9034_witch.Custom('ES_OA')] e mag[bp1_yearly_9034_witch.Custom('ES_OA')] local, muito versad[bp1_yearly_9034_witch.Custom('ES_OA')] em medicina herbal e práticas ritualísticas para expulsar espíritos de pessoas e objetos. Talvez est[bp1_yearly_9034_witch.Custom('ES_EA')] [bp1_yearly_9034_witch.GetWomanMan] possa servir a um propósito mais nobre."
 bp1_yearly.9035.a: "Você cura pessoas? Eu poderia usar um[bp1_yearly_9034_witch.Custom('ES_XA')] nov[bp1_yearly_9034_witch.Custom('ES_OA')] médic[bp1_yearly_9034_witch.Custom('ES_OA')]..."
 bp1_yearly.9035.b: "Ensine-me os seus conhecimentos, ó sábio[bp1_yearly_9034_witch.Custom('ES_OA')]."
 bp1_yearly.9035.c: "Quem perguntou?"
 bp1_yearly.9036.t: "A Bruxa Malvada do Pântano"
 bp1_yearly.9036.desc: "[bp1_yearly_9034_witch.Custom('ES_ElLa')|U] bruxa[bp1_yearly_9034_witch.Custom('ES_OA')] [bp1_yearly_9034_witch.Custom2('InsultAdjective', ROOT.Char)] me agarra com seus dedos longos e ressecados. Me segura com tanta força que sinto a circulação nos meus braços parar.\n\nEm nome de [bp1_yearly_9034_witch.GetFaith.WitchGodName], o que você está fazendo no meu pântano, [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('bp1_yearly_9034_witch'))] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('bp1_yearly_9034_witch'))]? Você tem alguma ideia dos espíritos malignos neste lugar? [ROOT.Char.Custom('GirlBoy')|U]mal[ROOT.Char.Custom('ES_OA')]!\".\n\nTento explicar a ela que sou [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip], mas, nesta altura, já não se pode raciocinar com [bp1_yearly_9034_witch.GetSheHe]. Sinto meu corpo ficando mole e minha pele começando a se rasgar quando vejo aparecer [bp1_yearly_9034_guardian.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 bp1_yearly.9036.a: "[bp1_yearly_9034_guardian.GetNameNoTooltip], me ajude!"
 bp1_yearly.9036.guardian_wins: "[bp1_yearly_9034_guardian.GetNameNoTooltip] é vitorioso"
 bp1_yearly.9036.guardian_loses: "[bp1_yearly_9034_guardian.GetNameNoTooltip] não consegue me salvar de sair ferid[ROOT.Char.Custom('ES_OA')]"
 bp1_yearly_9034_witchy_goodbad_tt: "#EMP A bruxa pode ser diferente do que você espera...#!"
 bp1_yearly.9037.t: "O Corpo no Pântano"
 bp1_yearly.9037.desc: "[bp1_yearly_9037_guardian.Custom2('MyCharacterIntroduction', ROOT.Char)] me trouxe até os pântanos de [bp1_yearly_9037_swampy_location.GetNameNoTierNoTooltip] e é realmente um lugar maravilhoso!\n\nCorro e brinco, chutando a água podre e jogando pedras na lama, vivendo ao máximo a vida de [ROOT.Char.GetTitleAsNameNoTooltip] quando vejo algo se aproximando lentamente de mim.\n\nEntre os juncos surge o rosto de um cadáver estranho, com uma expressão de puro terror imaculadamente preservada pelos minerais da água do pântano."
 bp1_yearly.9037.a: "[bp1_yearly_9037_guardian.GetNameNoTooltip], olha o que eu encontrei!"
 bp1_yearly.9037.custom: "Meu tutor[bp1_yearly_9037_guardian.Custom('ES_XA')] [bp1_yearly_9037_guardian.GetName] saberá o que fazer…"
 bp1_yearly.9037.b: "Corra e grite!"
 bp1_yearly.9038.t: "Um Segredo Revelado"
 bp1_yearly.9038.desc.intro: "Quando [bp1_yearly_9037_guardian.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproxima, seu rosto se contorce em uma expressão de desconforto e horror ao contemplar o rosto do corpo no pântano.\n\n"É [bp1_yearly_9037_corpse.GetNameNoTooltip]… Eu [bp1_yearly_9037_corpse.GetHerHim] matei."
 bp1_yearly.9038.desc.killer: "Você entende, m jovem [ROOT.Char.GetTitleAsNameNoTooltip], que eu não posso exatamente deixar você sair por aí contando para todo mundo o que você viu aqui. A coisa interessante sobre lugares como este é que eles são tão remotos e perigosos que ninguém jamais pensaria em procurar você aqui. Você sabe nadar bem, m [ROOT.Char.GetTitleAsNameNoTooltip]?\""
 bp1_yearly.9038.desc.not_killer: "Nunca quis dizer isso a ninguém, mas não adianta esconder agora. Não me orgulho do que fiz, [ROOT.Char.GetFirstNameNoTooltip], só espero que você possa me perdoar como seu querid[bp1_yearly_9037_guardian.Custom('ES_OA')] tutor[bp1_yearly_9037_guardian.Custom('ES_XA')].""
 bp1_yearly.9038.a: "Não sei o que dizer."
 bp1_yearly.9038.b: "Corra e conte para todo mundo!"
 bp1_yearly.9038.c: "[bp1_yearly_9037_guardian.GetHerHim|U] lança com força no brejo."
 9038_killed_guardian: "Você empurrou com sucesso [bp1_yearly_9037_guardian.GetName] para o pântano."
 9038_guardian_kills_you: "Você foi dominado por [bp1_yearly_9037_guardian.GetName]."
 bp1_yearly.9039.t: "O Cadáver Imaculado"
 bp1_yearly.9039.desc: "[bp1_yearly_9037_guardian.GetName] parece tão impactad[bp1_yearly_9037_guardian.Custom('ES_OA')] e horrorizad[bp1_yearly_9037_guardian.Custom('ES_OA')] como eu ao ver este corpo no pântano, mas seu olhar de horror logo se transforma em fascínio.\n\n"Meu [ROOT.Char.Custom('GirlBoy')], reconheceis estas roupas? Isto é, sem dúvida, moda camponesa de trezentos anos atrás! Não há dúvida, este corpo foi preservado como nenhum que eu já tenha visto antes! Ora, é um milagre de [bp1_yearly_9037_guardian.GetFaith.HighGodName|U]! Não há dúvida alguma! Permitam-me recolher estes ossos e fazer um belo presente para vós".\n\n[bp1_yearly_9037_guardian.GetFaith.HighGodName|U] parece ter um jeito estranho de fazer "milagres", mas se [bp1_yearly_9037_guardian.GetNameNoTooltip] o diz, então deve ser."
 bp1_yearly.9039.a: "Que presente... estranho."
 bp1_yearly.9039.b: "Não, tenho certeza de que[ROOT.Char.Custom('ES_OA')] é um fantasma maligno."
 ghost_stories_modifier: "Histórias de Fantasmas"
 ghost_stories_modifier_desc: "Dizem que este condado é o lar de um espírito malicioso."
 box_of_boggy_bones: "Caixa de Ossos do Pântano"
 box_of_boggy_bones_desc: "Os ossos de um cadáver de várias centenas de anos perfeitamente preservados na água do pântano, agora colocados em uma caixa conveniente."
 bp1_withholding_ghost_sex: "Resistindo a Sonhos Sensuais"
 bp1_withholding_ghost_sex_desc: "Este personagem está sonhando com amantes falecidos, mas recusa suas investidas sensuais."
 bp1_indulging_ghost_sex: "Sonhos Sensuais"
 bp1_indulging_ghost_sex_desc: "Este personagem está sonhando com amantes falecidos e está completamente se entregando a essas experiências sensuais de outro mundo."
 bp1_yearly.9040.t: "A Visita de um Amante"
 bp1_yearly.9040.desc: "Estou deitado confortavelmente em minha cama quando sinto um toque familiar deslizar por meu peito nu. No começo, não dou importância, mas quando meus olhos se abrem com dificuldade, vejo que é meu querid[bp1_yearly_9040_dead_lover.Custom('ES_OA')] e falecid[bp1_yearly_9040_dead_lover.Custom('ES_OA')] [bp1_yearly_9040_dead_lover.GetName] sentad[bp1_yearly_9040_dead_lover.Custom('ES_OA')] ao meu lado.\n\n«Ah, [ROOT.Char.Custom('LoverPetName')] meu[ROOT.Char.Custom('ES_OA')] , faz tanto tempo, não é? Mas quando te abraço e te beijo, o amor não volta ao teu coração como se tudo tivesse acontecido ontem? Segura-me, meu [ROOT.Char.Custom('LoverPetName')] , ame-me de novo!».\n\nNão posso acreditar, mas [bp1_yearly_9040_dead_lover.GetHerHim] vejo e [bp1_yearly_9040_dead_lover.GetHerHim] sinto! Embora eu saiba que é um sonho, é tão vívido que simplesmente não consigo resistir."
 bp1_yearly.9040.a: "Oh, me segure como fazíamos há tanto tempo!"
 bp1_yearly.9040.b: "Desapareça, espírito."
 bp1_yearly.9041.t: "Recordações de um[bp1_yearly_9041_parent.Custom('ES_XA')] [bp1_yearly_9041_parent.GetMotherFather]"
 bp1_yearly.9041.desc: "Encontro [bp1_yearly_9041_sibling.Custom2('MyCharacterIntroduction', ROOT.Char)] desmaiad[bp1_yearly_9041_sibling.Custom('ES_OA')] em um canto distante de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] chorando suavemente. Ao notar minha aproximação, levanta-se e tenta inutilmente enxugar os olhos.\n\n“Oh, [ROOT.Char.Custom('SisterBrother')], desculpe, eu não deveria estar chorando. Afinal, você tem mais motivos para sentir falta de noss[bp1_yearly_9041_parent.Custom('ES_OA')] [bp1_yearly_9041_parent.GetMotherFather] do que eu. Vou sair da sua frente.”\n\nNa verdade, não tive tempo de pensar em [bp1_yearly_9041_parent.GetMotherFather] desde que assumi o trono, mas [bp1_yearly_9041_sibling.GetNameNoTooltip] parece profundamente abalad[bp1_yearly_9041_sibling.Custom('ES_OA')]."
 bp1_yearly.9041.a: "Deixe sair, estou aqui."
 bp1_yearly.9041.b: "Haha! Que bebê chorão!"
 bp1_yearly.9042.t: "O Rosto de [ROOT.Char.GetFaith.HealthGodName]"
 bp1_yearly.9042.desc: "Mais um dia à frente do meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|L] traz poucas surpresas, exceto pela irrupção de [bp1_yearly_9042_chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)] em minha sala do trono, agitando com entusiasmo diante do meu rosto uma sacola de sobremesas.\n\n"Meu [ROOT.Char.GetTitleAsNameNoTooltip]! Meu [ROOT.Char.GetTitleAsNameNoTooltip]! Ah, é um milagre! Estava inspecionando a refeição para o jantar desta noite quando me ocorreu o quanto estes itens em particular se assemelham ao rosto de nada menos que [ROOT.Char.GetFaith.HealthGodName]!".\n\nApós verificar, devo admitir que a semelhança é impressionante, mas isso certamente deve ser uma heresia."
 bp1_yearly.9042.a: "Você está completamente certo!"
 bp1_yearly.9042.b: "Isso é definitivamente sacrilégio."
 bp1_yearly.9042.c: "Que milagre, devo consumi-lo!"
 9042_you_win: "Você venceu o debate"
 9042_you_lose: "Você perdeu o debate"
 dessert_looks_like_god: "Delicioso Rosto de [ROOT.Char.GetFaith.HealthGodName]"
 dessert_looks_like_god_desc: "Uma coleção de [ROOT.Char.Custom('GetExpensiveDessert')] que se assemelham a [ROOT.Char.GetFaith.HealthGodName]"
 full_of_jesus_modifier: "Cheio de Espiritualidade"
 full_of_jesus_modifier_desc: "Este personagem consumiu uma sobremesa que se assemelha a [ROOT.Char.GetFaith.HealthGodName]"
 bp1_yearly.9043.t: "O Comensal [ROOT.Char.GetFaith.BishopNeuter|U] de Bebês"
 bp1_yearly.9043.desc: "É mais um lindo dia de oração e serviço do meu maravilhos[bp1_yearly_9043_chaplain.Custom('ES_OA')] [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName] e enquanto me preparo para sair, [bp1_yearly_9043_chaplain.GetName] me barra o caminho. Espera até que todos os outros tenham ido embora e então se inclina perto do meu ouvido.\n\n"Meu [ROOT.Char.GetTitleAsNameNoTooltip], devo lhe dizer que não sou estranho aos prazeres da vida. Nenhuma forma de perversão é depravada demais para mim: animal, vegetal ou mineral. Francamente, farei qualquer coisa com qualquer coisa, e não há alegria nesta vida que supere consumir a carne dos jovens. Você não viveu até provar carne humana, meu [ROOT.Char.GetTitleAsNameNoTooltip], e eu não gostaria de nada mais do que tê-lo para o jantar esta noite!".\n\nSurpresa nem de longe descreve o que sinto ao ouvir isso, mas, por Deus, o que devo dizer?"
 bp1_yearly.9043.a: "Você comeu um bebê? Parece divertido!"
 bp1_yearly.9043.b: "#EMP Guardas!#!"
 bp1_yearly.9043.c: "Apenas sorria e siga em frente."
 bp1_yearly.9044.t: "A Execução"
 bp1_yearly.9044.desc: "Esperava manter-me afastad[ROOT.Char.Custom('ES_OA')] da execução de [recipient.GetName], mas evidentemente não consigo resistir à despedida.\n\nEu me importei com [recipient.GetSheHe] de uma maneira que ninguém jamais entenderá, mas os acontecimentos que levaram ao seu encarceramento foram obra sua, e a justiça não pode abrir exceções.\n\n[recipient.GetFirstNameNoTooltip] passou seus últimos momentos com um olhar de traição em seus olhos enevoados antes do #EMP chasquido#! final e de que deixasse de existir. Fico com seu corpo sem vida por um tempo e relembro todos os bons momentos que passamos junt[recipient.Custom('ES_OA')]s na vida."
 bp1_yearly.9044.desc.outro.memory: "Tenho um carinho especial pelo momento em que [bp1_yearly_9044_memory_scope.GetDescription], e lamento que não compartilharemos mais bons momentos como este."
 bp1_yearly.9044.desc.outro.no_memory: "Só posso esperar encontrar[recipient.GetHerHim] novamente em [ROOT.Char.GetFaith.PositiveAfterLife], se [recipient.GetSheHe] me perdoar."
 bp1_yearly.9044.a.indifferent: "Não foi nada pessoal."
 bp1_yearly.9044.a.guilty: "Sinto muito que tenha terminado assim."
 bp1_yearly.9045.t: "A Execução"
 bp1_yearly.9045.desc.intro: "Um tempo depois de dar a ordem de executar [recipient.GetName], [bp1_yearly_9045_guardian.Custom2('MyCharacterIntroduction', ROOT.Char)] me levou até o cadafalso, prometendo que o que eu veria seria uma valiosa oportunidade de aprendizado.\n\n"
 bp1_yearly.9045.desc.zealous: "Vejo [recipient.GetName] se aproximar do carrasco com os olhos fechados. Na quietude do pátio, [recipient.GetHerHim] ouço murmurar preces e salmodias incompreensíveis entre as mãos, como se esperasse que [recipient.GetFaith.HighGodName|U] descesse para impedir sua morte prematura."
 bp1_yearly.9045.desc.brave: "[recipient.GetFirstNameNoTooltip] encara o carrasco no rosto e parece prestes a cuspir quando finalmente nota que estou observando. Seus olhos nunca deixam os meus, nem por um instante, franzindo o cenho fundo além dos meus olhos e em minha alma, com nada além de puro ódio e desprezo."
 bp1_yearly.9045.desc.fallback: "Os olhos de [recipient.GetNameNoTooltip] têm um vermelho intenso por causa das lágrimas. Quando avança em direção ao executor, tenta permanecer em silêncio, mas não consegue evitar soltar um leve gemido e engasgar ao contemplar sua morte iminente."
 bp1_yearly.9045.desc.outro: "\n\nIndependentemente de como esse espetáculo me faça sentir, tudo termina rápido demais para que eu tenha sequer a chance de interromper o ato. Uma vez que a ação é concluída e o coração de [recipient.GetNameNoTooltip] deixe de bater, [bp1_yearly_9045_guardian.GetNameNoTooltip] me deixa sozinho com o corpo para contemplar o que fiz."
 bp1_yearly.9045.a.indifferent: "Posso ir para casa agora?"
 bp1_yearly.9045.a.sadistic: "Que grande espetáculo!"
 bp1_yearly.9045.a.guilty: "Por que você me mostrou isso?"
 bp1_yearly.9046.t: "Um Nome Marrom"
 bp1_yearly.9046.desc.intro: "Por fim chegou a hora de meu queridíssim[bp1_yearly_9046_poopy_child.Custom('ES_OA')] recém-nascid[bp1_yearly_9046_poopy_child.Custom('ES_OA')] [bp1_yearly_9046_poopy_child.GetName] ser batizad[bp1_yearly_9046_poopy_child.Custom('ES_OA')] aos olhos de [ROOT.Char.GetFaith.HighGodName], e todas as pessoas mais importantes do meu [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] se reuniram para testemunhar este dia sagrado. Enquanto [bp1_yearly_9046_chaplain.GetName] cumpre seu sagrado dever, chega às minhas narinas um cheiro horrível.\n\n"
 bp1_yearly.9046.desc.christian: "A pia batismal agora apresenta um rico tom de marrom com a matéria fecal do meu bebê. Já mergulharam a cabeça dele na água benta em nome do Pai, e só posso assistir enquanto a mergulham mais duas vezes em nome do Filho e do Espírito Santo."
 bp1_yearly.9046.desc.not_christian: "Pelo líquido marrom que escorre entre as mãos de [bp1_yearly_9046_chaplain.GetNameNoTooltip] fica claro que meu pobre [bp1_yearly_9046_poopy_child.GetNameNoTooltip] não conseguiu se segurar por [ROOT.Char.GetFaith.HighGodName]."
 bp1_yearly.9046.desc.outro: "Apesar do cheiro horrível e das risadas da congregação, [bp1_yearly_9046_chaplain.GetNameNoTooltip] mantém sua postura profissional.\n\nTemo que este evento assombre meu [bp1_yearly_9046_poopy_child.Custom('GetDaughterSon')] por toda a vida, e o nome de [bp1_yearly_9046_poopy_child.GetFirstNameNoTooltip] ficará para sempre associado a cocô de bebê."
 bp1_yearly.9046.a.indifferent: "Ha! Que espetáculo!"
 bp1_yearly.9046.a: "Bem, não há nada que eu possa fazer."
 bp1_yearly.9046.b: "Este evento não sai desta sala."
 bp1_yearly.9047.t: "Um Amoroso Cabelo"
 bp1_yearly.9047.desc: "Estou conversando com meu amor, [bp1_yearly_9047_lover.GetName], em uma conversa habitual de alcova, enquanto enrolo seu lindo cabelo em meus dedos.\n\n«Você gosta tanto do meu cabelo, [ROOT.Char.Custom('LoverPetName')] meu[ROOT.Char.Custom('ES_OA')]? Talvez devesse levá-lo sempre com você enquanto cumpre seus deveres como [ROOT.Char.GetTitleAsNameNoTooltip], assim todos verão que você e eu somos um[ROOT.Char.Custom('ES_OA')]».\n\nNo começo, achei que estivesse brincando, mas logo ficou claro que ele realmente quer que eu use seu cabelo como adorno para que todos vejam."
 bp1_yearly.9047.a: "Usarei até morrer."
 bp1_yearly.9047.b: "O quê? Isso é nojento!"
 bp1_yearly.9048.t: "Lutando contra um Demônio"
 bp1_yearly.9048.desc: "[bp1_yearly_9048_nemesis.GetName] nunca deixa de mostrar seu rosto horrível no momento perfeito para arruinar meu dia. Desta vez, parece especialmente cheio[bp1_yearly_9048_nemesis.Custom('ES_OA')] de bile ao se aproximar de mim em minha própria [ROOT.Char.Custom('GetCourt')] com fogo nos olhos.\n\n"Seu completo [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('bp1_yearly_9048_nemesis'))]! Seu total [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('bp1_yearly_9048_nemesis'))]! Seu [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('bp1_yearly_9048_nemesis'))|U] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('bp1_yearly_9048_nemesis'))]! Cada respiração em seus pulmões é um desperdício e um insulto a todas as coisas vivas. Estou farto de contemplar uma perversão tão distorcida da criação de [bp1_yearly_9048_nemesis.GetFaith.CreatorNamePossessive] e exijo satisfação. Isso entre nós termina agora! Lute comigo!".\n\nAntes que eu tenha a chance de reagir, [bp1_yearly_9048_nemesis.GetName] já está posicionado para lutar comigo!"
 bp1_yearly.9048.a: "Quando eu terminar, haverá uma espécie de [bp1_yearly_9048_nemesis.Custom2('InsultNoun', ROOT.Char)|l] [bp1_yearly_9048_nemesis.Custom2('InsultAdjective', ROOT.Char)]a menos no mundo!"
 bp1_yearly.9048.b: "Oh, vá embora, [bp1_yearly_9048_nemesis.Custom2('InsultNoun', ROOT.Char)]."
 9048_you_lose: "Você é derrotado em combate"
 bp1_yearly.9049.t: "Apenas Sobremesas?"
 bp1_yearly.9049.desc: "[bp1_yearly_9048_nemesis.GetName] cai a meus pés, ensanguentad[bp1_yearly_9048_nemesis.Custom('ES_OA')] e quebr[bp1_yearly_9048_nemesis.Custom('ES_OA')] por sua patética tentativa de me superar. A luta terminou e eu sou [ROOT.Char.Custom('ES_ElLa')] clar[ROOT.Char.Custom('ES_OA')] vencedor[ROOT.Char.Custom('ES_XA')] mas o fogo ainda arde em meu coração. Meus punhos só querem espancar essa espécie de [bp1_yearly_9048_nemesis.Custom2('InsultNoun', ROOT.Char)] [bp1_yearly_9048_nemesis.Custom2('InsultAdjective', ROOT.Char)] até que só reste uma massa ensanguentada.\n\n[bp1_yearly_9048_nemesis.GetNameNoTooltip] ergue debilmente as mãos ao rosto, com os olhos cheios de medo como um [ROOT.Char.Custom('GetAnimalType')] que sabe que a caçada chegou ao fim."
 bp1_yearly.9049.a: "Eu vou arrancar um pedaço de você!"
 bp1_yearly.9049.b: "Isso acabou."
 bp1_yearly.9049.c: "$bp1_yearly.9049.b$.. para você!"
 bp1_yearly.9050.t: "Histórias de Guerra"
 bp1_yearly.9050.desc: "Uma das coisas de que mais gosta [bp1_yearly_9050_friend.GetName] de fazer comigo é sentar-se junto ao fogo e trocar histórias de guerra em uma noite linda, e nesta noite temos relembrado desde o sol até a lua e até o sol novamente!\n\nComeço contando sobre a vez em que [bp1_yearly_9050_my_memory.GetDescription], o que faz com que [bp1_yearly_9050_friend.GetFirstNameNoTooltip] aperte as mãos e ria.\n\nUma boa história! Embora, na verdade, eu lhes digo, amig[ROOT.Char.Custom('ES_OA')]u[ROOT.Char.Custom('ES_OA')]e, que não há evento mais glorioso em toda a história do que quando [bp1_yearly_9050_friend_memory.GetDescription]. Ha! Que dias gloriosos tivemos, e rezo para que venham muitas mais glórias!."
 bp1_yearly.9050.a: "Ninguém conta uma história como [bp1_yearly_9050_friend.GetFirstNameNoTooltip]!"
 bp1_yearly.9050.b: "A #EMP minha#! história é claramente melhor!"
 exploitative_lord_modifier: "Senhor Explorador"
 exploitative_lord_modifier_desc: "Este personagem explora até mesmo os servos mais desesperadamente pobres, se houver moedas a serem ganhas."
