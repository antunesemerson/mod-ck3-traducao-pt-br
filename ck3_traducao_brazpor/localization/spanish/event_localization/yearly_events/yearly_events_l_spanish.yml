l_spanish:
 yearly.0001.opening: "[mentor.Custom2('AppropriateGreeting', ROOT.Char)]"
 yearly.0001.desc.default: "Por anos, minha habilidade em [ROOT.Char.Custom('YearlyEvent0001Skill')] tem me servido bem, e me ocorre que esse conhecimento também pode ser útil para você. Ficaria feliz em compartilhar o que sei"
 yearly.0001.desc.arrogant: "Como você sem dúvida notou, sou bastante proficiente nos assuntos de [ROOT.Char.Custom('YearlyEvent0001Skill')]. Ficaria feliz em compartilhar meu conhecimento sobre esses tópicos com você"
 yearly.0001.desc.councillor: "No meu papel de [mentor.Custom('CouncilPosition')] suas[ROOT.Char.Custom('ES_OA')] aprendi muito sobre [ROOT.Char.Custom('YearlyEvent0001Skill')]. Como acredito que esse conhecimento pode ser útil para você, me ofereço para ensinar o que sei"
 yearly.0001.desc.nofavor: "para ganhar seu favor."
 yearly.0001.desc.favor: "para retribuir a ajuda que você me deu no passado."
 yearly.0001.desc.friend: "[ROOT.Char.Custom('YearlyEvent0001Skill')|U] sempre foram pontos fortes meus, e desejo compartilhar minha experiência nesses tópicos com você. Se você tiver algum tempo disponível para algumas lições, ficaria feliz em ensinar o que sei."
 yearly.0001.a: "Sua assistência é muito apreciada."
 yearly.0001.a.success: "Levo a sério as lições de [mentor.GetFirstNameNoTooltip]"
 yearly.0001.a.failure: "[mentor.GetFirstNameNoTooltip] me aconselha sobre minha situação atual"
 yearly.0001.b: "Uma oferta generosa, mas e se eu ajudá-lo em vez disso?"
 yearly.0001.b.success: "[mentor.GetFirstNameNoTooltip] leva a sério minhas lições"
 yearly.0001.b.failure: "Aconselho [mentor.GetFirstNameNoTooltip] sobre sua situação atual"
 yearly.0001.c: "Ambos podemos nos beneficiar se compartilharmos nosso conhecimento!"
 yearly.0001.d: "Eu posso me virar bem sozinho."
 yearly.0002.t: "Conselheiro Indiscreto"
 yearly.0002.desc: "Tendo me servido fielmente como [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('councillor') )], confiei a [councillor.GetFirstName] a liberdade de circular livremente por minha [ROOT.Char.Custom('GetCourt')].\n\nNo entanto, descobri que ele tem se aproveitado da minha hospitalidade e tem sido indiscreto com meu [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('child') )] [child.GetFirstName]!"
 yearly.0002.a: "Eles devem se casar para absolver seus crimes."
 yearly.0002.c: "Vou fazer [councillor.GetFirstNameNoTooltip] apodrecer na prisão por me desafiar!"
 yearly.0002.d: "Seria uma pena se isso vazasse..."
 yearly.0003.t: "Amor Proibido"
 yearly.0003.start.desc: "A princípio, achei que fosse uma piada — como poderiam m [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] e [relative.Custom2('HerHisCharacterIntroductionNoComma', SCOPE.sC('child'))] ser amantes?! No entanto, a carta interceptada por meus espiões"
 yearly.0003.dislikes_incest.desc: "descreve encontros que [child.GetWomanMan] algum[child.Custom('ES_OA')] nunca deveria ter com seu [child.Custom2('RelationToMeShort', SCOPE.sC('relative'))]…"
 yearly.0003.likes_incest.desc: "detalha de forma #EMP fascinante#! o relacionamento carnal deles..."
 yearly.0003.b: "Tentar encobrir seus encontros."
 yearly.0003.a: "O mundo conhecerá seus crimes contra [ROOT.Char.GetFaith.PantheonTerm]!"
 yearly.0003.c: "Encarcerá-los por desonrar a Casa !"
 yearly.0003.d: "Convidá-los-ei ao meu [ROOT.Char.Custom('GetChamber')] para passar \"tempo em família\"."
 yearly.0011.t: "Cometa Avistado!"
 yearly.0011.desc: "O aparecimento de um cometa nos céus faz todos os mortais pararem. O que poderia significar essa estranha aparição, vagando por nossos céus de forma tão inesperada?\n\n[ROOT.Char.GetWomenMen] mais sábios que eu passaram a vida inteira pensando em coisas menores, mas todo camponês metido a besta em [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] tem sua própria teoria maluca..."
 yearly.0011.gain_stress: "O cometa causa pânico em inúmeros súditos"
 yearly.0011.lose_stress: "O cometa aterroriza muitos arruaceiros"
 gain_rock_artifact_tt: "Você ganha um [artifact|lE] $artifact_pedestal_rock_name$"
 yearly.0011.new_friends: "Talvez ele traga novos amigos?"
 yearly.0011.lustful: "Rápido, alguém me segure!"
 yearly.0011.chaste: "Os fornicadores trouxeram isso sobre nós!"
 yearly.0011.gluttonous: "A morte se aproxima! Encha os estoques!"
 yearly.0011.temperate: "Isso é um julgamento por nossos excessos!"
 yearly.0011.greedy: "Fico pensando que riquezas estranhas vêm de um cometa..."
 yearly.0011.generous: "Isso #EMP prova#! que somos todos muito egoístas!"
 yearly.0011.lazy: "Desista disso, vou voltar para a cama."
 yearly.0011.diligent: "Isso nos incomodaria menos se estivéssemos trabalhando."
 yearly.0011.wrathful: "Eu vou arrancar a maldita coisa do céu!"
 yearly.0011.calm: "Isso, também, passará."
 yearly.0011.patient: "Vamos decifrar esse sinal, com o tempo."
 yearly.0011.impatient: "O que diabos isso significa?!"
 yearly.0011.arrogant: "Um bom presságio para minha família, eu acho."
 yearly.0011.humble: "Todos somos partículas diante da Criação."
 yearly.0011.deceitful: "Fico pensando qual explicação me beneficiaria mais..."
 yearly.0011.honest: "Parece apenas uma pedra para mim?"
 yearly.0011.craven: "#EMP TODOS, ENTREM EM PÂNICO!#!"
 yearly.0011.brave: "Seja o que for, enfrentaremos de frente!"
 yearly.0011.shy: "Talvez eu esteja mais seguro na minha torre..."
 yearly.0011.gregarious: "Se este for o fim, vamos comemorar com os amigos!"
 yearly.0011.ambitious: "Cometas anunciam grandes feitos e grandes [ROOT.Char.GetWomenMen]!"
 yearly.0011.content: "Seja o que for, foi destinado."
 yearly.0011.arbitrary: "Isso significa o que eu digo que significa!"
 yearly.0011.just: "Ó cometa, ó arauto da justiça divina!"
 yearly.0011.cynical: "Provavelmente é apenas gás camponês congelado."
 yearly.0011.zealous: "O fim está próximo! Arrependam-se!"
 yearly.0011.paranoid: "Meus inimigos estão virando os Céus contra mim!"
 yearly.0011.trusting: "T-talvez não signifique nada afinal?"
 yearly.0011.compassionate: "Espero que não caia sobre ninguém..."
 yearly.0011.callous: "Contanto que não caia sobre mim, quem se importa?"
 yearly.0011.sadistic: "Espero que caia sobre um inimigo!"
 yearly.0011.stubborn: "Não me movo por menos que os Céus #EMP e#! a Terra."
 yearly.0011.fickle: "Não consigo me decidir sobre isso..."
 yearly.0011.vengeful: "Hah, alguém receberá o que merece!"
 yearly.0011.forgiving: "Grande [ROOT.GetCharacter.GetFaith.HighGodName], perdoe-nos por nossos pecados!"
 #Abandoned inn
 yearly.0025.t.chain_title: "Administração de Estalagem"
 yearly.0025.t: "$yearly.0025.t.chain_title$: Velha e Esquecida"
 yearly.0025.desc: "Cuando paseaba por un camino secundario solitario de [county.GetBaseNameNoTier] con mi séquito, veo aparecer en la distancia una silueta oscura, que crece lentamente al ritmo de nuestros pasos.\n\nSegún me acerco, más clara queda la visión: es una taberna vieja, abandonada y olvidada. Si se le da un poco de cariño y cuidado a su vieja fachada, podría convertirse en una taberna encantadora.\n\nNo consigo imaginar cómo este sitio ha podido caer en tal deterioro. Su ubicación está cerca de varias localidades y su puerta parece acogedora. Por todo lo anterior, debería producir bastantes monedas.\n\nCon la persona correcta al frente."
 yearly.0025.a: "Farei este lugar prosperar!"
 yearly.0025.a.tt.progress: "Invista recursos para restaurar a estalagem, podendo obter um resultado e recompensas #N ruins#!, #M medianas#! ou #P boas#!."
 yearly.0025.b: "Siga em frente, é arriscado demais"
 #Refurbishment
 yearly.0026.t: "$yearly.0025.t.chain_title$: Reforma"
 yearly.0026.desc: "Cuando entro en el cascarón del edificio, descubro rápidamente por qué se perdió y olvidó para empezar.\n\nHay un tenue olor a algo que no reconozco, combinado con goteras en el techo que caen débilmente sobre la ciénaga embarrada que hace las veces de suelo.\n\nReparar algo así no sería #EMP demasiado#! difícil, pero parece frustrante y caro. En cualquier caso, seguro que las gentes de [county.GetNameNoTier] acudirán en tropel a este lugar: un nuevo negocio patrocinado por [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] es, sin duda, novedoso."
 yearly.0026.a: "Só... joguem um pouco de feno na lama"
 yearly.0026.a.tt.success: "Faço o possível com o que tenho"
 yearly.0026.a.tt.failure: "Não encontro uma boa solução"
 yearly.0026.b: "Algumas partes podem ser consertadas, mas há um prazo a cumprir"
 yearly.0026.c: "Vamos reformar #EMP tudo!#!"
 yearly.0026.tt.bad: "A estalagem fica #N um pouco#! melhor."
 yearly.0026.tt.average: "A estalagem fica #M razoavelmente#! melhor."
 yearly.0026.tt.good: "A estalagem fica #P muito#! melhor."
 #Edibles
 yearly.0027.t: "$yearly.0025.t.chain_title$: festejar como um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GetQueenKing')]"
 yearly.0027.desc: "Empiezo a adormilarme mientras pienso en el potencial del lugar y todos los recuerdos que albergará.\n\nPor supuesto, unas cuantas cosas mejoran una buena velada, como una comida sabrosa, y nada quita las penas más deprisa que una buena cerveza. Una buena tajada de carne grasienta, un borracho desmayado sobre un banco, nuevas amistades de rostros borrosos, ¡todos los ingredientes para pasar un buen rato!\n\nLa verdadera cuestión es a qué deberían entregarse los invitados: cerveza, vino, licores…"
 yearly.0027.a: "Quem liga pra #EMP bebida#!, estarei lá!"
 yearly.0027.a.tt.success: "Meus encantos convencem"
 yearly.0027.tt.good: "$yearly.0026.tt.good$"
 yearly.0027.a.tt.failure: "Não sou tão carismático quanto pensei"
 yearly.0027.tt.bad: "$yearly.0026.tt.bad$"
 yearly.0027.b: "Nabos salgados para todos"
 yearly.0027.c: "Farei esses camponeses se sentirem reis e rainhas"
 innkeeper_bad_edibles_char_modifier: "Anfitrião Frugal"
 innkeeper_bad_edibles_char_modifier_desc: "A seleção de comidas oferecidas na estalagem deste personagem tinha mais mofo do que carne."
 innkeeper_neutral_edibles_char_modifier: "Dieta Balanceada"
 innkeeper_neutral_edibles_char_modifier_desc: "Este personagem teve poucas opções para oferecer durante a noite de inauguração de sua nova estalagem."
 innkeeper_fancy_edibles_char_modifier: "Excesso à Mesa"
 innkeeper_fancy_edibles_char_modifier_desc: "Havia uma seleção luxuosa de comidas e bebidas para escolher durante a noite de inauguração da estalagem."
 #Entertainment
 yearly.0028.t: "$yearly.0025.t.chain_title$: Que Comece o Show!"
 yearly.0028.desc: "Ninguna posada estaría completa sin algo de entretenimiento para las masas.\n\n¿Qué tal un juglar cantarín, que hable de sentimientos de amor y guerra? ¿O un poeta que inspire a otros sobre el peso de las palabras? ¿Y por qué no un bufón ágil que nos haga llorar de alegría y nos quite las penas, aunque sea por una noche?\n\nTengo que pensar sobre qué tipo de actuación se necesita para embelesar a los parroquianos. Cuanto más tiempo pasen aquí, más beberán."
 yearly.0028.a: "Contrate um bardo eloquente"
 yearly.0028.b: "Encontre um poeta talentoso"
 yearly.0028.c: "Traga-me um bobo ágil"
 yearly.0028.a.gain.bard: "Há uma chance de #P ganhar#! um bardo para sua corte no final."
 yearly.0028.b.gain.poet: "Há uma chance de #P ganhar#! um poeta para sua corte no final."
 yearly.0028.c.gain.jester: "Há uma chance de #P ganhar#! um bobo para sua corte no final."
 yearly.0028.tt.minor_xp_gain: "Suas habilidades de negociação são de alguma utilidade"
 yearly.0028.tt.major_xp_gain: "Suas habilidades de negociação são extremamente úteis"
 #Conclusion
 yearly.0029.t: "$yearly.0025.t.chain_title$: Noite de Inauguração"
 yearly.0029.conclusion_intro: "Foi uma noite longa e cansativa para a estreia da taverna — cheia de altos e baixos. Era de se esperar, mas ainda assim, exaustiva."
 yearly.0029.refurbishment_bad.1: "Minha nova estalagem já viu dias melhores, provavelmente. Hoje não foi um deles.\n\n"
 yearly.0029.refurbishment_bad.2: "Esperava que o vazamento resistisse. Infelizmente, há mais chuva no balcão do que cerveja.\n\n"
 yearly.0029.refurbishment_bad.3: "O cheiro simplesmente não desaparece. Temo que vá assombrar meus sonhos para sempre.\n\n"
 yearly.0029.refurbishment_average.1: "Alguns banquinhos foram roubados, mas isso é uma desculpa para investir em mais.\n\n"
 yearly.0029.refurbishment_average.2: "Alguns rabiscos grosseiros nas mesas, mas nada importante.\n\n"
 yearly.0029.refurbishment_average.3: "Felizmente, nossos reparos resistiram, apesar dos rangidos sinistros no telhado.\n\n"
 yearly.0029.refurbishment_good.1: "Um investimento que valeu a pena para realizar os reparos.\n\n"
 yearly.0029.refurbishment_good.2: "Alguns assentos a mais não fariam mal.\n\n"
 yearly.0029.refurbishment_good.3: "Felizmente, o último cliente saiu com um sorriso no rosto.\n\n"
 yearly.0029.edibles_bad.1: "A comida desceu mal... a maior parte escorrendo entre as tábuas do chão.\n\n"
 yearly.0029.edibles_bad.2: "Os poucos clientes que se atreveram a pedir uma refeição não tiveram coragem nem de dar a primeira mordida.\n\n"
 yearly.0029.edibles_bad.3: "Cada prato deixado sem vigilância se tornou um banquete em miniatura para os ratos locais. Hordas e mais hordas de #EMP ratos.#!\n\n"
 yearly.0029.edibles_average.1: "Os clientes pareceram gostar da maioria das comidas, apesar de terem que espantar alguns ratos corajosos.\n\n"
 yearly.0029.edibles_average.2: "Alguns convidados estranharam a cerveja servida, franzindo o cenho após cheirá-la — mas mesmo assim beberam.\n\n"
 yearly.0029.edibles_average.3: "Mesmo que nem a comida nem a cerveja fossem particularmente boas, os fregueses pareciam animados. Muitos, literalmente.\n\n"
 yearly.0029.edibles_good.1: "O estalajadeiro teve dificuldade em acompanhar a demanda, já que os clientes mal se sentavam antes de pedir outra rodada.\n\n"
 yearly.0029.edibles_good.2: "Casi me dejaron sord[ROOT.Char.Custom('ES_OA')] de tantos vítores y durante tanto tiempo.\n\n"
 yearly.0029.edibles_good.3: "Nenhum prato voltou da cozinha com sequer uma migalha.\n\n"
 yearly.0029.entertainment_bard_bad: "Cuando [entertainer.Custom('ES_ElLa')] juglar sube al escenario, parece… nervios[entertainer.Custom('ES_OA')], como si jamás hubiera actuado en público. Con los ojos asustados, como si entrase en el campo de batalla, suelta un chillido estridente… y huye.\n\n"
 yearly.0029.entertainment_bard_average: "[entertainer.Custom('ES_ElLa')|U] juglar sube al escenario con un paso más o menos confiado; levanta un taburete del suelo y pone encima con fuerza una de sus botas pesadas. En cuanto saca su laúd, toda su confianza anterior desaparece. El público recibe una balada gorjeante y estridente que no apreciaría ni un abuelo sordo y moribundo.\n\n"
 yearly.0029.entertainment_bard_good: "Al principio, se oye una melodía tenue que proviene del tenebroso exterior y que poco a poco capta la atención de los borrachos. Un silencio se apodera de la multitud y todas las miradas se centran en la entrada. La canción gana fuerza hasta que la puerta se abre de golpe y entra un[entertainer.Custom('ES_XA')] hermos[entertainer.Custom('ES_OA')] juglar. El estribillo va en crescendo hasta estallar en una melodía alegre y un coro de vítores estridentes; el primero de muchos por venir.\n\n"
 yearly.0029.entertainment_poet_bad: "[Select_CString( entertainer.IsFemale, 'La poetisa', 'El poeta' )] sube al escenario con un trozo de pergamino en la mano; hace lo que puede para llamar la atención del público antes de empezar, con poco éxito. Echa un vistazo a sus notas, intenta soltar unos versos, solo para que un coro de abucheos los ahoguen, y escapa llorando en la noche.\n\n"
 yearly.0029.entertainment_poet_average: "El aura radiante [Select_CString( entertainer.IsFemale, 'de la poetisa', 'del poeta' )] atrajo miradas en cuanto entró, consiguiendo que hasta el parroquiano más lerdo levantase la vista de la jarra ante la algarabía. En cuanto [Select_CString( entertainer.IsFemale, 'la poetisa', 'el poeta' )] empezó a recitar, el hechizo se rompió. Sin nada más que un canto fúnebre para distraerlos, el público despistado pierde el interés y vuelve a sus cervezas.\n\n"
 yearly.0029.entertainment_poet_good: "[Select_CString( entertainer.IsFemale, 'La poetisa', 'El poeta' )] entró en el escenario con aire dramático, recitando sus versos con tal pasión que ni un solo corazón de los presentes queda sin conmover. Sus palabras resonaban tan pesadas contra nosotros que todas las emociones previas parecían… livianas en comparación. Ni una sola alma dejó el local sin lágrimas en los ojos, fueran de alegría o de tristeza.\n\n"
 yearly.0029.entertainment_jester_bad: "[Select_CString( entertainer.IsFemale, 'La bufona', 'El bufón' )] me tomó por tont[ROOT.Char.Custom('ES_OA')] al hacerme creer que acudiría esta noche, cuando en realidad no hay ni rastro de [entertainer.GetSheHe]. Las expectativas ante el espectáculo de la velada no tardaron en agriarse y el público refunfuñó incrédulo ante mis míseras excusas.\n\n"
 yearly.0029.entertainment_jester_average: "[Select_CString( entertainer.IsFemale, 'La bufona', 'El bufón' )] conseguiu amenizar um pouco o ambiente da estalagem, mas às custas de alguns silêncios constrangedores e piadas que passaram despercebidas por camponeses de mente simples — e simplesmente embriagados —.\n\n"
 yearly.0029.entertainment_jester_good: "[Select_CString( entertainer.IsFemale, 'La bufona', 'El bufón' )] saltó al escenario con un grito y una voltereta. La posada entera estalló en gritos y aplausos mientras [entertainer.GetSheHe] giraba grácil en el aire y saltaba por encima de mesas, taburetes y parroquianos por igual. Toda proeza se combinaba con una ocurrencia ingeniosa (aunque le faltase el aire), algo que [entertainer.GetHerHim] dejó agotad[entertainer.Custom('ES_OA')] al final de la noche. Acabó siendo una velada que dejó sin aliento a todos los participantes.\n\n"
 yearly.0029.conclusion_outro: "Meu trabalho aqui está feito."
 yearly.0029.a: "Que noite!"
