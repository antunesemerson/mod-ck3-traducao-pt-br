l_spanish:
 yearly.1001.t: "Através de Cílios Abatidos"
 yearly.1001.start.desc: "Quando meu olhar se cruza com o de [married_seducer.GetFirstName] pela que seria a vigésima vez naquela noite, sei que não estou imaginando coisas. Mesmo do outro lado da mesa, percebo seu olhar ardente como o sol do meio-dia.\n\n[married_seducer.GetFirstName] me deseja"
 yearly.1001.end_hesitation.desc: "e sinto como meu corpo responde e desperta. Mas [seducer_spouse.GetTitledFirstName|l], seu [seducer_spouse.GetWifeHusband] e meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('seducer_spouse'))], também nos acompanha esta noite…"
 yearly.1001.end_intimidated.desc: "e eu estou apavorado. De [married_seducer.Custom('ES_ElElla')]? De seu [seducer_spouse.GetWifeHusband] [seducer_spouse.GetTitledFirstName]? Ou do que eu seria capaz de fazer? Não sei dizer."
 yearly.1001.end_spiteful.desc: "e não posso mentir, eu também [married_seducer.GetHerHim] desejo… Ou será que o que eu realmente desejo é punir seu [seducer_spouse.GetWifeHusband], [seducer_spouse.GetTitledFirstName]? Isso importa mesmo?"
 yearly.1001.a: "Vou dar uma boa trepada com ele!"
 yearly.1001.a.tt: "Vou encontrar [married_seducer.GetTitledFirstName|l] quando todos estiverem dormindo."
 yearly.1001.b: "Todos saberão de seus pensamentos pecaminosos!"
 yearly.1001.c: "Não! Meu coração permanece puro."
 yearly.1002.desc: "Logo depois, [married_seducer.GetFirstName] cai sobre o colchão com um baque, o fôlego ofegante e os olhos semicerrados. Enxugo languidamente o suor de sua [married_seducer.Custom('ObjectifiedFeature')] com delicadeza.\n\nPouco depois, [married_seducer.GetFirstNameNoTooltip] afasta minha mão com um sorriso desculpado. \"Já está quase amanhecendo. É melhor eu ir.\""
 yearly.1002.a: "\"Você pode ficar um pouco mais? Por favor?\""
 yearly.1002.a.success: "[married_seducer.GetFirstNameNoTooltip] fica"
 yearly.1002.a.success.message: "[married_seducer.GetFirstName] e eu fizemos amor até o sol nascer."
 yearly.1002.a.failure: "[married_seducer.GetFirstNameNoTooltip] acha que estou sendo grudento"
 yearly.1002.a.failure.message: "[married_seducer.GetFirstName] zombou de mim e saiu."
 yearly.1002.b: "\"De fato, você melhor se apressar.\""
 yearly.1002.b.success: "[married_seducer.GetFirstNameNoTooltip] aprecia minha casualidade"
 yearly.1002.b.success.message: "[married_seducer.GetFirstName] apreciou minha casualidade."
 yearly.1002.b.failure: "[married_seducer.GetFirstNameNoTooltip] espera algo mais"
 yearly.1002.b.failure.message: "A [married_seducer.GetFirstName] ficou magoado, como se tivesse esperado algo mais."
 yearly.1003.t: "Eu Deveria Ter Sabido"
 yearly.1003.start.desc: "Quando tenho certeza de que não fui seguido, abro a porta de seu quarto e dou uma espiada lá dentro. O objeto do meu desejo está de pé, de costas para mim, tão nus[married_seducer.Custom('ES_OA')] como no dia em que nasceu."
 yearly.1003.end.desc: "Empurro a porta, me aproximo…\n\nQuando, de repente, ouço uma pancada forte, sinto uma dor intensa e caio de costas, batendo com força no chão. Há gritos, muitos gritos. E passos. Minha cabeça está girando…\n\n“Como um rato na armadilha”, sussurra uma voz familiar. [seducer_spouse.GetTitledFirstName|l]. Droga."
 yearly.1003.a: "Eu... Eu estava procurando o banheiro!"
 yearly.1010.t: "Desaparecido na Noite"
 yearly.1010.start.desc: "Ao entrar nos [ROOT.Char.Custom('GetChamberPlural')] [abductee.Custom('ES_DelDela')] [abductee.GetTitledFirstName|l], a primeira coisa que noto é o guarda caído em um canto. A segunda é o corte vermelho vivo atravessando sua garganta. Mas meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('abductee'))] não está em lugar nenhum!\n\n"
 yearly.1010.friend.desc: "[hunter.GetTitledFirstName] entra na [ROOT.Char.Custom('GetRoom')] com um arco pendurado no ombro. \"Sinto muito, [Select_CString(ROOT.Char.IsFemale, 'vieja amiga', 'viejo amigo' )]. [abductor.Custom('ES_ElLa')|U] [abductor.GetTitledFirstName|l] [abductee.GetHerHim] sequestrou."
 yearly.1010.marshal.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hunter'))] entra na [ROOT.Char.Custom('GetRoom')] com um arco pendurado no ombro. \"O guarda sobrevivente afirma que foi [abductor.Custom('ES_ElLa')] [abductor.GetTitledFirstName|l] quem [abductee.GetHerHim] sequestrou, meu [ROOT.Char.Custom('GetCourtOwner')]."
 yearly.1010.end.desc: "Sabujos e [dummy_gender.GetWomenMen] prontos. Quais são as suas ordens?""
 yearly.1010.abduction.tt: "[abductee.GetTitledFirstName] foi sequestrad[abductee.Custom('ES_OA')] por [abductor.GetTitledFirstName|l]."
 yearly.1010.friend.tt: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hunter'))] [hunter.GetTitledFirstName|l] está aqui para ajudar."
 yearly.1010.a: "Capture [abductor.GetTitledFirstNameNoTooltip|l] vivo."
 yearly.1010.a.tt: "Eu serei capaz de decidir se quero [abductee.GetTitledFirstName|l] salvo, capturado ou morto a seguir\n\n"
 yearly.1010.b: "Quero que es[abductor.Custom('ES_EA')] [abductor.Custom2('InsultNoun', ROOT.Char)] morra."
 yearly.1010.c: "Só me importa que [abductee.GetFirstNameNoTooltip] volte em segurança."
 yearly.1010.d: "Não me importo. Deixe-os ir."
 yearly_1010_save_abductee_random_list_effect.success.tt: "[abductee.GetShortUIName|U] é resgatad[abductee.Custom('ES_OA')]"
 yearly_1010_save_abductee_random_list_effect.failure.tt: "[abductee.GetShortUIName] é sequestrad por [abductor.GetShortUIName|U]"
 yearly.1011.desc: ""E o seu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('abductee'))]?", pergunta [SCOPE.sC('hunter').GetFirstName]. "Só o guarda dele ouviu algo. Tenho cert[ROOT.Char.Custom('ES_OA')] de que há uma boa explicação, mas saiba que alguns suspeitam que ele foi embora por vontade própria…"."
 yearly.1011.a: "Nonsense. Defenda [abductee.GetFirstNameNoTooltip] com sua vida."
 yearly.1011.b: "Quero que [abductee.Custom('ES_LoLa')] seja acorrentado(a)."
 yearly.1011.c: "Corte a garganta e enterre o corpo."
 yearly_1010_outcome_effect_escape.tt: "[THIS.Char.GetTitledFirstName] escapou"
 yearly_1010_outcome_effect_abductee_save.tt: "[abductee.GetTitledFirstName] foi resgatad[abductee.Custom('ES_OA')] e voltou para mim"
 yearly_1010_outcome_effect_abductee_lost.tt: "[abductor.GetTitledFirstName] capturou [abductee.Custom('ES_AlAla')] [abductee.GetTitledFirstName|l]"
 yearly_1010.target_imprison.desc: "[THIS.Char.GetTitledFirstNameNoTooltip|l] está capturad[THIS.Char.Custom('ES_OA')]"
 yearly_1010.target_wounded.desc: "[THIS.Char.GetTitledFirstNameNoTooltip|l] está ferid[THIS.Char.Custom('ES_OA')], mas escapa"
 yearly_1010.hunter_killed.desc: "[THIS.Char.GetTitledFirstNameNoTooltip|l] matou [hunter.GetTitledFirstNameNoTooltip|l] e escapou"
 yearly_1010.target_killed.desc: "[THIS.Char.GetTitledFirstNameNoTooltip|l] foi mort"
 yearly_1010.abductee_saved.desc: "[abductee.GetTitledFirstNameNoTooltip] foi salv"
 yearly_1010.abductee_saved.tt: "Trazem-me de volta [abductee.GetTitledFirstName|l] sã[abductee.Custom('ES_OA')] e salv[abductee.Custom('ES_OA')]."
 yearly_1010.abductee_lost.desc: "[abductor.Custom('ES_ElLa')|U] [abductor.GetTitledFirstNameNoTooltip|l] escapa com [abductee.Custom('ES_ElLa')] [abductee.GetTitledFirstNameNoTooltip|l]"
 yearly_1010.abductee_lose.tt: "[abductee.GetTitledFirstName|l] foi tirado de minhas terras"
 yearly_1010_kill_target_effect.tt: "[hunter.GetTitledFirstName] vai conhecer meu Segredo"
 yearly.1013.start.desc: "A incerteza é insuportável. Uma hora passa, duas, três... Estou prestes a chamar meu cavalo quando ouço gritos do outro lado do portão.\n\n"
 yearly.1013.hunter_dead_start.desc: "Ao entrar no [ROOT.Char.Custom('GetCourtyard')], sou recebido apenas por rostos amargos e o corpo imóvel de [hunter.GetFirstName] repousando em uma maca improvisada."
 yearly.1013.hunter_alive_start.desc: "Corro ao [ROOT.Char.Custom('GetCourtyard')] e imediatamente vejo o rosto desanimado de [hunter.GetFirstName]."
 yearly.1013.hunter_dead_abductee_lost.desc: "Olho ao redor, mas não há sinal de esperança. Apenas rostos cheios de amargura.\n\n"[abductor.Custom('ES_ElLa')|U] [abductor.GetTitledFirstName|l] levou [abductee.GetHerHim] se [ROOT.Char.Custom('GetCourtOwner')]. Falhamos com vocês…"."
 yearly.1013.hunter_dead_both_escaped.desc: "[abductor.Custom('ES_ElLa')|U] [abductor.GetTitledFirstName|l] e [abductee.Custom('ES_ElLa')] [abductee.GetTitledFirstName|l] escaparam de minhas mãos."
 yearly.1013.abductee_lost.desc: "Corro até o portão, rezando para ver seu rosto na esquina. Mas todos os rostos que vejo estão cheios de amargura, e nenhum deles é o dela."
 yearly.1013.abductor_escaped_abductee_killed.desc: "No entanto, a empreitada não foi um fracasso total. Enquanto [abductor.GetTitledFirstName|l] escapou, [hunter.GetFirstName] me assegura silenciosamente que [abductee.GetFirstName] foi colocado em uma sepultura rasa."
 yearly.1013.abductor_escaped_abductee_imprisoned.desc: "No entanto, a empreitada não foi um fracasso total. Embora eu tenha sido informado de que [abductor.GetTitledFirstName|l] escapou, [abductee.GetFirstName] não teve tanta sorte..."
 yearly.1013.a1: "Vou lidar com você em breve, [abductee.GetFirstNameNoTooltip]..."
 yearly.1013.a2: "Pelo menos [abductee.GetFirstNameNoTooltip] está a salvo..."
 yearly.1013.a3: "Você vai pagar por isso, [abductor.GetFirstNameNoTooltip]..."
 yearly.1014.t: "Uma Caçada Bem-Sucedida"
 yearly.1014.safe_hunter_start.desc: "Ao entrar no [ROOT.Char.Custom('GetCourtyard')] , sou recebido pelo amplo sorriso de [hunter.GetFirstName]."
 yearly.1014.abductee_saved_abductor_killed.desc: "Envolt[abductee.Custom('ES_OA')] em uma manta, sentad[abductee.Custom('ES_OA')] sobre o cavalo de [hunter.GetFirstName], está [abductee.GetFirstName]. Iles[abductee.Custom('ES_OA')].\n\nAo ajudar [abductee.GetHerHim] a descer, lanço um olhar de relance para [hunter.GetFirstName]. Ele acena com a cabeça. Lidou com [abductor.GetTitledFirstName|l]."
 yearly.1014.abductee_saved_abductor_imprisoned.desc: "Envolt[abductee.Custom('ES_OA')] em uma manta, montad[abductee.Custom('ES_OA')] no cavalo de [hunter.GetFirstName], está [abductee.GetFirstName]. A visão me enche o coração de alegria.\n\nDepois, vejo outro rosto familiar: [abductor.GetTitledFirstName|l], acorrentad[abductor.Custom('ES_OA')] e arrastad[abductor.Custom('ES_OA')] atrás de um dos outros cavalos. Excelente."
 yearly.1014.abductee_saved_abductor_escaped.desc: "Envolt[abductee.Custom('ES_OA')] em uma manta, sentad[abductee.Custom('ES_OA')] sobre o cavalo de [hunter.GetFirstName], está [abductee.GetFirstName].\n\nEnquanto ajudo [abductee.GetHerHim] a descer, lanço um olhar para [hunter.GetFirstName], que balança a cabeça. Não importa, não agora. Lidaremos com [abductor.GetTitledFirstName|l] a seu tempo."
 yearly.1014.both_killed.desc: "[hunter.GetFirstName] me faz um gesto para segui-lo.\n\nUma vez longe de ouvidos curiosos, [hunter.GetFirstName] me conta tudo. Enquanto me descreve como morreram, onde foram enterrados e como, a tensão vai desaparecendo aos poucos. Ninguém jamais saberá."
 yearly.1014.both_imprisoned.desc: "[hunter.GetFirstName] carrega uma corda na mão, da qual puxa. Duas pessoas avançam aos tropeços.\n\n[abductee.GetFirstName] e [abductor.GetFirstName], amarrados e vendados."
 yearly.1014.abductee_killed_abductor_imprison.desc: "Ao seu lado, com os olhos vendados e acorrentad[abductor.Custom('ES_OA')] se encontra [abductor.GetTitledFirstName|l].\n\n[abductee.GetTitledFirstName|l] não está, e o olhar de [hunter.GetFirstName] me confirma que tudo saiu conforme o planejado."
 yearly.1014.abductee_imprisoneid_abductor_killed.desc: "Ao lado dele, vendado e acorrentad[abductee.Custom('ES_OA')] encontra-se [abductee.GetTitledFirstName|l].\n\n[abductor.GetTitledFirstName|l] não está, e o olhar de [hunter.GetFirstName] me confirma que tudo saiu conforme o plano."
 yearly.1014.a: "Este é o destino que aguarda todos aqueles que cruzam o meu caminho!"
 yearly.1015.t: "Meu Cordeiro Perdido"
 yearly.1015.start.desc: "Quando [abductee.GetFirstName] apareceu na porta ontem à noite, pensei que seu fantasma tinha vindo me assombrar. Eu já começava a acreditar que nunca mais veria[abductee.Custom('ES_LoLa')], mas ali estava ele, tão real quanto o chão sob meus pés.\n\n[abductee.GetFirstNameNoTooltip] não falou muito desde que voltou, apenas disse que"
 yearly.1015.released.desc: "[abductor.GetTitledFirstName|l] decidiu deixá-lo[abductee.GetHerHim] ir. Não achei que [abductor.Custom('ES_ElLa')] [abductor.GetTitledFirstNameNoTooltip|l] tivesse uma gota de honra no corpo, mas [abductee.Custom('ES_ElLa')] [abductee.GetFirstNameNoTooltip] está livre, não está?"
 yearly.1015.escaped.desc: "viu uma oportunidade e conseguiu escapar. Embora pareça altamente improvável, coisas mais estranhas já aconteceram, certamente...?"
 yearly.1015.immediate.tt: "[abductee.GetTitledFirstName] retornou à minha corte"
 yearly.1015.a.trusting: "Agradeça a [ROOT.Char.GetFaith.HighGodName] pelo retorno seguro de [abductee.GetFirstNameNoTooltip]!"
 yearly.1015.a.paranoid: "[abductee.GetFirstNameNoTooltip] está escondendo algo, tenho certeza disso..."
 yearly.1015.a: "Eu não sei em que acreditar..."
 yearly.1020.opening: "[vip.Custom2('AppropriateGreeting', ROOT.Char)]"
 yearly.1020.desc: "Dentro de alguns dias, meu [enemy.Custom2('InsultAdjective', SCOPE.sC('vip'))] [vip.Custom2('RelationToMeShort', SCOPE.sC('enemy'))], [enemy.Custom('ES_ElLa')] [enemy.GetTitledFirstName|l], passará por [my_county.GetNameNoTierNoTooltip]. Se organizardes uma emboscada e [enemy.GetHerHim] capturardes, eu vos recompensarei generosamente.\n\nSe aceitardes minha oferta, recebereis a metade do dinheiro agora e a outra quando me entregardes [enemy.Custom('ES_AlAla')] [enemy.GetTitledFirstNameNoTooltip|l]. Não derramarei lágrimas se ele morrer na refrega, mas também não pagarei pelo seu cadáver.\n\nConfio que as palavras deste pergaminho permaneçam entre nós. Aguardo sua resposta."
 yearly.1020.a: "Eu sei o lugar perfeito para uma emboscada..."
 yearly.1020.a.rl.t: "Em alguns dias"
 yearly.1020.a.capture.desc: "Eu capturo [enemy.GetTitledFirstNameNoTooltip|l]"
 yearly.1020.a.capture.tt: "[vip.GetTitledFirstName] me entregará o resto do dinheiro quando coletar [enemy.GetTitledFirstName|l]"
 yearly.1020.a.escape.desc: "[enemy.GetTitledFirstNameNoTooltip|l] escapa"
 yearly.1020.b: "Vou fingir aceitar, mas vou avisar [enemy.GetFirstNameNoTooltip] secretamente."
 yearly.1020.a.kill.desc: "[enemy.GetTitledFirstNameNoTooltip|l] é mort na emboscada"
 yearly.1020.a.kill.message: "[enemy.GetTitledFirstName] foi mort na emboscada."
 yearly.1020.b.success.desc: "[vip.GetTitledFirstNameNoTooltip|l] acredita que eu embosquei [enemy.GetTitledFirstNameNoTooltip|l]"
 yearly.1020.b.success.tt: "[vip.GetTitledFirstName] nunca saberá que agi pelas costas"
 yearly.1020.b.failure.desc: "[vip.GetTitledFirstNameNoTooltip|l] descobre que eu avisei [enemy.GetTitledFirstNameNoTooltip|l]"
 yearly.1020.c: "Este acordo parece ser muito perigoso."
 yearly.1021.desc: "A espiã que infiltrei no grupo [enemy.Custom('ES_DelDela')] [enemy.GetTitledFirstName|l] me enviou seu relatório. Nossa, que leitura empolgante! Com certeza [enemy.Custom('ES_ElLa')] [enemy.GetTitledFirstName|l] já não está mais com aquela cara de convencid[enemy.Custom('ES_OA')]!\n\nOs soldados que irão recolher esse(a) [enemy.Custom2('InsultNoun', SCOPE.sC('vip'))] [enemy.Custom2('InsultAdjective', SCOPE.sC('vip'))] já estão prontos."
 yearly.1021.a: "Oh, o prazer é todo meu."
 yearly.1021.b: "Na verdade, acho que vou ficar com [enemy.GetHerHim]!"
 yearly.1021.b.tt: "[enemy.GetTitledFirstName] permanecerá meu prisioneiro"
 yearly.1022.opening: "[enemy.Custom2('AppropriateGreeting', ROOT.Char)]"
 yearly.1022.desc: "Sois um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] de honra, [ROOT.Char.GetLadyLord] [ROOT.Char.GetFirstNameNoTooltip]. Devo a vocês minha liberdade — talvez até a vida. Quem sabe o que esse[vip.Custom('ES_EA')] [vip.Custom2('InsultNoun', SCOPE.sC('enemy'))] [vip.Custom2('InsultAdjective', SCOPE.sC('enemy'))] [vip.Custom('ES_DelDela')] [vip.GetTitledFirstName|l] teria feito comigo, se eu tivesse acabado no calabouço dele?\n\nJuro que retribuirei o favor. Até lá, cuidem-se."
 yearly.1022.a: "E você, [enemy.GetLadyLord] [enemy.GetFirstNameNoTooltip]."
 yearly.1023.opening: "[vip.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 yearly.1023.desc: "Você realmente achou que poderia escapar com seu pequeno esquema? Eu tenho olhos em todos os lugares, [ROOT.Char.GetLadyLord] [ROOT.Char.GetFirstNameNoTooltip], e a partir de agora eles vão segui-lo de perto.\n\nEu juro pela minha vida - você vai se arrepender do dia em que decidiu cruzar meu caminho."
 yearly.1023.a: "Isso poderia ter corrido melhor..."
 yearly.1030.t: "Salve-se quem puder"
 yearly.1030.nervous.desc: "Quando abro a porta da minha [ROOT.Char.Custom('GetChamber')], vejo [hooked.Custom('ES_AlAla')] [hooked.GetTitledFirstName|l], que mexe nervosamente com a própria manga. O que faz aqui a esta hora?\n\n"Lamento muito, mas preciso falar com você em particular. Descobri algo #emp muito#! interessante"."
 yearly.1030.confident.desc: "O anúncio do meu guarda sobre uma visita dissipa toda a sonolência da minha mente. Quem poderia estar me perturbando a esta hora?\n\nMeu/minha visitante noturn[hooked.Custom('ES_OA')] é nada menos que [hooked.Custom('ES_ElLa')] [hooked.GetTitledFirstName|l]. "Preciso falar com você em particular, longe de ouvidos curiosos. Descobri algo #EMP muito#! interessante"."
 yearly.1030.end.desc: "\n\n[hooked.GetTitledFirstNameNoTooltip|l] descobriu um segredo de [secret_character.GetTitledFirstName|l] que está dispost[hooked.Custom('ES_OA')] a compartilhá-lo se eu libertar [hooked.GetHerHim]."
 yearly.1030.a: "Eu juro, depois disso, você não me deve mais nada."
 yearly.1030.a.tt: "[hooked.GetTitledFirstName] vai me contar um [secret|lE] sobre [secret_character.GetTitledFirstName|l]"
 yearly.1030.b: "Você acha que pode fazer exigências? Conte-me, ou então!"
 yearly.1030.b.tt: "Eu forço [hooked.GetTitledFirstName|l] a me contar um [secret|lE] sobre [secret_character.GetTitledFirstName|l]"
 yearly.1030.c: "Prefiro tê-lo sob meu controle do que [secret_character.GetSheHe]."
 yearly.1030.a.start.desc: "Segredo Descoberto"
 yearly.1030.a.secret_deviant.desc: "sobre a perversão de [secret_character.GetTitledFirstName|l]!"
 yearly.1030.a.secret_homosexual.desc: "sobre a luxúria de [secret_character.GetTitledFirstName|l] por [secret_character.GetWomenMen]!"
 yearly.1030.a.secret_murder_attempt.desc: "sobre a tentativa de assassinato fracassada de [secret_character.GetTitledFirstName|l] contra [secret_target.GetTitledFirstNameOrMe]!"
 yearly.1030.a.secret_cannibal.desc: "sobre o apetite por carne humana de [secret_character.GetTitledFirstName|l]!"
 yearly.1030.a.secret_lover.desc: "sobre o relacionamento carnal secreto entre [secret_character.GetTitledFirstName|l] e [secret_target.GetTitledFirstName|l]!"
 yearly.1030.a.secret_murder.desc: "![secret_character.GetTitledFirstName] estava por trás da morte prematura de [secret_target.Custom('ES_DelDela')] [secret_target.GetTitledFirstName|l]!"
 yearly.1030.a.secret_heretic.desc: "sobre os modos hereges de [secret_character.GetTitledFirstName|l]!"
 yearly.1030.a.secret_incest.desc: "sobre a relação incestuosa entre [secret_character.GetTitledFirstName|l] e um dos parentes próximos!"
 yearly.1030.a.secret_witch.desc: "que [secret_character.GetTitledFirstName|l] pratica feitiçaria!"
 yearly.1040.t: "Uma Visita Inesperada"
 yearly.1040.tumble.desc: "Chego ao [suspicious.Custom('GetChamber')] do meu querid[suspicious.Custom('ES_OA')] [suspicious.GetFirstName] sem que ninguém me veja nem me ouça. Com o coração e as entranhas ardendo de desejo, abro a porta lentamente.\n\n"
 yearly.1040.dinner.desc: "Pensando em uma noite relaxante, vou para a [suspicious.Custom('GetChamber')] de meu [ROOT.Char.Custom2('RelationToMeShort', suspicious)] [suspicious.GetFirstName] com uma garrafa de [ROOT.Char.Custom('RegionalDrink')] e [ROOT.Char.Custom('RegionalGameObject')]. Entro sem me anunciar.\n\n"
 yearly.1040.council_meeting.desc: "Mais uma vez, [suspicious.Custom('ES_ElLa')] [suspicious.GetTitledFirstName|l] se atrasa para uma reunião do conselho. Desta vez, não deixarei passar! Quando chego ao seu [suspicious.Custom('GetChamber')], não lhe concedo a cortesia de me anunciar.\n\n"
 yearly.1040.vassal_talk.desc: "Desde que meu vassal[suspicious.Custom('ES_OA')] , [suspicious.Custom('ES_ElLa')] [suspicious.GetTitledFirstName|l] chegou à corte por meu generoso convite, mal saiu de sua [suspicious.Custom('GetChamber')]. Exijo uma explicação!\n\nQuando entro,"
 yearly.1040.end.desc: "[suspicious.Custom('ES_ElLa')] [suspicious.GetTitledFirstNameNoTooltip|l] está sentad[suspicious.Custom('ES_OA')], escrevendo furiosamente. Quando limpo a garganta, ele dá um pulo de susto, enfia rapidamente um rolo de pergaminho no bolso e se vira para mim com um olhar inquieto no rosto."
 yearly.1040.a: "\"O que você está escondendo? Mostre-me imediatamente!\""
 yearly.1040.a.tt: "Vou descobrir o que [suspicious.GetTitledFirstName|l] está escondendo, seja bom ou ruim"
 yearly.1040.b: "Volte mais tarde e revire sua [suspicious.Custom('GetChamber')] em segredo."
 yearly.1040.b.success.desc: "Eu encontro o pergaminho"
 yearly.1040.b.failure.desc: "[suspicious.GetTitledFirstNameNoTooltip|l] me descobre"
 yearly.1040.c: "Respeite a privacidade."
 yearly.1041.start.desc: "Você realmente achou que eu não veria isso? “Me dê isso! Agora mesmo!”"
 yearly.1041.cross_arm.desc: "[suspicious.GetFirstNameNoTooltip] me entrega o pergaminho amassado e cruza os braços."
 yearly.1041.shivering_hand.desc: "Com uma mão trêmula, [suspicious.GetFirstNameNoTooltip] me oferece o pergaminho amassado."
 yearly.1041.middle.desc: "\n\n"
 yearly.1041.friend.desc: "Alguém aceita um convite e expressa sua alegria e empolgação por passar um tempo… comigo! Quem escreveu isso foi minha amig[secret_friend.Custom('ES_OA')], [secret_friend.GetTitledFirstName|l]!\n\n\"Era para ser uma surpresa, uma viagem divertida e relaxante para vocês dois… Agora tudo foi arruinado!"
 yearly.1041.gift.desc: "É uma carta. Há algo sobre uma transação financeira e as especificações para um [ROOT.Char.Custom('SuitableGiftItem')] personalizado com o brasão da [ROOT.Char.GetDynastyNameNoTooltip]...\n\n\"Eu queria te surpreender, te dar algo para mostrar minha gratidão. E agora tudo foi em vão!\""
 yearly.1041.feast.desc: "É uma lista de comidas e bebidas, e muitos nomes familiares, incluindo o do meu [ROOT.Char.Custom('MusicalPerformer')] favorito...\n\n\"Deveria ser uma surpresa. Pensei que seria um gesto legal organizar um banquete em sua homenagem, mas é assim que você me agradece...\""
 yearly.1041.hostile_scheme_agent_other.desc: "É uma lista de horários e lugares, coisas ouvidas e vistas. Coisas privadas... [suspicious.GetFirstNameNoTooltip] está ajudando alguém a conspirar contra m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('scheme_target'))] [scheme_target.GetFirstName]!"
 yearly.1041.hostile_scheme_agent_me.desc: "É uma lista de horários e lugares, coisas ouvidas e vistas. Coisas que eu disse e fiz! [suspicious.GetFirstNameNoTooltip] tem reportado minhas atividades, ajudando alguém a conspirar contra mim!"
 yearly.1041.secret_wicked.desc: "Bem, bem, bem. Que deliciosamente perverso. De acordo com esta carta de chantagem, [suspicious.GetFirstNameNoTooltip] [secret.Custom('SecretDescriptionThirdPerson')]!"
 yearly.1041.secret_angry.desc: "Eu leio a carta, horrorizado. É uma acusação convincente, afirmando que [suspicious.GetFirstNameNoTooltip] [secret.Custom('SecretDescriptionThirdPerson')]!"
 yearly.1041.a.good: "Eu... Eu sinto muito. Eu não fazia ideia!"
 yearly.1041.a.bad: "Prova escrita. Que atencioso."
 yearly.1041.friend.tt: "Se eu não tivesse estragado a surpresa, teria reduzido meu [stress|lE] e aumentado minha [opinion|lE] com [secret_friend.GetTitledFirstName|l]"
 yearly.1041.gift.tt: "Se eu não tivesse estragado a surpresa, teria ganho a quantia de [gold|lE]"
 yearly.1041.feast.tt: "Se eu não tivesse estragado a surpresa, teria ganho [prestige|lE]"
 yearly.1042.start.desc: "Enquanto vasculho as coisas de [suspicious.GetTitledFirstName|l] dorme como um bebê. O sedativo que coloquei em seu [suspicious.Custom('RegionalDrink')] surtou efeito! Em questão de minutos, encontro o pergaminho que me ocultou…\n\n"
 yearly.1042.friend.desc: "Alguém está aceitando um convite, expressando sua alegria e empolgação por passar um tempo… comigo! Foi escrito pelo meu amig[secret_friend.Custom('ES_OA')] á, [secret_friend.GetTitledFirstName|l]!\n\nParece que [suspicious.GetFirstNameNoTooltip] está planejando me surpreender com uma viagem junto com [secret_friend.GetFirstNameNoTooltip]!"
 yearly.1042.gift.desc: "É uma carta. Há algo sobre uma transação financeira e as especificações para um [ROOT.Char.Custom('SuitableGiftItem')] personalizado com o brasão da [ROOT.Char.GetDynastyNameNoTooltip]...\n\nParece que [suspicious.GetFirstNameNoTooltip] está planejando me surpreender com um presente!"
 yearly.1042.feast.desc: "É uma lista de comidas e bebidas, e muitos nomes familiares, incluindo o do meu [ROOT.Char.Custom('MusicalPerformer')] favorito...\n\nParece que [suspicious.GetFirstNameNoTooltip] está planejando me surpreender com um banquete realizado em minha homenagem!"
 yearly.1042.a.good: "Isso não era o que eu esperava."
 yearly.1042.good.tt: "Vou agir como se não soubesse de nada quando [suspicious.GetTitledFirstName|l] revelar a surpresa"
 yearly.1043.t: "Pego em Flagrante"
 yearly.1043.desc: "Reviro as coisas de [suspicious.Custom('ES_DelDela')] [suspicious.GetTitledFirstName|l] e sinto meu pulso acelerar. Onde está esse maldito pergaminho?\n\n“Ah... [ROOT.Char.GetFirstNameNoTooltip]? O que você está fazendo aqui?!”.\n\nMe viro e vejo [suspicious.GetFirstNameNoTooltip] saindo da cama, ainda sonolent[suspicious.Custom('ES_OA')] mas claramente indignad[suspicious.Custom('ES_OA')]. Parece que o sedativo que coloquei em sua [suspicious.Custom('RegionalDrink')] da noite não teve o efeito esperado…"
 yearly.1043.a: "Eu... estava de saída."
 yearly.1043.a.tt: "Eu não descobri o que [suspicious.GetTitledFirstName|l] estava escondendo"
 yearly.1044.t: "Um Gestoda de Apreciação"
 yearly.1044.start.desc: "Um sorriso travesso surge nos lábios. \"Sei que ultimamente tenho agido de forma estranha, e por isso peço desculpas. Mas eu tinha um bom motivo!\".\n\n"
 yearly.1044.friend.desc: "[suspicious.GetFirstNameNoTooltip] me indica que [suspicious.Custom('ES_LoLa')] me siga e me leva para fora. Montad[secret_friend.Custom('ES_OA')] em seu cavalo e trajai[secret_friend.Custom('ES_OA')] para viajar está [secret_friend.Custom('ES_ElLa')] [secret_friend.GetTitledFirstName|l]!\n\n"Organizei uma pequena viagem para vocês dois!", diz [suspicious.GetFirstNameNoTooltip] com entusiasmo. "Achei que vocês podiam usar um tempo de qualidade juntos!"."
 yearly.1044.gift.desc: "[suspicious.GetFirstNameNoTooltip] me entrega um presente cuidadosamente embrulhado, decorado com fitas coloridas. \"Eu queria te surpreender. Eu o mandei fazer sob medida, só existe um igual. Vá em frente, abra!\""
 yearly.1044.feast.desc: "[suspicious.GetFirstNameNoTooltip] me indica que [suspicious.Custom('ES_LoLa')] siga e me leva ao salão. Quando abre a porta, alguém começa a tocar uma alegre melodia. Nossa… os enfeites, o cheiro! E estão todos aqui!\n\n"É uma festa em sua homenagem! Deixe-me servir-lhe uma taça de [ROOT.Char.Custom('RegionalDrink')]!"."
 yearly.1044.a: "Obrigado, [suspicious.GetFirstNameNoTooltip]!"
 yearly.1050.t: "O Grande Duelista"
 yearly.1050.angry.desc: "[angry_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] chega com um braço enfaixado e uma fome voraz de vingança. Diz que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('heir'))] [heir.Custom('ES_ElLa')] [heir.GetTitledFirstName|l], tem estado causando estragos em todos os cantos de [title.GetNameNoTierNoTooltip].\n\n“Voss[heir.Custom('ES_OA')] [heir.Custom('GirlBoy')] se acha um[heir.Custom('ES_XA')] duelista. Ele apareceu na minha porta e me desafiou diante de todos! Não tive escolha a não ser aceitar, e esta não foi a primeira vez. Sou apenas a última vítima de uma longa lista!”."
 yearly.1050.scared.desc: "[angry_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] chega à corte com o braço enfaixado e medo no olhar. Diz que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('heir'))], [heir.Custom('ES_ElLa')] [heir.GetTitledFirstName|l], tem andado desafiando pessoas para duelos por todo [title.GetNameNoTierNoTooltip].\n\nPerdoe-me, [ROOT.Char.Custom('FormOfAddressForLiege')], mas isso precisa acabar. [heir.Custom('ES_ElLa')|U] [heir.GetTitledFirstNameNoTooltip|l] apareceu à minha porta e me desafiou, não tive escolha senão aceitar. Esta não é a primeira vez, também. Sou apenas a última de uma longa lista de vítimas!"
 yearly.1050.a: "Esses duelos cessarão imediatamente."
 yearly.1050.b: "Um passatempo perigoso. Você precisa de um instrutor."
 yearly.1050.c.failure.tt: "[heir.GetTitledFirstName] continuará desafiando pessoas para duelos"
 yearly.1050.c.success.tt: "[heir.GetTitledFirstName] não duelará mais"
 yearly.1050.c.success.wounded.tt: "[heir.GetTitledFirstName] pode ficar ferid[heir.Custom('ES_OA')]"
 yearly.1050.c.failure.wounded.tt: "Posso ficar ferid[heir.Custom('ES_OA')]"
 yearly.1050.c: "Ah! S [heir.Custom2('RelationToMeShort', ROOT.Char)] vai mostrar como se faz!"
 yearly.1050.critical_success.desc: "Eu derroto [heir.GetFirstNameNoTooltip]"
 yearly.1050.failure.desc: "Eu perco o duelo"
 yearly.1051.t: "O Duelista Retorna"
 yearly.1051.victory.desc: "Quando [heir.GetTitledFirstName|l] retorna de sua aventura, toda a corte vai ver[heir.GetHerHim]. Alguns aplaudem e gritam sua admiração, enquanto outros estão… menos impressionados.\n\nMas ninguém pode negar que [heir.GetFirstNameNoTooltip] demonstrou ser um[heir.Custom('ES_XA')] grande duelista ao derrotar um oponente após o outro."
 yearly.1051.murder.desc: "Antes de que [heir.GetTitledFirstName|l] abra a boca, já sei que deu errado. O pânico em seus olhos não é nada próprio de [heir.GetSheHe].\n\n“Por favor, [heir.Custom2('RelationToMeShort', ROOT.Char)], você tem que me ajudar. Eu não queria... [angry_vassal_2.GetSheHe|U] não devia morrer!”."
 yearly.1051.decent.desc: "[heir.GetTitledFirstName] voltou de suas aventuras como um[heir.Custom('ES_XA')] [heir.GetWomanMan] mais forte. Embora tenha perdido alguns duelos e irritado alguns dos meus vassalos, também teve sua boa dose de vitórias e ganhou uma experiência valiosa.\n\nAgora, talvez seja hora de apaziguar [angry_vassal_2.Custom('ES_AlAla')] [angry_vassal_2.GetTitledFirstName|l]."
 yearly.1051.defeat.desc: "[heir.GetTitledFirstName] retornou finalmente com o rabo entre as pernas. O/A despreocupad[heir.Custom('ES_OA')] [heir.Custom('GirlBoy')] viajou por todo o reino e desafiou um vassalo após outro, apenas para perder todos e cada um dos duelos.\n\nApós uma derrota vergonhosa nas mãos [angry_vassal_2.Custom('ES_DelDela')] [angry_vassal_2.GetTitledFirstName|l], parece que finalmente aprendeu a lição."
 yearly.1051.great_victory_end.desc: "[heir.GetFirstNameNoTooltip] até derrotou o grande campeão [angry_vassal_2.GetTitledFirstName|l]!"
 yearly.1051.regular_victory_end.desc: "Ao que parece, a vitória contra [angry_vassal_2.GetTitledFirstName|l] foi especialmente impressionante."
 yearly.1051.victorious.a: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('heir'))|U], tenho muito orgulho de você."
 yearly.1051.murder.a: "Você matou [angry_vassal_2.GetTitledFirstNameNoTooltip]?!"
 yearly.1051.decent.a: "Você vai descansar agora, [heir.GetFirstNameNoTooltip]?"
 yearly.1051.defeat.a: "Você me envergonha."
 yearly.1060.t: "A Piada Mais Antiga do Livro"
 yearly.1060.bed.desc: "[joker.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se apoia em um cotovelo, com os lábios curvados em um sorriso travesso."
 yearly.1060.dance.desc: "[joker.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se move com graça ao som da música e os olhos brilham de alegria. Quando a dança nos reúne, se aproxima de mim, sussurrando ao meu ouvido."
 yearly.1060.dinner.desc: "[joker.Custom2('MyCharacterIntroduction', ROOT.Char)|U] gira a taça de [joker.Custom('RegionalDrink')] e se inclina na minha direção com um sorriso travesso."
 yearly.1060.garden.desc: "Enquanto passeamos pelos jardins, [joker.Custom2('MyCharacterIntroduction', ROOT.Char)] se inclina na minha direção com um sorriso travesso."
 yearly.1060.ride.desc: "[joker.Custom2('MyCharacterIntroduction', ROOT.Char)|U] refreia o cavalo e lhe dá um tapinha no pescoço. Quando me olha, vejo o rubor em suas bochechas e um brilho travesso em seus olhos."
 yearly.1060.joke.desc: "\n\n"O que fica pendurado na coxa de um homem e quer enfiar no buraco que já enfiou muitas vezes antes?""
 yearly.1060.a.tt: "Eu me pergunto o que [joker.GetFirstNameNoTooltip] quer ouvir?\n"
 yearly.1060.a: "Uma chave."
 yearly.1060.charmed.message: "[joker.GetFirstNameNoTooltip] está encantad"
 yearly.1060.amused.message: "[joker.GetFirstNameNoTooltip] está divertid"
 yearly.1060.disappointed.message: "[joker.GetFirstNameNoTooltip] está desapontad"
 yearly.1060.b: "Uma espada."
 yearly.1060.c.male: "Você quer que eu mostre?"
 yearly.1060.c.female: "Talvez você pudesse me mostrar?"
 yearly.1060.very_charmed.message: "[joker.GetFirstNameNoTooltip] está muito encantad"
 yearly.1060.reveal_secret.tt: "[joker.GetTitledFirstName] saberá do meu segredo"
 yearly.1060.sex_and_maybe_lover.tt: "[joker.GetFirstNameNoTooltip] e eu passamos a noite juntos..."
 yearly.1060.sex.tt: "[joker.GetFirstNameNoTooltip] e eu nos divertimos bastante"
 yearly.1060.crude.message: "[joker.GetFirstNameNoTooltip] me acha grosseir"
 yearly.1060.d: "Eu não sei do que você está falando..."
 yearly.1060.e: "Que vulgar!"
 yearly.1070.t: "Atraído pela Chama"
 yearly.1070.start.desc: "Há algo especial em [potential_soulmate.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. Será a maneira como sorri? A inconfundível"
 yearly.1070.peal.desc: "badalada"
 yearly.1070.rumble.desc: "ronco"
 yearly.1070.middle.desc: "risada ou talvez"
 yearly.1070.benevolent.desc: "a maneira gentil com que trata a todos, nobres e plebeus por igual?"
 yearly.1070.dominant.desc: "sua vontade de ferro inabalável?"
 yearly.1070.submissive.desc: "sua maneira gentil?"
 yearly.1070.extroverted.desc: "como faz com que todas as conversas pareçam tão fáceis e agradáveis?"
 yearly.1070.introverted.desc: "a maneira como seus olhos expressam tanto, mesmo quando nenhuma palavra sai de seus lábios?"
 yearly.1070.emotional.desc: "natureza emocional e indomada?"
 yearly.1070.levelheaded.desc: "sua compostura nobre e inabalável?"
 yearly.1070.intelligent.desc: "(suas) notavelmente afiadas?"
 yearly.1070.fair.desc: "Seus traços surpreendentemente belos?"
 yearly.1070.handsome.desc: "Características majestuosamente belas?"
 yearly.1070.zealous.desc: "?[ROOT.Char.GetFaith.HighGodName]?"
 yearly.1070.fallback.desc: "seus belos olhos?"
 yearly.1070.end.desc: "\n\nNão sei definir exatamente, mas há uma coisa que eu sei com certeza: quando estou ao lado dela/deles, é difícil me concentrar em qualquer outra coisa."
 yearly.1070.a: "Expressarei meu amor eterno por [potential_soulmate.GetSheHe]!"
 yearly.1070.b: "Esse desejo não vem do coração..."
 yearly.1070.c: "Escreverei um poeminha."
 yearly.1070.d: "Recuso-me a me distrair com [potential_soulmate.GetWomanMan] qualquer[potential_soulmate.Custom('ES_OA')]!"
 yearly.1070.scheme.tt: "O [scheme|lE] terá um bônus de [success_chance|lE]"
 ### YOU ARE BEING PARANOID ###
 yearly.1080.t: "Uma Suspeita Insidiosa"
 yearly.1080.normal.desc: "Há algo estranho em [suspicious.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], mas não consigo identificar exatamente o que é. Talvez seja apenas minha imaginação correndo solta - no entanto, esse sentimento sinistro está me mantendo acordado à noite."
 yearly.1080.paranoid.desc: "Meu [suspicious.Custom2('InsultAdjective', ROOT.Char)] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('suspicious'))], [suspicious.Custom('ES_ElLa')] [suspicious.GetTitledFirstName|l], está aprontando alguma coisa, eu sei! Por que mais estaria rondando por aí desse jeito, me lançando aqueles olhares estranhos? E minhas coisas não estão onde as deixei! Será que ele esteve na minha [ROOT.Char.Custom('GetChamber')]?!\n\nSorri tão docemente, mas eu sei o que se esconde por baixo!"
 yearly.1080.a.friend: "Meu amig[investigator.Custom('ES_OA')] de confiança [investigator.GetFirstNameNoTooltip] deve investigar."
 yearly.1080.a.spymaster: "Meu che[investigator.Custom('ES_EA')] de espionagem [investigator.GetFirstNameNoTooltip] deve investigar."
 yearly.1080.a.success: "A investigação de [investigator.GetTitledFirstName|l] tem sucesso"
 yearly.1080.a.success.tt: "Se [suspicious.GetShortUIName] estiver escondendo algo, será revelado"
 yearly.1080.a.failure: "A investigação de [investigator.GetTitledFirstName|l] fracassa"
 yearly.1080.b: "Vou investigar isso imediatamente."
 yearly.1080.b.success: "Sua investigação tem sucesso"
 yearly.1080.b.failure: "Sua investigação falha"
 yearly.1080.c: "\"O que está acontecendo aqui, [suspicious.GetFirstNameNoTooltip]? Diga-me a verdade!\""
 yearly.1080.c.success: "[suspicious.GetFirstNameNoTooltip] diz a verdade"
 yearly.1080.c.failure: "[suspicious.GetFirstNameNoTooltip] nega tudo"
 yearly.1080.d: "Estou ficando paranóico..."
 yearly.1080.c.lunatic: "[suspicious.GetFirstNameNoTooltip] acalma seus medos"
 #Paranoid investigation: discovery
 yearly.1081.investigator_start.desc: "[investigator.GetTitledFirstName] descobriu provas irrefutáveis da culpa de [suspicious.GetTitledFirstName|l]."
 yearly.1081.you_start.desc: "Durante minha investigação, descobri provas irrefutáveis da culpa de [suspicious.GetTitledFirstName|l]."
 yearly.1081.murder.desc: "[suspicious.GetSheHe|U] estava planejando assassinar"
 yearly.1081.abduct.desc: "[suspicious.GetSheHe|U] estava planejando sequestrar"
 yearly.1081.seduce.desc: "[suspicious.GetSheHe|U] estava planejando seduzir"
 yearly.1081.elope.desc: "[suspicious.GetSheHe|U] estava planejando fugir com"
 yearly.1081.scheme_type_fallback.desc: "[suspicious.GetSheHe|U] estava tramando contra"
 yearly.1081.me.desc: "mim!"
 yearly.1081.my_introduction.desc: "[target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!"
 yearly.1081.agent_murder.desc: "[suspicious.GetSheHe|U] está trabalhando para alguém que está planejando assassinar"
 yearly.1081.agent_abduct.desc: "[suspicious.GetSheHe|U] está trabalhando para alguém que está planejando sequestrar"
 yearly.1081.agent_seduce.desc: "[suspicious.GetSheHe|U] está trabalhando para alguém que está planejando seduzir"
 yearly.1081.agent_elope.desc: "[suspicious.GetSheHe|U] está trabalhando para alguém que está planejando fugir com"
 yearly.1081.agent_scheme_type_fallback.desc: "[suspicious.GetSheHe|U] está trabalhando para alguém que está tramando contra"
 yearly.1081.traitor_end.desc: "\n\n[suspicious.Custom('ES_EA')] [suspicious.Custom2('InsultAdjective', ROOT.Char)] traidor[suspicious.Custom('ES_XA')] receberá o que merece!"
 yearly.1081.useful_end.desc: "\n\nMaldit[suspicious.Custom('ES_OA')] [suspicious.Custom2('InsultNoun', ROOT.Char)] escorregadi[suspicious.Custom('ES_OA')]! Com certeza esta informação me será útil."
 yearly.1081.secret.desc: "[suspicious.GetSheHe|U] [guilty_owned_secret.Custom('SecretDescriptionThirdPerson')]!"
 yearly.1081.a: "Eu sabia!"
 #Paranoid investigation: innocent
 yearly.1082.investigator_start.desc: "[investigator.GetTitledFirstName] concluiu sua investigação sobre as atividades de [suspicious.GetTitledFirstName|l] com as mãos vazias. Não encontrou nenhuma prova de atividade criminosa nem de outros atos obscuros… nem sequer rumores suspeitos!"
 yearly.1082.you_start.desc: "Me escondi nas sombras, fui a tavernas suspeitas e virei cada pedra - ainda assim, não encontrei provas condenatórias contra [suspicious.GetTitledFirstName|l]. Nem mesmo um rumor suspeito!"
 yearly.1082.normal.desc: "\n\nEmbora pareça que eu estava enganado desta vez, não foi tempo perdido. Hoje à noite, dormirei como um bebê."
 yearly.1082.paranoid.desc: "\n\nPode ser que [suspicious.GetFirstNameNoTooltip] seja inocente desta vez, mas ainda há algo em [suspicious.Custom('ES_ElElla')] que me deixa com a pulga atrás da orelha. Vou ficar de olho em , isso é certo."
 yearly.1082.a: "Melhor prevenir do que remediar!"
 yearly.1082.a.tt: "[suspicious.GetShortUIName] parece inocente"
 #Paranoid investigation: failure
 yearly.1083.investigator_start.desc: "[investigator.GetTitledFirstName] retornou de mãos vazias. "Não encontrei nenhuma prova condenatória contra [suspicious.GetTitledFirstName|l], e talvez seja de fato inocente. Mas não posso garantir — é uma pessoa muito cautelosa. [investigator.GetFaith.HighGodName|U] sabe o que pode estar escondendo"."
 yearly.1083.you_start.desc: "Em minha investigação sobre [suspicious.GetTitledFirstName|l] não descobri nada digno de menção, exceto que parece ser uma pessoa excepcionalmente cuidadosa. Sabe [ROOT.Char.GetFaith.HighGodName|U] o que pode estar escondendo."
 yearly.1083.a: "Vou manter um olho n, com certeza."
 yearly.1083.a.tt: "A investigação de [suspicious.GetShortUIName] falhou"
 #Paranoid confrontation: confession
 yearly.1084.start.desc: "Os guardas mantêm uma distância respeitável [suspicious.Custom('ES_DelDela')] [suspicious.GetTitledFirstName|l], mas estão prontos para agarrar[suspicious.GetHerHim] a qualquer momento. [suspicious.GetSheHe|U] também parece perceber isso, e lança olhares nervosos ao redor da [ROOT.Char.Custom('GetRoom')], nervios[suspicious.Custom('ES_OA')]. Está procurando uma rota de fuga?\n\nNão preciso me esforçar muito para conseguir uma confissão."
 yearly.1084.a: "Joguem[suspicious.GetHerHim] no(a) [ROOT.Char.Custom('GetDungeon')]!"
 yearly.1084.b: "Saia da minha vista, [suspicious.Custom2('InsultNoun', ROOT.Char)] traidor[suspicious.Custom('ES_OA')]!"
 #Paranoid confrontation: denial
 yearly.1085.start.desc: "Os guardas mantêm uma distância respeitosa de [suspicious.GetTitledFirstName|l] mas estão prontos para capturá-lo a qualquer momento. Ele parece estar bem ciente disso; há uma tensão incomum em seus ombros.\n\n\"Por que me mandou chamar, [ROOT.Char.Custom2('RelationToMeAddress', suspicious)]? Tem algo a me perguntar?\".\n\nA acusação escapa de minha boca como veneno, mas ao ver a expressão no rosto de [suspicious.GetFirstNameNoTooltip], a dúvida me assalta. Aquilo não é culpa,"
 yearly.1085.angry.desc: "mas raiva.\n\n\"Como você se atreve a me acusar assim? Depois de tudo o que fiz por você!\""
 yearly.1085.sad.desc: "mas tristeza.\n\n\"Sempre fui seu servo mais fiel[suspicious.Custom('ES_OA')]\", ela exclama. \"Eu jamais o trairia!\"."
 yearly.1085.a: "Você pode sair."
 yearly.1085.b: "Eu estava enganado. Você tem minhas sinceras desculpas, [suspicious.GetFirstNameNoTooltip]."
 yearly.1085.c: "#EMP Mientes!#! Guardas, joguem[suspicious.GetHerHim] na [ROOT.Char.Custom('GetDungeon')]!"
 #Paranoid confrontation: soothe
 yearly.1086.desc: "Tinha um plano, um discurso bem preparado. Mas quando vi [suspicious.GetTitledFirstName|l], meu sangue ferveu e a acusação saiu da minha boca como veneno. Para minha surpresa, [suspicious.GetFirstNameNoTooltip] não reagiu com raiva nem com lágrimas.\n\n"Ah, [ROOT.Char.Custom('ComplimentAdjective')] [suspicious.Custom2('RelationToMeShort', ROOT.Char)] de [ROOT.Char.Custom('ES_OA')], sei que você está sofrendo. Essas palavras duras não são suas. Responderei a todas as suas perguntas, e você verá que não tem nada a temer de mim"."
 yearly.1086.a: "Eu... Eu não sei o que dizer."
