l_spanish:
 #A New Hobby
 bp1_yearly.1000.t: "Um Novo Passatempo"
 bp1_yearly.1000.desc: "Meu melhor amig[friend.Custom('ES_OA')] [friend.GetTitledFirstName|l] se aproxima de mim com um grande sorriso no rosto.\n\n"Meu querido amig[ROOT.Char.Custom('ES_OA')], por fim nos vemos! Juro que ultimamente nunca passamos tempo de qualidade junt[ROOT.Char.Custom('ES_OA')]… Vamos ver, vocês estariam dispost[ROOT.Char.Custom('ES_OA')] a experimentar algo novo comigo? Sei exatamente o que fazer para distrair a mente, restaurar o corpo e levantar o ânimo!"
 bp1_yearly.1000.desc_cannibal: "\n\n\"Por que você não vem até minha casa para o jantar? Eu tenho um lote fresco de carne #EMP especial#! como você nunca provou antes - carne #EMP proibida#!, se você me entende..."
 bp1_yearly.1000.desc_deviant: "\n\n\"Você deveria se juntar a mim em minhas #EMP explorações#! à noite! Nada é mais revigorante do que encontrar prazer nas coisas pequenas... Ou #EMP grandes#!, se preferir... O que você acha de #EMP [friend.Custom('DeviantObjectPlural')]#!?"
 bp1_yearly.1000.desc_witch: "\n\nPor que vocês não vêm comigo dar um passeio noturno? Conheço todas as artes secretas para capturar a fortuna, aprisionar a morte, escravizar o amor e atrair o ouro. Eu #EMP adoraria#! ensinar tudo a vocês!"
 bp1_yearly.1000.desc_hashish: "\n\n\"Quando o estresse e as responsabilidades te oprimirem, eu tenho a receita certa para deixar todos os seus problemas para trás! Você já experimentou meus bolos #EMP especiais#!?"
 bp1_yearly.1000.desc_drunkard: "\n\n #EMP [ROOT.Char.Custom('RegionalAlcoholicDrink')|U]#!! Amig[ROOT.Char.Custom('ES_OA')] meu[ROOT.Char.Custom('ES_OA')], vamos afogar nossas mágoas! Um copo depois do outro é o melhor de todos os remédios!"
 bp1_yearly.1000.desc_reveler: "\n\n\"Uma noite inteira de festa! Comer, beber, cantar, dançar e fazer alegria; é disso que você precisa! Venha comigo!\""
 bp1_yearly.1000.desc_hunter: "\n\n\"O silêncio da floresta e a emoção da caça certamente vão te fazer se sentir melhor! Eles nunca falham comigo, e eu adoraria compartilhar essa paixão com você.\""
 bp1_yearly.1000.desc_confider: "\n\n\"Na minha experiência, nada me traz maior conforto do que compartilhar meus problemas com alguém querido. Se você já se sentir sobrecarregado, lembre-se de que sempre pode conversar comigo. Você se sentirá melhor - eu prometo!\""
 bp1_yearly.1000.desc_athletic: "\n\n\"Atividade física é sempre a resposta! Suor para fora da sua dor! Faça seus músculos gritarem tão alto que você não consiga ouvir seus próprios pensamentos! #EMP LIBERE SUA RAIVA#!! Me encontre no pátio, e eu vou te mostrar como!\""
 bp1_yearly.1000.desc_fallback_1: "\n\n"E que tal umas pescarias? A tranquilidade da natureza ao nosso redor e nada mais que um[friend.Custom('ES_OA')] mesmo[friend.Custom('ES_OA')], sua presa, boas bebidas e boa companhia…""
 bp1_yearly.1000.desc_fallback_2: "\n\n\"Que tal uma visita ao mercado local? Ver outras pessoas ocupadas enquanto você está simplesmente passeando é bastante catártico, e você pode encontrar algo agradável para comprar!\""
 bp1_yearly.1000.desc_fallback_3: "\n\n"Há um famoso menestrel ambulante na cidade, por que não vamos assistir a uma apresentação? Tenho certeza de que será bom![friend.Custom('ES_OA')]"."
 bp1_yearly.1000.a1: "Estamos pensando na mesma #EMP carne especial#!?"
 bp1_yearly.1000.a: "Claro, vou experimentar por você!"
 bp1_yearly.1000.a.tt: "[friend.GetShortUIName] te ensina todos os truques"
 bp1_yearly.1000.a.tt.2: "Truques Aprendidos!"
 bp1_yearly.1000.a.tt.3: "Você adquire o hábito"
 bp1_yearly.1000.b: "Isso não me parece #EMP muito#! atraente..."
 bp1_yearly.1000.b.tt: "Você prefere se concentrar em suas responsabilidades."
 bp1_yearly.1000.c: "Como você ousa #EMP#!!"
 #Holy Mediation
 bp1_yearly.1010.t: "Mediação Sagrada"
 bp1_yearly.1010.desc: "Ao me encontrar com meu/minha amig[friend.Custom('ES_OA')] [friend.GetTitledFirstName|l] saindo [friend.GetFaith.HouseOfWorship], fica imediatamente claro que tem algo a me dizer.\n\n"Amig[ROOT.Char.Custom('ES_OA')] minh[ROOT.Char.Custom('ES_OA')]! Tenho rezado por você desde o dia em que foi expulso da comunidade dos fiéis! Não consigo deixar de me preocupar com sua pobre alma... Eu realmente gostaria de poder ajudá-lo mais!"\n\n"Vocês me permitiriam advogar por sua causa perante [pope.Custom('ES_ElLa')] [pope.GetTitledFirstName|l]?""
 bp1_yearly.1010.a: "Por favor, tente, por minha causa..."
 bp1_yearly.1010.a.success: "[friend.GetShortUIName] persuade [pope.GetTitledFirstNameNoTooltip|l] a revogar sua excomunhão"
 bp1_yearly.1010.a.success.tt: "Excomunhão Revogada!"
 bp1_yearly.1010.a.failure: "[pope.GetTitledFirstNameNoTooltip|U] não está convencid[pope.Custom('ES_OA')]"
 bp1_yearly.1010.a.failure.tt: "[ROOT.Char.GetFaith.ReligiousHeadName|U] não Convencido"
 bp1_yearly.1010.a.horrible_failure: "[pope.GetTitledFirstNameNoTooltip|U] está ofendid"
 bp1_yearly.1010.a.horrible_failure.tt: "[ROOT.Char.GetFaith.ReligiousHeadName|U] Ofendido!"
 bp1_yearly.1010.b: "Isso não é necessário."
 #A Friend till the End
 bp1_yearly.1020.t: "Um Amigo até o Fim"
 bp1_yearly.1020.desc_intro: "Enquanto estou deitado na minha cama amaldiçoando meu corpo fraco e falhando, mal consigo distinguir a figura que se aproxima. Seus passos lentos e o pesado silêncio começam a me assustar."
 bp1_yearly.1020.desc: "\n\nEle deve adivinhar meu desconforto pelos sons tênues que saem da minha boca e pelos movimentos bruscos das minhas mãos, pois seus passos se tornam apressados, e logo uma mão quente segura a minha e um rosto familiar entra em meu campo de visão.\n\n"Calai-vos, [ROOT.Char.GetFirstNameNoTooltip], sou apenas eu, [friend.GetFirstName]. Oh, como me dói ver-vos assim... Gostaria de fazer algo, #EMP qualquer coisa#!, para aliviar vosso desconforto"."
 bp1_yearly.1020.a: "Por favor, fique comigo..."
 bp1_yearly.1020.b: "Não quero que me veja assim."
 bp1_yearly.1021.desc: "Ainda vejo todos os bons momentos que compartilhei com [friend.GetFirstName]. Agora, ao entrar no quarto pouco iluminado e ver seu corpo fraco deitado na cama, quase imóvel, sei com certeza que aqueles dias não voltarão, e sinto uma pontada de profunda tristeza.\n\n[friend.GetSheHe|U] me ouve entrar e parece se agitar, então me apresso até seu lado.\n\n"Sou eu, seu/sua querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstNameNoTooltip]! Estou aqui.""
 bp1_yearly.1021.desc_bestie: "\n\nPor um momento, [friend.GetFirstNameNoTooltip] parece me reconhecer, e faz um gesto para eu me aproximar."
 bp1_yearly.1021.desc_token: ""Pegue... isto...", murmura. Aceno e pego o que me oferece. Juro a mim mesmo guardar isso com carinho em memória de [friend.GetFirstNameNoTooltip]."
 1021_trinket_desc: "[new_trinket.GetDesc]\n\n[bestie.GetTitledFirstNameNoTooltip|U] o passou para seu melhor amig[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitledFirstNameNoTooltip|l] em seu leito de morte"
 bp1_yearly.1021.desc_secret: ""Há algo... que nunca te contei...", sussurra em meu ouvido. Meus olhos se arregalam ao saber a verdade."
 bp1_yearly.1021.desc_misery: ""Por favor, me liberte…", murmura."
 bp1_yearly.1021.desc_end: "É apenas um momento fugaz. Depois, os olhos de [friend.GetFirstNameNoTooltip] se perdem no infinito novamente."
 bp1_yearly.1021.a: "Vou ficar ao seu lado."
 bp1_yearly.1021.b: "Não posso te ver assim. Me perdoe."
 bp1_yearly.1021.c: "Descanse em paz, meu querid[friend.Custom('ES_OA')] [friend.GetFirstNameNoTooltip]."
 #Till the Bitter End
 bp1_yearly.1030.t: "Até o Amargo Fim"
 bp1_yearly.1030.desc: "\n\n"HA! Olhem para vocês agora! Já não são tão assustadores, não é? Será que ao menos me reconhecem, seu [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('rival'))] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('rival'))]? Sou eu, [rival.GetFirstName]! Ah, há tanto tempo anseio vê-los tão rebaixad[ROOT.Char.Custom('ES_OA')]!"."
 bp1_yearly.1030.desc_nemesis: "\n\n"Não, eu não vim", replica. Nem sequer consigo perceber o brilho perigoso nos olhos dele antes que [nemesis.GetFirstNameNoTooltip] esteja junto ao meu leito, com um sorriso gélido no rosto."
 bp1_yearly.1030.desc_nemesis_guard: "Já havia perdido toda a esperança quando meu [GetCourtPositionType('bodyguard_court_position').GetName()] [guard.GetFirstName] irrompeu no quarto!"
 bp1_yearly.1030.desc_nemesis_no_guard: "Tento me mover, escapar, gritar, #EMP qualquer coisa#!, mas meu corpo frágil há muito tempo parou de me ouvir..."
 bp1_yearly.1030.desc_rival: "\n\nSua risada amarga traz à tona algumas lembranças desagradáveis em minha mente, mas uma névoa opaca logo as envolve novamente. Nem consigo lembrar por que nos odiávamos tanto."
 bp1_yearly.1030.a: "Sabe de uma coisa? #EMP Eu te perdoo#!."
 bp1_yearly.1030.b: "#EMP APENAS SAIA!#!"
 bp1_yearly.1030.c: "...#EMP socorro#!..."
 bp1_yearly.1030.c_saved_guard: "[guard.GetShortUIName] mata o assassino em potencial"
 bp1_yearly.1030.c_saved_guard.tt: "[guard.GetShortUIName] te salvou!"
 bp1_yearly.1030.c_barely_saved_guard: "[guard.GetShortUIName] mal consegue te salvar"
 bp1_yearly.1030.c_barely_saved_guard.tt: "[guard.GetShortUIName] mal conseguiu te salvar!"
 bp1_yearly.1030.c_killed_guard: "[guard.GetShortUIName] te salva, mas morre"
 bp1_yearly.1030.c_killed_guard.tt: "[guard.GetShortUIName] te salvou, mas morreu!"
 bp1_yearly.1030.c_killed_all: "Você e seu [GetCourtPositionType('bodyguard_court_position').GetName()] são assassinados"
 bp1_yearly.1030.c_saved: "Você consegue se defender do atacante"
 bp1_yearly.1030.c_saved.tt: "Você se defendeu do atacante!"
 bp1_yearly.1030.c_killed: "Você é morto"
 bp1_yearly.1031.desc: "Desde que recebi a notícia da doença de [rival.GetTitledFirstName|l], não consegui encontrar paz. Só precisava ver[rival.GetHerHim] com meus próprios olhos. Agora que estou aqui, vendo seu corpo fraco jazer quase imóvel naquela cama, agarrando-se desesperadamente à vida com qualquer resquício de força, sinto-me dominad[ROOT.Char.Custom('ES_OA')] por emoções contraditórias."
 bp1_yearly.1031.desc_nemesis: "\n\nNão seria mais fácil simplesmente deixar ir toda a dor e a raiva? E, no entanto, [nemesis.GetFirstNameNoTooltip] nunca esteve tão fraco, ou tão exposto… Frágil o bastante para que eu pudesse #EMP partir[nemesis.GetHerHim]#! com as próprias mãos…"
 bp1_yearly.1031.desc_rival: "\n\n"Você ao menos me reconheceu, seu [rival.Custom2('InsultNoun', ROOT.Char)] [rival.Custom2('InsultAdjective', ROOT.Char)]?". Seu rosto parece se contrair por um instante, e seus olhos se movem como se procurassem por algo, mas sem jamais se fixarem em mim."
 bp1_yearly.1031.desc_guard: "Enquanto me perco em minhas divagações, reparo nos olhos frios do [GetCourtPositionType('bodyguard_court_position').GetName()] de [nemesis.GetFirstNameNoTooltip] , [guard.GetTitledFirstName|l], que me observa fixamente de um canto da alcova."
 bp1_yearly.1031.a: "Tudo isso parece tão sem sentido agora, não é?"
 bp1_yearly.1031.b: "Você conseguiu o que merecia."
 bp1_yearly.1031.c: "#EMP Tão... tão... fraco...#!"
 bp1_yearly.1031.c.tt: "Mas primeiro terei que me livrar do guarda!"
 bp1_yearly.1031.c_killed_all: "Você mata [nemesis.GetShortUIName] e a seu [GetCourtPositionType('bodyguard_court_position').GetName()] [guard.GetShortUIName]"
 bp1_yearly.1031.c_killed_all.tt: "Você conseguiu!"
 bp1_yearly.1031.c_killed_guard: "Você só fere [nemesis.GetShortUIName], mas mata [guard.GetShortUIName]"
 bp1_yearly.1031.c_failed.tt: "Você falhou na tentativa de assassinato!"
 bp1_yearly.1031.c_barely_saved_guard: "Você só fere [nemesis.GetShortUIName] e [guard.GetShortUIName]"
 bp1_yearly.1031.c_saved_guard: "[guard.GetShortUIName] te mata"
 bp1_yearly.1031.c_killed: "Você mata [nemesis.GetShortUIName]"
 bp1_yearly.1031.c_saved: "[nemesis.GetShortUIName] consegue se defender de você"
 #Something in Common
 bp1_yearly.1040.t: "Algo em Comum"
 bp1_yearly.1040.desc: "Estou felizmente de molho na casa de banhos, compartilhando reflexões profundas e piadas salaces com [new_friend.GetTitledFirstName|l]. À medida que sinto toda a tensão sair do meu corpo, percebo que não é só a água quente que relaxa meus músculos.\n\nEstou me divertindo de verdade! E tudo graças à companhia de [new_friend.GetFirstNameNoTooltip]."
 bp1_yearly.1040.desc_best_friend: "[new_friend.GetHerHim|U] já fazia parte dos meus amigos, mas percebi que fico realmente ansioso pelo tempo que passamos junt[ROOT.Char.Custom('ES_OA')] s, valorizo sua opinião acima de todas as outras e cada momento com [new_friend.GetSheHe] está cheio de risos e calor humano.\n\nSerá que [new_friend.GetFirstNameNoTooltip] se tornou meu/minha #EMP melhor amig[new_friend.Custom('ES_OA')]#!?"
 bp1_yearly.1040.desc_friend: "Até descobrirmos nossa paixão em comum pelas casas de banho, não tivemos nenhuma chance de realmente interagir ou nos conhecer tão bem. Agora, aguardo ansiosamente nossos encontros regulares lá, pois eles sempre são repletos de risos e alegria.\n\nNos tornamos #EMP amig[new_friend.Custom('ES_OA')] s#! de verdade?"
 bp1_yearly.1040.a: "Com certeza! Um brinde por [new_friend.GetFirstNameNoTooltip]!"
 bp1_yearly.1040.b: "Ou talvez algo #EMP mais#!?"
 bp1_yearly.1040.b.tt: "Todo mundo sabe que os melhores relacionamentos são baseados em verdadeira amizade!"
 bp1_yearly.1040.c: "Também não gosto #EMP tanto#!…"
 #Annoying Company
 bp1_yearly.1050.t: "Companhia Irritante"
 bp1_yearly.1050.desc: "Estou confortavelmente de molho na casa de banhos, enfim desfrutando um descanso merecido, quando uma voz estridente vinda de algum lugar próximo interrompe meus pensamentos serenos.\n\n"Vistes seu...? E aquele #EMP ridiculamente#! escasso...?" Um pouco mais ao fundo da sala, vejo [new_rival.GetTitledFirstName|l] fazer gestos obscenos, rodead[new_rival.Custom('ES_OA')] de uma multidão de aduladores que riem. É difícil não notar que todos me encaram."
 bp1_yearly.1050.desc_nemesis: "\n\nCHEGA!! Estou de saco cheio dessas besteiras! [new_rival.GetFirstNameNoTooltip] tem me importunado por tempo demais, e agora também está tentando arruinar meu banho?! Nunca conheci um[new_rival.Custom('ES_XA')] [new_rival.Custom2('InsultNoun', ROOT.Char)] tão [new_rival.Custom2('InsultAdjective', ROOT.Char)] quanto [new_rival.GetSheHe]! MALDIÇÃO, [new_rival.GetFirstNameNoTooltip]!"
 bp1_yearly.1050.desc_rival: "\n\nMal conheço [new_rival.GetHerHim] e já [new_rival.GetHerHim] o odeio. Como #EMP osa#! [new_rival.GetFirstNameNoTooltip] ridicularizar-me em público?! Não esquecerei este desdém…"
 bp1_yearly.1050.a: "Pagará por isso."
 bp1_yearly.1050.b: "Quero que ele morra. #EMP AHORA#!."
 bp1_yearly.1050.c: "Eu provavelmente estou exagerando..."
 #A Superstitious Mind
 bp1_yearly.1060.t: "Mente Supersticiosa"
 bp1_yearly.1060.desc: "Da última vez que vi [friend.GetTitledFirstName|l], [friend.GetSheHe] estava se desfazendo às escondidas do meu chapéu amarelo porque "amarelo é uma cor de má sorte para pessoas da minha data de nascimento". Da vez anterior, tive de acompanhar[friend.GetHerHim] dando um desvio ridiculamente longo para evitar um gato preto dormindo. "Dá azar!", disse. E nem quero me lembrar de quando #EMP achou#! que havia perdido seu amuleto da sorte!\n\nNo entanto, ao vê-l[friend.Custom('ES_OA')] jogando fora metade do meu jantar por superstição, começo a me preocupar."
 bp1_yearly.1060.a: "E se tudo isso for #EMP verdadeiro#!?"
 bp1_yearly.1060.b: "Deixe-me mostrar o erro em seus caminhos."
 bp1_yearly.1060.b_persuaded: "Você persuade [friend.GetShortUIName] a abandonar suas superstições"
 bp1_yearly.1060.b_persuaded.tt: "[friend.GetShortUIName] persuadid[friend.Custom('ES_OA')]!"
 bp1_yearly.1060.b_not_persuaded: "[friend.GetShortUIName] não se impressiona com seus argumentos"
 bp1_yearly.1060.b_not_persuaded.tt: "[friend.GetShortUIName] não persuadid[friend.Custom('ES_OA')]!"
 bp1_yearly.1060.b_you_persuaded: "[friend.GetShortUIName] vira o jogo e te persuade"
 bp1_yearly.1060.b_you_persuaded.tt: "[friend.GetShortUIName] mudou sua mente!"
 bp1_yearly.1060.c: "#EMP Crenças blasfemas!#!"
 bp1_yearly.1060.d: "Bobagem!"
 #Bad Luck, X!
 bp1_yearly.1070.t: "Má Sorte, [rival.GetFirstNameNoTooltip]!"
 bp1_yearly.1070.desc: "Não me passou despercebido que [rival.Custom('ES_ElLa')] desprezível [rival.GetTitledFirstName|l] é uma pessoa muito supersticiosa. Teme tudo o que traz azar: dias, cores, animais, até árvores! Divisar a sombra da ave errada no momento errado pode fazer com que entre em uma espiral de pânico por dias.\n\nEnquanto uma observância estrita de seus rituais parece lhe trazer uma sensação inconmensurável de segurança, um desvio mínimo deles poderia ter efeitos imprevisivelmente grandes sobre sua tranquilidade, efeitos de que eu poderia me aproveitar..."
 bp1_yearly.1070.a: "As possibilidades são realmente infinitas..."
 bp1_yearly.1070.a.tt: "Esse esquema ganha chances extras de sucesso."
 bp1_yearly.1070.c: "![rival.GetHerHim|U] vou mexer com a cabeça de [rival.Custom('ES_OA')]!"
 bp1_yearly.1070.d: "Não vou me rebaixar tão baixo."
 #Dear Father, ...
 bp1_yearly.1080.opening: "[relative.Custom2('AppropriateGreeting', ROOT.Char)]"
 bp1_yearly.1080.desc: "Desde que fui dada em casamento a [spouse.Custom('ES_ElLa')] vil [spouse.GetTitledFirstName|l], meus dias têm sido preenchidos apenas com miséria."
 bp1_yearly.1080.intoxicated: "[spouse.GetSheHe|U] está constantemente embriagad[spouse.Custom('ES_OA')] e mal consegue estar presente para si mesm[spouse.Custom('ES_OA')]."
 bp1_yearly.1080.sexuality: "[spouse.GetSheHe|U] não esconde suas insaciáveis necessidades sexuais. Coro só de pensar nas muitas escapadas!"
 bp1_yearly.1080.violence: "[spouse.GetSheHe|U] parece se deleitar muito com o sofrimento alheio. Até mesmo seus súditos estão aterrorizados. Temo por minha segurança aqui."
 bp1_yearly.1080.reclusive: "[spouse.GetSheHe|U] abomina a companhia humana, foge de suas responsabilidades e me abandona também. Sinto como se estivesse casado com um fantasma."
 bp1_yearly.1080.profligate: "Seus hábitos de gasto não têm medida nem razão, o reino está perpetuamente à beira da falência e vivemos em uma pobreza indigna!"
 bp1_yearly.1080.fallback: "Temo que não conseguirei tolerar por muito mais tempo a personalidade desagradável e os hábitos repugnantes…"
 bp1_yearly.1080.ending: "Por favor, não se esqueçam de seu[relative.Custom('ES_OA')] dedicad[relative.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('relative'))]."
 bp1_yearly.1080.a: "Isso é #EMP ultrajante#!"
 bp1_yearly.1080.a.success: "Você consegue levar [relative.GetShortUIName] de volta para casa"
 bp1_yearly.1080.a.failure: "[relative.GetShortUIName] falha em escapar"
 bp1_yearly.1080.a.failure.tt: "A fuga de [relative.GetFirstNameNoTooltip] fracassa"
 bp1_yearly.1080.b: "Não podemos colocar uma aliança em risco por causa disso."
 bp1_yearly.1080.c: "Por favor, seja paciente..."
 bp1_yearly.1080.d: "IMPERDOÁVEL!"
 bp1_yearly.1080.d.success: "Você persuade [spouse.GetShortUIName] a deixar [relative.GetShortUIName] partir"
 bp1_yearly.1080.d.failure: "[spouse.GetShortUIName] ignora seus pedidos"
 bp1_yearly.1080.d.failure.tt: "[relative.GetFirstNameNoTooltip] não foi Liberad"
 bp1_yearly.1081.t: "Bem-Vindo de Volta!"
 bp1_yearly.1081.desc: "Mal posso acreditar no que meus olhos veem quando trazem de volta ao meu querid[relative.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('relative'))], [relative.Custom('ES_ElLa')] [relative.GetTitledFirstName|l], finalmente ao meu [ROOT.Char.Custom('GetRoom')]. Meu plano deu certo, e ela finalmente se livrou das garras desse [spouse.Custom2('InsultNoun', ROOT.Char)] [spouse.Custom2('InsultAdjective', ROOT.Char)], [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l]!\n\nEnquanto faço um gesto para que se junte a mim junto à lareira, me ocorre que eles ainda são casados... Fico pensando se há mais alguma coisa que eu possa fazer a respeito, ou se devo me contentar em ver[relative.GetHerHim] [Select_CString(relative.IsFemale, 'sana y salva', 'sano y salvo' )] ao meu lado novamente."
 bp1_yearly.1081.a: "Vamos conseguir o divórcio para você, #EMP agora#!."
 bp1_yearly.1081.b: "Me conte tudo sobre suas desventuras..."
 bp1_yearly.1081.c: "#EMP Até que a morte nos separe#!, você disse...?"
 bp1_yearly.1082.desc: "Recentemente, descobri que meu [spouse.GetWifeHusband] [spouse.GetFirstName] — ess[spouse.Custom('ES_EA')] [spouse.Custom2('InsultNoun', SCOPE.sC('relative'))] [spouse.Custom2('InsultAdjective', SCOPE.sC('relative'))] — tinha outro segredo sujo! Não esqueci que você tentou me ajudar a escapar do meu casamento infeliz; como prova da minha gratidão, decidi compartilhá-lo com você. Não é muito, mas espero que seja útil para você."
 bp1_yearly.1082.a: "Excelente..."
