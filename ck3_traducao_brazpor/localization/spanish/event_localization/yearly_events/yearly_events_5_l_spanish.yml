l_spanish:
 yearly.5001.t: "Um Encontro Desafortunado"
 yearly.5001.duelling.desc: "O eco repentino de duas vozes familiares chama minha atenção, levando-me aos aposentos de minha [bickering_spouse.GetWifeHusband].\n\nQuando chego, fico surpreso ao ver [bickering_spouse.GetFirstName], meu [bickering_spouse.GetWifeHusband], discutindo acaloradamente com meu amante, [bickering_lover.GetFirstName]. Ao me ver, [bickering_attacker.GetFirstNameNoTooltip] rapidamente saca sua arma e a balança contra [bickering_defender.GetFirstNameNoTooltip],"
 yearly.5001.backstabbing.desc: "Estou prestes a sair da sala de jantar e voltar aos meus aposentos quando vejo meu amante [bickering_lover.GetFirstNameNoTooltip] conversando com meu [bickering_spouse.GetWifeHusband] em um canto isolado. [bickering_defender.GetFirstName] se vira para me cumprimentar, expondo-se sem querer a [bickering_attacker.GetFirstName],"
 yearly.5001.duelling.attackerwins.desc: "quem [bickering_loser.Custom('ES_LoLa')] acerta e [bickering_loser.Custom('ES_LoLa')] mata, deixando-o sangrar no chão, morto."
 yearly.5001.backstabbing.attackerwins.desc: "que rapidamente aproveita a distração de seu rival para cravar uma adaga nos pulmões."
 yearly.5001.duelling.defenderwins.desc: "mas vê como seu rival bloqueia o golpe no último segundo, [bickering_loser.Custom('ES_LoLa')] o repele e depois [bickering_loser.Custom('ES_LoLa')] o perfura com sua própria arma."
 yearly.5001.backstabbing.defenderwins.desc: "mas, talvez percebendo o perigo que se aproximava, se vira instantaneamente para [bickering_loser.GetFirstNameNoTooltip] torcendo-lhe o pulso e cravando-lhe sua própria adaga."
 yearly.5001.lover.epilogue.desc: "\n\n'Fiz isso por nós', alega [bickering_winner.GetFirstNameNoTooltip], lançando-me um olhar com um toque de arrependimento. 'Para que possamos ficar juntos.'"
 yearly.5001.spouse.epilogue.desc: "\n\n'Precisava acontecer', alega [bickering_winner.GetFirstNameNoTooltip], lançando-me um olhar com um toque de arrependimento. 'Você trouxe isso para nós.'"
 yearly.5001.a.a.spouse: "Sinto muito profundamente... Você tinha todo o direito."
 yearly.5001.a.a.lover: "E mesmo assim, gostaria que não tivesse chegado a isso..."
 yearly.5001.a.b.spouse: "Você fez seu ponto, [bickering_spouse.GetWifeHusband]. Agora, vamos deixar isso para trás."
 yearly.5001.a.b.lover: "Você fez seu ponto. Agora, vamos deixar isso para trás."
 yearly.5001.a.c.spouse: "Apenas espero que eu possa encontrar em meu coração o perdão."
 yearly.5001.a.c.lover: "Talvez realmente tenha sido a única maneira..."
 yearly.5001.b: "Como você pôde?! Desapareça, antes que eu o jogue na masmorra."
 yearly.5001.c: "Não vou esquecer disso, [bickering_winner.GetFirstNameNoTooltip]."
 yearly.5001.d: "Não. Todo o reino saberá de seu crime traiçoeiro!"
 yearly.5001.e: "Você está certo! Nada mais está entre nós agora!"
 yearly.5001.f: "A Corte saberá o que [bickering_loser.GetFirstNameNoTooltip] tentou fazer com você."
 yearly.5001.g: "Não posso deixar esse crime impune. Guardas!"
 yearly.5001.i: "Nunca soube que você poderia ser tão cruel... Eu adoro isso!"
 yearly.5002.t: "Velhos Arrependimentos"
 yearly.5002.spouse.desc: "Já se passaram meses מאז que entreguei [bickering_loser.GetFirstName] ao julgamento de [ROOT.Char.GetFaith.HighGodName], limpando assim o nome da minha família e corrigindo as tendências adúlteras do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('scoped_ruler'))]. E, no entanto, o rosto fantasmagórico do meu rival ainda assombra minhas noites, roubando-me o sono dos justos…"
 yearly.5002.lover.desc: "Já se passaram meses desde que livrei deste mundo o cruel carcereiro de meu amado, para que pudéssemos viver livres de sua tirania nupcial. E, ainda assim, o semblante espectral de meu rival continua a assombrar minhas noites, atormentando-me além-túmulo..."
 yearly.5002.forgiven.desc: "\n\nApesar de [scoped_ruler.GetFirstName] me assegurar que não guarda rancor de mim por minhas ações, a culpa me domina."
 yearly.5002.unforgiven.desc: "\n\nA fria indiferença de [scoped_ruler.GetFirstName] aos meus apuros só piorou as coisas, enchendo meu coração de remorso por meu ato violento."
 yearly.5002.a: "Se ao menos [scoped_ruler.GetFirstNameNoTooltip] pudesse me ajudar..."
 yearly.5002.b: "Apenas [ROOT.GetCharacter.GetFaith.HighGodName] pode me conceder paz!"
 yearly.5002.c: "[bickering_loser.GetSheHe|U] só deixará de me atormentar quando eu compartilhar o destino dela."
 yearly.5003.spouse.desc: "Meu [bickering_winner.GetWifeHusband] [bickering_winner.GetFirstName] não é o/a mesm[bickering_winner.Custom('ES_OA')] desde seu último e infeliz encontro com meu amado. Afirma que o espírito vingativo de [bickering_loser.GetFirstName] [bickering_winner.GetHerHim] o atormenta desde aquele dia fatídico."
 yearly.5003.lover.desc: "[bickering_winner.GetFirstName] no es el/la mism[bickering_winner.Custom('ES_OA')] desde su último y desgraciado encuentro con [bickering_loser.GetFirstName]. Afirma que el espíritu vengativo de [bickering_loser.GetFirstNameNoTooltip] [bickering_winner.GetHerHim] atormenta desde aquel fatídico día."
 yearly.5003.forgiven.desc: "\n\nTeme que a terrível lembrança de seu crime secreto consuma sua mente e alma."
 yearly.5003.unforgiven.desc: "\n\n[bickering_winner.GetFirstName] implora que [bickering_winner.Custom('ES_LoLa')] me perdoe pelo terrível crime que cometeu em meu nome, cert[bickering_winner.Custom('ES_OA')] de que minha absolvição é a única coisa que pode salvar sua mente e alma."
 yearly.5003.a: "Muito bem, [bickering_winner.GetFirstNameNoTooltip]. Eu perdoo você."
 yearly.5003.b.forgiven: "Não há mais nada que eu possa fazer por você, receio."
 yearly.5003.b.forgotten: "Sinto muito, mas não posso fazer isso."
 yearly.5003.b.callous: "Você poderia parar de desperdiçar meu tempo com suas ilusões?"
 yearly.5003.c: "? exatamente o que um[bickering_winner.Custom('ES_XA')] vil assassin[bickering_winner.Custom('ES_OA')] como voc? merece."
 yearly.5004.desc: "[scoped_ruler.GetFirstName] finalmente me concedeu seu perdão, e com isso, encontrei paz mais uma vez. O fantasma de [bickering_loser.GetFirstName] foi exorcizado de meus sonhos de uma vez por todas."
 yearly.5004.a: "E logo sua lembrança também desaparecerá…"
 yearly.5005.desc: "Foi uma tolice esperar que [scoped_ruler.GetFirstName] me ajudasse. Sempre foi uma pessoa mesquinha e cruel. Rejeitou meu pedido e zombou da minha fraqueza, afirmando que mereço tudo o que está acontecendo comigo."
 yearly.5005.a: "Por que eu já me importei com esse monstro?"
 yearly.5006.epilogue.desc: "Incapaz de enfrentar a culpa de suas ações, [bickering_winner.GetFirstName] decidiu renunciar aos assuntos mundanos e dedicar sua vida a [bickering_winner.GetFaith.HighGodName]."
 yearly.5006.b.forgiven: "Vá em paz, então, se é isso que deseja."
 yearly.5006.b.upset: "Como você pôde fazer isso comigo?!"
 yearly.5006.b.default: "Entendo..."
 yearly.5007.t: "Noites Monótonas"
 yearly.5007.desc: "Nas últimas semanas, tenho pensado com frequência no meu último encontro com [bickering_loser.GetFirstName] e em quanto tempo se passou desde que a vida ganhou sentido, quando tive o sangue dele aquecendo minha pele.\n\n[scoped_ruler.GetFirstName] também parece sentir o mesmo: nunca estivemos tão próximos quanto quando compartilhamos a emoção íntima do assassinato, mas agora estamos nos afastando lentamente…"
 yearly.5007.a: "Talvez seja hora de reacender as chamas."
 yearly.5007.a.tt: "[bickering_winner.GetFirstName] será mais propenso a se juntar aos meus Esquemas de Assassinato."
 yearly.5007.b: "Acho que já fiz o suficiente."
 yearly.5008.desc: "Nas últimas semanas, tenho pensado muitas vezes no meu querido [bickering_loser.GetFirstName] e em sua morte prematura pelas mãos de [bickering_winner.GetFirstName]. Nunca me senti tão unid[ROOT.Char.Custom('ES_OA')] a meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('bickering_winner'))] como quando compartilhamos a emoção íntima do assassinato. O mais intrigante é que [bickering_winner.GetSheHe] parece tão interessad[bickering_winner.Custom('ES_OA')] quanto eu em reviver aquele momento inesquecível e reacender as chamas do nosso amor."
 yearly.5008.a: "Desta vez, eu escolherei a vítima!"
 yearly.5008.b: "Não, enjoei desse jogo."
 yearly.5009.desc: "Proposta Rejeitada"
 yearly.5010.t: "Discórdia Compassiva"
 yearly.5010.desc: "Conmovid[bickering_vassal_1.Custom('ES_OA')] por mis tribulaciones, [bickering_vassal_1.GetTitledFirstName|l] me ha ofrecido consejo y ayuda en muchas ocasiones, esperando aliviar la carga de mis deberes.\n\nSin embargo, sus atenciones han provocado la ira de [bickering_vassal_2.GetTitledFirstName|l]. «¡No podéis confiar en [bickering_vassal_1.GetFirstNameNoTooltip]! Es solo un truco para aprovecharse de vos»."
 yearly.5010.a: "Só confiarei naqueles que merecem."
 yearly.5010.b: "Os três de nós não podem encontrar um terreno comum?"
 yearly.5010.midwaysuccess.desc: "Consegui resolver algumas das discordâncias entre [bickering_vassal_1.GetTitledFirstName|l] e [bickering_vassal_2.GetTitledFirstName|l]."
 yearly.5010.midwayfail.desc: "Não consegui resolver as diferenças entre [bickering_vassal_1.GetTitledFirstName|l] e [bickering_vassal_2.GetTitledFirstName|l]."
 yearly.5010.midwaycritfail.desc: "Minha tentativa de fazer [bickering_vassal_1.GetTitledFirstName|l] e [bickering_vassal_2.GetTitledFirstName|l] deixarem de lado suas diferenças só resultou em ambos os vassalos ficando zangados comigo também."
 yearly.5010.c: "Vou prestar atenção ao seu aviso, [bickering_vassal_2.GetFirstNameNoTooltip]."
 yearly.5010.d: "Então, defenda a honra do seu [ROOT.Char.GetTitleTierName]!"
 yearly.5010.deceitfail.desc: "Não consegui enganar [bickering_vassal_2.GetTitledFirstName|l] para duelas com [bickering_vassal_1.GetTitledFirstName|l]."
 yearly.5011.desc: "Não foi preciso muito para transformar o desprezo entre [bickering_vassal_1.GetFirstName] e [bickering_vassal_2.GetFirstName] em hostilidade aberta. Trocam insultos até que [bickering_vassal_2.GetFirstNameNoTooltip] finalmente ergue sua [bickering_vassal_2.Custom('signature_weapon')] contra [bickering_vassal_1.GetFirstNameNoTooltip], que responde na mesma moeda.\n\nApós uma breve troca de golpes, [bickering_vassal_winner.GetTitledFirstNameNoTooltip|l] sai vitorioso, enquanto seu oponente fica sangrando no chão."
 yearly.5011.a.new: "Nunca percebi o quão dedicado você é a mim, [bickering_vassal_winner.GetFirstNameNoTooltip]..."
 yearly.5011.b.new: "As ações falam mais alto do que as palavras, parece."
 yearly.5011.b.old: "O que eu faria sem você, [bickering_vassal_winner.GetFirstNameNoTooltip]?"
 yearly.5011.c: "Por que você teve que me incomodar com todo esse problema, [bickering_vassal_winner.GetFirstNameNoTooltip]?"
 tooltip.5010.d.vassalsfight: "Eu consegui provocar os dois vassalos a lutarem entre si"
 tooltip.5010.d.vassalsfightfail: "[bickering_vassal_2.GetFirstName] se recusa a ser arrastado para uma luta"
 tooltip.5010.b.success: "Eu consegui reconciliar os dois vassalos"
 tooltip.5010.b.fail: "Eu falhei em reconciliar os dois vassalos"
 tooltip.5010.b.critfail: "Eu irritei os dois vassalos"
 tooltip.5010.d.vassalsfight.effect: "[bickering_vassal_2.GetFirstName] desafia [bickering_vassal_1.GetFirstName] para um duelo até a morte!"
 yearly.5020.t: "Sobre a Tutela"
 yearly.5020.opening: "[helpful_councillor.Custom2('AppropriateGreeting', ROOT.Char)]"
 yearly.5020.intro.desc: "Vos[scoped_heir.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scoped_heir'))] [scoped_heir.GetFirstName] se interessou muito ultimamente pelo meu trabalho como [helpful_councillor.Custom('CouncilPosition')]. Se me concederdes a graça de passar algum tempo com"
 yearly.5020.older.desc: "o/a jovem, certamente aprenderia um punhado de coisas"
 yearly.5020.younger.desc: "[scoped_heir.GetSheHe] certamente aprenderá muitas coisas"
 yearly.5020.chancellor.desc: "sobre política, etiqueta e diplomacia."
 yearly.5020.marshal.desc: "sobre o treinamento de tropas, planejamento de cercos e outros assuntos relacionados à guerra."
 yearly.5020.steward.desc: "sobre fazer cálculos e administrar terras e riquezas."
 yearly.5020.spymaster.desc: "sobre ser discreto e adquirir informações obscuras."
 yearly.5020.court_chaplain.desc: "sobre a história de nosso reino e as tradições de nosso povo."
 yearly.5020.kurultai.desc: "sobre a arquearia montada e os modos de pastoreio das estepes."
 yearly.5020.a: "Contanto que você saiba o que está fazendo..."
 yearly.5020.a.e.tt: "[helpful_councillor.GetFirstNameNoTooltip] ensinará a [scoped_heir.GetFirstNameNoTooltip] sobre suas responsabilidades como [helpful_councillor.GetCouncilTitle]"
 yearly.5020.b.a: "O futuro de [scoped_heir.GetFirstName] não lhe diz respeito."
 yearly.5020.b.b: "Prefiro ensiná-l@ pessoalmente!"
 yearly.5020.c: "Veremos se você está falando a verdade primeiro!"
 tooltip.5020.c.success: "Descubro os motivos dele para educar a [scoped_heir.GetFirstNameNoTooltip]"
 tooltip.5020.c.success.effect: "A tutoria continua sem interrupções"
 tooltip.5020.c.fail: "As razões de se educar [scoped_heir.GetFirstNameNoTooltip]"
 tooltip.5020.c.fail.effect: "Talvez eu tenha que tomar medidas"
 tooltip.5020.c.critfail: "[helpful_councillor.GetFirstNameNoTooltip] descobre que tentei espioná-l[helpful_councillor.Custom('ES_OA')]"
 tooltip.5020.c.critfail.effect: "[helpful_councillor.GetFirstName] se sente insultad[helpful_councillor.Custom('ES_OA')] e para de orientar [scoped_heir.GetFirstName]"
 yearly.5020.ruler.diplomacy.tt: "Você tenta melhorar a [diplomacy|lE] de [scoped_heir.GetFirstName]"
 yearly.5020.ruler.martial.tt: "Você tenta melhorar a [Concept( 'martial', 'marcialidad' )|E] de [scoped_heir.GetFirstName]"
 yearly.5020.ruler.stewardship.tt: "Você tenta melhorar a [stewardship|lE] de [scoped_heir.GetFirstName]"
 yearly.5020.ruler.intrigue.tt: "Você tenta melhorar a [intrigue|lE] de [scoped_heir.GetFirstName]"
 yearly.5020.ruler.learning.tt: "Você tenta melhorar o [learning|lE] de [scoped_heir.GetFirstName]"
 yearly.5020.councillor.diplomacy.tt: "[helpful_councillor.GetFirstName] melhorará a [diplomacy|lE] de [scoped_heir.GetFirstName]"
 yearly.5020.councillor.martial.tt: "[helpful_councillor.GetFirstName] melhorará a [Concept( 'martial', 'marcialidad' )|E] de [scoped_heir.GetFirstName]"
 yearly.5020.councillor.stewardship.tt: "[helpful_councillor.GetFirstName] melhorará a [stewardship|lE] de [scoped_heir.GetFirstName]"
 yearly.5020.councillor.intrigue.tt: "[helpful_councillor.GetFirstName] melhorará a [intrigue|lE] de [scoped_heir.GetFirstName]"
 yearly.5020.councillor.learning.tt: "[helpful_councillor.GetFirstName] melhorará o [learning|lE] de [scoped_heir.GetFirstName]"
 yearly.5021.deceitfulcouncillor.desc: "Tive razão em suspeitar das intenções de [helpful_councillor.GetFirstName]! Depois de observá-l[helpful_councillor.Custom('ES_OA')] durante vários dias, ficou mais do que evidente que [helpful_councillor.GetFirstName] só quer pôr meu própri[scoped_heir.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scoped_heir'))] contra mim."
 yearly.5021.honestcouncillor.desc: "Pese a vigilar atentamente a [helpful_councillor.GetFirstName], mi espía no pudo encontrar nada que me haga pensar que sus intenciones no son puras.\n\nSe ve que solo le interesa ayudar a que mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scoped_heir'))] sea mejor gobernante."
 yearly.5021.a: "Não há perigo em deixar que seja mentor[helpful_councillor.Custom('ES_XA')] de [scoped_heir.GetFirstNameNoTooltip]!"
 yearly.5021.b.a: "Não posso permitir que continue perto de [scoped_heir.GetFirstNameNoTooltip]."
 yearly.5021.b.b: "Mas ainda não confio em [helpful_councillor.GetSheHe]!"
 yearly.5021.c: "Quero [helpful_councillor.Custom('ES_OA')] fora do Conselho!"
 yearly.5022.a: "Então, não há problema em deixá-lo continuar!"
 yearly.5023.desc: "Aquele espião inútil que designei para vigiar meu [helpful_councillor.Custom('CouncilPosition')] [helpful_councillor.GetTitledFirstName|l] foi pego! [helpful_councillor.GetFirstNameNoTooltip] ficou furios ao saber da minha falta de confiança e retirou sua oferta de tutoria."
 yearly.5023.a: "Como eu ia saber se estava sendo sincer[helpful_councillor.Custom('ES_OA')] ou não?"
 yearly.5024.deceitfulcouncillor.desc: "Algo não vai bem. Deixei que meu [helpful_councillor.Custom('CouncilPosition')|l] [helpful_councillor.GetFirstName] ajudasse na tutoria do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scoped_heir'))] para que [scoped_heir.GetFirstName] aprendesse algo sobre o exercício do poder. No entanto, parece que ele/ela está mais interessado(a) em ensinar-lhe a questionar e desaprovar todas as minhas decisões."
 yearly.5024.deadlycouncillor.desc: "Meu [helpful_councillor.Custom('CouncilPosition')|l] [helpful_councillor.GetFirstName] entra apressado no salão principal com ar envergonhado e as roupas pingando sangue. \n\n"Bandidos, meu [ROOT.Char.GetTitleTierName|l]!" exclama quase sem fôlego. [helpful_councillor.GetFirstNameNoTooltip] saiu esta manhã do meu [ROOT.Char.Custom('ResidenceBuilding')] com [scoped_heir.GetFirstName] para inspecionar a região. "Carreguei o corpo do [scoped_heir.Custom('ES_DelDela')] [scoped_heir.GetTitleTierName|l] pelo máximo de tempo que consegui, mas...""
 yearly.5024.honestcouncillor.desc: "A tutoria de [helpful_councillor.GetFirstName] de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scoped_heir'))] já está dando frutos. \n\n[scoped_heir.GetFirstName] aprendeu muito mais do que eu ousaria esperar, e leva algumas de suas futuras responsabilidades muito mais a sério do que antes."
 yearly.5024.a.a: "Maravilhoso! Sabia que podia confiar em [helpful_councillor.GetSheHe]!"
 yearly.5024.a.b: "Como pôde fazer isso comigo?!"
 yearly.5024.a.c: "Isso não pode ser!"
 yearly.5024.b: "Eu não posso acreditar nisso. Você está por trás de tudo isso!"
 tooltip_yearly_5022_a: "Permita que [helpful_councillor.GetFirstName] continue com a tutoria."
 yearly.5030.opening: "[squealing_vassal.Custom2('AppropriateGreeting', ROOT.Char)]"
 yearly.5030.earnestvassal.desc: "Descobri uma verdade terrível sobre [blackmailed_vassal.GetTitledFirstName|l]. Embora lamente ter de informar-vos disso, devo dizer-vos que esta pessoa está a esconder-vos segredos muito alarmantes."
 yearly.5030.selfishvassal.desc: "Escrevo para informar-lhe sobre a terrível descoberta que fiz a respeito de [blackmailed_vassal.GetTitledFirstName|l]. Esta pessoa se envolve em atividades desagradáveis e desonrosas pelas suas costas.\n\nEspero sinceramente que trazer esta informação confidencial ao seu conhecimento demonstre minha lealdade inabalável a você, meu [ROOT.Char.GetTitleTierName]."
 yearly.5030.a.a: "Sua preocupação é profundamente apreciada, [squealing_vassal.GetFirstNameNoTooltip]."
 yearly.5030.a.b: "Eu não vou esquecer seu gesto, [squealing_vassal.GetFirstNameNoTooltip]."
 yearly.5030.a.tt: "[squealing_vassal.GetTitledFirstName] me revelará os segredos dele."
 yearly.5030.secret.desc: "Informado sobre o Segredo"
 yearly.5030.c: "Você melhor esquecer tudo isso, [squealing_vassal.GetFirstNameNoTooltip]."
 yearly.5030.c.tt: "Não usará seu segredo contra [blackmailed_vassal.GetSheHe]"
 yearly.5025.desc.a: "Gracias a mi reciente tutoría, [scoped_heir.GetFirstName] pudo llenar algunos vacíos en su educación.\n\nSu petición fue exactamente la motivación que necesitaba para ayudar a mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scoped_heir'))] a desbloquear una parte de su potencial aún sin explotar."
 yearly.5025.desc.b: "Por desgrácia, minhas tentativas recentes de ensinar [scoped_heir.GetFirstName] para preencher algumas das lacunas em sua educação foram infrutíferas.\n\nTalvez eu não devesse ter rejeitado a oferta de [helpful_councillor.GetTitledFirstName|l]…"
 yearly.5025.a: "Tenho orgulho das realizações dele."
 yearly.5025.b: "O/a [scoped_heir.Custom('GirlBoy')] é só um pouco lent[scoped_heir.Custom('ES_OA')]."
 yearly.5040.t: "Uma Conversa Suspeita"
 yearly.5040.desc: "Estava fazendo um passeio pelos jardins da minha [ROOT.Char.Custom('ResidenceBuilding')] quando uma brisa suave trouxe as vozes de [whisperer_1.GetFirstName] e [whisperer_2.GetFirstName]. \n\nOs dois cortesãos estavam conversando em um lugar próximo e um tanto escondido, olhando de vez em quando ao redor para se certificar de que ninguém os estivesse ouvindo. Embora eu tenha tido dificuldade para entender a maior parte de suas palavras à distância, está claro que a conversa estava relacionada a [scoped_vassal.GetTitledFirstName|l]."
 yearly.5040.a.a: "Eu os farei amarrar e entregá-los a [scoped_vassal.GetFirstNameNoTooltip]."
 yearly.5040.a.b: "Devo avisar [scoped_vassal.GetFirstNameNoTooltip]!"
 yearly.5040.b: "Se ao menos eu pudesse me aproximar um pouco mais..."
 yearly.5040.b.success.desc.tt: "Evito ser detectado"
 yearly.5040.b.success.effect.tt: "Descubro o assunto da conversa"
 yearly.5040.b.failure.desc.tt: "[whisperer_1.GetFirstNameNoTooltip] e [whisperer_2.GetFirstNameNoTooltip] me veem"
 yearly.5040.b.failure.effect.tt: "O interrogatório não produz resultados"
 yearly.5040.c.a: "No esconderéis nada a vuestr[ROOT.Char.Custom('ES_OA')] amad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleTierName], ¿verdad?"
 yearly.5040.c.b: "Eu preciso saber o que eles estão escondendo, a qualquer custo!"
 yearly.5040.c.success.tt: "Eu torturo a informação de [whisperer_1.GetFirstNameNoTooltip] e [whisperer_2.GetFirstNameNoTooltip]"
 yearly.5040.c.failure.tt: "[whisperer_1.GetFirstName] e [whisperer_2.GetFirstNameNoTooltip] são incooperativos"
 yearly.5040.d: "Ah, tenho certeza de que isso provavelmente não é nada importante..."
 yearly.5041.desc.a: "Consigo me aproximar dos cortesãos sem que eles me descubram.\n\n!Falam de uma intriga orquestrada por [scoped_vassal.GetTitledFirstName|l] contra mim!"
 yearly.5041.desc.b: "Consigo me aproximar dos cortesãos sem que me descubram.\n\nFalam de uma intriga orquestrada por [scoped_vassal.GetTitledFirstName|l] em minha própria corte!"
 yearly.5041.desc.c: "Consigo me aproximar dos dois cortesãos sem que eles me percebam.\n\nParece que estão discutindo a vida privada de [scoped_vassal.GetTitledFirstName|l] e algum hábito desagradável dele."
 yearly.5041.a: "Interessante..."
 yearly.5042.desc.safetorture: "Leva um tempo para soltar a língua dos dois prisioneiros, mas meu carcereiro é um[dummy_jailor_gender.Custom('ES_XA')] [dummy_jailor_gender.GetWomanMan] paciente. Depois de várias horas de interrogatório, os dois conspiradores estão prontos para confessar seu segredo."
 yearly.5042.desc.deadlytorture: "Os lábios dos prisioneiros estão mais cerrados do que eu esperava. Após uma longa noite de interrogatório, a frustração do carcereiro tomou conta de [dummy_jailor_gender.Custom('ES_DelDela')] carcereir[dummy_jailor_gender.Custom('ES_OA')] e pela manhã os dois cortesãos estavam mortos, mas não antes de revelarem seu segredo."
 yearly.5042.desc.a: "\n\nParece que [scoped_vassal.GetTitledFirstName|l] está conspirando contra mim!"
 yearly.5042.desc.b: "\n\nParece que [scoped_vassal.GetTitledFirstName|l] está conspirando em minha própria Corte!"
 yearly.5042.desc.c: "\n\nO assunto da discussão deles era um hábito desagradável de [scoped_vassal.GetTitledFirstName|l] do qual eu estava completamente alheio."
 yearly.5042.a.a: "Que descoberta afortunada e emocionante!"
 yearly.5042.a.b: "Um preço severo por informações vitais."
 yearly.5040.torturefail.desc: "Infelizmente, o interrogatório não produziu resultados"
 yearly.5040.deceitfail.desc: "[whisperer_1.GetFirstName] e [whisperer_2.GetFirstName] me avistam e correm de volta para o/a [ROOT.Char.Custom('ResidenceBuilding')]"
 yearly.5043.torturedeadlyfail.desc: "Minha sessão de interrogatório foi demais para os dois prisioneiros. \n\nEles deram seu último suspiro antes de me contar seu segredo."
 yearly.5043.a.a: "Que desperdício de tempo isso foi..."
 yearly.5043.a.b: "Por que eles não falaram?"
 yearly.5050.t: "Recriminações Matrimoniais"
 yearly.5050.desc.a: ""Isso é absolutamente inaceitável!" \n\n[scoped_spouse.GetFirstName] irrompe em meu [ROOT.Char.Custom('GetChamber')] com o rosto vermelho de raiva, gritando tão alto que [scoped_spouse.Custom('ES_LoLa')] vai ouvir em todos os cantos da minha [ROOT.Char.Custom('ResidenceBuilding')]. \n\n"[slighting_courtier.Custom('ES_ElLa')|U] [slighting_courtier.GetTitledFirstName|l] acabou de insultar minha honra! Exijo que você expulse de sua [ROOT.Char.Custom('GetCourt')] essa espécie de [slighting_courtier.Custom2('InsultNoun', SCOPE.sC('scoped_spouse'))] [slighting_courtier.Custom2('InsultAdjective', SCOPE.sC('scoped_spouse'))]!""
 yearly.5050.desc.b: "Me sorprende encontrarme a mi [scoped_spouse.GetWifeHusband] escondiéndose en mi estudio. Por su rostro, está claro que algo disgustó a [scoped_spouse.GetFirstName], pero me cuesta un tiempo convencer[scoped_spouse.Custom('ES_LoLa')] de que comparta sus preocupaciones conmigo. \n\n«Mi amor, debo confesarte que [slighting_courtier.GetFirstName] me ha insultado. No puedo soportar la idea de pasar más tiempo cerca de esa persona»."
 yearly.5050.a.a: "Amanhã, ela/ele terá ido embora!"
 yearly.5050.b.a: "Não me incomode com tais bobagens."
 yearly.5050.b.b: "Impossível! Mas se [slighting_courtier.GetFirstNameNoTooltip] é um encanto!"
 yearly.5050.b.c: "Acho que você pode estar reagindo um pouco exageradamente, querido."
 yearly.5050.c: "Por que você não me contou tudo desde o início?"
 yearly.5050.c.success.desc.tt: "Discuto os detalhes do incidente com [scoped_spouse.GetFirstNameNoTooltip]"
 yearly.5050.c.success.effect.tt: "Descubro se [scoped_spouse.GetFirstNameNoTooltip] ? sincer[scoped_spouse.Custom('ES_OA')] ou n?o"
 yearly.5050.c.failure.desc.tt: "[scoped_spouse.GetFirstNameNoTooltip] se recusa a ouvir razões"
 yearly.5050.c.failure.effect.tt: "Meu [scoped_spouse.GetWifeHusband] exige que eu aja"
 yearly.5051.desc.a.a: "Quanto mais sei sobre essa história, mais me convenço de que meu [scoped_spouse.GetWifeHusband] não está me dizendo a verdade. Ao final de nossa conversa, fica claro para mim que [scoped_spouse.GetFirstName] inventou tudo isso para difamar [slighting_courtier.GetTitledFirstName|l]."
 yearly.5051.desc.a.b: "Após examinar cuidadosamente as alegações do meu [scoped_spouse.GetWifeHusband], cheguei à conclusão de que [scoped_spouse.GetFirstName] está me dizendo a verdade.\n\n[slighting_courtier.GetTitledFirstName|l] insultou profundamente sua honra e, ao fazê-lo, cuspiu na minha hospitalidade."
 yearly.5051.z: "Se a corte soubesse de sua acusação falsa..."
 yearly.5051.a: "Espero que você se desculpe com [slighting_courtier.GetFirstNameNoTooltip] por essa acusação sem fundamento."
 yearly.5051.b: "Não se preocupe, sempre estarei ao seu lado."
 yearly.5051.c: "Ahora que estoy segur[ROOT.Char.Custom('ES_OA')], puedo enfrentarme a [slighting_courtier.GetFirstNameNoTooltip]."
 yearly.5051.d: "Acho que você deveria tentar perdoar [slighting_courtier.GetFirstNameNoTooltip]."
 yearly.5052.desc.a: "Mesmo depois de discutir os detalhes do incidente com [scoped_spouse.GetFirstName], ainda estou incerto sobre o que pensar de toda a situação."
 yearly.5052.desc.b.a: "\n\nUm[ROOT.Char.Custom('ES_XA')] bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName] deve apoiar seu [scoped_spouse.GetTitleTierName], mas não consigo tirar da cabeça a ideia de que [scoped_spouse.GetFirstNameNoTooltip] não esteja me contando toda a história…"
 yearly.5052.desc.b.b: "\n\nPor outro lado, um[ROOT.Char.Custom('ES_XA')] bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName] deve apoiar seu [scoped_spouse.GetTitleTierName] e [scoped_spouse.GetFirstName] parece realmente devastad[scoped_spouse.Custom('ES_XA')] pelo incidente."
 yearly.5052.a: "Vou conversar com [slighting_courtier.GetTitledFirstNameNoTooltip|l]."
 yearly.5052.b: "Acho que você deveria esquecer todo esse assunto, [scoped_spouse.GetFirstNameNoTooltip]."
 yearly.5053.desc.a: "Meu [scoped_spouse.GetWifeHusband] está reclamando de novo que alguém a desrespeitou. Desta vez, parece que a causa de sua ira é [slighting_courtier.Custom('ES_ElLa')] [slighting_courtier.GetTitledFirstName|l] e me pede que eu faça alguma coisa a respeito."
 yearly.5053.desc.b: "N?o me surpreende quando meu/minha [scoped_spouse.GetWifeHusband] me pede para disciplinar mais um membro da corte que, segundo [scoped_spouse.GetSheHe], questionou sua honra. Tornou-se algo t?o frequente que j? mal presto aten??o ? lista de queixas que [scoped_spouse.GetFirstName] tem contra [slighting_courtier.GetTitledFirstName|l]."
 yearly.5053.desc.b.a: "\n\nNão consigo entender por que tanta gente está incomodando[scoped_spouse.Custom('ES_LoLa')]…"
 yearly.5053.desc.b.b: "\n\nUm[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWifeHusband] mais desconfiad[ROOT.Char.Custom('ES_OA')] suspeitaria que está se aproveitando da minha boa vontade para se livrar de qualquer pessoa de quem não goste…"
 yearly.5053.a: "Chega. Farei um exemplo deste."
 yearly.5053.b: "Não se preocupe, lidarei com [slighting_courtier.GetTitledFirstNameNoTooltip|l]."
 yearly.5053.c: "Chega dessas trivialidades, [scoped_spouse.GetFirstNameNoTooltip]."
 yearly.5054.desc.a: "Desde que executei horrivelmente [slighting_courtier.GetTitledFirstName|l], meu [scoped_spouse.GetWifeHusband] tem agido de forma estranha. Como previ, nenhum cortesão [scoped_spouse.Custom('ES_LoLa')] voltou a importunar, nem sequer se aproximam de [scoped_spouse.GetSheHe] a menos que eu peça, e ainda assim, não parece satisfeit[scoped_spouse.Custom('ES_OA')].\n\nDe fato, parece muito mais triste do que antes."
 yearly.5054.desc.b: "Tal como eu esperava, executar a [slighting_courtier.GetTitledFirstName|l] do modo mais doloroso e público por desprezar meu [scoped_spouse.GetWifeHusband] era exatamente a mensagem que eu precisava enviar à corte.\n\nNinguém ousa retrucar ou sequer se aproximar de [scoped_spouse.GetFirstName] sem a permissão dele(a). Não precisarei mais me preocupar com as suas queixas incessantes."
 yearly.5054.a.a: "Acho que o mínimo é agradecer, querid[scoped_spouse.Custom('ES_OA')]."
 yearly.5054.a.b: "Finalmente, paz."
 yearly.9020.t: "Um poderoso elefante"
 yearly.9020.desc: "[marshal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima a mim com um sorriso no rosto. Explica-me que recebi um presente verdadeiramente impressionante de um supervisor do [county.GetNameNoTooltip], e me acena para que eu [marshal.Custom('ES_LoLa')] acompanhe.\n\nE é mesmo impressionante! Ao sair, sou recebido por um elefante #emphasis gigantesco#!. A fera certamente causará devastação a qualquer inimigo."
 yearly.9020.a: "Eu cavalgarei esta magnífica criatura para a batalha. Pessoalmente."
 yearly.9020.b: "[marshal.GetCouncilTitle]. A criatura é sua."
 yearly.9020.c: "Com certeza meu $knight_culture_player_no_tooltip_lowercase$ [knight.GetTitledFirstNameNoTooltip|l] fará bom uso dele."
 yearly.9020.d1: "Vamos honrar a [ROOT.Char.GetFaith.KnowledgeGodName] e libertá-lo."
 yearly.9020.d2: "Um animal desses deveria ser livre. Soltem-no."
 yearly_9020_personal_war_elephant: "Elefante de guerra pessoal"
 #Oltner
 yearly.8000.t: "Prestando Homenagem"
 yearly.8000.desc: "Meu vassal[vassal.Custom('ES_OA')], [vassal.GetTitledFirstName|l], chegou às portas de minha [ROOT.Char.Custom('ResidenceBuilding')] com uma grande procissão de diplomatas bem-vestidos, $knight_culture_player_plural_no_tooltip_lowercase$ e artistas exóticos. Seu séquito parece um desfile, liderado por [vassal.GetFirstNameNoTooltip] em pessoa.\n\nCom voz potente, [vassal.GetFirstName] anuncia que veio prestar homenagem e que traz presentes de #emphasis oro!#!"
 yearly.8000.desc.paranoid: "\n\n… É óbvio que veio para #emphasis matarme!#!"
 yearly.8000.desc.lunatic: "\n\nO #emphasis Homem na Lua#! deve ter ouvido minhas súplicas da meia-noite por um novo companheiro de brincadeiras!"
 yearly.8000.desc.default: "\n\nÉ difícil encontrar tanta generosidade em um súdito. A lealdade de [SCOPE.sC('vassal').GetFirstName] é realmente algo a ser valorizado!"
 yearly.8000.desc.cannibal: "\n\nÉ difícil encontrar tamanha generosidade deliciosa em um súdito tão tenro. A lealdade suculenta de [SCOPE.sC('vassal').GetFirstName] é algo realmente digno de saborear!"
 yearly.8000.a: "Por favor, entre! Deixe o ouro à sua esquerda..."
 yearly.8000.b: "Por que... #emphasis com certeza#! você tem mais a oferecer?"
 yearly.8000.c: "Fique com o ouro, sua amizade é suficiente!"
 yearly.8000.d: "Que #emphasis no#! entre em minha [ROOT.Char.Custom('ResidenceBuilding')]!"
 yearly.8000.e: "Que tal... ficar para o jantar?"
 yearly.8000.e.tt_eat_vassal: "É comido por você"
 yearly.8000.e.tt_secret: "Você recebe um segredo de assassinato"
 yearly.8100.t: "Campesinato extasiado"
 yearly.8100.desc: "Os camponeses de [county.GetName] estão de bom humor. A colheita é farta, as estradas estão seguras, e os anciãos da aldeia estão contando histórias sem sentido de vacas produzindo leite carregado de mel e gansos botando ovos de ouro.\n\nOs camponeses estão elogiando #emphasis a mim#! pela sua sorte e enviaram uma delegação trazendo presentes!"
 yearly.8100.a: "Eu aceito graciosamente os presentes deles!"
 yearly.8100.b: "Intrigante... envie soldados para coletar mais 'presentes!'"
 yearly.8100.c: "Não, eles precisam mais do excedente do que eu."
 yearly.8200.t: "Uma Doação de Boa Fé"
 yearly.8200.desc: "Meu [realm_priest.GetCouncilTitle], [realm_priest.GetFirstName], recebeu uma doação significativa de ouro da propriedade de um abastado proprietário de terras, sem filhos, que faleceu. [realm_priest.GetFirstName] afirma que o falecido levou uma vida muito frugal e piedosa e desejava que o ouro fosse para onde pudesse fazer o bem.\n\n[realm_priest.GetCouncilTitle] [realm_priest.GetFirstName] insiste que eu receba parte da doação, pois sou um exemplo de [ROOT.Char.GetFaith.GetNameNoTooltip] em [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 yearly.8200.a: "Dar #emphasis [ROOT.Char.GetFaith.HighGodNamePossessive]#! riqueza? #emphasis Herege!#!"
 yearly.8200.b: "Prometo que o ouro servirá ao reino."
 yearly.8200.c: "Este 'modelo' merece a doação inteira!"
 yearly.8200.d: "Por favor, dê aos pobres em meu nome."
 yearly.8200.desc.zealous: "\n\n… Certamente [ROOT.Char.GetFaith.DevilName] [realm_priest.Custom('ES_LoLa')] foi corrompido por!"
 yearly.8200.desc.generous: "\n\nMeu coração se enche por todas as almas que eu poderia salvar com esse ouro!"
 yearly.8200.desc.greedy: "\n\n... Naturalmente, planejo embolsar o dinheiro para mim mesmo!"
 yearly.8200.desc.default: "\n\nUma oferta tentadora, de fato."
 yearly.8300.t: "Uma Contribuição para o Cofre de Guerra"
 yearly.8300.desc: "Enquanto contemplo com medo meus cofres quase vazios, o arauto me anuncia a chegada de quatro de meus vassalos.\n\n"Viemos trazer ouro, meu [ROOT.Char.Custom('ES_SennorSennora')]. Uma doação para derrotar nossos inimigos!", anuncia [SCOPE.sC('vassal_1').GetTitledFirstName|l].\n\n"Comigo trago [vassal_2.Custom('ES_AlAla')] [SCOPE.sC('vassal_2').Custom('FormalComplimentAdjective')] [SCOPE.sC('vassal_2').GetTitledFirstName|l], [vassal_3.Custom('ES_AlAla')] [SCOPE.sC('vassal_3').Custom('FormalComplimentAdjective')] [SCOPE.sC('vassal_3').GetTitledFirstName|l], e [vassal_4.Custom('ES_AlAla')] [SCOPE.sC('vassal_4').Custom('FormalComplimentAdjective')] [SCOPE.sC('vassal_4').GetTitledFirstName|l]. Só pedimos que nos conduza à vitória!"."
 yearly.8300.a: "Dou as boas-vindas à sua generosidade!"
 yearly.8300.b: "#emphasis Oro#!, dizeis? Guardas, #emphasis tomadlo todo.#!"
 yearly.8300.c: "Você é muito generoso, não posso aceitar."
 yearly.8300.d: "Ouro? Eu preferiria #emphasis confiscar suas calças!#!"
 yearly.8400.t: "Um Deviante à Solta"
 yearly.8400.desc: "Cuando me retiraba a mi [ROOT.Char.Custom('GetChamber')] para dormir, me encontré con un[deviant_guest.Custom('ES_OA')] de mis invitad[deviant_guest.Custom('ES_OsAs')], [deviant_guest.Custom('ES_ElLa')] [deviant_guest.GetTitledFirstName|l], en mi santuario más íntimo… ¡¿Cómo ha llegado hasta aquí?!\n\n«¡No es lo que parece, [ROOT.Char.Custom('FormOfAddressForLiege')]!», sostiene.\n\nEl hecho de que esté medio desnud[deviant_guest.Custom('ES_OA')] y en el proceso de profanar corporalmente mi #emphasis [ROOT.Char.Custom('RandomPrivateObject')]#! me dice que, de hecho, es exactamente lo que parece."
 yearly.8400.a: "O quê… Mas… #emphasis Fuera de mi [ROOT.Char.Custom('GetRealmOrDomicile')]!#!"
 yearly.8400.special: "Escute, eu sei #emphasis exatamente#! para onde você deveria ir."
 yearly.8400.b: "Como você pôde?! Para a [ROOT.Char.Custom('GetDungeon')] com você!"
 yearly.8400.c: "Isso não acontecerá novamente. Entendeu?"
 yearly.8400.d: "Eu nunca percebi que você poderia fazer #emphasis isso#!. Tentador..."
 yearly.8400.a.tt: "Enviarei [deviant_guest.Custom('ES_AlAla')] [SCOPE.sC('deviant_guest').GetTitledFirstName|l] à [appropriate_court_target_owner.Custom('GetCourt')] [SCOPE.sC('appropriate_court_target_owner').Custom('ES_DelDela')] [SCOPE.sC('appropriate_court_target_owner').GetTitledFirstName|l], onde será um[deviant_guest.Custom('ES_XA')] grande agente…"
 yearly.8500.opening: "[current_head_of_faith.Custom2('AppropriateGreeting', ROOT.Char)]"
 yearly.8500.desc.a: "A situação em que vós vos encontrais é infeliz. Ainda assim, ofereço-vos este presente, para que possais triunfar neste momento perigoso.\n\nRezo para que [current_head_of_faith.GetFaith.HighGodName] permaneça ao vosso lado."
 yearly.8500.desc.b: "Sua justa luta contra os infiéis não passou despercebida. Enviei pessoalmente um emissário com moedas suficientes para que vocês superem estes momentos difíceis.\n\nQue [current_head_of_faith.GetFaith.HighGodName] os proteja."
 yearly.8500.a: "Estou de joelhos, louvando [current_head_of_faith.GetFaith.HighGodName]!"
 yearly.8500.b: "Não posso aceitar este presente, é demais."
