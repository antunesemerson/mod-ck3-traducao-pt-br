l_spanish:
 yearly.4001.opening: "[neighboring_ruler.Custom2('AppropriateGreeting', ROOT.Char)]"
 yearly.4001.desc: "[vassal.Custom2('YourCharacterIntroduction', ROOT.Char)|U],"
 yearly.4001.desc_opinion: "me insultou gravemente. Teve a ousadia de me chamar [neighboring_ruler.Custom2('InsultAdjectiveArticle', SCOPE.sC('vassal'))] [neighboring_ruler.Custom2('InsultNoun', SCOPE.sC('vassal'))] na frente da minha corte."
 yearly.4001.desc_lover: "ousou levar a minha [neighboring_ruler.Custom2('RelationToMeShort', SCOPE.sC('neighboring_ruler_secondary'))] [neighboring_ruler_secondary.GetTitledFirstName|l] ao pecado carnal."
 yearly.4001.desc_murder: "matou meu [neighboring_ruler.Custom2('RelationToMeShort', SCOPE.sC('neighboring_ruler_secondary'))] [neighboring_ruler_secondary.GetTitledFirstName|l] em uma briga desonesta."
 yearly.4001.desc_rival: "Não deveria esperar algo melhor de alguém associado a #EMP você#!, mas isso é inaceitável!"
 yearly.4001.desc_end: "Exijo satisfação por este insulto!"
 yearly.4001.a: "Faça o que for preciso para resolver isso!"
 yearly.4001.b: "[vassal.GetFirstNameNoTooltip] implorará publicamente pelo seu perdão."
 yearly.4001.c: "Hah, boa, [vassal.GetFirstNameNoTooltip]!"
 yearly.4011.t: "Unidos como Cúmplices"
 yearly.4011.desc: "Ultimamente, vejo frequentemente [heir.Custom2('MyCharacterIntroduction', ROOT.Char)] e [vassal.Custom2('MyCharacterIntroduction', ROOT.Char)] juntos no [ROOT.Char.Custom('ResidenceBuilding')], envolvidos em conversas profundas. Parecem realmente ter encontrado um terreno comum!"
 yearly.4011.a: "Ver uma amizade crescer assim... Vou ajudar a fazê-la florescer!"
 yearly.4011.b: "Eles não podem estar tramando algo de bom; isso termina agora."
 yearly.4011.c: "Então... sobre o que vocês estão conversando?"
 yearly.4011.c.success: "Minha companhia é apreciada"
 yearly.4011.c.toast.success: "Minha companhia foi apreciada"
 yearly.4011.c.failure: "Pareço intrometido"
 yearly.4011.c.toast.failure: "Pareci intrometido"
 yearly.4021.t: "Jogo Bruto"
 yearly.4021.desc: "Ah, não! A brincadeira entre [child.Custom2('MyCharacterIntroduction', ROOT.Char)] e [vassal_kid.GetTitledFirstName|l], [vassal.Custom2('RelationToMeShort', SCOPE.sC('vassal_kid'))] de [vassal.GetTitledFirstName|l] terminou abruptamente quando [vassal_kid.GetFirstNameNoTooltip] foi vitimado(a) em um terrível acidente!\n\n“Eu juro, [child.Custom2('RelationToMeShort', ROOT.Char)]. Foi só uma brincadeira!”, me garante [child.GetTitledFirstNameNoTooltip|l] enquanto [vassal.GetTitleAsNameNoTooltip] exige justiça."
 yearly.4021.a: "Você não tocará no meu filh[child.Custom('ES_OA')]!"
 yearly.4021.b: "Ninguém escapa das consequências de seus atos."
 yearly.4021.c: "Prometo disciplinar[child.GetHerHim]!"
 yearly.4021.c_success: "[child.GetTitledFirstNameNoTooltip|l] escuta e aprende"
 yearly.4021.c_failure: "[child.GetTitledFirstNameNoTooltip|l] aprende que suas ações não têm consequências"
 yearly.4021.d: "Perdoe[child.GetHerHim]! Por favor, farei qualquer coisa…"
 yearly.4022.t: "O Retorno"
 yearly.4022.desc: ""Olá, [child.Custom2('RelationToMeShort', ROOT.Char)]". [ROOT.Char.Custom2('MyCharacterIntroduction', SCOPE.sC('child'))] parece um pouco emagrecid[child.Custom('ES_OA')] após passar um tempo na prisão de [actor.GetTitledFirstName|l], mas o sorriso [child.Custom('quirk_neg_adjective')] em seu rosto faz com que pareça mais viv[child.Custom('ES_OA')] do que nunca.\n\n"Mal posso esperar para agradecer pela lição que você me ensinou sobre pagar minhas dívidas.""
 yearly.4022.a: "Bem-vind[child.Custom('ES_OA')] [child.GetFirstNameNoTooltip]."
 yearly.4031.t: "Assassino Entre Nós"
 yearly.4031.desc_opening: "O cheiro me atinge antes que a porta seja aberta; um odor pesado e carnal que permeia o local. É o fedor dos recém-mortos.\n\n"
 yearly.4031.desc_physician: ""Mais um assassinato, [ROOT.Char.Custom('FormOfAddressForLiege')]". [physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] limpa as mãos ensanguentadas no avental depois de examinar o corpo. "Precisamos impedir esse assassino sem sentido!"."
 yearly.4031.desc: "Mais um corpo foi encontrado... Todos eram pessoas de pouca importância, graças a [ROOT.Char.GetFaith.HighGodName], mas a corte está ficando nervosa."
 yearly.4031.a: "Vou vasculhar o [ROOT.Char.Custom('ResidenceBuilding')] atrás deste assassino!"
 yearly.4031.tt: "Uma investigação é lançada"
 yearly.4031.b: "Vamos enterrar o corpo e esquecer essa tragédia."
 yearly.4031.b_every_courtier: "Todo cortesão"
 yearly.4031.c: "Como meu médico, você deveria estudar os corpos."
 yearly.4061.t: "O Bobo Sábio"
 yearly.4061.desc_opening: ""Meu nome é [hodja.GetTitledFirstName|l]. [ROOT.Char.Custom('FormOfAddressForLiege')]. Vim perante vós para oferecer minha sabedoria".\n\n"
 yearly.4061.desc_guard: "[guard.Custom2('MyCharacterIntroduction', ROOT.Char)|U], que trouxe o homem até mim, parece cético."
 yearly.4061.desc: "O guarda que trouxe o homem até mim parece cético."
 yearly.4061.desc_ending: ""Aproximou-se da edificação de [ROOT.Char.Custom('ResidenceBuilding')] montado em um burro, [ROOT.Char.Custom('FormOfAddressForLiege')]. Foi de costas"."
 yearly.4061.a: "Por favor, compartilhe sua sabedoria comigo."
 yearly.4061.a_success: "Você obtém algumas perspicácias"
 yearly.4061.a_failure: "Suas histórias apenas o confundem"
 yearly.4061.b: "Deixe seu conhecimento abençoar toda a corte!"
 yearly.4061.c: "Não tenho tempo para tolos."
 yearly.4061.c.tt: "Você dispensa o homem"
 yearly.4061.d: "Divertido! Deixe-o também divertir as massas."
 yearly.4061.d.tt: "Passeie com ele pelas ruas como um bobo"
 yearly.4071.t: "Em Busca do Conhecimento"
 yearly.4071.desc: "[councillor.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim com um monte de livros em seus braços.\n\n\"Tenho notado sua sede de conhecimento, m [councillor.Custom2('RelationToMe', ROOT.Char)]."
 yearly.4071.desc_focus: "Especialmente seus recentes estudos relacionados a [ROOT.Char.Custom('LifestyleFocus')]!"
 yearly.4071.desc_no_focus: "Sem mencionar seus estudos anteriores sobre [ROOT.Char.Custom('education_conversation_subject')]!"
 yearly.4071.desc_ending: "Talvez esses livros possam interessá-lo?"
 yearly.4071.a: "Estudarei tudo, em nome do [ROOT.Char.GetFaith.ReligiousText]!"
 yearly.4071.b: "Distribua-os entre meus [ROOT.Char.Custom('GetCourtierPlural')]."
 yearly.4081.t: "Traduções"
 yearly.4081.desc: ""Os eruditos locais precisam de patrocínio para traduzir livros do grego para o árabe, [ROOT.Char.Custom('FormOfAddressForLiege')]. Esses esforços beneficiariam todo o mundo árabe!".\n\n[councillor.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me trouxe uma lista de eruditos que eu poderia patrocinar e os livros em que estão trabalhando neste momento."
 yearly.4081.a: "#EMP De materia Medica#!... Parece interessante!"
 yearly.4081.a.tt: "Você patrocina a tradução de um livro sobre medicina"
 yearly.4081.b: "Ah, este! #EMP On Ascensions#!."
 yearly.4081.b.tt: "Você patrocina a tradução de um livro sobre astronomia"
 yearly.4081.c: "#EMP Elements#! parece mais recompensador."
 yearly.4081.c.tt: "Você patrocina a tradução de um livro sobre matemática"
 yearly.4081.d: "Tenho coisas melhores para gastar meu dinheiro."
 yearly.4081.d.tt: "Você não patrocina nenhum estudioso"
 yearly.4081.toast: "Livro Traduzido"
 yearly.4081.e: "#EMP On the Soul#!? Fascinante..."
 yearly.4081.e.tt: "Você patrocina a tradução de um livro sobre motivações"
 yearly.4081.f: "O que é isso... #EMP Thucydides#!?"
 yearly.4081.f.tt: "Você patrocina a tradução de um livro sobre história militar"
 yearly.4081.g: "Este #EMP Plutarch#! me intriga."
 yearly.4081.g.tt: "Você patrocina a tradução de um livro biográfico"
 yearly.4081.tt: "Você receberá o livro"
 yearly.4091.t: "Eruditos de Bagdá"
 yearly.4091.desc_opening: "[ward.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e eu estamos passeando em Bagdá quando nos deparamos com"
 yearly.4091.desc_house: "a Casa da Sabedoria."
 yearly.4091.desc_no_house: "alguns eruditos locais."
 yearly.4091.desc: "\n\n\"Saudações, [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Saudações, jovem [ward.GetLadyLord]. Há um assento vazio em uma discussão em andamento, gostaria de se juntar a nós?\""
 yearly.4091.a: "Vá em frente [ward.GetFirstNameNoTooltip]."
 yearly.4091.a.tt: "Isso ajudará ainda mais a educação de [ward.GetFirstNameNoTooltip]."
 yearly.4091.b: "Eu gostaria de participar, sim."
