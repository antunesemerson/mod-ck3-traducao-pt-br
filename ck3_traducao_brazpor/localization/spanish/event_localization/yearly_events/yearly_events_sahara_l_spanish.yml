l_spanish:
 #[Faith] Traders in [County]
 yearly_saharan.0001.t: "[source_county.GetProvince.GetCounty.GetFaith.GetAdherentNameNoTooltip] Comerciantes em [target_county.GetNameNoTierNoTooltip]"
 yearly_saharan.0001.desc: "O comércio transaariano sempre atravessou estas terras, trazendo riqueza, ideias e ideologias. Normalmente, governantes como eu apenas cobram sua parte justa, e o resto as rotas se conduzem sozinhas.\n\nNo entanto, recentemente, cada vez mais mercadores [source_county.GetProvince.GetCounty.GetFaith.GetAdherentNameNoTooltip] por [target_county.GetNameNoTier], que trazem consigo sua fé e seu dinheiro.\n\nUm consórcio está pedindo minha permissão para se estabelecer e comprar propriedades, e reuniu um generoso presente para conquistar minha boa vontade."
 yearly_saharan.0001.a: "Eu aceito graciosamente este tributo."
 yearly_saharan.0001.a.tt: "#WEAK Isso pode influenciar os locais mais tarde...#!"
 yearly_saharan.0001.b: "Você pode continuar a passar, mas é só isso."
 yearly_saharan.0001.c: "[source_county.GetProvince.GetCounty.GetFaith.GetAdherentNamePluralNoTooltip] estão proibidos em [target_county.GetNameNoTierNoTooltip], seus bens são #EMP confiscados#!!"
 yearly_saharan.0001.c.list: "Todos os [counties|lE] do mesmo [realm|lE] próximos a [target_county.GetNameNoTierNoTooltip]"
 yearly_saharan.0003.t: "$yearly_saharan.0001.t$: Integração"
 yearly_saharan.0003.desc_initial: "Os comerciantes [source_county.GetProvince.GetCounty.GetFaith.GetAdherentNameNoTooltip] que permiti se estabelecerem em [target_county.GetNameNoTier] estão lá há alguns anos agora,"
 yearly_saharan.0003.desc_current: "Há alguns anos, [source_county.GetProvince.GetCounty.GetFaith.GetAdherentNamePluralNoTooltip] de [source_county.GetNameNoTier] têm vivido em [target_county.GetNameNoTier],"
 yearly_saharan.0003.desc: "e parece que eles se integraram bastante bem na comunidade existente.\n\nComo resultado, o comércio está inundando a área, as receitas estão em alta e até mesmo os camponeses estão familiarizados com o som do ouro tilintando!"
 yearly_saharan.0003.a: "Uma bela fortuna!"
 yearly_saharan.0003.b: "Taxe-os até a oblivion."
 yearly_saharan.0004.t: "$yearly_saharan.0001.t$: Boom Comercial"
 yearly_saharan.0004.desc_initial: "$yearly_saharan.0003.desc_initial$"
 yearly_saharan.0004.desc_current: "$yearly_saharan.0003.desc_current$"
 yearly_saharan.0004.desc: "e o comércio e dinamismo que eles trouxeram para a área parecem ilimitados!\n\nAs pessoas se aglomeram nos mercados: carruagens carregadas de ouro rumam para o norte, carroças cheias de sal inundam o sul, e todos pagam impostos na ida e na volta! Verdadeiramente, este é um canto próspero do reino!"
 yearly_saharan.0004.a.tt: "Você tenta melhorar sua [stewardship|lE]"
 yearly_saharan.0004.a: "Acho que posso aprender algo ou dois com esses comerciantes!"
 yearly_saharan.0004.a.tt.outcome_1: "Aumento de Stewardship"
 yearly_saharan.0004.a.tt.outcome_2: "$yearly_saharan.0004.a.tt.outcome_1$"
 yearly_saharan.0004.a.tt.outcome_3: "$yearly_saharan.0004.a.tt.outcome_1$"
 yearly_saharan.0004.b: "Será que estou ouvindo o som da taxa de imposto subindo?"
 yearly_saharan.0004.c: "Claro, teremos que cobrar alguns impostos atrasados..."
 yearly_saharan.0005.t: "$yearly_saharan.0001.t$: Mudança de Fé"
 yearly_saharan.0005.desc_initial: "$yearly_saharan.0003.desc_initial$"
 yearly_saharan.0005.desc_current: "$yearly_saharan.0003.desc_current$"
 yearly_saharan.0005.desc: "e sua fé enraizou-se firmemente nos corações dos habitantes locais. Tanto que muitos agora seguem [target_county.GetProvince.GetCounty.GetFaith.HighGodName] em vez de rezar para [target_county_old_faith.HighGodName]!\n\nA conversão foi pacífica, e as pessoas parecem dóceis e contentes com suas novas crenças, mas as antigas tradições quase desapareceram."
 yearly_saharan.0005.a: "Bem-vindos à luz de [ROOT.GetCharacter.GetFaith.HighGodNamePossessive]!"
 yearly_saharan.0005.b: "Hmm. Pelo menos eles estão felizes com isso."
 yearly_saharan.0005.c: "Não enquanto eu for [ROOT.GetCharacter.GetTitleAsNameNoTooltip]!"
 #[Culture] Nomads Flock to [County]
 yearly_saharan.0021.t: "N?mades [nomad_leader.GetCulture.GetNameNoTooltip] acorrem a [target_county.GetNameNoTierNoTooltip]"
 yearly_saharan.0021.desc: "Por mais [ROOT.GetCharacter.GetTitleAsNameNoTooltip] que seja, há lugares remotos nos quais meu nome não tem muito peso. Lugares que eu jamais poderia realmente esperar governar.\n\nE é justamente de lugares assim, nas profundezas do Saara, que ultimamente têm vindo nômades [nomad_leader.GetCulture.GetCollectiveNounNoTooltip] que estão avançando sobre [target_county.GetNameNoTier], ocupando os vazios e territórios deixados pelos colonos locais [target_county.GetProvince.GetCounty.GetCulture.GetNameNoTooltip] do lugar.\n\nUm de seus líderes chegou até mesmo a me pedir permissão para trazer sua confederação mais ampla para manter a região em meu nome."
 yearly_saharan.0021.a: "Eu até vou deixar você governar isso!"
 yearly_saharan.0021.b: "As pessoas da cultura [nomad_leader.GetCulture.GetNameNoTooltip] são sempre bem-vindas em meu reino."
 yearly_saharan.0021.c: "Talvez você queira se juntar a mim como um vassalo em vez disso?"
 yearly_saharan.0021.d: "Absurdo! Desapareça!"
 #Slave Raid against [Realm] Escalates
 yearly_saharan.0031.t: "Saqueadores de Escravos contra [affected_sub_realm.GetNameNoTierNoTooltip] Escalam"
 yearly_saharan.0031.desc: "Roubos de escravos e o tráfico humano resultante são frequentemente fatos brutais da vida para aqueles que estão na região do Sahel ou perto dela. O dinheiro que tais saques trazem pode ser muito lucrativo para ser abandonado, e muitos assentamentos saqueiam uns aos outros esporadicamente.\n\nRecentemente, no entanto, escravistas em [slave_raider_county.GetNameNoTier] têm atacado fervorosamente [raided_county.GetNameNoTier] nas proximidades, e vários comerciantes proeminentes estão planejando um grande ataque, opondo-se ao [raided_character_marshal.GetCouncilTitle] [raided_character_marshal.GetFirstName]."
 yearly_saharan.0031.a: "Como isso é lucrativo! Envie soldados para se juntar a eles!!"
 yearly_saharan.0031.a.tt_success: "[raided_county.GetNameNoTierNoTooltip] é fortemente saqueado em busca de escravos"
 yearly_saharan.0031.a.tt_fail: "[raided_character_marshal.GetTitledFirstNameNoTooltip|l] repele os escravistas"
 yearly_saharan.0031.b: "Pare com essa barbárie!"
 yearly_saharan.0031.c: "Isso realmente não me diz respeito."
 yearly_saharan.0031.c.raided_hurt: "[raided_county.GetNameNoTierNoTooltip] é saqueada"
 yearly_saharan.0031.c.raiders_hurt: "Muitos saqueadores de [slave_raider_county.GetAdjectiveNoTooltip] ficam feridos"
 #Marauding Slavers from [Realm]
 yearly_saharan.0032.t: "Saqueadores Marauding de [hostile_sub_realm.GetNameNoTierNoTooltip]"
 yearly_saharan.0032.desc: "Lamentablemente, los esclavistas del Sahel son una amenaza que mucha gente en esta tierra debe afrontar. El atractivo de las riquezas recibidas por enviar a otros humanos a los confines de la Tierra es demasiado para algunos.\n\nPor lo general, estas incursiones son dispersas e inconexas, pero los esclavistas de [slave_raider_county.GetNameNoTier] están lanzando ataques concentrados contra [raided_county.GetNameNoTier]. Los merodeadores capturan aldeas enteras, ¡liderados por las fuerzas de [slave_raider_county.GetHolder.GetTitledFirstName|l]!"
 yearly_saharan.0032.a: "Às armas contra esses bandidos!"
 yearly_saharan.0032.a.tt_success: "Você derrota e saqueia os saqueadores"
 yearly_saharan.0032.a.tt_fail: "Os saqueadores de [slave_raider_county.GetHolder.GetFirstNameNoTooltip] devastam [raided_county.GetNameNoTierNoTooltip]."
 yearly_saharan.0032.b: "Sabe, eles realmente deveriam pagar imposto sobre isso..."
 yearly_saharan.0032.c: "Eu realmente não me importo."
 #Modifiers
 foreign_trader_enclaves_saharan_modifier: "Enclaves de Comerciantes Pagãos"
 foreign_trader_enclaves_saharan_modifier_desc: "Comerciantes pagãos estabeleceram residência aqui."
 respects_local_traditions_saharan_modifier: "Respeita as Tradições Locais"
 respects_local_traditions_saharan_modifier_desc: "Este personagem é conhecido por valorizar as tradições de seus ancestrais acima do ouro estrangeiro."
 foreign_traders_unable_to_root_saharan_modifier: "Comerciantes Pagãos Transitórios"
 foreign_traders_unable_to_root_saharan_modifier_desc: "Comerciantes pagãos são proibidos de possuir propriedades ou permanecer por muito tempo aqui."
 local_recession_epicentre_saharan_modifier: "Recessão Local"
 local_recession_epicentre_saharan_modifier_desc: "A expulsão de comerciantes pagãos prejudicou a economia local."
 local_recession_ripple_saharan_modifier: "Repercussão da Recessão Local"
 local_recession_ripple_saharan_modifier_desc: "A abolição de uma rota comercial próxima prejudicou a economia deste condado."
 integrated_foreign_trader_enclaves_saharan_modifier: "Comerciantes Pagãos Integrados"
 integrated_foreign_trader_enclaves_saharan_modifier_desc: "Comerciantes pagãos se tornaram parte integrante da sociedade local aqui."
 overtaxed_merchant_enclaves_saharan_modifier: "Comerciantes Pagãos Supertributados"
 overtaxed_merchant_enclaves_saharan_modifier_desc: "Comerciantes pagãos são taxados impiedosamente neste condado, perturbando seus parceiros."
 ecstatic_converts_saharan_modifier: "Convertidos Eufóricos"
 ecstatic_converts_saharan_modifier_desc: "As massas jubilantes deste condado estão felizes com sua salvação."
 persecuted_converts_saharan_modifier: "Convertidos Perseguidos"
 persecuted_converts_saharan_modifier_desc: "As massas rebeldes deste condado tramam para escapar de seus senhores cruéis."
 enthusiastic_nomad_settlement_saharan_modifier: "Assentamento de Nômades Enthusiásticos"
 enthusiastic_nomad_settlement_saharan_modifier_desc: "Tribos do deserto estão se dirigindo em massa para este condado."
 nomad_settlement_saharan_modifier: "Assentamento de Nômades"
 nomad_settlement_saharan_modifier_desc: "Tribos do deserto estão se dirigindo para se estabelecer neste condado."
 upset_local_nomads_saharan_modifier: "Nômades Locais Contrariados"
 upset_local_nomads_saharan_modifier_desc: "Tribos locais do deserto estão saqueando caminhos e causando grandes problemas."
 lord_defeated_slavers_modifier: "Suserano Derrotou Saqueadores de Escravos"
 lord_defeated_slavers_modifier_desc: "O suserano heroico deste condado derrotou grupos de saqueadores de escravos!"
 lord_complicit_with_slavers_modifier: "Suserano Cúmplice com Saqueadores de Escravos"
 lord_complicit_with_slavers_modifier_desc: "O ganancioso suserano deste condado vendeu os locais para saqueadores de escravos marauding."
 utterly_unphased_modifier: "Totalmente Imperturbável"
 utterly_unphased_modifier_desc: "Não importa o quão terríveis sejam as coisas para seus súditos, este personagem não se deixa incomodar por elas."
