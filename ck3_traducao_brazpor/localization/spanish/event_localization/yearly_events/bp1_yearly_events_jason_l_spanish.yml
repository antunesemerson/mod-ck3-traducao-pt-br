l_spanish:
 #Shelter from the Storm
 bp1_yearly.0100.t: "Abrigo da Tempestade"
 bp1_yearly.0100.desc: "Os céus anunciam um mal presságio, o vento uiva: vem um redemoinho!"
 bp1_yearly.0100.sedentary_traveller: "\n\nCabanas precárias dominam este estranho canto da terra, sujas e minúsculas."
 bp1_yearly.0100.nomadic_traveller: "\n\nNão há tempo para montar nosso acampamento antes que a tempestade chegue."
 bp1_yearly.0100.sedentary_host: "Encontramos uma solitária casa de campo razoavelmente decente… mas a residência pertence ao meu repugnante [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('host'))] [host.GetFirstName].\n\nA tormenta crescente não para de me açoitar."
 bp1_yearly.0100.nomadic_host: "Por sorte, chegamos a um acampamento adequado. Por infelicidade, ele é habitado pelos membros da tribo do meu repugnante [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('host'))] [host.GetFirstName].\n\nA tormenta crescente está me açoitando."
 bp1_yearly.0100.lover_welcome: "Talvez [host.GetFirstNameNoTooltip] esteja longe? Talvez a sorte seja gentil e seu encantador[lover.Custom('ES_OA')] [host.Custom2('RelationToMeShort', SCOPE.sC('lover'))] [lover.GetFirstName] esteja aqui para me dar as boas-vindas?"
 bp1_yearly.0100.friend_welcome: "Talvez [host.GetFirstNameNoTooltip] esteja longe? Talvez a sorte seja gentil e alguém tão [befriend.Custom('ComplimentAdjective')] como seu [host.Custom2('RelationToMeShort', SCOPE.sC('befriend'))] [befriend.GetFirstName] esteja aqui para me dar as boas-vindas?"
 bp1_yearly.0100.close: "De uma forma ou de outra... esta será uma noite longa."
 bp1_yearly.0100.a: "Sorriam, homens!"
 bp1_yearly.0100.a.tt: "Uma hospitalidade miserável aguarda..."
 bp1_yearly.0100.a_title: "Uma noite miserável e paranóica"
 bp1_yearly.0100.a.success_chance: "Qualquer [scheme|lE] que [host.GetShortUINameNoTooltip] tenha contra você, ganha 15 de [success_chance|lE]"
 bp1_yearly.0100.b: "Talvez seja aqui que vivem os segredos de família..."
 bp1_yearly.0100.b.tt: "Você se abriga... e a oportunidade de bisbilhotar"
 bp1_yearly.0100.b.tt_success: "A noite traz resultados"
 bp1_yearly.0100.b.secrets: "Você aprende um [secret|lE] pertencente a [host.GetFirstName] ou a sua [family|lE]"
 bp1_yearly.0100.b.tt_failure: "Você não encontra armários cheios de esqueletos"
 bp1_yearly.0100.b.tt_crit_failure: "Você é pego invadindo"
 bp1_yearly.0100.c: "Por que brigar com [befriend.GetFirstNameNoTooltip]...?"
 bp1_yearly.0100.c.tt: "Para [befriend.GetTitledFirstName|l], você pode trazer alegria"
 bp1_yearly.0100.c.tt_success: "Você cria um vínculo estreito com [befriend.Custom('ES_ElLa')] [host.Custom2('RelationToMeShort', SCOPE.sC('befriend'))] do seu inimigo"
 bp1_yearly.0100.c.tt_failure: "Seu charme é apreciado"
 bp1_yearly.0100.c.tt_crit_failure: "Vocês compartilham uma terrível noite de discussões"
 bp1_yearly.0100.d: "Nada como um encontro secreto..."
 bp1_yearly.0100.d.tt: "[lover.Custom('ES_ElLa')|U] [host.Custom2('RelationToMeShort', SCOPE.sC('lover'))] de [host.GetFirstNameNoTooltip] pode estar lá dentro, ansioso para livrar você de suas roupas de viagem..."
 bp1_yearly.0100.d.tt.success: "[lover.GetSheHe|U] está à sua espera"
 bp1_yearly.0100.d.tt.sex: "Você dorme com [lover.GetShortUINameNoTooltip]"
 bp1_yearly.0100.d.tt_failure: "Uma noite sozinho"
 bp1_yearly.0100.d.tt_no_sex: "Não há sinal de [lover.Custom('ES_DelDela')] fascinante [lover.GetShortUIName]"
 bp1_yearly.0100.e: "Nossas espadas garantirão abrigo."
 bp1_yearly.0100.e.tt: "Colocar um sorriso falso? Não, você prefere amarrar seus anfitriões"
 bp1_yearly.0100.e.wounded_chance: "Sua [prowess|lE] determina se você fica ferido"
 bp1_yearly.0100.e.tt_success: "Sob a cobertura da tempestade, você é imparável"
 bp1_yearly.0100.e.tt_failure: "Você é lançado de volta para fora nos elementos"
 bp1_yearly.0100.f: "Um buraco no chão seria preferível."
 bp1_yearly.0100.f.tt_success: "Você suporta os elementos... mal"
 bp1_yearly.0100.f.sick: "Você pode contrair [GetTrait('ill').GetName( GetNullCharacter )|l]"
 bp1_yearly.0100.f.tt_failure: "A noite é longa. A tempestade é cruel"
 bp1_yearly.0100.f.very_sick: "Você pode contrair [GetTrait('pneumonic').GetName( GetNullCharacter )|l]"
 bp1_yearly.0101.t: "Tempestade na Selva"
 bp1_yearly.0101.desc: "Em voz baixa, agradeço a [ROOT.Char.GetFaith.FertilityGodName] por manter [host.Custom('ES_AlAla')] repugnante [lover.Custom2('RelationToMeShort', SCOPE.sC('host'))] de [lover.GetTitledFirstName|l] longe deste humilde lugar.\n\nQuando a tempestade guerreia com os céus, sua fúria ecoa ao nosso redor,"
 bp1_yearly.0101.gentle_flirt: "[lover.GetFirstNameNoTooltip] se estremece mais perto a cada momento. Será que esse medo é apenas encenação? Algo se agita em seus olhos, logo atrás de seu sorriso formal. Seus olhos me dizem... sim."
 bp1_yearly.0101.protective_flirt: "[lover.GetFirstNameNoTooltip] age com confiança, protetor[lover.Custom('ES_XA')]. Sorrio agradecid[GetPlayer.Custom('ES_OA')] —obsequiosamente— e logo… [lover.GetSheHe] cai em um silêncio extasiado. [lover.GetSheHe|U] é min[lover.Custom('ES_OA')]."
 bp1_yearly.0101.finish: "\n\nO canto onde nos reunimos é escuro. Muito escuro. E nada do que fazemos, com seu corpo faminto e sob minhas roupas salpicadas de sujeira, pode ser ouvido através do tumulto da natureza.\n\nO único som que toca meus lábios é uma maldição contra o nome de seu [lover.Custom2('RelationToMeShort', SCOPE.sC('host'))]. E, naquele exato momento, minha vitória se completa."
 bp1_yearly.0101.a: "Mas é #EMP você#! que eu sonho, [lover.GetFirstNameNoTooltip]!"
 bp1_yearly.0101.b: "Um único, delicioso insulto."
 bp1_yearly.0102.opening: "[host.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 bp1_yearly.0102.desc: "Você dormiu bem? Aproveite uma noite de hospitalidade do meu povo,"
 bp1_yearly.0102.desc_weak: "descansando seus gloriosos pés?"
 bp1_yearly.0102.desc_powerful: "sonhando que poderia ser eu?"
 bp1_yearly.0102.uneventful_night: "\n\nDizem que você se destaca por ser um mendigo sem charme, intrusivo e sujo de esterco."
 bp1_yearly.0102.failed_snoop: "\n\nSeus direitos como suserano têm limites. Eu me certifiquei de que todos saibam do seu desrespeito por eles."
 bp1_yearly.0102.warm_welcome: "\n\nSe eu estivesse presente, teria te expulsado. [befriend.GetTitledFirstName|l] sempre teve um gosto terrível."
 bp1_yearly.0102.cold_welcome: "\n\nSeu anfitri[befriend.Custom('ES_OnOna')] [befriend.GetTitledFirstName|l] aprendeu a odiar você, assim como eu. Meu coração transborda de alegria."
 bp1_yearly.0102.erotic_welcome: "\n\nSe eu estivesse presente, eu teria expulsado você na primeira palavra odiosa que você murmurou para meu [host.Custom2('RelationToMeShort', SCOPE.sC('lover'))], sua serpente vil."
 bp1_yearly.0102.attack_success: "\n\nVocê atacou meus homens como um animal assustado. Você atacou sem honra ou cortesia, como é seu costume."
 bp1_yearly.0102.attack_fail: "\n\nNão? Ah, é verdade. Você #EMP tentou#! nos atacar, mas foi jogado de volta para a selva como a besta que é. Seus esforços foram patéticos."
 bp1_yearly.0102.close: "\n\nQue a próxima tempestade te varra da face da terra."
 bp1_yearly.0102.a: "Invista em camas mais macias, seu pat[host.Custom('ES_AnAna')]!"
 bp1_yearly.0102.b: "Não são os céus que você deveria temer, [host.GetFirstNameNoTooltip]..."
