l_spanish:
 bp1_yearly.6000.t: "Pelos pecados de um[my_rival.Custom('ES_XA')] [my_rival.GetMotherFather]"
 bp1_yearly.6000.desc: "Um grito estrondoso corta o burburinho do lado de fora de minha [ROOT.Char.Custom('ResidenceBuilding')].\n\n"[ROOT.Char.Custom2('InsultNoun', SCOPE.sC('rivals_child'))|U] abominável! Sou [rivals_child.Custom('ES_ElLa')] [rivals_child.Custom('GetDaughterSon')] [my_rival.Custom('ES_DelDela')] [my_rival.GetTitledFirstName|l] e chegou a hora de você responder por suas vis ações vis.\nEnfrente-me, ou o mundo saberá que você é incapaz de defender sua própria honra!"\n\nAo me virar, deparo-me com os olhos em chamas de um[rivals_child.Custom('ES_XA')] [rivals_child.GetWomanMan] consumid[rivals_child.Custom('ES_OA')] pelo desejo de defender a honra de seu [my_rival.GetMotherFather].\n\nMeus guardas ainda estão por perto… Se eu quisesse, poderia mandar expulsar esse [rivals_child.Custom('ES_EA')] exaltad[rivals_child.Custom('ES_OA')] humilhad[rivals_child.Custom('ES_OA')] e impotente."
 bp1_yearly.6000.a: "Minha disputa é com seu[my_rival.Custom('ES_OA')] [my_rival.GetMotherFather], não com você."
 bp1_yearly.6000.b: "Aceito o desafio!"
 bp1_yearly.6000.c: "Guardas! Tirem essa[rivals_child.Custom('ES_EA')] #EMP [rivals_child.Custom('GirlBoy')]#! daqui."
 bp1_yearly.6000.a.tt: "Tentar convencer [rivals_child.GetFirstNameNoTooltip] a sair"
 bp1_yearly.6000.a.success: "Você convence [rivals_child.GetFirstName] a recuar"
 bp1_yearly.6000.a.failure: "[rivals_child.GetFirstName] acha sua condescendência humilhante"
 bp1_yearly.6000.b.tt: "#V ¡Te bates con#! [rivals_child.GetFirstName] para que sepa cuál es su sitio!\n#weak Este duelo puede causar la muerte.#!\nSi vences, ganarás [prestige|lE] [prestige_i]\n\nTu [prowess|lE]: #V [SCOPE.GetRootScope.GetCharacter.GetProwess]#! [prowess_i]\n [prowess|E] de [rivals_child.GetFirstName]: #V [rivals_child.GetProwess]#! [prowess_i]"
 bp1_yearly.6001.victory_toast: "[rivals_child.GetFirstName] foi derrotad[rivals_child.Custom('ES_OA')] e enviad[rivals_child.Custom('ES_OA')] de volta"
 bp1_yearly.6002.trigger_failure: "Meu duelo contra [rivals_child.GetFirstNameNoTooltip] foi invalidado"
 defused_feud_escalation_opinion: "Desarmou a Escalada da Rixa"
 bp1_yearly.6003.t: "Algo Imprudente"
 bp1_yearly.6003.desc: "«¡Solo hice lo que debía para defender vuestro honor!».\n\n[rivals_child.GetFirstNameNoTooltip] muestra una peculiar mezcla de vergüenza y orgullo cuando me explica lo que pasó. Se ve que en su ansia por defender el nombre de la familia emboscó a mi enemig[attacked_rival.Custom('ES_OA')] [attacked_rival.GetTitledFirstName|l] en su hogar.\n\n[rivals_child.GetFirstNameNoTooltip] recibió una rápida humillación a manos de [attacked_rival.GetFirstNameNoTooltip] y ahora me [rivals_child.GetHerHim] han mandado de vuelta."
 bp1_yearly.6003.a: "Você se saiu bem, [rivals_child.Custom('GetDaughterSon')]"
 not_controlling_child_tooltip: "Você perderá prestígio por não conseguir controlar s [rivals_child.Custom('GetDaughterSon')]"
 bp1_yearly.6003.b: "Como você pôde fazer isso? Devemos compensar [attacked_rival.GetTitledFirstNameNoTooltip|l]"
 child_let_down_tooltip: "[rivals_child.GetFirstNameNoTooltip] ficará desapontad com sua falta de apoio"
 bp1_yearly.6004.t: "Matar uma[rivals_child.Custom('ES_XA')] [rivals_child.Custom('GetDaughterSon')]"
 bp1_yearly.6004.desc: "Ao olhar para o corpo de [rivals_child.GetFirstName], estou cada vez mais ciente de que este duelo terá consequências. Matei [rivals_child.Custom('ES_AlAla')] [rivals_child.Custom('GetDaughterSon')] de alguém que considero meu inimigo, e em breve o mundo saberá o que fiz."
 bp1_yearly.6004.a: "Devo oferecer minhas condolências a [my_rival.GetTitledFirstNameNoTooltip|l]."
 bp1_yearly.6004.b: "![my_rival.GetFirstNameNoTooltip] apenas colheu o que semeou!"
 killed_my_child: "Assassin do meu Filho"
 bp1_yearly.6005.t: "Retorno Triunfante?"
 bp1_yearly.6005.desc: ""Fiz o que tinha que fazer para defender a sua honra!".\n\n[rivals_child.GetFirstNameNoTooltip] mostra uma estranha mistura de forte orgulho e leve apreensão quando me explica o que aconteceu. Parece que, em seu ímpeto de defender o nome da família, emboscou meu inimig[attacked_rival.Custom('ES_OA')] [attacked_rival.GetTitledFirstName|l] em seu lar.\n\n[rivals_child.GetFirstNameNoTooltip] foi capaz de superar [attacked_rival.GetFirstNameNoTooltip] e derrotar[attacked_rival.GetHerHim] em combate singular."
 bp1_yearly.6005.a: "Uma lição valiosa para [attacked_rival.GetFirstNameNoTooltip]"
 rewarding_success_in_child_tooltip: "[rivals_child.GetFirstName] será recompensad"
 bp1_yearly.6005.b: "Isso está tudo errado! Devemos compensar [attacked_rival.GetTitledFirstNameNoTooltip|l]"
 bp1_yearly.6005.outcome_toast: "[rivals_child.GetFirstName] foi vitorios e nosso bom nome foi humilhado"
 bp1_yearly.6006.t: "Um Herói Retorna?"
 bp1_yearly.6006.desc: ""Eu fiz o que tinha de fazer para defender vossa honra!".\n\n[rivals_child.GetFirstNameNoTooltip] demonstra uma estranha mistura de orgulho forte e leve apreensão quando me explica o que aconteceu. Parece que, em seu empenho para defender o nome da família, emboscou meu inimig[attacked_rival.Custom('ES_OA')], [attacked_rival.GetTitledFirstName|l] em sua casa.\n\n[rivals_child.GetFirstNameNoTooltip] conseguiu derrotar [attacked_rival.GetFirstNameNoTooltip] e matar[attacked_rival.GetHerHim] em combate singular."
 bp1_yearly.6006.a: "Voc? me deixa orgulhos[ROOT.Char.Custom('ES_OA')], [rivals_child.Custom('GetDaughterSon')]"
 bp1_yearly.6006.outcome_toast: "[rivals_child.GetFirstName] derrotou e matou [my_rival.GetFirstName]"
 murdered_my_vassal_crime: "Assassinato"
 bp1_yearly.6006.b: "Como você pôde fazer isso? Devemos compensar [rivals_beneficiary.GetTitledFirstNameNoTooltip|l]"
 bp1_yearly.6006.c: "Uma doação para a caridade compensará a má ação"
 bp1_yearly.6006.c.tt: "[rivals_child.GetFirstNameNoTooltip] ficará desapontad com sua falta de apoio"
 defended_family_honor_opinion: "Defendeu a Honra da Família"
 attacked_by_rivals_child: "Família em Conflito"
 bp1_yearly.6010.t: "A perda de um[rivals_child.Custom('ES_XA')] [rivals_child.Custom('GetDaughterSon')]"
 bp1_yearly.6010.desc: "Parece que meu [rivals_child.Custom('GetDaughterSon')], [rivals_child.GetTitledFirstName|l], se inspirou no meu ódio contra meu rival, [attacked_rival.GetTitledFirstName|l], e assumiu como missão pôr fim à nossa rivalidade.\n\nImpulsionad[rivals_child.Custom('ES_OA')] pelo entusiasmo juvenil, emboscou [attacked_rival.GetFirstNameNoTooltip] e [rivals_child.GetHerHim] o matou sem piedade no combate que se seguiu."
 bp1_yearly.6010.desc.apology: "\n\nEsta notícia chega acompanhada de uma carta de [attacked_rival.GetTitledFirstNameNoTooltip|l] em pessoa que declara que, embora [rivals_child.GetFirstNameNoTooltip] tenha encontrado um fim justo por atacar alguém em sua casa, lamenta o que aconteceu e compensará economicamente minha perda."
 bp1_yearly.6010.a: "[attacked_rival.GetFirstNameNoTooltip] vai se arrepender deste dia!"
 bp1_yearly.6010.a.flavor: "Jure mais vingança contra [attacked_rival.GetFirstNameNoTooltip]"
 bp1_yearly.6010.b: "O que eu fiz!?"
 bp1_yearly.6010.b.flavor: "Tente evitar mais derramamento de sangue"
 bp1_yearly.6010.vengeance.outcome_toast: "[my_rival.GetFirstName] jurou vingar [rivals_child.GetFirstNameNoTooltip]"
 bp1_yearly.6010.deescalation.outcome_toast: "[my_rival.GetFirstName] soube da morte de [rivals_child.GetFirstNameNoTooltip]"
 every_child_6010: "Cada irmão de [rivals_child.GetFirstNameNoTooltip]"
 culture_tradition_events.2000.t: "Liderança Inspiradora"
 culture_tradition_events.2000.desc: "Mientras reflexiono sobre una petición de ayuda de mi vasall[inspiring_vassal.Custom('ES_OA')] , de repente caigo en lo buena que ha sido siempre mi relación con mi propi[ROOT.Char.GetLiege.Custom('ES_OA')] señor[ROOT.Char.GetLiege.Custom('ES_XA')], [ROOT.Char.GetLiege.GetTitledFirstName|l].\n\nSe me ocurre que haría bien en esforzarme por emular la conducta diligente de [ROOT.Char.GetLiege.GetFirstNameNoTooltip] en mi trato con todos con quienes tengo una obligación. De este modo, inspiraré el mismo sentido del deber en aquellos en deuda conmigo."
 culture_tradition_events.2000.a: "Pegue isso, [inspiring_vassal.GetTitledFirstNameNoTooltip|l], e me diga se precisar de mais."
 culture_tradition_events.2000.b: "Leal é apenas outra palavra para fraco."
 culture_tradition_events.2001.t: "Liderando Pelo Exemplo?"
 culture_tradition_events.2001.desc: "Una disputa reciente entre mi vasall[targeted_vassal.Custom('ES_OA')] [targeted_vassal.GetTitledFirstName|l] y sus súbditos ha requerido una visita repentina a [targeted_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Mi sola presencia parece haber resuelto el asunto y los campesinos locales parecen satisfechos de que haya escuchado sus quejas.\n\nMientras deambulo por pasillos vacíos a altas horas de la noche, reflexiono sobre mi decepcionante relación con mi propi[ROOT.Char.GetLiege.Custom('ES_OA')] señor[ROOT.Char.GetLiege.Custom('ES_XA')], [ROOT.Char.GetLiege.GetTitledFirstName|l]. Siempre se ha apresurado a la hora de exigir mi obediencia , pero pocas veces ha venido en mi ayuda como yo acabo de hacer por [targeted_vassal.GetTitledFirstNameNoTooltip|l]."
 culture_tradition_events.2001.a: "A reciprocidade é o que move o mundo, não o dever."
 culture_tradition_events.2001.b: "Devo lutar para ser melhor que [ROOT.Char.GetLiege.GetTitledFirstNameNoTooltip|l]."
