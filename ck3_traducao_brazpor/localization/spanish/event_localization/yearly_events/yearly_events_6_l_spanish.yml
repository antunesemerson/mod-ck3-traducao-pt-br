l_spanish:
 yearly.9100.t: "Problemas no Jardim"
 yearly.9100.desc: "Ao entrar nos jardins, mal tenho tempo de dar um passo antes de ouvir alguém gritando obscenidades. \"#EMP [gardener.Custom('CulturalCurse')|U]!#!\"\n\nDou a volta em uma cerca viva em busca da origem e encontro minha jardineir[gardener.Custom('ES_OA')], [gardener.Custom('ES_ElLa')] [gardener.GetTitledFirstName|l], trabalhando arduamente com uma carranca no rosto. [gardener.GetFirstName] percebe minha aproximação e rapidamente se levanta.\n\n\"Oh! Perdoe-me, [ROOT.Char.Custom('FormOfAddressForLiege')]. Não esperava que houvesse mais alguém por aqui... Algum animal estúpido, talvez uma [gardener.Custom('GetAnimalType')], arruinou #EMP todo#! o meu trabalho recente! Plantei essas ervas anteontem!\""
 yearly.9100.a: "Deixe-me ajudar!"
 yearly.9100.b: "Aqui está algo para o seu trabalho duro!"
 yearly.9100.c: "Isso #EMP é#! lamentável... Mas não pare por minha causa!"
 yearly.9100.a.tooltip_a: "Você aprende muito sobre jardinagem"
 yearly.9100.a.tooltip_b: "Você piorou a situação"
 yearly.9100.a.success: "Aprendi sobre jardinagem!"
 yearly.9100.a.failure: "Jardinagem é uma perda de tempo!"
 yearly.9110.t: "O Ladrão de Flores"
 yearly.9110.desc: "Meu jardineir[gardener.Custom('ES_OA')] [gardener.GetTitledFirstName|l] invade a sala do conselho e se aproxima furiosamente do meu [romantic_councillor.GetCouncilTitle], [romantic_councillor.GetTitledFirstName|l].\n\n\"Como #EMP você ousa#! destruir o jardim de [ROOT.Char.GetTitleTierName]?! E #EMP roubar#! flores raras e preciosas, nada menos!\"\n\n[romantic_councillor.GetFirstNameNoTooltip] não se abala com o gênio [gardener.Custom('ES_DelDela')] jardineir[gardener.Custom('ES_OA')]. \"Achei que seriam um presente perfeito para meu/minha [councillor_spouse.GetWifeHusband]. Ser romântico dificilmente é um crime, não é?\""
 yearly.9110.a: "Mas destruir meu jardim, sim. Você pagará pelos danos. Agora."
 yearly.9110.b: "Você está passando dos limites, [gardener.GetFirstNameNoTooltip]!"
 yearly.9110.c: "Estas flores serão um excelente presente... Para #EMP meu/minha#! [spouse.GetWifeHusband]."
 yearly.9110.d: "Eu #EMP não#! vou me envolver! Resolvam isso vocês mesmos."
 yearly.9120.t: "O Mercador de Sementes"
 yearly.9120.desc: "O mercado de [barony_market.GetName] está bastante movimentado, e um mercador em particular chama minha atenção. Parece que ele vende apenas caixinhas. Ao notar minha curiosidade, ele me chama.\n\n\"Tem interesse em algo especial, [ROOT.Char.Custom('FormOfAddressForLiege')]? Veja, todas essas caixinhas estão cheias de diferentes tipos de sementes. Algumas crescerão e se tornarão flores coloridas, outras ervas medicinais. Tenho até um tipo raro e venenoso, se isso lhe interessar?\""
 yearly.9120.a: "As venenosas, por favor... Para pesquisa, é claro."
 yearly.9120.b: "Flores exóticas certamente impressionarão meus jardins!"
 yearly.9120.c: "Ervas são sempre úteis. Eu vou levar essas."
 yearly.9120.d: "Por #EMP esses#! preços absurdos? Nem pensar!"
