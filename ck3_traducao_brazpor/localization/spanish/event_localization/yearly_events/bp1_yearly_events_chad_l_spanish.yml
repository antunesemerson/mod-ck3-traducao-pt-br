l_spanish:
 #bp1_yearly_events_chad
 bp1_yearly.3001.t: "Um Amigo de Verdade"
 bp1_yearly.3001.desc: "Ultimamente as coisas têm andado um pouco apertadas em meu [ROOT.Char.Custom( 'FortifiedBuilding' )]. Não importa o quanto eu arrecade em impostos, simplesmente não consigo fechar as contas!\n\n[friend.Custom('ES_ElLa')|U] [friend.GetTitledFirstNameNoTooltip|l], um[friend.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend'))], sempre tão diligente[friend.Custom('ES_OA')] , veio me visitar durante esta fase de má sorte. Ao conversarmos sobre meus problemas atuais, ele oferece abastecer meus cofres com um bom estímulo.\n\n[friend.GetFirstNameNoTooltip] segura minhas mãos e diz baixinho: «Deixe-me ajudá-lo [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend'))] meu[ROOT.Char.Custom('ES_OA')]. Sei que você faria o mesmo por mim»."
 bp1_yearly.3001.a: "Louvemos a [ROOT.Char.GetFaith.WealthGodName] por esta gloriosa surpresa!"
 bp1_yearly.3001.b: "Eu nunca poderia impor isso a um amigo."
 bp1_yearly.3001.c: "O que eu realmente preciso é de algumas bebidas..."
 bp1_yearly.3001.c.tt: "Você e [friend.GetFirstNameNoTooltip] desperdiçam dinheiro em favor de camaradagem e diversão"
 bp1_yearly.3001.d: "\"Você não poderia ceder um pouco mais?\""
 bp1_yearly.3002.t: "Um Amigo em Apuros"
 bp1_yearly.3002.desc: "Ao fazer uma visita a meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend'))], [friend.GetTitledFirstNameNoTooltip|l], percebo que as coisas estão bem diferentes da última vez que estive aqui, em [friend.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nAntes, servia [friend.Custom('GetExpensiveDrink')] e [friend.Custom('GetExpensiveDessert')] sempre que eu vinha, mas hoje mal se vêem migalhas por aí e só água enfeita a mesa.\n\nPergunto a [friend.GetFirstNameNoTooltip] se ele está passando por tempos difíceis. Com o olhar abatido, ele responde de maneira carrancuda: \"Você não faz ideia do quanto…\"."
 bp1_yearly.3002.a: "Eu devo ajudar no que puder."
 bp1_yearly.3002.b: "\"Bem, é melhor eu ir...\""
 bp1_yearly.3002.b.tt: "Você ignora s [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend'))] em seu momento de necessidade"
 bp1_yearly.3002.c: "Uma noite de festa fará bem a !"
 bp1_yearly.3002.c.tt: "Você e [friend.GetFirstNameNoTooltip] se entregam a uma noite de devassidão"
 bp1_yearly.3002.d: "Vamos dar uma olhada nos seus registros..."
 bp1_yearly.3002.d.tt: "Os registros financeiros são convocados para sua investigação"
 bp1_yearly.3003.desc: "Começo a examinar as despesas recentes do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend'))] [friend.GetFirstNameNoTooltip] para ver o que poderia ter levado a tal situação terrível. Identifico o problema imediatamente:\n\nHomens de armas: -1,8\nConfortos na [friend.Custom('GetCourt')]: -3,2\nNovo $court_physician_court_position$: -50\n#difficulty_hard Velas: -360 #!\nPresentes para [friend.Custom('GetCourtierPlural')]: -15\n\n“Velas? Vocês estão endividados por causa de umas #EMP velas#!?!”.\n\nEle responde timidamente, “[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('friend'))] meu[ROOT.Char.Custom('ES_OA')], em assuntos de administração, você é muito habilidoso. Por favor, ajude-me!”."
 bp1_yearly.3003.a: "\"Vou ajudar você, mas só desta vez...\""
 bp1_yearly.3003.b: "\"Gaste menos com velas.\""
 bp1_yearly.3004.t: "Um Barulho Estranho"
 bp1_yearly.3004.desc: "Retorno ao meu [ROOT.Char.Custom('FortifiedBuilding')] após uma longa e solitária caminhada. Mais um ano se passou, mais um ano mais velh[ROOT.Char.Custom('ES_OA')]…\n\nNasci neste dia há [ROOT.Char.GetAge] anos. Quanto mais velho fico, mais valorizo as relações que cultivei ao longo dos anos…"
 bp1_yearly.3004.spouse: "Por isso me entristece não ter sabido nada hoje da minha [ROOT.Char.Custom2('RelationToMe', ROOT.Char.GetPrimarySpouse)] , [ROOT.Char.GetPrimarySpouse.GetFirstName] nem de nenhum dos meus amigos.\n\n"
 bp1_yearly.3004.friends: "Então me entristece que eu não tenha ouvido nada dos meus amigos hoje, como [friend1.GetTitledFirstName|l], [friend2.GetTitledFirstName|l], ou de nenhum dos meus outros amigos.\n\n"
 bp1_yearly.3004.end: "Sigo para os meus aposentos, a solidão impedindo meus passos preguiçosos, quando ouço um #EMP clangor#! e sussurros abafados vindo do corredor."
 bp1_yearly.3004.a: "\"O que poderia ser a esta hora?\""
 bp1_yearly.3004.b: "\"Qual é a fuga mais rápida? Rappel pela janela!\""
 bp1_yearly.3005.t: "Feliz Aniversário!"
 bp1_yearly.3005.desc: "Que surpresa! Todos os meus amigos mais próximos e queridos se reuniram para me desejar o melhor ao começar este próximo ano de vida. Há até uma mesa inteira repleta de [ROOT.Char.Custom('GetExpensiveDessert')], #EMP minha sobremesa favorita!#! E eu pensando que todos tinham me esquecido.\n\nNão consigo acreditar que [party_host.GetFirstName] tenha se dado ao trabalho de organizar isso em segredo. Não fazia ideia de que estivessem planejando essa surpresa.\n\nMeu amig[friend2.Custom('ES_OA')] [friend2.GetFirstName] se aproxima de mim, lutando para carregar três pacotes lindamente embrulhados. Sempre com suas brincadeiras, diz: \"Tenho três presentes para escolher. Um será seu, mas qual?\"."
 bp1_yearly.3005.a: "\"Vou pegar o maior!\""
 bp1_yearly.3005.b: "\"O de tamanho médio será perfeito.\""
 bp1_yearly.3005.c: "\"As coisas boas vêm em pequenas embalagens.\""
 bp1_yearly.3005.a.tt: "Você recebe o presente grande"
 bp1_yearly.3005.b.tt: "Você recebe o presente de tamanho médio"
 bp1_yearly.3005.c.tt: "Você recebe o presente pequeno"
 bp1_yearly.3005.t.gift: "Presente de aniversário recebido"
 bp1_yearly.3005.opinion.tt: "Você ganha #P 30#! de [opinion|lE] de cada [friend|lE]"
 bp1_yearly.3006.t: "Relembrando Aniversários Passados"
 bp1_yearly.3006.desc: "Conforme completo mais um ano hoje, lembro-me da esplêndida festa de aniversário que meus amigos [friend1.GetFirstName] e [friend2.GetFirstName] organizaram para mim há vários anos. Como foi alegre sentir a bondade e o calor da nossa amizade tão evidentes!\n\n"
 bp1_yearly.3006.desc.friend1_dead: "[friend1.GetFirstName] já faleceu e lamento a perda de um tão grande amig[friend1.Custom('ES_OA')]. Esteve ao meu lado nas alegrias e nas dificuldades, sempre conseguindo arrancar um sorriso do meu rosto nos momentos tristes.\n\n"
 bp1_yearly.3006.desc.friend2_dead: "[friend2.GetFirstNameNoTooltip] já faleceu e choro a perda de uma amizade tão grande.[friend2.Custom('ES_OA')] Esteve ao meu lado nos bons e maus momentos, sem deixar de me arrancar um sorriso nos momentos tristes. Embora [friend2.GetFirstNameNoTooltip] tenha partido, guardo com carinho as lembranças que tenho de [friend2.GetSheHe].\n\n"
 bp1_yearly.3006.desc.artifact_positive: "Lembro-me como se fosse ontem: nós nos banquetamos e dançamos, e eles até me presentearam com um presente maravilhoso!\n\n"
 bp1_yearly.3006.desc.artifact_negative: "Lembro-me como se fosse ontem: festejamos e dançamos, e até me deram um presente maravilhoso! Mas isso foi antes de tudo azedar entre nós. Agora, minhas lembranças estão manchadas pela traição de [friend2.GetFirstName].\n\n"
 bp1_yearly.3006.desc.artifact_exists: "Acho que ainda tenho meu [old_bday_gift.GetName] guardado em algum lugar.."
 bp1_yearly.3006.a: "É doce relembrar os velhos tempos."
 bp1_yearly.3006.b: "Nunca vou te esquecer, meu amigo."
 bp1_yearly.3006.c: "Queime isso e me faça esquecer daquele[friend2.Custom('ES_EA')] canalha!"
 bp1_yearly.3006.d: "Maldit[friend2.Custom('ES_OA')] seja. Espero que apodreça no inferno."
 bp1_yearly.3007.t: "A Habilidade da Família"
 bp1_yearly.3007.desc: "Estou terminando os assuntos do dia em minha [ROOT.Char.Custom('GetChamber')] quando minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('spouse'))], [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l], aparece por aqui com sua [spouse.Custom2('RelationToMeShort',SCOPE.sC('inspired_family_member'))] [inspired_family_member.GetFirstName] atrás, seguindo-a com grande entusiasmo. Deixo o livro-caixa que estava lendo, sabendo que nada de bom sairá desta visita inesperada.\n\n"
 bp1_yearly.3007.desc.tapestry: "[spouse.GetFirstNameNoTooltip] hesitante comenta sobre os móveis do [ROOT.Char.Custom('GetRoom')].\n\"Essas paredes nuas não deixam você um pouco louco? Eu sei exatamente o que esse [ROOT.Char.Custom('GetRoom')] precisa: #EMP Tapeçarias!#!\"\n\n\"M [spouse.Custom2('RelationToMeShort',SCOPE.sC('inspired_family_member'))] é #EMP excelente#! com uma agulha e linha."
 bp1_yearly.3007.desc.regalia: "[spouse.GetFirstNameNoTooltip] comenta, hesitante, minha aparência.\n\"[spouse.Custom2('RelationToMeShort', ROOT.Char)] meu[ROOT.GetCharacter.Custom('ES_OA')], sois um[ROOT.GetCharacter.Custom('ES_XA')] [ROOT.GetCharacter.GetTitleAsNameNoTooltip|l], mas alguns ainda não lhe concedem o respeito que merece. Precisa de algo que demonstre sua autoridade!\".\n\n\"Meu [spouse.Custom2('RelationToMeShort',SCOPE.sC('inspired_family_member'))] poderia forjar-vos um conjunto #EMP estupendo#! de insígnias que reflitam sua posição."
 bp1_yearly.3007.desc.conc: "Patrocine[inspired_family_member.GetHerHim] e veja como a criação dele(a) irá melhorar seu humor!\""
 bp1_yearly.3007.a.tapestry: "\"Eu estava pensando exatamente a mesma coisa! Isso aqui está terrível!\""
 bp1_yearly.3007.a.regalia: "\"Já passou da hora de eu conquistar algum respeito!\""
 bp1_yearly.3007.b: "\"Não temos um centavo para gastar com esses luxos...\""
 bp1_yearly.3100.t: "Um Cortesão Entre Amigos"
 bp1_yearly.3100.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('3100_courtier_liege'))], [3100_courtier_liege.Custom('ES_ElLa')] [3100_courtier_liege.GetTitledFirstName|l] me honrou com uma visita e trouxe um de seus [3100_courtier_liege.Custom('GetCourtierPlural')] consigo. [3100_courtier_liege.GetFirstNameNoTooltip] se aproxima de mim, animado:\n\n«Prazer em conhecê-lo, [ROOT.Char.GetTitledFirstNameNoTooltip|l]! Alegra-me ver que prospera aqui em [ROOT.Char.GetCapitalLocation.GetName]. Ocorru-me que [3100_target_courtier.GetFirstName], aqui presente, poderia ser de utilidade em sua [ROOT.Char.Custom('GetCourt')]."
 bp1_yearly.3100.desc.diplomacy: "[3100_target_courtier.GetSheHe|U] é um[3100_target_courtier.Custom('ES_XA')] diplomátic[3100_target_courtier.Custom('ES_OA')] de um talento incrível, com uma lábia única!"
 bp1_yearly.3100.desc.intrigue: "[3100_target_courtier.GetSheHe|U] tem inúmeras formas de influenciar e maneiras de cuidar das coisas… #EMP con discreción#!."
 bp1_yearly.3100.desc.martial: "[3100_target_courtier.GetSheHe|U] é um[3100_target_courtier.Custom('ES_XA')] estrategista de talento incrível. Sua mente está sempre a elaborar possíveis táticas."
 bp1_yearly.3100.desc.stewardship: "[3100_target_courtier.GetSheHe|U] é um[3100_target_courtier.Custom('ES_XA')] administrador[3100_target_courtier.Custom('ES_XA')] de um talento incrível!"
 bp1_yearly.3100.desc.learning: "[3100_target_courtier.GetSheHe|U] é um[3100_target_courtier.Custom('ES_XA')] erudito[3100_target_courtier.Custom('ES_OA')] de talento incrível. [3100_target_courtier.Custom('ES_ElLa')|U] o mais brilhante com quem já estudei!"
 bp1_yearly.3100.desc.prowess: "![3100_target_courtier.GetSheHe|U] tem a constituição de um urso e mais do que o dobro da sua força!"
 bp1_yearly.3100.desc.conc: "Eu gostaria de empregar[3100_target_courtier.GetHerHim] pessoalmente, mas, ah, infelizmente não parece possível.\n\nEu odiaria ver seu grande talento ser desperdiçado. Não gostaria de acolher[3100_target_courtier.GetHerHim] e liberar todo o seu potencial?\"."
 bp1_yearly.3100.a: "Eu sei exatamente onde [3100_target_courtier.GetSheHe] pode se encaixar!"
 bp1_yearly.3100.b: "Eu devo educadamente declinar."
 bp1_yearly_3100_courtier_gained: "[ROOT.Char.Custom('GetCourtier')|U] habilidoso recrutado"
 bp1_yearly.3101.t: "Um Condado Entre Amigos"
 bp1_yearly.3101.desc: "[target_title_holder.GetTitledFirstName] veio me ver com uma grande proposta. Sabe que tenho um direito legítimo sobre o [target_title.GetName] e finalmente decidiu reconhecê-lo.\n\n«Amig[ROOT.Char.Custom('ES_OA')] mí[ROOT.Char.Custom('ES_OA')]», diz. «Desejo muito conceder-vos o [target_title.GetNameNoTierNoTooltip], já que ele vos pertence. Contudo, não posso fazê-lo sem receber algo em troca, para não voltar ao meu povo de mãos vazias».\n\n«Dai-me algo para mostrar ao meu povo quando eu voltar para [target_title_holder.GetCapitalLocation.GetName] e [target_title.GetNameNoTierNoTooltip] será vosso»."
 bp1_yearly.3101.a: "\"Eu aceito graciosamente! Isso deve ser suficiente...\""
 bp1_yearly.3101.b: "\"Eu não poderia aceitar [target_title.GetNameNoTierNoTooltip] dessa forma.\""
 bp1_yearly.3201.opening: "[host.Custom2('AppropriateGreeting', ROOT.Char)]"
 bp1_yearly.3201.desc: "Convido você para um banquete em minha corte em [host.GetCapitalLocation.GetTitle.GetNameNoTier]! Será um grande evento, com comida deliciosa e entretenimento."
 bp1_yearly.3202.t: "Banquete de um Tolo"
 bp1_yearly.3202.desc: "Entro no/a [host.Custom( 'FortifiedBuilding' )] de [host.GetTitledFirstNameNoTooltip|l] esperando o grande e alegre banquete para o qual fui convidado, mas não há ninguém! Depois de procurar um pouco, encontro [host.GetFirstNameNoTooltip] e meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('enemy'))] [enemy.GetFirstNameNoTooltip] conversando sobre [ROOT.GetCharacter.GetFaith.HighGodName] sabe-se lá o quê.\n\nSurpres [host.Custom('ES_OA')] com minha entrada repentina, [host.GetFirstNameNoTooltip] se vira para mim e pergunta por que apareci sem avisar.\n\n\"Eu pensei... vocês me convidaram para um banquete hoje... ?\".\n\n[host.GetSheHe|U] me explica que estou enganado e então me dá uma lição sobre etiqueta cortesã. Enquanto isso, [enemy.GetFirstNameNoTooltip] não consegue parar de rir sozinho(a) enquanto meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))] me humilha completamente."
 bp1_yearly.3202.a: "\"Peço desculpas, [host.GetTitledFirstNameNoTooltip|l]...\""
 bp1_yearly.3202.a.liege: "\"Perdoe-me, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))] meu[host.Custom('ES_OA')]…\"."
 bp1_yearly.3202.b: "\"Você deve acreditar que [enemy.GetFirstNameNoTooltip] me armou uma cilada!\""
 bp1_yearly.3202.b.success: "Você convence [host.GetTitledFirstNameNoTooltip|l] da má conduta de [enemy.GetFirstNameNoTooltip]"
 bp1_yearly.3202.b.failure: "Você não consegue convencer [host.GetTitledFirstNameNoTooltip|l] da má conduta de [enemy.GetFirstNameNoTooltip]"
 bp1_yearly.3202.c: "\"Está na hora de encerrar esses jogos, [enemy.GetFirstNameNoTooltip].\""
 bp1_yearly.3202.c.tt: "#V Te bates con#! [enemy.GetFirstName].\n#weak Este duelo NO es a muerte, aunque la muerte siempre acecha.#!\nSe você vencer, a verdade do que aconteceu aqui virá à tona. Se perder, [enemy.GetFirstNameNoTooltip] terá realmente lhe derrotado.\n\nSeu [prowess|lE]: #V [root_for_loc.GetProwess]#! [prowess_i]\n[prowess|E] de [enemy.GetFirstName]: #V [enemy.GetProwess]#! [prowess_i]"
 bp1_yearly.3203.sc_result_won: "Você venceu em um duelo contra [sc_loser.GetTitledFirstNameNoTooltip|l]"
 bp1_yearly.3203.sc_result_lost: "Você perdeu em um duelo contra [sc_victor.GetTitledFirstNameNoTooltip|l]"
 bp1_yearly.3204.sc_invalid: "Seu duelo contra [enemy.GetTitledFirstNameNoTooltip|l] foi invalidado"
 bp1_yearly.3300.t: "Refletindo sobre [ROOT.Char.GetFaith.HighGodName]"
 bp1_yearly.3300.desc: "Enquanto estou sentado e meditando sobre os detalhes mais finos da [ROOT.Char.GetFaith.GetName], não posso deixar de pensar no momento em que [pilgrimage_memory.GetDescription]. Essa viagem estava longe do conforto cotidiano da minha vida como [ROOT.Char.GetTitleAsNameNoTooltip|l], mas o alívio que senti ao chegar em [pilgrimage_destination.GetName] tornou tudo isso valer a pena."
 bp1_yearly.3300.a: "Acredito que sempre me sentirei mais próximo de [ROOT.Char.GetFaith.HighGodName]."
 bp1_yearly.3301.desc: "Ao sentar-me e meditar sobre os aspectos mais refinados de [ROOT.Char.GetFaith.GetName], não consigo evitar lembrar quando [pilgrimage_memory.GetDescription]. Essa viagem esteve longe dos confortos cotidianos da minha vida como [ROOT.Char.GetTitleAsNameNoTooltip|l], mas o alívio que senti ao chegar a [pilgrimage_destination.GetName] fez com que todo o esforço valesse a pena.\n\nAproximar-me de [pilgrimage_friend.GetFirstName] foi certamente um benefício adicional. Com certeza, o tempo que passamos juntos nessa peregrinação foi muito agradável."
 bp1_yearly.3301.a: "Sempre me sentirei mais próximo tanto de [ROOT.Char.GetFaith.HighGodName] quanto de [pilgrimage_friend.GetFirstNameNoTooltip]."
