l_spanish:
 head_of_faith.0000.new_faith_submitted_for_hook: "[ROOT.Char.GetTitledFirstName] se submeteu ao seu califado"
 head_of_faith.0000.wishes_to_schism_caliphate_flag_added: "Abandonar o seu califado escolhido será mais fácil durante a sua vida"
 head_of_faith.0000.t: "Herdeiros do Profeta"
 head_of_faith.0000.desc: "e todos os verdadeiros crentes esperam de mim, como membro preeminente da fé, que eu me comprometa com um califa existente.

Só ao me submeter à autoridade suprema abaixo de [ROOT.Char.GetFaith.HighGodName] obterei minha própria autoridade, independentemente de nossas demais diferenças teológicas.

A questão principal diante de mim é, claro, a #EMP quem#!, embora os mais inteligentes entre nós também perguntem com quanta #EMP sinceridade#!, eu irei jurar lealdade..."
 head_of_faith.0001.t: "[sunni_caliph.GetTitledFirstNameNoTooltip|l] tem nossa lealdade #EMP atual#!..."
 head_of_faith.0001.desc: "Seguiremos [old_caliph.Custom('ES_AlAla')] [old_caliph.GetTitledFirstNameNoTooltip|l]... por enquanto."
 head_of_faith.0001.a: "$head_of_faith.0000.t$: Xiita"
 head_of_faith.0001.b: "[ROOT.Char.GetFaith.GetName] segue a linha infalível de Ali, $head_of_faith.0000.desc$"
 head_of_faith.0001.c: "O pensamento xiita dominante nos chama."
 head_of_faith.0001.d: "$head_of_faith.0001.b$"
 head_of_faith.0011.t: "[shia_caliph.GetTitledFirstNameNoTooltip|l] nos comanda. Por enquanto."
 head_of_faith.0011.desc: "$head_of_faith.0001.d$"
 head_of_faith.0011.a: "$head_of_faith.0000.t$: Muhakkima"
 head_of_faith.0011.b: "Rejeitar a política vulgar de sunitas e xiitas fez com que [ROOT.Char.GetFaith.GetName|l] aderisse ao ramo Muhakkima do Islã. Embora os membros comuns do movimento não esperem que eu prometa submissão a um califa existente, talvez aceitem um se eu deixar clara a minha lealdade."
 head_of_faith.0011.c: "Podemos eleger nossos próprios líderes."
 head_of_faith.0011.d: "$head_of_faith.0001.b$"
 head_of_faith.0021.t: "$head_of_faith.0000.t$: Zandaqa"
 head_of_faith.0021.desc: "Como Zandaqa, pouco nos importa como as outras seitas islâmicas traçam a linha da sucessão do Profeta, e elas também não gostam de nós. Certamente, meus companheiros [ROOT.Char.GetFaith.GetAdherentNamePlural] não esperam que eu declare nossa submissão a qualquer califa existente.

Contudo, talvez ao jurar lealdade a uma das grandes potências do Islã possamos comprar uma medida de segurança e tolerância para a nossa fé..."
 head_of_faith.0021.a: "$head_of_faith.0021.a$"
 head_of_faith.0021.b: "$head_of_faith.0001.a$"
 head_of_faith.0031.t: "$head_of_faith.0011.a$"
 head_of_faith.0031.desc: "Como Zandaqa, pouco nos importa como as outras seitas islâmicas traçam a linha da sucessão do Profeta, e elas também não gostam de nós. Certamente, meus companheiros [ROOT.Char.GetFaith.GetAdherentNamePlural] não esperam que eu declare nossa submissão a qualquer califa existente.

Contudo, talvez ao jurar lealdade a uma das grandes potências do Islã possamos comprar uma medida de segurança e tolerância para a nossa fé..."
 head_of_faith.0031.a: "Você é forçado a seguir seu próprio caminho de qualquer maneira"
 head_of_faith.0031.b: "@piety_level_0_icon_islam! [sunni_caliph.GetTitledFirstNameNoTooltip] $head_of_faith.0031.rejection_body$"
 head_of_faith.0031.c: "@piety_level_3_icon_islam! [sunni_caliph.GetTitledFirstNameNoTooltip] $head_of_faith.0031.acceptance_body$"
 head_of_faith.0031.d: "@piety_level_0_icon_islam! [shia_caliph.GetTitledFirstNameNoTooltip] $head_of_faith.0031.rejection_body$"
 head_of_faith.0031.rejection_body: "@piety_level_3_icon_islam! [shia_caliph.GetTitledFirstNameNoTooltip] $head_of_faith.0031.acceptance_body$"
 head_of_faith.0031.acceptance_body: "@piety_level_0_icon_islam! [old_caliph.GetTitledFirstNameNoTooltip] $head_of_faith.0031.rejection_body$"
 head_of_faith.0031.rejection.outcome: "@piety_level_3_icon_islam! [old_caliph.GetTitledFirstNameNoTooltip] $head_of_faith.0031.acceptance_body$"
 head_of_faith.0031.b.rejection: "Juramento de Fé"
 head_of_faith.0031.b.acceptance: "[pledge_target.Custom('ES_AlAla')|U] [pledge_target.GetTitledFirstNameNoTooltip|l], nós, os [pledgeing_individual.GetFaith.GetAdherentNamePlural], desejamos jurar lealdade a você e tê-l[pledge_target.Custom('ES_LoLa')] como [head_of_faith|lE].

Você nos acolherá sob sua orientação?"
 head_of_faith.0031.c.rejection: "@piety_level_3_icon_islam! Claro, como eu poderia dizer não?"
 head_of_faith.0031.c.acceptance: "@piety_level_0_icon_islam! Fora com vocês, mendigos vis!"
 head_of_faith.0031.d.rejection: "[pledge_target.GetTitledFirstNameNoTooltip] aceitou seu juramento!"
 head_of_faith.0031.d.acceptance: "[pledge_target.GetTitledFirstNameNoTooltip] rejeitou seu juramento!"
 head_of_faith.0032.t: "Juramento de Fé"
 head_of_faith.0032.desc: "[pledge_target.Custom('ES_AlAla')|U] [pledge_target.GetTitledFirstNameNoTooltip|l], nós, os [pledgeing_individual.GetFaith.GetAdherentNamePlural], desejamos jurar lealdade a você e tê-l[pledge_target.Custom('ES_LoLa')] como [head_of_faith|lE].

Você nos acolherá sob sua orientação?"
 head_of_faith.0032.a: "@piety_level_3_icon_islam! Claro, como eu poderia dizer não?"
 head_of_faith.0032.b: "@piety_level_0_icon_islam! Fora com vocês, mendigos vis!"
 head_of_faith.0032.notif.a: "[pledge_target.GetTitledFirstNameNoTooltip] aceitou seu juramento!"
 head_of_faith.0032.notif.b: "[pledge_target.GetTitledFirstNameNoTooltip] rejeitou seu juramento!"
