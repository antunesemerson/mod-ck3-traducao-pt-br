 religious_interaction.1.opening: "[recipient.Custom2('AppropriateGreeting', ROOT.Char)]"
 religious_interaction.1.desc: "Depois de muita oração e deliberação, decidi conceder seu pedido de se divorciar de seu[secondary_recipient.Custom('ES_OA')] [secondary_recipient.GetWifeHusband], [secondary_recipient.GetFirstNameNoTooltip],"
 religious_interaction.1.consanguinity: "com base na consanguinidade."
 religious_interaction.1.fallback: "com base em suspeita de adultério."
 religious_interaction.1.adultery: "com base em adultério."
 religious_interaction.1.different_faith: "com base em não aderirem à verdadeira fé."
 religious_interaction.1.eunuch: "com base na falta de capacidade adequada."
 religious_interaction.1.a: "Sinto muito, [secondary_recipient.GetFirstNameNoTooltip]."
 religious_interaction.2.desc: "Depois de muita deliberação, decidi, para o bem de nossa casa, conceder vosso pedido de divórcio de vostr[secondary_recipient.Custom('ES_OA')] [secondary_recipient.GetWifeHusband], [secondary_recipient.GetFirstNameNoTooltip],"
 religious_interaction.2.infertility: "com base em sua recusa em consumar o casamento."
 religious_interaction.2.adultery: "com base em sua violação da santidade do casamento ao se relacionar com outra pessoa."
 religious_interaction.3.desc: "Considerei sua situação e decidi conceder seu pedido."
 religious_interaction.3.defensive_war: "Que estes fundos o ajudem a defender a fé contra [war_target.GetTitledFirstName|l] e suas hordas invasoras da fé [war_target.GetFaith.GetAdjective]!"
 religious_interaction.2.offensive_war: "Que estes fundos lhe tragam a vitória na sua guerra contra [war_target.GetTitledFirstName|l]!"
 religious_interaction.3.fallback: "Que esses fundos o ajudem a espalhar a verdadeira fé em suas terras!"
 religious_interaction.3.a: "Louvado seja [ROOT.Char.GetFaith.WealthGodName], aqui vem o reembolso de impostos!"
 religious_interaction.3.b: "Esses fundos me trarão vitória!"
 religious_interaction.3.c: "Usarei essa riqueza com sabedoria."
 religious_interaction.3.d: "Este ouro curará meus cofres vazios!"
 religious_interaction.32.desc: "Considerei seu pedido e decidi rejeitá-lo."
 religious_interaction.32.a: "Oh não!"
 religious_interaction.4.desc: "Ponderei seu pedido e decidi reconhecer sua reivindicação sobre o [target.GetName]."
 religious_interaction.4.child: "Como [secondary_recipient.GetTitledFirstName|l] é apenas uma criança, você tem o direito de intervir."
 religious_interaction.4.they_are_female: "Como [secondary_recipient.GetTitledFirstName|l] é uma mulher, você tem o direito de intervir."
 religious_interaction.4.they_are_male: "Como [secondary_recipient.GetTitledFirstName|l] é um homem, você tem o direito de intervir."
 religious_interaction.4.fallback: "Veio à tona prova irrefutável de que seus ancestrais realmente governaram a terra em tempos antigos."
 religious_interaction.4.a: "Provarei que sou um[ROOT.Char.Custom('ES_XA')] governante digno[ROOT.Char.Custom('ES_OA')]!"
 religious_interaction.42.desc: "Considerei seu pedido de reivindicação sobre o [target.GetName] e decidi rejeitá-lo."
 religious_interaction.42.a: "Maldição!"
 religious_interaction.5.child: "Devido à sua minoridade,"
 religious_interaction.5.they_are_female: "Devido ao seu status de mulher,"
 religious_interaction.5.they_are_male: "Devido ao seu status de homem,"
 religious_interaction.5.fallback: "Devido à sua evidente falta de piedade,"
 religious_interaction.5.outro: "uma condição que preocupa enormemente a Igreja,"
 religious_interaction.5.outro_different_recipient: "Concedi a [actor.GetName] um direito sobre [target.GetName], conforme solicitado."
 religious_interaction.5.self: "decidi reivindicar meus direitos sobre [target.GetName], pois isso me corresponde."
 religious_interaction.5.a: "Isso é um ultraje!"
 religious_interaction.6.opening: "[recipient.Custom2('AppropriateGreeting', ROOT.Char)]"
 religious_interaction.6.desc: "Depois de muita oração e deliberação, decidi conceder seu pedido de divorciar [secondary_actor.GetFirstNameNoTooltip] e seu [secondary_recipient.GetWifeHusband] , [secondary_recipient.GetFirstNameNoTooltip] ,"
 religious_interaction.6.consanguinity: "com base na consanguinidade."
 religious_interaction.6.fallback: "com base em suspeita de adultério."
 religious_interaction.6.adultery: "com base em adultério."
 religious_interaction.6.different_faith: "com base em não aderirem à verdadeira fé."
 religious_interaction.6.eunuch: "com base na falta de capacidade adequada."
 religious_interaction.6.a: "Sinto muito, [secondary_recipient.GetFirstNameNoTooltip]."
 religious_interaction.1001.t.fatwa: "Fatwa Emitida!"
 religious_interaction.1001.t: "Condenação Legal!"
 religious_interaction.1001.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))], [actor.GetTitledFirstName|l], me condenou como pecador em um mandado expedido por seus [actor.GetFaith.PriestNeuterPlural]!

Isso poderia ser usado como base legal para argumentar que sou indign[ROOT.Char.Custom('ES_OA')] de governar as terras [recipient.GetFaith.GetAdjective]s."
 religious_interaction.1001.a: "Se [actor.GetSheHe] não fosse meu suserano[actor.Custom('ES_XA')], eu teria…"
 religious_interaction.1001.a.revoke_tt: "É louvável que você procure expiar seus pecados. Aceito sua generosa doação e envio-lhe minha bênção em troca."
 #Religious Head of Faith Interactions
 religious_interaction.1010: "Ouvi notícias perturbadoras de [actor.GetTitledFirstName] sobre suas transgressões."
 religious_interaction.1011: "Você pode dizer que professa a fé [actor.GetFaith.GetAdjective], mas suas ações demonstram que você não segue de verdade o caminho de [actor.GetFaith.HighGodName]. Como não posso permitir que esconda seu comportamento perverso sob a máscara da retidão [actor.GetFaith.GetAdjective], não me resta alternativa senão excomungá-lo da fé. Que [actor.GetFaith.HighGodName] tenha piedade da sua alma."
 religious_interaction.1020: "As histórias que me contais sobre as malfeitorias de [secondary_recipient.GetTitledFirstName|l]. Dói-me fazê-lo, mas concordo que, pelo bem da fé [actor.GetFaith.GetAdjective], [secondary_recipient.GetSheHe] deve ser excomungad[secondary_recipient.Custom('ES_OA')]."
 religious_interaction.1021: "O que você está pensando ao tentar excomungar um companheiro [actor.GetFaith.GetAdherentName]? A fé [actor.GetFaith.GetAdjective] não é uma ferramenta para ser usada em benefício político! Considere-se sortudo por eu não excomungá-lo por fazer tal pedido."
 religious_interaction.1022: "Vejo que vocês realmente se arrependeram dos seus pecados e se esforçaram bastante para se redimir. Embora as suas transgressões contra a fé [actor.GetFaith.GetAdjective] foram de fato graves, suas ações recentes me fazem crer que vocês merecem outra chance.\n\nÀ luz de tudo isso, eu aqui revogo a sua excomunhão e dou as boas-vindas de volta à fé [actor.GetFaith.GetAdjective]."
 religious_interaction.1023: "Você acha que excomungo as pessoas levianamente? Acha que um pedido de desculpas sem convicção é suficiente para se redimir? Implore o quanto quiser; você não será readmitido na fé [actor.GetFaith.GetAdjective] até provar que mudou seus caminhos malignos."
 religious_interaction.1024: "Após muito tempo de contemplação, concluí que suas palavras eram verdadeiras e sábias. Eu me juntarei a uma ordem monástica e começarei uma nova vida em serviço exclusivo a [actor.GetFaith.HighGodName]."
 religious_interaction.1025: "Sua sugestão de que eu mude toda a minha vida e me retire para algum mosteiro isolado é absurda. Estou feliz onde estou, e não tenho planos de mudar isso."
 religious_interaction.1030: "Estou contente que [recipient.GetFirstNameNoTooltip] tenha visto a sabedoria em meu pedido."
 religious_interaction.1031: "Muito infeliz..."
 religious_interaction.1000.positive: "Maldição!"
 religious_interaction.1000.negative: "Estou contente que [recipient.GetFirstNameNoTooltip] tenha visto a sabedoria nessa ação."
 religious_interaction.1000.strong_negative: "Decidi seguir você na luz e me converter a [ROOT.Char.GetFaith.GetName]!"
 religious_interaction.1024.positive: "Louvado seja [ROOT.Char.GetFaith.HighGodName]!"
 religious_interaction.2002.desc: "Minha fé é forte demais para ser influenciada por suas palavras terrenas. Eu prefiro alcançar minha recompensa em [recipient.GetFaith.DivineRealm]."
 religious_interaction.2002.a: "\n\nTambém quero lembrar-vos de que vocês me devem, e é melhor não me perseguirdes por eu ser simplesmente um[recipient.Custom('ES_XA')] verdadeir[recipient.Custom('ES_OA')] crente."
 religious_interaction.2003.desc: "Eu só desejava sua salvação."
 religious_interaction.2003.hooking_out: "Bem, você pagará o preço neste mundo!"
 religious_interaction.2003.a: "Não pense que vou deixar você escapar impune!"
 religious_interaction.2003.b: "Ah, acho que você vai acreditar exatamente no que eu disser."
 religious_interaction.2003.c: "Eu me uniria com alegria à sua exultação, mas o custo total de reformar [recipient.GetFaith.HouseOfWorshipPlural] e de fazer proselitismo entre meus camponeses…

Se você se dispuser a pagar por esses esforços, estarei mais do que dispost[recipient.Custom('ES_OA')] a rezar ao seu [ROOT.Char.GetFaith.HighGodName]."
 religious_interaction.2003.d: "Qualquer coisa pela fé."
 religious_interaction.2011.desc: "Eu me uniria com alegria à sua exultação, mas o custo total de reformar [recipient.GetFaith.HouseOfWorshipPlural] e de fazer proselitismo entre meus camponeses…

Se você se dispuser a pagar por esses esforços, estarei mais do que dispost[recipient.Custom('ES_OA')] a rezar ao seu [ROOT.Char.GetFaith.HighGodName]."
 religious_interaction.2011.a: "Aceito, pelo bem dos fiéis em todos os lugares."
 religious_interaction.2011.b: "Não vou negociar por sua alma!"
 religious_interaction.2011.c: "Você tem outras dívidas para me pagar, primeiro."
 religious_interaction.2012.desc: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 religious_interaction.2012.a: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]\nÉ hora de que me sigais para a luz, meu [actor.Custom2('RelationToMe', SCOPE.sC('recipient'))]. Em consideração por tudo o que me deveis, eu vos exijo que vos convertais ao [actor.GetFaith.GetName]!"
 religious_interaction.2012.b: "Eu… Muito bem, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))]."
 religious_interaction.2012.c: "Você tem outras dívidas para me pagar, primeiro."
 religious_interaction.2021.opening: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 religious_interaction.2021.desc: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]\nÉ hora de que me sigais para a luz, meu [actor.Custom2('RelationToMe', SCOPE.sC('recipient'))]. Em consideração por tudo o que me deveis, eu vos exijo que vos convertais ao [actor.GetFaith.GetName]!"
 religious_interaction.2021.a: "Eu… Muito bem, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))]."
 #######################################################
 ### Sun Trial by Mathilda Bjarnehed & Nick Meredith ###
 #######################################################
 #I have been left in the sun to die!
 religious_interaction.2100.t: "O sol brilha com força, seus raios atravessam a copa das árvores. Logo avisto meu carcereir[imprisoner.Custom('ES_OA')], [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l], atravessar com dificuldade o matagal acompanhado de [imprisoner.Custom('DefaultPriestTitlePlural')].

"
 religious_interaction.2100.desc: "O sol castiga o deserto com força e se reflete na superfície do oásis. Logo vejo meu carcereir[imprisoner.Custom('ES_OA')], [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l], atravessando suas águas na companhia de [imprisoner.Custom('DefaultPriestTitlePlural')].

"
 religious_interaction.2100.descwaterlogged: "Embora o sol brilhe intensamente, o chão pantanoso sobre o qual estou se agita e suga meus pés. Logo avisto meu carcereir[imprisoner.Custom('ES_OA')], [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l], aproximando-se com ar presunçoso, mas com certa cautela, pela turfa encharcada, acompanhado de [imprisoner.Custom('DefaultPriestTitlePlural')].

"
 religious_interaction.2100.descpleasant: "O sol brilha intensamente, o chão sobre o qual estou parece saudável e viçoso. Logo avisto meu carcereir[imprisoner.Custom('ES_OA')], [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l], aproximando-se — com certo ar de cautela — acompanhado de [imprisoner.Custom('DefaultPriestTitlePlural')].

"
 religious_interaction.2100.descforest: "O sol brilha com força, seus raios atravessam a copa das árvores. Logo avisto meu carcereir[imprisoner.Custom('ES_OA')], [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l], atravessar com dificuldade o matagal acompanhado de [imprisoner.Custom('DefaultPriestTitlePlural')].

"
 religious_interaction.2100.descoasis: "O sol castiga o deserto com força e se reflete na superfície do oásis. Logo vejo meu carcereir[imprisoner.Custom('ES_OA')], [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l], atravessando suas águas na companhia de [imprisoner.Custom('DefaultPriestTitlePlural')].

"
 religious_interaction.2100.deschostile: "Ao fixar o olhar em [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l], ladead[imprisoner.Custom('ES_OA')] por uma dúzia de [imprisoner.Custom('DefaultPriestTitlePlural')], o propósito de nosso pequeno passeio fica claro.\n\n"[ROOT.Char.GetFullNameNoTooltip]. Vocês serão deixados aqui, amarrad[ROOT.Char.Custom('ES_OA')] a esta estaca, e [imprisoner.GetFaith.HighGodName] decidirá seu destino. Se for inocente, viverá; mas, se for culpado, perecerá"."
 religious_interaction.2100.middledefault: "[imprisoner.GetFaith.HighGodNamePossessive] Mercy"
 religious_interaction.2100.middleoasis: "Água, eu preciso de água! Minha garganta, minha cabeça, minha pele - está tudo ardendo!\n\nSerá que [ROOT.Char.GetFaith.DevilName] realmente estava aqui, rindo do meu sofrimento? Será que [ROOT.Char.GetFaith.WaterGodName] me ofereceu um frasco de água? Bebi e bebi, mas minha sede não foi saciada."
 religious_interaction.2100.endwaterlogged: "\n\nQuando [imprisoner.GetTitledFirstName|l] retorna e me colocam um odre contra os lábios, a névoa da minha mente se dissipa. O/A [imprisoner.GetTitleAsNameNoTooltip] parece um pouco desapontado(a) ao me encontrar vivo(a), mas o divino falou."
 religious_interaction.2100.endpleasant: "Quase #EMP aproveitei#! estes dias amarrad[ROOT.Char.Custom('ES_OA')] ao ar livre. Os pássaros cantaram, o sol aqueceu minha pele e as gotas de chuva me refrescaram e saciaram minha sede.

Quando [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l] retorna, fica claro que está irritad[imprisoner.Custom('ES_OA')] com minha vivacidade e meu bom humor em geral, mas não há como escapar dos termos que [imprisoner.GetSheHe] [imprisoner.GetHerselfHimself] havia estabelecido: o divino falou!"
 religious_interaction.2100.endforest: "Quase #EMP aproveitei#! estes dias suspens[ROOT.Char.Custom('ES_OA')] sobre as águas refrescantes do oásis. Embora o sol castigue com força, minhas cordas se mostraram frouxas o bastante para que eu pudesse me inclinar e beber profundamente das águas.

Quando [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l] retorna, fica claro que está irritad[imprisoner.Custom('ES_OA')] com minha boa saúde, mas não há como escapar aos termos que [imprisoner.GetSheHe] [imprisoner.GetHerselfHimself] havia estabelecido: o divino falou!"
 religious_interaction.2100.endoasis: "Sou inocente!"
 religious_interaction.2100.a.believer: "[imprisoner.GetFaith.HighGodName|U] me julgará justamente!"
 religious_interaction.2100.a.unbeliever: "Na véspera do julgamento de [prisoner.GetTitledFirstName|l] , [prisoner.GetHerHim] encontramos inconsciente, mas respirando.\n\n\"É um milagre!\", proclama o [ROOT.Char.Custom('DefaultPriestTitle')] com as mãos erguidas para o céu. \"[ROOT.Char.GetFaith.HighGodName|U] falou! \"[prisoner.Custom('ES_ElElla')|U] é inocente!\"."
 religious_interaction.2100.a.confused: "Ao me aproximar de [prisoner.Custom('ES_AlAla')] [prisoner.GetTitledFirstName|l] atravessando as águas do oásis onde estava amarrad[prisoner.Custom('ES_OA')] a uma estaca, encontramos [prisoner.GetHerHim] não apenas consciente, mas completamente san[prisoner.Custom('ES_OA')].

"É um milagre!", declara meu [ROOT.Char.Custom('DefaultPriestTitle')] com as mãos erguidas para os céus. "[ROOT.Char.GetFaith.HighGodName|U] falou! [prisoner.Custom('ES_ElElla')|U] é inocente!".

Aperto os dentes em frustração enquanto meus [ROOT.Char.Custom('DefaultPriestTitlePlural')] desatam [prisoner.GetFirstNameNoTooltip]. Por que tivemos que deixá-l[prisoner.Custom('ES_OA')] #EMP aqui#!?!"
 religious_interaction.2100.a.success: "Quando me aproximo de [prisoner.Custom('ES_AlAla')] [prisoner.GetTitledFirstName|l] chapinhando pelas águas do oásis onde estava amarrad[prisoner.Custom('ES_OA')] a uma estaca, encontramos [prisoner.GetHerHim] não apenas consciente, mas praticamente #EMP sorridente#!.

"É um milagre!", declara meu [ROOT.Char.Custom('DefaultPriestTitle')] com as mãos erguidas para os céus. "[ROOT.Char.GetFaith.HighGodName|U] falou! [prisoner.Custom('ES_ElElla')|U] é inocente!".

Cerrei os dentes de frustração enquanto meus [ROOT.Char.Custom('DefaultPriestTitlePlural')] desatam [prisoner.GetFirstNameNoTooltip]. Por que tivemos que deixá-l[prisoner.Custom('ES_OA')] #EMP aqui#!?!"
 religious_interaction.2100.a.failure: "É a vontade de [ROOT.Char.GetFaith.HighGodNamePossessive|U]."
 #I have survived!
 religious_interaction.2101.t: "[ROOT.Char.GetFaith.HighGodName|U] nem sempre está #EMP sempre#! certo!"
 religious_interaction.2101.start.desc: "Sua intromissão passa despercebida"
 religious_interaction.2101.end.desc: "Você é revelad[ROOT.Char.Custom('ES_OA')] como assassin[ROOT.Char.Custom('ES_OA')]"
 religious_interaction.2101.desc.pleasant: "Quase #EMP aproveitei#! estes dias amarrad[ROOT.Char.Custom('ES_OA')] ao ar livre. Os pássaros cantaram, o sol aqueceu minha pele e as gotas de chuva me refrescaram e saciaram minha sede.

Quando [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l] retorna, fica claro que está irritad[imprisoner.Custom('ES_OA')] com minha vivacidade e meu bom humor em geral, mas não há como escapar dos termos que [imprisoner.GetSheHe] [imprisoner.GetHerselfHimself] havia estabelecido: o divino falou!"
 religious_interaction.2101.desc.oasis: "Quase #EMP aproveitei#! estes dias suspens[ROOT.Char.Custom('ES_OA')] sobre as águas refrescantes do oásis. Embora o sol castigue com força, minhas cordas se mostraram frouxas o bastante para que eu pudesse me inclinar e beber profundamente das águas.

Quando [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l] retorna, fica claro que está irritad[imprisoner.Custom('ES_OA')] com minha boa saúde, mas não há como escapar aos termos que [imprisoner.GetSheHe] [imprisoner.GetHerselfHimself] havia estabelecido: o divino falou!"
 religious_interaction.2101.a: "Estou tão… tão cansad[ROOT.Char.Custom('ES_OA')]…"
 #They survived...
 religious_interaction.2102.desc: "Na véspera do julgamento de [prisoner.GetTitledFirstName|l] , [prisoner.GetHerHim] encontramos inconsciente, mas respirando.\n\n\"É um milagre!\", proclama o [ROOT.Char.Custom('DefaultPriestTitle')] com as mãos erguidas para o céu. \"[ROOT.Char.GetFaith.HighGodName|U] falou! \"[prisoner.Custom('ES_ElElla')|U] é inocente!\"."
 religious_interaction.2102.oasis: "Ao me aproximar de [prisoner.Custom('ES_AlAla')] [prisoner.GetTitledFirstName|l] atravessando as águas do oásis onde estava amarrad[prisoner.Custom('ES_OA')] a uma estaca, encontramos [prisoner.GetHerHim] não apenas consciente, mas completamente san[prisoner.Custom('ES_OA')].

"Ao nos aproximarmos do local onde deixamos [prisoner.Custom('ES_AlAla')] [prisoner.GetTitledFirstName|l] amarrad[prisoner.Custom('ES_OA')] a uma estaca, fica logo claro que algo está errado. Ao que tudo indica, sua estaca caiu para a frente, diretamente dentro do oásis ao lado do qual deixamos [prisoner.GetHerHim]. As amarras em seus membros claramente deram conta do recado e, com o peso do tronco pressionando [prisoner.GetSheHe] para baixo, não tinha a menor chance.

"[ROOT.Char.GetFaith.HighGodName|U] falou!", declara meu [ROOT.Char.Custom('DefaultPriestTitle')], com as mãos erguidas aos céus. "[prisoner.Custom('ES_ElLa')|U] prisioneir[prisoner.Custom('ES_OA')] é culpado!".".

Aperto os dentes em frustração enquanto meus [ROOT.Char.Custom('DefaultPriestTitlePlural')] desatam [prisoner.GetFirstNameNoTooltip]. Por que tivemos que deixá-l[prisoner.Custom('ES_OA')] #EMP aqui#!?!"
 religious_interaction.2102.pleasant: "Quando me aproximo de [prisoner.Custom('ES_AlAla')] [prisoner.GetTitledFirstName|l] chapinhando pelas águas do oásis onde estava amarrad[prisoner.Custom('ES_OA')] a uma estaca, encontramos [prisoner.GetHerHim] não apenas consciente, mas praticamente #EMP sorridente#!.

"Um Grande Debate".

Cerrei os dentes de frustração enquanto meus [ROOT.Char.Custom('DefaultPriestTitlePlural')] desatam [prisoner.GetFirstNameNoTooltip]. Por que tivemos que deixá-l[prisoner.Custom('ES_OA')] #EMP aqui#!?!"
 religious_interaction.2102.a: "O debate público humilha [actor.GetShortUINameNoTooltip]"
 religious_interaction.2102.b: "[actor.GetShortUINameNoTooltip] questiona com sucesso minha fé"
 religious_interaction.2102.b.tt: "Não mancharei o nome [recipient.GetFaith.HighGodNamePossessive] com esta farsa."
 religious_interaction.2102.b.success: "[actor.GetShortUINameNoTooltip] será informado"
 religious_interaction.2102.b.failure: "[recipient.GetShortUIName] recusou meu desafio para um debate"
 #I have died...
 religious_interaction.2103.t: "Este personagem recentemente iniciou um debate sobre os fundamentos de sua fé."
 religious_interaction.2103.end.desc: "Debate Recentemente Realizado"
 religious_interaction.2103.desc.pleasant: "Era tão presunços[ROOT.Char.Custom('ES_OA')], tão idiota. Ficar tanto tempo ao relento brutaliza qualquer [ROOT.Char.GetWomanMan], agora eu vejo isso. O sol castiga durante o dia, o vento uiva e me açoita à noite, e o céu permanece horrivelmente, impiedosamente livre de qualquer nuvem.

Água, água. Ela me cerca, aprisionada no abraço da natureza, mas não há uma gota que eu possa beber. Desesperad[ROOT.Char.Custom('ES_OA')], a cabeça pende sem esperança."
 religious_interaction.2103.desc.waterlogged: "Embora o vento me açoite e o sol castigue minha pele, ao menos sou refrescado pelo fluxo constante de água das nuvens de chuva que tanto inundam esta região. Sorrio para o céu quando começa outra pancada de chuva.

De repente, o mundo começa a balançar. Primeiro, de modo imperceptível, depois cada vez mais rápido. Leva-me alguns instantes para perceber que minha estaca perdeu o equilíbrio e agora está tombando diretamente no poço à minha frente!

Ao atingir a água, me debato loucamente para escapar, mas é inútil. Tenho os membros amarrados, e o peso do tronco me empurra mais fundo nesse poço raso. Grito, mas nenhum som sai, e a água invade minha boca para preencher o vazio."
 religious_interaction.2103.desc.oasis: "Enquanto cumpro meu julgamento, o sol forte castiga minha pele. Pelo menos sou refrescad[ROOT.Char.Custom('ES_OA')] pelo vai e vem da água contra meu peito, suspens[ROOT.Char.Custom('ES_OA')] e eret[ROOT.Char.Custom('ES_OA')] como estou nas águas do oásis.

De repente, o mundo começa a cambalear. Primeiro de forma quase imperceptível, depois cada vez mais rápido. Levo alguns instantes para perceber que a areia macia sob minha estaca cedeu, me lançando diretamente no oásis à minha frente!

Ao atingir a água, me debato freneticamente para escapar, mas é inútil. Tenho todos os membros amarrados, e o peso do tronco me empurra cada vez mais para o fundo das águas. Grito, mas nenhum som sai, e a água invade minha boca para preencher o vazio."
 religious_interaction.2103.a: "\"Parece que [ROOT.Char.GetFaith.PantheonTerm] [ROOT.Char.GetFaith.PantheonTermHasHave] escolhido um vencedor.\""
 religious_interaction.2103.b: "\"Ei, eu ainda não terminei!\""
 #They died!
 religious_interaction.2104.desc: "Na véspera final do julgamento [prisoner.Custom('ES_DelDela')] [prisoner.GetTitledFirstName|l], [prisoner.GetSheHe] não se move quando nos aproximamos. Um dos servos aproxima um frasco aos seus lábios ressecados, mas a água escorre pelo queixo sem resposta.

"Louvado seja [ROOT.Char.GetFaith.HighGodName]!"
 religious_interaction.2104.desc.drowned: "Certamente você está brincando? Suas tentativas transparentes de escapar politicamente nunca deterão a ira de [recipient.GetFaith.HighGodName]!"
 religious_interaction.2104.desc.oasisdrowned: "Ao nos aproximarmos do local onde deixamos [prisoner.Custom('ES_AlAla')] [prisoner.GetTitledFirstName|l] amarrad[prisoner.Custom('ES_OA')] a uma estaca, fica logo claro que algo está errado. Ao que tudo indica, sua estaca caiu para a frente, diretamente dentro do oásis ao lado do qual deixamos [prisoner.GetHerHim]. As amarras em seus membros claramente deram conta do recado e, com o peso do tronco pressionando [prisoner.GetSheHe] para baixo, não tinha a menor chance.

"[ROOT.Char.GetFaith.HighGodName|U] falou!", declara meu [ROOT.Char.Custom('DefaultPriestTitle')], com as mãos erguidas aos céus. "[prisoner.Custom('ES_ElLa')|U] prisioneir[prisoner.Custom('ES_OA')] é culpado!"."
 religious_interaction.2104.b.drowned: "Lições de Graça"
 ##############################################
 ### Literalist Debate by Ewan Cowhig Croft ###
 ##############################################
 religious_interaction.2400.t: "Por desgracia, desta vez tenho alguns assuntos importantes que precisam de atenção... mas da próxima vez adoraremos com ainda mais fervor!"
 religious_interaction.2400.desc: "Que pena."
 religious_interaction.2400.a: "Tentativa de transcendência em conjunto"
 religious_interaction.2400.a.tt_success: "O debate público humilha [actor.GetShortUINameNoTooltip]"
 religious_interaction.2400.a.tt_fail: "[actor.GetShortUINameNoTooltip] questiona com sucesso minha fé"
 religious_interaction.2400.b: "Não mancharei o nome [recipient.GetFaith.HighGodNamePossessive] com esta farsa."
 religious_interaction.2400.b.tt: "[actor.GetShortUINameNoTooltip] será informado"
 religious_interaction.2400.b_turned_down: "[recipient.GetShortUIName] recusou meu desafio para um debate"
 used_literalist_debate_modifier: "Debate Recentemente Realizado"
 used_literalist_debate_modifier_desc: "Este personagem recentemente iniciou um debate sobre os fundamentos de sua fé."
 literally_debated_modifier: "Debate Recentemente Realizado"
 literally_debated_modifier_desc: "Este personagem recentemente participou de um debate sobre os fundamentos de sua fé."
 religious_interaction.2401.desc_intro: "Meu oponente e eu nos encontramos em um grande salão em [debate_locale.GetNameNoTierNoTooltip], de pé em mesas precárias a poucos metros de distância um do outro, cercados por uma multidão de espectadores ansiosos. Um silêncio abafado cai sobre a multidão, todos esperando o início do debate.\n\n"
 religious_interaction.2401.desc_won: "Ao longo de uma hora, faço em pedaços [recipient.Custom('ES_AlAla')] [recipient.GetTitledFirstName|l]. Ataco sua piedade, seu senso de virtude e até mesmo coloco em dúvida sua lealdade a [actor.GetFaith.HighGodName]. A multidão é impiedosa, atirando ovos podres e repolhos mofados em [recipient.GetTitledFirstNameNoTooltip|l] até que [recipient.GetSheHe] fuja do salão."
 religious_interaction.2401.desc_lost: "A ofensiva verbal de [recipient.GetTitledFirstName|l] começa quase imediatamente e mal me dá uma chance de rebater. Em pouco tempo, a multidão já decidiu o vencedor.\n\nAguento por alguns minutos, enfrentando a chuva de legumes podres, mas finalmente sou obrigado a recuar quando um dos camponeses joga uma galinha viva na minha cabeça."
 religious_interaction.2401.a_won: "Não sou amado pelo [actor.GetFaith.HighGodName]?"
 religious_interaction.2401.a_lost: "Essas pessoas não entendem [actor.GetFaith.GetReligion.GetNameNoTooltip]!"
 religious_interaction.2402.desc_won: "Apesar da atitude arrogante de [actor.GetTitledFirstName|l] ao me desafiar para um debate, sua resolução se desfaz diante da minha tempestade de palavras fulminantes e críticas piedosas. Em pouco tempo, a multidão entra na dança, e meu oponente recua sob uma saraivada de vegetais apodrecidos e um galo especialmente agressivo."
 religious_interaction.2402.desc_lost: "Embora eu faça o melhor que posso, está claro que [actor.GetTitledFirstName|l] estudou seus argumentos de forma extremamente minuciosa e a plateia come em sua mão quase imediatamente. Ainda assim, continua me repreendendo por mais de uma hora, acusando-me de todo vício sob o sol, e até insinuando que minha lealdade a [recipient.GetFaith.HighGodName] está em dúvida.\n\nPor fim, fujo, seguido por uma saraivada de produtos podres lançados pela multidão."
 religious_interaction.2403.desc: "[victim.GetTitledFirstName] não tem a menor chance. Embora acredite ter se preparado bem, eu esmago seus argumentos frágeis como se fossem moscas. A cada contra-argumento, [victim.GetFirstNameNoTooltip] age como se tivesse sido atingido. À medida que a conversa avança, parece tão incapaz de defender sua posição que até o público se cala.\n\n"… e é por isso", proclamo, erguendo a mão em um gesto dramático, apontando um dedo acusador pelo salão, "que vocês nunca"…\nParei ao perceber que [victim.GetFirstNameNoTooltip] ofega por ar e se agarra"
 religious_interaction.2403.conclusion_either: "Seu peito."
 religious_interaction.2403.conclusion_man: "Seu braço."
 religious_interaction.2403.conclusion_woman: "Seu estômago."
 religious_interaction.2403.a.low_compassion: "\"Tomando o caminho do covarde, vejo.\""
 religious_interaction.2403.a.zealous: "\"Parece que [ROOT.Char.GetFaith.PantheonTerm] [ROOT.Char.GetFaith.PantheonTermHasHave] escolhido um vencedor.\""
 religious_interaction.2403.a.stubborn: "\"Ei, eu ainda não terminei!\""
 religious_interaction.2403.a: "\"Você... Você está bem?\""
 religious_interaction.2403.a.tt: "[victim.GetShortUIName] sofre um ataque cardíaco e [character_death_dies|E]"
 religious_interaction.2500.desc: "Para você ver a luz... Deve ser um sinal de [ROOT.Char.GetFaith.HighGodNameAlternate]! Você é bem-vindo a se juntar à verdadeira fé."
 religious_interaction.2500.a: "Louvado seja [ROOT.Char.GetFaith.HighGodName]!"
 religious_interaction.2501.desc: "Certamente você está brincando? Suas tentativas transparentes de escapar politicamente nunca deterão a ira de [recipient.GetFaith.HighGodName]!"
