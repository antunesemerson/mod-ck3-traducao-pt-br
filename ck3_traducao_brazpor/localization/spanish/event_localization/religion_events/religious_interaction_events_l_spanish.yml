 religious_interaction.2600.t: "Lições de Graça"
 religious_interaction.2600.desc.recipient: "[actor.Custom('ES_ElLa')|U] [actor.GetTitledFirstName|l] toma delicadamente minha mão para me guiar até uma coleção de objetos afiados e contundentes que usaremos em nossa sessão. Uma das lâminas capta a luz e sinto uma sensação de paz me invadir.

Ferramenta em mãos, faço um gesto para que [actor.GetSheHe] se vire, enquanto [actor.GetSheHe] levanta a camisa e expõe a pele intocada das costas. Ponho-me ao trabalho, e os gemidos e resmungos baixos logo se transformam em um zumbido suave no fundo da garganta.

Já sei qual ferramenta usarei para aperfeiçoar minha própria graça."
 religious_interaction.2600.desc.actor: "[recipient.Custom('ES_ElLa')|U] [recipient.GetTitledFirstName|l] examina cuidadosamente as ferramentas da transcendência, tremendo levemente de antecipação.\n\nSeguro-lhe o pulso, coloco a lâmina afiada em sua mão e a pressiono suavemente contra meu peito. "Com tanta delicadeza? Mão firme, agora. Estamos a trilhar uma linha tênue".\n\n[recipient.GetFirstName] me olha nos olhos e acena com a cabeça, então começa a desabotoar a própria camisa para expor um trecho de pele pura, sem marcas, que em breve receberá a graça de [recipient.GetFaith.HighGodName]."
 religious_interaction.2600.a: "Transcendamos juntos."
 religious_interaction.2610.desc: "Por desgracia, desta vez tenho alguns assuntos importantes que precisam de atenção... mas da próxima vez adoraremos com ainda mais fervor!"
 religious_interaction.2610.a: "Que pena."
 attempted_transcendence_together_opinion: "Tentativa de transcendência em conjunto"
