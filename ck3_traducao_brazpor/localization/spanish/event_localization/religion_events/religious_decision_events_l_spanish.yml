l_spanish:
 religious_decision.0001.t: "Adorquismo"
 religious_decision.0001.desc: "Meu [ROOT.Char.Custom('MyPriestTitle')] [realm_priest.GetFirstName] me leva a uma reentrância tranquila perto de um pequeno riacho. O gotejar constante da água sobre as pedras cria uma atmosfera relaxante.\n\n\"Os espíritos gostam daqui, [ROOT.Char.GetFirstNameNoTooltip]. Este é o melhor lugar para pedirmos ajuda a eles.\"\n\nErgue duas cestas que [realm_priest.GetFirstNameNoTooltip] trouxe consigo e diz: \"Agora devemos decidir que tipo de oferenda deixaremos para eles.\""
 religious_decision.0001.desc_landless: "Vagando pelas terras selvagens com minhas cestas de oferendas, logo identifico um riacho sereno, escondido na entrada de uma caverna.\n\nO ar parece pesado com a presença de espíritos.\n\nMas, sem saber exatamente quais estão presentes, reflito sobre o conteúdo de minhas cestas. O que devo lhes oferecer?"
 religious_decision.0001.a: "Uma grande oferenda de caramujos, frutas e mirra."
 religious_decision.0001.b: "Uma libação tradicional de grãos e borassa."
 religious_decision.0001.c: "Oferenda? Bah! Minha presença aqui não é suficiente?"
 religious_decision.0001.d: "Pensando melhor, vamos evitar perturbá-los..."
 religious_decision.0001.a.tt.1: "Os espíritos #P certamente notarão#! essa oferenda"
 religious_decision.0001.a.tt.2: "Isso pode chamar a atenção de um espírito #Z poderoso#!, para o bem ou para o mal"
 religious_decision.0001.b.tt: "Os espíritos #P provavelmente notarão#! essa oferenda"
 religious_decision.0001.c.tt: "Os espíritos #N provavelmente ficarão ofendidos#!, mas a ousadia talvez #P os impressione#!"
 religious_decision.0001.d.flavor: "Os espíritos são caprichosos. É melhor não arriscar irritá-los."
 religious_decision.0002.t: "Adorquismo"
 religious_decision.0002.desc.start_offering: "[realm_priest.GetFirstName] derrama minha oferenda no chão e começa a andar em círculos ao redor dela."
 religious_decision.0002.desc.start_offering_alone: "Derramo minha oferenda no chão e começo a caminhar ao redor dela em círculos."
 religious_decision.0002.desc.start_no_offering: "[realm_priest.GetFirstName] me encara com perplexidade. \"Voc? se oferece... a si mesm[ROOT.Char.Custom('ES_OA')]? Suponho que isso tamb?m serve...\", diz, enquanto come?a a andar em c?rculos ao meu redor."
 religious_decision.0002.desc.start_no_offering_alone: "Hesito por um momento, enquanto considero a possível audácia de oferecer apenas a mim mesmo aos espíritos. E então começo a andar em círculos para iniciar o ritual."
 religious_decision.0002.desc: "\n\n\"Oh, espíritos, ouvi-me. Peço-vos que concedam sua ajuda a est[ROOT.Char.Custom('ES_EA')] que a requer!\", entoa [realm_priest.GetFirstNameNoTooltip].\n\nComeça a se mover mais rápido e dança. Seus movimentos ficam cada vez mais frenéticos e o suor brilha em seu rosto. Por fim, chega ao auge antes de terminar a dança e cair exaust[realm_priest.Custom('ES_OA')] no chão."
 religious_decision.0002.desc_alone: "\n\n\"Espíritos, ouvi-me. Considerem minha oferta e ajudem-me em minha súplica!\", exclamo para a agora penumbra da depressão.\n\nEnquanto continuo girando, uma repentina onda de energia me toma. O suor me brota na testa, e meus membros se movem em frenesi — cada vez mais rápido. Eu me mexo, me mexo, me #EMP muevo#!; até que finalmente desabo no chão, ofegante."
 religious_decision.0002.desc.end_changed: "\n\nA cerimônia chega ao fim e me sinto diferente, alterad[ROOT.Char.Custom('ES_OA')] de algum modo…"
 religious_decision.0002.desc.end_no_change: "\n\nA quietude e a tranquilidade retornam à caverna. Tudo parece exatamente como estava antes."
 religious_decision.0002.shrewd: "Minha mente nunca esteve tão clara!"
 religious_decision.0002.strong: "Tanta energia! Tão vigoroso!"
 religious_decision.0002.good: "Que sentimento estranho é esse?"
 religious_decision.0002.bad: "Isso não pode estar certo..."
 religious_decision.0002.possessed: "Sinto-me aprisionad[ROOT.Char.Custom('ES_OA')] dentro do meu próprio corpo!"
 religious_decision.0002.no_change.zealous: "Será que ofendi os espíritos de alguma forma?"
 religious_decision.0002.no_change: "Que desperdício de tempo."
 religious_decision.0101.t: "Bhakti"
 religious_decision.0101.desc.start: "Bhakti pode ser relacionado aos sentimentos de afeto, devoção e adoração, mas nenhum deles abrange completamente o conceito. Ao me dedicar a um avatar da divindade, comprometo-me com ele de corpo e alma.\n\nO [ROOT.Char.GetFaith.GetNameNoTooltip] se concentra na veneração de"
 religious_decision.0101.desc.generic: "apenas alguns deles."
 religious_decision.0101.desc.vaishnavism: "as várias encarnações de Vishnu, o Preservador."
 religious_decision.0101.desc.shaivism: "as muitas encarnações de Shiva, o Destruidor."
 religious_decision.0101.desc.smartism: "os aspectos da realidade suprema."
 religious_decision.0101.desc.end: "Dentre esses aspectos, um deve falar mais comigo do que os outros..."
 religious_decision.0101.ganga: "Ganga, deus da pureza e expiação."
 religious_decision.0101.saraswati: "Saraswati, deusa do conhecimento e arte."
 religious_decision.0101.kali: "Kali, deusa da destruição do mal."
 religious_decision.0101.kubera: "Kubera, deus da riqueza e justiça."
 religious_decision.0101.lakishmi: "Lakishmi, deusa da fortuna e prosperidade."
 religious_decision.0101.jagganath: "Jagganath, Senhor do Universo."
 religious_decision.0101.hayagriva: "Haygriva, deus do conhecimento e sabedoria."
 religious_decision.0101.parvati: "Parvati, deusa da fertilidade e beleza."
 religious_decision.0101.virabhadra: "Vīrabhadra, deus da ira justa."
 religious_decision.0101.munishwarar: "Munīshwarar, deus do lar e da família."
 religious_decision.0101.dakshinamoorthy: "Dakshinamoorthy, deus de todas as formas de aprendizado."
 religious_decision.0101.ganesha: "Ganesha, deus da sabedoria e novos começos."
 religious_decision.0101.vishnu: "Vishnu, o deus que observa a criação."
 religious_decision.0101.shiva: "Shiva, o deus que caça o mal."
 religious_decision.0101.optout: "Ainda não estou pront[ROOT.Char.Custom('ES_OA')] para decidir."
 religious_decision.0101.flavor: "Não há vergonha em esperar até que eu tenha certeza."
 religious_decision.0102.t: "Decidindo sobre uma Divindade"
 religious_decision.0102.desc: "[ROOT.Char.GetFaith.PantheonTerm|U] são muitas e inscrutáveis, mas não posso negar que algumas delas têm um apelo especial para mim. Se eu me dedicar abertamente ao culto principalmente de uma dessas divindades, certamente atrairei almas semelhantes ao meu lado.\n\nSeja quais forem as bênçãos que meu patrono proporcionar, estar com outros [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] só pode trazer saúde, riqueza e glória."
 religious_decision.0102.odin: "Odin, Chefe dos Aesir!"
 religious_decision.0102.ullr: "Ullr, caçador, guerreiro, Agente da Glória!"
 religious_decision.0102.tyr: "Tyr, o deus de uma mão só, guerreiro!"
 religious_decision.0102.thor: "Thor, Amigo da Humanidade!"
 religious_decision.0102.freyr: "Freyr, Senhor e Protetor!"
 religious_decision.0102.optout: "$religious_decision.0101.flavor$"
 religious_decision.0102.flavor: "$religious_decision.0101.flavor$"
 religious_decision.0201.t: "Meditar em Seclusão"
 religious_decision.0201.desc: "Embarcar em uma jornada interior através da meditação não é algo trivial. Muitas preparações serão necessárias, a menor das quais é decidir onde me retirarei.\n\nO local que eu escolher para meditar influenciará muito o resultado da minha jornada."
 religious_decision.0201.home: "O conforto do meu próprio [ROOT.Char.Custom('ResidenceBuilding')]."
 religious_decision.0201.plains: "As suaves planícies de [plains_location.GetNameNoTooltip]."
 religious_decision.0201.hills: "As colinas onduladas de [hills_location.GetNameNoTooltip]."
 religious_decision.0201.steppe: "Sob o grande céu azul de [steppe_location.GetNameNoTooltip]."
 religious_decision.0201.forest: "As florestas isoladas de [forest_location.GetNameNoTooltip]."
 religious_decision.0201.drylands: "Os áridos matagais de [drylands_location.GetNameNoTooltip]."
 religious_decision.0201.mountains: "As montanhas remotas de [mountains_location.GetNameNoTooltip]."
 religious_decision.0201.wetlands: "Os pântanos fétidos de [wetlands_location.GetNameNoTooltip]."
 religious_decision.0201.jungle: "As cacofônicas selvas de [jungle_location.GetNameNoTooltip]."
 religious_decision.0201.desert: "O calor escaldante de [desert_location.GetNameNoTooltip]."
 religious_decision.0201.optout: "Estou ocupad[ROOT.Char.Custom('ES_OA')] demais para meditar agora mesmo."
 religious_decision.0201.optout.flavor: "Não há pressa. O mundo não vai a lugar nenhum."
 religious_decision.0201.difficulty.easy: "[tooltip_loc.GetName] é um lugar #P seguro y fácil#! para meditar"
 religious_decision.0201.difficulty.medium: "[tooltip_loc.GetName] é um lugar #Z moderadamente difícil#! para meditar"
 religious_decision.0201.difficulty.hard: "[tooltip_loc.GetName] é um lugar #N difícil y peligroso#! para meditar"
 religious_decision.0201.stress: "É mais provável que eu perca [stress|lE] neste local"
 religious_decision.0201.trait: "É mais provável que eu ganhe percepções pessoais neste local"
 religious_decision.0201.learning: "É mais provável que eu ganhe percepções teológicas neste local"
 religious_decision.0210.toast: "Você começa a meditar"
 religious_decision.0211.t: "$religious_decision.0201.t$"
 religious_decision.0211.desc.beginning.home: "Retirando-me para a privacidade de meus aposentos, comecei um longo período de jejum e meditação."
 religious_decision.0211.desc.beginning.plains: "Fazendo uma viagem para as amplas planícies de [meditation_location.GetName], minha mente ficou desimpedida e livre para vagar."
 religious_decision.0211.desc.beginning.hills: "As vistas claras dos cumes das colinas em [meditation_location.GetName] favoreciam a reflexão pensativa."
 religious_decision.0211.desc.beginning.steppe: "Sob o imenso céu aberto da estepe de [meditation_location.GetName], minha mente ficou desimpedida e livre para vagar."
 religious_decision.0211.desc.beginning.forest: "Após chegar às florestas selvagens de [meditation_location.GetName], encontrei uma clareira tranquila para meditar."
 religious_decision.0211.desc.beginning.drylands: "O ar seco das terras áridas de [meditation_location.GetName] encheu meus pulmões e esfolou minha pele."
 religious_decision.0211.desc.beginning.mountains: "O ar rarefeito da montanha em [meditation_location.GetName] limpou meus pensamentos enquanto eu me concentrava para dentro."
 religious_decision.0211.desc.beginning.wetlands: "O ar úmido dos pântanos de [meditation_location.GetName] fez com que minhas roupas grudassem na pele enquanto eu me sentava e olhava para dentro da minha alma."
 religious_decision.0211.desc.beginning.jungle: "Os insetos zumbindo e os pássaros cantando das selvas de [meditation_location.GetName] forneceram um ruído de fundo constante enquanto eu procurava olhar para dentro de mim mesmo."
 religious_decision.0211.desc.beginning.desert: "Com o sol escaldante do deserto em [meditation_location.GetName] batendo em mim, olhei para dentro em busca de uma compreensão maior do meu lugar no universo."
 religious_decision.0211.desc.result.impatient: "\n\nLogo, porém, eu me tornei impaciente, pois, por mais imóvel que eu ficasse ou por mais que tentasse, não consegui sentir nada além de tédio."
 religious_decision.0211.desc.result.secret: "\n\nInfelizmente, não consegui parar de pensar nos segredos obscuros que guardo. O que aconteceria se o mundo descobrisse? Preocupado[ROOT.Char.Custom('ES_OA')] por tais pensamentos, não consegui encontrar a paz."
 religious_decision.0211.desc.result.hungry: "\n\nLogo, porém, a fome me dominou, e percebi que as provisões que trouxe eram terrivelmente insuficientes. Os dias restantes da minha viagem foram preenchidos com a luta para encontrar comida na natureza selvagem, deixando pouco tempo para contemplação."
 religious_decision.0211.desc.result.thirsty: "\n\nEm pouco tempo, meus lábios racharam e uma sede crescente que não poderia saciar por muito tempo apenas com a minha cantina. Logo percebi que precisaria me abrigar para sobreviver ao calor, mas a estalagem que encontrei estava muito movimentada para que eu pudesse encontrar a paz e o silêncio que precisava."
 religious_decision.0211.desc.result.headache: "\n\nInfelizmente, pouco tempo depois, comecei a sofrer com uma forte dor de cabeça que não cessava. Logo eu não conseguia pensar em nada além da dor."
 religious_decision.0211.desc.result.distraction: "\n\nInfelizmente, a cacofonia interminável servia como uma distração constante, e minha crescente irritação se tornou um obstáculo mental que eu não conseguia superar."
 religious_decision.0211.desc.result.minor_stress: "\n\nLivre das triviais preocupações da vida cotidiana da minha [ROOT.Char.Custom('GetCourt')|l], logo me vi passando mais tempo apenas apreciando os simples prazeres da vida."
 religious_decision.0211.desc.result.medium_stress: "\n\nA localização remota foi uma grande vantagem, proporcionando-me um alívio bem-vindo dos problemas diários com que normalmente tenho de lidar em minha [ROOT.Char.Custom('GetCourt')|l]."
 religious_decision.0211.desc.result.major_stress: "\n\nIsolad[ROOT.Char.Custom('ES_OA')] longe na natureza, descobri que os problemas que haviam me oprimido em minha [ROOT.Char.Custom('GetCourt')|l] já não tinham mais importância. Pela primeira vez em muito tempo, eu estava em paz."
 religious_decision.0211.desc.result.reflection: "\n\nOlhando profundamente para dentro de mim, percebi que essa vida que venho vivendo tem sido superficial e imperfeita, contaminada por desejos insalubres. Ao retornar de minha jornada, percebi que essas coisas já não têm o apelo que tinham antes."
 religious_decision.0211.desc.result.epiphany: "\n\nMeditando em isolamento, fui repentinamente atingido por uma epifania. A presença do homem no mundo e como nos encaixamos na ordem natural... Outra peça do quebra-cabeça universal, encaixada!"
 religious_decision.0211.desc.result.fugue: "\n\nDepois de muitos dias, me vi entrando em um estado de fuga e perdi completamente a noção de mim mesm[ROOT.Char.Custom('ES_OA')]. Livr[ROOT.Char.Custom('ES_OA')] de desejos e ideias preconcebidas, vi a verdade do universo escrita na própria trama do mundo ao meu redor. Eu podia ver tudo… entender tudo… O universo e eu, como um só.\n\nPor fim, voltei ao meu antigo eu, embora ainda me lembre de fragmentos do que aprendi em meu transe."
 religious_decision.0211.a.critical_success: "Essa experiência ficará comigo para sempre."
 religious_decision.0211.a.success: "Estou feliz por ter dedicado tempo para isso."
 religious_decision.0211.a.failure: "Ai de mim..."
 religious_decision.0211.experience: "Você melhora sua habilidade em meditação"
 religious_decision.0291.toast: "Você conclui sua meditação"
 religious_decision.0302.t: "Sepultamento Celeste"
 religious_decision.0302.desc.wilderness: "Como é tradicional, um pequeno grupo da minha [ROOT.Char.Custom('GetCourt')|l] se reúne para levar o corpo de [ROOT.Var('ancestor_to_bury').Char.GetFirstName] para a floresta, a fim de lhe dar um enterro digno.\n\nAo notar a procissão, não demorou para que as aves carniceiras começassem a circular no alto. Ansiosas, mas sem pressa, aguardaram que disséssemos nossas últimas palavras e partíssemos antes de descer para se banquetear."
 religious_decision.0302.desc.zoroastrian: "A fim de evitar a contaminação por Nasu, o demônio dos cadáveres, não me é permitido entrar na torre dakhma onde o corpo de [ROOT.Var('ancestor_to_bury').Char.GetFirstName] será descarnado.\n\nEm seu lugar, vários [ROOT.Char.GetFaith.PriestNeuterPlural], instruídos no manejo de cadáveres, encarregam-se e o conduzem ao topo da torre.\n\nApós algum tempo, os [ROOT.Char.GetFaith.PriestNeuterPlural] retornam. Está feito, meu [ROOT.Char.GetTitleAsNameNoTooltip]. Agora as aves necrófagas limparão a carne de seu corpo e os raios do sol branquearão seus ossos."
 religious_decision.0302.a: "Descanse em paz, [ROOT.Char.Custom2('RelationToMe', ROOT.Var('ancestor_to_bury').Char)]."
 religious_decision.0401.t: "Adivinhando as Estrelas"
 religious_decision.0401.desc.beginning: "Passei muitas noites olhando para o céu noturno, acompanhando os movimentos dos corpos celestes.\n\nCom o tempo, percebi um padrão, e após dias de análise, estou confiante em minha previsão. Os sinais são claros —"
 religious_decision.0401.desc.great_battle: "uma grande batalha me aguarda."
 religious_decision.0401.desc.new_friends: "é hora de curar velhas feridas e fazer novos amigos."
 religious_decision.0401.desc.hard_work: "o trabalho árduo me levará a uma grande fortuna no futuro."
 religious_decision.0401.desc.betrayal: "meus aliados não são quem eu pensava que fossem."
 religious_decision.0401.desc.new_beginnings: "é um momento de novos começos e mentes abertas."
 religious_decision.0401.a: "Fico imaginando o que mais o futuro reserva?"
 religious_decision.0501.t: "[ROOT.Char.GetTitleAsNameNoTooltip] e a fé do [ROOT.Char.GetFaith.GetAdherentNameNoTooltip]"
 religious_decision.0501.desc: "Por gerações, a nobreza de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] tem professado devoção à fé [ROOT.Char.GetFaith.GetAdjectiveNoTooltip], mas o pluralismo religioso com deuses locais tem sido comum na sociedade [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]. No entanto, com a restauração do Sumo Sacerdócio, [ROOT.Char.GetFaith.ReligiousHeadTitleName] [ROOT.Char.GetFaith.ReligiousHeadName] insiste que essa prática pagã chegue ao fim e exige que todos os que jurarem fidelidade ao Khan também jurem fidelidade a Deus e o adorem da maneira correta.\n\nNo entanto, como [ROOT.Char.GetTitleAsNameNoTooltip|l], em última instância detenho a autoridade para decidir o futuro da fé em meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] e o futuro da estepe depende da minha palavra."
 religious_decision.0501.a: "Um[ROOT.Char.Custom('ES_XA')] bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] permite que seu povo mantenha seus costumes."
 religious_decision.0501.b: "Talvez uma reforma moderada agrade a ambos os lados."
 religious_decision.0501.c: "A fé [ROOT.Char.GetFaith.GetNameNoTooltip|l] deve ser evangelizada para o mundo!"
 religious_decision.0501.jewish.tt: "Cada [vassal|lE] Judeu"
 religious_decision.0501.nonjewish.tt: "Cada [vassal|lE] Não Judeu"
 religious_decision.0501.diff_culture.tt: "Todo [vassal|lE] de uma cultura distinta"
 can_never_reform_kuzarism_tt: "O [GetFaithByKey('kabarism').GetName|l] manterá para sempre seus dogmas existentes."
 religious_decision.0502.t: "O/A [khazar_khan.GetTitleAsNameNoTooltip] e a fé [khazar_khan.GetFaith.GetAdjectiveNoTooltip]"
 religious_decision.0501.d: "[ROOT.Char.GetFaith.GetNameNoTooltip|l] é a única fé verdadeira, e o [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] são mensageiros de [ROOT.Char.GetFaith.HighGodNamePossessive]."
 religious_decision.0502.desc.intro: "Por gerações, a nobreza do [khazar_khan.GetPrimaryTitle.GetNameNoTierNoTooltip] tem professado devoção à fé [ROOT.Char.GetFaith.GetAdjectiveNoTooltip], mas o pluralismo religioso com divindades locais tem sido comum na sociedade [khazar_khan.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 religious_decision.0502.desc.body: "No entanto, recentemente o/a [khazar_khan.GetTitleAsNameNoTooltip] e os rabinos do reino têm debatido acaloradamente sobre a natureza das religiões populares e dos não crentes no [khazar_khan.GetPrimaryTitle.GetTierAsNameNoTooltip].\n\nNo entanto, o/a [khazar_khan.GetTitleAsNameNoTooltip] tomou uma decisão."
 religious_decision.0502.desc.righteous: "Por decreto real, aqueles que ainda veneram os costumes antigos deixar?o de receber tratamento preferencial em [khazar_khan.GetPrimaryTitle.GetTierAsNameNoTooltip], e todos os que jurarem fidelidade [khazar_khan.Custom('ES_AlAla')] [khazar_khan.GetTitleAsNameNoTooltip|l] tamb?m dever?o jur?-la a [khazar_khan.GetFaith.HighGodName] em pessoa."
 religious_decision.0502.desc.fundamentalist: "Não apenas o pluralismo religioso chegou ao fim, como todo [khazar_khan.GetFaith.GetAdherentNameNoTooltip] não ortodoxo será necessariamente considerado inimigo do [khazar_khan.GetPrimaryTitle.GetTierAsNameNoTooltip]. [khazar_khan.GetTitleAsNameNoTooltip] busca espalhar o [khazar_khan.GetFaith.GetNameNoTooltip] por toda a estepe e além, declarando ser dever de todo [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] unir-se a esta nova era de guerra religiosa."
 religious_decision.0502.a: "Verdadeiramente, um dia sombrio para a [ROOT.Char.GetFaith.GetNameNoTooltip]."
 religious_decision.0502.b: "Já era hora!"
 religious_decision.0503.t: "A Língua Hebraica"
 religious_decision.0503.desc: "Como o governante mais influente da cultura [hebrew_language_adopter_scope.GetCulture.GetName], e um governante de um vasto reino judaico, [hebrew_language_adopter_scope.GetName] decretou que o hebraico é agora a língua litúrgica e comum do povo [hebrew_language_adopter_scope.GetCulture.GetNameNoTooltip]!\n\nO hebraico tem sido a língua litúrgica da fé judaica por milênios, mas agora que [hebrew_language_adopter_scope.GetNameNoTooltip] governa uma maioria judaica, a necessidade de usar outras línguas no cotidiano está diminuindo. Embora nem todos os [hebrew_language_adopter_scope.GetCulture.GetNameNoTooltip] pratiquem a fé judaica, provavelmente levará apenas uma ou duas gerações até que todos estejam falando a língua hebraica."
 religious_decision.0503.a.jewish: "L'chaim!"
 religious_decision.0503.a.non_jewish: "Melhor eu começar a praticar."
 religious_decision.0503.b: "Eu não consigo falar essa estranha língua!"
 religious_decision.0601.t: "Dividindo a ummah: [founder.GetFaith.ReligiousHeadTitleName|U] [founder.GetFaith.GetAdherentNameNoTooltip]"
 religious_decision.0601.desc: "Sem uma #EMP verdadero#! liderança verdadeira, estamos perdidos.\n\n[old_caliph.GetTitledFirstName|l] não nos tem proporcionado tal orientação a nós, os [founder.GetFaith.GetAdherentNamePlural] desde que assumiu o cargo, e meus irmãos de fé têm sofrido pela falta de conselho, autoridade e jurisprudência.\n\nCom o coração pesado e o apoio de alguns dos clérigos mais influentes do mundo [founder.GetFaith.GetAdherentNameNoTooltip], proclamei que é a vontade incansável de [founder.GetFaith.HighGodName] que eu assuma o cargo [founder.Custom('ES_DelDela')] [founder.GetFaith.ReligiousHeadTitleName].\n\nMeus herdeiros e eu o manteremos deste dia até o Dia do Juízo Final, e, sob minha mão firme, os verdadeiros crentes do mundo prosperarão!"
 religious_decision.0601.a: "Agora eu carrego este pesado fardo..."
 religious_decision.0601.b: "Hah, toma #EMP essa#!, [old_caliph.GetFirstNameNoTooltip]."
 religious_decision.0601.tt.some_rulers_converted_away: "[THIS.Var('schismed_caliphate_major_ruler_converted_count').GetValue|0] [rulers|lE] irão se converter à [old_caliph.GetFaith.GetName] em protesto."
 religious_decision.0601.tt.all_rulers_stayed: "Nenhum [ruler|lE] [founder.GetFaith.GetAdherentName] importante se converterá ao [old_caliph.GetFaith.GetName] em protesto"
 religious_decision.0602.t: "$religious_decision.0601.t$"
 religious_decision.0602.desc: "[founder.GetFirstName] jamais havia escondido que #EMP aborrece#! o modo como [old_caliph.GetTitledFirstName|l] exerce o cargo sagrado de [old_caliph.GetFaith.ReligiousHeadName], mas duvido que alguém pensasse que ele chegaria a esse ponto em #EMP esto#!.\n\nÉ[founder.Custom('ES_EA')] louc[founder.Custom('ES_OA')] reuniu apoio suficiente para #EMP proclamarse#! [founder.GetFaith.ReligiousHeadName] e dividir a umma!\n\nInfelizmente, os plebeus aceitaram em grande parte a decisão como simplesmente parte das maquinações de seus superiores. Contudo, como sou um[ROOT.Char.Custom('ES_OA')] dos líderes de [founder.GetFaith.GetName], cabe a mim decidir se meu domínio vai se alinhar com [founder.GetSheHe] ou dissentir."
 religious_decision.0602.a: "Certamente [founder.GetTitledFirstNameNoTooltip|l] se mostrar? dign[founder.Custom('ES_OA')]."
 religious_decision.0602.a.tt: "Você se acomoda tranquilamente à nova ordem."
 religious_decision.0602.b: "Minha lealdade a [old_caliph.Custom('ES_ElLa')] [old_caliph.GetTitledFirstNameNoTooltip|l] é inabalável!"
 religious_decision.0602.c: "As pessoas parecem desesperadas por um verdadeiro líder..."
 fp2_opportunistic_schismatic_modifier: "Cismático Oportunista"
 fp2_opportunistic_schismatic_modifier_desc: "Este personagem está buscando uma revelação..."
 religious_decision.0603.t: "$religious_decision.0601.t$"
 religious_decision.0603.desc: "Ultimamente, as tensões entre [founder.GetFirstName] e [Select_CString( old_caliph.IsLocalPlayer, 'tú', CHARACTER.GetShortUINameNoFormat )] ficaram altas, mas [founder.GetFirstNameNoTooltip] as elevou a um nível inesperadamente feroz.\n\nCom o apoio de muitos dos principais clérigos de [founder.GetFaith.GetName], [founder.GetFirstNameNoTooltip] conseguiu se proclamar o/a #EMP verdader[founder.Custom('ES_OA')]#! [founder.GetFaith.ReligiousHeadName] de sua fé, substituindo a autoridade de [Select_CString( old_caliph.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] sobre aqueles que se afastaram da ortodoxia [old_caliph.GetFaith.GetAdjective].\n\nMuitos dos $islam_religion_adherent_plural$ com uma atitude mais voltada para a comunidade choram abertamente ao ver o surgimento de outra fissura na Ummah."
 religious_decision.0603.a: "Demônio! Canalha! Blasfem[founder.Custom('ES_OA')]!"
 religious_decision.0603.b: "[old_caliph.GetTitledFirstNameNoTooltip|l] não consegue manter sua casa em ordem…"
 religious_decision.0603.c: "Ha! Que grande drama!"
