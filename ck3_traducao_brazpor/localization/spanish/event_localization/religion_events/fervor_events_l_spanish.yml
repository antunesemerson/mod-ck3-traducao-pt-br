l_spanish:
 #Scandal Event Localization
 fervor.1002.t: "Sacerdote Escandaloso"
 fervor.1002.desc.start: "O mundo [sinful_theocrat.GetFaith.GetAdherentNameNoTooltip] ficou [sinful_theocrat.Custom('GetShockedExpression')] ao saber que [sinful_theocrat.Custom2('MyCharacterIntroduction', ROOT.Char)]"
 fervor.1002.desc.start_hof: "O mundo [sinful_theocrat.GetFaith.GetAdherentName] ficou horrorizado ao saber que [sinful_theocrat.GetTitledFirstName|l] em pessoa"
 fervor.1002.desc.lustful: "foi descobert[sinful_theocrat.Custom('ES_OA')] em flagrante em sua casa com servent[sinful_theocrat.Custom('ES_EAOpp')]s jovens. O pobre assistente que os descobriu teve de desviar o olhar enquanto os culpados corriam para pegar suas roupas e se vestir."
 fervor.1002.desc.chaste: "não tem tido relações sexuais há anos. Apesar de receber inúmeras propostas, parece que a [sinful_theocrat.Custom('ES_AlAla')] [sinful_theocrat.Custom('GetCouncilOrTitleName')] não se interessa por ter relações carnais com ninguém."
 fervor.1002.desc.gluttonous: "foi descoberto devorando uma festa luxuosa de [sinful_theocrat.Custom('GetExpensiveMeal')], [sinful_theocrat.Custom('GetExpensiveMealAlt')], [sinful_theocrat.Custom('GetExpensiveDessert')] e [sinful_theocrat.Custom('GetExpensiveDrink')]. O excesso da indulgência na festa lançou uma sombra escura sobre a legitimidade ."
 fervor.1002.desc.temperate: "tem levado uma vida ascética em segredo. Aparentemente, evita todos os luxos e confortos, preferindo viver da forma mais simples possível."
 fervor.1002.desc.greedy: "está desviando o dinheiro que seus seguidores doam para caridade, usando-o para seu benefício pessoal!"
 fervor.1002.desc.generous: "está secretamente usando seu próprio dinheiro para alimentar os pobres e necessitados!"
 fervor.1002.desc.lazy: "está inventando desculpas para procrastinar e evitar suas responsabilidades a todo custo!"
 fervor.1002.desc.diligent: "tem trabalhado até tarde da noite para concluir um dos seus projetos pessoais!"
 fervor.1002.desc.wrathful: "vem espancando os servos que não o agradavam, causando-lhes graves ferimentos!"
 fervor.1002.desc.calm: "é incapaz de expressar emoções fortes, preferindo permanecer estoico e impassível, mesmo quando esse comportamento é claramente inadequado!"
 fervor.1002.desc.patient: "tem o hábito de vacilar e hesitar ao tomar decisões importantes, causando atrasos desnecessários em suas atividades!"
 fervor.1002.desc.impatient: "é incapaz de esperar que as coisas sejam feitas corretamente, pressionando constantemente seus ajudantes e servos!"
 fervor.1002.desc.arrogant: "considera-se inerentemente superior aos seus pares, incapaz de cometer erros e acima de qualquer dúvida."
 fervor.1002.desc.humble: "é dócil e está dominado pela autoconfiança baixa. Sempre acredita que os outros são mais capazes e que não merece o cargo que ocupa."
 fervor.1002.desc.deceitful: "tem mentido rotineiramente para os [sinful_theocrat.Custom('DefaultPriestTitlePlural')] locais para que ajam com base em informações falsas, a fim de promover suas intrigas!"
 fervor.1002.desc.honest: "é um[sinful_theocrat.Custom('ES_XA')] mentiros[sinful_theocrat.Custom('ES_OA')] horrível cujas tentativas de intrigas e enganos são tão patéticas e risíveis que não convencem ninguém."
 fervor.1002.desc.craven: "foi descoberto como alguém covarde e dócil, preferindo ceder às demandas dos outros em vez de lutar pelo que é certo."
 fervor.1002.desc.brave: "tem estado colocando a si mesm[sinful_theocrat.Custom('ES_OA')] de forma imprudente e desnecessária em perigo junto com seus assistentes por umas poucas emoções baratas!"
 fervor.1002.desc.shy: "vem inventando desculpas para não ir a reuniões sociais, preferindo ficar trancad[sinful_theocrat.Custom('ES_OA')] em casa."
 fervor.1002.desc.gregarious: "foi descoberto como alguém que impõe sua presença aos outros, violando o espaço pessoal deles e desperdiçando seu tempo!"
 fervor.1002.desc.ambitious: "tem tramado para adquirir propriedades e títulos adicionais, aparentemente insatisfeito com as muitas possessões que já possui."
 fervor.1002.desc.content: "não aproveitou múltiplas oportunidades para aumentar seu poder pessoal e posses, aparentemente satisfeito com o que já tem."
 fervor.1002.desc.arbitrary: "tem feito exceções em procedimentos importantes para favorecer aqueles que pessoalmente gosta em detrimento daqueles que não gosta, baseando-se apenas no que sente por eles."
 fervor.1002.desc.just: "tem um código de honra incrivelmente rígido e inflexível que se recusa a quebrar, embora haja circunstâncias atenuantes."
 fervor.1002.desc.cynical: "na verdade não acredita nos ensinamentos da fé [sinful_theocrat.GetFaith.GetAdjective], vendo-os apenas como uma ferramenta política conveniente."
 fervor.1002.desc.zealous: "foi descoberto com uma crença inabalável nos mundos sobrenaturais e espirituais, mesmo sem ter qualquer evidência racional para tais coisas."
 fervor.1002.desc.paranoid: "tem uma paranoia e desconfiança incríveis e acredita que todos conspiram contra si."
 fervor.1002.desc.trusting: "foi descoberto como alguém incrivelmente ingênuo e confiante, incapaz de questionar mesmo as mentiras mais óbvias contadas por seus ajudantes."
 fervor.1002.desc.compassionate: "tem sido excessivamente compreensivo[sinful_theocrat.Custom('ES_OA')] e misericordioso em situações em que isso não é necessário, simplesmente porque não suporta ver as pessoas sofrerem."
 fervor.1002.desc.callous: "tem sido extremamente fri[sinful_theocrat.Custom('ES_OA')]a, incapaz ou reluta[sinful_theocrat.Custom('ES_OA')] em demonstrar simpatia até mesmo por aqueles em situações terríveis."
 fervor.1002.desc.sadistic: "foi descoberto torturando um de seus pobres criados em uma câmara secreta sob seus aposentos, aparentemente se deleitando com os angustiantes gritos!"
 fervor.1002.desc.stubborn: "tem jogado fora os relatórios de seus ajudantes sem nem sequer lê-los, recusando-se a considerar qualquer nova informação sobre as decisões que já havia tomado."
 fervor.1002.desc.fickle: "é incapaz de defender sua posição quando as coisas ficam difíceis, cedendo ao primeiro sinal de resistência às suas decisões."
 fervor.1002.desc.vengeful: "tem guardado uma lista de todos os que alguma vez o ofenderam, detalhando as inúmeras maneiras pelas quais pretende se vingar deles e satisfazer sua sede de vingança."
 fervor.1002.desc.forgiving: "regularmente falha em punir adequadamente aqueles que não cumprem suas responsabilidades, preferindo dar-lhes uma segunda ou até terceira chance antes de puni-los!"
 fervor.1002.desc.fallback: "é de uma impiedade extrema e não consegue atender nem aos padrões básicos esperados de um[sinful_theocrat.Custom('ES_XA')] [sinful_theocrat.Custom('GetCouncilOrTitleName')]."
 fervor.1002.desc.end: "\n\nEmbora escândalos entre os [sinful_theocrat.GetFaith.AltPriestTermPlural] não sejam novidade, é perturbador que um deles tenha ocorrido tão perto de casa..."
 fervor.1002.desc.end_hof: "\n\nEmbora escândalos entre os [sinful_theocrat.GetFaith.AltPriestTermPlural] não sejam novidade, muitos estão chocados que o líder de nossa fé tenha sucumbido a essas tentações."
 fervor.1002.b: "Condenarei por suas transgressões!"
 fervor.1002.c: "Defenderei publicamente sua reputação, mesmo correndo risco!"
 fervor.1002.d: "Talvez eu deva apenas ficar em silêncio sobre isso..."
 #Exaltation Event Localization
 fervor.2002.t: "Exaltação do [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]"
 fervor.2002.desc.lustful: "[virtuous_theocrat.GetFirstName] tornou-se inspiração para incontáveis [virtuous_theocrat.GetWomenMen] fervorosos e objeto de desejo para muitos jovens [virtuous_theocrat.GetFaith.GetAdherentNamePlural]. \n\nAs histórias de suas conquistas amorosas são muito famosas e fizeram com que se [virtuous_theocrat.Custom('ES_LoLa')] considere um exemplo do infinito amor divino."
 fervor.2002.desc.chaste: "[virtuous_theocrat.GetFirstName] conquistou uma reputação impecável por sua rejeição absoluta de qualquer prazer carnal.\n\nSua disciplina inabalável tem servido de exemplo a seguir para muitos/as jovens [virtuous_theocrat.GetFaith.GetAdherentNamePlural] que buscam resistir ao apelo degradante da luxúria."
 fervor.2002.desc.gluttonous: "Muitos relataram histórias maravilhosas dos suntuosos banquetes de [virtuous_theocrat.Custom('GetCouncilOrTitleName')]. [virtuous_theocrat.Custom('GetCouncilOrTitleName')] de [scoped_primary_title.GetNameNoTier] é um[virtuous_theocrat.Custom('ES_XA')] [virtuous_theocrat.GetWomanMan] de gostos refinados e abraçou plenamente a virtude epicurista que todo bom seguidor de [ROOT.Char.GetFaith.WealthGodName] deveria buscar."
 fervor.2002.desc.temperate: "Dechado de ascetismo inflexível, [virtuous_theocrat.GetFirstName] demonstrou que uma alma disciplinada pode encontrar a verdadeira paz e clareza somente por meio da meditação e da abstinência.\n\nApesar de sua ilustre posição, [virtuous_theocrat.GetFirstNameNoTooltip] se sustenta apenas com as refeições mais frugais para mostrar seu compromisso inabalável com o dogma [virtuous_theocrat.GetFaith.GetAdjectiveNoTooltip]."
 fervor.2002.desc.greedy: "Poucas [virtuous_theocrat.GetFaith.HouseOfWorshipPlural] podem igualar o esplendor e a magnificência de [scoped_primary_title.GetName]. \n\n[virtuous_theocrat.GetFirstName] decidiu dedicar sua vida a demonstrar sua devoção imperecível e, para isso, dedica uma infinita corrente de ouro e riquezas à glória de [ROOT.Char.GetFaith.HighGodName]."
 fervor.2002.desc.generous: "Os pobres e necessitados são sempre bem-vindos a sua [virtuous_theocrat.GetFaith.HouseOfWorship]. \n\n[virtuous_theocrat.GetSheHe|U] [virtuous_theocrat.Custom('GetCouncilOrTitleName')] de [scoped_primary_title.GetNameNoTier] é célebre por sua natureza generosa e suas muitas obras de caridade. Seu exemplo inspirou muitos [virtuous_theocrat.GetFaith.GetAdherentNamePlural] a abandonarem seus bens materiais em busca de uma recompensa divina."
 fervor.2002.desc.generous.pope: "Os pobres e necessitados são sempre bem-vindos em sua [virtuous_theocrat.GetFaith.HouseOfWorship]. \n\nSerá lembrado por muito tempo [virtuous_theocrat.Custom('ES_AlAla')] [virtuous_theocrat.Custom('GetCouncilOrTitleName')] de [scoped_primary_title.GetNameNoTier] por sua natureza generosa e por suas muitas obras de caridade. Seu exemplo inspirou muitos [virtuous_theocrat.GetFaith.GetAdherentNamePlural] a abandonar seus bens materiais em busca de uma recompensa divina."
 fervor.2002.desc.lazy: "Somente ao se desligar por completo das obras grosseiras deste mundo é que a alma pode encontrar seu devido lugar no próximo. E poucas pessoas encarnam essa virtude como [virtuous_theocrat.Custom('GetCouncilOrTitleName')] de [scoped_primary_title.GetNameNoTier]. \n\n[virtuous_theocrat.GetFirstName] passa a maior parte de seus dias em serena meditação, evitando os jogos sem sentido da política e o incômodo degradante do trabalho manual para alcançar um estado de serenidade divina."
 fervor.2002.desc.diligent: "Muitas histórias foram inspiradas pelo trabalho incansável de [virtuous_theocrat.Custom('GetCouncilOrTitleName')] ao serviço de [ROOT.Char.GetFaith.HighGodName]. \n\nApesar de seu prestigioso cargo, [virtuous_theocrat.GetFirstNameNoTooltip] está sempre disposto[virtuous_theocrat.Custom('ES_OA')] a sujar as mãos e realizar até as tarefas mais exaustivas e penosas. É um verdadeiro exemplo de virtude [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]."
 fervor.2002.desc.wrathful: "Sempre transbordando paixão, [virtuous_theocrat.GetFirstName] é conhecid[virtuous_theocrat.Custom('ES_OA')] em toda parte por seu temperamento e natureza violenta.\n\nOs pecados só se redimem castigando a blasfêmia de forma imediata e direta. Os frequentes arroubos de [virtuous_theocrat.GetFirstNameNoTooltip] incutiram o temor de [ROOT.Char.GetFaith.WarGodName] em muitos fiéis."
 fervor.2002.desc.wrathful.pope: "Sempre transbordando de paixão, [virtuous_theocrat.GetFirstName] é bem conhecid[virtuous_theocrat.Custom('ES_OA')] por seu temperamento explosivo e natureza violenta.\n\nOs pecados só são redimidos castigando imediatamente a blasfêmia de forma direta. Os frequentes acessos de ira de [virtuous_theocrat.GetFirstNameNoTooltip] incutiram o temor de [ROOT.Char.GetFaith.WarGodName] em muitos fiéis."
 fervor.2002.desc.calm: "Muitos têm visto que [virtuous_theocrat.GetFirstName] encarna a serenidade divina que muito poucos aspiram a alcançar em vida.\n\nPessoa extremamente disciplinada, [virtuous_theocrat.GetFirstNameNoTooltip] é um exemplo a seguir do triunfo da razão sobre a paixão."
 fervor.2002.desc.impatient: "Os homens têm apenas um curto período de tempo neste mundo, e é vontade de [ROOT.Char.GetFaith.HighGodName] que não desperdicemos um segundo sequer dele.\n\n [virtuous_theocrat.GetFirstName] adotou esse princípio tão profundamente que se tornou famoso em todos os lugares por sua intolerância à preguiça e ao trabalho desnecessário."
 fervor.2002.desc.impatient.pope: "Os homens têm apenas um curto período de tempo neste mundo, e é vontade de [ROOT.Char.GetFaith.HighGodName] que não desperdicemos um segundo sequer dele.\n\n [virtuous_theocrat.GetFirstName] será lembrado por muito tempo pela maioria dos fiéis por sua intolerância à preguiça e ao trabalho desnecessário."
 fervor.2002.desc.arrogant: "Ofender um mensageiro de [ROOT.Char.GetFaith.HighGodName] não é diferente de blasfemar na presença da própria divindade.\n\n[virtuous_theocrat.GetFirstName] sabe disso muito bem, e quando esteve no [scoped_primary_title.GetName] sempre mostrou pouca tolerância aos cínicos e tolos."
 fervor.2002.desc.humble: "Todas as obras do homem empalidecem diante da magnificência divina.\n\n[virtuous_theocrat.GetFirstName] sabe disso melhor do que muitos outros sacerdotes: muitas histórias têm circulado sobre sua natureza dócil e humilde. Evitando a vida confortável a que seu cargo lhe daria direito, muitas vezes é visto caminhando descalç[virtuous_theocrat.Custom('ES_OA')] entre os membros mais pobres de seu rebanho."
 fervor.2002.desc.deceitful: "A razão é o maior presente de [ROOT.Char.GetFaith.KnowledgeGodName] à humanidade, pois nos diferencia das bestas.\n\n[virtuous_theocrat.GetFirstName] é um bom exemplo dessa afirmação. Graças ao seu engenho sagaz e à sua grande eloquência, foi capaz de zombar e ridicularizar cínicos, blasfemos e, alguns diriam, até mesmo demônios."
 fervor.2002.desc.honest: "Graças à sua sinceridade, [virtuous_theocrat.GetFirstName]se tornou uma figura famosa e muito respeitada entre muitos [virtuous_theocrat.GetFaith.GetAdherentNamePlural].\n\nNão há mentira pequena demais nem verdade desconfortável demais para es[virtuous_theocrat.Custom('ES_EA')] [virtuous_theocrat.GetWomanMan] piedos[virtuous_theocrat.Custom('ES_OA')] cujo exemplo inspira, a cada dia, inúmeros fiéis."
 fervor.2002.desc.honest.pope: "A [virtuous_theocrat.GetFirstName] se h[virtuous_theocrat.Custom('ES_LoLa')|l] será lembrado por muito tempo por sua sinceridade.\n\nNão há mentira pequena demais nem verdade desconfortável demais para e[virtuous_theocrat.Custom('ES_EA')] [virtuous_theocrat.GetWomanMan] piedos[virtuous_theocrat.Custom('ES_OA')] cujo exemplo inspira a cada dia inúmeros fiéis a mais."
 fervor.2002.desc.craven: "A vida é um presente precioso e [virtuous_theocrat.GetFirstName] tem comovido muitos de seus seguidores com a virtude da cautela e da prudência para evitar riscos desnecessários e viver por muito tempo a serviço divino.\n\n[virtuous_theocrat.GetFirstNameNoTooltip] quase não sai de sua casa, da qual se diz ser mais segura que qualquer tesouro e tão inexpugnável quanto uma fortaleza."
 fervor.2002.desc.brave: "Muitos aspirantes a pregadores viajam diariamente para a [virtuous_theocrat.GetFaith.HouseOfWorship] de [virtuous_theocrat.Custom('GetCouncilOrTitleName')] em busca da orientação de est[virtuous_theocrat.Custom('ES_EA')] estimad[virtuous_theocrat.Custom('ES_OA')] sacerdot[virtuous_theocrat.Custom('ES_TeTisa')].\n\n[virtuous_theocrat.GetFirstNameNoTooltip] tornou-se famoso por sua determinação inabalável e sua destemor. Seja caçando uma fera selvagem ou enfrentando hereges e blasfemos, [virtuous_theocrat.GetFirstNameNoTooltip] está sempre pront[virtuous_theocrat.Custom('ES_OA')] e ansios[virtuous_theocrat.Custom('ES_OA')] para investir de frente contra seus inimigos."
 fervor.2002.desc.shy: "[virtuous_theocrat.GetFirstName] se tornou um exemplo vivo de como o isolamento é fundamental para purificar a alma.\n\nAo se afastar das inconveniências da sociedade comum, este sacerdote[virtuous_theocrat.Custom('ES_TeTisa')] alcançou um estado de comunhão com o divino com o qual a maioria dos [virtuous_theocrat.GetFaith.GetAdherentNamePlural] só pode sonhar."
 fervor.2002.desc.gregarious: "[virtuous_theocrat.GetFirstName] tornou-se um pilar básico de sua comunidade.\n\nSempre dispost[virtuous_theocrat.Custom('ES_OA')] a ouvir seu rebanho, encarna o espírito congregacionalista que seus colegas frequentemente pregam, mas que raramente seguem."
 fervor.2002.desc.gregarious.pope: "[virtuous_theocrat.GetFirstName] demonstra regularmente um nível de envolvimento com a comunidade que todo [virtuous_theocrat.GetFaith.GetAdherentName] aspira a imitar.\n\nSempre dispost[virtuous_theocrat.Custom('ES_OA')] a ouvir seu rebanho, encarna o espírito congregacionalista que seus colegas frequentemente pregam, mas raramente seguem."
 fervor.2002.desc.ambitious: "Poucos buscam o favor de [ROOT.Char.GetFaith.HighGodName] com maior fervor e determinação que [virtuous_theocrat.GetFirstName].\n\nSua busca incansável por glória se tornou uma inspiração para inúmeros [virtuous_theocrat.GetFaith.GetAdherentNamePlural] jovens de todas as partes."
 fervor.2002.desc.content: "Segundo muitos, [virtuous_theocrat.GetFirstName] abraçou de fato o distanciamento dos assuntos mundanos que é central para o dogma de [ROOT.Char.GetFaith.GetAdherentNameNoTooltip].\n\nEsta pessoa não demonstra interesse por fama ou glória, contente em viver uma vida a serviço de [ROOT.Char.GetFaith.HighGodName]."
 fervor.2002.desc.arbitrary: "Todo estudioso sensato sabe que a vontade divina é insondável e mutável, mas poucos dão melhor exemplo de sua natureza do que [virtuous_theocrat.GetFirstName]. \n\n[virtuous_theocrat.Custom('GetCouncilOrTitleName')] de [scoped_primary_title.GetNameNoTier] ganhou fama por seu julgamento rápido e enigmático. Tanto que muitos acreditam que foi tocad[virtuous_theocrat.Custom('ES_OA')] por [ROOT.Char.GetFaith.HighGodName]."
 fervor.2002.desc.just: "A reputação firme e impecável de [virtuous_theocrat.Custom('GetCouncilOrTitleName')]lhe rendeu o respeito de muitos.\n\nFrequentemente [virtuous_theocrat.GetHerHim]é chamado para resolver disputas, e muitos [virtuous_theocrat.GetHerHim]o veem como a personificação do espírito da justiça divina, tão central para o dogma de [virtuous_theocrat.GetFaith.GetAdherentName]."
 fervor.2002.desc.cynical: "Ao longo de seus anos de estudo e pregação, [virtuous_theocrat.GetFirstName]construiu uma reputação ilustre como pensador[virtuous_theocrat.Custom('ES_XA')] crític[virtuous_theocrat.Custom('ES_OA')].\n\n[ROOT.Char.GetFaith.HighGodName] preencheu o mundo com mistérios, e os fiéis só poderão alcançar de verdade a iluminação mantendo um questionamento constante e uma atitude racional."
 fervor.2002.desc.zealous: "[virtuous_theocrat.GetFirstName] é visto por muitos como uma fortaleza da fé contra a corrupção e a heresia.\n\nPessoa de devoção inabalável, [virtuous_theocrat.GetFirstNameNoTooltip] luta dia e noite para garantir que todos os membros de seu rebanho sigam o dogma [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] ao pé da letra."
 fervor.2002.desc.zealous.pope: "[virtuous_theocrat.GetFirstName] é visto por muitos como um bastião da fé contra a corrupção e a heresia.\n\nPessoa de devoção inabalável, [virtuous_theocrat.GetFirstNameNoTooltip] luta dia e noite para garantir que a integridade do [virtuous_theocrat.GetFaith.GetName] e que o clero cumpra à risca as verdades dogmáticas do seu [virtuous_theocrat.GetFaith.ReligiousText] ao pé da letra."
 fervor.2002.desc.paranoid: "Quando hereges e blasfemadores se escondem em cada esquina, uma mente afiada e inquisitiva é a melhor ferramenta de qualquer seguidor devoto de [ROOT.Char.GetFaith.HighGodName].\n\n [virtuous_theocrat.GetFirstName] inspirou inúmeros pregadores com suas dissertações sobre a revelação da heresia, garantindo a contínua integridade de nossa fé."
 fervor.2002.desc.trusting: "[virtuous_theocrat.GetFirstName] tem trabalhado arduamente para difundir a verdade revelada de que todos os homens [ROOT.Char.GetFaith.GetAdherentNameNoTooltip]s são sinceros e francos.\n\nSó confiando implicitamente na palavra do próximo poderemos, em troca, fomentar a sinceridade."
 fervor.2002.desc.compassionate: "Uma alma verdadeiramente abençoada, [virtuous_theocrat.GetFirstName] tornou-se um verdadeiro exemplo da bondade [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] ao liderar seu rebanho com mão gentil, sempre dispost[virtuous_theocrat.Custom('ES_OA')] a ouvir e ajudar as almas menos afortunadas que procuram [virtuous_theocrat.GetSheHe] em busca de orientação."
 fervor.2002.desc.callous: "[virtuous_theocrat.GetFirstName] mostrou repetidas vezes a seus pares e seguidores a importância de que um[virtuous_theocrat.Custom('ES_XA')] piedoso[virtuous_theocrat.Custom('ES_OA')] seguidor[virtuous_theocrat.Custom('ES_XA')] da fé [ROOT.Char.GetFaith.GetAdjective] permaneça indiferente tanto à tentação quanto à dor.\n\nAs paixões inspiradas pelo mundo material são passageiras e insignificantes em comparação com a glória dos céus."
 fervor.2002.desc.sadistic: "[virtuous_theocrat.GetFirstName] é temid[virtuous_theocrat.Custom('ES_OA')] e respeitad[virtuous_theocrat.Custom('ES_OA')] em igual medida por seu rebanho. Pessoa implacável, passa os dias punindo os pecadores onde quer que os encontre, garantindo a purificação de suas almas por meio de uma apoteose de dor."
 fervor.2002.desc.sadistic.pope: "[virtuous_theocrat.GetFirstName] é temid[virtuous_theocrat.Custom('ES_OA')] e respeitad[virtuous_theocrat.Custom('ES_OA')] em igual medida pelos fiéis. Pessoa implacável, passa os dias punindo os pecadores onde quer que os encontre, garantindo a purificação de suas almas por meio de uma apoteose de dor."
 fervor.2002.desc.forgiving: "[virtuous_theocrat.GetFirstName] se tornou um símbolo do infinito perdão divino.\n\nSempre disposto[virtuous_theocrat.Custom('ES_OA')] a estender a mão e com a mente aberta para aqueles que precisam, [virtuous_theocrat.GetFirstNameNoTooltip] foi decisivo[virtuous_theocrat.Custom('ES_OA')] para manter vivo o preceito [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] de que ninguém é inocente por completo, de modo que somente [ROOT.Char.GetFaith.HighGodName] pode julgar os outros."
 fervor.2002.desc.fallback: "[virtuous_theocrat.GetFirstName] é considerad[virtuous_theocrat.Custom('ES_OA')] por muitos um exemplo de virtude [ROOT.Char.GetFaith.GetAdjectiveNoTooltip].\n\nSua conduta irrepreensível e seu trabalho incansável como erudit[virtuous_theocrat.Custom('ES_OA')] e pregador/[virtuous_theocrat.Custom('ES_XA')] têm ajudado a dar um novo e significativo impulso à fé nestes últimos anos."
 fervor.2001.a.a: "É um exemplo para todos nós!"
 fervor.2001.a.b: "Que louvável."
 fervor.2001.a.c: "Mas ele está fazendo isso por [ROOT.Char.GetFaith.HighGodName] ou por fama?"
