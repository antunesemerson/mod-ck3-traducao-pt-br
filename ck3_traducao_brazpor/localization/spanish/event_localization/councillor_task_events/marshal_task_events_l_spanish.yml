l_spanish:
 marshal_task.0301.t: "Comandante Promovido"
 marshal_task.0301.desc: "Mi [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l], me muestra un[commander.Custom('ES_XA')] [commander.Custom('ES_OA')] recluta prometedor[commander.Custom('ES_XA')].\n\n«Puede que no sea de cuna noble como vos, mi [councillor.Custom2('RelationToMe', ROOT.Char)], pero os juro que [commander.GetTitledFirstName|l] es alguien a quien querréis a vuestro lado»."
 marshal_task.0301.a: "Muito bem, [commander.GetFirstNameNoTooltip] servirá a mim."
 marshal_task.0301.b: "Tire esse ralé da minha [ROOT.Char.Custom('ResidenceBuilding')]!"
 marshal_task.0302.opening: "[councillor.Custom2('AppropriateGreeting', ROOT.Char)]"
 marshal_task.0302.desc: "Vi a [commander.GetTitledFirstName|l] mostrar propensão para [commander.Custom('CommanderTraitSkillDescription')]."
 marshal_task.0302.desc.known: "É uma das minhas especialidades, e eu poderia ensiná-l como usar melhor essas habilidades."
 marshal_task.0302.desc.unknown: "Embora eu não seja especialista nessa área, ainda posso tentar ajudá-l a aprimorar suas habilidades."
 marshal_task.0302.a: "Claro, ensine-o."
 marshal_task.0302.b: "Não, [commander.GetFirstNameNoTooltip] deve se concentrar no combate pessoal."
 marshal_task.0304.t: "Promoção de Comandante?"
 marshal_task.0304.desc: "Meu [councillor.GetCouncilTitle]. [councillor.Custom('ES_ElLa')] [councillor.GetTitledFirstName|l] a mim, com muita hesitação, [beneficiary_of_nepotism.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n“[advocate_of_nepotism.Custom('ES_ElLa')|U] [advocate_of_nepotism.GetTitledFirstName|l] me pediu que eu promova [beneficiary_of_nepotism.Custom('ES_AlAla')] [beneficiary_of_nepotism.GetTitledFirstNameNoTooltip|l] ao título de comandante. Mas achei que talvez quisesse opinar sobre isso antes…”.\n\n[beneficiary_of_nepotism.Custom('ES_ElLa')|U] [beneficiary_of_nepotism.GetTitledFirstNameNoTooltip|l] [beneficiary_of_nepotism.Custom('quirk_neg_present')]."
 marshal_task.0304.a_clan: "Todas as crianças da Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] são bem-vindas ao exército."
 marshal_task.0304.a_neutral: "Seu[beneficiary_of_nepotism.Custom('ES_OA')] [beneficiary_of_nepotism.Custom('GetDaughterSon')] será bem-vind[beneficiary_of_nepotism.Custom('ES_OA')] ao meu exército."
 marshal_task_0304_a_tt: "@warning_icon! #X [CHARACTER.GetShortUINameNoTooltip] de disgustará si [TARGET_CHARACTER.GetShortUINameNoTooltip] se ve despedid[TARGET_CHARACTER.Custom('ES_OA')] en un plazo de 20 años#!"
 marshal_task.0304.b: "¿Y [beneficiary_of_nepotism.Custom('ES_ElLa')] [beneficiary_of_nepotism.GetTitledFirstNameNoTooltip|l] no preferiría servir como cortesan[beneficiary_of_nepotism.Custom('ES_OA')]?"
 marshal_task.0304.b.success: "[advocate_of_nepotism.Custom('ES_AlAla')|U] [advocate_of_nepotism.GetTitledFirstNameNoTooltip|l] fica satisfeito com sua oferta"
 marshal_task.0304.b.failure: "Sua oferta insulta [advocate_of_nepotism.Custom('ES_AlAla')] [advocate_of_nepotism.GetTitledFirstNameNoTooltip|l]"
 marshal_task.0304.c: "Meu exército #EMP não#! é uma creche!"
 marshal_task.0306.opening: "[advocate_of_nepotism.Custom2('AppropriateGreetingNegative', SCOPE.sC('councillor_liege'))]"
 marshal_task.0306.desc: "Eu acreditei na sua palavra quando prometeste fazer de [beneficiary_of_nepotism.Custom2('MyCharacterIntroduction', advocate_of_nepotism)] vostr[beneficiary_of_nepotism.Custom('ES_OA')] [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')], mas agora vejo que minha confiança foi mal depositada em você. Perdoe-me por ter acreditado demais em suas palavras."
 marshal_task.0306.a: "Isso é apenas um mal-entendido!"
 marshal_task.1001.t: "Deserção da Milícia"
 marshal_task.1001.desc: "Las duras prácticas de reclutamiento de mi [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l], parecen tener el efecto contrario al deseado.\n\nAunque se juntan muchos campesinos en pueblos y ciudades, ¡otros muchos más escapan de sus tropas para eludir sus obligaciones de cumplir servicio!"
 marshal_task.1001.a: "Eu preciso de mais tropas, não menos!"
 marshal_task.1001.notification: "Deserção da Milícia"
 marshal_task.1002.t: "Terras Agrícolas Não Utilizadas"
 marshal_task.1002.desc: "A quantidade recorde de tropas de leva que meu [councillor.GetCouncilTitle] mobilizou trouxe algumas consequências imprevistas.\n\nO recrutamento indiscriminado de [councillor.GetTitledFirstName|l] deixou vários acres de terras agrícolas sem cultivo em [county.GetName]."
 marshal_task.1002.a: "Isso não deveria acontecer."
 marshal_task.1002.notification: "Milícia Deixa Terras Agrícolas Vazias"
 marshal_task.1003.t: "Guardas Insuficientes"
 marshal_task.1003.desc: "O recrutamento entusiasmado do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] , [councillor.GetTitledFirstName|l] , resultou em uma escassez de homens aptos no [county.GetName].\n\nCom menos pessoas para servir como guardas locais, a criminalidade está aumentando."
 marshal_task.1003.a: "O que você fez, [councillor.GetFirstNameNoTooltip]..."
 marshal_task.1003.notification: "Guardas Recrutados para a Milícia"
 marshal_task.1101.t: "Serviço Bem-Organizado"
 marshal_task.1101.desc: "Mediante el examen y la selección cuidadosa de los soldados de leva, mi [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l], me aseguró que ni una sola granja del [county.GetName] quedará desatendida.\n\nLos registros que tiene también serán útiles a la hora de los impuestos…"
 marshal_task.1101.a: "Ótimo trabalho, [councillor.GetFirstNameNoTooltip]."
 marshal_task.1101.notification: "Serviço de Milícia Bem-Organizado"
 marshal_task.1102.t: "Aumento da Presença Militar"
 marshal_task.1102.desc: "O trabalho de [councillor.GetTitledFirstName|l] para reorganizar minhas levas avançou para [county.GetName], onde a maior presença militar fez maravilhas.\n\nOs bandoleiros foram eliminados, e os contrabandistas e sequestradores têm medo demais para agir."
 marshal_task.1102.a: "Meus súditos sempre podem se sentir seguros."
 marshal_task.1102.notification: "Aumento da Presença Militar"
 marshal_task.1103.notification: "Tropas preparadas para a batalha"
 marshal_task.2001.t: "Comandante Ferido"
 marshal_task.2001.opening: "No curso de um duelo de treinamento, [commander.GetTitledFirstName] foi atingid!"
 marshal_task.2001.ending: "\n\nMeu [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l], conseguiu estancar o sangramento, mas [commander.GetFirstName] levará algum tempo para se recuperar."
 marshal_task.2001.a: "Eles estavam usando armas reais?!"
 marshal_task.2001.notification: "Guerreiro Ferido em Treinamento"
 marshal_task.2101.notification: "Traço de [commander.Custom('CommanderTraitBeingTaughtNoTooltip')] Obtido"
 marshal_task.2102.notification: "Cavaleiro Aprimorado"
 marshal_task.2103.notification: "Hastilúdios Treinados"
 marshal_task.0302.notification.a: "Comandante Significativamente Aprimorado"
 marshal_task.0302.notification.b: "Comandante Aprimorado"
 marshal_task.0303.notification.a: "Cavaleiro Significativamente Aprimorado"
 marshal_task.0303.notification.c: "Cavaleiro se Tornou Mestre das Lâminas"
 marshal_task.2002.t: "Comandante Gravemente Ferido"
 marshal_task.2002.eye: "\n\nMeu [councillor.GetCouncilTitle] chamou rapidamente um médico, mas não houve como salvar sua visão."
 marshal_task.2002.leg: "\n\nMeu [councillor.GetCouncilTitle] chamou rapidamente um médico, mas não havia como salvar a vida e a perna."
 marshal_task.2002.hand: "\n\nMeu [councillor.GetCouncilTitle] chamou rapidamente um médico, mas não havia como salvar a vida e o braço ao mesmo tempo."
 marshal_task.2002.a: "Pelo menos sua mente ainda está intacta."
 marshal_task.2002.b: "Sua montaria terá que levá-lo para a batalha."
 marshal_task.2002.c: "Por favor, me diga que ele ainda tem a mão da espada!"
 marshal_task.2002.generic_title: "Guerreiro Ferido em Treinamento"
 marshal_task.2002.notification_eye: "[commander.GetTitledFirstName] perdeu um olho durante um treinamento sob a supervisão do m [councillor.GetCouncilTitle]!"
 marshal_task.2002.notification_leg: "[commander.GetTitledFirstName] perdeu uma perna durante um treinamento sob a supervisão do m [councillor.GetCouncilTitle]!"
 marshal_task.2002.notification_hand: "[commander.GetTitledFirstName] foi mutilad[commander.Custom('ES_OA')] treinando sob a direção do meu [councillor.GetCouncilTitle]!"
 marshal_task.2003.t: "Morte de um Comandante"
 marshal_task.2003.ending: "\n\nM [councillor.GetCouncilTitle] chamou um médico imediatamente, mas [commander.GetFirstName] havia perdido muito sangue em questão de momentos."
 marshal_task.2003.a: "Uma perda trágica para meu exército."
 marshal_task.2101.desc: "Meu [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l], vem até mim com uma proposta.\n\n\"Notei que [commander.GetTitledFirstName|l] compartilha muito do mesmo potencial para [commander.Custom('CommanderTraitSkillDescription')] que [teacher.GetTitledFirstName|l] já teve. Acredito que [commander.GetFirstName] poderia aprender muito com um ensino dedicado de [teacher.GetFirstName].\""
 marshal_task.2101.a: "Faça isso acontecer."
 marshal_task.2101.b: "[commander.GetFirstNameNoTooltip] deve se concentrar mais no combate pessoal!"
 marshal_task.3001.t: "Resistência Local"
 marshal_task.3001.desc: "Honrado [councillor.Custom2('RelationToMe', ROOT.Char)]:\n Embora meus esforços para reorganizar o [county.GetName] estejam progredindo a bom ritmo, nem todos estão convencidos dos benefícios.\nParece que ofendi muitos prefeitos e anciãos das aldeias. De fato, todos eles."
 marshal_task.3001.a: "O que você fez, [councillor.GetFirstNameNoTooltip]..."
 marshal_task.3001.notification: "Perda de Respeito Popular"
 marshal_task.3002.desc: "Honrado [councillor.Custom2('RelationToMe', ROOT.Char)]…\n\nParece que cometi alguns erros de julgamento. As reformas que implementei no [county.GetName] tinham como objetivo fortalecer seu controle sobre a região, mas, em vez disso, as pessoas mal sabem quem é seu [ROOT.Char.GetTitleTierName]…"
 marshal_task.3002.a: "Voc? deixou as coisas #EMP ainda piores#!?"
 marshal_task.3002.notification: "[councillor.GetCouncilTitle] Perdendo o Controle"
 marshal_task.3003.t: "Uma Decepção"
 marshal_task.3003.desc: "Saludos, [baron.Custom2('RelationToMe', ROOT.Char)]:\n ¡Debo quejarme del comportamiento de vuestr[councillor.Custom('ES_OA')] [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l]!\n ¡Se presentó en el [county.GetName] y empezó a cambiar cosas a capricho, sin respetar nuestras tradiciones ni antiguas costumbres!"
 marshal_task.3003.a: "Você não poderia ser um pouco mais delicado, [councillor.GetFirstNameNoTooltip]?"
 marshal_task.3003.notification: "Barão Irritado"
 marshal_task.3101.t: "Benefícios Locais"
 marshal_task.3101.desc: "Honrado [councillor.Custom2('RelationToMe', ROOT.Char)];\n Fico feliz em informar que minha reorganização de [county.GetName] está indo bem.\n E isso não beneficia apenas você. O povo de [county.GetNameNoTier] é eternamente leal ao seu [ROOT.Char.GetTitleTierName], é claro, mas raramente estiveram tão gratos."
 marshal_task.3101.a: "Bom trabalho, [councillor.GetCouncilTitle]!"
 marshal_task.3101.notification: "[councillor.GetCouncilTitle] Ganha Respeito"
 marshal_task.3102.t: "Uma Gratidão"
 marshal_task.3102.desc: "Meu [baron.Custom2('RelationToMe', ROOT.Char)]\n Vostr[councillor.Custom('ES_OA')] [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l], esteve trabalhando sem descanso para reorganizar o [county.GetName] e já colhemos os frutos.\nDesejo agradecer-lhe pessoalmente por enviar uma pessoa tão capaz para nos ajudar!"
 marshal_task.3102.a: "Continue com o bom trabalho, [councillor.GetFirstNameNoTooltip]."
 marshal_task.3102.notification: "[councillor.GetCouncilTitle] Impressiona o Vassalo"
 marshal_task.3103.notification: "[acclaimed_knight] subjuga a plebe"
 marshal_task.4002.notification: "Guardas Reais Desorganizados"
 task_manage_guards_disorganized_modifier: "$marshal_task.4002.notification$"
