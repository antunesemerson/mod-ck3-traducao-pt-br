l_spanish:
 steward_task.0001.t: "Condado De Jure Convencido"
 steward_task.0001.desc: "Más notícias chegaram até mim hoje: o povo de [county.GetNameNoTier] reivindica pertencer a [councillor_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] , maior e mais prestigioso!\n\nConvencidos pelas promessas melífluas de [councillor.GetTitledFirstName|l] e seduzidos pelo esplendor da corte [councillor_liege.Custom('ES_DelDela')] [councillor_liege.GetTitledFirstName|l], esses agora esperam que eu simplesmente entregue o condado ao meu vizinho intrometid[councillor_liege.Custom('ES_OA')] vizinh[councillor_liege.Custom('ES_OA')]!\n\nDevo considerar cuidadosamente meu próximo movimento. Perder terras nunca é o ideal, mas os habitantes locais ficarão extremamente descontentes comigo se eu não os deixar partir."
 steward_task.0001.a: "Não tenho escolha. Vou ceder."
 steward_task.0001.b: "Absurdo! Não permitirei isso!"
 steward_task.0001.liege_changed: "Entregue ao Senhor De Jure"
 steward_task.0001.liege_changed.tt: "Seu [ROOT.Char.Custom('ES_SennorSennora')] [ROOT.Char.GetTitledFirstName|l] cedeu aos protestos de seus s?ditos e libertou [county.GetNameNoTooltip] para seu governante de jure, seu/sua nov[councillor_liege.Custom('ES_OA')] [councillor_liege.Custom('ES_SennorSennora')], [councillor_liege.GetTitledFirstName|l]."
 steward_task.0001.county_loss.tt: "Seu [ROOT.Char.Custom('ES_SennorSennora')] [ROOT.Char.GetTitledFirstName|l] cedeu às protestas de seus súditos e libertou o [county.GetNameNoTooltip] ao seu governante de jure, [councillor_liege.GetTitledFirstName|l]. Você não controla mais o condado!"
 steward_task.0002.t: "Condado De Jure Liberado!"
 steward_task.0002.desc: "Parece que os esforços do meu [councillor.GetCouncilTitle] em [county.GetName] finalmente deram frutos!\n\nOs habitantes locais foram convencidos pela lábia de [councillor.GetTitledFirstName|l] e influenciados pelo prestígio da minha corte. Diante[previous_owner.Custom('ES_OA')] do descontentamento de todo o condado, [previous_owner.GetTitledFirstName|l] escolheu o caminho de menor resistência e libertou [county.GetNameNoTierNoTooltip].\n\nAgora o condado pertence ao seu [ROOT.Char.Custom('ES_SennorSennora')] de iure, isto é, a mim!"
 steward_task.0002.a: "Bem feito, [councillor.GetFirstNameNoTooltip]!"
 steward_task.0003.t: "Falha em Convencer o Território De Jure!"
 steward_task.0003.desc: "Parece que o trabalho do meu [councillor.GetCouncilTitle] no [county.GetName] não deu em nada.\n\nOs habitantes locais, persuadidos pelo dom da oratória de [councillor.GetTitledFirstName|l] e influenciados pelo prestígio da minha corte, protestaram com veemência contra seu senhor[previous_owner.Custom('ES_XA')] ilegítim[previous_owner.Custom('ES_OA')], [previous_owner.GetTitledFirstName|l], mas foi em vão.\n\nEmbora o descontentamento local ainda o torne uma presa mais fácil para nós, meu plano diplomático foi frustrado. Por ora."
 steward_task.0003.a: "Maldit[previous_owner.Custom('ES_OA')] seas, [previous_owner.GetFirstNameNoTooltip]!"
 steward_task.1101.t: "Melhoria na Tributação"
 steward_task.1101.desc: "Quando minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] me enumera todos os feudos, seu valor e as obrigações pagas, [councillor.GetHerHim] o interrompo ao ouvir uma soma que #EMP debe#! deve ser um erro.\n\"Você arrecadou QUANTO do [county.GetName]?!\".\n\n[councillor.GetFirstName] sorri. \"Pensei que ficaria satisfeito em saber, [ROOT.Char.Custom('FormOfAddressForLiege')]\"."
 steward_task.1101.a: "Por [ROOT.Char.GetFaith.WealthGodName], é claro que estou satisfeito!"
 steward_task.1101.b: "Ahaha! Dia de pagamento!"
 steward_task.1101.notification: "Impostos Adicionais"
 steward_task.1001.t: "Aliviando o Próprio Fardo"
 steward_task.1001.opening: "Parece que os esforços de meu [councillor.GetCouncilTitle] para melhorar a arrecadação de impostos tiveram alguns efeitos colaterais desafortunados."
 steward_task.1001.end: "\n\nBandidos surgiram em [county.GetName], alegando que, com os novos impostos, o roubo é a única maneira de sustentar suas famílias."
 steward_task.1001.a: "Mais cedo ou mais tarde, eles estarão comendo aço!"
 steward_task.1001.notification: "Sobretaxação Causa Banditismo"
 steward_task.1002.end: "\n\nO povo de [county.GetName] começou a esconder membros da família e animais de fazenda de [councillor.GetTitledFirstName|l] e meus outros avaliadores!"
 steward_task.1002.a: "Precisamos conhecê-los para tributá-los, [councillor.GetFirstNameNoTooltip]!"
 steward_task.1002.notification: "Censo Inútil"
 steward_task.1003.end: "\n\nCom as novas taxas introduzidas, muitas pessoas em [county.GetName] estão se recusando a confiar em meus árbitros para resolver disputas!"
 steward_task.1003.a: "Você está perdendo o controle, [councillor.GetFirstNameNoTooltip]?"
 steward_task.1003.notification: "Nenhum Xerife Nomeado"
 steward_task.1004.end: "\n\nCom as novas taxas introduzidas em [county.GetName], cada vez mais pessoas estão recorrendo ao contrabando em vez do comércio legal!"
 steward_task.1004.a: "Eles estão praticamente roubando dos bolsos do [ROOT.Char.GetTitleTierName]!"
 steward_task.1004.notification: "Tarifas Excessivas"
 steward_task.1005.t: "Taxado Duas Vezes"
 steward_task.1005.desc: ""Isso é um escândalo", meu [steward.GetCouncilTitle|l] [steward.GetTitledFirstName|l] irrompe na sala do conselho com [tax_collector.Custom('ES_ElLa')] [tax_collector.GetTitledFirstName|l] logo atrás. "Primeiro me é ordenado arrecadar meus próprios impostos e depois [tax_collector.GetTitledFirstNameNoTooltip|l] os arrecada de novo? Vós deveis dizer a [tax_collector.GetNameNoTooltip] que fique fora das minhas terras".\n\n"[steward.Custom('ES_ElLa')|U] [steward.GetTitledFirstNameNoTooltip|l] cometeu um… erro de contabilidade", intervém [tax_collector.Custom('ES_ElLa')] [tax_collector.GetTitledFirstNameNoTooltip|l]. "Eu apenas o corrigi cobrando a diferença, nada mais".\n\n[steward.Custom('ES_ElLa')|U] [steward.GetTitledFirstNameNoTooltip|l] [tax_collector.GetHerHim] fulmina com o olhar."
 steward_task.1005.a: "Deixe-me dar uma olhada mais de perto nesses livros..."
 steward_task.1005.a_success: "Você otimiza o processo de tributação do reino"
 steward_task.1005.a_failure: "Não encontra nenhuma falha na contabilidade [tax_collector.Custom('ES_DelDela')] [tax_collector.GetTitledFirstNameNoTooltip|l]"
 steward_task.1005.b: "[tax_collector.Custom('ES_ElLa')|U] [tax_collector.GetTitledFirstNameNoTooltip|l] tem carta branca sobre os impostos do reino."
 steward_task.1005.c: "[steward.Custom('ES_ElLa')|U] [steward.GetTitledFirstNameNoTooltip|l] tem controle sobre os impostos de seu próprio domínio."
 steward_task.2001.t: "Falta de Trabalhadores"
 steward_task.2001.desc: "Os camponeses estão reclamando da interferência do meu [councillor.GetCouncilTitle] no [county.GetName]! Seu desvio de trabalhadores por todo o [county.GetTitleTierName] praticamente impede que outros projetos de construção já em andamento sejam concluídos."
 steward_task.2001.a: "Você não pode sacrificar tudo por essa tarefa, [councillor.GetFirstNameNoTooltip]!"
 steward_task.2001.notification: "Desenvolvimento Mal Gerenciado"
 steward_task.2002.desc: "Apreciad[ROOT.Char.Custom('ES_OA')] [councillor.Custom2('RelationToMe', ROOT.Char)]:\nMinhas tentativas de ajudar o [county.GetName] e de orientar o desenvolvimento contínuo da terra foram mal recebidas. De fato, dir-se-ia que os camponeses estão pedindo, por assim dizer, "minha cabeça numa lança". Parte dessa ira parece estar dirigida também a você, embora nada disso seja justificado."
 steward_task.2002.a: "[councillor.GetFirstNameNoTooltip]! O que você fez?!"
 steward_task.2002.notification: "População Mal Gerenciada"
 steward_task.2003.t: "Perda de Controle"
 steward_task.2003.desc: "Apesar dos bons esforços de meu [councillor.GetCouncilTitle] para estabelecer novos feudos em [county.GetName], parece que as coisas saíram do controle. Com tanta movimentação de pessoas, parece que [councillor.GetTitledFirstName|l] não sabe quais partes do [county.GetTitleTierName] já estão colonizadas e quais delas serão desmatadas. De fato, parece que ninguém sabe!"
 steward_task.2003.a: "Coloque a situação sob controle, [councillor.GetFirstNameNoTooltip]!"
 steward_task.2003.notification: "Perda de Controle"
 steward_task.2005.t: "Lucros Emergentes"
 steward_task.2005.desc: "Enquanto me concentro na diretriz de meu suserano[liege.Custom('ES_XA')], [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l], de desenvolver [county.GetName], seu $clan_tax_collector_court_position$, [tax_collector.Custom('ES_ElLa')] [tax_collector.GetTitledFirstName|l], aproxima-se de mim com um livro-caixa grosso e outro servo para carregá-lo.\n\n«Dado que o condado está aumentando de tamanho», explica, «é justo que os impostos também aumentem. Passei várias noites calculando uma soma justa que vós mesm[ROOT.Char.Custom('ES_OA')] podeis examinar neste livro-caixa…».\n\nO servo se arrasta até ali, com as pernas bambas."
 steward_task.2005.a: "Então vamos cobrar os impostos devidos."
 steward_task.2005.a.tt: "Acredito que [liege.Custom('ES_ElLa')] [liege.GetTitledFirstNameNoTooltip|l] prefere o dinheiro e os ganhos imediatos a curto prazo."
 steward_task.2005.b: "Não, o desenvolvimento de [county.GetNameNoTierNoTooltip] vem primeiro."
 steward_task.2005.b.tt: "Acredito que [liege.Custom('ES_ElLa')] [liege.GetTitledFirstNameNoTooltip|l] favorece os benefícios a longo prazo e não sente cobiça por ouro."
 steward_task.2005.c: "[liege.Custom('ES_ElLa')|U] [liege.GetTitledFirstNameNoTooltip|l] deve decidir por si mesm[liege.Custom('ES_OA')]."
 steward_task.2005.c.tt: "[liege.Custom('ES_ElLa')|U] [liege.GetTitledFirstNameNoTooltip|l] decidirá se dará prioridade aos impostos ou ao desenvolvimento de [county.GetNameNoTierNoTooltip]."
 steward_task.2005.success: "[liege.Custom('ES_ElLa')|U] [liege.GetTitledFirstNameNoTooltip|l] aprova sua orientação"
 steward_task.2005.failure: "[liege.Custom('ES_ElLa')|U] [liege.GetTitledFirstNameNoTooltip|l] discorda da sua orientação"
 steward_task.2006.opening: "[steward.Custom2('AppropriateGreeting', ROOT.Char)]"
 steward_task.2006.desc_intro: "Enquanto eu inspecionava [county.GetName], [tax_collector.Custom('ES_ElLa')] [tax_collector.GetTitledFirstName|l] me aconselhou a aumentar os impostos do condado em consonância com seu desenvolvimento.\n\n"
 steward_task.2006.desc_development: "No entanto, acreditei que isso frearia o crescimento do condado e, por consequência, não segui o conselho."
 steward_task.2006.desc_taxation: "Segui o seu conselho e acredito que você apreciará os resultados."
 steward_task.2006.a: "Bom trabalho, [steward.GetTitledFirstNameNoTooltip|l]."
 steward_task.2006.b: "O quê? Isso não era o que eu queria!"
 steward_task.2006.b_notification: "Decisão Anulada"
 steward_task.2007.desc: "[tax_collector.Custom('ES_ElLa')|U] [tax_collector.GetTitledFirstName|l] e eu não conseguimos decidir se priorizar a tributação de [county.GetName] ou seu desenvolvimento, e assim trazemos a questão a vocês."
 steward_task.2007.a: "Mais impostos são bons impostos, esse é o meu lema."
 steward_task.2008.desc_intro_friendly: "Embora [steward.Custom2('MyCharacterIntroduction', ROOT.Char)] e [tax_collector.Custom2('MyCharacterIntroduction', ROOT.Char)] normalmente se saiam bem, parece que eles estão se desentendendo sobre [county.GetNameNoTier] de todas as coisas."
 steward_task.2008.desc_intro_unfriendly: "Não passa um dia sem que [steward.Custom2('MyCharacterIntroduction', ROOT.Char)] e [tax_collector.Custom2('MyCharacterIntroduction', ROOT.Char)] se desentendam. Desta vez, a discussão parece ser sobre [county.GetNameNoTier] de todas as coisas."
 steward_task.2008.desc_outro: "\n\n«À medida que aumenta la prosperidade de [county.GetNameNoTooltip], os impostos também devem aumentar», afirma [tax_collector.Custom('ES_ElLa')] [tax_collector.GetTitledFirstNameNoTooltip|l]. «Vamos aumentá-los agora, em vez de esperar até que [steward.Custom('ES_ElLa')] [steward.GetTitledFirstNameNoTooltip|l] termine oficialmente sua tarefa».\n\n«Mas fazer isso vai desacelerar o crescimento de [county.GetNameNoTierNoTooltip]», replica [steward.Custom('ES_ElLa')] [steward.GetTitledFirstNameNoTooltip|l]. «E, no fim, minha diretriz é desenvolver — não tributar — o condado»."
 steward_task.2008.a: "[tax_collector.Custom('ES_ElLa')|U] [tax_collector.GetTitledFirstNameNoTooltip|l] está certo nessa questão."
 steward_task.2008.b: "[steward.Custom('ES_ElLa')|U] [steward.GetTitledFirstNameNoTooltip|l] apresenta um bom argumento."
 steward_task.2008.c: "Vocês dois não conseguem resolver isso sozinhos?!"
 steward_task.2101.t: "Tributação Eficiente"
 steward_task.2101.desc: "Com [councillor.GetTitledFirstName|l], meu [councillor.GetCouncilTitle], liderando a colonização e a limpeza de terras em [county.GetName], tem uma visão clara não só dos novos feudos, mas também dos que já existiam antes.\n\nSegundo [councillor.GetSheHe], nossos registros fiscais nunca estiveram tão detalhados!"
 steward_task.2101.a: "Você sabe o que fazer, [councillor.GetFirstNameNoTooltip]!"
 steward_task.2101.notification: "Impostos Eficientes do Condado"
 steward_task.2102.t: "Aumento do Controle"
 steward_task.2102.desc: "Dirigir o assentamento de novos feudos em [county.GetName] requer que meu [councillor.GetCouncilTitle] exerça um grau de controle maior do que o que era tradicional para o povo dali.\n\nFelizmente, [councillor.GetTitledFirstName|l] inspira grande respeito, e a administração reforçada no [county.GetTitleTierName] me beneficia de mais de uma maneira."
 steward_task.2102.a: "Lembre a todos quem governa o [ROOT.Char.GetTitleTierName]."
 steward_task.2102.notification: "Aumento do Controle"
 steward_task.3001.t: "Resistência dos Colonos"
 steward_task.3001.desc: "Muitos dos novos colonos [ROOT.Char.GetCulture.GetName] em [county.GetName] têm enfrentado dificuldades. Em [county.GetNameNoTier], os colonos não apenas são ignorados por suas comunidades, mas têm ocorrido ataques diretos em várias propriedades rurais!"
 steward_task.3001.a: "Os colonos [ROOT.Char.GetCulture.GetNameNoTooltip] devem ser respeitados!"
 steward_task.3001.notification: "Resistência dos Colonos"
 steward_task.3002.t: "Resistência à Administração"
 steward_task.3002.desc: "[councillor.GetTitledFirstName] est? enfrentando problemas inesperados em [county.GetName]. Os moradores locais se recusam a cooperar com a nova administra??o [ROOT.Char.GetCulture.GetName]. Chegam reclama??es de que os esfor?os do meu [councillor.GetCouncilTitle] s?o muito mais perturbadores do que ?teis."
 steward_task.3002.a: "Tudo isso é necessário, receio."
 steward_task.3002.notification: "Administração [ROOT.Char.GetCulture] Falha"
 steward_task.3101.t: "Administração Bem-Vinda"
 steward_task.3101.desc: "Meu [councillor.GetCouncilTitle] , [councillor.GetTitledFirstName|l] tem trabalhado para estabelecer uma administração no [county.GetName] baseada nos princípios [ROOT.Char.GetCulture.GetName]s.\n\nSeus esforços parecem ter sido bem recebidos entre os habitantes locais, pois suas vidas estão se tornando mais fáceis e seguras."
 steward_task.3101.a: "Eu estava certo em confiar em [councillor.Custom('ES_ElLa')] [councillor.GetTitledFirstNameNoTooltip|l]!"
 steward_task.3101.notification: "Administração [ROOT.Char.GetCulture] Bem-Vinda"
 steward_task.3102.t: "Gestão Apreciada"
 steward_task.3102.desc: "Meu [councillor.GetCouncilTitle] , [councillor.GetTitledFirstName|l] tem trabalhado para melhorar a administração do [county.GetName] implantando ideias baseadas em tradições [ROOT.Char.GetCulture.GetName]s.\n\nCom a hábil gestão do [county.GetTitleTierName] , os proprietários de terras locais não parecem se importar com um leve aumento nos impostos."
 steward_task.3102.a: "Mais ouro nos cofres é sempre bom!"
 steward_task.3102.notification: "Administração [ROOT.Char.GetCulture]"
 steward_task.3103.t: "Regimentos Fortalecidos"
 steward_task.3103.desc: "Algo estranho aconteceu graças aos esforços de [councillor.GetTitledFirstName|l] para estabelecer colonos [ROOT.Char.GetCulture.GetName] em [county.GetNameNoTier].\n\nOs moradores locais parecem ter desenvolvido uma melhor compreensão de sua parte do reino e, quando chega a hora de lutar por ele, cada aldeia faz o que pode para enviar seus melhores aptos para servir. Na verdade, alguns camponeses se alistam voluntariamente!"
 steward_task.3103.a: "Agora já vi de tudo."
 steward_task.3103.notification: "Voluntários do [ROOT.Char.GetCulture]"
 steward_task.3201.notification: "Autonomia Aumentada"
 steward_task.3202.notification: "Isenção de Impostos Culturais Concedida"
 steward_task.3203.notification: "Tradições Arcaicas Protegidas"
 steward_task.3301.notification: "Entendimento Cultural Alcançado"
 steward_task.3302.notification: "Abordagens Diplomáticas Apreciadas"
 steward_task.3303.notification: "Curiosidade Cultural Despertada"
 steward_task.4001.opening: "[county_liege.Custom2('AppropriateGreeting', ROOT.Char)]"
 steward_task.4001.desc: "Ficou evidente que seu [councillor.GetCouncilTitle] está trabalhando para encantar o [county.GetName] e voltar isso contra mim. Não pense que uma ação desonrosa desse tipo ficará sem resposta."
 steward_task.4001.a: "Mas eu tenho uma reivindicação #EMP legítima#! sobre ele!"
 steward_task.4002.t: "Perda de Prestígio"
 steward_task.4002.desc: "[councillor.GetTitledFirstName] está enfrentando problemas inesperados em [county.GetName]. Os moradores locais estão completamente desinteressados com nossas tentativas de conquistá-los."
 steward_task.4002.a: "Eles entenderão, mais cedo ou mais tarde."
 steward_task.4002.notification: "Perda de Prestígio"
 steward_task.4101.t: "Prestígio Obtido"
 steward_task.4101.desc: "A missão de [councillor.GetTitledFirstName|l] no [county.GetName] está começando a dar resultados. Os moradores locais estão impressionados com nossos esforços e nos veem com bons olhos."
 steward_task.4101.a: "Excelente resultado!"
 steward_task.4101.notification: "Prestígio Obtido"
