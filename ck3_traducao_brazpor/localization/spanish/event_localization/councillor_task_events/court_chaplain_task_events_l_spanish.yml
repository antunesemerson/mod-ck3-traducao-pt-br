 court_chaplain_task.1101.notification: "Minando a Ordem"
 court_chaplain_task.2001.notification: "Meu [councillor.GetCouncilTitle], [councillor.GetFirstName], parece muito preocupad[councillor.Custom('ES_OA')] quando vem falar comigo.

"Veio à tona que eu estou... investigando a existência de uma reivindicação justa e legítima para vós sobre o [county.GetName]. Basta dizer que muitos dos vossos vassalos estão incomodados com o fato de que seu [ROOT.Char.GetTitleTierName] ignore a lealdade deles e aja contra eles dessa forma.""
 court_chaplain_task.2002.notification: "Como você deixou que pegassem você?!"
 court_chaplain_task.2101.notification: "Acusado de Fabricação de Reivindicação"
 court_chaplain_task.2102.notification: "[vassal.Custom2('AppropriateGreeting', ROOT.Char)]"
 court_chaplain_task.2103.notification: "Chegou ao meu conhecimento que voss[councillor.Custom('ES_OA')] [councillor.GetCouncilTitle], [councillor.GetFirstName], está tramando uma reivindicação fraudulenta sobre o [county.GetName]. Imploro que se lembre de que vós sois [ROOT.Char.GetTitleTierName] por direito, não por ganância."
 court_chaplain_task.3001.t: "Eu sei o que estou fazendo, [vassal.GetFirstNameNoTooltip]."
 court_chaplain_task.3001.desc: "Meu [councillor.GetCouncilTitle], [councillor.GetFirstName], parece muito preocupad[councillor.Custom('ES_OA')] quando vem falar comigo.

"Tornou-se claro que seu [councillor.GetCouncilTitle] está trabalhando para estabelecer uma reivindicação falsa e espúria sobre [county.GetName]. Não pense que esse tipo de ação desonrosa passará sem resposta."
 court_chaplain_task.3001.a: "Ah, mas #EMP há#! uma base para uma reivindicação aqui."
