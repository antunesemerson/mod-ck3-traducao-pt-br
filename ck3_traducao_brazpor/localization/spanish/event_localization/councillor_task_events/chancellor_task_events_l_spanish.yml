l_spanish:
 chancellor_task.0991_end_desc: "A opinião de [target_character.GetTitledFirstNameNoTooltip|l] não aumentará mais."
 chancellor_task.0991_increase_desc: "[target_character.Custom('ES_ElLa')|U] [target_character.GetTitledFirstNameNoTooltip|l] ficou impressionad[target_character.Custom('ES_OA')] e honrad[target_character.Custom('ES_OA')] pelo favor que você lhe concedeu."
 chancellor_task.1001.t: "Um Novo Pretendente"
 chancellor_task.1001.desc: "Nunca vi semejante estupidez…\n\n¡En su necio intento por mejorar las relaciones con mis vecinos, mi [councillor.GetCouncilTitle] [councillor.GetTitledFirstName|l] fue tan inútil como para reconocer los derechos de [neighboring_ruler.GetTitledFirstName|l] sobre el [target_county.GetName]!"
 chancellor_task.1001.a: "Você deveria estar me arranjando amigos, não inimigos!"
 chancellor_task.1001.title_message: "Erro Resulta em Reivindicação"
 chancellor_task.1001.message: "[councillor.GetTitledFirstName] oficialmente reconheceu sua reivindicação sobre [target_county.GetName]."
 chancellor_task.1002.t: "O Fim de uma Paz"
 chancellor_task.1002.desc: "Ao tentar melhorar minha reputação, a incompetência de [councillor.GetTitledFirstName|l] o fez aceitar um tratado que #EMP anula#! partes do que já havia pactuado com [target.GetName]!\n\nDo ponto de vista dele, [target.GetTitleTierName] pode declarar guerra contra mim quando bem quiser."
 chancellor_task.1002.a: "Por que você concordaria com isso, [councillor.GetFirstNameNoTooltip]?!"
 chancellor_task.1003.opening: "[neighbor.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 chancellor_task.1003.desc: "Tenho trocado correspondência com voss[councillor.Custom('ES_OA')] [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l], e tem sido uma demonstração diplomática vergonhosa. Não sois quem eu pensava!"
 chancellor_task.1003.a: "Isso deve ser algum terrível mal-entendido..."
 chancellor_task.1003.message: "[councillor.GetCouncilTitle] irrita a [neighbor.GetTitledFirstName|l]"
 chancellor_task.1102.t: "Diplomacia Hábil"
 chancellor_task.1102.desc: "Mi [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l], trabajó duro para convencer a nuestros vecinos y vasallos de que el tratado de paz al que llegué con [target.GetName] era incorrecto, ilegal e ¡injusto para mí!\n\nVuelvo a ser libre para declararle la guerra como me plazca."
 chancellor_task.1102.a: "Trabalho incrível, [councillor.GetFirstNameNoTooltip]!"
 chancellor_task.1103.opening: "[neighbor.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 chancellor_task.1103.desc: "Tenho estado me correspondendo com vosstr[councillor.Custom('ES_OA')] [councillor.GetCouncilTitle|l], [councillor.Custom('ES_ElLa')] [councillor.GetTitledFirstName|l], e devo dizer que agora vejo-vos com outros olhos.\n\nTalvez um dia eu me orgulhe de dizer que tenho sua amizade."
 chancellor_task.1103.a: "Sua lábia está afiada hoje, [councillor.GetFirstNameNoTooltip]!"
 chancellor_task.1103.message: "[councillor.GetCouncilTitle] impressiona o vizinho"
 chancellor_task.2001.t: "Resistência Local"
 chancellor_task.2001.desc: "Apreciad[ROOT.Char.Custom('ES_OA')] [councillor.Custom2('RelationToMe', ROOT.Char)]:\nEmbora meus esforços para reorganizar o [county.GetName] avançam em bom ritmo, nem todo mundo está convencido dos benefícios.\nParece que ofendi muitos prefeitos e líderes de aldeia. Na verdade, a todos."
 chancellor_task.2001.a: "O que você fez, [councillor.GetFirstNameNoTooltip]..."
 chancellor_task.2001.notification: "A incompetência do meu [councillor.GetCouncilTitle] fez com que o povo de [county.GetName] perdesse o respeito por mim"
 chancellor_task.2002.desc: "Apreciad[ROOT.Char.Custom('ES_OA')] [councillor.Custom2('RelationToMe', ROOT.Char)]…\n\nParece que cometi alguns erros de julgamento. As reformas que implantei em [county.GetName] iam reforçar seu controle da região, mas, em vez disso, o povo mal sabe quem é seu [ROOT.Char.GetTitleTierName]…"
 chancellor_task.2002.a: "Você piorou as coisas #EMP ainda mais?!#!"
 chancellor_task.2002.notification: "Meu [councillor.GetCouncilTitle] está perdendo o controle em [county.GetName]!"
 chancellor_task.2003.t: "Uma Decepção"
 chancellor_task.2003.desc: "Saudações, [baron.Custom2('RelationToMe', ROOT.Char)],\n devo reclamar do comportamento de voss[councillor.Custom('ES_OA')] [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l]!\n Apareceu em [county.GetName] e começou a mudar as coisas por capricho, sem respeitar nossas tradições nem costumes antigos!"
 chancellor_task.2003.a: "Você não poderia ser um pouco mais delicado, [councillor.GetFirstNameNoTooltip]?"
 chancellor_task.2003.notification: "Meu incompetente [councillor.GetCouncilTitle] irritou um dos meus vassalos!"
 chancellor_task_2001.message: "Os barões resistem à integração"
 chancellor_task_2002.message: "Resistência à Integração de [resisting_culture.GetNameNoTooltip]"
 chancellor_task_2101.message: "Os barões apoiam a integração"
 chancellor_task_2102.message: "Apoio de [supporting_culture.GetNameNoTooltip] à Integração"
 chancellor_task_every_county_of_culture_in_title: "Todos os Condados [supporting_culture.GetAdjective] em [title.GetNameNoTier]"
 chancellor_task.2103.opening: "[councillor.Custom2('AppropriateGreeting', ROOT.Char)]"
 chancellor_task.2103.desc: "Nossos esforços de integração em [title.GetName] estão indo muito bem. Na verdade, podemos tentar impor práticas de tributação do [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] em uma escala limitada."
 chancellor_task.2103.a: "Perfeito. Faça isso!"
 chancellor_task.2103.b: "Talvez haja mais coisas que poderíamos aprender com suas práticas?"
 chancellor_task.2103.c: "Não, essas coisas levam tempo, e devemos dar a elas o tempo necessário."
 chancellor_task.3001.opening: "[vassal.Custom2('AppropriateGreeting', ROOT.Char)]"
 chancellor_task.3001.desc: "Venho hospedando vosstr[councillor.Custom('ES_OA')] [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l]. Isso me repugna: a forma como ele impõe sua presença em minha casa, ao mesmo tempo em que me incita a quase me prostrar em servidão perante vós!\n\nQue [ROOT.Char.GetLadyLord] enviaria um representante tão terrível?"
 chancellor_task.3001.a: "[councillor.GetFirstNameNoTooltip]! O que você fez?!"
 chancellor_task.3002.opening: "[councillor.Custom2('AppropriateGreeting', ROOT.Char)]"
 chancellor_task.3002.desc: "Ao que parece, em minhas tratativas com [vassal.GetTitledFirstName|l], talvez eu tenha, por acidente, prometido certas isenções de suas obrigações…\n\nTenho tentado, mas suspeito que talvez não haja mais saída para isso..."
 chancellor_task.3002.a: "Seu tolo!"
 chancellor_task.3002.c: "Não, ainda posso resolver isso."
 chancellor_task.3002.d: "Oh, acho que não."
 chancellor_task.3101.opening: "[active_councillor.Custom2('AppropriateGreeting', ROOT.Char)]"
 chancellor_task.3101.desc: "Com o conflito em curso entre [attacker_vassal.GetTitledFirstName|l] e [defender_vassal.GetTitledFirstName|l], tenho trabalhado incansavelmente para chegar ao cerne de sua disputa. E, com o incentivo certo, creio que seja possível chegar a um acordo."
 chancellor_task.3101.a: "A qualquer custo, faça-os parar de lutar."
 chancellor_task.3101.b: "Eles farão o que eu mandar, como seu [ROOT.Char.GetTitleTierName]!"
 chancellor_task.3101.c: "Deixe-os resolver suas diferenças."
 chancellor_task.3101.c.tt: "A guerra entre [attacker_vassal.GetFirstNameNoTooltip] e [defender_vassal.GetFirstNameNoTooltip] continua"
 chancellor_task.3102.desc: "Descobri que as obrigações do contrato [vassal.Custom('ES_DelDela')] [vassal.GetTitledFirstName|l] [vassal.Custom('ES_LoLa')] obrigam a mais do que vocês conseguiram."
 chancellor_task.3102.a: "Hora de corrigir essa injustiça!"
 chancellor_task.3102.c: "Vou deixar passar. Desta vez..."
 chancellor_task.3003.t: "Perda de Autoridade"
 chancellor_task.3003.desc: "Parece que qualquer trabalho que meu [councillor.GetCouncilTitle] —se é que faz algum!— não é suficiente.\n\nEmbora se suponha que [councillor.GetTitledFirstName|l] os supervisione, meus vassalos agem livremente como bem entendem e quase nunca pedem minha aprovação para nada."
 chancellor_task.3003.a: "Sinto que o poder está escapando das minhas mãos."
 chancellor_task.3003.notification: "[councillor.GetCouncilTitle] Não Consegue Lidar com os Vassalos"
 chancellor_task.3103.desc: "Llevo semanas alojando a vuestr[councillor.Custom('ES_OA')] [councillor.GetCouncilTitle|l], [councillor.Custom('ES_ElLa')] [councillor.GetTitledFirstName|l], y me ha ayudado a ver la verdadera magnificencia del país bajo vuestro gobierno.\n\n¡Me enorgullece serviros en vasallaje!"
 chancellor_task.3103.a: "Sou abençoado por ter servos tão gratos."
 chancellor_task.3104.desc: "Descobri certos contratos antigos relativos a [primary_title.GetName]. No caso, poderia-se obrigar a [vassal.GetTitledFirstName|l] a ser mais equitativo em relação à sua eventual herança do que pensávamos."
 chancellor_task.3104.a: "Devemos proteger os direitos dos herdeiros de [vassal.GetFirstName]!"
 chancellor_task.3104.b: "As coisas podem ficar como estão. Por um preço..."
 chancellor_task.3104.c: "Não há necessidade de fragmentar o reino."
