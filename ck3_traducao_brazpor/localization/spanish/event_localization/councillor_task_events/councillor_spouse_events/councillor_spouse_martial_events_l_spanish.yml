 councillor_spouse_martial.0005.message: "Apoio em Negociações com Mercenários"
 councillor_spouse_martial.0006.message: "Cuidando de Mim"
 councillor_spouse_martial.0007.message: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))|U] Cuida dos Ferimentos"
 councillor_spouse_martial.0008.message: "Presença Intimidadora"
 councillor_spouse_martial.0009.message: "Prática de Combate"
 councillor_spouse_martial.1001.t: "[councillor.GetCouncilTitle]: Dia de Torneio"
 councillor_spouse_martial.1001.desc: "O sol brilha e os camponeses circulam pelo torneio organizado pelo meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))]. Todos os meus $knight_culture_player_plural_no_tooltip_lowercase$ vibram quando [councillor.GetTitledFirstName|l] anuncia o torneio em sua honra, e, pela primeira vez, posso simplesmente sentar e assistir.\n\nMas não vou passar um dia inteiro de torneio sentad[ROOT.Char.Custom('ES_OA')] no trono!"
 councillor_spouse_martial.1001.a: "Eu também aclamo meus $knight_culture_player_plural_no_tooltip_lowercase$!"
 councillor_spouse_martial.1001.commanders: "Cada $knight_culture_player_no_tooltip_lowercase$"
 councillor_spouse_martial.1001.b: "Esta é a oportunidade perfeita para dar algumas dicas a [child.GetFirstNameNoTooltip]!"
 councillor_spouse_martial.1001.b.education_tt: "Eu promovo a educação marcial de [child.GetFirstNameNoTooltip]"
 councillor_spouse_martial.1001.c: "Este dia é em #EMP nossa#! honra, querid[councillor.Custom('ES_OA')]!"
 councillor_spouse_martial.1002.t: "[councillor.GetCouncilTitle]: Agindo em Meu Nome"
 councillor_spouse_martial.1002.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] passa grande parte do seu tempo viajando pelo reino com sua guarda de honra. Há muitos assuntos que pode resolver em meu nome, e a presença militar que [councillor.GetTitledFirstName|l] traz consigo é um firme lembrete do meu direito de governar."
 councillor_spouse_martial.1002.a: "Meu [councillor.GetTitleAsNameNoTooltip] e eu estamos prontos para defender o reino!"
 councillor_spouse_martial.1002.b: "Garanta que todos se prostrem como é devido, querid[councillor.Custom('ES_OA')]."
 councillor_spouse_martial.1002.c: "Todos devem me temer e se prostrar aos meus pés, [councillor.GetFirstNameNoTooltip]!"
 councillor_spouse_martial.1003.t: "[councillor.GetCouncilTitle]: Uma Questão de Honra"
 councillor_spouse_martial.1003.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('councillor'))]. Quer falar sobre o conflito entre [attacker_vassal.GetTitledFirstName|l] e [defender_vassal.GetTitledFirstName|l].\n\n\"A luta deles não tem honra e envergonha seu reino. Deixe que eu cuide deles. Sei que posso forçá-los a fazer as pazes.\""
 councillor_spouse_martial.1003.a: "Resolva isso, custe o que custar."
 councillor_spouse_martial.1003.b: "Não, quero ver quem vence!"
 councillor_spouse_martial.1003.b.tt: "[attacker_vassal.GetFirstNameNoTooltip] e [defender_vassal.GetFirstNameNoTooltip] continuam sua guerra"
 councillor_spouse_martial.1003.c: "Ah, eu confio que você consegue, querid[councillor.Custom('ES_OA')]."
 councillor_spouse_martial.1003.c.unlock_tt: "Esta opção está disponível devido à genialidade estratégica de [councillor.GetFirstNameNoTooltip]"
 councillor_spouse_martial.1004.t: "[councillor.GetCouncilTitle]: A Guarda"
 councillor_spouse_martial.1004.desc: "Não consigo entender o motivo pelo qual meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))] quer me fazer um \"grande presente\" no pátio. Mas logo entendo, quando [councillor.GetTitledFirstName|l] ordena que um grupo de soldados se alinhe. \"Um regimento completo recrutado das minhas próprias terras, pronto para servir a você.\"\n\nIsso #EMP sim#! é um grande presente!"
 councillor_spouse_martial.1004.a: "Mais tropas para reforçar o exército!"
 councillor_spouse_martial.1004.b: "Eles servirão como minha guarda pessoal."
 councillor_spouse_martial.1005.t: "[councillor.GetCouncilTitle]: Causando uma Impressão"
 councillor_spouse_martial.1005.desc: "[vassal.GetTitledFirstName] vem a [capital.GetNameNoTier] para me prestar homenagem. No entanto, [councillor.GetTitledFirstName|l] sugere que uma demonstração militar poderia garantir lealdade contínua.\n\n\"Ver seu poder esmagador faria qualquer um pensar duas vezes se a traição lhe passasse pela cabeça\", observa minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))]."
 councillor_spouse_martial.1005.a: "Sim, [vassal.GetFirstNameNoTooltip] verá soldados por todos os lugares para onde olhar!"
 councillor_spouse_martial.1005.a.tt: "[vassal.GetFirstNameNoTooltip] torna-se mais suscetível ao [dread|lE]"
 councillor_spouse_martial.1005.b: "Um desfile regular deve ser suficiente."
