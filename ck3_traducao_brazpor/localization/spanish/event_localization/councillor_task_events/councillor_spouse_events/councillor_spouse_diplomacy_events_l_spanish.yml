 councillor_spouse_diplomacy.1001.desc: "Reputação Familiar"
 councillor_spouse_diplomacy.1002.desc: "Mediação de Conflito entre Irmãos"
 councillor_spouse_diplomacy.1003.desc: "Relações entre Irmãos Melhoradas"
 councillor_spouse_diplomacy.1004.desc: "Treinamento em Diplomacia"
 councillor_spouse_diplomacy.1004.desc_diplo_councillor: "Ensinado por [councillor.GetTitleAsName]"
 councillor_spouse_diplomacy.1005.desc: "Prática Diplomática"
 councillor_spouse_diplomacy.1006.desc: "Graças ao seu trabalho árduo, [councillor.GetTitledFirstName|l] melhorou na habilidade de falar com as pessoas."
 councillor_spouse_diplomacy.1007.desc: "Trocas Amigáveis"
 councillor_spouse_diplomacy.2001.t_female: "[councillor.GetCouncilTitle]: Solteira Disponível"
 councillor_spouse_diplomacy.2001.t_male: "[councillor.GetCouncilTitle]: Solteiro Disponível"
 councillor_spouse_diplomacy.2001.desc_mother: "[councillor.GetTitledFirstName] observa nossos descendentes com seu habitual [councillor.Custom('quirk_pos_noun')]. \"Nenhum filho nosso deve ficar sem uma boa proposta de casamento."
 councillor_spouse_diplomacy.2001.desc: "[councillor.GetTitledFirstName] observa de cima a baixo meu [ROOT.Char.Custom('ChildChildrenGender')] com sua habitual [councillor.Custom('quirk_pos_noun')]. \"Nenhum filho seu deve ficar sem uma boa proposta de casamento."
 councillor_spouse_diplomacy.2001.desc_end: "Se você me permitir educá-los, logo haverá pretendentes alinhados nas ruas!\""
 councillor_spouse_diplomacy.2001.a: "Meu herdeir[child_heir.Custom('ES_OA')], [child_heir.GetTitledFirstNameNoTooltip|l], poderia se beneficiar dessas lições."
 councillor_spouse_diplomacy.2001.b: "Todos eles poderiam receber algum treinamento."
 councillor_spouse_diplomacy.2001.b.all_kids: "Todos os meus filhos solteiros:"
 councillor_spouse_diplomacy.2001.c: "Prefiro que você me ensine bons modos!"
 councillor_spouse_diplomacy.2002.t: "[councillor.GetCouncilTitle]: Tornar-se Mais Próximo"
 councillor_spouse_diplomacy.2002.desc: "\"Fomentar as relações entre a próxima geração de governantes é um dever que não devemos negligenciar\", diz [councillor.GetTitledFirstName|l].\n\n\"Alguns dos seus vassalos mais influentes têm filhos que tenho certeza de que seria bom para [child_heir.GetTitledFirstName|l] conhecer.\""
 councillor_spouse_diplomacy.2002.a: "[vassal_heir_1.GetTitledFirstNameNoTooltip|l] parece um[vassal_heir_1.Custom('ES_XA')] [vassal_heir_1.Custom('WomanManGirlBoy')] de boa reputação."
 councillor_spouse_diplomacy.2002.b: "[vassal_heir_2.GetTitledFirstNameNoTooltip|l] certamente seria uma boa influência!"
 councillor_spouse_diplomacy.2002.c: "Ouvi coisas boas sobre [vassal_heir_3.GetTitledFirstNameNoTooltip|l]."
 councillor_spouse_diplomacy.2002.d: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('child_heir'))] se sairá bem sozinho[child_heir.Custom('ES_OA')]."
 councillor_spouse_diplomacy.2003.t: "[councillor.GetCouncilTitle]: Oportunidade para a Paz"
 councillor_spouse_diplomacy.2003.desc: "Assim que vejo meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('rival'))], [rival.Custom('ES_ElLa')] [rival.GetTitledFirstName|l], do outro lado do local de culto, começo a me virar, mas, para minha surpresa, [councillor.Custom('ES_ElLa')] [councillor.GetTitledFirstName|l] acena para [rival.Custom('ES_EA')] [rival.Custom2('InsultNoun', ROOT.Char)] [councillor.Custom('quirk_pos_adverb')] para que se aproxime de nós.\n\n\"[rival.GetSheHe|U] concordou em se encontrar com você em terreno neutro. É uma pena que duas [ROOT.Char.Custom2('WomenMenPeople', SCOPE.sC('rival'))] de personalidade [SCOPE.Custom('PersonalityGetSharedTraitDescriptionFromFlag')] estejam brigando assim. Você não acha que está na hora de fazer as pazes?\""
 councillor_spouse_diplomacy.2003.a: "Você pode estar cert[ROOT.Char.Custom('ES_OA')]..."
 councillor_spouse_diplomacy.2003.b: "O que vou fazer é refazer a cara de [rival.GetHerHis]!"
 councillor_spouse_diplomacy.2003.c: "Você chamou [rival.GetHerHim] de [SCOPE.Custom('PersonalityGetSharedTraitDescriptionFromFlag')]?! Vou revelar o verdadeiro caráter de [rival.GetHerHis]..."
 councillor_spouse_diplomacy.2004.t: "[councillor.GetCouncilTitle]: Reivindicação de Conveniência"
 councillor_spouse_diplomacy.2004.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] [councillor.GetTitledFirstName|l] me apresenta animadamente a um[claimant.Custom('ES_XA')] [claimant.GetWomanMan].\n\n\"Meu [ROOT.Char.GetTitleTierName], permita-me apresentar [claimant.GetTitledFirstName|l], pretendente a [title_to_claim.GetName].\"\n\n[claimant.GetFirstName] se curva diante de mim e diz: \"É uma honra, [claimant.Custom2('RelationToMeAddress', ROOT.Char)]. Infelizmente, muito provavelmente não conseguirei tomar posse de [title_to_claim.GetNameNoTier] sem um... benfeitor ao meu lado.\""
 councillor_spouse_diplomacy.2004.a: "Eu talvez possa ajudar com isso."
 councillor_spouse_diplomacy.2004.a.tt: "#F Com [claimant.GetFirstNameNoTooltip] hospedado em minha corte, posso impulsionar a reivindicação de [claimant.GetHerHis] quando for o momento certo#!"
 councillor_spouse_diplomacy.2004.b: "Boa sorte com isso."
 councillor_spouse_diplomacy.2004.c: "Prisão, pergaminho e mensagem para [current_holder.GetTitledFirstNameNoTooltip|l]. Nessa ordem."
 councillor_spouse_diplomacy.2004.c.tt: "#F Informarei ao [current_holder.GetTitleTierName] que [claimant.GetFirstNameNoTooltip] não é mais uma ameaça.#!"
