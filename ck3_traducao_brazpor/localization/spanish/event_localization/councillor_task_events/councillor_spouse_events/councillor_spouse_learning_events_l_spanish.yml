 add_patronage_spouse_education_points_effect.t: "Criança beneficiada pela tutela [councillor.Custom('ES_DelDela')] do cônjuge"
 add_patronage_spouse_education_points_effect.desc: "É mais provável que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('patronage_student'))], [patronage_student.GetTitledFirstName|l], receba uma boa [education|lE] graças à tutela de [councillor.GetTitledFirstName|l]."
 add_patronage_spouse_education_points_child_effect.desc: "É mais provável que meu [patronage_student.Custom('GetDaughterSon')], [patronage_student.GetTitledFirstName|l], receba uma boa [education|lE] graças à tutela de [councillor.GetTitledFirstName|l]."
 #Events
 councillor_spouse_learning.2601.t: "[councillor.GetCouncilTitle]: educação continuada"
 councillor_spouse_learning.2601.not_scholarly.desc: "«No te haría daño leer un libro de vez en cuando», suele decirme mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))], estudios[councillor.Custom('ES_OA')] [councillor.GetTitledFirstName|l]. Se ha ofrecido a ser mi tutor[councillor.Custom('ES_XA')], por si necesito ayuda para empezar."
 councillor_spouse_learning.2601.scholarly.desc: "Toda vez que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))] [councillor.GetTitledFirstName|l] me encontra inclinado[ROOT.Char.Custom('ES_OA')] sobre um livro, ele fica visivelmente entusiasmado.\n\n“Você quer que eu te ajude com os estudos? Alguém com quem trocar ideias, ou talvez alguns novos tomos? Recentemente adquiri um volume com uma análise excelente de [ROOT.Char.Custom('education_conversation_subject')]!”."
 councillor_spouse_learning.2601.a: "Sim, apreciaria sua orientação."
 councillor_spouse_learning.2601.b: "[tutoring_student_1.GetTitledFirstNameNoTooltip|l] precisa de mais da sua ajuda do que eu."
 councillor_spouse_learning.2601.c: "Você deveria ensinar [tutoring_student_2.GetTitledFirstNameNoTooltip|l]."
 councillor_spouse_learning.2601.d: "Você deveria focar em seus próprios estudos."
 councillor_spouse_learning_2601_tutoring_effect.critical_success: "[THIS.Char.LocalPlayerString( 'Sua compreensão', 'A compreensão de ' )][THIS.Char.LocalPlayerString( '', THIS.Char.GetTitledFirstName )] sobre [THIS.Char.Custom('education_focus')] aumenta enormemente"
 councillor_spouse_learning_2601_tutoring_effect.success: "[THIS.Char.LocalPlayerString( 'Sua compreensão', 'A compreensão de ' )][THIS.Char.LocalPlayerString( '', THIS.Char.GetTitledFirstName )] sobre [THIS.Char.Custom('education_focus')] aumenta"
 councillor_spouse_learning.2001.faith.t: "[councillor.GetCouncilTitle]: dissidentes [councillor.GetFaith.GetAdjectiveNoTooltip]"
 councillor_spouse_learning.2001.culture.t: "[councillor.GetCouncilTitle]: dissidentes [councillor.GetCulture.GetCollectiveNounNoTooltip|l]"
 councillor_spouse_learning.2001.start.desc: "[faction_leader.GetTitledFirstName] e seus colegas"
 councillor_spouse_learning.2001.faith.desc: "[councillor.GetFaith.GetAdjectiveNoTooltip]"
 councillor_spouse_learning.2001.culture.desc: "[councillor.GetCulture.GetNameNoTooltip]"
 councillor_spouse_learning.2001.middle.desc: "conspiradores na [different_culture_or_faith_faction.GetName] não me dão um momento de paz!"
 councillor_spouse_learning.2001.independence_faction.desc: "Eles deveriam ser súditos leais, mas sei que estão tramando contra mim."
 councillor_spouse_learning.2001.liberty_faction.desc: "Eles buscam minar minha autoridade a cada oportunidade."
 councillor_spouse_learning.2001.claimant_faction.desc: "Esses ladrões desonrosos buscam tomar as terras que são legitimamente minhas."
 councillor_spouse_learning.2001.end.desc: "\n\nPor sorte, como "um[councillor.Custom('ES_OA')] dos seus", meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))] tem certa influência sobre eles. Ele se ofereceu para mediar e quer saber como proceder."
 councillor_spouse_learning.2001.a.faith: "Acalme os membros da facção [councillor.GetFaith.GetAdjectiveNoTooltip]."
 councillor_spouse_learning.2001.a.culture: "Acalme os membros da facção [councillor.GetCulture.GetNameNoTooltip]."
 councillor_spouse_learning.2001.a.faction_members_faith: "Todo membro [councillor.GetFaith.GetAdherentName] da [different_culture_or_faith_faction.GetName]"
 councillor_spouse_learning.2001.a.faction_members_culture: "Cada membro [councillor.GetCulture.GetName] da facção [different_culture_or_faith_faction.GetName]"
 councillor_spouse_learning.2001.b: "Fazer com que [faction_member_1.GetTitledFirstNameNoTooltip|l] abandone a facção."
 councillor_spouse_learning.2001.c: "Convencer a [faction_member_2.GetTitledFirstNameNoTooltip|l] de que continue leal a mim."
 councillor_spouse_learning.2301.t: "[councillor.GetCouncilTitle]: um poder superior"
 councillor_spouse_learning.2301.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))] [councillor.GetTitledFirstName|l] tornou-se uma figura bem conhecida no mundo religioso. Seu patrocínio a estudiosos [councillor.GetFaith.GetAdherentNamePluralNoTooltip], [councillor.GetFaith.HouseOfWorshipPlural] e ordens até chamou a atenção de [religious_head.Custom('ES_DelDela')] [religious_head.GetTitledFirstName|l] pessoalmente.\n\nA gratidão [religious_head.Custom('ES_DelDela')] [religious_head.GetTitleAsNameNoTooltip] traz benefícios poderosos. Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))] ofereceu-se para contatar [religious_head.GetSheHe] em meu nome."
 councillor_spouse_learning.2301.a: "Você pode fazer as apresentações?"
 councillor_spouse_learning.2301.a.success: "Fiz amizade com [religious_head.GetTitledFirstName|l]."
 councillor_spouse_learning.2301.b: "O que [religious_head.GetSheHe] pode fazer em troca?"
 councillor_spouse_learning.2301.c: "Essa é minha chance de ser bem-vindo novamente à comunidade sagrada!"
 councillor_spouse_learning.2301.d: "Que saiba que tudo o que fazemos é por [councillor.GetFaith.HighGodName]."
 councillor_spouse_learning.2602.t: "[councillor.GetCouncilTitle]: ampliando horizontes"
 councillor_spouse_learning.2602.not_root.desc: "Embora meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('student'))] [student.GetTitledFirstName|l] saiba umas coisas sobre [student.Custom('highest_skill_noun')], [councillor.GetTitledFirstName|l] acha que já é hora de ampliar seus horizontes.\n\n“Eu poderia adquirir alguns novos tomos, preparar algumas tarefas, dar algumas aulas para ele. Qual matéria você acha que mais beneficiaria [student.GetFirstNameNoTooltip]?”."
 councillor_spouse_learning.2602.root.desc: "\"Embora você saiba algumas coisas sobre [student.Custom('highest_skill_noun')], o [student.GetTitleTierName] do [student.GetPrimaryTitle.GetNameNoTierNoTooltip] deve possuir uma ampla gama de habilidades,\" m [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))] diz, [ROOT.Char.Custom2('QuirkPPPosOrNeg', SCOPE.sC('councillor'))].\n\n\"Eu posso adquirir novos tomos, preparar algumas tarefas, dar algumas aulas particulares para você. Em qual disciplina você tem mais interesse?\""
 councillor_spouse_learning.2602.a: "Diplomacia."
 councillor_spouse_learning.2602.b: "Teoria militar."
 councillor_spouse_learning.2602.c: "Economia do reino."
 councillor_spouse_learning.2602.d: "Gerenciamento de rede de espionagem."
 councillor_spouse_learning.2602.e: "Teologia."
 councillor_spouse_learning.1304.desc: "Cônjuge é patrono de [religious_vassal.GetFaith.AltPriestTermPlural]"
 councillor_spouse_learning.1305.desc: "A piedade do meu cônjuge impressiona [religious_head.Custom('ES_AlAla')] [religious_head.GetTitleAsNameNoTooltip|l]"
 councillor_spouse_learning.2603.t: "[councillor.GetCouncilTitle]: à altura da tarefa"
 councillor_spouse_learning.2603.desc: "Alguns dos meus conselheiros acreditam que o cargo lhes pertence apenas por direito de sangue ou influência — quão enganados estão! Eu espero resultados, mas muitas vezes me decepcionam.\n\nApós um longo dia, estou reclamando com [councillor.GetFirstName] quando me interrompe. \"Deixe-me fazer algo a respeito, [ROOT.Char.GetWifeHusband] meu[ROOT.Char.Custom('ES_OA')]. Algumas lições podem aguçar o raciocínio deles.\""
 councillor_spouse_learning.2603.a: "O [chancellor.GetCouncilTitle] [chancellor.GetFirstNameNoTooltip] se beneficiaria de um tutor."
 councillor_spouse_learning.2603.b: "[marshal.GetCouncilTitle|U] [marshal.GetFirstNameNoTooltip] se beneficiaria da sua ajuda."
 councillor_spouse_learning.2603.c: "Dê algumas lições para meu [steward.GetCouncilTitle], [steward.GetFirstNameNoTooltip]."
 councillor_spouse_learning.2603.d: "Talvez você tenha alguns conselhos para [spymaster.GetCouncilTitle] [spymaster.GetFirstNameNoTooltip]."
 councillor_spouse_learning.2603.e: "[court_chaplain.GetCouncilTitle] [court_chaplain.GetFirstNameNoTooltip] precisa de orientação."
 councillor_spouse_learning.2603.f: "Fique aqui comigo em vez disso..."
