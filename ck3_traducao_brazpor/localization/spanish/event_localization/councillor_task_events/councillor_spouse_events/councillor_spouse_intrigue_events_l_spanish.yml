l_spanish:
 councillor_spouse_intrigue.0001.message: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))|U] e [spymaster.GetCouncilTitle] Cooperam"
 councillor_spouse_intrigue.0002.message: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))|U] Expõe um Esquema"
 councillor_spouse_intrigue.0003.message: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))|U] Descobre um Segredo"
 councillor_spouse_intrigue.0004.message: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))|U] Ajuda um Esquema"
 councillor_spouse_intrigue.0005.message: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))|U] Manipula um Súdito"
 councillor_spouse_intrigue.0006.message: "Inocência Perdida"
 councillor_spouse_intrigue.0007.message: "Prática Ardilosa"
 councillor_spouse_intrigue.1001.t: "[councillor.GetCouncilTitle]: Não Confie em Ninguém"
 councillor_spouse_intrigue.1001.desc: "\"Você precisa tomar cuidado com as pessoas com quem se cerca.\" A expressão nos olhos de minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] é muito séria. \"Descobri que, neste exato momento, [spymaster.GetTitledFirstName|l] conspira contra você!\"\n\nSerá possível? Meu própri[spymaster.Custom('ES_OA')] [spymaster.GetCouncilTitle]?!"
 councillor_spouse_intrigue.1001.a: "Fui feito de tolo!"
 councillor_spouse_intrigue.1002.t: "[councillor.GetCouncilTitle]: Rumores e Especulação"
 councillor_spouse_intrigue.1002.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] [councillor.Custom('quirk_pos_present')] como costuma fazer quando tem algo para compartilhar. \"Você sabe dos rumores que dizem que [target.GetTitledFirstName|l] está escondendo algo terrível?\" Eu me aproximo de [councillor.GetSheHe] enquanto [councillor.GetSheHe] abaixa a voz. \"Eles são todos verdadeiros. Só precisamos de provas.\""
 councillor_spouse_intrigue.1002.a: "É hora de um pouco de espionagem, meu [councillor.Custom('LoverPetName')]!"
 councillor_spouse_intrigue.1002.b: "Eu preciso descobrir o que é!"
 councillor_spouse_intrigue.1002.c: "Eu protejo meus segredos melhor do que [target.GetFirstNameNoTooltip]."
 councillor_spouse_intrigue.1003.t: "[councillor.GetCouncilTitle]: Revelado"
 councillor_spouse_intrigue.1003.desc: "Pelo modo como se aproxima de mim, percebo que [councillor.GetTitledFirstName|l] tomou conhecimento de outro segredo na corte.\n\n\"[agent.GetTitledFirstName|l] participa de uma conspiração\", diz [councillor.GetSheHe]. \"[agent.GetSheHe|U] ainda não sabe que eu sei, mas sugiro que lhe ofereças uma anistia em troca de lealdade absoluta...\""
 councillor_spouse_intrigue.1003.a: "Faça [agent.GetHerHim] entender o quanto está em jogo."
 councillor_spouse_intrigue.1003.b: "Use [agent.Custom('ES_LoLa')] para descobrir o verdadeiro mandante!"
 councillor_spouse_intrigue.1003.c: "Monitore cada movimento de [agent.GetHerHis] e me mantenha a salvo de danos!"
 councillor_spouse_intrigue.1004.t: "[councillor.GetCouncilTitle]: Pesquisa sobre a Oposição"
 councillor_spouse_intrigue.1004.desc: "[secret_holder.GetTitledFirstName] tem sido um incômodo, apoiando abertamente a [faction.GetName]. Felizmente, parece que estou prestes a levar a melhor.\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] descobriu um segredo muito bem guardado de [secret_holder.GetHerHis], e me diz com um sorriso astuto:\n\n\"Achei que isso pudesse lhe interessar, querid[ROOT.Char.Custom('ES_OA')]...\""
 councillor_spouse_intrigue.1004.a: "Uma pequena chantagem manterá [secret_holder.Custom('ES_LoLa')] na linha."
 councillor_spouse_intrigue.1004.b: "Isso é escandaloso! O reino precisa saber!"
 councillor_spouse_intrigue.1004.c: "Às vezes é melhor esperar com uma mão vencedora."
 councillor_spouse_intrigue.1004.c.tt: "Você ainda não revela o Segredo de [secret_holder.GetFirstNameNoTooltip]"
 councillor_spouse_intrigue.1005.t: "[councillor.GetCouncilTitle]: Dividir e Conquistar"
 councillor_spouse_intrigue.1005.desc: "[faction_member.GetTitledFirstName] tem apoiado ativamente [leader.GetTitledFirstName|l] e sua [faction.GetName]. No entanto, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] tem um plano para mudar isso.\n\n\"Confie em mim, o que eu poderia contar a [faction_member.GetTitledFirstName|l] faria com que rejeitasse [leader.GetFirstNameNoTooltip] num instante.\""
 councillor_spouse_intrigue.1005.a: "Garanta que [faction_member.GetFirstNameNoTooltip] nunca mais apoie [leader.GetFirstNameNoTooltip]!"
 councillor_spouse_intrigue.1005.b: "Você poderia fazer #EMP me#! parecer uma escolha melhor?"
 councillor_spouse_intrigue.1006.t: "[councillor.GetCouncilTitle]: Representação Apropriada"
 councillor_spouse_intrigue.1006.desc: "Sabendo dos meus planos em relação a [target.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] [councillor.GetFirstName] veio até mim com uma proposta.\n\n\"Tenho amigos na corte de [court_owner.GetTitledFirstName|l]. Eu poderia pedir que hospedassem um convidado por algum tempo. Com um pequeno sinal de lealdade e todo o apoio que posso oferecer, [plant.GetTitledFirstName|l] faria maravilhas em seu nome...\""
 councillor_spouse_intrigue.1006.a: "Uma ideia brilhante, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))]!"
 councillor_spouse_intrigue.1006.b: "Acho que precisamos de [plant.GetFirstNameNoTooltip] aqui."
