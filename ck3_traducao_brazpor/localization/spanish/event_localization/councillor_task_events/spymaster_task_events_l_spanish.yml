l_spanish:
 spymaster_task.0311.t: "Uma Descoberta Secreta"
 spymaster_task.0311.councillor_liege_opening: "Enquanto desempenhava suas funções como m [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l] descobriu um segredo guardado por [secret_holder.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 spymaster_task.0311.spymaster_opening: "Enquanto investigava para meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor_liege'))], [councillor_liege.GetTitledFirstName|l], descobri um segredo que estava sendo ocultado por [secret_holder.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 spymaster_task.0311.notification: "[councillor.GetCouncilTitle]: Segredo Descoberto"
 spymaster_task.0341.t: "Espionagem: Desvios"
 spymaster_task.0311.secret_deviant.shared: "\n\nNão consigo acreditar nos modos grotescos com que busca o prazer [secret_holder.GetFirstNameNoTooltip]. A simples ideia seria revoltante para qualquer pessoa decente. E, no entanto, [secret_holder.Custom('ES_ElElla')] se presta mais do que voluntariamente... De fato, com entusiasmo!"
 spymaster_task.0311.secret_deviant: "\n\nEl modo en que [secret_holder.GetFirstNameNoTooltip] busca el placer repugnaría de solo pensarlo a cualquier persona decente. Y, sin embargo, [secret_holder.Custom('ES_ElElla')] no solo lo desea, ¡lo ansía! Parece antinatural y nauseabundo… No, no lo parece, lo #emphasis es#!, ¡un pecado contra [ROOT.Char.GetFaith.HighGodName]!"
 spymaster_task.0341.a: "Criado! Traga-me um balde antes que eu... #EMP vomite#!"
 spymaster_task.0341.a.deviant: "Descreva novamente. Com o máximo de detalhes possível..."
 spymaster_task.0341.a.detached: "Absolutamente repugnante, mas útil de se saber."
 spymaster_task.0342.t: "Espionagem: Sodomia"
 spymaster_task.0311.sodomy.accepted: "\n\n[secret_holder.GetSheHe|U] desfruta da companhia íntima de outr[secret_holder.Custom('ES_OA')]s [secret_holder.GetWomenMen]. Seus irmãos [secret_holder.GetFaith.GetAdherentNamePlural] consideram isso um grave pecado e, embora isso não faça muito sentido, pode me dar a vantagem de que eu precisava…"
 spymaster_task.0311.secret_sodomy.illegal_shared: "\n\n[secret_holder.GetSheHe|U] desfruta da companhia íntima de outr[secret_holder.Custom('ES_OA')]s [secret_holder.GetWomenMen]. Porém, ao contrário de mim, [secret_holder.GetFirstName] não tem se saído bem em esconder seus pecados."
 spymaster_task.0311.secret_sodomy.illegal: "\n\n[secret_holder.GetSheHe|U] tem desfrutado da companhia íntima de outr[secret_holder.Custom('ES_OA')]s [secret_holder.GetWomenMen]. Que imprudência pensar que tamanho pecado contra [ROOT.Char.GetFaith.HighGodName] passaria despercebido…"
 spymaster_task.0342.a: "Você se arrependerá de ceder aos seus desejos, [secret_holder.GetFirstNameNoTooltip]."
 spymaster_task.0343.t: "Espionagem: Tentativa de Assassinato"
 spymaster_task.0311.secret_murder_attempt.targeting_me: "\n\n[secret_holder.GetFirstName] estava por trás da tentativa frustrada contra minha vida! A vingança finalmente virá..."
 spymaster_task.0311.secret_murder_attempt.close_to_me: "\n\n[secret_holder.GetFirstName] estava por trás da tentativa de assassinato fracassada contra [murder_target.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('murder_target'))]! A vingança finalmente virá..."
 spymaster_task.0311.secret_murder_attempt.other: "\n\n[secret_holder.GetFirstNameNoTooltip] estava por trás da tentativa fracassada de assassinato contra [murder_target.GetTitledFirstName|l]!"
 spymaster_task.0343.a: "Pensar que [secret_holder.GetFirstNameNoTooltip] seria capaz de se rebaixar tanto."
 spymaster_task.0343.murder_back: "Veja, minhas ações são perfeitamente justificadas."
 spymaster_task.0344.t: "Espionagem: Assassinato"
 spymaster_task.0311.secret_murder.sadistic: "\n\nParece que [secret_holder.GetSheHe] esteve por trás da morte prematura de [murder_target.GetTitledFirstName|l]."
 spymaster_task.0311.secret_murder.callous: "\n\n[secret_holder.GetSheHe|U] conspirou e tramou para assassinar [murder_target.GetTitledFirstName|l]! Este mundo não tem lugar para alguém tão fraco e covarde quanto [secret_holder.Custom('ES_ElElla')]."
 spymaster_task.0311.secret_murder.close_to_me.vengeful: "\n\n¡Causó la muerte de mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('murder_target'))], [murder_target.GetTitledFirstName|l]! ¡[secret_holder.GetFirstName] debe pagar con su vida y la de todos sus seres queridos!"
 spymaster_task.0311.secret_murder.close_to_me: "\n\nA verdade finalmente me foi revelada. Foi [secret_holder.Custom('ES_ElElla')] quem conspirou para assassinar meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('murder_target'))], [secret_holder.GetTitledFirstName|l]."
 spymaster_task.0311.secret_murder.close_to_me_regret: "Será que isso poderia ter sido evitado se eu soubesse mais cedo?"
 spymaster_task.0311.secret_murder.other: "\n\nConspirou nas sombras para que matassem a [murder_target.GetTitledFirstName|l]!"
 spymaster_task.0344.a.sadistic: "Hmm. Será que consigo criar uma punição aterrorizante apropriada?"
 spymaster_task.0344.a.callous: "Eu não devo permitir que cães raivosos fiquem soltos."
 spymaster_task.0344.a: "Não apenas cruel e sem coração, mas também desonroso!"
 spymaster_task.0344.b: "Estou perfeitamente justificado. Ninguém pode me julgar."
 spymaster_task.0345.t: "Espionagem: Canibalismo"
 spymaster_task.0311.secret_cannibal.shared: "\n\nParece que [secret_holder.GetFirstNameNoTooltip] aprecia as melhores coisas da vida. Uma taça de [ROOT.Char.Custom('RegionalDrink')]e talvez uma mordida de carne vermelha e macia."
 spymaster_task.0311.secret_cannibal: "\n\nDe todas as vilezas que existem, [secret_holder.Custom('ES_ElElla')] sacia sua fome com carne humana! Pode haver algo mais repugnante e depravado?!"
 spymaster_task.0345.a.cannibal: "Espero que algum dia me convide para um banquete."
 spymaster_task.0345.a: "Oh, humanidade abominável, você nunca deixará de me causar repulsa?"
 spymaster_task.0346.t: "Espionagem: Amantes"
 spymaster_task.0311.secret_lover.consort: "\n\nMeu própri[secret_holder.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('secret_holder'))] tomou [lover.Custom2('MyCharacterIntroduction', ROOT.Char)] como amante!"
 spymaster_task.0311.secret_lover.consort_is_lover: "\n\n¡Ha tomado a [lover.GetTitledFirstName|l], mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover'))], como amante!"
 spymaster_task.0311.secret_lover.lover_close_to_me: "\n\nTomou meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover'))], [lover.GetTitledFirstName|l] como amante. Quem sabe como isso aconteceu, mas que vergonha para ambos se isso viesse a ser conhecido!"
 spymaster_task.0311.secret_lover.lustful: "\n\nTem se envolvido em relações carnais com [lover.Custom('ES_ElLa')] [lover.GetTitledFirstName|l], passando as mãos pelo corpo de [lover.GetFirstNameNoTooltip] com as mãos, trocando beijos de todas as maneiras… Ah, que escândalo seria se isso se tornasse público!"
 spymaster_task.0311.secret_lover: "\n\n secretamente tem [lover.Custom2('MyCharacterIntroduction', ROOT.Char)] como amante."
 spymaster_task.0346.a.consort: "Que ultraje!"
 spymaster_task.0346.a.close: "Isso vai ficar complicado."
 spymaster_task.0346.a: "Isso é útil de saber..."
 spymaster_task.0347.t: "Espionagem: Descrente"
 spymaster_task.0311.secret_non_believer.shared: "\n\nParece que [secret_holder.Custom('ES_ElElla')], assim como eu, tem suas dúvidas sobre a devoção a [ROOT.Char.GetFaith.HighGodName]. Mas, ao contrário de mim, não sabe esconder isso tão bem quanto deveria."
 spymaster_task.0311.secret_non_believer.other_faith: "\n\nÉ como se estivesse começando a enxergar a verdade sobre o falso deus [secret_holder.GetFaith.HighGodName]. Claro, não acho que seus companheiros [secret_holder.GetFaith.GetAdherentNamePlural] sejam tão compreensivos quanto eu."
 spymaster_task.0311.secret_non_believer.other_sect: "\n\nParece que começasse a se afastar da senda [ROOT.Char.GetFaith.GetAdjective] e, em vez disso, adotasse os ensinamentos equivocados dos [secret_holder.GetFaith.GetAdherentNamePlural]. [secret_holder.GetFaith.HighGodName] choraria ao ver de que forma suas lições foram distorcidas."
 spymaster_task.0311.secret_non_believer: "\n\n parece estar abrigando dúvidas sobre a doutrina [secret_holder.GetFaith.GetAdjective]. Oh [secret_holder.GetFirstNameNoTooltip]... O que os [secret_holder.GetFaith.AltPriestTermPlural] diriam?"
 spymaster_task.0347.a: "O sinal de uma alma fraca."
 spymaster_task.0348.t: "Espionagem: Incesto"
 spymaster_task.0311.secret_incest: "\n\n¡[secret_holder.GetFirstNameNoTooltip] ha cometido el más vil de los pecados, un crimen contra el mismísimo [ROOT.Char.GetFaith.HighGodName]! Solo alguien muy enfermo entraría en tratos carnales con su propia familia."
 spymaster_task.0311.secret_incest.shared: "\n\nEmbora seja óbvio para mim que o amor não conhece limites, o mundo reagiria com horror e condenação às maneiras pelas quais [secret_holder.GetFirstNameNoTooltip] tem abraçado seu desejo..."
 spymaster_task.0348.a.shared: "É assim que deve ser."
 spymaster_task.0348.a.lustful: "Sua própria família...? Oh, eu nem deveria pensar nisso. #EMP Não#! deveria..."
 spymaster_task.0348.a: "Eu devo condenar uma união tão profana!"
 spymaster_task.0349.t: "Espionagem: Bruxaria"
 spymaster_task.0311.secret_witch.shared: "\n\nParece que também está em busca de respostas além dos limites deste mundo. Oh, o que deve ter visto... Se ao menos pudéssemos ser abertos sobre nosso conhecimento."
 spymaster_task.0311.secret_witch.zealous: "\n\nHá provas de que [secret_holder.GetFirstNameNoTooltip] pode estar participando de rituais secretos para comungar com espíritos malignos! Certamente até dança nu com demônios sedutores, enquanto a luz cintilante das chamas acaricia seus corpos..."
 spymaster_task.0311.secret_witch.zealous_end: "Que pensamento repugnante!"
 spymaster_task.0311.secret_witch: "\n\nHá provas de que [secret_holder.GetFirstNameNoTooltip] pode estar participando em rituais secretos. Para que outra coisa isso estaria lá, senão para se comunicar com espíritos malignos e talvez manter relações com demônios?!"
 spymaster_task.0349.a.zealous: "Pensamentos de beleza sobrenatural não devem me seduzir!"
 spymaster_task.0349.a: "Que maldade estará planejando?"
 spymaster_task.0350.t: "Espionagem: Bastardo"
 spymaster_task.0311.secret_bastard.i_am_real_father: "\n\n[bastard.GetTitledFirstName] no solo es bastard[bastard.Custom('ES_OA')] sino que… ¡yo soy su verdadero padre!"
 spymaster_task.0311.secret_bastard.i_am_not_father: "\n\n[bastard.GetTitledFirstName] não é [bastard.Custom('DaughterSon')] meu[bastard.Custom('ES_OA')] de [secret_holder.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!"
 spymaster_task.0311.secret_bastard.i_am_not_real_father: "\n\n[bastard.GetTitledFirstName] não é [bastard.Custom('DaughterSon')] meu[bastard.Custom('ES_OA')], mas sim de [actual_father.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!"
 spymaster_task.0311.secret_bastard.father_is_interesting: "\n\n[bastard.GetTitledFirstName] é na verdade bastardo[bastard.Custom('ES_OA')] de [mother.GetTitledFirstName|l] e meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actual_father'))], [actual_father.GetTitledFirstName|l]!"
 spymaster_task.0311.secret_bastard: "\n\n[bastard.GetTitledFirstName] é na verdade filho bastardo[bastard.Custom('ES_OA')] de [mother.GetTitledFirstName|l] e [actual_father.GetTitledFirstName|l]!"
 spymaster_task.0350.a.related: "Como você pôde esconder isso de mim, [mother.GetFirstNameNoTooltip]?"
 spymaster_task.0350.a: "Inacreditável!"
 spymaster_task.0353.t: "Espionagem: Cripto-[secret_holder.GetSecretFaith.GetAdherentNameNoTooltip]"
 spymaster_task.0311.secret_crypto_religionist.cynical_uncompassionate: "\n\nAsí que [secret_holder.GetSheHe] sigue practicando el [secret_holder.GetSecretFaith.GetName|l] en secreto. ¡Qué estupidez de su parte aferrarse a su ídolo incluso a la vista de la muerte! ¿Es que estos necios jamás aprenderán?"
 spymaster_task.0311.secret_crypto_religionist.cynical_compassionate: "\n\nParece que [secret_holder.GetSheHe] ainda pratica o [secret_holder.GetSecretFaith.GetName|l] em segredo. Que estranho ver alguém se apegar a uma fé em vez da outra. Será que não percebem o quanto isso os coloca em perigo?"
 spymaster_task.0311.secret_crypto_religionist.shared_secret: "\n\nParece que [secret_holder.GetSheHe] deve ocultar sua crença no [secret_holder.GetSecretFaith.GetName|l] da vista pública, assim como eu oculto minha [root_crypto_faith.GetName|l]. No entanto, continuará sendo um mistério para mim por que se arrisca a cultuar sua falsa fé."
 spymaster_task.0311.secret_crypto_religionist.shared_faith: "\n\nParece que [secret_holder.GetSheHe] é meu colega [ROOT.Char.GetFaith.GetAdherentName], mas um ímpio que esconde sua fé nas sombras. O que [ROOT.Char.GetFaith.HighGodName] diria sobre tal falta de fé?"
 spymaster_task.0311.secret_crypto_religionist.shared_faith_taqiya: "\n\nEntão parece que [secret_holder.GetSheHe] segue o credo [root_crypto_faith.GetAdherentName] como eu. Não é errado que [secret_holder.GetSheHe] pratique nas sombras, mas me pergunto se seus irmãos [secret_holder.GetFaith.GetAdherentNamePlural] pensarão o mesmo."
 spymaster_task.0311.secret_crypto_religionist.shared_faith_shared_secret: "\n\nEntão parece que ambos praticamos o [secret_holder.GetSecretFaith.GetName|l] nas sombras. Fico me perguntando o que fazer agora com essa informação…"
 spymaster_task.0311.secret_crypto_religionist: "\n\n[secret_holder.GetSheHe|U] pratica o [secret_holder.GetFaith.GetName|l] à luz do dia, mas ao cair da noite cultua o [secret_holder.GetSecretFaith.GetName|l] em sussurros abafados. Ah, o que eu poderia fazer com esta informação…"
 spymaster_task.0353.a.shared_faith_shared_secret: "Nossos números crescem."
 spymaster_task.0353.a.cynical: "Sua tolice me beneficia."
 spymaster_task.0353.a: "Os [secret_holder.GetFaith.AltPriestTermPlural] não perdoarão isso."
 spymaster_task.0359.t: "Espionagem: Uma Descoberta"
 spymaster_task.0359.a: "Muito interessante..."
 spymaster_task.0381.opening: "[councillor.Custom2('AppropriateGreetingPositive', SCOPE.sC('councillor_liege'))]"
 spymaster_task.0381.desc_your_court: "Em meu trabalho em sua corte, não consegui encontrar quaisquer segredos que [character_to_hook.Custom2('YourCharacterIntroduction', target_character)] possa ter."
 spymaster_task.0381.desc_other_court: "Em minha investigação [target_character.Custom('ES_DelDela')] [target_character.GetTitledFirstName|l], parece que [character_to_hook.Custom2('HerHisCharacterIntroduction', target_character)] esconde alguma verdade obscura. Infelizmente, por mais que eu investigue, est[character_to_hook.Custom('ES_EA')] [character_to_hook.GetTitleAsNameNoTooltip|l] aparentemente suspeit[character_to_hook.Custom('ES_OA')] não parece esconder nada."
 spymaster_task.0381.desc: "\n\nNo entanto, a verdade não precisa se interpor na tarefa que tenho pela frente. Alguém poderia arranjar para que [character_to_hook.GetFirstNameNoTooltip] tenha um segredo que certamente arruinaria [character_to_hook.GetSheHe] se isso viesse à tona."
 spymaster_task.0381.a: "Veja isso feito."
 spymaster_task.0381.a.truth_is_relative_unlock: "Essa opção está disponível porque tenho a vantagem [GetPerk('truth_is_relative_perk').GetName(GetPlayer)]"
 spymaster_task.0381.b: "Não há motivo para não sermos amigos."
 spymaster_task.0381.b.flavor: "Enquanto [character_to_hook.GetSheHe] saiba o quão facilmente eu poderia ter sido seu inimigo[ROOT.Char.Custom('ES_OA')]"
 spymaster_task.0399.opening: "[councillor.Custom2('AppropriateGreeting', SCOPE.sC('councillor_liege'))]"
 spymaster_task.0399.desc: "Apesar de nossos melhores esforços, meus agentes ainda não descobriram nenhum segredo"
 spymaster_task.0399.home_court: "aqui na corte."
 spymaster_task.0399.other_court: "na corte de [target_character.GetTitledFirstName|l]."
 spymaster_task.0399.nothing_to_find: "\n\nAcredito que nunca encontraremos nada. Aqui está menos movimento do que em um cemitério ao meio-dia."
 spymaster_task.0399.something_here: "\n\nNo entanto, ainda acredito que algo está acontecendo nas sombras. Só preciso de um pouco mais de tempo para descobrir o que é."
 spymaster_task.0399.a.recommended: "Muito bem, você sabe melhor."
 spymaster_task.0399.a.counter: "Não, não vamos perder mais tempo."
 spymaster_task.0399.a.tt: "[councillor.Custom('ES_ElLa')|U] [councillor.GetCouncilTitle|l] [councillor.GetFirstNameNoTooltip] altera sua missão para [GetCouncilTaskType('task_disrupt_schemes').GetName|Vl]"
 spymaster_task.0399.b.recommended: "Se houver #EMP algo#!, vamos encontrar."
 spymaster_task.0399.b.counter: "Eu não teria tanta certeza. Continue procurando!"
 spymaster_task.0399.b.tt: "[councillor.Custom('ES_ElLa')|U] [councillor.GetCouncilTitle|l] [councillor.GetFirstNameNoTooltip] continua com sua missão de [GetCouncilTaskType('task_find_secrets').GetName|Vl]"
 spymaster_task.1001.t: "Um \"Acidente\""
 spymaster_task.1001.desc: "A desculpa de [councillor.GetTitledFirstName|l] #EMP soa#! sincera, mas o erro parece absurdo demais para ser real.\n\n"Veja, meu [ROOT.Char.Custom('ES_SennorSennora')]", explica meu [councillor.GetCouncilTitle], "foi simplesmente uma questão de enviar a carta errada com o mensageiro errado". [councillor.GetSheHe|U] prende a respiração. "Então foi assim que os documentos incriminadores se perderam"."
 spymaster_task.1001.a: "Você é um(a) [councillor.Custom2('InsultNoun', ROOT.Char)]!"
 spymaster_task.1001.b: "Todo mundo comete erros, [councillor.GetFirstNameNoTooltip]."
 spymaster_task.1001.a.tt: "Alguém em seu domínio descobriu um de seus [secrets|lE].\n\n"
 spymaster.1001.notification: "Documentos Secretos Perdidos"
 spymaster_task.1002.greeting: "A quem possa interessar..."
 spymaster_task.1002.desc: "Anexo os documentos incriminadores. Repito que não deveis falar disso com ninguém. Nem mesmo minha [councillor_liege.Custom('ES_SennorSennora')], [councillor_liege.GetTitledFirstName|l] sequer sabe que eles existem, e assim deve continuar."
 spymaster_task.1002.a: "Acho que não era para eu receber isso..."
 spymaster_task.1002.a.tt: "#F … mas quem sou eu para recusar um presente de um [councillor.GetCouncilTitle]?#!"
 spymaster_task.1003.a.tt: "Alguém do seu domínio descobriu um dos [secrets|lE] de [courtier.GetTitledFirstNameNoTooltip|l].\n\n"
 spymaster_task.1003.notification: "Carta Secreta Perdida"
 spymaster_task.1101.desc_opening: "Descobri um plano cruel de [owner.GetTitledFirstName|l]"
 spymaster_task.1101.murder: "para assassinar você!"
 spymaster_task.1101.abduct: "para sequestrar você!"
 spymaster_task.1101.spy_on: "para descobrir todos os seus segredos!"
 spymaster_task.1101.fallback: "contra você!"
 spymaster_task.1101.ending: "\n\nEnquanto escrevo estas linhas, estamos capturando os agentes dele, mas embora tenhamos frustrado os planos de [owner.GetFirstName] por enquanto, continua sendo uma ameaça para o futuro.\nA menos que ajamos, claro…"
 spymaster_task.1101.a: "Este mundo pode não ser grande o suficiente para nós dois."
 spymaster_task.1101.exposure_tt: "O Plano foi exposto"
 spymaster_task.2001.t: "Acusações Vazias"
 spymaster_task.2001.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] fez trazer um [ROOT.Char.Custom('DefaultPriestTitle')], [accused_priest.GetFirstName], para revelar e julgar uma grande conspiração. Contudo, quando tal [ROOT.Char.Custom('DefaultPriestTitle')] se recusou a confessar, [councillor.Custom('ES_ElLa')] [councillor.GetTitledFirstName|l] ficou sem provas ou apoio para suas acusações."
 spymaster_task.2001.a: "Por favor, pare de me envergonhar, [councillor.GetFirstNameNoTooltip]."
 spymaster_task.2001.b: "O [ROOT.Char.Custom('DefaultPriestTitle')] deve ser culpado de #EMP algo#!."
 spymaster_task.2001.c: "Deveríeis unir-vos à minha corte, [accused_priest.GetFirstNameNoTooltip]."
 spymaster_task.2002.notification: "Reputação de Trama Sórdida"
 spymaster_task.2003.t: "Uma Trama Desvendada"
 spymaster_task.2003.desc: "Meu [councillor.GetCouncilTitle|l] se aproxima de mim na corte de maneira estranhamente formal. \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], já considerastes que tramando nas sombras talvez não seja a melhor maneira de conseguir o que desejais?\". É uma afirmação surpreendente, mas [councillor.GetTitledFirstName|l] finalmente vai direto ao ponto.\n\n\"Parece que… bem, nenhum dos meus agentes em [scheme.GetName] responde às minhas correspondências. É como se nada tivesse acontecido.\""
 spymaster_task.2003.a: "Você está completamente perdid?"
 spymaster_task.2102.t: "Conhecimento Oculto"
 spymaster_task.2102.desc: "Manter uma rede de espiões por todo o domínio em nome de [councillor_liege.GetTitledFirstName|l] tem suas vantagens. Frequentemente descubro coisas que nem sequer estava procurando. Por exemplo, provas do segredo de [secret_owner.GetTitledFirstName|l]…"
 spymaster_task.2102.a: "[councillor_liege.GetFirstNameNoTooltip] ficaria interessad nisso."
 spymaster_task.2102.b: "Esse velho boato? Suponho que o [councillor_liege.GetTitleTierName] queira saber disso."
 spymaster_task.2102.c: "Não há necessidade de compartilhar isso."
 spymaster_task.2102.c.tt: "Você deve ter cuidado com o quanto seu suserano acredita que você está escondendo dele"
 spymaster_task.2103.notification: "[councillor.GetCouncilTitle] Descobre Segredo"
 spymaster_task.3001.opening: "[target_character.Custom2('AppropriateGreeting', ROOT.Char)]"
 spymaster_task.3001.desc: "Ficou dolorosamente claro que seu [councillor.GetCouncilTitle], [councillor.GetTitledFirstName|l], emprega espiões em minha corte. Não sei o que estão procurando, pois nem meus servos nem eu temos nada a esconder, mas eu lhe imploro: por favor, faça-os parar."
 spymaster_task.3001.a: "Você está apenas imaginando coisas!"
 spymaster_task.3001.continue_snooping: "[councillor.GetFirstNameNoTooltip] continua Espionando"
 spymaster_task.3001.b: "Um mal-entendido infeliz. Isso termina agora."
 spymaster_task.3002.t: "Agentes na Corte"
 spymaster_task.3002.opening: "Quando na corte circulam mensagens secretas em sussurros, fica claro que os agentes do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor_liege'))] estão buscando segredos."
 spymaster_task.3002.end: "No entanto, quando perguntei a [councillor_liege.GetTitledFirstName|l] a respeito, negou tudo!"
 spymaster_task.3002.a: "O que tramará?"
 spymaster_task.3003.end: "Felizmente, [councillor_liege.GetTitledFirstName|l] prometeu que as maquinações de [councillor.GetCouncilTitle] chegarão ao fim imediatamente."
 spymaster_task.3003.a: "Mas por que eles estavam aqui em primeiro lugar?"
 spymaster_task.3004.desc: "Você realmente achou que os agentes de sua [councillor.GetCouncilTitle] em minha corte passariam despercebidos? Exijo que você cesse imediatamente esse comportamento ilícito!"
 spymaster_task.3004.a: "Você deve estar imaginando coisas..."
 spymaster_task.3004.b: "Um erro simples, meu [target_character.Custom('ES_SennorSennora')], isso é tudo!"
 spymaster_task.3005.opening: "Descobri agentes na minha corte, obviamente a serviço do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor_liege'))], [councillor_liege.GetTitledFirstName|l]!"
 spymaster_task.3005.end: "\n\nNo entanto, quando pedi que os retirassem, o [councillor_liege.GetTitleTierName], negou tudo!"
 spymaster_task.3005.a: "Vilão[councillor_liege.Custom('ES_OA')] insolente!"
 spymaster_task.3006.end: "\n\nQuando se ordenou a [councillor_liege.GetTitleTierName] que os retirasse, acatou, mas talvez eu precise ficar de olho…"
 spymaster_task.3006.a: "Sussurros sombrios antecedem atos sombrios."
 spymaster_task.3007.desc: "Espiões em busca de segredos vinham assolando minha corte, e imagine minha surpresa ao descobrir que estavam a serviço de seu [councillor.GetCouncilTitle]! Acabe com essa farsa imediatamente!"
 spymaster_task.3007.a: "Não sei de nenhum espião, [target_character.GetFirstNameNoTooltip]."
 spymaster_task.3007.b: "Ah, eles devem ter se perdido a caminho de casa!"
 spymaster_task.3009.end: "Quando se lhe solicitou que os retirasse, o/a [councillor_liege.GetTitleTierName] aceitou, mas talvez eu precise ficar de olho…"
