 formalise_the_daneland_decision: "O que nosso povo tem a ver com $k_england$? Temos muito mais do que apenas nossas próprias leis: temos nossos próprios costumes, idiomas, tradições, nossa própria #EMP cultura#!. Eles não têm mais direito à nossa terra do que nós à deles."
