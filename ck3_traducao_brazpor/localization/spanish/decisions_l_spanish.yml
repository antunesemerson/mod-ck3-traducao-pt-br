 appoint_a_righteous_caliph_decision_general_iranian_variant: "Desde o fim da Mihna, aqueles que defendem a criação do Alcorão foram perseguidos ou negligenciados pelos aspirantes a califas. Tomarei para mim a tarefa de vingar as afrontas que sofremos e, mais uma vez, trazer a doutrina Mu'tazila para a vanguarda do pensamento islâmico."
 appoint_a_righteous_caliph_decision_mutazila_variant_desc: "Embora o islã tenha sido trazido à Pérsia pela força, agora ninguém pode negar nossa crença na Unicidade de [ROOT.Char.GetFaith.HighGodNameAlternate]. Mas nossos costumes e os árabes têm se distanciado, e devemos romper com [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetFaith.GetReligiousHead.GetTitledFirstName|l] de uma vez por todas. Doravante, eu liderarei pessoalmente os [ROOT.Char.GetFaith.GetAdherentNamePlural]."
