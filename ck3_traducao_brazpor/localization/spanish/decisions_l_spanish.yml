 launch_hungarian_migration_decision_before_last_date: "Negociar a Danelaw"
 negotiate_the_danelaw_decision: "A disputa por terras em $k_england$ é feroz, e nenhum governante ainda provou ser dominante. Ainda assim, há um caminho que ninguém tentou até agora. Talvez ainda se possa firmar uma barganha com o Diabo..."
 negotiate_the_danelaw_decision_desc: "Poder agora, unificação depoisó"
 negotiate_the_danelaw_decision_confirm: "Considere dividir $k_england$ em dois com seu rival mais poderoso"
 negotiate_the_danelaw_decision_tooltip: "Você precisa ter um oponente válido com quem negociar"
 negotiate_the_danelaw.valid_opponent.tt: "Você deve [Concept( 'completely_control', 'controlar totalmente' )|E] ao menos dois [duchies|lE] dentro de $k_england$ [de_jure|lE]"
 negotiate_the_danelaw.controlled_duchies.tt: "Você pondera se dividir o reino pode ser benéfico..."
 negotiate_the_danelaw.preview.tt: "Você poderá desistir desta decisão antes de confirmar."
 negotiate_the_danelaw.clarification.tt: "Integrar Ducado $k_england_adj$"
 negotiate_the_danelaw_integrate_duchies_decision: "Esta partição do reino é um absurdo! As terras dentro de minhas fronteiras pertencem legitimamente a mim, e farei com que todos respeitem isso!"
 negotiate_the_danelaw_integrate_duchies_decision_desc: "Um reino, um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]."
