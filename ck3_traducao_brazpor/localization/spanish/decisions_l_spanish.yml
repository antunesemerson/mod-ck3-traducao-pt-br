 mozarabic_bind_the_faith_to_rome_decision: "Embora [ROOT.Char.GetFaith.GetReligiousHead.GetTitledFirstName|l] ainda seja noss[ROOT.Char.GetFaith.GetReligiousHead.Custom('ES_OA')] autêntic[ROOT.Char.GetFaith.GetReligiousHead.Custom('ES_OA')] Papa, o isolamento da vontade do Vigário de Cristo nos levou por caminhos estranhos. Ficaram para trás os dias em que os grandes conclaves do clero europeu percorriam os salões de Toledo.\n\nNo entanto, não precisa ser assim… Se a nossa fé se extraviou, não poderia um pastor forte reuni-la novamente ao rebanho?"
