 invite_knights_decision: "Como [ROOT.Char.GetTitleAsNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], preciso de valentes $knight_culture_player_plural_no_tooltip_lowercase$ para defender o reino e conquistar novas terras. Enviarei um arauto para avisar meus súditos de que procuro guerreiros habilidosos."
 invite_knights_decision_desc: "Pelo menos [SCOPE.ScriptValue('invite_knights_decision_amount_value')|0P] homens aptos com [prowess|El] de #V [SCOPE.ScriptValue('invite_knights_decision_standard_value')|0]#! ou mais chegarão à corte como [guests|El] nos próximos meses"
 invite_knights_decision.men.tt: "Pelo menos [SCOPE.ScriptValue('invite_knights_decision_amount_value')|0P] mulheres aptas com [prowess|El] de #V [SCOPE.ScriptValue('invite_knights_decision_standard_value')|0]#! ou mais chegarão à corte como convidadas nos próximos meses"
 invite_knights_decision.women.tt: "Ao menos [SCOPE.ScriptValue('invite_knights_decision_amount_value')|0P] guerreiros com [prowess|El] de #V [SCOPE.ScriptValue('invite_knights_decision_standard_value')|0]#! ou mais chegarão à corte como [guests|El] nos próximos meses"
