 merge_aquitaine_decision_tooltip_2_alt: "Para o bem de todo [rightful_title.GetNameNoTierNoTooltip]."
 merge_aquitaine_decision_confirm: "Cartago se ergue"
 merge_aquitane_culture: "De uma terra salpicada de sal, emerge um novo império, restaurado à sua antiga glória. Em breve, navios mercantes encherão os portos de riquezas e o domínio do mar Mediterrâneo será nosso.\n\nOnde o grande Aníbal encontrou a derrota, eu me erguerei para reivindicar nosso legado. Mais uma vez, o mundo conhecerá o verdadeiro poder de Cartago.\n\nAinda há muito trabalho a fazer, mas, por ora, a #EMP victoria#! é minha!"
 merge_aquitane_culture_tooltip_original: "Adotarei os antigos costumes."
 merge_aquitane_culture_tooltip_alt: "Darei forma ao império como eu achar conveniente."
 merge_aquitaine_culture_tooltip: "A [cultural_acceptance|lE] diminui em #n 25%#!"
 cultural_acceptance_merge_aquitaine: "A ascensão dos cossacos"
 rightful_king_opinion: "Por gerações, homens e mulheres livres, sejam aventureiros, exilados ou criminosos, encontraram seu caminho até as estepes do Cáspio.

Às vezes chamados de "kazakos", eles viveram segundo suas próprias leis. No entanto, os cumanos mantiveram esses homens livres sob seu jugo, dominando as estepes. Os [founder_culture.GetCollectiveNoun] que governo veem esses kazakos como parentes, e a cada dia damos as boas-vindas a mais deles entre nós.

Talvez seja hora de abraçarmos juntos um novo destino..."
 major_decisions.3200.t: "Nós, cossacos, viveremos livres sob céus infinitos."
 major_decisions.3200.desc: "Eu os governarei, mas seguirei os velhos costumes."
