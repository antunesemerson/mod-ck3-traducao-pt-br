 #Found the Kingdom of Aragon
 form_the_kingdom_of_aragon_decision: "Os filhos do grande rio Ebro passaram séculos sendo deixados de lado. Pelos romanos, pelos visigodos, pelos francos, pelos árabes. Enquanto labutarem para conquistadores estrangeiros e capitais distantes, suas terras não serão verdadeiramente suas, e o povo clama por um reino local próprio."
 form_the_kingdom_of_aragon_decision_desc: "Nosso lar, nosso reino!"
 form_the_kingdom_of_aragon_decision_confirm: "Fundar o Reino de Aragão"
 form_the_kingdom_of_aragon_decision_tooltip: "Você poderá escolher copiar ou não os [culture_pillars|lE] de [founder_culture.GetName] para [aragonese_culture.GetName]"
 form_the_kingdom_of_aragon_decision.tt.form_aragonese: "Se [Concept( 'completely_control', 'controla totalmente' )|E] [d_valencia.GetDefinitiveName], [Concept( 'de_jure_drift_drifted', 'derivará de iure' )|E] para [k_aragon.GetDefinitiveName]"
 form_the_kingdom_of_aragon_decision.tt.drift.d_valencia: "Se [Concept( 'completely_control', 'controla totalmente' )|E] [d_barcelona.GetDefinitiveName], [Concept( 'de_jure_drift_drifted', 'derivará de iure' )|E] para [k_aragon.GetDefinitiveName]"
 form_the_kingdom_of_aragon_decision.tt.drift.d_barcelona: "Se [Concept( 'completely_control', 'controla totalmente' )|E] [d_navarra.GetDefinitiveName], [Concept( 'de_jure_drift_drifted', 'derivará de iure' )|E] para [k_aragon.GetDefinitiveName]"
 form_the_kingdom_of_aragon_decision.tt.drift.d_navarra: "Se [Concept( 'completely_control', 'controla totalmente' )|E] [d_navarra.GetDefinitiveName], [Concept( 'de_jure_drift_drifted', 'derivará de iure' )|E] para [k_aragon.GetDefinitiveName]"
 #Culture Conversion
 convert_to_local_culture_decision: "A verdade é que há pouca diferença entre minhas tradições e as do povo da minha capital. Observamos os mesmos dias sagrados, os mesmos festejos públicos, e nossa língua se tornou quase a mesma."
 convert_to_local_culture_decision_desc: "Reconheço quem eu sou"
 convert_to_local_culture_decision_confirm: "Converter-se à [culture|lE] de sua [capital|lE]"
 convert_to_local_culture_decision_tooltip: "[converting_character.GetShortUINameNoTooltip|U] [Select_CString( converting_character.IsLocalPlayer, 'convertiste', 'convirtió' )] [culture|lE]"
 converted_culture_msg_title: "Converteu de [old_culture.GetName] para [new_culture.GetName]"
 converted_from_old_culture_to_new_culture_tt: "Todo [vassal|lE] que compartilha sua [culture|lE] e possui [counties|lE] da nova Cultura"
 every_old_culture_vassal_holding_new_culture_land: "Todo membro da [close_family|lE] que compartilha sua [culture|lE]"
 every_close_family_member_sharing_your_culture: "Todo consorte que compartilha sua [culture|lE]"
 every_consort_sharing_your_culture: "Fazer o Reino Adotar as Tradições Locais"
 assimilate_local_traditions_decision: "Embora a aventura sempre esteja em nosso sangue, reconhecemos que estamos longe de nosso gelado lar escandinavo. As tradições locais servem bem ao seu povo, eles são mestres de sua terra e seus deuses são fortes — nós respeitamos isso. Com o tempo, nos tornaremos como eles."
 assimilate_local_traditions_decision_desc: "Nós nos adaptaremos"
 assimilate_local_traditions_decision_confirm: "Converta a si mesmo e todos os seus [vassals|lE] nórdicos à [culture|lE] e à [faith|lE] de sua [capital|lE]"
 assimilate_local_traditions_decision_tooltip: "Todo [vassal|lE] que compartilha sua [culture|lE] e sua [close_family|lE]"
 every_norse_vassal: "Converte-se para [new_faith.GetName] #weak (se não for )#!"
 non_zealous_convert: "Seceder de [ROOT.Char.GetLiege.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 secede_from_empire_decision: "A incompetência de [ROOT.Char.GetLiege.GetTitledFirstName|l] deixou [ROOT.Char.GetLiege.GetPrimaryTitle.GetNameNoTooltip] incapaz de proteger seus súditos de seus inimigos, tanto internos quanto externos. Até mesmo um novo governante teria dificuldade para desfazer todo o dano que [ROOT.Char.GetLiege.GetSheHe] causou.\n\nSeria muito mais sábio para nós nos separarmos e formar um novo reino, vivendo ou morrendo por nossos próprios méritos em vez de sermos arrastados junto com o resto do Império."
 secede_from_empire_decision_desc: "Desabafe e perca um pouco de estresse"
 secede_from_empire_decision_tooltip: "Parte da dívida de seu antigo suserano será cancelada"
 secede_from_empire_decision_effect_tooltip: "[CHARACTER.GetTitledFirstName] está endividado há mais de 25 anos"
 secede_from_empire_decision_trigger_debt: "[CHARACTER.GetTitledFirstName] está lutando a mesma guerra ofensiva há mais de 25 anos"
 secede_from_empire_decision_trigger_war: "Saúde!"
 secede_from_empire_decision_confirm: "[ROOT.Char.GetTitledFirstName] Ganhou Independência"
 secede_from_empire_decision_notification: "Isso aconteceu devido à minha dívida excessiva"
 secede_from_empire_decision_notification_tt: "[ROOT.Char.GetPrimaryTitle.GetName] se separou de [ROOT.Char.GetLiege.GetPrimaryTitle.GetNameNoTooltip], eliminando [debt_cleared.GetValue] em dívidas"
 secede_from_empire_decision_debug: "[ROOT.Char.GetPrimaryTitle.GetName] se separou de [ROOT.Char.GetLiege.GetPrimaryTitle.GetNameNoTooltip], eliminando [debt_cleared.GetValue] em dívidas"
 #DECISIONS TO "Se Entregar à Bebida" YOUR STRESS COPING TRAITS TO LOSE STRESS
 stress_loss_drunkard_decision: "A camaradagem encontrada na companhia de outros frequentadores da bebida, a calma que a névoa proporciona... Chegou a hora de se entregar a uma bebedeira!"
 stress_loss_drunkard_decision_desc: "Desabafe e perca um pouco de estresse"
 stress_loss_drunkard_decision_tooltip: "Você perderá um pouco de [stress|lE]"
 stress_loss_drunkard_decision_effect_tooltip: "Saúde!"
 stress_loss_drunkard_decision_confirm: "Consumir Bolos de Haxixe"
 stress_loss_hashishiyah_decision: "Apenas algumas mordidas, e o estresse parece escorrer do meu corpo. Minha mente começa a se toldar, e uma sensação de paz e descanso toma conta de mim. Não há nada tão relaxante quanto um bom haxixe!"
 stress_loss_hashishiyah_decision_desc: "Deixe seu estresse se dissolver numa névoa induzida por drogas"
 stress_loss_hashishiyah_decision_tooltip: "Traga-me uma travessa!"
 stress_loss_hashishiyah_decision_confirm: "Visitar um Bordel"
 stress_loss_rakish_decision: "[ROOT.Char.Custom('AttractionWomanManIndef')|U] no meu colo, e tudo — e todos — que o bordel tem a oferecer ao meu bel-prazer..."
 stress_loss_rakish_decision_desc: "Nada alivia a mente como algum alívio carnal."
 stress_loss_rakish_decision_desc_woman_ending: "Nada liberta a mente como um bom alívio."
 stress_loss_rakish_decision_desc_man_ending: "Alivie sua mente ao se entregar aos seus desejos"
 stress_loss_rakish_decision_tooltip: "Lá vou eu, [ROOT.Char.Custom('AttractionGirlBoyPlural')]!"
 stress_loss_rakish_decision_confirm: "Isolar-se"
 stress_loss_reclusive_decision: "Para realmente centrar minha mente e livrá-la de pensamentos e preocupações, preciso ser deixado por minha própria conta. Sozinho, posso me concentrar e me curar."
 stress_loss_reclusive_decision_desc: "Isole-se para focar sua mente"
 stress_loss_reclusive_decision_tooltip: "Adeus."
 stress_loss_reclusive_decision_confirm: "Perder a calma"
 stress_loss_irritable_decision: "Para me livrar de toda essa raiva e irritação que venho guardando... Ah, não há nada melhor do que isso para clarear a mente! Da próxima vez que surgir uma oportunidade, não vou me conter."
 stress_loss_irritable_decision_desc: "Você insulta um vassalo aleatório"
 stress_loss_irritable_decision_effect_tooltip: "Você insulta um[THIS.Char.Custom('ES_XA')] [THIS.Char.Custom('GetCourtier')|l] aleatoriamente"
 stress_loss_irritable_decision_effect_courtier_tooltip: "Deixe sua boca correr solta para acalmar sua mente"
 stress_loss_irritable_decision_tooltip: "Ei! Ei, você!"
 stress_loss_irritable_decision_confirm: "Entregar-se à Flagelação"
 stress_loss_flagellant_decision: "Nada purifica a mente como a catarse da dor. O benefício adicional de também se sentir mais próximo de [ROOT.Char.GetFaith.HighGodName] é... um... acontecimento #EMP divino#!."
 stress_loss_flagellant_exaltation_decision_desc: "A carne está aqui para servir de receptáculo para uma comunhão com [ROOT.Char.GetFaith.HighGodName]. Deixe-me romper a carne para que tal harmonia possa surgir."
 stress_loss_exaltation_decision_desc: "Nada purifica a mente como a catarse da dor. Aplicarei o chicote às minhas próprias costas até que minha mente se clareie."
 stress_loss_flagellant_decision_desc: "Você perderá estresse"
 stress_loss_flaggelant_decision_effect_tooltip: "Purifique sua mente com dor" #Not actually used atm
 stress_loss_flagellant_decision_tooltip: "Ugh–!"
 stress_loss_flagellant_decision_confirm: "Visitar o Mercado"
 stress_loss_profligate_decision: "Algo novo, algo brilhante, algo raro... Nada me centra como uma nova compra, e o mercado local guarda muitos tesouros!"
 stress_loss_profligate_decision_desc: "Gaste ouro para focar sua mente"
 stress_loss_profligate_decision_tooltip: "Encham minha bolsa!"
 stress_loss_profligate_decision_confirm: "Doar para a Caridade"
 stress_loss_improvident_decision: "Há muitos que precisam mais do meu ouro do que eu. Talvez isso não resolva diretamente meus próprios problemas, mas dar alivia a mente."
 stress_loss_improvident_decision_desc: "Doe aos necessitados para aliviar sua mente"
 stress_loss_improvident_decision_tooltip: "É por uma boa causa!"
 stress_loss_improvident_decision_confirm: "Confessar"
 stress_loss_contrite_decision: "Poucas coisas trazem tanto alívio e liberdade quanto uma confissão. Ao revelar meus segredos e falhas, posso acalmar minha mente."
 stress_loss_contrite_decision_desc: "Confesse suas falhas e liberte sua mente"
 stress_loss_contrite_decision_tooltip: "Um segredo seu aleatório será exposto"
 stress_loss_contrite_decision_expose_random_secret: "Tenho algo a dizer!"
 stress_loss_contrite_decision_confirm: "Entregar-se à Comida"
 stress_loss_comfort_eater_decision: "Quando tudo parece um pouco #EMP demais#!, sempre posso contar com a comida para acalmar minha mente — um estômago cheio leva a uma mente vazia e tranquila."
 stress_loss_comfort_eater_decision_desc: "Coma para focar sua mente"
 stress_loss_comfort_eater_decision_tooltip: "Ponham a mesa!"
 stress_loss_comfort_eater_decision_confirm: "Você está com uma Dieta Insatisfatória"
 lackluster_diet_hindrance_desc: "Evitar Comida"
 stress_loss_inappetetic_decision: "Já tenho coisas demais no meu prato, mesmo sem contar a comida literal ali! Ao pular refeições, posso me concentrar nas questões que realmente importam por aqui."
 stress_loss_inappetetic_decision_desc: "Evite comida e evite estresse"
 stress_loss_inappetetic_decision_tooltip: "Informem o cozinheiro"
 stress_loss_inappetetic_decision_confirm: "Escrever os Pensamentos"
 stress_loss_journaller_decision: "Vou colocar meus pensamentos e fardos no papel. Nada clareia a mente como tinta e papel!"
 stress_loss_journaller_decision_desc: "Coloque seus pensamentos no papel e clareie sua mente"
 stress_loss_journaller_decision_tooltip: "Tragam meu diário!"
 stress_loss_journaller_decision_confirm: "Conversar com um Confidente"
 stress_loss_confider_decision: "Ser verdadeiramente ouvido é um raro prazer. Nada alivia a mente como uma boa conversa com alguém em quem se pode confiar, e geralmente faz os problemas parecerem bem menores!"
 stress_loss_confider_decision_desc: "Compartilhe seus fardos com outra pessoa"
 stress_loss_confider_decision_tooltip: "Agora me escute bem..."
 stress_loss_confider_decision_confirm: "Aliviar um Pouco do Estresse"
 stress_loss_athletic_decision: "Nada alivia a mente como o pulso acelerado e um suor saudável! Vou exercitar meu corpo até que minha mente fique mais tranquila."
 stress_loss_athletic_decision_desc: "Um corpo saudável gera uma mente saudável"
 stress_loss_athletic_decision_tooltip: "Vamos lá!"
