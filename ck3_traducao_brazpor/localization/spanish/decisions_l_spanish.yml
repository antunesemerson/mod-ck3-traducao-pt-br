 all_courtiers_except_confidant: "Fundar o Reino da Bósnia"
 found_kingdom_of_bosnia_decision: "As montanhas e florestas da Bósnia central passam incessantemente entre senhores do norte e do sul. Talvez não por muito mais tempo..."
 found_kingdom_of_bosnia_decision_desc: "A Bósnia se torna um [de_jure|lE] [kingdom|lE]"
 found_kingdom_of_bosnia_decision_tooltip: "[ROOT.Char.Custom('ES_SennorSennora')|U] de toda Bósnia!"
 found_kingdom_of_bosnia_decision_confirm: "Acusar a $bosnian_church$ de Heresia"
 accuse_krstjani_of_heresy_decision: "As selvagens terras altas da Bósnia abrigam, há anos, uma seita que não pertence verdadeiramente nem ao Oriente nem ao Ocidente, e ainda assim ambos parecem satisfeitos em ignorar esse desvio crescente.\n\nChega! Faremos com que [ROOT.Char.GetFaith.ReligiousHeadName] os declare formalmente hereges, e eles não terão onde se esconder!"
 accuse_krstjani_of_heresy_decision_desc: "O mundo cristão não tolerará mais esses cismáticos!"
 accuse_krstjani_of_heresy_decision_tooltip: "Você envia uma carta a [GetPlayer.GetFaith.ReligiousHeadName], implorando que investigue o assunto da $bosnian_church$…"
 accuse_krstjani_of_heresy_flavour_effect.tt: "Primeiro a pena, depois a espada!"
 accuse_krstjani_of_heresy_decision_confirm: "Você não pode ser um $bosnian_church_adherent$ absolvido!"
 cannot_be_atoned_krstjani_leader_flag: "Preparar-se para Cruzar os Cárpatos"
 launch_hungarian_migration_decision: "As tribos rivais da estepe, especialmente os bandos guerreiros pechenegues que infestam nosso território, estão tornando a vida cada vez mais difícil. Do outro lado dos Cárpatos, porém, estão os vales férteis e arborizados e as planícies onduladas da fraca Panônia..."
 launch_hungarian_migration_decision_desc: "Fuja da estepe para se estabelecer na Panônia"
