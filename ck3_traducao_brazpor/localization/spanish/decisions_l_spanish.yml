 major_decisions.3600.desc: "Por gerações, homens e mulheres livres, sejam aventureiros, exilados ou criminosos, encontraram seu caminho até as estepes do Cáspio.

Às vezes chamados de "Você deve possuir uma [barony|lE] que seja a capital de seu [county|lE] , não esteja [Concept('leased', 'arrendada')|E] e não tenha já um espaço de [special_building|lE]#!", eles viveram segundo suas próprias leis. No entanto, os cumanos mantiveram esses homens livres sob seu jugo, dominando as estepes. Os [founder_culture.GetCollectiveNoun] que governo veem esses kazakos como parentes, e a cada dia damos as boas-vindas a mais deles entre nós.

Talvez seja hora de abraçarmos juntos um novo destino..."
