 merge_aquitaine_de_jure_title: "Como [rightful_liege.Custom('GetQueenKing')|l] legítim[rightful_liege.Custom('ES_OA')] dos tronos de [rightful_title.GetNameNoTier] e [destroyed_title.GetNameNoTier], [rightful_liege.Custom('ES_ElLa')] [rightful_liege.GetTitledFirstName|l] decidiu governar ambos a partir de [rightful_liege.GetCapitalLocation.GetTitle.GetNameNoTier].\n\nSeus vassalos já não serão vistos como dois povos governados por um[rightful_liege.Custom('ES_XA')] mesm[rightful_liege.Custom('ES_OA')] [rightful_liege.Custom('GetQueenKing')|l], mas sim como o povo de um único reino."
