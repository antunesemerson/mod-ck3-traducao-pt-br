 revoke_false_conversion_decision.desc.tt: "Você se reconverte à sua [faith|lE] anterior. Seus [close_family|lE] podem se converter com você."
 revoke_false_conversion_decision.desc.tt_landless: "Se você for [independent|lE], os [counties|lE] dentro do seu [realm|lE] que tiverem [GetModifier('false_convert_modifier').GetNameWithTooltip] podem se converter com você caso professem secretamente sua [faith|lE] em segredo"
 revoke_false_conversion_decision.desc.tt_own_faith_counties: "Fazer uma proclamação"
 revoke_false_conversion_decision_confirm: "Anistia para Falsas Conversões"
 encourage_confession_of_false_conversions_decision: "Cripto-religionistas podem revelar sua [faith|lE] oculta"
 encourage_confession_of_false_conversions_decision.tt: "#F É um segredo aberto que há cripto-religionistas em meu reino, praticando sua fé às escondidas. Talvez uma anistia oficial possa convencê-los a abandonar a fachada?#!"
 encourage_confession_of_false_conversions_decision.desc: "Os cripto-religiosos em seu reino podem se revelar se sua [faith|lE] [Concept( 'tolerates', 'tolera' )|E] fé secreta for mais tolerada do que a pública"
 encourage_confession_of_false_conversions_decision.desc.tt_pluralist: "Os [characters|lE] com traço [GetTrait('deceitful').GetName( GetNullCharacter )] ou [GetTrait('paranoid').GetName( GetNullCharacter )] não revelarão sua [faith|lE] secreta, a menos que seja a mesma que a sua"
 encourage_confession_of_false_conversions_decision.desc.tt_paranoia: "Se você for [independent|lE], os [counties|lE] dentro do seu [realm|lE] que tenham [GetModifier('false_convert_modifier').GetNameWithTooltip] podem se converter abertamente, dependendo de quão hostil sua nova [faith|lE]"
 encourage_confession_of_false_conversions_decision.desc.tt_pluralist_counties: "Cripto-religionistas em seu reino podem se revelar, se sua [faith|lE] privada for a mesma que a sua pública"
 encourage_confession_of_false_conversions_decision.desc.tt_coreligionist: "Fazer uma proclamação"
 encourage_confession_of_false_conversions_decision_confirm: "Abandonar Fé Secreta"
 abandon_crypto_faith_decision: "Parar de praticar sua antiga fé em segredo"
 abandon_crypto_faith_decision.tt: "#F Todos estes sermões secretos e orações sussurradas estão esgotando minha paciência. Enquanto isso, acostumei-me à minha vida pública em [ROOT.Char.GetFaith.GetName|l]. Talvez seja hora de deixar minha antiga fé descansar de uma vez por todas.#!"
 abandon_crypto_faith_decision.desc: "Abandonar a #EMP cripto-fé#!"
 abandon_crypto_faith_decision_confirm: "Abandonar a #EMP cripto-fé#!"
 #Restore the Holy Roman Empire
 restore_holy_roman_empire_decision: "O verdadeiro Império no Ocidente jaz em ruínas, o legado de Carlos Magno despedaçado pelo cruel destino. Seria necessário um governante forte e piedoso para devolver a dignidade imperial da Alemanha."
