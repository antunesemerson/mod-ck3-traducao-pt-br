 #Introduce a Fashion at Court
 introduce_a_new_fashion_at_court_decision: "Nenhuma corte pode afirmar ser tão estilosa quanto a nossa! A corte é um campo de batalha da moda, e já passou da hora de eu fazer meu próprio esforço para estabelecer uma nova tendência entre a nobreza..."
 introduce_a_new_fashion_at_court_decision_desc: "Tentar introduzir uma nova moda na corte por [prestige|lE]."
 introduce_a_new_fashion_at_court_decision_tooltip: "Um personagem da corte pode tentar duelar com você em [diplomacy|lE] para impedir que seu estilo seja implementado."
 introduce_new_fashion_duel_tooltip: "Por um novo estilo e classe!"
 introduce_a_new_fashion_at_court_decision_confirm: "A corte já tem uma tendência de moda em andamento."
 court_already_has_a_fashion_tend_tt: "Todos adoram o novo estilo!"
 court_amenities_interactions.0010.b_turned_down: "Uma Nova Moda na Corte"
 court_amenities_interactions.0010.t: "[actor.GetNameNoTooltip|U] irrompeu na corte, chamando a atenção de todas as damas e senhores do reino com vestimentas muito peculiares."
 court_amenities_interactions.0010.desc_intro: "Vestiu um traje adornado com uma gola da circunferência de uma roda de carroça"
 court_amenities_interactions.0010.desc.flag_big_collar: "Adotou o costume de usar um adereço tradicional inclinado para um lado da cabeça, numa torcida zombaria da cultura [actor.GetCulture.GetName]"
 court_amenities_interactions.0010.desc.flag_head_dress: "Trota pesadamente pelo grande salão de [debate_locale.GetNameNoTierNoTooltip], suas botas de metal maciço adornadas com incrustações de ouro praticamente rachando o chão com seu peso tremendo"
 court_amenities_interactions.0010.desc.flag_gold_boots: "Arrancou as mangas de sua roupa nobre"
 court_amenities_interactions.0010.desc.flag_sleeveless: "Entrou em [debate_locale.GetNameNoTierNoTooltip] vestido com as roupas de um camponês plebeu"
 court_amenities_interactions.0010.desc.flag_commoner_clothes: "e ousou declarar isso como a mais nova moda do reino! Todos os tolos da corte parecem estar caindo nessa, mas devo intervir para pôr fim a essa loucura?"
 court_amenities_interactions.0010.desc_outro: "\"Você parece um pássaro que engoliu um prato!\""
 court_amenities_interactions.0010.a_flag_big_collar: "\"O que #EMP é isso#! que você está vestindo?\""
 court_amenities_interactions.0010.a: "Mordo o lábio e tento não rir."
 court_amenities_interactions.0010.b: "Você convence a plateia de que o traje de [actor.GetNameNoTooltip] é idiota"
 court_amenities_interactions.0010.a.tt_success: "A multidão discorda de você e acha que o traje de [actor.GetNameNoTooltip] é a nova tendência da moda"
 court_amenities_interactions.0010.a.tt_failure: "De Moda e Desavenças"
 court_amenities_interactions.0011.t: "Eu desfilo pela minha corte, orgulhos[ROOT.Char.Custom('ES_OA')] da minha nova e ousada declaração de moda,"
 court_amenities_interactions.0011.desc_intro: "minhas roupas adornadas com uma enorme gola redonda para todos admirarem."
 court_amenities_interactions.0011.desc.flag_big_collar: "meu adereço de cabeça habitual inclinado para um lado da minha cabeça, trazendo algo novo e fresco a uma peça de vestuário que de outra forma seria velha e sem graça."
 court_amenities_interactions.0011.desc.flag_head_dress: "minhas pesadas botas douradas reluzindo à luz do salão de [debate_locale.GetNameNoTierNoTooltip]."
 court_amenities_interactions.0011.desc.flag_gold_boots: "minha nova roupa sem mangas exibindo meus braços para todos verem!"
 court_amenities_interactions.0011.desc.flag_sleeveless: "questionando por que a nobreza deve se vestir de forma tão diferente dos plebeus quando a simplicidade é tão estilosa."
 court_amenities_interactions.0011.desc.flag_commoner_clothes: "[recipient.Custom2('MyCharacterIntroduction', ROOT.Char)] grita comigo do outro lado do salão.\n\nTrocamos insultos de volta e adiante, enquanto eu defendo aquilo que é obviamente uma boa moda, muito acima da compreensão de uma mente simples."
 court_amenities_interactions.0011.desc_bridge: "À medida que a nobreza local se aglomera ao meu redor, posso considerar que minha declaração de moda é um sucesso estrondoso!"
 court_amenities_interactions.0011.desc_won: "À medida que a nobreza de [debate_locale.GetNameNoTierNoTooltip] rapidamente se junta a [recipient.GetNameNoTooltip] para zombar de minha roupa, sei que minha afirmação de moda foi cruelmente incompreendida em seu próprio tempo."
 court_amenities_interactions.0011.desc_lost: "Eu sempre sei o que é melhor!"
 court_amenities_interactions.0011.a_won: "Eles simplesmente não me #EMP entendem#!!"
 court_amenities_interactions.0011.a_lost: "Alguns seguem, outros lideram. [actor.GetNameNoTooltip] permanece firme em seu compromisso com esse ridículo traje.\n\nPassamos as horas seguintes debatendo sobre a natureza da alta costura, com uma pequena multidão de cortesãos observando enquanto eu lanço insulto após insulto a est[actor.Custom('ES_EA')] imbecil."
 court_amenities_interactions.0012.desc_intro: "Em pouco tempo, muitos outros cortesãos começam a se juntar a mim para zombar de [actor.GetNameNoTooltip], e sei que meu trabalho está feito."
 court_amenities_interactions.0012.desc_won: "Infelizmente, a multidão não pareceu convencida por meus argumentos e, em poucos dias, eu sou o único na corte #EMP que não#! se veste como [actor.GetNameNoTooltip]."
 court_amenities_interactions.0012.desc_lost: "Não só isso, mas muitos passaram a se referir a [actor.GetHerHim] como o \"[actor.GetTitleAsNameNoTooltip] da Moda.\""
 court_amenities_interactions.0012.desc_lost.kof: "Estou cercad[ROOT.Char.Custom('ES_OA')] de bajuladores e idiotas!"
 court_amenities_interactions.0012.a_lost: "À medida que o tempo passa, muitos em [debate_locale.GetNameNoTierNoTooltip] passaram a me chamar de [actor.GetTitleAsNameNoTooltip] da Moda!"
