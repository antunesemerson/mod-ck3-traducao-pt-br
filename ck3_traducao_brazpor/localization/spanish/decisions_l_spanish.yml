 form_brunei_kingdom_decision: "Estabelecer o Dar al-Islam"
 form_brunei_kingdom_decision_desc: "O Islã há muito é uma religião dividida e fragmentada. Desde a morte do grande profeta, [GetScriptedCharacterByHistoryID( '33922' ).GetFirstName], guerra e conflito frequentemente prevaleceram quando o descontentamento se espalhou entre nós. Chegou a hora de unificar todas as denominações islâmicas sob uma liderança comum. #EMP Minha#!."
