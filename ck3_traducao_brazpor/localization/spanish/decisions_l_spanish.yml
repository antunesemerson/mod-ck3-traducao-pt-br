 mozarabic_break_with_rome_decision: "O que [ROOT.Char.GetFaith.GetReligiousHead.GetTitledFirstName|l] sabe sobre nossas vidas ou nossas terrasó Roma é uma soberana temporal distante, que não cuida nem compreende nossas necessidades espirituais.\n\nSomente ao nos libertarmos das correntes do [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetBaseName] e purgarmos a última de suas mentiras é que [ROOT.Char.GetFaith.GetName|l] poderá alcançar a perfeição."
