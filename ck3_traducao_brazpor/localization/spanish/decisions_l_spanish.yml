 gain_weight_decision: "Ganhar Peso"
 gain_weight_decision_desc: "As fraquezas do meu corpo estão ficando perceptíveis demais — mal tenho forças para atravessar o dia!\n\nUma dieta contendo, entre outras coisas, muito leite, manteiga e tâmaras me foi sugerida, e acho que chegou a hora de experimentá-la."
 gain_weight_decision_tooltip: "Você se dedicará a ganhar peso"
 gain_weight_decision_confirm: "Tragam a manteiga!"
 stop_gain_weight_decision: "Parar de Ganhar Peso"
 stop_gain_weight_decision_desc: "Um fluxo interminável de comida gordurosa cumpriu sua função, e eu não consigo mais suportá-la. Vou abandonar meus esforços para ganhar peso."
 stop_gain_weight_decision_tooltip: "Você não tentará mais ganhar peso"
 stop_gain_weight_decision_confirm: "Parar de Ganhar Peso"
 lose_weight_decision: "Perder Peso"
 lose_weight_decision_desc: "Meu corpo enfraquece a cada dia que passa, e meu porte pesa sobre mim tanto física quanto mentalmente.\n\nCorridas, banhos quentes, talvez até uma substância levemente catártica... Vou encontrar uma forma de perder algum peso."
 lose_weight_decision_tooltip: "Você se dedicará a perder peso"
 lose_weight_decision_confirm: "Tragam o escamônio!"
 stop_lose_weight_decision: "Parar de Perder Peso"
 stop_lose_weight_decision_desc: "Tentei toda tintura e remédio que me recomendaram, e insistir mais do que isso seria excessivo. Vou abandonar meus esforços para perder peso."
 stop_lose_weight_decision_tooltip: "Você não tentará mais perder peso"
 stop_lose_weight_decision_confirm: "Parar de Perder Peso"
 commit_suicide_decision: "Tentar Suicídio"
 commit_suicide_decision_desc: "Só há escuridão e dor. As pessoas me dizem que vai melhorar, mas como elas sabem? E de que isso me ajuda neste momento? Chegou a hora de abandonar os fardos deste reino mortal."
 commit_suicide_decision_desc_depressed: "$commit_suicide_decision_desc$"
 commit_suicide_decision_desc_incapable: "Eu sobrevivo, mas não vivo de verdade. Meu estado atual me obriga a depender dos outros até para as tarefas mais simples. Não escolhi isso; talvez fosse mais fácil se eu simplesmente acabasse com tudo..."
 commit_suicide_decision_desc_cancer: "Sinto a doença se espalhando dentro de mim. O que começou como um pequeno incômodo agora se transformou em uma luta diária. A morte é inevitável. Só quero que a dor pare."
 commit_suicide_decision_desc_leper: "A podridão se apoderou firmemente do meu ser mortal. Alguns dos meus dedos dos pés já se foram, e pus escorre das minhas feridas. Por quanto tempo ainda terei de sofrer com esse destino horrendo?"
 commit_suicide_decision_desc_great_pox: "As pústulas agora cobrem meu corpo, cada úlcera maior e mais dolorosa do que a anterior. Não vejo nada além de medo e nojo nos olhos dos meus súditos. Só vai piorar..."
 commit_suicide_decision_desc_lunatic: "Não consigo escapar dos murmúrios constantes de ódio e decepção. Eles estão me dizendo para fazer coisas que eu não deveria. Nada faz sentido, a realidade se contradiz. Só a morte me libertará?"
 commit_suicide_decision_desc_parent: "Não consigo seguir em frente, estou pres[ROOT.Char.Custom('ES_OA')] pela dor da perda do meu filho. [ROOT.Var('mourning_parent').Char.Custom2('MyCharacterIntroduction', ROOT.Char)|U] significava o mundo para mim. De que vale viver, quando a vida perdeu sua única fonte de alegria e riso?"
 commit_suicide_decision_desc_soulmate: "Não consigo mais suportar o vazio que sinto dentro da minha alma. A vida sem você, meu amado [ROOT.Var('mourning_soulmate').Char.GetFirstName], não passou de um fardo. Se a única forma de voltar para os seus braços é deixando este mundo, que assim seja."
 commit_suicide_decision_desc_friend: "A vida é sombria demais se eu não posso compartilhá-la com um verdadeiro amigo. Momentos que fariam [ROOT.Var('mourning_friend').Char.GetFirstName] e eu rir por horas agora só me enchem de desespero. Esse caminho de solidão não é para mim."
 commit_suicide_decision_desc_demoted: "Poucos sofreram humilhação como eu. Eu, que costumava estar no topo, agora me vejo obrigad[ROOT.Char.Custom('ES_OA')] a me arrastar como o resto desses tolos. Talvez eu devesse resolver isso pessoalmente e partir do jeito que eu escolher."
 commit_suicide_decision_desc_divorce: "Passo meus dias mergulhado em arrependimento. O que eu poderia ter feito para evitar esta separação dolorosa? Como posso restaurar o amor que foi perdido? É inútil. Sem meu casamento, não sou nada."
 commit_suicide_decision_desc_witch: "Meu fascínio pelo arcano me levou por um caminho solitário e perigoso. Mas minha curiosidade teve um custo terrível. Sou rejeitado por minhas crenças. Temo que jamais me aceitem por quem sou."
 commit_suicide_decision_desc_cannibal: "Que sociedade retrógrada é esta em que vivemos. Deleitar-me com a iguaria requintada que é a carne humana é a única coisa que me traz alegria. Não quero continuar vivendo em um mundo que a proíbe!"
 commit_suicide_decision_desc_sodomite: "O destino me deu uma carta cruel. Por que devo ser perseguido pelos desejos do meu coração? Não posso evitar ter nascido assim. Se me condenam em vida, serei aceito apenas na morte?"
 commit_suicide_decision_desc_deviant: "Quem são eles para me julgar? Minhas explorações luxuriosas podem ter me levado por muitos caminhos surpreendentes, mas todos conduzem a um prazer intenso. Sem esses deleites carnais, não tenho nada pelo que viver."
 commit_suicide_decision_desc_criminal: "Não consigo escapar do meu passado. Aonde quer que eu vá, sinto sobre mim os olhos do julgamento. Como isso pôde acontecer? Por que deixei as coisas irem tão longe? Espero que meus crimes sejam perdoados depois que eu me for."
 commit_suicide_decision_desc_stressed: "Dia após dia, a pressão aumenta. Aonde quer que eu vá, faça o que fizer, logo tudo se torna demais. Tudo está saindo do controle. Isso precisa acabar!"
 commit_suicide_decision_tooltip: "Chegou a hora de partir deste mundo"
 commit_suicide_decision_effect_tooltip: "@warning_icon! Você tentará pôr fim à sua vida, tem certeza de que é isso que quer?"
 commit_suicide_decision_confirm: "Minha hora chegou"
