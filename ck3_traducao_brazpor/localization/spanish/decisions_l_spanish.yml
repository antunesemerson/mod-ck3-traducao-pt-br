 #Establish Norman Culture
 establish_norman_culture_decision: "Nossas antigas tradições não nos servem bem em nosso novo lar. Devemos observar os locais e ver o que podemos aprender com eles."
 establish_norman_culture_decision_desc: "A Normandia se ergue!"
 establish_norman_culture_decision_confirm: "Fundir nossa cultura nórdica com a cultura francesa local"
