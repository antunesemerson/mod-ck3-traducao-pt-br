 rebuke_roman_revanchism_sicily.tt.sicily_has_no_holder: "Se você optar por anexar [GetTitleByKey('k_sicily').GetNameNoTier]"
 rebuke_roman_revanchism_sicily.tt.requirements.ere_cant_be_revanchising: "O Sonho de Justiniano Desfeito"
 rebuke_roman_revanchism_sicily.tt.requirements.ere_not_in_italy: "Durante centenas de anos, os bizantinos têm se agarrado aos seus últimos redutos na Península Itálica, cravando unhas ensanguentadas na terra e se recusando a soltá-los, por mais que os golpeemos.\n\nMas não mais. Hoje, seu controle está finalmente frouxo o bastante para ser arrancado de vez, e farei com que o mundo inteiro saiba disso.\n\n"
 rebuke_roman_revanchism_sicily.tt.effects.option.1: "[emperor.GetTitledFirstNameNicknamed|l] pode chiar e resmungar o quanto quiser, se é que se dá ao trabalho de notar uma província dissidente longe de seu palácio confortável, mas não pode fazer nada para me deter."
 rebuke_roman_revanchism_sicily.tt.effects.option.2: "Não há sequer um imperador para protestar contra minha proclamação. Patético."
 rebuke_roman_revanchism_sicily.tt.effects.option.3: "\n\nA única questão é... aonde vejo a bela [GetTitleByKey('k_sicily').GetNameNoTier] pertencer agora?"
 roman_restoration.1211.t: "Estamos ligados para sempre a nossos irmãos do norte."
 roman_restoration.1211.desc.intro: "O destino da Sicília está, como sempre esteve, além-mar."
 roman_restoration.1211.desc.body.emperor_exists: "Ora, com [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], é claro!"
 roman_restoration.1211.desc.body.emperor_absent: "$roman_restoration.1211.t$"
 roman_restoration.1211.desc.outro: "Após anos de resistência obstinada e perseverante às hordas bárbaras de uma espécie ou de outra que saqueavam os últimos vestígios de nossa antiga terra natal, [taker.Custom('ES_ElLa')] [taker.GetTitledFirstName|l]obteve finalmente o triunfo onde tantos outros fracassaram.\n\nAquele tipo de canalha eliminou os últimos vestígios do controle romano na península ocidental,"
 roman_restoration.1211.a: "alinhando, em vez disso, o território firmemente com [GetTitleByKey('e_italy').GetNameNoTier]."
 roman_restoration.1211.b: "trazendo-o para a esfera africana junto de [GetTitleByKey('e_maghreb').GetNameNoTier]."
 roman_restoration.1211.c: "e absorveu o território incorporando-o ao seu próprio domínio de [taker.GetPrimaryTitle.GetBaseNameNoTier]."
 roman_restoration.1212.t: "\n\nOs poucos e dispersos postos avançados que ainda nos restam não oferecem resistência real a essa afronta."
 roman_restoration.1212.desc.intro: "\n\nSem sequer um único porto no sul para chamar de nosso, nada podemos fazer para resistir a essa injustiça."
 roman_restoration.1212.desc.new_empire.italia: "[Select_CString( taker.IsFemale, 'Presunãosa insolente', 'Presunãoso insolente' )]!"
 roman_restoration.1212.desc.new_empire.maghreb: "$roman_restoration.1211.t$"
 roman_restoration.1212.desc.new_empire.own: "Apesar de ter derramado um oceano de sangue por seus territórios italianos ao longo dos sóculos, [taker.GetTitledFirstNameNicknamed|l] obrigou finalmente os romanos a admitir que perderam [GetTitleByKey('k_sicily').GetNameNoTier].

Em vez disso, estas terras agora se voltam para"
 roman_restoration.1212.desc.outro.territory_left: "o restante da península em busca de amparo."
 roman_restoration.1212.desc.outro.no_territory_left: "seus vizinhos africanos além-mar, vendo-se como parte de seus antigos primos em [GetTitleByKey('e_maghreb').GetNameNoTier]."
 roman_restoration.1212.a: "seu próprio [taker.GetPrimaryTitle.GetBaseName] como o #EMP nuevo#! império."
 roman_restoration.1213.t: "[emperor.Custom('ES_ElLa')|U] [emperor.GetTitledFirstName|l] protesta o quanto se pode esperar pela perda de uma província menor, mas não mais do que isso."
 roman_restoration.1213.desc.intro: "Apesar de ter derramado um oceano de sangue por seus territórios italianos ao longo dos sóculos, [taker.GetTitledFirstNameNicknamed|l] obrigou finalmente os romanos a admitir que perderam [GetTitleByKey('k_sicily').GetNameNoTier].

Em vez disso, estas terras agora se voltam para"
 roman_restoration.1213.desc.new_empire.italia: "Ainda bem que se foi!"
 roman_restoration.1213.desc.new_empire.maghreb: "Em que tempos sombrios vivemos..."
 roman_restoration.1213.desc.new_empire.own: "seu próprio [taker.GetPrimaryTitle.GetBaseName] como o #EMP nuevo#! império."
