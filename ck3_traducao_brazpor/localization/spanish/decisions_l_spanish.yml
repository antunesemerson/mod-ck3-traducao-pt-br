 diligent_development_focus_decision: "Eu sonho que [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] um dia será a inveja de todo governante sob o céu. Preciso me esforçar para ser o campeão que a transformará na joia da Terra. Tudo de que preciso é trabalhar um pouco mais nisso...\n\nQuem precisa dormir, afinal?"
