 minor_decisions.0001.desc: "$knight_culture_player_plural$ são convocados a visitar sua corte"
 invite_knights_decision_tooltip: "Convidar Poetas"
 invite_poets_decision: "Como patrono das belas-artes e protetor de todos aqueles que prezam as palavras, é justo que eu reúna mais poetas para se juntarem ao meu salão. Enviarei um arauto para informar meus súditos de que estou em busca de hábeis artífices da palavra."
 invite_poets_decision_desc: "Ao menos #P 3#! poetas com #V [SCOPE.ScriptValue('invite_poets_decision_standard_value')|0]#! ou mais de [diplomacy|lE] chegarão ao seu Acampamento nos próximos meses\n$EFFECT_LIST_BULLET$Em alguns casos raros, candidatos extremamente capazes chegarão"
 invite_poets_decision.tt: "Poetas são convocados a visitar sua corte"
 invite_poets_decision_tooltip: "Um Poeta Chegou"
 minor_decisions.0004.t: "[poet.Custom('ES_ElLa')|U] [poet.GetTitledFirstName|l] ouviu meu chamado e chegou como meu convidado[poet.Custom('ES_OA')]"
 minor_decisions.0004.desc: "$invite_knights_decision_confirm$"
 invite_poets_decision_confirm: "Convidar Reivindicantes"
 invite_claimants_decision: "Para expandir meu reino, preciso ter reivindicações válidas sobre terras estrangeiras. Felizmente para mim, há muitos reivindicantes por aí que estariam dispostos a se tornar meus vassalos em troca de apoio militar."
 invite_claimants_decision_desc: "A probabilidade de [claimants|lE] com [claims|lE] relevantes chegarem como [guests|lE] à Corte é bastante aumentada por #V 5#! anos"
 invite_claimants_decision.tt: "Enviar o arauto"
 invite_claimants_decision_confirm: "Um Reivindicante Chegou"
 minor_decisions.0002.t: "[claimant.Custom2('MyCharacterIntroduction', ROOT.Char)|U] atendeu ao meu chamado e chegou à corte como meu hóspede"
 minor_decisions.0002.desc: "Convida-se [claimants|lE] a visitar minha corte"
 invite_claimants_decision_tooltip: "Raspar o Tacho"
 scrape_the_barrel_decision: "Minha Corte Real carece de indivíduos habilidosos para preencher as muitas posições cortesãs necessárias para manter um próspero [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]!\n\nMinha casa carece da grandeza que merece, mas talvez a solução esteja aqui nos lugares mais improváveis..."
 scrape_the_barrel_decision_desc: "Recrutaremos um [lowborn|lE] para preencher uma [court_position|lE] aleatória"
 scrape_the_barrel_decision_tooltip: "$scrape_the_barrel_decision_tooltip$"
 scrape_the_barrel_decision.tt: "Começar a busca!"
 scrape_the_barrel_decision_confirm: "Raspando o Tacho"
 minor_decisions.0003.t: "Minha varredura por [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] arrastou [barrel_character.GetName] até minha presença!"
 minor_decisions.0003.desc.opening: "Diante de mim está um[barrel_character.Custom('ES_XA')] camponês[barrel_character.Custom('ES_OA')] doente[barrel_character.Custom('ES_OA')] coberto[barrel_character.Custom('ES_OA')] de sujeira, vômito seco e um olhar com pouca consciência."
 minor_decisions.0003.desc.diseased: "O que tenho diante de mim é um[barrel_character.Custom('ES_XA')] camponês[barrel_character.Custom('ES_OA')] de aparência das mais incomuns que me olha com espanto e assombro como se eu fosse [ROOT.Char.GetFaith.HighGodName] em pessoa. Está claro que as condições de seu nascimento lhe causaram dor e isolamento excessivos dos plebeus de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 minor_decisions.0003.desc.physical: "Est[barrel_character.Custom('ES_EA')] [barrel_character.GetWomanMan] parece ter visto muito mais conflito e crueldade do que lhe caberia e carrega consigo as marcas de cada punho e lâmina que o/a golpearam e cortaram [barrel_character.GetSheHe]."
 minor_decisions.0003.desc.maimed: "Est[barrel_character.Custom('ES_EA')] desgraçad[barrel_character.Custom('ES_OA')] foi tirad[barrel_character.Custom('ES_OA')] das masmorras; encarcerad[barrel_character.Custom('ES_OA')] por crimes inexprimíveis contra a coroa, na esperança de perdão em troca de suas habilidades."
 minor_decisions.0003.desc.criminal: "O que sou obrigado a encarar é um terrível pesadelo em forma de pessoa, que mal se assemelha a um ser humano. A desgraçada criatura precisa ser tratada com firmeza."
 minor_decisions.0003.desc.ewan: "\n\nEmbora seja um[barrel_character.Custom('ES_XA')] traidor[barrel_character.Custom('ES_XA')] culpado,"
 minor_decisions.0003.desc.criminal_bridge: "\n\nApesar de sua aflição,"
 minor_decisions.0003.desc.bridge_1: "chegou ao meu conhecimento que é uma[barrel_character.Custom('ES_XA')]"
 minor_decisions.0003.desc.bride_2: "erudito[barrel_character.Custom('ES_OA')] especialista[barrel_character.Custom('ES_OA')] em língua escrita apesar de sua baixa posição social. Acho que [barrel_character.GetNameNoTooltip] serviria bem à corte em assuntos de religião, conhecimento ou saúde."
 minor_decisions.0003.desc.educated: "estelionatário[barrel_character.Custom('ES_XA')] hábil[barrel_character.Custom('ES_OA')] que fez fortuna extorquindo dos locais até o último centavo que pudessem arrancar. Sua astúcia e destreza manual cairiam bem ao meu lado, ouvindo os muitos sussurros que surgem na corte e fazendo a justiça recair sobre aqueles que ofendem a Coroa."
 minor_decisions.0003.desc.cunning: "diplomátic[barrel_character.Custom('ES_OA')] hábil no idioma [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip] que rivaliza com qualquer nobre. Seu carisma subversivo e aparência incomum certamente chamará a atenção de qualquer nobre estrangeiro que visite minha corte."
 minor_decisions.0003.desc.charismatic: "mercador habilidoso com uma compreensão de finanças e organização muito acima do que eu esperaria de um[barrel_character.Custom('ES_XA')] camponês[barrel_character.Custom('ES_OA')]. Sem dívida, esta pessoa está desperdiçada como plebeu e foi escolhida por [ROOT.Char.GetFaith.HighGodName] para elevá-la à nobreza e servir-me na corte."
 minor_decisions.0003.desc.organised: "líder capaz, que venceu inúmeras escaramuças e liderou seu grupo de fora-da-lei de ataque em ataque. Sem dúvida, está se desperdiçando, rolando em um caldo de lama e sangue, cometendo pequenos furtos pelo campo, e em vez disso deveria vestir os trajes reais e juntar-se à minha magnífica corte!"
 minor_decisions.0003.desc.strong: "Meu conselho determinou o papel que melhor se encaixa com [barrel_character.GetNameNoTooltip]. A única questáo que resta à se estou dispost[ROOT.Char.Custom('ES_OA')] a levar isso adiante ou não."
 minor_decisions.0003.desc.outro: "Claro! Bem-vind[barrel_character.Custom('ES_OA')] à nobreza, [barrel_character.GetNameNoTooltip]!"
 minor_decisions.0003.a: "Só o ofício da execução convém a esta #EMP criatura#!."
 minor_decisions.0003.b: "[ROOT.Char.GetFaith.HighGodName], traga-me outra pessoa!"
 minor_decisions.0003.c: "Uhhh, ainda não estamos tão desesperados assim..."
 minor_decisions.0003.d: "Uhhh, ainda não estamos tão desesperados assim..."
 #False Conversion decisions
 revoke_false_conversion_decision: "Reconverter-se publicamente à sua antiga [faith|lE]"
 revoke_false_conversion_decision.tt: "#F Embora oficialmente eu siga a fé [ROOT.Char.GetFaith.GetAdjectiveNoTooltip], não consigo abandonar muitos dos rituais pessoais e crenças privadas mantidos por meus ancestrais. Talvez os velhos caminhos realmente fossem melhoresó#!"
