l_spanish:
 situation_steppe_abundant_grazing_season: "Pasto Abundante"
 situation_steppe_abundant_grazing_season_desc: "$situation_steppe_abundant_grazing_season$ é uma estação onde as terras de pastagem são confiáveis e o gado pode pastar livremente."
 situation_steppe_severe_drought_season: "Seca Severíssima"
 situation_steppe_severe_drought_season_desc: "Uma $situation_steppe_severe_drought_season$ faz com que as terras de pastagem murchem e as reservas de forragem acabem.\n\n#weak Durante este período, a guerra é mais comum.#!"
 situation_steppe_white_zud_season: "Zud Branco"
 situation_steppe_white_zud_season_desc: "Em um tempo de $situation_steppe_white_zud_season$, a neve cobre as terras de pastagem, formando uma camada que pode ter metros de espessura. O gado não consegue alcançar a grama e morre de fome.#weak $situation_steppe_zud_effect$#!"
 situation_steppe_zud_effect: "\n\nDurante um Zud, os nômades são forçados a se submeter a governantes mais fortes para sobreviver."
 situation_steppe_cold_zud_season: "Zud Gelado"
 situation_steppe_cold_zud_season_desc: "Uma $situation_steppe_cold_zud_season$ traz ventos fortes e nevascas. As temperaturas extremamente baixas forçam o gado a usar a maior parte da sua energia para se manter aquecido, não conseguindo pastar.#weak $situation_steppe_zud_effect$#!"
 situation_steppe_warm_nights_season: "Verão Eterno"
 situation_steppe_warm_nights_season_desc: "Uma $situation_steppe_warm_nights_season$ é um tempo de alegria e abundância. As temperaturas são perfeitas para o gado e as condições permitem que a grama se recupere com facilidade."
 situation_steppe_sky_blessing_season: "Bênção do Céu Azul"
 situation_steppe_sky_blessing_season_desc: "Uma vez na vida, alguém pode ter a sorte de testemunhar a $situation_steppe_sky_blessing_season$. Um tempo onde a escassez é desconhecida e a terra floresce."
 situation_steppe_havsarsan_zud_season: "Zud Havsarsan"
 situation_steppe_havsarsan_zud_season_desc: "Uma $situation_steppe_havsarsan_zud_season$ é uma combinação de dois ou mais tipos de zud. A grama é coberta por gelo e neve, tempestades assolam a terra, temperaturas congelantes impedem os animais de se moverem e a grama está morta.\n\n#weak Durante um $situation_steppe_havsarsan_zud_season$ a única saída é ir embora.#!"
 the_great_steppe_situation_steppe_abundant_grazing_season_situation_phase: "$situation_steppe_abundant_grazing_season$"
