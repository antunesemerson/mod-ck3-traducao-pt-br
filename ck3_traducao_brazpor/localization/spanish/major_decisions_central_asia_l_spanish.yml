l_spanish:
 #Become Greatest of Khans
 become_greatest_of_khans_decision: "Tornar-se o Maior dos Khans"
 become_greatest_of_khans_decision_desc: "#F Estou pront[ROOT.Char.Custom('ES_OA')] para convocar todos os líderes de clã de todo o meu vasto reino para uma assembleia. Eles me proclamarão khan dos khans, [ROOT.Char.GetLadyLord|U] de tudo que existe sob o céu.\nA partir daí, conquistaremos.#!"
 become_greatest_of_khans_decision_tooltip: "Forme o Império Mongol e torne-se Gengis Khan, o governante do mundo"
 become_greatest_of_khans_decision_confirm: "Convocar o Grande Kurultai"
 become_greatest_of_khans_decision_gain_mongol_empire: "Seu senhorio se torna o [mongol_empire|lE]"
 become_greatest_of_khans_decision_enable_mongol_invasion_cb: "Você obtém acesso ao [mongol_invasion_casus_belli|lE]"
 GREATEST_OF_KHANS_TITLE_REQUIREMENT: "Debo tener rango de [Concept( 'king', '' )|E][ROOT.Char.Custom('ES_ReyReina')] o [Concept( 'emperor', 'empera' )|E][ROOT.Char.Custom('ES_DorTriz')]"
 #Establish Bactrian Supremacy
 establish_bactrian_supremacy_decision: "Estabelecer a Supremacia Bactriana"
 establish_bactrian_supremacy_decision_desc: "#F Por gerações, reis bactrianos dominaram o cruzamento das civilizações. Chegou a hora de assumir seu legado e deixar que a notícia se espalhe de caravanserai em caravanserai e de oásis em oásis: aqui, sob os quatro cantos do céu, somos nós que governamos.#!"
 establish_bactrian_supremacy_decision_tooltip: "Demonstre domínio sobre as rotas de viagem que conectam leste e oeste, norte e sul"
 establish_bactrian_supremacy_decision_confirm: "Reivindicar as terras de outrora!"
 #Establish the Yamagate of Samarkand
 establish_yamagate_in_samarkand_decision: "Estabelecer o $manichean_religious_head_title_name$ em Samarcanda"
 establish_yamagate_in_samarkand_decision_desc: "#F Assim como Mar Sisin certa vez liderou a fé na Santa Sé da Babilônia, assim também nosso atual $manichean_religious_head_title$ nos lidera aqui em Turan e na Pérsia. Ao formalizar o mandato divino da igreja em Samarcanda, a fé maniqueísta renascerá e se espalhará para um novo povo!#!"
 establish_yamagate_in_samarkand_decision_tooltip: "Reivindique uma nova terra sagrada no Oriente"
 establish_yamagate_in_samarkand_decision_confirm: "$manichean$ renasce!"
 hof_exists_tt: "Seu [head_of_faith|lE] existe"
 samarkand_held_by_you_or_vassal_tt: "$c_samarkand$ deve ser controlada por você ou por um [vassal|lE]"
