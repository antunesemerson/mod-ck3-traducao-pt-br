 faction_demand.0227.desc: "Tras obligar [faction_target.GetTitledFirstName.Custom('ES_AlAla')] [faction_target.GetTitledFirstName|l] a ceder, por fin podemos promulgar una política beneficiosa para nuestros intereses: los intereses de #EMP la totalidad#! de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]…\n\nSe han enviado muchas sugerencias y peticiones y de mí depende, como líder de la facción, decidir cuál es el mejor rumbo."
