 FACTION_DEMAND_CEREMONIAL_CLAIMANT: "Demanda do Pretendente Cerimonial"
 FACTION_DEMAND_CEREMONIAL_CLAIMANT_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nNinguém pode negar que [faction_claimant.GetName], e não [faction_targeted_title.GetHolder.GetFirstName] é [faction_claimant.Custom('ES_ElLa')] legítim[faction_claimant.Custom('ES_OA')] soberan[faction_claimant.Custom('ES_OA')] de [faction_targeted_title.GetNameNoTier].\n\nAceitem este fato pacificamente ou nós os obrigaremos à força!"
 FACTION_DEMAND_CEREMONIAL_CLAIMANT_DESC_ME: "[faction_targeted_title.GetDefinitiveName|U] pertence a mim por direito divino, e finalmente tenho os meios para assim o tornar. Aceite esse fato pacificamente ou eu o farei aceitar à força!"
 FACTION_DEMAND_CEREMONIAL_CLAIMANT_ACCEPTED: "Demandas do Pretendente Cerimonial Aceitas"
 FACTION_DEMAND_CEREMONIAL_CLAIMANT_ACCEPTED_DESC: "Está claro para mim que vocês veriam o reino arder antes de abandonar esta empreitada tola. Pelo bem do reino, devo aceitar suas demandas, mas saiba que uma grande injustiça foi cometida hoje. Isto não ficará assim!"
 FACTION_DEMAND_CEREMONIAL_CLAIMANT_REFUSED: "Demandas do Pretendente Cerimonial Recusadas"
 FACTION_DEMAND_CEREMONIAL_CLAIMANT_REFUSED_DESC: "Vosso apoio ao direito de [faction_claimant.GetShortUIName] sobre [faction_targeted_title.GetDefinitiveName|l] é uma afronta à dignidade de noss[faction_targeted_title.GetHolder.Custom('ES_OA')] [faction_targeted_title.GetHolder.GetTitleAsName|l] legítim[faction_targeted_title.GetHolder.Custom('ES_OA')]!\n\nVossa traição e desonra em breve receberão o juízo divino, vil traidor!"
 FACTION_DEMAND_CEREMONIAL_CLAIMANT_SEND_DEMAND_NOTIFICATION: "Uma Reivindicação Legítima!"
 FACTION_DEMAND_CEREMONIAL_CLAIMANT_SEND_DEMAND_NOTIFICATION_DESC: "Chegou a hora! Todos os que apoiarem a [faction_claimant.GetName] como [faction_targeted_title.GetHolder.GetTitleAsName|l] de pleno direito se levantarão como um só para garantir que [faction_claimant.GetName] ocupe seu legítimo lugar em [faction_targeted_title.GetDefinitiveName|l]. Faremos isso acontecer, à espada e ao fogo, se for preciso!"
 FACTION_CEREMONIAL_CLAIMANT_INVITE: "[faction_invite_from.Custom2('AppropriateGreeting', ROOT.Char)]"
 FACTION_CEREMONIAL_CLAIMANT_INVITE_DESC: "[faction_target.GetName] ocupa um trono que deveria ser seu por direito! Estou disposto a apoiar sua reivindicação com palavra e espada, e tenho certeza de que outros no reino também defenderão esta causa legítima. Tudo o que você precisa fazer é aceitar."
 FACTION_CEREMONIAL_CLAIMANT_INVITE_ACCEPT: "Finalmente!"
 FACTION_CEREMONIAL_CLAIMANT_INVITE_REFUSE: "Não é correto..."
 FACTION_CEREMONIAL_CLAIMANT_INVITE_ACCEPTED: "[faction_claimant.Custom2('AppropriateGreeting', ROOT.Char)]"
 FACTION_CEREMONIAL_CLAIMANT_INVITE_ACCEPTED_DESC: "Finalmente! [faction_target.GetName] não é nada além de um[faction_target.Custom('ES_XA')] buf[faction_target.Custom('ES_OnOna')] se fazendo passar por [faction_target.GetTitleAsNameNoTooltip], e tenho certeza de que o reino se erguerá em apoio à minha causa. Aqueles que me ajudarem não serão esquecidos."
 FACTION_CEREMONIAL_CLAIMANT_INVITE_ACCEPTED_OPT: "É apenas uma questão de tempo..."
 #Imperial Policy
 FACTION_DEMAND_IMPERIAL_POLICY: "Política Imperial"
 FACTION_DEMAND_IMPERIAL_POLICY_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nOs súditos leais do reino suportaram suas políticas equivocadas por tempo demais. A [faction.GetName] exige que você assinta a uma nova direção para [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], ou a imporemos à força!"
 FACTION_DEMAND_IMPERIAL_POLICY_ACCEPTED: "Demandas de Política Imperial Aceitas"
 FACTION_DEMAND_IMPERIAL_POLICY_ACCEPTED_DESC: "Está claro para mim que vocês veriam o reino arder antes de abandonar esta empreitada tola. Pelo bem de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], devo aceitar suas demandas, mas saiba que uma grande injustiça foi cometida hoje. Isto não ficará assim!"
 FACTION_DEMAND_IMPERIAL_POLICY_REFUSED: "Demandas de Política Imperial Recusadas"
 FACTION_DEMAND_IMPERIAL_POLICY_REFUSED_DESC: "Seu desprezo arrogante e petulante pelas políticas sólidas de meu governo só prova o quanto você é inadequado para tomar tais decisões!\n\nSua traição e desonra em breve encontrarão julgamento divino, traidor infame!"
 FACTION_DEMAND_IMPERIAL_POLICY_SEND_DEMAND_NOTIFICATION: "Virando o Leme"
 FACTION_DEMAND_IMPERIAL_POLICY_SEND_DEMAND_NOTIFICATION_DESC: "Chegou a hora! Todos os que apoiarem a derrubada das políticas equivocadas [faction_target.Custom('ES_DelDela')] [faction_target.GetTitledFirstName|l] se levantarão como um só para garantir que o reino seja conduzido em uma nova direção. Veremos isso feito, pela espada e pelo fogo, se preciso for!"
