l_spanish:
 FACTION_DISCONTENT_POWER_ABOVE_THRESHOLD: "[faction_military_power|E] acima do limite: #V $VALUE|0=-$#!"
 FACTION_DISCONTENT_POWER_BELOW_THRESHOLD: "[faction_military_power|E] está abaixo do limite: #V $VALUE|0=-$#!"
 FACTION_POWER_HARD_RULE: "[GetPerk( 'hard_rule_perk' ).GetName( GetPlayer )]: #V +$VALUE|0$#!"
 FACTION_POWER_INTERNAL_ISSUES: "Facções Existentes: #V $VALUE|0$#!"
 FACTION_DEMAND_ACCEPT: "Acho que não tenho escolha..."
 FACTION_DEMAND_REFUSE: "Não serei ameaçado!"
 FACTION_DEMAND_ACCEPTED_OPT: "Uma decisão sábia"
 FACTION_DEMAND_REFUSED_OPT: "Então que venha a guerra!"
 faction_demand.2004.opt_tt: "Entro na guerra contra [faction_target.GetShortUIName]"
 FACTION_DEMAND_SEND_DEMAND_NOTIFICATION_OPT: "Envie o ultimato!"
 FACTION_IMPRISONMENT_RETALIATION_WARNING: "#high Aprisionar [recipient.GetShortUIName] pode incitar a [retaliating_faction.GetName] à revolta!#!"
 faction_demand.9001.t: "[retaliating_faction.GetNameNoTooltip] Retalia"
 FACTION_FAILED_IMPRISONMENT_RETALIATION: "[actor.GetShortUIName] tentou aprisionar injustamente [recipient.GetShortUIName], que é um dos meus companheiros de facção."
 FACTION_SUCCESSFUL_IMPRISONMENT_RETALIATION: "[actor.GetShortUIName] aprisionou injustamente [recipient.GetShortUIName], que era um dos meus companheiros de facção."
 FACTION_IMPRISONMENT_RETALIATION_END: "\n\nUm ataque tão descarado contra a [retaliating_faction.GetName] só pode ser visto como um ato de guerra, e, se não nos defendermos agora, com certeza seremos eliminados um a um!"
 FACTION_IMPRISONMENT_RETALIATION_OPT: "À guerra!"
 #Independence Faction
 independence_faction: "$game_concept_independence_faction$"
 independence_faction_desc: "Os membros da [faction|lE] independentista buscam a independência de seu [liege|lE]. Se tiverem sucesso, todos os seus membros serão [rulers|lE] independentes.\n\n#S Ultimátum#!\nTodos os membros da facção passam a ser [Concept( 'independent', 'independentes' )|E]\nO [liege|lE] perde [prestige|lE]"
 independence_faction_short_effect_desc: "Quer Independência de seu [liege|lE]"
 nation_fracturing_faction: "Facção de Dissolução"
 nation_fracturing_faction_desc: "Os membros da [faction|lE] dissidente pretendem destruir o reino do seu [liege|lE].\n\n#S Ultimátum#!\nTodos os membros da facção passam a ser [Concept( 'independent', 'independientes' )|E]\nO [liege|lE] perde seu [primary_title|lE] e outros [titles|lE] do mesmo [title_tier|lE]"
 nation_fracturing_faction_short_effect_desc: "Quer destruir o Reino de seu [liege|lE]"
 liege_primary_title_dissolution: "Você agora é independente!"
 liege_primary_title_dissolution_desc: "Seu suserano perdeu seu [primary_title|lE] devido a uma [faction|lE] $nation_fracturing_faction$"
 FACTION_DEMAND_COLLAPSE: "Demanda de Dissolução de [faction_target.GetPrimaryTitle.GetNameNoTier]"
 FACTION_DEMAND_COLLAPSE_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nÉ hora de você reconhecer que não é capaz de manter a unidade de [faction_target.GetPrimaryTitle.GetNameNoTier]. É hora de pôr fim ao seu governo e ao de quaisquer outros: a região precisa de mais liberdade. Aceite nossas demandas ou enfrente nossas espadas no campo de batalha!"
 FACTION_DEMAND_COLLAPSE_ACCEPTED: "Demandas de Dissolução Aceitas"
 FACTION_DEMAND_COLLAPSE_ACCEPTED_DESC: "[faction_target.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nSuas demandas equivocadas só servirão para nos enfraquecer a todos. Ainda assim, para poupar o reino de um derramamento de sangue fútil, sou forçado a aceitar seu pedido de independência."
 FACTION_DEMAND_COLLAPSE_REFUSED: "Demandas de Dissolução Recusadas"
 FACTION_DEMAND_COLLAPSE_REFUSED_DESC: "[faction_target.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nSua vergonhosa tentativa de chantagem não teve êxito. Não importa quantas almas corrompidas você tenha seduzido para ajudar a executar seu plano, não cederei sem lutar. Prefiro morrer defendendo o que é legitimamente meu!"
 FACTION_DEMAND_COLLAPSE_SEND_DEMAND_NOTIFICATION: "Fim de [faction_target.GetPrimaryTitle.GetNameNoTier]!"
 FACTION_DEMAND_COLLAPSE_SEND_DEMAND_NOTIFICATION_DESC: "Chegou a hora! As vozes unidas de [faction.GetName] estão de acordo que [faction_target.GetName] perdeu todo o direito de governar que pudesse ter tido. Ou nos concederão a independência, ou a tomaremos à força!"
 faction_demand.1002.tt: "[faction_target.GetPrimaryTitle.GetNameNoTier] é destruído."
 FACTION_DEMAND_INDEPENDENCE: "Demanda de Independência"
 FACTION_DEMAND_INDEPENDENCE_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nÉ hora de você reconhecer a plena independência de [faction_leader.GetPrimaryTitle.GetNameNoTier] e dos outros estados na [faction.GetName]. Aceite nossas demandas ou enfrente nossas espadas no campo de batalha!"
 FACTION_DEMAND_INDEPENDENCE_ACCEPTED: "Demandas de Independência Aceitas"
 FACTION_DEMAND_INDEPENDENCE_ACCEPTED_DESC: "[faction_target.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nSuas demandas equivocadas só servirão para nos enfraquecer a todos. Ainda assim, para poupar o reino de um derramamento de sangue fútil, sou forçado a aceitar seu pedido de independência."
 FACTION_DEMAND_INDEPENDENCE_REFUSED: "Demandas de Independência Recusadas"
 FACTION_DEMAND_INDEPENDENCE_REFUSED_DESC: "[faction_target.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nSua vergonhosa tentativa de chantagem não teve êxito. Não importa quantas almas corrompidas você tenha seduzido para ajudar a executar seu plano, não cederei sem lutar. Prefiro morrer defendendo o que é legitimamente meu!"
 FACTION_DEMAND_INDEPENDENCE_SEND_DEMAND_NOTIFICATION: "Independência!"
 FACTION_DEMAND_INDEPENDENCE_SEND_DEMAND_NOTIFICATION_DESC: "Chegou a hora! As vozes unidas de [faction.GetName] concordam que [faction_target.GetName] perdeu todo o direito de governar que pudesse ter tido. Receberemos nossa independência ou a tomaremos à força!"
 faction_demand.0002.tt: "Todos os Membros da Facção Ganham Independência!"
 FACTION_DEMAND_BRIBE_CO_EMPEROR: "Certamente um cargo de presente ainda pode forçar a cooperação deles?"
 FACTION_DEMAND_BRIBE_CO_EMPEROR_REASON: "[faction_leader.GetShortUIName|U] [Select_CString( faction_leader.IsLocalPlayer, 'debes', 'debe' )] deve ser [faction_leader.Custom('ES_ElLa')] [claimant|lE] da [faction|lE] #weak ([faction.GetSpecialCharacter.GetTitledFirstName|l])#!"
 faction_demand.0000.faction_leader_accepts: "Se o líder aceitar sua oferta"
 faction_demand.0000.faction_leader_rejects: "Se o líder rejeitar sua oferta"
 faction_demand.0000.enter_co_rule_avoiding_worst_effects: "[faction_target.GetShortUIName|U] [Select_CString( faction_target.IsLocalPlayer, 'nomeia', 'nomeia' )] [faction_leader.GetShortUIName] como [Select_CString( faction_target.IsLocalPlayer, 'seu', 'seu' )] [Concept('co_emperor', Select_CString(faction_leader.IsFemale, 'coimperatriz', 'coimperador' ) )|E], evitando as piores consequ?ncias da [faction.GetName|l]"
 faction_demand.0000.truce_from_co_rule: "[faction_target.GetShortUIName|U] [Select_CString( faction_target.IsLocalPlayer, 'consigue', 'consigues' )] um [truce|lE] de [EmptyScope.ScriptValue('faction_counter_offer_appointed_co_emperor_value')] anos com todos os membros da [faction|lE]"
 ep3_truce_appointed_faction_leader_coruler: "Trégua após o Líder da Facção ser elevado a Co-Imperador"
 FACTION_DEMAND_COUNTER_OFFER_CORULE: "Contraoferta da Facção"
 FACTION_DEMAND_COUNTER_OFFER_CORULE_DESC: "[faction_target.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nVossas exigências têm valor e talvez até mostrem erros no meu próprio julgamento. Largai as armas, uni-vos a mim como co[faction_target.GetTitleAsNameNoTooltip|l] e governaremos [faction_target.GetPrimaryTitle.GetDefinitiveName] [Select_CString(And(faction_target.IsFemale, faction_leader.IsFemale), 'juntas', 'juntos')]!"
 FACTION_DEMAND_COUNTER_OFFER_CORULE_ACCEPT: "Uma oferta que não posso recusar..."
 FACTION_DEMAND_COUNTER_OFFER_CORULE_REJECT: "Bah, nada além de uma taça envenenada!"
 faction_demand.0000.offer_accepted: "Contraoferta Aceita"
 faction_demand.0000.enter_co_emperorship: "[faction_leader.GetFirstName] se torna seu [Concept('co_emperor', Select_CString(faction_leader.IsFemale, 'coemperatriz', 'coemperador' ) )|E]"
 faction_demand.0000.offer_rejected: "Contraoferta Rejeitada"
 FACTION_DEMAND_COUNTER_OFFER_CORULE_MEMBER_NOTIFICATION: "Líder da Facção Elevado"
 FACTION_DEMAND_COUNTER_OFFER_CORULE_MEMBER_NOTIFICATION_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nTenho o prazer de informar que [faction_leader.Custom('ES_AlAla')] [faction_target.GetTitledFirstName|l] foi convencido por nossas ideias. #EMP Me#! me nomeou co[faction_target.GetTitleAsNameNoTooltip|l] e eu concordei em depor as armas. Com efeito imediato."
 FACTION_DEMAND_COUNTER_OFFER_MEMBER_NOTIFICATION.A: "Estávamos tão perto..."
 FACTION_DEMAND_COUNTER_OFFER_MEMBER_NOTIFICATION.B: "Que tolo egoísta!"
 #Peasant Faction
 peasant_faction: "Facção Camponesa"
 peasant_faction_desc: "A [faction|lE] camponesa quer libertar o povo do domínio estrangeiro ou infiel, e lutará para substituir um suserano que não compartilhe a [culture|lE] e a [faith|lE] do povo dos [counties|lE]."
 peasant_faction_short_effect_desc: "Quer menor [county_control|lE]"
 peasant_faction_every_county: "Cada [county|lE] da [faction|lE]"
 peasant_faction_spawn_county_levies: "Ergue um [army|lE] [new_title.GetAdjective] proporcional às suas [levies|lE]"
 FACTION_DEMAND_PEASANT: "[ROOT.Char.Custom('ES_AlAla')|U] [ROOT.Char.Custom2('InsultAdjective', ROOT.Char)] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l],"
 FACTION_DEMAND_PEASANT_DESC: "Fomos sobrecarregados por suas leis opressivas por tempo demais. Chega! Terminamos de pagar seus impostos.\n\nQuando seus cofres secarem e seus celeiros estiverem vazios, você desejará ter nos tratado com mais justiça."
 FACTION_DEMAND_PEASANT_ACCEPT: "Acho que eu poderia conceder um alívio fiscal..."
 FACTION_DEMAND_PEASANT_REFUSE: "Nunca! O quinhão do camponês é servir seu senhor!"
 FACTION_PEASANT_NAME: "Ralé Camponesa"
 FACTION_PEASANT_TITLE_NAME: "Revolta Camponesa"
 #Nomadic Faction
 nomadic_faction: "Facção Nômade"
 nomadic_faction_desc: "A [faction|lE] quer ser governada por um [ruler|lE] [GetGovernment( 'nomad_government' ).GetName|l] cuja [yurt|lE] compartilhe sua [culture|lE] e [faith|lE]."
 nomadic_faction_short_effect_desc: "Quer estabelecer novos [realms|lE] [GetGovernment( 'nomad_government' ).GetName|l]"
 FACTION_DEMAND_NOMADIC: "[ROOT.Char.Custom('ES_AlAla')|U] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('peasant_leader'))] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l],"
 FACTION_DEMAND_NOMADIC_DESC: "Já não nos curvaremos sob o seu jugo de opressão! Nós, os orgulhosos [peasant_leader.GetCulture.GetCollectiveNoun] [GetGovernment( 'nomad_government' ).GetName|l]s, nascemos para vagar livres sob estes céus infinitos.\n\nCom [peasant_leader.GetFaith.WarGodName] guiando nossos cavaleiros, romperemos as correntes do seu governo patético e reivindicaremos nosso lugar na vastidão da estepe!"
 FACTION_DEMAND_NOMADIC_ACCEPT_GRANT_INDEPENDENCE: "Muito bem! Meu reino não tem lugar para seus rebanhos imundos."
 FACTION_DEMAND_NOMADIC_VASSAL_DESC: "Não toleraremos mais sua vil opressão sobre os orgulhosos [peasant_leader.GetFaith.GetAdherentNamePlural] de cultura [peasant_leader.GetCulture.GetName]. Nascemos para vagar livres sob estes céus abertos e rejeitamos sua tirania — nossa hora chegou!\n\nAbandonaremos seu domínio e o de seu suserano, [faction_target.Custom('ES_ElLa')] [faction_target.GetTitledFirstName|l], de uma vez por todas!!"
 FACTION_DEMAND_NOMADIC_VASSAL_JOIN_WAR: "Então eu o enfrentarei no campo de batalha, #EMP vagabundo#!!"
 #Populist Faction
 populist_faction: "Facção Populista"
 populist_faction_desc: "A [faction|lE] populista quer liberdade da dominação estrangeira ou infiel e busca independência de um senhor que não compartilha sua [culture|lE] ou [faith|lE]."
 populist_faction_short_effect_desc: "Quer Independência de seu [liege|lE]"
 populist_faction_short_effect_desc_admin: "Quer que a [state_faith|lE] corresponda à sua"
 FACTION_DEMAND_POPULIST: "[ROOT.Char.Custom('ES_AlAla')|U] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('peasant_leader'))] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l],"
 FACTION_DEMAND_POPULIST_DESC_ADMIN: "Não toleraremos mais opressão de vosso governo [ROOT.Char.Custom2('GetUnbelieverTermAdjective', peasant_leader)]. Deve-se reconhecer o [peasant_leader.GetFaith.GetName|l] como a fé preeminente do [ROOT.Char.GetPrimaryTitle.GetName]!\n\nDai à nossa fé o status legítimo que ela merece ou preparai-vos para enfrentar a ira de nossos muitos fiéis!"
 FACTION_DEMAND_POPULIST_DESC_CULTURE: "Não toleraremos mais a opressão estrangeira sobre as tradições [peasant_leader.GetCulture.GetName]. Nossa hora chegou!\n\nDê-nos o direito de governar a nós mesmos como bem entendermos, ou enfrente a ira conjunta de todos os meus compatriotas!"
 FACTION_DEMAND_POPULIST_DESC_FAITH: "Não toleraremos mais sua vil opressão aos fiéis [peasant_leader.GetFaith.GetAdherentNamePlural]. Nossa hora chegou!\n\nCom [peasant_leader.GetFaith.WarGodName] nos guiando, nos levantaremos e nos libertaremos de seu governo [ROOT.Char.Custom2('GetUnbelieverTermAdjective', peasant_leader)]!"
 FACTION_DEMAND_POPULIST_DESC: "Não toleraremos mais a sua vil opressão do bom povo [peasant_leader.GetFaith.GetAdherentName] [peasant_leader.GetCulture.GetName]. Nosso momento chegou!\n\nCom a orientação de [peasant_leader.GetFaith.WarGodName], nos ergueremos para nos libertar do seu [ROOT.Char.Custom2('GetUnbelieverTermAdjective', peasant_leader)] domínio!"
 FACTION_DEMAND_POPULIST_ACCEPT_CONVERT: "Espere... e se eu adotasse seus costumes em vez disso?"
 FACTION_DEMAND_POPULIST_ACCEPT_CONVERT_STATE_FAITH: "A [peasant_leader.GetFaith.GetNameNoTooltip|l] será concedida esta honra."
 FACTION_DEMAND_POPULIST_ACCEPT_GRANT_INDEPENDENCE: "Muito bem, não preciso de súditos tão briguentos!"
 FACTION_DEMAND_POPULIST_ACCEPT_GRANT_INDEPENCE_TT: "#N Isto deixará você sem terras!#!"
 FACTION_DEMAND_POPULIST_REFUSE: "Querem liberdade? A terão na morte!"
 FACTION_DEMAND_POPULIST_REFUSE_ADMIN: "Mudanças assim não lhes cabem, insolente [peasant_leader.Custom2('InsultNoun', ROOT.Char)]!"
 FACTION_DEMAND_POPULIST_REFUSE_TT: "#high [peasant_leader.GetTitledFirstName]#! e a #high [faction.GetName]#! declar [war|lE] contra você"
 FACTION_POPULIST_REVOLT_TITLE_NAME: "a Insurreição Populista"
 FACTION_NOMADIC_REVOLT_TITLE_NAME: "a Revolta Nômade"
 FACTION_POPULIST_CREATED_TITLE_NAME: "os [founder_culture.GetCollectiveNounNoTooltip]"
 FACTION_DEMAND_POPULIST_VASSAL_DESC_SAME_CULTURE_AND_FAITH: "Vocês podem compartilhar nossas tradições e crenças, mas não toleramos mais vocês nem a semelhante [faction_target.GetTitledFirstName|l] [faction_target.Custom2('InsultAdjective', SCOPE.sC('peasant_leader'))]!\n\nAfastem-se ou ajudem-nos a conquistar a liberdade que merecemos justamente!"
 FACTION_DEMAND_POPULIST_VASSAL_DESC_CULTURE: "Não toleraremos mais a opressão estrangeira das tradições de [peasant_leader.GetCulture.GetName]. Nosso momento chegou!\n\nNão exigiremos menos que a liberdade total de vos[faction_target.Custom('ES_OA')] [faction_target.GetLadyLord], [faction_target.GetTitledFirstName|l]."
 FACTION_DEMAND_POPULIST_VASSAL_DESC_FAITH: "Não toleraremos por mais tempo a sua vil opressão dos fiéis [peasant_leader.GetFaith.GetAdherentNamePlural]. Chegou a nossa hora!\n\nCom a orientação de [peasant_leader.GetFaith.WarGodName], nos ergueremos para nos libertar do domínio de voss[faction_target.Custom('ES_OA')] [faction_target.GetLadyLord], [faction_target.GetTitledFirstName|l]!"
 FACTION_DEMAND_POPULIST_VASSAL_DESC: "Não toleraremos mais a vossa vil opressão do bom povo [peasant_leader.GetFaith.GetAdherentName] de cultura [peasant_leader.GetCulture.GetName]. Chegou o nosso momento!\n\nNos libertaremos de vosso domínio e da tirania de voss[faction_target.Custom('ES_OA')] [faction_target.GetLadyLord], [faction_target.GetTitledFirstName|l]!"
 FACTION_DEMAND_POPULIST_VASSAL_JOIN_REBELS: "Deixe-me me juntar à sua causa!"
 FACTION_DEMAND_POPULIST_VASSAL_CONVERTS: "Espere! E se eu adotasse seus costumes e #EMP ajudasse#! vocês?"
 FACTION_DEMAND_POPULIST_VASSAL_CONVERTS_TT: "Você ajudará os rebeldes contra seu [liege|lE]"
 FACTION_DEMAND_POPULIST_VASSAL_JOIN_WAR: "Então eu o enfrentarei no campo de batalha, #EMP traidor#!!"
 FACTION_DEMAND_POPULIST_VASSAL_JOIN_WAR_BLOCK_TT: "Você não pode entrar na guerra porque já está em guerra com outro participante"
 FACTION_DEMAND_POPULIST_VASSAL_JOIN_WAR_BLOCK_TT_2: "Você não pode entrar na guerra, pois isso o colocaria em guerra com um aliado em outra guerra"
 FACTION_DEMAND_POPULIST_VASSAL_JOIN_WAR_TT: "Você ajudará seu [liege|lE] contra os rebeldes"
 FACTION_DEMAND_POPULIST_VASSAL_TAKE_NO_SIDE: "Prefiro não me envolver..."
 FACTION_DEMAND_POPULIST_VASSAL_TAKE_NO_SIDE_TT_A: "Você não entra na #high [populist_war.GetName]#!"
 FACTION_DEMAND_POPULIST_VASSAL_TAKE_NO_SIDE_TT_B: "#N Você perderá parte de seu reino se seu suserano se render às demandas deles!#!"
 POPULIST_FACTION_INDEPENDENCE_TITLE: "Ganhou Independência"
 POPULIST_FACTION_INDEPENDENCE_DESC: "Você conquistou independência de [faction_target.GetTitledFirstName|l] como resultado da [popular_faction|lE]"
 VASSAL_JOINS_LIEGE_TOOLTIP: "#high [vassal_to_join_liege.GetTitledFirstName]#! entra na guerra ao seu lado como Defensor"
 VASSAL_JOINS_REBELS_TOOLTIP: "#high [vassal_to_join_rebels.GetTitledFirstName]#! entra na guerra ao lado rebelde como Atacante"
 populist_faction_same_culture_faith_as_liege: "Não pode ser da mesma [culture|lE] e [faith|lE] que seu [liege|lE]"
 #Liberty Faction
 liberty_faction: "Facção da Liberdade"
 liberty_faction_desc: "A [faction|lE] da Liberdade busca reduzir a [crown_authority|lE], [tribal_authority|lE] ou [imperial_bureaucracy|lE], mas, por outro lado, seus membros são leais ao [realm|lE]."
 liberty_faction_desc_admin: "A [faction|lE] da Liberdade só busca reduzir a [imperial_bureaucracy|lE], mas, por outro lado, seus membros são leais ao [realm|lE]."
 liberty_faction_desc_tribal: "A [faction|lE] da liberdade busca reduzir a [tribal_authority|lE], mas, por outro lado, seus membros são leais ao [realm|lE]."
 liberty_faction_desc_feudal: "A [faction|lE] da liberdade busca reduzir a [crown_authority|lE], mas, por outro lado, seus membros são leais ao [realm|lE]."
 liberty_faction_short_effect_desc: "Quer reduzir [crown_authority|lE]"
 liberty_faction_short_effect_desc_admin: "Quer reduzir [imperial_bureaucracy|lE]"
 liberty_faction_short_effect_desc_tribal: "Quer reduzir [tribal_authority|lE]"
 FACTION_DISCONTENT_CA_1: "Autoridade da Coroa Limitada: #V $VALUE|0$%#!"
 FACTION_DISCONTENT_CA_2: "Alta Autoridade da Coroa: #V $VALUE|0$%#!"
 FACTION_DISCONTENT_CA_3: "Autoridade Absoluta da Coroa: #V $VALUE|0$%#!"
 FACTION_DEMAND_LIBERTY: "Demanda de Liberdade"
 FACTION_DEMAND_LIBERTY_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nÉ hora de você reconhecer os direitos antigos e inalienáveis de seus vassalos! Aceite as demandas da [faction.GetName] ou enfrente nossas espadas no campo de batalha!"
 FACTION_DEMAND_LIBERTY_ACCEPTED: "Demandas de Liberdade Aceitas"
 FACTION_DEMAND_LIBERTY_ACCEPTED_DESC: "[faction_target.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nSuas noções egoístas de 'liberdade' enfraquecerão o Reino como um todo. Ainda assim, para evitar derramamento de sangue desnecessário, aceitarei suas demandas."
 faction_demand.0102.tt: "A [crown_authority|lE] de seu Suserano é Reduzida!"
 FACTION_DEMAND_LIBERTY_REFUSED: "Demandas de Liberdade Recusadas"
 FACTION_DEMAND_LIBERTY_REFUSED_DESC: "[faction_target.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nVossos ridículos intentos de intimidação nunca terão sucesso. Eu sou [faction_target.Char.Custom('ES_ElLa')] [faction_target.GetTitleAsNameNoTooltip]! No campo de batalha descobrireis qual é o vosso lugar, miseráveis traidores!"
 FACTION_DEMAND_LIBERTY_SEND_DEMAND_NOTIFICATION: "Liberdade ou Morte!"
 FACTION_DEMAND_LIBERTY_SEND_DEMAND_NOTIFICATION_DESC: "Chegou a hora! Os lordes de [faction.GetName] concordam que [faction_target.GetName] é um[faction_target.Custom('ES_XA')] déspota que deve renunciar à sua autoridade tirânica sobre nós… sob a mira da espada, se for preciso."
 #Claimant faction
 claimant_faction: "Facção do Pretendente"
 claimant_faction_desc: "Membros da [faction|lE] do pretendente apoiam suas pretensões a um título pertencente a seu [liege|lE]."
 claimant_faction_short_effect_desc: "Quer [ROOT.Faction.GetSpecialTitle.GetDefinitiveName|l]"
 FACTION_DEMAND_CLAIMANT: "Demanda do Pretendente"
 FACTION_DEMAND_CLAIMANT_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nO direito de governar [faction_targeted_title.GetNameNoTier] pertence a [faction_claimant.GetName] por direito divino, e reunimos o apoio necessário para torná-lo realidade. Aceite esse fato pacificamente ou faremos você aceitá-lo à força!"
 FACTION_DEMAND_CLAIMANT_DESC_ME: "O direito de governar [faction_targeted_title.GetNameNoTier] pertence a mim por direito divino, e finalmente tenho meios de torná-lo realidade. Aceite esse fato pacificamente ou eu o forçarei a fazê-lo!"
 FACTION_DEMAND_CLAIMANT_ACCEPTED: "Demandas do Pretendente Aceitas"
 FACTION_DEMAND_CLAIMANT_ACCEPTED_DESC: "Está claro para mim que vocês veriam o reino arder antes de abandonar esta empreitada tola. Pelo bem de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], devo aceitar suas demandas, mas saiba que uma grande injustiça foi cometida hoje. Isto não ficará assim!"
 FACTION_DEMAND_CLAIMANT_REFUSED: "Demandas do Pretendente Recusadas"
 FACTION_DEMAND_CLAIMANT_REFUSED_DESC: "Os direitos de [faction_claimant.GetShortUIName] sobre meu título não são mais reais do que as histórias que contamos às crianças à noite. Não importa quantos tolos desmiolados vocês tenham reunido para ajudar a levar adiante seu plano, não cederei a uma coleção de esterco como essa. Preferiria morrer a ver meu direito de nascimento cair nas mãos de alguém tão rebaixado!"
 FACTION_DEMAND_CLAIMANT_SEND_DEMAND_NOTIFICATION: "Uma Reivindicação Legítima!"
 FACTION_DEMAND_CLAIMANT_SEND_DEMAND_NOTIFICATION_DESC: "Chegou o momento! Todos que apoiarem [faction_claimant.GetName] como governante de pleno direito de [faction_targeted_title.GetNameNoTier] se levantarão como um só para garantir que [faction_claimant.GetName] ocupe seu legítimo lugar no trono. Veremos isso feito, pela espada e pelo fogo, se for preciso!"
 FACTION_CLAIMANT_INVITE: "[faction_invite_from.Custom2('AppropriateGreeting', ROOT.Char)]"
 FACTION_CLAIMANT_INVITE_DESC: "[faction_target.GetName] ocupa um trono que deveria ser seu por direito! Estou disposto a apoiar sua reivindicação com palavra e espada, e tenho certeza de que outros no reino também defenderão esta causa legítima. Tudo o que você precisa fazer é aceitar."
 FACTION_CLAIMANT_INVITE_ACCEPT: "Finalmente!"
 FACTION_CLAIMANT_INVITE_REFUSE: "Não é correto..."
 FACTION_CLAIMANT_INVITE_ACCEPTED: "[faction_claimant.Custom2('AppropriateGreeting', ROOT.Char)]"
 FACTION_CLAIMANT_INVITE_ACCEPTED_DESC: "Finalmente! [faction_target.GetName] n?o passa de um[faction_target.Custom('ES_XA')] buf[faction_target.Custom('ES_OnOna')] se passando por [faction_target.GetTitleAsNameNoTooltip], e tenho certeza de que o senhorio inteiro se unir? ? minha causa. N?o esquecerei aqueles que me ajudarem."
 FACTION_CLAIMANT_INVITE_ACCEPTED_OPT: "É apenas uma questão de tempo..."
 FACTION_CLAIMANT_INVITE_REFUSED: "[faction_claimant.Custom2('AppropriateGreeting', ROOT.Char)]"
 FACTION_CLAIMANT_INVITE_REFUSED_ALLY_DESC: "Minha reivindicação é justa, disso eu sei. Mas minha aliança com [faction_target.GetTitledFirstName|l] me impede de ir à guerra. Estarei com você em espírito."
 FACTION_CLAIMANT_INVITE_REFUSED_HOOK_DESC: "Embora minha reivindicação seja justa… não posso me juntar a vocês. [faction_target.GetTitledFirstName|l] tem um… #emphasis 'encanto inegável'#! que me impede de levantar a mão contra [faction_target.Custom('ES_ElElla')]. Sim, é isso. Desejo-lhes boa sorte."
 FACTION_CLAIMANT_INVITE_REFUSED_PREDICAMENT_DESC: "Embora me alegre ver o reino se erguer contra tal fals[faction_target.Custom('ES_OA')] [faction_target.GetTitledFirstName|l], meus atuais apuros me impedem de me juntar a vós nessa justa empreitada. Se tiverdes sucesso, ficarei em dívida convosco."
 FACTION_CLAIMANT_INVITE_REFUSED_CHILD_DESC: "Fico feliz que vocês também pensem que [faction_target.GetTitledFirstName|l] é muito mal[faction_target.Custom('ES_OA')] e que eu governaria melhor do que [faction_target.Custom('ES_ElElla')]!\n\nAgora estou brincando com meus brinquedos novos… mas prometo que, se vocês vencerem, nós os compartilharemos!"
 FACTION_CLAIMANT_INVITE_REFUSED_INSIGNIFICANT_DESC: "¡Al fin! [faction_target.GetName] no es más que un[faction_target.Custom('ES_XA')] buf[faction_target.Custom('ES_OnOna')] haciéndose pasar por [faction_target.GetTitleAsNameNoTooltip], y sé que el señorío entero se unirá a mi causa.\n\nDebido a mi baja posición actual no puedo ayudaros. Pero sabed una cosa… #emphasis cuando#! logréis la victoria, ¡os recompensaré generosamente!"
 FACTION_CLAIMANT_INVITE_REFUSED_DESC: "Embora eu aprecie seu entusiasmo por minha reivindicação, não consigo deixar de sentir que este esforço está condenado ao fracasso. Não lhe darei meu apoio por isso, mas, se de algum modo vocês conseguirem vencer assim mesmo, aceitarei meu lugar no trono."
 FACTION_CLAIMANT_INVITE_REFUSED_OPT: "Uma pena."
 FACTION_CLAIMANT_EVERY_FACTION_MEMBER: "Cada Membro da Facção"
 FACTION_CLAMAINT_DYNAMIC_NAME: "Colocar [ROOT.Faction.GetSpecialCharacter.Custom('ES_AlAla')] [ROOT.Faction.GetSpecialCharacter.GetTitledFirstName|l] no trono [ROOT.Faction.GetSpecialTitle.GetAdjective]"
