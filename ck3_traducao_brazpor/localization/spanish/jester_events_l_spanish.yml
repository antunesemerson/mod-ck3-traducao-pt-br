l_spanish:
 court_jester_prefix: "Bobo da corte:"
 jester.100.t: "$court_jester_prefix$ Meu Rival Tolo, Coberto de Fezes"
 jester.100.desc: "Outro dia estressante… Quando me sento para ter um pouco de paz e tranquilidade, as portas da minha privada se escancaram de repente.\n\nÉ meu rival transformado em buf[jester.Custom('ES_OnOna')], [jester.GetTitledFirstName|l][jester.Custom('ES_OA')] com um [jester.Custom('GetClothingArticle')] e um [jester.Custom('GetAccessory')|l] inacreditavelmente cafona?! Agora, por fora, ele parece o excremento que eu sabia que era por dentro!\n\n"Sua taça de [ROOT.Char.Custom('GetExpensiveDrink_Singular')]… meu #EMP senhor[ROOT.Char.Custom('ES_XA')]#!", diz, com uma careta enorme no rosto.\n\nAfinal, às vezes a vida é boa."
 jester.100.a: "Um brinde a você, querido[jester.Custom('ES_OA')] [jester.GetFirstNameNoTooltip]!"
 covered_in_feces: "Coberto de Fezes"
 covered_in_feces_desc: "Este personagem foi coberto de excremento dos pés à cabeça."
 jester.200.t: "$court_jester_prefix$ Rir é o Melhor Remédio"
 jester.200.desc: "“Vocês conhecem o [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleTierName] e tal [ROOT.Char.Custom('lowly_servant_type')], [ROOT.Char.Custom('FormOfAddressForLiege')]? É isso mesmo!”, meu bobo da corte reflete alegremente [jester.Custom('ES_OnOna')], [jester.Custom('ES_ElLa')] [jester.GetTitledFirstName|l].\n\nTenho o rosto corado e lágrimas de riso escorrem pelas minhas bochechas, de onde ele tira todas essas piadas? É hilari[jester.Custom('ES_OA')]\n\nTalvez seja hora de voltar ao trabalho, antes que eu #EMP muera#! de rir!"
 jester.200.a: "Continue, conte!"
 jester.200.b: "Foi divertido, é hora de eu voltar ao trabalho!"
 death_laughter: "morreu de rir excessivamente"
 jester.300.t: "$court_jester_prefix$ Malabarismo Magistral"
 jester.300.desc: ""Venha para o grande salão, meu senhor[ROOT.Char.Custom('ES_XA')]! Você precisa ver isto!", exclama de repente um servo.\n\nAo chegar, vejo meu bobo[jester.Custom('ES_OnOna')], [jester.Custom('ES_ElLa')] [jester.GetTitledFirstName|l], no meio da sala, fazendo malabarismos com maestria com [ROOT.Char.Custom('DeviantObjectArticle')], meu [ROOT.Char.Custom('RandomPrivateObject')], uma garrafa de [ROOT.Char.Custom('GetExpensiveDrink_Singular')],"
 jester.300.desc_child: "pequen[child_to_juggle.Custom('ES_OA')] [child_to_juggle.GetFirstName],"
 jester.300.desc_2: "[ROOT.Char.Custom('GetLivestockFowlIndef')] e [ROOT.Char.Custom('GetSmallFoodIndef')].\n\nTodos os servos olham maravilhados. E eu também."
 jester.300.a: "Ora, #EMP isso sim#! não se vê todo dia!"
 jester.300.b: "Ah, bem, para a masmorra com [jester.GetSheHe]!"
 jester.400.t: "$court_jester_prefix$ Flatulista e gentil[jester.GetWomanMan]"
 jester.400.desc: "¡Mi señor[ROOT.Char.Custom('ES_XA')], qué aspecto tan sombrío tenéis! Permitidme animaros con un poema que he perfeccionado», dice mi buf[jester.Custom('ES_OnOna')], haciendo sonar sus cascabeles.\n\n«Ejem, [jester.Custom('GeneratePoem_Title')]»\n#flatulence *Prrt, prrt*#!, se tira un pedo.\n«[jester.Custom('GeneratePoem_Intro_Rhyming')]»\n#flatulence *Prrt, prrt, prrt*#!, se vuelve a peer al compás.\n«[jester.Custom('GeneratePoem_Outro_Rhyming')]»\n#flatulence *Prrrt*#!, resuena el último pedo.\n\n«¿Os ha gustado?», pregunta, riéndose."
 jester.400.a: "Poeta[jester.Custom('ES_TaTisa')] #EMP e#! flatulacionista?! Suas habilidades são maravilhosas!"
 jester.400.b: "Eu adorei! Você pode me ensinar seus truques?"
 aspiring_flatulist: "Aspirante a Flatulista"
 aspiring_flatulist_desc: "Este personagem persegue a refinada e nobre arte do flatulismo.\n#flatulence *Pum*#!"
 jester.500.t: "$court_jester_prefix$ O Ladrão de Roupas"
 jester.500.desc: "Quando estou prestes a me retirar para a noite, ocorre diante de mim uma cena de hilaridade inacreditável: meu [SCOPE.sC('you').Custom2('RelationToMeShort', SCOPE.sC('courtier'))] [courtier.GetFirstName], nu[courtier.Custom('ES_OA')] como veio ao mundo, perseguindo [jester.Custom('ES_AlAla')] bobo[jester.Custom('ES_OnOna')] da minha corte com um machado!\n\n«Venha cá! Me devolva minhas roupas, ou vou te partir ao meio!», grita [courtier.GetFirstNameNoTooltip].\n\n«Oooh, vocês nunca vão me pegar! Preciso das suas roupas para construir meu aconchegante ninho de bobo!», diz [jester.GetFirstName] com uma risadinha, carregando um monte de roupas roubadas."
 jester.500.a: "Ha ha! Era exatamente disso que eu precisava!"
 jester.500.b: "Por mais divertido que isso seja, devolva as roupas dele!"
 jester.600.t: "$court_jester_prefix$ Guerra de Comida"
 jester.600.desc: "Meu senhor[ROOT.Char.Custom('ES_XA')] , sei de algo que vai animá-lo. Observe bem enquanto eu me aproximo sorrateiramente da minha presa…» meu buf[jester.Custom('ES_OnOna')] [jester.GetFirstName].\nO que ele está tramando?\n\n\"Com fome?\", grita [jester.GetFirstNameNoTooltip] e arremessa [ROOT.Char.Custom('GetExpensiveDessertInTheFace')] na cara do meu [SCOPE.sC('you').Custom2('RelationToMeShort', SCOPE.sC('courtier'))] [courtier.GetFirstName]!\n\nQue expressão impagável! Ah, e parece que [courtier.GetFirstNameNoTooltip] levou isso #EMP más o menos#! bem. Ah, que diversão!"
 jester.600.a: "Uma pilhéria tão clássica!"
 jester.600.b: "Deixe-me ajudá-lo a se limpar, [courtier.GetFirstNameNoTooltip]!"
 jester.600.c: "Só isso..? Agora #EMP lutem!#!"
 jester.700.t: "$court_jester_prefix$ Assado de Domingo"
 jester.700.desc: "Meu buf[jester.Custom('ES_OnOna')][jester.GetFirstName], está frente a frente com meu [SCOPE.sC('you').Custom2('RelationToMeShort', SCOPE.sC('courtier'))] [courtier.GetFirstName]. Cheguei bem a tempo de ouvir uma crítica #EMP especialmente#! mordaz!\n\n«Seu [courtier.Custom2('InsultNounSexual', SCOPE.sC('jester'))] [courtier.Custom2('InsultAdjective', SCOPE.sC('jester'))] e [courtier.Custom2('InsultNoun', SCOPE.sC('jester'))] [courtier.Custom2('InsultAdjective', SCOPE.sC('jester'))], seus [courtier.Custom2('PointOfRidicule', SCOPE.sC('jester'))] e [courtier.Custom2('InsultBehavior', SCOPE.sC('jester'))] são lendários! [courtier.Custom2('InsultSentence', SCOPE.sC('jester'))|U], seu [courtier.Custom2('InsultNounSexual', SCOPE.sC('jester'))]!», diz [jester.GetFirstNameNoTooltip] como se estivesse possuído[jester.Custom('ES_OA')] por [ROOT.Char.GetFaith.DevilName].\n\n[courtier.GetFirstNameNoTooltip] o rosto está vermelho, mas sabe que estou observando, então consegue rir com dificuldade."
 jester.700.a: "Foi uma boa tirada, uma #EMP muito#! boa tirada mesmo!"
 jester.700.b: "Não fique aborrecido, [courtier.GetFirstNameNoTooltip]! Você continua muito [courtier.Custom('ComplimentAdjective')]!"
 jester.800.t: "$court_jester_prefix$ Pastelão"
 jester.800.desc: ""Ah, não! Parece que vou cair de novo!", exclama meu buf[jester.Custom('ES_OnOna')], [jester.GetFirstName] em tom cômico,"
 jester.800.desc_2: ""Sou tão, tão desajeitado! Espero sinceramente conseguir me manter de pé desta vez!", diz,"
 jester.800.desc_3: ""[jester.Custom('CulturalCurse')|U]. Que azar terrível o meu!", ri bobamente,"
 jester.800.desc_4: "Depois de tudo isso, nem um arranhão no corpo!"
 jester.800.a: "Ha! Cair sem se machucar, impressionante!"
 jester.800.b: "Bah! Não tem graça se não houver sangue. Faça de novo. #EMP Mais forte.#!"
 fall_into_sculpture: "batendo com a cara na minha [furniture_to_crash_into.GetName]!\n\n"
 somersault_into_sculpture: "praticamente dando uma cambalhota sobre minha [furniture_to_crash_into.GetName]!\n\n"
 faceplant: "caindo de cara no chão com um som bem audível!\n\n"
 walk_into_wall: "caindo direto na parede com um alto *tum*!\n\n"
 weapon_pratfall: "desabando desajeitadamente sobre minha [weapon_pratfall.GetName]!\n\n"
 weapon_plummet: "despencando perigosamente perto da minha [weapon_pratfall.GetName]!\n\n"
 forceful_tumble: "rolando pelo chão com força!\n\n"
 jester.900.t: "$court_jester_prefix$ Vários Tolos em um Casaco"
 jester.900.desc: "Hum. Não me lembrava de que meu [jester.Custom('ComplimentAdjective')] buf[jester.Custom('ES_OnOna')] fosse tão… #EMP corpulent[jester.Custom('ES_OA')].#!\n\n"Meu [ROOT.Char.GetLadyLord]! Perdoe-me, veja... Eu comi um pouco demais, e parece que meu estômago NÃO concorda comigo!", diz com uma expressão de dor.\n\n#flatulence *Prrrt*#!\n\nDe repente, sua colorida casaca se abre,"
 jester.900.cat: "revelando uma ninhada de gatinhos! Deve haver pelo menos trinta ali dentro — miando e se espalhando por todo lado!\n\n"
 jester.900.dog: "soltando pelo menos doze cachorrinhos felizes, que imediatamente passam a importunar meus cortesãos com focinhos e patas!\n\n"
 jester.900.bird: "descobrindo [ROOT.Char.Custom('GetLivestockFowlIndef')], e outro, e outro, e outro, #EMP e mais outro!#!\n\n"
 jester.900.eagle: "revelando um majestoso filhote de águia, que decola empolgado e começa a circular pelo aposento!\n\n"
 jester.900.a: "Ninguém vai perceber se eu ficar com só #EMP um#! deles..."
 jester.900.b: "Ah! Este filhote briguento vai me acompanhar em muitas caçadas!"
 jester.900.c: "Ah, que espetáculo! Maravilhoso!"
 jester.900.d: "Vou domar este filhote de águia e torná-lo meu!"
 jester.1000.t: "$court_jester_prefix$ Uma Boa História"
 jester.1000.desc: ""Você parece cansad[ROOT.Char.Custom('ES_OA')], [ROOT.Char.Custom('FormOfAddressForLiege')]", diz meu palhaç[jester.Custom('ES_OnOna')] [jester.GetFirstName].\n\n"Conheço a cura para isso, chama-se \"[SCOPE.Custom('RandomEntertainmentTextName')]\", o que me diz? Devo começar a ler?". [jester.GetFirstNameNoTooltip] me faz sinal para que eu me sente.\n\nDe fato #EMP é#! um texto divertido… Eu realmente preciso dessa pausa."
 jester.1000.a: "Até faz vozes diferentes para os personagens!"
 jester.1000.b: "[jester.GetFirstNameNoTooltip], por que você não me fala de você em vez disso?"
 jester.1000.c: "Eu preferiria que você lesse de #EMP [my_book.GetNameNoTooltip]!#!"
 jester.1000.c_flavor: "Ah, como eu amo [my_book.GetName]!"
 reinvigorating_reading_modifier: "Leitura Revigorante"
 reinvigorating_reading_modifier_desc: "Este personagem teve um de seus preciosos livros lido em voz alta para si, o que o inspirou."
 jester.1100.t: "$court_jester_prefix$ O Fantasma do [hiding_place.GetNameNoTooltip]"
 jester.1100.desc: "Por que estão saindo ruídos de dentro do meu [hiding_place.GetName]? Olho ao redor da sala; não há mais ninguém aqui. Está vazia e escura.\n\n#EMP *Crujido*#!\n\nSerá que é um espírito? Algum duende maligno?\nDe repente, ele se escancara — revelando meu bobo[jester.Custom('ES_OnOna')] [jester.GetFirstName], que salta e agita os braços!\n\n\"Cuidado com o fantasma de [hiding_place.GetNameNoTooltip]! Vim para fazer você rir!\" grita [jester.GetSheHe] com alegria."
 jester.1100.a: "Ha! Você quase me pegou dessa vez!"
 jester.1100.b: "Por [ROOT.Char.GetFaith.HighGodName]... e se você fosse um assassino!?"
 jester.1100.c: "Meu pobre coração..!"
 jester.1100.d: "Guardas, tragam um martelo e pregos..."
 jester.1100.d_flavor: "Se [jester.GetFirstNameNoTooltip] é mesmo "o fantasma de [hiding_place.GetNameNoTooltip]" então se sentirá em casa lá dentro… pelo resto da vida."
 death_heart_attack: "morreu de ataque cardíaco"
 death_nailed_in_cabinet: "foi encerrad[CHARACTER.Custom('ES_OA')] em um móvel e o[CHARACTER.Custom('ES_OA')] deixaram morrer de fome"
 death_nailed_in_cabinet_killer: "[TARGET_CHARACTER.GetUIName] [CHARACTER.Custom('ES_LoLa')] [TARGET_CHARACTER.LocalPlayerString( 'encerraste', 'encerró' )] em um móvel e [CHARACTER.Custom('ES_LoLa')] [TARGET_CHARACTER.LocalPlayerString( 'dejaste', 'dejó' )] morrer de fome"
 suspicious_of_furniture: "Desconfiado de Móveis"
 suspicious_of_furniture_desc: "Este personagem sempre chuta qualquer móvel grande que encontre. Repetidamente."
 jester.1200.t: "$court_jester_prefix$ A Fábrica de Rumores"
 jester.1200.desc: ""Oh, meu senhor[ROOT.Char.Custom('ES_XA')] meu[ROOT.Char.Custom('ES_OA')]! Vocês souberam que ontem [vassal_1.Custom('ES_ElLa')] [vassal_1.GetTitledFirstName|l] mostrou em público seu/s [vassal_1.Custom('ObjectifiedFeature')]? Inacreditável, não é?", sussurra no meu ouvido [jester.GetFirstName].\nParece que meu bobo[jester.Custom('ES_OnOna')] escuta muita coisa.\n\n"E — ho ho! É verdade! "[vassal_2.Custom('ES_ElLa')|U] [vassal_2_spouse.GetWifeHusband] [vassal_2.Custom('ES_DelDela')] [vassal_2.GetTitledFirstName|l] [vassal_2.Custom('ES_LoLa')] chamou #EMP [vassal_2.Custom2('InsultNoun', SCOPE.sC('jester'))] [vassal_2.Custom2('InsultAdjectiveArticle', SCOPE.sC('jester'))]!#!! Que drama!". E continua:\n\n"Ah, e vocês sabiam que [secret_holder.Custom('ES_ElLa')] [secret_holder.GetTitledFirstName|l] é secretamente um[secret_holder.Custom('ES_XA')] [secret_holder.Custom('GetSecretCrimeDescIndef')]?"."
 jester.1200.a: "Uma fofoca deliciosamente saborosa!"
 jester.1200.b: "Espere... o que foi aquilo sobre [secret_holder.GetTitledFirstNameNoTooltip]!?"
 jester.1300.notification: "[jester.GetFirstName] faz piadas sobre [jester.Custom('RandomObjectPlural')]"
 jester.1400.notification: "[jester_from_task.GetFirstName] diverte seu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('first_de_stress_target'))] [first_de_stress_target.GetFirstName]"
 jester.1410.notification: "[jester_from_task.GetFirstName] diverte seu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('second_de_stress_target'))] [second_de_stress_target.GetFirstName]"
 jester_entertainment_decision: "Ser Entretido pelo Bobo da Corte"
 jester_entertainment_decision_tooltip: "Faça com que o bobo da corte o entretenha, reduzindo seu [stress|lE]."
 jester_entertainment_decision_desc: "Piadas, acrobacias, poesia! Tragam o entretenimento!"
 jester_entertainment_decision_confirm: "Entretendam-me!"
 jester_decision_rewards: "Seu Bobo da Corte é trazido diante de você:\n$EFFECT_LIST_BULLET$Você perde um pouco de [stress|lE] [stress_loss_i]\n$EFFECT_LIST_BULLET$Pode aparecer um evento de perda de [stress|lE] #weak (los bufones de la corte con mayor [aptitude|lE] proporcionan eventos mejores)#!"
