 bookmark_laamps_alt_roussel_de_baeilleul: "Roussel de Bailleul"
 bookmark_laamps_wallada_bint_al_mustakfi: "Wallada bint al-Mustakfi"
 bookmark_laamps_wallada_bint_al_mustakfi_subheading: "$BOOKMARK_SUBHEADING_ADVENTURER$"
 bookmark_laamps_wallada_bint_al_mustakfi_desc: "[Concept( 'story_content_wallada', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_wallada', '$bm_story_content_available_copy|q$' )|E]
Wallada, filha do califa de Córdoba e uma das últimas omíadas, dedicou sua vida ao estudo e ao conhecimento. Dando pouca atenção ao que se esperava de uma mulher na sociedade andalusina, caminhava sem véu por um mundo austero e aguçava as mentes de mulheres de todos os estratos.

A vida de Wallada não conhece limites, e seu potencial é infinito.

#bold Adote e treine mulheres inteligentes de todo o mundo para a sua causa. Você conseguirá romper os limites da tradição e herdar o legado do Califado Omíada?#!"
 bookmark.1073.t: "O Seljúcida Legítimo"
 bookmark.1073.desc: "Faz três anos que [tughril.Custom('ES_ElLa')] [tughril.GetTitledFirstName|l] morreu sem herdeiro, mergulhando [GetTitleByKey('k_persia').GetBaseNameNoTier] no caos, com apenas seu primo, meu pai virtuoso, [qutalmish.Custom('ES_ElLa')] [qutalmish.GetTitledFirstName|l], para manter a ordem.

