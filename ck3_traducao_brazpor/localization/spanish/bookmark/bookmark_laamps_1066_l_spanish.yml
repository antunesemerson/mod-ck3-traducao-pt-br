l_spanish:
 bm_story_content_available_icon: "@story_content_icon!"
 bm_story_content_available_copy: "#font:TitleFont #size:15 Conteúdo Especial de História Disponível#!#!#!"
 bm_1066_laamps: "Os Exilados Errantes"
 bm_1066_laamps_desc: "Senhores e damas rasgam o mundo ao meio com seus jogos mesquinhos de poder. Enquanto isso, grandes aventureiros se levantam de origens humildes para gravar seus nomes no edifício do tempo. Desvinculados do dever, sem títulos ou coroas, seus lares estão na estrada, e seus destinos, ilimitados.\n\n#bold Com grande coragem, astúcia e ambição, você pode enfrentar as disputas da nobreza e explorar seus planos vaidosos para avançar sua própria glória! Você tem o que é preciso para lutar na lama e poeira, e conquistar seu lugar na história?#!"
 bookmark_laamps_hassan_sabbah: "Hasan Sabbah"
 bookmark_laamps_hassan_sabbah_subheading: "$BOOKMARK_SUBHEADING_ADVENTURER$"
 bookmark_laamps_hassan_sabbah_desc: "[Concept( 'story_content_hasan', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_hasan', '$bm_story_content_available_copy|q$' )|E]
Hasan Sabbah nasceu em uma família de pouco renome, mas sua devoção constante ao islamismo e sua resistência fanática à ocupação seljúcida o colocariam em um caminho que alteraria a história para sempre.

A partir de suas origens humildes, Hasan estava destinado a fundar os Assassinos em sua fortaleza montanhosa de Alamut. Ele se tornaria uma lenda, e todos acabariam temendo o temido Velho da Montanha.

#bold Você tem a astúcia e a fé absoluta necessárias para reunir os devotos e derrubar impérios?#!"
 bookmark_laamps_suleyman_qutalmishoglu: "Rodrigo Díaz 'o Campeador'"
 bookmark_laamps_suleyman_qutalmishoglu_subheading: "$BOOKMARK_SUBHEADING_ADVENTURER$"
 bookmark_laamps_suleyman_qutalmishoglu_desc: "Na disputa pelo trono seljúcida, Suleyman foi derrotado por seu primo, Alp Arslan, e lançado ao exílio junto com seus irmãos. Humilhado, mas não derrotado, conseguiu ganhar a lealdade das tribos turcomanas locais das montanhas do Tauro.

Suleyman acabaria por fundar o Sultanato de Rum em meio ao tumulto na Anatólia, e se veria envolvido nas guerras dos pretendentes bizantinos.

#bold Sua força será suficiente para lançar as fundações de um novo império?#!"
 bookmark_laamps_alt_alp_arslan: "Robert 'Phrangopoulos'"
 bookmark_laamps_alt_mensur_qutalmishoglu: "$BOOKMARK_SUBHEADING_ADVENTURER$"
 bookmark_laamps_el_cid: "Como segundo filho, sem direito à herança, Robert Crispin abraçou o espírito normando de aventura.

Já um veterano experiente dos conflitos na Península Ibérica, Robert entrou a serviço do imperador bizantino e agora lidera um contingente de mercenários normandos para lutar contra os turcos.

#bold Robert encontrará a glória que busca como grande comandante, ou cairá vítima do ninho de víboras que é a corte bizantina?#!"
 bookmark_laamps_el_cid_subheading: "Konstantinos X"
 bookmark_laamps_el_cid_desc: "[Concept( 'story_content_el_cid', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_el_cid', '$bm_story_content_available_copy|q$' )|E]
Rodrigo, descendente de uma linhagem nobre, entrou no conselho real ainda muito jovem. Ao serviço de Sancho II de Castela, foi instruído em assuntos da corte e em artes marciais, sob o olhar atento do rei.

No entanto, a guerra de Sancho contra seu irmão Alfonso VI de Leão levaria à morte prematura deste e, depois, Alfonso exilaria Rodrigo, iniciando inadvertidamente sua lenda.

#bold Rodrigo se tornará El Cid, "Faz três anos que [tughril.Custom('ES_ElLa')] [tughril.GetTitledFirstName|l] morreu sem herdeiro, mergulhando [GetTitleByKey('k_persia').GetBaseNameNoTier] no caos, com apenas seu primo, meu pai virtuoso, [qutalmish.Custom('ES_ElLa')] [qutalmish.GetTitledFirstName|l], para manter a ordem.

O sobrinho ganancioso de Tughril, [alp_arslan.GetFirstName], desceu às pressas de Khorasan para usurpar a coroa enquanto os lealistas se reuniam em torno de meu pai e de mim, mas nosso destino foi selado na Batalha de [GetTitleByKey('b_damghan').GetNameNoTier]: meu pai morto; eu, capturado…

Perdoados, mas exilados por meu parente sem honra, meus irmãos e eu lideramos os leais restantes, sobrevivendo com escassos meios nas montanhas. Eu #EMP sei#! que coisas maiores nos aguardam — mesmo agora, os exércitos oguzes avançam pelas terras ricas de [GetTitleByKey('e_byzantium').GetNameNoTier], prontas para serem saqueadas!"
 bookmark_laamps_hereweard_the_wake: "É meu destino fundar um #EMP novo#! reino seljúcida!"
 bookmark_laamps_hereweard_the_wake_subheading: "O trono seljúcida pertence a #EMP mim#!."
 bookmark_laamps_hereweard_the_wake_desc: "[Concept( 'story_content_hereward', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_hereward', '$bm_story_content_available_copy|q$' )|E]
Exilado e tachado como fora da lei por Eduardo, o Confessor, Hereweard viajou para a Flandres em busca de fama e fortuna.

Um dia, ele retornaria à Inglaterra e lideraria uma resistência determinada contra os invasores normandos, tornando-se um herói popular de grande renome.

#bold Hereweard continuará sendo um vilão notório sob sua orientação, ou se tornará o herói que nasceu para ser?#!"
 bookmark_laamps_alt_boudewijn_v: "Boudewijn V"
 bookmark_laamps_robert_crispin: "Robert 'Phrangopoulos'"
 bookmark_laamps_robert_crispin_subheading: "$BOOKMARK_SUBHEADING_ADVENTURER$"
