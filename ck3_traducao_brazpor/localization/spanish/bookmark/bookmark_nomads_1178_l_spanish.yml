l_spanish:
 bm_1178_nomads: "O Céu Sem Fim"
 bm_1178_nomads_desc: "As movimentações migratórias de um povo nômade são um espetáculo impressionante — um mar vivo e pulsante de pessoas e gado, aventurando-se por distâncias imensas em busca de pastagens.\n\nOs cascos aparentemente intermináveis de seus rebanhos e manadas ressoam como um tambor de guerra, um lembrete aos vizinhos sedentários de que as hordas podem atacar a qualquer momento! Pois o que são essas tribos errantes, se não exércitos sempre em marcha?\n\n#bold O mundo semeado está maduro para qualquer chefe corajoso o suficiente para reivindicar sua fartura. Você liderará sua tribo para além da extensão sem fim e forjará um império a cavalo?#!"
 bookmark_nomads_togrul: "Grande Chefe Togrul"
 bookmark_nomads_togrul_subheading: "$BOOKMARK_SUBHEADING_HIGH_CHIEFTAIN$"
 bookmark_nomads_togrul_oghuul: "Oghuul"
 bookmark_nomads_togrul_desc: "Pode ser que o assassinato de seus meio-irmãos tenha dado a Togrul a liderança dos queraitas, mas foi apenas com seu amigo e aliado Yesügei que ele conseguiu mantê-la. Duas vezes Togrul foi forçado ao exílio, e duas vezes Yesügei o devolveu ao poder.\n\nMas não haverá uma terceira vez, pois Yesügei jaz morto, assassinado por uma tribo rival, e os inimigos de Togrul estão mais do que cientes da morte de seu protetor.\n\n#bold Seus rivais rondam como lobos; onde encontrará força para repelí-los todos?#!"
 bookmark_nomads_temujin: "Grande Chefe Temüjin"
 bookmark_nomads_temujin_subheading: "$BOOKMARK_SUBHEADING_HIGH_CHIEFTAIN$"
 bookmark_nomads_temujin_borte: "Borte"
 bookmark_nomads_temujin_hoelun: "Hoelun"
 bookmark_nomads_temujin_desc: "[Concept( 'story_content_temujin', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_temujin', '$bm_story_content_available_copy|q$' )|E]\nTemüjin nasceu com um coágulo de sangue na mão direita, um presságio de um destino extraordinário. Embora ainda seja jovem, já enfrentou duras provações: o assassinato de seu pai, uma fome avassaladora e seu encarceramento por uma tribo rival. No entanto, sua determinação permanece intacta, e agora ele reúne cavaleiros audazes sob seu estandarte.\n\n#bold Faça a própria terra tremer sob os cascos trovejantes de suas hordas intermináveis e submeta o mundo à sua vontade!#!"
 bookmark_nomads_jamukha: "Chefe Jamukha"
 bookmark_nomads_jamukha_subheading: "$BOOKMARK_SUBHEADING_CHIEFTAIN$"
 bookmark_nomads_jamukha_desc: "[Concept( 'story_content_jamukha', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_jamukha', '$bm_story_content_available_copy|q$' )|E]\nJamukha, um guerreiro formidável por mérito próprio, superou a infância com a ajuda de Temüjin e, por sua vez, formou com ele um laço mais forte do que os de sangue. Seu orgulho nato complementa a crescente sede de poder de Temüjin..., mas os dois raramente concordam em questões de liderança.\n\n#bold Espada do Altai, você subjugará seu #EMP anda#! ou perecerá à sombra dele?#!"
 bookmark_nomads_koncek: "Cã Könçek"
 bookmark_nomads_koncek_subheading: "$BOOKMARK_SUBHEADING_KHAN$"
 bookmark_nomads_koncek_kotyan: "Kotyan"
 bookmark_nomads_koncek_svoboda: "Svoboda"
 bookmark_nomads_koncek_desc: "Do Mar Negro aos desertos de Altai — todos conhecem seu nome. Unificar os cumanos sob uma única bandeira, governar estas terras voláteis e praticar a tolerância necessária para permanecer no poder não é tarefa fácil.\n\nOs príncipes da Rússia buscam manchar sua imagem mais uma vez e, em sua velhice, Könçek terá de investir nas batalhas que virão, pois nenhum cã pode reinar para sempre.\n\n#bold Sua família depende de você. Seu senhorio permanecerá unido ou seu povo voltará a cair em lutas internas e desordem?#!"
 bookmark_nomads_inanch_bilge: "Cã Inanch Bilge"
 bookmark_nomads_inanch_bilge_subheading: "$BOOKMARK_SUBHEADING_KHAN_WITH_THE$"
 bookmark_nomads_inanch_bilge_gurbesu: "Gürbesu"
 bookmark_nomads_inanch_bilge_tayang: "Tayang, o Fraco"
 bookmark_nomads_inanch_bilge_desc: "Inanch Bilge, que afirma descender dos Reis Magos da Bíblia, provou sua linhagem ao conquistar na luta a independência dos Kara-Khitai.\n\nMas um destino sombrio o aguarda: o filho e herdeiro do khan, Tayang, enfrentará em batalha o poderoso Temüjin e será derrotado. Sua esposa, Gürbesu, então terminará seus dias como concubina do vencedor...\n\n#bold Você conseguirá desafiar esse destino e garantir uma sucessão forte? Ou a fraqueza de seu filho condenará sua linhagem à vergonha eterna?#!"
 bookmark_nomads_duolubu: "Chefe Duolubu"
 bookmark_nomads_duolubu_subheading: "$BOOKMARK_SUBHEADING_CHIEFTAIN$"
 bookmark_nomads_duolubu_wolila: "Wolila"
 bookmark_nomads_duolubu_desc: "Duolubu, antes um bagahatur devoto dos Kara-Khitai, sofreu a traição pelas mãos de seu próprio sangue. Sua esposa jaz morta, amparada nos braços de seu próprio irmão, e seu sobrinho agora está no trono.\n\nAgora que seu pai descansa em seu leito de morte, chegou a hora de agir. Se o jovem Zhílugu não puder ser persuadido, talvez seja hora de abandoná-lo de vez.\n\n#bold Seus dias mais sombrios ficaram para trás e o sol nasce novamente. Você conseguirá recuperar sua honra ou será para sempre conhecido como o Tolo?#!"
 bookmark_nomads_wolila: "Chefe Wolila"
 bookmark_nomads_wolila_subheading: "$BOOKMARK_SUBHEADING_CHIEFTAIN$"
 bookmark_nomads_wolila_zhilugu: "Cã Zhilugu"
 bookmark_nomads_wolila_desc: "Wolila tinha dois filhos fortes. O primeiro, o leal Duolubu, o pacificador do leste, casou-se com a imperatriz de Kara-Khitai. O segundo, o desonesto Puguzi, tornou-se seu amante. Esposa e irmão: juntos, tramaram a morte de Duolubu. Enfurecido pelo fratricídio, Wolila levou os amantes à justiça, condenando-os à morte. Assim, Zhilugu dos Yelü ascendeu ao trono dos Kara-Khitai.\n\n#bold A última tempestade se aproxima dos khitanos. Você conseguirá falar por seu povo, defender sua honra mais uma vez e mudar o destino deles?#!"
