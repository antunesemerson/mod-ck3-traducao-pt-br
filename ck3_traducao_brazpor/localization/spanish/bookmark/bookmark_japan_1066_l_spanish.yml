l_spanish:
 bm_1066_japan: "Uma lua que nunca mingua"
 bm_1066_japan_desc: "Já se passou quase meio século desde que Fujiwara Michinaga, kampaku do Japão, compôs seu famoso poema: #EMP "Penso neste mundo como meu mundo, e na lua cheia como uma lua que jamais mingua."#!

Amplamente interpretadas como uma declaração da posição inabalável da família Fujiwara como regentes imperiais, suas palavras até agora parecem se confirmar. O filho de Michinaga está prestes a passar seu cargo todo-poderoso à próxima geração.

#bold Os Fujiwara manterão seu domínio sobre a corte imperial, contra os protestos das outras casas aristocráticas e da família imperial?#!"#!

Amplamente interpretadas como uma declaração da posição inabalável da família Fujiwara como regentes imperiais, suas palavras até agora parecem se confirmar. O filho de Michinaga está prestes a passar seu cargo todo-poderoso à próxima geração.

#bold Os Fujiwara manterão seu domínio sobre a corte imperial, contra os protestos das outras casas aristocráticas e da família imperial?#!"
 bookmark_japan_yorimichi: "O nono de uma longa linhagem de regentes [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )], Yorimichi governou o Japão por quase meio século. Cedendo à velhice, agora está prestes a passar o bastão para seu filho, Morozane — mas a incerteza é grande.

O imperador Chikahito se irrita com esta [Glossary( 'regência', 'KAMPAKU_GLOSS' )] e está ansioso para recentralizar o poder em torno de seu [Glossary( 'Trono do Crisântemo', 'CHRYSANTHEMUM_THRONE_GLOSS' )]. Longe da capital, as províncias distantes romperam com a burocracia central e são governadas por aristocratas arrivistas como seus próprios feudos.

#BOLD Você conseguirá reafirmar o domínio Fujiwara e resistir ao colapso do sistema [Glossary( 'Ritsuryō', 'RITSURYO_GLOSS')]?#!"
 bookmark_japan_yorimichi_subheading: "#bold Ritsuryō#! foi o sistema administrativo e legal centralizado instituído no Japão pela primeira vez no final do século VII com a intenção de estender a autoridade da corte imperial. Em profundo declínio no século XI, suas funções foram lentamente usurpadas por indivíduos particulares e famílias poderosas."
 bookmark_japan_yorimichi_morozane: "$king_tenno_male_japanese$ $Chikahito$"
 bookmark_japan_yorimichi_sadatsuna: "$game_concept_ceremonial_liege$ do Japão"
 bookmark_japan_yorimichi_desc: "O nono de uma longa linhagem de regentes [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )], Yorimichi governou o Japão por quase meio século. Cedendo à velhice, agora está prestes a passar o bastão para seu filho, Morozane — mas a incerteza é grande.

O imperador Chikahito se irrita com esta [Glossary( 'regência', 'KAMPAKU_GLOSS' )] e está ansioso para recentralizar o poder em torno de seu [Glossary( 'Trono do Crisântemo', 'CHRYSANTHEMUM_THRONE_GLOSS' )]. Longe da capital, as províncias distantes romperam com a burocracia central e são governadas por aristocratas arrivistas como seus próprios feudos.

#BOLD Você conseguirá reafirmar o domínio Fujiwara e resistir ao colapso do sistema [Glossary( 'Ritsuryō', 'RITSURYO_GLOSS')]?#!"
 RITSURYO_GLOSS: "$dynn_Minamoto$ $Morofusa$"
 bookmark_japan_go_reizei: "$game_concept_governor$ de $c_iyo$"
 bookmark_japan_go_reizei_subheading: "$Toshifusa$"
 bookmark_japan_go_reizei_tameyuki: "$Akifusa$"
 bookmark_japan_go_reizei_go_sanjo: "$Morofusa$, neto do imperador $Murakami$, é um raro exemplo de um burocrata [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] talentoso, tendo ascendido rapidamente na hierarquia sob a proteção de seu pai adotivo, o [Glossary( 'kampaku', 'KAMPAKU_GLOSS' )] $dynn_Fujiwara$ $Yorimichi$.

Embora as relações entre os [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )] e os Murakami Minamoto continuem cordiais, as outras casas nobres e a família imperial esperam que $Morofusa$ sirva como contrapeso à influência Fujiwara.

#BOLD Você conseguirá arrancar a regência dos Fujiwara e levar o poder aos descendentes imperiais diretos?#!"
 bookmark_japan_go_reizei_desc: "$Chikahito$ cresceu como um peão no cabo de guerra travado por seu pai, o imperador retirado [Glossary( 'Go-Suzaku', 'JOKO_GLOSS' )], e o regente [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )], $Yorimichi$. Agora, como [Glossary( 'Imperador', 'TENNO_GLOSS' )], $Chikahito$ fez o possível para afirmar a autoridade imperial, mas em grande parte ainda desempenha um papel cerimonial.

Obrigado pela família de sua consorte a recusar o reconhecimento de seu único filho, agora é $Takahito$, o irmão de $Chikahito$, quem está destinado a herdar o Trono do Crisântemo.

#BOLD Você conseguirá reduzir a dominação Fujiwara, restaurar os [Glossary( 'Yamato', 'YAMATO_GLOSS' )] e governar como imperador, não apenas de nome, mas exercendo um poder verdadeiro e duradouro?#!"
 #He seeks to
 # restore [Glossary( 'Yamato', 'YAMATO_GLOSS' )] authority as true Emperor's of Japan?
 bookmark_japan_morofusa: "$Yoshi_ie$"
 bookmark_japan_morofusa_subheading: "$Yorisue$"
 bookmark_japan_morofusa_toshifusa: "$Yoriyoshi$ lidera os mais poderosos dos [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )], descendentes do imperador $Seiwa$. Sua influência cresceu desde que seu filho $Yoshi_ie$ e ele serviram como generais para os [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )] na Guerra Zenkunen, lutando ao lado da família Kiyohara.

Sua vitória tornou os Minamoto figuras proeminentes entre as famílias samurais da região de Bandō, incluindo os poderosos [Glossary( 'Taira', 'TAIRA_GLOSS' )].

#BOLD Você reivindicará sua posição como líder das casas samurais e construirá uma coalizão capaz de desafiar os aparentemente inabaláveis Fujiwara?#!"
