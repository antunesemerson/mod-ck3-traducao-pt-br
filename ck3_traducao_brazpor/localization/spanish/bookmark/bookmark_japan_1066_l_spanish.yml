 bookmark_japan_takenori: "$dynn_Kiyohara$ $Takenori$"
 bookmark_japan_takenori_subheading: "Senhor de Mutsu"
 bookmark_japan_takenori_takehira: "$Takehira$"
 bookmark_japan_takenori_mitsuyori: "$Mitsuyori$"
 bookmark_japan_takenori_desc: "Na recente Guerra Zenkunen, $Takenori$ ajudou os [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] a tomar o controle do norte do clã Abe, que o mantinha há muito tempo. Em agradecimento por esse serviço, a corte imperial liderada pelos [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )] recompensou os Kiyohara com o governo bushi das terras do norte.

Este status invejável, com pouca supervisão imperial, é tolerado contanto que a riqueza de Mutsu continue fluindo para o sul, rumo à capital.

#BOLD Você conservará sua posição, conquistada com tanto esforço, e fundará um domínio Kiyohara duradouro, ou a discórdia entre seus herdeiros destruirá tudo o que construiu? #!"
