l_spanish:
 bm_1178_genpei: "A ascensão dos bushi"
 bm_1178_genpei_desc: "Pouco a pouco, os samurais têm arrancado poder da capital, governando as províncias do Japão como seus próprios feudos e enriquecendo a si mesmos e a seus seguidores.\n\nNas últimas décadas, os orgulhosos Minamoto foram derrotados repetidas vezes pelos implacáveis Taira. Eles lambem as feridas enquanto Kiyomori domina a capital. Lá, o medo e a força governam, enquanto o kampaku e a família imperial assistem, impotentes.\n\n#bold Poderão os Minamoto pôr fim à ascensão dos Taira, ou algum outro destino aguarda estas ilhas?#!"
 bookmark_genpei_yoritomo: "$dynn_Minamoto$ $Yoritomo$"
 bookmark_genpei_yoritomo_subheading: "Senhor de $c_izu$"
 bookmark_genpei_yoritomo_noriyori: "$Noriyori$"
 bookmark_genpei_yoritomo_yoshitsune: "$Yoshitsune$"
 bookmark_genpei_yoritomo_desc: "A outrora poderosa família [Glossary( 'Seiwa Minamoto', 'MINAMOTO_GLOSS' )] suportou inúmeros reveses e sucumbiu às disputas internas, enquanto seus antigos rivais, os [Glossary( 'Kanmu Taira', 'TAIRA_GLOSS' )], recolhiam os restos.\n\nDiante da pouca resistência de Minamoto Yorimasa, Yoritomo e os demais filhos sobreviventes do famoso general Yoshitomo são talvez tudo o que se interpõe entre Taira Kiyomori e o domínio total sobre o Japão.\n\n#BOLD Logo os Taira serão poderosos demais para enfrentar. Você sucumbirá a mil cortes, ou unirá o país e trará uma paz duradoura?#!"
 bookmark_genpei_kiyomori: "$emperor_daijo_daijin_male_japanese_feudal$ $dynn_Taira$ $Kiyomori$"
 bookmark_genpei_kiyomori_subheading: "$BOOKMARK_SUBHEADING_RULING_REGENT$"
 bookmark_genpei_kiyomori_shigemori: "$Shigemori$"
 bookmark_genpei_kiyomori_tsunemori: "$Tsunemori$"
 bookmark_genpei_kiyomori_desc: "A família [Glossary( 'Kanmu Taira', 'TAIRA_GLOSS' )] se estabeleceu, de forma lenta mas constante, como a família de samurais mais poderosa do Japão, após conseguir afastar tanto seus ferozes rivais bushi, os [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )], quanto os burocráticos [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )].\n\nCom sua filha casada com o imperador [Glossary( 'Yamato', 'YAMATO_GLOSS' )] Norihito, Kiyomori aguarda um neto. Um príncipe Taira na linha do trono consolidaria a supremacia da família sobre a corte. Não será fácil firmar essa pedra angular do poder enquanto abundarem os inimigos invejosos.\n\n#BOLD Você conseguirá estabelecer um controle Taira duradouro sobre o Japão, ou cairá no último obstáculo?#!"
 bookmark_genpei_motofusa: "$dynn_Fujiwara$ $Motofusa$"
 bookmark_genpei_motofusa_subheading: "$game_concept_governor$ de $c_oki$"
 bookmark_genpei_motofusa_kanezane: "$Kanezane$"
 bookmark_genpei_motofusa_takatada: "$Takatada$"
 bookmark_genpei_motofusa_desc: "A família [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )], cujos membros em teoria servem apenas como [Glossary( 'regentes', 'KAMPAKU_GLOSS' )], governa o Japão das sombras há séculos, controlando a burocracia da capital e se casando com a dinastia [Glossary( 'Yamato', 'YAMATO_GLOSS' )] por meio de matrimônios.\n\nNo entanto, longe da capital, os samurais vêm construindo feudos privados. Sua riqueza e suas armas agora superam em muito as da aristocracia burocrática. Os bushi mais poderosos, os [Glossary( 'Taira', 'TAIRA_GLOSS' )] liderados por Kiyomori, tomaram o controle da capital.\n\n#BOLD Você conseguirá deter a ascensão dos samurais e reacender a glória de uma corte liderada pelos Fujiwara?#!"
 bookmark_genpei_hidehira: "$dynn_Fujiwara$ $Hidehira$"
 bookmark_genpei_hidehira_subheading: "Senhor de Mutsu"
 bookmark_genpei_hidehira_yasuhira: "$Yasuhira$"
 bookmark_genpei_hidehira_hidehisa: "$Hidehisa$"
 bookmark_genpei_hidehira_desc: "Enquanto a maioria dos [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )] escrevia poesia na capital, os descendentes do general Hidesato se estabeleceram no severo norte, pacificando tribos e rivalizando com outros bushi.\n\nO avô de Hidehira foi adotado pela família Kiyohara, governantes de Ōshū. Ao destruir todos os rivais pela herança daquele clã, ele recuperou seu nome Fujiwara e estendeu o controle sobre o norte.\n\n#BOLD A autocomplacência dos Fujiwara cortesãos deu origem à ameaça dos [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] e [Glossary( 'Taira', 'TAIRA_GLOSS' )]. Poderia a espada que conquistou o norte restaurar a primazia dos Fujiwara?#!"
 bookmark_genpei_yoshinaka: "$dynn_Minamoto$ $Yoshinaka$"
 bookmark_genpei_yoshinaka_subheading: "Senhor de $c_shinano$"
 bookmark_genpei_yoshinaka_tomoe: "$Tomoe$ $Gozen$"
 bookmark_genpei_yoshinaka_yoshitaka: "$Yoshitaka_2$"
 bookmark_genpei_yoshinaka_desc: "Divididos pela liderança e pela herança dos Kawachi [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )], Yoshitomo, o filho mais velho, mandou matar seu irmão Yoshikata na luta que se seguiu.\n\nA família Nakahara deu abrigo, nas montanhas de Shinano, ao filho fugitivo de Yoshikata, e, embora Yoshitomo possa estar morto há muito tempo, Yoshinaka, agora adulto, não esqueceu seu direito de nascença.\n\n#BOLD Você vingará seu pai contra seu primo Yoritomo, herdeiro de Yoshitomo, ou ajudará a família contra um inimigo maior?#!"
