#bold Você conseguirá manter seus vizinhos subjugados e seu status elevado enquanto cavalga à frente da horda cumana?#!"
 bookmark_nomads_keraits: "$BOOKMARK_SUBHEADING_HIGH_CHIEFTAIN$"
 bookmark_nomads_keraits_subheading: "Mencionados outrora com temor por todos os que viviam nas estepes do norte, os Quirguizes hoje vivem dias de decadência - seu império está em ruínas, e apenas um frágil sopro do Caganato Quirguiz persiste no norte.

#bold As últimas centelhas da glória quirguiz se apagarão, ou sua chama voltará a brilhar mais forte que o Sol?#!"
 bookmark_nomads_keraits_margus: "Muhmud dos Karluks"
 bookmark_nomads_keraits_hongji: "$BOOKMARK_SUBHEADING_KHAN$"
 bookmark_nomads_keraits_desc: "Exilados da China por decreto do Imperador Wuzong dois séculos atrás, missionários nestorianos encontraram um público receptivo entre os Keraits. Impulsionado por ambição e fé, o senhor Kerait Inanch agora tenta reunir os povos da estepe sob sua bandeira ? uma bandeira coroada por uma cruz.

#bold Una os nômades do leste e espalhe a fé nestoriana pelas estepes!#!"
 bookmark_nomads_late_kirghiz: "Os nômades Pechenegues estão cercados por povos sedentários: ao sul, a política conturbada dos bizantinos oferece oportunidades tanto para saqueadores quanto para mercenários. A oeste, os magiares já se estabeleceram na Panônia ? mas outros também se assentaram ali antes, apenas para serem consumidos pelos próximos invasores. Ao norte, os príncipes da Rus' vivem em constantes rivalidades.

#bold Conduza os Pechenegues para uma nova era, crescendo e se transformando para cumprir qualquer destino que os aguarde!#!"
 bookmark_nomads_late_kirghiz_subheading: "$BOOKMARK_SUBHEADING_HIGH_CHIEFTAIN$"
 bookmark_nomads_late_kirghiz_desc: "Mencionados outrora com temor por todos os que viviam nas estepes do norte, os Quirguizes hoje vivem dias de decadência - seu império está em ruínas, e apenas um frágil sopro do Caganato Quirguiz persiste no norte.

