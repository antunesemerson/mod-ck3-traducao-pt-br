 bookmark_nomads_eastern_karakhanids: "Muhmud dos Karluks"
 bookmark_nomads_eastern_karakhanids_subheading: "$BOOKMARK_SUBHEADING_KHAN$"
 bookmark_nomads_eastern_karakhanids_desc: "As hordas dos caracânidas - os #italic cãs negros#! - de Transoxiana controlaram antigamente a Rota da Seda, mas esses dias de glória ficaram para trás há muito tempo. Agora, divididas entre as casas de Ali e Hasan, as duas metades do império disputam a supremacia.

No leste, os alidas abandonaram sua herança nômade, mas os hasânidas do oeste permanecem fiéis às suas raízes nômades.

#bold Os caracânidas estão divididos - o futuro do canato repousa em uma sela ou em uma corte palaciana?#!"
