l_spanish:
 bm_1066_nomads: "Às Portas"
 bm_1066_nomads_desc: "Desde tempos imemoriais, povos migraram pelas estepes e seguiram os caminhos dos nômades por incontáveis gerações. Agora, o mundo além avança sobre suas terras natais. Impérios sedentários expandem suas fronteiras cada vez mais a cada ano.

#bold Será possível reverter a maré dos assentamentos? Os modos nômades devem ser abandonados? Em cidades e fazendas, os povos da estepe podem encontrar novas vidas... mas, se uma nova era de grandes conquistadores surgir, os velhos caminhos poderão ser salvos!#!"
 bookmark_nomads_cumans: "Recém-chegado à sela, Saru comanda as vastas hordas da Cumania. Em suas fronteiras repousam ricos principados, prontos para serem tomados, mas será que Saru tem habilidade para manter a horda unida para novas conquistas?

A Cumania pode ser vasta, mas seu povo pode ser tanto um trunfo quanto um fardo ? por trás de cada boca para alimentar há um ego igualmente faminto.

#bold Você conseguirá manter seus vizinhos subjugados e seu status elevado enquanto cavalga à frente da horda cumana?#!"
 bookmark_nomads_cumans_subheading: "Grande Chefe Inanch"
 bookmark_nomads_cumans_desc: "Recém-chegado à sela, Saru comanda as vastas hordas da Cumania. Em suas fronteiras repousam ricos principados, prontos para serem tomados, mas será que Saru tem habilidade para manter a horda unida para novas conquistas?

