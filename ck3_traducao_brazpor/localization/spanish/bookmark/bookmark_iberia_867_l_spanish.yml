l_spanish:
 #Bookmark
 bm_867_iberia: "A Contenda pela Ibéria"
 bm_867_iberia_desc: "Os antigos poderes da Ibéria estão ruindo.\n\nAo norte, na Astúrias, abundam vassalos ambiciosos que lutam para se libertar.\n\nAo sul, al-Andalus se fortalece, mas enfrenta rumores de descontentamento. Os distritos militares fronteiriços murmuram sobre independência, e as intrigas atormentam os governantes omíadas.\n\nPotências estrangeiras famintas cobiçam as ricas terras ibéricas.\n\n#bold Com séculos de desenvolvimento, a disputa entra em uma nova fase, e se terminar em sangue ou fraternidade dependerá de uma jogada de dados."
 war_867_Vimara_conquest_Portucale: "Guerra pela [claim|lE] de Vimara em $d_porto$"
 war_Andalusian_Rebellion: "Rebelião dos Distritos da Fronteira"
 #Wilfred the Hairy
 bookmark_fp2_iberia_wilfred_the_hairy: "$GuifrE_$ o Peludo"
 bookmark_fp2_iberia_wilfred_the_hairy_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_fp2_iberia_sunyer: "$Sunyer$"
 bookmark_fp2_iberia_bernat_of_gothia: "$Bernat$"
 bookmark_fp2_iberia_wilfred_the_hairy_desc: "Quando o duque de Toulouse massacrou seu pai e seu tio, o rei dos francos tomou suas terras, deixando $GuifrE_$ e seus primos na miséria.\n\nPassaram-se vinte anos, e a roda da fortuna girou. O primo ardiloso de $GuifrE_$ recuperou também o que lhe pertencia por direito de nascimento, e seu novo suserano é primo do homem que matou seus pais.\n\n#bold Você, melhor do que ninguém, sabe que a sorte pode mudar em um piscar de olhos e anseia por um prêmio mais seguro: $d_barcelona$.#!"
 #Lupp ibn Musa / Lope Musez
 bookmark_fp2_iberia_lupp_ibn_musa: "$Lubb$ Muzez"
 bookmark_fp2_iberia_lupp_ibn_musa_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_fp2_iberia_lupp_ibn_musa_desc: "A poderosa dinastia dos Banu Qasi, os Filhos de Cassius, outrora dominava todo o Vale do Ebro. Tempos difíceis se abateram sobre eles desde o reinado do glorioso pai de $Lubb$, e os recém-renomeados Banu Musa apenas murmuram e lambem suas feridas de sua antiga sede em Tudela, planejando recuperar seus domínios do sul.\n\n#bold Você será capaz de retomar o que pertencia aos Banu Qasi e trazer a dinastia de volta à sua antiga glória?#!"
 bookmark_fp2_iberia_lubb_ibn_musa_alt_mohamed: "Mohamed"
 bookmark_fp2_iberia_lubb_ibn_musa_alt_oria: "Oria"
 #Mendo Guterres of Santiago
 bookmark_fp2_iberia_mendo_guterres: "Conde $Hermenexildo$ Gutierrez"
 bookmark_fp2_iberia_mendo_guterres_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_fp2_iberia_mendo_guterres_desc: "Um poderoso vassalo do rei Adelfonso III, $Hermenexildo$ controla as terras do sul da Galícia com uma administração impecável. Uma lealdade inquestionável para com seu monarca o ajudou a expandir o domínio ancestral de sua família - mas será suficiente?\n\n#bold Com o crescente interesse no Sul, você será capaz de conquistar as terras de Portucale e iniciar uma de suas dinastias mais influentes?#!"
 bookmark_fp2_iberia_mendo_guterres_alt_arias: "$Arias$"
 bookmark_fp2_iberia_mendo_guterres_alt_ermesinda: "Hermesinda Gatónez"
 bookmark_fp2_iberia_ibn_marwan: "Ibn Marwan"
 bookmark_fp2_iberia_ibn_marwan_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_fp2_iberia_ibn_marwan_desc: "Um aventureiro por natureza, Abd al-Rahman ibn Marwan tem uma relação tumultuada com seu senhor, o sultão omíada, mas desfruta de forte apoio dos moçárabes em seu domínio, e pode, na verdade, ter mais em comum com eles e sua fé. Ele construiu uma fortaleza em Badajoz, mas, no oeste, o clã zeloso Banu Danis se opõe cada vez mais ao seu domínio sobre a Baixa Marca.\n\n#bold Uma aliança com Alfonso III, o rei sempre oportunista de Astúrias, pode ajudá-lo a ganhar uma coroa própria?#!"
 bookmark_fp2_iberia_ibn_marwan_alt_surunbaqi: "Emir Sa'dun de Porto"
 bookmark_fp2_iberia_ibn_marwan_alt_rahman: "Abd al-Rahman"
 bookmark_fp2_iberia_adanis_ibn_awsaga: "Emir Adanis"
 bookmark_fp2_iberia_adanis_ibn_awsaga_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_fp2_iberia_adanis_ibn_awsaga_desc: "A dinastia berbere Banu Danis, encarregada pelo sultão omíada de proteger a costa ocidental das incursões vikings, cresceu rapidamente em influência e poder. O emir Adanis ergueu fortalezas poderosas em Alcácer e Coimbra, mas está preocupado com os moçárabes sob seu domínio, que prefeririam se aliar ao seu nêmesis, Ibn Marwan.\n\n#bold Você conseguirá proteger suas terras e conduzir os berberes a um grande futuro em al-Andalus?#!"
 bookmark_fp2_iberia_ibn_awsaga_alt_masud: "Mas'ud ibn Adanis"
 bookmark_fp2_iberia_ibn_awsaga_alt_yahya: "Yahya ibn Adanis"
