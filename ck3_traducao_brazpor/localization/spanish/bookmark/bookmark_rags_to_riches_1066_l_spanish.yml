l_spanish:
 bm_1066_rags_to_riches: "Dos Trapos a Seda"
 bm_1066_rags_to_riches_desc: "#V #font:TitleFont #size:20 @legends_of_ck_icon! Legends of Crusader Kings III#!#!#!\n\nPor toda Europa, las familias luchan y conspiran por el poder. Se disputan muchas tierras, se ganan y pierden batallas, y las dinastías vienen y van a medida que sus dirigentes se ven superados.\n\n#bold Los reyes de antaño se van viendo reemplazados, mientras que los recién llegados alcanzan las estrellas. ¿Quién de todos ellos serás tú?#!"
 #Murchad Briain, Duke of Munster, Ireland
 bookmark_rags_to_riches_petty_king_murchad: "Rei Menor Murchad"
 bookmark_rags_to_riches_petty_king_murchad_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_rags_to_riches_petty_king_murchad_desc: "[diplomacy_lifestyle_i] #V #font:TitleFont #size:15 Legend of Crusader Kings III#!#!#!\nA principios del siglo XI, la casa de Briain ha perdido y recuperado el gran reino de Irlanda varias veces mientras las casas nobles irlandesas han luchado por el territorio, tanto entre sí como contra los colonos vikingos. Aunque Murchad provenga de un linaje de hombres destinados a gobernar, no sabemos mucho de su breve reinado en la pequeña área de Munster.\n\n#bold ¿Puede que, con tu ayuda, algún miembro de la casa de Briain se vuelva a sentar en el trono de Irlanda?#!"
 bookmark_rags_to_riches_petty_king_murchad_alt_brian: "$Brian$"
 bookmark_rags_to_riches_petty_king_murchad_alt_bebinn: "$BE_binn$"
 #Matilda di Canossa, Duchess of Tuscany, Italy
 bookmark_rags_to_riches_duchess_matilda: "Duquesa Matilda"
 bookmark_rags_to_riches_duchess_matilda_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_rags_to_riches_duchess_matilda_desc: "[learning_lifestyle_i] #V #font:TitleFont #size:15 Legend of Crusader Kings III#!#!#!\nEn el complejo tapiz del norte de Italia del siglo XI, Matilda de Canossa se encuentra reinando sobre un señorío considerable tras muchas desdichadas muertes en la familia. Las leyendas de su piedad y los rumores de brujería añaden mística a su gobierno.\n\n#bold ¿Puedes asegurar su dominio y garantizar que el linaje de Canossa dure generaciones en el cambiante paisaje de la Italia medieval?#!"
 #Yahya Dhunnunid, Emir (Duke) of Toldeo, Iberia
 bookmark_rags_to_riches_emir_yahya: "Emir Yahya"
 bookmark_rags_to_riches_emir_yahya_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_rags_to_riches_emir_yahya_desc: "[intrigue_lifestyle_i] #V #font:TitleFont #size:15 Legend of Crusader Kings III#!#!#!\nEl reino de Toledo se fundó a finales del siglo XI, cuando el rey de León se hizo cargo de esta ciudad. Con la desaparición del emir Al-Mamún y su círculo de influencia, la familia Banu Di-l-Nun perdió el control de la región, donde había reinado durante generaciones.\n\n#bold Manipula a tus rivales y busca más aliados, ¿tendrás lo que hace falta para desafiar a los reyes de la península ibérica y cambiar la historia de la casa Banu Di-l-Nun?#!"
 bookmark_rags_to_riches_emir_yahya_alt_zahida: "$Zahida$"
 bookmark_rags_to_riches_emir_yahya_alt_yahya2: "$Yahya$"
 #Vratislav Premyslid, Duke of Bohemia, Czechia
 bookmark_rags_to_riches_duke_vratislav: "Duque Vratislav"
 bookmark_rags_to_riches_duke_vratislav_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_rags_to_riches_duke_vratislav_desc: "[stewardship_lifestyle_i] #V #font:TitleFont #size:15 Lendas do Crusader Kings III#!#!#!\nA família Přemyslid governa a região da Boêmia há centenas de anos. Eles têm dependido muito da Senioridade para sua sucessão, o que, no caso do Duque Vratislav, eventualmente levará a sérios conflitos com seus irmãos.\n\n #bold Para se tornar Rei da Boêmia, Vratislav precisará ser estratégico com seus recursos, tanto materiais quanto não materiais — você está preparado para a tarefa?#!"
 bookmark_rags_to_riches_duke_vratislav_alt_judita: "$Judita$"
 bookmark_rags_to_riches_duke_vratislav_alt_ota: "$Ota$ o Belo"
 #Robert 'The Fox' de Hauteville, Duke of Apulia, Sicily
 bookmark_rags_to_riches_duke_robert: "Duque Robert"
 bookmark_rags_to_riches_duke_robert_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_rags_to_riches_duke_robert_desc: "[martial_lifestyle_i] #V #font:TitleFont #size:15 Legend of Crusader Kings III#!#!#!\nRoberto comenzó su carrera como bandido y jefe de una banda de salteadores. Al ser uno de muchos hermanos, nadie preveía que este hijo aventurero se convirtiera en un brillante estratega y estadista, y gobernase vastas extensiones de tierra. Sin embargo, aquí tenemos a este poderoso duque del sur de Italia, listo para entrar en la historia. Los Hauteville lograrán establecer así una base en Sicilia que durará más de cien años.\n\n#bold ¡Si puedes consolidar el poder en el país, el reino de Sicilia espera a su gobernante!#!"
 bookmark_rags_to_riches_duke_robert_alt_bohemond: "$Bohemond$"
 bookmark_rags_to_riches_duke_robert_alt_roger: "$Roger$"
 bookmark.1066.t: "O Dilema Conjugal de Matilda"
 bookmark.1066.desc: "Há onze anos, minha mãe, [mum.GetFirstName], organizou meu noivado com [hunchback.GetFirstNameNicknamed], meu meio-irmão e filho do novo marido da minha mãe, [hunchbacks_father.Custom('ES_ElLa')] [hunchbacks_father.GetTitledFirstNameNicknamed|l].\n\nEmbora a aliança com [hunchbacks_father.GetPrimaryTitle.GetBaseNameNoTier] seja vantajosa, será este realmente o futuro que Deus concebeu para a prestigiosa Casa de [ROOT.Char.GetHouse.GetBaseName]?\n\n#EMP Debo#! agir para proteger o futuro da minha linhagem!"
 bookmark.1066.a: "Jesus morreu pelos nossos pecados; um a mais não fará mal."
 bookmark.1066.b: "Evitarei ele até o dia em que morrer."
 bookmark.1066.c: "Embora o divórcio seja impossível, ainda tenho influência com o Papa..."
 bookmark.1066.d: "Aceito minha sorte na vida..."
 lineality_warning: "@warning_icon! #X Ao escolher um [marriage|lE] [patrilineal|lE], voc? corre o risco de fim de jogo, j? que seus filhos n?o pertencer?o ? sua [dynasty|lE]!#!"
 bookmark.1066.a_flavor: "[hunchback.GetFirstName] não é um exemplo de saúde, ele só precisa de um pequeno empurrão em direção à sepultura..."
 bookmark.1066.b_flavor: "Se eu evitar encontrá-lo para sempre, sua casa não poderá reivindicar minhas terras."
 bookmark.1066.c_flavor: "Se eu puxar alguns fios, posso fazer com que meu casamento seja [matrilineal|lE] o que garantirá que nossos filhos sejam da minha [house|lE] e [dynasty|lE]."
 abandoned_marriage_modifier: "Casamento Abandonado"
 abandoned_marriage_modifier_desc: "Este personagem abandonou o cônjuge, com quem ainda é tecnicamente casado…\nAceitação de [marriage|lE] : #N -150#!"
 ABANDONED_SPOUSE_MODIFIER: "Você tem um [GetModifier('abandoned_marriage_modifier').GetNameWithTooltip|l]; $VALUE|=+0$"
 bookmark.1067.t: "Sussurros de Bruxaria"
 bookmark.1067.desc: "O fogo crepita e cintila enquanto [witch.GetFirstName] tira um tomo da bolsa. O aroma de ervas secas e adocicadas impregna o ar noturno.\n\n"Meus segredos não costumam ser dados de graça". Ela fixa os olhos nos meus. "Como governante jovem, e mulher, as probabilidades estão contra você; este, meu conhecimento mais precioso, ajudará você a prosperar em um mundo que, de outra forma, veria sua ruína".\n\nA mulher misteriosa parece decidida a compartilhar sua sabedoria… mas é exatamente disso que os sacerdotes me alertaram."
 bookmark.1067.a: "Ensine-me tudo, que os [ROOT.Char.GetFaith.PriestMalePlural] se danem!"
 bookmark.1067.a_flavor: "@warning_icon! #X Esta op??o dar? a voc? um [secret|lE] [criminal|lE]!#!"
 bookmark.1067.b: "Não, isso é pensamento herético."
 bookmark.1067.b_flavor: "Minha fé em [ROOT.Char.GetFaith.HighGodName] é tudo que eu preciso."
 bookmark.1068.t: "As Marcas Eslavas"
 bookmark.1068.desc: "[GetTitleByKey('d_meissen').GetNameNoTier] y [GetTitleByKey('d_lausitz').GetNameNoTier], ¡oh, cuánto codicio estas tierras fértiles y prósperas!\n\nMi señor[emperor.Custom('ES_XA')], [emperor.Custom('ES_ElLa')] [emperor.GetTitledFirstNameNicknamed|l], me las ha prometido a cambio de mi lealtad. Pero sé que son promesas huecas, pues no me las puede conceder.\n\nPuedo aceptar las palabras [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsNameNoTooltip|l] por lo que son —un elogio por mi carácter y nada más— o encargarme del asunto en persona."
 bookmark.1068.a: "Essas terras serão minhas, pela força!"
 bookmark.1068.a_flavor: "Para adicionar os [titles|lE] ao seu [realm|lE], você provavelmente terá que ir para a [war|lE] usando a [claim|lE] de [casus_belli|lE]."
 bookmark.1068.b: "Serei favorecido pela boa vontade de [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsNameNoTooltip|l]."
 bookmark.1068.b_flavor: "[emperor.Custom('ES_ElLa')|U] [emperor.GetTitleAsNameNoTooltip|l], sua [Concept( 'liege', Select_CString(emperor.IsFemale, 'señora', 'señor' ) )|E], o que lhe deverá um [hook|lE], que você poderá usar de muitas maneiras, como exigir um [marriage|lE] vantajoso."
 bookmark.1069.t: "Meu Irmão [jaromir.GetFirstNameNoTooltip]"
 bookmark.1069.desc: "Meu "querido" irmão [jaromir.GetFirstName], sempre tão exasperante, se opõe o tempo todo à minha autoridade.\n\nNão é nada como meu bom amigo [john_monk.GetFirstName] de Břevnov: um monge piedoso e #EMP nada alborotador#!, que serve a [ROOT.Char.GetFaith.HighGodName] em meu nome. Ah, se ao menos fosse [john_monk.GetFirstNameNoTooltip] quem me servisse como [jaromir.GetCouncilTitle|l]…\n\nSerá que seria possível?"
 bookmark.1069.a: "Expulsarei [jaromir.GetFirstNameNoTooltip], meu nov[jaromir.Custom('ES_OA')] [jaromir.GetTitleAsNameNoTooltip|l] será [john_monk.GetFirstNameNoTooltip]!"
 bookmark.1069.a_flavor: "Ter um [councillor|lE] com boas [skills|lE] que seja [friend|lE] nosso é muito benéfico, já que as [councillor_tasks|lE] serão concluídas mais cedo… mas irritar nosso [head_of_faith|lE] é sempre um risco, pois pode nos negar [claims|E] ou [gold|lE]."
 bookmark.1069.b: "[jaromir.GetFirstNameNoTooltip] é família afinal de contas... e ouro é mais espesso que sangue."
 bookmark.1069.b_flavor: "Livrar-se da [Concept( 'rival', 'rivalidad' )|E] entre você e seu irmão reduzirá bastante o risco de ser [GetScheme('murder').GetTypeName|l]."
 bookmark.1069.c: "Devo cuidar de assuntos não espirituais..."
 bookmark.1069.c_flavor: "Às vezes, não fazer nada é a melhor opção."
 bookmark.1070.t: "Uma Sicília Normanda"
 bookmark.1070.desc: "A vida de duque é preferível à de um bandido… mas viver como rei me cairia muito melhor.\n\nPela graça de Deus e de São Pedro, governo sobre [GetTitleByKey('d_apulia').GetNameNoTier] e [GetTitleByKey('d_calabria').GetNameNoTier]; mas com a ajuda de uns #EMP viejos amigos#! dos meus dias de bandoleiro, eu poderia governar sobre toda a [GetTitleByKey('k_sicily').GetName], não importa o que o papa ou o imperador pensem.\n\nÉ hora de pôr mãos à obra."
 bookmark.1070.a: "Tudo isso, e mais, será meu!"
 bookmark.1070.b: "Talvez eu devesse ficar fora do Império."
 bookmark.1070.c: "Tanto o Papa quanto o Imperador podem ficar com suas terras..."
 norman_highwaymen: "Salteadores Normandos"
 claim_sicily: "Você ganhou [pressed_claims|lE] sobre todos os [rulers|lE] menores dentro de [GetTitleByKey('k_sicily').GetName]"
 bookmark.1071.t: "O Monge Pretendente"
 bookmark.1071.desc: "«… ¡y por ese motivo debéis respaldar mis derechos sobre el [GetTitleByKey('e_byzantium').GetNameNoTier]!», dice el monje, postrándose ante mí. «Conseguiréis un aliado de confianza, ¡y todo el apoyo que podáis precisar!»\n\nEs obvio que este monje es un fraude. No es ningún #EMP «emperador del Imperio romano depuesto injustamente»#!, pero sí que #EMP es#! útil.\n\nPuede que sea un palurdo de baja cuna con una reivindicación inventada, pero una excusa para ir a la guerra es una buena excusa…"
 bookmark.1071.a: "Eu o colocarei no trono em Constantinopla!"
 bookmark.1071.b: "Honestamente, eu só quero reivindicar alguns portos para mim mesmo..."
 bookmark.1071.c: "Não estou em posição de ajudá-lo."
 start_raiktor_war: "Você inicia uma [war|lE] contra [byz_emperor.GetShortUIName] para [Concept( 'claim', 'reclamar' )|E] o [GetTitleByKey('e_byzantium').GetNameNoTier] para [raiktor.GetShortUIName], e ficar com [GetTitleByKey('k_epirus').GetName] para você"
 start_raiktor_conquest_war: "Você inicia uma [war|lE] contra [byz_emperor.GetShortUIName] para conquistar os [counties|lE] de [GetTitleByKey('c_dyrrachion').GetNameNoTier], [GetTitleByKey('c_avlonas').GetNameNoTier], e [GetTitleByKey('c_buthrotum').GetNameNoTier] para [raiktor.GetShortUIName], que se tornará seu [Concept( 'vassal', Select_CString(vassal_to_be.IsFemale, 'vasalla', 'vasallo' ) )|E]"
 gain_war_troops: "Você ganha um [army|lE] de #V 3000#! homens que se retirarão após a [war|lE]"
 raiktor_claim_cb: "Reivindicação de Raiktor"
 raiktor_claim_cb_war: "Reivindicação de Raiktor"
 raiktor_claim_cb_name: "Reivindicação de Raiktor"
 raiktor_conquest_cb: "Reivindicação de Raiktor"
 raiktor_conquest_cb_war: "Reivindicação de Raiktor"
 raiktor_conquest_cb_name: "Reivindicação de Raiktor"
 you_gain_epirus: "[GetTitleByKey('k_epirus').GetName] e todos os [titles|lE] que estão contidos são tomados por [Select_CString(attacker.IsLocalPlayer,'você', attacker.GetShortUIName)]"
 raiktor_gains_byzantium: "[claimant.GetShortUIName|U] toma [GetTitleByKey('e_byzantium').GetName]"
 hard_raiktor_war: "Esta é uma [war|lE] difícil em que você terá que [occupy|lE] grande parte do [de_jure|lE] Bizâncio e derrotar seus [armies|lE] para vencer."
 easy_raiktor_war: "Esta é uma [war|lE] mais fácil em que [occupations|lE] e [battles|lE] fornecerão muito mais [war_score|lE] do que o habitual."
 raiktor_vassal_desc: "[vassal_to_be.GetShortUIName] ganha os [counties|lE] de [GetTitleByKey('c_dyrrachion').GetNameNoTier], [GetTitleByKey('c_avlonas').GetNameNoTier] e [GetTitleByKey('c_buthrotum').GetNameNoTier] e se torna seu [vassal|lE]"
 raiktor_vassal_backup_desc: "Você toma os [counties|lE] de [GetTitleByKey('c_dyrrachion').GetNameNoTier], [GetTitleByKey('c_avlonas').GetNameNoTier] e [GetTitleByKey('c_buthrotum').GetNameNoTier]"
 guiscard_modifier: "Guiscard"
 guiscard_modifier_desc: "Este personagem é especialmente astuto e implacável."
 bookmark.1072.t: "Conquistando Córdoba"
 bookmark.1072.desc: "Ah, a beleza de [GetTitleByKey('c_cordoba').GetNameNoTier]! A antiga sede da autoridade califal de [GetTitleByKey('e_spain').GetNameNoTier] durante o reinado dos omíadas. Um prêmio digno de ser conquistado por qualquer governante.\n\nAgora preciso tomar uma decisão: apoio-me na força militar ou uso minha astúcia para semear o descontentamento entre suas fileiras?\n\nA abordagem que eu escolher será a que usarei a partir de agora."
 bookmark.1072.a: "As guerras são vencidas com palavras e punhais bem colocados..."
 bookmark.1072.b: "Devo confiar no poder militar."
 bookmark.1072.c: "[GetTitleByKey('c_cordoba').GetNameNoTierNoTooltip] pode esperar."
 start_cordoba_war: "Você inicia uma [war|lE] contra [cordoba_holder.GetShortUIName] para conquistar o [county|lE] de [GetTitleByKey('c_cordoba').GetNameNoTier] #weak (y [GetTitleByKey('c_cabra').GetNameNoTier] si esta persona lo posee)#!"
 intrigue_challenge: "Cada vez que declarar [war|lE], seu oponente terá que vencer em um duelo de [intrigue|lE] [intrigue_i] contra você, ou obterá o [modifier|lE] [GetModifier('hampered_by_false_information_modifier').GetNameWithTooltip]"
 hampered_by_false_information_modifier: "Prejudicado por Informações Falsas"
 hampered_by_false_information_modifier_desc: "Os exércitos deste personagem estão sendo enganados por um fluxo de informações incorretas alimentadas por agentes inimigos."
 armies_hampered: "Exércitos Prejudicados"
 armies_unhampered: "Exércitos Sem Prejuízo"
 intrigue_duel_on_attack_effect.success: "[attacker.GetShortUIName|U] [Select_CString( attacker.IsLocalPlayer, 'atrapalhou', 'atrapalhou' )] os [armies|lE] de [Select_CString( defender.IsLocalPlayer, 'seu senhorio', defender.GetShortUIName )]"
 intrigue_duel_on_attack_effect.failure: "[attacker.GetShortUIName|U] não [Select_CString( attacker.IsLocalPlayer, 'conseguiu', 'conseguiu' )] atrapalhar os [armies|lE] de [Select_CString( defender.IsLocalPlayer, 'seu senhorio', defender.GetShortUIName )]"
