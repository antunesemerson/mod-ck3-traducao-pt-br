l_spanish:
 bm_867_persia: "O Intermezzo Iraniano"
 bm_867_persia_desc: "Passaram-se duzentos anos desde que o Califado Rashidun conquistou a Pérsia, absorvendo seu vasto planalto no poderoso Império Árabe.\n\nDuzentos anos de servidão — mas tudo muda com o tempo.\n\nAgora, os senhores da Arábia enfraquecem, enquanto a antiga nobreza da Pérsia se torna mais forte e mais próspera do que foi em séculos, florescendo em meio à desintegração da outrora poderosa umma islâmica unida.\n\nA oeste, o Califado Abássida controla apenas o coração do antigo império Rashidun; seus grandes governadores, da Ibéria à Índia, são independentes na prática, e a sucessão está mergulhada em um caos anárquico de traições, assassinatos e rebeliões.\n\nA leste, aventureiros islâmicos e mercenários ávidos, separados pelo Hindu Kush, cobiçam os saques do Rajastão e de Délhi.\n\nA Pérsia se encontra em uma encruzilhada. Os leais ao califa entram em conflito com os seguidores restantes do zoroastrismo e do budismo; ambiciosos senhores da guerra enfrentam chefes montanheses, e mercenários túrquicos lutam contra invasores árabes.\n\n#Bold O mundo gira: para onde levará #Italic você?#!"
 bookmark_persia_amir_yaqub: "Amir Ya'qub"
 bookmark_persia_amir_yaqub_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_persia_amir_yaqub_desc: "Filho de um humilde caldeireiro, Ya'qub é um homem feito por si mesmo, cuja desfiguração por um golpe de espada nem o retardou nem o impediu.\n\nApós conquistar um grande reino no Sistão, agora está em guerra com os tahiríes, os antigos lacaios do califa. Na frente interna, os mesmos comandantes que apoiaram a usurpação de Ya'qub cochicham sobre mudar novamente de lealdade.\n\n#bold Você parece pronto para forjar um novo destino para a Pérsia. Ousará desafiar o poder duradouro dos abássidas?#!"
 bookmark_persia_yaqub_alt_amr: "Amr ibn al-Layth"
 bookmark_persia_yaqub_alt_sebuk_eri: "Sebük-eri"
 bookmark_persia_ismail_samani: "Ismail Samani"
 bookmark_persia_ismail_samani_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_persia_ismail_samani_desc: "A família de Ismail domina os governos da Transoxiana há décadas. A desintegração do califado despedaçou essa autoridade central, deixando os samânidas a disputarem o poder entre si.\n\nA oportunidade do jovem Ismail de disputar o poder surge quando ele é recebido como governante de Bukhara, recentemente saqueada pelos exércitos dos ferozes xás da Corásmia ocidental. Apesar de seus talentos prodigiosos, o restante de sua família espera uma submissão total e leal.\n\n#bold Você consegue superar seus irmãos e restaurar a glória da Pérsia?#!"
 bookmark_persia_ismail_alt_nasr: "Amir Nasr"
 bookmark_persia_muhammad_ibn_abdallah: "Muhammad ibn Abdallah"
 bookmark_persia_muhammad_ibn_abdallah_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_persia_muhammad_ibn_abdallah_desc: "Administrador consumado e profissional, Muhammad serviu fielmente aos abássidas ao longo de sua longa carreira como governador do Iraque, das Cidades Sagradas e até mesmo de Bagdá.\n\nAinda assim, a recente turbulência pôs à prova até mesmo sua perspicácia política, pois escapou por pouco da morte após ficar do lado do califa errado. Mesmo agora, sua saúde começa a declinar.\n\n#bold Você passará seus últimos anos apoiando seu atribulado sobrinho, o emir de Khorasan, ou se concentrará em redimir sua família aos olhos do califa?#!"
 bookmark_persia_muhammad_ibn_abdallah_alt_caliph: "Califa al-Mu'tazz"
 bookmark_persia_muhammad_ibn_abdallah_alt_muhammad_ibn_tahir: "Muhammad ibn Tahir"
 bookmark_persia_rostam: "Rostam I"
 bookmark_persia_rostam_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_persia_rostam_desc: "A família de Rostam possui uma linhagem quase sem igual no mundo conhecido: sua herança paterna vem de alguns dos últimos sassânidas, enquanto sua esposa remonta sua ascendência aos arsácidas da Armênia, de quase mil anos.\n\nVelhas dinastias e antigas fés resistem bem no montanhoso Tabaristão, onde os senhores montanheses dailamitas se agarram a rancores de gerações passadas e muitos, entre eles Rostam, ainda lidam com o domínio \"novo\" do islamismo sobre as tradições de outrora.\n\n#bold Você reivindicará as veneráveis glórias de seu direito de nascimento ou abraçará o mundo moderno?#!"
 bookmark_persia_rostam_alt_hasan: "Hasan, o Missionário"
 bookmark_persia_rostam_alt_shervin: "Sharvin"
 bookmark_persia_suri_of_mandesh: "Sūrī de Mandesh"
 bookmark_persia_suri_of_mandesh_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_persia_suri_of_mandesh_desc: "Como o último senhor budista a oeste do Indo, Sūrī se encontra em uma encruzilhada: suas terras, ricas em prata e ferro, poderiam facilmente se tornar o núcleo de um poderoso império, mas os famintos senhores da guerra de Khorasan, ao norte, e Makran, ao sul, sabem disso tão bem quanto ele.\n\nDescendente dos antigos reis de Guzgan, Sūrī sente o peso do legado e a pressão da política atual com mais intensidade do que a maioria.\n\n#bold Você conseguirá unir as briguentas tribos afegãs e defender sua antiga herança espiritual, ou finalmente abraçará a vontade de Alá?#!"
 bookmark_persia_suri_of_mandesh_alt_farhana: "Farhana de Bamian"
 bookmark_persia_suri_of_mandesh_alt_abdullah: "Abdullah bin Umar"
 war_Azariqa_Rebellion: "Rebelião Azariqa"
