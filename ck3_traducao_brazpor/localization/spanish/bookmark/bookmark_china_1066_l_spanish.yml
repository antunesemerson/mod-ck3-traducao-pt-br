l_spanish:
 bm_1066_china: "Canção do esplendor"
 bm_1066_china_desc: "Das ruínas dos Tang nasceu a glória dos Song. Uma grandeza assim não era vista há quase dois séculos: os tributos fluem para a capital imperial de longe como um rio caudaloso, as rebeliões são pouco frequentes e rapidamente reprimidas, e o governo está firmemente nas mãos de pessoas capazes e meritórias.

No entanto, com grande prosperidade vem grande tentação. Os nômades cobiçam a fartura das Planícies Centrais desde tempos imemoriais, enquanto até mesmo dentro do império os inescrupulosos muitas vezes se encobrem com uma nobreza fingida para desviar sua riqueza para os próprios bolsos.

#bold O Filho do Céu tem o mundo na palma da mão, mas e aqueles que podem compelir até o Filho do Céu a agir conforme sua vontade?#!"
 bookmark_china_1066_qin_guan: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_china_1066_qin_guan_subheading: "Como descendente distante do fundador de Dali, poucos teriam imaginado, quando Duan Sīlián nasceu, que um dia ele se sentaria no trono, mas o destino é caprichoso e imprevisível.

A ordem natural das coisas foi subvertida pela poderosa família Gao, cuja influência só ficava atrás da do clã imperial, ao deporem o decadente imperador então reinante e colocarem Sīlián em seu lugar.

#bold Sīlián Wáng escapará das garras da família Gao para reinar por direito próprio, ou cairá presa de suas ambições?#!"
 bookmark_china_1066_qin_guan_desc: "Com sua família mergulhada na pobreza após a morte de seu pai, as dificuldades não fizeram nada para abafar as aspirações do jovem Qín Guān; se é que algo, elas brilham ainda mais intensamente em suas circunstâncias reduzidas.

Com cada livro que consegue pegar emprestado, ele se aprofunda na poesia e na estratégia militar, sonhando com o dia em que igualará os feitos imortalizados nessas páginas.

#bold Uma coisa é sonhar em alcançar a grandeza; outra, completamente diferente, é torná-la realidade. Para que destino sua mão o guiará?#!"
 bookmark_china_1066_duan_silian: "$king_female$ $dynn_Liang_6881$ $Luoyao_843D_7464$"
 bookmark_china_1066_duan_silian_subheading: "Imperatriz consorte de $k_xia$"
 bookmark_china_1066_duan_silian_desc: "Como descendente distante do fundador de Dali, poucos teriam imaginado, quando Duan Sīlián nasceu, que um dia ele se sentaria no trono, mas o destino é caprichoso e imprevisível.

A ordem natural das coisas foi subvertida pela poderosa família Gao, cuja influência só ficava atrás da do clã imperial, ao deporem o decadente imperador então reinante e colocarem Sīlián em seu lugar.

#bold Sīlián Wáng escapará das garras da família Gao para reinar por direito próprio, ou cairá presa de suas ambições?#!"
 bookmark_china_1066_ly_thanh_tong: "Uma única flecha basta para desfazer anos de planejamento. Meu [emperor.GetWifeHusband] [emperor.GetFirstName] jaz ferido, enfraquecendo a cada dia que passa, derrubado por um arqueiro Song por ter se aproximado demais, e de forma tola, da luta.

Depois de tudo o que suportei, #EMP não#! deixarei que tudo me escape pelas mãos. Mulheres já governaram antes; se não foi por meio de seus maridos, então por meio de seus filhos, e a [Glossary('Imperatriz Wu', 'EMPRESS_WU_GLOSS')] até fundou sua própria #EMP dinastia#!.

Com a influência que acumulei e o apoio inabalável do meu [brother.Custom('SisterBrother')], [brother.Custom('ES_ElLa')] [brother.GetTitledFirstName|l], serei #EMP eu#! quem decidirá o futuro de [xia.GetNameNoTierNoTooltip]."
 bookmark_china_1066_ly_thanh_tong_subheading: "Seu governo será lembrado... como o prelúdio do #EMP meu#! reinado."
 bookmark_china_1066_ly_thanh_tong_desc: "Como governante de Viet, Ly Nhat Ton irradia a autoconfiança inabalável que só possuem aqueles destinados a governar desde o nascimento. Provado em batalha, benevolente no governo e diligente na justiça, para seu povo sua palavra é absoluta.

Até mesmo a única sombra que pairava sobre seu glorioso reinado, a ausência de um herdeiro, foi recentemente dissipada com o nascimento de seu primeiro filho, Can Duc.

#bold Nhat Ton Vuong conseguirá elevar Viet a um império capaz de rivalizar com seu vizinho do norte, ou suas conquistas duradouras se revelarão efêmeras?#!"
 bookmark_china_1066_new_noble_family: "Wǔ Zétiān (624-705) afastou-se da tradição e depôs seus próprios filhos após a morte de seu marido e se proclamou #EMP ela mesma#! fundadora da nova dinastia Zhao."
 bookmark_china_1066_new_noble_family_desc: "Crie um personagem e uma [noble_family|lE] novos com uma pequena propriedade na Capital Imperial. 

#bold Você conseguirá começar no degrau mais baixo da escada burocrática e conquistar fama para si e para sua família nascente?#!"
 bookmark_china_1066_empress_liang: "Este é o meu momento; a era de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] #EMP acabou#!!"
 bookmark_china_1066_empress_liang_subheading: "Oportunidades tentadoras aguardam aqueles ousados o bastante para aproveitá-las."
 bookmark_china_1066_empress_liang_desc: "Antes, foi apenas a nora do poderoso estadista Xia $dynn_Mozang_6C92_85CF$ $Epang_8BB9_5E9E$, mas as ambições ocultas de $dynn_Liang_6881$ $Luoyao_843D_7464$ revelaram-se ainda maiores do que as do clã do preguiçoso marido.

Totalmente encantado por sua beleza e astúcia, o jovem governante tangute $king_male_tangut$ $Liangcha_5169_5C94$ passou a fio de espada o clã $dynn_Mozang_6C92_85CF$, incluindo sua própria esposa, e a colocou ao seu lado como sua rainha.

#bold O Estado Xia ainda é jovem e frágil. Você tomará seu futuro em suas próprias mãos?#!"
 bookmark_china_1066_su_shi: "Prefeito Sū Shì"
 bookmark_china_1066_su_shi_subheading: "$BOOKMARK_SUBHEADING_GOVERNOR$"
 bookmark_china_1066_su_shi_desc: "O pai de Sū Shì, apesar de ter sido reprovado no exame imperial, ganhou fama por seus escritos em sua quinta década de vida; uma reputação reforçada pelo desempenho exemplar e célebre de Sū Shì em seus próprios exames.

Depois de atrair para si a atenção e o favor tanto do principal historiador do império quanto do próprio imperador, a recente morte de seu pai é a única nuvem que obscurece o que se espera ser um futuro auspicioso.

#bold Sū Shì conseguirá corresponder às grandes expectativas depositadas nele?#!"
 bookmark.0400.t: "O poder por trás da cortina"
 bookmark.0400.desc: "Uma única flecha basta para desfazer anos de planejamento. Meu [emperor.GetWifeHusband] [emperor.GetFirstName] jaz ferido, enfraquecendo a cada dia que passa, derrubado por um arqueiro Song por ter se aproximado demais, e de forma tola, da luta.

Depois de tudo o que suportei, #EMP não#! deixarei que tudo me escape pelas mãos. Mulheres já governaram antes; se não foi por meio de seus maridos, então por meio de seus filhos, e a [Glossary('Imperatriz Wu', 'EMPRESS_WU_GLOSS')] até fundou sua própria #EMP dinastia#!.

Com a influência que acumulei e o apoio inabalável do meu [brother.Custom('SisterBrother')], [brother.Custom('ES_ElLa')] [brother.GetTitledFirstName|l], serei #EMP eu#! quem decidirá o futuro de [xia.GetNameNoTierNoTooltip]."
 bookmark.0400.a: "Seu governo será lembrado... como o prelúdio do #EMP meu#! reinado."
 bookmark.0400.a.tt: "[emperor.Custom('ES_ElLa')|U] [emperor.GetTitledFirstName|l] falecerá #EMP tragicamente#! devido aos ferimentos, e você assumirá o controle exclusivo do [realm|lE] com seu [brother.Custom('SisterBrother')], [brother.Custom('ES_ElLa')] [brother.GetTitledFirstName|l], como seu [emperor.GetCouncillor('councillor_chancellor').GetCouncilTitle|l]"
 bookmark.0400.b: "Enquanto [emperor.GetSheHe] respirar, eu governarei de trás da cortina."
 bookmark.0400.b.tt: "Dada a fragilidade de seu estado e suas capacidades reduzidas, você assumirá o papel de [regent|lE] de [emperor.GetTitledFirstName|l], com [brother.Custom('ES_ElLa')] [brother.GetTitledFirstName|l] como [emperor.GetCouncillor('councillor_chancellor').GetCouncilTitle|l]."
 bookmark.0400.c: "Eu criarei noss[child.Custom('ES_OA')] [child.Custom('GetDaughterSon')] para que seja maior do que seu [emperor.GetMotherFather] jamais foi."
 bookmark.0400.c.tt: "[emperor.Custom('ES_ElLa')|U] [emperor.GetTitledFirstName|l] falecerá #EMP tragicamente#! devido aos ferimentos, e você assumirá o papel de [regent|lE] em nome de seu [child.Custom('GetDaughterSon')], [child.Custom('ES_ElLa')] [child.GetTitledFirstName|l], com seu [brother.Custom('SisterBrother')], [brother.Custom('ES_ElLa')] [brother.GetTitledFirstName|l], como seu [emperor.GetCouncillor('councillor_chancellor').GetCouncilTitle|l]."
 EMPRESS_WU_GLOSS: "Wǔ Zétiān (624-705) afastou-se da tradição e depôs seus próprios filhos após a morte de seu marido e se proclamou #EMP ela mesma#! fundadora da nova dinastia Zhao."
 bookmark.0500.t: "O Definhamento da Retidão"
 bookmark.0500.desc: "Um fracasso, #EMP outra vez#!. Quantas vezes terei de me rebaixar nestes malditos exames, recitando versos vazios sob os olhares de fiscais zombeteiros? Quem são #EMP eles#! para medir #EMP meu#! valor? Pregam virtude, mas eu os vejo como o que realmente são: porcos empanturrando-se no cocho chamado burocracia.

Seus rebentos mimados entram nos exames sem preocupação, sabendo as respostas antes mesmo de serem escritas, protegidos por tutores comprados com moedas arrancadas daqueles tão pobres que mal conseguem manter um teto sobre suas cabeças.

[ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTier] foi abandonado pelo Céu; quando se sabe o que é certo, ficar inativo é covardia. Pois que assim seja. Que os deuses sejam testemunhas e que os poderosos tremam, #EMP pois agora sou eu quem julga#!."
 bookmark.0500.a: "A maneira mais segura de promover mudanças é por dentro."
 bookmark.0500.b: "Este é o meu momento; a era de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] #EMP acabou#!!"
 bookmark.0500.c: "Oportunidades tentadoras aguardam aqueles ousados o bastante para aproveitá-las."
 bookmark.0500.d: "O povo anseia por um salvador, e esse salvador sou #EMP eu#!."
 faithful_followers: "Seguidores fiéis"
