 artifact_bowl_name: "$artifact_name_prefix$ Tigela"
 artifact_bowl_description: "Uma tigela ornamentada de habilidade artesanal [SCOPE.Custom('ArtifactQuality')]. É feita de [newly_created_artifact.GetFeatureText( 'generic_material_metal' )] e gravada com motivos de [newly_created_artifact.GetFeatureText( 'decoration_pattern' )]."
 artifact_plate_name: "$artifact_name_prefix$ Prato"
 artifact_plate_description: "Um magnífico prato de [SCOPE.Custom('ArtifactQuality')] feitura. É fundido em [newly_created_artifact.GetFeatureText( 'generic_material_metal' )] e gravado com [newly_created_artifact.GetFeatureText('decoration_pattern' )]."
 artifact_urn_name: "$artifact_name_prefix$ Urna"
 artifact_urn_description: "Uma urna requintada de habilidade artesanal [SCOPE.Custom('ArtifactQuality')]. É feita de [newly_created_artifact.GetFeatureText( 'generic_material_earthware' )] e cercada por representações de [newly_created_artifact.GetFeatureText( 'decoration_pattern' )]."
 artifact_statuette_name: "$artifact_name_prefix$ Estatueta"
 artifact_statuette_description: "Uma elegante estatueta em miniatura de habilidade artesanal [SCOPE.Custom('ArtifactQuality')], retratando um [host.Custom('MountedWarriorTerm')] montado em um torneio. É feita de ouro e possui detalhes impressionantes."
 artifact_tun_barrel_name: "$artifact_name_prefix$ Tonel de Vinho"
 artifact_tun_barrel_description: "Um enorme recipiente de [newly_created_artifact.GetFeatureText( 'generic_material_wood' )] de habilidade artesanal [SCOPE.Custom('ArtifactQuality')], capaz de armazenar centenas de galões de vinho."
 artifact_scepter_name: "$artifact_name_prefix$ Cetro"
 artifact_scepter_description: "Um cetro decorativo [SCOPE.Custom('ArtifactQuality')], ornamentado e forjado em ouro - um verdadeiro símbolo de distinção."
