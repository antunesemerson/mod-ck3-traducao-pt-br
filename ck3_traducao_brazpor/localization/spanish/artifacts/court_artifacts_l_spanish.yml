 artifact_panacea_description: "Uma cura para todas as doenças e enfermidades conhecidas. A caixa de [newly_created_artifact.GetFeatureText( 'box_material' )] é de habilidade artesanal [SCOPE.Custom('ArtifactQuality')]. [newly_created_artifact.GetFeatureText( 'box_decoration' )]."
