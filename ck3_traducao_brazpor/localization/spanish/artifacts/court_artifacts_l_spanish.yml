 artifact_diwan_name: "Diwan $artifact_name_prefix$"
 artifact_diwan_description: "Um divã de [SCOPE.Custom('ArtifactQuality')] fabricação. É feito com uma sólida estrutura de [newly_created_artifact.GetFeatureText( 'generic_material_wood' )] e coberto de almofadas. [newly_created_artifact.GetFeatureText( 'wood_decoration' )]"
