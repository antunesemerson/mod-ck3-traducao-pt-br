 #Decorations for wooden furniture.
 feature_wood_decoration_none: "A madeira foi lixada para um acabamento suave."
 feature_wood_decoration_varnish: "A madeira foi envernizada para dar um brilho rico e escuro."
 feature_wood_decoration_hsb_inlay: "A madeira é incrustada com decorações de [Artifact.GetFeatureText( 'decoration_material_inlay_HSB' )]."
 feature_wood_decoration_painted_pattern: "A madeira foi pintada com [Artifact.GetFeatureText( 'decoration_pattern' )]."
 #Thrones
 artifact_throne_charlemagne_name: "Trono de Carlos Magno"
 artifact_throne_charlemagne_description: "Um trono simples, mas imponente, sem ornamentos. Construído em mármore sólido, há rumores de que as lajes foram tiradas da Igreja do Santo Sepulcro em Jerusalém."
 artifact_throne_solomon_name: "Trono de Salomão"
 artifact_throne_solomon_description: "Um trono ostentoso do qual se rumorea que pertenceu ao lendário rei Salomão. Construído em marfim e revestido de ouro, o trono também tem muitas pedras preciosas engastadas, e esculturas de metal de vários animais adornam os degraus que levam até ele."
 artifact_throne_stone_scone_name: "Pedra de Scone"
 artifact_throne_stone_scone: "Um simples assento de arenito vermelho no qual todos os monarcas de Alba foram coroados desde o Rei Kenneth I."
 artifact_byz_throne_name: "Trono Bizantino de Salomão"
 artifact_byz_throne_description: "Um trono elegante do qual os governantes bizantinos administram a justiça com uma sabedoria igual à do Rei Bíblico. Sua característica mais distinta é o mecanismo oculto que permite elevá-lo até o teto e depois abaixá-lo novamente."
 #Banner
 artifact_wall_banner_battle_name: "Estandarte de guerra [epic_loser.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 artifact_wall_banner_battle_description: "Um Estandarte de guerra dos exércitos do [epic_loser.GetPrimaryTitle.GetName], retirado de suas forças após a batalha de [epic_battle_location.GetName]."
 artifact_wall_banner_royal_name: "Estandarte [target.GetAdjectiveNoTooltip] Real"
 artifact_wall_banner_royal_description: "Este é o estandarte de [target.GetNameNoTooltip], feito para honrar a posse de [target.GetHolder.GetTitledFirstNameRegnal]."
 artifact_wall_banner_house_name: "Estandarte da Casa [target.GetBaseNameNoTooltip]"
 artifact_wall_banner_house_description: "Este é o estandarte da Casa [target.GetBaseName], um símbolo da autoridade da família e seus descendentes."
 artifact_wall_banner_dynasty_name: "Estandarte da Dinastia [target.GetBaseNameNoTooltip]"
 artifact_wall_banner_dynasty_description: "Este é o estandarte da dinastia [target.GetBaseName], um símbolo da autoridade da linhagem e todos os seus membros, encomendado por [newly_created_artifact.MakeScope.Var('banner_commissioner').Char.GetNameRegnal]."
 artifact_wall_banner_name: "Estandarte [target.GetAdjectiveNoTooltip]"
 artifact_wall_banner_description: "É um estandarte [target.GetAdjectiveNoTooltip], símbolo da autoridade [target.Custom('ES_DelDela')] [target.GetHolder.GetTitleAsName]."
 artifact_wall_banner_kaviani_name: "Estandarte de Derafsh Kaviani"
 artifact_wall_banner_kaviani: "Este é o lendário Derafsh Kaviani — o estandarte real do Império Sassânida caído. Um símbolo de identidade e orgulho para os herdeiros do Império da Pérsia."
 artifact_wall_big_edessa_name: "Imagem de Edessa"
 artifact_wall_big_edessa: "Este é o Mandylion, um pano com uma imagem milagrosa do rosto de Jesus, o primeiro ícone do cristianismo. Sua origem está ligada ao rei Abgar de Edessa."
 #Shield
 artifact_wall_shield: "Escudo de parede"
 artifact_wall_shield_name: "Escudo $artifact_name_prefix$"
 artifact_wall_shield_description: "Um escudo de madeira de [SCOPE.Custom('ArtifactQuality')] trabalho artesanal de [newly_created_artifact.GetFeatureText( 'shaft_wood' )] e unidas com uma borda de [newly_created_artifact.GetFeatureText( 'head_metal' )]. A borda tem incrustações de [newly_created_artifact.GetFeatureText( 'decoration_material_inlay_HSB' )] e é pintada com imagens de [newly_created_artifact.GetFeatureText( 'decoration_pattern' )]."
