 artifact_wall_cid_sword_name: "Espada de Tizona"
 artifact_wall_el_cids_sword: "Esta é uma espada de um metro de comprimento com a inscrição \"Tizona\". Há rumores de que foi conquistada de seu antigo dono pelo famoso senhor da guerra El Cid; a mera presença da espada evoca sentimentos de temor marcial."
 artifact_radzig_kobyla_longsword_name: "Espada longa de Radzig Kobyla"
 artifact_henrys_longsword_name: "Espada longa de Henry"
 artifact_radzig_kobyla_longsword_description: "Rumores dizem que a espada foi forjada para um \"sir Radzig Kobyla\" e foi dada como perdida por muito tempo, até ser recuperada por certo homem faminto em sua busca por vingança."
 artifact_wall_sword_muhammad_name: "Espada de Muhammad"
 artifact_wall_sword_muhammad: "Uma das nove espadas autênticas do Profeta Muhammad. Esta é [SCOPE.Custom('MuhammadSword')]."
 artifact_wall_sword_muhammad_aladb: "Al-'Adb — usado por Maomé nas batalhas de Badr e Uhud"
 artifact_wall_sword_muhammad_almathur: "Al-Ma'thur — passado para Muhammad por seu pai"
 artifact_wall_sword_muhammad_arrasub: "Ar-Rasub — uma herança de família de Maomé"
 artifact_wall_sword_muhammad_albattar: "Al-Battar — levado por Muhammad como espólio da tribo Banu Qaynaqa"
 artifact_wall_sword_muhammad_haft: "Haft — levado por Muhammad como espólio da tribo Banu Qaynaqa"
 artifact_wall_sword_muhammad_qali: "Qal'i — tomado por Muhammad como espólio da tribo Banu Qaynaqa"
 artifact_wall_sword_muhammad_dhu: "Dhu al-Faqar — levado por Maomé como saque na batalha de Badr"
 artifact_wall_sword_muhammad_mikhdham: "Al-Mikhdham — passado por Muhammad para seu primo e genro Ali ibn Abi Talib"
 artifact_wall_sword_muhammad_alqadib: "Al-Qadib — a espada que ficou na casa de Muhammad"
 artifact_wall_sword_attila_name: "Espada de Deus"
 artifact_wall_sword_attila_description: "A espada lendária do Lider Hun Átila, o Flagelo de Deus. Também conhecida como a Espada de Marte."
 artifact_sword_goujian_name: "Espada de Goujian"
 artifact_sword_goujian: "Diz-se que esta antiga espada pertenceu ao rei de Yue, Goujian. Embora antiquado em seu design, a espada mostra excelente acabamento. É possível ver um texto dourado em escrita de selo pássaro-minhoca perto do punho."
 artifact_sword_goujian_refulgence: "[gujian_sword.GetDesc]\n\nAcredita-se que seja a espada chamada \"Fulgor\", que Goujian usava quando buscou o conselho de Confúcio."
 artifact_sword_goujian_purity: "[gujian_sword.GetDesc]\n\nAcredita-se que seja a espada chamada \"Pureza\"."
