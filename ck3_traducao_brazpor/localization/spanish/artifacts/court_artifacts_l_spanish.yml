 #Wall Decorations - Large
 artifact_wall_tapestry_name: "Tapeçaria de $artifact_name_prefix$"
 artifact_wall_tapestry_description: "Uma grande tapeçaria de [newly_created_artifact.GetFeatureText( 'generic_material_cloth' )] com uma qualidade [SCOPE.Custom('ArtifactQuality')]. [newly_created_artifact.GetFeatureText( 'tapestry_scene' )]"
 feature_tapestry_scene_religious: "O tecido retrata várias cenas de destaque extraídas do cânone [Artifact.GetOwner.GetFaith.GetAdherentNameNoTooltip]."
 feature_tapestry_scene_historical: "A tapeçaria mostra a fundação de [Artifact.GetOwner.GetPrimaryTitle.GetName] e outros acontecimentos históricos principais que levaram ao reinado de [Artifact.GetOwner.GetTitledFirstName|l]."
 feature_tapestry_scene_geometric_patterns: "A tapeçaria foi tecida para mostrar um desenho intrincado de formas geométricas interligadas."
 feature_tapestry_scene_hunt: "A tapeçaria retrata uma cena de caça: vários caçadores, armados com arcos e lanças, cercam um animal ferido e estão prestes a desferir o golpe mortal."
 feature_tapestry_scene_myth: "Deuses antigos, monstros inspiradores e heróis destemidos são tecidos neste tecido, representando uma cena do mito."
 feature_tapestry_scene_calligraphic: "A tapeçaria foi tecida para mostrar um design intrincado no qual letras caligráficas elegantes se misturam perfeitamente com formas geométricas."
 feature_tapestry_scene_bucolic: "A tapeçaria retrata cenas serenas da vida cotidiana nos campos ao longo do ano: alguns plantam um campo, outros aram e outros colhem a colheita."
 feature_tapestry_scene_battle: "O tecido retrata o momento decisivo da famosa batalha de [Artifact.GetOwner.MakeScope.Var('epic_battle_location').Province.GetName], em que [Artifact.GetOwner.GetTitledFirstName|l] derrotou [Artifact.GetOwner.MakeScope.Var('epic_loser').Char.GetTitledFirstName|l]."
 feature_tapestry_scene_coronation: "[Artifact.GetOwner.GetTitledFirstName|U] aparece no centro da cena durante sua coroação, entronizad[Artifact.GetOwner.Custom('ES_OA')] entre uma multidão que [Artifact.GetOwner.Custom('ES_LoLa')] aclama."
 feature_tapestry_scene_ships: "A tapeçaria retrata uma poderosa frota navegando pelos mares - em cada navio, guerreiros armados examinam o horizonte em busca de inimigos."
 feature_tapestry_scene_animals: "A tapeçaria retrata alguns animais caçando. No centro, um leão poderoso atacou um cervo que luta em vão para escapar."
 feature_tapestry_scene_banquet: "A tapeçaria mostra um rico banquete na corte de [Artifact.GetOwner.GetTitledFirstName|l]: convidados notáveis se sentam em torno de uma mesa luxuosa enquanto os artistas tocam música e dançam."
 feature_tapestry_scene_hearing: "A tapeçaria retrata uma audiência na corte: [Artifact.GetOwner.GetTitledFirstName|l] senta-se majestosamente no centro da cena, enquanto vassalos, emissários, inimigos derrotados e servos esperam na fila para prestar homenagem."
 feature_tapestry_scene_garden: "Um belo jardim é retratado no pano: a grama é verde, as flores crescem coloridas e luxuriantes, e as árvores carregadas de frutas parecem alcançar o céu."
 create_artifact_tapestry_tooltip: "[inspiration_owner.GetShortUIName] criou uma grande tapeçaria de qualidade [SCOPE.Custom('ArtifactQuality')]"
