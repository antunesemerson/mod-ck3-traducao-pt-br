 artifact_wall_icon_court_large: "Ícone Grande"
 artifact_wall_icon_court_small: "Ícone Pequeno"
 artifact_pedestal_sakanoue_sword_name: "Banke no Hōken" #坂家宝剣
 artifact_pedestal_sakanoue_sword_desc: "O famoso general $dynn_Sakanoue$ $Tamuramaro$ empunhou esta espada e diz-se que protege a corte imperial. $Saga_JP$ $king_tenno_male_japanese$ a entregou ao palácio após a morte de $Tamuramaro$."
 artifact_higekiri_sword_name: "Higekiri" #髭切
 artifact_higekiri_sword_desc: "Corta-Barbas, junto com a Hizamaru, foi um encomenda de $dynn_Minamoto$ de $Mitsunaka$ e foi passado de geração em geração pela família $Seiwa$ $dynn_Minamoto$."
 artifact_hizamaru_sword_name: "Hizamaru" #膝丸
 artifact_hizamaru_sword_desc: "Esta espada, junto com a Higekiri, foi um encargo de $dynn_Minamoto$ no $Mitsunaka$ e foi legada de geração em geração pela família $Seiwa$ $dynn_Minamoto$."
 artifact_dojigiri_sword_name: "Dojigiri" #童子切
 artifact_dojigiri_sword_desc: "O famoso ferreiro $Yasutsuna_4$ forjou esta espada para $dynn_Fujiwara$ $Toshihito$ e foi transmitida de geração em geração pela família $dynn_Fujiwara$."
 artifact_mikazuki_munechika_sword_name: "Mikazuki" #三日月
 artifact_mikazuki_munechika_sword_desc: "Lua crescente foi forjada pelo célebre ferreiro $dynn_SanjO_$ $Munechika_2$ durante o reinado de $IchijO_$ $king_tenno_male_japanese$."
 artifact_odenta_sword_name: "Ōtenta" #大典太
 artifact_odenta_sword_desc: "A Grande Tenta foi forjada pelo célebre ferreiro $Mitsuyo$, conhecido como Tenta, durante o reinado de $Shirakawa$ $king_tenno_male_japanese$."
 artifact_pedestal_hamayumi_bow_name: "Hamayumi" #破魔弓
 artifact_pedestal_hamayumi_bow_desc: "O “Destruidor do Mal” foi usado por $dynn_Minamoto$ $Yorimasa$, que foi convocado ao palácio imperial para dissipar espíritos malignos."
 artifact_pedestal_seven_branched_sword_name: "Shichishitō" #七支刀
 artifact_pedestal_seven_branched_sword_desc: "Diz-se que a Espada de Sete Ramos, uma lâmina de ferro com sete pontas como chamas, foi um presente de amizade para o $king_tenno_male_japanese$, enviado do outro lado do mar pelo rei de Baekje há muito tempo."
 artifact_pedestal_gyerimro_dagger_name: "Adaga exótica"
 artifact_pedestal_gyerimro_dagger_desc: "Esta adaga de fabricação requintada, com cabo e bainha, decorada com incrustações de ouro e pedras preciosas, é uma posse valiosa da corte de Silla e diz-se que veio de terras muito distantes ao oeste."
 artifact_karakawa_armor_name: "Karakawa" #唐皮
 artifact_karakawa_armor_desc: "Esta armadura ō-yoroi, finamente trabalhada, é uma relíquia da família Taira e diz-se que foi um presente do sobrinho de $Kanmu$ $king_tenno_male_japanese$."
 artifact_nukemaru_sword_name: "Nukemaru" #抜丸
 artifact_nukemaru_sword_desc: "Diz-se que esta espada foi entregue pela própria Amaterasu a um caçador em Ise, foi adquirida por $dynn_Taira$ $Tadamori$, e diz-se que ela se desembainhou sozinha quando uma serpente ameaçou seu sono."
 artifact_kogarasumaru_sword_name: "Kogarasumaru" #小烏丸
 artifact_kogarasumaru_sword_desc: "A 'Pequena Coruja' foi forjada por Amakuni para a corte imperial e mais tarde foi concedida a $dynn_Taira$ $Sadamori$ por $Suzaku$ $king_tenno_male_japanese$ em reconhecimento aos seus serviços durante a rebelião Jōhei-Tengyō."
 artifact_statue_green_amitabha_buddha_name: "Buda Amitabha de pedra verde"
 artifact_statue_green_amitabha_buddha_descripton: "Esta bela estátua do Buda Amitabha parece ser talhada em uma única pedra verde. A base é adornada com pétalas de lótus e padrões de ondas.\n\nDiz-se que a estátua apareceu milagrosamente entre os escombros de uma pagoda que desmoronou pouco depois de ser construída."
