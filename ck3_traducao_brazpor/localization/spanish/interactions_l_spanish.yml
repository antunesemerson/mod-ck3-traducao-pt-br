 char_interaction.0233.a: "\n\nQue [recipient.GetFaith.HighGodName] nos conceda uma longa vida e muitos filhos, [secondary_actor.Custom('ComplimentAdjective')] [secondary_actor.Custom('WifeHusband')] meu[secondary_actor.Custom('ES_OA')]!"
 marriage_interaction.0010.desc: "Aceito com prazer sua proposta de casamento!"
