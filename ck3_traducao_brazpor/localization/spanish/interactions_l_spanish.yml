 tributary_interaction_aibehavior_recipient_low_legitimacy_tt: "Humildemente lhes peço que aceitem meu juramento de lealdade como meu novo[recipient.Custom('ES_OA')] senhor[recipient.Custom('ES_XA')]."
 tributary_interaction_aibehavior_recipient_high_legitimacy_tt: "Humildemente lhe peço que aceite meu tributo e que se torne meu novo[recipient.Custom('ES_OA')] soberano[recipient.Custom('ES_OA')]."
 tributary_interaction_aibehavior_recipient_unstable_cycle_tt: "Vosso domínio parece precisar de proteção. Como [Select_CString( actor.IsFemale, 'vossa nova soberana', 'vosso novo soberano' )], poderia oferecer essa sensação de segurança em troca de tributo de [recipient.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]..."
 tributary_interaction_aibehavior_actor_low_legitimacy_tt: "Venha, veja a luz e junte-se ao meu grupo de tributários devotos. Juntos, tornamos este mundo melhor."
 tributary_interaction_aibehavior_actor_high_legitimacy_tt: "Você está oficialmente sob prisão por crimes contra a Coroa."
 tributary_interaction_aibehavior_actor_unstable_cycle_tt: "Solicita-se que você deixe sua posição na corte e faça os votos."
