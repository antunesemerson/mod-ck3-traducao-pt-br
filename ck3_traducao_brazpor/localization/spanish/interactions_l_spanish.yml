 tributary_interaction_aibehavior_recipient_same_faith: "Desejo estender minha proteção como seu[actor.Custom('ES_OA')] nov[actor.Custom('ES_OA')] am[actor.Custom('ES_OA')] e senhor[actor.Custom('ES_XA')]. Tudo o que peço em troca é seu juramento de fidelidade…"
