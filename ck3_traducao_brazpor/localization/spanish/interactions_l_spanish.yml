 #Long life and many children
 marriage_interaction.0010.ending.a_desc: "\n\nPor que alguém iria querer se casar com aquele [secondary_recipient.Custom2('InsultAdjective', ROOT.Char)] [secondary_recipient.Custom2('InsultNoun', ROOT.Char)] está além da minha compreensão, mas desejo-lhes felicidades."
 marriage_interaction.0010.ending.a_actor_desc: "\n\nPor que alguém iria querer se casar com aquele [secondary_recipient.Custom2('InsultAdjective', ROOT.Char)] [secondary_recipient.Custom2('InsultNoun', ROOT.Char)] está além da minha compreensão, então boa sorte."
 marriage_interaction.0010.ending.a_recipient_desc: "\n\nQue [recipient.GetFaith.HighGodName] nos conceda longa vida e muitos filhos!"
 marriage_interaction.0010.ending.a_both_desc: "\n\nRezo para que juntos possam encontrar redenção e expiação, assim como felicidade."
 #May HighGod bless the union
 marriage_interaction.0010.ending.b_desc: "\n\nRezo para que nós juntos possamos encontrar redenção e expiação, assim como felicidade."
 marriage_interaction.0010.ending.b_actor_desc: "\n\nRezo para que nós juntos possamos encontrar redenção e expiação, assim como felicidade, [secondary_actor.Custom('WifeHusband')]."
 marriage_interaction.0010.ending.b_recipient_desc: "Após pensar bastante, devo recusar seu pedido de casamento.\n\n[secondary_actor.GetFirstName] e [secondary_recipient.GetFirstName] não foram feitos um para o outro."
 marriage_interaction.0010.ending.b_both_desc: "Após pensar bem, devo recusar sua proposta de noivado.\n\n[secondary_actor.GetFirstName] e [secondary_recipient.GetFirstName] não foram feitos um para o outro."
 #Happy and fulfilling marriage
 marriage_interaction.0010.ending.c_desc: "Decidi romper o noivado entre [rejecting_betrothed.GetShortUIName] e [rejected_betrothed.GetShortUIName]."
 marriage_interaction.0010.ending.c_actor_desc: "Decidi romper meu noivado com [rejected_betrothed.GetShortUIName]."
 marriage_interaction.0010.ending.c_recipient_desc: "Decidi romper seu noivado com [rejecting_betrothed.GetShortUIName]."
 marriage_interaction.0010.ending.c_both_desc: "Decidi romper nosso noivado. Nosso casamento não acontecerá."
 #Strength and support
 marriage_interaction.0010.ending.h_desc: "Nosso casamento claramente não é favorecido por [actor.GetFaith.HighGodName]. Acabou."
 marriage_interaction.0010.ending.h_actor_desc: "Finalmente, estou livre do[actor.Custom('ES_EA')] [actor.Custom2('InsultNoun', ROOT.Char)] [actor.Custom2('InsultAdjective', ROOT.Char)]!"
 marriage_interaction.0010.ending.h_recipient_desc: "[actor.GetFirstName], não! Eu amo você!"
 marriage_interaction.0010.ending.h_both_desc: "Decidi tomá-la como minha concubina."
 #Fruitful in spite of hatred
 marriage_interaction.0010.ending.d_desc: "Liberei sua [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('recipient'))] da minha prisão para que me sirva como concubina[recipient.Custom('ES_OA')]."
 marriage_interaction.0010.ending.d_actor_desc: "Vil demônio!"
 marriage_interaction.0010.ending.d_recipient_desc: "Decidi entregá-la a [recipient.GetTitledFirstName|l] como concubina."
 marriage_interaction.0010.ending.d_both_desc: "Eu libertei sua concubina da minha prisão para que passe a ser concubina de [recipient.GetTitledFirstName|l]."
 #Perfect match
 marriage_interaction.0010.ending.e_desc: "Seus serviços como minha concubina não são mais necessários."
 marriage_interaction.0010.ending.e_actor_desc: "Que assim seja."
 marriage_interaction.0010.ending.e_recipient_desc: "Você não pode fazer amizade com [TARGET_CHARACTER.GetShortUIName] novamente por um bom tempo"
 marriage_interaction.0010.ending.e_both_desc: "Você não pode influenciar [TARGET_CHARACTER.GetShortUIName] enquanto estiver irritad[TARGET_CHARACTER.Custom('ES_OA')] comigo"
 #Recipient hates secondary recipient
 marriage_interaction.0010.ending.f_desc: "Você deve propor uma troca equivalente em obrigações e [hooks|lE], mudanças atuais favorecem [SelectLocalization( GreaterThan_CFixedPoint( '(CFixedPoint)$VALUE|q$', '(CFixedPoint)0.0' ), CHARACTER.GetShortUIName, TARGET_CHARACTER.GetShortUIName )]: [Abs_CFixedPoint( '(CFixedPoint)$VALUE|q$' )|V0]"
