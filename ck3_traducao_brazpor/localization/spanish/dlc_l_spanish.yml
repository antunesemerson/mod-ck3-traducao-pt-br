 dlc_001: "$DLC001_PREORDER$"
 dlc_001_desc: "Mergulhe no Sacro Império Romano com uma coleção de trajes para plebeus, guerreiros e governantes da Europa Central."
 dlc_002: "$DLC002_SP_DAY1$"
 dlc_002_desc: "Dê à sua corte um novo visual deslumbrante com um conjunto de trajes e opções cosméticas de vestuário para o Oriente Médio e o Norte da África."
 dlc_003: "$DLC003_FP1$"
 dlc_003_desc: "Saqueadores ferozes vindos de um norte gélido ou uma sociedade complexa cheia de exploradores intrépidos, comerciantes e poetas? Descubra a verdadeira riqueza do mundo nórdico com Crusader Kings III: Northern Lords, o primeiro flavor pack aprofundado do aclamado Crusader Kings III."
 dlc_004: "$DLC004_EP1$"
 dlc_004_desc: "A expansão The Royal Court para Crusader Kings III adiciona novas formas de interagir com os personagens do seu reino ou império, além de grandes mudanças no sistema cultural do jogo, trazendo mais dinamismo e fluidez histórica."
 dlc_005: "$DLC005_FP2$"
 dlc_005_desc: "As terras ensolaradas da Ibéria aguardam seu glorioso domínio com o flavor pack Crusader Kings III: Fate of Iberia. Riquíssima em história, cultura e povo, a península medieval está pronta para ter seu destino moldado por sua mão majestosa, seja envolta em veludo conciliador ou em um punho de ferro."
 dlc_006: "$DLC006_BP1$"
 dlc_006_desc: "Cuidado, governante: ande com prudência entre aqueles que você chama de amigo ou inimigo; eles são dois lados da mesma moeda. Seus relacionamentos importam mais do que nunca e, com Crusader Kings III: Friends & Foes, veja os mais próximos de você ganharem vida nos detalhes mais íntimos."
 dlc_007: "$DLC007_EP2$"
 dlc_007_desc: "Reescreva a história enquanto viaja por traiçoeiras terras medievais para se banhar na glória obtida ao sediar e participar de Grandes Torneios, Grandes Casamentos e Grandes Excursões."
 dlc_008: "$DLC008_SP2$"
 dlc_008_desc: "Vista seus governantes com o que há de mais refinado neste pacote de roupas. Baseado nas vestes e insígnias do Imperador Henrique II e da Imperatriz Cunigunda, este pacote inclui não apenas novas túnicas e vestidos, mas também coroas historicamente adequadas e outros itens. Disponível exclusivamente para proprietários do Chapter II."
 dlc_009: "$DLC009_BP2$"
 dlc_009_desc: "Em Wards & Wardens, governantes infantis e seus tutores ocupam o centro do palco. Crie jovens príncipes e nobres em um mundo onde a glória eterna está a uma batalha de distância e o perigo espreita em cada sombra."
 dlc_010: "$DLC010_FP3$"
 dlc_010_desc: "O Império Sassânida já se foi há muito, e o Califado Abássida pressiona as dinastias iranianas remanescentes à submissão. Você obedecerá ou forjará um novo império? O futuro da Pérsia está em suas mãos!"
 dlc_011: "$DLC011_CE1$"
 dlc_011_desc: "A notícia de seus feitos se espalha por toda parte: inscreva seu nome nos anais da história e erga monumentos à sua própria glória! Tecer a rica tapeçaria de sua lenda e criar os contos que serão cantados sobre você por muitas vidas."
 dlc_012: "$DLC012_CP1$"
 dlc_012_desc: "Este pacote de roupas para culturas norte-africanas inclui novos itens para os personagens usarem, incluindo peças superiores, leggings, capas, adornos de cabeça e mais, com novos designs e padrões. “North African Attire” é o primeiro criado em cooperação e dirigido por um criador da comunidade."
 dlc_013: "$DLC013_SP3$"
 dlc_013_desc: "Inspirado na moda da corte francesa da Alta Idade Média, este pacote cosmético traz novos estilos e padrões a Crusader Kings III. Vista-se com novas capas, novos tipos de adornos de cabeça, estilos de barba e cabelo, tudo para combinar com suas roupas luxuosas e régias. Disponível exclusivamente para proprietários do Chapter III."
 dlc_014: "$DLC014_EP3$"
 dlc_014_desc: "Lidere uma família nobre em um império antigo, usando influência e intriga para assegurar seu lugar, ou seja um mercenário errante, construindo reputação como solucionador de problemas ou fora da lei. Novos eventos, sistemas de governo, esquemas e estilos de vida esperam por você em Roads to Power."
 dlc_015: "$DLC015_BP3$"
 dlc_015_desc: "Traz conteúdo novo para vários sistemas adorados: viagem, atividades e estilos de vida. Envie seu governante em jornadas empolgantes, seja em busca de riqueza, prestígio ou crescimento pessoal. Não o deixe parado: a aventura espera a cada esquina!"
 dlc_016: "$DLC016_CP2$"
 dlc_016_desc: "Este Content Creator Pack é inspirado nas vestes eslavas ocidentais da Idade Média. Ele inclui novas roupas, peças de perna, adornos de cabeça grandiosos e uma variedade de padrões para escolher."
 dlc_017: "$DLC017_CP3$"
 dlc_017_desc: "Descubra os grandes feitos arquitetônicos da Idade Média com o Content Creator Pack Medieval Monuments.\n\nCriado em colaboração com o consagrado modder de Crusader Kings III PiGu, Medieval Monuments traz 20 novos monumentos variados e culturalmente significativos ao jogo."
 dlc_018: "$DLC018_CP4$"
 dlc_018_desc: "Enfrente o frio das terras muito ao norte com estilo usando o Content Creator Pack Arctic Attire, feito em colaboração com o consagrado modder de Crusader Kings III Aj. Arctic Attires adiciona cosméticos inspirados nas estéticas sami e khanty."
 dlc_019: "$DLC019_SP4$"
 dlc_019_desc: "Dê um toque régio ao seu governo com Crowns of the World, uma coleção real de opções cosméticas para aprimorar a aparência do seu governante. Disponível exclusivamente para proprietários do Chapter IV."
 dlc_020: "$DLC020_CE2$"
 dlc_020_desc: "Governe ou seja governado. Migre ou pereça. Em Khans of the Steppe, apenas os mais fortes sobreviverão às duras realidades da vida na Estepe. Você ascenderá à grandeza, esculpindo um legado de conquista, ou seu povo desaparecerá nos anais da história? A escolha é sua."
 dlc_021: "$DLC021_BP4$"
 dlc_021_desc: "Comece seu reinado com majestade! Legitimize seu poder por meio de cerimônias inspiradoras que impõem respeito a vassalos e rivais. Desde o primeiro toque da coroa, seu legado é forjado em grandeza com Coronations."
 dlc_022: "$DLC022_EP4$"
 dlc_022_desc: "Com All Under Heaven, a vasta e dinâmica história do Leste Asiático ganha vida. Reivindique o Mandato, una seu povo e molde o futuro dos impérios nesta expansão monumental!"
 dlc_023: "$DLC023_CP5$"
 dlc_023_desc: "Equipe-se para a batalha com novos e elegantes apetrechos em High Medieval Warfare Attire. Este Creator Pack do modder JedNick inclui uma ampla gama de elmos, adornos de cabeça e armaduras da Europa Ocidental da Alta Idade Média."
 dlc_024: "$DLC024_CP6$"
 dlc_024_desc: "Adicione mais variedade e detalhe histórico ao seu mapa com Holy Buildings. Este Creator Pack do modder Kefir úr inclui novos modelos 3D para edifícios religiosos: de igrejas humildes a monumentos magníficos, Holy Buildings traz ainda mais sabor regional e religioso ao seu jogo!"
 dlc_025: "$DLC025_CP7$"
 dlc_025_desc: "Descubra as vestes, armaduras e povoamentos distintos do Norte do Pacífico, inspirados nas culturas ainu, nivkh e emishi."
 dlc_026: "$DLC026_CP8$"
 dlc_026_desc: "Aprimore o mapa-múndi com edifícios monumentais e locais sagrados inspirados nas maravilhas arquitetônicas do Leste Asiático."
 dlc_027: "$DLC027_CP9$"
 dlc_027_desc: "Adorne seus governantes com vestes refinadas e trajes cerimoniais inspirados no esplendor das cortes imperiais."
 dlc_028: "$DLC028_SP5$"
 dlc_028_desc: "Symbols of Authority inclui sete novos penteados e adornos reais para a cabeça, inspirados em modelos históricos, para acentuar a majestade de seus personagens."
 dlc_029: "$DLC029_MP1$"
 dlc_029_desc: "Songs of the Realm traz 13 faixas para acompanhar seu governo, de melodias cortesãs pacíficas a temas de batalha empolgantes. Clássicos remasterizados de Crusader Kings tocam ao lado de novos arranjos de danças folclóricas europeias; este Music Pack é a trilha sonora perfeita para sua ambição dinástica."
