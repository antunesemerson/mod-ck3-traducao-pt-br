 #Misc
 party_baron_volunteer_levies: "Voluntários de [party_baron.GetFirstNameNoTooltip]"
 #Modifiers
 party_baron_beloved_by_all_modifier: "Amado por Todos"
 party_baron_making_efforts_modifier: "Fazendo Esforços Sociais"
 party_baron_self_aggrandizing_modifier: "Autoengrandecedor"
 party_baron_friendly_enough_modifier: "Suficientemente Amigável"
 party_baron_friendly_enough_modifier_desc: "É totalmente possível ter \"amigos\" demais"
 party_baron_if_you_cannot_be_loved_modifier: "Se Você Não Pode Ser Amado"
 party_baron_accommodating_modifier: "Acomodando os Outros"
 party_baron_condemned_pb_modifier: "Condenação Impopular"
 party_baron_condemned_pb_modifier_desc: "Este personagem falou mal de alguém muito popular"
 party_baron_praised_pb_modifier: "Elogio Relutante"
 party_baron_praised_pb_modifier_desc: "Este personagem fez um elogio relutante a alguém muito popular"
 party_baron_murdered_the_joy_of_life_modifier: "Matou a Alegria de Viver"
 party_baron_murdered_the_joy_of_life_modifier_desc: "Por que alguém faria uma coisa dessas?"
 party_baron_great_mercenary_deal_modifier: "Ótimos Acordos com Mercenários"
 party_baron_ended_the_party_modifier: "Acabou com a Festa"
 party_baron_ended_the_party_modifier_desc: "Este personagem tirou o salão de banquetes dos maiores festins já realizados"
 party_baron_subversive_tactics_modifier: "Táticas Subversivas"
 party_baron_reflection_modifier: "Reflexão Pessoal"
 party_baron_beloved_by_all_except_modifier: "Amado por Todos, Exceto..."
 party_baron_endorsed_successor_modifier: "Sucessor Endossado"
 party_baron_endorsed_successor_modifier_desc: "A pessoa mais simpática do mundo deu sua aprovação a este novo governante"
 #Events
 party_baron_header: "Um Festim Sem Fim"
 party_baron_negative_attitude_counter_stress_tt: "Por causa de sua #V atitude negativa#! em relação a [TARGET_CHARACTER.GetShortUIName]:"
 party_baron_positive_attitude_counter_stress_tt: "Por causa de sua #V atitude positiva#! em relação a [TARGET_CHARACTER.GetShortUIName]:"
 party_baron_move_towards_positive_tt: "Mover-se em direção a uma #V atitude positiva#! contra [party_baron.GetShortUIName]"
 party_baron_move_towards_negative_tt: "Mover-se em direção a uma #V atitude negativa#! contra [party_baron.GetShortUIName]"
 party_baron.1001.t: "$party_baron_header$"
 party_baron.1001.desc: "O nome de cert[party_baron.Custom('ES_OA')] nobre de menor escalão está na boca de todos. Não paro de ouvir que [party_baron.GetTitledFirstName|l] é uma bênção, que faz todo mundo se sentir à vontade e que ainda oferece os #EMP mejores#! banquetes.\n\nTodos sabem quem é e podem atestar sua simpatia e generosidade — pelo menos é o que estão ansiosos para afirmar."
 party_baron.1001.a: "Talvez eu possa aprender uma coisa ou duas com alguém tão popular…"
 party_baron.1001.b: "Mas #EMP EU#! é que deveria ser coberto de elogios!"
 party_baron.1001.c: "Acho que deveria conhecer est[party_baron.Custom('ES_EA')] [party_baron.GetWomanMan]!"
 party_baron.1001.c.tt: "Escrever uma carta para [party_baron.GetTitleAsName]"
 party_baron.1002.opening: "[party_baron.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 party_baron.1002.desc: "¡Mil gracias por vuestros cordiales saludos! Me alegro de que alguien más se percate de que no hay mayor felicidad que transmitir alegría al prójimo.\n\nEspero poder recibiros como huésped de honor algún día y, a riesgo de que suene presuntuoso, ojalá compartamos en un futuro una bella amistad."
 party_baron.1002.a: "Parece muito agradável, até por escrito!"
 party_baron.1003.desc: "Em um abrir e fechar de olhos, [party_baron.GetFirstName] passou de ter uma baronia humilde a ser meu [party_baron_header.GetTitleAsName]…\n\nO mundo mudou por completo muito mais rápido do que eu imaginei."
 party_baron.1003.a: "Pelo menos agora tenho um [party_baron.GetTitleAsName] generoso."
 party_baron.1003.b: "Vamos simplesmente esquecer todas aquelas coisas que eu disse..."
 party_baron.2001.t: "$party_baron_header$"
 party_baron.2001.negative: "Pelo visto, sem qualquer aprovação ou incentivo meu, [party_baron.GetTitledFirstName|l] tomou a iniciativa de falar com [vassal.Custom2('RelationToMe', ROOT.Char )] sobre mim!\n\nAparentemente, ele me elogiou sem parar, mas isso só me deixa suspeitando #EMP más aún#! das intenções dele!"
 party_baron.2001.positive: "Ao que parece, [party_baron.GetShortUIName] tomou a iniciativa de falar com [vassal.Custom2('MyCharacterIntroduction', ROOT.Char )] sobre mim. \n\nSua atitude me preocuparia, não fosse o fato de que [vassal.GetFirstNameNoTooltip] agora parece muito mais amigável e prestativo."
 party_baron.2001.a_positive: "Um esforço impressionante!"
 party_baron.2001.a_negative: "Contanto que tudo continue sob controle por enquanto..."
 party_baron.2001.b_negative: "Sou eu quem deveria ser admirado e ouvido em primeiro lugar!"
 party_baron.2001.b_positive: "Como é justo. Sou realmente grandioso."
 party_baron.2002.t: "$party_baron_header$"
 party_baron.2002.desc: "Num banquete, meu olhar se cruza com o de [party_baron.GetTitledFirstName|l] enquanto fala com [new_friend.Custom2('MyCharacterIntroduction', ROOT.Char )]. Apesar da evidente falta de decoro que isso implica, faz um gesto para que eu me aproxime.\n\n"[ROOT.Char.GetFirstNameNoTooltip]! [new_friend.GetFirstNameNoTooltip] e vocês já se conhecem, é claro, mas acho que deveriam passar mais tempo juntos. Vocês têm tanta coisa em comum!"."
 party_baron.2002.a: "Suponho que eu não conheça [new_friend.GetTitledFirstNameNoTooltip|l] tão bem quanto poderia."
 party_baron.2002.b: "Oh, já tenho conhecidos mais do que suficientes."
 party_baron.2003.desc: "¡Ha llegado a mis oídos que [owner.Custom2('YourCharacterIntroduction', ROOT.Char)] conspiraba para asesinaros!\n\nMas no temáis, pues ya hemos hablado y le he hecho ver cuánto se equivocaba. El asesinato es algo abominable, ¿no os parece?"
 party_baron.2003.a: "Obrigado por... salvar minha vida?"
 party_baron.2003.repentant_cannot_scheme: "Enquanto durar o arrependimento de [owner.GetShortUIName], não poderá iniciar [hostile_schemes|lE] contra você"
 party_baron.2003.b: "Ele/ela esteve tramando para fazer #EMP para qué#!?!"
 party_baron.2003.c: "Como, exatamente, esse complô simplesmente \"chegou ao conhecimento de \"...?"
 party_baron.2004.t: "$party_baron_header$"
 party_baron.2004.desc: "Não se sabe ao certo se [party_baron.GetTitledFirstName|l] bebeu demais ou está apenas levado pelo espírito festivo que paira no ar. Seja o que for, eu também sinto quando me puxa para um abraço com entusiasmo.\n\nEntão me diz: "Olha, acho que a vida me deu poucos amigos melhores do que você".\n\nPasso o resto da noite observando como se diverte na farra. Estou começando a achar que [party_baron.GetHerHim] entendo melhor do que todas aquelas pessoas que brindam por [party_baron.GetSheHe]."
 party_baron.2004.a: "Você também, [party_baron.GetFirstNameNoTooltip]..."
 party_baron.2005.t: "$party_baron_header$"
 party_baron.2005.desc: "Recebo com surpresa e satisfação a aparição de [party_baron.GetTitledFirstName|l] em minha corte, sobretudo quando diz que quer falar a sós.\n\n"Não queria que isso fosse discutido em um banquete ou celebração". Seu semblante se mostra mais sério que o costume e seu sorriso afável brilha pela ausência. "Não encontro palavras para descrever o quanto você significa para mim. Tenho muitas amizades, mas nenhuma como você. Espero que perdure até o fim de nossos dias"."
 party_baron.2005.a: "\"Eu também, [party_baron.GetFirstNameNoTooltip]. Eu também.\""
 party_baron.2006.desc: "A convite que recebi mencionava a celebração de "algo muito especial", e eu precisava ver com meus próprios olhos. Que noite!\n\nMal me lembro de ter sido mais feliz em alguma ocasião, e agora sinto como se tivesse recuperado parte das minhas ganas de viver!"
 party_baron.2006.a: "Cuidado, mundo!"
 party_baron.2006.b: "Não foi nada de especial."
 party_baron.2007.desc: "Mesmo no meio de uma guerra, [party_baron.GetTitledFirstName|l] continua com suas artimanhas de sempre. Enquanto faço a revista do meu exército, ele vem cavalgando até mim à frente de sua própria pequena hoste!\n\n\"Pensei que toda ajuda seria bem-vinda, então falei com algumas pessoas, e elas disseram que estão ansiosas para se juntar a nós como voluntárias!\".\n\nVoluntários...? Eu deveria estar perguntando de onde vieram esses soldados?"
 party_baron.2007.a: "É exatamente disso que eu preciso!"
 party_baron.2007.b: "Para #EMP ajudar#!, você deveria ter me trazido #EMP profissionais!#!"
 party_baron.2007.b_flavor: "Oh. Oh, vai mesmo...?"
 party_baron.3001.t: "$party_baron_header$"
 party_baron.3001.desc: "La gente está encantada con [party_baron.GetTitledFirstName|l], ¡y yo no comprendo por qué! Tampoco es para tanto. ¡Si lo único que hace es ser amable y señalar las bondades de quien tenga delante! Hasta en los desacuerdos es agradable y cordial! Defiende su punto de vista sin dejar de intentar comprender el tuyo, pero es que eso a mí no…\n\nEn fin, ¡es que no logro entender por qué la gente [party_baron.GetHerHim] quiere tanto!"
 party_baron.3001.a: "Vou mostrar a eles quem merece admiração!"
 party_baron.3001.b: "Talvez eu esteja sendo um pouco duro..."
 party_baron.3002.t: "$party_baron_header$"
 party_baron.3002.desc: "Então não basta que todos adoram [party_baron.GetTitledFirstName|l]? Talvez agora #EMP yo#! também [party_baron.Custom('ES_LoLa')] eu tenha que amar?\n\nVários dos meus vassalos assinaram uma petição exigindo que eu pare de falar palavrões sobre esse inútil [party_baron.GetTitleAsName]!"
 party_baron.3002.a: "Oh, vou mostrar a esses cretinos presunçosos algumas \"palavras ofensivas\"."
 party_baron.3002.b: "Não faz mal ser um pouco mais gentil. Em público."
 party_baron.3003.desc: "Pese a todo lo que he dicho de [party_baron.GetTitledFirstName|l], [party_baron.GetSheHe] ni se ha inmutado. Hasta se ha atrevido a dirigirse a mí en un festín, ¡a solas!\n\n«Tengo la sensación de que no os gusto mucho». Resoplo como respuesta. No se equivoca, pero sigue hablando, como si no le afectara. «¿Podemos charlar un momento?».\n\nNo recuerdo con claridad lo que sucedió después, pero el festín terminó siendo de los mejores de mi vida. Debo admitir que quizás me equivocara con [party_baron.GetTitleAsName] después de todo…"
 party_baron.3003.a: "Pensar que você acabaria me conquistando, [party_baron.GetFirstNameNoTooltip]!"
 party_baron.3003.b: "Não! Nada mudou!"
 party_baron.3004.desc: "Já basta! Me desespera que continuem considerando [party_baron.GetTitledFirstName|l] o maior expoente de tudo que há de bom na humanidade.\n\nNão sei com que feitiço manipulador mantém todo o senhorio encantado, mas preciso pôr fim a isso!"
 party_baron.3004.a: "¡Hay que pararle los pies!"
 party_baron.3004.b: "Estou... indo longe demais?"
 party_baron.4001.desc: "Tem sido difícil aceitar a perda de [previous_character.Custom2('YourCharacterIntroduction', ROOT.Char)]. Era um[previous_character.Custom('ES_XA')] bom[previous_character.Custom('ES_XA')] amig[previous_character.Custom('ES_OA')] e você deveria se orgulhar da pessoa que ele era.\n\nDeve ser um momento difícil para você, mas saiba que conta com o meu apoio!"
 party_baron.4001.a: "Obrigado por suas gentis palavras."
 party_baron.4002.opening: "[party_baron.Custom2('AppropriateGreeting', ROOT.Char)]"
 party_baron.4002.desc: "Entendo que você não gosta de mim. Esse é seu direito. Mas não vejo por que continua perverso e hostil quando tento ser o mais amigável e cortês possível.\n\nTivemos muitas oportunidades de resolver isso, mas agora estou lhe pedindo pela última vez. Por favor, vamos simplesmente... ser amigos."
 party_baron.4002.a: "Mas como ousa? Como ousa!"
 party_baron.9001.t: "O Fim de um Festim"
 party_baron.9001.desc: "[party_baron.GetTitledFirstName] é um lembrete severo de que, não importa o quanto desfrutemos da vida e o quanto de alegria levemos a este mundo, tudo isso acabará um dia."
 party_baron.9001.a: "Este mundo será menos sem sua pessoa."
 party_baron.9001.a.tt: "[party_baron.GetShortUIName] está celebrando em [party_baron.GetFaith.PositiveAfterLife]"
 party_baron.9001.b: "Parece que seu falso sorriso não enganou [ROOT.Char.GetFaith.DeathDeityName]."
 party_baron.9001.b.tt: "[party_baron.GetShortUIName] finalmente se foi de vez."
 party_baron.9003.t: "$party_baron_header$"
 party_baron.9003.desc_positive: "Mal consigo acreditar na sorte que tenho de poder contar com um[party_baron.Custom('ES_XA')] [party_baron.GetWomanMan] assim. Jamais pensei que seria tão feliz quanto me senti no dia do meu casamento, feliz como criança com doce! E [party_baron.GetFirstName] estava radiante.\n\nQuando me olha nos olhos e me diz que não concebe alegria maior do que estar comigo para sempre, eu acredito nele."
 party_baron.9003.desc_negative: "Talvez este fosse o desfecho inevitável. Apesar de todo o meu ódio e inveja, ainda assim não consegui resistir ao seu encanto.\n\nDesde o início, [party_baron.GetFirstName] parecia ter certeza de que isso sempre aconteceria. E agora que estamos casados, parece mais feliz do que nunca."
 party_baron.9003.a_positive: "Sou seu, meu amor!"
 party_baron.9003.a_negative: "Você me pegou no fim, seu charme em pessoa!"
