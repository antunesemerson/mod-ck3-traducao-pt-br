l_spanish:
 # everybody's intro to Japan
 action_reactive_advice_welcome_to_japan: "Conselho: Japão"
 action_reactive_advice_welcome_to_japan_desc: "No período Heian, o Japão oscila entre funcionários imperiais e senhores da guerra locais. Abra isto para ver uma introdução a essa estrutura política única."
 action_reactive_advice_welcome_to_japan_click: "$click_to_open_lesson$"
 reactive_advice_welcome_to_japan_step_intro: "Japão"
 reactive_advice_welcome_to_japan_step_intro_desc: "Bem-vindo ao período Heian!

Nesta era, o Japão oscila entre tradição e violência. As [houses|lE] ambiciosas disputam o poder e o controle do trono imperial.

#TUT Presumimos que você já tenha alguma experiência jogando Crusader Kings 3.#!"
 reactive_advice_welcome_to_japan_step_government: "Abra a aba "$administraction_tab_families|V$" no painel "$ADMINISTRATIVE_GOVERNMENT_HEADER|V$" (destacado)"
 reactive_advice_welcome_to_japan_step_government_desc: "O Japão é um [realm|El] dividido entre dois tipos de senhores.

Os [rulers|El] têm uma destas formas de [government|El]:
$EFFECT_LIST_BULLET$[ritsuryo_i][ritsuryo|E] #weak (oficiais imperiais)#!
$EFFECT_LIST_BULLET$[soryo_i][soryo|E] #weak (senhores da guerra feudais)#!

Historicamente, os senhores da guerra $game_concept_soryo$ ganharam força, o que acabou resultando no domínio [shogun|El] no Japão."
 reactive_advice_welcome_to_japan_step_open_families_tab: "Todas as [houses|lE] japonesas têm uma [Concept('house_aspiration', 'aspiração')|E].

Este atributo afeta todos os membros da $game_concept_house$ e o [house_head|lE] pode melhorá-lo com o tempo ao gastar [prestige_i|E][prestige|El].

#I Como $game_concept_house_head$, você pode ver e melhorar sua $game_concept_house_aspiration$ por meio do botão destacado."
 reactive_advice_welcome_to_japan_step_open_families_tab_desc: "Blocos de Casas"
 reactive_advice_welcome_to_japan_step_open_families_tab_prompt: "A maioria dos [vassals|El] do Japão governa apenas um [county|El].

Para consolidar seu poder, a maioria das [houses|El] pertence a um [house_bloc|El], uma aliança defensiva de [houses|El].

Os membros de um $game_concept_house_bloc$ geralmente têm a mesma [Concept('house_aspiration', 'aspiração')|E] e boas [Concept('house_relations', 'relações')|E] entre si. Se não tiverem, a [Concept('bloc_cohesion', 'coesão do bloco')|E] é reduzida e a [leading_house|El] pode escolher expulsar as $game_concept_houses$ problemáticas do $game_concept_bloc$.

#I Se você fizer parte de um $game_concept_bloc$, poderá ver o status do seu $game_concept_bloc$ clicando no botão destacado.#!"
 reactive_advice_welcome_to_japan_step_emperor_and_regent: "Japão"
 reactive_advice_welcome_to_japan_step_emperor_and_regent_desc: "Este é o [japanese_emperor|El], também conhecido como $king_tenno_male_japanese$.

Embora seu título sugira que ele governe o Japão, ele é conhecido como o [ceremonial_liege|El] e não tem poder real.

No entanto, casar-se com algum membro de sua família ainda concede muito [prestige|El], e um $king_tenno_male_japanese$ ambicioso poderia tentar tomar o poder."
 reactive_advice_welcome_to_japan_step_emperor_and_regent_2: "O imperador e seu regente"
 reactive_advice_welcome_to_japan_step_emperor_and_regent_2_desc: "O verdadeiro poder no Japão é, na verdade, exercido pelo [ceremonial_regent|El], como mostrado aqui.

Ele é o verdadeiro [ruler|El] [independent|El] do Japão. Além dos poderes normais de qualquer $game_concept_ruler$ $game_concept_independent$, também define a [law|El] da [imperial_policy|lE] que afeta todo o [realm|El]."
 reactive_advice_welcome_to_japan_step_manor: "$reactive_advice_soryo_intro_NAME$"
 reactive_advice_welcome_to_japan_step_manor_desc: "Todo [house_head|El] do Japão tem uma $japanese_manor_domicile_type$, que você pode expandir e desenvolver usando o [gold|El] que ganhar.

Em contraste com as [holdings|El] do seu [domain|El], a $japanese_manor_domicile_type$ permanece com o [house_head|El] e não é perdida se seu [domain|El] for conquistado.

#I Se você for $game_concept_house_head$, poderá visualizar e desenvolver sua $japanese_manor_domicile_type$ usando o botão destacado.#!"
 reactive_advice_welcome_to_japan_step_house_aspirations: "A primeira [decision|El] que você deve tentar obter é "$tgp_japan_assert_regional_dominion_government_decision|V$".

Isso permite que você conquiste o [duchy|El] da sua região local. Embora não seja necessário para se tornar [shogun|El], é um passo intermediário muito útil.

#TUT Esta $game_concept_decision$ não está disponível se você já tiver o [rank|El] de [duke|El].#!"
 reactive_advice_welcome_to_japan_step_house_aspirations_desc: "Todas as [houses|lE] japonesas têm uma [Concept('house_aspiration', 'aspiração')|E].

Este atributo afeta todos os membros da $game_concept_house$ e o [house_head|lE] pode melhorá-lo com o tempo ao gastar [prestige_i|E][prestige|El].

#I Como $game_concept_house_head$, você pode ver e melhorar sua $game_concept_house_aspiration$ por meio do botão destacado."
 reactive_advice_welcome_to_japan_step_blocs: "$reactive_advice_soryo_intro_NAME$"
 reactive_advice_welcome_to_japan_step_blocs_desc: "A maioria dos [vassals|El] do Japão governa apenas um [county|El].

Para consolidar seu poder, a maioria das [houses|El] pertence a um [house_bloc|El], uma aliança defensiva de [houses|El].

Os membros de um $game_concept_house_bloc$ geralmente têm a mesma [Concept('house_aspiration', 'aspiração')|E] e boas [Concept('house_relations', 'relações')|E] entre si. Se não tiverem, a [Concept('bloc_cohesion', 'coesão do bloco')|E] é reduzida e a [leading_house|El] pode escolher expulsar as $game_concept_houses$ problemáticas do $game_concept_bloc$.

#I Se você fizer parte de um $game_concept_bloc$, poderá ver o status do seu $game_concept_bloc$ clicando no botão destacado.#!"
 reactive_advice_welcome_to_japan_step_end: "$click_to_open_lesson$"
 reactive_advice_welcome_to_japan_step_end_desc: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 # Soryo in japan, your goal to become Shogun
 action_reactive_advice_soryo_intro: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 action_reactive_advice_soryo_intro_desc: "Vamos dar uma olhada no seu [house_bloc|lE]."
 action_reactive_advice_soryo_intro_click: "Selecione seu $game_concept_bloc$ (destacado)"
 # lets assume you are in a bloc, but be a bit vague about it. Most on game start are anyway
 reactive_advice_soryo_intro_NAME: "As [houses|El] do seu [bloc|El] se juntarão à [leading_house|El] quando ela iniciar [factions|El].

Se você desejar se tornar [ceremonial_regent|El] e, eventualmente, [shogun|El], elas se juntarão à sua $game_concept_faction$ $replace_ceremonial_regent_faction_name|V$!"
 ra_soryo_intro: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 ra_soryo_intro_desc: "A força de todos os membros do [bloc|El] será mostrada aqui.\n\nQuanto mais forte for o $game_concept_bloc$, mais provável será que sua [faction|El] consiga impor suas exigências e instalá-lo como [ceremonial_regent|El]."
 ra_soryo_basics: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 ra_soryo_basics_desc: "O [government|El] [GetGovernment('japan_feudal_government').GetName|l] é muito semelhante ao $game_concept_government$ [GetGovernment('feudal_government').GetName|l] encontrado fora do Japão.

No entanto, no Japão Heian, expandir seu [realm|El] por meio da [war|El] é considerado um [crime|El]. Assim, seu [top_liege|El] pode revogar livremente seus [titles|El].

Para evitar que seu $game_concept_top_liege$ tire o que você conquistou legitimamente, certifique-se de fazer parte de um [house_bloc|El]. Caso seu $game_concept_top_liege$ declare $game_concept_war$ contra você, as [houses|El] do seu $game_concept_bloc$ se juntarão a você como [allies|El].

#I Se você já fizer parte de um $game_concept_bloc$, poderá selecioná-lo com o botão destacado.#!"
 ra_soryo_open_decisions: "$reactive_advice_soryo_intro_NAME$"
 ra_soryo_open_decisions_desc: "O desejo definitivo de qualquer [ruler|El] [GetGovernment('japan_feudal_government').GetName|l] é se tornar [shogun|El], um $game_concept_ruler$ militar e hereditário do Japão.

Para conseguir isso, há duas [decisions|El] principais que você pode tomar. Vamos dar uma olhada."
 ra_soryo_open_decisions_prompt: "$click_to_open_lesson$"
 ra_soryo_regional_dominion: "Conselho: $reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_soryo_regional_dominion_desc: "Você é [ceremonial_regent|El] do Japão e seu [ruler|El] de fato. No entanto, como [shogun|El], poderia ter ainda mais poder e controle!".

Isso permite que você conquiste o [duchy|El] da sua região local. Embora não seja necessário para se tornar [shogun|El], é um passo intermediário muito útil.

#TUT Esta $game_concept_decision$ não está disponível se você já tiver o [rank|El] de [duke|El].#!"
 ra_soryo_shogunate: ""$tgp_japan_become_shogun_decision_TUTORIAL|V$" é a [decision|El] que você deve promulgar para se tornar [shogun|El].

No entanto, para fazer isso, há três grandes obstáculos a superar:
$EFFECT_LIST_BULLET$Promulgar a [law|El] [GetLaw('japanese_bureaucracy_2').GetName]
$EFFECT_LIST_BULLET$Seu [prestige_level|E] é [prestige_i][GetModifier( 'prestige_level_4' ).GetNameWithTooltip|L] ou superior
$EFFECT_LIST_BULLET$Seu [legitimacy_level|El] é maior ou igual a #V 4#!"
 ra_soryo_shogunate_desc: "$reactive_advice_soryo_regent_become_shogun_NAME$".

No entanto, para sequer começar a considerar isso, primeiro você precisa ser [ceremonial_regent|El]."
 ra_soryo_intro_open_factions: "$reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_soryo_intro_open_factions_desc: "Aqui você pode promulgar gradualmente uma administração mais restritiva. Para se tornar [shogun|El], você precisa de pelo menos a [law|El] [GetLaw('japanese_bureaucracy_2').GetName].

Tenha em mente que isso custará [prestige|El] e reduzirá a [opinion|El] que seus [vassals|El] têm de você."
 ra_soryo_intro_open_factions_prompt: "$reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_soryo_intro_install_regent_faction: "A seguir, vamos dar uma olhada nos seus [vassals|El] [GetGovernment('japan_administrative_government').GetNameWithIcon|l]"
 ra_soryo_intro_install_regent_faction_desc: "Abra a aba "$MY_REALM_WINDOW_BODY_TITLE_SUBJECTS|V$" no painel "#V Domínio#!" (destacada)"
 ra_soryo_end: "$reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_soryo_end_desc: "Como [ruler|El] [GetGovernment('japan_feudal_government').GetName|l], você abrirá caminho à espada para se tornar [shogun|El].

Consolide o poder local, forme uma [faction|El] com seu [house_bloc|El] e talvez um dia governe como $game_concept_shogun$."
 # reactive_advice_lead_your_soryo_bloc
 action_reactive_advice_lead_your_soryo_bloc_NAME: "Liderar sua $game_concept_house_bloc$"
 action_reactive_advice_lead_your_soryo_bloc: "Conselho: $action_reactive_advice_lead_your_soryo_bloc_NAME$"
 action_reactive_advice_lead_your_soryo_bloc_desc: "Você é $game_concept_house_head$ da $game_concept_leading_house$ da sua $game_concept_bloc$. Abra isto para aprender a gerenciar sua $game_concept_bloc$."
 action_reactive_advice_lead_your_soryo_bloc_click: "$click_to_open_lesson$"
 ra_soryo_bloc_leader_intro: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 ra_soryo_bloc_leader_intro_desc: "Você é [house_head|El] da [leading_house|El] da sua [house_bloc|El], parabéns!\n\nComo líder da sua $game_concept_bloc$, ela já não é apenas um escudo, mas também uma forma de você formar uma poderosa [faction|El] para se instalar como [ceremonial_regent|El]!"
 ra_soryo_bloc_leader_open_bloc: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 ra_soryo_bloc_leader_open_bloc_desc: "Vamos dar uma olhada no seu [house_bloc|lE]."
 ra_soryo_bloc_leader_open_bloc_prompt: "Selecione seu $game_concept_bloc$ (destacado)"
 ra_soryo_bloc_leader_strength_intro: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 ra_soryo_bloc_leader_strength_intro_desc: "As [houses|El] do seu [bloc|El] se juntarão à [leading_house|El] quando ela iniciar [factions|El].

Se você desejar se tornar [ceremonial_regent|El] e, eventualmente, [shogun|El], elas se juntarão à sua $game_concept_faction$ $replace_ceremonial_regent_faction_name|V$!"
 ra_soryo_bloc_leader_strength_details: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 ra_soryo_bloc_leader_strength_details_desc: "A força de todos os membros do [bloc|El] será mostrada aqui.\n\nQuanto mais forte for o $game_concept_bloc$, mais provável será que sua [faction|El] consiga impor suas exigências e instalá-lo como [ceremonial_regent|El]."
 ra_soryo_bloc_leader_expanding: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 ra_soryo_bloc_leader_expanding_desc: "Um [bloc|El] forte é aquele composto por muitas [houses|El] poderosas.

No mapa, você pode ver a extensão de todos os $game_concept_blocs$ e encontrar quaisquer [house_heads|El] sem [Concept( 'bloc', '$game_concept_bloc|q$' )|l]. Você pode tentar convencê-los a se juntar ao seu bloco usando a [character_interaction|El] $invite_to_house_bloc_interaction|V$.

No entanto, eles nem sempre aceitarão... Em vez disso, como [ruler|El] [GetGovernment('japan_feudal_government').GetName|l], você pode expandir seu bloco por meio da [war|El].

Você tem duas opções:
$EFFECT_LIST_BULLET$A [bloc_expansion|El] permite conquistar terras que passam a ficar sob o controle do seu [Concept( 'bloc', '$game_concept_bloc|q$' )|l].
$EFFECT_LIST_BULLET$A [bloc_supremacy|El] é uma guerra total entre dois [Concept( 'blocs', '$game_concept_blocs|q$' )|l], em que os membros do [Concept( 'bloc', '$game_concept_bloc|q$' )|l] perdedor podem se juntar ao vencedor."
 ra_soryo_bloc_leader_cohesion: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 ra_soryo_bloc_leader_cohesion_desc: "Tentar unificar [houses|El] dispares em um [bloc|El] maior traz seus desafios, pois cada $game_concept_house$ contribui para a [cohesion|El] geral do $game_concept_bloc$.

Além das bonificações concedidas por uma $game_concept_cohesion$ alta, você precisa de uma certa quantidade de $game_concept_cohesion$ para sequer formar uma [faction|El]."
 ra_soryo_bloc_leader_cohesion_2: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 ra_soryo_bloc_leader_cohesion_2_desc: "Para melhorar a [cohesion|El] de uma determinada [house|El], primeiro certifique-se de que vocês compartilham a mesma [house_aspiration|El], usando a [character_interaction|El] $demand_aspiration_change_interaction|V$ no [house_head|El] dela.

Ainda assim, a $game_concept_cohesion$ se baseia principalmente em boas [house_relations|El] entre todas as $game_concept_houses$ do [bloc|El]. As $game_concept_house_relations$ podem melhorar, por exemplo, ao arranjar casamentos com membros da $game_concept_house$.

Se todo o resto falhar, você pode simplesmente usar a $game_concept_character_interaction$ $kick_from_house_bloc_interaction|V$."
 ra_soryo_bloc_end: "$action_reactive_advice_lead_your_soryo_bloc_NAME$"
 ra_soryo_bloc_end_desc: "Como líder de seu [bloc|El], conquiste mais terras por meio da [war|El] para garantir seu crescimento.

Se você tiver um $game_concept_bloc$ forte com uma [cohesion|El] elevada, estará pronto para formar sua [faction|El] $replace_ceremonial_regent_faction_name|V$!"
 # You are soryo regent, but not yet shogun
 reactive_advice_soryo_regent_become_shogun_NAME: "Formar $empire_shogunate_japanese$"
 action_reactive_advice_soryo_regent_become_shogun: "Conselho: $reactive_advice_soryo_regent_become_shogun_NAME$"
 action_reactive_advice_soryo_regent_become_shogun_desc: "Você é $game_concept_ceremonial_regent$. Abra isto para saber como consolidar ainda mais seu poder e se tornar $game_concept_shogun$."
 action_reactive_advice_soryo_regent_become_shogun_click: "$click_to_open_lesson$"
 ra_become_shogun_intro: "Conselho: $reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_become_shogun_intro_desc: "Você é [ceremonial_regent|El] do Japão e seu [ruler|El] de fato. No entanto, como [shogun|El], poderia ter ainda mais poder e controle!"
 ra_become_shogun_open_decisions: "$reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_become_shogun_open_decisions_desc: "Para se tornar [shogun|El], você deve cumprir alguns requisitos. Vamos dar uma olhada agora."
 ra_become_shogun_open_decisions_prompt: "$TUTORIAL_OPEN_DECISION_PANEL_PROMPT$"
 ra_become_shogun_decision: "$reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_become_shogun_decision_desc: ""$tgp_japan_become_shogun_decision_TUTORIAL|V$" é a [decision|El] que você deve promulgar para se tornar [shogun|El].

No entanto, para fazer isso, há três grandes obstáculos a superar:
$EFFECT_LIST_BULLET$Promulgar a [law|El] [GetLaw('japanese_bureaucracy_2').GetName]
$EFFECT_LIST_BULLET$Seu [prestige_level|E] é [prestige_i][GetModifier( 'prestige_level_4' ).GetNameWithTooltip|L] ou superior
$EFFECT_LIST_BULLET$Seu [legitimacy_level|El] é maior ou igual a #V 4#!"
 ra_become_shogun_open_laws: "$reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_become_shogun_open_laws_desc: "Primeiro, vamos dar uma olhada no estado de suas [laws|El]."
 ra_become_shogun_open_laws_prompt: "Abra a aba "$MY_REALM_WINDOW_BODY_TITLE_LAWS|V$" no painel "#V Domínio#!" (destacado)"
 ra_become_shogun_laws: "$reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_become_shogun_laws_desc: "Aqui você pode promulgar gradualmente uma administração mais restritiva. Para se tornar [shogun|El], você precisa de pelo menos a [law|El] [GetLaw('japanese_bureaucracy_2').GetName].

Tenha em mente que isso custará [prestige|El] e reduzirá a [opinion|El] que seus [vassals|El] têm de você."
 ra_become_shogun_open_subjects: "$reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_become_shogun_open_subjects_desc: "A seguir, vamos dar uma olhada nos seus [vassals|El] [GetGovernment('japan_administrative_government').GetNameWithIcon|l]"
 ra_become_shogun_open_subjects_prompt: "Abra a aba "$MY_REALM_WINDOW_BODY_TITLE_SUBJECTS|V$" no painel "#V Domínio#!" (destacada)"
 ra_become_shogun_subjects: "$reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_become_shogun_subjects_desc: "Você não pode se tornar [shogun|El] sem remover quaisquer vestígios antiquados do [government|El] [GetGovernment('japan_administrative_government').GetNameWithIcon|l].

Se algum dos seus [vassals|El] for $japan_administrative_government$, você poderá encontrá-lo aqui e tomar seus [titles|El] por meio da [character_interaction|El] $revoke_title_interaction|V$."
 ra_become_shogun_end: "$reactive_advice_soryo_regent_become_shogun_NAME$"
 ra_become_shogun_end_desc: "As rédeas do poder já estão em suas mãos; basta segurá-las com firmeza para se tornar [shogun|El].

Promulgue a lei [GetLaw('japanese_bureaucracy_2').GetName] e o país será seu!"
