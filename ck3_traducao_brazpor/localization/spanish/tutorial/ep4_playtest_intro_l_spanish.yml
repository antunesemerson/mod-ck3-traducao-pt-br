 ### MANDALA
 action_lesson_tgp_playtest_intro_mandala: "Governo Mandala"
 action_lesson_tgp_playtest_intro_mandala_desc: "O mandala é um governo especial focado em Piedade e tributários. Abra isto para uma introdução a este governo."
 action_lesson_tgp_playtest_intro_mandala_click: "$click_to_open_lesson$"
 lesson_tgp_playtest_intro_mandala_step_intro: "Mandala"
 lesson_tgp_playtest_intro_mandala_step_intro_desc: "Você é um [ruler|lE] [mandala|lE]!

O $game_concept_mandala$ é um [government|lE] especial do Sudeste Asiático focado na fé e na [piety|lE]."
 lesson_tgp_playtest_intro_mandala_step_government: "Complexo de Templos"
 lesson_tgp_playtest_intro_mandala_step_government_desc: "Sua base de poder vem de uma rede mais fluida de [tributaries|lE] e de apenas alguns [vassals|lE] mais permanentes.

Isso significa que você pode "Como [house_head|lE] [mandala|lE], sua [house|lE] possui um [mandala_aspect|lE], semelhante a um [powerful_family_attribute|lE] do Império Bizantino.

Este atributo não afeta o seu [liege|lE], se você tiver um, e pode ser melhorado com o tempo gastando [piety|lE] e [prestige|lE]." tributários de outro [ruler|lE] mandala; por exemplo, usando a [character_interaction|lE] $offer_tributary_status_interaction|V$.

A religião também desempenha um papel central no [mandala_government|lE]. Para realizar muitas ações centrais ao governo, você precisará gastar [piety|lE]."
 lesson_tgp_playtest_intro_mandala_step_temple_complex: "Complexo de Templos"
 lesson_tgp_playtest_intro_mandala_step_temple_complex_desc: "Além disso, para expandir os limites de tamanho do seu [realm|lE], você deve melhorar o [great_building|lE] Complexo de Templos da sua [capital|lE].

Isso é feito iniciando um [great_project|lE]. Esse projeto pode ser bem caro, mas se seus [subjects|lE] adicionarem [great_project_contributions|lE] próprias, você não precisará pagar o custo total.

#I Você pode iniciar Grandes Projetos na aba "Grandes Projetos" do painel "$DECISIONS_VIEW_TITLE$".#!"
 lesson_tgp_playtest_intro_mandala_step_mandala_aspect: "Aspecto Mandala"
 lesson_tgp_playtest_intro_mandala_step_mandala_aspect_desc: "Como [house_head|lE] [mandala|lE], sua [house|lE] possui um [mandala_aspect|lE], semelhante a um [powerful_family_attribute|lE] do Império Bizantino.

Este atributo não afeta o seu [liege|lE], se você tiver um, e pode ser melhorado com o tempo gastando [piety|lE] e [prestige|lE]."
 lesson_tgp_playtest_intro_mandala_step_end: "Governo Mandala"
 lesson_tgp_playtest_intro_mandala_step_end_desc: "Um grande [ruler|lE] [mandala|lE] se baseia na [piety|lE], nos [tributaries|lE] e na força de seu [mandala_aspect|lE]. Domine-os e sua influência se estenderá por todo o Sudeste Asiático."
