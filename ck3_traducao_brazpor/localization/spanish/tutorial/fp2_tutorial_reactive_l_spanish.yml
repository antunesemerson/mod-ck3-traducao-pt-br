l_spanish:
 reactive_advice_struggle: "Contendas"
 action_reactive_advice_struggle: "Conselho: Contendas"
 action_reactive_advice_struggle_desc: "Você pode participar de uma Contenda. Abra isto para aprender mais sobre o que isso significa para você."
 action_reactive_advice_struggle_click: "$click_to_open_lesson$"
 lessons_struggle_introduction: "Contendas"
 lessons_struggle_introduction_desc: "Agora você faz parte de uma [struggle|lE]!\n\nAs [struggle_struggles|lE] são conflitos prolongados dentro de uma [region|lE] onde as ações de todos os participantes mudam o estado da área, estabelecendo diferentes [struggle_phase_phases|lE]. As mudanças no estado da região trazem efeitos para a [war|lE], [faith|lE] e [culture|lE].\n\nEm última instância, todos os participantes competem para ser quem decidirá como a [struggle|lE] termina, afetando todos os participantes na região."
 reactive_advice_struggle_introduction: "$lessons_struggle_introduction$"
 lessons_struggle_region_open: "Região da Contenda"
 lessons_struggle_region_open_desc: "A [struggle_region|lE] é delimitada por uma nova fronteira que é destacada quando você passa o mouse sobre o botão da Contenda. Apenas personagens que possuem terras na região participam da [struggle|lE].\n\n#TUT [characters|lE] fora da região podem se juntar a uma [struggle|lE] adquirindo terras dentro da [struggle_region|lE] e movendo sua [capital|lE] para a área.#!"
 lessons_struggle_view_open: "Acessando a Tela da Contenda"
 lessons_struggle_view_open_desc: "Aqui você pode abrir a tela da [struggle|E], onde pode revisar todas as informações relacionadas a ela."
 lessons_struggle_view_open_prompt: "Abrir a tela da [struggle|lE]"
 lessons_struggle_view: "Tela da Contenda"
 lessons_struggle_view_desc: "Na Tela da Contenda, você pode aprender mais sobre a [struggle_phase|lE] atual e seus efeitos. Também pode ver as próximas fases potenciais e os [struggle_catalyst_catalysts|lE] que precisa completar para conduzir a [struggle|lE] em direção a elas."
 lessons_struggle_current_phases_and_effects: "Fases Atuais e Efeitos"
 lessons_struggle_current_phases_and_effects_desc: "A [struggle_phase|lE] atual repercute sobre toda a [struggle_region|E] e aplica efeitos especiais sobre os participantes [Concept( 'struggle_involved', 'envolvidos' )|E], [Concept( 'struggle_interloper', 'intrometidos' )|E] e [Concept( 'struggle_uninvolved', 'não envolvidos' )|E].\n\nNesta seção, você pode revisar os efeitos de fase sobre a [war|lE], a [faith|lE] ou a [culture|lE], entre outros."
 lessons_next_struggle_phases: "Próximas Fases da Contenda"
 #TODO_CD: The key should not use POINT_BASED_PHASE_DEFAULT_DURATION because it's valid only for point-based phases
 lessons_next_struggle_phases_desc: "La [struggle_phase|lE] actual llegará a su fin cuando una de las siguientes fases posibles alcance un progreso de [GetDefine('NStruggle', 'POINT_BASED_PHASE_DEFAULT_DURATION')]. Para aumentar el progreso de cualquiera de las siguientes fases posibles, debes completar los [struggle_catalyst_catalysts|lE] que aparecen bajo ellas.\n\n#TUT Revisa las siguientes fases posibles para saber más sobre ellas, sus efectos y el progreso reciente del [struggle_catalyst|lE]. Al seleccionarlas, se abrirá la lista de [Concept( 'struggle_catalyst', 'catalizadores' )|E], que tú u otros participantes [Concept( 'struggle_involved', 'involucrados' )|E] podréis completar las veces que queráis.#!"
 lessons_ending_struggle_open: "Encerrando a Contenda"
 lessons_ending_struggle_open_desc: "A [struggle|lE] continuará mudando de fase até que um participante acione uma das Decisões de Encerramento e finalize a [struggle|lE]. Você sempre pode verificar as Decisões de Encerramento para conferir os requisitos e efeitos."
 lessons_ending_struggle_open_prompt: "Abrir as Decisões de Encerramento"
 lessons_ending_struggle: "Encerrando a Contenda"
 lessons_ending_struggle_desc: "Aqui você pode ver todas as Decisões de Encerramento para a [struggle|lE].\n\nLembre-se de que cada Decisão de Encerramento exige que você esteja em uma fase específica para acioná-la. Você será notificado se uma delas estiver disponível."
 lessons_explore_struggle_open: "Explorar a Contenda"
 lessons_explore_struggle_open_desc: "Agora você conhece todos os conceitos básicos e está pronto para sua primeira [struggle|lE].\n\nVerificar os efeitos da fase atual e as próximas fases potenciais em que talvez queira trabalhar é um bom ponto de partida."
 lessons_struggle_involvement_view_open: "Envolvimento na Contenda"
 lessons_struggle_involvement_view_open_desc: "Em uma [struggle|lE], todos os [characters|lE] da região podem ativar [struggle_catalyst_catalysts|lE]. Portanto, é importante saber quem são os participantes [Concept( 'struggle_involved', 'envolvidos' )|lE] e [Concept( 'struggle_interloper', 'intrometidos' )|lE]. A Tela de Envolvimento na [struggle|lE] oferece informações sobre isso."
 lessons_struggle_involvement_view_open_prompt: "Abrir a tela de Participação na Contenda"
 lessons_struggle_involvement_view: "Envolvimento na Contenda"
 lessons_struggle_involvement_view_desc: "Aqui você pode ver as informações sobre seu envolvimento, junto com uma análise do que faz de você [struggle_involved|lE], [struggle_interloper|lE] ou [struggle_uninvolved|lE].\n\nJunto com suas informações pessoais, você pode ver a lista de participantes na [struggle|lE] e seu envolvimento. Aqui também podem ser encontradas as [struggle_involved_cultures|lE] e [struggle_involved_faiths|lE].\n\n#TUT Conhecer o envolvimento de outros jogadores é importante ao planejar quais Catalisadores você pode querer perseguir, pois eles podem levar você a mirar outro participante, [faith|E] ou [culture|E] da [struggle|lE].#!"
