 lesson_basics_renown_no_GUI_highlight_2: "Get married — select a Spouse for your Character and click #TUT_KW Send Proposal #! to suggest the union"
 lesson_basics_renown_desc: "Como membro de uma [dynasty|lE], você também tem [dynasty_prestige|lE]. O $game_concept_dynasty_prestige$ à compartilhado por todos em sua $game_concept_dynasty$ e cresce de v?rias formas, refletindo a fama ou a inf?mia da sua #EMP dinastia#!, não apenas a sua.

Aumentar seu $game_concept_dynasty_prestige$ ecoar? por gerações em seus descendentes, elevando seu [dynasty_prestige_level|lE]. Como [dynast|lE] (o membro mais poderoso da sua $game_concept_dynasty$), o Renome permitir? desbloquear [dynasty_perks|lE] que beneficiar?o todos os seus parentes.

#TUT Para ver o $game_concept_dynasty_perk$ de uma dinastia, clique no brasão din?stico dela.#!"
 #Marriage
 lesson_basics_marriage_concept_1: "Família é importante! O [player_heir|lE] virá sempre da sua [dynasty|lE], e na maioria das vezes de sua [house|lE].\n\n#TUT No futuro, não faz mal ficar de olho na sua família - e #EMP deles #! [line_of_succession|lE]. Dependendo das [succession_laws|lE], você pode acabar herdando [titles|lE] (along with land and [vassals|lE]) from your relatives.#!"
 lesson_basics_marriage_concept_1_desc: "Para garantir o futuro da sua [dynasty|lE], você precisa de membros da família. Ajuda se você for [married|lE], mas não podemos prometer que você vai se casar por amor. @arrange_marriage_icon!"
 lesson_basics_marriage_concept_2: "Terrenos e títulos ($lesson_basics_titles$)"
 lesson_basics_marriage_concept_2_b: "Nem todos na sua [dynasty|lE] terão terras, mas todas as parcelas do mapa #EMP tienen#! têm \n\nÀs vezes você será esse dono, às vezes será um de seus [vassals|lE] e às vezes será outro reino totalmente distinto (muitos dos quais também têm ou são vassalos)."
 lesson_basics_marriage_concept_2_desc: "Títulos ($lesson_basics_titles$)"
 lesson_basics_marriage_concept_2_b_desc: "A maioria dos [titles|lE] pertence a uma hierarquia em forma de pir?mide, de acordo com o [title_tier|lE] do t?tulo:\n\n[barony|E]: governada por um bar?o ou baronesa\n[county|E]: governado por um conde ou condessa\n[duchy|E]: governado por um duque ou duquesa\n[kingdom|E]: governado por um rei ou rainha\n[empire|E]: governado por um imperador ou imperatriz\n\nLegalmente, todo t?tulo faz parte de um t?tulo um n?vel acima na cadeia; por exemplo, todo condado faz parte de um ducado.\n\n#TUT Nota: h? muitos nomes din?micos para esses t?tulos. Seu [ruler|lE] atual est? a cargo de um "Pequeno Reino", que corresponde ao n?vel de [duchy|lE].#!"
 lesson_basics_marriage_instruction_open_window: "De Jure $lesson_basics_de_jure_titles$"
 lesson_basics_marriage_instruction_open_window_desc: "Dizemos "legalmente" porque, como Crusader Kings III nos permite jogar com a história, não há como garantir que um [king|lE] controle #EMP realmente#! todos os [titles|lE] que "supostamente" estão dentro das fronteiras de seu [kingdom|lE].\n\nChamamos essa hierarquia de títulos [de_jure|lE] e, se a estrutura for quebrada, muitas vezes é possível declarar guerra por territórios extraviados.\n\n#TUT Se você mudar para o modo de mapa Títulos de ducados, verá que, como governante do [duchy|lE] de $d_munster$, o [county|lE] de $c_desmond$ deveria, legalmente, fazer parte do seu domínio.#!"
 lesson_basics_open_interactions_marriage_tt: "$lesson_basics_de_jure_cbs$"
 lesson_basics_open_interactions_marriage_alt_tt: "$lesson_basics_de_jure_cbs$"
 lesson_basics_marriage_view_tt: "Mude para o modo de mapa de títulos de Ducado"
 lesson_basics_find_spouse_concept: "Retornar ao modo de mapa de Reinos"
 lesson_basics_find_spouse_concept_desc: "Suas Propriedades ($lesson_basics_holdings$)"
 lesson_basics_arrange_marriage_concept: "O título [de_jure|lE] de Munster consiste em quatro [counties|lE]. Seus nomes devem estar vis?veis no mapa: $c_thomond$ e $c_ennis$ (mantidos por você), $c_desmond$ (mantido por um [ruler|lE] vizinho) e $c_ormond$ (mantido por seu [vassal|lE]).

Essas [counties|lE] são compostas por partes menores de terra: [baronies|lE], as [holdings|lE] individuais de um [realm|lE].

#TUT As posses representam assentamentos em suas terras!#!"
 lesson_basics_arrange_marriage_concept_desc: "Seus edifícios ($lesson_basics_holdings$)"
 lesson_basics_choosing_a_spouse: "Edíficios ($lesson_basics_holdings$)"
 lesson_basics_choosing_a_spouse_no_GUI_highlight: "As [holdings|lE] fornecem diferentes níveis de [taxes|lE] e [levies|lE], bem como os [buildings|lE] que você pode construir e melhorar, dependendo do [holding_type|lE].\n\n#TUT Sugerimos que você comece melhorando os #TUT_KW lienzos amurallados.#!#!"
 lesson_basics_choosing_a_spouse_desc: "Clique na sua posse de capital ($cn_luimneach$), selecione #TUT_KW $building_curtain_walls_01$#! entre seus edifícios e #TUT_KW Mejora#! a estrutura"
 send_marriage_proposal_button_name: "$lesson_basics_holdings_and_buildings$"
 lesson_basics_say_yes: "Muito bem! Ainda levar? algum tempo para o [building|lE] ficar pronto. Limerick não foi constru?da em um dia... Sinta-se à vontade para fechar a janela de constru??o #EMP $building_type_curtain_walls_01$#!.

#TUT Quando a constru??o for conclu?da, você receber? os benef?cios do edif?cio ou melhoria escolhidos.#!"
 lesson_basics_said_yes: "Tributação ($lesson_basics_holdings$)"
 lesson_basics_say_yes_desc: "Toda [holding|lE] fornece [taxes|lE] ao seu [holder|lE]. Se esse titular for um [vassal|lE], ele pagar? impostos, por sua vez, ao seu [liege|lE].\n\nOs impostos s?o sua principal fonte de [gold_i] [gold|lE] [income|lE]!\n\n#TUT As [obligations|lE] podem afetar o quanto esses impostos s?o altos ou baixos. Estar em [war|lE] pode influenciar o n?vel de [control|lE] em um [county|lE], o que por sua vez afeta os impostos.#!"
 lesson_basics_get_married_tt: "Get married — select a Spouse for your Character and click #TUT_KW Send Proposal #! to suggest the union"
 lesson_basics_already_married: "Vassalos ($lesson_basics_vassals$)"
 lesson_basics_already_married_desc: "Abra a visualização do Reino no lado direito da tela (destacado)"
 lesson_basics_marriage_final_notes: "Inspecione o separador Vassalos"
 lesson_basics_marriage_final_notes_desc: "Como [ruler|lE], à prov?vel que você seja [liege|lE] de pelo menos um [vassal|lE]. Esses são $game_concept_rulers$ que juraram fidelidade a você e, portanto, fazem parte do seu [realm|lE].

#TUT Vassalos fornecem [gold|lE] ([taxes|lE]) e soldados ([levies|lE]).

? possível ser $game_concept_liege$ e $game_concept_vassal$ ao mesmo tempo.#!"
 #Dynasty & House
 lesson_basics_dynasty_and_house: "$lesson_basics_vassals_concept$"
 lesson_basics_dynasty_and_house_desc: "Família é importante! O [player_heir|lE] virá sempre da sua [dynasty|lE], e na maioria das vezes de sua [house|lE].\n\n#TUT No futuro, não faz mal ficar de olho na sua família - e #EMP deles #! [line_of_succession|lE]. Dependendo das [succession_laws|lE], você pode acabar herdando [titles|lE] (along with land and [vassals|lE]) from your relatives.#!"
 #Titles & Holdings
 lesson_basics_landed_titles: "Aqui também você pode alterar os [vassal_contracts|lE], que determinam quantas [levies|lE] e [taxes|lE] um [vassal|lE] feudal entrega a você."
 lesson_basics_landed_titles_desc: "$lesson_basics_vassals_concept$"
 lesson_basics_de_jure_titles: "Vale a pena manter seus [vassals|lE] felizes. Isso os manter? fora de [schemes|lE] e [factions|lE] contra você.

N?o importa o qu?o poderoso seja seu [character|lE] como [ruler|lE], se seu [realm|lE] se unir contra você, seja para [depose|lE] você por meio de uma [war|lE] ou simplesmente para [GetScheme('murder').GetTypeName|l] você enquanto dorme, seu reinado estar? fadado a ser breve.

#TUT Alguns de seus vassalos podem servir em seu [council|lE], tornando a [opinion|lE] deles ainda mais importante, pois você confiar? a eles [councillor_tasks|lE].#!"
 lesson_basics_de_jure_titles_desc: "Limite de vassalos ($lesson_basics_vassals$)"
 lesson_basics_de_jure_cbs: "H? um limite de [vassals|lE] de que voc? pode se encarregar confortavelmente antes que seu [realm|lE] se torne dif?cil de controlar. Ultrapassar esse [vassal_limit|lE] afeta os [taxes|lE] e [levies|lE] que voc? recebe.\n\nIsso n?o importa para o tutorial, mas, quando come?ar a criar seu pr?prio reino, tome cuidado para n?o crescer r?pido demais.\n\n#TUT Se voc? acabar excedendo seu limite de vassalos, pode conceder t?tulos de n?vel inferior aos seus vassalos. ?s vezes, voc? pode at? mesmo [create|lE] t?tulos de [title_tier|lE] superior #EMP novos#! para consolidar seu poder em uma regi?o e fortalecer seu dom?nio sobre os t?tulos inferiores [de_jure|lE] subordinados ao seu novo t?tulo.#!"
 lesson_basics_de_jure_cbs_desc: "Dizemos "legalmente" porque, como Crusader Kings III nos permite jogar com a história, não há como garantir que um [king|lE] controle #EMP realmente#! todos os [titles|lE] que "supostamente" estão dentro das fronteiras de seu [kingdom|lE].\n\nChamamos essa hierarquia de títulos [de_jure|lE] e, se a estrutura for quebrada, muitas vezes é possível declarar guerra por territórios extraviados.\n\n#TUT Se você mudar para o modo de mapa Títulos de ducados, verá que, como governante do [duchy|lE] de $d_munster$, o [county|lE] de $c_desmond$ deveria, legalmente, fazer parte do seu domínio.#!"
 lesson_basics_de_jure_cbs_complete_1: "Reino e Domínio ($lesson_basics_domain$)"
 lesson_basics_de_jure_cbs_complete_2: "Seu #EMP [realm|lE]#! é o conjunto de terras e [titles|lE] que você controla, incluindo as áreas mantidas por seus [vassals|lE]. No momento, isso significa os [counties|lE] de $c_ennis$, $c_thomond$ e $c_ormond$ (chamados de earldoms devido à sua [culture|lE] irlandesa).\n\nQuando falamos de #EMP [domain|lE]#! nos referimos ao território que você possui pessoalmente, sem vassalos. Ou seja, $c_ennis$ e $c_thomond$.\n\n#TUT Algumas coisas afetarão apenas seu [domain|lE] ($c_ennis$ e $c_thomond$), enquanto outras terão impacto sobre todo o seu [realm|lE]: o [duchy|lE] (ou pequeno reino) de Munster.#!"
 lesson_basics_change_map_mode_1_tt: "Reino e Domínio ($lesson_basics_domain$)"
 lesson_basics_change_map_mode_2_tt: "Um exemplo: o [county|lE] de Essex est? sofrendo uma queda no n?mero de soldados dispon?veis, porque a ?rea est? infestada de #EMP canibais#!. O [holder|lE] de Essex ser? notificado sobre isso, pois est? dentro dos limites de seu [domain|lE], mas seu [liege|lE] n?o. \n\n#TUT O #EMP suserano#! do conde de Essex tem Essex dentro do seu [realm|lE], mas s? descobrir? o que est? acontecendo se clicar no condado no mapa e vir o modificador. Ou, ent?o, se notar que seu vassalo est? fornecendo menos tropas.#!"
 lesson_basics_holdings_and_buildings: "$lesson_basics_domain_1$"
 lesson_basics_holdings_and_buildings_desc: "O título [de_jure|lE] de Munster consiste em quatro [counties|lE]. Seus nomes devem estar vis?veis no mapa: $c_thomond$ e $c_ennis$ (mantidos por você), $c_desmond$ (mantido por um [ruler|lE] vizinho) e $c_ormond$ (mantido por seu [vassal|lE]).

Essas [counties|lE] são compostas por partes menores de terra: [baronies|lE], as [holdings|lE] individuais de um [realm|lE].

#TUT As posses representam assentamentos em suas terras!#!"
 lesson_basics_buildings: "Tarefas do Conselho ($lesson_basics_council$)"
 lesson_basics_buildings_no_GUI_highlight: "Voc? pode p?r os [councillors|lE] para trabalhar, e todos fazem coisas diferentes!\n\nVoc? pode mudar a tarefa de um conselheiro clicando no bot?o perto do retrato dele na vis?o do Conselho.\n\n#TUT Ser conselheiro ? uma posi??o prestigiosa ? [powerful_vassals|lE] esperam ser nomeados e ficar?o insatisfeitos se forem deixados de fora.#!"
 lesson_basics_buildings_desc: "As [holdings|lE] fornecem diferentes níveis de [taxes|lE] e [levies|lE], bem como os [buildings|lE] que você pode construir e melhorar, dependendo do [holding_type|lE].\n\n#TUT Sugerimos que você comece melhorando os #TUT_KW lienzos amurallados.#!#!"
 lesson_basics_start_construction_tt: "Esquemas ($lesson_basics_schemes$)"
 lesson_basics_buildings_complete: "$lesson_basics_schemes_concept$"
 lesson_basics_buildings_complete_desc: "Muito bem! Ainda levar? algum tempo para o [building|lE] ficar pronto. Limerick não foi constru?da em um dia... Sinta-se à vontade para fechar a janela de constru??o #EMP $building_type_curtain_walls_01$#!.

#TUT Quando a constru??o for conclu?da, você receber? os benef?cios do edif?cio ou melhoria escolhidos.#!"
 lesson_basics_taxes: "Inspecione o separador Ganchos e Segredos"
 lesson_basics_taxes_desc: "$lesson_basics_schemes_concept$"
 #Vassals
 lesson_basics_vassals_concept: "$lesson_basics_schemes_concept$"
 lesson_basics_realm_view_tt: "A influência [scheme|lE] é feito para aumentar a [opinion|lE] alguém tem de seu personagem. Vamos experimentar!"
 lesson_basics_vassals_tab_tt: "$lesson_basics_schemes_concept$"
 lesson_basics_vassals_concept_desc: "Como [ruler|lE], à prov?vel que você seja [liege|lE] de pelo menos um [vassal|lE]. Esses são $game_concept_rulers$ que juraram fidelidade a você e, portanto, fazem parte do seu [realm|lE].

#TUT Vassalos fornecem [gold|lE] ([taxes|lE]) e soldados ([levies|lE]).

? possível ser $game_concept_liege$ e $game_concept_vassal$ ao mesmo tempo.#!"
 lesson_basics_vassals_concept_complete_2: "Este [weak_hook|lE] serve para v?rias coisas. Por exemplo, você pode aumentar as [obligations|lE] definidas pelo [vassal_contract|lE] que possui com um [vassal|lE] [GetGovernment('feudal_government').GetName|lE].

#TUT Para acessar o menu de alteração do seu Contrato de Vassalagem, v? até sua lista de vassalos na visão do Reino ou clique com o bot?o direito no retrato dele para escolher #TUT_KW Modificar Contrato de Vassalagem#!.

Voc? pode notar que algumas interações não estáo imediatamente vis?veis. Quando h? muitas interações dispon?veis, o menu de interação do [character|lE] mostra apenas as mais comuns.

Para mostrar as que faltam, clique no bot?o "Mais..." em uma categoria.#!"
 lesson_basics_vassals_concept_great_job: "$lesson_basics_vassals_concept$"
 lesson_basics_vassals_concept_great_job_desc: "Culturas"
 lesson_basics_vassals_concept_greyed_out: "Cada [character|lE] e [county|lE] pertence a uma [culture|lE]. [SelectLocalization( GetPlayer.IsValid, 'lesson_basics_culture_open_view_desc_INGAME', '' )]"
 lesson_basics_vassals_concept_greyed_out_desc: "\n\nSeu atual [ruler|lE] faz parte da cultura [GetPlayer.GetCulture.GetNameNoTooltip], como mostrado no canto inferior esquerdo."
 lesson_basics_happy_vassals: "Abrir a Visualização de Cultura (destacado)"
 lesson_basics_happy_vassals_desc: "Vale a pena manter seus [vassals|lE] felizes. Isso os manter? fora de [schemes|lE] e [factions|lE] contra você.

N?o importa o qu?o poderoso seja seu [character|lE] como [ruler|lE], se seu [realm|lE] se unir contra você, seja para [depose|lE] você por meio de uma [war|lE] ou simplesmente para [GetScheme('murder').GetTypeName|l] você enquanto dorme, seu reinado estar? fadado a ser breve.

#TUT Alguns de seus vassalos podem servir em seu [council|lE], tornando a [opinion|lE] deles ainda mais importante, pois você confiar? a eles [councillor_tasks|lE].#!"
 lesson_basics_vassal_limit: "[SelectLocalization(ObjectsEqual(GetPlayer, GetPlayer.GetCulture.GetCultureHead), 'lesson_basics_culture_culture_head_desc_YOU', 'lesson_basics_culture_culture_head_desc_OTHER' )]"
 lesson_basics_vassal_limit_desc: "Você é o Culture Head da sua Cultura."
 #Domain
 lesson_basics_domain_1: "Culturas (Inovações)"
 lesson_basics_domain_1_desc: "Sua [culture|lE] determina quais [innovations|lE] você tem acesso, mostrado na aba Inovações."
 lesson_basics_domain_1_b: "Abra a aba Inovações (destacado)"
 lesson_basics_domain_1_b_desc: "Culturas (Inovações)"
 lesson_basics_domain_2: "[innovations|lE] são as invenções e adaptações que uma [culture|lE] pode descobrir ao longo do tempo. $game_concept_innovations$ dão novos bônus, [buildings|lE] e [men_at_arms|lE] para todos os membros da $game_concept_culture$.\n\nAs inovações são agrupadas em [eras|lE], então a maioria das inovações simplesmente não estão disponíveis nas partes iniciais do jogo. [SelectLocalization( GetPlayer.IsValid, 'lesson_basics_culture_innovations_desc_INGAME', '' )]"
 lesson_basics_domain_2_desc: "Sua Cultura está atualmente na Era [GetPlayer.GetCulture.GetCultureEra.GetName|l]."
 #Council
 lesson_basics_council_concept: "As [innovations|lE] geralmente s?o descobertas muito lentamente. No entanto, o [culture_head|lE] tamb?m pode fazer com que uma [culture|lE] descubra uma inova??o mais rapidamente, ao escolh?-la como [fascination|lE] da cultura (destacada).\n\n#I Quando voc? ? o l?der cultural, pode clicar em uma inova??o para defini-la como a nova fascina??o.#!\n\nAs culturas tamb?m descobrem inova??es mais rapidamente se elas j? tiverem sido descobertas por culturas vizinhas."
 lesson_basics_council_concept_desc: "Gerenciar um [realm|lE] é um trabalho árduo. Como [ruler|lE], você conta com a ajuda do seu [council|lE] - eles podem ser [vassals|lE] ou membros da sua [court|lE], e atuam como seus conselheiros de confiança.\n\n#TUT Existe uma posição no Conselho correspondente a cada [skill|lE], e [rulers|lE] casados também terão seus [spouse|lE] os ajudando.#!"
 lesson_basics_council_view_tt: "Fés e Religiões"
 lesson_basics_council_tasks: "$lesson_basics_religion_1$"
 lesson_basics_council_tasks_desc: "Todos os [characters|lE] creem em uma [faith|lE] que, por sua vez, pertence a uma [religion|lE]. Por exemplo, o catolicismo é uma fé que pertence ao cristianismo.\n\nTodas as fés são diferentes umas das outras. Vamos dar uma olhada mais de perto."
