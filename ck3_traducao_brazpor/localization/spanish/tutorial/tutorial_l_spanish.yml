 lesson_basics_schemes_sway_complete_desc: "$lesson_basics_levies$"
 tutorial_basic_schemes_start_swaying_tt: "Os eventos mais importantes em qualquer guerra são as [battles|lE], travadas por [armies|lE]. A maioria dos seus soldados vir? de [levies|lE], mas você pode expandir seu $game_concept_army$ empregando [men_at_arms|lE].

#TUT Se as coisas ficarem realmente dif?ceis, você também pode contratar [mercenaries|lE], desde que tenha [gold|lE].#!"
