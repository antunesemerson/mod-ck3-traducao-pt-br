 lesson_basics_interacting_1_desc: "Como membro de uma [dynasty|lE], você também tem [dynasty_prestige|lE]. O $game_concept_dynasty_prestige$ à compartilhado por todos em sua $game_concept_dynasty$ e cresce de v?rias formas, refletindo a fama ou a inf?mia da sua #EMP dinastia#!, não apenas a sua.

Aumentar seu $game_concept_dynasty_prestige$ ecoar? por gerações em seus descendentes, elevando seu [dynasty_prestige_level|lE]. Como [dynast|lE] (o membro mais poderoso da sua $game_concept_dynasty$), o Renome permitir? desbloquear [dynasty_perks|lE] que beneficiar?o todos os seus parentes.

