#TUT Para acessar o menu de alteração do seu Contrato de Vassalagem, v? até sua lista de vassalos na visão do Reino ou clique com o bot?o direito no retrato dele para escolher #TUT_KW Modificar Contrato de Vassalagem#!.

Voc? pode notar que algumas interações não estáo imediatamente vis?veis. Quando h? muitas interações dispon?veis, o menu de interação do [character|lE] mostra apenas as mais comuns.

Para mostrar as que faltam, clique no bot?o "Para que o tempo comece a correr, despause o jogo (usando a #EMP barra de espa?o#! ou clicando no bot?o Jogar, no canto inferior direito).\n\nDessa forma, os dias, meses e anos passar?o. Os ex?rcitos que receberam ordem de marchar se mover?o; eventos aparecer?o na tela; cartas ser?o enviadas e os [characters|lE] envelhecer?o.\n\n#TUT Encontre uma velocidade confort?vel para voc? ? sempre poder? mud?-la mais tarde.#!"
