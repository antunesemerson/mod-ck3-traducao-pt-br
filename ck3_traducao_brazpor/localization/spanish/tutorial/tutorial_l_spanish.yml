 lesson_basics_schemes_murder: "$lesson_basics_schemes_concept$"
 lesson_basics_schemes_murder_desc: "Um bom momento para usar uma [scheme|lE] pode ser ao descobrir que a [line_of_succession|lE] n?o est? t?o clara nem favor?vel quanto voc? gostaria. Uma forma de sair na frente ?, simplesmente, #EMP livrar-se#! da concorr?ncia.\n\nSilenciosamente e sem testemunhas.\n\n#TUT Uma tentativa de [GetScheme('murder').GetTypeName|l] vem com risco de descoberta. Se sua tentativa der errado, seu [character|lE] ficar? impopular ? especialmente com o alvo pretendido.#!"
 lesson_basics_schemes_sway: "Guerra ($lesson_basics_war$)"
 lesson_basics_schemes_sway_desc: "A [war|lE] é uma parte essencial do Crusader Kings III. Existem muitos conceitos para abordar, mas por enquanto, vamos falar brevemente sobre alguns deles.\n\n#TUT O restante e os detalhes deixaremos para você descobrir enquanto começa a jogar!#!"
