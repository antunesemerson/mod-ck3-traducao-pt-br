 ### Resources
 lesson_basics_resources_1: "Vamos come?ar com o b?sico: todo mundo gosta de ouro! Tente enviar um suborno ao seu [player_heir|lE].

#TUT A maioria das [interactions|lE] abrir? uma segunda janela com detalhes ao ser selecionada. Voc? pode confirmar ou cancelar uma ação nessa janela.#!"
 lesson_basics_resources_1_desc: "Confirme a interação #TUT_KW Enviar regalo#! com seu $game_concept_heir$"
 lesson_basics_resources_2: "Presente Enviado ($lesson_basics_interacting$)"
 lesson_basics_resources_2_desc: "Muito bem! Voc? conseguiu #P aumentar#! a [opinion|lE] de algu?m sobre voc?.\n\n#TUT Observe a #bold mensagem de feed#! no canto inferior direito ? ? ali que aparecem informa??es #EMP levemente interessantes, mas n?o cr?ticas#!, que desaparecem depois de um tempo quando o jogo est? despausado.#!\n\nCertos modificadores de opini?o duram para sempre, como os la?os familiares. Outros ir?o se dissipar com o tempo, como a mem?ria esmaecida de receber um presente em dinheiro...\n\n#TUT Se voc? passar o cursor sobre o n?mero de opini?o de outro personagem, poder? ver exatamente de onde v?m os v?rios n?meros. ? por causa de uma alian?a matrimonial, um presente em ouro ou simplesmente porque apreciam sua natureza honesta?#!"
