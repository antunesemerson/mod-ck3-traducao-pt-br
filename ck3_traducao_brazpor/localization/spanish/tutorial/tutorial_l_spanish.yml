 #Generational Gameplay
 lesson_basics_many_lives_1: "Clique com o botão direito em um #EMP unmarried#! Personagem"
 lesson_basics_many_lives_1_desc: "Seleciona #TUT_KW Find Spouse#!"
 lesson_basics_many_lives_2: "Escolhendo um Cônjuge ($lesson_basics_marriage$)"
 lesson_basics_many_lives_2_no_GUI_highlight: "Ao selecionar #TUT_KW Encontrar c?njuge#!, ? mostrada uma lista de poss?veis [spouses|lE], vindos das [courts|lE] do mundo todo!\n\nAo selecionar #TUT_KW Organizar casamento#!, tamb?m se abre uma lista de poss?veis [spouses|lE], mas inclui apenas pessoas da [court|lE] do personagem escolhido.\n\n#TUT Seu pr?prio personagem aparece ? esquerda, porque este casamento precisa da #EMP sua#! aprova??o. O [liege|lE] do outro c?njuge aparecer? ? direita, pois a uni?o tamb?m precisar? da aprova??o dele.\n\n#TUT_KW Organizar casamento#! pode ser ?til para fazer casamentos entre seus [courtiers|lE] ou para estabelecer uma [alliance|lE] de casamento espec?fica. Por enquanto, #TUT_KW Encontrar c?njuge#! servir? melhor aos nossos prop?sitos.#!"
 lesson_basics_many_lives_2_desc: "Combinar casamento ($lesson_basics_marriage$)"
 #Succession Laws
 lesson_basics_succession_laws: "Filtro de Personagens ($lesson_basics_marriage$)"
 lesson_basics_succession_laws_desc: "$lesson_basics_choosing_a_spouse$"
 lesson_basics_succession_tab_tt: "Ao escolher um [spouse|lE], h? muitos fatores a considerar. Para ajudar voc?, h? uma fun??o de filtro (destacada) dispon?vel para reduzir a lista de candidatos. Entre os aspectos a considerar est?o as [alliances|lE] potenciais, as [skills|lE], os [traits|lE] de personalidade, a [fertility|lE] esperada e muito mais.\n\nAlguns tra?os s?o [Concept( 'congenital', 'cong?nitos' )|E], o que significa que eles podem ser herdados pelos seus filhos ? talvez algu?m com um tra?o assim seja um bom ponto de partida?\n\n#TUT Voc? pode alterar sua sele??o clicando no bot?o #TUT_KW Limpar personagens#! entre os personagens que voc? est? organizando para casar. Nada acontecer? at? que voc? clique em #TUT_KW Enviar proposta#!.#!"
