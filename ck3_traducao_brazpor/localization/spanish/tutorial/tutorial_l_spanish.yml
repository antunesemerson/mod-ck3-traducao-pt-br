 lesson_basics_interacting_2: "Para garantir o futuro da sua [dynasty|lE], você precisa de membros da família. Ajuda se você for [married|lE], mas não podemos prometer que você vai se casar por amor. @arrange_marriage_icon!"
 lesson_basics_interacting_2_desc: "Vamos come?ar com o b?sico: todo mundo gosta de ouro! Tente enviar um suborno ao seu [player_heir|lE].

#TUT A maioria das [interactions|lE] abrir? uma segunda janela com detalhes ao ser selecionada. Voc? pode confirmar ou cancelar uma ação nessa janela.#!"
 lesson_basics_send_gift_tt: "Embora seu personagem j? seja casado, vamos gui?-lo pelas etapas envolvidas.\n\nVoc? pode organizar [marriages|lE] (ou [betrothals|lE]) para os personagens solteiros do seu [domain|lE] clicando com o bot?o direito no personagem e selecionando #TUT_KW Encontrar c?njuge#! ou #TUT_KW Organizar casamento#!.\n\n#TUT Voc? n?o precisa se casar com outra pessoa, mas selecionar #TUT_KW Encontrar c?njuge#! abrir? a tela de casamento.#!"
 lesson_basics_interacting_3: "$lesson_basics_marriage_concept_1$"
