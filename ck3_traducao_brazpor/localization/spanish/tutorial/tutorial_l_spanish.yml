 lesson_basics_culture_culture_head_desc: "Levante seus exércitos"
 lesson_basics_culture_culture_head_desc_INGAME: "Movimento do Exército"
 lesson_basics_culture_culture_head_desc_YOU: "Você é o Culture Head da sua Cultura."
 lesson_basics_culture_culture_head_desc_OTHER: "Exército"
 lesson_basics_culture_innovations_open: "Culturas (Inovações)"
 lesson_basics_culture_innovations_open_desc: "Uma Batalha!"
 lesson_basics_culture_open_innovations_tab_trigger: "O resultado de uma [battle|lE] entre dois [armies|lE] depende de uma s?rie de fatores: o n?mero de [levies|lE] de ambos os lados, quais [men_at_arms|lE] cada lado está usando (se houver), os [commanders|lE] envolvidos e até mesmo o [terrain|lE] em que se luta.

#TUT Mais detalhes podem ser obtidos na visão de Combate. Clique no $game_concept_army$ que está lutando para abri-la.#!"
 lesson_basics_culture_innovations: "Um Cerco!"
 lesson_basics_culture_innovations_desc: "Um [army|lE] está atacando uma [holding|lE]! Clique no ícone destacado (as pontas de lança!) para descobrir como está indo.\n\nCada lado precisa vencer cercos para vencer na maioria das guerras, pois eles aumentam a [war_score|lE].\n\nSempre que um cerco é vencido (leva algumas rodadas de ataque), a área passa a estar [Concept( 'occupied', 'ocupada' )|E] e sua aparência no mapa muda, de uma cor sólida para cores listradas, quando o zoom está afastado."
 lesson_basics_culture_innovations_desc_INGAME: "Pontuação de Guerra"
 lesson_basics_culture_innovations_spread: "Culturas (Inovações)"
 lesson_basics_culture_innovations_spread_desc: "Resultados da Guerra"
 #Religion
 lesson_basics_religion_1: "A vitória está próxima"
 lesson_basics_religion_1_read_only: "$lesson_basics_religion_1$"
 lesson_basics_religion_1_desc: "Derrota iminente"
 lesson_basics_religion_click_religion_tt: "Esta [war|lE] não está indo bem! Talvez seja a hora de pedir uma [white_peace|lE].\n\nEmbora #EMP esta#! guerra seja uma causa perdida, não há mal algum em aceitar a derrota e viver para lutar outro dia! Clique com o botão direito no seu inimigo e selecione #TUT_KW Paz blanca#! (ou #TUT_KW Rendición#!, se a paz branca não estiver disponível) na visualização de Interações."
 lesson_basics_religion_2: "

#TUT As li??es do tutorial terminam aqui. No entanto, conselhos ainda aparecer?o ocasionalmente como ?cones de alerta na parte superior da tela. Clique nesses alertas de conselho para saber mais sobre determinadas situações ou sistemas com que você está lidando!

Obrigado por ficar conosco, e boa sorte!#!"
 lesson_basics_religion_2_desc: "Vitória de Guerra!"
 lesson_basics_religion_3: "Parabéns pela sua [victory|lE]!\n\nVocê já experimentou como é passar por uma parte essencial do jogo.$lesson_war_final_notes_reuse$"
 lesson_basics_religion_3_desc: "Derrota de Guerra"
 lesson_basics_religion_4: "Nós lamentamos a sua [defeat|lE] juntamente consigo, mas tenha certeza de que agora você superou um aspecto desafiador do jogo, e só vai ficar mais fácil daqui para frente.$lesson_war_final_notes_reuse$"
 lesson_basics_religion_4_no_GUI_highlight: "Paz Branca"
 lesson_basics_religion_4_desc: "Quantas lições aprendidas! As coisas que você levará com você para o futuro!$lesson_war_final_notes_reuse$"
 #War
 lesson_basics_warfare: "Você ainda esta aqui! Excelente! Que estranho que a guerra deixou de ser válida embora.$lesson_war_final_notes_reuse$"
 lesson_basics_warfare_desc: "E agora?"
 lesson_basics_levies: "Agora que você conhece os fundamentos, poderá fazer muitas coisas. Crusader Kings III consiste em definir seus próprios objetivos.\n\nComo sugestão, recomendamos que você tente se tornar rei ou rainha de $k_ireland$! Embora a [war|El] também não seja o único caminho…\n\nOu você pode clicar no ícone #bold Pistas#! na parte superior e ver se alguns dos elementos chamam sua atenção!"
 lesson_basics_levies_complete: "Abra a vista da Guerra (destacado)"
 lesson_basics_levies_desc: "Os eventos mais importantes em qualquer guerra são as [battles|lE], travadas por [armies|lE]. A maioria dos seus soldados vir? de [levies|lE], mas você pode expandir seu $game_concept_army$ empregando [men_at_arms|lE].

#TUT Se as coisas ficarem realmente dif?ceis, você também pode contratar [mercenaries|lE], desde que tenha [gold|lE].#!"
 lesson_basics_military_view_tt: "Abra a vista Militar (Destacado)"
 lesson_basics_rally_points: "Guerra ($lesson_basics_war$)"
 lesson_basics_rally_points_desc: "Cuando estalle una [war|lE] podrás reclutar [armies|lE] en esta pantalla con solo hacer clic en el gran botón rojo «$RAISE_ALL$» que aparecerá junto con el icono de puntuación bélica, en la parte inferior derecha de la pantalla. Por supuesto, también puedes $RAISE_ALL$ desde esta vista Militar.\n\nCuando la guerra termine, tendrás que licenciar a tus soldados antes de comenzar otra.\n\n#TUT Los [rally_points|lE] son el lugar donde se reúnen las [levies|lE] y los [men_at_arms|lE] a tu mando; allí aparecerán cuando se les llame a la guerra.#!"
 lesson_basics_casus_belli: "Guerra ($lesson_basics_war$)"
 lesson_basics_casus_belli_desc: "Para iniciar una [war|lE], necesitarás una razón legítima o [casus_belli|lE] contra otro [ruler|lE].\n\nHay distintos modos de obtener un casus belli: puedes tener [titles|lE] [de_jure|lE] que te conviertan en el [rightful_liege|lE] de tu objetivo, heredar [claims|lE] o librar una [holy_war|lE] contra infieles cercanos.\n\n¡Aunque estos son los más comunes, hay decenas de casus belli diferentes que descubrir y utilizar mientras vas jugando!\n\n#TUT El modo más fácil y directo de conseguir derechos es usar #EMP [fabricate_claim|lE]#!. De esto se ocupa tu [court_chaplain|lE] mediante una de sus [Concept( 'councillor_task', 'tareas de consejero' )|E].#!"
 #UNPAUSING!! :D Do this when the player is actually supposed to unpause
 lesson_basics_pausing_2: "Quase lá ($lesson_basics_unpause$)"
 lesson_basics_pausing_2_desc: "Em breve, deixaremos voc? retomar o jogo! Mas primeiro h? algumas coisas para revisar.\n\nPrimeiro, lembre-se de que existem cinco velocidades diferentes de jogo dispon?veis (pressione as teclas 1-5 para alternar entre elas facilmente). Voc? pode pausar ou mudar o ritmo quando quiser.\n\n#BOLD Segundo, o jogo ser? pausado automaticamente em certos eventos importantes.#!\n\n#TUT N?o h? problema em jogar em velocidades mais baixas, acelerar quando as coisas estiverem tranquilas ou desacelerar quando voc? for ? guerra.\n\nNormalmente, recomendamos pausar o jogo ao inspecionar os menus ou quando voc? estiver diante de decis?es dif?ceis.#!"
 lesson_basics_pausing_3: "Iniciando o Jogo ($lesson_basics_unpause$)"
 lesson_basics_pausing_3_desc: "Para que o tempo comece a correr, despause o jogo (usando a #EMP barra de espa?o#! ou clicando no bot?o Jogar, no canto inferior direito).\n\nDessa forma, os dias, meses e anos passar?o. Os ex?rcitos que receberam ordem de marchar se mover?o; eventos aparecer?o na tela; cartas ser?o enviadas e os [characters|lE] envelhecer?o.\n\n#TUT Encontre uma velocidade confort?vel para voc? ? sempre poder? mud?-la mais tarde.#!"
 #Actual Warfare
 lesson_declare_war_step_1: "E agora?"
 lesson_declare_war_step_1_complete: "$lesson_declare_war_step_1$"
 lesson_declare_war_step_1_desc: "Como primera tarea, vamos a demostrarle a tu vecino, el earl de $c_desmond$, quién es el [Concept( 'rightful_liege', 'señor legítimo' )|E]… Si eso implica expandir tu [realm|lE], ¡que así sea!\n\nCon el sistema de interacción de personajes que vimos antes, selecciónalo en el mapa y declárale la guerra al [ruler|lE] de $c_desmond$. Debes tener un [casus_belli|lE] válido ya que su [title|lE] es parte [de_jure|lE] de tu señorío.\n\n#TUT Para que la experiencia sea más activa, veremos paso a paso lo que sucede en una guerra.#!"
 lesson_declare_war_tt: "#TUT_KW Declare War#! sobre Earl Muiredach de $c_desmond$"
 lesson_raise_troops_step_1: "Levantar Exércitos"
 lesson_raise_troops_step_2: "$lesson_raise_troops_step_1$"
 lesson_raise_troops_step_1_desc: "¡Te has involucrado en una [war|lE]! Ahora tienes que reclutar [armies|lE]. Ha aparecido un botón en la parte inferior de la pantalla para ayudarte, pero también puedes hacerlo desde la vista Militar.\n\n#TUT Tu [army|lE] se agrupará y esperará órdenes allí donde esté tu [rally_point|lE].\n\nNota: tendrás que reanudar la partida (pulsa la barra espaciadora) para reunir algo más que un puñado de hombres. ¡Deja que pasen unos días y tu ejército estará al máximo de fuerzas!#!"
 lesson_declare_war_step_2: "$lesson_declare_war_step_1$"
 lesson_raise_troops_tt: "Levante seus exércitos"
 lesson_army_movement_step_1: "Movimento do Exército"
 lesson_army_movement_step_1_desc: "Para mover tu [army|lE], haz clic en el ejército (en el mapa) y, a continuación, haz clic con el botón secundario en el área a la que quieres que se desplace.\n\nPara ganar una [war|lE], normalmente tendrás que capturar la [realm_capital|lE] del enemigo en un [siege|lE]. Por lo tanto, tendrías que centrarte en eso cuando estés a la ofensiva.\n\n#TUT Si ordenas al ejército que atraviese el agua, se [Concept( 'embark', 'embarcará' )|E], convirtiéndose en una [fleet|lE]. Por ahora, quedémonos en tierra.#!"
 lesson_army_purpose_step_1: "Exército"
 lesson_army_purpose_step_1_desc: "Ahora que tu [army|lE] se mueve, probablemente se dirija a una batalla contra fuerzas enemigas. Puede ser un encuentro directo con otros ejércitos o el comienzo de un [siege|lE].\n\n#TUT Si dos ejércitos hostiles se encuentran, se producirá automáticamente una [battle|lE]. Del mismo modo, si colocas tu ejército en una [holding|lE] enemiga, este la asediará.\n\nSi todavía no lo has hecho, este es un buen momento para #EMP reanudar la partida#!. Si no, ¡no pasará el tiempo y los ejércitos no se moverán!#!"
 lesson_battle_mechanics_step_1: "Uma Batalha!"
 lesson_battle_mechanics_step_1_desc: "O resultado de uma [battle|lE] entre dois [armies|lE] depende de uma s?rie de fatores: o n?mero de [levies|lE] de ambos os lados, quais [men_at_arms|lE] cada lado está usando (se houver), os [commanders|lE] envolvidos e até mesmo o [terrain|lE] em que se luta.

#TUT Mais detalhes podem ser obtidos na visão de Combate. Clique no $game_concept_army$ que está lutando para abri-la.#!"
 lesson_siege_mechanics_step_1: "Um Cerco!"
 lesson_siege_mechanics_step_1_desc: "Um [army|lE] está atacando uma [holding|lE]! Clique no ícone destacado (as pontas de lança!) para descobrir como está indo.\n\nCada lado precisa vencer cercos para vencer na maioria das guerras, pois eles aumentam a [war_score|lE].\n\nSempre que um cerco é vencido (leva algumas rodadas de ataque), a área passa a estar [Concept( 'occupied', 'ocupada' )|E] e sua aparência no mapa muda, de uma cor sólida para cores listradas, quando o zoom está afastado."
 lesson_warscore_step_1: "Pontuação de Guerra"
 lesson_warscore_step_1_desc: "Para tener una idea de quién va ganando la [war|lE], siempre puedes mirar la [war_score|lE], en la esquina inferior derecha. Va de #N -100#! a #P +100#! y cambia dependiendo de los [sieges|lE] y las [battles|lE] perdidos o ganados, así como del territorio ocupado.\n\n#TUT Con una puntuación bélica de #P 100#! puedes obligar al otro bando a aceptar tu [peace_offer|lE].\n\nDel mismo modo, con una puntuación de #N -100#! #EMP te#! pueden #EMP obligar#! o aceptar #EMP su#! [peace_offer|lE].#!"
 lesson_warscore_step_2: "Resultados da Guerra"
 lesson_warscore_step_2_desc: "Todas as [wars|lE] terminam de uma destas três maneiras:\n $EFFECT_LIST_BULLET$[victory|E]\n $EFFECT_LIST_BULLET$[white_peace|E]\n $EFFECT_LIST_BULLET$[defeat|E]\n\nAs consequências exatas de qualquer uma delas mudam dependendo do [casus_belli|lE].\n\n#TUT Para consultar os detalhes de uma guerra específica, clique com o botão direito no [ruler|lE] inimigo e selecione #TUT_KW Ofrecer paz#! ou clique no ícone de $game_concept_war_score$ na parte inferior direita e, em seguida, selecione uma das abas na parte inferior da tela.#!"
 lesson_winning_wars_step_1: "A vitória está próxima"
 lesson_winning_wars_step_1_desc: "¡Tu [war_score|lE] está al #P 100 %#!!\n\nAhora puedes imponer tus peticiones haciendo clic en el icono de Puntuación bélica para abrir la vista de Guerra y, a continuación, elegir la pestaña #TUT_KW Imponer exigencias#! en la parte inferior de la pantalla.\n\n#TUT También puedes hacer clic secundario en el [ruler|lE] enemigo y seleccionar #TUT_KW Ofrecer paz#!.#!"
 lesson_losing_wars_step_1: "Derrota iminente"
 lesson_losing_wars_step_1_desc: "Esta [war|lE] não está indo bem! Talvez seja a hora de pedir uma [white_peace|lE].\n\nEmbora #EMP esta#! guerra seja uma causa perdida, não há mal algum em aceitar a derrota e viver para lutar outro dia! Clique com o botão direito no seu inimigo e selecione #TUT_KW Paz blanca#! (ou #TUT_KW Rendición#!, se a paz branca não estiver disponível) na visualização de Interações."
 lesson_war_final_notes_reuse: "

#TUT As li??es do tutorial terminam aqui. No entanto, conselhos ainda aparecer?o ocasionalmente como ?cones de alerta na parte superior da tela. Clique nesses alertas de conselho para saber mais sobre determinadas situações ou sistemas com que você está lidando!

Obrigado por ficar conosco, e boa sorte!#!"
 lesson_war_final_notes_victory_step_1: "Vitória de Guerra!"
 lesson_war_final_notes_victory_step_1_desc: "Parabéns pela sua [victory|lE]!\n\nVocê já experimentou como é passar por uma parte essencial do jogo.$lesson_war_final_notes_reuse$"
 lesson_war_final_notes_defeat_step_1: "Derrota de Guerra"
 lesson_war_final_notes_defeat_step_1_desc: "Nós lamentamos a sua [defeat|lE] juntamente consigo, mas tenha certeza de que agora você superou um aspecto desafiador do jogo, e só vai ficar mais fácil daqui para frente.$lesson_war_final_notes_reuse$"
 lesson_war_final_notes_white_peace_step_1: "Paz Branca"
 lesson_war_final_notes_white_peace_step_1_desc: "Quantas lições aprendidas! As coisas que você levará com você para o futuro!$lesson_war_final_notes_reuse$"
 lesson_war_final_notes_invalidated_step_1: "Guerra Invalidada"
 lesson_war_final_notes_invalidated_step_1_desc: "Você ainda esta aqui! Excelente! Que estranho que a guerra deixou de ser válida embora.$lesson_war_final_notes_reuse$"
 lesson_guided_final_notes_mission_step_1: "E agora?"
 lesson_guided_final_notes_mission_step_1_desc: "Agora que você conhece os fundamentos, poderá fazer muitas coisas. Crusader Kings III consiste em definir seus próprios objetivos.\n\nComo sugestão, recomendamos que você tente se tornar rei ou rainha de $k_ireland$! Embora a [war|El] também não seja o único caminho…\n\nOu você pode clicar no ícone #bold Pistas#! na parte superior e ver se alguns dos elementos chamam sua atenção!"
 lesson_open_war_overview_tt: "Abra a vista da Guerra (destacado)"
