 investiture_marriage_yes_desc: "#emphasis #bold Privilégios do [tributary|E]:#!#!\n$EFFECT_LIST_BULLET$ Aumenta a aceitação de [marriage|lE] com a [dynasty|lE] reinante de [GetTitleByKey('h_china').GetDefinitiveName]\n$EFFECT_LIST_BULLET$ Anula as penalidades de aceitação de [marriage|lE] de #BOLD $tradition_cultural_primacy_name$#!\n\n#flavor A família imperial de [GetTitleByKey('h_china').GetDefinitiveName] costuma ser impenetrável para estrangeiros. Um convite formal para entrar na família concede um bônus de aceitação proporcional à [imperial_grace|lE] e remove as penalidades habituais aplicadas a estrangeiros.#!"
