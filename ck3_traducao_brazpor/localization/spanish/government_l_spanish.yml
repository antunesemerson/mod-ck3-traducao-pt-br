 special_contract_scutage: "Contrato de Scutage"
 special_contract_scutage_desc: "#flavor Enquanto estiver sujeito a um $special_contract_scutage$, o [vassal|lE] pagará #high [EmptyScope.ScriptValue('scutage_contract_tax_tooltip')|0]%#! mais [tax|lE] do que o determinado por sua [obligation|lE] de $feudal_government_taxes$, ao mesmo tempo em que fornecerá #high [EmptyScope.ScriptValue('scutage_contract_levies_tooltip')|0]%#! menos [levies|lE] do que o determinado por sua [obligation|lE] de $feudal_government_levies$.#!"
 special_contract_march: "Contrato de Marcha"
 special_contract_march_desc: "#flavor Enquanto estiver sujeito a um $special_contract_march$, o [vassal|lE] receberá bônus em seus [levies|lE] e capacidades defensivas, mas fornecerá #high [EmptyScope.ScriptValue('march_contract_taxes_tooltip')|0]%#! menos [tax|lE] do que o determinado por sua [obligation|lE] de $feudal_government_taxes$.#!"
 special_contract_march_border_trigger: "[vassal.GetName] não faz fronteira com um [realm|lE] estrangeiro"
 special_contract_palatinate: "Contrato de Palatinado"
 special_contract_palatinate_desc: "#flavor O [vassal|lE] sob um $special_contract_palatinate$ desfruta de muitos privilégios dentro do senhorio, o que aumenta sua posição e lhe dá mais peso político. Os [vassals|lE] com um pacto de palatinado aumentam o [prestige|lE] de seu [liege|lE] mas fornecem um #high [EmptyScope.ScriptValue('palatinate_contract_taxes_tooltip')|0] %#! a menos de [taxes|lE] e [levies|lE] do que o estabelecido por suas [obligations|lE] de $feudal_government_taxes$ e $feudal_government_levies$.#!"
 special_contract_castellan: "Contrato de Castelão"
 special_contract_castellan_desc: "#flavor Enquanto estiver sujeito a um $special_contract_castellan$, o [vassal|lE] receberá bônus em seus [levies|lE] e capacidades defensivas. Ele fornecerá #high [EmptyScope.ScriptValue('march_contract_taxes_tooltip')|0]%#! menos [tax|lE], mas #high [EmptyScope.ScriptValue('castellan_contract_levies_tooltip')|0]%#! mais [levy|lE] do que o determinado por sua [obligation|lE] de $feudal_government_taxes$.#!"
