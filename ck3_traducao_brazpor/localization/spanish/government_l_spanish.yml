 unity_consult_house_decision: "Consultar os Membros da Casa"
 unity_consult_house_decision_desc: "Um conselho unificado é aquele que pode agir com rapidez e segurança. Com um pouco de diálogo, posso garantir que os membros da minha casa sejam mais eficazes em seus papéis como conselheiros."
 unity_consult_house_decision.tt_house_council_bonus: "O progresso base e o impacto de [skill|lE] em [councillor_tasks|lE] aumentam em #P +10%#! para membros da [house|lE] servindo em seu [council|lE]"
