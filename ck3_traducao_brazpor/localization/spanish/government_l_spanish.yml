 unity_establish_futuwaa_lodges_decision: "Estabelecer Lojas de Futuwaa"
 unity_establish_futuwaa_lodges_decision_desc_intro: "Os jovens"
 unity_establish_futuwaa_lodges_decision_desc_outro: "de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], sem meios adequados para gastar suas energias, vagam pela capital em bandos improvisados. Em vez disso, eu poderia estabelecer alojamentos #italic futuwaa#! por toda a capital para incutir aptidão marcial e moral em seu tempo ocioso."
