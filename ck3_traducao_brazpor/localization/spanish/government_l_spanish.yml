 unity_reinforce_army_decision: "Reforçar o Exército com Oficiais Leais"
 unity_reinforce_army_decision_desc: "Um exército é tão forte quanto os oficiais que o lideram. Ao solicitar soldados habilidosos aos membros da minha casa, ganho acesso a combatentes com muita experiência. Soldados que posso promover a posições de liderança dentro do meu exército para reforçar a eficácia das tropas. Todos os membros contribuem para nossa casa em nome do bem maior, e todos se beneficiam!"
 unity_reinforce_army_decision_tooltip: "Peça aos membros da sua casa que lhe enviem oficiais capazes"
 unity_reinforce_army_decision_confirm: "Envie as ordens."
 unity_establish_network_decision: "Estabelecer Rede de Intriga"
 unity_establish_network_decision_desc: "Os membros da minha casa são astutos, cada um à sua maneira. Sob minha liderança, podemos formar uma teia de intriga capaz de capturar até os forasteiros mais ardilosos."
 unity_establish_network_decision_tooltip: "Mobilize os membros da sua casa para se proteger de esquemas hostis e executá-los"
 unity_establish_network_decision_confirm: "Envie e queime o édito"
 unity_improve_taxation_decision: "Melhorar a Tributação"
 unity_improve_taxation_decision_desc: "Minha casa possui muitos membros eficientes na coleta de impostos e na administração de um domínio. Ao compartilhar ideias e pessoas competentes, todos podemos nos beneficiar de uma renda maior."
 unity_improve_taxation_decision_tooltip: "Trabalhe ao lado dos membros da sua casa para melhorar a tributação e a renda do domínio"
 unity_improve_taxation_decision_confirm: "Vamos organizar uma reunião"
 unity_search_for_administrators_decision: "Procurar Coletores de Impostos"
 unity_search_for_administrators_decision_desc: "Os impostos são a espinha dorsal de qualquer domínio. Dedicar tempo para procurar administradores habilidosos e ex-soldados para empregá-los como coletores de impostos valeria muito a pena."
 unity_search_for_administrators_decision_tooltip: "Procure administradores e soldados competentes para reforçar as fileiras dos meus coletores de impostos"
 unity_search_for_administrators_decision_confirm: "Ordenar a busca"
 search_administors_decision.tt: "Até três [characters|lE] de perícias variadas se juntarão à sua [court|lE]"
 unity_search_for_administrators_decision.msg.t: "Um Administrador Chegou"
 unity_search_for_administrators_decision.msg.desc: "Um[new_administrator.Custom('ES_XA')] nov[new_administrator.Custom('ES_OA')] administrador[new_administrator.Custom('ES_XA')], de nome [new_administrator.GetName], chegou à sua corte e está pront[new_administrator.Custom('ES_OA')] para trabalhar."
 unity_send_bailiffs_decision: "Enviar Oficiais de Justiça"
 unity_send_bailiffs_decision_desc: "Posso tirar proveito da atitude cooperativa dos membros da minha casa enviando meus oficiais de justiça até eles, executando minhas ordens para manter a paz por todo o domínio."
 unity_send_bailiffs_decision_tooltip: "Coopere com os membros da sua casa para aumentar o controle por todo o domínio"
 unity_send_bailiffs_decision_confirm: "Mandar chamar os oficiais de justiça"
 unity_placate_vassals_decision: "Aplacar Vassalos"
 unity_placate_vassals_decision_desc: "Mesmo um lar harmonioso enfrenta provações. Ao exercer minha influência como chefe da casa, posso suavizar esses atritos sociais antes que comecem a se transformar em rachaduras."
 unity_placate_vassals_decision_tooltip: "Lembre os membros da sua casa da sua autoridade como suserano deles"
 unity_placate_vassals_decision_confirm: "Aplacar vassalos"
 unity_organize_house_for_war_decision: "Organizar os Membros da Casa para a Guerra"
 unity_organize_house_for_war_decision_desc: "Melhorar um domínio exige dedicação e, na maioria das vezes, uma grande quantidade de conquistas. Ao emitir éditos específicos e orientar os membros da nossa casa, posso torná-los mais dispostos a guerrear e conquistar novas terras."
 unity_organize_house_for_war_decision_tooltip: "Oriente os membros da sua casa a guerrearem com mais frequência"
 unity_organize_house_for_war_decision_confirm: "Promover a guerra e o conflito!"
 unity_encourage_house_economy_decision: "Incentivar a Casa a Melhorar a Economia"
 unity_encourage_house_economy_decision_desc: "Um domínio só é tão capaz quanto a terra sobre a qual foi construído. Devo garantir que todos os membros da casa possam investir os recursos necessários para erguer um domínio mais forte."
 unity_encourage_house_economy_decision_tooltip: "Oriente os membros da sua casa a focarem na economia"
 unity_encourage_house_economy_decision_confirm: "Incentivar uma economia mais forte!"
 unity_promote_development_decision: "Promover Desenvolvimento"
 unity_promote_development_decision_desc: "Nossa cultura possui uma longa história de excelente capacidade administrativa. Há muitos supervisores e administradores habilidosos empregados em nossa casa. Podemos usar isso a nosso favor e desenvolver ainda mais o domínio."
 unity_promote_development_decision_tooltip: "Incentive os membros da sua casa a desenvolver e aprimorar o domínio"
 unity_promote_development_decision_confirm: "Promover desenvolvimento"
 unity_improve_logistics_decision: "Exigir Logística Compartilhada do Exército"
 unity_improve_logistics_decision_desc: "Guerras são decididas por uma multidão de fatores diferentes. Boa logística e suprimentos são tão importantes quanto ter soldados capazes. Posso impor novas políticas dentro da nossa casa e exigir que todos compartilhem suprimentos e equipamentos, aumentando muito as capacidades do exército."
 unity_improve_logistics_decision_tooltip: "Exija que os membros da sua casa compartilhem logística e suprimentos para atender melhor às necessidades do exército"
 unity_improve_logistics_decision_confirm: "Exigir logística compartilhada"
 unity_steer_house_direction_decision: "Conduzir a Unidade da Casa"
 unity_steer_house_direction_decision_desc: "Como chefe da casa, minha palavra tem muito peso entre seus membros. Com palavras e ações cuidadosas, posso influenciar meus parentes a agir de determinadas maneiras e afetar fortemente nossa unidade combinada."
