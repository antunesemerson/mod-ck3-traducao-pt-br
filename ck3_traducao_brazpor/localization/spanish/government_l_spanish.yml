 jizya_special_rights_tax_collector: "Status de Jizya"
 jizya_special_rights_tax_collector_desc: "#emphasis #bold Privilegios de [vassal|lE]:#!#!\n$EFFECT_LIST_BULLET$ O [liege|lE] não pode [Concept( 'demand_conversion', 'exigir la conversión' )|E] do [vassal|lE]\nO [liege|lE] não pode usar [convert_county|E] nas terras do [vassal|lE]\n$EFFECT_LIST_BULLET$ O [liege|lE] não pode usar a [faith|lE] como motivo para evitar a [tyranny|lE] ao revogar títulos\n$EFFECT_LIST_BULLET$ O [liege|lE] não pode revogar os [titles|lE] do [vassal|lE]\n\n#flavor El [vassal|lE] tiene garantizada la propiedad de sus [titles|lE], lo que impide que el [liege|lE] pueda revocarlos, tenga un [Concept( 'revoke_title_reason', 'motivo' )|E] o no.\n\nAl [vassal|lE] se le concede un estatuto especial protegido dentro del señorío que reconoce oficialmente el derecho a practicar su propia [faith|lE].#!"
 jizya_special_rights_tax_collector_flavor_desc: "Jizya é um imposto especial atribuído aos #italic dhimmis#!, minorias religiosas, em troca do privilégio de praticar sua fé desviada em paz."
