 iqta_special_rights_tax_collector_desc: "O [vassal|lE] tem obrigações menores, mas ajuda a fornecer [men_at_arms|lE] ao [liege|lE]."
 iqta_special_rights_tax_collector_flavor_desc: "Iqta é um sistema de arrecadação fiscal no qual magnatas locais recebem ampla autoridade para coletar impostos em nome do estado."
 ghazi_special_rights_tax_collector: "Status de Ghazi"
 ghazi_special_rights_tax_collector_desc: "#emphasis #bold Privilegio de [vassal|lE]:#!#!\n$EFFECT_LIST_BULLET$ O [vassal|lE] paga menos [piety|lE] para usar o [casus_belli|lE] de [holy_war|lE], mas mais [prestige|lE] [prestige_i] por outros [casus_bellis|lE]\n$EFFECT_LIST_BULLET$ Permite [raiding|lE]\n\n#flavor El [vassal|lE] será elegido como guerrero de la [faith|lE] por su [liege|lE] y tendrá la misión de extender las fronteras mediante una [holy_war|lE].#!"
 ghazi_special_rights_tax_collector_flavor_desc: "Guerreiros da fé e da fronteira, os Ghazi obtêm renda com pilhagem e brigandagem, e travam uma guerra sem fim contra os inimigos religiosos do estado."
 deqhan_special_rights_tax_collector: "Dehqan"
 deqhan_special_rights_tax_collector_flavor_desc: "Magnatas persas dentro de um antigo sistema descentralizado de arrecadação, os dehqans administram suas terras de perto para promover a produtividade e o próprio prestígio."
 maguh_special_rights_tax_collector: "Status de Maguh"
 maguh_special_rights_tax_collector_flavor_desc: "Uma antiga forma sassânida de administração distrital, os maguh promovem o desenvolvimento local em troca de impostos reduzidos ao estado."
 muqata_special_rights_tax_collector: "Status de Muqata"
 muqata_special_rights_tax_collector_flavor_desc: "Muqata é um sistema fiscal no qual terras distantes recebem maior autonomia e são menos tributadas, para promover estabilidade e desenvolvimento de longo prazo."
 strict_taxation_tax_collector: "Zakat"
 strict_taxation_tax_collector_flavor_desc: "Zakat é um imposto de luxo, normalmente imposto aos ricos como forma de fornecer renda adicional ao estado e ajudar os necessitados."
