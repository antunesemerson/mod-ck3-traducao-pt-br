 religious_rights: "Direitos Religiosos"
 religious_rights_none: "Sem Proteção Religiosa"
 religious_rights_none_short: "Desprotegido"
 religious_rights_protected: "Proteção Religiosa"
 religious_rights_protected_desc: "#emphasis #bold Privilégios do [vassal|lE]:#!#!\n $EFFECT_LIST_BULLET$ O [liege|lE] não pode [Concept( 'demand_conversion', 'exigir a conversão' )|E] do [vassal|lE]\nO [liege|lE] não pode usar [convert_county|E] nas terras do [vassal|lE]\n $EFFECT_LIST_BULLET$ O [liege|lE] não pode usar a [faith|lE] para evitar a [tyranny|lE] ao revogar títulos\n\n#flavor O [vassal|lE] recebe um estatuto especial protegido dentro do reino, que reconhece oficialmente o seu direito de praticar sua própria [faith|lE].#!"
 religious_rights_protected_short: "Protegido"
 fortification_rights: "Direitos de Fortificação"
 fortification_rights_none: "Sem $fortification_rights$"
 fortification_rights_none_short: "Nenhum"
 fortification_rights_granted: "$fortification_rights$ Concedidos"
 fortification_rights_granted_desc: "#flavor Ao [vassal|l] é concedido o direito de construir novos castelos e fortificações com o apoio de seu [liege|l]. Esse apoio, na prática, significa que o [vassal|l] paga #high [EmptyScope.ScriptValue('fortification_rights_contract_taxes_tooltip')|0] %#! menos de [taxes|l] de acordo com sua [obligation|l] $feudal_government_taxes$.#!"
 fortification_rights_granted_short: "Concedidos"
 succession_rights: "Direitos de Sucessão"
 succession_rights_default: "$succession_rights$ Padrão"
 succession_rights_default_short: "Padrão"
 succession_rights_forced_partition: "Partilha Forçada"
 succession_rights_forced_partition_desc: "#emphasis #bold Restrições de [vassal|lE]:#!#!\n$EFFECT_LIST_BULLET$ O [vassal|lE] não pode ter nenhuma [succession_law|lE] além da Partilha\n$EFFECT_LIST_BULLET$ O [vassal|lE] troca sua [succession_law|lE] para "Partilha"\n$EFFECT_LIST_BULLET$ O [vassal|lE] paga #high [EmptyScope.ScriptValue('succession_rights_contract_law_cost_tooltip')|0]%#! a mais de [prestige|lE] para alterar [laws|lE]\n\n#flavor O [vassal|lE] é obrigado a não ter outra forma de sucessão além da Partilha em seu [realm|lE]. As barreiras administrativas disso também aumentam os custos de [law|lE] do [vassal|lE] em #high [EmptyScope.ScriptValue('succession_rights_contract_law_cost_tooltip')|0]%.#!#!"
 succession_rights_forced_partition_short: "Partilha Forçada"
 coinage_rights: "Direitos de Cunhagem"
 coinage_rights_none: "Sem $coinage_rights$"
 coinage_rights_none_short: "Nenhum"
 coinage_rights_granted: "$coinage_rights$ Concedidos"
 coinage_rights_granted_desc: "#flavor O [vassal|lE] recebe o direito de cunhar e usar novas moedas, fortalecendo seu [development|lE] às custas do de seu [liege|l].#!"
 coinage_rights_granted_short: "Concedidos"
 war_declaration_rights: "Declaração de Guerra"
 war_declaration_rights_default: "$war_declaration_rights$ Padrão"
 war_declaration_rights_default_short: "Padrão"
 war_declaration_rights_allowed: "$war_declaration_rights$ Sancionada"
 war_declaration_rights_allowed_desc: "#emphasis #bold Privilegios de [vassal|lE]#!#!\n $EFFECT_LIST_BULLET$ O [vassal|lE] pode declarar [Concept( 'war', 'guerras' )|E] independentemente da [crown_authority|lE] do [liege|lE]\n $EFFECT_LIST_BULLET$ O [vassal|lE] paga #high [EmptyScope.ScriptValue('war_declaration_rights_allowed_cost_reduction_tooltip')|0] %#! menos por [casus_bellis|lE] dentro do [realm|lE]\n\n#flavor O [vassal|lE] não precisa gastar um [hook|lE] se a [crown_authority|l] do [liege|lE] o impede de travar guerras. Esse tratamento especial também facilita que o [vassal|lE] declare guerras dentro do [realm|lE] ao reduzir seu custo em #high [EmptyScope.ScriptValue('war_declaration_rights_allowed_cost_reduction_tooltip')|0] %#!.#!"
 war_declaration_rights_allowed_short: "Sancionada"
 council_rights: "Direitos ao Conselho"
 council_rights_none: "Sem $council_rights$"
 council_rights_none_desc: "#flavor O [vassal|lE] não recebe nenhum privilégio fora do comum quando se trata do [council|l].#!"
 council_rights_none_short: "Nenhum"
 council_rights_guaranteed: "$council_rights$ Garantidos"
 council_rights_guaranteed_desc: "#emphasis #bold [vassal|lE] Privilégio:#!#!\n $EFFECT_LIST_BULLET$ A [interaction|lE] #high $force_onto_council$#! pode ser usada à vontade\n\n#flavor O [vassal|lE] recebe privilégios especiais no [council|l] e passará a esperar um assento permanente no [council|l]. Conceder esse privilégio a [vassals|lE] demais acabará desagradando os [powerful_vassals|l] do [realm|lE].#!"
 council_rights_guaranteed_short: "Garantidos"
 title_revocation_rights: "Revogação de Títulos"
