#help Como [ruler|lE], você só pode manter uma quantidade limitada de posses. O restante das posses em seu [realm|lE] deve ficar nas mãos de seus [vassals|lE].

Você deve conceder alguns de seus [titles|lE] com posses. [courtiers|lE] e [guests|lE] são boas escolhas, pois serão fracos. Vassalos existentes também podem aceitar títulos, mas isso os tornará mais poderosos e pode transformá-los em uma ameaça no futuro!#!"
