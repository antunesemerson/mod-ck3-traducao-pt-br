 laamp_base_learning_contract_events.4025.tt.guaranteed_success: "#P +2#! pontos em direção à conclusão bem-sucedida do [task_contract|lE]"
 laamp_base_learning_contract_events.4025.tt.no_progress: "$laamp_base_learning_contract_events.4001.tt.no_progress$"
 laamp_base_learning_contract_events.4025.tt.prefered_topic: "Este [task_contract|lE] tem recompensas extras para o tópico [SCOPE.Custom('GetPreferedTopicConcept')]"
 #Conclusion
 laamp_base_learning_contract_events.4027.t: "$laamp_base_learning_contract_events_prefix.4021$: Conclusão"
 laamp_base_learning_contract_events.4027.desc.success.critical: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] folheia as páginas do manuscrito, parando para contemplar um trecho de cada página. "Direi…".\n\nFecha e entrega o manuscrito com todo cuidado ao seu assistente. "Vocês viram isto? Eu quase poderia #EMP exhibir#!. É um escrito inconcebível".\n\nEnquanto aplaude de leve, [employer.GetFirstNameNoTooltip] se inclina, com malícia. "Gostei במיוחד de #EMP esa#! ilustração nas margens. Muito bem! Aproveitem suas recompensas e me avisem se algum dia voltarem a [employer.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]".\n\nEu me espreguiço orgulhosamente e aceno com a cabeça."
 laamp_base_learning_contract_events.4027.desc.success.standard: "Hojeando el manuscrito con curiosidad, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] tararea y asiente. «En general, un trabajo bien hecho; lo pondré en mi estantería con el resto de las obras».\n\n[employer.GetFirstNameNoTooltip] entrega una bolsa de tamaño respetable. «Confío que esto compense el tiempo que os ha llevado».\n\n«Hacedme saber si queréis volver a intentarlo en otro momento», termina, mientras se gira para irse.\n\nAcepto la bolsa y asiento cortés."
 laamp_base_learning_contract_events.4027.desc.success.qualified: "«No es… exactamente lo que había pensado. Es, desde luego, #EMP un trabajo#!, pero…», [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] arruga la nariz un poco mientras entrega el manuscrito a su asistente.\n\n«… tal vez lo sitúe en una de las estanterías. Confío en que podáis encontrar la salida, ¿verdad?». Sin esperar mi respuesta, ya ha salido de la estancia.\n\nRecojo la bolsa escuálida que hay junto a la puerta y empiezo a vagar por los salones en busca de una salida."
 laamp_base_learning_contract_events.4027.desc.failure: ""Que tipo de…", [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] se detém por um momento antes de jogar o manuscrito para seu assistente.\n\n"Você teve a ousadia de desperdiçar minha tinta e folhas, tão difíceis de conseguir, nessa… #EMP escoria#!?".\n\nAgora, [employer.GetFirstNameNoTooltip] anda em pequenos círculos frenéticos, esfregando as têmporas: "Eu os convidei para minha casa. Para meu #EMP estudio#!! E vocês me vêm com #EMP esto#!? Estou quase chamando os guardas por essa traição!"."
 laamp_base_learning_contract_events.4027.a: "\"Considere isso: Você tem um manuscrito único em suas mãos.\""
 laamp_base_learning_contract_events.4027.a.tt: "É #EMP um#! verdadeiro pedaço de trabalho."
 laamp_base_learning_contract_events.4027.a.success.tt: "$laamp_base_learning_contract_events.4017.a.success.tt$"
 laamp_base_learning_contract_events.4027.a.failure.tt: "$laamp_base_learning_contract_events.4017.a.failure.tt$"
 laamp_base_learning_contract_events.4027.b.success_critical: "\"Uma maravilha adicional no mundo.\""
 laamp_base_learning_contract_events.4027.b.success_standard: "\"Eu vivo para servir.\""
 laamp_base_learning_contract_events.4027.b.success_qualified: "\"Bem, eu #EMP estava#! um pouco apressado.\""
 laamp_base_learning_contract_events.4027.b.failure_standard: "$laamp_base_learning_contract_events.4005.a.failure_standard$"
