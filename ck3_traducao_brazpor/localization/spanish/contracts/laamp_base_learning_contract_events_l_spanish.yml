l_spanish:
 #Transcribe texts for a local ruler
 laamp_base_4001_request: "Este [task_contract|lE] requer que você transcreva um manuscrito por meio de #BOLD 3#! desafios da [skill|lE] de [learning|lE]; alternativamente, você pode recorrer a [lifestyle_traits|lE] para produzir um manuscrito ainda melhor"
 laamp_base_learning_contract_events_prefix.4001: "Transcrição"
 #laamp_base_contract_schemes.4001.tt.explanation: "#D This has nowhere to be placed#!"
 laamp_base_learning_contract_events.4001.tt.current_total.sub_t1: "#TUT Você tem uma pontuação de #V [task_contract.MakeScope.Var('score_tally').GetValue]#! de #V [task_contract.MakeScope.Var('win_t1_threshold').GetValue]#! em direção a um #P Sucesso Qualificado#!#!"
 laamp_base_learning_contract_events.4001.tt.current_total.sub_t2: "#TUT Você tem uma pontuação de #V [task_contract.MakeScope.Var('score_tally').GetValue]#! de #V [task_contract.MakeScope.Var('win_t2_threshold').GetValue]#! em direção a um #P Sucesso#! #WEAK (atualmente você conquistou um Sucesso Qualificado)#!#!"
 laamp_base_learning_contract_events.4001.tt.current_total.sub_t3: "#TUT Você tem uma pontuação de #V [task_contract.MakeScope.Var('score_tally').GetValue]#! de #V [task_contract.MakeScope.Var('win_t3_threshold').GetValue]#! em direção a um #P Sucesso Excepcional#! #WEAK (atualmente você conquistou um Sucesso)#!#!"
 laamp_base_learning_contract_events.4001.tt.passages_left: "#TUT Você tem #V [task_contract.MakeScope.Var('text_passages_left').GetValue]#! de #V [task_contract.MakeScope.Var('win_t1_threshold').GetValue]#! Trechos do Transcript restantes#!"
 laamp_base_learning_contract_events.4001.tt.progress_towards_success_1: "#P +[SCOPE.ScriptValue('learning_task_contract_qualified_score_value')]#! pontuação em direção à conclusão bem-sucedida do [task_contract|lE]"
 laamp_base_learning_contract_events.4001.tt.progress_towards_success_2: "#P +[SCOPE.ScriptValue('learning_task_contract_medium_score_value')]#! pontuação em direção à conclusão bem-sucedida do [task_contract|lE]"
 laamp_base_learning_contract_events.4001.tt.progress_towards_success_3: "#P +[SCOPE.ScriptValue('learning_task_contract_major_score_value')]#! pontuação em direção à conclusão bem-sucedida do [task_contract|lE]"
 laamp_base_learning_contract_events.4001.tt.no_progress: "Você #BOLD não#! recebe nenhuma pontuação em direção à conclusão bem-sucedida do [task_contract|El]"
 laamp_base_learning_contract_events.4001.success.tt.embellishment: "A embelezamento sai perfeito"
 laamp_base_learning_contract_events.4001.success.tt: "A transcrição sai bem"
 laamp_base_learning_contract_events.4001.failure.tt: "O trecho sai mal e você o descarta"
 laamp_base_learning_contract_events.4001.success.t: "Transcrição Bem-Sucedida"
 laamp_base_learning_contract_events.4001.failure.t: "Transcrição Descartada"
 laamp_base_learning_contract_events.4001.t: "$laamp_base_learning_contract_events_prefix.4001$: O Empurrão Final"
 laamp_base_learning_contract_events.4001.t.diplomacy: "$laamp_base_learning_contract_events_prefix.4001$: As Câmaras Internas"
 laamp_base_learning_contract_events.4001.t.martial: "$laamp_base_learning_contract_events_prefix.4001$: Paz Através da Guerra"
 laamp_base_learning_contract_events.4001.t.stewardship: "$laamp_base_learning_contract_events_prefix.4001$: Quando o Ouro Fala"
 laamp_base_learning_contract_events.4001.t.intrigue: "$laamp_base_learning_contract_events_prefix.4001$: Toda Língua é Silenciosa"
 laamp_base_learning_contract_events.4001.t.learning: "$laamp_base_learning_contract_events_prefix.4001$: Palavras Divinas"
 laamp_base_learning_contract_events.4001.desc.01: "A luz do dia vai se apagando lentamente enquanto me sento na câmara [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] à luz das velas, copiando freneticamente rabiscos de tinta de uma folha para outra.\n\nAs pálpebras começam a pesar, e cochilo por um momento antes de despertar de sobressalto. Pelo que consigo ver, este trecho em particular parece relacionado a [SCOPE.Custom('GetScriptTopic')], mas por #EMP [ROOT.Char.GetFaith.HighGodName]#! se não estiver ficando #EMP interminable#!."
 laamp_base_learning_contract_events.4001.desc.02: "Han pasado unos cuantos días y estoy avanzando en la transcripción. Sin embargo, el párrafo actual es más árido que un desierto de gravilla…\n\nLa mente me empieza divagar sobre otros asuntos y parpadeo un par de veces para regresar al reino de la realidad. El meollo del párrafo parece estar relacionado con [SCOPE.Custom('GetScriptTopic')] que, de por sí, no es un tema tan correoso."
 laamp_base_learning_contract_events.4001.desc.03: "Me acerco al final de la transcripción que, por ahora, parece que será [SCOPE.Custom('GetScoreAdjective')|l]. Y, una vez más, el escribano del manuscrito vuelve a tomar el enfoque más #EMP soporífero#! hacia el tema en cuestión.\n\nMi mirada se fija en [attendant.Custom('ES_ElLa')] ayudante, una visión infinitamente más interesante, hasta que me echa una mirada suspicaz, lo que me hace regresar al texto. El párrafo en sí parece tener relación con [SCOPE.Custom('GetScriptTopic')], lo que podría interesar a los lectores… de haber sido menos rebuscado."
 laamp_base_learning_contract_events.4001.desc.final_shot: "Páginas pela metade, borrões de tinta, penas #EMP por toda parte#!. Esfrego as têmporas enquanto reflito sobre o caos em que minha transcrição fracassada resultou.\n\nOs olhos do assistente [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] me perfuram a nuca enquanto temo me virar para encarar meu fracasso iminente.\n\nMas então, quando estudo o esboço de [ROOT.Char.Custom('GetMarginalia')] nas margens, endireito as costas com um súbito ímpeto de desafio: #EMP Fracaso?#! Só preciso me apressar e terminar estas últimas páginas!"
 laamp_base_learning_contract_events.4001.outro.01: "\n\nPasso um dedo manchado de tinta [ROOT.Char.Custom('GetMarginalia')] nas margens. Talvez eu devesse melhorar um pouco o texto para deixá-lo mais atraente?"
 laamp_base_learning_contract_events.4001.outro.02: "\n\nObservo casual [ROOT.Char.Custom('GetMarginalia')] rabiscado nas margens enquanto reflito sobre a situação."
 laamp_base_learning_contract_events.4001.outro.03: "\n\nRefletindo sobre a melhor forma de seguir em frente enquanto admiro a marginalia de [ROOT.Char.Custom('GetMarginalia')]."
 laamp_base_learning_contract_events.4001.outro.secret: "\n\nEnquanto reflito, percebo outro rabisco que menciona [employer.Custom('ES_AlAla')] [employer.GetTitleAsNameNoTooltip|l]; se eu tivesse tempo para interpretá-lo…"
 laamp_base_learning_contract_events.4001.a: "Que tal eu embelezar isso, só um pouquinho..."
 laamp_base_learning_contract_events.4001.b: "Posso me inspirar em minhas próprias experiências!"
 laamp_base_learning_contract_events.4001.b.unavailable: "Se ao menos eu fosse mais experiente neste tópico."
 laamp_base_learning_contract_events.4001.b.tt.unavailable: "Você não tem nenhum [lifestyle_traits|lE] aplicável para este Trecho"
 laamp_base_learning_contract_events.4001.b.tt.used: "Você já se inspirou neste [lifestyle_trait|lE] para esta Transcrição"
 laamp_base_learning_contract_events.4001.b.flavor.unlearned: "Mas como eu desenharia isso..."
 laamp_base_learning_contract_events.4001.c: "Hmm... Vejo as semelhanças com [additional_language_culture.GetLanguage.GetNameNoTooltip]"
 laamp_base_learning_contract_events.4001.c.tt.used: "Você já se baseou no seu conhecimento de [language|lE] para esta Transcrição"
 laamp_base_learning_contract_events.4001.c.unavailable: "Queria ser mais erudito."
 laamp_base_learning_contract_events.4001.c.tt.unavailable: "Você só conhece uma [language|lE]"
 laamp_base_learning_contract_events.4001.d: "Vamos apenas seguir o script."
 laamp_base_learning_contract_events.4001.d.secret: "Vou passar mais tempo interpretando."
 laamp_base_learning_contract_events.4001.d.flavor.unlearned: "O que... pode significar aquela linha tortuosa..."
 laamp_base_learning_contract_events.4001.d.flavor.unwind: "Por que fazer mais quando posso fazer menos."
 laamp_base_learning_contract_events.4001.d.secret.tt: "Você descobre o [secret|lE] de [employer.GetShortUIName]"
 laamp_base_learning_contract_events.4001.e: "É melhor eu me concentrar."
 laamp_base_learning_contract_events.4001.f: "Não. Acabou."
 laamp_base_learning_contract_events.4001.f.tt: "$laamp_base_learning_contract_events.4110.c.tt$"
 #Conclusion
 laamp_base_learning_contract_events.4005.t: "$laamp_base_learning_contract_events_prefix.4001$: Conclusão"
 laamp_base_learning_contract_events.4005.desc.success.critical: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] tenta conter sua euforia:\n\n"Bem! Seus métodos nada convencionais parecem estar tendo muito sucesso! O/a jovem [child_to_educate.Custom('ES_ElLa')|U] jovem [child_to_educate.GetFirstName] já demonstra sinais de pensamentos e ideias mais perspicazes!".\n\n"Ângulos de ataque, cortesia social, economia… um trabalho maravilhoso! Obrigado(a), e por favor, #EMP hacédmelo#! me avisem quando voltarem a estar pela região!", exclama [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l] gesticulando com entusiasmo.\n\nUm breve sorriso escapa dos meus lábios enquanto assinto."
 laamp_base_learning_contract_events.4005.desc.success: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] folheia as páginas com um semblante intrigado: "Bem, este manuscrito é, sem dúvida, mais interessante do que eu me lembrava…".\n\n[employer.GetFirstNameNoTooltip] entrega o texto ao seu assistente: "Estudem isto e nos reuniremos à tarde".\n\nAo se virar para mim, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstNameNoTooltip|l] sorri brevemente e me entrega uma bolsa pesada: "Bom trabalho. Como combinado, aqui está sua recompensa"."
 laamp_base_learning_contract_events.4005.desc.success.qualified: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] aperta os lábios enquanto inspeciona o manuscrito. "É, sem dúvida, uma réplica da obra original. Obrigado pela entrega confiável".\n\nEle se vira para partir, mas para por um momento para acrescentar: "Ah. Vocês podem pegar sua recompensa na porta. Vão embora".\n\nVejo a bolsa junto à porta enquanto me preparo para ir embora."
 laamp_base_learning_contract_events.4005.desc.failure: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] sacode a cabeça:\n\nComo é… O que é… Isto é inaceitável. Vocês destruíram minha câmara #EMP e#! desperdiçaram valiosos recursos de escrita.\n\nAgora range os dentes: Saiam. Agora. Antes que eu me sinta #EMP menos#! benévol[employer.Custom('ES_OA')].\n\nSaio como uma flecha em direção à porta."
 laamp_base_learning_contract_events.4005.a.success_critical: "\"Tudo em um dia de trabalho.\""
 laamp_base_learning_contract_events.4005.a.success_standard: "\"Muito obrigado.\""
 laamp_base_learning_contract_events.4005.a.success_qualified: "\"Uma transcrição, entregue.\""
 laamp_base_learning_contract_events.4005.a.failure_standard: "\"Entendido.\""
 #Help settle theological arguments
 laamp_base_4011_request: "Este [task_contract|lE] te exige viajar a las tierras [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitledFirstName|l] para resolver unas cuantas disputas teológicas mediante desafíos de [skill|lE] de [learning|lE], [piety_level|lE], [traits|lE] religiosos aplicables, [piety|lE] o [stress|lE]."
 laamp_base_learning_contract_events_prefix.4011: "Uma Questão de Teologia"
 laamp_base_learning_contract_events.4011.t: "$laamp_base_learning_contract_events_prefix.4011$: Partindo"
 laamp_base_learning_contract_events.4011.desc: "Chegou a aurora e reuni uma comitiva que me acompanhará até a residência [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] em [employer.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nOs cavalos se remexem inquietos no lugar, e lanço um último olhar ao acampamento antes de partir."
 laamp_base_learning_contract_events.4011.a: "Vamos apressar!"
 laamp_base_learning_contract_events.4011.a.tt: "@camp_travel_short_icon! [Concept('travel', 'Viajas')|E] sem seu [domicile|lE]"
 laamp_base_learning_contract_events.4011.tt.destination_list.5_destinations: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [employer_location_destination.GetName], depois para [destination_1.GetNameNoTier], depois para [destination_2.GetNameNoTier], depois para [destination_3.GetNameNoTier], depois para [destination_4.GetNameNoTier], depois para [destination_5.GetNameNoTier] e, por fim, de volta a [employer_location_destination.GetName]"
 laamp_base_learning_contract_events.4011.tt.destination_list.4_destinations: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [employer_location_destination.GetName], depois a [destination_1.GetNameNoTier], em seguida a [destination_2.GetNameNoTier], em seguida a [destination_3.GetNameNoTier], em seguida a [destination_4.GetNameNoTier] e, por fim, de volta a [employer_location_destination.GetName]"
 laamp_base_learning_contract_events.4011.tt.destination_list.3_destinations: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente para [employer_location_destination.GetName], depois para [destination_1.GetNameNoTier], depois para [destination_2.GetNameNoTier], depois para [destination_3.GetNameNoTier] e, por fim, de volta a [employer_location_destination.GetName]"
 laamp_base_learning_contract_events.4011.tt.explanation: "#TUT Para cumplir el [task_contract|lE]:\n$EFFECT_LIST_BULLET$Completa un desafío de [learning|lE], recurre a tu [piety_level|lE], recurre a [fame_traits|lE] religiosos o convence al titular del destino mediante métodos #EMP impíos#!\n$EFFECT_LIST_BULLET$Gana un tercio de los desafíos para un #P éxito limitado#!\n$EFFECT_LIST_BULLET$Gana dos tercios y tendrás un #P éxito#! normal\n$EFFECT_LIST_BULLET$Gana todos los desafíos para un #P éxito excepcional#!\n\n@alert_icon! #alert_trial Cancelar el [Concept('travel', 'viaje')|E] invalidará el [task_contract|lE]#!#!"
 laamp_base_learning_contract_events.4014.t: "$laamp_base_learning_contract_events_prefix.4011$: A Mão Orientadora"
 laamp_base_learning_contract_events.4014.desc: "«¡… y entonces empezó con las #EMP risitas!#!». La rabia indignada [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] es patente.\n\n«Ya tuve #EMP muchas#! discusiones teológicas en su momento y [employer.GetFaith.HighGodNameAlternate|l] sabe que intento ser paciente. Sin embargo, puede que algunos de mis súbditos necesiten un #EMP empujoncito extra#! para ver la luz. Tal vez #EMP vos#! podríais ser tal guía espiritual».\n\n[employer.GetFirstNameNoTooltip] asiente para sí, al parecer satisfech[employer.Custom('ES_OA')] con su solución: «[employer.GetFaith.HighGodName] os bendiga en vuestros viajes. Ahora, partid»."
 laamp_base_learning_contract_events.4014.a: "\"Farei o meu melhor.\""
 laamp_base_learning_contract_events.4014.a.tt: "Comece a viajar em direção a [destination_1.GetNameNoTier]"
 laamp_base_learning_contract_events.4015.tt.current_total.sub_t1: "#TUT Você tem uma pontuação de #V [task_contract.MakeScope.Var('wins_tally').GetValue]#! de #V [task_contract.MakeScope.Var('win_t1_threshold').GetValue]#! para um #P Sucesso Qualificado#!#!"
 laamp_base_learning_contract_events.4015.tt.current_total.sub_t2: "#TUT Você tem uma pontuação de #V [task_contract.MakeScope.Var('wins_tally').GetValue]#! de #V [task_contract.MakeScope.Var('win_t2_threshold').GetValue]#! para um #P Sucesso#! #WEAK (você atualmente ganhou um Sucesso Qualificado)#!#!"
 laamp_base_learning_contract_events.4015.tt.current_total.sub_t3: "#TUT Você tem uma pontuação de #V [task_contract.MakeScope.Var('wins_tally').GetValue]#! de #V [task_contract.MakeScope.Var('win_t3_threshold').GetValue]#! para um #P Sucesso Excepcional#! #WEAK (você atualmente ganhou um Sucesso)#!#!"
 laamp_base_learning_contract_events.4015.tt.disputes_left: "#TUT Você tem #V [task_contract.MakeScope.Var('opportunities_left_tally').GetValue]#! de #V [task_contract.MakeScope.Var('win_t3_threshold').GetValue]#! Disputas restantes#!"
 laamp_base_learning_contract_events.4015.tt.progress_towards_success: "$laamp_base_contract_schemes.2781.tt.progress_towards_success$"
 laamp_base_learning_contract_events.4015.tt.no_progress: "$laamp_base_learning_contract_events.4001.tt.no_progress$"
 laamp_base_learning_contract_events.4015.t: "$laamp_base_learning_contract_events_prefix.4011$: [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]"
 laamp_base_learning_contract_events.4015.desc.surroundings.alley: "Encontro [challenge_character.Custom('ES_AlAla')] [challenge_character.GetTitledFirstName|l] em um dos becos de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], enquanto me dirigia para sua residência. Ele/ela estreita os olhos e começa a se aproximar quando me aproximo."
 laamp_base_learning_contract_events.4015.desc.surroundings.market: "Em um canto do mercado, encontro [challenge_character.Custom('ES_AlAla')] [challenge_character.GetTitledFirstName|l] examinando atentamente [challenge_character.Custom('GetTradeGoods')] que está sendo vendido por um comerciante local. Ele/ela levanta o olhar quando me aproximo."
 laamp_base_learning_contract_events.4015.desc.surroundings.outdoors_temple: "Uma brisa suave me recebe quando entro no terreno sagrado de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. [challenge_character.Custom('ES_ElLa')|U] [challenge_character.GetTitledFirstName|l] caminha tranquilamente um pouco mais à frente, aos poucos diminui o passo e se vira para mim à medida que me aproximo."
 laamp_base_learning_contract_events.4015.desc.surroundings.temple: "[challenge_character.Custom('ES_ElLa')|U] [challenge_character.GetTitledFirstName|l] está saindo de sua [challenge_character.GetFaith.HouseOfWorship] quando chego. Ele inclina a cabeça quando me vê caminhando em direção a [challenge_character.GetSheHe]."
 laamp_base_learning_contract_events.4015.desc.surroundings.study: "Ao chegar, encontro [challenge_character.Custom('ES_AlAla')] [challenge_character.GetTitledFirstName|l] inclinando-se sobre um mapa em seu escritório. Sem levantar a cabeça, resmunga em reconhecimento à minha presença."
 laamp_base_learning_contract_events.4015.desc.surroundings.physician: "Encontro [challenge_character.Custom('ES_AlAla')] [challenge_character.GetTitledFirstName|l] no estudo do médico, envolvido em uma conversa com dois de seus [challenge_character.GetFaith.AltPriestTermPlural]. O trio para de falar prontamente quando me aproximo, lançando-me um olhar curioso."
 laamp_base_learning_contract_events.4015.desc.surroundings.council_chamber: "Quando chego, [challenge_character.Custom('ES_ElLa')] [challenge_character.GetTitledFirstName|l] está na câmara do conselho, olhando pela janela com nostalgia. Aos poucos, vira-se ao ouvir meus passos."
 laamp_base_learning_contract_events.4015.desc.surroundings.corridor: "Quando chego, [challenge_character.Custom('ES_ElLa')] [challenge_character.GetTitledFirstName|l] caminha meditativamente[challenge_character.Custom('ES_OA')] por um dos longos corredores. Ele/ela se vira para me olhar quando me aproximo."
 laamp_base_learning_contract_events.4015.desc.surroundings.relaxing_room: "[challenge_character.Custom('ES_ElLa')|U] [challenge_character.GetTitledFirstName|l] está confortavelmente reclinado em uma cadeira acolchoada quando entro na sala de relaxamento. Ergue a cabeça quando me aproximo."
 laamp_base_learning_contract_events.4015.desc.local_mood.disapproval: "«[employer.GetFirstNameNoTooltip] ha sido siempre un poco dur[employer.Custom('ES_OA')] de entendederas en este tema en particular», reconoce [challenge_character.GetSheHe] cuando le explico el motivo de mi visita. «Desde luego, no coincido con su parecer y dudo que jamás lo haga»."
 laamp_base_learning_contract_events.4015.desc.local_mood.anger: ""Você vem aqui para me interromper por #EMP eso#!? Que [employer.GetTitleAsName|l] tão mesquinho, por Deus!". [challenge_character.GetFirstNameNoTooltip] cerra os punhos, respira fundo algumas vezes e tenta se acalmar. "Não há nada que você possa dizer que me faça concordar com esse/essa #EMP [employer.Custom2('InsultNounClumsy', SCOPE.sC('challenge_character'))]#!!!"."
 laamp_base_learning_contract_events.4015.desc.local_mood.admiration: "Lamento que [employer.GetFirstNameNoTooltip] se sinta assim. Mas minha lealdade está, antes de tudo, com o [challenge_character.GetFaith.GetNameNoTooltip|l]. Receio que não haja muita coisa que você possa fazer aqui, diz [challenge_character.GetSheHe], desculpando-se."
 laamp_base_learning_contract_events.4015.desc.local_mood.indifferent: "\"O quê de quem agora? Eh. Claro. Eu acho que podemos ter uma conversa sobre isso. Duvido que mude muito. Mas se isso te faz sentir melhor.\""
 laamp_base_learning_contract_events.4015.desc.local_mood.indifferent.02: "Abre os olhos de repente e pisca algumas vezes antes de entender o que quero dizer: "Entendo. É uma pena que [employer.GetFirstNameNoTooltip] encare isso assim, mas teremos de concordar em discordar", diz, franzindo a testa."
 laamp_base_learning_contract_events.4015.desc.local_mood.thinking: ""Hã? Aquela pequena discordância? Na verdade, não dei muita importância a isso, mas, se tiver mais argumentos a apresentar, fique à vontade". [challenge_character.GetFirstNameNoTooltip] dá de ombros: "Não tive a intenção especial de irritar [employer.GetFirstNameNoTooltip], embora não concordemos necessariamente nesse ponto em particular"."
 laamp_base_learning_contract_events.4015.desc.outro: "Eu assento em concordância, enquanto cuidadosamente traço o melhor caminho a seguir."
 laamp_base_learning_contract_events.4015.desc.outro_priest.intro: "À minha direita, [camp_priest.GetFirstName], [Select_CString( camp_priest.IsFemale, 'sacerdotisa', 'sacerdote' )] do meu acampamento,"
 laamp_base_learning_contract_events.4015.desc.outro_priest: "$laamp_base_learning_contract_events.4015.desc.outro_priest.intro$ murmura e acena, preparando-se mentalmente para suas convicções espirituais."
 laamp_base_learning_contract_events.4015.desc.outro_priest.wary: "$laamp_base_learning_contract_events.4015.desc.outro_priest.intro$ começa a parecer um pouco cansado[camp_priest.Custom('ES_OA')] enquanto seus olhos se estreitam ao considerar contra-argumentos."
 laamp_base_learning_contract_events.4015.desc.outro_priest.exhausted: "$laamp_base_learning_contract_events.4015.desc.outro_priest.intro$ parece decididamente desgastad[camp_priest.Custom('ES_OA')] e de vez em quando fica olhando para o nada. Ponho uma mão suave no ombro de [camp_priest.Custom('ES_OA'))."
 laamp_base_learning_contract_events.4015.a: "\"Permita-me compartilhar minha interpretação.\""
