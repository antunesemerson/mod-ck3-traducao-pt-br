 #Conclusion
 laamp_base_learning_contract_events.4017.t: "$laamp_base_learning_contract_events_prefix.4011$: Conclusão"
 laamp_base_learning_contract_events.4017.desc.success.critical: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] praticamente dança pela sala quando retorno: "#EMP Maravilloso!#! As ovelhas desgarradas voltaram ao redil; todas elas. Até mesmo [Select_CString( mentioned_disputee.IsFemale, 'esa molesta', 'ese molesto' )] [mentioned_disputee.GetFirstName]…".\n\nVira-se para pegar uma bolsa de moedas, pesada de tantas moedas, e a entrega prontamente: "Vocês mereceram cada última moeda, com certeza. Obrigado, e não deixem de me avisar se seu caminho os levar de novo a [employer.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]!".\n\nEu sorrio e aceno com a cabeça."
 laamp_base_learning_contract_events.4017.desc.success.standard: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] assente com sabedoria e aperta os lábios: "Um trabalho bem feito. A maioria deles me escreveu a respeito de nossas disputas, afirmando que eu estava certo na questão".\n\nPensa por um momento antes de acrescentar: "Não tenho dúvidas de que o restante acabará cedendo. Afinal de contas, eu #EMP tengo#! tenho a razão".\n\nAssinto educadamente e me viro para ir embora."
 laamp_base_learning_contract_events.4017.desc.success.qualified: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] frunce el ceño cuando regreso a [employer.GetCapitalLocation.GetTitle.GetNameNoTier]: «Hum. Es aceptable, aunque tal vez esperaba algo más».\n\nSe da la vuelta, murmurando para síꡟ: «Tal vez el siguiente lo haga mejor…».\n\nAl darse cuenta de que sigo ahí, señala una exigua bolsa junto a la puerta: ꡟ«Servíos. Confío que encontraréis la salida»."
 laamp_base_learning_contract_events.4017.desc.failure: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] debo rir ao entrar na salaꡟ: "Ora, vocês se deram ao trabalho de voltar depois desse triste espetáculo?".\n\nBalança a cabeça com desdém: "Vocês ao menos sabem alguma coisa sobre o [employer.GetFaith.GetNameNoTooltip|l]? Ainda bem que não fala nada sobre lidar com #EMP imbéciles#!".\n\nVira-se para ir embora, e eu fico ali por um instante antes de percorrer os corredores de volta, procurando a saída."
 laamp_base_learning_contract_events.4017.a: "\"Considere isto: eu semeei as sementes da dúvida.\""
 laamp_base_learning_contract_events.4017.a.tt: "Eles voltarão ao aprisco. Eu #EMP sei#! disso."
 laamp_base_learning_contract_events.4017.a.success.tt: "[employer.GetShortUIName] é convencido"
 laamp_base_learning_contract_events.4017.a.failure.tt: "Você não consegue convencer [employer.GetShortUIName]"
 laamp_base_learning_contract_events.4017.b.success_critical: "\"[employer.GetFaith.HighGodNameAlternate] guiou meu caminho.\""
 laamp_base_learning_contract_events.4017.b.success_standard: "\"Só precisei de um pequeno empurrão.\""
 laamp_base_learning_contract_events.4017.b.success_qualified: ""Estou convencid[ROOT.Char.Custom('ES_OA')] de que acabarão entrando em razão"."
 laamp_base_learning_contract_events.4017.b.failure_standard: "$laamp_base_learning_contract_events.4005.a.failure_standard$"
 #Create a work of learning for a ruler
 laamp_base_4021_request: "Este [task_contract|lE] exige que você crie um manuscrito para [TaskContract.GetEmployer.Custom('ES_ElLa')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier], principalmente por meio de desafios de [skill|lE] de [learning|lE], mas potencialmente também com desafios em outras [skills|E] relevantes, [lifestyle_traits|lE] e experiência de [Concept('travel', 'viaje')|E]."
 laamp_base_learning_contract_events_prefix.4021: "O Manuscrito"
 laamp_base_learning_contract_events.4021.t: "$laamp_base_learning_contract_events_prefix.4021$: O que há em uma Obra"
 laamp_base_learning_contract_events.4021.desc: "Murmuro enquanto dou uma olhada no gabinete [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l]. Aqui se reúnem montes de textos, manuscritos e contos curtos, em pilhas organizadas e alinhadas nas estantes.\n\nMas uma obra não é necessariamente medida pelo seu tamanho, não é? Até a menção de uma única palavra pode evocar emoções complexas.\n\nMas, antes de tudo: quanto trabalho tenho vontade de fazer?"
 laamp_base_learning_contract_events.4021.a: "Melhor manter simples."
 laamp_base_learning_contract_events.4021.a.tt: "Ficar com #V 3#! Capítulos"
 laamp_base_learning_contract_events.4021.b: "Minha criação será #EMP exaustiva#!."
 laamp_base_learning_contract_events.4021.b.tt: "Alcançar #V 5#! Capítulos\n$EFFECT_LIST_BULLET$ Chance adicional de um ponto em [skill|lE] no último Capítulo"
 laamp_base_learning_contract_events.4021.tt.chapter_explanation: "#TUT Com mais Capítulos, você enfrentará um aumento na quantidade de desafios. As recompensas irão se acumular, mas a dificuldade também!#!"
 laamp_base_learning_contract_events.4021.tt.explanation: "#TUT Para completar o [task_contract|lE]:\n$EFFECT_LIST_BULLET$ Complete um desafio de [learning|lE], um desafio combinado com outra [skill|lE] relevante ou recorra à sua experiência de [Concept('traveling', 'viajes')|E]\n$EFFECT_LIST_BULLET$ Vença um terço dos desafios para um #P éxito limitado#!\n$EFFECT_LIST_BULLET$ Vença dois terços dos desafios para um #P éxito#! normal\n$EFFECT_LIST_BULLET$ Vença todos os desafios para um #P éxito excepcional#!#!"
 laamp_base_learning_contract_events.4025.t.first: "$laamp_base_learning_contract_events_prefix.4021$: Começos Humildes"
 laamp_base_learning_contract_events.4025.t.last: "$laamp_base_learning_contract_events_prefix.4021$: o Capítulo Final"
 laamp_base_learning_contract_events.4025.t: "$laamp_base_learning_contract_events_prefix.4021$: o Próximo Capítulo"
 #Intro
 laamp_base_learning_contract_events.4025.desc.intro.first: "Eu olho para a página em branco à minha frente. #EMP Palavras.#! Por que é sempre tão difícil começar?"
 laamp_base_learning_contract_events.4025.desc.intro.final_shot: "Secando uma gota de suor da minha testa, minha mente continua girando. Meu trabalho está quase completo — mas como eu tenho me saído? Isso é apresentável?"
 laamp_base_learning_contract_events.4025.desc.intro.last: "Ao folhear meus rabiscos, solto um grunhido satisfeito. Relevante e conciso. Isso deveria satisfazer [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l], certo?"
 laamp_base_learning_contract_events.4025.desc.intro.inspiration: "Um pensamento de repente me ocorre. [SCOPE.Custom('GetInspirationTopic')|U]. Não é tão difícil, é? Quanto mais penso sobre isso, mais inspirado me sinto para compartilhar meu conhecimento sobre o assunto."
 laamp_base_learning_contract_events.4025.desc.intro.01: "Depois de um tempo, enquanto me envolvo nisso, descubro que estou rabiscando, preenchendo página após página com pensamentos e observações relacionadas a [SCOPE.Custom('GetLatestTopic')]."
 laamp_base_learning_contract_events.4025.desc.intro.02: "Enquanto estou escrevendo, desfruto de um delicioso canto de pássaros, que entra pelos magníficos jardins de [employer.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 laamp_base_learning_contract_events.4025.desc.intro.03: "O tempo passa rapidamente enquanto estou sentado perto do púlpito, registrando minhas minuciosas observações e perspectivas sobre [SCOPE.Custom('GetLatestTopic')]."
 #Mid
 laamp_base_learning_contract_events.4025.desc.first: "O [ROOT.Char.Custom('WritingInstrument')] acariciando meu queixo, pondero cuidadosamente sobre o que o manuscrito deve ser."
 laamp_base_learning_contract_events.4025.desc.final_shot: "A luz do dia se esvai lá fora enquanto me sento à luz de velas; agora me sinto decididamente mais fri[ROOT.Char.Custom('ES_OA')], sozinha com meus próprios pensamentos de inadequação. Nem as frequentes porções de comida me animam."
 laamp_base_learning_contract_events.4025.desc.last: "Os pratos continuam se acumulando enquanto aproveito os últimos vestígios de hospitalidade agora que meu trabalho aqui está chegando ao fim. Os serventes estão mais mesquinhos com a comida agora, ou estou imaginando coisas...?"
 laamp_base_learning_contract_events.4025.desc.01: "La luz del día se difumina fuera y yo me siento a la luz de las velas en el estudio [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l], disfrutando de la hospitalidad que tiene ser [Select_CString( ROOT.Char.IsFemale, 'una escribana', 'un escribano' )] que trabaja."
 laamp_base_learning_contract_events.4025.desc.02: "Serventes aparecem ocasionalmente, limpando silenciosamente o cômodo ou fornecendo porções de comida; mas sempre tendo o máximo cuidado para ser silenciosos e fechando a porta cuidadosamente ao sair."
 laamp_base_learning_contract_events.4025.desc.03: "De vez em quando, se não estiver fora, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] enfia a cabeça no gabinete para observar o progresso das minhas páginas manchadas de tinta. Ele murmura e depois vai embora, aparentemente ocupado[employer.Custom('ES_OA')] com assuntos mais importantes."
 #Outro
 laamp_base_learning_contract_events.4025.desc.outro.first.has_topic: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] queria um texto relacionado com [SCOPE.Custom('GetPreferedTopic')]. Um ponto válido para levar em conta. Agora, por onde começo…"
 laamp_base_learning_contract_events.4025.desc.outro.first.no_topic: "Deixando meu olhar vagar pela sala novamente, procuro em minha mente tópicos apropriados para começar meu capítulo..."
 laamp_base_learning_contract_events.4025.desc.outro.final_shot: "Pondero sobre isso e então endireito um pouco as costas. Tenho duas opções — reconhecer minhas falhas ou — eu enfio o peito para fora — faço uma última tentativa, #EMP apropriada#!"
 laamp_base_learning_contract_events.4025.desc.outro.01: "Reconhecendo isso, passo para a questão mais pertinente de tentar decidir se devo continuar escrevendo sobre [SCOPE.Custom('GetLatestTopic')] ou se seria mais sábio diversificar..."
 laamp_base_learning_contract_events.4025.desc.outro.02: "Refletindo sobre isso, continuo considerando sobre o que deve ser o próximo capítulo..."
 laamp_base_learning_contract_events.4025.desc.outro.03: "Com o pensamento pairando em minha mente, volto minha atenção para a página — [SCOPE.Custom('GetLatestTopic')] ainda é pertinente para escrever sobre...?"
 laamp_base_learning_contract_events.4025.a: "Vou deslumbrá-los com minha sagacidade!"
 laamp_base_learning_contract_events.4025.a.second: "Um toque a mais de sagacidade não faria mal."
 laamp_base_learning_contract_events.4025.b: "Um trecho sobre habilidades sociais seria útil."
 laamp_base_learning_contract_events.4025.b.second: "Outro teorema sobre diplomacia seria bom."
 laamp_base_learning_contract_events.4025.c: "Meu conhecimento militar deve se traduzir bem."
 laamp_base_learning_contract_events.4025.c.second: "Outra seção sobre comandantes, talvez?"
 laamp_base_learning_contract_events.4025.d: "S é para administração. Meu tipo de tópico."
 laamp_base_learning_contract_events.4025.d.second: "Desta vez, vamos abordar eficiência."
 laamp_base_learning_contract_events.4025.e: "Um tratado sobre engano, a caminho."
 laamp_base_learning_contract_events.4025.e.second: "Outro capítulo sobre discrição, talvez."
 laamp_base_learning_contract_events.4025.f: "Tenho muitas histórias de viagem para contar."
 laamp_base_learning_contract_events.4025.f.second: "Outra rodada de histórias de viagem poderia ser boa."
 laamp_base_learning_contract_events.4025.g: "Peregrinações. Há realmente algo mais #EMP divino#!?"
 laamp_base_learning_contract_events.4025.g.second: "Estamos realmente prontos para acabar com peregrinações?"
 laamp_base_learning_contract_events.4025.h: "As #EMP maravilhas#! que vi. Vou escrever sobre isso."
 laamp_base_learning_contract_events.4025.h.second: "Há muitas mais maravilhas para escrever!"
 laamp_base_learning_contract_events.4025.i: "Melhor me concentrar, suponho."
 laamp_base_learning_contract_events.4025.i.second: "Mais uma concentração, então."
 laamp_base_learning_contract_events.4025.i.flavor: "Isso faz minha cabeça doer..."
 laamp_base_learning_contract_events.4025.j: "Um #EMP último#! esforço..."
 laamp_base_learning_contract_events.4025.k: "Não. Não vale a pena."
 laamp_base_learning_contract_events.4025.success.tt: "O Capítulo sai bem"
 laamp_base_learning_contract_events.4025.success.t: "Capítulo Terrífico"
 laamp_base_learning_contract_events.4025.failure.tt: "Você estraga o Capítulo"
 laamp_base_learning_contract_events.4025.failure.t: "Capítulo Fraco"
