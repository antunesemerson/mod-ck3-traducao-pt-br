 #Intro
 laamp_base_learning_contract_events.4100.desc.intro.first_time: "[child_to_educate.GetFirstName] me olha com curiosidade, mas expectativa, quando nos encontramos para nossa primeira sessão."
 laamp_base_learning_contract_events.4100.desc.intro.stress: "À medida que me aproximo, [child_to_educate.GetFirstName] recua instintivamente, seus olhos se estreitando em suspeita."
 laamp_base_learning_contract_events.4100.desc.intro.support_no_support: "Uma breve expressão de confusão cruza o rosto de [child_to_educate.GetFirstName] enquanto pondera onde meu assistente da nossa última sessão foi parar."
 laamp_base_learning_contract_events.4100.desc.intro.support: "[child_to_educate.GetFirstName] inspeciona [support_person.GetFirstName] com um olhar curioso enquanto nos aproximamos."
 laamp_base_learning_contract_events.4100.desc.intro.learning: "[child_to_educate.GetFirstName] me dá um olhar enigmático quando nos encontramos para nossa próxima sessão."
 laamp_base_learning_contract_events.4100.desc.intro.topic: "Ao nos reencontrarmos, [child_to_educate.GetFirstName] inclina sua cabeça enquanto eu resumo o tópico da nossa última sessão."
 #Surroundings
 laamp_base_learning_contract_events.4100.desc.surroundings.alley_day: "\n\nO beco fervilha de atividade, com comerciantes se movendo apressadamente entre as praças,"
 laamp_base_learning_contract_events.4100.desc.surroundings.gallows: "\n\nA multidão do cadafalso está apenas se dispersando, sua sede de sangue saciada,"
 laamp_base_learning_contract_events.4100.desc.surroundings.market: "\n\nMercadorias trocam de mãos e as necessidades são atendidas no mercado,"
 laamp_base_learning_contract_events.4100.desc.surroundings.docks: "\n\nOs barcos de pesca estão chegando ao cais e a fartura do mar está sendo descarregada,"
 laamp_base_learning_contract_events.4100.desc.surroundings.armory: "\n\nO forno ruge, as armas estão empilhadas nos cantos do arsenal,"
 laamp_base_learning_contract_events.4100.desc.surroundings.garden: "\n\nOs jardins tranquilos oferecem amplas oportunidades de ensino,"
 laamp_base_learning_contract_events.4100.desc.surroundings.tavern: "\n\nA taverna reúne uma multidão de frequentadores e visitantes,"
 laamp_base_learning_contract_events.4100.desc.surroundings.temple: "\n\nMuitos [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetAdherentNamePluralNoTooltip] percorrem pacificamente os terrenos sagrados,"
 laamp_base_learning_contract_events.4100.desc.surroundings.throneroom: "\n\nOs servos trotam de um lado para o outro no salão do trono,"
 laamp_base_learning_contract_events.4100.desc.surroundings.farmlands: "\n\nUma fila de aldeões indo e vindo atravessa as planícies das terras agrícolas,"
 laamp_base_learning_contract_events.4100.desc.surroundings.plains: "\n\nOs ventos vagam pelas planícies, e o toque de seu sopro é sentido por todos os que as atravessam,"
 laamp_base_learning_contract_events.4100.desc.surroundings.steppe: "\n\nA estepe parece continuar sem fim, à medida que nos aproximamos dos arredores da posse,"
 laamp_base_learning_contract_events.4100.desc.surroundings.desert: "\n\nAreia, areia, areia, até onde a vista alcança. Nós circulamos pelas redondezas do domínio,"
 laamp_base_learning_contract_events.4100.desc.surroundings.drylands: "\n\nAs terras áridas não abrigam muitas gotas de água, mas ainda assim encontramos vários grupos de viajantes,"
 laamp_base_learning_contract_events.4100.desc.surroundings.oasis: "\n\nO oásis, situado nos arredores do domínio, atrai muitos visitantes,"
 laamp_base_learning_contract_events.4100.desc.surroundings.hills: "\n\nAs colinas onduladas abrigam muitos [ROOT.Char.Custom('RegionalFarmAnimalPlural')] que pastam,"
 laamp_base_learning_contract_events.4100.desc.surroundings.mountains: "\n\nAs encostas das montanhas locais abrigam todo tipo de viajantes e atividades,"
 laamp_base_learning_contract_events.4100.desc.surroundings.wetlands: "\n\nToda sorte de pragas tem nos pântanos alagadiços seu lar, como logo descobre o viajante descuidado,"
 laamp_base_learning_contract_events.4100.desc.surroundings.foggy_forest: "\n\nUma névoa brilhante envolve a floresta, enquanto os locais preparam sua próxima refeição por perto,"
 laamp_base_learning_contract_events.4100.desc.surroundings.managed_forest: "\n\nO acampamento de lenhadores próximo fervilha de atividade,"
 laamp_base_learning_contract_events.4100.desc.surroundings.pine_forest: "\n\nOs forrageadores se movem pela vegetação rasteira, colhendo iguarias locais,"
 laamp_base_learning_contract_events.4100.desc.surroundings.forest: "\n\nNos deparamos com um acampamento local de aventureiros amigáveis na floresta,"
 laamp_base_learning_contract_events.4100.desc.surroundings.forest_cave: "\n\n[Select_CString( ROOT.Char.IsFemale, 'La sabia', 'El sabio' )] o sábio local que habita a caverna atrai uma boa multidão,"
 laamp_base_learning_contract_events.4100.desc.surroundings.snowy_forest: "\n\nOs aldeões seguem o rastro de pegadas de animais na neve,"
 #Topic
 laamp_base_learning_contract_events.4100.desc.topic.diplomacy: "e eu avisto uma variedade de oportunidades para ensinar [child_to_educate.GetFirstNameNoTooltip] mais sobre a graça da interação social."
 laamp_base_learning_contract_events.4100.desc.topic.martial: "e enquanto examino nossos arredores, rapidamente avisto alguns pontos de vantagem que devo ensinar a [child_to_educate.GetFirstNameNoTooltip]."
 laamp_base_learning_contract_events.4100.desc.topic.stewardship: "e olhando ao redor, identifico várias oportunidades para melhorar a organização atual; algo que [child_to_educate.GetFirstNameNoTooltip] deve ser informado."
 laamp_base_learning_contract_events.4100.desc.topic.intrigue: "e enquanto caminhamos pelo caminho, mantenho um olhar atento em nossos arredores — uma habilidade que [child_to_educate.GetFirstNameNoTooltip] deve dominar."
 laamp_base_learning_contract_events.4100.desc.topic.learning: "e eu localizo [ROOT.Char.Custom('GetScientificObjects')] que seriam benéficos para [child_to_educate.GetFirstNameNoTooltip] tomar conhecimento."
 laamp_base_learning_contract_events.4100.desc.topic.prowess: "e imediatamente começo a identificar os vários ângulos perigosos de onde poderíamos ser emboscados — algo que devo ensinar a [child_to_educate.GetFirstNameNoTooltip]."
 #Distraction
 laamp_base_learning_contract_events.4100.desc.distraction.stress: "\n\n[child_to_educate.Custom('ES_ElLa')|U] [child_to_educate.Custom('GirlBoy')] caminha atrás de mim, decididamente olhando para o longe e me ignorando toda vez que [child_to_educate.GetHerHim] olho, preparando-se para meu próximo acesso de impaciência. Franzo a testa e reflito sobre a situação."
 laamp_base_learning_contract_events.4100.desc.distraction.hobbyhorse: "\n\nAtrás de mim, meu pupilo[child_to_educate.Custom('ES_OA')] se deixa levar, pega seu cavalo de madeira de uma banca próxima, o monta e começa a dar voltas pela área, alegremente."
 laamp_base_learning_contract_events.4100.desc.distraction.attention: "\n\nQuando me viro, [child_to_educate.Custom('ES_ElLa')] [child_to_educate.Custom('GirlBoy')] parou completamente para inspecionar atentamente um graveto do tamanho de um braço que encontrou no chão, sem responder aos meus chamados."
 laamp_base_learning_contract_events.4100.desc.distraction.dog: "\n\nEntão, como saído do nada, um grande exemplar de [ROOT.Char.Custom('get_region_dog_type')] corre em direção a [child_to_educate.Custom('ES_ElLa')] [child_to_educate.Custom('GirlBoy')], desesperado para brincar. [child_to_educate.GetSheHe|U] grita de alegria e começa imediatamente a brincar com o cachorro."
 laamp_base_learning_contract_events.4100.desc.distraction.running: "\n\nDe repente, [child_to_educate.Custom('ES_ElLa')] jovem [child_to_educate.Custom('GirlBoy')] de ascendência [child_to_educate.GetCulture.GetNameNoTooltip] tem um brilho selvagem nos olhos e começa a gritar "Os bandidos estão vindo!" e quase morre de tanto rir enquanto corre de um lado para o outro com seu acompanhante."
 laamp_base_learning_contract_events.4100.desc.distraction.crushing: "\n\nUn poco más adelante, [Select_CString( dummy_gender.IsFemale, 'una bonita campesina', 'un guapo campesino' )] ha cautivado, al parecer, a mi protegid[child_to_educate.Custom('ES_OA')], quien se escabulle para observar intensamente [dummy_gender.Custom('ES_AlAla')] [dummy_gender.Custom('GirlBoy')] llevar provisiones mientras #EMP decididamente#! obvia mi presencia."
 laamp_base_learning_contract_events.4100.desc.distraction.other_kids: "\n\nOutras crianças correm em um jogo improvisado que chama a atenção do meu [child_to_educate.Custom('GirlBoy')], que corre para se juntar a eles na partida antes que eu possa impedir[child_to_educate.GetHerHim]."
 laamp_base_learning_contract_events.4100.desc.distraction.friends: "\n\nMeu pupilo[child_to_educate.Custom('ES_OA')] parece ter trazido um grupo de amigos, o que até que tudo bem, mas eles parecem pouco interessados em ouvir minha aula, para meu desgosto. Contenho-me para não franzir a testa enquanto discutem e zombam uns dos outros."
 laamp_base_learning_contract_events.4100.desc.distraction.hiding: "\n\n[child_to_educate.Custom('ES_AlAla')|U] [child_to_educate.Custom('GirlBoy')] parece que deu para brincar, pois fica entrando e saindo de esconderijos de forma obsessiva, tentando se afastar de mim. Tento conter minha frustração crescente."
 laamp_base_learning_contract_events.4100.desc.distraction.unimpressed: "\n\nUma vez passadas as cortesias iniciais, [child_to_educate.Custom('ES_ElLa')] [child_to_educate.Custom('GirlBoy')], ignoro por qual motivo, se recosta, começa a me ignorar, fecha os olhos e finge estar adormecid[child_to_educate.Custom('ES_OA')] durante a lição."
 #Outro
 laamp_base_learning_contract_events.4100.desc.outro_body: "me acena de longe, pront[support_person.Custom('ES_OA')] para me ajudar, caso seja necessário."
 laamp_base_learning_contract_events.4100.desc.outro: "\n\n[support_person.GetFirstName] $laamp_base_learning_contract_events.4100.desc.outro_body$"
 laamp_base_learning_contract_events.4100.desc.outro_other: "\n\n[support_person.GetFirstNameNoTooltip] $laamp_base_learning_contract_events.4100.desc.outro_body$"
 laamp_base_learning_contract_events.4100.a: ""[child_to_educate.Custom('ChildPetName')|U], sabia que não #EMP sabías#! que…""
 laamp_base_learning_contract_events.4100.b: "\"Certo, apenas por mais um pouco, então vamos começar.\""
 laamp_base_learning_contract_events.4100.b.scholar: "Que tal uma abordagem mais acadêmica!"
 laamp_base_learning_contract_events.4100.c.support_exists: "\"[support_person.GetFirstNameNoTooltip], sua hora de brilhar!\""
 laamp_base_learning_contract_events.4100.c.diplomacy.support_not_exists: "Se ao menos eu tivesse um diplomata mais experiente para me ajudar."
 laamp_base_learning_contract_events.4100.c.martial.support_not_exists: "Se ao menos eu tivesse um seguidor mais militar para me ajudar."
 laamp_base_learning_contract_events.4100.c.stewardship.support_not_exists: "Aposto que alguém mais organizado poderia lidar com isso."
