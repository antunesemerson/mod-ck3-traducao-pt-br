 #Go Big or Go Home
 laamp_base_learning_contract_events.4110.t: "$laamp_base_learning_contract_events_prefix.4100$: Uma Última Tentativa"
 laamp_base_learning_contract_events.4110.desc: "Vejo o fracasso iminente quando o olhar de [child_to_educate.GetFirstName] volta a vagar sem rumo.\n\nPor alguma razão, est[child_to_educate.Custom('ES_EA')] [child_to_educate.Custom('GirlBoy')] não #EMP reacciona a nada#!… Cerro os punhos e respiro fundo algumas vezes. Talvez eu esteja abordando isso pelo ângulo errado?\n\nNosso tempo está quase se esgotando e é melhor eu fazer uma tentativa #EMP final#! para conseguir ensinar a est[child_to_educate.Custom('ES_EA')] jovem #EMP algo#! relevante."
 laamp_base_learning_contract_events.4110.a: "\"Ei, [child_to_educate.Custom('ChildPetName')], qual é a sua experiência com...\""
 laamp_base_learning_contract_events.4110.b: "\"Você sabe a palavra em [alternative_language_culture.GetLanguage.GetNameNoTooltip] para #EMP meleca#!?\""
 laamp_base_learning_contract_events.4110.b.tt: "Você não sabe mais [language|E] do que [child_to_educate.GetShortUIName]"
 laamp_base_learning_contract_events.4110.c: "Não. É um caso perdido."
 laamp_base_learning_contract_events.4110.c.tt: "@alert_icon! #alert_trial A falha do [task_contract|lE] é iminente#!"
 #Conclusion
 laamp_base_learning_contract_events.4120.t: "$laamp_base_learning_contract_events_prefix.4100$: Examina"
 laamp_base_learning_contract_events.4120.desc.success: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] tem uma expressão indecifrável, beirando o apreço.\n\n“Com certeza, vocês têm uma abordagem pouco ortodoxa no que diz respeito à educação e [child_to_educate.GetFirstName] recebeu uma ou duas novas perspectivas sobre as coisas... Talvez eu entre em contato novamente, caso seus serviços sejam necessários no futuro.”\n\nAssinto e abaixo levemente a cabeça enquanto me viro para partir."
 laamp_base_learning_contract_events.4120.desc.success_critical: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] tenta conter sua euforia:\n\nOra! Parece que seus métodos pouco convencionais estão tendo muito sucesso! [child_to_educate.Custom('ES_ElLa')|U] jovem [child_to_educate.GetFirstName] já está mostrando sinais de pensamentos e ideias mais perspicazes!\n\nÂngulos de ataque, cortesias sociais, economia… um trabalho maravilhoso! Obrigado, e, por favor, #EMP me avise#! quando você estiver na região novamente!, exclama [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l] gesticulando com entusiasmo.\n\nUm breve sorriso passa pelos meus lábios enquanto aceno com a cabeça."
 laamp_base_learning_contract_events.4120.desc.failure: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] agita a cabeça em descrença:\n\nNão vou mentir; esperava mais de vocês. É uma patética demonstração de tutela; deixar [child_to_educate.GetFirstName] correr livre pela natureza teria sido #EMP mais#! educativo. Agora, desapareçam e não apareçam mais à minha porta.\n\nSinto como a vergonha pela tarefa fracassada inflama minhas bochechas enquanto me viro para partir."
 laamp_base_learning_contract_events.4120.a.success_standard: "\"Muito obrigado.\""
 laamp_base_learning_contract_events.4120.a.success_critical: ""Foi tudo culpa dela/dele"."
 laamp_base_learning_contract_events.4120.a.failure_standard: "[child_to_educate.Custom('ES_ElLa')|U] [child_to_educate.Custom('GirlBoy')] não tem jeito… ou talvez seja eu."
