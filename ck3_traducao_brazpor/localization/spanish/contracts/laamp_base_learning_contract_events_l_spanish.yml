 laamp_base_learning_contract_events.4100.c.learning.support_not_exists: "Se ao menos eu conhecesse alguém mais sábio."
 laamp_base_learning_contract_events.4100.c.prowess.support_not_exists: "Eu gostaria de conhecer alguém com grandes habilidades de combate."
