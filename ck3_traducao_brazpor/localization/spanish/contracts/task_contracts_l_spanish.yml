 laamp_request_boilerplate_intrigue_scheme: "Este [task_contract|lE] requer que você complete um [scheme|lE] de [intrigue|lE]"
 laamp_request_boilerplate_learning_scheme: "Este [task_contract|lE] requer que você complete um [scheme|lE] de [learning|lE]"
 laamp_request_boilerplate_prowess_scheme: "Este [task_contract|lE] requer que você complete um [scheme|lE] de [prowess|lE]"
