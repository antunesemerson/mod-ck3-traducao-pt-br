 ep3_contract_event.0006.t: "$ep3_contract_event.0005.t$"
 ep3_contract_event.0006.desc: "Chego em [task_contract_destination.GetName], visitando a [task_contract_destination.Custom('GetGuildType')|l] local em busca de pistas sobre curiosidades na área... mas sem sorte. Eu paro na"
 ep3_contract_event.0006.desc_locals: "a taverna, onde ouço uma conversa intrigante entre dois fofoqueiros.\n\n“Estou te dizendo, [local_2.GetFirstName] que o/a [newly_created_artifact.GetName] está escondido/a em nosso/a [task_contract_destination.GetTerrain.GetNameNoTooltip|l]! E eu sei onde está!”, sussurra uma das pessoas dos [local_1.GetCulture.GetCollectiveNounNoTooltip].\n\n“Shh, [local_1.GetFirstName]. Estão nos observando…”, sibila a outra pessoa, apontando para mim."
 ep3_contract_event.0006.desc_locals_temple: "[task_contract_destination.Custom('GetLocationFaithTemple')].\n\n"Bem-vindo, viajante[ROOT.Char.Custom('ES_OA')]!", saúda [local_1.Custom('ES_ElLa')] [Select_CString( local_1.IsFemale, 'sacerdotisa', 'sacerdote' )] local. "Dizem que buscais riquezas terrenas. Bem..., talvez eu tenha algo a dizer-vos sobre tal [newly_created_artifact.GetName]".\n\n"Mas somente se tiverdes o favor de [local_1.GetFaith.WealthGodName]…"."
 ep3_contract_event.0006.desc_locals_city: "o mercado, onde um vendedor ambulante me agarra logo ao entrar.\n\nBem-vind[ROOT.Char.Custom('ES_OA')] e, viajant[ROOT.Char.Custom('ES_OA')]! Ora, pareces um[ROOT.Char.Custom('ES_XA')] comerciante experiente[ROOT.Char.Custom('ES_OA')]. Acontece que tenho tudo o que precisais, dos pés à cabeça, de uma ponta à outra do corpo! Acreditais que possa interessar-vos um item especial..., digamos, [newly_created_artifact.GetName]?"
 ep3_contract_event.0006.desc_locals_castle: "os portões de [task_contract_destination.GetHolding.GetType.GetName|l], onde noto um casal de [Select_CString(And(local_1.IsFemale, local_2.IsFemale), 'lugareñas', 'lugareños')].\n\n“Não estou te enganando, [local_2.GetFirstName]. A família [local_ruler.GetDynastyHouseName] adquiriu o [newly_created_artifact.GetName]! Eu mesma vi quando o levaram para o [local_ruler.Custom('ResidenceBuilding')|l]”, diz a primeira voz [local_1.GetCulture.GetNameNoTooltip].\n\n“Não vai ser fácil, [local_1.GetFirstName]… mas talvez #EMP podamos#! consigamos obtê-lo!”, responde [Select_CString(local_2.IsFemale, 'la segunda', 'el segundo' )] com um brilho nos olhos."
 ep3_contract_event.0006.castle: "\"Com licença, mas talvez possamos unir forças?\""
 ep3_contract_event.0006.castle_won: "Você recupera o item com sucesso."
 ep3_contract_event.0006.castle_lost_desc: "[local_1.Custom('ES_ElLa')|U] [local_1.GetTitledFirstNameNoTooltip|l] te engana e foge com sua [newly_created_artifact.GetNameNoTooltip]"
 ep3_contract_event.0006.castle_lost: "[local_1.GetShortUIName] Pega o Artefato"
 ep3_contract_event.0006.church: "\"Sou digno, vou provar isso!\""
 ep3_contract_event.0006.church_won: "Você prova seu zelo e recupera o item."
 ep3_contract_event.0006.church_lost_desc: "[local_1.Custom('ES_ElLa')|U] [local_1.GetTitledFirstNameNoTooltip|l] não está convencid[local_1.Custom('ES_OA')] de que você seja piedoso o bastante[ROOT.Char.Custom('ES_OA')]"
 ep3_contract_event.0006.church_lost: "[local_1.GetShortUIName] te considera ímpio[ROOT.Char.Custom('ES_OA')]"
 ep3_contract_event.0006.city: "\"Baixe o preço e temos um acordo!\""
 ep3_contract_event.0006.city_won: "Você convence [local_1.GetShortUIName] a baixar o preço."
 ep3_contract_event.0006.city_lost_desc: "[local_1.Custom('ES_ElLa')|U] [local_1.GetTitledFirstNameNoTooltip|l] já não quer mais vender isso para você"
 ep3_contract_event.0006.city_lost: "[local_1.GetShortUIName] Rejeita a Oferta."
 ep3_contract_event.0006.buy: "\"Posso pagar, generosamente!\""
 ep3_contract_event.0006.buy_won: "Você faz uma oferta convincente e compra o item."
 ep3_contract_event.0006.buy_lost_desc: "$ep3_contract_event.0006.city_lost_desc$"
 ep3_contract_event.0006.buy_lost: "$ep3_contract_event.0006.city_lost$"
 ep3_contract_event.0006.intimidate: "\"Dê isso para mim, #EMP AGORA!#!\""
 ep3_contract_event.0006.intimidate_won: "Intimidas [local_1.Custom('ES_AlAla')] [local_1.GetTitledFirstNameNoTooltip|l] para que entregue o item"
 ep3_contract_event.0006.intimidate_lost_desc: "[local_1.Custom('ES_ElLa')|U] [local_1.GetTitledFirstNameNoTooltip|l] mantém o artefato"
 ep3_contract_event.0006.intimidate_lost: "[local_1.GetShortUIName] Não Tem Medo de Você."
 ep3_contract_event.0006.library: "Vou procurar em outro lugar. Deve haver algo!"
 ep3_contract_event.0006.library_won: "Você procura por um artefato diferente."
 ep3_contract_event.0006.library_lost_desc: "Você não consegue encontrar nada útil e sai de mãos vazias."
 ep3_contract_event.0006.library_lost: "Você Sai de Mãos Vazias."
 ep3_contract_event.0006.library.tt: "Você se tornará o propietári[ROOT.Char.Custom('ES_OA')] de um [artifact|lE] diferente"
 ep3_contract_event.0006.explore: "Estou melhor sozinho. Pelo menos agora sei que tesouros podem ser encontrados aqui."
 ep3_contract_event.0006.explore_won: "$ep3_contract_event.0006.library_won$"
 ep3_contract_event.0006.explore_lost_desc: "Você não consegue encontrar nenhuma pista de artefatos sozinho e sai de mãos vazias."
 ep3_contract_event.0006.explore_lost: "Você Não Consegue Encontrar Nada."
 ep3_contract_event.0006.explore.tt: "$ep3_contract_event.0006.library.tt$"
 ep3_contract_event.0007.t: "$ep3_contract_event.0005.t$"
 ep3_contract_event.0007.desc_castle_castle: "Atacamos à meia-noite. Sob um céu noturno negro como breu, nos infiltramos despercebidos em [task_contract_destination.GetHolding.GetType.GetName|l]. Encontramos rapidamente esse [newly_created_artifact.GetName] graças às instruções de [local_1.GetFirstName]. No entanto, quando saímos, os sentinelas nos avistam! Eu pego o artefato e corro, enquanto guardas surgem de todos os cantos. Meus cúmplices e eu nos separamos.\n\nApós uma longa perseguição, acabo nas sombras atrás das muralhas. Consigo ouvir a voz ofegante de [local_2.GetFirstName] à distância:\n\n\"Ele/Ela roubou o que era nosso por direito. Que [Select_CString(local_2.IsFemale, 'diablesa', 'demonio' )]!\"."
 ep3_contract_event.0007.desc_church_church: "Caio de joelhos e começo a recitar versos de minha [local_1.GetFaith.ReligiousText].\n\n"Já vi e ouvi o suficiente. Sois certamente um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] de [local_1.GetFaith.HighGodName]!", elogia [local_1.GetName], claramente impressionad[local_1.Custom('ES_OA')]."Não precisais procurar mais. Eu vos concedo meu [newly_created_artifact.GetName]. Cuidai bem do presente, pois não é só meu, mas de [local_1.GetFaith.HighGodName]!"."
 ep3_contract_event.0007.desc_city_city: ""Seus preços são altos e eu não sou mais que um[ROOT.Char.Custom('ES_XA')] pobre andarilho", tento negociar. "Tenho de pagar meus homens e alimentar os cavalos. Aqui; isso é tudo o que posso pagar. Podemos fechar um acordo?".\n\n[local_1.GetFirstName] não parece acreditar em mim, mas ele é um negociador experiente, então faz rapidamente uma contraproposta. "Posso aceitar isso, sim, mas preciso lhe mostrar isto antes". [local_1.GetFirstNameNoTooltip] exibe seu [newly_created_artifact.GetName]. "Olhem que #EMP belleza#!! Uma oferta limitada, só para vocês. Estou dispost[local_1.Custom('ES_OA')] a vender os dois por um preço razoável!"."
 ep3_contract_event.0007.desc_castle_buy: "[local_1.GetFirstName] e [local_2.GetFirstName] discutem entre si por um tempo.\n\n“É um risco grave que estamos correndo..., mas também é uma oferta generosa. Vocês podem ficar com nosso prêmio, #EMP se#! se conseguirmos obtê-lo.”\n\nNaquela noite, vou ao ponto de encontro fora do castelo, e ouço uma grande comoção atrás da muralha. [local_1.GetFirstNameNoTooltip] e [local_2.GetFirstNameNoTooltip] se descem pelas pedras acima de mim.\n\n“Corram! Temos companhia!”, grita [local_1.GetFirstNameNoTooltip] enquanto passa por mim. Disparamos para [task_contract_destination.GetTerrain.GetName|l] até chegarmos a um lugar seguro.\n\n“Acho que vocês nos devem o dobro”, diz [local_2.GetFirstNameNoTooltip], ainda tentando recuperar o fôlego."
 ep3_contract_event.0007.desc_city_buy: ""Que oferta generosa! Por favor, fique com o meu [newly_created_artifact.GetName]! É um prazer fazer negócios com você!". [local_1.GetFirstName] parece sobrecarregad[local_1.Custom('ES_OA')] com a minha proposta.\n\nSerá que eu poderia, talvez, ter negociado um preço melhor? Da próxima vez, devo ser mais paciente…"
 ep3_contract_event.0007.desc_church_buy: "Sou um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] de [ROOT.Char.GetFaith.HighGodName] e só [ROOT.Char.GetFaith.HighGodName] pode me julgar, grito para rebater com força [local_1.Custom('ES_AlAla')] [local_1.GetFaith.PriestNeuter]. Mas ofereço a vocês um benefício imediato: moedas!\n\nVocês estão realmente tentando subornar [Select_CString(local_1.IsFemale, 'uma serva', 'um servo' )] de [local_1.GetFaith.HighGodName]?", responde [local_1.GetFirstName]; a princípio, parece ofendido, mas quanto mais olha para o saco de prata, mais irresistível parece.\n\n#EMP Temos#! que reparar o telhado do nosso [task_contract_destination.Custom('GetLocationFaithTemple')]. Levem tal [newly_created_artifact.GetName] e não falem jamais do nosso trato!"
 ep3_contract_event.0007.desc_castle_intimidate: ""Quem vocês pensam que são?". [local_1.GetFirstName] zomba com arrogância. "Somos dois para cada um[ROOT.Char.Custom('ES_OA')]!".\n\n"Tem certeza disso?", respondo, sinalizando para meus homens para que [Select_CString(And(local_1.IsFemale, local_2.IsFemale), 'as', 'os')] os cercuem. "Agora, por favor... tragam-me meu [newly_created_artifact.GetName]".\n\nNos encontramos novamente na noite seguinte. [local_1.GetFirstNameNoTooltip] e [local_2.GetFirstName] parecem [Select_CString(And(local_1.IsFemale, local_2.IsFemale), 'cansadas e derrotadas', 'cansados e derrotados')].\n\n"Quase fomos pegos lá. Espero que este artefato signifique muito para você!", diz [Select_CString(And(local_1.IsFemale, local_2.IsFemale), 'uma delas', 'um deles')], entregando-me o prêmio com uma careta de dor."
 ep3_contract_event.0007.desc_city_intimidate: "Faço um sinal aos meus seguidores para invadirem a loja, onde rapidamente dominamos [Select_CString( local_1.IsFemale, 'a lojista solitária', 'o lojista solitário' )].\n\n“Por favor, sou apenas [Select_CString( local_1.IsFemale, 'uma atendente', 'um atendente' )]. Preciso alimentar minha família, e esta loja é tudo o que tenho!”, implora [local_1.GetFirstName].\n\n“[follower.GetFirstName], mostre que não estamos brincando!”, ordeno ao meu capanga de escolha [follower.Custom('ES_AlAla')] capanga escolhid[follower.Custom('ES_OA')] e ele alcança uma prateleira precária abarrotada de mercadorias delicadas. Quando está prestes a derrubar o balcão, [Select_CString( local_1.IsFemale, 'a atendente', 'o atendente' )] se coloca em seu caminho.\n\n“Eu imploro, parem! Apenas peguem o que quiserem e vão embora!”."
 ep3_contract_event.0007.desc_church_intimidate: ""[follower.GetFirstName]! Aqui há alguém muito teimoso!", chamo meus seguidores. De imediato, eles invadem seu [task_contract_destination.Custom('GetLocationFaithTemple')].\n\n"Por favor, mostrem algum respeito, fiquem para trás!", suplica [local_1.GetFirstName]. Mas já é tarde demais; meus companheiros estão soltos, pegando oferendas e prestes a roubar e destruir tudo o que puderem. Claramente superad[local_1.Custom('ES_OA')] em força e número, [local_1.GetNameNoTooltip] cede.\n\n"Tudo bem, peguem tal [newly_created_artifact.GetName], seus pagãos, mas poupem este lugar sagrado"."
 ep3_contract_event.0007.desc_library: ""Obrigado pela oferta, mas talvez você saiba onde posso encontrar uma propriedade abandonada ou um forte desativado...?", pergunto, convencendo com relutância a [local_1.GetFirstName] a me indicar o caminho até um solar em ruínas.\n\nAssim que entro, fico totalmente pasmo com a quantidade de tomos antigos espalhados pelos aposentos cobertos de teias de aranha. Passo a noite inteira vasculhando-os. Então, bem no fundo, sob a adega, descubro um mapa escrito à mão — nele, um “X” marca um ponto próximo!\n\nMeus homens e eu chegamos lá ao amanhecer. Depois de algumas pás de terra, ouço [follower.GetFirstName] me chamar.\n\n“Um baú! Está cheio de moedas! E, o que é isto? Um bilhete o chama de “[newly_created_artifact.GetName]”."
 ep3_contract_event.0007.desc_explore: "Em vez de confiar em [local_1.GetFirstName] e em sua indiscrição ou em rumores absurdos, decido voltar sobre meus passos até um edifício aparentemente abandonado.\n\nPrimeiro, tivemos de abrir caminho por um jardim tomado pelo mato; depois, tivemos de suportar o odor mofado do interior. Ao menos podemos ter certeza de que o lugar está deserto. Meus acompanhantes se dividem para cobrir a área o mais rápido possível. Depois de algum tempo, [follower.GetFirstName] me chama para o quarto principal:\n\n\"Isto estava debaixo da cama\", diz, apontando para um baú enferrujado. \"Cheio até a boca de moedas! E será que isto pode ser uma [newly_created_artifact.GetName]?\"."
 ep3_contract_event.0007.a: "Por que eu não iria pegar para mim mesm?"
 ep3_contract_event.0007.b: "Perfeito! Envie-o [task_contract_employer.Custom('ES_AlAla')] [task_contract_employer.GetTitledFirstNameNoTooltip|l]."
 ep3_contract_event.0007.castle: "\"Espere, não é bem assim. Eu ainda estou com você!\""
 ep3_contract_event.0007.castle_buy: "\"Concordo, mas apenas se você se juntar a mim.\""
 ep3_contract_event.0007.city_city: "Levarei tudo."
 ep3_contract_event.0008.t: "$contract_event_prefix$ $laamp_join_war_contract_contract$"
 ep3_contract_event.0008.desc: "Uma pequena tropa de cavaleiros com dores do selim para perto do meu acampamento, e um desses visitantes entra na minha grande tenda.\n\n"Sou o capitão do destacamento [task_contract_employer.GetPrimaryTitle.GetAdjective] de batedores e falo em nome de noss[task_contract_employer.Custom('ES_OA')] [task_contract_employer.GetTitledFirstName|l]", começa o soldado. "Meu senhor[task_contract_employer.Custom('ES_XA')] está interessado na sua pequena e combativa banda de guerreiros".\n\n"Uma [task_contract_war.Custom('WarCasusBelliShort')] faz com que [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitleAsNameNoTooltip|l] passe noites sem dormir. Nosso inimigo está travando uma luta feroz — e, por isso, fui enviado para contratar suas espadas! Vocês cederão a [task_contract_employer.GetPrimaryTitle.GetNameNoTierNoTooltip] seu espírito de combate?"."
 ep3_contract_event.0008.a: "Parece uma causa justa, [task_contract_employer.Custom('ES_LeLa')] ajudarei imediatamente!"
 ep3_contract_event.0008.b: "$ep3_contract_event.0001.invalidate$"
 join_war_contract.employer_military_strength: "Força Militar dos Seus Aliados: [task_contract_employer.GetMilitaryStrengthText|P]"
 join_war_contract.target_military_strength: "Força Militar dos Seus Oponentes: [task_contract_target.GetMilitaryStrengthText|N]"
 ep3_contract_event.0009.t: "$contract_event_prefix$ $laamp_steal_artifact_contract_contract$"
 ep3_contract_event.0009.desc: "$ep3_contract_event.0001.desc$[task_contract_employer.Custom('ES_ElLa')|U] [task_contract_employer.GetTitledFirstNameNoTooltip|l] é [Select_CString( task_contract_employer.IsFemale, 'a dona legítima', 'o dono legítimo' )] de [task_contract_object.GetName], que essa espécie de [task_contract_target.Custom2('InsultAdjective', SCOPE.sC('task_contract_employer'))] de [task_contract_target.GetName] mantém em cativeiro. [Select_CString( task_contract_employer.IsFemale, 'Minha senhora', 'Meu senhor' )] deseja que o recuperem. Seja como for!"
 ep3_contract_event.0009.a: "Inteligente! Ninguém jamais suspeitará #EMP de mim#!."
 ep3_contract_event.0009.b: "$ep3_contract_event.0001.invalidate$"
 ep3_contract_event.0009.open_start_stealing_back_artifact: "Abre [character_interaction|lE] para começar [GetScheme('steal_back_artifact').GetTypeName|l] [scheme|lE]"
 ep3_contract_event.0011.t_vip: "$ep3_contract_event.0001.t_vip$"
 ep3_contract_event.0011.t_child: "$ep3_contract_event.0001.t_child$"
 ep3_contract_event.0011.t_explorer: "$ep3_contract_event.0001.t_explorer$"
 ep3_contract_event.0011.t_artifact: "$ep3_contract_event.0001.t_artifact$"
 ep3_contract_event.0011.t_gold: "$ep3_contract_event.0001.t_gold$"
 ep3_contract_event.0011.t_animal: "$ep3_contract_event.0001.t_animal$"
 ep3_contract_event.0011.t_construction: "$ep3_contract_event.0001.t_construction$"
 ep3_contract_event.0011.desc: "Sou levado até [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitledFirstName|l] pessoalmente.\n\n"Viestes a mim a pedido do meu [task_contract_target.Custom2('RelationToMeShort',task_contract_employer)], [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstName|l], não? Com qual motivo?".\n\n"
 ep3_contract_event.0011.desc_vip: "$ep3_contract_event.0011.desc$[task_contract_object.GetName] dá um passo à frente. "Honrado [task_contract_target.GetTitledFirstNameNoTooltip|l], falo em nome de [task_contract_employer.GetNameNoTooltip]! Mas a mensagem que trago é só para os vossos ouvidos".\n\n"Venha", responde [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitleAsNameNoTooltip|l] misteriosamente. "Falaremos em meus aposentos. [ROOT.Char.GetTitledFirstName], seus serviços foram reconhecidos; podeis ficar como hóspede em meu [task_contract_destination.GetHolding.GetType.GetName|l]"."
 ep3_contract_event.0011.desc_artifact: "$ep3_contract_event.0011.desc$Apresento tal [escorted_artifact.GetName], para espanto da corte.\n\n“Um belo presente!”, zomba [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitleAsNameNoTooltip|l]. “Vós fizestes bem, aventureir[ROOT.Char.Custom('ES_OA')]. Podeis permanecer e desfrutar dos prazeres de [task_contract_destination.GetName]”."
 ep3_contract_event.0011.desc_ward: "$ep3_contract_event.0011.desc$Dou um tapinha nas costas de [task_contract_object.GetFirstName] uma última vez antes de conduzir[task_contract_object.GetHerHim] adiante. \"Trago a vós um[task_contract_object.Custom('ES_XA')] jovem nobre que merece uma educação refinada.\"\n\n"
 ep3_contract_event.0011.desc_ward_accepted: "[task_contract_target.Custom('ES_ElLa')|U] [task_contract_target.GetTitledFirstNameNoTooltip|l] aceita a reverência [task_contract_object.Custom('ES_DelDela')] [task_contract_object.Custom('GirlBoy')] dizendo: "A partir de agora, [task_contract_object.Custom('GirlBoy')], eu serei [Select_CString( task_contract_target.IsFemale, 'vossa tutora e guardiã', 'vosso tutor e guardião' )]. E, se [ROOT.Char.GetSheHe] o desejar, [Select_CString( ROOT.Char.IsFemale, 'vossa companheira', 'vosso companheiro' )] de viagem também pode ficar aqui por algum tempo"."
 ep3_contract_event.0011.desc_ward_too_old: "Temo muito", responde [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitleAsNameNoTooltip|l], olhando [task_contract_object.Custom('ES_AlAla')] jovem que tem à sua frente, "que a viagem [task_contract_object.GetHerHim] transformou em um[task_contract_object.Custom('ES_XA')] [task_contract_object.GetWomanMan]. Não me dignarei a tratar[task_contract_object.GetHerHim] como se fosse um[task_contract_object.Custom('ES_XA')] inocente ingênuo[task_contract_object.Custom('ES_OA')]"."
 ep3_contract_event.0011.desc_ward_limit: "Muito temo", responde [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitleAsNameNoTooltip|l], "que já estou sobrecarregado com um excesso de crianças choronas. Não há lugar para [Select_CString( task_contract_object.IsFemale, 'otra pupila', 'otro pupilo' )] em minha corte"."
 ep3_contract_event.0011.desc_gold: ""Nobre [task_contract_target.GetName]!", eu proclamo. "Este baú está repleto de ouro, prata e joias, selecionados para você dos vastos tesouros de [task_contract_employer.GetName]!".\n\n[task_contract_target.Custom('ES_ElLa')|U] [task_contract_target.GetTitledFirstNameNoTooltip|l] salta de seu trono: "Louvemos a [task_contract_target.GetFaith.HighGodName] e louvad[task_contract_employer.Custom('ES_OA')] seja [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstNameNoTooltip|l]! Poucos conheceram tamanha generosidade! Minha gratidão, viajante[ROOT.Char.Custom('ES_OA')] . Convidamos você a permanecer em [task_contract_destination.GetName]…, especialmente se houver mais moedas soltas em sua tenda…"."
 ep3_contract_event.0011.desc_explorer: "\n\n\"Eu não tinha certeza de que conseguiria!\", ofega [task_contract_object.GetName]. \"Mas vocês têm sido um[ROOT.Char.Custom('ES_XA')] guia segur[ROOT.Char.Custom('ES_OA')] em todos os perigos que surgiram. Obrigado. Vocês mereceram muito bem o pagamento. E, há que se admitir — [task_contract_destination.GetNameNoTooltip] é impressionante!\""
 ep3_contract_event.0011.desc_explorer_building: "\"Estamos em [task_contract_destination.GetName] e, finalmente, nosso destino se encontra diante de nós. Aproximamo-nos do [task_contract_destination.GetHolding.GetSpecialBuildingType.GetName]$ep3_contract_event.0011.desc_explorer$\""
 ep3_contract_event.0011.desc_explorer_other: "Nos encontramos, enfim, no[task_contract_destination.GetTerrain.GetName] de [task_contract_destination.GetTitle.GetName] o destino de [task_contract_object.GetName].$ep3_contract_event.0011.desc_explorer$""
 ep3_contract_event.0011.desc_animal_dog: "$ep3_contract_event.0011.desc$Mal consigo segurar [task_contract_target.Custom('DogStoryName')]. O cão, soltando-se da coleira, salta em direção a [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitledFirstNameNoTooltip|l], derrubando[task_contract_target.GetHerHim] e lambendo-lhe o rosto."
 ep3_contract_event.0011.desc_animal_cat: "$ep3_contract_event.0011.desc$[task_contract_target.Custom('CatStoryName')] surge de uma cesta. Ao notar [task_contract_target.Custom('ES_AlAla')] [task_contract_target.GetTitledFirstNameNoTooltip|l], o gato começa a ronronar."
 ep3_contract_event.0011.desc_animal_dog_hate: "$ep3_contract_event.0011.desc_animal_dog$\n\nTirem esse cão imundo de cima de mim! E que cheiro… é realmente horrível! Maldit[task_contract_employer.Custom('ES_OA')] [task_contract_employer.GetTitledFirstNameNoTooltip|l] por macular meu salão com esta fera!"
 ep3_contract_event.0011.desc_animal_dog_love: "$ep3_contract_event.0011.desc_animal_dog$\n\nQue alegria vocês me trouxeram! Obrigado, viajer[ROOT.Char.Custom('ES_OA')] eiro. Vocês abençoaram meu domínio com esta criatura e são bem-vindos para ficar nele o tempo que desejarem."
 ep3_contract_event.0011.desc_animal_cat_hate: "$ep3_contract_event.0011.desc_animal_cat$\n\n"É um gato!? Tirem esse pequeno demônio esquelético daqui! Ah, minha cabeça já está doendo! Meu nariz parece que vai explodir!"."
 ep3_contract_event.0011.desc_animal_cat_love: "$ep3_contract_event.0011.desc_animal_cat$\n\n"É [task_contract_target.Custom('CatStoryName')]? Que generosidade a [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstNameNoTooltip|l]! Por sua parte, viajante[ROOT.Char.Custom('ES_OA')], vocês podem ficar aqui o quanto quiserem"."
 ep3_contract_event.0011.desc_construction: "Observo o canteiro de obras em [task_contract_destination.GetName]. Enquanto os trabalhadores descarregam os materiais que adquiri, [task_contract_employer.GetName] se aproxima de mim pessoalmente.\n\n"Uma entrega muito oportuna, [ROOT.Char.GetFirstNameNoTooltip]!", diz [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitleTierName|l]. "No entanto, como podem ver, ainda levaremos algo como [task_contract_destination.GetHolding.GetConstructionTimeLeft] para concluir a [task_contract_destination.GetHolding.GetConstructingHoldingType.GetName]. Preciso de mais mão de obra para realizar isso".\n\n"Gostariam de ficar em [task_contract_destination.GetNameNoTooltip] e ceder a força do seu povo ao labor dos meus trabalhadores?"."
 ep3_contract_event.0011.a: "\"Eu mudarei meu acampamento para [task_contract_destination.GetNameNoTooltip] com prazer.\""
 ep3_contract_event.0011.b: "Eu adoraria que [task_contract_object.Custom('ES_ElLa')] [task_contract_object.GetTitledFirstNameNoTooltip|l] se juntasse a nós permanentemente."
 ep3_contract_event.0011.c: "\"Talvez isso mude sua mente?\""
 ep3_contract_event.0011.d_end: "\"Eu deveria voltar para meu acampamento.\""
 ep3_contract_event.0011.d_continue: "\"Eu deveria continuar minha jornada.\""
 ep3_contract_event.0011.reward: "Você conclui o contrato de [task_contract.GetType.GetName|l] e [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstNameNoTooltip|l] irá recompensá-lo"
 ep3_contract_event.0011.construction_invalidation: "\"@warning_icon! #X Se a localização do [camp|lE] mudar, o modificador será removido e o [task_contract|lE] será invalidado.#!\""
 ep3_contract_event.0011.construction_reward: "\"Se você mantiver seu [camp|lE] em [task_contract_destination.GetName] até a construção ser concluída, o [task_contract|lE] será #P concluído com sucesso#!:"
 ep3_contract_event.0012.opening_angry: "\"[task_contract_employer.Custom2('AppropriateGreetingNegative', ROOT.Char)]\""
 ep3_contract_event.0012.opening: "\"[task_contract_employer.Custom2('AppropriateGreetingPositive', ROOT.Char)]\""
 ep3_contract_event.0012.desc_employer_dead_outro: "Eu rescindo sua obrigação: o [ROOT.Char.Custom('GetInvalidatedContractType')|l]. Não se preocupe; aceite um pouco de ouro como compensação."
 ep3_contract_event.0012.desc_employer_dead: "Devo informar-lhe que meu predecessor[task_contract_employer.Custom('ES_XA')], [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstName|l], faleceu. Como agora sou eu quem lhe paga, $ep3_contract_event.0012.desc_employer_dead_outro$"
 ep3_contract_event.0012.desc_unlanded_employer: "\"e, como tal, seu [ROOT.Char.Custom('GetInvalidatedContractType')|l] não é mais necessário.\""
 ep3_contract_event.0012.desc_unlanded_employer_is_imprisoned: "Devo informar-vos de que já não sou um[task_contract_employer.Custom('ES_XA')] , [task_contract_employer.GetWomanMan] livre, $ep3_contract_event.0012.desc_unlanded_employer$"
 ep3_contract_event.0012.desc_target_dead: "Devo informar que meu [task_contract_employer.Custom2('RelationToMeShort',task_contract_target)]. [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitledFirstName|l] morreu. Devido às circunstâncias, $ep3_contract_event.0012.desc_employer_dead_outro$"
 ep3_contract_event.0012.desc_prisoner_free: "Devo informar-vos de que meu [task_contract_employer.Custom2('RelationToMeShort',task_contract_object)] [task_contract_employer.GetFirstName] já está fora da prisão. Não tenho certeza de se vós tivestes algo a ver com isso, mas $ep3_contract_event.0012.desc_employer_dead_outro$"
 ep3_contract_event.0012.desc_dead_intro: "\"Sua incompetência é estonteante e minha indignação é imensurável. Como você poderia deixar\""
 ep3_contract_event.0012.desc_escortee_dead: "\"$ep3_contract_event.0012.desc_dead_intro$ [task_contract_object.GetFirstName] $ep3_contract_event.0012.desc_dead_outro$\""
 ep3_contract_event.0012.desc_pet_dead: "\"$ep3_contract_event.0012.desc_dead_intro$ [ROOT.Char.Custom('CatOrDogStoryName')] $ep3_contract_event.0012.desc_dead_outro$\""
 ep3_contract_event.0012.desc_dead_outro: "perecer?! Vocês se comprometeram com [ROOT.Char.Custom('GetInvalidatedContractType')|l]! Espero nunca mais ver vocês, de uma forma ou de #EMP otra#!."
 ep3_contract_event.0012.desc_not_vassal: "Alegrai-vos, pois já não estou mais sujeito ao vassalagem dessa espécie de [task_contract_target.Custom2('InsultAdjective', SCOPE.sC('task_contract_employer'))] de [task_contract_target.GetName]. $ep3_contract_event.0012.desc_employer_dead_outro$"
 ep3_contract_event.0012.desc_faction_disbanded: "\"As circunstâncias levaram à dissolução de nossa facção. $ep3_contract_event.0012.desc_employer_dead_outro$\""
 ep3_contract_event.0012.a: "\"Notícias tristes, mas algumas moedas são melhores do que nenhuma moeda.\""
 ep3_contract_event.0012.b: "\"Não havia nada que eu pudesse fazer.\""
 ep3_contract_event.0012.c: "\"Vamos continuar em direção a [travel_destination.GetNameNoTooltip].\""
 ep3_contract_event.0013.opening_success: "\"[task_contract_employer.Custom2('AppropriateGreetingPositive', ROOT.Char)]\""
 ep3_contract_event.0013.opening_failure: "\"[task_contract_employer.Custom2('AppropriateGreetingNegative', ROOT.Char)]\""
 ep3_contract_event.0013.desc_success: "Suas contribuições foram vitais para a vitória da minha guerra, e a bravura de seus mercenários é muito admirada pelos meus guerreiros.\n\nQue este pagamento os ajude a celebrar nossa grande vitória!"
 ep3_contract_event.0013.desc_failure: "Deveríeis ser conhecido como [ROOT.Char.Custom('ES_ElLa')] Quebrador de Juramentos por essa tua miserável falha em aparecer no campo de batalha!\n\nEu, que teria lutado ao vosso lado, agora vos nomeio uma espécie de [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('task_contract_employer'))|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('task_contract_employer'))] e líder de covardes."
 ep3_contract_event.0013.a: "\"Lutar lado a lado foi uma honra.\""
 ep3_contract_event.0013.b: "\"'O Quebrador de Juramentos' não soa tão mal assim...\""
 treasure_hunting_contract_decision: "\"Procurar Tesouros\""
 treasure_hunting_contract_decision_desc: "\"Uma aventura emocionante aguarda aqueles ousados o suficiente para se aventurar em terras distantes, buscando ouro, joias, tesouros e fama. Eu sucumbirei a tentações baixas? A uma jornada mortal? Ou cumprirei minha obrigação?\""
 treasure_hunting_contract_decision_tooltip: "Escolha um destino para [Concept( 'travel', 'viajar' )|E] para encontrar um tesouro."
 treasure_hunting_contract_decision_effect: "Começa [Concept( 'traveling', 'a viajar' )|E] até uma localização aleatória na [region|lE] do mundo escolhida."
