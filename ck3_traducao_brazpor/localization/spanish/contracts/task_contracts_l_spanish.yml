 any_character_task_contract: "Qualquer [GetPlayer.Custom('GetContractOrIssue')]:"
 has_task_contract_type: "[TASK_CONTRACT_TYPE.GetName]"
 laamp_transport_vip_contract: "Escolta de Emissário"
 laamp_transport_vip_desc_title: "Valentes soldados da fortuna,"
 laamp_transport_vip_desc: "Um nobre enviado [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] precisa de proteção contra bandidos e acidentes, e recebe de bom grado a ajuda de viajantes experientes."
 laamp_transport_ward_contract: "Transferência de Tutela"
 laamp_transport_ward_desc_title: "Vendidos responsáveis de status,"
 laamp_transport_ward_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] recompensará a todos os que desejarem escoltar seu filho na jornada até a corte de seu tutor."
 laamp_transport_explorer_contract: "Explorador Eager"
 laamp_transport_explorer_desc_title: "Mercenários confiáveis,"
 laamp_transport_explorer_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] curioso[TaskContract.GetEmployer.Custom('ES_OA')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] busca companhia e proteção durante sua próxima aventura."
 laamp_transport_artifact_contract: "Entrega de Artefato"
 laamp_transport_artifact_desc_title: "Viajantes honestos e abastados,"
 laamp_transport_artifact_desc: "Uma relíquia valiosa está prestes a mudar de mãos. [TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] precisa de alguém que garanta que ela chegue ao seu destino em segurança."
 laamp_transport_gold_contract: "Um Presente Dourado"
 laamp_transport_gold_desc_title: "Você que é robusto e vigilante,"
 laamp_transport_gold_desc: "Uma caravana importante está prestes a partir de [TaskContract.GetEmployer.GetCurrentLocation.GetNameNoTooltip]. [TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] oferece uma generosa recompensa para quem estiver disposto a protegê-la ao longo do caminho."
 laamp_transport_animal_contract: "Um Presente Vivo"
 laamp_transport_animal_desc_title: "Viajantes de bom coração,"
 laamp_transport_animal_desc: "Um precioso animal de estimação de [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] precisa de proteção na estrada."
 laamp_construction_contract_contract: "Trabalho de Construção"
 laamp_construction_contract_desc_title: "Vendedores engenhosos de experiência,"
 laamp_construction_contract_desc: "Uma obra de construção ordenada por[TaskContract.GetEmployer.Custom('ES_ElLa')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] está ficando sem materiais. Há uma grande quantia em oferta pela obtenção de novos suprimentos de construção."
 laamp_treasure_hunting_contract_contract: "Caça ao Tesouro"
 laamp_treasure_hunting_contract_desc_title: "Aventureiros astutos,"
 laamp_treasure_hunting_contract_desc: "Chegou aos ouvidos de [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] o rumor de um tesouro lendário. Deseja-se um aventureiro capaz de verificar essas alegações."
 laamp_join_war_contract_contract: "Lute Conosco"
 laamp_join_war_contract_desc_title: "Empunhe ferro com os justos!"
 laamp_join_war_contract_desc: "Precisa-se de ajuda militar em [TaskContract.GetEmployer.GetPrimaryTitle.GetBaseNameNoTier], que sofre os estragos da guerra há [TaskContract.MakeScope.Var('task_contract_war').War.MakeScope().ScriptValue('task_contract_war_duration_value')] dias."
 laamp_raid_contract_contract: "Incursão por Cativos"
 laamp_raid_contract_desc_title: "Invasores de Fronteiras Impiedosos,"
 laamp_raid_contract_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] busca um capitão valente, que tenha a habilidade de capturar vítimas vivas, para que uma mensagem possa ser enviada aos seus inimigos…"
 laamp_help_claimant_contract_contract: "Apoie Meus Direitos"
 laamp_help_claimant_contract_desc_title: "Buscadores de uma causa nobre,"
 laamp_help_claimant_contract_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] busca outros legitimistas; gente disposta a reivindicar seu direito legítimo sobre [TaskContract.MakeScope.Var('task_contract_title').Title.GetName] contra [TaskContract.MakeScope.Var('task_contract_target').Char.Custom('ES_ElLa')] [TaskContract.MakeScope.Var('task_contract_target').Char.GetTitledFirstName|l]."
 laamp_steal_artifact_contract_contract: "Reclamar Artefato"
 laamp_steal_artifact_contract_desc_title: "Ladrões aquisitivos,"
 laamp_steal_artifact_contract_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] recompensará a todo aquele que deseje devolver-lhe aquilo que lhe pertence legitimamente: [TaskContract.MakeScope.Var('task_contract_object').Artifact.GetName]."
 laamp_cultural_minority_contract_contract: "Proteger o Patrimônio"
 laamp_cultural_minority_contract_desc_title: "Ouçam nossa aflição!"
 laamp_cultural_minority_contract_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] busca a ajuda de outros [TaskContract.GetEmployer.GetCulture.GetCollectiveNoun], ou qualquer outro que deseje advogar por seus direitos perante [TaskContract.GetEmployer.GetLiege.GetName]."
 laamp_religious_minority_contract_contract: "Proteger os Fiéis"
 laamp_religious_minority_contract_desc_title: "Justiça sob [TaskContract.GetEmployer.GetFaith.PositiveAfterLife]!"
 laamp_religious_minority_contract_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] busca outros [TaskContract.GetEmployer.GetFaith.GetAdherentNamePlural] ou simpatizantes dispostos; qualquer pessoa que negocie sua proteção religiosa com [TaskContract.GetEmployer.GetLiege.GetName]."
 laamp_prison_break_contract_contract: "Fuga da Prisão"
 laamp_prison_break_contract_desc_title: "Aqueles que se movem com tanta liberdade,"
 laamp_prison_break_contract_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] busca um indivíduo escorregadio. Há um parente encarcerado cuja libertação lhe agradaria muito."
 laamp_join_faction_contract_contract: "Apoiar uma Facção"
 laamp_join_faction_contract_desc_title: "Dissidentes de todas as cores,"
 laamp_join_faction_contract_desc: "[TaskContract.GetEmployer.GetTitleAsNameNoTooltip] está farto do governo [TaskContract.GetTarget.Custom('ES_DelDela')] [TaskContract.GetTarget.GetName|l]. São enviadas convocações a todos os que se opõem [TaskContract.GetTarget.Custom('ES_AlAla')] [TaskContract.GetTarget.GetTitledFirstNameNoTooltip|l] para se unirem à sua [TaskContract.MakeScope.Var('task_contract_faction').Faction.GetName]."
 laamp_join_faction_contract_request: "Este [task_contract|lE] requer que você se junte a uma [faction|lE]"
 laamp_help_faith_conversion_contract_contract: "Deveres Missionários"
 laamp_help_faith_conversion_contract_desc_title: "Discípulos ávidos de [TaskContract.GetEmployer.GetFaith.CreatorName],"
 laamp_help_faith_conversion_contract_desc: "[SelectLocalization(ObjectsEqual(TaskContract.GetEmployer,TaskContract.GetTarget.GetLiege),'laamp_council_task_contract_desc_liege','laamp_council_task_contract_desc_councillor')] espalha a palavra de [TaskContract.GetEmployer.GetFaith.HighGodName] em [TaskContract.GetLocation.GetName]. Fiéis capazes são bem-vindos para emprestar suas vozes."
 laamp_help_faith_conversion_contract_request: "Este [task_contract|lE] exige que você [Concept( 'travel', 'viajar' )|E] a um [county|lE] com uma [Concept( 'convert_county', 'conversión' )|E] em andamento."
 laamp_fight_faith_conversion_contract_contract: "Silenciar Missionários"
 laamp_fight_faith_conversion_contract_desc_title: "Os fiéis estão sendo atacados!"
 laamp_fight_faith_conversion_contract_desc: "Missionários [TaskContract.MakeScope.Var('task_contract_councillor').Char.GetFaith.GetAdjectiveNoTooltip] assombram comunidades [TaskContract.GetEmployer.GetFaith.GetAdjectiveNoTooltip]. Buscamos um negociador habilidoso ou um brutamontes intimidador para lidar com esses pagãos."
 laamp_fight_faith_conversion_contract_request: "Este [task_contract|lE] exige que você [Concept( 'travel', 'viajar' )|E] a um [county|lE] com uma [Concept( 'convert_county', 'conversión' )|E] em andamento ou com um [realm_priest|l] do [liege|lE]"
 laamp_help_train_commanders_contract_contract: "Instrutor de Cavaleiros"
 laamp_help_train_commanders_contract_desc_title: "Veteranos à disposição,"
 laamp_help_train_commanders_contract_desc: "[SelectLocalization(ObjectsEqual(TaskContract.GetEmployer,TaskContract.GetTarget.GetLiege),'laamp_council_task_contract_desc_liege','laamp_council_task_contract_desc_councillor')] deseja manter seu [TaskContract.GetEmployer.Custom('KnightCulturePluralNoTooltip')|l] em forma de combate. Um comandante experiente ou espadachim é procurado para passar seu conhecimento."
 laamp_help_train_commanders_contract_request: "Este [task_contract|lE] exige que uses uma [character_interaction|lE] de $task_contract_train_knight_interaction$ com os [knights|lE] do [contractor|lE]"
 task_contract_train_knight_interaction: "Treinar Cavaleiros"
 task_contract_train_knight_interaction_desc: "Uma sessão de treinamento para melhorar a [prowess|lE] ou ensinar uma [commander_trait|lE] aos [recipient.Custom('KnightCulturePlural')|l] de [recipient.GetFirstName]"
 recipient_secondary_task_contract_train_knight_interaction: "Aprendiz"
 task_contract_train_knight_interaction.tt: "Tem uma chance de aumentar [prowess|lE] ou aprender um [commander_trait|lE]"
 laamp_help_find_secrets_contract_contract: "Olhos nas Sombras"
 laamp_help_find_secrets_contract_desc_title: "Silêncio!"
 laamp_help_find_secrets_contract_desc: "É preciso um observador astuto em [TaskContract.GetLocation.GetName]. [TaskContract.GetEmployer.Custom('ES_ElLa')|lU] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] não quer perder de vista os seus vizinhos e o que fazem. É só curiosidade… isso é tudo o que precisam saber."
 laamp_help_find_secrets_contract_request: "Este [task_contract|lE] requer que você complete um [scheme|lE] [GetScheme('laamp_help_find_secrets_scheme').GetTypeName|l]"
 laamp_help_fabricate_claim_contract_contract: "Reivindicações Esquecidas"
 laamp_help_fabricate_claim_contract_desc_title: "Eruditos sábios,"
 laamp_help_fabricate_claim_contract_desc: "$laamp_council_task_contract_desc_liege$ é [Select_CString( TaskContract.GetEmployer.IsFemale, 'la legítima', 'el legítimo' )] titular de [TaskContract.MakeScope.Var('task_contract_destination').Province.GetName]. Ele simplesmente extraviou as provas! Recupere esses antigos direitos, e você será recompensado com uma gratidão imperecível."
 laamp_council_task_contract_desc_liege: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l]"
 laamp_council_task_contract_desc_councillor: "Meu senhor[TaskContract.GetTarget.Custom('ES_XA')] [TaskContract.GetTarget.GetName],"
 laamp_help_fabricate_claim_contract_request: "Este [task_contract|lE] requer que você complete um [scheme|lE] [GetScheme('generate_claim').GetTypeName|l]"
 laamp_help_increase_control_contract_contract: "Lutar Contra a Corrupção"
 laamp_help_increase_control_contract_desc_title: "Portadores de porretes,"
 laamp_help_increase_control_contract_desc: "[TaskContract.GetTarget.GetPrimaryTitle.GetNameNoTierNoTooltip] sofre com bandidos desenfreados, oficiais usurários e camponeses em pânico. Qualquer um disposto a manter todos eles sob controle será recompensado."
 laamp_help_increase_control_contract_request: "Este [task_contract|lE] exige que você [Concept( 'travel', 'viajar' )|E] ao [county|lE] do [contractor|lE] com baixo [county_control|lE]"
 laamp_transport_contract.transport_failed: "Contrato Falhou"
 laamp_transport_contract.success: "Contrato Concluído"
 laamp_transport_contract.success_late: "Contrato Concluído Tarde"
 laamp_transport_contract.contract_completion_limit: "Prazo do Contrato Excedido"
 complete_task_contract_interaction: "Viajar para Completar um Contrato"
 complete_task_contract: "Viajar para Completar um Contrato"
 with_domicile: "Viajar Com Acampamento"
 without_domicile: "Viajar Sem Acampamento"
 contract_event_prefix: "Contrato:"
 ep3_contract_event.0001.t: "Contrato de Transporte:"
 ep3_contract_event.0001.t_vip: "$ep3_contract_event.0001.t$ $laamp_transport_vip_contract$"
 ep3_contract_event.0001.t_child: "$ep3_contract_event.0001.t$ $laamp_transport_ward_contract$"
 ep3_contract_event.0001.t_explorer: "$ep3_contract_event.0001.t$ $laamp_transport_explorer_contract$"
 ep3_contract_event.0001.t_artifact: "$ep3_contract_event.0001.t$ $laamp_transport_artifact_contract$"
 ep3_contract_event.0001.t_gold: "$ep3_contract_event.0001.t$ $laamp_transport_gold_contract$"
 ep3_contract_event.0001.t_animal: "$ep3_contract_event.0001.t$ $laamp_transport_animal_contract$"
 ep3_contract_event.0001.t_construction: "$ep3_contract_event.0001.t$ $laamp_construction_contract_contract$"
 ep3_contract_event.0001.desc: "Uma delegação de [task_contract_employer.GetName] entra pelas abas da minha grande tenda.\n\n\"Saudações, aventur[ROOT.Char.Custom('ES_OA')]!\", diz um enviado. \"Muitos e traiçoeiros são os caminhos deste mundo; se trabalhardes para [task_contract_employer.GetPrimaryTitle.GetNameNoTier], meu senhor[task_contract_employer.Custom('ES_XA')] pagaria bem por sua perícia\".\n\n"
 ep3_contract_event.0001.desc_intro_explorer: "Deixando sua mula carregada ofegando do lado de fora, [task_contract_employer.GetName] é conduzido até minha tenda.\n\n"Saudações! Dizem que sois um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] de mundo: talvez um[ROOT.Char.Custom('ES_OA')] com a coragem suficiente para se aventurar longe ao lado de um[task_contract_employer.Custom('ES_XA')] explorador[task_contract_employer.Custom('ES_XA')] com uma curiosidade insaciável como eu?"\n\n"
 ep3_contract_event.0001.desc_vip: ""Eu, [task_contract_object.GetName], sou um[task_contract_object.Custom('ES_XA')] servo muito leal[task_contract_object.Custom('ES_XA')] [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitleAsNameNoTooltip|l]. São suas palavras que devo levar a [task_contract_destination.GetTitle.GetNameNoTier], ao salão [task_contract_target.Custom('ES_DelDela')] [task_contract_target.GetTitledFirstName|l]. Guiem-me, protejam-me, e confio que minha missiva não caia presa de olhares indiscretos!"."
 ep3_contract_event.0001.desc_artifact: ""Seu precioso [escorted_artifact.GetName] de seu coração. Levareis o artefato até [task_contract_destination.GetTitle.GetName], onde se encontra [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitledFirstName|l], pois [escorted_artifact.GetNameNoTooltip] lhe foi prometido como um presente principesco. Mas ficai avisad[ROOT.Char.Custom('ES_OA')]! Se este tesouro sagrado não chegar ao seu destino, as consequências serão funestas"."
 ep3_contract_event.0001.desc_child: ""Protejam [task_contract_object.Custom2('MyCharacterIntroduction', task_contract_employer)]!", ordenou [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitleAsNameNoTooltip|l]. [task_contract_object.Custom('ES_ElLa')|U] [task_contract_object.Custom('GirlBoy')] terá uma educação como nenhuma outra em [task_contract_destination.GetTitle.GetNameNoTier], onde [Select_CString( task_contract_target.IsFemale, 'la sabia', 'el sabio' )] [task_contract_target.GetTitledFirstName|l] [task_contract_object.GetHerHim] aguarda. Mantenha esta criança perto de você: [Select_CString( task_contract_object.IsFemale, 'esta niña', 'este niño' )]: o destino de [task_contract_employer.GetPrimaryTitle.GetNameNoTierNoTooltip]!"."
 ep3_contract_event.0001.desc_gold: ""Trazemos conosco um imponente cofre de joias, perfumes e metais preciosos. Devereis transportá-lo até [task_contract_destination.GetTitle.GetNameNoTier] e apresentá-lo, com grande cerimônia, [task_contract_target.Custom('ES_AlAla')] [task_contract_target.GetTitledFirstName|l]. Um presente esplêndido, um que deixará [task_contract_target.Custom('ES_AlAla')] [task_contract_target.GetTitleAsNameNoTooltip|l] muito em dívida com meu senhor: devereis vigiá-lo de muito perto"."
 ep3_contract_event.0001.desc_explorer: "\"Por favor, leve-me até [task_contract_destination.GetTitle.GetName]. Proteja-me no caminho e eu o recompensarei generosamente com moedas!\""
 ep3_contract_event.0001.desc_explorer_intro: "\"Ouvi dizer que o [task_contract_destination.GetHolding.GetSpecialBuildingType.GetName]"
 ep3_contract_event.0001.desc_capitals: "\"Viajantes se encantam com [task_contract_destination.GetCounty.GetTitle.GetHolder.GetPrimaryTitle.GetDefinitiveName] como tendo uma capital grandiosa e de grande beleza, talvez a mais fina de todas as terras ao redor.\""
 ep3_contract_event.0001.desc_special_buildings_martial: "$ep3_contract_event.0001.desc_explorer_intro$ é um poderoso testemunho das glórias marciais do passado."
 ep3_contract_event.0001.desc_special_buildings_learning: "$ep3_contract_event.0001.desc_explorer_intro$ é um grande centro de aprendizado e repositório de conhecimento."
 ep3_contract_event.0001.desc_special_buildings_religious: "$ep3_contract_event.0001.desc_explorer_intro$ é um daqueles raros lugares onde os visitantes realmente desfrutam da presença do divino."
 ep3_contract_event.0001.desc_special_buildings_diplomatic: "$ep3_contract_event.0001.desc_explorer_intro$ é um lugar histórico de poder, onde se deve aproximar apenas com reverência e decoro."
 ep3_contract_event.0001.desc_special_buildings_economic: "$ep3_contract_event.0001.desc_explorer_intro$ é uma fonte de grandes riquezas, conhecida entre os mercadores de todas as terras."
 ep3_contract_event.0001.desc_grand_city: "\"Desejo visitar uma grande cidade, um paraíso urbano de cidadãos orgulhosos, ruas largas e mercados movimentados.\""
 ep3_contract_event.0001.desc_special_buildings_wonder: "$ep3_contract_event.0001.desc_explorer_intro$ é uma verdadeira maravilha — uma visão que alguns falam como mágica."
 ep3_contract_event.0001.desc_mausoleum_at_halicarnassus: "\"Diz-se que o $TRAVEL_POINT_OF_INTEREST_TT_poi_mausoleum_at_halicarnassus$ é um épico monumental a um dos governantes do passado, algo como nada construído por aqueles de nosso tempo...\""
 ep3_contract_event.0001.desc_lighthouse_of_alexandria: "\"Que farol mais orgulhoso vigia sobre o Mediterrâneo do que o $TRAVEL_POINT_OF_INTEREST_TT_poi_lighthouse_of_alexandria$? Desejo contemplar seu brilho elevado com meus próprios olhos.\""
 ep3_contract_event.0001.desc_natural_feature: "$ep3_contract_event.0001.desc_explorer_intro$ é uma das melhores criações [task_contract_employer.GetFaith.HighGodNamePossessive], uma vista verdadeiramente impressionante."
 ep3_contract_event.0001.desc_animal: "[task_contract_employer.Custom('CatOrDogStoryName')], um animal de estimação muito querido [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitleAsNameNoTooltip|l], conquistou o coração de [task_contract_target.Custom('ES_DelDela')] [task_contract_target.GetTitledFirstName|l]. Assim, meu senhor [task_contract_employer.Custom('ES_XA')] concordou generosamente em enviar a criatura para [task_contract_destination.GetTitle.GetNameNoTier]. Posso confiar a vocês a segurança do doce [task_contract_employer.Custom('CatOrDogStoryName')]?"
 ep3_contract_event.0001.desc_construction: ""[task_contract_employer.Custom('ES_ElLa')|U] [task_contract_employer.GetTitleAsNameNoTooltip|l] está construindo uma posseção [task_contract_destination.GetHolding.GetConstructingHoldingType.GetName|l] em [task_contract_destination.GetTitle.GetNameNoTier] e aguarda uma entrega de madeira e pedra. Quando chegardes ao local da obra, poderemos negociar outras obrigações"."
 ep3_contract_event.0001.vip: "[task_contract_object.GetTitledFirstNameNoTooltip] viajará com segurança e rapidez!"
 ep3_contract_event.0001.child: "[task_contract_object.GetNameNoTooltip] será bem cuidado."
 ep3_contract_event.0001.explorer: "[task_contract_destination.GetNameNoTooltip], que grandioso! Vamos!"
 ep3_contract_event.0001.artifact: "Cuidarei bem deste artefato."
 ep3_contract_event.0001.gold: "Viajaré com este baú sempre à vista."
 ep3_contract_event.0001.animal: "[task_contract_employer.Custom('CatOrDogStoryName')] viajará em um travesseiro de cetim."
 ep3_contract_event.0001.construction: "Entregarei os materiais imediatamente."
 ep3_contract_event.0001.with_domicile: "Todo o meu acampamento viajará para [task_contract_destination.GetNameNoTooltip]."
 ep3_contract_event.0001.with_domicile.tt: "Mover seu [camp|El] para [task_contract_destination.GetNameNoTooltip] custará [provisions|El] [provisions_i]"
 ep3_contract_event.0001.invalidate: "Não quero este contrato."
 ep3_contract_event.0001.tt_vip: "[Concept('travel', 'Viajará')|E] até [task_contract_destination.GetName] escoltando [task_contract_object.GetName] para a [court|El] de [task_contract_target.GetName]"
