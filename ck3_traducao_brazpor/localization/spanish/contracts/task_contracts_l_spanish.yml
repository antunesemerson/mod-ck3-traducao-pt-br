 ep3_contract_event.0094.desc_low_control: "$ep3_contract_event.0092.desc_low_control$"
 ep3_contract_event.0094.a: "Vamos nos apressar!"
 ep3_contract_event.0094.b: "Vou mover meu acampamento para lá."
 ep3_contract_event.0094.c: "Já cansei dos problemas de [task_contract_employer.GetFirstNameNoTooltip]"
 ep3_contract_event.0094_success: "Você triunfa no [task_contract|lE] de [task_contract.GetType.GetName|l] porque ajudou mais [task_contract_employer.GetShortUIName] do que os camponeses"
 ep3_contract_event.0094_fail: "Você fracassa no [task_contract|lE] de [task_contract.GetType.GetName|l] porque você ajudou os camponeses mais do que [task_contract_employer.GetShortUIName]"
 ep3_contract_event.0095.t: "$ep3_contract_event.0092.t$"
 ep3_contract_event.0095.desc: "Chega até mim a notícia de que meu apoio às preocupações do povo comum os incitou à ação! O povo resistente se reúne em bandos orgulhosos, aclamando meu nome e brandindo armas improvisadas — prontos para se rebelar! Infelizmente, essa notícia também chegou a [task_contract_councillor.GetName].\n\n"Eu pensei que tínhamos um acordo? Que você estava juntando aqueles idiotas para lhes dar um susto! Não #EMP sollozar#! com o sofrimento daqueles patifes, por [task_contract_councillor.GetFaith.GoodGodNames]! E agora, #EMP qué#! — você vai se juntar aos camponeses na revolta!?""
 ep3_contract_event.0095.a: "\"Direitos para os camponeses!\""
 ep3_contract_event.0095.a_2: "Só [Select_CString(And(supporter.IsFemale, supporter_2.IsFemale), 'las', 'los')] liderarei na guerra."
 ep3_contract_event.0095.a_become_landed: "@warning_icon! #X Se vencer a guerra, você se tornará [Concept('landed', 'proprietário de terras')|E]#!"
 ep3_contract_event.0095.a_remain_laamp: "@alert_icon! #alert_trial Se vencer a guerra, você continuará sendo [adventurer|El]#!"
 ep3_contract_event.0095.b: "Eles estão na verdade... sozinhos."
 ep3_contract_event.0095.c: "\"Não, espere: eu posso explicar tudo!\""
