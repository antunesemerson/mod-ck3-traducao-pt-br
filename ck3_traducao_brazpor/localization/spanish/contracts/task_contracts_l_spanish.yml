 ep3_contract_event.0004.desc: "Se agradecem muito os seus esforços firmes em minha guerra! Aproveite o ouro bem merecido, [Select_CString( ROOT.Char.IsFemale, 'buena mujer', 'buen hombre' )]!"
 ep3_contract_event.0004.desc_failure: "Sua reputação marcial foi muito exagerada. Você quebrou seu contrato comigo — deveria ter vergonha de si mesmo!"
 ep3_contract_event.0004.a: "Melhor não perguntar o que ele/ela fará com eles."
