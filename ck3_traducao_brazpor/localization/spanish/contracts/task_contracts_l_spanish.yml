 ep3_contract_event.0070.t: "$contract_event_prefix$ $laamp_join_faction_contract_contract$"
 ep3_contract_event.0070.desc: "Um contingente armado, sob a bandeira de [task_contract_employer.GetName], visita meu acampamento.\n\n"Saudações, [ROOT.Char.GetTitledFirstNameNoTooltip|l]! Dizem que você tem curiosidade sobre nossa causa, então viemos falar de nosso inimig[task_contract_target.Custom('ES_OA')], essa espécie de [task_contract_target.Custom2('InsultAdjective', SCOPE.sC('task_contract_employer'))] que é [task_contract_target.GetName]."
 ep3_contract_event.0070.desc_fallback_faction: "$ep3_contract_event.0070.desc$Como ele tira continuamente seus súditos do sério, como nos dilacera por dentro! Desejamos expô-lo[task_contract_target.GetHerHim] à luz, para que todos vejam [task_contract_target.GetHerHim] como o vil verme que ele é!"\n\n"Pior ainda…"
 ep3_contract_event.0070.desc_liberty_faction: "$ep3_contract_event.0070.desc$Tem o senhorio agarrado pelo pescoço: estrangula a nobreza com o poder que acumulou!"\n\nÉ intolerável! E além disso…"
 ep3_contract_event.0070.desc_independence_faction: "$ep3_contract_event.0070.desc$É [Select_CString( task_contract_target.IsFemale, 'uma soberana', 'um soberano' )] incompetente e indign[task_contract_target.Custom('ES_OA')]. #EMP Indign[task_contract_target.Custom('ES_OA')]!#! Aos súditos, seria melhor que agíssemos por conta própria.\n\nAlém disso…"
 ep3_contract_event.0070.desc_claimant_faction: "$ep3_contract_event.0070.desc$É um[task_contract_target.Custom('ES_XA')] governante [Select_CString( task_contract_target.IsFemale, 'indigna e ilegítima', 'indigno e ilegítimo' )] de [task_contract_faction.GetSpecialTitle.GetName]. Nossas esperanças estão em [task_contract_faction.GetSpecialCharacter.GetName]: [Select_CString( task_contract_faction.GetSpecialCharacter.IsFemale, 'una auténtica', 'un auténtico' )] líder, de caráter tão [task_contract_faction.GetSpecialCharacter.Custom('PersonalityGetPositiveTraitDesc')|l] quanto [task_contract_faction.GetSpecialCharacter.Custom('DescriptorPositiveStandalone')|l]".\n\nAlém disso, [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitledFirstNameNoTooltip|l]…"
 ep3_contract_event.0070.desc_nation_fracturing_faction: "$ep3_contract_event.0070.desc$Não só é [Select_CString( task_contract_target.IsFemale, 'indigna', 'indigno' )] da coroa, mas o próprio coração de [task_contract_faction.GetSpecialTitle.GetName] está podre até a raiz! Acreditamos que nada pode salvar este senhorio amaldiçoado».\n\n«A única saída é destruí-lo e reconstruí-lo a partir das cinzas!"
 ep3_contract_event.0070.desc_liege_taxes: "Seus impostos arrancam até a última moeda que eu e meu povo temos!”."
 ep3_contract_event.0070.desc_liege_levies: "Suas levas convocam até o último trabalhador dos meus campos!"."
 ep3_contract_event.0070.desc_liege_culture: "Exibe sem vergonha sua cultura [task_contract_target.GetCulture.GetName]!""
 ep3_contract_event.0070.desc_liege_faith: "Não há coração mais [task_contract_target.GetFaith.GetAdherentName]!""
 ep3_contract_event.0070.desc_liege_fallback: "É um ser [task_contract_target.Custom('DescriptorNegativeStandalone')]!"
 ep3_contract_event.0070.desc_outro: "cospe o líder [task_contract_employer.Custom('KnightCultureNoTooltip')|l], estendendo a mão. \"Você se juntará a nós?\""
 ep3_contract_event.0070.a: "Quero uma parte das terras de [task_contract_target.GetFirstNameNoTooltip]!"
 ep3_contract_event.0070.b: "Uma causa justa, de fato!"
 ep3_contract_event.0080.t: "$contract_event_prefix$ $laamp_help_fabricate_claim_contract_contract$"
 ep3_contract_event.0080.desc: "Meu acampamento tem a honra de receber a visita [task_contract_councillor.Custom('ES_DelDela')] [task_contract_councillor.GetCouncilTitleFirstName|l] de [task_contract_councillor_liege.GetPrimaryTitle.GetNameNoTier].\n\n“Saudações, [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Parece que você é uma pessoa perspicaz..., já que percebeu o que estamos buscando, em segredo.” [task_contract_councillor.GetFirstNameNoTooltip] põe a mão no meu ombro. “Veja bem, [task_contract_target.GetName]... é [Select_CString( task_contract_target.IsFemale, 'una usurpadora', 'un usurpador' )]. Eu sei, [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstNameNoTooltip|l] sabe disso, e você também sabe.” Então ele me dá um tapinha no peito.\n\n“Digamos que você consiga #EMP encontráis#! provas dos direitos ancestrais do meu senhor[task_contract_employer.Custom('ES_XA')]? Nesse caso, vocês não deixariam que todos soubessem a #EMP verdad#!?”"
 ep3_contract_event.0080.open_start_generate_claim_interaction: "Abre [character_interaction|lE] para iniciar [GetScheme('generate_claim').GetTypeName|l] [scheme|lE]"
 ep3_contract_event.0080.a: "Deixe-me ver o que posso fazer."
 ep3_contract_event.0082.t: "$contract_event_prefix$ $laamp_fight_faith_conversion_contract_contract$"
 ep3_contract_event.0082.desc: "Uma delegação de fiéis [task_contract_employer.GetFaith.GetAdherentNamePluralNoTooltip] visita meu acampamento para apresentar uma súplica que agita o sangue.\n\n"Ó, grande [ROOT.Char.GetTitledFirstNameNoTooltip|l]!", dizem. "Somos apenas um grupo de pobres [task_contract_employer.GetFaith.DevoteeNeuterPlural]" e comentam "Dia e noite, somos sermoneados pelos missionários enviados de [task_contract_councillor_liege.GetCapitalLocation.GetName] por [task_contract_councillor_liege.Custom('ES_ElLa')] [task_contract_councillor_liege.GetTitledFirstName|l]! Fomos forçados a fugir para cá, pois, em nosso lar, [task_contract_councillor.Custom('ES_ElLa')] [task_contract_councillor.GetCouncilTitleFirstName|l] comete grandes males! Ele converte à força aqueles que captura!".\n\nOs refugiados esfarrapados se ajoelham em sua desesperação:\n\n"Em nome [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstName|l] e em [task_contract_employer.GetFaith.HighGodNamePossessive], salvem-nos!"."
 ep3_contract_event.0082.a: "Tentarei parar [task_contract_councillor.GetCouncilTitleFirstNameNoTooltip]!"
 ep3_contract_event.0082.b: "Falarei com [task_contract_councillor_liege.GetTitledFirstNameNoTooltip] em [task_contract_councillor_liege.GetCapitalLocation.GetNameNoTooltip], sua capital."
 ep3_contract_event.0082.to_destination: "Você viajará para [task_contract_destination.GetName] para impedir o trabalho missionário de [task_contract_target.GetCouncilTitleFirstName]"
 ep3_contract_event.0082.to_liege: "Viajarás a [task_contract_destination.GetName] para convencer [task_contract_councillor_liege.GetHerHim] de que llame de volta a [task_contract_councillor.GetCouncilTitleFirstName]"
 ep3_contract_event.0083.t: "$ep3_contract_event.0082.t$"
 ep3_contract_event.0083.desc: "Chegamos a [task_contract_destination.GetName]. Assim que [task_contract_employer.GetName] entra em seu [task_contract_destination.Custom('GetLocationFaithTemple')], sai-lhe um grito de dor do fundo do coração!\n\n#EMP Tudo está destruído#!! Roubaram meu [task_contract_employer.GetFaith.ReligiousSymbol]! Pisotearam meu [task_contract_employer.GetFaith.ReligiousSymbol2] no chão! Eu poderia gritar todas as palavras do/da [task_contract_employer.GetFaith.ReligiousText]! Quem teria a audácia de saquear este lugar e atear fogo? Quem, senão esse tipo de [task_contract_councillor.Custom2('InsultAdjective', SCOPE.sC('task_contract_employer'))], [task_contract_councillor.Custom('ES_ElLa')] [task_contract_councillor.GetTitledFirstName|l]!\n\nEntendem agora, [ROOT.Char.GetTitledFirstNameNoTooltip|l]?, [task_contract_employer.GetFirstNameNoTooltip] aponta como profanaram seu [task_contract_employer.GetFaith.ReligiousSymbol3]. Não podemos mais viver assim!"
 ep3_contract_event.0083.a: "\"Vamos remover [task_contract_councillor.GetNameNoTooltip] da equação.\""
 ep3_contract_event.0083.b: "\"[task_contract_councillor.GetNameNoTooltip] só entenderá poder.\""
 ep3_contract_event.0083.c: ""Creio que talvez possa argumentar com o [task_contract_councillor.GetFaith.PriestNeuter] [task_contract_councillor.GetFaith.GetAdherentNameNoTooltip]"."
 ep3_contract_event.0083.d: "Fuja, [task_contract_employer.GetFirstNameNoTooltip]! Você está seguro comigo."
 ep3_contract_event.0083.a_win: "Você captura com sucesso o [task_contract_councillor.GetCouncilTitleFirstNameNoTooltip]"
 ep3_contract_event.0083.a_lose: "Você falha em capturar o [task_contract_councillor.GetCouncilTitleFirstNameNoTooltip]"
 ep3_contract_event.0083.b_win: "Você intimida o [task_contract_councillor.GetCouncilTitleFirstNameNoTooltip]"
 ep3_contract_event.0083.b_lose: "Você falha em ameaçar o [task_contract_councillor.GetCouncilTitleFirstNameNoTooltip]"
 ep3_contract_event.0083.c_win: "Você negocia uma coexistência pacífica com o [task_contract_councillor.GetCouncilTitleFirstNameNoTooltip]"
 ep3_contract_event.0083.c_lose: "Você perde o debate com o [task_contract_councillor.GetCouncilTitleFirstNameNoTooltip]"
 ep3_contract_event.0084.t: "$ep3_contract_event.0082.t$"
 ep3_contract_event.0084.desc: "Depois de puxar alguns fios complicados em [task_contract_destination.GetName], consigo uma audiência com [task_contract_councillor_liege.GetName].\n\nÓ [task_contract_councillor_liege.GetTitleAsNameNoTooltip]! digo. Apresento-me perante vós em nome de [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstName|l] e dos [task_contract_employer.GetFaith.GetAdherentNamePlural] de vossas terras. Voss[task_contract_councillor.Custom('ES_OA')] [task_contract_councillor.GetCouncilTitleFirstName] cometeu atos desprezíveis contra sua comunidade, e isso merece punição! Fazer justiça a algo assim não seria certamente o caminho de [task_contract_councillor_liege.GetFaith.HighGodName]?\n\n[task_contract_councillor_liege.Custom('ES_ElLa')|U] [task_contract_councillor_liege.GetTitledFirstNameNoTooltip|l] franze a testa.\n\nDe fato. Não sou [Select_CString( task_contract_councillor_liege.IsFemale, 'uma tirana', 'um tirano' )]; ouvirei integralmente sua petição. E só então decidirei o destino de meu [task_contract_councillor.GetCouncilTitle|l] e de todos os [task_contract_employer.GetFaith.GetAdherentNamePluralNoTooltip] em meu reino."
 ep3_contract_event.0084.a: "Os [task_contract_employer.GetFaith.GetAdherentNamePluralNoTooltip] devem governar a si mesmos."
 ep3_contract_event.0084.a_win_rights: "Para [task_contract_employer.GetFirstNameNoTooltip]: [task_contract_destination.GetCounty.GetTitle.GetNameNoTierNoTooltip] e direitos de proteção"
 ep3_contract_event.0084.a_win_rights.tt: "Ganha [obligation|lE] de [GetSubjectContractType( 'religious_rights' ).GetObligationName( 'religious_rights_protected' )|l]"
 ep3_contract_event.0084.a_win: "[task_contract_employer.Custom('ES_ElLa')|U] [task_contract_employer.GetTitledFirstNameNoTooltip|l] conquista [task_contract_destination.GetCounty.GetTitle.GetNameNoTooltip]"
 ep3_contract_event.0084.a_lost: "Você não convenceu [task_contract_councillor_liege.GetTitledFirstNameNoTooltip]"
 ep3_contract_event.0084.b: "Seu povo deve aprender a coexistir."
 ep3_contract_event.0084.b_win: "[task_contract_councillor_liege.Custom('ES_ElLa')|U] [task_contract_councillor_liege.GetTitledFirstNameNoTooltip|l] deixará de tentar converter [task_contract_destination.GetCounty.GetTitle.GetNameNoTierNoTooltip]"
 ep3_contract_event.0084.b_lost: "$ep3_contract_event.0084.a_lost$"
 ep3_contract_event.0085.t: "$contract_event_prefix$ $laamp_help_faith_conversion_contract_contract$"
 ep3_contract_event.0085.desc: "[task_contract_destination.GetName] é"
 ep3_contract_event.0085.desc_good: "Parece que [task_contract_destination.GetName] tem estado bastante silencioso desde a minha chegada. Vejo [task_contract_councillor.Custom('ES_AlAla')] [task_contract_councillor.GetCouncilTitleFirstName|l] de [task_contract_councillor_liege.GetName] rodead[task_contract_councillor.Custom('ES_OA')] por um grupo de [task_contract_destination.County.GetFaith.GetAdherentNamePlural] locais.\n\n"Saudações, viajant[ROOT.Char.Custom('ES_OA')]! Eu estava prestes a recitar algo do meu [task_contract_councillor.GetFaith.ReligiousText] para meus discípulos", e aponta para os aldeões. "Talvez vocês possam nos indicar suas parábolas favoritas?""
 ep3_contract_event.0085.desc_bad: "Em [task_contract_destination.GetName], o(a) [task_contract_destination.Custom('GetLocationFaithTemple')] local está em chamas! Encontro [task_contract_councillor.GetCouncilTitleFirstName] de [task_contract_councillor_liege.GetName] nos arredores; seus [task_contract_councillor.Custom('WomenMenPeople_GenderPreference')] têm cabeças de [task_contract_destination.County.GetFaith.GetAdherentNamePlural] nas pontas de suas espadas.\n\n"Ah, bem a tempo! Esses camponeses não respeitavam nossos pregadores, então decidimos mostrar a eles o verdadeiro poder de [task_contract_councillor.GetFaith.HighGodName]". É evidente que [task_contract_councillor.Custom('ES_ElLa')] [task_contract_councillor.GetTitledFirstNameNoTooltip|l] está aproveitando.\n\n"Por favor, tenha misericórdia!", suplicam os sobreviventes. "Somos apenas simples [task_contract_destination.County.GetFaith.DevoteeNeuterPlural]. Não queremos causar mal: por favor, deixem-nos em paz!""
 ep3_contract_event.0085.a: "Isso é uma loucura, é preciso deter [task_contract_councillor.Custom('ES_AlAla')] [task_contract_councillor.GetTitledFirstNameNoTooltip]!"
 ep3_contract_event.0085.a_win_critical: "Você captura com sucesso [task_contract_councillor.Custom('ES_AlAla')] [task_contract_councillor.GetCouncilTitleFirstNameNoTooltip|l]"
 ep3_contract_event.0085.a_win: "Você espanta todos os missionários"
 ep3_contract_event.0085.a_lose: "Você não consegue capturar [task_contract_councillor.Custom('ES_AlAla')] [task_contract_councillor.GetCouncilTitleFirstNameNoTooltip|l] e o contrato"
 ep3_contract_event.0085.b: "Acho que vou #EMP aproveitar#! este trabalho missionário."
 ep3_contract_event.0085.c: "Vou ensiná-los sobre [task_contract_councillor.GetFaith.GoodGodNames]."
 ep3_contract_event.0085.c_win: "Eles entendem a alegoria"
 ep3_contract_event.0085.c_lose: "Eles não entendem o ponto da história"
 ep3_contract_event.0085.d: "Vou avisá-los sobre [task_contract_councillor.GetFaith.EvilGodNames]!"
 ep3_contract_event.0085.d_win: "Eles entendem a alegoria"
 ep3_contract_event.0085.d_lose: "Eles ficaram assustados com o [task_contract_councillor.GetFaith.EvilGodName]"
 ep3_contract_event.0090.t: "$contract_event_prefix$ Instrutor de [task_contract_employer.Custom('KnightCulturePluralNoTooltip')|l]"
 ep3_contract_event.0090.desc: "Ao chegar, sou recebido por [task_contract_councillor.GetCouncilTitleFirstName] de [task_contract_councillor_liege.GetName].\n\n\"Fico feliz que tenha conseguido chegar. Precisamos de um especialista nas artes da guerra, pois nossos comandantes são bastante inexperientes.\" [task_contract_councillor.GetCouncilTitleFirstNameNoTooltip] faz uma reverência e acrescenta rapidamente: \"Pelo menos... segundo nuestr[task_contract_councillor_liege.Custom('ES_OA')] senhor[task_contract_councillor_liege.Custom('ES_XA')].\"\n\n\"Bem, eu teria prazer em convidá-lo para entrar, mas meu [task_contract_councillor_liege.GetTitleAsNameNoTooltip|l] espera que você comece o treinamento imediatamente. Escolha quem quiser e arme-os.\""
 ep3_contract_event.0090.a: "Deixe-me ver aqueles [task_contract_councillor_liege.Custom('WomenMenPeople_GenderPreference')]!"
 ep3_contract_event.0090.opens_task_contract_train_knight_interaction: "Abre [character_interaction|lE] $task_contract_train_knight_interaction$"
 ep3_contract_event.0091.t: "$ep3_contract_event.0090.t$"
 ep3_contract_event.0091.desc: "Para saber com o que estou lidando, convido [knight.GetName] para um sparring com"
 ep3_contract_event.0091.desc_me: "mim.\n\n\"Nós assumimos nossas posições, aguardando uma abertura.\""
 ep3_contract_event.0091.desc_me_high_prowess: "[knight.GetFirstNameNoTooltip] ataca primeiro, uma enxurrada de golpes com [knight.Custom('signature_weapon')]. Fico pego de surpresa: tento me recuperar e responder com alguns golpes meus. No entanto, desvia de [ROOT.Char.Custom('signature_weapon')] com bastante facilidade"."
 ep3_contract_event.0091.desc_me_low_prowess: "[knight.GetFirstNameNoTooltip] baixa primeiro a guarda, o que me permite desfer alguns golpes, poucos mas precisos, com [helper.Custom('signature_weapon')]. Está claro que não é páreo para mim"."
 ep3_contract_event.0091.desc_helper: "[helper.GetName].\n\n\"Eles assumem suas posições, aguardando uma abertura.\""
 ep3_contract_event.0091.desc_high_prowess: "[knight.GetFirstNameNoTooltip] golpeia primeiro, uma chuva de golpes com [knight.Custom('signature_weapon')] contra [helper.GetFirstNameNoTooltip]. [helper.GetFirstNameNoTooltip] parece bastante indefens[helper.Custom('ES_OA')] e superad[helper.Custom('ES_OA')] de forma clara por seu oponente"."
 ep3_contract_event.0091.desc_low_prowess: "[knight.GetFirstNameNoTooltip] baixa primeiro a guarda, o que permite a [helper.GetFirstName] desfer alguns golpes, poucos, porém precisos, com [helper.Custom('signature_weapon')]. A [knight.GetFirstNameNoTooltip] tem dificuldade até para ficar em pé. Parece que será uma lição bastante longa…"."
 ep3_contract_event.0091.desc_outro: "\n\nEu paro a luta antes que fique sangrenta. \"Obrigado por seus esforços, [knight.GetFirstNameNoTooltip]. Já vi o suficiente para saber como prosseguir com seus ensinamentos.\""
 ep3_contract_event.0091.a: "Eu poderia usar alguém assim comigo mesmo!"
 ep3_contract_event.0091.b: "Ensinar-lhes seria fácil [trait_to_teach.GetNameNoTooltip( ROOT.Char )|l]!"
 ep3_contract_event.0091.c: ""[helper.GetFirstNameNoTooltip], dê a ele uma lição particular"."
 ep3_contract_event.0091.d: "[knight.GetFirstNameNoTooltip] deve apenas seguir meus movimentos."
 ep3_contract_event.0091_won: "[knight.GetFirstNameNoTooltip] aprende muito com você"
 ep3_contract_event.0091_won_helper: "[knight.GetFirstNameNoTooltip] aprende muito com [helper.GetFirstNameNoTooltip]"
 ep3_contract_event.0091_won_trait: "[knight.GetFirstNameNoTooltip] aprende na hora"
 ep3_contract_event.0091_won_recruit: "[knight.GetFirstNameNoTooltip] está ansioso para se juntar ao seu acampamento"
 ep3_contract_event.0091_lost: "[knight.GetFirstNameNoTooltip] não consegue acompanhar"
 ep3_contract_event.0091_lost_recruit: "[knight.GetFirstNameNoTooltip] recusa se juntar ao seu acampamento"
 ep3_contract_event.0100.t: "$contract_event_prefix$ $laamp_help_find_secrets_contract_contract$"
 ep3_contract_event.0100.desc: "Aparentemente, devo me encontrar com [task_contract_councillor.GetCouncilTitleFirstName] de [task_contract_councillor_liege.GetName], mas quando chego a [task_contract_destination.GetName] seu [task_contract_destination.GetHolding.GetType.GetName|l] parece vazio… não há ninguém?\n\n"Vocês parecem confus[ROOT.Char.Custom('ES_OA')], aventurer[ROOT.Char.Custom('ES_OA')]", sussurra uma voz nas sombras. "Vocês realmente são adequad[ROOT.Char.Custom('ES_OA')] para esta tarefa? Precisamos de alguém vigilante, cauteloso, sutil…"\n\nProcuro freneticamente; a voz parece vir de uma direção diferente a cada palavra.\n\n"E vocês não parecem ser nada disso…", diz a voz, enquanto [task_contract_councillor.GetNameNoTooltip|l] aparece atrás de mim."
 ep3_contract_event.0100.a: "Ah, pode ser que [task_contract_councillor.GetSheHe] seja bom[task_contract_councillor.Custom('ES_OA')] , mas eu posso ser melhor!"
 adventurer_not_famous_or_patron_trigger_tt: "$adventurer_not_famous_trigger_tt$ ou [TARGET_CHARACTER.GetShortUIName] tem que ser [contact_list_contact|lE] de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName)]"
