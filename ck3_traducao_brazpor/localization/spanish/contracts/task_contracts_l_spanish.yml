 laamp_base_5031_request: "Este [task_contract|lE] precisa que [Concept('travel', 'viajes')|lE] a distintas [Concept('location', 'ubicaciones')|E] e roube gado em cada uma delas por meio de um desafio de [prowess|lE]. Você também pode testar o maior valor de [Concept('martial', 'marcialidad')|E] ou [stewardship|lE], ou, em vez disso, empregar certos [officers|lE].\n$laamp_request_boilerplate_criminal$"
