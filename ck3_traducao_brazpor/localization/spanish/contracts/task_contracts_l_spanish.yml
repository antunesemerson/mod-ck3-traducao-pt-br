 ep3_contract_event.0020.t: "$contract_event_prefix$ $laamp_cultural_minority_contract_contract$"
 ep3_contract_event.0020.desc: "Um grupo de [task_contract_employer.GetCulture.GetCollectiveNoun] entra no meu acampamento, querendo falar comigo.\n\n"Saudações, aventur[ROOT.Char.Custom('ES_OA')]!", começa o mais velho do grupo. "Viemos de [task_contract_destination.GetName], uma terra próxima, onde o governo de [task_contract_employer.GetName] é justo, de acordo com a nobre tradição [task_contract_employer.GetCulture.GetNameNoTooltip]!". Alguns tímidos aplausos ao nome de [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstNameNoTooltip|l] distraem o ancião antes que ele continue:\n\n"No entanto, seu soberan[task_contract_target.Custom('ES_OA')], [task_contract_target.GetName] é [Select_CString(task_contract_target.IsFemale, 'una extranjera', 'un extranjero' )], pouco acostumad[task_contract_target.Custom('ES_OA')] às nossas maneiras. Em nome de [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstNameNoTooltip|l], suplicamos: ajudai-nos a garantir nossa liberdade cultural sob o reinado de [task_contract_target.Custom('ES_DelDela')] [task_contract_target.GetTitleAsName|l]!"."
 ep3_contract_event.0020.a: "Fiquem tranqu[task_contract_employer.Custom('ES_OA')] ila, sei como lidar com [task_contract_target.GetSheHe]!"
 ep3_contract_event.0020.b: "Aprendi alguns truques para conquistar os [task_contract_target.GetCulture.GetCollectiveNounNoTooltip]."
 ep3_contract_event.0020.c: "Posso fazer uma visita a  com meus melhores homens!"
 ep3_contract_event.0020.d: "Deve haver #EMP algum#! plano credível dentro da lei [task_contract_target.GetPrimaryTitle.GetAdjectiveNoTooltip]."
 ep3_contract_event.0020.e: "Vamos ver se consigo convencer um [task_contract_target.GetCulture.GetNameNoTooltip]."
 ep3_contract_event.0020.tt: "Um [scheme|lE] bem-sucedido resultará em [task_contract_employer.GetShortUIName] ganhando um [obligation|lE] de [GetSubjectContractType( 'title_revocation_rights' ).GetObligationName( 'title_revocation_rights_protected' )|l]"
 ep3_contract_event.0020.agents_intrigue: "$schemes.tt.agent_packages.list_boilerplate$\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_thug' ).GetName] [success_chance_max_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_shill' ).GetName] [success_chance_max_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_wrangler' ).GetName] [success_chance_max_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_infiltrator' ).GetName] [scheme_speed_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_socialite' ).GetName] [scheme_speed_i]"
 ep3_contract_event.0020.agents_martial: "$schemes.tt.agent_packages.list_boilerplate$\n$EFFECT_LIST_BULLET$ [GetAgentSlotType( 'agent_muscle' ).GetName] [success_chance_max_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_thug' ).GetName] [success_chance_max_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_bodyguard' ).GetName] [success_chance_max_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_footpad' ).GetName] [scheme_speed_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_tracker' ).GetName] [scheme_speed_i]"
