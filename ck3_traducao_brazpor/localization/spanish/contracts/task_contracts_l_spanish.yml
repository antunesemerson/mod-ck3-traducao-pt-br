 ep3_contract_event.0095.c_tie: "Você persuade [task_contract_councillor.GetFirstNameNoTooltip] a simplesmente anular o contrato"
 ep3_contract_event.0095.c_lose: "[task_contract_councillor.GetFirstNameNoTooltip] é categórico que você falhou no contrato"
