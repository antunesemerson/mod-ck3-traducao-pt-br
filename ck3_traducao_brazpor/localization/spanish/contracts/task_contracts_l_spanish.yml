 ep3_contract_event.0021.t: "$contract_event_prefix$ $laamp_religious_minority_contract_contract$"
 ep3_contract_event.0021.desc: "Um grupo de [task_contract_employer.GetFaith.GetAdherentNamePlural] entra em meu acampamento, desejando falar comigo.\n\n"Saudações, aventureir[ROOT.Char.Custom('ES_OA')]!", começa o mais velho do grupo. "Viemos de [task_contract_destination.GetName], uma terra próxima, onde o piedoso governo de [task_contract_employer.GetName] segue os sagrados ensinamentos de seu [task_contract_employer.GetFaith.ReligiousText]!" Alguns tímidos vivas ao nome de [task_contract_employer.GetFaith.HighGodNamePossessive] distraem o ancião antes que ele continue:\n\n"No entanto, seu soberan[task_contract_target.Custom('ES_OA')], [task_contract_target.GetName], é um[task_contract_target.Custom('ES_XA')] [task_contract_employer.Custom2('GetUnbelieverTerm', task_contract_target)], a quem pouco importam nossos costumes. Em nome de [task_contract_employer.GetFaith.HighGodName] imploramos: ajudai-nos a obter garantias de liberdade religiosa sob o reinado de est[task_contract_target.Custom('ES_EA')] [task_contract_target.GetPrimaryTitle.GetTierAsNameNoTooltip|l]!""
 ep3_contract_event.0021.a: "$ep3_contract_event.0020.a$"
 ep3_contract_event.0021.b: "Aprendi alguns truques para conquistar os [task_contract_target.GetFaith.GetAdherentNamePluralNoTooltip]."
 ep3_contract_event.0021.c: "$ep3_contract_event.0020.c$"
 ep3_contract_event.0021.d: "Vou encontrar algo em sua [task_contract_target.GetFaith.ReligiousText] para convencer[task_contract_target.GetHerHim]."
 ep3_contract_event.0021.e: "$ep3_contract_event.0020.e$"
 ep3_contract_event.0021.tt: "Um [scheme|lE] bem-sucedido resultará em [task_contract_target.GetShortUIName] concedendo [obligation|lE] de [GetSubjectContractType( 'religious_rights' ).GetObligationName( 'religious_rights_protected' )|l] a [task_contract_employer.GetShortUIName]"
 cultural_acceptance_laamp_cultural_minority_contract: "Os esforços de [adventurer|lE] permitiram um [obligation|lE] de [GetSubjectContractType( 'title_revocation_rights' ).GetObligationName( 'title_revocation_rights_protected' )|l] contra um soberano estrangeiro"
 ep3_contract_event.0030.t: "$contract_event_prefix$ $laamp_prison_break_contract_contract$"
 ep3_contract_event.0030.desc: "Seu [task_contract_target.Custom2('InsultNoun', SCOPE.sC('task_contract_employer'))] [task_contract_target.Custom2('InsultAdjective', SCOPE.sC('task_contract_employer'))] maldito(a) de [task_contract_target.GetName]! Palavrões gritados do lado de fora da minha tenda me acordam.\n\n"Quem está aí? Quem me incomoda no meio da noite, no meu próprio acampamento?", pergunto ainda [Select_CString(ROOT.Char.IsFemale, 'sonolenta', 'sonolento' )].\n\n"Sou eu, [task_contract_employer.GetName]!", anuncia orgulhosamente [Select_CString( task_contract_employer.IsFemale, 'a intrusa', 'o intruso' )]. "Depressa, não há tempo a perder! [task_contract_object.Custom2('MyCharacterIntroduction', task_contract_employer)|U] foi [Select_CString(task_contract_object.IsFemale, 'feita prisioneira', 'feito prisioneiro' )] por essa espécie de [task_contract_target.Custom2('InsultNoun', SCOPE.sC('task_contract_employer'))] [task_contract_target.Custom2('InsultAdjective', SCOPE.sC('task_contract_employer'))], [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitledFirstNameNoTooltip|l]. Ao ver minha confusão, acrescenta:\n\n"Eu pagarei muito bem, se você conseguir libertar [task_contract_object.GetHerHim]!""
 ep3_contract_event.0030.a: "$ep3_contract_event.0020.a$"
 ep3_contract_event.0030.b: "Vou começar a planejar uma fuga imediatamente!"
 ep3_contract_event.0030.c: "Isso pode esperar até a manhã."
 ep3_contract_event.0030.c.tt: "Desbloqueia [interaction|lE] $prison_break_contract_interaction$."
 ep3_contract_event.0030.agents: "$schemes.tt.agent_packages.list_boilerplate$\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_thief' ).GetName] [success_chance_max_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_thug' ).GetName] [success_chance_max_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_infiltrator' ).GetName] [scheme_speed_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_lookout' ).GetName] [secrecy_i]\n$EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_decoy' ).GetName] [secrecy_i]"
 treasure_map_prefix: "Mapa do Tesouro"
 ep3_contract_event.0040.t: "$treasure_map_prefix$: Capture do Tesouro"
 ep3_contract_event.0040.desc: "Ao tirar o mapa do tesouro para dar outra olhada confusa, o tecido se prende em algo dentro da minha bolsa e se ouve um horrível #EMP desgarro#!.\n\nMeu mapa agora está rasgado bem no meio, com farrapos caindo no chão.\n\nFico de pé, impactad[ROOT.Char.Custom('ES_OA')] e segurando os pedaços — agora em grande parte inúteis — nas mãos."
 ep3_contract_event.0040.a: "Meu empregador não vai gostar disso."
 ep3_contract_event.0040.a_travel: "Mas — eu estava apenas... ah, bem."
 ep3_contract_event.0040.b: "Pode muito bem ficar aqui."
 ep3_contract_event.0041.t_dead: "$treasure_map_prefix$: A eternidade não espera por ninguém"
 ep3_contract_event.0041.t_incapable: "$treasure_map_prefix$: A Noite Cai"
 ep3_contract_event.0041.desc_intro: "O guarda-fogo me intercepta quando vou em direção à tenda [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstName|l]: "[ROOT.Char.GetTitleAsNameNoTooltip|U], não… [task_contract_employer.GetSheHe] já se foi, [ROOT.Char.Custom('MistressMaster')|l]"."
 ep3_contract_event.0041.desc_dead: "$ep3_contract_event.0041.desc_intro$\n\nEntro na tenda e, por um instante, [task_contract_employer.GetFirstNameNoTooltip] parece apenas estar dormindo, até que percebo que seu rosto vai lentamente empalidecendo como a morte. \n\nAinda atordoado,"
 ep3_contract_event.0041.desc_incapable: "$ep3_contract_event.0041.desc_intro$\n\nEntro na tenda para encontrar [task_contract_employer.GetFirstNameNoTooltip] deitado[task_contract_employer.Custom('ES_OA')] no chão, ainda vivo, só que… #EMP já não está aqui#!.\n\nAinda atordoado, ajudo-o a se sentar contra a maca e então"
 ep3_contract_event.0041.desc_outro: "olho ao redor, tentando localizar o mapa do tesouro, mas rapidamente percebo que não está em lugar nenhum.\n\nAgora, eu não posso possivelmente completar a busca pelo tesouro final..."
 ep3_contract_event.0041.a: "Devemos voltar."
 ep3_contract_event.0041.a.tt: "Mova seu [camp|lE] para [THIS.Char.GetCurrentLocation.GetNameNoTooltip]"
 ep3_contract_event.0041.a.flavor_dead: "Que [task_contract_employer.GetFaith.HighGodName] conceda descanso à sua alma."
 ep3_contract_event.0041.a.flavor_incapable: "Que estado terrível de... ser?"
 ep3_contract_event.0041.b: "Não há nada para voltar, de qualquer forma."
 treasure_map_employer_is_incapable.tt: "[task_contract_employer.GetShortUIName] ganhou o [trait|lE] [GetTrait('incapable').GetName( GetNullCharacter )|l]"
 treasure_map_disappeared.tt: "O mapa não está em lugar nenhum!"
 ep3_contract_event.0043.t: "$treasure_map_prefix$: O Que Escapou"
 ep3_contract_event.0043.desc: "[task_contract_employer.Custom('ES_ElLa')|U] [task_contract_employer.GetTitledFirstName|l] vem até mim e me dá um tapinha no ombro: "Que bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GetLassLad')] que vocês são! Agradeço sua ajuda nesta última excursão".\n\nEntrega um [0043_treasure_map.GetName] quase em farrapos, e as rugas ao redor de seus olhos suavizam enquanto ele sorri: "Talvez não tenha uma boa aparência, mas lutei contra [task_contract_employer.GetFaith.DevilName] em pessoa para conseguir isto. Tratem-no com cuidado".\n\nDepois de uma pausa para deixar as palavras assentarem, [Select_CString( task_contract_employer.IsFemale, 'la anciana', 'el anciano' )] ri com sarcasmo: "Quando estiverem pront[ROOT.Char.Custom('ES_OA')], temos um tesouro para desenterrar!"."
 ep3_contract_event.0043.a: "Vamos sair!"
 ep3_contract_event.0043.a.tt: "Abra a visão de [GetDecisionWithKey('treasure_map_contract_decision').GetName] [decision|lE]"
 ep3_contract_event.0043.b: "Vou cuidar disso. Em breve."
 ep3_contract_event.0045.t: "$treasure_map_prefix$: Um Pássaro na Mão..."
 ep3_contract_event.0045.desc_intro_artifact: "Ao amanhecer, chegamos em [excavation_location.GetName] — no que deveria ser o marcador no [0045_treasure_map.GetName]. Começo a procurar por locais adequados onde alguém poderia esconder um tesouro.\n\nPor milhas, se estende apenas o tranquilo [excavation_location.GetTerrain.GetNameNoTooltip|l]: um majestoso pano de fundo para minha busca."
 ep3_contract_event.0045.desc_artifact_historical: "$ep3_contract_event.0045.desc_intro_artifact$\n\nFinalmente, descubro um monte sob alguns arbustos dispostos um pouco #EMP demais#! ordenadamente para ser natural. Ao começar a cavar, bato em algo e cuidadosamente desenterro para descobrir que é... [treasure_artifact_historical.GetName]!?"
 ep3_contract_event.0045.desc_artifact_jewelry: "$ep3_contract_event.0045.desc_intro_artifact$\n\nCaminhando por um conjunto próximo de árvores antigas, avisto algo em uma das cavidades ocadas. Coloco a mão dentro da árvore e tiro… [treasure_artifact_jewelry.GetName]."
 ep3_contract_event.0045.desc_intro_gold: "Chegamos ao campo de [excavation_location.GetName] no início da tarde e começamos a procurar pistas sobre onde o marcador no [0045_treasure_map.GetName] pode apontar.\n\nCaminhando pelo [excavation_location.GetTerrain.GetNameNoTooltip|l], noto uma cavidade bem escondida em um penhasco rochoso. Ela leva a uma pequena caverna."
 ep3_contract_event.0045.desc_gold_great: "$ep3_contract_event.0045.desc_intro_gold$\n\nDentro da gruta, cuja decoração mostra diversas atividades estranhas e lúgubres, me aguarda um baú de madeira empoeirado.\n\nEu o abro e descubro uma enorme quantia de ouro, joias e objetos de valor!"
 ep3_contract_event.0045.desc_gold_mediocre: "$ep3_contract_event.0045.desc_intro_gold$\n\nO interior da gruta, aparentemente esquecido há muito tempo, abriga diversos objetos espalhados.\n\nErguendo o que parece ser uma urna antiga — e surpreendentemente pesada —, descubro dentro dela um respeitável tesouro de moedas de ouro."
 ep3_contract_event.0045.desc_gold_poor: "$ep3_contract_event.0045.desc_intro_gold$\n\nO interior da gruta parece ser um santuário secreto para alguma deidade obscura... e sob os olhares de espíritos desconhecidos, não consigo encontrar nada de valor, exceto um único enfeite de ouro em um prato de oferenda."
 ep3_contract_event.0045.desc_intro_scenery: "Ao chegarmos nos arredores de [excavation_location.GetName], sigo o marcador no [0045_treasure_map.GetName] através dos penhascos e da vegetação e..."
 ep3_contract_event.0045.desc_riches_in_scenery_dry: "$ep3_contract_event.0045.desc_intro_scenery$\n\nO/a [excavation_location.GetTerrain.GetNameNoTooltip|l] se abre para revelar um oásis impressionante. A água fresca oferece alívio do calor implacável, e ondulações se movem pela superfície enquanto peixes coloridos dançam abaixo dela.\n\nPenso em como — mesmo nos momentos mais difíceis — estes portos seguros permanecem inalterados: em lugares de serenidade como este, sente-se próximo de [ROOT.Char.GetFaith.HighGodName]…"
 ep3_contract_event.0045.desc_riches_in_scenery: "$ep3_contract_event.0045.desc_intro_scenery$\n\nO/A [excavation_location.GetTerrain.GetNameNoTooltip|l] se abre para uma fonte magnífica. Uma profusão de aves e animais pastando povoam este lugar, intocados pelo mundo exterior.\n\nPondero a beleza deste lugar e como todas as criaturas existem em uma hierarquia suave: insetos, peixes, aves e feras.\n\nUm calor cresce em meu peito. Esta é uma sensação divina: não pode haver dúvida!"
 ep3_contract_event.0045.desc_pillaged: "$ep3_contract_event.0045.desc_intro_gold$\n\nDepois de pouco mais de uma hora, encontro um buraco parcialmente coberto com um pequeno baú de madeira dentro. Está quase vazio... exceto por um punhado de trinkets [excavation_location.GetCulture.GetNameNoTooltip]."
 ep3_contract_event.0045.a: "Ótimas notícias para [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstNameNoTooltip|l]!"
 ep3_contract_event.0045.a_artifact_historical: "[task_contract_employer.Custom('ES_ElLa')|U] [task_contract_employer.GetTitledFirstNameNoTooltip|l] estará muito #EMP feliz!#!"
 ep3_contract_event.0045.a_pillaged: "Hmh. Suponho que meu empregador deva ser informado..."
 ep3_contract_event.0045.b: "Achados e perdidos."
 ep3_contract_event.0045.b_artifact_historical: "Isto pertence... #EMP a mim.#!"
 ep3_contract_event.0045.b_pillaged: "Não há muito o que celebrar aqui."
 ep3_contract_event.0045.b.flavor_reforged: "Vou refazê-lo em algo útil."
 ep3_contract_event.0045.b.flavor: "Vou guardar isso para mais tarde."
 ep3_contract_event.0050.t: "$treasure_map_prefix$: ... vale mais que dois na mão"
 ep3_contract_event.0050.desc_artifact_historical: "[treasure_artifact_historical.GetName]! [task_contract_employer.Custom('ES_AlAla')|U] [task_contract_employer.GetTitledFirstName|l] se lhe corta a respiração quando lhe entrego seu [treasure_artifact_historical.Custom('ArtifactType')].\n\nBendit[ROOT.Char.Custom('ES_OA')] sejas, [Select_CString(ROOT.Char.IsFemale, 'minha amiga', 'meu amigo' )], por me trazê-lo. Imagino que pode ter sido inimaginavelmente difícil se separar deste tesouro…\n\n[task_contract_employer.GetSheHe|U] sorri com gratidão. Suponho que a sabedoria da minha mãe continua sendo verdadeira; podemos confiar na bondade de [Select_CString(ROOT.Char.IsFemale, 'as desconhecidas', 'os desconocidos' )]."
 ep3_contract_event.0045.desc_intro: "[task_contract_employer.GetFirstName] mal consegue conter a empolgação quando retorno à sua tenda."
 ep3_contract_event.0050.desc_artifact_jewelry: "$ep3_contract_event.0045.desc_intro$ "Exquisito! Vejam essa estranha ornamentação!".\n\n[task_contract_employer.GetFirstNameNoTooltip] se dedica aos detalhes minuciosos de [treasure_artifact_jewelry.GetName], praticamente ronrona de alegria, e me lança um sorriso: \"Vocês têm minha gratidão eterna por isto\"."
 ep3_contract_event.0050.desc_gold: "$ep3_contract_event.0045.desc_intro$ \"Ouro, você diz? Que tal como um último tesouro!\".\n\nUma pontada de melancolia, sem dúvida ao pensar no fim de uma aventura, cruza seu rosto enquanto conclui este assunto: \"Sou imensamente grato por essa bonança dourada, entregada com diligência. Partam, com meus agradecimentos.\""
 ep3_contract_event.0050.desc_scenic: "$ep3_contract_event.0045.desc_intro$ \"Isso... parece verdadeiramente deslumbrante. Passei grande parte da minha vida em busca de riquezas, joias, coisas que cintilam. Isto...\".\n\nEle faz uma pausa por um momento, perdido em pensamentos: \"...é onde passarei meus últimos dias, em paz. Obrigado, [Select_CString(ROOT.Char.IsFemale, 'amiga mía', 'amigo mío' )]\"."
 ep3_contract_event.0050.desc_pillaged: "$ep3_contract_event.0045.desc_intro$ \"Já estava saqueado?\".\n\n[task_contract_employer.GetFirstNameNoTooltip] suspira pesadamente: \"Uma vida de aventureiro não termina com um estrondo, mas sim com... um gemido, suponho. Bem, vocês me acompanharam nessa tolice, e têm minha gratidão.\""
 ep3_contract_event.0050.a: "Prazer em fazer negócios com você."
 ep3_contract_event.0060.t: "$contract_event_prefix$ $laamp_help_claimant_contract_contract$"
 ep3_contract_event.0060.desc: "Uma comitiva itinerante de [task_contract_employer.GetCulture.GetCollectiveNoun] cujas lanças ostentam estandartes novos e brilhantes, costurados recentemente, detém-se em meu acampamento. Um dos [task_contract_employer.Custom('KnightCulturePluralNoTooltip')|l]s, [commander.GetName] me traz um apelo de seu am[task_contract_employer.Custom('ES_OA')]a:\n\n“[task_contract_employer.GetName] prepara sua hoste para atacar esse [task_contract_target.Custom2('InsultAdjective', SCOPE.sC('task_contract_employer'))] que é [task_contract_target.GetName], e — pelos rigores da batalha — reivindicar o que por direito lhe pertence!”.\n\n“E quando nossos estandartes estiverem tremulando sobre [task_contract.MakeScope.Var('task_contract_title').Title.GetName], haverá bons despojos distribuídos a todos os que lutaram pela reivindicação de [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitleAsNameNoTooltip|l]!”."
 ep3_contract_event.0060.a: "$ep3_contract_event.0008.a$"
 ep3_contract_event.0060.join_war: "[task_contract_taker.GetShortUIName|U] [Select_CString( task_contract_taker.IsLocalPlayer, 'te unirás', 'se unirá' )] à [war|lE] como atacante"
