 laamp_base_1041_request: "Este [task_contract|lE] te exige [Concept('travel', 'viajar' )|E] a uma [holding|lE] distante e emboscar [characters|lE] para roubar seu [gold|lE] , seja por meio de desafios de [prowess|lE] , [Concept('martial', 'marcialidad' )|lE] ou [intrigue|lE].\n$laamp_request_boilerplate_criminal$"
 laamp_base_2001_request: "Este [task_contract|lE] exige que voc? [Concept('travel', 'viajar' )|E] at? uma [holding|lE] [Concept('city', 'urbana' )|lE] e investigar por meio de eventos. Sua recompensa total depende de provar que os [characters|lE] não pagam todos os impostos que lhes cabem, realizando desafios de [skill|lE] [Concept('stewardship', 'administrativa' )|E] ou de [aptitude|lE] de [GetCourtPositionType('quartermaster_camp_officer').GetName()|l]."
 laamp_base_2011_request: "Este [task_contract|lE] exige que você [Concept('travel', 'viajar' )|E] a uma série de [holdings|lE] no [realm|lE] do [contractor|lE] e superar um desafio de [skill|lE] [Concept('stewardship', 'administrativa' )|E] de [intrigue|lE] ou uma comprovação de [aptitude|lE] de [GetCourtPositionType('quartermaster_camp_officer').GetName()|l]."
 laamp_base_2021_request: "$laamp_request_boilerplate_stewardship_scheme$"
 laamp_base_2031_request: "Este [task_contract|lE] exige que voc? [Concept('travel', 'viajar' )|E] at? a [holding|lE] de um [baron|lE] e realizar um desafio. É garantido que você poderá testar a [stewardship|lE] mas outras opções dependerão de qual seja o seu [camp_purpose|lE], dos seus [followers|lE] e [officers|lE]."
 laamp_base_2041_request: "Este [task_contract|lE] exige que você [Concept('travel', 'viajar' )|E] até #BOL [TaskContract.GetEmployer.MakeScope.ScriptValue('laamp_base_2041_num_counties_to_rob_sans_capital_value')|0]#! [counties|lE] nas terras de [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitledFirstName|l] e realizar desafios de dificuldade crescente de [aptitude|lE] de [stewardship|lE], [intrigue|lE] ou [GetCourtPositionType('master_bard_camp_officer').GetName()|l] para enganar seus súditos e fazê-los entregar a você os impostos destinados a [TaskContract.GetEmployer.Custom('ES_ElLa')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l]\n$laamp_request_boilerplate_criminal$"
 laamp_base_3001_request: "Este [task_contract|lE] exige que você [Concept('travel', 'viajar' )|E] a três [counties|lE] e realizar desafios de [intrigue|lE] ou [diplomacy|lE]... ou simplesmente gastar [prestige|lE] e [opinion|lE]"
 laamp_base_3011_request: "$laamp_request_boilerplate_intrigue_scheme$\n$laamp_request_boilerplate_criminal$"
 laamp_base_3021_request: "$laamp_request_boilerplate_intrigue_scheme$\n$laamp_request_boilerplate_criminal$"
 laamp_base_3031_request: "Este [task_contract|lE] te exige [Concept('travel', 'viajar' )|E] a uma [location|lE] e provocar um incêndio mediante um desafio de [intrigue|lE]. Se não, também podes usar [Concept('martial', 'marcialidad' )|E], [prowess|lE] e a teus [officers|lE].\n$laamp_request_boilerplate_criminal$"
 laamp_base_3041_request: "$laamp_request_boilerplate_intrigue_scheme$; se tiver sucesso, poderá testar sua [intrigue|lE]; [agents|lE] e [officers|lE] para roubar ainda mais [gold|lE] se possível\n$laamp_request_boilerplate_criminal$"
