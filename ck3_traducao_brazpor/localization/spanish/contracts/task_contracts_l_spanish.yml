 ep3_contract_event.0092.t: "$contract_event_prefix$ $laamp_help_increase_control_contract_contract$"
 ep3_contract_event.0092.desc: "[task_contract_councillor.GetName], [task_contract_councillor.GetCouncilTitle|l] de [task_contract_councillor_liege.GetPrimaryTitle.GetNameNoTier], vem um dia visitar meu acampamento. Assim que ficamos a sós, começa a murmurar:\n\n"É vergonhoso admitir... mas preciso de sua ajuda para lidar com os camponeses desobedientes de [task_contract_destination.GetName]", [task_contract_councillor.Custom('ES_ElLa')] [task_contract_councillor.GetCouncilTitle|l] se irrita e lança olhares furiosos:\n\n"Desafiam abertamente a autoridade de seu [task_contract_councillor_liege.GetTitleAsName|l]!"
 ep3_contract_event.0092.desc_taxes: "Os cobradores de impostos são recebidos com portas trancadas e pedras arremessadas! Tarifas e deveres antigos estão sendo ignorados, onde quer que eu vá."
 ep3_contract_event.0092.desc_bandits: "Eles se organizam em milícias, afirmando que são aterrorizados por foras da lei! Toda a região está se tornando um vasto e indisciplinado grupo..."
 ep3_contract_event.0092.desc_riots: "Suspeito uma influência estrangeira, provocando os simples camponeses a atos desprezíveis... que eles devem cessar imediatamente!"
 ep3_contract_event.0092.desc_low_control: "Não consigo mantê-los sob controle! Eles batem e humilham qualquer um que eu envio, desafiando-me a agir com toda a força — sua conduta é uma mancha, que macula todo o reino!"
 ep3_contract_event.0092.a: "Deixe-me lidar com eles!"
 ep3_contract_event.0092.a_tt: "$ep3_contract_event.0094.travel_without_domicile$"
 ep3_contract_event.0092.b: "Vou mover meu acampamento para lá."
 ep3_contract_event.0092.b_tt: "$ep3_contract_event.0094.travel_with_domicile$"
 ep3_contract_event.0093.t: "$ep3_contract_event.0092.t$"
 ep3_contract_event.0093.desc: "Quando chegamos a [task_contract_destination.GetName], apresso-me a reunir os piores agitadores e exijo explicações. [corrupt_province_peasant.GetName], [Select_CString( corrupt_province_peasant.IsFemale, 'uma camponesa', 'um camponês' )] com certa reputação, fala em nome dos demais:\n\n"
 ep3_contract_event.0093.desc_taxes: ""Os dízimos são altos, mas nós os pagamos! Os encargos que pagamos sobre nossos produtos mal nos deixam migalhas de sobra! Suportamos esses pagamentos, mas [task_contract_councillor_liege.Custom('ES_ElLa')] [task_contract_councillor_liege.GetTitledFirstName|l] nos exige ainda mais — enquanto os cobradores de impostos ficam cada vez mais ricos. É a #EMP ellos#! é a quem vocês deveriam estar confrontando!"."
 ep3_contract_event.0093.desc_bandits: ""Tememos pela segurança dos nossos filhos. [task_contract_councillor_liege.Custom('ES_ElLa')|U] [task_contract_councillor_liege.GetTitledFirstName|l] tem o dever de nos proteger, mas só se importa em nos controlar! Se suas belas espadas não estiverem cortando esses malditos fora da lei, meu povo confiará a vida de seus filhos às suas próprias foices, manguals e flechas!"."
 ep3_contract_event.0093.desc_riots: ""Nossas mentes nos pertencem! Como se fôssemos acolher bem a interferência de forasteiros… Bah! Também rejeitamos isso, a presença dos bajuladores e capangas [task_contract_councillor_liege.Custom('ES_DelDela')] [task_contract_councillor_liege.GetTitledFirstName|l]! Não podemos administrar nossos próprios assuntos locais sem sermos incomodados?"."
 ep3_contract_event.0093.desc_low_control: ""Nosso lugar é ser governados — mas [task_contract_councillor_liege.Custom('ES_ElLa')] [task_contract_councillor_liege.GetTitledFirstName|l] não o faz com justiça! Com o caos assolando a terra, enquanto mal conseguimos manter o que é nosso, ainda assim [task_contract_councillor_liege.GetFirstNameNoTooltip] nos obriga a trabalhar para [task_contract_councillor_liege.GetSheHe] como animais de carga! Trabalhamos sem nenhuma promessa de segurança contra guerras, doenças e afins!"."
 ep3_contract_event.0093.a: "Cale o seu povo ou #EMP morrerão#!, [Select_CString( corrupt_province_peasant.IsFemale, 'camponesa', 'camponês' )]!"
 ep3_contract_event.0093.b: "Não posso tolerar esse tipo de injustiça."
 ep3_contract_event.0093.a_win: "Você ajuda a impor a presença [task_contract_councillor.Custom('ES_DelDela')] [task_contract_councillor.GetCouncilTitleFirstName|l]"
 ep3_contract_event.0093.a_lose: "Mas você terá que deixar alguém aqui."
 every_lowborn_follower: "Todo [follower|lE] [lowborn|lE]"
 ep3_contract_event.0094.t: "$ep3_contract_event.0092.t$"
 ep3_contract_event.0094.desc: "Uma vez concluído o tremendo calvário de dobrar à minha vontade cada um dos líderes camponeses, retomamos a estrada. [task_contract_councillor.GetName] nos fala sobre o próximo destino.\n\n"Iremos para [corrupt_province.GetName], para o bem ou para o mal. A turba local é motivo de grave preocupação."
 ep3_contract_event.0094.desc_taxes: "$ep3_contract_event.0092.desc_taxes$"
 ep3_contract_event.0094.desc_bandits: "$ep3_contract_event.0092.desc_bandits$"
