 ep3_contract_event.0005.desc: "$ep3_contract_event.0001.desc$[task_contract_employer.GetNameNoTooltip] tem uma grande visão de reunir uma grande variedade de artesanatos de lugares exóticos. No entanto, seus deveres não podem esperar, de modo que lhe oferece a oportunidade de explorar o mundo em busca de um artefato adequado para sua coleção."
 ep3_contract_event.0005.a: "É melhor eu escolher um lugar já!"
