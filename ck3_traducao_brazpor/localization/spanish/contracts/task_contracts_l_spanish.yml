 laamp_boost_legitimacy_contract_contract: "Promoção de Legitimidade"
 laamp_boost_legitimacy_contract_desc_title: "Viajeiros de boa linhagem,"
 laamp_boost_legitimacy_contract_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] precisa de um artesão das palavras com lábia sem igual para ajudar a que os camponeses rebeldes de seu senhorio entendam seu inegável direito de governar. Será preciso fazer comparecimentos locais."
 laamp_boost_legitimacy_contract_request: "Este [task_contract|lE] exige que você [Concept( 'travel', 'viaje' )|E] até [TaskContract.GetLocation.GetName]."
 ep3_contract_event.0510.t: "Direito de Governar"
 ep3_contract_event.0510.desc: "Chego a [location.GetName] e encontro o lugar em alvoroço. O povo está claramente descontente, e seu líder, um[peasant.Custom('ES_XA')] [peasant.GetWomanMan] chamado [peasant.GetFirstName], arenga a multidão reunida.\n\n"[task_contract_employer.GetTitledFirstName]? Então um atrevido #EMP [task_contract_employer.GetTitleAsNameNoTooltip|l]#! está acompanh[task_contract_employer.Custom('ES_OA')]!", ruge. "Antes tínhamos governantes #EMP de verdad#!, nomeados por [peasant.GetFaith.FateGodName]!".\n\nO discurso é apaixonado, mas fica claro que grande parte da multidão hesita em suas lealdades."
 ep3_contract_event.0510.a: "Se eu convencer este local, os outros vão entrar na linha.[Select_CString( peasant.IsFemale, 'esta lugareña', 'este lugareño' )][peasant.GetHerHim]"
 ep3_contract_event.0510.a.success: "[peasant.GetHerHim|U] convence, a [peasant.GetSheHe] e a todos os ouvintes"
 ep3_contract_event.0510.a.failure: "Você falha em fazer um argumento convincente"
 ep3_contract_event.0510.a.critfailure: "Sua retórica falha completamente"
 ep3_contract_event.0510.b: "A força faz o certo..."
 ep3_contract_event.0510.b.success: "Suas ameaças funcionam"
 ep3_contract_event.0510.b.failure: "[peasant.GetFirstNameNoTooltip] zomba de suas ameaças"
 ep3_contract_event.0510.b.critfailure: "Você julga mal a situação, e #EMP verdadeiros#! problemas surgem"
 ep3_contract_event.0510.c: "Talvez uma bolsa de ouro possa mudar a lealdade de [Select_CString( peasant.IsFemale, 'esta camponesa', 'este camponês' )]…"
 ep3_contract_event.0520.t.success: "$ep3_contract_event.0510.t$: Sucesso"
 ep3_contract_event.0520.t.failure: "$ep3_contract_event.0510.t$: Falha"
 ep3_contract_event.0520.t.critfailure: "$ep3_contract_event.0510.t$: Falha Excepcional"
 ep3_contract_event.0520.desc.success: "[Select_CString( peasant.IsFemale, 'La alborotadora', 'El alborotador' )] tinha determinação, mas se desfez diante da minha convicção. A multidão, no início à beira de se voltar para a violência, logo começa a se acalmar.\n\nPor fim, eles se dispersam, professando sua fé no lugar legítimo [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstName|l] como governante de [location.GetName]. Os representantes do meu empregador depõem as armas, expressam gratidão pelo meu trabalho e me entregam a recompensa que mereci."
 ep3_contract_event.0520.desc.failure: "A situação está escapando do nosso controle — rápido. Não esperava tamanha eloquência e fervor de um[peasant.Custom('ES_XA')] camponês simples[peasant.Custom('ES_OA')] mas as retumbantes réplicas de [peasant.GetFirstName] às minhas frágeis palavras inflamam a multidão.\n\nFaço uma retirada apressada! A ralé entoa cantos e atira pedras, repetindo todos os insultos proferidos por seu líder.\n\n[task_contract_employer.Custom('ES_AlAla')|U] [task_contract_employer.GetTitledFirstName|l] não vai gostar nada disso…"
 ep3_contract_event.0520.desc.critfailure: "De verdade, eu não esperava uma oposição tão forte.\n\nMinha tentativa de intimidar [Select_CString( peasant.IsFemale, 'a camponesa', 'o camponês' )] é como jogar uma pedra em um lago, e a situação fica feia com uma rapidez assustadora. Quando bato em retirada, minha capa fica encharcada de cusparadas e sou atingido por uma enxurrada de legumes podres.\n\nPelo visto, a reputação de [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstName|l] está mudando de um jeito bem #EMP distinto#! do que eu prometi a ele..."
 ep3_contract_event.0520.a: "Excelente."
 ep3_contract_event.0520.b: "Bem... eu tentei."
 laamp_rid_councillor_contract_contract: "Eliminar Criador de Problemas"
 laamp_rid_councillor_contract_desc_title: "Solução de problemas determinada necessária,"
 laamp_rid_councillor_contract_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitledFirstName|l] precisa de uma lâmina eficaz e discreta que o livre de um… #EMP personaje problemático#!. Recompensas extras disponíveis por prudência e eficiência."
 laamp_rid_councillor_contract_request: "Este [task_contract|lE] exige que você [Concept( 'travel', 'viaje' )|E] até [TaskContract.GetLocation.GetName]."
 ep3_contract_event.0550.t: "Criador de Problemas: Mensagens na Escuridão"
 ep3_contract_event.0550.desc: "Chego ao local combinado em [location.GetName]. Há pouquíssimas pessoas por perto, mas percebo alguém se aproximando: envolto da cabeça aos pés em uma capa, essa figura sigilosa sussurra para mim.\n\nꡟ"Você é [ROOT.Char.GetFirstNameNoTooltip], certo?".\n\nAceno, e ele me enfia um bilhete nas mãos antes de se apressar para se fundir novamente à escuridão.\n\nEstá claro que [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstName|l] está decidid[task_contract_employer.Custom('ES_OA')] a que esse assunto não possa ser ligado a [task_contract_employer.GetSheHe]…"
 ep3_contract_event.0550.a: "Vamos ver o que me espera..."
 ep3_contract_event.0550.a.tt: "Abra a carta."
 ep3_contract_event.0555.desc: "Espero que entendais a necessidade de discrição. O desespero me obrigou a isso, e por isso não posso me dar ao luxo de mostrar minhas cartas.\n\nVosso alvo é [councillor.GetName]; deve ser removido... do poder ou deste mundo por completo: tanto faz para mim.\n\nVocês podem encontrar[councillor.GetHerHim] esta noite em um lugar conhecido como [ROOT.Char.Custom('GetPubName')]. Destrua este bilhete e nunca mais fale dele."
 ep3_contract_event.0555.a: "Ah... devo me livrar de um[councillor.Custom('ES_XA')] [councillor.GetActiveCouncilTask.GetPositionName|l] rebelde[councillor.Custom('ES_OA')] de Conselho."
 ep3_contract_event.0560.t: "Encrenqueiro: um[councillor.Custom('ES_XA')] [councillor.GetActiveCouncilTask.GetPositionName|l] turbulento[councillor.Custom('ES_OA')]"
 ep3_contract_event.0560.desc: "A taverna ficava perto. Ao espiar discretamente pela entrada dos fundos, vejo [councillor.Custom('ES_AlAla')]. [councillor.GetTitledFirstName|l] [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitleAsNameNoTooltip|l] aproveitando uma noite barulhenta, sem perceber o perigo.\n\nEste poderia ser um trabalho simples... só entrar e picar em pedaços [councillor.Custom('ES_AlAla')] [councillor.GetTitledFirstName|l]. Mas talvez uma abordagem mais sutil também funcione?\n\nTalvez, até... eu pudesse deixar viver o infeliz [councillor.Custom('ES_EA')] infeliz?"
 ep3_contract_event.0560.a: "#EMP Entro pela porta da frente!#!"
 ep3_contract_event.0560.a.success: "A luta é rápida, sem testemunhas deixadas vivas"
 ep3_contract_event.0560.a.neutral: "[councillor.GetFirstNameNoTooltip] morre na luta"
 ep3_contract_event.0560.a.failure: "Você atrapalha a emboscada e deve fugir"
 ep3_contract_event.0560.a.critfailure: "A luta vai terrivelmente mal"
 ep3_contract_event.0560.b: "Uma faca no banheiro terá que servir."
 ep3_contract_event.0560.b.success: "Funciona perfeitamente"
 ep3_contract_event.0560.b.neutral: "Há uma luta, e as pessoas notam sua fuga"
 ep3_contract_event.0560.b.failure: "O alarme é acionado, frustrando você"
 ep3_contract_event.0560.c: "Talvez um envenenamento na bebida?"
 ep3_contract_event.0560.c.critsuccess: "O veneno nunca é detectado"
 ep3_contract_event.0560.c.success: "Quando o veneno é notado, já é tarde demais"
 ep3_contract_event.0560.c.failure: "[councillor.GetFirstNameNoTooltip] apenas adoece[councillor.Custom('ES_OA')]"
 ep3_contract_event.0560.c.critfailure: "Você é peg no ato de envenenar"
 ep3_contract_event.0560.d: "Um sequestro eficaz poderia servir ao mesmo propósito..."
 ep3_contract_event.0560.d.critsuccess: "Você sequestra com sucesso [councillor.GetFirstNameNoTooltip]"
 ep3_contract_event.0560.d.success: "Seu alvo oferece resistência e precisa ser subjugado[councillor.GetHerHim]"
 ep3_contract_event.0560.d.failure: "[councillor.GetFirstNameNoTooltip] escapa"
 ep3_contract_event.0560.contractcritsuccess: "Seu [task_contract|lE] é um #P Sucesso Excepcional#!"
 ep3_contract_event.0560.contractsuccess: "Seu [task_contract|lE] é um #P Sucesso#!"
 ep3_contract_event.0560.contractfailure: "Seu [task_contract|lE] é um #N Falha#!"
 ep3_contract_event.0560.contractcritfailure: "Seu [task_contract|lE] é uma #N Falha Excepcional#!"
 ep3_contract_event.0565.t.critsuccess: "Criador de Problemas: Sucesso Excepcional"
 ep3_contract_event.0565.t.success: "Criador de Problemas: Sucesso"
 ep3_contract_event.0565.t.failure: "Criador de Problemas: Falha"
 ep3_contract_event.0565.t.critfailure: "Criador de Problemas: Falha Excepcional"
 ep3_contract_event.0565.desc.critsuccess: "Despachar [councillor.Custom('ES_AlAla')] [councillor.GetTitledFirstName|l] foi algo brutalmente rápido; morre em desonra, silenciad[councillor.Custom('ES_OA')] antes que seus acompanhantes possam sequer levantar a voz.\n\nA fria luz do dia quase purga todos os meus pecados; um banho no riacho da região cuida do resto.\n\nUm agente me espera na margem —se é o mesmo de antes, não saberia dizer— com vários sacos pesados.\n\n"[task_contract_employer.Custom('ES_ElLa')|U] [task_contract_employer.GetTitleAsNameNoTooltip|l] agradece vosso trabalho. Acrescentou um pequeno presente como sinal de gratidão"."
 ep3_contract_event.0565.desc.success: "[councillor.Custom('ES_ElLa')|U] [councillor.GetTitledFirstName|l] já não existe. O ato bruto de violência não saiu perfeito, mas a verdade é a mesma: abati meu alvo.\n\nA fria luz do dia purga quase todos os meus pecados; um banho no riacho da região faz o resto.\n\nUm agente me espera na margem —se é o mesmo de antes, não saberia dizer— com um saco pesado pendurado em sua sela.\n\n"[task_contract_employer.Custom('ES_ElLa')|U] [task_contract_employer.GetTitleAsNameNoTooltip|l] agradece o seu trabalho. Seu serviço será lembrado"."
 ep3_contract_event.0565.desc.failure: "Os uivos, o estrépito dos pratos e bancos arremessados, os golpes fortes ainda ressoam nos meus ouvidos. Esfrego as mãos furiosamente, mas este riacho não pode lavar as marcas do fracasso.\n\nQue desastre. [councillor.Custom('ES_ElLa')|U] [councillor.GetTitledFirstName|l] continua vivo e meu contrato com [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstName|l] fica anulado. Não deveria me demorar aqui, senão a vingança de uma fonte ou de outra pode me encontrar."
 ep3_contract_event.0565.desc.critfailure: "Que desastre absoluto! Toda a fúria do estabelecimento se voltou contra mim, e tive sorte de escapar com vida.\n\nAo limpar minhas feridas em um rio próximo, acabo me cobrindo de lama e tenho dificuldade para reajustar minha bagagem.\n\nPreciso continuar fugindo... [councillor.Custom('ES_ElLa')|U] [councillor.GetTitledFirstName|l] continua vivo e [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstName|l] estará furios[task_contract_employer.Custom('ES_OA')] comigo. Só um tolo demoraria aqui."
 ep3_contract_event.0565.a: "[councillor.GetSheHe] nunca será ouvid novamente."
 ep3_contract_event.0565.b: "Maldição."
 laamp_gain_wanderer_contract_contract: "Ajudar Viajante"
 laamp_gain_wanderer_contract_desc_title: "Preste atenção, por favor!"
 laamp_gain_wanderer_contract_desc: "O resgate é necessário em [TaskContract.GetEmployer.GetCurrentLocation.GetNameNoTooltip]! Serviço e ouro estão em oferta, além de qualquer saque encontrado."
 laamp_gain_wanderer_contract_request: "Este [task_contract|lE] exige que você [Concept( 'travel', 'viaje' )|E] até [TaskContract.GetLocation.GetName]."
 ep3_contract_event.0570.t: "Resgatador"
 ep3_contract_event.0570.desc: "Ao chegar em [location.GetName], algumas perguntas me levam até o local que estou procurando. Encontro [task_contract_employer.Custom('ES_AlAla')] atribulad[task_contract_employer.Custom('ES_OA')] [task_contract_employer.GetFirstName] acorrentad[task_contract_employer.Custom('ES_OA')] a uma parede dentro de um prédio com pouca vigilância.\n\nUm guarda patrulha em intervalos regulares, e aproveito a chance, no momento em que ele se afasta, para me esgueirar até a cela de [task_contract_employer.GetFirstNameNoTooltip].\n\n“Vocês vieram para me ajudar?”, pergunta fraco. “Por favor, depressa: vocês precisam me tirar daqui antes que voltem os desgraçados que me prenderam!”"
 ep3_contract_event.0570.a: "Você espera que volte [prisonguard.Custom('ES_ElLa')] guardia, espada em punho."
 ep3_contract_event.0570.a.tt: "#V Duelo#! com [prisonguard.GetFirstNameNoTooltip].\nSua [prowess|lE]: #V [root_for_loc.GetProwess]#! [prowess_i]\n [prowess|E] de [prisonguard.GetFirstName]: #V [prisonguard.GetProwess]#! [prowess_i]"
 ep3_contract_event.0570.b: "Talvez eu possa distrair o guarda?"
 ep3_contract_event.0570.b.success: "Sua distração funciona"
 ep3_contract_event.0570.b.failure: "A guarda não é enganada[prisonguard.Custom('ES_AlAla')] guarda"
 ep3_contract_event.0570.b.failure.tt: "Você sofre ferimentos enquanto escapa"
 ep3_contract_event.0570.c: "Vai ser apertado, mas eu #EMP poderia#! destrancar a porta a tempo..."
 ep3_contract_event.0570.c.success: "Você destranca a porta"
 ep3_contract_event.0570.c.failure: "Você fica sem tempo e precisa escapar"
 ep3_contract_event.0575.t.success: "$ep3_contract_event.0570.t$: Sucesso"
 ep3_contract_event.0575.t.failure: "$ep3_contract_event.0570.t$: Falha"
 ep3_contract_event.0575.desc.duel: "O corpo inerte [prisonguard.Custom('ES_DelDela')] do guarda se desaba no chão, e já estou soltando todas as bolsas, chaves e afins. Encontro algumas moedas e um/a [newly_created_artifact.GetName], mas não há mais tempo a perder.\n\n"
 ep3_contract_event.0575.desc.success: "Precisamos nos mover rapidamente. As algemas se soltam, caindo no chão com um alto #EMP clang#!, e então estamos fora. Através da porta da prisão, pela entrada, ao redor da esquina e em plena luz do dia. Liberdade.\n\n\"Não posso agradecer o suficiente!\" [task_contract_employer.GetFirstName] diz, sua respiração ainda vindo em ofegos devido ao esforço. \"Estou em dívida. Meu serviço para você começa agora.\""
 ep3_contract_event.0575.desc.failure: "A fuga foi um desastre. [task_contract_employer.GetFirstName] segue acorrentad[task_contract_employer.Custom('ES_OA')] à parede e qualquer esperança de obter seus serviços em troca de um resgate foi despedaçada.\n\nTudo o que posso fazer é refazer o caminho até meu cavalo — sem chamar muita atenção, já que posso estar sendo perseguido — e me preparar para voltar por onde vim."
 ep3_contract_event.0575.a: "É um prazer tê-l!"
 ep3_contract_event.0575.b: "Uma pena."
 ep3_pilfered_brooch: "Broche de Prata Dourada"
 laamp_find_secret_contract_contract: "Descobrir Segredo"
 laamp_find_secret_contract_desc_title: "Satisfaça minha curiosidade..."
 laamp_find_secret_contract_desc: "Olhos e ouvidos astutos são necessários em [TaskContract.GetEmployer.GetCurrentLocation.GetNameNoTooltip] para o trabalho de descobrir segredos pessoais. Os interessados devem ser discretos."
 laamp_find_secret_contract_request: "Este [task_contract|lE] exige que você [Concept( 'travel', 'viajar' )|E] vá até [TaskContract.GetLocation.GetName]."
 ep3_contract_event.0580.t: "Informação Classificada"
 ep3_contract_event.0580.desc: "As suspeitas [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstName|l] recaem sobre seu [task_contract_employer.Custom2('RelationToMeShort', SCOPE.sC('secret_haver'))] [secret_haver.Custom('ES_ElLa')] [secret_haver.GetTitledFirstName|l], então me vejo espreitando[secret_haver.Custom('ES_LoLa')] pelos corredores de uma [secret_haver.GetFaith.HouseOfWorship].\n\n[secret_haver.GetFirstNameNoTooltip] está claramente entregad[secret_haver.Custom('ES_OA')] a conversar consigo mesm[secret_haver.Custom('ES_OA')]. Arrisco-me a me aproximar alguns passos a mais, escondendo-me atrás de uma parede saliente.\n\n#EMP Quase#! consigo ouvir seus sussurros. Se são uma confissão ou apenas resmungos sem sentido, não consigo distinguir…"
 ep3_contract_event.0580.a: "Aproximar-me um pouco mais..."
 ep3_contract_event.0580.a.success: "Você se esgueira perto o suficiente para ouvir"
 ep3_contract_event.0580.a.failure: "Você não consegue distinguir claramente"
 ep3_contract_event.0580.b: "Talvez se eu apenas #EMP fingisse#! que sabia..."
 ep3_contract_event.0580.b.success: "[task_contract_employer.GetFirstNameNoTooltip] acredita na sua mentira"
 ep3_contract_event.0580.b.failure: "[task_contract_employer.GetFirstNameNoTooltip] não acredita em você de jeito nenhum"
 ep3_contract_event.0580.c: "Estou farto de me esconder."
 ep3_contract_event.0580.c.tt: "Ameaças abertas podem ter sucesso onde a escuta falhou."
 ep3_contract_event.0580.c.neutral.tt: "[secret_haver.GetFirstNameNoTooltip] tem um sorriso estranho no rosto…"
 ep3_contract_event.0580.c.success: "Suas ameaças funcionam"
 ep3_contract_event.0580.c.failure: "[secret_haver.GetFirstNameNoTooltip] escarnece de suas ameaças"
 ep3_contract_event.0580.c.neutral: "[secret_haver.GetFirstNameNoTooltip] propõe um acordo"
 ep3_contract_event.0581.t: "$ep3_contract_event.0580.t$: Um Novo Acordo"
 ep3_contract_event.0581.desc: "Quando avanço ameaçadoramente em direção a [secret_haver.Custom('ES_ElLa')] [secret_haver.GetTitledFirstName|l], ele/ela ergue as mãos em súplica.\n\n«Esperem! Sei que vocês já ouviram o suficiente e que podem arrancar o resto de mim, mas tenho uma proposta».\n\n«Sei exatamente quem mandou vocês fazerem isso. [Select_CString( task_contract_employer.IsFemale, 'vuestra empleadora', 'vuestro empleador' )|U] não está tão livre de segredos quanto faz parecer».\n\n«Se eu lhes der isto…», ele/ela estende uma pequena bolsa de ouro, deslizando um anel do dedo enquanto o faz, «… talvez vocês possam ser persuadidos a levar isso e esse conhecimento com vocês, e manter meu segredo em segurança?»."
 ep3_contract_event.0581.a: "Eu tenho um contrato a cumprir."
 ep3_contract_event.0581.b: "É uma oferta tentadora..."
 ep3_contract_event.0585.t.success: "$ep3_contract_event.0580.t$: Sucesso"
 ep3_contract_event.0585.t.failure: "$ep3_contract_event.0580.t$: Falha"
 ep3_contract_event.0585.desc.success: ""Excelente, excelente!", exclama [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstName|l] quando lhe trago as notícias. "Eu tinha minhas suspeitas, é claro, mas vê-las confirmadas…".\n\n[task_contract_employer.GetFirstNameNoTooltip] faz gestos a um guarda para me trazer o pagamento, acariciando a barba pensativamente.\n\n"Sua recompensa. Se eu precisar de ajuda no futuro, não hesite em atender ao meu chamado. Adeus, [ROOT.Char.GetTitledFirstNameNoTooltip]"."
 ep3_contract_event.0585.desc.failure: "Idiota. ¡Especie de [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('task_contract_employer'))|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('task_contract_employer'))]!. [task_contract_employer.Custom('ES_AlAla')|U] [task_contract_employer.GetTitledFirstName|l] no le impresionan mucho mis intentos por descubrir el secreto de [secret_haver.GetFirstName].\n\n¡#EMP Debo#! conocer ese secreto! ¡Todos los que envío son unos incompetentes o unos mentirosos! Esperaba que vos rompierais la racha. [task_contract_employer.GetFirstNameNoTooltip] señala la puerta, con el gesto torcido.\n\nMarchad. Confío en que nuestros caminos no se vuelvan a cruzar jamás, [ROOT.Char.GetTitledFirstNameNoTooltip|l]."
 ep3_contract_event.0585.desc.liedsuccessfully: "Sério? Aguardo prendendo a respiração enquanto [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstName|l] reflete sobre minha mentira óbvia. Sim… sim! Isso faz #EMP todo#! sentido!\n\nSolto um suspiro de alívio enquanto [task_contract_employer.GetFirstNameNoTooltip] faz um gesto a um guarda para que traga minha recompensa.\n\nNão é bem o que eu esperava, é claro, mas quando a gente #EMP pensa#!… Está claro que já não fala comigo, mas sim consigo mesm[task_contract_employer.Custom('ES_OA')].\n\nHora de cair fora às pressas."
 ep3_contract_event.0585.a: "Excelente."
 ep3_contract_event.0585.b: "Maldições!"
 laamp_eliminate_heir_contract_contract: "Eliminar Herdeiro"
 laamp_eliminate_heir_contract_desc_title: "Assassinos da estrada aberta,"
 laamp_eliminate_heir_contract_desc: "Uma lâmina experiente e silenciosa é necessária para... resolver problemas familiares. Conexões chave e uma recompensa rica à disposição."
 laamp_eliminate_heir_contract_request: "Este [task_contract|lE] exige que você [Concept( 'travel', 'viajar' )|E] vá até [TaskContract.GetLocation.GetName]."
 ep3_contract_event.0590.t: "Trabalho Sujo"
 ep3_contract_event.0590.desc: "[heir.Custom('ES_ElLa')|U] [heir.GetTitledFirstName], [Select_CString( heir.IsFemale, 'la heredera problemática', 'el heredero problemático' )] [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstName|l], é um pouco displicente quando se trata de proteção pessoal. Uma escapada noturna pode aliviar a tensão, mas outra ponta está prestes a entrar em cena…\n\nAinda assim, algo detém minha mão. Estou contratado para fazer um trabalho, mas isso me parece... estranho.\n\nSerá que não existe outro jeito de resolver isso?"
 ep3_contract_event.0590.a: "Chega disso. É hora de morrer, [heir.GetFirstNameNoTooltip]."
 ep3_contract_event.0590.a.success: "[heir.GetFirstNameNoTooltip] morre silenciosamente"
 ep3_contract_event.0590.a.failure: "[heir.GetFirstNameNoTooltip] ouve você se aproximando e foge"
 ep3_contract_event.0590.b: "Talvez eu possa incapacitar[heir.GetHerHim]?"
 ep3_contract_event.0590.b.success: "[heir.GetFirstNameNoTooltip] desmaia"
 ep3_contract_event.0590.b.failure: "[heir.GetFirstNameNoTooltip] ouve você se aproximando"
 ep3_contract_event.0590.b.fatalbonk: "[heir.GetHerHim|U] golpeias uma vez #EMP demasiado#! forte"
 ep3_contract_event.0590.c: "Talvez se eu explicar a situação..."
 ep3_contract_event.0590.c.success: "[heir.GetFirstNameNoTooltip] concorda em ir com você"
 ep3_contract_event.0590.c.failure: "[heir.GetFirstNameNoTooltip] ridiculariza sua história"
 ep3_contract_event.0590.c.critfailure: "Você deixa escapar quem te contratou para isso"
 ep3_contract_event.0591.t: "$ep3_contract_event.0590.t$: Segunda Chance"
 ep3_contract_event.0591.desc.knockedout: "Sento-me sobre uma pedra nos arredores de [location.GetName], vendo como [heir.Custom('ES_ElLa')] [heir.GetTitledFirstName|l] volta aos poucos a si. O golpe que dei em sua cabeça foi claramente bem calculado; [heir.GetFirstNameNoTooltip] terá dor de cabeça por um dia, mas não deve sofrer danos permanentes.\n\nLevo alguns instantes para explicar a situação; considerando o transtorno em sua vida, [heir.GetFirstNameNoTooltip] encara isso de forma notavelmente tranquila.\n\n\"Obrigado por me poupar\", diz, prendendo uma bolsa à sela do cavalo que eu trouxera. \"Não vou me esquecer disso. Espero que nossos caminhos se cruzem novamente\". Com isso, [heir.GetFirstNameNoTooltip] começa a se afastar a trote, levantando a mão em despedida."
 ep3_contract_event.0591.desc.camewillingly: "Sento-me sobre uma pedra, observando como [heir.Custom('ES_ElLa')] [heir.GetTitledFirstName|l] amarra uma bolsa à sua montaria. A viagem até aqui, aos arredores de [location.GetName], foi todo o tempo de que precisei para explicar a situação, e [heir.GetFirstNameNoTooltip] ficou muito feliz em me acompanhar.\n\n“Obrigado por me poupar.” diz, quando a bolsa está bem presa. “Não vou me esquecer disso. Espero que nossos caminhos se cruzem novamente.” Com isso, [heir.GetFirstNameNoTooltip] começa a se afastar a trote, erguendo a mão em despedida."
 ep3_contract_event.0591.a: "\"Boa sorte para você!"
 ep3_contract_event.0595.t: "$ep3_contract_event.0590.t$: Ação Desfeita"
 ep3_contract_event.0595.desc: "Meus esforços para cumprir os desejos de [task_contract_employer.GetFirstName] se despedaçam.\n\n[heir.GetFirstName] vive, uma pedra no sapato de [task_contract_employer.GetFirstNameNoTooltip]. Quanto a mim, devo sair de [location.GetName] rapidamente, antes que a ira do meu empregador[task_contract_employer.Custom('ES_XA')] me encontre…"
 ep3_contract_event.0595.a: "De volta à estrada..."
