 laamp_base_0031_request: "Este [task_contract|lE] exige que voc? [Concept('travel', 'viajar' )|E] at? #BOLD 3#! [counties|lE] nas terras [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitledFirstName|l] e usar uma [skill|lE] diferente em cada uma delas para ajudar [TaskContract.GetEmployer.GetHerHim] a se livrar de um [modifier|lE] negativo."
 laamp_base_0041_request: "$laamp_request_boilerplate_diplomacy_scheme$\n$laamp_request_boilerplate_criminal$"
 laamp_base_1001_request: "Este [task_contract|lE] exige que você elimine um [character|lE] em particular, seja por meio de [single_combat_duel|lE], completando um desafio de [skill|lE] [martial|lE] ou lançando seus [men_at_arms|lE] contra ele e assumindo as perdas."
