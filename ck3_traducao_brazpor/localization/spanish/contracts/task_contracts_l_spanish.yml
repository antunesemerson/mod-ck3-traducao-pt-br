 ep3_contract_event.0003.t: "$contract_event_prefix$ Incursão por Cativos"
 ep3_contract_event.0003.desc: "$ep3_contract_event.0001.desc$Essa espécie de ser [task_contract_target.Custom2('InsultAdjective', SCOPE.sC('task_contract_employer'))], [task_contract_target.GetName], sua [Select_CString(task_contract_target.IsFemale, 'inimiga jurada', 'inimigo jurado' )] tem sido uma ameaça ultimamente. A [Select_CString(task_contract_employer.IsFemale, 'minha senhora', 'meu senhor' )] gostaria que vocês dessem um jeito nele, capturando seus homens."
 ep3_contract_event.0003.a: "Levante as bandeiras! Marchamos imediatamente!"
