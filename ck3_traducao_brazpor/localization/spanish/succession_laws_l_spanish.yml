 male_preference_law: "Eletiva Feudal"
 equal_law: "Eletiva Principesca"
 female_preference_law: "O [ruler|lE] e todos os [vassals|lE] diretos [de_jure|lE] de um ou dois [ranks|lE] abaixo do [title|lE] podem nomear um [title_heir|lE] dentre eles e os [Concept( 'close_family', 'familiares cercanos' )|E] do governante."
 female_only_law: "O Imperador e os sete Príncipes-Eleitores podem nomear um [title_heir|lE] dentre eles mesmos, quaisquer filhos [legitimate|lE] e irmãos do [ruler|lE], bem como qualquer outro grande [vassal|lE] [de_jure|lE] do Império. Se um [title|lE] histórico de eleitor estiver nas mãos de infiéis ou não existir, outro vassalo [de_jure|lE] tomará seu lugar. Esta [succession_law|lE] dá grande importância à [faith|lE] e à [piety|lE].

Os títulos eleitorais deste domínio são os condados de Colônia, Mainz e Trier, e os ducados de Boêmia, Francônia Oriental, Ostfália e Ostmark."
 male_only_law_subname: "Eletiva Tanistry"
 male_preference_law_subname: "O [ruler|lE] e todos os [vassals|lE] acima do [rank|lE] de [baron|lE] e um ou dois níveis abaixo do [title|lE] podem nomear um [title_heir|lE] — o Tanista — entre os membros da [dynasty|lE] do governante. Os vassalos tendem a favorecer parentes mais velhos e distantes em vez da [Concept( 'close_family', 'família próxima' )|E]."
 equal_law_subname: "Eletiva Saxônica"
 female_preference_law_subname: "Witenagemot"
 female_only_law_subname: "O [ruler|lE] e todos os vassalos diretos e adultos [de_jure|lE] de um ou dois [ranks|lE] abaixo do [title|lE] podem nomear como [title_heir|lE] o [powerful_vassal|lE] mais poderoso entre eles, os filhos [Concept( 'legitimate', 'legítimos' )|E] legítimos do governante ou qualquer outro [claimant|lE]."
 male_only_law_effects: "Eletiva Escandinava"
 male_preference_law_effects: "Thing"
 equal_law_effects: "O [ruler|lE] e todos os [vassals|lE] [de_jure|lE] (exceto os barões) podem nomear um [title_heir|lE] entre os [Concept( 'extended_family', 'parientes lejanos' )|E] do governante e quaisquer [claimants|lE] disponíveis. O [voting_power|lE] nesta [succession_law|lE] é influenciado pelo [county_development|lE] total do [domain|lE] do [elector|lE] e pela [county_opinion|lE] da [capital|lE]."
