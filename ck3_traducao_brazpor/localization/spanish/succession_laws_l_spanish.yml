 male_only_law_effects: "$EFFECT_LIST_BULLET$ As mulheres não podem herdar\n$EFFECT_LIST_BULLET$ As mulheres não podem herdar [claims|lE]\n$EFFECT_LIST_BULLET$ Os [rulers|lE] homens podem ter [concubines|lE] ou várias [spouses|lE] se sua [faith|lE] possui a [doctrine|lE] de [GetFaithDoctrine('doctrine_concubines').GetBaseName] ou de [GetFaithDoctrine('doctrine_polygamy').GetBaseName]"
 male_preference_law_effects: "$EFFECT_LIST_BULLET$ O homem tem precedência sobre a mulher na sucessão\n$EFFECT_LIST_BULLET$ Os [rulers|lE] homens podem ter [concubines|lE] ou várias [spouses|lE] se sua [faith|E] tiver a [doctrine|lE] de [GetFaithDoctrine('doctrine_concubines').GetBaseName|l] ou de [GetFaithDoctrine('doctrine_polygamy').GetBaseName|l]"
 equal_law_effects: "$EFFECT_LIST_BULLET$ Homens e mulheres são iguais na sucessão\n$EFFECT_LIST_BULLET$ Todos os [rulers|lE] podem ter [concubines|lE], ou vários [spouses|lE] se sua [faith|lE] tem as [Concept( 'doctrine', 'doctrinas' )|E] [GetFaithDoctrine('doctrine_concubines').GetBaseName] ou [GetFaithDoctrine('doctrine_polygamy').GetBaseName]"
 female_preference_law_effects: "$EFFECT_LIST_BULLET$ As mulheres têm precedência sobre os homens na sucessão\n$EFFECT_LIST_BULLET$ Os [rulers|lE] femininos podem ter [concubines|lE] ou vários [spouses|lE] se sua [faith|lE] tiver a [doctrine|lE] [GetFaithDoctrine('doctrine_concubines').GetBaseName] ou [GetFaithDoctrine('doctrine_polygamy').GetBaseName]"
 female_only_law_effects: "$EFFECT_LIST_BULLET$ Homens são desqualificados da herança\n$EFFECT_LIST_BULLET$ Homens não podem herdar [claims|lE].\n$EFFECT_LIST_BULLET$ As [rulers|lE] femininas podem ter [concubines|lE] ou vários [spouses|lE] se sua [faith|lE] possui a [doctrine|lE] [GetFaithDoctrine('doctrine_concubines').GetBaseName] ou [GetFaithDoctrine('doctrine_polygamy').GetBaseName]"
 SUCCESSION_FORM_NAME: "[Character.GetActiveLawInGroupWithFlag('succession_gender_laws').GetName] [Character.GetActiveLawInGroupWithFlag('succession_order_laws').GetName]"
 feudal_elective_succession_law: "Eletiva Feudal"
 princely_elective_succession_law: "Eletiva Principesca"
 feudal_elective_succession_law_effects: "O [ruler|lE] e todos os [vassals|lE] diretos [de_jure|lE] de um ou dois [ranks|lE] abaixo do [title|lE] podem nomear um [title_heir|lE] dentre eles e os [Concept( 'close_family', 'familiares cercanos' )|E] do governante."
 princely_elective_succession_law_effects: "O Imperador e os sete Príncipes-Eleitores podem nomear um [title_heir|lE] dentre eles mesmos, quaisquer filhos [legitimate|lE] e irmãos do [ruler|lE], bem como qualquer outro grande [vassal|lE] [de_jure|lE] do Império. Se um [title|lE] histórico de eleitor estiver nas mãos de infiéis ou não existir, outro vassalo [de_jure|lE] tomará seu lugar. Esta [succession_law|lE] dá grande importância à [faith|lE] e à [piety|lE].\n\nOs títulos eleitorais deste domínio são os condados de Colônia, Mainz e Trier, e os ducados de Boêmia, Francônia Oriental, Ostfália e Ostmark."
 gaelic_elective_succession_law: "Eletiva Tanistry"
 gaelic_elective_succession_law_effects: "O [ruler|lE] e todos os [vassals|lE] acima do [rank|lE] de [baron|lE] e um ou dois níveis abaixo do [title|lE] podem nomear um [title_heir|lE] — o Tanista — entre os membros da [dynasty|lE] do governante. Os vassalos tendem a favorecer parentes mais velhos e distantes em vez da [Concept( 'close_family', 'família próxima' )|E]."
 saxon_elective_succession_law: "Eletiva Saxônica"
 saxon_elective_succession_law_subname: "Witenagemot"
 saxon_elective_succession_law_effects: "O [ruler|lE] e todos os vassalos diretos e adultos [de_jure|lE] de um ou dois [ranks|lE] abaixo do [title|lE] podem nomear como [title_heir|lE] o [powerful_vassal|lE] mais poderoso entre eles, os filhos [Concept( 'legitimate', 'legítimos' )|E] legítimos do governante ou qualquer outro [claimant|lE]."
 scandinavian_elective_succession_law: "Eletiva Escandinava"
 scandinavian_elective_succession_law_subname: "Thing"
 scandinavian_elective_succession_law_effects: "O [ruler|lE] e todos os [vassals|lE] [de_jure|lE] (exceto os barões) podem nomear um [title_heir|lE] entre os [Concept( 'extended_family', 'parientes lejanos' )|E] do governante e quaisquer [claimants|lE] disponíveis. O [voting_power|lE] nesta [succession_law|lE] é influenciado pelo [county_development|lE] total do [domain|lE] do [elector|lE] e pela [county_opinion|lE] da [capital|lE]."
 feudal_elective_candidates: "Família Próxima, Reivindicantes e Eleitores"
 feudal_elective_candidates_tooltip: "Para ser um candidato válido na eletiva feudal, um personagem deve cumprir uma das seguintes condições:\n$EFFECT_LIST_BULLET$Ser [Concept( 'close_family', 'familiar cercano' )|E] legítimo do governante atual, sem estar na linha para herdar uma teocracia ou república. Os filhos de um candidato não podem ser nomeados\n$EFFECT_LIST_BULLET$Ser [claimant|lE] ao título, sem estar na linha para herdar uma teocracia ou república\n$EFFECT_LIST_BULLET$Ser [elector|lE] feudal válido ao título"
 feudal_elective_electors: "Governante e Vassalos"
 feudal_elective_electors_tooltip: "Para ser um [elector|lE] válido na eletiva feudal, um vassalo deve cumprir todas estas condições:\n$EFFECT_LIST_BULLET$ Ser vassalo [de_jure|lE] ao título\n$EFFECT_LIST_BULLET$ Ser vassalo direto do título\n$EFFECT_LIST_BULLET$ Estar apenas um ou dois [ranks|lE] abaixo do título"
 princely_elective_candidates: "$feudal_elective_candidates$"
 princely_elective_candidates_tooltip: "Para ser um candidato válido na eletiva principesca, um personagem deve cumprir uma destas condições:\n$EFFECT_LIST_BULLET$Ser [Concept( 'close_family', 'familiar cercano' )|E]legítimo do governante atual sem estar na linha para herdar uma teocracia ou república. Os filhos de um candidato não podem ser nomeados\n$EFFECT_LIST_BULLET$Ser [claimant|lE]pretendente ao título, sem estar na linha para herdar uma teocracia ou república\n$EFFECT_LIST_BULLET$Ser [elector|lE]eleitor feudal válido ao título"
 princely_elective_electors: "Príncipes-Eleitores"
 princely_elective_electors_tooltip: "Além de [SuccessionElectionWindow.GetTitle.GetHolder.GetTitleAsNameNoTooltip|l], os titulares dos seguintes [titles|lE] são favorecidos como [electors|lE] sob [SuccessionElectionWindow.GetSuccessionLaw.GetName|l]:[SuccessionElectionWindow.GetTitle.Custom('GetPrincelyElector1')][SuccessionElectionWindow.GetTitle.Custom('GetPrincelyElector2')][SuccessionElectionWindow.GetTitle.Custom('GetPrincelyElector3')][SuccessionElectionWindow.GetTitle.Custom('GetPrincelyElector4')][SuccessionElectionWindow.GetTitle.Custom('GetPrincelyElector5')][SuccessionElectionWindow.GetTitle.Custom('GetPrincelyElector6')][SuccessionElectionWindow.GetTitle.Custom('GetPrincelyElector7')]\n\nSe algum dos itens acima não estiver criado, não for mantido por um [vassal|lE] imperial [de_jure|lE], já estiver em posse de outro eleitor, ou a [faith|lE] do titular for diferente da do imperador, outro título de iure mantido por um vassalo imperial direto ou [independent_ruler|lE] será selecionado de acordo com estes critérios:\n$EFFECT_LIST_BULLET$ Governantes da [faith|lE] e [culture|lE] do imperador são favorecidos\n$EFFECT_LIST_BULLET$ Governantes [theocratic|lE] e [feudal|lE]"
 gaelic_elective_candidates: "Membros da Dinastia"
 gaelic_elective_candidates_tooltip: "Todos os membros legítimos da [dynasty|lE] do governante atual que não estejam na linha sucessória de uma teocracia ou república são candidatos válidos de acordo com a tanistria. Não se pode nomear os filhos de um candidato."
 gaelic_elective_electors: "$feudal_elective_electors$"
 gaelic_elective_electors_tooltip: "Para ser um [elector|lE] válido sob a tanistria, um vassalo deve cumprir todas estas condições:\n$EFFECT_LIST_BULLET$ Ser vassalo [de_jure|lE] do título\n$EFFECT_LIST_BULLET$ Estar apenas um ou dois [ranks|lE] abaixo do título"
 saxon_elective_candidates: "Filhos, Reivindicantes e Vassalos"
 saxon_elective_candidates_tooltip: "Para ser um Candidato válido no Witenagemot, um personagem deve cumprir uma das seguintes condições:\n$EFFECT_LIST_BULLET$ Ser filho legítimo do governante atual, sem estar na linha de sucessão de uma teocracia ou república\n$EFFECT_LIST_BULLET$ Ser [claimant|lE] ao título, sem estar na linha de sucessão de uma teocracia ou república. Os filhos de um candidato não podem ser nomeados\n$EFFECT_LIST_BULLET$ Ser um [Concept( 'powerful_vassal_powerful', 'vassalo feudal poderoso' )|E] [de_jure|lE] do título"
 saxon_elective_electors: "$feudal_elective_electors$"
