 celestial_grand_marshal_appointment_succession_law_subname: "$celestial_military_appointment_succession_law_subname$"
 celestial_grand_marshal_appointment_succession_law_effects: "\nA [succession|lE] se baseia no [merit_level|lE] e nas [merit_pools|lE]\n\n#high Un tipo de [appointment_succession_law|lE] que solo emplea el [minister_grand_marshal|lE], un cargo reservado a comandantes con los [merit_levels|lE] más altos. Según el $celestial_grand_marshal_appointment_succession_law$, la candidatura con mayor [candidate_score|lE] heredará el [title|lE]. En la puntuación influye principalmente tener una buena [martial_skill|lE], ganar [commander_traits|lE] o gastar [influence|lE].#!"
