 celestial_ministry_appointment_succession_law_effects: "\nA [succession|lE] se baseia no [merit_level|lE] e nas [merit_pools|lE]\n\n#high Un tipo de [appointment_succession_law|lE]. La $celestial_appointment_succession_law$ es la sucesión para [titles|lE] de ministerios. Son puestos muy valorados, reservados para aquellos con el máximo [merit_level|lE]. Los [movements|lE], el [merit|lE] y la [influence|lE] desempeñan un papel importante para aumentar la [Concept('candidate_score', 'puntuación')|E] de la candidatura.#!"
