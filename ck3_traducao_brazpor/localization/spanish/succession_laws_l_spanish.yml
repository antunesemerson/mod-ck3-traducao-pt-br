l_spanish:
 succession_order_laws: "[succession_laws|E]"
 succession_order_laws_singular: "[succession_law|E]"
 partition_succession_law: "Partilha"
 partition_succession_law_subname: "Todos os Filhos Herdam Igualmente"
 partition_succession_law_effects: "\n #V Em caso de [succession|l] por $partition_succession_law$, seus [titles|l] serão divididos igualmente entre todos os seus filhos.#!\n\n #weak $partition_base_desc$#!"
 partition_base_desc: "#weak A la hora de la sucesión, todos los [titles|lE] del difunto [ruler|lE] se repartirán entre sus [eligible_children|lE]. El [player_heir|lE] siempre recibe el [primary_title|lE], la [realm_capital|lE] y cualquier título directo [de_jure|lE] asociado.\n\nLos hijos menores recibirán títulos, empezando por los del mismo [rank|lE] como título principal. Si no hay ninguno disponible, recibirán los títulos de menor categoría. El heredero jugable no puede recibir de forma preventiva aquellos títulos que no esté destinado a heredar.\n#!"
 high_partition_succession_law: "Alta Partilha"
 high_partition_succession_law_subname: "Todos os Filhos Herdam"
 high_partition_succession_law_effects: "\n#V Bajo la [succession|lE] de $high_partition_succession_law$, la mejor parte de los [titles|lE] irá a nuestro [player_heir|lE] y el resto se dividirá entre nuestros hijos.#!\n\n#weak $partition_base_desc$\nO Herdeiro do Jogador #emp siempre#! herdará pelo menos metade dos Títulos do Governante falecido.\n#!"
 confederate_partition_succession_law: "Partilha Confederada"
 confederate_partition_succession_law_subname: "Todos os Filhos Herdam Igualmente"
 confederate_partition_succession_law_effects: "\n#V Bajo la sucesión de reparto confederado, tus [titles|lE] se repartirán de forma equitativa entre tus hijos. Se pueden crear [titles|lE] nuevos para los [realm_heirs|lE] más jóvenes.#!\n\n#weak $partition_base_desc$\nSe crearán títulos para los hijos menores si dispones de suficientes tierras.\n\n#!#X Los líderes de tribus están obligados a usar este tipo de sucesión.#!\n"
 single_heir_succession_law: "Primogenitura"
 single_heir_succession_law_subname: "Filho Mais Velho Herda"
 single_heir_succession_law_effects: "\n #V No caso de [succession|l] por $single_heir_succession_law$, seu primogênito herda todos os seus [titles|l].#!\n\n #weak Ao ocorrer a sucessão, todos os [titles|lE] do governante falecido serão entregues ao [player_heir|lE], que é seu [eligible_child|lE] de maior idade. Os filhos mais novos não recebem nada.\n#!"
 single_heir_succession_law_youngest: "Ultimogenitura"
 single_heir_succession_law_youngest_subname: "Filho Mais Novo Herda"
 single_heir_succession_law_youngest_effects: "\n #V Em caso de [succession|l] por $single_heir_succession_law_youngest$, seu filho mais novo herda todos os seus [titles|l].#!\n\n #weak Na sucessão, todos os [titles|lE] do governante falecido são entregues ao [player_heir|lE], que é seu [eligible_child|lE] mais novo. Os filhos mais velhos não recebem nada.\n#!"
 single_heir_dynasty_house: "Seniority da Casa"
 single_heir_dynasty_house_subname: "Membro Mais Velho da [house|l] Herda"
 single_heir_dynasty_house_effects: "\n #V No caso de [succession|l] por $single_heir_dynasty_house$, o membro mais velho da sua [house|l] herdará todos os seus títulos.#!\n\n #weak No momento da sucessão, todos os [titles|lE] do falecido governante passarão para o membro apto de maior idade da [house|lE]. Seus descendentes não receberão nada, a menos que algum deles seja o membro mais velho da casa.\n#!"
 same_faith_theocratic_succession_law: "Mesma Fé"
 same_faith_theocratic_succession_law_effects: "Apenas personagens da mesma [faith|lE] do [ruler|lE] atual podem herdar."
 same_faith_only_law: "$same_faith_theocratic_succession_law$"
 same_faith_only_law_effects: "$same_faith_theocratic_succession_law_effects$"
 bishop_theocratic_succession_law: "Teocrática"
 bishop_theocratic_succession_law_effects: "Na sucessão, todos os [titles|lE] do [realm_priest_possessive|lE] serão dados ao seu sucessor. As doutrinas de sua [faith|lE] determinam quem será esse sucessor."
 temporal_head_of_faith_succession_law: "Teocrática Temporal"
 temporal_head_of_faith_succession_law_effects: "O [title|lE] de [temporal_head_of_faith|lE] será dado ao [player_heir|lE] do [head_of_faith|lE] atual."
 succession_laws_must_not_be_temporal: "Não pode ser um [title|lE] de [temporal_head_of_faith|lE]."
 holy_order_succession_law: "Ordem Sagrada"
 holy_order_succession_law_effects: "Na sucessão, todos os [titles|lE] do Grão-Mestre serão dados ao seu sucessor, que geralmente é o [knight|lE] com maior habilidade [martial|lE]."
 mercenary_company_succession_law: "Companhia Mercenária"
 mercenary_company_succession_law_effects: "Na sucessão, todos os [titles|lE] do capitão serão dados ao seu sucessor, que geralmente é o [knight|lE] com maior habilidade [martial|lE]."
