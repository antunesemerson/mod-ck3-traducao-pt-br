 partition_succession_law: "Partilha"
 partition_succession_law_subname: "Todos os Filhos Herdam Igualmente"
 partition_succession_law_effects: "\n #V Em caso de [succession|l] por $partition_succession_law$, seus [titles|l] serão divididos igualmente entre todos os seus filhos.#!\n\n #weak $partition_base_desc$#!"
 partition_base_desc: "#weak Na sucessão, todos os [titles|lE] mantidos pelo [ruler|lE] falecido serão divididos entre seus [eligible_children|lE], com o [player_heir|lE] sempre recebendo o [primary_title|lE], a [realm_capital|lE] e quaisquer títulos diretos [de_jure|lE] associados a ele.

Os filhos mais jovens receberão títulos, começando pelos do mesmo [rank|lE] que o título principal; se não houver nenhum disponível, receberão títulos de categoria inferior. Seu Herdeiro do Jogador não pode receber preventivamente títulos que não está destinado a herdar.
#!"
 high_partition_succession_law: "Partilha Confederada"
 high_partition_succession_law_subname: "Todos os Filhos Herdam Igualmente"
 high_partition_succession_law_effects: "
#V Sob a [succession|lE] de $high_partition_succession_law$, a maior parte dos [titles|lE] irá para seu [player_heir|lE] e o restante será dividido entre seus filhos.#!

#weak $partition_base_desc$
O Herdeiro do Jogador #emp sempre#! herdará pelo menos metade dos títulos do governante falecido.
#!"
 confederate_partition_succession_law: "\n #V Em caso de [succession|l] por $single_heir_succession_law_youngest$, seu filho mais novo herda todos os seus [titles|l].#!\n\n #weak Na sucessão, todos os [titles|lE] do governante falecido são entregues ao [player_heir|lE], que é seu [eligible_child|lE] mais novo. Os filhos mais velhos não recebem nada.\n#!"
 confederate_partition_succession_law_subname: "Seniority da Casa"
 confederate_partition_succession_law_effects: "
#V Sob a sucessão de partilha confederada, seus [titles|lE] serão divididos igualmente entre seus filhos. Novos [titles|lE] poderão ser criados para os [realm_heirs|lE] mais jovens.#!

#weak $partition_base_desc$
Títulos serão criados para os filhos mais jovens se houver terras suficientes.

#!#X Governantes tribais ficam presos a este tipo de sucessão.#!
"
