 celestial_military_appointment_succession_law_subname: "Herda o candidato com as habilidades [Concept('martial', 'marciales' )|E] mais altas"
 celestial_military_appointment_succession_law_effects: "\nA [succession|lE] se baseia no [merit_level|lE] e nas [merit_pools|lE]\n\n#high Un tipo de [appointment_succession_law|lE]. Según la $celestial_military_appointment_succession_law$, la candidatura con mayor [candidate_score|lE] heredará el [title|lE] y sus [holdings|lE] asociadas. Todo [adult|lE] del [realm|lE] puede luchar por conseguir una [governorship|lE] militar, ya sea al tener una buena [martial_skill|lE], ganar [commander_traits|lE] o gastar [influence|lE].#!\n\n"
