 landless_adventurer_succession_law_subname: "Filho Mais Velho Herda"
 landless_adventurer_succession_law_effects: "#high Sob a $landless_adventurer_succession_law$, o [title|lE] do acampamento passará ao seu [child|El] mais velho (ou ao parente mais próximo seguinte) que também seja seu [courtier|lE] e não possua nenhum [title|lE]. Se não houver nenhum disponível, o [follower|lE] com maior proeza herdará.#!"
 #MPO
 single_heir_succession_kurultai_law: "Kurultai"
 single_heir_succession_kurultai_subname: "Filho Mais Velho Herda"
 single_heir_succession_kurultai_law_effects: "Na sucessão do kurultai, o [council|lE] desempenha um papel importante ao decidir quem será o próximo na linha sucessória. Se houver vozes divergentes entre os membros do [kurultai|lE], isso levará a uma sucessão caótica.\n\nSob uma sucessão caótica, a linha sucessória não está clara, e o [heir|lE] sofrerá alguns efeitos negativos no início de seu reinado.\n\nSe todo o kurultai concordar, o senhorio passará por uma sucessão estável, na qual o [heir|lE] ocupará o trono com o apoio de todos os seus partidários mais poderosos."
 law_of_the_land_succession_law: "Sucessão pela Lei da Terra"
 law_of_the_land_succession_law_subname: "O [holding_type|lE] determina o sucessor"
 law_of_the_land_succession_law_effects: "Este [county|lE] exige um [government|lE] específico para herdar com base no [holding_type|lE] da [barony|lE] capital. Ele será dado a um personagem na [line_of_succession|lE] do [realm|lE] que cumpra essa condição.\n\nSe ninguém cumprir o requisito, o [title|lE] o herdará um personagem local, que passará a ser [independent|lE]."
 succession_law_changed: "Lei de Sucessão de Título Alterada"
 confederation_elective_succession_law: "Eletiva de Confederação"
 confederation_elective_succession_law_subname: "Os [vassals|lE] detêm o verdadeiro poder"
 confederation_elective_candidates: "Família Próxima, Netos e Vassalos"
 confederation_elective_candidates_tooltip: "Para ser um candidato válido na eletiva feudal, um personagem deve cumprir uma das seguintes condições:\n$EFFECT_LIST_BULLET$Ser [Concept( 'close_family', 'familiar cercano' )|E] legítimo do governante atual.\n$EFFECT_LIST_BULLET$Ser [vassal|lE]"
 confederation_elective_succession_law_effects: "O [ruler|lE] e todos os [vassals|lE] diretos podem nomear um [title_heir|lE] dentre eles e os [Concept( 'close_family', 'familiares cercanos' )|E] do governante. A [voting_strength|lE] é determinada principalmente por [prestige_level|lE], [piety_level|lE] e quantidade de [vassals|lE] de [title_tier|lE] [count|lE]."
 confederation_elective_electors: "$feudal_elective_electors$"
 confederation_elective_electors_tooltip: "Para ser um [elector|lE] válido na eletiva de confederação, um vassalo deve cumprir todas estas condições:\n$EFFECT_LIST_BULLET$ Ter [rank|lE] de [count|E] ou superior\n$EFFECT_LIST_BULLET$ Ser vassalo direto do [title|lE]\n$EFFECT_LIST_BULLET$ Ter um [government|lE] Tribal ou Nômade\n$EFFECT_LIST_BULLET$ Não ter o [trait|lE] [GetTrait('incapable').GetName( GetNullCharacter )|l]\n$EFFECT_LIST_BULLET$ Não estar em [war|lE] com o titular do [title|lE]"
 #TGP
 mandala_succession_law: "Sucessão Mandala"
 mandala_succession_law_subname: "Sucessão Mandala"
 mandala_succession_law_effects: "#high A $mandala_succession_law$ permite que seu filho mais velho herde seus [titles|lE].\n\nApós a sucessão, o novo governante terá que passar as [mandala_trials|El] para manter o controle de todo o senhorio e de seus [tributaries|El]#!.\n\n"
 celestial_appointment_succession_law: "Sucessão por Nomeação Celestial"
 celestial_appointment_succession_law_subname: "O Candidato com Maior Pontuação Herda"
 celestial_appointment_succession_law_effects: "\nA [succession|lE] baseia-se em [merit_level|lE] e nas [merit_pools|lE]\n\n#high Un tipo de [appointment_succession_law|lE]. Según la $celestial_appointment_succession_law$, la candidatura con la mayor [candidate_score|lE] heredará el [title|lE] y sus [holdings|lE] asociadas. Todo [adult|lE] del [realm|lE] puede luchar por conseguir una [governorship|lE] mediante distintos métodos, como tener un [merit_level|lE] significativo o gastar [influence|lE].#!\n\n"
