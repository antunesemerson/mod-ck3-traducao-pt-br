l_spanish:
 ### SETUP
 activity_debate: "Debate"
 activity_debate_plural: "Debates"
 activity_debate_destination_selection: "Você só pode realizar um $activity_debate$ em uma [capital|El] que pertença a você, ao [Concept('movement_leader', 'líder do seu movimento' )|E], ao seu [liege|lE] ou ao [GetTitleByKey('h_china').GetName]."
 activity_debate_selection_tooltip: "Realize um [GetActivityType('activity_debate').GetName|l] para disputar o poder político — assuma o controle para si ou para o seu movimento $activity_debate_host_rewards$"
 activity_debate_desc: "Mérito, influência, #EMP poder#!. Pouco importam se somos incapazes de apresentar argumentos válidos para nós e para nossa causa.\n\nOrganize um debate para convencer os outros de que você é digno de mais poder, ou desafie outro movimento para colocar o seu em uma posição mais favorável."
 activity_debate_host_desc: "$activity_debate_host_rewards$$activity_debate_guest_rewards$"
 activity_debate_host_rewards: "\n $BULLET_WITH_TAB$[movement_power|E] [movement_power_i]\n $BULLET_WITH_TAB$[influence|E] [influence_i|E]\n $BULLET_WITH_TAB$[merit|E] [merit_i|E]"
 activity_debate_guest_desc: "\n$BULLET_WITH_TAB$ Pode aumentar sua obtenção de [disciples|El]\n$BULLET_WITH_TAB$ Pode aumentar sua [trait_level_track_xp|E|l] de [GetTrait('confucian_education').GetName( GetNullCharacter )|l]"
 activity_debate_guest_rewards: "\n$BULLET_WITH_TAB$ Os participantes podem ganhar [trait_level_track_xp|lE] de [GetTrait('confucian_education').GetName( GetNullCharacter )|l]\n$BULLET_WITH_TAB$ Os participantes podem ganhar um [elder|lE]"
 debate_base_cost: "Custo base"
 activity_debate_predicted_cost: "Custo previsto"
 activity_debate_host_an_a: "um"
 # Province Selection
 activity_debate_province_kaifeng_palace_desc: "#P ++ $building_type_kaifeng_palace_01$#!"
 activity_debate_province_desc_leader_capital_desc: "#P + [capital|lE] de [GetSituation('dynastic_cycle').GetParticipantGroupByCharacter(host.Self).MakeScope.Var('movement_leader').Char.GetShortUIName|U] ([Concept('movement_leader', 'líder do seu movimento' )|E])#!"
 activity_debate_province_desc_liege_capital_desc: "#P + [capital|lE] de tu [liege|lE]#!"
 debate_location_validity_desc: "Não é uma [capital|E] que pertença a você, ao [Concept('movement_leader', 'líder do seu movimento' )|E] , ao seu [liege|lE] ou ao [GetTitleByKey('h_china').GetName]"
 ### TOOLTIPS
 activity_debate_guest_help_text: "Os [activity_guests|lE] que comparecerem observarão ou participarão do debate. Argumentos convincentes concedem [movement_power|El] ou retiram poder do outro movimento. Assistir aos debates é uma boa oportunidade para obter [merit|El] , aumentar seu [trait_level_track_xp|El] de [GetTrait('confucian_education').GetName( GetNullCharacter )|l] e potencialmente garantir um [elder|El]"
 reached_disciple_limit: "Você alcançou a quantidade máxima de discípulos"
 is_already_the_favored_movement: "[GetPlayer.Custom('GetMyMovementNoTooltip')] já é o [favored_movement|lE]"
 is_already_leader_and_favored_movement: "[GetPlayer.Custom('GetMyMovementNoTooltip')] já é o [favored_movement|lE] e [GetPlayer.GetShortUIName] [Select_CString(GetPlayer.IsLocalPlayer, 'eres', 'es')] [Select_CString(GetPlayer.IsFemale, 'la', 'el' )] [movement_leader|lE]"
 gained_many_disciples: "Ganhou [disciple_3.GetShortUIName|U][disciple_2.GetShortUIName] e [disciple_1.GetShortUIName|U] como [disciples|lE]"
 gained_few_disciples: "Conquistou [disciple_2.GetShortUIName|U] e [disciple_1.GetShortUIName] como [Concept('disciples',Select_CString(Or(disciple_2.IsFemale, disciple_1.IsFemale), 'discípulas', 'discípulos' ))|E]"
 gained_one_disciple: "Conquistou [disciple_1.GetShortUIName|U] como [Concept('disciple',Select_CString(disciple_1.IsFemale,'discípula', 'discípulo' ))|E]"
 gained_new_elder_tt: "Recebeu [guest.MakeScope.Var('new_elder').Char.GetFirstName] como ancião[guest.Custom('ES_OA')]"
 activity_window_character_honorary_guest_leader: "[Concept('movement_leader','Líder desafiado')|E]\n[Character.GetShortUINameNoTooltip|U]"
 ### GUEST INVITE RULES
 activity_invite_rule_debate_movement_members: "Membros de [GetPlayer.Custom('GetMyMovement')]"
 activity_invite_rule_debate_movement_other_members: "Membros de outro movimento"
 movement_leader_for_host: "Líder do movimento"
 movement_leader_desc_for_host: "Líder do [GetPlayer.Custom('GetMyMovement')] desafiado"
 movement_leader: "Líder do movimento desafiado"
 ACTIVITY_GUEST_IS_IMPERIAL_REASON: "A atividade é um $debate_type_favor$"
 ### PHASES
 debate_phase_discussion: "Preparação"
 debate_phase_discussion_desc: "Os salões de estudo ganham vida com discussões polidas, enquanto os debatedores tentam deduzir quais posições são as mais estratégicas."
 debate_phase_debate: "Debate"
 debate_phase_debate_desc: "Chegou a hora de debatermos de forma ordenada. Só a mente mais afiada prevalecerá."
 ### OPTIONS
 debate_type_leadership: "Debate sobre o $Movement$"
 debate_type_leadership_desc: "$EFFECT_LIST_BULLET$ Debate contra miembros de tu movimiento para ser el [movement_leader|lE]\n\n#weak Ya sea por ingenio o por astucia, yo estaré al mando.#!"
 debate_type_favor: "Debate imperial"
 debate_type_favor_desc: "$EFFECT_LIST_BULLET$ Debater outro movimento diante do [son_of_heaven|E] para tornar o [GetPlayer.Custom('GetMyMovementNoTooltip')] no [favored_movement|lE]\n\n#weak Um barco deve ser conduzido pela tripulação certa.#!"
 debate_option_books: "$adult_education_option_books$"
 debate_books_bad: "$adult_education_books_bad$"
 debate_books_bad_desc: "$EFFECT_LIST_BULLET$Coste de [gold|El] reducido\n\n#weak Llevo mis conocimientos allá donde voy. Solo aquellos que no están seguros de sus afirmaciones necesitan esconderse tras los argumentos de otros eruditos.#!"
 debate_books_normal: "Pergaminhos e notas"
 debate_books_normal_desc: "$EFFECT_LIST_BULLET$Éxito de la actividad aumentado ligeramente\n\n#weak Solo necesito los textos y comentarios esenciales para exponer mis argumentos.#!"
 debate_books_good: "$adult_education_books_good$"
 debate_books_good_desc: "$EFFECT_LIST_BULLET$ Sucesso da atividade aumentado\n\n#weak Trarei uma verdadeira fonte de conhecimento para impressionar os convidados e fundamentar meus argumentos.#!"
 debate_argument_major_decrease_desc: "#N #bold Reducción importante#!#! da sua #V probabilidad de éxito#!"
 debate_argument_moderate_decrease_desc: "#N Reducción moderada#! da sua #V probabilidad de éxito#!"
 debate_argument_moderate_increase_desc: "#P Aumento moderado#! de seu #V probabilidad de éxito#!"
 debate_argument_major_increase_desc: "#P #bold Aumento importante#!#! da sua #V probabilidad de éxito#!"
 tgp_dynastic_cycle_decision_event.crowd_approval_desc: "\n\nOs espectadores assentem."
 tgp_dynastic_cycle_decision_event.crowd_disapproval_desc: "\n\nOs espectadores balançam a cabeça em desaprovação."
 ### CONCLUSION
 activity_debate_conclusion_desc_leadership_winner: "O debate pela liderança de [GetPlayer.Custom('GetMyMovement')] terminou, com minha vitória declarada![GetPlayer.Custom('ES_OA')] como vencedor[GetPlayer.Custom('ES_XA')]!"
 activity_debate_conclusion_desc_leadership_loser: "Meus planos foram frustrados e [Activity.MakeScope.Var('challenged_movement_leader').Char.GetFirstNameNoTooltip] continua sendo [Activity.MakeScope.Var('challenged_movement_leader').Char.Custom('ES_ElLa')] líder da [GetPlayer.Custom('GetMyMovement')]."
 activity_debate_conclusion_desc_leadership_challenged_loser: "Declara-se [Activity.MakeScope.Var('debate_winner').Char.GetFirstNameNoTooltip] líder do movimento [GetPlayer.Custom('GetMyMovement')], apesar dos meus esforços."
 activity_debate_conclusion_desc_favor_winner: "O debate pelo favor [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip] terminou, com o [GetPlayer.Custom('GetMyMovement')] proclamado vencedor!"
 activity_debate_conclusion_desc_favor_loser: "Não tive sucesso em obter o favor [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip] para o [GetPlayer.Custom('GetMyMovement')]. Terei de me esforçar mais da próxima vez."
 debate_conclusion_fallback: "O [GetActivityType( 'activity_debate' ).GetName|l] chegou ao fim."
 # Rewards
 debate_become_movement_leader_reward_title: "Liderança tomada"
 debate_become_movement_leader_reward: "[debate_winner.GetShortUIName] [Select_CString(debate_winner.IsLocalPlayer, 'ganaste', 'ganó')] venceu o debate e [Select_CString(debate_winner.IsLocalPlayer, 'te convertiste', 'se convirtió')] em [debate_winner.Custom('ES_ElLa')] líder do [debate_winner.Custom('GetMyMovement')]"
 debate_remain_movement_leader_reward_title: "Liderança defendida"
 debate_remain_movement_leader_reward: "[debate_winner.GetShortUIName] [Select_CString(debate_winner.IsLocalPlayer, 'ganaste', 'ganó')] ganhou o debate e [Select_CString(debate_winner.IsLocalPlayer, 'sigues', 'sigue')] continuando [debate_winner.Custom('ES_ElLa')] líder do [debate_winner.Custom('GetMyMovement')]"
 debate_increase_movement_power_reward_title: "Movimento reforçado"
 debate_increase_movement_power_reward: "[movement_power|E] ganho"
 debate_loss_cost_title: "Debate perdido"
 debate_loss_cost: "Perdas"
 debate_host_rewards_title: "Debate realizado"
 debate_guest_rewards_title: "Compareceu a um debate"
 # Pulse Actions
 apa_movement_ridiculed_title: "[second.GetShortUIName|U] [Select_CString( second.IsLocalPlayer, 'ridicularizou', 'ridicularizou' )] o movimento de [Select_CString( first.IsLocalPlayer, 'seu personagem', first.GetShortUIName )]"
 apa_debate_brought_huangdi_gift_title: "$apa_brought_huangdi_gift_title$"
 apa_debate_entrant_disagreement_title: "$apa_entrant_disagreement_title$"
 apa_debate_found_disciple_title: "$apa_found_disciple_title$"
 apa_debate_fruitful_debate_title: "$apa_impressed_teacher_title$"
 DEBATE_PROGRESS_TITLE_TT: "#T Sentimento do Debate#!"
 DEBATE_PROGRESS_GENERAL_TT: "$DEBATE_PROGRESS_TITLE_TT$\nO debate é avaliado com base no desempenho de cada participante. Quem for capaz de influenciar os espectadores com mais eficiência terá mais chances de ser proclamado vencedor."
 DEBATE_PROGRESS_YOU_TT: "$DEBATE_PROGRESS_TITLE_TT$\nA probabilidade de que [Activity.MakeScope.Var('debate_contender').Char.GetShortUIName] [Activity.MakeScope.Var('debate_contender').Char.LocalPlayerString( 'ganes', 'gane' )] vença o debate"
 DEBATE_PROGRESS_OPPONENT_TT: "$DEBATE_PROGRESS_TITLE_TT$\nA probabilidade de que [Activity.MakeScope.Var('challenged_movement_leader').Char.GetShortUIName] [Activity.MakeScope.Var('challenged_movement_leader').Char.LocalPlayerString( 'ganes', 'gane' )] vença o debate e [Activity.MakeScope.Var('challenged_movement_leader').Char.LocalPlayerString( 'conserves', 'conserve' )] mantenha o poder"
 DEBATE_PROGRESS_MARKER_1_TT: "$DEBATE_PROGRESS_TITLE_TT$\n[Activity.MakeScope.Var('debate_contender').Char.GetShortUIName|U] [Activity.MakeScope.Var('challenged_movement_leader').Char.LocalPlayerString( 'ganarás', 'ganará' )]"
 DEBATE_PROGRESS_MARKER_2_TT: "$DEBATE_PROGRESS_TITLE_TT$\n[Activity.MakeScope.Var('debate_contender').Char.GetShortUIName|U] [Activity.MakeScope.Var('challenged_movement_leader').Char.LocalPlayerString( 'tienes', 'tiene' )] muchas probabilidades de ganar"
 DEBATE_PROGRESS_MARKER_3_TT: "$DEBATE_PROGRESS_TITLE_TT$\n[Activity.MakeScope.Var('debate_contender').Char.GetShortUIName|U] [Activity.MakeScope.Var('challenged_movement_leader').Char.LocalPlayerString( 'tienes', 'tiene' )] tem uma leve vantagem para vencer"
 DEBATE_PROGRESS_MARKER_4_TT: "$DEBATE_PROGRESS_TITLE_TT$\n[Activity.MakeScope.Var('debate_contender').Char.GetShortUIName|U] e [Activity.MakeScope.Var('challenged_movement_leader').Char.GetShortUIName] [Select_CString(Or(Activity.MakeScope.Var('debate_contender').Char.IsLocalPlayer, Activity.MakeScope.Var('challenged_movement_leader').Char.IsLocalPlayer), 'tenéis', 'tienen')] as mesmas chances de vencer"
 DEBATE_PROGRESS_MARKER_5_TT: "$DEBATE_PROGRESS_TITLE_TT$\n[Activity.MakeScope.Var('challenged_movement_leader').Char.GetShortUIName|U] [Activity.MakeScope.Var('challenged_movement_leader').Char.LocalPlayerString( 'tienes', 'tiene' )] tem uma leve vantagem para vencer"
 DEBATE_PROGRESS_MARKER_6_TT: "$DEBATE_PROGRESS_TITLE_TT$\n[Activity.MakeScope.Var('challenged_movement_leader').Char.GetShortUIName|U] [Activity.MakeScope.Var('challenged_movement_leader').Char.LocalPlayerString( 'tienes', 'tiene' )] tem muitas chances de vencer"
 DEBATE_PROGRESS_MARKER_7_TT: "$DEBATE_PROGRESS_TITLE_TT$\n[Activity.MakeScope.Var('challenged_movement_leader').Char.GetShortUIName|U] [Activity.MakeScope.Var('challenged_movement_leader').Char.LocalPlayerString( 'ganarás', 'ganará' )]"
