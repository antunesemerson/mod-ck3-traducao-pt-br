 # Coronation host is ded, notify guests
 ach_maintenance_events.0100.t: "A morte [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip]"
 ach_maintenance_events.0100.desc: "[host.GetName] [host.GetDeathReason] na véspera de sua ascensão ao trono. Pouco me resta fazer além de reunir minha comitiva e partir."
 ach_maintenance_events.0100.a: "Que [ROOT.Char.GetFaith.HighGodName] tenha piedade de [host.GetPrimaryTitle.GetNameNoTooltip]."
 ach_maintenance_events.0101.t: "[host.GetTitleAsNameNoTooltip|U] virou prisioneiro[host.Custom('ES_OA')]" #Coronation host has been imprisoned, notify guests
 ach_maintenance_events.0101.desc: "Às vésperas de sua ascensão ao trono, [host.GetName] foi aprisionad[host.Custom('ES_OA')] por [gaoler.GetName]. Os detalhes desse ato ousado ainda são desconhecidos; as intenções de [host.Custom('ES_OA')] com seu recém-adquirid[host.Custom('ES_OA')] prisioneiro continuam igualmente envoltas em mistério. Pouco me resta fazer além de reunir minha comitiva e partir."
 ach_maintenance_events.0101.a: "$ach_maintenance_events.0100.a$"
 ach_maintenance_events.0102.t: "$ach_maintenance_events.0101.t$" #Coronation host has been imprisoned, notify host and cancellation
 ach_maintenance_events.0102.desc: "Essa espécie de [ROOT.Char.Custom('InsultNoun')] [ROOT.Char.Custom('InsultAdjective')], [gaoler.Custom('GetDaughterSon')] de [ROOT.Char.Custom('InsultNounPlural')] de coração [ROOT.Char.Custom('InsultAdjective')] me aprisionou durante #EMP mi propia coronación#!. A cerimônia foi cancelada e meu destino é incerto."
 ach_maintenance_events.0102.a: "$ach_maintenance_events.0100.a$"
 ach_maintenance_events.0103.t: "A solidão [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip]" #No one shows up, notify host
 ach_maintenance_events.0103.desc: "Ninguém compareceu à minha coroação! Sem meus súditos testemunhando minha ascensão, eu sou apenas [host.GetTitleAsNameNoTooltip] para mim mesmo e para meu delírio.\n\nPreciso cancelar as cerimônias. Este insulto não será esquecido."
 ach_maintenance_events.0103.a: "$ach_maintenance_events.0100.a$"
 ach_maintenance_events.0104.t: "Morte do oficiante" #Officiator ded, host cancelled the coronation, notify guests
 ach_maintenance_events.0104.desc: "[officiator.GetName], que iria oficiar a coroação, [officiator.GetDeathReason] na véspera da ascensão ao trono de [host.GetName]. Aflig[host.Custom('ES_OA')] pela tristeza, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] cancelou a coroação. Pouco me resta fazer além de reunir meu séquito e partir."
 ach_maintenance_events.0104.a: "$ach_maintenance_events.0100.a$"
 ach_maintenance_events.0105.t: "A excomunhão [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip]" #Host excommunicated, notify guests
 ach_maintenance_events.0105.desc: "Em sua infinita sabedoria e guiado[hof.Custom('ES_OA')] pela vontade divina de [hof.GetFaith.HighGodNamePossessive], [hof.GetName] decidiu excomungar [host.GetName] na véspera de sua ascensão ao trono. Pouco me resta fazer além de reunir minha comitiva e partir."
 ach_maintenance_events.0105.a: "$ach_maintenance_events.0100.a$"
 ach_maintenance_events.0106.t: "$ach_maintenance_events.0105.t$" #Host excommunicated, notify host
 ach_maintenance_events.0106.desc: "Essa espécie de [ROOT.Char.Custom('InsultNoun')] [ROOT.Char.Custom('InsultAdjective')], [hof.Custom('GetDaughterSon')] de [ROOT.Char.Custom('InsultNounPlural')] de coração [ROOT.Char.Custom('InsultAdjective')] #EMP me#! me excomungou. Na véspera da minha unção! Não foi a vontade divina de [hof.GetFaith.HighGodNamePossessive] , mas os sussurros de [ROOT.Char.GetFaith.DevilNamePossessive] que [hof.GetHerHim] o guiaram neste ato insultante e blasfemo.\n\nDevo cancelar as cerimônias. Não esquecerei este insulto."
 ach_maintenance_events.0106.a: "$ach_maintenance_events.0100.a$"
 coronation_events.1034.t: "Fios Cerimoniais"
 coronation_events.1034.desc: "\"Então [host.Custom('ES_ElLa')] [host.GetTitleAsName|l] se atreve a vestir [detractor.Custom('RegionalFabric')] de [detractor.Custom('GetComplexColor')]?\", murmura [detractor.Custom2('MyCharacterIntroduction', ROOT.Char)] estreitando os olhos. \"Essas cores são reservadas à virtude e ao status — não à vaidade. Se eu usasse tal tom sem autorização, enfrentaria censura\".\n\n\"Censura?\", intervém [supporter.Custom2('MyCharacterIntroduction', ROOT.Char)]. \"Essa vestimenta é autorizada. Ela honra ritos mais antigos que os de nossos bisavós. Harmonia, equilíbrio, governo legítimo... isto não é vaidade, mas legitimidade\".\n\nSuas palavras cortam o ar, em tom baixo, mas carregadas de tensão. Olho para as próprias mangas. A decisão final ainda é minha... mas agora me pergunto: o que ela proclamará quando eu entrar no salão?"
 coronation_events.1034.a: "Meus trajes ofuscarão os de [host.GetTitledHouseNameOrFirstName]!"
 coronation_events.1034.a.tt: "[host.GetTitledHouseNameOrFirstName] decidirá as consequências desta escolha."
 coronation_events.1034.b: "Usarei as cores de [host.GetTitledHouseNameOrFirstName] como uma demonstração silenciosa de lealdade."
 coronation_events.1034.c: "Vestirei o que os ritos prescreverem."
 coronation_events.1034.d: "Deixem-me ecoar a paleta da capital."
 coronation_events.1035.t: "A tonalidade proibida"
 coronation_events.1035.desc: "Quando apareceu [offending_guest.Custom2('MyCharacterIntroduction', ROOT.Char)], os murmúrios surgiram imediatamente. Suas vestes — luxuosas, brilhantes e acima de sua posição — fizeram mais do que quebrar o costume. Envergaram a lei.\n\n[offending_guest.GetFirstNameNoTooltip] se aproxima de mim com um sorriso petulante. “O que acha, [ROOT.Char.Custom('FormOfAddressForLiege')]?”."
 coronation_events.1035.a: "Que desfrute do seu momento."
 coronation_events.1035.a.toast: "[host.GetTitledHouseNameOrFirstName] ignorou a transgressão"
 coronation_events.1035.b: "Sua infração não passará despercebida."
 coronation_events.1035.b.toast: "[host.GetTitledHouseNameOrFirstName] se sentiu ofendido"
 coronation_events.1035.c: "Falarei com [offending_guest.GetSheHe] em particular. Um aviso pode bastar."
 coronation_events.1035.c.toast: "[host.GetTitledHouseNameOrFirstName] fez um aviso em particular"
 coronation_events.1036.t: "Versos à Mesa"
 coronation_events.1036.china.desc: "Flui o vinho de [host.Custom('GetExpensiveDrink_Singular')], as taças tilintam e o salão fervilha de risos até que uma voz ressoa com clareza.\n\n“Transformemos este banquete em versos”, declara [verse_initiator.Custom2('MyCharacterIntroduction', ROOT.Char)] , após terminar um [Glossary('lüshi', 'GLOSS_LUSHI')] refinado em louvor a [host.Custom2('MyCharacterIntroduction', ROOT.Char)]. “Tais competições testam nosso [Glossary('wen', 'CONFUCIAN_WEN')], como os eruditos costumam demonstrar.”\n\nA companhia se agita — alguns ansiosos para exibir seu conhecimento, outros receosos das farpas ocultas nos versos."
 CONFUCIAN_WEN: "Refere-se ao refinamento culto, ao poder civilizador da literatura, do ritual e da eloquência no pensamento chinês."
 GLOSS_LUSHI: "É uma forma de poesia regulada, com padrões tonais rigorosos e paralelismo. Dominar o lüshi é uma marca de erudição culta."
 coronation_events.1036.japan.desc: "O aroma perfumado de [host.Custom('GetExpensiveDrink_Singular')] e o farfalhar dos tecidos de [host.Custom('RegionalFabric')] enchem o salão, quando uma voz se ergue com graça deliberada.\n\n\"Não deveríamos compor versos para este encontro?\" propõe [verse_initiator.Custom2('MyCharacterIntroduction', ROOT.Char)], recitando um [Glossary('waka', 'GLOSS_waka')] em honra de [host.Custom2('MyCharacterIntroduction', ROOT.Char)]. \"Tais poemas revelam o [Glossary('miyabi', 'JAPANESE_MIYABI')] do coração, como bem sabem os cortesãos.\"\n\nSorrisos passam entre os convidados — pois um poema pode elogiar, ou pode ferir com sutileza e perspicácia."
 JAPANESE_MIYABI: "Refere-se à elegância e ao refinamento cortesão, um ideal de beleza e sensibilidade central na cultura aristocrática japonesa."
 GLOSS_WAKA: "É uma forma poética de 31 sílabas (5-7-5-7-7), popular entre a nobreza japonesa."
 coronation_events.1036.korea.desc: "À medida que o banquete avança, as taças de [host.Custom('GetExpensiveDrink_Singular')] se erguem bem alto e as risadas enchem o salão. Então, uma voz pede silêncio.\n\n“Ofereçamos versos em honra de [Select_CString( host.IsFemale, 'la anfitriona', 'el anfitrión' )]”, declara [verse_initiator.Custom2('MyCharacterIntroduction', ROOT.Char)], ao completar um dístico digno que exalta [host.Custom2('MyCharacterIntroduction', ROOT.Char)]. “Assim, mostramos [Glossary('mun', 'KOREAN_MUN')], o aprendizado refinado que os sábios prezam”.\n\nAlguns assentem em concordância, outros se enrijecem — pois nem todo verso é mero elogio."
 KOREAN_MUN: "Refere-se ao refinamento literário e ao aprendizado, uma marca de erudição entre os nobres."
 coronation_events.1036.desc: "À medida que o banquete avança, uma voz, confiante e graciosa, ergue-se acima do burburinho.\n\n“Compartamos todos um verso”, proclama [verse_initiator.Custom2('MyCharacterIntroduction', ROOT.Char)] após uma recitação refinada em honra de [host.Custom2('MyCharacterIntroduction', ROOT.Char)]. “Na poesia, revelamos o que prezamos — seja virtude, ordem ou esplendor”.\n\nUm murmúrio percorre o salão. Nem toda poesia é bajulação; algumas palavras têm gume mais afiado."
 coronation_events.1036.a: "\"Igualarei o tom e elogiarei [host.Custom('ES_AlAla')] [host.GetTitledFirstName|l] e sua [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]\"."
 coronation_events.1036.b: "\"Tenho uma frase em mente… um eco penetrante do lamento de um antigo mestre\"."
 coronation_events.1036.c: "Que minhas palavras sejam elegantes e apropriadas; um verso formal, por pura formalidade."
 coronation_events.1036.d: "\"A composição de [verse_initiator.GetFirstNameNoTooltip] foi encantadora. Farei com que isso se saiba\"."
 coronation_events.1036.e: "\"Houve falhas. Vou oferecer algumas sugestões gentis\"."
 coronation_events.1037.t: "[ROOT.Char.GetFaith.HighGodName|U] fala"
 coronation_events.1037.desc: "Um murmúrio baixo ressoa pela corte. Acabam de relatar o acontecimento de [omen_happening.GetNameNoTooltip]. As línguas se agitam como se [ROOT.Char.GetFaith.HighGodName] tivesse falado em pessoa.\n\nCom um olhar de preocupação, [skeptical_guest.Custom2('MyCharacterIntroduction', ROOT.Char)] se inclina: \"As notícias se espalham rapidamente, [ROOT.Char.Custom('FormOfAddressForLiege')]. Muitos aqui estão perturbados. Pergunto-me se [ROOT.Char.GetFaith.HighGodName] envia um aviso\"."
 coronation_events.1037.a: "\"Os que vieram antes de mim suportaram coisas piores\"."
 coronation_events.1037.b: "\"Que [respected_elder.Custom('ES_ElLa')] [respected_elder.GetTitledFirstNameNoTooltip|l] fale\"."
 coronation_events.1037.c: "\"Fora com esse espalhador de medo!\""
 coronation_events.1037.d: "[ROOT.Char.GetFaith.HighGodName|U] se agita, mas seguiremos adiante."
 coronation_events.1038.t: "Sacrifício aos Quatro Altares"
 coronation_events.1038.desc: "Segundo a tradição, o Filho do Céu deve se encarregar da realização de uma série de sacrifícios, tal como fez o primeiro huangdi antes de subir aos céus como imortal.\n\nLembro-me dessa história enquanto assumo meu lugar diante dos quatro altares do céu, da terra, do trono imperial e dos deuses da agricultura, conforme [rite_official.Custom2('MyCharacterIntroduction', ROOT.Char)] continua com as tarefas mais humildes. O aroma do incenso queima meu nariz e consigo sentir uma presença divina apoiando esta cerimônia."
 coronation_events.1038.a: "Zombar da impropriedade de [rite_official.GetFirstNameNoTooltip]."
 coronation_events.1038.b: "\"[rite_official.GetFirstNameNoTooltip], por favor, junte-se a mim\"."
 coronation_events.1038.c: "Faça um grande sacrifício, um digno de ser lembrado."
 coronation_events.1038.d: "\"Que este sacrifício traga honra à Casa [ROOT.Char.GetDynastyNameNoTooltip]!\"."
 coronation_events.1038.e: "\"Que o céu e a terra guiem minha mão rumo à virtude…\""
 coronation_events.1038.e.flavor: "E que esta terra seja abençoada nesta era e nas que hão de vir."
 coronation_events.1039.t: "Uma súplica aos deuses"
 coronation_events.1039.desc: "Sei que, para que minha ascensão ao trono seja verdadeiramente bem-sucedida, espera-se que eu compartilhe comida e palavras com os deuses no [Glossary('daijō-sai', 'DAIJO_SAI')].\n\nCom [supporter.Custom2('MyCharacterIntroduction', ROOT.Char)] ao meu lado, avanço em direção ao altar, preparando-me para fazer o apelo público. \"Não se preocupe, [ROOT.Char.Custom('FormOfAddressForLiege')]\", diz [supporter.GetSheHe]. \"Tenho certeza de que suas palavras ecoarão as necessidades do reino\".[supporter.Custom('ES_OA')] de que suas palavras ecoarão as necessidades do reino\"."
 DAIJO_SAI: "Uma cerimônia que ocorre após a entronização do Imperador do Japão, em um palácio construído para esse propósito específico e demolido logo após a conclusão da cerimônia. Depois de um período de autopurificação, o Imperador faz uma oferenda aos kami e dela participa ele mesmo."
 coronation_events.1039.a: "Faço um apelo pelo bem dos meus súditos leais."
 coronation_events.1039.b: "Minha prece é para que [ROOT.Char.GetFaith.HighGodName|U] dê testemunho da minha glória!"
 coronation_events.1039.c: "Serei imprecis[ROOT.Char.Custom('ES_OA')] e amb?gu[ROOT.Char.Custom('ES_OA')]."
 coronation_events.1039.d: "Desenrolo um pergaminho com um poema piedoso."
 coronation_events_1039_poem_name: "Comunhão abençoada"
 coronation_events_1039_poem_desc: "Um poema magistral e piedoso criado por [owner.GetTitledHouseNameOrFirstName] em honra aos kami em sua própria coroação."
 coronation_events.1039.d.tt: "Você receberá um [artifact|El] de poesia"
 coronation_events.1039.d.flavor: "Em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] floresce uma flor solitária…"
 coronation_events.1040.t: "Uma lição sobre a transitoriedade"
 coronation_events.1040.desc: "\"Como vão os preparativos para o mandala, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]?\", perguntou [tributary_1.Custom2('MyCharacterIntroduction', ROOT.Char)] em tom sério. É costume criar um [Glossary('mandala de arena', 'GLOSS_MANDALA')] em honra [Select_CString(ROOT.Char.IsFemale, 'da nova', 'do novo' )] [ROOT.Char.GetTitleAsNameNoTooltip|l], apenas para que seja destruído imediatamente após os ritos adequados.\n\nO assunto tem estado continuamente na minha cabeça, pois o rito é bastante simbólico, mas que uma obra de arte tão bela seja destruída depois parece quase… um desperdício."
 GLOSS_MANDALA: "Monges treinados para isso criam cuidadosamente mandalas de areia, que depois são destruídas ritualmente para transmitir a impermanência. Cada um retrata uma divindade ou qualidade divina em seu núcleo, cercado por imagens harmonizadoras, refletindo como um reino mandala se organiza."
 coronation_events.1040.special: "Ordene que o mandala de tal [ROOT.Char.GetFaith.HouseOfWorship] seja trazido aqui."
 coronation_events.1040.a: "\"Nenhuma despesa será poupada para o meu sinal divino!\"."
 coronation_events.1040.b: "\"Tornem isso significativo, mas simples\"."
 coronation_events.1040.c: "\"Tais [ROOT.Char.GetFaith.HouseOfWorshipPlural] podem poupar os recursos. Eu não\"."
