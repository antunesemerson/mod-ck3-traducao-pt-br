l_spanish:
 ### Events
 # Flavor
 coronation_events.1000.t: "Burla atormentadora"
 coronation_events.1000.low_county_opinion.desc: "Um[bard.Custom('ES_XA')] bardo observa todos os reunidos com um sorriso irônico.\n\n\"Esta canção é dedicada a [ROOT.Char.GetName], em nome do povo de [ROOT.Char.GetCurrentLocation.GetName]. Seu título é \"Ó, [ROOT.Char.GetTitledFirstNameNoTooltip|l], amado de nossos corações!\"\".\n\nA melodia é animada, mas, à medida que avança, percebo um brilho de malícia nos olhos de [bard.Custom('ES_DelDela')] cantor… e as risadas contidas de vários convidados.\n\nAmado, de fato…"
 coronation_events.1000.rival.desc: "Entre a farra, vejo meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('rival'))], [rival.GetName], entregando moedas a um[bard.Custom('ES_XA')] menestrel. Momentos depois, [bard.Custom('ES_ElLa')] artista proclama.\n\n\"Esta composição é um presente de [rival.GetNameNoTooltip] para seu querid[ROOT.Char.Custom('ES_OA')] amig[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetName]! Chama-se \"[ROOT.Char.GetFirstNameNoTooltip], o [ROOT.Char.Custom('InsultNoun')]!\"\".\n\nProcuro na multidão e lá está [rival.GetFirstNameNoTooltip], com o rosto tomado por uma alegria [rival.Custom('InsultAdjective')]. A canção, infelizmente, é uma melodia bastante animada."
 coronation_events.1000.tyrant.desc: "Um[bard.Custom('ES_XA')] trovador, com o rosto corado em desafio, dá um passo à frente e começa uma balada:\n\n\"Eis [ROOT.Char.GetName], o Punho de Ferro!\"\n\nCada verso ácido, salpicado de elogios mordazes, ecoa pelo salão. Eu cerro os dentes enquanto a melodia zombeteira cresce, retratando meu governo como nada mais que uma tirania mesquinha."
 coronation_events.1000.desc_fallback: "[bard.Custom('ES_ElLa')|U] o jogral termina uma melodia arrebatadora com um floreio e então proclama:\n\n\"Esta canção é dedicada a [ROOT.Char.GetName], intitula-se \"[ROOT.Char.GetFirstNameNoTooltip], espécie de [ROOT.Char.Custom('InsultNoun')]!\"\".\n\nO silêncio cai sobre o salão; em seguida, risadas se espalham entre o público. A melodia é surpreendentemente vibrante."
 coronation_events.1000.bribe: "Melhor pagar por uma canção que me elogie."
 coronation_events.1000.epic_rap_battle: "Minha sagacidade será meu traje!"
 coronation_events.1000.epic_rap_battle.tt.success: "Você consegue conquistar o público"
 coronation_events.1000.epic_rap_battle.tt.failure: "Você se envergonha na sua tentativa de ganhar a coroa"
 coronation_events.1000.guards: "Guardas, prendam esse [bard.Custom('InsultNoun')|l]!"
 coronation_events.1002.t: "Onde está?"
 coronation_events.1002.desc: "Embora seja famosa por muitas coisas, minha casa não é conhecida por sua organização. O antecâmara fervilha com desculpas sussurradas enquanto os servos se atrapalham com vestes e preparativos de última hora. Supérfluo. Os objetos mais preciosos e importantes certamente estão em segurança, como minha coroa. Espere.\n\nOnde está minha coroa?!"
 coronation_events.1002.rival.desc: "Momentos antes da coroação, procuro minha coroa — e ela sumiu! O pânico toma conta de mim ao ver meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('rival'))] [rival.GetName] de pé em um canto; seu olhar vagueia pelo estande vazio, e aquele meio sorriso [rival.Custom('InsultAdjective')] me desafia a acusar[rival.GetHerHim].\n\nAo meu lado, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('helper'))] [helper.GetName] avança ao notar a situação alarmante. Não há tempo para dúvidas — preciso agir!"
 coronation_events.1002.find: "É hora de organizar esta bagunça!"
 coronation_events.1002.counterfeit: "Felizmente, era só uma cópia."
 coronation_events.1002.hold: "Bando de desgraçados! Vou mandar vocês serem açoitados por isso!"
 coronation_events.1002.accuse: "Agora você realmente aprontou, seu[rival.Custom('InsultNoun')|l] [rival.Custom('InsultAdjective')]!"
 coronation_events.1002.accuse.flavor: "Tome isto!"
 coronation_events.1002.friend: "Por sorte, tenho [helper.GetFirstNameNoTooltip] ao meu lado."
 coronation_events.1004.t: "Um sussurro no banquete"
 coronation_events.1004.desc: "Em voz baixa, [confidant.Custom2('MyCharacterIntroduction', ROOT.Char)][SCOPE.sC('confidant')] e eu falamos sobre confidências compartilhadas, longe da multidão. Quando [confidant.GetFirstNameNoTooltip] diz abertamente que [secret_to_reveal.Custom('SecretDescriptionThirdPerson')], vejo um[spy.Custom('ES_XA')] [spy.GetWomanMan] misterios[spy.Custom('ES_OA')] inclinad[spy.Custom('ES_OA')] em nossa direção, tentando captar cada palavra.\n\nQuem sabe que maldades ele espera realizar. Não deve saber disso. Tal violação não seria tolerada."
 coronation_events.1004.bribe: "\"Quanto pelo seu silêncio?\""
 coronation_events.1004.recruit: "\"Eu poderia usar alguém como você…\""
 coronation_events.1004.intimidation: "#EMP [spy.GetHerHim|U] miro con intención homicida.#!"
 coronation_events.1004.intimidation.tt.success: "Sua exibição aterradora aterroriza [spy.Custom('ES_AlAla')] [spy.GetTitledFirstNameNoTooltip|l]"
 coronation_events.1004.intimidation.tt.failure: "Suas ameaças não abalam [spy.Custom('ES_AlAla')] [spy.GetTitledFirstNameNoTooltip|l]"
 coronation_events.1004.guards: "Arrastrem esta espécie de [spy.Custom2('InsultNoun')] para os calabouços!"
 coronation_events.1004.opt-out: "\"Isso não é da minha conta\"."
 coronation_events.1007.t: "Uma questão de precedência"
 coronation_events.1007.desc: "Quando a procissão está prestes a começar, ouço meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('first_guest'))], [first_guest.GetFirstName] e meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('second_guest'))] [second_guest.GetFirstName] discutindo sobre quem liderará a entrada na cerimônia.\n\nSua discussão ecoa por toda a antessala; um[first_guest.Custom('ES_OA')] insiste em que, por ser a pessoa mais [first_guest.Custom('ComplimentAdjective')], merece mais; enquanto [Select_CString( second_guest.IsFemale, 'la otra', 'el otro' )] afirma que deve caber à figura mais [second_guest.Custom('ComplimentAdjective')].\n\nSem dúvida, estou lisonjeado."
 coronation_events.1007.guest.desc: "Estou no limiar, pronto para liderar a procissão da coroação, quando [second_guest.GetFirstName] se adianta e zomba.\n\n“Meu serviço à coroa exige que eu tenha precedência!”\n\nSeu desafio grosseiro perturba a santidade dos nossos preparativos."
 coronation_events.1007.bigger: "Por favor, [second_guest.GetFirstNameNoTooltip], fique à vontade."
 coronation_events.1007.demand: "É meu direito, pois não há ninguém mais [first_guest.Custom('ComplimentAdjective')] que eu!"
 coronation_events.1007.appease: "Vamos, vamos discutir uma solução…"
 coronation_events.1007.first_guest: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('first_guest'))] será o primeiro!"
 coronation_events.1007.second_guest: "[second_guest.GetFirstNameNoTooltip], você conquistou este direito."
 coronation_events.1007.opt_out: "Por que eu deveria me envolver?"
 coronation_events.1011.t: "Pesada é a coroa"
 coronation_events.1011.desc: "No silêncio que precede minha coroação, os funcionários revelam o artefato de [ancestor_artifact.GetName]! Seu brilho canta os triunfos dos meus antepassados.\n\nRecordo-me de meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('previous_holder'))], [previous_holder.Custom('ES_ElLa')] [previous_holder.GetTitledFirstNameRegnal|l], cuja maestria em [previous_holder.Custom('education_focus')] moldou seu reinado abençoado. Assim também será com meu próprio reinado, marcado por feitos em [ROOT.Char.Custom('education_focus')]. Por sua vez, minhas façanhas imbuirão meu [ancestor_artifact.GetName] e, desse modo, ele entoará novas canções, em um tema de confiança."
 coronation_events.1011.refit: "Serei eu quem forjará minha reputação."
 coronation_events.1011.previous: "Este artefato honra o legado de [previous_holder.GetFirstNameNoTooltipRegnal]."
 coronation_events.1011.root_reward.tt: "#weak O novo [modifier|lE] de [skill|El] do [artifact|lE] deriva do tipo de [education|lE]#!"
 coronation_events.1011.previous_reward.tt: "Permitir que a coroa mantenha seu propósito anterior reforçará o artefato com modificadores que honrem a educação do seu predecessor."
 artifact_monthly_diplomacy_lifestyle_xp_1_modifier: "Experiência mensal de estilo de vida diplomático"
 artifact_monthly_diplomacy_lifestyle_xp_2_modifier: "Experiência mensal de estilo de vida diplomático"
 artifact_monthly_diplomacy_lifestyle_xp_3_modifier: "Experiência mensal de estilo de vida diplomático"
 artifact_monthly_diplomacy_lifestyle_xp_4_modifier: "Experiência mensal de estilo de vida diplomático"
 artifact_monthly_martial_lifestyle_xp_1_modifier: "Experiência mensal de estilo de vida marcial"
 artifact_monthly_martial_lifestyle_xp_2_modifier: "Experiência mensal de estilo de vida marcial"
 artifact_monthly_martial_lifestyle_xp_3_modifier: "Experiência mensal de estilo de vida marcial"
 artifact_monthly_martial_lifestyle_xp_4_modifier: "Experiência mensal de estilo de vida marcial"
 artifact_monthly_stewardship_lifestyle_xp_1_modifier: "Experiência mensal de estilo de vida em Tesouraria"
 artifact_monthly_stewardship_lifestyle_xp_2_modifier: "Experiência mensal de Tesouraria de estilo de vida"
 artifact_monthly_stewardship_lifestyle_xp_3_modifier: "Experiência mensal de estilo de vida da Tesouraria"
 artifact_monthly_stewardship_lifestyle_xp_4_modifier: "Experiência mensal de Tesouraria de estilo de vida"
 artifact_monthly_intrigue_lifestyle_xp_1_modifier: "Experiência mensal de estilo de vida de intriga"
 artifact_monthly_intrigue_lifestyle_xp_2_modifier: "Experiência mensal de estilo de vida de intriga"
 artifact_monthly_intrigue_lifestyle_xp_3_modifier: "Experiência mensal de estilo de vida de intriga"
 artifact_monthly_intrigue_lifestyle_xp_4_modifier: "Experiência mensal de estilo de vida de intriga"
 artifact_monthly_learning_lifestyle_xp_1_modifier: "Experiência mensal de estilo de vida de aprendizagem"
 artifact_monthly_learning_lifestyle_xp_2_modifier: "Experiência mensal de estilo de vida de aprendizado"
 artifact_monthly_learning_lifestyle_xp_3_modifier: "Experiência mensal de experiência de vida de Aprendizado"
 artifact_monthly_learning_lifestyle_xp_4_modifier: "Experiência mensal de XP de estilo de vida de Aprendizado"
 coronation_events.1012.t: "Uma Porção Crua"
 coronation_events.1012.guest.desc: "Chega o prato principal: este prato de resistência será lembrado pela nata da sociedade!\n\nQuando [Select_CString(host.IsFemale, 'nuestra anfitriona', 'nuestro anfitrión' )] corta a carne, a fome que sentia se transforma em cinzas em minha boca, pois o assado jorra sangue por toda a mesa. O banquete se torna um campo de batalha. Luto contra a ânsia de vomitar enquanto sussurros de nojo surgem ao meu redor."
 coronation_events.1012.host.desc: "Chega o prato principal: este prato de resistência será lembrado pela flor e nata!\nC\nQuando corto uma porção de [guest.Custom('GetExpensiveMeal')], a fome que eu sentia se transforma em cinzas na minha boca, pois o assado derrama sangue por toda a mesa. O banquete se transforma em um campo de batalha. Luto contra a ânsia de vomitar enquanto murmúrios de nojo surgem ao meu redor.\n\nEnquanto me pergunto se deveria ter gasto mais com a comida, vejo [guest.GetName] afastar o prato em horror — é preciso agir rápido!"
 coronation_events.1012.eat_it: "Você vai comer isso, e vai gostar!"
 coronation_events.1012.back: "!Serviçal! Leve isto de volta para a cozinha!"
 coronation_events.1012.trend: "O que você quer dizer? É a última moda!"
 coronation_events.1012.complain: "[host.GetTitledFirstNameNoTooltip], isso é uma piada?"
 coronation_events.1012.munch: "A mim me parece que está bem!"
 coronation_events.1013.t: "Uma noite ardente"
 coronation_events.1013.guest.desc: "A farra dos meus companheiros convidados traz um sorriso ao meu rosto. Dou uma risada contida quando sua algazarra barulhenta os faz cair uns sobre os outros.\n\n Um gesto lascivo de repente derruba uma tocha solta, e ela se arremessa contra as cortinas!\n\nAs chamas saltam pelas paredes enquanto os convidados gritam e se espalham. Eu me jogo em busca de proteção, o coração disparado, enquanto o salão logo fica tomado por fumaça e pânico."
 coronation_events.1013.host.desc: "Sufoco o riso quando a folia ruidosa dos meus convidados os faz cair uns sobre os outros.\n\nUm gesto obsceno derruba de repente uma tocha, e ela voa até as cortinas! As chamas sobem pelas paredes enquanto os convidados gritam e se dispersam.\n\nDistraíd[guest.Custom('ES_OA')] por seu [guest.Custom('GetExpensiveDrink_Singular')], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))] [guest.GetName] não percebeu o incêndio. Preciso agir rapidamente!"
 coronation_events.1013.burn: "Bem. Que arda."
 coronation_events.1013.run: "Como eu saio daqui!?"
 coronation_events.1013.hero: "Vou manter o fogo longe! Por aqui!"
 coronation_events.1013.snuff_out: "Com apenas cortar o fornecimento de ar…"
 coronation_events.1013.douse: "Joguem um barril de [ROOT.Char.Custom('RegionalDrink')] para apagar o fogo!"
 coronation_events.1014.t: "Alimentando o pânico"
 coronation_events.1014.guest.desc: "Ao me deliciar com meu suntuoso prato de [guest.Custom('GetExpensiveMeal')], ergo a cabeça ao ouvir gritos de indignação.\n\nParece que [Select_CString(host.IsFemale, 'nuestra anfitriona', 'nuestro anfitrión' )] não calculou comida suficiente para todos os convidados. Os nobres brandem pratos vazios, e seu orgulho ferido dá origem a palavras duras e cotoveladas ainda mais duras. Desvio de uma saraivada de insultos enquanto os dignitários ofendidos disputam as sobras.\n\n[guest.GetName] fica pres[guest.Custom('ES_OA')] no meio da confusão."
 coronation_events.1014.host.desc: "Enquanto me deliciava com meu suntuoso [guest.Custom('GetExpensiveMeal')], ergo os olhos ao ouvir gritos de indignação.\n\nParece que deixei de calcular comida suficiente para todos os meus convidados. Os lordes brandem pratos vazios, seu orgulho ferido dá origem a palavras duras e cotoveladas ainda mais duras. Desvio de uma saraivada de insultos enquanto os dignitários ofendidos disputam as sobras.\n\n[guest.GetName] fica pres[guest.Custom('ES_OA')] no meio da confusão."
 coronation_events.1014.join: "Tirem as mãos! A última porção é minha!"
 coronation_events.1014.calm: "Domai esses tolos!"
 coronation_events.1014.run: "Já estou farto dessa farsa!"
 coronation_events.1015.t: "Um brinde abençoado"
 coronation_events.1015.desc: "Um silêncio reverente cai quando o cântico do coro termina; uma aura de santidade se espalha pelo salão. Minha reputação de [GetPietyLevelName(ROOT.Char.GetPietyLevel)|Ll] parece evocar meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))] , [guest.GetName] , que se ergue e proclama com sincero fervor:\n\n“Que a luz de [ROOT.Char.GetFaith.DivineRealm] ilumine vosso reinado, e que [ROOT.Char.GetFaith.HighGodName] guie vosso caminho! Que [ROOT.Char.GetFaith.CreatorName] vos conceda sabedoria, e que [ROOT.Char.GetFaith.DevilName] jamais obscureça vossa porta!”"
 coronation_events.1015.divine: "Louvemos a [ROOT.Char.GetFaith.HighGodName]!"
 custom.every_zealous_attending_character: "Todo personagem assistente [GetTrait('zealous').GetName( GetNullCharacter )]"
 coronation_events.1015.cherish: "Você é muito gentil, [guest.GetFirstNameNoTooltip]!"
 coronation_events.1015.hush: "Concordo. Agora, silencie-se."
 coronation_events.1016.t: "Erguer a taça"
 coronation_events.1016.desc: "O salão fica em silêncio. Meus convidados prendem a respiração, aguardando que eu fale. Ergo a taça e meu olhar se volta para meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))] , [guest.GetFirstName] , um ser tão [guest.Custom('InsultAdjective')] , e minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest_2'))] , [guest_2.GetFirstName] , igualmente [guest_2.Custom('InsultAdjective')].\n\nEu os cobriria de elogios melosos que atiçariam seu orgulho, ou proporia um brinde envenenado que lhes lembraria exatamente quem detém o poder aqui?"
 coronation_events.1016.great: "\"Ouçam minhas palavras, pois são verdadeiras!\""
 coronation_events.1016.great.tt.success: "Você consegue conquistá-los[Select_CString(And(guest.IsFemale, guest_2.IsFemale),'las','los')]"
 coronation_events.1016.great.tt.failure: "Você não consegue persuadi-los[Select_CString(And(guest.IsFemale, guest_2.IsFemale),'las','los')]"
 coronation_events.1016.embarrass: "\"[guest.GetFirstNameNoTooltip] e [guest_2.GetFirstNameNoTooltip], devo lembrá-los…\"."
 coronation_events.1016.nah: "… ou então eu poderia beber mais [guest.Custom('GetExpensiveDrink_Singular')]."
 coronation_events.1017.t: "Oportunidade na libação"
 coronation_events.1017.desc: "Por todo o salão, os nobres exibem recipientes com as melhores libações de seus domínios. Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('supporter'))] [supporter.GetFirstName], de espírito [supporter.Custom('ComplimentAdjective')] , oferece uma prova de [supporter.Custom('RegionalDrink')], com um aroma adocicado de mel.\n\nDo outro lado, essa espécie de [detractor.Custom('InsultAdjective')] que é meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('detractor'))] [detractor.GetFirstName] apresenta uma taça de [detractor.Custom('RegionalDrink')] de qualidade; seu buquê intenso promete um sabor amargo, sem dúvida.\n\nOs simples aromas já aceleram meus sentidos. Todos aguardam meu julgamento."
 coronation_events.1017.diplo: "Que meu reinado seja digno de tanta abundância e habilidade!"
 coronation_events.1017.isolate: "Sim, [detractor.GetFirstNameNoTooltip], alimento apropriado para meus servos."
 coronation_events.1017.empower: "Por favor, me forneça mais, [supporter.GetFirstName]!"
 coronation_events.1017.nah: "Meus convidados podem beber primeiro, e eu depois."
 bp4_coronation_good_harvest_modifier: "Abundância de bebidas estrangeiras"
 coronation_events.1018.t: "O jogo das cadeiras"
 coronation_events.1018.desc: "Enquanto observava o banquete, ouço meu [supporter.Custom('ComplimentAdjective')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('supporter'))] [supporter.GetFirstName] me chamar do outro lado da mesa: \"Vossa Graça, com certeza [detractor.GetFirstName] não deveria sentar-se tão perto!\". Lanço meu olhar para meu [detractor.Custom2('InsultAdjective')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('detractor'))] [detractor.GetFirstName], que está à minha esquerda."
 coronation_events.1018.desc.wrathful: "\n\nA etiqueta impede minha mão, mas a melhor atitude é, claramente, jogar [detractor.GetFirstName] e sua cadeira bem longe de mim."
 coronation_events.1018.desc.diplo: "\n\nO protocolo exige que eu mantenha a cabeça erguida e sorria."
 coronation_events.1018.deal: "Mantenha os amigos por perto…"
 coronation_events.1018.switch: "Mantenha essa espécie de [detractor.Custom2('InsultNoun')] longe de mim."
 bp4_shielded_reign_modifier: "Evitando dissidentes"
 coronation_events.1019.t: "Demonstrações de lealdade"
 coronation_events.1019.desc: "Lanço um olhar para meus [Select_CString(And(supporter.IsFemale, supporter_2.IsFemale), 'aliadas', 'aliados')]leais: minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('supporter'))] [supporter.GetFirstName], tão [supporter.Custom('ComplimentAdjective')], cujo valor quando [supporter_memory.GetThirdPerspectiveDescription] foi inegável, e minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('supporter_2'))] [supporter_2.GetFirstName], tão [supporter_2.Custom('ComplimentAdjective')], que esteve ao meu lado quando [supporter_2_memory.GetThirdPerspectiveDescription]. Seus rostos brilham de expectativa, pois sabem que sua lealdade me trouxe até aqui.\n\nComo desfrutar de tamanha fidelidade sem aproveitar toda oportunidade para retribuí-la…?"
 coronation_events.1019.both: "[Select_CString(And(supporter.IsFemale, supporter_2.IsFemale), 'Ambas', 'Ambos')] se merecem igualmente."
 coronation_events.1019.memory_reward.tt: "Os efeitos desta opção dependem do tipo de memória."
 coronation_events.1019.supporter: "\"[supporter.GetFirstNameNoTooltip], tenho algo para você\"."
 coronation_events.1019.supporter_2: "\"[supporter_2.GetFirstNameNoTooltip], por favor, aceite isto\"."
 coronation_events.1019.nah: "Terão que bastar as palavras."
 coronation_events.1020.t: "Preocupações entre os clãs"
 coronation_events.1020.desc: "À medida que o banquete de coroação vai chegando ao fim, vozes exaltadas atravessam o salão. \"A casa [ROOT.Char.GetDynastyName] é a força do reino\", insiste [dynasty_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)]. \"Nosso parentesco deve liderar, como exige a tradição\".\n\nDo outro lado da mesa, [not_dynasty_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)] retruca: \"E o resto de nós? Vamos ter de pagar aos seus primos e ficar de boca fechada?\"."
 coronation_events.1020.embrace_supporters: "Favorecerei os leais."
 coronation_events.1020.embrace_supporters.tt: "#EMP #low Los [characters|lE] afectados son [coronation_supporters|lE]#!#!"
 coronation_events.1020.weaken_detractors: "E, diga-me, por que eu deveria ouvir você?"
 coronation_events.1020.weaken_detractors.tt: "#weak #EMP Los [characters|lE] que ganan [stress|lE] son [coronation_detractors|lE]#!#!"
 coronation_events.1020.a: "É preciso ouvi-los[Select_CString(And(dynasty_vassal.IsFemale, not_dynasty_vassal.IsFemale), 'las', 'los')] e buscar um ponto em comum."
 coronation_events.1020.a.flavor: "Reúno [Select_CString(And(dynasty_vassal.IsFemale, not_dynasty_vassal.IsFemale), 'ambas as vassalas', 'ambos os vassalos')] e [Select_CString(And(dynasty_vassal.IsFemale, not_dynasty_vassal.IsFemale), 'as', 'os')] escuto com atenção para acalmar os ânimos e reafirmar os vínculos que mantêm nossa casa unida."
 coronation_events.1020.b: "Ficar do lado das preocupações de [not_dynasty_vassal.GetFirstNameNoTooltip]."
 coronation_events.1020.b.custom: "Todo [vassal|lE] da mesma [dynasty|lE]"
 coronation_events.1020.b.tt: "Sua parentela vai se ressentir de você por ficar do lado deste estrangeiro para ganhar a lealdade dele."
 coronation_events.1020.c: "Tal insolência não pode ser tolerada."
 coronation_events.1020.d: "Meu dever está primeiro com meus parentes."
 clan_unity_coronation_increased: "escolha de favorecer a [house|lE] em vez de estranhos durante uma coroação"
 clan_unity_coronation_decreased: "optou por favorecer os estranhos em vez da [house|lE] durante a coroação"
 coronation_events.1021.t: "O ouro antes da coroa"
 coronation_events.1021.desc: "Mesmo antes de a coroa enfeitar minha testa, as preocupações do reino já pesam na minha mente. Minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('taxman'))], [taxman.Custom('ES_ElLa')] [taxman.GetTitledFirstName|l], avança a passos largos e declara: \"Vossa Graça, devo pedir permissão para cobrar o dízimo integral que me é devido — sem interferência dos magistrados de sua corte — ou meus deveres fiscais serão um fardo injusto para mim\".\n\nAo seu lado, minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('supporter'))], [supporter.GetName] observa atentamente. Seus olhos perguntam: vou me curvar diante dessa exibição de avareza? Serão os sonegadores de impostos como [taxman.GetFirstNameNoTooltip] os que decidirão a minha justiça?"
 coronation_events.1021.embrace_supporters: "[supporter.GetFirstNameNoTooltip], vigie atentamente a [Select_CString(taxman.IsFemale, 'essa diaba', 'esse diabo' )]."
 coronation_events.1021.embrace_supporters.flavor: "Meus verdadeiros partidários ficam ao meu lado... aqueles embriagados de avareza ficam atrás de mim, com as mãos na minha bolsa!"
 coronation_tax_collectors_watched_modifier: "Os partidários escrutinam os funcionários"
 coronation_tax_collectors_watched_modifier_desc: "A administração deste governante está salpicada de fiéis incondicionais que vigiam de perto as falcatruas e a traição."
 coronation_tax_collector_scrutiny_modifier: "Vigiado por outros vassalos"
 coronation_tax_collector_scrutiny_modifier_desc: "Sabe-se que este personagem é um agitador e está sob o escrutínio irritante dos partidários fiéis de seu suserano."
 coronation_harsh_collector_modifier: "Cobrador severo"
 coronation_harsh_collector_modifier_desc: "Este personagem é implacável na cobrança de impostos e é temido pelo povo."
 coronation_thriving_collector_modifier: "Coletor de impostos próspero"
 coronation_thriving_collector_modifier_desc: "Este personagem é eficiente na cobrança de impostos, para consternação de seus pares."
 coronation_events.1021.impress_attendees: "\"Honre meu povo com sua imparcialidade\"."
 coronation_events.1021.impress_attendees.flavor: "Honremos as tradições do nosso clã, reconheçamos cada convidado e não deixemos ninguém certo de qual é a minha posição."
 coronation_events.1021.a: "[taxman.Custom('ES_ElLa')|U] [taxman.GetTitledFirstNameNoTooltip|l] presume demais."
 coronation_events.1021.a.flavor: "Não me curvarei diante da moeda enquanto a coroa permanecer sem ser usada. Que todos vejam quem comanda quem."
 coronation_events.1021.b: "Aceitarei — pelo bem da estabilidade."
 coronation_events.1021.b.flavor: "Deixemos que [taxman.GetSheHe] cobre o que quiser, enquanto eu governar."
 custom.every_tax_slot_vassal: "Todo [vassal|lE] na [tax_jurisdiction|lE] de [tax_collector.GetShortUIName]"
 coronation_events.1021.c: "Meus cofres vêm primeiro. Encha-os."
 coronation_events.1021.c.flavor: "Se o ouro pavimenta o caminho para o poder, que seja empilhado em grande quantidade e profundidade. Dê rédea livre a [taxman.GetFirstNameNoTooltip]."
 clan_unity_coronation_nepotism.desc: "apoiou o nepotismo ao favorecer sua própria [house|lE] durante a coroação."
 bp4_empowered_tax_collectors_modifier: "Arrecadadores de impostos empoderados"
 coronation_events.1022.t: "Uma oferta sedosa"
 coronation_events.1022.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('supporter'))], [supporter.GetName], ajoelha-se diante de mim e ergue um baú com vestes bordadas, dizendo:\n\n\"Vossa Excelência, minha mente é um jardim onde florescem as memórias que compartilhamos. Como testemunho da beleza do passado, ofereço estas vestes de seda, suficientes para prover toda a sua corte. Peço apenas que sempre vistais os nobres [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l] de seu séquito com uma elegância sem igual.\""
 coronation_events.1022.a: "!Um presente gracioso e um ótimo conselho!"
 coronation_events.1022.b: "\"Aumentai a oferta, e ficarei em dívida com você!\""
 coronation_events.1022.c: "Sacaremos um bom lucro com estas!"
 coronation_events.1023.t: "Salve, [ROOT.Char.GetTitleAsNameNoTooltip|l]"
 coronation_events.1023.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('detractor'))], [detractor.GetName], se ergue com uma taça erguida bem alto. Em um tom [detractor.Custom('InsultAdjective')], proclama:\n\n\"Vossa Graça, sob essa coroa resplandecente, vejo um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] tão [ROOT.Char.Custom('ComplimentAdjective')]; poucos governantes podem reivindicar tantos súditos #EMP entregados#!, embora alguns ousassem questionar a sabedoria de suas decisões. Sim, onde estaríamos sem um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] tão [ROOT.Char.Custom('ComplimentAdjectiveArticle')] para bajular e adular?\".\n\nSuas palavras, vazias de bondade, enviam um calafrio pelo salão."
 coronation_events.1023.supporter.desc: "Sinto todos os olhares voltados para mim — especialmente os da minha horrorizada[supporter.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('supporter'))], [supporter.GetName]."
 coronation_events.1023.a: "\"Fiquem tranquilos, meu reinado será de fato [ROOT.Char.Custom('ComplimentAdjective')]\"."
 coronation_events.1023.b: "\"E devo tudo isso ao apoio de [supporter.GetFirstNameNoTooltip]!\"."
 coronation_events.1023.c: "Guardas! Prendam esta espécie de [detractor.Custom('InsultNoun')] [detractor.Custom('InsultAdjective')]!"
 coronation_events.1023.d: "\"[detractor.GetFirstNameNoTooltip], sua recepção acabou!\""
 coronation_events.1023.e: "Reconheço suas palavras com uma reverência educada — nada mais."
 coronation_events.1024.t: "Amigos por toda parte"
 coronation_events.1024.intro_diff_faith: "Com educada deferência, [foreign.Custom('ES_ElLa')] [foreign.GetTitleAsNameNoTooltip] de credo [foreign.GetFaith.GetAdherentName] de [foreign.GetPrimaryTitle.GetNameNoTier] apresenta-se diante de mim."
 coronation_events.1024.intro_diff_culture: "Com algumas floreios cerimoniais, [foreign.Custom('ES_ElLa')] [foreign.GetTitleAsNameNoTooltip] da comunidade [foreign.GetCulture.GetName] de [foreign.GetPrimaryTitle.GetNameNoTier] me faz um gesto pedindo um instante do meu tempo."
 coronation_events.1024.intro_diff_neither: "Com cerimônia refinada, [foreign.Custom('ES_ElLa')] [foreign.GetTitleAsName] de [foreign.GetPrimaryTitle.GetNameNoTier] tão [foreign.Custom('ComplimentAdjective')] apresenta-se diante de mim."
 coronation_events.1024.desc: "Portando um cofre incrustado de joias, [foreign.GetFirstNameNicknamedNoTooltip] dirige-se ao salão:\n\n\"Vossa Graça, aceite esta demonstração de boa vontade da parte de meu [foreign.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Que simbolize um vínculo duradouro entre seu povo e o meu\"."
 coronation_events.1024.supporter.desc: "\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))], [guest.GetName], se aproxima até mim e sussurra: \"Este presente poderia se tornar o começo de algo duradouro, meu [ROOT.Char.GetTitleAsName]!\"."
 coronation_events.1024.detractor.desc: "\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))], [guest.GetName], inclina-se para sussurrar com malícia: \"Tais presentes costumam disfarçar interesses desagradáveis, meu [ROOT.Char.GetTitleAsName]...\""
 coronation_events.1024.impress_attendees: "\"Um momento glorioso para nossos povos!\""
 coronation_events.1024.embrace_supporters: "\"Que jamais se rompam nossos laços, [foreign.GetFirstNameNoTooltip]!\"."
 coronation_events.1024.weaken_detractors: "\"[guest.GetFirstNameNoTooltip] difama seu presente, [foreign.GetFirstNameNoTooltip]!\""
 coronation_events.1024.exalt_crown: "Então…, vos tornais tributári[guest.Custom('ES_OA')] da coroa, não?"
 coronation_events.1024.a: "\"#EMP Ja!#! Não preciso de bugigangas\"."
 coronation_events.1024.b: "\"Aceito graciosamente e prometo minha boa vontade\"."
 coronation_events.1025.t: "Olhares frios"
 coronation_events.1025.desc.intro: "A tensão paira entre [supporter.GetName] e meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('detractor'))], [detractor.GetName]. Eles se sentam afastados, lançando olhares furiosos e gesticulando amargamente na direção um do outro. Ouço os ecos de rancores que só minha coroa ainda pode acalmar.\n\n"
 coronation_events.1025.desc.supporter: "Mas mesmo enquanto difama, [supporter.Custom('ES_ElLa')] [supporter.GetTitledFirstNameNoTooltip|l] continua sorrindo lealmente quando percebe que [supporter.Custom('ES_LoLa')] olho."
 coronation_events.1025.desc.detractor: "\n\nPor outro lado, [detractor.Custom('ES_ElLa')] [detractor.GetTitledFirstName|l] senta-se #EMP sobre#! à mesa, trajado[detractor.Custom('ES_OA')] generosamente com [detractor.Custom('RegionalFabric')] e em atitude desafiadora. Lidera sua turma de detratores de pensamento semelhante a zombar de \"[supporter.GetFirstNameNoTooltip] [supporter.Custom('ES_ElLa')] [supporter.Custom('InsultAdjective')]\"."
 coronation_events.1025.a: "\"Apoio [supporter.GetFirstNameNoTooltip], completamente e sempre!\"."
 coronation_events.1025.b: "\"Venham, venham! Devemos festejar como um só!\""
 coronation_events.1025.c: "[supporter.GetFirstNameNoTooltip] tem meu apoio."
 coronation_events.1025.d: "Jogue toda a culpa em [detractor.GetFirstNameNoTooltip]."
 coronation_events.1025.e: "\"Por favor, pense em nosso futuro!\""
 coronation_events.1025.f: "Na verdade, [detractor.GetFirstNameNoTooltip] tem razão."
 coronation_events.1026.t: "Um bolo digno de ser lembrado"
 coronation_events.1026.desc: "Finalmente, chega o bolo; imponente, glorioso, a joia da coroa do banquete. Cozinheiros exaustos, mas orgulhosos, passaram a noite montando camadas de [ROOT.Char.Custom('FavoriteTreatDemand')] e [ROOT.Char.Custom('GetFoodDetail')]; cada camada tem aroma de [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type')]. Em algum lugar em seu interior há uma pequena peça que escondi pessoalmente!"
 coronation_events.1026.supporter_desc: "\n\n[token_finder.GetNameNoTooltip] retira triunfante a peça de entre as generosas camadas do bolo, sua alegria é tanta que quase me dá um tapa nas costas de meu [ROOT.Char.Custom('GetTitleTierAdjective')]. O salão explode em aplausos; [Select_CString( token_finder.IsFemale, 'una partidaria', 'un partidario' )] leal, favorecida pela fortuna, também é favorecida pela coroa."
 coronation_events.1026.detractor_desc: "\n\n[token_finder.GetNameNoTooltip] puxa o pedaço do bolo com um sorrisinho; sua vitória é inegável. Uma onda de murmúrios percorre o salão; parece que a sorte favorece até mesmo os críticos da coroa, ainda que só por esta noite."
 coronation_events.1026.special_desc: "\n\nCom um floreio, enterro minha faca e eu mesmo retiro o símbolo. Um silêncio toma conta antes de o salão explodir em aplausos; [Select_CString( ROOT.Char.IsFemale, 'la anfitriona', 'el anfitrión' )] conquistou o prêmio!"
 coronation_events.1026.fallback_desc: "\n\n[token_finder.GetNameNoTooltip] retira o token triunfantemente, conquistando aplausos e a promessa de fortuna por vir."
 coronation_events.1026.special: "Encontrei! Louvem-me!"
 coronation_events.1026.a: "Agora, a deslumbrar a todos com um discurso!"
 coronation_events.1026.b: "[token_finder.GetFirstName], aceite seu prêmio!"
 coronation_events.1026.c: "[token_finder.GetFirstName], sereis [Select_CString( token_finder.IsFemale, 'a primeira', 'o primeiro' )] em se curvar perante."
 coronation_events.1026.d: "Que este momento permaneça para sempre no nome de [ROOT.Char.GetDynastyNameNoTooltip]!"
 coronation_events.1026.e: "Mal posso esperar para comer esse bolo!"
 coronation_events.1026.f: "Minha parte irá para meus camponeses!"
 coronation_events.1027.t: "O momento [highlighted_guest.Custom('ES_DelDela')] [highlighted_guest.GetTitledFirstNameNoTooltip|l]"
 coronation_events.1027.desc: "A nobreza começa uma apresentação cuidadosamente coreografada de [ROOT.Char.Custom('GetMedievalDance')]. Com adereços simbólicos, eles encenam cenas da ascensão da minha dinastia, de suas vitórias e aspirações. Todos os olhos se voltam para a figura central do espetáculo…"
 coronation_events.1027.special_desc: "\n\nE percebo, com um lampejo de surpresa, que é a mim que retratam como [Select_CString( ROOT.Char.IsFemale, 'la heroína', 'el héroe' )] de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]; verdadeiramente glorios[ROOT.Char.Custom('ES_OA')], um bastião do nome [ROOT.Char.GetDynastyName]. Um espaço se abre no centro da coreografia. Chamam-me para me juntar à dança. Os convidados irrompem em aplausos; sua admiração é tão embriagante quanto o vinho."
 coronation_events.1027.supporter_desc: "\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('highlighted_guest'))] [highlighted_guest.GetFirstName] assume o papel de um ancestral louvado e arranca aplausos ao recitar com paixão o poder da minha linhagem. A mensagem é clara: meu direito de governar é um legado carregado com orgulho."
 coronation_events.1027.detractor_desc: "\n\nPara minha surpresa, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('highlighted_guest'))] [highlighted_guest.GetFirstNameNoTooltip] dá um passo à frente quando a cerimônia exige um ato simbólico de homenagem. O público reunido se agita, dividido entre o riso e um aplauso desconfortável, sem saber se deve encarar isso como uma brincadeira, uma encenação… ou um aviso."
 coronation_events.1027.fallback_desc: "\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('highlighted_guest'))] [highlighted_guest.GetFirstNameNoTooltip] desempenha o papel do próprio reino, envolt[highlighted_guest.Custom('ES_OA')] nos cores régios de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip], cobert[highlighted_guest.Custom('ES_OA')] de fitas douradas, proclamando sua lealdade com uma graça solene. Os convidados assentem em aprovação, deleitando-se com a pompa."
 coronation_events.1027.special: "Hora de ocupar meu lugar ao lado deles."
 coronation_events.1027.a: "Aplaudo sua atuação com elegância cortesã."
 coronation_events.1027.b: "Elogie abertamente [highlighted_guest.GetFirstNameNoTooltip]; a lealdade merece recompensa."
 coronation_events.1027.c: "Socavar o momento de [highlighted_guest.GetFirstNameNoTooltip]."
 coronation_events.1027.d: "Faça um discurso sobre a tradição da Casa [ROOT.Char.GetDynastyNameNoTooltip]."
 coronation_events.1027.e: "Sorrir calorosamente e compartilhar da alegria."
 coronation_events.1027.f: "Desaparecer ao fundo e deixar o momento passar."
 coronation_events.1028.t: "Uma bênção de [clergy_representative.GetFaith.HighGodName]"
 coronation_events.1028.supporter.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('clergy_representative'))] [clergy_representative.GetFirstName], uma alma [clergy_representative.GetFaith.GetAdjective] devota, dá um passo à frente com expressão solene e serena.\n\n\"[clergy_representative.GetFaith.HouseholdGodName] sorri pela união entre os governantes\", proclama. \"Permitam-me oferecer-vos uma bênção em nome de [clergy_representative.GetFaith.CreatorName], como gesto de harmonia\".\n\n[guest.GetFirstName], um[guest.Custom('ES_OA')] dos meus partidários leais, observa atentamente, intrigad[guest.Custom('ES_OA')] pelo gesto."
 coronation_events.1028.detractor.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('clergy_representative'))] [clergy_representative.GetFirstName], uma alma [clergy_representative.GetFaith.GetAdjective] fervorosa, aproxima-se com lenta reverência.\n\n\"[clergy_representative.GetFaith.HouseholdGodName] clama por paz além de fronteiras e crenças\", diz. \"Posso oferecer-lhe uma bênção de [clergy_representative.GetFaith.CreatorName] durante sua coroação?\".\n\nEntre a multidão, [guest.GetFirstName], [Select_CString( guest.IsFemale, 'uma notória desconfiada', 'um notório desconfiado' )] de meu governo, estreita os olhos em clara desaprovação."
 coronation_events.1028.fallback.desc: "Conforme a coroação prossegue, [clergy_representative.GetFirstName], um[clergy_representative.Custom('ES_XA')] visitante da fé [clergy_representative.GetFaith.GetAdherentName], dá um passo à frente com as mãos erguidas em reverência solene.\n\n\"[clergy_representative.GetFaith.HouseholdGodName] ensina paz e compreensão entre as fés\", diz suavemente. \"Aceitareis uma bênção de [clergy_representative.GetFaith.CreatorName] para marcar vosso reinado?\"\n\n[guest.GetFirstName], um[guest.Custom('ES_OA')] de [guest.Custom('ES_OA')] nobres reunid[guest.Custom('ES_OA')]os, inclina a cabeça — indecifrável, atento."
 coronation_events.1028.supporter: "Chamo [guest.GetFirstNameNoTooltip] para o meu lado."
 coronation_events.1028.detractor: "Marcar [guest.GetFirstNameNoTooltip] como simpatizante de [clergy_representative.GetFaith.GetNameNoTooltip|l]."
 coronation_events.1028.a: "Aceitar a bênção em nome da tolerância."
 coronation_events.1028.b: "Recusar educadamente as bênçãos hereges."
 coronation_events.1028.c: "\"Mas isso é claramente heresia!\""
 coronation_events.1028.d: "Evite completamente a questão."
 coronation_events.1028.detractor.tt: "Todo participante da mesma [faith|lE] sem o traço [GetTrait('cynical').GetName( GetNullCharacter )]"
 coronation_events.1028.a.tt: "Todo participante da mesma [faith|lE] de caráter [GetTrait('zealous').GetName( GetNullCharacter )|l]"
 coronation_events.1028.a.tt3: "Todo participante do [faith|lE] de [clergy_representative.GetShortUIName]"
 coronation_events.1028.b.tt: "Todo participante da mesma [faith|lE] de caráter [GetTrait('zealous').GetName( GetNullCharacter )|l]"
 coronation_events.1028.c.tt: "Todo assistente da mesma [faith|lE] de caráter [GetTrait('zealous').GetName( GetNullCharacter )|l]"
 coronation_events.1029.t: "O juramento esquecido"
 coronation_events.1029.desc: "Ouço nitidamente o desenrolar de um longo pergaminho. \"Meu senhor[ROOT.Char.Custom('ES_XA')]\", diz meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('priest'))] [priest.GetFirstName] inclinando-se levemente. \"Encontrei isto entre os registros mais antigos de [primary_title.GetName]. Fala de um juramento feito por [ROOT.GetCharacter.Custom('GetMythicalFounder')], que concedia aos futuros governantes direitos e privilégios esquecidos pelo tempo\".\n\n[guest.GetFirstName], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))], se inclina com uma curiosidade visível. \"Uma promessa esquecida? Isso pode ser… interessante\", murmura."
 coronation_events.1029.supporter.desc: "O cheiro de um pergaminho envelhecido invade minhas narinas. \"Meu senhor[ROOT.Char.Custom('ES_XA')]\", declara meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('priest'))] [priest.GetFirstName], \"este é um juramento feito por [ROOT.GetCharacter.Custom('GetMythicalFounder')], que une governante e súditos leais em dever e recompensa mútuos, desde nossos arquivos mais antigos. E certamente destinado a momentos como este\".\n\n[guest.GetFirstName], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))] e apoiador[guest.Custom('ES_OA')] leal, sorri amplamente. \"Um momento perfeito para renovar antigas promessas\"."
 coronation_events.1029.detractor.desc: "[priest.GetFirstName], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('priest'))], desenrola um pergaminho gasto. \"Meu senhor[ROOT.Char.Custom('ES_XA')]\", anuncia, \"este é o juramento de [ROOT.GetCharacter.Custom('GetMythicalFounder')], uma declaração de autoridade soberana sobre todas as terras! Foi recentemente descoberto nos arquivos de [primary_title.GetNameNoTier]. Este juramento afirma vosso direito de exigir lealdade — e de punir a desobediência\".\n\n[guest.GetFirstName], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))] e [Select_CString( guest.IsFemale, 'detractora declarada', 'detractor declarado' )], zomba em voz alta. \"Palavras antigas, e mortas ainda por cima!\"."
 coronation_events.1029.a: "De fato, [ROOT.Char.GetFaith.HighGodName] legitima meu reinado!"
 coronation_events.1029.b: "[guest.GetFirstNameNoTooltip], que nosso juramento iguale aos de outrora."
 coronation_events.1029.c: "Que seja sobre a lealdade de [guest.GetFirstNameNoTooltip] para mim."
 coronation_events.1029.d: "Proclamem o texto perdido a todos!"
 coronation_events.1029.e: "Que o passado permaneça enterrado."
 coronation_events.1030.t: "Capturado para a posteridade"
 coronation_events.1030.exalt.desc: "[scholar.Custom('ES_ElLa')|U] [scholar.GetTitledFirstName|l], minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('scholar'))], se aproxima com um sorriso ansioso.\n\n“Vossa majestade”, diz ele, “a grandeza de sua coroação merece um lugar nos anais da história. Posso mandar que um dos meus escribas registre o esplendor de suas vestes, o poder de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] e a admiração que você inspirou aqui?”."
 coronation_events.1030.impress.desc: "[scholar.Custom('ES_ElLa')|U] [scholar.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('scholar'))], gesticula em minha direção.\n\n\"Que público mais dedicado!\", exclama. \"Se me permitirdes, pedirei a um dos meus escribas que registre a reação dos vossos convidados — os vivas, os suspiros e até as lágrimas. Que ninguém esqueça como a vossa coroação nos comoveu a todos\"."
 coronation_events.1030.supporters.desc: "[scholar.Custom('ES_ElLa')|U] [scholar.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('scholar'))], me saúda com os olhos brilhantes.\n\n\"O que mais me impressionou\", diz ele, \"foi a lealdade dos vossos súditos. Se aprovardes, pedirei ao meu escriba que escreva uma [scholar.Custom('GetChronicleSaga')] deste evento, e suas palavras serão apenas para os vossos apoiadores, por sua fidelidade e força unificada\"."
 coronation_events.1030.detractors.desc: "[scholar.Custom('ES_ElLa')|U] [scholar.GetTitledFirstName], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('scholar'))], se aproxima de mim com ar conspiratório e fala em voz baixa.\n\n\"Seus detratores permaneceram desconfortavelmente em silêncio… ou berraram furiosamente. Meus escribas registrarão sua rebeldia, e as gerações futuras julgarão seus inimigos como merecem…\"."
 coronation_events.1030.a: "\"Sim, sim, um esplendor duradouro!\""
 coronation_events.1030.b: "\"Por favor, dê ênfase à alegria dos meus convidados\"."
 coronation_events.1030.c: "\"Que suas palavras sejam dignas de sua lealdade\"."
 coronation_events.1030.d: "Que a escória seja vilipendiada eternamente."
 coronation_events.1030.e: "\"Não, a passagem deve reverenciar [ROOT.Char.GetFaith.HighGodName]\"."
 coronation_events.1030.tt.success: "A [scholar.Custom('GetChronicleSaga')] é louvada"
 coronation_events.1030.tt.failure: "O [scholar.Custom('GetChronicleSaga')] é ridicularizada"
 bp4_chronicled_coronation_modifier: "Coroação registrada"
 legend_chapter_great_coronation: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip] realizou a maior coroação já conhecida pela humanidade, com a bênção direta de [ROOT.Legend.GetProtagonist.GetFaith.HighGodName] em todos os momentos da gloriosa cerimônia. Todas as partes do mundo conhecido contemplaram [ROOT.Legend.GetProtagonist.Custom('ES_AlAla')] [ROOT.Legend.GetProtagonist.GetTitleAsNameNoTooltip] com admiração."
 coronation_events.1031.t: "O coro se ergue"
 coronation_events.1031.exalt.desc: "Enquanto o grande salão ecoa com a agitação dos preparativos, [priest.GetFirstName], minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('priest'))] se aproxima de mim com um conjunto de hinários gastos sob o braço.\n\n\"Vossa Majestade\", diz com um orgulho contido, \"o coro aguarda sua orientação. Suas vozes devem se erguer para proclamar seu direito divino e o esplendor de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]?\".\n\nImagino a cerimônia que virá — cada nota elevando o reino aos olhos da audiência."
 coronation_events.1031.impress.desc: "Enquanto os servos ajustam as decorações e os pajens ensaiam suas deixas, [priest.GetFirstName] meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('priest'))] me encontra em meio aos preparativos.\n\n“O reino ouvirá com atenção”, diz com um sorriso cúmplice. “Que o coro cante um hino que comova os corações e vença os vossos tolos opositores”.\n\nÉ uma ideia agradável: o salão cheio de som, e cada voz parte da minha apresentação."
 coronation_events.1031.supporters.desc: "Entre a confusão de escribas e cozinheiros que correm pelos corredores, [priest.GetFirstName] meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('priest'))] me detém com um gesto gentil.\n\n“Seus fiéis apoiadores estarão observando”, diz. “Que os hinos lhes lembrem por que seguem você: canções que unam corações dispostos e aprofundem sua fé em seu governo.”\n\nO coro aguarda minhas escolhas, ansioso para começar os ensaios."
 coronation_events.1031.detractors.desc: "[priest.GetFirstName], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('priest'))], se aproxima de mim falando em voz baixa e lançando um olhar cauteloso.\n\n“Nem todos os reunidos vão aclamar vosso nome”, adverte. “Quando os hinos chegarem, deixai que tenham peso — uma autoridade que os demônios que se opõem a vós não possam ignorar. Enchei os ouvidos dessas criaturas com o poder de vossa coroa!”.\n\nO mestre do coro aguarda minha escolha de tom e mensagem."
 coronation_events.1031.a: "\"Cantem sobre a minha glória!\""
 coronation_events.1031.b: "\"Que o hino clame por paz e unidade\"."
 coronation_events.1031.c: "\"Que seja um aviso para os inimigos da Casa [ROOT.Char.GetDynastyNameNoTooltip]\"."
 coronation_events.1031.d: "\"Sem hinos. Que hoje fale o silêncio\"."
 coronation_events.1031.e: "\"Tenho uma composição perfeita para isso!\""
 every_attending_vassal: "Todo vassalo presente"
 every_attending_detractor_or_compassionate: "Todo detrator presente e convidado compassivo"
 every_attending_poet_scholar: "Todo personagem presente com os traços [GetTrait('lifestyle_poet').GetName( GetNullCharacter )] e [GetTrait('scholar').GetName( GetNullCharacter )]"
 every_poet_scholar: "Todo personagem presente com as características [GetTrait('lifestyle_poet').GetName( GetNullCharacter )] e [GetTrait('scholar').GetName( GetNullCharacter )]"
 coronation_events.1032.t: "Um gesto corajoso"
 coronation_events.1032.desc: "A ocasião, embora majestosa e apropriada, ainda parece… incompleta. Será apenas uma reunião rotineira, um banquete casual? Ou é um momento para grande ação política, para uma mudança histórica? Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('supporter'))] , [supporter.Custom('ES_ElLa')] [supporter.GetTitledFirstName|l], sussurra em meu ouvido.\n\n\"Governantes não se tornam grandiosos por palavras... mas por feitos\", ele me instiga. \"Feitos! Feitos que abalem o/a [ROOT.Char.GetPrimaryTitle.GetTierAsName|l] até os seus alicerces!\".\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('detractor'))] [detractor.GetFirstName], que não dá a menor importância a esta ocasião, observa com desprezo."
 coronation_events.1032.b: "\"[supporter.GetFirstNameNoTooltip]: vamos declarar nossa fidelidade eterna\"."
 coronation_events.1032.c: "Com uma nova Ordem, reunirei os fiéis!"
 coronation_events.1032.c.flavor: "[supporter.GetFirstNameNoTooltip] preparará a proclamação de uma nova Ordem Sagrada."
 create_holy_order_decision_effect_message_coronation: "Uma [holy_order|lE] de sua [faith|lE]\n$EFFECT_LIST_BULLET$ Você se torna [holy_order_patron|lE] da ordem\n$EFFECT_LIST_BULLET$[barony.GetName] será a sede da ordem"
 coronation_events.1032.d: "\"Olhos indiscretos devem ser — #EMP serán cegadas!#!\""
 coronation_events.1032.d.flavor: "Será escolhido(a) [detractor.GetFirstNameNoTooltip] para um castigo público durante a cerimônia. A dissidência não será tolerada."
 coronation_events.1032.a: "Que os céus mesmos se unam à celebração!"
 coronation_events.1032.a.flavor: "Façam com que os servos soltem bandos de aves cativas no ar; que todas as gaiolas sejam esvaziadas!"
 every_compassionate_calm_supporter: "Todo participante de caráter [GetTrait('compassionate').GetName( GetNullCharacter )|l], [GetTrait('calm').GetName( GetNullCharacter )|l] ou [coronation_supporter||E]"
 every_ambitious_wrathful_vassal: "Todo assistente de caráter [GetTrait('ambitious').GetName( GetNullCharacter )|l] ou [GetTrait('wrathful').GetName( GetNullCharacter )|l]"
 every_attending_sadistic_arbitrary: "Todo assistente de caráter [GetTrait('sadistic').GetName( GetNullCharacter )|l] ou [GetTrait('arbitrary').GetName( GetNullCharacter )|l]"
 every_attending_compassionate_just: "Todo participante de caráter [GetTrait('compassionate').GetName( GetNullCharacter )|l] ou [GetTrait('just').GetName( GetNullCharacter )|l]"
 create_alliance_supporter_tt: "[supporter.GetShortUIName] e você formam uma [alliance|lE]"
 coronation_events.1032.e: "Só quero que isso acabe..."
 coronation_events.1033.t: "Uma voz dissonante"
 coronation_events.1033.desc: "\"Esta farsa #EMP consumada#! zomba de [ROOT.Char.GetPrimaryTitle.GetNameNoTier], difama seu povo e profana os túmulos daqueles que vieram antes de nós!\", brada [rival.GetFirstName], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('rival'))].\n\nO forte odor de [ROOT.Char.Custom('RegionalDrink')] em seu hálito: [Select_CString( rival.IsFemale, 'essa bêbada', 'esse bêbado' )] já estava bêb[rival.Custom('ES_OA')]!. Seu olhar vacila sobre nobres, [ROOT.Char.GetFaith.PriestNeuterPlural] e enviados estrangeiros também, desafiando-os a questionar esse espetáculo grosseiro. \"Com que direito [ROOT.Char.GetFirstName] reivindica esta coroa? #EMP Hã?#! Com que direito?!\".\n\nSuspiros de espanto se espalham pelo salão."
 coronation_events.1033.a: "\"O direito divino\"."
 coronation_events.1033.b: "Aproveite a oportunidade para uma reconciliação pública."
 coronation_events.1033.c: "Arrastem[rival.GetHerHim] para fora acorrentado!"
 coronation_events.1033.d: "Que esse roedor dê vazão à sua raiva…"
 rival_publicly_denounced_at_coronation: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'questionaste', 'questionou' )] publicamente a legitimidade de [CHARACTER.LocalPlayerString( 'seu personagem', CHARACTER.GetShortUIName )] durante [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] coroa??o"
