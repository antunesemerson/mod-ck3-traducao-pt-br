l_spanish:
 # Base details
 activity_coronation: "Coroação"
 activity_coronation_host_desc: "$BULLET_WITH_TAB$[Concept('law', 'Leis')|E] @law_icon! de [GetLaw('crowned_king').GetName] ou [GetLaw('crowned_emperor').GetName]\n$BULLET_WITH_TAB$ Enquanto a coroação existir, as [factions|lE] @faction_icon! não podem apresentar exigências\n$BULLET_WITH_TAB$[opinion|E] [opinion_i]\n$BULLET_WITH_TAB$[prestige|E] [prestige_i]\n$BULLET_WITH_TAB$[legitimacy|E] [legitimacy_i]\n$BULLET_WITH_TAB$[decision|E] de um [oath|lE] poderoso\n\n@warning_icon! #X @faction_icon! As [factions|lE] e outros inimigos prejudicarão a [coronation_magnificence|lE] da coroação#!"
 activity_coronation_guest_desc: "$BULLET_WITH_TAB$ Os participantes podem ganhar [opinion|lE] [opinion_i] opinião sobre outros participantes\n$BULLET_WITH_TAB$ Os participantes podem ganhar oportunidades únicas com base em sua [intent|lE]"
 activity_coronation_desc: "Convide os grandes e poderosos do domínio a testemunhar sua ascensão ao trono. Isso lançará as bases para um reinado longo e bem-sucedido."
 activity_coronation_conclusion_desc: "A [GetActivityType( 'activity_coronation' ).GetName|l] terminou."
 activity_coronation_selection_tooltip: "Convide os grandes e poderosos do reino para testemunhar sua ascensão ao trono. Isso lançará as bases para um reinado longo e bem-sucedido.\n\nRecompensas previstas:\n $activity_coronation_host_desc$"
 activity_coronation_destination_selection: "\nUma [coronation|lE] costuma ser realizada no [realm|lE] do [host|lE], com exceção das [anointments|lE], que podem ter de ser realizadas nas terras do [head_of_faith|lE] se ele possuir algum [holy_site|lE] adequado."
 activity_coronation_guest_help_text: "Uma coroação à uma grande oportunidade para criar vínculos e impressionar [vassals|lE] e outros [rulers|lE] igualmente.\n\nTodo convidado que participe da coroação terá oportunidades de aumentar a [opinion|lE] de outros convidados e poderá obter oportunidades especiais de interagir com o [host|lE] da [activity|lE]."
 invite_to_activity_flavor_coronation: "Vocês são cordialmente convidados a se juntar a mim e ao restante do reino em [ROOT.Char.GetCurrentLocation.Custom('GetCoronationSite')] para minha próxima coroação."
 activity_coronation_underage_tt: "#bold Não#! tem #V 12#! anos no mínimo\n#flavor A coroa escorrega pela sua cabecinha#!"
 activity_coronation_not_approved_anointment: "[GetPlayer.GetFaith.GetReligiousHead.Custom('ES_ElLa')|U] [GetPlayer.GetFaith.GetReligiousHead.GetTitledFirstName|l] não aprovou esta [anointment|lE]; busque sua aprovação com a [interaction|lE] [request_anointment|E]"
 # Province Desc
 activity_coronation_province_desc: "A coroação será realizada em [ROOT.Province.GetName]"
 activity_coronation_capital_province: "\n#p + Capital#!"
 activity_coronation_holy_site_province: "\n#p + Lugar sagrado#!"
 activity_coronation_tradition_province: "\n#p + Local tradicional de coroação#!"
 activity_coronation_long_tradition_province: "\n#p + Local tradicional de coroação#!"
 activity_coronation_ancient_tradition_province: "\n#p + Local tradicional de coroação#!"
 # Location Triggers
 coronation_location_owned: "Não está em [realm|lE]"
 coronation_location_hof_owned: "[THIS.Province.GetName] #bold não#! é um [holy_site|lE] no [realm|lE] de sua [Concept('head_of_faith', 'cabeça da fé')|E]"
 coronation_location_holy_site_host: "[THIS.Province.GetName] #bold não#! é um [holy_site|lE] em seu [realm|lE] (sua [Concept('head_of_faith', 'cabeça da fé')|E] não possui nenhum [holy_site|lE])"
 coronation_location_neither_capital_nor_holy_site: "[THIS.Province.GetName] #bol no#! é uma [county_capital|lE] nem um [holy_site|lE]"
 # Phases
 coronation_phase_preparations: "Prelúdio"
 coronation_phase_preparations_desc: ""
 coronation_phase_coronation: "Cerimônia"
 coronation_phase_coronation_desc: ""
 coronation_phase_feast: "Banquete"
 coronation_phase_feast_desc: ""
 # Types
 coronation_type_normal: "Coroação"
 coronation_type_normal_desc: "$BULLET_WITH_TAB$Prove sua [legitimacy|lE] [legitimacy_i]\n$BULLET_WITH_TAB$Faça um [oath|lE] e prometa o rumo que seu reinado tomará\n$BULLET_WITH_TAB$Pode ganhar [opinion|lE] [opinion_i] com os [vassals|lE] [AddLocalizationIf( GetPlayer.GetGovernment.HasGovernmentFlag( 'government_is_mandala' ), 'coronation_type_tributaries' )]\n$BULLET_WITH_TAB$Os [vassals|lE] podem abandonar [factions|lE] @faction_icon!\n$BULLET_WITH_TAB$Você pode se coroar pessoalmente para obter [prestige|lE] [prestige_i] extra\n\n#weak $coronation_type_normal_flavor$#!"
 coronation_type_normal_flavor: "Uma cerimônia solene comprovará a legitimidade do seu governo, e a majestade do reino será seu traje soberano."
 coronation_type_tributaries: "e [tributaries|lE]"
 coronation_type_anointment: "Unção"
 coronation_type_anointment_desc: "$BULLET_WITH_TAB$Comprove sua [legitimacy|lE] [legitimacy_i] além de qualquer dúvida\n$BULLET_WITH_TAB$Ganhe [piety|lE] [piety_i], [fervor|lE] @fervor_icon! e o favor dos [vassals|lE] [GetVassalStance( 'zealot' ).GetTextIcon][GetVassalStance( 'zealot' ).GetName|l]\n$BULLET_WITH_TAB$Faça um [oath|lE] e prometa o rumo que seu reinado seguirá\n$BULLET_WITH_TAB$Ganhe [opinion|lE] [opinion_i] com [vassals|lE]\n$BULLET_WITH_TAB$Ganhe [opinion|lE] [opinion_i] com outros [rulers|lE]\n$BULLET_WITH_TAB$Os [vassals|lE] podem deixar [factions|lE] @faction_icon!\n$BULLET_WITH_TAB$@alert_icon! #alert_trial Deve ser realizada em um [holy_site|lE] de sua [faith|lE]#!\n\n#weak $coronation_type_anointment_flavor$#!"
 coronation_type_anointment_flavor: "Um verdadeiro soberano deve estar envolto em um propósito sagrado e ser instituído pelo favor divino. A força terrena não é um substituto."
 # Options
 anointment_minimum: "[activity_option|E] não disponível para uma [anointment|lE]"
 ceremony_size: "Cerimônia"
 coronation_small_ceremony: "Ritos simples"
 coronation_small_ceremony_desc: "$EFFECT_LIST_BULLET$[coronation_magnificence|E] reduzida\n$EFFECT_LIST_BULLET$ Os [rulers|lE] estrangeiros não participarão na [activity|lE]\n$EFFECT_LIST_BULLET$ Se a [coronation_magnificence|lE] ficar abaixo de #high 50#! na conclusão, você obterá [GetModifier('ach_coronation_low_ceremony_modifier').GetNameWithTooltip] por #high 10 anos#!\n\n#weak Já não sou [Select_CString( ROOT.Char.IsFemale, 'a soberana', 'o soberano' )]? Por que reunir todos os reinos para esta mera formalidade…?#!"
 coronation_medium_ceremony: "Galas de longa tradição"
 coronation_medium_ceremony_desc: "$EFFECT_LIST_BULLET$[coronation_magnificence|E] aumentada\n $EFFECT_LIST_BULLET$ É mais provável que compareçam [activity_guests|lE]\n\n #weak Os sagrados juramentos do reinado devem ser acompanhados por um ambiente régio e uma reunião imensa e reverente.#!"
 coronation_large_ceremony: "Glória e esplendor"
 coronation_large_ceremony_desc: "$EFFECT_LIST_BULLET$[coronation_magnificence|E] aumentada significativamente\n $EFFECT_LIST_BULLET$ É muito mais provável que compareçam [activity_guests|lE]\n\n #weak Entre as relíquias sagradas e jóias reluzentes, acompanhada de música bela, estará minha gente, meus vassalos e convidados prestigiados de terras distantes.#!"
 ceremony_feast_type: "Celebrações"
 ceremony_feast_type_austere: "Observâncias austeras"
 ceremony_feast_type_austere_desc: "$EFFECT_LIST_BULLET$[coronation_magnificence|E] reduzida\n$EFFECT_LIST_BULLET$ Se a [coronation_magnificence|lE] ficar abaixo de #high 50#! ao final, você receberá [SelectLocalization( GetPlayer.GetGovernment.HasGovernmentFlag( 'government_is_mandala' ), 'mandala_coronation_low_feast', 'generic_coronation_low_feast' )] durante #high 10 anos#!\n\n#weak Não é prazer suficiente receber um convite para esta ocasião histórica…?#!"
 generic_coronation_low_feast: "[GetModifier('ach_coronation_low_feast_modifier').GetNameWithTooltip]"
 mandala_coronation_low_feast: "[GetModifier('mandala_coronation_low_feast_modifier').GetNameWithTooltip]"
 ceremony_feast_type_regular: "Diversão apropriada"
 ceremony_feast_type_regular_desc: "$EFFECT_LIST_BULLET$[coronation_magnificence|E] aumentada\n\n#weak Não se pouparão gastos para a grande reunião da nobreza e para a boa comida do banquete após a cerimônia.#!"
 ceremony_feast_type_lavish: "Banquetes luxuosos"
 ceremony_feast_type_lavish_desc: "$EFFECT_LIST_BULLET$[coronation_magnificence|E] aumentada significativamente\n$EFFECT_LIST_BULLET$O risco de eventos negativos à reduzido\n\n#weak Aguardam pratos sem fim de iguarias com aromas suntuosos, delícias magníficas para reforçar a grande mesa do monarca.#!"
 ach_coronation_low_ceremony_modifier: "Coroado na obscuridade"
 ach_coronation_low_ceremony_modifier_desc: "O povo comum mal sabe que este governante é verdadeiramente seu suserano, e a nobreza fica feliz em esquecer suas modestas cerimônias de coroação."
 ach_coronation_low_feast_modifier: "Nobreza desprezada"
 ach_coronation_low_feast_modifier_desc: "As celebrações insultantemente exíguas em torno da coroação deste governante deixaram os presentes transbordando de desprezo e sem boas iguarias."
 mandala_coronation_low_feast_modifier: "Súditos desprezados"
 mandala_coronation_low_feast_modifier_desc: "$ach_coronation_low_feast_modifier_desc$"
 # Special Guests
 coronation_hof_guest: "Chefe da fé"
 coronation_hof_guest_desc: "$coronation_hof_guest_desc_for_host$"
 coronation_hof_guest_for_host: "Chefe da fé"
 coronation_hof_guest_desc_for_host: "Para que uma [anointment|lE] seja considerada [Concept('legitimate', 'legítima')|E] , o [head_of_faith|lE] deve ser um [activity_guest|lE].\n\nGaranta o apoio do Chefe da Fé com a [interaction|lE] [anointment_request|E]."
 # Doctrines related to Coronations
 doctrine_coronation_name: "Tradição de coroação"
 doctrine_no_anointment_name: "Sem unção"
 doctrine_no_anointment_desc: "Nesta fé, nenhum óleo sagrado toca a testa dos governantes; o deles é um caminho para o poder sem unção ou rito divino."
 doctrine_anointment_permitted_name: "Unção permitida"
 doctrine_anointment_permitted_desc: "Nem mesmo os imperadores se curvam a um único ritual — embora o Chefe da Fé possa presidir, a escolha da coroação cabe ao próprio trono."
 doctrine_imperial_anointment_name: "Unção imperial"
 doctrine_imperial_anointment_desc: "Para governar como imperador sem sombra de dúvida, é preciso ajoelhar-se — pois somente o Chefe da Fé pode conceder essa autoridade final e incontestável."
 doctrine_parameter_no_anointment: "Os [characters|lE] não têm acesso à [activity_option|lE] de [coronation_anointment|lE]"
 doctrine_parameter_theocratic_coronation: "Os [characters|lE] têm acesso à [activity_option|lE] de [coronation_anointment|lE]"
 doctrine_parameter_imperial_anointment: "Os [characters|lE] de [title_tier|lE] [empire|lE] ou superior devem usar a [activity_option|lE] de [coronation_anointment|lE] para receber a [law|lE] [GetLaw('crowned_emperor').GetName]"
 doctrine_parameter_coronation_artifact: "Os [characters|El] desta [faith|El] devem ter um [artifact|El] de [FAITH.Custom('CoronationRequiresArtifact')|l] para ter acesso a mais [activity_options|El]"
 coronation_custom_crown_artifact: "Coroa"
 coronation_custom_regalia_artifact: "Insígnias"
 coronation_custom_crown_or_regalia_artifact: "Coroa ou insígnias"
 # Costs
 CORONATION_BASE_COST: "Custo base da [GetActivityType( 'activity_coronation' ).GetName|l]"
 # Guest Join Chance Values
 coronation_small_ceremony_value: "$coronation_small_ceremony$: $VALUE|=+0$"
 coronation_medium_ceremony_value: "$coronation_medium_ceremony$: $VALUE|=+0$"
 coronation_large_ceremony_value: "$coronation_large_ceremony$: $VALUE|=+0$"
 coronation_special_vassal_value: "[coronation|E] [coronation_i] de [liege|lE] : $VALUE|=+0$"
 coronation_pope_not_anointment: "O [head_of_faith|El] só participará em uma [coronation|lE] de [coronation_anointment|lE] : $VALUE|=+0$"
 coronation_liege_value: "Coroação de [vassal|lE] de: $VALUE|=+0$"
 coronation_suzerain_value: "Coroação de [tributary|lE] de: $VALUE|=+0$"
 coronation_tributary_value: "Coroação de [suzerain|lE] de: $VALUE|=+0$"
 coronation_hof_supported_anointment: "O [head_of_faith|lE] apoia a [anointment|lE]: $VALUE|=+0$"
 # Laws for Coronation
 crowned_laws: "Leis de coroação"
 uncrowned: "Sem coroa"
 crowned_king: "Soberano coroado"
 crowned_emperor: "Soberano ungido"
 can_only_be_passed_through_coronation: "Só pode ser obtido ao realizar uma [GetActivityType( 'activity_coronation' ).GetName|l]"
 can_only_be_lost_through_losing_titles: "Já coroado"
 already_better_coronation: "Já ungido"
 already_coronated_trigger: "Já coroado"
 coronation_no_crown_trigger: "Sua fé exige uma [artifact|El] de coroa, que pode ser forjada por meio da [decision|El] [GetDecisionWithKey('commission_artifact_decision').GetName]"
 coronation_no_regalia_trigger: "Sua fé requer uma [artifact|El] de regalia, que pode ser forjada por meio da [decision|El] [GetDecisionWithKey('commission_artifact_decision').GetName]"
 coronation_no_crown_or_regalia_trigger: "Sua fé requer uma [artifact|El] de coroa ou vestes, que pode ser obtido por meio da [decision|El] [GetDecisionWithKey('commission_artifact_decision').GetName]"
 ## Intents
 # Host Intents
 coronation_impress_attendees: "Impressionar os presentes"
 coronation_impress_attendees_desc: "Você será a própria imagem de um soberano, o que lhe dará [legitimacy|lE], [cultural_acceptance|lE] e [coronation_magnificence|lE] [coronation_i].\n#EMP #low Esta [intent|lE] agrada [vassals|lE] do tipo [GetVassalStance( 'courtly' ).GetName|l] [GetVassalStance( 'courtly' ).GetTextIcon] e [GetVassalStance( 'minority' ).GetName|l] [GetVassalStance( 'minority' ).GetTextIcon].#!#!"
 coronation_embrace_supporters: "Receber os partidários"
 coronation_embrace_supporters_desc: "Seu regime será construído pelos leais, que colaborarão para lhe fazer ganhar [prestige|lE], formar [relations|lE] e enriquecer seus [realms|lE].\n#EMP #low Esta [intent|lE] agrada [coronation_supporters|lE], especialmente [vassals|lE] do tipo [GetVassalStance( 'glory_hound' ).GetName|l] [GetVassalStance( 'glory_hound' ).GetTextIcon] e [GetVassalStance( 'zealot' ).GetName|l] [GetVassalStance( 'zealot' ).GetTextIcon].#!#!"
 coronation_weaken_detractors: "Enfraquecer os detratores"
 coronation_weaken_detractors_desc: "Com sua coroação, começa a queda dos [claimants|lE] e a ruptura de [factions|lE] e [confederations|lE].\n#EMP #low Esta [intent|lE] prejudica [coronation_detractors|lE] e agrada [vassals|lE] que não sejam [coronation_detractor|lE] do tipo [GetVassalStance( 'belligerent' ).GetName|l] [GetVassalStance( 'belligerent' ).GetTextIcon].#!#!"
 coronation_exalt_crown: "Exaltar a coroa"
 coronation_exalt_crown_desc: "A reverência ao seu mandato concede aos locais de [coronation|lE], [artifacts|lE] e [oaths|lE] benefícios permanentes como [dynasty_prestige|lE].\n#EMP #low Esta [intent|lE] agrada [vassals|lE] do tipo [GetVassalStance( 'parochial' ).GetName|l] [GetVassalStance( 'parochial' ).GetTextIcon].#!#!"
 # Guest Intents
 coronation_bear_witness: "Dar testemunho"
 coronation_bear_witness_desc: "Ao comparecer a esta ocasião histórica, espera-se que você desfrute de [piety|lE], [legitimacy|lE] e [cultural_acceptance|lE]."
 coronation_seize_advantages: "Tomar vantagem"
 coronation_seize_advantages_desc: "[SelectLocalization( GetPlayer.GetGovernment.HasGovernmentFlag( 'government_is_administrative' ), 'seize_advantages_admin', 'seize_advantages_non_admin' )]"
 seize_advantages_admin: "Você não perde de vista as oportunidades para obter [gold|lE], [influence|lE] ou [claims|lE]."
 seize_advantages_non_admin: "Você não perde de vista as oportunidades para conseguir [gold|lE], [prestige|lE] ou [claims|lE]."
 coronation_offer_support: "Oferecer apoio"
 coronation_offer_support_desc: "Ao dar apoio firme à coroa, você espera ganhar [opinion|lE], uma [relation|lE] ou uma [alliance|lE] com quem a usa."
 coronation_advocate_domain: "Promover domínio"
 coronation_advocate_domain_desc: "Você pressiona seu soberano por políticas que fomentem o [development|lE], o [control|lE] e a [county_opinion|lE] em seu sub[realm|lE]."
 coronation_profess_rights: "Declarar direitos"
 coronation_profess_rights_desc: "Você se apresenta com uma determinação orgulhosa, exigindo de seu suserano um [hook|lE] de favor ou uma melhoria em seu [vassal_contract|lE]."
 coronation_disrupt_loyalists: "Desbaratar os leais"
 coronation_disrupt_loyalists_desc: "Você busca reduzir a [coronation_magnificence|lE] da coroação [coronation_i], inflamar as [factions|lE] e seu [discontent|lE], e criar problemas para o [activity_host|lE] e seus [coronation_supporters|lE]."
