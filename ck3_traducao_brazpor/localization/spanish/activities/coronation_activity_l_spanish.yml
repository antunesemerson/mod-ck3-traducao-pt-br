 OPINION_OF_HOST: "Opinião de [host|lE] de: [Character.GetOpinionOf( GetPlayer )|+=0]"
 PERSONAL_INTERACTIONS_CORONATION_BUTTON_TOOLTIP: "#T Mostrar interaÃ§Ãµes de [coronation|lE]#!"
 coronation_interaction_filter_tag_desc: "#S Interações de coroação#!"
 CORONATION_ACTIVITY_INTENT_TOOLTIP: "#T [ActivityIntent.GetName]#!\n[ActivityIntent.GetDescription]"
 CORONATION_ACTIVITY_INTENT_NAME: "#UND [ActivityIntent.GetName]#!"
 # Special Type Progression
 activity_coronation_special_type_title: "#UND Magnificência#!"
 activity_coronation_special_type_desc: "#T Magnificência#!\n $game_concept_coronation_magnificence_desc$"
 CORONATION_WINDOW_SPECIAL_PROGRESS_TOOLTIP: "[coronation_magnificence|E]: [ActivityWindow.GetSpecialProgressValue|0^V]"
 activity_coronation_special_type_bar_segment_tt_0: "#T Coroação simples#!\n$activity_coronation_special_type_bar_segment_tt_0_effects$\n$activity_coronation_special_type_bar_segment_tt_0_flavor$"
 activity_coronation_special_type_bar_segment_tt_0_effects: ""
 activity_coronation_special_type_bar_segment_tt_0_flavor: "#weak Uma coroação simples, uma tentativa patética de impressionar... Poucos consideram que ela tenha sustentado o novo monarca de forma convincente.#!"
 activity_coronation_special_type_bar_segment_tt_1: "#T Coroação modesta#!\n$activity_coronation_special_type_bar_segment_tt_1_effects$\n$activity_coronation_special_type_bar_segment_tt_1_flavor$"
 activity_coronation_special_type_bar_segment_tt_1_effects: "[CoronationRewardProgress('(CFixedPoint)25', 'activity_coronation_special_type_bar_segment_tt_1_progress')]$BULLET$ Recompensa de [oath|lE] em [legitimacy|lE] [legitimacy_i] e [prestige|lE] [prestige_i]: #P +25 %#!\n$BULLET$ Ganho de [opinion|lE] de [vassal|lE]s [guest|lE]s para intenção: #P +5#!\n"
 activity_coronation_special_type_bar_segment_tt_1_progress: "[coronation_magnificence|E]: #V [ActivityWindow.GetSpecialProgressValue|0]/25#!\n"
 activity_coronation_special_type_bar_segment_tt_1_flavor: "#weak Poucos falaram da modesta cerimônia depois que o dia acabou; ela não causou ofensa, mas também não tocou os corações.#!"
 activity_coronation_special_type_bar_segment_tt_2: "#T Coroação respeitável#!\n$activity_coronation_special_type_bar_segment_tt_2_effects$\n$activity_coronation_special_type_bar_segment_tt_2_flavor$"
 activity_coronation_special_type_bar_segment_tt_2_effects: "[CoronationRewardProgress('(CFixedPoint)50', 'activity_coronation_special_type_bar_segment_tt_2_progress')]$BULLET$ Recompensa de atividade em [legitimacy|lE] [legitimacy_i] e [prestige|lE] [prestige_i]: #P +50 %#!\n$BULLET$ Recompensa de [oath|lE] em [legitimacy|lE] [legitimacy_i] e [prestige|lE] [prestige_i]: #P +50 %#!\n$BULLET$ Ganho de [opinion|lE] de [vassal|lE]s [guest|lE]s para intenção: #P +10#!\n"
