 # Host activity rewards
 coronation_events.0310.t: "A intenção [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 coronation_events.0310.desc.high_magnificence: "Trabalhei incansavelmente para promover a glória, para fomentar a grandiosidade de minha coroação. Os convidados estão ruborizados pela inspiração do que testemunharam aqui, irradiando admiração. Foi um começo digno do meu reinado como [ROOT.Char.GetTitleAsNameNoTooltip].\n\n"
 coronation_events.0310.desc.mid_magnificence: "Agora sou um[ROOT.Char.Custom('ES_XA')] verdadeiro[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]. Minha coroação provou ser digna do meu posto, um belo espetáculo para os convidados, muitos dos quais ainda permanecem por aqui na esperança de ouvir umas últimas palavras [ROOT.Char.Custom('GetTitleTierAdjective')] finais.\n\n"
 coronation_events.0310.desc.low_magnificence: "As celebrações estão chegando ao fim. Houve muitos cochichos sobre o caos, a tensão, as acomodações improvisadas. Talvez eu esteja agora com calúnias ecoando nos ouvidos e comida passada e azeda na barriga..., mas o que realmente importa é que, enfim, sou um verdadeir[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip].\n\n"
 coronation_events.0310.desc.impress_attendees: "Do começo ao fim, não poupei esforços para impressionar todos os meus convidados — amigos e inimigos por igual! Mas minha presença imparcial, meu foco absoluto no sucesso deste grande encontro…\n\nPara que tudo isso serviu?"
 coronation_events.0310.desc.weaken_detractors: "Detratores impertinentes de coração [first_char.Custom('InsultAdjective')], [first_char.GetName] e [second_char.GetName] entre eles, tiveram a audácia de assistir à minha coroação… e [Select_CString(And(first_char.IsFemale, second_char.IsFemale), 'as', 'os')] recebi com o mau humor [ROOT.Char.Custom('GetTitleTierAdjective')] que merecem! Vieram para revelar minha fraqueza, mas encontraram apenas um desprezo frio e uma resolução de ferro.\n\nTalvez eu devesse desferir um golpe final e mordaz…"
 coronation_events.0310.desc.embrace_supporters: "A cada oportunidade que tive, favoreci os mais leais a mim, à minha coroa. Juntos, meus partidários e eu tramamos, planejamos e nos gabamos de nossa confiança mútua. [first_char.GetName], [second_char.GetName] e os demais passaram a fazer parte do meu círculo mais íntimo.\n\nSua confiança poderia se tornar algo mais substancial."
 coronation_events.0310.desc.exalt_crown: "Permaneço fiel à minha crença de que a glória da coroa é tudo. As provações que enfrentei neste lugar, as mesquinhas intrigas internas… problemas passageiros, mas [ROOT.Char.GetPrimaryTitle.GetNameNoTier] persistirá! Imprimi esta grande crença em meus convidados, e sua fé no reino cresceu.\n\nMas com que finalidade vai toda essa exaltação?"
