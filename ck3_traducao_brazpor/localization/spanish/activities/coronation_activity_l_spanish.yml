 coronation_events.0300.desc: "Antes que a coroação prossiga, devo decidir quem presidirá os ritos sagrados. Se quiser conquistar o favor dos [ROOT.Char.GetFaith.AltPriestTermPlural], seria prudente deixar um deles supervisionar a cerimônia, concedendo-lhe a santidade e a bênção que só eles podem proporcionar.

Ainda assim, uma parte de mim se pergunta: não seria uma história muito mais grandiosa se eu tomasse a coroa com minhas próprias mãos e proclamasse meu direito de governar sem intercessão?"
