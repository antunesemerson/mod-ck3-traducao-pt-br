 # Greatest Hunter
 coronation_events.0100.greatest_hunter: "O Juramento"
 coronation_events.0100.greatest_hunter_flavor: "[activity.GetHost.GetFirstName] se apresenta diante da multidão enquanto todos aguardam seu juramento.\n\n"
 # Heir Preparation
 coronation_events.0100.heir_preparation: "#emp Nenhum reino prospera sozinho. O poder não reside apenas nos exércitos, mas nos laços de confiança, nos pactos forjados com palavras e vontade.\n\nDesde [activity.GetHost.GetCapitalLocation.GetName], estenderei a mão da amizade para tecer alianças que protejam [activity.GetHost.GetPrimaryTitle.GetNameNoTier] por gerações.#!"
 coronation_events.0100.heir_preparation_flavor: "#emp A força de um senhorio não reside apenas nas alianças conquistadas, mas na silenciosa promessa de continuidade. Garantindo que a casa [activity.GetHost.GetHouse.GetName] perdure, proporcionarei ao senhorio alicerces tão firmes quanto a rocha.\n\nPor meio de nossos filhos, a linhagem dos [activity.GetHost.GetHouse.GetName] permanecerá ininterrupta, preservando a estabilidade e guiando o senhorio para superar tudo o que possa vir.#!"
 # Install Claimants
 coronation_events.0100.install_claimants: "#emp Hoje me apresento não apenas para governar, mas para construir. Não apenas para conservar o que existe, mas para criar o que pode existir. [activity.GetHost.GetPrimaryTitle.GetNameNoTier] não pode ser confinado à memória ou aos mapas, deve crescer.\n\nPelo nosso futuro e pelo futuro do nosso povo.#!"
 coronation_events.0100.install_claimants_flavor: "#emp Faz tempo demais que as terras que pertencem a [activity.GetHost.GetPrimaryTitle.GetNameNoTier] têm sofrido o domínio de mãos inferiores. Aqueles que confundiram posse com legitimidade.\n\nIsso termina agora. Desde [activity.GetHost.GetCapitalLocation.GetName], conhecerão o que é a verdadeira governança. Por mim.#!"
 # Mend the Fracture
 coronation_events.0100.mend_the_fracture: "#emp "Um governante deve fazer algo mais do que defender as fronteiras, deve fazer com que valha a pena viver dentro delas. Guardarei a paz, cuidarei do reino e não planejarei guerras, mas sim crescimento.\n\nDesde [activity.GetHost.GetCapitalLocation.GetName], farei com que [activity.GetHost.GetPrimaryTitle.GetNameNoTier] alcance uma nova era dourada."#!"
 coronation_events.0100.mend_the_fracture_flavor: "#emp "Nem todos os legados nascem da guerra. Alguns são trabalhados em pedra, com suor e propósito. Darei uma nova forma a [activity.GetHost.GetPrimaryTitle.GetNameNoTier] com monumentos dignos do futuro.\n\nDesde [activity.GetHost.GetCapitalLocation.GetName], levantarei um senhorio que não apenas perdure, mas que entre numa era de ouro moldada pelo cuidado e pela visão."#!"
 # Provide for the Warriors
 coronation_events.0100.provide_for_the_warriors: "Apoiar meus [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l]"
 coronation_events.0100.provide_for_the_warriors_flavor: "#emp "Que nenhum governante confunda ignorância com força. Um reino guiado pelo conhecimento durará mais do que qualquer outro erigido apenas pelo medo.\n\nA partir de [activity.GetHost.GetCapitalLocation.GetName], reunirei as melhores mentes e, por meio de seu conselho, moldarei o futuro de [activity.GetHost.GetPrimaryTitle.GetNameNoTier]."#!"
 # Provide for the Faithful
 coronation_events.0100.provide_for_the_faithful: "#emp Os falsos aspirantes a [activity.GetHost.GetPrimaryTitle.GetName|l] se multiplicaram como ratos nos esgotos. E, como vermes, devem ser exterminados.#!"
 coronation_events.0100.provide_for_the_faithful_flavor: "Faço um juramento de patronato aos fiéis [ROOT.Char.GetPrimaryTitle.GetAdherentNamePlural]."
 # Provide for the Poor
 coronation_events.0100.provide_for_the_poor: "Providenciar para os pobres"
 coronation_events.0100.provide_for_the_poor_flavor: "#emp A caça não é apenas uma prova de habilidade, mas uma celebração da vida e da natureza. Eu me tornarei [activity.GetHost.Custom('ES_ElLa')] o melhor entre [Select_CString(ROOT.Char.IsFemale, 'as caçadoras', 'os caçadores' )], [Select_CString(ROOT.Char.IsFemale, 'senhora', 'senhor' )] das zonas selvagens e [Select_CString(ROOT.Char.IsFemale, 'autêntica soberana', 'autêntico soberano' )] do coração indômito de [activity.GetHost.GetPrimaryTitle.GetNameNoTier].#!"
 # Repent
 coronation_events.0100.repent: "#emp "Sem um herdeiro formal, os [activity.GetHost.GetDynasty.GetName] estamos condenados ao esquecimento. Eu dirigirei a educação do meu herdeiro, incutindo-lhe os valores e a sabedoria necessários para elevar a dinastia [activity.GetHost.GetDynasty.GetName] a novas alturas."#!"
 coronation_events.0100.repent_flavor: "Juro arrepender-me dos meus pecados."
 coronation_events.0100.opt_out: "#emp O direito legítimo ao trono não é apenas uma questão de linhagem, mas de justiça. Colocarei os pretendentes legítimos em seus tronos, deporei os usurpadores e restaurarei a ordem.#!"
 coronation_events.0110.t: "O Juramento"
 coronation_events.0110.desc.intro: "#emp A fratura cultural do senhorio tem causado discórdia por tempo demais. Unirei os povos sob o estandarte comum de [activity.GetHost.GetHouse.GetName], ao mesmo tempo em que preservarei suas identidades intactas.#!"
 ## Diplomacy
 coronation_events.0110.desc.diplomacy_oath_1: "#emp Os guerreiros de [activity.GetHost.GetPrimaryTitle.GetNameNoTier] são minha espada e meu escudo. Vou garantir que estejam bem equipados e prontos para defender nossas terras.#!"
 coronation_events.0110.desc.diplomacy_oath_2: "#emp A força de um senhorio não reside apenas nas alianças conquistadas, mas na silenciosa promessa de continuidade. Garantindo que a casa [activity.GetHost.GetHouse.GetName] perdure, proporcionarei ao senhorio alicerces tão firmes quanto a rocha.\n\nPor meio de nossos filhos, a linhagem dos [activity.GetHost.GetHouse.GetName] permanecerá ininterrupta, preservando a estabilidade e guiando o senhorio para superar tudo o que possa vir.#!"
 ## Martial
 coronation_events.0110.desc.martial_oath_1: "#emp Hoje me apresento não apenas para governar, mas para construir. Não apenas para conservar o que existe, mas para criar o que pode existir. [activity.GetHost.GetPrimaryTitle.GetNameNoTier] não pode ser confinado à memória ou aos mapas, deve crescer.\n\nPelo nosso futuro e pelo futuro do nosso povo.#!"
 coronation_events.0110.desc.martial_oath_2: "#emp Os pobres de [activity.GetHost.GetPrimaryTitle.GetNameNoTier] são o sal da terra, a luz do mundo. Trabalham em silêncio para o benefício de todos. Farei com que até os mais pobres do meu senhorio possam viver com dignidade e esperança.#!"
 ## Stewardship
 coronation_events.0110.desc.stewardship_oath_1: "#emp O que pode mudar a natureza [activity.GetHost.Custom('ES_DelDela')] [activity.GetHost.GetWomanMan]? Basta a minha vontade? Posso convencer outros [activity.GetHost.GetFaith.GetAdherentNamePlural], posso convencer [activity.GetHost.GetFaith.HighGodName] de que realmente me arrependo dos meus pecados? Tentar pode ser uma tolice, mas não tentar seria o maior dos pecados.#!"
 coronation_events.0110.desc.stewardship_oath_2: "#emp "Nem todos os legados nascem da guerra. Alguns são trabalhados em pedra, com suor e propósito. Darei uma nova forma a [activity.GetHost.GetPrimaryTitle.GetNameNoTier] com monumentos dignos do futuro.\n\nDesde [activity.GetHost.GetCapitalLocation.GetName], levantarei um senhorio que não apenas perdure, mas que entre numa era de ouro moldada pelo cuidado e pela visão."#!"
 ## Intrigue
 ## Learning
 coronation_events.0110.desc.learning_oath_1: "#emp Eu... isto... juro os juramentos próprios do meu [activity.GetHost.GetTierAsName] de [activity.GetHost.GetPrimaryTitle.GetNameNoTier]... A partir de agora agirei conforme exigirem os [activity.GetHost.GetFaith.AltPriestTermPlural] e responderei quando o domínio clamar por seu [activity.GetHost.GetTierAsNameNoTooltip|l], e assim por diante...#!"
 ## Purge Pretenders
 coronation_events.0110.desc.purge_pretenders_oath: "Veremos se [activity.GetHost.GetSheHe] faz jus a estas palavras…"
 ## End the Struggle
 coronation_events.0110.desc.end_the_struggle_oath: "#emp Esta contenda de [activity.GetHost.MakeScope.Var('end_the_struggle_oath_type_var').Struggle.GetName] tem sangrado lentamente gerações de bons [activity.GetHost.GetCulture.GetCollectiveNoun]. Acabou. Porei um fim definitivo a este desperdício sem sentido de recursos e trarei uma nova era de prosperidade compartilhada na região. Com a ajuda de [activity.GetHost.GetFaith.HighGodName].#!"
 ## Greatest Hunter
 coronation_events.0110.desc.greatest_hunter_oath: "Ouço os cochichos atrás de portas fechadas. Vejo a decepção gravada em seus olhos. E sinto o peso da vergonha me esmagando.

Todos sabem: eu falhei. Quebrei o juramento que jurei cumprir, uma promessa que havia feito a todos os meus súditos.

Como vou encará-los agora? Como suportarei esta desgraça?"
 ## Heir Preparation
 coronation_events.0110.desc.heir_preparation_oath: "Que sussurrem. Que me encarem com seu orgulho ferido e sua decepção vazia. Eu o vejo. Sinto o julgamento deles como uma lâmina às minhas costas.\n\nMas vergonha? Não, isso é para aqueles que algum dia pretenderam cumprir suas promessas.\n\nUm juramento só é sagrado para os tolos."
 ## Install Claimants
 coronation_events.0110.desc.install_claimants_oath: "Como viverei com esta vergonha?"
 ## Mend the Fracture
 coronation_events.0110.desc.mend_the_fracture_oath: "Todo [vassal|lE], [courtier|lE] ou [guest|lE]"
 ## Provide for the Warriors
 coronation_events.0110.desc.provide_for_the_warriors_oath: "Minha obra está feita, exatamente como disse que faria. Ouvi as zombarias dos meus detratores, sua certeza de que eu fracassaria quando fiz meu juramento.\n\nMas provei que estavam errados. As vozes de meus duvidadores mudaram, e agora me concedem a honra que antes julgaram estar além do meu alcance.\n\nDesponta um novo dia…"
 ## Provide for the Faithful
 coronation_events.0110.desc.provide_for_the_faithful_oath: "#emp Os fiéis de [activity.GetHost.GetPrimaryTitle.GetNameNoTier] são a base do meu domínio. Farei com que suas necessidades terrenas sejam satisfeitas para que possam concentrar-se em ser servos devotos de [ROOT.Char.GetFaith.HighGodName], centrados na salvação do meu [activity.GetHost.GetPrimaryTitle.GetTierAsName].#!"
 ## Provide for the Poor
 coronation_events.0110.desc.provide_for_the_poor_oath: "Faço um [oath|lE] para #V Fortalecer a Casa#!:
	$EFFECT_LIST_BULLET$É preciso ter pelo menos #V 7#! [children|lE] [legitimate|lE]s #weak (atualmente [host.MakeScope.ScriptValue('children_oath_value')|V0]/#V 7#!)#!
	$EFFECT_LIST_BULLET$Deve ser concluído em #V 30 anos#!
	$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [dynasty_prestige|lE] [dynasty_prestige_i] e [GetModifier('oath_of_children').GetNameWithTooltip|l]"
 ## Repent
 coronation_events.0110.desc.repent_oath: "Juro um [oath|lE] para #V Consolidar [host.GetPrimaryTitle.GetNameNoTierNoTooltip]#!:
	$EFFECT_LIST_BULLET$[host.GetPrimaryTitle.GetName] precisa [Concept('completely_control', 'controlar totalmente')|E] suas fronteiras [de_jure|lE] #low (atualmente [host.MakeScope.ScriptValue('oath_reconquest_value_1')|V0]/[host.MakeScope.ScriptValue('oath_reconquest_value_2')|V0])#!
$EFFECT_LIST_BULLET$Deve ser concluído nos próximos #V 20 anos#!
$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i] e [GetModifier('oath_of_reconquest').GetNameWithTooltip|l]"
 ## Other
