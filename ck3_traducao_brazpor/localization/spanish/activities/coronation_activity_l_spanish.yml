 coronation_events.0110.t: "O Juramento"
 coronation_events.0110.desc.intro: "[activity.GetHost.GetFirstName] se apresenta diante da multidão enquanto todos aguardam seu juramento.\n\n"
 ## Diplomacy
 coronation_events.0110.desc.diplomacy_oath_1: "#emp Nenhum reino prospera sozinho. O poder não reside apenas nos exércitos, mas nos laços de confiança, nos pactos forjados com palavras e vontade.\n\nDesde [activity.GetHost.GetCapitalLocation.GetName], estenderei a mão da amizade para tecer alianças que protejam [activity.GetHost.GetPrimaryTitle.GetNameNoTier] por gerações.#!"
 coronation_events.0110.desc.diplomacy_oath_2: "#emp A força de um senhorio não reside apenas nas alianças conquistadas, mas na silenciosa promessa de continuidade. Garantindo que a casa [activity.GetHost.GetHouse.GetName] perdure, proporcionarei ao senhorio alicerces tão firmes quanto a rocha.\n\nPor meio de nossos filhos, a linhagem dos [activity.GetHost.GetHouse.GetName] permanecerá ininterrupta, preservando a estabilidade e guiando o senhorio para superar tudo o que possa vir.#!"
 ## Martial
 coronation_events.0110.desc.martial_oath_1: "#emp Hoje me apresento não apenas para governar, mas para construir. Não apenas para conservar o que existe, mas para criar o que pode existir. [activity.GetHost.GetPrimaryTitle.GetNameNoTier] não pode ser confinado à memória ou aos mapas, deve crescer.\n\nPelo nosso futuro e pelo futuro do nosso povo.#!"
 coronation_events.0110.desc.martial_oath_2: "#emp Faz tempo demais que as terras que pertencem a [activity.GetHost.GetPrimaryTitle.GetNameNoTier] têm sofrido o domínio de mãos inferiores. Aqueles que confundiram posse com legitimidade.\n\nIsso termina agora. Desde [activity.GetHost.GetCapitalLocation.GetName], conhecerão o que é a verdadeira governança. Por mim.#!"
 ## Stewardship
 coronation_events.0110.desc.stewardship_oath_1: "#emp \"Um governante deve fazer algo mais do que defender as fronteiras, deve fazer com que valha a pena viver dentro delas. Guardarei a paz, cuidarei do reino e não planejarei guerras, mas sim crescimento.\n\nDesde [activity.GetHost.GetCapitalLocation.GetName], farei com que [activity.GetHost.GetPrimaryTitle.GetNameNoTier] alcance uma nova era dourada.\"#!"
 coronation_events.0110.desc.stewardship_oath_2: "#emp \"Nem todos os legados nascem da guerra. Alguns são trabalhados em pedra, com suor e propósito. Darei uma nova forma a [activity.GetHost.GetPrimaryTitle.GetNameNoTier] com monumentos dignos do futuro.\n\nDesde [activity.GetHost.GetCapitalLocation.GetName], levantarei um senhorio que não apenas perdure, mas que entre numa era de ouro moldada pelo cuidado e pela visão.\"#!"
 ## Intrigue
 ## Learning
 coronation_events.0110.desc.learning_oath_1: "#emp \"Que nenhum governante confunda ignorância com força. Um reino guiado pelo conhecimento durará mais do que qualquer outro erigido apenas pelo medo.\n\nA partir de [activity.GetHost.GetCapitalLocation.GetName], reunirei as melhores mentes e, por meio de seu conselho, moldarei o futuro de [activity.GetHost.GetPrimaryTitle.GetNameNoTier].\"#!"
 ## Purge Pretenders
 coronation_events.0110.desc.purge_pretenders_oath: "#emp Os falsos aspirantes a [activity.GetHost.GetPrimaryTitle.GetName|l] se multiplicaram como ratos nos esgotos. E, como vermes, devem ser exterminados.#!"
 ## End the Struggle
 coronation_events.0110.desc.end_the_struggle_oath: "#emp Esta contenda de [activity.GetHost.MakeScope.Var('end_the_struggle_oath_type_var').Struggle.GetName] tem sangrado lentamente gerações de bons [activity.GetHost.GetCulture.GetCollectiveNoun]. Acabou. Porei um fim definitivo a este desperdício sem sentido de recursos e trarei uma nova era de prosperidade compartilhada na região. Com a ajuda de [activity.GetHost.GetFaith.HighGodName].#!"
 ## Greatest Hunter
 coronation_events.0110.desc.greatest_hunter_oath: "#emp A caça não é apenas uma prova de habilidade, mas uma celebração da vida e da natureza. Eu me tornarei [activity.GetHost.Custom('ES_ElLa')] o melhor entre [Select_CString(ROOT.Char.IsFemale, 'as caçadoras', 'os caçadores' )], [Select_CString(ROOT.Char.IsFemale, 'senhora', 'senhor' )] das zonas selvagens e [Select_CString(ROOT.Char.IsFemale, 'autêntica soberana', 'autêntico soberano' )] do coração indômito de [activity.GetHost.GetPrimaryTitle.GetNameNoTier].#!"
 ## Heir Preparation
 coronation_events.0110.desc.heir_preparation_oath: "#emp \"Sem um herdeiro formal, os [activity.GetHost.GetDynasty.GetName] estamos condenados ao esquecimento. Eu dirigirei a educação do meu herdeiro, incutindo-lhe os valores e a sabedoria necessários para elevar a dinastia [activity.GetHost.GetDynasty.GetName] a novas alturas.\"#!"
 ## Install Claimants
 coronation_events.0110.desc.install_claimants_oath: "#emp O direito legítimo ao trono não é apenas uma questão de linhagem, mas de justiça. Colocarei os pretendentes legítimos em seus tronos, deporei os usurpadores e restaurarei a ordem.#!"
 ## Mend the Fracture
 coronation_events.0110.desc.mend_the_fracture_oath: "#emp A fratura cultural do senhorio tem causado discórdia por tempo demais. Unirei os povos sob o estandarte comum de [activity.GetHost.GetHouse.GetName], ao mesmo tempo em que preservarei suas identidades intactas.#!"
 ## Provide for the Warriors
 coronation_events.0110.desc.provide_for_the_warriors_oath: "#emp Os guerreiros de [activity.GetHost.GetPrimaryTitle.GetNameNoTier] são minha espada e meu escudo. Vou garantir que estejam bem equipados e prontos para defender nossas terras.#!"
 ## Provide for the Faithful
 coronation_events.0110.desc.provide_for_the_faithful_oath: "#emp Os fiéis de [activity.GetHost.GetPrimaryTitle.GetNameNoTier] são a base do meu domínio. Farei com que suas necessidades terrenas sejam satisfeitas para que possam concentrar-se em ser servos devotos de [ROOT.Char.GetFaith.HighGodName], centrados na salvação do meu [activity.GetHost.GetPrimaryTitle.GetTierAsName].#!"
 ## Provide for the Poor
 coronation_events.0110.desc.provide_for_the_poor_oath: "#emp Os pobres de [activity.GetHost.GetPrimaryTitle.GetNameNoTier] são o sal da terra, a luz do mundo. Trabalham em silêncio para o benefício de todos. Farei com que até os mais pobres do meu senhorio possam viver com dignidade e esperança.#!"
 ## Repent
 coronation_events.0110.desc.repent_oath: "#emp O que pode mudar a natureza [activity.GetHost.Custom('ES_DelDela')] [activity.GetHost.GetWomanMan]? Basta a minha vontade? Posso convencer outros [activity.GetHost.GetFaith.GetAdherentNamePlural], posso convencer [activity.GetHost.GetFaith.HighGodName] de que realmente me arrependo dos meus pecados? Tentar pode ser uma tolice, mas não tentar seria o maior dos pecados.#!"
 ## Other
 coronation_events.0110.desc.fallback_compassionate: "#emp Juro cumprir todas as justas leis e costumes do povo [activity.GetHost.GetPrimaryTitle.GetAdjective]; governar com sabedoria gentil e julgar com graça misericordiosa.#!"
 coronation_events.0110.desc.fallback_honorable: "#emp Juro manter a paz e a concórdia dos [activity.GetHost.GetFaith.AltPriestTermPlural] [activity.GetHost.GetFaith.HighGodNamePossessive] em [activity.GetHost.GetPrimaryTitle.GetNameNoTier] e, por minha honra, conservar as liberdades e os direitos do meu povo.#!"
 coronation_events.0110.desc.fallback_feckless: "#emp Eu... isto... juro os juramentos próprios do meu [activity.GetHost.GetTierAsName] de [activity.GetHost.GetPrimaryTitle.GetNameNoTier]... A partir de agora agirei conforme exigirem os [activity.GetHost.GetFaith.AltPriestTermPlural] e responderei quando o domínio clamar por seu [activity.GetHost.GetTierAsNameNoTooltip|l], e assim por diante...#!"
 coronation_events.0110.desc.fallback: "#emp Pelo meu poder, juro fortuna a [activity.GetHost.GetPrimaryTitle.GetNameNoTier], respeito aos costumes do seu povo e glória ao [activity.GetHost.GetPrimaryTitle.GetTierAsNameNoTooltip].#!"
 coronation_events.0110.regular: "Veremos se [activity.GetHost.GetSheHe] faz jus a estas palavras…"
 coronation_events.0110.no_oath: "As palavras da cerimônia, não da história."
 coronation_events.0110.desc.outro: ""
 coronation_events.0150.t: "Juramento quebrado: [SCOPE.Custom('GetOathSpecific')|V]"
 coronation_events.0150.desc: "Ouço os cochichos atrás de portas fechadas. Vejo a decepção gravada em seus olhos. E sinto o peso da vergonha me esmagando.\n\nTodos sabem: eu falhei. Quebrei o juramento que jurei cumprir, uma promessa que havia feito a todos os meus súditos.\n\nComo vou encará-los agora? Como suportarei esta desgraça?"
 coronation_events.0150.desc_honest: "O poder veio com a promessa. Apresentei-me diante do reino e fiz um juramento em que eles acreditaram; um juramento em que #emp yo#! acreditava.\n\nAgora o trono parece mais tumba do que assento. Uma jaula dourada e fria que zomba de mim a cada respiração. E o pior de tudo é saber que tudo foi culpa minha."
 coronation_events.0150.desc_deceitful: "Que sussurrem. Que me encarem com seu orgulho ferido e sua decepção vazia. Eu o vejo. Sinto o julgamento deles como uma lâmina às minhas costas.\n\nMas vergonha? Não, isso é para aqueles que algum dia pretenderam cumprir suas promessas.\n\nUm juramento só é sagrado para os tolos."
 coronation_events.0150.a: "Que vexame…"
 coronation_events.0150.a_honest: "Como viverei com esta vergonha?"
 coronation_events.0150.a_deceitful: "As coisas são como são."
 coronation_events.150.custom_list_tooltip: "Todo [vassal|lE], [courtier|lE] ou [guest|lE]"
 coronation_events.0175.t: "Juramento cumprido: [SCOPE.Custom('GetOathSpecific')|V]"
 coronation_events.0175.desc: "Minha obra está feita, exatamente como disse que faria. Ouvi as zombarias dos meus detratores, sua certeza de que eu fracassaria quando fiz meu juramento.\n\nMas provei que estavam errados. As vozes de meus duvidadores mudaram, e agora me concedem a honra que antes julgaram estar além do meu alcance.\n\nDesponta um novo dia…"
 coronation_events.0175.a: "E meu [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], que é ainda mais forte, está pronto para enfrentá-lo!"
 ## Diplomacy
 diplomacy_oath_1_tooltip: "Juro um [oath|lE] para #V Garantir Alianças#!:\n	$EFFECT_LIST_BULLET$É preciso ter pelo menos #V 3#! [alliances|lE] com [rulers|lE] que:\n		$EFFECT_LIST_BULLET$Tenham pelo menos #V 50#! de [opinion|lE] sobre #V você#!\n		$EFFECT_LIST_BULLET$Uma das opções a seguir:\n			$EFFECT_LIST_BULLET$Um [title_tier|lE] inferior\n			$EFFECT_LIST_BULLET$O mesmo [title_tier|lE]\n			$EFFECT_LIST_BULLET$Um [title_tier|lE] superior\n	$EFFECT_LIST_BULLET$Precisa ser concluído em #V 20 anos#!\n	$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [opinion|lE] [opinion_i], [cultural_acceptance|lE] [cultural_acceptance_i] e [GetModifier('oath_of_alliances').GetNameWithTooltip|l]"
 diplomacy_oath_2_tooltip: "Faço um [oath|lE] para #V Fortalecer a Casa#!:\n	$EFFECT_LIST_BULLET$É preciso ter pelo menos #V 7#! [children|lE] [legitimate|lE]s #weak (atualmente [host.MakeScope.ScriptValue('children_oath_value')|V0]/#V 7#!)#!\n	$EFFECT_LIST_BULLET$Deve ser concluído em #V 30 anos#!\n	$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [dynasty_prestige|lE] [dynasty_prestige_i] e [GetModifier('oath_of_children').GetNameWithTooltip|l]"
 ## Martial
 martial_oath_1_tooltip: "Juro um [oath|lE] para #V Consolidar [host.GetPrimaryTitle.GetNameNoTierNoTooltip]#!:\n	$EFFECT_LIST_BULLET$[host.GetPrimaryTitle.GetName] precisa [Concept('completely_control', 'controlar totalmente')|E] suas fronteiras [de_jure|lE] #low (atualmente [host.MakeScope.ScriptValue('oath_reconquest_value_1')|V0]/[host.MakeScope.ScriptValue('oath_reconquest_value_2')|V0])#!\n$EFFECT_LIST_BULLET$Deve ser concluído nos próximos #V 20 anos#!\n$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i] e [GetModifier('oath_of_reconquest').GetNameWithTooltip|l]"
 oath_reconquest_tooltip: "[Concept('completely_control', 'Control total ')|E] de [THIS.Var('oath_reconquest_title').Title.GetName] [de_jure|lE] #low ([root_scope.MakeScope.ScriptValue('oath_reconquest_value_1')]/[root_scope.MakeScope.ScriptValue('oath_reconquest_value_2')])#!"
 martial_oath_2_tooltip: "Faço um [oath|lE] para #V Expandir o Senhorio#!:\n	$EFFECT_LIST_BULLET$O [realm|lE] deve ter tamanho de pelo menos [host.MakeScope.ScriptValue('oath_conquest_value_1')|V0] #low (atualmente [host.MakeScope.ScriptValue('oath_conquest_value_2')|V0])#!\n$EFFECT_LIST_BULLET$Deve ser concluído dentro de #V 20 anos#!\n$EFFECT_LIST_BULLET$Escolha entre um benefício para a [capital|lE] e [titles|lE] que mudam para [de_jure|lE]\n$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i] e [GetModifier('oath_of_conquest').GetNameWithTooltip]"
 ## Stewardship
 stewardship_oath_1_tooltip: "Juro um [oath|lE] para #V Garantir a Paz#!:\n	$EFFECT_LIST_BULLET$É preciso ter pelo menos #V 5 anos#! de paz contínua\n	$EFFECT_LIST_BULLET$Deve ser concluído em #V 50 anos#!\n	$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [development|lE] [development_i] e [GetModifier('oath_of_peace').GetNameWithTooltip|l]"
 stewardship_oath_2_tooltip: "Faço um [oath|lE] para #V dar forma ao senhorio#!;\n\t $EFFECT_LIST_BULLET$ É necessário construir ou aprimorar pelo menos #V 8#! [buildings|lE]\n\t $EFFECT_LIST_BULLET$ Deve ser concluído em #V 20 anos#!\n\t $EFFECT_LIST_BULLET$ Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [development|lE] [development_i] e [GetModifier('oath_of_buildings').GetNameWithTooltip]"
 ## Intrigue
 ## Learning
 learning_oath_1_tooltip: "Juro um [oath|lE] para #V Promover o Esclarecimento#!:[SelectLocalization( GreaterThan_CFixedPoint( GetPlayer.MakeScope.Var('learning_oath_1_university_exists').GetValue, '(CFixedPoint)0' ), 'learning_oath_1_tooltip_need_university', 'learning_oath_1_tooltip_need_development' )]\n	$EFFECT_LIST_BULLET$É necessário ter pelo menos #V [learning_oath_temp_cost]#! de [gold|lE] [gold_i]\n	$EFFECT_LIST_BULLET$É preciso cumprir #V 1#! destes requisitos:\n			$EFFECT_LIST_BULLET$Ter um [education_trait|lE] de quinto nível\n			$EFFECT_LIST_BULLET$Todo [councillor|lE] possui uma habilidade de #V 20#! ou superior para sua função\n	$EFFECT_LIST_BULLET$Deve ser concluído em #V 50 anos#!\n	$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i] e [SelectLocalization( GreaterThan_CFixedPoint( GetPlayer.MakeScope.Var('learning_oath_1_university_exists').GetValue, '(CFixedPoint)0' ), 'learning_oath_1_tooltip_university', 'learning_oath_1_tooltip_no_university' )]"
 learning_oath_1_tooltip_university: "[GetModifier('oath_university_county').GetNameWithTooltip|l]"
 learning_oath_1_tooltip_no_university: "uma [GetBuilding('generic_university').GetName|l]"
 learning_oath_1_tooltip_need_university: "\n\t $EFFECT_LIST_BULLET$ É preciso ter um [county|lE] com uma [GetBuilding('generic_university').GetName|l] e um [development|lE] [development_i] de #V 30#! ou mais"
 learning_oath_1_tooltip_need_development: "\n	$EFFECT_LIST_BULLET$ Precisa ter um [county|lE] com um [development|lE] [development_i] de #V 30#! ou mais"
 #Purge Pretenders
 purge_pretenders_oath_tooltip: "Juro um [oath|lE] para #V purgar os pretendentes#!:\n\t $EFFECT_LIST_BULLET$ Não pode existir nenhum [claimant|lE] ao seu [primary_title|lE] exceto seus [children|lE]\n\t $EFFECT_LIST_BULLET$ Deve ser concluído em até #V 50 anos#!\n\t $EFFECT_LIST_BULLET$ Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i] e [GetModifier('oath_of_purge_pretenders').GetNameWithTooltip].\n\t $EFFECT_LIST_BULLET$[SelectLocalization(GetPlayer.GetGovernment.IsType('nomad_government'), 'purge_pretenders_oath_nomad', '')][SelectLocalization(GetPlayer.GetGovernment.IsType('administrative_government'), 'purge_pretenders_oath_admin', '')][SelectLocalization(Not(Or(GetPlayer.GetGovernment.IsType('nomad_government'), GetPlayer.GetGovernment.IsType('administrative_government'))), 'purge_pretenders_oath_default', '')]"
 purge_pretenders_oath_admin: "Sua [house|lE] recebe o [modifier|lE] [GetModifier('oath_of_purge_pretenders_house').GetNameWithTooltip]"
 purge_pretenders_oath_nomad: "Sua pontuação por [obedience|lE] de [kurultai|lE] e [children|lE] : #P +100#!"
 purge_pretenders_oath_default: "Você recebe [GetLaw('single_heir_succession_law').GetName]. No momento da morte, a [law|lE] será redefinida para a atual."
 # End the Struggle
 end_the_struggle_oath_tooltip: "Faço um [oath|lE] para #V terminar a contenda#!:\n\t $EFFECT_LIST_BULLET$ É preciso tomar qualquer uma das [Concept('decision', 'decisões')|E] que encerram a [struggle|lE]\n\t $EFFECT_LIST_BULLET$ Deve ser concluído em #V 20 anos#!\n\t $EFFECT_LIST_BULLET$ Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i] e [GetModifier('oath_of_end_the_struggle').GetNameWithTooltip]."
 # Greatest Hunter
 greatest_hunter_oath_tooltip: "Juro um [oath|lE] para #V tornar-me [ROOT.Char.Custom('ES_ElLa')] melhor entre [Select_CString(ROOT.Char.IsFemale, 'as caçadoras', 'os caçadores' )]#!:\n	$EFFECT_LIST_BULLET$É necessário sediar e concluir com sucesso ao menos #V 1#! [Concept( 'activity', 'caçada' )|E] #V lendária#! ou #V 10#! [Concept( 'activity', 'caçadas' )|E] normais. Aumenta a probabilidade de #V avistamentos lendários#! enquanto este [oath|lE] estiver ativo.\n	$EFFECT_LIST_BULLET$Deve ser concluído em #V 40 anos#!\n	$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [modifiers|lE] únicos para um [artifact|lE] do tipo #V arco#! e [GetModifier('oath_greatest_hunter').GetNameWithTooltip]."
 # Heir Preparation
 heir_preparation_oath_tooltip: "Faço um [oath|lE] para #V preparar o herdeiro#!:\n\t $EFFECT_LIST_BULLET$ É preciso ter um [primary_heir|lE] com #V +10#! em todas as [skills|lE] e pelo menos duas [skills|lE] com #V +14#!.\n\t $EFFECT_LIST_BULLET$ Precisa ser concluído em #V 40 anos#!\n\t $EFFECT_LIST_BULLET$ Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i] e [GetModifier('oath_heir_preparation').GetNameWithTooltip]. O [primary_heir|lE] receberá [GetModifier('oath_heir_preparation_heir').GetNameWithTooltip]"
 # Install Claimants
 install_claimants_oath_tooltip: "Juro um [oath|lE] para #V instalar pretendentes#!\n\t $EFFECT_LIST_BULLET$ É preciso vencer pelo menos #V 3#! [wars|lE] de [claimant|lE]\n\t $EFFECT_LIST_BULLET$ Deve ser concluído em #V 20 anos#!\n\t $EFFECT_LIST_BULLET$ Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [GetModifier('oath_install_claimants').GetNameWithTooltip] e um [perpetual_hook|lE] sobre cada [claimant|lE] instalado e um [weak_hook|lE] sobre seus [primary_heirs|lE]."
 # Mend the Fracture
 mend_the_fracture_oath_tooltip: "Faço um [oath|lE] para #V Reparar a Fratura#!:\n	$EFFECT_LIST_BULLET$É preciso ter pelo menos #V 70#! de [cultural_acceptance|lE] com uma [culture|lE] que ocupe mais de #V 40%#! do meu [realm|lE].\n	$EFFECT_LIST_BULLET$Precisa ser concluído em #V 20 anos#!\n	$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [GetModifier('oath_mend_the_fracture').GetNameWithTooltip] e ambas as culturas ganham a [culture_tradition|lE] [GetCultureTradition('oath_mend_the_fracture_tradition').GetName]."
 # Provide for the Warriors
 provide_for_the_warriors_oath_tooltip: "Faço um [oath|lE] para #V Prover aos Guerreiros#!:\n	$EFFECT_LIST_BULLET$É necessário construir pelo menos #V 3#! edifícios de [GetBuilding('oath_warriors_building_02').GetName|l]. Desbloqueia o acesso a esta linha de [buildings|lE] enquanto o [oath|lE] estiver ativo.\n	$EFFECT_LIST_BULLET$Deve ser concluído em #V 20 anos#!\n	$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [GetModifier('oath_provide_for_the_warriors').GetNameWithTooltip] e desbloqueia a melhoria final: [GetBuilding('oath_warriors_building_04').GetName]."
 # Provide for the Faithful
 provide_for_the_faithful_oath_tooltip: "Juro um [oath|lE] para #V Prover aos Fiéis#!:\n	$EFFECT_LIST_BULLET$É necessário construir pelo menos #V 3#! edifícios de [GetBuilding('oath_faithful_building_02').GetName|l]. Desbloqueia o acesso a esta linha de [buildings|lE] enquanto o [oath|lE] estiver ativo.\n	$EFFECT_LIST_BULLET$Deve ser concluído em #V 20 anos#!\n	$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [GetModifier('oath_provide_for_the_faithful').GetNameWithTooltip] e desbloqueia a melhoria final: [GetBuilding('oath_faithful_building_04').GetName]."
 # Provide for the Poor
 provide_for_the_poor_oath_tooltip: "Faço um [oath|lE] para #V Prover aos Pobres#!:\n	$EFFECT_LIST_BULLET$É necessário construir pelo menos #V 3#! edifícios de [GetBuilding('oath_poor_building_02').GetName|l]. Desbloqueia o acesso a esta linha de [buildings|lE] enquanto o [oath|lE] estiver ativo.\n	$EFFECT_LIST_BULLET$Precisa ser concluído em #V 20 anos#!\n	$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [GetModifier('oath_provide_for_the_poor').GetNameWithTooltip] e desbloqueia a melhoria final: [GetBuilding('oath_poor_building_04').GetName]."
 # Repent
 repent_oath_tooltip: "Faço um [oath|lE] de #V Arrependimento#!:\n	$EFFECT_LIST_BULLET$É preciso completar pelo menos #V 4#! [pilgrimages|lE] e ter [GetModifier( 'piety_level_3' ).GetNameWithTooltip|L]\n	$EFFECT_LIST_BULLET$Deve ser cumprido em #V 20 anos#!\n	$EFFECT_LIST_BULLET$Recompensas: [legitimacy|lE] [legitimacy_i], [prestige|lE] [prestige_i], [GetModifier('oath_repent').GetNameWithTooltip] e remove qualquer [trait|lE] [sinful|lE], substituindo por [Concept('traits', 'traços')|E] [Concept('virtuous', 'virtuosos')|E]."
 coronation_events.0200.t: "O prelúdio"
 coronation_events.0200.desc.host: "Os convidados chegaram. De perto, de longe, por lealdade ou curiosidade. A multidão cresce com rostos marcados por expectativa, cálculo e, em alguns casos, o mais leve calor.\n\nErgo a voz o suficiente para acalmar os presentes e lhes dar as boas-vindas à minha coroação."
 coronation_events.0200.desc.guest: "A reunião é tão grandiosa quanto o esperado. Rostos familiares e estrangeiros se misturam, e ouço saudações calorosas o bastante para serem educadas. Quando o anfitrião fala, a sala se cala por instinto.\n\n\"Meus amigos, meus vassalos, meus parentes, sua presença me honra mais do que qualquer coroa poderia. Até o início da cerimônia, comam, bebam, conversem livremente... e saibam que vejo cada um de vocês, e não esquecerei quem esteve aqui comigo hoje.\"\n\nUma promessa gentil, ou um aviso silencioso, dependendo de como se escolha ouvi-la."
 coronation_events.0200.a: "Sejam todos bem-vindos!"
 coronation_events.0200.b: "Bem, quem mais está aqui?"
 coronation_events.0205.t: "A cerimônia"
 coronation_events.0205.meager: "Todos os preparativos foram concluídos. A escassa assembleia cerimonial aguarda em"
 coronation_events.0205.great: "Todos os preparativos estão concluídos. A grande assembleia cerimonial agora aguarda em"
 coronation_events.0205.hagia_sophia: "Santa Sofia, o lugar da Santa Sabedoria de Deus."
 coronation_events.0205.st_peters: "a Basílica de São Pedro, o lar do principal vigário de Cristo."
 coronation_events.0205.saint_denis: "a Basílica de Saint-Denis, túmulo do santo padroeiro do povo francês."
 coronation_events.0205.westminster: "a graciosa Abadia de Westminster."
 coronation_events.0205.reims: "Nossa Senhora de Reims, a catedral dos reis."
 coronation_events.0205.aachen: "o lendário palácio de Carlos Magno em Aachen."
 coronation_events.0205.wawel: "A Catedral de Wawel, bela e duradoura."
 coronation_events.0205.east_admin_location: "a serena quietude do complexo palaciano de [location.GetTitle.GetNameNoTier]."
 coronation_events.0205.temple: "o/a grande [host.GetFaith.HouseOfWorship] de [location.GetTitle.GetNameNoTier]."
 coronation_events.0205.east_admin_description: "\n\nCom o bater de grandes tambores,"
 coronation_events.0205.silence: "\n\nEm um silêncio frio,"
 coronation_events.0205.cheers: "\n\nEntre vivas e exaltação,"
 coronation_events.0205.desc.host_east_asian: "minha procissão espiritual [ROOT.Char.Custom('GetTitleTierAdjective')] atravessa fileiras sucessivas de meus [host.Custom('GetFighterTermPlural')] e funcionários. Atrás de nós, deixamos o santuário ancestral da minha família, onde foram realizados os primeiros ritos do dia."
 coronation_events.0205.desc.guest_east_asian: "a procissão espiritual [ROOT.Char.Custom('GetTitleTierAdjective')] [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] atravessa fileiras sucessivas de seus [host.Custom('GetFighterTermPlural')] e funcionários. Atrás de nós, deixamos o santuário ancestral [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip|l], onde os primeiros rituais do dia foram realizados."
 coronation_events.0205.desc.host: "minha procissão abre caminho entre a multidão que abarrota tal [ROOT.Char.Custom('SettlementCity')|l]; meus melhores [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] cavalgam à minha frente, com minha casa de [ROOT.Char.Custom('GetTitleTierAdjective')] atrás."
 coronation_events.0205.desc.guest: "a procissão [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] abre caminho entre a multidão, e minha comitiva me segue em nosso lugar de honra."
 coronation_events.0205.desc.low_magnificence_east_asian: "\n\nUm ar sinistro pairava sobre os rituais. Como os ancestrais dos [host.GetDynastyHouseName] desta ascensão incerta não se envergonhariam?"
 coronation_events.0205.desc.medium_magnificence_east_asian: "\n\nUm sentimento esperançoso paira no ar. A longa veneração ritual da manhã fez seu trabalho auspicioso e vinculou esta cerimônia ao passado antigo."
 coronation_events.0205.desc.high_magnificence_east_asian: "\n\nUma veneração maravilhosa elevou os rituais da manhã, levada às alturas pelo incenso fragrante e nascida do orgulho certo dos ancestrais [host.GetDynastyHouseName]."
 coronation_events.0205.desc.low_magnificence: "Alguns [host.Custom('GetLocalCommonerTermPlural')] nos encaram sem entender, outros murmuram com desdém. Alguém grita #EMP \"[Select_CString( host.IsFemale, 'A falsa', 'O falso' )] [host.GetTitleAsName|l]!\"#! e a turba avança, mal contida pelos poucos [host.Custom('GetFighterTermPlural')] que se alinham no caminho."
 coronation_events.0205.desc.medium_magnificence: "[host.Custom('GetLocalCommonerTermPlural')|U] se acotovelam para dar uma olhada em quem em breve será [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip]. Sobre os ombros de seus pais, no meio da multidão, a criançada [location.GetCulture.GetName] sorri."
 coronation_events.0205.desc.high_magnificence: "Os chifres soam! Os estandartes avançam com as vivas cores do brasão [host.GetPrimaryTitle.GetAdjective]! Os [host.Custom('GetLocalCommonerTermPlural')] louvam [host.Custom('ES_AlAla')] [host.GetTitleAsNameNoTooltip] e as mulheres choram extasiadas diante deste glorioso desfile."
 coronation_events.0205.a_low_magnificence_east_admin: "Sem o favor dos vivos nem dos mortos…"
 coronation_events.0205.a_low_magnificence: "[ROOT.Char.GetFaith.HighGodName], guia-me por entre essa chusma…"
 coronation_events.0205.a_high_magnificence: "E minha coroação #EMP solo acaba de empezar!#!"
 coronation_events.0205.a: "O maior de todos os momentos se aproxima."
 coronation_events.0205.b: "Este[ROOT.Char.GetTopLiege.Custom('ES_EA')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip] deve parecer um espetáculo horrendo…"
 coronation_events.0205.b_flavor_infirm: "… com pouquíssima vitalidade para ir a cavalo até sua coroação."
 coronation_events.0205.b_improved: "Mas, felizmente, poucos notarão em meio a tanto esplendor!"
 coronation_events.0205.c_low_magnificence_east_admin: "Aqueles com olhos vivos sabem melhor!"
 coronation_events.0205.c_low_magnificence: "Olhem bem, plebeus! Sou, em todos os sentidos, um[activity.GetHost.Custom('ES_XA')] [activity.GetHost.GetTitleAsNameNoTooltip]."
 coronation_events.0205.c: "Sou a própria imagem de um[activity.GetHost.Custom('ES_XA')] grande [activity.GetHost.GetTitleAsNameNoTooltip]!"
 coronation_events.0205.d: "Agora veremos como se sai est[activity.GetHost.Custom('ES_EA')] [activity.GetHost.GetTitleAsNameNoTooltip]."
 coronation_events.0205.e_east_admin: "O brilho das moedas restaurará os auspícios deste dia!"
 coronation_events.0205.e: "O brilho das moedas restaurará o esplendor de hoje."
 coronation_events.0205.e.tt: "É trazido um exemplar de [ROOT.Char.CustomFixedRandom('GetKnightErrantAnimal')], vestido em um tecido de ouro; [ROOT.Char.CustomFixedRandom('GetExpensiveDrink_Singular')] jorra de todas as fontes; músicos, sentados diante do pavilhão, cantam sua glória."
 coronation_events.0205.e.toast: "[host.GetShortUIName] não [Select_CString( host.IsLocalPlayer, 'reparaste', 'reparó' )] poupou despesas na cerimônia"
 coronation_events.0205.f_east_admin: "#EMP Tengo#! que me dirigir à assembleia."
 coronation_events.0205.f: "O povo sabe quem é o seu [ROOT.Char.GetTitleAsNameNoTooltip]."
 coronation_events.0205.f.tt: "Você faz um discurso verdadeiramente comovente para o povo."
 coronation_events.0205.f.success: "O público está maravilhado"
 coronation_events.0205.f.failure: "Seus esforços são em vão"
 coronation_events.0205.f.toast: "[host.GetShortUIName] [Select_CString( host.IsLocalPlayer, 'pronunciaste', 'pronunció' )] fez um discurso empolgante"
 coronation_events.0210.t: "O banquete"
 coronation_events.0210.desc.host: "A cerimônia está completa: toda honra [ROOT.Char.Custom('GetTitleTierAdjective')] me foi concedida. Ergo-me mais uma vez, não para prometer e ordenar, mas para oferecer prazeres suntuosos.\n\n\"Que estas mesas se encham. Que as taças sejam erguidas, e que este salão se lembre da alegria assim como do dever.\"\n\nA assembleia, faminta por sua longa vigília sobre os ritos elaborados, murmura em aprovação. Por ora, ao menos, todos têm algo à sua frente que não sou eu."
 coronation_events.0210.desc.guest: "As formalidades terminaram e, com elas, a quietude que mantinha a reunião unida. Alguns murmúrios surgem quando o anfitrião se levanta novamente para marcar o fim da cerimônia e o início de algo mais descontraído.\n\n[host.Custom('ES_ElLa')|U] [host.GetTitleAsName|l] ergue a voz apenas o suficiente para ser ouvida: \"Meus amigos, os ritos estão concluídos. Que as mesas sejam preenchidas, que as taças sejam erguidas e que este salão se lembre da alegria, assim como do dever.\"\n\nAs palavras são bem recebidas e, a cada momento que passa, este grupo [ROOT.Char.Custom('GetTitleTierAdjective')] começa a parecer mais uma celebração animada."
 coronation_events.0210.a: "Finalmente, alguma comida!"
 coronation_events.0210.b: "Por fim, a cerimônia acabou."
 coronation_events.0300.t: "Um cargo de honra"
 coronation_events.0300.desc: "Antes que a coroação prossiga, devo decidir quem presidirá os ritos sagrados. Se quiser conquistar o favor dos [ROOT.Char.GetFaith.AltPriestTermPlural], seria prudente deixar um deles supervisionar a cerimônia, concedendo-lhe a santidade e a bênção que só eles podem proporcionar.\n\nAinda assim, uma parte de mim se pergunta: não seria uma história muito mais grandiosa se eu tomasse a coroa com minhas próprias mãos e proclamasse meu direito de governar sem intercessão?"
 coronation_events.0300.a: "Somente [chaplain.GetFirstNameNoTooltip] pode fazê-lo."
 coronation_events_0300_a_tooltip: "[chaplain.GetFirstName] será [chaplain.Custom('ES_ElLa')] oficiante da cerimônia"
 coronation_events.0300.b: "E [alternative_1.GetFirstNameNoTooltip] talvez?"
 coronation_events_0300_b_tooltip: "[alternative_1.GetFirstName] será [alternative_1.Custom('ES_ElLa')] oficiante da cerimônia"
 coronation_events.0300.c: "Tenho fé em [alternative_2.GetFirstNameNoTooltip]."
 coronation_events_0300_c_tooltip: "[alternative_2.GetFirstName] será [alternative_2.Custom('ES_ElLa')] oficiante da cerimônia"
 coronation_events.0300.d: "É uma honra que só pode recair sobre mim."
 coronation_events_0300_d_tooltip: "#high Tú#! oficiarás a cerimônia"
 coronation_events_0300_d_tooltip_effect: "#high Você ganhará#! [prestige|lE] @prestige_icon!, mas perderá [opinion|lE] @opinion_icon! do [court_chaplain|lE] e dos [vassals|lE] do tipo [GetVassalStance( 'zealot' ).GetName|l] [GetVassalStance( 'zealot' ).GetTextIcon] segundo a [coronation_magnificence|lE] da sua [coronation|lE]"
 coronation_events_0300_d_tooltip_effect_hof: "#high Você ganhará#! [prestige|lE] @prestige_icon!, mas perderá [opinion|lE] @opinion_icon! da [Concept('head_of_faith', 'chefe da sua fé' )|E] e dos [vassals|lE] do tipo [GetVassalStance( 'zealot' ).GetName|l] [GetVassalStance( 'zealot' ).GetTextIcon] segundo a [coronation_magnificence|lE] da sua [coronation|lE]"
 coronation_events.0301.t: "Morte do oficiante"
 coronation_events.0301.desc: "[dead_officiator.Custom('ES_ElLa')|U] oficiante da minha coroação, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('dead_officiator'))] [dead_officiator.GetFirstName], [dead_officiator.GetDeathReason]. Seu assento permanece vazio e o ritual sagrado, incompleto.\n\n[first_candidate.GetFirstName], um[first_candidate.Custom('ES_XA')] [first_candidate.GetFaith.PriestNeuter] fiel ao credo [first_candidate.GetFaith.GetAdherentName], dá um passo à frente. \"[first_candidate.GetFaith.HighGodName] não vacila com o falecimento de uma só alma\", diz solenemente. \"Se desejais, eu concluirei o rito.\""
 coronation_events.0301.a: "São/Santa [ROOT.Char.Custom('GetCatholicSaint')], levai sua alma a [ROOT.Char.GetFaith.PositiveAfterLife]."
 coronation_events.0301.a.tooltip: "[first_candidate.GetFirstNameNoTooltip] será [first_candidate.Custom('ES_ElLa')] novo[first_candidate.Custom('ES_OA')] oficiante da cerimônia"
 coronation_events.0301.a.c: "Não deixarei que sua morte interrompa a cerimônia."
 coronation_events.0301.b: "[second_candidate.Custom('ES_ElLa')|U] [second_candidate.GetTitledFirstNameNoTooltip|l] está mais próximo de [first_candidate.GetFaith.HighGodName]."
 coronation_events.0301.b.tooltip: "[second_candidate.GetsecondNameNoTooltip] será [second_candidate.Custom('ES_ElLa')] nov[second_candidate.Custom('ES_OA')] oficiante da cerimônia"
 coronation_events.0301.c: "[dead_officiator.GetSheHe|U] merece meu máximo respeito. Cancelem as cerimônias."
 coronation_events.0301.c.tooltip: "#N @warning_icon! Se cancelará tu [activity|lE] de [coronation|lE].#!"
 coronation_events.0301.c.tooltip_second: "Você poderá realizar um [funeral|lE] por [dead_officiator.GetFirstName]."
 coronation_events.0301.c.tooltip_third: "Você poderá realizar a [coronation|lE] imediatamente após o [funeral|lE]."
 coronation_events.0301.d: "Não deixarei que uma morte interrompa #EMP mi#! coroação."
 coronation_events.0301.d.tooltip: "[first_candidate.GetFirstNameNoTooltip] será [first_candidate.Custom('ES_ElLa')] nov[first_candidate.Custom('ES_OA')] oficiante da cerimônia. A morte [dead_officiator.Custom('ES_DelDela')] [dead_officiator.GetTitledFirstName|l] durante sua coroação é amplamente considerada um péssimo presságio para seu reinado."
 coronation_events.0301.e: "O que [first_candidate.GetFaith.HighGodName] nos dá, [first_candidate.GetFaith.HighGodName] nos tira."
 coronation_events.0301.e.tooltip: "#N @warning_icon! Se cancelará tu [activity|lE] de [coronation|lE].#!"
 coronation_events.0301.e.tooltip_second: "Você não poderá realizar outra coroação nos próximos 12 meses."
