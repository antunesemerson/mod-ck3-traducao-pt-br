 # Heir Preparation
 heir_preparation_oath_decision: "As celebrações estão chegando ao fim. Houve muitos cochichos sobre o caos, a tensão, as acomodações improvisadas. Talvez eu esteja agora com calúnias ecoando nos ouvidos e comida passada e azeda na barriga..., mas o que realmente importa é que, enfim, sou um verdadeir[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip].\n\n"
 heir_preparation_oath_decision_timer: "Do começo ao fim, não poupei esforços para impressionar todos os meus convidados — amigos e inimigos por igual! Mas minha presença imparcial, meu foco absoluto no sucesso deste grande encontro…\n\nPara que tudo isso serviu?"
 heir_preparation_oath_decision_desc: "Detratores impertinentes de coração [first_char.Custom('InsultAdjective')], [first_char.GetName] e [second_char.GetName] entre eles, tiveram a audácia de assistir à minha coroação… e [Select_CString(And(first_char.IsFemale, second_char.IsFemale), 'as', 'os')] recebi com o mau humor [ROOT.Char.Custom('GetTitleTierAdjective')] que merecem! Vieram para revelar minha fraqueza, mas encontraram apenas um desprezo frio e uma resolução de ferro.\n\nTalvez eu devesse desferir um golpe final e mordaz…"
