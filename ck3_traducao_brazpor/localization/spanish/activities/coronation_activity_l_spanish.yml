 ### Events
 # Oaths
 coronation_events.0100.t: "Um juramento para a posteridade"
 # Intro
 coronation_events.0100.desc.opening: "A assembleia me observa. Alguns com esperança, outros com dúvida, todos esperando que eu lhes fale do meu reinado e jure sobre o futuro. Posso ouvir as perguntas que não dizem em voz alta. Serei justo? Serei imparcial?"
 # Mid section
 coronation_events.0100.desc.previous_ruler_close_family: "Serei digno de meu [ROOT.Char.Custom2( 'RelationToMeShort', 'previous_ruler' )]?"
 coronation_events.0100.desc.previous_ruler_not_family_no_house: "Serei eu superior ao meu predecessor[previous_ruler.Custom('ES_XA')], [previous_ruler.GetFirstNameNicknamed]?"
 coronation_events.0100.desc.previous_ruler_not_family: "Serei eu capaz de superar meu predecessor[previous_ruler.Custom('ES_XA')], [previous_ruler.GetFullNameNoTooltip]?"
 coronation_events.0100.desc.first_ruler: "Como governarei como primeiro [ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] destas terras?"
 # Outro
 coronation_events.0100.desc.outro: "\n\nNão estou aqui como [ROOT.Char.GetTitleAsNameNoTooltip|l] para ecoar as expectativas deles. Vim para escolher meu próprio caminho e uma forma de fazer avançar o meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\nSeja no que for que se torne [ROOT.Char.GetPrimaryTitle.GetNameNoTier] —seja no que eu me torne—, tudo começa neste exato momento."
