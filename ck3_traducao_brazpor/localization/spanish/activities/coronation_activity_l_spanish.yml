 # Right-hand Side
 SUPPORTER_WINDOW_OTHER_LABEL: "Outros partidários: [Subtract_int32( GetDataModelSize( ActivityWindow.GetCurrentPhaseGuestSubset( 'supporter' ) ), '(int32)3' )]"
 SUPPORTER_WINDOW_OTHER_LABEL_NONE: "Outros apoiadores: 0"
