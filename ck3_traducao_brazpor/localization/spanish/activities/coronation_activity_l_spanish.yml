 DETRACTOR_WINDOW_OTHER_LABEL: "Outros detratores: [Subtract_int32( GetDataModelSize( ActivityWindow.GetCurrentPhaseGuestSubset( 'detractor' ) ), '(int32)3' )]"
 DETRACTOR_WINDOW_OTHER_LABEL_NONE: "Outros detratores: 0"
 DETRACTOR_WINDOW_OTHER_LABEL_HOVER: "#T Detratores#!\n $game_concept_coronation_detractor_desc$"
 DETRACTOR_WINDOW_LABEL: "Grandes detratores"
