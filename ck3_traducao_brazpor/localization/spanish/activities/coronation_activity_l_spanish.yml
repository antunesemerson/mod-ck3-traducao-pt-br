 coronation_events.0150.desc: "Ouço os cochichos atrás de portas fechadas. Vejo a decepção gravada em seus olhos. E sinto o peso da vergonha me esmagando.

Todos sabem: eu falhei. Quebrei o juramento que jurei cumprir, uma promessa que havia feito a todos os meus súditos.

Como vou encará-los agora? Como suportarei esta desgraça?"
