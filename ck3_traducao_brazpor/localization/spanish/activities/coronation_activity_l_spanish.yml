 coronation_events.0210.desc.host: "A cerimônia está completa: toda honra [ROOT.Char.Custom('GetTitleTierAdjective')] me foi concedida. Ergo-me mais uma vez, não para prometer e ordenar, mas para oferecer prazeres suntuosos.

"\t #weak ([RemainingTime('stewardship_oath_1_timer')])#!"

A assembleia, faminta por sua longa vigília sobre os ritos elaborados, murmura em aprovação. Por ora, ao menos, todos têm algo à sua frente que não sou eu."
