 ### ACTIVITY
 #GUESTS
 #PHASES
 hunt_phase: "Caçada"
 hunt_type_standard: "Caçada"
 hunt_type_standard_desc: "$EFFECT_LIST_BULLET$ Escolha uma presa entre uma variedade de animais locais\n$EFFECT_LIST_BULLET$ Aumenta a [trait_level_track_xp|lE] de [GetTrait('lifestyle_hunter').GetName( GetNullCharacter )|l] $trait_track_hunter$\n$EFFECT_LIST_BULLET$ Maior [hunt_danger_no_prefix|El] concede mais [prestige|lE] [prestige_i|lE]\n$EFFECT_LIST_BULLET$ Os sexos marciais podem participar ativamente\n$EFFECT_LIST_BULLET$ Os sexos não marciais podem assistir\n#weak Feras orgulhosas e astutas rondam a natureza selvagem; superá-las e vencê-las põe à prova o valor e aprimora as habilidades.#!"
 hunt_type_legendary: "Lendária"
 hunt_type_legendary_desc: "$EFFECT_LIST_BULLET$ Busque um animal mítico avistado na área\n$EFFECT_LIST_BULLET$ Aumenta [trait_level_track_xp|lE] de [GetTrait('lifestyle_hunter').GetName( GetNullCharacter )|l] $trait_track_hunter$\n$EFFECT_LIST_BULLET$ Maior [hunt_danger_no_prefix|El] concede mais [prestige|lE] [prestige_i|lE]\n$EFFECT_LIST_BULLET$ Os sexos marciais podem participar\n$EFFECT_LIST_BULLET$ Os sexos não marciais podem assistir\n#weak Os sábios costumam descartar as criaturas míticas como lendas, mas as florestas ainda guardam muitos mistérios.#!"
 hunt_type_falconry: "Falcoaria"
 hunt_type_falconry_desc: "$EFFECT_LIST_BULLET$ Escolha uma presa entre uma variedade de aves de caça\n$EFFECT_LIST_BULLET$ Aumenta a [trait_level_track_xp|lE] de [GetTrait('lifestyle_hunter').GetName( GetNullCharacter )|l] $trait_track_falconer$\n$EFFECT_LIST_BULLET$ Ambos os sexos podem participar\n#weak Embora custosas, a caça com falcão e a cetraria proporcionam uma alegria no domínio da natureza sem igual entre as atividades nobres.#!"
 #OPTIONS
 hunt_option_attendants: "Acompanhantes"
 hunt_attendants_few: "Guardas de Caça Locais"
 hunt_attendants_few_desc: "#weak Um pequeno grupo de caçadores acompanhantes é auxiliado por guardas de caça locais.#!"
 hunt_attendants_normal: "Equipes de Busca"
 hunt_attendants_normal_desc: "$BULLET_WITH_TAB$ Aumenta um pouco a [hunt_success_chance_no_prefix|lE]$hunt_attendants_roco_tt$\n\n#weak Grupos de serviçais auxiliam na busca e no cerco à caça.#!"
 hunt_attendants_many: "Grupos de Emboscada"
 hunt_attendants_many_desc: "$BULLET_WITH_TAB$ Aumenta consideravelmente a [hunt_success_chance_no_prefix|lE]$hunt_attendants_roco_tt$\n\n#weak Grupos dedicados de caçadores estão prontos para perseguir e direcionar a caça.#!"
 hunt_option_party_size: "Tamanho da Comitiva"
 hunt_party_size_few: "Comitiva Íntima"
 hunt_party_size_few_desc: "$BULLET_WITH_TAB$ Se juntam ao seu [GetPlayer.Custom('GetHuntMasterTooltipDesc')|l], [GetCourtPositionType('bodyguard_court_position').GetName()|l], [GetCourtPositionType('court_physician_court_position').GetName()|l], [spouses|lE], [friends|lE], [lovers|lE] e caçadores.\n\n#weak Uma pequena banda de conhecidos e cortesões de confiança.#!"
 hunt_party_size_normal: "Comitiva Razoável"
 hunt_party_size_normal_desc: "$BULLET_WITH_TAB$ Mais [prestige|lE][prestige_i|lE] ao concluir\n$BULLET_WITH_TAB$ Juntam-se $knight_culture_player_plural$ sem terras e [courtiers|lE] e [guests|lE] [GetTrait('lazy').GetName( GetNullCharacter )|l] ou com educação marcial\n\n#weak Um grupo decente de notáveis e cortesãos do reino.#!"
 hunt_party_size_many: "Comitiva Substancial"
 hunt_party_size_many_desc: "$BULLET_WITH_TAB$ Muito mais [prestige_i|lE][prestige|lE] ao final\n$BULLET_WITH_TAB$ Todos os [courtiers|lE] e [guests|lE] se juntam\n\n#weak Uma ampla representação da corte, do reino e de seus arredores.#!"
