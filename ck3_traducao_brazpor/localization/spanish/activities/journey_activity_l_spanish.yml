 suggestive_alterations: "Você encomenda algo um pouco mais... sugestivo."
 suggestive_miniature_monument: "Miniatura Sugestiva do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]"
 suggestive_miniature_monument.desc: "Esta miniatura de argila, adquirida em [location.GetName], representa [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName]. \n\n[location.GetHolding.GetSpecialBuildingType.GetDescription] É provável que, na composição original, não houvesse torres com formas fálicas nem pessoas em miniatura com o peito nu."
 bp3_journey.1100.t: "Um Nome, Eterno"
 bp3_journey.1100.desc_intro: "Enquanto caminho pelos terrenos, avisto uma marca peculiar em [location.Custom('GetSpecialBuildingSurface')].\n\n"
 bp3_journey.1100.desc_name: "Ao inspecioná-la mais de perto, lê-se: #EMP "[ancient_vandal.GetFullName] esteve aqui, contemplai meu nome e sabei que sou [ancient_vandal.Custom('FormalComplimentAdjective')]!".#! Hum, se [ancient_vandal.GetSheHe] pôde gravar seu nome para que os transeuntes curiosos possam admirá-lo por toda a eternidade, então talvez..."
 bp3_journey.1100.desc_first: "Está intocado, à vista de todos que passam... apenas esperando alguém para eternizar seu nome."
 bp3_journey.1100.desc_outro: "\n\nOlho para baixo e vejo uma pedra em forma de cinzel me chamando."
 bp3_journey.1100.knowledge_hoarding: "Deve haver sabedoria oculta entre as inscrições!"
 bp3_journey.1100.curiosity: ""[ROOT.Char.GetFirstNameNoTooltip], amigo[ROOT.Char.Custom('ES_OA')] dos [location.GetCulture.GetCollectiveNounNoTooltip], caminhou por aqui"."
 bp3_journey.1100.a: "Bem, seria uma pena que as pessoas não lembrassem do #EMP meu#! nome!"
 bp3_journey.1100.b: "Isso daria uma boa lembrança..."
 bp3_journey.1100.c: "Prefiro permanecer anônimo."
 a_large_rock: "uma grande rocha plana perto do [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName]"
 the_mine_entrance: "a entrada rochosa do [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName]"
 a_wall: "uma das paredes que compõem o [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName]"
 artifact_gained: "Artefato Obtido"
 prestige_trinket: "Você ganha um [artifact|lE] variado que concede [prestige|lE]"
 grafitti_rock: "Rocha Esculpida de [location.GetNameNoTooltip]"
 grafitti_rock.desc: "Esta rocha foi removida do [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName] e possui uma inscrição que diz: #EMP '[ancient_vandal.GetFullName] esteve aqui, contemple meu nome e saiba que sou [ancient_vandal.Custom('FormalComplimentAdjective')]!'#!"
 defaced_monument_opinion: "Monumento Profanado"
 bp3_journey.1200.t: "Barba e Cabelo"
 bp3_journey.1200.desc: "Em um canto do mercado, avisto um portão com uma placa que diz #EMP "[local_character.GetFirstNameNicknamed] - Barbearia e cirurgia"#!, com uma fila muito longa de pessoas esperando do lado de fora. Parece ser um lugar #EMP muito#! popular.\n\nAo me aproximar, descubro um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] que corta o cabelo com uma rapidez e precisão que eu jamais tinha visto! Emaranhados sem brilho e embaraçados se transformam nos cachos mais lustrosos e atraentes imagináveis."
 bp3_journey.1200.knowledge_hoarding: "Como ele/ela consegue se mover com tanta graça?"
 bp3_journey.1200.curiosity: "Faça um corte no estilo #EMP '[location.GetNameNoTooltip]'#!, depois se junte a mim!"
 bp3_journey.1200.a: "Um corte de cabelo, por favor!"
 bp3_journey.1200.b: "Posso empregar esta[local_character.Custom('ES_EA')] [Select_CString( local_character.IsFemale, 'barbeira cirurgiã', 'barbeiro cirurgião' )] em meu [ROOT.Char.Custom('GetCourtType')|l]."
 bp3_journey.1200.c: "Uma perda de tempo."
 barber_success: "Você recebe um novo corte de cabelo glorioso"
 barber_fail: "Você recebe um corte de cabelo terrível"
 hair_will_change: "Seu cabelo mudará de estilo por #V 6#! meses"
 bp3_journey.1300.t: "Canções do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]"
 bp3_journey.1300.desc: "Uma melodia sedutora chega aos meus ouvidos enquanto estou do lado de fora do local especial de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]. [Select_CString( local_character.IsFemale, 'Uma musicista', 'Um músico' )], que empunha um instrumento local muito ornamentado, toca uma melodia magistral enquanto [Select_CString( local_character_2.IsFemale, 'uma bufona colorida', 'um bufão colorido' )] ?com uma apresentação igualmente impressionante? canta e dança ao ritmo:\n\n#EMP "[location.Custom('GetSpecialBuildingSong')]".#!"
 bp3_journey.1300.knowledge_hoarding: "Deve haver um significado mais profundo nesta canção..."
 bp3_journey.1300.curiosity: "Por que vocês não se juntam [Select_CString(And(local_character.IsFemale, local_character_2.IsFemale),'as duas','os dois')] à minha [ROOT.Char.Custom('GetCourtType')|l]?"
 bp3_journey.1300.spread_legend_intent: "Você deveria cantar sobre [ROOT.Char.GetPromotedLegend.GetNameNoTooltip]!"
 bp3_journey.1300.a: "É[local_character.Custom('ES_EA')] bu[local_character.Custom('ES_OnOna')] é majestuos[local_character.Custom('ES_OA')], devo ser min[local_character.Custom('ES_OA')]!"
 bp3_journey.1300.b: "Essa música deve encher meus aposentos em casa!"
 bp3_journey.1300.c: "Delicioso!"
 #Religious Buildings Song
 event_song_religious_01: "Sob as abóbadas do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], onde a fé e o silêncio residem, nos reunimos na luz, nossos espíritos nunca morrem."
 event_song_religious_02: "Nos salões de paz sagrada, o [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] ergue-se alto, suas torres alcançam o céu, enquanto orações e vozes ecoam."
 event_song_religious_03: "Onde os sinos do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] tocam, seus ecos puros e claros, encontramos nossa paz aqui, em adoração, esperança e oração."
 #Learning Buildings Song
 event_song_learning_01: "Em meio a tomos empoeirados e antigos saberes, o [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] sussurra sabedoria, segredos e muito mais."
 event_song_learning_02: "Onde mentes convergem nos salões do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], a busca pelo conhecimento quebra as barreiras da ignorância."
 event_song_learning_03: "Sob os arcos do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], estudiosos debatem, desvendando mistérios que o tempo não apagará."
 #Mines Buildings Song
 event_song_mines_01: "Nas profundezas do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], onde tesouros se escondem, mineiros trabalham na escuridão, com o orgulho como guia."
 event_song_mines_02: "Sob a terra em [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], picaretas ressoam, perseguindo veios de riqueza, trazendo grande fortuna."
 event_song_mines_03: "Nas profundezas do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], onde ecos habitam, esculpimos os segredos da pedra, suas histórias para contar."
 #Martial Buildings Song
 event_song_martial_01: "Entre as sombras do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], onde soldados treinam e trabalham, o clangor do aço ecoa, neste solo consagrado."
 event_song_martial_02: "À sombra do poder do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], nossas espadas são erguidas pela justiça, defendendo lar e família até o amanhecer."
 event_song_martial_03: "Sob o olhar atento do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], onde bandeiras bravejam com coragem, o eco de juramentos prestados, na arte da antiga guerra."
 #Ancient Wonders Buildings Song
 event_song_ancient_wonders_01: "À sombra eterna do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], onde a história repousa, antigas histórias permanecem, em um silêncio que preserva."
 event_song_ancient_wonders_02: "Contemplando o [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], maravilhas de outrora, contos antigos, sussurros de lendas e tradições."
 event_song_ancient_wonders_03: "Eterno como as estrelas, o [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] se ergue, um testemunho do tempo, moldado por mãos antigas."
 #Economic Buildings Song
 event_song_economic_01: "No coração pulsante do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], onde o comércio prospera, o pulso das transações e acordos, onde a prosperidade chega."
 event_song_economic_02: "A canção animada do mercado preenche o ar do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], uma sinfonia de empreendimento, riqueza incomparável."
 event_song_economic_03: "Artes e mercadorias abundam nos salões do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], onde as chamadas dos mercadores ressoam, e a fortuna chega."
 #Diplomatic Buildings Song
 event_song_diplomatic_01: "Sob o olhar do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], onde alianças são tecidas, palavras moldam o futuro, até o pôr do sol."
 event_song_diplomatic_02: "Nos salões eloquentes do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], onde vozes sobem e descem, na dança da diplomacia, uma palavra pode mudar tudo."
 event_song_diplomatic_03: "Nos grandiosos tribunais do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], entre sussurros e intrigas, cada gesto conta, no reino de reis e rainhas."
 event_song_natural_wonders_01: "Oh, a grandeza da natureza, tão vasta e tão ampla, onde águias voam alto, e segredos se escondem. No coração da terra, ou onde as águas fluem, há uma beleza indomada que poucos realmente conhecem."
 event_song_natural_wonders_02: "Sob o céu infinito, sobre o solo antigo, onde sussurros do passado no vento se encontram. Entre picos elevados, ou por margens tão límpidas, o espírito da terra canta para aqueles que ouvem."
 event_song_natural_wonders_03: "No abraço da natureza, onde os seres selvagens vagueiam, em meio à beleza robusta, encontramos nosso lar. Pela força da montanha, ou pelo lago sereno, em cada folha e pedra, as maravilhas da natureza são vistas."
 bp3_journey.1400.t: "Vendendo Carne"
 bp3_journey.1400.desc: "Aproximo-me a um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] de aspecto selvagem que exibe uma coleção impressionante de peles em sua banca. Parece ser um[local_character.Custom('ES_XA')] caçador[local_character.Custom('ES_XA')] prolífic[local_character.Custom('ES_OA')]. "Tenho [local_character.Custom('GetRandomRegionalSmallGame')], [local_character.Custom('GetRandomRegionalWildDaytimeBird')], [local_character.Custom('GetRegionalDeerType')]! Carnes e peles aqui!", grita.\n\nDe repente, ele me olha nos olhos; seu olhar é tão penetrante quanto os dentes de [local_character.Custom('GetRegionalWolfType')]. "Ah, um[ROOT.Char.Custom('ES_XA')] #EMP [ROOT.Char.GetTitleAsNameNoTooltip|l]#!, para você tenho a carne mais nobre de todas: #EMP [ROOT.Char.Custom('RegionalOnlyFerociousAnimal')]#!"."
 bp3_journey.1400.knowledge_hoarding: "Você conhece bem o local, por favor, me mostre."
 bp3_journey.1400.curiosity: "Você poderia me ensinar algumas coisas!"
 bp3_journey.1400.a: "Deixe-me comprar o [newly_created_artifact.GetNameNoTooltip]."
 bp3_journey.1400.b: "Deveríeis ser meu chefe[local_character.Custom('ES_EA')] de caçadores!"
 bp3_journey.1400.c: "Essa carne é realmente digna de realeza para mim!"
 bp3_journey.1500.t: "Locais Sábios"
 bp3_journey.1500.desc: "Mientras exploro, oigo sin querer una conversación entre dos [Select_CString(And(local_character.IsFemale, local_character_2.IsFemale),'lugareñas ilustradas','lugareños ilustrados')] «Nunca había sido más fácil redistribuir las limosnas desde que organizaste el lugar. Seguramente [local_character.GetFaith.HighGodName|U] te bendecirá, [local_character_2.GetFirstName]», dice un[local_character.Custom('ES_OA')].\n\n«Me honráis, querid[local_character.Custom('ES_OA')] [local_character.GetFirstName], pero vos también sois un[local_character_2.Custom('ES_XA')] servidor[local_character.Custom('ES_XA')] muy querid[local_character_2.Custom('ES_OA')] y de corazón [local_character.Custom('ComplimentAdjective')] de la divinidad. Yo solo llevo a cabo mi trabajo como encargad[local_character_2.Custom('ES_OA')] del lugar especial de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]», continúa [Select_CString( local_character.IsFemale, 'la otra', 'el otro' )]."
 bp3_journey.1500.knowledge_hoarding: "Se eu doar esmolas, você me mostrará o terreno?"
 bp3_journey.1500.curiosity: "Vosso [local_character.Custom('ComplimentAdjective')] coração vos define a [Select_CString(And(local_character.IsFemale, local_character_2.IsFemale),'ambas','ambos')], aceitarias juntar-te à minha [ROOT.Char.Custom('GetCourt')|l]?"
 bp3_journey.1500.curiosity_2: "Dos [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] aos [local_character.GetCulture.GetCollectiveNounNoTooltip] – uma doação de amizade!"
 bp3_journey.1500.a: "Preciso que você distribua esmolas por mim em [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]."
 bp3_journey.1500.b: "Meus servos nunca são pontuais, organizem minha [ROOT.Char.Custom('GetCourtType')|l], por favor!"
 bp3_journey.1500.c: "Então é assim que eles organizam as coisas por aqui..."
 inspired_by_alms_modifier: "Inspirado pela Organização de Esmolas"
 inspired_by_alms_modifier_desc: "Este personagem foi inspirado por como as esmolas foram bem organizadas durante uma visita a um monumento."
 bp3_journey.1600.t: "Cidade dos Gatos"
 bp3_journey.1600.desc: "Há gatos #EMP em todos os lugares#! por estas partes – não há um canto, recanto ou fresta sem um gato dormindo! Há até mesmo gatos dormindo [location.Custom('GetSpecialBuildingCatSleepingSpot')] do [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]...\n\nDe repente, um gatinho brincalhão se aconchega entre minhas pernas, quase me convidando a seguir para um beco que eu não tinha visto antes. Que curioso."
 bp3_journey.1600.knowledge_hoarding: "Que segredos aguardam, pequeno amigo?"
 bp3_journey.1600.curiosity: "Os locais amam seus gatos, então vou alimentar todos eles!"
 bp3_journey.1600.a: "Eles não dariam falta de apenas #EMP um#! gatinho..."
 bp3_journey.1600.b: "Saia daqui, pequeno incômodo!"
 cat_help: "O gato guia você até uma interessante tábua de pedra"
 get_lost: "Você é assaltado, mas aprende algo"
 #Religious
 cats_sleeping_religious_01: "sob a luz quente do sol entrando pelas janelas"
 cats_sleeping_religious_02: "em cima dos muitos altares"
 cats_sleeping_religious_03: "sobre os venerados túmulos"
 #Learning
 cats_sleeping_learning_01: "em cima das pilhas de manuscritos bem manuseados"
 cats_sleeping_learning_02: "no colo dos estudiosos profundamente concentrados"
 cats_sleeping_learning_03: "nos parapeitos das janelas banhadas pelo sol"
 #Mines
 cats_sleeping_mines_01: "nas pedras frescas na entrada"
 cats_sleeping_mines_02: "acomodados nos vagões de mineração"
 cats_sleeping_mines_03: "nas saliências rochosas próximas ao poço da mina"
 #Martial
 cats_sleeping_martial_01: "na sombra das ameias"
 cats_sleeping_martial_02: "no colo dos guardas atentos"
 cats_sleeping_martial_03: "entre os nichos silenciosos"
 #Ancient Wonders
 cats_sleeping_ancient_wonders_01: "sob a sombra dos obeliscos próximos"
 cats_sleeping_ancient_wonders_02: "nos nichos das paredes"
 cats_sleeping_ancient_wonders_03: "nos degraus das seções antigas"
 #Economic
 cats_sleeping_economic_01: "entre as barracas movimentadas do mercado"
 cats_sleeping_economic_02: "em cima dos barris de mercadorias nos postos comerciais agitados"
 cats_sleeping_economic_03: "nos cantos das prósperas casas dos mercadores"
 #Diplomatic
 cats_sleeping_diplomatic_01: "dentro dos jardins ornamentados"
 cats_sleeping_diplomatic_02: "no colo dos diplomatas"
 cats_sleeping_diplomatic_03: "nos luxuosos tapetes"
 #Natural Wonders
 cats_sleeping_natural_wonders_01: "sob a sombra das árvores próximas"
 cats_sleeping_natural_wonders_02: "nas rochas aquecidas pelo sol nas proximidades"
 cats_sleeping_natural_wonders_03: "nas vistas ensolaradas"
 bp3_journey.1700.t: "Exercícios de [location.GetCulture.GetNameNoTooltip]"
 bp3_journey.1700.desc: ""[local_character.Custom('GetMilitaryDrillSentence')]", grita [Select_CString( local_character.IsFemale, 'a comandante', 'o comandante' )] aos seus dois vigias. Parece haver uma exibição militar perto daquele lugar, [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip].\n\n"
 bp3_journey.1700.desc_different_culture: "Observar as manobras e táticas desses guardas [location.GetCulture.GetName] me enche de respeito e admiração. Certamente há algo que nós, [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip], podemos aprender com essa demonstração."
 bp3_journey.1700.desc_same_culture: "Observar as manobras e táticas dos guardas me enche de respeito e admiração. Certamente há algo que eu posso aprender com essa demonstração."
 bp3_journey.1700.knowledge_hoarding: "[local_character.Custom('ES_ElLa')|U] comandante #EMP deve#! ensinar-me estas táticas!"
 bp3_journey.1700.curiosity: "Eu poderia empregar vocês três em meu [ROOT.Char.Custom('GetCourtType')|l]!"
 bp3_journey.1700.b: "Hm, eu poderia usar dois novos guarda-costas."
 bp3_journey.1700.c: "Oferecerei emprego para toda a guarnição em meu exército."
 bp3_journey.1700.d: "#EMP *Saúdem os guardas*#!"
 drill_order_1: "Ao meu comando, marchem para frente, firmes como se o próprio chão guiasse seus passos!"
 drill_order_2: "Formem fileiras, fiquem ombro a ombro, como se o próprio vento não ousasse passar!"
 drill_order_3: "Virem para a esquerda, deixem os ecos dos nossos passos soarem como trovões para assustar os corvos!"
 drill_order_4: "Relaxem, soldados, mas que sua vigilância seja como um guardião silencioso, sempre alerta."
 drill_order_5: "Levantem seus escudos, como se o céu estivesse lançando flechas ao invés de chuva sobre nós!"
 drill_order_6: "Dêem um passo para trás em formação, como se a terra mesma se movesse sob seus pés!"
 drill_order_7: "Formem-se, escudos erguidos, é apenas um exercício para ficarem firmes contra inimigos imaginários!"
 drill_order_8: "Avancem com lanças preparadas, como se enfrentassem um inimigo em brincadeira, e não em batalha real!"
 drill_order_9: "Círculem e se reagrupem, zombem da investida do inimigo, uma dança de guerra sem inimigo à vista!"
 drill_order_10: "Mantenham a posição, imaginem que a terra treme sob a carga de uma cavalaria fantasmagórica!"
 drill_order_11: "Desengajem e regroupem, como se o ar que cortam com suas lâminas risse de volta!"
 maa_increases_tt: "Um de seus [men_at_arms|lE] [maa.GetName] aumenta de tamanho em #P +2#!\n #weak (Isso pode potencialmente aumentar além do Tamanho Máximo)#!"
 imported_tactics_modifier: "Táticas Importadas"
 imported_tactics_modifier_desc: "O governante dessas terras importou táticas de fora, tornando os regimentos estacionados aqui particularmente eficazes."
 imported_tactics_character_modifier: "$imported_tactics_modifier$"
 imported_tactics_character_modifier_desc: "Através de suas viagens, este personagem aprendeu novas táticas, criando um vínculo mais profundo com suas tropas."
 bp3_journey.1800.t: "Confie em Mim"
 bp3_journey.1800.desc: ""[location.Custom('GetSpecialBuildingNonsensicalClaim')]", afirma [local_character.Custom('ES_ElLa')] guia local de aparência suspeita. "É verdade ou meu nome não é [local_character.GetFirstNameNicknamed]!"\n\n"Venham, deixem-me mostrar! Só preciso de uma pequena quantia — é quase nada para um [ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] como vós!""
 bp3_journey.1800.spread_legend_intent: "Você #EMP já#! ouviu a verdadeira história de [ROOT.Char.GetPromotedLegend.GetNameNoTooltip]?"
 bp3_journey.1800.knowledge_hoarding: "Será que é verdade!? Você deve me mostrar!"
 bp3_journey.1800.curiosity: "Mostre-me como a vida é vivida aqui em [location.GetNameNoTooltip] ao invés!"
 bp3_journey.1800.a: "Isso é bobagem – me mostre algo real!"
 bp3_journey.1800.b: "Pare com suas encenações, posso lhe oferecer mais do que esta vida."
 bp3_journey.1800.c: "Vá vender suas mentiras para outra pessoa."
 bp3_journey.1800.trusting: "Com certeza, isso soa legítimo!"
 mostly_true_tt: "A visão é completamente fascinante"
 almost_true_tt: "A visão é interessante"
 not_true_tt: "Eu só recebo um tour regular"
 utterly_scammed_tt: "Nos 'perdemos' e tive que pagar para voltar"
 interesting_insight_modifier: "Percepções Interessantes"
 interesting_insight_modifier_desc: "Este personagem obteve algumas percepções inspiradoras ao visitar outra cidade."
 beautiful_vista: "Você está no topo de uma bela vista"
 relaxing_sights: "Você segue por um passeio relaxante"
 interesting_insight: "Você vê uma arquitetura fascinante"
 #Religious
 guide_religious_1: "Dizem que as sombras dentro de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] se movem por conta própria, revelando a presença de espíritos divinos aos fiéis."
 guide_religious_2: "Uma lenda local afirma que os sinos de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] tocam uma melodia que só é ouvida por aqueles destinados à grandeza na vida após a morte."
 guide_religious_3: "Sussurram que uma câmara secreta sob [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] guarda uma relíquia que pode transformar as orações mais devotas em realidade."
 guide_religious_4: "A lenda diz que o altar de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] foi miraculosamente esculpido a partir de um único meteorito divino, imbuindo-o com poder celestial."
 guide_religious_5: "Uma velha história conta que as janelas de vitrais de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] mudam sua história para refletir o coração de quem as observa."
 #Learning
 guide_learning_1: "Dizem que escondido nas paredes de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] há um livro que só pode ser lido à luz de uma lua cheia."
 guide_learning_2: "A lenda diz que uma câmara secreta sob [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] foi um lugar de reunião para uma sociedade de pensadores iluminados, invisível para os iniciados."
 guide_learning_3: "Um rumor persiste que a árvore mais antiga do pátio foi plantada exatamente no local onde o fundador de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] teve uma visão de sua futura grandeza."
 guide_learning_4: "Sussurros falam de um manuscrito escondido em [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] que pode conceder sabedoria incomparável àqueles que decifrarem seu script antigo."
 guide_learning_5: "Dizem que dar três voltas ao redor de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] à meia-noite revela o fantasma de um erudito longínquo, ansioso para compartilhar seu conhecimento."
 #Mines
 guide_mines_1: "O folclore local afirma que o túnel mais profundo leva ao submundo, onde espíritos guiam os mineiros até as veias mais ricas de minério."
 guide_mines_2: "Um conto antigo de mineiro fala de uma veia de ouro tão pura que brilha com sua própria luz, mas apenas os puros de coração podem vê-la."
 guide_mines_3: "Lendas sussurram sobre uma câmara secreta cheia da riqueza intocada de reis antigos, selada e guardada por mineiros espectrais."
 guide_mines_4: "Dizem que bater três vezes em uma certa rocha sem marca na mina abrirá um passagem para tesouros além da imaginação."
 guide_mines_5: "Circulam rumores sobre uma pedra misteriosa que concede visões do futuro, enterrada em algum lugar no labirinto de túneis."
 #Martial
 guide_martial_1: "Há uma lenda de que as paredes de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] contêm uma pedra que sangra quando inimigos se aproximam das fronteiras do reino."
 guide_martial_2: "Sussurram que um arsenal secreto de armas invencíveis está escondido sob [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], acessível apenas durante um eclipse lunar."
 guide_martial_3: "Soldados antigos contam uma história de um túnel oculto sob [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], usado por um rei antigo para escutar seus inimigos."
 guide_martial_4: "Um mito entre os guardas fala de um sentinela fantasma que caminha pelos muros à noite, protegendo [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] de perigos invisíveis."
 guide_martial_5: "O folclore diz que os construtores originais gravaram uma maldição nas portas de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] que faria os invasores se voltarem uns contra os outros."
 #Ancient Wonders
 guide_ancient_wonders_1: "Dizem que sussurrar um desejo nas fendas de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] ao amanhecer fará com que ele se realize."
 guide_ancient_wonders_2: "Uma lenda afirma que as sombras de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] ao pôr do sol apontam o caminho para um tesouro enterrado de antigos governantes."
 guide_ancient_wonders_3: "Há uma história de que o verdadeiro arquiteto de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] deixou uma sala secreta que guarda a chave para a imortalidade."
 guide_ancient_wonders_4: "Uma velha história sugere que dar voltas em [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] ao contrário à meia-noite revela a entrada para um submundo oculto."
 guide_ancient_wonders_5: "Sussurram que as pedras de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] vibram com feitiços antigos no momento do solstício de inverno, abrindo portais para reinos esquecidos."
 #Economic
 guide_economic_1: "Rumores dizem que a verdadeira riqueza de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] não são seus bens comerciais, mas um cofre oculto sob seus mercados, cheio de riquezas incontáveis."
 guide_economic_2: "Lendas contam de um livro secreto dentro de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] que registra as dívidas de reis e imperadores, concedendo poder sobre nações ao seu leitor."
 guide_economic_3: "Dizem que o fundador de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] enterrou um mapa dentro de suas paredes que leva a um esconderijo de pedras preciosas."
 guide_economic_4: "Há uma história de que um comerciante fantasma vaga pelos corredores de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] à noite, oferecendo trocar segredos pelas almas dos gananciosos."
 guide_economic_5: "Sussurros entre os locais sugerem que bater em um certo padrão nas pedras de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] no pátio revela um compartimento secreto com moedas antigas."
 #Diplomatic
 guide_diplomatic_1: "Um rumor sussurrado entre os cortesãos é que o verdadeiro poder de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] está em uma câmara secreta onde todos os tratados do mundo são magicamente vinculados e podem ser alterados pelos dignos."
 guide_diplomatic_2: "Dizem que um passageiro secreto dentro de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] leva a uma sala que ecoa com os pensamentos dos dignitários visitantes, revelando suas verdadeiras intenções."
 guide_diplomatic_3: "A lenda diz que os espelhos no grande salão de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] refletem não apenas aparências, mas a verdadeira natureza da alma, revelando aliados e inimigos."
 guide_diplomatic_4: "Uma velha história entre diplomatas é que as estátuas nos jardins de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] sussurram segredos de negociações passadas para aqueles que ouvem atentamente ao anoitecer."
 guide_diplomatic_5: "Há uma história de que a fonte no pátio de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] concede eloquência e persuasão àqueles que bebem suas águas sob a lua cheia."
 #Natural Wonder
 guide_natural_wonder_1: "Os locais acreditam que as águas de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] podem curar qualquer enfermidade se tomados banho sob a primeira luz da aurora."
 guide_natural_wonder_2: "Uma lenda entre alpinistas diz que alcançar o pico de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] concede uma visão do destino de alguém, mas apenas para aqueles que ascendem sozinhos e sem olhar para trás."
 guide_natural_wonder_3: "Dizem que o eco da sua voz do topo de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] pode levar uma mensagem aos falecidos, trazendo paz aos espíritos inquietos."
 guide_natural_wonder_4: "Um antigo mito conta sobre uma caverna secreta dentro de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] que transporta aqueles que entram para um paraíso jamais visto por uma alma viva."
 guide_natural_wonder_5: "Sussurram que as flores mais raras que crescem na base de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] florescem apenas uma vez a cada século, e seu cheiro concede sonhos proféticos."
 bp3_journey.1900.t: "Pobre [local_character.GetFirstNameNoTooltip]"
 bp3_journey.1900.desc: ""Tende piedade de [local_character.Custom('ES_DelDela')] pobre [local_character.GetFirstName], só preciso de algumas moedinhas!", implora [local_character.Custom('ES_ElLa')] [local_character.GetWomanMan] com voz trêmula.\n\n[ROOT.Char.Custom('FormerJob')]"
 court_tutor_court_position_job: ""Eu costumava educar os filhos da casa [former_employer.GetHouse.GetName] a serviço de um ser tão [former_employer.Custom2('InsultAdjective', SCOPE.sC('local_character'))] quanto [former_employer.Custom('ES_ElLa')] [former_employer.GetTitledFirstName|l]. Eu fazia bem o meu trabalho e ensinava os jovens sobre [ROOT.Char.Custom('highest_skill_noun')], ai de mim! Meus serviços deixaram de #EMP "ser necessários"#! quando os pequenos cresceram, e agora vivo na rua!"."
 royal_architect_court_position_job: ""Eu costumava projetar coisas grandiosas para [former_employer.Custom('ES_ElLa')] [former_employer.GetTitledFirstName|l]: torres, mansões, até castelos! Assim que meu último projeto em nome dele foi concluído, [former_employer.Custom('ES_ElLa')] [former_employer.GetTitleAsNameNoTooltip|l] me roubou a glória e me baniu! Agora vivo à sombra daquele lugar, [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], e sonho com o dia em que poderei construir novamente…"."
 cupbearer_court_position_job: ""Eu servia bebidas no conselho [former_employer.Custom('ES_DelDela')] [former_employer.GetTitledFirstName|l] e me certificava de que nunca faltasse uma taça cheia! Um dia, fui acusado de envenenar um convidado, mas era só carne estragada do jantar; no dia seguinte ele estava completamente bem! É claro que isso não os impediu de me despojar da minha dignidade e do meu sustento…"."
 court_poet_court_position_job: "Eu criava belos poemas para [former_employer.Custom('ES_ElLa')] [former_employer.GetTitledFirstName|l] nos quais exaltava suas virtudes e seu bom caráter. A Casa [former_employer.GetHouse.GetName] inteira amava meus versos e minha prosa, mas, à medida que o conteúdo de seus cofres começou a desaparecer, também desapareceu seu amor pela poesia, e agora estou aqui, pobre e sozinho."
 chronicler_court_position_job: ""Eu registrava as lendas da casa [former_employer.GetHouse.GetName], trabalhava dia e noite, tinha as mãos enegrecidas pela tinta... Mas, assim que o livro ficou pronto, meu empregador[former_employer.Custom('ES_XA')], [former_employer.Custom('ES_ElLa')] [former_employer.GetTitledFirstName|l], teve a ousadia de me chamar de #EMP "dispensável"#! e me jogou na rua sem cerimônia!"."
 wet_nurse_court_position_job: ""Eu cuidava dos pequenos da casa [former_employer.GetHouse.GetName]. Eu os vigiava enquanto cresciam, eu os alimentava, trocava suas roupas, ensinava-os a andar... e eles me amavam! Agora estou perdid[local_character.Custom('ES_OA')] e na miséria, já que [former_employer.Custom('ES_ElLa')] insensível e cruel [former_employer.GetTitledFirstName|l] afirmou que eu era um #EMP "fardo inútil"#! quando as crianças ficaram mais velhas"."
 antiquarian_court_position_job: ""Eu cuidava do conjunto [former_employer.GetPrimaryTitle.GetAdjective] de artefatos a serviço [former_employer.Custom('ES_DelDela')] [former_employer.GetTitledFirstName|l], por tão [former_employer.Custom2('InsultAdjective', SCOPE.sC('local_character'))]. Eu dava brilho a urnas e baús, cuidava de armas e joias com óleos lustrosos, dobrava sedas e linho com o mais meticuloso cuidado — e o que recebi por isso? Fui mandado para a rua, fui! Ah, como eu gostaria de cuidar de tesouros assim outra vez…"."
 bp3_journey.1900.knowledge_hoarding: "O que você sabe sobre este lugar? Me conte tudo!"
 bp3_journey.1900.curiosity: "Pobre coitado[local_character.Custom('ES_OA')]! Venha comigo e eu cuidarei de você!"
 bp3_journey.1900.a: "Tome estas moedas e me conte sua história."
 bp3_journey.1900.b: "Eu posso te dar mais do que moedas – posso te oferecer um trabalho!"
 bp3_journey.1900.c: "Vá embora, mendig[local_character.Custom('ES_OA')] imundo!"
 bp3_journey.2000.t: "Uma Lenda Ambulante"
 bp3_journey.2000.desc: ""Saudações, por acaso vocês são [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstName|l]?", chama-me um[new_promoter.Custom('ES_XA')] [new_promoter.GetWomanMan].\n\n"Sou [new_promoter.GetFirstNameNicknamed], [new_promoter.Custom('ES_ElLa')] [new_promoter.GetTitleAsNameNoTooltip|l] de [new_promoter.GetPrimaryTitle.GetBaseNameNoTier], e ouvi a lenda de [ROOT.Char.GetPromotedLegend.GetName]!", continua. "Alguns músicos nas redondezas desse lugar, [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], reuniram uma grande multidão ao cantar sobre as aventuras de [Select_CString( ROOT.Char.GetPromotedLegend.GetProtagonist.IsLocalPlayer, 'vossa pessoa', ROOT.Char.GetPromotedLegend.GetProtagonist.GetShortUIName)], o que despertou meu interesse; vocês me honrariam contando-a com suas próprias palavras?"."
 bp3_journey.2000.a: "Onde estão esses músicos? Eu gostaria de patrociná-los..."
 bp3_journey.2000.b: "Ficarei encantad em contar para você!"
 bp3_journey.2000.c: "Tenho coisas mais importantes para fazer."
 bp3_journey.2100.t: "Uma Especialidade [location.GetCounty.GetTitle.GetAdjectiveNoTooltip]"
 bp3_journey.2100.desc: ""Compre sua comida aqui!", grita o vendedor ambulante. "Tenho espetinhos de [local_character.Custom('RegionalEdibleMeat')] grelhados, tenho [local_character.Custom('GetRandomRegionalSmallGame')] recheado com [local_character.Custom('GetFoodDetail')] tenho [local_character.Custom('FavoriteTreatDemand')], e também uma caneca de [local_character.Custom('RegionalDrink')] para acompanhar tudo!".\n\n"Além disso", e se vira para mim, "por que não experimenta meu prato especial [location.GetCounty.GetTitle.GetAdjectiveNoTooltip] de [local_character.Custom('GetLocalStreetFood')] com [local_character.Custom('FunFoodPrefix')]? É muito saudável e tem efeitos mágicos: vai deixar você ainda mais [ROOT.Char.Custom('ComplimentAdjective')] que há em você se multiplicará!"."
 bp3_journey.2100.knowledge_hoarding: "Efeitos mágicos? Hm, me dê um."
 bp3_journey.2100.curiosity: "Eu adoro a comida [local_character.GetCulture.GetNameNoTooltip], deixe-me provar tudo!"
 bp3_journey.2100.curiosity_2: "Vocês deveriam provar algum prato [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetAdjectiveNoTooltip] na minha [ROOT.Char.Custom('GetCourtType')|l]!"
 bp3_journey.2100.a: "Uma caneca de [local_character.Custom('RegionalDrink')] e um espetinho de [local_character.Custom('RegionalEdibleMeat')], por favor."
 bp3_journey.2100.b: "Acho que você seria um[local_character.Custom('ES_XA')] provador[local_character.Custom('ES_XA')] excelente."
 bp3_journey.2100.c: "Não, estou aqui para explorar."
 food_prefix_honey: "mel"
 food_prefix_berry: "fruta"
 food_prefix_salt: "sal"
 chance_of_food_poisoning: "Probabilidade de intoxicação alimentar #weak ([GetTrait('ill').GetName( GetPlayer )|l])#!: #N [SCOPE.ScriptValue('food_poison_value')|0] %#!"
 bp3_journey.2200.t: "[local_character.Custom('ES_ElLa')|U] [local_character.Custom('RaunchyComplimentNoun')] de [location.GetCounty.GetTitle.GetNameNoTierNoTooltip]"
 bp3_journey.2200.desc: "“Deseja companhia, [ROOT.Char.Custom('FormOfAddressForLiege')]?”, sussurra sedutoramente um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] enquanto passa um dedo sobre sua [local_character.Custom('ObjectifiedFeature')]. “Não importa o que deseja, tenho certeza de que posso agradar…”, continua suavemente.\n\n“Posso relaxar o corpo com óleos quentes ou agradar a mente com a leitura de [SCOPE.Custom('RandomEntertainmentTextName')], ou, se seus desejos forem mais… carnais, então serei suatr[local_character.Custom('ES_OA')] esta noite.”"
 bp3_journey.2200.spread_legend_intent: "Posso ler algo para você: [ROOT.Char.GetPromotedLegend.GetNameNoTooltip]!"
 bp3_journey.2200.knowledge_hoarding: "Eu desejo companhia – na forma de conversa!"
 bp3_journey.2200.curiosity: "Você é notável! Abandone esta vida e junte-se a mim."
 bp3_journey.2200.curiosity_2: "Tanta beleza… Sede para mim, meu [local_character.Custom('RaunchyComplimentNoun')] [location.GetCounty.GetTitle.GetAdjectiveNoTooltip]!"
 bp3_journey.2200.a: "Eu vou dar a [local_character.GetSheHe] uma boa diversão!"
 bp3_journey.2200.a_2: "Óleos quentes soam bem..."
 bp3_journey.2200.b: "Alguém com seus talentos está sendo desperdiçado aqui."
 bp3_journey.2200.c: "Deixe-me em paz, [local_character.Custom2('InsultNounSexual', ROOT.Char)]."
 local_monument_tt: "Vive perto desse lugar há toda a vida, [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], então deve ter muito para me contar sobre ele."
 bp3_journey.2300.t: "[regiment.GetNameNoTooltip] [local_ruler.Custom('ES_DelDela')] [local_ruler.GetTitledFirstNameNoTooltip|l]"
 bp3_journey.2300.desc: "Na entrada desse lugar, [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] vejo um desfile triunfal de [regiment.GetName] realizado em honra de [local_ruler.Custom('ES_ElLa')] [local_ruler.GetLadyLord] local, [local_ruler.Custom('ES_ElLa')] [local_ruler.GetTitledFirstName|l].\n\n\"Vocês são o orgulho destas terras!\"; a voz de [local_ruler.GetFirstNameNoTooltip] ecoa pelo pátio. \"Meus gloriosos guerreiros [location.GetCulture.GetNameNoTooltip], os escolhidos de minha [regiment.GetNameNoTooltip] e defensores eternos de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]!\"."
 bp3_journey.2300.knowledge_hoarding: "Vamos conversar sobre esse lugar fascinante, [local_ruler.GetLadyLord] [local_ruler.GetFirstNameNoTooltip]."
 bp3_journey.2300.curiosity: "Você governa os [location.GetCulture.GetCollectiveNounNoTooltip] de maneira admirável!"
 bp3_journey.2300.curiosity_2: "Eu ficaria profundamente honrado se pudesse levar um campeão, [local_ruler.GetFirstNameNoTooltip]!"
 bp3_journey.2300.a: "Com a bênção de [local_ruler.GetFirstNameNoTooltip] eu também poderia formar [regiment.GetNameNoTooltip]!"
 bp3_journey.2300.b: "Um desses [regiment.GetNameNoTooltip] seria um grande campeão."
 bp3_journey.2300.c: "Eu deveria ser visto ao lado d [local_ruler.GetFirstNameNoTooltip]."
