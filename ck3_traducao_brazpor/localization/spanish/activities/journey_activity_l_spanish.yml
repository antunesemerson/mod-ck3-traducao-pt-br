 bp3_journey.0010.t: "Uma Despedida ao [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]"
 bp3_journey.0010.desc: "Chegou a hora de arrumar minhas coisas e voltar para casa.\n\nTenho vagado pelos terrenos de [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName], visto muitas coisas, feito anotações e desenhos, e conhecido os [location.GetCulture.GetCollectiveNounNoTooltip] da região. Não acho que vou esquecer essa viagem tão cedo!\n\nAdeus, [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip], adeus, [location.Custom('ProvinceCompliment')] [location.GetNameNoTooltip]!"
 bp3_journey.0010.a: "Nunca devo esquecer o que aprendi aqui."
