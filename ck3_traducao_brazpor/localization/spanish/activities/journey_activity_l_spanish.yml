 journey_knowledge_hoarding_intent_idesc: "A empolgação de desvendar os segredos guardados pelo [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName] me enche de uma sede insaciável de conhecimento."
 journey_knowledge_hoarding_intent_idesc2: "Cada pedra, cada entalhe no [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName] sussurra conhecimentos antigos, me chamando para explorar mais a fundo."
 journey_knowledge_hoarding_intent_idesc3: "A atração pela sabedoria antiga escondida no [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName] é um chamado irresistível para meu coração de estudioso."
 journey_curiosity_intent_idesc: "Mal posso esperar para me misturar com as pessoas ao redor do [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName], ouvindo suas histórias e testemunhando suas vidas diárias."
 journey_curiosity_intent_idesc2: "A vibrante movimentação ao redor do [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName] promete um mosaico de encontros e aprendizados."
 journey_curiosity_intent_idesc3: "A atração de descobrir as facetas desconhecidas do [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName] pelos olhos de seu povo é estimulante."
 spread_legend_intent_idesc: "A ideia de imortalizar [me_scope.GetPromotedLegend.GetName] no meio da agitação do [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName] me enche de um propósito como nenhum outro."
 spread_legend_intent_idesc2: "À sombra do [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName], imagino [me_scope.GetPromotedLegend.GetName] ecoando pelas ruas, uma história para impressionar os locais!"
 spread_legend_intent_idesc3: "Caminho em direção ao [location.Custom('GetSpecialBuildingPrefix')][location.GetHolding.GetSpecialBuildingType.GetName], o cenário perfeito para gravar [me_scope.GetPromotedLegend.GetName] nos anais da história, uma lenda a ser contada pelos locais por gerações."
 monument_view_intro_1: "Quando a silhueta do [location.Custom('MonumentTypeDesc')] quebra o horizonte, a antecipação cresce dentro de mim."
 monument_view_intro_2: "Finalmente ver o [location.Custom('MonumentTypeDesc')] acende uma faísca no meu coração, me chamando para explorar."
 monument_view_intro_3: "Quando a forma distante do [location.Custom('MonumentTypeDesc')] surge, um senso de admiração desperta enquanto me aproximo."
