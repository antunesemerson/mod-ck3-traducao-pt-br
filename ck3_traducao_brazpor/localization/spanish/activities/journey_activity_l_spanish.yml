 bp3_journey.1000.t: "Venda Arquitetônica"
 bp3_journey.1000.desc: ""Compre miniaturas de [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip] aqui!"; a voz dos vendedores ambulantes ecoa alto pelo mercado.\n\nAo examiná-las mais de perto, noto que os enfeites de argila têm uma qualidade #EMP notável#!. Está tudo ali, até o menor detalhe. Sinceramente, são inacreditavelmente bons.\n\n"Eu as fiz à mão, [ROOT.Char.Custom('FormOfAddressForLiege')]! Gostaria de comprar uma?"."
 bp3_journey.1000.knowledge_hoarding: "Você precisa me mostrar como os fez."
 bp3_journey.1000.curiosity: "Vocês [local_character.GetCulture.GetNameNoTooltip] artesãos são incríveis! Junte-se a mim!"
 bp3_journey.1000.lechery: "Aceita... encomendas personalizadas?"
