l_spanish:
 activity_journey: "Expedição Monumental"
 activity_journey_desc: "Empreenda uma expedição a um monumento ou marco famoso para melhorar a si mesmo, mergulhando na história, conhecimento e mistérios que ali residem."
 activity_journey_guest_desc: ""
 activity_journey_conclusion_desc: "A expedição permitiu que você refletisse e aprimorasse suas habilidades como governante."
 activity_journey_selection_tooltip: "Parta em uma expedição para um [special_building|lE], em busca de conhecimento e aprimoramento pessoal.\n\nRecompensas previstas:\n $activity_journey_host_desc$"
 activity_journey_host_desc: "#indent_newline:8 $BULLET_WITH_TAB$#V 1#!1 ponto garantido de [skill|lE] de [intrigue_i|E][diplomacy_i|E][martial_i|E][learning_i|E][stewardship_i|E], #V 1#!1 ponto potencial extra de [skill|lE]\n #weak (As recompensas de pontos de habilidade dependem do [special_building|lE] visitado)#!#!\n $BULLET_WITH_TAB$[court_positions|E] [court_position_i] de [aptitude|lE] excelente\n $BULLET_WITH_TAB$[prestige|E] [prestige_i|E]\n\n #weak Você levará em seu [entourage|lE] seus [children|lE] e [spouses|lE].#!"
 activity_journey_predicted_cost: "O custo de uma [monument_expedition|lE] é primariamente influenciado pela distância até o [special_building|lE] escolhido."
 activity_journey_destination_selection: "Os destinos válidos devem ter um [special_building|lE] construído que não seja um local sagrado genérico #weak (como uma [GetBuilding('holy_site_cathedral_01').GetName|l])#! ou uma [GetBuilding('generic_university').GetName|l] genérica. Cada destino só pode ser visitado uma vez.\n\nOs aumentos de [skill|lE] [intrigue_i|E][diplomacy_i|E][martial_i|E][learning_i|E][stewardship_i|E] dependem do tipo de [point_of_interest|lE] do [special_building|lE] visitado."
 journey_knowledge_hoarding_intent: "Acumulação de Conhecimento"
 journey_knowledge_hoarding_intent_desc: "Você tem apenas um propósito – reunir o máximo de conhecimento possível. Você pode escolher aumentar sua chance de ganhar um Ponto Extra de [skill|lE] em troca de [stress|lE]."
 journey_curiosity_intent: "Curiosidade"
 journey_curiosity_intent_desc: "Há muito a descobrir, não apenas nos próprios monumentos, mas nas pessoas que vivem próximas a eles. Você ganhará mais [cultural_acceptance|lE] e [strong_hooks|lE] sobre aqueles que recrutar."
 activity_journey_guest_help_text: "Os [activity_guests|lE] terão oportunidades de aumentar suas [skills|lE]. Em especial, se forem importantes para você, como seu [player_heir|lE]."
 phase_experience: "Exploração"
 phase_experience_desc: "Observe o monumento, percorra os arredores e interaja com os locais que vivem próximos – em busca de conhecimento."
 journey_option_scribes: "Escribas"
 journey_no_scribes: "Sem Escribas"
 journey_no_scribes_desc: "#flavor Tudo o que preciso é de uma caneta, um pouco de pergaminho e minha própria mente.#!"
 journey_skilled_scribes: "Recrutar Escribas Competentes"
 journey_skilled_scribes_desc: "#indent_newline:8 $BULLET_WITH_TAB$ $increase_skill_chance_20$#!\n#indent_newline:8 $BULLET_WITH_TAB$ Dois personagens muito competentes de caráter [GetTrait('devoted').GetName( GetNullCharacter )|l] se juntarão ao séquito. Quando a [activity|lE] terminar, permanecerão como [courtiers|lE] seus e você terá [hooks|lE] de #EMP obligación#! sobre eles, o que reduzirá o salário deles em [court_positions|lE].#!\n\n#flavor Não há nada de vergonhoso em obter alguma ajuda externa; afinal, eu não consigo me lembrar #EMP todo#!.#!"
