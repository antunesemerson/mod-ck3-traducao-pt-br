 activity_survey_guest_desc: ""
 activity_survey_conclusion_desc: "Esta jornada me deu uma ótima chance de ver mais do meu reino, mas eu só posso ficar aqui por tanto tempo. Meu trabalho aqui está feito, é hora de voltar para casa."
 activity_survey_selection_tooltip: "Garanta que seu reino seja governado por bajuladores competentes através de uma inspeção minuciosa\n\nRecompensas Esperadas: $rewards_inspection_tt$"
 activity_survey_destination_selection: "\nAs [inspections|lE] se beneficiam quando ocorrem em [counties|lE] com baixo [county_control|lE] ou ao longo da fronteira com [realms|lE] estrangeiros, onde a burocracia local está falhando. Essas áreas podem oferecer mais oportunidades e ter uma [inspection_success_chance_no_prefix|lE] maior."
