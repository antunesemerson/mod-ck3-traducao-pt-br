 inspection_fighting_guilds_innkeepers_guild_modifier: "Guilda dos Estalajadeiros"
 inspection_fighting_guilds_innkeepers_guild_modifier_desc: "Esta cidade é fortemente influenciada por uma poderosa $inspection_fighting_guilds_innkeepers_guild_modifier$."
 inspection_fighting_guilds_artists_guild_modifier: "Guilda dos Artistas"
 inspection_fighting_guilds_artists_guild_modifier_desc: "Artistas vêm de longe para participar nos empreendimentos criativos que frequentemente se vêem em cada esquina da cidade."
 inspection_learning_intent_local_guilds_modifier: "Guildas Locais"
 inspection_learning_intent_local_guilds_modifier_desc: "Algumas novas guildas se estabeleceram na baronia após interagirem com o suserano em outras partes do reino."
 bp3_survey.1040.t: "O Fogo se Espalha"
 bp3_survey.1040.desc: "Enquanto ando pelas ruas de [province.GetName], meu séquito e eu deparamos com um incêndio que devasta um dos distritos mais antigos da cidade. Muitos estão parados, boquiabertos em choque ou chorando baixinho por algum corpo estendido na calçada.\n\nUma dúzia de soldados tenta desesperadamente conter o fogo antes que ele consuma o restante da cidade e deixe apenas cinzas em seu rastro."
 bp3_survey.1040.a: "As pessoas precisam ser salvas!"
 bp3_survey.1040.a.win: "Você ajuda a apagar o fogo"
 bp3_survey.1040.a.loss: "O fogo se espalha apesar das suas melhores intenções"
 bp3_survey.1040.a.death: "Preso nas chamas"
 bp3_survey.1040.b: "Vou reservar fundos mais tarde, vamos focar em salvar o que pudermos."
 bp3_survey.1040.c: "Um incêndio ainda maior colocará a [county_owner.GetFirstNameNoTooltip] em seu devido lugar."
 bp3_survey.1040.c.win: "As pessoas acreditam que você tentou ajudar"
 bp3_survey.1040.c.loss: "As pessoas sabem o que você realmente fez"
 bp3_survey.1040.d: "Não há mais nada que eu possa fazer aqui..."
 bp3_survey.1040.destroyed_building: "O fogo se espalha"
 inspection_fire_spreading_modifier: "Ruas Queimadas"
 inspection_fire_spreading_modifier_desc: "Queimar um pouco da podridão antiga deu lugar a novas oportunidades."
 inspection_selfless_ruler_modifier: "Governante Altruísta"
 inspection_selfless_ruler_modifier_desc: "Este personagem colocou sua própria saúde em risco para ajudar seu povo."
 bp3_survey.1050.t: "Expandindo as Muralhas da Cidade"
 bp3_survey.1050.desc: "Mais uma vez, encontro-me conversando com alguns moradores sobre a que devo dar prioridade ao reestruturar [province.GetName]. "Mudar e reconstruir as antigas muralhas da cidade, meu senhor[ROOT.Char.Custom('ES_XA')]", diz, piscando um olho [Select_CString( soldier_character.IsFemale, 'a capitã', 'o capitão' )] [soldier_character.GetNameNoTooltip] da guarnição local. "Imaginem quanto mais espaço teríamos para um novo distrito residencial!".\n\n"Não, não! O velho distrito comercial precisa urgentemente de uma reforma", [merchant_character.GetNameNoTooltip], representante das guildas locais, intromete-se na conversa sem cerimônia. "Imaginem quão mais animada a cidade ficaria com um distrito comercial ativo!"."
 bp3_survey.1050.a: "Vamos focar nas antigas muralhas em ruínas de [province.GetNameNoTooltip]."
 bp3_survey.1050.b: "Os comerciantes têm razão."
 bp3_survey.1050.c: "Não temos ouro suficiente para distribuir para qualquer um."
 inspection_expanding_walls_new_modifier: "Espaço para Expansão"
 inspection_expanding_walls_new_modifier_desc: "Esta cidade encontrou espaço para expansão, após mover uma seção das suas muralhas."
 inspection_expanding_walls_old_modifier: "Investido nas Guildas"
 inspection_expanding_walls_old_modifier_desc: "As guildas locais tiveram um pequeno impulso em suas fortunas, após um pequeno investimento ser alocado para a manutenção do distrito comercial."
 inspection_learning_intent_building_modifier: "Práticas de Construção"
 inspection_learning_intent_building_modifier_desc: "Após adotar algumas práticas de outras partes do reino, a capital está florescendo com vida."
 inspection_expanding_walls_new_desc: "\t #weak Aumenta para cada espaço livre de [building|lE]#!"
 MODIFIER_DEFINITION_EXPANDING_WALLS_NEW_DESC: "\nEste modificador aumenta conforme o número de espaços livres de [building|lE] na [barony|lE]"
 inspection_expanding_walls_old_desc: "\t #weak Aumenta para cada [building|E]#!"
 MODIFIER_DEFINITION_EXPANDING_WALLS_OLD_DESC: "\nEste modificador aumenta conforme o número de [buildings|E] na [barony|lE]"
 bp3_survey.1060.t: "Cuide da Sua Própria Mina"
 bp3_survey.1060.desc: "Enquanto inspeciono as terras ao redor de [province.GetName], meu séquito e eu nos deparamos com uma antiga estrada oculta. Embora bem escondida, ela leva a uma pequena elevação, e especificamente a uma caverna onde encontramos equipamentos de mineração abandonados espalhados pelo chão da caverna.\n\n"
 bp3_survey.1060.desc.copper: ""Meu [ROOT.Char.GetLadyLord]", exclama de repente [soldier_character.GetFirstNameNoTooltip][soldier_character.Custom('ES_OA')], um[soldier_character.Custom('ES_OA')] dos meus soldadões. "Não é uma veia de cobre?"."
 bp3_survey.1060.desc.silver: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]", exclama de repente [soldier_character.GetFirstNameNoTooltip], um[soldier_character.Custom('ES_OA')] de meus soldad[soldier_character.Custom('ES_OA')]os. "Esses brilhos devem ser prata!""
 bp3_survey.1060.desc.gold: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], exclama de repente, de olhos arregalados [soldier_character.GetFirstNameNoTooltip], um[soldier_character.Custom('ES_OA')] de meus soldad[soldier_character.Custom('ES_OA')]os. Isso é uma pepita de ouro?"
 bp3_survey.1060.a: "O que estamos esperando? Cavem! CAVEM!"
 inspection_learning_intent_flourishing_metal_trade_modifier: "Mercado Florescente"
 inspection_learning_intent_flourishing_metal_trade_modifier_desc: "Esta baronia recebeu um mercado florescente após a descoberta de uma mina em outra parte do reino."
 bp3_survey.1070.t: "Irregularidades Regulares"
 bp3_survey.1070.desc.intro.personal: "Ao revisar os impostos arrecadados pelos meus administradores e vice-reis locais, noto discrepâncias claras entre o que foi registrado em certas áreas e o que recebi.\n\n"
 bp3_survey.1070.desc.intro.vassal: "Ao analisar os impostos recebidos enquanto [province.GetName] esteve sob o governo de [county_owner.GetFirstName], percebo uma discrepância clara entre o que me era devido e o que foi entregue. Embora [county_owner.GetFirstNameNoTooltip] devesse ter percebido isso, os números incorretos foram incluídos antes mesmo de chegarem à sua mesa.\n\n"
 bp3_survey.1070.desc: "Independentemente de quem exatamente seja o culpado, é claro que alguém precisa pagar. Os locais já pagaram sua parte, mas são mais fáceis de pressionar do que os verdadeiros responsáveis por esses 'erros'."
 bp3_survey.1070.a: "Os nobres #emp vão#! pagar o que devem, de um jeito ou de outro."
 bp3_survey.1070.a.flavor: "Dê um exemplo daqueles responsáveis, para que os outros saibam o que está em jogo."
 bp3_survey.1070.b: "Um imposto único sobre os locais compensará essas perdas."
 bp3_survey.1070.b.flavor: "Os locais não vão apreciar, mas o dinheiro é necessário."
 bp3_survey.1070.c: "Vou deixar passar, desta vez..."
 bp3_survey.1070.c.flavor: "Mostrar clemência será apreciado, espero."
 inspection_regular_irregularities_local_modifier: "Imposto Único"
 inspection_regular_irregularities_local_modifier_desc: "Este personagem impôs um imposto único irregular sobre seus cidadãos locais para compensar as falhas de seus vassalos."
 inspection_regular_irregularities_modifier: "Punição Imposta"
 inspection_regular_irregularities_modifier_desc: "Este personagem puniu severamente os vassalos que desviaram o dinheiro dos impostos para si mesmos."
 bp3_survey.1080.t: "Um Lugar que Vale a Pena Visitar"
 bp3_survey.1080.desc: ""Não é nada seguro, [ROOT.Char.Custom('FormOfAddressForLiege')]", me diz um[traveler_character.Custom('ES_XA')] viajante[traveler_character.Custom('ES_OA')] de aparência abatida. "Mal consegui sair com vida, isso sim". Se acreditarmos no que ele diz, parece que passou por uma experiência e tanto\n\n"
 bp3_survey.1080.desc.holy_poi: "Parece que [ROOT.GetCharacter.GetFaith.GetReligion.GetAdherentNamePluralNoTooltip] de todas as partes viajaram até [location_province.GetName] para ver o local mais sagrado, [location_province.GetHolding.GetSpecialBuildingType.GetName], apenas para serem interceptados por criminosos."
 bp3_survey.1080.desc.poi: "Parece que pessoas de todas as partes viajaram até aqui para ver [location_province.GetHolding.GetSpecialBuildingType.GetName], apenas para serem interceptadas por criminosos."
 bp3_survey.1080.desc.holy_site: "Parece que [ROOT.GetCharacter.GetFaith.GetReligion.GetAdherentNamePluralNoTooltip] de todas as partes vieram até [location_province.GetName] para ver o local sagrado, apenas para serem interceptados por criminosos."
 bp3_survey.1080.desc.outro: "Se permitirmos que bandidos e ladrões continuem atacando os visitantes... É apenas uma questão de tempo até que comecem a buscar outros alvos."
 bp3_survey.1080.a: "Vou recrutar uma pequena patrulha para proteger os viajantes."
 bp3_survey.1080.b: "Deixe que os cidadãos cuidem de seus visitantes."
 bp3_survey.1080.c: "Eles podem se defender."
