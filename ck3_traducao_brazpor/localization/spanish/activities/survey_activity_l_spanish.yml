 inspection_mid_domain_fail_key_title: "Burocracia Corrupta"
 inspection_mid_domain_fail_key: "Apesar de seus muitos esforços, [host.GetShortUIName] não conseguiu acabar com a burocracia corrupta em [province.GetName]."
 inspection_mid_domain_selfish_key_title: "Necessidades Egoístas"
 inspection_mid_domain_selfish_key: "[host.GetShortUIName] separou parte do dinheiro em [province.GetName] para necessidades pessoais."
 bp3_survey.0040.t: "O Povo de [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip]"
 bp3_survey.0040.desc: "Como parte dos meus esforços para melhorar nossa posição com o povo de [province.GetName], reservei o dia para viajar pela cidade e me encontrar com os locais."
 bp3_survey.0040.mid: "Apesar de suas objeções, trouxe [county_holder.GetFirstName] para que veja como deve ser feito."
 bp3_survey.0040.outro: "\n\nEmbora tenham algumas reservas no início, vemos um grande grupo de locais querendo nos contar sobre seus problemas. Se eu tiver oportunidade, falarei sobre..."
 bp3_survey.0040.a: "Os levies e a guarnição local."
 bp3_survey.0040.a.tt: "Recompensa de [levy|lE] melhorada se a [inspection|lE] for bem-sucedida\n"
 bp3_survey.0040.b: "O quanto me impressiona o trabalho que [county_holder.GetFirstNameNoTooltip]."
 bp3_survey.0040.b.tt: "Recompensa de [opinion|lE] melhorada se a [inspection|lE] for bem-sucedida\n"
 bp3_survey.0040.c: "A ótima impressão que tenho de [province.GetNameNoTooltip]."
 bp3_survey.0040.c.tt: "Aumenta a recompensa da [Concept('county_opinion', 'opinión del condado')|E] se a [inspection|lE] for bem-sucedida\n"
 inspection_mid_activity_levy_great_modifier: "Levies Melhorados"
 inspection_mid_activity_levy_great_modifier_desc: "A província viu um aumento notável no recrutamento após o senhor se envolver com os locais."
 inspection_mid_activity_levy_average_modifier: "Levies Ajustados"
 inspection_mid_activity_levy_average_modifier_desc: "Houve um ligeiro aumento nos levies após o senhor visitar o condado."
 inspection_mid_activity_opinion_great_modifier: "Governante Popular"
 inspection_mid_activity_opinion_great_modifier_desc: "O governante local se tornou uma figura popular após visitar a província."
 inspection_mid_activity_opinion_average_modifier: "População Aplacada"
 inspection_mid_activity_opinion_average_modifier_desc: "Após falar com eles pessoalmente, o senhor aplacou alguns dos locais."
 inspection_mid_people_key_title: "Governante Encantador"
 inspection_mid_people_key: "[host.GetShortUIName] encantou os locais em [province.GetName] após falar com eles por um longo período."
 inspection_mid_people_fail_key_title: "Conversador Ineficaz"
 inspection_mid_people_fail_key: "[host.GetShortUIName] não conseguiu impressionar ninguém após passar um tempo com os locais em [province.GetName]."
 bp3_survey.0050.t: "Suserano na Corte"
 bp3_survey.0050.desc: "Embora tenha enviado um mensageiro com antecedência, ainda é uma certa surpresa ver meu senhor[host.Custom('ES_XA')]; [host.GetFirstName]; chegar pessoalmente à minha corte em [province.GetName]. Ele explicou que está aqui para "supervisionar" as coisas, sem entrar em detalhes.\n\nTento ao máximo descobrir se há algo específico que ele queira de mim, mas ele diz que tem tudo de que precisa. Com sorte, [host.GetFirstNameNoTooltip] não descobrirá nada que não deveria..."
 bp3_survey.0050.a: "Bem-vind[host.Custom('ES_OA')] a [province.GetNameNoTooltip], meu [host.GetTitleAsNameNoTooltip|l]."
 bp3_survey.0050.a.tt: "[host.GetName] está realizando uma [inspection|lE] em [province.GetName]"
 bp3_survey_liege_intervention: "Suserano Intervém"
 ### Random Events ###
 bp3_survey.1000.t: "Terras Vazias"
 bp3_survey.1000.desc: "Enquanto inspecionamos as regiões mais obscuras de [province.GetName], [guest_1.GetFirstName] e eu encontramos uma pequena área chamada [empty_province.Custom('HoldingNoHoldingTerrainRoamingTooltip')]."
 bp3_survey.1000.desc_lonely: "Ao inspecionar as regiões mais obscuras de [province.GetName], encontro uma pequena área chamada [empty_province.Custom('HoldingNoHoldingTerrainRoamingTooltip')]."
 bp3_survey.1000.desc_continuation: "Além de alguns pastores de cabras, não parece haver ninguém morando aqui. Sempre que passamos por eles, olham para nós com desconfiança nos olhos.\n\n"
 bp3_survey.1000.desc_border: "Se eu quiser expandir meu domínio, preciso garantir que tenho vassalos que possam refletir meu poder até os cantos do meu reino."
 bp3_survey.1000.desc_bureaucracy: "Se eu quiser garantir meu controle sobre [province.GetNameNoTooltip], preciso ter um melhor controle sobre a população, mesmo nessas terras remotas."
 bp3_survey.1000.desc_domain: "Se eu quiser inspirar minha população, preciso garantir que até as pessoas que vivem nesse local isolado conheçam meu rosto e nome."
 bp3_survey.1000.a: "Enviar algumas pessoas para estabelecer um pequeno posto avançado na região."
 bp3_survey.1000.b: "Investir em algumas estradas para a área, para que eu possa enviar pessoas para cá."
 bp3_survey.1000.c: "Preciso entrar em contato com os locais."
 inspection_empty_lands_populace_modifier: "Visita do Governante"
 inspection_empty_lands_populace_modifier_desc: "Os pastores de cabras locais tiveram a honra de conhecer seu suserano pessoalmente."
 inspection_empty_lands_domain_modifier: "Estrada de Pedágio"
 inspection_empty_lands_domain_modifier_desc: "Esta região remota viu suas estradas locais melhorarem.\n#emp Se convertirá en un [economic_building|lE] si se construye una [holding|lE]#!"
 inspection_empty_lands_border_modifier: "Pequeno Posto Avançado"
 inspection_empty_lands_border_modifier_desc: "Um pequeno posto avançado de fronteira foi construído como um primeiro passo para colonizar a área.\n#emp Será convertido em uma [fortification_building|E] se uma [holding|E] for construída#!"
 inspection_survey_new_goods_modifier: "Novos Produtos"
 inspection_survey_new_goods_modifier_desc: "Este condado viu a chegada de novos produtos após o suserano expandir o reino para novas terras."
 bp3_survey.1010.t: "Os Vagabundos em [province.GetNameNoTooltip]"
 bp3_survey.1010.desc: "Enquanto caminho pelas ruas de [province.GetName], de repente me deparo com um[peasant_character.Custom('ES_XA')] [peasant_character.GetWomanMan] ameaçad[peasant_character.Custom('ES_OA')] por algum tipo de arruaceiro em plena luz do dia. Ele grita pedindo ajuda, enquanto olha para mim e para meus guardas.\n\nSabia que, ultimamente, alguns mercenários da cidade vinham recorrendo ao banditismo e ao crime para se sustentar, mas não fazia ideia de que tivesse chegado a esse ponto. Quero intervir e ajudar esse[peasant_character.Custom('ES_EA')] pobre [peasant_character.GetWomanMan]?"
 bp3_survey.1010.a: "Faça a guarnição expulsá-los da cidade."
 bp3_survey.1010.a.win: "Reúna a guarnição local e se livre dos bandidos"
 bp3_survey.1010.a.win_short: "Guarnição reunida"
 bp3_survey.1010.a.lose: "A situação piora ainda mais"
 bp3_survey.1010.a.lose_short: "Pernas de ferro entrincheiradas"
 bp3_survey.1010.b: "Talvez eles aceitem uma proposta de trabalho..."
 bp3_survey.1010.b.flavor: "Parece que eles sabem lidar com os locais, afinal."
 bp3_survey.1010.c: "Preciso intervir!"
 bp3_survey.1010.c.win: "Afugentar o vagabundo"
 bp3_survey.1010.c.win_short: "Vagabundo afugentado"
 bp3_survey.1010.c.lose: "Ferido pelo vagabundo"
 bp3_survey.1010.d: "Que não se aproxime de mim!"
 bp3_survey.1010.d.flavor: "Está ocupad[bandit_character.Custom('ES_OA')] roubando outr[peasant_character.Custom('ES_OA')], vamos fugir!"
 inspection_bandits_in_x_domain_modifier: "Guarnição Mercenária"
 inspection_bandits_in_x_domain_modifier_desc: "Um grupo de mercenários e bandidos foi contratado para reforçar a guarnição local."
 inspection_bandits_in_x_populace_modifier: "Governante Protetor"
 inspection_bandits_in_x_populace_modifier_desc: "Este personagem se esforçou para proteger seu povo, até colocando sua própria vida em risco."
 inspection_bandits_in_x_border_negative_modifier: "Bandidos Implacáveis"
 inspection_bandits_in_x_border_negative_modifier_desc: "Criminosos têm um controle rígido sobre o condado, administrando grande parte dos negócios do dia a dia nos bastidores."
 inspection_bandits_in_x_border_positive_modifier: "Ruas Seguras"
 inspection_bandits_in_x_border_positive_modifier_desc: "As pessoas da área se sentem seguras sabendo que bandidos não são um grande problema ou ameaça."
 bp3_survey.1020.t: "As Velhas Estradas de [province.GetCounty.GetName]"
 bp3_survey.1020.desc: "Enquanto viajo pela [province.Custom('HoldingNoHoldingTerrainRoamingTooltip')], reflito sobre um problema muito comum. Assim que saímos da cidade, nos vemos presos em valas lamacentas, seguindo caminhos que não levam a lugar algum.\n\nEssas velhas estradas mal são úteis, se é que são úteis. A menos que eu tome providências para alocar homens para começar os reparos, provavelmente começará a afetar os cidadãos locais e os comerciantes estrangeiros, se já não estiver afetando."
 bp3_survey.1020.a: "Alocarei os fundos necessários para isso."
 bp3_survey.1020.b: "Cobrar dos cidadãos."
 bp3_survey.1020.c: "A guarnição pode cuidar disso."
 bp3_survey.1020.d: "Não é um grande problema."
 inspection_value_old_roads_desc: "\t #weak Aumento para cada #bold 3#! [development|lE] abaixo de #bold 30#!#!"
 MODIFIER_DEFINITION_OLD_ROADS_DESC: "\nEste modificador aumenta conforme o [development|lE] diminui"
 inspection_old_roads_of_x_border_modifier: "Novas Estradas"
 inspection_old_roads_of_x_border_modifier_desc: "Uma quantia significativa de ouro foi alocada para manter a rede local de estradas."
 inspection_old_roads_of_x_domain_modifier: "Manutenção da Guarnição"
 inspection_old_roads_of_x_domain_modifier_desc: "A guarnição local foi designada para fazer a manutenção das velhas e degradadas estradas do condado."
 inspection_old_roads_of_x_populace_modifier: "Manutenção Cidadã"
 inspection_old_roads_of_x_populace_modifier_desc: "Os cidadãos do condado foram forçados a participar do trabalho de manutenção das estradas do condado."
 inspection_old_roads_negative_modifier: "Estradas Mal Conservadas"
 inspection_old_roads_negative_modifier_desc: "As velhas estradas do condado caíram em desuso há muito tempo e estão em péssimas condições, necessitando urgentemente de reparos."
 bp3_survey.1030.t: "Conflito Entre as Guildas"
 bp3_survey.1030.desc: "Enquanto estou no meio de uma discussão com um dos meus burocratas, sou repentinamente interrompido por dois grupos gritando um com o outro a poucos passos de distância. Meus guardas conseguem separá-los, mal e mal, enquanto os representantes das duas facções continuam se insultando.\n\nApós várias tentativas de acalmá-los, finalmente entendo que isso é uma disputa entre a [city_province.Custom('InspectionFightingGuilds1Loc')|l] e a [city_province.Custom('InspectionFightingGuilds2Loc')|l] por direitos de propriedade na parte mais importante do centro da cidade."
 bp3_survey.1030.a: "Há espaço para ambos!"
 bp3_survey.1030.a.win: "Eles encontram um compromisso"
 bp3_survey.1030.a.loss: "Isso se transforma em uma luta pelo poder que afeta toda [city_province.GetNameNoTooltip]"
 bp3_survey.1030.a.loss_short: "Eles se recusam a chegar a um acordo"
 bp3_survey.1030.b: "Apoiar a [city_province.Custom('InspectionFightingGuilds1Loc')|l]."
 bp3_survey.1030.c: "Ajudar a [city_province.Custom('InspectionFightingGuilds2Loc')|l]."
 bp3_survey.1030.d: "O [city_province.Custom('InspectionFightingGuilds1Loc')|l]? O [city_province.Custom('InspectionFightingGuilds2Loc')|l]?! Pff, esse é o meu ouro!"
