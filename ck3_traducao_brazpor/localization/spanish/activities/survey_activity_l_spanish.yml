 ### Intro Event ###
 bp3_survey.0005.t: "Chegada"
 bp3_survey.0005.desc.holder: "Ao chegar a [ROOT.Char.GetCurrentLocation.GetName], sou conduzido a um pequeno escritório onde me recebe [county_holder.Custom('ES_ElLa')] [county_holder.GetTitledFirstName|l]. Eu havia enviado um mensageiro com antecedência, então não deveria ser surpresa eu estar aqui, mas [county_holder.GetFirstNameNoTooltip] claramente sente curiosidade sobre os motivos. Toda essa agitação é por uma consciência culpada ou são apenas generalidades?\n\nNão importa, não estou aqui para lidar com [county_holder.GetSheHe] agora, estou aqui para…"
 bp3_survey.0005.desc.no_holder: "Quando chego a [ROOT.Char.GetCurrentLocation.GetName], sou conduzido ao gabinete. Um grupo de servos atende a todas as minhas necessidades e fica me rodeando por um tempo, até eu pedir que se retirem. Como posso me concentrar na tarefa em mãos se eles ficam correndo pela sala?\n\nAgora que eles saíram do caminho, finalmente posso começar a trabalhar nos meus planos, que são…"
 bp3_survey.0005.a: "Expandir minhas fronteiras."
 bp3_survey.0005.a.tt: "A [inspection|lE] tentará:$SurveyArrivalIntroClaims$ $SurveyARrivalIntroVassals$"
 bp3_survey.0005.b: "Melhorar a burocracia aqui em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]."
 bp3_survey.0005.b.tt: "A [inspection|lE] tentará:$SurveyArrivalIntroTax$ $SurveyArrivalIntroDevelopment$ $SurveyArrivalIntroControl$"
 bp3_survey.0005.c: "Garantir que o povo daqui se lembre de que sou sua [Select_CString( ROOT.Char.IsFemale, 'señora', 'señor' )]."
 bp3_survey.0005.c.tt: "A [inspection|lE] tentará:$SurveyArrivalIntroLevy$ $SurveyArrivalIntroOpinion$ $SurveyArrivalIntroPopularOpinion$"
