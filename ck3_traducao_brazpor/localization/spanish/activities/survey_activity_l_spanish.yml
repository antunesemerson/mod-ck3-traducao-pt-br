 inspection_mid_border_fail_key_title: "Tentativas Fracassadas"
 inspection_mid_border_fail_key: "[host.GetShortUIName] falhou em estabelecer sua reivindicação sobre as terras de fronteira de [province.GetName]."
 bp3_survey.0030.t: "Supervisionando [province.GetNameNoTooltip]"
 bp3_survey.0030.desc: "Após examinar minuciosamente todos os documentos que pude encontrar, consegui obter um orçamento extra que posso realocar para aliviar alguns dos problemas de infraestrutura local que afligem o condado. Só preciso descobrir qual seção da burocracia mais precisa de algum auxílio adicional."
 bp3_survey.0030.a: "Corrigir as brechas fiscais locais se pagará com o tempo."
 bp3_survey.0030.a.tt: "Recompensa melhorada [Concept('tax', 'fiscal')|E] se a [inspection|lE] for bem-sucedida\n"
 bp3_survey.0030.b: "A [province.Custom('SurveyMidDomainInfrastructureOptionsLoc')|l] [province.GetNameNoTooltip] precisa da ajuda."
 bp3_survey.0030.b.tt: "Recompensa de [development|lE] melhorada se a [inspection|lE] for bem-sucedida\n"
 bp3_survey.0030.c: "A guarnição local tem enfrentado dificuldades ultimamente."
 bp3_survey.0030.c.tt: "Recompensa de [control|lE] melhorada se a [inspection|lE] for bem-sucedida\n"
 bp3_survey.0030.d: "Na verdade... #emp Eu#! preciso desse dinheiro."
 inspection_mid_activity_tax_great_modifier: "Impostos Melhorados"
 inspection_mid_activity_tax_great_modifier_desc: "O senhor local supervisionou pessoalmente a infraestrutura de coleta de impostos local."
 inspection_mid_activity_tax_average_modifier: "Impostos Ajustados"
 inspection_mid_activity_tax_average_modifier_desc: "Houve ajustes recentes na burocracia relacionada à coleta de impostos no condado."
 inspection_mid_activity_development_great_modifier: "Desenvolvimento Melhorado"
 inspection_mid_activity_development_great_modifier_desc: "O senhor local tomou medidas para realocar dinheiro e melhorar significativamente a infraestrutura local."
 inspection_mid_activity_development_average_modifier: "Desenvolvimento Ajustado"
 inspection_mid_activity_development_average_modifier_desc: "Dinheiro foi reservado para ajudar a melhorar a burocracia local."
 inspection_mid_activity_control_great_modifier: "Controle Melhorado"
 inspection_mid_activity_control_great_modifier_desc: "A guarnição local recebeu uma quantia significativa de dinheiro para aumentar suas patrulhas no condado."
 inspection_mid_activity_control_average_modifier: "Controle Ajustado"
 inspection_mid_activity_control_average_modifier_desc: "Dinheiro foi alocado para ajudar a aliviar os problemas locais do condado."
