 inspection_protected_poi_gold_modifier: "Monumento Guarnecido"
 inspection_protected_poi_gold_modifier_desc: "O monumento local recebeu uma guarnição específica para protegê-lo e a seus muitos viajantes.\n$protected_poi_modifier_desc$"
 inspection_protected_holy_site_gold_modifier: "Sítio Sagrado Guarnecido"
 inspection_protected_holy_site_gold_modifier_desc: "O sítio sagrado local recebeu uma guarnição específica para protegê-lo e a seus muitos peregrinos.\n$protected_holy_site_modifier_desc$"
