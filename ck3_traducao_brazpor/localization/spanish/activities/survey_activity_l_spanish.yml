 ### Mid-Activity Events ###
 bp3_survey.0020.t: "Planos para Expansão"
 bp3_survey.0020.desc: "Viajo às terras fronteiriças de [province.GetName] para ver os próprios confins do meu domínio. Um ermo desolado, esperando por um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetLadyLord] com certa ambição para assumir as rédeas, alguém com olhar para o potencial.\n\n"
 bp3_survey.0020.desc_weak_neighbor: "Supostamente,[neighboring_lord.Custom('ES_OA')] [neighboring_lord.GetName] é o mais parecido com um[neighboring_lord.Custom('ES_XA')] nobre no comando destas terras. [Select_CString( neighboring_lord.IsFemale, 'uma mulher', 'um homem' )] fraco que espera que alguém lhe diga o que fazer, pelo que ouvi."
 bp3_survey.0020.desc_no_neighbor: "Com ninguém mais de destaque nas proximidades, estabelecer domínio e reivindicar estas terras não deve ser um problema."
 bp3_survey.0020.a: "Vamos tentar chegar a um acordo com [neighboring_lord.Custom('ES_ElLa')] este [neighboring_lord.GetFirstNameNoTooltip]."
 bp3_survey.0020.a.tt: "Aumenta a aceitação da [Concept('offer_vassalization', 'oferta de vasallaje')|E] se a [inspection|lE] tiver sucesso\n"
 bp3_survey.0020.b: "É hora de tornar essas terras minhas."
 bp3_survey.0020.b.tt: "Recompensa de [claims|lE] melhorada se a [inspection|E] for bem-sucedida\n"
 bp3_survey.0020.acceptance.positive: "Aumenta a aceitação da [Concept('offer_vassalization', 'oferta de vasallaje')|E] de [neighboring_lord.GetName]:"
 bp3_survey.0020.acceptance.great_success: "$bp3_survey.0020.acceptance.positive$ #p +10#!"
 bp3_survey.0020.acceptance.success: "$bp3_survey.0020.acceptance.positive$ #p +5#!"
