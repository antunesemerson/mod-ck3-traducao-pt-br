 ### End Event ###
 bp3_survey.0010.t: "Conclusão"
 bp3_survey.0010.desc.border.success: "Nosso esforço na fronteira de [province.GetName] foi um grande sucesso. Nós a definimos claramente como uma área que deve estar sob a supervisão de [ROOT.Char.GetPrimaryTitle.GetName] e isso se reflete na forma como as pessoas falam sobre ela.\n\nMuitos moradores locais supostamente falam de mim como se eu já fosse seu governante."
 bp3_survey.0010.desc.border.failure: "Apesar de nossos melhores esforços, todas as nossas tentativas de reivindicar um direito sobre as terras de fronteira de [province.GetName] ficaram aquém, para não dizer de forma até constrangedora. Alguns dos moradores das terras de fronteira começaram a dizer tão bem-sucedido quanto [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstName|l] como expressão para jovens rejeitad[ROOT.Char.Custom('ES_OA')]s.\n\nEstou começando a me arrepender de tudo isso…"
 bp3_survey.0010.desc.bureaucracy.success: "No início parecia impossível, mas, de algum modo, consegui encontrar uma maneira de pôr as coisas em ordem em [province.GetName] e de acabar com parte da corrupção e dos bandidos locais. Embora seja apenas um primeiro passo na direção certa, isso é crucial para o futuro do condado.\n\nAgora só precisamos garantir que permaneçamos no caminho certo no futuro próximo."
 bp3_survey.0010.desc.bureaucracy.failure: "Às vezes, parecia que talvez a corrupção que assola [province.GetName], mas a cada passo surgia algo novo que precisava ser consertado. Sempre havia outro grupo de bandidos saqueando, outro nobre corrupto escondendo os impostos ou outro edifício que precisava de renovação.\n\nEmbora tenha sido um esforço heroico da minha parte, há limites para o que [Select_CString( ROOT.Char.IsFemale, 'una sola', 'un solo' )] [ROOT.Char.GetWomanMan]…"
 bp3_survey.0010.desc.people.success: "Vimos um aumento considerável da popularidade entre os moradores de [province.GetName] a ponto de que alguns usam "ser como [ROOT.Char.GetFirstName]" como expressão. Era só questão de tempo até aprenderem a apreciar seus superiores.\n\nCom sorte, eles se lembrarão disso da próxima vez que surgir alguma questão menor e sem sentido."
 bp3_survey.0010.desc.people.failure: "Não importa quanto eu fale ou interaja com os habitantes locais de [province.GetName], o condado mantém uma constante sensação de descontentamento. Apesar dos meus melhores esforços, não sei como abordar ou resolver essa questão.\n\nTalvez não fosse para ser assim, pelo menos não agora."
 bp3_survey.0010.a: "Como planejado."
 bp3_survey.0010.b: "Voltarei e corrigirei isso em algum outro momento."
 bp3_survey.0010.acceptance.positive: "Aumentada a aceitação da [Concept('offer_vassalization', 'oferta de vasallaje')|E] de [THIS.Char.GetName] :"
 bp3_survey.0010.acceptance.success: "$bp3_survey.0010.acceptance.positive$ #p +10#!"
