 bp3_survey.1090.t: "As Terras Escondidas"
 bp3_survey.1090.desc: "“Vieram atrás de alguns caçadores furtivos, é?”, grita-nos [Select_CString( hunter_character.IsFemale, 'una cazadora harapienta', 'un cazador harapiento' )] quando nos aproximamos de seu pequeno acampamento durante uma de minhas inspeções do interior de [province.GetName]. “Há muitos por aqui, mesmo que isso não seja terra real. Aqui em [poaching_province.GetName], cada um por si.”\n\n“Se quiserem reivindicar seus direitos sobre estas terras, precisam de alguém que possa aparecer regularmente em seu nome, sabe o que quero dizer”, continua, piscando um olho, antes de morder um pedaço de carne grelhada. Um grupo que mostre a todos aqui que estas terras realmente me pertencem? Talvez não seja uma ideia tão ruim…"
 bp3_survey.1090.a: "Contrataremos alguns guardas para patrulhar as terras."
 bp3_survey.1090.b: "Recrute os caçadores locais que já conhecem a área."
 bp3_survey.1090.c: "Quem se importa com um ou dois caçadores furtivos?"
 inspection_hidden_hinterlands_modifier: "[hunt_success_chance|E]: #p +10 %#!\n[prestige_experience|E] da [hike|lE] de #P +25 %#!"
 inspection_hidden_hinterlands_recruit_modifier: "Patrulha da Natureza"
 inspection_hidden_hinterlands_recruit_modifier_desc: "Um regimento de guardas destacado para garantir que haja o mínimo possível de caçadores furtivos ou criminosos na região.\n\n $inspection_hidden_hinterlands_modifier$"
 inspection_hidden_hinterlands_hunters_modifier: "Caçadores Locais"
 inspection_hidden_hinterlands_hunters_modifier_desc: "Um grupo de caçadores locais contratados por seu senhor para proteger a baronia de caçadores furtivos e criminosos.\n\n $inspection_hidden_hinterlands_modifier$"
 ### Progression Events ###
 bp3_survey.1200.t: "Avanço"
 bp3_survey.1200.desc: "Apesar dos muitos problemas e dificuldades que enfrentei aqui em [province.GetName], sinto que comecei a ter uma boa compreensão de como lidar com a situação. Os proprietários de terras, as guildas locais, todos estão começando a aceitar meu modo de fazer as coisas.\n\nAgora só preciso traçar um caminho para o futuro deste condado e encontrar as pessoas certas para liderá-lo até lá."
 bp3_survey.1200.a: "Espero que esses sejam os últimos dos meus desafios aqui."
 bp3_survey.1210.t: "Um Passo na Direção Certa"
 bp3_survey.1210.desc: "Após uma noite de discussões com os proprietários locais, finalmente consegui fechar um acordo com uma das guildas de comerciantes locais.\n\nEspero que este seja apenas o começo de colocar este condado onde eu gostaria que estivesse. Se ao menos eu pudesse encontrar algumas vozes mais amigáveis para apoiar meus esforços aqui."
 bp3_survey.1210.a: "O primeiro de muitos passos."
 bp3_survey.1220.t: "Um Passo em Falso"
 bp3_survey.1220.desc: "Após uma noite de discussões com os proprietários locais, eles ainda não conseguiram encontrar um compromisso. Apesar dos meus melhores esforços, sinto minha motivação para tentar manter as coisas unidas aqui lentamente desaparecer.\n\nPor que eles simplesmente não podem se dar bem, pelo menos uma vez?"
 bp3_survey.1220.a: "Apenas #bold conversem#! entre si!"
 bp3_survey.1230.t: "Erro Após Erro"
 bp3_survey.1230.desc: "Após um longo dia conversando com os proprietários locais, encontro-me envolvido em uma pequena disputa entre guildas de comerciantes, seguida por mais discussões entre nobres.\n\nNão importa onde eu olhe, sinto que há outro problema esperando pela minha atenção. Qual é o problema com as pessoas que vivem aqui em [province.GetName]?!"
 bp3_survey.1230.a: "Será que eles realmente #emp querem#! que as coisas melhorem?!"
