l_spanish:
 #Pious/Worldliness Achieved reward explanations
 activity_pilgrimage_special_type_bar_segment_tt_0: "#t Peregrinación decente (nivel 1)#!\n#ts Pontuação: [ActivityWindow.GetSpecialProgressValue|0V]/#V 25#!#!\n[GetPlayer.Custom('GetPiousOrWorldlyRewardTier0')]\n\n #weak [GetPlayer.Custom('GetPiousOrWorldlyFlavorTier0')]#!"
 activity_pilgrimage_special_type_bar_segment_tt_1: "#t Grande Peregrinação (Nível 2)#!\n#ts Pontuação: [ActivityWindow.GetSpecialProgressValue|0V]/#V 50#!#!\n[GetPlayer.Custom('GetPiousOrWorldlyRewardTier1')]\n\n#weak [GetPlayer.Custom('GetPiousOrWorldlyFlavorTier1')]#!"
 activity_pilgrimage_special_type_bar_segment_tt_2: "#t Peregrinación extraordinaria (nivel 3)#!\n#ts Pontuação: [ActivityWindow.GetSpecialProgressValue|0V]/#V 75#!#!\n[GetPlayer.Custom('GetPiousOrWorldlyRewardTier2')]\n\n #weak [GetPlayer.Custom('GetPiousOrWorldlyFlavorTier2')]#!"
 activity_pilgrimage_special_type_bar_segment_tt_3: "#t Peregrinación perfecta (nivel 4)#!\n#ts Pontuação: [ActivityWindow.GetSpecialProgressValue|0V]/#V 100#!#!\n[GetPlayer.Custom('GetPiousOrWorldlyRewardTier3')]\n\n #weak [GetPlayer.Custom('GetPiousOrWorldlyFlavorTier3')]#!"
 #Pious Reward
 activity_pilgrimage_special_type_bar_pious_reward_0: "$BULLET_WITH_TAB$ Recompensa de atividade [piety|lE][piety_i|E] - #p +[EmptyScope.ScriptValue('pilgrimage_low_pious_multiplier_tt')|0]%#!\n$BULLET_WITH_TAB$[trait_level_track_xp|E] de [GetTrait('pilgrim').GetName( GetNullCharacter )|l]: [GetPlayer.Custom('GetPilgrimXpRewardTier0')]"
 activity_pilgrimage_special_type_bar_pious_reward_1: "$BULLET_WITH_TAB$ Recompensa de atividade [piety|lE][piety_i|E] de #p +[EmptyScope.ScriptValue('pilgrimage_mid_pious_multiplier_tt')|0] %#!\n$BULLET_WITH_TAB$[trait_level_track_xp|E] de [GetTrait('pilgrim').GetName( GetNullCharacter )|l] de [GetPlayer.Custom('GetPilgrimXpRewardTier1')]"
 activity_pilgrimage_special_type_bar_pious_reward_2: "$BULLET_WITH_TAB$ Recompensa da atividade [piety|lE][piety_i|E] de #p +[EmptyScope.ScriptValue('pilgrimage_high_pious_multiplier_tt')|0] %#!\n$BULLET_WITH_TAB$[trait_level_track_xp|E] de [GetTrait('pilgrim').GetName( GetNullCharacter )|l] [GetPlayer.Custom('GetPilgrimXpRewardTier2')]"
 activity_pilgrimage_special_type_bar_pious_reward_3: "$BULLET_WITH_TAB$ Recompensa de atividade [piety|lE][piety_i|E]: #p +[EmptyScope.ScriptValue('pilgrimage_perfect_pious_multiplier_tt')|0] %#!\n$BULLET_WITH_TAB$[trait_level_track_xp|E] de [GetTrait('pilgrim').GetName( GetNullCharacter )|l]: [GetPlayer.Custom('GetPilgrimXpRewardTier3')]"
 #Pilgrimage XP
 activity_pilgrimage_special_type_bar_pilgrimage_xp_0: "#z [EmptyScope.ScriptValue('pilgrimage_low_pious_trait_xp_value')|0]#!"
 activity_pilgrimage_special_type_bar_pilgrimage_xp_1: "#z [EmptyScope.ScriptValue('pilgrimage_mid_pious_trait_xp_value')|0]#!"
 activity_pilgrimage_special_type_bar_pilgrimage_xp_2: "#z [EmptyScope.ScriptValue('pilgrimage_high_pious_trait_xp_value')|0]#!"
 activity_pilgrimage_special_type_bar_pilgrimage_xp_3: "#z [EmptyScope.ScriptValue('pilgrimage_perfect_pious_trait_xp_value')|0]#!"
 #Pious Flavor
 activity_pilgrimage_special_type_bar_pious_flavor_0: "É o mínimo que podemos fazer para apaziguar [GetPlayer.GetFaith.PantheonTerm]."
 activity_pilgrimage_special_type_bar_pious_flavor_1: "Os deuses sorriem para mim."
 activity_pilgrimage_special_type_bar_pious_flavor_2: "Estou quase transcendendo."
 activity_pilgrimage_special_type_bar_pious_flavor_3: "Meu espírito e o divino são um só."
 #Worldly Reward
 activity_pilgrimage_special_type_bar_worldly_reward_0: "$BULLET_WITH_TAB$ Recompensa da Atividade: [cultural_acceptance_i][cultural_acceptance|lE] #p +[EmptyScope.ScriptValue('pilgrimage_low_worldly_acceptance_value')|0]%#!"
 activity_pilgrimage_special_type_bar_worldly_reward_1: "$BULLET_WITH_TAB$ Recompensa da Atividade: [cultural_acceptance_i][cultural_acceptance|lE] #p +[EmptyScope.ScriptValue('pilgrimage_mid_worldly_acceptance_value')|0]%#!"
