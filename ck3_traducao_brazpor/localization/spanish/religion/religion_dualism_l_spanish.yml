 #Borborism
 cainitism: "Cainismo"
 cainitism_adj: "Cainita"
 cainitism_adherent: "Cainita"
 cainitism_adherent_plural: "Cainitas"
 cainitism_desc: "Caim foi a primeira vítima do Mal de Demiurgo, criador de toda matéria física. Uma vez que matéria e corpos são o mal, os corpos devem ser maculados e destruídos pela vida pecaminosa, para que a alma humana dentro desse corpo possa ser libertada."
