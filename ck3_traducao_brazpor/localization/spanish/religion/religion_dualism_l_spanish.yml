 #Priscillianism
 priscillianism: "Priscilianismo"
 priscillianism_adj: "Priscilianista"
 priscillianism_adherent: "Pricilianista"
 priscillianism_adherent_plural: "Pricilianistas"
 priscillianism_desc: "Existem dois reinos, um de Luz e um de Trevas. Almas humanas foram planejadas para conquistar o Reino das Trevas, mas ca?ram e ficaram presas no reino material. Entre os humanos existem doze Patriarcas da Luz que falharam em subjugar as Trevas, uma vez que eles foram divididos entre corpo e alma. Assim Deus enviou o Salvador para a Terra, e pela sua morte uma vez mais os esp?ritos humanos foram libertos."
