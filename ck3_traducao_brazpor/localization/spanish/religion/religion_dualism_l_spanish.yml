 #Mingism
 mingism: "Mingismo"
 mingism_adj: "mingista"
 mingism_adherent: "mingista"
 mingism_adherent_plural: "mingistas"
 mingism_desc: "Segundo a doutrina de Buda Móní, o reino celestial da luz está sitiado pelo reino das trevas, e todos aguardam o dia em que o Senhor Radiante, a quem o sol e a lua rendem sua homenagem, enviará seus mensageiros à terra para espalhar a iluminação e libertar o povo de seu sofrimento."
