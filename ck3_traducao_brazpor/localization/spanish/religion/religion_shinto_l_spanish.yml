 # Shinto
 shinto: "Xintoísmo" # 神道
 shinto_adj: "xintoísta"
 shinto_adherent: "sintoísta"
 shinto_adherent_plural: "sintoístas"
 shinto_desc: "O mundo espiritual nos rodeia, e os espíritos habitam todas as partes deste mundo. Qualquer coisa pode ser habitada pelo sobrenatural — uma cama, uma montanha, até mesmo uma tempestade. É importante manter a harmonia com esse mundo espiritual e lhe dar o devido respeito e reconhecimento."
 # Shugendo
 shugendo: "Shugendō" # 修験道
 shugendo_adj: "shugendō"
 shugendo_adherent: "shugendoísta"
 shugendo_adherent_plural: "shugendōistas"
 shugendo_desc: "O caminho para o poder espiritual passa pela disciplina. Para compreender o mundo espiritual, os seguidores do Shugendō observam uma multidão de rituais e buscam os espaços mais sagrados, onde a barreira entre o mundo humano e o mundo espiritual é mais fina."
 shugendo_devotee: "yamabushi" # 山伏
 shugendo_devoteeplural: "yamabushis"
