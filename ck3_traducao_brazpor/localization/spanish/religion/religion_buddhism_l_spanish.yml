 GLOSS_NEMBUTSU: "Recitar o nome de Amitābha é uma antiga prática budista de meditação que despertou grande interesse nas escolas do Leste Asiático. É conhecida como nianfo na China, ou nembutsu no Japão. Algumas escolas consideram que essa prática invoca diretamente a misericórdia de Amitābha, cuja graça pode conceder entrada à Terra Pura, seja a monges ou leigos."
