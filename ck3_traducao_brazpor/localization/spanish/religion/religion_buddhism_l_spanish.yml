 #Ari
 ari: "Ari"
 ari_adj: "Ari"
 ari_adherent: "Ari"
 ari_adherent_plural: "Aris"
 ari_desc: "A fé Ari combina elementos do budismo tântrico, adoração ao espírito, adoração Naga tradicional, bem como do hinduísmo. Adoradores de Ari são considerados budistas, embora suas práticas sejam consideradas pouco ortodoxas."
 #Theravada
 theravada: "Theravada"
 theravada_adj: "Theravada"
 theravada_adherent: "Teravadiano"
 theravada_adherent_plural: "Teravadianos"
 theravada_desc: "O caminho para a iluminação passa pela experiência pessoal, reflexão e raciocínio. Gautama Buddha encontrou seu próprio caminho para o Nirvana, e a única maneira de encontrar um caminho semelhante é experimentando, aprendendo e estudando sua própria existência."
 #Mahayana
 mahayana: "Mahayana"
 mahayana_adj: "Mahayana"
 mahayana_adherent: "Mahayanano"
 mahayana_adherent_plural: "Mahayananos"
 mahayana_desc: "A liberação do Samsara não é meramente algo feito individualmente, mas uma experiência compartilhada entre os seres sencientes. Alcançar o estado de Buda é um passo no longo caminho para que todos os seres sencientes sejam liberados no Nirvana, e esse é o objetivo virtuoso do Samsara."
 #Vajrayana
 vajrayana: "Vajrayana"
 vajrayana_adj: "Vajrayana"
 vajrayana_adherent: "Vajrayanano"
 vajrayana_adherent_plural: "Vajrayananos"
 vajrayana_desc: "A motivação para o estado de Buda é crucialmente importante, e a verdadeira iluminação só pode ser alcançada quando buscada para o benefício de todos os seres sencientes. Todos os seres nascem com uma mente iluminada, mas ela é obscurecida pela existência. Praticar ver a verdade do mundo e do universo, portanto, desbloqueia a iluminação inata."
 vajrayana_religious_text: "Tantras Budistas"
