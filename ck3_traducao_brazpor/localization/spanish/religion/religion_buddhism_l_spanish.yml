 lamaism_desc: "O budismo no Tibete é conhecido como Nangchos, ou o Dharma dos Insiders. Dentro do Império Tibetano, as crenças e práticas Vajrayana e Mahayana se sincretizaram com crenças, práticas e divindades tibetanas tradicionais, com várias escolas também competindo entre si pelo controle temporal."
