 dhyana: "Dhyana"
 dhyana_adj: "dhyana"
 dhyana_adherent: "dianista"
 dhyana_adherent_plural: "dhyanistas"
 dhyana_desc: "O budismo dhyana enfatiza fortemente a meditação profunda e intensa como o único caminho viável para a iluminação — só é possível alcançar a verdadeira compreensão por meio da reflexão e contemplação interior, e não pelo estudo das escrituras."
 vinaya: "Vinaya"
 vinaya_adj: "vinaya"
 vinaya_adherent: "vinayista"
 vinaya_adherent_plural: "vinayistas"
 vinaya_desc: "Os praticantes do budismo Vinaya se mantêm, assim como uns aos outros, a rigorosos padrões morais e éticos, pois a autodisciplina é o alicerce necessário para a busca de uma sabedoria profunda."
 pundarika: "Pundarika"
 pundarika_adj: "pundarika"
 pundarika_adherent: "pundarikista"
 pundarika_adherent_plural: "pundaristas"
 pundarika_desc: "No budismo pundarika, o Sutra de Lótus é reverenciado e venerado acima de todos os outros, o qual enfatiza mantras e rituais complexos e se originou de uma mistura de elementos tântricos e esotéricos transmitidos à China pela Rota da Seda."
 sukhavati: "Sukhavati"
 sukhavati_adj: "sukhavati"
 sukhavati_adherent: "sukhavatista"
 sukhavati_adherent_plural: "sukhavatistas"
 sukhavati_desc: "O Sukhavati, ou budismo da Terra Pura, ensina que as rotas tradicionais para a iluminação já não são possíveis. No entanto, ao invocar a compaixão de Amitābha ao recitar seu nome, pode-se renascer em sua Terra Pura após a morte, seja monge ou leigo."
 yogacara: "Yogachara"
 yogacara_adj: "yogachara"
 yogacara_adherent: "iogacharista"
 yogacara_adherent_plural: "yogacaristas"
 yogacara_desc: "Os budistas do yogacara questionam aquilo que outros simplesmente tomam como certo ao longo de suas vidas, tratando o mundo material como nada mais do que uma manifestação de suas próprias consciências."
 avatamsaka: "Avatamsaka"
 avatamsaka_adj: "avatamsaka"
 avatamsaka_adherent: "avatamsakista"
 avatamsaka_adherent_plural: "avatamsakistas"
 avatamsaka_desc: "Os budistas do avatamsaka consideram o Sutra da Guirlanda de Flores como a fonte suprema da verdade, que fala de uma infinidade de mundos, de universos inteiros contidos em uma única mota de poeira."
 mantrayana: "Mantrayana"
 mantrayana_adj: "mantrayana"
 mantrayana_adherent: "mantrayanista"
 mantrayana_adherent_plural: "mantrayanistas"
 mantrayana_desc: "Os budistas do mantrayana ampliam sua compreensão do profundo e aceleram sua jornada espiritual com uma série de rituais esotéricos e instrumentos místicos."
 maitreya: "Maitreya"
 maitreya_adj: "Maitreya"
 maitreya_adherent: "maitreyanista"
 maitreya_adherent_plural: "maitreyanistas"
 maitreya_desc: "A era de Buda Sakyamuni acabou e o Buda Maitreya desceu ao mundo, ou assim creem aqueles que exaltam e abraçam Maitreya como seu salvador profetizado. É somente por meio da destruição da velha ordem que o mundo pode ser salvo."
 maitreya_religious_head_title: "Hierarca" #教主
 maitreya_religious_head_title_name: "Ordens religiosas"
 acharya: "Acharya"
 acharya_adj: "acharya"
 acharya_adherent: "acharyaísta"
 acharya_adherent_plural: "acharyistas"
 acharya_desc: "Acharya, um derivado do budismo Vajrayana, cristalizou-se no século IX com a mescla e integração de rituais chineses e práticas tântricas tibetanas, resultando em uma manifestação regionalizada de práticas e culto budistas."
