 east_christian_war_god_name: "São Maurício"
 east_christian_war_god_name_possessive: "de Santos Maurício"
 armenian_apostolic: "Apostólico"
 armenian_apostolic_adj: "Apostólico"
 armenian_apostolic_adherent: "Apostólico"
 armenian_apostolic_adherent_plural: "Apostólicos"
 armenian_apostolic_desc: "Fundada pelos Apóstolos Bartolomeu e Tadeu, a Igreja Apostólica Armênia rapidamente ganhou seguidores na região e conduziu o Reino da Armênia a se tornar o primeiro estado a adotar o Cristianismo como religião oficial."
 apostolic_religious_head_title: "Católicos"
 apostolic_religious_head_title_plural: "Catholicos"
 apostolic_religious_head_title_name: "Igreja"
 nestorian: "Nestorianismo"
 nestorian_adj: "Nestoriano"
 nestorian_adherent: "Nestoriano"
 nestorian_adherent_plural: "Nestorianos"
 nestorian_desc: "Ao ensinar que Jesus Cristo tem duas naturezas, uma divina e outra humana, o nestorianismo foi declarado herético pela maioria das religiões cristãs. Apesar disso, sua visão única atraiu seguidores em lugares tão distantes como China, Índia e até Mongólia."
 nestorian_religious_head_title: "Patriarca"
 nestorian_religious_head_title_name: "Patriarcado"
 messalian: "Messalianismo"
 messalian_adj: "Messaliano"
 messalian_adherent: "Messaliano"
 messalian_adherent_plural: "Messalianos"
 messalian_desc: "Acreditando que a essência de Deus pode ser percebida através dos sentidos carnais, os messalianos rejeitam os sacramentos cristãos tradicionais e, em vez disso, procuram experimentar Deus diretamente por meios menos convencionais de adoração."
 messalian_priest: "perfeito"
 messalian_priest_plural: "perfeitos"
 adamites: "Adamitismo"
 adamites_adj: "Adamita"
 adamites_adherent: "Adamita"
 adamites_adherent_plural: "Adamitas"
 adamites_desc: "Os adamitas afirmam ter recapturado o estado original de inocência de Adão e Eva, tirando suas roupas. Grupos de adamitas muitas vezes vivem em um estado de absoluta ilegalidade, alegando que, devido a essa inocência, suas ações não podem ser boas nem más."
