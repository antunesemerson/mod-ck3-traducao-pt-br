 catholic_desc: "A Igreja Católica Romana afirma que Jesus concedeu as Chaves do Reino dos Céus a São Pedro e que, como seu legítimo sucessor, o Papa é, portanto, a autoridade espiritual suprema de todo o mundo cristão."
