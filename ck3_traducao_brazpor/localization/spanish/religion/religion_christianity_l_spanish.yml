 waldensian: "Valdense"
 waldensian_adj: "Valdense"
 waldensian_adherent: "Valdense"
 waldensian_adherent_plural: "Valdenses"
 waldensian_desc: "Sustentando que o acúmulo de riqueza é um anátema incompatível com a obtenção da salvação, os valdenses pregam a pobreza apostólica como o caminho para a perfeição e acreditam que os padres não devem possuir títulos nem terras."
 lollard: "Lolardia"
 lollard_adj: "Lolardia"
 lollard_adherent: "Lolardia"
 lollard_adherent_plural: "Lolardios"
 lollard_desc: "Denunciando muitos sacramentos cristãos comuns, como o batismo e a confissão, os lolardos sustentam que a Bíblia Sagrada é a única fonte válida da doutrina cristã e que qualquer ensino não baseado diretamente nela é inerentemente ilegítimo."
 insular_celtic: "Cristianismo insular"
 insular_celtic_adj: "Insular"
 insular_celtic_adherent: "Insularista"
 insular_celtic_adherent_plural: "Insularistas"
 insular_celtic_desc: "Uma igreja rural que se afastou da ortodoxia católica romana alguns séculos atrás, o cristianismo insular perdeu muitas de suas características antes distintas por insistência de sua igreja-mãe. Ainda retém uma maior ênfase na penitência e no monaquismo, e incorpora muitos costumes tradicionais de casamento celta estrangeiros à cristandade mais ampla."
 insular_celtic_religious_head_title: "Arcabade"
