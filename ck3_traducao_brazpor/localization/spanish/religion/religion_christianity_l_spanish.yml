 bosnian_church_adherent_plural: "Krstjanis"
 bosnian_church_desc: "Há muito esquecidos por católicos e ortodoxos, os krstjani das terras altas da Bósnia são mais permissivos do que seus compatriotas mais conhecidos, mas carecem de estrutura formal. Retendo muitos elementos arcaicos do Cristianismo, eles são frequentemente tratados com desdém pelos correligionários, se forem lembrados."
