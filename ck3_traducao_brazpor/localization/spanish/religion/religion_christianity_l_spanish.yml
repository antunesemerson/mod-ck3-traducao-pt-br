 mozarabic_church: "Mozarabismo"
 mozarabic_church_adj: "Mozárabe"
 mozarabic_church_adherent: "Mozárabe"
 mozarabic_church_adherent_plural: "Mozárabes"
 mozarabic_church_desc: "Descendente dos primeiros ritos ibéricos, o cristianismo moçárabe manteve um nível de independência de Roma devido aos séculos sob domínio islâmico. Sua longa convivência com outras religiões os tornou mais tolerantes com as diferenças do que seitas mais fundamentalistas."
 adoptionist: "Adocionismo"
 adoptionist_adj: "Adocionista"
 adoptionist_adherent: "Adocionista"
 adoptionist_adherent_plural: "Adocionistas"
 adoptionist_desc: "A vertente ibérica do adoção traça suas raízes a uma combinação de pensamento independente no arcebispado de Toledo e suas sedes circundantes, o puritanismo norte-africano de séculos passados e vários hereges extremamente carismáticos do início do século IX.\n\nEmbora assuma muitas formas, das mais sutis às mais contundentes, o ponto doutrinário que as une é o questionamento da divindade eterna do Filho."
 adoptionist_religious_head_title: "Arcebispo"
 adoptionist_religious_head_title_name: "Arcebispado"
 conversos: "Conversos"
 conversos_adj: "Converso"
 conversos_adherent: "Converso"
 conversos_adherent_plural: "Conversos"
 conversos_desc: "Os Conversos se originaram quando as comunidades judaicas foram convertidas à força ao Cristianismo. Embora tenham abraçado sua nova fé, eles ainda se lembram de suas antigas tradições e são solidários com aqueles que ainda os seguem."
 #Orthodox-Group Faiths
 orthodox: "Ortodoxia"
 orthodox_adj: "Ortodoxa"
 orthodox_adherent: "Ortodoxo"
 orthodox_adherent_plural: "Ortodoxos"
 orthodox_desc: "Sustentando que seus bispos são os sucessores verdadeiros e diretos dos apóstolos de Cristo, a Igreja Ortodoxa Oriental afirma ser a fé cristã original, transmitida pela sagrada tradição litúrgica."
 orthodox_religious_head_title: "Patriarca"
 orthodox_religious_head_title_name: "Patriarcado"
 bogomilist: "Bogomilismo"
 bogomilist_adj: "Bogomilismo"
 bogomilist_adherent: "Bogomil"
 bogomilist_adherent_plural: "Bogomios"
 bogomilist_desc: "Elegendo seus líderes espirituais entre a população em geral, os Bogomilos rejeitam todas as armadilhas e instituições de poder do mundo, defendendo, em vez disso, um retorno aos métodos anteriores de ensino espiritual praticados por Cristo e seus discípulos."
 bogomilist_priest: "Eleito"
 bogomilist_priest_plural: "Eleitos"
 paulician: "Paulicianismo"
 paulician_adj: "Pauliciano"
 paulician_adherent: "Pauliciano"
 paulician_adherent_plural: "Paulicianos"
 paulician_desc: "Rejeitando a divindade de Cristo e vendo a veneração da cruz como pagã, os Paulicianos visam restaurar o que eles acreditam ser a verdadeira forma de Cristianismo, conforme estabelecido por Paulo de Tarso."
 paulician_religious_text: "Chave da verdade"
 paulician_religious_text_2: "$paulician_religious_text$" #Optional translation alt
 paulician_religious_text_3: "$paulician_religious_text$" #Optional translation alt
 iconoclast: "Iconoclastia"
 iconoclast_adj: "Iconoclasta"
 iconoclast_adherent: "Iconoclasta"
 iconoclast_adherent_plural: "Iconoclastas"
 iconoclast_desc: "Acreditando que qualquer uso de símbolos espirituais viola o Segundo Mandamento de não fazer imagens esculpidas, os Iconoclastas procuram destruir a iconografia religiosa existente e rejeitar a criação de novas."
 #Eastern-Group Faiths
 coptic: "Cóptico"
 coptic_adj: "Cóptico"
 coptic_adherent: "Copta"
 coptic_adherent_plural: "Coptas"
 coptic_desc: "Traçando suas origens até São Marcos, o Evangelista, a Igreja Copta é famosa por ser o berço do monaquismo cristão, bem como por manter uma longa tradição de promoção da educação e filosofia."
 coptic_religious_head_title: "$christianity_religious_head_title$"
 coptic_religious_head_title_name: "$christianity_religious_head_title_name$"
