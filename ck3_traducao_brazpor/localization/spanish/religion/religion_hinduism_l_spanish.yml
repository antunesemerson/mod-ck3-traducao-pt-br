 #Shaivism
 shaivism: "Shivaísmo"
 shaivism_adj: "shivaísta"
 shaivism_adherent: "shivaísta"
 shaivism_adherent_plural: "shivaístas"
 shaivism_desc: "Os shaivitas veneram Shiva, o criador e destruidor de mundos, como o Ser Supremo que existe em todas as coisas. Da mesma maneira que Shiva trabalha para manter o equilíbrio e preservar o universo, os fiéis devem se esforçar para trazer equilíbrio às suas vidas."
