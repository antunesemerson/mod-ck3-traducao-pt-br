 #Vaishnavism
 vaishnavism: "Vaishnavismo"
 vaishnavism_adj: "vaishnavita"
 vaishnavism_adherent: "vaishnava"
 vaishnavism_adherent_plural: "vaishnavas"
 vaishnavism_desc: "No Vaishnavismo, Vishnu é o Senhor Supremo, e os devas mais importantes são seus muitos avatares encarnados, como Rama e Krishna. Cada uma dessas várias encarnações trabalha para restaurar o equilíbrio do universo."
