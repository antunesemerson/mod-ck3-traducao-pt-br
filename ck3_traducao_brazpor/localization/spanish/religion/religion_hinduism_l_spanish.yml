 #Srikula Shaktism
 srikula_shaktism: "Shaktismo Srikula"
 srikula_shaktism_adj: "Srikula"
 srikula_shaktism_adherent: "Srikulaíta"
 srikula_shaktism_adherent_plural: "Srikulaítas"
 srikula_shaktism_desc: "O Shaktismo acredita na Grande Deusa como o Ser Supremo, de onde deriva toda a existência. Os srikulas adoram Tripura Sundari como o aspecto mais elevado da Deusa e a fonte de toda Shakti, a energia do universo."
 shaktism_good_god_sundari: "Tripura Sundari"
 shaktism_good_god_sundari_2: "$shaktism_good_god_sundari$" #Optional translation alt
 shaktism_good_god_sundari_possessive: "de Tripura Sundari"
 shaktism_good_god_devi: "Devi"
 shaktism_good_god_parvati: "Parvati"
 shaktism_good_god_kali: "Kali"
 shaktism_good_god_kali_2: "$shaktism_good_god_kali$" #Optional translation alt
 shaktism_good_god_kali_possessive: "de Kali"
 shaktism_good_god_chandi: "Chandi"
 #Kalikula Shaktism
 kalikula_shaktism: "Shaktismo Kalikula"
 kalikula_shaktism_adj: "Kalikula"
 kalikula_shaktism_adherent: "Kalikulaíta"
 kalikula_shaktism_adherent_plural: "Kalikulaítas"
 kalikula_shaktism_desc: "O Shaktismo acredita na Grande Deusa como o Ser Supremo, de onde deriva toda a existência. Os kalikulas adoram Kali como aquela que pode dar orientação, bom renascimento e, finalmente, moksha."
 #Smartism
 smartism: "Smartismo"
 smartism_adj: "Smarta"
 smartism_adherent: "Smarta"
 smartism_adherent_plural: "Smartas"
 smartism_desc: "A tradição Smarta rejeita a adoração de deuses individuais. Brahman é uno e eterno, e Vishnu, Devi, Shiva, Ganesh e Surya são adorados como avatares iguais do Ser Supremo. Qualquer adoração individual é um passo para alcançar o entendimento e a unidade com Brahman."
 smartism_health_god_name: "Vixnu"
 smartism_health_god_name_possessive: "de Vixnu"
 smartism_household_god_name: "Shiva"
 smartism_household_god_name_possessive: "de Shiva"
 smartism_knowledge_god_name: "Ganesha"
 smartism_knowledge_god_name_possessive: "de Ganesha"
 smartism_war_god_name: "Devi"
 smartism_war_god_name_possessive: "de Devi"
 #Krishnaism
 krishnaism: "Krishnaísmo"
 krishnaism_adj: "Krishnaíta"
 krishnaism_adherent: "Krishnaíta"
 krishnaism_adherent_plural: "Krishnaítas"
 krishnaism_desc: "Krishna é a forma autêntica do Ser Supremo, e Vishnu é seu avatar quando ele assume a forma do onipotente. Por meio de seus avatares divinos, ele está presente em todas as coisas."
 krishnaism_high_god_name: "Krishna"
 krishnaism_high_god_name_2: "$krishnaism_high_god_name$" #Optional translation alt
 krishnaism_high_god_name_possessive: "de Krishna"
 #Advaitism
 advaitism: "Advaita Vedanta"
 advaitism_adj: "Advaita"
 advaitism_adherent: "Vedantista Advaita"
 advaitism_adherent_plural: "Vedantistas Advaita"
 advaitism_desc: "Ao contrário de muitas religiões hindus, o Advaita Vedanta enfatiza a unidade do Atman, o verdadeiro eu, com Brahman, a realidade mais verdadeira, e acredita que moksha pode ser alcançado tanto em vida quanto na morte."
 #Saura
 saura: "Saurismo"
 saura_adj: "Saurita"
 saura_adherent: "Saurita"
 saura_adherent_plural: "Sauritas"
 saura_desc: "Surya, o Deus do Sol, o Brahman visível, é a principal divindade dos sauritas. Enraizados na tradição védica, os sauritas caracterizam Surya como sentado em uma carruagem puxada por sete cavalos, cada um representando uma cor do arco-íris."
