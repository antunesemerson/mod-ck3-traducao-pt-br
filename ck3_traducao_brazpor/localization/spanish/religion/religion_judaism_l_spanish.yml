 haymanot_religious_head_title: "Liqa Kahnet"
 haymanot_devotee: "Monkosa"
 haymanot_devotee_plural: "Monkosas"
 haymanot_priest: "Kahen"
 haymanot_priest_plural: "Kahens"
 haymanot_bishop: "Shmagle"
 haymanot_bishop_plural: "Shmagles"
 #Malabar
 malabarism: "Malabarismo"
 malabarism_adj: "Malabari"
 malabarism_adherent: "Malabari"
 malabarism_adherent_plural: "Malabari"
 malabarism_desc: "Após os descendentes das tribos de Israel se espalharem pelo mundo, eles criaram comunidades menores de leste a oeste, vivendo de forma independente. Também chamados de judeus de Cochin, eles fizeram sua nova morada no reino de Cochin, no sul da Índia. Lá, eles se misturaram ao povo local e mantiveram suas tradições judaicas."
 #Samaritan
 samaritan: "Samaritanismo"
 samaritan_adj: "Samaritano"
 samaritan_adherent: "Samaritano"
 samaritan_adherent_plural: "Samaritanos"
 samaritan_desc: "Originados das tribos que colonizaram Samaria, os samaritanos seguem uma versão original e não modificada da Torá. Nesse sentido, praticam a verdadeira religião de Moisés, servindo aos deveres diretos concedidos por Deus."
 #Kabarism
 kabarism: "Kuzarismo"
 kabarism_adj: "Kuzarita"
 kabarism_adherent: "Kuzari"
 kabarism_adherent_plural: "Kuzaris"
 kabarism_desc: "Uma comunidade de convertidos, os kuzaritas seguem a interpretação rabínica comum da Halakha. Mesmo muito tempo após a conversão, continuam a manter algumas crenças e tradições locais com reverência religiosa."
 #Merkabah
 merkabah: "Merkabah"
 merkabah_adj: "Merkabah"
 merkabah_adherent: "Merkabista"
 merkabah_adherent_plural: "Merkabistas"
 merkabah_desc: "O Misticismo Merkabah é uma seita do misticismo judaico que compartilha alguma influência dos ensinamentos gnósticos. A fé está centrada em visões, adotando estilos de vida ascéticos para se unir ao Trono de Deus."
 doctrine_temple_authority_name: "Autoridade da Halakha"
 doctrine_temple_authority_desc: "Halakha refere-se a um conjunto de leis e regras pelas quais um judeu deve viver sua vida. Após séculos de diáspora, grupos judeus divergiram em numerosas escolas de pensamento sobre como interpretar adequadamente a Halakha."
 temple_authority_rabbinic_doctrine_name: "Rabínica"
 temple_authority_rabbinic_doctrine_desc: "Os judeus rabínicos acreditam que a Halakha pode ser interpretada apenas pelos rabinos. Eles acreditam na Torá Escrita e na Torá Oral, transmitida pelos rabinos. Toda a crença rabínica está codificada no Talmude Babilônico, que é considerado a fonte primária a partir da qual a Halakha é interpretada e distribuída."
 temple_authority_toric_doctrine_name: "Tórica"
 temple_authority_toric_doctrine_desc: "O Judaísmo Tórico rejeita o Talmude e a Torá Oral, passando a autoridade apenas para a Torá Escrita. Os rabinos não podem alterar ou adaptar a Halakha; seu dever é unicamente interpretar o significado literal da Torá."
 temple_authority_kohanim_doctrine_name: "Cohenítica"
 temple_authority_kohanim_doctrine_desc: "O Judaísmo Cohenítico afirma que os Cohanim são a autoridade suprema em todos os assuntos religiosos, incluindo a Halakha. Os Cohanim devem ser descendentes patrilineares de Aarão, irmão de Moisés."
 temple_authority_samaritan_torah_doctrine_name: "Samaritano"
 temple_authority_samaritan_torah_doctrine_desc: "Os samaritanos rejeitam por completo a autoridade da Torá, concedendo autoridade suprema à Torá Samaritana. Sua rejeição da Torá faz com que sejam universalmente vistos por seus pares como hereges."
 doctrine_parameter_hostility_override_temple_authority_samaritan_torah_doctrine: "Considera [faiths|lE] [GetFaithDoctrine('temple_authority_samaritan_torah_doctrine').GetBaseName|l] como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
