 #Rabbinism
 rabbinism: "Rabinismo"
 rabbinism_adj: "Rabínico"
 rabbinism_adherent: "Rabinista"
 rabbinism_adherent_plural: "Rabinistas"
 rabbinism_desc: "O rabinismo enfatiza o papel dos rabinos como intérpretes da lei religiosa da Halachá. São as leis e tradições que asseguram o cumprimento do pacto com o Senhor, e os rabinos guardam essas leis."
 #Karaite
 karaism: "Caraísmo"
 karaism_adj: "Caraíta"
 karaism_adherent: "Caraíta"
 karaism_adherent_plural: "Caraítas"
 karaism_desc: "Em matéria de direito religioso, só o Tanakh é a autoridade máxima e absoluta. O papel dos rabinos não é o de reavaliar e adaptar as regras do pacto, mas o de interpretar o seu significado literal."
 #Haymanot
 haymanot: "Haymanot"
 haymanot_adj: "Haymanot"
 haymanot_adherent: "Haymanot"
 haymanot_adherent_plural: "Haymanot"
 haymanot_desc: "Os rabinos, ou kahen, julgam em termos de leis religiosas, mas trabalham junto a uma cúpula de anciãos, que julga em termos de tradição e vida."
 haymanot_religious_text: "Orit"
