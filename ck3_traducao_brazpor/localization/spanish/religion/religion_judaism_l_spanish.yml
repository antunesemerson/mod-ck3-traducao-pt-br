 doctrine_parameter_hostility_override_temple_authority_toric_doctrine: "Considera [faiths|lE] [GetFaithDoctrine('temple_authority_toric_doctrine').GetBaseName|l] como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 doctrine_parameter_hostility_override_temple_authority_kohanim_doctrine: "Considera [faiths|lE] [GetFaithDoctrine('temple_authority_kohanim_doctrine').GetBaseName|l] como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 doctrine_parameter_enables_temporal_head_parameter: "Permite a seleção da [doctrine|lE] de líder religioso temporal."
 tenet_communal_identity_chosen_people_name: "Povo Escolhido"
 tenet_communal_identity_chosen_people_desc: "Fomos escolhidos por [ROOT.Faith.HighGodName] para um pacto sagrado. Embora isso una nosso povo em torno de um propósito único, pode agir como impedimento para conversões."
