l_spanish:
 cat_story_modifier: "Gato de estimação"
 cat_story_modifier_desc: "Este personagem aprecia a companhia de um companheiro felino"
 dog_story_modifier: "Cachorro de estimação"
 dog_story_modifier_desc: "Um cachorro leal segue este personagem onde quer que vá"
 dog_story_walking_modifier: "Caminhada com cachorro"
 dog_story_walking_modifier_desc: "Este personagem gosta de caminhar frequentemente com seu cachorro"
 dog_story_fur_carpet_modifier: "Tapete de Pele"
 dog_story_fur_carpet_modifier_desc: "Este personagem tem um lindo tapete de pele"
 cat_story_allergy_modifier: "Sensibilidade a gatos"
 cat_story_allergy_modifier_desc: "Este personagem está sofrendo sintomas incômodos da presença de um gato"
 cat_killing_rodents_modifier: "Livre de Ratos"
 cat_killing_rodents_modifier_desc: "A residência deste personagem está quase completamente livre de ratos"
 cat_story_fur_mittens_modifier: "Luvas de pele"
 cat_story_fur_mittens_modifier_desc: "Este personagem tem um par de luvas de pele para manter as mãos aquecidas quando está frio"
 rat_hunting_dog_modifier: "Cachorro caçador de ratos"
 rat_hunting_dog_modifier_desc: "O cachorro deste personagem é um caçador prolífico de roedores."
 rat_hunting_cat_modifier: "Gato caçador de ratos"
 rat_hunting_cat_modifier_desc: "O gato deste personagem é um caçador prolífico de roedores."
 cat_dopey_modifier: "Gato Desajeitado"
 cat_dopey_modifier_desc: "O gato deste personagem é, digamos, um pouco desajeitado."
 cat_wrangler_modifier: "Domador de Gatos"
 cat_wrangler_modifier_desc: "Este personagem provou ser um especialista na arte complicada de lidar com gatos."
 cat_coitus_interrupted_modifier: "Interrupção Felina"
 cat_coitus_interrupted_modifier_desc: "Este personagem teve seus encontros amorosos interrompidos pela presença de um gato excessivamente amigável."
 cat_rejection_modifier: "Rejeição Felina"
 cat_rejection_modifier_desc: "Este personagem descobriu, para sua consternação, que seu gato prefere a companhia de outros."
 cat_ill_modifier: "Enfermeiro Felino"
 cat_ill_modifier_desc: "Este personagem teve a companhia de seu amigável gato durante a convalescença."
 cat_lover_modifier: "Amante de Gatos"
 cat_lover_modifier_desc: "Este personagem é absolutamente dedicado ao seu companheiro peludo, a ponto de causar alguma leve irritação em seu conselho."
 eagle_story_modifier: "Águia de Caça"
 eagle_story_modifier_desc: "Este personagem tem uma águia majestosa que lhe permite sair para caçar e aventurar-se pela estepe.\n[hunt_success_chance|E] de $hunt_type_falconry$: #P +10 %#!"
 brave_eagle_story_modifier: "Águia Corajosa"
 brave_eagle_story_modifier_desc: "A águia de caça deste personagem é especialmente corajosa e não se esquiva de nenhum perigo.\n[hunt_success_chance|E] de $hunt_type_falconry$: #P +10 %#!"
 curious_eagle_story_modifier: "Águia Curiosa"
 curious_eagle_story_modifier_desc: "A águia de caça deste personagem é tão curiosa quanto uma criança e frequentemente investiga coisas que chamam sua atenção.\n[hunt_success_chance|E] de $hunt_type_falconry$: #P +10 %#!"
 loyal_eagle_story_modifier: "Águia Leal"
 loyal_eagle_story_modifier_desc: "A águia de caça deste personagem é ferozmente leal e jamais abandona seu proprietário.\n[hunt_success_chance|E] de $hunt_type_falconry$: #P +10 %#!"
 calm_eagle_story_modifier: "Águia Calma"
 calm_eagle_story_modifier_desc: "A águia de caça deste personagem é muito tranquila e jamais fica animada ou assustada.\n[hunt_success_chance|E] de $hunt_type_falconry$: #P +10 %#!"
 wise_eagle_story_modifier: "Águia Sábia"
 wise_eagle_story_modifier_desc: "A águia de caça deste personagem tem mais sabedoria do que lhe corresponde pela idade e frequentemente toma decisões que surpreendem seu dono.\n[hunt_success_chance|E] de $hunt_type_falconry$: #P +10 %#!"
 cunning_eagle_story_modifier: "Águia Astuta"
 cunning_eagle_story_modifier_desc: "A águia de caça deste personagem é astuta e costuma surpreender suas presas.\n[hunt_success_chance|E] de $hunt_type_falconry$: #P +10 %#!"
 weak_eagle_modifier: "Águia Fraca"
 weak_eagle_modifier_desc: "A águia de caça deste personagem é fraca e frequentemente tem dificuldades para pegar suas presas."
 very_weak_eagle_modifier: "Águia Débil"
 very_weak_eagle_modifier_desc: "A águia de caça deste personagem está doente e à beira da morte."
 strong_eagle_modifier: "Águia Forte"
 strong_eagle_modifier_desc: "A águia de caça deste personagem é excepcionalmente saudável e forte."
 skilled_eagle_modifier: "Falcoeiro Habilidoso"
 skilled_eagle_modifier_desc: "Este personagem é um falcoeiro habilidoso, e sua águia de caça é particularmente bem treinada."
 eagle_personality_level_desc: "Sem Treinamento"
 observant_eagle_story_modifier: "Águia Observadora"
 observant_eagle_story_modifier_desc: "A águia de caça deste personagem é particularmente perceptiva, e frequentemente nota coisas que seu dono pode perder."
 protective_eagle_story_modifier: "Águia Protetora"
 protective_eagle_story_modifier_desc: "A águia de caça deste personagem é defensiva com seu dono, e frequentemente intervém para evitar que ele seja prejudicado."
 aggressive_eagle_story_modifier: "Águia Agressiva"
 aggressive_eagle_story_modifier_desc: "A águia de caça deste personagem é particularmente combativa, e frequentemente ataca coisas que percebe como ameaças sem aviso."
 eagle_hunter_childhood_modifier: "Falcoeiro Destinado"
 eagle_hunter_childhood_modifier_desc: "Este personagem vem treinando com águias desde jovem e tem potencial para ser um falcoeiro habilidoso.\n[hunt_success_chance|E]: #P +5 %#!"
 hunt_success_chance.eagle_hunter_childhood_modifier: "[GetModifier('eagle_hunter_childhood_modifier').GetNameWithTooltip]"
