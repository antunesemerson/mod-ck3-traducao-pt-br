l_spanish:
 fp2_smooth_market_oversight_modifier: "Fiscalização de Mercado Suave"
 fp2_smooth_market_oversight_modifier_desc: "A vigilância do muhtasib local está ajudando a tornar as transações fáceis e confiáveis."
 fp2_inefficient_market_oversight_modifier: "Fiscalização de Mercado Ineficiente"
 fp2_inefficient_market_oversight_modifier_desc: "Os muhtasibs locais são incapazes de resolver problemas no mercado, sobrecarregando o qadi."
 fp2_free_market_boom_modifier: "Mercado Livre"
 fp2_free_market_boom_modifier_desc: "Os mercados desta cidade não seguem a hisba e nem estão sujeitos à escrutínio dos muhtasibs."
 fp2_ruthless_market_oversight_modifier: "Fiscalização de Mercado Implacável"
 fp2_ruthless_market_oversight_modifier_desc: "Os muhtasibs locais dependem de soldados para impor até as menores regulamentações à força."
 fp2_forsaken_turned_levies_modifier: "Militarismo Crescente"
 fp2_forsaken_turned_levies_modifier_desc: "Pequenas milícias camponesas estão se formando para caçar facções traidoras e ganhar o favor de seu suserano."
 fp2_veteran_mercenaries_as_instructors_modifier: "Mercenários Veteranos Contratados como Instrutores"
 fp2_veteran_mercenaries_as_instructors_modifier_desc: "Este condado emprega capitães de mercenários experientes em batalha para treinar as tropas locais."
 fp2_mercenary_acquaintances_modifier: "Conhecidos Mercenários"
 fp2_mercenary_acquaintances_modifier_desc: "Este personagem é conhecido de muitos capitães de mercenários e aprendeu muito com suas interações."
 fp2_mercs_slaughtered_populance_modifier: "Mercenários Matam a População"
 fp2_mercs_slaughtered_populance_modifier_desc: "Um bando de soldados armados devastou esta terra, levando tudo dos moradores e não deixando ninguém vivo para contar a história."
 fp2_local_garrison_slaughtered_modifier: "Guarnição Local Aniquilada"
 fp2_local_garrison_slaughtered_modifier_desc: "A guarnição local deste condado foi praticamente aniquilada, deixando a área indefesa."
 fp2_elite_tactics_for_civil_guards_modifier: "Guarnição Local Usando Táticas de Elite"
 fp2_elite_tactics_for_civil_guards_modifier_desc: "As tropas que pertencem a esta guarnição local são especialistas em manter a paz com a experiência necessária para realizar uma repressão adequada aos infratores da lei."
 fp2_mercs_turned_farmers_modifier: "Mercenários Transformados em Fazendeiros"
 fp2_mercs_turned_farmers_modifier_desc: "Um perigoso bando de mercenários veio para esta terra para... fazer agricultura. Embora pacíficos agora, eles poderiam ser convocados para o serviço pelo seu novo suserano se necessário."
 fp2_lenient_towards_foreign_merchants_modifier: "Tolerante com Mercadores Estrangeiros"
 fp2_lenient_towards_foreign_merchants_modifier_desc: "Este personagem está disposto a renunciar à intolerância religiosa em prol do comércio, ganhando grandes riquezas e o desprezo de seus colegas."
 fp2_2001_promise_reminder: "Promessa de Libertação"
 fp2_2001_promise_reminder_desc: "Este personagem comprometeu sua honra em libertar uma aldeia sitiada dentro de alguns anos."
 fp2_inexplicable_accounting_modifier: "Contabilidade Inexplicável"
 fp2_inexplicable_accounting_modifier_desc: "A contabilidade deste condado não fecha, há ouro desaparecido."
 fp2_improved_administrative_checks_modifier: "Melhoria nas Verificações Administrativas"
 fp2_improved_administrative_checks_modifier_desc: "Este condado tem verificações rigorosas para garantir que mesmo a menor quantidade de fraude econômica seja notada pelas autoridades."
 fp2_mozarab_quarter_modifier: "Bairros Mozárabes"
 fp2_mozarab_quarter_modifier_desc: "As cidades deste condado têm bairros distintos para pessoas moçárabes."
 fp2_mozarab_church_modifier: "Aceita os Mozárabes"
 fp2_mozarab_church_modifier_desc: "Este personagem permitiu a construção de igrejas moçárabes em suas terras."
 fp2_mozarab_rejected_modifier: "Discriminação contra os Mozárabes"
 fp2_mozarab_rejected_modifier_desc: "Este personagem não permite que os moçárabes construam igrejas em suas terras."
 fp2_multifaith_county_modifier: "Tolerância Multirreligiosa"
 fp2_multifaith_county_modifier_desc: "Este personagem demonstrou permissividade em relação àqueles de outras religiões dentro de seu reino."
 fp2_religious_strife_modifier: "Conflito Religioso"
 fp2_religious_strife_modifier_desc: "As conversões forçadas neste condado resultaram em uma ampla fricção religiosa."
 fp2_camino_santiago_ho_protected_modifier: "Proteção da Ordem Sagrada"
 fp2_camino_santiago_ho_protected_modifier_desc: "A estrada para Santiago que passa por este condado é protegida por uma [holy_order|lE]."
 fp2_camino_santiago_protected_modifier: "Guardas Contratados"
 fp2_camino_santiago_protected_modifier_desc: "A estrada para Santiago que atravessa este condado é protegida por guardas contratados."
 fp2_horchata_colonialism_modifier: "Exploração da Horchata"
 fp2_horchata_colonialism_modifier_desc: "Este condado está sendo forçado a produzir apenas amendoeiras para fazer horchata."
 fp2_funded_agriculture_modifier: "Agricultura Financiada"
 fp2_funded_agriculture_modifier_desc: "Este condado recebeu os recursos necessários para expandir suas terras agrícolas."
 fp2_vow_against_conscription_modifier: "Juramento Contra o Serviço Militar Obrigatório"
 fp2_vow_against_conscription_modifier_desc: "Este condado recebeu o direito de rejeitar pedidos de alistamento militar. Isso permite que se concentrem em questões civis."
 fp2_monument_to_war_modifier: "Monumento da Conquista"
 fp2_monument_to_war_modifier_desc: "Um monumento ao conquistador deste reino fica sobre um monte de escombros cercado por prédios queimados."
 fp2_village_rebuiling_efforts_modifier: "Esforços de Reconstrução da Vila"
 fp2_village_rebuiling_efforts_modifier_desc: "Este condado está tentando se reconstruir após uma grande catástrofe, e seu suserano doou os recursos necessários para acelerar o processo."
 fp2_border_encampments_modifier: "Acampamentos na Fronteira"
 fp2_border_encampments_modifier_desc: "Este condado é coberto por tendas e postos avançados, abrigando pequenos grupos de patrulhas para manter o que há de seguro."
 fp2_scallop_shell_artifact: "Concha de Vieira"
 fp2_scallop_shell_artifact_desc: "Esta concha de vieira marca seu dono como alguém que completou a árdua jornada ao longo do Caminho de Santiago."
 fp2_fake_scallop_shell_artifact: "Concha de Vieira Desacreditada"
 fp2_fake_scallop_shell_artifact_desc: "Uma concha de vieira que geralmente é possuída por alguém que fez a peregrinação completa até Santiago. Esta, no entanto, é obviamente roubada."
 fp2_malato_bark_artifact: "Casca de Árvore Malato"
 fp2_malato_bark_artifact_desc: "Uma pequena cunha de casca retirada da famosa árvore Malato basca."
 fp2_dismantling_verracos_modifier: "Desmantelando Verracos"
 fp2_dismantling_verracos_modifier_desc: "As antigas estátuas de javali que se espalham por este condado estão sendo desmontadas e transformadas em materiais de construção, para a consternação das autoridades locais."
 fp2_saints_tombs_modifier: "Túmulos de Santos"
 fp2_saints_tombs_modifier_desc: "As estátuas de javalis de pedra que pontilham este condado são conhecidas por serem os túmulos de santos cristãos."
 fp2_controls_the_mediterranean_house_modifier: "Mestres do Mediterrâneo"
 fp2_controls_the_mediterranean_house_modifier_desc: "Esta casa é famosa por ter assumido o controle sobre o Mar Mediterrâneo e o comércio que flui por ele."
 fp2_aragon_title_reward_house_modifier: "Fundadores de Aragão"
 fp2_aragon_title_reward_house_modifier_desc: "Esta casa fundou o reino de Aragão em terras com geografia rigorosa e guerreiros ainda mais rigorosos."
 fp2_sponsored_golden_age_modifier: "Patrocinador da Era de Ouro"
 fp2_sponsored_golden_age_modifier_desc: "Este personagem patrocinou a próxima grande era de avanço acadêmico regional."
 fp2_part_of_golden_age_modifier: "Presente Durante a Era de Ouro"
 fp2_part_of_golden_age_modifier_desc: "Este personagem estava presente quando uma era de ouro de avanço acadêmico começou."
 fp2_epicenter_of_golden_age_modifier: "Epicentro da Era de Ouro"
 fp2_epicenter_of_golden_age_modifier_desc: "Este local é um centro de sabedoria onde as maiores mentes da era de ouro residem e trabalham."
 fp2_translated_skill_book_diplomacy_modifier: "Memorandos Diplomáticos Antigos"
 fp2_translated_skill_book_diplomacy_modifier_desc: "Este personagem traduziu cópias de antigos memorandos detalhando como lidar com uma grande variedade de situações diplomáticas."
 fp2_translated_skill_book_martial_modifier: "Livros de História Militar"
 fp2_translated_skill_book_martial_modifier_desc: "Este personagem leu muitos livros de história militar, aprendendo as várias táticas e estratagemas empregados por povos antigos."
 fp2_translated_skill_book_stewardship_modifier: "Livros de Teoria Econômica"
 fp2_translated_skill_book_stewardship_modifier_desc: "Este personagem possui uma variedade de livros teorizando como os antigos impérios se gerenciavam e se estruturavam para suportar grandes economias."
 fp2_translated_skill_book_intrigue_modifier: "Contos de Intriga"
 fp2_translated_skill_book_intrigue_modifier_desc: "Este personagem possui muitos livros sobre intriga em sua posse, concedendo-lhe muitas ideias criativas para esquemas."
 fp2_translated_skill_book_learning_modifier: "Obras Filosóficas Traduzidas"
 fp2_translated_skill_book_learning_modifier_desc: "Este personagem encomendou traduções de antigas obras de filosofia, permitindo-lhe desfrutar de um nível mais elevado de compreensão."
 fp2_rejection_of_old_thoughts_modifier: "Rejeição de Ideias Antigas"
 fp2_rejection_of_old_thoughts_modifier_desc: "Este condado atrai pensadores que rejeitam a necessidade de aprender com o passado, muitas novas ideias florescerão, mas nenhuma durará."
 fp2_removed_cataracts_modifier: "Remoção Bem-sucedida de Catarata"
 fp2_removed_cataracts_modifier_desc: "Este personagem teve suas cataratas removidas com sucesso, passando de quase cego para ser capaz de perceber um borrão de cores e formas."
 fp2_religious_riots_modifier: "Rebeliões Religiosas em Andamento"
 fp2_religious_riots_modifier_desc: "A luta religiosa está rasgando as ruas dos principais assentamentos deste condado."
 fp2_religious_riots_suppressed_modifier: "Rebeliões Religiosas Suprimidas"
 fp2_religious_riots_suppressed_modifier_desc: "Embora borbulhe abaixo da superfície, o conflito religioso neste condado foi brutalmente contido."
 fp2_religious_riots_defused_modifier: "Rebeliões Religiosas Afastadas"
 fp2_religious_riots_defused_modifier_desc: "Alguns ainda resmungam, mas o conflito religioso foi recentemente evitado neste condado."
 fp2_pilgrim_roads_modifier: "Estradas dos Peregrinos"
 fp2_pilgrim_roads_modifier_desc: "Este condado possui uma vasta rede de estradas para guiar os peregrinos em direção ao seu local sagrado."
 fp2_trusted_by_pilgrim_warriors_modifier: "Reputação entre Guerreiros Sagrados"
 fp2_trusted_by_pilgrim_warriors_modifier_desc: "Este personagem é conhecido por sua boa natureza em relação aos guerreiros da fé, que por sua vez o tratam preferencialmente."
 fp2_kept_accused_traitor_in_court_modifier: "Sussurros de Fraqueza"
 fp2_kept_accused_traitor_in_court_modifier_desc: "Uma ação tomada por este personagem causou todo tipo de fofoca mal-educada se espalhar sobre ele."
 fp2_kept_op_knight_in_court_modifier: "Guerreiros Abatidos"
 fp2_kept_op_knight_in_court_modifier_desc: "Os cavaleiros sob o comando deste personagem estão com baixo espírito devido à sombra lançada por um guerreiro melhor."
 fp2_kept_upstart_knight_in_court_modifier: "Cavaleiros Emergentes"
 fp2_kept_upstart_knight_in_court_modifier_desc: "Membros da nobreza conspiram contra este personagem para garantir que nenhum guerreiro emergente apareça em sua corte."
 fp2_kept_godless_mercenary_in_court_modifier: "Mercenários Sem Deus"
 fp2_kept_godless_mercenary_in_court_modifier_desc: "Influências externas fizeram com que todos os cavaleiros empregados por este personagem ganhassem uma má reputação como guerreiros sem deus lutando por ganância."
