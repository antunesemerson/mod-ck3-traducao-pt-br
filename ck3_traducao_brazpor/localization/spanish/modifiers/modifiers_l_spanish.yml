 prestige_level_2_laamp_desc: "Desbloqueia o seguinte:\n	#weak $EP3_LAAMP_INVASION_CB_COUNTY_NAME$ [casus_belli|lE]\n	[interaction|E] $purchase_land_interaction$ para [counties|lE]\n	Recompensa de [county|E] de $hire_laamp_mercenaries_interaction$\n	[interaction|E] $procure_estate_interaction$ #!"
