 prestige_level_4_laamp_desc: "Desbloqueia o seguinte:\n	#weak [casus_bellis|lE] $EP3_LAAMP_INVASION_CB_KINGDOM_NAME$ e inferiores\n	[interaction|E] $purchase_land_interaction$ para [duchies|lE] e [counties|lE] com aumento da aceitação\n	Recompensas de [county|lE] e [duchy|lE] da [interaction|lE] $hire_laamp_mercenaries_interaction$\n	[scheme|E] $seize_realm$ para [kingdoms|lE] e inferiores\n	[interaction|E] $request_laamp_invasion_sponsorship_interaction$#!"
 prestige_level_5_laamp_desc: "Desbloqueia o seguinte:\n	#weak [casus_bellis|lE] $EP3_LAAMP_INVASION_CB_EMPIRE_NAME$ e inferiores\n	[interaction|E] $purchase_land_interaction$ para [duchies|lE] e [counties|lE] com aumento da aceitação\n	Recompensas de [county|lE] e [duchy|lE] da [interaction|lE] $hire_laamp_mercenaries_interaction$\n	[scheme|E] $seize_realm$ para [empires|lE] e inferiores\n	[interaction|E] $request_laamp_invasion_sponsorship_interaction$ #!"
