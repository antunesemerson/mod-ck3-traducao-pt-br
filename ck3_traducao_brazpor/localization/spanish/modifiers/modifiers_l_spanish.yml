 piety_level_0: "Pecador"
 piety_level_0_desc: "$piety_level_0$ é o único [piety_level|lE] negativo. O próximo nível é [GetModifier( 'piety_level_1' ).GetNameWithTooltip|L].\nEfeitos:\n[GetPietyLevelDesc( '(int32)0' )]"
 piety_level_1: "Dedicado"
 piety_level_1_desc: "$piety_level_1$ é o primeiro [piety_level|lE]. O próximo nível é [GetModifier( 'piety_level_2' ).GetNameWithTooltip|L].\nEfeitos:\n[GetPietyLevelDesc( '(int32)1' )]"
 piety_level_2: "Fiel"
 piety_level_2_desc: "$piety_level_2$ é o segundo [piety_level|lE]. O próximo nível é [GetModifier( 'piety_level_3' ).GetNameWithTooltip|L].\nEfeitos:\n[GetPietyLevelDesc( '(int32)2' )]"
 piety_level_3: "Servo Devoto"
 piety_level_3_desc: "$piety_level_3$ é o terceiro [piety_level|lE]. O próximo nível é [GetModifier( 'piety_level_4' ).GetNameWithTooltip|L].\nEfeitos:\n[GetPietyLevelDesc( '(int32)3' )]"
 piety_level_4: "Modelo de Virtude"
 piety_level_4_desc: "$piety_level_4$ é o quarto [piety_level|lE]. O próximo nível é [GetModifier( 'piety_level_5' ).GetNameWithTooltip|L].\nEfeitos:\n[GetPietyLevelDesc( '(int32)4' )]"
 piety_level_5: "Ícone Religioso"
 piety_level_5_desc: "$piety_level_5$ é o quinto e mais alto [piety_level|lE] possível para [governments|lE] que não sejam [mandala|lE]. O próximo nível é [GetModifier( 'piety_level_6' ).GetNameWithTooltip|L].\nEfeitos:\n[GetPietyLevelDesc('(int32)5')|=+]"
 piety_level_6: "Quase divino"
 piety_level_6_desc: "$piety_level_6$ é o sexto [piety_level|lE]. O próximo nível é [GetModifier( 'piety_level_7' ).GetNameWithTooltip|L].\n\nQuando um [ruler|lE] [Concept( 'mandala', 'mandala' )|E] morre de uma maneira aceitável para seu [aspect|El] após alcançar o nível [GetModifier( 'piety_level_5' ).GetNameWithTooltip|L], o [heir|lE] desse governante adquire a capacidade de avançar até este nível de devoção.\n\nEfeitos:\n[GetPietyLevelDesc('(int32)6')|=+]"
 piety_level_7: "Semideus"
 piety_level_7_desc: "$piety_level_7$ é o sétimo [piety_level|lE]. O próximo nível é [GetModifier( 'piety_level_8' ).GetNameWithTooltip|L].\n\nQuando um [ruler|lE] [Concept( 'mandala', 'mandala' )|E] morre de uma maneira aceitável para seu [aspect|El] após alcançar o nível [GetModifier( 'piety_level_6' ).GetNameWithTooltip|L], o [heir|lE] desse governante consegue a capacidade de avançar até este nível de devoção.\n\nEfeitos:\n[GetPietyLevelDesc('(int32)7')|=+]"
 piety_level_8: "Divino"
 piety_level_8_desc: "$piety_level_8$ é o oitavo e mais alto [piety_level|lE] possível para um [government|lE] [Concept( 'mandala', 'mandala' )|E].\n\nQuando um [ruler|lE] [Concept( 'mandala', 'mandala' )|E] morre de uma maneira aceitável para seu [aspect|El] após alcançar o nível [GetModifier( 'piety_level_7' ).GetNameWithTooltip|L], o [heir|lE] desse governante desenvolve a capacidade de avançar até este nível supremo de devoção.\n\nEfeitos:\n[GetPietyLevelDesc('(int32)8')|=+]"
 prestige_level_0: "Desonrado"
 prestige_level_0_desc: "$prestige_level_0$ é o menor [prestige_level|lE] possível. O próximo nível é [GetModifier( 'prestige_level_1' ).GetNameWithTooltip|L].\nEfeitos:\n[GetPrestigeLevelDesc( '(int32)0' )]"
 prestige_level_1: "Estabelecido"
 prestige_level_1_desc: "$prestige_level_1$ é o primeiro [prestige_level|lE]. O próximo nível é [GetModifier( 'prestige_level_2' ).GetNameWithTooltip|L].\nEfeitos:\n[GetPrestigeLevelDesc( '(int32)1' )]"
