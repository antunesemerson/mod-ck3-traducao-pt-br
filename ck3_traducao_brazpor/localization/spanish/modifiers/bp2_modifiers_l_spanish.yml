l_spanish:
 bp2_stranger_at_home_modifier: "Estranho em Casa"
 bp2_stranger_at_home_modifier_desc: "Após ter sido um refém, este personagem aceitou o seu afastamento de seu país de origem"
 bp2_stranger_no_more_modifier: "Reintegração"
 bp2_stranger_no_more_modifier_desc: "Após ter sido um refém, este personagem está se esforçando para se readaptar ao seu país de origem"
 bp2_uni_bad_encounters_modifier: "Encontros Ruins"
 bp2_uni_bad_encounters_modifier_desc: "Durante seus estudos de educação adulta, este personagem teve problemas com más companhias"
 bp2_dialogue_with_the_masters_modifier: "Diálogo com os Mestres"
 bp2_dialogue_with_the_masters_modifier_desc: "Durante sua educação universitária, este personagem foi capaz de dialogar face a face com os Mestres em sua língua litúrgica"
 foolish_endeavor_modifier: "Fez o Ridículo"
 foolish_endeavor_modifier_desc: "A tentativa tola deste personagem de conversar de igual para igual com os professores na Universidade falhou miseravelmente"
 bp2_uni_connections_modifier: "Conexões Universitárias"
 bp2_uni_connections_modifier_desc: "Durante seus estudos na Universidade, este personagem se integrou bem à comunidade de estudantes locais"
 bp2_uni_isolation_modifier: "Isolamento nos Estudos"
 bp2_uni_isolation_modifier_desc: "Durante seus estudos na Universidade, este personagem não conseguiu se conectar com seus colegas"
 bp2_understanding_modifier: "Compreensão"
 bp2_understanding_modifier_desc: "Este personagem tem a intuição de identificar quando os outros não estão tão entusiasmados com algo quanto eles."
 bp2_careful_modifier: "Cuidadoso com Pertences"
 bp2_careful_modifier_desc: "Depois de um incidente com uma bola de futebol em sua juventude, este personagem agora é muito cuidadoso com seus pertences."
 bp2_cowardly_modifier: "Covarde"
 bp2_cowardly_modifier_desc: "Independentemente de sua disposição atual, este personagem carrega a marca de ter deixado um colega ser intimidado quando criança."
 bp2_disrespects_elderly_modifier: "Desrespeita os Idosos"
 bp2_disrespects_elderly_modifier_desc: "Desde tenra idade, este personagem demonstra um saudável desdém por aqueles mais velhos e — supostamente — mais sábios, o que os torna mais atraentes para os jovens."
 bp2_guilt_ridden_modifier: "Atormentado pela Culpa"
 bp2_guilt_ridden_modifier_desc: "Este personagem está traumatizado por sua falta de ação durante um jogo de futebol, quando simplesmente assistiu enquanto um colega era pisoteado por uma multidão."
 bp2_ringing_ears_modifier: "Zumbido nos Ouvidos"
 bp2_ringing_ears_modifier_desc: "Os ouvidos deste personagem ainda estão zumbindo depois que um pai excessivamente ansioso estava discutindo com um grupo durante um jogo de futebol."
 bp2_self_preserving_modifier: "Autopreservação"
 bp2_self_preserving_modifier_desc: "O senso de autopreservação deste personagem tem servido bem no passado."
 imaginary_friend_modifier: "Amigo Imaginário"
 imaginary_friend_modifier_desc: "Este personagem tem um amigo imaginário."
 imaginary_friend_murder_scheme_modifier: "$imaginary_friend_modifier$"
 imaginary_friend_murder_scheme_modifier_desc: "Este personagem está convencido de seu próprio sucesso neste esquema após ser influenciado por seu amigo imaginário."
 imaginary_friend_mad_modifier: "Loucura Total"
 imaginary_friend_mad_modifier_desc: "Este personagem tem um desejo particular... e a única maneira de satisfazê-lo é #EMP assassinar#!"
 bp2_stifled_potential_modifier: "Potencial Abafado"
 bp2_stifled_potential_modifier_desc: "Este personagem possui um enorme potencial inexplorado, mas é impedido de acessá-lo pelas maquinações dos outros."
 bp2_destined_modifier: "Destinado à Glória"
 bp2_destined_modifier_desc: "Este personagem tem algo especial que leva muitos a acreditar que eles estão destinados à grandeza."
 bp2_destiny_tutor_modifier: "Conselho Marcial"
 bp2_destiny_tutor_modifier_desc: "Este personagem recebeu conselhos estratégicos sólidos que eles lembrarão por um longo tempo."
 bp2_tool_of_fate_modifier: "Ferramenta do Destino"
 bp2_tool_of_fate_modifier_desc: "O magnetismo natural deste personagem os destacou desde jovens, e seus talentos cultivados os diferenciaram de seus colegas."
 rock_story_modifier: "Pedra de Estimação"
 rock_story_modifier_desc: "Este personagem desfruta da companhia de um companheiro de pedra."
 sated_stone_modifier: "Pedra Satisfeita"
 sated_stone_modifier_desc: "Este personagem sente-se melhor por ter indulgido em sua pedra de estimação."
 rock_dopey_modifier: "Pedra Trapalhona"
 rock_dopey_modifier_desc: "A pedra de estimação deste personagem é, digamos, um pouco desajeitada."
 lost_rock_modifier: "Pedra Perdida"
 lost_rock_modifier_desc: "A pedra de estimação deste personagem foi perdida e subsequentemente desapareceu para sempre. Eles não a recuperaram."
 bp2_bed_rock_modifier: "Pedra do Leito"
 bp2_bed_rock_modifier_desc: "Este personagem ama tanto sua pedra de estimação que a deixa descansar confortavelmente em sua cama, muito para o aborrecimento de qualquer parceiro."
 bp2_sore_thumb_modifier: "Dor no Dedo"
 bp2_sore_thumb_modifier_desc: "A tentativa deste personagem de trabalhos manuais causou um pequeno ferimento."
 bp2_valued_friendship_modifier: "Relação Rochosa"
 bp2_valued_friendship_modifier_desc: "Este personagem recusou a chance de enshrinar sua pedra de estimação em sua casa, em vez disso, a carrega consigo onde quer que vá."
 bp2_solid_foundations_modifier: "Fundamentos Sólidos"
 bp2_solid_foundations_modifier_desc: "Este personagem valoriza a integridade estrutural a ponto de ter incluso sua pedra de estimação nas paredes de sua casa."
 bp2_one_upper_modifier: "O Superador"
 bp2_one_upper_modifier_desc: "Este personagem ficou conhecido por seu cansativo senso de sempre querer superar os outros em conversas comuns."
 bp2_trusted_parent_modifier: "Pai Confiável"
 bp2_trusted_parent_modifier_desc: "Os pais deste personagem ganharam sua confiança, e eles se lembrarão disso por anos a fio."
 bp2_tight_knit_modifier: "Unidos"
 bp2_tight_knit_modifier_desc: "Este personagem lembra-se de sua juventude no seio seguro e acolhedor de sua família e ainda mantém laços estreitos com eles até hoje."
 bp2_listened_elders_modifier: "Conselho dos Anciãos"
 bp2_listened_elders_modifier_desc: "Este personagem procura os conselhos de seus anciãos, ouvindo sua sábia sabedoria para obter insights valiosos."
 bp2_foreign_influences_modifier: "Influências Estrangeiras"
 bp2_foreign_influences_modifier_desc: "O interesse deste personagem por outras culturas levou aqueles mais próximos deles a ficarem desconfiados."
 bp2_parental_heartbreak_modifier: "Desgosto dos Pais"
 bp2_parental_heartbreak_modifier_desc: "Este personagem ainda lida com feridas emocionais causadas por um dos pais."
 bp2_culturally_adventurous_modifier: "Aventureiro Cultural"
 bp2_culturally_adventurous_modifier_desc: "A disposição deste personagem de abraçar o desconhecido os deixou mais sábios e mais amplamente aceitos do que seriam de outra forma."
 bp2_expanded_horizons_modifier: "Horizontes Expandidos"
 bp2_expanded_horizons_modifier_desc: "Os horizontes deste personagem foram ampliados desde jovens devido à sua associação com pessoas de outras culturas."
 parent_helped_grief_modifier: "Ajudou com o Luto"
 parent_helped_grief_modifier_desc: "Um dos pais deste personagem os ajudou a lidar com a tristeza pela amada ama molhada."
 wet_nurse_bonding_modifier: "Ligação com Ama Molhada"
 wet_nurse_bonding_modifier_desc: "Este personagem se ligou à ama molhada por meio de fé e cultura compartilhadas."
 wet_nurse_faith_bonding_modifier: "$wet_nurse_bonding_modifier$"
 wet_nurse_faith_bonding_modifier_desc: "Este personagem se ligou à ama molhada por meio da fé compartilhada."
 wet_nurse_cultural_bonding_modifier: "$wet_nurse_bonding_modifier$"
 wet_nurse_cultural_bonding_modifier_desc: "Este personagem se ligou à ama molhada por meio da cultura compartilhada."
 bp2_good_parent_modifier: "Pai Compassivo"
 bp2_good_parent_modifier_desc: "Este personagem é compassivo e interessado nos sentimentos e ações de seus filhos."
 under_childs_boot_modifier: "Sob o Domínio das Crianças"
 under_childs_boot_modifier_desc: "Este personagem age conforme os caprichos e desejos de seus filhos."
 bp2_strong_willed_modifier: "Determinado"
 bp2_strong_willed_modifier_desc: "A obstinação e a presunção deste personagem quando criança lhes causaram muito sofrimento com os mais velhos, mas muito reconhecimento entre seus jovens colegas."
 bp2_sweet_treat_modifier: "Doce Delícia"
 bp2_sweet_treat_modifier_desc: "Este personagem conseguiu pegar um doce na cozinha. Seu favorito!"
 bp2_empathetic_modifier: "Empático"
 bp2_empathetic_modifier_desc: "Este personagem demonstrou uma variedade de inteligência emocional ao lidar com os outros."
 bp2_joust_prodigy_modifier: "Prodígio na Justa"
 bp2_joust_prodigy_modifier_desc: "Este personagem demonstrou um talento natural para a justa desde tenra idade."
 bp2_afterlife_citer_modifier: "Crente na Vida Após a Morte"
 bp2_afterlife_citer_modifier_desc: "A certeza pública deste personagem na existência de uma vida após a morte os marcou como particularmente despreocupados."
 bp2_numbed_to_death_modifier: "Insensível à Morte"
 bp2_numbed_to_death_modifier_desc: "As primeiras experiências deste personagem com a mortalidade os deixaram com um comportamento sombrio em relação a esses assuntos."
 shaven_bald_modifier: "Barbeado Brutalmente"
 shaven_bald_modifier_desc: "Os cabelos deste personagem foram totalmente raspados durante um rito de passagem, deixando apenas o couro cabeludo exposto."
 scorched_soles_modifier: "Solas Chamuscadas"
 scorched_soles_modifier_desc: "Após a caminhada dolorosamente cerimoniosa sobre o fogo, este personagem caminha cuidadosamente sobre pés horrivelmente queimados."
 tough_and_confident_modifier: "Resistente & Confiante Tribal"
 tough_and_confident_modifier_desc: "Lutando através de seus ritos de passagem, este personagem aprendeu paixão, determinação e autossuficiência."
 peace_over_honor_modifier: "Paz Sobre Pathos"
 peace_over_honor_modifier_desc: "Quando uma corte que hospedava parentes como reféns foi ameaçada, este personagem se recusou a oferecer ajuda."
 a_noble_fight_modifier: "Uma Luta Nobre"
 a_noble_fight_modifier_desc: "Ao atender aos apelos de um refém sobrecarregado, este personagem comprometeu-se com o aventureirismo marcial."
 aggressive_unpredictable_modifier: "Agressivo, Imprevisível"
 aggressive_unpredictable_modifier_desc: "Este belicista é conhecido por passar de trégua a ataque violento com a mais leve provocação."
