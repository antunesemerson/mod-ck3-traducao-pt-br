l_spanish:
 court_possessed_improved_condition_modifier: "Tratamento bem-sucedido de Possessão"
 court_possessed_improved_condition_modifier_desc: "Este personagem está se sentindo melhor após o tratamento e as pessoas ao redor estão menos assustadas."
 6050_juicy_readings_modifier: "Leituras Sensuais"
 6050_juicy_readings_modifier_desc: "Este personagem tem se entregado a leituras sugestivas e aplicando seus ensinamentos."
 court_no_wine_modifier: "Abstinência de Vinho"
 court_no_wine_modifier_desc: "Este personagem adotou um estilo de vida austero, abrindo mão do vinho."
 court_moderate_drinking_modifier: "Beber com Moderação"
 court_moderate_drinking_modifier_desc: "Este personagem bebe socialmente."
 rivers_of_wine_modifier: "Rios de Vinho"
 rivers_of_wine_modifier_desc: "Este personagem adotou uma abordagem hedonista em relação ao vinho; não necessariamente saudável, mas pelo menos seus amigos o tornaram barato."
 court_fancy_seal_modifier: "Selo de Cera Elegante"
 court_fancy_seal_modifier_desc: "Este personagem tem um selo de cera elegante para assinar documentos sem precisar lê-los."
 court_tax_relief_county_modifier: "Isenção Fiscal"
 court_tax_relief_county_modifier_desc: "O senhor desta província concedeu isenção fiscal, incentivando o seu crescimento."
 hold_court_inspector_modifier: "Inspetor Oficial"
 hold_court_inspector_modifier_desc: "Este personagem foi enviado pela capital para supervisionar o crescimento local."
 hold_court_bilingual_readings_modifier: "Leituras Bilíngues"
 hold_court_bilingual_readings_modifier_desc: "Este personagem está estudando as maiores produções literárias de outra cultura."
 hold_court_mysterious_book_modifier: "Livro Misterioso"
 hold_court_mysterious_book_modifier_desc: "Este personagem possui um livro antigo escrito em uma língua misteriosa."
 court_6080_cultural_hostility_modifier: "Hostil a Culturas Diferentes"
 court_6080_cultural_hostility_modifier_desc: "Este personagem perseguiu uma cultura diferente em seu domínio."
 court_6090_almoners_county_modifier: "Doadores"
 court_6090_almoners_county_modifier_desc: "Doações generosas incentivam a conversão da população local."
 court_6090_executioners_county_modifier: "Execuções"
 court_6090_executioners_county_modifier_desc: "Execuções exemplares de infiéis mantêm a população na linha."
 6110_war_compensations_county_modifier: "Compensações de Guerra"
 6110_war_compensations_county_modifier_desc: "O governante dessas terras enviou dinheiro para aliviar o sofrimento da população durante a guerra."
 6110_sent_alms_county_modifier: "Doações do Governante"
 6110_sent_alms_county_modifier_desc: "O governante destas terras enviou generosas esmolas para aliviar os sofrimentos da população durante a guerra."
 6120_extra_taxes_modifier: "Impostos Extras"
 6120_extra_taxes_modifier_desc: "Impostos especiais nunca são populares entre os vassalos."
 6121_seneschal_domesday_modifier: "Levantamento de Terra do Senescal"
 6121_seneschal_domesday_modifier_desc: "A tributação deste personagem aos seus vassalos é mais eficiente graças a um completo levantamento de sua terra."
 6121_steward_domesday_modifier: "Levantamento de Terra do Administrador"
 6121_steward_domesday_modifier_desc: "A tributação deste personagem aos seus vassalos é mais eficiente graças a um completo levantamento de sua terra."
 6131_mapped_wilderness_county_modifier: "Mapeamento da Selva"
 6131_mapped_wilderness_county_modifier_desc: "O cadastro local mapeou também a selva local, tornando a área mais segura e fácil de controlar."
 6140_new_carpet_modifier: "Tapete de Pele"
 6140_new_carpet_modifier_desc: "Este personagem possui um tapete quente feito da pele de uma besta majestosa."
 6140_pet_modifier: "Monstro de Estimação"
 6140_pet_modifier_desc: "Uma besta imponente para inspirar medo e admiração nos cortesãos e vassalos deste personagem."
 6140_animal_guardian_modifier: "Guardião Feroz"
 6140_animal_guardian_modifier_desc: "Uma besta rosnando está mantendo este prisioneiro sob controle."
 6160_seneschal_help_modifier: "Apoio do Senescal"
 6160_seneschal_help_modifier_desc: "Este personagem está recebendo a ajuda do senescal de seu governante em questões administrativas."
 6190_safe_graves_county_modifier: "Cemitérios Seguros"
 6190_safe_graves_county_modifier_desc: "O suserano deste condado acabou com o roubo de túmulos suspeitos."
 6190_grave_robbing_county_modifier: "Roubo de Túmulos Encorajado"
 6190_grave_robbing_county_modifier_desc: "O suserano deste condado tolera e até encoraja o roubo de túmulos para fins de pesquisa."
 6210_architect_county_modifier: "Impressionado com a Cultura"
 6210_architect_county_modifier_desc: "As pessoas deste condado estão impressionadas com as realizações culturais de seu senhor."
 6230_new_elephants_modifier: "Elefantes Ferozes"
 6230_new_elephants_modifier_desc: "O exército deste personagem é apoiado por uma manada particularmente feroz de elefantes anteriormente selvagens."
 6230_elephant_slayer_county_modifier: "Matador de Elefantes"
 6230_elephant_slayer_county_modifier_desc: "O senhor deste condado ordenou um massacre de elefantes."
 6230_rebuilding: "Reconstrução"
 6230_rebuilding_desc: "Este condado recebeu um financiamento significativo para ajudar na reconstrução após um incidente maior envolvendo elefantes em fúria."
 court_fashion_foreign_modifier: "Presença Impressionante"
 court_fashion_foreign_modifier_desc: "Todos os estrangeiros admiram e invejam a moda da corte deste personagem. Aumenta a eficácia dos [foreign_affairs|lE]."
 court_fashion_culture_modifier: "Cultura Brilhante"
 court_fashion_culture_modifier_desc: "Todos os estrangeiros querem imitar a moda da corte deste personagem. Aumenta a efetividade de [promote_culture|lE]."
 court_fashion_sell_modifier: "Moda Superior"
 court_fashion_sell_modifier_desc: "Todos os estrangeiros querem comprar roupas na moda da corte deste personagem."
 healthy_and_modest_diet_modifier: "Dieta Saudável e Modesta"
 healthy_and_modest_diet_modifier_desc: "Este personagem escolheu uma dieta temperada e humilde."
 cant_poison_soup_modifier: "Não Se Pode Envenenar a Mesma Sopa"
 cant_poison_soup_modifier_desc: "Você não pode deixar de sentir o sabor do veneno se sua sopa sempre tiver o mesmo gosto!\n[success_chance|E] da [scheme|lE] do [GetScheme('murder').GetTypeName|l] #P -50#!."
 cant_poison_soup_modifier_value: "$cant_poison_soup_modifier$: $VALUE|+0=-+$"
 lodgings_epidemics_resistance_modifier: "Acomodações Melhoradas"
 lodgings_epidemics_resistance_modifier_desc: "As acomodações da corte agora estão mais limpas e espaçosas, reduzindo assim a propagação de doenças."
 lodgings_epidemics_resistance_modifier_1: "$lodgings_epidemics_resistance_modifier$"
 lodgings_epidemics_resistance_modifier_1_desc: "$lodgings_epidemics_resistance_modifier_desc$"
 lodgings_epidemics_resistance_modifier_2: "$lodgings_epidemics_resistance_modifier$"
 lodgings_epidemics_resistance_modifier_2_desc: "$lodgings_epidemics_resistance_modifier_desc$"
 lodgings_epidemics_no_resistance_modifier: "Más Condições de Vida"
 lodgings_epidemics_no_resistance_modifier_desc: "As acomodações da corte são apertadas e sujas, aumentando assim a propagação de doenças."
 court_war_immigration_modifier: "Refugiados de Guerra"
 court_war_immigration_modifier_desc: "Este condado está vendo um fluxo constante de refugiados de guerra de condados vizinhos."
 spies_behind_every_corner_modifier: "Espiões em Cada Canto"
 spies_behind_every_corner_modifier_desc: "Há tantos servos na corte deste personagem que é impossível acompanhar todos.\nAceitação de [agent|lE] e [success_chance|lE] de [hostile_schemes|lE] tanto próprias quanto contra nós aumentadas."
 servants_aplenty_cleaning_modifier: "Servos em Abundância"
 servants_aplenty_cleaning_modifier_desc: "Um senhor não precisa saber o nome nem o rosto de cada servo; ele só precisa saber que todos estão trabalhando arduamente para manter sua residência em excelente estado."
 humble_appearance_modifier: "Aparência Humilde"
 humble_appearance_modifier_desc: "Este personagem não se importa com roupas sofisticadas e aparências superficiais; economizar ouro é muito mais útil."
 ghost_writer_at_court_modifier: "Redator de Discursos"
 ghost_writer_at_court_modifier_desc: "Este personagem está empregando um artista das palavras para compor seus discursos públicos."
 poet_for_diplo_schemes_modifier: "Poeta de Língua Prateada"
 poet_for_diplo_schemes_modifier_desc: "Este personagem emprega um poeta de grande talento para ajudá-lo com seus esquemas.
Diplomacia [schemes|E] [success_chance|E] #P +15#!."
 poet_for_seduction_schemes_modifier: "Este personagem emprega um poeta de grande talento para ajudá-lo com seus esquemas.
 [GetScheme('seduce').GetTypeName] [scheme|E] [success_chance|E] #P +20#!."
 poet_for_seduction_schemes_modifier_desc: "Este personagem emprega um poeta de grande talento para ajudá-lo com seus esquemas.
 [GetScheme('seduce').GetTypeName] [scheme|E] [success_chance|E] #P +20#!."
 court_confident_rider_modifier: "Aprendendo a Língua da Corte"
 court_confident_rider_modifier_desc: "Este personagem foi pressionado a aprender a língua de sua corte e está se esforçando muito."
 pressured_to_learn_court_language_modifier: "Ajuda de Linguista"
 pressured_to_learn_court_language_modifier_desc: "Este personagem está aprendendo a língua da corte de sua família com a ajuda de um linguista qualificado."
 linguist_help_for_court_language_modifier: "$building_program_county_modifier$ do arquiteto"
 linguist_help_for_court_language_modifier_desc: "O programa de construção deste condado está nas mãos de um arquiteto capaz."
 architect_building_program_county_modifier: "Programa de Construção Ambicioso"
 architect_building_program_county_modifier_desc: "O governante deste condado está promovendo um programa de construção ambicioso."
 building_program_county_modifier: "$building_program_county_modifier$"
 building_program_county_modifier_desc: "Este personagem está promovendo um programa de construção ambicioso em sua propriedade familiar."
 estate_building_program_modifier: "$building_program_county_modifier$"
 estate_building_program_modifier_desc: "Este personagem está promovendo um programa de construção ambicioso em sua propriedade familiar."
