l_spanish:
 tolerance_gospel_modifier: "Tolerância Gospel"
 tolerance_gospel_modifier_desc: "Este personagem instou seu povo a abraçar a paciência e a unidade."
 fanatical_recruits_modifier: "Recrutas Fanáticos"
 fanatical_recruits_modifier_desc: "Este personagem tem um fluxo constante de recrutas zelosos."
 tensions_eased_province_modifier: "Tensões Aliviadas"
 tensions_eased_province_modifier_desc: "A tensão religiosa nesta província está diminuindo."
 riots_and_murders_province_modifier: "Tumultos e Assassinatos"
 riots_and_murders_province_modifier_desc: "Este condado foi abalado por massacres e expulsões de chamados indesejáveis."
 hate_monger_modifier: "Divisor de Ódio"
 hate_monger_modifier_desc: "Este personagem é conhecido por semear discórdia e ódio."
 nursing_salaries_for_single_mothers_modifier: "Salários de Enfermagem"
 nursing_salaries_for_single_mothers_modifier_desc: "Este personagem instituiu um sistema em que mães solteiras são pagas para amamentar seus filhos por um tempo."
 widows_and_widowers_amazing_funds_modifier: "Fundos para Viúvas"
 widows_and_widowers_amazing_funds_modifier_desc: "Este personagem criou um fundo para aqueles que ficaram viúvos por causa da guerra ou da desgraça - mas pessoas com filhos fora do casamento não recebem nada."
 starving_single_mothers_and_children_modifier: "Mães Famintas"
 starving_single_mothers_and_children_modifier_desc: "Viúvas, pais solteiros e seus filhos são deixados para morrer de fome nas terras deste personagem."
 destitute_single_mothers_modifier: "Menagerie Lamentável"
 destitute_single_mothers_modifier_desc: "A corte deste personagem está cheia de mães solteiras e seus filhos, em vários estados de miséria."
 anti_innovation_muslim_modifier: "Nizamiyyah"
 anti_innovation_muslim_modifier_desc: "Este personagem mostrou interesse em um novo movimento religioso que abomina o racionalismo e a ciência."
 rolling_in_filth_modifier: "Enrolando na Sujeira"
 rolling_in_filth_modifier_desc: "Este personagem não se preocupa com a limpeza e a chamada higiene."
 cannot_read_greek_modifier: "Alega Saber Ler Grego"
 cannot_read_greek_modifier_desc: "Este personagem afirma estar versado na linguagem dos estudiosos do mundo antigo, mas evidências apontam o contrário."
 misread_medicine_incompetence_modifier: "Interpretação Errada do Cânone da Medicina"
 misread_medicine_incompetence_modifier_desc: "Este personagem leu o Cânone da Medicina e outras grandes obras sobre saúde e higiene, mas as interpretou completamente erroneamente."
 inspired_medicine_modifier: "Inspirado pelas Inovações Médicas"
 inspired_medicine_modifier_desc: "Este personagem demonstrou interesse nas recentes inovações no campo médico por estudiosos persas e andaluzes."
 medical_insights_modifier: "Visão Médica"
 medical_insights_modifier_desc: "Este personagem leu Hipócrates e Galeno, e agora insiste que as pessoas lavem as mãos na corte."
 fp2_advanced_maritime_technology_modifier: "Tecnologia Marítima Avançada"
 fp2_advanced_maritime_technology_modifier_desc: "Este personagem possui tecnologia naval que está muito à frente do resto do mundo."
 fp2_successful_shipyards_modifier: "Mestres Construtores de Navios"
 fp2_successful_shipyards_modifier_desc: "Este local é lar de artesãos navais experientes, capazes de construir até mesmo os navios mais complexos."
 foreboding_visions_modifier: "Visões Ameaçadoras do Futuro"
 foreboding_visions_modifier_desc: "Em sonhos febris e acessos do que pode ser possessão, este personagem experimenta visões sombrias de eventos futuros."
 mysterious_prophetess_illness_modifier: "Doença das Sibilas"
 mysterious_prophetess_illness_modifier_desc: "Este personagem sofre de uma doença debilitante aparentemente relacionada a sonhos proféticos."
 frightened_by_portent_modifier: "Assustado por Presságios"
 frightened_by_portent_modifier_desc: "Este personagem recebeu um presságio de eventos terríveis que virão."
 cortes_modifier: "Cortes"
 cortes_modifier_desc: "Este personagem permite que representantes eleitos das municipalidades livres participem das reuniões do conselho."
 extra_large_cortes_modifier: "Parlamento Popular"
 extra_large_cortes_modifier_desc: "Este personagem permite que #italic qualquer um#! participe das reuniões do conselho."
 vineyards_burnt_county_modifier: "Vinhas Queimadas"
 vineyards_burnt_county_modifier_desc: "Este condado já abrigou vinhas magníficas, mas todas foram destruídas."
 vineyards_protected_county_modifier: "Vinhas Protegidas"
 vineyards_protected_county_modifier_desc: "As vinhas deste condado são protegidas contra fanáticos religiosos que desejam queimá-las."
 crusading_against_iberian_wine_modifier: "Campanha Anti-Vinho Ibérico"
 crusading_against_iberian_wine_modifier_desc: "Este personagem está determinado a acabar com os hábitos blasfemos de beber de seus súditos ibéricos."
 wine_supply_secure_modifier: "Suprimento de Vinho Seguro"
 wine_supply_secure_modifier_desc: "Este personagem garantiu que nada possa ameaçar o suprimento de vinho fino local de sua corte."
 toledo_steel_armaments_modifier: "Armados como os Romanos"
 toledo_steel_armaments_modifier_desc: "Os soldados deste personagem carregam lâminas feitas de um requintado aço ibérico, assim como as legiões romanas do passado."
 toledo_steel_county_modifier: "Aço de Toledo"
 toledo_steel_county_modifier_desc: "Este condado produz um tipo forte de aço que é renomado desde a antiguidade."
 tortured_smith_spilling_secrets_modifier: "Segredos da Fabricação de Espadas"
 tortured_smith_spilling_secrets_modifier_desc: "Este personagem aprendeu segredos da fabricação de espadas de um mestre ferreiro torturado."
 guild_rights_protected_modifier: "Direitos da Guilda Protegidos"
 guild_rights_protected_modifier_desc: "A guilda de ferreiros deste condado foi protegida contra interferências externas."
 master_smith_npc_modifier: "Mestre Ferreiro"
 master_smith_npc_modifier_desc: "As habilidades de ferraria deste personagem são quase incomparáveis."
 great_translation_school_modifier: "Grande Escola de Tradução"
 great_translation_school_modifier_desc: "Este personagem fundou uma escola de tradução onde grandes obras estrangeiras são disponibilizadas para beneficiar toda a civilização."
 mediocre_translation_school_modifier: "Escola de Tradução Medíocre"
 mediocre_translation_school_modifier_desc: "Este personagem financiou uma escola de tradução, mas as pessoas envolvidas possuem talento questionável."
 translation_effort_modifier: "Esforço de Tradução"
 translation_effort_modifier_desc: "Este personagem contratou um estudioso capaz para traduzir obras importantes."
 dusty_libraries_modifier: "Bibliotecas Empoeiradas"
 dusty_libraries_modifier_desc: "As antigas e magníficas bibliotecas no reino deste personagem tornaram-se empoeiradas e desorganizadas. No entanto, é possível encontrar uma estranha tranquilidade dentro delas."
 mystery_meat_unhealth_benefits_modifier: "Sensação Estranha"
 mystery_meat_unhealth_benefits_modifier_desc: "Este personagem comeu uma grande quantidade de carne de uma carcaça gigante misteriosa que havia encalhado em uma praia. Provavelmente não deveria ter comido..."
 mystery_meat_health_benefits_modifier: "Grande Nutrição"
 mystery_meat_health_benefits_modifier_desc: "Este personagem comeu uma grande quantidade de carne de uma carcaça gigante que havia encalhado em uma praia. Era muito saborosa."
 lay_ruler_issued_fatwa_modifier: "Decisão Religiosa"
 lay_ruler_issued_fatwa_modifier_desc: "Este governante emitiu uma opinião legal sobre um assunto religioso, embora alguns possam afirmar que ele não tem autoridade para fazê-lo."
 saw_the_world_from_above_modifier: "Viagem Aérea"
 saw_the_world_from_above_modifier_desc: "Este personagem teve uma experiência profunda de voar pelos céus."
 felt_something_modifier: "Maravilhado com a Beleza"
 felt_something_modifier_desc: "Este personagem ouviu uma música de beleza sobrenatural."
 investing_in_music_modifier: "Investindo em Música"
 investing_in_music_modifier_desc: "Este personagem está fazendo um esforço para ter músicos talentosos, mesmo plebeus, se apresentando em sua corte."
 great_pine_chopped_down_county_modifier: "Grande Pinheiro Derrubado"
 great_pine_chopped_down_county_modifier_desc: "Neste condado, havia um grande e antigo pinheiro de pedra, que lançava uma sombra agradável. Ele não está mais de pé."
 aversion_to_joy_modifier: "Aversão à Alegria"
 aversion_to_joy_modifier_desc: "Este personagem diz a si mesmo que a alegria e a beleza são distrações vãs, tornando-o fraco."
 memorable_public_execution_modifier: "Execução Pública Memorável"
 memorable_public_execution_modifier_desc: "Este personagem executou alguém de maneira #italic muito #!horrível."
 compelling_apology_modifier: "Desculpas Persuasivas"
 compelling_apology_modifier_desc: "Qualquer que tenha sido seu erro, este personagem fez um pedido de desculpas #italic muito #!sincero."
 restitution_to_minorities_modifier: "Restituição às Minorias Locais"
 restitution_to_minorities_modifier_desc: "Este personagem reparou algumas das queixas das minorias locais."
 obligations_fulfilled_modifier: "Obrigações Questionáveis"
 obligations_fulfilled_modifier_desc: "Este personagem cumpriu suas obrigações para com outro governante - entregando escravos fugitivos..."
 saqaliba_settlers_county_modifier: "Colonos Saqaliba"
 saqaliba_settlers_county_modifier_desc: "Ex-escravos de origem europeia oriental se estabeleceram nesta província."
 former_slave_npc_modifier: "Ex-Escravo"
 former_slave_npc_modifier_desc: "Este personagem foi uma vez escravo e é muito comprometido em defender sua liberdade."
