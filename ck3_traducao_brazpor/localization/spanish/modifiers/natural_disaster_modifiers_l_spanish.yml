l_spanish:
 tgp_natural_disaster_recovery_tax_burden: "Carga fiscal de recuperação dos sobreviventes"
 tgp_natural_disaster_recovery_tax_burden_desc: "Os coletores de impostos deste personagem foram instruídos a redirecionar os impostos para os esforços de recuperação após o desastre."
 tgp_natural_disaster_recovery_tax_burden_reduced: "$tgp_natural_disaster_recovery_tax_burden$"
 tgp_natural_disaster_recovery_tax_burden_reduced_desc: "$tgp_natural_disaster_recovery_tax_burden_desc$"
 tgp_natural_disaster_recovery_popular_hero: "Herói da ajuda humanitária em desastres"
 tgp_natural_disaster_recovery_popular_hero_desc: "Este personagem é amplamente elogiado por financiar os esforços de recuperação após o desastre, o que lhe rendeu respeito em todo o reino."
 tgp_natural_disaster_memorial_fortifications: "Fortificações comemorativas"
 tgp_natural_disaster_memorial_fortifications_desc: "As fortificações desta região não apenas foram reconstruídas, mas também melhoradas, servindo como memorial aos mortos e celebração da vitória sobre o desastre."
 tgp_natural_disaster_built_memorial_fortifications: "Construtor de monumento comemorativo"
 tgp_natural_disaster_built_memorial_fortifications_desc: "Este personagem financiou generosamente a construção de fortificações aprimoradas no local do desastre, criando um registro permanente do compromisso de sua dinastia com o bem-estar da região."
 tgp_natural_disaster_memorial_fortifications_wierdijks: "$tgp_natural_disaster_memorial_fortifications$"
 tgp_natural_disaster_memorial_fortifications_wierdijks_desc: "$tgp_natural_disaster_memorial_fortifications_desc$"
 tgp_natural_disaster_keeper_of_order: "Guardião da ordem"
 tgp_natural_disaster_keeper_of_order_desc: "A supervisão decisiva deste personagem nos esforços de limpeza — removendo rapidamente os destroços e restaurando a ordem — lhe rendeu o respeito de seus vassalos."
 tgp_natural_disaster_cleanup_material_recovery: "Recuperação de material da catástrofe"
 tgp_natural_disaster_cleanup_material_recovery_desc: "Os materiais recuperados na organização da limpeza da catástrofe foram reaproveitados, reduzindo significativamente os custos de construção."
 tgp_natural_disaster_reconstruction_economic_activity: "Boom econômico pela reconstrução"
 tgp_natural_disaster_reconstruction_economic_activity_desc: "Os esforços de reconstrução estimularam significativamente a atividade econômica neste condado, com o aumento de negócios decorrente das operações de reconstrução."
 tgp_natural_disaster_reconstruction_development_growth: "Impulso ao desenvolvimento pela reconstrução"
 tgp_natural_disaster_reconstruction_development_growth_desc: "Os extensos esforços de reconstrução trouxeram novas técnicas, materiais e infraestrutura que aceleram o crescimento neste condado."
 tgp_natural_disaster_resettlement_domain_burden: "Sobrecarga administrativa após o reassentamento causado pelo desastre"
 tgp_natural_disaster_resettlement_domain_burden_desc: "O gerenciamento das populações deslocadas das áreas de desastre sobrecarregou a capacidade administrativa, reduzindo a eficácia da gestão do domínio."
 tgp_natural_disaster_resettlement_taxation_loss: "Perda de arrecadação por reassentamentos"
 tgp_natural_disaster_resettlement_taxation_loss_desc: "Os deslocamentos caóticos da população levaram a uma diminuição na arrecadação de impostos."
 tgp_natural_disaster_resettlement_levy_growth: "Levas de refugiados"
 tgp_natural_disaster_resettlement_levy_growth_desc: "Muitos sobreviventes deslocados pelo recente desastre se apresentam voluntariamente para o serviço militar."
 tgp_natural_disaster_aid_monthly_expense: "Despesa com ajuda humanitária em desastres"
 tgp_natural_disaster_aid_monthly_expense_desc: "O custo mensal contínuo de fornecer ajuda humanitária às vítimas da catástrofe, incluindo alimento, abrigo e suprimentos médicos."
 tgp_natural_disaster_relief_savior: "Salvador da ajuda humanitária em desastres"
 tgp_natural_disaster_relief_savior_desc: "Este personagem é amplamente reverenciado por sua ajuda compassiva às vítimas de desastres, conquistando para si respeito e reconhecimento espiritual duradouros."
 tgp_natural_disaster_aid_control_recovery: "Recuperação de controle por ajuda em desastres"
 tgp_natural_disaster_aid_control_recovery_desc: "Os esforços humanitários ajudaram a restabelecer a ordem e a estabilidade nas áreas afetadas pelo desastre, acelerando a recuperação do controle administrativo local."
 tgp_natural_disaster_drainage_reduce_levies: "Esforços de drenagem: levas reduzidas"
 tgp_natural_disaster_drainage_reduce_levies_desc: "Os recrutas locais foram enviados para ajudar nas obras de drenagem, reduzindo significativamente as forças militares por um tempo."
 tgp_natural_disaster_drainage_work_levy_shortage: "Falta de recrutas para as obras de drenagem"
 tgp_natural_disaster_drainage_work_levy_shortage_desc: "Muitas de nossas levas estão ocupadas com os trabalhos de drenagem das inundações, o que limita severamente nossa capacidade de repor as forças militares."
 tgp_natural_disaster_recovery_minister_chancellor: "Grão-Chanceler auxilia na recuperação da catástrofe"
 tgp_natural_disaster_recovery_minister_chancellor_desc: "Os esforços deste personagem para se recuperar de um desastre natural são apoiados pelo Grão-Chanceler."
 tgp_natural_disaster_recovery_minister_of_personnel: "Ministro de Pessoal auxilia na recuperação da catástrofe"
 tgp_natural_disaster_recovery_minister_of_personnel_desc: "Os esforços deste personagem para se recuperar de um desastre natural contam com o apoio do Ministro de Pessoal."
 tgp_natural_disaster_recovery_minister_of_rites: "Ministro de Ritos auxilia na recuperação de desastres"
 tgp_natural_disaster_recovery_minister_of_rites_desc: "Os esforços deste personagem para se recuperar de um desastre natural contam com o apoio do Ministro de Ritos."
 tgp_natural_disaster_recovery_minister_of_war: "Ministro da Guerra auxilia na recuperação da catástrofe"
 tgp_natural_disaster_recovery_minister_of_war_desc: "Os esforços deste personagem para se recuperar de um desastre natural são apoiados pelo Ministro da Guerra."
