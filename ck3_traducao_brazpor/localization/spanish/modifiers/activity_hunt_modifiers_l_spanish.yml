l_spanish:
 held_hunt_modifier: "Caçou Recentemente"
 held_hunt_modifier_desc: "Este personagem organizou recentemente uma Caçada e não pode fazê-lo novamente até a data especificada."
 hunt_punished_locals_modifier: "Puniu Caçadores Ilegais"
 hunt_punished_locals_modifier_desc: "La gente de este condado ha de compensar la presencia de los furtivos en los bosques.\n#weak $hunt_modifier_success_slightly_improved_location_tt$#!\n"
 hunt_poacher_training_modifier: "Treinamento com Caçadores Ilegais"
 hunt_poacher_training_modifier_desc: "Este personagem foi treinado por caçadores ilegais para caçar."
 hunt_upset_hunting_county_modifier: "Indignação com Caçadores Ilegais"
 hunt_upset_hunting_county_modifier_desc: "Este condado está indignado com a maneira como tem sido tratado pelas ações de um punhado de caçadores furtivos"
 modifier_hunt_hunting_trophy: "Troféu de caça"
 modifier_hunt_hunting_trophy_desc: "Um troféu de caça impressionante está pendurado no grande salão deste personagem, mostrando suas realizações."
 modifier_hunt_friend_of_animal: "Amigo dos Animais"
 modifier_hunt_friend_of_animal_desc: "Este personagem tem uma habilidade incrível de lidar com animais."
 hunt_guide_local_madman_modifier: "Guia Local"
 hunt_guide_local_madman_modifier_desc: "El dueño de un pantano le dio a este personaje una visita guiada por el lugar mientras cazaba.\n#weak $hunt_modifier_success_slightly_improved_location_tt$#!\n"
 hunt_guide_local_madman_modifier_custom_desc: "El dueño de un pantano le dio a este personaje una visita guiada por el lugar mientras cazaba.\n#weak Mientras este modificador esté activo, tu [hunt_success_chance|lE] será #positive_value ligeramente mejor#! en [SCOPE.sTitle('activity_place').GetNameNoTier]#!\n"
 hunt_killed_local_madman_modifier: "Local Morto"
 hunt_killed_local_madman_modifier_desc: "Um habitante notável do pântano deste condado foi morto por um caçador excessivamente zeloso."
 hunt_talked_to_madman_modifier: "Ouvir Preocupações Locais"
 hunt_talked_to_madman_modifier_desc: "Os moradores deste condado estão satisfeitos por terem tido suas preocupações ouvidas pela nobreza da caça."
 hunt_peasants_denied_forest_modifier: "Camponeses proibidos de Pastar nas Florestas"
 hunt_peasants_denied_forest_modifier_desc: "Aos camponeses deste condado foi negado o direito de forragear nas florestas."
 hunt_peasants_hunted_modifier: "Camponeses caçados"
 hunt_peasants_hunted_modifier_desc: "Os camponeses têm medo de se instalar neste condado devido às coisas indescritíveis que aconteceram aqui."
 hunt_aided_peasants_modifier: "Camponeses ajudados"
 hunt_aided_peasants_modifier_desc: "As pessoas mais pobres deste condado receberam ajuda de caridade significativa."
 hunt_falconry_practiced_modifier: "Falcoaria praticada"
 hunt_falconry_practiced_modifier_desc: "Este personagem praticou falcoaria antes de sua caça."
 hunt_poet_romance_aptitude_modifier: "Caçado(a) durante a falcoaria"
 hunt_poet_romance_aptitude_modifier_desc: "Este personagem teve uma troca amorosa durante uma caçada que inspirou sua poesia."
 hunt_faith_desecrated_place_of_worship: "Local de culto profanado"
 hunt_faith_desecrated_place_of_worship_desc: "Este personagem profanou um local de culto."
 tgp_hunt_burnt_local_crops: "Queima das colheitas dos camponeses"
 tgp_hunt_burnt_local_crops_desc: "Este personagem queimou o campo de alguns camponeses locais ao tentar fazer a caça sair."
 hunt_fresh_air_and_exercise_modifier: "Ar fresco e Exercícios"
 hunt_fresh_air_and_exercise_modifier_desc: "Este personagem tem praticado exercícios rigorosos durante suas caçadas."
 hunt_focused_attention_modifier: "Atenção Focada"
 hunt_focused_attention_modifier_desc: "Este personagem sabe como se concentrar nas coisas que exigem atenção imediata."
 modifier_hunt_dog_trophy_modifier: "Troféu de caça"
 modifier_hunt_dog_trophy_modifier_desc: "Um troféu de caça impressionante está pendurado no grande salão deste personagem, mostrando suas realizações."
 modifier_hunt_dog_fighting_modifier: "Proeza aprimorada"
 modifier_hunt_dog_fighting_modifier_desc: "Este personagem realizou uma proeza impressionante durante suas caçadas."
 modifier_hunt_resisted_advances: "Avanços Resistidos"
 modifier_hunt_resisted_advances_desc: "Este personagem resistiu ao canto de tentação da sereia."
 hunt_mediated_fight_modifier: "Mediador"
 hunt_mediated_fight_modifier_desc: "Este personagem negociou com sucesso entre duas pessoas em conflito- uma lição valiosa."
 hunt_protected_peasants_modifier: "Proteção aos Camponeses"
 hunt_protected_peasants_modifier_desc: "Os camponeses deste condado se sentem seguros."
 hunt_disturbed_locals_modifier: "Moradores Perturbados"
 hunt_disturbed_locals_modifier_desc: "Os moradores deste condado só querem ser deixados em paz."
 hunt_focused_effort_modifier: "Esforço Concentrado na Caça"
 hunt_focused_effort_modifier_desc: "Este personagem está muito focado na caça."
 hunt_treated_injury_modifier: "Cirurgia de Campo Praticada"
 hunt_treated_injury_modifier_desc: "Este personagem tem alguma experiência recente com tratamentos médicos muito difíceis."
 hunt_tasted_the_belt_modifier: "Sentiu o Cinto"
 hunt_tasted_the_belt_modifier_desc: "Este personagem está sofrendo com o traseiro machucado."
 hunt_treated_wound_modifier: "Curativos Feitos"
 hunt_treated_wound_modifier_desc: "Os ferimentos deste personagem foram habilmente tratados."
 hunt_chose_truth_modifier: "Honestidade Humilde"
 hunt_chose_truth_modifier_desc: "Este personagem falou a verdade em prejuízo próprio."
 hunt_mystical_animal_modifier: "Caçou Animal Místico"
 hunt_mystical_animal_modifier_desc: "Este personagem caçou e matou uma criatura mística."
 hunt_protected_their_secret_modifier: "Protetor de Segredos"
 hunt_protected_their_secret_modifier_desc: "Este personagem está guardando suas cartas a sete chaves."
 hunt_sighting_standard_modifier: "Avistamento de Caça"
 hunt_sighting_standard_modifier_desc: "Se han avistado un exceso de presas prometedoras en este condado.\n#weak La [hunt_success_chance|lE] aumenta en este [county|lE]#!"
 hunt_sighting_standard_modifier_custom_desc: "Se han avistado una gran cantidad de [SCOPE.sTitle('sighting_county').Custom('GetAnimalPlural')] en este condado.\n#weak Aumenta la [hunt_success_chance_no_prefix|lE] de cazar [SCOPE.sTitle('sighting_county').Custom('GetAnimalType')]#!"
 hunt_sighting_dangerous_modifier: "Avistamento de Fera"
 hunt_sighting_dangerous_modifier_desc: "Se ha informado de que una bestia feroz está aterrorizando este condado.\n#weak La [hunt_success_chance|lE] aumenta en este [county|lE].#!"
 hunt_sighting_dangerous_modifier_custom_desc: "Se ha informado que un ejemplar feroz de [SCOPE.sTitle('sighting_county').Custom('GetAnimalType')] está aterrorizando este condado.\n#weak Aumenta la [hunt_success_chance_no_prefix|lE] de cazar [SCOPE.sTitle('sighting_county').Custom('GetAnimalType')]#!"
 hunt_sighting_legendary_modifier: "Avistamento de Lendário"
 hunt_sighting_legendary_modifier_desc: "Se ha avistado un animal mítico feroz en este condado.\n#weak En este [county|lE] se puede celebrar una [GetActivityType('activity_hunt').GetName|l][GetActivityType('activity_hunt').GetTextIcon] $hunt_type_legendary$#!"
 hunt_sighting_legendary_modifier_custom_desc: "Se ha informado de que se ha avistado un ejemplar de [SCOPE.sTitle('sighting_county').Custom('GetAnimalType')] de pelaje [SCOPE.sTitle('sighting_county').Custom('GetLegendaryColor')] en este condado.\n#weak En este [county|lE] se puede cazar un ejemplar legendario de [SCOPE.sTitle('sighting_county').Custom('GetAnimalType')|UV] de pelaje [SCOPE.sTitle('sighting_county').Custom('GetLegendaryColor')|UV]#!"
 hunt_sighting_falconry_modifier: "Avistamento de Aves"
 hunt_sighting_falconry_modifier_desc: "El avistamiento reciente de aves migratorias o en crianza hace que este condado sea ideal para la práctica de la cetrería.\n#weak La [hunt_success_chance|lE] de $hunt_type_falconry$ aumenta en este [county|lE]#!"
 hunt_sighting_falconry_modifier_custom_desc: "El avistamiento reciente de [SCOPE.sTitle('sighting_county').Custom('GetAnimalPlural')] en migración o crianza hace que este condado sea ideal para la práctica de la cetrería.\n#weak Aumenta la [hunt_success_chance_no_prefix|lE] de cazar [SCOPE.sTitle('sighting_county').Custom('GetAnimalType')]#!"
 hunt_heir_murder_exposed_modifier: "Justiça Camponesa"
 hunt_heir_murder_exposed_modifier_desc: "Este personagem priorizou a justiça em detrimento da reputação de um cortesão."
 hunt_disrespected_locals_modifier: "Desrespeito aos Locais"
 hunt_disrespected_locals_modifier_desc: "Os sentimentos dos camponeses deste condado foram pisoteados pelos caçadores."
 hunt_happy_hounds_modifier: "Cães Felizes"
 hunt_happy_hounds_modifier_desc: "Os cães de caça deste personagem são bem recompensados.\n#weak $hunt_modifier_success_slightly_improved_tt$#!\n\n"
 hunt_savage_hounds_modifier: "Cães Selvagens"
 hunt_savage_hounds_modifier_desc: "Os cães deste personagem têm a reputação de derrubar grandes presas.\n#weak $hunt_modifier_success_slightly_improved_tt$#!\n\n"
 hunt_savaged_hounds_modifier: "Cães Destroçados"
 hunt_savaged_hounds_modifier_desc: "Os canis deste personagem foram esvaziados ao lançar os cães contra as feras.\n#weak $hunt_modifier_success_slightly_worse_tt$#!\n\n"
 crushed_by_boulder_modifier: "Esmagado por Pedra"
 crushed_by_boulder_modifier_desc: "Esta personagem exibiu bravata que se voltou contra ela quando foi esmagada pela pedra que tentava pular."
 hunt_blooming_garden_modifier: "Jardim Florido"
 hunt_blooming_garden_modifier_desc: "O jardim deste personagem foi bem decorado com flores selvagens encontradas durante uma caçada recente."
 hunt_stocked_medicus_modifier: "Médico Abastecido"
 hunt_stocked_medicus_modifier_desc: "O médico deste personagem possui estoques abundantes de ervas medicinais, tanto raras quanto comuns."
 hunt_witch_protector_modifier: "Pastor Preocupado"
 hunt_witch_protector_modifier_desc: "Este personagem demonstrou um interesse sagaz em proteger seus irmãos e irmãs."
 hunt_left_in_trap_modifier: "Preso em Armadilha"
 hunt_left_in_trap_modifier_desc: "Este personagem ficou preso em uma armadilha de caça por um tempo muito maior do que era bom para sua saúde."
 hunt_punished_trappers_modifier: "Caçadores Punidos"
 hunt_punished_trappers_modifier_desc: "As armadilhas de caça dos camponeses deste condado sofreram a ira de seu dono."
 hunt_witch_suspicion_modifier: "Suspeitas de Bruxaria"
 hunt_witch_suspicion_modifier_desc: "O interesse deste personagem pela natureza levantou questões sobre sua lealdade ao verdadeiro deus."
 hunt_mismanaged_game_modifier: "Caça Mal Gerenciada"
 hunt_mismanaged_game_modifier_desc: "La caza de ciervas ha reducido las reservas de caza de este condado.\n#weak La [hunt_success_chance|lE] futura de este animal será #negative_value ligeramente peor#! en este [county|lE]#!"
 hunt_mismanaged_game_modifier_custom_desc: "Este personaje capturó un cervatillo y lo domesticó para que engañe a sus primos salvajes.\n#weak La [hunt_success_chance|lE] futura de [ROOT.Char.Custom('GetAnimalTypeMismanaged')|UV] será #negative_value ligeramente peor#! en este [county|lE]#!"
 hunt_tame_deer_modifier: "Cervo Domesticado"
 hunt_tame_deer_modifier_desc: "Este personaje capturó un cervatillo y lo domesticó para que engañe a sus primos salvajes.\n#weak En el futuro, la [hunt_success_chance|lE] contra esta clase de animal será #positive_value ligeramente mejor#!#!\n"
 hunt_tame_deer_modifier_custom_desc: "Este personaje capturó un cervatillo y lo crío domesticado para que engañe a sus primos salvajes.\n#weak La [hunt_success_chance|lE] de [ROOT.Char.Custom('GetAnimalTypeTame')|UV] es #P ligeramente mejor#!#!"
 hunt_captive_beast_modifier: "Fera Cativa"
 hunt_captive_beast_modifier_desc: "Este personaje ha capturado viva a una bestia peligrosa para exhibición y entretenimiento.\n#weak Puede usarse para [GetActivityType('activity_hunt').GetName|l] este animal con una [hunt_success_chance_no_prefix|lE] #P alta#!\n"
 hunt_captive_beast_modifier_custom_desc: "Este personaje ha capturado vivo un ejemplar de [ROOT.Char.Custom('GetAnimalTypeCaptive')] de porte [ROOT.Char.Custom('GetAnimalAdjectiveCaptive')] para exhibición y entretenimiento.\n#weak Puede usarse para [GetActivityType('activity_hunt').GetName|l] ejemplares de [ROOT.Char.Custom('GetAnimalTypeCaptive')|UV] con una [hunt_success_chance_no_prefix|lE] #P alta#!"
 dog_story_scenthound_modifier: "Cão de Faro"
 dog_story_scenthound_modifier_desc: "Un perro leal, adiestrado para seguir presas salvajes, sigue a este personaje adondequiera que vaya.\n#weak Aumenta ligeramente la [hunt_success_chance|lE]#!"
 dog_story_beasthound_modifier: "Cão de Feras"
 dog_story_beasthound_modifier_desc: "Un perro leal, adiestrado para luchar contra bestias peligrosas, sigue a este personaje adondequiera que vaya.\n#weak Aumenta ligeramente la [hunt_success_chance|lE]#! contra bestias [Concept( 'hunt_dangerous', 'peligrosas' )|El]"
