 excommunication_recently_lifted_desc: "Levará algum tempo para que a mancha da [excommunication|lE] anterior deste personagem desapareça completamente."
 vow_of_poverty_modifier: "Voto de Pobreza"
 vow_of_poverty_modifier_desc: "Este personagem fez um voto sagrado de doar grande parte de sua riqueza."
 temporal_condemnation_modifier: "Condenação Temporal"
 temporal_condemnation_modifier_desc: "As autoridades religiosas condenaram este personagem como inadequado para liderar os fiéis."
 scorned_theocrats_modifier: "Clero Desprezado"
 scorned_theocrats_modifier_desc: "Este personagem insultou e ameaçou publicamente um membro do clero."
 known_non_believer: "Não Crente Conhecido"
 known_non_believer_desc: "Este personagem foi exposto como um não-crente."
 dynasty_beneficiary_won_ghw: "Dinastia Ardente"
 dynasty_beneficiary_won_ghw_desc: "Ninguém pode negar o fervor e a coragem com que os membros desta dinastia se destacaram repetidas vezes na guerra, especialmente em assuntos de fé."
 house_beneficiary_won_ghw_crusade: "Casa Cruzada"
 house_beneficiary_won_ghw_crusade_desc: "Quando chegou a hora de provar sua devoção à Igreja, os membros desta casa estavam prontos para atender ao chamado às armas e se distinguir em batalha contra os infiéis."
 house_beneficiary_won_ghw_jihad: "Casa do Mujahid"
 house_beneficiary_won_ghw_jihad_desc: "Não há dúvida: o espírito da luta sagrada está vivo e forte nos membros desta casa."
 house_beneficiary_won_ghw: "Guerrilheiros Sagrados"
 house_beneficiary_won_ghw_desc: "Os membros desta casa se distinguiram na luta contra os inimigos da Fé, provando além de qualquer dúvida o seu zelo."
 resurging_saoshyant: "Saoshyant Ressurgente"
 resurging_saoshyant_desc: "Esta dinastia gerou o profetizado Saoshyant, que retornou para liderar o mundo para fora da escuridão."
 wind_spirit_blessing: "Bênção dos Espíritos do Vento"
 wind_spirit_blessing_desc: "Rumores dizem que este personagem foi abençoado pelos espíritos do vento."
