 bhakti_hinduism_ganga: "Devoto de Ganga"
 bhakti_hinduism_ganga_desc: "A bhakti deste personagem é por Ganga, deusa da pureza, expiação e moksha."
 bhakti_hinduism_saraswati: "Devoto de Saraswati"
 bhakti_hinduism_saraswati_desc: "A bhakti deste personagem é por Saraswati, deusa do aprendizado, música, arte e sabedoria."
 bhakti_hinduism_kali: "Devoto de Kali"
 bhakti_hinduism_kali_desc: "A bhakti deste personagem é por Kali, deusa da destruição das forças do mal."
 bhakti_hinduism_kubera: "Devoto de Kubera"
 bhakti_hinduism_kubera_desc: "A bhakti deste personagem é por Kubera, o deus deformado da riqueza, justiça e riquezas materiais."
 bhakti_vaishnavism_lakishmi: "Devoto de Lakishmi"
 bhakti_vaishnavism_lakishmi_desc: "A bhakti deste personagem é por Lakishmi, deusa da riqueza, fortuna e prosperidade."
 bhakti_vaishnavism_jagganath: "Devoto de Jagganath"
 bhakti_vaishnavism_jagganath_desc: "A bhakti deste personagem é por Jagganath, o Senhor do Universo."
 bhakti_vaishnavism_hayagriva: "Devoto de Hayagriva"
 bhakti_vaishnavism_hayagriva_desc: "A bhakti deste personagem é por Haygriva, o deus de cabeça de cavalo do conhecimento e sabedoria."
 bhakti_shaivism_parvati: "Devoto de Parvati"
 bhakti_shaivism_parvati_desc: "A bhakti deste personagem é por Parvati, deusa da fertilidade, amor, beleza, casamento, crianças e devoção."
 bhakti_shaivism_virabhadra: "Devoto de Vīrabhadra"
 bhakti_shaivism_virabhadra_desc: "A bhakti deste personagem é por Vīrabhadra, um aspecto extremamente feroz e temível de Shiva que encarna raiva e ira justa."
 bhakti_shaivism_munishwarar: "Devoto de Munīshwarar"
 bhakti_shaivism_munishwarar_desc: "A bhakti deste personagem é por Munīshwarar, um aspecto santo de Shiva que encarna amor familiar."
 bhakti_shaivism_dakshinamoorthy: "Devoto de Dakshinamoorthy"
 bhakti_shaivism_dakshinamoorthy_desc: "A devoção deste personagem é para Dakshinamoorthy, o deus do aprendizado em todas as suas formas."
 bhakti_smartism_ganesha: "Devoto de Ganesha"
 bhakti_smartism_ganesha_desc: "A devoção deste personagem é para Ganesha, o deus de cabeça de elefante do conhecimento, escrita, sabedoria e novos começos."
 bhakti_smartism_vishnu: "Devoto de Vishnu"
 bhakti_smartism_vishnu_desc: "A devoção deste personagem é para Vishnu, o deus que protege e cuida da criação."
 bhakti_smartism_shiva: "Devoto de Shiva"
 bhakti_smartism_shiva_desc: "A devoção deste personagem é para Shiva, o deus que caça e destrói o mal em todas as suas formas."
 bhakti_germanic_generic_odin: "Devoto de Odin"
 bhakti_germanic_generic_odin_desc: "O deus favorito deste personagem é Odin, o deus da guerra, feitiçaria, morte e poesia."
 bhakti_germanic_not_danish_ullr: "Devoto de Ullr"
 bhakti_germanic_not_danish_ullr_desc: "O deus favorito deste personagem é Ullr, o deus da guerra e da honra."
 bhakti_germanic_danish_tyr: "Devoto de Tyr"
 bhakti_germanic_danish_tyr_desc: "O deus favorito deste personagem é Tyr, o deus da guerra e da coragem."
 bhakti_germanic_generic_thor: "Devoto de Thor"
 bhakti_germanic_generic_thor_desc: "O deus favorito deste personagem é Thor, o deus da proteção, tempestades, humanidade e força."
 bhakti_germanic_generic_freyr: "Devoto de Freyr"
 bhakti_germanic_generic_freyr_desc: "O deus favorito deste personagem é Freyr, o deus da paz, da colheita e do governo benigno."
 meditating_in_seclusion_modifier: "Meditando em Seclusão"
 meditating_in_seclusion_modifier_desc: "Este personagem embarcou em uma jornada interior e está prestando pouca atenção às coisas materiais."
 astrology_great_battle: "Antecipando Grande Batalha"
 astrology_great_battle_desc: "Este personagem está antecipando e treinando para uma grande batalha."
 astrology_new_friends: "Fazendo Novos Amigos"
 astrology_new_friends_desc: "Este personagem está curando antigas rivalidades e fazendo novos amigos."
 astrology_hard_work: "Trabalhador Dedicado"
 astrology_hard_work_desc: "Este personagem planeja provar que o trabalho árduo e a dedicação compensam."
 astrology_betrayal: "Desconfiado dos Outros"
 astrology_betrayal_desc: "Algo fez com que este personagem ficasse desconfiado e desconfiado dos outros."
 astrology_new_beginnings: "Mente Aberta"
 astrology_new_beginnings_desc: "Este personagem está ativamente tentando manter uma mente aberta."
 feud_with_the_church_modifier: "Rixa com a Igreja"
 feud_with_the_church_modifier_desc: "Este personagem é conhecido por estar envolvido em uma amarga rixa com a Igreja, e pode fazer algo drástico."
 sun_trial_suspicious_modifier: "Julgamento do Sol Suspeito"
 sun_trial_suspicious_modifier_desc: "Este personagem é conhecido por ter realizado um Julgamento do Sol que terminou em circunstâncias um tanto suspeitas, trazendo desrepute a eles."
