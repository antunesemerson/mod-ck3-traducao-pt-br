 bp1_1000_time_with_bf_modifier: "Tempo de Qualidade com o Melhor Amigo"
 bp1_1000_time_with_bf_modifier_desc: "Este personagem está passando um tempo de qualidade com seu melhor amigo."
 bp1_1000_focus_on_work_modifier: "Focado no Trabalho"
 bp1_1000_focus_on_work_modifier_desc: "Este personagem está negligenciando seu amigo para se concentrar em seus deveres."
 bp1_1020_friend_with_modifier: "Amigo Cuidadoso"
 bp1_1020_friend_with_modifier_desc: "Um amigo cuidadoso está sentado ao lado da cama deste personagem."
 bp1_superstition_modifier: "Supersticioso"
 bp1_superstition_modifier_desc: "A vida deste personagem é controlada por uma crença em influências sobrenaturais que levam a boa ou má sorte."
 bp1_1070_unlucky_charm_modifier: "Amuleto de Má Sorte"
 bp1_1070_unlucky_charm_modifier_desc: "Má sorte foi enviada a este personagem por um rival malvado."
 bp1_well_fed_pigs_modifier: "Porcos Bem Alimentados"
 bp1_well_fed_pigs_modifier_desc: "Este personagem tem animais suspeitosamente gordos..."
 humiliated_by_rival_modifier: "Humilhado"
 humiliated_by_rival_modifier_desc: "Este personagem foi publicamente envergonhado por um rival e ainda não conseguiu superar a vergonha."
 triumphant_over_rival_modifier: "Triunfante"
 triumphant_over_rival_modifier_desc: "Este personagem superou publicamente um rival e, como resultado, caminha com confiança renovada."
 dead_best_friend_modifier: "Dor Duradoura"
 dead_best_friend_modifier_desc: "O melhor amigo deste personagem morreu, e ele não conseguiu se recuperar completamente."
 linguistically_challenged_modifier: "Dificuldade Linguística"
 linguistically_challenged_modifier_desc: "Este personagem pronuncia certas palavras de forma diferente das normas estabelecidas e é ridicularizado por isso."
 descriptivist_modifier: "Descritivista"
 descriptivist_modifier_desc: "Este personagem insiste em usar sua própria abordagem da linguagem, revelando uma clara falta de educação em questões linguísticas."
 sneaking_suspicion_modifier: "Suspeita Insidiosa"
 sneaking_suspicion_modifier_desc: "Este personagem tem uma disposição aparentemente alegre, tendo afastado da mente alguns acontecimentos preocupantes. Ou, pelo menos, #EMP tentou#!..."
 busy_guards_modifier: "Guardas Ocupados"
 busy_guards_modifier_desc: "Este personagem redirecionou os esforços de seus guardas para questões frívolas em vez de proteger a si mesmo."
 lacking_supplies_modifier: "Suprimentos Insuficientes"
 lacking_supplies_modifier_desc: "Este personagem permitiu que as ações nefastas dos outros ficassem sem investigação e, como resultado, está com falta de alimentos armazenados."
 optimist_modifier: "Otimista"
 optimist_modifier_desc: "Para este personagem, o copo está sempre meio cheio."
 lacking_poultry_modifier: "Falta de Produtos de Aves"
 lacking_poultry_modifier_desc: "Este condado está com falta dos alimentos e produtos fornecidos pelas aves."
 obsessively_neurotic_modifier: "Obsessivamente Neurótico"
 obsessively_neurotic_modifier_desc: "Este personagem vê perigo em cada esquina e vive sua vida com medo."
 unhappy_spouse_modifier: "Casamento Infeliz"
 unhappy_spouse_modifier_desc: "As neuroses deste personagem comprometeram seu casamento, potencialmente além do reparo."
 disdained_modifier: "Desprezado"
 disdained_modifier_desc: "Este personagem é conhecido por estar sob o controle de seus próprios vassalos, que desprezam abertamente suas tentativas de mantê-los na linha."
 cat_revenge_modifier: "Vingança pelo Gato"
 cat_revenge_modifier_desc: "O gato deste personagem foi morto por seu inimigo e, como resultado, eles estão cheios de pensamentos de vingança."
 cat_survived_modifier: "Surpresa Felina"
 cat_survived_modifier_desc: "O gato deste personagem de alguma forma sobreviveu a uma tentativa de assassinato por seu inimigo."
 sated_modifier: "Saciado"
 sated_modifier_desc: "Este personagem teve algum #EMP tempo de qualidade#! com seu amante."
 family_troubles_modifier: "Problemas Familiares"
 family_troubles_modifier_desc: "Este personagem tem alguns parentes próximos que estão passando por dificuldades."
 skinned_pet_modifier: "Animal de Estimação Esfolado"
 skinned_pet_modifier_desc: "Este personagem teve seu amado animal de estimação esfolado e transformado em uma peça de vestuário pelas maquinações de um rival."
