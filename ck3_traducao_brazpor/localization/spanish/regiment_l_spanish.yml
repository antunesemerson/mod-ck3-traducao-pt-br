 #Special MaA
 house_guard: "Guarda da Casa"
 house_guard_flavor: "#F Este regimento de elite serve a uma Dinastia específica. Os guerreiros são escolhidos a dedo entre os súditos mais leais.#!"
 #MaA Descriptions
 bowmen_flavor: "#F Arqueiros profissionais enchem o ar de flechas, devastando as tropas inimigas na linha de frente.#!"
 light_footmen_flavor: "#F Escaramuçadores veteranos são hostilizadores inestimáveis, desorganizando os flancos inimigos e corroendo o moral.#!"
 light_horsemen_flavor: "#F Leves e velozes, esses cavaleiros são excelentes para flanquear e devastadores ao perseguir inimigos em retirada.#!"
 armored_footmen_flavor: "#F Bem armadas e treinadas, essas tropas se especializam em esmagar infantaria agrupada.#!"
 pikemen_unit_flavor: "#F Longos piques permitem que esses regimentos formem paredes de lanças capazes de parar uma carga de cavalaria.#!"
 armored_horsemen_flavor: "#F Fortemente armados e protegidos, esses cavaleiros dominam a guerra em planícies abertas.#!"
 crossbowmen_flavor: "#F Embora lentas para recarregar, bestas são fáceis de usar e disparam virotes capazes de perfurar a maioria das armaduras a boa distância.#!"
 handgunners_flavor: "#F Caras y explosivas en igual medida, estas burdas armas de fuego son herramientas increíblemente eficaces.#!\n#help Habilitados por el [GetBuilding('powder_magazine_01').GetName|l]#!"
 fire_lancers_flavor: "#F Con el uso de fórmulas experimentales, los hombres equipados con estas extrañas armas de asta son capaces de descargar fuego sobre unos enemigos atemorizados.#!\n#help Habilitados por el [GetBuilding('powder_magazine_01').GetName|l].#!"
 gakgung_archers_flavor: "#F Equipados com poderosos arcos recurvos e anéis de polegar para fortalecer o saque, esses arqueiros podem disparar flechas a uma distância incrível."
 pesilat_warriors_flavor: "#F Embora muitas vezes armados com um #italic kris#!, um #italic golok#! ou uma miríade de outras armas corpo a corpo, praticantes de silat também dominam o combate desarmado.#!"
 samurai_flavor: "#F Retentores #italic Bushi#! atendem às necessidades da nobreza e dos mais altos estratos da sociedade, armados com espada e protegidos por couro laqueado ou armadura metálica.#!"
 zhanmadao_infantry_flavor: "#F Equipados com enormes espadas de duas mãos, esses soldados são treinados para usar suas lâminas contra a cavalaria com uma impressionante variedade de estocadas, cortes e fintas.#!"
 black_armor_cavalry_flavor: "#F Uma unidade de guarda imperial de elite conhecida por sua escura armadura de ferro oxidado.#!"
 tiefutu_flavor: "#F Conhecidos como Pagodes de Ferro, esses cavaleiros pesadamente armados foram introduzidos na China pela dinastia jurchen Jin. Combinando perícia equestre com armadura pesada, são inimigos ferozes em qualquer campo de batalha.#!"
 burenjia_flavor: "#F Implantada em grande número, em formações cerradas, esta infantaria é a espinha dorsal dos exércitos imperiais. Composta por até 1000 placas lamelares, sua armadura pesada permite resistir a quase qualquer invasor.#!"
 rocket_carts_flavor: "#F Um punhado de homens pode atingir o inimigo com a força de cem arqueiros com uma única centelha, embora talvez valha a pena vigiar o tipo de homem disposto a lidar com esse tipo de engenho.#!"
 ordo_riders_horse_archers_flavor: "#F A estepe criou alguns guerreiros endurecidos, servindo seu cã e cobrando tributos de vários vizinhos. Esses cavaleiros, organizados em um Ordo, formam a espinha dorsal de qualquer força nômade de elite.#!"
 onager_flavor: "#F Essas pequenas catapultas de torção podem derrubar fortificações inimigas lançando projéteis de pedra a distância.#!"
 mangonel_flavor: "#F O mangonel de tração é mais fácil de operar do que o onagro e ainda oferece uma cadência de tiro maior.#!"
 trebuchet_flavor: "#F O trabuquete de contrapeso pode arremessar grandes projéteis com muito mais força do que mangonéis ou onagros.#!"
 bombard_flavor: "#F Não mais limitados por alavancas e roldanas, esses canhões podem abrir brechas em fortificações com facilidade.#!"
 ballista_flavor: "#F Grandes bestas montadas sobre uma plataforma com rodas, capazes de lançar virotes com ponta de aço a distâncias impressionantes.#!"
 cloud_ladder_flavor: "#F Uma escada dobrável articulada com um mecanismo simples de tração para se abrir quando estiver ao alcance das muralhas inimigas.#!"
 siege_tower_flavor: "#F Uma grande torre de madeira sobre rodas que pode ser empurrada até as muralhas inimigas, oferecendo mais proteção e estabilidade do que escadas de cerco.#!"
 cannon_flavor: "#F Armas relativamente pequenas, porém mortais, apoiadas na boca e fixadas ao solo para amortecer o recuo.#!"
 war_elephant_flavor: "#F Um elefante em carga é quase impossível de deter, tornando-os excelentes tropas de choque.#!"
 ballista_elephant_flavor: "#F Um elefante em carga já é alarmante; um elefante em carga com uma poderosa balista nas costas é suficiente para abalar até os mais endurecidos veteranos.#!"
 camel_rider_flavor: "#F Mais adequados ao combate no deserto do que a cavalaria tradicional, esses cavaleiros dominam as areias.#!"
 huscarl_flavor: "#F Huscarls germânicos dominam o uso de paredes de escudos para bloquear saraivadas de flechas.#!"
 landsknecht_flavor: "#F Landsknechts germânicos usam seus enormes zweihanders para dilacerar as fileiras compactas de lanceiros inimigos.#!"
 longbowmen_flavor: "#F Embora exijam uma vida inteira de treino para serem dominados, os longbows da Inglaterra e do País de Gales são poderosos o bastante para perfurar placas e disparar saraivadas em um ritmo quase sem igual.#!"
 goedendag_flavor: "#F O goedendag flamengo é um porrete com espigão que pode ser fincado contra cargas de cavalaria.#!"
 gendarme_flavor: "#F Gendarmes franceses são o ápice reluzente da cavalaria pesada, inspirando admiração pelo mundo inteiro.#!"
 chasseur_flavor: "#F Cavaleiros d'Outremer dominaram tanto a equitação europeia quanto as táticas desérticas levantinas.#!"
 picchieri_flavor: "#F As formações móveis usadas pelos Picchieri latinos os tornam mais mortais do que piqueiros tradicionais.#!"
 praetorian_flavor: "#F Os melhores entre os melhores, os Palatini são soldados romanos de elite que servem diretamente ao Imperador.#!"
 caballero_flavor: "#F Diferente da maioria da cavalaria, os Caballeros ibéricos se sentem à vontade tanto em planícies quanto em terrenos acidentados e montanhosos.#!"
 cataphract_flavor: "#F Blindados com cota de ferro, catáfratos gregos podem romper quase qualquer linha defensiva com sua carga.#!"
 monaspa_flavor: "#F Formada a partir do núcleo dos guarda-costas dos reis georgianos, a Monaspa é uma temível força de cavalaria pesada que se sente em casa no terreno ondulado do Cáucaso.#!"
 hobelar_flavor: "#F Rápidos e ágeis, hobelars celtas saqueiam com facilidade florestas e colinas que outras cavalarias evitam.#!"
 schiltron_flavor: "#F A incrível disciplina dos piqueiros escoceses lhes permite conter facilmente cargas inimigas, mesmo em planícies abertas.#!"
 metsanvartija_flavor: "#F Metsänvartija urálicos podem emboscar invasores com uma chuva de flechas antes de desaparecerem entre as árvores.#!"
 horse_archers_flavor: "#F Arqueiros a cavalo são usados por tribos nômades para desferir saraivadas de flechas enquanto permanecem quase impossíveis de capturar.#!"
 ayyar_flavor: "#F Jovens e entusiasmados, membros dos clubes de combate Ayyar servem como soldados aptos e voluntários, prontos para serem chamados a qualquer instante.#!"
 mubarizun_flavor: "#F Treinados tanto no combate em formação quanto no duelo individual, os Mubarizun árabes podem esmagar a maioria das outras infantarias em batalha.#!"
 druzhina_flavor: "#F Druzhina russos são guarda-costas habilidosos, dedicados a proteger seus aliados.#!"
 hussar_flavor: "#F Mestres em saque, a infame cavalaria leve $hussar$ do Leste Europeu pode dar cabo rapidamente de um exército inimigo em fuga.#!"
 horn_warrior_flavor: "#F Habituados à guerra montanhosa, guerreiros do Chifre da África não devem ser subestimados.#!"
 bush_hunter_flavor: "#F Esses arqueiros da África Ocidental usam o terreno difícil da mata a seu favor.#!"
 shomer_flavor: "#F Dedicados a proteger os seus, os shomer judeus são hábeis em cobrir seus companheiros em batalha.#!"
 khandayat_flavor: "#F Khandayats indianos são mestres espadachins capazes de abater com facilidade homens e cavalos.#!"
 garudas_flavor: "#F Guerreiros Garuda são famosos por sua lealdade e por lutar até a morte. Quando um guerreiro Garuda cai, espera-se que toda a sua comitiva de guerreiros Lenka morra com ele.#!"
 mountaineer_flavor: "#F Treinamento intenso em grande altitude faz dos soldados tibetanos os campeões incontestes de seu domínio.#!"
 sahel_horsemen_flavor: "#F Cavaleiros do Sahel são guerreiros montados que usam armadura acolchoada leve e dardos para devastar seus inimigos#!"
 guinea_warrior_flavor: "#F Guerreiros das terras altas da Guiné movem-se rápido, e seus dardos são precisos e mortais.#!"
 sarawit_flavor: "#F Os Sarawit formam um exército bem treinado e habituado às terras altas etíopes.#!"
 zbrojnosh_flavor: "#F Em casa nas colinas e florestas da Europa Central, os Zbrojnosh são temidos por toda parte.#!"
 abudrar_flavor: "#F Os montanheses Abudrar conhecem cada desfiladeiro e uádi de sua terra natal.#!"
 palace_guards_flavor: "#F Normalmente encarregados da guarda e da manutenção da paz, esses guerreiros versáteis podem formar a espinha dorsal de qualquer exército.#!"
 shenbigong_flavor: "#F Esses besteiros de elite portam o poderoso Shenbigong, o \"Arco de Braço Divino\". Cada virote disparado pode atravessar armaduras e formações com precisão inquietante.#!"
 mulaththamun_flavor: "#F Esses cavaleiros aperfeiçoaram suas habilidades ao longo de uma vida em estreita ligação com o deserto e cobrem o rosto com o véu Litham, protegendo-se da areia e do reconhecimento pelo inimigo.#!"
 archers_of_the_nile_flavor: "#F Há milhares de anos, os núbios protegem sua terra dominando o arco desde jovens, repelindo tanto os saqueadores do deserto ao redor quanto os invasores.#!"
 paiks_flavor: "#F Homens de infantaria têm sido o esteio dos exércitos indianos por séculos, e nenhuma arma é tão comum quanto o simples arco de bambu que muitos camponeses indianos praticam desde cedo na caça.#!"
 guanch_vaulter_flavor: "#F Armados com longas varas de salto, esses guerreiros ágeis conseguem se deslocar com facilidade por terrenos escarpados e montanhosos e até saltar sobre algumas fortificações.#!"
 teulu_flavor: "#F Juramentados por antigos votos, esses cavaleiros britônicos cavalgam como a fiel lança e escudo de seu senhor.#!"
 ayrudzi_flavor: "#F Rápidos no galope e hábeis no uso de terrenos difíceis, mas ainda protegidos por sólida armadura, esses nobres ferozes podem servir tanto como cavalaria de assédio quanto como uma formidável vanguarda.#!"
 conrois_flavor: "#F Esporeando com força e lanças baixadas, esses imprudentes cavaleiros normandos se atiram sobre qualquer fraqueza encontrada nas formações inimigas, ansiosos por arrancar a vitória por choque e terror.#!"
 akritai_flavor: "#F Veteranos recrutados do campo, defensores de passagens rochosas, que usam tempo preciso e conhecimento local para hostilizar até os maiores exércitos.#!"
 ballistrai_flavor: "#F Virotes do tamanho de lanças partem dessas máquinas de torção tanto contra povoações sitiadas quanto contra formações inimigas, causando medo e desordem.#!"
 skoutatoi_flavor: "#F Os altos escudos #EMP skouton#! que essa infantaria ergue contra o inimigo lhes dão o nome. Ainda assim, sua maior virtude em batalha é a disciplina, que lhes garante boa ordem tanto no avanço quanto na retirada.#!"
 varangian_guards_flavor: "#F Esses célebres mercenários germânicos portadores de machados são o núcleo inabalável da hoste imperial.\n\n@warning_icon! #X Reivindicarão parte do [gold|lE] após a morte do basileu.#!"
 handpicked_faithful_flavor: "#F Individualmente notáveis em valor, lealdade e talento, esses combatentes estão prontos para dar a vida para proteger seu líder.#!"
 emishi_horse_archers_flavor: "#F Forçados a se defender de ameaças mais fortes, os arqueiros a cavalo Emishi dominam táticas de bater e correr, saque e emboscadas.#!"
 japanese_horse_archers_flavor: "#F Adotando as técnicas dos Emishi do norte, mas usando armadura mais pesada, os samurais montam e, com yumi em mãos, castigam seus inimigos com flechas."
 warrior_monks_flavor: "#F Defendendo os fiéis e servindo seus patronos, esses monges têm em suas vidas devotas bastante tempo para treinar e convicções muito fortes.#!"
 pikemen_militia_flavor: "#F Prontos para lutar por sua terra e dignidade. Levados ao limite do desespero, eles mirarão qualquer senhor nobre para tomar o que lhes é devido.#!"
 #Religious MaA
 teutonic_knights: "Cavaleiros da Ordem"
 teutonic_knights_flavor: "#F Cavaleiros pesadamente armados e zelosos, especializados em batalhas contra infantaria agrupada, além de suas cargas de cavalaria pesada.#!"
 skirmishers_lowercase: "escaramuçadores"
 light_cavalry_lowercase: "cavaleiros leves"
 heavy_cavalry_lowercase: "cavaleiros pesados"
 archers_lowercase: "arqueiros"
 pikemen_lowercase: "piqueiros"
 heavy_infantry_lowercase: "infantaria blindada"
 elephant_cavalry_lowercase: "elefantes de guerra"
 camel_cavalry_lowercase: "cavalaria de camelos"
 horse_archers_lowercase: "arqueiros a cavalo"
 levies_lowercase: "recrutas"
 gunpowder_lowercase: "arcabuzeiros"
 #Accolade MaA
 accolade_maa_archers: "Arqueiros da Retinua"
 accolade_maa_archers_flavor: "[retinue_maa|E]\n#F Esses arqueiros de elite não são ralé de caçadores furtivos: são treinados sem descanso para chover flechas com precisão e grande velocidade.#!"
 accolade_maa_skirmishers: "Escaramuçadores da Retinua"
 accolade_maa_skirmishers_flavor: "[retinue_maa|E]\n#F Uma mistura de guerreiros de elite com equipamento leve e saqueadores mercenários experientes, temidos por sua habilidade em emboscadas e guerra não convencional.#!"
 accolade_maa_pikes: "Piqueiros da Retinua"
 accolade_maa_pikes_flavor: "[retinue_maa|E]\n#F Revestidos com belas armaduras e empunhando longos piques, esses infantes formam o núcleo inquebrável do exército de seu suserano.#!"
 accolade_maa_outriders: "Batedores da Retinua"
 accolade_maa_outriders_flavor: "[retinue_maa|E]\n#F Montados em cavalos velozes, esses cavaleiros de elite podem ultrapassar qualquer inimigo e atacar sempre onde menos se espera e onde serão menos bem-vindos.#!"
 accolade_maa_vanguards: "Vanguarda da Retinua"
 accolade_maa_vanguards_flavor: "[retinue_maa|E]\n#F Colocados com honra no auge da luta, esses disciplinados e resplandecentes soldados de infantaria pesada são uma força que poucos inimigos podem suportar.#!"
 accolade_maa_lancers: "Lanceiros da Retinua"
 accolade_maa_lancers_flavor: "[retinue_maa|E]\n#F Investindo no fragor da batalha com estrondo trovejante e verdadeira nobreza, as fileiras serradas desses cavaleiros inspiram terrível espanto em qualquer campo de batalha.#!"
 accolade_maa_crossbowers: "Besteiros da Retinua"
 accolade_maa_crossbowers_flavor: "[retinue_maa|E]\n#F Cavaleiro ou canalha: qualquer um pode ser perfurado pelos virotes de ferro cuidadosamente colocados desses experientes besteiros.#!"
 accolade_maa_cameliers: "Cavaleiros de Camelo da Retinua"
 accolade_maa_cameliers_flavor: "[retinue_maa|E]\n#F Temidos em todo o Oriente Médio e Norte da África, o mundo conhece poucos camelaristas tão hábeis.#!"
 accolade_maa_elephantiers: "Elefantes de Guerra da Retinua"
 accolade_maa_elephantiers_flavor: "[retinue_maa|E]\n#F De imponentes howdahs, os habilidosos cornacas dessas feras provam que a única coisa mais difícil de parar do que um elefante em carga é outro elefante, #EMP maior#!.#!"
 accolade_maa_horse_archers: "Arqueiros a Cavalo da Retinua"
 accolade_maa_horse_archers_flavor: "[retinue_maa|E]\n#F Cavaleiros comuns da estepe possuem uma vida inteira de habilidade; esses veteranos, ainda mais. Enfrentá-los é dor; persegui-los é morte.#!"
 accolade_maa_handgunners: "Arcabuzeiros da Retinua"
 accolade_maa_handgunners_flavor: "[retinue_maa|E]\n#F Avançando firmemente pela fumaça da pólvora, esses arcabuzeiros altamente treinados podem despedaçar as fileiras inimigas com suas armas magistralmente feitas.#!"
 #MPO
 nomadic_riders: "Cavaleiros da Horda"
 nomadic_riders_flavor: "#F Nascidos na sela, $nomadic_riders$ são treinados desde o nascimento para cavalgar rumo à batalha.#!"
 kheshig: "Kheshig"
 kheshig_flavor: "#F A guarda de elite de um governante nômade, o $kheshig$ garante a segurança de seu suserano dia e noite. A #EMP khorchin#!, sua divisão de batalha, estende essa guarda ao campo de batalha.#!"
 nomadic_horde: "[horde|E]"
 steppe_raiders: "Saqueadores da Estepe"
 steppe_raiders_flavor: "#F Embora equipados como batedores, esses cavaleiros raramente hesitam em investir contra inimigos isolados e espalhar violência rápida sobre os desavisados.#!"
 torch_bearers: "Portadores de Tocha"
 torch_bearers_flavor: "#F Na vasta estepe, não há necessidade de torres de cerco ou catapultas; basta uma tocha acesa e um cavalo veloz para incendiar cada iurte.#!"
 heavy_horse_archers: "Arqueiros Pesados a Cavalo"
 heavy_horse_archers_flavor: "#F Cavaleiros blindados portando arcos potentes. Como cada um conduz uma fileira de bons cavalos, esses nômades podem lutar sem descanso em campo aberto.#!"
 nomad_lancers: "Lanceiros Nômades"
 nomad_lancers_flavor: "#F Lanças com gancho e estandartes de crina se erguem acima desta brilhante linha de batalha de feroz cavalaria nômade de elite.#!"
 mangudai: "Mangudai"
 mangudai_flavor: "#F Destemidos cavaleiros voluntários, \"os já mortos\", são os primeiros a colidir com o inimigo e, por sua ruína, arrastam o adversário a uma desordem imprudente.#!"
 cataphract_archers: "Arqueiros Catáfratos"
 cataphract_archers_flavor: "#F Flechas e lâminas ricocheteiam sem efeito nas cotas lamelares desses cavaleiros e de seus corcéis. Enquanto isso, seus arcos espalham morte e miséria.#!"
 maturkan_warriors: "Guerreiros Maturkan"
 maturkan_warriors_flavor: "#F Esses príncipes da guerra são os defensores da fria taiga e lutam bem onde cavalos e partidas de saque mal conseguem avançar.#!"
