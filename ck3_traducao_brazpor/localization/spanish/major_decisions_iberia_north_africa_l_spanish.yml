l_spanish:
 iberia_north_africa.0005.t: "Uma Espanha Unida"
 iberia_north_africa.0005.desc: "Mais uma vez, os tronos da Espanha foram unidos sob um[ROOT.Char.Custom('ES_XA')] sol[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]. Os falsos monarcas foram destronados, enquanto orgulhos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetPrimaryTitle.GetNameNoTier] permanece mais forte do que nunca.\n\nUm dia deixarei este mundo para ir ao [ROOT.Char.GetFaith.DivineRealm], mas meu legado permanecerá na Terra para sempre. Me chamarão \"[ROOT.Char.GetTitledFirstNameNoTooltip|l], [ROOT.Char.GetMotherFather|U] de Espanha\"."
 iberia_north_africa.0005.a: "Este é o alvorecer de uma nova era."
 iberia_north_africa.0006.start.desc: "Um após o outro, os reinos espanhóis caíram sob o domínio de [spain_uniter.GetPrimaryTitle.GetNameNoTier]."
 iberia_north_africa.0006.relation_former.desc: "Meu(minha) [ROOT.Char.Custom2('RelationToMe', spain_uniter)] [spain_uniter.GetTitledFirstName|l]"
 iberia_north_africa.0006.former.desc: "[spain_uniter.GetTitledFirstName]"
 iberia_north_africa.0006.end.desc: "se proclamou \"[spain_uniter.GetMotherFather|U] da Espanha\".\n\nSeu nome certamente perdurará por séculos, mas será lembrado como herói ou tirano? Só [ROOT.Char.GetFaith.FateGodName] sabe."
 iberia_north_africa.0010.t: "Uma África"
 iberia_north_africa.0010.start.desc: "Ninguém achava que isso pudesse ser feito, e ainda assim aqui estou eu, o(a) [ROOT.Char.GetTitleAsNameNoTooltip] de toda a África."
 iberia_north_africa.0010.vassals.desc: "Da costa atlântica ao Oceano Oriental, toda tribo, [vassal_1.GetTitleAsNameNoTooltip] e [vassal_2.GetTitleAsNameNoTooltip] agora se curva diante de mim."
 iberia_north_africa.0010.spirits.desc: "\n\nOs [africa_uniter.Custom('DefaultPriestTitlePlural')] me dizem que os espíritos estão satisfeitos. Enfim, nossas terras estão libertadas! Ainda resta trabalho a fazer, mas hoje vamos celebrar!"
 iberia_north_africa.0010.ancestors.desc: "\n\nOs [africa_uniter.Custom('DefaultPriestTitlePlural')] me dizem que os Ancestrais estão satisfeitos. Enfim, nossas terras estão libertadas! Ainda resta trabalho a fazer, mas hoje vamos celebrar!"
 iberia_north_africa.0010.generic.desc: "\n\nMeus súditos vêm de todas as origens, mas eu nos unirei e forjarei um novo caminho. A partir deste dia, somos um só povo sob [ROOT.Char.GetFaith.HighGodName]."
 iberia_north_africa.0010.a: "Glória à África!"
 iberia_north_africa.0011.start.desc: "Todos os povos da África, da menor tribo ao maior monarca, agora estão sob o domínio de [africa_uniter.GetPrimaryTitle.GetNameNoTier]."
 iberia_north_africa.0011.relation_former.desc: "Meu(minha) [ROOT.Char.Custom2('RelationToMe', africa_uniter)] [africa_uniter.GetTitledFirstName|l]"
 iberia_north_africa.0011.former.desc: "[africa_uniter.GetTitledFirstName]"
 iberia_north_africa.0011.end.desc: "uniu todos eles sob a bandeira [africa_uniter.GetFaith.GetAdjective].\n\nSerá que um [africa_uniter.GetPrimaryTitle.GetTierAsNameNoTooltip] tão vasto resistirá ao teste do tempo, ou essa união acabará se desfazendo? Só [ROOT.Char.GetFaith.FateGodName] sabe."
 decision_unite_africa_confirm: "Unir a África"
 iberia_north_africa.0015.t: "Vingando os Mártires"
 iberia_north_africa.0015.part1.desc: "Milhares e milhares de bravos muçulmanos morreram na estrada para Tours, no Caminho dos Mártires. Lutavam por um futuro melhor, uma nova era de ouro para os verdadeiros crentes. Hoje, esse futuro finalmente chegou."
 iberia_north_africa.0015.part2.desc: "\n\nCom uma posição firme na Europa, minha gloriosa conquista está apenas começando..."
 iberia_north_africa.0015.a: "Allahu akbar."
 iberia_north_africa.0016.t: "Ecos do Passado"
 iberia_north_africa.0016.relation_former.desc: "\n\nMeu [ROOT.Char.Custom2('RelationToMe', avenger)] [avenger.GetTitledFirstName|l]"
 iberia_north_africa.0016.former.desc: "\n\n[avenger.GetTitledFirstName]"
 iberia_north_africa.0015.islam.desc: "conduziu suas tropas até o coração do antigo reino franco e esmagou toda oposição. Com essa posição firme na Europa, o futuro do islamismo parece mais brilhante do que nunca."
 iberia_north_africa.0016.christianity.a: "Que o Senhor tenha misericórdia de nossas almas."
 iberia_north_africa.0016.generic.desc: "Há muitos anos, no caminho para Tours, as forças francas cristãs puseram fim à invasão omíada da Europa. Carlos Martel e seus homens mudaram o curso da história.\n\nMas nada dura para sempre. [avenger.GetName] marchou com suas tropas até o coração do antigo reino franco e o reivindicou como seu. Com essa posição firme na Europa, só [ROOT.Char.GetFaith.FateGodName] sabe o que [avenger.GetTitledFirstNameNoTooltip|l]…"
 iberia_north_africa.0001.t: "O Reino de Portugal"
 iberia_north_africa.0001.start.desc: "Este dia será lembrado para sempre como o alvorecer do grande Reino de Portugal."
 iberia_north_africa.0001.christian.desc: "Nosso povo sofreu sob domínio muçulmano por séculos, mas não mais. Enfim, por meio de gloriosa conquista em nome de [ROOT.Char.GetFaith.WarGodName], somos uma nação [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] livre!\n\n"
 iberia_north_africa.0001.muslim.desc: "Pela força de [ROOT.Char.GetFaith.WarGodName], conquistamos estas terras e agora podemos chamar com orgulho a costa ocidental da Península Ibérica de nosso lar. Que os [ROOT.Char.GetFaith.GetAdjective] prosperem aqui por muitos anos!\n\n"
 iberia_north_africa.0001.end.desc: "Ao longo dos milênios, muitas civilizações governaram estas terras. Todas contribuíram para a complexa teia que é nosso patrimônio cultural. Hoje temos nossa própria identidade única e, ao formar este novo reino, orgulhosamente nos chamamos portugueses!"
 iberia_north_africa.0001.a: "Agora nosso tempo começa!"
 iberia_north_africa.0002.start.desc: "Uma nova era chegou à Península Ibérica!"
 iberia_north_africa.0002.relation_former.desc: "Meu(minha) [ROOT.Char.Custom2('RelationToMe', portugal_former)] [portugal_former.GetTitledFirstName|l]"
 iberia_north_africa.0002.former.desc: "[portugal_former.GetTitledFirstName]"
 iberia_north_africa.0002.end.desc: "formou o Reino de Portugal em sua costa ocidental. Após séculos de migrações e guerras, formou-se um orgulhoso povo português, com [portugal_former.GetTitledFirstNameNoTooltip|l] como líder.\n\nEsta jovem nação ascenderá à glória ou será consumida em outra conquista? Só o tempo dirá."
 iberia_north_africa.0002.a1: "Glória a [ROOT.Char.GetFaith.WarGodName]!"
 name_alas: "Ah."
 name_i_see: "Entendo."
 iberia_north_africa.0002.b: "[ROOT.Char.GetFaith.WarGodName] abençoe Portugal!"
 iberia_north_africa.0002.c: "Ainda sou [ROOT.Char.GetCulture.GetNameNoTooltip], não importa o que pensem."
 iberia_north_africa.9101.t: "O Reino das Canárias"
 iberia_north_africa.9101.desc.intro: "Desde tempos imemoriais, cada uma das ilhas chamava a si mesma de “reino”, mas agora, com todas as ilhas sob o diligente governo de [canarias_former.GetTitledFirstName|l], chegou a hora de unir todas as coroas em uma só.\n\n"
 iberia_north_africa.9101.desc.iberian: "Com a derrota final dos reis guanches pagãos, pouco resta que possa impedir a propagação do [canarias_former.GetFaith.GetName|l] entre os habitantes das ilhas e solidificar o reinado de [canarias_former.GetTitledFirstNameNoTooltip|l] sobre o arquipélago. [title_k_canarias.GetNameNoTierNoTooltip] foi proclamado [title_k_canarias.GetTierAsNameNoTooltip] como [canarias_former.GetName] primeiro[canarias_former.Custom('ES_XA')] [canarias_former.GetTitleAsNameNoTooltip]!"
 iberia_north_africa.9101.desc.guanche: "Com o horizonte se ampliando e se desdobrando diante de nós, vemos erguerem-se grandes reinos, muito maiores que o nosso. Se queremos resistir aos invasores estrangeiros, devemos forjar o nosso próprio destino e a nossa própria coroa. Com a coroação de [canarias_former.GetName] como primeiro[canarias_former.Custom('ES_XA')] [canarias_former.GetTitleAsNameNoTooltip] de [title_k_canarias.GetNameNoTierNoTooltip], os habitantes do arquipélago têm enfim um símbolo que os une e o objetivo comum de preservar o nosso modo de vida."
 iberia_north_africa.9101.desc.outro: "\n\nO futuro de [title_k_canarias.GetNameNoTierNoTooltip] ainda permanece incerto, mas a declaração de um(a) novo(a) [title_k_canarias.GetTierAsNameNoTooltip] sem dúvida inaugurará uma era inteiramente nova para as ilhas e para o futuro do Norte da África."
 iberia_north_africa.9101.a: "Nasce um novo Reino!"
 iberia_north_africa.9101.b: "O futuro de [title_k_canarias.GetNameNoTierNoTooltip] está na Ibéria!"
 iberia_north_africa.0101.t: "Lealdade ao Trono de São Pedro"
 iberia_north_africa.0101.desc: "Não tem sido tarefa fácil, mas minha família acumulou terra e autoridade espiritual suficientes [religious_leader.GetFaith.GetAdjective] para ser capaz de convocar um conclave de nossos clérigos de mais alto escalão. Por fim, nosso sangue, suor e trabalho deram frutos por completo.\n\nOs [religious_leader.GetFaith.PriestNeuterPlural] reunidos em [religious_leader.GetCapitalLocation.GetTitle.GetBaseNameNoTier] discutem ansiosamente sobre política, lotando os salões e corredores da minha fortaleza com dezenas de propostas e a ocasional briga de socos motivada pela teologia. Sabemos que queremos permanecer unidos a Roma e [pope.GetTitledFirstName|l], mas concordamos em pouco mais do que isso.\n\nApós semanas de impasse, cabe a mim, como anfitri[ROOT.Char.Custom('ES_OnOna')] e seu [religious_leader.GetTitleAsNameNoTooltip], arbitrar."
 iberia_north_africa.0101.a: "Um povo, uma fé!"
 iberia_north_africa.0101.a.tt: "Você defende uma via mais $doctrine_pluralism_righteous_name$"
 iberia_north_africa.0101.b: "Nós #EMP não podemos#! ter medo de tomar o poder para defender os nossos."
 iberia_north_africa.0101.b.tt: "Você defende uma via mais $doctrine_pluralism_fundamentalist_name$"
 iberia_north_africa.0101.c: "O [religious_leader.GetFaith.ReligiousText] ainda precisará de interpretação..."
 iberia_north_africa.0101.c.tt: "Você defende uma via ainda mais $doctrine_pluralism_pluralistic_name$"
 iberia_north_africa.0102.t: "$iberia_north_africa.0101.t$ [religious_leader.GetFaith.GetAdjectiveNoTooltip]"
 iberia_north_africa.0102.desc.intro: "Depois de uma vida inteira acumulando autoridade religiosa e política, [religious_leader.GetTitledFirstName|l] conseguiu reunir um grande conclave de ministros [religious_leader.GetFaith.GetAdherentNamePlural] em sua capital de [religious_leader.GetCapitalLocation.GetTitle.GetBaseNameNoTier] para discutir o futuro da fé.\n\nApós semanas de debates acalorados, o clero reunido optou por reafirmar sua lealdade [pope.Custom('ES_AlAla')] [pope.GetTitledFirstName|l], embora com alguns… #EMP retoques#! à política eclesiástica.\n\nEssas melhorias se concentram principalmente em"
 iberia_north_africa.0102.desc.fundamentalist: "agravos percebidos sofridos pelos fiéis e em como tais injustiças só podem ser evitadas estabelecendo poder temporal por todos os meios disponíveis."
 iberia_north_africa.0102.desc.righteous: "voltar o olhar para dentro, garantindo homogeneidade religiosa entre as principais culturas que seguem a Igreja."
 iberia_north_africa.0102.desc.pluralist: "estabelecer costumes e práticas rigorosas para o estudo do [religious_leader.GetFaith.ReligiousText], bem como métodos formais para desafiar sua compreensão."
 iberia_north_africa.0102.a.same_faith: "Precisamos nos defender!"
 iberia_north_africa.0102.a.same_religion: "Eles definem #EMP n?s#! como uma amea?a?"
 iberia_north_africa.0102.a.misc: "Que fanáticos preocupantes!"
 iberia_north_africa.0102.b.same_faith: "Uma fé para nós!"
 iberia_north_africa.0102.b.same_religion: "Como são ensimesmados..."
 iberia_north_africa.0102.b.misc: "Desde que fiquem no canto deles."
 iberia_north_africa.0102.c.same_faith: "O estudo rigoroso do [religious_leader.GetFaith.ReligiousText] beneficia a todos."
 iberia_north_africa.0102.c.same_religion: "Que inutilidade; estudar tanto estando tão errados..."
 iberia_north_africa.0102.c.misc: "A solução deles para o desvio doutrinário é implicar com a própria doutrina?"
 iberia_north_africa.0111.t: "Liberdade das Correntes de Roma"
 iberia_north_africa.0111.desc: "Levei anos para construir a unidade política e espiritual necessária para reunir este conclave, mas finalmente reuni sob meus estandartes campesinos e clérigos suficientes para repudiar de forma significativa [pope.Custom('ES_AlAla')] falso[pope.Custom('ES_OA')] [pope.GetTitledFirstName|l].\n\nMesmo agora, os corredores e os aposentos de [religious_leader.GetCapitalLocation.GetTitle.GetBaseNameNoTier] estão abarrotados de clérigos discutidores e bispos apaixonados; todo frade ofendido e [religious_leader.GetFaith.PriestNeuter] mesquinho que Roma já desprezou em algum momento entulham meus corredores.\n\nToda essa discussão é crucial para a legitimidade, mas, no fim das contas, como governante proeminente da fé [religious_leader.GetFaith.GetAdjective] preeminente, #EMP mi#! palavra será o voto decisivo final."
 iberia_north_africa.0111.a: "O Filho de Deus ensinou a paz, e nós a seguiremos."
 iberia_north_africa.0111.a.tt: "$iberia_north_africa.0101.a.tt$"
 iberia_north_africa.0111.b: "Mesmo sem Roma, conhecemos o valor de defender os nossos!"
 iberia_north_africa.0111.b.tt: "$iberia_north_africa.0101.b.tt$"
 iberia_north_africa.0111.c: "O Islã também não é uma religião do Livro?"
 iberia_north_africa.0111.c.tt: "$iberia_north_africa.0101.c.tt$"
 mozarabic_break_with_rome_decision.tt.you_gain_a_hof: "Um novo [title|lE] de [head_of_faith|lE] da mesma [faith|lE] é criado para [religious_leader.GetFaith.GetName|l]"
 mozarabic_break_with_rome_decision.tt.new_hof_id: "[new_religious_head.GetTitledFirstName] é seu novo[new_religious_head.Custom('ES_OA')] [head_of_faith|lE]"
 iberia_north_africa.0112.t: "A Igreja [religious_leader.GetFaith.GetAdjectiveNoTooltip] Cisma de [pope.GetFaith.GetNameNoTooltip]"
 iberia_north_africa.0112.desc.intro: "Com grande esforço, [religious_leader.GetTitledFirstName|l] realizou enfim a obra de sua vida ao reunir autoridade política e espiritual suficiente para unir a Igreja [religious_leader.GetFaith.GetAdjective] em busca de um único objetivo: romper com os ditames de [pope.GetTitledFirstName|l].\n\nO concílio eclesiástico que o acompanhou foi explosivo em sua discussão sobre como preencher o vazio deixado pelo domínio de Roma, com relatos de que alguns clérigos chegaram a brigar abertamente nos salões de [religious_leader.GetCapitalLocation.GetTitle.GetBaseNameNoTier].\n\nA intercessão [religious_leader.Custom('ES_DelDela')] [religious_leader.GetTitledFirstNameNoTooltip|l] é a única coisa que rompeu o impasse, optando por se concentrar em"
 iberia_north_africa.0112.desc.fundamentalist: "assumir a responsabilidade de proteção das peregrinações aos locais sagrados [religious_leader.GetFaith.GetAdherentNamePluralNoTooltip] pela força das armas."
 iberia_north_africa.0112.desc.righteous: "recuar do que [religious_leader.GetSheHe] vê como a violência pecaminosa que tanto contaminou o [religious_leader.GetFaith.GetReligion.GetName|l].\n\nSegundo [religious_leader.GetSheHe], os [religious_leader.GetFaith.GetAdherentNamePluralNoTooltip] devem se concentrar na piedade de simplesmente viver uma boa vida, em vez de tentar pavimentar o caminho para o [religious_leader.GetFaith.PositiveAfterLife] com o sangue dos infiéis."
 iberia_north_africa.0112.desc.pluralist: "afrouxar restrições e proibições que dificultam uma acomodação mais fácil com seus vizinhos muçulmanos, defendendo uma abordagem ecumênica para as relações inter-religiosas."
 iberia_north_africa.0112.a.same_faith: "Por [religious_leader.GetFaith.HighGodName] e por nosso direito!"
 iberia_north_africa.0112.a.same_religion: "É melhor que não tranquem #EMP nossos#! lugares sagrados."
 iberia_north_africa.0112.a.misc: "Parece que estão discutindo detalhes mínimos..."
 iberia_north_africa.0112.b.same_faith: "Poder por meio da paz!"
 #^Kane lives in Death!
 iberia_north_africa.0112.b.same_religion: "Suponho que se achem melhores do que nós..."
 iberia_north_africa.0112.b.misc: "Quero ver como #EMP isso#! vai funcionar para eles..."
 iberia_north_africa.0112.c.same_faith: "Temos muito mais em comum do que diferenças."
 iberia_north_africa.0112.c.same_religion: "Preocupante..."
 iberia_north_africa.0112.c.islam: "Espero que este seja o primeiro passo rumo à verdadeira conversão..."
 iberia_north_africa.0112.c.misc: "Seria então uma fé híbrida?"
 iberia_north_africa.0121.t: "Um Retorno ao Campo"
 iberia_north_africa.0121.desc.intro: "Não é segredo que eu tive... problemas com minha fé [old_faith.GetAdjective]."
 iberia_north_africa.0121.desc.excommunicated: "A excomunhão tem sido difícil para mim, sobrecarregando injustamente minha alma e causando uma infinidade de conflitos com os outros [old_faith.GetAdherentNamePluralNoTooltip] em minha vida."
 iberia_north_africa.0121.desc.rivalry_with_hof: "Discussões constantes com [old_faith.GetReligiousHead.GetTitledFirstName|l], [old_faith.GetReligiousHead.GetSheHe] #EMP debería#! estar acima de uma mesquinha disputa temporal, me deixaram desiludido."
 iberia_north_africa.0121.desc.negative_piety_level: "Meus atos me marcaram como pecador[ROOT.Char.Custom('ES_XA')], alguém cuja fé parece se contentar em desviar-se do caminho espiritual, e não há como negar o quanto isso me isolou."
 iberia_north_africa.0121.desc.lorgar: "Por mais que o fogo de minha crença arda tão intensamente quanto o Sol, não consigo afastar a sensação de que deve haver algo #EMP mais#! no universo do que apenas [old_faith.HighGodName]. Alguma verdade mais primordial."
 iberia_north_africa.0121.desc.sinful_traits: "Parece que cada um dos meus atos, cada um dos meus pensamentos, a própria maneira como vivo minha vida, é marcada como inerentemente pecaminosa."
 iberia_north_africa.0121.desc.virtuous_basque_pagan_traits: "Às vezes me pergunto como um dia pude amá-la, quando toda a minha personalidade parece #EMP feita#! para algo diferente."
 iberia_north_africa.0121.desc.naked_cynicism: "Acho isso desinteressante e, pior, totalmente submetido a poderes sobre os quais tenho pouco ou nenhum controle."
 iberia_north_africa.0121.desc.outro: "\n\nPor fim, acho que encontrei consolo em [basque_faith.GetName|l]. Os sincréticos rurais desta seita menor não têm nenhum julgamento para mim, apenas uma empolgação vertiginosa diante da perspectiva de se tornarem algo mais do que guardiões da tradição local.\n\nUm entusiasmo que talvez os deixe abertos a… sugestões"
 iberia_north_africa.0121.a: "O [basque_faith.GetNameNoTooltip|l] voltará a ser uma fé de guerreiros!"
 iberia_north_africa.0121.a.tt: "Você defende uma via mais $doctrine_pluralism_fundamentalist_name$"
 iberia_north_africa.0121.b: "Harmonia com a natureza é melhor do que harmonia com os vizinhos."
 iberia_north_africa.0121.b.tt: "Você defende uma via mais $doctrine_pluralism_righteous_name$"
 iberia_north_africa.0121.c: "Há religiões mais dignas com as quais compartilhar tradições."
 iberia_north_africa.0121.c.tt: "Você defende uma via diferente de $doctrine_pluralism_pluralistic_name$"
 iberia_north_africa.0121.d: "Se eu tentar mudá-los à força, serei menos corrupt[ROOT.Char.Custom('ES_OA')] que o [old_faith.GetNameNoTooltip|l]?"
 iberia_north_africa.0121.d.tt: "Você deixa a fé como a encontrou"
 iberia_north_africa.0122.t: "$iberia_north_africa.0121.t$"
 iberia_north_africa.0122.desc.intro: "Parece que [religious_leader.GetTitledFirstName|l] e"
 iberia_north_africa.0122.desc.excommunicated: "a excomunhão de [old_faith.GetName|l] tornou-se finalmente pesada demais para [religious_leader.GetSheHe]."
 iberia_north_africa.0122.desc.rivalry_with_hof: "rivalidade com [old_faith.GetReligiousHead.GetTitledFirstName|l] finalmente alcançou um inevitável ponto de ebulição."
 iberia_north_africa.0122.desc.negative_piety_level: "suas transgressões anteriores contra o [old_faith.GetName|l] serão ofuscadas pelas próximas."
 iberia_north_africa.0122.desc.lorgar: "sede por algo mais... #EMP primordial#! em que acreditar se tornou forte demais, conduzindo [religious_leader.GetHerHim] pela senda da heresia."
 iberia_north_africa.0122.desc.sinful_traits: "os caminhos pecaminosos enfim triunfaram totalmente sobre a sua fé [old_faith.GetAdjective]."
 iberia_north_africa.0122.desc.virtuous_basque_pagan_traits: "lenta sedução pelas virtudes da vida rural está, enfim, completa."
 iberia_north_africa.0122.desc.naked_cynicism: "seu desejo flagrante de ter um maior controle sobre a vida espiritual de seu reino está completamente fora de controle."
 iberia_north_africa.0122.desc.midtro: "\n\nEm um acesso de algo que certamente beira a loucura, [religious_leader.GetTitleAsNameNoTooltip|U] elevou uma obscura religião popular sincrética dos Pireneus, o [basque_faith.GetName|l] como a nova religião principal de [religious_leader.GetPrimaryTitle.GetNameNoTier].\n\n"
 iberia_north_africa.0122.desc.fundamentalist: "Embora originalmente pacíficos, [religious_leader.GetTitledFirstNameNoTooltip|l] incitou a seita emergente a um frenesi furioso, prometendo-lhes uma recompensa de guerreiro em saque e pilhagem se apoiarem sua campanha fundamentalista."
 iberia_north_africa.0122.desc.righteous: "Ao querer afastar sua pequena seita do cristianismo, [religious_leader.GetTitledFirstNameNoTooltip|l] está promovendo um retorno ao que considera as partes mais comprovadamente pagãs de seus mitos."
 iberia_north_africa.0122.desc.pluralist: "Embora a seita tenha passado séculos absorvendo elementos do cristianismo, [religious_leader.GetTitledFirstNameNoTooltip|l] usa sua considerável influência para introduzir elementos concorrentes do Islã, apagando, substituindo e atualizando os rituais nazarenos onde pode."
 iberia_north_africa.0122.desc.unchanged: "Essencialmente inalterada em sua obscuridade apesar da súbita explosão de atenção teológica, a seita professa uma combinação de dogma cristão adotado e mitologia tradicional vascônica."
 iberia_north_africa.0122.a: "Sabe de uma coisa? Acho que [religious_leader.GetSheHe] tem razão..."
 iberia_north_africa.0122.b.same_faith: "Isto é pura heresia!"
 iberia_north_africa.0122.b.same_religion: "Isso só pode terminar em aniquilação"
 iberia_north_africa.0122.b.respects_fellow_warmongers: "Pelo menos eles não têm medo de uma boa briga."
 iberia_north_africa.0122.b.misc: "Desde que lutem bem longe."
 iberia_north_africa.0122.c.same_faith: "[religious_leader.GetFirstNameNoTooltip] abandonou [old_faith.HighGodName] por alguns bosques apodrecidos?!"
 iberia_north_africa.0122.c.same_religion: "[religious_leader.GetFirstNameNoTooltip] pensa que é #EMP melhor#! do que nós?"
 iberia_north_africa.0122.c.believes_in_harmony_with_nature: "Pelo menos eles compreendem a maravilha da natureza."
 iberia_north_africa.0122.c.misc: "Então eles falam pelas árvores?"
 iberia_north_africa.0122.d.muslim: "Ao menos os [basque_faith.GetAdherentNamePluralNoTooltip] se aproximam de [islam_religion.GetNameNoTooltip|l]."
 iberia_north_africa.0122.d.same_faith: "Eles nos abandonaram em dobro!"
 iberia_north_africa.0122.d.same_religion: "Ultrajante!"
 iberia_north_africa.0122.d.syncretised_with_islam: "Ao menos eles não abandonaram totalmente a razão."
 iberia_north_africa.0122.d.misc: "Eh, não é meu festival, não são meus ursos dançantes."
 iberia_north_africa.0122.e.same_faith: "Então #EMP isto#! é a medida da tolerância."
 iberia_north_africa.0122.e.same_religion: "Preocupante..."
 iberia_north_africa.0122.e.syncretised_with_christianity: "$iberia_north_africa.0122.d.syncretised_with_islam$"
 iberia_north_africa.0122.e.misc: "Parece uma mudança bastante banal, sinceramente."
 iberia_north_africa.0131.t: "Filhos do Ebro"
 iberia_north_africa.0131.desc.intro: "Com a criação de [k_aragon.GetDefinitiveName], desencadeei uma florescente expansão da cultura [aragonese_culture.GetName] nas vilas e cidades do meu reino. Não apenas em nossas terras centrais de $d_aragon$, mas também em"
 iberia_north_africa.0131.desc.duchy.one: "[duchy_a.GetBaseNameNoTier]"
 iberia_north_africa.0131.desc.duchy.two: "[duchy_a.GetBaseNameNoTier] e [duchy_b.GetBaseNameNoTier]"
 iberia_north_africa.0131.desc.duchy.three: "[duchy_a.GetBaseNameNoTier], [duchy_b.GetBaseNameNoTier] e [duchy_c.GetBaseNameNoTier]"
 iberia_north_africa.0131.desc.outro: "espalhando a influência de meu novo povo por toda parte.\n\nE ainda assim… não consigo evitar sentir falta de alguns costumes da cultura [founder_culture.GetName]. Pode ser que seu tempo no centro de minha vida tenha acabado, mas, com minha influência e posição, ele não precisa desaparecer por completo."
 #We can't use a script value here since we're using a while loop for the count, and they don't _currently_ support scripted values.
 form_the_kingdom_of_aragon_decision.tt.x_random_counties_in_d_aragon: "3 [counties|lE] aleatórios em $d_aragon$:"
 iberia_north_africa.0131.a: "Este povo é o meu povo, e isso basta."
 iberia_north_africa.0131.b: "Nem todos os traços da cultura [founder_culture.GetNameNoTooltip] são tão ruins..."
 iberia_north_africa.0131.c: "O que realmente importa para nós não mudou."
 iberia_north_africa.0131.d: "Não importa como o mundo gire, não podemos esquecer nossas raízes!"
 iberia_north_africa.2105.t: "Governantes do Mediterrâneo"
 iberia_north_africa.2105.desc: "Com a tomada de [mallorca.GetNameNoTier], [sardinas.GetNameNoTier] e [sicily.GetNameNoTier], nos declaramos os governantes legítimos do Mar Mediterrâneo. Enviados navegaram até os quatro cantos da terra e notificaram governantes menores sobre nossa gloriosa conquista.\n\nEste mar, e tudo o que ele toca, pertence a nós!"
 iberia_north_africa.2105.a: "Ninguém pode se opor a nós!"
 iberia_north_africa.fp2_golden_age_generic_title_intro: "Ciência da Era de Ouro:"
 iberia_north_africa.2001.t: "$iberia_north_africa.fp2_golden_age_generic_title_intro$ Conhecimento Perdido"
 iberia_north_africa.2001.desc: "Um[generated_actor.Custom('ES_XA')] afamad[generated_actor.Custom('ES_OA')] tradutor[generated_actor.Custom('ES_XA')], [generated_actor.GetFullName], chegou à minha corte ao saber que eu patrocino as ciências.\n\n\"Se o que buscais é conhecimento, o melhor se encontra nos livros antigos. Pois, embora possa ser esquecido, isso não o torna menos verdadeiro\", afirma o/a tradutor[generated_actor.Custom('ES_XA')]. \"Trago comigo muitos livros ainda sem tradução. Se me financiais, certamente vós também vos beneficiareis disso!\"."
 iberia_north_africa.2001.a: "Não pouparei despesas com"
 iberia_north_africa.2001.a.learning: "publicações filosóficas"
 iberia_north_africa.2001.a.martial: "publicações militares"
 iberia_north_africa.2001.a.stewardship: "publicações econômicas"
 iberia_north_africa.2001.a.diplointrigue: "publicações retóricas"
 iberia_north_africa.2001.a.end: "que você possa conseguir."
 iberia_north_africa.2001.a.a: "Você pede um livro para ajudar a melhorar sua menor habilidade."
 iberia_north_africa.2001.b: "Você tem meu patrocínio; traga algo útil."
 iberia_north_africa.2001.b.a: "[generated_actor.GetFirstNameNoTooltip] lhe dará um livro aleatório que melhora [skill|lE]"
 iberia_north_africa.2001.c: "Por que eu desejaria livros velhos? A história não tem lugar na ciência!"
 iberia_north_africa.2002.t: "$iberia_north_africa.fp2_golden_age_generic_title_intro$ Cirurgião de Olhos nas Estrelas"
 iberia_north_africa.2002.desc: "«Meu senhor[ROOT.Char.Custom('ES_XA')], por favor, faça com que est[generated_actor.Custom('ES_EA')] tolo[generated_actor.Custom('ES_OA')] escute! Est[generated_actor.Custom('ES_EA')] cirurgião[generated_actor.Custom('ES_OA')] me operou de catarata no olho direito, mas agora se recusa a tratar o esquerdo!», exlama [patientzero.GetTitledFirstName|l]. «A operação só teve sucesso porque a conjunção dos astros estava perfeita. #italic Debéis#! esperar mais doze anos para garantir outra operação bem-sucedida», responde o/a frustrad[generated_actor.Custom('ES_OA')] médic[generated_actor.Custom('ES_OA')], [generated_actor.GetFirstName].\n\nComo governante, meu dever é resolver tais assuntos. Devo interferir na astrologia e arriscar que a cirurgia seja uma lambança?"
 iberia_north_africa.2002.a: "Esta é uma oportunidade maravilhosa para [child_offering.GetFirstNameNoTooltip] aprender medicina!"
 iberia_north_africa.2002.a.flavor: "Você oferece seu filh[child_offering.Custom('ES_OA')] [child_offering.GetFirstName] como assistente na operação de catarata por sucção de [patientzero.GetFirstName]."
 iberia_north_africa.2002.a.a: "[child_offering.GetFirstName] auxilia na operação"
 iberia_north_africa.2002.a.b: "Resultados da Operação de Catarata"
 iberia_north_africa.2002.b: "As estrelas nada têm a ver com sua habilidade; faça a operação!"
 iberia_north_africa.2002.b.a: "Você exige que a operação prossiga, conhecendo os riscos."
 iberia_north_africa.2002.c: "De fato, talvez seja melhor esperar até que as condições sejam favoráveis."
 iberia_north_africa.2002.d: "#italic Bem, na verdade#!, se você olhar #italic por este#! lado, as estrelas estão exatamente certas!"
 iberia_north_africa.2003.t: "$iberia_north_africa.fp2_golden_age_generic_title_intro$ Naturezas Conflitantes"
 iberia_north_africa.2003.desc: "Muitos eruditos passaram por [playerprovince.GetNameNoTooltip] desde que concedi meu patrocínio, mas dois deles me chamaram a atenção. Talvez seja porque ambos são indivíduos de grande intelecto, talvez seja porque #italic no se callan#! nem param de discutir sobre diferenças de fé insignificantes em plena corte. \"Me #italic niego#! a trabalhar com um[generated_actor_r.Custom('ES_XA')] idiota como [generated_actor_r.GetFirstName]!\", exclama [generated_actor_k.GetFirstName] antes de [generated_actor_r.GetFirstName] responder com um \"Por mim, nunca trabalharia com alguém tão teimoso quanto #italic vos!#!\".\n\n\"[ROOT.Char.GetTitledFirstName|l], o que pensais? É papel do filósofo explicar o mundo natural ou isso cabe à autoridade do profeta?\"."
 iberia_north_africa.2003.a: "Na verdade, isso cai sob #ber minha#! autoridade. Agora vão trabalhar."
 iberia_north_africa.2003.a.flavor: "Você ofende ambos os estudiosos, direcionando o desprezo deles para você, e não um para o outro."
 iberia_north_africa.2003.b: "Filósofos, é claro; homens sábios como Aristutalis deveriam."
 iberia_north_africa.2003.c: "Como você pode acreditar em filósofos se não consegue confiar em Ezequiel?"
 iberia_north_africa.fp2_pilgrim_roads_generic_title_intro: "Caminhos de Peregrinação:"
 iberia_north_africa.2011.t: "$iberia_north_africa.fp2_pilgrim_roads_generic_title_intro$ Guerreiro[generated_actor.Custom('ES_OA')] errante"
 iberia_north_africa.2011.desc: "Enquanto perambulo por [chosen_location_for_pilgrim_roads.GetName], encontro uma grande árvore que, em silêncio, me tenta a descansar sob sua sombra. Sento-me na sombra fresca ao lado de um[generated_actor.Custom('ES_XA')] [generated_actor.GetWomanMan]. \"Você é um[generated_actor.Custom('ES_XA')] peregrin[generated_actor.Custom('ES_OA')]?\", pergunto."
 iberia_north_africa.2011.desc_merge_into: "Ao que a figura em repouso responde,"
 iberia_north_africa.2011.desc_soldier: "$iberia_north_africa.2011.desc_merge_into$ \"Não sou nada além de um[generated_actor.Custom('ES_XA')] guerr[generated_actor.Custom('ES_OA')] desajeitado chamado [generated_actor.GetName]. Vim visitar [chosen_holy_site_for_pilgrim_roads.GetNameNoTier] para descobrir por que [generated_actor.GetFaith.HighGodName] me abandonou e saber para onde devo levar minha espada\"."
 iberia_north_africa.2011.desc_captain: "$iberia_north_africa.2011.desc_merge_into$ \"Talvez eu seja. Mas me reconheço mais como uma alma perdida. Meu nome é [generated_actor.GetName] , ex-capit[generated_actor.Custom('ES_AnAna')] de uma ordem militar, agora vagando em busca de [generated_actor.GetFaith.HighGodName] e uma causa maior para servir\"."
 iberia_north_africa.2011.a: "[generated_actor.GetFaith.HighGodName] desejaria que você se juntasse às minhas fileiras, [generated_actor.GetFirstNameNoTooltip]."
 iberia_north_africa.2011.b: "Estou convencid[ROOT.Char.Custom('ES_OA')] de que [generated_actor.GetFaith.HighGodName] deseja que continue vagando em busca de inimigos."
 iberia_north_africa.2011.b.flavor: "Você incentiva o guerreiro[generated_actor.Custom('ES_OA')] a continuar lutando por [generated_actor.GetFaith.HighGodName], por si mesm[generated_actor.Custom('ES_OA')] e que espalhe a notícia de sua boa natureza."
 iberia_north_africa.2011.c: "Certamente você encontrará [generated_actor.GetFaith.HighGodName] ao fim de sua peregrinação."
 iberia_north_africa.2011.c.flavor: "Você permite que o guerreir[generated_actor.Custom('ES_OA')] continue cumprindo seu dever para com [generated_actor.GetFaith.HighGodName] sem ser perturbad[generated_actor.Custom('ES_LoLa')]."
 iberia_north_africa.2012.t: "$iberia_north_africa.fp2_pilgrim_roads_generic_title_intro$ Estudante Empobrecido"
 iberia_north_africa.2012.desc: "Vagando pelas novas estradas recém-construídas em [chosen_location_for_pilgrim_roads.GetName], encontro um[generated_actor.Custom('ES_XA')] jovem, sentad[generated_actor.Custom('ES_OA')] sobre uma pedra de marcação com o rosto sombrio e uma bolsa vazia na mão. O jovem se vira para mim e pergunta: \"[ROOT.Char.Custom2('RelationToMeAddress', generated_actor)] poderíeis dar uma moeda a um[generated_actor.Custom('ES_XA')] estudante peregrin[generated_actor.Custom('ES_OA')]?"
 iberia_north_africa.2012.desc_student: "Sou um[generated_actor.Custom('ES_XA')] estudante de teologia que deseja compreender melhor o mundo que [generated_actor.GetFaith.HighGodName] nos concedeu. Eu até estaria dispost[generated_actor.Custom('ES_OA')] a lhe dar minhas anotações de viagem como prova de agradecimento de uma alma [generated_actor.GetFaith.GetAdjective] a outra!\""
 iberia_north_africa.2012.desc_architect: "\"Estudo arquitetura; vim de muito longe para ver e aprender com as obras bem preservadas em [chosen_holy_site_for_pilgrim_roads.GetNameNoTier]. Sou inteiramente dedicado(a) a esse ofício. Se me desse algumas moedas, eu até lhe daria meus escritos sobre arquitetura!\""
 iberia_north_africa.2012.a: "Eu poderia aproveitar esse conhecimento. Muito bem, aceito a troca."
 iberia_north_africa.2012.b: "Talvez você devesse tentar arrumar um emprego."
 iberia_north_africa.2012.b.flavor: "Você oferece [generated_actor.Custom('ES_AlAla')] estudante um bom emprego em sua corte, o que [generated_actor.Custom('ES_LoLa')] pega de surpresa."
 iberia_north_africa.2012.c: "Nada de barganha. Como alma [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] , é meu dever ajudá-lo."
 iberia_north_africa.2013.t: "A quem abriu o caminho para os peregrinos."
 iberia_north_africa.2013.desc: "Você fez um trabalho exemplar lançando as bases literais necessárias para facilitar o acesso ao local sagrado de [chosen_holy_site_for_pilgrim_roads.GetNameNoTierNoTooltip]. Por isso, sou obrigado(a) a recompensá-lo(a).\n\nDiga-me: há algo que você deseja?"
 iberia_north_africa.2013.a: "Seu elogio por si só já basta, meu(minha) [fp2_iberia_north_africa_2013_head_of_faith.GetFaith.ReligiousHeadName]."
 iberia_north_africa.2013.b: "Espalhe a notícia de meus feitos em nome de [ROOT.Char.GetFaith.HighGodName]."
 iberia_north_africa.2013.c: "Que todo guerreiro saiba de minha dedicação a [ROOT.Char.GetFaith.GetNameNoTooltip]."
 iberia_north_africa.2013.d: "Presenteie-me com um artefato digno de exibição em [chosen_holy_site_for_pilgrim_roads.GetNameNoTierNoTooltip]."
 iberia_north_africa.2013.d.tooltip: "[fp2_iberia_north_africa_2013_head_of_faith.Custom('ES_ElLa')|U] [fp2_iberia_north_africa_2013_head_of_faith.GetTitledFirstName|l] lhe dará um [artifact|lE] abençoado"
 iberia_north_africa.2013.notif.t: "Caminhos de Piedade"
 struggle_iberia_form_portugal_decision_correct_phase_tt: "A [struggle_phase|lE] atual é [struggle_phase_iberia_opportunity|E]"
 iberia_north_africa.2100.t: "Antiga Vasconia Restaurada"
 iberia_north_africa.2100.desc: "Por séculos, nós, os bascos, suportamos implacavelmente nossas desgraças com tenacidade e determinação. Como se esculpidos na antiga rocha dos Pireneus, mantivemo-nos firmes contra incontáveis invasões, esperando o momento oportuno para atacar.\n\nEsses dias sombrios ficaram para trás e, enfim, conseguimos recuperar as terras de nossos antepassados, agora o coração de um novo reino de [GetTitleByKey('k_navarra').GetNameNoTier] livre.\n\nDepois de ter sofrido as mais duras lições da história, juro que nunca mais permitiremos que nos expulsem de nossos lares."
 iberia_north_africa.2100.a: "Sob minha liderança, podemos alcançar qualquer coisa!"
 iberia_north_africa.2100.b: "Não nos curvaremos novamente!"
 iberia_north_africa.2101.desc: "Ao longo dos séculos, os bascos foram gradualmente encurralados nos Pireneus, assediados por invasores que avançavam por todos os lados e lhes tomavam as terras.\n\nAgora, tendo recuperado grande parte das terras natais de seus ancestrais, [founder.Custom('ES_ElLa')] [founder.GetTitledFirstNameRegnal|l] se proclamou \"[founder.Custom('QueenKing')] de [GetTitleByKey('k_navarra').GetNameNoTier]\", e reivindica as extensões perdidas como parte de um novo reino basco.\n\nOs povos vizinhos veem essa mudança de sorte apenas como uma aberração na história da região e certamente procuram a primeira oportunidade para corrigir esse revés…"
 iberia_north_africa.2101.b: "Eles deveriam ter ficado nas montanhas!"
 iberia_north_africa.2101.c: "Uma surpresa, sem dúvida."
