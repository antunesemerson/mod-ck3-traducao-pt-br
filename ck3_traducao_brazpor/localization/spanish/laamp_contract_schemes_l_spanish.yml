 laamp_base_contract_schemes.5661.d.tt.failure: "$option_boilerplate.tt.officer_aptitude.failure$"
 laamp_base_contract_schemes.5661.e: "[officer.GetFirstNameNoTooltip], toque estas bestas adiante."
 laamp_base_contract_schemes.5661.e.tt.success: "$option_boilerplate.tt.officer_aptitude.success$"
 laamp_base_contract_schemes.5661.e.tt.failure: "$option_boilerplate.tt.officer_aptitude.failure$"
 laamp_base_contract_schemes.5661.f: "[officer.GetFirstNameNoTooltip], solte seus cães!"
 laamp_base_contract_schemes.5661.f.tt.success: "$option_boilerplate.tt.officer_aptitude.success$"
 laamp_base_contract_schemes.5661.f.tt.failure: "$option_boilerplate.tt.officer_aptitude.failure$"
 laamp_base_contract_schemes.5661.g: "[officer.GetFirstNameNoTooltip], você consegue lidar com estes?"
 laamp_base_contract_schemes.5661.g.tt.success: "$option_boilerplate.tt.officer_aptitude.success$"
 laamp_base_contract_schemes.5661.g.tt.failure: "$option_boilerplate.tt.officer_aptitude.failure$"
 laamp_base_contract_schemes.5661.h: "Se ao menos eu tivesse um oficial adequado..."
 laamp_base_contract_schemes.5661.h.tt.need_groom_hunter_kenneler_or_spoiler: "Você não tem nenhum [GetCourtPositionType('head_groom_camp_officer').GetName()|l], [GetCourtPositionType('huntperson_camp_officer').GetName()|l], [GetCourtPositionType('kennelperson_camp_officer').GetName()|l] nem [GetCourtPositionType('master_of_spoils_camp_officer').GetName()|l]"
 laamp_base_contract_schemes.5661.i: "Não haverá #EMP erro algum#!, de #EMP nenhum#! de vocês."
 laamp_base_contract_schemes.5662.t: "$laamp_base_contract_schemes.5034.t$: Sucesso!"
 laamp_base_contract_schemes.5662.desc: "Apesar de todos os esforços dos muitos lacaios [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l], [ROOT.Char.GetPrimaryTitle.GetDefinitiveName|l] reclamou uma verdadeira horda de bestas de suas ignominiosas garras.\n\nTalvez elas não fossem nossas por natureza, mas o que isso importa para nós? Com espada e machado, tomamos o que quisemos, e todos os que se opuseram a nós jazem mortos em seus pastos.\n\nQue seus corpos sirvam de diversão para os corvos."
 laamp_base_contract_schemes.5662.a: "Hoje jantaremos como reis!"
 laamp_base_contract_schemes.5663.t: "$laamp_base_contract_schemes.5034.t$: Falha!"
 laamp_base_contract_schemes.5663.desc: "Embora tenhamos tentado o nosso melhor, as tropas [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] nos atrapalhavam a cada passo. Avisos enviados a aldeias remotas, rebanhos abundantes deslocados para outros lugares, mais guardas e torres de vigia reconstruídas em cada parada…\n\nHoje a vitória vai para [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l]."
 laamp_base_contract_schemes.5663.a: "Bah, velh[employer.Custom('ES_OA')] otário idoso…"
 laamp_base_contract_schemes.5901.t: "$laamp_base_contract_schemes.5051.t$: [victim.GetTitledFirstNameNoTooltip]"
 laamp_base_contract_schemes.5901.desc.intro.1: "Com o trabalho da noite quase concluído, eu e meus agentes ponderamos se devemos voltar para casa um pouco mais cedo — uma conversa decidida por nós com a chegada de um alvo de aparência promissora..."
 laamp_base_contract_schemes.5901.desc.intro.2: "À medida que a tarde se transforma em noite, contenho um bocejo. O crime pode pagar bem, mas grande parte dele envolve simplesmente #EMP esperar#! sem mais. Embora, espere aí, esta pessoa parece promissora…"
 laamp_base_contract_schemes.5901.desc.intro.3: "Recompensas desiguais têm atormentado o nosso dia de trabalho, com muitas bolsas levadas, mas poucas delas particularmente #EMP acaudalada#!. Embora, pela aparência desta pessoa, isso possa estar prestes a mudar…"
 laamp_base_contract_schemes.5901.desc.intro.4: "A labuta de hoje já foi bastante lucrativa, com vários bons cidadãos que gentilmente doaram sua prata para a nossa #EMP causa#!. Mas esta pessoa pode ser a mais rica até agora…"
 laamp_base_contract_schemes.5901.desc.intro.5: "Após um dia em grande parte infrutífero, sem nem mesmo um camponês abastado passar por nossas áreas de caça, finalmente temos um pouco de sorte com uma pessoa de posses evidentes."
 laamp_base_contract_schemes.5901.desc.victim_type.good_relation: "É... meu [victim.Custom2('RelationToMeShort',ROOT.Char)]? [victim.GetTitledFirstName|l]? O que se passa pela cabeça de [victim.Custom('ES_LeLa')] se aventure por estas ruas perigosas sem escolta? Claro que pode ser roubad[victim.Custom('ES_OA')]?"
 laamp_base_contract_schemes.5901.desc.victim_type.bad_relation: "Ora, ora, ora, mas se não é meu velho[victim.Custom('ES_OA')] [victim.Custom2('RelationToMeShort',ROOT.Char)], [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l]. E sem escolta, ainda por cima. Que… #EMP fortuna#!."
 laamp_base_contract_schemes.5901.desc.victim_type.consort: "Mas é [victim.GetFirstName], meu #EMP [victim.Custom2('RelationToMeShort',ROOT.Char)]#!! Mesmo separados agora, certamente não posso fazer isso com [victim.GetSheHe], alguém tão querido para mim?"
 laamp_base_contract_schemes.5901.desc.victim_type.family: "Não pode ser… [victim.GetFirstName|U], meu [victim.Custom2('RelationToMeShort',ROOT.Char)]. Sem escolta, e se mete alegremente no perigo, feliz da vida. Sua inconsequência mancha o nome de [ROOT.Char.GetHouse.GetName]."
 laamp_base_contract_schemes.5901.desc.victim_type.courtier: "Hum… É[victim.Custom('ES_EA')] #EMP parece#! [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l], cortesão[victim.Custom('ES_OA')] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]. Para o que isso lhe serve aqui e agora, rodeado[victim.Custom('ES_OA')] sem saber por [ROOT.Char.GetPrimaryTitle.GetDefinitiveName]."
 laamp_base_contract_schemes.5901.desc.victim_type.baron: "Isso[victim.Custom('ES_EA')] é… Sim, é [victim.GetFirstName][victim.Custom('ES_ElLa')] [victim.GetTitleAsNameNoTooltip|l] de [victim.GetPrimaryTitle.GetBaseNameNoTier]! Deve estar visitando a capital por assuntos pessoais. Muito pessoais, para viajar sem escolta e pegar uns atalhos #EMP de mala fama#!."
 laamp_base_contract_schemes.5901.desc.victim_type.baron_courtier: "Não posso dizer que [victim.GetHerHim] reconheça, mas pelo seu traje parece ser abastad[victim.Custom('ES_OA')], mas sem importância. Talvez um[victim.Custom('ES_XA')] cortesão[victim.Custom('ES_OA')] de um governante local menor."
 laamp_base_contract_schemes.5901.desc.victim_type.traveller: "Seu traje e comportamento hesitante indicam que é claramente um[victim.Custom('ES_XA')] forasteir[victim.Custom('ES_OA')], ao menos nesta cidade. Um[victim.Custom('ES_XA')] visitante temporário ou um[victim.Custom('ES_XA')] viajant[victim.Custom('ES_OA')] de passagem."
 laamp_base_contract_schemes.5901.desc.victim_type.fallback: "[victim.GetHerHim|U] reconheço como [victim.GetFirstName], um[victim.Custom('ES_XA')] magnata local com uma pequena fortuna e uma presa #EMP perfectamente adecuada#!, embora talvez não seja a mais rica da região."
 laamp_base_contract_schemes.5901.desc.outro.1: "Meus agentes começam a surgir de seus esconderijos, coçando-se de ansiedade para saltar sobre esta nova presa."
 laamp_base_contract_schemes.5901.desc.outro.2: "As sombras se movem suavemente, figuras encapuzadas sob meu comando preparando-se para avançar a qualquer segundo."
 laamp_base_contract_schemes.5901.desc.outro.3: "Embora quase imperceptível, ouço o som de adagas bem oleadas sendo desembainhadas por todo o pequeno beco."
 laamp_base_contract_schemes.5901.desc.outro.4: "Com máscaras cobrindo a maior parte de seus rostos, deixando apenas os olhos visíveis, meus agentes olham para mim em busca do sinal para começar."
 laamp_base_contract_schemes.5901.desc.outro.5: "Basta eu dar a ordem e [victim.Custom('ES_ElLa')] o pobre tolo aprenderá o significado do arrependimento."
 laamp_base_contract_schemes.5901.tt.muggings_tally_and_max: "#TUT Você recebeu [scheme.MakeScope.Var('special_muggings_tally').GetValue|0] assaltos especiais de um total possível de [scheme.MakeScope.Var('special_muggings_max').GetValue|0]#!"
 laamp_base_contract_schemes.5901.tt.victim_escapes: "[victim.Custom('ES_ElLa')|U] [victim.GetTitledFirstName|l] foge"
 laamp_base_contract_schemes.5901.a: "Facas em mãos, vamos fazer isso de forma silenciosa, mas clara."
 laamp_base_contract_schemes.5901.a.tt.success: "Você intimida [victim.GetFirstNameNoTooltip]"
 laamp_base_contract_schemes.5901.a.tt.failure: "A vítima foge antes que você possa encurralá-la"
 laamp_base_contract_schemes.5901.b: "Siga[victim.GetHerHim] e corte a bolsa em silêncio."
 laamp_base_contract_schemes.5901.b.tt.success: "[victim.GetSheHe|U] nem percebe"
 laamp_base_contract_schemes.5901.b.tt.failure: "[victim.GetFirstNameNoTooltip] nota você e corre"
 laamp_base_contract_schemes.5901.c: "[rollee.GetFirstNameNoTooltip], mostre a ele o verdadeiro medo!"
 laamp_base_contract_schemes.5901.c.tt.success: "[rollee.GetFirstNameNoTooltip] triunfa"
 laamp_base_contract_schemes.5901.c.tt.failure: "Seu agente falha com você"
 laamp_base_contract_schemes.5901.d: "[rollee.GetFirstNameNoTooltip], veja o que você consegue fazer."
 laamp_base_contract_schemes.5901.d.tt.success: "$laamp_base_contract_schemes.5901.c.tt.success$"
 laamp_base_contract_schemes.5901.d.tt.failure: "$laamp_base_contract_schemes.5901.c.tt.failure$"
 laamp_base_contract_schemes.5901.e: "[rollee.GetFirstNameNoTooltip], furte sua carteira!"
 laamp_base_contract_schemes.5901.e.tt.success: "$option_boilerplate.tt.officer_aptitude.success$"
 laamp_base_contract_schemes.5901.e.tt.failure: "$option_boilerplate.tt.officer_aptitude.failure$"
 laamp_base_contract_schemes.5901.f: "Arriscado demais, deixe este passar."
 laamp_base_contract_schemes.5901.f.tt: "Você renuncia à oportunidade de aliviar [victim.Custom('ES_AlAla')] [victim.GetTitledFirstName|l] de sua fortuna"
