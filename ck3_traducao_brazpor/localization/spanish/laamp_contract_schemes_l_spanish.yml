 laamp_base_contract_schemes.2671.f: "Onde você diria que as muralhas estão... #EMP mais fracas#!..."
 laamp_base_contract_schemes.2671.g: "$laamp_base_contract_schemes.2661.g$"
 laamp_base_2071_success_employer_modifier: "Muralhas Reforçadas"
 laamp_base_2071_success_employer_modifier_desc: "Um assentamento importante daqui recentemente dedicou tempo a reforçar suas muralhas."
 laamp_base_2071_failure_employer_modifier: "Reparo Malfeito"
 laamp_base_2071_failure_employer_modifier_desc: "As muralhas de um grande assentamento deste condado caíram em ruína e, pior, foram danificadas durante uma tentativa de reparo."
 laamp_base_contract_schemes.2672.t: "$laamp_base_contract_schemes.2031.t$: Sucesso!"
 laamp_base_contract_schemes.2672.desc.resolution_type.stewardship: "Algumas poucas isenções menores, uma autorização para isto ou aquilo, o selo [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] para algum projeto, e de repente todo mundo está #EMP muito#! mais disposto a aceitar uma pequena taxa extra para pagar pelas muralhas.\n\nNão importa que a reorganização de impostos e encargos signifique que pagarão a mesma quantia que lhes foi pedida originalmente. Não, por agora, o mais importante é que as boas gentes de [employer.GetPrimaryTitle.GetBaseNameNoTier] sintam que jogaram bem o jogo."
 laamp_base_contract_schemes.2672.desc.resolution_type.secondary_skill: "Envergonhado e incitado à ação pelo meu exemplo — e com a ajuda de alguns seguidores de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] — eu e o bom povo de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier] começamos a trabalhar no reparo de suas defesas.\n\nFelizmente, as muralhas parecem muito piores do que de fato estão. Um progresso substancial é feito e ao custo de apenas alguns dias de trabalho facilmente compensados por uma pequena taxa."
 laamp_base_contract_schemes.2672.desc.resolution_type.left_sacrifice: "Com aparência exausta, [sacrifice.Custom('ES_ElLa')] [sacrifice.GetTitledFirstName|l] tenta dirigir o povo litigioso de [employer.GetPrimaryTitle.GetBaseNameNoTier] quando [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] e eu deixamos a sala.\n\n“Não se preocupe, [ROOT.Char.GetTitledFirstNameNoTooltip|l], cuidaremos muito bem de seu[sacrifice.Custom('ES_OA')] [sacrifice.GetWomanMan] e o [sacrifice.GetHerHim] mandaremos de volta inteiro(a).”\n\nAh, é só empilhar umas pedras umas sobre as outras. Quão difícil pode ser? Com gratidão, aceito o pagamento e me preparo para sair."
 laamp_base_contract_schemes.2672.desc.resolution_type.officer: "A posição [officer.Custom('ES_DelDela')] [officer.GetTitledFirstName|l] como meu $head_porter_camp_officer$"
 laamp_base_contract_schemes.2672.desc.resolution_type.camp_purpose: "A cidade de [employer.GetPrimaryTitle.GetBaseNameNoTier] está queimando.\n\nBem, a maior parte dela. Não as coisas que meus seguidores estão carregando de volta para o acampamento de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName]; não, essas ficarão #EMP sãs e salvas#! sob meus cuidados.\n\nFoi honrado da minha parte saquear um assentamento que veio a mim em busca de ajuda só porque eu podia? Talvez não.\n\nMas, então, mais tolos eles por oferecer tal pagamento a alguém que não conhecem nem um pouco..."
 laamp_base_contract_schemes.2672.desc.resolution_type.stress: "Botar o povo de [employer.GetPrimaryTitle.GetBaseNameNoTier] na linha exige uma mistura pesada de gritos, insistência e culpa.\n\nÉ um trabalho cansativo, extenuante para a mente, mas um a um os magnatas locais entram na linha e concordam amargamente em pagar sua parte justa. Talvez não seja uma solução elegante, mas, se funciona, funciona."
 laamp_base_contract_schemes.2672.desc.outro: "\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] está bastante satisfeito com nossa solução, entregando de bom grado suas moedas."
 laamp_base_contract_schemes.2672.a: "$laamp_base_contract_schemes.2662.a$"
 laamp_base_contract_schemes.2672.a.city_sacked: "Caveat emptor."
 laamp_base_contract_schemes.2673.t: "$laamp_base_contract_schemes.2031.t$: Falha!"
 laamp_base_contract_schemes.2673.desc.stewardship: "Meu plano parecia sensato o bastante para mim, dividindo o custo primeiro de forma igual entre os locais e depois ajustando um pouco segundo riqueza e renda, mas os magnatas reagiram com choque e horror.\n\nDe algum modo, cada um deles estava convencido de que pagaria demais, mesmo por esse bem comum, não importando sua riqueza ou posição."
 laamp_base_contract_schemes.2673.desc.officer: "Talvez [officer.Custom('ES_ElLa')] [officer.GetTitledFirstName|l] não seja um $head_porter_camp_officer$ tão excelente quanto eu imaginava.\n\nNem meia hora se passou desde que sugeriu seus planos para reconstruir as muralhas e as gentes de [employer.GetPrimaryTitle.GetBaseNameNoTier] já brigam, se gritam, berram, chutam e mordem-se com total #EMP desesperación#! para evitar a tarefa que lhes espera."
 laamp_base_contract_schemes.2673.desc.outro: "\n\nUm[employer.Custom('ES_XA')] [employer.GetTitledFirstName|l] desolad[employer.Custom('ES_OA')] nem sequer falará comigo depois de eu ter estragado tudo assim.\n\nSomos expulsos da cidade sem receber nem uma moeda por nossos apuros."
 laamp_base_contract_schemes.2673.a: "$laamp_base_contract_schemes.2663.a$"
 laamp_base_contract_schemes.2676.t: "$laamp_base_contract_schemes.2031.t$: Pastagem Favorável"
 laamp_base_contract_schemes.2676.desc: "As ruas de [employer.GetPrimaryTitle.GetBaseNameNoTier] estão dominadas por uma febre de rumores e escândalos; um caso complicado de casamentos, heranças e negócios malsucedidos levou a que uma grande parte das melhores terras da região para pasto de cavalos fosse parar nas mãos de um tolo sem dinheiro nem habilidade.\n\nConsequentemente, os magnatas locais ameaçam se despedaçar uns aos outros sobre como dividir as terras (e quem deve fazê-lo)."
 laamp_base_contract_schemes.2676.desc.outro: "$laamp_base_contract_schemes.2661.desc.outro$"
 laamp_base_contract_schemes.2676.a: "$laamp_base_contract_schemes.2661.a$"
 laamp_base_contract_schemes.2676.b: "$laamp_base_contract_schemes.2661.b$"
 laamp_base_contract_schemes.2676.b.tt.success: "$laamp_base_contract_schemes.2661.b.tt.success$"
 laamp_base_contract_schemes.2676.b.tt.failure: "$laamp_base_contract_schemes.2661.b.tt.failure$"
 laamp_base_contract_schemes.2676.c: "Pasto, é? Isso parece a minha especialidade."
 laamp_base_contract_schemes.2676.d.sacrifice_exists: "$laamp_base_contract_schemes.2661.d.sacrifice_exists$"
 laamp_base_contract_schemes.2676.d.sacrifice_unexists: "$laamp_base_contract_schemes.2661.d.sacrifice_unexists$"
 laamp_base_contract_schemes.2676.d.no_valid_char: "Você não dispõe de nenhum [follower|lE] com pelo menos [EmptyScope.ScriptValue('laamp_base_contract_schemes_2661_other_skill_threshold_value')|0] de habilidade [martial|E] para designar temporariamente à [court|lE] de [employer.GetFirstName|l]"
 laamp_base_contract_schemes.2676.d.tt.courtier_stays_here: "$laamp_base_contract_schemes.2661.d.tt.courtier_stays_here$"
 laamp_base_contract_schemes.2676.e.officer_exists: "$laamp_base_contract_schemes.2661.e.officer_exists$"
 laamp_base_contract_schemes.2676.e.officer_unexists: "$laamp_base_contract_schemes.2661.e.officer_unexists$"
 laamp_base_contract_schemes.2676.f: "Sim, sabemos uma coisa ou duas sobre cavalos."
 laamp_base_contract_schemes.2676.g: "$laamp_base_contract_schemes.2661.g$"
 laamp_base_2076_success_employer_modifier: "Bons Cavalos"
 laamp_base_2076_success_employer_modifier_desc: "As montarias deste condado são a inveja da terra."
 laamp_base_2076_failure_employer_modifier: "Cavalos Esqueléticos"
 laamp_base_2076_failure_employer_modifier_desc: "Este condado, por algum motivo, produz cavalos notoriamente terríveis de todo tipo."
 laamp_base_contract_schemes.2677.t: "$laamp_base_contract_schemes.2031.t$: Sucesso!"
 laamp_base_contract_schemes.2677.desc.resolution_type.stewardship: "Mais uma vez triunfa a orgulhosa habilidade familiar da Casa [ROOT.Char.GetHouse.GetName] da qual nos sentimos tão orgulhosos!\n\nApesar de toda a pose, o que cada um dos magnatas quer é sua fatia do bolo, então, ao longo da tarde, consigo traçar uma divisão das terras justa o bastante para que todos fiquem apenas #EMP um pouco#! decepcionados.\n\nAté mesmo o proprietário tolo receberá alguma compensação, permitindo que as disputas diminuam a um nível administrável."
 laamp_base_contract_schemes.2677.desc.resolution_type.secondary_skill: "Tenho experiência suficiente em assuntos de guerra para saber que as melhores terras nem sempre criam os melhores cavalos, nem os melhores cavalos precisam das melhores terras.\n\nCom calma, cuidado e uma #EMP leve#! condescendência, explico seus erros de raciocínio aos magnatas de [employer.GetPrimaryTitle.GetBaseNameNoTier]. No início, eles são… relutantes em ouvir — terra é terra, afinal de contas —, mas no fim um bom argumento sempre prevalece."
 laamp_base_contract_schemes.2677.desc.resolution_type.left_sacrifice: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] e eu deixamos [sacrifice.Custom('ES_AlAla')] [sacrifice.GetTitledFirstName|l] aos ternos cuidados dos magnatas locais. Mesmo à medida que nos afastamos, a gritaria começa — aumentando de volume mais rápido do que conseguimos nos distanciar.\n\n«Não era o que eu esperaria como solução», assente pensativamente [employer.GetFirstNameNoTooltip], «mas mal posso criticar o vosso esmero. Tem certeza de que ele ficará bem aqui?».\n\nErgo uma sobrancelha.\n\n«Ah, claro, o que estou dizendo?», balbucia [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l], «Vou acabar me metendo no mesmo tipo de confusão por falar demais. Aqui está o vosso pagamento por nos cederem [sacrifice.GetWomanMan] tão hábil[sacrifice.Custom('ES_OA')]»."
 laamp_base_contract_schemes.2677.desc.resolution_type.officer: "A experiência [officer.Custom('ES_DelDela')] [officer.GetTitledFirstName|l] com cavalos hoje nos vem muito bem.\n\nLibertad[officer.Custom('ES_OA')] contra os locais e, tendo sido instruído a falar de uma de suas grandes paixões, [officer.GetFirstName] é capaz de aos poucos inundá-los de vergonha pelo modo como cuidam de suas montarias e bestas de carga, entrando em detalhes exaustivos sobre formas de criar animais melhores e mais saudáveis sem simplesmente brigar pelos melhores pastos.\n\nAo final, eles concordam envergonhados com cada ponto e crítica especializada, tendo esquecido todos os argumentos."
 laamp_base_contract_schemes.2677.desc.resolution_type.camp_purpose: "É claro que, ao trabalhar em [ROOT.Char.GetPrimaryTitle.GetDefinitiveName], aprende-se uma coisa ou outra sobre boas pastagens.\n\nCom uma facilidade muito praticada, quase casual, somos capazes de afastar as preocupações dos moradores locais e dividir a terra de forma justa e equilibrada.\n\nUm lembrete casual de que há por perto um grupo de mercenários acampado a serviço de sua [employer.Custom('MistressMaster')] também não faz mal."
 laamp_base_contract_schemes.2677.desc.resolution_type.stress: "Com uma mente justa e reunindo toda a maldita tenacidade que alguém da Casa [ROOT.Char.GetHouse.GetName] consegue reunir, tudo é possível.\n\nSão necessárias horas de discussão extenuante para chegar a algo parecido com uma divisão justa da terra. Justa para todos, exceto para o tolo que, na verdade, sai perdendo. Mas o idiota está recebendo mais compensação do que receberia se eu não estivesse aqui para negociar.\n\nO importante é que os magnatas estejam contentes o bastante — ou, pelo menos, apenas levemente resmungões — com minhas sugestões."
 laamp_base_contract_schemes.2677.desc.outro: "\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] parece mais do que contente com nossa solução e, com alegria, nos entrega suas moedas."
 laamp_base_contract_schemes.2677.a: "$laamp_base_contract_schemes.2662.a$"
 laamp_base_contract_schemes.2678.t: "$laamp_base_contract_schemes.2031.t$: Falha!"
 laamp_base_contract_schemes.2678.desc.stewardship: "Depois de intermináveis horas de negociações, parece que estamos mais longe de um acordo do que quando começamos.\n\nTodo pequeno magnata mesquinho e faminto por poder em [employer.GetPrimaryTitle.GetBaseNameNoTier] quer #EMP sua#! fatia daquele pedaço de terra de valor um pouco acima da média, e está disposto a berrar até derrubar a casa para consegui-la.\n\n"
 laamp_base_contract_schemes.2678.desc.officer: "Eu pensava que [officer.Custom('ES_AlAla')] [officer.GetTitledFirstName|l] era muito bom em #EMP bien#! esses assuntos.\n\nMas, ah, ou sabe demais e o povo de [employer.GetPrimaryTitle.GetBaseNameNoTier] se importa pouco demais, ou [officer.GetFirstName] sabe de menos demais e os locais se importam demais.\n\nSucedem-se discussões, acusações e furiosos socos na mesa."
 laamp_base_contract_schemes.2678.desc.outro: "Ao cair da noite, um[employer.Custom('ES_XA')] [employer.GetTitledFirstName|l] muito ansios[employer.Custom('ES_OA')] nos expulsa com rudeza por causa da frustração com nossa falta de progresso.\n\nParece que hoje não receberemos pagamento."
 laamp_base_contract_schemes.2678.a: "$laamp_base_contract_schemes.2663.a$"
 #Something something "everyone's favourite part of the video"...
 laamp_base_contract_schemes.2681.t: "$laamp_base_contract_schemes.2031.t$: Linhas em Mapas"
 laamp_base_contract_schemes.2681.desc: "Nossa chegada a [employer.GetPrimaryTitle.GetBaseNameNoTier] é recebida com pouca cerimônia — os locais estão em crise por causa de algum mapa antigo ou outro que foi desenterrado e #EMP redesenha completamente#! as fronteiras entre dois assentamentos satélites da cidade.\n\nSem uma resolução logo, o melhor cenário é interrupção na arrecadação de impostos, enquanto o pior pode ser uma pequena guerra local.$laamp_base_contract_schemes.2661.desc.outro$"
 laamp_base_contract_schemes.2681.a: "$laamp_base_contract_schemes.2661.a$"
 laamp_base_contract_schemes.2681.b: "$laamp_base_contract_schemes.2661.b$"
 laamp_base_contract_schemes.2681.b.tt.success: "$laamp_base_contract_schemes.2661.b.tt.success$"
 laamp_base_contract_schemes.2681.b.tt.failure: "$laamp_base_contract_schemes.2661.b.tt.failure$"
 laamp_base_contract_schemes.2681.c: "Permita-me inspecionar esse mapa seu."
 laamp_base_contract_schemes.2681.d.sacrifice_exists: "$laamp_base_contract_schemes.2661.d.sacrifice_exists$"
 laamp_base_contract_schemes.2681.d.sacrifice_unexists: "$laamp_base_contract_schemes.2661.d.sacrifice_unexists$"
 laamp_base_contract_schemes.2681.d.no_valid_char: "Você não dispõe de nenhum [follower|lE] com pelo menos [EmptyScope.ScriptValue('laamp_base_contract_schemes_2661_other_skill_threshold_value')|0] de [learning|lE] para atribuir temporariamente à [court|lE] de [employer.GetFirstName]"
 laamp_base_contract_schemes.2681.d.tt.courtier_stays_here: "$laamp_base_contract_schemes.2661.d.tt.courtier_stays_here$"
 laamp_base_contract_schemes.2681.e.officer_exists: "$laamp_base_contract_schemes.2661.e.officer_exists$"
 laamp_base_contract_schemes.2681.e.officer_unexists: "$laamp_base_contract_schemes.2661.e.officer_unexists$"
 laamp_base_contract_schemes.2681.f: "Um mero #EMP mapa?#! É só isso que vocês têm?"
 laamp_base_contract_schemes.2681.g: "$laamp_base_contract_schemes.2661.g$"
 laamp_base_contract_schemes.2682.t: "$laamp_base_contract_schemes.2031.t$: Sucesso!"
 laamp_base_contract_schemes.2682.desc.resolution_type.stewardship: "Felizmente, tenho um [ROOT.Char.Custom('SenseObserve_SenseEye')] apurado para detalhes, e não demoro muito para apontar uma dúzia de maneiras pelas quais o mapa é uma falsificação óbvia."
 laamp_base_contract_schemes.2682.desc.resolution_type.secondary_skill: "O mapa parece verdadeiro… se você for um #EMP idiota#!! No entanto, sou uma pessoa de grande conhecimento, e demonstrar sua origem falha é algo tão simples quanto vestir uma túnica."
 laamp_base_contract_schemes.2682.desc.resolution_type.left_sacrifice: "Enquanto [sacrifice.Custom('ES_ElLa')] [sacrifice.GetTitledFirstName|l] se acomoda cansadamente para o #EMP longo#! processo de ouvir todos os lados desse debate antes de encontrar algo que se pareça com a verdade, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] me puxa para o lado.\n\n«Muito bem, [ROOT.Char.GetTitledFirstNameNoTooltip]; quem teria pensado que você tinha alguém tão sábio para ceder[sacrifice.GetHerHim] à minha humilde cidade!\n\nAo fundo, [sacrifice.GetFirstNameNoTooltip] silencia uma voz estridente que clama sobre direito de nascença.\n\n«Não tenho dúvidas de que resolveremos isso, com o tempo, ao menos. Seu pagamento está esperando lá fora»."
 laamp_base_contract_schemes.2682.desc.resolution_type.officer: "A habilidade [officer.Custom('ES_DelDela')] [officer.GetTitledFirstName|l] com a palavra dita é tal que consegue avivar nos locais as suspeitas #EMP justas#! sobre a autenticidade do mapa. Conduz-os primeiro a um tema, depois a outro, até que boa parte da sala o condene como uma falsificação óbvia e explique o porquê."
 laamp_base_contract_schemes.2682.desc.resolution_type.camp_purpose: "Talvez… eu tenha me excedido um pouco ao explicar a relação que um frágil pedaço de pergaminho tem com algo real, com direito de sangue e tão importante quanto a terra.\n\nDepois de mais ou menos uma hora, os habitantes locais simplesmente me encaram atônitos, seus rostos são máscaras de vergonha, confusão e, às vezes, de maravilhamento extasiado.\n\nO assunto banal de seu «documento antigo» é deixado de lado, e um silêncio constrangedor se instala na sala.\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] me retira em silêncio, ao que parece, satisfeit[employer.Custom('ES_OA')], e me entrega nosso pagamento."
 laamp_base_contract_schemes.2682.desc.resolution_type.stress: "Após horas e mais horas de debate, acusações e ameaças ocasionais, finalmente identifico vários indicadores-chave de que o mapa provavelmente é uma falsificação — e, portanto, sem valor."
 laamp_base_contract_schemes.2682.desc.outro: "\n\nSim, certamente, alguns o contestam no início, mas, à medida que as provas continuam a se acumular, no fim um conspirador #EMP desmorona#! sob a pressão e aponta um magnata local como o culpado.\n\nUma prisão simples depois e [employer.GetPrimaryTitle.GetBaseNameNoTier] já tem algo novo sobre o que fofocar, enquanto os assentamentos satélites são forçados a parar de se encarar.\n\nCom as tensões dissipada e as coisas bem a caminho de voltar ao normal, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] nos entrega as moedas com gratidão."
 laamp_base_contract_schemes.2682.a: "$laamp_base_contract_schemes.2662.a$"
 laamp_base_contract_schemes.2683.t: "$laamp_base_contract_schemes.2031.t$: Falha!"
 laamp_base_contract_schemes.2683.desc.stewardship: "Acreditei que questionar a veracidade do mapa fosse a jogada certa, mas, infelizmente, ao fazê-lo apenas agitei ainda mais o problema: com esse elemento extra de intriga, o próprio povo de [employer.GetPrimaryTitle.GetBaseNameNoTier] começou a tomar partido no que antes era uma disputa paroquial.\n\nTalvez metade considere meus argumentos convincentes, indicando que #EMP alguém#! é culpado de extrema má-fé, enquanto a outra metade vê meus pontos como completamente espúrios. Ao cair da noite, a cidade inteira está em armas contra si mesma."
 laamp_base_contract_schemes.2683.desc.officer: "Eu esperava que a lábia [officer.Custom('ES_DelDela')] [officer.GetTitledFirstName|l] fosse suficiente para acalmar os moradores e criar um ambiente mais tranquilo, um em que a razão pudesse prevalecer com mais facilidade.\n\nEm vez disso, as gentes de [employer.GetPrimaryTitle.GetBaseNameNoTier] se polarizaram diante de suas tentativas de apaziguar a situação, e até mesmo ricos magnatas dentro da própria cidade escolhem um lado ou outro na disputa entre as cidades sob seu domínio."
 laamp_base_contract_schemes.2683.desc.outro: "\n\nCertamente, o mapa foi esquecido, mas, de qualquer forma, as pessoas estão discutindo #EMP más#!, em vez de menos.\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] nos informa friamente que nosso pagamento não virá."
 laamp_base_contract_schemes.2683.a: "$laamp_base_contract_schemes.2663.a$"
 laamp_base_contract_schemes.2781.t: "$laamp_base_contract_schemes.2044.t$: [ROOT.Char.GetCurrentLocation.GetTitle.GetBaseNameNoTierNoTooltip]"
 laamp_base_contract_schemes.2781.desc.surroundings.alley_day: "Levamos nosso tempo vagando pelas ruas do assentamento — garantindo, claro, parecer ocupados e frustrados com nossa própria importância enquanto seguimos —, e demora algum tempo até encontrarmos [Select_CString( local_char.IsFemale, 'a infeliz moradora local', 'o infeliz morador local' )] a quem escolheram para administrar o tributo."
 laamp_base_contract_schemes.2781.desc.surroundings.alley_night: "Já é tarde quando chegamos ao assentamento, mas não quero ficar aqui mais tempo do que o necessário. Encontramos [Select_CString( local_char.IsFemale, 'a infeliz moradora local', 'o infeliz morador local' )] a quem escolheram para gerir os tributos quando ela está fechando a loja para a noite."
 laamp_base_contract_schemes.2781.desc.surroundings.tavern: "Como era de se esperar, encontramos [local_char.Custom('ES_AlAla')] infeliz [Select_CString( local_char.IsFemale, 'lugareña elegida', 'lugareño elegido' )] para gerenciar os tributos, afogando as mágoas antes da nossa chegada."
 laamp_base_contract_schemes.2781.desc.surroundings.docks: "Certificando-nos de parecer o mais pomposamente oficiais possível, caminhamos até os cais. Como esperado, conseguimos encontrar [Select_CString( local_char.IsFemale, 'a infeliz moradora local escolhida', 'o infeliz morador local escolhido' )] para administrar os tributos ali, gritando com os marinheiros e dirigindo a carga do dia."
 laamp_base_contract_schemes.2781.desc.surroundings.condemned_village: "Com a doença devastando a área, o assentamento está em péssimo estado, para dizer o mínimo. Com tecido apertado à boca para conter a miasma, ainda assim acabamos encontrando a pobre alma escolhida para administrar o tributo."
 laamp_base_contract_schemes.2781.desc.local_mood.disapproval: "\"Humf\", resmunga, \"imagino que vocês acham que são muito espertos por chegarem tão cedo assim. Pois bem, não estamos impressionados e não pagaremos nenhum acréscimo por atrasar vocês\"."
 laamp_base_contract_schemes.2781.desc.local_mood.anger: "\"Você tem muita cara de pau para chegar tão cedo assim!\", rosna. \"Pagamos o que nos cabe, como qualquer outra cidade, mas temos direito a um aviso razoável antes que venham se aproveitar do nosso trabalho\"."
 laamp_base_contract_schemes.2781.desc.local_mood.admiration: "\"Ah! Devem ser [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetWomanMan] [task_contract.GetEmployer.Custom('ES_DelDela')] [task_contract.GetEmployer.GetTitleAsNameNoTooltip|l]\", [local_char.GetSheHe] disparou. \"Percebo pelo seu porte honrado! Vocês chegaram um #EMP poquito#! antes do esperado, mas não se preocupem, estamos preparados\"."
 laamp_base_contract_schemes.2781.desc.local_mood.dismissal: "\"Você já está aqui tão cedo?\", diz arrastando as palavras, \"Muito bem, siga-me. Preparamos o seu… #EMP tributo#!, conforme instruído, mas nem uma moeda a mais\"."
 laamp_base_contract_schemes.2781.desc.local_mood.thinking: "\"Você é... [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetWomanMan] [task_contract.GetEmployer.Custom('ES_DelDela')] [task_contract.GetEmployer.GetTitleAsNameNoTooltip|l]? Tão cedo?\", pergunta. \"Eu não achava que vocês viriam antes de mais um mês, pelo menos... ainda assim, suponho que vocês parecem confiáveis...\"."
 laamp_base_contract_schemes.2781.desc.outro: "\n\nMais um tolo crédulo entre nós e nosso pagamento."
 laamp_base_contract_schemes.2781.a: "Confundir[local_char.GetHerHim] com números."
 laamp_base_contract_schemes.2781.stewardship.tt.success: "Claro, claro, está tudo em ordem"
 laamp_base_contract_schemes.2781.stewardship.tt.failure: "Mas que diabos você está dizendo?"
 laamp_base_contract_schemes.2781.b: "Apresento o selo [task_contract.GetEmployer.Custom('ES_DelDela')] [task_contract.GetEmployer.GetTitleAsNameNoTooltip|l]."
 laamp_base_contract_schemes.2781.intrigue.tt.success: "Parece genuíno o bastante"
 laamp_base_contract_schemes.2781.intrigue.tt.failure: "Isto é uma falsificação óbvia!"
 laamp_base_contract_schemes.2781.c.bard_exists: "[bard.GetTitledFirstNameNoTooltip], use sua língua de prata!"
 laamp_base_contract_schemes.2781.c.bard_dnae_exist: "Se ao menos tivéssemos um velhaco de língua de prata..."
 laamp_base_contract_schemes.2781.d: "Passe por este encontro o mais rápido possível."
 laamp_base_contract_schemes.2781.tt.boost_difficulty.stewardship: "Seu próximo desafio de [stewardship|lE] será ainda mais difícil"
 laamp_base_contract_schemes.2781.tt.boost_difficulty.intrigue: "Seu próximo desafio de [intrigue|lE] será ainda mais difícil"
 laamp_base_contract_schemes.2781.tt.boost_difficulty.bard: "O próximo desafio de aptidão de [bard.GetFirstName] será ainda mais difícil"
 laamp_base_contract_schemes.2781.tt.boost_difficulty.stress: "Esta opção custará ainda mais [stress|lE] da próxima vez"
 laamp_base_contract_schemes.2781.tt.progress_towards_success: "#P +1#! ponto rumo a concluir com sucesso o [task_contract|lE]"
 laamp_base_contract_schemes.2781.tt.current_total.sub_t1: "#TUT Você tem uma pontuação de [task_contract.MakeScope.Var('wins_tally').GetValue], de [task_contract.MakeScope.Var('win_t1_threshold').GetValue] rumo a um $label_success_qualified$#!"
 laamp_base_contract_schemes.2781.tt.current_total.sub_t2: "#TUT Você tem uma pontuação de [task_contract.MakeScope.Var('wins_tally').GetValue], de [task_contract.MakeScope.Var('win_t2_threshold').GetValue] rumo a um $label_success_standard$ #WEAK (você atualmente obteve um $label_success_qualified$)#!#!"
 laamp_base_contract_schemes.2781.tt.current_total.sub_t3: "#TUT Você tem uma pontuação de [task_contract.MakeScope.Var('wins_tally').GetValue], de [task_contract.MakeScope.Var('win_t3_threshold').GetValue] rumo a um $label_success_critical$ #WEAK (você atualmente obteve um Sucesso)#!#!"
 laamp_base_contract_schemes.2781.tt.progress_towards_failure: "#N +1#! ponto rumo a falhar o [task_contract|lE]"
 laamp_base_contract_schemes.2781.tt.contract_failed: "#N O contrato falhou#!"
 laamp_base_contract_schemes.2782.t: "$laamp_base_contract_schemes.2044.t$: Sucesso!"
 laamp_base_contract_schemes.2782.desc.success_critical: "Hah! Que grande aventura desastrosa: um[task_contract.GetEmployer.Custom('ES_XA')] [task_contract.GetEmployer.GetTitledFirstName|l] gananciosamente tolo[task_contract.GetEmployer.Custom('ES_OA')] , um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] belissimamente garboso[ROOT.Char.Custom('ES_OA')] com um faro para oportunidades e dezenas de contribuintes crédulos que provavelmente desejariam ter aprendido a ler um pouco melhor.\n\nCom os cofres do acampamento transbordando, pensamos em nosso próximo trabalho."
 laamp_base_contract_schemes.2782.desc.success_standard: "Até agora, nos saímos #EMP muy#! muito bem em nossa pequena incursão no mundo da administração.\n\nHá moedas suficientes no nosso pequeno carro de impostos falsificado (com brasões de armas mal pintados em ambos os lados), [task_contract.GetEmployer.Custom('ES_DelDela')] [task_contract.GetEmployer.GetTitledFirstName|l] para saciar a cobiça por ouro da maioria das pessoas.\n\nE, no entanto…, não consigo deixar de me perguntar se ainda poderíamos ter extraído um pouco mais de sangue dessa pedra…"
 laamp_base_contract_schemes.2782.desc.success_qualified: "Fizemos um bom saque, mas ainda há muito dinheiro a ser tirado dos tolos súditos [task_contract.GetEmployer.Custom('ES_DelDela')] [task_contract.GetEmployer.GetTitledFirstName|l].\n\nSe partirmos agora, é bem provável que consigamos ficar bem à frente do cobrador que avança lentamente atrás de nós; por outro lado, se ele nos alcançar, seremos forçados a cortar caminho e fugir, perdendo tudo."
 laamp_base_contract_schemes.2782.desc.nothing_yet: "Bem, começamos bem, mas isso não passa de uma mera ninharia em comparação com o que esperamos ganhar.\n\nSe desejamos de fato conquistar nossa parte injusta da fortuna [task_contract.GetEmployer.Custom('ES_DelDela')] [task_contract.GetEmployer.GetTitledFirstName|l], devemos continuar pressionando e convencer mais de seus súditos de nossas… credenciais."
 laamp_base_contract_schemes.2782.a: "Quem disse que [ROOT.Char.Custom('GetLaampDescribeTypeSelfArticle')] [ROOT.Char.Custom('GetLaampDescribeTypeSelf')] precisa de terras para ganhar moedas!"
 laamp_base_contract_schemes.2782.b: "Sem ousadia, sem glória, sem ouro! Em frente!"
 laamp_base_contract_schemes.2782.b.tt.travel_onwards: "Você continua tentando um resultado melhor para seu [task_contract|lE]"
 laamp_base_contract_schemes.2782.c: "Vamos jogar com segurança e encerrar por aqui."
 laamp_base_contract_schemes.2782.d: "Tudo bem, isto é o melhor que podemos fazer por enquanto."
 laamp_base_contract_schemes.2782.d.tt: "@alert_icon! #alert_trial Esta opção é forçada porque você alcançou o melhor resultado que pode obter com o número de falhas que acumulou#!"
 laamp_base_contract_schemes.2783.t: "$laamp_base_contract_schemes.2044.t$: Falha!"
 laamp_base_contract_schemes.2783.desc.lost: "Maldita seja toda a população de [ROOT.Char.GetCurrentLocation.GetTitle.GetBaseNameNoTier]! Sua suspeita irracional e sua antipatia com os forasteiros arruinaram tudo.\n\nSó queria umas #EMP pocas#! moedas a mais, mas os tolos ficaram desconfiados, depois alarmados e, então, se apoderaram de nossa carroça num frenesi de moradores enfurecidos.\n\nFiquei com menos do que nada."
 laamp_base_contract_schemes.2783.desc.losing: "Foi por pouco; talvez perto demais.\n\nEu não fazia ideia de que o povo de [ROOT.Char.GetCurrentLocation.GetTitle.GetBaseNameNoTier] fosse tão desconfiado. Nem tenho certeza do que foi dito para despertar suas dúvidas, mas eles começaram a fazer perguntas, e não demorou até eu ficar sem respostas.\n\nAinda assim, ao menos conseguimos evitar a captura com nosso saque atual, mesmo sem arrancar mais nada deles."
 laamp_base_contract_schemes.2783.a: "Mas meu plano era perfeito!"
 laamp_base_contract_schemes.2783.b: "É só um revés miserável, em frente!"
 laamp_base_contract_schemes.2783.b.tt.travel_onwards: "$laamp_base_contract_schemes.2782.b.tt.travel_onwards$"
 laamp_base_contract_schemes.2783.c: "Melhor prata e vivo do que ouro e morto."
 laamp_base_contract_schemes.2783.d: "Vamos... vamos deixar assim..."
 laamp_base_contract_schemes.2783.d.tt: "$laamp_base_contract_schemes.2782.d.tt$"
 laamp_base_contract_schemes.3301.t: "$laamp_base_contract_schemes.3004.t$: [current_barony.GetNameNoTierNoTooltip]"
 laamp_base_contract_schemes.3301.desc.scandal_affair: "Talvez não possamos entrar na corte [current_char.Custom('ES_DelDela')] [current_char.GetTitledFirstName|l] sem chamar atenção, mas parece que nem precisamos chegar a isso: os moradores estão agitados com rumores de infidelidade\n\nNinguém #EMP demasiado#! importante, mas um caso amoroso inesperado acrescenta um pouco de tempero à monotonia da vida cotidiana em [current_barony.GetNameNoTier].\n\nFelizmente para nós, com tanta gente tagarelando, deve ser bem fácil sondar os servos e os cortesãos inferiores em busca de migalhas de fofocas úteis."
 laamp_base_contract_schemes.3301.desc.scandal_torture: "Mesmo sem ter acesso direto à corte [current_char.Custom('ES_DelDela')] [current_char.GetTitledFirstName|l], em [current_barony.GetNameNoTier] só se fala do tumulto lá dentro.\n\nParece que um magnata local, tentando cobrar dívidas ou vingar alguma ofensa, exagerou na tortura de seu rival e deixou para trás nada além da casca quebrada de uma pessoa.\n\nHá apelos [current_char.Custom('ES_AlAla')] [current_char.GetTitleAsNameNoTooltip|l] para que intervenha, mas por algum motivo parece relutante.\n\nInfeliz para a vítima, mas uma atmosfera #EMP perfeita#! para fazer perguntas lascivas sem despertar suspeitas."
 laamp_base_contract_schemes.3301.desc.scandal_manslaughter: "Há sangue nas ruas de [current_barony.GetNameNoTier] e, embora não tenha sido [current_char.Custom('ES_ElLa')] [current_char.GetTitledFirstName|l] quem sacou a lâmina, foram as palavras de \n\nUma portaria local — implementada de acordo com as especificações exatas de [current_char.Custom('ES_DelDela')] [current_char.GetTitleAsNameNoTooltip|l]— provou ser aterradoramente impopular. Faz nem dois dias que um humilde oficial de justiça, bastante apreciado por sua mente justa e cabeça fria, foi morto ao tentar aplicá-la, em um lamentável crime passional.\n\nCom tantas palavras furiosas e acusações de culpa por toda parte, deveria ser fácil arrancar segredos dos habitantes locais."
 laamp_base_contract_schemes.3301.desc.scandal_loan: "Queixas e lamentos em voz baixa parecem preencher [current_barony.GetNameNoTier], o falatório irritante dos levemente escandalizados.\n\nParece que um credor local está cobrando várias dívidas por toda a cidade, perturbando os moradores mais do que um imposto inesperado. Pior ainda, isso está sendo feito com a aprovação tácita [current_char.Custom('ES_DelDela')] [current_char.GetTitledFirstName|l], o que para muitos é uma traição imperdoável.\n\nNão é o melhor clima para fazer perguntas incisivas, mas está longe de ser o pior para encontrar servos amargurados de língua solta."
 laamp_base_contract_schemes.3301.desc.scandal_bribery: "Não se fala de outra coisa em [current_barony.GetNameNoTier] que um funcionário ou outro [current_char.Custom('ES_DelDela')] [current_char.GetTitledFirstName|l] foi pego aceitando uma quantidade #EMP verdadeiramente#! assombrosa de propinas contraditórias.\n\nUm pouco de corrupção aqui e ali não é nada incomum; para muitos funcionários, é uma parte esperada do salário, mas essas coisas têm limites.\n\nAqui, esses limites foram esticados muito além do ponto de ruptura.\n\nMás notícias para [current_char.Custom('ES_ElLa')] [current_char.GetTitleAsNameNoTooltip|l], excelentes notícias para quem tem interesse em moradores irritados com histórias para contar."
 laamp_base_contract_schemes.3301.desc.rumblings_war: "As ruas de [current_barony.GetNameNoTier] estão agitadas com rumores de guerra e sangue, e muitos moradores estão totalmente #EMP convencidos#! de que [current_char.Custom('ES_ElLa')] [current_char.GetTitledFirstName|l] planeja um conflito — em breve.\n\nClaro, a guerra mal é uma ocorrência rara, o que torna mais fácil para fofoqueiros e espalhadores de boatos incutirem medo quando há pouco mais para preencher as longas noites.\n\nSeja verdade ou não, isso rende muitos faladores decididamente #EMP ansiosos#! para compartilhar suas opiniões e o que ouviram com um forasteiro empreendedor."
 laamp_base_contract_schemes.3301.desc.rumblings_murder: "Embora ninguém possa afirmar com certeza, a palavra que está na boca de todos aqui em [current_barony.GetNameNoTier] é #EMP assassinato#!.\n\nAlguns dizem que é [current_char.Custom('ES_ElLa')] [current_char.GetTitledFirstName|l] em pessoa, que perdeu a paciência e anseia pelo fim prematuro de algum pobre coitado. Outros que a conspiração de que se fala na verdade é #EMP contra#! [current_char.Custom('ES_ElLa')] [current_char.GetTitleAsNameNoTooltip|l], ou apenas o duelo político de alguns de seus cortesãos mais implacáveis entre si.\n\nSeja qual for a verdade, agora todo mundo é um fofoqueiro ávido.\n\nQue conveniente."
 laamp_base_contract_schemes.3301.desc.rumblings_affair: "Os rumores se espalham entre o povo comum mais rápido que fogo em uma cidade velha, e não há fofoca que se espalhe mais rápido do que os rumores de suspeita de adultério [current_char.Custom('ES_DelDela')] [current_char.GetLadyLord] de [current_barony.GetNameNoTier].\n\nClaro, ninguém ousaria dizer algo tão descarado de forma totalmente aberta — mas, atrás de portas fechadas, depois de uma ou duas taças de vinho, e com figuras misteriosas vistas pela corte...\n\nAs pessoas estão cautelosas, mas sua sede por escândalos ainda as deixa vulneráveis a um pouco de questionamento tático."
 laamp_base_contract_schemes.3301.desc.mundane_feast: "Toda a agitação em [current_barony.GetNameNoTier] está, no momento, voltada exclusivamente para um festim menor que [current_char.Custom('ES_ElLa')] [current_char.GetTitledFirstName|l] pretende celebrar.\n\nInfelizmente, ao que parece, o evento é #EMP suficientemente#! grandioso para captar a atenção de todo fofoqueiro, mexeriqueiro e bisbilhoteiro da cidade.\n\nTodas as conversas giram em torno de quem provavelmente será convidado ou não, que comida será servida, que espetáculos [current_char.Custom('ES_ElLa')] [current_char.GetTitleAsNameNoTooltip|l] apresentará… Não é exatamente o melhor ambiente para procurar informação mais #EMP estratégica#!."
 laamp_base_contract_schemes.3301.desc.mundane_nothing: "Desafortunadamente, fala-se pouco de qualquer coisa relevante em [current_barony.GetNameNoTier].\n\nÉ, há a habitual leva de pequenos dramas entre os plebeus, mas nada especialmente picante ou interessante. E isso é um problema, porque torna a chegada de estranhos fazendo perguntas algo incomum.\n\nAinda assim, teremos de arrancar toda a informação que pudermos desta cidade monótona."
 laamp_base_contract_schemes.3301.tt.plus_one_success: "#P +1#! informação reunida"
 laamp_base_contract_schemes.3301.a: "Vou farejar o terreno..."
 laamp_base_contract_schemes.3301.a.tt.success: "Vários detalhes úteis"
 laamp_base_contract_schemes.3301.a.tt.failure: "[intrigue_duellist.GetFirstNameNoTooltip] frustra você"
 laamp_base_contract_schemes.3301.b: "Hora de usar meu charme!"
 laamp_base_contract_schemes.3301.b.tt.success: "Palavras que não deveriam ter compartilhado"
 laamp_base_contract_schemes.3301.b.tt.failure: "[diplomacy_duellist.GetFirstNameNoTooltip] mantém a corte calada"
 laamp_base_contract_schemes.3301.c: "Interroguem quem pudermos e vamos embora."
 laamp_base_contract_schemes.3301.d: "Não vamos brincar com [current_char.GetFirstNameNoTooltip]."
 laamp_base_contract_schemes.3301.d.tt.skip_the_attempt: "Você reúne #N nenhuma#! informação aqui"
 laamp_base_contract_schemes.3302.t: "$laamp_base_contract_schemes.3004.t$: Sucesso!"
 laamp_base_contract_schemes.3302.desc.intro: "Os agentes [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] se reúnem conosco em [current_barony.GetNameNoTier], ansiosos por levar nosso relatório ao seu [employer.GetLadyLord].\n\n"
 laamp_base_contract_schemes.3302.desc.win.critical: "E temos #EMP bastantes#! relatórios preparados, um registro minucioso de cada trato, rumor e segredo vazado de [destination_1.GetNameNoTier] até [destination_2.GetNameNoTier] — mais do que suficiente para manter o mestre-espião de [employer.GetFirstNameNoTooltip] ocupado com pistas e intrigas por meses.\n\nCom gratidão pelo nosso trabalho de campo,"
 laamp_base_contract_schemes.3302.desc.win.standard: "Por sorte, reunimos informações suficientes para conquistá-los. Talvez não seja tudo o que poderíamos ter conseguido, mas o bastante para dar bastante trabalho ao mestre-espião de [employer.GetFirstNameNoTooltip] e arrancar murmúrios de satisfação de nossos contatos.\n\nCom gratidão pelo nosso trabalho de campo,"
 laamp_base_contract_schemes.3302.desc.win.qualified: "Não… é muito. Como os rumores e as fofocas que reunimos são tão escassos, há comparativamente pouco com o que o mestre de espionagem de [employer.GetFirstNameNoTooltip]. Pouco, mas não exatamente #EMP nada.#!\n\nUma breve conversa resmungada depois,"
 laamp_base_contract_schemes.3302.desc.outro: "os espiões [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] trazem o pagamento acordado.\n\nDiscretamente, é claro."
 laamp_base_contract_schemes.3302.a: "Tanta recompensa por alguns sussurros!"
 laamp_base_contract_schemes.3303.t: "$laamp_base_contract_schemes.3004.t$: Falha!"
 laamp_base_contract_schemes.3303.desc: "Os agentes [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] se reúnem conosco em [current_barony.GetNameNoTier], mas por pouco tempo — assim que nossas desculpas pela completa falta de informações confiáveis para compartilhar começam a surgir, os espiões percebem que falhamos.\n\nÉ dito de forma direta para não desperdiçar o tempo [employer.Custom('ES_AlAla')] [employer.GetTitleAsNameNoTooltip|l] com nossas palhaçadas, nem para buscar sua ajuda no futuro, antes de sua rápida partida.\n\nTalvez a espionagem não seja o jogo certo para uns [ROOT.Char.Custom('GetLaampDescribeTypeSelfPlural')|l] como nós…"
 laamp_base_contract_schemes.3303.a: "Quem negocia rumores carrega estoque ruim."
 laamp_base_contract_schemes.3661.t: "$laamp_base_contract_schemes.3031.t$: [destination_1.GetBaseNameNoTierNoTooltip]"
 laamp_base_contract_schemes.3661.desc.intro: "[destination_1.GetBaseNameNoTier] parece um lugar agradável — uma pena visitá-lo em circunstâncias tão desagradáveis.\n\nPerto do anoitecer, um pequeno grupo dos meus seguidores e eu aguardamos nas sombras, não muito longe do nosso alvo:"
 laamp_base_contract_schemes.3661.desc.business.fallback: "uma pequena, mas próspera oficina, com placa recém-pintada do lado de fora indicando patrocínio."
 laamp_base_contract_schemes.3661.desc.business.inn_exterior: "uma hospedaria de beira de estrada, logo fora da cidade, claramente uma das favoritas locais. Por enquanto."
 laamp_base_contract_schemes.3661.desc.business.relaxing_room: "uma casa urbana abastada, talvez a segunda residência de algum senhor ou senhora."
 laamp_base_contract_schemes.3661.desc.business.winery: "uma vinícola bem abastecida, repleta de barril após barril de bom vinho. São os barris, o vinho doce, que estamos aqui para destruir."
 laamp_base_contract_schemes.3661.desc.business.tavern: "uma taverna movimentada, cheia de fregueses risonhos. Uma taverna que precisa queimar."
 laamp_base_contract_schemes.3661.desc.business.docks: "um amplo armazém de madeira junto às docas, positivamente eriçado de material inflamável."
 laamp_base_contract_schemes.3661.desc.business.kennels: "um canil fedorento, cheio até a borda de cães latindo."
 laamp_base_contract_schemes.3661.desc.business.shrine: "um modesto [target.GetFaith.HouseOfWorship] de beira de estrada da fé [target.GetFaith.GetAdjective], claramente construído há pouco e com carinho."
 laamp_base_contract_schemes.3661.desc.business.mews: "um próspero falcoeiro, com suas muitas aves de caça já devidamente recolhidas pela noite."
 laamp_base_contract_schemes.3661.desc.business.bridge: "uma ponte pedagiada, com torres de pedra espiando muito além do rio que guardam."
 laamp_base_contract_schemes.3661.desc.business.market: "uma pequena praça de mercado, cercada por uma multidão de casas apertadas."
 laamp_base_contract_schemes.3661.desc.outro: "\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] não se dignou a nos explicar se sua vítima, [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l], possui o local, tem algum interesse nele ou apenas sente certo carinho pelo lugar.\n\nEm breve, isso não importará de forma alguma."
 laamp_base_contract_schemes.3661.tt.duel_success: "Tarefa cumprida"
 laamp_base_contract_schemes.3661.tt.duel_failure: "Contrato fracassado"
 laamp_base_contract_schemes.3661.tt.stealth_maintained_no_gallowsbait: "#TUT Este método vai #P preservar seu anonimato#!, reduzindo [GetTrait('gallowsbait').GetName( GetNullCharacter )|l]#!"
 laamp_base_contract_schemes.3661.tt.stealth_foregone_extra_gallowsbait: "#TUT Este método vai #N revelar sua identidade#!, aumentando o [GetTrait('gallowsbait').GetName( GetNullCharacter )|l] obtido — mas é #P mais fácil no geral#!#!"
 laamp_base_contract_schemes.3661.a: "Fiquem quietos: saímos assim que o fogo pegar."
 laamp_base_contract_schemes.3661.b: "Duplas de sempre, todos. Cubram as saídas, mantenham a coragem."
 laamp_base_contract_schemes.3661.c: "Dois por trás, quatro de cada lado, vamos."
 laamp_base_contract_schemes.3661.d: "Machados a postos e vamos deixar isso #EMP sangrento!#!"
 laamp_base_contract_schemes.3661.e: "Espero que todos estejam prontos para isto, #EMP ataque!#!"
 laamp_base_contract_schemes.3661.f: "[officer.GetFirstNameNoTooltip], tem alguma coisa venenosa?"
 laamp_base_contract_schemes.3661.g: "[officer.GetFirstNameNoTooltip], acha que consegue entrar sem ser visto?"
 laamp_base_contract_schemes.3661.h: "[officer.GetFirstNameNoTooltip], acha que consegue acertar uma flecha incendiária naquela parte?"
 laamp_base_contract_schemes.3661.i.steal_dogs: "[officer.GetFirstNameNoTooltip], traga-me esses cães!"
 laamp_base_contract_schemes.3661.i.dog_on_birds: "[officer.GetFirstNameNoTooltip], solte seus cães sobre eles."
 laamp_base_contract_schemes.3661.i.poison_barrels: "[officer.GetFirstNameNoTooltip], você tem algo para... #EMP contaminar#! os barris?"
 laamp_base_contract_schemes.3661.j: "[officer.GetFirstNameNoTooltip], onde queimaria com mais facilidade?"
 laamp_base_contract_schemes.3661.k: "[officer.GetFirstNameNoTooltip], lidere seu grupo pelo outro lado."
 laamp_base_contract_schemes.3661.l: "[officer.GetFirstNameNoTooltip], prepare seu esquadrão."
 laamp_base_contract_schemes.3661.m: "[officer.GetFirstNameNoTooltip], pegue o outro caminho — saquearemos depois."
 laamp_base_contract_schemes.3661.n: "[officer.GetFirstNameNoTooltip], acha que conseguimos envenenar tudo?"
 laamp_base_contract_schemes.3661.o: "Se ao menos eu tivesse um oficial adequado para isto..."
 laamp_base_contract_schemes.3661.o.lacking_officers.forager_kenneler_cook: "Você não tem um [GetCourtPositionType('chief_forager_camp_officer').GetName()|l], nem um [GetCourtPositionType('kennelperson_camp_officer').GetName()|l], nem um [GetCourtPositionType('camp_cook_camp_officer').GetName()|l]"
 laamp_base_contract_schemes.3661.o.lacking_officers.thief_huntsman_engineer: "Você não tem um [GetCourtPositionType('master_thief_camp_officer').GetName()|l] nem um [GetCourtPositionType('huntperson_camp_officer').GetName()|l] nem um [GetCourtPositionType('chief_engineer_camp_officer').GetName()|l]"
 laamp_base_contract_schemes.3661.o.lacking_officers.moa_mos_man_haggler: "Você não tem um [GetCourtPositionType('master_of_arms_camp_officer').GetName()|l], nem um [GetCourtPositionType('master_of_spoils_camp_officer').GetName()|l], nem um [GetCourtPositionType('person_haggler_camp_officer').GetName()|l]"
 laamp_base_contract_schemes.3661.p: "Eu... acho que não quero fazer isso..."
 laamp_base_3661_stole_dogs_modifier: "Os Melhores da Raça"
 laamp_base_3661_stole_dogs_modifier_desc: "Este personagem tem tantos, tantos, #EMP tantos#! cães excelentes à sua disposição."
 laamp_base_contract_schemes.3662.t: "$laamp_base_contract_schemes.3031.t$: Sucesso!"
 laamp_base_contract_schemes.3662.desc.intro: "Um bom plano gera uma vitória rápida, e o"
 laamp_base_contract_schemes.3662.desc.business.fallback: "carcaça em chamas da pequena oficina é um testemunho em ruínas disso."
 laamp_base_contract_schemes.3662.desc.business.inn_exterior: "carcaça devastada da hospedaria incendiada testemunha esse fato."
 laamp_base_contract_schemes.3662.desc.business.relaxing_room: "ruína fumegante da casa urbana simplesmente mostra a verdade desse velho ditado."
 laamp_base_contract_schemes.3662.desc.business.winery: "vinícola saqueada é ampla prova disso."
 laamp_base_contract_schemes.3662.desc.business.tavern: "ruína em chamas da taverna é uma prova simples disso."
 laamp_base_contract_schemes.3662.desc.business.docks: "fachada ainda em chamas do armazém, tombando lentamente na água à sua frente, só serve para demonstrá-lo."
 laamp_base_contract_schemes.3662.desc.business.kennels: "o silêncio absoluto dos antigos canis simplesmente confirma isso."
 laamp_base_contract_schemes.3662.desc.business.shrine: "o [target.GetFaith.HouseOfWorship] profanado queimando preguiçosamente à beira da estrada oferece ampla prova disso."
 laamp_base_contract_schemes.3662.desc.business.mews: "o viveiro agora silencioso é prova muda disso."
 laamp_base_contract_schemes.3662.desc.business.bridge: "as torres em chamas da ponte pedagiada comprovam isso sem dúvida."
 laamp_base_contract_schemes.3662.desc.business.market: "a carnificina abafada no mercado mostra isso de forma incontestável."
 laamp_base_contract_schemes.3662.desc.method.intrigue: "Com rapidez e furtividade — sem mencionar a ausência de oposição sóbria — meus seguidores e eu iniciamos vários incêndios rapidamente e recuamos com prontidão. As chamas fizeram o trabalho, e só precisamos voltar pela manhã para verificar os resultados.\n\nPelo que parece,"
 laamp_base_contract_schemes.3662.desc.method.martial: "É preciso ter estômago forte para massacrar a sangue-frio, mas a promessa de prata torna muitas coisas toleráveis. Depois de limpar o interior, empilhamos os corpos, acendemos um fogo e fugimos na noite. \n\nNenhuma testemunha é corajosa o bastante para intervir e"
 laamp_base_contract_schemes.3662.desc.method.prowess: "Conduzindo a luta pessoalmente, meus seguidores e eu damos cabo de quem tem o azar de se encontrar lá dentro, abatendo-os sem pensar nem piedade. Deixamos os corpos onde caem, lançamos archotes nos pontos mais prováveis e empilhamos materiais inflamáveis sobre os incêndios resultantes.\n\nUm trabalho complicado, mas eficaz.\n\n"
 laamp_base_contract_schemes.3662.desc.method.forager: "Uma vez dentro, [officer.Custom('ES_AlAla')] [officer.GetTitledFirstName|l] não demora muito para realizar seu trabalho sórdido; um pouco de veneno vai longe, e parece que trouxe bastante da substância. Talvez eu devesse me preocupar com isso, mas é um problema para outro dia.\n\nSe [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] esperava conseguir algo aqui, então terá uma surpresa desagradável,"
 laamp_base_contract_schemes.3662.desc.method.thief: "Como um gato, [officer.Custom('ES_ElLa')] [officer.GetTitledFirstName|l] entra por umas venezianas soltas no piso superior. Por alguns minutos, tudo fica em silêncio lá dentro — até que uma porta se abre para nós e de lá sai [officer.GetFirstNameNoTooltip] , com uma faca ensanguentada numa das mãos. Parece que não teve #EMP demasiado#! problema dentro do edifício.\n\nAcender o fogo depois disso é brincadeira de criança, por assim dizer"
 laamp_base_contract_schemes.3662.desc.method.huntperson: "[officer.Custom('ES_ElLa')|U] [officer.GetTitledFirstName|l] acerta e sua flecha se crava firme em uma viga de madeira seca e rachada, dessas que compõem o telhado, longe de qualquer coisa que possa ser apagada facilmente. Em silêncio, esperamos, observamos, desejando que a chama se espalhe lentamente até que o cheiro da fumaça comece a se insinuar fundo em nossas narinas.\n\nBom o bastante para irmos embora, certos de que"
 laamp_base_contract_schemes.3662.desc.method.kenneler.poison_barrels: "[officer.Custom('ES_AlAla')|U] [officer.GetTitledFirstName|l] não parece ter dificuldade em #EMP envenenar#! barril após barril do bom vinho, enquanto o resto de nós fazia a guarda ou carregava isto e aquilo, conforme [officer.Custom('ES_ElElla')] diz. O trabalho foi... francamente alegre, no final, com vários dos meus seguidores se servindo de um dos barris antes de estragá-lo.\n\nClaro, isso não seria tão óbvio à primeira vista — então deixamos uma taça nova com uma pequena surpresa flutuando nela e um rastro de volta até sua origem.\n\n"
 laamp_base_contract_schemes.3662.desc.method.kenneler.steal_dogs: "[officer.Custom('ES_ElLa')|U] [officer.GetTitledFirstName|l] entra nas cocheiras e tudo continua... em um silêncio mais ou menos absoluto. Mais de dez minutos depois, quando começávamos a perder a esperança e a fazer planos para incendiar o lugar de qualquer jeito, reaparece [officer.GetSheHe] reaparece carregando, literalmente, #EMP dezenas#! de sabujos presos por uma variedade de coleiras.\n\nComo conseguiu convencer os animais a permanecerem em silêncio, ofegando e choramingando como se fosse um grande jogo, é um milagre. Cada um de nós pega quantas guias consegue e fugimos na noite;"
 laamp_base_contract_schemes.3662.desc.method.kenneler.dog_on_birds: "Os métodos [officer.Custom('ES_DelDela')] [officer.GetTitledFirstName|l] são barulhentos, mas eficazes. Segurando vários cães bravos e que latem, desaparece no galinheiro. Durante um minuto ou dois, o mundo ganha vida com os sons de latidos, mordidas e rasgos, as aves de rapina morrem aos montes enquanto algumas poucas conseguem escapar pelas portas abertas.\n\nQuando meu $kennelperson_camp_officer$ aparece, já estávamos quase prontos para abandonar[officer.GetHerHim]-o, pois os moradores alertados se #EMP dirigem#! na nossa direção. Algumas flechas bem colocadas os afugentam, e fugimos na escuridão.\n\n"
 laamp_base_contract_schemes.3662.desc.method.engineer: "[officer.Custom('ES_ElLa')|l] [officer.GetTitledFirstName|l] escolhe rapidamente alguns pontos vulneráveis da estrutura e nos ordena colocar piche e tochas em cada local que escolhe. O edifício pega fogo em minutos, e fugimos antes que os primeiros gritos saiam de lá de dentro.\n\n"
 laamp_base_contract_schemes.3662.desc.method.haggler: "Entre o ataque repentino dos meus soldados e o grupo [officer.Custom('ES_DelDela')] [officer.GetTitledFirstName|l], cada um atacando de lados diferentes, os defensores surpresos não tiveram a menor chance. Nós simplesmente os atravessamos de ponta a ponta, derrubando-os um a um como trigo maduro e, em seguida, ateando fogo ao seu pequeno estabelecimento.\n\n"
 laamp_base_contract_schemes.3662.desc.method.armsman: "$laamp_base_contract_schemes.3662.desc.method.haggler$"
 laamp_base_contract_schemes.3662.desc.method.spoiler: "$laamp_base_contract_schemes.3662.desc.method.haggler$"
 laamp_base_contract_schemes.3662.desc.method.cook: "$laamp_base_contract_schemes.3662.desc.method.forager$"
 laamp_base_contract_schemes.3662.desc.outro: "[employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] certamente ficará mais do que feliz em nos entregar nosso pagamento."
 laamp_base_contract_schemes.3662.a: "Uma vitória digna merece uma bolsa gorda!"
 laamp_base_contract_schemes.3662.b: "Hah, que saibam assim mesmo que fui eu!"
 laamp_base_contract_schemes.3663.t: "$laamp_base_contract_schemes.3031.t$: Falha!"
 laamp_base_contract_schemes.3663.desc.intro: "Dizem que nenhum plano sobrevive ao contato com o inimigo. O nosso certamente não sobreviveu: por enquanto,"
 laamp_base_contract_schemes.3663.desc.business.fallback: "a pequena oficina continua de pé."
 laamp_base_contract_schemes.3663.desc.business.inn_exterior: "a hospedaria permanece em grande parte intacta."
 laamp_base_contract_schemes.3663.desc.business.relaxing_room: "a casa urbana permanece imperturbável."
 laamp_base_contract_schemes.3663.desc.business.winery: "o estoque da vinícola continua intocado."
 laamp_base_contract_schemes.3663.desc.business.tavern: "a taverna continua fazendo bons negócios."
 laamp_base_contract_schemes.3663.desc.business.docks: "o armazém das docas permanece sem queimar."
 laamp_base_contract_schemes.3663.desc.business.kennels: "os canis continuam tão cheios de latidos quanto sempre."
 laamp_base_contract_schemes.3663.desc.business.shrine: "o pequeno [target.GetFaith.HouseOfWorship] continua aninhado confortavelmente à beira da estrada."
 laamp_base_contract_schemes.3663.desc.business.mews: "o ar ainda ressoa com os grasnidos e guinchos dos falcões do viveiro."
 laamp_base_contract_schemes.3663.desc.business.bridge: "a ponte pedagiada continua colhendo sua colheita constante de moedas dos viajantes."
 laamp_base_contract_schemes.3663.desc.business.market: "o mercado continua em seu comércio vivo e agitado."
 laamp_base_contract_schemes.3663.desc.method.intrigue: "Nossas tentativas de iniciar um incêndio discretamente atraíram um grupo passageiro de bêbados arruaceiros, com a coragem inflamada pelo vinho e certos — injustamente e sem prova alguma — de que estávamos tramando algum ato criminoso. Os desocupados ensopados se lançaram sobre nós com tamanha fúria e fizeram tamanho alarde que os malditos idiotas atraíram ajuda, forçando rapidamente a mim e aos meus seguidores à fuga.\n\n"
 laamp_base_contract_schemes.3663.desc.method.martial: "Mantenham a calma, disse aos meus seguidores. Que o brilho de nossas armas nos revele antes do esperado não deveria ter sido um problema. Um grito de alarme se ergue, e logo aparece um grupo de locais armados de forma improvisada para nos enfrentar.\n\nOs números importam, mas a preparação também — ou deveria importar. Quando percebo que apenas metade do meu bando ainda está comigo, sou forçado[ROOT.Char.Custom('ES_OA')] a bater em retirada."
 laamp_base_contract_schemes.3663.desc.method.prowess: "Apesar de nossas tentativas de destruir o lugar, não conseguimos passar pela porta sem fazer um barulho infernal. Quando enfim ganhamos acesso, gritos e alarmes já se erguiam nas redondezas — considerando nossos números reduzidos, optamos por fugir em vez de ficar e acabar enforcados como bandidos.\n\n"
 laamp_base_contract_schemes.3663.desc.method.forager: "[officer.Custom('ES_ElLa')|U] [officer.GetTitledFirstName|l] não passa muito tempo no local, apenas deposita generosamente o veneno nas áreas-chave e vai embora. Confiantes em nosso sucesso, partimos, apenas para voltar à cena do crime pela manhã e verificar nosso trabalho.\n\nInfelizmente, embora a invasão tenha sido percebida, #EMP al parecer#! [officer.GetFirstNameNoTooltip] usou a erva errada! Agora estão em alerta para nada."
 laamp_base_contract_schemes.3663.desc.method.thief: "Entrar não é problema algum para [officer.Custom('ES_ElLa')] [officer.GetTitledFirstName|l]; fazê-lo sem ser detectado, por outro lado, é um pouco mais complicado. Poucos instantes depois de sua entrada, um grito de alarme se ergue do interior, seguido pelos sons de uma briga.\n\nPouco depois, uma porta se escancara e [officer.GetFirstNameNoTooltip] sai cambaleando. Arrastando [officer.GetHerHim] com uma mão, fugimos antes que a confusão e os gritos de #EMP PAREM! LADRÃO!#! tragam ajuda."
 laamp_base_contract_schemes.3663.desc.method.huntperson: "Não só a flecha [officer.Custom('ES_DelDela')] [officer.GetTitledFirstName|l] não acerta o alvo, mas a maldita bate em um postigo fechado e consegue ricochetear com um #EMP golpe#! bem sonoro. Alguns segundos depois, as ripas de madeira são abertas e um rosto sonolento espreita, sem certeza, da escuridão.\n\nAo nos ver, com nossas roupas discretas, [officer.GetFirstNameNoTooltip] ainda segurando seu arco e a flecha caída fumegando a nossos pés, fica claro que estávamos tramando algo errado. Quando o alarme soa, fugimos..."
 laamp_base_contract_schemes.3663.desc.method.kenneler.poison_barrels: "[officer.Custom('ES_ElLa')|U] [officer.GetTitledFirstName|l] tinha um trabalho bastante simples: entramos lá, #EMP estraga#! os barris e partimos com um par de objetos valiosos para que pareça um roubo comum.\n\nInfelizmente, [officer.Custom('ES_ElLa')] muito idiota conseguiu virar completamente o primeiro barril ao tentar abri-lo, rachando-o e fazendo-o cair no chão. Gritos de alarme vindos de perto indicaram que nossa farsa estava totalmente descoberta, e fugimos."
 laamp_base_contract_schemes.3663.desc.method.kenneler.steal_dogs: "Por um breve instante, depois que [officer.Custom('ES_ElLa')] [officer.GetTitledFirstName|l] entrar nas canis, os uivos de dentro cessam. Então há… fala abafada? Um rosnado —vários rosnados—, rosnados ameaçadores, estalos e sons de tumulto!\n\n[officer.GetFirstNameNoTooltip] sai correndo do pequeno edifício, perseguido por dois cães enormes, famintos por morder, e um grito de alarme vindo de perto indica que os uivos de aviso dos cães foram ouvidos. Como [officer.GetFirstNameNoTooltip] , fugimos, mas"
 laamp_base_contract_schemes.3663.desc.method.kenneler.dog_on_birds: "Sim, claro, [officer.Custom('ES_ElLa')] [officer.GetTitledFirstName|l] entra no local, com dois sabujos em cada mão, ansiosos para serem soltos, mas esses malditos cães começam a latir feito loucos assim que veem as aves. Ao uivo dos cães vindo da valiosa pombal, ouve-se um grito perto e fica claro que precisamos fugir.\n\n"
 laamp_base_contract_schemes.3663.desc.method.engineer: "[officer.Custom('ES_ElLa')|U] [officer.GetTitledFirstName|l] passa tanto tempo hesitando, tentando descobrir qual é #EMP exactamente#! o melhor lugar exatamente para começar um incêndio, que alguém nos vê vagando por aí! Assim que somos vistos, sei que acabou. Um grito confuso desperta outro, e a fuga logo se torna nossa única opção.\n\n"
 laamp_base_contract_schemes.3663.desc.method.haggler: "Meu grupo e o [officer.Custom('ES_DelDela')] [officer.GetTitledFirstName|l] vêm de direções opostas, mas parece que nós temos… subestimado a vontade dos locais. Eles percebem nosso ataque e, longe de entrar em pânico, os defensores pegam todas as armas improvisadas que têm à mão e se lançam contra nós, cheios de justa indignação e ao grito de #EMP BANDIDOS!#!.\n\nLonge de ser um massacre, sua superioridade numérica ameaça nos sobrepujar e somos forçados a fugir…"
 laamp_base_contract_schemes.3663.desc.method.armsman: "$laamp_base_contract_schemes.3663.desc.method.haggler$"
 laamp_base_contract_schemes.3663.desc.method.spoiler: "$laamp_base_contract_schemes.3663.desc.method.haggler$"
 laamp_base_contract_schemes.3663.desc.method.cook: "$laamp_base_contract_schemes.3663.desc.method.forager$"
 laamp_base_contract_schemes.3663.desc.outro: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName] não pagará nem uma moeda por esta confusão."
 laamp_base_contract_schemes.3663.a: "Devemos ir embora..."
 laamp_base_contract_schemes.3663.b: "Bah, que [target.GetFirstNameNoTooltip] saiba que fui eu assim mesmo."
 laamp_base_contract_schemes.3781.t: "$laamp_base_contract_schemes.3041.t$: Só Mais um Pouco"
 laamp_base_contract_schemes.3781.desc.intro.yes: "Já enchimos os bolsos com moedas de prata roubadas diretamente das arcas [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l], mas ainda há muito valor a ser encontrado em sua [employer.Custom('FortifiedBuilding')|l]: castiçais de ouro, tapeçarias elaboradas, as melhores roupas de linho, textos sagrados e mais.\n\nTodos os muitos adornos que [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l] provavelmente dá por garantidos, mas que para um humilde [ROOT.Char.Custom('GetLaampDescribeTypeSelf')|l] significam #EMP benefícios#!.\n\nTudo o que precisamos fazer é saquear o lar dele antes de sermos descobertos e fugir às pressas pela noite."
 laamp_base_contract_schemes.3781.desc.ending: "E isso é… tudo?\n\nPor [ROOT.Char.GetFaith.WealthGodName], tomamos literalmente #EMP todo#! o que pode ser saqueado de [employer.Custom('FortifiedBuilding')|l] [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l], dividido em um saco ou outro, juntado às pressas de qualquer jeito para fazer o mínimo de barulho possível, guardando apenas os artefatos mais preciosos.\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitleAsNameNoTooltip|l] terá uma manhã #EMP horrible#! quando acordar.\n\nSó nos resta ir embora."
 laamp_base_contract_schemes.3781.desc.success.method.intrigue: "Depois de degolar um sentinela que acordou tarde, agarro o corpo e o guio com cuidado, em silêncio, até o chão — antes de chutá-lo para a sombra mais profunda que consigo encontrar.\n\nLimpando o sangue da minha lâmina, reviro o posto do pobre idiota. Um bordado elegante aqui, um pouco de prata ali, tudo se soma. Morte por uma boa causa.\n\nSe o resto dos defensores tiver sorte, estará em arredores menos auspiciosos, pois suspeito"
 laamp_base_contract_schemes.3781.desc.success.method.prowess: "Leva alguns tentativos para eu escancarar a porta o bastante e, ao mesmo tempo, fazer isso #EMP sem#! causar barulho demais, mas consigo no fim, arrancando a coisa das dobradiças gastas para revelar um cômodo compacto usado para… armazenamento bastante variado.\n\nHum. Não é o ideal, mas, já que estou aqui, reviro tudo mesmo assim e encontro quase o bastante para roubar e concluir que isso valeu meu tempo afinal.\n\nAinda assim,"
 laamp_base_contract_schemes.3781.desc.success.method.martial: "Os guardas desventurados [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] caem rápida e silenciosamente com um #EMP mínimo#! de estertores fleumáticos. Uma alcova conveniente se torna uma parada antes de seu enterro iminente, e ficamos livres para continuar saqueando o lugar sem dó nem piedade.\n\nÉ claro que armazenar os corpos ali significa que somos forçados a esvaziar o recanto de suas decorações e do luxuoso mobiliário, mas isso é apenas cortesia.\n\nMudando de assunto, está claro que"
 laamp_base_contract_schemes.3781.desc.success.method.stewardship: "Sob a pressão exata, as dobradiças do cofre cedem, e seu conteúdo reluzente jorra para fora em um chacoalhar barulhento.\n\nPor um instante, fico paralisad[ROOT.Char.Custom('ES_OA')], esperando para ver se o barulho atraiu alguém e... nada. Deixo escapar uma pequena risada e me abaixo para recolher meu prêmio, apanhando cada moeda como uma galinha cisca o grão.\n\nSatisfeit[ROOT.Char.Custom('ES_OA')] por ter conseguido a maior parte da prata, volto minha atenção para fora..."
 laamp_base_contract_schemes.3781.desc.success.method.agent_intrigue: "[old_rollee.Custom('ES_ElLa')|U] [old_rollee.GetTitledFirstName|l] encontrou bastante, ao que parece, pois sussurra um breve inventário dos bens roubados às pressas em sua corrida para saquear o lugar.\n\nUm bom balanço, o bastante para o saque, e a adrenalina do roubo deve nos ajudar a aguentar a noite. Ergo com calma um adorno de parede caro e o enfio no meu saco. Afinal, não seria bom deixar que meus seguidores me superassem #EMP demasiado#!.\n\nTalvez"
 laamp_base_contract_schemes.3781.desc.success.method.agent_prowess: "Com um bom empurrão, [old_rollee.Custom('ES_ElLa')|U] [old_rollee.GetTitledFirstName|l] arranca a porta de seus gonzos. Então, nos lançamos para segurá-la antes que caia e faça mais barulho, e conseguimos.\n\nO saque lá dentro vale o risco: um tesouro de moedas e tributos do povo que adora [employer.Custom('ES_AlAla')] bom [employer.GetTitleAsName|l], ao que parece. Agora passou para nós graças aos esforços de [old_rollee.GetFirstNameNoTooltip].\n\nTudo isso e mais é nosso, e"
 laamp_base_contract_schemes.3781.desc.success.method.master_thief: "[old_rollee.Custom('ES_ElLa')|U] [old_rollee.GetTitledFirstName|l] não diz nada, apenas sorri e ergue [old_rollee.Custom('Hand_ArticleTwo')] [old_rollee.Custom('HandHands')] com anéis brilhantes, talvez três ou quatro por dedo.\n\nSatisfeit[ROOT.Char.Custom('ES_OA')], faço um aceno e indico ao meu $master_thief_camp_officer$ que continue sua pilhagem em outro lugar. Ele provavelmente deveria tirá-los, não imagino que estejam ajudando em sua destreza, mas não vou parar para dar uma lição agora.\n\nNão quando"
 laamp_base_contract_schemes.3781.desc.success.method.mos: "Sorrindo, [old_rollee.Custom('ES_ElLa')] [old_rollee.GetTitledFirstName|l] abre seu saco de tecido grosseiro para revelar um #EMP caudal#! de moedas, cujo som é grosseiramente abafado por alguns almofadões de aparência muito cara.\n\nMeu $master_of_spoils_camp_officer$ dá um tapinha na [old_rollee.Custom('ActionTaps_ForeheadNose')] de forma cúmplice: \"A chave não é notar o saque óbvio, é notar os lugares óbvios para #EMP esconder#! coisas\".\n\nMuito certo, e"
 laamp_base_contract_schemes.3781.desc.success.method.stress: "Concentração, concentração, #EMP concentração#!. Preciso me concentrar.\n\nSe nos pegarem aqui, seguramente eu seja [Select_CString( ROOT.Char.IsFemale, 'a primeira', 'o primeiro' )] em ser enforcado e, pior ainda, por mais tempo. Não há espaço para deslizes, literais ou metafóricos. Devemos ser rápidos, judiciosos e implacáveis à medida que passamos de um cômodo a outro, de um prédio a outro, levando tudo que tenha até mesmo um valor remoto.\n\nAinda assim, o canto da sereia de mais moedas nos atrai cada vez mais adiante. Afinal de contas,"
 laamp_base_contract_schemes.3781.desc.failure.method.intrigue: "Punhais em punho provaram ser uma excelente precaução, já que encontramos muitos, muitos sentinelas problemáticos espalhados pelo lugar durante nosso avanço.\n\nAlguns estavam lá o tempo todo; outros foram atraídos pelo barulho da nossa entrada inicial. De qualquer forma, sua presença indica que estamos começando a chamar atenção. Muita, muita atenção.\n\nBalanço a cabeça e volto a me concentrar no que importa por enquanto:"
 laamp_base_contract_schemes.3781.desc.failure.method.prowess: "Apesar de todas as nossas tentativas de arrombar a porta para entrar no que #EMP parece#! ser algum tipo de dep?sito, a maldita simplesmente não cede.\n\nQuando nos atrevemos a dar um golpe furioso, não conseguimos nada al?m de um rangido surdo da madeira e o murmário de algu?m dormindo por perto se virando com o barulho.\n\nO que quer que haja l? dentro não vale o risco, mas"
 laamp_base_contract_schemes.3781.desc.failure.method.martial: "A patrulha desce e, mais importante, desce #EMP em silêncio#!.\n\nSó que… parece que não em silêncio suficiente. Os golpes frenéticos e os estertores úmidos dos servos moribundos podem ser bastante altos e, embora ninguém pareça ter nos ouvido desta vez, certamente não teremos tanta sorte na próxima.\n\nAinda assim, a avareza nos chama a seguir adiante. Parece que"
 laamp_base_contract_schemes.3781.desc.failure.method.stewardship: "Seja o que for que haja dentro desse maldito artefato, é pesado — pesado demais para mover à mão — e a fechadura é #EMP frustrantemente#! eficaz.\n\nAbrir com gazuas pode levar horas, e uma única tentativa de forçá-lo produz um #EMP estrondo#! metálico tão estrondoso que me surpreende não termos sido capturados imediatamente. O próximo barulho alto que fizermos certamente será o último.\n\nEmbora tenhamos falhado aqui,"
 laamp_base_contract_schemes.3781.desc.failure.method.agent_intrigue: "Ao que parece, [old_rollee.Custom('ES_ElLa')] [old_rollee.GetTitledFirstName|l] não encontrou nada para nós, mas conseguiu tirar um grupo de guardas de sua partida de dados.\n\nSegurando [old_rollee.Custom('ES_AlAla')] o idiota pela orelha, murmuro que tenha mais #EMP cuidado#! da próxima vez, para que não atraia toda a ira de [employer.GetPrimaryTitle.GetBaseNameNoTier] sobre nós.\n\nFracasso ou não,"
 laamp_base_contract_schemes.3781.desc.failure.method.agent_prowess: "Apesar de toda a sua força, [old_rollee.Custom('ES_ElLa')] [old_rollee.GetTitledFirstName|l] não parece capaz de abrir a porta que nos separa de uma sala repleta de ornamentos luxuosos.\n\nFrustrad[ROOT.Char.Custom('ES_OA')], sinalizo para que a deixemos. Há saques mais fáceis em outro lugar, com certeza, e quanto mais nos enfurecermos com este problema ou aquele, maior será o risco de cometermos erros.\n\nJá fizemos barulho demais com isso; especialmente quando"
 laamp_base_contract_schemes.3781.desc.failure.method.master_thief: "[old_rollee.Custom('ES_ElLa')|U] [old_rollee.GetTitledFirstName|l] conseguiu abranger rápida e silenciosamente uma porção surpreendentemente ampla da [employer.Custom('FortifiedBuilding')|l]; infelizmente, segundo [old_rollee.GetSheHe], há muito pouco que valha a pena roubar sem correr o risco de soar o alarme.\n\nO pior é que sua expressão culpada sugere que #EMP talvez#! ter corrido exatamente esse risco sem meu conhecimento. Teremos que ficar atentos.\n\nFalhas de [old_rollee.GetFirstNameNoTooltip] ou não,"
 laamp_base_contract_schemes.3781.desc.failure.method.mos: "Ao que parece, o salário [old_rollee.Custom('ES_DelDela')] [old_rollee.GetTitledFirstName|l] vai ser reduzido, pois [old_rollee.GetSheHe] retorna minutos depois, totalmente de mãos vazias.\n\nEu teria imaginado que meu $master_of_spoils_camp_officer$ seria capaz de saquear um pouco mais, ao menos para si mesm[old_rollee.Custom('ES_OA')], mas, em vez disso, sou obrigado a ouvir, com um horror crescente, como [old_rollee.Custom('ES_ElLa')] muito idiota narra como quase deu de cara com uma patrulha.\n\nOutro erro desses e todos acabaremos enforcados, no entanto,"
 laamp_base_contract_schemes.3781.desc.cta: "ainda há objetos de valor para saquear adiante pelo corredor..."
 laamp_base_contract_schemes.3781.tt.haul_details: "#TUT [gold_i][varcheck.MakeScope.Var('haul_actual').GetValue|P0] de [gold|E] de um total possível de [gold_i][varcheck.MakeScope.Var('haul_possible').GetValue|V0] atualmente na pilhagem#!"
 laamp_base_contract_schemes.3781.tt.fouls_remaining: "#TUT [varcheck.MakeScope.Var('heist_failures').GetValue] de 2 deslizes antes de você ser pego#!"
 laamp_base_contract_schemes.3781.tt.increment_haul: "Adiciona [gold_i][varcheck.MakeScope.Var('haul_increment').GetValue|P0] à sua pilhagem"
 laamp_base_contract_schemes.3781.tt.foul_warning.increment: "Recebe #N +1#! deslize"
 laamp_base_contract_schemes.3781.tt.foul_warning.pot_lost: "Seus ganhos até aqui serão perdidos"
 laamp_base_contract_schemes.3781.tt.duel_success.skill: "Suas habilidades o recomendam"
 laamp_base_contract_schemes.3781.tt.duel_failure.skill: "Você chama atenção demais"
 laamp_base_contract_schemes.3781.tt.duel_success.agent: "[rollee.GetFirstNameNoTooltip] triunfa"
 laamp_base_contract_schemes.3781.tt.duel_failure.agent: "Seu agente falha com você"
 laamp_base_contract_schemes.3781.a: "Fiquem abaixados, #EMP facas em punho#!."
 laamp_base_contract_schemes.3781.b: "Aquela porta parece importante, arrombem-na!"
 laamp_base_contract_schemes.3781.c: "Patrulha vindo — peguem-nos dos dois lados."
 laamp_base_contract_schemes.3781.d: "Estou vendo uma caixa-forte..."
 laamp_base_contract_schemes.3781.e: "[rollee.GetFirstNameNoTooltip], o que você encontrou?"
 laamp_base_contract_schemes.3781.f: "[rollee.GetFirstNameNoTooltip], ponha o ombro nisso!"
 laamp_base_contract_schemes.3781.g: "Alguma sorte na sua busca, [rollee.GetFirstNameNoTooltip]?"
 laamp_base_contract_schemes.3781.h: "Muito bem, [rollee.GetFirstNameNoTooltip], mostre que vale o sal que come."
 laamp_base_contract_schemes.3781.i: "Só... mais... um pouco..."
 laamp_base_contract_schemes.3781.j: "Já temos o bastante, fujam!"
 laamp_base_contract_schemes.3781.j.stole_everything: "Cuidem dos sacos e vamos!"
 laamp_base_contract_schemes.3781.j.tt.flee_with_earnings: "Leve sua pilhagem atual e corra"
 laamp_base_contract_schemes.3782.t: "$laamp_base_contract_schemes.3041.t$: Sucesso!"
 laamp_base_contract_schemes.3782.desc.intro: "Como sombras na noite, já estamos longe.\n\nOs primeiros rugidos de alarme e indignação já são meros ecos distantes quando chegam aos nossos ouvidos, o som abafado de consequências longínquas"
 laamp_base_contract_schemes.3782.desc.haul_amount.grabbed_everything: "contrastando modestamente com o absoluto #EMP saque#! de bens roubados que encontramos em nosso colo, um verdadeiro tesouro de troféus negociáveis e metais preciosos."
 laamp_base_contract_schemes.3782.desc.haul_amount.grabbed_most: "que são facilmente ignoradas enquanto examinamos nosso glorioso saque, a riqueza acumulada de [employer.GetPrimaryTitle.GetBaseNameNoTier], pilhada dos salões [employer.Custom('ES_DelDela')] [employer.GetLadyLord] e amontoada de forma descuidada aos nossos pés."
 laamp_base_contract_schemes.3782.desc.haul_amount.grabbed_lots: "de pouco interesse quando nos encontramos com tamanha riqueza abundante em nossos braços. Claro, com certeza [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] tinha outros tesouros para saquear, mas ir longe demais é o primeiro erro —e, muitas vezes, o último— do ladrão amador.\n\nO delicioso peso de nossos ganhos já é suficiente para nos sobrecarregar enquanto voltamos contentes para casa."
 laamp_base_contract_schemes.3782.desc.haul_amount.grabbed_nothing: "que ressoam em nossos ouvidos enquanto voltamos suados para o ponto de encontro.\n\nApesar das minhas grandes declarações de que conseguiríamos dinheiro extra, saímos dos salões [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] sem uma mísera moeda para compensar o risco adicional.\n\nParece que esta noite teremos de nos contentar com o saque inicial."
 laamp_base_contract_schemes.3782.desc.haul_amount.grabbed_some: "alertando-nos de que talvez nossos ganhos extras venham com um custo maior.\n\nAinda assim, o que está feito, está feito, e temos um respeitável pequeno saque de prata, ouro e pedras preciosas para mostrar por nossos esforços. Deve render uma bela soma, no total."
 laamp_base_contract_schemes.3782.desc.outro: "\n\nNada mal para o trabalho de uma noite."
 laamp_base_contract_schemes.3782.a: "Heh, agora vamos vender esse Saque..."
 laamp_base_contract_schemes.3783.t: "$laamp_base_contract_schemes.3041.t$: Falha!"
 laamp_base_contract_schemes.3783.desc.intro: "O mundo noturno ganha vida em uma enxurrada de gritos, berros e urros. Nunca saberemos quem deu o alarme, mas, uma vez despertados, os defensores [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] eram numerosos demais para nós.\n\n"
 laamp_base_contract_schemes.3783.desc.haul_amount.grabbed_everything: "Tínhamos tudo — #EMP tudo#! — de qualquer coisa valiosa neste maldito [employer.Custom('FortifiedBuilding')|l], cada prato de prata, cada moeda de ouro, cada livro dourado, e agora se foi, tudo... se foi..."
 laamp_base_contract_schemes.3783.desc.haul_amount.grabbed_most: "Tanto dinheiro, tanto #EMP Saque#!, perdido. Tínhamos em mãos toda a riqueza acumulada de [employer.GetPrimaryTitle.GetBaseNameNoTier] e deixamos tudo simplesmente... escapar..."
 laamp_base_contract_schemes.3783.desc.haul_amount.grabbed_lots: "Tínhamos reunido um saque respeitável quando nos pegaram. Uma pena, de verdade... toda aquela prata teria sido vendida muito bem em uma cidade ou duas adiante..."
 laamp_base_contract_schemes.3783.desc.haul_amount.grabbed_nothing: "Ainda nem tínhamos pego nada."
 laamp_base_contract_schemes.3783.desc.haul_amount.grabbed_some: "Ainda não tínhamos pego muita coisa, mas, claro, poucos proprietários consideram a #EMP quantidade#! quando se deparam com um ladrão — em geral, só se perguntam se devem cortar a mão esquerda, a direita ou ambas."
 laamp_base_contract_schemes.3783.desc.outro: "\n\nSomos arrastados sem cerimônia, sob os gritos enfurecidos de [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l], direto para o calabouço."
 laamp_base_contract_schemes.3783.tt.haul_lost: "Todo o seu saque extra é perdido e retornado a [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l]"
 laamp_base_contract_schemes.3783.a: "Malditas sejam estas paredes infernais!"
 laamp_base_contract_schemes.3783.a.tt.a_cold_cell_awaits: "Uma cela fria aguarda..."
 laamp_base_contract_schemes.5661.t: "$laamp_base_contract_schemes.5034.t$: [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]"
 laamp_base_contract_schemes.5661.desc.intro.constantinople: "Nós nos encontramos do lado de fora das poderosas muralhas da venerável [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.plains: "Nosso ataque noturno nos leva às profundezas das planícies de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.farmlands: "Meu grupo e eu avançamos pelas densas terras agrícolas de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.hills: "Com facilidade, minhas forças deslizam entre as colinas de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.mountains: "Esta noite subimos as encostas baixas e contrafortes entre as montanhas de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.desert: "Nesta manhã avançamos para os desertos de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.desert_mountains: "Determinado a encontrar #EMP alguma coisa#!, meus saqueadores e eu exploramos as montanhas áridas de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.oasis: "Sob o sol escaldante do amanhecer, minhas tropas se espalham pelo verde oásis de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.jungle: "Cobertos por árvores sombreadas, avançamos para as selvas de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.forest: "Sob a ampla cobertura arbórea de [ROOT.Char.GetCurrentLocation.GetName], nós avançamos,"
 laamp_base_contract_schemes.5661.desc.intro.taiga: "Entre os pinheiros ásperos de [ROOT.Char.GetCurrentLocation.GetName], minhas forças se espalham,"
 laamp_base_contract_schemes.5661.desc.intro.wetlands: "No auge do meio-dia, nossos soldados de melhor visão entram nos pântanos de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.steppe: "Como já fazem há dias, minhas tropas percorrem a estepe sem fim de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.floodplains: "Sem muita escolha, meu bando é forçado a entrar nas abafadas planícies alagáveis de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.drylands: "Levantando poeira sem fim, meu grupo e eu nos espalhamos pelas terras secas de [ROOT.Char.GetCurrentLocation.GetName],"
 laamp_base_contract_schemes.5661.desc.intro.postamble: "buscando rebanhos vulneráveis de [ROOT.Char.Custom('RegionalFarmAnimalPlural')] para conduzir de volta ao nosso acampamento itinerante."
 laamp_base_contract_schemes.5661.desc.opportunity.01: "Vários candidatos promissores chamaram minha atenção durante nossas incursões recentes na região, mas até agora só vínhamos fazendo reconhecimento leve."
 laamp_base_contract_schemes.5661.desc.opportunity.02: "Até agora, as oportunidades por aqui vinham sendo um tanto escassas, com resistência forte demais para reunir qualquer número significativo de animais roubados. Finalmente, porém, encontramos propriedades rurais mal defendidas com rebanhos abundantes."
 laamp_base_contract_schemes.5661.desc.opportunity.03: "Embora esta área tenha parecido comparativamente fácil de brutalizar até agora, evitamos fazê-lo — esperando encontrar o alvo perfeito antes de soltar nosso pior lado. Esta noite, com a descoberta de uma propriedade fervilhante e cheia de gado gordo, encontramos nosso alvo."
 laamp_base_contract_schemes.5661.desc.opportunity.04: "Embora haja poucas grandes propriedades por aqui, as fazendas menores da região parecem adequadamente prósperas. Saqueá-las exigirá mais esforço, mas o retorno final ainda deve justificar o desgaste."
 laamp_base_contract_schemes.5661.desc.opportunity.05: "Os locais — ao menos, os que ousam se mostrar para nós — alegam pobreza, mas eu também alegaria isso no lugar deles se [ROOT.Char.GetPrimaryTitle.GetDefinitiveName|l] viesse bater à minha porta. Ao menos parecem ter rebanhos suficientes para nossas necessidades."
 laamp_base_contract_schemes.5661.desc.opportunity.06: "Não há espaço para piedade, nem margem para reconhecer o mal que estamos fazendo a esses pobres camponeses miseráveis. Os animais deles virão para nós, ou nós os passaremos ao fio da espada — é simplesmente assim que é."
 laamp_base_contract_schemes.5661.desc.outro: "\n\nAgora chega a hora da violência."
 laamp_base_contract_schemes.5661.tt.encounter_tally: "#TUT Este é o encontro [task_contract.MakeScope.Var('encounter_tally').GetValue|0] de [task_contract.MakeScope.Var('encounter_max').GetValue|0]#!"
 laamp_base_contract_schemes.5661.tt.current_successes: "#TUT Você atualmente tem [task_contract.MakeScope.Var('wins_tally').GetValue|0] roubos de gado bem-sucedidos#!"
 laamp_base_contract_schemes.5661.tt.score_gained: "#P +1#! roubo de gado bem-sucedido"
 laamp_base_contract_schemes.5661.tt.no_score_gain: "Você não consegue roubar uma quantidade significativa de animais"
 laamp_base_contract_schemes.5661.a: "Abatam quaisquer tolos que se oponham a nós!"
 laamp_base_contract_schemes.5661.a.tt.success: "Sua crueldade compensa"
 laamp_base_contract_schemes.5661.a.tt.failure: "Os locais conseguem se opor a você"
 laamp_base_contract_schemes.5661.b: "Lembrem-se, fiquem juntos, foquem nas bestas."
 laamp_base_contract_schemes.5661.b.tt.success: "Sua disciplina se mantém firme"
 laamp_base_contract_schemes.5661.b.tt.failure: "Suas tropas estão separadas demais"
 laamp_base_contract_schemes.5661.c: "Peguem apenas os melhores, deixem o aceitável para esses cães."
 laamp_base_contract_schemes.5661.c.tt.success: "Você rouba os melhores animais"
 laamp_base_contract_schemes.5661.c.tt.failure: "Seus saqueadores se mostram exigentes demais"
 laamp_base_contract_schemes.5661.d: "[officer.GetFirstNameNoTooltip], isto é... adjacente ao seu campo, sim?"
