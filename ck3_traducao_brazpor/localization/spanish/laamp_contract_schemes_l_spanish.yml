 laamp_base_contract_schemes.0661.t.preface: "Mediador Pago"
 laamp_base_contract_schemes.0661.t: "$laamp_base_contract_schemes.0661.t.preface$: Dever Desigual"
 laamp_base_contract_schemes.0661.desc: "O problema nesta região parece bastante simples: de um lado, os moradores afirmam que lhes é exigido enviar excessiv[dummy_soldier.Custom('ES_OA')]s [dummy_soldier.GetWomenMen] ao serviço militar, enquanto o outro lado afirma o contrário.\n\nObter mais detalhes deles do que isso inevitavelmente degenera em gritos e forquilhas erguidas. Ambos os lados parecem mais do que dispostos a se matar discutindo sobre quem deve contribuir mais para a defesa coletiva."
 laamp_base_contract_schemes.0661.a: "Vamos conversar sobre isso."
 laamp_base_contract_schemes.0661.b: "Logística, é? Parece solucionável."
 laamp_base_contract_schemes.0661.c: "Hmmm, o que dizem os registros..."
 laamp_base_contract_schemes.0662.t: "$laamp_base_contract_schemes.0661.t.preface$: Acusador e Acusado"
 laamp_base_contract_schemes.0662.desc: "Ao que parece, a disputa em [location.GetName] gira em torno de um grupo local de pequenos criminosos, escondidos nas terras selvagens.\n\nOs moradores estão divididos em cerca de uma dúzia de facções em conflito, cada uma delas #EMP convencida#! de que uma ou mais das outras estão secretamente aliadas aos saqueadores, fornecendo-lhes ajuda e apoio.\n\nNenhuma delas está disposta a colaborar no assunto."
 laamp_base_contract_schemes.0662.a: "Isso tudo me parece apenas rumores maldosos..."
 laamp_base_contract_schemes.0662.b: "Bandidos? Um problema facilmente resolvido!"
 laamp_base_contract_schemes.0662.c: "Tenho certeza de que consigo detectar o mentiroso aqui."
 laamp_base_contract_schemes.0662.d: "Ouso dizer que consigo lidar com seu problema."
 laamp_base_contract_schemes.0663.t: "$laamp_base_contract_schemes.0661.t.preface$: Coisas Celestiais"
 laamp_base_contract_schemes.0663.desc: "Pelo que consegui reunir, o povo de [location.GetName] está a #EMP isto#! de matar uns aos outros por uma disputa teológica tão pequena que eles mal conseguem explicar sua relevância a forasteiros.\n\nNada inflama as pessoas como assuntos de fé, para o bem ou para o mal, mas preciso que elas parem, respirem e se acalmem. De preferência sem derramamento de sangue."
 laamp_base_contract_schemes.0663.a: "Vamos manter a calma e lembrar nossos juramentos, sim?"
 laamp_base_contract_schemes.0663.b: "Isso me parece motim, e nós podemos #EMP resolver#! isso."
 laamp_base_contract_schemes.0663.c: "Deixem-me explicar algumas coisas a todos vocês..."
 laamp_base_contract_schemes.0664.t: "$laamp_base_contract_schemes.0661.t.preface$: Vendeta Local"
 laamp_base_contract_schemes.0664.desc: "Em [location.GetName] , o povo escolheu seguir o caminho da sede de sangue e vingança.\n\nNão sei ao certo o que causou a espiral inicial; todos os lados acusam os demais de #EMP diversos#! assassinatos, roubos e ocasionais casos de incêndio criminoso, mas agora não há nada além de sangue ruim prestes a ser derramado.\n\nNada ideal para a arrecadação local de impostos."
 laamp_base_contract_schemes.0664.a: "Pessoas! Vocês são vizinhos, sejam civilizados!"
 laamp_base_contract_schemes.0664.b: "Se vocês não ficarem calmos, podem ser acalmados à força."
 laamp_base_contract_schemes.0664.c: "Vocês vão apertar as mãos, ou vão perder as mãos. Escolham."
 laamp_base_contract_schemes.0665.t: "$laamp_base_contract_schemes.0661.t.preface$: Lidando com Pedágios"
 laamp_base_contract_schemes.0665.desc: "Ao que parece, algum tolo idiota recentemente emboscou vários funcionários locais importantes. Ninguém ficou seriamente ferido, mas o imbecil saiu correndo aos gritos sobre tributação antes que pudesse ser detido.\n\nNem é preciso dizer que toda queixa menor concebível ha brotado à superfície #EMP imediatamente#! com a minha chegada, pois os locais se voltam uns contra os outros numa tentativa frenética de evitar uma punição coletiva.\n\nAinda assim, ao menos um idiota corajoso tem a sabedoria de sugerir que isso pode ser resultado dos recentes aumentos de impostos."
 laamp_base_contract_schemes.0665.a: "Isto acaba #EMP agora#! — entenderam?"
 laamp_base_contract_schemes.0665.b: "Talvez o fardo possa ser reduzido um pouco..."
 laamp_base_contract_schemes.0665.c: "Vocês vão me dizer quem fez isso. Por vontade própria ou não."
 laamp_base_contract_schemes.0666.t: "$laamp_base_contract_schemes.0661.t.preface$: Problemas de Endividamento"
 laamp_base_contract_schemes.0666.desc: "A coisa mais importante que qualquer comunidade pode oferecer é, no que diz respeito aos seus senhores, seus impostos regulares.\n\nPortanto, é preocupante que o povo de [location.GetName] não tenha pago o seu; ao menos, integralmente.\n\nAh, sim, eles têm todo tipo de desculpas e motivos pelos quais isso pode ter acontecido, mas, em sua maior parte, é apenas que os maiores assentamentos conspiraram para implicar com um povoado rico e em ascensão."
 laamp_base_contract_schemes.0666.a: "Tenho certeza de que isto tudo é apenas um mal-entendido."
 laamp_base_contract_schemes.0666.b: "Ah, acho que entendi o problema..."
 laamp_base_contract_schemes.0666.c: "Estes números não parecem fechar, não é?"
 laamp_base_contract_schemes.0667.t: "$laamp_base_contract_schemes.0661.t.preface$: Na Palma da Mão"
 laamp_base_contract_schemes.0667.desc: "Uma certa quantidade de derramamento de sangue é permitida em qualquer comunidade antes que um poder superior se envolva. Assassinato mesquinho, banditismo leve, talvez o animal de prêmio de um rival abatido injustamente durante a noite... Se os impostos fluem, a justiça local geralmente consegue lidar com essas coisas.\n\nQuando aparecem os cretinos dispostos a envolver os funcionários de fora com queixas triviais, esse privilégio se encerra.\n\nOs tolos de [location.GetName] cometeram esse erro, ao afirmar que um coletor de impostos local estava a serviço do inimigo jurado de alguém. A verdade do caso não tem importância; fazer cumprir a lei, sim."
 laamp_base_contract_schemes.0667.a: "Vocês #EMP vão#! deixar os oficiais fora disso."
 laamp_base_contract_schemes.0667.b: "Vocês têm ideia de qual será a multa da próxima vez?"
 laamp_base_contract_schemes.0667.c: "Vocês param por escolha, ou eu #EMP faço#! vocês pararem."
 laamp_base_contract_schemes.0668.t: "$laamp_base_contract_schemes.0661.t.preface$: Mártir de Todos"
 laamp_base_contract_schemes.0668.desc: "A morte de uma venerada figura local, um eremita piedoso ou sei lá o quê, causou muito lamento e ranger de dentes em [location.GetName], a ponto de paralisar completamente a administração cotidiana.\n\nA consternação decorre da ausência do corpo. Embora várias testemunhas afirmem ter visto o último suspiro do asceta, o cadáver desapareceu.\n\nVários lugarejos notáveis se acusam mutuamente de tê-lo roubado, outros afirmam que é um sinal divino e os mais cínicos não acreditam em nada disso."
 laamp_base_contract_schemes.0668.a: "Um verdadeiro [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetAdherentNameNoTooltip] é amado por todos!"
 laamp_base_contract_schemes.0668.b: "Morto? Ou foi enganar em outro lugar?"
 laamp_base_contract_schemes.0668.c: "Sua briga é ímpia."
 laamp_base_contract_schemes.0669.t: "$laamp_base_contract_schemes.0661.t.preface$: Sob o Polegar"
 laamp_base_contract_schemes.0669.desc: "O povo de [location.GetName] afirma não ter problemas, não saber por que seus impostos estão atrasados nem quem apresentou reclamações ao seu governante.\n\nSó um tolo não perceberia o medo em seus olhos ou o suor em suas testas. Essas pessoas estão sendo coagidas por alguém e ficam caladas por medo de represália."
 laamp_base_contract_schemes.0669.a: "Nunca tema um fora da lei mais do que a própria lei."
 laamp_base_contract_schemes.0669.b: "Eu posso mostrar a vocês o significado do medo!"
 laamp_base_contract_schemes.0669.c: "Digam-me onde eles se escondem, e eu resolvo isso."
 laamp_base_contract_schemes.0670.t: "$laamp_base_contract_schemes.0661.t.preface$: Crise da Alma"
 laamp_base_contract_schemes.0670.desc: "Em [location.GetName] todos falam exclusivamente de uma coisa: um peculiar artigo local do [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetName|l] que parece ter surgido de debates teológicos primitivos.\n\nEste seria um tema interessante —embora árido— para a discussão teológica entre plebeus piedosos, mas os muito tolos parecem ter se deixado contagiar pelo espírito do debate.\n\nCom insultos cada vez mais grosseiros a cada dia que passa, é só questão de tempo até que teorias empoeiradas desembocem em facadas pelas ruas."
 laamp_base_contract_schemes.0670.a: "Por favor, não somos todos amigos?"
 laamp_base_contract_schemes.0670.b: "Permitam-me explicar..."
 laamp_base_contract_schemes.0670.c: "Parem. De. Falar. Bobagem."
 laamp_base_contract_schemes.0671.t: "$laamp_base_contract_schemes.0661.t.preface$: Um Trabalho Quase Feito"
 laamp_base_contract_schemes.0671.desc: "Trabalhamos o suficiente para merecer o pagamento que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] nos prometeu.\n\nSe conseguirmos resolver o último problema, então garantimos nosso bônus, mas se só piorarmos as coisas… lá se vai #EMP todos#! todo nosso pagamento.\n\nDevemos avisar ou não?"
 laamp_base_contract_schemes.0671.a: "Bom o bastante já está bom!"
 laamp_base_contract_schemes.0671.a.tt: "Você entrega o contrato pela recompensa regular"
 laamp_base_contract_schemes.0671.b: "O trabalho só acaba quando #EMP acaba#!."
 laamp_base_contract_schemes.0671.b.tt: "Você arrisca o último desafio, esperando ganhar o bônus total — #X você não ganhará nada se falhar nele#!"
 laamp_base_contract_schemes.0781.t: "Tentações da Bolsa"
 laamp_base_contract_schemes.0781.desc: "Tenho consciência de que, no longo prazo, ganha-se mais dinheiro ao enganar mãos dispostas do que ao tirar de mãos descuidadas. Sei disso, eu entendo.\n\nMas, quando percorro a corte [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] e vejo a riqueza que ele acumulou de forma tão casual, sem falar do quão mal protegida está, não consigo deixar de me perguntar se não poderíamos nos aprofundar #EMP um pouco#! em formas alternativas de ganhar dinheiro."
 laamp_base_contract_schemes.0781.a: "Sem dúvida podemos arrancar um adiantamento..."
 laamp_base_contract_schemes.0781.a.tt.success: "Você convence [target.GetFirstNameNoTooltip] a dar um presente generoso"
 laamp_base_contract_schemes.0781.a.tt.failure: "Seus ardis falham com você"
 laamp_base_contract_schemes.0781.b: "[target.GetFirstNameNoTooltip] não pode protegê-lo #EMP todo#!."
 laamp_base_contract_schemes.0781.b.tt.success: "Dedos leves, bolsas cheias"
 laamp_base_contract_schemes.0781.b.tt.failure: "Quase pego"
 laamp_base_contract_schemes.0781.c: "Jogue um roubo descarado nas costas de [stooge.GetFirstNameNoTooltip]"
 laamp_base_contract_schemes.0781.c.tt.success: "O crime perfeito"
 laamp_base_contract_schemes.0781.c.tt.failure: "Farsa óbvia"
 laamp_base_contract_schemes.0781.d: "Certamente muros são fáceis de escalar?"
 laamp_base_contract_schemes.0781.d.tt.success: "Você retorna após o anoitecer"
 laamp_base_contract_schemes.0781.d.tt.failure: "Sentinelas o afastam"
 laamp_base_contract_schemes.0781.e: "Vamos manter isto (relativamente) honesto."
 laamp_base_contract_schemes.0791.t: "A Arte de Delegar"
 laamp_base_contract_schemes.0791.desc: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] tem sua corte e eu tenho a minha.\n\nA diferença é que, enquanto os servos de [target.GetFirstNameNoTooltip] se contentam em viver de sua generosidade, #EMP mis#! seguidores estão decididos a me ajudar a conseguir um pouco dessa mesma fortuna.\n\nEu passo meus dias trabalhando para a recompensa que acabará chegando, e eles, em troca, podem despojar [target.GetFirstNameNoTooltip] aproveitando que está ocupad[target.Custom('ES_OA')]. É sempre bom saber que temos pessoas em quem podemos confiar."
 laamp_base_contract_schemes.0791.tt.success: "Seu oficial vence"
 laamp_base_contract_schemes.0791.tt.failure: "Seu oficial falha com você"
 laamp_base_contract_schemes.0791.a: "Comigo, [second.GetFirstNameNoTooltip] vamos manter[target.GetHerHim] ocupado[target.Custom('ES_OA')]."
 laamp_base_contract_schemes.0791.b: "Para o armazém, [quartermaster.GetFirstNameNoTooltip]."
 laamp_base_contract_schemes.0791.c: "[armourer.GetFirstNameNoTooltip] provavelmente consegue entrar no arsenal!"
 laamp_base_contract_schemes.0791.d: "[chief_forager.GetFirstNameNoTooltip], vá atrás dos jardins deles."
 laamp_base_contract_schemes.0791.e: "[master_thief.GetFirstNameNoTooltip] sabe #EMP exatamente#! o que fazer."
 laamp_base_contract_schemes.0791.f: "[head_groom.GetFirstNameNoTooltip], para os estábulos."
 laamp_base_contract_schemes.0791.g: "[huntperson.GetFirstNameNoTooltip] pode saquear seus alojamentos de caça."
 laamp_base_contract_schemes.0791.h: "[witness.GetFirstNameNoTooltip] pode espalhar meu bom nome enquanto eu..."
 laamp_base_contract_schemes.0791.i: "[camp_cook.GetFirstNameNoTooltip], para as despensas, #EMP vá#!."
 laamp_base_contract_schemes.0791.j: "[master_bard.GetFirstNameNoTooltip] é uma distração capaz."
 laamp_base_contract_schemes.0791.k: "Contanto que [stooge.GetFirstNameNoTooltip] leve a culpa..."
 laamp_base_contract_schemes.0791.l: "[master_of_spoils.GetFirstNameNoTooltip], saqueie tudo que não estiver pregado."
 laamp_base_contract_schemes.0791.m: "Arriscado demais, é melhor não."
 laamp_base_contract_schemes_0791_suspicious_officers_modifier: "Oficiais Suspeitos"
 laamp_base_contract_schemes_0791_suspicious_officers_modifier_desc: "Figuras estranhas penduradas pelos cantos e pessoas suspeitas ao fundo raramente passam credibilidade."
 laamp_base_contract_schemes_0791_plentiful_horses_modifier: "Montarias em Abundância"
 laamp_base_contract_schemes_0791_plentiful_horses_modifier_desc: "Ora, que número curiosamente grande de montarias excedentes!"
 laamp_base_contract_schemes.0801.t: "Bajulação Lucrativa"
 laamp_base_contract_schemes.0801.desc: "Nosso objetivo final é, sem dúvida, roubar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] o máximo de riquezas que conseguirmos fazer com que nos dê, mas, até lá, quanto melhor [target.GetSheHe] pense de nós, maiores serão nossas chances.\n\nNão precisa ser nada #EMP excesivamente#! descarado. Alguns elogios sinceros, risadas bem colocadas, uma surpresa fingida na medida certa… o bastante para que [target.GetFirstNameNoTooltip] se sinta poderos[target.Custom('ES_OA')] entre nós."
 laamp_base_contract_schemes.0801.a: "Conseguiremos muito mais se causarmos uma boa impress?o."
 laamp_base_contract_schemes.0801.a.tt.success: "Você se agracia com [target.GetSheHe]"
 laamp_base_contract_schemes.0801.a.tt.failure: "Você precisa ir embora"
 laamp_base_contract_schemes.0801.b: "Um pouco de capital social não faria mal..."
 laamp_base_contract_schemes.0801.c: "[bard.GetFirstNameNoTooltip] dá conta disso!"
 laamp_base_contract_schemes.0801.c.tt.success: "[bard.GetFirstNameNoTooltip] encanta [target.GetFirstName]"
 laamp_base_contract_schemes.0801.c.tt.failure: "Um charlatão irritante"
 laamp_base_contract_schemes.0801.d: "Isto está abaixo de mim."
 laamp_base_contract_schemes_0801_target_good_graces_modifier: "Boa Graça"
 laamp_base_contract_schemes_0801_target_good_graces_modifier_desc: "Quando as pessoas certas gostam de você, as outras importam menos."
 laamp_base_contract_schemes_0801_target_irritated_modifier: "Irritação"
 laamp_base_contract_schemes_0801_target_irritated_modifier_desc: "Algumas pessoas são como moscas, sempre zumbindo por perto."
 laamp_base_contract_schemes.0811.t: "Bico"
 laamp_base_contract_schemes.0811.desc: "Parece que [agent.GetFirstName] tem trabalhado para alcançar #EMP otras#! metas além da que temos com [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l].\n\nTem usado seu tempo na corte para preparar o terreno para arrancar uma boa quantia de [target.GetFirstNameNoTooltip]…, algo que ele deixou de me contar antes que [agent.GetHerHim] ouvisse ele se gabando disso para um dos ajudantes do acampamento."
 laamp_base_contract_schemes.0811.a: "Que iniciativa! Claro, vamos dividir seus ganhos."
 laamp_base_contract_schemes.0811.a.tt.success: "Vocês dois fazem umas moedas"
 laamp_base_contract_schemes.0811.a.tt.failure: "Fraudadores desesperados"
 laamp_base_contract_schemes.0811.b: "Siga em frente, siga em frente."
 laamp_base_contract_schemes.0811.c.tt.success: "[agent.GetFirstNameNoTooltip] faz umas moedas"
 laamp_base_contract_schemes.0811.c.tt.failure: "Fraude desesperada"
 laamp_base_contract_schemes.0811.c: "Pare com isso, seu tolo! Você põe meu trabalho em risco!"
 #################################################
 #On-Going Martial & Prowess Scheme Events
 laamp_base_contract_schemes.1301.t: "$laamp_base_contract_schemes.1004.t$"
 laamp_base_contract_schemes.1301.desc.intro.preamble.first: "Encontramos [recidivist.GetFirstNameNicknamed] pela primeira vez em"
 laamp_base_contract_schemes.1301.desc.intro.preamble: "Alcançamos [recidivist.GetFirstNameNicknamed] em"
 laamp_base_contract_schemes.1301.desc.intro.plains: "as ondulantes planícies de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.farmlands: "as exuberantes terras agrícolas de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.hills: "as colinas escarpadas de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.mountains: "as altas montanhas de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.desert: "os desertos escaldantes de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.desert_mountains: "as montanhas impiedosamente áridas de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.oasis: "o exuberante oásis em [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.jungle: "as densas selvas de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.forest: "as florestas sombrias de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.taiga: "as vastas florestas de pinheiros de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.wetlands: "os fétidos pântanos de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.steppe: "a estepe sem fim de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.floodplains: "as úmidas planícies de inundação de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.drylands: "as poeirentas terras secas de [current_county.GetBaseNameNoTier]."
 laamp_base_contract_schemes.1301.desc.intro.postamble: "[ROOT.Char.GetPrimaryTitle.GetDefinitiveName] se estende em direção e ao redor de sua própria pequena banda de malfeitores, todos nós tensos e prontos para o derramamento de sangue."
 laamp_base_contract_schemes.1301.desc.encounters.first.relation.good: "\"[ROOT.Char.GetFirstNameNoTooltip], meu [recidivist.Custom2('RelationToMeShort',ROOT.Char)]\", começa [recidivist.GetFirstNameNoTooltip], quebrando o silêncio. \"Eu... não esperava você. De todas as pessoas que poderiam vir atrás de mim, alguém tão querido...\""
 laamp_base_contract_schemes.1301.desc.encounters.first.relation.bad: "«Ah, [ROOT.Char.GetFirstNameNoTooltip], que outro[ROOT.Char.Custom('ES_OA')] idiota com cérebro de bosta me perseguiria com tanta ânsia\"», diz [recidivist.GetFirstNameNoTooltip], avançando a passos largos. «A verdade é que estou aliviado. Matar a maioria das pessoas é chato, mas te esventrar será um #EMP prazer#!»."
 laamp_base_contract_schemes.1301.desc.encounters.first.family: "\"[ROOT.Char.GetFirstNameNoTooltip], meu [recidivist.Custom2('RelationToMeShort',ROOT.Char)], meu próprio sangue — por que você me persegue aqui? Espera vingar os insultos que lancei contra o nome da família [ROOT.Char.GetHouse.GetName]?\""
 laamp_base_contract_schemes.1301.desc.encounters.first.general_reaction.angry: "\"Seu canalha chorão e ignorante!\", rosna [recidivist.GetFirstNameNoTooltip] para cumprir a vontade de [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l], hein? Então vinde, cão, enfrentai-me e provai que não sois nada além de um cãozinho de colo que fica latindo!\"."
 laamp_base_contract_schemes.1301.desc.encounters.first.general_reaction.haughty: "\"Ora, vamos ver... ah, #EMP lá está [ROOT.Char.GetHerHim]#!\", troveja [recidivist.GetFirstNameNoTooltip] enquanto abre caminho aos cotoveladas e vai para a frente da multidão, \"[Select_CString( ROOT.Char.IsFemale, 'a donzelinha perdida', 'o senhorzinho perdido' )] que acha que vai me pôr no meu lugar! Muito bem, então, venha, [ROOT.Char.GetFirstNameNoTooltip]! Aqui estou eu!\""
 laamp_base_contract_schemes.1301.desc.encounters.first.general_reaction.doleful: "\"Quem dera não tivéssemos nos encontrado sob circunstâncias tão desfavoráveis, [ROOT.Char.GetFirstNameNoTooltip], pois não tenho desavença alguma com você\", opina [recidivist.GetFirstNameNoTooltip], \"mas temo que você pretenda seguir seu dever até o amargo fim.\""
 laamp_base_contract_schemes.1301.desc.encounters.first.general_reaction.merry: "\"Ha!\" ri [recidivist.GetFirstNameNoTooltip], \"foi só isso que você trouxe? Excelente, #EMP excelente#!, um pouco de bom esporte finalmente! E você veio pessoalmente também — vou gostar de pôr você na terra, [ROOT.Char.GetFirstNameNoTooltip].\""
 laamp_base_contract_schemes.1301.desc.encounters.first.general_reaction.taciturn: "«Hum…», murmura [recidivist.GetFirstNameNoTooltip] coçando o queixo. «Eu… esperava mais, para ser sincero. Claramente o bom orçamento [Select_CString( employer.IsFemale, 'da boa', 'do bom' )] [employer.GetTitleAsName|l] não é mais o que era. Então, começamos\"»."
 laamp_base_contract_schemes.1301.desc.encounters.second: "\"De volta tão cedo, [ROOT.Char.GetFirstNameNoTooltip]? Depois da última vez, achei que você tivesse aprendido a lição, mas parece que teremos de ensiná-la do jeito difícil.\""
 laamp_base_contract_schemes.1301.desc.encounters.third: "\"Maldit[ROOT.Char.Custom('ES_OA')] sejais v?s e maldita seja vossa insistência infernal. Não deixareis de nos perseguir nunca, [ROOT.Char.GetFirstNameNoTooltip]? Buscai outro trabalho em outro lugar, pois não tirareis prata do nosso sangue!\"."
 laamp_base_contract_schemes.1301.desc.outro.1: "O momento se equilibra no fio de uma faca. Se eu não agir, outra pessoa agirá, e tudo escapará completamente do meu controle."
 laamp_base_contract_schemes.1301.desc.outro.2: "O grupo de [recidivist.GetFirstNameNoTooltip] está claramente em desvantagem numérica, mas, ainda assim, parecem resolutos — dispostos a defender seu líder ou morrer na tentativa."
 laamp_base_contract_schemes.1301.desc.outro.3: "Uma terrível quietude toma conta de nossas forças reunidas. Ninguém quer realmente quebrar o silêncio, por medo do que possa vir depois."
 laamp_base_contract_schemes.1301.desc.outro.4: "Ambos os grupos aguardam com a respiração presa, sem saber o que direi a seguir e esperando contra toda esperança que seja algo além de uma ordem para matar."
 laamp_base_contract_schemes.1301.desc.outro.5: "[recidivist.GetFirstNameNoTooltip] não pode vencer aqui e sabe disso, ao menos não abertamente. Mas se me escapar de minhas mãos…"
 laamp_base_contract_schemes.1301.tt.insta_win: "#P +2#! pontos de vitória, um $label_success_standard$ instantâneo"
 laamp_base_contract_schemes.1301.tt.score_increased: "#P +1#! pontos de vitória"
 laamp_base_contract_schemes.1301.tt.success_score_and_threshold: "#TUT Você tem [task_contract.MakeScope.Var('wins_tally').GetValue|0] dos 2 pontos de vitória necessários para um $label_success_standard$#!"
 laamp_base_contract_schemes.1301.tt.chances_remaining: "#TUT Este é o encontro [task_contract.MakeScope.Var('encounters_tally').GetValue|0] de até 3 #!"
 laamp_base_contract_schemes.1301.a: "Venha, [recidivist.Custom2('InsultNoun', ROOT.Char)]!"
 laamp_base_contract_schemes.1301.a.tt.duel_begins: "#X @warning_icon! Você imediatamente enfrenta [recidivist.GetFirstName] em um duelo até a [character_death_death|lE]#!"
 laamp_base_contract_schemes.1301.b: "Guardas, peguem [recidivist.GetSheHe]!"
 laamp_base_contract_schemes_1301.b.tt.success_crit: "Sua banda de guerra é aniquilada"
 laamp_base_contract_schemes_1301.b.tt.success: "Sua banda de guerra é devastada"
 laamp_base_contract_schemes_1301.b.tt.failure: "[recidivist.GetFirstNameNoTooltip] escapa do laço"
 laamp_base_contract_schemes.1301.b.tt.failure.tt: "[recidivist.GetFirstName] escapa"
 laamp_base_contract_schemes.1301.c: "Sinalize para uma emboscada avançar por trás."
 laamp_base_contract_schemes_1301.c.tt.success_crit: "Você põe em fuga todas as suas forças."
 laamp_base_contract_schemes_1301.c.tt.success: "Uma estratégia sólida prevalece"
 laamp_base_contract_schemes_1301.c.tt.failure: "$laamp_base_contract_schemes_1301.b.tt.failure$"
 laamp_base_contract_schemes.1301.d: "Deixe as tropas esmagarem esses bandidos."
 laamp_base_contract_schemes.1301.d.tt.not_enough_troops: "Você precisa de pelo menos [EmptyScope.ScriptValue('laamp_base_contract_schemes_1301_min_troops_value')|0] [men_at_arms|lE]"
 laamp_base_contract_schemes.1301.e: "Sabe, eu admiro uma pessoa de vontade…"
 laamp_base_contract_schemes.1301.e.tt.success: "[recidivist.GetFirstNameNoTooltip] junta-se a [ROOT.Char.GetPrimaryTitle.GetDefinitiveNameNoTooltip|l]"
 laamp_base_contract_schemes.1301.e.tt.failure: "[recidivist.GetFirstNameNoTooltip] não quer nada com você"
 laamp_base_contract_schemes.1301.e.tt.failure.tt: "[recidivist.GetSheHe|U] usa sua demora para fugir"
 laamp_base_contract_schemes.1301.f: "Sabe? Eu poderia usar alguém como você…"
 laamp_base_contract_schemes.1302.t: "$laamp_base_contract_schemes.1004.t$: Sucesso!"
 laamp_base_contract_schemes.1302.desc.intro: "Lanço a cabeça decepada de [recidivist.GetFirstNameNicknamed] ao agente [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l]; a carne vermelho-escura cai úmida ao lado dele.\n\n"
 laamp_base_contract_schemes.1302.desc.method.prowess_sce: "\"Você matou [recidivist.GetHerHim|U] em combate individual? Nossa, que #EMP ferocidade#!\","
 laamp_base_contract_schemes.1302.desc.method.prowess_non_sce: "Uma jogada sensata fazer com que seus guardas [recidivist.GetHerHim] abatessem, [ROOT.Char.Custom('FormOfAddressForLiege')]; quem sabe o que teria acontecido se tivesse se aproximado mais?"
 laamp_base_contract_schemes.1302.desc.method.martial: "\"Um golpe magistral conseguir eliminar este bastardo sem sofrer perdas significativas, [ROOT.Char.Custom('FormOfAddressForLiege')] — não tenho certeza de que muitos teriam concebido isso\","
 laamp_base_contract_schemes.1302.desc.method.meat: "\"Muito sábio deixar que suas tropas lidassem com essa escória, [ROOT.Char.GetLadyLord]; [recidivist.GetFirstNameNoTooltip] era astuto demais[recidivist.Custom('ES_OA')] para lhe dar qualquer chance de fuga\","
 laamp_base_contract_schemes.1302.desc.outro: "comenta o servo [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l], ao mesmo tempo em que nos entrega cuidadosamente nossa paga.\n\nAs palavras têm pouca importância, mas o delicioso peso da bolsa gorda e sua carga de prata ajudam a fazer com que nossa pequena caçada tenha valido totalmente a pena."
 laamp_base_contract_schemes.1302.a: "Um trabalho bem feito."
 laamp_base_contract_schemes.1302.a.tt: "$laamp_base_contract_schemes.0000.f.contract_concluded$"
 laamp_base_contract_schemes.1303.t: "$laamp_base_contract_schemes.1004.t$: Falha!"
 laamp_base_contract_schemes.1303.desc.intro: "Com isso, [recidivist.GetFirstNameNicknamed] finalmente consegue despistar nossa perseguição,"
 laamp_base_contract_schemes.1303.desc.method.prowess_non_sce: "apesar de nossos melhores esforços para prender[recidivist.GetHerHim] ."
 laamp_base_contract_schemes.1303.desc.method.martial: "rompendo a emboscada com força total e fugindo com rapidez."
 laamp_base_contract_schemes.1303.desc.method.diplo_bandit: "fugindo discretamente sob o pretexto de considerar se juntar seu bando ao nosso grupo de [ROOT.Char.Custom('GetLaampDescribeTypeSelfPlural')]."
 laamp_base_contract_schemes.1303.desc.method.diplo_non_bandit: "escapando sob o disfarce de fingir ponderar minha oferta generosa."
 laamp_base_contract_schemes.1303.desc.outro: "Os agentes [task_contract_employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] ficam decepcionados quando me alcançam, mas não ficam nem um pouco surpresos. Por mais que entendam, sem cabeça para levar à sua [employer.Custom('MistressMaster')], não têm nenhuma intenção de nos pagar."
 laamp_base_contract_schemes.1303.a: "Maldito [recidivist.GetWomanMan], um verdadeiro tumor!"
 laamp_base_contract_schemes.1303.a.tt: "$laamp_base_contract_schemes.0000.f.contract_concluded$"
 laamp_base_contract_schemes.1304.t: "$laamp_base_contract_schemes.1004.t$: Falha Especial!"
 laamp_base_contract_schemes.1304.desc: "[recidivist.GetFirstNameNicknamed] responde... surpreendentemente bem à minha oferta e, depois de conversarmos um pouco, consigo convencer[recidivist.GetHerHim] de que não sou apenas sincer[ROOT.Char.Custom('ES_OA')], mas também de que posso oferecer um futuro melhor e mais promissor tanto para [recidivist.GetSheHe] como para toda a sua banda.\n\nEm consequência, todos eles se juntaram a [ROOT.Char.GetPrimaryTitle.GetDefinitiveName|l].\n\nÉ claro que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] não me perdoe por trair sua confiança, mas, no fim das contas, resolvi o problema do meu jeito, não foi?"
 laamp_base_contract_schemes.1304.a: "[employer.GetFirstNameNoTooltip] pode ir para a forca por mim."
 laamp_base_contract_schemes.1304.a.tt: "$laamp_base_contract_schemes.0000.f.contract_concluded$"
 laamp_base_contract_schemes.1782.t: "$laamp_base_contract_schemes.1041.t$: [victim.GetTitledFirstNameNoTooltip|l]"
 laamp_base_contract_schemes.1782.desc.intro.1: "Nesta manhã, avistamos ao longe uma coluna de pessoas —"
 laamp_base_contract_schemes.1782.desc.intro.2: "Várias horas antes do pôr do sol, cruzamos com um grupo de viajantes —"
 laamp_base_contract_schemes.1782.desc.intro.3: "Por volta do meio-dia, alcançamos uma caravana que vínhamos seguindo há dias —"
 laamp_base_contract_schemes.1782.desc.intro.4: "Pouco depois do amanhecer, um pequeno grupo de viajantes aparece no horizonte —"
 laamp_base_contract_schemes.1782.desc.intro.5: "Pouco antes do fim da luz, começamos a alcançar a cauda de uma longa coluna —"
 laamp_base_contract_schemes.1782.desc.connection.negative: "que ao que parece é liderado por [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l], [victim.Custom2('RelationToMeShort',ROOT.Char)] de mim[victim.Custom('ES_OA')]."
 laamp_base_contract_schemes.1782.desc.connection.positive: "à frente deles está [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l], meu [victim.Custom2('RelationToMeShort',ROOT.Char)] a quem eu relutaria em fazer mal."
 laamp_base_contract_schemes.1782.desc.connection.family_or_consort: "que parece ser liderado por ninguém menos que [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l], meu [victim.Custom2('RelationToMeShort',ROOT.Char)]!"
 laamp_base_contract_schemes.1782.desc.connection.none: "à sua frente está [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l], ao menos segundo meus batedores, conduzindo o restante pelo seu caminho sinuoso."
 laamp_base_contract_schemes.1782.desc.victim_type.pool: "Pela aparência, o grupo não passa de andarilhos itinerantes; a única riqueza que possuem é o que conseguem carregar e o que seu bom nome talvez lhes garanta em presentes."
 laamp_base_contract_schemes.1782.desc.victim_type.baron: "Com um[victim.Custom('ES_XA')] [victim.GetTitleAsNameNoTooltip|l] à frente, é evidente que o grupo tem #EMP cierta#! riqueza, mas não está exatamente nadando em moedas. Ainda assim, uma presa digna, se assim decidirmos agir."
 laamp_base_contract_schemes.1782.desc.victim_type.travelling_ruler: "Este grupo, liderado por um[victim.Custom('ES_XA')] ilustre [victim.GetTitleAsNameNoTooltip|l] viajando fora de sua [victim.Custom('FortifiedBuilding')|l] —embora, felizmente, com bem menos guardas do que seria razoavelmente esperado para alguém de sua posição— #EMP sin duda#! certamente tem riquezas de sobra para serem tomadas."
 laamp_base_contract_schemes.1782.desc.victim_type.travelling_nobody: "Sem os apetrechos exorbitantes do governo nem a dureza gasta pelo tempo dos verdadeiros itinerantes, este grupo parece ser... pouco talhado para a estrada. Quanto ouro sequer têm para se tomar é puro palpite."
 laamp_base_contract_schemes.1782.desc.victim_type.laamp: "É claramente óbvio que, como nós, trata-se de um grupo aventureiro em movimento, em busca de um novo lugar para passar a noite. Eles podem ser mais ricos que reis ou mais pobres que camponeses, uma condição que nós mesmos conhecemos bem demais."
 laamp_base_contract_schemes.1782.desc.victim_type.fallback: "Embora [victim.Custom('ES_ElLa')] [victim.GetWomanMan] que os lidera use roupas mais elegantes do que o resto da multidão, fica claro que, no fim das contas, [victim.GetSheHe] não é praticamente ninguém. E é bastante provável que todo o dinheiro que tenha consigo seja tudo o que possui no mundo."
 laamp_base_contract_schemes.1782.desc.outro: "[ROOT.Char.GetPrimaryTitle.GetDefinitiveName] apenas aguardam meu sinal para atacar."
 laamp_base_contract_schemes.1782.tt.victim_escapes: "[victim.Custom('ES_ElLa')|U] [victim.GetTitledFirstNameNoTooltip|l] escapa em meio ao caos"
 laamp_base_contract_schemes.1782.a: "Atacar esses tolos!"
 laamp_base_contract_schemes.1782.a.tt.success: "Você dispersa a coluna e saqueia a bagagem deles"
 laamp_base_contract_schemes.1782.a.tt.failure: "$laamp_base_contract_schemes.1782.c.tt.failure$"
 laamp_base_contract_schemes.1782.b: "Cerquem-nos e vejamos o quanto vão pagar."
 laamp_base_contract_schemes.1782.b.tt.success: "Cercados, eles se rendem"
 laamp_base_contract_schemes.1782.b.tt.failure: "$laamp_base_contract_schemes.1782.c.tt.failure$"
 laamp_base_contract_schemes.1782.c: "Esperem — atacaremos depois do anoitecer..."
 laamp_base_contract_schemes.1782.c.tt.easier_against_most_but_less_rewards: "#TUT Isto geralmente é mais fácil, mas oferece menos [gold|lE]#!"
 laamp_base_contract_schemes.1782.c.tt.success: "Uma emboscada bem-sucedida"
 laamp_base_contract_schemes.1782.c.tt.failure: "Suas tropas são ineficazes"
 laamp_base_contract_schemes.1782.d: "Deixem estes em paz."
 laamp_base_contract_schemes.1782.d.tt: "Você renuncia à oportunidade de aliviar [victim.Custom('ES_AlAla')] [victim.GetTitledFirstName|l] de sua fortuna"
 laamp_base_contract_schemes.1783.t: "$laamp_base_contract_schemes.1041.t$: Sucesso!"
 laamp_base_contract_schemes.1783.desc: "Quem diz que viajar é duro, difícil ou perigoso?\n\nDo ponto de vista de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName|l], parece um empreendimento bastante fácil e bem lucrativo. Com nossas alforjes pesadas de moedas, chegamos com alegria — embora de forma suspeita — a [destination_2.GetBaseNameNoTier], com o ânimo elevado e os bolsos cheios.\n\nEsperemos apenas que nenhuma de nossas vítimas nos alcance antes de partirmos."
 laamp_base_contract_schemes.1783.a: "As estradas realmente são a fonte de toda riqueza..."
 laamp_base_contract_schemes.1784.t: "$laamp_base_contract_schemes.1041.t$: Falha!"
 laamp_base_contract_schemes.1784.desc: "Ai de nós. Às vezes [ROOT.Char.GetFaith.FateGodName] nos sorri, e às vezes não.\n\nAo que parece, hoje não fizemos nada para merecer o favor da fortuna, pois [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] não ganhou uma única moeda reluzente desde que iniciamos este empreendimento.\n\nAgora que chegamos ao fim da jornada, parece que devemos reconhecer nossos fracassos e seguir em frente."
 laamp_base_contract_schemes.1784.a: "Na hora tudo parecia tão fácil..."
