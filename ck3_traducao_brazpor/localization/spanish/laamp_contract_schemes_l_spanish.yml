 laamp_base_contract_schemes.2014.tt.explanation: "#TUT Para concluir o [task_contract|lE]:\n$EFFECT_LIST_BULLET$ Complete um desafio de [stewardship|lE], [intrigue|lE] ou [aptitude|lE] de [GetCourtPositionType('quartermaster_camp_officer').GetName()|l] em cada destino\n$EFFECT_LIST_BULLET$ Ven?a todos os desafios para um $label_success_critical$\n$EFFECT_LIST_BULLET$ Se testar apenas [stewardship|lE] ou seu [GetCourtPositionType('quartermaster_camp_officer').GetName()|l], você poder? falhar até duas vezes e ainda obter um $label_success_standard$, desde que ainda ven?a pelo menos metade dos desafios\n$EFFECT_LIST_BULLET$ Se fizer um desafio de [intrigue|lE] ou simplesmente fabricar os resultados por pregui?a, s? poder? falhar uma vez e ainda obter um $label_success_standard$; caso contr?rio, se fracassar, será um $label_failure_critical$#!"
 laamp_base_contract_schemes.2014.a: "$travel.stationary_domicile.option.t$"
 laamp_base_contract_schemes.2014.b: "$travel.mobile_domicile.option.t$"
 laamp_base_contract_schemes.2301.t: "$laamp_base_contract_schemes.2004.t$: Portões da Cidade"
 laamp_base_contract_schemes.2301.desc.intro: "\"Olá, [ROOT.Char.GetTitledFirstNameNoTooltip], bem-vind[ROOT.Char.Custom('ES_OA')]!\", exclama [person_a.Custom('ES_ElLa')] [person_a.GetTitledFirstName|l] quando meu grupo e eu entramos em sua cidade."
 laamp_base_contract_schemes.2301.desc.intro.has_quartermaster: "Meu [GetCourtPositionType('quartermaster_camp_officer').GetName()|l] [quartermaster.GetFirstName] segue atrás de mim, alerta e pront[quartermaster.Custom('ES_OA')] para ajudar."
 laamp_base_contract_schemes.2301.desc.midtro: "\n\nPouco depois, sou apresentado aos outros magnatas da cidade: [person_b.GetFirstName], [person_c.GetFirstName] e [person_d.GetFirstName].\n\n\"Temos a #EMP seguridad#! de que vocês concordarão conosco"
 laamp_base_contract_schemes.2301.desc.liar.honest_or_good: "quando dizemos que, simplesmente, não podemos arcar com as taxas extras que nosso[employer.Custom('ES_OA')] [employer.GetLadyLord], [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName]», diz [person_a.GetFirstNameNoTooltip], arrastando as palavras.\n\nSua fala é suave e uniforme; a palavra de uma pessoa honesta ou de uma[person_a.Custom('ES_XA')] mentiros[person_a.Custom('ES_OA')] consumad[person_a.Custom('ES_OA')]."
 laamp_base_contract_schemes.2301.desc.liar.not_lying: "quando protestamos contra este imposto injusto. Não somos mais que cidadãos simples da cidade e faz muito tempo que demos tudo o que podíamos [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l]\".\n\nPode ser verdade, pode não ser. Veremos em breve."
 laamp_base_contract_schemes.2301.desc.liar.poor_liar_lying: "q-quando dizemos que n-não podemos, digo, que não #EMP queremos#! esconder nada [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l]!\", gagueja [person_a.GetFirstNameNoTooltip]."
 laamp_base_contract_schemes.2301.desc.liar.other_liars_lying: "$laamp_base_contract_schemes.2301.desc.liar.not_lying$"
 laamp_base_contract_schemes.2301.a: "Vou começar com você, [person_a.GetFirstNameNoTooltip]."
 laamp_base_contract_schemes.2301.a.tt: "Você inspeciona imediatamente as propriedades de [person_a.GetFirstNameNoTooltip]"
 laamp_base_contract_schemes.2301.b: "Talvez com os negócios de [person_b.GetFirstNameNoTooltip] começamos?"
 laamp_base_contract_schemes.2301.b.tt: "Você inspeciona imediatamente as propriedades de [person_b.GetFirstNameNoTooltip]"
 laamp_base_contract_schemes.2301.c: "Vamos inspecionar [person_c.GetFirstNameNoTooltip] primeiro."
 laamp_base_contract_schemes.2301.c.tt: "Você inspeciona imediatamente as propriedades de [person_c.GetFirstNameNoTooltip]"
 laamp_base_contract_schemes.2301.d: "[person_d.GetFirstNameNoTooltip], por favor, mostre o caminho."
 laamp_base_contract_schemes.2301.d.tt: "Você inspeciona imediatamente as propriedades de [person_d.GetFirstNameNoTooltip]"
 laamp_base_contract_schemes.2311.t: "$laamp_base_contract_schemes.2004.t$: [char_current.GetFirstNameNoTooltip]"
 laamp_base_contract_schemes.2311.desc.business.council_chamber: "As dependências de [char_current.GetFirstName] como [char_current.GetTitleAsNameNoTooltip|l] da cidade são surpreendentemente amplas. [char_current.GetFirstNameNoTooltip] me leva a uma sala que claramente serve para as reuniões das pessoas mais importantes do assentamento, sentando-me à cabeceira da mesa."
 laamp_base_contract_schemes.2311.desc.business.armory: "[char_current.GetFirstName] nos leva à fonte de sua riqueza: uma armeria bem abastecida —com forja anexa— que fornece armas e munição tanto para a milícia quanto para caravanas de passagem."
 laamp_base_contract_schemes.2311.desc.business.temple: "Aparentemente [char_current.GetFirstName] obtém a maior parte de sua fortuna ao alugar hospedarias para os visitantes de um santuário local e administrar uma pequena organização de caridade; ficando com apenas uma pequena parte para si, é claro."
 laamp_base_contract_schemes.2311.desc.business.dungeon: "Parece que [char_current.GetFirstName] controla uma pequena cadeia, obtendo riqueza ao manter devedores, vagabundos e criminosos presos em nome de terceiros. Uma soma respeitável em taxas e multas dos confinados complementa a operação."
 laamp_base_contract_schemes.2311.desc.business.docks: "Está claro que o dinheiro de [char_current.GetFirstName] provém dos cais da cidade, onde mantém um pequeno escritório bem equipado com vista para os píeres mais movimentados. Um par de persianas largas permite que se debruce e grite com os carregadores preguiçosos de tempos em tempos."
 laamp_base_contract_schemes.2311.desc.business.study: "A comunidade erudita de [destination_1.GetBaseNameNoTier] é pequena, mas obstinada. A maioria dos escribas locais parece trabalhar para [char_current.GetFirstName] de uma forma ou de outra, que mantém um negócio bem arrumado graças ao quase monopólio de cartas na cidade."
 laamp_base_contract_schemes.2311.desc.business.physicians_study: "Os negócios de [char_current.GetFirstName] parecem estar fortemente ligado a medicamentos, cura e ao fornecimento de boas parteiras. Uma ocupação incomum para [Select_CString( char_current.IsFemale, 'uma potentada', 'um potentado' )] mas, sem dúvida, uma com ampla demanda."
 laamp_base_contract_schemes.2311.desc.business.tavern: "Como muitos outros, a renda de [char_current.GetFirstName] provém diretamente da sede dos humildes trabalhadores de [destination_1.GetBaseNameNoTier]. Boa comida para os viajantes, música para os locais e um ambiente convivial tornam o estabelecimento lucrativo."
 laamp_base_contract_schemes.2311.desc.business.bp1_kitchen_western: "O negócio de [char_current.GetFirstName] gira em torno de armazenar e conseguir alimentos, tanto exóticos quanto a granel. Os plebeus conseguem cereais baratos em tempos de necessidade e as elites locais têm a quem recorrer para os alimentos da moda vindos da distante capital."
 laamp_base_contract_schemes.2311.desc.business.market: "[char_current.GetFirstName] dirige a praça principal do mercado de [destination_1.GetBaseNameNoTier], uma atividade simples, mas lucrativa. Administra os espaços das barracas, cobra taxas, recolhe impostos para [person_a.Custom('ES_ElLa')] [person_a.GetTitleAsNameNoTooltip|l] e todos os demais encargos esperados."
 laamp_base_contract_schemes.2311.desc.business.bath_house: "Um toque de luxo, [char_current.GetFirstName] dirige um banho público próspero dentro das muralhas de [destination_1.GetBaseNameNoTier]. Não há idiota vivo que não aprecie um bom banho, levando embora a poeira e a sujeira do mundo moderno, e algumas moedas pelo privilégio bem valem o custo."
 laamp_base_contract_schemes.2311.desc.personality.mayor: "\"Honorável [ROOT.Char.GetTitleAsNameNoTooltip|l], certamente vedes que a avareza [employer.Custom('ES_DelDela')] [employer.GetTitleAsName|l] é… equivocada. Ele investiu-vos com sua autoridade. Ajudai-nos neste assunto, e faremos com que o mundo inteiro conheça a vossa generosidade\"."
 laamp_base_contract_schemes.2311.desc.personality.ai_honor: "\"Como podem ver, minhas propriedades são bem-sucedidas, mas de forma alguma extensas. Aqui fazemos um trabalho bom e honesto, mas não podemos arcar com um aumento tão alto nos pagamentos [employer.Custom('ES_AlAla')] [employer.GetTitleAsName|l]\"."
 laamp_base_contract_schemes.2311.desc.personality.ai_zeal: "\"Fazemos o trabalho de [char_current.GetFaith.HealthGodNamePossessive] aqui, [ROOT.Char.GetTitledFirstNameNoTooltip|l], sem erro. Outro dízimo nos arruinaria, isso deveria ser óbvio o bastante.\""
 laamp_base_contract_schemes.2311.desc.personality.ai_greed: "«Eu tenho minha parte justa? Sim, claro. Mas é só isso, é #EMP minha#! parte. Pago os impostos aos quais sou obrigad[char_current.Custom('ES_OA')], mas isso não é um imposto de verdade, é só uma mania sem sentido por parte [employer.Custom('ES_DelDela')] [employer.GetTitleAsName|l], e todos nós sabemos disso»."
 laamp_base_contract_schemes.2311.desc.personality.ai_compassion: "\"Pareceis um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] razoável, [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Entendam, por favor, que estamos nos esforçando ao máximo aqui, mas estamos sempre a um ano ruim de problemas, até mesmo de fome\"."
 laamp_base_contract_schemes.2311.desc.personality.ai_boldness: "«Considero-me uma pessoa prática, falo de forma clara[char_current.Custom('ES_OA')] e espero que os outros falem de forma clara comigo. O #EMP imposto#! [employer.Custom('ES_DelDela')] [employer.GetTitleAsName|l] é injusto e não podemos pagá-lo. É só isso»."
 laamp_base_contract_schemes.2311.desc.personality.ai_rationality: "«Eu sei, eu sei, parece que estamos indo bem, mas esta está longe de ser a primeira #EMP encargo#! extra que [employer.Custom('ES_ElLa')] [employer.GetTitleAsName|l] nos impõe este ano e, suspeito, não será a última. Vocês precisam entender nossa relutância»."
 laamp_base_contract_schemes.2311.desc.personality.ai_vengefulness: "\"Gosto de jogar limpo, [ROOT.Char.GetTitledFirstNameNoTooltip|l], tanto nos negócios, quanto com meus inferiores e com meus superiores. Mas a justiça só vale se todos fizerem parte dela; caso contrário, bem, é assim que #EMP algumas#! pessoas criam inimizades.\""
 laamp_base_contract_schemes.2311.desc.personality.ai_energy: "\"Sou uma pessoa ocupada; você também é, então vou ser franc[char_current.Custom('ES_OA')]. Se tivéssemos esse dinheiro, pagaríamos com prazer, mas não o temos, então não vamos pagar. Isso é suficiente, não é?\"."
 laamp_base_contract_schemes.2311.desc.personality.ai_sociability: "\"Olhem, vamos deixar de lado toda essa sujeira e tomar um drinque. Por que não ficam por um tempo? Raramente recebemos visitantes tão interessantes em nossa pequena cidade; tenho certeza de que vocês não precisariam encher a própria taça por pelo menos uma semana[char_current.Custom('ES_OA')] de que não precisariam encher a própria taça por pelo menos uma semana\"."
 laamp_base_contract_schemes.2311.desc.personality.ai_personality_fallback: "\"Então... como vamos tratar disso? Não mantenho uma conta de absolutamente tudo, sabe. Isso sairia caro demais. Muito disso se resolve com apertos de mão, contratos guardados em outro lugar, você sabe como é...\""
 laamp_base_contract_schemes.2311.desc.loot.gold: "Enquanto fala, minha mente volta a um grande baú do que parecia ser prata pelo qual passamos na entrada…"
 laamp_base_contract_schemes.2311.desc.loot.courtier_opinion: "[char_current.GetFirstNameNoTooltip] fala enquanto caminhamos, e não consigo evitar notar que passamos por um depósito repleto de luxos…"
 laamp_base_contract_schemes.2311.desc.loot.piety: "[char_current.GetFirstNameNoTooltip] conversa, mas não consigo deixar de notar que passamos por uma alcova cheia de preciosos artigos de fé…"
 laamp_base_contract_schemes.2311.desc.loot.provisions: "[char_current.GetFirstNameNoTooltip] segue falando, mas parece que não consigo esquecer a cozinha bem abastecida pela qual passamos para chegar até aqui…"
 laamp_base_contract_schemes.2311.a: "Buscar nos registros financeiros de ."
 laamp_base_contract_schemes.2311.b: "Tente pegar[char_current.GetHerHim] em uma mentira."
 laamp_base_contract_schemes.2311.c: "Procure sinais reveladores de irregularidades."
 laamp_base_contract_schemes.2311.d: "Examine tudo em detalhes exaustivos."
 laamp_base_contract_schemes.2311.e.gold: "Essa moeda — vou confiscá-la por #EMP suspeita#!."
 laamp_base_contract_schemes.2311.e.courtier_opinion: "Esses refinamentos — vou levá-los para #EMP inspeção#!."
 laamp_base_contract_schemes.2311.e.piety: "Esses talismãs — vou #EMP confiscá-los#!."
 laamp_base_contract_schemes.2311.e.provisions: "Esses suprimentos — vou tomá-los como garantia."
 laamp_base_contract_schemes.2311.f.quartermaster_exists: "[quartermaster.GetFirstNameNoTooltip|U], comece seu exame."
 laamp_base_contract_schemes.2311.f.quartermaster_dnae_exist: "Se ao menos eu tivesse trazido um $quartermaster_camp_officer$..."
 laamp_base_contract_schemes.2311.tt.current_clues: "#TUT Você reuniu [task_contract.MakeScope.Var('clues_gathered').GetValue|0] peças de evidência de um total possível de 4#!"
 laamp_base_contract_schemes.2311.tt.chars_checked: "#TUT Você investigou [task_contract.MakeScope.Var('chars_checked').GetValue|0] [characters|lE] de um total possível de 4#!"
 laamp_base_contract_schemes.2311.tt.success_increases_score: "Você ganha #P +1#! peça de evidência"
 laamp_base_contract_schemes.2311.tt.failure_gives_no_score: "Nenhuma peça de evidência obtida"
 laamp_base_contract_schemes.2311.stewardship.tt.success: "Você encontra o que procura"
 laamp_base_contract_schemes.2311.stewardship.tt.failure: "Confuso e sem valor"
 laamp_base_contract_schemes.2311.diplomacy.tt.success: "Um erro tolo da parte de"
 laamp_base_contract_schemes.2311.diplomacy.tt.failure: "Cada palavra consistente"
 laamp_base_contract_schemes.2311.intrigue.tt.success: "Não é tão esperto quanto pensa que é"
 laamp_base_contract_schemes.2311.intrigue.tt.failure: "Mais esperto do que você por metade"
 laamp_base_contract_schemes.2311.learning.tt.success: "Você sabe onde procurar"
 laamp_base_contract_schemes.2311.learning.tt.failure: "Você procura por toda parte, mas não encontra nada"
 laamp_base_contract_schemes.2312.t.success: "$laamp_base_contract_schemes.2004.t$: Sucesso!"
 laamp_base_contract_schemes.2312.t.failure: "$laamp_base_contract_schemes.2004.t$: Falha!"
 laamp_base_contract_schemes.2312.t.ignored: "$laamp_base_contract_schemes.2004.t$: Tarefa Ignorada"
 laamp_base_contract_schemes.2312.desc.method.stewardship: "Reviramos cuidadosamente as anotações, os recibos e as testemunhas que [char_current.Custom('ES_ElLa')] [char_current.GetTitledFirstName|l] consegue reunir em pouco tempo sobre seus negócios."
 laamp_base_contract_schemes.2312.desc.method.diplomacy: "Nossa conversa dura mais de uma hora, e repassamos repetidamente até o menor detalhe dos negócios [char_current.Custom('ES_DelDela')] [char_current.GetTitledFirstName|l] em [destination_1.GetBaseNameNoTier]: onde aconteceram, com quem foram feitos, quanto se ganhou e muito mais."
 laamp_base_contract_schemes.2312.desc.method.intrigue: "Conduzo a conversa pelos caminhos de sempre, certificando-me de deixar pausas e linhas de pensamento suficientes para dar [char_current.Custom('ES_AlAla')] [char_current.GetTitledFirstName|l] possibilidades de sobra para cometer um erro."
 laamp_base_contract_schemes.2312.desc.method.learning: "Falamos por algo que #EMP parece#! a maior parte do dia, discutindo todos os aspectos concebíveis dos negócios [char_current.Custom('ES_DelDela')] [char_current.GetTitledFirstName|l] em [destination_1.GetBaseNameNoTier]. Nenhuma pedra fica sem ser revirada, nenhuma pergunta sem ser feita."
 laamp_base_contract_schemes.2312.desc.method.quartermaster: "Com [quartermaster.GetFirstName] à frente da entrevista, [char_current.Custom('ES_ElLa')] [char_current.GetTitledFirstName|l] se senta para responder ao que parece uma enxurrada interminável de perguntas. No começo, pacientemente; depois, cada vez menos, à medida que o tempo passa."
 laamp_base_contract_schemes.2312.desc.method.thief.gold: "Claro, [char_current.Custom('ES_ElLa')] [char_current.GetTitledFirstName|l] reclama e espuma pela prata perdida, mas, uma vez que meus seguidores a recuperam, pouco pode fazer."
 laamp_base_contract_schemes.2312.desc.method.thief.courtier_opinion: "[char_current.Custom('ES_ElLa')|U] [char_current.GetTitledFirstName|l] demonstra não estar nada feliz com minha #EMP adquisición#!, mas esse é o problema dele: meus seguidores agradecidos sem dúvida não devolverão facilmente seus novos luxos."
 laamp_base_contract_schemes.2312.desc.method.thief.piety: "[char_current.Custom('ES_ElLa')|U] [char_current.GetTitledFirstName|l] pode reclamar e tagarelar o quanto quiser sobre as maldições de [char_current.GetFaith.FateGodName] contra os ladrões e todas essas coisas, mas acho que sei qual de [Select_CString(And(ROOT.Char.IsFemale, char_current.IsFemale),'las dos','los dos')] tem mais santidade agora mesmo."
 laamp_base_contract_schemes.2312.desc.method.thief.provisions: "[char_current.Custom('ES_ElLa')|U] [char_current.GetTitledFirstName|l] brame contra nós e nos lança alguns insultos, mas no fim prova ser inteligente o bastante para não se interpor entre uma banda faminta de [ROOT.Char.Custom('GetLaampDescribeTypeSelfPlural')] e sua refeição recém-conquistada."
 laamp_base_contract_schemes.2312.desc.result.outro.all_done: "E com isso, seguimos todas as pistas que tínhamos. Só resta uma coisa a fazer."
 laamp_base_contract_schemes.2312.desc.result.success: "Não exige muito esforço arrancar a verdade de [char_current.GetSheHe] parece surpreender-lhe de forma quase terminal."
 laamp_base_contract_schemes.2312.desc.result.failure: "Apesar de nossos melhores esforços, [char_current.GetFirstName] parece totalmente irrepreensível. Uma atitude da qual se orgulha demais."
 laamp_base_contract_schemes.2312.desc.result.ignored: "Mais vale um pássaro na mão do que dois voando, e os ganhos provavelmente ilegítimos de est[char_current.Custom('ES_EA')] [char_current.GetWomanMan] repousam confortavelmente na minha mão — mesmo que tomá-los tenha cortado nossa capacidade de investigar [char_current.GetHerHim]."
 laamp_base_contract_schemes.2312.desc.result.outro.success: "Que nossa sorte se mantenha na próxima."
 laamp_base_contract_schemes.2312.desc.result.outro.failure: "Tomara que nos saiamos melhor com o próximo."
 laamp_base_contract_schemes.2312.desc.result.outro.ignored: "Que o próximo seja tão lucrativo."
 laamp_base_contract_schemes.2312.a: "[person_a.GetFirstNameNoTooltip] em seguida."
 laamp_base_contract_schemes.2312.b: "Adiante, para as propriedades de [person_b.GetFirstNameNoTooltip]."
 laamp_base_contract_schemes.2312.c: "Ainda há [person_c.GetFirstNameNoTooltip]..."
 laamp_base_contract_schemes.2312.d: "Veremos se [person_d.GetFirstNameNoTooltip] está escondendo alguma coisa."
 laamp_base_contract_schemes.2312.e: "Tomei minha decisão."
 laamp_base_contract_schemes.2312.tt.boilerplate.continue_investigation: "Você continua reunindo peças de evidência"
 laamp_base_contract_schemes.2312.tt.boilerplate.end_investigation: "Você decide qual será seu veredito final"
 laamp_base_contract_schemes.2321.t: "$laamp_base_contract_schemes.2004.t$: Proclamação"
 laamp_base_contract_schemes.2321.desc.intro: "Reunimo-nos nos aposentos [person_a.Custom('ES_DelDela')] [person_a.GetTitledFirstName|l], um lugar dramático o bastante para dar meu veredicto. Com a palavra [employer.Custom('ES_DelDela')] [employer.GetTitleAsName|l] para me respaldar, isso será vinculante. De uma forma ou de outra.\n\n[person_b.GetFirstName], [person_c.GetFirstName] e [person_d.GetFirstName] contêm a respiração enquanto aguardam o pronunciamento sobre seu destino, enquanto [person_a.GetFirstNameNoTooltip] parece nervos[person_a.Custom('ES_OA')] pela primeira vez desde que cheguei.\n\nMeu instinto me diz que"
 laamp_base_contract_schemes.2321.desc.tax_status.has_cash: "eles poderiam pagar, simplesmente não querem,"
 laamp_base_contract_schemes.2321.desc.tax_status.partial_cash: "eles provavelmente poderiam pagar pelo menos uma parte,"
 laamp_base_contract_schemes.2321.desc.tax_status.no_cash: "eles realmente não têm moedas para pagar,"
 laamp_base_contract_schemes.2321.desc.clues_gathered.four: "e minhas investigações mostram que isso é inteiramente verdade."
 laamp_base_contract_schemes.2321.desc.clues_gathered.two_to_three: "e minhas investigações em grande parte confirmaram isso."
 laamp_base_contract_schemes.2321.desc.clues_gathered.one_or_less: "mas me faltam evidências para prová-lo."
 laamp_base_contract_schemes.2321.tt.clue_total.exceptional_achievable: "Tendo reunido todas as peças de evidência possíveis, sua investigação foi minuciosa o bastante para garantir um $label_success_critical$ se você os obrigar a pagar"
 laamp_base_contract_schemes.2321.tt.clue_total.normal_achievable: "Com peças de evidência suficientes reunidas, sua investigação provavelmente terminará com um $label_success_standard$ se você os obrigar a pagar o valor integral"
 laamp_base_contract_schemes.2321.tt.clue_total.failure_possible: "Como você reuniu peças de evidência insuficientes, sua investigação falha talvez leve à resistência dos locais se você os obrigar a pagar o valor integral"
 laamp_base_contract_schemes.2321.a: "Vocês pagarão integralmente."
 laamp_base_contract_schemes.2321.a.tt: "Você decide a favor de [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l], contra [person_a.Custom('ES_DelDela')] [person_a.GetTitledFirstName|l]"
 laamp_base_contract_schemes.2321.a.tt.success_standard: "Se você reuniu peças de evidência suficientes"
 laamp_base_contract_schemes.2321.a.tt.success_qualified: "Se lhe faltam evidências, mas os locais recuam"
 laamp_base_contract_schemes.2321.a.tt.failure_standard: "Se lhe faltam evidências e os locais se revoltam"
 laamp_base_contract_schemes.2321.b: "Vocês pagarão — metade."
 laamp_base_contract_schemes.2321.b.tt: "Você decide a favor de [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l], mas, ainda assim, alivia o peso dos impostos sobre [person_a.Custom('ES_ElLa')] [person_a.GetTitledFirstName|l]"
 laamp_base_contract_schemes.2321.c: "Está claro que [destination_1.GetBaseNameNoTierNoTooltip] realmente não pode pagar isso."
 laamp_base_contract_schemes.2321.c.tt: "Você decide a favor de [person_a.Custom('ES_DelDela')] [person_a.GetTitledFirstName|l], contra [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l]"
 laamp_base_contract_schemes.2322.t.success_critical: "$laamp_base_contract_schemes.2004.t$: Pago Integralmente"
 laamp_base_contract_schemes.2322.t.success_standard: "$laamp_base_contract_schemes.2004.t$: Pago"
 laamp_base_contract_schemes.2322.t.success_qualified_insufficient_evidence: "$laamp_base_contract_schemes.2004.t$: Pago com Ressentimento"
 laamp_base_contract_schemes.2322.t.violence: "$laamp_base_contract_schemes.2004.t$: Violência Eclode"
 laamp_base_contract_schemes.2322.desc.violence: "O silêncio se instala na sala.\n\nUm silêncio tenso e constrangedor, enquanto os locais se observam; o desagrado contorce seus rostos em quase rosnados.\n\nDe repente, [aggressor.Custom('ES_ElLa')] [aggressor.GetTitledFirstName|l] lança a cadeira para trás com um rangido de madeira sobre pedra: \"se pretende dispensar a justiça desse jeito, demônio, então prepare-se para sentir a nossa justiça também!\".\n\nOs minutos seguintes são um borrão, quando dois dos meus seguidores irrompem na sala, seguidos por uma dezena da própria soldadesca de [person_a.Custom('ES_DelDela')] [person_a.GetTitledFirstName|l]. As lâminas são sacadas, ameaças são gritadas, e a cidade rapidamente mergulha em um motim completo."
 laamp_base_contract_schemes.2322.desc.success_critical: "Como minha investigação foi inegavelmente minuciosa, nem [person_a.Custom('ES_ElLa')] [person_a.GetTitledFirstName|l] nem nenhum de seus lacaios pode contestar seus resultados.\n\nMesmo que esses resultados favoreçam #EMP completamente#! [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l] a ponto de ser conveniente oferecer um bônus."
 laamp_base_contract_schemes.2322.desc.success_standard: "Tenho provas suficientes para sustentar de maneira convincente que os moradores #EMP podem#! arcar com a conta mais recente e, à medida que exponho isso, os suspiros de derrota e cansaço de todo lado me dizem que [person_a.Custom('ES_ElLa')] [person_a.GetTitleAsNameNoTooltip|l] e seus colegas sabem disso.\n\n\"Parem, parem, por favor\", diz [person_a.GetFirstName] com resignação, \"vocês deixaram seu ponto claro o suficiente. Pagaremos [employer.Custom('ES_AlAla')] [employer.GetTitleAsName|l] o que lhe é devido.\""
 laamp_base_contract_schemes.2322.desc.success_qualified_insufficient_evidence: "Por um breve momento tenso, parece que [person_a.GetFirstNameNoTooltip] e seus lacaios pretendem protestar contra meu anúncio —com força, se necessário—, mas, quando ninguém toma a iniciativa, o momento passa.\n\n\"Muito... bem... podeis informar [employer.Custom('ES_AlAla')] [employer.GetTitleAsName|l] de que seu #EMP \"impuesto\"#! será pago. Não resistiremos mais. Esperemos que não estejais aqui no ano que vem para ver as repercussões sobre nós.\""
 laamp_base_contract_schemes.2322.desc.tax_status.has_cash: "Digam o que disserem, [destination_1.GetBaseNameNoTier] certamente tem riqueza para dispensar, por mais que seus magnatas neguem."
 laamp_base_contract_schemes.2322.desc.tax_status.partial_cash: "Os tempos serão duros para eles por um tempo, mas são habitantes de cidade, darão um jeito de fazer funcionar."
 laamp_base_contract_schemes.2322.desc.tax_status.no_cash: "É claro que a cidade sofrerá por isso. Provavelmente bastante, mas, bem, assim é a vida."
 laamp_base_contract_schemes.2322.a: "![employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstNameNoTooltip|l] estará extasiad[employer.Custom('ES_OA')]!"
 laamp_base_contract_schemes.2322.b: "Cumpri bem meus deveres."
 laamp_base_contract_schemes.2322.c: "Bem, isso foi fácil o bastante."
 laamp_base_contract_schemes.2322.d: "Ignorantes broncos, às armas!"
 laamp_base_contract_schemes.2322.d.tt.need_troops: "Você precisa de pelo menos #V 500#! tropas disponíveis para conter a revolta"
 laamp_base_contract_schemes.2322.d.tt.success: "Suas tropas na cidade contêm a revolta"
 laamp_base_contract_schemes.2322.d.tt.failure: "Segue-se um massacre"
 laamp_base_contract_schemes.2322.e: "Fujam!"
 laamp_base_contract_schemes.2323.t: "$laamp_base_contract_schemes.2004.t$: Pago em Parte"
 laamp_base_contract_schemes.2323.desc: "Os moradores locais não estão totalmente satisfeitos com a minha decisão, isso fica claro pelo repentino resmungo deles; no entanto, também duvido que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] esteja encantad[employer.Custom('ES_OA')].\n\nAinda assim, os compromissos muitas vezes implicam deixar alguém descontente (às vezes todo mundo) e [person_a.Custom('ES_ElLa')] [person_a.GetTitledFirstName|l] e seus comparsas sabem que esta é a melhor resolução que provavelmente vão conseguir.\n\n\"... suponho que seja isso, então. Obrigado pelo seu tempo, [ROOT.Char.GetTitledFirstNameNoTooltip|l]\", resmunga [person_a.GetFirstNameNoTooltip].\n\nSua mão se estende para agarrar a minha."
 laamp_base_contract_schemes.2323.a: "Uma conclusão justa, eu acho."
 laamp_base_contract_schemes.2323.b: "Toque na minha mão e perderá a sua, plebeu."
 laamp_base_contract_schemes.2323.a.tt.success: "[person_a.GetFirstNameNoTooltip] aceita bem"
 laamp_base_contract_schemes.2323.a.tt.failure: "[person_a.GetFirstNameNoTooltip] não demonstra gratidão"
 laamp_base_contract_schemes.2323.a.tt.failure.filler: "Você não recebe recompensa extra"
 laamp_base_contract_schemes.2324.t: "$laamp_base_contract_schemes.2004.t$: Nulo e Sem Efeito"
 laamp_base_contract_schemes.2324.desc: "Um coro de aplausos irrompe de [person_a.Custom('ES_ElLa')] [person_a.GetTitledFirstName|l] e seus bajuladores e até os servos, que evidentemente estavam escutando pelo buraco da fechadura, quando lhes digo que estão dispensados de pagar.\n\nÉ improvável, é claro, que isso agrade muito [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l], o que significa que provavelmente não verei nem uma moeda por tudo isso — mas, afinal, que preço se pode colocar na adulação?"
 laamp_base_contract_schemes.2324.desc.second_option: "\n\nSegue-se uma noite muito cordial até que [person_a.GetFirstNameNoTooltip] consiga me puxar à parte para uma conversa tranquila.\n\n\"Fez o que era justo por nós, [ROOT.Char.GetTitledFirstNameNoTooltip], como eu sabia que faria. Isso eu respeito em um líder. Se lhe convier, tenho contatos em outros lugares que poderia usar para... #EMP reforçar#! o seu bom nome em [claim_duchy.GetDefinitiveName]?\""
 laamp_base_contract_schemes.2324.a: "Espero que se lembre disso, [person_a.GetFirstNameNoTooltip]."
 laamp_base_contract_schemes.2324.b: "Que o povo sorria ao ouvir meu nome!"
 laamp_base_contract_schemes.2331.t: "$laamp_base_contract_schemes.2004.t$: Um Líder Digno"
 laamp_base_contract_schemes.2331.desc: "\"[ROOT.Char.GetTitledFirstNameNoTooltip]?\"\n\nLevanto o olhar do meu jantar para ver que um par dos meus sentinelas me trouxeram... alguém de cultura [hopeful.GetCulture.GetName] um tanto familiar? De onde conheço [hopeful.GetHerHim]...?\n\n\"Sou [hopeful.Custom('ES_ElLa')] [hopeful.GetTitledFirstName|l], [ROOT.Char.Custom('MistressMaster')|l]. Arbitrasteis um assunto na minha cidade natal, [destination_1.GetBaseNameNoTier], há alguns anos, e achei que o fizestes com dignidade e compostura.\"\n\n\"De qualquer forma, meus negócios desabaram há algum tempo e me encontro procurando outro trabalho. Achei que talvez... vós tivésseis algo para mim...\""
 laamp_base_contract_schemes.2331.a: "Aceito. Arranjem uma tenda para !"
 laamp_base_contract_schemes.2331.b: "Você seria desperdício de sal."
 laamp_base_contract_schemes.2332.t: "$laamp_base_contract_schemes.2004.t$: Sangue e Corpos"
 laamp_base_contract_schemes.2332.desc.quelled: "Apesar das más intenções [person_a.Custom('ES_DelDela')] [person_a.GetTitledFirstName|l], seus lacaios e milícia paga, minhas tropas de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] são mais do que páreo para qualquer bando de populacho [destination_1.GetAdjective] mal equipado.\n\nEm pouco tempo, a revolta é contida. Há mortes, claro, e até mesmo alguns saques leves, mas eles trouxeram isso sobre si quando empunharam suas espadas contra mim. O cadáver [aggressor.Custom('ES_DelDela')] [aggressor.GetTitledFirstName|l] prova isso.\n\nCom a situação agora um pouco mais #EMP controlada#!, faço educadamente uma sugestão firme a [person_a.GetFirstName] para que pague seus impostos.\n\n#BOL Ya#!."
 laamp_base_contract_schemes.2332.desc.massacre: "O que se segue é nada menos que um massacre.\n\nO povo de [destination_1.GetBaseNameNoTier] é tenaz e está furioso, mas não tem como rival os assassinos errantes de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] quando o sangue lhes sobe à cabeça.\n\nEm pouco tempo, começa um saqueio. Os gritos atravessam o céu noturno, os corpos começam a se amontoar e [person_a.Custom('ES_ElLa')] [person_a.GetTitledFirstName|l], [person_b.Custom('ES_ElLa')] [person_b.GetTitledFirstName|l], [person_c.Custom('ES_ElLa') ] [person_c.GetTitledFirstName|l] e [person_d.Custom('ES_ElLa')] [person_d.GetTitledFirstName|l] são todos massacrados na luta.\n\nIsso não foi o que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] havia ordenado, e duvido que pretenda pagar por isso."
 laamp_base_contract_schemes.2332.a: "Às vezes é necessário."
 laamp_base_contract_schemes.2332.b: "Isto... isto saiu do controle."
 laamp_base_contract_schemes.2332.c: "#EMP Eh.#!"
 laamp_base_contract_schemes.2332.d: "Pagamento à parte, que excelente fim para os acontecimentos!"
 laamp_base_contract_schemes.2541.t: "$laamp_base_contract_schemes.2011.t$: [location.GetBaseNameNoTierNoTooltip]"
 laamp_base_contract_schemes.2541.desc.fluff_type.boredom: "O pessoal daqui não parece interessado em nossa tarefa, não importa que ela venha de seu [employer.GetTitleAsNameNoTooltip|l]; o nome e o selo de [employer.GetFirstName] mal os desperta além do mínimo exigido pela legalidade e decência.\n\nUm lugar lento e frustrante para tomar notas, mas a determinação exige resistência, e nós estamos #EMP decididos#! a ganhar nosso dinheiro."
 laamp_base_contract_schemes.2541.desc.fluff_type.paranoia: "As pessoas de [location.GetNameNoTier] reagem à nossa chegada com uma hostilidade mal contida.\n\nEstá claro que consideram que atualizar os registros [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] é um sinal #EMP segura#! de algo ruim no horizonte, seja um conflito ou um imposto per capita, e nossas investigações são frequentemente repelidas.\n\nAinda assim, temos um trabalho a fazer e nenhum camponês enrolado vai se colocar entre nós e nosso pagamento."
 laamp_base_contract_schemes.2541.desc.fluff_type.happiness: "Em [location.GetNameNoTier], os habitantes nos recebem com vivas, cestas de comida e toda a alegria de uma família que recebe de volta seus parentes de alguma guerra distante.\n\nParece que, nestas terras, o nome de [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] é lendário entre seus súditos, a ponto de qualquer mensagem de seu amad[employer.Custom('ES_OA')] [employer.GetTitleAsNameNoTooltip|l] ser motivo de celebração.\n\nNão precisa dizer que estão ansiosos para fornecer à nossa missão toda a ajuda e socorro que puderem."
 laamp_base_contract_schemes.2541.desc.fluff_type.disgust: "Parece que [location.GetNameNoTier] não é favorável aos servos de [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l].\n\nNossa chegada é recebida com puro desdém; ignoram nossas investigações ou até zombam delas. Por mais frustrantes que os locais possam ser, se não conseguirmos pô-los na linha, estaremos arriscando valiosas moedas, e isso não pode acontecer."
 laamp_base_contract_schemes.2541.desc.fluff_type.admiration: "O populacho de [location.GetBaseNameNoTier] parece dócil o bastante submisso.\n\nAqui não há preocupações com novos impostos ou uma guerra iminente, apenas pessoas seguindo com suas vidas e aceitando seu destino. Quando os representantes de seu senhor[employer.Custom('ES_XA')] chamam, dão a devida atenção.\n\nO selo [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] ajuda a superar os obstáculos locais mais mesquinhos, mas o povo está satisfeito o bastante para que mal precisemos usá-lo."
 laamp_base_contract_schemes.2541.desc.fluff_type.worry: "Por algum motivo, [location.GetNameNoTier] acredita ter boas razões para duvidar das intenções de [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l]; ao menos, o suficiente para que cooperem a #EMP regañadientes#! conosco.\n\nCansativo, mas pelo menos é viável. Só significa arrancar informações de cada residência de seus ocupantes, um trabalho monótono, se não abertamente desagradável."
 laamp_base_contract_schemes.2541.a: "Muito bem, vamos terminar isto."
 laamp_base_contract_schemes.2541.a.tt.success: "Um levantamento abrangente"
 laamp_base_contract_schemes.2541.a.tt.success.tt: "+1 levantamentos #P bem-sucedidos#!"
 laamp_base_contract_schemes.2541.a.tt.easier.happiness: "#WEAK Muito mais fácil devido à atitude dos locais em relação ao seu [liege|lE]#!"
 laamp_base_contract_schemes.2541.a.tt.easier.easier_admiration: "#WEAK Um pouco mais fácil devido à atitude dos locais em relação ao seu [liege|lE]#!"
 laamp_base_contract_schemes.2541.a.tt.failure: "Imprecisões óbvias"
 laamp_base_contract_schemes.2541.a.tt.failure.tt: "+1 levantamentos #N fracassados#!"
 laamp_base_contract_schemes.2541.b: "Parece uma cidade fácil de falsificar..."
 laamp_base_contract_schemes.2541.b.tt: "$laamp_base_contract_schemes.2541.a.tt.success.tt$ #WEAK (ser desonesto habilita a possibilidade de um $label_failure_critical$)#!"
 laamp_base_contract_schemes.2541.c: "Acho que não precisamos nos esforçar tanto aqui..."
 laamp_base_contract_schemes.2541.c.tt.explicit_odds_note: "#WEAK Este desafio é, no geral, um pouco mais fácil do que testar [stewardship|lE]#!"
 laamp_base_contract_schemes.2541.c.tt.success: "Você falsifica o censo local de forma convincente"
 laamp_base_contract_schemes.2541.c.tt.success.tt: "$laamp_base_contract_schemes.2541.b.tt$"
 laamp_base_contract_schemes.2541.c.tt.failure: "Suas falsificações são óbvias"
 laamp_base_contract_schemes.2541.c.tt.failure.tt: "$laamp_base_contract_schemes.2541.a.tt.failure.tt$ #WEAK (ser desonesto habilita a possibilidade de um $label_failure_critical$)#!"
 laamp_base_contract_schemes.2541.d.officer_exists: "[officer.GetFirstNameNoTooltip], você pode começar."
 laamp_base_contract_schemes.2541.d.officer_unexists: "Se ao menos eu tivesse um administrador..."
 laamp_base_contract_schemes.2541.e: "Ah, simplesmente escrevam qualquer coisa, quem se importa?"
 laamp_base_contract_schemes.2541.e.success: "Asneira convincente"
 laamp_base_contract_schemes.2541.e.success.tt: "$laamp_base_contract_schemes.2541.b.tt$"
 laamp_base_contract_schemes.2541.e.tt.employer_has_trait.trusting: "#WEAK Más probable porque [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] es de carácter [GetTrait('trusting').GetName( GetNullCharacter )|l]#!"
 laamp_base_contract_schemes.2541.e.tt.employer_has_trait.lazy: "#WEAK Más probable porque [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] es de carácter [GetTrait('lazy').GetName( GetNullCharacter )|l]#!"
 laamp_base_contract_schemes.2541.e.failure: "Mentiras óbvias"
 laamp_base_contract_schemes.2541.e.failure.tt: "$laamp_base_contract_schemes.2541.c.tt.failure.tt$"
 laamp_base_contract_schemes.2541.e.tt.employer_has_trait.paranoid: "#WEAK Más probable porque [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] es de carácter [GetTrait('paranoid').GetName( GetNullCharacter )|l]#!"
 laamp_base_contract_schemes.2541.e.tt.employer_has_trait.diligent: "#WEAK Más probable porque [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] es de carácter [GetTrait('diligent').GetName( GetNullCharacter )|l]#!"
 laamp_base_contract_schemes.2542.t.crit_win: "$laamp_base_contract_schemes.2011.t$: Sucesso Excepcional"
 laamp_base_contract_schemes.2542.t.win: "$laamp_base_contract_schemes.2011.t$: Sucesso!"
 laamp_base_contract_schemes.2542.t.fail: "$laamp_base_contract_schemes.2011.t$: Falha!"
 laamp_base_contract_schemes.2542.t.crit_fail: "$laamp_base_contract_schemes.2011.t$: Falha Excepcional"
 laamp_base_contract_schemes.2542.desc.intro: "[Select_CString( dummy_gender.IsFemale, 'Uma', 'Um' )] representante [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] se encontra conosco em [location.GetBaseNameNoTier] quando terminamos e, com interesse, pega o grosso maço de notas que reunimos.\n\n"
 laamp_base_contract_schemes.2542.desc.method.own_skill.honest.win: "\"Um trabalho esplêndido, [ROOT.Char.GetTitledFirstNameNoTooltip|l]! Até um rápido olhar demonstra grande cuidado e atenção aos detalhes; [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l] se sentirá eufóric[employer.Custom('ES_OA')]!\". Inclino a cabeça graciosamente diante do elogio, e o servo faz um gesto para que tragam nossa recompensa."
 laamp_base_contract_schemes.2542.desc.method.quartermasters_stressed_and_wreckt.win: "\"Quem quer que tenha feito este trabalho para você, [ROOT.Char.GetTitledFirstNameNoTooltip|l], realizou um trabalho #EMP formidable#!\", assovia o servo. \"[employer.Custom('ES_ElLa')|U] [employer.GetTitleAsNameNoTooltip|l] ficará encantad[employer.Custom('ES_OA')]\". Atrás de mim, [officer.Custom('ES_ElLa')] [officer.GetTitledFirstName|l] esfrega as têmporas, claramente cansad[officer.Custom('ES_OA')] por seu trabalho mesmo enquanto vêm trazer nossa recompensa."
 laamp_base_contract_schemes.2542.desc.method.quartermasters_skill_sans_stress.win: "\"Quem quer que tenha feito este trabalho para você, [ROOT.Char.GetTitledFirstNameNoTooltip|l], fez um trabalho #EMP excelente#!\", assobia o servo. \"[employer.Custom('ES_ElLa')|U] [employer.GetTitleAsNameNoTooltip|l] ficará muitíssimo satisfeit[employer.Custom('ES_OA')]\". Ao meu lado, [officer.Custom('ES_ElLa')] [officer.GetTitledFirstName|l] se endireita um pouco, transbordando de orgulho silencioso, enquanto nossa recompensa é trazida até nós."
 laamp_base_contract_schemes.2542.desc.method.combi_own_skill_and_quartermasters.win: "\"Que [Select_CString(And(ROOT.Char.IsFemale, officer.IsFemale),'servidoras','servidores')] mais diligentes vocês são [Select_CString(And(ROOT.Char.IsFemale, officer.IsFemale),'feitas','feitos')]!\", ri com satisfação [Select_CString( dummy_gender.IsFemale, 'a funcionária', 'o funcionário' )] [officer.Custom('ES_DelDela')] [officer.GetTitledFirstName|l] e de mim, \"estes registros são minuciosos o bastante para [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l]; até mesmo sua caligrafia é excelente. Vou buscar imediatamente a recompensa merecida de vocês\"."
 laamp_base_contract_schemes.2542.desc.method.own_skill.dishonest.win: "\"Por [employer.GetFaith.KnowledgeGodName], que quantidade de informações vocês descobriram! E #EMP tanta#! tão inesperada... Se eu não tivesse lido com meus próprios olhos, mal acreditaria. [employer.Custom('ES_ElLa')|U] [employer.GetTitleAsNameNoTooltip|l] ficará muito satisfeit[employer.Custom('ES_OA')] com seus esforços!\"."
 laamp_base_contract_schemes.2542.desc.method.own_skill.guessed.win: "«Ora, ora, se esses registros seus são ao menos #EMP um pouco#! exatos, então parece que nosso conhecimento sobre as terras [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] é tão lamentavelmente deficiente que talvez tenhamos de encomendar um censo mais detalhado imediatamente. Um trabalho magnífico!»."
 laamp_base_contract_schemes.2542.desc.method.combi_own_skill_dishonest_and_guessed.win: "Nossa, estes fatos que vocês reuniram são bastante #EMP surpreendentes#!… Devo confessar que não fazia muita ideia de tudo isso. Parece que as terras [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] são muito mais diversas do que imaginávamos. Ainda assim, é um ótimo trabalho que vocês fizeram, [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTierNoTooltip|l] estará encantad[employer.Custom('ES_OA')]!"
 laamp_base_contract_schemes.2542.desc.method.mixed.win: "\"Bem, ah, vejo que seus… registros… parecem estar em ordem. São um pouco ecléticos — como vocês os fizeram exatamente? Ah, bem, acho que não importa. [employer.Custom('ES_ElLa')|U] [employer.GetTitleAsNameNoTooltip|l] estará feliz e isso é tudo o que importa\"."
 laamp_base_contract_schemes.2542.desc.method.own_skill.honest.loss: "«Bom, vejo que ao menos o #EMP tentaram#!, mas há erros óbvios demais nestes documentos, até mesmo num olhar rápido, para que [employer.Custom('ES_ElLa')] [employer.GetTitleAsName|l] possa utilizá-los. Sinto muito, mas vocês não receberão nada por um trabalho tão desleixado, não importa quanto esforço tenham dedicado a ele»."
 laamp_base_contract_schemes.2542.desc.method.quartermasters_stressed_and_wreckt.loss: "«Não… não sei a quem vocês mandaram tirar seu ditado ou conduzir seus interrogatórios, mas preciso perguntar: eles são consanguíneos ou é só um simplório[officer.Custom('ES_OA')]?».\n\nAtrás de mim, em algum lugar, [officer.Custom('ES_ElLa')] [officer.GetTitledFirstName|l] cai no choro."
 laamp_base_contract_schemes.2542.desc.method.quartermasters_skill_sans_stress.loss: "“Olha, vejo que você tentou, mas quem quer que vocês tenham pago para tomar estas notas por vocês… vocês estão pagando demais.”\n\nAo meu lado, [officer.Custom('ES_ElLa')] [officer.GetTitledFirstName|l] bufa alto."
 laamp_base_contract_schemes.2542.desc.method.combi_own_skill_and_quartermasters.loss: "Com hesitação, [Select_CString( dummy_gender.IsFemale, 'a funcionária', 'o funcionário' )] revisa os registros que [officer.Custom('ES_ElLa')] [officer.GetTitledFirstName|l] e eu compilamos com grande cuidado. Folheia as páginas com desdém cada vez maior, até que, por fim, faz um espetáculo ao jogar no chão minha [ROOT.Char.Custom('GetWritingMaterial')] que tanto custou antes de partir sem dizer uma palavra."
 laamp_base_contract_schemes.2542.desc.method.own_skill.dishonest.loss: "Após uma breve inspeção, levanta os olhos: \"Vocês acham que em [employer.GetCapitalLocation.GetTitle.GetNameNoTier] somos #EMP idiotas#!? Tolos que vocês podem simplesmente enganar e nós não perceberemos nada, por mais desastradas que sejam suas falsificações sem cérebro? Vocês não receberão pagamento algum por essa charlatanice!\"."
 laamp_base_contract_schemes.2542.desc.method.own_skill.guessed.loss: "«O quê... como... vocês claramente inventaram #EMP muito#! claramente um galimatias absoluto. O que possuiu vocês para pensar que poderiam tirar algum dinheiro disso, loc[ROOT.Char.Custom('ES_OA')]?».\n\n[Select_CString( dummy_gender.IsFemale, 'A servidora', 'O servidor' )] [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] se foi antes que pudéssemos proclamar nossa inocência."
 laamp_base_contract_schemes.2542.desc.method.combi_own_skill_dishonest_and_guessed.loss: "Não demora muito para descobrir nossas soluções… #EMP innovadoras#! diante de circunstâncias complicadas. Depois de uma pequena bronca por nossa audácia descarada, [Select_CString( dummy_gender.IsFemale, 'la servidora', 'el servidor' )] [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] vai embora."
 laamp_base_contract_schemes.2542.desc.method.mixed.loss: "\"Olhe, sinceramente. Isso é… uma bagunça. Nem consigo decifrar o que vocês #EMP intentabais#! fazer aqui e acho que todos sabemos que vocês não merecem uma única moeda por…\", faz um gesto de desdém, \"o que quer que seja #EMP esto#!\"."
 laamp_base_contract_schemes.2542.desc.outro.win: "\n\n[ROOT.Char.GetPrimaryTitle.GetDefinitiveName] recebe o que lhe é devido: um grande baú de moedas de prata por nosso trabalho."
 laamp_base_contract_schemes.2542.desc.outro.loss: "\n\nHoje, [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] ficam de mãos vazias."
 laamp_base_contract_schemes.2542.a.crit_win: "Uma grande vitória!"
 laamp_base_contract_schemes.2542.a.win: "Fizemos um bom trabalho."
 laamp_base_contract_schemes.2542.a.fail: "Bah, vamos deixar estes ingratos."
 laamp_base_contract_schemes.2542.a.crit_fail: "De fato, isto foi uma perda de tempo."
 laamp_base_contract_schemes.2661.t: "$laamp_base_contract_schemes.2031.t$: Marco Local"
 laamp_base_contract_schemes.2661.desc: "A disputa de [employer.GetPrimaryTitle.GetBaseNameNoTier] decorre de um caso jurídico local menor: [Select_CString( employer.IsFemale, 'nuestra empleadora', 'nuestro empleador' )] decidiu, tolamente, que um determinado marco natural tinha limites um pouco diferentes dos tradicionais.\n\nImediatamente, dezenas de casos foram movidos por pequenos proprietários de terra e camponeses privilegiados, todos os quais tinham alguma queixa ou outra agora levantada pela mudança na definição."
 laamp_base_contract_schemes.2661.desc.outro: "\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] se esforça muito em nos fazer saber que nossas moedas dependem de apaziguarmos esta situação rápida e discretamente."
 laamp_base_contract_schemes.2661.a: "Isto parece um problema simples o bastante..."
 laamp_base_contract_schemes.2661.b: "Acho que consigo resolver isto..."
 laamp_base_contract_schemes.2661.b.tt.success: "Você encontra um compromisso adequado"
 laamp_base_contract_schemes.2661.b.tt.failure: "As discussões desmoronam"
 laamp_base_contract_schemes.2661.c: "Suspeito que a precisão importe menos aqui do que a clareza."
 laamp_base_contract_schemes.2661.d.sacrifice_exists: "[sacrifice.GetFirstNameNoTooltip] ficará para trabalhar nesta disputa."
 laamp_base_contract_schemes.2661.d.sacrifice_unexists: "Ai de mim, não tenho servos habilidosos o bastante para deixar com você."
 laamp_base_contract_schemes.2661.d.no_valid_char: "Você não dispõe de nenhum [follower|lE] com pelo menos [EmptyScope.ScriptValue('laamp_base_contract_schemes_2661_other_skill_threshold_value')|0] de [intrigue|lE] para designar temporariamente à [court|lE] de [employer.GetFirstName]"
 laamp_base_contract_schemes.2661.d.tt.courtier_stays_here: "Será emprestado para [sacrifice.GetFirstName] à [court|lE] [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l]; retornará para você entre [EmptyScope.ScriptValue('laamp_base_contract_schemes_2661_sacrifice_loan_length_min_value')|0] e [EmptyScope.ScriptValue('laamp_base_contract_schemes_2661_sacrifice_loan_length_max_value')|0] anos depois."
 laamp_base_contract_schemes.2661.e.officer_exists: "[officer.GetTitledFirstName], isso não parece ser sua área?"
 laamp_base_contract_schemes.2661.e.officer_unexists: "Hrmph, não tenho um oficial adequado a quem delegar."
 laamp_base_contract_schemes.2661.f: "Uma chance para um debate esclarecido, você diz?"
 laamp_base_contract_schemes.2661.g: "Posso resolver qualquer coisa se realmente me dedicar a isso!"
 laamp_base_contract_schemes.2662.t: "$laamp_base_contract_schemes.2031.t$: Sucesso!"
 laamp_base_contract_schemes.2662.desc.resolution_type.stewardship: "As boas gentes de [employer.GetPrimaryTitle.GetBaseNameNoTier] têm muitos argumentos, alguns válidos, outros não, mas #EMP nenhuma#! coerente.\n\nNão levo muito tempo para desmontar os argumentos deles, mostrando que cada um é jocoso, tolo ou ambos.\n\nCom apenas algumas horas de trabalho, consigo reverter a situação a favor de [Select_CString( employer.IsFemale, 'nossa empregadora', 'nosso empregador' )] até que seu novo governo pareça — para consternação e irritação de seus súditos — inteiramente em conformidade com a tradição."
 laamp_base_contract_schemes.2662.desc.resolution_type.secondary_skill: "Só é preciso um pouco de criatividade verbal para semear a semente da dúvida entre o povo enfurecido de [employer.GetPrimaryTitle.GetBaseNameNoTier].\n\nSugerir que isto foi dito em vez daquilo, que uma frase na verdade significava outra coisa, colocar um ou dois uns contra os outros #EMP et voilà#!.: ninguém tem certeza absoluta de quem está certo e de quem não está para oferecer qualquer resistência significativa.\n\nA questão em si não está resolvida, mas foi diluída o suficiente para que sua raiva se apague e suas objeções se dissipem."
 laamp_base_contract_schemes.2662.desc.resolution_type.left_sacrifice: "Deixamos [sacrifice.Custom('ES_AlAla')] [sacrifice.GetTitledFirstName|l] para que se ponha a trabalhar com os locais furiosos, e [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] e eu vamos dar um passeio.\n\nOs gritos e as acusações de injustiça recuam gradualmente para o fundo, e, ao nos aproximarmos de uma pequena varanda para aproveitar o ar do fim da tarde, [employer.GetFirstNameNoTooltip] sorri pela primeira vez desde que chegamos.\n\n«Muito gentil de sua parte nos ceder um orador[sacrifice.Custom('ES_XA')] tão capaz, [ROOT.Char.GetFirstNameNoTooltip]. De fato, muito gentil. Vou me certificar de que sua viagem de volta seja rápida e segura. Seu pagamento o aguarda nos portões»."
 laamp_base_contract_schemes.2662.desc.resolution_type.officer: "Como [Select_CString( officer.IsFemale, 'caçadora nata', 'caçador nato' )] a avaliação [officer.Custom('ES_DelDela')] [officer.GetTitledFirstName|l] da localização do marco é rápida, precisa e inquestionável.\n\nIsso não impede os cidadãos de [employer.GetPrimaryTitle.GetBaseNameNoTier] tentarem, é claro, mas [officer.GetFirstNameNoTooltip] tem uma resposta para cada um deles, desmontando seus argumentos à medida que chegam a [officer.GetSheHe].\n\nJá é tarde para o almoço quando terminam, mas a multidão de possíveis litigantes acaba se dispersando."
 laamp_base_contract_schemes.2662.desc.resolution_type.camp_purpose: "Pode ser que o bom povo de [employer.GetPrimaryTitle.GetBaseNameNoTier] seja fervoroso defensor de si mesmo, mas não havia considerado a fúria acadêmica desencadeada de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName].\n\nNossas discussões tomam boa parte do dia, algo que considero estimulante, mas que eles parecem temer cada vez mais à medida que a hora avança.\n\nNa verdade, não chegamos a nenhuma conclusão de fato, mas os locais acabam simplesmente desistindo. Uma pergunta é respondida com outra pergunta, cada assunto é revisitado várias vezes, e os pontos divagam sem parar, sem parar, sem parar..."
 laamp_base_contract_schemes.2662.desc.resolution_type.stress: "Pode ser que a pura teimosia não seja uma forma eficiente de resolver todos os problemas, e, sem dúvida, sinto o peso de me envolver em uma gritaria tão implacável com tantos moradores enfurecidos, mas é eficaz.\n\nDepois de algumas poucas horas de gritos e intimidações, o povo de [employer.GetPrimaryTitle.GetBaseNameNoTier] acaba cedendo, timidamente.\n\nComo eu sabia que fariam, se mostrasse minha vontade."
 laamp_base_contract_schemes.2662.desc.outro: "\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] parece agradecid[employer.Custom('ES_OA')] com o simples fato de que esse desastre finalmente tenha acabado."
 laamp_base_contract_schemes.2662.a: "Mais um $game_concept_contact_list_contact$ satisfeito."
 laamp_base_contract_schemes.2663.t: "$laamp_base_contract_schemes.2031.t$: Falha!"
 laamp_base_contract_schemes.2663.desc.stewardship: "Poder-se-ia dizer que minhas habilidades administrativas não… são #EMP exatamente como#! como eu as imaginava.\n\nAchei que a opinião informada de uma pessoa de importância seria útil para esclarecer as coisas. Em vez disso, minhas tentativas de esclarecer os limites do marco só criaram uma #EMP terceira#! norma que contesta as duas primeiras e lança os diversos beligerantes em um frenesi de discussões."
 laamp_base_contract_schemes.2663.desc.officer: "Apesar dos esforços de [officer.Custom('ES_DelDela')] [officer.GetTitledFirstName|l], o povo de [employer.GetPrimaryTitle.GetBaseNameNoTier] está em polvorosa.\n\nParece que as tentativas do meu caçador[officer.Custom('ES_XA')] para esclarecer os limites do ponto de referência só criaram um #EMP tercer#! conjunto de definições que disputa com os dois primeiros."
 laamp_base_contract_schemes.2663.desc.outro: "\n\nA partir daí, parece que todas as antigas rixas de [employer.GetPrimaryTitle.GetDeJureLiege.GetBaseNameNoTier], e os ressentimentos e exigências duvidosas se espalham entre os locais enquanto [employer.GetPrimaryTitle.GetDeJureLiege.GetTierAsNameNoTooltip] corre o risco de transbordar por causa disso.\n\nFurios[employer.Custom('ES_OA')], [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] nos expulsa do assentamento, sem nos dar uma moeda sequer por nossos apuros."
 laamp_base_contract_schemes.2663.a: "Fizemos o nosso melhor..."
 laamp_base_contract_schemes.2666.t: "$laamp_base_contract_schemes.2031.t$: Taxação em Dobro"
 laamp_base_contract_schemes.2666.desc: "[employer.GetPrimaryTitle.GetBaseNameNoTier] já está em alvoroço muito antes da nossa chegada — aparentemente, anos de erros por parte do nosso empregador e de seus semelhantes fizeram com que muitas propriedades e negócios locais fossem taxados #EMP duas vezes ou mais#!, só que por cobradores diferentes com deveres diferentes.\n\nDepois de muito resmungo e tentativas de reparação educada, a situação finalmente ameaça transbordar para algo mais sangrento."
 laamp_base_contract_schemes.2666.desc.outro: "$laamp_base_contract_schemes.2661.desc.outro$"
 laamp_base_contract_schemes.2666.a: "$laamp_base_contract_schemes.2661.a$"
