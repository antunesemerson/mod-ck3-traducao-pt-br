 laamp_base_contract_schemes.2666.e.officer_unexists: "$laamp_base_contract_schemes.2661.e.officer_unexists$"
 laamp_base_contract_schemes.2666.f: "Precisamos simplesmente redesenhar os limites!"
 laamp_base_contract_schemes.2666.g: "$laamp_base_contract_schemes.2661.g$"
 laamp_base_contract_schemes.2667.t: "$laamp_base_contract_schemes.2031.t$: Sucesso!"
 laamp_base_contract_schemes.2667.desc.resolution_type.stewardship: "A tributação é contabilidade, e a contabilidade é uma espécie de arte pouco apreciada hoje em dia.\n\nAgora que nos foi fornecida uma lista de deveres locais, levamos a maior parte do dia para revisar cada #EMP suposto#! incidente de sobretributação alegado e demonstrar que isso era simplesmente um dever não pago em outro lugar. O povo de [employer.GetPrimaryTitle.GetBaseNameNoTier] resmunga, naturalmente, mas a maioria acaba se conformando.\n\nPara os poucos capazes de reunir álibis substanciais, conceder ocasionalmente uma isenção das taxas do ano que vem compra seu silêncio cúmplice — apesar das reclamações murmuradas [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l]."
 laamp_base_contract_schemes.2667.desc.resolution_type.secondary_skill: "É evidente que o povo de [employer.GetPrimaryTitle.GetBaseNameNoTier] se considera sofisticado, mas não tinha levado em conta a lábia de alguém da família [ROOT.Char.GetHouse.GetName].\n\nCom habilidade, embaralho suas mesquinhas objeções e semeio a semente da dúvida entre eles, lhes mostro o bom trabalho que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] faz ao mantê-los a salvo, ao mesmo tempo em que lhes lembro #EMP sutilmente#! quem detém o monopólio local da força.\n\nNo fim das contas, talvez eu tenha exagerado um pouco, mas... quando a situação é divertida..."
 laamp_base_contract_schemes.2667.desc.resolution_type.left_sacrifice: "Embora esteja um pouco consternad[sacrifice.Custom('ES_OA')] com a ideia de ficar para trás, [sacrifice.Custom('ES_ElLa')] [sacrifice.GetTitledFirstName|l], ainda assim, ele se senta e começa a ouvir as mil e uma objeções do povo de [employer.GetPrimaryTitle.GetBaseNameNoTier].\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] me leva embora muito agradecid[employer.Custom('ES_OA')] e deixa que os inferiores façam seu trabalho.\n\n«Muito gentil da sua parte nos deixar um[sacrifice.Custom('ES_XA')] servidor[sacrifice.Custom('ES_XA')] tão promissor[sacrifice.Custom('ES_XA')]; asseguro-vos que cuidarão bem de [sacrifice.GetSheHe] durante sua estadia! Agora, acho que havia a questão de seu pagamento…»."
 laamp_base_contract_schemes.2667.desc.resolution_type.officer: "Por sorte, a habilidade de gestão [officer.Custom('ES_DelDela')]tesoureiro [officer.GetFirstName] demonstra ser suficiente para vencer o dia.\n\nLeva horas de duro debate e auditoria verbal, mas é capaz de encontrar dívidas antigas suficientes, taxas não pagas, favores ainda não cobrados e coisas do tipo para fazer parecer que a maioria das cobranças extras foi simplesmente rotulada de forma incorreta.\n\nIsso não resolve a longo prazo o desagradável hábito [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] de cobrar impostos em excesso, mas é suficiente para satisfazer [Select_CString( employer.IsFemale, 'nossa empregadora', 'nosso empregador' )] por enquanto."
 laamp_base_contract_schemes.2667.desc.resolution_type.camp_purpose: "[ROOT.Char.GetPrimaryTitle.GetDefinitiveName|U] tem experiência no campo da cartografia e, entre histórias meio inventadas e afirmações ousadas sobre o #EMP novo#! modo de fazer as coisas, cede terreno para nós.\n\nAs boas pessoas de [employer.GetPrimaryTitle.GetBaseNameNoTier] sentem tal alívio com a perspectiva de acabar com a dupla tributação que parecem dispostas a ignorar tacitamente as taxas extras que já lhes foram cobradas, algo que deixo enfaticamente claro a [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l] que é uma vitória que [employer.GetSheHe] deve simplesmente aceitar."
 laamp_base_contract_schemes.2667.desc.resolution_type.stress: "Falar com os magnatas menores de [employer.GetPrimaryTitle.GetBaseNameNoTier] é totalmente, completamente exaustivo.\n\nExaustivo, mas não impossível, e com coragem e determinação, no fim consigo dissuadir #EMP a maioria#! deles. Não é uma solução permanente, mas intimidar a maioria para que fique em silêncio parece ser suficiente para satisfazer [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l] e, no fundo, estamos aqui para isso."
 laamp_base_contract_schemes.2667.desc.outro: "\n\nSaímos da cidade mais tarde naquele dia, com as bolsas pesadas de moedas novas."
 laamp_base_contract_schemes.2667.a: "$laamp_base_contract_schemes.2662.a$"
 laamp_base_contract_schemes.2668.t: "$laamp_base_contract_schemes.2031.t$: Falha!"
 laamp_base_contract_schemes.2668.desc.stewardship: "Não era, ao que parece, um problema tão simples.\n\nMeus esforços para resolver a situação, acalmar os habitantes locais e prometer uma espécie de reparação foram imediatamente minados pela negação beligerante [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] de ter feito qualquer coisa errada.\n\nA partir daí, a situação saiu rapidamente do meu controle, com todos os lados gritando uns com os outros e a cidade à beira da anarquia completa."
 laamp_base_contract_schemes.2668.desc.officer: "Os métodos [officer.Custom('ES_DelDela')] Tesoureiro [officer.GetFirstName] demonstram ser… insuficientes.\n\nSuas tentativas de obter uma contabilidade completa e franca dos impostos — pagos, não pagos e pagos a mais — são interrompidas a cada passo por um[employer.Custom('ES_XA')] [employer.GetTitledFirstName|l] irritad[employer.Custom('ES_OA')] e a cidadania frustrada e aflita da cidade.\n\nLogo, tudo desanda em mais uma troca de gritos, e toda aparência de controle se perde."
 laamp_base_contract_schemes.2668.desc.outro: "\n\nSomos forçados a deixar [employer.GetPrimaryTitle.GetBaseNameNoTier] de mãos vazias."
 laamp_base_contract_schemes.2668.a: "$laamp_base_contract_schemes.2663.a$"
 laamp_base_contract_schemes.2671.t: "$laamp_base_contract_schemes.2031.t$: Muralhas em Ruínas"
 laamp_base_contract_schemes.2671.desc: "O problema subjacente em [employer.GetPrimaryTitle.GetBaseNameNoTier] é bastante aparente mesmo do lado de fora dos portões apodrecidos — suas muralhas estão em estado terrível.\n\nO principal problema não parece ser reconhecer isso, mas descobrir quem aqui vai #EMP pagar#! para restaurá-las. Uma proposta cara que todos concordam ser necessária e também, de algum modo, problema de #EMP outra pessoa#!."
 laamp_base_contract_schemes.2671.desc.outro: "$laamp_base_contract_schemes.2661.desc.outro$"
 laamp_base_contract_schemes.2671.a: "$laamp_base_contract_schemes.2661.a$"
