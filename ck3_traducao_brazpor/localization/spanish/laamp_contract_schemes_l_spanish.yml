 laamp_extra_contract_schemes.0001.t_culture: "$ep3_contract_event.0020.t$"
 laamp_extra_contract_schemes.0001.t_faith: "$ep3_contract_event.0021.t$"
 laamp_extra_contract_schemes.0001.desc_culture: "Chego a um consenso com meus compatriotas. Nós de [ROOT.Char.GetPrimaryTitle.GetName] somos os mais aptos para ajudar os [task_contract_employer.GetCulture.GetCollectiveNoun] ao nos engajarmos em [scheme.GetName|l].\n\n"
 laamp_extra_contract_schemes.0001.desc_faith: "Chego a um consenso com meus correligionários. Nós de [ROOT.Char.GetPrimaryTitle.GetBaseName] somos os mais aptos para ajudar os [task_contract_employer.GetFaith.GetAdherentNamePlural] ao nos engajarmos em [scheme.GetName|l].\n\n"
 laamp_extra_contract_schemes.0001.desc_diplomacy: "[task_contract_employer.Custom('ES_ElLa')|U] [task_contract_employer.GetTitledFirstName|l] inicia a organização de uma série de audiências: nesse processo, minhas habilidades de oratória serão postas à prova. Negociar bem com os representantes [task_contract_target.Custom('ES_DelDela')] [task_contract_target.GetTitledFirstName|l] pode garantir ao meu empregador seus privilégios."
 laamp_extra_contract_schemes.0001.desc_martial: "[task_contract_target.Custom('ES_ElLa')|lU] [task_contract_target.GetTitledFirstName|l] parece uma pessoa razoável. Ficará furioso quando meus seguidores endurecidos começarem a machucar seus funcionários locais? Reagirá quando começarmos a levar as turbas camponesas a gritar e incendiar? Não, melhor simplesmente aceitar os termos de [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstName|l]…"
 laamp_extra_contract_schemes.0001.desc_intrigue: "Não é possível que [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitledFirstName|l] seja imune aos prazeres da carne, nem que tenha tanto poder e orgulho a ponto de não se envergonhar com a exposição de seus deslizes… Um chantagem bem escolhida poderia até garantir o futuro do povo [task_contract_target.Custom('ES_DelDela')] [task_contract_target.GetTitledFirstName|l]."
 laamp_extra_contract_schemes.0001.desc_learning: "O código de [task_contract_target.GetPrimaryTitle.GetBaseNameNoTier], como todos os ordenamentos jurídicos, deve ter algumas regras e exceções pouco conhecidas que possam ser usadas para acomodar o povo [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstName|l]. Só preciso encontrar algo que eles possam usar."
 laamp_extra_contract_schemes.0001.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_extra_contract_schemes.0001.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_extra_contract_schemes.0001.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_extra_contract_schemes.0001.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_extra_contract_schemes.0001.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_extra_contract_schemes.0002.t_diplomacy: "Sucesso: Esquema $protect_minority_vassal_contract_diplomacy_scheme$"
 laamp_extra_contract_schemes.0002.t_martial: "Sucesso: Esquema $protect_minority_vassal_contract_martial_scheme$"
 laamp_extra_contract_schemes.0002.t_intrigue: "Sucesso: Esquema $protect_minority_vassal_contract_intrigue_scheme$"
 laamp_extra_contract_schemes.0002.t_learning: "Sucesso: Esquema $protect_minority_vassal_contract_learning_scheme$"
 laamp_extra_contract_schemes.0002.desc_diplomacy: "No próprio salão de [task_contract_target.GetName], argumento a causa de [task_contract_employer.Custom('ES_DelDela')] [task_contract_employer.GetTitledFirstName|l]. Com boas novas para relatar e com os aplausos ainda ecoando em meus ouvidos, retorno ao meu empregador[task_contract_employer.Custom('ES_XA')]. \n\n\"“É uma coisa menor, facilmente corrigida”, chamou-a!\", sorri [task_contract_employer.GetFirstNameNoTooltip]. \"Como vós defendestes essa “coisa menor” da liberdade do meu povo! Nossas proteções em breve serão proclamadas oficialmente, e mal consigo imaginar-me mais satisfeit[task_contract_employer.Custom('ES_OA')]\"."
 laamp_extra_contract_schemes.0002.desc_martial: "Como eu esperava, meus seguidores endurecidos semeiam o medo no senhorio [task_contract_target.Custom('ES_DelDela')] [task_contract_target.GetTitledFirstName|l] e o obrigam, por fim —e a partir de uma posição de fraqueza—, a sentar-se à mesa de negociações.\n\n«Vocês causaram um caos que os opressores de [task_contract_employer.GetPrimaryTitle.GetNameNoTier] lembrarão por muito tempo!», admira-se [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstNameNoTooltip|l]. «Deveriam ser #EMP eles#! os que suplicassem por direitos de proteção! Mas, de qualquer forma: em breve, as novas obrigações do meu senhor[task_contract_target.Custom('ES_XA')] estarão em vigor. Uma grande vitória!»."
 laamp_extra_contract_schemes.0002.desc_intrigue: "[task_contract_target.GetName] é uma pessoa bastante complexa… de moral, não de intelecto! Reuni uma vasta coleção de boatos francamente venenosos; com algumas palavras cuidadosamente planejadas e [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitleAsNameNoTooltip|l] será ciente de toda a dignidade que pode perder se se opuser a [task_contract_employer.Custom('ES_AlAla')] [task_contract_employer.GetTitledFirstName|l].\n\n«Com que facilidade a corte do meu senhor[task_contract_target.Custom('ES_XA')] pode se tornar um ninho de víboras!», gaba-se [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstName|l]. «Serei misericordioso e lhe darei a chance de conceder direitos ao meu povo… antes de expor seus assuntos aos olhos de todos»."
 laamp_extra_contract_schemes.0002.desc_learning: "Examino tudo o que posso encontrar sobre o direito [task_contract_target.GetPrimaryTitle.GetAdjectiveNoTooltip]; o cânone [task_contract_target.GetFaith.GetAdherentName], os princípios [task_contract_target.GetCulture.GetName]… Ah, sim, reuni todo um arsenal de precedentes e nuances.\n\n\"Explique de novo…\", pede [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstName|l]. \"Preciso invocar [task_contract_target.GetFaith.WarGodName] quando levanto a questão da honra inviolável, certo? Ah, não importa — nosso caso está mais forte do que nunca! A aprovação [task_contract_target.Custom('ES_DelDela')] [task_contract_target.GetTitledFirstName|l] é apenas uma formalidade."
 laamp_extra_contract_schemes.0002.a: "O povo de [task_contract_employer.GetCapitalLocation.GetNameNoTooltip] pode se alegrar!"
 laamp_extra_contract_schemes.0003.t_diplomacy: "Falha: Esquema $protect_minority_vassal_contract_diplomacy_scheme$"
 laamp_extra_contract_schemes.0003.t_martial: "Falha: Esquema $protect_minority_vassal_contract_martial_scheme$"
 laamp_extra_contract_schemes.0003.t_intrigue: "Falha: Esquema $protect_minority_vassal_contract_intrigue_scheme$"
 laamp_extra_contract_schemes.0003.t_learning: "Falha: Esquema $protect_minority_vassal_contract_learning_scheme$"
 laamp_extra_contract_schemes.0003.desc_diplomacy: "[task_contract_target.GetName] não me dá absolutamente nada, nem margem nem compaixão alguma. Minhas palavras não importam, os representantes de [task_contract_target.GetPrimaryTitle.GetName] só se limitaram a rir na minha cara.\n\n\"Disseram-me que meu senhor[task_contract_target.Custom('ES_XA')] está #EMP hartado#! do vosso incômodo!\", grita [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstNameNoTooltip|l]. \"Vosso coração mole —e meu pobre povo— são motivo de zombaria por todo [task_contract_employerr.GetPrimaryTitle.GetNameNoTierNoTooltip]! Óbvia foi vossa artimanha… e agora #EMP nosotros#! sofremos as consequências\"."
 laamp_extra_contract_schemes.0003.desc_martial: "Embora meus seguidores espalhem-se livremente por [task_contract_target.GetPrimaryTitle.GetName], [task_contract_target.GetName] não vacila. Todo assédio ao seu povo é retribuído na mesma moeda a [task_contract_employer.Custom('ES_AlAla')] [task_contract_employer.GetTitledFirstName|l].\n\n\"Já estamos fartos!\", diz meu empregador[task_contract_employer.Custom('ES_XA')]. \"Esses tempos terríveis vão nos destruir! Mandai embora os vossos brutamontes, ou meus [task_contract_employer.Custom('KnightCulturePluralNoTooltip')|l] e os de meu senhor[task_contract_target.Custom('ES_XA')] se unirão contra vós!\"."
 laamp_extra_contract_schemes.0003.desc_intrigue: "[task_contract_target.GetName] revela-se uma pessoa muito inteligente, muito discreta. Não encontrando nenhuma sujeira substancial, tentei espalhar rumores em sua corte, mas todos são contestados e esmagados na hora.\n\n\"Seus agentes balbuciam como crianças!\", insulta meu empregador[task_contract_employer.Custom('ES_XA')]. \"Dizeis que vossas intrigas blindarão meu povo, mas nos envolveis em sombras e sussurros que se dissipam quando ditos em voz alta! Este estratagema sempre foi inútil…\"."
 laamp_extra_contract_schemes.0003.desc_learning: "Examino tudo o que posso encontrar do direito [task_contract_target.GetPrimaryTitle.GetAdjectiveNoTooltip]: o cânon [task_contract_target.GetFaith.GetAdherentName], os princípios [task_contract_target.GetCulture.GetName]… Reuni alguns argumentos fracos, mas meu jargão criativo não consegue impressionar [task_contract_employer.GetName].\n\n\"#EMP Isto#! é isso que vocês imaginaram? Vocês acham que meu povo deve ser legalmente tratado como #EMP crianças#! em [task_contract_target.GetPrimaryTitle.GetName]?!\" grita [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitleAsNameNoTooltip|l]. \"Não é apenas uma artimanha mesquinha e humilhante, e [task_contract_target.Custom('ES_ElLa')] [task_contract_target.GetTitledFirstName|l] vai perceber isso facilmente! Não… não temos esperança.\","
 laamp_extra_contract_schemes.0003.a: "Não melhorei as coisas para [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstNameNoTooltip|l]…"
 laamp_help_find_secrets_scheme: "Descobrir Segredos"
 laamp_help_find_secrets_scheme_action: "Descobrir Segredos sobre"
 laamp_help_find_secrets_scheme_desc: "Descubra os segredos dos [vassals|lE] do [contractor|lE], permitindo que você os chantageie por [hooks|lE] ou reporte ao seu [contractor|lE]."
 laamp_help_find_secrets_scheme_desc_general: "$laamp_help_find_secrets_scheme_desc$"
 laamp_help_find_secrets_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_extra_contract_schemes.0022.t: "$ep3_contract_event.0100.t$"
 laamp_extra_contract_schemes.0022.a: "Vou guardar essa obrigação para mim."
 laamp_extra_contract_schemes.0022.b: "Um pretexto perfeito para [councillor_liege.Custom('ES_ElLa')] [councillor_liege.GetTitleAsNameNoTooltip|l]."
 laamp_extra_contract_schemes.0022.c: "Não posso me rebaixar tanto."
 laamp_extra_contract_schemes.0023.t: "$ep3_contract_event.0100.t$"
 laamp_extra_contract_schemes.0023.desc: "\"Meu suserano[task_contract_councillor_liege.Custom('ES_XA')] fica satisfeito com os insights que você obteve. Você encontrou, quanto? [secrets_found_value]? Nada mal…\", [task_contract_councillor.GetName] se inclina para a luz, revelando que, de algum modo, está comigo na minha tenda.\n\n\"Como você chegou aqui despercebid[task_contract_councillor.Custom('ES_OA')]?\", pergunto, confuso, mas antes que eu possa chamar meus guardas, já não há mais ninguém. Só resta um considerável saco de moedas."
 laamp_extra_contract_schemes.0023.a: "Vou simplesmente pegar o ouro. Melhor não pensar nisso."
 laamp_extra_contract_schemes.0024.t: "$ep3_contract_event.0100.t$"
 laamp_extra_contract_schemes.0024.desc: "«Estou aguardando seu relatório, mas nada me chegou. Já estava preocupad[task_contract_councillor.Custom('ES_OA')]… Será que vocês se esqueceram do nosso acordo?», [task_contract_councillor.GetName] zomba de mim… justo quando eu estava indo ao privy! Que atrevimento! Como conseguiu chegar até aqui sem ser perceb[task_contract_councillor.Custom('ES_OA')]?\n\n«Coloquei agentes em todos os cantos de [task_contract_target.GetCapitalLocation.GetName], sem sucesso», explico. «Ou os cortesãos [task_contract_target.Custom('ES_DelDela')] [task_contract_target.GetTitledFirstName|l] são leais ou, simplesmente, não há nada que mereça virar rumor».\n\n«Uma desculpa petulante…, pensei que vocês pudessem fazer melhor. Ao menos uma mentira mais bonita. Considerem nosso acordo encerrado». Balançando a cabeça, [task_contract_councillor.GetFirstNameNoTooltip] desaparece tão rápido quanto surgiu."
 laamp_extra_contract_schemes.0024.a: "Que perda de tempo!"
 laamp_extra_contract_schemes.0030.t: "$ep3_contract_event.0080.t$"
 laamp_extra_contract_schemes.0030.desc: "As notícias da minha reivindicação recém-forjada chegam rapidamente a [task_contract_councillor.GetName].\n\n\"Parabéns! Um trabalho bem feito\", diz [task_contract_councillor.GetFirstNameNoTooltip], como se estivesse se dando tapinhas nas costas[task_contract_councillor.Custom('ES_OA')].\n\n\"[task_contract_councillor_liege.Custom('ES_ElLa')|U] [task_contract_councillor_liege.GetTitledFirstName|l] estará bastante satisfeit[task_contract_councillor_liege.Custom('ES_OA')] e certamente o recompensará adequadamente. A partir daqui, eu cuidarei do nosso precioso escrito... se você pudesse me entregá-lo?\", [task_contract_councillor.GetFirstNameNoTooltip] rapidamente fica agitado. \"Vamos então! Dê isso para mim!\", diz, estalando os dedos."
 laamp_extra_contract_schemes.0030.a: "Vou guardar uma cópia para mim."
 laamp_extra_contract_schemes.0030.b: "[target.GetNameNoTooltip] estará em mãos melhores!"
 laamp_extra_contract_schemes.0030.c: "Não confio mais em você..."
 laamp_prison_break_scheme: "Fuga da Prisão"
 laamp_prison_break_scheme_action: "Resgatar da Prisão de"
 laamp_prison_break_scheme_desc: "Planeje e execute um resgate do [spouse|lE], [family|lE], [best_friend|lE] ou [soulmate|lE] do [contractor|lE] de uma [prison|lE]."
 laamp_prison_break_scheme_desc_general: "$laamp_prison_break_scheme_desc$"
 laamp_prison_break_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_extra_contract_schemes.0011.t: "$ep3_contract_event.0030.t$"
 laamp_extra_contract_schemes.0011.desc: "[task_contract_employer.Custom('ES_ElLa')|U] [task_contract_employer.GetTitledFirstName|l] foi inteligente ao recorrer a mim, um[ROOT.Char.GetLiege.Custom('ES_XA')] [ROOT.Char.GetLiege.Custom('KnightCultureNoTooltip')|l] livre com pouco a perder para uma empreitada tão temerária... Há modos de se esgueirar para além das muralhas de [task_contract_target.GetCapitalLocation.GetName], mas nenhum sem grande risco. Com algum pretexto astuto, precisarei pôr olhos amigáveis por todo o caminho até a cela de [task_contract_object.Custom('ES_DelDela')] [task_contract_object.GetTitledFirstName|l]...\n\nAté o menor movimento de [task_contract_employer.Custom2('HerHisCharacterIntroduction', task_contract_object)|U] chamaria atenção. Não, a liberdade de es[task_contract_object.Custom('ES_EA')] [task_contract_object.GetWomanMan] depende somente de [ROOT.Char.GetPrimaryTitle.GetBaseName]."
 laamp_extra_contract_schemes.0011.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_extra_contract_schemes.0011.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_extra_contract_schemes.0011.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_extra_contract_schemes.0011.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_extra_contract_schemes.0011.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_extra_contract_schemes.0012.t: "Sucesso: Esquema $laamp_prison_break_contract_contract$"
 laamp_extra_contract_schemes.0012.desc_thief: "$laamp_extra_contract_schemes.0013.desc_intro$ [agent_thief.Custom('ES_ElLa')|U] astuto [agent_thief.GetFirstName] abre com rapidez a fechadura que nos separa de [task_contract_object.Custom('ES_DelDela')|l] [task_contract_object.GetTitledFirstName|l]."
 laamp_extra_contract_schemes.0012.desc_no_thief: "$laamp_extra_contract_schemes.0013.desc_intro$ Meus dedos estão escorregadios de suor nervoso, mas ainda assim minha gazua encaixa perfeitamente."
 laamp_extra_contract_schemes.0012.desc_lookout: "O vigilante [agent_lookout.GetFirstName] sinaliza que o caminho está livre."
 laamp_extra_contract_schemes.0012.desc_no_lookout: "Então olho freneticamente ao redor em busca de guardas, parece que estamos livres para seguir."
 laamp_extra_contract_schemes.0012.desc: "Mando [task_contract_object.GetFirstNameNoTooltip] fazer silêncio, guiando [task_contract_object.GetHerHim] para as sombras."
 laamp_extra_contract_schemes.0012.desc_infiltrator: "Voltamos pelo meu ponto de entrada — uma janela deixada aberta por [agent_infiltrator.GetFirstName] — e seguimos."
 laamp_extra_contract_schemes.0012.desc_no_infiltrator: "Voltamos pelo meu ponto de entrada — um corredor aparentemente sem guarda — e seguimos."
 laamp_extra_contract_schemes.0012.desc_free: "Furtivamente chegamos até nossos cavalos, saltamos para a sela e disparamos.\n\n\"Você salvou minha vida, de verdade!\" diz [task_contract_object.GetNameNoTooltip], quando enfim diminuímos o ritmo. \"E que emoção foi essa!\""
 laamp_extra_contract_schemes.0012.a: "\"Gosto dessa atitude... junte-se a nós!\""
 laamp_extra_contract_schemes.0012.b: "[task_contract_employer.Custom('ES_ElLa')|U] [task_contract_employer.GetTitledFirstNameNoTooltip|l] o espera ansiosamente."
 laamp_extra_contract_schemes.0013.t: "Falha: Esquema $laamp_prison_break_contract_contract$"
 laamp_extra_contract_schemes.0013.desc_intro: "Na calada da noite, me esgueiro até onde mantêm [task_contract_object.Custom('ES_AlAla')][task_contract_object.GetTitledFirstName|l]."
 laamp_extra_contract_schemes.0013.desc_no_thief: "$laamp_extra_contract_schemes.0013.desc_intro$ Passei um tempo mexendo na porta com uma gazua. Talvez um ladrão conseguisse abri-la, mas eu não. Com os poucos recursos que me restam, dou um pontapé barulhento. E vozes soam por perto... carcereiros!\n\n\"Perdoe-me, meu [task_contract_object.GetLadyLord], mas devo partir. Isto... está um pouco além de mim\", sussurro ao partir.\n\n\"#EMP Bah!#! Obrigado por nada!\", responde uma voz que certamente é a de [task_contract_object.GetFirstNameNoTooltip].\n\n\"Hã? Quem está aí?\", ruge um guarda. Felizmente... estou bem escondid[ROOT.Char.Custom('ES_OA')] enquanto me esgueiro na escuridão."
 laamp_extra_contract_schemes.0013.desc_no_lookout: "$laamp_extra_contract_schemes.0012.desc_no_thief$ Mas, na madeira, há um lampejo de luz de lamparina — os guardas estão perto! Como eu queria ter olhos nas costas! Agarro [task_contract_object.GetFirstNameNoTooltip] para sair correndo como [Select_CString(And(ROOT.Char.IsFemale, task_contract_object.IsFemale),'loucas','loucos')].\n\n\"Quem está aí?\" grita o carcereiro. \"#EMP Alarme! Alarme!#!\".\n\nRapidamente, perseguidores armados se lançam contra [Select_CString(And(ROOT.Char.IsFemale, task_contract_object.IsFemale),'n?s','n?s')] e, no pior momento, [task_contract_object.GetFirstNameNoTooltip] tropeça e cai no chão. Num instante, é cercado; com pouco mais a fazer, eu escapo sozinho.[task_contract_object.GetSheHe]"
 laamp_extra_contract_schemes.0013.desc_no_infiltrator: "$laamp_extra_contract_schemes.0012.desc_no_thief$ $laamp_extra_contract_schemes.0012.desc$ Voltando ao meu ponto de entrada — um salão aparentemente sem vigilância —, vamos nós. Mas sua porta agora está trancada!\n\nEnquanto faço força para abri-la, um guarda aparece atrás de nós!\n\n«Eu o segurarei!», grita [task_contract_object.GetFirstNameNoTooltip]. «Vá embora!».\n\nCom outras vozes soando por perto, tomo a única decisão prática — fujo. Se alguém deve morrer por [task_contract_object.GetSheHe]... não deveria ser [task_contract_employer.Custom('ES_ElLa')] [task_contract_employer.GetTitledFirstName|l]...?"
 laamp_extra_contract_schemes.0013.desc: "$laamp_extra_contract_schemes.0012.desc_no_thief$ $laamp_extra_contract_schemes.0012.desc$ $laamp_extra_contract_schemes.0012.desc_no_infiltrator$\n\nMas os guardas nos fazem cair na armadilha: #EMP eles viram a tentativa de resgate chegando!#!\n\n«Por [task_contract_object.GetFaith.HighGodName]! Sabia que isso era fácil demais!», grita [task_contract_object.GetFirstNameNoTooltip]. «Corram, valente [ROOT.Char.GetLiege.Custom('KnightCultureNoTooltip')|l]!».\n\nOs guardas avançam em massa contra [Select_CString(And(ROOT.Char.IsFemale, task_contract_object.IsFemale), 'nós', 'nós')], não há tempo para pensar, nem esperança de vitória — então eu corro! Por algum milagre, me livro dos meus perseguidores e chego em segurança à muralha externa..., mas [task_contract_object.GetFirstNameNoTooltip] jamais chega."
 laamp_extra_contract_schemes.0013.a: "Certamente [task_contract_object.GetHerHim] será colocado sob vigilância constante…"
 #################################################
 #Contract Employer Consequence Loc
 #(all the assorted guff that employers get in the contract rewards)
 laamp_base_0001_success_employer_modifier: "Cortesãos Entretidos"
 laamp_base_0001_success_employer_modifier_desc: "A corte deste personagem fervilha com histórias mirabolantes sobre terras estrangeiras e uma vida exótica na estrada."
 laamp_base_0001_failure_employer_modifier: "Parasitas Cansativos"
 laamp_base_0001_failure_employer_modifier_desc: "Andarilhos cansativos e trapaceiros desonestos lotam a corte deste personagem, tornando-a um lugar tedioso para se viver."
 laamp_base_0011.tt.success_standard.employer_reward.remove_potential_rivals: "Remove [THIS.Char.MakeScope.ScriptValue('laamp_base_0011_num_removable_potential_rivals_value')] [rivals|lE] em potencial"
 laamp_base_0031_success_employer_modifier: "Mediadores Especialistas"
 laamp_base_0031_success_employer_modifier_desc: "Este personagem trouxe talento considerável para amenizar uma controvérsia em seu reino."
 laamp_base_0031_failure_employer_modifier: "Abdicou da Responsabilidade"
 laamp_base_0031_failure_employer_modifier_desc: "Este personagem tentou arranjar um bode expiatório para receber a ira de seus súditos, mas só conseguiu piorar tudo."
 laamp_base_0041_success_employer_modifier: "Ingênuo"
 laamp_base_0041_success_employer_modifier_desc: "Apesar de seus melhores esforços, este personagem acredita um pouco demais no que lhe dizem."
 laamp_base_0041_failure_employer_modifier: "Vigilante Contra Mentirosos"
 laamp_base_0041_failure_employer_modifier_desc: "Este personagem sabe que ninguém vem à corte sem querer algo, e age de acordo."
 laamp_base_1001_success_employer_modifier: "Criminosos Capturados"
 laamp_base_1001_success_employer_modifier_desc: "Este condado está positivamente livre de elementos reincidentes — por enquanto."
 laamp_base_1021_success_employer_modifier: "Tropas Bem Treinadas"
 laamp_base_1021_success_employer_modifier_desc: "Um instrutor especialista moldou os soldados domésticos deste personagem numa máquina bem ajustada."
 laamp_base_1021_failure_employer_modifier: "Ralé Desleixada"
 laamp_base_1021_failure_employer_modifier_desc: "#EMP Tropas?#! Os soldados domésticos deste personagem parecem mais bêbados de sarjeta do que guerreiros."
 laamp_base_1031_success_employer_modifier: "Terra Pacífica"
 laamp_base_1031_success_employer_modifier_desc: "Este condado desfruta atualmente de um período de relativa calma."
 laamp_base_1031_failure_employer_modifier: "Terra em Turbulência"
 laamp_base_1031_failure_employer_modifier_desc: "Discussões e pequenas escaramuças são uma constante da vida aqui, e os habitantes sabem a quem culpar."
 laamp_base_1041_success_employer_modifier: "Viajantes Emboscados"
 laamp_base_1041_success_employer_modifier_desc: "Seja cobrador de impostos, peregrino ou mercador, as estradas deste condado não são seguras para ninguém."
 laamp_base_1041_failure_employer_modifier: "Estradas Seguras"
 laamp_base_1041_failure_employer_modifier_desc: "Apesar dos melhores esforços de certos criminosos profissionais, os caminhos deste condado continuam bem guardados."
 laamp_base_2021_failure_employer_modifier: "Construção Malfeita"
 laamp_base_2021_failure_employer_modifier_desc: "A infraestrutura deste condado está em completo caos, tornando a construção extremamente cara."
 laamp_base_2031_success_employer_modifier: "Tudo Calmo"
 laamp_base_2031_success_employer_modifier_desc: "Apesar de problemas contínuos com as fronteiras internas exatas, os habitantes deste condado estão atualmente satisfeitos."
 laamp_base_2031_failure_employer_modifier: "Ponto de Ebulição"
 laamp_base_2031_failure_employer_modifier_desc: "As tensões aqui se inflamaram tanto que as pessoas passam mais tempo discutindo do que trabalhando."
 laamp_base_2041_success_employer_modifier: "Falsos Representantes"
 laamp_base_2041_success_employer_modifier_desc: "É fato conhecido que os cobradores de impostos deste personagem já foram personificados antes, complicando seu trabalho sem parar."
 laamp_base_2041_failure_employer_modifier: "Oficiais Confiáveis"
 laamp_base_2041_failure_employer_modifier_desc: "Os súditos deste personagem sabem que, sem os selos apropriados, ninguém que alegue ocupar um cargo realmente o ocupa."
 laamp_base_3001_success_employer_modifier: "Informações Sólidas"
 laamp_base_3001_success_employer_modifier_desc: "Este personagem recebeu relatórios detalhados sobre os acontecimentos em outros reinos."
 laamp_base_3041_success_employer_modifier: "Tesouraria Roubada"
 laamp_base_3041_success_employer_modifier_desc: "Sussurros ao vento dizem que este personagem não consegue manter nem mesmo suas moedas em segurança."
 laamp_base_3041_failure_employer_modifier: "Tesouro Protegido"
 laamp_base_3041_failure_employer_modifier_desc: "Este personagem frustrou uma tentativa contra sua prata acumulada."
 laamp_base_4001_success_employer_modifier: "Documentos em Ordem"
 laamp_base_4001_success_employer_modifier_desc: "Papel pode ser caro, mas a papelada ainda é essencial, e este personagem tem montes dela."
 laamp_base_4001_failure_employer_modifier: "Registros Embaralhados"
 laamp_base_4001_failure_employer_modifier_desc: "Algum bufão incompetente mexeu nos arquivos deste personagem, complicando sua administração."
 laamp_base_4021_success_employer_modifier: "Texto da Moda"
 laamp_base_4021_success_employer_modifier_desc: "Uma fantasia encomendada por este personagem está atualmente bem popular na corte."
 laamp_base_4021_failure_employer_modifier: "Patrono Fora de Moda"
 laamp_base_4021_failure_employer_modifier_desc: "Este personagem é conhecido por jogar seu dinheiro no papo mais confuso."
 laamp_base_4041_success_employer_modifier: "Divindade Falsificada"
 laamp_base_4041_success_employer_modifier_desc: "De talismãs a relíquias, é bem sabido que, se você quiser algo sagrado, pode comprá-lo no reino deste personagem."
 laamp_base_4041_failure_employer_modifier: "Padrões Sagrados"
 laamp_base_4041_failure_employer_modifier_desc: "Este personagem é conhecido por adotar uma postura dura contra relíquias falsas."
 laamp_base_5001_success_employer_modifier: "Feras Abatidas"
 laamp_base_5001_success_employer_modifier_desc: "A população animal deste condado está totalmente sob controle."
 laamp_base_5001_failure_employer_modifier: "Natureza Selvagem à Solta"
 laamp_base_5001_failure_employer_modifier_desc: "As feras se reproduzem livre demais e vagam ferozmente por aqui, ameaçando vida e integridade física."
 laamp_base_5011_success_employer_modifier: "Mercadores Confiantes"
 laamp_base_5011_success_employer_modifier_desc: "A classe mercantil daqui sabe que suas propriedades estão seguras contra danos."
 laamp_base_5011_failure_employer_modifier: "Virou Fumaça"
 laamp_base_5011_failure_employer_modifier_desc: "Os investimentos aqui correm grande risco de virar gravetos."
 laamp_base_5021_success_employer_modifier: "Bem Protegido"
 laamp_base_5021_success_employer_modifier_desc: "Este personagem está bem protegido contra ameaças de qualquer tipo."
 laamp_base_5021_failure_employer_modifier: "Escape por Pouco"
 laamp_base_5021_failure_employer_modifier_desc: "O último encontro deste personagem com a morte foi #EMP por pouco#!, e o próximo provavelmente será ainda mais próximo."
 laamp_base_5031_success_employer_modifier: "Gado Desaparecido"
 laamp_base_5031_success_employer_modifier_desc: "O governante deste condado não consegue nem garantir a segurança de seus rebanhos."
 laamp_base_5031_failure_employer_modifier: "Rebanhos Protegidos"
 laamp_base_5031_failure_employer_modifier_desc: "O gado daqui é mantido em segurança até mesmo dos criminosos mais empreendedores."
 laamp_base_5041_success_employer_modifier: "Só um Pouquinho a Menos"
 laamp_base_5041_success_employer_modifier_desc: "Os animais deste condado estão... menos numerosos do que o esperado, por algum motivo."
 laamp_base_5041_failure_employer_modifier: "Terras Selvagens Protegidas"
 laamp_base_5041_failure_employer_modifier_desc: "Caçadores furtivos serão enforcados."
 #################################################
 #On-Going Diplo Scheme Events
 laamp_base_contract_schemes.0301.t: "Histórias e Glórias"
 laamp_base_contract_schemes.0301.desc: "O jantar na corte [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] é um momento ideal para impressionar seus cortesãos com minhas aventuras ousadas.\n\nQuanto mais contentes estiverem, mais gorda estará a minha bolsa.\n\nÉ claro que isso exige menos astúcia sutil e mais histórias de grandes feitos, repletas de heroísmo e vilania — fiéis ou não."
 laamp_base_contract_schemes.0301.a: "Acho que conheço algumas histórias assim..."
 laamp_base_contract_schemes.0301.a.tt.success: "Seus feitos são encantadores"
 laamp_base_contract_schemes.0301.a.tt.failure: "Suas palavras soam vazias"
 laamp_base_contract_schemes.0301.b: "Minha reputação não fala por si?"
 laamp_base_contract_schemes.0301.b.f: "As chances disso são controladas pelo seu [prestige_level|lE]"
 laamp_base_contract_schemes.0301.b.tt.success: "Ela fala"
 laamp_base_contract_schemes.0301.b.tt.failure: "Ela não fala"
 laamp_base_contract_schemes.0301.c: "Toda história cresce ao ser contada!"
 laamp_base_contract_schemes.0301.c.tt.success: "Histórias mirabolantes são as melhores histórias"
 laamp_base_contract_schemes.0301.c.tt.failure: "Um engano óbvio"
 laamp_base_contract_schemes.0301.d: "Coma a comida grátis e deixe por isso mesmo."
 laamp_base_contract_schemes.0301.e: "Encha os bolsos com pãezinhos grátis."
 laamp_base_contract_schemes_0301_doubtful_stories_modifier: "Histórias Duvidosas"
 laamp_base_contract_schemes_0301_doubtful_stories_modifier_desc: "Há algo de errado nas coisas que dizem."
 laamp_base_contract_schemes.0311.t: "Costas Distantes e Climas Longínquos"
 laamp_base_contract_schemes.0311.desc.only_exotic_culture: "Para os [target.GetCulture.GetCollectiveNoun] como [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l], um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] orgulhos[ROOT.Char.Custom('ES_OA')] da nação [exotic_culture.GetName] como eu é uma curiosidade estranha, talvez até uma espécie de agrado raro: quem sabe quando terão a próxima chance de falar com alguém do meu povo e ouvir as histórias da minha distante terra natal?"
 laamp_base_contract_schemes.0311.desc.only_exotic_faith: "A palavra de [exotic_faith.HighGodName] —certamente, na forma [exotic_faith.GetAdjective] correta— está angustiosamente ausente na terra [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l].\n\nUma situação lamentável, mas uma que #EMP concede#! confere a meus hábitos e rituais um certo exotismo estrangeiro, o que fascina muitos na corte."
 laamp_base_contract_schemes.0311.desc.both_exotic: "Por ser tanto da cultura [exotic_culture.GetName] quanto da fé [exotic_faith.GetAdherentName] meu modo de vida alienígena é infinitamente fascinante para os cortesãos [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l].\n\nMuitos deles jamais viram alguém como eu antes. Talvez nunca voltem a ver um de minha espécie depois que partirmos, embora eu não possa dizer como a história se desenrolará."
 laamp_base_contract_schemes.0311.desc.outro: "\n\nEles não são exatamente... #EMP educados#! em suas opiniões, mas isso só torna todos eles ainda mais fáceis de provocar e, assim, entreter."
 laamp_base_contract_schemes.0311.a: "Deixe-me lhe contar sobre a vida [exotic_culture.GetNameNoTooltip]!"
 laamp_base_contract_schemes.0311.a.tt.success: "Um relato fascinante"
 laamp_base_contract_schemes.0311.a.tt.success.cultural_acceptance: "As histórias de maravilhas estrangeiras de um aventureiro"
 laamp_base_contract_schemes.0311.a.tt.failure: "Uma fala horripilante"
 laamp_base_contract_schemes.0311.a.tt.failure.cultural_acceptance: "As histórias de uma barbárie distante contadas por um estranho"
 laamp_base_contract_schemes.0311.b: "Ahhhh, [exotic_faith.GetNameNoTooltip|l] é algo misterioso..."
 laamp_base_contract_schemes.0311.b.tt.success: "Exotismos sedutores"
 laamp_base_contract_schemes.0311.b.tt.failure: "Devassidão confusa"
 laamp_base_contract_schemes.0311.c: "Eu vou pintar para vocês... um #EMP retrato#!..."
 laamp_base_contract_schemes.0311.c.tt.success: "Mentiras tão doces"
 laamp_base_contract_schemes.0311.c.tt.failure: "Mentiras evidentes demais"
 laamp_base_contract_schemes.0311.d: "Receio que as nuances se perderiam em você."
 laamp_base_contract_schemes_0311_likes_other_faiths_modifier: "Aprecia Fés Equivocadas"
 laamp_base_contract_schemes_0311_likes_other_faiths_modifier_desc: "Este personagem teve ocasião de apreciar os prazeres simples dos teologicamente desviados."
 laamp_base_contract_schemes_0311_hates_other_faiths_modifier: "Detesta Fés Alienígenas"
 laamp_base_contract_schemes_0311_hates_other_faiths_modifier_desc: "Este personagem não faz ideia de como tantas pessoas conseguem estar tão, mas tão erradas."
 laamp_base_contract_schemes.0321.t: "Um Voluntário"
 laamp_base_contract_schemes.0321.desc.intro: "Durante nossa estadia na corte [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], temos feito o possível para cumprir nossa missão de entreter e ocupar os seus servos.\n\n"
 laamp_base_contract_schemes.0321.desc.three_courtiers: "Parece que fizemos nosso trabalho um pouco #EMP demasiado#! bem demais, pois vários de seus cortesãos me abordaram em privado, pedindo para se juntar ao nosso acampamento!\n\n[courtier_1.GetFirstName] parece estar mais ansioso, mas [courtier_2.GetFirstName] e [courtier_3.GetFirstName] não ficam muito atrás.\n\nSem dúvida [target.Custom('ES_ElLa')] [target.GetTitledFirstNameNoTooltip|l] não permitiria que os três partissem conosco, mas talvez nos deixasse levar um."
 laamp_base_contract_schemes.0321.desc.two_courtiers: "Parece que fizemos o trabalho #EMP demais#! bem, visto que dois de seus cortesões se me aproximaram em privado, para pedir que os acolhamos em nosso acampamento!\n\n[courtier_1.GetFirstName] parece estar mais interessado, mas [courtier_2.GetFirstName] não fica muito atrás.\n\nNão há dúvida de que [target.Custom('ES_ElLa')] [target.GetTitledFirstNameNoTooltip|l] não permitirá que levemos [Select_CString(And(courtier_1.IsFemale, courtier_2.IsFemale),'as duas','os dois')] cortesões, mas talvez permita [Select_CString(Or(courtier_1.IsFemale, courtier_2.IsFemale),'uma','um')]."
 laamp_base_contract_schemes.0321.desc.one_courtier: "Parece que fizemos o trabalho satisfatoriamente, já que o cortesão[courtier_1.Custom('ES_OA')] [courtier_1.GetFirstName] se aproximou de mim em privado para pedir que [courtier_1.GetHerHim] acolhamos em nosso acampamento.\n\nNão creio que [target.Custom('ES_ElLa')] [target.GetTitledFirstNameNoTooltip|l] nos negue um[courtier_1.Custom('ES_OA')] de seus serviç[courtier_1.Custom('ES_EA')]os, se eu permitir que [courtier_1.GetFirstNameNoTooltip] se junte a nós."
 laamp_base_contract_schemes.0321.a: "Levaremos você, [courtier_1.GetFirstNameNoTooltip]."
 laamp_base_contract_schemes.0321.b: "Talvez [courtier_2.GetFirstNameNoTooltip] se interesse..."
 laamp_base_contract_schemes.0321.c: "[courtier_3.GetFirstName] seria útil."
 laamp_base_contract_schemes.0321.d: "#EMP Você#!? Com certeza está brincando!"
 laamp_base_contract_schemes.0321.e: "Infelizmente, nossa companhia está lotada."
 laamp_base_contract_schemes.0331.t: "O Que Nos Leva Adiante"
 laamp_base_contract_schemes.0331.desc: "\"Tenho pensado nisso, apreciad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstNameNoTooltip]\", diz [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l], arrastando as palavras em um jantar ocioso, \"contais as histórias da vossa vida e de vossos feitos, mas viveis sob uma aba de barraca enlameada, apenas abrigad[ROOT.Char.Custom('ES_OA')] da chuva torrencial e do sol escaldante\".\n\nAssinto. Não adianta negar isso.\n\n\"Com tantas comodidades básicas da vida negadas a vós, o que vos motiva a levantar pela manhã? Por que continuar marchando se no dia seguinte tereis de fazer tudo de novo?\""
 laamp_base_contract_schemes.0331.a: "Precisa haver um único motivo?"
 laamp_base_contract_schemes.0331.a.tt.success: "Suas palavras são eloquentes"
 laamp_base_contract_schemes.0331.a.tt.failure: "Sua formulação é vazia"
 laamp_base_contract_schemes.0331.b: "Uma estrada aberta deve ser percorrida."
 laamp_base_contract_schemes.0331.b.tt.success: "Doce liberdade"
 laamp_base_contract_schemes.0331.b.tt.failure: "Quão sem rumo"
 laamp_base_contract_schemes.0331.c: "Glória, morte e amigos feitos sobre sangue derramado."
 laamp_base_contract_schemes.0331.c.tt.success: "Duro, mas justo"
 laamp_base_contract_schemes.0331.c.tt.failure: "Comum e vulgar"
 laamp_base_contract_schemes.0331.d: "A Busca pelo Conhecimento não tem fim, apenas entendimento."
 laamp_base_contract_schemes.0331.d.tt.success: "Aprender já é sua própria recompensa"
 laamp_base_contract_schemes.0331.d.tt.failure: "Inútil e impraticável"
 laamp_base_contract_schemes.0331.e: "Simples: ainda há paisagens que não vi."
 laamp_base_contract_schemes.0331.e.tt.success: "Que romântico"
 laamp_base_contract_schemes.0331.e.tt.failure: "Sim, e não valem a pena"
 laamp_base_contract_schemes.0331.f: "Uma chance de fazer negócios e afiar meus #EMP apetites.#!"
 laamp_base_contract_schemes.0331.f.tt.success: "A ambição implacável pode impressionar"
 laamp_base_contract_schemes.0331.f.tt.failure: "Um bandido com outro nome"
 laamp_base_contract_schemes.0331.g: "Você precisa mesmo perguntar, [target.GetFirstNameNoTooltip]?"
 laamp_base_contract_schemes.0331.g.tt.success: "Ambição magnética"
 laamp_base_contract_schemes.0331.g.tt.failure: "Sonhos malnascidos"
 laamp_base_contract_schemes.0331.h: "Mexa na comida e ignore a pergunta."
 laamp_base_contract_schemes.0541.t: "Mão Habilidosa"
 laamp_base_contract_schemes.0541.desc: "Às vezes, impressionar a [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] tem sido o trabalho de uma estação inteira.\n\nApesar de não ser o [target.Custom('ES_ElLa')] maior nobre do mundo, [target.GetFirstNameNoTooltip] tem umas ideias #EMP muito#! curiosas sobre os critérios aos quais os outros devem se ater.\n\nEm situações como essas, o mais seguro é recorrer ao que faço de melhor, escolher algo em que sou bom e deixar minhas habilidades brilharem.\n\nEmbora, para alguém tão imprevisível quanto [target.GetFirstNameNoTooltip], também poderia tentar triunfar em algo que não seja tão meu forte."
 laamp_base_contract_schemes.0541.duel.tt.success: "Você impressiona adequadamente"
 laamp_base_contract_schemes.0541.duel.tt.failure: "Uma demonstração vergonhosa"
 laamp_base_contract_schemes.0541.tt.highest_skill_weaker_results: "Testar sua melhor [skill|lE] dará recompensas menores"
 laamp_base_contract_schemes.0541.tt.lowest_skill_stronger_results: "Testar sua pior [skill|lE] dá recompensas melhores"
 laamp_base_contract_schemes.0541.a: "Minha habilidade com a diplomacia certamente impressionará!"
 laamp_base_contract_schemes.0541.b: "Minha habilidade em assuntos marciais certamente impressionará!"
 laamp_base_contract_schemes.0541.c: "Minha habilidade com questões de dinheiro certamente impressionará!"
 laamp_base_contract_schemes.0541.d: "Minha habilidade em atos sombrios tem um mistério sedutor!"
 laamp_base_contract_schemes.0541.e: "Minha mente erudita certamente impressionará!"
 laamp_base_contract_schemes.0541.f: "Minha destreza com a lâmina fala por si!"
 laamp_base_contract_schemes.0541.g: "Talvez eu pudesse tentar minha mão na diplomacia..."
 laamp_base_contract_schemes.0541.h: "Talvez eu pudesse me mostrar um verdadeiro comandante..."
 laamp_base_contract_schemes.0541.i: "Não sou [ROOT.Char.Custom('ES_ElLa')] #EMP peor#! com o dinheiro…"
 laamp_base_contract_schemes.0541.j: "Eu poderia exibir minha astúcia..."
 laamp_base_contract_schemes.0541.k: "Eu poderia exibir minha grande erudição..."
 laamp_base_contract_schemes.0541.l: "Eu poderia exibir minha habilidade com a lâmina..."
 laamp_base_contract_schemes.0541.m: "Mantenha-se distante."
 laamp_base_contract_schemes.0551.t: "Os Grandes & os Bons"
 laamp_base_contract_schemes.0551.desc: "Em toda corte sempre há aqueles com mais influência do que outros, e os salões [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] não são exceção.\n\nAlguns percorrem os corredores a passos largos, outros se esquivam para sair do caminho.\n\nSe eu realmente quiser causar impressão, não me faria mal ter alguém da elite social local do meu lado, mas quem escolher…?"
 laamp_base_contract_schemes.0551.duel.tt.success: "Você causa uma figura impressionante"
 laamp_base_contract_schemes.0551.duel.tt.failure: "Você é mais tedioso do que imagina"
 laamp_base_contract_schemes.0551.a: "[diplomacy_candidate.GetFirstNameNoTooltip] parece suscetível à influência."
 laamp_base_contract_schemes.0551.b: "Eu poderia impressionar [martial_candidate.GetFirstNameNoTooltip] facilmente."
 laamp_base_contract_schemes.0551.c: "[stewardship.GetFirstNameNoTooltip] e eu temos muito em comum."
 laamp_base_contract_schemes.0551.d: "O que será que [intrigue_candidate.GetFirstNameNoTooltip] anda aprontando?"
 laamp_base_contract_schemes.0551.e: "[learning_candidate.GetFirstNameNoTooltip] parece interessante."
 laamp_base_contract_schemes.0551.f: "Heh, aposto que [prowess_candidate.GetFirstNameNoTooltip] toparia um combate."
 laamp_base_contract_schemes.0551.g: "Isto não seria sensato."
 laamp_base_contract_schemes_0551_impressive_at_court_modifier: "Impressionante na Corte"
 laamp_base_contract_schemes_0551_impressive_at_court_modifier_desc: "Há figuras influentes em toda corte — aqui, elas olham para você."
 laamp_base_contract_schemes_0551_pathetic_at_court_modifier: "Espetáculo Patético"
 laamp_base_contract_schemes_0551_pathetic_at_court_modifier_desc: "Se há algo pior do que a morte na política, é o constrangimento."
 laamp_base_contract_schemes.0561.t: "O Elo Mais Fraco"
 #... obligatory "you are $laamp_base_contract_schemes.0561.t$, goodbye".
 laamp_base_contract_schemes.0561.desc: "Está claro que [insider.Custom('ES_ElLa')] [insider.GetTitledFirstName|l] é uma das figuras mais próximas e queridas [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], no alto da hierarquia social e com #EMP bastante#! influência sobre [Select_CString( target.IsFemale, 'a boa', 'o bom' )] [target.GetTitleAsNameNoTooltip|l].\n\nFazer com que est[insider.Custom('ES_EA')] [insider.GetWomanMan] me teça elogios, seja qual for o motivo, só pode ajudar a minha causa."
 laamp_base_contract_schemes.0561.a: "[insider.GetFirstNameNoTooltip] não resiste aos meus encantos!"
 laamp_base_contract_schemes.0561.a.tt.success: "Suave e controlado"
 laamp_base_contract_schemes.0561.a.tt.failure: "Suados[ROOT.Char.Custom('ES_OA')] e desconexos[ROOT.Char.Custom('ES_OA')]"
 laamp_base_contract_schemes.0561.b: "Um pouco de ouro suaviza toda amizade."
 laamp_base_contract_schemes.0561.c: "Talvez uma #EMP insinuação#! sutil..."
 laamp_base_contract_schemes.0561.c.tt.success: "Você é compreendido"
 laamp_base_contract_schemes.0561.c.tt.failure: "Você está longe de ser sutil"
 laamp_base_contract_schemes.0561.d: "$laamp_base_contract_schemes.0561.c$"
 laamp_base_contract_schemes.0561.d.tt.success: "$laamp_base_contract_schemes.0561.c.tt.success$"
 laamp_base_contract_schemes.0561.d.tt.failure: "$laamp_base_contract_schemes.0561.c.tt.failure$"
 laamp_base_contract_schemes.0561.e: "Melhor deixar[insider.Custom('ES_OA')] estar."
 laamp_base_contract_schemes_0561_charmed_insider_modifier: "Insider Encantado"
 laamp_base_contract_schemes_0561_charmed_insider_modifier_desc: "Um pouco de fascínio pode levar muito longe."
 laamp_base_contract_schemes_0561_bored_insider_modifier: "Insider Entediado"
 laamp_base_contract_schemes_0561_bored_insider_modifier_desc: "Há coisas piores do que ser notavelmente tedioso. Não muitas, porém."
 laamp_base_contract_schemes_0561_bribed_insider_modifier: "Insider Subornado"
 laamp_base_contract_schemes_0561_bribed_insider_modifier_desc: "Pode não ser honesto, mas #EMP é#! eficaz."
 laamp_base_contract_schemes_0561_intimidated_insider_modifier: "Insider Intimidado"
 laamp_base_contract_schemes_0561_intimidated_insider_modifier_desc: "Não que algo vá acontecer, mas e se #EMP pudesse#! acontecer?"
 laamp_base_contract_schemes_0561_spooked_insider_modifier: "Insider Assustado"
 laamp_base_contract_schemes_0561_spooked_insider_modifier_desc: "Palavras ruins da pessoa errada podem ser piores do que veneno."
 laamp_base_contract_schemes.0571.t: "Pago Adiantado"
 laamp_base_contract_schemes.0571.desc: "Ninguém garante que [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] chegue a me dar os presentes que eu tanto desejo, não importa quanto eu me arraste a seus pés.\n\nEstá claro que devo agir, exercendo toda a pressão que puder para conseguir um empréstimo adiantado. Assim, se [target.GetFirstNameNoTooltip] me agraciar ainda mais, eu rirei; e, se não, meus esforços terão sido recompensados antecipadamente."
 laamp_base_contract_schemes.0571.duel.tt.success: "Você arranca uma doação"
 laamp_base_contract_schemes.0571.duel.tt.failure: "Seus avanços são rejeitados"
 laamp_base_contract_schemes.0571.a: "Por [ROOT.Char.GetFaith.WealthGodName], eu terei meu dinheiro!"
 laamp_base_contract_schemes.0571.b: "Uma doação generosa é mais do que suficiente."
 laamp_base_contract_schemes.0571.c: "Melhor ordenhar a cabra do que matá-la."
 laamp_base_contract_schemes.0571.d: "Jogue com total segurança."
