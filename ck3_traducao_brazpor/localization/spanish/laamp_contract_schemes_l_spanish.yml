 laamp_base_contract_schemes.0000.d.no_starting_bonus: "Você assume a tarefa sem esforço particular"
 laamp_base_contract_schemes.0000.generic_option.success_chance: "Lembre-se: estamos aqui para ganhar."
 laamp_base_contract_schemes.0000.generic_option.speed: "Quanto antes acabarmos, mais cedo voltamos para a estrada!"
 laamp_base_contract_schemes.0000.generic_option.progress: "Isso deve ser fácil..."
 laamp_base_contract_schemes.0000.generic_option.secrecy: "Nada de deslizes, #EMP nenhum#! de vocês."
 laamp_base_contract_schemes.0000.generic_option.nothing: "Vamos apenas seguir com a nossa tarefa."
 laamp_base_contract_schemes.0000.generic_option.proceed.neutral: "Temos um longo caminho pela frente."
 laamp_base_contract_schemes.0000.generic_option.proceed.negative.light: "De volta às terras selvagens..."
 laamp_contract_scheme_desc_general_boilerplate: "\n\n#WEAK [contract_schemes|lE] envolvem realizar várias tarefas para os [rulers|lE] proprietários de terras do mundo em troca de pagamento. Concluir um $game_concept_task_contract$ para um $game_concept_ruler$ os adiciona automaticamente à sua [contact_list|lE].#!"
 laamp_contract_scheme_desc_success_boilerplate: "Concluir este [contract_scheme|lE] com sucesso resultará no seu pagamento — #EMP se#! o [contractor|lE] estiver satisfeito."
 scheme_invalidated_title: "Esquema Encerrado"
 contract_invalidated_title: "Contrato Encerrado"
 contract_invalidated_desc: "O [task_contract|lE] em andamento foi invalidado"
