 boilerplate.paragraph: "\n\n"
 option_boilerplate.tt.officer_aptitude: "#WEAK Este duelo é decidido pela [aptitude|lE] do seu [officer|lE]#!"
 option_boilerplate.tt.officer_aptitude.success: "Seu oficial é bem-sucedido"
 option_boilerplate.tt.officer_aptitude.failure: "Seu oficial falha com você"
 gallowsbait_scum_opinion: "Escória de Forca"
 friendly_face_on_the_road_opinion: "Rosto Amigável na Estrada"
 #################################################
 #Base Diplo Scheme Loc
 laamp_base_0001_contract_scheme: "Encantar a Corte"
 laamp_base_0001_contract_scheme_action: "Encantar a Corte de"
 laamp_base_0001_contract_scheme_desc: "Nesta [scheme|lE], a [court|lE] do [contractor|lE] carece de fofocas e, por consequência, está inquieta. Para trazer notícias novas, são oferecidos presentes e hospedagem aos andarilhos de passagem com fama suficiente, tentando-os a ficar com eles por um tempo.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_0001_contract_scheme_desc_general: "$laamp_base_0001_contract_scheme_desc$"
 laamp_base_0001_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_0001_desc_title: "Procuram-se oradores interessantes!"
 laamp_base_0001_desc: "Falai sobre o mundo [TaskContract.GetEmployer.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip] e sobre assuntos mundanos e sede recompensados! Todos aqueles com histórias para contar estão cordialmente convidados a desfrutar da hospitalidade [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier]."
 laamp_base_0011_contract_scheme: "Melhorar a Reputação do Governante"
 laamp_base_0011_contract_scheme_action: "Melhorar a Reputação de"
 laamp_base_0011_contract_scheme_desc: "Um [contractor|lE] acha que sua posição está em falta: ou seu nome está na lama, [vassals|lE] demais o odeiam, ou ele simplesmente não tem o [prestige|lE] necessário para justificar algo que deseja. O que ele precisa é de um terceiro supostamente \"neutro\" para ajudar a... #EMP reforçar#! sua reputação.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_0011_contract_scheme_desc_general: "$laamp_base_0011_contract_scheme_desc$"
 laamp_base_0011_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_0011_desc_title: "Procuram-se emissários eloquentes,"
 laamp_base_0011_desc: "A todos os indivíduos respeitáveis e confiáveis: pode-se encontrar um bom emprego a serviço [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier]. Apenas candidaturas sérias."
 laamp_base_0021_contract_scheme: "Socializar com o Governante"
 laamp_base_0021_contract_scheme_action: "Socializar com"
 laamp_base_0021_contract_scheme_desc: "Quando um [contractor|lE] está claramente faminto por atenção, ele se deixa aberto a oportunistas. Oportunistas que podem comer seu pão, esvaziar sua adega, arrancar alguns \"empréstimos\" e desaparecer antes que os gritos de algum burocrata deem o alarme.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_0021_contract_scheme_desc_general: "$laamp_base_0021_contract_scheme_desc$"
 laamp_base_0021_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_0021_desc_title: "Procuram-se estrangeiros divertidos,"
 laamp_base_0021_desc: "Que se saiba que [TaskContract.GetEmployer.Custom('ES_ElLa')] munificente [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] estende sua generosa hospitalidade a viajantes dignos e merecedores."
 laamp_base_0031_contract_scheme: "Mediar em Nome de"
 laamp_base_0031_contract_scheme_action: "Mediar por"
 laamp_base_0031_contract_scheme_desc: "Quando recriminações locais amargas ecoam pelas terras de um [contractor|lE], e ele próprio é considerado inepto ou parcial demais para resolver a disputa, pode oferecer o papel de mediador imparcial a andarilhos adequados.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_0031_contract_scheme_desc_general: "$laamp_base_0031_contract_scheme_desc$"
 laamp_base_0031_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_0031_desc_title: "Procuram-se andarilhos bem-nascidos,"
 laamp_base_0031_desc: "Árbitros imparciais são procurados por parte [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] para resolver com justiça uma disputa provinciana. Há bônus disponíveis para uma resolução completa."
 laamp_base_0041_contract_scheme: "Trapaceiro de Confiança"
 laamp_base_0041_contract_scheme_action: "Defraudar"
 laamp_base_0041_contract_scheme_desc: "Um tolo e sua riqueza se separam com facilidade. Nenhum [contractor|lE] #EMP pediria#! isso formalmente — não, ele comete o erro de envolver um fraudador em conversa, apenas para descobrir, depois que o contrato é concluído, que foi enganado (ou até roubado) e que o andarilho dúbio já desapareceu.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_0041_contract_scheme_desc_general: "$laamp_base_0041_contract_scheme_desc$"
 laamp_base_0041_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_0041_desc_title: "Procuram-se pessoas fascinantes,"
 laamp_base_0041_desc: "[Select_CString( TaskContract.GetEmployer.IsFemale, 'La sabia', 'El sabio' )], sábio e perspicaz [TaskContract.GetEmployer.GetTitledFirstNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] deseja entretenimento por uma temporada. Serão fornecidos alojamentos #EMP limitados#! #EMP si#! se você atender aos seus critérios exigentes."
 #################################################
 #Base Martial Scheme Loc
 laamp_base_1001_contract_scheme: "Caçar Criminosos"
 laamp_base_1001_contract_scheme_action: "Caçar Criminosos para"
 laamp_base_1001_contract_scheme_desc: "Um bando empreendedor de criminosos pode causar muitos danos à propriedade, ao [prestige|lE] e até à [legitimacy|lE] com o tempo. Grandes o bastante para preocupar, pequenos o bastante para serem difíceis de capturar, esses fora da lei são uma oferta perfeita para [contract_scheme_contract|lE].$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_1001_contract_scheme_desc_general: "$laamp_base_1001_contract_scheme_desc$"
 laamp_base_1001_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_1001_desc_title: "Viajantes perto de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier],"
 laamp_base_1001_desc: "Fique atento aos renegados e libertinos que rondam as estradas secundárias!\n\nSe o braço da sua espada for forte e o seu olhar certeiro, [TaskContract.GetEmployer.Custom('ES_ElLa')] [TaskContract.GetEmployer.GetTitledFirstName|l] promete recompensas generosas em troca da cabeça de um fora-da-lei em particular."
 laamp_base_1011_contract_scheme: "Braço Contratado"
 laamp_base_1011_contract_scheme_action: "Impor para"
 laamp_base_1011_contract_scheme_desc: "Quando um [contractor|lE] precisa de um pouco de força extra aplicada em silêncio e com pouco aviso, um mercenário pode oferecer muito mais discrição do que retentores comuns.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_1011_contract_scheme_desc_general: "$laamp_base_1011_contract_scheme_desc$"
 laamp_base_1011_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_1011_desc_title: "Espadas de aluguel de boa reputação,"
 laamp_base_1011_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] busca urgentemente espadas de aluguel para uma designação de curta duração. Oferece-se uma generosa recompensa por um trabalho rápido e limpo."
 #laamp_base_1021_contract_scheme: "Drill Troops"
 #laamp_base_1021_contract_scheme_action: "Drill Troops for"
 #laamp_base_1021_contract_scheme_desc: "Though [men_at_arms|E] are professional soldiers and train regularly, [adventurers|E] have ample and varied practical experience to provide for [contractors|E] wishing to supplement their troops' instruction.$laamp_contract_scheme_desc_general_boilerplate$"
 #laamp_base_1021_contract_scheme_desc_general: "$laamp_base_1021_contract_scheme_desc$"
 #laamp_base_1021_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 #laamp_base_1021_desc_title: "Sell-swords of good repute,"
 #laamp_base_1021_desc: "All veterans and [TaskContract.GetEmployer.Custom('MountedWarriorTermPlural')]: [TaskContract.GetEmployer.GetTitleAsNameNoTooltip] of [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTierPossessive] seeks captains and drillmasters for [TaskContract.GetEmployer.GetHerHis] garrison. Rations and payment provided."
 #laamp_base_1031_contract_scheme: "Garrison Duty"
 #laamp_base_1031_contract_scheme_action: "Stand Guard for"
 #laamp_base_1031_contract_scheme_desc: "Not every [contractor|E] has the spare hands to secure everything under their purvey. Whether they lack willing swords altogether or they just need added short-term muscle, many put out temporary garrisons for tender.$laamp_contract_scheme_desc_general_boilerplate$"
 #laamp_base_1031_contract_scheme_desc_general: "$laamp_base_1031_contract_scheme_desc$"
 #laamp_base_1031_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 #laamp_base_1031_desc_title: "Able-bodied wanderers of clear eye,"
 #laamp_base_1031_desc: "The [TaskContract.GetEmployer.GetTitleAsNameNoTooltip] of [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] seeks dependable fighters to supplement a [TaskContract.GetEmployer.GetCapitalLocation.GetHolding.GetType.GetName|l] garrison for coming season."
 laamp_base_1041_contract_scheme: "Emboscar Viajantes"
 laamp_base_1041_contract_scheme_action: "Emboscar nas terras de"
 laamp_base_1041_contract_scheme_desc: "Quão perigosas podem ser as terras de alguns [Concept( 'contractor', 'contratantes' )|E]! Apresentam um pedido de ajuda e, em vez disso, aparecem alguns [Concept( 'adventurer', 'aventureros' )|E] e começam a emboscar todo mercador gorducho e toda caravana suculenta que conseguirem encontrar.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_1041_contract_scheme_desc_general: "$laamp_base_1041_contract_scheme_desc$"
 laamp_base_1041_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_1041_desc_title: "Espadas de aluguel confiáveis,"
 laamp_base_1041_desc: "As terras de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] estão infestadas de bandidos, fora da lei e vagabundos de toda espécie. Buscam-se #EMP con urgencia#! guerreiros competentes. Todas as ofertas devem ser dirigidas a [TaskContract.GetEmployer.Custom('ES_AlAla')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier]."
 laamp_base_1041.tt.gold_rewards_depend_on_travellers: "#alert_trial Seu potencial de [gold|lE] ganho depende inteiramente de quais viajantes você encontrar e assaltar na estrada — você pode encontrar [dukes|lE] exorbitantemente ricos ou [courtiers|lE] peregrinos empobrecidos"
 laamp_base_1041.tt.haul_actual: "Você ganhou um total de [gold_i][task_contract.MakeScope.Var('haul_actual').GetValue|P0]"
 #################################################
 #Base Stewardship Scheme Loc
 laamp_base_2001_contract_scheme: "Coletar Impostos"
 laamp_base_2001_contract_scheme_action: "Coletar Impostos para"
 laamp_base_2001_contract_scheme_desc: "Impostos são a força vital de qualquer [realm|lE]. Quando sua arrecadação se torna lenta, [contractors|lE] podem publicar pedidos por cobradores mais #EMP rigorosos#!.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_2001_contract_scheme_desc_general: "$laamp_base_2001_contract_scheme_desc$"
 laamp_base_2001_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_2001_desc_title: "Andarilhos bem-educados e de boa criação,"
 laamp_base_2001_desc: "Buscam-se indivíduos firmes para um trabalho honesto de arrecadação do levy de [TaskContract.GetEmployer.GetPrimaryTitle.GetTierAsNameNoTooltip|l] em nome de [TaskContract.GetEmployer.Custom('ES_ElLa')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier]. É necessária habilidade para lidar com plebeus obstinados."
 laamp_base_2011_contract_scheme: "Conduzir Censo"
 laamp_base_2011_contract_scheme_action: "Conduzir Censo para"
 laamp_base_2011_contract_scheme_desc: "É difícil governar um [realm|lE] quando você nem sabe quem #EMP está#! nele. [contractors|lE] com esse problema frequentemente recorrem a terceiros neutros para inventariar seus súditos e, mais importante, a riqueza de seus súditos.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_2011_contract_scheme_desc_general: "$laamp_base_2011_contract_scheme_desc$"
 laamp_base_2011_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_2011_desc_title: "Atenção, agrimensores e magistrados:"
 laamp_base_2011_desc: "Os registros [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] mostram lacunas significativas. São necessários viajantes instruídos de boa cabeça e corpo forte para realizar um censo; serão recompensados com o que for arrecadado com ele."
 laamp_base_2021_contract_scheme: "Erguer Construção"
 laamp_base_2021_contract_scheme_action: "Erguer Construção para"
 laamp_base_2021_contract_scheme_desc: "Muitos [contractors|lE] descobrem que sua ambição arquitetônica supera sua habilidade — colocar obras em licitação é uma forma fácil de compensar tais... excessos.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_2021_contract_scheme_desc_general: "$laamp_base_2021_contract_scheme_desc$"
 laamp_base_2021_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_2021_desc_title: "Procura-se supervisor de olhar atento e mente firme,"
 laamp_base_2021_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] precisa de mãos competentes e artesãos para supervisionar um projeto de construção. Serão fornecidos materiais e pagamento justo."
 laamp_base_2031_contract_scheme: "Resolver Disputa de Fronteira"
 laamp_base_2031_contract_scheme_action: "Arbitrar Fronteiras para"
 laamp_base_2031_contract_scheme_desc: "Fronteiras são poder, o que frequentemente as torna contenciosas — quando uma disputa mesquinha entre pessoas importantes sai do controle, muitas vezes é mais eficaz para [contractors|lE] contratar um terceiro neutro para verificar os fatos.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_2031_contract_scheme_desc_general: "$laamp_base_2031_contract_scheme_desc$"
 laamp_base_2031_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_2031_desc_title: "Andarilhos de boa criação,"
 laamp_base_2031_desc: "Procura-se um mediador experiente por parte [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] para resolver uma disputa de limites. Ter formação em direito [TaskContract.GetEmployer.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip]… será útil. Mas qualquer ajuda satisfatória será paga."
 laamp_base_2041_contract_scheme: "Personificar Coletor de Impostos"
 laamp_base_2041_contract_scheme_action: "Roubar Impostos de"
 laamp_base_2041_contract_scheme_desc: "Impostos sustentam o governante de qualquer [realm|lE] — mas eles #EMP precisam#! disso? Quando um canalha confidente aparece com um selo de aparência oficial e capangas contratados, isso é #EMP tão#! diferente assim do oficial adequado?$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_2041_contract_scheme_desc_general: "$laamp_base_2041_contract_scheme_desc$"
 laamp_base_2041_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_2041_desc_title: "Todos os súditos de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier]"
 laamp_base_2041_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] lembra firmemente a todos da iminente cobrança de impostos, que devem ser pagos ao cobrador assim que ele chegar. Qualquer falta será severamente punida."
 #################################################
 #Base Intrigue Scheme Loc
 laamp_base_3001_contract_scheme: "Espionagem Improvisada"
 laamp_base_3001_contract_scheme_action: "Relatar a"
 laamp_base_3001_contract_scheme_desc: "Relatos recentes sobre acontecimentos a léguas de sua capital muitas vezes são inestimáveis para [contractors|lE]: o bastante para valer a pena comprá-los de andarilhos habilidosos.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_3001_contract_scheme_desc_general: "$laamp_base_3001_contract_scheme_desc$"
 laamp_base_3001_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_3001_desc_title: "Bisbilhoteiros confiáveis e estrangeiros empreendedores,"
 laamp_base_3001_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] deseja que se saiba que está convidando revelações úteis de todo o seu [TaskContract.GetEmployer.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip] e além."
 laamp_base_3011_contract_scheme: "Assassinar Inimigo"
 laamp_base_3011_contract_scheme_action: "Assassinar"
 laamp_base_3011_contract_scheme_desc: "Há momentos em que um [contractor|lE] precisa de alguém morto, mas ou não quer arriscar orquestrar isso pessoalmente, ou está ocupado demais com outros assuntos. Felizmente, o assassinato pode ser terceirizado com facilidade para o tipo certo de pessoa.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_3011_contract_scheme_desc_general: "$laamp_base_3011_contract_scheme_desc$"
 laamp_base_3011_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_3011_desc_title: "Honestas espadas de aluguel de vontade firme,"
 laamp_base_3011_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] oferece uma recompensa generosa a mãos de caráter irrepreensível e experiência comprovada para um trabalho delicado e exigente."
 laamp_base_3021_contract_scheme: "Abduzir Inimigo"
 laamp_base_3021_contract_scheme_action: "Abduzir"
 laamp_base_3021_contract_scheme_desc: "A prisão pode ser uma experiência sóbria e esclarecedora para descontentes e rivais, além de lucrativa ou gratificante para seu carcereiro. O suficiente para fazer valer o risco de pagar a um terceiro para providenciar uma visita, ao menos.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_3021_contract_scheme_desc_general: "$laamp_base_3021_contract_scheme_desc$"
 laamp_base_3021_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_3021_desc_title: "Resolutos domadores de animais problemáticos,"
 laamp_base_3021_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] busca caçadores discretos e habilidosos para capturar presas incomuns vivas e trazê-las de volta. Oferece-se uma paga generosa."
 laamp_base_3031_contract_scheme: "Incendiar Propriedade"
 laamp_base_3031_contract_scheme_action: "Cometer Incêndio Criminoso para"
 laamp_base_3031_contract_scheme_desc: "A coisa maravilhosa sobre um prédio sem vigilância é que, com esforço suficiente, eles #EMP sempre#! pegam fogo. Uma excelente ferramenta para [contractors|lE] que precisam mandar uma mensagem, mas simplesmente querem atear fogo e esquecer.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_3031_contract_scheme_desc_general: "$laamp_base_3031_contract_scheme_desc$"
 laamp_base_3031_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_3031_desc_title: "Andarilhos diligentes de caráter adequado,"
 laamp_base_3031_desc: "É oferecido um pagamento generoso para limpeza urgente de terreno. A confidencialidade é imprescindível. Os interessados devem se dirigir rapidamente a [TaskContract.GetEmployer.Custom('ResidenceBuilding')|l] [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] do território [TaskContract.GetEmployer.GetPrimaryTitle.GetAdjectiveNoTooltip]."
 laamp_base_3041_contract_scheme: "Assaltar Tesouraria"
 laamp_base_3041_contract_scheme_action: "Arrombar a Tesouraria de"
 laamp_base_3041_contract_scheme_desc: "Alguns [contractors|lE] são simplesmente tolos sinalizando sua abundância excessiva de riqueza — riqueza que é muito mais fácil de extrair diretamente do que por meio de algum #EMP trabalho#! vulgar.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_3041_contract_scheme_desc_general: "$laamp_base_3041_contract_scheme_desc$"
 laamp_base_3041_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_3041_desc_title: "Todos os viajantes em, e súditos de, [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier]"
 laamp_base_3041_desc: "[TaskContract.GetEmployer.GetTitledFirstNameNoTooltip] relembra #EMP a todos#! as punições por roubo ou conspiração para cometer roubo, e as recompensas por denunciar suspeitos de tais atos. Apenas #EMP eu#! posso acessar a tesouraria."
 laamp_base_3041.tt.chance_for_more: "Se desejar, você pode tentar #P roubar ainda mais [gold|lE]#!"
 #################################################
 #Base Learning Scheme Loc
 laamp_base_4001_contract_scheme: "Transcrever Textos"
 laamp_base_4001_contract_scheme_action: "Escrever para"
 laamp_base_4001_contract_scheme_desc: "A arte de copiar e traduzir manuscritos pode ser ingrata; mesmo em [realms|lE] eruditos, o trabalho em potencial facilmente supera o número de escribas qualificados. Assim, um andarilho instruído oferece aos [task_contracts|lE] uma oportunidade de ouro para reproduzir um pedido especial.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_4001_contract_scheme_desc_general: "$laamp_base_4001_contract_scheme_desc$"
 laamp_base_4001_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_4001_desc_title: "Vós que desejais preservar o conhecimento"
 laamp_base_4001_desc: "Buscam-se escribas instruídos para copiar textos na língua [TaskContract.GetEmployer.GetCulture.GetNameNoTooltip]. [TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] promete um pagamento justo por um trabalho pontual."
 laamp_base_4011_contract_scheme: "Resolver Disputas Teológicas"
 laamp_base_4011_contract_scheme_action: "Arbitrar Teologia para"
 laamp_base_4011_contract_scheme_desc: "Disputas sobre doutrina podem ser tanto extremamente específicas, até o nível de interpretações exatas de palavras isoladas, quanto curiosamente vagas, como discutir a incompatibilidade mútua entre tradições antigas sobrepostas. Quando tais disputas sagradas começam a inflamar, muitos [contractors|lE] preferem enviar algum terceiro para arbitrar em seu lugar.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_4011_contract_scheme_desc_general: "$laamp_base_4011_contract_scheme_desc$"
 laamp_base_4011_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_4011_desc_title: "Leais discípulos de [TaskContract.GetEmployer.GetFaith.KnowledgeGodName],"
 laamp_base_4011_desc: "Será generosamente recompensado o teólogo erudito que resolva disputas religiosas locais a respeito do dogma [TaskContract.GetEmployer.GetFaith.GetAdherentName].\n\nApelar para [TaskContract.GetEmployer.Custom('ES_AlAla')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier], mas somente se você for um erudito de gravidade."
 laamp_base_4021_contract_scheme: "Criar Obra Erudita"
 laamp_base_4021_contract_scheme_action: "Estudar para"
 laamp_base_4021_contract_scheme_desc: "Andarilhos eruditos trazem consigo uma certa aura de misticismo, muitas vezes até um toque de exotismo — [contractors|lE] engenhosos frequentemente tentam capturar um pouco dessa sabedoria fugidia encomendando pequenos livros de aforismos e contos moralizantes.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_4021_contract_scheme_desc_general: "$laamp_base_4021_contract_scheme_desc$"
 laamp_base_4021_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_4021_desc_title: "Sábios eruditos de belas letras,"
 laamp_base_4021_desc: "Escritores de todas as partes do reino são convocados para [TaskContract.GetEmployer.Custom('ResidenceBuilding')|l] [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] para um trabalho de escrita remunerado."
 laamp_base_4031_contract_scheme: "Solicitar Caridade"
 laamp_base_4031_contract_scheme_action: "Mendigar de"
 laamp_base_4031_contract_scheme_desc: "Oferecer presentes e moedas a estudiosos de passagem faz [contractors|lE] parecerem generosos e eruditos — mesmo que o estudioso em questão lhes dê um pequeno #EMP empurrãozinho#! primeiro.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_4031_contract_scheme_desc_general: "$laamp_base_4031_contract_scheme_desc$"
 laamp_base_4031_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_4031_desc_title: "Pessoas santas justas e mendigos miseráveis,"
 laamp_base_4031_desc: "Que se saiba entre vossas fileiras: [TaskContract.GetEmployer.Custom('ES_ElLa')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] oferece patrocínio [TaskContract.GetEmployer.GetFaith.GetAdherentNameNoTooltip] àqueles piedosos, cultos ou eruditos o bastante para merecê-lo. Informe-se em [TaskContract.GetEmployer.Custom('ResidenceBuilding')|l]."
 laamp_base_4041_contract_scheme: "Vender Talismãs"
 laamp_base_4041_contract_scheme_action: "Oferecer Bugigangas a"
 laamp_base_4041_contract_scheme_desc: "Quem pode dizer o que é magia, o que é sagrado e o que é exótico? Se um [contractor|lE] é tolo o bastante para acreditar nisso, e #EMP pagar#! por isso, então basta. Provavelmente.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_4041_contract_scheme_desc_general: "$laamp_base_4041_contract_scheme_desc$"
 laamp_base_4041_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_4041_desc_title: "Colegas [TaskContract.GetEmployer.GetWomenMen] de erudição!"
 laamp_base_4041_desc: "Tem olho para avaliar corretamente qualquer raridade [TaskContract.GetEmployer.GetFaith.GetAdjectiveNoTooltip]? [TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] oferece um pagamento justo… #EMP se#! os artigos forem autênticos."
 #################################################
 #Base Prowess Scheme Loc
 #laamp_base_5001_contract_scheme: "Cull the Wilds"
 #laamp_base_5001_contract_scheme_action: "Culling Predators for"
 #laamp_base_5001_contract_scheme_desc: "When the number of predators in a [contractor_possessive|E] land grows too large to easily manage, it's not uncommon for them to offer limited hunting rights to wanderers willing to tackle the problem.$laamp_contract_scheme_desc_general_boilerplate$"
 #laamp_base_5001_contract_scheme_desc_general: "$laamp_base_5001_contract_scheme_desc$"
 #laamp_base_5001_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 #laamp_base_5001_desc_title: "Poachers! Hunt within the law,"
 #laamp_base_5001_desc: "Urgent pest control calls for skilled gamekeepers. [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] of [TaskContract.GetEmployer.GetTitleAsNameNoTooltip] offers a respectable reward upon satisfaction."
 #laamp_base_5011_contract_scheme: "Guard Mercantile Properties"
 #laamp_base_5011_contract_scheme_action: "Guard Merchants for"
 #laamp_base_5011_contract_scheme_desc: "Whether they profit directly or simply have influential subjects calling in a boon, [contractors|E] sometimes need the warehouses, workshops, or guildhalls of their merchants guarded against an expected attack. Not dignified work, but good enough for a wanderer.$laamp_contract_scheme_desc_general_boilerplate$"
 #laamp_base_5011_contract_scheme_desc_general: "$laamp_base_5011_contract_scheme_desc$"
 #laamp_base_5011_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 #laamp_base_5011_desc_title: "O masterless men-at-arms,"
 #laamp_base_5011_desc: "Hired blades of upstanding character may present themselves for [TaskContract.GetEmployer.GetCapitalLocation.GetHolding.GetType.GetName|l] guard duties. Fair pay and board shall be tendered by the [TaskContract.GetEmployer.GetTitleAsNameNoTooltip] of [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier]."
 #laamp_base_5021_contract_scheme: "Guard Ruler"
 #laamp_base_5021_contract_scheme_action: "Guard"
 #laamp_base_5021_contract_scheme_desc: "Murder is a serious risk for unpopular [contractors|E] — sometimes so much so that they cannot trust their usual guards more than a neutral third party.$laamp_contract_scheme_desc_general_boilerplate$"
 #laamp_base_5021_contract_scheme_desc_general: "$laamp_base_5021_contract_scheme_desc$"
 #laamp_base_5021_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 #laamp_base_5021_desc_title: "Upstanding sword-hands,"
 #laamp_base_5021_desc: "You are called on for personal guard duty at short notice. You would stand at the shoulder of the [TaskContract.GetEmployer.GetTitleAsNameNoTooltip] of [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier]."
 laamp_base_5031_contract_scheme: "Roubar Animais"
 laamp_base_5031_contract_scheme_action: "Roubar de"
 laamp_base_5031_contract_scheme_desc: "Rebanhos de cavalos, gado, até cabras ou ovelhas: animais roubados são incrivelmente lucrativos para quem tem coragem de tomá-los, especialmente quando alguns [contractors|lE] facilitam tanto...$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_5031_contract_scheme_desc_general: "$laamp_base_5031_contract_scheme_desc$"
 laamp_base_5031_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_5031_desc_title: "Povo de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier],"
 laamp_base_5031_desc: "Seu [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] relembra, mais uma vez, que o roubo de gado #EMP será#! punido severamente, não importa a quantidade nem o motivo. Vocês foram avisados."
 #laamp_base_5041_contract_scheme: "Poach Lands"
 #laamp_base_5041_contract_scheme_action: "Poach from"
 #laamp_base_5041_contract_scheme_desc: "If a [contractor_possessive|E] lands are so abundant that the trimmings from their venison can supply a camp for months, what's so wrong with a few quiet hunts?$laamp_contract_scheme_desc_general_boilerplate$"
 #laamp_base_5041_contract_scheme_desc_general: "$laamp_base_5041_contract_scheme_desc$"
 #laamp_base_5041_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 #laamp_base_5041_desc_title: "Reprobates, bandits, and thieves,"
 #laamp_base_5041_desc: "The just [TaskContract.GetEmployer.GetTitleAsNameNoTooltip] of [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] reminds all vagabonds that poaching [TaskContract.GetEmployer.GetCapitalLocation.GetTitle.GetTierAsNameNoTooltip|l] land is strictly forbidden — and punishable by death."
 laamp_base_5051_contract_scheme: "Assaltar Cidadãos Ricos"
 laamp_base_5051_contract_scheme_action: "Atacar os Cidadãos de"
 laamp_base_5051_contract_scheme_desc: "[contractors|lE] com capitais particularmente ricas produzem [courtiers|lE] ricos. Uma surra em um beco permite que [adventurers|lE] transfiram essa riqueza para outro lugar.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_5051_contract_scheme_desc_general: "$laamp_base_5051_contract_scheme_desc$"
 laamp_base_5051_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_5051_desc_title: "Bons cidadãos de [TaskContract.GetEmployer.GetCapitalLocation.GetTitle.GetBaseNameNoTier],"
 laamp_base_5051_desc: "Atenção, estamos sofrendo uma #EMP plaga#! de pequenos furtos. Levem um porrete firme quando caminharem pelas ruas e permaneçam em casa depois de escurecer; [TaskContract.GetEmployer.Custom('ES_ElLa')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] cuidará desses reprobos."
 #################################################
 #Base Justicar Scheme Loc
 laamp_base_6001_contract_scheme: "Proteger os Inocentes"
 laamp_base_6001_contract_scheme_action: "Proteger os Súditos de"
 laamp_base_6001_contract_scheme_desc: "As estradas estão cheias de perigos. Bandidos, animais e o mau tempo afetaram os súditos de [contractor|lE] e imploram por ajuda.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_6001_contract_scheme_desc_general: "$laamp_base_6001_contract_scheme_desc$"
 laamp_base_6001_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_6001_desc_title: "Protejam os fracos!"
 laamp_base_6001_desc: "O povo trabalhador de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] precisa de ajuda. [TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] oferece generosas recompensas a aventureiros altruístas."
 laamp_base_contract_schemes.6001.t: "$laamp_base_6001_contract_scheme$"
 laamp_base_contract_schemes.6001.desc: "\"Animais, brutamontes e rufiões!\".\n\nA mera ideia parece ser suficiente para perturbar a compostura [employer.Custom('ES_DelDela')][employer.GetTitledFirstName|l].\n\n\"O povo comum de [employer.GetPrimaryTitle.GetTierAsNameNoTooltip|l] está tão agitado que temo que possa se levantar em armas a qualquer momento. Os que têm famílias jovens têm repreendido meus oficiais, perguntando por que não os protegemos\"."
 laamp_base_contract_schemes.6001.a: "Devemos garantir a segurança deles!"
 laamp_base_contract_schemes.6001.b: "Não há tempo a perder."
 laamp_base_contract_schemes.6001.c: "Não há motivo para concessões."
 laamp_base_contract_schemes.6002.t: "$laamp_base_6001_contract_scheme$: Sucesso!"
 laamp_base_contract_schemes.6002.desc: "Três… quatro… e lá se vai o quinto exemplar de [ROOT.Char.MakeScope.Var('animal_type').GetFlagName] desta manhã. Coloquei o corpo no carro, bem a tempo de [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] chegar com alguns de seus servos.\n\n“Que trabalho magnífico!”, aplaude [employer.GetSheHe]. “Chega de gado morto, chega de crianças desaparecidas. Aqui, seu pagamento; e se o povo comum voltar a reclamar, eu já sei a quem chamar outra vez”."
 laamp_base_contract_schemes.6002.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.6003.t: "$laamp_base_6001_contract_scheme$: Falha!"
 laamp_base_contract_schemes.6003.desc: "\"Basta!\", grita [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l], balançando a cabeça. \"Não tinha visto uma demonstração de força tão patética desde que treinamos os pajens com espadas de madeira\".\n\n\"Meu povo sofre, desprotegido. Vocês por acaso imaginam que isso os faria pagar seus impostos?\", pergunta com desprezo.\n\n\"Vocês já me fizeram perder ouro suficiente. Não continuem desperdiçando meu tempo\"."
 laamp_base_contract_schemes.6003.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_6011_contract: "$laamp_base_6011_contract_scheme$"
 laamp_base_6011_contract_scheme: "Resgatar um Belo Súdito"
 laamp_base_6011_contract_scheme_action: "Resgatar um Belo Súdito de"
 laamp_base_6011_contract_scheme_desc: "As terras selvagens não conhecem piedade. Encontre e resgate o súdito indefeso do [contractor|lE].$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_6011_contract_scheme_desc_general: "$laamp_base_6011_contract_scheme_desc$"
 laamp_base_6011_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_6011_desc_title: "[TaskContract.GetEmployer.Custom('KnightCulturePluralNoTooltip')|U] de verdadeira virtude!"
 laamp_base_6011_desc: "Um dos membros da corte [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitledFirstNameNoTooltip|l] de grande beleza não retornou de uma incursão às florestas de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier]. A corte [TaskContract.GetEmployer.Custom('ES_DelDela')] [TaskContract.GetEmployer.GetTitleAsNameNoTooltip|l] oferece ansiosamente uma recompensa."
 laamp_base_6011_request: "Este [task_contract|lE] exige que você conclua um [scheme|lE] [GetScheme('laamp_base_6011_contract_scheme').GetTypeName|l]"
 laamp_base_contract_schemes.6011.t: "$laamp_base_6011_contract_scheme$"
 laamp_base_contract_schemes.6011.desc: "Um[employer.Custom('ES_XA')] [employer.GetTitledFirstName|l] cansad[employer.Custom('ES_OA')] se aproxima ao acampamento com seus [dummy_gender_soldier.GetWomenMen]. Os cavalos param bem em frente à minha tenda enquanto me levanto para saudá-los.\n\n«… maldit[dummy_gender.Custom('ES_OA')] idiota», ouço murmurar [employer.Custom('ES_AlAla')] [employer.GetTitleAsNameNoTooltip|l].\n\n«Desejo-vos um bom dia, [ROOT.Char.GetFirstNameNoTooltip]», diz, enxugando o suor da testa. «Parece que um [dummy_gender.GetWomanMan] #EMP extremamente bel[dummy_gender.Custom('ES_OA')]#! se perdeu na floresta e meus cortesãos não pararão de lamentar até que eu o traga de volta»."
 laamp_base_contract_schemes.6011.a: "Uma[dummy_gender.Custom('ES_XA')] [dummy_gender.GetWomanMan] bel[dummy_gender.Custom('ES_OA')]? Ao resgate!"
 laamp_base_contract_schemes.6011.b: "Temos que nos apressar!"
 laamp_base_contract_schemes.6011.c: "Uma abordagem equilibrada é melhor."
 laamp_base_contract_schemes.6012.t: "$laamp_base_6011_contract_scheme$: Sucesso!"
 laamp_base_contract_schemes.6012.desc: "\"Volte!\", um grito agudo se abre caminho pela densa mata de árvores, e eu o sigo.\n\nNo meio de uma clareira está um[beautiful_peasant.Custom('ES_OA')] de [Select_CString( beautiful_peasant.IsFemale, 'mulheres mais belas', 'homens mais belos' )] que eu já tenha visto. Empunha um bastão como se fosse uma lança e tenta manter distância de um feroz espécime de [ROOT.Char.MakeScope.Var('animal_type').GetFlagName].\n\nCom um rápido golpe da minha espada, eu parto a fera, e o animal solta um jorro de sangue, manchando a grama ao cair.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]!\", ele grita, caindo de joelhos."
 laamp_base_contract_schemes.6012.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.6012.b: "\"Nós não #EMP precisamos#! seguir caminhos diferentes.\""
 laamp_base_contract_schemes.6012.b.tt.success: "[beautiful_peasant.GetShortUIName] se sente honrado"
 laamp_base_contract_schemes.6012.b.tt.failure: "[beautiful_peasant.GetShortUIName] se sente insultado"
 laamp_base_6012_success_employer_modifier: "Inocente Resgatado"
 laamp_base_6012_success_employer_modifier_desc: "Este personagem pagou a um aventureiro cavalheiresco para resgatar um de seus mais belos súditos de um animal perigoso."
 laamp_base_contract_schemes.6013.t: "$laamp_base_6011_contract_scheme$: Falha!"
 laamp_base_contract_schemes.6013.desc: "\"Você se importaria de me explicar o que é isso?\", [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] entra em minha tenda, atirando um lenço ensopado de vermelho sobre a mesa.\n\n\"Os guardas o encontraram enquanto patrulhavam a floresta, e ele tem um emblema que suponho que vos seja familiar\". [employer.GetFirstName] fricciona as sobrancelhas. \"Agora tenho que lidar com cortesãos agitados e oficiais de coração partido. Não esperem receber o pagamento integral\"."
 laamp_base_contract_schemes.6013.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_6021_contract: "$laamp_base_6021_contract_scheme$"
 laamp_base_6021_contract_scheme: "Atuar em uma Peça"
 laamp_base_6021_contract_scheme_action: "Atuar na Peça de"
 laamp_base_6021_contract_scheme_desc: "O povo anseia por encontrar um cavaleiro #EMP de verdade#!. O [contractor|lE] precisa de um herói real.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_6021_contract_scheme_desc_general: "$laamp_base_6021_contract_scheme_desc$"
 laamp_base_6021_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_6021_request: "Este [task_contract|lE] exige que você conclua um [scheme|lE] [GetScheme('laamp_base_6021_contract_scheme').GetTypeName|l]"
 laamp_base_6021_desc_title: "Procura-se um herói,"
 laamp_base_6021_desc: "O povo de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] organiza uma peça teatral ao estilo dos antigos contos heroicos. [TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitledFirstNameNoTooltip|l] busca desesperadamente um cavaleiro honrado que satisfaça seus desejos."
 laamp_base_contract_schemes.6021.t: "$laamp_base_6021_contract_scheme$"
 laamp_base_contract_schemes.6021.desc.intro: "A praça do mercado de [ROOT.Char.GetCurrentLocation.GetName] está mais movimentada do que nunca, com uma trupe de cantores fazendo seus preparativos.\n\n\"Uma espada de #EMP madeira#!?\" uma das crianças se inclina sobre o estrado, fazendo uma careta de desgosto.\n\n"
 laamp_base_contract_schemes.6021.desc.employer_child: "\"[employer_child.GetFirstName], já chega\", [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] instiga seu [employer_child.Custom('GetDaughterSon')] a voltar para o lado dele. \"Eu disse que encontraria um herói de verdade para a peça... e veja só quem apareceu\". [employer.GetFirstNameNoTooltip] me olha diretamente."
 laamp_base_contract_schemes.6021.desc.random_child: "Os camponeses alertados se juntam a [dummy_gender.GetSheHe] rapidamente: \"Isso é o melhor que nosso noss[employer.Custom('ES_OA')] [employer.GetLadyLord]?\".\n\nMas os murmúrios cessam assim que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] entra na praça e detém seu cavalo diante de mim:"
 laamp_base_contract_schemes.6021.desc.outro: "\"Um ganho fácil, não acha? Você só precisa impressionar esses camponeses.\""
 laamp_base_contract_schemes.6021.a: "Vamos torná-lo o ganho #EMP mais fácil#!."
 laamp_base_contract_schemes.6021.b: "Quanto antes, melhor."
 laamp_base_contract_schemes.6021.c: "Isso deve ser divertido."
 laamp_base_contract_schemes.6022_6023.common_desc: "\"… e então abateu o mais feroz exemplar de [ROOT.Char.MakeScope.Var('animal_type').GetFlagName]\", os tambores retumbam mais forte enquanto avanço pelo palco, tentando lembrar de todas as peças que já vi. Com a arma sobre minha cabeça, ataco o boneco colorido.\n\n"
 laamp_base_contract_schemes.6022.t: "$laamp_base_6021_contract_scheme$: Sucesso!"
 laamp_base_contract_schemes.6022.desc: "$laamp_base_contract_schemes.6022_6023.common_desc$A cabeça rola para fora do palco e o público explode em aplausos entusiasmados. Sentad[employer.Custom('ES_OA')] no estrado elevado, [employer.GetTitledFirstName] assente."
 laamp_base_contract_schemes.6022.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_6021_success_employer_modifier: "Peça de Cavalaria"
 laamp_base_6021_success_employer_modifier_desc: "Este personagem patrocinou um aventureiro errante para atuar em uma peça e satisfazer as exigências da multidão."
 laamp_base_contract_schemes.6023.t: "$laamp_base_6021_contract_scheme$: Falha!"
 laamp_base_contract_schemes.6023.desc: "$laamp_base_contract_schemes.6022_6023.common_desc$Falho o golpe e minha espada fica cravada na madeira. A plateia explode em gargalhadas, mas não demora para a frustração tomar conta.\n\nLanço um olhar para o estrado elevado e descubro [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l] negando a cabeça."
 laamp_base_contract_schemes.6023.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_6031_contract: "$laamp_base_6031_contract_scheme$"
 laamp_base_6031_contract_scheme: "Realizar um Passo de Armas"
 laamp_base_6031_contract_scheme_action: "Realizar um Passo de Armas para"
 laamp_base_6031_contract_scheme_desc: "Procura-se aventureiro valoroso para defender uma passagem de ponte. O [contractor|lE] oferece recompensas generosas.$laamp_contract_scheme_desc_general_boilerplate$"
 laamp_base_6031_contract_scheme_desc_general: "$laamp_base_6031_contract_scheme_desc$"
 laamp_base_6031_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 laamp_base_6031_request: "Este [task_contract|lE] exige que você conclua um [scheme|lE] [GetScheme('laamp_base_6031_contract_scheme').GetTypeName|l]"
 laamp_base_6031_desc_title: "Se és valoroso: presta atenção!"
 laamp_base_6031_desc: "A ponte de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] continua desprotegida. É necessária uma demonstração de força para manter os bandidos afastados. [TaskContract.GetEmployer.Custom('ES_ElLa')|U] [TaskContract.GetEmployer.GetTitledFirstNameNoTooltip|l] recompensará quem os dissuadir."
 laamp_base_contract_schemes.6031.t: "$laamp_base_6031_contract_scheme$"
 laamp_base_contract_schemes.6031.desc: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('employer'))] enquanto avança pelo acampamento.\n\n\"Maravilhosa manhã a que temos hoje\", começa, \"uma oportunidade perfeita para mostrar a esses rufiões o valor de um verdadeiro $knight_culture_player_no_tooltip$. Vejam, temos uma ponte que vai direto para [ROOT.Char.GetCurrentLocation.GetName]. Toda sorte de canalhas, ociosos e idiotas rondam por lá\".\n\n\"Alguém deveria cuidar disso\"."
 laamp_base_contract_schemes.6031.a: "Quebrarei trezentas lanças!"
 laamp_base_contract_schemes.6031.b: "Isso levará alguns dias."
 laamp_base_contract_schemes.6031.c: "À ponte!"
 laamp_base_contract_schemes.6032.t: "$laamp_base_6031_contract_scheme$: Sucesso!"
 laamp_base_contract_schemes.6032.desc: "Ofegante, dou um tapinha nas costas do meu cavalo. Calma agora. Acabou.\n\nDefender esta ponte tem sido minha única tarefa nas últimas duas semanas, e a armadura reluz sob a lua. O mar de lanças quebradas que foram empurradas para um lado é um testemunho do meu desempenho.\n\n\"[ROOT.Char.GetFirstNameNoTooltip]\", [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] me saúda e envia alguns de seus homens para recolher os despojos, \"que espetáculo\"."
 laamp_base_contract_schemes.6032.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.6033.t: "$laamp_base_6031_contract_scheme$: Falha!"
 laamp_base_contract_schemes.6033.desc: "#EMP \"Arghhhh!\".#!\n\nCaio de joelhos, com sangue escorrendo pelo cotovelo.\n\n“Deixem[ROOT.Char.GetHerHim] aí”, ouço um dos bandidos murmurar antes de irem embora, “não vale a pena lutar contra um #EMP $knight_culture_player_no_tooltip$#!; alguém virá buscar[ROOT.Char.GetHerHim]”.\n\nMinha cabeça… tudo vai se apagando, lentamente."
 laamp_base_contract_schemes.6033.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 #################################################
 #Base Diplo Scheme Events
 laamp_base_contract_schemes.0001.t: "Entreter a corte [employer.Custom('ES_DelDela')] [employer.GetTitledFirstNameNoTooltip|l]"
 laamp_base_contract_schemes.0001.desc: "Não é incomum que governantes estabelecidos como [employer.GetFirstName] recebam viajantes notáveis como eu em troca de alguns presentes e acomodações decentes, [ROOT.Char.Custom('GetLaampDescribeTypeSelfPlural')] como os nossos proporcionam entretenimento, informação e uma distração adequada para seus muitos cortesãos.\n\nClaro, isso é #EMP se#! meus [ROOT.Char.Custom('GetCourtierTypePlural')|l] e eu podermos ganhar o sustento com nossas histórias."
 laamp_base_contract_schemes.0001.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.0001.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.0001.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.0001.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.0001.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.0002.t: "$laamp_base_contract_schemes.0001.t$: Sucesso!"
 laamp_base_contract_schemes.0002.desc: "Os cortesãos de [employer.GetFirstName] praticamente têm ficado embasbacados com meu grupo e comigo nestes últimos meses.\n\nDia após dia, noite após noite, enchíamos suas cabeças com relatos fantásticos e nossos estômagos com comida farta, deixando [employer.Custom('ES_AlAla')] [employer.GetTitleAsNameNoTooltip|l] mais que satisfeit[employer.Custom('ES_OA')] com nossa atuação.\n\nAinda assim, tudo o que é bom precisa chegar ao fim, e é melhor partirmos em alta."
 laamp_base_contract_schemes.0002.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.0003.t: "$laamp_base_contract_schemes.0001.t$: Falha!"
 laamp_base_contract_schemes.0003.desc: "Vermes ignorantes! Nos convidam para este lugar, não nos dão nada além de #EMP lavagem#! para comer, leitos de palha que já era velha quando meu avô[ROOT.Char.Custom('ES_OA')] era jovem, e ficam importunando com todas as nossas histórias da estrada.\n\nA hospitalidade em exibição é… bem, que hospitalidade?\n\nE tudo em vão, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] está furios[employer.Custom('ES_OA')] e é evidente que a única coisa que nos mantém fora das masmorras é a sensação de que daria mais trabalho do que vale a pena.\n\nNosso tempo em [employer.GetCapitalLocation.GetTitle.GetNameNoTier] acabou."
 laamp_base_contract_schemes.0003.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.0011.t: "Melhorar o nome [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l]"
 laamp_base_contract_schemes.0011.desc: "Não é nenhum segredo que a reputação [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] poderia ser muito melhor. Vassalos descontentes, murmúrios preocupantes sobre um comportamento tirânico, falta de prestígio intangível… Sinais todos que indicam um controle sobre o poder mais frágil do que a maioria de [employer.Custom('LadiesLords')].\n\nPagar alguém para esclarecer tais mal-entendidos não será barato, claro. Ao menos, não se eu puder dizer algo a respeito."
 laamp_base_contract_schemes.0011.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.0011.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.0011.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.0011.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.0011.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.0012.t: "$laamp_base_contract_schemes.0011.t$: Sucesso!"
 laamp_base_contract_schemes.0012.desc: "É surpreendente o quanto umas poucas palavrinhas em cantos tranquilos podem mudar uma situação. Um sussurro aqui, um comentário ali, uma ação defendida num jantar...\n\nÉ claro que não significariam quase a mesma coisa se viessem de um magnata senhorial. Poder demais, muito em jogo, risco demais de insinceridade... mas um[ROOT.Char.Custom('ES_XA')] humilde [ROOT.Char.Custom('GetLaampDescribeTypeSelf')] que faz uma breve parada na corte enquanto sua comitiva e [ROOT.Char.GetSheHe] seguem seu caminho pelo mundo...\n\nBem, isso já é um jogo completamente diferente.\n\nDispensa dizer que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] está mais do que contente[employer.Custom('ES_OA')] com nosso trabalho, e devemos seguir viagem."
 laamp_base_contract_schemes.0012.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.0013.t: "$laamp_base_contract_schemes.0011.t$: Falha!"
 laamp_base_contract_schemes.0013.desc: "Como achei que isso jamais poderia dar certo #EMP jamás#!? Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GetLaampDescribeTypeSelf')] sem influência entre o povo ou a nobreza.\n\nFoi uma tarefa absurda que me impuseram e, ainda assim, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] parece decidid[employer.Custom('ES_OA')] a me responsabilizar por #EMP mí#! pelo fiasco de sua gente lhe atribuir [employer.GetSheHe] desfeitas imaginárias e abusos de poder teóricos.\n\n[employer.GetCapitalLocation.GetTitle.GetNameNoTier] já não é um lugar seguro para meu grupo."
 laamp_base_contract_schemes.0013.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.0021.t: "Fazendo Amigos em Altos Lugares"
 laamp_base_contract_schemes.0021.desc: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] é um[employer.Custom('ES_XA')] [employer.GetWomanMan] solitári[employer.Custom('ES_OA')] em uma posição de poder, tornando extremamente difícil para ele encontrar pessoas que não #EMP quiera#! nada de [employer.GetSheHe].\n\nSupostamente minha companhia é diferente, uma chance de criar uma conexão real. Não é, claro — eu quero tanto quanto ou mais do que qualquer [Select_CString( ROOT.Char.IsFemale, 'otra gorrona', 'otro gorrón' )]—, mas é uma fantasia agradável em que acreditar por um tempo.\n\nMeus [ROOT.Char.Custom('GetCourtierTypePlural')|l] e eu já teremos ido embora antes que [employer.GetSheHe] suspeite de nada."
 laamp_base_contract_schemes.0021.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.0021.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.0021.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.0021.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.0021.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.0022.t: "$laamp_base_contract_schemes.0021.t$: Sucesso!"
 laamp_base_contract_schemes.0022.desc: "Naturalmente, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] caiu ante meus encantos, o chamado da natureza e a vida romântica de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GetLaampDescribeTypeSelf')] errante, exatamente como eu sabia que aconteceria.\n\nPor fim, fazemos nossos preparativos para partir; [employer.GetFirstNameNoTooltip] sente pena de nos ver partir, mas se alegra com o pequeno alívio que nossa companhia lhe proporcionou.\n\nÉ claro que não foi algo unilateral. Ganhei uma valiosa recompensa em presentes e suprimentos para a companhia, mais do que suficiente para justificar o tempo que passamos aqui."
 laamp_base_contract_schemes.0022.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.0023.t: "$laamp_base_contract_schemes.0021.t$: Falha!"
 laamp_base_contract_schemes.0023.desc: "Talvez… talvez [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] não esteja tão sol[employer.Custom('ES_OA')] depois de tudo? Certamente não parece querer #EMP minha#! companhia, a de «uma espécie de [ROOT.Char.Custom('GetLaampDescribeTypeInsult')] de fedor tão [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('employer'))] com aparência de criminoso».\n\nQue ousadia, convidar-me a ficar e depois me tratar… me tratar… #EMP assim#!. Muito descortês, no mínimo, e indigno de um[employer.Custom('ES_XA')] [employer.GetWomanMan] supostamente tão nobre.\n\nNem preciso dizer que não esperamos pagamento algum, e meu grupo e eu temos até o anoitecer para deixar [employer.GetCapitalLocation.GetTitle.GetNameNoTier]."
 laamp_base_contract_schemes.0023.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.0031.t: "Uma Parte Neutra"
 laamp_base_contract_schemes.0031.desc: "As brigas intermináveis de moradores mesquinhos são uma das poucas experiências compartilhadas tanto pelos governantes do mundo quanto por [ROOT.Char.Custom('GetLaampDescribeTypeSelfPlural')|l] como eu.\n\nÉ o suficiente para deixar qualquer um louco ou, ao menos, frustrar[employer.GetHerHim] tanto que busque ajuda em gente de fora… o que é exatamente o que fez [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l].\n\nSe meus [ROOT.Char.Custom('GetCourtierTypePlural')|l] e eu conseguirmos acalmar alguns de seus súditos mais irados, seremos pagos com generosidade."
 laamp_base_contract_schemes.0031.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.0031.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.0031.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.0031.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.0031.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.0032.t: "$laamp_base_contract_schemes.0031.t$: Sucesso!"
 laamp_base_contract_schemes.0032.desc: "Os problemas locais são problemas triviais. Para os envolvidos, não, é claro, mas para [Select_CString( ROOT.Char.IsFemale, 'uma estranha', 'um estranho' )] sem interesse em suas disputas incessantes, geralmente são perfeitamente solucionáveis.\n\nNão posso dizer que tenha deixado #EMP todo mundo#! satisfeito, mas essa não era a minha função. Eu só precisava acalmá-los o suficiente para fazer feliz [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l], e feliz está ele — o bastante para abrir a bolsa de moedas, ao menos.\n\nUm trabalho bem-feito."
 laamp_base_contract_schemes.0032.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.0033.t: "$laamp_base_contract_schemes.0031.t$: Falha!"
 laamp_base_contract_schemes.0033.desc: "É impossível lidar com esses valentões ignorantes!\n\nNinguém vivo conseguiria resolver sua lista interminável de problemas, rixas e disputas de limites. Minha experiência é a de [ROOT.Char.Custom('GetLaampDescribeTypeSelfArticle')] [ROOT.Char.Custom('GetLaampDescribeTypeSelf')], não a de um mero funcionário, maldita seja. É claro que [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l] não se importa muito com o meu aperto. No que diz respeito a [employer.GetSheHe], isso é pura falta de habilidade, e nada mais.\n\n\"Se vocês fossem mais capazes, seriam pagos. Mas não foram, então não serão. Agora saiam\"."
 laamp_base_contract_schemes.0033.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.0034.t: "$laamp_base_contract_schemes.0031.t$: Partida"
 laamp_base_contract_schemes.0034.desc: "Com a autorização [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] em mãos, partimos em nossa viagem.\n\nO trajeto nos levará a [destination_3.GetNameNoTier], depois a [destination_2.GetNameNoTier], para por fim retornarmos a [destination_1.GetNameNoTier].\n\nA única questão que resta é se queremos viajar leves ou com tudo."
 laamp_base_contract_schemes.0034.tt.explanation: "#TUT Para cumprir o [task_contract|lE]:\n$EFFECT_LIST_BULLET$ Conclua um desafio de [skill|lE] em cada destino\n$EFFECT_LIST_BULLET$ Você deve vencer dois desafios para obter um $label_success_standard$\n$EFFECT_LIST_BULLET$ Se vencer os três desafios, você obtém um $label_success_critical$\n$EFFECT_LIST_BULLET$@warning_icon! #N Falhar em um desafio a qualquer momento significará fracassar no $game_concept_task_contract$#!\n$EFFECT_LIST_BULLET$@alert_icon! #alert_trial Você só pode testar cada [skill|lE] uma vez por [task_contract|lE]#!#!"
 laamp_base_contract_schemes.0034.tt.destination_list: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [destination_3.GetNameNoTier], depois a [destination_2.GetNameNoTier] e, por último, a [destination_1.GetNameNoTier]"
 laamp_base_contract_schemes.0034.a: "$travel.stationary_domicile.option.t$"
 laamp_base_contract_schemes.0034.b: "$travel.mobile_domicile.option.t$"
 laamp_base_contract_schemes.0041.t: "Confie em Mim"
 laamp_base_contract_schemes.0041.desc: "Pobre e crédul[employer.Custom('ES_OA')] [employer.GetFirstName]: pode ser [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l], mas não é mais espert[employer.Custom('ES_OA')] que [Select_CString( employer.IsFemale, 'a típica bêbada', 'o típico bêbado' )] de taberna do interior. Só mais ric[employer.Custom('ES_OA')].\n\nUm convite aberto para que viajantes notáveis fiquem em sua casa por um tempo é a oportunidade de que meus [ROOT.Char.Custom('GetCourtierTypePlural')|l] e eu precisamos, e antes que perceba, a fortuna [Select_CString( employer.IsFemale, 'de la buena', 'del buen' )] [employer.GetTitleAsNameNoTooltip|l] estará no meu bolso, e nós já teremos ido embora."
 laamp_base_contract_schemes.0041.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.0041.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.0041.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.0041.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.0041.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.0042.t: "$laamp_base_contract_schemes.0041.t$: Sucesso!"
 laamp_base_contract_schemes.0042.desc: "Que presentes encantadores [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] dá quando está de bom humor! Um retorno bem valioso do meu tempo, embora, infelizmente, #EMP talvez#! não do dele.\n\nAh, bem, não tem jeito. [Select_CString( employer.IsFemale, 'Uma tola', 'Um tolo' )], seu dinheiro e tudo mais.\n\nÉ claro que [employer.GetSheHe] perceberá mais cedo ou mais tarde, ou alguém acabará conseguindo explicar o que aconteceu [Select_CString( employer.IsFemale, 'à boa', 'ao bom' )] [employer.GetTitleAsNameNoTooltip|l], mas isso não vai importar. Ficamos com o que queríamos e teremos partido antes do amanhecer."
 laamp_base_contract_schemes.0042.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.0043.t: "$laamp_base_contract_schemes.0041.t$: Falha!"
 laamp_base_contract_schemes.0043.desc: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] não é tão cort[employer.Custom('ES_OA')] quanto parece! Não sei o que entregou o jogo —um olhar fora de hora, uma frase suspeita, um sorrisinho no momento errado—, mas [employer.GetFirstNameNoTooltip] nos pegou.\n\nNão vamos tirar nem uma moeda dessa pessoa, e nem mais hospedagem.\n\nAo contrário de [employer.GetFirstNameNoTooltip], não sou tolo e sei quando os ventos se voltaram contra mim; meus [ROOT.Char.Custom('GetCourtierTypePlural')|l] e eu já teremos ido embora de [employer.GetCapitalLocation.GetTitle.GetNameNoTier] dentro de uma hora."
 laamp_base_contract_schemes.0043.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 #################################################
 #Base Martial Scheme Events
 laamp_base_contract_schemes.1001.t: "Caçando Criminosos"
 laamp_base_contract_schemes.1001.desc: "\"Essa quadrilha de...\", [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] torce o nariz com desgosto, \"#EMP malfeitores#! vêm assediando minhas propriedades privadas. Incendeiam, matam e roubam com quase total impunidade e escapam antes que meus servos possam enfiá-los nas algemas que #EMP tanto#! merecem.\"\n\nAssinto. A banda deve ser escorregadia para merecer tal recompensa."
 laamp_base_contract_schemes.1001.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.1001.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.1001.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.1001.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.1001.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.1002.t: "$laamp_base_contract_schemes.1001.t$: Sucesso!"
 laamp_base_contract_schemes.1002.desc: "«Bom, #EMP bem#!», riem [employer.GetFirstName] girando ociosamente a faca na mão. «Um trabalho excelente, [ROOT.Char.GetFirstNameNoTooltip], você e seu bando merecem cada moeda dessa bolsa».\n\nAs figuras surradas dos bandidos capturados estão nas jaulas atrás de [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] levemente excitad[employer.Custom('ES_OA')]. Quando estavam livres, deve ter sido muito excitante a ideia de zombar de alguém tão poderoso, incendiar suas propriedades e roubar suas riquezas, mas tudo o que é bom precisa chegar ao fim.\n\nMe despeço, com o dinheiro em mãos. Esses infelizes salteadores estão prestes a conhecer o verdadeiro salário do pecado."
 laamp_base_contract_schemes.1002.a: "Parece que [Select_CString( employer.IsFemale, 'la buena', 'el buen' )] [employer.GetTitleAsNameNoTooltip|l] está obtendo o que seu dinheiro vale."
 laamp_base_contract_schemes.1003.t: "$laamp_base_contract_schemes.1001.t$: Falha!"
 laamp_base_contract_schemes.1003.desc: "\"#EMP Vocês também fracassaram?!#!\", grita [employer.GetFirstName], à beira de um ataque de frustração. \"Será que ninguém pode me livrar desses bandidos repulsivos? Tenho de fazer isso eu mesmo, tendo o [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l] sujar suas mãos com o sangue de algum malfeitor fora da lei?\"\n\nMordo o lábio como posso, plenamente consciente de que uma reprimenda verbal talvez não seja lucrativa, mas ao menos não acaba comigo no calabouço. Provavelmente.\n\n\"Então? O que estão esperando? Saiam da minha frente, seu [ROOT.Char.Custom('GetLaampDescribeTypeInsult')]! Eu encontrarei #EMP outra pessoa#! para lidar com meus problemas. Alguém #EMP capaz#!.\""
 laamp_base_contract_schemes.1003.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.1004.t: "Traga-me a cabeça dele"
 laamp_base_contract_schemes.1004.desc: "\"Essa quadrilha de...\", [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] franze o nariz com desgosto, \"#EMP malfeitores#! têm assediado minhas propriedades privadas. Incendeiam, matam e roubam com quase total impunidade, escapando antes que meus servos possam prendê-los nas algemas que #EMP tanto#! merecem.\"\n\nAssinto. A quadrilha deve ser escorregadia para merecer tal recompensa privada.\n\n\"O líder deles é um[recidivist.Custom('ES_XA')] tal [recidivist.GetFirstNameNicknamed]; tragam-me a cabeça dele antes que ele possa escapar de vez, e receberão o pagamento.\""
 laamp_base_contract_schemes.1004.tt.destination_list: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [destination_1.GetNameNoTier], depois a [destination_2.GetNameNoTier], então a [destination_3.GetNameNoTier]"
 laamp_base_contract_schemes.1004.tt.explanation: "#TUT Para concluir o [task_contract|lE]:\n$EFFECT_LIST_BULLET$ Acumule #P 2#! pontos de vit?ria contra [recidivist.GetFirstName]\n$EFFECT_LIST_BULLET$ Pontos de vit?ria podem ser obtidos 1-2 por vez por meio de:\n$TAB$$EFFECT_LIST_BULLET$ Um [single_combat_duel|lE]\n$TAB$$EFFECT_LIST_BULLET$ Um desafio de [prowess|lE] (se voc? n?o puder duelar pessoalmente)\n$TAB$$EFFECT_LIST_BULLET$ Um desafio [martial|lE]\n$TAB$$EFFECT_LIST_BULLET$ Arriscar seus [men_at_arms|lE] (voc? deve ter pelo menos [EmptyScope.ScriptValue('laamp_base_contract_schemes_1301_min_troops_value')|0], e nenhum pode estar recrutado ou ficar ineleg?vel para a op??o)\n$EFFECT_LIST_BULLET$ Voc? recebe #P 3 chances#! de matar seu alvo; depois disso, ele escapar? e voc? receber? um resultado $label_failure_standard$#!"
 laamp_base_contract_schemes.1004.a: "$travel.stationary_domicile.option.t$"
 laamp_base_contract_schemes.1004.b: "$travel.mobile_domicile.option.t$"
 laamp_base_contract_schemes.1011.t: "Braço Contratado"
 laamp_base_contract_schemes.1011.desc: "«Minhas necessidades são simples», explica [employer.GetFirstName]. «Há certos espinhos na rosa de [employer.GetCapitalLocation.GetTitle.GetNameNoTier], e gostaria que removêsseis esses… sujeitos espinhosos. Não podem me ver fazendo isso diretamente, então vocês vão lidar com eles por mim».\n\nPasso um polegar pelo pescoço, em tom de pergunta.\n\n«Não, não», esclarece meu empregador[employer.Custom('ES_XA')]. «Sem derramamento de sangue sério, apenas mantenham-nos calados, sem matá-los, até que entendam o que significa desrespeitar [employer.Custom('ES_AlAla')] [employer.GetTitleAsNameNoTooltip|l]».\n\nParece simples o bastante."
 laamp_base_contract_schemes.1011.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.1011.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.1011.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.1011.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.1011.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.1012.t: "$laamp_base_contract_schemes.1011.t$: Sucesso!"
 laamp_base_contract_schemes.1012.desc: "\"Um trabalho maravilhoso, [ROOT.Char.GetFirstNameNoTooltip]! O jardim de [employer.GetCapitalLocation.GetTitle.GetNameNoTier] está linda e felizmente silencioso, e agora posso descansar um pouco mais tranquilo à noite\".\n\nEle me joga uma bolsa de prata.\n\n\"Por favor, hospede-se conosco na próxima vez que passar por esta área! Tenho certeza de que podemos encontrar acomodações adequadas — sem mencionar #EMP empleos#! empregos adequados — para uma [ROOT.Char.Custom('GetLaampDescribeTypeSelf')] [ROOT.Char.Custom2('GetYoungOld',employer)]\"."
 laamp_base_contract_schemes.1012.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.1013.t: "$laamp_base_contract_schemes.1011.t$: Falha!"
 laamp_base_contract_schemes.1013.desc: "«Só tinha uma tarefa, [ROOT.Char.GetFirstNameNoTooltip]», suspira [employer.GetFirstNameNoTooltip]. «Calar uns imbecis falastrões, mantê-los quietos por alguns meses, depois voltar e pegar sua prata».\n\nMantenho meu [ROOT.Char.Custom('MaskFace')] impassível. Pode ser humilhante, mas é melhor deixar que [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l] expresse suas frustrações verbalmente, para que não recorra a fazê-lo pela força das armas.\n\n«Talvez eu tenha sido tolo ao esperar algo melhor de uma espécie de [ROOT.Char.Custom('GetLaampDescribeTypeInsult')] como você. Acho que não há o que fazer».\n\nHá uma pausa… enquanto espero para ver se [employer.GetSheHe] tem mais algo a dizer.\n\n«Vocês podem ir embora. #EMP Agora#!, se quiserem»."
 laamp_base_contract_schemes.1013.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.1021.t: "Mestre de Treinamento"
 laamp_base_contract_schemes.1021.desc: "As tropas pessoais de [employer.GetFirstName] já são formidáveis, mas raramente um[employer.Custom('ES_XA')] [employer.GetTitleAsNameNoTooltip|l] se contenta com apenas #EMP imponentes#!. Afinal, a espinha dorsal de [employer.GetPrimaryTitle.GetDefinitiveName] é, como na maioria dos domínios, sua soldadesca.\n\nInspecionar seu equipamento e entrevistar seus melhores guerreiros é revelador, ao menos o suficiente para saber que há trabalho a ser feito aqui."
 laamp_base_contract_schemes.1021.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.1021.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.1021.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.1021.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.1021.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.1022.t: "$laamp_base_contract_schemes.1021.t$: Sucesso!"
 laamp_base_contract_schemes.1022.desc: "Inspecionar as fileiras cerradas das tropas [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] me dá uma cálida sensação de satisfação pessoal. Sim, eles já eram guerreiros antes de eu começar com eles, mas, com meu treinamento, certamente foram elevados a heróis.\n\nCom certeza meu empregador[employer.Custom('ES_XA')] parece satisfeit[employer.Custom('ES_OA')] pois me dá um tapinha nas costas com uma risada calorosa.\n\n\"Um ótimo trabalho, nobre [ROOT.Char.Custom('GetLaampDescribeTypeSelf')]! Você pegou ferro bruto e me devolveu aço. Seu pagamento o aguarda nos portões\"."
 laamp_base_contract_schemes.1022.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.1023.t: "$laamp_base_contract_schemes.1021.t$: Falha!"
 laamp_base_contract_schemes.1023.desc: "Não creio que se possa me culpar por estes... estes #EMP desertores#! e seu desordem!\n\nSão tropas [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l], mas assim que perdem de vista seu pagador[employer.Custom('ES_XA')], toda aparência de disciplina desmorona e eles se tornam uma nuvem de gafanhotos barulhenta e saqueadora que consome até a última migalha de comida e gota de bebida ao seu alcance.\n\nÉ claro que seus comandantes me culpam por tudo. Meus métodos estranhos, minhas maneiras estrangeiras de guerrear, que confundem as mentes simples de seus servos destacados.\n\nProtestei minha inocência o melhor que pude, mas [employer.GetFirstNameNoTooltip] não quer ouvir. Não haverá pagamento por nada disso."
 laamp_base_contract_schemes.1023.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.1031.t: "Dever de Guarnição"
 laamp_base_contract_schemes.1031.desc: "Não é exatamente o trabalho mais… estimulante, fornecer algumas espadas extras às possessões [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l], mas pelo menos é estável.\n\nAlém disso, quando se trata de armas, os trabalhos #EMP estimulantes#! não são exatamente os mais desejáveis. No campo de batalha, os mercenários descartáveis são sempre os primeiros a entrar na refrega, mas atrás de uma muralha? Bem, é difícil fazer de combatentes valentes uma carne de canhão.\n\n«… realmente não esperamos nenhum problema sério, é claro, mas vocês estão aqui por precaução, ainda assim. Está tudo claro?», termina [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l]. Faço que sim, voltando à conversa com um sobressalto."
 laamp_base_contract_schemes.1031.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.1031.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.1031.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.1031.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.1031.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.1032.t: "$laamp_base_contract_schemes.1031.t$: Sucesso!"
 laamp_base_contract_schemes.1032.desc: "\"Ótimo trabalho, [ROOT.Char.GetFirstNameNoTooltip]!\", elogia [employer.GetFirstName]. \"Meus espiões informam que a sua defesa brilhante deste posto afastou os intrusos que eu temia\".\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitleAsNameNoTooltip|l] me dá um tapa nas costas.\n\n\"Suponho que eles não tinham interesse em se meter com um guerreiro robusto como você, hein? Seus serviços são apreciados, e seu pagamento está a caminho\".\n\nAssinto com gratidão, feliz pelo longo descanso, mas aliviado por ter acabado."
 laamp_base_contract_schemes.1032.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.1033.t: "$laamp_base_contract_schemes.1031.t$: Falha!"
 laamp_base_contract_schemes.1033.desc: "\"Vocês só tinham que proteger este lugar, [ROOT.Char.Custom('GetLaampDescribeTypeInsult')] ignorante! Olhem para ele agora, a fumaça sai de cada uma das malditas janelas, isso para vocês #EMP parece#! protegido?\", urla [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l].\n\nNão... não sei o que aconteceu. Estávamos aqui, de serviço, vigilantes... sim, não é? Os intrusos passaram por cima das muralhas ou pelas portas? Em qualquer caso, o fato de terem incendiado continua sendo uma humilhação.\n\n[employer.Custom('ES_AlAla')|U] furios[employer.Custom('ES_OA')] [employer.GetTitleAsNameNoTooltip|l] não parecem se importar com as minhas desculpas nem protestos. Somos expulsos do pátio sem cerimônia, qualquer esperança de pagamento virou cinzas há muito tempo."
 laamp_base_contract_schemes.1033.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.1041.t: "Emboscando Viajantes"
 laamp_base_contract_schemes.1041.desc: "[employer.GetFirstName|U] deve ser realmente um[employer.Custom('ES_XA')] [employer.GetTitleAsNameNoTooltip|l] muito descuidado[employer.Custom('ES_OA')]. Imagine colocar um anúncio implorando por ajuda assim?\n\n[employer.GetSheHe|U] Perde dele, ganho nosso. Minha banda e eu já começamos a vasculhar os caminhos secundários mais movimentados para iniciar as emboscadas. Vamos roubar esses mercadores até o último tostão e voltar à estrada tão rápido quanto viemos.\n\nJá consigo praticamente sentir o cheiro das moedas."
 laamp_base_contract_schemes.1041.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.1041.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.1041.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.1041.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.1041.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.1042.t: "$laamp_base_contract_schemes.1041.t$: Sucesso!"
 laamp_base_contract_schemes.1042.desc: "Como planejado, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] não pode proteger seus mercadores nem suas riquezas.\n\nCada moeda que capturamos torna nossa banda mais audaz e suas caravanas mais inquietas. Nos empanturramos tanto com o ouro destas terras que podemos ver que eles estão desacelerando ativamente, tentando encontrar rotas alternativas ou comercializando em outros lugares por completo.\n\nInfelizmente, isso sinaliza o fim de nossas atividades aqui. É importante sair enquanto as coisas ainda vão bem, e [employer.Custom('ES_ElLa')] [employer.GetTitleAsName|l] ainda está com dificuldade para nos alcançar."
 laamp_base_contract_schemes.1042.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.1043.t: "$laamp_base_contract_schemes.1041.t$: Falha!"
 laamp_base_contract_schemes.1043.desc: "[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] parece ter um controle #EMP muito#! mais firme sobre as estradas destas terras do que havíamos pensado.\n\nMinha banda e eu tentamos uma emboscada atrás da outra, esperando de tocaia repetidas vezes, mas ou as caravanas nem chegam a passar, ou estão tão bem protegidas que não valem a pena como alvos.\n\nOs poucos combates em que #EMP entramos#! são sangrentos e totalmente improdutivos.\n\nQuanto mais cedo sairmos desta terra horrível, melhor — algo com o qual [employer.GetFirstNameNoTooltip] parece concordar plenamente."
 laamp_base_contract_schemes.1043.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.1044.t: "$laamp_base_contract_schemes.1041.t$"
 laamp_base_contract_schemes.1044.desc: "[employer.GetFirstName|U] certamente deve ser um[employer.Custom('ES_XA')] [employer.GetTitleAsNameNoTooltip|l] muito descuidado[employer.Custom('ES_OA')]. Quem é que pensa em colocar um pedido de ajuda assim e #EMP não#! esperar mais problemas?\n\n[employer.GetSheHe|U] se perde, nós ganhamos. Minha banda e eu já começamos a explorar as rotas secundárias mais movimentadas para iniciar emboscadas; parece que a opção mais natural a ser assediada é a estrada entre [destination_1.GetBaseNameNoTier] e [destination_2.GetBaseNameNoTier].\n\nVamos deixar estes mercadores e viajantes sem um tostão e fugiremos na noite com a mesma rapidez com que viemos.\n\nJá consigo praticamente sentir o cheiro das moedas."
 laamp_base_contract_schemes.1044.a: "$travel.stationary_domicile.option.t$"
 laamp_base_contract_schemes.1044.b: "$travel.mobile_domicile.option.t$"
 laamp_base_contract_schemes.1044.tt.destination_list: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [destination_1.GetNameNoTier], depois para [destination_2.GetNameNoTier]"
 laamp_base_contract_schemes.1044.tt.explanation: "#TUT Para concluir o [task_contract|lE]:\n$EFFECT_LIST_BULLET$Viaje até o destino final\n$EFFECT_LIST_BULLET$No caminho, conclua desafios de [prowess|lE], [martial|lE] ou [intrigue|lE] [skill|lE] contra outros viajantes\n$EFFECT_LIST_BULLET$Ganhe qualquer quantidade de [gold|lE] para obter um $label_success_standard$#!"
 laamp_base_contract_schemes.1044.tt.number_of_encounters: "#TUT Você terá [task_contract.MakeScope.Var('encounters_max').GetValue|0] vítimas em potencial#!"
 laamp_base_contract_schemes.1044.tt.path_warning: "#TUT Embora alongar sua rota de viagem não lhe dê mais vítimas em potencial, encurtá-la pode reduzir a quantidade que você recebe#!"
 #################################################
 #Base Stewardship Scheme Events
 laamp_base_contract_schemes.2001.t: "Impostos, Dízimos e Pedágios"
 laamp_base_contract_schemes.2001.desc: "«… E, claro, o imposto territorial extra. Está tudo claro?», diz [employer.Custom('ES_ElLa')|l] [employer.GetTitledFirstName|l] arrastando as palavras. É uma longa lista de taxas, encargos e uma série de tarifas variadas, mas «cobrança» soa mais simples.\n\n«Bem, #EMP bem#!! Vejam, estou correndo um risco ao confiar em vocês em vez dos meus cobradores habituais, mas espero que possam mostrar àqueles patifes como se faz e voltar a incutir o medo em meus súditos. Façam o seu trabalho com honestidade, rapidez e competência, e serão mais do que compensados».\n\nPor um segundo, parece que talvez haja mais instruções, mas [employer.GetFirstNameNoTooltip] faz um gesto com a mão para que eu saia do gabinete."
 laamp_base_contract_schemes.2001.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.2001.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.2001.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.2001.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.2001.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.2002.t: "$laamp_base_contract_schemes.2001.t$: Sucesso!"
 laamp_base_contract_schemes.2002.desc: "«Um trabalho excelente, [ROOT.Char.GetFirstNameNoTooltip]!», exclama [employer.GetFirstName], assobiando discretamente para si enquanto meu bando vai trazendo bolsa após bolsa de impostos atrasados há muito tempo.\n\n«O dinheiro e a carga são excelentes, é claro, mas espero que isso ensine aos meus coletores de impostos a #EMP valorizar#! seu trabalho no futuro».\n\nConcordo com a satisfação de saber que a gratidão [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] significa que nosso pagamento virá prontamente. Estou mais do que feliz[ROOT.Char.Custom('ES_OA')] em aceitar a pesada bolsa que me lança momentos depois."
 laamp_base_contract_schemes.2002.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.2003.t: "$laamp_base_contract_schemes.2001.t$: Falha!"
 laamp_base_contract_schemes.2003.desc: "«Idiota! Isso é menos da metade do que se #EMP supunha#! que vocês deveriam arrecadar!», troveja [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l].\n\n«Se eu não tivesse revistado de cima a baixo esse seu miserável acampamento, eu pensaria que você estava roubando de mim, mas está claro que isso não passa de incompetência», [employer.GetSheHe] mal consegue parar para respirar, «agora [employer.Custom('Saying_1p_SightAway')], antes que eu desperdice as poucas moedas que você realmente conseguiu arrecadar no conjunto de forcas mais precário de [employer.GetPrimaryTitle.GetDefinitiveNameNoTooltip|l]!».\n\nA diatribe me faz eriçar os cabelos da nuca, e minha mandíbula estala na articulação enquanto contenho a raiva crescente.\n\nAgora não é hora de briga, não quando ainda posso sair com a cabeça no lugar."
 laamp_base_contract_schemes.2003.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.2004.t: "Dai a [employer.GetFirstNameNoTooltip]"
 laamp_base_contract_schemes.2004.desc: "O representante [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] é rápido e direto: a cidade de [destination_1.GetBaseNameNoTier] aparentemente não pagou um imposto extra imposto pelo bom [employer.Custom('ES_ElLa')] bom[employer.Custom('ES_XA')] [employer.GetTitleAsNameNoTooltip|l].\n\nOs residentes resistiram a novas exigências, mas #EMP ainda#! ainda não se revoltaram abertamente. [employer.GetFirstNameNoTooltip] quer o que lhe é devido, mas teme os custos potenciais de uma rebelião aberta.\n\nÉ conveniente recorrer à ficção de uma terceira parte neutra para dobrar o líder da povoação recalcitrante, um[person_a.Custom('ES_XA')] tal [person_a.GetTitledFirstName|l], à submissão.\n\nTudo o que resta é a viagem até [destination_1.GetBaseNameNoTierNoTooltip]."
 laamp_base_contract_schemes.2004.a: "$travel.stationary_domicile.option.t$"
 laamp_base_contract_schemes.2004.b: "$travel.mobile_domicile.option.t$"
 laamp_base_contract_schemes.2004.tt.destination_list: "Você começa imediatamente a viagem para [destination_1.GetBaseNameNoTier]"
 laamp_base_contract_schemes.2004.tt.explanation: "#TUT Para concluir o [task_contract|lE]:\n$EFFECT_LIST_BULLET$Conclua 4 desafios para descobrir provas:\n$TAB$$EFFECT_LIST_BULLET$2 provas garantem um $label_success_standard$\n$TAB$$EFFECT_LIST_BULLET$4 provas concedem um $label_success_critical$\n$TAB$$EFFECT_LIST_BULLET$1 prova pode levar a um $label_success_standard$, um $label_success_qualified$ ou um $label_failure_standard$\n$EFFECT_LIST_BULLET$Os desafios podem ser:\n$TAB$$EFFECT_LIST_BULLET$Testar [stewardship|lE]\n$TAB$$EFFECT_LIST_BULLET$Testar a [aptitude|lE] de um [officer|lE] [GetCourtPositionType('quartermaster_camp_officer').GetName()|l]\n$TAB$$EFFECT_LIST_BULLET$Testar uma destas: [diplomacy|lE], [intrigue|lE] e [learning|lE]#!"
 laamp_base_contract_schemes.2011.t: "Fazendo um Registro"
 laamp_base_contract_schemes.2011.desc: "Talvez seja um pouco nada ortodoxo contratar um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GetLaampDescribeTypeSelfArticle')] [ROOT.Char.Custom('GetLaampDescribeTypeSelf')] e sua banda para realizar um censo, mas às vezes as necessidades apertam e tal... suponho, e a verdade é que não posso reclamar de ter conseguido o trabalho.\n\nO dinheiro vale o mesmo, e seja qual for a razão que tenha [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] para desconfiar de seus escribas, ela não se estende a nós, então deve ser um trabalho agradável e simples.\n\nNão é mesmo?"
 laamp_base_contract_schemes.2011.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.2011.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.2011.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.2011.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.2011.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.2012.t: "$laamp_base_contract_schemes.2011.t$: Sucesso!"
 laamp_base_contract_schemes.2012.desc: "Conduzir um censo não é isento de emoções: há fazendeiros tentando esconder o gado e as colheitas armazenadas, mercadores disfarçando os lucros e até a pequena nobreza, cujas terras parecem ficar menores e mais pobres quanto mais nos aproximamos tomando notas.\n\nAinda assim, felizmente, não encontramos nada que o selo [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] e nosso engenho não possam contornar com facilidade.\n\nOs resultados podem não ser exaustivos, mas servirão bem o suficiente pelos anos que virão, e era só isso que nosso contrato estipulava.\n\nHora de sermos pagos."
 laamp_base_contract_schemes.2012.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.2013.t: "$laamp_base_contract_schemes.2011.t$: Falha!"
 laamp_base_contract_schemes.2013.desc: "Claro que não era um trabalho simples.\n\nSe fosse, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] teria deixado que seus oficiais habituais cuidassem disso: em vez disso, minha turma e eu acabamos de passar [ROOT.Char.GetFaith.HealthGodName] sabe lá quantíssimo do nosso precioso tempo nesta Terra lidando com os camponeses mais idiotas, teimosos e #EMP insuportavelmente idiota#! que a sabedoria infinita de [ROOT.Char.GetFaith.CreatorName] jamais produziu.\n\nEstas terras e seu povo devem estar irremediavelmente consanguíneos, pois nada além disso poderia produzir tais imbecis.\n\nInfelizmente, o censo resultante não é nem de longe crível, e nosso pagamento não vai chegar."
 laamp_base_contract_schemes.2013.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.2021.t: "Arquitetura Amadora"
 laamp_base_contract_schemes.2021.desc: "Os planos para a construção [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] talvez... carecem um pouco de previsão. Pelo menos é o que parece para mim e para o meu grupo quando os temos em mãos. Não me admira que seus desenhistas tenham encontrado tantas dificuldades.\n\nAinda assim, isso não deveria ser um problema para nós. Sabemos o que [employer.GetFirstNameNoTooltip] pretende construir, só precisamos descobrir como #EMP fazê-lo#! fazer isso de fato, e somos semiprofissionais qualificados.\n\nOu algo assim."
 laamp_base_contract_schemes.2021.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.2021.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.2021.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.2021.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.2021.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.2022.t: "$laamp_base_contract_schemes.2021.t$: Sucesso!"
 laamp_base_contract_schemes.2022.desc: "Como sempre, meu grupo e eu somos modelos de eficiência. A construção foi rápida; o resultado, sólido e memorável, e embora [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] terá que continuar nosso bom trabalho, nós lhe demos tudo o que \n\nCargados com o peso de nosso pagamento bem merecido, nos preparamos para partir."
 laamp_base_contract_schemes.2022.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.2023.t: "$laamp_base_contract_schemes.2021.t$: Falha!"
 laamp_base_contract_schemes.2023.desc: "Há edifícios com designs muito elegantes em [employer.GetCapitalLocation.GetCounty.GetTitle.GetBaseNameNoTier].\n\nSó que eles não são nossos.\n\nDada a inclinação, a baixa qualidade dos materiais e as vigas salientes — sem falar dos incêndios durante a construção — tivemos sorte de não termos sido acusados de um crime.\n\nE isso pode mudar a qualquer momento por capricho [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l], o que significa que é melhor irmos embora."
 laamp_base_contract_schemes.2023.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.2031.t: "Arbitragem"
 laamp_base_contract_schemes.2031.desc: "Impasse político é um fenômeno interessante: duas ou três facções locais poderosas dentro de [employer.GetCapitalLocation.GetCounty.GetTitle.GetBaseNameNoTier], disputando ativamente entre si, mas incapazes ou sem vontade de avançar por conta própria.\n\nA disputa delas sobre onde exatamente fica uma fronteira interna precisa de alguém sem viés para ouvir os fatos e inspecionar a terra. Se nossa resposta for satisfatória o bastante, seremos muito bem pagos."
 laamp_base_contract_schemes.2031.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.2031.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.2031.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.2031.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.2031.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.2032.t: "$laamp_base_contract_schemes.2031.t$: Sucesso!"
 laamp_base_contract_schemes.2032.desc: "Já resolvemos de verdade a disputa de fronteiras em [employer.GetCapitalLocation.GetCounty.GetTitle.GetBaseNameNoTier]?\n\nTalvez não, mas o veredicto ao qual chegamos #EMP de fato#! que fez com que as reclamações caíssem para níveis aceitáveis. Do ponto de vista de [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l], foi exatamente para isso que fomos contratados e, portanto, nosso trabalho foi devidamente concluído.\n\nO pagamento chega sem demora."
 laamp_base_contract_schemes.2032.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.2033.t: "$laamp_base_contract_schemes.2031.t$: Falha!"
 laamp_base_contract_schemes.2033.desc: "Gritos, berros, acusações de suborno e conspiração… Conseguir chegar a um desfecho amigável para a disputa de limites em [employer.GetCapitalLocation.GetCounty.GetTitle.GetBaseNameNoTier] foi uma verdadeira #EMP experiencia#!.\n\nNem preciso dizer que não vamos receber por isso, mas ao menos não seremos multados.\n\nNão se agirmos rápido o bastante, pelo menos."
 laamp_base_contract_schemes.2033.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.2041.t: "Um Imposto Especial"
 laamp_base_contract_schemes.2041.desc: "Tenho certeza[ROOT.Char.Custom('ES_OA')] de que a boa gente das terras [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] está muito acostumada a que lhes imponha taxas e dízimos com pouca antecedência, então mais uma pequena taxa —e com aviso prévio [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l], nada menos— não deveria nem levantar uma sobrancelha.\n\nPreparamos nosso selo oficial falso e ensaiamos nossa história mais uma vez, prontos para avançar sobre a primeira comunidade com nossos cofres escancarados.\n\nIsso deve render um #EMP bonito#! lucro."
 laamp_base_contract_schemes.2041.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.2041.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.2041.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.2041.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.2041.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.2042.t: "$laamp_base_contract_schemes.2041.t$: Sucesso!"
 laamp_base_contract_schemes.2042.desc: "É perturbadoramente fácil separar as pessoas de sua riqueza quando elas acham que você tem o direito de fazê-lo e, ainda por cima, o apoio de sua [employer.GetTitleAsNameNoTooltip|l]. Alguns desconfiam no começo, mas uma postura suficientemente severa e ameaças vagas de autoridades superiores acabam fazendo com que se encolham com o tempo.\n\nNão há dúvida de que notícias de nossas correrias acabarão se espalhando; o importante é que não fomos descobertos enquanto as #EMP fazíamos#!.\n\nEnquanto isso, provavelmente não devemos demorar. Seria uma pena que [employer.GetFirstName] se inteirasse de que tem alguns \"impostos\" oficiais fora da tesouraria."
 laamp_base_contract_schemes.2042.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.2043.t: "$laamp_base_contract_schemes.2041.t$: Falha!"
 laamp_base_contract_schemes.2043.desc: "Talvez... talvez haja um motivo para que as pessoas não tentem isso com mais frequência.\n\nVez após vez, os locais nos expulsam da área, denunciando-nos como estranhos e estrangeiros, exigindo mais provas de identidade ao se recusarem a acreditar que seu [employer.GetTitleAsNameNoTooltip|l] lhes imponha um tributo extra sem aviso ou anúncio.\n\nSerá melhor partirmos, mesmo sem nenhum ganho real, antes que [employer.GetFirstName] saiba do que aconteceu aqui."
 laamp_base_contract_schemes.2043.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.2044.t: "$laamp_base_contract_schemes.2041.t$"
 laamp_base_contract_schemes.2044.desc: "$laamp_base_contract_schemes.2041.desc$"
 laamp_base_contract_schemes.2044.tt.destination_list.6_destinations: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [destination_1.GetNameNoTier], depois a [destination_2.GetNameNoTier], depois a [destination_3.GetNameNoTier], depois a [destination_4.GetNameNoTier], depois a [destination_5.GetNameNoTier] e, por fim, a [destination_6.GetNameNoTier]"
 laamp_base_contract_schemes.2044.tt.destination_list.5_destinations: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [destination_1.GetNameNoTier], depois a [destination_2.GetNameNoTier], depois a [destination_3.GetNameNoTier], depois a [destination_4.GetNameNoTier] e, por fim, a [destination_5.GetNameNoTier]"
 laamp_base_contract_schemes.2044.tt.destination_list.4_destinations: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [destination_1.GetNameNoTier], depois a [destination_2.GetNameNoTier], em seguida a [destination_3.GetNameNoTier] e, por fim, a [destination_4.GetNameNoTier]"
 laamp_base_contract_schemes.2044.tt.destination_list.3_destinations: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [destination_1.GetNameNoTier] depois a [destination_2.GetNameNoTier] e, por fim, a [destination_3.GetNameNoTier]"
 laamp_base_contract_schemes.2044.tt.explanation: "#TUT Para cumprir o [task_contract|lE]:\n$EFFECT_LIST_BULLET$Complete um desafio de [stewardship|lE], [intrigue|lE] ou [aptitude|lE] de [GetCourtPositionType('master_bard_camp_officer').GetName()|l] em cada destino\n$EFFECT_LIST_BULLET$Vença um terço dos desafios para um $label_success_qualified$\n$EFFECT_LIST_BULLET$Vença dois terços dos seus desafios para um sucesso normal\n$EFFECT_LIST_BULLET$Vença todos os desafios para um $label_success_critical$\n$EFFECT_LIST_BULLET$@warning_icon! #N Falhar #BOL dois#! ou mais desafios em qualquer momento fará com que você fracasse no $game_concept_task_contract$#!\n$EFFECT_LIST_BULLET$@alert_icon! #alert_trial Cada desafio concluído com sucesso aumentará ligeiramente a dificuldade dos testes seguintes, ainda mais para a [skill|lE] ou $game_concept_aptitude$ testada#!#!"
 laamp_base_contract_schemes.2044.a: "$travel.stationary_domicile.option.t$"
 laamp_base_contract_schemes.2044.b: "$travel.mobile_domicile.option.t$"
 #################################################
 #Base Intrigue Scheme Events
 laamp_base_contract_schemes.3001.t: "Reconhecimento Proativo"
 laamp_base_contract_schemes.3001.desc: "A solicitação [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] de relatórios esclarecedores sobre os acontecimentos ao redor de sua capital atrai toda sorte de charlatões, ansiosos por ganhar dinheiro fácil com rumores forçados ou mentiras óbvias.\n\nPor sorte para [employer.GetSheHe], minha turma e eu não somos os mesmos tolos comuns que abarrotam o salão de #EMP interesantes#! e podemos oferecer histórias mais [employer.Custom('ES_ElLa')] de terras vizinhas — embora o quão úteis elas serão fique a cargo do bom [employer.GetTitleAsNameNoTooltip|l]..."
 laamp_base_contract_schemes.3001.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.3001.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.3001.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.3001.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.3001.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.3002.t: "$laamp_base_contract_schemes.3001.t$: Sucesso!"
 laamp_base_contract_schemes.3002.desc: "Olhos e ouvidos atentos descobrirão muitas coisas enquanto um grupo estiver de passagem, sem exigir muito esforço extra além da disposição para observar e da atenção aos detalhes.\n\nUm princípio simples, mas que os apressados e imprudentes costumam descumprir com facilidade. Como esperávamos, #EMP nuestros#! relatórios resultam ser explicativos o bastante para nos render não só o pagamento, mas também uma hospitalidade prolongada.\n\nPara desgosto dos demais aspirantes a agentes."
 laamp_base_contract_schemes.3002.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.3003.t: "$laamp_base_contract_schemes.3001.t$: Falha!"
 laamp_base_contract_schemes.3003.desc: "Quando entramos no serviço de [employer.GetCapitalLocation.GetTitle.GetBaseNameNoTier], eu tinha certeza de que nossas histórias eram verdadeiras, relatos detalhados e úteis... não eram? Nós... estávamos tão confiantes.\n\nMas nossa estadia com [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l], apesar de começar de forma amistosa, rapidamente se tornou problemática. Os espiões enviados para seguir as pistas que apontamos voltaram amargurados ou nem voltaram, resultando em acusações de sabotagem deliberada e malícia, discussões que se prolongaram e ficaram cada vez mais altas.\n\nSendo assim, este já não é um lugar seguro para nós."
 laamp_base_contract_schemes.3003.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.3004.t: "$laamp_base_contract_schemes.3001.t$"
 laamp_base_contract_schemes.3004.desc: "$laamp_base_contract_schemes.3001.desc$\n\nAntes, porém, precisaremos visitar discretamente alguns lugares sobre os quais [employer.GetFirstNameNoTooltip] tem interesse em saber mais."
 laamp_base_contract_schemes.3004.tt.destination_list: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente para [destination_1.GetNameNoTier], depois para [destination_2.GetNameNoTier], então para [destination_3.GetNameNoTier]"
 laamp_base_contract_schemes.3004.tt.explanation: "#TUT Para concluir o [task_contract|lE]:\n$EFFECT_LIST_BULLET$ Conclua um desafio de [intrigue|lE] ou [diplomacy|lE] em cada destino\n$TAB$$EFFECT_LIST_BULLET$ Você será desafiado pelo melhor [ruler|lE] local ou seu [spymaster|lE]\n$EFFECT_LIST_BULLET$ Como alternativa, você pode garantir um sucesso gastando [prestige|lE] e [opinion|lE] com eles\n$TAB$$EFFECT_LIST_BULLET$ O custo em [prestige|lE] aumenta proporcionalmente ao [title_tier|lE] do [ruler|lE]\n$EFFECT_LIST_BULLET$ Nenhum sucesso resulta em um $label_failure_standard$\n$EFFECT_LIST_BULLET$ Um sucesso resulta em $label_success_qualified$\n$EFFECT_LIST_BULLET$ Dois sucessos resultam em $label_success_standard$\n$EFFECT_LIST_BULLET$ Três sucessos resultam em $label_success_critical$#!"
 laamp_base_contract_schemes.3004.a: "$travel.stationary_domicile.option.t$"
 laamp_base_contract_schemes.3004.b: "$travel.mobile_domicile.option.t$"
 laamp_base_contract_schemes.3011.t: "Quadrando o Círculo"
 laamp_base_contract_schemes.3011.desc: "\"Não preciso que seja devagar, só que [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] receba o abraço de [employer.GetFaith.DeathDeityNamePossessive] para que eu possa parar de pensar em [target.GetSheHe], está claro?\", rosna [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l].\n\nAssinto. Há muita coisa que não nos foi dita —por que [employer.GetFirstNameNoTooltip] quer ver mort[target.Custom('ES_OA')] a [Select_CString( target.IsFemale, 'esta mulher', 'este homem' )], o que impede [employer.GetSheHe] de usar métodos mais comuns…—, mas nada disso é da minha conta.\n\nUma vida abreviada e é hora do pagamento."
 laamp_base_contract_schemes.3011.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.3011.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.3011.c: "$laamp_base_contract_schemes.0000.generic_option.secrecy$"
 laamp_base_contract_schemes.3011.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.3011.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.3012.t: "$laamp_base_contract_schemes.3011.t$: Sucesso!"
 laamp_base_contract_schemes.3012.desc: "\"O recibo, meu [employer.GetTitleAsNameNoTooltip|l]\", digo, largando o saco encharcado no chão [employer.Custom('ES_DelDela')] [employer.GetFirstNameNicknamed|l]. O tecido encharcado tomba de lado, expondo um tufo desgrenhado do cabelo [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l].\n\n\"Vocês levaram literalmente demais o de \"traz-me a cabeça dele\"\", rosna [employer.GetFirstNameNoTooltip]. \"Deve ter sido um inferno conseguir isso e tudo o mais. Ainda assim, um trabalho bem-feito. Seu pagamento está com o servo do lado de fora\".\n\nInclino a cabeça respeitosamente e me retiro."
 laamp_base_contract_schemes.3012.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.3013.t: "$laamp_base_contract_schemes.3011.t$: Falha!"
 laamp_base_contract_schemes.3013.desc: "\"Então agora [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] sabe que alguém quer a sua cabeça? Seu idiota!\", rosna [employer.Custom('ES_EA')] [employer.GetTitledFirstName|l], \"por que #EMP confié#! em você? Gah!\".\n\nDou de ombros, abrindo a boca para explicar o… erro que fez nossa presa escapar do seu destino, mas a mão [employer.Custom('ES_DelDela')] [employer.GetFirstNameNoTooltip|l] dispara, o dedo apontando para o pátio lá fora.\n\n\"Vocês não receberão pagamento por um trabalho não concluído. Saia do meu [employer.Custom('FortifiedBuilding')] antes que eu descarregue minha decepção em #EMP vosotros#!\"."
 laamp_base_contract_schemes.3013.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.3021.t: "Aquisições Hostis"
 laamp_base_contract_schemes.3021.desc: "As instruções [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] são claras: encontre o momento em que [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] esteja vulnerável, livrar-se de quaisquer guardas que possa ter e trazer [target.GetHerHim] de volta para [employer.GetCapitalLocation.GetTitle.GetBaseNameNoTier] com vida e acorrentad[target.Custom('ES_OA')].\n\nSimples. [Select_CString(employer.IsFemale, 'A boa', 'O bom' )] [employer.GetTitleAsNameNoTooltip|l] não deu muitos detalhes sobre #EMP por qué#! quer que uns capangas clandestinos sequestrarem [Select_CString( target.IsFemale, 'esta mujer', 'este hombre' )], mas não cabe a nós perguntar."
 laamp_base_contract_schemes.3021.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.3021.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.3021.c: "$laamp_base_contract_schemes.0000.generic_option.secrecy$"
 laamp_base_contract_schemes.3021.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.3021.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.3022.t: "$laamp_base_contract_schemes.3021.t$: Sucesso!"
 laamp_base_contract_schemes.3022.desc: "\"[employer.GetTitledFirstName],\" cospe [target.GetTitledFirstName] quando tiro o saco da cabe?a de [target.GetHerHis], \"eu devia saber que era #EMP voc?#!.\"\n\n[employer.GetFirstNameNoTooltip] [employer.Custom('Saying_3p_SmilesSeems')] e faz um gesto para que o prisioneiro fique de joelhos. Sem cerim?nia, chuto [target.GetHerHim] na parte inferior das costas, derrubando [target.GetHerHim] no ch?o.\n\n\"Um trabalho excelente, [ROOT.Char.GetFirstNameNoTooltip],\" grasna meu empregador enquanto me lan?a uma bolsa pesada, \"vale cada moeda.\""
 laamp_base_contract_schemes.3022.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.3023.t: "$laamp_base_contract_schemes.3021.t$: Falha!"
 laamp_base_contract_schemes.3023.desc: "\"Estou percebendo uma ausência gritante de [target.GetFirstName], [ROOT.Char.GetFirstNameNoTooltip], [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] enquanto gesticula pelo escritório. \"Tínhamos um contrato pelo qual vocês me trariam ess[target.Custom('ES_EA')] idiota, mas não estou vendo o [target.Custom('ES_AlAla')] idiota que pedi, não é?\".\n\nFecho os dentes e balanço a cabeça.\n\n\"Vocês têm sorte de que outra presa esteja me mantendo ocupad[employer.Custom('ES_OA')], espécie de [ROOT.Char.Custom('GetLaampDescribeTypeInsult')]. Agora vão embora, antes que continuem desperdiçando minha boa vontade\"."
 laamp_base_contract_schemes.3023.a: "Sair do gabinete."
 laamp_base_contract_schemes.3031.t: "Conversa Incendiária"
 laamp_base_contract_schemes.3031.desc: "A conversa com [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] foi... reveladora. Parece que arde de raiva por algum pequeno desrespeito [target.Custom('ES_DelDela')] [target.GetFirstNameNoTooltip|l] —real ou imaginário—, e ansios[employer.Custom('ES_OA')] por colocar[target.GetHerHim] em seu lugar, mas ainda não está pronto para derramar sangue demais.\n\nO plano [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] é que incendiemos alguma propriedade menor pertencente a [target.GetFirstNameNoTooltip]. Satisfazer esse pedido sem dúvida vai inflamar as tensões, mas um trabalho é um trabalho."
 laamp_base_contract_schemes.3031.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.3031.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.3031.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.3031.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.3031.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.3032.t: "$laamp_base_contract_schemes.3031.t$: Sucesso!"
 laamp_base_contract_schemes.3032.desc: "Minha banda e eu estamos muito felizes em informar [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l], que [employer.Custom('PartAglow_EyesFaceBody')] enquanto escuta nosso relato de subterfúgio e fogo.\n\n\"#EMP Bien#! Bem, bem! Um trabalho excelente, [ROOT.Char.GetFirstName]\", ri a [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l], \"[target.GetFirstName] vai sentir isso por bastante tempo\".\n\nCom um gesto, um servo entra trazendo nosso pagamento em prata."
 laamp_base_contract_schemes.3032.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.3033.t: "$laamp_base_contract_schemes.3031.t$: Falha!"
 laamp_base_contract_schemes.3033.desc: "Nossa tentativa de incêndio criminoso logo se transformou em um banho de sangue em pânico: um servo nos pegou e deu o alarme antes que conseguíssemos atravessar a espada naquele desgraçado.\n\nNa luta que se seguiu, embora nossas espadas ficassem mais tingidas com o sangue deles do que as deles com o nosso, a única pequena chama vacilante que começamos foi extinta.\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] se recusa até mesmo a nos ver para que possamos explicar. Está ocupado demais[employer.Custom('ES_OA')] para nos punir, mas também não há chance alguma de pagamento."
 laamp_base_contract_schemes.3033.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.3034.t: "$laamp_base_contract_schemes.3031.t$"
 laamp_base_contract_schemes.3034.desc: "A carta [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] foi... esclarecedora. Parece arder de raiva por algum pequeno desaire [target.Custom('ES_DelDela')] [target.GetFirstNameNoTooltip|l] — real ou imaginário—, e está ansios[employer.Custom('ES_OA')] por pôr[target.GetHerHim] em seu lugar, mas ainda não está preparad[employer.Custom('ES_OA')] para derramar sangue demais.\n\nO plano [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] é que coloquemos fogo em alguma propriedade menor que tenha alguma relação com [target.GetFirstNameNoTooltip] ou, então, que a reduzamos da maneira que nos parecer mais adequada.\n\nAtender a esse pedido sem dúvida inflamará as tensões, mas trabalho é trabalho."
 laamp_base_contract_schemes.3034.tt.destination_list: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [destination_1.GetNameNoTier]"
 laamp_base_contract_schemes.3034.tt.explanation: "#TUT Para concluir o [task_contract|lE]:\n$EFFECT_LIST_BULLET$ Conclua um desafio de [intrigue|lE], [martial|lE] ou [prowess|lE], ou diferentes tipos de desafio de [aptitude|lE] de [officer|lE] no destino\n$EFFECT_LIST_BULLET$ A [intrigue|lE] está sempre disponível\n$EFFECT_LIST_BULLET$ Poder testar [Concept('martial', 'marcialidade')|E] ou [prowess|lE] depende do alvo\n$EFFECT_LIST_BULLET$ Dependendo do alvo, seu melhor [officer|lE] válido também estará disponível\n$EFFECT_LIST_BULLET$ Ao chegar, você poderá desistir recebendo apenas um $label_failure_qualified$, se achar os desafios difíceis demais#!"
 laamp_base_contract_schemes.3034.a: "$travel.stationary_domicile.option.t$"
 laamp_base_contract_schemes.3034.b: "$travel.mobile_domicile.option.t$"
 laamp_base_contract_schemes.3041.t: "Um Pouco de Furto"
 laamp_base_contract_schemes.3041.desc: "O reconhecimento preliminar em torno de [employer.GetCapitalLocation.GetTitle.GetBaseNameNoTier] sugere que #EMP podríamos#! talvez consigamos nos safar com isto: não é o único lugar onde [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] guarda seu dinheiro, mas suas propriedades aqui certamente têm #EMP bastante#! e os guardas não parecem esperar hostilidades.\n\nEm outras palavras, arriscado, mas viável.\n\nSó precisamos de um plano astuto…"
 laamp_base_contract_schemes.3041.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.3041.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.3041.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.3041.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.3041.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.3042.t: "$laamp_base_contract_schemes.3041.t$: Sucesso!"
 laamp_base_contract_schemes.3042.desc: "Uma fechadura forçada discretamente aqui, um sentinela apunhalado com discernimento ali e, de repente… a riqueza de [employer.GetPrimaryTitle.GetNameNoTier] se revela diante de nós.\n\nEnchemos os sacos o mais rápido possível e fomos embora. Alguém terá de enfrentar as consequências.\n\nSó esperamos que não sejamos nós."
 laamp_base_contract_schemes.3042.a: "[employer.GetTitledFirstNameNoTooltip], que trouxa!"
 laamp_base_contract_schemes.3042.b: "Sabe... ainda tem muito mais lá atrás..."
 laamp_base_contract_schemes.3042.b.tt.possible_haul: "[employer.Custom('ES_AlAla')|l] [employer.GetTitledFirstName|l] restam até [varcheck.MakeScope.Var('haul_possible').GetValue|P0] de [gold|lE] [gold_i] e apetrechos, que podem ser roubados em incrementos de [varcheck.MakeScope.Var('haul_increment').GetValue|P0] [gold_i]"
 laamp_base_contract_schemes.3042.b.tt.explanation: "#TUT Ao retornar:\n$EFFECT_LIST_BULLET$Você sempre poderá testar sua [intrigue|lE] para roubar mais\n$EFFECT_LIST_BULLET$Testará uma destas opções ao acaso:\n$TAB$$EFFECT_LIST_BULLET$[Concept('martial', 'Marcialidade')|E], [prowess|lE] ou [stewardship|lE]\n$TAB$$EFFECT_LIST_BULLET$A [prowess|lE] ou [intrigue|lE] de um de seus [agents|lE]\n$TAB$$EFFECT_LIST_BULLET$A aptidão do seu [GetCourtPositionType('master_thief_camp_officer').GetName()|l] ou [GetCourtPositionType('master_of_spoils_camp_officer').GetName()|l]\n$EFFECT_LIST_BULLET$Receba [stress|lE] para passar automaticamente em um teste\n$EFFECT_LIST_BULLET$Fuja com seus ganhos\n$EFFECT_LIST_BULLET$Se falhar duas vezes, será preso e perderá seus ganhos#!\n$EFFECT_LIST_BULLET$Você ganhará experiência extra de [GetTrait('gallowsbait').GetName( GetNullCharacter )|l] proporcionalmente ao quanto roubar"
 laamp_base_contract_schemes.3042.b.tt.current_earnings: "#TUT Seus ganhos do contrato já foram assegurados e continuarão sendo seus de qualquer forma#!"
 laamp_base_contract_schemes.3042.b.tt.you_go_back_for_more: "Volte sorrateiramente para o [employer.Custom('ResidenceBuilding')|l], pronto para saquear!"
 laamp_base_contract_schemes.3043.t: "$laamp_base_contract_schemes.3041.t$: Falha!"
 laamp_base_contract_schemes.3043.desc: "Maldito seja tudo!\n\nO Tesoureiro de [employer.GetFirstNameNoTooltip] tinha mais guardas do que pensávamos, em patrulhas diferentes das que esperávamos — até a própria lua nos traiu com uma noite brilhantemente iluminada…\n\nNossa infiltração se degenerou em uma confusão sangrenta pouco depois de escalarmos a muralha externa. Não temos prata para mostrar, apenas servos em perseguição cerrada e feridas ardentes como recompensa por nossos esforços."
 laamp_base_contract_schemes.3043.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 #################################################
 #Base Learning Scheme Events
 laamp_base_contract_schemes.4001.t: "Penas de Aluguel"
 laamp_base_contract_schemes.4001.desc: "\"Claro, se não for #EMP demasiado#! trabalho demais para você\", sorri [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] enquanto coloca um maço de [ROOT.Char.Custom('GetWritingMaterial')] amarrados sobre a mesa. \"Só isso\".\n\nDepois de um momento, acrescenta um par de rolos de [ROOT.Char.Custom('GetWritingMaterial')]. E mais uma pilha de [ROOT.Char.Custom('GetWritingMaterial')]. E um livrinho.\n\nErgo uma sobrancelha e [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l] tira de uma gaveta um volume um pouco mais grosso e o coloca em cima da pilha.\n\n\"Bem, só #EMP esos#!\"."
 laamp_base_contract_schemes.4001.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.4001.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.4001.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.4001.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.4001.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.4002.t: "$laamp_base_contract_schemes.4001.t$: Sucesso!"
 laamp_base_contract_schemes.4002.desc: "Retorno ao salão [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] de bom humor, com os dedos manchados de tinta e os olhos lacrimejantes por falta de sono, mas com o trabalho concluído.\n\nUm dos meus homens traz atrás de mim a pilha de obras concluídas, arrastando-se sob o peso do amontoado desordenado.\n\n\"Já terminaram? Acho que eu poderia ter dado um pouco mais\", brinca [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l] antes de nos dispensar. \"Não os deixem aqui; meus servos encontrarão alguém para ler os frutos da vossa alfabetização e cuidarão do vosso pagamento.\""
 laamp_base_contract_schemes.4002.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.4003.t: "$laamp_base_contract_schemes.4001.t$: Falha!"
 laamp_base_contract_schemes.4003.desc: "Sente-se, ordena-me [Select_CString(employer.IsFemale, 'uma irritada', 'um irritado' )] [employer.GetTitledFirstName|l] enquanto levanta uma folha de pergaminho manchada de tinta, coberta de rabiscos indistintos. Sabe o que está escrito aqui?\n\nBalanço a cabeça.\n\nEu também não, porque #EMP não são palavras#!. Sua turma de patifes andou rabiscando por [employer.GetFaith.KnowledgeGodName] sabe-se lá há quanto tempo, e #EMP isso#! é tudo o que vocês têm para mostrar? Não vou pagar por tinta desperdiçada assim. Peguem seus \"exemplares\" e vão embora!"
 laamp_base_contract_schemes.4003.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.4011.t: "Resolvendo Teologia"
 laamp_base_contract_schemes.4011.desc: "\"... e isso é mais ou menos o essencial\", termina [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l]. \"Tem algo a acrescentar, [chaplain.GetTitledFirstName|l]?\"\n\n[chaplain.Custom('ES_ElLa')|U] [chaplain.GetCouncilTitle|l] balança a cabeça; \"vocês resumiram bem, meu [employer.GetLadyLord]; se meus deveres não me chamassem para outro lugar, eu mediaria com prazer, mas...\"\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitleAsNameNoTooltip|l] ergue uma mão para fazê-lo parar. \"Não se preocupem, tenho certez[employer.Custom('ES_OA')]a de que [ROOT.Char.GetFirstName] lidará bem com nossos [employer.GetFaith.PriestNeuterPlural] polemistas.\""
 laamp_base_contract_schemes.4011.a: "Quão ruins eles podem ser?"
 laamp_base_contract_schemes.4011.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.4011.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.4011.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.4011.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.4012.t: "$laamp_base_contract_schemes.4011.t$: Sucesso!"
 laamp_base_contract_schemes.4012.desc: "O debate acabou sendo surpreendentemente simples de resolver: ambas as partes estavam tão ocupadas em atirar lama uma na outra que até um apelo vago ao espírito de unidade do [ROOT.Char.GetFaith.GetReligion.GetName|l] conquistou o centro desiludido.\n\nOs [employer.GetFaith.PriestNeuterPlural] no coração da discussão ainda estão fervendo uns com os outros, mas com tão poucos ainda envolvidos, há pouco risco de que isso transborde para algo pior.\n\nEnfim, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] parece satisfeit[employer.Custom('ES_OA')]."
 laamp_base_contract_schemes.4012.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.4013.t: "$laamp_base_contract_schemes.4011.t$: Falha!"
 laamp_base_contract_schemes.4013.desc: "Isso teve… muito mais derramamento de sangue do que se supõe que um debate verbal deva ter.\n\nA discussão levou aos gritos, os gritos ao fervor, o fervor aos insultos, e, a partir daí, foi só uma questão de tempo até alguém dar um soco. Mesmo agora, o desastre continua se desenrolando fora de controle atrás de nós.\n\nNem é preciso dizer que não nos pagarão por isso."
 laamp_base_contract_schemes.4013.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.4021.t: "Frutos da Mente"
 laamp_base_contract_schemes.4021.desc: "Minha discussão com [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] revelou-se… instrutiva.\n\nParece que o que ele quer é um livrinho de aforismos sobre a sabedoria tradicional [ROOT.Char.GetCulture.GetName]. algo que faça com que ele pareça um[employer.Custom('ES_XA')] autêntic[employer.Custom('ES_OA')] mecenas das artes.\n\nQuão difícil isso pode ser?"
 laamp_base_contract_schemes.4021.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.4021.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.4021.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.4021.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.4021.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.4022.t: "$laamp_base_contract_schemes.4021.t$: Sucesso!"
 laamp_base_contract_schemes.4022.desc: "Outra corte, outro patrono satisfeito!\n\nO livreto, \"Sobre as Muitas Astúcias e Mistérios da sabedoria [ROOT.Char.GetCulture.GetName]\", é engenhosamente conciso, mas o #EMP bastante#! perspicaz o bastante para fazer a corte fervilhar com seus temas tradicionalistas e pensamentos de senso comum.\n\nÉ improvável que perdure por muito tempo, e menos ainda que tenha muitos exemplares, mas por ora isso já nos vale o pagamento, e basta."
 laamp_base_contract_schemes.4022.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.4023.t: "$laamp_base_contract_schemes.4021.t$: Falha!"
 laamp_base_contract_schemes.4023.desc: "\"Bobagem! Que #EMP bobagem#! é esta que vocês produziram, [ROOT.Char.GetFirstName]?\", grita [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l], folheando as páginas que meu grupo e eu preparamos. \"O... 'o verdadeiro valor do coração de um homem não é maior que o suor de sua testa'? O que isso #EMP significa#!?!\"\n\nAbro a boca para responder, para explicar o aforismo, mas [Select_CString(employer.IsFemale, 'a enojada', 'o enojado' )] [employer.GetTitleAsNameNoTooltip|l] me arremessa o manuscrito e me faz gestos para que eu vá embora.\n\nAo que parece, já disse o bastante."
 laamp_base_contract_schemes.4023.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.4031.t: "Pedindo Esmolas"
 laamp_base_contract_schemes.4031.desc: "Felizmente, conseguir entrar para ver [employer.Custom('ES_AlAla')] [employer.GetTitledFirstName|l] se mostra surpreendentemente fácil, com apenas uma sugestão de mistério sedutor sobre nosso propósito para lubrificar as engrenagens.\n\nUma vez concedida a audiência, nosso propósito se torna claro bem rápido. Como [ROOT.Char.Custom('GetLaampDescribeTypeSelfPlural')] eruditos, dependemos da generosidade de governantes #EMP ilustrados#! para continuar fazendo nossas boas obras, então [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l] aceita, a contragosto, que fiquemos por um tempo — mas só isso!\n\n… por enquanto."
 laamp_base_contract_schemes.4031.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.4031.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.4031.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.4031.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.4031.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.4032.t: "$laamp_base_contract_schemes.4031.t$: Sucesso!"
 laamp_base_contract_schemes.4032.desc: "Nossa estadia com [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] acaba sendo bastante frutífera: um encanto persistente e conversas eruditas acabam reduzindo as suspeitas [employer.Custom('ES_DelDela')] [employer.GetTitleAsName|l] e [employer.GetHerHim] os colocam em um estado de interesse aguçado; e então os dons do patronato começam a chegar de verdade.\n\nUm empreendimento generoso, sem dúvida, mas essa boa vontade não durará para sempre, então, naturalmente, iremos embora antes de ficarmos tempo demais.\n\nA generosidade de [employer.GetCapitalLocation.GetTitle.GetName] para com nossas arcas tem sido grande."
 laamp_base_contract_schemes.4032.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.4033.t: "$laamp_base_contract_schemes.4031.t$: Falha!"
 laamp_base_contract_schemes.4033.desc: "Durante nossa estadia, a atitude [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] em relação a nós só vai piorando; nossos esforços para arrancar presentes e promessas dele(a) na primeira oportunidade não ajudam.\n\nA cada dia que passa, a irritação [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] aumenta. E meu erro de cálculo se torna tão evidente quanto a inevitável acusação de vadiagem que nos espera se continuarmos nos demorando aqui."
 laamp_base_contract_schemes.4033.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.4041.t: "Cada Bugiganga, um Tesouro"
 laamp_base_contract_schemes.4041.desc: "\"E esta aqui\", diz [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] ao examinar uma pequena pedra esculpida de tonalidade azul-esverdeada, \"é boa para a gota? Você tem uma boa variedade aqui, [ROOT.Char.GetFirstName]\".\n\n\"Se meu [employer.GetLadyLord] desejar, posso mandar buscar alguns dos itens mais exóticos da nossa bagagem?\", as palavras saem da minha boca com fluidez e confiança. \"Como podem ver, temos muitos bens a oferecer a você e à sua corte\".\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitleAsName|l] assente e concorda que fiquemos por algum tempo."
 laamp_base_contract_schemes.4041.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.4041.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.4041.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.4041.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.4041.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.4042.t: "$laamp_base_contract_schemes.4041.t$: Sucesso!"
 laamp_base_contract_schemes.4042.desc: "Nosso tempo em [employer.GetCapitalLocation.GetTitle.GetName] é imensamente lucrativo! Negociar com a aprovação tácita [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] confere às nossas mercadorias uma legitimidade que toda a lábia do mundo não conseguiria alcançar.\n\nTalismanes, remédios, bugigangas e quinquilharias — cortesãos e convidados compram tudo, sem fazer perguntas.\n\nAo menos, por enquanto. Já estaremos longe quando suas preocupações começarem a surgir."
 laamp_base_contract_schemes.4042.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.4043.t: "$laamp_base_contract_schemes.4041.t$: Falha!"
 laamp_base_contract_schemes.4043.desc: "Os cortesãos [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] são mais espertos do que parecem... Primeiro, suspeitam uma a uma de todas as nossas mentirinhas, e depois as desmontam, destruindo lentamente nossa reputação como vendedores de curas milagrosas exóticas.\n\nO que é pior, nossa óbvia duplicidade deixa em má situação [employer.Custom('ES_AlAla')] [employer.GetTitleAsNameNoTooltip|l]: ou bem ele nos permitiu ou fomos enganados por nós, e nenhuma das opções nos conquista a simpatia do regime.\n\nSeja como for, é melhor irmos embora — mesmo sem lucro — antes que a ira de [employer.GetFirstName] acabe em violência física."
 laamp_base_contract_schemes.4043.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 #################################################
 #Base Prowess Scheme Events
 laamp_base_contract_schemes.5001.t: "[employer.Custom('GetOutOfControlAnimalTypePlural')|U] para o Abate"
 laamp_base_contract_schemes.5001.desc: "A ordem [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] é simples: cobrar as cabeças de tantos [employer.Custom('GetOutOfControlAnimalTypePlural')] quanto pudermos e, se a contagem for impressionante, ganharemos o direito de caçar em suas terras por um tempo.\n\nToda essa terra a ser espreitada… significa carne para salgar, peles para curtir, chifre e casco para talhar, um tesouro por toda parte.\n\nResumindo, um encontro estimulante e lucrativo."
 laamp_base_contract_schemes.5001.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.5001.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.5001.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.5001.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.5001.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.5002.t: "$laamp_base_contract_schemes.5001.t$: Sucesso!"
 laamp_base_contract_schemes.5002.desc: "Minha tropa e eu nos cobremos de glória com esta caçada: um grande número de [employer.Custom('GetOutOfControlAnimalTypePlural')] caíram mortos pelas nossas mãos, o que nos tornou populares entre os camponeses e [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] por igual, e a colheita que trouxemos das terras selvagens é realmente farta.\n\nCom nossa bagagem carregada de peles e comida, conseguimos mais do que o suficiente para repor nossas flechas perdidas e lanças lascadas."
 laamp_base_contract_schemes.5002.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.5003.t: "$laamp_base_contract_schemes.5001.t$: Falha!"
 laamp_base_contract_schemes.5003.desc: "Os [employer.Custom('GetOutOfControlAnimalTypePlural')], os #EMP [employer.Custom('GetOutOfControlAnimalTypePlural')]!#! Noite após noite, ouvimos seus rugidos, e noite após noite nossas expedições de caça voltam com menos homens.\n\nNão importa quantos desses malditos animais matemos, sempre parece haver mais dessas bestas três vezes amaldiçoadas. Não é de admirar que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] não pudesse lidar com essas feras.\n\nEstá claro que precisamos cortar nossas perdas e encerrar este contrato maldito antes que as terras selvagens nos consumam a todos."
 laamp_base_contract_schemes.5003.a: "Que as tropas de [employer.GetFirstName]!"
 laamp_base_contract_schemes.5011.t: "Sentinela"
 laamp_base_contract_schemes.5011.desc: "Seja real ou imaginário o ataque que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] espera contra as propriedades deste mercador, fazer a guarda continua sendo deprimente, embora grande parte dela seja feita pelo bando.\n\nAinda assim, estamos sendo pagos para ficar alertas e visíveis. Uma demonstração de força [Select_CString(employer.IsFemale, ' da guardiã', 'do guardião' )] desta terra.\n\nMesmo que isso signifique ficar de pé ao relento."
 laamp_base_contract_schemes.5011.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.5011.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.5011.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.5011.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.5011.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.5012.t: "$laamp_base_contract_schemes.5011.t$: Sucesso!"
 laamp_base_contract_schemes.5012.desc: "#EMP Ataque#!. O termo quase soa grandioso demais para se referir a alguns rufiões sujos que, ao anoitecer, avançam em massa num ataque mal concebido; certamente quando tudo acaba em questão de minutos. Parece mais uma escaramuça ou briga de beco.\n\nAinda assim, [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] parece satisfeit[employer.Custom('ES_OA')].\n\nSua autoridade permanece absoluta, e isso é tudo o que importa — o que significa que receberemos um bom pagamento."
 laamp_base_contract_schemes.5012.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.5013.t: "$laamp_base_contract_schemes.5011.t$: Falha!"
 laamp_base_contract_schemes.5013.desc: "\"Nós pagamos para que vocês guardassem o lugar, e agora ele não passa de gravetos carbonizados e sangue seco, [ROOT.Char.GetFirstName]!\" rosna [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l]. \"Como vocês foram pegos desprevenidos por uma cambada de bandidos de quinta categoria? Vocês só tinham #EMP uma#! tarefa!\"\n\nAbro a boca para responder, mas [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l] me interrompe.\n\n\"Silêncio, não quero suas desculpas. Só vão embora\"."
 laamp_base_contract_schemes.5013.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.5021.t: "Acompanhante [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l]"
 laamp_base_contract_schemes.5021.desc: "\"Então, vocês veem por que preciso de alguns… olhos extras espalhados por [employer.GetCapitalLocation.GetTitle.GetBaseNameNoTier]\", diz [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l]. \"Vocês fornecerão uma camada extra de segurança, para que, se algo escapar aos meus retentores habituais — ou se esses retentores vacilarem em sua lealdade —, eu ainda tenha bom aço cobrindo minhas costas\".\n\nEu aceno. Lugar ruim para estar, quando não se pode confiar nos guardas, mas pelo menos é bom para os negócios.\n\n\"Excelente, então começarão imediatamente\"."
 laamp_base_contract_schemes.5021.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.5021.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.5021.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.5021.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.5021.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.5022.t: "$laamp_base_contract_schemes.5021.t$: Sucesso!"
 laamp_base_contract_schemes.5022.desc: "\"De fato, um trabalho magnífico, [ROOT.Char.GetFirstName]\", grasna [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l], \"até o último desses cães despachado com graça e eficiência! Nem um fio do meu cabelo foi ferido por esses canalhas traidores\".\n\n\"Temo que estejais exagerando, meu [employer.GetLadyLord|l]\", comento. Um servo atrás de nós esfrega vigorosamente o sangue pegajoso da argamassa da parede.\n\n\"Bah, melhor as entranhas deles no tapete do que as minhas. Vossa paga será entregue com a maior brevidade\"."
 laamp_base_contract_schemes.5022.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.5023.t: "$laamp_base_contract_schemes.5021.t$: Falha!"
 laamp_base_contract_schemes.5023.desc: "Assim que os assassinos passaram por nós, soube que tínhamos de fugir, e rápido.\n\nNão poderemos alcançá-los a tempo para fazer diferença, e embora os servidores [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] ainda possam salvar [employer.GetHerHim]  — ou não — , alguém vai pagar por isso.\n\nQuanto mais tempo demorarmos aqui, maior será a probabilidade de que esse alguém seja eu."
 laamp_base_contract_schemes.5023.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.5031.t: "Ladrão de Gado"
 laamp_base_contract_schemes.5031.desc: "Há uma arte em roubar animais em massa: é preciso saber para onde eles serão levados; não se pode ser sutil, mas #EMP existe#! que pareçamos fazer parte do grupo; e, quando houver resistência, a brutalidade precisa ser rápida.\n\nCaso contrário, o risco de uma debandada ou mesmo de perder o controle do rebanho põe em perigo todo o empreendimento, e quando as coisas dão errado, o lucro afunda mais rápido do que um navio sacudido por uma tempestade.\n\nEsperemos que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] não proteja bem seu gado."
 laamp_base_contract_schemes.5031.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.5031.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.5031.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.5031.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.5031.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.5032.t: "$laamp_base_contract_schemes.5031.t$: Sucesso!"
 laamp_base_contract_schemes.5032.desc: "Uma bela operação! Após muitos preparativos — traçar rotas, encontrar compradores, examinar pastos —, nossos ladrões de gado lançaram uma série vertiginosa de ataques noturnos que levaram grandes grupos de animais ao longo de uma semana.\n\n[employer.Custom('ES_ElLa')|U] [employer.GetTitledFirstName|l] não precisa se preocupar: suas bestas certamente vão para lares melhores. Afinal, seus novos proprietários têm bolsos fundos e uma atitude #EMP muito#! generosa."
 laamp_base_contract_schemes.5032.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.5033.t: "$laamp_base_contract_schemes.5031.t$: Falha!"
 laamp_base_contract_schemes.5033.desc: "Parecia... parecia que tudo ia dar certo.\n\nConhecíamos a rota, tínhamos planejado os ataques, mas fosse pelo cheiro de sangue assustando os animais, pelo barulho ou pela mudança na rotina...\n\nMinha turma e eu somos forçados a nos dispersar, com os sabujos [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] nos calcanhares e poucas cabeças de gado roubadas para mostrar como resultado."
 laamp_base_contract_schemes.5033.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.5034.t: "Roubo de Gado"
 laamp_base_contract_schemes.5034.desc: "$laamp_base_contract_schemes.5031.desc$"
 laamp_base_contract_schemes.5034.a: "$travel.stationary_domicile.option.t$"
 laamp_base_contract_schemes.5034.b: "$travel.mobile_domicile.option.t$"
 laamp_base_contract_schemes.5034.tt.destination_list.5: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [destination_1.GetNameNoTier], depois a [destination_2.GetNameNoTier], depois a [destination_3.GetNameNoTier], depois a [destination_4.GetNameNoTier] e, por fim, a [destination_5.GetNameNoTier]"
 laamp_base_contract_schemes.5034.tt.destination_list.4: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente para [destination_1.GetNameNoTier], depois para [destination_2.GetNameNoTier], em seguida para [destination_3.GetNameNoTier] e, por fim, para [destination_4.GetNameNoTier]"
 laamp_base_contract_schemes.5034.tt.destination_list.3: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [destination_1.GetNameNoTier], depois a [destination_2.GetNameNoTier] e, por fim, a [destination_3.GetNameNoTier]"
 laamp_base_contract_schemes.5034.tt.destination_list.2: "Você começa [Concept('traveling', 'el viaje' )|E] imediatamente a [destination_1.GetNameNoTier], depois a [destination_2.GetNameNoTier]"
 laamp_base_contract_schemes.5034.tt.explanation: "#TUT Para concluir o [task_contract|lE]:\n$EFFECT_LIST_BULLET$ Complete um desafio de [prowess|lE], [martial|lE] ou [stewardship|lE] em cada destino\n$EFFECT_LIST_BULLET$ Se os tiver, voc? poder? testar a aptid?o do melhor de seus [officers|lE]: [GetCourtPositionType('head_groom_camp_officer').GetName()|l], [GetCourtPositionType('huntperson_camp_officer').GetName()|l], [GetCourtPositionType('kennelperson_camp_officer').GetName()|l] ou [GetCourtPositionType('master_of_spoils_camp_officer').GetName()|l]\n$EFFECT_LIST_BULLET$ Para ter sucesso:\n$TAB$$EFFECT_LIST_BULLET$ Ven?a todos os desafios para um $label_success_critical$\n$TAB$$EFFECT_LIST_BULLET$ Ven?a mais da metade dos desafios para um $label_success_standard$\n$TAB$$EFFECT_LIST_BULLET$ Ven?a pelo menos um desafio para um $label_success_qualified$\n$TAB$$EFFECT_LIST_BULLET$ Perca todos os desafios e ter? um $label_failure_standard$#!"
 laamp_base_contract_schemes.5041.t: "Caçador Furtivo"
 laamp_base_contract_schemes.5041.desc: "Parece que as terras [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] estão sobrecarregadas de caça, tanta que já está tendo alguns problemas com os furtivos.\n\nBem, dado que somos uma alegre banda de [ROOT.Char.Custom('GetLaampDescribeTypeSelfPlural')|l], não seria correto deixar [Select_CString(employer.IsFemale, 'a boa', 'o bom' )] [employer.GetTitleAsNameNoTooltip|l] com tamanho fardo. Teremos de ajudar arrancando apenas umas #EMP algumas#! aves suculentas, talvez esfolando apenas uns #EMP cuantos#! animaizinhos…"
 laamp_base_contract_schemes.5041.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.5041.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.5041.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 laamp_base_contract_schemes.5041.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.5041.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"
 laamp_base_contract_schemes.5042.t: "$laamp_base_contract_schemes.5041.t$: Sucesso!"
 laamp_base_contract_schemes.5042.desc: "Ah, que caça emocionante em [employer.GetCapitalLocation.GetCounty.GetTitle.GetBaseNameNoTier]! Que os servidores [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] nos chamem de furtivos; tinham mais veados do que sabiam o que fazer com eles, e [ROOT.Char.GetFaith.WealthGodName] abomina o desperdício.\n\nPartimos daqui gordos e contentes, com a barriga cheia e os pulsos sem grilhões."
 laamp_base_contract_schemes.5042.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.5043.t: "$laamp_base_contract_schemes.5041.t$: Falha!"
 laamp_base_contract_schemes.5043.desc: "Malditos sejam os vira-latas [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l]!\n\nNão #EMP precisa#! de tantos animais e, no entanto, sua perseguição obstinada arruína uma caçada após outra e, para maior ignomínia, algema vários membros do meu bando.\n\nSei quando é hora de cortar as perdas. Quanto mais tempo ficarmos aqui, maior a chance de que a presa sejamos #EMP nosotros#! e não as malditas aves."
 laamp_base_contract_schemes.5043.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 laamp_base_contract_schemes.5051.t: "Assalto de Beco"
 laamp_base_contract_schemes.5051.desc: "Os avisos que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] que mandou pendurar são mais verdadeiros do que esperávamos: [employer.GetCapitalLocation.GetTitle.GetBaseNameNoTier] parece estar sofrendo uma enxurrada de pequenos crimes.\n\nAssim que chegamos à cidade, contamos uma dúzia de furtos de bolsos e um assalto descarado, trabalho demais para os atribulados moradores de [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l].\n\nUm ambiente absolutamente perfeito para que uns [ROOT.Char.Custom('GetLaampDescribeTypeSelfPlural')] empreendedores como nós possam ganhar umas poucas #EMP monedas#!."
 laamp_base_contract_schemes.5051.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 laamp_base_contract_schemes.5051.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 laamp_base_contract_schemes.5051.c: "$laamp_base_contract_schemes.0000.generic_option.secrecy$"
 laamp_base_contract_schemes.5051.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 laamp_base_contract_schemes.5052.t: "$laamp_base_contract_schemes.5051.t$: Sucesso!"
 laamp_base_contract_schemes.5052.desc: "Graças à absoluta incapacidade [employer.Custom('ES_DelDela')] [employer.GetTitledFirstName|l] para impor a ordem nas ruas da sua própria capital, [ROOT.Char.GetPrimaryTitle.GetDefinitiveName|l] é capaz de extorquir ainda mais a cidadania de [employer.GetCapitalLocation.GetTitle.GetBaseNameNoTier] para tirar deles tudo o que têm.\n\nTalvez não seja uma forma honrosa de ganhar a vida, mas lucrativa? Extremamente.\n\nAinda assim, a primeira lição para qualquer criminoso iniciante é saber quando parar. Com o dinheiro ganho, já está na hora de irmos embora; antes que [employer.Custom('ES_ElLa')] [employer.GetTitleAsNameNoTooltip|l] fique sabendo e venha atrás de nós."
 laamp_base_contract_schemes.5052.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 laamp_base_contract_schemes.5053.t: "$laamp_base_contract_schemes.5051.t$: Falha!"
 laamp_base_contract_schemes.5053.desc: "Apesar de nossas melhores intenções, parece que [employer.Custom('ES_ElLa')] [employer.GetTitledFirstName|l] resolve seus problemas com criminosos mesquinhos mais depressa do que [ROOT.Char.GetPrimaryTitle.GetDefinitiveName|l] em tirar proveito deles.\n\nQuando os guardas [employer.Custom('ES_DelDela')] [employer.GetTitleAsNameNoTooltip|l] inundam as ruas, nossa janela de oportunidade diminui apesar dos vários ganhos obtidos até agora, então sou forçado a me esgueirar com minha banda para fora de [employer.GetCapitalLocation.GetTitle.GetBaseNameNoTier] antes que a lei nos alcance.\n\nParece que não encontraremos mais nada para saquear aqui."
 laamp_base_contract_schemes.5053.a: "Bah, encontraremos presas mais ricas em outro lugar."
 protect_minority_vassal_contract_scheme_desc_success_boilerplate: "$laamp_contract_scheme_desc_success_boilerplate$ O suserano do [contractor|lE] terá de ceder e conceder privilégios de [vassal_contract|lE]."
 protect_minority_vassal_contract_scheme_desc_generic: "A minoria representada pelo [contractor|lE] busca direitos incontestáveis diante do preconceito."
 protect_minority_vassal_contract_diplomacy_scheme: "Diálogo Aberto"
 protect_minority_vassal_contract_diplomacy_scheme_action: "Conduzir um Diálogo Aberto com"
 protect_minority_vassal_contract_diplomacy_scheme_desc: "$protect_minority_vassal_contract_scheme_desc_generic$ Um diálogo cordial promoverá entendimento mútuo e nos guiará por estas questões espinhosíssimas.$laamp_contract_scheme_desc_general_boilerplate$"
 protect_minority_vassal_contract_diplomacy_scheme_desc_general: "$protect_minority_vassal_contract_diplomacy_scheme_desc$"
 protect_minority_vassal_contract_diplomacy_scheme_desc_success: "$protect_minority_vassal_contract_scheme_desc_success_boilerplate$"
 protect_minority_vassal_contract_martial_scheme: "Táticas de Intimidação"
 protect_minority_vassal_contract_martial_scheme_action: "Usar Táticas de Intimidação em"
 protect_minority_vassal_contract_martial_scheme_desc: "$protect_minority_vassal_contract_scheme_desc_generic$ Uma temível demonstração de força levará o suserano do meu [contractor|lE] a ceder às petições.$laamp_contract_scheme_desc_general_boilerplate$"
 protect_minority_vassal_contract_martial_scheme_desc_general: "$protect_minority_vassal_contract_martial_scheme_desc$"
 protect_minority_vassal_contract_martial_scheme_desc_success: "$protect_minority_vassal_contract_scheme_desc_success_boilerplate$"
 protect_minority_vassal_contract_intrigue_scheme: "Alavancagem de Informação"
 protect_minority_vassal_contract_intrigue_scheme_action: "Usar Alavancagem de Informação em"
 protect_minority_vassal_contract_intrigue_scheme_desc: "$protect_minority_vassal_contract_scheme_desc_generic$ Não são apenas os fracos que são vulneráveis: os poderosos #EMP sempre#! têm fraquezas que podem ser exploradas para o ganho de outros...$laamp_contract_scheme_desc_general_boilerplate$"
 protect_minority_vassal_contract_intrigue_scheme_desc_general: "$protect_minority_vassal_contract_intrigue_scheme_desc$"
 protect_minority_vassal_contract_intrigue_scheme_desc_success: "$protect_minority_vassal_contract_scheme_desc_success_boilerplate$"
 protect_minority_vassal_contract_learning_scheme: "Interpretação Legal"
 protect_minority_vassal_contract_learning_scheme_action: "Usar Interpretação Legal em"
 protect_minority_vassal_contract_learning_scheme_desc: "$protect_minority_vassal_contract_scheme_desc_generic$ Este [scheme|lE] procura precedentes legais que, quando invocados, podem proteger súditos oprimidos de senhores cruéis.$laamp_contract_scheme_desc_general_boilerplate$"
 protect_minority_vassal_contract_learning_scheme_desc_general: "$protect_minority_vassal_contract_learning_scheme_desc$"
