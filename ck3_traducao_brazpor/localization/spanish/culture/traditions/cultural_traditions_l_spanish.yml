 #BP2 Traditions
 tradition_noble_adoption_name: "Adoção Nobre"
 tradition_noble_adoption_desc: "Adotar crianças órfãs em casas nobres é comum nesta sociedade. O sangue da aliança é mais espesso que a água do útero."
 culture_parameter_allows_adoption: "Os [characters|El] desta [culture|lE] podem oferecer [Concept( 'adoption', 'adoptar')|E] [children|lE] que não estejam diretamente relacionados a nenhum [ruler|El]"
 culture_parameter_free_adoption: "Os [characters|El] desta [culture|El] podem [Concept( 'adoption', 'adoptar')|E] sem gastar [prestige|El] nem [dynasty_prestige|El]"
 culture_parameter_wider_adoption: "Os [characters|El] desta [culture|El] podem [adopt|El] [children|El] órfãos sem parentesco, e não perderão [opinion|El] por isso"
 traditionalist_discount_desc: "A [culture|El] foi direcionada ao tradicionalismo pelo seu [culture_head|El]"
 culture_parameter_more_hostage_acceptance: "Os [characters|lE] desta [culture|lE] estão mais dispostos a enviar, aceitar e devolver [hostages|lE]"
 culture_parameter_more_hostage_acceptance_for_vassals: "Os [characters|lE] desta [culture|lE] estão mais dispostos a enviar, aceitar e devolver [hostages|lE] com seu [liege|lE]"
 #EP3 Traditions
 tradition_ep3_indomitable_azatani_name: "Azatani Indomável"
 tradition_ep3_indomitable_azatani_desc: "Para os nobres ferozmente orgulhosos desta cultura, cavalgando trovejantemente de seus altos castelos, 'A ferida de uma adaga cicatriza, mas a de uma língua — nunca!'"
 culture_parameter_house_hostility_more_common: "Os [rulers|lE] agem com maior agressividade contra outras [houses|lE]"
 culture_parameter_vassals_more_likely_to_refuse_demands: "Os [characters|lE] são mais propensos a recusar [Concept( 'imprisonment', 'encarcelamientos' )|E], [retractions|lE] e [revocations|lE]"
 tradition_ep3_audacious_cadets_name: "Cadetes Audaciosos"
 tradition_ep3_audacious_cadets_desc: "Multidões inquietas de filhos mais novos definem esta cultura. Ousados e sem escrúpulos, esses cavaleiros buscam sonhos de aventuras distantes, de crueldades mercenárias e de conquistas gloriosas."
 culture_parameter_ambitious_trait_more_common: "O [trait|lE] [GetTrait('ambitious').GetName( GetNullCharacter )|l] é mais comum"
 culture_parameter_reduced_bodyguard_aptitude: "[aptitude|E] de [GetCourtPositionType('bodyguard_court_position').GetName()|l] reduzida"
 tradition_ep3_imperial_tagmata_name: "Tagmata Imperial"
 tradition_ep3_imperial_tagmata_desc: "Regimentos de elite bem armados formam a espinha dorsal das campanhas militares desta cultura. Suas tropas arrogantes têm pouca consideração pelos nobres guerreiros mesquinhos e atos imprudentes de valentia pessoal; em vez disso, honram a disciplina e os nomes sagrados de suas unidades. #EMP Exkoubitoi! Scholai! Hikanatoi!#!"
 domain_counties_with_stables_desc: "O [culture_head|lE] não possui #high 8#! [counties|lE] com $building_type_stables_01$ construídos em um de seus [holdings|lE]"
 tradition_ep3_roman_ceremonies_name: "Cerimônias Romanas"
 tradition_ep3_roman_ceremonies_desc: "Os imperadores do passado concederam a esta cultura uma grandeza duradoura, rituais espetaculares, uma admiração pelo ofício imperial... e uma vida pública rica em agitação."
 tradition_ep3_palace_politics_name: "Política do Palácio"
 tradition_ep3_palace_politics_desc: "Eunucos poderosos e bajuladores de seda ocupam um vasto aparato político, impressionando com finuras, elogiando com honras e tramando ferozmente em nome do avanço."
 culture_head_court_grandeur_desc: "O [culture_head|lE] não possui um [court_grandeur_level|lE] de #high 8#! ou superior"
 culture_parameter_unlock_akolouthos: "Pode nomear o [court_position|lE] de [GetCourtPositionType('akolouthos_court_position').GetName()|l] quando a Guarda Varangiana tiver sido fundada."
 tradition_tgp_bushido_name: "Bushido"
 tradition_tgp_bushido_desc: "Esta tradição, enraizada em um legado de honra e disciplina marcial, eleva o vínculo entre senhor e vassalo por meio de atos de homenagem e valor. A força de caráter e os atos de integridade forjam lealdade e respeito inabaláveis."
 culture_parameter_must_pledge_loyalty_to_liege: "Deve-se #v jurar lealtad#! imediatamente assim que a [decision|lE] estiver disponível"
 culture_parameter_better_petition_outcomes: "A [decision|lE] #v Petición#! gera melhores resultados"
 culture_parameter_opinion_from_prowess: "Bônus de [opinion|lE] por [prowess|lE]"
 culture_parameter_honorable_trait_bonuses: "Os [personality_traits|lE] diligente, humilde, corajoso e justo são melhores."
 culture_parameter_unlock_infantry_samurai_units: "Pode recrutar [GetMaA('samurai').GetName|l] como [men_at_arms|lE]"
 culture_parameter_stalwart_leader_non_admin_duels: "[single_combat_fight|E] de [GetPerk('stalwart_leader_perk').GetName(GetPlayer)] disponível contra qualquer [character|El] não [administrative|El] de gênero [martial|El] e de igual ou menor [rank|El]"
 culture_parameter_non_admin_close_family_non_martial_gender_knights_in_defensive_wars: "A [close_family|lE] solteira e de gênero não [martial|El] e [spouses|El] de [rulers|El] não [Concept('administrative', 'administrativos')|E] podem servir como $knight_culture_player_plural$ em [wars|El] defensivas"
 tradition_tgp_court_machinations_name: "Maquinações cortesãs"
 tradition_tgp_court_machinations_desc: "Entre os corredores labirínticos da corte, os eunucos exercem influência, os consortes disputam favores e sussurros de traição ecoam pelos salões dourados."
 tradition_tgp_art_of_war_name: "Arte da guerra"
 tradition_tgp_art_of_war_desc: "Esta cultura estuda teoria militar há mil anos, e seus generais e marechais têm à sua disposição uma vasta coleção de manuais e livros-texto militares. Essa riqueza de conhecimento só é ofuscada por uma grande compreensão técnica de como fabricar armaduras e armas fortes."
 duchies_with_examination_halls_desc: "A [culture|lE] não possui #high 5#! [duchies|lE] onde tenha construído um $building_type_examination_hall_01$ em uma de suas [holdings|lE]"
 culture_parameter_unlock_maa_tiefutu: "Pode recrutar [GetMaA('tiefutu').GetName|l] como [men_at_arms|lE]"
 culture_parameter_unlock_maa_black_armor_cavalry: "Pode recrutar [GetMaA('black_armor_cavalry').GetName|l] como [men_at_arms|El]"
