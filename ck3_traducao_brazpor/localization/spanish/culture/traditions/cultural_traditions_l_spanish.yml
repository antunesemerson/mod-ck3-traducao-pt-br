 culture_tradition_events.0002.t: "Lutar com [GetPlayer.Custom( 'KnightCultureNoTooltip' )]: Conclusão"
 culture_tradition_events.0002.desc: "Baixo a arma e me viro para [recipient.GetTitledFirstName|l], aplaudindo-a da maneira habitual. [recipient.GetSheHe|U] faz o mesmo.\n\n"
 culture_tradition_events.0002.desc_actor_victor_good: "«Muito bem lutado, meu [actor.GetTitleTierName|U]! Você me venceu de forma justa», diz [recipient.GetFirstNameNoTooltip].\n«Essa prática certamente nos será útil, caso haja guerra no futuro de [actor.GetPrimaryTitle.GetNameNoTierNoTooltip]».\n\nFoi revigorante, me sinto em forma e pronto[ROOT.Char.Custom('ES_OA')]!"
 culture_tradition_events.0002.desc_actor_victor_bad: "“Muito bem lutado, meu [actor.GetTitleTierName|U]! Fui completamente derrotad[recipient.Custom('ES_OA')]”, choraminga [recipient.GetFirstNameNoTooltip].\n“Mas lembrai-vos: não deixai que esta vitória suba à cabeça. Eu não sou vosso inimig[recipient.Custom('ES_OA')] inimig[recipient.Custom('ES_OA')], eles ainda estão por aí”.\n\nBah! Eu estou me sentindo ótimo!"
 culture_tradition_events.0002.desc_recipient_victor_good: "\"Bem lutado, meu [actor.GetTitleTierName|U], eu venço desta vez!\" [recipient.GetFirstNameNoTooltip] diz com um tom esportivo. \"Agora estamos prontos para enfrentar qualquer coisa!\"\n\nCertamente estamos, talvez eu deva considerar minha próxima conquista?"
 culture_tradition_events.0002.desc_recipient_victor_bad: ""Bem lutado, meu [actor.GetTitleTierName|U]. Sinto se lhe causei algum dano. Por um breve momento, entrei em transe — minha arma e eu éramos um[recipient.Custom('ES_OA')] só[recipient.Custom('ES_OA')]…" diz [recipient.GetFirstNameNoTooltip] desculpando-se.\n"Talvez você precise de um pouco de descanso?".\n\nBesteira, estou forte como um touro!"
 culture_tradition_events.0002.a: "Um bom combate!"
 culture_tradition_events.0002.b: "Eu posso ter perdido, mas foi um bom treinamento!"
