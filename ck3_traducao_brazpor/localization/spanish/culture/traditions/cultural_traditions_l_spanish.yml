 mpo_siberian_permafrost_modifier: "Permafrost Siberiano"
 mpo_siberian_permafrost_modifier_desc: "Um solo congelado por milênios, sem acesso à água subterrânea e com vegetação escassa. O terreno muda ano após ano devido aos repetidos congelamentos e descongelamentos. Para tornar estas terras suas, quem viver aqui precisará de séculos para se adaptar. Todos e tudo o mais perecerão e se juntarão aos antigos mortos sob o gelo.\n\n#weak Este modificador pode ser removido pelas [Concept('interaction', 'interacciones')|E] #V $feudalize_holding_interaction$#!, #V $demand_admin_interaction$#! ou após conquistar todo o norte com a [decision|El] #V $expand_the_steppe_decision_generic$#! para a #V región#! $dlc_mpo_steppe_siberia_further_expansion_tooltip$#!\n\n"
 mpo_siberian_permafrost_modifier_bad: "$mpo_siberian_permafrost_modifier$"
