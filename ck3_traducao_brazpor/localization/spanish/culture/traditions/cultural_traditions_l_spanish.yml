 culture_emergence_events.0001.t: "Intercâmbio Cultural"
 culture_emergence_events.0001.desc: "Sou da cultura [ROOT.Char.GetCulture.GetName], mas o povo da minha capital, [capital_county_scope.GetBaseName], é da cultura [hybdridization_offer_culture.GetName]. Ultimamente, tenho visto meus súditos [hybdridization_offer_culture.GetNameNoTooltip] imitando a mim e aos meus costumes [ROOT.Char.GetCulture.GetNameNoTooltip].\n\nNossas tradições estão se misturando. Umas são antigas, outras são novas — mas o mais importante é que estão mais dispostos a aceitar meu governo!\n\nTalvez devêssemos incentivar esse desenvolvimento?"
 culture_emergence_events.0001.a: "Se eles agem como eu, então eu agirei como eles. Logo seremos como um só."
 culture_emergence_events.0001.b: "A admiração deles é suficiente!"
 cultural_acceptance_gain_event: "A partir de Eventos"
 cultural_acceptance_loss_event: "Por eventos"
 new_hybrid_culture_tt: "Uma [hybrid_culture|lE] surgirá que compartilha uma combinação de [traditions|lE] e [culture_pillars|lE] tanto da [ROOT.Char.GetCulture.GetName] quanto da [hybdridization_offer_culture.GetName] [cultures|lE]."
 culture_emergence_events.0001.existing_hybrid: "Você e suas terras adotarão a [existing_hybrid_culture.GetName] [culture|lE]"
 culture_emergence_events.0001.new_hybrid: "Você e suas terras adotarão uma [hybrid_culture|lE] recém-surgida"
 culture_emergence_events.0002.t: "Uma Nova Identidade"
 culture_emergence_events.0002.desc: "Meu povo, os [ROOT.Char.GetCulture.GetCollectiveNoun] são um povo orgulhoso e espalhado.\n\nPor mais parecidos que sejamos, não posso negar que meus súditos começaram a agir de forma diferente dos [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] de outros lugares. Às vezes até há conflitos entre [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] de visita e aqueles sob meu governo.\n\nEstamos desenvolvendo uma nova identidade, somos [ROOT.Char.GetCulture.GetCollectiveNoun]… mas, ao mesmo tempo, não somos. Deveríamos incentivar essa evolução?"
 culture_emergence_events.0002.a: "Vamos construir uma identidade nova e mais forte!"
 culture_emergence_events.0002.b: "Somos [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] e nada mais! Alinhem-se!"
 new_divergent_culture_tt: "Uma [divergent_culture|lE] surgirá que compartilha a maioria das [traditions|lE] e [culture_pillars|lE] da [ROOT.Char.GetCulture.GetName] [culture|lE], mas com uma nova [ethos|lE] e algumas tradições substituídas."
 culture_emergence_events.0002.new_divergence: "Você e suas terras adotarão uma [divergent_culture|lE] recém-surgida"
 culture_emergence_events.vassals: "Os [vassals|lE] podem ou não participar"
 culture_emergence_events.0003.desc: "[culture_check_2.GetName]\n[duchy_title.GetName]\n[diverge_dummy.GetFullName]"
 culture_emergence_events.0005.t: "O romance reto-românico"
 culture_emergence_events.0005.desc: "Enquanto [county_scope.GetNameNoTierNoTooltip] celebra o surgimento da cultura [new_culture_scope.GetName], notei que alguns dos habitantes mais #italic rústicos#! destas terras ainda falam um dialeto que certamente não é o que eu pensava que fosse a cultura [new_culture_scope.GetNameNoTooltip].\n\nEncontro um[rustic_peasant.Custom('ES_XA')] camponês[rustic_peasant.Custom('ES_OA')] perto da estrada por onde passo. Ele está conversando com alguém nos campos. "Você aí!", trovejo. "Que diabos é essa língua que você fala?".\n\n[rustic_peasant.Custom('ES_ElLa')|U] [rustic_peasant.GetWomanMan] faz uma pausa. "Suponho que…", responde lentamente em [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip], "que nós apenas a chamamos de #italic romanche#!".\n\nEntão, "romanche", hein? É isso que meu povo realmente é?"
 culture_emergence_events.0005.a: "Nossas línguas devem ser tão romanches quanto nossos corações."
 culture_emergence_events.0005.a.tt: "A cultura [new_culture_scope.GetNameNoTooltip] usará #bold solo#! nomes romanche"
 culture_emergence_events.0005.b: "O romanche fará parte do mosaico da cultura [new_culture_scope.GetName]."
 culture_emergence_events.0005.b.tt: "A cultura [new_culture_scope.GetNameNoTooltip] usará nomes romanche #bold además#! dos nomes atuais"
 culture_emergence_events.0005.c: "Essa língua de camponeses não tem nenhum valor para a cultura [new_culture_scope.GetName]!"
 culture_emergence_events.0005.c.tt: "A cultura [new_culture_scope.GetNameNoTooltip] continuará como está"
