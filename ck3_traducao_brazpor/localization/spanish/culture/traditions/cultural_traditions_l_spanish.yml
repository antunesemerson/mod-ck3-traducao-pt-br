 tradition_mpo_northern_tribes_name: "Tribos do Norte"
 tradition_mpo_northern_tribes_desc: "Esta é uma das culturas conhecidas em geral como os 'Povos da Floresta' por seus vizinhos do sul. Esses nortistas são em alguns lugares caçadores respeitáveis, em outros exímios pescadores de rio, às vezes fundidores de ferro e frequentemente pastores."
 culture_parameter_unlock_maa_maturkan_warriors: "Pode recrutar [GetMaA('maturkan_warriors').GetName|l] como [men_at_arms|lE]"
 tradition_devoted_horsemanship_name: "Equitação Devotada"
 tradition_devoted_horsemanship_desc: "Nem mesmo os confortos palacianos conseguem manter o povo desta cultura longe da sela. Onde quer que se encontrem, seus rebanhos também estão lá, e os cavalos são cuidados com olhar atento."
