 tradition_mpo_iron_cavalry_name: "Cavalaria de Ferro"
 tradition_mpo_iron_cavalry_desc: "Mesmo povos cavaleiros podem ser vencidos por cavalaria revestida da cabeça aos cascos em placas de lamelar. Esta cultura não apenas desenvolveu o gosto por tal armamento caro, mas emprega aqueles nascidos na sela — arco em mãos — como seus cavaleiros pesadamente armadurados."
