 tradition_tgp_mountain_island_name: "Yashima"
 tradition_tgp_mountain_island_desc: "As montanhas e florestas das muitas ilhas do arquipélago japonês se erguem e descem ao longo do oceano, e seus habitantes são bem versados em atravessar suas paisagens escarpadas e diversas."
 tradition_tgp_japanese_houses_name: "Pragmatismo dinástico"
 tradition_tgp_japanese_houses_desc: "Embora as normas do casamento sejam importantes para se manter as aparências e por conveniência legal, o prazer é um dom natural concedido pelos deuses e vital para a boa saúde, independentemente das implicações para a linhagem."
 culture_parameter_adultery_always_accepted: "Os personagens com os [traits|lE] [GetTrait('adulterer').GetName( GetNullCharacter )] e [GetTrait('fornicator').GetName( GetNullCharacter )] são totalmente aceitos"
