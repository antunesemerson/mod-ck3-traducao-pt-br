 tradition_mpo_wolves_of_the_deep_steppe_name: "Lobos da Estepe Profunda"
 tradition_mpo_wolves_of_the_deep_steppe_desc: "Longe do toque dos confortos 'civilizados', homens vivem do que podem tomar, e sonham com a morte nas costas de seus cavalos. Povos mais fracos são empurrados diante desses guerreiros."
