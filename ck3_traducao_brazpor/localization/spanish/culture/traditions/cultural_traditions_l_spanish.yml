 tradition_tgp_ephemeral_grace_name: "Graça efêmera"
 tradition_tgp_ephemeral_grace_desc: "A filosofia estética de #EMP Mono no aware#! celebra a beleza transitória dos momentos fugazes. Ela promove uma profunda harmonia com a natureza e uma apreciação reflexiva da arte e da impermanência da vida."
 culture_parameter_stress_loss_bonus_from_harmonious_traits: "Aumenta a redução de [stress|lE] por [traits|lE] [GetTrait('temperate').GetName( GetNullCharacter )], [GetTrait('calm').GetName( GetNullCharacter )], [GetTrait('patient').GetName( GetNullCharacter )] e [GetTrait('compassionate').GetName( GetNullCharacter )]"
 tradition_tgp_imperial_peace_name: "Paz frágil"
 tradition_tgp_imperial_peace_desc: "Embora em grande parte protegidos das invasões pelo mar, defender-se contra ataques do norte e manter a paz de Kanmu contra pretendentes ou governadores ambiciosos ainda exige guerreiros habilidosos e organização."
 culture_parameter_unlock_mounted_samurai_units: "Pode recrutar [GetMaA('japanese_horse_archers').GetName|l] como [men_at_arms|lE]"
 tradition_tgp_rice_cultivators_name: "Cultivadores de arroz"
 tradition_tgp_rice_cultivators_desc: "O arroz é a força vital desta cultura. Por meio de trabalho diligente e conhecimento agrícola, suas colheitas são farta enquanto controlarem terras adequadas para sua plantação. Como resultado, sua prosperidade econômica e poderio militar se elevam muito acima de seus vizinhos menos avançados."
 tradition_tgp_inward_perfection_name: "Perfeição interior"
 tradition_tgp_inward_perfection_desc: "Esta cultura favorece a autossuficiência e o enriquecimento das virtudes interiores em vez da influência estrangeira. Os vínculos diplomáticos podem murchar, mas o conhecimento e a introspecção florescem em um isolamento tranquilo."
 tradition_tgp_fortified_strongholds_name: "Bastiões fortificados"
 tradition_tgp_fortified_strongholds_desc: "Esta cultura se caracteriza por grandes cidades fortificadas que desempenham funções religiosas, militares e governamentais. A proteção desses bastiões culturais é vital, e a fundação de novas cidades é uma questão de grande prestígio."
 culture_parameter_founding_temple_citadels_gives_more_piety: "Fundar [holdings|lE] de [temple_citadel|lE] concede #P +100 %#! de [piety|El]"
