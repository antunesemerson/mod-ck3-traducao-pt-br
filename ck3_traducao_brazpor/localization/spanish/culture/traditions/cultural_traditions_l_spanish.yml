 tradition_tgp_esoteric_power_name: "Poder esotérico"
 tradition_tgp_esoteric_power_desc: "Divina e misteriosa são as duas palavras que descrevem a nobreza aos olhos desta cultura. Os governantes que desejam assegurar seu mandato precisam participar de rituais elaborados e manifestar seu poder por meio da exibição de artefatos divinos."
 culture_parameter_increases_effect_of_mandala_realm_contracts: "Aumenta o ganho de [piety|lE] e [legitimacy|lE] dos [mandala_rituals|lE]"
 culture_parameter_may_commission_kris: "Pode usar a [decision|lE] [GetDecisionWithKey('commission_artifact_decision').GetName] para encomendar [artifacts|lE] do tipo kris"
