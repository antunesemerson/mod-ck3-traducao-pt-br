 tradition_ep3_cultivated_sophistication_name: "Sofisticação Cultivada"
 tradition_ep3_cultivated_sophistication_desc: "Os bárbaros olham com inveja para as resplandecentes luxúrias desta cultura, a sofisticação de sua sociedade. Impulsionada por um senso de primazia, esta cultura rejeita quaisquer contradições que estejam fora de sua esfera cosmopolita de influência."
