 culture_parameter_kris_artifacts_are_more_powerful: "Os [artifacts|El] tipo $artifact_dagger$ kris recebem benefícios extras"
 tradition_tgp_barangay_confederations_name: "Confederações barangay"
 tradition_tgp_barangay_confederations_desc: "Os governantes desta cultura governam muitas cidades-estado díspares espalhadas ao longo de estuários fluviais e da costa. Esses estados variam enormemente em tamanho, mas tendem a se unir em confederações, lideradas por um chefe escolhido entre os [Glossary( 'datos', 'DATU_GLOSS' )] de seus membros."
 DATU_GLOSS: "Um título que designa os chefes das diferentes entidades políticas encontradas nas Filipinas."
 culture_parameter_religious_relations_is_empowered: "A obtenção de [piety|El] por [religious_relations|El] aumenta em #P +20 %#!"
 culture_parameter_forming_confederations_is_easier: "Formar uma [confederation|lE] já não requer um vizinho poderoso nem os [traits|lE] [GetTrait('diplomat').GetName(GetNullCharacter)] ou [GetTrait('family_first').GetName(GetNullCharacter)]"
