 tradition_tgp_religious_hospitality_name: "Hospitalidade religiosa"
 tradition_tgp_religious_hospitality_desc: "Esta cultura é hábil em integrar religiões estrangeiras com seus costumes, levando a uma sociedade mais cosmopolita, com muitas fés convivendo em paz entre si. Muito disso é alcançado por meio do comércio e das relações internacionais."
