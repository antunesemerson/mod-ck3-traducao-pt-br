 culture_tradition_events.0100.t: "Um Conflito entre Cultura e Fé"
 culture_tradition_events.0100.desc: "Chegou uma carta de [head_of_faith.GetTitledFirstName|l]. Ela começa com cumprimentos e ressalta a importância que tenho aos olhos do povo de [culture_scope.GetName].\n\n"
 culture_tradition_events.0100.tradition_monogamous: ""Você deve entender que, enquanto o seu povo praticar a monogamia, estará violando a doutrina [faith_scope.GetAdjective]! Só desejo a sua salvação. O dever de todo bom [faith_scope.GetAdherentNameNoTooltip] não pode ser cumprido com apenas um cônjuge", diz a missiva."
 culture_tradition_events.0100.tradition_polygamous: "\"Sua prática da poligamia está em estrita oposição à doutrina [faith_scope.GetAdjective] e é um pecado aos olhos de [faith_scope.HighGodName]! Só desejo sua salvação. Por favor, guie seu povo para a luz e abandone os excessos de cônjuges!\" lê-se na mensagem."
 culture_tradition_events.0100.tradition_concubines: "\"Sua prática do concubinato não é apoiada pela doutrina [faith_scope.GetAdjective], apenas através do casamento adequado [faith_scope.HighGodName] sorrirá para seu povo! Só desejo sua salvação. Abandone suas concubinas, pelo bem de todos nós.\" lê-se na mensagem."
 culture_tradition_events.0100.end: "\n\nUm dilema, de fato... O que valorizo mais? Os costumes do meu povo ou as doutrinas de nossa fé?"
 culture_tradition_events.0100.a: "Devemos manter a doutrina [faith_scope.GetAdjectiveNoTooltip]."
 culture_tradition_events.0100.b: "Os costumes do meu povo são mais importantes!"
 culture_tradition_events.0101.t: "A Mente de um Místico"
 culture_tradition_events.0101.desc: "É raro o bastante para mim ter a chance de uma refeição tranquila sem bajuladores ou assuntos de Estado interrompendo, mas esta noite consegui. Um jantar agradável e calmo, e uma chance de descansar meus músculos sociais.\n\nEm questão de segundos, a porta sai dos gonzos com uma inevitabilidade trágica, e um[mendicant_mystic.Custom('ES_XA')] [mendicant_mystic.GetFaith.PriestNeuter] irrompe na sala. Ele carrega um cajado retorcido, ainda coberto de farpas por derrubar a porta com um único golpe.\n\n"Nobre [ROOT.Char.GetTitleAsNameNoTooltip], venho com uma oferta! Por um pequeno estipêndio, eu, #EMP [mendicant_mystic.GetFirstName]#!, compartilharei o conhecimento dos antigos costumes do nosso povo com as crianças da sua corte"."
 culture_tradition_events.0101.a: "Claro, nobre [mendicant_mystic.GetFaith.PriestNeuter]. Por favor, largue o bastão de bater."
 culture_tradition_events.0101.a.tt: "Todas as [children|lE] disponíveis na [court|lE] recebem um impulso em sua [education|lE] contínua"
 culture_tradition_events.0101.b: "Não é um pouco demais para a obra [mendicant_mystic.GetFaith.HighGodNamePossessive]?"
 culture_tradition_events.0101.b.tt.success: "Você convence o místico[mendicant_mystic.Custom('ES_OA')]"
 culture_tradition_events.0101.b.tt.failure: "Tal místico[mendicant_mystic.Custom('ES_OA')] abandona sua corte, enojad[mendicant_mystic.Custom('ES_OA')]"
 culture_tradition_events.0101.c: "Sai daqui, mendig[mendicant_mystic.Custom('ES_OA')], que estou tentando jantar!"
 culture_tradition_events.0111.t: "Discurso de um Místico"
 culture_tradition_events.0111.desc: ""… é o motivo pelo qual devemos nos submeter à beneficência de [mendicant_mystic.GetFaith.HighGodName] em cada momento de cada dia de nossas vidas. Vêem? Continuo?".\n\nDois-horas-inteiras.\n\nNem sequer sei como [mendicant_mystic.GetName] conseguiu chegar aos meus aposentos, mas tal [mendicant_mystic.GetFaith.PriestNeuter] tem me sermoneado sobre os pontos mais delicados da teologia [mendicant_mystic.GetFaith.GetAdjective] durante #EMP dos-horas-enteras.#!\n\nPor fim, ele se cala e me olha em busca de uma resposta. Sinto um tique no olho."
 culture_tradition_events.0111.a: "Palavras tão inspiradoras!"
 culture_tradition_events.0111.b: "Você já disse o que tinha a dizer, agora deixe-me dizer o meu..."
 culture_tradition_events.0111.a.tt.success: "Você desmonta os argumentos [mendicant_mystic.Custom('ES_DelDela')] místico[mendicant_mystic.Custom('ES_OA')]"
 culture_tradition_events.0111.a.tt.failure: "Você tropeça nas suas palavras"
 culture_tradition_events.0111.c: "Quem deixou esse vagabundo entrar na minha casa? Guardas! SOCORRO!"
 culture_tradition_events.0121.t: "O Serviço de um Místico"
 culture_tradition_events.0121.desc: "De forma quase incomum para sua profissão, [mendicant_mystic.GetFirstName] esperou pacientemente em uma antecâmara até que eu pudesse lhe conceder uma audiência.\n\nO [mendicant_mystic.GetFaith.PriestNeuter] parece nervoso[mendicant_mystic.Custom('ES_OA')] quando entro, mas ainda assim se lança em um discurso apressado assim que chego.\n\n«[ROOT.Char.Custom('FormOfAddressForLiege')|U], faz tempo que sou mendicante, e embora seja a obra de [mendicant_mystic.GetFaith.HighGodNamePossessive] , é tão extenuante para a mente e o corpo quanto nutritiva para a alma».\n\n«Se me acolherem, pendurarei meu bastão de andarilho[mendicant_mystic.Custom('ES_OA')] e os servirei na corte da melhor forma que eu puder. V-vocês me acolhem?»."
 culture_tradition_events.0121.a: "É claro que eu poderia usar um[mendicant_mystic.Custom('ES_XA')] [mendicant_mystic.GetWomanMan] de seus talentos…"
 culture_tradition_events.0121.b: "Um [mendicant_mystic.Custom('ES_XA')] [mendicant_mystic.GetFaith.PriestNeuter] leal, dizeis…"
 culture_tradition_events.0121.c: "Com essa aparência, #EMP esse cheiro#!, e você quer morar aqui?"
 culture_tradition_events.0131.t: "A Ira de um Místico"
 #Big credit to the greatest NPC of 2011.
 culture_tradition_events.0131.desc: "«¿[ROOT.Char.GetTitleAsNameNoTooltip]? Você é pouco mais que um verme #EMP retorciéndose en la inmundicia#! de sua própria corrupção! Arrependa-se de seus pecados sob o olhar de [mendicant_mystic.GetFaith.HighGodName]! [mendicant_mystic.GetFaith.HighGodName] o Poderoso! [mendicant_mystic.GetFaith.HighGodName] o Infalível! [mendicant_mystic.GetFaith.HighGodName] o Inexpugnável!»\n\nMaldito seja esse [mendicant_mystic.Custom('ES_EA')] irritante [mendicant_mystic.GetFaith.PriestNeuter]. Já era ruim tê-[mendicant_mystic.Custom('ES_LoLa')] em uma esquina da rua. Se um dia #EMP un día#! descobrir quem deixou [mendicant_mystic.GetFirstName] entrar na minha #EMP casa#!, vou arrancar seus olhos. Ele está aqui há menos de dez minutos e eu já estou com uma enxaqueca horrível.\n\nNão aguento muito mais a diatribe [mendicant_mystic.Custom('ES_DelDela')] mendig[mendicant_mystic.Custom('ES_OA')]a, tenho que agir rapidamente enquanto houver uma pausa natural na sua diatribe."
 culture_tradition_events.0131.a: "#EMP Meus#! pecados? Vamos falar sobre #EMP você#!."
 culture_tradition_events.0131.a.tt.success: "Você prova que tal místico[mendicant_mystic.Custom('ES_OA')] é um[mendicant_mystic.Custom('ES_XA')] hipócrita completo"
 culture_tradition_events.0131.a.tt.failure: "Tal místic[mendicant_mystic.Custom('ES_OA')] demonstra que você é um[ROOT.Char.Custom('ES_XA')] tolo[ROOT.Char.Custom('ES_OA')]"
 culture_tradition_events.0131.b: "Você... você vai me ensinar a ser melhor?"
 culture_tradition_events.0131.b.tt.success: "O místic[mendicant_mystic.Custom('ES_OA')] te ajuda a superar suas falhas"
 culture_tradition_events.0131.b.tt.failure: "Você é dominad por angústia mental"
 culture_tradition_events.0131.c: "#EMP Retorcendo-me na imundície?#! Joguem est[mendicant_mystic.Custom('ES_EA')] lunátic[mendicant_mystic.Custom('ES_OA')] no poço negro mais próximo!"
 culture_tradition_events.0141.t: "Um Pacto d Místic"
 culture_tradition_events.0141.desc: ""Não vedes, [ROOT.Char.Custom('FormOfAddressForLiege')], como arriscais a vossa alma com esta… tolice do [ROOT.Char.GetFaith.GetName]? Permiti que eu vos leve à luz da verdadeira fé [mendicant_mystic.GetFaith.GetAdjective] e vos salve do sofrimento eterno!".\n\nComo [mendicant_mystic.GetFaith.PriestNeuter] mendicante, [mendicant_mystic.GetFirstName] está acostumad[mendicant_mystic.Custom('ES_OA')] a pregar ao povo [ROOT.Char.GetCulture.GetName] não crente, mas as técnicas que funcionam entre os camponeses não necessariamente se aplicam à nobreza.\n\nO silêncio cai entre nós e me vejo fitando profundamente os olhos de est[mendicant_mystic.Custom('ES_EA')] [mendicant_mystic.GetWomanMan], observando as luzes de esperança e fome dançarem e oscilarem atrás deles."
 culture_tradition_events.0141.a: "Acho suas palavras persuasivas, [mendicant_mystic.GetFaith.PriestNeuter]."
 culture_tradition_events.0141.b: "Permita-me elucidar os méritos das crenças de [ROOT.Char.GetFaith.GetNameNoTooltip]..."
 culture_tradition_events.0141.b.tt.success: "Você ilumina  [mendicant_mystic.GetFirstNameNoTooltip]"
 culture_tradition_events.0141.b.tt.failure: "Vocês permanecem em desacordo"
 culture_tradition_events.0141.c: "Seu [mendicant_mystic.GetFaith.HighGodName]! Quantas levas ele tem?"
