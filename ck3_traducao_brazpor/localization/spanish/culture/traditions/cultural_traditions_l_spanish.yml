 tradition_strong_kinship_name: "Parentesco Forte"
 tradition_strong_kinship_desc: "Esta cultura tem uma forte tradição de parentesco dentro da família extensa ou clã. Em tempos de necessidade, um governante sempre poderá contar com seus parentes."
 tradition_amharic_highlanders_name: "Montanheses Amáricos"
 tradition_amharic_highlanders_desc: "As terras altas amáricas são bastante adequadas para a agricultura, desde que se saiba como abordar melhor o assunto. Por várias gerações, esse povo tem trabalhado e vivido nesse ambiente, prosperando enquanto desenvolve suas próprias tradições e costumes."
