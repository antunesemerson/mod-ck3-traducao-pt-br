 tradition_maritime_way_of_life_name: "Modo de vida marítimo"
 tradition_maritime_way_of_life_desc: "Desde tempos imemoriais, os catamarãs com flutuadores desta cultura têm sido avistados no horizonte. Longas viagens marítimas são algo natural para este povo.\nPara alguém que considera a vida no mar algo natural, não há limites para onde podem se estabelecer, com quem podem comerciar ou a quem podem saquear."
 tradition_nudists_name: "Nudistas"
 tradition_nudists_desc: "Os adeptos desta cultura não acreditam em proteger o corpo dos elementos; em vez disso, optam por viver como seu criador os fez."
 tradition_stratified_society_name: "Sociedade estratificada"
 tradition_stratified_society_desc: "Há quem nasça para liderar, e há quem nasça para servir. Em uma $tradition_stratified_society_name$ , a realidade do privilégio hereditário muitas vezes se sobrepõe aos princípios da meritocracia, e a proximidade com o poder é tudo."
 culture_parameter_family_shares_merit: "Ao alcançar o [GetModifier( 'merit_level_5' ).GetNameWithTooltip|L] @merit_level_5_icon! de [merit|lE]， todo [close_family_member|El] do gênero preferido abaixo deste nível ganhará um [merit|lE] considerável"
 culture_parameter_family_skips_exams: "Além disso, esses [Concept('close_family_members', 'familiares')|E] serão tratados como tendo sido aprovados no [GetActivityType( 'activity_local_examination' ).GetName|l] @provincial_exam_icon!"
 culture_parameter_marrying_into_the_ruling_family_gives_influence: "Quando um [independent_ruler|El] se casa com um [character|lE] do mesmo [realm|lE] e compartilha esta [tradition|lE], o [house_head|lE] de seu [spouse|lE] ganhará uma [influence|lE] imensa"
 culture_parameter_unlocks_gakgung_archers_maa: "Pode recrutar [GetMaA('gakgung_archers').GetName|l] como [men_at_arms|lE]"
 tradition_stratified_society_toast_title: "Ascendente [ROOT.Char.GetHouse.GetNameNoTooltip]"
 tradition_stratified_society_toast_desc: "Como privilégio do seu distinto posto, seus parentes próximos ganharam [merit|lE] e não precisam fazer o [GetActivityType( 'activity_local_examination' ).GetName|l] @provincial_exam_icon!"
 tradition_stratified_society_family_member_toast_title: "$tradition_stratified_society_toast_title$"
 tradition_stratified_society_family_member_toast_desc: "Graças aos feitos de [family_success.GetName] você obteve [merit|lE] e não precisa fazer o [GetActivityType( 'activity_local_examination' ).GetName|l] @provincial_exam_icon!"
 tgp_nepotism_bypass_exams_modifier: "Exceção aos exames"
 tgp_nepotism_bypass_exams_modifier_desc: "Este personagem evitou os exames típicos necessários para se tornar um funcionário graças à influência de um parente próximo."
 tradition_fortress_mastery_name: "Maestria das fortalezas"
 tradition_fortress_mastery_desc: "Esta cultura tem uma longa tradição de engenhosidade defensiva, usando o terreno local para proteger sua terra natal e repelir possíveis invasores. Ela combina essa habilidade com maestria no arco e tropas ágeis, capazes de superar em manobras qualquer inimigo."
 culture_parameter_governor_trait_gives_counter_resistance: "Todo grau do [trait|El] de [GetTrait('governor').GetName( GetPlayer )|l] concede [EmptyScope.ScriptValue('governor_trait_counter_bonus_value')|+%0] $MOD_COMBAT_COUNTER_RESISTANCE|V$"
 tenet_takamin_name: "Takamin"
 tenet_takamin_desc: "Acredita-se que os ursos sejam manifestações dos deuses, portanto a sacralidade desses animais deve ser respeitada, e a morte de um durante caçadas deve ser feita com o máximo respeito."
 doctrine_parameter_allows_bear_sacrifice: "Desbloqueia a [decision|lE] [GetDecision('sacrifice_bear_decision').GetName]"
 doctrine_parameter_chance_to_gain_prowess_during_bear_hunts: "Matar um #V oso#! durante uma [GetActivityType('activity_hunt').GetName|l] concede [prowess|lE] [prowess_i] e [Concept('martial', 'marcialidad')|E] [martial_i]"
 doctrine_parameter_frequent_bear_sightings: "Haverá [hunt_sightings|lE] de #V osos#! periodicamente"
 doctrine_parameter_efficient_hunt_cornering: "Durante as [GetActivityType('activity_hunt').GetName|l]s, o método #V Encurralar#! tem mais probabilidades de sucesso"
 culture_tradition_events.3000.t: "Avistamento de ursos"
 culture_tradition_events.3000.desc: "Os caçadores de [bear_sighting.GetName|l] avistaram uma [bear_sighting_county.Custom('GetAnimalGroup')] de [bear_sighting_county.Custom('GetAnimalPlural')] vagando pelas [bear_sighting.Custom('GetTerrainTypePlural')]: grandes pegadas na lama, árvores marcadas por garras, arbustos quebrados.\n\nSe eu saísse de [GetActivityType('activity_hunt').GetName|l] e matasse ou capturasse um exemplar, os espíritos certamente notariam."
 culture_tradition_events.3000.a: "Devo preparar minha lança…"
 bear_sacrifice_war_modifier: "Sacrifício de urso para a guerra"
 bear_sacrifice_war_modifier_desc: "Este personagem sacrificou um urso e acredita que foi abençoado com sucesso na guerra."
 bear_sacrifice_authority_modifier: "Sacrifício de urso para a autoridade"
 bear_sacrifice_authority_modifier_desc: "Este personagem sacrificou um urso e acredita que foi abençoado com uma presença autoritária."
 sacrifice_bear_decision_effect: "Escolha uma opção entre [piety|lE] [piety_i], [GetModifier('bear_sacrifice_war_modifier').GetNameWithTooltip] ou [GetModifier('bear_sacrifice_authority_modifier').GetNameWithTooltip]"
 culture_tradition_events.3100.t: "Sacrifício de Urso"
 culture_tradition_events.3100.desc: "Amarramos o grande urso em silêncio. Os caçadores cantam em voz baixa, firmes, a fumaça sobe com aroma de abeto.\n\nAjoelho-me, encosto a testa ao seu focinho e sussurro meu agradecimento antes que a lâmina caia. Compartilharemos sua carne para que sua força viva entre nós."
 culture_tradition_events.3100.a: "Vamos festejar!"
 culture_tradition_events.3100.b: "Nossos inimigos cairão!"
 culture_tradition_events.3100.c: "Obedeçam, pois o espírito do urso está ao meu lado."
 tradition_ordo_riders_name: "Cavaleiros de ordo"
 tradition_ordo_riders_desc: "A demanda por rebanhos e a necessidade de fortalecer a unidade da tribo forçaram muitos dos integrantes da horda desta cultura a se tornarem guerreiros endurecidos, capazes de repelir ataques e também de reunir suprimentos com eficiência para seu povo."
 culture_parameter_unlocks_ordo_riders_maa: "Pode recrutar [GetMaA('ordo_riders_horse_archers').GetName|l] como [men_at_arms|lE]"
 culture_parameter_reaver_gives_buffs_to_horse_archers: "Os [traits|lE] de [GetTrait('reaver').GetName( GetNullCharacter )|l] concederão bônus aos [men_at_arms|lE] de [archer_cavalry|lE]"
 tradition_chinese_arts_name: "Artes chinesas"
 tradition_chinese_arts_desc: "O caminho da pena, o caminho do pincel, são todos elementos importantes para esta cultura. Em vez de depender apenas do poder militar ou de uma administração complexa, os chineses dão ênfase a aperfeiçoar qualquer forma de arte."
 culture_parameter_commissions_cheaper: "A [decision|lE] #bold $commission_artifact_decision$#! custará #P 50 %#! menos de [gold|lE] [gold_i]"
 culture_parameter_scholars_and_poets_are_viewed_more_positively: "Os [traits|lE] [GetTrait('lifestyle_poet').GetName( GetNullCharacter )] e [GetTrait('scholar').GetName( GetNullCharacter )] são vistos de forma positiva"
 tradition_sinophilic_name: "Sinofílico"
 tradition_sinophilic_desc: "A influência da hegemonia chinesa sobre este reino levou muitas de suas pessoas a adotarem seus costumes."
 culture_parameter_can_adopt_chinese_culture: "Pode adotar a [culture|lE] [GetCultureByKey('han').GetCollectiveNoun]"
 culture_parameter_more_successful_kowtows: "As [tribute_missions|lE] terão maior probabilidade de sucesso"
 culture_parameter_may_adopt_silk_road_innovations: "Pode acessar as [silk_road_innovations|E] que conheça a [culture|lE] [GetCultureByKey('han').GetCollectiveNoun]"
 tradition_tgp_warrior_monks_name: "Monjes guerreiros"
 tradition_tgp_warrior_monks_desc: "A dedicação a uma vida moral não deve excluir o uso da força, especialmente quando há necessidade de proteger a comunidade religiosa contra seitas rivais e funcionários corruptos, ou de defender os necessitados."
 culture_parameter_unlock_warrior_monk_units: "Pode recrutar [GetMaA('warrior_monks').GetName|l] como [men_at_arms|lE]"
 tradition_scholar_officials_name: "Oficiais eruditos"
 tradition_scholar_officials_desc: "A pena e o pincel são mais poderosos do que a espada… Esta cultura acredita firmemente em um ideal no qual a influência é concedida a oficiais leais educados nas artes nobres."
 culture_parameter_can_always_convert_to_confucianism: "Pode-se usar a [decision|lE] [GetDecisionWithKey('convert_to_confucianism').GetName]"
 culture_parameter_can_always_convert_to_taoism: "Pode usar a [decision|lE] [GetDecisionWithKey('convert_to_taoism').GetName]"
 culture_parameter_can_author_books: "Pode tomar a [decision|lE] #V $author_book_decision$#!"
 culture_parameter_scholar_official_trait_bonuses: "Os [traits|lE] [GetTrait('confucian_education').GetName( GetNullCharacter )] e [GetTrait('loyal').GetName( GetNullCharacter )] têm bonificações extras"
 culture_parameter_wants_to_learn_chinese: "Personagens desta [culture|lE] frequentemente aprenderão o [language|lE] chinês"
 culture_parameter_learn_language_success_chance_for_others: "[scheme_success_chance|E] de [GetScheme('learn_language').GetTypeName]: #P +50 %#! ao aprender o [language|lE] desta cultura"
 culture_parameter_mystic_trait_from_education: "As crianças podem ganhar o [trait|lE] [GetTrait('lifestyle_mystic').GetName( GetNullCharacter )] se tiverem um [guardian|lE] desta [culture|lE] com #V +12#! de [learning|E] [learning_i]"
 tradition_cultivation_name: "Cultivo"
 tradition_cultivation_desc: "Afinar o corpo, a respiração e a mente até que a lama do coração assente e a virtude interior emerja como água límpida."
 tradition_intensive_farming_name: "Agricultura intensiva"
 tradition_intensive_farming_desc: "Esta cultura valoriza muito uma grande classe de agricultores que sustenta sua população não agrária. Ao longo de milênios de experiência, eles conseguiram aumentar enormemente a produção de trigo e arroz, dependendo do que se encaixa melhor nas circunstâncias locais."
 #ACH
 oath_mend_the_fracture_tradition_name: "Legado da conciliação juramentada"
 oath_mend_the_fracture_tradition_desc: "Da raiva e da desconfiança sanguinária, surgiu a conciliação. Guiada por seu soberano juramentado, esta cultura reparou a ruptura entre si e os outros povos do reino, alcançando paz e prosperidade."
 culture_parameter_synergy_cultures_counties_development: "A cada três anos, os [counties|lE] desta [culture|lE] podem ganhar o [modifier|lE] [GetModifier('oath_mend_the_fracture_county').GetNameWithTooltip]"
 culture_parameter_synergy_cultures_maa_spawn: "A cada três anos, o [culture_head|lE] pode ganhar [soldiers|lE] especiais adicionais."
 culture_parameter_synergy_cultures_opinion_gain: "A cada três anos, o [culture_head|lE] pode ganhar uma [opinion|lE] com o [culture_head|lE] da [culture|lE] conciliada."
 culture_parameter_synergy_cultures_positive_chance_desc: "A chance e a força dos efeitos acima são influenciadas pela [cultural_acceptance|lE] entre as [cultures|lE] conciliadas e pela [opinion|lE] entre os outros [Concept('cultural_head', 'líderes culturales')|E]"
 ach_culture_synergy_troops: "Tropas juramentadas"
