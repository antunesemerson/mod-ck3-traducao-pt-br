 tradition_cultural_primacy_name: "Primazia cultural"
 tradition_cultural_primacy_desc: "Esta orgulhosa cultura se contenta em olhar para sua própria rica história e vida social, e sente pouca necessidade de se rebaixar ao se misturar com seus vizinhos."
