 not_a_defense_focused_culture: "Menos de #N 50 %#! dos [counties|El] desta [culture|El] são costeiros"
 tradition_tgp_hydraulic_builders_name: "Construtores hidráulicos"
 tradition_tgp_hydraulic_builders_desc: "Esta cultura dá grande importância ao uso de obras hidráulicas de maneira espiritual. No centro dessa fascinação está o [GetBuilding('sacred_pool_06').GetName|l], que costuma ser ampliado em grandes reservatórios com a máxima importância religiosa."
 culture_parameter_sacred_pool_additional_bonuses: "A linha de [buildings|El] [GetBuilding('sacred_pool_01').GetTypeName|V] dará bônus adicionais em [counties|El] desta [culture|El]"
