l_spanish:
 #Ethoses
 ethos_bellicose_name: "Belicoso"
 ethos_bellicose_desc: "Esta cultura considera o conflito e a violência como estados necessários da existência; incutida em seu povo está a ideia de que se deve defender e lutar por si mesmo."
 ethos_stoic_name: "Estóico"
 ethos_stoic_desc: "Esta cultura acredita em manter-se forte como uma montanha, enfrentando todas as dificuldades que a vida possa lançar sobre eles e suportando todas com determinação e espírito indomável."
 ethos_bureaucratic_name: "Burocrático"
 ethos_bureaucratic_desc: "Nenhuma cultura dura mais do que o seu registro mais antigo, e esta cultura acredita em uma contabilidade tão meticulosa a ponto de garantir a imortalidade."
 ethos_spiritual_name: "Espiritual"
 ethos_spiritual_desc: "Enquanto algumas culturas recorrem à guerra e outras ao conhecimento mundano, esta cultura deposita sua confiança na única constante ao longo de sua história - o divino. A espiritualidade é o único caminho a seguir em um mundo duro e indiferente."
 ethos_courtly_name: "Cerimonioso"
 ethos_courtly_desc_nhc: "A cerimônia da vida cortesã é tão essencial para esta cultura que ela faz parte integrante do comportamento social das pessoas. Um lugar para todos, e todos em seu lugar."
 ethos_egalitarian_name: "Igualitarismo"
 ethos_egalitarian_desc: "A intolerância e o isolacionismo podem ser o caminho para outros, mas esta cultura reconhece que aceitar as diferenças é muito melhor do que aniquilá-las."
 ethos_communal_name: "Comunal"
 ethos_communal_desc: "Esta cultura valoriza os laços da comunidade acima de tudo, promovendo grande lealdade e dedicação ao trabalhar juntos em prol de objetivos comuns."
 #Martial Customs
 martial_custom_equal_name: "Igualitário"
 martial_custom_equal_desc: "Nesta cultura, qualquer pessoa capaz na casa pode pegar em armas em nome de seu suserano quando chamada."
 martial_custom_male_only_name: "Apenas Homens"
 martial_custom_male_only_desc: "Esta cultura considera apenas os homens como fisicamente fortes e resistentes o suficiente para lutar em batalha."
 martial_custom_female_only_name: "Apenas Mulheres"
 martial_custom_female_only_desc: "Esta cultura considera apenas as mulheres como fisicamente fortes e resistentes o suficiente para lutar em batalha."
 ## ^The above descs mirror each other deliberately.
 #Traditions
 tradition_court_eunuchs_name: "Eunucos na Corte"
 tradition_court_eunuchs_desc: "Esta cultura faz uso extensivo de eunucos na corte, ocupando posições que vão desde servos domésticos até administradores burocráticos e até mesmo comandantes militares. Homens sem desejo são fáceis de serem confiados."
 tradition_byzantine_succession_name: "Tradições Bizantinas"
 tradition_byzantine_succession_desc: "Esta cultura está intimamente associada às tradições imperiais do Império Romano Oriental e seu legado na forma de um código complexo e intrincado de conduta cortesã."
 tradition_african_tolerance_name: "Tolerância Africana"
 tradition_african_tolerance_desc: "Embora alguns possam considerá-la como fraqueza, um reino fundado na compreensão e tolerância é um reino construído sobre bases sólidas."
 tradition_memories_of_bactria_name: "Memórias de Bactria"
 tradition_memories_of_bactria_desc: "Imortalizado na memória cultural dessas pessoas está o ideal da terra perfeita de Bactria, a bela coroa do Oriente, cujo tempo voltará novamente."
 tradition_equal_inheritance_name: "Herança Igualitária"
 tradition_equal_inheritance_desc: "Esta cultura tem uma história de governantes dividindo suas terras entre todos os filhos, mesmo aqueles que normalmente seriam excluídos."
 tradition_equal_inheritance_link: "Herança Igualitária"
 tradition_the_witenagemot_name: "The Witenagemot"
 tradition_the_witenagemot_desc: "Esta cultura tem uma longa história de realização de assembleias compostas pelos potentados governantes da terra, debatendo política, lei, finanças e, o mais importante, como melhor... #EMP aconselhar#! o governante."
 tradition_things_name: "Reunião Ting"
 tradition_things_desc: "Na Escandinávia, as distâncias e as áreas selvagens tornam ineficaz a autoridade centralizada. Quando é preciso resolver disputas e tomar decisões, reúne-se o #EMP Ting#!, uma assembleia de pares presidida por um legislador."
 tradition_caravaneers_name: "Caravaneiros"
 tradition_caravaneers_desc: "Esta cultura está bem integrada às práticas comerciais da região, e seu povo está fortemente associado ao comércio de caravanas."
 tradition_xenophilic_name: "Xenofílico"
 tradition_xenophilic_desc: "Esta cultura abraça a todos e genuinamente se fascina por todas as culturas."
 tradition_legalistic_name: "Legalista"
 tradition_legalistic_desc: "Esta cultura considera o império da lei e sua codificação como o parâmetro mais importante de uma sociedade civilizada."
 tradition_warrior_culture_name: "Cultura Guerreira"
 tradition_warrior_culture_desc: "Esta cultura valoriza a destreza marcial e a força acima de tudo. As crianças são criadas sabendo lutar e são desencorajadas de buscar atividades acadêmicas. A fraqueza não é tolerada."
 tradition_philosopher_culture_name: "Cultura Filosófica"
 tradition_philosopher_culture_desc: "Esta cultura promove o pensamento e a autorreflexão."
 tradition_chivalry_name: "Cavalaria"
 tradition_chivalry_desc: "Esta cultura abraçou a cavalaria e os códigos de conduta cavalheirescos como um método social de regular o comportamento. A destreza marcial, o dever, a honra e a moralidade são valorizados, assim como a poesia ruim e a literatura romântica."
 tradition_hit_and_run_name: "Táticos do Golpe e Fuga"
 tradition_hit_and_run_desc: "Esta cultura domina o uso de unidades levemente armadas para atacar o inimigo com força e depois recuar."
 tradition_stand_and_fight_name: "Permanecer e Lutar!"
 tradition_stand_and_fight_desc: "Guerreiros desta cultura são inabaláveis e firmes. Eles não recuam - mesmo diante de probabilidades esmagadoras, para melhor ou para pior."
 tradition_horse_lords_name: "Senhores dos Cavalos"
 tradition_horse_lords_desc: "Esta cultura dominou o uso do cavalo em guerra."
 tradition_adaptive_skirmishing_name: "Esquadrões Adaptáveis"
 tradition_adaptive_skirmishing_desc: "Esta cultura sabe como usar efetivamente esquadrões de combate em qualquer ambiente."
 tradition_formation_fighting_name: "Especialistas em Combate em Formação"
 tradition_formation_fighting_desc: "Esta cultura sabe como criar sinergia entre diferentes tipos de unidades por meio de formações protetoras eficientes."
 tradition_republican_legacy_name: "Legado Republicano"
 tradition_republican_legacy_desc: "Esta cultura possui uma longa história de valores republicanos, onde as classes urbanas são tão importantes quanto os proprietários rurais."
 tradition_hereditary_hierarchy_name: "Hierarquia Hereditária"
 tradition_hereditary_hierarchy_desc: "Esta cultura acredita que a liderança é transmitida por meio do sangue, a nobreza está ligada às pedras dos castelos e a estrutura feudal é inabalável. Eles não esquecem facilmente aqueles que quebram o código feudal."
 tradition_theocratic_autonomy_name: "Autonomia Teocrática"
 tradition_theocratic_autonomy_desc: "As autoridades religiosas desta cultura têm ampla liberdade concedida pelos governantes seculares e são respeitadas e obedecidas pelo povo."
 tradition_saharan_nomads_name: "Nômades do Saara"
 tradition_saharan_nomads_desc: "Esta cultura está intimamente familiarizada com o deserto do Saara, que tem percorrido por séculos, conectando o Mediterrâneo aos reinos subsaarianos do Sahel."
 tradition_himalayan_settlers_name: "Colonizadores do Himalaia"
 tradition_himalayan_settlers_desc: "Esta cultura fez sua morada no 'teto do mundo', onde o ar é fresco, mas frio, e os invernos são longos e rigorosos. Eles se orgulham de que poucas culturas abaixo seriam capazes de viver tão bem quanto esse povo faz, entre os picos e planaltos onde apenas as ovelhas podem prosperar."
 tradition_esteemed_hospitality_name: "Hospitalidade Estimada"
 tradition_esteemed_hospitality_desc: "Nesta cultura, os governantes são conhecidos e esperados para receber qualquer pessoa que possa chegar à sua corte de braços abertos. Hospedar convidados e visitantes de maneira espetacular."
 tradition_hard_working_name: "Trabalhadores Dedicados"
 tradition_hard_working_desc: "Esta cultura ensina e valoriza ideias de dedicação e trabalho árduo em prol da comunidade."
 tradition_loyal_soldiers_name: "Súditos Leais"
 tradition_loyal_soldiers_desc: "Para esta cultura, servir ao seu suserano e país é nobre e justo - um dever e um privilégio, em vez de um acordo ganancioso ou um fardo indesejado."
 tradition_female_only_inheritance_name: "Matriarcal"
 tradition_female_only_inheritance_desc: "Esta cultura impõe uma hierarquia matriarcal, onde a classe dominante é predominantemente composta por mulheres."
 tradition_pacifism_name: "Pacifistas"
 tradition_pacifism_desc: "Para esta cultura, o uso da força nunca pode ser justificado. Somente seguindo um caminho de não violência as pessoas podem verdadeiramente viver em paz."
 tradition_scientific_curiosity_name: "Curiosidade Científica"
 tradition_scientific_curiosity_desc: "A maioria das pessoas olha para a esquerda, para a direita, para trás e para a frente em busca de respostas. Não essas pessoas. Essas pessoas olham para cima."
 tradition_spartan_name: "Espartana"
 tradition_spartan_desc: "Esta cultura não valoriza os símbolos de poder - a cerimônia, a riqueza, a decoração sem sentido. Essa cultura está mais interessada no próprio poder, preferencialmente na forma de muralhas altas e fortalezas."
 tradition_tribe_unity_name: "Unidade Tribal"
 tradition_tribe_unity_desc: "Esta cultura enfatiza os laços familiares e comunitários que seu povo compartilha, incentivando-os a lembrar sua herança comum."
 tradition_astute_diplomats_name: "Diplomatas Astutos"
 tradition_astute_diplomats_desc: "É uma ideia comum nesta cultura que a expressão mais pura de superioridade é a capacidade de subjugar seu inimigo sem lutar contra ele."
 tradition_collective_lands_name: "Terras Coletivas"
 tradition_collective_lands_desc: "A ideia de que indivíduos possuem terras pessoalmente é estranha a esta cultura; a terra pertence a todas as pessoas, para o bem comum."
 tradition_horse_breeder_name: "Criadores de Cavalos"
 tradition_horse_breeder_desc: "Esta cultura acumulou minuciosamente conhecimento e experiência na arte e ciência refinada da criação de cavalos. Sejam destriers ou coursers, os cavalos desse povo são renomados por sua superioridade."
 tradition_hunters_name: "Caçadores Prolíficos"
 tradition_hunters_desc: "Impulsionada pela necessidade econômica, ou talvez expectativa social, esta cultura aprimorou suas práticas de caça em uma arte precisa e quase bela."
 tradition_sacred_mountains_name: "Montanhas Sagradas"
 tradition_sacred_mountains_desc: "Esta cultura considera as montanhas como conexões com o divino e as trata com reverência e respeito."
 tradition_culinary_art_name: "Artistas Culinários"
 tradition_culinary_art_desc: "A comida não é apenas sustento para esta cultura; ela é tanto uma arte quanto um ritual, um ponto focal tanto para a família quanto para a comunidade."
 tradition_festivities_name: "Festividades Frequentes"
 tradition_festivities_desc: "A frequência e exuberância com que esta cultura realiza festividades seriam consideradas vulgares por outros, mas uma festa é uma festa!"
 tradition_tea_ceremony_name: "Cerimônias de Chá"
 tradition_tea_ceremony_desc: "Às vezes, tudo o que se precisa para melhorar tudo é uma xícara de chá gostoso."
 tradition_vegetarianism_name: "Vegetarianos"
 tradition_vegetarianism_desc: "Esta cultura desenvolveu uma forte aversão ao consumo de carne animal e pratica o vegetarianismo em toda a sociedade."
 tradition_alpine_supremacy_name: "Supremacia Alpina"
 tradition_alpine_supremacy_desc: "O povo desta cultura adaptou-se a viver em regiões montanhosas, e seu conhecimento e expertise em climas alpinos são incomparáveis."
 tradition_seafaring_name: "Navegadores"
 tradition_seafaring_desc: "Para esta cultura, o chamado do mar é irresistível, e eles vivem para velejar como um sonho em um oceano cristalino, ou cavalgar no topo de uma tempestade selvagem e furiosa."
 tradition_strength_display_name: "Demonstrações de Força"
 tradition_strength_display_desc: "Possuir apenas força não é suficiente. Você precisa #EMP demonstrar#! sua força diante dos outros, para que você saiba que pode enfrentar um oponente digno ou lutar ao lado de um aliado valoroso."
 tradition_mystical_ancestors_name: "Ancestrais Místicos"
 tradition_mystical_ancestors_desc: "A linhagem é muito importante para esta cultura, ao ponto em que os ancestrais se tornaram seres míticos e lendários, com muitos que afirmam ser seus descendentes."
 tradition_priestly_caste_name: "Castas Sacerdotais"
 tradition_priestly_caste_desc: "Esta cultura impõe um sistema de castas para elevar o sacerdócio em sua sociedade. Para eles, indivíduos encarregados de interpretar a vontade do divino devem ser protegidos e obedecidos."
 tradition_religion_blending_name: "Mistura de Religiões"
 tradition_religion_blending_desc: "Membros desta cultura frequentemente convivem com aqueles que compartilham diferentes fé e crenças, e se adaptam bem à adoção de elementos estrangeiros em seu próprio culto."
 tradition_religious_festivities_name: "Festividades Religiosas"
 tradition_religious_festivities_desc: "O movimento do Sol e das estrelas é irrelevante para a concepção de tempo desta cultura. Em vez disso, uma forma muito mais popular de marcar a passagem dos dias é por meio de uma infinidade de festivais religiosos e celebrações regulares, para os quais todos são convidados!"
 tradition_religious_patronage_name: "Patrocínio Religioso"
 tradition_religious_patronage_desc: "Para a salvação da alma, é preciso se comprometer com obras de significado religioso. Você não pode comprar redenção, mas ter um templo de sacerdotes cantando seus louvores #EMP ajuda.#!"
 tradition_medicinal_plants_name: "Herbalistas Medicinais"
 tradition_medicinal_plants_desc: "Esta cultura desenvolveu há muito tempo conhecimentos sobre as propriedades medicinais das plantas e árvores; para eles, a maioria das doenças pode ser tratada com o emplasto, pomada ou caldo certo."
 tradition_storytellers_name: "Contadores de Histórias"
 tradition_storytellers_desc: "Esta cultura possui uma tradição oral forte e persistente. O passado é preservado por meio de narrativas ritualísticas, onde os heróis e lendas do passado são transmitidos de geração em geração."
 tradition_sacred_hunts_name: "Caçadas Sagradas"
 tradition_sacred_hunts_desc: "A caça não é nem um esporte nem um passatempo, é nada menos que a expressão mais pura da experiência humana, onde alguém pode se conectar com o divino ao demonstrar seu domínio sobre a natureza."
 tradition_wedding_ceremonies_name: "Cerimônias Matrimoniais"
 tradition_wedding_ceremonies_desc: "Para esta cultura, a união de duas pessoas em matrimônio é considerada um evento altamente público e ritualístico."
 tradition_music_theory_name: "Teóricos Musicais"
 tradition_music_theory_desc: "Esta cultura trata a música quase como a linguagem do divino, e assim muitos indivíduos se dedicam desde jovens ao nobre e celebrado estudo musical."
 tradition_poetry_name: "Poesia Refinada"
 tradition_poetry_desc: "A poesia é considerada uma arte nobre nesta cultura, e muitos dedicam seu tempo a juntar palavras com significado e reflexão."
 tradition_culture_blending_name: "Mistura de Culturas"
 tradition_culture_blending_desc: "Membros desta cultura frequentemente conviveram com pessoas de outras culturas. Por meio da exposição, eles se tornaram adeptos em incorporar idiomas, tradições e costumes estrangeiros em suas próprias vidas."
 tradition_family_entrepreneurship_name: "Negócios Familiares"
 tradition_family_entrepreneurship_desc: "Esta cultura incentiva o desenvolvimento de negócios ao longo das linhas familiares, onde cada geração adquire as ferramentas e técnicas do ofício dos antecessores, construindo uma forte tradição de profissionalismo ancestral."
 tradition_fishermen_name: "Pescadores Hábeis"
 tradition_fishermen_desc: "Qualquer um pode pescar, mas fazê-lo com tanta habilidade que qualquer captura seja abundante, independentemente da maré ou do vento, é um talento raro. Ninguém conhece melhor a costa, a terra ou o mar do que esses pescadores."
 tradition_metal_craftsmanship_name: "Metalúrgicos"
 tradition_metal_craftsmanship_desc: "Esta cultura desfruta de fácil acesso ao ferro há séculos. Ao longo do tempo, eles desenvolveram seu entendimento do metal a tal ponto que seu nome se tornou sinônimo de armas e armaduras duráveis e de alta qualidade."
 tradition_isolationist_name: "Isolacionista"
 tradition_isolationist_desc: "Esta cultura prefere manter-se isolada e raramente busca além de seu próprio âmbito."
 tradition_winter_warriors_name: "Guerreiros do Inverno"
 tradition_winter_warriors_desc: "Esta cultura está acostumada à realidade de ventos rigorosos e frio intenso."
 tradition_forest_fighters_name: "Lutadores da Floresta"
 tradition_forest_fighters_desc: "Esta cultura é especializada em lutar em florestas."
 tradition_mountaineers_name: "Montanhistas"
 tradition_mountaineers_desc: "Soldados desta cultura carregam tudo o que precisam para atravessar montanhas."
 tradition_warriors_of_the_dry_name: "Guerreiros do Árido"
 tradition_warriors_of_the_dry_desc: "Esta cultura dominou a arte de lutar em climas muito secos."
 tradition_highland_warriors_name: "Guerreiros das Terras Altas"
 tradition_highland_warriors_desc: "Guerreiros desta cultura lutam bem nas encostas e vales de suas terras montanhosas."
 tradition_jungle_warriors_name: "Guerreiros da Selva"
 tradition_jungle_warriors_desc: "Guerreiros desta cultura sabem bem como atravessar selvas traiçoeiras."
 tradition_only_the_strong_name: "Somente os Fortes"
 tradition_only_the_strong_desc: "Esta cultura dá uma grande importância a ter alguns guerreiros bem treinados. Se você não é o melhor dos melhores, não é bem-vindo para servir."
 tradition_warriors_by_merit_name: "Guerreiros por Mérito"
 tradition_warriors_by_merit_desc: "Esta cultura acredita que se você provou ser capaz como guerreiro, deve ter permissão para lutar, não importa quem você seja."
 tradition_warrior_monks_name: "Sacerdotes Guerreiros"
 tradition_warrior_monks_desc: "Esta cultura acredita que se você escolher seguir estudos teológicos, também deve ser capaz de defender sua fé."
 tradition_talent_acquisition_name: "Reconhecimento de Talento"
 tradition_talent_acquisition_desc: "\"Mate-me se desejar, mas se me deixar viver, servirei a você lealmente.\""
 tradition_strength_in_numbers_name: "Força em Números"
 tradition_strength_in_numbers_desc: "Esta cultura abandona a ideia de ter tropas de elite e, em vez disso, favorece exércitos massivos."
 tradition_frugal_armorsmiths_name: "Armeiros Econômicos"
 tradition_frugal_armorsmiths_desc: "Enquanto um conjunto de armadura de alta qualidade pode salvar uma vida, ter dez conjuntos decentes pode vencer uma batalha."
 tradition_malleable_invaders_name: "Invasores Moldáveis"
 tradition_malleable_invaders_desc: "Nós tomaremos suas terras, seus filhos, suas tradições e seu #EMP futuro#!."
 tradition_quarrelsome_name: "Briguentos"
 tradition_quarrelsome_desc: "Conflitos fronteiriços são comuns para os governantes desta cultura. Terras frequentemente mudam de mãos de maneira injusta."
 tradition_swords_for_hire_name: "Espadas Contratadas"
 tradition_swords_for_hire_desc: "Esta cultura vê o trabalho de mercenários com bons olhos e encoraja guerreiros a buscar glória como mercenários entre as guerras."
 tradition_reverence_for_veterans_name: "Reverência pelos Veteranos"
 tradition_reverence_for_veterans_desc: "Esta cultura não menospreza aqueles que não podem mais lutar devido a ferimentos; em vez disso, eles são celebrados como heróis e usados como professores."
 tradition_stalwart_defenders_name: "Defensores Firmes"
 tradition_stalwart_defenders_desc: "Defender o que é seu próprio é de importância primordial para esta cultura."
 tradition_battlefield_looters_name: "Saqueadores de Campo de Batalha"
 tradition_battlefield_looters_desc: "Nesta cultura, as batalhas não são travadas por prestígio, mas por lucro. Quem se importa com o status se você não pode pagar pela guerra?"
 tradition_fervent_temple_builders_name: "Construtores de Templos Fervorosos"
 tradition_fervent_temple_builders_desc: "Esta cultura considera a construção de templos como o caminho mais direto para o divino. Régios fervorosos são esperados para construir muitos e grandiosos templos."
 tradition_lords_of_the_elephant_name: "Senhores dos Elefantes"
 tradition_lords_of_the_elephant_desc: "Esta cultura venera elefantes, comparando-os à realeza. Eles são mestres em capturá-los, treiná-los e usá-los de forma devastadora em guerra."
 tradition_zealous_people_name: "Crentes Fervorosos"
 tradition_zealous_people_desc: "As pessoas desta cultura são particularmente fervorosas e dedicadas à sua fé."
 tradition_welcoming_name: "Carismáticos"
 tradition_welcoming_desc: "As pessoas desta cultura destacam-se em questões diplomáticas, e a etiqueta social é valorizada acima de tudo."
 tradition_agrarian_name: "Agrícola"
 tradition_agrarian_desc: "Esta cultura é distintamente agrícola, suas terras produzindo colheitas abundantes para exércitos famintos. Embora não ter que lutar pela comida signifique muitos camponeses para o recrutamento, também significa que cada soldado não é tão motivado como aqueles de regiões mais árduas."
 tradition_eye_for_an_eye_name: "Olho por Olho"
 tradition_eye_for_an_eye_desc: "Nesta cultura, ofensas não são esquecidas, nem perdoadas. Seu povo pode guardar ressentimentos por muito tempo, e a vingança é realizada com paixão."
 tradition_forbearing_name: "Tolerantes"
 tradition_forbearing_desc: "Nesta cultura, ser paciente e contido diante da adversidade é comum."
 tradition_equitable_name: "Equitativos"
 tradition_equitable_desc: "Nesta cultura, a verdade e a justiça imparcial são altamente valorizadas."
 tradition_charitable_name: "Caridosos"
 tradition_charitable_desc: "Independentemente da fé, as pessoas desta cultura são motivadas a apoiar aqueles menos afortunados."
 tradition_modest_name: "Modestos"
 tradition_modest_desc: "Esta cultura valoriza a modéstia, não se deve ocupar muito espaço ou se considerar melhor do que os outros."
 tradition_hill_dwellers_name: "Moradores de Colinas"
 tradition_hill_dwellers_desc: "Esta cultura se sente em casa nas colinas e sabe como trabalhar suas terras de forma eficaz."
 tradition_forest_folk_name: "Povo da Floresta"
 tradition_forest_folk_desc: "Esta cultura vive próxima a vastas florestas e sabe como aproveitar seus recursos."
 tradition_mountain_homes_name: "Lares nas Montanhas"
 tradition_mountain_homes_desc: "Esta cultura sabe como viver e prosperar em planaltos próximos às encostas íngremes das montanhas."
 tradition_dryland_dwellers_name: "Moradores de Terras Secas"
 tradition_dryland_dwellers_desc: "Esta cultura está acostumada a viver em climas secos e sabe onde encontrar água e como trabalhar as terras."
 tradition_jungle_dwellers_name: "Moradores da Selva"
 tradition_jungle_dwellers_desc: "Esta cultura vive próxima à selva e sabe como aproveitar suas riquezas."
 tradition_faith_bound_name: "Unidos pela Fé"
 tradition_faith_bound_desc: "Nesta cultura, pertencer a uma fé diferente significa que você não é elegível para a sucessão."
 tradition_by_the_sword_name: "Pela Espada"
 tradition_by_the_sword_desc: "Os membros desta cultura acreditam que o melhor missionário é aquele que carrega uma espada. Embora o apoio às guerras santas seja generalizado, os motivos são analisados para garantir que os poderes Divinos aprovem."
 tradition_language_scholars_name: "Linguistas"
 tradition_language_scholars_desc: "Aprender as palavras de um vizinho aproxima você da linguagem do Divino."
 tradition_pastoralists_name: "Pastores"
 tradition_pastoralists_desc: "Esta cultura se sente em casa em terrenos amplos e abertos, onde eles pastoreiam grandes grupos de animais."
 tradition_desert_nomads_name: "Viajantes do Deserto"
 tradition_desert_nomads_desc: "Esta cultura não é estranha ao ambiente árduo do deserto e dominou o uso de camelos para ajudá-los em viagens, guerra e vida cotidiana."
 tradition_gardening_name: "Arquitetos de Jardins"
 tradition_gardening_desc: "Esta cultura tem uma longa tradição de construção e manutenção de vários tipos de jardins, criando um pequeno paraíso para si mesmos."
 can_appoint_court_gardener_name: "[GetCultureTradition('tradition_gardening').GetName]"
 tradition_monogamous_name: "Monogâmicos"
 tradition_monogamous_desc: "Nesta cultura, mantém-se um único cônjuge, independentemente da fé."
 tradition_polygamous_name: "Poligâmicos"
 tradition_polygamous_desc: "Nesta cultura, é comum ter múltiplos cônjuges, independentemente da fé."
 tradition_concubines_name: "Concubinas"
 tradition_concubines_desc: "Os governantes desta cultura frequentemente mantêm um número de concubinas em sua casa, independentemente de sua fé."
 tradition_mendicant_mystics_name: "Místicos Mendicantes"
 tradition_mendicant_mystics_desc: "As pessoas sagradas desta cultura acreditam fortemente que a fé deve ser ministrada no campo, e seus mais devotos frequentemente percorrem o mundo."
 tradition_parochialism_name: "Paroquialismo"
 tradition_parochialism_desc: "Los habitantes de las ciudades de esta cultura son ferozmente competitivos e independientes. Invierten mucho dinero y energías para asegurarse de que #EMP su#! ciudad sea la más grande."
 tradition_martial_admiration_name: "Admiração Marcial"
 tradition_martial_admiration_desc: "Aqueles que estão dispostos a pegar em armas e lutar por sua cultura são dignos de admiração. Não importa as probabilidades."
 tradition_chanson_de_geste_name: "Chanson de Geste"
 tradition_chanson_de_geste_desc: "Esta cultura valoriza as façanhas heróicas de antepassados há muito tempo passados. A narrativa romântica das vidas de cavaleiros como Guillaume ou Roland inspirará gerações futuras."
 tradition_ruling_caste_name: "Casta Governante"
 tradition_ruling_caste_desc: "Os governantes desta cultura estão acostumados a dominar sobre súditos que não são de sua própria cultura. Eles sabem como reprimir efetivamente revoltas, embora às custas da percepção pública."
 tradition_staunch_traditionalists_name: "Tradicionais Inflexíveis"
 tradition_staunch_traditionalists_desc: "A tradição é tradição, é imutável e inalterável. Devemos estar prontos e dispostos a defender o que nos torna quem somos."
 tradition_sacred_groves_name: "Bosques Sagrados"
 tradition_sacred_groves_desc: "As árvores são consideradas sagradas por esta cultura. A floresta é um ser vivo que deve ser cuidado, não destruído."
 tradition_hold_the_line_name: "Manter a Linha"
 tradition_hold_the_line_desc: "Esta cultura faz com que todos os combatentes se orgulhem de sua força. Os discursos empolgantes de seus comandantes mantêm os soldados inspirados até o fim."
 tradition_legendary_noble_families_name: "Famílias Nobres Lendárias"
 tradition_legendary_noble_families_desc: "A menos que você esteja conectado a uma das famílias nobres que ajudaram a forjar o destino desta cultura, você não é nada."
 tradition_castle_keepers_name: "Guardiões dos Castelos"
 tradition_castle_keepers_desc: "A ofensiva não é uma boa defesa. Uma boa defesa é ter a maioria dos castelos no mundo conhecido."
 tradition_city_keepers_name: "Guardiões das Cidades"
 tradition_city_keepers_desc: "As cidades são o coração urbano pulsante desta cultura, e eles desejam que cada uma de suas metrópoles se torne joias invejáveis conhecidas em todo o mundo."
 tradition_fractious_name: "Quereloso"
 tradition_fractious_desc: "O inimigo do meu inimigo é #EMP também#! meu inimigo."
 tradition_runestones_name: "Erguidores de Pedras Rúnicas"
 tradition_runestones_desc: "Morte, conquista, aquisição de posição - não são essas as coisas que definem a vida da nobreza? Onde nosso povo vai, também vão os marcos do valor de nossas vidas."
 tradition_insular_spirit_name: "Espírito Insular"
 tradition_insular_spirit_desc: "Esta cultura está determinada a não se curvar aos seus caminhos originais e lutará por qualquer um de seus próprios que seja atacado por outra cultura."
 tradition_monastic_communities_name: "Comunidades Monásticas"
 tradition_monastic_communities_desc: "Esta cultura tem uma longa história de enviar descendentes nobres para servir a fé. Pensadores políticos reverenciados frequentemente surgem das ordens monásticas."
 tradition_roman_legacy_name: "Legado Romano Oriental"
 tradition_roman_legacy_desc: "A organização militar do Império Romano ainda está na memória viva desta cultura. Um exército profissional é favorecido em relação a tropas recrutadas."
 tradition_longbow_competitions_name: "Competições de Arco Longo"
 tradition_longbow_competitions_desc: "Esta cultura favorece um arco mais poderoso do que a maioria poderia puxar, e praticar com eles uma vez por semana é tão importante quanto qualquer ritual de adoração, desde as aldeias rurais até as maiores metrópoles urbanas."
 tradition_illyrian_grit_name: "Força Ilíria"
 tradition_illyrian_grit_desc: "Esta cultura pode sempre estar lutando contra si mesma, mas se unirá para enfrentar qualquer invasor quando chegar a hora."
 tradition_maritime_mercantilism_name: "Mercantilismo Marítimo"
 tradition_maritime_mercantilism_desc: "O mundo pode ser governado por exércitos, mas esta cultura sabe que é verdadeiramente controlado por quem domina o fluxo de ouro pelos mares."
 tradition_sacral_kingship_name: "Realeza Sagrada"
 tradition_sacral_kingship_desc: "Os governantes desta cultura são considerados deuses, ou a realeza é vista como uma virtude divina. O que é um Rei para um Deus?"
 tradition_reavers_name: "Pilhadores"
 tradition_reavers_desc: "Muitos nesta cultura, que vivem na costa, tentam se aventurar a abordar navios para roubar de outros portos. Embora isso não seja aprovado por seus senhores diretos, todo governante sabe que isso resultará em melhores soldados quando chegar a hora."
 tradition_practiced_pirates_name: "Piratas Praticantes"
 tradition_practiced_pirates_desc: "Invadir um porto, incendiá-lo e levar tudo que não estiver pregado ao chão pode não ser nobre, mas #EMP é#! lucrativo."
 tradition_determined_independence_name: "Independência Determinada"
 tradition_determined_independence_desc: "Morte antes da submissão! Os governantes desta cultura não encontram derrota pior do que a vassalização e farão qualquer coisa para se tornarem seus próprios mestres."
 tradition_merciful_blindings_name: "Cegamentos Misericordiosos"
 tradition_merciful_blindings_desc: "Não importa o quão além do perdão alguém tenha ido, esta cultura acredita que é melhor arrancar um olho do que perfurar um coração."
 tradition_reindeer_hunters_name: "Caçadores de Rena"
 tradition_reindeer_hunters_desc: "Perseguir veados não passa de uma dança sobre o gelo constante da taiga. Esta cultura aprendeu a usar os suprimentos de caça que têm ao máximo."
 tradition_mountaineer_ruralism_name: "Ruralismo Montanhês"
 tradition_mountaineer_ruralism_desc: "Desde suas origens nas colinas da Floresta da Boêmia, até as escarpas das montanhas Ore e Tatra, a maioria nesta cultura sabe não apenas como percorrer as terras rochosas, mas também lidar com a vida em uma montanha com facilidade."
 tradition_life_is_just_a_joke_name: "A Vida é Apenas uma Piada"
 tradition_life_is_just_a_joke_desc: "Esta cultura riria na guilhotina com um machado sobre sua cabeça."
 tradition_steppe_tolerance_name: "Tolerância das Estepes"
 tradition_steppe_tolerance_desc: "Aqueles que vivem na Estepe sempre terão muito em comum com aqueles que compartilham seu modo de vida. Estrangeiros podem adorar de forma diferente, mas ainda vivem na sela."
 tradition_nubian_warrior_queens_name: "Rainhas Guerreiras"
 tradition_nubian_warrior_queens_desc: "Aqueles que vivem no leste da África lembram-se bem das grandes Rainhas Guerreiras que um dia enfrentaram invasores e forjaram reinos em Kush. Nossos vizinhos podem insistir na superioridade dos homens, mas nós rastreamos nossas linhagens através de nossas mães, e o grito de guerra das poderosas mulheres núbias fazem esses \"homens\" estrangeiros fugirem para casa."
 tradition_nubian_warrior_kings_name: "Reis Guerreiros"
 tradition_nubian_warrior_kings_desc: "Aqueles que vivem no leste da África lembram-se bem dos grandes Reis Guerreiros que um dia enfrentaram invasores e forjaram reinos em Kush. Nossos vizinhos podem insistir na superioridade das mulheres, mas nós rastreamos nossas linhagens através de nossos pais, e o grito de guerra dos poderosos homens núbios fazem essas \"mulheres\" estrangeiras fugirem para casa."
 tradition_maritime_mangroves_name: "Mangues Marítimos"
 tradition_maritime_mangroves_desc: "Esta cultura aprendeu a navegar em pântanos que outras culturas consideram intransponíveis. Eles usaram isso para construir bases inacessíveis a partir das quais negociar, saquear e explorar o mundo."
 tradition_mixed_governance_name: "Governança Mista"
 tradition_mixed_governance_desc: "Esta cultura considera cada pensamento digno de ser ouvido e cada nova forma de governar digna de ser experimentada. Os governantes incentivam os vassalos a governarem da maneira que acharem melhor."
 tradition_ritual_scarrification_name: "Escarificação Ritual"
 tradition_ritual_scarrification_desc: "Esta cultura respeita aqueles cuja carne já provou a lâmina. Seja para provar sua coragem ou criar um belo desenho, eles marcam sua própria pele."
 tradition_hidden_cities_name: "Cidades Ocultas"
 tradition_hidden_cities_desc: "Seja nas copas das árvores da selva ou protegidas pelo labirinto orgânico, os estrangeiros podem nem mesmo saber que as cidades dessa cultura existem, quanto mais ter ideia de como sitiá-las."
 tradition_hereditary_bards_name: "Bardos Hereditários"
 tradition_hereditary_bards_desc: "Para algumas culturas, existem histórias transmitidas ao longo das gerações, tão valiosas quanto qualquer título de propriedade."
 tradition_ancient_miners_name: "Mineradores Antigos"
 tradition_ancient_miners_desc: "Esta cultura sempre esteve cercada por matérias-primas, minério e gemas brutas. Eles têm uma afinidade para encontrar locais para escavações de mineração."
 tradition_wetlanders_name: "Pantaneiros"
 tradition_wetlanders_desc: "Esta cultura dominou os pântanos e brejos. Embora a vida às vezes seja uma batalha contra o mofo, eles aprenderam a usar a turfa a seu favor."
 tradition_diasporic_name: "Diáspora"
 tradition_diasporic_desc: "As pessoas desta cultura perderam a pátria que um dia amaram. Alguns deles viajam pelo mundo em busca de um lugar onde possam recomeçar."
 tradition_sorcerous_metallurgy_name: "Metalurgia Feiticeira"
 tradition_sorcerous_metallurgy_desc: "Há tantos alquimistas nesta cultura tentando transformar metal em ouro quanto ferreiros forjando armas. O que importa se a riqueza e as armas dessa cultura são aprimoradas pela bruxaria?"
 tradition_polders_name: "Pôlderes"
 tradition_polders_desc: "Esta cultura tem uma longa tradição de recuperação de terras do mar circundante. Isso lhes permite utilizar o que normalmente seria um leito marinho raso para agricultura e construção."
 tradition_caucasian_wolves_name: "Lobos Caucasianos"
 tradition_caucasian_wolves_desc: "Tendo passado séculos fazendo da região dos portões do Cáucaso o seu lar, esta cultura está bem adaptada a tudo o que a guerra nas montanhas envolve."
 tradition_artisans_name: "Artesãos Especialistas"
 tradition_artisans_desc: "As crianças desta cultura frequentemente seguem a profissão de seus pais, acumulando conhecimento e habilidade extensos para o seu ofício ao longo das gerações."
 #Debug Traditions
 tradition_debug_name: "Caminhos Voláteis"
 tradition_debug_desc: "Esta cultura é conhecida por suas muitas posições ecléticas e contraditórias."
 #FP1 Traditions
 tradition_fp1_coastal_warriors_name: "Guerreiros Costeiros"
 tradition_fp1_coastal_warriors_desc: "Sempre fomos atraídos para a costa. O cheiro do ar marinho, as gaivotas chorando, o aroma do peixe defumado... que guerreiro optaria por viver longe da água e de suas liberdades?"
 tradition_fp1_performative_honour_name: "Honra Performática"
 tradition_fp1_performative_honour_desc: "A honra nasce, sim, mas a honra também é conquistada e perdida por meio de ações. Ao buscar e vingar ofensas, ou ao falhar nisso, os soldados se tornam desprezíveis enquanto os jovens se transformam em guerreiros."
 tradition_fp1_northern_stories_name: "Histórias do Norte"
 tradition_fp1_northern_stories_desc: "A vida é vivida, contada e lembrada através das histórias. O que dizemos e o que as pessoas dizem sobre nós importa tanto quanto o que fazemos. Lembramos disso, e isso se reflete em nossas histórias."
 tradition_fp1_trials_by_combat_name: "Julgamentos por Combate"
 tradition_fp1_trials_by_combat_desc: "Palavras são um substituto covarde para armas. Por que deixar a justiça para leis decrépitas e magistrados corruptos quando disputas podem ser resolvidas mais rápido e de forma mais justa com a espada?"
 tradition_fp1_the_right_to_prove_name: "O Direito de Provar"
 tradition_fp1_the_right_to_prove_desc: "Embora nem todos nasçam lutadores, com a coragem certa e um braço forte com a espada, qualquer um pode mostrar-se um guerreiro de coração e assim se tornar um na prática."
