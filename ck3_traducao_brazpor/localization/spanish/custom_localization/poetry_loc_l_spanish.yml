 ##################################################
 #Intro Lines
 ## Romance
 GeneratePoem_Intro_Rhyming_Romance_01_A_01: "Oh, como um semblante tão belo reluz,"
 GeneratePoem_Intro_Rhyming_Romance_01_A_02: "$GeneratePoem_Intro_Rhyming_Romance_01_A_01$"
 GeneratePoem_Intro_Rhyming_Romance_01_A_03: "$GeneratePoem_Intro_Rhyming_Romance_01_A_01$"
 GeneratePoem_Intro_Rhyming_Romance_01_B_01: "Cintilante, reluzente, assombrando meus sonhos,"
 GeneratePoem_Intro_Rhyming_Romance_01_B_02: "Tão perfeitamente puro que eu me desfaço em pedaços,"
 GeneratePoem_Intro_Rhyming_Romance_01_B_03: "Ser pego no seu sorriso é tão aquecedor quanto os raios de sol,"
 GeneratePoem_Intro_Rhyming_Romance_02_A_01: "Ess[ROOT.Var('poem_subject').Char.Custom('ES_EA')] [ROOT.Var('poem_subject').Char.GetWomanMan] delicios[ROOT.Var('poem_subject').Char.Custom('ES_OA')] que tanto me cativa,"
 GeneratePoem_Intro_Rhyming_Romance_02_A_02: "$GeneratePoem_Intro_Rhyming_Romance_02_A_01$"
 GeneratePoem_Intro_Rhyming_Romance_02_A_03: "$GeneratePoem_Intro_Rhyming_Romance_02_A_01$"
 GeneratePoem_Intro_Rhyming_Romance_02_B_01: "Onde, oh, onde foi aquela pessoa tão sedutora?"
 GeneratePoem_Intro_Rhyming_Romance_02_B_02: "Cujo rosto parece sempre brilhar,"
 GeneratePoem_Intro_Rhyming_Romance_02_B_03: "À qual minha lealdade eu eternamente devo,"
 GeneratePoem_Intro_Rhyming_Romance_03_A_01: "Eu me pergunto quais segredos sua máscara protege?"
 GeneratePoem_Intro_Rhyming_Romance_03_A_02: "$GeneratePoem_Intro_Rhyming_Romance_03_A_01$"
 GeneratePoem_Intro_Rhyming_Romance_03_A_03: "$GeneratePoem_Intro_Rhyming_Romance_03_A_01$"
 GeneratePoem_Intro_Rhyming_Romance_03_B_01: "Que maravilhas ocultas? Que assuntos disfarçados?"
 GeneratePoem_Intro_Rhyming_Romance_03_B_02: "Certamente esta [ROOT.Var('poem_subject').Char.GetWomanMan] está livre de defeitos,"
 GeneratePoem_Intro_Rhyming_Romance_03_B_03: "É um escudo ou apenas um afeto?"
 ## Mourning
 GeneratePoem_Intro_Rhyming_Mourning_01_A_01: "Não importa quantos dias passem e se dobrem,"
 GeneratePoem_Intro_Rhyming_Mourning_01_A_02: "$GeneratePoem_Intro_Rhyming_Mourning_01_A_01$"
 GeneratePoem_Intro_Rhyming_Mourning_01_A_03: "$GeneratePoem_Intro_Rhyming_Mourning_01_A_01$"
 GeneratePoem_Intro_Rhyming_Mourning_01_B_01: "A vida sem [ROOT.Var('poem_subject').Char.GetSheHe] é um pântano doente,"
 GeneratePoem_Intro_Rhyming_Mourning_01_B_02: "O mundo parece distante, como se através de vidro,"
 GeneratePoem_Intro_Rhyming_Mourning_01_B_03: "Os ventos sussurram friamente pela grama,"
 GeneratePoem_Intro_Rhyming_Mourning_02_A_01: "Quando uma tão bela presença está oculta à vista,"
 GeneratePoem_Intro_Rhyming_Mourning_02_A_02: "$GeneratePoem_Intro_Rhyming_Mourning_02_A_01$"
 GeneratePoem_Intro_Rhyming_Mourning_02_A_03: "$GeneratePoem_Intro_Rhyming_Mourning_02_A_01$"
 GeneratePoem_Intro_Rhyming_Mourning_02_B_01: "Nós gritamos e choramos, não importa a nossa força,"
 GeneratePoem_Intro_Rhyming_Mourning_02_B_02: "A dor certamente parece uma ofensa pessoal,"
 GeneratePoem_Intro_Rhyming_Mourning_02_B_03: "Aqueles que ficaram devem sentir uma maldição,"
 GeneratePoem_Intro_Rhyming_Mourning_03_A_01: "Quão cruel é a aleatoriedade do destino,"
 GeneratePoem_Intro_Rhyming_Mourning_03_A_02: "$GeneratePoem_Intro_Rhyming_Mourning_03_A_01$"
 GeneratePoem_Intro_Rhyming_Mourning_03_A_03: "$GeneratePoem_Intro_Rhyming_Mourning_03_A_01$"
 GeneratePoem_Intro_Rhyming_Mourning_03_B_01: "Para privar o mundo de uma dança tão bela,"
 GeneratePoem_Intro_Rhyming_Mourning_03_B_02: "Por abandonar[ROOT.Var('poem_subject').Char.GetHerHim] de um modo tal,"
 GeneratePoem_Intro_Rhyming_Mourning_03_B_03: "Para nos deixar todos nessa maldita transe,"
 ## Legacy
 GeneratePoem_Intro_Rhyming_Legacy_01_A_01: "O/a [ROOT.Var('poem_subject').Char.GetWomenMen] mais poderos[ROOT.Var('poem_subject').Char.Custom('ES_OA')] deve deixar esta Terra"
 GeneratePoem_Intro_Rhyming_Legacy_01_A_02: "$GeneratePoem_Intro_Rhyming_Legacy_01_A_01$"
 GeneratePoem_Intro_Rhyming_Legacy_01_A_03: "$GeneratePoem_Intro_Rhyming_Legacy_01_A_01$"
 GeneratePoem_Intro_Rhyming_Legacy_01_B_01: "Suas façanhas, seus atos, seu valor inflado"
 GeneratePoem_Intro_Rhyming_Legacy_01_B_02: "E esperança de boas palavras não é escassa"
 GeneratePoem_Intro_Rhyming_Legacy_01_B_03: "Não importa em que reinos deram à luz,"
 GeneratePoem_Intro_Rhyming_Legacy_02_A_01: "Ninguém deve temer quando uma vida parte,"
 GeneratePoem_Intro_Rhyming_Legacy_02_A_02: "$GeneratePoem_Intro_Rhyming_Legacy_02_A_01$"
 GeneratePoem_Intro_Rhyming_Legacy_02_A_03: "$GeneratePoem_Intro_Rhyming_Legacy_02_A_01$"
 GeneratePoem_Intro_Rhyming_Legacy_02_B_01: "Desde que deixem para trás a arte,"
 GeneratePoem_Intro_Rhyming_Legacy_02_B_02: "Cruzando a morte tranquila com coração nobre,"
 GeneratePoem_Intro_Rhyming_Legacy_02_B_03: "Embora possa dilacerar seus afligidos,"
 GeneratePoem_Intro_Rhyming_Legacy_03_A_01: "Que não espera descansar quando cansado,"
 GeneratePoem_Intro_Rhyming_Legacy_03_A_02: "$GeneratePoem_Intro_Rhyming_Legacy_03_A_01$"
 GeneratePoem_Intro_Rhyming_Legacy_03_A_03: "$GeneratePoem_Intro_Rhyming_Legacy_03_A_01$"
 GeneratePoem_Intro_Rhyming_Legacy_03_B_01: "Não importa sua riqueza e tesouro adquiridos?"
 GeneratePoem_Intro_Rhyming_Legacy_03_B_02: "Em memória gloriosa, com desejo do coração?"
 GeneratePoem_Intro_Rhyming_Legacy_03_B_03: "Rodeando suas obras aos felizes aposentados?"
 ## Strife
 GeneratePoem_Intro_Rhyming_Strife_01_A_01: "Quando a guerra de penas vermelhas chegar às suas terras,"
