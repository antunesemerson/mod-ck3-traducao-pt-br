 GeneratePoem_Outro_Rhyming_Romance_02_A_03: "$GeneratePoem_Outro_Rhyming_Romance_02_A_01$"
 GeneratePoem_Outro_Rhyming_Romance_02_B_01: "O belo começo de uma árvore genealógica."
 GeneratePoem_Outro_Rhyming_Romance_02_B_02: "E enquanto eu estiver com [ROOT.Var('poem_subject').Char.GetSheHe], sempre serei livre."
 GeneratePoem_Outro_Rhyming_Romance_02_B_03: "Tão quente e refrescante como um chá aromático."
 GeneratePoem_Outro_Rhyming_Romance_03_A_01: "Sorrio feliz só de pensar no sorriso dela,"
 GeneratePoem_Outro_Rhyming_Romance_03_A_02: "$GeneratePoem_Outro_Rhyming_Romance_03_A_01$"
 GeneratePoem_Outro_Rhyming_Romance_03_A_03: "$GeneratePoem_Outro_Rhyming_Romance_03_A_01$"
 GeneratePoem_Outro_Rhyming_Romance_03_B_01: "E uma vez que esse sorriso está lá, ele fica fixo no lugar."
 GeneratePoem_Outro_Rhyming_Romance_03_B_02: "E faz meu coração palpitar com uma velocidade notável."
 GeneratePoem_Outro_Rhyming_Romance_03_B_03: "Todas as preocupações, tristezas e angústias, desaparecem sem deixar rastro."
 ## Mourning
