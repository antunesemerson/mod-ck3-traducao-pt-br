 GeneratePoem_Outro_Rhyming_Romance_01_B_02: "Mas ao menos sua lembrança, eu jamais esquecerei."
 GeneratePoem_Outro_Rhyming_Romance_01_B_03: "Mas não tentar seria um arrependimento maior."
 GeneratePoem_Outro_Rhyming_Romance_02_A_01: "Porque a sua vida é minha vida e nossa vida por vir,"
