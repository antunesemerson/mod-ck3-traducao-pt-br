 BLUE_VENETOI_GLOSS: "Os #bold Venetoi#!, um nome do período para a facção "Azul", eram considerados uma das equipes mais prestigiadas que competiam no Hipódromo de Constantinopla e acreditava-se que tinham ligações com as classes superiores. O famoso auriga, Porfírio, era um membro estimado dos Azuis, embora tenha mudado brevemente sua afiliação para os Verdes durante o período dos Distúrbios de Nika."
 GREEN_PRASINOI_GLOSS: "Os #bold Prasinoi#!, um nome do período para \"o Verde\", eram considerados uma facção do povo. No século VI, os Verdes massacram quase 3.000 membros dos Azuis no anfiteatro de Constantinopla."
 WHITE_LEUKOI_GLOSS: "Os #bold Leukoi#!, um nome do período para a facção "Branca", foram historicamente ofuscados pelos Azuis e pelos Verdes, mas de forma alguma eram insignificantes. Em nosso período, já haviam sido incorporados pelos Azuis."
 RED_RHOUSIOI_GLOSS: "Os #bold Rhousioi#!, um nome do período para a facção "Vermelha", foram historicamente ofuscados pelos Azuis e pelos Verdes, mas de forma alguma eram insignificantes. Em nosso período, já haviam sido incorporados pelos Verdes."
