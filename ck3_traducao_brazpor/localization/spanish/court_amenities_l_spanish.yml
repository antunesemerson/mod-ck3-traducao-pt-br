l_spanish:
 court_fashion: "Moda da Corte"
 court_fashion_default: "Moda do Século Passado"
 court_fashion_default_desc: "Os cortesãos se vestem de acordo com a convenção, o que é seguro, ainda que pouco criativo."
 court_fashion_acceptable: "Moda Ultrapassada"
 court_fashion_acceptable_desc: "Os cortesãos chamam atenção quando visitam vilas e cidades."
 court_fashion_decent: "Moda Decente"
 court_fashion_decent_desc: "Os cortesãos atualizam seus guarda-roupas com agilidade conforme as estações, abandonando roupas antigas quando um novo estilo se populariza."
 court_fashion_good: "Moda Elegante"
 court_fashion_good_desc: "Com frequência, os estilos desta corte se espalham pelo mundo e influenciam outras cortes."
 court_fashion_fantastic: "Moda de Alta-costura"
 court_fashion_fantastic_desc: "Esta corte é considerada uma inovadora estilística. Os servos se vestem como os governantes de outros reinos, e seu soberano será conhecido para sempre por seu senso de vestimenta."
 court_food_quality: "Qualidade da Comida"
 court_food_quality_default: "Comida Sem Graça"
 court_food_quality_modest: "Comida Modesta"
 court_food_quality_decent: "Comida Decente"
 court_food_quality_lavish: "Comida Farta"
 court_food_quality_exotic: "Comida Exótica"
 court_food_quality_default_desc: "Ninguém aguarda ansiosamente uma refeição nesta corte, mas dizem que a companhia compensa."
 court_food_quality_modest_desc: "Os convidados são bem alimentados com culinária local adequada."
 court_food_quality_decent_desc: "Esta corte é capaz de fornecer iguarias novas ocasionalmente."
 court_food_quality_lavish_desc: "Uma frota de cozinheiros fornece um suprimento constante de bocados saborosos. Um servo com uma bandeja de comida acompanha qualquer grupo de convidados reunidos."
 court_food_quality_exotic_desc: "Servos são enviados a terras estrangeiras e retornam com abundância de alimentos exóticos. Não há deleite culinário que não tenha passado por estes salões."
 court_lodging_standards: "Padrão dos Alojamentos"
 court_lodging_standards_default: "Alojamentos Minúsculos"
 court_lodging_standards_small: "Alojamentos Pequenos"
 court_lodging_standards_middling: "Alojamentos Médios"
 court_lodging_standards_spacious: "Alojamentos Espaçosos"
 court_lodging_standards_grand: "Alojamentos Suntuosos"
 court_lodging_standards_default_desc: "Há incidentes diplomáticos ocasionais quando convidados precisam compartilhar alojamento."
 court_lodging_standards_small_desc: "Há espaço para qualquer cortesão ter seu próprio quarto."
 court_lodging_standards_middling_desc: "O quarto de cada cortesão é bem equipado."
 court_lodging_standards_spacious_desc: "Qualquer habitante desta corte pode esperar uma suíte de aposentos."
 court_lodging_standards_grand_desc: "Os convidados sabem que podem solicitar qualquer luxo dentro de seus aposentos. Qualquer livro para seu estudo, qualquer bebida tarde da noite: os quartos são atendidos a toda hora."
 court_servants: "Servos da Corte"
 court_servants_default: "Pouquíssimos Servos"
 court_servants_few: "Poucos Servos"
 court_servants_some: "Alguns Servos"
 court_servants_many: "Muitos Servos"
 court_servants_endless: "Servos Sem Fim"
 court_servants_default_desc: "O punhado de servos desta corte está exausto tentando atender a todas as exigências dos convidados."
 court_servants_few_desc: "Esta corte possui servos que podem oferecer quase todo conforto crucial."
 court_servants_some_desc: "Esta corte possui servos especializados que têm orgulho do seu trabalho."
 court_servants_many_desc: "Esta corte possui um servo para cada finalidade que alguém possa imaginar."
 court_servants_endless_desc: "Esta corte tem mais servos do que qualquer um sabe o que fazer com eles. É preciso um esforço concentrado para realizar a tarefa mais simples sem que servos peçam para executá-la por você."
 court_servants_few_guest_recruitment: "Custo de recrutamento de [Concept( 'guest', 'convidados' )|E]: #P -20 %#!"
