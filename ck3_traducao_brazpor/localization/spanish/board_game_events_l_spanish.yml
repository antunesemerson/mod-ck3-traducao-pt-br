 board_games.0001.desc.relative_victory.winning_heavily: "Estou ganhando com folga,"
 board_games.0001.desc.relative_victory.winning_somewhat: "Estou na frente por enquanto,"
 board_games.0001.desc.relative_victory.drawing: "Estamos empatados,"
 board_games.0001.desc.relative_victory.losing_somewhat: "Está começando a vencer,"
 board_games.0001.desc.relative_victory.losing_heavily: "Meu oponente está muito à minha frente,"
 board_games.0001.desc.actual_victory.both_close: "e qualquer um de nós pode levar a partida a qualquer momento.\n\n"
 board_games.0001.desc.actual_victory.i_am_close: "e a vitória está tão perto que quase posso prová-la.\n\n"
 board_games.0001.desc.actual_victory.they_are_close: "e meu oponente pode triunfar a qualquer segundo.\n\n"
 board_games.0001.desc.actual_victory.sudden_death: "e este jogo está chegando rapidamente ao clímax.\n\n"
 board_games.0001.desc.actual_victory.neither_close: "embora nenhum de nós esteja sequer perto da vitória.\n\n"
