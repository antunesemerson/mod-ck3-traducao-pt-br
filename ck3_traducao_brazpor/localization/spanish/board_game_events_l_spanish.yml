l_spanish:
 ##################################################
 #Misc
 board_games.0000.t: "O Maior Jogo: [SCOPE.Custom('BG_GameType')|U]"
 board_games.0001.t: "$board_games.0000.t$"
 ##################################################
 #Opponent Winning
 board_games.0001.desc.opponent_winning.diplomacy.low: "\"Sabe,\" reflete meu oponente, \"talvez eu não fale muito, mas sou assustadoramente bom em [SCOPE.Custom('BG_GameType')].\""
 board_games.0001.desc.opponent_winning.diplomacy.medium: "\"Ahhhh, se falar em público fosse tão fácil quanto derrotar você em [SCOPE.Custom('BG_GameType')],\" comenta meu oponente."
 board_games.0001.desc.opponent_winning.diplomacy.high: "\"Eu sinceramente não sei o que é mais fácil,\" lamenta meu oponente, \"derrotar você em [SCOPE.Custom('BG_GameType')] ou contar a história da sua derrota constrangedora.\""
 board_games.0001.desc.opponent_winning.martial.low: "\"Se a guerra fosse tão fácil quanto [SCOPE.Custom('BG_GameType')], eu já governaria o mundo,\" ri meu oponente. \"Mas bem, isso sou eu.\""
 board_games.0001.desc.opponent_winning.martial.medium: "\"Mmmm, você não é grande estrategista, é?\" gargalha meu oponente."
 board_games.0001.desc.opponent_winning.martial.high: ""O campo de batalha, o tabuleiro, no fim, tudo se resume à coisa mais importante de todas", entoa meu oponente. E dá uns toques na testa com um nó dos dedos para enfatizar."
 board_games.0001.desc.opponent_winning.stewardship.low: "\"Queria que assuntos de moeda fossem tão fáceis quanto jogar [SCOPE.Custom('BG_GameType')],\" comenta meu oponente. \"Eu estaria nadando em prata.\""
 board_games.0001.desc.opponent_winning.stewardship.medium: "\"Você acha que [SCOPE.Custom('BG_GameType')] é um bom treino para administração de verdade?\" pergunta meu oponente distraidamente. \"Eu sempre achei que sim. Não que eu esteja... insinuando algo com isso.\""
 board_games.0001.desc.opponent_winning.stewardship.high: ""Sempre disse que jogando [SCOPE.Custom('BG_GameType')] se pode aprender muito sobre como governar um reino", pontifica meu oponente. "E vice-versa, naturalmente"."
 board_games.0001.desc.opponent_winning.intrigue.low: "\"Vê? É por isso que gosto de [SCOPE.Custom('BG_GameType')],\" opina meu oponente. \"Nada de se esgueirar, nada de mentir, só um jogo justo de inteligência. Um em que, bem...\""
 board_games.0001.desc.opponent_winning.intrigue.medium: "\"Você sabia que dá para aprender #EMP exatamente#! como alguém mente observando o [bg_myself.Custom('MaskFace')] durante [SCOPE.Custom('BG_GameType')]?\" pergunta meu oponente. \"Ah, eu não quis dizer... só uma observação...\""
 board_games.0001.desc.opponent_winning.intrigue.high: "\"Cuidado,\" sorri meu oponente, \"mais um movimento desses e você vai ativar minha armadilha [SCOPE.Custom('BG_GamePiece')].\""
 board_games.0001.desc.opponent_winning.learning.low: "\"Sabe, vivem me dizendo que preciso de #EMP livros#! para provar minha inteligência,\" pontifica meu oponente, \"mas acho que está bem claro agora que não sou nenhum bronco.\""
 board_games.0001.desc.opponent_winning.learning.medium: "\"Sinceramente,\" discursa meu oponente, \"estou impressionado que você esteja jogando tão bem, considerando contra quem está.\""
 board_games.0001.desc.opponent_winning.learning.high: "\"Estudei [SCOPE.Custom('BG_GameType')] extensivamente,\" explica meu oponente, \"e lamento dizer que, a esta altura, simplesmente não acho que haja qualquer jeito de você vencer.\""
 board_games.0001.desc.opponent_winning.trait.lustful: ""Como o maior amante #EMP e#! jogador[bg_opponent.Custom('ES_XA')] de [SCOPE.Custom('BG_GameType')] do mundo, não o culpo por perder para mim", ri meu adversário."
 board_games.0001.desc.opponent_winning.trait.chaste: "\"Disciplina no lar gera disciplina no tabuleiro, sabe,\" pontifica meu oponente. \"Um pouco de contenção ajuda muito.\""
 board_games.0001.desc.opponent_winning.trait.gluttonous: "\"Acho que talvez eu comemore minha vitória com um banquete,\" divaga meu oponente. \"Estou com vontade de algo doce, para combinar com a vitória.\""
 board_games.0001.desc.opponent_winning.trait.temperate: "\"Talvez eu até me permita uma taça de água perfumada com rosas depois desta partida,\" divaga meu oponente. \"Não costumo me tratar assim, mas acho que mereci.\""
 board_games.0001.desc.opponent_winning.trait.greedy: ""Nada é mais doce do que o tilintar do ouro, a não ser o suave plic-plic das lágrimas de um[bg_myself.Custom('ES_XA')] [bg_myself.GetWomanMan] contra um tabuleiro de [SCOPE.Custom('BG_GameType')]", sorri meu oponente. "Não concorda?""
 board_games.0001.desc.opponent_winning.trait.generous: "\"Veja, eu posso estar vencendo, mas se pedir com jeitinho, estou disposto a simplesmente... deixar você ficar com isso,\" explica meu oponente, com a voz transbordando bondade e pena. \"Há mais na vida do que vencer em [SCOPE.Custom('BG_GameType')].\""
 board_games.0001.desc.opponent_winning.trait.lazy: "Meu adversário boceja sem pudor. “Sinceramente, esperava um desafio um pouco maior, [bg_myself.GetFirstNameNoTooltip]. Mal estou acordado[bg_opponent.Custom('ES_XA')]”."
 board_games.0001.desc.opponent_winning.trait.diligent: "\"É por isso que você precisa se dedicar,\" consola meu oponente, com um tom #EMP absolutamente#! insuportável. \"Não há substituto para o trabalho duro, nem na vida nem em [SCOPE.Custom('BG_GameType')].\""
 board_games.0001.desc.opponent_winning.trait.wrathful: "Meu oponente está estranhamente, de forma nada característica, calm[bg_opponent.Custom('ES_OA')].\"Oh, não há muito pelo que ficar irritad #EMP bien#!\", diz, ao encontrar meu olhar, \"quando as coisas estão indo tão \"."
 board_games.0001.desc.opponent_winning.trait.calm: "\"Sempre achei que a chave para [SCOPE.Custom('BG_GameType')] é uma mente clara e uma cabeça fria,\" reflete meu oponente.\"Você chega lá algum dia.\""
 board_games.0001.desc.opponent_winning.trait.patient: "\"A maioria das pessoas,\" discursa meu oponente, \"não aprecia plenamente o quanto é difícil executar [bg_opponent.Custom('BG_RandomArticleDirection')] [bg_opponent.Custom('BG_RandomRankPossessive')] [bg_opponent.Custom('BG_RandomMoveType')]. Muito menos se defender disso.\""
 board_games.0001.desc.opponent_winning.trait.impatient: ""Suas partidas de [SCOPE.Custom('BG_GameType')] são muito lentas, seu [bg_myself.Custom2('GetYoungMiddleAgedOld',bg_opponent)]", resmunga meu oponente, tamborilando os dedos sobre o tabuleiro."
 board_games.0001.desc.opponent_winning.trait.arrogant: "«No os sintáis mal, [bg_myself.GetFirstNameNoTooltip]», me adula mi contrincante, reclinándose sin prisas en su asiento. «No tod[bg_myself.Custom('ES_OA')]s pueden tener este #EMP talento#! natural»"
 board_games.0001.desc.opponent_winning.trait.humble: "\"Sinceramente, você está indo muito bem,\" gorjeia meu oponente. \"Eu não costumo jogar tão bem assim, então acho que você só está tendo azar.\""
 board_games.0001.desc.opponent_winning.trait.deceitful: "\"Não se sinta tão mal,\" acalma meu oponente, com voz doce como mel. \"Nem [bg_opponent.GetFaith.TricksterGodName] conseguiria acompanhar meus movimentos.\""
 board_games.0001.desc.opponent_winning.trait.honest: ""Nossa, isso está indo #EMP mucho#! muito melhor do que eu esperava!", exclama meu oponente. "Você não é um adversário tão difícil assim… Ah, desculpe, não queria ser grosseir[bg_opponent.Custom('ES_OA')]. Só estava sendo sincer[bg_opponent.Custom('ES_OA')]"."
 board_games.0001.desc.opponent_winning.trait.craven: "\"Eu... estou ganhando? Estou ganhando!\", grita meu oponente. Ele parece genuinamente surpreso[bg_opponent.Custom('ES_OA')], mas, afinal de contas, se #EMP ha#! passou metade da partida olhando pelas mãos."
 board_games.0001.desc.opponent_winning.trait.brave: "\"Vai me permitir uma pequena risada,\" comenta meu oponente. \"Mas você vai ter de jogar com mais ousadia do que #EMP isso#! para derrotar #EMP a mim#!.\""
 board_games.0001.desc.opponent_winning.trait.shy: "\"Toda aquela prática está dando resultado!\" guincha meu oponente, radiante de orgulho tímido diante do estado do tabuleiro."
 board_games.0001.desc.opponent_winning.trait.gregarious: ""Não se sintam mal", diz meu oponente, arrastando as palavras enquanto estala os nós dos dedos. "Venco partidas de [SCOPE.Custom('BG_GameType')] do mesmo jeito que faço amigos. Com uma facilidade alarmante"."
 board_games.0001.desc.opponent_winning.trait.ambitious: ""Vocês acham que eles nomeiam algum tipo de... #EMP [bg_opponent.Custom('ES_ReyReina')]#! dos jogos?", questiona meu oponente, coçando o queixo. "Porque, vejam, acho que já estou caminhando para esse título"."
 board_games.0001.desc.opponent_winning.trait.content: "\"Que jogo adorável,\" ri meu oponente. \"Não poderíamos pedir nada melhor, poderíamos? Tirando sua sorte, quero dizer.\""
 board_games.0001.desc.opponent_winning.trait.arbitrary: "Em geral, não sou muito amig[bg_opponent.Custom('ES_OA')]ável com as regras, opina meu oponente, mas vejo um certo apelo nas partidas de [SCOPE.Custom('BG_GameType')]. Elas te permitem #EMP forçar#! os outros a admitir que às vezes você é melhor do que eles."
 board_games.0001.desc.opponent_winning.trait.just: "\"Olha,\" explica meu oponente, acenando um maço de papéis para mim. \"Sinto muito você continuar tentando fazer movimentos ilegais, mas se você #EMP lesse as regras#!, estaria jogando melhor.\""
 board_games.0001.desc.opponent_winning.trait.cynical: "\"Naturalmente, não vou pegar leve com você,\" rosna meu oponente. \"Você #EMP certamente#! não faria isso comigo, então por que eu faria?\""
 board_games.0001.desc.opponent_winning.trait.zealous: "\"Eu gostaria de levar o crédito por esta vitória certa,\" espreguiça-se meu oponente, \"mas é tudo obra de [bg_opponent.GetFaith.KnowledgeGodName] #EMP através#! de mim.\""
 board_games.0001.desc.opponent_winning.trait.paranoid: "\"Eu sei que você ainda tem algum truque na manga,\" rosna meu oponente. \"Ninguém pode ser #EMP tão#! fácil de derrotar.\""
 board_games.0001.desc.opponent_winning.trait.trusting: "\"Acho que vou ali ao privado enquanto é sua vez,\" sorri meu oponente. \"Não vá mexer nos meus [SCOPE.Custom('BG_GamePiecePlural')]!\""
 board_games.0001.desc.opponent_winning.trait.compassionate: ""Sinto muito por estar colocando você em uma posição tão ruim, [bg_myself.GetFirstNameNoTooltip]", diz meu oponente, cuja voz soa sinceramente arrependida. "Jogo partidas de [SCOPE.Custom('BG_GameType')] por diversão, mas acho que é mais gratificante quando #EMP ambas#! pessoas estão se divertindo"."
 board_games.0001.desc.opponent_winning.trait.callous: "\"Por [bg_opponent.GetFaith.HouseholdGodName], você não oferece muita resistência, oferece?\" exclama meu oponente sem rodeios."
 board_games.0001.desc.opponent_winning.trait.sadistic: ""É #EMP mucho#! mais divertido brincar com um inimigo ferido", diz meu oponente, encantad[bg_opponent.Custom('ES_OA')] e com não pouca malícia, "não concorda, [bg_myself.GetFirstNameNoTooltip]?""
 board_games.0001.desc.opponent_winning.trait.stubborn: "\"É bem agradável ter uma vitória tão fácil para variar,\" zomba meu oponente. \"Normalmente eu preciso discutir por algumas horas antes que o outro jogador admita que eu venci.\""
 board_games.0001.desc.opponent_winning.trait.fickle: "\"Eu realmente adoro que, não importa a estratégia que eu escolha, você sempre perca do mesmo jeito,\" brinca meu oponente."
 board_games.0001.desc.opponent_winning.trait.vengeful: "\"Claro, isto tudo é só vingança,\" sibila meu oponente. \"E você sabe #EMP muito bem#! por quê.\""
 board_games.0001.desc.opponent_winning.trait.forgiving: "Para ser sincer[bg_opponent.Custom('ES_OA')], esperava um desafio um pouco maior, reclama meu oponente. Mas tudo bem. Pelo menos você serve para praticar."
 board_games.0001.desc.opponent_winning.trait.rowdy: "Meu pequen[bg_opponent.Custom('ES_OA')] contrincante me lança uma série de ameaças mal planejadas e quase derruba o tabuleiro de tanta empolgação."
 board_games.0001.desc.opponent_winning.trait.charming: ""Deveríamos jogar uma partida de [SCOPE.Custom('BG_GameType')] todos os dias, [bg_myself.GetFirstNameNoTooltip]", diz alegremente meu pequen[bg_opponent.Custom('ES_OA')] adversário. "É sempre tão divertido!"."
 board_games.0001.desc.opponent_winning.trait.curious: ""Sabe?", reflete meu pequen[bg_opponent.Custom('ES_OA')] adversário, "estou aprendendo muito com minhas vitórias contra você"."
 board_games.0001.desc.opponent_winning.trait.pensive: ""Eu tinha lido muito sobre como jogar [SCOPE.Custom('BG_GameType')]", sorri radiante meu pequen[bg_opponent.Custom('ES_OA')] adversário, "mas eu não sabia como seria fácil #EMP aplicarlo#!!""
 board_games.0001.desc.opponent_winning.trait.bossy: ""Depois de derrotar você", afirma meu pequeno[bg_opponent.Custom('ES_OA')] oponente, "quero um pão doce. Como tributo"."
 board_games.0001.desc.opponent_winning.relation.friend: "\"Anime-se, cara-fechada [bg_myself.Custom('MaskFace')],\" ri meu oponente. \"É só um joguinho entre amigos, certo?\""
 board_games.0001.desc.opponent_winning.relation.best_friend: ""Por mais que isso valha algo, ganhe ou perca", diz minha melhor amig[bg_opponent.Custom('ES_OA')]", não há ninguém no mundo com quem eu prefira jogar uma partida de [SCOPE.Custom('BG_GameType')]"."
 board_games.0001.desc.opponent_winning.relation.rival: "\"Por [bg_opponent.GetFaith.FateGodName], você é tão ruim em [SCOPE.Custom('BG_GameType')] quanto em governar!\" gargalha meu rival."
 board_games.0001.desc.opponent_winning.relation.nemesis: "Minha nêmesis não diz nada. Só me encara, [bg_opponent.Custom('EyeEyes')] com um fogo de puro #EMP odio#! bruto."
 board_games.0001.desc.opponent_winning.relation.lover: "Sem quebrar o contato visual comigo, meu amante começa a acariciar suavemente uma das [SCOPE.Custom('BG_GamePiece')] com a ponta do dedo e... Oh. #EMP Ay va#!."
 board_games.0001.desc.opponent_winning.relation.soulmate: "Minha alma gêmea só presta metade da atenção à nossa partida de [SCOPE.Custom('BG_GameType')]. Principalmente, parece focada em ficar me encarando nos meus olhos."
 board_games.0001.desc.opponent_winning.relation.bully: "«Vê?», dá uma risadinha meu oponente. «É por isso que eu te bato, porque você é um[bg_myself.Custom('ES_XA')] #EMP fracasad[bg_myself.Custom('ES_OA')]#!»."
 board_games.0001.desc.opponent_winning.relation.victim: "Os olhos da minha vítima se iluminam com uma fúria justa, feliz por, desta vez, algo estar indo #EMP bien#!."
 board_games.0001.desc.opponent_winning.relation.crush: "Um momento, ele/ela disse algo? Acho que sim! Nossa, às vezes eu me distraio olhando para[bg_opponent.GetHerHim] e agora estraguei tudo."
 board_games.0001.desc.opponent_winning.relation.guardian: ""Observe-me bem, [bg_myself.GetFirstName]", diz meu/minha tutor[bg_opponent.Custom('ES_XA')]. "Estude como eu jogo e talvez voc? aprenda algo.""
 board_games.0001.desc.opponent_winning.relation.ward: "Meu pupilo abre um sorriso para mim. \"Podemos jogar [SCOPE.Custom('BG_GameType')] com mais frequência? #EMP Por favor#!!\""
 board_games.0001.desc.opponent_winning.hook_on.weak: "\"$board_games.0001.desc.opponent_winning.hook_on.strong$\""
 board_games.0001.desc.opponent_winning.hook_on.strong: "\"É bom inverter a situação com você, sabe,\" diz meu oponente. \"Sempre parece que você me tem na palma da mão. A menos que estejamos jogando [SCOPE.Custom('BG_GameType')], claro.\""
 board_games.0001.desc.opponent_winning.hooked_by.weak: "\"$board_games.0001.desc.opponent_winning.hooked_by.strong$\""
 board_games.0001.desc.opponent_winning.hooked_by.strong: ""Vocês não estão entregando a partida de propósito por causa do nosso #EMP acuerdo#!?", pergunta meu oponente, coçando o queixo pensativamente. "Porque vocês jogam como se estivessem tentando perder"."
 board_games.0001.desc.opponent_winning.match_history.recently_won_against.default: "\"Ahhh, quantas vezes eu já derrotei você, mesmo?\" ri meu oponente. \"Eu #EMP honestamente#! já perdi a conta.\""
 board_games.0001.desc.opponent_winning.match_history.recently_won_against.county: "\"[bg_myself.MakeScope.Var('bg_recent_land_loss_stake').Title.GetNameNoTier] vai muito bem, sabia,\" arrasta meu oponente, \"#EMP muito#! melhor desde que eu assumi o lugar.\""
 board_games.0001.desc.opponent_winning.match_history.recently_won_against.gamble: "\"Mais uma partida,\" observa meu oponente, \"mais uma vitória para minha conta. Você vai acabar falindo, sabia.\""
 board_games.0001.desc.opponent_winning.match_history.recently_lost_against.default: "\"Agora isto,\" titubeia meu oponente, \"é #EMP muito#! melhor do que aquela #EMP outra#! partida que jogamos.\""
 board_games.0001.desc.opponent_winning.match_history.recently_lost_against.county: "«Depois de [bg_opponent.MakeScope.Var('bg_recent_land_loss_stake').Title.GetNameNoTier], não consigo te vencer o suficiente», resmunga meu oponente, ainda magoad[bg_opponent.Custom('ES_OA')] por causa da nossa velha aposta.."
 board_games.0001.desc.opponent_winning.match_history.recently_lost_against.gamble: "\"Parece que desta vez a aposta vai pender para o meu lado, não?\" gargalha meu oponente."
 board_games.0001.desc.opponent_winning.other.pro_gamer: "\"Você realmente deveria prestar bastante atenção às minhas técnicas,\" debocha meu oponente. \"Estou prestes a fazer o que se chama um movimento de jogador profissional de tabuleiro.\""
 board_games.0001.desc.opponent_winning.other.avlf: ""Um[bg_opponent.Custom('ES_XA')] jogador[bg_opponent.Custom('ES_XA')] #EMP maestr[bg_opponent.Custom('ES_OA')]#!? Não se iluda, [bg_myself.GetFirstNameNoTooltip]. Nem sequer é um[bg_opponent.Custom('ES_XA')] jogador[bg_opponent.Custom('ES_XA')]"."
 ##################################################
 #Player Winning
 board_games.0001.desc.i_am_winning.diplomacy.low: ""Eu não... Não posso... Apenas pega leve comigo!" quase grita meu oponente, claramente frustrad[bg_opponent.Custom('ES_OA')] e incapaz de encontrar as palavras certas."
 board_games.0001.desc.i_am_winning.diplomacy.medium: "Meu contrincante não diz nada, simplesmente tamborila a mesa com os dedos em um acesso de ressentimento."
 board_games.0001.desc.i_am_winning.diplomacy.high: "\"Ao que parece,\" ironiza meu oponente, \"você me deixou em ligeira desvantagem. Por enquanto.\""
 board_games.0001.desc.i_am_winning.martial.low: "\"Não consigo comandar soldados,\" lamenta meu oponente, \"não consigo jogar [SCOPE.Custom('BG_GameType')]. Para que eu sirvo?\""
 board_games.0001.desc.i_am_winning.martial.medium: "Meu oponente acaricia o queixo, pensativ[bg_opponent.Custom('ES_OA')]. \"Eu estava #EMP segur[bg_opponent.Custom('ES_OA')]#! de que essa estratagema teria funcionado...\"."
 board_games.0001.desc.i_am_winning.martial.high: "\"Se isto fosse um campo de batalha de verdade,\" declara meu oponente, \"as coisas #EMP estariam#! indo de outro jeito.\""
 board_games.0001.desc.i_am_winning.stewardship.low: "\"Por que números são #EMP sempre#! tão difíceis?\" emburra-se meu oponente. \"[SCOPE.Custom('BG_GameType')] exige que você pense tão à frente, e eu simplesmente #EMP não consigo#!.\""
 board_games.0001.desc.i_am_winning.stewardship.medium: "Meu oponente encara o tabuleiro intensamente. \"Eu devo... devo ter calculado algo errado em algum lugar...\""
 board_games.0001.desc.i_am_winning.stewardship.high: "\"Dói-me dizer isto,\" resmunga meu oponente, \"mas as chances simplesmente não parecem boas para mim.\""
 board_games.0001.desc.i_am_winning.intrigue.low: "\"Dá para você parar um instante com essa trapaça #EMP descarada#!?\" rosna meu oponente."
 board_games.0001.desc.i_am_winning.intrigue.medium: "\"Suspeito que minha estratégia precise de mais... astúcia...\" murmura meu oponente, fitando o tabuleiro com frustração."
 board_games.0001.desc.i_am_winning.intrigue.high: "\"Você pode achar que está vencendo,\" ri meu oponente, \"mas só pensa isso porque eu quero que pense isso. E eu sei que você sabe que eu sei que você sabe disso.\""
 board_games.0001.desc.i_am_winning.learning.low: "\"Isto é completamente injusto, eu nem #EMP entendo#! metade dessas regras,\" bufa meu oponente. \"Você está claramente inventando tudo conforme jogamos.\""
 board_games.0001.desc.i_am_winning.learning.medium: ""Vocês estão usando #EMP otra vez#![bg_myself.Custom('BG_RandomMoveType')] [bg_myself.Custom('BG_RandomRankPossessive')]?", resmunga meu oponente. "Mas #EMP qué#! tão barato[bg_myself.Custom('ES_OA')] são"."
 board_games.0001.desc.i_am_winning.learning.high: "\"Eu sabia que não devia ter começado com o [bg_opponent.Custom('BG_RandomMoveType')] do Tolo,\" choraminga meu oponente. \"Basicamente já perdi.\""
 board_games.0001.desc.i_am_winning.trait.lustful: "Meu oponente parece não estar prestando atenção nenhuma à partida, em vez disso fixando-se na... forma, de alguns dos [SCOPE.Custom('BG_GamePiecePlural')]."
 board_games.0001.desc.i_am_winning.trait.chaste: "\"Esse é o problema de [SCOPE.Custom('BG_GameType')],\" clama meu oponente, gesticulando descontroladamente. \"Inflama as paixões! Desperta os sentidos! É excesso bruto e carnal em sua forma mais básica.\""
 board_games.0001.desc.i_am_winning.trait.gluttonous: "Meu oponente mastiga distraidamente um pequeno pãozinho, perdid[bg_opponent.Custom('ES_OA')] em uma névoa de migalhas e concentração."
 board_games.0001.desc.i_am_winning.trait.temperate: "\"Hrmph,\" resmunga meu oponente. \"Assumir riscos assim ainda vai lhe trazer problemas um dia.\""
 board_games.0001.desc.i_am_winning.trait.greedy: "Meu oponente lança preguiçosamente uma moeda entre os dedos. Ao que parece, o metal frio [bg_opponent.GetHerHim] reconforta enquanto contempla sua derrota iminente."
 board_games.0001.desc.i_am_winning.trait.generous: "Meu oponente me oferece um sorriso bondoso. \"Você está indo #EMP tão#! bem, continue assim!\""
 board_games.0001.desc.i_am_winning.trait.lazy: "\"Ah, é a minha vez?\" boceja meu oponente. \"Desculpe, não tenho prestado #EMP tanta#! atenção.\""
 board_games.0001.desc.i_am_winning.trait.diligent: "\"Sim, você está na frente agora,\" discursa meu oponente, \"mas com um pouco de esforço, eu posso alcançar!\""
 board_games.0001.desc.i_am_winning.trait.wrathful: "Uma veia particularmente feia [bg_opponent.Custom('MaskFace_BehindIn')] na [bg_opponent.Custom('MaskFace')] do meu oponente. \"Se você continuar ganhando, vou vomitar sangue #EMP literalmente#! sobre este tabuleiro, [bg_myself.Custom2('InsultNoun', SCOPE.sC('bg_opponent'))] trapaceir[bg_myself.Custom('ES_OA')]!\"."
 board_games.0001.desc.i_am_winning.trait.calm: "O porte geralmente sereno do meu oponente está… distorcido. A leve torção de um cenho franzido obscurece [bg_opponent.Custom('MaskFace_BehindAcross')] seu [bg_opponent.Custom('MaskFace')]."
 board_games.0001.desc.i_am_winning.trait.patient: "\"Você pode ter a vantagem por enquanto,\" observa meu oponente, \"mas acabará cometendo um erro. Sempre cometem.\""
 board_games.0001.desc.i_am_winning.trait.impatient: "\"Por [bg_opponent.GetFaith.HighGodName], você já venceu, #EMP tá bom#!?\" rosna meu oponente. \"Só #EMP termine#! logo.\""
 board_games.0001.desc.i_am_winning.trait.arrogant: "\"Você não está realmente me derrotando, sabe,\" alardeia meu oponente. \"Você pode #EMP achar#! que está, mas isso é impossível.\""
 board_games.0001.desc.i_am_winning.trait.humble: "As orelhas do meu contrincante estão #EMP visiblemente#! vermelhas de aborrecimento. "Não se pode negar que suas técnicas são…", engole em seco, "impecáveis"."
 board_games.0001.desc.i_am_winning.trait.deceitful: "\"Você está com cara de quem precisa ir ao privado,\" sugere meu oponente, com simpatia. \"Fique à vontade; eu guardo o tabuleiro.\""
 board_games.0001.desc.i_am_winning.trait.honest: "\"Eu não esperava que você fosse tão...\" meu oponente faz uma pausa por um momento, \"#EMP difícil#! de enfrentar.\""
 board_games.0001.desc.i_am_winning.trait.craven: "Meu oponente se remexe sem parar, parecendo à beira de simplesmente fugir."
 board_games.0001.desc.i_am_winning.trait.brave: "\"Tenho um plano,\" vangloria-se meu oponente, \"e ele vai virar esta partida inteira de cabeça para baixo!\""
 board_games.0001.desc.i_am_winning.trait.shy: "Meu oponente está em silêncio e quiet[bg_opponent.Custom('ES_OA')], franzindo a testa enquanto pondera como virar o jogo a favor de seus [SCOPE.Custom('BG_GamePiecePlural')]."
 board_games.0001.desc.i_am_winning.trait.gregarious: "\"Você é muito melhor do que meus parceiros habituais,\" admira meu oponente, \"e eu jogo #EMP muito#! [SCOPE.Custom('BG_GameType')].\""
 board_games.0001.desc.i_am_winning.trait.ambitious: "\"Eu tinha...\" meu oponente trava, sem palavras, \"...esperanças #EMP mais altas#! para esta partida.\""
 board_games.0001.desc.i_am_winning.trait.content: "\"Ah, bem,\" suspira meu oponente, \"eu posso não vencer isto, mas dei o meu melhor.\""
 board_games.0001.desc.i_am_winning.trait.arbitrary: "\"Não vejo por que não podemos usar as minhas regras,\" lamenta meu oponente. \"Estou dizendo, é assim que todo mundo joga em [bg_opponent.GetCurrentLocation.GetNameNoTooltip].\""
 board_games.0001.desc.i_am_winning.trait.just: ""Não posso provar", murmura meu adversário, "mas estou #EMP segur[bg_opponent.Custom('ES_OA')]#! de que você está trapaceando"."
 board_games.0001.desc.i_am_winning.trait.cynical: "\"#EMP Claro#! que você está vencendo,\" lamenta meu oponente, sombrio. \"Ninguém #EMP nunca#! me deixa ganhar uma partida de [SCOPE.Custom('BG_GameType')].\""
 board_games.0001.desc.i_am_winning.trait.zealous: "\"Por [bg_opponent.GetFaith.KnowledgeGodName]! Livrai-me desta ameaça,\" murmura meu oponente baixinho."
 board_games.0001.desc.i_am_winning.trait.paranoid: "\"Você planejou isso, não foi?\" quase rosna meu oponente. \"Planejou #EMP me humilhar#! com uma partida armada!\""
 board_games.0001.desc.i_am_winning.trait.trusting: "\"Por [bg_opponent.GetFaith.KnowledgeGodName],\" lamenta meu oponente. \"Será que eu lhe dei brechas demais? Não esperava perder tão feio tão cedo.\""
 board_games.0001.desc.i_am_winning.trait.compassionate: "\"Sabe,\" pondera meu oponente com ênfase, \"[SCOPE.Custom('BG_GameType')] deveria ser sobre #EMP se divertir#!, não só vencer a qualquer custo.\""
 board_games.0001.desc.i_am_winning.trait.callous: "\"Hmm, então é assim que é perder?\" questiona meu oponente. \"Não é algo de que eu goste particularmente.\""
 board_games.0001.desc.i_am_winning.trait.sadistic: "Meu oponente permanece em silêncio, enquanto seu olhar revela um respeito relutante pela habilidade e pela vitória iminente."
 board_games.0001.desc.i_am_winning.trait.stubborn: "\"Você não vai me derrotar,\" cospe meu oponente por entre os dentes cerrados. \"Ninguém #EMP nunca#! me derrota.\""
 board_games.0001.desc.i_am_winning.trait.fickle: "\"Estou ficando bastante entediado de [SCOPE.Custom('BG_GameType')],\" choraminga meu oponente. \"Não podemos jogar outra coisa?\""
 board_games.0001.desc.i_am_winning.trait.vengeful: "A expressão do meu contrincante é glacial. Seus dedos se apertam ao redor da borda do tabuleiro, como se estivessem se contendo."
 board_games.0001.desc.i_am_winning.trait.forgiving: "Meu oponente parece totalmente tranquilo, sem um traço de virulência [bg_opponent.Custom('MaskFace_BehindAcross')] seu [bg_opponent.Custom('MaskFace')]."
 board_games.0001.desc.i_am_winning.trait.rowdy: "\"Só para você saber,\" sussurra meu oponente, \"se eu perder, vou arremessar esta partida inteira na sua cabeça idiota.\""
 board_games.0001.desc.i_am_winning.trait.charming: "Não quer me facilitar um #EMP poco#! mais?\" pergunta meu oponente, com uma voz enjoativamente doce."
 board_games.0001.desc.i_am_winning.trait.curious: ""Espere… como você está #EMP ganando#!?" Meu oponente parece genuinamente incrédul[bg_opponent.Custom('ES_OA')]."
 board_games.0001.desc.i_am_winning.trait.pensive: "\"Ah, não, eu sabia que não devia ter jogado... agora desperdicei seu tempo...\" resmunga meu oponente."
 board_games.0001.desc.i_am_winning.trait.bossy: "\"Hrmf, se estivéssemos jogando com as regras #EMP minhas#!, #EMP aí#! eu te mostraria!\" lamenta meu oponente."
 board_games.0001.desc.i_am_winning.relation.friend: "\"Danação,\" ri meu amigo, \"você não pega leve em [SCOPE.Custom('BG_GameType')] com ninguém, pega?\""
 board_games.0001.desc.i_am_winning.relation.best_friend: ""Nada mais fino, sempre digo", se vangloria meu melhor amig[bg_opponent.Custom('ES_OA')]", "do que vencer alguém em uma partida de [SCOPE.Custom('BG_GameType')] de forma contundente. Que inveja!"."
 board_games.0001.desc.i_am_winning.relation.rival: ""Vocês #EMP encanta#! humilhar-me, não é?", cospe meu rival, sempre tão mau[bg_opponent.Custom('ES_XA')] perdedor[bg_opponent.Custom('ES_XA')]"
 board_games.0001.desc.i_am_winning.relation.nemesis: "$board_games.0001.desc.opponent_winning.relation.nemesis$"
 board_games.0001.desc.i_am_winning.relation.lover: "«Não precisamos #EMP por qué#! jogar uma partida de [SCOPE.Custom('BG_GameType')], [bg_myself.GetFirstNameNoTooltip]», sussurra meu amante, «Tenho certeza[bg_opponent.Custom('ES_OA')] de que há outras formas de nos divertir…»."
 board_games.0001.desc.i_am_winning.relation.soulmate: "$board_games.0001.desc.opponent_winning.relation.soulmate$"
 board_games.0001.desc.i_am_winning.relation.bully: "“Se você me vencer, eu vou te vencer. É simples assim”, rosna abus[bg_opponent.Custom('ES_OnOna')] ."
 board_games.0001.desc.i_am_winning.relation.victim: "Minha vítima está em silêncio, mas parece que está à beira das lágrimas."
 board_games.0001.desc.i_am_winning.relation.crush: "Meu crush está… Ah, não! [bg_opponent.Custom('ES_OA')] comigo, eu sei, eu sinto isso, dá pra ver na [bg_opponent.Custom('MaskFace')]!"
 board_games.0001.desc.i_am_winning.relation.guardian: ""Parece que voc? est? aprendendo", observa meu/minha tutor[bg_opponent.Custom('ES_XA')] com irrita??o. "Ou, pelo menos, est? me imitando com mais efici?ncia.""
 board_games.0001.desc.i_am_winning.relation.ward: "Meu pupilo[bg_opponent.Custom('ES_OA')] está claramente magoado[bg_opponent.Custom('ES_OA')] por quão feia é a sua derrota, um olhar severo [bg_opponent.Custom('MaskFace_BehindAcross')] seu [bg_opponent.Custom('MaskFace')]."
 board_games.0001.desc.i_am_winning.hook_on.weak: "$board_games.0001.desc.i_am_winning.hook_on.strong$"
 board_games.0001.desc.i_am_winning.hook_on.strong: "\"[bg_opponent.GetFaith.random_GoodGodNames]! Você não consegue me deixar ter um pingo de controle, consegue?\" Lamenta meu oponente."
 board_games.0001.desc.i_am_winning.hooked_by.weak: "$board_games.0001.desc.i_am_winning.hooked_by.strong$"
 board_games.0001.desc.i_am_winning.hooked_by.strong: "\"Se não fosse um desperdício cobrar aqui o que você me #EMP deve#!,\" rosna meu oponente, \"eu ficaria tentado a #EMP obrigar#! você a perder.\""
 board_games.0001.desc.i_am_winning.match_history.recently_won_against.default: "\"Bem,\" geme meu oponente, \"parece que #EMP esta#! partida não está indo do meu jeito.\""
 board_games.0001.desc.i_am_winning.match_history.recently_won_against.county: "\"Se ao menos você tivesse jogado assim quando [bg_myself.MakeScope.Var('bg_recent_land_loss_stake').Title.GetNameNoTier] estava em jogo,\" sorri meu oponente."
 board_games.0001.desc.i_am_winning.match_history.recently_won_against.gamble: "\"Ahhh,\" suspira meu oponente. \"Às vezes se ganha, às vezes se perde. Acho que desta vez é a sua vez de ganhar.\""
 board_games.0001.desc.i_am_winning.match_history.recently_lost_against.default: "\"Não, não, não!\" choraminga meu oponente. \"Não #EMP de novo#!, não para #EMP você#!!\""
 board_games.0001.desc.i_am_winning.match_history.recently_lost_against.county: "Meu oponente enxuga uma gota de suor de seu [bg_opponent.Custom('MaskFace')]. [bg_opponent.Custom('EyeEyes')] bem abertos, sem dúvida revivendo mentalmente a partida que lhe custou [bg_myself.MakeScope.Var('bg_recent_land_less_stake').Title.GetNameNoTier] enquanto jogamos."
 board_games.0001.desc.i_am_winning.match_history.recently_lost_against.gamble: ""Só preciso de uma vitória, só preciso de uma vitória, só preciso…", resmunga meu oponente, repetidas vezes, em voz baixa."
