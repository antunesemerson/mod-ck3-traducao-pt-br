 #Ending Events
 board_games.0031.t: "$board_games.0000.t$"
 board_games.0031.desc.intro.01: "Com um rugido de triunfo, eu salto para ficar de pé, espalhando [SCOPE.Custom('BG_GamePiecePlural')] para todo lado."
 board_games.0031.desc.intro.02: "Com um sorriso presunçoso, coloco meu último [SCOPE.Custom('BG_GamePiece')] sobre o tabuleiro."
 board_games.0031.desc.intro.03: "Nós dois encaramos o último [SCOPE.Custom('BG_GamePiece')]. Eu consegui. Venci."
 board_games.0031.desc.middle.01: "Esta partida de [SCOPE.Custom('BG_GameType')] é minha, mais uma bela vitória em minha ascensão incontestável rumo ao papel de [ROOT.Char.Custom('ES_ReyReina')] dos Jogos."
 board_games.0031.desc.middle.02: "Mais uma vez, minha superioridade intelectual triunfa acima de tudo."
 board_games.0031.desc.middle.03: "[ROOT.Char.GetFaith.HighGodName] testemunhou meu triunfo hoje. Desde o começo eu tinha total confiança de que [ROOT.Char.GetFaith.HighGodName] me veria como vencedor; não havia outro desfecho possível."
 board_games.0031.desc.end.01: "\n\nUm[bg_loser.Custom('ES_XA')] desolad[bg_loser.Custom('ES_OA')] [bg_loser.GetFirstName] permanece sentado, com as mãos sobre os quadris, tentando compreender onde se equivocou."
 board_games.0031.desc.end.02: "\n\nDe [bg_loser.GetFirstName] não resta senão a casca vazia de um[bg_loser.Custom('ES_XA')] [bg_loser.GetWomanMan]. Não consegue acreditar que eu ganhei."
 board_games.0031.desc.end.03: "\n\n[bg_loser.GetFirstName] mal consegue conter sua fúria. [bg_loser.GetHerHim|U] o superei e humilhei."
 board_games.0031.a: "Boa partida!"
 board_games.0031.a.a: "Uma excelente partida!"
 board_games.0031.b: "Como é sentir a derrota, [Select_CString(bg_loser.IsFemale,'mujercita','hombrecillo')]?"
 board_games.0031.b.a: "Curve-se diante de mim, seu [bg_loser.Custom2('InsultNoun', ROOT.Char)|l]!"
 board_games.0031.b.b: "Não se sinta #EMP tão#! mal, nem todo mundo pode ser tão inteligente quanto eu."
 board_games.0031.b.progress_towards_rival: "[bg_loser.GetTitledFirstName] leva para o lado pessoal"
 board_games.0031.c: "Eu adoraria jogar de novo algum dia..."
 board_games.0031.a.tt.success: "Seu oponente concorda que foi uma boa partida"
 board_games.0031.a.tt.failure: "Seu oponente faz um gesto obsceno e vai embora"
 board_games.0031.desc.result.skill: "#BOL Resultado:#! Gano a [board_game_match|lE] contra [bg_loser.GetFirstNameNoTooltip] graças à minha pontuação [Concept( 'board_game_winning', 'ganadora' )|E]"
 board_games.0031.desc.result.sudden_death: "#BOL Resultado:#! Eu venço a [board_game_match|lE] contra [bg_loser.GetFirstNameNoTooltip] por [board_game_winning_sudden_death|lE]"
 board_games.0041.t: "$board_games.0000.t$"
 board_games.0041.desc.intro.01: "Uivando em triunfo bestial, [bg_victor.GetFirstName] salta para os pés.\n\nEu… eu perdi. Minhas mãos caem até meus joelhos em busca de apoio."
 board_games.0041.desc.intro.02: "Um sorriso presunçoso se estende de uma face à outra no rosto de [bg_victor.GetFirstName]. [bg_victor.GetSheHe] venceu, enquanto eu perdi.\n\n"
 board_games.0041.desc.intro.03: "Não há decepção maior do que a que sinto ao encarar os [SCOPE.Custom('BG_GamePiecePlural')] neste tabuleiro; sua disposição deixa claro que fui derrotado."
 board_games.0041.desc.middle.01: "Com [ROOT.Char.GetFaith.HighGodName] por testemunha, fiz tudo o que pude..."
 board_games.0041.desc.middle.02: "Quem diria que [bg_victor.Custom('ES_ElLa')] idiota de [bg_victor.GetFirstName] me venceria."
 board_games.0041.desc.middle.03: "\n\nEm todo caso, jogar [SCOPE.Custom('BG_GameType')] não é nada além de uma imitação barata de uma #EMP guerra de verdad#!, algo em que sou indiscutivelmente superior, em comparação com meu humilde oponente. [bg_loser.GetSheHe] terá estudado o/a [SCOPE.Custom('BG_GameType')], #EMP pero yo he estudiado la espada.#! Dito isso…"
 board_games.0041.desc.end.01: "\n\nSerá que eu sou #EMP ruim#! em [SCOPE.Custom('BG_GameType')]?"
 board_games.0041.desc.end.02: "\n\nMinhas palmas ficam suadas e meus joelhos fraquejam quando percebo que meu melhor simplesmente não basta para derrotar [bg_victor.GetFirstName]."
 board_games.0041.desc.end.03: "\n\nAquele [recipient.Custom2('InsultNoun', ROOT.Char)]! Aquele [recipient.Custom2('InsultNoun', ROOT.Char)]! Não é possível que não tenha trapaceado; como #EMP eu#! poderia perder?!"
 board_games.0041.a: "Veremos quem vence da próxima vez..."
 board_games.0041.b: "Hoje vocês ganharam um[ROOT.Char.Custom('ES_XA')] inimig[ROOT.Char.Custom('ES_OA')]."
 board_games.0041.b.b: "Continue comemorando e, por [ROOT.Char.GetFaith.HighGodName], você vai provar do meu pé!"
 board_games.0041.c: "Bem, a melhor venceu!"
 board_games.0041.desc.result.skill: "#BOL Resultado:#! Perco a [board_game_match|lE] contra [bg_victor.GetFirstNameNoTooltip] por sua pontuação [Concept( 'board_game_winning', 'ganadora' )|E]"
 board_games.0041.desc.result.sudden_death: "#BOL Resultado:#! Eu perco a [board_game_match|lE] para [bg_victor.GetFirstNameNoTooltip] por [board_game_winning_sudden_death|lE]"
 ##################################################
 #Gaining a Trinket
 board_games.0051.t: "Um Golpe de Sorte"
 board_games.0051.desc: "Mesmo agora, às vezes lembro com carinho de ter vencido [bg_loser.GetFirstName] no [SCOPE.Custom('BG_GameType')] de forma esmagadora há alguns meses. O olhar de sua [bg_loser.Custom('MaskFace')] foi #EMP impagable#!.\n\nAcho que talvez eu ainda tenha em algum lugar o tabuleiro em que jogamos. Um tabuleiro sólido, sortudo, com [SCOPE.Custom('BG_GamePiecePlural')] que testemunharam a melhor partida já jogada.\n\nSem dúvida, [bg_victor.GetFaith.KnowledgeGodName] já sorri para ele com benevolência. Seria uma tolice deixá-lo desaparecer."
 board_games.0051.a: "Ahhh, certamente trará boa sorte para sempre!"
 board_games.0051.b: "Só mais algumas peças e eu poderia ter um conjunto #EMP realmente#! raro..."
 board_games.0051.c: "Eu não preciso de brinquedos especiais."
 ##################################################
 #Debug Events
 board_games.0102.t: "O Jogo dos Jogos"
 board_games.0102.desc: "O JDJ é todos os seus jogos de tabuleiro favoritos em um só: xadrez, pachisi, hnefafetefifle, tabula.\n\nQue outros jogos você gosta?\n\nTambém poderia ter esses outros jogos, mas quanto mais, melhor!\n\n#EMP Y siglos antes, y legalmente.#!\n\nDeveríamos chamá-los apenas de jogos de tabuleiro… Estou entediado. Jogos."
 board_games.0102.a: "Jogo comum, por favor."
 board_games.0102.b: "O inimigo só usa locs de vitória, por favor."
 board_games.0102.c: "O inimigo só usa locs de derrota, por favor."
