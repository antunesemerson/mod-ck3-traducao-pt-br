 #Introductions
 board_games.0001.desc.intro.opening.defender: "[bg_opponent.GetTitledFirstName] já está esperando para começarmos nossa pequena partida de [SCOPE.Custom('BG_GameType')] sentado[bg_opponent.Custom('ES_OA')] com sua #color_blue_gray [bg_myself.Custom('BG_RandomFacialExpression')]#! estampado no rosto."
 board_games.0001.desc.intro.opening.attacker: "[bg_opponent.Custom('ES_ElLa')|U] [bg_opponent.GetTitledFirstName|l] senta-se diante de mim. Nossa pequena partida de [SCOPE.Custom('BG_GameType')] está prestes a começar, e sua #color_blue_gray [SCOPE.Custom('BG_RandomFacialExpression')]#! me indica exatamente o quão confiante está meu [bg_myself.Custom2('RelationToMeShort', bg_opponent)].\n\nComeça [bg_opponent.GetSheHe] e abre com"
 board_games.0001.desc.intro.subsequent: "Nossa partida segue em frente, com [bg_opponent.GetFirstName] continuando com"
 ##################################################
 #Opponent's Play
 board_games.0001.desc.intro.diplomacy.crit_success: "uma sequência de movimentos irritantemente ousada, sem falar atrevida."
 board_games.0001.desc.intro.diplomacy.success: "uma jogada competente e uma tirada espirituosa."
 board_games.0001.desc.intro.diplomacy.failure: "várias tentativas mal disfarçadas de subterfúgio."
 board_games.0001.desc.intro.diplomacy.crit_failure: "um esforço lamentavelmente óbvio para me confundir."
 board_games.0001.desc.intro.martial.crit_success: "uma série de jogadas estratégicas devastadoramente inovadoras."
 board_games.0001.desc.intro.martial.success: "várias estratégias adaptativas bem executadas."
 board_games.0001.desc.intro.martial.failure: "uma tentativa... #EMP robusta#! de uma estratégia coerente."
 board_games.0001.desc.intro.martial.crit_failure: "uma estratégia francamente #EMP hilária#! de tão pomposa."
 board_games.0001.desc.intro.stewardship.crit_success: "uma série de movimentos que são, matematicamente, quase impecáveis."
 board_games.0001.desc.intro.stewardship.success: "uma sequência de jogadas retumbantemente bem calculada."
 board_games.0001.desc.intro.stewardship.failure: "um conjunto de movimentos insosso e mal calculado."
 board_games.0001.desc.intro.stewardship.crit_failure: "um remendo miserável de tentativas de adivinhar as probabilidades."
 board_games.0001.desc.intro.intrigue.crit_success: "um ardil tão #EMP tortuoso#! que me deixa sem palavras."
 board_games.0001.desc.intro.intrigue.success: "uma variedade de fintas e ardis astutos."
 board_games.0001.desc.intro.intrigue.failure: "uma armadilha óbvia."
 board_games.0001.desc.intro.intrigue.crit_failure: "um gambito simplesmente patético."
 board_games.0001.desc.intro.learning.crit_success: "uma jogada saída diretamente das lendas."
 board_games.0001.desc.intro.learning.success: "algumas táticas tradicionais bem conhecidas."
 board_games.0001.desc.intro.learning.failure: "vários movimentos banalmente padrão."
 board_games.0001.desc.intro.learning.crit_failure: "uma tentativa trapalhona de replicar as jogadas de jogadores melhores."
 board_games.0001.desc.intro.prowess.crit_success: "um argumento percussivo #EMP altamente#! convincente."
 board_games.0001.desc.intro.prowess.success: "uma jogada decente e uma pegada firme."
 board_games.0001.desc.intro.prowess.failure: "uma jogada ruim e um golpe pior ainda."
 board_games.0001.desc.intro.prowess.crit_failure: "uma tentativa de força tão risível que quase se machuca[bg_opponent.Custom('ES_OA')]."
