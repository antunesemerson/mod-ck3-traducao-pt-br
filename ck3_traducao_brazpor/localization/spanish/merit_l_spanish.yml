l_spanish:
 TOTAL_MERIT: "Total de [merit|E]: $VALUE|V0$"
 MERIT_EFFECTS_BREAKDOWN: "#S Efeitos:#![AddTextIf( Not( StringIsEmpty(GetMeritLevelEffects( Character.GetMeritLevel )) ), '\n' )][GetMeritLevelEffects( Character.GetMeritLevel )]"
 MERIT_PROGRESSBAR_MARKER_TOOLTIP: "#T [GetMeritLevelNameNoTooltip( ComplexBarItem.GetIndex )]#!\nRequer [GetMeritLevelThreshold( ComplexBarItem.GetIndex )|V^] $game_concept_merit$\n\n[GetMeritModifierByLevel( ComplexBarItem.GetIndex ).GetDescWithBulletPointEffects][AddTextIf( GreaterThan_int32( ComplexBarItem.GetIndex, '(int32)1' ), '\n' )]$BULLET$[movement_power|E]: [Multiply_int32( ComplexBarItem.GetIndex, '(int32)10' )|+=0] [movement_power_i]\n[GetMaxAppointmentRankDescription( 'merit', ComplexBarItem.GetIndex )][Character.GetMeritLevelDescription( ComplexBarItem.GetIndex )]"
 MERIT_TOOLTIP_COMPLETED_EXAMINATIONS: "[imperial_examinations|E] concluídos"
 MERIT_TOOLTIP_EXAMINATION_DISCLAIMER: "[governors|El] devem se aposentar para concluir mais exames"
 MERIT_TOOLTIP_EXAMINATION_PASSED_CHILD_EXAM: "@child_exam_icon! #T Exame Infantil#!\n$CHILDRENS_EXAMINATION_PASSED_FAIL$\n\nRealizado por meio da [decision|El] $tgp_china_attend_child_exam_decision$"
 MERIT_TOOLTIP_EXAMINATION_PASSED_PROVINCIAL_EXAM: "@provincial_exam_icon! #T Examen provincial#!\n[SelectLocalization( HasPassedProvincialExamination(Character), 'EXAMINATION_PASSED', SelectLocalization(HasFailedProvincialExamination(Character),'EXAMINATION_FAILED','EXAMINATION_NOT_TAKEN') )]\n\n#S Al aprobar:#!\n[GetModifier( 'tgp_passed_provincial_exam_modifier' ).GetDescWithBulletPointEffects]\n\nRealizado por oficiais do governo na [activity|El] [GetActivityType('activity_local_examination').GetName]"
 MERIT_TOOLTIP_EXAMINATION_PASSED_METROPOLITAN_EXAM: "@metropolitan_exam_icon! #T Examen metropolitano#!\n[SelectLocalization( HasPassedMetropolitanExamination(Character), 'EXAMINATION_PASSED', SelectLocalization(HasFailedMetropolitanExamination(Character),'EXAMINATION_FAILED','EXAMINATION_NOT_TAKEN') )]\n\n#S Al aprobar:#!\n[GetModifier( 'tgp_passed_metropolitan_exam_modifier' ).GetDescWithBulletPointEffects]\n\nCelebrado por el [government|lE] [GetGovernment('celestial_government').GetName|lE] en la [activity|lE] [GetActivityType('activity_imperial_examination').GetName]"
 MERIT_TOOLTIP_EXAMINATION_PASSED_PALACE_EXAM: "@palace_exam_icon! #T Examen palaciego#!\n[SelectLocalization( HasPassedPalaceExamination(Character), 'EXAMINATION_PASSED', 'EXAMINATION_NOT_TAKEN' )]\n\n#S Al aprobar:#!\n[GetModifier( 'tgp_passed_palace_exam_modifier' ).GetDescWithBulletPointEffects]\n\nRealizado diante do [son_of_heaven|E] na [activity|lE] [GetActivityType('activity_imperial_examination').GetName]"
 CHILDRENS_EXAMINATION_PASSED_FAIL: "[SelectLocalization( HasPassedChildrenExamination(Character), 'EXAMINATION_PASSED', SelectLocalization(HasFailedChildrenExamination(Character), SelectLocalization(Character.IsAdult, 'EXAMINATION_FAILED_NO_RETAKE' , 'EXAMINATION_FAILED') ,'EXAMINATION_NOT_TAKEN') )]"
 EXAMINATION_PASSED: "@passed_examination!#P Aprovado#!"
 EXAMINATION_FAILED_NO_RETAKE: "@failed_examination!#N Reprovado#!"
 EXAMINATION_FAILED: "$EXAMINATION_FAILED_NO_RETAKE$ #weak (pode ser repetido)#![AddLocalizationIf(And(And(Character.IsMeritCapped, Character.IsAdult), Or(ObjectsEqual(GetPlayer, Character.GetWarden.Self), Character.IsLocalPlayer)), 'EXAMINATION_WOULD_TAKE')]"
 EXAMINATION_NOT_TAKEN: "#weak Não realizado#![AddLocalizationIf(And(And(And(Character.IsMeritCapped, Character.CanImproveMeritRank), Character.IsAdult), Or(ObjectsEqual(GetPlayer, Character.GetWarden.Self), Character.IsLocalPlayer)), 'EXAMINATION_WOULD_TAKE')]"
 EXAMINATION_WOULD_TAKE: "\n\nEl [merit_level|El] máximo de [Select_Cstring( Character.Islocalplayer, 'tu personaje', Character.GetShortUIName )] está limitado al no haber aprobado este [examination|El]. [SelectLocalization(Character.IsLocalPlayer, 'EXAMINATION_WOULD_TAKE_ME', 'EXAMINATION_WOULD_TAKE_OTHER')]"
 EXAMINATION_WOULD_TAKE_ME: "Você deveria participar de um."
 EXAMINATION_WOULD_TAKE_OTHER: "[Character.GetSheHe|U] se juntará a você se você comparecer a um e estiver disponível."
 MERIT_GOVERNOR_APPOINTMENT_SCORE_POSITIVE: "$BULLET$[candidate_score|E]: @appointment_score!#P +[Character.GetGovernorAppointmentScoreByMerit]#!"
 MERIT_GOVERNOR_APPOINTMENT_SCORE_NEGATIVE: "$BULLET$[candidate_score|E]: @appointment_score!#N [Character.GetGovernorAppointmentScoreByMerit]#!"
 MERIT_MOVEMENT_POWER: "$BULLET$[movement_power|E]: [movement_power_i] [Character.GetMovementPowerByMerit|+=0]"
 MERIT_PROGRESS_HEADING: "Progresso até o próximo $game_concept_merit_level$"
 MAX_MERIT_RANK_BREAKDOWN_TOOLTIP: "#T [merit_level|E] máximo#!\n[PlayerValueItem.GetMaxLevelBreakdown( Character.Self )]"
 MERIT_CAP_OVERFLOW_WILL_COUNT: "#weak O mérito obtido enquanto estiver no limite de Mérito contará para níveis mais altos assim que os Exames forem aprovados.#!"
 MERIT_RANK_CAP_TT: "#T No limite de Mérito#!\n[SelectLocalization( Character.GetGovernment.IsType( 'celestial_government' ), 'MERIT_RANK_CAP_CELESTIAL_TT', 'MERIT_RANK_CAP_MERITOCRATIC_TT')]"
 MERIT_RANK_CAP_CELESTIAL_TT: "[AddLocalizationIf( Character.ShouldShowExaminationRequirement( '(int32)3' ), 'MERIT_RANK_CAP_CELESTIAL_PROVINCIAL_EXAMINATION_TT' )][AddLocalizationIf( Character.ShouldShowExaminationRequirement( '(int32)5' ), 'MERIT_RANK_CAP_CELESTIAL_METROPOLITAN_EXAMINATION_TT' )][AddLocalizationIf( Character.ShouldShowExaminationRequirement( '(int32)7' ), 'MERIT_RANK_CAP_CELESTIAL_PALACE_EXAMINATION_TT' )]\n\n$MERIT_CAP_OVERFLOW_WILL_COUNT$"
 MERIT_RANK_CAP_MERITOCRATIC_TT: "[AddLocalizationIf( Character.ShouldShowExaminationRequirement( '(int32)4' ), 'MERIT_RANK_CAP_MERITOCRATIC_PROVINCIAL_EXAMINATION_TT' )]\n\n$MERIT_CAP_OVERFLOW_WILL_COUNT$"
 MERIT_RANK_CAP_NO_EXAMINATION_TT: "Qualquer um pode alcançar @merit_level_1_icon![GetModifier( 'merit_level_1' ).GetNameWithTooltip|L]"
 MERIT_RANK_CAP_CELESTIAL_PROVINCIAL_EXAMINATION_TT: "Concluir o Exame Provincial (ou superior) é necessário para alcançar @merit_level_3_icon![GetModifier( 'merit_level_3' ).GetNameWithTooltip|L]"
 MERIT_RANK_CAP_CELESTIAL_METROPOLITAN_EXAMINATION_TT: "Concluir o Exame Metropolitano (ou superior) é necessário para alcançar @merit_level_5_icon![GetModifier( 'merit_level_5' ).GetNameWithTooltip|L]"
 MERIT_RANK_CAP_CELESTIAL_PALACE_EXAMINATION_TT: "Concluir o Exame do Palácio é necessário para alcançar @merit_level_7_icon![GetModifier( 'merit_level_7' ).GetNameWithTooltip|L]"
 MERIT_RANK_CAP_MERITOCRATIC_PROVINCIAL_EXAMINATION_TT: "Concluir o Exame Provincial (ou superior) é necessário para alcançar @merit_level_4_icon![GetModifier( 'merit_level_4' ).GetNameWithTooltip|L]"
