 celestial_government_merit_level_0_description: "\n\nParticipe de [imperial_examinations|El] para avançar em sua patente."
 celestial_government_merit_level_1_description: "\n\nParticipe de [imperial_examinations|El] para avançar para [GetModifier( 'merit_level_2' ).GetNameWithTooltip|L]."
 celestial_government_merit_level_2_description: "\n\nParticipe de [imperial_examinations|El] para avançar para [GetModifier( 'merit_level_3' ).GetNameWithTooltip|L]."
 celestial_government_merit_level_3_description: "\n\nPara o [government|El] [GetGovernment('celestial_government').GetName|l]: para alcançar esta patente, espera-se que os estudiosos tenham concluído o [provincial_examination|El]. Prosseguir para [GetModifier( 'merit_level_4' ).GetNameWithTooltip|L] exige aprovação em [examinations|El] de nível superior."
 celestial_government_merit_level_4_description: "\n\nPara o [government|El] [GetGovernment('celestial_government').GetName|l]: para alcançar esta patente, espera-se que os estudiosos tenham concluído o [provincial_examination|El]. Prosseguir para [GetModifier( 'merit_level_5' ).GetNameWithTooltip|L] exige aprovação no [metropolitan_examination|El]."
 celestial_government_merit_level_5_description: "\n\nPara o [government|El] [GetGovernment('celestial_government').GetName|l]: espera-se que os oficiais neste [merit_level|El] tenham concluído o [metropolitan_examination|El]. A próxima patente é [GetModifier( 'merit_level_6' ).GetNameWithTooltip|L]."
 celestial_government_merit_level_6_description: "\n\nPara o [government|El] [GetGovernment('celestial_government').GetName|l]: os oficiais nesta patente devem ter concluído o [metropolitan_examination|El]. A próxima patente é [GetModifier( 'merit_level_7' ).GetNameWithTooltip|L]."
 celestial_government_merit_level_7_description: "\n\nPara o [government|El] [GetGovernment('celestial_government').GetName|l]: espera-se que os oficiais desta patente tenham concluído o [palace_examination|El]. A próxima patente é [GetModifier( 'merit_level_8' ).GetNameWithTooltip|L]."
 celestial_government_merit_level_8_description: "\n\nPara o [government|El] [GetGovernment('celestial_government').GetName|l]: espera-se que os oficiais desta patente tenham concluído o [palace_examination|El]. A próxima patente é [GetModifier( 'merit_level_9' ).GetNameWithTooltip|L]."
 celestial_government_merit_level_9_description: "\n\nPara o [government|El] [GetGovernment('celestial_government').GetName|l]: espera-se que os oficiais desta patente tenham concluído o [palace_examination|El]."
 SORT_MERIT: "$game_concept_merit$"
