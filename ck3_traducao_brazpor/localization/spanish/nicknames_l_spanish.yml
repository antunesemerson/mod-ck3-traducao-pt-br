 nick_the_stallion: "o Garanhão"
 nick_the_stallion_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] forte, atlétic[CHARACTER.Custom('ES_OA')]… e muitas vezes se [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] olha com olhos de desejo."
 nick_the_forgetful: "o/a Esquecid[CHARACTER.Custom('ES_OA')]"
 nick_the_forgetful_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te olvidas', 'se olvida' )] frequentemente de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] deveres, para consternação de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] súditos."
 nick_the_hermit: "o/a Eremit[CHARACTER.Custom('ES_OA')]"
