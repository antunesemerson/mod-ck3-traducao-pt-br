 nick_wolf_slayer: "[CHARACTER.Custom('ES_ElLa')] Matador de Lobos"
 nick_wolf_slayer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] conhecido em toda a região por ser quem matou com bravura um lobo feroz no acampamento."
 nick_wolf_father: "o Pai dos Lobos"
 nick_wolf_father_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] célebre em toda a região por ter ajudado uma loba prenhe a dar à luz uma ninhada de filhotes."
 nick_wolf_mother: "a Mãe dos Lobos"
 nick_wolf_mother_desc: "$nick_wolf_father_desc$"
 nick_old_man_of_the_mountain: "o Velho da Montanha"
 nick_old_man_of_the_mountain_desc: "Com uma longa barba branca e um bastão torto, [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] temid[CHARACTER.Custom('ES_OA')] pelos não crentes por organizar e liderar os temidos Assassinos desde sua fortaleza nas montanhas."
 nick_barbarossa: "Barbarossa"
 nick_barbarossa_desc: "Em duvidoso reconhecimento aos cabelos antes escarlates que outrora lhe adornavam o queixo, [CHARACTER.GetShortUINameNoTooltipNoFormat] recebeu o apelido de #italic Barbarrossa#! —Barbarroja— por parte de seus inimigos italianos."
 nick_danishmend: "Danişmend"
 nick_danishmend_desc: "Dotado[CHARACTER.Custom('ES_OA')] de profundo conhecimento, a erudição de [CHARACTER.LocalPlayerString( 'sua pessoa', CHARACTER.GetShortUINameNoFormat )] é amplamente conhecida e respeitada por רבים."
 nick_protosebastos: "Protosebastos"
 nick_protosebastos_desc: "Uma alta honra da corte bizantina reservada a pouquíssimos, o título de \"primeiro Augusto\" marca [CHARACTER.GetShortUINameNoTooltipNoFormat] com estima imperial."
