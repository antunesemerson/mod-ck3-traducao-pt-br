 nick_the_merciful: "o/a Compassivo[CHARACTER.Custom('ES_OA')]"
 nick_the_merciful_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] indulgente, benevolente e lent[CHARACTER.Custom('ES_OA')] para a ira. É raro que os prisioneiros pasem muito tempo em [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] masmorras."
 nick_the_silver_tongue: "Língua de Prata"
