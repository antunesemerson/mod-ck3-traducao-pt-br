 nick_the_poetaster_desc: "A poesia de [CHARACTER.GetShortUINameNoTooltipNoFormat] ? famosa, mas talvez n?o pelos motivos que [CHARACTER.GetSheHe] gostaria."
 nick_the_elysian_muse: "a Musa Elísia"
 nick_the_elysian_muse_desc: "Renomad nesta terra e em muitas outras pela capacidade absolutamente transcendente de conjurar versos magníficos, [CHARACTER.GetShortUINameNoTooltipNoFormat] demonstra domínio completo da palavra falada em todas as suas formas."
 nick_iscariot: "Iscariotes"
 nick_iscariot_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ? conhecid[CHARACTER.Custom('ES_OA')] por trair os princ?pios mais firmes e preciosos de seu cora??o, vendendo-os todos em benef?cio pr?prio."
 nick_the_foreign_mother: "o [CHARACTER.GetMother.GetCulture.GetNameNoTooltip]"
 nick_the_foreign_mother_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'eres', 'es')] incapaz de superar a vergonha de uma herança materna estrangeira, e [Select_CString(CHARACTER.IsLocalPlayer,'tienes', 'tiene')] ter de sofrer uma série de provocações étnicas baratas."
 nick_the_foreign_father: "[CHARACTER.Custom('ES_ElLa')] da nação [CHARACTER.GetFather.GetCulture.GetNameNoTooltip]"
 nick_the_foreign_father_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'eres', 'es')] incapaz de superar a vergonha de uma herança paterna estrangeira, e [Select_CString(CHARACTER.IsLocalPlayer,'tienes', 'tiene')] ter de suportar uma enxurrada de provocações étnicas baratas."
 nick_the_corpulent: "[CHARACTER.Custom('ES_ElLa')] Corpulento[CHARACTER.Custom('ES_OA')]"
 nick_the_corpulent_desc: "Cavalos e pisos estremecem por igual sob a massa de carne gordurosa que [Select_CString(CHARACTER.IsLocalPlayer,'eres', 'es')] [CHARACTER.GetShortUINameNoTooltipNoFormat]"
 nick_the_insubordinate: "[CHARACTER.Custom('ES_ElLa')] Insubordinado[CHARACTER.Custom('ES_OA')]"
 nick_the_insubordinate_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] sempre [Select_CString(CHARACTER.IsLocalPlayer,'estás', 'está')] dispost[CHARACTER.Custom('ES_OA')] a resistir e retaliar, um servo terrível e um vassalo desleal."
 nick_the_backstabber: "[CHARACTER.Custom('ES_ElLa')] Traidor[CHARACTER.Custom('ES_OA')]"
 nick_the_backstabber_desc: "Muitas adagas, literais e figurativas, foram cravadas entre as omoplatas a mando de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_corrupt: "[CHARACTER.Custom('ES_ElLa')] Corrupto[CHARACTER.Custom('ES_OA')]"
 nick_the_corrupt_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'eres', 'es')] uma criatura inteligente que se senta sobre um amontoado de ouro de procedência questionável."
 nick_the_incompetent: "[CHARACTER.Custom('ES_ElLa')] Incompetente"
 nick_the_incompetent_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] n?o foi feit[CHARACTER.Custom('ES_OA')] para o poder e a responsabilidade colocados em suas m?os."
 nick_the_gambler: "[CHARACTER.Custom('ES_ElLa')] Jogador[CHARACTER.Custom('ES_XA')]"
 nick_the_gambler_desc: "As apostas de [CHARACTER.GetShortUINameNoTooltipNoFormat] s?o monumentais, mesmo quando as chances s?o pequenas... e #EMP especialmente#! quando h? muito em jogo."
 nick_the_obscene: "[CHARACTER.Custom('ES_ElLa')] Obsceno[CHARACTER.Custom('ES_OA')]"
 nick_the_obscene_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'eres', 'es')] célebre por uma vulgaridade franca e cheia de palavrões. A inocência não sobrevive muito tempo ao alcance da voz."
 nick_the_miser: "[CHARACTER.Custom('ES_ElLa')] Avaro[CHARACTER.Custom('ES_OA')]"
 nick_the_miser_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'eres', 'es')] avarento a ponto de ser excessivo, para desgosto de servos e parentes."
 nick_the_unfortunate: "[CHARACTER.Custom('ES_ElLa')] Desafortunado[CHARACTER.Custom('ES_OA')]"
 nick_the_unfortunate_desc: "Há algo que faz da mera existência de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]… uma desgraça. Sabe-se que permanecer à sombra de [Select_CString(CHARACTER.IsLocalPlayer,'sua', 'sua')] estandarte causa inquietação."
 nick_brown_cheeks: "Bochechas Marrons"
 nick_brown_cheeks_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat] tentou iniciar uma revolta contra seu l?der e... ficou apavorad[CHARACTER.Custom('ES_OA')]."
 nick_the_drunkard_michael_iii: "o Bêbado"
 nick_the_drunkard_michael_iii_desc: "Pobre Miguel, um jovem imperador, derrubado por sua indulgência alcoólica #EMP tão pouco cristã#!. Uma lição para todos nós de que o nascimento pode indicar talento, mas não o garante."
 nick_the_pious_michael_iii: "o Piedoso"
 nick_the_pious_michael_iii_desc: "Embora um acidente trágico tenha levado sua vida cedo demais, Miguel certamente ocupa um alto lugar nas graças do Céu por seu papel #EMP crucial#! em pôr fim à iconoclastia."
 nick_the_young_michael_iii: "o Jovem"
 nick_the_young_michael_iii_desc: "Governando desde a infância, parece uma piada cruel que Miguel tenha tido um reinado tão longo e, ainda assim, morrido tão jovem. Acidentalmente."
 nick_the_exile: "o/a Exilad[CHARACTER.Custom('ES_OA')]"
 nick_the_exile_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] foi expuls[CHARACTER.Custom('ES_OA')] de seu lar ou precisou deix?-lo para escapar de algum fardo imprevisto, buscando ref?gio no exterior."
 nick_lackland_young: "Sem-Terra"
 nick_lackland_young_desc: "Pobre de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )], nascid[CHARACTER.Custom('ES_OA')] [CHARACTER.Custom('ES_ElLa')] mais novo entre uma série de irmãos ilustres. Como se pode esperar de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetSheHe )] governar qualquer coisa que seja?"
 nick_lackland_ironic: "$nick_lackland_young$"
 nick_lackland_ironic_desc: "Pode ser que [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'fueras', 'fuera' )] no passado fosse filh[CHARACTER.Custom('ES_OA')] de grandes senhores, mas [Select_CString( CHARACTER.IsLocalPlayer, 'te labraste', 'se labró' )] um domínio respeitável apesar de todas as adversidades… e das risadinhas pouco sutis."
 nick_lackland_old: "$nick_lackland_young$"
 nick_lackland_old_desc: "Quão embaraçoso deve ser para [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] chegar a [Select_CString( CHARACTER.IsLocalPlayer, 'hacerte', 'hacerse' )] com a posse de um patrimônio tão grande, apenas para perder boa parte dele — e quão profético [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] epíteto."
 nick_curtmantle: "Manto Curto"
 nick_curtmantle_desc: "[CHARACTER.GetWomanMan|U] pr?tic[CHARACTER.Custom('ES_OA')], [CHARACTER.GetShortUINameNoTooltipNoFormat] ? c?lebre por preferir capas de viagem mais curtas a trajes mais floridos ou elaborados."
 #BP3
 nick_pauper_king: "[Select_CString( CHARACTER.IsFemale, 'la Reina', 'el Rey' )] Convidador[CHARACTER.Custom('ES_XA')]"
 nick_pauper_king_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] célebre por essa tendência [Select_CString( CHARACTER.IsLocalPlayer, 'tuya', 'suya' )] a beber com os moradores locais de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] povoados e cidades."
 nick_the_mapmaker: "[CHARACTER.Custom('ES_ElLa')] Cartógrafo[CHARACTER.Custom('ES_OA')]"
 nick_the_mapmaker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] célebre por ser bem viajado, mas também por ter passado um tempo considerável desenhando mapas das áreas que [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] visitou."
 nick_the_ploughman: "[CHARACTER.Custom('ES_ElLa')] Arador[CHARACTER.Custom('ES_XA')]"
 nick_the_ploughman_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U], ent?o [Select_CString( CHARACTER.IsFemale, 'uma humilde camponesa', 'um humilde campon?s' )], foi encontrad[CHARACTER.Custom('ES_OA')] lavrando a terra quando os emiss?rios chegaram para convoc?-[CHARACTER.Custom('ES_LoLa')] ao trono."
 #MPO
 nick_the_dreadful: "[CHARACTER.Custom('ES_ElLa')] Temível"
 nick_the_dreadful_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acredita que a única forma de ser respeitad é ser temid."
 #TGP
 nick_shinno: "Shin'nō"
 nick_shinno_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'és', 'é' )] célebre por ter-[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] proclamado "[Select_CString( CHARACTER.IsFemale, 'a nova imperatriz', 'o novo imperador' )]" do Japão, e liderar uma rebelião contra o governo central."
 nick_murasaki_shikibu: "Murasaki Shikibu"
 nick_murasaki_shikibu_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat] é conhecid pelo epíteto #EMP Murasaki Shikibu#!, derivado da flor de glicínia roxa — #EMP murasaki#! — conhecida como #EMP fujiwara#!, da qual sua família tirou o nome, e do cargo de seu pai no #EMP Shikibu-shō#!, o Ministério dos Assuntos Cerimoniais."
 nick_izumi_shikibu: "Izumi Shikibu"
 nick_izumi_shikibu_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat] é conhecid pelo epíteto #EMP Izumi Shikibu#!, derivado do cargo de seu marido como governador da província de #EMP Izumi#! e do cargo de seu pai no #EMP Shikibu-shō#!, o Ministério dos Assuntos Cerimoniais."
 nick_sei_shonagon: "Sei Shōnagon"
 nick_sei_shonagon_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat] é conhecid pelo epíteto #EMP Sei Shōnagon#!, derivado de #EMP Sei#!, uma leitura chinesa de #EMP Kiyohara#!, seu nome de família, e do cargo de um parente homem como #EMP Shōnagon#!, Conselheiro Menor de Estado."
 nick_the_fierce: "[CHARACTER.Custom('ES_ElLa')] Feroz"
 nick_the_fierce_desc: "A reputação de tenacidade de [CHARACTER.GetShortUINameNoTooltipNoFormat|U] precede em muito [CHARACTER.GetHerHim]."
 nick_tenjin: "Tenjin"
 nick_tenjin_desc: "Acredita-se que [CHARACTER.GetShortUINameNoTooltipNoFormat|U] tenha se tornado um espírito vingativo após o tratamento injusto que recebeu e agora é adorad como um ser celestial."
 nick_ushiwakamaru: "Ushiwakamaru"
 nick_ushiwakamaru_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] tem fama de ter a força e a tenacidade de um touro jovem, e todos ao redor de [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] temem."
 nick_ho_seung: "Ho-seung"
 nick_ho_seung_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] tem uma lenda em torno de sua pessoa sobre um tigre que morreu ao cair em uma armadilha, renasceu como humano e se tornou monge. Segundo o relato, esse monge ? [CHARACTER.GetHerselfHimself]."
