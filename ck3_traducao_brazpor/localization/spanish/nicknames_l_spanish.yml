 nick_twistedbeard: "Barba Retorcida"
 nick_twistedbeard_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] um[CHARACTER.Custom('ES_XA')] governante bret[CHARACTER.Custom('ES_OnOna')] ou de ascendência bretã com grande destreza marcial."
 nick_the_boar: "o Javali"
 nick_the_boar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] forte, resistente e tenaz… mas não agradável à vista."
 nick_the_faceless: "o Sem-Rosto"
 nick_the_faceless_desc: "A [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] quase nunca se [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] vê desde que [Select_CString( CHARACTER.IsLocalPlayer, 'quedaste', 'quedó' )] desfigurad[CHARACTER.Custom('ES_OA')]."
