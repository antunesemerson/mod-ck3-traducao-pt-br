 kurultai_task.1451.desc: "De algum modo, meus saqueadores parecem ainda menos impressionantes agora do que quando [councillor.GetShortUIName] começou a trabalhar com eles."
 kurultai_task.1456.notification: "Saqueadores Lastimáveis"
