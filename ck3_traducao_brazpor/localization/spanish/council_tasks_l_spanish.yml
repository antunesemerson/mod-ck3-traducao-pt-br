 #Kurultai Task Tooltips
 kurultai_task.1001.notification: "Rebanhos Prósperos"
 kurultai_task.1001.desc: "Graças ao trabalho árduo de [councillor.GetShortUIName], nossos rebanhos estão prosperando."
 kurultai_task.1006.notification: "Recrutando Horda"
 kurultai_task.1006.desc: "Um pequeno grupo de pastores que foi expulso de suas terras jurou lealdade à nossa tribo."
 kurultai_herder_army: "Horda de Pastores"
 kurultai_task.1051.notification: "Rebanhos em Declínio"
 kurultai_task.1051.desc: "Apesar do trabalho árduo de [councillor.GetShortUIName], observamos o declínio de nossos rebanhos."
 kurultai_task.1056.notification: "Controle em Declínio"
 kurultai_task.1056.desc: "Os esforços de [councillor.GetShortUIName] para melhorar nossos rebanhos causaram transtornos e conflitos entre nosso povo."
 kurultai_task.1101.notification: "Fertilidade Florescente"
 kurultai_task.1101.desc: "[county.GetDefinitiveName] está florescendo graças a [councillor.GetShortUIName]."
 kurultai_task.1106.notification: "Governo Popular"
 kurultai_task.1106.desc: "O trabalho de [councillor.GetShortUIName] em [county.GetDefinitiveName] teve benefícios inesperados."
 kurultai_task.1151.notification: "Fertilidade em Declínio"
 kurultai_task.1151.desc: "[councillor.GetShortUIName] conseguiu administrar mal nossos rebanhos em [county.GetDefinitiveName], fazendo a fertilidade da área diminuir."
 kurultai_task.1156.notification: "Governo Impopular"
 kurultai_task.1156.desc: "A gestão de [councillor.GetShortUIName] em [county.GetNameNoTier] provou ser incrivelmente impopular, e isso reflete sobre meu governo como [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 kurultai_task.1201.notification: "Governo Piedoso"
 kurultai_task.1201.desc: "Meu povo ficou impressionado com o trabalho que [astrologer.GetShortUIName] e [councillor.GetShortUIName] estão fazendo em meu nome."
 kurultai_task.1206.notification: "$court_astrologer_court_position$ Amigável"
 kurultai_task.1206.desc: "Meu [kurultai|lE] [councillor.GetShortUIName] vem construindo um vínculo mais próximo com [astrologer.GetShortUIName] em meu nome."
 kurultai_task.1251.notification: "Governo Vergonhoso"
 kurultai_task.1251.desc: "Meu povo está condenando [astrologer.GetShortUIName] e [councillor.GetShortUIName] por abusarem de suas posições."
 kurultai_task.1256.notification: "$court_astrologer_court_position$ Furioso"
 kurultai_task.1256.desc: "Meu [kurultai|lE] [councillor.GetShortUIName] está constantemente em desacordo com meu $court_astrologer_court_position$ [astrologer.GetShortUIName]."
 kurultai_task.1301.notification: "Descobertas Inesperadas"
 kurultai_task.1301.desc: "[councillor.GetShortUIName] conseguiu reunir mais ouro do que o esperado em [county.GetNameNoTier]."
 kurultai_task.1306.notification: "Construindo uma Reputação"
 kurultai_task.1306.desc: "Ganhei a reputação de ser um[ROOT.Char.Custom('ES_XA')] governante temável após encarregar [councillor.GetShortUIName] de explorar [county.GetNameNoTier]."
 kurultai_task.1351.notification: "Terras Exploradas"
 kurultai_task.1351.desc: "As tentativas de [councillor.GetShortUIName] de extrair o máximo de [county.GetNameNoTier] tiveram efeitos colaterais inesperados, mas pouco surpreendentes."
 kurultai_task.1356.notification: "Povo Explorado"
 kurultai_task.1356.desc: "O trabalho de [councillor.GetShortUIName] teve efeitos desastrosos sobre as tribos locais que vivem em [county.GetNameNoTier]."
 kurultai_task.1401.notification: "Saqueadores Impressionantes"
