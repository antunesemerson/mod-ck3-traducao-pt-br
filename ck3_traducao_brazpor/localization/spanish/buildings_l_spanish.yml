 building_hall_of_heroes_05: "Salão dos Heróis V"
 building_hall_of_heroes_05_desc: "$building_type_hall_of_heroes_01_desc$"
 building_type_special_sicilian_parliament_01: "Parlamento"
 building_type_special_sicilian_parliament_01_desc: "$building_special_sicilian_parliament_01_desc$"
 building_special_sicilian_parliament_01: "Parlamento"
 building_special_sicilian_parliament_01_desc: "Representantes dos Três Estados reúnem-se regularmente neste edifício para deliberar sobre os assuntos do reino e aconselhar o governante atual."
 building_special_greenhouse_01: "Monumento de Vidro"
 building_special_greenhouse_01_desc: "Este edifício é aparentemente excelente para cultivar vegetais."
 building_type_special_greenhouse_01: "Monumento de Vidro"
 building_type_special_greenhouse_01_desc: "Este edifício é aparentemente excelente para cultivar vegetais."
 building_type_university_01: "Universidade"
 building_type_university_01_desc: "Um lugar de ensino superior para aqueles com influência e ouro suficientes para obter admissão."
 building_university_01: "Universidade I"
 building_university_01_desc: "$building_type_university_01_desc$"
 building_university_02: "Universidade II"
 building_university_02_desc: "$building_type_university_01_desc$"
 building_university_03: "Universidade III"
 building_university_03_desc: "$building_type_university_01_desc$"
 building_university_04: "Universidade IV"
 building_university_04_desc: "$building_type_university_01_desc$"
 building_university_05: "Universidade V"
 building_university_05_desc: "$building_type_university_01_desc$"
 building_university_06: "Universidade VI"
 building_university_06_desc: "$building_type_university_01_desc$"
 building_type_pastures_01: "Pastagens de Gado"
 building_type_pastures_01_desc: "Uma parte significativa desta província é dedicada à criação de animais e usada como pastagem para rebanhos de animais de criação."
 building_pastures_01: "Pastagens Simples"
 building_pastures_01_desc: "As pastagens são usadas pelos camponeses locais para manter animais menores, como ovelhas ou cabras."
 building_pastures_02: "Propriedades Rurais"
 building_pastures_02_desc: "As propriedades rurais abrigam camponeses agricultores, que cultivam grãos e criam animais para seu próprio uso."
 building_pastures_03: "Prados"
 building_pastures_03_desc: "Os prados são usados tanto para pastagem quanto para produzir feno para tempos mais difíceis."
 building_pastures_04: "Galinheiros"
 building_pastures_04_desc: "Os galinheiros abrigam aves fáceis de criar, valorizadas tanto por seus ovos quanto por sua carne."
 building_pastures_05: "Currais de Gado"
 building_pastures_05_desc: "Os currais de gado são resistentes o suficiente para manter animais maiores contidos e seguros."
 building_pastures_06: "Apiários"
 building_pastures_06_desc: "Entre a floresta e os campos, abelhas alojadas em apiários produzem mel muito valorizado."
 building_pastures_07: "Currais"
 building_pastures_07_desc: "Os grandes currais abrigam cavalos e outros animais de carga, mantendo-os seguros e bem cuidados."
 building_pastures_08: "Fazendas de Gado"
 building_pastures_08_desc: "As fazendas são ideais para abrigar rebanhos maiores de gado, pois oferecem ampla pastagem e muito espaço para se mover."
 building_type_orchards_01: "Pomares"
 building_type_orchards_01_desc: "Graças às propriedades únicas do solo, estes pomares produzem frutas e bagas particularmente doces e deliciosas."
 building_orchards_01: "Pomares de Fruta"
 building_orchards_01_desc: "Pomares de fruta especializados, embora pequenos, produzem uma colheita mais abundante e de maior qualidade."
 building_orchards_02: "Bosques de Bagas"
 building_orchards_02_desc: "Fileiras de arbustos de bagas quebram a monotonia das árvores frutíferas."
 building_orchards_03: "Plantações de Árvores Frutíferas"
 building_orchards_03_desc: "Uma grande área, organizada e bem espaçada, cheia de árvores bem podadas, todas produzindo frutas ou nozes."
 building_orchards_04: "Apicultores"
 building_orchards_04_desc: "Intercalar apiários entre as árvores gera produção de mel e torna todo o pomar mais produtivo."
 building_orchards_05: "Fileiras de Nogueiras"
 building_orchards_05_desc: "Além das árvores frutíferas, fileiras de árvores que produzem nozes estendem-se ao longe."
 building_orchards_06: "Jardins Mistos"
 building_orchards_06_desc: "Todos os tipos de árvores, tanto locais quanto importadas, são distribuídos pelo pomar — garantindo uma colheita frutífera independentemente das circunstâncias."
 building_orchards_07: "Grandes Pomares"
 building_orchards_07_desc: "Até onde a vista alcança, há fileira após fileira de árvores frutíferas."
 building_orchards_08: "Árvores Enxertadas"
 building_orchards_08_desc: "Ao enxertar certas árvores umas nas outras, a propagação de frutas e nozes de crescimento lento é muito ampliada."
 building_type_farm_estates_01: "Casas Senhoriais"
 building_type_farm_estates_01_desc: "Os Senhores e as Senhoras da mansão empregam centenas de camponeses para cultivar seus campos e cuidar de seu gado. Quanto mais poder detêm, mais terras seus súditos podem trabalhar e, mais importante, mais impostos gerarão."
 building_farm_estates_01: "Mansões"
 building_farm_estates_01_desc: "As mansões abrigam famílias proprietárias de terras, seus serviçais e os camponeses que trabalham em seus campos."
 building_farm_estates_02: "Jardins e Plantações de Vegetais"
 building_farm_estates_02_desc: "Anexos às mansões há grandes jardins e campos de vegetais maduros, tornando-as essencialmente autossustentáveis."
 building_farm_estates_03: "Propriedades Agrícolas"
 building_farm_estates_03_desc: "As propriedades agrícolas exercem jurisdição sobre os campos, florestas e dependências ao seu redor."
 building_farm_estates_04: "Campos de Cem Acres"
 building_farm_estates_04_desc: "Os vastos campos de cem acres empregam dezenas de camponeses e trazem grande riqueza para a família que possui a terra."
 building_farm_estates_05: "Terras Hereditárias Livres"
 building_farm_estates_05_desc: "As terras hereditárias livres são imensas, com vastas extensões ao seu redor — como são transmitidas de forma hereditária, as famílias que nelas vivem têm amplo tempo para otimizar o rendimento de suas terras."
 building_farm_estates_06: "Moinhos de Vento"
 building_farm_estates_06_desc: "Os moinhos de vento eliminam grande parte do trabalho de moer farinha, aumentando enormemente a eficiência."
 building_farm_estates_07: "Propriedades Consolidadas"
 building_farm_estates_07_desc: "As famílias mais ricas compram as mais pobres, consolidando suas posses em propriedades vastas, todas trabalhando sob a mesma direção e, mais importante, pagando seus impostos em conjunto."
 building_farm_estates_08: "Grandes Propriedades"
 building_farm_estates_08_desc: "Propriedades vastas em uma escala raramente vista, estes grandes complexos podem manter uma casa com milhares de pessoas."
 farm_estates_3_4_trigger: "Requer um dos seguintes:\n$EFFECT_LIST_BULLET$[holder_possessive|El] [culture|El] possui a [innovation|El] #V $innovation_manorialism$#!, e esta [province|El] é [GetTerrain( 'farmlands' ).GetName|l] e possui uma [holding|El] de Nível 2\n$EFFECT_LIST_BULLET$[holder_possessive|El] [culture|El] possui a [tradition|El] [GetCultureTradition('tradition_pastoralists').GetName|V], e esta [province|El] possui o [building|El] [GetBuilding('pastures_04').GetName]\n$EFFECT_LIST_BULLET$[holder_possessive|El] [culture|El] possui as [innovations|El] #V $innovation_manorialism$#! e #V $innovation_champa_rice$#!, esta [province|El] possui uma [holding|El] de Nível 2 e acesso à linha de [buildings|El] [GetBuilding('paddy_fields_01').GetName]"
 building_type_regimental_grounds_01: "Campos Regimentais"
 building_type_regimental_grounds_01_desc: "Os campos regimentais não apenas contêm vários edifícios projetados para abrigar grandes quantidades de soldados convocados, mas também estão conectados a uma vasta extensão de terra para que possam treinar para a guerra."
 building_regimental_grounds_01: "Clareiras Regimentais"
 building_regimental_grounds_01_desc: "Grandes extensões de terra são preparadas para a chegada dos convocados, oferecendo amplo espaço para tendas e treinamento."
 building_regimental_grounds_02: "Escritórios do Intendente"
 building_regimental_grounds_02_desc: "O escritório do intendente abriga administradores que garantem que cada soldado convocado tenha um lugar, um espaço para dormir e uma arma para apontar ao inimigo."
 building_regimental_grounds_03: "Alojamentos Semipermanentes"
 building_regimental_grounds_03_desc: "Os quartéis de madeira não são muito resistentes, mas mantêm os convocados locais secos e aquecidos — em grande parte."
 building_regimental_grounds_04: "Quartéis Regimentais"
 building_regimental_grounds_04_desc: "Quartéis robustos de pedra alinham-se às bordas dos campos de treinamento militar dedicados. Quantidades realmente impressionantes de convocados podem ser preparadas aqui."
 building_regimental_grounds_05: "Celeiros Militares"
 building_regimental_grounds_05_desc: "Celeiros dedicados a alimentar os convocados ficam prontos o ano todo, tornando o recrutamento de tropas quase sem esforço."
 building_regimental_grounds_06: "Ferreiros"
 building_regimental_grounds_06_desc: "Várias forjas são construídas ao redor da periferia dos campos, fornecendo armas e reparos aos convocados."
 building_regimental_grounds_07: "Alojamentos dos Oficiais"
 building_regimental_grounds_07_desc: "Os alojamentos dos oficiais são construídos com padrões mais elevados que os quartéis comuns, tanto como reconhecimento do valor dos oficiais quanto como meta que as tropas devem aspirar alcançar."
 building_regimental_grounds_08: "Campos Expandidos"
 building_regimental_grounds_08_desc: "$building_type_regimental_grounds_01_desc$"
 building_type_curtain_walls_01: "Muralhas e Torres"
 building_type_curtain_walls_01_desc: "Muralhas de pedra e imponentes torres de bastião oferecem excelente proteção contra incursões e cercos. Quanto mais fortificações forem construídas, mais impenetrável se torna o castelo que elas protegem."
 building_curtain_walls_01: "Bastiões e Muralhas de Cortina"
 building_curtain_walls_01_desc: "O primeiro passo para qualquer fortificação respeitável é a construção de bastiões e muralhas de cortina. Elas cumprem bem a tarefa de manter à distância inimigos e camponeses revoltosos."
 building_curtain_walls_02: "Pátio Interno"
 building_curtain_walls_02_desc: "O pátio interno é o lugar mais defensável para armazenar suprimentos críticos e sobreviver a um cerco: armas, armaduras e cabeças de javali em conserva."
 building_curtain_walls_03: "Torres da Muralha"
 building_curtain_walls_03_desc: "As torres da muralha funcionam como excelentes pontos de observação, permitindo que nossos soldados atinjam com segurança os exércitos que se aproximam. Quando não há guerra, também são ótimas para olhar com desdém para os camponeses."
 building_curtain_walls_04: "Segunda Muralha de Cortina"
 building_curtain_walls_04_desc: "A adição de uma segunda muralha cortina cria uma posição defensiva sem igual. Se um exército inimigo conseguir romper a primeira muralha, será recebido por outra — o suficiente para desmoralizar qualquer atacante!"
 building_curtain_walls_05: "Zwinger"
 building_curtain_walls_05_desc: "Quando um exército inimigo consegue romper as muralhas externas, ele será inadvertidamente canalizado para o 'Zwinger' — também conhecido como os #emphasis campos da morte#!. Diabolicamente engenhoso!"
 building_curtain_walls_06: "Pátios Externos"
 building_curtain_walls_06_desc: "Mais muralhas significam mais pátios e, por extensão, mais armazenamento seguro para suprimentos. Com tantos pátios, podemos até guardar dentro das muralhas uma estrebaria inteira de montarias cavaleirescas — algo excelente, caso fiquemos sem cabeças de javali em conserva..."
 building_curtain_walls_07: "Trace Italienne"
 building_curtain_walls_07_desc: "A Trace Italienne, ou forte bastionado, é um tipo de estrutura defensiva capaz de resistir até mesmo ao bombardeio incessante de canhões. Bem, não por muito tempo, mas ao menos o suficiente para permitir uma fuga segura pelos túneis secretos."
 building_curtain_walls_08: "Ravelins e Cavaliers"
 building_curtain_walls_08_desc: "O cavalier é uma plataforma elevada que permite que nossos soldados atirem por cima do parapeito principal, diretamente nos inimigos! Infelizmente, isso também significa que os inimigos sabem exatamente onde mirar seus disparos... Ainda assim, soldados posicionados nos ravelins, que são obras externas triangulares que dividem os sitiantes, podem fazer o melhor para evitar que isso aconteça."
 building_type_cereal_fields_01: "Fazendas e Campos"
 building_type_cereal_fields_01_desc: "Fazendas e campos são a espinha dorsal de qualquer economia. Alimentando homem, besta, exército e banquete — não se pode subestimar o poder do simples grão."
 building_cereal_fields_01: "Campos de Cultivo"
 building_cereal_fields_01_desc: "Os campos de cultivo, espinha dorsal da economia feudal, são cada um trabalhados por uma família de camponeses pequena, mas generosa — todos bastante dispostos a entregar a maior parte do que produzem como dízimo à coroa!"
 building_cereal_fields_02: "Aldeias"
 building_cereal_fields_02_desc: "A construção de mais aldeias significa que mais camponeses podem ser postos para trabalhar nos campos, aumentando a produção local e a arrecadação de impostos."
 building_cereal_fields_03: "Celeiros e Armazéns"
 building_cereal_fields_03_desc: "A construção de celeiros e armazéns maiores permite que os camponeses preservem feno e palha, dá a eles um lugar para guardar suas ferramentas e serve como abrigo improvisado para exércitos viajantes e vagabundos."
 building_cereal_fields_04: "Propriedades Agrícolas"
 building_cereal_fields_04_desc: "Propriedades agrícolas maiores sustentam famílias camponesas maiores. Quando as famílias têm espaço e meios para crescer, gerarão mais filhos que poderão ser colocados a trabalhar nos campos."
 building_cereal_fields_05: "Celeiros"
 building_cereal_fields_05_desc: "Celeiros permitem que agricultores armazenem cereais, carne seca e outros tipos de alimento durante todo o inverno. Embora não sejam imunes a ratos e outras pragas, ao menos mantêm seu conteúdo seco."
 building_cereal_fields_06: "Granjas e Celeiros de Dízimo"
 building_cereal_fields_06_desc: "Os agricultores coletam com segurança a parte de sua produção devida ao clero nos celeiros de dízimo — é claro que isso também torna mais fácil para nós tributá-los."
 building_cereal_fields_07: "Vastos Campos de Cultivo"
 building_cereal_fields_07_desc: "Ao incentivar o campesinato a cultivar campos maiores e em maior número próximos uns das terras dos outros, podemos aumentar a produtividade, embora invadir as terras alheias possa trazer conflito entre os agricultores."
 building_cereal_fields_08: "Silos de Grãos"
 building_cereal_fields_08_desc: "Esses enormes silos armazenam grãos em vastas quantidades durante o ano inteiro, e até entre anos, e podem sustentar uma população verdadeiramente enorme."
 building_type_paddy_fields_01: "Arrozais"
 building_type_paddy_fields_01_desc: "O mundo avança com o estômago cheio. O humilde grão de arroz pode parecer insignificante por si só, mas alimenta nações desde tempos imemoriais."
 building_paddy_fields_01: "Campos Alagados"
 building_paddy_fields_01_desc: "O cultivo de arroz é amplamente difundido pelas regiões mais úmidas do mundo. Normalmente, as sementes são plantadas no solo e depois regadas e cuidadas, mas não ficam totalmente submersas na água — embora seja exatamente assim que se cultiva arroz."
 building_paddy_fields_02: "Lavra de Arrozais"
 building_paddy_fields_02_desc: "Água e solo, sozinhos, não são tudo o que é necessário para cultivar arroz com eficácia. O terreno, mesmo submerso, precisa ser preparado, sulcado por arados e gradado com ganchos."
 building_paddy_fields_03: "Terraços Irrigados"
 building_paddy_fields_03_desc: "A água pode ser caprichosa. Ela precisa ser administrada para se manter constante e, ao cultivar arroz, a água #italic precisa#! ser constante."
 building_paddy_fields_04: "Celeiros de Arroz"
 building_paddy_fields_04_desc: "Uma cultura melhor exige um armazenamento melhor. Mais arroz é inútil se simplesmente estragar num monte sem cuidado. Um edifício dedicado, construído sobre suportes para que seu piso não toque o chão, ajuda a secar e armazenar o arroz colhido."
 building_paddy_fields_05: "Cultivo de Mudas"
 building_paddy_fields_05_desc: "Nem todo arroz plantado precisa ser colhido para alimentação. Às vezes é útil retirar mudas recém-brotadas antes que amadureçam, a fim de preservar uma determinada variedade de arroz e aumentar os estoques de sementes para depois."
 building_paddy_fields_06: "Variedades Diversificadas de Arroz"
 building_paddy_fields_06_desc: "'Demais de algo bom' vale tanto para a agricultura quanto para qualquer outra coisa. Cultivar apenas um único tipo de arroz pode levar a perdas ruinosas se um ano for um pouco seco ou chuvoso demais, ou ligeiramente nublado demais, ou tiver #italic alguma coisa#! demais de incontáveis outras formas. É muito mais seguro manter uma mistura variada de grãos de arroz e se resguardar contra o futuro."
 building_paddy_fields_07: "Colheita de Soqueira"
 building_paddy_fields_07_desc: "Os caules restantes das plantas de arroz colhidas podem ser estimulados a produzir brotos adicionais, criando uma segunda safra de arroz na mesma estação de colheita. Nem todos os tipos de arroz respondem bem à técnica da soqueira, mas, quando funciona, só há vantagens para o cultivo do arroz."
 building_paddy_fields_08: "Moinhos Industriais de Arroz"
 building_paddy_fields_08_desc: "O arroz não é simplesmente colhido dos campos e jogado direto nas tigelas de comida. Há toda uma cadeia de processamento, da limpeza e secagem ao descascamento e seleção. Fornos e fogos cuidadosamente controlados podem acelerar a secagem, e pilões de arroz podem ser ligados a rodas d'água para mecanizar o processo de descascamento."
 building_type_barracks_01: "Quartéis"
 building_type_barracks_01_desc: "Quartéis são edifícios robustos com o único propósito de abrigar e preparar os convocados locais para a guerra."
 building_barracks_01: "Quartéis de Madeira"
 building_barracks_01_desc: "Esses simples quartéis de madeira oferecem proteção básica contra as intempéries aos convocados enquanto treinam para a guerra."
 building_barracks_02: "Campos de Convocação"
 building_barracks_02_desc: "Ao limpar uma grande extensão de terra de quaisquer obstruções, podemos reunir nossos soldados em um só lugar para dividi-los em unidades. A visão desimpedida também facilita detectar desertores."
 building_barracks_03: "Quartéis de Pedra"
 building_barracks_03_desc: "Os quartéis de pedra mais resistentes oferecem significativamente mais proteção contra as intempéries, e o transporte das pedras é um ótimo treinamento para nossos homens."
 building_barracks_04: "Acampamentos Móveis"
 building_barracks_04_desc: "Embora quartéis permanentes sejam úteis para treinamento, a disponibilidade de acampamentos móveis feitos de tendas aumenta nossa eficácia em tempos de guerra, já que os quartéis podem se mover junto com o exército."
 building_barracks_05: "Forjas"
 building_barracks_05_desc: "Ao recrutar ferreiros de acampamento para manter as lanças enferrujadas e os forcados tortos dos nossos convocados, podemos tornar nossas tropas mais eficazes e ao menos um pouco mais mortais."
 building_barracks_06: "Campos de Treinamento"
 building_barracks_06_desc: "Ao instalar bonecos de treino e pistas de obstáculos, podemos separar o joio do trigo — e assim saberemos quais homens colocar na linha de frente das formações."
 building_barracks_07: "Centros de Recrutamento"
 building_barracks_07_desc: "Ao construir centros de recrutamento dedicados em todas as aldeias próximas, garantimos um fluxo constante de arruaceiros mal-intencionados e alcoolizados para engrossar nossas fileiras."
 building_barracks_08: "Quartéis Permanentes"
 building_barracks_08_desc: "Embora muitas vezes precisemos mover nossos convocados a qualquer momento, a construção de quartéis permanentes e bem construídos nos dá um lugar para abrigar os soldados e oficiais mais elitizados."
 building_type_camel_farms_01: "Corpo de Camelos"
 building_type_camel_farms_01_desc: "Estas fazendas são dedicadas à criação e ao adestramento de camelos para uso militar, bem como pelos camponeses locais em seu trabalho diário. Camelos são montarias flexíveis e resistentes, idealmente adequadas a um clima desértico severo."
 building_camel_farms_01: "Criadores de Camelos"
 building_camel_farms_01_desc: "$building_type_camel_farms_01_desc$"
 building_camel_farms_02: "Postos de Exploração"
 building_camel_farms_02_desc: "Cavaleiros de camelo viajam regularmente entre os postos de exploração, levando consigo suprimentos e notícias dos acontecimentos atuais."
 building_camel_farms_03: "Arcoeiros"
 building_camel_farms_03_desc: "A cavalaria de camelos se sai bem quando os cavaleiros estão equipados com arcos, e os arcoeiros locais garantem um suprimento constante de equipamento de arquearia."
 building_camel_farms_04: "Mercados de Camelos"
 building_camel_farms_04_desc: "O mercado está sempre agitado, com mercadores negociando centenas de camelos por dia. Isso garante que nossos criadores tenham acesso aos espécimes mais resistentes e duradouros."
 building_camel_farms_05: "Campos de Recrutamento Nômade"
 building_camel_farms_05_desc: "Os ferozes nômades do deserto são excelentes soldados, mas não trabalham de graça. Ao lhes fornecer montarias superiores como pagamento, garantimos sua lealdade em conflitos futuros."
 building_camel_farms_06: "Estábulos Militares"
 building_camel_farms_06_desc: "Estábulos grandes e robustos abrigam nossos valiosos camelos de guerra, protegendo-os tanto de ladrões quanto da dureza do deserto."
 building_camel_farms_07: "Armeiros"
 building_camel_farms_07_desc: "Fazer armaduras para camelos não é uma tarefa fácil, mas a recompensa vale muito a pena. Uma carga de camelos terríveis totalmente blindados pode fazer qualquer exército baseado em cavalos dar meia-volta e fugir."
 building_camel_farms_08: "Criadores Avançados"
 building_camel_farms_08_desc: "Aqui, verdadeiros especialistas na criação de camelos reproduzem e criam os rebanhos de camelos mais resistentes e ferozes da região."
 building_type_logging_camps_01: "Silvicultura"
 building_type_logging_camps_01_desc: "Grandes quantidades de madeira, resina, carvão vegetal e outros recursos são extraídas destas florestas, fornecendo uma excelente fonte próxima de material de construção para as cidades ao redor."
 building_logging_camps_01: "Acampamentos Madeireiros"
 building_logging_camps_01_desc: "Lenhadores montaram acampamento ao longo da periferia da floresta, garantindo uma produção constante de toras."
 building_logging_camps_02: "Coletores de Resina"
 building_logging_camps_02_desc: "Por toda a floresta, resina é coletada para ser usada como adesivo ou vendida ao clero para uso em vários ritos."
 building_logging_camps_03: "Carvoeiros"
 building_logging_camps_03_desc: "Os carvoeiros trabalham sem descanso em meio à fumaça e à fuligem para produzir o valioso material para os ferreiros locais."
 building_logging_camps_04: "Pastagens Florestais"
 building_logging_camps_04_desc: "Algumas áreas da floresta são reservadas como pasto. Os animais podem pastar entre as árvores e engordar com as numerosas nozes, bagas e folhas."
 building_logging_camps_05: "Campos Arados"
 building_logging_camps_05_desc: "Onde antes havia árvores, agora há campos. A antiga floresta se torna uma formidável terra agrícola."
 building_logging_camps_06: "Pastagens de Mel"
 building_logging_camps_06_desc: "Na borda da floresta, apiários são instalados para aproveitar a agora abundante quantidade de flores silvestres que surgiu onde a floresta antes existia."
 building_logging_camps_07: "Vidrarias Florestais"
 building_logging_camps_07_desc: "A floresta é um lugar perfeito para os sopradores de vidro trabalharem. Com fácil acesso à maioria dos materiais de que precisam, vidro valioso pode ser produzido e comercializado."
 building_logging_camps_08: "Serrarias"
 building_logging_camps_08_desc: "Serrarias são uma enorme melhoria em relação aos machados. A floresta pode ser consumida em quase nenhum tempo, com sua valiosa madeira abastecendo nossas cidades e vilas."
 building_type_peat_quarries_01: "Fazendas de Pântano"
 building_type_peat_quarries_01_desc: "Embora zonas úmidas nunca ofereçam as mesmas oportunidades para o cultivo de lavouras que as planícies, uma vegetação exuberante pode sustentar um bom número de animais de fazenda. Também há oportunidades para extrair turfa e sal."
 building_peat_quarries_01: "Terras de Gado"
 building_peat_quarries_01_desc: "A fertilidade das zonas úmidas cria excelentes áreas de pastagem para animais de criação de todos os tamanhos."
 building_peat_quarries_02: "Pedreiras de Turfa"
 building_peat_quarries_02_desc: "Uma quantidade significativa de turfa é extraída aqui. Sua presença ajuda no desenvolvimento de novas fazendas e campos."
 building_peat_quarries_03: "Prados de Feno"
 building_peat_quarries_03_desc: "Ao redor das próprias zonas úmidas, grandes quantidades de capim crescem; uma vez colhido, ele pode ser usado como ração animal durante o inverno."
 building_peat_quarries_04: "Poços de Sal"
 building_peat_quarries_04_desc: "Os trabalhadores usam grandes panelas para aquecer água e extrair sal das zonas úmidas. Esse sal é então usado para conservar carne, que depois é comercializada."
 building_peat_quarries_05: "Zonas Úmidas Muradas"
 building_peat_quarries_05_desc: "Ao cercar as zonas úmidas com muralhas, os camponeses podem controlar com mais facilidade o crescimento das plantas e proteger a valiosa colheita ali presente."
 building_peat_quarries_06: "Campos de Zona Úmida"
 building_peat_quarries_06_desc: "As propriedades únicas das zonas úmidas permitem que os camponeses cultivem com sucesso muitas plantas que de outra forma não conseguiriam, como cânhamo ou linho."
 building_peat_quarries_07: "Grandes Pedreiras de Turfa"
 building_peat_quarries_07_desc: "Cada vez mais turfa é extraída aqui, sendo a maior parte exportada para toda parte como fertilizante."
 building_peat_quarries_08: "Grandes Fazendas de Zona Úmida"
 building_peat_quarries_08_desc: "Grandes rebanhos de animais se alimentam da abundante vida vegetal das zonas úmidas, crescendo grandes e gordos."
 building_type_hill_farms_01: "Fazendas de Colina"
 building_type_hill_farms_01_desc: "As colinas onduladas desta província estão cobertas de campos. Embora cultivar em uma encosta ajude a manter as plantações irrigadas, a área limitada resulta em colheitas menores."
 building_hill_farms_01: "Campos nas Encostas"
 building_hill_farms_01_desc: "Ao longo dos lados das muitas colinas há numerosos pequenos campos, cultivando lavouras e sustentando uma pequena população camponesa."
 building_hill_farms_02: "Pastagens de Serra"
 building_hill_farms_02_desc: "O gado é levado para as terras altas não cultivadas, ou serras, e deixado para pastar nas gramíneas abundantes que crescem ali."
 building_hill_farms_03: "Adegas de Raízes"
 building_hill_farms_03_desc: "As adegas de raízes permitem o armazenamento de vegetais o ano todo, algo de extrema importância nas colinas pouco férteis."
 building_hill_farms_04: "Campos de Vegetais"
 building_hill_farms_04_desc: "Grandes campos de vegetais fornecem às fazendas esparsas o alimento tão necessário."
 building_hill_farms_05: "Terraços de Lynchet"
 building_hill_farms_05_desc: "Ao desviar água de um riacho próximo para um terraço, podemos aumentar enormemente a fertilidade dos campos nas encostas."
 building_hill_farms_06: "Estradas e Escadas"
 building_hill_farms_06_desc: "Estradas e escadas adequadas conectam as fazendas e aldeias dispersas, permitindo comunicação mais fácil e deslocamento mais rápido de pessoas, notícias e mercadorias."
 building_hill_farms_07: "Celeiros de Inverno"
 building_hill_farms_07_desc: "Grande número de animais de fazenda e pessoas pode ser alimentado durante todo o inverno com os alimentos preservados nesses celeiros."
 building_hill_farms_08: "Pomares de Maçã"
 building_hill_farms_08_desc: "As colinas onduladas oferecem o ambiente perfeito para pomares, especialmente de maçãs."
 building_type_hill_forts_01: "Fortes de Colina"
 building_type_hill_forts_01_desc: "Construídas sobre uma colina íngreme ou penhasco, essas enormes fortificações permanecem firmes contra qualquer exército sitiador que não tenha a capacidade de voar!"
 building_hill_forts_01: "Pequeno Forte de Colina"
 building_hill_forts_01_desc: "O forte de colina ergue-se orgulhosamente no topo de uma colina, forçando quaisquer sitiadores a lutar morro acima."
 building_hill_forts_02: "Terraplenagens Simples"
 building_hill_forts_02_desc: "O forte é cercado por terraplenagens, formando muralhas impenetráveis de terra que podem fazer até o soldado mais endurecido perder o ânimo."
 building_hill_forts_03: "Valas"
 building_hill_forts_03_desc: "Grandes valas são escavadas ao redor do topo defensivo da colina. Por causa das paredes lamacentas e escorregadias dessas valas, atacantes tolos podem acabar presos no fundo, afogados na lama pelo avanço de seus próprios companheiros."
 building_hill_forts_04: "Paliçadas"
 building_hill_forts_04_desc: "Grandes muralhas feitas de troncos afiados cercam o forte, oferecendo mais um obstáculo antes de alcançar os tesouros lá dentro."
 building_hill_forts_05: "Casas da Guarda"
 building_hill_forts_05_desc: "Casas da guarda são colocadas ao redor do forte, com guardas alertas prontos a qualquer momento caso um ataque comece."
 building_hill_forts_06: "Muralhas Externas"
 building_hill_forts_06_desc: "Grandes muralhas de pedra agora cercam o forte de colina, consolidando de uma vez por todas sua natureza impenetrável."
 building_hill_forts_07: "Grande Forte de Colina"
 building_hill_forts_07_desc: "A fortaleza central foi expandida e aprimorada significativamente, agora elevando-se imponente em direção aos céus."
 building_hill_forts_08: "Terraplenagens Complexas"
 building_hill_forts_08_desc: "A terraplenagem que circunda o forte de colina é tão complexa e confusa que os exércitos inimigos mal sabem qual entrada devem atacar, algo que funciona a nosso favor — especialmente considerando que metade delas leva a armadilhas mortais..."
 building_type_plantations_01: "Agricultura Desértica"
 building_type_plantations_01_desc: "Estas plantações se concentram no cultivo de frutas e vegetais resistentes o suficiente para suportar o clima severo."
 building_plantations_01: "Pequenas Plantações"
 building_plantations_01_desc: "Apesar da falta de água, estas pequenas plantações conseguem cultivar frutas particularmente resistentes."
 building_plantations_02: "Postos de Troca"
 building_plantations_02_desc: "Nômades resistentes do deserto viajam entre postos de troca, levando alimento consigo para onde ele é mais necessário."
 building_plantations_03: "Tecelões"
 building_plantations_03_desc: "Tecelões fi am tecido em suas oficinas, que depois negociam com os nômades do deserto."
 building_plantations_04: "Nascentes"
 building_plantations_04_desc: "Com água limitada, um novo poço certamente fará a área prosperar. Várias dessas nascentes foram descobertas, e poços adequados foram construídos."
 building_plantations_05: "Caravançarás"
 building_plantations_05_desc: "Caravanas comerciais maiores precisam de um lugar para ficar para que seus animais possam descansar. O caravançará fornece o espaço de que precisam e também é um excelente local para taxar suas mercadorias."
 building_plantations_06: "Bosques de Tâmaras"
 building_plantations_06_desc: "Com mais terras se tornando adequadas para plantações, bosques de tâmaras estão sendo cultivados. As tâmaras doces duram por muito tempo e são um bem valioso para os comerciantes."
 building_plantations_07: "Irrigação"
 building_plantations_07_desc: "Ao inundar os campos com água dos poços, eles podem sustentar algo além da mera agricultura de subsistência. Esta é uma grande tarefa, no entanto; fazer o deserto florescer não é fácil."
 building_plantations_08: "Grandes Plantações"
 building_plantations_08_desc: "Essas plantações agora produzem um excedente definido, que pode ser comercializado e vendido com lucro."
 building_type_outposts_01: "Postos Avançados"
 building_type_outposts_01_desc: "Uma série de postos avançados contorna todos os assentamentos significativos desta província, fornecendo um sistema de alerta antecipado em caso de incursões ou ataques de animais."
 building_outposts_01: "Torres de Vigia"
 building_outposts_01_desc: "Para rastrear animais (e incursões que se aproximam), uma série de pontos de observação é guarnecida por guardas vigilantes. Se uma fera perigosa for avistada, a notícia se espalha rapidamente para que o gado vulnerável possa ser levado à segurança."
 building_outposts_02: "Postos Militares"
 building_outposts_02_desc: "Ao longo das muitas estradas e trilhas sinuosas, há vários postos avançados, guarnecidos por guardas a serviço de mercadores locais. Sua presença garante que a área permaneça pacífica e segura, livre de salteadores."
 building_outposts_03: "Depósitos Ocultos de Armas"
 building_outposts_03_desc: "Uma vantagem de viver em terreno acidentado é a capacidade de camuflar praticamente qualquer coisa. Caso uma incursão apareça, os locais podem se armar com armas vindas de numerosos depósitos ocultos."
 building_outposts_04: "Postos Avançados com Paliçada"
 building_outposts_04_desc: "Os velhos postos precários agora foram substituídos por torres de paliçada resistentes e robustas. Além disso, estão quase perfeitamente escondidas no terreno acidentado."
 building_outposts_05: "Postos de Convocação"
 building_outposts_05_desc: "Perto de cada torre agora há um posto de convocação. Em tempos de mobilização, camponeses convocados podem se reunir com segurança ali, onde encontram tanto armas quanto proteção."
 building_outposts_06: "Postos Fronteiriços"
 building_outposts_06_desc: "Ao contrário dos postos avançados bem escondidos, a variedade fronteiriça serve como dissuasão. Construídas com materiais mais resistentes, o simples tamanho dessas torres basta para fazer qualquer invasor bater em retirada."
 building_outposts_07: "Estações de Exploração"
 building_outposts_07_desc: "Para garantir que nossos batedores estejam bem alimentados e possam viajar leves, erguemos uma série de postos de exploração estrategicamente posicionados. Bem escondidos dos olhos curiosos do inimigo, esses edifícios permitem reunir informações sem paralelo em tempos de invasão."
 building_outposts_08: "Postos Fortificados"
 building_outposts_08_desc: "Imponentes postos talhados em pedra agora se erguem em direção aos céus, fazendo sua presença ser sentida pelos soldados e guardas de caravana abrigados em seu interior."
 building_type_watchtowers_01: "Torres de Vigia"
 building_type_watchtowers_01_desc: "Várias grandes torres de vigia guardam o campesinato trabalhador, oferecendo excelentes pontos de observação para arqueiros."
 building_watchtowers_01: "Torres de Tijolo de Barro"
 building_watchtowers_01_desc: "Estas torres feitas de tijolo de barro fornecem uma defesa simples, mas eficaz."
 building_watchtowers_02: "Casas-Torre"
 building_watchtowers_02_desc: "As casas-torre são feitas tanto para proteção quanto para habitação, e ocupam locais estratégicos."
 building_watchtowers_03: "Torres de Vigia de Madeira"
 building_watchtowers_03_desc: "Várias torres de vigia de madeira observam os camponeses enquanto trabalham em seus campos. De seus pontos de observação, os arqueiros oferecem excelente proteção."
 building_watchtowers_04: "Pequenas Torres de Menagem de Tijolo de Barro"
 building_watchtowers_04_desc: "As refinadas torres de menagem de tijolo de barro, embora pequenas, oferecem proteção superior às torres de vigia mais comuns. Em tempos de guerra, elas podem proteger um grande número de camponeses contra invasores e até conter um pequeno celeiro para tempos mais difíceis."
 building_watchtowers_05: "Torres de Vigia de Pedra"
 building_watchtowers_05_desc: "Estas torres de vigia oferecem um magnífico ponto de observação, não apenas para arqueiros, mas também para senhores inspecionando seus camponeses."
 building_watchtowers_06: "Seteiras"
 building_watchtowers_06_desc: "Ao construir torres com uma série de aberturas por onde flechas podem ser disparadas, o alcance e a proteção dos arqueiros são significativamente aumentados."
 building_watchtowers_07: "Torres Pele"
 building_watchtowers_07_desc: "Estas pequenas casas-torre são formidavelmente fortificadas e sinalizam o prestígio de seus proprietários. Em caso de incursão, rebanhos inteiros de gado podem ser cercados e protegidos pelas torres."
 building_watchtowers_08: "Torres Abobadadas"
 building_watchtowers_08_desc: "Estas imponentes torres são feitas inteiramente de pedra, encimadas por uma cúpula. As técnicas de construção envolvidas as tornam quase inatacáveis por invasores."
 building_type_quarries_01: "Pedreiras"
 building_type_quarries_01_desc: "As montanhas desta província fornecem à construção local um excelente suprimento de material de construção."
 building_quarries_01: "Pedreiras Simples de Pedra"
 building_quarries_01_desc: "Pedra extraída de fácil acesso fornece materiais de construção para obras próximas."
 building_quarries_02: "Minas Rasas de Minério"
 building_quarries_02_desc: "Minas simples se alinham ao sopé da montanha, coletando minério de depósitos superficiais de fácil acesso."
 building_quarries_03: "Moinhos de Água"
 building_quarries_03_desc: "Ao direcionar água para os locais de mineração, seu poder pode ser aproveitado por moinhos d'água para movimentar ferramentas que auxiliam na escavação."
 building_quarries_04: "Grandes Pedreiras de Pedra"
 building_quarries_04_desc: "À medida que a demanda por materiais de construção aumenta, as pedreiras atraem cada vez mais trabalhadores. As pedreiras ficam maiores e mais profundas a cada ano que passa."
 building_quarries_05: "Grandes Minas"
 building_quarries_05_desc: "A necessidade de metais continua crescendo, e novas técnicas não bastam — a produção precisa ser ampliada, e mais minas estão sendo abertas!"
 building_quarries_06: "Pedreiras Massivas de Pedra"
 building_quarries_06_desc: "Várias minas a céu aberto enormes fazem com que trabalhadores talhem blocos de pedra em um nível quase industrial. Pedreiras exauridas jazem como bocas escancaradas por toda a província, seu conteúdo agora formando numerosos castelos e muralhas."
 building_quarries_07: "Minas de Poço"
 building_quarries_07_desc: "Com o advento de novas técnicas, os trabalhadores podem alcançar metais mais profundos escondidos além da superfície. A mais importante delas é uma nova forma de drenar poços inundados."
 building_quarries_08: "Bombeamento Mecanizado de Água"
 building_quarries_08_desc: "Bombas de água de madeira, movidas por um moinho de vento ou por cavalos acima, podem remover água dos poços de mineração muito mais rápido do que alguns baldes de couro."
 building_type_military_camps_01: "Acampamentos de Milícia"
 building_type_military_camps_01_desc: "Um simples campo de treinamento onde infantaria levemente blindada é preparada para a guerra."
 building_military_camps_01: "Tendas de Couro"
 building_military_camps_01_desc: "Ao convocar soldados, eles são reunidos em acampamentos rudimentares onde dormem em tendas simples. Embora não sejam as mais confortáveis, trata-se de um tipo de acampamento barato e portátil."
 building_military_camps_02: "Cozinheiros de Acampamento"
 building_military_camps_02_desc: "Ao designar uma parte dos convocados para coletar e preparar comida para o restante, mais homens são atraídos do campo — atraídos pelo cheiro da comida."
 building_military_camps_03: "Campos de Treinamento"
 building_military_camps_03_desc: "Alvos de arquearia e bonecos dão aos convocados tanto distração quanto um mínimo de treinamento, antes de serem lançados ao calor da batalha."
 building_military_camps_04: "Postos de Vigia"
 building_military_camps_04_desc: "Postos de vigia servem como faróis, pontos de observação e locais naturais de reunião. Mesmo fora dos tempos de mobilização, sempre há guardas estacionados aqui."
 building_military_camps_05: "Ferreiros de Acampamento"
 building_military_camps_05_desc: "Os ferreiros de acampamento fazem reparos simples e mantêm os cavalos ferrados."
 building_military_camps_06: "Salões de Mobilização"
 building_military_camps_06_desc: "Salões de mobilização dedicados colocados em cada vila tornam muito mais fácil pressionar convocados ao serviço."
 building_military_camps_07: "Quartéis da Milícia"
 building_military_camps_07_desc: "Cada cidade agora tem seu próprio quartel da milícia, onde armas são armazenadas caso sejam necessárias. Os quartéis também servem como ponto de encontro para os oficiais responsáveis pela mobilização."
 building_military_camps_08: "Praças de Convocação"
 building_military_camps_08_desc: "As maiores praças de convocação fornecem não apenas um local para os soldados se reunirem, mas também um para treinarem para as próximas batalhas."
 building_type_ramparts_01: "Fortes Florestais"
 building_type_ramparts_01_desc: "Estas fortificações são construídas de tal forma que fazem parte da floresta que protegem. Exércitos em avanço se veem atrapalhados pelas fortificações, mas também emaranhados no matagal."
 building_ramparts_01: "Fortes de Troncos"
 building_ramparts_01_desc: "Pequenos fortes de madeira se erguem como parte da floresta, usando árvores como paliçada natural."
 building_ramparts_02: "Terraplenos de Terra"
 building_ramparts_02_desc: "Longas elevações de terra formam um limite defensivo ao redor do forte, dificultando o avanço inimigo."
 building_ramparts_03: "Armadilhas e Valas"
 building_ramparts_03_desc: "Embora um inimigo possa se sentir seguro ao se aproximar das fortificações, logo se verá preso ou empalado nos muitos perigos escondidos por toda a floresta."
 building_ramparts_04: "Muralhas de Terrapleno"
 building_ramparts_04_desc: "Muralhas de pedra e paliçada agora protegem os fortes contra inimigos que se aproximam, dificultando significativamente qualquer avanço pela floresta."
 building_ramparts_05: "Troneiras"
 building_ramparts_05_desc: "Ao construir troneiras nas muralhas, podemos tanto ver quanto disparar flechas facilmente contra os inimigos que vêm em nossa direção."
 building_ramparts_06: "Obras de Campo"
 building_ramparts_06_desc: "Ao construir rapidamente terraplenagens onde prevemos que os inimigos passarão, podemos enganá-los e flanqueá-los enquanto tentam se mover ao redor das florestas."
 building_ramparts_07: "Muralhas Ameadas de Terrapleno"
 building_ramparts_07_desc: "Ao melhorar os parapeitos com ameias, temos clara vantagem em qualquer cerco, com nossos soldados podendo se mover com relativa segurança e revidar na mesma moeda a qualquer assalto."
 building_ramparts_08: "Fortalezas Florestais"
 building_ramparts_08_desc: "Estas grandes fortalezas de pedra se destacam como montanhas na floresta, protegendo uma vasta extensão de terra."
 building_type_elephant_pens_01: "Corpo de Elefantes"
 building_type_elephant_pens_01_desc: "Elefantes são mantidos e treinados aqui. São excelentes bestas de carga, úteis tanto para o trabalho quanto para a guerra."
 building_elephant_pens_01: "Recintos de Elefantes"
 building_elephant_pens_01_desc: "Estes estábulos robustos conseguem manter seguro até o elefante mais indócil."
 building_elephant_pens_02: "Armadilhas para Elefantes"
 building_elephant_pens_02_desc: "Novos elefantes são capturados por meio de vários métodos, como fossos ou laços. Às vezes, até uma fêmea de elefante é usada como isca."
 building_elephant_pens_03: "Campos de Treinamento de Elefantes"
 building_elephant_pens_03_desc: "Elefantes não são animais fáceis de ensinar, mas nos campos de treinamento os treinadores mais experientes fazem o máximo para fornecer à coroa bestas de guerra."
 building_elephant_pens_04: "Campos de Montaria de Elefantes"
 building_elephant_pens_04_desc: "Nos campos de montaria, elefantes são postos à prova, carregando tripulação, armadura e equipamento."
 building_elephant_pens_05: "Escritórios dos Supervisores"
 building_elephant_pens_05_desc: "Os supervisores são responsáveis pelo bem-estar dos elefantes e, ao construir escritórios adequados para eles, sua eficiência é garantida."
 building_elephant_pens_06: "Hospitais para Elefantes"
 building_elephant_pens_06_desc: "Hospitais especializados para elefantes são grandes o bastante para acomodar até o maior macho, salvando a vida de animais que de outra forma certamente seriam perdidos."
 building_elephant_pens_07: "Santuários de Elefantes"
 building_elephant_pens_07_desc: "Ao designar grandes áreas da selva como santuários para os elefantes, garantimos que menos animais sejam perdidos para a caça furtiva e que a população permaneça estável."
 building_elephant_pens_08: "Criadores de Elefantes"
 building_elephant_pens_08_desc: "Os criadores de elefantes garantem que novos filhotes nasçam e sejam criados apenas a partir dos exemplares mais saudáveis e de melhor linhagem."
 building_type_guild_halls_01: "Guildas"
 building_type_guild_halls_01_desc: "A cidade oferece a todas as grandes guildas e famílias burguesas amplo espaço para organizar e praticar seus ofícios."
 building_guild_halls_01: "Salões das Guildas"
 building_guild_halls_01_desc: "$building_type_guild_halls_01_desc$"
 building_guild_halls_02: "Guildas de Entalhadores"
 building_guild_halls_02_desc: "Entalhadores produzem itens de madeira ou osso, como molduras, decorações ou ferramentas. Eles também entalham escudos heráldicos, tornando a guilda popular entre a nobreza."
 building_guild_halls_03: "Guildas de Carpinteiros"
 building_guild_halls_03_desc: "Carpinteiros trabalham com construção, usando principalmente madeira como material de escolha. Seus serviços são muito procurados tanto por nobres quanto pelo clero, especialmente pelas belas junções de acabamento que fazem para igrejas e propriedades."
 building_guild_halls_04: "Guildas de Caçadores"
 building_guild_halls_04_desc: "Caçadores negociam carne e peles, e seus serviços permitem que tanto açougueiros quanto curtidores exerçam seus ofícios. As melhores peles naturalmente acabam nas mãos das famílias nobres mais prestigiadas."
 building_guild_halls_05: "Guildas de Pedreiros"
 building_guild_halls_05_desc: "Pedreiros trabalham com pedra, tanto para construção quanto para escultura. Sua habilidade é amplamente procurada, já que sua perícia é inestimável na construção de fortificações."
 building_guild_halls_06: "Guildas de Alfaiates"
 building_guild_halls_06_desc: "Alfaiates empunham agulha, linha e pano como suas armas de escolha. Com sua habilidade incomparável, produzem belas vestimentas para a nobreza."
 building_guild_halls_07: "Guildas de Vidreiros"
 building_guild_halls_07_desc: "Vidreiros criam itens fascinantes de vidro, desde taças até vidraças. Possuir itens feitos de vidro é algo muito prestigioso, tornando seus serviços altamente desejáveis."
 building_guild_halls_08: "Guildas de Artesãos"
 building_guild_halls_08_desc: "Artesãos usam uma multidão de materiais não apenas para produzir obras de arte, mas também inovações inteiramente novas. Sua engenhosidade e habilidade refinada vêm atraindo a atenção de altos nobres por toda parte."
 building_type_monastic_schools_01: "Monastérios"
 building_type_monastic_schools_01_desc: "Esta escola ensina muitas matérias e é um raro centro de ensino elevado, mas os estudantes matriculados aqui estudam principalmente para se preparar para futuras carreiras no clero."
 building_monastic_schools_01: "Capela"
 building_monastic_schools_01_desc: "Um humilde local de culto silencioso para os devotos rezarem e contemplarem."
 building_monastic_schools_02: "Salões de Oração"
 building_monastic_schools_02_desc: "Os salões de oração recebem sermões e oferecem um lugar de contemplação silenciosa."
 building_monastic_schools_03: "Escolas Monásticas"
 building_monastic_schools_03_desc: "$building_type_monastic_schools_01_desc$"
 building_monastic_schools_04: "Jardins Monásticos"
 building_monastic_schools_04_desc: "Os jardins do monastério oferecem um lugar tranquilo de contemplação para os devotos se deleitarem com a beleza da criação."
 building_monastic_schools_05: "Universidade Monástica"
 building_monastic_schools_05_desc: "A universidade oferece uma educação extensa em uma gama de assuntos sagrados, incluindo teologia, tradução e legalismo."
 building_monastic_schools_06: "Departamento de Filosofia"
 building_monastic_schools_06_desc: "O ensino da filosofia antiga é ministrado aqui, e os monges frequentemente aplicam essas ideias à vida cotidiana."
 building_monastic_schools_07: "Observatório"
 building_monastic_schools_07_desc: "Os monges aqui observam as estrelas e, a partir delas, determinam o momento adequado e correto para observar datas importantes no calendário religioso, além de ampliar sua compreensão da criação."
 building_monastic_schools_08: "Claustros"
 building_monastic_schools_08_desc: "O claustro forma uma barreira sólida contra o mundo exterior, separando efetivamente a vida daqueles dentro de suas muralhas dos camponeses do lado de fora."
 building_type_megalith_01: "Megalito"
 building_type_megalith_01_desc: "Esta estrutura é um arranjo externo de pedras tipicamente alinhadas com estrelas e constelações. Fé que acredita em construções megalíticas oferece locais de culto regulares e de baixo custo para os fiéis, atraindo viajantes e peregrinos."
 building_megalith_01: "Megalito Menor"
 building_megalith_01_desc: "Este grande arranjo externo de pedras funciona como um local de culto aberto e permanente. Esta construção modesta, feita de rochas comuns em um arranjo simples, atende alguns fiéis."
 building_megalith_02: "Mausoléu Megalítico"
 building_megalith_02_desc: "O local foi ampliado com múltiplos arranjos de pedras para acomodar mais fiéis. Junto com uma expansão do próprio Megalito, um mausoléu subterrâneo foi construído nas proximidades para permitir que pessoas importantes sejam enterradas no local."
 building_megalith_03: "Altares Megalíticos"
 building_megalith_03_desc: "Este grande arranjo externo de pedras funciona como um local de culto aberto e permanente. Este Megalito foi construído com pedras caras e exóticas de toda a região e foi equipado com altares para uso em cerimônias."
 building_megalith_04: "Grande Megalito"
 building_megalith_04_desc: "Junto com numerosos altares e itens cerimoniais, este Megalito foi ampliado para incluir algumas pedras monolíticas realmente enormes e inspiradoras, intrincadamente esculpidas com símbolos sagrados."
 building_megalith_05: "Templos Locais"
 building_megalith_05_desc: "Pequenos santuários e locais de culto foram erguidos entre os Megalitos, para fornecer lugares silenciosos de contemplação ao viajante devoto."
 building_megalith_06: "Tumbas Megalíticas"
 building_megalith_06_desc: "Grandes líderes, guerreiros e pessoas sagradas repousam nestes altares acima do solo. Esses locais dão a peregrinos e fiéis um lugar para venerar os ancestrais caídos que vieram antes deles."
 building_megalith_07: "Montes de Pedra de Peregrinos"
 building_megalith_07_desc: "Pequenos montes de pedra foram erguidos para pontilhar a natureza selvagem ao redor do sítio megalítico, guiando peregrinos e viajantes até os altares onde podem buscar adoração."
 building_megalith_08: "Megalito Lendário"
 building_megalith_08_desc: "Este Megalito cresceu a tal ponto que seu status é algo como uma lenda local. Fiéis afirmam sentir uma profunda conexão com sua fé enquanto estão neste local."
 building_type_great_megalith_01: "Grande megalito"
 building_type_great_megalith_01_desc: "O projeto do Grande Megálito, uma versão extremamente ambiciosa do Megálito, consiste em cobrir a paisagem do interior com pequenas construções megalíticas centradas em torno de uma única construção gigantesca."
 building_great_megalith_01: "Grande Megalito"
 building_great_megalith_01_desc: "O Grande Megalito é um vasto e impressionante círculo de pedras que se estende pela paisagem, com inúmeros locais menores por todo o campo. Aberto e acessível a todos, ele aproxima fiéis e peregrinos do mundo inteiro do divino."
 building_type_hospices_01: "Hospícios"
 building_type_hospices_01_desc: "Um hospício oferece um local de repouso para os doentes e exaustos, onde podem receber os cuidados de pessoas sagradas dedicadas."
 building_hospices_01: "Alojamentos de Peregrinos"
 building_hospices_01_desc: "Peregrinos de todo tipo podem ficar e descansar nos alojamentos de peregrinos caso busquem abrigo durante suas longas jornadas. Aqui eles também recebem comida, bebida e, às vezes, até um banho."
 building_hospices_02: "Enfermaria"
 building_hospices_02_desc: "Uma modesta enfermaria foi construída aqui, para manter o ar pútrido dos doentes longe dos saudáveis e fornecer um lugar tranquilo de cura para os enfermos."
 building_hospices_03: "Enfermarias"
 building_hospices_03_desc: "Em tempos de guerra ou peste, as enfermarias oferecem uma segunda chance às pobres vítimas afligidas, desde que consigam chegar a tempo."
 building_hospices_04: "Hospícios"
 building_hospices_04_desc: "Hospícios oferecem cuidados de longo prazo para aqueles que de outra forma não sobreviveriam. Os cronicamente enfermos, os deficientes e, às vezes, até os acometidos por demônios são bem-vindos."
 building_hospices_05: "Jardins Hospitalares"
 building_hospices_05_desc: "Um jardim de flores foi plantado ao redor dos hospícios. Cada flor possui um aroma potente e agradável para combater o miasma criado pelos doentes."
 building_hospices_06: "Hospital"
 building_hospices_06_desc: "Existe um edifício hospitalar central para fornecer cuidados e um local central para todos os hospícios. Enfermeiros e pessoas sagradas permanecem aqui em residência para oferecer esmolas e cuidados aos locais e aos viajantes doentes."
 building_hospices_07: "Colônia de Leprosos"
 building_hospices_07_desc: "Na natureza selvagem próxima ao Hospício, foi construída uma pequena comunidade onde eles podem cultivar suas próprias colheitas e viver seus últimos dias entre si, sem representar risco aos saudáveis na sociedade em geral."
 building_hospices_08: "Grande Hospital"
 building_hospices_08_desc: "Hospitais oferecem esmolas e cuidados de enfermagem aos idosos e enfermos, além de tratamento para os doentes e exaustos. Aqui, eles são separados do resto da sociedade e cuidados por pessoas sagradas dedicadas."
 building_type_scriptorium_01: "Scriptorium"
 building_type_scriptorium_01_desc: "Scriptoria oferecem um local de aprendizado para os santos e os instruídos registrarem sua sabedoria no papel para toda a eternidade."
 building_scriptorium_01: "Bibliotecas"
 building_scriptorium_01_desc: "A biblioteca do monastério está repleta de livros, desde pequenos tratados até vastos tomos de teologia. Verdadeiramente, um tesouro de conhecimento é guardado dentro de seus muros."
 building_scriptorium_02: "Câmaras de Cópia"
 building_scriptorium_02_desc: "Escribas devotos trabalham o dia inteiro copiando textos sagrados nas câmaras de cópia. Mesmo à noite, eles trabalham, iluminados apenas por velas e pela lua, tudo em sua busca por conhecimento."
 building_scriptorium_03: "Casa de Tradução"
 building_scriptorium_03_desc: "Tradutores dedicados afluem a este scriptorium para converter obras escritas em línguas antigas ou estrangeiras para a língua litúrgica do templo, ampliando enormemente a acessibilidade de incontáveis obras."
 building_scriptorium_04: "Casa dos Escribas"
 building_scriptorium_04_desc: "Um grande número de escribas reside aqui para permitir que autores em potencial ditem suas obras, sem a necessidade de registrar nada disso no papel com as próprias mãos."
 building_scriptorium_05: "Sistema Continental"
 building_scriptorium_05_desc: "As obras agora são organizadas rigorosamente de acordo com o continente de onde se originaram, aumentando muito a capacidade de um erudito encontrar sabedoria, venha ela de onde vier."
 building_scriptorium_06: "Grandes Arquivos"
 building_scriptorium_06_desc: "Obras literárias de todo o mundo são traduzidas e preservadas aqui, para que sua sabedoria seja preservada para toda a eternidade."
 building_scriptorium_07: "Escola de Tradução"
 building_scriptorium_07_desc: "Devotos são instruídos em línguas antigas e estrangeiras, ampliando a capacidade do Scriptorium de preservar obras de sabedoria e conhecimento."
 building_scriptorium_08: "Arquivos Secretos"
 building_scriptorium_08_desc: "Este templo agora abriga uma vasta rede subterrânea de arquivos contendo não apenas as obras deste templo, mas muitas obras recuperadas do exterior."
 building_type_burial_site_01: "Local de Sepultamento"
 building_type_burial_site_01_desc: "Ao criar um vasto local de sepultamento para nossos mortos, manteremos tanto o miasma longe da população quanto forneceremos um lugar de veneração e lembrança para nossos ancestrais."
 building_burial_site_01: "Grande Local de Sepultamento"
 building_burial_site_01_desc: "Este vasto local de sepultamento está repleto de covas comuns e de alguns pequenos mausoléus para figuras mais significativas."
 building_burial_site_02: "Mausoléu"
 building_burial_site_02_desc: "Um grande mausoléu foi construído, repleto de locais para sepulturas comuns e lar de alguns túmulos para homens sagrados e guerreiros venerados."
 building_burial_site_03: "Grande Mausoléu"
 building_burial_site_03_desc: "O mausoléu foi ampliado para se tornar um monumento imponente aos mortos. Seu interior está repleto de sepulturas e salões de oração para venerar os mortos."
 building_type_hunting_grounds_01: "Campos de Caça"
 building_type_hunting_grounds_01_desc: "Espalhados por estas terras há vários grandes alojamentos onde caçadores de animais selvagens podem se reunir e planejar suas excursões."
 building_hunting_grounds_01: "Alojamentos de Caçadores"
 building_hunting_grounds_01_desc: "Os caçadores se reúnem nestes alojamentos para planejar suas excursões na natureza selvagem, e eles também servem como lugares para guardar troféus e se encontrar após uma caçada bem-sucedida."
 building_hunting_grounds_02: "Canis"
 building_hunting_grounds_02_desc: "Os canis criam cães velozes que são excelentes companheiros de caça. Uma matilha inteira de cães costuma ser levada em cada caçada."
 building_hunting_grounds_03: "Aviários"
 building_hunting_grounds_03_desc: "O segundo companheiro mais importante de um caçador é a ave de rapina, muitas das quais são mantidas nos aviários."
 building_hunting_grounds_04: "Torres de Caça"
 building_hunting_grounds_04_desc: "Para rastrear e avistar presas, sentinelas observam em torres por todas as terras, relatando seus avistamentos aos caçadores."
 building_hunting_grounds_05: "Estábulos do Caçador"
 building_hunting_grounds_05_desc: "Um caçador bem-sucedido sempre precisa de uma montaria rápida, resistente e destemida. Os estábulos do caçador fornecem raças especializadas que se saem bem em longas jornadas."
 building_hunting_grounds_06: "Cabanas dos Guardas-Florestais"
 building_hunting_grounds_06_desc: "Guardas-florestais rondam os campos de caça em busca de presas. Embora trabalhem sozinhos, são mais do que capazes de abater presas menores por conta própria."
 building_hunting_grounds_07: "Reservas de Caça"
 building_hunting_grounds_07_desc: "Uma grande extensão de terra é designada como reserva, o que impede caçadores não autorizados de caçar dentro dela. Isso garante que sempre haja muitas presas para os caçadores oficiais, embora alguns poucos caçadores furtivos às vezes consigam passar..."
 building_hunting_grounds_08: "Alojamentos dos Guardas de Caça"
 building_hunting_grounds_08_desc: "Os guardas de caça são responsáveis pelo bem-estar das terras e de todos os animais nelas. Sempre que nobres decidem ir caçar, eles sabem para onde enviá-los para que sua caçada encontre uma presa."
 building_type_stables_01: "Estábulos"
 building_type_stables_01_desc: "Roncins, cavalos de carga e outras bestas de carga precisam de um edifício dedicado. Estábulos também garantem que montarias frescas estejam disponíveis para qualquer um que possa pagá-las."
 building_stables_01: "Pequenos Estábulos"
 building_stables_01_desc: "Um pequeno edifício adequado para alguns cavalos é um centro natural para qualquer propriedade, bem como a primeira e a última parada de qualquer visitante montado."
 building_stables_02: "Curral de Cavalos"
 building_stables_02_desc: "Um curral externo permite que os cavalos estabulados estiquem as pernas, pastem e aproveitem um pouco de ar fresco."
 building_stables_03: "Celeiros de Feno"
 building_stables_03_desc: "Um conjunto de simples depósitos de feno garante um suprimento constante de alimento para os cavalos fora do período de pastagem."
 building_stables_04: "Estações de Correio"
 building_stables_04_desc: "Com cavalos estacionados e diligências espalhados pela região, é possível viajar dia e noite com missivas importantes, bens perecíveis e outras necessidades urgentes."
 building_stables_05: "Alojamentos dos Tratadores"
 building_stables_05_desc: "A adição de alojamentos simples onde os trabalhadores podem dormir os mantém fora dos currais dos cavalos, tornando a vida mais confortável tanto para o homem quanto para a besta."
 building_stables_06: "Canais de Drenagem"
 building_stables_06_desc: "Canais escavados no chão dos estábulos mantêm os cavalos secos e confortáveis, quase sem esforço."
 building_stables_07: "Guildas de Ferradores"
 building_stables_07_desc: "A quantidade de trabalho e habilidade necessária para cuidar adequadamente dos cascos incentiva o crescimento de guildas de ferradores, que fabricam, ajustam e reparam ferraduras sem descanso."
 building_stables_08: "Haras"
 building_stables_08_desc: "A adição de instalações dedicadas ao trato e ao cuidado dos exemplares mais valiosos da perfeição equina sustenta a criação de novos e magníficos corcéis e faz com que os que já temos quase cintilem."
 building_type_smiths_01: "Ferreiros"
 building_type_smiths_01_desc: "Fundindo minério em fornos e martelando metal nas formas desejadas, as forjas fornecem às comunidades próximas ferramentas e armas essenciais."
 building_smiths_01: "Forjas Catalãs"
 building_smiths_01_desc: "Por todo o campo, fumaça sobe das forjas catalãs, estruturas simples com paredes feitas de argila e pedras resistentes ao calor, onde uma mistura de carvão e minério de ferro triturado é adicionada pelo topo aberto para produzir ferro-esponja."
 building_smiths_02: "Foles"
 building_smiths_02_desc: "Feitos de couro animal resistente, os foles costumam ser operados por um aprendiz de ferreiro, bombeando constantemente uma forte corrente de ar para o fogo."
 building_smiths_03: "Fieira"
 building_smiths_03_desc: "Um dispositivo que auxilia os ferreiros na fabricação de arame para cota de malha. Pedaços de ferro aquecido são puxados por orifícios sucessivamente menores, um método muito mais fácil do que martelá-los laboriosamente na forja."
 building_smiths_04: "Distritos de Ferreiros"
 building_smiths_04_desc: "Os ferreiros são fortemente incentivados a exercer seu ofício fora de áreas densamente povoadas. À medida que inovações na produção de metal lhes permitem trabalhar quase sem parar, a insatisfação da população próxima cresce a cada batida de martelo e a cada fogo rugindo na noite."
 building_smiths_05: "Martelos Hidráulicos"
 building_smiths_05_desc: "Movido por uma roda-d'água ou por aprendizes azarados, um came giratório simples levanta o martelo e então o deixa cair naturalmente em um ritmo constante."
 building_smiths_06: "Oficinas de Ourives"
 building_smiths_06_desc: "A adição de salas para fundir e trabalhar ouro e prata, cada uma com suas próprias bancadas e forjas especialmente projetadas, torna muito mais fácil trabalhar com joias e revestimentos de metais preciosos."
 building_smiths_07: "Altos-Fornos"
 building_smiths_07_desc: "Altos-fornos funcionam em alta temperatura durante todo o dia, fundindo ferro, chumbo e cobre. A qualidade do metal que produzem é mais do que excelente."
 building_smiths_08: "Ferro Fundido"
 building_smiths_08_desc: "Um pouco mais fraco, mas muito mais barato de produzir do que por outros métodos, o ferro fundido é usado para produzir uma ampla variedade de ferramentas, como relhas de arado, pregos ou grades."
 building_type_horse_pastures_01: "Manadas de Cavalos"
 building_type_horse_pastures_01_desc: "Qualquer um pode empunhar uma arma rudimentar e golpear seu semelhante. Quase qualquer um pode reunir uma turba camponesa armada de forma rudimentar. Mas apenas da delicada harmonia entre um cavalo bem-criado, um guerreiro habilidoso e uma arma adequada, liderados pelo melhor dos comandantes, pode surgir uma força de combate incomparável para varrer a Terra."
 building_horse_pastures_01: "Domesticação de Cavalos Selvagens"
 building_horse_pastures_01_desc: "Cavalos que conseguem sobreviver sozinhos em terreno hostil têm instintos notáveis. Então, em vez de quebrá-los, usaremos sua aptidão para ajudar nossos guerreiros."
 building_horse_pastures_02: "Chicotes de Couro para Cavalos"
 building_horse_pastures_02_desc: "Em vez de ferir os cavalos com ferramentas grosseiras como esporas, nossos guerreiros usam chicotes com uma alça de couro amarrada ao pulso do cavaleiro. Após usar o chicote, o guerreiro o deixa pendurado livremente, liberando as mãos."
 building_horse_pastures_03: "Pastagens de Inverno"
 building_horse_pastures_03_desc: "Além da pradaria aberta, oferecemos aos cavalos acesso a matas mais densas. Mesmo no inverno, eles podem encontrar alguma nutrição entre galhos, arbustos e árvores."
 building_horse_pastures_04: "Seleção de Reprodutores"
 building_horse_pastures_04_desc: "Selecionando cuidadosamente os melhores cavalos para reprodução, podemos gerar montarias que combinam as melhores qualidades de seus progenitores."
 building_horse_pastures_05: "Condicionamento de Cavalos"
 building_horse_pastures_05_desc: "Por meio de exercício, alimentação cuidadosa e treinamento, os cavalos são preparados desde cedo para as exigências do campo de batalha."
 building_horse_pastures_06: "Pastagens de Verão"
 building_horse_pastures_06_desc: "No verão, os cavalos são levados para pastagens mais amplas e nutritivas, permitindo que cresçam fortes e saudáveis antes de retornarem aos campos principais."
 building_horse_pastures_07: "Criação de Cavalos de Guerra"
 building_horse_pastures_07_desc: "A criação agora se concentra em cavalos próprios para a guerra, fortes o bastante para portar cavaleiros armados e corajosos o bastante para enfrentar o caos da batalha."
 building_horse_pastures_08: "Haras de Elite"
 building_horse_pastures_08_desc: "Nossos melhores criadores e tratadores supervisionam rebanhos prestigiosos, produzindo montarias de qualidade excepcional para os mais nobres e os mais mortais de nossos guerreiros."
 building_type_warrior_lodges_01: "Alojamentos dos Guerreiros"
 building_type_warrior_lodges_01_desc: "Laços pessoais forjados nos campos de batalha merecem salões de comemoração, onde guerreiros de antigamente podem compartilhar seus contos maravilhosos, porém críveis, com jovens sonhadores."
 building_warrior_lodges_01: "Salões de Troféus"
 building_warrior_lodges_01_desc: "A vida no campo de batalha e a memória humana são ambas coisas efêmeras, ao passo que uma parede onde cada membro do alojamento pode pendurar seus preciosos troféus permanecerá por muito, muito mais tempo."
 building_warrior_lodges_02: "Alojamentos dos Escudeiros"
 building_warrior_lodges_02_desc: "Um modesto depósito de equipamento e um rigoroso cronograma de treinamento já estabelecido são tudo o que é necessário para que os jovens demais para lembrar das batalhas do passado aprendam com os velhos demais para se juntar às fileiras no futuro."
 building_warrior_lodges_03: "Salões de Festim"
 building_warrior_lodges_03_desc: "A adição de salões de festim, sempre repletos de comida e risos, atende ao número crescente de batalhas celebradas neste alojamento de guerreiros."
 building_warrior_lodges_04: "Campos de Combate em Formação"
 building_warrior_lodges_04_desc: "Em campos dedicados que espelham os terrenos onde exércitos se enfrentam, grupos de guerreiros podem aprender a lutar e manobrar como uma unidade coesa. Tropas treinadas aqui são uma força formidável, tendo aprendido a confiar tanto em seus comandantes quanto nos homens na fileira ao seu lado."
 building_warrior_lodges_05: "Sepulturas dos Guerreiros"
 building_warrior_lodges_05_desc: "Com terrenos sagrados garantidos para sepultamento, membros venerados deste alojamento de guerreiros podem descansar em segurança para sempre, não mais confinados ao solo estrangeiro e frio de um campo de batalha... ao mesmo tempo em que servem de inspiração para gerações de guerreiros vindouras."
 building_warrior_lodges_06: "Salões de Comemoração"
 building_warrior_lodges_06_desc: "Nestes salões, trovadores e poetas bem pagos exaltam os feitos dos mais bravos guerreiros. Quando multidões suficientes se reúnem — ou um patrono suficientemente rico assim deseja — espetáculos inteiros acontecem, reencenando as famosas e vitoriosas batalhas do passado."
 building_warrior_lodges_07: "Biblioteca dos Guerreiros"
 building_warrior_lodges_07_desc: "Gerações de jovens aprendizes vêm aprendendo aqui, mas apenas com os guerreiros sobreviventes e ainda presentes. Agora os tesouros de conhecimento acumulado, e apenas às vezes conflitante, podem ser acessados por quase qualquer pessoa mediante uma pequena taxa."
 building_warrior_lodges_08: "Alojamentos de Visitantes"
 building_warrior_lodges_08_desc: "Estes salões tornaram-se um venerado destino de peregrinações profanas, conhecidos e sonhados por toda parte tanto por guerreiros aspirantes quanto experientes."
 building_type_hillside_grazing_01: "Terras de Pastagem de Encosta"
 building_type_hillside_grazing_01_desc: "Inadequadas para a agricultura e em grande parte cobertas por grama e outras plantas que podem ser consumidas por cavalos, estas colinas têm sido usadas principalmente para pastagem."
 building_hillside_grazing_01: "Pastagens de Colina"
 building_hillside_grazing_01_desc: "Grandes áreas abertas ao ar livre são ideais para serem usadas como pastagens para cavalos de todos os tamanhos e tipos. Qualquer um com um cavalo tem o direito de usar essas terras de pastoreio, sustentando tanto a agricultura quanto os cavaleiros locais."
 building_hillside_grazing_02: "Pastores"
 building_hillside_grazing_02_desc: "À medida que a criação de cavalos se torna ainda mais importante para a economia local, essa pastagem agora sustenta um grande grupo de pessoas dedicadas ao pastoreio dos animais."
 building_hillside_grazing_03: "Área de Pastagem Expandida"
 building_hillside_grazing_03_desc: "Embora esta seja uma área naturalmente propícia ao pastoreio, ainda há formas de ampliar a área disponível. Árvores podem ser cortadas e pedras removidas; a recuperação de terras da natureza nunca realmente cessa."
 building_hillside_grazing_04: "Fazendas de Cavalos"
 building_hillside_grazing_04_desc: "Qualquer terra arável utilizável nesta área acaba sendo comprada pelos criadores de cavalos, para quem os vegetais e a pequena produção agrícola ajudam a sustentar sua crescente força de trabalho."
 building_hillside_grazing_05: "Pequenos Ranchos de Cavalos"
 building_hillside_grazing_05_desc: "Com o tempo, vários ranchos dedicados, onde cavalos são criados, alimentados e treinados, tornaram-se parte integrante da economia local"
 building_hillside_grazing_06: "Mercados de Cavalos"
 building_hillside_grazing_06_desc: "O comércio de cavalos é uma parte natural da criação e reprodução de montarias. À medida que o negócio se desenvolve, várias cidades-mercado de cavalos, mais ou menos permanentes, começam a surgir a cada estação."
 building_hillside_grazing_07: "Marechais de Cavalos"
 building_hillside_grazing_07_desc: "Para criar e alimentar cavalos de guerra de alta qualidade, é preciso alguém que cuide de seus diversos males e ferimentos, além de avaliar sua qualidade de forma sistemática. À medida que a criação de cavalos se torna cada vez mais importante nesta região, também cresce a importância do marechal de cavalos que cuidará das montarias."
 building_hillside_grazing_08: "Grandes Ranchos de Cavalos"
 building_hillside_grazing_08_desc: "Com o tempo, todas as terras de pastagem foram consolidadas sob alguns grandes ranchos, responsáveis por criar e treinar grande número de fortes cavalos de guerra."
 building_type_windmills_01: "Moinhos de Vento"
 building_type_windmills_01_desc: "Os moinhos de vento são localizados em áreas onde os ventos costumam ser mais fortes, como colinas ou pela costa. Ao contrário dos moinhos d'água, os moinhos de vento não são interrompidos pelo congelamento dos rios e podem moer o ano inteiro."
 building_windmills_01: "Moinhos de Vento Simples"
 building_windmills_01_desc: "Velas verticais simples, adicionadas ao topo de um moinho acionado por animais, não apenas aumentam a potência do moinho, mas também preservam por mais tempo a força da besta de carga."
 building_windmills_02: "Panêmones"
 building_windmills_02_desc: "Panêmones são moinhos de vento posicionados verticalmente, com metade do moinho protegida do vento. Isso garante que as velas a barlavento não empurrem contra a rotação."
 building_windmills_03: "Velas Rotativas ao Vento"
 building_windmills_03_desc: "Com um pouco de engenhosidade no projeto, as velas de retorno giram rapidamente contra o vento."
 building_windmills_04: "Rodas d'Água de Moinho de Vento"
 building_windmills_04_desc: "Ao usar a força do vento para girar uma roda d'água, gerando assim fluxo de água em um canal ou em um simples tubo de madeira, as pedras de moagem e trituração podem ser colocadas em locais mais acessíveis."
 building_windmills_05: "Moinhos de Vento Horizontais"
 building_windmills_05_desc: "Com cada vela empurrando na direção correta, mais força pode ser direcionada para múltiplas mós. Ainda assim, o trabalho é frequentemente interrompido por mudanças na direção do vento, exigindo um reajuste manual de todo o moinho."
 building_windmills_06: "Moinhos de Poste"
 building_windmills_06_desc: "Com o moinho inteiro colocado sobre um poste robusto, ele pode facilmente virar em direção ao vento. Mudanças na força do vento exigem ajuste manual, recolhendo velas e pesando as pás para manter a rotação estável."
 building_windmills_07: "Caixas de Engrenagens"
 building_windmills_07_desc: "A lenta rotação das poderosas velas do moinho de vento é acelerada pela adição de um simples conjunto de engrenagens de madeira, permitindo que o moinho gire mais rápido. Isso o torna muito mais adequado para a maioria dos materiais trazidos para processamento."
 building_windmills_08: "Moinhos de Torre"
 building_windmills_08_desc: "O corpo do moinho de vento é uma bela obra de alvenaria, com apenas o topo ainda sendo de madeira, permitindo assim que as velas fiquem voltadas para o vento. Nenhuma tempestade ou cavaleiro desavisado pode derrubar esta torre e interromper a moagem."
 building_type_watermills_01: "Moinhos d'Água"
 building_type_watermills_01_desc: "Moinhos d'água transformam todo tipo de movimento da água, de marés a cachoeiras, em rotação usada para moer, serrar, esmagar e pisar tecidos. As permissões para operar um moinho d'água são uma fonte fácil e confiável de imposto adicional para o proprietário da propriedade."
 building_watermills_01: "Rodas-d'Água de Abaixo"
 building_watermills_01_desc: "Uma roda simples colocada no rio de correnteza rápida pode realizar muito mais do que um moinho movido por humanos ou cavalos e, o mais importante, nunca se cansará nem pedirá pagamento."
 building_watermills_02: "Manivelas e Bielas"
 building_watermills_02_desc: "Com um simples sistema de engrenagens de madeira, a velocidade de rotação das mós deixa de estar diretamente ligada aos caprichos do clima."
 building_watermills_03: "Rodas-d'Água de Cima"
 building_watermills_03_desc: "Usar a diferença no nível da água, formada naturalmente ou obtida com um pouco de engenhosidade humana, é uma forma muito mais eficiente e confiável de gerar torque."
 building_watermills_04: "Moinhos Industriais"
 building_watermills_04_desc: "O que começou como um simples moinho de malte, processando principalmente produtos agrícolas, agora atrai outros ofícios. Carregadores das guildas aguardam até que os moinhos moam sua mostarda, pisem seus tecidos ou esmaguem seu minério."
 building_watermills_05: "Estradas Organizadas"
 building_watermills_05_desc: "Agentes contratados, abrigos, passagens de estrada e até estalagens, colocados ao longo das estradas que levam aos moinhos, organizam e atendem aqueles que esperam na fila. Carroças puxadas por cavalos ou pessoas, cheias de bens prestes a serem moídos, como madeira, cânhamo ou peles de animais, formam fila dia e noite."
 building_watermills_06: "Moinhos Flutuantes"
 building_watermills_06_desc: "Barcaças permanentemente ancoradas no meio dos rios aproveitam as correntes mais fortes. Em rios sinuosos, as barcaças podem ser reposicionadas para as curvas externas sem muito esforço."
 building_watermills_07: "Diques e Represas"
 building_watermills_07_desc: "Um conjunto de diques, represas e canais artificiais, tanto para rodas-d'água de baixo quanto de cima, atende às crescentes necessidades de moagem. Com quase todos os locais naturais adequados já ocupados, canais recém-escavados cortam o campo."
 building_watermills_08: "Moinhos de Pólvora"
 building_watermills_08_desc: "Um moinho separado, colocado bem longe de outras indústrias, é totalmente dedicado a moer carvão vegetal e enxofre de forma eficiente e #EMP relativamente#! segura."
 building_type_caravanserai_01: "Caravançará"
 building_type_caravanserai_01_desc: "Um abrigo localizado em terreno inóspito que acolhe viajantes cansados enquanto tenta manter os indesejáveis do lado de fora."
 building_caravanserai_01: "Pequeno Caravançará"
 building_caravanserai_01_desc: "Um edifício retangular simples que fornece comodidades básicas para viajantes e mercadores, para que possam descansar e se recuperar durante longas jornadas."
 building_caravanserai_02: "Bancas de Mercadores"
 building_caravanserai_02_desc: "Pequenas bancas de mercadores, vendendo suprimentos básicos para a estrada. Com um ponto garantido de reabastecimento, as caravanas podem carregar mais mercadorias."
 building_caravanserai_03: "Alojamentos da Guarda"
 building_caravanserai_03_desc: "A adição de alojamentos permanentes para a guarda e de um conjunto de torres de vigia, guarnecidas por sentinelas vigilantes, protege ativamente contra os perigos à espreita na vastidão da noite."
 building_caravanserai_04: "Salões de Mercadores"
 building_caravanserai_04_desc: "Nestes salões, mercadores de todos os cantos da Terra trocam mercadorias e compartilham histórias das terras por onde viajaram."
 building_caravanserai_05: "Posto Alfandegário"
 building_caravanserai_05_desc: "Sob o calor severo do sol, oficiais de semblante austero pesam, registram e taxam adequadamente todas as mercadorias que passam por este caravançará. Nas sombras, indivíduos de semblante amável oferecem meios de mover os bens por uma taxa ainda mais... #EMP apropriada#!."
 building_caravanserai_06: "Oficinas de Artesãos"
 building_caravanserai_06_desc: "Com a abundância de matérias-primas e patronos ricos, artesãos são capazes de fabricar e vender artefatos magníficos."
 building_caravanserai_07: "Casas de Banho"
 building_caravanserai_07_desc: "Amplas casas de banho satisfazem até os desejos mais luxuosos. Para aqueles que viajam com bolsas mais leves, oferecem um refresco simples, porém bem-vindo."
 building_caravanserai_08: "Câmaras Reais"
 building_caravanserai_08_desc: "A adição de câmaras adequadas acomoda apropriadamente os importantes e honradíssimos indivíduos que visitam com frequência, deste reino e de além."
 building_type_workshops_01: "Oficinas"
 building_type_workshops_01_desc: "Flecheiros, arqueiros fabricantes de arcos e carpinteiros trabalham nestas oficinas para construir armas de cerco e fornecer suprimentos às tropas durante campanhas prolongadas."
 building_workshops_01: "Campos de Tiro"
 building_workshops_01_desc: "Uma grande área foi limpa de obstáculos para acomodar arqueiros ou engenheiros de cerco com um espaço onde possam testar seus equipamentos e praticar suas habilidades."
 building_workshops_02: "Cordoarias"
 building_workshops_02_desc: "Dia e noite, em uma vala longa e estreita parcialmente abrigada das intempéries, trabalhadores estendem e trançam cordas e fios, tanto de origem vegetal quanto animal."
 building_workshops_03: "Depósitos de Cordas"
 building_workshops_03_desc: "Uma instalação de armazenamento dedicada mantém um estoque pronto para uso de cordas para arcos, bestas e armas de cerco por torção."
 building_workshops_04: "Guilda dos Tuneleiros"
 building_workshops_04_desc: "Embora pareça enganosamente simples, cavar túneis durante cercos é uma ocupação que exige muita dedicação e perícia. Aqueles que sobreviveram ao seu primeiro cerco podem compartilhar o conhecimento e as habilidades práticas com voluntários ansiosos."
 building_workshops_05: "Guilda dos Flecheiros"
 building_workshops_05_desc: "Não mais parte da guilda dos fabricantes de arcos devido ao aumento da demanda tanto por armas quanto por munição, uma guilda separada de flecheiros fornece sem descanso todas as flechas necessárias para sustentar as tropas em campanha."
 building_workshops_06: "Salões dos Matemáticos"
 building_workshops_06_desc: "Ajustes repetidos por tentativa e erro nos parâmetros das máquinas de torção, feitos para alcançar melhor precisão e alcance, levaram alguns de nossos engenheiros de cerco a começar a registrar seus métodos bem-sucedidos. Seus registros agora enchem salões inteiros, vivos de agitação e discussão."
 building_workshops_07: "Dimensões Padronizadas de Armas"
 building_workshops_07_desc: "Com livros de registro cheios dos comprimentos desejados para várias vigas de madeira, finalmente podemos garantir que um projétil pesando 90 quilos seja lançado exatamente a 300 metros. Em condições climáticas ideais. Na maior parte do tempo."
 building_workshops_08: "Depósitos de Pólvora"
 building_workshops_08_desc: "Um edifício destacado e robusto, com uma política rígida de entrada, serve como armazenamento para quantidades aterrorizantes de pólvora, a ser usada tanto para poderosas cargas de ruptura na guerra de túneis quanto como propelente para bombardas."
 building_type_wind_furnace_01: "Fornos de Vento"
 building_type_wind_furnace_01_desc: "Colocados em terreno acidentado na costa oceânica, onde os ventos das monções primeiro atingem a terra, os fornos de vento fundem um aço de fama mundial e qualidade impecável."
 building_wind_furnace_01: "Pequenos Fornos de Vento"
 building_wind_furnace_01_desc: "Fornos orientados diretamente para o oeste, para que possam captar e usar o máximo possível do vento incidente."
 building_wind_furnace_02: "Tuyeres Reutilizáveis"
 building_wind_furnace_02_desc: "As tuyeres, entradas metálicas de ar para o forno, são cuidadosamente ajustadas ao centro para dar uma medida de estabilidade ao ar interno, anulando os efeitos das rajadas. Na fundição seguinte, são reutilizadas ao serem colocadas na base das paredes frontais, permitindo que a escória escoe dos fornos."
 building_wind_furnace_03: "Paredes Frontais de Argila"
 building_wind_furnace_03_desc: "As paredes frontais de argila dos fornos são cuidadosamente projetadas para resistir tanto ao calor quanto à formação de escória durante a fundição, ao mesmo tempo em que podem ser facilmente quebradas ao fim do processo."
 building_wind_furnace_04: "Procedimentos de Pré-Aquecimento"
 building_wind_furnace_04_desc: "Um longo pré-aquecimento, que permite ao carvão queimar adequadamente, seguido pela adição gradual de uma mistura de minério e carvão, é concluído com uma entrada adicional de carvão."
 building_wind_furnace_05: "Paredes Traseiras Curvas"
 building_wind_furnace_05_desc: "Sustentada por duas pedras verticais, a curvatura da parede traseira permanente limita o contato com a escória quente e corrosiva, permitindo que o forno opere por mais tempo sem precisar de reconstrução completa."
 building_wind_furnace_06: "Paredes Frontais Mais Longas"
 building_wind_furnace_06_desc: "Paredes frontais alongadas permitem aumentar a quantidade de aço produzida em cada fundição, mantendo as demais dimensões iguais e, assim, preservando as excelentes propriedades dos fornos e do aço."
 building_wind_furnace_07: "Carvoeiros"
 building_wind_furnace_07_desc: "Mais afastados da costa que os fornos, uma linha de carvoeiros aquece madeira constantemente para abastecer a indústria em expansão."
 building_wind_furnace_08: "Processamento de Minério de Ferro"
 building_wind_furnace_08_desc: "Ao triturar o minério com mais rigor e tostá-lo antes de colocá-lo nos fornos, é possível obter rendimentos maiores e de qualidade ainda melhor."
 building_type_theodosian_walls_01: "As Muralhas de Teodósio"
 building_type_theodosian_walls_01_desc: "As Muralhas de Teodósio foram construídas durante o reinado do Imperador Teodósio II no início do século V, mas ainda permanecem entre as fortificações mais formidáveis já erguidas por mãos humanas."
 building_theodosian_walls_01: "Muralhas de Teodósio"
 building_theodosian_walls_01_desc: "$building_type_theodosian_walls_01_desc$"
 building_type_aurelian_walls_01: "As Muralhas Aurelianas"
 building_type_aurelian_walls_01_desc: "As Muralhas Aurelianas foram construídas durante o reinado dos imperadores romanos Aureliano e Probo. Até hoje oferecem uma defesa formidável, cercando completamente as sete colinas de Roma."
 building_aurelian_walls_01: "Muralhas Aurelianas"
 building_aurelian_walls_01_desc: "$building_type_aurelian_walls_01_desc$"
 building_type_the_colosseum_01: "O Coliseu"
 building_type_the_colosseum_01_desc: "O Coliseu é um dos maiores anfiteatros já construídos e sediou incontáveis espetáculos, como combates de gladiadores, caçadas de animais e até batalhas navais recriadas. Sua construção foi iniciada pelo imperador romano Vespasiano em 72 d.C. e concluída em 80 d.C. sob seu sucessor, Tito.\n\nApesar de sua história vibrante, seu uso principal hoje é a extração de mármore e bronze para uso em outros lugares."
 building_the_colosseum_01: "$building_type_the_colosseum_01$"
 building_the_colosseum_01_desc: "$building_type_the_colosseum_01_desc$"
 building_type_hadrians_wall_01: "Muralha de Adriano"
 building_type_hadrians_wall_01_desc: "A Muralha de Adriano foi construída na época romana para manter os pictos do norte fora da província da Britânia. Hoje em dia ela não serve a nenhum propósito defensivo, mas suas pedras são uma fonte barata e conveniente de material de construção!"
 building_hadrians_wall_01: "$building_type_hadrians_wall_01$"
 building_hadrians_wall_01_desc: "$building_type_hadrians_wall_01_desc$"
 building_type_offas_dyke_01: "Dique de Offa"
 building_type_offas_dyke_01_desc: "O Dique de Offa, uma longa vala ladeada por um muro de terra, foi construído pelo rei anglo-saxão da Mércia para defender a fronteira em direção ao País de Gales. Este aterro elevado oferece vantagem a quem estiver do lado do muro, já que quaisquer atacantes precisam lutar morro acima a partir da vala."
 building_offas_dyke_01: "$building_type_offas_dyke_01$"
 building_offas_dyke_01_desc: "$building_type_offas_dyke_01_desc$"
 building_type_buddhas_of_bamian_01: "Budas de $c_bamian$"
 building_type_buddhas_of_bamian_01_desc: "Esculpidos na encosta da montanha, os enormes Budas de Bamiyan se erguem sobre quaisquer visitantes. Embora a área ao seu redor já não seja mais o próspero centro de aprendizado budista que um dia foi, ainda há numerosos peregrinos e eruditos budistas visitando as estátuas. Um governante astuto de $rf_eastern$ შესაძლოა até conseguir lucrar com os peregrinos, além de obter alguns insights pessoais."
 building_buddhas_of_bamian_01: "$building_type_buddhas_of_bamian_01$"
 building_buddhas_of_bamian_01_desc: "$building_type_buddhas_of_bamian_01_desc$"
 NOT_BUDDHAS_OF_BAMIAN_ENABLED: "O [holder|lE] deve ser da [religious_family|lE] $rf_eastern$"
 building_type_petra_01: "Petra"
 building_type_petra_01_desc: "A cidade de Petra é uma verdadeira maravilha do mundo antigo. Esculpida diretamente da rocha naturalmente rosada, a cidade se ergue como uma curiosidade que intriga até o mais poderoso sultão."
 building_petra_01: "$building_type_petra_01$"
 building_petra_01_desc: "$building_type_petra_01_desc$"
 building_type_house_of_wisdom_01: "Casa da Sabedoria"
 building_type_house_of_wisdom_01_desc: "A Casa da Sabedoria contém uma vasta coleção de livros, e os escribas ali trabalham incansavelmente dia e noite para traduzir ainda mais grandes obras da literatura. As fontes variam entre gregas, persas, indianas e muitas outras — verdadeiramente, ela contém todo o conhecimento do mundo! Um farol resplandecente do saber humano! E confortavelmente distante dos cavaleiros analfabetos da estepe..."
 building_house_of_wisdom_01: "$building_type_house_of_wisdom_01$"
 building_house_of_wisdom_01_desc: "$building_type_house_of_wisdom_01_desc$"
 building_type_palace_of_aachen_01: "$building_palace_of_aachen_01$"
 building_type_palace_of_aachen_01_desc: "O Palácio de Aachen foi escolhido por Carlos Magno para ser o centro de poder do Império Carolíngio. Ele servia a um propósito tanto político quanto religioso e ainda é um excelente local para sediar reuniões importantes."
 building_palace_of_aachen_01: "Palácio de Aachen"
 building_palace_of_aachen_01_desc: "$building_type_palace_of_aachen_01_desc$"
 building_type_notre_dame_01: "$building_notre_dame_01$"
 building_type_notre_dame_01_desc: "Também conhecida como 'Nossa Senhora de Paris', esta magnífica catedral é dedicada à Virgem Maria. Construída em estilo gótico, ela impressiona com numerosas estátuas e enormes rosáceas coloridas.\n\nDo lado de fora, a catedral é coberta de esculturas que recontam vividamente histórias bíblicas, permitindo que até camponeses analfabetos compreendam a glória de Deus!"
 building_notre_dame_01: "Notre-Dame"
 building_notre_dame_01_desc: "$building_type_notre_dame_01_desc$"
 building_type_hagia_sophia_01: "Hagia Sophia"
 building_type_hagia_sophia_01_desc: "A Hagia Sophia é uma verdadeira maravilha da engenharia, com uma enorme cúpula que se destaca como sua característica mais impressionante. Concluída em 537 d.C. pelo imperador Justiniano I, ela agora abriga o Patriarca Ecumênico e se ergue como um monumento ao cristianismo.\n\nE assim permanecerá por toda a eternidade, pois certamente nada poderia derrubar o poder de Roma."
 building_hagia_sophia_01: "Catedral de Hagia Sophia"
 building_hagia_sophia_01_desc: "$building_type_hagia_sophia_01_desc$"
 building_hagia_sophia_02: "Mesquita de Hagia Sophia"
 building_hagia_sophia_02_desc: "A Hagia Sophia é uma verdadeira maravilha da engenharia, com uma enorme cúpula e quatro impressionantes minaretes que se destacam como suas características mais notáveis. Iniciada em 537 d.C. pelo imperador Justiniano I, desde então foi transformada em uma mesquita inspiradora.\n\nE assim permanecerá por toda a eternidade, pois certamente nada poderia derrubar o poder de Rum."
 building_type_dome_of_the_rock_01: "Templo em Jerusalém"
 building_type_dome_of_the_rock_01_desc: "A Cúpula da Rocha está situada no centro do Monte do Templo, no local onde se ergueram o Templo de Salomão e o Segundo Templo Judaico. Diz-se que a pedra fundamental do templo é o lugar onde Deus criou o mundo e o primeiro humano, Adão. A Cúpula da Rocha e a Igreja do Santo Sepulcro, nas proximidades, atraem peregrinos abraâmicos do mundo inteiro."
 building_dome_of_the_rock_01: "Cúpula da Rocha"
 building_dome_of_the_rock_01_desc: "$building_type_dome_of_the_rock_01_desc$"
 building_temple_in_jerusalem_01: "O Terceiro Templo"
 building_temple_in_jerusalem_01_desc: "Centenas de anos após a destruição do Segundo Templo, finalmente chegou a hora de restaurar o Templo em Jerusalém! Este Terceiro Templo resistirá ao teste do tempo, vigiado atentamente contra todos que desejarem vê-lo destruído."
 building_type_stonehenge_01: "Stonehenge"
 building_type_stonehenge_01_desc: "Stonehenge é uma estrutura antiga e mística que inspirou muitos eruditos. Ainda hoje, nestes tempos iluminados, homens instruídos de toda a Bretanha acorrem para estudá-la. Qual é, de fato, o seu propósito?"
 building_stonehenge_01: "$building_type_stonehenge_01$"
 building_stonehenge_01_desc: "$building_type_stonehenge_01_desc$"
 building_type_iron_pillar_of_dhar_01: "Pilar de Ferro de Dhar"
 building_type_iron_pillar_of_dhar_01_desc: "O Pilar de Ferro de Dhar é construído a partir das armas derretidas de um exército inteiro. O artesanato é verdadeiramente impressionante, trazendo glória à dinastia que o possui."
 building_iron_pillar_of_dhar_01: "$building_type_iron_pillar_of_dhar_01$"
 building_iron_pillar_of_dhar_01_desc: "$building_type_iron_pillar_of_dhar_01_desc$"
 building_type_iron_pillar_of_delhi_01: "Pilar de Ferro de Delhi"
 building_type_iron_pillar_of_delhi_01_desc: "O poderoso Pilar de Ferro de Delhi ergue-se como um símbolo da glória do rei Chandragupta II, embora governantes posteriores também tenham gravado seus nomes nele. Apesar de estar de pé há muito tempo, não há vestígio de ferrugem — um testemunho da habilidade dos ferreiros indianos!"
 building_iron_pillar_of_delhi_01: "$building_type_iron_pillar_of_delhi_01$"
 building_iron_pillar_of_delhi_01_desc: "$building_type_iron_pillar_of_delhi_01_desc$"
 building_type_the_pyramids_01: "As Pirâmides"
 building_type_the_pyramids_01_desc: "As pirâmides, sobretudo a de Quéops, erguem-se como maravilhas do mundo antigo. Vastíssimas e impressionantes, elas enobrecem a imagem de qualquer governante que as controle."
 building_the_pyramids_01: "$building_type_the_pyramids_01$"
 building_the_pyramids_01_desc: "$building_type_the_pyramids_01_desc$"
 building_type_alhambra_01: "Alhambra"
 building_type_alhambra_01_desc: "A Alhambra é uma fortaleza construída sobre os restos de uma antiga fortificação romana. Embora seja funcional como estrutura defensiva, com os investimentos certos poderia ser transformada em algo mais..."
 building_alhambra_01: "Ruínas da Fortaleza de $building_type_alhambra_01$"
 building_alhambra_01_desc: "$building_type_alhambra_01_desc$"
 building_alhambra_02: "Palácio Real da $building_type_alhambra_01$"
 building_alhambra_02_desc: "A Alhambra, desde os dias em que era uma mera ruína romana, foi transformada em um palácio real digno de um imperador! Um exemplo brilhante da arquitetura local, a cor dos edifícios em contraste com as florestas ao redor levou poetas a descrevê-la como "uma pérola incrustada em esmeraldas"."
 building_type_shwedagon_pagoda_01: "Pagode Shwedagon"
 building_type_shwedagon_pagoda_01_desc: "O Pagode Shwedagon é uma estupa budista sagrada construída pelo povo Mon por volta do ano 500. Ela abriga muitas relíquias famosas, como o bastão de Kakusandha, o filtro de água de Koṇāgamana, um pedaço do manto de Kassapa e oito fios de cabelo da cabeça de Gautama."
 building_shwedagon_pagoda_01: "Pagode Shwedagon"
 building_shwedagon_pagoda_01_desc: "$building_type_shwedagon_pagoda_01_desc$"
 building_type_khajuraho_01: "Cidade-Templo"
 building_type_khajuraho_01_desc: "Os templos de Khajuraho são dedicados à coexistência entre hindus e jainistas, onde suas diversas visões religiosas são celebradas. As paredes do templo são cobertas com arte e esculturas intrincadas, tornando o lugar verdadeiramente resplandecente e atraente tanto para peregrinos quanto para eruditos."
 building_khajuraho_01: "Khajuraho"
 building_khajuraho_01_desc: "$building_type_khajuraho_01_desc$"
 building_type_the_tower_of_london_01: "A Torre de Londres"
 building_type_the_tower_of_london_01_desc: "A Torre de Londres é um castelo que serve tanto como fortificação vital quanto como prisão. A torre central é chamada de 'Torre Branca' e abriga a classe governante. A posição da Torre de Londres significa que ela é vital para a defesa de todo o condado."
 building_the_tower_of_london_01: "A Torre de Londres"
 building_the_tower_of_london_01_desc: "$building_type_the_tower_of_london_01_desc$"
 building_type_london_bridge_01: "Ponte de Londres"
 building_type_london_bridge_01_desc: "Há pontes sobre o rio Tâmisa desde tempos imemoriais, mas esta — feita de poderosa pedra — ergue-se mais grandiosa do que todas as anteriores. As correntes revoltas abaixo levaram à aceitação comum de que a ponte é para os sábios passarem por cima, e para os tolos passarem por baixo."
 building_london_bridge_01: "Ponte de Londres"
 building_london_bridge_01_desc: "Ampliada $building_type_london_bridge_01_desc$"
 building_type_citadel_of_aleppo_01: "$building_citadel_of_aleppo_01$"
 building_type_citadel_of_aleppo_01_desc: "A Cidadela de Alepo é uma fortificação antiga, tendo sido usada por numerosos poderes desde que foi construída. A cidadela serve como residência real, refúgio fortificado, templo e prisão."
 building_citadel_of_aleppo_01: "Cidadela de Alepo"
 building_citadel_of_aleppo_01_desc: "$building_type_citadel_of_aleppo_01_desc$"
 building_citadel_of_aleppo_02: "Cidadela Reconstruída de Alepo"
 building_citadel_of_aleppo_02_desc: "Após passar por uma grande reconstrução, a Cidadela de Alepo foi significativamente fortificada e transformada em uma verdadeira cidade-palácio!"
 building_type_holy_site_cathedral_01: "Grande Catedral"
 building_type_holy_site_cathedral_01_desc: "O [holy_site|lE] desta região atrai peregrinos cristãos de todo o mundo conhecido. A grande catedral não é apenas uma maravilha de engenharia e beleza, mas também um porto seguro para viajantes e um prestigioso monumento ao seu patrono."
 building_holy_site_cathedral_01: "Grande Catedral"
 building_holy_site_cathedral_01_desc: "$building_type_holy_site_cathedral_01_desc$"
 building_type_holy_site_mosque_01: "Grande Mesquita"
 building_type_holy_site_mosque_01_desc: "O [holy_site|lE] desta região é um destino popular para peregrinos devotos. A grande mesquita lhes oferece um lugar para rezar, descansar e prestar homenagem antes de seguirem viagem. Suas belas cúpulas e grandes torres intrincadas sinalizam a grandeza de Deus para todos verem."
 building_holy_site_mosque_01: "Grande Mesquita"
 building_holy_site_mosque_01_desc: "$building_type_holy_site_mosque_01_desc$"
 building_type_holy_site_pagan_grand_temple_01: "Grande Templo"
 building_type_holy_site_pagan_grand_temple_01_desc: "O [holy_site|lE] desta região atrai os fiéis em multidões. O grande templo é coberto por entalhes ornamentados que exibem feitos heroicos de deuses e semideuses. Enormes fogueiras enviam colunas de fumaça aos próprios deuses, enquanto homens santos administram bênçãos a todos que veneram os espíritos."
 building_holy_site_pagan_grand_temple_01: "Grande Templo"
 building_holy_site_pagan_grand_temple_01_desc: "$building_type_holy_site_pagan_grand_temple_01_desc$"
 building_type_holy_site_indian_grand_temple_01: "Grande Templo"
 building_type_holy_site_indian_grand_temple_01_desc: "O [holy_site|lE] desta região atrai dezenas de humildes peregrinos em busca de purificar suas almas. O grande templo é coberto da fundação ao pináculo com estátuas e ídolos dos deuses, recontando antigas lendas e as vidas de nobres profetas."
 building_holy_site_indian_grand_temple_01: "Grande Templo"
 building_holy_site_indian_grand_temple_01_desc: "$building_type_holy_site_indian_grand_temple_01_desc$"
 building_type_holy_site_buddhist_grand_temple_01: "Grande Templo"
 building_type_holy_site_buddhist_grand_temple_01_desc: "O [holy_site|lE] desta região atrai dezenas de humildes peregrinos em busca de purificar suas almas. No centro do complexo há uma grande Estupa, lar de várias Relíquias do próprio Buda."
 building_holy_site_buddhist_grand_temple_01: "Grande Templo"
 building_holy_site_buddhist_grand_temple_01_desc: "$building_type_holy_site_buddhist_grand_temple_01_desc$"
 building_type_holy_site_other_grand_temple_01: "Grande Templo"
 building_type_holy_site_other_grand_temple_01_desc: "O [holy_site|lE] desta região é um ponto de encontro para os devotos e dedicados. O grande templo se ergue como um nobre tributo aos poderes superiores, com suas paredes e cúpulas alisadas e pintadas em cores resplandecentes que honram o divino."
 building_holy_site_other_grand_temple_01: "Grande Templo"
 building_holy_site_other_grand_temple_01_desc: "$building_type_holy_site_other_grand_temple_01_desc$"
 building_holy_site_chinese_temple_01: "$building_type_holy_site_buddhist_grand_temple_01$"
 building_holy_site_chinese_temple_01_desc: "O [holy_site|lE] desta região é um ponto focal para os fiéis. Edifícios palacianos de templo e pagodes em cores simbólicas são dispostos em harmonia ao redor de um pátio simétrico. O arranjo equilibrado do complexo irradia uma reverência pacífica."
 building_holy_site_japanese_temple_01: "Grande Santuário"
 building_holy_site_japanese_temple_01_desc: "O [holy_site|lE] desta região é um ponto de encontro para os devotos e dedicados. Um telhado impressionante compõe quase metade do edifício principal do templo e pode ser visto de longe. No interior, um grande salão único pode abrigar tantos visitantes piedosos quanto necessário."
 building_holy_site_se_asia_pagan_temple_01: "$building_holy_site_other_grand_temple_01$"
 building_holy_site_se_asia_pagan_temple_01_desc: "$building_type_holy_site_other_grand_temple_01_desc$"
 building_type_holy_site_chinese_temple_01: "$building_holy_site_chinese_temple_01$"
 building_type_holy_site_chinese_temple_01_desc: "$building_holy_site_chinese_temple_01_desc$"
 building_type_holy_site_japanese_temple_01: "$building_holy_site_japanese_temple_01$"
 building_type_holy_site_japanese_temple_01_desc: "$building_holy_site_japanese_temple_01_desc$"
 building_type_holy_site_se_asia_pagan_temple_01: "$building_holy_site_other_grand_temple_01$"
 building_type_holy_site_se_asia_pagan_temple_01_desc: "$building_type_holy_site_other_grand_temple_01_desc$"
