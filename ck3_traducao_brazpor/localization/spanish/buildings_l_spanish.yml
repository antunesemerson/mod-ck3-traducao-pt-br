 building_type_hetian_mines_01: "As Minas de Khotan"
 building_type_hetian_mines_01_desc: "Khotan é a fonte do jade de Hetian desde o início dos tempos. Esta preciosa pedra branca é a mais valorizada de todos os jades, considerada por muitos mais valiosa que ouro ou prata. O jade é extraído tanto diretamente da montanha quanto recolhido diretamente de poços abertos e leitos de rios."
 building_hetian_mines_01: "Assentamento de Mineração de Khotan"
 building_hetian_mines_01_desc: "$building_type_hetian_mines_01_desc$"
 building_hetian_mines_02: "Mina de Khotan"
 building_hetian_mines_02_desc: "À medida que o assentamento de mineração cresce, mais e mais jade está sendo extraído. Conforme a fama das pedras preciosas cresce, um fluxo cada vez maior de engenheiros e mercadores competentes melhora bastante a lucratividade da operação."
 building_hetian_mines_03: "Grande Mina de Khotan"
 building_hetian_mines_03_desc: "À medida que as operações de mineração crescem, as próprias minas também crescem. Mais pessoas são empregadas na mineração, e o trânsito de ida e volta entre os muitos locais onde o jade é extraído agora é uma característica constante da paisagem."
 building_hetian_mines_04: "Complexo de Mineração de Khotan"
 building_hetian_mines_04_desc: "Com o tempo, o jade passou a ser não apenas a principal exportação desta região, mas também o sustento de muitos de seus artesãos e trabalhadores especializados. Uma verdadeira indústria de oficinas e revendedores agora se alinha pelas ruas."
 building_type_dushan_mines_01: "As Minas de Dushan"
 building_type_dushan_mines_01_desc: "Um dos quatro grandes jades da China, Dushan é um local de mineração de jade desde a dinastia Han. Diferencia-se de outros tipos de jade tanto por ter uma cor mais rica quanto por essa cor também ser muitas vezes mais mesclada do que em outros tipos."
 building_dushan_mines_01: "Assentamento de Mineração de Dushan"
 building_dushan_mines_01_desc: "$building_type_dushan_mines_01_desc$"
