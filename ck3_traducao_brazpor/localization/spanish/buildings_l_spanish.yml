 building_type_powder_magazine_01: "Fabricação de Pólvora"
 building_type_powder_magazine_01_desc: "A pólvora exige produção, armazenamento e manutenção dedicados para permanecer funcional. Para recrutar [GetMaA('handgunners').GetName|l] e outras unidades que requerem essa força potente, edifícios especializados devem ser erguidos."
 building_powder_magazine_01: "Armazém de Pólvora"
 building_powder_magazine_01_desc: "Armazéns nos quais a pólvora pode ser mantida segura contra os elementos para minimizar o risco de acidentes."
 building_powder_magazine_02: "Escritório de Logística da Pólvora"
 building_powder_magazine_02_desc: "Contratar oficiais que possam supervisionar uma força de trabalho dedicada a lidar com a complicada logística da pólvora garantirá que a pólvora seja armazenada corretamente e transportada pelo reino sem incidentes."
 building_powder_magazine_03: "Mina de Enxofre"
 building_powder_magazine_03_desc: "O enxofre, às vezes chamado de brimstone, existe em abundância, mas pode ser difícil de produzir em grandes quantidades. Uma mina dedicada garantirá um fornecimento constante desse mineral precioso."
 building_powder_magazine_04: "Oficina de Salitre"
 building_powder_magazine_04_desc: "Um componente-chave na criação da pólvora, o salitre requer mãos habilidosas em um ambiente controlado para ser produzido em grande quantidade sem incendiar o edifício inteiro."
 building_powder_magazine_05: "Depósitos de Pólvora"
 building_powder_magazine_05_desc: "O armazenamento de pólvora requer a criação de edifícios dedicados com paredes reforçadas, localizados com segurança longe de lugares habitados e valiosos."
 building_powder_magazine_06: "Guarita"
 building_powder_magazine_06_desc: "A pólvora já é perigosa por si só, mas pode ser ainda mais se cair em mãos erradas. Um grande número de guardas agora pode ser empregado para mantê-la protegida de olhos curiosos."
 building_powder_magazine_07: "Oficina de Refino de Pólvora"
 building_powder_magazine_07_desc: "Um edifício separado no qual os diferentes componentes são combinados para criar pólvora. Se um acidente ocorrer, espera-se que ele não arruíne mais todo o estabelecimento."
 building_powder_magazine_08: "Instalação de Canhões de Mão"
 building_powder_magazine_08_desc: "Canhões de mão podem ser pouco confiáveis e rachar durante o uso. Portanto, devemos obter o melhor equipamento possível e contratar os artesãos mais habilidosos disponíveis para produzir armas da mais alta qualidade"
 powder_magazine_1_effect_desc: "$unlocks_building_desc$ Limite de recrutamento de [men_at_arms|lE] de [gunpowder|lE]: #P +[EmptyScope.ScriptValue('gunpowder_building_limit_bonus_1')|0]#!"
 powder_magazine_2_effect_desc: "$unlocks_building_desc$ Limite de recrutamento de [men_at_arms|lE] de [gunpowder|lE]: #P +[EmptyScope.ScriptValue('gunpowder_building_limit_bonus_2')|0]#!"
 powder_magazine_3_effect_desc: "$unlocks_building_desc$ Limite de recrutamento de [men_at_arms|lE] de [gunpowder|lE]: #P +[EmptyScope.ScriptValue('gunpowder_building_limit_bonus_3')|0]#!"
 building_type_mandala_capital_01: "Complexo de Templo da Capital"
 building_type_mandala_capital_01_desc: "Este [great_project|lE] não é apenas um templo. É um testemunho de nossa fibra. De nossas realizações. De nossa #EMP grandiosidade#!. Um templo como este simboliza o governo e a benevolência de nosso divino e poderoso Devaraja."
 building_mandala_capital_01: "Templo Ornamentado"
 building_mandala_capital_01_desc: "Um início humilde para um grande legado, este templo ornamentado é um lugar para cultuar e rezar ao Devaraja governante."
 building_mandala_capital_02: "Templo Majestoso"
 building_mandala_capital_02_desc: "Aprimorando o edifício original do templo, o templo da capital foi ampliado com santuários, mobiliário e decorações adicionais."
 building_mandala_capital_03: "Terras do Templo"
 building_mandala_capital_03_desc: "Mais alojamentos foram adicionados para transformar o templo em um promissor conjunto de terras do templo.\nAgora ele abriga vários santuários para culto, bem como abrigo para os fiéis, servos e o clero."
 building_mandala_capital_04: "Grande Complexo de Templo"
 building_mandala_capital_04_desc: "O complexo do templo agora ocupa o tamanho de uma pequena aldeia e se tornou amplamente autossuficiente na maioria das necessidades.\nUm pequeno relicário e lagos de reflexão que se estendem de leste a oeste foram adicionados, aumentando ainda mais a conexão com o plano espiritual."
 building_mandala_capital_05: "Palácio-Templo Divino"
 building_mandala_capital_05_desc: "Uma joia arquitetônica raramente vista, o palácio-templo foi ampliado com magníficos aposentos para o divino Devaraja.\nMonumentos, relíquias, tesouros — viajantes vêm de toda parte para se maravilhar com o excesso deste palácio-templo divino."
 building_type_wulingyuan_01: "$building_wulingyuan_01$"
 building_type_wulingyuan_01_desc: "$building_wulingyuan_01_desc$"
 building_wulingyuan_01: "Wulingyuan"
 building_wulingyuan_01_desc: "Estas montanhas estão repletas de milhares de imponentes pilares de arenito que se erguem bem acima do solo. Embora os pilares sejam a característica mais marcante, a área também é repleta de ravinas, riachos, pequenos lagos e cavernas."
 building_type_leshan_giant_buddha_01: "$building_leshan_giant_buddha_01$"
 building_type_leshan_giant_buddha_01_desc: "$building_leshan_giant_buddha_01_desc$"
 building_leshan_giant_buddha_01: "Grande Buda de Leshan"
 building_leshan_giant_buddha_01_desc: "Esculpida na encosta de um penhasco, esta estátua de Buda está voltada para a confluência dos rios Min e Dadu, saudando viajantes cansados em sua jornada."
 building_type_yungang_grottoes_01: "$building_yungang_grottoes_01$"
 building_type_yungang_grottoes_01_desc: "$building_yungang_grottoes_01_desc$"
 building_yungang_grottoes_01: "Grutas de Yungang"
 building_yungang_grottoes_01_desc: "Um grande complexo de grutas de templo, contendo várias dezenas de cavernas maiores e centenas de menores. As cavernas estão repletas de milhares e milhares de estátuas de Buda."
 building_type_wudang_mountain_temples_01: "$building_wudang_mountain_temples_01$"
 building_type_wudang_mountain_temples_01_desc: "$building_wudang_mountain_temples_01_desc$"
 building_wudang_mountain_temples_01: "Templos da Montanha Wudang"
 building_wudang_mountain_temples_01_desc: "As montanhas Wudang são uma das várias montanhas sagradas para o Taoismo. Elas também abrigam um grande complexo de templos, famoso pela prática de tai chi."
 building_type_shaolin_monastery_01: "$building_shaolin_monastery_01$"
 building_type_shaolin_monastery_01_desc: "$building_shaolin_monastery_01_desc$"
 building_shaolin_monastery_01: "Mosteiro de Shaolin"
 building_shaolin_monastery_01_desc: "O Mosteiro de Shaolin é talvez mais famoso por ser o berço do kung fu Shaolin e por formar monges altamente habilidosos em artes marciais. No entanto, ele também é um local de aprendizado e estudo, e de tradução de textos budistas."
 building_type_lingyin_temple_01: "$building_lingyin_temple_01$"
 building_type_lingyin_temple_01_desc: "$building_lingyin_temple_01_desc$"
 building_lingyin_temple_01: "Templo Lingyin"
 building_lingyin_temple_01_desc: "O Templo Lingyin foi fundado por um monge e peregrino indiano em 328 d.C. para difundir o budismo. Desde então, o templo cresceu imensamente. Ele possui vários pavilhões, um grande número de grutas e pagodes, e dormitórios suficientes para abrigar milhares de monges."
 building_type_giant_wild_goose_pagoda_01: "$building_giant_wild_goose_pagoda_01$"
 building_type_giant_wild_goose_pagoda_01_desc: "$building_giant_wild_goose_pagoda_01_desc$"
 building_giant_wild_goose_pagoda_01: "Grande Pagode do Ganso Selvagem"
 building_giant_wild_goose_pagoda_01_desc: "O Grande Pagode do Ganso Selvagem foi originalmente construído em 652 d.C. como um local para guardar e conservar textos, entalhes e várias estatuetas. Mais tarde, foi reconstruído para ter impressionantes dez andares, até que várias reconstruções e restaurações o reduziram para sete andares."
 building_type_kaifeng_palace_01: "$building_kaifeng_palace_01$"
 building_type_kaifeng_palace_01_desc: "$building_kaifeng_palace_01_desc$"
 building_kaifeng_palace_01: "Palácio Imperial de Kaifeng"
 building_kaifeng_palace_01_desc: "O palácio imperial de Kaifeng foi construído quando a dinastia Song estabeleceu sua capital na cidade. Um governo forte e eficiente governa dentro destas muralhas, garantindo que a cidade e o reino como um todo prosperem."
 kaifeng_examination_cost_bonus_desc: "Custo da [GetActivityType('activity_imperial_examination').GetTextIcon][GetActivityType( 'activity_imperial_examination').GetName|l] [activity|lE] enquanto esta [barony|lE] for a [realm_capital|lE]: #P -[EmptyScope.ScriptValue('kaifeng_examination_cost_value')|%0]#!"
 kaifeng_palace_name_desc: "[GetBuilding('kaifeng_palace_01').GetName]"
 building_type_forbidden_city_01: "$building_forbidden_city_01$"
 building_type_forbidden_city_01_desc: "$building_forbidden_city_01_desc$"
 building_forbidden_city_01: "A Cidade Proibida"
 building_forbidden_city_01_desc: "A Cidade Proibida é um vasto palácio imperial, composto por quase mil edifícios separados. Todo o complexo é cercado por uma muralha alta e um fosso profundo, protegendo o governo governante e os muitos oficiais que trabalham incansavelmente em seu interior."
 beijing_palace_bonus_desc: "[Concept('governor_efficiency', 'Eficiencia' )|E] dos [governors|lE] enquanto esta [barony|lE] seja a [realm_capital|lE]; #P +[EmptyScope.ScriptValue('forbidden_city_bonus_value')] %#! @governor_efficiency!"
 building_type_qianling_mausoleum_01: "$building_qianling_mausoleum_01$"
 building_type_qianling_mausoleum_01_desc: "$building_qianling_mausoleum_01_desc$"
 building_qianling_mausoleum_01: "Mausoléu de Qianling"
 building_qianling_mausoleum_01_desc: "O Mausoléu de Qianling é principalmente o túmulo do imperador Gaozong e da imperatriz Wu Zetian, embora vários outros membros da família Li também estejam enterrados aqui. O túmulo é protegido por uma muralha retangular, e as muitas estátuas de pedra que adornam a paisagem são uma das características mais reconhecíveis do mausoléu."
 building_type_quanzhou_seaport_01: "$building_quanzhou_seaport_01$"
 building_type_quanzhou_seaport_01_desc: "$building_quanzhou_seaport_01_desc$"
 building_quanzhou_seaport_01: "Porto Marítimo de Quanzhou"
 building_quanzhou_seaport_01_desc: "O porto de Quanzhou atrai mercadores estrangeiros de todas as partes. Sabe-se que comerciantes vêm da Arábia e da Anatólia, do Japão e da Coreia, e de tudo o que existe entre esses lugares. Esse afluxo de embarcações comerciais garante que as indústrias locais estejam florescendo e fez de Quanzhou o principal construtor naval da região."
 building_type_angkor_wat_01: "$building_angkor_wat_01$"
 building_type_angkor_wat_01_desc: "$building_angkor_wat_01_desc$"
 building_angkor_wat_01: "Angkor Wat"
 building_angkor_wat_01_desc: "Angkor Wat é um enorme complexo de templos dedicado à divindade Vishnu. Ele foi projetado para representar o Monte Meru, lar dos deuses na mitologia hindu. O complexo é cercado por um impressionante fosso e possui vários templos com galerias, repletos de arte religiosa, esculturas e relevos."
 building_type_citadel_thang_long_01: "Cidadela de Thăng Long" #昇龍
 building_type_citadel_thang_long_01_desc: "$building_citadel_thang_long_01_desc$"
 building_citadel_thang_long_01: "Cidadela de Đai La"
 building_citadel_thang_long_01_desc: "Uma cidadela que serve como base militar para exércitos locais e é fortemente fortificada para ajudar a repelir invasores."
 building_citadel_thang_long_02: "Cidadela Imperial de Thăng Long" #昇龍
 building_citadel_thang_long_02_desc: "A Cidadela Imperial atua como fortaleza e residência real. O complexo da cidadela inclui três setores: a fortificação principal, a cidade imperial e a Cidade Proibida."
 building_type_po_klong_garai_01: "$building_po_klong_garai_01$"
 building_type_po_klong_garai_01_desc: "$building_po_klong_garai_01_desc$"
 building_po_klong_garai_01: "Templo Po Klong Garai"
 building_po_klong_garai_01_desc: "Um ápice da arquitetura cham, diz-se que o templo Po Klong Garai foi construído para homenagear o lendário rei de mesmo nome. Ele possui três torres distintas de tijolo e uma impressionante escultura do deus Shiva como sua principal obra de arte."
 building_type_dau_temple_01: "$building_dau_temple_01$"
 building_type_dau_temple_01_desc: "$building_dau_temple_01_desc$"
 building_dau_temple_01: "Templo Dâu"
 building_dau_temple_01_desc: "Um templo reverenciado em Luy Lâu marca o local onde monges de terras distantes se reuniram pela primeira vez. A torre de tijolos, as relíquias e os mestres mumificados que ali permanecem incorporam séculos de devoção ao budismo."
 building_type_liuhe_pagoda_01: "$building_liuhe_pagoda_01$"
 building_type_liuhe_pagoda_01_desc: "$building_liuhe_pagoda_01_desc$"
 building_liuhe_pagoda_01: "Pagode Liuhe"
 building_liuhe_pagoda_01_desc: "Um pagode imponente erguido por reis para acalmar as marés e honrar o Buda. Seu farol brilha sobre a terra, símbolo de harmonia entre o homem e o Céu."
 building_type_muaro_jambi_01: "$building_muaro_jambi_01$"
 building_type_muaro_jambi_01_desc: "$building_muaro_jambi_01_desc$"
 building_muaro_jambi_01: "Complexos de Muaro Jambi"
 building_muaro_jambi_01_desc: "Localizados ao longo do rio Batang Hari, os extensos complexos de tijolo de Muaro Jambi protegiam tanto o comércio quanto a fé. Como fortaleza srivijaiana, forneciam refúgio a governantes e mobilizavam exércitos no coração de Sumatra."
 building_type_hanging_temple_01: "$building_hanging_temple_01$"
 building_type_hanging_temple_01_desc: "$building_hanging_temple_01_desc$"
 building_hanging_temple_01: "Templo Suspenso"
 building_hanging_temple_01_desc: "O Templo Suspenso é um mosteiro suspenso na face de um penhasco no Monte Heng. Segundo a lenda, sua construção começou séculos atrás com um monge chamado Liaoran. Seus salões de madeira, construídos sobre estacas, contêm santuários dedicados a sábios budistas, taoistas e confucionistas, mesclando fés e desafiando a gravidade com serena elegância."
 building_type_pagoda_of_fogong_temple_01: "$building_pagoda_of_fogong_temple_01$"
 building_type_pagoda_of_fogong_temple_01_desc: "$building_pagoda_of_fogong_temple_01_desc$"
 building_pagoda_of_fogong_temple_01: "Pagode do Templo de Fogong"
 building_pagoda_of_fogong_temple_01_desc: "O Pagode do Templo de Fogong é um alto pagode de madeira construído sem pregos. Erguendo-se por nove andares, abriga relíquias sagradas e estátuas, e seu engenhoso projeto continua sendo uma maravilha da engenharia e um símbolo de fé."
 building_type_plain_of_jars_01: "$building_plain_of_jars_01$"
 building_type_plain_of_jars_01_desc: "$building_plain_of_jars_01_desc$"
 building_plain_of_jars_01: "Planície dos Jarros"
 building_plain_of_jars_01_desc: "A Planície dos Jarros é um vasto planalto coberto por gigantescos recipientes de pedra, cujo propósito está envolto em mistério. Outrora usados em ritos antigos, eles perduram como relíquias de um povo esquecido, inspirando assombro e reverência local."
 building_type_dieng_plateau_01: "$building_dieng_plateau_01$"
 building_type_dieng_plateau_01_desc: "$building_dieng_plateau_01_desc$"
 building_dieng_plateau_01: "Planalto de Dieng"
 building_dieng_plateau_01_desc: "O Planalto de Dieng é uma bacia vulcânica coberta de névoa, onde poças de enxofre e saídas de gás pontuam a paisagem. Templos antigos dispersos e lendas rituais fazem dele um lugar ao mesmo tempo temido e reverenciado, uma terra alta sagrada onde antigas divindades do bem e do mal vagavam outrora."
 building_type_mount_apo_01: "$building_mount_apo_01$"
 building_type_mount_apo_01_desc: "$building_mount_apo_01_desc$"
 building_mount_apo_01: "Monte Apo"
 building_mount_apo_01_desc: "Erguendo-se acima do Lago Venado, o nome do Monte Apo significa \"ancião venerado\" nas línguas lumad. É uma forma abreviada de Apo Sandawa, o espírito da montanha sagrada, também chamado de \"Ancião Sandawa\" ou \"Avô Sandawa\". Rituais para Apo Sandawa são realizados pelo xamã da tribo, visto como um médium para os espíritos dos ancestrais."
 building_type_besakih_temple_01: "$building_besakih_temple_01$"
 building_type_besakih_temple_01_desc: "$building_besakih_temple_01_desc$"
 building_besakih_temple_01: "Templo de Besakih"
 building_besakih_temple_01_desc: "Conhecido como o \"Templo-Mãe de Bali\", Besakih é o complexo de templos hindus mais importante e sagrado da ilha. Ele está localizado nas encostas do Monte Agung, o vulcão mais alto de Bali e montanha sagrada. É o coração religioso e cultural da ilha, sediando grandes cerimônias para todos."
 building_type_gongsanseong_fortress_01: "$building_gongsanseong_fortress_01$"
 building_type_gongsanseong_fortress_01_desc: "$building_gongsanseong_fortress_01_desc$"
 building_gongsanseong_fortress_01: "Fortaleza de Gongsanseong"
 building_gongsanseong_fortress_01_desc: "A Fortaleza de Gongsanseong coroa as colinas acima do rio Geum. Construída como a cidadela real de Baekje, suas longas muralhas e portões de pedra protegiam reis e súditos igualmente, uma fortaleza montanhosa de poder dinástico e defesa."
 building_type_krakatoa_01: "$building_krakatoa_01$"
 building_type_krakatoa_01_desc: "$building_krakatoa_01_desc$"
 building_krakatoa_01: "Krakatoa"
 building_krakatoa_01_desc: "Krakatoa é um vulcão imponente situado em um pequeno arquipélago logo ao largo da costa."
 building_type_borobudur_01: "$building_borobudur_01$"
 building_type_borobudur_01_desc: "$building_borobudur_01_desc$"
 building_borobudur_01: "Borobudur"
 building_borobudur_01_desc: "Borobudur é um enorme templo budista composto por nove plataformas de pedra empilhadas umas sobre as outras, encimadas por uma cúpula central. O templo é decorado com milhares de relevos e centenas de estátuas de Buda."
 building_type_hoshi_ryokan_01: "$building_hoshi_ryokan_01$"
 building_type_hoshi_ryokan_01_desc: "$building_hoshi_ryokan_01_desc$"
 building_hoshi_ryokan_01: "Hōshi Ryokan"
 building_hoshi_ryokan_01_desc: "Hōshi Ryokan é uma antiga hospedaria tradicional e um negócio familiar. Ela oferece aos viajantes um descanso em sua jornada, com repouso, comida e acesso a banhos de fontes termais."
 building_type_celestial_great_barracks_01: "$building_celestial_great_barracks_01$"
 building_type_celestial_great_barracks_01_desc: "$building_celestial_great_barracks_01_desc$"
 building_celestial_great_barracks_01: "Grande Quartel"
 building_celestial_great_barracks_01_desc: "Este enorme quartel e fortaleza fornece ao governador local soldados para reforçar seus exércitos e melhora grandemente as defesas da área."
 celestial_great_barracks_enabled_desc: "[holder.GetShortUIName|U] não [holder.LocalPlayerString( 'eres', 'es' )] um [governor|lE] militar"
 celestial_great_barracks_effect_desc: "[governor_efficiency|E]: @governor_efficiency!#P +[EmptyScope.ScriptValue('great_barracks_bonus_value')]%#!"
 building_type_the_great_wall_01: "$building_the_great_wall_01$"
 building_type_the_great_wall_01_desc: "$building_the_great_wall_01_desc$"
 building_the_great_wall_01: "A Grande Muralha"
 building_the_great_wall_01_desc: "Esta é a parte mais antiga da Grande Muralha, em grande parte construída pela dinastia Qin. As areias do tempo podem ter desgastado pedra, tijolo e argamassa, mas ela ainda é uma formidável obra de fortificação."
 building_type_the_great_wall_02: "$building_the_great_wall_01$"
 building_type_the_great_wall_02_desc: "$building_the_great_wall_02_desc$"
 building_the_great_wall_02: "A Grande Muralha"
 building_the_great_wall_02_desc: "A dinastia Han ampliou enormemente as muralhas existentes construídas por seus predecessores. Eles ergueram algumas das seções mais extensas, atravessando desertos e montanhas por centenas de milhas."
 building_type_the_great_wall_03: "$building_the_great_wall_01$"
 building_type_the_great_wall_03_desc: "$building_the_great_wall_03_desc$"
 building_the_great_wall_03: "A Grande Muralha"
 building_the_great_wall_03_desc: "As dinastias Wei, Qi e Sui todas acrescentaram à muralha durante os séculos V e VI d.C., aprimorando várias seções com fortificações melhores."
 building_type_the_great_wall_04: "$building_the_great_wall_01$"
 building_type_the_great_wall_04_desc: "$building_the_great_wall_04_desc$"
 building_the_great_wall_04: "A Grande Muralha"
 building_the_great_wall_04_desc: "Uma façanha de engenharia das mais impressionantes, esta muralha gigantesca foi expandida muitas vezes desde sua construção inicial no século VII a.C. Agora ela se estende por milhares de milhas e abrange um grande número de torres de vigia, quartéis e postos de guarnição. Certamente nenhum invasor bárbaro jamais superará este poderoso obstáculo?"
 building_type_the_great_wall_shanhai_pass: "$building_the_great_wall_01$"
 building_type_the_great_wall_shanhai_pass_desc: "$building_the_great_wall_04_desc$"
 building_the_great_wall_shanhai_pass: "$building_the_great_wall_04$"
 building_the_great_wall_shanhai_pass_desc: "$building_the_great_wall_04_desc$"
 building_type_the_great_wall_liaodong: "$building_the_great_wall_01$"
 building_type_the_great_wall_liaodong_desc: "$building_the_great_wall_04_desc$"
 building_the_great_wall_liaodong: "$building_the_great_wall_04$"
 building_the_great_wall_liaodong_desc: "$building_the_great_wall_04_desc$"
 special_building_improve_silk_road: "Quando este [special_building|lE] for concluído, ele aproximará a [sub_region_temp.GetName] [situation_sub_region|lE] da [situation_silk_road_phase_exceptional_bounty|lE] [silk_road|E] [situation_phase|lE] #weak (se já não estiver nela)#!"
 building_type_herat_bazaar_01: "$building_herat_bazaar_01$"
 building_type_herat_bazaar_01_desc: "$building_herat_bazaar_01_desc$"
 building_herat_bazaar_01: "Bazar de Herat"
 building_herat_bazaar_01_desc: "Os movimentados mercados de Herat são renomados desde os antigos aquemênidas em sua #italic Haraiva#!. As caravanas que entram e saem da cidade todos os dias fazem dos bazares de Herat a Pérola de Coração."
 building_herat_bazaar_02: "Vasto Bazar de Herat"
 building_herat_bazaar_02_desc: "Os bazares de Herat transbordam de comércio e trocas. A Pérola de Coração brilha com mais refinamento do que a joia mais polida de qualquer coroa."
 building_type_dvin_shuka_01: "$building_dvin_shuka_01$"
 building_type_dvin_shuka_01_desc: "$building_dvin_shuka_01_desc$"
 building_dvin_shuka_01: "Shuka de Dvin"
 building_dvin_shuka_01_desc: "O venerável mercado de Dvin serve como o grande centro do comércio armênio desde tempos imemoriais. Suas muralhas são decoradas com azulejos coloridos e rebocos tingidos, refletindo a riqueza e o prestígio deste antigo mercado."
 building_dvin_shuka_02: "Vasta Shuka de Dvin"
 building_dvin_shuka_02_desc: "A idade não drenou nenhuma vitalidade do augusto e antigo mercado de Dvin — se é que não tornou a venerável shuka ainda mais viva do que nunca."
 building_type_khiva_bazaar_01: "$building_khiva_bazaar_01$"
 building_type_khiva_bazaar_01_desc: "$building_khiva_bazaar_01_desc$"
 building_khiva_bazaar_01: "Bazar de Khiva"
 building_khiva_bazaar_01_desc: "Porta de entrada para a Estepe, a humilde cidade de Khiva se destaca pela abundância de comerciantes e viajantes em busca de lucro ou fortuna na fronteira."
 building_khiva_bazaar_02: "Vasto Bazar de Khiva"
 building_khiva_bazaar_02_desc: "Sob o sol escaldante, nômades, mercadores e aventureiros arrancam fortunas da terra e trocam sussurros sobre as riquezas da longínqua China pelas moedas exóticas do Huángdì."
 building_type_lhasa_market_01: "$building_lhasa_market_01$"
 building_type_lhasa_market_01_desc: "$building_lhasa_market_01_desc$"
 building_lhasa_market_01: "Khrom de Lhasa"
 building_lhasa_market_01_desc: "Em uma encruzilhada privilegiada entre a Índia e a China, os mercadores de Lhasa disputam a atenção dos viajantes à sombra do elevado palácio de Potala."
 building_lhasa_market_02: "Vasto Khrom de Lhasa"
 building_lhasa_market_02_desc: "Não há nada de novo sob o sol, assim fariam você acreditar os mercadores de Lhasa, pois não há bugiganga ou joia que eles não tenham encontrado em seu caminho ao longo da Rota da Seda."
 building_type_changan_market_01: "$building_changan_market_01$"
 building_type_changan_market_01_desc: "$building_changan_market_01_desc$"
 building_changan_market_01: "Mercado de Cháng'ān"
 building_changan_market_01_desc: "Os mercados da grande cidade de Cháng'ān, #EMP Paz Perpétua#!, fervilham com todo tipo de comércio e são uma parada essencial para quase todo o tráfego mercantil que entra e sai da China."
 building_changan_market_02: "Vasto Mercado de Cháng'ān"
 building_changan_market_02_desc: "Os mercadores prósperos de Cháng'ān já não piscam diante da visão dos maiores tesouros conhecidos pelo homem — pois já os viram todos antes, e provavelmente possuem alguns deles."
 building_type_dunhuang_market_01: "$building_dunhuang_market_01$"
 building_type_dunhuang_market_01_desc: "$building_dunhuang_market_01_desc$"
 building_dunhuang_market_01: "Mercado de Dūnhuáng"
 building_dunhuang_market_01_desc: "Situada às margens cintilantes do rio Shule, a cidade de Dūnhuáng marca a porta de entrada entre o Corredor de Hexi e a bacia do Tarim, sendo um ponto de parada fundamental para todos os viajantes entre ambos."
 building_dunhuang_market_02: "Mercado Vasto de Dūnhuáng"
 building_dunhuang_market_02_desc: "As ruas branqueadas pelo sol de Dūnhuáng conhecem apenas a marcha constante e lânguida de incontáveis camelos, mulas e homens carregados, e de seus caminhos sempre cruzados entre leste e oeste."
 building_type_lahur_bazaar_01: "$building_lahur_bazaar_01$"
 building_type_lahur_bazaar_01_desc: "$building_lahur_bazaar_01_desc$"
 building_lahur_bazaar_01: "Bazar de Lahur"
 building_lahur_bazaar_01_desc: "A cidade velha de Lahur foi construída em torno de dois grandes mercados, cercados por casas, todos encerrados por uma longa muralha de adobe. Este agitado conjunto de mercados fervilha de atividade desde que alguém pode se lembrar, e provavelmente continuará fervilhando por gerações."
 building_lahur_bazaar_02: "Bazar Vasto de Lahur"
 building_lahur_bazaar_02_desc: "O comércio flui por Lahur tão naturalmente quanto a água corre pelo leito de um rio. Seus mercados agrupados transbordam de mercadorias, e seus mercadores parecem ter toda a sabedoria da história célebre da cidade escondida por trás de seus olhos atentos."
 building_type_hamadan_bazaar_01: "Bazar de Hamadã"
 building_type_hamadan_bazaar_01_desc: "$building_hamadan_bazaar_01_desc$"
 building_hamadan_bazaar_01: "Bazar de Hamadã"
 building_hamadan_bazaar_01_desc: "Coração das terras do antigo povo medo, Hamadã é um centro de comércio desde o tempo das tábuas de argila e das inscrições cuneiformes. Centenas de gerações de mercadores venderam suas mercadorias e exerceram seu ofício entre as bancas do bazar principal de Hamadã."
 building_hamadan_bazaar_02: "Grande Bazar de Hamadã"
 building_hamadan_bazaar_02_desc: "O grande bazar de Hamadã prospera como nunca antes, alcançando novos patamares de riqueza e atividade sem igual em sua longa e digna história."
 building_type_sunday_bazaar_01: "Bazar de Domingo"
 building_type_sunday_bazaar_01_desc: "$building_sunday_bazaar_01_desc$"
 building_sunday_bazaar_01: "Bazar de Domingo"
 building_sunday_bazaar_01_desc: "Alguns habitantes dirão que, antes de existir dinheiro, Kashgar já tinha o Bazar de Domingo. Caminhando entre as bancas do mercado, certamente parece assim — é impossível imaginar um tempo sem este lugar."
 building_sunday_bazaar_02: "Grande Bazar de Domingo"
 building_sunday_bazaar_02_desc: "Embora o grande Bazar de Domingo de Kashgar possa existir desde tempos imemoriais, a prosperidade que sente agora certamente será lembrada por eras."
 building_type_mount_fuji_01: "Monte Fuji"
 building_type_mount_fuji_01_desc: "O pico solitário, imponente e coberto de neve de Fujisan marca a passagem para o leste do Japão e é uma visão famosa por todas as ilhas, atraindo viajantes e peregrinos, e concedendo repouso a todos que o contemplam. Entre as mais sagradas montanhas xintoístas, Fuji é o lar de #EMP Konohanasakuya-hime#!, deusa dos vulcões, das flores de cerejeira e da delicadeza efêmera da vida."
 building_mount_fuji_01: "$building_type_mount_fuji_01$"
 building_mount_fuji_01_desc: "$building_type_mount_fuji_01_desc$"
 building_type_waterworks_01: "Gestão da Água"
 building_type_waterworks_01_desc: "A água é o fundamento do qual toda vida depende. Manter um suprimento estável de água e utilizá-la com eficácia é essencial para manter um reino forte e um reinado forte."
 building_waterworks_01: "Lagos Artificiais"
 building_waterworks_01_desc: "O primeiro passo para administrar a água é ter água para administrar. Uma simples depressão no solo, revestida com argila para retenção, cria um local natural para a água se acumular para uso posterior."
 building_waterworks_02: "Cisternas"
 building_waterworks_02_desc: "Buracos mais profundos, revestimentos menos permeáveis e coberturas simples ajudam a criar lugares onde mais água pode ser armazenada por mais tempo, com menos perda por poluição ou evaporação."
 building_waterworks_03: "Canais de Nível"
 building_waterworks_03_desc: "Escavar valas entre locais de armazenamento torna a água administrada muito mais acessível a muito mais pessoas. Esse processo alivia a pressão das enchentes quando há água em excesso, ao mesmo tempo em que ainda fornece água para pessoas, rebanhos e plantações em tempos de seca. Planejados da maneira correta, esses canais podem até ser usados para tráfego leve de barcos."
 building_waterworks_04: "Reservatórios de Irrigação"
 building_waterworks_04_desc: "Qualquer tipo de colina, crista ou mudança de elevação pode ser transformado em um local para armazenar água, se os diques certos forem escavados. Conectados por canais, esses reservatórios abertos podem alimentar uns aos outros, dando maior controle sobre quanta água é armazenada e quanta é utilizada em determinado momento."
 building_waterworks_05: "Poços em Degraus"
 building_waterworks_05_desc: "O controle da água pode ser combinado com a simples escavação de poços para criar estruturas enormes cavadas no solo que, em todos os momentos, terão alguma água proveniente da terra. Esses edifícios subterrâneos ainda podem ser conectados a comportas e canais ao nível do solo que os abastecem com mais água ou a desviam para outras áreas conforme necessário."
 building_waterworks_06: "Eclusas de Canal"
 building_waterworks_06_desc: "A própria profundidade de uma via navegável pode ser controlada com portões e drenos. A água armazenada atrás dessas eclusas pode ser usada para tornar os canais navegáveis para barcaças e pequenas embarcações, fazendo deles excelentes vias de transporte."
 building_waterworks_07: "Lagos Artificiais"
 building_waterworks_07_desc: "Um reservatório monumental pode conter uma quantidade monumental de água. Alimentados por rios e canais, lagos artificiais podem fornecer água para vastas terras agrícolas e multidões de aldeias. Sua grandiosidade também faz deles lugares prestigiosos por si só, tornando-os locais eficazes para culto e governo."
 building_waterworks_08: "Sistemas de Abastecimento e Esgoto"
 building_waterworks_08_desc: "Com tubos e bombas, a água pode fluir para cima e para baixo, levando água às torres mais altas e removendo os resíduos para as fossas mais distantes. Nenhum lugar precisa carecer de água, e qualquer excesso pode ser drenado antes que se transforme em uma inundação perigosa."
 building_type_spice_plantation_01: "Plantações de Especiarias"
 building_type_spice_plantation_01_desc: "As melhores fragrâncias e os sabores mais delicados podem ser extraídos de plantas que crescem apenas em regiões muito específicas do mundo. Sua raridade e sua qualidade fazem delas produtos excepcionalmente lucrativos, se a terra for capaz de nutri-las."
 building_spice_plantation_01: "Coleta de Especiarias"
 building_spice_plantation_01_desc: "As especiarias são produzidas naturalmente por várias árvores, arbustos e flores. O truque é #italic encontrar#! essas plantas em primeiro lugar."
 building_spice_plantation_02: "Bosques Cultivados de Especiarias"
 building_spice_plantation_02_desc: "As especiarias de maior demanda podem ser cultivadas nas condições corretas, com o trabalho adequado e a supervisão dos administradores certos."
 building_spice_plantation_03: "Pomares de Especiarias"
 building_spice_plantation_03_desc: "Plantar safras com um método geométrico em uma grande área pode produzir uma quantidade muito mais previsível de especiarias, ano após ano."
 building_spice_plantation_04: "Secagem de Especiarias"
 building_spice_plantation_04_desc: "Reservar espaço perto das plantações para secar especiarias antes do envio significa que uma parte maior da colheita pode ser processada antes de estragar, economizando dinheiro na produção geral de especiarias."
 building_spice_plantation_05: "Moinhos de Especiarias"
 building_spice_plantation_05_desc: "Moer pode tornar as especiarias mais propensas a estragar, mas também pode tornar o armazenamento muito mais eficiente. Os moinhos também podem auxiliar na joeira, resultando em uma safra muito mais pura."
 building_spice_plantation_06: "Propriedades de Especiarias"
 building_spice_plantation_06_desc: "Consolidar a moradia dos trabalhadores, o processamento das plantações e o armazenamento do produto em um local próximo de onde as especiarias são realmente cultivadas ajuda significativamente a produzir e vender mais especiarias com menos despesas no total."
 building_spice_plantation_07: "Gestão das Terras da Plantação"
 building_spice_plantation_07_desc: "A própria terra pode ser remodelada para abrir mais espaço ao cultivo. Terraços e canais criam novas oportunidades para mais plantações."
 building_spice_plantation_08: "Produção Industrial de Especiarias"
 building_spice_plantation_08_desc: "Com a orientação correta, toda a terra pode ser dedicada à produção das especiarias mais lucrativas. Cada árvore plantada, cada arbusto cultivado, cada folha colhida e cada noz seca é mais uma moeda nos cofres."
 building_type_examination_hall_01: "Salão de Exames"
 building_type_examination_hall_01_desc: "Exames imperiais não podem ser conduzidos sem um lugar para realizá-los. É responsabilidade do governador local garantir que os oficiais tenham todos os recursos de que precisam para conduzir os exames adequadamente, e que os candidatos tenham o apoio de que precisam, ao mesmo tempo em que se minimizam as oportunidades de trapaça."
 building_examination_hall_01: "Salas de Prova"
 building_examination_hall_01_desc: "Para testar candidatos a cargos do governo, é preciso haver um local para conduzir um exame. Uma sala dedicada à realização de provas é o mínimo necessário, mas é um começo."
 building_examination_hall_02: "Templo Wenwu"
 building_examination_hall_02_desc: "Uma pequena oração pode dar a alguns candidatos mais confiança do que todo o estudo e preparação do mundo."
 building_examination_hall_03: "Academia Imperial"
 building_examination_hall_03_desc: "Um complexo de salas de aula, instalações de exame, escritórios do corpo docente e depósitos fornece o apoio abrangente necessário para conduzir qualquer parte do exame imperial com a máxima eficiência e qualidade."
 examination_hall_effects_desc: "[SelectLocalization( HasDlcFeature( 'all_under_heaven' ), 'examination_hall_effect_desc', 'examination_hall_cost_discount_max_desc' )]"
 examination_hall_effect_desc: "Custo reduzido para as [activities|El] de [GetActivityType('activity_imperial_examination').GetName|l] [GetActivityType('activity_imperial_examination').GetTextIcon] e [GetActivityType('activity_local_examination').GetName|l] [GetActivityType('activity_local_examination').GetTextIcon] realizadas nesta [holding|El] : [EmptyScope.ScriptValue('imperial_examination_cost_discount_max_value')|P0%]"
 examination_hall_cost_discount_max_desc: "$examination_hall_effect_desc$[EmptyScope.ScriptValue('imperial_examination_cost_discount_max_value')|P0%]"
