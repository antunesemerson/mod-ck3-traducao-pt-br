 building_sankore_university_desc: "$building_type_sankore_university_desc$"
 building_type_siena_university: "A Universidade de Siena"
 building_type_siena_university_desc: "$building_type_generic_university_desc$\n\nA Universidade de Siena e os maestri que nela servem são financiados inteiramente pelos impostos da própria Siena, mais especificamente um imposto cobrado daqueles que alugam quartos para seus estudantes."
 building_siena_university: "$building_type_siena_university$"
