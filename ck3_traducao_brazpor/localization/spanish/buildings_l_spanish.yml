 building_type_allaq_mines_01: "As Minas de Wadi al-Allaq"
 building_type_allaq_mines_01_desc: "Conhecidas pelos cronistas simplesmente como o país das minas, as montanhas do deserto egípcio oriental abrigam profundos depósitos de ouro. O principal centro desta região é Wadi al-Allaq e suas minas."
