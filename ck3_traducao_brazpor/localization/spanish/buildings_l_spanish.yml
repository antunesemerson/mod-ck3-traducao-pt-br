 building_type_kollur_mines_01: "As Minas de Kollur"
 building_type_kollur_mines_01_desc: "As minas de Kollur exploram a maior jazida de diamantes de todo o subcontinente indiano. O trabalho é extremamente perigoso, mas as riquezas são inimagináveis."
 building_kollur_mines_01: "Poços de Mineração de Kollur"
 building_kollur_mines_01_desc: "Meramente um poço de argila e cascalho, trabalhadores de tanga labutam aqui dia e noite para extrair diamantes."
 building_kollur_mines_02: "Mina de Kollur"
 building_kollur_mines_02_desc: "Os poços de mineração foram ampliados, e engenheiros foram trazidos para realmente conseguir aumentar a extração de diamantes."
 building_kollur_mines_03: "Grande Mina de Kollur"
 building_kollur_mines_03_desc: "Uma vila surgiu ao redor dos muitos poços de mineração, e os trabalhadores encontram diamantes enormes com regularidade."
 building_kollur_mines_04: "Complexo de Mineração de Kollur"
 building_kollur_mines_04_desc: "A extração de diamantes alcançou uma escala quase industrial, com o número de trabalhadores agora chegando aos milhares. Riquezas sem fim parecem fluir das minas."
 building_type_tribe_01: "Fortaleza Tribal"
 building_type_tribe_01_desc: "Uma fortaleza tribal simples, porém eficaz, guardando uma aldeia tribal."
 building_tribe_01: "Fortaleza Tribal"
 building_tribe_01_desc: "Construída com troncos e pedra grosseiramente talhada, esta fortaleza é imponente apesar de seu pequeno tamanho."
 building_tribe_02: "Fortaleza Tribal Fortificada"
 building_tribe_02_desc: "A fortaleza fortificada inspira-se nos castelos feudais, adicionando muitos novos elementos defensivos."
 building_type_longhouses_01: "Salões de Reunião"
 building_type_longhouses_01_desc: "Chefes tribais, anciãos e senhores da guerra conferem no salão comprido ao tomar decisões. Os poderosos salões trazem prestígio a quem quer que os receba."
 building_longhouses_01: "Longhouses"
 building_longhouses_01_desc: "As longhouses são grandes o bastante para acomodar reuniões importantes entre anciãos. Leis e políticas são determinadas aqui."
 building_longhouses_02: "Grandes Salões"
 building_longhouses_02_desc: "Grandes salões possuem um palco central, onde um chefe ou senhor da guerra pode fazer discursos inflamados."
 building_type_war_camps_01: "Acampamentos de Guerra"
 building_type_war_camps_01_desc: "Ferozes guerreiros tribais se reúnem nos acampamentos de guerra quando o berrar do chifre os convoca para a guerra. Mesmo em tempos de paz, podem ser encontrados treinando, preparando-se para a inevitabilidade do conflito."
 building_war_camps_01: "Campos de Treino"
 building_war_camps_01_desc: "Equipamentos de treinamento, arenas e muros de madeira definem os campos de treino. Os guerreiros vêm aqui para aperfeiçoar suas habilidades."
 building_war_camps_02: "Alojamentos de Guerreiros"
 building_war_camps_02_desc: "Apenas os maiores lutadores têm permissão para entrar em um alojamento de guerreiros, e sua mera presença é inspiradora."
 building_type_palisades_01: "Paliçadas"
 building_type_palisades_01_desc: "Camadas de paliçadas de madeira protegem os assentamentos tribais dispersos, resguardando-os de ameaças simples, como animais selvagens ou incursões menores."
 building_palisades_01: "Paliçada Simples"
 building_palisades_01_desc: "Paliçadas simples oferecem proteção limitada; embora eficazes contra escaramuças, são menos confiáveis contra grupos maiores de inimigos."
 building_palisades_02: "Muralhas & Fossos"
 building_palisades_02_desc: "Fossos externos combinados com muralhas de paliçada reforçadas com pedra oferecem proteção razoável contra cercos."
 building_type_market_villages_01: "Mercados"
 building_type_market_villages_01_desc: "Uma série de pequenas vilas de mercado surgiu ao redor das partes mais movimentadas destas terras. Aqui os tribais negociam e barganham com mercadores viajantes."
 building_market_villages_01: "Postos Comerciais"
 building_market_villages_01_desc: "Postos comerciais oferecem a oportunidade para tribais e comerciantes se encontrarem e barganharem."
 building_market_villages_02: "Vilas de Mercado"
 building_market_villages_02_desc: "Em períodos determinados, estas vilas sediam mercados públicos que atraem comerciantes de toda a região e aumentam a riqueza local."
 building_type_water_temples_01: "Templos de Água Subak"
 building_type_water_temples_01_desc: "Cooperativas de irrigação voltadas para o interior, ancoradas por santuários e templos de água; calendários rituais coordenam o plantio e a manutenção dos canais."
 building_water_temples_01: "Barragens Subak & Santuários dos Campos"
 building_water_temples_01_desc: "Pequenas barragens e canais de terra ligam os arrozais; um santuário supervisiona oferendas e escalas de trabalho. Um excedente confiável começa a fluir, e com ele os ritos."
 building_water_temples_02: "Santuários do Conselho Subak"
 building_water_temples_02_desc: "Vários santuários coordenam um \"subak\" mais amplo com compartilhamento de água por calendário; disputas e reparos são tratados comunitariamente, melhorando o controle e os rendimentos."
 building_water_temples_03: "Rede de Templos de Água"
 building_water_temples_03_desc: "Um verdadeiro circuito de templos de água supervisiona plantios sincronizados e ciclos de pousio; as pragas diminuem, a produção cresce e a piedade ritual aumenta."
 building_water_temples_04: "Grande Paisagem de Templos de Água"
 building_water_temples_04_desc: "Toda a drenagem é organizada por assembleias conduzidas pelos templos; terraços, comportas e celebrações fazem desta província um celeiro piedoso."
 building_type_stilted_granaries_01: "Celeiros Elevados"
 building_type_stilted_granaries_01_desc: "Celeiros elevados sobre quatro ou mais estacas, à prova de ratos, perfeitos para armazenar tributos e abastecer bandos de guerra."
 building_stilted_granaries_01: "Celeiro Elevado sobre Estacas"
 building_stilted_granaries_01_desc: "Um simples celeiro sobre quatro estacas mantém sementes e tributos secos; os guardas da aldeia comem melhor em campanha."
 building_stilted_granaries_02: "Fileira de Celeiros"
 building_stilted_granaries_02_desc: "Uma fileira de celeiros elevados com barreiras contra ratos e degraus cobertos. Os tributos em grãos tornam-se mais estáveis e a recuperação das levas melhora."
 building_stilted_granaries_03: "Celeiros Elevados Entalhados"
 building_stilted_granaries_03_desc: "Entalhes prestigiosos marcam o excedente; administradores revezam estoques e rações para marchas mais longas."
 building_stilted_granaries_04: "Distrito dos Celeiros"
 building_stilted_granaries_04_desc: "Um conjunto cercado com abrigo de vigia e cabana de contagem; a segurança alimentar estabiliza todo o condado."
 building_type_kora_kora_yards_01: "Estaleiros Kora-Kora"
 building_type_kora_kora_yards_01_desc: "Galpões de canoas de clã e rampas de lançamento para canoas de guerra com estabilizadores."
 building_kora_kora_yards_01: "Galpões de Canoas"
 building_kora_kora_yards_01_desc: "Rampas cobertas para estabilizadores a remo; as tripulações treinam para ataques costeiros e viagens entre ilhas."
 building_kora_kora_yards_02: "Estaleiro de Barcos do Clã"
 building_kora_kora_yards_02_desc: "Estoques de madeira, amarras de fibra e estabilizadores sobressalentes aceleram a preparação; saqueadores trazem de volta troféus e mercadorias de troca."
 building_kora_kora_yards_03: "Estaleiro Kora-Kora"
 building_kora_kora_yards_03_desc: "Cascos maiores, plataformas de combate e tambores de sinalização; patrulhas costeiras e expedições sazonais tornam-se um ritmo de vida (e de renda)."
 building_kora_kora_yards_04: "Grande Arsenal de Canoas de Guerra"
 building_kora_kora_yards_04_desc: "Mestres do estaleiro equipam frotas inteiras; rampas de lançamento, oficinas de aparelhamento e plataformas de reunião espalham medo entre os vizinhos."
 building_type_idjang_forts_01: "Fortes Idjang"
 building_type_idjang_forts_01_desc: "Cidadelas tribais em terraços, fortalezas em esporões ou colinas."
 building_idjang_forts_01: "Idjang com Estacada"
 building_idjang_forts_01_desc: "Uma paliçada de madeira coroa uma elevação defensável; fogueiras de vigia e fossos secos desencorajam saqueadores."
 building_idjang_forts_02: "Idjang com Muralhas de Pedra"
 building_idjang_forts_02_desc: "Revestimentos de pedra substituem a madeira nas faces principais; caminhos cobertos permitem que os defensores se desloquem com segurança."
 building_idjang_forts_03: "Idjang em Terraços"
 building_idjang_forts_03_desc: "Acessos em degraus, escadas de surtida e plataformas de tiro criam ângulos mortais para flechas e lanças."
 building_idjang_forts_04: "Cidadela Idjang"
 building_idjang_forts_04_desc: "Casa do portão, torre interna e cisterna; a guarnição pode resistir por estações."
 building_type_wantilan_01: "Wantilan"
 building_type_wantilan_01_desc: "Grandes salões abertos, sem paredes, e pavilhões comunitários para assembleias, ritos e apresentações."
 building_wantilan_01: "Pequeno Wantilan"
 building_wantilan_01_desc: "O salão da aldeia sedia mobilizações, juramentos e ensaios; anciãos arbitram disputas antes que elas se agravem."
 building_wantilan_02: "Pavilhão Wantilan"
 building_wantilan_02_desc: "Um amplo salão com telhado em níveis acolhe festivais e iniciações, onde ritos compartilhados elevam o moral e o prestígio."
 building_wantilan_03: "Wantilan do Templo"
 building_wantilan_03_desc: "Um espaço cerimonial ligado ao santuário local, com amplo espaço para oferendas e procissões."
 building_wantilan_04: "Grande Wantilan"
 building_wantilan_04_desc: "Uma arena emblemática onde tambores, dançarinos e capitães compartilham o mesmo teto."
 building_type_military_academy_01: "Academias Militares"
 building_type_military_academy_01_desc: "Instalações dedicadas ao treinamento de oficiais e cavaleiros, melhorando sua eficiência em combate."
 building_military_academy_01: "Escolas Militares"
 building_military_academy_01_desc: "Oficiais aspirantes são avaliados com base no mérito na escola militar. Naturalmente, a escola só aceita estudantes de linhagem nobre."
 building_military_academy_02: "Academias de Oficiais"
 building_military_academy_02_desc: "Oficiais de nível médio a alto são treinados aqui, onde adquirem uma compreensão maior dos movimentos de tropas, das preparações de campo e das condições do campo de batalha."
 building_military_academy_03: "Grandes Academias Militares"
 building_military_academy_03_desc: "Uma Grande Academia Militar é o coração pulsante de um aparato militar avançado. Os oficiais treinados aqui aprendem tudo sobre estratégia de campo, organização do exército e os mais recentes avanços tecnológicos na guerra."
 building_type_march_01: "Marcas"
 building_type_march_01_desc: "Senhores das marcas protegem as fronteiras com fortificações e guarnições locais."
 marches_effect_desc: "Reduz as chances de [raid_intents|lE] especiais"
 marches_effect_2_desc: "Bloqueia [raid_intents|lE] especiais"
 building_march_01: "Marcas Estratégicas"
 building_march_01_desc: "As marcas são construídas nas áreas mais vulneráveis e remotas do ducado, protegendo contra ataques. Embora poucas e distantes entre si, servem como um útil sistema de alerta e também pegam o contrabandista ocasional."
 building_march_02: "Marcas Fronteiriças"
 building_march_02_desc: "O sistema de senhores das marcas é ampliado ao longo de toda a fronteira, fornecendo uma sólida linha de defesa."
 building_march_03: "Grandes Marcas"
 building_march_03_desc: "Grandes fortificações de marca são construídas por todo o ducado, dificultando significativamente qualquer força atacante."
 building_type_siege_works_01: "Oficinas de Cerco"
 building_type_siege_works_01_desc: "Oficinas de cerco dedicadas permitem ao governante equipar e manter armas de cerco de qualidade superior."
 building_siege_works_01: "Oficinas de Máquinas de Cerco"
 building_siege_works_01_desc: "Oficinas de cerco fornecem um fluxo mais rápido e constante de armas de cerco por meio de procedimentos de construção especializados e padronizados."
 building_siege_works_02: "Engenheiros de Trabuquetes"
 building_siege_works_02_desc: "Engenheiros especializados são necessários para operar as armas mais avançadas da guerra de cerco: os trabuquetes."
 building_siege_works_03: "Fundições de Canhões"
 building_siege_works_03_desc: "Canhões são a arma mais recente a surgir no cenário da guerra. Barulhentos, pesados e difíceis de manobrar, ainda assim são letais contra fortificações de pedra. Ser capaz de produzir e usar canhões nos coloca em uma vantagem incontestável contra nossos inimigos."
 building_type_royal_armory_01: "Arsenais Reais"
 building_type_royal_armory_01_desc: "Arsenais financiados pela Coroa garantem um suprimento constante e a manutenção de armas funcionais para o exército."
 building_royal_armory_01: "Depósitos de Armas"
 building_royal_armory_01_desc: "Em tempos de guerra, pode-se designar uma arma do depósito às levas camponesas. Em sua maioria são velhos machados enferrujados, lanças que se estilhaçam e lâminas cegas, mas com um pouco de manutenção podem facilmente ser mais eficientes do que as ferramentas agrícolas comuns com que as levas costumam ser armadas."
 building_royal_armory_02: "Arsenais da Coroa"
 building_royal_armory_02_desc: "Arsenais administrados pela Coroa recolhem e mantêm armas e armaduras para uso na guerra. São de qualidade decente e podem fazer qualquer bêbado imprestável parecer um soldado de verdade, ainda que não consiga agir como um."
 building_royal_armory_03: "Grandes Arsenais Reais"
 building_royal_armory_03_desc: "Arsenais reais avançados produzem em massa armas e armaduras de alto nível, o bastante para garantir que até exércitos enormes possam ser equipados da melhor forma possível."
 building_type_jousting_lists_01: "Campos de Justa"
 building_type_jousting_lists_01_desc: "Campos de justa permitem aos cavaleiros praticar e competir com lanças e testar suas habilidades em combate montado."
 building_jousting_lists_01: "Campos de Justa"
 building_jousting_lists_01_desc: "Cavaleiros vêm a estes campos para testar sua coragem e habilidade, quebrando lanças em suas justas contra adversários de toda a região."
 building_jousting_lists_02: "Pátios de Treino"
 building_jousting_lists_02_desc: "Um cavaleiro e seu cavalo devem agir como um só. O pátio de treino é onde ambos aperfeiçoam suas habilidades, treinando lado a lado para melhorar juntos."
 building_jousting_lists_03: "Galerias Reais"
 building_jousting_lists_03_desc: "As galerias reais permitem à nobreza local e a visitantes distintos assistir aos cavaleiros em seus espetáculos, enquanto os grandes camarotes atraem mercadores em busca de clientes ricos."
 building_type_blacksmiths_01: "Ferreiros"
 building_type_blacksmiths_01_desc: "Ferreiros produzem e consertam armas e armaduras para o exército, fornecendo equipamento de qualidade para seus soldados."
 building_blacksmiths_01: "Oficinas de Ferraria"
 building_blacksmiths_01_desc: "Uma arma cega é melhor que nenhuma, e facas improvisadas são melhores que paus. Mas se uma oficina e alguns bons ferreiros estiverem disponíveis, talvez seja possível transformar o camponês rude médio em alguém que consiga ao menos segurar um exército invasor por um tempo."
 building_blacksmiths_02: "Armeiros"
 building_blacksmiths_02_desc: "Armas e armaduras exigem habilidades específicas que nem sempre são encontradas em um único ferreiro. Ao ter ferreiros especializados em armas e armaduras, garantimos que nossas tropas possam equipar-se com o melhor material disponível."
 building_blacksmiths_03: "Grandes Ferreiros"
 building_blacksmiths_03_desc: "Grandes ferreiros do reino viajam para estas forjas para criar suas obras-primas. Os produtos daqui são da mais alta qualidade possível, feitos por verdadeiros mestres de seu ofício."
 building_type_archery_ranges_01: "Campos de Arco e Flecha"
 building_type_archery_ranges_01_desc: "Campos de arco e flecha dedicados permitem que o povo comum treine com arcos, e que arqueiros experientes aprimorem suas habilidades."
 building_archery_ranges_01: "Campos de Arco e Flecha"
 building_archery_ranges_01_desc: "Todos são bem-vindos ao campo de arco e flecha, independentemente de serem ricos ou pobres. A razão é dupla; camponeses que sabem disparar um arco são mais úteis na guerra, e atiradores experientes se mantêm em excelente forma quando podem competir em torneios."
 building_archery_ranges_02: "Fabricantes Reais de Arcos"
 building_archery_ranges_02_desc: "Os melhores fabricantes de arcos são empregados pela coroa e encarregados de fabricar os arcos da mais alta qualidade possível em instalações construídas especificamente para essa tarefa."
 building_archery_ranges_03: "Campos de Atiradores"
 building_archery_ranges_03_desc: "Para inspirar o campesinato e oferecer amplo desafio aos nossos atiradores, estes campos especiais são projetados para treinar nossos arqueiros em tiro de longa distância."
 building_type_tax_assessor_01: "Escritórios de Impostos"
 building_type_tax_assessor_01_desc: "Coletar dinheiro do campesinato é uma empreitada 'tributante'. Ao atribuir escritórios a uma coorte de oficiais cobradores de impostos, temos certeza de obter o que nos é devido!"
 building_tax_assessor_01: "Avaliadores de Impostos"
 building_tax_assessor_01_desc: "É dever de todo camponês pagar à coroa um imposto proporcional em moeda ou produção. Nossos avaliadores de impostos garantem que o que eles pagam seja suficientemente 'proporcional' às nossas necessidades e, felizmente para nós, a maioria dos camponeses é analfabeta."
 building_tax_assessor_02: "Escritório do Oficial de Justiça"
 building_tax_assessor_02_desc: "Uma excelente maneira de garantir que os camponeses paguem seus impostos é a ameaça de serem jogados no calabouço caso não o façam. Esse é o trabalho do oficial de justiça, sempre ao lado #emphasis nosso#!!"
 building_tax_assessor_03: "Tribunal do Magistrado"
 building_tax_assessor_03_desc: "Embora camponeses possam ser fáceis de tributar, os proprietários de terra mais ricos são mais difíceis de coagir. Ao estabelecer uma complexa rede administrativa administrada por magistrados leais, podemos garantir que até mesmo os mais ricos entre nossos súditos paguem o que devem."
 building_type_leisure_palace_01: "Palácios de Lazer"
 building_type_leisure_palace_01_desc: "Embora ficar em um castelo luxuosamente opulento já seja bom, nunca faz mal ter mais alguns entre os quais escolher."
 building_leisure_palace_01: "Château"
 building_leisure_palace_01_desc: "Quando os fardos da responsabilidade se tornam grandes demais (ou uma multidão furiosa de camponeses está invadindo os portões), não há lugar melhor do que o château rural e distante para um relaxamento improvisado!"
 building_leisure_palace_02: "Palácio de Verão"
 building_leisure_palace_02_desc: "O palácio de verão fica localizado em uma parte cênica do ducado, longe das vidas servis de nossos súditos labutadores. Realmente não há maneira melhor de exibir o poder e o prestígio reais, e o simples fato de que somos #emphasis melhores#! do que todos os outros."
 building_leisure_palace_03: "Palácio de Inverno"
 building_leisure_palace_03_desc: "O palácio de inverno foi projetado para abrigar a família real durante os meses mais rigorosos do ano. Com uma despensa bem abastecida e uma posição defensável, ele se ergue sobre quaisquer súditos trêmulos que tenham o privilégio de trabalhar nas proximidades."
 building_type_royal_forest_01: "Reservas Reais"
 building_type_royal_forest_01_desc: "Uma floresta real é uma valiosa fonte de riqueza, permitindo que você se sobreponha à lei da terra em uma província, retire direitos dos habitantes locais e depois os venda de volta. Nem é preciso dizer que a caça também é excelente."
 building_royal_forest_01: "Florestas Reais"
 building_royal_forest_01_desc: "Grandes áreas de floresta neste ducado são reservadas para uso da família real. Os camponeses estão proibidos de viver na floresta, caçar quaisquer de seus animais ou derrubar árvores para agricultura. Atacar os avaliadores de impostos da coroa enquanto eles passam por ali é especialmente proibido."
 building_royal_forest_02: "Vastas Florestas da Coroa"
 building_royal_forest_02_desc: "Cidades inteiras agora são absorvidas por esta floresta real, e assentamentos próximos frequentemente descobrem que os homens do monarca 'encontraram' mapas colocando suas moradias firmemente dentro da mata da coroa local."
 building_royal_forest_03: "Tribunais da Mata da Coroa"
 building_royal_forest_03_desc: "A lei só é tão boa quanto o sistema que a sustenta, e agora esta floresta real possui todo um sistema de tribunais, guardiões e escrivães, apoiado por magistrados treinados, todos prontos para impor os ditames da coroa."
 building_type_royal_garden_01: "Jardins Reais"
 building_type_royal_garden_01_desc: "Poucos lugares permitem que as pessoas relaxem e socializem tão bem quanto um belo jardim. Embora um jardim pequeno e pessoal seja suficiente para a maioria, apenas as criações mais espetaculares são boas o bastante para os ricos e poderosos!"
 building_royal_garden_01: "Jardim Fechado"
 building_royal_garden_01_desc: "Um pequeno jardim cercado por muros de pedra. Ele proporciona um pequeno refúgio de paz e conforto ao isolar o agitado mundo exterior."
 building_royal_garden_02: "Complexo de Jardins"
 building_royal_garden_02_desc: "Um jardim vasto e impressionante que abriga flores, ervas, árvores frutíferas e tudo mais entre elas. Mantido por um grande número de jardineiros, o jardim recebe cuidados constantes."
 building_royal_garden_03: "Parque Real"
 building_royal_garden_03_desc: "O parque real é uma paisagem vasta e deslumbrante, cuidadosamente moldada ao terreno e à arquitetura ao redor. Aberto e disponível para todos, ele causa admiração em visitantes de toda parte."
 building_type_ananda_temple_01: "Templo de Ananda"
 building_type_ananda_temple_01_desc: "Embora Pagan tenha milhares de pagodes, templos e santuários espalhados pela cidade e pelas planícies circundantes, o Templo de Ananda se destaca como uma obra-prima entre eles. A estrutura, de proporções perfeitas, contém muitas placas e imagens de pedra únicas. É um lugar de culto e um centro de aprendizado para educar o povo no ethos religioso."
 building_ananda_temple_01: "$building_type_ananda_temple_01$"
 building_ananda_temple_01_desc: "$building_type_ananda_temple_01_desc$"
 building_type_hotin_fort_01: "Fortificação de Hotin"
 building_type_hotin_fort_01_desc: "O Forte de Hotin é um pequeno forte construído às margens do rio Dniester. Sua localização lhe permite proteger as rotas comerciais locais e concede ao seu proprietário o controle do rio."
 building_hotin_fort_01: "Forte de Hotin"
 building_hotin_fort_01_desc: "$building_type_hotin_fort_01_desc$"
 building_hotin_fort_02: "Fortaleza de Hotin"
 building_hotin_fort_02_desc: "Uma fortaleza impressionante que faz o antigo forte parecer insignificante em comparação. As fortificações foram ampliadas ao longo dos séculos para incluir altos muros de pedra, um amplo fosso e várias torres maciças. Esta estrutura defensiva manterá a maioria dos sitiantes à distância com facilidade."
 building_type_golden_gate_of_kiev_01: "Portão Dourado de Kyiv"
 building_type_golden_gate_of_kiev_01_desc: "Modelado e nomeado a partir de um portão em Constantinopla, o Portão Dourado de Kyiv serve tanto como entrada da cidade quanto como arco triunfal. A cúpula dourada da igreja, construída sobre o portão, pode ser vista de longe e faz dele um símbolo proeminente de Kyiv."
 building_golden_gate_of_kiev_01: "$building_type_golden_gate_of_kiev_01$"
 building_golden_gate_of_kiev_01_desc: "$building_type_golden_gate_of_kiev_01_desc$"
 building_type_heddal_stave_church_01: "Igreja de Madeira de Heddal"
 building_type_heddal_stave_church_01_desc: "A Igreja de Madeira de Heddal é a maior igreja de madeira da Noruega e possui um belo interior de madeira. A lenda diz que a igreja foi construída por um troll das montanhas em meros três dias."
 building_heddal_stave_church_01: "$building_type_heddal_stave_church_01$"
 building_heddal_stave_church_01_desc: "$building_type_heddal_stave_church_01_desc$"
 building_type_temple_of_uppsala_01: "Templo de Uppsala"
 building_type_temple_of_uppsala_01_desc: "O templo em Uppsala serve como centro religioso para grande parte da Escandinávia. Uma árvore sagrada fica perto do templo, ao lado de um poço, semelhante ao da lendária Yggdrasil."
 building_temple_of_uppsala_01: "$building_type_temple_of_uppsala_01$"
 building_temple_of_uppsala_01_desc: "$building_type_temple_of_uppsala_01_desc$"
 building_temple_of_uppsala_02: "Catedral de Uppsala"
 building_temple_of_uppsala_02_desc: "Uma elevada catedral construída para rivalizar com as mais esplêndidas construções do sul da Europa, a Catedral de Uppsala serve como local de sepultamento de alguns dos mais proeminentes monarcas da Suécia e contém várias relíquias sagradas."
 building_type_lund_cathedral_01: "Catedral de Lund"
 building_type_lund_cathedral_01_desc: "A Catedral de Lund é uma magnífica igreja ricamente decorada com esculturas em pedra. Construída com influências da arquitetura românica, a igreja compartilha muitas semelhanças com igrejas da Alemanha. O edifício é dedicado a São Lourenço, que é o santo padroeiro de Lund."
 building_lund_cathedral_01: "$building_type_lund_cathedral_01$"
 building_lund_cathedral_01_desc: "$building_type_lund_cathedral_01_desc$"
 building_type_danevirke_01: "Danevirke"
 building_type_danevirke_01_desc: "O Danevirke é uma extensa fortificação de terra construída para impedir incursões do continente em territórios dinamarqueses e foi ampliada várias vezes desde sua construção original."
 building_danevirke_01: "$building_type_danevirke_01$"
 building_danevirke_01_desc: "$building_type_danevirke_01_desc$"
 building_type_aljaferia_palace_01: "Aljafería"
 building_type_aljaferia_palace_01_desc: "Um grande palácio-fortaleza construído na planície do Saría, a Aljafería é um testemunho do poder e da riqueza de Zaragoza. Imponente e esplêndida em igual medida; é tanto uma fortificação intimidante quanto um ápice da arquitetura ibérica."
 building_aljaferia_palace_01: "$building_type_aljaferia_palace_01$"
 building_aljaferia_palace_01_desc: "$building_type_aljaferia_palace_01_desc$"
 building_type_roman_wall_of_lugo_01: "Muralhas Romanas de Lugo"
 building_type_roman_wall_of_lugo_01_desc: "Construídas pelos romanos há muito tempo, as grandes Muralhas de Lugo continuam sendo uma visão impressionante. Peregrinos atravessam seus cinco portões na estrada para Santiago de Compostela, tornando a jornada ainda mais profunda."
 building_roman_wall_of_lugo_01: "$building_type_roman_wall_of_lugo_01$"
 building_roman_wall_of_lugo_01_desc: "$building_type_roman_wall_of_lugo_01_desc$"
 building_type_rock_of_gibraltar_01: "Rochedo de Gibraltar"
 building_type_rock_of_gibraltar_01_desc: "O monolítico Rochedo de Gibraltar domina um estreito que é a porta de entrada para o Mar Mediterrâneo. Ele foi um dos Pilares de Hércules na Antiguidade, considerado como marcando o fim do mundo conhecido. Ao observá-lo agora, é impossível não se perguntar o que existe além."
 building_rock_of_gibraltar_01: "$building_type_rock_of_gibraltar_01$"
 building_rock_of_gibraltar_01_desc: "$building_type_rock_of_gibraltar_01_desc$"
 building_type_tower_of_hercules_01: "Farum Brigantium"
 building_type_tower_of_hercules_01_desc: "Diz-se que este antigo farol foi inspirado em sua irmã mais famosa em Alexandria. Tendo guiado navegantes por incontáveis séculos, ele continua importante para o comércio costeiro da Galícia. Alguns afirmam que é possível avistar a costa verde da Irlanda do topo desta torre solitária, mas, ao olhar para fora, você vê apenas o mar sem fim."
 building_tower_of_hercules_01: "$building_type_tower_of_hercules_01$"
 building_tower_of_hercules_01_desc: "$building_type_tower_of_hercules_01_desc$"
 building_type_city_wall_of_toledo_01: "Muralhas da Cidade de Toledo"
 building_type_city_wall_of_toledo_01_desc: "Originalmente construídas pelos romanos em tempos antigos, estas muralhas maciças foram ampliadas de forma significativa durante o reinado de Wamba, rei dos visigodos. Os primeiros governantes árabes as alargaram ainda mais, criando um sistema defensivo digno da Cidade dos Reis."
 building_city_wall_of_toledo_01: "$building_type_city_wall_of_toledo_01$"
 building_city_wall_of_toledo_01_desc: "$building_type_city_wall_of_toledo_01_desc$"
 building_type_alcazar_of_segovia_01: "Alcázar de Segovia"
 building_type_alcazar_of_segovia_01_desc: "Erguendo-se como a proa de um navio sobre um rochedo, esta fortaleza é uma visão inspiradora. Tão majestosa quanto impenetrável, é o maior de todos os castelos do reino dos castelos — Castela."
 building_alcazar_of_segovia_01: "$building_type_alcazar_of_segovia_01$"
 building_alcazar_of_segovia_01_desc: "$building_type_alcazar_of_segovia_01_desc$"
 building_type_holy_site_basilica_santiago_01: "Catedral de Santiago de Compostela"
 building_type_holy_site_basilica_santiago_01_desc: "Construído sobre o túmulo de Tiago, o Maior, este esplêndido edifício é o ponto final do Caminho de São Tiago e a joia de um dos grandes locais da Cristandade. Peregrinos de toda a Europa Ocidental e Setentrional chegam em grande número, falando dezenas de línguas — embora muitos fiquem mudos de assombro."
 building_holy_site_basilica_santiago_01: "$building_type_holy_site_basilica_santiago_01$"
 building_holy_site_basilica_santiago_01_desc: "$building_type_holy_site_basilica_santiago_01_desc$"
 building_type_charnel_grounds_01: "Campos de Exposição de Restos Mortais"
 building_type_charnel_grounds_01_desc: "Tanto locais de purificação espiritual quanto áreas para o repouso dos mortos, estes espaços a céu aberto oferecem um lugar para que os corpos se decomponham."
 building_charnel_grounds_01: "Depósito de Cadáveres"
 building_charnel_grounds_01_desc: "Branqueados pelo sol e bicados por aves de rapina, os corpos apodrecem no topo da colina."
 building_charnel_grounds_02: "Campos de Descarnamento"
 building_charnel_grounds_02_desc: "Parte local religioso, parte cemitério, os corpos em decomposição dos mortos são mantidos bem afastados dos vivos aqui."
 building_charnel_grounds_03: "Escarpa Ritual"
 building_charnel_grounds_03_desc: "Corpos cobrem a paisagem, e sachês perfumados encobrem parcialmente o odor ao longo dos caminhos onde os ainda vivos preparam novas oferendas aos elementos."
 building_type_imam_reza_shrine_01: "Santuário do Imã Reza"
 building_type_imam_reza_shrine_01_desc: "Este santuário abriga os restos de Ali ar-Rida, celebrado por alguns xiitas como o oitavo imã, que foi martirizado nesta terra. O complexo em constante expansão inclui seu santuário, bem como salões de oração, uma biblioteca e um bazar, crescendo de maneira eclética, porém gloriosa, com o vai e vem de peregrinos e caravanas."
 building_imam_reza_shrine_01: "$building_type_imam_reza_shrine_01$"
 building_imam_reza_shrine_01_desc: "$building_type_imam_reza_shrine_01_desc$"
 building_type_soltaniyeh_01: "Cúpula de Soltaniyeh"
 building_type_soltaniyeh_01_desc: "Ao mesmo tempo templo e mausoléu, a grandiosa escala e a simetria requintada deste edifício certamente inspirarão muitas grandes obras ainda por vir. Sua enorme cúpula de dupla concha é revestida de turquesa, e de uma escala tal que quase parece um desafio ao céu."
 building_soltaniyeh_01: "$building_type_soltaniyeh_01$"
 building_soltaniyeh_01_desc: "$building_type_soltaniyeh_01_desc$"
 building_type_palace_of_ctesiphon_01: "Ruínas do Palácio de Ctesifonte"
 building_type_palace_of_ctesiphon_01_desc: "Este antigo edifício foi a sede cerimonial dos reis dos reis sassânidas, mas o silêncio caiu sobre seus salões outrora gloriosos, e as flores dos jardins já não desabrocham. Muito material foi levado para a fundação de Bagdá, e o povo se dispersou aos quatro ventos. Ainda assim, permanece um esplendor fantasmagórico, a glória persistente de outrora."
 building_palace_of_ctesiphon_01: "$building_type_palace_of_ctesiphon_01$"
 building_palace_of_ctesiphon_01_desc: "$building_type_palace_of_ctesiphon_01_desc$"
 building_type_palace_of_ctesiphon_02: "Grande Palácio de Ctesifonte"
 building_type_palace_of_ctesiphon_02_desc: "Agora reconstruída, a sede dos antigos reis foi restaurada à sua glória plena. Os jardins voltam a florescer, e os salões mais uma vez se enchem de música e esplendor. Visitantes vêm de perto e de longe para contemplar o grande arco da sala do trono aberta, uma maravilha há muito esquecida do mundo antigo, que enfim encontrou seu lugar nas canções."
 building_palace_of_ctesiphon_02: "$building_type_palace_of_ctesiphon_02$"
 building_palace_of_ctesiphon_02_desc: "$building_type_palace_of_ctesiphon_02_desc$"
 building_type_falak_ol_aflak_citadel_01: "Falak-ol-Aflak"
 building_type_falak_ol_aflak_citadel_01_desc: "Aninhada no topo de uma colina acima da cidade de Khorramabad, esta fortaleza sassânida de adobe continua sendo uma visão impressionante. Os habitantes do vale a chamam de #italic Falak-ol-Aflak#!, \"O Céu dos Céus\", pois lhes parece repousar sobre o topo do mundo, e dentro de seus fortes muros eles frequentemente encontraram refúgio."
 building_falak_ol_aflak_citadel_01: "$building_type_falak_ol_aflak_citadel_01$"
 building_falak_ol_aflak_citadel_01_desc: "$building_type_falak_ol_aflak_citadel_01_desc$"
 building_type_minarets_and_remains_of_jam_01: "Minarete de Jam"
 building_type_minarets_and_remains_of_jam_01_desc: "Esta estrutura se eleva sobre o vale do rio Hari, coberta de decorações em estuque e azulejos vitrificados e faixas alternadas de caligrafia, um monumento requintado ao que a fé e a riqueza podem alcançar mesmo nestas terras remotas e acidentadas."
 building_minarets_and_remains_of_jam_01: "$building_type_minarets_and_remains_of_jam_01$"
 building_minarets_and_remains_of_jam_01_desc: "$building_type_minarets_and_remains_of_jam_01_desc$"
 building_type_great_wall_of_gorgan_01: "Grande Muralha de Gorgan"
 building_type_great_wall_of_gorgan_01_desc: "Um vasto sistema de fortificações construído pelos reis antigos como baluarte contra os hunos heftalitas, a Grande Muralha de Gorgan é envolta em lendas. Diz-se que o próprio Alexandre, o Grande, passou por seus portões em sua marcha para conquistar o Oriente."
 building_great_wall_of_gorgan_01: "$building_type_great_wall_of_gorgan_01$"
 building_great_wall_of_gorgan_01_desc: "$building_type_great_wall_of_gorgan_01_desc$"
 building_type_maharloo_lake_01: "Lago Maharloo"
 building_type_maharloo_lake_01_desc: "Embora este lago sazonal às vezes não passe de uma planície salgada seca, em pleno verão suas águas adquirem uma requintada tonalidade vermelho-pálida. Jovens poetas se reúnem à margem para contemplar a água estranha e refletir sobre a beleza e os mistérios da terra."
 building_maharloo_lake_01: "$building_type_maharloo_lake_01$"
 building_maharloo_lake_01_desc: "$building_type_maharloo_lake_01_desc$"
 building_type_tomb_of_cyrus_01: "Túmulo de Bate-Seba"
 building_type_tomb_of_cyrus_01_desc: "Diz-se que este antigo túmulo de calcário branco é o local de descanso de Bate-Seba, mãe do rei Salomão, exaltada por muitas fés. Mulheres cuidam do local, e somente mulheres podem entrar no interior escuro do túmulo. Elas raramente falam sobre o que viram lá dentro. Diz-se que as águas próximas são abençoadas e podem curar aqueles que foram mordidos por cães raivosos."
 building_tomb_of_cyrus_01: "$building_type_tomb_of_cyrus_01$"
 building_tomb_of_cyrus_01_desc: "$building_type_tomb_of_cyrus_01_desc$"
 building_type_rainbow_mountains_01: "Montanhas Arco-Íris"
 building_type_rainbow_mountains_01_desc: "Parece que o próprio Criador pintou estas cristas com um arco-íris de cores. Faixas de vermelho, branco, amarelo, cinza, laranja e tons ainda mais estranhos tingem a paisagem rochosa e tranquila. Governantes locais frequentemente levam convidados para caçar aqui, a fim de contemplar esta sublime maravilha."
 building_rainbow_mountains_01: "$building_type_rainbow_mountains_01$"
 building_rainbow_mountains_01_desc: "$building_type_rainbow_mountains_01_desc$"
 building_type_mount_damavand_01: "Monte Damavand"
 building_type_mount_damavand_01_desc: "Um grande pico nevado envolto em antigas lendas, diz-se que o Monte Damavand é a prisão do monstruoso tirano Zahhāk, onde ele permanecerá até o fim do mundo. Muitos heróis do passado realizaram grandes feitos nesta montanha e, para aqueles que viajam até ela hoje, sua presença poderosa parece tocar suas próprias almas. Um vulcão adormecido, suas encostas são pontilhadas por fontes termais onde viajantes cansados podem parar e descansar, refletindo sobre os feitos dos antigos."
 building_mount_damavand_01: "$building_type_mount_damavand_01$"
 building_mount_damavand_01_desc: "$building_type_mount_damavand_01_desc$"
 building_type_holy_site_fire_temple_01: "Grande Templo do Fogo"
 building_type_holy_site_fire_temple_01_desc: "Dentro deste grande edifício arde um #italic Atash Behram#!, um Fogo da Vitória, a maior e mais pura de todas as chamas, reunida de relâmpagos, velas reais, piras de cremação, fornalhas de ourives e lareiras de ascetas. Peregrinos de terras distantes vêm contemplar esta maravilha, enquanto os magos realizam ritos de purificação aparentemente intermináveis."
 building_holy_site_fire_temple_01: "Grande Templo do Fogo"
 building_holy_site_fire_temple_01_desc: "$building_type_holy_site_fire_temple_01_desc$"
 building_type_ark_of_bukhara_01: "Ark de Bucara"
 building_type_ark_of_bukhara_01_desc: "Diz-se que o príncipe Siyavusha construiu esta fortaleza maciça quando o mundo ainda era jovem. Três mil anos depois, ela foi restaurada pelos Bukhara Khudas, os antigos governantes desta região, e permanece em uso desde então. Viajantes vêm de perto e de longe para admirar a construção, com sete grandes pilares espelhando as sete estrelas da Ursa Maior, mas trata-se, antes de tudo, de uma fortificação, intimidadora em seu esplendor."
 building_ark_of_bukhara_01: "$building_type_ark_of_bukhara_01$"
 building_ark_of_bukhara_01_desc: "$building_type_ark_of_bukhara_01_desc$"
 building_type_shah_i_zinda_01: "Shah-i-Zinda"
 building_type_shah_i_zinda_01_desc: "O nome deste complexo de tumbas significa #italic O Rei Vivo#!, em referência a Quham ibn Abbas, primo de Maomé, que se diz estar enterrado aqui. Os mausoléus são bastante pequenos e humildes, mas possuem uma beleza solene que leva muitos a permanecer entre os túmulos silenciosos, refletindo sobre a transitoriedade da vida."
 building_shah_i_zinda_01: "$building_type_shah_i_zinda_01$"
 building_shah_i_zinda_01_desc: "$building_type_shah_i_zinda_01_desc$"
 building_shah_i_zinda_02: "Necrópole de Shah-i-Zinda"
 building_shah_i_zinda_02_desc: "Uma vasta necrópole de mausoléus, altos portões e passagens abobadadas revestidas de azulejos turquesa, #italic O Rei Vivo#! é o local de sepultamento do primo do profeta e de muitos outros grandes senhores de antigamente. O complexo está em constante expansão e é sublime, inquietante e impressionante em igual medida."
 building_type_alamut_castle_01: "Castelo de Alamut"
 building_type_alamut_castle_01_desc: "Este ninho de águia, erguido sobre um penhasco elevado, foi construído pelos Justânidas para servir como reduto fortificado de seu atribulado reino. Com seu cenário inspirador e fortes muralhas, é quase inexpugnável por todos os relatos, e pode se revelar uma fortaleza ideal para qualquer facção ou seita guerreira que prospere em um local tão isolado."
 building_alamut_castle_01: "$building_type_alamut_castle_01$"
 building_alamut_castle_01_desc: "$building_type_alamut_castle_01_desc$"
 building_type_alamut_castle_02: "Fortaleza de Alamut"
 building_type_alamut_castle_02_desc: "Erguido sobre um penhasco elevado, este castelo há muito serve como um remoto reduto montanhoso. Agora foi reconstruído como uma formidável fortaleza #italic fedayeen#!, abrigando bibliotecas, laboratórios e jardins tranquilos entre as imponentes fortificações. Para alguns, é um lugar de sangue e guerra; para outros, um lugar de repouso espiritual — ou talvez ambos."
 building_alamut_castle_02: "$building_type_alamut_castle_02$"
 building_alamut_castle_02_desc: "$building_type_alamut_castle_02_desc$"
 building_type_assassin_castle_01: "$holy_order_hashshashin$ $building_castle_04$"
 building_type_assassin_castle_01_desc: "$building_type_alamut_castle_02_desc$"
 building_assassin_castle_01: "$building_type_assassin_castle_01$"
 building_assassin_castle_01_desc: "$building_type_assassin_castle_01_desc$"
 building_type_qanats_01: "$building_qanats_06$"
 building_type_qanats_01_desc: "$building_qanats_05_desc$"
 building_qanats_01: "Yakchāl"
 building_qanats_01_desc: "Estas casas de gelo em forma de cúpula combinam uma área de armazenamento subterrânea com materiais de construção resistentes ao calor para criar um espaço isolado que funciona como um resfriador evaporativo."
 building_qanats_02: "Cisterna"
 building_qanats_02_desc: "Chamadas de #italic Ab anbar#! em persa, estas estruturas arqueadas, meio subterrâneas, são usadas para armazenar grandes volumes de água."
 building_qanats_03: "Captores de Vento"
 building_qanats_03_desc: "Uma invenção persa, estas altas torres são conectadas a cisternas e outros edifícios. Por meio de aberturas na direção dos ventos predominantes, elas captam correntes de ar que então circulam em seus interiores para proporcionar resfriamento."
 building_qanats_04: "Kārīz"
 building_qanats_04_desc: "A primeira etapa de um sistema de aquedutos subterrâneos, o kārīz é uma série de poços verticais conectados por um túnel de suave inclinação, que capta uma fonte de água subterrânea e a leva à superfície."
 building_qanats_05: "Qanats Pequenos"
 building_qanats_05_desc: "Qanats são aquedutos subterrâneos projetados para mitigar a perda de água por evaporação. Embora ainda bastante pequeno nesta fase, este sistema já proporciona um benefício significativo à agricultura."
 building_qanats_06: "Qanats"
 building_qanats_06_desc: "Os aquedutos subterrâneos foram ampliados, conectando-os a cisternas locais, casas de gelo e sistemas de irrigação."
 building_qanats_07: "Qanats Grandes"
 building_qanats_07_desc: "Este grande sistema de aquedutos subterrâneos se estende por vários #italic parasangas#!, fornecendo um formidável abastecimento de água tanto para agricultores quanto para moradores das cidades."
 building_qanats_08: "Sistema Maciço de Qanat"
 building_qanats_08_desc: "Fluindo para incontáveis cisternas subterrâneas, canais de irrigação, casas de gelo, casas de banho, fontes e poços de água potável, este formidável sistema de aquedutos subterrâneos é um verdadeiro testemunho da engenhosidade e glória persas."
 building_type_tower_of_silence_01: "Grande Torre do Silêncio"
 building_type_tower_of_silence_01_desc: "Nossa fé nos ensina a dispor dos cadáveres dos fiéis justos deixando-os para os animais e para o céu aberto. Assim, a alma é mantida pura e a comunidade livre da corrupção da carne em decomposição.\n\nQuando forasteiros não nos permitem realizar nossos ritos, devemos construir estas torres para proteger tais restos mortais e simbolizar nossa crença duradoura."
 building_tower_of_silence_01: "Grande Torre do Silêncio"
 building_tower_of_silence_01_desc: "Construída em uma parte tranquila do ducado, esta torre plana e aberta no topo é onde os moradores locais deixam seus mortos para descansar. Os corpos em seu interior ficam expostos às aves carniceiras e ao rigor do sol, conduzindo em segurança as almas dos falecidos à vida após a morte e mantendo os vivos livres de corrupção. As prescrições religiosas tornam a torre necessária em vez da natureza selvagem tradicional, mas sua presença une firmemente a comunidade."
 tower_of_silence_01.tt.liege_not_approve_of_burial: "A [faith|lE] de [liege|lE] permite que seu povo pratique os sepultamentos tradicionais sem necessidade de uma $building_type_event_tower_of_silence_01$"
 tower_of_silence_01.tt.county_not_tos_users: "A [faith|lE] do [county|lE] não dispõe de seus mortos desta maneira"
 building_type_event_tower_of_silence_01: "Torre do Silêncio"
 building_type_event_tower_of_silence_01_desc: "$building_tower_of_silence_01_desc$"
 building_event_tower_of_silence_01: "Torre do Silêncio"
 building_event_tower_of_silence_01_desc: "$building_type_tower_of_silence_01_desc$"
 building_church_of_the_theotokos: "Templo da Teótoco"
 building_church_of_the_theotokos_desc: "A Santa Cruz há muito conquistou esta magnífica estrutura, vencendo o culto pagão à deusa virgem Atena.\nHoje em dia, ela abriga os santuários de Maria Partenos, Mãe de Deus e a única Virgem digna do nome #EMP Santa#!."
 building_type_church_of_the_theotokos: "$building_church_of_the_theotokos$"
 building_type_church_of_the_theotokos_desc: "$building_church_of_the_theotokos_desc$"
 building_parthenon: "Partenon"
 building_parthenon_desc: "O santo templo da poderosa Atena ergue-se orgulhosamente mais uma vez, incontaminado por superstições tolas.\nEstas majestosas colunas e muralhas, erguidas há mais de 1000 anos, resistiram à prova do tempo e ainda protegem do alto os lares dos fiéis, um símbolo silencioso da bênção da Deusa Virgem que nomeou a cidade."
 building_type_parthenon: "$building_parthenon$"
 building_type_parthenon_desc: "$building_parthenon_desc$"
 building_hagios_demetrios: "Hagios Demetrios"
 building_hagios_demetrios_desc: "A igreja de São Demétrio é o santuário mais importante da cidade.\nErguida pela primeira vez quando a fé em Cristo ainda era jovem, ela incorpora a casa de banhos romana em que o santo, junto de muitos outros primeiros fiéis, foi aprisionado, martirizado e sepultado."
 building_type_hagios_demetrios: "$building_hagios_demetrios$"
 building_type_hagios_demetrios_desc: "$building_hagios_demetrios_desc$"
 building_kassiopi_castle: "Castelo de Kassiopi"
 building_kassiopi_castle_desc: "Uma imponente fortificação na costa. Sua posição estratégica, observando o canal que separa a ilha do continente, faz dela um ponto vital de controle na região jônica."
 building_type_kassiopi_castle: "$building_kassiopi_castle$"
 building_type_kassiopi_castle_desc: "$building_kassiopi_castle_desc$"
 building_saint_lazarus: "Igreja de São Lázaro"
 building_saint_lazarus_desc: "Segundo a tradição, Lázaro de Betânia, outrora ressuscitado por Cristo, foi sepultado na cidade de Larnaca após sua segunda morte.\nA tumba permaneceu perdida por séculos, mas, após sua redescoberta, o imperador Leão VI mandou transferir os restos do santo para Constantinopla e construir esta imponente igreja sobre o túmulo."
 building_type_saint_lazarus: "$building_saint_lazarus$"
 building_type_saint_lazarus_desc: "$building_saint_lazarus_desc$"
 building_type_sumela_monastery_01: "Mosteiro de Sumela"
 building_type_sumela_monastery_01_desc: "As origens deste mosteiro, construído sobre um penhasco íngreme na Montanha Negra, são tão remotas que quase se perdem em mistério; segundo alguns, ele foi erguido pela primeira vez por ordem do imperador Teodósio no século IV, mas a fonte sagrada e os antigos afrescos podem ser ainda mais antigos.\nA joia do mosteiro é um afresco da Mãe de Deus, que se diz ter sido pintado pelo próprio apóstolo Lucas."
 building_sumela_monastery_01: "$building_type_sumela_monastery_01$"
 building_sumela_monastery_01_desc: "O mosteiro caiu em ruínas e foi posteriormente restaurado e ampliado por vários imperadores; o principal responsável por sua forma atual foi o imperador Justiniano, por meio da intervenção do general Belisário."
 building_sumela_monastery_02: "$building_type_sumela_monastery_01$ Renovado"
 building_sumela_monastery_02_desc: "Muitos séculos se passaram desde a última vez que este mosteiro foi renovado. A intervenção mais recente lhe concedeu mais terras hereditárias e dependentes, isenções fiscais e financiamentos imperiais para erguer novos edifícios. A Igreja da Rocha foi a maior beneficiada, pois recebeu um ciclo inteiramente novo de afrescos."
 building_patras_castle: "Castelo de Patras"
 building_patras_castle_desc: "A acrópole arcaica da cidade de Patras, erguida em uma colina das montanhas Vodias, foi substituída por uma fortificação durante o reinado do imperador Justiniano.\nO castelo tem sido usado ininterruptamente desde então, sempre sob a proteção do padroeiro local, Santo André, e da #EMP genius loci#! Patrinella, a estátua romana de uma donzela."
 building_type_patras_castle: "$building_patras_castle$"
 building_type_patras_castle_desc: "$building_patras_castle_desc$"
 building_maiden_tower: "Torre da Donzela"
 building_maiden_tower_desc: "Este rochedo diante da costa já abrigava uma estação alfandegária nos tempos de Alcibíades, o Ateniense, graças à sua posição ideal na entrada do estreito do Bósforo.\nUma torre fortificada na mesma pequena ilha agora é capaz de controlar todo o tráfego naval vindo do Mar Negro e seguindo em sua direção; além disso, uma grande corrente pode ser erguida até o nível do mar entre a torre e Constantinopla, bloqueando efetivamente a passagem de qualquer navio perigoso ou indesejado."
 building_type_maiden_tower: "$building_maiden_tower$"
 building_type_maiden_tower_desc: "$building_maiden_tower_desc$"
 building_despot_palace: "Palácio dos Déspotas"
 building_despot_palace_desc: "Um palácio grandioso em um local seguro no Monte Taigeto, logo acima da cidade fortificada de Mistras.\nO palácio possui todos os luxos para competir com a grandeza dos salões constantinopolitanos, e é digno apenas dos mais ricos e influentes governantes."
 building_type_despot_palace: "$building_despot_palace$"
 building_type_despot_palace_desc: "$building_despot_palace_desc$"
 building_type_meteora_01: "Meteora"
 building_type_meteora_01_desc: "Meteora é o nome dado pelos locais a uma formação rochosa de tirar o fôlego, composta por pilares naturais que se erguem bem ao lado do Monte Pidnos."
 building_meteora_01: "$building_type_meteora_01$"
 building_meteora_01_desc: "As cavernas e cavidades naturais de Meteora são habitadas por eremitas ascetas desde o início do século IX, mas nenhuma construção feita pela mão humana jamais alterou a paisagem."
 building_meteora_02: "$building_type_meteora_01$"
 building_meteora_02_desc: "À medida que mais e mais monges eremitas buscavam refúgio nos picos escavados de Meteora, mais e mais mosteiros começaram a surgir.\nO domínio do homem sobre a natureza hostil aqui ainda é muito frágil, porém; os mosteiros são extremamente difíceis de alcançar, dependendo em grande parte apenas de escadas, cordas, içamento manual e #EMP orações#!, pois uma queda em caso de falha do equipamento é fatal."
 building_type_mount_athos_01: "Monte Atos"
 building_type_mount_athos_01_desc: "Segundo a tradição, a Virgem Maria navegava da Palestina para Chipre para visitar Lázaro, amigo de seu filho, que evangelizava a ilha, quando o navio saiu do curso e foi forçado a aportar aqui, junto ao Monte Atos. Quando Maria desembarcou, ficou maravilhada com a beleza natural da região, então a abençoou e a pediu para si como seu próprio jardim. Uma voz do Céu concedeu seu desejo; desde então, a área é considerada sagrada e proibida a qualquer outra mulher."
 building_mount_athos_01: "$building_type_mount_athos_01$"
 building_mount_athos_01_desc: "Comunidades cristãs habitam este promontório pelo menos desde a época do imperador Constantino I, e monges do Monte Atos já participaram do Sétimo Concílio de Niceia. No entanto, ainda não existe aqui nenhuma comunidade monástica propriamente dita nem edifícios permanentes."
 building_mount_athos_02: "$building_type_mount_athos_01$"
 building_mount_athos_02_desc: "A chegada de um monge chamado Atanásio ao Monte Atos põe em movimento a fundação de vários mosteiros por toda a península: antes de tudo, a Grande Lavra e Vatopedi, ambos dedicados à Anunciação. Com mosteiros propriamente ditos, a vida monástica local passa a ter ordem e regras."
 building_mount_athos_03: "$building_type_mount_athos_01$"
 building_mount_athos_03_desc: "A popularidade do Monte Atos como centro monástico, baseada nas muitas concessões oferecidas a ele pelo poder secular, em seu estatuto autônomo, em seu estilo de vida verdadeiramente isolado e em sua florescente produção de ícones, garantiu um fluxo contínuo de novos monges ingressando por séculos.\nÀ medida que o número de monges crescia, também crescia o número de mosteiros. Atualmente existem vinte mosteiros no Monte Atos, tornando-o uma das maiores e mais influentes comunidades monásticas da região."
 building_apollinare_nuovo: "Sant'Apollinare Nuovo"
 building_apollinare_nuovo_desc: "A Basílica de Sant'Apollinare Nuovo só recebeu seu nome atual recentemente, quando as relíquias de Santo Apolinário foram transferidas da basílica vizinha em Classe. Sua história, porém, é muito mais longa.\nConsagrada pela primeira vez no início do século VI pelo rei Teodorico dos ostrogodos como uma igreja ariana, o edifício passou por muitas reformas, tanto na estrutura quanto na decoração, enquanto mantinha seu estilo único — uma elegante mistura de arte ocidental e oriental — e seus impressionantes mosaicos bizantinos."
 building_type_apollinare_nuovo: "$building_apollinare_nuovo$"
 building_type_apollinare_nuovo_desc: "$building_apollinare_nuovo_desc$"
 building_saint_catherine: "Mosteiro de Santa Catarina"
 building_saint_catherine_desc: "Um mosteiro discreto no meio do deserto, mas com uma história grandiosa. A primeira estrutura monástica, de fato, foi ordenada pela mãe do imperador Constantino no local da aparição da Sarça Ardente a Moisés. O imperador Justiniano financiou sua expansão até o atual mosteiro fortificado, também encerrando o Poço de Moisés. Somente séculos após sua fundação os despojos de Santa Catarina chegaram ao mosteiro, mudando seu nome.\nO mosteiro sempre esteve entre os scriptoria e centros de produção de ícones mais antigos e prolíficos."
 building_type_saint_catherine: "$building_saint_catherine$"
 building_type_saint_catherine_desc: "$building_saint_catherine_desc$"
 building_jvari_monastery: "Mosteiro de Jvari"
 building_jvari_monastery_desc: "Um antigo mosteiro erguido exatamente no lugar onde Santa Nino plantou uma cruz milagrosa enquanto evangelizava a Geórgia.\nO edifício sagrado atrai peregrinos de todo o Cáucaso."
 building_type_jvari_monastery: "$building_jvari_monastery$"
 building_type_jvari_monastery_desc: "$building_jvari_monastery_desc$"
 building_etchmiadzin_cathedral: "Catedral de Vagarshapat"
 building_etchmiadzin_cathedral_desc: "Esta antiga catedral é o centro histórico do cristianismo apostólico armênio. Originalmente fundada por São Gregório, o Iluminador, sobre um templo pagão para simbolizar o triunfo da religião recém-adotada do Reino da Armênia, a igreja foi quase completamente destruída durante a invasão sassânida e reconstruída desde os alicerces alguns anos depois.\nApós o século VII, porém, a catedral foi repetidamente saqueada e abandonada, caindo em estado de deterioração. Apenas uma intervenção drástica e dispendiosa poderia devolver-lhe seu esplendor anterior."
 building_type_etchmiadzin_cathedral: "$building_etchmiadzin_cathedral$"
 building_type_etchmiadzin_cathedral_desc: "$building_etchmiadzin_cathedral_desc$"
 building_cattolica_stilo: "Cattolica di Stilo"
 building_cattolica_stilo_desc: "A influência bizantina sobre este edifício é forte: uma pequena igreja com batistério, de tijolos vermelhos aninhada sobre rochas nuas, com planta em 'cruz inscrita' e uma rica decoração de ciclos de afrescos, dominando o vale do riacho Stilaro.\nA igreja é uma joia isolada no meio de uma natureza hostil, onde o homem pode sentir-se mais próximo de Deus."
 building_type_cattolica_stilo: "$building_cattolica_stilo$"
 building_type_cattolica_stilo_desc: "$building_cattolica_stilo_desc$"
 building_hosios_loukas: "Hosios Loukas"
 building_hosios_loukas_desc: "O mosteiro é dedicado à preservação das relíquias do venerável Lucas de Steiris, o monge eremita.\nDiz-se que os restos sagrados exalam um óleo milagroso e atraem incontáveis peregrinos, que dormem junto ao túmulo para serem curados por incubação. A decoração interna é elogiada por todo o Mediterrâneo Oriental por sua qualidade e opulência, pois os melhores artistas da época a enriqueceram com mosaicos, ícones, lustres, entalhes e tecidos."
 building_type_hosios_loukas: "$building_hosios_loukas$"
 building_type_hosios_loukas_desc: "$building_hosios_loukas_desc$"
 building_sofia_ohrid: "Igreja de Santa Sofia"
 building_sofia_ohrid_desc: "A catedral de Ohrid foi destruída pela primeira vez quando os eslavos desceram sobre estas terras, e só foi reconstruída quando a região voltou em segurança ao seio da fé cristã.\nSua encarnação mais recente é uma basílica abobadada ricamente decorada com ciclos de afrescos dos melhores artistas da época."
 building_type_sofia_ohrid: "$building_sofia_ohrid$"
 building_type_sofia_ohrid_desc: "$building_sofia_ohrid_desc$"
 building_fairy_chimneys: "Assentamentos Troglodíticos"
 building_fairy_chimneys_desc: "As rochas são extremamente maleáveis nesta região, formando naturalmente cones, picos e cavernas.\nOs humanos tiram proveito dessas estruturas há séculos, construindo estábulos, depósitos e refúgios, depois casas e edifícios de produção, e por fim igrejas dentro dos cones rochosos, de modo que assentamentos inteiros se formaram assim."
 building_type_fairy_chimneys: "$building_fairy_chimneys$"
 building_type_fairy_chimneys_desc: "$building_fairy_chimneys_desc$"
 building_cilician_gates: "Portões da Cilícia"
 building_cilician_gates_desc: "Os Portões da Cilícia são uma passagem através das Montanhas Tauro que conecta as planícies da Cilícia ao planalto da Anatólia.\nDesde tempos imemoriais, a passagem foi fortificada, e controlá-la significava controlar uma das principais artérias comerciais e militares da Ásia Menor e do Oriente Médio."
 building_type_cilician_gates: "$building_cilician_gates$"
 building_type_cilician_gates_desc: "$building_cilician_gates_desc$"
 building_swahili_port_pemba: "Portos Comerciais de Pemba"
 building_swahili_port_pemba_desc: "Os recifes, praias e florestas de mangue da ilha de Pemba oferecem uma abundância de enseadas e recursos para o povo de Pemba, tornando-a um entreposto natural dos zanj."
 building_type_swahili_port_pembas: "$building_swahili_port_pemba$"
 building_type_swahili_port_pemba_desc: "$building_swahili_port_pemba_desc$"
 building_swahili_port_zanzibar: "Portos Comerciais de Zanzibar"
 building_swahili_port_zanzibar_desc: "As praias arenosas da ilha de Unguja, protegidas por ilhotas de coral, fazem dela um refúgio perfeito para navios. Comerciantes de todo o oceano Índico vêm desfrutar das vantagens naturais de Unguja como centro do comércio marítimo."
 building_type_swahili_port_zanzibar: "$building_swahili_port_zanzibar$"
 building_type_swahili_port_zanzibar_desc: "$building_type_swahili_port_zanzibar_desc$"
 building_swahili_port_mombasa: "Porto de Mombaça"
 building_swahili_port_mombasa_desc: "Erguida no topo de uma ilha rochosa cercada por penhascos íngremes, Mombaça desfruta de uma posição naturalmente defensável que ainda assim permanece singularmente acessível ao tráfego marítimo."
 building_type_swahili_port_mombasa: "$building_swahili_port_mombasa$"
 building_type_swahili_port_mombasa_desc: "$building_swahili_port_mombasa_desc$"
 building_swahili_port_pate: "Portos Comerciais da Ilha de Pate"
 building_swahili_port_pate_desc: "Localizada na borda norte do coração suaíli, a ilha de Pate foi uma das primeiras regiões suaílis introduzidas ao islamismo e, assim, às redes comerciais do Oriente Médio."
 building_type_swahili_port_pate: "$building_swahili_port_pate$"
 building_type_swahili_port_pate_desc: "$building_swahili_port_pate_desc$"
 building_swahili_port_lamu: "Portos Comerciais de Lamu"
 building_swahili_port_lamu_desc: "As areias brancas e quentes de suas praias e o azul vibrante das águas que banham preguiçosamente suas margens desmentem o comércio agitado que serve como a força vital de Lamu. Há muito conectada ao comércio através do oceano, mercadorias das extremidades ocidental e oriental do mundo conhecido podem ser compradas e vendidas aqui."
 building_type_swahili_port_lamu: "$building_swahili_port_lamu$"
 building_type_swahili_port_lamu_desc: "$building_swahili_port_lamu_desc$"
 building_type_dragon_kiln_01: "Forno-Dragão"
 building_type_dragon_kiln_01_desc: "Construído na encosta de uma ladeira íngreme, este complexo de fornos pode produzir as chamas de temperatura extremamente alta necessárias para fabricar cerâmicas exóticas altamente valorizadas como bens comerciais e presentes."
 building_dragon_kiln_01: "Forno Ascendente"
 building_dragon_kiln_01_desc: "Este longo forno puxa horizontalmente a corrente de ar do fogo, produzindo o calor intenso de que os oleiros necessitam para criar tigelas, vasos e outras cerâmicas valiosas."
 building_dragon_kiln_02: "Forno Saggar"
 building_dragon_kiln_02_desc: "A produção de cerâmica pode ser facilitada com o uso de saggars, recipientes simples que ajudam a proteger a cerâmica em queima de impurezas e danos como fumaça, cinzas e detritos da produção em escala industrial."
 building_dragon_kiln_03: "Forno Compartimentado"
 building_dragon_kiln_03_desc: "Confinar o fogo principal do forno em uma série de compartimentos regula a temperatura do fogo e também torna muito mais fácil para os trabalhadores carregar e descarregar as peças, criando produtos de maior qualidade em maior escala, pelos quais mais pessoas estão dispostas a pagar preços mais altos."
 dragon_kiln_terrain_requirement_tt: "O [terrain|lE] não é #V $terrain_mountains$#!, #V $terrain_desert_mountains$#! ou #V $terrain_hills$#!"
 dragon_kiln_quarry_requirement_tt: "Requer [GetBuilding('quarries_01').GetName|l] ou superior"
 TERRAIN_NOT_FARMLANDS: "O terreno não é $farmlands$"
 building_type_burkhan_khaldun_01: "Burkhan Khaldun"
 building_type_burkhan_khaldun_01_desc: "Burkhan Khaldun é a mais imponente das Montanhas Khentii.\nDiz-se que é o berço de muitos heróis mongóis; suas encostas são cobertas por ovoos, e muitos sacrifícios são feitos na esperança de obter seu favor."
 building_burkhan_khaldun_01: "$building_type_burkhan_khaldun_01$"
 building_burkhan_khaldun_01_desc: "$building_type_burkhan_khaldun_01_desc$"
 building_pleasure_dome: "Cúpula dos Prazeres"
 building_pleasure_dome_desc: "Um palácio mongol, servindo ao mesmo tempo como centro militar e cultural. Sua glória máxima se ergue na forma de uma fonte em formato de árvore de prata, de onde diferentes tipos de vinho fluem das serpentes que se enroscam na estátua."
 building_type_pleasure_dome: "$building_pleasure_dome$"
 building_type_pleasure_dome_desc: "$building_pleasure_dome_desc$"
 building_type_murex_farm_01: "Pesqueiros de Múrex"
 building_type_murex_farm_01_desc: "A púrpura imperial está sempre em alta demanda. Os caracóis dos quais esse luxuoso corante é feito são colhidos e processados aqui."
 building_murex_farm_01: "Coletores de Múrex"
 building_murex_farm_01_desc: "Uma próspera indústria pesqueira de múrex foi estabelecida ao longo da costa do Mediterrâneo. Ela fornece uma renda modesta, porém constante, por meio da venda dos caracóis coletados."
 building_murex_farm_02: "Centro de Processamento de Múrex"
 building_murex_farm_02_desc: "Este centro processa os caracóis múrex com eficiência, aprimorando a extração de suas valiosas secreções. O resultado é uma qualidade superior do cobiçado corante púrpura."
 building_murex_farm_03: "Destilaria de Corante"
 building_murex_farm_03_desc: "A destilaria especializada refina as secreções de múrex em um potente corante púrpura. Sua operação aumenta significativamente a vivacidade e o valor do corante."
 building_murex_farm_04: "Pátios de Secagem"
 building_murex_farm_04_desc: "Um pátio a céu aberto acelera o processo de oxidação do corante. Isso reduz o tempo de produção do corante púrpura, garantindo um fluxo de trabalho mais eficiente."
 building_murex_farm_05: "Guilda dos Mestres Tintureiros"
 building_murex_farm_05_desc: "A Guilda dos Mestres Tintureiros, renomada por alcançar o tom perfeito de púrpura tíria, aprimora a precisão do tingimento de tecidos. Isso resulta em vestimentas púrpuras de qualidade consistentemente elevada."
 building_murex_farm_06: "Ateliê de Tecelagem de Seda"
 building_murex_farm_06_desc: "Esta oficina é especializada em tecer tecidos luxuosos, como seda, para tingimento. Ela possibilita a produção de vestimentas de qualidade excepcional, aumentando seu valor comercial."
 building_murex_farm_07: "Oficina Têxtil Imperial"
 building_murex_farm_07_desc: "A oficina imperial se concentra na produção em massa de tecidos tingidos com púrpura tíria, aumentando significativamente a renda proveniente da venda dessas prestigiosas vestimentas."
 building_murex_farm_08: "Palácio Real da Púrpura"
 building_murex_farm_08_desc: "Um magnífico palácio adornado com decorações temáticas de púrpura tíria se ergue como símbolo de riqueza e poder. Ele exibe o domínio local na produção da púrpura tíria."
 building_type_generic_copper_mines_01: "Minas de Cobre"
 building_type_generic_copper_mines_01_desc: "Uma importante mina de cobre, fornecendo minério de cobre incrivelmente lucrativo a quem tiver a sorte de possuí-la."
 building_generic_copper_mines_01: "Assentamento de Mineração de Cobre"
 building_generic_copper_mines_01_desc: "$building_rammelsberg_mines_01_desc$"
 building_generic_copper_mines_02: "Mina de Cobre"
 building_generic_copper_mines_02_desc: "$building_rammelsberg_mines_02_desc$"
 building_generic_copper_mines_03: "Grande Mina de Cobre"
 building_generic_copper_mines_03_desc: "$building_rammelsberg_mines_03_desc$"
 building_generic_copper_mines_04: "Complexo de Mineração de Cobre"
 building_generic_copper_mines_04_desc: "$building_rammelsberg_mines_04_desc$"
 building_type_generic_silver_mines_01: "Minas de Prata"
 building_type_generic_silver_mines_01_desc: "Uma rica mina de prata, fornecendo um fluxo constante de prata valiosa."
 building_generic_silver_mines_01: "Assentamento de Mineração de Prata"
 building_generic_silver_mines_01_desc: "$building_rammelsberg_mines_01_desc$"
 building_generic_silver_mines_02: "Mina de Prata"
 building_generic_silver_mines_02_desc: "$building_rammelsberg_mines_02_desc$"
 building_generic_silver_mines_03: "Mina de Cobre e Prata"
 building_generic_silver_mines_03_desc: "$building_rammelsberg_mines_03_desc$"
 building_generic_silver_mines_04: "Complexo de Mineração de Prata"
 building_generic_silver_mines_04_desc: "$building_rammelsberg_mines_04_desc$"
 building_type_generic_gold_mines_01: "Minas de Ouro"
 building_type_generic_gold_mines_01_desc: "Uma mina de ouro incrivelmente valiosa e rara, altamente cobiçada por todo nobre da região."
 building_generic_gold_mines_01: "Assentamento de Mineração de Ouro"
 building_generic_gold_mines_01_desc: "$building_rammelsberg_mines_01_desc$"
 building_generic_gold_mines_02: "Mina de Ouro"
 building_generic_gold_mines_02_desc: "$building_rammelsberg_mines_02_desc$"
 building_generic_gold_mines_03: "Mina de Ouro e Cobre"
 building_generic_gold_mines_03_desc: "$building_rammelsberg_mines_03_desc$"
 building_generic_gold_mines_04: "Complexo de Mineração de Ouro"
 building_generic_gold_mines_04_desc: "$building_rammelsberg_mines_04_desc$"
 building_type_capital_bureau_01: "Magistratura da capital"
 building_type_capital_bureau_01_desc: "Um ramo dedicado do governo, que dedica todos os seus recursos à administração da capital. Uma multidão de escrivães e servidores reside dentro destas paredes, pronta para servir sob o comando do eparca."
 building_capital_bureau_01: "Tribunal"
 building_capital_bureau_01_desc: "A lei é o que faz uma cidade prosperar e florescer, e a lei só pode ser mantida no tribunal."
 building_capital_bureau_02: "Escritório de Segurança"
 building_capital_bureau_02_desc: "Este escritório emprega uma grande força policial, que mantém a cidade segura contra criminosos e captura transgressores da lei."
 building_capital_bureau_03: "Quartel-General dos Bombeiros"
 building_capital_bureau_03_desc: "Incêndios são uma ameaça constante que paira sobre qualquer área densamente povoada. Uma brigada de incêndio bem treinada apagará um fogo antes que ele se espalhe."
 building_capital_bureau_04: "Administração das Guildas"
 building_capital_bureau_04_desc: "Nomear oficiais como supervisores das muitas guildas dentro da cidade garantirá que cada guilda seja eficiente, mantenha a qualidade e siga todos os procedimentos necessários."
 building_capital_bureau_05: "Departamento Judicial"
 building_capital_bureau_05_desc: "Um departamento ampliado para assuntos judiciais é uma necessidade em uma cidade grande e em crescimento. Um exército de oficiais, escrivães e juízes trabalha sem descanso para impor lei e ordem."
 building_capital_bureau_06: "Cadeia da Cidade"
 building_capital_bureau_06_desc: "Embora possa haver várias pequenas prisões espalhadas pela cidade, uma cadeia maior garantirá que qualquer um que infrinja a lei tenha uma cela esperando por ele."
 building_capital_bureau_07: "Colégio do Comércio"
 building_capital_bureau_07_desc: "O comércio é um negócio lucrativo demais para não ser melhor regulado pela lei. Ao supervisionar pedágios e bens que entram na cidade, podemos administrar as provisões da capital com muito mais eficiência, e talvez até ganhar algum ouro adicional."
 building_capital_bureau_08: "Palácio Urbano"
 building_capital_bureau_08_desc: "Uma residência grande e majestosa, espetacular o bastante para envergonhar a maioria dos palácios, garante que o administrador-chefe possa estar próximo e disponível em todos os momentos. Pois, embora uma cidade nunca realmente durma, seu administrador certamente dorme."
 capital_bureau_custom_effect_desc: "#low Desbloquea:#!\nAumenta a [aptitude|lE] do [court_position|lE] [GetCourtPositionType('eparch_court_position').GetName()|l]"
 building_type_breweries_01: "Cervejarias"
 building_type_breweries_01_desc: "Este edifício é dedicado à fabricação, fermentação e armazenamento de vários tipos de ale, cerveja e outras bebidas fermentadas. Ele desempenha um papel crucial na cultura e na economia locais."
 building_breweries_01: "Casa de Brassagem"
 building_breweries_01_desc: "O coração de qualquer cervejaria, onde o processo de fabricação começa. Aqui, os ingredientes são misturados, fervidos e preparados para a fermentação."
 building_breweries_02: "Adega de Armazenamento"
 building_breweries_02_desc: "Um lugar fresco e escuro onde as bebidas fabricadas são armazenadas para envelhecer, garantindo que desenvolvam os sabores e qualidades desejados."
 building_breweries_03: "Cubas de Brassagem"
 building_breweries_03_desc: "Grandes recipientes onde o mosto é fervido e ervas ou lúpulo são adicionados, uma etapa crítica no processo de fabricação para conferir amargor e aroma."
 building_breweries_04: "Celeiro de Grãos"
 building_breweries_04_desc: "Um celeiro para manter grandes quantidades de grãos secos e protegidos de pragas, assegurando um fornecimento constante de ingredientes para a fabricação."
 building_breweries_05: "Casa do Poço"
 building_breweries_05_desc: "Um poço construído para garantir uma fonte limpa e confiável de água, essencial para bebidas de alta qualidade."
 building_breweries_06: "Sala de Barris"
 building_breweries_06_desc: "Uma área onde a bebida fermentada é cuidadosamente armazenada em barris, devidamente selada e pronta para distribuição."
 building_breweries_07: "Sala de Envasamento em Barris"
 building_breweries_07_desc: "Um espaço dedicado ao enchimento de barris. Eles são frequentemente usados para quantidades maiores e são preferidos por estalagens e tavernas."
 building_breweries_08: "Salão de Degustação"
 building_breweries_08_desc: "Um salão onde cervejeiros e convidados podem provar as diferentes bebidas, oferecendo uma oportunidade de apreciar as produções mais recentes."
 brewery_effect_desc: "#low Desbloqueia:#!\n[court_position|E]: [GetCourtPositionType('court_brewmaster_court_position').GetName()|l]"
 #ACH
 building_type_oath_warriors_building_01: "Concessões Marciais"
 building_type_oath_warriors_building_01_desc: "O soberano destas terras jurou, em seu juramento de coroação, prover para os guerreiros."
 building_oath_warriors_building_01: "Pequenas Propriedades de Veteranos"
 building_oath_warriors_building_01_desc: "Combatentes aristocráticos de longa carreira receberam generosos lotes locais, e o interesse em servir com lealdade aumentou aqui em consequência."
 building_oath_warriors_building_02: "Propriedades Marciais"
 building_oath_warriors_building_02_desc: "Aqueles da classe aristocrática guerreira que não morrem no campo de batalha vivem com conforto, com suas propriedades concedidas lhes permitindo recrutar e se armar amplamente."
 building_oath_warriors_building_03: "Feudos de Vilarejo"
 building_oath_warriors_building_03_desc: "Muitos vilarejos locais são entregues a oficiais cavaleirescos como propriedades pessoais, permitindo-lhes acumular força e riqueza às custas das outras classes."
 building_oath_warriors_building_04: "Vastas Propriedades Marciais"
 building_oath_warriors_building_04_desc: "Uma parcela considerável dos impostos locais é entregue a aristocratas guerreiros menores, detentores de títulos de campos e assentamentos. Seus poderosos séquitos, contudo, continuam servindo."
 building_type_oath_faithful_building_01: "Monumentos Religiosos"
 building_type_oath_faithful_building_01_desc: "O soberano destas terras jurou, em seu juramento de coroação, prover para os fiéis."
 building_oath_faithful_building_01: "Santuários à Beira da Estrada"
 building_oath_faithful_building_01_desc: "Pequenos abrigos à beira das estradas guardam simples ícones sagrados."
 building_oath_faithful_building_02: "Portões Sagrados"
 building_oath_faithful_building_02_desc: "Sobre as entradas e por todo este assentamento, detalhadas obras de arte religiosas inspiram reverência e prometem passagem segura."
 building_oath_faithful_building_03: "Santuários de Templo"
 building_oath_faithful_building_03_desc: "Os complexos de templos locais foram ampliados com jardins abobadados, lugares serenos que abrigam poços de água doce."
 building_oath_faithful_building_04: "Praças Monumentais"
 building_oath_faithful_building_04_desc: "Grande investimento foi destinado a praças centrais maciças, abundantes em arte religiosa, mantidas livres de excesso de lixo e usura, e que fornecem água aos moradores."
 building_type_oath_poor_building_01: "Albergues Oficiais"
 building_type_oath_poor_building_01_desc: "O soberano destas terras jurou, em seu juramento de coroação, prover para os pobres."
 building_oath_poor_building_01: "Costumes Caridosos"
 building_oath_poor_building_01_desc: "Pessoas abastadas são incentivadas pelas autoridades a dar comida excedente e riqueza aos menos afortunados, tipicamente durante dias santos."
 building_oath_poor_building_02: "Casas para Pobres"
 building_oath_poor_building_02_desc: "Os muito pobres, viúvas e idosos recebem hospedagem modesta e algum cuidado em acomodações simples."
 building_oath_poor_building_03: "Ministérios Benevolentes"
 building_oath_poor_building_03_desc: "Albergues e outras necessidades cívicas que servem aos miseráveis são bem atendidos por ministros oficiais com alguns recursos."
 building_oath_poor_building_04: "Instituições de Caridade"
 building_oath_poor_building_04_desc: "Por toda a terra, os necessitados nada têm a desejar. Acomodações generosas abrigam possíveis vagabundos, hospitais cuidam dos doentes e idosos, e generosos auxílios são concedidos aos camponeses pobres."
