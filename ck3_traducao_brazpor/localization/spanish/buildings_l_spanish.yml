 building_type_zijinshan_mines_01_desc: "Embora inicialmente um tanto remotas e indomadas, estas montanhas abrigam imensas riquezas na forma de ouro e cobre. Com a orientação adequada, a pequena mineração local pode ser transformada em uma grande fonte de metais preciosos."
