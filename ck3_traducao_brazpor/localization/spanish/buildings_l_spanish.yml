 building_type_itoigawa_mines_01: "Minas de Jade de Itoigawa"
 building_type_itoigawa_mines_01_desc: "O rio Kotakigawa percorre o desfiladeiro na base do Monte Myojo e é rico em grandes depósitos de jade. Esses depósitos produzem alguns dos jades mais requintados da região e de além, encantando os olhos com sua vibrante cor verde."
 building_itoigawa_mines_01: "Assentamento de Mineração de Itoigawa"
