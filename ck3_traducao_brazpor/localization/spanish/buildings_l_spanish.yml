 building_type_xiuyan_mines_01: "Minas de Jade de Xiuyan"
 building_type_xiuyan_mines_01_desc: "Esta antiga pedreira abastece sua comunidade com jade de alta qualidade há vários milênios. O povo Hongshan descobriu e apreciou todo tipo de artesanato a partir dela, como braceletes, ferramentas e artefatos simbólicos, enriquecendo os usos sociais e a reputação familiar."
 building_xiuyan_mines_01: "Assentamento de Mineração de Xiuyan"
