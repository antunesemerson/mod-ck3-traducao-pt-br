 building_type_taghaza_mines_01: "As Salinas de Taghaza"
 building_type_taghaza_mines_01_desc: "As Minas de Sal de Taghaza são o ponto de origem da maior parte do sal do Magrebe e da África Ocidental."
 building_taghaza_mines_01: "Poços de Mineração de Taghaza"
 building_taghaza_mines_01_desc: "$building_type_taghaza_mines_01_desc$"
 building_taghaza_mines_02: "Mina de Taghaza"
 building_taghaza_mines_02_desc: "À medida que o assentamento cresce, cada vez mais sal é extraído. O influxo de engenheiros competentes permite a construção de uma mina de verdade."
 building_taghaza_mines_03: "Grande Mina de Taghaza"
 building_taghaza_mines_03_desc: "À medida que as operações de mineração crescem, as próprias minas também crescem. Mais entradas são construídas, e grandes poços são escavados para permitir a extração de mais sal."
 building_taghaza_mines_04: "Complexo de Mineração de Taghaza"
 building_taghaza_mines_04_desc: "À medida que a produção de sal aumenta, ela passa a atrair mercadores e artesãos de todo o mundo."
 building_type_ijil_mines_01: "Minas de Sal de Ijil"
 building_type_ijil_mines_01_desc: "Ijil é uma das minas de sal mais antigas da África e, em muitos aspectos, um dos primeiros entrepostos da rede de comércio transaariana."
