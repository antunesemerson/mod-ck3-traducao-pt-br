 building_type_holy_site_imam_ali_mosque_01: "Mesquita do Imam Ali"
 building_type_holy_site_imam_ali_mosque_01_desc: "A Mesquita do Imam Ali abriga o túmulo de Ali, primo de Maomé e o primeiro Imã xiita após ele. Milhares de peregrinos vêm prestar homenagem todos os anos, recebidos pela magnífica cúpula verde da mesquita."
 building_holy_site_imam_ali_mosque_01: "$building_type_holy_site_imam_ali_mosque_01$"
 building_holy_site_imam_ali_mosque_01_desc: "$building_type_holy_site_imam_ali_mosque_01_desc$"
 building_type_holy_site_great_mosque_of_mecca_01: "Grande Mesquita de Meca"
 building_type_holy_site_great_mosque_of_mecca_01_desc: "A Grande Mesquita de Meca é uma estrutura antiga e imensa, cujas muralhas cercam a sagrada Caaba. Muitos grandes sultões expandiram a mesquita e seus arredores desde sua construção. Todo muçulmano deve visitar este lugar durante o Haje."
 building_holy_site_great_mosque_of_mecca_01: "$building_type_holy_site_great_mosque_of_mecca_01$"
 building_holy_site_great_mosque_of_mecca_01_desc: "$building_type_holy_site_great_mosque_of_mecca_01_desc$"
 building_type_holy_site_cologne_cathedral_01: "Catedral de Colônia"
 building_type_holy_site_cologne_cathedral_01_desc: "A Catedral de Colônia abriga as relíquias dos Três Reis, que atraem a atenção de peregrinos de todo o mundo cristão. A catedral é construída em arquitetura gótica e é ricamente adornada com pináculos e detalhes intrincados."
 building_holy_site_cologne_cathedral_01: "$building_type_holy_site_cologne_cathedral_01$"
 building_holy_site_cologne_cathedral_01_desc: "$building_type_holy_site_cologne_cathedral_01_desc$"
 building_type_holy_site_canterbury_cathedral_01: "$building_type_holy_site_canterbury_cathedral_03$"
 building_type_holy_site_canterbury_cathedral_01_desc: "Agostinho, missionário romano e depois arcebispo, construiu a Catedral de Cantuária após escolher a cidade como seu centro para a sé episcopal em Kent. Esta nova catedral reviveu a importância da cidade, concedendo-lhe autoridade sobre a igreja inglesa."
 building_holy_site_canterbury_cathedral_01: "Basílica de Canterbury"
 building_holy_site_canterbury_cathedral_01_desc: "$building_type_holy_site_canterbury_cathedral_01_desc$"
 building_type_holy_site_canterbury_cathedral_02: "$building_type_holy_site_canterbury_cathedral_03$"
 building_type_holy_site_canterbury_cathedral_02_desc: "O estilo normando foi escolhido para reparar os danos causados por um incêndio. A nova nave cruciforme substituiu a basílica anterior, e um campanário independente foi adicionado mais tarde."
 building_holy_site_canterbury_cathedral_02: "Templo de Cantuária"
 building_holy_site_canterbury_cathedral_02_desc: "$building_type_holy_site_canterbury_cathedral_02_desc$"
 building_type_holy_site_canterbury_cathedral_03: "Catedral de Cantuária"
 building_type_holy_site_canterbury_cathedral_03_desc: "Os graves danos sofridos pela catedral exigiram um novo projeto de reconstrução. Embora a estrutura normanda tenha sido mantida em certas partes, o florescente estilo gótico foi escolhido para elevar a construção."
 building_holy_site_canterbury_cathedral_03: "$building_type_holy_site_canterbury_cathedral_02$"
 building_holy_site_canterbury_cathedral_03_desc: "$building_type_holy_site_canterbury_cathedral_02_desc$"
 building_type_doges_palace_01: "Palácio do Doge"
 building_type_doges_palace_01_desc: "O Palácio do Doge serve como residência do governo da República de Veneza. Uma estrutura impressionante, abriga múltiplas câmaras dedicadas a coisas como o Conselho, o Senado, a administração e a justiça."
 building_doges_palace_01: "$building_type_doges_palace_01$"
 building_doges_palace_01_desc: "$building_type_doges_palace_01_desc$"
 building_type_visby_ringmur_01: "Muralha de Visby"
 building_type_visby_ringmur_01_desc: "A Muralha da Cidade de Visby protege a cidade contra ameaças externas, como invasores ou dinamarqueses. Ela também mantém de fora, com eficiência, os cobradores de impostos enviados pelo Thing de Gotland! Para chegar às riquezas do interior, os atacantes primeiro precisam lidar com uma profusão de torres, todas guarnecidas por arqueiros."
 building_visby_ringmur_01: "$building_type_visby_ringmur_01$"
 building_visby_ringmur_01_desc: "$building_type_visby_ringmur_01_desc$"
 building_type_walls_of_benin_01: "Muralhas de Benin"
 building_type_walls_of_benin_01_desc: "As Muralhas de Benin são uma enorme série de terraplenos #low (Iya no idioma Edo)#!, que circundam toda Benin. As muralhas são construídas em uma estrutura de vala e dique, com um fosso interno e um talude externo."
 building_walls_of_benin_01: "$building_type_walls_of_benin_01$"
 building_walls_of_benin_01_desc: "$building_type_walls_of_benin_01_desc$"
 building_type_the_friday_mosque_01: "Mesquita de Sexta-feira"
 building_type_the_friday_mosque_01_desc: "A Mesquita de Sexta-feira, ou Mesquita Jameh de Isfahan, foi construída durante a dinastia Omíada. Diz-se que o Califa pessoalmente fez um dos pilares da mesquita. Antes de se tornar uma mesquita, diz-se que o local era uma casa de culto zoroastrista."
 building_the_friday_mosque_01: "$building_type_the_friday_mosque_01$"
 building_the_friday_mosque_01_desc: "$building_type_the_friday_mosque_01_desc$"
 building_type_brihadeeswarar_temple_01: "Templo de Brihadeeswarar"
 building_type_brihadeeswarar_temple_01_desc: "O Templo de Brihadeeswarar é dedicado à divindade hindu Shiva e é um dos maiores templos do sul da Índia construídos no ornamentado estilo arquitetônico dravídico. O nome do templo é uma palavra composta em sânscrito que pode ser traduzida aproximadamente como \"\"Templo do Grande Senhor Shiva.\""
 building_brihadeeswarar_temple_01: "$building_type_brihadeeswarar_temple_01$"
 building_brihadeeswarar_temple_01_desc: "$building_type_brihadeeswarar_temple_01_desc$"
 building_type_holy_site_mahabodhi_temple_01: "Templo Mahabodhi"
 building_type_holy_site_mahabodhi_temple_01_desc: "O Templo Mahabodhi marca o local onde se diz que o Buda alcançou a iluminação. O local é um destino significativo de peregrinação tanto para budistas quanto para hindus. A construção do templo começou por volta do ano 200 sob o imperador Ashoka, e desde então foi aprimorada e restaurada diversas vezes."
 building_holy_site_mahabodhi_temple_01: "$building_type_holy_site_mahabodhi_temple_01$"
 building_holy_site_mahabodhi_temple_01_desc: "$building_type_holy_site_mahabodhi_temple_01_desc$"
 building_type_holy_site_great_mosque_of_cordoba_01: "A Grande Mesquita de Córdoba"
 building_type_holy_site_great_mosque_of_cordoba_01_desc: "A Grande Mesquita de Córdoba foi erguida após a Conquista Islâmica do Reino Visigótico, sobre a fundação de uma igreja cristã. Originalmente, o local era compartilhado, com muçulmanos e cristãos utilizando-o, mas a metade cristã acabou sendo comprada e demolida para dar lugar à Grande Mesquita."
 building_holy_site_great_mosque_of_cordoba_01: "$building_type_holy_site_great_mosque_of_cordoba_01$"
 building_holy_site_great_mosque_of_cordoba_01_desc: "$building_type_holy_site_great_mosque_of_cordoba_01_desc$"
 building_type_walls_of_genoa_01: "Muralhas de Gênova"
 building_type_walls_of_genoa_01_desc: "As Muralhas de Gênova foram construídas no século IX, depois que a cidade recebeu uma autonomia significativa. As muralhas, juntamente com a proteção da costa, permitem que a área se desenvolva e prospere."
 building_walls_of_genoa_01: "$building_type_walls_of_genoa_01$"
 building_walls_of_genoa_01_desc: "$building_type_walls_of_genoa_01_desc$"
 building_type_holy_site_great_mosque_of_djenne_01: "Grande Mesquita de Djenné"
 building_type_holy_site_great_mosque_of_djenne_01_desc: "A Grande Mesquita de Djenné ergue-se na margem do rio Bani. Construída inteiramente de tijolo de adobe, ela exige muitos cuidados, que os fiéis estão mais do que dispostos a oferecer. Todos os anos, grandes multidões se reúnem para reparar e aprimorar a mesquita."
 building_holy_site_great_mosque_of_djenne_01: "$building_type_holy_site_great_mosque_of_djenne_01$"
 building_holy_site_great_mosque_of_djenne_01_desc: "$building_type_holy_site_great_mosque_of_djenne_01_desc$"
 building_type_holy_site_great_mosque_of_samarra_01: "Grande Mesquita de Samarra"
 building_type_holy_site_great_mosque_of_samarra_01_desc: "A Grande Mesquita de Samarra foi concluída em 851 d.C. pelo califa abássida Al-Mutawakkil, que reinou em Samarra. Sua característica mais proeminente é a Torre Malwiya, um magnífico minarete em espiral, que se ergue aos céus com uma altura impressionante."
 building_holy_site_great_mosque_of_samarra_01: "$building_type_holy_site_great_mosque_of_samarra_01$"
 building_holy_site_great_mosque_of_samarra_01_desc: "$building_type_holy_site_great_mosque_of_samarra_01_desc$"
 building_type_holy_site_prophetic_mosque_01: "A Mesquita do Profeta"
 building_type_holy_site_prophetic_mosque_01_desc: "A Mesquita do Profeta, ou Al-Masjid an-Nabawi, é uma mesquita de estilo a céu aberto estabelecida pelo próprio profeta Muhammad. Foi uma das primeiras mesquitas que ele construiu, e o local ficava próximo de onde ele tinha sua residência."
 building_holy_site_prophetic_mosque_01: "$building_type_holy_site_prophetic_mosque_01$"
 building_holy_site_prophetic_mosque_01_desc: "$building_type_holy_site_prophetic_mosque_01_desc$"
 building_type_generic_university: "Universidade"
 building_type_generic_university_desc: "Uma universidade é um local de ensino superior, reservado àqueles de boa posição e riqueza que são considerados suficientemente dignos. Ela atrai estudiosos e cientistas que debatem, estudam, escrevem e, por fim, reúnem seu conhecimento dentro de seus muros."
