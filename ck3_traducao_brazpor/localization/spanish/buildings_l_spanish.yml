 building_type_rammelsberg_mines_01: "As Minas de Rammelsberg"
 building_type_rammelsberg_mines_01_desc: "Ao pé do Monte Rammelsberg jaz uma mina de prata lucrativa e muito cobiçada."
 building_rammelsberg_mines_01: "Assentamento de Mineração de Rammelsberg"
 building_rammelsberg_mines_01_desc: "Um pequeno assentamento de mineração surgiu perto de onde estão os veios de minério. Os colonos começaram a abrir os veios e extrair o minério, mas até agora mal arranharam a superfície."
 building_rammelsberg_mines_02: "Mina de Rammelsberg"
 building_rammelsberg_mines_02_desc: "À medida que o assentamento cresce, cada vez mais minério é extraído. O influxo de engenheiros competentes permite a construção de uma mina de verdade."
 building_rammelsberg_mines_03: "Grande Mina de Rammelsberg"
 building_rammelsberg_mines_03_desc: "À medida que as operações de mineração crescem, as próprias minas também crescem. Mais entradas são construídas, e grandes poços são escavados para permitir a extração de minério em profundidade."
 building_rammelsberg_mines_04: "Complexo de Mineração de Rammelsberg"
 building_rammelsberg_mines_04_desc: "À medida que a produção de minério aumenta, várias fundições e fornalhas de fusão são instaladas ao redor do assentamento. O processamento do metal tornou-se algo natural para os habitantes, e sua habilidade é reconhecida em todo o mundo conhecido."
