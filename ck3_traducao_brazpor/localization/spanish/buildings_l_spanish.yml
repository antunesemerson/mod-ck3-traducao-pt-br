 building_type_lantian_mines_01: "Minas de Jade de Lantian"
 building_type_lantian_mines_01_desc: "As colinas de Lantian são uma fonte de jade de alta qualidade há milhares de anos. Esta pedra pálida, historicamente talhada em selos imperiais e celebrada por poetas Tang, é valorizada não por sua abundância, mas por sua beleza distinta e status."
