 building_type_nalanda_university: "Universidade Nalanda"
 building_type_nalanda_university_desc: "$building_type_generic_university_desc$\n\nA Universidade Nalanda é um importante centro de estudos védicos e atrai estudantes de lugares tão distantes quanto o Tibete e a China."
