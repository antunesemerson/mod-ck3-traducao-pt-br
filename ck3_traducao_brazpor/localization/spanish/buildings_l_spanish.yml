 building_type_turda_mines_01: "Minas de Sal de Torda"
 building_type_turda_mines_01_desc: "Os enormes maciços de sal de Torda têm sido centrais para a economia da Transilvânia por séculos. As minas e o mercado de sal continuam sendo uma grande fonte de renda para a região."
