 building_type_mogok_mines_01: "As Minas do Vale de Mogok"
 building_type_mogok_mines_01_desc: "O Vale de Mogok é famoso por seus rubis e safiras, bem como por pedras menos valiosas, como espinélio ou granada.\nO que faz o 'vale dos rubis' se destacar ainda mais do que a quantidade é a qualidade das pedras. À medida que as pedras de vermelho profundo são escavadas da terra, elas cintilam sob o sol escaldante de um jeito que não encontra igual em nenhum outro lugar."
