 building_type_ratnapura_mines_01: "As Minas de Ratnapura"
 building_type_ratnapura_mines_01_desc: "Ratnapura, a cidade das gemas, é uma das fontes mais significativas do mundo de rubis e safiras. Há centenas de anos essas riquezas são extraídas e comercializadas com mercadores do subcontinente indiano, do Sudeste Asiático e da China."
