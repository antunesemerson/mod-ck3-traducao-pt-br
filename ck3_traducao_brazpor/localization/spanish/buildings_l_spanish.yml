 building_type_castle_01: "Castelo"
 building_type_castle_01_desc: "Uma fortaleza projetada não apenas para abrigar uma família nobre respeitável, mas também para proteger a cidade e as terras agrícolas ao redor."
 building_castle_01: "Motta"
 building_castle_01_desc: "Esta fortificação pequena, porém formidável, está situada sobre um aterro elevado."
 building_castle_02: "Torre de Menagem"
 building_castle_02_desc: "A Torre de Menagem #weak (ou Donjon)#! é uma grande torre que serve como residência fortificada e última linha de defesa."
 building_castle_03: "Castelo Concêntrico"
 building_castle_03_desc: "O Castelo Concêntrico é cercado por duas ou mais muralhas, sendo a interna mais alta que a externa."
 building_castle_04: "Fortaleza"
 building_castle_04_desc: "A Fortaleza é o auge da defesa, capaz tanto de repelir assaltos inimigos quanto de abrigar uma grande força militar."
 building_type_temple_01: "Templo"
 building_type_temple_01_desc: "Um local de culto governado pelo clero, cercado por uma vila de camponeses fiéis."
 building_temple_01: "Santuário"
 building_temple_01_desc: "$building_type_temple_01_desc$"
 building_temple_02: "Terrenos do Templo"
 building_temple_02_desc: "Um templo ergue-se no centro da vila, cuidadosamente construído por artesãos locais para demonstrar sua devoção à fé."
 building_temple_03: "Casa de Adoração"
 building_temple_03_desc: "Embora o templo possa receber muitos fiéis, esse não é seu único propósito — ele também precisa abrigar o clero, sustentar uma grande biblioteca e proteger relíquias. Com a adição da casa de adoração, sempre há bastante espaço para os fiéis rezarem."
 building_temple_04: "Grande Templo"
 building_temple_04_desc: "Não satisfeitos com um templo pequeno e modesto, artesãos e arquitetos locais trabalharam juntos para criar uma verdadeira obra de arte. Este grande templo aparentemente invoca o próprio poder dos céus sobre qualquer fiel que entre em seus gloriosos salões."
 building_type_city_01: "Cidade"
 building_type_city_01_desc: "Uma cidade populosa que abriga um grande número de burgueses, mercadores e trabalhadores urbanos."
 building_city_01: "Centro da Vila"
 building_city_01_desc: "$building_type_city_01_desc$"
 building_city_02: "Grande Cidade"
 building_city_02_desc: "Esta cidade atraiu a atenção de comerciantes e artesãos de toda parte, com mercadores ricos abrindo lojas e artesãos diligentes erguendo novas casas quase diariamente."
 building_city_03: "Centro da Cidade"
 building_city_03_desc: "Não mais satisfeita em apenas ocupar sua área original, a cidade agora incorpora as terras agrícolas próximas ao seu centro próspero. A cidade é vasta e repleta de riqueza e oportunidade."
 building_city_04: "Metrópole Agitada"
 building_city_04_desc: "Esta cidade é conhecida por toda parte pelas abundantes oportunidades que existem nela — dizem que até o mais humilde dos camponeses pode encontrar fortuna aqui. Casas se alinham pelas ruas até onde a vista alcança, com carroças e animais ocupados transportando mercadorias por toda parte."
 building_type_temple_citadel_01: "Cidadela do Templo"
 building_type_temple_citadel_01_desc: "Um lugar de iguais partes culto e proteção, cercado por muralhas maciças ao redor destes terrenos sagrados."
 building_temple_citadel_01: "Torre de Menagem do Templo"
 building_temple_citadel_01_desc: "$building_type_temple_citadel_01_desc$"
 building_temple_citadel_02: "Mosteiro Murado"
 building_temple_citadel_02_desc: "A Cidadela aumentou sua capacidade e organização, abrigando os fiéis locais e também fornecendo acomodações militares adequadas para responder a qualquer ataque."
 building_temple_citadel_03: "Complexo do Templo"
 building_temple_citadel_03_desc: "Edifícios adicionais foram providenciados para conforto e eficiência; este local de culto está preparado para a maioria das eventualidades. Seus habitantes são incumbidos de vigiar as muralhas, bem como rezar nos santuários locais."
 building_temple_citadel_04: "Fortaleza do Santuário"
 building_temple_citadel_04_desc: "Este santuário é bem protegido por torres de menagem, muralhas, trincheiras, postos militares e aparentemente também conta com proteção divina vinda do alto, fazendo com que seus habitantes e sua grande população de fiéis se sintam seguros."
 building_type_common_tradeport_01: "Porto Comercial"
 building_type_common_tradeport_01_desc: "Galés mercantes carregam e descarregam suas cargas neste porto."
 building_common_tradeport_01: "Pequeno Porto"
 building_common_tradeport_01_desc: "Um porto modesto fica na costa, permitindo que navios carreguem e descarreguem sua carga sem muito esforço."
 building_common_tradeport_02: "Tecelões de Redes de Pesca"
 building_common_tradeport_02_desc: "Uma oficina onde redes de pesca são tecidas foi instalada aqui. Dia após dia, redes são feitas e reparadas sem descanso."
 building_common_tradeport_03: "Porto Comercial"
 building_common_tradeport_03_desc: "O porto tornou-se um centro de comércio e viagem na região. Navios de toda a costa vêm aqui para negociar."
 building_common_tradeport_04: "Construtores Navais"
 building_common_tradeport_04_desc: "Habilidosos construtores navais reúnem-se neste porto para construir e reparar embarcações para o licitante que pagar mais."
 building_common_tradeport_05: "Docas Expandidas"
 building_common_tradeport_05_desc: "Docas mais numerosas e maiores sustentam um número cada vez maior de embarcações comerciais."
 building_common_tradeport_06: "Estaleiros"
 building_common_tradeport_06_desc: "O surgimento de edifícios dedicados à manutenção naval marca um passo importante na transformação de um porto simples em um movimentado centro de poder marítimo."
 building_common_tradeport_07: "Grande Porto"
 building_common_tradeport_07_desc: "Este grande porto oferece docas abundantes, estaleiros e os melhores marinheiros da região. Todas as mercadorias exigidas por viajantes de longa distância podem ser encontradas aqui, e mercadores, pescadores e o exército têm todo o apoio de que necessitam."
 building_common_tradeport_08: "Docas Secas"
 building_common_tradeport_08_desc: "Em docas secas, o navio é conduzido para uma passagem estreita, onde a água é bombeada para fora. O navio é então sustentado sobre blocos de pedra e pode ser reparado e mantido com maior facilidade."
 building_type_hall_of_heroes_01: "Salão dos Heróis"
 building_type_hall_of_heroes_01_desc: "Um grande salão onde guerreiros heroicos podem se reunir e organizar sua próxima aventura."
 building_hall_of_heroes_01: "Salão dos Heróis I"
 building_hall_of_heroes_01_desc: "$building_type_hall_of_heroes_01_desc$"
 building_hall_of_heroes_02: "Salão dos Heróis II"
 building_hall_of_heroes_02_desc: "$building_type_hall_of_heroes_01_desc$"
 building_hall_of_heroes_03: "Salão dos Heróis III"
