 building_type_fengtian_mines_01: "Minas de Jade de Fengtian"
 building_type_fengtian_mines_01_desc: "Aninhadas ao longo das alturas centrais da ilha, as Minas de Jade de Fengtian favorecem o comércio marítimo de pedras preciosas. Favorecido por autoridades, habitantes locais e mercadores de terras distantes, este jade verde luminoso ocupa um lugar especial na renda do condado."
