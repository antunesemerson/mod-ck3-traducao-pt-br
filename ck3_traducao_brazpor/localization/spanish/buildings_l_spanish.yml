 building_type_takkeda_mines_01: "As Minas de Takkeda"
 building_type_takkeda_mines_01_desc: "As montanhas Air têm ricos depósitos de cobre e são exploradas em Takkeda desde tempos pré-históricos."
 building_takkeda_mines_01: "Assentamento de Mineração de Takkeda"
