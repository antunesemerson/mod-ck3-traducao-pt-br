 building_type_zigong_mines_01: "Poços de Sal de Ziliujing & Gongjing"
 building_type_zigong_mines_01_desc: "Devido às suas vantagens únicas para a mineração de sal, esta área tem sido um ponto de extração de sal das profundezas da terra desde os tempos da dinastia Shang, há milhares de anos. Hoje, e no futuro previsível, continua sendo um fator importante na economia regional."
