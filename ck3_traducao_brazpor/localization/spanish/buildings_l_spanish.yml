 building_type_citadel_shrine_01: "Santuário da Cidadela"
 building_type_citadel_shrine_01_desc: "Uma $building_type_temple_citadel_01$ não está completa sem um lugar no qual cultuar seu panteão. Sejam cidadãos comuns ou forças da guarnição, a santidade que emana de dentro de suas muralhas acalmará qualquer alma inquieta."
 building_citadel_shrine_01: "Torre Prasada"
 building_citadel_shrine_01_desc: "A Prasada coroa a $building_type_temple_citadel_01$, desenhando uma silhueta régia à distância. Ela permite que seus fiéis admirem o Santuário de longe."
 building_citadel_shrine_02: "Espira Prang"
 building_citadel_shrine_02_desc: "Coberta por entalhes delicados, a Prang se ergue acima em cascatas estruturais, reforçando a impressão de altura oferecida. É um descanso agradável para os olhos enquanto as preces são proferidas, seja em palavras ditas ou em silêncio contemplativo."
 building_citadel_shrine_03: "Estatuária Divina"
 building_citadel_shrine_03_desc: "A coleção de estátuas encara perpetuamente o éter, ponderando a eternidade e muitas vezes evocando emoções complexas em seus adoradores."
 building_citadel_shrine_04: "Estátuas Singha"
 building_citadel_shrine_04_desc: "Dentes arreganhados e olhos fixos, estes ferozes leões guardiões oferecem sua bênção de proteção aos habitantes da $building_type_temple_citadel_01$."
 building_citadel_shrine_05: "Guardiões Nāga"
 building_citadel_shrine_05_desc: "Cuidadosamente esculpidas em arenito e com a mandala inscrita de forma intrincada em seu peito, estas serpentes de sete cabeças oferecem paz e prosperidade aos moradores do Santuário."
 building_citadel_shrine_06: "Baixos-Relevos"
 building_citadel_shrine_06_desc: "Os cidadãos frequentemente param para inspecionar os detalhes minuciosos destes baixos-relevos, pois eles retratam períodos dramáticos de batalha, mas também vários planos de divindade e mitos da criação."
 building_citadel_shrine_07: "Relicários"
 building_citadel_shrine_07_desc: "Um tesouro de várias estátuas e objetos religiosos e cerimoniais, esta $building_type_temple_citadel_01$ possui uma coleção maior do que qualquer outro lugar."
 building_citadel_shrine_08: "Imagem do Devaraja"
 building_citadel_shrine_08_desc: "O Ser Divino, congelado no tempo em uma pose majestosa, permite que seus adoradores rezem e prestem sua devida homenagem para receber suas bênçãos."
 building_type_sacred_pool_01: "Piscina Sagrada"
 building_type_sacred_pool_01_desc: "Um corpo d'água tão grande pode ter muitos propósitos; mas é claro que, à medida que o tempo passa e as estações mudam, os fenômenos visuais refletidos na piscina ocasionalmente se tornam verdadeiramente transcendentes. Fonte de fortificação e também de hidratação, essas piscinas são uma parte importante do dia a dia de seus habitantes."
 building_sacred_pool_01: "Lago de Lótus"
 building_sacred_pool_01_desc: "Um lago harmonioso, deslumbrando seus observadores com sua beleza e tranquilidade, e supostamente sendo o cenário para que ocorram importantes eventos espirituais."
 building_sacred_pool_02: "Reservatório Sagrado"
 building_sacred_pool_02_desc: "Aumentando em escala, este $building_sacred_pool_02$ também traz ocasionalmente vida selvagem; flora e fauna atuando como uma só para inspirar seus visitantes com a sensação do ciclo da vida."
 building_sacred_pool_03: "Bacia"
 building_sacred_pool_03_desc: "Um local para cerimônias e rituais ocasionais, este corpo d'água conta a história do esplendor crescente de seu governante."
 building_sacred_pool_04: "Fosso"
 building_sacred_pool_04_desc: "Agora cercando o local de culto, seus habitantes se sentem mais seguros agora que a $building_type_sacred_pool_01$ oferece alguma fortificação entre eles e possíveis forças hostis."
 building_sacred_pool_05: "Baray Menor"
 building_sacred_pool_05_desc: "Uma coleção de leões guardiões vigia o Baray, fazendo qualquer intruso pensar duas vezes antes de atravessar suas águas calmas."
 building_sacred_pool_06: "Baray"
 building_sacred_pool_06_desc: "O $building_sacred_pool_06$ que se estende de leste a oeste é uma visão magnífica de contemplar. Estátuas de serpentes ajudam a vigiar seus perímetros externos."
 building_sacred_pool_07: "Grande Baray"
 building_sacred_pool_07_desc: "Estátuas, vegetação florescente e paisagens esplêndidas caracterizam esta majestosa massa d'água, trazendo alívio refrescante além de hidratação em períodos de calor excruciante."
 building_sacred_pool_08: "Baray Sagrado"
 building_sacred_pool_08_desc: "Viajantes e outros visitantes que passam por aqui frequentemente ficam maravilhados com esta massa d'água feita pelo homem — sua largura faz com que o olho mal consiga ver a margem do outro lado. Um verdadeiro testemunho do elo divino deste lugar."
 building_type_vihara_halls_01: "Salões de Vihara"
 building_type_vihara_halls_01_desc: "Um edifício monástico, construído para abrigar monges da estação das chuvas, este é um lugar de meditação silenciosa, oração e recuperação. A expansão dos salões contribui para o vigor e a devoção de seus seguidores religiosos habitantes."
 building_vihara_halls_01: "Santuário de Oração"
 building_vihara_halls_01_desc: "A adição do $building_vihara_halls_01$ oferece a seus visitantes um lugar de culto e contemplação."
 building_vihara_halls_02: "Biblioteca de Escrituras"
 building_vihara_halls_02_desc: "Escrituras antigas, bem como novas, estão contidas dentro das paredes do Hor Trai. Devotos visitantes podem examiná-las e aprofundar sua iluminação à vontade."
 building_vihara_halls_03: "Capelas Colunadas"
 building_vihara_halls_03_desc: "Colunatas majestosas se erguem sobre estas capelas, oferecendo inscrições intrincadas e várias representações religiosas aos adoradores em seu interior."
 building_vihara_halls_04: "Mandapa"
 building_vihara_halls_04_desc: "O tamanho impressionante deste salão com pilares é excelente para a realização de rituais públicos ou outras cerimônias religiosas."
 building_vihara_halls_05: "Pavilhão Shala"
 building_vihara_halls_05_desc: "Um pavilhão no meio da vegetação, a beleza desta estrutura só é igualada por sua aura de espiritualidade."
 building_vihara_halls_06: "Pedras Sima"
 building_vihara_halls_06_desc: "As pedras limítrofes ajudam os guardiões do $building_type_vihara_halls_01$ a estimar o tamanho e a distância adequados dos espaços necessários para que os monges possam realizar seu culto de maneira apropriada."
 building_vihara_halls_07: "Torre do Sino"
 building_vihara_halls_07_desc: "Uma majestosa $building_vihara_halls_07$ coroa estes $building_type_vihara_halls_01$, refletindo a luz do sol durante o dia e se destacando à distância durante a noite."
 building_vihara_halls_08: "Grandes Salões"
 building_vihara_halls_08_desc: "O conforto e as comodidades destes salões fazem com que monges venham de mais longe para visitá-los, consolidando e difundindo ensinamentos e ideias em uma inestimável rede de informações, espalhando harmonia para reinos próximos."
 building_type_itsukushima_jinja_01: "$building_itsukushima_jinja_01$"
 building_type_itsukushima_jinja_01_desc: "$building_itsukushima_jinja_01_desc$"
 building_itsukushima_jinja_01: "Santuário de Itsukushima" #厳島神社
 building_itsukushima_jinja_01_desc: "Fundado no século VI e dedicado às deusas xintoístas do mar e das tempestades, as galerias de Itsukushima-jinja se erguem sobre a água, voltadas para um famoso portão torii que parece flutuar sobre as águas da baía de Matsushima."
 building_itsukushima_jinja_02: "$building_itsukushima_jinja_01$"
 building_itsukushima_jinja_02_desc: "$building_itsukushima_jinja_01_desc$"
 building_type_heian_palace_01: "$building_heian_palace_01$"
 building_type_heian_palace_01_desc: "$building_heian_palace_01_desc$"
 building_heian_palace_01: "Palácio Heian" #平安宮
 building_heian_palace_01_desc: "Construído pelo imperador Kanmu como a peça central de sua grande cidade de Heian-kyō, ou 'Capital da Paz', o vasto complexo palaciano abriga a corte imperial, a residência e os escritórios burocráticos centrais do Japão. Seus corredores são centros movimentados de cerimônia, política e intriga, onde antigas famílias aristocráticas disputam influência."
 building_type_ise_jingu_01: "$building_ise_jingu_01$"
 building_type_ise_jingu_01_desc: "$building_ise_jingu_01_desc$"
 building_ise_jingu_01: "Santuário de Ise" #伊勢神宮
 building_ise_jingu_01_desc: "Ise-jingū é sagrado para a deusa do sol, #EMP Amaterasu#!, e está entre os locais xintoístas mais venerados. O santuário abriga as insígnias imperiais de Yamato e é supervisionado por uma sacerdotisa vestal Saigū, escolhida dentre a dinastia imperial."
 building_type_kofuku_ji_01: "$building_kofuku_ji_01$"
 building_type_kofuku_ji_01_desc: "$building_kofuku_ji_01_desc$"
 building_kofuku_ji_01: "Templo Kōfuku" #興福寺
 building_kofuku_ji_01_desc: "Datando do século VII, Kōfuku-ji é um dos Sete Grandes Templos de Nara, entre os centros mais antigos e importantes do pensamento e do poder budistas no Japão."
 building_type_enryaku_ji_01: "$building_enryaku_ji_01$"
 building_type_enryaku_ji_01_desc: "$building_enryaku_ji_01_desc$"
 building_enryaku_ji_01: "Templo Enryaku" #延暦寺
 building_enryaku_ji_01_desc: "Fundado por $SaichO_$ no fim do século VIII, Enryaku-ji fica no Monte Hiei, dominando a capital do imperador Kanmu, Heian-kyō, e é o centro do Pundarika japonês, ou budismo Tendai no Japão."
 building_type_dazaifu_01: "$building_dazaifu_01$"
 building_type_dazaifu_01_desc: "$building_dazaifu_01_desc$"
 building_dazaifu_01: "Escritório de Dazaifu" #興福寺
 building_dazaifu_01_desc: "A cidade de Dazaifu é o centro administrativo da corte imperial no distante Kyūshū. Estabelecida para supervisionar a defesa da ilha, facilitar o comércio ultramarino e receber dignitários estrangeiros, a governadoria de Dazaifu é um passo comum na carreira de burocratas ambiciosos."
 building_type_chinjufu_01: "$building_chinjufu_01$"
 building_type_chinjufu_01_desc: "$building_chinjufu_01_desc$"
 building_chinjufu_01: "Distrito de Chinjufu" #鎮守府
 building_chinjufu_01_desc: "Originalmente baseado em Taga, o Chinjufu é o centro fortificado dos esforços imperiais de pacificação no norte do Japão, supervisionado por um comandante especial com responsabilidade pela defesa e tributação da região."
 building_type_hakata_port_01: "$building_hakata_port_01$"
 building_type_hakata_port_01_desc: "$building_hakata_port_01_desc$"
 building_hakata_port_01: "Porto de Hakata" #博多
 building_hakata_port_01_desc: "Desde os primeiros dias de Yamato, a cidade portuária de Hakata, na costa norte de Kyūshū, tem sido uma porta naval de entrada, um centro movimentado supervisionado pelo próximo escritório de Dazaifu, onde mercadores vendem bens de terras distantes e delegações diplomáticas pisam nas costas do Japão."
 building_hakata_port_02: "$building_hakata_port_01$"
 building_hakata_port_02_desc: "$building_hakata_port_01_desc$"
 building_type_hwangnyongsa_01: "$building_hwangnyongsa_01$"
 building_type_hwangnyongsa_01_desc: "$building_hwangnyongsa_01_desc$"
 building_hwangnyongsa_01: "Templo Hwangnyong" #皇龍寺 (황룡사)
 building_hwangnyongsa_01_desc: "Concluído no século VII, Hwangnyongsa, ou o 'Templo do Dragão Imperial', é um vasto complexo construído pelo rei Jin-heung de Silla como centro de ensino e poder budistas, e ostenta um dos pagodes mais altos do mundo."
 building_type_white_deer_grotto_academy_01: "$building_white_deer_grotto_academy_01$"
 building_type_white_deer_grotto_academy_01_desc: "$building_white_deer_grotto_academy_01_desc$"
 building_white_deer_grotto_academy_01: "Academia da Gruta do Cervo Branco"
 building_white_deer_grotto_academy_01_desc: "Fundada pelo eremita Li Bo, onde cervos brancos vagueavam livremente, a academia floresceu como um centro do Neoconfucionismo."
 building_type_shigu_academy_01: "$building_shigu_academy_01$"
 building_type_shigu_academy_01_desc: "$building_shigu_academy_01_desc$"
 building_shigu_academy_01: "Academia Shigu"
 building_shigu_academy_01_desc: "Esta academia atraía estudiosos que estudavam os Clássicos nas colinas tranquilas de Hunan. Um centro de poesia e filosofia, ela levou tradições Tang para a era Song."
 building_type_culai_academy_01: "$building_culai_academy_01$"
 building_type_culai_academy_01_desc: "$building_culai_academy_01_desc$"
 building_culai_academy_01: "Academia Culai"
 building_culai_academy_01_desc: "Estudiosos construíram uma academia entre os picos do Monte Culai para estudar textos confucionistas em isolamento. Seus salões ecoavam debates sobre harmonizar natureza e governo."
 building_type_lize_academy_01: "$building_lize_academy_01$"
 building_type_lize_academy_01_desc: "$building_lize_academy_01_desc$"
 building_lize_academy_01: "Academia Lize"
 building_lize_academy_01_desc: "A Academia Lize promove o saber entre as águas e os juncos de Hebei, servindo como um bastião setentrional da ordem confucionista em meio a fronteiras mutáveis."
 building_type_maoshan_academy_01: "$building_maoshan_academy_01$"
 building_type_maoshan_academy_01_desc: "$building_maoshan_academy_01_desc$"
 building_maoshan_academy_01: "Academia Maoshan"
 building_maoshan_academy_01_desc: "Uma academia que ensina ritual, meditação e textos sagrados, servindo como um contraponto espiritual às academias confucionistas da era Song."
 building_type_tiantai_monasteries_01: "$building_tiantai_monasteries_01$"
 building_type_tiantai_monasteries_01_desc: "$building_tiantai_monasteries_01_desc$"
 building_tiantai_monasteries_01: "Mosteiros Tiantai"
 building_tiantai_monasteries_01_desc: "Instituição erudita da escola Tiantai, esta academia é especializada no ensino de filosofia e meditação."
 building_type_jizu_shan_temples_01: "$building_jizu_shan_temples_01$"
 building_type_jizu_shan_temples_01_desc: "$building_jizu_shan_temples_01_desc$"
 building_jizu_shan_temples_01: "Templos de Jizu Shan"
 building_jizu_shan_temples_01_desc: "O complexo de mosteiros budistas na montanha servia como bastião do Budismo Esotérico. Peregrinos o comparavam ao Pico do Abutre, na Índia."
 building_type_nanhua_temple_01: "$building_nanhua_temple_01$"
 building_type_nanhua_temple_01_desc: "$building_nanhua_temple_01_desc$"
 building_nanhua_temple_01: "Templo Nanhua"
 building_nanhua_temple_01_desc: "Sede do Sexto Patriarca Huineng do Budismo Chan. Ele continua sendo um vibrante centro dos ensinamentos Chan."
 building_type_byeokran_port_01: "$building_byeokran_port_01$"
 building_type_byeokran_port_01_desc: "$building_byeokran_port_01_desc$"
 building_byeokran_port_01: "Porto de Byeokran" #碧瀾渡 (벽란도)
 building_byeokran_port_01_desc: "Situado logo a oeste da cidade de Gaeseong, na foz do rio Ryeseong, o porto de Byeokran é a rota mais direta para que mercadorias estrangeiras e viajantes entrem na península coreana, evitando as fronteiras do norte e as cadeias de montanhas."
 building_type_sado_mines_01: "$building_sado_mines_02$" #佐渡金山
 building_type_sado_mines_01_desc: "$building_sado_mines_01_desc$"
 building_sado_mines_01: "Poços de Ouro de Sado"
 building_sado_mines_01_desc: "Um antigo lugar de exílio, poucos esperariam que a distante ilha de Sado pudesse estar secretamente guardando tamanha riqueza de ouro sob sua superfície."
 building_sado_mines_02: "Mina de Ouro de Sado"
 building_sado_mines_02_desc: "Os poços de mineração foram ampliados, e engenheiros foram trazidos para realmente tornar possível aumentar a extração de ouro."
 building_sado_mines_03: "Grande Mina de Ouro de Sado"
 building_sado_mines_03_desc: "Uma aldeia surgiu ao redor dos muitos poços de mineração, e os trabalhadores encontram novas veias de ouro regularmente."
 building_sado_mines_04: "Complexo de Mineração de Ouro de Sado"
 building_sado_mines_04_desc: "A extração de ouro atingiu uma escala quase industrial, com a quantidade de trabalhadores agora chegando aos milhares. Riquezas sem fim aparentemente fluem das minas."
 building_type_tada_mines_01: "$building_tada_mines_02$" #多田銀銅山遺
 building_type_tada_mines_01_desc: "$building_tada_mines_01_desc$"
 building_tada_mines_01: "Poços de Cobre de Tada"
 building_tada_mines_01_desc: "Sob a aldeia de Tada, aninhada nas montanhas de Hokusetsu, uma riqueza de metais preciosos aguarda ser explorada. Diz-se que o revestimento do grande Buda de Tōdai-ji foi extraído deste lugar."
 building_tada_mines_02: "Mina de Cobre de Tada"
 building_tada_mines_02_desc: "Os poços de mineração foram ampliados, e engenheiros foram trazidos para realmente tornar possível aumentar a extração de cobre."
 building_tada_mines_03: "Grande Mina de Cobre de Tada"
 building_tada_mines_03_desc: "Uma aldeia surgiu ao redor dos muitos poços de mineração, e os trabalhadores encontram novas veias de cobre regularmente."
 building_tada_mines_04: "Complexo de Mineração de Cobre de Tada"
 building_tada_mines_04_desc: "A extração de cobre atingiu uma escala quase industrial, com a quantidade de trabalhadores agora chegando aos milhares. Riquezas sem fim aparentemente fluem das minas."
 building_type_tsushima_mines_01: "$building_tsushima_mines_02$" #対馬銀山
 building_type_tsushima_mines_01_desc: "$building_tsushima_mines_01_desc$"
 building_tsushima_mines_01: "Poços de Prata de Tsushima"
 building_tsushima_mines_01_desc: "A ilha de Tsushima é famosa por seus depósitos de prata, descobertos no fim do século VII durante o reinado do imperador Tenmu. Ricos em galena, os minérios escuros do Mar do Japão produzem muitas riquezas."
 building_tsushima_mines_02: "Mina de Prata de Tsushima"
 building_tsushima_mines_02_desc: "Os poços de mineração foram ampliados, e engenheiros foram trazidos para realmente tornar possível aumentar a extração de prata."
 building_tsushima_mines_03: "Grande Mina de Prata de Tsushima"
 building_tsushima_mines_03_desc: "Uma aldeia surgiu ao redor dos muitos poços de mineração, e os trabalhadores encontram novas veias de prata regularmente."
 building_tsushima_mines_04: "Complexo de Mineração de Prata de Tsushima"
 building_tsushima_mines_04_desc: "A extração de prata atingiu uma escala quase industrial, com a quantidade de trabalhadores agora chegando aos milhares. Riquezas sem fim aparentemente fluem das minas."
 building_type_koganeyama_mines_01: "$building_koganeyama_mines_02$"
 building_type_koganeyama_mines_01_desc: "$building_koganeyama_mines_01_desc$"
 building_koganeyama_mines_01: "Poços de Ouro de Kinka"
 building_koganeyama_mines_01_desc: "A ilha de Kinka e seu associado Santuário Koganeyama são famosos pelos primeiros depósitos de ouro descobertos no Japão, na forma de pó de ouro. Estabelecido pelo imperador Shōmu no século VIII, o santuário é dedicado a #EMP Kanayama#!, deus da mineração."
 building_koganeyama_mines_02: "Mina de Ouro de Kinka"
 building_koganeyama_mines_02_desc: "Os poços de mineração foram ampliados, e engenheiros foram trazidos para realmente tornar possível aumentar a extração de ouro."
 building_koganeyama_mines_03: "Grande Mina de Ouro de Kinka"
 building_koganeyama_mines_03_desc: "Uma aldeia surgiu ao redor dos muitos poços de mineração, e os trabalhadores encontram novas veias de ouro regularmente."
 building_koganeyama_mines_04: "Complexo de Mineração de Ouro de Kinka"
 building_koganeyama_mines_04_desc: "A extração de ouro atingiu uma escala quase industrial, com a quantidade de trabalhadores agora chegando aos milhares. Riquezas sem fim aparentemente fluem das minas."
 building_type_mount_baekdu_01: "Monte Baekdu"
 building_type_mount_baekdu_01_desc: "Diz-se que o elevado pico do Monte Baekdu é a origem de todas as montanhas da península coreana, e suas alturas são um lugar sagrado entre as muitas fés e povos da região."
 building_mount_baekdu_01: "$building_type_mount_baekdu_01$"
 building_mount_baekdu_01_desc: "$building_type_mount_baekdu_01_desc$"
 building_type_mozu_tombs: "$building_mozu_tombs$"
 building_type_mozu_tombs_desc: "$building_mozu_tombs_desc$"
 building_mozu_tombs: "Túmulos de Mozu"
 building_mozu_tombs_desc: "Diz-se que os montes em forma de buraco de fechadura em Mozu abrigam antigos imperadores do passado. Para os navios na baía próxima, eles também são um marco notável, assim como uma lembrança de tempos passados."
 building_type_trosky_castle_01: "$building_trosky_castle_01$"
 building_type_trosky_castle_01_desc: "$building_trosky_castle_01_desc$"
 building_trosky_castle_01: "Castelo de Trosky"
 building_trosky_castle_01_desc: "O Castelo de Trosky foi construído entre duas formações basálticas de um vulcão extinto há muito tempo. Seu nome deriva da forma da rocha, que se assemelha às ruínas de um castelo desmoronado."
