 building_type_al_azhar_university_desc: "$building_type_generic_university_desc$\n\nA Universidade Al-Azhar recebeu esse nome em honra a Fatimah, a filha de Muhammad, que era frequentemente chamada de 'al-Zahra' (a Luminosa)."
