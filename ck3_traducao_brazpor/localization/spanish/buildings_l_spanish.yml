 building_type_hpakant_mines_01: "Minas de Jade de Hpakant"
 building_type_hpakant_mines_01_desc: "Nas profundezas sob colinas cobertas por florestas, veios de jadeíta brilhante cintilam em meio a rios emaranhados e cristas calcárias. Por muitos anos, esses depósitos ficaram ocultos de viajantes e mercadores estrangeiros, oferecendo aos locais inúmeros blocos da valiosa pedra verde."
