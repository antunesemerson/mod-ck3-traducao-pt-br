 calmed_the_crowd_memory_desc_second_perspective: "Somente com palavras graves e eloquentes, você acalmou uma vasta multidão tumultuada"
 calmed_the_crowd_memory_desc_third_perspective: "Com um grande discurso e diversos presentes, [owner.GetName] acalmou uma vasta multidão tumultuada"
 #Titles
 fled_riot_at_races_memory: "fugiu quando um tumulto eclodiu nas corridas"
