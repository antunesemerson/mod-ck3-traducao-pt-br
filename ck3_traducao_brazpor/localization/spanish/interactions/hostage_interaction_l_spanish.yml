 char_interaction.0330.desc: "Ficaria feliz em tomar seu[hostage.Custom('ES_OA')] [hostage_sender.Custom2('RelationToMeShort', SCOPE.sC('hostage'))], [hostage.GetFirstName] , como cativo[hostage.Custom('ES_OA')].\n\nAguardo ansiosamente sua chegada a [hostage_taker.GetCapitalLocation.GetNameNoTooltip]."
 char_interaction.0330.a: "Muito bem."
 char_interaction.0331.desc: "Não vejo mais opção senão aceitar vossa exigência de tomar meu [hostage_sender.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] , [hostage.GetFirstName] , como vosstr[hostage_sender.Custom('ES_OA')] cativo[hostage_sender.Custom('ES_OA')].\n\nPartirá para [hostage_taker.GetCapitalLocation.GetNameNoTooltip] imediatamente."
 char_interaction.0331.a: "Excelente."
 char_interaction.0332.desc: "Devo aceitar sua proposta de trocar meu [hostage_sender_2.Custom2('RelationToMeShort', SCOPE.sC('hostage_2'))] , [hostage_2.Custom('ES_ElLa')] [hostage_2.GetTitledFirstName|l] , por su[hostage_1.Custom('ES_OA')] [hostage_sender_1.Custom2('RelationToMeShort', SCOPE.sC('hostage_1'))] , [hostage_1.Custom('ES_ElLa')] [hostage_1.GetTitledFirstName|l]."
 char_interaction.0332.a: "Perfeito."
 char_interaction.0340.opening: "[recipient.Custom2('AppropriateGreetingPositive', actor )]"
 char_interaction.0340.desc: "Aceito seu pedido pela volta de seu[hostage.Custom('ES_OA')] [home_court.Custom2('RelationToMeShort', SCOPE.sC('hostage'))], [hostage.GetFirstName].\n\nConfio que isso não azede nossa relação."
 char_interaction.0340.a: "Agradeço [ROOT.Char.GetFaith.HighGodNameAlternate]."
 char_interaction.0341.desc: "Temo que preciso manter vosstr[secondary_recipient.Custom('ES_OA')] [actor.Custom2('RelationToMeShort', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetFirstName] em [recipient.GetCapitalLocation.GetNameNoTooltip] por mais um tempo."
 char_interaction.0341.a: "Que grosseiro..."
