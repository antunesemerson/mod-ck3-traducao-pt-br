 keeper_of_the_harem_court_position_desc: "O $keeper_of_the_harem_court_position$ ocupa um cargo de grande importância no harém imperial, supervisionando tudo, das vestes das concubinas ao agendamento auspicioso das relações imperiais."
 keeper_of_the_harem_court_position_task_maintain_decorum: "Manter o Decoro do Harém"
 keeper_of_the_harem_court_position_task_maintain_decorum_desc: "O $keeper_of_the_harem_court_position$ se concentrará em suprimir as intrigas venenosas do harém e protegê-lo das atenções indevidas do mundo exterior."
 keeper_of_the_harem_maintaining_decorum.tt: "O $keeper_of_the_harem_court_position$ dificultará significativamente [schemes|lE] contra membros do harém."
 keeper_of_the_harem_court_position_task_attend_to_wellness: "Cuidar do Bem-Estar das Concubinas"
 keeper_of_the_harem_court_position_task_attend_to_wellness_desc: "O $keeper_of_the_harem_court_position$ dará atenção especial à saúde e ao bem-estar do harém, tratando os doentes e aliviando seus fardos."
 keeper_of_the_harem_attend_to_wellness.tt: "O $keeper_of_the_harem_court_position$ procurará e atenderá um membro doente do harém todo mês, aliviando seu estresse e os sintomas que o afligem."
 keeper_of_the_harem_court_position_task_select_palace_beauties: "Selecionar Belas do Palácio"
 keeper_of_the_harem_court_position_task_select_palace_beauties_desc: "O $keeper_of_the_harem_court_position$ revisará periodicamente a composição do harém, aposentando graciosamente as concubinas idosas e sem filhos enquanto recruta substitutas talentosas e belas."
 keeper_of_the_harem_select_palace_beauties.tt: "Todo ano, o $keeper_of_the_harem_court_position$ poderá aposentar uma concubina idosa e sem filhos e recrutar uma nova concubina para o harém."
 court_guru_court_position: "Guru"
 court_guru_court_position_desc: "Um guru serve tanto como conselheiro quanto como sábio, orientando governantes em preocupações terrenas e verdades sagradas."
 guru_teach_learning: "Iluminar a Mente"
 guru_teach_learning_desc: "O guru compartilha textos sagrados e sabedoria erudita para aguçar o intelecto de seu suserano."
 guru_teach_diplomacy: "Refinar a Língua"
 guru_teach_diplomacy_desc: "O guru instrui na fala cortesã, no silêncio ponderado e na arte da persuasão graciosa."
 guru_teach_intrigue: "Aguçar os Sentidos"
 guru_teach_intrigue_desc: "Por meio de parábolas e jogos sutis, o guru treina o governante para enxergar motivos ocultos e enganar com compostura."
 court_brahmin_court_position: "Brâmane da Corte"
 court_brahmin_court_position_desc: "Um venerável sacerdote encontrado tanto em cortes hindus quanto budistas, o Brâmane da Corte é responsável por realizar rituais, supervisionar cerimônias e promover a legitimidade do governante."
 court_brahmin_court_position_task_increase_tribute: "Aumentar Tributo"
 court_brahmin_court_position_task_increase_tribute_desc: "Este personagem se dedicará diligentemente a ampliar o fluxo de riqueza do tributário para o suserano."
 khlon_glan_court_position: "Khlon Glan"
 khlon_glan_court_position_desc: "O Khlon Glan é um oficial de alta patente, encarregado de administrar os armazéns do reino e seus suprimentos militares."
 khlon_glan_assist_provisioning: "Desenvolver a Capital"
 khlon_glan_assist_provisioning_desc: "Este personagem está focado em melhorar a capital Mandala."
 favored_minister_court_position: "Ministro Favorito"
 favored_minister_court_position_desc: "O $favored_minister_court_position$ é o [councillor|lE] favorito escolhido de um [son_of_heaven|E] [celestial|lE] e recebe liberdade para conduzir seu ministério como desejar."
 favored_minister_employee_custom_desc: "[personal_movement_power|E]: [movement_power_i][EmptyScope.ScriptValue('favored_minister_movement_power_bonus_value')|+=0%]"
