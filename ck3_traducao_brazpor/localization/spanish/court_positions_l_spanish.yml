 keeper_of_the_horses_validity_trigger_tt: "[prowess_i][prowess|lE] é #high 12#! ou mais"
 minister_bureaucrat_court_position: "Assistente de Departamento"
 minister_bureaucrat_court_position_desc: "Nos escalões superiores do governo celestial, é necessário um grande conjunto de burocratas. Escolhidos a dedo pelo chefe de cada departamento, garantem que tudo funcione sem problemas."
 minister_bureaucrat_court_position_mod_desc: "$EFFECT_LIST_BULLET$O Assistente melhora várias tarefas relacionadas ao [ministry|El], como [great_projects|El] (com base na [aptitude|El])"
