l_spanish:
 east_europe.0001.t: "Os Eslavos Ocidentais Unidos"
 east_europe.0001.desc: "As antigas tribos estão unidas mais uma vez. Eu nos reuni, assim como Samo fez séculos atrás. Seu império morreu com ele, mas tenho certeza de que [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] tem um futuro próspero pela frente. Isto é apenas o começo!"
 east_europe.0001.a: "Glória a [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]!"
 east_europe.0002.desc: "Assim como Samo uniu as tribos vendas séculos atrás, [western_slav_uniter.Custom2('MyCharacterIntroduction', ROOT.Char)] reuniu os povos eslavos ocidentais sob uma única bandeira. Esta união resistirá ao teste do tempo ou ruirá como o império de Samo? Só [ROOT.Char.GetFaith.FateGodName] sabe."
 east_europe.0005.t: "Os Eslavos Meridionais Unidos"
 east_europe.0005.desc: "Uni as tribos de outrora sob uma única bandeira. Juntos, somos mais fortes do que nunca. Não seremos conquistados! Não seremos apagados!"
 east_europe.0006.desc: "[southern_slav_uniter.Custom2('MyCharacterIntroduction', ROOT.Char)|U] reuniu os povos eslavos meridionais sob uma única bandeira. Esta união resistirá ao teste do tempo, ou antigas rixas e costumes a dilacerarão? Só [ROOT.Char.GetFaith.FateGodName] sabe."
 east_europe.0010.t: "O Nascimento da Slávia"
 east_europe.0010.desc: "Fiz o impossível: neste dia, todos os eslavos estão unidos sob uma única bandeira. Meu novo império se estende do coração da Europa, no oeste, até as tundras congeladas do leste!\n\nPoucos heróis na história já realizaram tal feito! Agora sou um deles, e meu nome viverá para sempre."
 east_europe.0010.a: "Glória à Slávia!"
 east_europe.0011.desc: "[slav_uniter.Custom2('MyCharacterIntroduction', ROOT.Char)|U] realizou o impossível, unindo todos os povos eslavos sob uma única bandeira. Este vasto império continuará a prosperar, ou antigas rixas o destroçarão? Só [ROOT.Char.GetFaith.FateGodName] sabe."
 east_europe.0015.t: "Defensores de [defender_of_highgod.GetFaith.HighGodName]"
 east_europe.0015.desc: "O Salão dos Heróis foi construído em..."
 east_europe.0015.a: "… [target_list_member_a.GetNameNoTierNoTooltip]."
 east_europe.0015.b: "… [target_list_member_b.GetNameNoTierNoTooltip]."
 east_europe.0015.c: "… [target_list_member_c.GetNameNoTierNoTooltip]."
 east_europe.0015.d: "… [target_list_member_d.GetNameNoTierNoTooltip]."
 east_europe.0015.tooltip: "A propriedade ganha o [special_building|lE] [GetBuilding('hall_of_heroes_01').GetName]"
 east_europe.0016.desc: "Sob minha liderança, os clãs se uniram para erguer um grande salão de guerra em [holy_site.GetNameNoTierNoTooltip]. Dentro de suas grossas paredes de pedra, preparamo-nos para a guerra...\n\nPor gerações, saqueadores estrangeiros cobiçaram nossas terras. Que venham, eu digo! Que ponham sua força à prova contra nossos valentes heróis [defender_of_highgod.GetFaith.GetAdjectiveNoTooltip]! Que seu sangue penetre a terra e pinte os rios de vermelho!"
 east_europe.0016.a: "Salve [defender_of_highgod.GetFaith.WarGodName]!"
 east_europe.0017.desc: "[defender_of_highgod.Custom2('MyCharacterIntroduction', ROOT.Char)|U] uniu todos os cl?s de seu dom?nio na defesa contra invasores estrangeiros. Um grande sal?o de guerra foi constru?do em [holy_site.GetNameNoTierNoTooltip], onde os orgulhosos her?is [defender_of_highgod.GetFaith.GetAdjectiveNoTooltip]s j? se reuniram."
 #HUNGARIAN DECISIONS
 east_europe.0030.t: "Novo Começo"
 east_europe.0030.desc: "Ao permitir a entrada de comerciantes, fazendeiros e artesãos experientes dos reinos ocidentais e meridionais, [scoped_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip] em breve se tornará um próspero centro comercial e enfim deixará para trás suas raízes tribais.\n\nEspero que esses novos colonos cristãos também ajudem a sufocar os últimos focos pagãos descontentes entre meus súditos e consolidem [scoped_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip] como um verdadeiro reino [scoped_ruler.GetFaith.GetAdjective]."
 east_europe.0030.a: "Todos são bem-vindos!"
 east_europe.0031.t: "Os Novos Colonos"
 east_europe.0031.desc.vassals: "[scoped_ruler.GetTitledFirstName] decidiu acolher colonos estrangeiros dos reinos vizinhos [scoped_ruler.GetFaith.GetReligion.GetAdjectiveNoTooltip].\n\n espera que esses recém-chegados ajudem a povoar nossas terras mais rapidamente e aumentem o comércio com nossos aliados."
 east_europe.0031.desc.others: "[scoped_ruler.GetTitledFirstName] ha decidido dar la bienvenida a colonos extranjeros de los países [scoped_ruler.GetFaith.GetReligion.GetAdjectiveNoTooltip]s vecinos de [scoped_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nEspera que estas incorporaciones ayuden a poblar sus tierras más rápidamente y a aumentar el comercio con sus aliados."
 east_europe.0031.a: "Bem, eu não confio neles!"
 east_europe.0031.b: "Entendo..."
 east_europe.0032.t: "Os Antigos Ritos"
 east_europe.0032.desc: "Mis antepasados adoptaron el [old_faith.GetNameNoTooltip] en un intento errado de arrastrar al [scoped_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip] a la modernidad, pero solo nos ha traído revueltas, penuria y discordia.\n\nCon la inmensa influencia temporal y eclesiástica que ahora ostento sobre mi señorío, debería enmendar este error y volver a la verdadera fe $magyar_pagan$.\n\nMas es un momento crucial y, aunque urge retomar las antiguas costumbres, tal vez podríamos modificar un poco su interpretación exacta, ¿verdad?"
 east_europe.0032.a: "Retornamos aos Antigos Caminhos, sem mácula."
 east_europe.0032.b: "Talvez... talvez possamos manter alguns dos novos ensinamentos..."
 east_europe.0032.c: "Crânios para [ROOT.Char.GetFaith.WarGodName]!"
 east_europe.0032.d: "Nossa apego obstinado às velhas tradições, de qualquer tipo, é uma fraqueza."
 east_europe.0034.t: "O Renascimento [scoped_ruler.GetFaith.GetAdherentNameNoTooltip]"
 east_europe.0034.desc.vassals: "Depois de acumular força quase ilimitada dentro do reino,"
 east_europe.0034.desc.outsiders: "Depois de acumular força quase ilimitada dentro de [scoped_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip],"
 east_europe.0034.desc.intro: "[scoped_ruler.GetTitledFirstName] mostrou-se um[scoped_ruler.Custom('ES_XA')] apóstata!\n\nEm um ato público de desafio, renunciou a [old_faith.HighGodName], expulsou os [old_faith.PriestNeuterPlural] [old_faith.GetAdherentNameNoTooltip] de alto escalão, e privou [old_faith.GetNameNoTooltip] de sua posição como religião de Estado. Mesmo agora, muitos [scoped_ruler.GetCulture.GetCollectiveNounNoTooltip] acorrem em massa para se juntar a [scoped_ruler.Custom('ES_ElElla')].\n\n"
 east_europe.0034.desc.conversion_vanilla: "Embora politicamente adormecido por algum tempo, $magyar_pagan$ continuou a ter muitos seguidores no campo, e [scoped_ruler.GetTitledFirstNameNoTooltip|l] teve pouca dificuldade em restabelecer os Antigos Caminhos."
 east_europe.0034.desc.conversion_syncretic: "Apesar disso, a nova fé [scoped_ruler.GetFaith.GetAdherentNameNoTooltip] parece conservar muitos traços distintos de [old_faith.GetNameNoTooltip], fundindo visivelmente os Antigos Caminhos com os Novos."
 east_europe.0034.desc.conversion_bloodthirsty: "Pior ainda, [scoped_ruler.GetTitledFirstNameNoTooltip|l] afirma que os deuses irados só perdoarão a fraqueza do povo [scoped_ruler.GetCulture.GetNameNoTooltip] em se converter se forem oferecidos frequentes sacrifícios humanos!"
 east_europe.0034.desc_conversion_adaptive: "Com tantas mudanças pelas quais o povo [scoped_ruler.GetCulture.GetNameNoTooltip] e sua fé passaram nos últimos séculos, este ressurgimento dos Antigos Caminhos parece notavelmente aberto e pragmático."
 east_europe.0034.a: "Por fim! Glória a [ROOT.Char.GetFaith.HighGodName]!"
 east_europe.0034.b: "Talvez o vento sopre na direção de [scoped_ruler.GetFaith.HighGodName]..."
 east_europe.0034.c: "Que paganismo vil é este?!"
 east_europe.0034.d: "Não é problema meu."
 #BOSNIAN DECISIONS
 east_europe.0101.t: "Primeiro[founder.Custom('ES_XA')] [founder.GetTitleAsNameNoTooltip] de toda a Bósnia"
 east_europe.0101.desc: "La montañosa Bosnia ha pasado durante siglos por todas las potencias beligerantes de los Balcanes. Otros eslavos del norte y del sur; los señores jinetes de los Cárpatos del momento; emperadores de Bulgaria o Constantinopla; incluso los príncipes mercaderes del Adriático.\n\nA partir de hoy, eso se acabó.\n\nCon mi coronación, Bosnia es un reino propio, ¡la fuerza y la gloria nos aguardan!"
 east_europe.0101.a: "Meu legado será lembrado por séculos!"
 east_europe.0101.b: "[founder.GetFaith.HighGodName] nos abençoa!"
 east_europe.0101.c: "Honestamente, contanto que eu seja [founder.GetTitleAsNameNoTooltip] de #EMP algum lugar#!..."
 east_europe.0102.t: "$east_europe.0101.t$"
 east_europe.0102.desc: "Meus arautos trazem notícias dos vales dos Alpes Dináricos. Aparentemente, [founder.GetShortUIName] foi proclamad[founder.Custom('ES_OA')] [founder.GetTitleAsNameNoTooltip] de [founder.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nCom os vales montanhosos defensáveis e as sombrias florestas das terras altas da Bósnia sob seu controle, e com o apoio da população local, o reino de [founder.GetTitledFirstNameNoTooltip|l] parece firmemente seguro.\n\nPor enquanto."
 east_europe.0102.a: "Um arrivista patético, no máximo."
 east_europe.0102.b: "Salve [founder.GetShortUINameNoTooltip]!"
 east_europe.0102.c: "Veremos quanto tempo isso dura..."
 east_europe.0111.t.setup: "Hereges Entre Nós"
 east_europe.0111.tt.announce_failure: "Sua tentativa de acusar a $bosnian_church$ de heresia falha!"
 east_europe.0111.tt.cancellation_cooldown: "A $bosnian_church$ não pode ser acusada de heresia novamente por [EmptyScope.ScriptValue('accuse_the_krstjani_of_heresy_cancellation_cooldown_value')|0] anos"
 east_europe.0111.tt.regular_cooldown: "A $bosnian_church$ não pode ser acusada de heresia novamente por [EmptyScope.ScriptValue('accuse_the_krstjani_of_heresy_failure_cooldown_value')|0] anos"
 east_europe.0111.tt.critical_cooldown: "A $bosnian_church$ não pode ser acusada de heresia novamente por [EmptyScope.ScriptValue('accuse_the_krstjani_of_heresy_critical_failure_cooldown_value')|0] anos"
 #[EmptyScope.ScriptValue('vengeful_scheme_success_chance_modifier')|0]
 east_europe.0111.t: "$east_europe.0111.t.setup$: escrevendo para [hof.Custom('ES_AlAla')] [hof.GetTitledFirstNameNoTooltip|l]"
 east_europe.0111.desc: "¿Quién sabe cuánto tiempo han pasado estos supuestos [heretic.GetFaith.GetAdherentNamePluralNoTooltip] sin ser descubiertos? ¿Una década? ¿Un siglo? ¿Desde la visita del bendito san Martín?\n\nPor mucho tiempo que se haya permitido que esta herejía se encone en las regiones inexploradas de Bosnia, la indulgencia de nuestros antepasados ha dado malos frutos, ¡y no puedo soportarlo! ¡Ver a un[heretic.Custom('ES_XA')] [heretic.Custom2('InsultNoun', ROOT.Char)] como [heretic.Custom('ES_ElLa')] [heretic.GetTitledFirstName|l] alardeando de [accuser.GetFaith.HighGodName] abiertamente!\n\nEl mundo asume que son buenos [accuser.GetFaith.GetAdherentNamePluralNoTooltip], aunque algo agrestes. Quizá con unas cuantas palabras imaginativas [hof.Custom('ES_AlAla')] [hof.GetTitledFirstName|l], no tendrá por qué ser así…"
 east_europe.0111.a: "Tragam-me [ROOT.Char.Custom('WritingInstrument')|l] e [ROOT.Char.Custom('GetWritingMaterial')|l]!"
 east_europe.0111.a.tt: "Uma carta é redigida"
 east_europe.0111.b: "Tenho coisas melhores para fazer..."
 east_europe.0112.t: "[hof.Custom2('AppropriateGreeting',accuser)]"
 east_europe.0112.desc.intro: "Sua insistência em dizer que os [heretic.GetFaith.GetAdherentNamePluralNoTooltip] são hereges é ridícula."
 east_europe.0112.desc.culture: "[accuser.GetTitledFirstName] é um compatriota meu[accuser.Custom('ES_OA')] e você não sabe nada sobre nossos costumes."
 east_europe.0112.desc.rival: "Sinceramente, se #EMP alguém#! é provavelmente culpado de heresia, esse alguém é você, seu(sua) [accuser.Custom2('InsultAdjective', SCOPE.sC('hof'))], [accuser.Custom2('InsultAdjective', SCOPE.sC('hof'))], [accuser.Custom2('InsultAdjective', SCOPE.sC('hof'))] [accuser.Custom2('InsultNoun', SCOPE.sC('hof'))]!"
 east_europe.0112.desc.sinful: "Seus pecados são praticamente incontáveis, e você ainda tem a ousadia de criticar os outros?"
 east_europe.0112.desc.negative_opinion: "Talvez, se eu respeitasse um pouco sua opinião, daria crédito aos seus pensamentos. Infelizmente, não respeito."
 east_europe.0112.desc.fallback: "Tais afirmações falsas não são próprias de um[accuser.Custom('ES_XA')] [accuser.GetWomanMan] de sua posição."
 east_europe.0112.desc.outro: "\n\nEspero que isso ponha fim ao assunto e que, da próxima vez, você pense antes de escrever."
 east_europe.0112.a: "Que tolo cego!"
 east_europe.0113.t: "[hof.Custom2('AppropriateGreeting',accuser)]"
 east_europe.0113.desc: "Suas palavras me preocupam enormemente. Quem diria que uma corrupção tão profunda pudesse estar escondida tão perto do coração da cristandade!\n\nConsultarei com [heretic.Custom('ES_ElLa')] [heretic.GetTitledFirstNameNoTooltip|l], e determinarei a verdade sobre este assunto."
 east_europe.0113.a: "As rodas da justiça divina giram!"
 east_europe.0113.a.tt: "[hof.GetTitledFirstNameNoTooltip|l] escreve para [heretic.GetTitledFirstNameNoTooltip|l]…"
 east_europe.0114.t: "$east_europe.0111.t.setup$: Inquisição [hof.GetFaith.GetAdjectiveNoTooltip]"
 east_europe.0114.desc: "Você segura a carta de [hof.GetTitledFirstName|l] entre seus dedos trêmulos, embora não saiba ao certo se o tremor vem do medo ou da fúria: graças às maquinações do(a) ardiloso(a) [accuser.Custom('ES_OA')] [accuser.GetName], [hof.GetTitledFirstNameNoTooltip|l] ameaça declarar hereges todos os [heretic.GetFaith.GetAdherentNamePluralNoTooltip]!\n\nEsse ato terrível sem dúvida lançará seus irmãos cristãos contra você em uma enxurrada de guerras santas, a menos que você consiga convencer [hof.GetTitledFirstNameNoTooltip|l] do contrário.\n\nÉ preciso redigir uma resposta."
 east_europe.0114.a: "Talvez um astuto ensaio teológico?"
 east_europe.0114.a.tt_success: "Convences a [hof.GetTitledFirstNameNoTooltip|l]"
 east_europe.0114.a.tt_success.tt: "As acusações de heresia são evitadas!"
 east_europe.0114.a.tt_failure: "Seu argumento fracassa"
 east_europe.0114.a.tt_failure.tt: "As acusações de heresia soam verdadeiras..."
 east_europe.0114.b: "Acho que um pequeno bilhete de lembrança resolverá..."
 east_europe.0114.b.tt: "![hof.GetTitledFirstName] será obrigad[hof.Custom('ES_OA')] a ficar do seu lado!"
 east_europe.0114.c: "Se pudesse ver o lado político de tudo isso…"
 east_europe.0114.c.tt_success: "A narrativa muda para cinismo político"
 east_europe.0114.c.tt_failure: "O argumento permanece teológico"
 east_europe.0114.d: "Não podemos nos opor à Igreja mais ampla: eu #EMP devo#! me converter."
 east_europe.0114.d.tt: "Você terá de decidir se se converterá sinceramente ou por cinismo"
 east_europe.0114.e: "Nossa fé é tão válida quanto a deles! Uma carta de desafio!"
 east_europe.0114.e.tt: "[hof.GetTitledFirstName] certamente declarará a $bosnian_church$ herética!"
 east_europe.0115.t: "$east_europe.0116.t$"
 east_europe.0115.desc.intro: "Maldit[heretic.Custom('ES_OA')] seja [heretic.Custom('ES_ElElla')] e seus malditos olhos, [heretic.GetTitledFirstName|l] se converteu[heretic.Custom('ES_OA')]!\n\n"
 east_europe.0115.desc.political: "Embora [hof.GetTitledFirstName|l] parecer totalmente convencid[hof.Custom('ES_OA')], fica óbvio para mim que este movimento é um gesto político pouco entusiasmado: [heretic.GetFirstNameNoTooltip] afirmou #EMP sol[heretic.Custom('ES_OA')]#! sua lealdade à [hof.GetFaith.GetNameNoTooltip]. Nem um único vassalo ou membro da família junto dele."
 east_europe.0115.desc.wholehearted: "A ação parece ser sincera e [heretic.GetFirstNameNoTooltip] trouxe consigo sua família imediata e vários magnatas importantes para o credo [hof.GetFaith.GetAdjective]. Isso quase o torna ainda mais irritante."
 east_europe.0115.desc.outro: "\n\nPor enquanto, o assunto está resolvido. Hereges ou não, [hof.GetTitledFirstNameNoTooltip|l] está convicto[hof.Custom('ES_OA')] de que a $bosnian_church$ está suficientemente sob seu controle."
 east_europe.0115.a: "Argh, eu desisto!"
 east_europe.0115.b: "Uma vez herege, #EMP sempre#! herege!"
 east_europe.0115.b.toast: "[accuser.GetShortUIName] enfurecid[accuser.Custom('ES_OA')] pela sua evasão"
 east_europe.0116.t: "$east_europe.0111.t.setup$: Uma Mudança de Coração"
 east_europe.0116.desc: "[hof.GetTitledFirstName] requiere un acto total de arrepentimiento: una conversión, abrazar totalmente el [hof.GetFaith.GetNameNoTooltip].\n\nSin embargo, yo sé que mis hermanos [heretic.GetFaith.GetAdherentNamePluralNoTooltip] son fuertes. Tal vez sería suficiente con convertirme #EMP yo#! solo.\n\nPor otra parte, eso solo retrasaría el asunto. Tal vez sea mejor que aceptemos este cambio ahora que podemos hacerlo pacíficamente."
 east_europe.0116.a: "Não, uma conversão pessoal bastará."
 east_europe.0116.b: "Chega, todos nós seremos devotos [hof.GetFaith.GetAdherentNamePluralNoTooltip]!"
 east_europe.0117.t: "$east_europe.0111.t.setup$: Um Alívio Temporário"
 east_europe.0117.desc.intro: "Infelizmente, [hof.GetTitledFirstName|l] escolheu #EMP no#! denunciar a $bosnian_church$ por heresia.\n\n"
 east_europe.0117.desc.critical_success: "Pior ainda, de algum modo, [heretic.GetTitledFirstName|l] persuadiu o [hof.GetFaith.ReligiousHeadName] a me excomungar! Que feitiçaria nefasta ou segredo obscuro levou a isso, ninguém além de [heretic.GetFirstNameNoTooltip] pode saber, mas agora todos os lordes cristãos me olham com um nojo geralmente reservado a pagãos e cismáticos."
 east_europe.0117.desc.theological_debate: "Muitas semanas de intenso debate erudito entre [hof.GetSheHe] e [heretic.GetTitledFirstName|l] têm feito com que o/a [hof.GetFaith.ReligiousHeadName] vá aos poucos se aproximando da forma de pensar de [heretic.GetFirstNameNoTooltip], aceitando que os [heretic.GetFaith.GetAdherentNamePluralNoTooltip] são apenas [hof.GetFaith.GetAdherentNamePluralNoTooltip] um pouco atrasados."
 east_europe.0117.desc.political_leverage: "As circunstâncias em torno disso são duvidosas, no mínimo, pois as conclusões dos inquisidores enviados a [heretic.GetPrimaryTitle.GetNameNoTierNoTooltip] são tanto públicas quanto completamente condenatórias. Parece que algum #EMP outro#! fator influenciou a mente do [hof.GetFaith.ReligiousHeadName]."
 east_europe.0117.desc.political_manoeuvrings: "Muitas semanas de intensa redação de cartas, testemunhos falsificados e suborno de inquisidores enviados para investigar [heretic.GetPrimaryTitle.GetNameNoTierNoTooltip] convenceram [hof.Custom('ES_AlAla')] [hof.GetFaith.ReligiousHeadName] de que minhas acusações eram motivadas apenas por um possível ganho político e eram completamente espúrias."
 east_europe.0117.desc.outro: "\n\nDe momento, los herejes respiran tranquilos, por ahora. Otros [hof.GetFaith.ReligiousHeadName]s puede que no los miren con tanta simpatía…"
 east_europe.0117.a: "Argh, perda de tempo e esforço."
 east_europe.0117.b: "Isso é um ultraje!"
 east_europe.0117.c: "[accuser.GetFaith.HighGodName] pode perdoar, mas eu não!"
 east_europe.0117.c.toast: "$east_europe.0115.b.toast$"
 east_europe.0117.d: "Recusar #EMP me#! a comunhão? Então fundarei minha própria #EMP maldita#! igreja!"
 east_europe.0118.t: "$east_europe.0111.t.setup$: Espaço para Respirar"
 east_europe.0118.desc.intro: "Levaram semanas de negociação e cartas cuidadosamente redigidas, mas, enfim [hof.GetTitledFirstName|l] se aproximou do meu ponto de vista.\n\n"
 east_europe.0118.desc.critical_success: "Na verdade, usando uma influência excessiva sobre o(a) [hof.GetFaith.ReligiousHeadTitleName], consegui até mesmo reverter a situação contra [accuser.Custom('ES_DelDela')] [accuser.Custom2('InsultAdjective', ROOT.Char)] [accuser.GetTitledFirstName|l].\n\nPor suas acusações espúrias contra cristãos fiéis, [hof.Custom('ES_ElLa')] [hof.GetTitledFirstNameNoTooltip|l] concordou em excomungar[accuser.GetHerHim]!"
 east_europe.0118.desc.theological_debate: "Embora o [hof.GetFaith.ReligiousHeadTitleName] ainda nos considere selvagens atrasados, admite que, embora equivocados, não somos hereges."
 east_europe.0118.desc.political_leverage: "Toda essa provação me custou a influência que eu tinha sobre o [hof.GetFaith.ReligiousHeadTitleName], mas [hof.GetTitledFirstNameNoTooltip|l] concordou relutantemente que não somos hereges, apenas ignorantes."
 east_europe.0118.desc.political_manoeuvrings: "O processo exigiu não poucas contra-acusações, cartas forjadas de [accuser.GetTitledFirstName|l] e subornos bem aplicados a inquisidores visitantes, mas o [hof.GetFaith.ReligiousHeadTitleName] nos declarou formalmente inocentes e toda a questão como um assunto local."
 east_europe.0118.desc.outro: "\n\nFiéis [heretic.GetFaith.GetAdherentNamePluralNoTooltip] em toda parte podem respirar aliviados."
 east_europe.0118.a: "[heretic.GetFaith.FateGodName] sorri para nós!"
 east_europe.0118.b: "Só fico feliz que esta questão esteja enfim encerrada."
 east_europe.0119.t: "$east_europe.0111.t.setup$: Tolerância Revogada"
 east_europe.0119.desc.intro: "Como era de se esperar, assim que começou a investigar o assunto seriamente, [hof.GetTitledFirstName|l] descobriu #EMP grandes#! provas de heresia entre os [heretic.GetFaith.GetAdherentNamePluralNoTooltip].\n\n"
 east_europe.0119.desc.theological_debate: "Naturalmente, [heretic.GetTitledFirstName|l] tentou se esquivar, mas o/a [hof.GetFaith.ReligiousHeadName] varreu seus mesquinhos argumentos teológicos com escárnio."
 east_europe.0119.desc.political_manoeuvrings: "[heretic.GetTitledFirstName] tentou classificar minha carta como cínica e interesseira, mas sua postura política grosseira não recebeu qualquer simpatia [hof.Custom('ES_DelDela')] [hof.GetFaith.ReligiousHeadName], que, por sua vez, o condenou como nada mais do que uma forma de desviar a questão."
 east_europe.0119.desc.unrepentant_heretics: "Ao ser confrontad[heretic.Custom('ES_OA')], [heretic.GetTitledFirstName|l] não fez esforço para esconder seu desprezo pelo/pela [hof.GetFaith.ReligiousHeadTitleName], zombando abertamente de [hof.Custom('ES_DelDela')] [hof.GetFaith.ReligiousHeadName] enquanto protestava a validade de sua fé corrompida!"
 east_europe.0119.desc.outro: "\n\nForam enviadas cartas a todos os cristãos vizinhos de toda fé justa, denunciando [heretic.GetFirstNameNoTooltip] e sua fé blasfema."
 east_europe.0119.a: "Justiça!"
 east_europe.0120.t: "[hof.Custom2('AppropriateGreeting',heretic)]"
 east_europe.0120.desc.intro: "Dói-me informar que considero sua fé extremada e desviante, e não, como eu esperava, apenas atrasada e passível de correção.\n\n"
 east_europe.0120.desc.theological_debate: "Suas desculpas mal formuladas caem em ouvidos surdos. Esses argumentos teológicos infundados apenas #EMP provam#! sua culpa, e eu não posso tolerar tal pensamento heterodoxo."
 east_europe.0120.desc.political_manoeuvrings: "Suas tentativas de denunciar isso como um movimento puramente político e cínico são mentiras desesperadas de um heresiarca depravado, e não permitirei esse questionamento das motivações dos bons [hof.GetFaith.GetAdherentNamePluralNoTooltip]."
 east_europe.0120.desc.unrepentant_heretics: "Que você admita sua culpa tão abertamente me confunde e entristece, pois mostra que não há chance de redenção para você. Rezo pelas almas obscurecidas de seus súditos perdidos, mas necessidade é necessidade."
 east_europe.0120.desc.outro: "\n\nA partir deste dia, os [heretic.GetFaith.GetAdherentNamePluralNoTooltip] serão vistos como hereges por todos os cristãos justos. Que sua imundície apodreça no inferno!"
 east_europe.0120.a: "Isso é um desastre!"
 east_europe.0120.a.tt: "[hof.GetFaith.GetAdherentNamePluralNoTooltip|U] famintos se voltam para suas terras…"
 east_europe.0121.t: "$east_europe.0119.t$"
 east_europe.0121.desc.intro: "Nas últimas semanas, travou-se uma encarniçada disputa de palavras a três entre [accuser.GetFullName] , [heretic.GetFullName] e [hof.GetTitledFirstName|l] sobre o status ecumênico da $bosnian_church$.\n\n"
 east_europe.0121.desc.theological_debate: "A maioria das discussões tem sido de natureza teológica, com [heretic.GetFirstNameNoTooltip] tentando assegurar a [hof.GetTitledFirstNameNoTooltip|l] que os [heretic.GetFaith.GetAdherentNamePluralNoTooltip] são bons [hof.GetFaith.GetAdherentNamePluralNoTooltip], apenas com modos rurais.\n\nInfelizmente para [heretic.Custom('ES_ElElla')], isso não funcionou."
 east_europe.0121.desc.political_manoeuvrings: "Apesar dos melhores esforços de [heretic.GetFirstNameNoTooltip] para pintar a acusação de [accuser.GetFirstNameNoTooltip] como uma mera manobra política, o/a [hof.GetFaith.ReligiousHeadName] se posicionou contra [heretic.GetSheHe].\n\n"
 east_europe.0121.desc.unrepentant_heretics: "No final, parece que a posição de [heretic.GetFirstNameNoTooltip] estava condenada desde o início, pois optou por admitir as acusações de heterodoxia enquanto tentava, ainda assim, apresentar sua fé como válida.\n\n"
 east_europe.0121.desc.outro: "Por decreto de [hof.GetTitledFirstNameNoTooltip|l], a partir de hoje os [heretic.GetFaith.GetAdherentNamePluralNoTooltip] são considerados hereges por todos os cristãos ecumênicos!"
 east_europe.0121.a: "Hereges? Em nosso meio?!"
 east_europe.0121.b: "Sinceramente, não me importo."
 east_europe.0121.c: "Nós só queríamos ser deixados em paz!"
 east_europe.0123.t: "$east_europe.0124.t$"
 east_europe.0123.desc.intro: "$east_europe.0124.desc.intro$"
 east_europe.0123.desc.hof_died: "Com a morte de [hof.GetTitledFirstName|l], a força eclesiástica que impulsionava a inquisição em [heretic.GetPrimaryTitle.GetNameNoTierNoTooltip] desapareceu."
 east_europe.0123.desc.heretic_died: "Com a morte de [heretic.GetTitledFirstName|l], [hof.GetTitledFirstName|l] parece contentar-se em presumir que qualquer heresia significativa também morreu, e a inquisição enviada a [heretic.GetPrimaryTitle.GetNameNoTierNoTooltip] foi chamada de volta."
 east_europe.0123.desc.hof_no_longer_hof: "$east_europe.0124.desc.hof_no_longer_hof$"
 east_europe.0123.desc.heretic_not_independent_ruler: "Como [heretic.GetTitledFirstName|l] já não é um[heretic.Custom('ES_XA')] governante cristão[heretic.Custom('ES_OA')] independente, para [hof.GetTitledFirstName|l] já não parece que valha a pena ser investigad[heretic.Custom('ES_OA')] como fonte de heresia."
 east_europe.0123.desc.heretic_now_ecumenical_christian: "Com a conversão de [heretic.GetTitledFirstName|l] ao [heretic.GetFaith.GetName], [hof.GetTitledFirstName|l] foi convencid[hof.Custom('ES_OA')] de sua sincera devoção a [hof.GetFaith.HighGodName]."
 east_europe.0123.desc.heretic_now_different_heresy: "Com a conversão de [heretic.GetTitledFirstName|l] ao [heretic.GetFaith.GetName], a questão da heresia passou de "hipótese" a "realidade": os inquisidores de [hof.GetFaith.ReligiousHeadName] são incapazes de investigar heterodoxias em um reino abertamente governado por um[heretic.Custom('ES_XA')] herege."
 east_europe.0123.desc.heretic_now_infidel: "Com a conversão de [heretic.GetTitledFirstName|l] ao [heretic.GetFaith.GetName] , est[heretic.Custom('ES_EA')] passou de herege em potencial a infiel confirmad[heretic.Custom('ES_OA')]. Nem é preciso dizer que os inquisidores de [hof.GetFaith.ReligiousHeadName] foram expulsos sem cerimônia de [heretic.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 east_europe.0123.desc.heretic_now_heathen: "Com a conversão de [heretic.GetTitledFirstName|l] ao [heretic.GetFaith.GetName] , est[heretic.Custom('ES_EA')] passou de herege em potencial a infiel assumid[heretic.Custom('ES_OA')] . Na esteira desse tapa descarado no rosto de [hof.GetFaith.HighGodName] , o status ecumênico da $bosnian_church$ não parece nada importante."
 east_europe.0123.desc.fallback: "$east_europe.0124.desc.fallback$"
 east_europe.0123.desc.outro: "$east_europe.0124.desc.outro$"
 east_europe.0123.a: "Não era para terminar assim!"
 east_europe.0124.t: "$east_europe.0111.t.setup$: O Caso Vacila"
 east_europe.0124.desc.intro: "Ao que parece, a sorte está com os $bosnian_church_adherent_plural$.\n\n"
 east_europe.0124.desc.hof_died: "Após a morte de [hof.GetTitledFirstName|l], a inquisição em [heretic.GetPrimaryTitle.GetNameNoTierNoTooltip] desmoronou-se, com muitos dignitários eclesiásticos importantes sendo chamados de volta para tratar da sucessão eclesiástica."
 east_europe.0124.desc.heretic_died: "Após a morte de [heretic.GetTitledFirstName|l] , [hof.GetTitledFirstName|l] parece satisfeito que qualquer desvio importante entre os $bosnian_church_adherent_plural$ certamente logo desapareça, já que a supost[heretic.Custom('ES_OA')] heresiarca foi para o [hof.GetFaith.NegativeAfterLife|U], dizem."
 east_europe.0124.desc.hof_no_longer_hof: "Com a deposição de [hof.Custom('ES_DelDela')] ex[absolute_faith.ReligiousHeadName|l] [hof.GetFirstName], o caos envolveu a inquisição em [heretic.GetPrimaryTitle.GetNameNoTierNoTooltip], e qualquer chance de um veredicto útil se dissipou."
 east_europe.0124.desc.heretic_not_independent_ruler: "Ahora que [Select_CString(heretic.IsLocalPlayer,'ya no',heretic.GetShortUIName)] [Select_CString(heretic.IsLocalPlayer,'soy','ya no es')] un[heretic.Custom('ES_XA')] gobernante cristian[heretic.Custom('ES_OA')] independiente, [hof.GetTitledFirstName|l] no cree que merezca la pena investigar[Select_CString(heretic.IsLocalPlayer,'me','')][heretic.Custom('ES_LoLa')]."
 east_europe.0124.desc.heretic_now_ecumenical_christian: "Com minha recente conversão a [heretic.GetFaith.GetName], [hof.GetTitledFirstName|l] já não tem motivo para duvidar de minha fé em [hof.GetFaith.HighGodName]."
 east_europe.0124.desc.heretic_now_different_heresy: "Com minha recente conversão a [heretic.GetFaith.GetName], [hof.GetTitledFirstName|l] #EMP ya#! me considera um[ROOT.Char.Custom('ES_XA')] herege e está muito ocupad[hof.Custom('ES_OA')] condenando minha falta de fé, para apoiar seriamente sua própria inquisição que investiga alguma heresia potencial menor."
 east_europe.0124.desc.heretic_now_infidel: "Com minha recente conversão ao [heretic.GetFaith.GetName|l] , [hof.Custom('ES_ElLa')] [hof.GetTitledFirstName|l] proclamou que sou [hof.Custom('GetDerogatoryNonbeliever')] e traidor[ROOT.Char.Custom('ES_XA')] aos olhos de [hof.GetFaith.HighGodName]. Os crimes potenciais dos $bosnian_church_adherent_plural$ parecerão bem leves em comparação."
 east_europe.0124.desc.heretic_now_heathen: "Ante minha recente conversão ao [heretic.GetFaith.GetName|l] , [hof.Custom('ES_ElLa')] [hof.GetTitledFirstName|l] proclamou que sou um demônio [hof.Custom('GetDerogatoryNonbeliever')] desalmado e apóstata da pior espécie. Se ainda me importasse um mínimo que fosse do deus morto dele, suponho que isso poderia me magoar um pouco."
 east_europe.0124.desc.fallback: "Mudanças nas circunstâncias, além do nosso controle, frustraram qualquer chance de sucesso da inquisição em [heretic.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 east_europe.0124.desc.outro: "\n\nPor ora, o [absolute_faith.ReligiousHeadTitleName] abandonou o caso, insistindo que tem assuntos mais urgentes para tratar."
 east_europe.0124.a: "Bem, pelo menos isso está resolvido."
 east_europe.0141.t: "Último Suspiro das Grandes Migrações"
 east_europe.0141.desc: "La vida en las estepas puede ser dura en el mejor de los momentos. Pero ahora se ha vuelto aún más dura con otras tribus envidiosas que buscan perseguirnos por nuestros éxitos. Pechenegos, jázaros y otros acuden desde muy lejos para acosar a nuestra confederación.\n\nHace siglos, pueblos enteros abandonaron esta vida por los fértiles campos y débiles reinos de Europa.\n\nHoy he decidido emular el éxito de estos antiguos nómadas y crear un nuevo hogar para los $mogyer_collective_noun$ en la lejana Panonia, desarraigando en el proceso mi propio señorío.\n\nPronto atravesaremos los Cárpatos y abriremos un nuevo capítulo para nuestro pueblo."
 east_europe.0141.a: "Para a Panônia!"
 east_europe.0141.a.tt: "Você pode usar o [hungarian_invasion_casus_belli|lE] especial de uso único contra qualquer governante dentro da Panônia"
 east_europe.0142.t: "$east_europe.0141.t$"
 east_europe.0142.desc: "Em uma jogada inesperada, meu vassal[mogyer_invader.Custom('ES_OA')] , [mogyer_invader.GetShortUIName] enviou emissários para me informar de que pretende tirar seu povo de seu domínio atual e se mudar integralmente para a Panônia.\n\nSe isso for bem-sucedido, é provável que meu controle na área se desintegre."
 east_europe.0142.a: "Uma missão temerária!"
 east_europe.0142.a.tt: "O $mogyer_collective_noun$ inicia a [hungarian_invasion|lE]"
 east_europe.0143.t: "$east_europe.0141.t$"
 east_europe.0143.desc.pannonian_capital: "Terríveis notícias chegam da estepe! Comerciantes e espiões trazem a notícia"
 east_europe.0143.desc.pannonian_territory: "Notícias preocupantes da estepe! Senhores locais afirmam"
 east_europe.0143.desc.fallback: "Más notícias da estepe! Vassalos aflitos encaminharam relatos"
 east_europe.0143.desc.outro: "que [mogyer_invader.GetShortUIName], um[mogyer_invader.Custom('ES_XA')] cacique $mogyer$, está reunindo todas as forças de seu senhorio para lançar uma invasão total da Panônia.\n\nE neste momento, a horda $mogyer$ se reúne e se prepara para inundar a planície em suas montarias demoníacas e virar de cabeça para baixo toda a ordem local!"
 east_europe.0143.a: "Certamente eles nunca cruzarão os Cárpatos?"
 east_europe.0143.a.tt: "$east_europe.0142.a.tt$"
 #LIVONIAN DECISIONS
 east_europe.0200.t: "O(A) [founder.GetTitleAsNameNoTooltip] da Livônia"
 east_europe.0200.desc.christian: "Las tierras bálticas han sido durante siglos nada más que el hogar primitivo y agreste de diversas fes heréticas y adoradores del diablo. Con la coronación de un[founder.Custom('ES_XA')] [founder.GetTitleAsNameNoTooltip] de Livonia que sigue el [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip], el poder de [founder.GetFaith.HighGodName] calienta esta tierra húmeda y gélida.\n\nCon el éxito de la misión del [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip|l] en las tierras bálticas, soy libre de proclamar Livonia; un título que unirá a todos los bálticos en nuestra misión compartida de extender la palabra de [founder.GetFaith.random_GoodGodNames]."
 east_europe.0200.desc.nonchristian: "Los bálticos hemos estado siglos sin un reino para nuestra propia gente, mientras los vikingos asolaban nuestras aldeas costeras y los misioneros forasteros de tierras lejanas nos llamaban primitivos e indomables, pero se acabó. Los diferentes pueblos bálticos ahora se arrodillan juntos ante la corona de Livonia.\n\nCon mi coronación como [founder.GetTitleAsNameNoTooltip], anunciaré una edad dorada no solo para la nación [founder.GetCulture.GetName], sino para todos los bálticos que flanquean las costas."
 east_europe.0200.desc.outro: "\n\nTenho o destino dos Bálticos em minhas mãos e, com a fundação deste Reino, inaugurarei uma nova era de ouro de fé e glória sob [founder.GetFaith.HighGodName]."
 east_europe.0200.a: "Meu legado sobreviverá à minha vida!"
 east_europe.0200.b: "Por [founder.GetFaith.HighGodName] e glória!"
 east_europe.0201.t: "$east_europe.0101.t$"
 east_europe.0201.desc: "Os arautos trazem notícias das frias costas da Livônia: [founder.GetShortUIName] foi proclamad[founder.Custom('ES_OA')] [founder.GetTitleAsNameNoTooltip] de [founder.GetPrimaryTitle.GetNameNoTier].\n\nAgora que todos os bálticos estão unidos sob um único estandarte, parece que o povo da Livônia finalmente terá uma identidade unificadora em torno da qual se reunir para defender sua terra natal, em vez de estar disperso e confuso.\n\nCom esse ato de unificação, a Livônia parece estar em boas mãos… por enquanto."
 east_europe.0201.a: "Eles ainda são bárbaros."
 east_europe.0201.b: "Salve [founder.GetShortUINameNoTooltip]!"
 east_europe.0201.c: "Unidos ou divididos, os bálticos não durarão."
