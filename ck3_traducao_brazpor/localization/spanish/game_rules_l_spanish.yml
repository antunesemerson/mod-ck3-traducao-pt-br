 setting_eastern_rome_name_of_byzantium: "#high $e_eastern_roman_empire$#!"
 setting_eastern_rome_name_of_byzantium_desc: "O nome de $e_byzantium$ será alterado para $e_eastern_roman_empire$."
 setting_roman_empire_name_of_byzantium: "#high $h_roman_empire$#!"
 setting_roman_empire_name_of_byzantium_desc: "O nome de $e_byzantium$ será alterado para $h_roman_empire$."
 setting_romania_name_of_byzantium: "#high $e_romania_empire$#!"
 setting_romania_name_of_byzantium_desc: "O nome de $e_byzantium$ será alterado para $e_romania_empire$."
 setting_empire_of_the_greeks_name_of_byzantium: "#high $e_empire_of_the_greeks$#!"
 setting_empire_of_the_greeks_name_of_byzantium_desc: "O nome de $e_byzantium$ será alterado para $e_empire_of_the_greeks$."
 setting_rhomaion_name_of_byzantium: "#high $e_rhomaion$#!"
 setting_rhomaion_name_of_byzantium_desc: "O nome de $e_byzantium$ será alterado para $e_rhomaion$."
 setting_unholy_roman_empire_name_of_byzantium: "#high $e_unholy_roman_empire$#!"
 setting_unholy_roman_empire_name_of_byzantium_desc: "O nome de $e_byzantium$ será alterado para $e_unholy_roman_empire$."
 rule_exclave_independence: "Independência de Exclaves"
 setting_off_exclave_independence: "#high Desligado#!"
 setting_off_exclave_independence_desc: "Governantes Independentes podem ter exclaves (terras desconectadas) em qualquer lugar do mundo."
 setting_limited_exclave_independence: "#high Limitado#!"
 setting_limited_exclave_independence_desc: "Exclaves de Governantes Independentes em paz serão removidos na sucessão, a menos que estejam conectados à área da Capital por um Condado, por uma rota naval ou por fazerem parte do território De Jure."
 setting_significant_exclave_independence: "#high Significativo#!"
 setting_significant_exclave_independence_desc: "Exclaves de Governantes Independentes em paz serão removidos na sucessão, a menos que estejam conectados por uma rota naval ou por fazerem parte do território De Jure."
 setting_total_exclave_independence: "#high Total#!"
 setting_total_exclave_independence_desc: "Exclaves de Governantes Independentes em paz serão removidos na sucessão, a menos que estejam conectados por uma rota naval."
 setting_ai_limited_exclave_independence: "#high Limitado (Apenas IA)#!"
 setting_ai_limited_exclave_independence_desc: "Exclaves de Governantes Independentes da IA em paz serão removidos na sucessão, a menos que estejam conectados à área da Capital por um Condado, por uma rota naval ou por fazerem parte do território De Jure."
 setting_ai_significant_exclave_independence: "Significativo (Apenas IA)"
 setting_ai_significant_exclave_independence_desc: "Exclaves de Governantes Independentes da IA em paz serão removidos na sucessão, a menos que estejam conectados por uma rota naval ou por fazerem parte do território De Jure."
 setting_ai_total_exclave_independence: "#high Total (Apenas IA)#!"
 setting_ai_total_exclave_independence_desc: "Exclaves de Governantes Independentes da IA em paz serão removidos na sucessão, a menos que estejam conectados por uma rota naval."
 rule_regional_heresy: "Heresias Regionais"
 setting_default_regional_heresy: "Padrão"
 setting_default_regional_heresy_desc: "Surtos de heresia em certas regiões têm mais chance de ser heresias históricas, como o Lollardismo na Inglaterra."
 setting_strict_regional_heresy: "#high Estrito#!"
 setting_strict_regional_heresy_desc: "Surtos de heresia em certas regiões quase sempre serão heresias históricas."
 setting_relaxed_regional_heresy: "#high Flexível#!"
 setting_relaxed_regional_heresy_desc: "Surtos de heresia não têm peso regional, incentivando o aparecimento de heresias mais diversas."
 rule_hungarian_migration: "Migração Húngara"
 setting_launch_historical: "#high Histórica#!"
 setting_launch_historical_desc: "A IA tentará iniciar a Migração Húngara entre 890 e 910."
 setting_launch_immediate: "Imediata"
 setting_launch_immediate_desc: "A Migração Húngara já estará ativa no início do jogo."
 setting_launch_random: "#high Aleatória#!"
 setting_launch_random_desc: "A IA tentará iniciar a Migração Húngara a qualquer momento entre 5 anos após o início do jogo e 910."
 setting_launch_off: "#high Apenas Jogador#!"
 setting_launch_off_desc: "A IA não tentará iniciar a Migração Húngara."
 rule_matrilineal_marriages: "Casamentos Matrilineares"
 setting_default_matrilineal_marriages: "Padrão"
 setting_default_matrilineal_marriages_desc: "Os personagens de IA arranjarão casamentos [Concept( 'matrilineal', 'matrilineales' )|E] se pertencerem à família próxima do jogador, a uma [dynasty|lE] de [dynasty_prestige_level_4|L], a um reino com [GetLaw('equal_law').GetName] ou forem [rulers|lE] fortes. Os reinos com [GetFaithDoctrine('doctrine_gender_female_dominated').GetBaseName] são matrilineares por padrão."
 setting_matrilineal_marriages_no_player_exception: "#high Padrão (sem exceção para Jogador)#!"
 setting_matrilineal_marriages_no_player_exception_desc: "Os personagens de IA arranjarão matrimônios [Concept( 'matrilineal', 'matrilineales' )|E] se pertencerem a uma [dynasty_prestige_level_4|L] [dynasty|lE], a uma dinastia [GetLaw('equal_law').GetName], ou forem [rulers|lE] fortes. Os reinos com [GetFaithDoctrine('doctrine_gender_female_dominated').GetBaseName] são matrilineares por padrão."
 setting_matrilineal_marriages_always: "#high Sempre#!"
 setting_matrilineal_marriages_always_desc: "Os personagens da IA vão querer arranjar casamentos [Concept( 'matrilineal', 'matrilineales' )|E] para todos os membros da [dynasty|lE]. Assim como na regra #high $setting_default_matrilineal_marriages$#!, ainda haverá casamentos [Concept( 'patrilineal', 'patrilineales' )|E] se forem considerados suficientemente vantajosos."
 setting_matrilineal_marriages_female_and_equal: "#high Dominância Feminina e Igualdade#!"
 setting_matrilineal_marriages_female_and_equal_desc: "Os personagens da IA só arranjarão casamentos [Concept( 'matrilineal', 'matrilineales' )|E] se fizerem parte de um reino com [GetFaithDoctrine('doctrine_gender_female_dominated').GetBaseName] ou [GetLaw('equal_law').GetName]. Assim como nas regras de #high $setting_default_matrilineal_marriages$#!, ainda haverá casamentos [Concept( 'patrilineal', 'patrilineales' )|E] se forem considerados suficientemente favoráveis."
 setting_matrilineal_marriages_never: "#high Nunca#!"
 setting_matrilineal_marriages_never_desc: "Personagens da IA nunca arranjarão casamentos [Concept( 'matrilineal', 'matrilineales' )|E], a menos que façam parte de um reino com [GetFaithDoctrine('doctrine_gender_female_dominated').GetBaseName]."
 rule_dlc_fp1_scandinavian_adventurers: "Aventureiros Escandinavos"
 setting_fp1_scandi_adventurers_rare: "Raros"
 setting_fp1_scandi_adventurers_rare_desc: "Aventureiros escandinavos tentarão visar a Rússia e o Mar do Norte a cada 15 anos."
 setting_fp1_scandi_adventurers_occasional: "Ocasionais"
 setting_fp1_scandi_adventurers_occasional_desc: "Aventureiros escandinavos tentarão visar a Rússia e o Mar do Norte a cada 10 anos."
 setting_fp1_scandi_adventurers_frequent: "Frequentes"
 setting_fp1_scandi_adventurers_frequent_desc: "Aventureiros escandinavos tentarão visar a Rússia e o Mar do Norte a cada 5 anos."
 setting_fp1_scandi_adventurers_apocalyptic: "Apocalípticos"
 setting_fp1_scandi_adventurers_apocalyptic_desc: "Aventureiros escandinavos tentarão visar a Rússia e o Mar do Norte todos os anos; personagens da IA não exigem traços específicos para lançar [varangian_adventures|lE]."
 setting_fp1_scandi_adventurers_off: "Desligado"
 setting_fp1_scandi_adventurers_off_desc: "Aventureiros escandinavos nunca tentarão visar a Rússia nem o Mar do Norte."
 rule_hybrid_culture_ai_frequency: "Frequência de Culturas Híbridas"
 setting_default_hybrid_culture_ai_frequency: "Padrão"
