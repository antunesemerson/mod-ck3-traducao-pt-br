 setting_on_generate_families_ai_only_desc: "A maioria dos personagens históricos da IA com terras e sem família registrada terá um cônjuge e até três filhos gerados para si. Isso aumenta o risco de um [game_over|lE] precoce."
 rule_mongol_invasion: "Invasão Mongol"
 setting_default_mongol_invasion: "Padrão"
 setting_default_mongol_invasion_desc: "Os mongóis invadirão por volta do ano 1200, desativando permanentemente a [decision|lE] $mpo_become_greatest_of_khans_decision$. Se Temüjin morrer sem formar o Império Mongol, a Invasão será adiada em pelo menos #high 50 anos#!."
 setting_never_mongol_invasion: "#high Nunca#!"
 setting_never_mongol_invasion_desc: "Os mongóis não invadirão."
 setting_random_mongol_invasion: "#high Aleatória#!"
 setting_random_mongol_invasion_desc: "Os mongóis invadirão em uma data aleatória. Assim, isso pode invalidar permanentemente a qualquer momento a [decision|lE] $mpo_become_greatest_of_khans_decision$ para governantes [Concept('nomadic', 'nómadas')|E]!"
 rule_random_harm: "Dano Aleatório"
 setting_harm_dangerous: "Perigoso"
 setting_harm_dangerous_desc: "Acidentes, azar e os caprichos mercuriais do Destino podem infligir [character_death_death|lE], a [trait|lE] [GetTrait('incapable').GetName(GetNullCharacter)] e perda de [health|lE] aleatoriamente."
 setting_harm_illusion_of_safety: "#high Ilusão de Segurança#!"
 setting_harm_illusion_of_safety_desc: "Eventos aleatórios [Concept( 'character_death_death', 'mortales' )|E] ou incapacitantes são muito mais raros. Até deixarem de ser."
 setting_harm_safe: "#high Seguro#!"
 setting_harm_safe_desc: "Eventos aleatórios nocivos não matarão nem mutilarão [characters|lE]. Eles ainda podem morrer prematuramente em outros eventos, especialmente se estiverem em situações perigosas."
 setting_harm_tragic: "#high Trágico#!"
 setting_harm_tragic_desc: "Não são só os bons que morrem jovens — agora você também pode, com chances aumentadas de eventos aleatórios nocivos para todos!"
 setting_harm_spiteful: "[game_rule_extreme_i|E] #high Maldoso#!"
 setting_harm_spiteful_desc: "O Destino concentra sua ira cruel em [characters|lE] notáveis: aqueles com [skills|lE] altas, [traits|lE] herdáveis, conquistas marcantes e assim por diante."
 setting_harm_tragically_spiteful: "[game_rule_extreme_i|E] #high Tragicamente Maldoso#!"
 setting_harm_tragically_spiteful_desc: "A chance de todos sofrerem eventos aleatórios nocivos aumenta consideravelmente, mas especialmente a de qualquer um de #EMP destaque#!."
 rule_random_harm_target: "Alvo de Dano Aleatório"
 setting_random_harm_boilerplate: "Eventos que matam, incapacitam ou prejudicam a [health|lE] de [characters|lE] aleatoriamente podem acontecer com"
