 de_jure_requirement_desc: "Já não posso reivindicar ser o governante de [title_to_destroy.GetNameNoTierNoTooltip], pois não possuo nenhuma de suas terras De Jure."
 rule_empire_obscurity_requirement: "Obscuridade Imperial"
