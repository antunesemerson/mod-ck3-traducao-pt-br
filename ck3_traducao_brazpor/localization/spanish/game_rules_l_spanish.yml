 game_rule.1141.t: "O Witengamot Elege: [elect.GetFirstNameNoTooltip] de [elect.GetHouse.GetNameNoTooltip]"
 game_rule.1141.intro.battlefield: "[winner.Custom('ES_ElLa')|U] [winner.GetTitledFirstName|l] pereceu no campo de batalha, morrendo lutando contra [loser.Custom('ES_ElLa')] aspirante a usurpador[loser.Custom('ES_XA')], [loser.Custom('ES_ElLa')] [loser.GetTitledFirstNameNicknamed|l].\n\n"
 game_rule.1141.intro.home: "[winner.Custom('ES_ElLa')|U] [winner.GetTitledFirstName|l] morreu inesperadamente de um ataque cardíaco ao receber a boa notícia da derrota [loser.Custom('ES_DelDela')] [loser.GetTitledFirstNameNicknamed|l].\n\n"
 game_rule.1141.choice.margaret: "Por algum milagre confuso, o Witengamot me escolheu como candidata de compromisso, deixando #EMP mí#! herdeir[jiltee.Custom('ES_AlAla')] supost[jiltee.Custom('ES_OA')] como herdeir[jiltee.Custom('ES_OA')] [jiltee.GetFullNameNoTooltip], com um palmo de narizes. É evidente que os grandes earls acham que podem me controlar, pensando que sou uma marionete para suas ambições.\n\nNão sou nada disso, mas recebo com satisfação essa inesperada ascensão ao poder — afinal de contas, sou [Select_CString( ROOT.Char.IsFemale, 'la primogénita', 'el primogénito' )] de meu pai."
 game_rule.1141.choice.edgar: "Em um acesso de competência não visto na política inglesa há muitos, muitos anos, o witengamot considerou apropriado reconhecer que #EMP yo#! sou [Select_CString( ROOT.Char.IsFemale, 'la legítima heredera', 'el legítimo heredero' )] [GetScriptedCharacterByHistoryID( '114' ).Custom('ES_DelDela')] [GetScriptedCharacterByHistoryID( '114' ).GetTitledFirstNameNicknamed|l] e me nomeou para governar o reino, deixando [jiltee.Custom('ES_AlAla')] supost[jiltee.Custom('ES_OA')] herdeir[jiltee.Custom('ES_OA')], [jiltee.GetFullNameNoTooltip], com um chute no traseiro.\n\nNão poderia dizer o que fiz para merecer o favor [ROOT.Char.GetFaith.FateGodNamePossessive], mas estou imensamente feliz por tê-lo feito."
 game_rule.1141.choice.svend: "Cansado da morte e da destruição causadas por todos os demais pretendentes, o Witengamot decidiu — sensatamente, pela primeira vez — recorrer a #EMP mim#! como [Select_CString( ROOT.Char.IsFemale, 'a candidata', 'o candidato' )] mais natural para trazer ordem, deixando [jiltee.Custom('ES_AlAla')] supost[jiltee.Custom('ES_OA')] herdeir[jiltee.Custom('ES_OA')] [jiltee.GetFullNameNoTooltip] com o nariz torcido.\n\nMais uma vez, a Dinamarca assumirá seu lugar natural governando a Inglaterra."
 game_rule.1141.choice.aelfwine: "Tomado por alguma loucura arcana, o witengamot #EMP me#! me suplicou que eu voltasse para casa e governasse o reino de meu pai e de meu avô, deixando [jiltee.Custom('ES_AlAla')] supost[jiltee.Custom('ES_OA')] herdeir[jiltee.Custom('ES_OA')], [jiltee.GetFullNameNoTooltip], dando um chapéu no herdeiro esperado.\n\nEu… eu não tinha ambição nenhuma com isso. Não o queria. Afastei-me do poder o quanto pude, mas está claro que não há como escapar da vontade de [elect.GetFaith.HighGodNamePossessive] e que devo retornar às terras que deixei com alegria para sempre."
 game_rule.1141.choice.cadoc: "Em meio a brigas, como sempre, o witengamot chegou a uma decisão curiosa. Sem vontade de engolir outro rei estrangeiro e desconfiando uns dos outros, #EMP me#! me escolheram para reinar sobre a Inglaterra, claramente pensando que eu seria um fantoche fraco que eles poderiam moldar à sua vontade.\n\nTalvez eles tenham razão, talvez não; só posso receber com alegria esta oportunidade inesperada de provar a mim mesm[ROOT.Char.Custom('ES_OA')]!"
 game_rule.1141.a.margaret: "A primeira Rainha da Inglaterra!"
 game_rule.1141.a.edgar: "Meu direito de nascença, devolvido!"
 game_rule.1141.a.svend: "Eu sempre soube que acabaria assim."
 game_rule.1141.a.aelfwine: "Eu nunca pedi por isso!"
 #Geddit geddit GEDDIT d'you geddit
 game_rule.1141.a.cadoc: "Mesmo daqui a quinhentos anos, saberão meu nome!"
 game_rule.1142.t: "$game_rule.1141.t$"
 game_rule.1142.intro.battlefield: "[winner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] pereceu no campo de batalha, lutando contra o[loser.Custom('ES_ElLa')] usurpador em potencial[loser.Custom('ES_XA')]; [loser.Custom('ES_ElLa')] [loser.GetTitledFirstNameNicknamed|l]\n\n"
 game_rule.1142.intro.home: "[winner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] morreu inesperadamente de um ataque cardíaco ao receber a boa notícia da derrota [loser.Custom('ES_DelDela')] [loser.GetTitledFirstNameNicknamed|l]\n\n"
 game_rule.1142.choice.preamble: "Contra todas as probabilidades, no lugar de [winner.GetSheHe] o witengamot decidiu eleger [elect.GetFirstName] de [elect.GetHouse.GetName]…"
 game_rule.1142.choice.margaret: "sobrinha-neta [GetScriptedCharacterByHistoryID( '114' ).Custom('ES_DelDela')] [GetScriptedCharacterByHistoryID( '114' ).GetTitledFirstNameNicknamed|l] e filha [GetScriptedCharacterByHistoryID( '110' ).Custom('ES_DelDela')] errante [GetScriptedCharacterByHistoryID( '110' ).GetTitledFirstNameNicknamed|l]"
 game_rule.1142.choice.edgar: "sobrinho-neto [GetScriptedCharacterByHistoryID( '114' ).Custom('ES_DelDela')] [GetScriptedCharacterByHistoryID( '114' ).GetTitledFirstNameNicknamed|l], o herdeiro escolhido, antes que [winner.GetFirstNameNoTooltip] tomasse o poder, e filho [GetScriptedCharacterByHistoryID( '110' ).Custom('ES_DelDela')] errante [GetScriptedCharacterByHistoryID( '110' ).GetTitledFirstNameNicknamed|l]"
 game_rule.1142.choice.svend: "neto [GetScriptedCharacterByHistoryID( '101505' ).Custom('ES_DelDela')] [GetScriptedCharacterByHistoryID( '101505' ).GetTitledFirstNameNicknamed|l] e [elect.GetTitleAsNameNoTooltip|l] de [elect.GetPrimaryTitle.GetBaseNameNoTier], que decidiu não participar das etapas iniciais do conflito"
 game_rule.1142.choice.aelfwine: "neto [GetScriptedCharacterByHistoryID( '101510' ).Custom('ES_DelDela')] [GetScriptedCharacterByHistoryID( '101510' ).GetTitledFirstNameNicknamed|l], que viveu em exílio autoimposto como um humilde clérigo na Occitânia."
 game_rule.1142.choice.cadoc: "um nobre córnico de alguma linhagem impronunciável ou coisa parecida"
 game_rule.1142.outro: "... como nov[elect.Custom('ES_OA')] governante do reino em vez de #EMP mim#!.\n\nParece que a Inglaterra me escapou das mãos."
 game_rule.1142.a: "Isso é ultrajante, o trono é meu!"
 game_rule.1142.b: "A vontade do conselho é inabalável."
 game_rule.1142.c: "Tão perto de reinar, e ainda tão longe..."
