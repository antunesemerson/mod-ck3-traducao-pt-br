 rule_generate_families: "Gerar Famílias"
 setting_on_generate_families: "Ligado"
 setting_on_generate_families_desc: "A maioria dos personagens históricos com terras e sem família registrada terá um cônjuge e até três filhos gerados para si. Isso reduz o risco de um [game_over|lE] precoce."
 setting_off_generate_families: "#high Desligado#!"
 setting_off_generate_families_desc: "Personagens históricos com terras e sem família registrada NÃO terão uma família gerada para si. Isso aumenta o risco de um [game_over|lE] precoce."
