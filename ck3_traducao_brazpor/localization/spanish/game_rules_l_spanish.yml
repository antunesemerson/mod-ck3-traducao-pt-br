 setting_no_conquerors_inheritance_desc: "A personalidade de [Concept('ai_conqueror_personality', 'conquistador')|E] não será herdada."
 rule_de_jure_requirement: "Requisito De Jure"
 setting_on_de_jure_requirement: "#high Ligado#!"
 setting_on_de_jure_requirement_desc: "Títulos com terras De Jure acabarão sendo destruídos se um personagem não possuir nenhuma terra De Jure do título dentro de seu reino."
 setting_on_limited_de_jure_requirement: "Ligado (Limitado)"
 setting_on_limited_de_jure_requirement_desc: "Títulos com terras De Jure acabarão sendo destruídos se um personagem não possuir nenhuma terra De Jure do título dentro de seu reino. O Título Primário do Jogador nunca será destruído."
