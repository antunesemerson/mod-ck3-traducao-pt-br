 setting_on_empire_obscurity_requirement_desc: "[empires|lE] [de_jure|lE] serão destruídos, a menos que o titular controle pelo menos 20% de seus [counties|lE] De Jure."
 setting_off_empire_obscurity_requirement: "#high Desligado#!"
 setting_off_empire_obscurity_requirement_desc: "[empires|E] persistirão independentemente de quanta terra [de_jure|E] o titular controle."
 game_rule.4.t: "Obscuridade de [falling_empire.GetBaseNameNoTooltip]"
 game_rule.4.desc: "Não posso negar que meu amado império, [falling_empire.GetBaseName], caiu, e caiu muito...\n\nMal controlo qualquer parte de seus territórios tradicionais. Uma mera sombra do que foi, meu império está lenta, mas seguramente, desaparecendo na obscuridade."
 game_rule.4.a: "Só preciso de mais tempo!"
 game_rule.4.b: "Adeus, doce império..."
 rule_multiplayer_murder_schemes: "Multiplayer: Esquemas de Assassinato"
