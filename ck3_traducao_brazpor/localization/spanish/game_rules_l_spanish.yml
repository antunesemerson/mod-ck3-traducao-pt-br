 setting_default_conquerors_inheritance_desc: "A personalidade de [Concept('ai_conqueror_personality', 'conquistador')|E] [conqueror_i] e seus bônus serão herdados por todos os [heirs|lE] que se tornarem [rulers|lE] [Concept('independent', 'independientes')|E] na sucessão[succession|lE]."
