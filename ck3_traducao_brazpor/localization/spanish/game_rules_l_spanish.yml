 setting_less_common_hybrid_culture_ai_frequency: "#high Menos Comum#!"
 setting_less_common_hybrid_culture_ai_frequency_desc: "Menos [hybrid_cultures|lE] aparecerão."
 setting_none_hybrid_culture_ai_frequency: "#high Nenhuma#!"
 setting_none_hybrid_culture_ai_frequency_desc: "Nenhuma [hybrid_cultures|lE] criada por não jogadores aparecerá."
 rule_hybrid_culture_ai_restrictions: "Restrições de Culturas Híbridas"
 setting_default_hybrid_culture_ai_restrictions: "Padrão"
 setting_default_hybrid_culture_ai_restrictions_desc: "[hybrid_cultures|lE] criadas por não jogadores serão significativamente restringidas #weak (por exemplo, não surgirão Híbridas de duas culturas Híbridas já existentes)#!"
 setting_relaxed_hybrid_culture_ai_restrictions: "#high Flexível#!"
 setting_relaxed_hybrid_culture_ai_restrictions_desc: "Até certo ponto, [hybrid_cultures|lE] criadas por não jogadores podem surgir a partir de culturas Híbridas existentes."
 setting_very_relaxed_hybrid_culture_ai_restrictions: "#high Muito Flexível#!"
 setting_very_relaxed_hybrid_culture_ai_restrictions_desc: "[hybrid_cultures|lE] criadas por não jogadores têm apenas restrições nominais."
 rule_divergent_culture_ai_frequency: "Frequência de Culturas Divergentes"
 setting_default_divergent_culture_ai_frequency: "Padrão"
 setting_default_divergent_culture_ai_frequency_desc: "A quantidade padrão de [divergent_cultures|lE] aparecerá."
 setting_less_common_divergent_culture_ai_frequency: "#high Menos Comum#!"
 setting_less_common_divergent_culture_ai_frequency_desc: "Menos [divergent_cultures|lE] aparecerão."
 setting_none_divergent_culture_ai_frequency: "#high Nenhuma#!"
 setting_none_divergent_culture_ai_frequency_desc: "Nenhuma [divergent_cultures|lE] criada por não jogadores aparecerá."
 setting_relaxed_divergent_culture_ai_frequency: "#high Flexível#!"
 setting_relaxed_divergent_culture_ai_frequency_desc: "[divergent_cultures|lE] aparecerão com mais frequência, com a maioria das restrições mais severas removidas."
 rule_hybrid_and_divergence_cooldowns: "Tempos de Espera de Culturas Divergentes e Híbridas"
