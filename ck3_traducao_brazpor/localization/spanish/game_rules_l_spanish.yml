 game_rule.1101.desc.stamford_bridge: "at Stamford Bridge, a narrow stone pass barely wide enough for one person to cross at a time,"
 game_rule.1101.desc.hastings: "at a hill near the town of Hastings,"
 game_rule.1101.desc.dover: "atop the very White Cliffs of Dover themselves,"
 game_rule.1101.desc.isle_of_wight: "along the shores of the River Medina on the isolated Isle of Wight,"
 game_rule.1101.desc.forest_of_dean: "in the darkling woods of the Forest of Dean,"
 game_rule.1101.desc.london: "outside the very walls of London itself,"
 #And by Saxon, we mean Wessex: the only Saxons that count.
 ## Everyone else sucks.
 ### Someone had to say it & I'm not sorry that it was me.
 game_rule.1101.desc.winchester: "close to the old Saxon capital of Winchester,"
 game_rule.1101.desc.york: "near York, the Roman fort-city of Eboracum,"
 game_rule.1101.desc.lincoln: "near the ancient city of Lincoln,"
 #Non-zero chance that there was _some_ kind of teaching tradition here by 1066, but it definitely wasn't anything like the university it came to be.
 game_rule.1101.desc.oxford: "near the unremarkable town of Oxford,"
 game_rule.1101.desc.cirencester: "around the walls of old Cirencester,"
 game_rule.1101.desc.guildford: "along the ridge of the Hog's Back outside Guildford,"
 game_rule.1101.desc.lindisfarne: "across the shore from the island monastery of Lindisfarne, one of Britain's most sacred spaces,"
 game_rule.1101.desc.lands_end: "at the foot of Land's End, almost into the vastness of the Atlantic itself,"
 game_rule.1101.desc.stonehenge: "across the wide Salisbury Plain 'neath the shadow of Stonehenge,"
 #Destroyed in ~1014, rebuilt post-Conquest.
 game_rule.1101.desc.southwark: "near the ruins of London Bridge and the crossing from Southwark,"
 game_rule.1101.desc.scotland: "in neighboring Scotland's unfriendly soil,"
 game_rule.1101.desc.wales: "in the hills and valleys of Wales,"
 game_rule.1101.desc.norway: "in Norway itself,"
 game_rule.1101.desc.normandy: "in Normandy itself,"
 game_rule.1101.desc.france: "em solo francês,"
 game_rule.1101.desc.riverside: "através de uma estreita ponte de pedra sobre um rio em [new_location.GetName],"
 game_rule.1101.desc.coastal: "ao longo da costa de [new_location.GetName],"
 game_rule.1101.desc.forest: "nas florestas de [new_location.GetName],"
 game_rule.1101.desc.plains: "pelas planícies de [new_location.GetName],"
 game_rule.1101.desc.farmlands: "nas férteis terras agrícolas de [new_location.GetName],"
 game_rule.1101.desc.wetlands: "nos pântanos fétidos de [new_location.GetName],"
 game_rule.1101.desc.hills: "nas colinas ondulantes de [new_location.GetName],"
 game_rule.1101.desc.fallback: "em um campo sem nada de especial perto de [new_location.GetName],"
 game_rule.1101.desc.combat.commander: "e me vejo bem no meio de tudo."
 game_rule.1101.desc.combat.not_present: "embora eu não possa estar lá para ver pessoalmente."
 game_rule.1101.desc.combat.locale.stamford_bridge: "Durante toda a manhã, nossas tropas empurraram umas às outras de um lado para o outro da ponte, enquanto grupos dispersos vadearam o Rio Derwent para enfrentar seus inimigos na margem oposta a cada poucas horas.\n\nÉ... carnificina. Nada além de gritos e morte, pontuados pelo choque de corpos batendo na água. O Derwent corre vermelho, e ainda deve correr assim por milhas. Espada erguida, lanço-me em uma carga final para romper o impasse, avançando sobre a ponte com minhas tropas da casa e —"
 game_rule.1101.desc.combat.locale.hastings: "O mundo inteiro está em chamas com o choque de metal contra madeira, o estilhaçar de escudos, o relinchar de cavalos e o #EMP assobio#! constante de flechas lançadas ao céu aos milhares.\n\nTudo se reduz a gritos, sangue e vísceras. Os clamores dos feridos e moribundos, as maldições dos vingativos, a gargalhada jubilosa dos vitoriosos a cavalo, movidos pela adrenalina, lançando-se ainda mais no combate.\n\nO destino se encontra em equilíbrio na lâmina de uma faca, e com um grito de #EMP A MÍ!#!, lanço minhas tropas adiante."
 game_rule.1101.desc.combat.locale.dover: "Tão perto da borda perigosa, ambos os exércitos manobram apenas para forçar seu inimigo a cair do precipício... com efeito limitado.\n\nO fedor de sangue polui o ar, o estrondo da batalha certamente se estende por quilômetros. Um observador azarado talvez até consiga distinguir o ocasional pontinho de um corpo despencando pela escarpa esbranquiçada.\n\nIsso não pode continuar; isso #EMP não#! continuará ou nos esgotaremos. Com um grito, lanço minhas tropas à frente, rumo à vitória, rumo a..."
 game_rule.1101.desc.combat.locale.isle_of_wight: "Longe do continente, não há para onde correr, e ambos os exércitos lutam com o desespero daqueles que entendem que é vencer ou morrer. Se você não for lançado às marés do Medina, a ilha não é grande o bastante para se esconder por muito tempo.\n\nDe algum modo, fiquei isolado de meus soldados, apenas uns poucos guardas batalhando pelo tumulto ao meu lado. Se eu ao menos pudesse transformar isso em vantagem, se eu ao menos pudesse virar a luta um pouco —"
 game_rule.1101.desc.combat.locale.forest_of_dean: "Sob estas árvores selvagens, nos matagais e bosques desta floresta ancestral, o sangue encharca o solo com facilidade, e a visibilidade é tão ruim que ninguém consegue dizer como a batalha se desenrola.\n\nA floresta parece sorver som e vida da mesma forma, dando à nossa luta uma qualidade estranhamente abafada para a quantidade de caos e morte se espalhando pelas fileiras. Ainda assim, penso que talvez as coisas estejam virando a nosso favor —"
 game_rule.1101.desc.combat.locale.london: "Apesar de todos os esforços dos defensores no alto das ameias para inclinar a balança para um lado ou para o outro, ambos os lados simplesmente se destroem em um impasse incessante.\n\nO ar fede a sangue, o alarido dos moribundos e de seus algozes cobre o ambiente, e o miasma de poeira e suor torna impossível saber quem está vencendo.\n\nAinda assim, não posso abandonar minhas tropas a esta #EMP anarquia#!, e com um grito, me lanço mais uma vez contra o inimigo. Este é o nosso momento, triunfaremos!"
 game_rule.1101.desc.combat.locale.cirencester: "$game_rule.1101.desc.combat.locale.london$"
 game_rule.1101.desc.combat.locale.guildford: "A colina sinuosa, com nenhum dos exércitos controlando de fato seu topo, faz desta uma luta espetacular. Longa e estreita, ambas as forças pressionam com tudo para empurrar a outra pela encosta oposta, onde a vantagem da altura certamente as levará à vitória.\n\nAinda assim, eu sei que são as #EMP minhas#! tropas que levarão isto, as #EMP minhas#! forças que provarão a doçura da vitória! Avante, #EMP avancem, seus cães!#! Avante! Estamos a um só empurrão sólido da vitória, um empurrão de..."
 game_rule.1101.desc.combat.locale.lindisfarne: "A espuma do mar arde nos olhos, ventos gélidos vindos diretamente do Mar do Norte rasgam nossas roupas e escudos, e os gritos dos mortos e moribundos chegam aos monges chorosos do mosteiro, que lamentam e se agitam em seus hábitos diante da carnificina que se desenrola ante eles.\n\nSe eu cair aqui, que seja porque [ROOT.Char.GetFaith.HighGodName] assim o queira, pois, caso contrário, certamente apoia meu direito à Inglaterra! Avante, meus soldados, avante e tragam-me minha coroa! Lutem até o máximo, para que não..."
 game_rule.1101.desc.combat.locale.lands_end: "Mato rochoso e pequenas falésias serrilhadas cedem lugar a um oceano congelante, e o terreno quebrado torna a batalha supremamente caótica, mais grupos pequenos em combate corpo a corpo do que um choque frontal unificado.\n\nAinda assim, meu estandarte atrai tropas até mim, e faço o máximo para avançar para o tumulto. Reúnam-se a mim! #EMP Reúnam-se#! Meu grito ecoa por toda a linha, ecoa e ecoa até—"
 game_rule.1101.desc.combat.locale.stonehenge: "Em teoria, estas amplas campinas planas são o lugar ideal para fazer guerra. Espaço de sobra para os exércitos colidirem, e ainda assim... há algo profundamente #EMP inquietante#! neste lugar. Algo que não está certo.\n\nLutamos, e morremos, e berramos nossa ira aos altos céus, mas algo no ar parece absorver nossa malícia tão rápido quanto ela surge. Ainda assim, não posso parar, devo liderar, devo—"
 game_rule.1101.desc.combat.locale.southwark: "Com a cidade mais rica da Inglaterra tão perto, há motivos de sobra para lutar. Seja pelas casas ou pelo saque, pela glória ou pela piedade, ambos os exércitos se chocam repetidas vezes.\n\nA margem sul do Tâmisa espuma com nosso sangue, mas não desistirei, #EMP não#! transigirei.\n\nA Inglaterra já é minha, esta batalha o provará e tudo o que ela exige é um último #EMP empurrão#! para prová-lo..."
 game_rule.1101.desc.combat.locale.riverside: "Com espaço mal suficiente para meia dúzia de soldados lado a lado, a batalha é menos uma questão de tática hábil e mais de atrito brutal, com o aperto dos corpos tanto ajudando quanto atrapalhando os esforços para arrastar os feridos de volta da linha de frente.\n\nAinda assim, se conseguirmos romper a linha, se apenas dispersarmos suas forças, teremos conseguido! Jogando a cautela ao vento, luto meu caminho até a vanguarda, espada em punho e—"
 game_rule.1101.desc.combat.random.present.1: "Nossos exércitos se lançam uns contra os outros, e o mundo se reduz a escudos se estilhaçando, metal rangendo e homens e cavalos morrendo.\n\nA guerra pode ser brutal, mas isto é menos guerra e mais uma carnificina. Veteranos e mercenários de ambos os lados passam os recrutas novatos choramingando à espada com um desenfreio sombrio.\n\nSem vontade de deixar este pesadelo continuar, avanço, minha guarda me segue logo atrás de mim, e..."
 game_rule.1101.desc.combat.random.present.2: "Nossas forças colidem e giram uma em torno da outra, ambos os lados procurando pontos fracos. Escaramuçamos, depois recuamos, só para nos lançarmos uns contra os outros mais adiante na linha.\n\nAs baixas são poucas, por enquanto, mas há um peso no ar. Todos sabemos que esta dança não pode continuar para sempre, que a verdadeira batalha logo terá de começar.\n\nMelhor controlar o campo do que se submeter a ele. Erguendo minha espada bem alto e gritando o nome de [ROOT.Char.GetFaith.WarGodName], eu me lanço à frente, com os exércitos de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] atrás de mim e..."
 game_rule.1101.desc.combat.random.present.3: "A luz do dia já está morrendo, desperdiçada em nos massacrarmos uns aos outros hora após hora. Os braços que empunham as espadas pesam com o desgaste, o cansaço turva as mentes e, quando o sol começa a se pôr abaixo do horizonte, a batalha ameaça terminar em empate.\n\nNão\n\nNão permitirei isso. Isto termina aqui e agora, com minha vitória, e eu farei com que aconteça ou que [ROOT.Char.GetFaith.HighGodName] em pessoa me #EMP aba...#!"
 game_rule.1101.desc.combat.random.absent.1: "Durante a maior parte de um dia, nossos exércitos se arremessam uns contra os outros. Primeiro morrem dezenas, depois centenas, a conta do açougueiro subindo lentamente a cada hora enquanto soldados jogam suas vidas fora por minha causa.\n\nCom certeza, com certeza tudo isso valerá a pena. Com certeza tanta morte há de ter alguma compensação, alguma retribuição pelas vidas lançadas aos gritos para o abraço gelado de [ROOT.Char.GetFaith.DeathDeityNamePossessive]."
 game_rule.1101.desc.combat.random.absent.2: "O conflito é brutal. O estrondo dos escudos partidos e os gritos dos moribundos rasgam o ar, todo semblante de organização perdido sob o caos de meia dúzia de cargas quebradas e linhas de batalha mais emaranhadas do que não.\n\nAinda assim, as tropas seguem em frente, lutando por sua [ROOT.Char.GetTitleAsNameNoTooltip|l], lutando para garantir que seus direitos e privilégios inatos não sejam esmagados, ainda que lhes custe a vida."
 game_rule.1101.desc.combat.random.absent.3: "Vidas são ceifadas às centenas, caindo como trigo diante da foice, tantos fios cortados curtos sob o cenho feroz de assassinos de aluguel cumprindo seu trabalho sangrento.\n\nSeu sacrifício certamente, #EMP certamente#! valerá a pena, uma condição necessária para minha glória vindoura. Cada um é um paralelepípedo no caminho do destino, assentado em prol de um objetivo singular."
 game_rule.1101.desc.outro.present: "Deixo de pensar enquanto o mundo se torna um borrão de golpes e cortes, os membros da minha casa apertados em torno de mim enquanto esmagamos o exército [loser.Custom('ES_DelDela')] [loser.GetTitledFirstName|l]. Sob minha espada, o inimigo foge."
 game_rule.1101.desc.outro.absent: "Por fim, as linhas do inimigo se desfazem e suas forças são postas em fuga: o dia pertence a [winner.Custom('ES_AlAla')] [winner.GetTitledFirstName|l]!"
 game_rule.1101.a: "A Inglaterra não verá mais domínio viking!"
 game_rule.1102.desc.outro.alive: "No fim, porém, tudo foi em vão. Minhas forças quebram, o inimigo avança pela brecha, e com sua destruição, minhas ambições são completamente esmagadas."
 game_rule.1102.desc.outro.dead: "A dor incha em meu peito. Não, não, #BER não#!, como poderiam... de onde... o mundo cambaleia de modo estranho enquanto caio ao chão, o sangue florescendo do ferimento. Lentamente, a morte me toma."
 game_rule.1102.a: "Como isso pôde acontecer!?"
 game_rule.1102.b: "#DIE1 Muert[ROOT.Char.Custom('ES_OA')]…#! #DIE2 soy…#!"
 game_rule.1103.desc.outro.present: "$game_rule.1101.desc.outro.present$"
 game_rule.1103.desc.outro.absent: "$game_rule.1101.desc.outro.absent$"
 game_rule.1103.a: "Vitória sobre aquele pretendente bastardo!"
 game_rule.1104.desc.outro.alive: "$game_rule.1102.desc.outro.alive$"
 game_rule.1104.desc.outro.dead: "$game_rule.1102.desc.outro.dead$"
 game_rule.1104.a: "Mas — o Confessor me prometeu a Inglaterra!"
 game_rule.1104.b: "Que reinar lhe traga... #DIE1 a você...#! #DIE2 miséria...#!"
 game_rule.1111.desc.outro.present: "$game_rule.1101.desc.outro.present$"
 game_rule.1111.desc.outro.absent: "$game_rule.1101.desc.outro.absent$"
 game_rule.1111.a: "Mais uma vitória para as sagas!"
 game_rule.1112.desc.outro.alive: "$game_rule.1102.desc.outro.alive$"
 game_rule.1112.desc.outro.dead: "$game_rule.1102.desc.outro.dead$"
 game_rule.1112.a: "Não, não, não, NÃO, #BER NÃO#!"
 game_rule.1112.b: "Maldito... #DIE1 seja você...#! #DIE2 Tostig...#!"
 game_rule.1113.desc.outro.present: "$game_rule.1101.desc.outro.present$"
 game_rule.1113.desc.outro.absent: "$game_rule.1101.desc.outro.absent$"
 game_rule.1113.a: "Não era [Select_CString( loser.IsFemale, 'uma autêntica', 'um autêntico' )] [loser.Custom('GetDaughterSon')] do Norte!"
 game_rule.1114.desc.outro.alive: "$game_rule.1102.desc.outro.alive$"
 game_rule.1114.desc.outro.dead: "$game_rule.1102.desc.outro.dead$"
 game_rule.1114.a: "Mas nem sequer tem um direito, droga!"
 game_rule.1114.b: "Maldito... #DIE1 seja você#!... #DIE2 Harald...#!"
 game_rule.1121.desc.outro.present: "$game_rule.1101.desc.outro.present$"
 game_rule.1121.desc.outro.absent: "$game_rule.1101.desc.outro.absent$"
 game_rule.1121.a: "No seu lugar, usurpador."
 game_rule.1122.desc.outro.alive: "$game_rule.1102.desc.outro.alive$"
 game_rule.1122.desc.outro.dead: "Algo assobia do céu, apontado, ao que parece inexoravelmente, direto para o meu olho."
 game_rule.1122.a: "Maldito bastardo ladrão!"
 game_rule.1122.b: "Flechas! Escudo ao alto, salva chegando! Salva che—"
 game_rule.1123.desc.outro.present: "$game_rule.1101.desc.outro.present$"
 game_rule.1123.desc.outro.absent: "$game_rule.1101.desc.outro.absent$"
 game_rule.1123.a: "Voltem para o frio, cães do norte!"
 game_rule.1124.desc.outro.alive: "$game_rule.1102.desc.outro.alive$"
 game_rule.1124.desc.outro.dead: "$game_rule.1102.desc.outro.dead$"
 game_rule.1124.a: "Meus sonhos viraram cinzas..."
 game_rule.1124.b: "Hah, a maior #DIE1 empreitada#! #DIE2 me espera...#!"
 game_rule.1131.desc.conquest_finished.die_battlefield: "$game_rule.1102.desc.outro.dead$"
 game_rule.1131.desc.conquest_finished.die_home: "Quando a notícia de que vencemos a batalha chega até mim, sinto euforia! Meu coração salta de alegria, torcendo, virando, #EMP espasmando#!, #BER gritando!#!\n\nO que está... acontecendo... comigo... não consigo... #DIE1 respirar... não consigo...#!"
 game_rule.1131.a: "$game_rule.1101.a$"
 game_rule.1131.b: "Eu estava... #DIE1 tão...#! #DIE2 perto...#!"
