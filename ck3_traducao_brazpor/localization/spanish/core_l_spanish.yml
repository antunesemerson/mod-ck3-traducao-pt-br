 intrigue_modifier: "Um escopo pode ser salvo como um "alvo de evento". Ele então poderá ser acessado por qualquer gatilho/efeito que possa ser "rastreado de volta" em linha direta até o ponto em que você salvou o alvo de evento (ou seja, quaisquer gatilhos verificados ou efeitos disparados após salvar o alvo de evento, mas apenas em uma cadeia contínua, como uma cadeia de eventos). Se uma cadeia de eventos terminar, o alvo de evento é perdido.\nObserve que várias on_actions configuradas por código, e várias interações especiais, vêm com seus próprios alvos de evento predefinidos.\nObservação final: você também pode salvar valores e bools como alvos de evento, o que pode ser útil em certas situações."
