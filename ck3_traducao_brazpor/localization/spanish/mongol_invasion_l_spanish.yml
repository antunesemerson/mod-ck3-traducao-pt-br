l_spanish:
 submit_to_the_great_khan_decision: "Submeter-se ao Grande Khan"
 submit_to_the_great_khan_decision_confirm: "Vou me humilhar para salvar a vida"
 submit_to_the_great_khan_decision_opening_desc: "Meu reino virará cinzas, meu povo será cadáveres, meu corpo será vítima de mil cortes e golpes... a menos que eu implore misericórdia ao grande cavaleiro que conquista o mundo."
 submit_to_the_great_khan_decision_tooltip: "Você se torna um vassalo do Maior dos Khans"
 mongol_invasion.1001.title: "O Khan Está Morto!"
 mongol_invasion.1001.generic.desc: "[ROOT.Char.GetFaith.HighGodName] é bondoso, e [ROOT.Char.GetFaith.DeathDeityName] derruba até os mais poderosos! As notícias são boas: [old_khan.Custom('ES_ElLa')] [old_khan.GetTitledFirstNameNicknamed|l], senhor dos cavalos e saqueador[old_khan.Custom('ES_XA')], [old_khan.GetDeathReasonHideKiller|l].\n\nCom temor, já falamos do novo temível senhor de [new_khan.Custom('ES_ElLa')] novo[new_khan.Custom('ES_OA')] senhor[new_khan.Custom('ES_XA')] de [new_khan.GetPrimaryTitle.GetNameNoTier]..., mas [new_khan.Custom('ES_ElLa')] [new_khan.GetTitledFirstNameNicknamed|l] #EMP posiblemente#! não será tão temível quanto seu antecessor[old_khan.Custom('ES_XA')]...\n\nSerá que isso talvez marque o fim das conquistas de [new_khan.GetPrimaryTitle.GetNameNoTooltip]?"
 mongol_invasion.1001.sympathetic.desc: "#EMP ¡Oh, cuántos lamentos! ¡Cuántos lloros!#! [old_khan.Custom('ES_ElLa')|U] grande [old_khan.GetTitledFirstNameNicknamed|l], escolhido[old_khan.Custom('ES_OA')] pelo céu para conquistar a Terra, não existe mais. Dizem que [old_khan.Custom('ES_ElLa')] [old_khan.GetTitleAsNameNoTooltip|l] [old_khan.GetDeathReasonHideKiller|l].\n\nCom o falecimento de seu senhor[old_khan.Custom('ES_XA')], [new_khan.GetPrimaryTitle.GetDefinitiveName] reúne seu grande #EMP kurultái#! e proclama um[new_khan.Custom('ES_XA')] nov[new_khan.Custom('ES_OA')] [new_khan.GetTitleAsNameNoTooltip|l].\n\nE assim, enquanto [old_khan.GetFirstNameNoTooltip] cavalga eternamente no céu, toda a Terra pertence a [new_khan.Custom('ES_AlAla')] [new_khan.GetTitledFirstNameNicknamed|l]!"
 mongol_invasion.1001.a: "Mesmo assim, minhas mãos ainda tremem..."
 mongol_invasion.1001.b: "[new_khan.Custom('ES_ElLa')|U] grande [new_khan.GetPrimaryTitle.GetTierAsNameNoTooltip|l] sobrevive."
 mongol_invasion.1001.c: "[old_khan.GetFirstNameNoTooltip] ocupa um lugar de honra em [ROOT.Char.GetFaith.NegativeAfterLife]."
 mongol_invasion.1002.t: "Ascensão dos [genghis_khan.GetCulture.GetCollectiveNounNoTooltip]"
 mongol_invasion.1002.desc.close: "Um[genghis_khan.Custom('ES_XA')] líder temível, [genghis_khan.GetTitledFirstName], surge entre os clãs guerreiros de"
 mongol_invasion.1002.desc.close_mongolia: "Mongólia"
 mongol_invasion.1002.desc.close_steppes: "as estepes"
 mongol_invasion.1002.desc.close.mid: "e, segundo os sábios de seu povo, é proclamado em um imenso #EMP kurultái#!"
 mongol_invasion.1002.desc.genghis: "[Glossary( 'Gengis Kan', 'GENGHIS_KHAN_GLOSS' )]."
 mongol_invasion.1002.desc.gok: "Maior de Todos os Khans!"
 mongol_invasion.1002.desc.close.end: "Por direito, [genghis_khan.GetFirstNameNoTooltip] deve governar os quatro cantos do universo.\n\nIncontáveis cavaleiros nômades se reúnem sob seu estandarte. Seguindo a vontade [genghis_khan.Custom('ES_DelDela')] do maior dos cãs, as antigas lealdades tribais são rompidas, reorganizadas para a guerra, e trovejam para conquistar toda a estepe, todo o mundo — tudo sob o Grande Céu Azul!"
 GENGHIS_KHAN_GLOSS: "Apenas um grande soberano já ostentou o honorífico mongol #G Genghis#! ou #G Chinggis Khan#!. Seu significado é incerto, talvez associado à força, retidão ou a um domínio 'Universal', 'Oceânico'. E, de fato, aquele que carregou esse título ergueu-se muito acima do #EMP Gurkhan#! de seu tempo e criou o maior império das estepes já visto."
 mongol_invasion.1002.desc.far_intro: "Chegam rumores… Um tirano selvagem se ergue entre as tribos bárbaras das estepes distantes. Um[genghis_khan.Custom('ES_XA')] \"[genghis_khan.GetTitledFirstName]\", que se proclama [genghis_khan.Custom('ES_ElLa')] governante universal…"
 mongol_invasion.1002.desc.far: "\n\nEntre risadas nervosas, meus conselheiros me contam que est[genghis_khan.Custom('ES_EA')] jurou conquistar o mundo inteiro, reduzir as cidades a pó sob os cascos dos cavalos e derrubar as muralhas dos castelos com arco e flecha.\n\nNão é o primeiro nômade a fazer essas afirmações…, mas também dizem que [genghis_khan.Custom('ES_ElLa')] [genghis_khan.GetTitleAsNameNoTooltip|l] cavalga à frente de uma horda de milhares de cavaleiros invencíveis que não podem ser mortos."
 mongol_invasion.1002.a: "Um[genghis_khan.Custom('ES_XA')] arrivis[genghis_khan.Custom('ES_OA')]! Os [genghis_khan.GetCulture.GetCollectiveNounNoTooltip] enlouqueceram."
 mongol_invasion.1002.b: "Atrás de nossas muralhas... certamente estamos seguros."
 mongol_invasion.1002.craven: "E vem para cá?!"
 mongol_invasion.1002.genghis_khan_tt: "@warning_icon! #X Cualquier [county|lE] ocupado por los [genghis_khan.GetCulture.GetCollectiveNoun] perderá una gran parte de su [development|lE]#!"
 genghis_khan_mongol_empire_tt: "Recebeu [GetTitleByKey('e_mongol_empire').GetName]"
 genghis_khan_mongol_troops_tt: "Recebeu enormes exércitos de [special_troops|lE]"
 mongol_invasion_submission_reminder_tt: "Você pode evitar a ruína com a [decision|lE] #high $submit_to_the_great_khan_decision$#!"
 gok_threatening_powers_tt: "@warning_icon! #X Amea?ar? os [rulers|lE] com [holdings|lE] destru?das, [courtiers|lE] massacrados e confisco de [titles|lE] caso recusem a [vassalization|lE]#!"
 mongol_invasion.1003.t: "A Casa da Sabedoria Arde"
 mongol_invasion.1003.desc: "A grande instituição de aprendizado e conhecimento de Bagdá, a Casa da Sabedoria, caiu vítima do fogo e da destruição durante o cerco mongol à cidade.\n\nSó restaram ruínas, como se sinalizassem o valor do conhecimento antigo no novo mundo dos mongóis."
 mongol_invasion.1003.a: "Tanta coisa, perdida..."
 mongol_invasion.1003.b: "São apenas infiéis recebendo o que merecem!"
 mongol_invasion.1003.c: "Os mongóis destruirão o mundo se não os detivermos!"
 mongol_invasion.1004.t: "Colapso do Grande Khanato"
 mongol_invasion.1004.desc: "Com a morte [old_mongol_emperor.Custom('ES_DelDela')] [old_mongol_emperor.GetTitledFirstName|l] —senhor[old_mongol_emperor.Custom('ES_XA')] das terras subjugadas pelos mongóis—, vários sucessores clamam para assumir o cargo de grão-cã. Nenhum deles reconhecerá a legitimidade dos outros.\n\nE assim chega ao fim o domínio dos mongóis como um império unificado.\n\nTalvez esses descendentes do primeiro grande conquistador ainda conservem alguma força, pois conclamam à guerra, mas nenhum deles, nem [successor_1.GetName], nem [successor_2.GetName], se destaca acima dos demais como governante de todo o universo."
 mongol_invasion.1004.a: "Um dia o império ressurgirá..."
 mongol_invasion.1004.b: "[ROOT.Char.GetFaith.HighGodNamePossessive] misericórdia enfim se mostra..."
 mongol_invasion.1005.t: "O Khan Está Morto"
 mongol_invasion.1005.desc: "Com a sucessão do trono [new_khan.GetPrimaryTitle.GetAdjective] [old_mongol_emperor.Custom('ES_DelDela')] [old_mongol_emperor.GetTitledFirstName|l] [new_khan.Custom('ES_AlAla')] [new_khan.GetTitledFirstName|l], meus conselheiros riem com sarcasmo e suspiram aliviados…, pois [new_khan.GetFirstNameNoTooltip] não ousa se chamar \"governante do universo\".\n\nNo passado, os nômades da estepe ameaçaram o mundo inteiro e reuniram hordas imensas. Agora, enfim reconhecem que seus objetivos estão além de seu alcance."
 mongol_invasion.1005.a: "Uma era de medo chegou ao fim."
 mongol_invasion.1005.a.tt: "[GetTitleByKey('e_mongol_empire').GetName] perde seus principais métodos de conquista e se tornará menos agressivo"
 mongol_invasion.2001.opening: "Meu servo destinado,"
 mongol_invasion.2001.desc: "Como governante do universo, é inevitável que você se curve diante de mim. Que seja em juramento de fidelidade, e não com a lâmina de um machadeiro contra seu pescoço."
 mongol_invasion.2001.a: "Eu me submeto com honra, meu [mongol_emperor.GetTitleAsNameNoTooltip]."
 mongol_invasion.2001.a.tt: "Você se torna vassal[ROOT.Char.Custom('ES_OA')] de [mongol_emperor.GetShortUIName]"
 mongol_invasion.2001.b: "Você não representa ameaça alguma para mim, tolo arrogante!"
 mongol_invasion.2001.b.tt: "[mongol_emperor.GetShortUIName] declara guerra contra você"
 mongol_invasion.2002.opening: "Honrado Governante do Universo,"
 mongol_invasion.2002.desc: "Submeto-me à sua justa e benevolente graça. Permanecerei ao seu lado contra qualquer um que se oponha ao seu destino."
 mongol_invasion.2002.a: "Uma escolha sábia, meu servo."
 mongol_invasion.2003.opening: "Seu [mongol_emperor.Custom2('InsultAdjective', SCOPE.sC('demand_recipient'))] simulacro de [mongol_emperor.GetTitleAsNameNoTooltip],"
 mongol_invasion.2003.desc: "Voc? ousa pensar que pode me amea?ar para me submeter? Vou lhe mostrar o que um[ROOT.Char.Custom('ES_XA')] soberan[ROOT.Char.Custom('ES_OA')] de verdade faz com esses seus chamados \"cavaleiros invenc?veis\"!"
 mongol_invasion.2003.a: "Então será guerra e morte."
 mongol_invasion.2101.desc: "Você tem sido um[ROOT.Char.Custom('ES_XA')] bom[ROOT.Char.Custom('ES_XA')] amig[ROOT.Char.Custom('ES_OA')] e servidor[ROOT.Char.Custom('ES_XA')] até agora. É hora de oficializar seu serviço, jurando lealdade [mongol_emperor.Custom('ES_AlAla')] governante do universo."
 mongol_invasion.2101.a: "Claro, meu [mongol_emperor.Custom('ES_SennorSennora')]."
 mongol_invasion.2101.b: "Você acha que estou a seu serviço? Ridículo!"
 mongol_invasion.2101.b.tt: "@warning_icon! Então, [mongol_emperor.GetShortUIName] rompe a aliança com você e pode ir à guerra em vez disso!"
 mongol_invasion.2103.a: "Você se curvará diante de mim agora, de um jeito ou de outro!"
 mongol_invasion.2103.b: "Espere só, seu cão insolente..."
 mongol_invasion.2111.b: "Você me considera inferior ao seu igual? Ultrajante!"
 mongol_invasion.2111.b.tt: "@warning_icon! [mongol_emperor.GetShortUIName] rompe a aliança comigo"
 mongol_invasion.2112.desc: "Você realmente se crê superior a mim? Você nem sequer é meu igual! Está claro que a amizade que graciosamente lhe ofereci nada mais foi do que atirar pérolas aos porcos."
 mongol_invasion.2112.a: "Ah, você vai se arrepender de suas palavras e atos..."
 temujin_horde_gathers_tt: "@alert_icon! #alert_trial Los guerreros nómadas seguirán reuniéndose en torno a ti, su kan, elegid[ROOT.Char.Custom('ES_OA')] por el Cielo y te proporcionarán más [herd|lE] @herd_icon!, [prestige|lE] @prestige_icon! y [gold|lE] @gold_icon!… siempre que tu [dominance|lE] se mantenga por encima de [GetLaw('nomadic_authority_3').GetName]#!"
 mpo_greatest_of_khans.1010_title: "Clãs Menores se Juntam à Horda"
 mpo_greatest_of_khans.1010_desc: "Cavaleiros sem mestre juram lealdade! Guerreiros ansiosos oferecem seus arcos! Incontáveis famílias afluem ao seu grande acampamento!"
 cadet_name_great_yuan: "Bó'érjìjin"
