 elder_events.1000.t: "Você Já Me Conhecia"
 elder_events.1000.desc: ""[confusion_target.GetFirstName], querid[ROOT.Char.Custom('ES_OA')] [elder.Custom2('RelationToMeShort', SCOPE.sC('confusion_target'))], fico tão feliz em ver você!" Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] [elder.GetFirstName] me olha nos olhos, há um lampejo de incerteza por trás de seu sorriso. "Você sempre foi tão [confusion_target.Custom('ComplimentAdjective')]. Por isso é de você que mais gosto!"

Em seu [GetTrait('withering_mind').GetName( GetNullCharacter )|l], hoje sou meu [confusion_target.Custom('SisterBrother')]...

Amanhã talvez eu seja um estranho."

