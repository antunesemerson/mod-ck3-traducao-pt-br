 elder_events.1000.a: "Aaargh!"
 elder_events.1000.b: "Socorro! Salve-me!"
 elder_events.1100.t: "Esta opção está disponível porque você tem um [GetCourtPositionType('bodyguard_court_position').GetName()|l]"
 elder_events.1100.desc: "Subi estas escadas muitas vezes. Mas então, por que hoje parece que estou escalando as montanhas de [mountain_reference.GetName]?

Minhas pernas tremem. Meus joelhos falham. Não há nada para deter minha queda.

Eu rolo escada abaixo."
 elder_events.1100.a: "…"
 elder_events.1100.bodyguard: "Lições Desaprendidas"
 EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "Já li estes pergaminhos sobre [ROOT.Char.Custom('education_scroll_subject')]? Eu... Eu não me lembro. Talvez tenha lido?\n\nCertamente fizeram parte dos meus estudos, da minha educação...\n\nSim. Minha... educação..."
 EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "Não pode ter sido tão importante..."
 partially_mute_modifier: "Preciso de ajuda para lembrar."
 partially_mute_modifier_desc: "Uma Boa Queda"
 elder_events.1200.t: ""Venha para a cama, meu[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('RomanticComplimentAdjective')] [ROOT.Char.Custom('RaunchyComplimentNoun')]", [lover.Custom('PurrGrowl')] meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('lover'))] [lover.GetFirstName], com os olhos ardendo de desejo. "Você não está nem um pouco curioso sobre o que seu[lover.Custom('ES_OA')] [lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')|l] aprendeu?"

Com um sorriso safado, [lover.GetSheHe] morde o lábio e se afunda nos lençóis.

