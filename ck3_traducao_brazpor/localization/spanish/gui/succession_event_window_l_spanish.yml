 #Death Intro messages:
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_DEFAULT_1: "[ROOT.Char.GetFullNameNoTooltip] Desistiu transformando-se num fantasma aos [ROOT.Char.GetAge] devido à idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_DEFAULT_2: "[ROOT.Char.GetFullNameNoTooltip] abandonou sua mortalidade aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_DEFAULT_3: "[ROOT.Char.GetFullNameNoTooltip] partiu aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_DEFAULT_4: "[ROOT.Char.GetFullNameNoTooltip] deixou este mundo aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_DEFAULT_5: "[ROOT.Char.GetFullNameNoTooltip] partiu aos [ROOT.Char.GetAge] anos de idade e [ROOT.Char.Custom('GetAfterLifeDestination')]."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_PIOUS: "O espírito de [ROOT.Char.GetFullNameNoTooltip] voou para [ROOT.Char.GetFaith.PositiveAfterLife] aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_WICKED: "A alma de [ROOT.Char.GetFullNameNoTooltip] finalmente foi lançada para [ROOT.Char.GetFaith.NegativeAfterLife] aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_WOUNDED: "[ROOT.Char.GetFullNameNoTooltip] finalmente encontrou a paz aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_CHRISTIANITY_1: "[ROOT.Char.GetFullNameNoTooltip] encontrou a paz no abraço de Cristo aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_CHRISTIANITY_2: "[ROOT.Char.GetFullNameNoTooltip] descansa nos braços do Senhor aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_ISLAM_1: "[ROOT.Char.GetFullNameNoTooltip] deixou a casa transitória ao chamado do Verdadeiro aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_ISLAM_2: "[ROOT.Char.GetFullNameNoTooltip] abandonou este mundo transitório e voou para [ROOT.Char.GetFaith.PositiveAfterLife] aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_ISLAM_3: "[ROOT.Char.GetFullNameNoTooltip] partiu para a eternidade aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_NORSE_1: "[ROOT.Char.GetFullNameNoTooltip] se juntou ao banquete em [ROOT.Char.GetFaith.PositiveAfterLife] aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_HELLENIC_1: "[ROOT.Char.GetFullNameNoTooltip] cruzou o Rio Styx aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_EASTERN_1: "[ROOT.Char.GetFullNameNoTooltip] transcendeu sua forma material aos [ROOT.Char.GetAge] anos de idade."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_TRIBAL_1: "[ROOT.Char.GetFullNameNoTooltip] cruzou a porta para o mundo dos espíritos aos [ROOT.Char.GetAge] anos de idade."
 #Death Reason message:
 SUCCESSION_EVENT_WINDOW_DEAD_REASON_1: "[ROOT.Char.GetSheHe|U] [ROOT.Char.GetDeathReason]."
 #Death Outro messages:
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_AGE_CHILD: "Sua vida foi ceifada tão cedo que é difícil dizer que tipo de governante teria se tornado."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_AGE_OLD: "Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] idos[ROOT.Char.Custom('ES_OA')] que viveu uma vida longa e satisfatória."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_AGE_IMMORTAL: "Considerado imortal, muitos se surpreenderam com sua morte inesperada."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_AGE_PREGNANT: "Morreu ao dar à luz seu filho e não caminhará sozinha[ROOT.Char.Custom('ES_OA')] no além."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_LEPER: "Seu corpo putrescente finalmente sucumbiu ao flagelo da lepra."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_DISFIGURED: "Ao ficar horrivelmente desfigurad[ROOT.Char.Custom('ES_OA')], passou os últimos anos sem mostrar o rosto em público."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_MANGLED: "Mutilad[ROOT.Char.Custom('ES_OA')] em um terrível acidente, passou seus últimos anos mal conseguindo andar."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_HUNCHBACK: "Frequentemente ridicularizad[ROOT.Char.Custom('ES_OA')] por causa de suas costas tortas."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_GIANT: "Nascid[ROOT.Char.Custom('ES_OA')] em circunstâncias infelizes, era frequentemente ridicularizad[ROOT.Char.Custom('ES_OA')] por suas proporções gigantescas."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_DWARF: "Por ter nascido em circunstâncias infelizes, foi frequentemente ridicularizad[ROOT.Char.Custom('ES_OA')] por sua estatura diminuta."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_STRONG: "Est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] de destreza sem igual finalmente encontrou um rival que não conseguiu superar."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_PRETTY_YOUNG: "Morto[ROOT.Char.Custom('ES_OA')] na flor da vida, sempre será lembrado por sua beleza deslumbrante."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_PRETTY_OLD: "Célebre no passado por sua aparência, o destino [ROOT.Char.GetHerHim] amaldiçoou com uma vida longa o bastante para ver sua beleza murchar lentamente."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_WEAK: "Um [ROOT.Char.GetWomanMan|U] de constituição frágil, [ROOT.Char.GetSheHe] foi frequentemente ridicularizado por seus pares."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_UGLY: "Famoso por sua feiura, dizia-se que um simples olhar para [ROOT.Char.GetHerHim] já podia causar pesadelos por dias."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_INCAPABLE: "Reduzid[ROOT.Char.Custom('ES_OA')] a uma casca vazia de seu antigo eu, incapaz de falar ou se mover, ele finalmente deixou os restos destruídos de seu corpo."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_LUNATIC: "Amaldiçoad[ROOT.Char.Custom('ES_OA')] com uma mente perturbada, era conhecid[ROOT.Char.Custom('ES_OA')] em suas terras como um[ROOT.Char.Custom('ES_XA')] lunátic[ROOT.Char.Custom('ES_OA')] delirante."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_POSSESSED_POSITIVE: "Após manifestar-se através de [ROOT.Char.GetHerHim] durante anos, por fim [ROOT.Char.GetFaith.HighGodName] chamou [ROOT.Char.GetHerHim] para voltar para perto de si."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_POSSESSED_NEGATIVE: "Atormentad[ROOT.Char.Custom('ES_OA')] por demônios, costumava delirar sobre sua morte iminente."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_DEPRESSED: "[ROOT.Char.GetWomanMan] atormentad[ROOT.Char.Custom('ES_OA')], desejava há muito tempo o doce abraço da morte."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_GENIUS: "Embora fosse célebre por sua agudeza e inteligência, ainda assim não conseguiu ser mais esperto que [ROOT.Char.GetFaith.DeathDeityName]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_DUMB: "Sua falta de inteligência era bem conhecida e costumava recorrer ao conselho para tomar decisões importantes."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_INFIRM: "Já era uma sombra irreconhecível de si, havia perdido a razão quando chegou sua hora."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_EXCOMMUNICATED: "Taxado[ROOT.Char.Custom('ES_OA')] de herege pela Igreja, certamente pagará por seus pecados."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_KINSLAYER: "Sabe-se que manchou as mãos com o sangue dos seus e certamente está pagando no [ROOT.Char.GetFaith.NegativeAfterLife] por seus horríveis crimes."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_DEVIANT: "Est[ROOT.Char.Custom('ES_EA')] degenerad[ROOT.Char.Custom('ES_OA')] de gostos repulsivos não encontrará consolo nem alegria onde quer que esteja indo."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_CANNIBAL: "Rumores dizem que se alimentava de carne humana e, sem dúvida, está sendo castigad[ROOT.Char.Custom('ES_OA')] por sua maldade em vida."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_SODOMITE: "Um sodomita célebre, agora recebe os ternos cuidados de [ROOT.Char.GetFaith.DevilName] em pessoa."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_INCESTUOUS: "Por ter saboreado o fruto proibido do amor incestuoso, certamente sofrerá na próxima vida."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_ADULTERER: "Adúlter[ROOT.Char.Custom('ES_OA')] descarad[ROOT.Char.Custom('ES_OA')], será lembrad[ROOT.Char.Custom('ES_OA')] por sua traição e sua disposição cobiçosa."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_FORNICATOR: "Fornicador[ROOT.Char.Custom('ES_XA')] descarad[ROOT.Char.Custom('ES_OA')], será [ROOT.Char.GetHerHim] lembrado por sua luxúria incontrolável e insidiosa."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_MURDERER: "Assassin[ROOT.Char.Custom('ES_OA')] reconhecid[ROOT.Char.Custom('ES_OA')], expiará seus crimes indescritíveis na próxima vida."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_WITCH: "Conhecid[ROOT.Char.Custom('ES_OA')] por misturar ervas mágicas e lidar com [ROOT.Char.GetFaith.DevilName], certamente arderá na vida após a morte por seus pecados."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_ACCOMPLISHMENT_SAOSHYANT: "Sagrad[ROOT.Char.Custom('ES_OA')] restaurador[ROOT.Char.Custom('ES_XA')] do Império Persa, sua ascensão à glória será imortalizada nos sermões de todos os [ROOT.Char.GetFaith.PriestMalePlural]. Seguramente agora está sentad[ROOT.Char.Custom('ES_OA')] junto a [ROOT.Char.GetFaith.HighGodName]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_ACCOMPLISHMENT_RESTORER_ROME: "Ao restaurar o antigo poder do Império, garantiu que seu nome viveria em glória até o fim dos tempos."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_ACCOMPLISHMENT_CRUSADER: "Um[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] zelos[ROOT.Char.Custom('ES_OA')] lutou pela glória de [ROOT.Char.GetFaith.HighGodName] contra os [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')] em uma das maiores guerras santas da história recente."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_DIPLOMAT: "Não houve discussão que est[ROOT.Char.Custom('ES_EA')] diplomátic[ROOT.Char.Custom('ES_OA')] veteran[ROOT.Char.Custom('ES_OA')] não pudesse resolver pacificamente."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_REVELER: "Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] encantador[ROOT.Char.Custom('ES_XA')] que ficou famoso por seus banquetes elaborados e seus bailes grandiosos."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_BLADEMASTER: "Um[ROOT.Char.Custom('ES_OA')] dos [ROOT.Char.Custom('ES_LoLa')] melhores guerreiros[ROOT.Char.Custom('ES_OA')] de sua época, não tinha rival no combate corpo a corpo."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_HUNTER: "Caçador[ROOT.Char.Custom('ES_XA')] entusiasta e dedicad[ROOT.Char.Custom('ES_OA')], adorava passar semanas inteiras na natureza em busca das presas mais esquivas."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_GENERAL: "Famoso por ser um[ROOT.Char.Custom('ES_XA')] estrategista excepcional, passou muitos de seus dias examinando campos e treinando suas tropas."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_ADMINISTRATOR: "[ROOT.Char.GetWomanMan|U] dedicad[ROOT.Char.Custom('ES_OA')], era famos[ROOT.Char.Custom('ES_OA')] por suas excelentes habilidades como tesoureir[ROOT.Char.Custom('ES_OA')] e governante."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_SCHEMER: "Conhecido por sua mente tortuosa e ardilosa, nunca revelou suas verdadeiras intenções a ninguém, nem mesmo a seus amigos mais próximos."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_SEDUCER: "Célebre libertin[ROOT.Char.Custom('ES_OA')], recebeu uma língua de prata com a qual podia convencer qualquer pessoa a dividir o leito."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_SCHOLAR: "Célebre por ser um[ROOT.Char.Custom('ES_XA')] sábi[ROOT.Char.Custom('ES_OA')] respeitad[ROOT.Char.Custom('ES_OA')], passou a maior parte dos seus dias estudando em sua biblioteca, saindo poucas vezes de sua [ROOT.Char.Custom('ResidenceBuilding')]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_TORTURER: "Célebre por sua veia sádica, transformou a tortura e a mutilação em arte."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_FAMILY_FIRST: "Est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] sempre colocou o bem de sua família acima de tudo e passou a vida tentando garantir um futuro glorioso para todos os seus descendentes."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_MYSTIC: "Conhecid[ROOT.Char.Custom('ES_OA')] por passar a maior parte das noites em seu laboratório, muitos acreditavam que ele não era nada além de um[ROOT.Char.Custom('ES_XA')] brux[ROOT.Char.Custom('ES_OA')] que elaborava feitiços profanos às escondidas de sua [ROOT.Char.Custom('ResidenceBuilding')]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_PHYSICIAN: "Dedicado[ROOT.Char.Custom('ES_OA')] à compreensão do corpo e da mente humana, era um[ROOT.Char.Custom('ES_XA')] médic[ROOT.Char.Custom('ES_OA')] respeitad[ROOT.Char.Custom('ES_OA')] e muito admirad[ROOT.Char.Custom('ES_OA')] pelos jovens estudiosos devido ao seu conhecimento enciclopédico da natureza e dos humores."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_GALLANT: "Exemplo de valor e cavalheirismo, será lembrad[ROOT.Char.Custom('ES_OA')] por sua natureza cordial e justa diante de todas as adversidades."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_HERBALIST: "De [ROOT.Char.GetSheHe], um[ROOT.Char.Custom('ES_XA')] famoso herbalista, dizia-se que podia curar todos os males com a poção certa."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_MALICIOUS: "Est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] intrigante será lembrad[ROOT.Char.Custom('ES_OA')] durante muito tempo por sua mesquinharia e rancor."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_BENEVOLENT: "Est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] de disposição agradável será lembrad[ROOT.Char.Custom('ES_OA')] por seu governo benevolente."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_DOMINANT: "Com est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] não se brincava. Encarnava a dignidade e o poder de seu título como poucos governantes."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_SUBMISSIVE: "[ROOT.Char.GetWomanMan|U] submis[ROOT.Char.Custom('ES_OA')] e tímid[ROOT.Char.Custom('ES_OA')], será lembrad[ROOT.Char.Custom('ES_OA')] por muitos como um[ROOT.Char.Custom('ES_XA')] governante dócil e às vezes atrapalhad[ROOT.Char.Custom('ES_OA')]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_APATHETIC: "Se há algo que se pode dizer de [ROOT.Char.GetHerHim], é que nunca foi alguém que deixasse uma impressão em quem quer que tivesse [ROOT.Char.Custom('ES_LoLa')] conhecido."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_LUSTFUL: "Nascid[ROOT.Char.Custom('ES_OA')] com um desejo insaciável, passou a vida inteira buscando a próxima conquista amorosa."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_GLUTTONOUS: "[ROOT.Char.GetWomanMan|U] de grande apetite, nunca perdia a oportunidade de provar comidas novas e exóticas."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_GREEDY: "Célebre por seu amor pelo ouro, será enterrad[ROOT.Char.Custom('ES_OA')] com algumas das joias que mais apreciava."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_LAZY: "Jamais foi de quem trabalhasse mais do que o necessário. Sempre esteve pront[ROOT.Char.Custom('ES_OA')] e dispost[ROOT.Char.Custom('ES_OA')] a esquivar suas responsabilidades."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_FICKLE: "Ninguém sabia o que est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] tão volúvel podia pensar ou fazer a qualquer momento."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_WRATHFUL: "Dado[ROOT.Char.Custom('ES_OA')] aos acessos de ira, em sua [ROOT.Char.Custom('ResidenceBuilding')] seus gritos costumavam ressoar com estrondo."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_ARROGANT: "Sempre cheio de si e pront[ROOT.Char.Custom('ES_OA')] para exercer sua autoridade sobre seus [ROOT.Char.Custom('GetSubjectPlural')], era alguém que adorava o som da própria voz."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_CHASTE: "Sempre se [ROOT.Char.Custom('ES_LoLa')] lembrará como um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] para quem a lealdade era um valor inegociável."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_TEMPERATE: "Sempre dado[ROOT.Char.Custom('ES_OA')] a evitar banquetes e excessos, nunca deixou que seus impulsos básicos se sobrepujassem a [ROOT.Char.GetSheHe]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_GENEROUS: "Conhecid[ROOT.Char.Custom('ES_OA')] por ser uma [ROOT.Char.GetWomanMan] caritativ[ROOT.Char.Custom('ES_OA')], deu livremente seu dinheiro para amigos e família."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_DILIGENT: "Um exemplo brilhante de diligência que jamais negligenciou seus deveres."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_COMPASSIONATE: "Célebre por ser uma alma bondosa e compassiva, seus amigos sempre [ROOT.Char.Custom('ES_LoLa')] recordarão com carinho."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_PATIENT: "Nunca dad[ROOT.Char.Custom('ES_OA')] a levantar a voz, foi um exemplo de paciência."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_HUMBLE: "Est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] humilde nunca quis que se desse muita importância às suas conquistas."
 #Heir message:
 SUCCESSION_EVENT_WINDOW_HEIR_UNDERAGE: "Apenas tem [ROOT.Char.GetAge] anos e precisará contar com seu [ROOT.Char.GetDiarchTitle|l] [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetDiarchy.GetDiarch.GetTitledFirstNameNicknamedNoTooltip] durante seus primeiros anos de reinado."
 SUCCESSION_EVENT_WINDOW_HEIR_USELESS: "Não tendo habilidades para manter o [ROOT.Char.Custom('GetRealmOrDomicile')|l] unido, o seu governo pode estar fadado ao fracasso."
 SUCCESSION_EVENT_WINDOW_HEIR_MILITARY: "Por ser um[ROOT.Char.Custom('ES_XA')] tátic[ROOT.Char.Custom('ES_OA')] militar talentoso, muitos confiam que assegurará muitas vitórias ao seu [ROOT.Char.Custom('GetRealmOrDomicile')|l] no campo de batalha."
 SUCCESSION_EVENT_WINDOW_HEIR_LEARNING: "[ROOT.Char.GetWomanMan|U] sábio[ROOT.Char.Custom('ES_OA')] e erudito[ROOT.Char.Custom('ES_OA')], espera-se progresso e inovação durante seu reinado."
 SUCCESSION_EVENT_WINDOW_HEIR_STEWARDSHIP: "Econômico[ROOT.Char.Custom('ES_XA')] e frugal, certamente seu [ROOT.Char.Custom('GetRealmOrDomicile')|l] prosperará sob seu governo."
 SUCCESSION_EVENT_WINDOW_HEIR_INTRIGUE: "Est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] astucios[ROOT.Char.Custom('ES_OA')] e perspicaz não terá problemas em conseguir influência quando necessário."
 SUCCESSION_EVENT_WINDOW_HEIR_DIPLOMACY: "Com certeza vassalos e governantes estrangeiros respeitarão igualmente est[ROOT.Char.Custom('ES_EA')] expert[ROOT.Char.Custom('ES_OA')] diplomátic[ROOT.Char.Custom('ES_OA')]."
 SUCCESSION_EVENT_WINDOW_HEIR_STRONG_AND_SMART: "Possuindo uma poderosa constituição física e uma mente excepcionalmente perspicaz, o seu governo certamente dará origem a canções e lendas."
 SUCCESSION_EVENT_WINDOW_HEIR_WEAK_AND_DUMB: "Por não ter sido abençoad[ROOT.Char.Custom('ES_OA')] com uma mente afiada nem com o físico de um[ROOT.Char.Custom('ES_XA')] guerreir[ROOT.Char.Custom('ES_OA')], seu governo certamente será árduo."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_VARANGIAN: "Tendo servido em Miklagard distante, seu espírito aventureiro provavelmente inspirará seus [ROOT.Char.Custom('GetSubjectPlural')]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_LUNATIC: "Sendo um[ROOT.Char.Custom('ES_XA')] lunátic[ROOT.Char.Custom('ES_OA')] completamente transtornad[ROOT.Char.Custom('ES_OA')], só [ROOT.Char.GetFaith.HighGodName] poderá ajudar em seu governo."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_POSSESSED_BAD: "Sob suspeita de estar possuído[ROOT.Char.Custom('ES_OA')] por um demônio enviado por [ROOT.Char.GetFaith.DevilName], os [ROOT.Char.GetFaith.PriestMalePlural] farão o possível para conter[ROOT.Char.Custom('ES_LoLa')]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_POSSESSED_GOOD: "Abençoad[ROOT.Char.Custom('ES_OA')] por [ROOT.Char.GetFaith.HighGodName], seu corpo é apenas um recipiente pelo qual a vontade divina se revela."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_FAIR: "De uma beleza indescritível, sua aparência fará com que dignitários estrangeiros se curvem aos seus pés."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ADVENTURER: "A vida de est[ROOT.Char.Custom('ES_EA')] aventur[ROOT.Char.Custom('ES_OA')] estará cheia de glória e emoção."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_UGLY_DECEITFUL: "Astuto[ROOT.Char.Custom('ES_OA')] e enganador[ROOT.Char.Custom('ES_OA')] talvez a perdição de [ROOT.Char.GetFirstNameNoTooltip] termine sendo sua própria ruína com a verdade."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GLUTTON_GREEDY: "[ROOT.Char.GetWomanMan|U] ganancios[ROOT.Char.Custom('ES_OA')] e avarent[ROOT.Char.Custom('ES_OA')] é improvável que seja popular entre o campesinato do [ROOT.Char.Custom('GetRealmOrDomicile')|l]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CYNICAL_JUST: "Imparcial e just[ROOT.Char.Custom('ES_OA')] em tudo, muitos esperam que trate todos os conflitos com elegância."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CONTENT_ARBITRARY: "[ROOT.Char.GetWomanMan] corrupto[ROOT.Char.Custom('ES_OA')] e injusto[ROOT.Char.Custom('ES_OA')], muitos não esperam que seus vassalos fiquem de braços cruzados enquanto desperdiça o legado de seu predecessor."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRAVEN_MILITARY_ED: "Preferindo liderar tropas a partir da segurança de seu lar, [ROOT.Char.GetFirstNameNoTooltip] terá dificuldade em inspirar as tropas."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_SHY_CONTENT: "Um[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] reclus[ROOT.Char.Custom('ES_OA')] está perfeitamente bem em deixar que o conselho faça a maior parte de seu trabalho — para o bem ou para o mal."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ZEALOUS_PARANOID: "Vendo agentes de [ROOT.Char.GetFaith.DevilName] em cada esquina, os [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')] devem temer seu reinado."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ZEALOUS_GENEROUS: "Pio[ROOT.Char.Custom('ES_OA')] e generoso[ROOT.Char.Custom('ES_OA')], é muito provável que os [ROOT.Char.GetFaith.PriestMalePlural] se tornem ricos durante seu governo."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ARROGANT_BRAVE: "[ROOT.Char.GetFirstNameNoTooltip] sempre veste uma armadura reluzente e esplêndida, e quer que todos [ROOT.Char.GetHerHim] o vejam quando avança para a batalha."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CYNICAL_CRUEL: "Nunca temendo a ira de [ROOT.Char.GetFaith.HighGodName], é improvável que [ROOT.Char.GetFirstNameNoTooltip] poupe seus [ROOT.Char.Custom('GetSubjectPlural')] dos castigos que considerar apropriados."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_HUMBLE_STUBBORN: "Determinad em suas formas de adoração, a fé e a tradição provavelmente serão favorecidas sob o seu governo."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_DECEITFUL_CALLOUS: "Uma alma enganadora e descontente, o seu governo provavelmente estará cheio de rancor e intriga."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_PATIENT_TRUSTING: "[ROOT.Char.GetFirstNameNoTooltip], [ROOT.Char.GetWomanMan] confiant[ROOT.Char.Custom('ES_OA')] e paciente, está convencid[ROOT.Char.Custom('ES_OA')] de que coisas boas acabarão acontecendo com [ROOT.Char.GetHerHim]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_PARANOID_STRESSED: "Ao ver sombras em cada esquina, é provável que seja dominad[ROOT.Char.Custom('ES_OA')] por medo."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_STUBBORN_COMPASSIONATE: "Convencid[ROOT.Char.Custom('ES_OA')] de que é preciso demonstrar gentileza a todos, independentemente do valor de cada um, muitos temem que os inimigos de [ROOT.Char.GetFirstNameNoTooltip] usem isso a seu favor."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_STRONG_BRAVE: "Dominando seus inimigos no campo de batalha, [ROOT.Char.GetFirstNameNoTooltip] não terá problemas em inspirar suas tropas."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_TEMPERATE_LUSTFUL: "Sempre disposto[ROOT.Char.Custom('ES_OA')] a entreter seu cônjuge, muitos esperam que a família real cresça e prospere."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GENEROUS_JUST: "Muitos confiam que est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] equitativ[ROOT.Char.Custom('ES_OA')] se certificará de que todos recebam sua parte justa."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_DILIGENT_GREEDY: "[ROOT.Char.GetWomanMan|U] trabalhador[ROOT.Char.Custom('ES_XA')], com [ROOT.Char.Custom('ES_ElElla')] o [ROOT.Char.Custom('GetRealmOrDomicile')|l] alcançará riquezas ou cairá na ruína."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRAVEN_HONEST: "Sempre disposto[ROOT.Char.Custom('ES_OA')] a admitir suas muitas fraquezas, há grandes dúvidas de que o [ROOT.Char.Custom('GetRealmOrDomicile')|l] possa confiar em seu nov[ROOT.Char.Custom('ES_OA')] senhor[ROOT.Char.Custom('ES_XA')]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_SHY_TRUSTING: "[ROOT.Char.GetWomanMan|U] ingênu[ROOT.Char.Custom('ES_OA')], sua natureza relutante talvez impeça [ROOT.Char.GetHerHim] de assumir o comando."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GREGARIOUS_HONEST: "Como nunca temeu expressar suas ideias, certamente encantará todo o [ROOT.Char.Custom('GetRealmOrDomicile')|l] com sua honestidade perspicaz."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CYNICAL_ARBITRARY: "Totalmente destituíd[ROOT.Char.Custom('ES_OA')] de uma bússola moral, seus [ROOT.Char.Custom('GetSubjectPlural')] terão que aprender se devem temer[ROOT.Char.Custom('ES_LoLa')] ou respeitar[ROOT.Char.Custom('ES_LoLa')]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRUEL_WRATHFUL: "É [Select_CString( ROOT.Char.IsFemale, 'uma sádica', 'um sádico' )] irrefreável, e muitos temem em que se transformará o [ROOT.Char.Custom('GetRealmOrDomicile')|l] durante seu governo."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_WRATHFUL_ZEALOUS: "Cegad[ROOT.Char.Custom('ES_OA')] pelo fervor religioso, os [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')] temerão sua justa ira."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_PARANOID_DECEITFUL: "Muitos temem que esta pessoa tão malvada e desconfiada guarde adagas com nossos nomes escritos nelas."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_COMPASSIONATE: "[ROOT.Char.GetFirstNameNoTooltip] é uma alma gentil e compassiva. Os vassalos certamente prosperarão sob seu reinado."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ARROGANT: "Sempre confiante em si mesm[ROOT.Char.Custom('ES_OA')], o governo de [ROOT.Char.GetFirstNameNoTooltip] pode trazer glória ou vergonha à Casa [ROOT.Char.GetHouse.GetName]... Só o tempo dirá."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CYNICAL: "Como nunca se importa com a palavra do [ROOT.Char.GetFaith.ReligiousText], muitos temem que o reinado de [ROOT.Char.GetFirstNameNoTooltip] termine cedo quando [ROOT.Char.GetFaith.HighGodName] [ROOT.Char.GetHerHim] o fira."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GREGARIOUS: "Tem boa oratória e é extrovertid[ROOT.Char.Custom('ES_OA')], então muitos acreditam que [ROOT.Char.GetFirstNameNoTooltip] não terá dificuldade em conquistar a corte para o seu lado."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ZEALOUS: "Passando longas horas em oração para não desagradar a [ROOT.Char.GetFaith.HighGodName], muitos estão confiantes de que o reinado de [ROOT.Char.GetFirstNameNoTooltip] será uma bênção para o [ROOT.Char.Custom('GetRealmOrDomicile')|l]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_AMBITIOUS: "Sendo um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] ambicios[ROOT.Char.Custom('ES_OA')], muitos esperam que o seu [ROOT.Char.Custom('GetRealmOrDomicile')|l] cresça e prospere sob o seu governo."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_DILIGENT: "Enérgic[ROOT.Char.Custom('ES_OA')] e tranquil[ROOT.Char.Custom('ES_OA')], [ROOT.Char.GetFirstNameNoTooltip] certamente melhorará o [ROOT.Char.Custom('GetRealmOrDomicile')|l] durante seu reinado."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_DECEITFUL: "Astuto[ROOT.Char.Custom('ES_OA')] e enganoso[ROOT.Char.Custom('ES_OA')], é possível que a ruína de [ROOT.Char.GetFirstNameNoTooltip] termine sendo sua inimizade com a verdade."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_SHY: "[ROOT.Char.GetWomanMan|U] silencios[ROOT.Char.Custom('ES_OA')], muitos não esperam que se dê bem em assuntos diplomáticos."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_HUMBLE: "[ROOT.Char.GetWomanMan|U] piedos[ROOT.Char.Custom('ES_OA')] e humilde, muitos temem que [ROOT.Char.GetFirstNameNoTooltip] estaria melhor preparad[ROOT.Char.Custom('ES_OA')] para [ROOT.Char.GetFaith.HouseOfWorship]s do que para o trono."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ARBITRARY: "[ROOT.Char.GetWomanMan] corrupto[ROOT.Char.Custom('ES_OA')] e injusto[ROOT.Char.Custom('ES_OA')], poucos confiam que os vassalos de seu [ROOT.Char.Custom('GetRealmOrDomicile')|l] fiquem de braços cruzados se este começar a desmoronar sob seu comando."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_TEMPERATE: "[ROOT.Char.GetWomanMan|U] modesto[ROOT.Char.Custom('ES_OA')] e comedido[ROOT.Char.Custom('ES_OA')], sua natureza passiva também pode ser sua ruína."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CHASTE: "Leal ao seu cônjuge e família, [ROOT.Char.GetFirstNameNoTooltip] certamente colocará o bem de sua dinastia acima de todas as preocupações pessoais."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_LUSTFUL: "Com os olhos sempre voltados para o próximo alvo, os vassalos do [ROOT.Char.Custom('GetRealmOrDomicile')|l] têm o bom senso de trancar seus cônjuges enquanto [ROOT.Char.GetFirstNameNoTooltip] assume o trono."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CONTENT: "Satisfeito[ROOT.Char.Custom('ES_OA')] com o que tem, talvez até os vassalos de [ROOT.Char.GetFirstNameNoTooltip] ridicularizem sua natureza passiva."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_PATIENT: "Visto que é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] com predisposição para esperar que os planos deem certo, muitos confiam que grandes mudanças cheguem ao [ROOT.Char.Custom('GetRealmOrDomicile')|l], embora lentamente."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_BRAVE: "Corajoso[ROOT.Char.Custom('ES_OA')] e disposto[ROOT.Char.Custom('ES_OA')] a se lançar à ação, muitos esperam que sua bravura não leve o [ROOT.Char.Custom('GetRealmOrDomicile')|l] à ruína por imprudência."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_JUST: "Justo e imparcial[ROOT.Char.Custom('ES_OA')] em tudo, muitos esperam que lide com quaisquer conflitos com graça."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GLUTTONOUS: "[ROOT.Char.GetWomanMan|U] de grande apetite, muitos esperam que coloque o [ROOT.Char.Custom('GetRealmOrDomicile')|l] antes da sua própria fome."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CALLOUS: "[ROOT.Char.GetWomanMan|U] frio[ROOT.Char.Custom('ES_OA')] e insensível, os vassalos do [ROOT.Char.Custom('GetRealmOrDomicile')|l] terão dificuldade para conquistar sua confiança."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRAVEN: "Covarde e medros[ROOT.Char.Custom('ES_OA')], é improvável que seus [ROOT.Char.Custom('GetSubjectPlural')] [ROOT.Char.GetHerHim] respeitem."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GREEDY: "É improvável que est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] cobiços[ROOT.Char.Custom('ES_OA')] conquiste o favor do campesinato do [ROOT.Char.Custom('GetRealmOrDomicile')|l]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRUEL: "Muitos temem que a corte de [ROOT.Char.GetFirstNameNoTooltip] viva com medo de est[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] tão mesquinh[ROOT.Char.Custom('ES_OA')]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_TRUSTING: "Confiante[ROOT.Char.Custom('ES_OA')] e complacente, pode ser que o conselho de [ROOT.Char.GetFirstNameNoTooltip] tenha mais poder sobre [ROOT.Char.GetSheHe] do que deveria."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_HONEST: "Incapaz de contar uma mentira, muitos temem que a sua franqueza não seja adequada para as delicadas nuances da política."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_LAZY: "Ao ser um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] preguiços[ROOT.Char.Custom('ES_OA')], muitos temem que nada de bom saia do reinado de [ROOT.Char.GetFirstNameNoTooltip]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GENEROUS: "É um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] generos[ROOT.Char.Custom('ES_OA')], e muitos confiam que seu coração bondoso não o leve a esvaziar os cofres do [ROOT.Char.Custom('GetRealmOrDomicile')|l] em causas inúteis."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_WRATHFUL: "De gênio explosivo, é provável que inimigos e vassalos de [ROOT.Char.GetFirstNameNoTooltip] por igual vivam com medo de [ROOT.Char.GetSheHe]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_PARANOID: "Pode ser que a paranoia dest[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] suspeitos[ROOT.Char.Custom('ES_OA')] não caia bem entre seus [ROOT.Char.Custom('GetSubjectPlural')]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_STUBBORN: "[ROOT.Char.GetFirstNameNoTooltip] é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] teimos[ROOT.Char.Custom('ES_OA')], e talvez seus [ROOT.Char.Custom('GetSubjectPlural')] tenham dificuldade para falar depois que [ROOT.Char.GetSheHe] tomar uma decisão."
 SUCCESSION_EVENT_WINDOW_HEIR_PIETY: "[ROOT.Char.GetWomanMan|U] devot[ROOT.Char.Custom('ES_OA')]; com certeza [ROOT.Char.GetFirstNameNoTooltip] impressionará os [ROOT.Char.GetFaith.PriestMalePlural] com seu vasto conhecimento do [ROOT.Char.GetFaith.ReligiousText]."
 SUCCESSION_EVENT_WINDOW_HEIR_PRESTIGE: "Certamente os dignitários de todos os cantos se curvarão diante de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] de tanto prestígio."
 SUCCESSION_EVENT_WINDOW_HEIR_FRIENDS: "Abençoado[ROOT.Char.Custom('ES_OA')] com uma grande quantidade de amigos, é muito provável que [ROOT.Char.GetFirstNameNoTooltip] encontre um forte apoio para seu governo."
 SUCCESSION_EVENT_WINDOW_HEIR_TYRANT: "Já é um[ROOT.Char.Custom('ES_XA')] tiran[ROOT.Char.Custom('ES_OA')] odiad[ROOT.Char.Custom('ES_OA')], então o [ROOT.Char.Custom('GetRealmOrDomicile')|l] treme diante de seu governo."
 SUCCESSION_EVENT_WINDOW_HEIR_RICH: "Em posse de riquezas fabulosas, só o tempo dirá se fará prosperar o [ROOT.Char.Custom('GetRealmOrDomicile')|l] ou se ficará a se empoleirar sobre o ouro como um dragão."
 SUCCESSION_EVENT_WINDOW_HEIR_CHILDREN: "[ROOT.Char.Custom('ES_EA')] [ROOT.Char.GetWomanMan] fértil já gerou numerosos herdeiros em potencial para o [ROOT.Char.Custom('GetRealmOrDomicile')|l]."
 SUCCESSION_EVENT_WINDOW_HEIR_RIVALS: "Rodeado[ROOT.Char.Custom('ES_OA')] de inimigos e rivais, muitos esperam que o governo de [ROOT.Char.GetFirstNameNoTooltip] não seja interrompido por uma punhalada pelas costas."
 SUCCESSION_EVENT_WINDOW_HEIR_COMBAT_SKILLS: "Muitos confiam que est[ROOT.Char.Custom('ES_EA')] duelista formidável se destaque em torneios e em combate pessoal por igual."
 SUCCESSION_EVENT_WINDOW_HEIR_POOR_HEALTH: "Sendo um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] frágil e doent[ROOT.Char.Custom('ES_OA')], o [ROOT.Char.Custom('GetRealmOrDomicile')|l] inteiro deseja que a boa saúde retorne a [ROOT.Char.GetHerHim]."
 SUCCESSION_EVENT_WINDOW_HEIR_BASTARD: "Por ser um[ROOT.Char.Custom('ES_XA')] filh[ROOT.Char.Custom('ES_OA')] ilegítim[ROOT.Char.Custom('ES_OA')], provavelmente [ROOT.Char.GetFirstNameNoTooltip] tentará deixar sua marca no destino."
 SUCCESSION_EVENT_WINDOW_HEIR_VIKING: "Tendo liderado inúmeras incursões, o nome de [ROOT.Char.GetFirstNameNoTooltip] já é conhecido e temido em todo o mundo."
 SUCCESSION_EVENT_WINDOW_HEIR_CRUSADER: "Tendo liderado os guerreiros santos contra os infiéis, certamente o nome de [ROOT.Char.GetFirstNameNoTooltip] é amado aos olhos de [ROOT.Char.GetFaith.HighGodName]."
 SUCCESSION_EVENT_WINDOW_HEIR_THREE_SKILLS: "Ao dominar tantas habilidades, certamente já conta com a admiração de seus [ROOT.Char.Custom('GetSubjectPlural')]."
 SUCCESSION_EVENT_WINDOW_HEIR_FIVE_SKILLS: "Abençoado com um conhecimento incrível de todas as coisas entre o céu e a terra, o governo de [ROOT.Char.GetFirstNameNoTooltip] será lendário."
 SUCCESSION_EVENT_WINDOW_HEIR_DREAD: "Com essa presença tão aterradora, já tem uma reputação de ferocidade e crueldade."
 SUCCESSION_EVENT_WINDOW_HEIR_GENDER: "Alguns temem que a ascensão de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] ao trono possa ser um sintoma dos tempos incertos que estão por vir."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_REVELER: "[ROOT.Char.GetWomanMan|U] encantador[ROOT.Char.Custom('ES_XA')] e extrovertid[ROOT.Char.Custom('ES_OA')], é conhecid[ROOT.Char.Custom('ES_OA')] entre muitos nobres do [ROOT.Char.Custom('GetRealmOrDomicile')|l] por ser um[ROOT.Char.Custom('ES_XA')] anfitri[ROOT.Char.Custom('ES_OnOna')] refinad[ROOT.Char.Custom('ES_OA')]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ADMINISTRATOR: "Administrador[ROOT.Char.Custom('ES_XA')] instruído, é reconhecido como uma das pessoas mais qualificadas para ascender ao trono."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_SCHOLAR: "Célebre por seu interesse em assuntos metafísicos, pode ser que não esteja bem preparad[ROOT.Char.Custom('ES_OA')] para lidar com os problemas cotidianos de um governo secular."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CALLOUS_LONER: "[ROOT.Char.GetWomanMan|U] fria[ROOT.Char.Custom('ES_OA')] e cruel[ROOT.Char.Custom('ES_OA')], dizem que não sente nada e não se importa com ninguém."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_VENGEFUL: "[ROOT.Char.GetWomanMan|U] mesquinho[ROOT.Char.Custom('ES_OA')] e rancoroso[ROOT.Char.Custom('ES_OA')], seus vassalos terão que agir com cuidado ao lidar com [ROOT.Char.GetSheHe]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_DEPRESSED: "Esta alma melancólica em busca de conforto pode carecer da fortaleza necessária para liderar seus novos [ROOT.Char.Custom('GetSubjectPlural')]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_BLIND_WEAK: "[ROOT.Char.GetWomanMan|U] cego, fraco[ROOT.Char.Custom('ES_OA')] deixa o [ROOT.Char.Custom('GetRealmOrDomicile')|l] nas mãos de seus ajudantes."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_EXCOMMUNICATED: "Excomungad[ROOT.Char.Custom('ES_OA')] pela Igreja, chega ao poder após ser declarad[ROOT.Char.Custom('ES_OA')] herege. Muitos acreditam que levará o [ROOT.Char.Custom('GetRealmOrDomicile')|l] à perdição."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_BERSERKER: "Guerreiro[ROOT.Char.Custom('ES_OA')] feroz e implacável, acredita-se que uiva para a lua e bebe o sangue de seus inimigos em combate."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CANNIBAL: "Rumorado por se banquetear com carne humana, terá muito a provar para conquistar a confiança de seus vassalos."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRIMINAL: "Correm muitos rumores vis ao redor de [ROOT.Char.Custom('ES_ElElla')], alguns mais horríveis e repulsivos que outros."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_WITCH: "Como se diz que mistura ervas proibidas e lança maldições contra seus inimigos, terá mais dificuldade em conquistar a confiança de seus [ROOT.Char.Custom('GetSubjectPlural')]."
 SUCCESSION_EVENT_WINDOW_HEIR_UNIMPRESSIVE: "Sem muitas realizações em seu nome, ainda é difícil saber que tipo de governante ele/ela se tornará."
 SUCCESSION_EVENT_WINDOW_GAME_OVER_INTRO: "A linhagem chegou ao fim"
 SUCCESSION_EVENT_WINDOW_GAME_OVER_INTRO_UNLANDED: "[ROOT.Char.GetFullNameNoTooltip] perdeu todos os seus títulos e ficou sem terras"
 SUCCESSION_EVENT_WINDOW_GAME_OVER_INTRO_BARON: "[ROOT.Char.GetFullNameNoTooltip] perdeu todos os títulos, exceto o de barão"
