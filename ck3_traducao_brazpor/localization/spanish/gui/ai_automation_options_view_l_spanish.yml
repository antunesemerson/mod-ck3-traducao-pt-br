l_spanish:
 ARMY_AUTOMATION_FEATURE_NAME: "Exércitos Automatizados"
 AOV_HEADING: "Configurações de $ARMY_AUTOMATION_FEATURE_NAME$"
 AOV_APPLY: "$BARBERSHOP_APPLY$"
 AOV_SET_TO_DEFAULT: "$CHARACTER_RESET_FILTERS$"
 AOV_SET_TO_DEFAULT_TT: "[AddLocalizationIf( ArmyAutomationOptionsView.AreDisplayedSettingsDefault, 'AOV_SET_TO_DEFAULT_TT_CONTENT' )]"
 AOV_SET_TO_DEFAULT_TT_CONTENT: "@warning_icon! #X Configurações já estão no padrão#!"
 AOV_COMPANION_OFF_WARNING: "@alert_icon! Essas configurações não têm efeito enquanto $ARMY_AUTOMATION_FEATURE_NAME$ estiver desativado"
 AOV_AUTOMATED: "Automatizado"
 AOV_MANUAL: "Manual"
 AOV_OPT_COMMANDERS: "Atribuir Comandantes"
 AOV_OPT_COMMANDERS_NOT_PLAYERS: "Limitado"
 AOV_OPT_COMMANDERS_NOT_PLAYERS_TT: "#T Atribuição Limitada de $game_concept_commander$\n#![commanders|lE] são atribuídos automaticamente às suas [armies|lE], mas você nunca é atribuído como $game_concept_commander$"
 AOV_OPT_COMMANDERS_AUTOMATED_TT: "#T Atribuição Automatizada de $game_concept_commander$\n#![commanders|lE] são atribuídos automaticamente às suas [armies|lE]"
 AOV_OPT_COMMANDERS_MANUAL_TT: "#T Atribuição Manual de $game_concept_commander$\n#!Você deve atribuir manualmente [commanders|lE] às suas [armies|lE]"
 AOV_OPT_WAR_STANCE: "Postura de Guerra"
 AOV_OPT_WAR_STANCE_DEFAULT: "Adaptativa"
 AOV_OPT_WAR_STANCE_DEFAULT_TT: "#T Postura Adaptativa\n#!Suas [armies|lE] agirão de forma ofensiva ou defensiva dependendo da situação"
 AOV_OPT_WAR_STANCE_OFFENSIVE: "Ofensiva"
 AOV_OPT_WAR_STANCE_OFFENSIVE_TT: "#T Postura Ofensiva\n#!Suas [armies|lE] agirão sempre de forma ofensiva"
 AOV_OPT_WAR_STANCE_DEFENSIVE: "Defensiva"
 AOV_OPT_WAR_STANCE_DEFENSIVE_TT: "#T Postura Defensiva\n#!Suas [armies|lE] agirão sempre de forma defensiva"
 AOV_OPT_RAIDING: "Saques"
 AOV_OPT_RAIDING_AUTOMATED_TT: "#T Saques automáticos\n#!Seus [armies|lE] de [Concept('raider', 'saqueadores')|E] se reunirão e partirão em $game_concept_raids$ sozinhos"
 AOV_OPT_RAIDING_MANUAL_TT: "#T Escambo manual\n#!Você controla e reúne seus próprios [armies|lE] de [Concept('barterer', 'trocadores')|E]"
 AOV_OPT_BARTERING: "Troca"
 AOV_OPT_BARTERING_AUTOMATED_TT: "#T Escambo automático\n#!Seus [armies|lE] de [Concept('barterer', 'trocadores')|E] se reunirão e sairão em missões de [Concept('barter', 'escambo')|E] sozinhos"
 AOV_OPT_BARTERING_MANUAL_TT: "#T Escambo manual\n#!Você controla e reúne seus próprios [armies|lE] de [Concept('barterer', 'trocadores')|E]"
 AOV_OPT_HIRING: "Contratação de Tropas"
 AOV_OPT_HIRING_FULL: "Contratar e Estender"
 AOV_OPT_HIRING_FULL_TT: "#T Contratação Automatizada\n#![mercenaries|lE], [holy_orders|lE] e [provincial_armies|lE] serão pagos automaticamente, e [mercenary_contracts|lE] serão estendidos se necessário para o esforço de guerra"
 AOV_OPT_HIRING_EXTEND: "Somente Estender"
 AOV_OPT_HIRING_EXTEND_TT: "#T Extensão Automatizada de Contratos de Mercenários\n#![mercenary_contracts|lE] serão estendidos se necessário para o esforço de guerra"
 AOV_OPT_HIRING_MANUAL_TT: "#T Contratação Manual\n#!Você deve pagar manualmente para [mercenaries|lE], [holy_orders|lE] e [provincial_armies|lE]"
 MV_AUTOMATION_TOGGLE_TT: "[SelectLocalization( GetPlayer.HasCompanionAI, 'MV_AUTOMATION_TOGGLE_TT_ON', 'MV_AUTOMATION_TOGGLE_TT_OFF' )]"
 MV_AUTOMATION_TOGGLE_TT_ON: "#T $ARMY_AUTOMATION_FEATURE_NAME$: #V Ativado#!\n#!$MV_AUTOMATION_TOGGLE_TT_DESC$\n\n#I Clique para desativar a automação#!"
 MV_AUTOMATION_TOGGLE_TT_OFF: "#T $ARMY_AUTOMATION_FEATURE_NAME$: #V Desativado#!\n#!$MV_AUTOMATION_TOGGLE_TT_DESC$\n\n#I Clique para ativar a automação#!"
 MV_AUTOMATION_TOGGLE_TT_DESC: "[SelectLocalization(GetPlayer.HasDefaultCompanionAISettings, 'MV_AUTOMATION_TOGGLE_TT_DEFAULT_DESC' , 'MV_AUTOMATION_TOGGLE_TT_CUSTOM_DESC')]"
 MV_AUTOMATION_TOGGLE_TT_DEFAULT_DESC: "Se esta opção estiver ativada, suas [armies|lE] serão levantadas e lutarão contra o inimigo por conta própria, e designarão seus próprios [commanders|lE].\n\nVocê ainda será responsável por comprar [men_at_arms|lE], contratar [mercenaries|lE] e fazer [raids|lE].\n\n#help Exércitos automatizados são pensados para jogadores pouco acostumados à guerra ou que preferem concentrar sua atenção em outros assuntos. Se você for um jogador experiente, recomendamos controlar seus exércitos pessoalmente.#!"
 MV_AUTOMATION_TOGGLE_TT_CUSTOM_DESC: "Se ativado, suas [armies|lE] agirão por conta própria, mas são limitadas pelas configurações que você escolheu."
 MV_AUTOMATION_SETTINGS_TT: "#T Abrir $AOV_HEADING$\n#!Alterar o comportamento padrão para $ARMY_AUTOMATION_FEATURE_NAME$"
