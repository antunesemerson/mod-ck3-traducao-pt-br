 camp_purpose: "$EFFECT_LIST_BULLET$ Encontra mais [mercenary_task_contracts|lE]\n $EFFECT_LIST_BULLET$ Encontra mais [task_contracts|lE] de [prowess|lE] e [Concept( 'martial', 'marciais' )|E]\n $EFFECT_LIST_BULLET$ Desbloqueia estes [camp_buildings|lE]:\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('baggage_train_siege_engineers').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('proving_grounds_lockwagon').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_perimeter_palisade').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_perimeter_ditch').GetName]#!\n $EFFECT_LIST_BULLET$ Permite acessar certos [officers|lE] especiais:\n $BULLET_WITH_TAB$[GetCourtPositionType('chief_engineer_camp_officer').GetName()] #weak (desbloqueado via $baggage_train_siege_engineers_domicile_building$)#!\n $BULLET_WITH_TAB$[GetCourtPositionType('master_of_spoils_camp_officer').GetName()] #weak (desbloqueado via $proving_grounds_lockwagon_domicile_building$)#!\n\n#WEAK Os mercenários ganham sua paga, antes de tudo e acima de tudo, com a espada. Normalmente de forma legal, mas às vezes os tempos são difíceis e tudo o que temos é um machado...#!"
