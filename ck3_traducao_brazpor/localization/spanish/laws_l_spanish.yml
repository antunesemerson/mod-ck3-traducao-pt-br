 camp_purpose_mercenaries: "Espadas de Aluguel"
 camp_purpose_mercenaries_effects: "$EFFECT_LIST_BULLET$ Encontra mais [mercenary_task_contracts|lE]\n $EFFECT_LIST_BULLET$ Encontra mais [task_contracts|lE] de [prowess|lE] e [Concept( 'martial', 'marciais' )|E]\n $EFFECT_LIST_BULLET$ Desbloqueia estes [camp_buildings|lE]:\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('baggage_train_siege_engineers').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('proving_grounds_lockwagon').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_perimeter_palisade').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_perimeter_ditch').GetName]#!\n $EFFECT_LIST_BULLET$ Permite acessar certos [officers|lE] especiais:\n $BULLET_WITH_TAB$[GetCourtPositionType('chief_engineer_camp_officer').GetName()] #weak (desbloqueado via $baggage_train_siege_engineers_domicile_building$)#!\n $BULLET_WITH_TAB$[GetCourtPositionType('master_of_spoils_camp_officer').GetName()] #weak (desbloqueado via $proving_grounds_lockwagon_domicile_building$)#!\n\n#WEAK Os mercenários ganham sua paga, antes de tudo e acima de tudo, com a espada. Normalmente de forma legal, mas às vezes os tempos são difíceis e tudo o que temos é um machado...#!"
 camp_purpose_wanderers: "Andarilhos"
 camp_purpose_wanderers_effects: "$EFFECT_LIST_BULLET$ Igual probabilidade de encontrar [task_contracts|lE] de qualquer tipo\n$EFFECT_LIST_BULLET$ Pode mudar para qualquer outro $camp_purpose$ sem pagar uma tremenda quantidade de [prestige|lE]\n\n#WEAK As estradas abertas oferecem uma liberdade sem igual, por que manchá-la com um nicho desnecessário?#!"
 camp_purpose_scholars: "Eruditos"
 camp_purpose_scholars_effects: "$EFFECT_LIST_BULLET$Encontra mais [task_contracts|lE] de [learning|lE] e [stewardship|lE]\n$EFFECT_LIST_BULLET$Encontra levemente mais [task_contracts|lE] de [diplomacy|lE]\n$EFFECT_LIST_BULLET$Desbloqueia estes [camp_buildings|lE]:\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('barber_tent_reference_corpus').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('barber_tent_morticians_tools').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('baggage_train_siege_engineers').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('baggage_train_scribes').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('baggage_train_ascetics').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_fire_nightly_debates').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('proving_grounds_martial_study').GetName]#!\n$EFFECT_LIST_BULLET$Pode acessar certos [officers|lE] especiais:\n$BULLET_WITH_TAB$[GetCourtPositionType('chief_engineer_camp_officer').GetName()] #weak (desbloqueado mediante $baggage_train_siege_engineers_domicile_building$)#!\n\n#WEAK Un libro guardado en una biblioteca está inquieto, una idea guardada en una sola mente está malgastada.#!"
 camp_purpose_explorers: "Exploradores"
 camp_purpose_explorers_effects: "$EFFECT_LIST_BULLET$ Encontra mais [transport_task_contracts|lE]\n$EFFECT_LIST_BULLET$ Encontra mais [task_contracts|lE] de [diplomacy|lE] e [intrigue|lE]\n$EFFECT_LIST_BULLET$ Encontra ligeiramente mais [task_contracts|lE] [Concept( 'martial', 'marciais' )|E]\n$EFFECT_LIST_BULLET$ Desbloqueia estes [camp_buildings|lE]:\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_reserve_provisions').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_reserve_water').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_climbing_gear').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_fire_local_hangers_on').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_perimeter_extra_watch').GetName]#!\n\n#WEAK Sempre há outra colina, outra montanha, outra cultura, outra língua, esperando logo além do horizonte...#!"
 camp_purpose_brigands: "Saqueadores"
 camp_purpose_brigands_effects: "$EFFECT_LIST_BULLET$ Encontra mais [criminal_task_contracts|lE] de todos os tipos\n$EFFECT_LIST_BULLET$ Encontra mais [task_contracts|lE] de [prowess|lE] e [intrigue|lE]\n$EFFECT_LIST_BULLET$ Desbloqueia estes [camp_buildings|lE]:\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_subdued_gear').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('barber_tent_morticians_tools').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('baggage_train_ransom_cages').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('baggage_train_negotiators').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_fire_juicy_rumors').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('proving_grounds_lockwagon').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('proving_grounds_the_stick_game').GetName]#!\n$EFFECT_LIST_BULLET$ Pode acessar certos [officers|lE] especiais:\n$BULLET_WITH_TAB$[GetCourtPositionType('master_thief_camp_officer').GetName()] #weak (desbloqueado mediante $supply_tent_subdued_gear_domicile_building$)#!\n$BULLET_WITH_TAB$[GetCourtPositionType('person_haggler_camp_officer').GetName()] #weak (desbloqueado mediante $baggage_train_ransom_cages_domicile_building$)#!\n$BULLET_WITH_TAB$[GetCourtPositionType('master_of_spoils_camp_officer').GetName()] #weak (desbloqueado mediante $proving_grounds_lockwagon_domicile_building$)#!\n\n#WEAK \"Bandido\" é um termo tão feio... Ser decidido e prático não tem nada de errado, especialmente se, ao mesmo tempo, você consegue obter um bom lucro.#!"
 camp_purpose_legitimists: "Legitimistas"
 camp_purpose_legitimists_effects: "$EFFECT_LIST_BULLET$ Probabilidade igual de encontrar qualquer tipo de [task_contract|lE]\n $EFFECT_LIST_BULLET$ Pode usar a interação $request_laamp_legitimist_support$ sobre reis e imperadores\n $EFFECT_LIST_BULLET$ Pode usar o [casus_belli|lE] $claim_cb$\n $EFFECT_LIST_BULLET$ Encontra um [task_contract|lE] único de $laamp_legitimist_support_contract$\n $EFFECT_LIST_BULLET$ Desbloqueia estes [camp_buildings|lE]:\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_fire_future_dreams').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('proving_grounds_bodyguard_drills').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('proving_grounds_martial_study').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('proving_grounds_lockwagon').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('baggage_train_scribes').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('baggage_train_proof_of_claims').GetName]#!\n $BULLET_WITH_TAB$#high [GetDomicileBuilding('baggage_train_ransom_cages').GetName]#!\n $EFFECT_LIST_BULLET$ Pode acessar certos [officers|lE] especiais:\n $BULLET_WITH_TAB$[GetCourtPositionType('witness_camp_officer').GetName()] #weak (desbloqueado por meio de $baggage_train_proof_of_claims_domicile_building$)#!\n $BULLET_WITH_TAB$[GetCourtPositionType('master_of_spoils_camp_officer').GetName()] #weak (desbloqueado por meio de $proving_grounds_lockwagon_domicile_building$)#!\n\n#WEAK Um direito, assim o chamam. Uma mera reivindicação. Não é apenas uma reivindicação; é uma carta de dívida, uma declaração de intenções e um indicador inequívoco da reivindicação que está por vir.#!"
