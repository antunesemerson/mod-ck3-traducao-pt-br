 camp_purpose_wanderers: "Exploradores"
 camp_purpose_wanderers_effects: "$EFFECT_LIST_BULLET$ Encontra mais [transport_task_contracts|lE]\n$EFFECT_LIST_BULLET$ Encontra mais [task_contracts|lE] de [diplomacy|lE] e [intrigue|lE]\n$EFFECT_LIST_BULLET$ Encontra ligeiramente mais [task_contracts|lE] [Concept( 'martial', 'marciais' )|E]\n$EFFECT_LIST_BULLET$ Desbloqueia estes [camp_buildings|lE]:\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_reserve_provisions').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_reserve_water').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_climbing_gear').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_fire_local_hangers_on').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_perimeter_extra_watch').GetName]#!\n\n#WEAK Sempre há outra colina, outra montanha, outra cultura, outra língua, esperando logo além do horizonte...#!"
