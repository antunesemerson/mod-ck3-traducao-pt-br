 #Intro
 BattlePoiDescriptionIntro1: "Os dois lados se enfrentaram em $BattlePoiProvince$, um liderado por $BattlePoiCommander$ e o outro por $BattlePoiEnemyCommander$."
 BattlePoiDescriptionIntroAttacker2: "$BattlePoiCommander$ lançou uma ofensiva impressionante contra o exército de $BattlePoiEnemyCommander$."
 BattlePoiDescriptionIntroDefender2: "$BattlePoiCommander$ montou uma defesa habilidosa contra o exército de $BattlePoiEnemyCommander$."
 BattlePoiDescriptionIntroAttackerFallback: "$BattlePoiCommander$ liderou bravamente suas tropas em um ataque contra o exército de $BattlePoiEnemyCommander$ de $BattlePoiEnemyCommanderCulture$."
 BattlePoiDescriptionIntroDefenderFallback: "$BattlePoiCommander$ liderou bravamente suas tropas em uma defesa contra o exército de $BattlePoiEnemyCommander$ de $BattlePoiEnemyCommanderCulture$."
 #Key Moment
 BattlePoiDescriptionLocArchers: "O momento decisivo da batalha foi quando a tropa de arqueiros $BattlePoiCommanderCulture$ conseguiu envolver o inimigo,"
 BattlePoiDescriptionLocHeavyInfantry: "A batalha foi decidida quando um regimento de infantaria pesada de $BattlePoiCommanderCulture$ rompeu as linhas inimigas,"
 BattlePoiDescriptionLocLightCavalry: "O desfecho foi decidido quando a cavalaria de $BattlePoiCommanderCulture$ conseguiu se infiltrar nas tropas inimigas,"
 BattlePoiDescriptionLocHeavyCavalry: "A batalha chegou ao fim quando a cavalaria de $BattlePoiCommanderCulture$ rompeu as linhas inimigas e invadiu o coração da formação adversária,"
 BattlePoiDescriptionLocPikemen: "A vitória foi garantida quando os piquenes de $BattlePoiCommanderCulture$ repeliram o ataque inimigo,"
 BattlePoiDescriptionLocArchersKnight: "O momento decisivo da batalha foi quando a tropa $BattlePoiCommanderCulture$ de arqueiros, dirigida por $BattlePoiBraveKnight$, conseguiu contornar o inimigo,"
 BattlePoiDescriptionLocHeavyInfantryKnight: "A batalha foi decidida quando um regimento de infantaria pesada de $BattlePoiCommanderCulture$ liderado por $BattlePoiBraveKnight$ rompeu as linhas inimigas,"
 BattlePoiDescriptionLocLightCavalryKnight: "O desfecho foi decidido quando a cavalaria de $BattlePoiCommanderCulture$ liderada por $BattlePoiBraveKnight$ conseguiu se infiltrar nas tropas inimigas,"
 BattlePoiDescriptionLocHeavyCavalryKnight: "A batalha chegou ao fim quando a cavalaria de $BattlePoiCommanderCulture$ liderada por $BattlePoiBraveKnight$ rompeu as linhas inimigas e invadiu o coração da formação adversária,"
 BattlePoiDescriptionLocPikemenKnight: "A vitória foi garantida quando os piquenes de $BattlePoiCommanderCulture$ liderados por $BattlePoiBraveKnight$ repeliram o ataque inimigo,"
 BattlePoiDescriptionLocVarangian: "A batalha chegou ao fim quando um grupo de varangianos liderados por $BattlePoiBraveKnight$ rompeu as linhas inimigas e se infiltrou profundamente na formação adversária,"
 BattlePoiDescriptionLocBerserker: "A batalha tomou um rumo inesperado quando $BattlePoiBraveKnight$ correu pelas linhas de $BattlePoiEnemyCommanderCulture$,"
 BattlePoiDescriptionLocMidFallback: "Ambos se cansaram, e no final os $BattlePoiCommanderCulture$ envolveram o inimigo"
 #Outcome
 BattlePoiDescriptionLocOutcomeBerserker: "destruiu sozinho a moral inimiga ao matar várias dezenas de guerreiros adversários,"
 BattlePoiDescriptionLocOutcomeBerserkerFled: "e destruiu sozinho a moral inimiga ao matar várias dezenas de guerreiros adversários."
 BattlePoiDescriptionLocOutcomeDevastation: "destruiu seus inimigos,"
 BattlePoiDescriptionLocOutcomeDevastationFled: "e destruiu o exército inimigo."
 BattlePoiDescriptionLocOutcomeChaos: "causou grandes perdas aos adversários,"
 BattlePoiDescriptionLocOutcomeChaosFled: "e causou grandes perdas aos adversários."
 BattlePoiDescriptionLocOutcomeLoss: "quebrou a moral de seus oponentes,"
 BattlePoiDescriptionLocOutcomeLossFled: "e quebrou a moral de seus oponentes."
 #Outro
 BattlePoiDescriptionLocOutroImprisoned: "e capturou $BattlePoiEnemyCommander$."
 BattlePoiDescriptionLocOutroSlain: "e matou $BattlePoiEnemyCommander$."
 BattlePoiDescriptionLocOutroFledChaos: "Em meio ao caos, $BattlePoiEnemyCommander$ conseguiu fugir junto com seus servos mais próximos."
 BattlePoiDescriptionLocOutroFledOrganized: "Apesar das grandes perdas, $BattlePoiEnemyCommander$ conseguiu organizar uma retirada estratégica."
