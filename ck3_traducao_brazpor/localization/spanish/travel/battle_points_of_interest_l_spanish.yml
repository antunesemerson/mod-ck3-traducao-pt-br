 #Historical Battles
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical: "#T $TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name$#!\n$TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc$\n\n"
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name: "[Province.Custom('BattlePoiNameHistorical')]"
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc: "[Province.Custom('BattlePoIDescriptionHistorical')]"
 travel_point_historical_name_visit_message: "[ROOT.Char.GetCurrentLocation.Custom('BattlePoiNameHistorical')]"
 BattlePoIHistoricalNameTours: "A Batalha de Tours"
 BattlePoIHistoricalDescTours: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '131721' ).GetFirstNameNicknamed]\nDerrotado: Abd al-Rahman al-Ghafiqi\nData: 10 de outubro de 732 d.C.#!\n#weak A batalha em que Carlos Martel repeliu a invas?o om?ada da Fran?a, junto aos rios Clain e Vienne. Diz-se que os homens de Carlos permaneceram im?veis como uma muralha, derrubando a cavalaria pesada om?ada em sua investida. Depois de localizar e matar o comandante inimigo, seus advers?rios fugiram do campo de batalha.#!"
 BattlePoIHistoricalNameLechfeld: "A Batalha de Lechfeld"
 BattlePoIHistoricalDescLechfeld: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '1282' ).GetTitledFirstName]\nDerrotado: [GetScriptedCharacterByHistoryID( '460' ).GetFirstName] [GetScriptedCharacterByHistoryID( '460' ).GetDynastyName]\nData: 10 de agosto de 955 d.C.#!\n#weak Uma batalha brutal entre as for?as do rei sax?o Otto e as for?as da Hungria. Ap?s perdas devastadoras dos dois lados, os h?ngaros fugiram quando estavam prestes a ser cercados e viram o curso da batalha voltar-se contra eles.\n\nDepois que a batalha terminou, muitos comandantes h?ngaros foram capturados e executados, e a amea?a magiar ? Europa ocidental finalmente chegou ao fim.#!"
 BattlePoIHistoricalNameHastings: "A Batalha de Hastings"
 BattlePoIHistoricalDescHastings: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '140' ).GetFirstName] [GetScriptedCharacterByHistoryID( '140' ).GetDynastyName]\nDerrotado: [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nData: 14 de outubro de 1066 d.C.#!\n#weak A Batalha de Hastings foi uma das batalhas decisivas na ascens?o de Guilherme ao poder na Inglaterra. For?ado a lutar morro acima, o ex?rcito normando tinha dificuldade para avan?ar e chegou a recuar em certo momento, mas Guilherme conseguiu reorganizar um contra-ataque contra as tropas inglesas.\n\nSobrepujado pelas for?as inimigas, Harold morreu junto de seus dois irm?os, [GetScriptedCharacterByHistoryID( '132' ).GetFirstNameNoTooltip] e [GetScriptedCharacterByHistoryID( '130' ).GetFirstNameNoTooltip], deixando o trono ingl?s vazio.#!"
 BattlePoIHistoricalNameStamfordBridge: "A Batalha de Stamford Bridge"
 BattlePoIHistoricalDescStamfordBridge: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '102531' ).GetNameNicknamed]\nData: 25 de setembro de 1066 d.C.#!\n#weak A Batalha de Stamford Bridge foi um dos combates decisivos entre os tr?s pretendentes ao trono ingl?s: Guilherme da Normandia, Harald da Noruega e Harold da Inglaterra. Avan?ando rapidamente para o norte com seus homens, Harold conseguiu surpreender as tropas norueguesas e for??-las a uma batalha para a qual n?o estavam preparadas.\n\nHarald foi morto por uma flecha que atravessou sua traqueia, e seu aliado ingl?s [GetScriptedCharacterByHistoryID( '124' ).GetFirstNameNoTooltip], irm?o de Harold, tamb?m foi morto. O ex?rcito noruegu?s, sem seus comandantes, foi aniquilado ap?s a batalha.#!"
 BattlePoIHistoricalNameManzikert: "A Batalha de Manzikert"
 BattlePoIHistoricalDescManzikert: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '3040' ).GetFirstName] [GetScriptedCharacterByHistoryID( '3040' ).GetDynastyName]\nDerrotado: [GetScriptedCharacterByHistoryID( '1734' ).GetFullName]\nData: 26 de agosto de 1071 d.C.#!\n#weak Coroado imperador do Imp?rio Bizantino em 1068, Romanos liderou uma campanha contra as incurs?es turcas na Anat?lia. Ap?s sucessos limitados, tentou obter uma vit?ria decisiva em batalha contra Alp Arslan, do Imp?rio Selj?cida, perto de Manzikert.\n\nTra?do por um de seus comandantes, que recuou com uma grande parte de seu ex?rcito, Romanos acabou capturado pelas tropas mu?ulmanas. Mais tarde, embora libertado por seu inimigo, foi deposto, cegado, exilado e morreu de seus ferimentos.#!"
 BattlePoIHistoricalNameYarmuk: "A Batalha de Yarmuk"
 BattlePoIHistoricalDescYarmuk: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '163015' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '145071' ).GetFullName]\nData: 20 de agosto de 636 d.C.#!\n#weak A Batalha de Yarmuk ? uma das mais importantes da hist?ria bizantina. A derrota decisiva levou ? perda da S?ria e do Egito e ? grande expans?o do imp?rio ?rabe.\n\nDurando 6 dias, a batalha inicialmente se voltou contra os invasores mu?ulmanos, mas, ao amanhecer do quinto dia sobre Yarmuk, eles mudaram de uma estrat?gia defensiva para uma ofensiva. No sexto dia, lan?aram sua cavalaria em uma carga ousada que quebrou o ex?rcito bizantino.\n\nCom a moral despeda?ada, os soldados bizantinos ca?ram em ravinas, afogaram-se ou foram esmagados pelos soldados inimigos enquanto fugiam do campo de batalha.#!"
 BattlePoIHistoricalNameDandanaqan: "A Batalha de Dandanaqan"
 BattlePoIHistoricalDescDandanaqan: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '3036' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '144129' ).GetFullName]\nData: 23 de maio de 1040 d.C.#!\n#weak Uma batalha importante entre o crescente poder selj?cida do norte da P?rsia e o Imp?rio Gazn?vida. Depois de repelir as for?as selj?cidas nos primeiros combates, os gazn?vidas come?aram a disputar os esp?lios deixados para tr?s.\n\nDesorganizadas e despreparadas para a batalha, foram surpreendidas pelo retorno das for?as selj?cidas. Acossadas, famintas e desmoralizadas, as for?as gazn?vidas foram esmagadas por seus advers?rios.#!"
 BattlePoIHistoricalNameAror: "A Batalha de Aror"
 BattlePoIHistoricalDescAror: "#emp Vencedor: Muhammad ibn al-Qasim\nDerrotado: Raja Dahir\nData: 711 d.C.#!\n#weak Uma batalha da invas?o om?ada da ?ndia, entre o raj? de Sindh e o Imp?rio Om?ada.\n\nEmbora seus oponentes fossem originalmente mais numerosos, o comandante om?ada conseguiu obter a melhor posi??o para seu ex?rcito antes de iniciar a batalha. Ao longo do conflito, esse desequil?brio permitiu que as for?as mu?ulmanas assumissem lentamente o controle do curso da batalha e, com a morte do raj? Dahir, sua vit?ria foi assegurada.#!"
 BattlePoIHistoricalNameSvolder: "A Batalha de Svolder"
 BattlePoIHistoricalDescSvolder: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '101505' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '144004' ).GetFullName]\nData: 9 de setembro de 999 d.C.#!\n#weak Uma batalha entre as for?as norueguesas de Olafr Tryggvason de um lado e uma coaliz?o de for?as dinamarquesas e suecas liderada pelo rei Sveinn da Dinamarca do outro.\n\nMesmo em enorme desvantagem num?rica, o rei noruegu?s recusou-se a fugir da coaliz?o hostil e enfrentou suecos e dinamarqueses em batalha, chamando-os de 'comedores de cavalo' e 'cabras da floresta' enquanto lutava.\n\nNo fim, embora tenha causado um duro golpe ao inimigo, o ex?rcito noruegu?s foi esmagado. Olafr desapareceu na batalha e muito provavelmente morreu.#!"
 BattlePoIHistoricalNameCivitate: "A Batalha de Civitate"
 BattlePoIHistoricalDescCivitate: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '1126' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '1338' ).GetFullName]\nData: 18 de junho de 1053 d.C.#!\n#weak Uma batalha entre os normandos de um lado e uma coaliz?o liderada pelo papa do outro, incluindo alem?es e italianos locais.\n\nApesar de sua vantagem num?rica, a coaliz?o papal n?o conseguiu romper a infantaria normanda no centro da batalha, e seus flancos de cavalaria perderam o combate contra a cavalaria normanda.\n\nPouco depois da batalha, o pr?prio papa foi capturado pelos normandos, levando ao fim do conflito.#!"
 BattlePoIHistoricalNameTalas: "A Batalha de Talas"
 BattlePoIHistoricalDescTalas: "#emp Vencedor: Califado Ab?ssida\nDerrotado: Dinastia Tang\nData: 751 d.C.#!\n#weak Um conflito prolongado entre o Califado Ab?ssida, que se expandia para a Transoxiana a partir do sudoeste, e a Dinastia Tang, que avan?ava para a regi?o a partir do leste.\n\nNo in?cio, a infantaria pesada da dinastia Tang e seus mercen?rios t?rquicos tiveram papel importante ao repelir as for?as ab?ssidas, mas, com os mercen?rios mudando de lado e muitos aliados traindo-os, os Tang foram for?ados a recuar.\n\nEsse conflito marcou o fim da expans?o Tang para o oeste, deixando a Transoxiana em m?os mu?ulmanas pelo futuro previs?vel.#!"
 BattlePoIHistoricalNameSufuku: "A Batalha de Subushi"
 BattlePoIHistoricalDescSufuku: "#emp Vencedor: Os Emishi de Isawa\nDerrotado: [GetScriptedCharacterByHistoryID( 'japanese_iruma_1' ).GetFullName]\nData: 789 d.C.#!\n#weak Uma batalha importante durante a subjuga??o japonesa dos Emishi.\n\nAs for?as japonesas inicialmente se dividiram em duas, avan?ando pelos dois lados do rio Kitakami atr?s dos Emishi em retirada. Escaramu?adores Emishi impediram os japoneses de cruzar o rio, encurralando grande parte deles entre o rio e as montanhas.\n\nO colapso japon?s que se seguiu foi uma grande humilha??o, com muitos soldados nadando nus pelo rio para escapar da morte. O ex?rcito foi dissolvido e [GetScriptedCharacterByHistoryID( 'japanese_yamato_24' ).GetFullName] repreendeu duramente seus comandantes.#!"
 BattlePoIHistoricalNameBaekgang: "Batalha de Baekgang"
 BattlePoIHistoricalDescBaekgang: "#emp Vencedor: Reino de Silla e China Tang\nDerrotado: [GetScriptedCharacterByHistoryID( 'japanese_abe_36' ).GetFullName]\nData: 663 d.C.#!\n#weak Uma batalha naval decisiva em que Tang e Silla enfrentaram as for?as do Movimento de Restaura??o de Baekje e seus aliados japoneses.\n\nA batalha foi travada em grande parte no rio Baengma. Embora as for?as japonesas fossem superiores em n?mero, a marinha Tang resistiu e acabou contra-atacando, envolvendo e derrotando a frota japonesa.\n\nA decisiva vit?ria Silla-Tang obrigou o Jap?o a se retirar completamente dos assuntos coreanos e esmagou o Movimento de Restaura??o de Baekje.#!"
 BattlePoIHistoricalNamePalembang: "A Batalha de Palembang"
 BattlePoIHistoricalDescPalembang: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '189038' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'javanese_sailendra_25' ).GetFullName]\nData: 1025 d.C.#!\n#weak Um ataque repentino das for?as Chola contra a capital de Srivijaya em Palembang.\n\nAs for?as Chola chegaram pelo mar e rapidamente subjugaram a capital de Srivijaya, saqueando-a e destruindo-a no processo.\n\nA queda de Palembang resultou no colapso total do Imp?rio Srivijaya, e a influ?ncia Chola sobre a regi?o durou d?cadas depois disso.#!"
 BattlePoIHistoricalNameAngkor: "Cerco de Angkor"
 BattlePoIHistoricalDescAngkor: "#emp Vencedor: [GetScriptedCharacterByHistoryID( 'cham_panduranga_04' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'khmer_tribhuvanaditya_01' ).GetFullName]\nData: 1177 d.C.#!\n#weak Um per?odo de conflitos civis e golpes no reino de Kambuja levou Tribhuvanaditya, que n?o era de sangue real, ao poder. Enquanto lidava com rebeldes reais que apoiavam outros pretendentes, o reino de Champa invadiu Kambuja.\n\nAs for?as de Champa avan?aram pelo Mekong e pelo Tonle Sap, saquearam a pr?pria capital Angkor e mataram Tribhuvanaditya.\n\nAp?s o cerco, o reino de Kambuja entrou em colapso, com o saque disperso pela regi?o ou levado para casa pelos Cham.#!"
 BattlePoIHistoricalNameSongping: "Cerco de Songping"
 BattlePoIHistoricalDescSongping: "#emp Vencedor: Yang Sijin\nDerrotado: Cai Xi\nData: 863 d.C.#!\n#weak A agita??o no protetorado Tang de Annan levou o reino vizinho de Nanzhao a aliar-se com tribos locais e invadir a regi?o com uma for?a esmagadora.\n\nO ex?rcito de Nanzhao e seus aliados cercaram a cidade por algum tempo antes de finalmente penetrar na cidade interior; os defensores fizeram uma ?ltima resist?ncia no port?o oriental, emboscando a cavalaria inimiga e matando muitos deles antes de serem derrotados.\n\nEmbora inicialmente recebidas com boas-vindas pela popula??o viet, as for?as de Nanzhao saquearam a regi?o, e um contra-ataque Tang em 864 acabou recuperando toda a ?rea.#!"
 BattlePoIHistoricalNameMuye: "Batalha de Muye"
 BattlePoIHistoricalDescMuye: "#emp Vencedor: Rei Wu\nDerrotado: Imperador Zhou da dinastia Shang\nData: 1046 a.C.#!\n#weak A batalha de Muye foi travada entre o rei rebelde Wu e o imperador Zhou da dinastia Shang.\n\nA princ?pio as for?as de Wu estavam em desvantagem num?rica, mas as for?as de Shang, em sua maioria escravos militares, mostraram-se pouco confi?veis e fugiram do campo de batalha. O resultado final foi uma vit?ria muito sangrenta para as for?as rebeldes sob o comando do rei Wu.\n\nA batalha resultou na queda da dinastia Shang e na reivindica??o do Mandato do C?u por Wu, que fundou a nova dinastia Zhou.#!"
 BattlePoIHistoricalNameRedCliffs: "Batalha dos Penhascos Vermelhos"
 BattlePoIHistoricalDescRedCliffs: "#emp Vencedor: Sun Quan\nDerrotado: Cao Cao\nData: 208 d.C.#!\n#weak A Batalha dos Penhascos Vermelhos foi um combate fluvial entre uma coaliz?o de senhores da guerra e Cao Cao, senhor da guerra do norte, no per?odo final da dinastia Han. Cao Cao tentava estabelecer uma cabe?a de ponte pelo rio Yangtz? rumo ao sul da China.\n\nFingindo rendi??o, as for?as aliadas conseguiram atrair os navios de Cao Cao para uma armadilha, incendiando-os e queimando vivos muitos soldados e cavalos. O ex?rcito do norte foi ent?o lan?ado em confus?o e derrotado.\n\nA derrota impediu Cao Cao de avan?ar al?m do Yangtz? e preparou o cen?rio para os anos futuros do per?odo dos Tr?s Reinos.#!"
 BattlePoIHistoricalNameGuandu: "Batalha de Guandu"
 BattlePoIHistoricalDescGuandu: "#emp Vencedor: Cao Cao\nDerrotado: Yuan Shao\nData: 200 d.C.#!\n#weak A batalha de Guandu foi travada entre os senhores da guerra Cao Cao e Yuan Shao durante o fim da dinastia Han Oriental; ambos haviam alcan?ado poder consider?vel e eram os principais obst?culos um do outro no controle da China.\n\nAs for?as de Cao Cao estavam em desvantagem num?rica na batalha, mas usaram t?ticas como uma incurs?o surpresa contra o dep?sito de suprimentos de Yuan Shao para enfraquecer o ex?rcito advers?rio.\n\nA batalha foi um ponto de virada do per?odo, com Cao Cao emergindo vitorioso e abrindo caminho para o futuro estado de Cao Wei no per?odo dos Tr?s Reinos.#!"
 BattlePoIHistoricalNameYiling: "Batalha de Yiling"
 BattlePoIHistoricalDescYiling: "#emp Vencedor: Lu Xun - Wu Oriental\nDerrotado: Liu Bei - Shu Han\nData: 221 d.C.#!\n#weak Tentando retomar territ?rios perdidos na prov?ncia de Jing, Liu Bei liderou pessoalmente seus ex?rcitos para atacar Wu Oriental, obtendo sucessos iniciais.\n\nDurante a batalha, as for?as de Liu Bei foram atra?das para uma armadilha pelo general Lu Xun, que incendiou o acampamento de Shu Han, for?ando Liu Bei a recuar. Por fim, Liu Bei conseguiu deixar pessoalmente o campo de batalha ao ordenar que seus homens ateassem fogo ?s armaduras, criando uma barreira de chamas contra os atacantes.\n\nA batalha foi uma derrota decisiva para Liu Bei e resultou no fim de sua campanha, seguida por sua pr?pria morte.#!"
 BattlePoIHistoricalNameFeiRiver: "Batalha do rio Fei"
 BattlePoIHistoricalDescFeiRiver: "#emp Vencedor: Xie An - Jin\nDerrotado: Fu Jian - Antigo Estado de Qin\nData: 383 d.C.#!\n#weak A batalha foi a culmina??o de uma campanha mais longa em que o antigo Estado de Qin, ap?s unificar v?rias tribos estrangeiras, assumiu o controle de partes significativas das terras de Jin. Os ex?rcitos Qin eram numericamente muito superiores aos Jin, que resistiram no rio Fei.\n\nDurante a batalha, as tropas disciplinadas e bem treinadas dos Jin derrotaram as tropas muito mais numerosas, por?m desorganizadas e desmotivadas, do antigo Estado de Qin.\n\nA derrota das for?as Qin pelos Jin, com baixas m?nimas, alterou profundamente o equil?brio de poder e garantiu que o sul da China permanecesse independente por mais de cem anos.#!"
 BattlePoIHistoricalNameCanheSlope: "Batalha da ladeira de Canhe"
 BattlePoIHistoricalDescCanheSlope: "#emp Vencedor: Touba Gui - Wei do Norte\nDerrotado: Murong Bao - Yan Posterior\nData: 395 d.C.#!\n#weak A batalha resultou de um conflito em que a dinastia Yan Posterior lan?ou uma campanha punitiva contra a dinastia Wei do Norte.\n\nQuando as for?as Yan chegaram ? encosta de Canhe, foram atingidas por uma tempestade durante a qual seus inimigos as atacaram. O ex?rcito Yan foi pego de surpresa e muitos fugiram para o pr?prio rio Amarelo.\n\nA batalha acabou invertendo a din?mica de poder da regi?o, com os Wei do Norte tomando a maior parte do territ?rio de Yan Posterior.#!"
 BattlePoIHistoricalNameXiangji: "Batalha do Templo de Xiangji"
 BattlePoIHistoricalDescXiangji: "#emp Vencedor: [GetScriptedCharacterByHistoryID( 'han_1528' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'an_qingxu' ).GetFullName]\nData: 757 d.C.#!\n#weak Esta batalha foi a culmina??o de um contra-ataque Tang contra as for?as rebeldes que haviam tomado o controle da maior parte do norte da China, sendo uma das batalhas mais sangrentas da rebeli?o de An Lushan. Os dois enormes ex?rcitos se chocaram ao norte de Chang'an, junto ao Templo de Xiangji.\n\nAo meio-dia, o ex?rcito Tang havia tomado o terreno elevado, enquanto o ex?rcito Yan estava posicionado diante da pr?pria Chang'an. Ap?s v?rias manobras, a batalha se transformou em um impasse prolongado, com tropas disciplinadas lutando entre si sem ceder, at? que a frente Yan finalmente desmoronou devido ?s baixas extremas sofridas.\n\nA brutalidade da batalha deixou ambos os ex?rcitos dizimados, mas quebrou a espinha dorsal da rebeli?o. As for?as Tang conseguiram retomar Chang'an no dia seguinte.#!"
 BattlePoIHistoricalNameGaoliang: "Batalha do Rio Gaoliang"
 BattlePoIHistoricalDescGaoliang: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '194330' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullName]\nData: 979 d.C.#!\n#weak A batalha se seguiu a uma tentativa dos Song de recuperar as 16 prefeituras que a dinastia Liao havia conquistado em 960, e foi liderada pessoalmente pelo pr?prio irm?o do imperador, o futuro imperador [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip].\n\nA cidade de Youzhou estava sitiada havia tr?s meses quando refor?os Liao chegaram para socorrer os defensores. Embora inicialmente vitorioso, o ex?rcito Song foi pego de surpresa ? noite por um ataque vindo de tr?s dire??es.\n\nA batalha terminou com [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip] fugindo do campo em uma carro?a puxada por um burro. Essa foi a primeira grande derrota dos Song ap?s sua ascens?o ao poder.#!"
