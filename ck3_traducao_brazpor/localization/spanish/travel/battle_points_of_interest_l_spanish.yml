 #Historical Battles
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical: "#T $TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name$#!\n$TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc$\n\n"
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name: "[Province.Custom('BattlePoiNameHistorical')]"
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc: "[Province.Custom('BattlePoIDescriptionHistorical')]"
 travel_point_historical_name_visit_message: "[ROOT.Char.GetCurrentLocation.Custom('BattlePoiNameHistorical')]"
 BattlePoIHistoricalNameTours: "A Batalha de Tours"
 BattlePoIHistoricalDescTours: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '131721' ).GetFirstNameNicknamed]\nDerrotado: Abd al-Rahman al-Ghafiqi\nFecha: 10 de octubre de 732 d. C.#!\n#weak La batalla donde Carlos Martel rechazó la invasión omeya de Francia entre los ríos Clain y Vienne. Se dice que los hombres de Carlos permanecieron impasibles como un muro y destrozaron a la caballería pesada omeya. Después de perseguir al comandante enemigo y matarlo, sus enemigos abandonaron el campo de batalla.#!"
 BattlePoIHistoricalNameLechfeld: "A Batalha de Lechfeld"
 BattlePoIHistoricalDescLechfeld: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '1282' ).GetTitledFirstName]\nDerrotado: [GetScriptedCharacterByHistoryID( '460' ).GetFirstName] [GetScriptedCharacterByHistoryID( '460' ).GetDynastyName]\nFecha: 10 de agosto de 955 d. C.#!\n#weak Una batalla brutal entre las fuerzas del rey sajón Otto y las fuerzas húngaras. Tras unas perdidas abrumadoras para ambos bandos, los húngaros huyeron cuando estuvieron a punto de ser rodeados y vieron que el curso de la batalla se volvía en su contra.\n\nDespués de terminar la batalla, mucho de los comandantes húngaros fueron capturados y ejecutados, y se puso fin a la amenaza magiar contra Europa occidental.#!"
 BattlePoIHistoricalNameHastings: "A Batalha de Hastings"
 BattlePoIHistoricalDescHastings: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '140' ).GetFirstName] [GetScriptedCharacterByHistoryID( '140' ).GetDynastyName]\nDerrotado: [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nFecha: 14 de octubre de 1066 d. C.#!\n#weak La batalla de Hastings fue una de las muchas batallas claves en el ascenso de Guillermo al trono del Inglaterra. Obligado a luchar cuesta arriba, al ejército normando le constaba abrirse paso y en un punto hasta llegó a retroceder, pero Guillermo consiguió reorganizar un contraataque contra las tropas inglesas.\n\nSuperado por las fuerzas enemigas, Harold murió junto con sus hermanos [GetScriptedCharacterByHistoryID( '132' ).GetFirstNameNoTooltip] y [GetScriptedCharacterByHistoryID( '130' ).GetFirstNameNoTooltip], lo que dejó el trono inglés vacante.#!"
 BattlePoIHistoricalNameStamfordBridge: "A Batalha de Stamford Bridge"
 BattlePoIHistoricalDescStamfordBridge: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '102531' ).GetNameNicknamed]\nFecha: 25 de septiembre de 1066 d. C.#!\n#weak La batalla de Stamford Bridge fue uno de los combates clave entre los tres aspirantes al trono inglés, Guillermo de Normandía, Harald de Noruega y Harold de Inglaterra. Harold se apresuró en ir hacia el norte con sus hombres para tomar por sorpresa a las tropas noruegas y obligarlas a librar un combate para el que no estaban preparadas.\n\nHarald murió de un flechazo en la tráquea y su aliado inglés, [GetScriptedCharacterByHistoryID( '124' ).GetFirstNameNoTooltip], hermano de Harold, también falleció. El ejército noruego, privado de sus comandantes, fue aniquilado en las postrimerías de la batalla.#!"
 BattlePoIHistoricalNameManzikert: "A Batalha de Manzikert"
 BattlePoIHistoricalDescManzikert: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '3040' ).GetFirstName] [GetScriptedCharacterByHistoryID( '3040' ).GetDynastyName]\nDerrotado: [GetScriptedCharacterByHistoryID( '1734' ).GetFullName]\nFecha: 26 de agosto de 1071 d. C.#!\n#weak Romano, coronado emperador del Imperio bizantino en 1068, dirigió una campaña contra las incursiones turcas en Anatolia. Tras unos éxitos limitados, buscó una victoria decisiva contra Arp Arslan del Imperio selyúcida cerca de Manzikert.\n\nTraicionado por uno de sus comandantes, que se retiró con una gran parte de su ejército, Romano fue capturado por las tropas musulmanas. Más adelante, liberado por el enemigo, fue depuesto, cegado, exiliado y murió de sus heridas.#!"
 BattlePoIHistoricalNameYarmuk: "A Batalha de Yarmuk"
 BattlePoIHistoricalDescYarmuk: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '163015' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '145071' ).GetFullName]\nFecha: 20 de agosto de 636 d. C.#!\n#weak La batalla de Yarmuk es una de las más importantes de la historia bizantina. Una derrota decisiva que llevó a que se perdiera Siria y Egipto, y a la gran expansión del Imperio árabe.\n\nLa batalla, que duró seis días, al principio se volvió en contra de los invasores musulmanes, pero cuando amaneció el quinto día sobre Yarmuk, estos cambiaron su estrategia pasando de defensiva a ofensiva. El sexto día, los musulmanes lanzaron a su caballería en una osada carga que quebró al ejército bizantino.\n\nCon la moral hecha añicos, los soldados bizantinos se despeñaron, se ahogaron o fueron aplastados por los soldados enemigos cuando huían del campo de batalla.#!"
 BattlePoIHistoricalNameDandanaqan: "A Batalha de Dandanaqan"
 BattlePoIHistoricalDescDandanaqan: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '3036' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '144129' ).GetFullName]\nFecha: 23 de mayo de 1040 d. C.#!\n#weak Una importante batalla entre el poder selyúcida en ascenso del norte de Persia y el Imperio gaznávida. Tras derrotar a los selyúcidas en las primeras batallas, los gaznávidas empezaron a disputarse el botín abandonado.\n\nDesorganizados y sin estar preparados para el combate, fueron pillados por sorpresa con el regreso de las fuerzas selyúcidas. Acosadas, hambrientas y desmoralizadas, las fuerzas gaznávidas fueron aplastadas por sus oponentes.#!"
 BattlePoIHistoricalNameAror: "A Batalha de Aror"
 BattlePoIHistoricalDescAror: "#emp Vencedor: Muhammad ibn al-Qasim\nDerrotado: Raja Dahir\nFecha: 711 d. C.#!\n#weak Una batalla en la invasión omeya de la India entre el rajá de Sindh y el Imperio omeya.\n\nAunque sus oponentes eran originalmente más numerosos, el comandante omeya consiguió la mejor posición para su ejército antes de librar combate. Durante el conflicto, este desequilibrio hizo que las fuerzas musulmanas fueran tomando poco a poco el control del curso de la batalla y, con la muerte del rajá Dahir, su victoria estuvo asegurada.#!"
 BattlePoIHistoricalNameSvolder: "A Batalha de Svolder"
 BattlePoIHistoricalDescSvolder: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '101505' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '144004' ).GetFullName]\nFecha: 9 de septiembre de 999 d. C.#!\n#weak Una batalla entre las fuerzas noruegas de Olafr Tryggvason por un lado y una coalición de fuerzas danesas y suecas al mando del rey Sveinn de Dinamarca por el otro.\n\nAunque enormemente superado en número, el rey noruego se negó a huir ante la coalición hostil y se enfrentó a daneses y suecos en combate, llamándoles «comecaballos» y «cabras silvestres».\n\nAl final, aunque el ejército noruego asestó un duro golpe al enemigo, acabó siendo aplastado. Olafr desapareció en combate y probablemente falleciera.#!"
 BattlePoIHistoricalNameCivitate: "A Batalha de Civitate"
 BattlePoIHistoricalDescCivitate: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '1126' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '1338' ).GetFullName]\nFecha: 18 de junio de 1053 d. C.#!\n#weak Un enfrentamiento entre normandos por un lado, y por el otro una coalición dirigida por el papa que incluía a alemanes y italianos de la zona.\n\nA pesar de su superioridad numérica, la coalición papal fue incapaz de abrirse paso a través de la infantería normanda en el centro de la batalla y su caballería perdió el combate contra la normanda.\n\nUn poco después de la batalla, el papa en persona fue capturado por los normandos, lo que puso fin al conflicto.#!"
 BattlePoIHistoricalNameTalas: "A Batalha de Talas"
 BattlePoIHistoricalDescTalas: "#emp Vencedor: califato abasida\nDerrotado: dinastía Tang\nFecha: 751 d. C.#!\n#weak Un conflicto prolongado entre el califato abasida en su expansión por Transoxiana desde el sudoeste y la dinastía Tang que se extendía desde el este.\n\nAl principio, la infantería pesada de los Tang y sus mercenarios túrquicos rechazaron a las fuerzas abasidas, pero cuando los mercenarios cambiaron de bando y con la traición de muchos de sus aliados, los Tang fueron expulsados.\n\nEste conflicto puso fin a la expansión hacia el oeste de los Tang y dio pie a que Transoxiana acabase en manos musulmanas más pronto que tarde.#!"
 BattlePoIHistoricalNameSufuku: "A Batalha de Subushi"
 BattlePoIHistoricalDescSufuku: "#emp Vencedor: los emishi de Isawa\nDerrotado: [GetScriptedCharacterByHistoryID( 'japanese_iruma_1' ).GetFullName]\nFecha: 789 d. C.#!\n#weak Una batalla importante como parte de la subyugación japonesa de los emishi.\n\nAl principio, las fuerzas japonesas se dividieron en dos y avanzaron por ambas orillas del río Kitakami en persecución de los emishi en retirada. Los escaramuzadores emishi impidieron que los japoneses vadearan el río y acorralaron a una gran parte de ellos entre el río y las montañas.\n\nEl subsiguiente desmoronamiento japonés fue una gran humillación, ya que muchos soldados tuvieron que cruzar el río a nado desnudos para escapar de la muerte. Se disolvió el ejército y [GetScriptedCharacterByHistoryID( 'japanese_yamato_24' ).GetFullName] reprendió duramente a sus comandantes.#!"
 BattlePoIHistoricalNameBaekgang: "Batalha de Baekgang"
 BattlePoIHistoricalDescBaekgang: "#emp Vencedor: el reino de Silla y la China Tang\nDerrotado: [GetScriptedCharacterByHistoryID( 'japanese_abe_36' ).GetFullName]\nFecha: 663 d. C.#!\n#weak Una batalla naval decisiva en la que Tang y Silla se enfrentaron a las fuerzas del movimiento que buscaba restaurar a Baekje y sus aliados japoneses.\n\nLa batalla se libró mayormente en el río Baengma. Si bien las fuerzas japonesas eran mayores en número, la marina Tang se mantuvo firme y acabó por contraatacar, rodeando y derrotando a las naves japonesas.\n\nEsta decisiva victoria de Silla y Tang significó el fin de Baekje y de la influencia japonesa en la península de Corea.#!"
 BattlePoIHistoricalNamePalembang: "A Batalha de Palembang"
 BattlePoIHistoricalDescPalembang: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '189038' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'javanese_sailendra_25' ).GetFullName]\nFecha: 1025 d. C.#!\n#weak Un ataque repentino de fuerzas Chola contra la capital srivijaya de Palembang.\n\nLas fuerzas Chola llegaron desde el mar y sometieron con rapidez la capital srivijaya, saqueándola y destruyéndola en el proceso.\n\nLa caída de Palembang significó el desmoronamiento total del Imperio srivijaya y la influencia Chola sobre la región perduró durante décadas.#!"
 BattlePoIHistoricalNameAngkor: "Cerco de Angkor"
 BattlePoIHistoricalDescAngkor: "#emp Vencedor: [GetScriptedCharacterByHistoryID( 'cham_panduranga_04' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'khmer_tribhuvanaditya_01' ).GetFullName]\nFecha: 1177 d. C.#!\n#weak Un periodo de guerra civil y golpes de Estado en el señorío de Kambuja llevó a que Tribhuvanaditya, que no era de la familia real, llegase al poder. Mientras se enfrentaba a los rebeldes que apoyaban a otros pretendientes, el reino de Champa invadió Kambuja.\n\nLas fuerzas champa ascendieron por el Mekong y el Tonlé Sap, saquearon la misma capital de Angkor y mataron a Tribhuvanaditya.\n\nTras el asedio, el señorío de Kambuja se vino abajo y el botín se repartió por la zona o los cham se lo llevaron a casa.#!"
 BattlePoIHistoricalNameSongping: "Cerco de Songping"
 BattlePoIHistoricalDescSongping: "#emp Vencedor: Yang Sijin\nDerrotado: Cai Xi\nFecha: 863 d. C.#!\n#weak La agitación en el protectorado Tang de Annan hizo que el reino vecino de Nanzhao se aliase con tribus locales para invadir la región con una fuerza aplastante.\n\nEl ejército de Nanzhao y sus aliados pusieron sitio a la ciudad durante un tiempo antes de acabar penetrando en la ciudadela interior; los defensores ofrecieron la resistencia final en la puerta oriental, donde emboscaron a la caballería enemiga y mataron a muchos de sus efectivos antes de ser derrotados.\n\nAunque al principio la población viet dio la bienvenida a las fuerzas de Nanzhao, estas se dedicaron al pillaje de la región y un contraataque Tang en el 864 la acabaría recuperando.#!"
 BattlePoIHistoricalNameMuye: "Batalha de Muye"
 BattlePoIHistoricalDescMuye: "#emp Vencedor: King Wu\nDerrotado: emperador Zhou de Shang\nFecha: 1046 a. C.#!\n#weak La batalla de Muye enfrentó a Wu, el rey rebelde, con Zhou, el emperador Shang.\n\nAl principio las fuerzas de Wu estaban superadas en número, pero el contingente de Shang, en su mayor parte soldados esclavos, demostró ser poco fiable y huyó del campo de batalla. El resultado final fue una victoria muy sangrienta para las fuerzas rebeldes del rey Wu.\n\nLa batalla provocó la caída de la dinastía Shang y que Wu reclamase el Mandato del Cielo para fundar la nueva dinastía Zhou.#!"
 BattlePoIHistoricalNameRedCliffs: "Batalha dos Penhascos Vermelhos"
 BattlePoIHistoricalDescRedCliffs: "#emp Vencedor: Sun Quan\nDerrotado: Cao Cao\nFecha: 208 d. C.#!\n#weak La batalla de los Acantilados rojos fue un combate fluvial entre una coalición de caudillos militares y Cao Cao, el caudillo militar del norte, en el periodo final de la dinastía Han. Cao Cao intentaba crear una cabeza de puente en el sur de China, al otro lado del río Yangtsé.\n\nLas fuerzas aliadas fingieron rendirse para atraer a los barcos de Cao Cao a una trampa y así incendiarlos y quemar vivos a muchos soldados y caballos. El ejército del norte se sumió en el caos y fue vencido.\n\nLa derrota impidió a Cao Cao avanzar más allá del Yangtsé y puso los cimientos para los años posteriores del periodo de los Tres Reinos.#!"
 BattlePoIHistoricalNameGuandu: "Batalha de Guandu"
 BattlePoIHistoricalDescGuandu: "#emp Vencedor: Cao Cao\nDerrotado: Yuan Shao\nFecha: 200 d. C.#!\n#weak La batalla de Guandu se libró entre los caudillos militares Cao Cao y Yuan Shao durante la dinastía Han oriental; ambos caudillos habían alcanzado un poder considerable y cada uno obstaculizaba al otro para controlar China.\n\nLas fuerzas de Cao Cao estaban superadas en número, pero empleó tácticas como una incursión sorpresa contra el almacén de suministros de Yuan Shao para paralizar al ejército enemigo.\n\nLa batalla fue un momento decisivo del que Cao Cao salió victorioso y allanó el camino para el futuro estado de Cao Wei en el periodo de los Tres Reinos.#!"
 BattlePoIHistoricalNameYiling: "Batalha de Yiling"
 BattlePoIHistoricalDescYiling: "#emp Vencedor: Lu Xun - Wu Oriental\nDerrotado: Liu Bei - reino de Shu\nFecha: 221 d. C.#!\n#weak En un intento de recuperar los territorios perdidos de la provincia de Jing, Liu Bei dirigió en persona sus ejércitos para atacar Wu Oriental y consiguió una serie de éxitos iniciales.\n\nEn el transcurso de la batalla, las fuerzas de Liu Bei cayeron en una trampa del general Lu Xun, que prendió fuero al campamento de Shu, provocando la retirada de Liu Bei. Al final, este último consiguió abandonar el campo de batalla personalmente al ordenar a sus tropas que prendiesen fuego a sus armaduras para crear un muro de llamas contra los atacantes.\n\nFue una derrota decisiva para Lu Bei y llevó al fin de su campaña, y posteriormente, a su muerte.#!"
 BattlePoIHistoricalNameFeiRiver: "Batalha do rio Fei"
 BattlePoIHistoricalDescFeiRiver: "#emp Vencedor: Xie An - Jin\nDerrotado: Fu Jian - Antiguo estado Qin\nFecha: 383 d. C.#!\n#weak Esta batalla fue la culminación de una campaña extensa donde el estado antiguo estado Qin, tras haber unido a una serie de distintas tribus extranjeras, había tomado el control de una parte significativa de las tierras de Jin. Los ejércitos de Qin eran muy superiores en número a los de Jin, que presentaron batalla en el río Fei.\n\nEn el transcurso de la batalla, las fuerzas disciplinadas y bien entrenada de Jin pusieron en fuga a las tropas más numerosas, pero desorganizadas y desmotivadas del antiguo estado de Qin.\n\nLa derrota de las fuerzas Qin por unos Jin con solo unas pocas bajas cambió el equilibrio de poder y garantizó que el sur de China siguiera siendo independiente durante más de cien años.#!"
 BattlePoIHistoricalNameCanheSlope: "Batalha da ladeira de Canhe"
 BattlePoIHistoricalDescCanheSlope: "#emp Vencedor: Touba Gui - Wei del Norte\nDerrotado: Murong Bao - Yan Posterior\nFecha: 395 d. C.#!\n#weak La batalla fue el resultado de un conflicto en el que la dinastía Yan Posterior lanzó una campaña de castigo contra la dinastía Wei del Norte.\n\nCuando las fuerzas Yan alcanzaron las laderas de Canhe, se desencadenó una tormenta sobre ellos, durante la cual fueron atacados por sus enemigos. El ejército Yan fue pillado por sorpresa y muchos huyeron hacia el mismo río Amarillo.\n\nLa batalla acabó dando la vuelta a las dinámicas de poder de la región, ya que los Wei del Norte terminaron tomando la mayor parte del territorio de Yan.#!"
 BattlePoIHistoricalNameXiangji: "Batalha do Templo de Xiangji"
 BattlePoIHistoricalDescXiangji: "#emp Vencedor: [GetScriptedCharacterByHistoryID( 'han_1528' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'an_qingxu' ).GetFullName]\nFecha: 757 d. C.#!\n#weak Esta batalla fue la culminación de un contrataque Tang contra los rebeldes que controlaban la mayor parte del norte de China y una de las batallas más sangrientas de la rebelión de An Lushan. Los dos gigantescos ejércitos chocaron al norte de Chang'an, cerca del templo de Xiangji.\n\nA mediodía, el ejército Tang se había apoderado del terreno elevado, mientras que el ejército Yan estaba situado delante de la misma Chang'an. Tras muchas maniobras, la batalla llegó a un punto muerto donde unas tropas disciplinadas se enfrentaban sin ceder, hasta que el frente Yan se vino abajo por las muchas bajas que había sufrido.\n\nLa brutalidad de la batalla diezmó a ambos ejércitos, pero rompió la resistencia de la rebelión. Las fuerzas Tang fueron capaces de retomar Chang'an al día siguiente.#!"
 BattlePoIHistoricalNameGaoliang: "Batalha do Rio Gaoliang"
 BattlePoIHistoricalDescGaoliang: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '194330' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullName]\nFecha: 979 d. C.#!\n#weak La batalla fue la continuación de un intento de los Song por recuperar las 16 prefecturas que la dinastía Liao había conquistado en el 960, y estuvo liderada personalmente por el mismo hermano del emperador (el futuro emperador [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip]).\n\nLa ciudad de Youzhou llevaba tres meses asediada antes de que llegaran refuerzos Liao para liberar a los defensores, y el ejército Song, victorioso a principio, fue pillado por sorpresa en la noche con un ataque desde tres direcciones.\n\nLa batalla terminó con la huida de [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip] del campo de batalla en un carro tirado por un burro. Esta fue la primera gran derrota de los Song tras su ascenso al poder.#!"
