 assassination_scenario_wetlands: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] avan?a silenciosamente at? meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que est? dormid[entourage_member_2.Custom('ES_OA')] em um terreno pantanoso. [entourage_member_1.GetFirstNameNoTooltip] sufoca [entourage_member_2.GetFirstNameNoTooltip] com lama e deixa [entourage_member_2.GetHerHim] im?vel no terreno pantanoso."
