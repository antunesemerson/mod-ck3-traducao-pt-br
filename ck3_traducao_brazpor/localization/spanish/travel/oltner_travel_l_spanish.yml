 loc_small_item_5: "Sob o céu estrelado de [location.GetName], o acampamento é presenteado com uma apresentação inesperada. Meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName] surpreende a todos com uma melodia tocante; sua voz ecoa com elogios ao meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName].\n\n[entourage_member_1.GetFirstName] escuta atentamente, visivelmente aturdid[entourage_member_1.Custom('ES_OA')]. Quando a canção termina, um reconhecimento silencioso passa entre [Select_CString(And(entourage_member_1.IsFemale, entourage_member_2.IsFemale),'ellas','ellos')]."
