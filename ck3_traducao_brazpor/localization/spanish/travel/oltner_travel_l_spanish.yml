 trap_scenario_falling_net: "\"#EMP GUARDAS!#!\""
 trap_scenario_pit_trap: "Eu vi... nada..."
 trap_scenario_snare_trap: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima silenciosamente ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que dorme sob uma palmeira. De repente, [entourage_member_1.GetFirstNameNoTooltip] enterra as mãos na areia ao redor da garganta de [entourage_member_2.GetFirstNameNoTooltip] e [entourage_member_2.Custom('ES_LoLa')] sufoca em silêncio."
 trap_scenario_river_current: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se move furtivamente em direção ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está dormindo à beira de um precipício. Com um empurrão rápido, [entourage_member_1.GetFirstName] faz [entourage_member_2.GetFirstNameNoTooltip] cair pela íngreme encosta da montanha."
 trap_scenario_thin_ice: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se arrasta até meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que descansa junto a um arbusto seco. [entourage_member_1.GetFirstNameNoTooltip] agarra uma pedra e golpeia a cabeça de [entourage_member_2.GetFirstNameNoTooltip] com força letal; não deixa mais do que uma mancha escura na terra."
 trap_scenario_rockslide: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], adormecid[entourage_member_2.Custom('ES_OA')] perto de um arado. Em um ato repentino e violento, [entourage_member_1.GetFirstNameNoTooltip] traspassa [entourage_member_2.GetFirstNameNoTooltip] nos dentes afiados do arado, garantindo-lhe um fim rápido."
 trap_scenario_snake_nest: "m [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima sorrateiramente de meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName] na margem do rio. Com um empurrão repentino, [entourage_member_1.GetFirstNameNoTooltip] afoga [entourage_member_2.GetFirstNameNoTooltip] nas águas turvas e agitadas."
 trap_scenario_irrigation_ditch: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima silenciosamente do meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que dorme debaixo de uma ?rvore. Com a ajuda de uma corda, [entourage_member_1.GetFirstNameNoTooltip] estrangula rapidamente [entourage_member_2.GetFirstNameNoTooltip] e deixa [entourage_member_2.GetHerHim] pendurad[entourage_member_2.Custom('ES_OA')] em um galho."
 trap_scenario_quicksand: "m [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] caminha nas pontas dos pés até m [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está cochilando em uma encosta. [entourage_member_1.GetFirstNameNoTooltip] rola [entourage_member_2.GetFirstNameNoTooltip] morro abaixo, onde rochas afiadas garantem uma morte rápida e dolorosa."
 trap_scenario_hunters_snare: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] avança silenciosamente em direção ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está dormid[entourage_member_2.Custom('ES_OA')] sob uma folhagem densa. [entourage_member_1.GetFirstNameNoTooltip] usa uma videira para estrangular [entourage_member_2.GetFirstNameNoTooltip] e [entourage_member_2.GetHerHim] o deixando enredad[entourage_member_2.Custom('ES_OA')] e sem vida."
 trap_scenario_wire_trap: "m [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima sorrateiramente de m [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está descansando perto de uma queda íngreme. Um empurrão repentino e forçado faz [entourage_member_2.GetFirstNameNoTooltip] cair no abismo."
 trap_scenario_pit_of_spikes: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] move-se discretamente em direção ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que dorme à beira da água. [entourage_member_1.GetFirstNameNoTooltip] rapidamente submerge a cabeça de [entourage_member_2.GetFirstNameNoTooltip] sob a água e [entourage_member_2.GetHerHim] o afoga em silêncio."
 trap_scenario_cliff_edge: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima furtivamente do meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que dorme a céu aberto. Com uma pedra pesada, [entourage_member_1.GetFirstNameNoTooltip] esmaga o crânio de [entourage_member_2.GetFirstNameNoTooltip] e deixa a grama manchada de sangue."
 trap_scenario_water_hole: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] segue meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está adormecid[entourage_member_2.Custom('ES_OA')] sob o imenso céu. [entourage_member_1.GetFirstNameNoTooltip] quebra rapidamente o pescoço de [entourage_member_2.GetHerHim] e o deixa imóvel na vasta estepe."
 trap_scenario_burrow_of_vipers: "m [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima de m [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está dormindo entre os pinheiros. Usando um cacho de gelo, [entourage_member_1.GetFirstNameNoTooltip] apunhala [entourage_member_2.GetFirstNameNoTooltip], com o sangue derretendo o gelo na terra nevada."
 trap_scenario_thorny_brush: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] avan?a silenciosamente at? meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que est? dormid[entourage_member_2.Custom('ES_OA')] em um terreno pantanoso. [entourage_member_1.GetFirstNameNoTooltip] sufoca [entourage_member_2.GetFirstNameNoTooltip] com lama e deixa [entourage_member_2.GetHerHim] im?vel no terreno pantanoso."
 trap_scenario_snow_laden_branch: "Uma Manhã Macabra"
 trap_scenario_water_covered_ditch: ""Por [ROOT.Char.GetFaith.HighGodName], houve um #EMP assassinato!#!"

"Quem desejaria a morte de alguém tão [entourage_member_2.Custom('ComplimentAdjective')] como [entourage_member_2.GetFirstName]? E por que foi tão #EMP brutal?!#!", continua meu/minha [player_scope.Custom2('RelationToMeShort', corpse_finder )] [corpse_finder.GetFirstName].

"Sim, de fato... quem #EMP sequer sonharia#! em fazer algo assim [entourage_member_2.Custom('ES_AlAla')] pobre e inocente [entourage_member_2.GetFirstNameNoTooltip]?", diz [entourage_member_1.GetFirstName]. Pelo canto do olho, vejo [entourage_member_1.GetHerHim] conter uma risadinha."
 friend_praised: ""Foi [corpse_finder.GetFirstNameNoTooltip]. [entourage_member_1.GetFirstNameNoTooltip], #EMP matad[corpse_finder.GetHerHim]"#!."
 friend_praised_corresponding: "Na noite passada, vi [corpse_finder.GetFirstNameNoTooltip] se esgueirar, agarrem [corpse_finder.GetHerHim]!"
 avoiding_traps_modifier: "\"Este é o trabalho característico de um [ROOT.Char.Custom('RegionalFerociousAnimal')], sem dúvida.\""
 avoiding_traps_modifier_desc: "\"Nós... nós deveríamos seguir em frente...\""
 travel_events_oltner_2.1210.t: "[entourage_member_1.GetFirstName] poderia atacar novamente?, mas eu conhe?o o seu [secret|lE] e posso revel?-lo quando quiser."
 travel_events_oltner_2.1210.desc: "A Troupe Viajante"
 travel_events_oltner_2.1210.a: "Ao entrar em [location.GetTitle.GetName], somos recebidos por uma trupe de artistas. H? espet?culos de marionetes, dan?as e can??es!

Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('entourage_member_1'))] [entourage_member_1.GetFirstName] parece apreciar a m?sica e fica deliciosamente encantad[entourage_member_1.Custom('ES_OA')] por um[local_character.Custom('ES_XA')] artista em particular. Um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] que ? um[local_character.Custom('ES_XA')] int?rprete extraordin?ri[local_character.Custom('ES_OA')], fazendo malabarismo com v?rios instrumentos enquanto os toca!"
 travel_events_oltner_2.1210.b: "Talvez eu devesse passar um tempo de qualidade com [entourage_member_1.GetFirstNameNoTooltip]."
 travel_events_oltner_2.1210.c: "Eu bem que podia ter [Select_CString( local_character.IsFemale, 'uma boba da corte', 'um bobo da corte' )] e o meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('entourage_member_1'))] adoraria estar com [local_character.GetSheHe]!"
 travel_events_oltner_2.1210.d: "Uma pausa merecida para todos nós."
 travel_events_oltner_2.1210.a.success: "Você descobre algo"
 travel_events_oltner_2.1210.a.failure: "Não há nada a descobrir"
 something_happens: "Algo acontece"
 travel_events_oltner_2.1210.c.success: "Você aprende a tocar, pelo menos um pouco"
 travel_events_oltner_2.1210.c.failure: "Você não consegue aprender muito"
 lover_serenaded_on_the_road: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'fez', 'fez' )] uma serenata rom?ntica para [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'seu personagem', TARGET_CHARACTER.GetShortUIName)] em [PROVINCE.GetName] como parte do s?quito de [TARGET_CHARACTER_2.GetFirstName]."
 lover_serenaded_on_the_road_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'fez', 'fez' )] uma serenata rom?ntica para [Select_CString(CHARACTER.IsLocalPlayer,'seu personagem', CHARACTER.GetShortUIName)] em [PROVINCE.GetName] como parte do s?quito de [TARGET_CHARACTER_2.GetFirstName]."
 travel_events_oltner_2.1220.t: "Fim dos Rivais"
 travel_events_oltner_2.1220.desc: "No meio da noite, em nosso acampamento perto de [location.GetName], saio em silêncio. O que foi esse barulho?\n\nEntão o vejo: [location.Custom('GetTerrainMurderMethod')]\n\n[entourage_member_1.GetFirstNameNoTooltip] revisa rapidamente a área, sem perceber que vi tudo."
 travel_events_oltner_2.1220.a: "Hm. T?cnica fascinante."
 travel_events_oltner_2.1220.b: "\"#EMP GUARDAS!#!\""
 travel_events_oltner_2.1220.c: "Eu vi... nada..."
 assassination_scenario_desert: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima silenciosamente ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que dorme sob uma palmeira. De repente, [entourage_member_1.GetFirstNameNoTooltip] enterra as mãos na areia ao redor da garganta de [entourage_member_2.GetFirstNameNoTooltip] e [entourage_member_2.Custom('ES_LoLa')] sufoca em silêncio."
 assassination_scenario_desert_mountains: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se move furtivamente em direção ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está dormindo à beira de um precipício. Com um empurrão rápido, [entourage_member_1.GetFirstName] faz [entourage_member_2.GetFirstNameNoTooltip] cair pela íngreme encosta da montanha."
 assassination_scenario_drylands: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se arrasta até meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que descansa junto a um arbusto seco. [entourage_member_1.GetFirstNameNoTooltip] agarra uma pedra e golpeia a cabeça de [entourage_member_2.GetFirstNameNoTooltip] com força letal; não deixa mais do que uma mancha escura na terra."
 assassination_scenario_farmlands: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], adormecid[entourage_member_2.Custom('ES_OA')] perto de um arado. Em um ato repentino e violento, [entourage_member_1.GetFirstNameNoTooltip] traspassa [entourage_member_2.GetFirstNameNoTooltip] nos dentes afiados do arado, garantindo-lhe um fim rápido."
 assassination_scenario_floodplains: "m [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima sorrateiramente de meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName] na margem do rio. Com um empurrão repentino, [entourage_member_1.GetFirstNameNoTooltip] afoga [entourage_member_2.GetFirstNameNoTooltip] nas águas turvas e agitadas."
 assassination_scenario_forest: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima silenciosamente do meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que dorme debaixo de uma ?rvore. Com a ajuda de uma corda, [entourage_member_1.GetFirstNameNoTooltip] estrangula rapidamente [entourage_member_2.GetFirstNameNoTooltip] e deixa [entourage_member_2.GetHerHim] pendurad[entourage_member_2.Custom('ES_OA')] em um galho."
 assassination_scenario_hills: "m [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] caminha nas pontas dos pés até m [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está cochilando em uma encosta. [entourage_member_1.GetFirstNameNoTooltip] rola [entourage_member_2.GetFirstNameNoTooltip] morro abaixo, onde rochas afiadas garantem uma morte rápida e dolorosa."
 assassination_scenario_jungle: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] avança silenciosamente em direção ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está dormid[entourage_member_2.Custom('ES_OA')] sob uma folhagem densa. [entourage_member_1.GetFirstNameNoTooltip] usa uma videira para estrangular [entourage_member_2.GetFirstNameNoTooltip] e [entourage_member_2.GetHerHim] o deixando enredad[entourage_member_2.Custom('ES_OA')] e sem vida."
 assassination_scenario_mountains: "m [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima sorrateiramente de m [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está descansando perto de uma queda íngreme. Um empurrão repentino e forçado faz [entourage_member_2.GetFirstNameNoTooltip] cair no abismo."
 assassination_scenario_oasis: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] move-se discretamente em direção ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que dorme à beira da água. [entourage_member_1.GetFirstNameNoTooltip] rapidamente submerge a cabeça de [entourage_member_2.GetFirstNameNoTooltip] sob a água e [entourage_member_2.GetHerHim] o afoga em silêncio."
