l_spanish:
 travel_events_oltner_2.1000.t: "Areias Cultivadas"
 travel_events_oltner_2.1000.desc: "O sol queima as dunas de [location.GetName], fazendo de cada passo um testemunho de resist?ncia. Ainda assim, em meio a essa extens?o ?rida, floresce um o?sis de vegeta??o, uma maravilha agr?cola no cora??o do deserto.

Enquanto admiramos essa anomalia, [local_character.Custom('ES_ElLa')] administrador[local_character.Custom('ES_XA')] destas terras se aproxima com um sorriso castigado pelo sol. "\"Agradecemos, mas devemos recusar.\""
 travel_events_oltner_2.1000.option.a: "\"Talvez uma amostra da sua colheita para nos sustentar?\""
 travel_events_oltner_2.1000.option.b: "\"Gostaria de ouvir mais sobre suas vidas aqui.\""
 travel_events_oltner_2.1000.option.c: "Histórias compartilhadas durante [travel|lE]"
 travel_events_oltner_2.1000.option.d: "Hospícios Hospitaleiros"
 cultural_acceptance_gain_travel_stories: "Enquanto viajamos pela [location.Custom('TerrainTypeProvince')] de [location.GetName], um hospício envolto em bela decoração [location.GetCulture.GetNameNoTooltip] aparece ao longo da estrada.\n\n\"Viajantes, parecem cansados. Nossas portas estão abertas para que descansem e recebam cuidados\", oferece um médico com um sorriso gentil. Dentro, o ar está calmo, cheio do aroma suave das ervas.\n\n\"Aqui, experimente minha famosa #EMP \"decocción de [location.Custom('get_region_flower_type')]\"#!. Ela revigorará suas almas!\"."
 travel_events_oltner_2.1010.t: "\"Ah, deixe-me participar da decocção!\""
 travel_events_oltner_2.1010.desc: "\"Meu [ROOT.Char.Custom('GetCourtType')] poderia precisar de um médico, por que não se junta a nós?\""
 travel_events_oltner_2.1010.b: "\"Aqui está uma doação, use-a para ajudar os enfermos.\""
 travel_events_oltner_2.1010.c: "Hospícios Bem-Financiados"
 travel_events_oltner_2.1010.d: "Hospícios nessas terras estão prosperando com generosas doações de viajantes."
 well_funded_hospices_modifier: "A [aptitude|lE] de [local_character.GetUIName] como [GetCourtPositionType('court_physician_court_position').GetName()|l] ? [local_character.GetCourtPositionAptitude( GetCourtPositionType( 'court_physician_court_position' ) )|l]"
 well_funded_hospices_modifier_desc: "O Banquete do Pastor de Camelos"
 local_character_aptitude_physician: "Quando meu s?quito e eu percorremos a vastid?o de [location.GetName], surge a silhueta inconfund?vel de uma fazenda de camelos. ? medida que a noite cai, aproxima-se [Select_CString( local_character.IsFemale, 'uma cameleira', 'um cameleiro' )].

"Bem-vindos, estimados convidados", [local_character.GetSheHe] diz sorrindo. "Os camelos de [location.GetName] nos sustentam, e esta noite homenageamos essas nobres criaturas. Juntar-se-?o a n?s sob as estrelas para um banquete e hist?rias do deserto?""
 travel_events_oltner_2.1020.t: "\"Deixe as festividades desta noite revigorar nossas almas!\""
 travel_events_oltner_2.1020.desc: "Quando meu s?quito e eu percorremos a vastid?o de [location.GetName], surge a silhueta inconfund?vel de uma fazenda de camelos. ? medida que a noite cai, aproxima-se [Select_CString( local_character.IsFemale, 'uma cameleira', 'um cameleiro' )].

"\"Infelizmente, devo atender ao chamado da jornada e recusar.\""
 travel_events_oltner_2.1020.a: "Camelos Resilientes"
 travel_events_oltner_2.1020.b: "Essa viagem é facilitada por um grupo de camelos particularmente resistentes e confiáveis."
 travel_events_oltner_2.1020.c: "Camelo de Guerra Poderoso"
 travel_events_oltner_2.1020.d: "Este personagem possui um camelo de guerra particularmente impressionante."
 travel_hardy_camels_modifier: "Uma Caravana Carregada"
 travel_hardy_camels_modifier_desc: "Viajando pelas areias de [location.GetName], uma caravana de camelos carregados cruza nosso caminho. O mestre da caravana nota nossa comitiva e interrompe a prociss?o.

"Nobres viajantes", [local_character.GetSheHe] diz, com um brilho astuto no olhar, "talvez queiram dar uma olhada nos tesouros que essas fortes bestas carregam? Pelo pre?o certo, as maravilhas do deserto podem acompanh?-los em suas jornadas.""
 war_camel_modifier: "\"Estou ansioso para ver suas mercadorias, vamos negociar.\""
 war_camel_modifier_desc: "\"Não é necessário, mas talvez possamos viajar juntos por um tempo?\""
 travel_events_oltner_2.1030.t: "\"Mostre-me algo único, um verdadeiro tesouro de [location.GetNameNoTooltip].\""
 travel_events_oltner_2.1030.desc: "Viajando pelas areias de [location.GetName], uma caravana de camelos carregados cruza nosso caminho. O mestre da caravana nota nossa comitiva e interrompe a prociss?o.

"Esta comitiva se juntou a um grupo de mercadores do deserto, tornando a jornada mais segura."
 travel_events_oltner_2.1030.a: "Artefato Comprado"
 travel_events_oltner_2.1030.b: "Você ganha um [artifact|lE] aleatório."
 travel_events_oltner_2.1030.c: "Você ganha um [artifact|lE] famoso aleatório."
 travel_events_oltner_2.1030.d: "Oásis de Tranquilidade"
 traveling_with_camel_merchants_modifier: "Enquanto atravessamos as plan?cies ?ridas de [location.GetName], um o?sis sereno surge ? vista, cercado por um grupo de camelos.

[Select_CString( local_character.IsFemale, 'Uma anci? s?bia', 'Um anci?o s?bio' )] reclinad[local_character.Custom('ES_OA')] junto ? ?gua percebe nossa aproxima??o e nos convida com um gesto. "Viajantes cansados", come?a, com a voz suave como a brisa da noite, "o esp?rito do deserto pode ser duro. Descansem junto ?s nossas ?guas, deixem que a for?a silenciosa dos camelos os revigore.""
 traveling_with_camel_merchants_modifier_desc: "\"Por [ROOT.Char.GetFaith.HighGodName], vamos ficar aqui por alguns dias!\""
 artifact_purchased: "\"Você parece sábio, por que não se junta a nós?\""
 purchase_artifact_trinket_tt: "\"Talvez devêssemos negociar?\""
 purchase_artifact_famed_tt: "\"Seu oásis é um alívio para os olhos cansados, mas o tempo é precioso.\""
 travel_events_oltner_2.1040.t: "Emissários Equinos"
 travel_events_oltner_2.1040.desc: "Enquanto atravessamos as plan?cies ?ridas de [location.GetName], um o?sis sereno surge ? vista, cercado por um grupo de camelos.

[Select_CString( local_character.IsFemale, 'Uma anci? s?bia', 'Um anci?o s?bio' )] reclinad[local_character.Custom('ES_OA')] junto ? ?gua percebe nossa aproxima??o e nos convida com um gesto. "\"Quanto de ouro pelo mais forte?\""
 travel_events_oltner_2.1040.a: "\"Estou mais interessado na #EMP sua#! destreza como $knight_culture_player_plural_no_tooltip_lowercase$!\""
 travel_events_oltner_2.1040.b: "\"Belas criaturas, mas devo priorizar minha jornada.\""
 travel_events_oltner_2.1040.c: "verdejante"
 travel_events_oltner_2.1040.d: "ondulante"
 travel_events_oltner_2.1050.t: "poderoso"
 travel_events_oltner_2.1050.desc: "sem fim"
 travel_events_oltner_2.1050.a: "luxuriante"
 travel_events_oltner_2.1050.b: "rico"
 travel_events_oltner_2.1050.c: "Administrador dos Estábulos"
 travel_events_oltner_2.1050.d: "O cheiro de feno e os relinchos nos guiam at? os c?lebres est?bulos de [location.GetName]. [Select_CString( local_character.IsFemale, 'A chefe', 'O chefe' )] de est?bulos, uma figura muito respeitada nesta regi?o, nos d? uma calorosa recep??o.

"Sejam bem-vindos", proclama. "Meus cavalos est?o entre os mais velozes que existem. Talvez voc?s considerem comprar um companheiro t?o nobre para suas viagens?"."
 prefix_verdant: "\"Mostre-me o seu cavalo mais rápido.\""
 prefix_rolling: "\"Preciso de todos os seus melhores cavalos!\""
 prefix_mighty: "\"Você estaria interessado em comprar nossas éguas excedentes?\""
 prefix_endless: "\"Lamentavelmente, devemos #EMp partir rapidamente#!...\""
 prefix_lush: "Cavalo Ágil"
 prefix_rich: "O líder desta viagem possui um cavalo particularmente rápido."
 travel_events_oltner_2.1060.t: "Cavalos Ágeis"
 travel_events_oltner_2.1060.desc: "O cheiro de feno e os relinchos nos guiam at? os c?lebres est?bulos de [location.GetName]. [Select_CString( local_character.IsFemale, 'A chefe', 'O chefe' )] de est?bulos, uma figura muito respeitada nesta regi?o, nos d? uma calorosa recep??o.

"Esta comitiva vendeu seus cavalos excedentes."
 travel_events_oltner_2.1060.a: "O Curandeiro de Cavalos"
 travel_events_oltner_2.1060.b: "Entre as pastagens tranquilas de [location.GetName], uma figura cuida de um cavalo com uma pata ferida. Ao nos aproximarmos, [Select_CString( local_character.IsFemale, 'a curandeira', 'o curandeiro' )] ergue o olhar, seus olhos refletem anos de conhecimento.

"Um simples trope?o", explica, "mas ela voltar? a correr". Comovidos por seus cuidados, fazemos uma pausa em nossa jornada."
 travel_events_oltner_2.1060.c: "\"Podemos ajudar a curar essa nobre besta?\""
 travel_events_oltner_2.1060.d: "Você deveria ser [Select_CString( local_character.IsFemale, 'minha senhora', 'meu senhor' )] dos cavalos!"
 swift_horse_modifier: "\"Diga, você poderia me ensinar este ofício?\""
 swift_horse_modifier_desc: "\"Espero que ela se recupere rapidamente, adeus.\""
 swift_horses_modifier: "Trabalha de Graça"
 swift_horses_modifier_desc: "[local_character.GetFirstName] ocupar? o cargo de [GetCourtPositionType('master_of_horse_court_position').GetName()|l] sem receber salário"
 sold_horses_modifier: "Cuidado Excelente com Cavalos"
 sold_horses_modifier_desc: "Este personagem é bem versado na arte de cuidar de cavalos."
 travel_events_oltner_2.1070.t: "Prodígio Pungente"
 travel_events_oltner_2.1070.desc: "Entre as pastagens tranquilas de [location.GetName], uma figura cuida de um cavalo com uma pata ferida. Ao nos aproximarmos, [Select_CString( local_character.IsFemale, 'a curandeira', 'o curandeiro' )] ergue o olhar, seus olhos refletem anos de conhecimento.

"\"Quero o espécime mais resistente.\""
 travel_events_oltner_2.1070.a: "\"O seu camelo mais rápido servirá.\""
 travel_events_oltner_2.1070.b: "\"Prefiro que me pague em ouro...\""
 travel_events_oltner_2.1070.c: "Camelo Rápido"
 travel_events_oltner_2.1070.d: "Um dos cavalos desta comitiva fugiu e foi substituído por um camelo rápido."
 free_court_position: "Camelo Resistente"
 master_of_the_horse_free: "Um dos cavalos desta comitiva fugiu e foi substituído por um camelo resistente."
 excellent_horse_care_modifier: "Sentinela das Dunas Silenciosas"
 excellent_horse_care_modifier_desc: "No sil?ncio de [location.GetName], onde os ventos quentes esculpem as areias, uma torre de vigia solit?ria se ergue vigilante. Seu/sua [Select_CString( local_character.IsFemale, 'guardi?', 'guardi?o' )], um[local_character.Custom('ES_XA')] sentinela auster[local_character.Custom('ES_OA')], nos recebe calorosamente.

"Caros h?spedes!", grita l? de cima. "H? algo que eu possa fazer por voc?s? Talvez queiram se juntar a mim para contemplar a tranquilidade da [location.Custom('TerrainTypeProvince')]?"."
 travel_events_oltner_2.1080.t: ""Deixai-nos descansar sob a vossa proteção, amig[local_character.Custom('ES_OA')]"."
 travel_events_oltner_2.1080.desc: "Ao passarmos pelas fazendas de camelos de [location.GetName], um odor acre ataca nossos sentidos. Os camelos, por mais vitais que sejam, produzem um fedor que impregna cada canto.

De repente, um de nossos cavalos dispara para longe, aparentemente aterrorizado pelo cheiro.

"Este séquito recebeu orientação de um[local_character.Custom('ES_XA')] vigia de visão aguçada."
 travel_events_oltner_2.1080.a: "Vigia do Deserto"
 travel_events_oltner_2.1080.b: "Esta comitiva está acompanhada por um vigia experiente, muito familiarizado com o terreno local."
 travel_events_oltner_2.1080.c: "Abundância Bovina"
 travel_events_oltner_2.1080.d: "A jornada por [location.GetName] revela extens?es de pastagens salpicadas de gado. Enquanto meu s?quito para ? beira de um campo verdejante, aproxima-se [Select_CString( local_character.IsFemale, 'a vaqueira', 'o vaqueiro' )]. Dedilhando alegremente seu ala?de, [local_character.GetSheHe] nos oferece um largo sorriso ao nos cumprimentar.

"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", come?a, "estas feras s?o o orgulho de nossa prov?ncia! Querem juntar-se a mim para testemunhar nosso trabalho, reabastecer seus suprimentos ou talvez provar nosso famoso queijo azul de [location.GetTitle.GetNameNoTierNoTooltip]?""
 exchange_camel_fast_modifier: "\"Mostre-me como você cuida do seu rebanho.\""
 exchange_camel_fast_modifier_desc: "\"Vamos encher nossos suprimentos, e nossas barrigas!\""
 exchange_camel_sturdy_modifier: "\"Queijo azul de [location.GetTitle.GetNameNoTierNoTooltip] soa #EMP delicioso!#!\""
 exchange_camel_sturdy_modifier_desc: "\"Precisamos apressar nossa jornada.\""
 travel_events_oltner_2.1090.t: "Suprimentos Extras"
 travel_events_oltner_2.1090.desc: "No sil?ncio de [location.GetName], onde os ventos quentes esculpem as areias, uma torre de vigia solit?ria se ergue vigilante. Seu/sua [Select_CString( local_character.IsFemale, 'guardi?', 'guardi?o' )], um[local_character.Custom('ES_XA')] sentinela auster[local_character.Custom('ES_OA')], nos recebe calorosamente.

"O governante destas terras está aplicando técnicas avançadas de pastoreio que aprendeu durante suas viagens."
 travel_events_oltner_2.1090.a: "O Som do Ferreiro"
 travel_events_oltner_2.1090.b: "Nossa jornada nos leva a [location.GetName], onde o martelar r?tmico dos ferreiros forma o pulsar do com?rcio local. A fuma?a se derrama das chamin?s enquanto os ferreiros, banhados em suor e fuligem, transformam o bruto em algo not?vel.

Um[local_character.Custom('ES_OA')] de [Select_CString( local_character.IsFemale, 'as ferreiras', 'os ferreiros' )] limpa a testa e me acena para que eu me aproxime. "Dou-lhe as boas-vindas, [ROOT.Char.Custom('FormOfAddressForLiege')]", declara. "Somos os mestres ferreiros do povo [local_character.GetCulture.GetNameNoTooltip], os melhores que existem! Por favor, d? uma olhada em nossos produtos.""
 travel_events_oltner_2.1090.c: "\"Um conjunto de armaduras não cairia mal.\""
 travel_events_oltner_2.1090.d: "\"Estou procurando uma arma.\""
 watchtower_guidance_modifier: "\"Você faz escudos?\""
 watchtower_guidance_modifier_desc: "\"Prefiro meus próprios ferreiros, adeus.\""
 watchman_guidance_modifier: "Você compra um [artifact|lE] Armadura de [rarity|lE] desconhecida."
 watchman_guidance_modifier_desc: "Você compra um [artifact|lE] Arma de [rarity|lE] desconhecida."
 travel_events_oltner_2.1100.t: "Você compra um [artifact|lE] Escudo de Muralha de [rarity|lE] desconhecida."
 travel_events_oltner_2.1100.desc: "A jornada por [location.GetName] revela extens?es de pastagens salpicadas de gado. Enquanto meu s?quito para ? beira de um campo verdejante, aproxima-se [Select_CString( local_character.IsFemale, 'a vaqueira', 'o vaqueiro' )]. Dedilhando alegremente seu ala?de, [local_character.GetSheHe] nos oferece um largo sorriso ao nos cumprimentar.

""Aqui, tome este ouro para ajud?-lo a se reerguer.""
 travel_events_oltner_2.1100.a: ""Junte-se a nós, precisamos de um[local_character.Custom('ES_XA')] ferreir[local_character.Custom('ES_OA')]"."
 travel_events_oltner_2.1100.b: "\"Que terrível. Bem, que seja!\""
 travel_events_oltner_2.1100.c: "Recebe uma [Concept('inspired', 'inspiración')|E]"
 travel_events_oltner_2.1100.d: "O Sentinela [location.Custom('TerrainTypeProvince')]"
 extra_supplies_modifier: "? medida que a silhueta de [location.GetName] se imp?e ? frente, os contornos acidentados de fortifica??es nas colinas dominam a paisagem.

Um grupo de guerreiros de aspecto rude se aproxima; seu l?der parece [local_character.Custom('ES_ElLa')] mais grosseir[local_character.Custom('ES_OA')] de todos. "[ROOT.Char.Custom('FormOfAddressForLiege')|U]", [local_character.GetSheHe] acena com a cabe?a, "somos [local_character.GetWomenMen] da guarni??o de [location.GetTitle.GetHolder.GetTitledFirstName|l]. Por uma pequena taxa, podemos proteg?-lo em sua jornada. O que me diz?""
 extra_supplies_modifier_desc: "\"Por favor, guiem-nos com segurança através do [location.Custom('TerrainTypeProvince')].\""
 herding_insights_modifier: "\"Você parece forte. Que tal se juntar a mim?\""
 herding_insights_modifier_desc: ""Vocês todos parecem formidáveis, vou dobrar o que [location.GetTitle.GetHolder.GetFirstNameNoTooltip] pagar! ""
 travel_events_oltner_2.1110.t: "\"Não é necessário, mas obrigado.\""
 travel_events_oltner_2.1110.desc: "Nossa jornada nos leva a [location.GetName], onde o martelar r?tmico dos ferreiros forma o pulsar do com?rcio local. A fuma?a se derrama das chamin?s enquanto os ferreiros, banhados em suor e fuligem, transformam o bruto em algo not?vel.

Um[local_character.Custom('ES_OA')] de [Select_CString( local_character.IsFemale, 'as ferreiras', 'os ferreiros' )] limpa a testa e me acena para que eu me aproxime. "Taxa de Viagem Paga"
 travel_events_oltner_2.1110.a: "Defensores Diminutos"
 travel_events_oltner_2.1110.b: "Ao pé de uma fortificação particularmente imponente em [location.GetName], um grupo de crianças brinca de guerreiros, e sua risada contrapõe-se à solenidade da pedra.\n\n[Select_CString( local_character.IsFemale, 'Uma menina', 'Um menino' )] valente e de olhos brilhantes, aproxima-se com uma espada de madeira. "Alto! Ninguém pode passar pela fortaleza de [local_character.GetFirstName] e seu grupo [local_character.Custom('ComplimentAdjective')]!", exclama alegremente. "Ah, espere, um... vocês são um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]?!"."
 travel_events_oltner_2.1110.c: "\"Isso mesmo! Agora vá contar para sua aldeia sobre mim!\""
 travel_events_oltner_2.1110.d: "\"Bravos defensores, digam-nos o caminho mais rápido por essas [location.Custom('TerrainTypeProvince')].\""
 purchase_artifact_common_armor_tt: "\"#EMP *Desenhe sua arma e assuste as crianças*#!\""
 purchase_artifact_common_weapon_tt: ""Aprecie seus jogos, criança[local_character.Custom('ES_OA')]". Precisamos partir"."
 purchase_artifact_common_shield_tt: "Jornada Acelerada"
 travel_events_oltner_2.1120.t: "Jornada Atrasada"
 travel_events_oltner_2.1120.desc: "Quando nosso s?quito caminha sem pressa por [location.GetName], encontramos uma oficina de ferraria em completo caos. [Select_CString( local_character.IsFemale, 'A ferreira', 'O ferreiro' )|U], cobert[local_character.Custom('ES_OA')] de fuligem, parece afligid[local_character.Custom('ES_OA')] e lamenta um forno quebrado.

"Exploradores Infantis"
 travel_events_oltner_2.1120.a: "Esta comitiva está sendo guiada por uma equipe de crianças bem-intencionadas."
 travel_events_oltner_2.1120.b: "Patrulhas Extras"
 travel_events_oltner_2.1120.c: "Esta baronia redobrou suas patrulhas depois que crianças locais foram ameaçadas por viajantes."
 becomes_inspired: "Chifres Ecoantes"
 travel_events_oltner_2.1130.t: "O som ecoante de chifres preenche o ar enquanto atravessamos o [location.Custom('TerrainTypeProvince')] perto de [location.GetName]. Os fortes de colina reverberam com o som, um chamado à armas que ressoou por gerações.\n\nMere segundos após o primeiro som, uma multidão de guerreiros [local_character.GetCulture.GetName] da guarnição emerge da fortificação mais próxima, atacando um grupo de bandidos e foras-da-lei aterrorizados."
 travel_events_oltner_2.1130.desc: "? medida que a silhueta de [location.GetName] se imp?e ? frente, os contornos acidentados de fortifica??es nas colinas dominam a paisagem.

Um grupo de guerreiros de aspecto rude se aproxima; seu l?der parece [local_character.Custom('ES_ElLa')] mais grosseir[local_character.Custom('ES_OA')] de todos. ""[retinue_member.GetFirstNameNoTooltip], ajude-os! N?s... ficaremos aqui.""
 travel_events_oltner_2.1130.a: "\"Essa não é nossa batalha.\""
 travel_events_oltner_2.1130.b: "Batalhas assistidas contra bandidos durante [travel|lE]"
 travel_events_oltner_2.1130.c: "Você mata todos os bandidos."
 travel_events_oltner_2.1130.d: "Os bandidos matam o comandante e fogem."
 hill_fort_guards_modifier: "A guarnição vence"
 hill_fort_guards_modifier_desc: "Os bandidos vencem"
 toll_payed: "[retinue_member.GetFirstName] mata o líder dos bandidos"
 travel_events_oltner_2.1140.t: "[retinue_member.GetFirstName] é 'tragicamente' morto"
 travel_events_oltner_2.1140.desc: "Vínculo à Beira do Caminho"
 travel_events_oltner_2.1140.a: "Enquanto percorremos um caminho desafiador em [location.GetName], ou?o risadas ? frente. Meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] e meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName] est?o trabalhando [Select_CString(And(entourage_member_1.IsFemale, entourage_member_2.IsFemale),'juntas','juntos')] para atravessar [location.Custom('GetRandomCrossingToBridge')].

"[entourage_member_1.GetFirstNameNoTooltip], sua ideia de construir uma ponte improvisada foi genial!", exclama [entourage_member_2.GetFirstNameNoTooltip]. [entourage_member_1.GetFirstNameNoTooltip] responde com um risinho: "E o seu racioc?nio r?pido com aqueles [location.Custom('GetRandomImprovisedBridgeMaterial')] amarrou tudo!"

Parece que esse obst?culo levou a uma nova amizade!"
 travel_events_oltner_2.1140.b: "\"Sua engenhosidade é louvável!\""
 travel_events_oltner_2.1140.c: "\"Não se associe com os inferiores!\""
 travel_events_oltner_2.1140.d: "\"Isso certamente apressará nossa jornada.\""
 travel_hastened: "uma travessia de rio complicada"
 travel_delayed: "um desfiladeiro traiçoeiro cheio de areia"
 famous_visit_modifier: "um ravina perigosa"
 famous_visit_modifier_desc: "um leito de rio profundo e seco"
 child_scouts_modifier: "um canal de irrigação inchado e alimentado pela chuva"
 child_scouts_modifier_desc: "um leito de riacho transbordado"
 extra_patrols_modifier: "um riacho de correnteza forte"
