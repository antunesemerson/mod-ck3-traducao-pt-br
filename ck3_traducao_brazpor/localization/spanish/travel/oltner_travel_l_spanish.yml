 travel_events_oltner_2.1220.t: "Fim dos Rivais"
 travel_events_oltner_2.1220.desc: "No meio da noite, em nosso acampamento perto de [location.GetName], saio em silêncio. O que foi esse barulho?\n\nEntão o vejo: [location.Custom('GetTerrainMurderMethod')]\n\n[entourage_member_1.GetFirstNameNoTooltip] revisa rapidamente a área, sem perceber que vi tudo."
 travel_events_oltner_2.1220.a: "Hm. T?cnica fascinante."
 travel_events_oltner_2.1220.b: "\"#EMP GUARDAS!#!\""
 travel_events_oltner_2.1220.c: "Eu vi... nada..."
 assassination_scenario_desert: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima silenciosamente ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que dorme sob uma palmeira. De repente, [entourage_member_1.GetFirstNameNoTooltip] enterra as mãos na areia ao redor da garganta de [entourage_member_2.GetFirstNameNoTooltip] e [entourage_member_2.Custom('ES_LoLa')] sufoca em silêncio."
 assassination_scenario_desert_mountains: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se move furtivamente em direção ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está dormindo à beira de um precipício. Com um empurrão rápido, [entourage_member_1.GetFirstName] faz [entourage_member_2.GetFirstNameNoTooltip] cair pela íngreme encosta da montanha."
 assassination_scenario_drylands: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se arrasta até meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que descansa junto a um arbusto seco. [entourage_member_1.GetFirstNameNoTooltip] agarra uma pedra e golpeia a cabeça de [entourage_member_2.GetFirstNameNoTooltip] com força letal; não deixa mais do que uma mancha escura na terra."
 assassination_scenario_farmlands: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], adormecid[entourage_member_2.Custom('ES_OA')] perto de um arado. Em um ato repentino e violento, [entourage_member_1.GetFirstNameNoTooltip] traspassa [entourage_member_2.GetFirstNameNoTooltip] nos dentes afiados do arado, garantindo-lhe um fim rápido."
 assassination_scenario_floodplains: "m [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima sorrateiramente de meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName] na margem do rio. Com um empurrão repentino, [entourage_member_1.GetFirstNameNoTooltip] afoga [entourage_member_2.GetFirstNameNoTooltip] nas águas turvas e agitadas."
 assassination_scenario_forest: "mi [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se acerca silenciosamente a mi [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que duerme debajo de un árbol. Con la ayuda de una cuerda, [entourage_member_1.GetFirstNameNoTooltip] estrangula rápidamente a [entourage_member_2.GetFirstNameNoTooltip] y [entourage_member_2.GetHerHim] deja colgando de una rama."
 assassination_scenario_hills: "m [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] caminha nas pontas dos pés até m [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está cochilando em uma encosta. [entourage_member_1.GetFirstNameNoTooltip] rola [entourage_member_2.GetFirstNameNoTooltip] morro abaixo, onde rochas afiadas garantem uma morte rápida e dolorosa."
 assassination_scenario_jungle: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] avança silenciosamente em direção ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está dormid[entourage_member_2.Custom('ES_OA')] sob uma folhagem densa. [entourage_member_1.GetFirstNameNoTooltip] usa uma videira para estrangular [entourage_member_2.GetFirstNameNoTooltip] e [entourage_member_2.GetHerHim] o deixando enredad[entourage_member_2.Custom('ES_OA')] e sem vida."
 assassination_scenario_mountains: "m [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima sorrateiramente de m [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está descansando perto de uma queda íngreme. Um empurrão repentino e forçado faz [entourage_member_2.GetFirstNameNoTooltip] cair no abismo."
 assassination_scenario_oasis: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] move-se discretamente em direção ao meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que dorme à beira da água. [entourage_member_1.GetFirstNameNoTooltip] rapidamente submerge a cabeça de [entourage_member_2.GetFirstNameNoTooltip] sob a água e [entourage_member_2.GetHerHim] o afoga em silêncio."
 assassination_scenario_plains: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima furtivamente do meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que dorme a céu aberto. Com uma pedra pesada, [entourage_member_1.GetFirstNameNoTooltip] esmaga o crânio de [entourage_member_2.GetFirstNameNoTooltip] e deixa a grama manchada de sangue."
 assassination_scenario_steppe: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] segue meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está adormecid[entourage_member_2.Custom('ES_OA')] sob o imenso céu. [entourage_member_1.GetFirstNameNoTooltip] quebra rapidamente o pescoço de [entourage_member_2.GetHerHim] e o deixa imóvel na vasta estepe."
 assassination_scenario_taiga: "m [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se aproxima de m [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que está dormindo entre os pinheiros. Usando um cacho de gelo, [entourage_member_1.GetFirstNameNoTooltip] apunhala [entourage_member_2.GetFirstNameNoTooltip], com o sangue derretendo o gelo na terra nevada."
 assassination_scenario_wetlands: "meu [player_scope.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] avan?a silenciosamente at? meu [player_scope.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName], que est? dormid[entourage_member_2.Custom('ES_OA')] em um terreno pantanoso. [entourage_member_1.GetFirstNameNoTooltip] sufoca [entourage_member_2.GetFirstNameNoTooltip] com lama e deixa [entourage_member_2.GetHerHim] im?vel no terreno pantanoso."
 travel_events_oltner_2.1230.t: "Uma Manhã Macabra"
 travel_events_oltner_2.1230.desc: "«¡Por [ROOT.Char.GetFaith.HighGodName], se ha producido un #EMP asesinato!#!».\n\n«¿Quién podría desear la muerte de alguien tan [entourage_member_2.Custom('ComplimentAdjective')] como [entourage_member_2.GetFirstName]? ¿¡Y por qué fue tan #EMP brutal?!#!», continúa mi [player_scope.Custom2('RelationToMeShort', corpse_finder )] [corpse_finder.GetFirstName].\n\n«Sí, ciertamente… ¿Quien #EMP soñaría siquiera#! con hacer algo así [entourage_member_2.Custom('ES_AlAla')] pobre e inocente [entourage_member_2.GetFirstNameNoTooltip]?», dice [entourage_member_1.GetFirstName]. Por el rabillo del ojo [entourage_member_1.Custom('ES_LoLa')] veo contener una risita."
 travel_events_oltner_2.1230.a: ""Foi [corpse_finder.GetFirstNameNoTooltip]. [entourage_member_1.GetFirstNameNoTooltip], #EMP matad[corpse_finder.GetHerHim]"#!."
 travel_events_oltner_2.1230.b: "Na noite passada, vi [corpse_finder.GetFirstNameNoTooltip] se esgueirar, agarrem [corpse_finder.GetHerHim]!"
 travel_events_oltner_2.1230.c: "\"Este é o trabalho característico de um [ROOT.Char.Custom('RegionalFerociousAnimal')], sem dúvida.\""
 travel_events_oltner_2.1230.d: "\"Nós... nós deveríamos seguir em frente...\""
 might_strike_again: "[entourage_member_1.GetFirstName] poderia atacar novamente?, mas eu conhe?o o seu [secret|lE] e posso revel?-lo quando quiser."
 travel_events_oltner_2.1240.t: "A Troupe Viajante"
 travel_events_oltner_2.1240.desc: "Al entrar en [location.GetTitle.GetName], nos recibe una troupe de artistas. ¡Hay espectáculos de marionetas, bailes y canciones!\n\nMi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('entourage_member_1'))] [entourage_member_1.GetFirstName] parece disfrutar de la música y se encuentra deliciosamente embelesad[entourage_member_1.Custom('ES_OA')] por un[local_character.Custom('ES_XA')] artista en particular. Un[local_character.Custom('ES_XA')] [local_character.GetWomanMan] que es un[local_character.Custom('ES_XA')] intérprete extraordinari[local_character.Custom('ES_OA')], ¡hace malabares con varios instrumentos mientras los toca!"
 travel_events_oltner_2.1240.a: "Talvez eu devesse passar um tempo de qualidade com [entourage_member_1.GetFirstNameNoTooltip]."
 travel_events_oltner_2.1240.b: "Eu bem que podia ter [Select_CString( local_character.IsFemale, 'uma boba da corte', 'um bobo da corte' )] e o meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('entourage_member_1'))] adoraria estar com [local_character.GetSheHe]!"
 travel_events_oltner_2.1240.c: "Uma pausa merecida para todos nós."
