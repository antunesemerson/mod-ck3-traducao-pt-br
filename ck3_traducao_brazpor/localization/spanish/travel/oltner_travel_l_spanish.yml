 travel_events_oltner_2.1180.t: "Confissões ao Luar"
 travel_events_oltner_2.1180.desc: "Sob a luz da lua em [location.GetName], escuto uma conversa íntima entre meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] e meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName].\n\n“Oh, [entourage_member_1.GetFirstNameNoTooltip], meu [entourage_member_1.Custom('RomanticComplimentNoun')|l] [entourage_member_1.Custom('RomanticComplimentAdjective')], você faz com que estas noites estreladas sejam inesquecíveis”, confessa, com a voz trêmula. [entourage_member_1.GetFirstNameNoTooltip] responde suavemente, “Jamais imaginei encontrar alguém que me entendesse tão bem.”\n\nParece que o amor está florescendo em minha comitiva…"
 travel_events_oltner_2.1180.a: "Adorável, mas [seduced_entourage.GetFirstNameNoTooltip] não se #EMP me#! pode resistir."
 travel_events_oltner_2.1180.b: "\"Oi! Sobre o que vocês estão falando? Posso me juntar a vocês!?\""
 travel_events_oltner_2.1180.c: "Drama... Seria #EMP uma verdadeira pena#! se isso vazasse..."
 travel_events_oltner_2.1180.d: "Qué tierno, [Select_CString(And(entourage_member_1.IsFemale, entourage_member_2.IsFemale),'las','les')] dejaré a lo suyo."
 lover_moonlit_evening_on_the_road: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUINameNoTooltip] [CHARACTER.LocalPlayerString( 'os enamorasteis', 'se enamoraron' )] após se sentarem [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale),'juntas','juntos')] a olhar as estrelas como parte do séquito de [TARGET_CHARACTER_2.GetShortUIName]."
 lover_moonlit_evening_on_the_road_corresponding: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUINameNoTooltip] [CHARACTER.LocalPlayerString( 'os enamorasteis', 'se enamoraron' )] após se sentarem [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale),'juntas','juntos')] para olhar as estrelas como parte do séquito de [TARGET_CHARACTER_2.GetShortUIName]."
 i_saw_nothing: "Não vi nada. Nada #EMP mesmo#!. Melhor esquecer tudo sobre isso."
 travel_events_oltner_2.1190.t: "Uma Relíquia Roubada"
 travel_events_oltner_2.1190.desc: "En el silencio de nuestro campamento junto a [location.GetName], unos alaridos rompen la calma. Mi [ROOT.Char.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] se enfrenta a mi [ROOT.Char.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName] acusadoramente, mientras sostiene un [entourage_member_1.Custom('GetRandomSmallPreciousItem')] de gran valor.\n\n«¡[Select_CString( entourage_member_2.IsFemale, 'Ladrona', 'Ladrón' )]! ¡Era de mi madre!», exclama [entourage_member_1.GetFirstNameNoTooltip] mientras sus ojos refulgen de ira. [entourage_member_2.GetFirstNameNoTooltip] niega la acusación con vehemencia, «Especie de [entourage_member_1.Custom2('InsultNoun', SCOPE.sC('entourage_member_2'))] mentiroso, ¡siempre me ha pertenecido!»."
 travel_events_oltner_2.1190.a: ""Pertence a [entourage_member_1.GetFirstNameNoTooltip]"."
 travel_events_oltner_2.1190.b: "\"[entourage_member_2.GetFirstNameNoTooltip] deve ficar com isso.\""
 travel_events_oltner_2.1190.c: ""Vocês são como [Select_CString(And(entourage_member_1.IsFemale, entourage_member_2.IsFemale),'niñas','niños')]!" Entreguem isso para mim!""
 travel_events_oltner_2.1190.d: "\"Realmente #EMP não#! temos tempo para isso!\""
 travel_events_oltner_2.1190.d.1: "[entourage_member_2.GetName] pega"
