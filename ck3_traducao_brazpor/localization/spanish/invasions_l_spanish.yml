l_spanish:
 almohad.1001.t: "Ascensão dos Almóadas"
 almohad.1001.desc: "Parece que uma crença dissidente está ganhando força em [almohad_county.GetName]. O movimento religioso chama a si mesmo de Almóadas e fala da necessidade de purgar o Magrebe dos hereges e dos desviados.\n\nOs magistrados locais estão preocupados, mas certamente um grupo religioso marginal liderado por um teólogo desacreditado não é motivo de preocupação, certo?"
 almohad.1001.a: "Por que isso deveria me preocupar?"
 almohad.1001.a.flavor: "Desde quando um grupo religioso marginal nas províncias já trouxe problemas para alguém?"
 almohad.1001.b: "Vamos erradicar isso antes que crie raízes de verdade..."
 almohad.1001.b.conversion_tt: "Se você já estiver convertendo a fé em [almohad_county.GetName], poderá perder progresso se escolher esta opção!"
 almohad.1001.player_warning: "@warning_icon! #X Se não conseguir converter [almohad_county.GetNameNoTier] de [masmudi.GetName] com rapidez suficiente, isso levará à ascensão dos Almóadas. Prepare-se.#!"
 almohad.1002.desc: "O movimento religioso conhecido como os Almóadas saiu de seu quartel-general com a intenção de “reconquistar o Magrebe dos infiéis”, pela força, se necessário!\n\nSeu líder, [ibn_tumart.GetTitledFirstName|l], foi afastado de numerosos centros de aprendizado por ser, francamente, irritante em sua insistência em práticas dogmáticas. No entanto, agora reuniu um forte núcleo de seguidores e declarou a si mesmo nada menos que o Madhi!"
 almohad.1002.a: "Como se esse humilde [ibn_tumart.GetFaith.PriestNeuter] representasse alguma ameaça!"
 almohad.1002.a.target.tt: "Os Almóadas entram em guerra contra você!"
 almohad.1002.a.not_target.tt: "Os Almóadas entram em guerra contra o seu suserano!"
 almohad.1002.b: "Pensando bem, o que ele diz faz muito sentido."
 almohad.1002.b.flavor: "Dificilmente posso me considerar um fiel digno..."
 almohad.1003.desc: "[ibn_tumart.GetTitledFirstName], que fundou os almóadas, morreu, e seria de se esperar que o movimento passasse para a história com sua morte. Quem dera fosse assim.\n\nAgora eles têm um novo líder! [al_mumin.GetTitledFirstName|l] não só manteve as tribos unidas, como reuniu #EMP mais#! pessoas sob sua bandeira!"
 almohad.1003.a: "Esses fanáticos não param de aparecer!"
 almohad.1003.a.tt: "Os Almóadas retornam, mais fortes do que nunca."
 almohad.1004.t: "Controle de Marrakesh"
 almohad.1004.desc: "Fundada outrora como capital imperial, [marrakesh.GetTitle] agora está sob meu controle, como deve ser. No entanto, carrega infinitas influências [old_faith.GetAdjective], e meus [masmudi.GetName] estão ansiosos para vê-la refeita à minha imagem.\n\nParece um desperdício destruir tantos palácios e templos perfeitamente bons, mas isso pode ser necessário para cumprir minha ambição de levar a iluminação ao Magrebe."
 almohad.1004.a: "Faremos dela nossa nova capital [masmudi.GetAdjective]!"
 almohad.1004.b: "Vamos construir uma cidade nova, ainda maior!"
 almohad.1004.c: "Talvez esse não seja o curso de ação mais sábio..."
